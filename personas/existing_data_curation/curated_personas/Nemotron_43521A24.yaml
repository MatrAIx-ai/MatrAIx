personas:
  professional: Jonathan Thompson is a retired aerospace mechanical engineer, they channel their three decades of mechanical design, CAD, lean production, and safety compliance into meticulous mentoring
    of high‑school STEM teams, local historical preservation projects, and authoring a beginner's woodworking guide, all while applying their methodical, competitive mindset to ensure every detail aligns
    with their high standards.
  sports: Jonathan Thompson follows the Los Angeles Dodgers baseball team and the Los Angeles Rams football club with a disciplined routine of watching games on Sunday mornings, while they participate in
    the Ventura Senior Walking Club’s sunrise shoreline walks that double as bird‑watching sessions and occasionally join a weekly pickleball league at the community recreation center.
  arts: Jonathan Thompson finds inspiration in the woodworking designs of George Nakashima, they listen to the folk storytelling of Bob Dylan and the improvisational jazz of John Coltrane while reading
    engineering biographies, and regularly attend the Ventura Little Theatre’s classic play revivals featuring actors such as Jeff Goldblum, which they consider a refinement of their solitary creative routines.
  travel: Jonathan Thompson plans their travel with the same meticulous checklists they use in CAD projects, favoring low‑key road trips to coastal gems like Big Sur and the Channel Islands National Park,
    revisiting the Redwood forests of Northern California, and dreaming of a spring visit to the historic gardens of Kyoto, all while budgeting each excursion within their retirement fund and coordinating
    with their wife’s health considerations.
  culinary: Jonathan Thompson enjoys cooking with the fresh vegetables from their garden—such as heirloom tomatoes, zucchini, and kale—preparing dishes like grilled vegetable lasagna and rosemary‑infused
    roasted chicken, while their hobbyist brewing yields a citrus‑hoppy IPA that they often pair with artisanal cheese and a side of homemade sourdough, reflecting their moderate culinary skill and love
    for self‑sufficient meals.
  core: Jonathan Thompson blends a competitive, detail‑driven engineering mind with a solitary, garden‑centered lifestyle, they guard their routines against stress while occasionally indulging in late‑night
    craft‑beer experiments that leave a lingering aroma of hops in their workshop.
background:
  cultural: Jonathan is a white American who grew up in post‑war Southern California. His upbringing was shaped by middle‑class suburban values emphasizing self‑reliance, practicality, and a strong work
    ethic. Living in Ventura County, he embraces the region’s laid‑back coastal culture, including community volunteerism, farmers‑market participation, and an appreciation for environmental conservation,
    while maintaining mainstream American traditions.
