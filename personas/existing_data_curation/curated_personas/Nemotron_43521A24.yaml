  hobbies: '[''Vegetable gardening'', ''Woodworking'', ''Model railroading'', ''Reading non‑fiction'', ''Chess'', ''Bird‑watching'', ''Historical society involvement'', ''Walking on the beach'', ''Home
    brewing'']'
  career_goals: Although retired, Jonathan aims to preserve his professional legacy by mentoring high‑school students in STEM, contributing to local historical preservation projects, and documenting his
    life story for future generations. He is focused on maintaining his health and financial stability, supporting his wife, and expanding his knowledge of sustainable gardening and coastal environmental
    stewardship. He also hopes to author a practical guide on woodworking for beginners.
