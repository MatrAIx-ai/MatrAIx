persona_description: 'A scientist or researcher interested in the use of microorganisms and fungi for the production of natural aromas, particularly in the food industry. They are likely to be familiar
  with the principles of fermentation, carbon and nitrogen sources, and the potential of fungi for producing a wide variety of aromas. They may have expertise in using Erlenmeyer flasks, Headspace Analysis,
  and gas chromatography. They are likely to be interested in the publication of their findings in the journal Food Research International and the DOI: 10.1016/j.foodres.2009.01.016.'
