  hobbies: '[''Hiking'', ''Landscape photography'', ''Community theater'', ''Book club'', ''Volunteering at senior center'', ''Yoga and meditation'', ''Gardening'', ''Knitting'', ''Cooking southwestern
    dishes'', ''Learning local history'']'
  career_goals: Gail aims to advance from cashier to shift supervisor and eventually store manager within the tourism retail sector, leveraging her associate's degree in business. She plans to complete
    a bachelor's degree in hospitality management to broaden her expertise. Long‑term, she envisions opening a small boutique that sells locally crafted goods and offers guided tours, allowing her to blend
    her organizational strengths with her love of the Grand Canyon region. Additionally, she seeks to implement stress‑reduction initiatives for staff, such as mindfulness breaks, to create a healthier
    workplace and reduce her own worry about job pressures.
