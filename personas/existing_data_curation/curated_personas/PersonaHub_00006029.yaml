persona_description: A geologist who specializes in the study of meteorites and their impact on Earth's surface. His research interests include the formation of meteorite craters, the identification of
  ejected material, and the interpretation of ancient impacts on planetary surfaces. He is also interested in the potential for similar impacts on the British Isles and the implications for the study of
  planetary surface processes.
