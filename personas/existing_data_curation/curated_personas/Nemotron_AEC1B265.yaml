    at library'', ''Gardening'', ''Baking'']'
  career_goals: Linda plans to attend a liberal‑arts college with a major in Fine Arts and a minor in Psychology to combine her artistic passions with an interest in human behavior. She aims to build a
    professional portfolio that leads to work as an illustrator of children’s books or a graphic designer for nonprofit cultural organizations. Long‑term, she hopes to open a community art space that offers
    workshops and mental‑health resources, blending her creative talents with her desire to support others.
