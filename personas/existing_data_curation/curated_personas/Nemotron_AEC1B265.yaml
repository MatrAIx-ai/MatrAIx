personas:
  professional: Linda Boyd is a budding teen illustrator who combines her skill in Procreate and watercolor with a methodical bullet‑journal workflow, and they channel their curiosity and organized mindset
    into a portfolio aimed at children’s books and nonprofit cultural design.
  sports: Linda Boyd prefers low‑impact fitness, attending after‑school yoga classes and jogging on the nearby Blue Ridge Trail, while cheering for the hometown Maple City Milers baseball team and occasionally
    playing casual pick‑up basketball with a small group of friends, and they view physical activity as a grounding counterbalance to artistic stress.
  arts: Linda Boyd is a regular at the Riverbank Art Museum, draws inspiration from illustrators like Beatrix Potter and Studio Ghibli’s Hayao Miyazaki, devours contemporary fantasy novels such as The Night
    Circus, and unwinds to the piano compositions of Ludovico Einaudi while sketching in cafés, and they often incorporate literary motifs into their illustrations.
  travel: Linda Boyd enjoys weekend road trips to the Blue Ridge State Park for sketching vistas, has visited the historic district of Charleston with family, and dreams of studying art in Paris and exploring
    the tea houses of Kyoto while balancing school commitments and a modest travel budget, and they meticulously plan each itinerary in their bullet‑journal.
  culinary: Linda Boyd loves baking lemon‑blueberry muffins and crafting simple rosemary‑roasted potatoes, often using fresh basil, avocado, and locally sourced honey in salads, and enjoys experimenting
    with matcha‑flavored desserts as a creative outlet beyond the sketchbook, and they sometimes over‑salt dishes when excited about new flavors.
  core: Linda Boyd merges a meticulous organization habit with a vivid artistic imagination, constantly worrying about perfection yet finding calm in meditation, sketching, and nurturing small‑scale community
    projects, and they often juggle these passions with a dash of teenage impatience.
background:
  cultural: Linda grew up in Cedar Rapids, NE, a small Midwestern town with strong community ties and a largely agricultural backdrop. Her family has deep roots in the area’s farming heritage but values
    education and the arts, encouraging her participation in school art programs and local community events. Raised in a predominantly Protestant environment, she has been involved in church‑based service
    projects and town festivals that celebrate local crafts and seasonal harvests. This blend of rural traditions, community responsibility, and an appreciation for creative expression shapes her worldview
    and artistic sensibilities.
