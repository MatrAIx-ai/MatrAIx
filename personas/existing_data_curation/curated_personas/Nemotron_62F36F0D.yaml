  career_goals: Driven by a competitive spirit, Janice aims to advance to senior industrial engineer and ultimately assume a leadership role such as Director of Health, Safety, and Environment for a major
    manufacturing firm in the Dallas‑Fort Worth region. She seeks to spearhead projects that integrate emerging technologies—AI‑driven risk detection, IoT‑enabled safety monitoring, and sustainable process
    design—into traditional safety programs. Janice plans to obtain her Professional Engineer (PE) license, a Six Sigma Black Belt, and CSP certification, and to present her innovative safety solutions
    at national conferences. Long‑term, she envisions founding a boutique consulting practice that helps companies blend creative engineering with rigorous safety standards, while also mentoring the next
    generation of engineers and publishing research on novel safety methodologies.
