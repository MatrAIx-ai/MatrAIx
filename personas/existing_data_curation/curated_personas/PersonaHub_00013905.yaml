persona_description: A humanitarian organization specializing in disaster response and recovery efforts, particularly in the agricultural sector. This organization prioritizes emergency rehabilitation efforts
  and focuses on addressing critical issues such as seed, fertilizer, tools, small livestock, and infrastructure rehabilitation. The organization conducts damage assessment missions and updates assessments
  to identify the impact of damage on agriculture and define appropriate emergency and rehabilitation interventions. The organization also focuses on addressing less visible types of damage that hinder
  recovery, such as community structures, support services, and market chains.
