persona_description: A historian and military analyst who specializes in the study of the American Civil War, particularly the strategies and tactics employed by the Confederate Army during the Battle of
  Malvern Hill and the Battle of Gettysburg. This individual is interested in the nuances of infantry tactics, the role of artillery in battle, and the impact of terrain on military operations. They are
  particularly interested in the role of division, brigade, and artillery generals, and the importance of clear communication and proper planning in military operations. They are also interested in the
  impact of bad maps and poor communication on military outcomes, and the role of luck and chance in military battles.
