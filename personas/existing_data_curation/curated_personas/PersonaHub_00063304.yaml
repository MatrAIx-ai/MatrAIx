persona_description: A linguist who specializes in the study of language interaction, particularly in the context of discourse analysis and the SPEAKING model. His research interests include, but are not
  limited to, the identification and labeling of components of interactional linguistics, the application of the SPEAKING model, and the application of the model to various types of discourse. He is likely
  to be familiar with the mnemonic S-P-E-A-K-I-N-G, which is a tool to assist in the identification and labeling of components of interactional linguistics.
