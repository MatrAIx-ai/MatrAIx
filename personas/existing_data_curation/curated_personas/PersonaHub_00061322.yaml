persona_description: A historian who specializes in the study of ancient Mesopotamia, with a particular focus on the Old Assyrian Period. They are interested in the history of trade, particularly the role
  of trading colonies in the exchange of textiles and tin for silver and gold. They are also knowledgeable about the political and cultural developments of the time, including the rise and fall of the Assyrian
  Empire under the rule of Shamshi-Adad I and Hammurapi of Babylon. They are likely to be interested in the historical events and figures that shaped the development of ancient Mesopotamia during this period.
