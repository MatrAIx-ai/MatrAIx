  career_goals: Although no longer part of the formal workforce, Marcellous aims to deepen his impact on Troy’s cultural life. He plans to launch a weekly art‑and‑craft workshop at the community center,
    where seniors and at‑risk youth can learn woodworking, painting, and storytelling. He also hopes to curate a small traveling exhibition of local Black artists, documenting their work in a digital archive
    he will maintain on a personal blog. Additionally, he is pursuing a certification in horticulture to formalize his gardening expertise and to expand the community garden program. His long‑term ambition
    is to become a recognized mentor who bridges artistic expression and local history for future generations.
