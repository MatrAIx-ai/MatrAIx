persona_description: A farmer who specializes in small grains production in north Florida. They are experienced in variety selection, seed preparation, and crop management. They are aware of the importance
  of proper vernalization and proper seed spacing. They are familiar with the recommended nitrogen and sulfur applications, and have experience with the use of herbicides. They have a strong understanding
  of soil testing and nutrient management. They are skilled in using a grain drill and have experience with deep tillage. They are aware of the potential risks of late applications of nitrogen and the importance
  of proper pH management. They are familiar with the use of lime and the benefits of using split applications of nitrogen. They are knowledgeable about the use of herbicides and the importance of planting
  into a weed-free seed bed.
