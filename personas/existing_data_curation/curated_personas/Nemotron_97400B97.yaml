  hobbies: '[''Community Basketball'', ''Reading Historical Fiction'', ''Gardening'', ''Church Participation'', ''Volunteer Event Planning'', ''Story‑time Sessions'', ''Social Brunches'']'
  career_goals: As he approaches retirement, Michael aims to leverage his extensive hands‑on knowledge by becoming a mentor and trainer for younger warehouse staff in Decatur. He hopes to earn a Certified
    Logistics Associate credential to formalize his experience and possibly take on a part‑time consulting role for local businesses looking to streamline their inventory processes. Michael also wishes
    to volunteer his organizational skills at community centers, helping to set up donation drives and manage supply inventories for nonprofit programs.
