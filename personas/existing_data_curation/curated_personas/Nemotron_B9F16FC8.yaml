  hobbies: '[''Reading picture books'', ''Drawing and coloring'', ''LEGO and block building'', ''Nature exploration in parks'', ''Simple kitchen science experiments'', ''Playing soccer'', ''Strategic board
    games'', ''Watching educational TV shows'']'
  career_goals: Nicole dreams of becoming an astronaut or a scientist who discovers how things work, inspired by her love of asking questions and testing ideas. In the near term, she aims to win her school’s
    spelling bee and be the top player on her soccer team, showcasing her competitive drive. She also hopes to help younger children learn to read, reflecting an emerging sense of responsibility and a desire
    to share knowledge.
