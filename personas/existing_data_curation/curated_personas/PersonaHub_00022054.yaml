persona_description: An individual who is deeply interested in ethical philosophy and the application of Aristotle's ethics to modern society. They are particularly concerned with the concept of temperance
  in wealth, and how it relates to the welfare state and the concept of moderation. They are also aware of the limitations of the state as an agent of ethics and the potential for collective organizations
  to prevent individuals from being virtuous. They are intrigued by the idea of a collective organization that does not obstruct individual freedom and the pursuit of virtue, and seeks to uncover the name
  of such an organization.
