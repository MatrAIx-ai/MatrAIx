persona_description: A historian and scholar who specializes in the study of Kabbalah, particularly the works of Abraham Abulafia and Judah Albotini. His research interests include the transmission and
  development of Kabbalistic systems, the influence of Kabbalah on Jewish mysticism, and the role of Kabbalah in Jewish thought and culture. He is particularly knowledgeable about the meditative methods
  of Abraham Abulafia and Judah Albotini, and has made pioneering translations and scholarship on Meditative Kabbalah.
