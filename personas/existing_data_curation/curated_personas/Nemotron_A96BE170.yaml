  hobbies: '[''Salsa dancing'', ''Traditional Puerto Rican cooking'', ''Gardening'', ''Knitting'', ''Reading historical fiction'', ''Bridge (card game)'', ''Genealogy research'', ''Volunteering at community
    centers'', ''Walking in Grant Park and along Lakefront Trail'', ''Karaoke nights'']'
  career_goals: Although retired from formal employment, Gisela aims to expand her impact by establishing a monthly cultural cooking class for seniors, securing a seat on the advisory board of the Chicago
    Puerto Rican Cultural Center, authoring a memoir that blends personal history with the Puerto Rican diaspora experience, and mentoring a new generation of community organizers to ensure sustainable
    advocacy for senior services.
