personas:
  professional: Kandy Palmer is a budding visual storyteller who channels a love for drawing familiar book characters and constructing detailed Minecraft builds into an emerging skill set in digital illustration,
    balancing a practical, routine‑oriented work ethic with a competitive drive to constantly refine their craft.
  sports: Kandy Palmer spends weekends playing forward for the Greenwood Youth Soccer Club, joins the local community pool for lap swimming during summer, cheers on the Seattle Seahawks in football season,
    and enjoys casual jogs with their dog in the nearby Ridgewood Park.
  arts: Kandy Palmer finds inspiration in the whimsical illustrations of Hayao Miyazaki, the melodic piano ballads of Yiruma, the pop storytelling of Taylor Swift, and the adventurous narratives of J.K.
    Rowling’s Harry Potter series, channeling these influences into their own sketchbook creations.
  travel: Kandy Palmer’s travel footprint includes family road trips to the Grand Canyon and a school field excursion to Washington, D.C., while dreaming of a future adventure to Kyoto’s bamboo forests
    and the art museums of Paris, balancing meticulous itinerary checks with the desire for spontaneous park discoveries.
  culinary: Kandy Palmer is a budding baker who confidently whips up chocolate chip cookies using butter, brown sugar, and vanilla, delights in assembling fresh strawberry and cream cheese sandwiches for
    lunch, and experiments with simple pasta dishes seasoned with basil and garlic, though they sometimes forget to set a timer and over‑bake the cookies.
  core: Kandy Palmer is a routine‑loving, imaginative twelve‑year‑old who balances a competitive streak and occasional worry with a love for drawing, Minecraft builds, and cookie baking, often forgetting
    to finish tasks but always returning to familiar comforts.
background:
  cultural: Kandy lives in the suburban community of Roslyn Heights, Nassau County, a predominantly White middle‑class area on Long Island. Her family follows many of the typical American customs—celebrating
    holidays such as Thanksgiving, Christmas, and the Fourth of July, and gathering for Sunday family meals. She attends a public middle school that emphasizes both academic achievement and extracurricular
    clubs, reflecting the region’s focus on education and community involvement. The local culture values punctuality, respect for personal space, and participation in neighborhood events like the summer
    block party, all of which shape her preference for routine and familiarity.
