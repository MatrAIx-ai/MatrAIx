  career_goals: Kandy aspires to a career that offers clear daily structure and a tangible way to help others. She dreams of becoming a veterinary assistant or a laboratory technician, roles that combine
    routine tasks with caring for animals. She is motivated to earn good grades in science and biology to qualify for a high‑school program in animal health. She also imagines a backup plan of working in
    a school library, where the predictable schedule and quiet environment appeal to her love of order.
