  career_goals: He aims to transition from his current store‑manager role to a regional management position within a larger retail chain, leveraging his operational expertise and competitive drive. Over
    the next five years, he plans to enroll in a community college business program to earn an associate’s degree in Business Administration, followed by a bachelor’s degree. He hopes to lead multiple locations,
    implement technology‑driven inventory systems, and eventually open his own independent convenience‑store franchise or agricultural supply business. He is motivated by being recognized as a top performer,
    setting sales targets, and exceeding them, while also seeking mentorship opportunities to refine his leadership style.
