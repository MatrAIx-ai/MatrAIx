personas:
  professional: Leonel Jones is a board‑certified marriage and family therapist who leverages their analytical STEM background to design systematic, evidence‑based interventions, while their methodical
    nature ensures meticulous case documentation and reliable follow‑through on therapeutic goals.
  sports: Leonel Jones trains for half‑marathons with the NYC Road Runners club, logs weekly mileage in Strava, supports the New York Knicks and the New York Yankees, and balances intensive cardio with
    yoga sessions at a downtown studio to maintain flexibility.
  arts: Leonel Jones finds creative respite in the works of Portuguese fado singer Mariza and classical pianist Ludovico Einaudi, attends off‑Broadway productions such as 'The Flick,' and engages in weekly
    chess matches at the Manhattan Chess Club, seeing both music and strategic games as extensions of their therapeutic practice.
  travel: Leonel Jones prefers meticulously planned trips that blend cultural immersion with relaxation, returning each summer to Lisbon’s Alfama district to explore family roots, while also seeking adventure
    in Iceland’s Reykjavik and the Monteverde Cloud Forest in Costa Rica, often using Airbnb rentals and local public transit to stay within a modest travel budget.
  culinary: Leonel Jones is an adept home chef who regularly prepares bacalhau à Brás with flaked cod, olive oil, and shredded potatoes, whips up fresh pastéis de nata using puff pastry and custard filling,
    and experiments with sous‑vide fish dishes, all while sourcing ingredients from the city’s Portuguese market stalls and pairing meals with Portuguese vinho verde.
  core: Leonel Jones blends disciplined therapeutic rigor with a love for running, chess, and Portuguese cuisine, often over‑scheduling their day but finding balance in structured half‑marathon training
    and family‑focused community workshops.
background:
  cultural: Leonel grew up in a middle‑class, bilingual household in the New York suburbs, with a mixed Anglo‑Portuguese heritage. His paternal grandparents emigrated from the Azores, bringing Portuguese
    language, traditions, and cuisine, while his maternal side is of Irish‑American descent. Celebrations such as Festa de São João and St. Patrick’s Day were staples of his upbringing, fostering an early
    appreciation for cultural diversity. This dual heritage, combined with his lifelong residence in the multicultural landscape of New York City, has shaped his inclusive worldview and reinforced his commitment
    to culturally sensitive, family‑centered therapy.
attributes:
  skills: '["Emotionally Focused Therapy (EFT)", "Family Systems Therapy", "Cognitive Behavioral Therapy (CBT) for couples", "Psychological assessment and case formulation", "Outcome measurement and data
    analysis", "Crisis intervention and safety planning", "Conflict mediation and negotiation", "Clinical documentation and electronic health records", "Program development and outcome evaluation", "Group
    therapy facilitation", "Supervision and mentorship of trainees", "Cultural competency in diverse family structures"]'
  hobbies: '["Running (half‑marathon training)", "Chess", "Cooking (Portuguese cuisine)", "Reading non‑fiction (psychology, behavioral economics, history)", "Volunteer facilitation of family workshops",
    "Traveling to explore cultural heritage sites"]'
  career_goals: Leonel’s short‑term goal is to obtain board certification from the American Association for Marriage and Family Therapy and to launch a structured, evidence‑based couples workshop series
    targeting underserved NYC neighborhoods. Within the next three to five years, he plans to establish his own boutique private practice that blends in‑person and teletherapy services, while serving as
    a clinical supervisor for emerging therapists. Long‑term, he aspires to publish a research monograph on the efficacy of structured therapeutic interventions for high‑stress couples and to assume a leadership
    role—such as director of a community mental‑health agency—where he can influence policy and expand access to family‑focused mental health services.
