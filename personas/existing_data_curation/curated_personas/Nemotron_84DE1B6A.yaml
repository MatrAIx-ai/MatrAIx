personas:
  professional: Howard Witter, a centenarian mechanical engineer turned interdisciplinary mentor, leverages decades of design, technical writing, and systems analysis to guide high-school students through
    hands‑on workshops while chronicling his life's intersection of technology and art in a memoir.
  sports: Howard Witter, a devoted fan of the Durham Bulls and the University of North Carolina Tar Heels, participates in a senior walking club that meets at the Riverwalk each Saturday, practices tai
    chi at the community center, and keeps a regular chess session with friends as their principal mental sport.
  arts: Howard Witter, an avid abstract watercolorist, draws inspiration from Jackson Pollock and the harmonic textures of Miles Davis, attends monthly talks at the Nasher Museum, and experiments with AI‑driven
    art platforms to blend classic jazz motifs with digital collage.
  travel: Howard Witter, who favors relaxed road trips, has driven the Blue Ridge Parkway in the fall, visited the Smithsonian in Washington, D.C. for a historical exhibition, and dreams of a quiet pilgrimage
    to the Italian town of Siena to explore Renaissance archives, all while budgeting trips around a modest pension.
  culinary: Howard Witter enjoys crafting herb‑infused tea from basil and rosemary, prepares simple low‑sodium shrimp and grits with a dash of paprika, and occasionally indulges in a sweet peach cobbler,
    though they sometimes over‑salt their vegetable stew in pursuit of bold flavor.
  core: Howard Witter, a hundred‑year‑old engineer‑artist, balances disciplined curiosity with a penchant for forgetting pills and over‑salting soups, constantly seeking novelty while preserving a legacy
    of knowledge.
background:
  cultural: Howard is a white American born in 1925 in the Midwestern United States and raised in a modest, Protestant, middle‑class family that valued hard work, education, and community service. He lived
    through the Great Depression, served in the U.S. Army during World War II, and later moved to Durham, North Carolina, where he worked in engineering during the post‑war industrial boom. The evolution
    of the Research Triangle Park and the civil‑rights movement of the 1960s shaped his worldview, fostering a blend of Southern hospitality, respect for tradition, and progressive appreciation for diversity
    and innovation. Today, his cultural identity reflects a lifelong commitment to learning, a reverence for both the historical roots of his community and the forward‑looking spirit of the modern scientific
    landscape.
