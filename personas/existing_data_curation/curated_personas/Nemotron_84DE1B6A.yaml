  career_goals: At a century old, Howard’s ambition centers on legacy rather than employment. He aims to complete a memoir that weaves personal history with reflections on scientific and cultural change,
    and to curate a digital archive of his family’s genealogy for future generations. Additionally, he seeks to mentor high‑school students in the Durham area, share his knowledge of design and problem
    solving through a small community lecture series, and continue exploring emerging tools such as AI‑generated art to keep his creative practice fresh.
