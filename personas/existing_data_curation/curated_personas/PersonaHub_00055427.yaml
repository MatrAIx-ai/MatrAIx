persona_description: A professional in the field of wildlife management, conservation, and research who is interested in the latest developments and achievements in the cooperative research units program.
  This individual may be a wildlife biologist, fisheries biologist, or a researcher in a related field. They are likely to be familiar with the history and objectives of the Cooperative Wildlife Research
  Unit Program and the Colorado Cooperative Fish and Wildlife Research Unit. They may also be interested in the current research projects and technical assistance provided by the Unit, and how these efforts
  contribute to the management and conservation of fishery and wildlife resources in Colorado.
