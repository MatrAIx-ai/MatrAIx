  hobbies: '["hiking with local groups", "community soccer league", "bike trail rides", "DIY home‑improvement projects", "gardening", "cooking for family gatherings", "volunteering with church maintenance
    crew", "attending local festivals", "watching professional football"]'
  career_goals: Mark aims to re‑enter the workforce in a part‑time property‑maintenance or facilities‑management role that aligns with his preference for routine and practical work. He hopes to obtain a
    residential safety certification, develop a modest home‑repair side business, and generate reliable supplemental income to support his family. Long‑term, he envisions volunteering his maintenance expertise
    for his church and local community while maintaining a balanced, predictable schedule.
