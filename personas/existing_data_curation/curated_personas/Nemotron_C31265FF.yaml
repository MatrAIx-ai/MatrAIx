personas:
  professional: Mark Davis is a seasoned property maintenance specialist with robust carpentry, plumbing, and electrical skills, who thrives on predictable schedules and enjoys coordinating small teams
    for community events; they approach each job methodically, using their inventory management background to keep supplies stocked and costs low, while occasionally insisting on doing the work themselves
    to avoid outsourcing.
  sports: Mark Davis is a dedicated community soccer player in the West Jordan Soccer Club, a faithful follower of the Denver Broncos, and a regular hiker with the Wasatch Trail Riders, often training on
    weekend bike rides and occasionally cheering on the Utah Jazz during local watch parties.
  arts: Mark Davis enjoys classic Western films by John Ford, tunes into the Mormon Tabernacle Choir’s broadcasts, and attends regional folk music festivals featuring artists like Brandi Carlile and the
    local bluegrass group "The Mountain Pioneers," finding these experiences a welcome complement to their hands‑on lifestyle.
  travel: Mark Davis prefers road‑trip adventures to the national parks of the Intermountain West—especially Zion and Bryce Canyon—where they camp in a modest RV, but they also dream of a longer trek through
    New Zealand’s South Island, balancing travel planning with budget constraints and family obligations.
  culinary: Mark Davis loves cooking for gatherings, regularly preparing garden‑fresh ratatouille, slow‑cooked pot roast with root vegetables, and homemade cornbread, and although their cooking skill is
    solid, they sometimes over‑season dishes with garlic and forget to let the meat rest.
  core: Mark Davis is a routine‑oriented, community‑focused maintenance pro who balances practical hands‑on work, disciplined finances, modest health quirks, and a love for soccer, outdoor recreation, classic
    arts, and home‑cooked meals, all while sprinkling occasional over‑enthusiasm into DIY projects.
background:
  cultural: Mark grew up in the predominantly Anglo‑American, LDS‑influenced culture of West Jordan, Utah. His upbringing emphasized family cohesion, community service, self‑reliance, and practical problem‑solving.
    While he identifies as white and English‑speaking, his cultural practices include regular participation in church activities, neighborhood gatherings, and a strong appreciation for the outdoor lifestyle
    common to the Intermountain West.
attributes:
  skills: '["handyman repairs", "basic carpentry", "plumbing maintenance", "electrical fixture installation", "inventory management", "customer service", "team coordination", "scheduling and logistics",
