personas:
  professional: Jonathan Mcneese is a 25‑year‑old postal service clerk whose logistical precision and love for contemporary art drive their ambition to transition into a gallery assistant role, yet their
    spontaneous nature and occasional procrastination often clash with the structured deadlines of mail sorting and route planning.
  sports: Jonathan Mcneese enjoys early‑morning runs along the Mohawk River Trail, is a loyal fan of the New York Mets and Buffalo Bills, occasionally joins the Clifton Park Running Club for weekend group
    jogs, and prefers solitary cardio workouts over team sports.
  arts: Jonathan Mcneese is a weekend gallery‑hopper who sketches works by emerging Hudson Valley painters like Lauren Rousseau, captures street scenes in the style of Henri Cartier‑Bresson, curates playlists
    of ambient artists such as Tim Hecker and Aphex Twin while devouring philosophy by Michel Foucault and modern fiction by Ocean Vuong.
  travel: Jonathan Mcneese favors spontaneous weekend getaways to art‑rich towns like Beacon, NY, and historic Philadelphia, dreams of a month‑long cultural immersion in Berlin’s museum scene, balances
    a modest travel budget by staying in boutique hostels, and occasionally splurges on a guided river cruise in the Hudson Valley.
  culinary: Jonathan Mcneese loves crafting simple Mediterranean meals such as lemon‑herb grilled salmon with quinoa and roasted eggplant, enjoys the occasional New York bagel with lox and cream cheese,
    experiments with seasonal heirloom tomatoes during late‑night photo‑editing sessions, and frequently drinks a pour‑over coffee from a local roaster.
  core: Jonathan Mcneese is a 25‑year‑old postal clerk turned aspiring art logistics specialist whose meticulous mind is tempered by chronic worry, a passion for street photography, and a habit of sketching
    gallery walls in the margins of their journal.
background:
  cultural: Jonathan was raised in Clifton Park, a suburban community in Albany County, by working‑class parents of mixed Dutch, Irish and English ancestry. His upbringing reflects the typical upstate New
    York middle‑class values of hard work, modesty, and community involvement. He attended the local public high school and grew up with easy access to the Albany cultural corridor, including the Albany
    Institute of History & Art and the Hudson Valley art scene. While his family's background is rooted in the region’s European settler heritage, he has developed an appreciation for the diverse artistic
    expressions found in the area, blending a conventional American upbringing with an emerging curiosity for contemporary art and independent culture.
