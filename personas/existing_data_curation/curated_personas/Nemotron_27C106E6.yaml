  career_goals: He hopes to pivot from the postal service into the cultural sector, targeting a role such as a gallery assistant or museum registrar where his logistical know‑how can support the handling
    and shipping of artworks. Over the next two years he plans to enroll in a community‑college program in art history or museum studies, earn a certification, and build a modest portfolio of street‑photography
    that he can sell as prints online. He also wants to develop stronger organizational habits to reduce stress, aiming for a supervisory position in a small art nonprofit within five years. Ultimately,
    he aspires to blend his curiosity for contemporary art with his practical skills to help curate exhibitions and manage artwork logistics.
