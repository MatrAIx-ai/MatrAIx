  career_goals: Nekita aims to advance to a district manager position within the next three years, overseeing multiple stores and implementing best‑practice operational standards. She intends to develop
    a structured training program that equips retail staff with stress‑resilience techniques and clear performance metrics. Long‑term, she envisions opening a community‑focused boutique that showcases locally
    sourced products and provides employment opportunities for younger members of her neighborhood. Additionally, she seeks a healthier work‑life balance to reduce personal stress and spend more quality
    time with her family.
