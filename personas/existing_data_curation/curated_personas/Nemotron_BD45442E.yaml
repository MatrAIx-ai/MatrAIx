personas:
  professional: Stoney Ashrafi, a diligent 20-year-old aspiring automotive technician, leverages strong organizational skills, mechanical aptitude, and introductory Python knowledge to excel in hands-on
    projects and part-time retail, while they methodically plan a path toward ASE certification and future shop ownership.
  sports: Stoney Ashrafi spends weekends hiking the trails of Portage County, shooting hoops in local pickup basketball games, cheering for the Cleveland Cavaliers and Cleveland Browns, and they hold a
    seasonal membership with the Portage Trail Runners Club, blending a love for outdoor endurance with casual team sport competition.
  arts: Stoney Ashrafi channels creative energy into model-car building, woodworking projects, and practicing basic guitar chords to classic rock songs by Led Zeppelin and modern indie tracks by Tame Impala,
    while they also curate a modest collection of automotive photography that fuels their aesthetic appreciation.
  travel: Stoney Ashrafi enjoys short road trips to regional car shows in Michigan's Upper Peninsula and weekend camping adventures in the Blue Ridge Mountains, and they dream of a future visit to Germany's
    IAA automotive exhibition, yet plans trips meticulously around a tight student budget and school schedule.
  culinary: Stoney Ashrafi prefers hearty, protein-rich meals like a homemade BBQ rib slab seasoned with smoked paprika and garlic, often cooks simple spaghetti Bolognese on weeknights, but they occasionally
    resort to greasy fast-food burgers when project deadlines pile up, reflecting a pragmatic yet indulgent culinary balance.
  core: Stoney Ashrafi, a 20-year-old perpetual planner, obsessively journals mood fluctuations, worries over every detail, and they can't resist tinkering with any motorized object—even if it means sacrificing
    sleep and neglecting regular exercise.
background:
  cultural: Stoney grew up in Tallmadge, Ohio, within a Midwestern white family with roots in German- and Irish-heritage traditions. The local culture emphasizes community involvement, modesty, and a strong
    work ethic, which have shaped his reliable and methodical personality. He participated in high-school sports, town fairs, and neighborhood volunteer activities, and his family’s values of punctuality
    and self-reliance continue to influence his daily routines and long-term goals.
attributes:
  skills: '[''Time management'', ''Project planning'', ''Microsoft Office Suite'', ''Google Workspace'', ''Basic Python programming'', ''Automotive maintenance (oil changes, tire rotation)'', ''Basic carpentry
