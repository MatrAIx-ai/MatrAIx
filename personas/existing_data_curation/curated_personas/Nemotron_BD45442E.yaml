  hobbies: '[''Model car building'', ''DIY woodworking projects'', ''Hiking in Portage County trails'', ''Pickup basketball'', ''Strategy video games (e.g., Civilization)'', ''Reading nonfiction (technology,
    self-help)'', ''Journaling'', ''Volunteering for community clean-up'', ''Attending local car shows'', ''Learning basic guitar chords'']'
  career_goals: Stoney aims to enroll in a community-college program in automotive technology or industrial manufacturing to earn certifications (ASE, CNC machining). He dreams of becoming a master technician
    who can run his own small repair shop, blending his curiosity for new automotive technologies with a stable, practical career. In the longer term, he hopes to develop leadership skills to manage a team,
    while maintaining a balanced lifestyle that allows him to pursue his hobbies and manage stress.
