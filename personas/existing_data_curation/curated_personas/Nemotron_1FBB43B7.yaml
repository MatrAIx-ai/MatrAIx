  hobbies: '[''drawing'', ''painting'', ''reading fantasy books'', ''building LEGO sets'', ''crafting papel picado'', ''dancing to Latin music'', ''participating in school drama club'', ''learning to cook
    Mexican dishes'', ''exploring science kits'', ''playing Scratch programming games'']'
  career_goals: Xanthe dreams of blending her love of art and science by becoming an astronaut who can create visual stories about space, a children's book author who illustrates Mexican folklore, or a
    science communicator who uses art to explain complex ideas. She also aspires to lead community art projects and cultural festivals in Phoenix, helping celebrate her heritage while inspiring other kids
    to explore creativity and curiosity.
