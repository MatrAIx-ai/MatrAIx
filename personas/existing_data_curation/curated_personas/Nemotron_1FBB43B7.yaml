personas:
  professional: An aspiring junior illustrator and storyteller, Xanthe Gonzalez blends vivid imagination with methodical planning to craft illustrated folklore narratives, thriving as the charismatic center
    of school art showcases and impressively guiding classmates through collaborative art projects.
  sports: An enthusiastic member of the Phoenix youth soccer league, Xanthe Gonzalez cheers for the Arizona Cardinals and the Phoenix Suns, participates in weekend rock‑climbing outings with the Desert
    Explorers club, and balances energetic play with a disciplined habit of stretching before each activity.
  arts: A vibrant performer and creator, Xanthe Gonzalez dazzles peers in the school drama club, crafts elaborate papel picado for Día de los Muertos, draws inspiration from the surreal canvases of Frida
    Kahlo and the imaginative worlds of JK Rowling, and often dances to the rhythms of Bad Bunny during rehearsals.
  travel: A curious explorer, Xanthe Gonzalez loves planning family road trips to the Grand Canyon and weekend stays at a coastal cabin in Ensenada, blending thorough research with a love for collecting
    desert rocks as souvenirs, yet balances these adventures with school calendar constraints.
  culinary: A budding kitchen assistant, Xanthe Gonzalez eagerly helps whisk masa for tamales, roll carnitas tacos, and ladle pozole broth, favoring the smoky flavor of chipotle and the bright tang of fresh
    cilantro, while proudly mastering the art of shaping perfect papel picado using colored tissue paper.
  core: Xanthe Gonzalez is a talkative, calm‑hearted nine‑year‑old who transforms desert rocks into fantastical creatures on paper, saves allowance for sketchbooks, and never lets a hiccup disrupt a family
    fiesta.
background:
  cultural: Xanthe comes from a Mexican‑American family that celebrates traditions such as Día de los Muertos, quinceañeras, and family gatherings centered around homemade tacos, tamales, and pozole. Spanish
    is spoken at home, making her fluent in both English and Spanish, and she learns Mexican folklore and history through stories told by her grandparents. Living in Phoenix, she is part of a vibrant Latino
    community, attending cultural events at local community centers and incorporating desert-inspired motifs into her artwork. Her family emphasizes values of familismo, respeto, and community service,
    which shape her desire to share cultural stories through art and to contribute positively to her neighborhood.
