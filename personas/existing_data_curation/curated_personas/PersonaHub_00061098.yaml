persona_description: A political analyst who specializes in international trade and agriculture, particularly the impact of U.S. policies on global rice markets and the potential for market-oriented reforms.
  They are knowledgeable about tariffs, subsidies, production subsidies, border protection, and the World Trade Organization, and are skilled in analyzing the economic implications of U.S. rice policies
  on U.S. taxpayers, consumers, and workers, as well as on rice farmers in developing countries. They have experience in advocating for market-oriented reforms and in negotiating with policymakers to achieve
  these goals.
