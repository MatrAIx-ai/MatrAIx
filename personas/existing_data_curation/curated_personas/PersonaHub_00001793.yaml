persona_description: A Chinese martial arts instructor who specializes in the study of fist forms, sparring techniques, weapon forms, and the full spectrum of Chinese martial arts. He/she is skilled in
  the application of important concepts and principles, the correct use and development of body and mind power, and the understanding and application of the Chinese martial arts philosophy. The instructor
  has a deep understanding of the elements, yin/yang, and trigrams, and is proficient in the cultivation of subtle body energy. He/she is also experienced in teaching both solo and dual practice, and has
  a talent for choreographed and spontaneous sparring.
