  career_goals: Although officially retired, Chanda's ambition centers on leaving a lasting, positive imprint on her community. She aims to mentor younger residents through a seasonal gardening program
    that teaches both sustainable practices and practical budgeting. She is drafting a memoir-cookbook that weaves together her family's coastal recipes, gardening tips, and personal reflections, hoping
    to publish it through a local press. She plans to enroll in online courses on horticulture and digital storytelling to sharpen her expertise. Managing her health and finances remains a priority; she
    seeks to establish a modest emergency fund and adopt regular mindfulness practices to mitigate her natural tendency toward worry. Ultimately, she wishes to be recognized as a supportive, yet assertive,
    community resource who balances creativity with practicality.
