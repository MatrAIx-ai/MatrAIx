personas:
  professional: Miriam Paleo, a veteran elementary and middle school teacher with three decades of experience, leverages their methodical curriculum design and calm classroom management to mentor new educators,
    develop inclusive literacy programs, and prepare for a transition to a curriculum coordinator role after earning a master’s in educational leadership.
  sports: Miriam Paleo stays active with weekly walks along the Missouri River bluffs, occasional sunrise yoga sessions with a senior wellness club, and follows the Kansas City Chiefs and St. Louis Cardinals
    for seasonal excitement, preferring low‑impact activities that suit a quiet lifestyle.
  arts: Miriam Paleo enriches their evenings with Beethoven piano sonatas, Joan Baez folk ballads, and classic poetry by Emily Dickinson, while reading historical fiction by Ken Follett and knitting scarves
    to the soundtrack of NPR’s drama series, crafting a personal sanctuary of artistic appreciation.
  travel: Miriam Paleo enjoys carefully planned, serene getaways such as weekend retreats to the Ozark National Scenic Riverways, a quiet cabin stay in Michigan’s Upper Peninsula, and a nostalgic tour of
    Colonial Williamsburg, always budgeting trips to align with their modest retirement income.
  culinary: Miriam Paleo delights in seasonal cooking, often preparing herb‑infused roasted chicken, garden‑fresh ratatouille with zucchini and tomatoes, and a comforting apple‑cinnamon crumble, while their
    modest kitchen skills keep recipes simple yet flavorful.
  core: Miriam Paleo is a detail‑driven educator who balances a quiet, garden‑filled life with a compassionate drive to mentor others, all while managing a cautious financial outlook and a penchant for
    solitary, methodical hobbies.
background:
  cultural: Miriam was born and raised in a small agricultural town in Iowa, growing up in a Protestant (Methodist) family that emphasized hard work, modesty, and community responsibility. The Midwestern
    values of self-reliance, respect for nature, and a quiet, orderly lifestyle shaped her worldview. Her cultural heritage is rooted in Anglo-American traditions, but her decades of teaching in increasingly
    diverse classrooms have broadened her appreciation for multicultural perspectives while reinforcing a deep commitment to inclusive education. She maintains ties to local community institutions such
    as the church and the county library, reflecting the region’s strong sense of civic engagement, yet she prefers personal reflection and solitude within these cultural frameworks.
attributes:
  skills: '[''Lesson planning'', ''Curriculum development'', ''Differentiated instruction'', ''Classroom management'', ''Data-driven assessment'', ''Special education accommodations (IEPs)'', ''Educational
