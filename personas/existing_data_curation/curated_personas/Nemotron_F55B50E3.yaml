  career_goals: Looking ahead, David hopes to channel his practical curiosity into a career as a mechanical or robotics engineer, dreaming of designing machines that solve everyday problems. He is also
    intrigued by the idea of becoming a professional e‑sports player or game developer, where his competitive edge and coding knowledge can intersect. In the short term, he aims to earn a high school diploma
    with strong grades in STEM subjects, secure a spot in his school’s robotics club, and gain an apprenticeship or summer program that offers hands‑on engineering experience.
