persona_description: A team of researchers and engineers working on developing innovative solutions for joining different materials, particularly in the automotive, aeronautical, electronic, civil, and
  biomedical sectors. They are passionate about creating hybrid multi-material structures with high mechanical characteristics, overcoming the limitations of existing technologies in terms of mechanical
  joints, environmental considerations, and integration with production systems. They are skilled in creating mechanical joints between different non-conductive materials and an electrically conductive
  material, and are dedicated to developing lightweight and compact equipment for on-site maintenance.
