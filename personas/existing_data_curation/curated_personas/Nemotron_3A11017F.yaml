  hobbies: '[''Nature photography'', ''Abstract sketching'', ''Speculative fiction reading'', ''Popular science literature'', ''DIY woodworking'', ''Model train building'', ''Walking in coastal parks'',
    ''Home improvement projects'']'
  career_goals: Manual aims to advance into a supervisory or management position within his pest‑control firm, overseeing a team of technicians while championing eco‑friendly IPM practices. He plans to
    obtain NPMA professional certification and a specialized license for bed‑bug remediation. Long‑term, he envisions launching a boutique consulting service that blends his technical expertise with his
    passion for environmental education, producing instructional videos and written guides for homeowners. He also hopes to balance career growth with a stable income that supports his family and allows
    him time for his artistic pursuits.
