  career_goals: Christine aims to move from front‑line service into a supervisory role within the next two years, targeting a shift manager position that will let her develop leadership and operational
    oversight skills. Over the next five years she hopes to earn a bachelor’s degree in hospitality management and eventually open a small, community‑focused café that doubles as an art gallery, where she
    can showcase local artists and serve inventive, visually striking dishes. She also aspires to become a recognized food stylist and freelance menu designer for regional restaurants, while earning accolades
    such as Employee of the Month and contributing to a positive, high‑performance team culture.
