personas:
  professional: Johnmichael Thomson, a retired handyman and community organizer in Cathlamet, blends their decades‑long expertise in woodworking, small‑engine repair, and gardening with a meticulous, routine‑driven
    approach to coordinating church fundraisers, local festivals, and story‑telling events, earning a reputation as the dependable, talkative hub of the town.
  sports: Johnmichael Thomson spends mornings casting a line on the Columbia River, joins the local senior bowling league on Tuesdays, walks the historic river trail daily, and cheers for the Seattle Seahawks
    and Portland Timbers, embodying a blend of low‑impact activity and loyal fandom.
  arts: Johnmichael Thomson fills evenings listening to classic big‑band recordings by Glenn Miller and Duke Ellington and folk songs by Bob Dylan and Woody Guthrie, while also leading community storytelling
    sessions and attending the modest town theater productions, allowing music and narrative to shape their social connections.
  travel: Johnmichael Thomson prefers relaxed road trips, having driven to Seattle's Pike Place Market, Portland's Saturday Market, and the scenic vistas of Mount Rainier, while dreaming of a leisurely
    cruise to the San Juan Islands and a nostalgic visit to New England's coastal towns during the fall.
  culinary: Johnmichael Thomson delights in cooking hearty meals such as salmon fish stew with potatoes and dill, pot roast with carrots, and chicken and dumplings, often seasoning with fresh garden herbs
    and a pinch of extra salt, reflecting a comfortable, home‑cooked style that brings friends together around a well‑worn kitchen table.
  core: Johnmichael Thomson, an 83‑year‑old pillar of Cathlamet, blends routine, talkative charm, and hands‑on skill to mentor neighbors, preserve local lore, and savor each cup of coffee, while they occasionally
    indulge their stubborn streak and a sweet‑tooth for extra‑salty dishes.
background:
  cultural: Johnmichael is a third‑generation white American whose family settled in the Pacific Northwest during the early 1900s. Raised in a small, close‑knit town along the Columbia River, he grew up
    with values of self‑reliance, practicality, and respect for the natural environment. His cultural identity is shaped by the region’s logging and fishing heritage, regular church involvement, a strong
    tradition of community service, and an emphasis on preserving family traditions and local history.
