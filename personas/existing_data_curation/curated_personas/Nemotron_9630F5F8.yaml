  career_goals: Although retired, Johnmichael’s ambition is to leave a lasting legacy in Cathlamet by mentoring younger community members, preserving the town’s oral histories, and ensuring the annual riverfront
    festival remains a vibrant tradition. He aims to stay physically active through his garden, regular fishing trips, and by continuing his role as an informal historian for his church. Maintaining a strong,
    supportive partnership with his wife and fostering close family connections are also central to his long‑term goals.
