  career_goals: Valentina aims to advance to a senior quality-assurance lead position where she can oversee a team of inspectors and shape the department’s best-practice standards. She is pursuing certification
    as a Certified Quality Engineer to formalize her expertise and plans to mentor more junior staff, fostering a culture of reliability and continuous improvement. While she values job stability as she
    approaches retirement, she also envisions a gradual transition to a consulting role that would allow her to share her practical knowledge with smaller manufacturers in the Los Angeles area, and perhaps
    develop a side business selling traditional Mexican pastries she prepares at home.
