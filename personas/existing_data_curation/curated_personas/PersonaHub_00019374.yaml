persona_description: A financial analyst who specializes in the analysis of monetary aggregates and the money supply, particularly the distinction between financial assets and liabilities. This person is
  knowledgeable about the Federal Reserve's measures of the money supply, including the components of the money supply, current money supply data, and the use of credit cards and debit cards. They are also
  familiar with the concept of revolving credit and the shift in consumer borrowing towards loans backed by home equity lines of credit.
