personas:
  professional: Hunter Brownell, a 34‑year‑old auditor with mastery of GAAP, IFRS, SAP and advanced data‑visualization tools, leverages their disciplined project‑management style and calm, curious mindset
    to turn complex financial data into clear, actionable insights while mentoring junior staff.
  sports: Hunter Brownell, an avid member of the Decatur Hoops community league and a regular on the Stone Mountain trail, roots for the Atlanta Hawks and Braves, mixes basketball drills with trail runs
    during spring and fall, and relies on a disciplined weekly schedule to maintain peak fitness despite a busy audit calendar.
  arts: Hunter Brownell finds creative release strumming acoustic renditions of John Mayer and Ed Sheeran in a modest home studio, while also attending local theater productions of classic dramas and devouring
    documentaries by Ken Burns, which together enrich their analytical mind with narrative nuance.
  travel: Hunter Brownell plans road‑trip itineraries with the precision of a project plan, favoring Southeast national parks like Great Smoky Mountains and Shenandoah for adventure hikes, while dreaming
    of a future culinary tour of Japan and Italy, balancing limited vacation days with a desire for immersive cultural experiences.
  culinary: Hunter Brownell, a confident home chef, blends Southern comfort dishes like fried chicken with global twists such as Korean gochujang glaze or Mediterranean herbs, often experimenting with ingredients
    like smoked paprika, miso, and fresh basil while meticulously tracking recipe costs in a spreadsheet.
  core: Hunter Brownell, a 34‑year‑old finance wizard, channels disciplined curiosity into audit automation, balances a love for basketball and guitar with a penchant for spreadsheet‑driven meal planning,
    and never misses a deadline—even if they occasionally stay up late perfecting a new recipe.
background:
  cultural: Hunter grew up in a middle-class suburban neighborhood in the Atlanta metropolitan area, immersed in the Southern hospitality and community-oriented values typical of DeKalb County. His family
    emphasized education, hard work, and mutual respect, with occasional church involvement that reinforced a cooperative ethic. Living in the diverse and evolving city of Decatur has exposed him to a wide
    range of cultural experiences, from arts festivals to multicultural cuisine, shaping a pragmatic yet open-minded worldview. While his roots are firmly Southern, his professional training and personal
    curiosity have led him to adopt a blend of traditional values and progressive attitudes toward finance, technology, and community service.
attributes:
  skills: '[''Financial Reporting'', ''Auditing'', ''Tax Preparation'', ''GAAP & IFRS Compliance'', ''Advanced Excel'', ''Data Visualization (Tableau, PowerBI)'', ''ERP Systems (SAP, Oracle, QuickBooks)'',
