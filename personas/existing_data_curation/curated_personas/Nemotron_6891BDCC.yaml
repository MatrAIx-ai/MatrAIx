  hobbies: '[''Playing basketball in a community league'', ''Running on local trails'', ''Cooking diverse recipes'', ''Reading non-fiction on finance and technology'', ''Volunteering as a financial literacy
    instructor'', ''Attending accounting networking meetups'', ''Learning basic Python for data analysis'', ''Playing acoustic guitar'', ''Road trips to national parks'']'
  career_goals: He aims to earn his CPA license within the next year, advance to a senior auditor role at a reputable firm, and eventually move into internal audit management or a CFO position within a
    mid-size company. Hunter is driven to become a thought leader in audit automation, championing the adoption of data-analytics tools and AI-based risk modeling. He also aspires to mentor junior accountants,
    contribute to professional bodies such as the AICPA, and eventually launch a boutique consulting practice that helps small businesses improve financial health and adopt sustainable reporting practices.
