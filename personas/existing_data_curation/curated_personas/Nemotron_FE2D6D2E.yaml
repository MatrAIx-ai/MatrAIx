  hobbies: '[''Visiting Art Galleries'', ''Attending Community Theater'', ''Book Club'', ''Gardening'', ''Cooking'', ''Dancing'', ''Walking in Parks'', ''Painting'', ''Yoga'', ''Meditation'']'
  career_goals: Dana aims to transition into a mentorship role where she can train and support younger retail associates, leveraging her kindness and cooperative nature. She also dreams of opening a small
    part‑time boutique that showcases works by local Houston artists, merging her curiosity for art with her retail expertise. Reducing workplace stress is a priority, so she seeks a flexible schedule that
    allows more time for self‑care, volunteer work at community arts programs, and eventually a gradual move toward semi‑retirement.
