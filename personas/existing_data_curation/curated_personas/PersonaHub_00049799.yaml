persona_description: A teacher who has been involved in implementing the GLOBE program in schools and is responsible for training and supporting GLOBE teachers in New York City, Nassau, Suffolk, and southern
  Westchester counties. He has been involved with GLOBE for 29 years and is now in his third year as the Director of GLOBE NY Metro, the partner for southern New York State. He is a Professor of Earth and
  Environmental Sciences at Queens College and has authored two college-level geology textbooks and a laboratory manual. His contributions to science education have expanded to the K-12 levels.
