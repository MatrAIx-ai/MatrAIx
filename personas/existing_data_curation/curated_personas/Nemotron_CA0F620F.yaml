  career_goals: Robert aims to advance into senior executive leadership—ideally a Vice President or Director role—where he can shape company culture around collaboration, compassion, and innovative thinking.
    He wants to champion corporate social responsibility initiatives that intertwine business performance with community arts and sustainability. Over the next decade, he envisions launching a social‑enterprise
    venture that provides mentorship and resources to emerging creators, while also serving as a mentor for rising managers within his organization. His ambition is to be recognized as a thought leader
    who blends strategic business acumen with a deep commitment to people and the arts.
