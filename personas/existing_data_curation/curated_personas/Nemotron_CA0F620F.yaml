  hobbies: '[''Visiting Art Galleries'', ''Street Photography'', ''Hiking Coastal Trails'', ''Cooking International Cuisine'', ''Wine Tasting'', ''Live Jazz Concerts'', ''Volunteering at Community Centers'',
