data:
  user 1 personas: 'I like to arm wrestle.

    I like to make bagels.

    I am a cartographer.

    I used to be a nurse.'
  user 2 personas: 'I work on semi trucks for a living.

    My motor never stops running.

    I got off the road when i married my sweetheart.

    My father was a driver himself.'
  Best Generated Conversation: 'User 1: What do you do for a living?

    User 2: I''m a mechanic for semi trucks.

    User 1: That''s so cool! I used to be a nurse, but I''m now a cartographer.

    User 2: That''s interesting! What''s it like being a cartographer?

    User 1: It''s really fun! I get to make maps of all sorts of places.

    User 2: That''s awesome! Do you enjoy it?

    User 1: I love it! I''m really passionate about it.

    User 2: That''s great! I''m glad you''re happy with your job.

    User 1: Thanks! I am. What do you like to do for fun?

    User 2: I like to go to car shows and arm wrestle.

    User 1: That''s cool! I''ve never been to a car show, but I''ve always wanted to go.

    User 2: You should! They''re really fun.

    User 1: I''ll have to check one out. What do you like about arm wrestling?

    User 2: It''s a great way to test your strength.

    User 1: I bet it is. I''ve never arm wrestled before, but it sounds fun.

    User 2: You should try it sometime.

    User 1: I will! Thanks for the suggestion.

    User 2: You''re welcome!

    User 1: So, what''s your favorite thing about being a mechanic?

    User 2: I like being able to fix things and help people.

    User 1: That''s a great quality to have. I''m sure your customers appreciate it.

    User 2: I hope so!

    User 1: So, what''s your favorite thing about being married?

    User 2: My favorite thing is spending time with my wife and kids.

    User 1: That''s so sweet! I''m sure they''re lucky to have you.

    User 2: Thank you! I''m lucky to have them.

    User 1: Well, I''m glad we had this talk. It was nice getting to know you better.

    User 2: You too! It was nice talking to you.'
