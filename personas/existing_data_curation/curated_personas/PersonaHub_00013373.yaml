persona_description: A research scientist with expertise in perinatology, specifically in the field of preterm labor and the use of vaginal progesterone in reducing the incidence of preterm birth. They
  have conducted a randomized clinical trial to test the hypothesis that administering vaginal progesterone to women with short cervixes can reduce the rate of preterm birth. The researcher has also explored
  the use of three- and four-dimensional ultrasound in prenatal diagnosis of congenital defects, particularly the prenatal identification of congenital heart disease. They have a strong interest in the
  development of new 3DUS techniques for volume calculations of fetal organs and fetal weight.
