persona_description: A healthcare professional who is interested in improving patient outcomes through the use of technology and immersive, interactive visual content to enhance understanding of health,
  disease, and treatment. This individual is familiar with the challenges of delivering healthcare information to a global audience, including the lack of literacy skills and non-adherence to medication,
  and is seeking a better way to deliver information in a modern and accessible format that improves understanding and decision-making. This persona is likely to be involved in the development and implementation
  of digital health initiatives, and is dedicated to using technology to improve patient outcomes and reduce healthcare costs.
