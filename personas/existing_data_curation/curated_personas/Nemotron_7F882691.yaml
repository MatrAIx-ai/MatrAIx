    ''Critical analysis of media and information'', ''Strategic gameplay (bridge, Sudoku)'']'
  hobbies: '[''Gardening (vegetable and heirloom varieties)'', ''Birdwatching'', ''Reading historical fiction and memoirs'', ''Knitting and textile crafts'', ''Bridge and strategic card games'', ''Volunteering
    at the local library and senior center'', ''Local history tours and archival research'', ''Collecting vintage recipe cards'', ''Gentle yoga'', ''Attending community college lectures on art and science'']'
  career_goals: Although retired from formal employment, Alecia aims to deepen her impact on the Rockville Centre community. She plans to compile a multi‑generational family memoir and contribute a documented
    oral history to the local historical society. She seeks to expand her volunteer role by leading workshops on genealogy, gardening, and traditional crafts at the senior center. Additionally, she aspires
    to maintain her physical health through a gentle yoga program and to complete a senior fitness milestone, aiming to celebrate her 80th birthday with a community garden harvest festival. Alecia also
    hopes to enroll in a continuing‑education class on digital storytelling to share her experiences online.
