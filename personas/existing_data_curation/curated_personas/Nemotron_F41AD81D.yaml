personas:
  professional: Dennis Avery, a 22‑year‑old aspiring logistics coordinator, merges meticulous project‑management expertise, hands‑on automotive know‑how, and conversational Spanish to streamline supply‑chain
    operations for regional distributors while assertively leading volunteer teams at community festivals.
  sports: Dennis Avery plays pickup basketball at the Phoenix‑area recreation center, joins a weekend amateur soccer league affiliated with the Phoenix Rising FC community program, follows the Phoenix Suns
    and Arizona Cardinals, and maintains a disciplined weekly routine that mixes trail cycling with desert hiking.
  arts: Dennis Avery nurtures creative expression by strumming guitar riffs inspired by John Mayer, capturing stark desert vistas in the style of Ansel Adams, and unwinding with narrative‑driven video games
    from CD Projekt Red, while regularly attending local art showcases featuring Southwestern muralists.
  travel: Dennis Avery prefers meticulously planned road trips that blend adventure and culture, having already explored the red rocks of Sedona and the historic border town of Nogales, while dreaming of
    a spring hike through Zion National Park and a summer surf getaway in Baja California.
  culinary: Dennis Avery, an enthusiastic home chef, regularly grills marinated flank steak topped with chipotle‑lime salsa, hand‑rolls corn‑flour tortillas, and experiments with habanero‑infused guacamole,
    balancing bold flavors with a disciplined, recipe‑focused approach.
  core: Dennis Avery, a hyper‑organized 22‑year‑old who thrives on community projects and late‑night guitar jams, secretly hoards half‑finished salsa jars for midnight snacking and occasionally forgets
    to book dentist appointments amid their busy schedule.
background:
  cultural: Dennis is a white American raised in Mesquite, New Mexico, a small community in Dona Ana County near the U.S.–Mexico border. His family’s roots trace back to the agricultural and ranching traditions
    of the Southwest, fostering a strong sense of self‑reliance and respect for the land. While his heritage is primarily Anglo‑American, the vibrant Hispanic culture of the region has influenced his daily
    life—he’s familiar with Spanish phrases, enjoys regional Mexican foods, and participates in local festivals that blend both traditions. This bicultural environment has shaped his pragmatic outlook,
    community‑centric values, and openness to diverse perspectives.
attributes:
  skills: '[''Event planning and coordination'',''Project management basics'',''Team leadership and collaboration'',''Basic computer literacy (Microsoft Office, email, social media)'',''Customer service
