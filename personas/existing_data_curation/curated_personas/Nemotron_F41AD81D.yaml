  hobbies: '[''Basketball'',''Pickup soccer'',''Desert hiking and camping'',''Landscape photography'',''Cooking southwestern cuisine'',''Volunteering at community events'',''Playing guitar'',''Video gaming'',''Cycling'']'
  career_goals: Dennis aims to secure a stable career that leverages his organizational talent and hands‑on skills. He plans to enroll in a community college to earn an associate degree in business administration,
    with the goal of becoming a logistics coordinator for a regional distribution company or a supply‑chain manager for a local agricultural business. Simultaneously, he is considering a short‑term enlistment
    in the National Guard to gain leadership experience and broaden his technical training. Long‑term, he hopes to start his own small‑scale service business—perhaps a mobile auto‑repair service or a community
    event‑planning firm—where he can set high standards for quality and community impact.
