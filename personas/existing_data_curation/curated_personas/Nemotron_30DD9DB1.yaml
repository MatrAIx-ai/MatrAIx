personas:
  professional: Henry Frazier, a seasoned commercial cleaning specialist with three decades of hands‑on expertise in floor care, OSHA‑certified chemical safety, and on‑site repairs, channels his practical
    curiosity and relaxed, flexible approach into streamlining facility operations while competitively mentoring new hires for efficiency.
  sports: Henry Frazier, a regular in their local community basketball league and an avid fan of the Houston Rockets and Astros, blends seasonal pickup games with early‑morning fishing trips on Galveston
    Bay, preferring low‑impact workouts like gardening and light weightlifting to stay fit without sacrificing their love for the outdoors.
  arts: Henry Frazier, who fills their garage workshop with the smooth grooves of Marvin Gaye, Al Green, and Aretha Franklin while leading the church choir, finds artistic solace in singing harmonies and
    collecting vintage soul vinyls that shape their relaxed yet disciplined weekend routine.
  travel: Henry Frazier, who prefers low‑key road trips that mix family visits with solo retreats, has explored the Gulf Coast towns of Galveston, New Orleans, and the Hill Country wineries of Fredericksburg,
    and dreams of a leisurely cruise through the Mediterranean’s historic ports once their eco‑cleaning venture stabilizes.
  culinary: Henry Frazier, a self‑taught grill master, regularly seasons Texas‑style brisket with a homemade rub of smoked paprika, brown sugar, and cumin, complements it with herb‑infused tomato salsa
    and slow‑cooked okra, and experiments with regional sauces ranging from East Texas mustard to Central Texas peppery blends.
  core: Henry Frazier blends practical curiosity with a relaxed, competitive streak, juggling solo garden mornings, vintage R&B sessions, and DIY truck upgrades while methodically plotting a greener future
    for their cleaning career.
background:
  cultural: Henry grew up in Sweeny, a tight‑knit town in Brazoria County where the African‑American community is anchored by church, family gatherings, and shared traditions. His grandparents migrated
    from the Mississippi Delta during the Great Migration, bringing with them a rich heritage of Southern cooking, gospel music, and a resilient work ethic that shaped Henry’s values. The local church has
    been a cornerstone of his life, reinforcing a sense of communal responsibility and offering a venue for music, mentorship, and celebration. Henry’s cultural identity is reflected in his love for soul
    music, barbecue, and the seasonal festivals that blend Texan and African‑American customs, while his pragmatic outlook and competitive spirit echo the broader narrative of perseverance within his community.
attributes:
  skills: '["Industrial cleaning", "Floor care and stripping", "Chemical safety (OSHA)", "Minor repairs (plumbing and electrical)", "Inventory management", "Shift scheduling", "Team training", "Green cleaning
    methods", "Customer service", "Basic computer operation (facility management software)"]'
  hobbies: '["Listening to classic R&B/Soul", "Grilling and barbecue cooking", "Gardening (vegetables and herbs)", "Fishing on Galveston Bay", "Attending church events and choir", "Watching classic sports
    (football, baseball)", "DIY home improvement projects", "Reading cleaning technology podcasts"]'
  career_goals: Looking ahead, Henry aims to move into a supervisory or facilities‑manager role within his current company, leveraging his on‑the‑ground expertise to oversee multiple buildings. He plans
    to earn a Certified Facility Manager (CFM) credential and complete a Green Cleaning Certification to formalize his interest in sustainable practices. Simultaneously, he nurtures a long‑term ambition
    to start a small, family‑run cleaning service that offers eco‑friendly options to local businesses and churches. Henry also hopes to mentor younger workers, especially from his community, and be recognized
    for his contributions to workplace safety and efficiency.
