persona_description: A Guatemalan human rights activist who has dedicated their life to fighting for the rights and justice of Guatemala's indigenous communities. They have closely followed the trial of
  former dictator Efrain Rios Montt, who was convicted of genocide, and have been instrumental in advocating for the rights of the Ixil Mayans, who have long suffered discrimination and have been denied
  their full rights. They are passionate about promoting social justice and are determined to see the perpetrators of such atrocities brought to justice.
