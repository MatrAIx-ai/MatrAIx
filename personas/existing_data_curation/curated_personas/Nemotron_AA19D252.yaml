personas:
  professional: Beverly Obeidat, a veteran elementary and middle school teacher with over three decades of classroom experience, blends curiosity-driven inquiry with pragmatic lesson design, excels at inclusive
    curriculum development and SEL facilitation, and leverages educational technology to craft student‑centered learning while they navigate a relaxed, sometimes disorganized workflow that values flexibility
    over rigid schedules.
  sports: Beverly Obeidat enjoys low‑impact fitness like gentle yoga and regular walks through Prospect Park, follows the Brooklyn Nets and New York Yankees on television, participates in a neighborhood
    walking club that meets on Saturday mornings, and they occasionally join a casual community softball league for fun rather than competition.
  arts: Beverly Obeidat, a devoted fan of Brooklyn’s cultural pulse, regularly attends folk concerts featuring artists like Gillian Welch and the Brooklyn Folk Collective, visits the Brooklyn Museum and
    MoMA for inspiration, volunteers for library story‑time where they read works by Hilary Mantel, and captures urban wildlife with a camera, often sharing photos of seasonal park scenes on local social
    media groups.
  travel: Beverly Obeidat favors relaxed, curiosity‑driven travel – weekend train rides to the Hudson Valley’s historic wineries, day trips to the Hamptons for beach walks, a memorable summer exploring
    the ancient streets and Mediterranean cuisine of Athens, and a future wish to visit the historic city of Dubrovnik, and they always plan loosely to leave room for spontaneous discoveries.
  culinary: Beverly Obeidat delights in Mediterranean‑style cooking, frequently preparing dishes such as shakshuka with fresh tomatoes, feta, and za’atar, lemon‑herb grilled fish, and homemade baklava topped
    with pistachios, experimenting with olive oil, preserved lemons, and local herbs, while they occasionally over‑season or forget to label leftovers, which leads to playful kitchen mishaps shared with
    friends.
  core: Beverly Obeidat is a warm, curiosity‑driven educator who balances a flexible, sometimes scatter‑brained lifestyle with a deep commitment to community, culture, and lifelong learning, and they inspire
    those around them with a gentle, inclusive spirit.
background:
  cultural: Beverly identifies as a white American who grew up in the Northeastern United States and has lived in Brooklyn for the past two decades. Immersed in the borough's multicultural tapestry, she
    has developed a deep appreciation for diverse cultural traditions, languages, and cuisines. While her family heritage includes European roots, the Obeidat surname reflects a lineage that connects her
    to Middle-Eastern ancestry, adding a nuanced awareness of cross-cultural perspectives. This blend of personal heritage and urban exposure informs her inclusive teaching philosophy and community involvement,
    emphasizing respect, empathy, and shared learning across cultural boundaries.
