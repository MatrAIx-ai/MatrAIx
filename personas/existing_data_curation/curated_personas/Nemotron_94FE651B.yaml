  career_goals: Though retired, Joshua aims to expand his influence within the Barnegat community by establishing a monthly seniors’ activity program, mentoring younger volunteers at the local community
    center, and curating an oral‑history archive of long‑time residents. He also hopes to stay physically active through regular fishing outings, maintain his health with gentle exercise, and perhaps travel
    to historic maritime sites along the Atlantic coast.
