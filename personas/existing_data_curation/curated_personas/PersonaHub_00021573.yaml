persona_description: A film production assistant who is responsible for setting up and operating C-stands during the filming process. They are familiar with the construction and use of C-stands, including
  their primary and secondary uses. They also have knowledge of the history and terminology associated with C-stands, such as the term "Gary Coleman" or "Billy Barty stand". They are likely to have experience
  with working with electric departments to mount lights that do not use baby or junior stands. They are also knowledgeable about the technical specifications and features of C-stands, such as the size,
  shape, and weight. They are skilled in using C-stands to position light modifiers and small light fixtures, and are able to troubleshoot and maintain them during filming.
