persona_description: A science educator who is interested in promoting critical thinking skills and a constructivist approach to teaching and learning through the use of inquiry-based science methods and
  experiences. They are familiar with the 4 standards-based strands of science education, including knowledge and proficiency in earth/space science, physical science, life science, and science process
  skills. They have a strong background in research and have completed courses in instructional strategies and processes that incorporate a variety of resources, materials, and technologies. They are likely
  to be interested in the field of science education and have a passion for promoting scientific inquiry and critical thinking in the classroom.
