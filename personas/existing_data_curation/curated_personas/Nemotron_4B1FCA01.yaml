personas:
  professional: Roberto Nieves is an aspiring junior engineer who channels a love for detailed LEGO robotics into both faithful recreations of complex kits and original modifications, meticulously documenting
    each step in a journal, and volunteers to teach basic building skills at the community center, reflecting a disciplined, structured approach and a compassionate drive to help peers succeed, and they
    relish every moment of sharing knowledge.
  sports: Roberto Nieves participates in youth baseball with the Slidell Tigers, swims twice a week at the community pool, and follows the New Orleans Saints and New Orleans Pelicans, approaching fitness
    with a structured schedule that balances practice, conditioning, and academic responsibilities, and they view each training session as a chance to improve discipline and teamwork.
  arts: Roberto Nieves nurtures artistic expression by practicing piano on weekends, listening to the salsa rhythms of Marc Anthony, the reggaeton beats of Bad Bunny, and the jazz brass of Trombone Shorty,
    while creating animated stories in Scratch inspired by mystery novels, illustrating an integrated love of music, storytelling, and visual art, and they often share their Scratch animations with classmates.
  travel: Roberto Nieves enjoys planning family trips that blend cultural immersion and adventure, having visited San Juan to celebrate Noche de San Juan with relatives, explored the historic French Quarter
    of New Orleans, and now dreams of a future road trip to the Kennedy Space Center, all while balancing a modest travel budget sourced from saved allowance and community fundraisers, and they keep a scrapbook
    of photos to reminisce about each journey.
  culinary: Roberto Nieves delights in cooking traditional dishes such as mofongo, arroz con gandules, and pasteles alongside their mother, expertly seasoning with sofrito and adobo, while also experimenting
    with homemade plantain chips and sharing their culinary creations with friends during weekend study groups, and they love to hear compliments on the aroma of sofrito filling the kitchen.
  core: Roberto Nieves is a meticulous, 12‑year‑old problem‑solver who balances disciplined LEGO engineering, careful allowance budgeting, proactive health management, and a deep love for music and family
    cooking, all while quietly striving to help others and perfect every project, and they remain ever curious about the world beyond their neighborhood.
background:
  cultural: Roberto is a second‑generation Puerto Rican‑American. His parents emigrated from San Juan to Slidell, Louisiana, bringing with them the Spanish language, vibrant music, and a strong sense of
    family. At home, Spanish is spoken daily, and traditional celebrations—such as Noche de San Juan and Puerto Rican Day parades—are observed alongside local Louisiana festivals. He enjoys dishes like
    mofongo and pasteles, prepared during family gatherings, and appreciates the rhythmic blend of Caribbean salsa with the Gulf Coast's blues and jazz influences. Raised in a predominantly Catholic environment,
    he attends a local parish that fosters community service. This bicultural upbringing instills in Roberto a respect for his island roots while encouraging him to engage actively with the diverse community
    of Slidell.
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Mathematics problem solving'', ''Reading comprehension'', ''Basic Scratch programming'', ''Bilingual communication (English/Spanish)'', ''Peer
