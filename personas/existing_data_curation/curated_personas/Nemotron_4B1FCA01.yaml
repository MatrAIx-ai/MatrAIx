  hobbies: '[''LEGO building'', ''Scratch programming'', ''Reading mystery and science books'', ''Playing piano'', ''Cooking Puerto Rican dishes with family'', ''Sketching'', ''Journaling'', ''Volunteering
    at community center'']'
  career_goals: Roberto aspires to maintain his high academic standards and earn a scholarship to a university where he can study civil engineering. He is motivated by the idea of designing resilient infrastructure
    that can protect his coastal community in Slidell from hurricanes and flooding. In parallel, he hopes to stay connected to his compassionate side by mentoring younger students and possibly working with
    nonprofit organizations that focus on disaster preparedness and community rebuilding. Ultimately, he aims to combine technical expertise with a service‑oriented career that benefits both his local neighborhood
    and broader society.
