personas:
  professional: An aspiring set designer and digital illustrator named Jennifer Honeycutt leverages her meticulous organization and love for art to meticulously plan school drama productions, turning sketches
    into detailed set mock‑ups while balancing collaborative teamwork with periods of focused solitude.
  sports: A dedicated swimmer named Jennifer Honeycutt spends weekends at the Boca Raton community pool training for the junior swim team, cheers on the Miami Dolphins during football season, follows the
    Miami Heat and Florida Panthers, and balances her love for water exercise with occasional participation in school track meets, though they sometimes skip cardio sessions when overwhelmed by drama club
    duties.
  arts: An enthusiastic art aficionado named Jennifer Honeycutt regularly visits the Boca Raton Museum of Art, draws inspiration from Monet and contemporary digital illustrator Loish, composes piano pieces
    in the style of Debussy, reads fantasy series like 'The Stormlight Archive', and contributes to school drama club set design, often quoting Lin‑Manuel Miranda for creative flair.
  travel: A curious traveler named Jennifer Honeycutt enjoys annual family trips to the Florida Keys, dreams of a spring visit to Kyoto’s cherry blossom festivals, longs to explore the Louvre in Paris,
    and meticulously plans weekend beach outings using a printable travel journal, though they sometimes procrastinate on packing due to school assignments.
  culinary: A budding foodie named Jennifer Honeycutt loves grilled grouper tacos with mango salsa, makes strawberry‑banana smoothies, experiments with homemade pizza topped with fresh basil, and occasionally
    indulges in triple‑layer chocolate cake after a successful drama production, though they often forget to eat breakfast before school.
  core: Jennifer Honeycutt blends disciplined organization with a vivid imagination, juggling sketchbooks, piano practice, and swim laps while secretly hoarding neon‑colored highlighters for late‑night
    study sessions.
background:
  cultural: Jennifer was raised in a middle-class white family in Boca Raton, Florida. Her upbringing blends suburban coastal life with exposure to a diverse, culturally rich community. She attends a public
    middle school where she interacts with peers from various backgrounds, fostering an appreciation for multicultural perspectives. Family traditions emphasize education, community involvement, and seasonal
    trips to the Florida Keys, reinforcing both a grounded Southern lifestyle and an openness to broader cultural experiences.
