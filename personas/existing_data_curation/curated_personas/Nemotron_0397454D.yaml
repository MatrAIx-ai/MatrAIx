  career_goals: Jennifer aims to attend a top university where she can study art history and museum studies, with the long-term goal of becoming a curator or education coordinator at a museum. She is also
    interested in combining technology with art, envisioning a future in user experience design for cultural institutions. She is committed to maintaining high academic standards and hopes to earn scholarships
    that will support her further education.
