persona_description: A child welfare worker or a mental health professional who is dedicated to the well-being of children and is interested in understanding the effects of posttraumatic stress disorder
  (PTSD) on children who have experienced trauma. They are aware of the potential consequences of PTSD on children's physical and emotional health, academic performance, and future economic self-sufficiency.
  They are also familiar with the evidence-based treatments and prevention strategies for PTSD, and are prepared to recognize and respond to the signs of PTSD in children who are involved in the child welfare
  system. They are interested in learning more about the causes and effects of trauma, as well as the impact of trauma on child welfare agencies and professionals who work with traumatized children. They
  are committed to improving collaboration between the child welfare and mental health systems and are eager to contribute to the field of child welfare by promoting the well-being of children who have
  experienced trauma.
