  hobbies: '[''Gardening'', ''Cooking Southern cuisine'', ''Baking pies'', ''Reading historical fiction'', ''Crossword puzzles'', ''Quilting'', ''Yoga'', ''Volunteer work at church food bank'', ''Career
    counseling for teens'']'
  career_goals: Her primary ambition is to advance to an HR Director or Vice President of People role within a mid‑size organization, where she can shape long‑term talent strategy while preserving a stable,
    supportive culture. She aims to earn the SHRM‑SCP certification, lead a company‑wide initiative to embed mental‑health resources and stress‑reduction programs, and develop a data‑driven talent pipeline
    that aligns with the organization’s growth plans. Additionally, she hopes to mentor emerging HR professionals and eventually transition to a consulting role that helps other Southern businesses build
    efficient, people‑focused HR systems.
