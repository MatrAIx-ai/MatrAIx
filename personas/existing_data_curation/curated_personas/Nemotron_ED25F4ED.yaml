personas:
  professional: Maria Hernandez, a seasoned K‑12 educator with expertise in bilingual curriculum design, digital classroom platforms, and culturally responsive teaching, leverages their methodical organization
    and curiosity for art to craft interdisciplinary STEAM lessons that engage students while consistently meeting data‑driven performance goals.
  sports: Maria Hernandez enjoys weekend hikes on the Santa Monica foothills with a close‑knit group of friends, practices yoga three times weekly at a local studio, supports the Los Angeles Lakers and
    LA Galaxy, and participates in a community adult climbing club that meets on Saturday evenings.
  arts: Maria Hernandez immerses themselves in the arts by painting acrylics, curating a personal collection featuring contemporary artists such as Gabriel Orozco, Teresa Margolles, and works reminiscent
    of Frida Kahlo and Diego Rivera, frequenting galleries that showcase such pieces, and reading literary fiction from authors like Jorge Luis Borges and Isabel Allende to fuel reflective journal entries.
  travel: Maria Hernandez plans trips meticulously, favoring culturally rich destinations like Oaxaca, Mexico, where they explore traditional markets and art studios, as well as international cities such
    as Barcelona and Kyoto for their architecture and culinary scenes, while balancing travel costs with a modest savings plan.
  culinary: Maria Hernandez, an adept home cook, experiments with traditional family recipes such as mole poblano, chiles en nogada, and homemade tamales, relishes the earthy flavors of roasted chilies,
    corn masa, and cacao, and often pairs cooking sessions with listening to regional folk music to enhance the sensory experience.
  core: Maria Hernandez combines a meticulous, data‑driven teaching style with a vibrant appetite for art, yoga, and community involvement, often juggling organized lesson plans while secretly hoarding
    a stash of vintage paint tubes.
background:
  cultural: Maria identifies as Mexican‑American, growing up in a bilingual household where Spanish was spoken daily and cultural traditions such as Día de los Muertos, quinceañeras, and Mariachi music
    were central to family life. Living in Lakewood, a city with a vibrant Latino community, she participates in local cultural festivals and volunteers with organizations that support Mexican heritage
    youth. Her teaching philosophy is shaped by concepts of familismo and respeto, emphasizing community involvement, collective success, and the incorporation of Mexican cultural narratives into the curriculum.
    She maintains strong ties with relatives in the state of Jalisco, Mexico, and frequently travels to visit them, bringing back stories and recipes that enrich her classroom and personal life.
attributes:
  skills: '[''Curriculum development'', ''Bilingual (Spanish‑English) instruction'', ''Differentiated instruction'', ''Classroom management'', ''Data‑driven assessment'', ''Arts integration (STEAM)'', ''Educational
    technology (Google Classroom, Canvas)'', ''Professional development facilitation'', ''Family‑school communication'', ''Collaborative team leadership'']'
  hobbies: '[''Acrylic painting'', ''Visiting art galleries'', ''Reading Latin American literature'', ''Creative writing/journaling'', ''Yoga and mindfulness'', ''Hiking in small groups'', ''Traditional
    Mexican cooking'', ''Volunteering at youth art workshops'', ''Online learning (philosophy, photography)'']'
  career_goals: Maria aspires to transition from classroom teaching to a district‑level instructional coordinator role where she can design and implement culturally responsive curricula across multiple
    schools. She plans to earn a Master’s in Educational Leadership within the next three years, pursue certification as a Reading Specialist, and eventually become a School Principal focused on equity
    and community engagement. Her long‑term ambition is to launch a bilingual STEAM enrichment program that serves under‑represented students in the Los Angeles County area.
