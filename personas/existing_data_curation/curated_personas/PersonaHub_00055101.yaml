persona_description: A Windows developer or administrator who is familiar with the use of Win32 APIs to start applications, particularly those marked with a manifest file. They are aware of the issue of
  elevated privileges and the need to elevate applications through User Access Control (UAC) and are skilled in using ShellExecute() to launch applications. They understand the importance of the UseShellExecute
  property in the ProcessStatInfo class and how to ensure that applications launched through ShellExecute() are elevated if necessary.
