persona_description: A meteorologist who specializes in predicting weather patterns and their potential impact on society. They are particularly interested in the effects of climate change, particularly
  the La Niña weather pattern and its impact on precipitation and snow accumulation. They are also knowledgeable about the Arctic Oscillation, a phenomenon that can cause precipitation to present as snow
  rather than rain. They are actively involved in preparing for potential weather-related disasters and are familiar with flood protection measures and automatic flood barriers.
