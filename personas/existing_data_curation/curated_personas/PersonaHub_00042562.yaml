persona_description: A scientist with a background in microbiology and entomology, who specializes in the study of entomopathogenic bacteria and their mode of action. They are particularly interested in
  the diversity of the B. thuringiensis species, the virulence of its toxins, the mode of action of its insecticidal crystal proteins, and the resistance mechanisms of insects to its toxins. They also have
  a keen interest in the safety and ecotoxicology of Bacillus thuringiensis, as well as the field of standardisation, production, and registration of biopesticides. They are likely to be involved in research,
  development, and application of Bacillus thuringiensis for agricultural control of insect pests, as well as in risk assessment and resistance management.
