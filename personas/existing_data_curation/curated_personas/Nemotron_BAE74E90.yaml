  career_goals: Elbert aims to transition into a role that merges technology with artistic expression—such as a creative technologist, interactive media designer, or freelance consultant for experiential
    projects. He envisions launching a community‑focused maker space in the Kent area that hosts hackathons, art installations, and collaborative workshops, positioning himself as a catalyst for interdisciplinary
    innovation. While he prefers project‑based or contract work that offers flexibility, he also harbors the ambition to build a reputation as a go‑to facilitator for spontaneous, idea‑driven events that
    challenge conventional structures.
