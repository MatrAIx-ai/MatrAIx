personas:
  professional: Angel Slicer, a retired community organizer, leverages their practical curiosity and competitive drive to coordinate weekly bird‑watching walks, senior wellness programs, and a growing mentorship
    initiative, all while delivering confident public speeches at council meetings and managing digital newsletters with ease.
  sports: Angel Slicer enjoys low‑impact yoga at the Lake Lure Senior Yoga Club, leisurely fishing on the lake, and follows the Charlotte Hornets and Carolina Panthers, while also playing competitive bridge
    at the senior center and cheering on the local high‑school baseball team, the Lake Lure Warriors.
  arts: Angel Slicer finds creative fulfillment quilting with the local circle, singing in the church choir, reading historical fiction by Philippa Gregory, and capturing sunrise photos inspired by Ansel
    Adams, while their playlists often feature Dolly Parton and classical guitarist Julian Bream.
  travel: Angel Slicer prefers well‑planned road trips that balance historic exploration with comfortable pacing, having already visited the Blue Ridge Parkway, the Biltmore Estate in Asheville, and Savannah’s
    historic district, and dreams of a leisurely pilgrimage to the Appalachian Trail’s historic towns such as Boone and Blowing Rock, using senior discounts and a modest travel fund.
  culinary: Angel Slicer delights in Southern cooking, regularly preparing shrimp and grits, fried green tomatoes, and collard greens seasoned with smoked turkey, while experimenting with herb blends of
    thyme, rosemary, and sage from their garden, and preserving family recipes in homemade canned sauces and pickles.
  core: Angel Slicer blends a competitive curiosity with practical community service, thriving on group activities, meticulous budgeting, and a love for gardening, yet occasionally forgets medication and
    splurges on quilting supplies.
background:
  cultural: Angel Mary was raised in the foothills of western North Carolina within a white, middle‑class Southern family. Her upbringing emphasized Southern hospitality, church involvement, and a deep
    reverence for the natural environment of the Appalachian region. She grew up on family gatherings featuring traditional Southern cuisine, folk music such as bluegrass, and storytelling that celebrated
    local history. These cultural roots shape her values of community service, self‑reliance, and appreciation for both tradition and modest innovation.
