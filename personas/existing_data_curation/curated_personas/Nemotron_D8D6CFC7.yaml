  hobbies: '[''Bird‑watching walks'', ''Quilting circles'', ''Competitive bridge'', ''Senior yoga classes'', ''Reading historical fiction'', ''Herb gardening'', ''Church choir participation'', ''Library
    storytelling volunteer'', ''Fishing on Lake Lure'', ''Digital photography of landscapes'']'
  career_goals: Although retired, Angel Mary aims to keep her community involvement vibrant. She plans to launch a mentorship program that pairs seniors with youth volunteers, write and self‑publish a memoir
    intertwined with a family cookbook, master digital photography to create a visual archive of Lake Lure’s seasonal changes, and advocate for sustainable gardening practices at the local garden club.
    Additionally, she hopes to stay physically active to travel to historic sites in the Appalachian region.
