  career_goals: Robert aims to advance from a first‑line supervisor to store manager within the next two years and eventually become a district or regional manager overseeing multiple locations. He wants
    to integrate his artistic sensibility into retail spaces, creating immersive shopping experiences that reflect diverse cultural expressions. Passionate about equity, he hopes to launch a mentorship
    program for young Black retail associates and later pursue an MBA to deepen his business acumen. In the longer term, he envisions opening a community‑focused boutique that doubles as an art gallery
    and a space for local workshops, merging his love for commerce, art, and community empowerment.
