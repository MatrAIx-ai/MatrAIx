persona_description: A political analyst with expertise in comparative politics and comparative government studies. This individual is interested in understanding the dynamics and strategies of political
  actors, particularly in the context of democratic transitions and consolidations. They are particularly interested in the role of elites' consensus on the rules of the game in shaping the political landscape
  and the likelihood of democratic reforms being overturned. They are also interested in the impact of external regimes on democratic transitions and the potential for authoritarian regimes to undo democratic
  reforms.
