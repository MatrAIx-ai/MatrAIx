persona_description: 'A researcher who specializes in the study of environmental data collected from sites in the northern foothills of Alaska''s Brooks Range, particularly in the field of tundra plant
  communities and productivity. They are interested in monitoring and predicting biotic responses to climatic change and have been involved in the NSF LTER project since 1975. They have collected diverse
  environmental data, including climate, tundra plant communities, soils, thaw depth, stream flow, chemistry, and temperature of streams and lakes, as well as lake productivity and nutrient cycling. Their
  data collection was supported by NSF LTER award #9810222.'
