  career_goals: James envisions a future that merges his passion for sports with his knack for mechanics. In the short term, he aims to graduate high school with solid grades, earn a spot on the varsity
    soccer team, and take a vocational course in automotive technology. He also plans to join the school’s coding club to deepen his programming skills. Long‑term, he dreams of earning a college scholarship
    to play soccer at the collegiate level and possibly pursuing a professional athletic career. Parallel to that, he hopes to study mechanical engineering or attend a technical institute for automotive
    technology, with the goal of designing innovative sports equipment such as high‑performance skateboards or advanced soccer cleats. He aspires to become a leader who can combine competitive drive with
    practical engineering to create better gear for athletes.
