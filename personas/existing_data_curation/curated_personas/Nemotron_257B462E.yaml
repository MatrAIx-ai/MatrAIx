personas:
  professional: James Dixon is an aspiring team strategist and budding mechanical tinkerer who channels his competitive, skeptical mindset into leading soccer scrimmages, esports squads, and debate arguments,
    demonstrating early problem‑solving skills and a penchant for structuring tactics despite occasional spontaneous lapses.
  sports: James Dixon is a dedicated midfielder for the Vero Beach Youth Soccer Club who also joins weekend beach‑volleyball matches at the Vero Beach boardwalk, swims laps at the shoreline, and follows
    the Orlando City SC and Miami Dolphins, often organizing pick‑up games and keeping a personal log of performance stats.
  arts: James Dixon is a creative LEGO Technic enthusiast who regularly constructs moving mechanical models, customizes skateboards with graffiti‑style art, streams the LEGO Masters series for inspiration,
    and curates playlists featuring Imagine Dragons, Billie Eilish, and K/DA while sketching design concepts during downtime.
  travel: James Dixon prefers spontaneous weekend getaways to nearby beaches like Key West and theme parks such as Disney World, dreams of attending an eSports tournament in Los Angeles, and frequently
    plans low‑budget road trips with friends, balancing school obligations with a love for short, adventure‑focused trips.
  culinary: James Dixon enjoys pepperoni pizza, chicken quesadillas, and occasional sushi rolls, can whip up a quick spaghetti carbonara or microwave a protein‑packed snack, favors energy drinks and strawberry‑banana
    smoothies, and often experiments with customizing toppings while still relying on fast‑food staples for convenience.
  core: James Dixon blends a competitive, tactical mindset with a love for hands‑on tinkering, often juggling soccer captain duties, esports leadership, and LEGO creations while occasionally forgetting
    homework in favor of spontaneous gaming marathons.
background:
  cultural: James grew up in a middle‑class white family in Vero Beach, a coastal community in Indian River County, Florida. His upbringing blends typical suburban American values with the relaxed beach
    culture of the Gulf Coast. Family traditions include summer trips to the Atlantic shoreline, Fourth of July parades, and strong support for local high‑school sports. He attends a public middle school
    where national pop culture, sports, and technology shape his peer group. The community’s emphasis on outdoor recreation and tourism has fostered his interest in swimming, beach activities, and bike
    riding. While his family maintains a mainstream U.S. cultural perspective, they also value self‑reliance and practical skills, encouraging James’s hands‑on projects and competitive spirit.
