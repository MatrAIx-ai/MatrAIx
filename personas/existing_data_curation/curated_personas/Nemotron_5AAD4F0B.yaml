  hobbies: '[''Gardening (vegetables, flowers, native plants)'', ''Cooking and recipe experimentation'', ''Reading historical fiction and biographies'', ''Birdwatching'', ''Visiting farmers markets'', ''Community
    theater attendance'', ''Knitting and fiber arts'', ''Genealogy research'', ''Puzzle solving (crosswords, jigsaws)'']'
  career_goals: Ruth aims to channel her practical knowledge and curiosity into meaningful community contributions during her retirement years. She plans to lead a neighborhood garden initiative that provides
    fresh produce and educational workshops, volunteer as a docent at the nearby historic museum, and eventually launch a small home‑based catering service that showcases her fusion recipes. She also hopes
    to complete a series of online courses on local history and sustainable living, positioning herself as a resource for both seniors and youth in Henrico County.
