personas:
  professional: Georgina Dominguez, a teaching assistant aspiring to become a full‑time lecturer and curriculum specialist, leverages bilingual fluency, Adobe Creative Suite mastery, and their compassionate,
    collaborative nature to embed visual and performing arts into humanities curricula while mentoring a diverse student body.
  sports: Georgina Dominguez, an avid hiker of coastal nature preserves and regular attendee of community yoga sessions, supports the Providence Bruins and the New England Patriots, and occasionally joins
    a local salsa‑dance fitness club that doubles as a low‑impact cardio workout.
  arts: Georgina Dominguez, a mixed‑media painter inspired by the vibrant palettes of Caribbean folklore, frequently visits the RISD Museum, collects works by Frida Kahlo and Wifredo Lam, enjoys live performances
    of Celia Cruz tributes, and draws creative energy from the storytelling of author Isabel Allende.
  travel: Georgina Dominguez, who prefers meticulously planned weekend getaways blending cultural immersion with relaxation, often retreats to the historic streets of Cartagena for its Caribbean vibe, dreams
    of exploring the artistic neighborhoods of Seville, and balances these trips with affordable day trips to the Newport coastal town and nearby hiking spots in the White Mountains.
  culinary: Georgina Dominguez, a confident home chef, delights in preparing sancocho with root vegetables, creamy mangú laced with sautéed onions, and pastelitos stuffed with seasoned ground beef, while
    also savoring fresh avocado, cilantro, and plantain‑based dishes at local bistros, frequently experimenting with adobo and sofrito sauces.
  core: Georgina Dominguez balances a vibrant artistic heart with a meticulous planner's mind, thriving on salsa rhythms and community mentorship, yet occasionally succumbs to late‑night online art shopping
    sprees that dent their budget.
background:
  cultural: Georgina was raised in a close‑knit Dominican household in Providence, where Spanish was spoken daily and family traditions—such as celebrating Carnaval, sharing festive meals, and listening
    to merengue and bachata—shaped her worldview. Her parents emigrated from the Dominican Republic in the 1980s, instilling a strong sense of cultural pride and a commitment to community service. She actively
    participates in local Dominican cultural organizations, volunteering at events that promote Caribbean arts and education. This bicultural experience blends Caribbean vibrancy with New England's academic
    environment, influencing both her personal interests and professional approach to inclusive, arts‑rich pedagogy.
attributes:
  skills: '["Academic support and tutoring", "Bilingual instruction (Spanish/English)", "Arts integration in humanities", "Curriculum development assistance", "Classroom management", "Student mentorship
    and counseling", "Conflict mediation", "Learning management systems (Canvas, Blackboard)", "Digital content creation (Adobe Creative Suite, video editing)", "Event planning and community outreach"]'
  hobbies: '["Painting and mixed‑media art", "Salsa and bachata dancing", "Cooking Dominican cuisine", "Visiting art galleries and museums", "Attending theater and live music events", "Reading Latin American
    literature", "Community dance workshops", "Hiking and nature walks", "Yoga and mindfulness practice"]'
  career_goals: Georgina aims to transition from a teaching assistant to a full‑time lecturer or curriculum specialist focusing on arts‑based pedagogy within higher education. She plans to pursue a master's
    degree in Education with an emphasis on multicultural and arts education, and eventually obtain a doctoral credential to conduct research on culturally responsive teaching practices. Long‑term, she
    hopes to design community outreach programs that bring Dominican cultural heritage into Providence schools, and to serve as a bridge between academic institutions and the local Dominican diaspora, fostering
    artistic collaborations and scholarship opportunities.
