  hobbies: '[''Watercolor painting'', ''Art gallery visits and community curation'', ''Landscape photography'', ''Woodworking'', ''Reading (history, philosophy, science)'', ''Hiking and birdwatching'',
    ''Gardening (vegetable garden)'', ''Book club participation'', ''Chess'']'
  career_goals: Even at 72, Dean aims to transition from full‑time managing to part‑time consulting, offering strategic advice to small businesses in Crook County. He aspires to mentor emerging leaders,
    leveraging his organized, high‑standard ethos to shape the next generation. Dean also seeks to leave a lasting cultural legacy by establishing a local arts program that blends business acumen with artistic
    appreciation. Publishing a memoir that intertwines his management insights with reflections on art, nature, and personal resilience is another ambition, as is securing sufficient resources to support
    community projects and ensure his financial independence for philanthropic pursuits.
