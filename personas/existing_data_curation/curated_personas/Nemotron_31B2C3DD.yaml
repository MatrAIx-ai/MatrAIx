  career_goals: Sheila dreams of becoming a teacher because she loves helping friends learn new things, and she is also fascinated by animals, hoping one day to be a veterinarian. She sometimes imagines
    herself as a scientist who discovers new inventions, reflecting her curiosity and practical mindset. Although still young, she talks about wanting to lead a classroom where she can organize activities
    and guide classmates, showing her early ambition for leadership and responsibility.
