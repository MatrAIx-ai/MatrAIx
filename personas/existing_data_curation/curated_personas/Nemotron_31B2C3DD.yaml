personas:
  professional: A budding civil engineer, Sheila Fernandez loves constructing intricate LEGO bridges and drafting them on paper, applying their methodical planning and competitive drive to out‑design classmates'
    creations.
  sports: Sheila Fernandez thrives on the soccer field, joining the Splendora Cubs U‑7 team for weekend scrimmages, cheering for the local minor‑league baseball club, the Splendora Sparrows, and channeling
    their energetic competitiveness into daily tag games at the neighborhood park.
  arts: Sheila Fernandez channels creativity through friendship bracelets, painting bright suns and rockets, and idolizes the whimsical illustrations of Dr. Seuss, the melodic tween pop of Taylor Swift’s
    “Shake It Off,” and the lively circus performances of the local marching band seen at the Fourth of July parade.
  travel: Sheila Fernandez dreams of an adventure road‑trip to the Grand Canyon after their annual visit to Grandma’s house in Austin, loves the excitement of day‑trips to the nearby Splendora Science Museum,
    and hopes one day to ride the Disney World monorail in Florida, balancing a love of organized itineraries with spontaneous playground explorations.
  culinary: Sheila Fernandez prefers crunchy carrot sticks, cheesy macaroni, and homemade peanut butter & jelly sandwiches, enjoys helping their mom stir chocolate chip cookie dough, and can proudly name
    the ingredients—flour, sugar, butter, chocolate chips—in their favorite treats while occasionally sneaking extra grapes when no one’s watching.
  core: Sheila Fernandez is a curious, methodical six‑year‑old who builds LEGO empires, plans allowance budgets, wrestles with allergies, and channels competitive energy into soccer and crafts, all while
    juggling a lingering worry that fuels both precision and occasional over‑thinking.
background:
  cultural: Sheila grows up in Splendora, Texas, a small town in Liberty County where community and family life play a central role. Her household reflects a blend of Southern Texan traditions—such as celebrating
    Thanksgiving with a big family dinner, enjoying backyard barbecues in the summer, and attending local events like the annual town fair and Fourth of July fireworks. Though her family identifies as white,
    they are part of the diverse cultural tapestry of Texas, occasionally sharing stories of heritage that include European roots along with the broader Texan identity. The local school emphasizes both
    academic fundamentals and community values, reinforcing her organized, reliable nature while encouraging her outgoing spirit through group projects and extracurricular activities.
