  hobbies: '[''Woodworking'', ''Reading non‑fiction (personal development, history, technology)'', ''Playing chess'', ''Gardening'', ''Listening to gospel and jazz'', ''Journaling'']'
  career_goals: Almando aims to translate his hands‑on expertise into a certified trade, specifically pursuing an HVAC certification that will open doors to steady, well‑paid work while leveraging his systematic
    problem‑solving style. He plans to enroll in a community college apprenticeship program within the next year, balancing study with his family responsibilities. In the longer term, he hopes to launch
    a modest home‑services business that can provide reliable, high‑quality repairs to his Columbus neighborhood, thereby offering financial stability for his household and a respected role within his community.
    Simultaneously, he seeks to mentor younger residents, sharing his practical knowledge and disciplined work ethic to help break cycles of unemployment.
