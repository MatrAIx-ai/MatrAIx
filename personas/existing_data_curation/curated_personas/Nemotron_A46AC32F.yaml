  career_goals: Samantha aims to advance from her current store manager role to a regional manager position within the next five years, overseeing multiple locations in the Midwest. She also plans to complete
    an associate degree in business administration to broaden her strategic skill set. Long‑term, she envisions opening her own boutique retail space that emphasizes community hiring and mentorship, and
    she hopes to develop a mentorship program for young Black professionals in the retail sector.
