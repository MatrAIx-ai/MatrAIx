personas:
  professional: An automotive body repair specialist, Moises Tercero, blends precise panel replacement, MIG/TIG welding, and expert paint color‑matching with a methodical workflow, leveraging their love
    for structure to streamline shop processes while they foster clear communication with apprentices, customers, and insurance adjusters.
  sports: An avid amateur soccer player, Moises Tercero competes in a suburban Saturday league, roots for the Chicago Fire FC and the Chicago Cubs, and incorporates weekly pick‑up matches and occasional
    basketball sessions with friends to maintain a balanced, group‑focused fitness routine that they treat as both recreation and social bonding.
  arts: A lively enthusiast of rhythmic culture, Moises Tercero fills their playlist with salsa and cumbia hits from artists like Carlos Vives and Grupo 5, attends occasional Chicago Symphony Orchestra
    concerts, and admires the colorful murals of the Pilsen neighborhood, which they cite as inspiration for both personal expression and community pride.
  travel: A purposeful road‑tripper, Moises Tercero plans vacations around automotive events and family traditions, having driven the Pacific Coast Highway to attend the Pebble Beach Concours, returning
    annually for the Inti Raymi celebration in Lima, and now dreaming of exploring Barcelona’s famed automotive museums, which they view as the perfect blend of hobby and cultural immersion.
  culinary: A confident home chef, Moises Tercero expertly prepares classic ceviche with fresh sea bass, lime, aji amarillo, and cilantro, whips up hearty lomo saltado featuring soy sauce and red wine vinegar,
    and pairs meals with a crisp pisco sour, while they regularly experiment with new grill‑ready cuts for community potlucks, delighting friends with bold flavors.
  core: Moises Tercero, a 30‑year‑old automotive technician, balances a meticulous work ethic with a love for communal soccer games, spontaneous car upgrades, and the occasional late‑night snack that leaves
    salsa stains on their workshop apron; they also tend to lose track of time when tinkering with engine mods.
background:
  cultural: Moises grew up in a bilingual household, with parents who emigrated from Peru. He retains strong ties to Peruvian culture, speaking Spanish at home and celebrating holidays such as Inti Raymi
    and Señor de los Milagros. Traditional foods, music, and dance—especially salsa and cumbia—are integral to family gatherings. While embracing the Midwestern work ethic of punctuality and reliability,
    he also values the communal spirit and hospitality common in Peruvian families. He participates in local Peruvian community events in Illinois, fostering connections between his heritage and his American
    surroundings.
attributes:
  skills: '[''Panel replacement'', ''Dent removal'', ''MIG/TIG welding'', ''Automotive painting and color matching'', ''Use of Mitchell estimating software'', ''Safety compliance and OSHA standards'', ''Customer
    service and insurance claim liaison'', ''Team leadership and apprentice training'', ''Basic mechanical diagnostics'', ''Workflow documentation and process optimization'']'
  hobbies: '[''Soccer (local amateur league)'', ''Peruvian cooking and hosting potlucks'', ''Attending car shows and motorsport events'', ''DIY car customization projects'', ''Youth mentorship in automotive
    basics'', ''Hiking in nearby state parks'', ''Playing racing video games'']'
  career_goals: Moises aims to become a certified master technician within the next three years, obtaining ASE Master Body Shop certification and advanced I‑CAR training. He aspires to lead his current
    shop’s operations, implementing standardized procedures that enhance efficiency and quality. In the long term, he plans to open his own body‑shop in the Plano area, focusing on high‑quality repairs
    and custom modifications while mentoring young technicians. He also hopes to become an instructor for a local technical college, sharing his expertise with the next generation of automotive professionals.
