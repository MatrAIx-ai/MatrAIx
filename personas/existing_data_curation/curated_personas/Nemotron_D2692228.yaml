personas:
  professional: Taylor Wingler is an aspiring young robotics enthusiast who blends a curious love for coding and mechanical design with a pragmatic, competition-driven mindset, often leading her school's
    robotics club projects while rigorously meeting deadlines and questioning teammates' ideas to ensure robust solutions.
  sports: Taylor Wingler is a spirited midfielder on the local youth soccer club 'Desert Peaks Juniors', trains twice weekly, idolizes the agility of Lionel Messi and the tactical acumen of Manchester City,
    and enjoys cheering for the Seattle Seahawks during football season while maintaining a competitive edge over peers in after-school scrimmages.
  arts: 'Taylor Wingler channels their love for desert wildlife into stunning macro photography inspired by Ansel Adams, devours sci-fi novels by Becky Chambers and Andy Weir, and occasionally experiments
    with digital illustration of robotic characters while listening to the melodic chiptunes of Daft Punk''s ''Tron: Legacy'' soundtrack for creative inspiration.'
  travel: Taylor Wingler plans weekend hikes to the nearby Red Rock Mountains with a meticulous checklist of supplies, dreams of photographing the sunrise at Monument Valley and the wildlife of Yellowstone,
    and balances the adventure of solo trail runs with family road trips to the Grand Canyon, all while budgeting pocket-money for travel gear and pre-booking campsites during school breaks.
  culinary: Taylor Wingler prefers quick, protein-rich meals like turkey and avocado wraps and homemade pizza topped with pepperoni and pineapple, enjoys experimenting with DIY snack recipes such as chili-lime
    popcorn, and occasionally codes a simple Arduino-controlled stir-fry timer to perfect their favorite spaghetti Bolognese, though they often forget to clean the kitchen afterwards.
  core: Taylor Wingler is a competitively curious 12-year-old who balances a love for soccer, robotics, and wildlife photography with a skeptical, methodical streak, often turning every hobby into a friendly
    rivalry and occasionally neglecting chores in the pursuit of the next challenge.
background:
  cultural: Taylor is a white American raised in Hereford, Arizona, a small rural community in Cochise County near the US‑Mexico border. Her family’s roots are in farming and ranching, giving her a strong
    connection to the land and Southwest outdoor lifestyle. She participates in local traditions like county fairs, high school sports events, and community service projects, while also being exposed to
    regional Hispanic and Native American influences through local festivals and school curricula. Her cultural upbringing blends mainstream American values of independence and community with the distinctive
    desert and ranching heritage of the Southwest.
