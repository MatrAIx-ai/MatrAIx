  career_goals: Taylor aspires to a career that blends her love for science, the outdoors, and technology. She hopes to become a wildlife biologist or environmental engineer, focusing on conservation projects
    that involve community collaboration and practical problem solving. She also imagines one day leading youth STEM outreach programs in her hometown.
