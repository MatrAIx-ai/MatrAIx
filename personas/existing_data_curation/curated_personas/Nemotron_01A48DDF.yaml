  hobbies: '[''Fishing'', ''Birdwatching'', ''Garden vegetable cultivation'', ''Model train building'', ''Puzzle assembly'', ''Reading practical manuals (woodworking, home repair)'', ''Community clean-up
    volunteering'']'
  career_goals: Patrick aims to advance to a lead custodian or facilities supervisor role, obtaining professional certifications such as the ISSA Certified Professional Cleaner and the Certified Facility
    Manager credential. He envisions managing a team of cleaning staff for a municipal building or large commercial property, ensuring high standards of safety and efficiency. In the longer term, he aspires
    to establish a small family-owned cleaning business that offers reliable, environmentally-friendly services to local businesses and residential clients, providing stable income and benefits for his
    family while maintaining the routine and structure he values.
