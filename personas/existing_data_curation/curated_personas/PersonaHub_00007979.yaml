persona_description: A molecular neurophysiologist who specializes in the study of RNA editing and its role in organism adaptation to extreme cold environments. He is particularly interested in the role
  of RNA editing in the survival of octopuses in the Arctic and Antarctic seas. His research interests include the structure and function of potassium channel genes, RNA editing mechanisms, and the evolution
  of ion channels in response to temperature changes. He has published his findings in the scientific journal Science.
