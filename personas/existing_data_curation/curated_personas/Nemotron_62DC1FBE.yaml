personas:
  professional: Ann Pitt, a seasoned facilities supervisor with three decades of hospitality experience, they lead small cleaning crews with a people‑first mindset, integrate green cleaning practices with
    proven efficiency, and are now designing a mentorship onboarding program to leave a legacy of teamwork and eco‑consciousness.
  sports: Ann Pitt follows the Chicago Cubs and the Chicago Bears with quiet enthusiasm, they join the Orland Park Senior Walking Club for gentle strolls, volunteer as a scorekeeper for the local adult
    softball league, and occasionally attend a Chicago Blackhawks game when the schedule permits.
  arts: Ann Pitt finds solace in historical fiction by Philippa Gregory and mysteries by Agatha Christie, they attend occasional productions at the Orland Park Community Theater, and they enjoy listening
    to folk legend Joan Baez and classic recordings of the Chicago Symphony Orchestra.
  travel: Ann Pitt prefers low‑key travel that balances relaxation and curiosity, they have taken weekend road trips to Lake Michigan beaches and historic Willowbrook Farm, explored Savannah’s historic
    district and Versailles gardens on longer vacations, and dream of a quiet tour of England’s Cotswold cottage gardens, all within a modest budget.
  culinary: Ann Pitt loves cooking hearty Midwestern classics such as pot roast with carrots, apple crumble using fresh garden‑picked apples, and rosemary‑infused rye bread, they frequently bake chocolate‑chip
    cookies for charity bake‑sales, and they season simple pasta sauces with home‑grown basil and oregano.
  core: Ann Pitt blends pragmatic work ethic with gentle curiosity, they juggle community volunteerism, garden experiments, occasional forgetfulness about appointments, and a steady devotion to modest,
    eco‑friendly living.
background:
  cultural: Ann grew up in the Chicago suburbs as part of a middle‑class white Midwestern family with German‑American and Irish‑American roots. Her upbringing emphasized modesty, hard work, community involvement,
    and the polite, reliable spirit typical of the Midwest. She celebrates traditional holidays such as Thanksgiving, Christmas, and the Fourth of July with close family gatherings, and she regularly attends
    services at her local Protestant church. Living most of her life in Orland Park, Cook County, she has been shaped by the region’s strong civic pride, support for local sports teams, and participation
    in community events like farmers’ markets and neighborhood clean‑up projects.
