    ''public speaking and facilitation in small groups'', ''writing and journaling'', ''birdwatching and basic nature observation'', ''first‑aid basics'', ''time‑management using flexible planning tools
    (digital calendars, simple checklists)'']'
  hobbies: '[''gardening (heirloom tomatoes, native wildflowers)'', ''reading Southern fiction and local history'', ''knitting scarves and blankets'', ''baking pies and making preserves'', ''birdwatching
    on nature trails'', ''walking Chatham County greenways'', ''volunteering at the Pittsboro library (reading to children)'', ''keeping a nature field journal'', ''participating in a small book club'',
    ''attending community craft fairs'']'
  career_goals: Although currently not employed, Rebecca aims to formalize her horticultural passion by completing her college coursework and obtaining a Master Gardener certification. She envisions launching
    a modest cottage enterprise that sells home‑grown produce, preserves, and handcrafted knit goods at the local farmers’ market. Additionally, she wishes to become a volunteer coordinator for the town’s
    senior center, mentoring younger volunteers and developing intergenerational activity programs. On a personal level, she hopes to finish an associate’s degree in community development, write a memoir
    of small‑town life, and travel to historic sites across the Southeast.
