personas:
  professional: Maria Nieves, a community‑focused organizer and budding culinary entrepreneur, leverages her precise budgeting, event coordination, and bilingual communication skills to bridge generations,
    balancing meticulous planning with a flexible, people‑centred approach.
  sports: Maria Nieves stays active through low‑impact fitness like salsa dancing at the local club and daily walks in the neighborhood park, they also cheer on the Miami Heat basketball team and occasionally
    attend Miami Marlins baseball games with friends.
  arts: Maria Nieves cultivates creativity through crocheting intricate blankets for the senior center, devouring historical novels by Isabel Allende, and immersing themselves in salsa and bolero evenings
    featuring artists such as Marc Anthony, Tito Puente, and Gloria Estefan, which fuels cultural pride and social connections.
  travel: Maria Nieves prefers purposeful travel, planning weekend trips to the Florida Keys to harvest fresh seafood, annual cruises to Caribbean islands, and occasional pilgrimages to historic Spanish
    cities like Seville; they balance modest budgeting with a desire for cultural immersion and family bonding.
  culinary: Maria Nieves is a seasoned home chef, mastering traditional island dishes like arroz con pollo, black bean soup, and yuca frita, while reinventing them with quinoa, citrus‑infused sauces, and
    herbs from their garden, they delight in sharing meals at community potlucks and catering senior neighbors with weekly deliveries.
  core: Maria Nieves blends disciplined budgeting, a love of salsa, and a habit of overwatering herbs into a community‑centric life that balances practicality with creative flair, and they occasionally
    forget to water their plants while juggling volunteer duties.
background:
  cultural: Maria was born to Cuban immigrant parents who settled in Miami after leaving Cuba in the early 1970s. She grew up in a bilingual household where Spanish was spoken at home and English at school.
    Cuban cultural traditions—such as celebrating Carnaval, preparing ropa vieja and lechón, and listening to timba music—are central to her identity. She maintains strong ties to the local Cuban community
    through church, neighborhood festivals, and the Casa de los Tres Hermanos social club. Her Catholic faith, blended with Afro‑Cuban spiritual customs, informs her values of family solidarity and community
    service. Living in Miami‑Dade County, Maria's cultural background reflects a fusion of Caribbean heritage, American urban life, and the resilient spirit of Cuban exiles.
attributes:
