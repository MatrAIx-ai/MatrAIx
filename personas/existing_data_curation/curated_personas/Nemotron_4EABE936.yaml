  hobbies: '["Cooking and recipe experimentation", "Salsa dancing", "Home gardening", "Reading Cuban history and literature", "Crocheting", "Volunteering at food pantry"]'
  career_goals: Although she is not currently employed full‑time, Maria aims to deepen her impact within the Miami Cuban diaspora. She plans to volunteer as a mentor for young adults at the local community
    center, teaching cooking skills and financial literacy. She hopes to launch a small home‑based catering service specializing in authentic Cuban comfort food, offering weekly deliveries to senior neighbors.
    Maria also aspires to join the neighborhood council to advocate for senior services and cultural preservation. Ultimately, she wants her contributions to help maintain the vibrancy of her community
    while providing a legacy of practical knowledge to younger generations.
