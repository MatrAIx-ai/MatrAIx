personas:
  professional: Karrie Fattal, a retired community volunteer coordinator, blends meticulous budgeting, digital genealogy expertise, and a curious curatorial eye to run senior‑center craft workshops while
    championing an intergenerational art‑exchange program that pairs Chicago seniors with high‑school artists.
  sports: Karrie Fattal enjoys low‑impact exercise, they join a senior walking club that meets at Millennium Park, cheer on the Chicago Cubs during summer baseball, and occasionally play a weekly shuffleboard
    game at the local senior center.
  arts: Karrie Fattal immerses themselves in the arts, they curate community gallery shows with works by local muralist Thomas Beardon, attend Chicago’s Goodman Theatre productions of August Wilson plays,
    and listen to folk legends Joan Baez and Bob Dylan while knitting to the rhythm of their melodies.
  travel: Karrie Fattal plans a modest travel itinerary that includes a spring train trip to New York’s Metropolitan Museum of Art, a summer road‑trip to the Getty Center in Los Angeles, and a fall weekend
    getaway to Boston’s Museum of Fine Arts, all while balancing a modest travel budget and they prioritize comfortable accommodations suited to their mobility needs.
  culinary: Karrie Fattal delights in cooking with fresh herbs from their backyard prairie garden, they frequently prepare rosemary‑infused chicken pot pie, corn chowder with heirloom beans, and a seasonal
    apple‑and‑lavender crumble, while indulging in a slice of Chicago deep‑dish pizza on occasional outings with friends.
  core: Karrie Fattal blends a lifelong curiosity for art and genealogy with a gently stubborn streak that keeps them knitting late into the night, often misplacing their glasses while they never miss a
    senior‑center meeting.
background:
  cultural: Karrie was born and raised in a middle‑class white family on Chicago’s South Side in the 1950s, where Catholic rituals and community parishes shaped her early worldview. The city’s rich cultural
    tapestry—including blues, jazz, and the vibrant public art scene—nurtured her appreciation for artistic expression. Over the decades, she has witnessed the neighborhood’s demographic shifts and embraced
    the diversity of Chicago’s immigrant communities, often incorporating multicultural perspectives into her volunteer work. Her Midwestern upbringing instilled values of self‑reliance, modesty, and a
    strong sense of civic responsibility, which continue to guide her interactions and projects today.
