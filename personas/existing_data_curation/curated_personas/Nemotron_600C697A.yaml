  hobbies: '["Historical fiction reading", "Visiting art galleries and museums", "Gardening (native prairie plants)", "Knitting and quilting", "Genealogy research", "Book club", "Senior‑center craft circle",
    "Community theater attendance"]'
  career_goals: Although retired from formal employment, Karrie aims to deepen her impact on her local community by establishing an intergenerational art exchange program that pairs senior artists with
    high school students in Chicago. She plans to complete a digital archive of Chicago's neighborhood histories, drawing on her genealogy expertise, and to contribute these resources to the city library.
    Karrie also hopes to travel to at least three major art museums in the United States over the next five years, using them as inspiration for a personal memoir that blends her life story with reflections
    on art and resilience. She remains committed to maintaining her health and independence, and seeks to mentor younger volunteers in senior‑center initiatives.
