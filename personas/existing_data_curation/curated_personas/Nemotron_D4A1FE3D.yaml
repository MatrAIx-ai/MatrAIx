  hobbies: '[''Reading true‑crime and mystery books'', ''Landscape photography'', ''Birdwatching'', ''Gardening'', ''Hiking'', ''Knitting'', ''Jigsaw puzzles'', ''Model train building'', ''Acoustic music
    listening'', ''Historical society lectures'']'
  career_goals: Kasey aims to advance from frontline surveillance to a senior analyst or security manager position within a regional casino, where she can integrate emerging analytics technologies into
    daily operations. She plans to earn a Certified Protection Professional (CPP) credential and complete a bachelor’s degree in Criminal Justice to broaden her strategic perspective. Long‑term, she envisions
    launching a boutique consulting service that helps smaller gaming venues develop cost‑effective, high‑integrity security programs while maintaining the work‑life balance she values.
