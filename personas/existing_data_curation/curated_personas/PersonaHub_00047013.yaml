persona_description: A Civil War general and politician who played a key role in the Union victory at the Battle of Murfreesboro. He served in the Pennsylvania volunteer regiment during the Mexican-American
  War and later became a farmer and horticulturist. He was appointed as a brigadier general of volunteers during the Civil War and later became a major general of volunteers. After the war, he was elected
  as a Republican to the United States Congress in 1869 and served until 1887. He was also engaged in railroading.
