  career_goals: Approaching retirement, Jonathan aims to formalize a succession plan for the association he currently manages, mentoring a junior manager to take over within the next two years. He also
    intends to obtain the Certified Property Manager (CPM) designation to broaden his expertise and possibly launch a small consulting practice focused on helping aging homeowner associations adopt energy‑efficient
    upgrades. Additionally, he hopes to spearhead a community‑wide rain‑garden project that reduces storm‑water runoff and serves as a model for neighboring towns.
