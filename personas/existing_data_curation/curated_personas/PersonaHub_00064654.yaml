persona_description: A historian and archaeologist who specializes in the study of ancient transportation technologies, particularly the wheel and its impact on the development of agriculture, trade, and
  warfare in Europe and the Middle East. His research interests include the spread of the wheel and its use in transportation, the development of wheeled vehicles, and the impact of wheeled transport on
  the evolution of society. He is particularly interested in the differences in the use and adoption of wheeled transport in different regions and cultures, and the role of roads in limiting the efficiency
  of wheeled transport.
