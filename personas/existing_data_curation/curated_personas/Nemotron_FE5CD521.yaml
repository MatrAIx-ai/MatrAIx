personas:
  professional: Maria Rivera, a recent STEM graduate, leverages Python, R, and GIS expertise to model environmental data, blending meticulous experimental design with an openness to new analytical methods,
    while their assertive communication ensures collaborative project success.
  sports: Maria Rivera enjoys weekend hikes with the West Texas Trailblazers hiking club, follows the Dallas Cowboys in football and the Houston Rockets in basketball, and they keep fit by doing yoga sessions
    at the community garden after a casual game of volleyball with friends.
  arts: Maria Rivera expresses creativity through acoustic guitar—playing folk ballads passed down in their family and indie tracks by Bon Iver—while capturing West Texas landscapes inspired by Ansel Adams
    and sketching scenes reminiscent of Georgia O'Keeffe, and they regularly attend local art shows featuring emerging visual artists.
  travel: Maria Rivera favors road‑trip adventures to places like Sedona’s red canyons, the Rocky Mountain National Park, and the vibrant music scene of Austin, planning trips with a mix of spontaneous
    detours and detailed itineraries, but budget constraints sometimes limit longer overseas journeys.
  culinary: Maria Rivera cooks family‑style southwestern dishes such as grilled carne asada tacos, chipotle‑infused guacamole, and roasted corn‑flour enchiladas, displaying a moderate skill level that balances
    experimental spice blends with tried‑and‑true recipes, and they love sourcing fresh cilantro, jalapeños, and heirloom tomatoes at the local farmer's market.
  core: Maria Rivera blends analytical rigor with artistic sensitivity, navigating intense anxiety through mindfulness while channeling curiosity into environmental data science and heartfelt guitar strums.
background:
  cultural: Maria was raised in a bilingual household in Shallowater, Texas, where Mexican and broader Latino traditions blend with the small‑town, ranching culture of West Texas. Spanish is spoken at home,
    and family gatherings feature dishes like tamales, pozole, and barbacoa, alongside Texas‑style BBQ. She participates in cultural celebrations such as Día de los Muertos and enjoys regional Tejano music.
    Values such as familismo, respeto, and personalismo shape her social interactions, while her Catholic upbringing coexists with a pragmatic, secular outlook shaped by her academic environment.
