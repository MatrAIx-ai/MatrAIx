  career_goals: Maria aims to translate her analytical skills into a career focused on environmental data science and sustainability. She plans to secure a summer research internship with a regional agency
    or a renewable‑energy startup, then pursue a master’s degree in environmental engineering or data analytics. Her long‑term ambition is to become a lead analyst who designs data‑driven water‑resource
    management solutions for West Texas communities, while mentoring younger students and advocating for climate‑resilient practices. She seeks a supportive workplace that values clear structure, mental‑health
    resources, and collaborative problem‑solving.
