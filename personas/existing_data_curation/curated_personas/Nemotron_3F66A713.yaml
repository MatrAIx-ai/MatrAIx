  hobbies: '["Woodworking", "Gardening", "Fly fishing", "Reading historical non-fiction", "Classic film watching", "Cooking", "Board games (small groups)", "DIY home projects", "Community volunteering"]'
  career_goals: He aims to formalize his expertise by completing a bachelor's degree in social work or community development and obtaining a Certified Residential Management Professional credential. In
    the next five years, Dennis hopes to advance to a senior residential manager role, overseeing multiple properties and shaping resident-wellness programs. He also aspires to streamline operational procedures,
    introduce mentorship for junior advisors, and eventually explore starting a small property-management consultancy that emphasizes resident safety and community cohesion.
