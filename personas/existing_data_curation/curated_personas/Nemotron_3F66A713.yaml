personas:
  professional: Dennis Stocker, a 40‑year‑old veteran residential advisor in suburban Illinois, blends fifteen years of hands‑on facility management with a calm counseling style to keep community living
    smooth, while quietly championing mentorship and procedural streamlining despite a sometimes‑relaxed approach to paperwork.
  sports: Dennis Stocker spends weekends casting flies on nearby lakes with the local Fly Fishing Association, follows the Chicago Cubs and Chicago Bears with quiet devotion, and joins occasional pick‑up
    basketball games at their community center, balancing low‑key water sport with modest team enthusiasm.
  arts: Dennis Stocker relaxes by watching classic films like Casablanca and The Maltese Falcon, devouring historical nonfiction by David McCullough and Doris Kearns Goodwin, and weaving board‑game nights
    with friends around timeless titles such as Settlers of Catan, shaping their appreciation for storytelling and strategic creativity.
  travel: Dennis Stocker favors low‑key, self‑planned road trips to quiet natural retreats such as the Upper Peninsula’s Porcupine Mountains and Yellowstone’s geyser basins, often incorporating their fishing
    gear and garden produce into picnics, while keeping a budget that balances family travel costs with occasional mentoring trips to national historic sites like Gettysburg.
  culinary: Dennis Stocker enjoys cooking hearty, farm‑to‑table meals like rosemary‑infused pot roast, smoky chili with garden‑grown tomatoes, and rustic sourdough, confidently handling the skillet after
    years of DIY projects while occasionally over‑salting their soups in a quest for bold flavor.
  core: Dennis Stocker is a routine‑loving, community‑focused handyman who blends practical stewardship with quiet generosity, though their relaxed planning sometimes leaves paperwork in a pile and their
    health checks half‑missed.
background:
  cultural: 'Dennis grew up in a middle-class family in the Midwest, with deep roots in the surrounding suburban communities of DuPage County. His cultural identity reflects traditional Midwestern values:
    practicality, modesty, a strong work ethic, and an emphasis on family and neighborly cooperation. Though raised with occasional church involvement, his outlook is largely secular, focusing on community
    service and maintaining the familiar rhythms of suburban life. He enjoys local traditions such as community potlucks, Fourth of July parades, and seasonal fairs, which reinforce his sense of belonging.'
attributes:
  skills: '["Resident counseling", "Conflict mediation", "Community event coordination", "Facility maintenance basics", "Safety and emergency procedures", "Budget tracking", "Administrative documentation",
