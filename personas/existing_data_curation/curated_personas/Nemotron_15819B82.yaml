  career_goals: Maria dreams of becoming a visual storyteller who blends art, narrative, and technology. She envisions a future as an animator or concept artist for video games and animated films, creating
    imaginative worlds that inspire others. She also has an emerging interest in using art for science communication, hoping to develop educational multimedia that makes complex ideas accessible and exciting.
    Her long‑term ambition is to work in a creative field that values novelty, flexibility, and the ability to bring abstract concepts to life.
