personas:
  professional: A budding digital illustrator and storyteller, Maria Hewitt channels her vivid imagination and love for sketching, tablet art, and Scratch coding into whimsical fantasy projects within her
    school’s art club, where their collaborative spirit balances their laid‑back, occasionally disorganized approach to deadlines.
  sports: A fan of the Indianapolis Colts and the Indiana Pacers, Maria Hewitt also plays on the Bennington Strikers youth soccer team, preferring casual bike rides through town and spontaneous nature hikes
    to structured workouts, and they enjoy cheering on the Bennington Bulldogs during school basketball nights.
  arts: Maria Hewitt immerses themselves in artistic pursuits, from drawing fan‑art inspired by Studio Ghibli’s Miyazaki and Shaun Tan’s whimsical illustrations to strumming a ukulele while listening to
    indie artists like Clairo, Tame Impala, and Sufjan Stevens, and they spend weekends re‑watching the quirky charm of Wes Anderson’s Moonrise Kingdom for creative spark.
  travel: Maria Hewitt enjoys spontaneous mini‑road trips to nearby Indianapolis for the zoo and the local county fair, dreams of exploring the streets of Edinburgh’s historic Old Town and the towering
    cliffs of Iceland’s Golden Circle, and they prefer loosely planned itineraries that leave room for random detours while balancing a modest family budget.
  culinary: Maria Hewitt, an enthusiastic but occasional kitchen experimenter, delights in whipping up crunchy apple‑cinnamon granola, buttery grilled cheese paired with tomato soup, and garden‑fresh salads
    featuring sliced carrots and heirloom tomatoes, and they love the tactile contrast of crisp crusts and silky sauces.
  core: Maria Hewitt is a fiercely imaginative teen who flips between sketching fantastical worlds, strumming a ukulele in quiet corners, and occasionally misplacing school assignments in a whirlwind of
    creative chaos, yet they always find time to day‑dream under a tree with a sketchbook in hand.
background:
  cultural: Maria was raised in Bennington, a small town in Jefferson County, Indiana, within a predominantly white Midwestern community. Her family’s heritage includes Northern European roots, which are
    reflected in traditions such as celebrating holidays with homemade meals and emphasizing community involvement. Local institutions like the public library and community center have provided early exposure
    to arts and crafts programs, nurturing her curiosity. The town’s slower pace, emphasis on kindness, and shared activities such as county fairs and school events shape Maria’s sense of belonging and
    influence her values of flexibility, creativity, and collaborative support.
