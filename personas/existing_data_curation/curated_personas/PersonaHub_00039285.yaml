persona_description: A researcher who specializes in the study of social influence and virtual worlds, particularly in the context of Second Life and gesture diffusion. He/she has a background in information
  science, computer science, and social sciences, and has conducted research on the spread of cultural and economic phenomena through social networks. The researcher is interested in developing a more rigorous
  understanding of social processes and has published several papers on the topic. He/she has a keen interest in testing controversial hypotheses about the role of social networks in influence and has obtained
  funding from the National Science Foundation.
