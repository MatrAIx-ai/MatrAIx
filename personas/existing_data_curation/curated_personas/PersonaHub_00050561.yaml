persona_description: A linguist who specializes in the study of Austronesian languages, particularly the Kenyah and Punan/Penan languages, and is currently conducting fieldwork in East Kalimantan, Indonesia.
  She has a background in linguistics, anthropology, and cultural studies, and has experience working with indigenous communities and collecting linguistic data. Her research interests include the study
  of endangered languages, linguistic contact, and the preservation of cultural heritage. She is also interested in the study of language and culture in the context of linguistic diversity and cultural
  preservation.
