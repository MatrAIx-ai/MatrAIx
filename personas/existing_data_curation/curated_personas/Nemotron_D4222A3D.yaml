personas:
  professional: Taylor Starr, an aspiring game designer and interactive storyteller, combines her fantasy sketches, Minecraft mod experiments, and chess‑level strategic thinking to build early prototype
    adventures, showing a strong mix of meticulous planning and spontaneous creativity while often debating design rules with classmates during recess.
  sports: Taylor Starr plays forward for the Tazewell Timberwolves youth soccer team, roots for the Tennessee Volunteers during football season, enjoys weekend hikes on Appalachian trails with the local
    Scout troop, and attends dance class at the community center to blend agility with rhythm.
  arts: Taylor Starr channels imagination into detailed fantasy character drawings, writes short sci‑fi tales inspired by authors like Becky Starling, practices piano pieces ranging from Debussy to the
    folk tunes of a local bluegrass jam session, and idolizes illustrator Hayao Miyazaki and fiddler Ricky Skaggs for their storytelling flair.
  travel: Taylor Starr loves spontaneous weekend camping trips to the Great Smoky Mountains, has backpacks ready for exploring the historic streets of Williamsburg, Virginia, dreams of visiting Tokyo’s
    Akihabara district to see anime displays, and cherishes family road trips to the state fair where they compete in a corn‑on‑the‑cob eating contest.
  culinary: Taylor Starr enjoys hearty Southern comfort foods like chicken fried steak and apple pie, and also loves crafting homemade pizza topped with pepperoni, mushrooms, and extra cheese, while experimenting
    with trail‑mix recipes featuring roasted peanuts, dried cranberries, and pretzel sticks after an after‑school hike.
  core: Taylor Starr is a fiercely curious 11‑year‑old with a vivid imagination, competitive edge, and a habit of losing track of chores while dreaming up fantastical worlds on sketchbooks and Lego tables.
background:
  cultural: Taylor is a white girl growing up in Tazewell, a small town nestled in the Appalachian foothills of Claiborne County, Tennessee. Her family participates in a close‑knit rural community where
    Southern hospitality, church gatherings, and county fairs shape daily life. Exposure to Appalachian folk traditions—such as bluegrass music, storytelling, and local crafts—comes through school events
    and community celebrations, while modern digital culture influences her through online gaming and internet creativity. The surrounding hills, forests, and streams nurture her love of outdoor exploration,
    and the region's emphasis on self‑reliance and friendly competition informs her competitive yet collaborative spirit.
