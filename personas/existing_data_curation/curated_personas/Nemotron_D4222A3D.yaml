  hobbies: '[''Sketching'', ''Writing short stories'', ''Reading fantasy and sci‑fi'', ''LEGO building'', ''Minecraft modding'', ''Hiking local trails'', ''Soccer'', ''Dance'', ''Piano'', ''Chess'']'
  career_goals: Taylor dreams of turning her love for story and technology into a career as a video game designer and multimedia storyteller, creating interactive worlds that blend narrative, art, and scientific
    ideas. She is also fascinated by space exploration and hopes to study astrophysics or become an astronaut, using her creative skills to share discoveries with a wider audience. In the meantime, she
    aims to lead a school club that merges art and science, earning recognition for innovative projects and inspiring peers to pursue curiosity-driven learning.
