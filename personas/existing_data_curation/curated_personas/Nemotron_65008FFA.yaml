personas:
  professional: Manuel Colwell, an aspiring junior game developer and storyteller, leverages their love for world‑building by designing intricate Minecraft maps, crafting simple Scratch games, and writing
    fantasy short stories, while they balance meticulous organization with spontaneous creative bursts.
  sports: Manuel Colwell, a young athlete who spends Saturday afternoons playing Little League baseball for the Nesbit Tigers and dribbles basketball with the DeSoto County youth league, while they cheer
    on the New Orleans Saints during NFL Sundays and dream of trying out for a future high‑school track team.
  arts: Manuel Colwell, a budding illustrator and writer who sketches dragon‑scaled heroes inspired by J.R.R. Tolkien and Neil Gaiman, composes short sci‑fi stories while listening to Tame Impala and Bon Iver,
    and they volunteer at the church’s youth art program teaching peers how to create digital art in Scratch.
  travel: Manuel Colwell, an adventurous twelve‑year‑old who enjoys family road trips to the Tallahatchie River’s fishing spots, day hikes along the Natchez Trace Parkway, weekend visits to Memphis’s Graceland,
    and dreams of exploring the misty redwood forests of Oregon and the neon streets of Tokyo, they prefer hands‑on experiences over guided tours.
  culinary: Manuel Colwell, a curious junior chef who loves the buttery crunch of homemade biscuits with honey, builds personalized pizzas topped with pepperoni, pineapple, and extra cheese, and they can
    whip up a simple mac and cheese using elbow pasta, cheddar, and a dash of hot sauce, while they occasionally snack on fried catfish and sweet tea after a long coding session.
  core: Manuel Colwell, a 12‑year‑old dream‑weaver who oscillates between drawing fantastical realms, building LEGO fortresses, and losing track of homework while humming indie tunes, they often forget
    to tidy their room and have a habit of collecting stray LEGO bricks from under the couch.
background:
  cultural: Manuel comes from a white, middle‑class family in rural DeSoto County, Mississippi. His upbringing reflects Southern cultural values such as close‑knit community ties, regular church involvement,
    and a strong sense of hospitality and family tradition. The small‑town environment provides a deep connection to nature and outdoor activities, while his school and local library offer resources that
    nurture his curiosity. At home, he experiences a blend of traditional Southern customs and modern digital influences, giving him a unique perspective that shapes his imaginative outlook.
