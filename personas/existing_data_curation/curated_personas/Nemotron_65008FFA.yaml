  career_goals: Manuel dreams of turning his imagination into a career that blends storytelling, art, and technology. He aims to become a video game designer or concept artist, creating immersive worlds
    that capture novel ideas. He also looks forward to pursuing scientific or engineering studies to explore abstract concepts and invent new solutions. In the near term, he hopes to win his school’s science
    fair, publish a comic strip in the local newspaper, and develop a small indie game with friends.
