  career_goals: Although currently out of the formal workforce, Luz Iris aims to stay mentally and socially engaged by expanding her volunteer work at the local senior center and by mentoring young students
    in science projects. She hopes to develop a small home-based culinary line featuring her family's salsa recipes, which would allow her to share cultural heritage while generating supplemental income.
    Additionally, she aspires to complete a community garden initiative that blends sustainable gardening with traditional Mexican planting techniques, offering a therapeutic outlet for her worries and
    a chance to give back to her neighborhood.
