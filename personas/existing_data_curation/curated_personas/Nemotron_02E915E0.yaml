  career_goals: Hania aims to move into a supervisory role within the next two years, targeting a Team Lead or Shift Manager position where she can shape coaching programs and improve customer satisfaction
    scores. She plans to complete a bachelor's degree in Business Administration or Management to broaden her strategic perspective. Long‑term, she envisions a position in quality assurance or operations
    management, where she can design process improvements and mentor frontline staff. She also hopes to integrate her passion for the arts into the workplace, perhaps by spearheading an employee wellness
    program that includes museum outings or creative workshops.
