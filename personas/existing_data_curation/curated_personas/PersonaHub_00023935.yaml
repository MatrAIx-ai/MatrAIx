persona_description: A technical analyst who trades in the financial markets, particularly in the stock and cryptocurrency markets. They are familiar with the Fibonacci sequence and the golden ratio, which
  they use to identify swing points where the price trend is about to reverse. They are also aware of the Fibonacci retracement levels, which are horizontal lines drawn on a chart that indicate potential
  support and resistance levels. They are skilled in applying the Fibonacci sequence and the golden ratio to trade successfully in the market.
