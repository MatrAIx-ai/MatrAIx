  hobbies: '["watercolor painting", "hiking Appalachian trails", "cooking Mexican cuisine", "playing acoustic guitar", "attending art festivals", "volunteering for community mural projects", "gardening",
    "collecting vintage vinyl records", "reading historical biographies"]'
  career_goals: Roberto aims to grow his freelance painting and paper‑hanging services into a small, family‑run renovation business that can take on larger residential projects and historic‑preservation
    contracts in the Martinsburg area. He plans to obtain certification in historic restoration to specialize in Spanish‑Colonial and Appalachian‑style homes, hire and mentor apprentices, and eventually
    launch a boutique line of low‑VOC, environmentally friendly paints. A longer‑term ambition is to combine his craft with his love for art by creating commissioned murals for local community spaces and
    possibly opening a modest gallery‑studio to showcase his own paintings and those of emerging local artists.
