personas:
  professional: Roberto Garcia is a seasoned painter and paperhanger who leverages his mastery of surface preparation, faux finishes, and color theory to deliver client‑driven aesthetic outcomes, while
    their curiosity drives them to pursue historic‑restoration certification, mentor apprentices, and launch a boutique low‑VOC paint line that blends craftsmanship with environmental stewardship.
  sports: Roberto Garcia spends weekends hiking the Blue Ridge Trail with the local Appalachian Hiking Club, occasionally joins a community softball league, follows the Washington Capitals and the WVU Mountaineers,
    and uses the physical challenge of trekking to balance the sedentary aspects of their painting business.
  arts: Roberto Garcia blends watercolor scenes of Appalachian landscapes with Mexican heritage motifs while strumming an acoustic guitar to the folk tunes of Joan Baez and the Latin melodies of José González,
    collects vintage vinyl by artists such as Carlos Santana and Bob Dylan, and regularly showcases their work at the Shenandoah Valley Folk Festival and community mural projects.
  travel: Roberto Garcia plans trips like a renovation project, drafting checklists for logistics yet leaving room for spontaneous detours, having explored Asheville’s art scene, the Great Smoky Mountains’
    hiking paths, Oaxaca’s culinary markets, and Granada’s historic plazas, while dreaming of future visits to the colonial towns of southern Spain and the ancient ruins of Teotihuacan.
  culinary: Roberto Garcia cooks traditional Mexican dishes such as mole poblano, chiles en nogada, and tamales using garden‑fresh cilantro, epazote, roasted chilies, corn masa, and locally sourced avocados,
    displaying a moderate culinary skill that balances authentic flavors with creative twists inspired by their watercolor palette.
  core: Roberto Garcia is a meticulous craftsman who channels curiosity into paint, plants, and playlists, yet habitually lets invoices pile on the kitchen counter until the next sunrise, a quirk that perfectly
    mirrors their artistic spontaneity.
background:
  cultural: Roberto’s Mexican roots shape his daily life through bilingual communication, family‑centered gatherings, and celebrations such as Día de los Muertos and Mexican Independence Day, where traditional
    foods, music, and storytelling are central. His upbringing emphasized respect, hospitality, and a strong work ethic, values he carries into his professional relationships. Living in Martinsburg, WV,
    he blends these traditions with Appalachian culture—appreciating local folk music, participating in community events, and adopting a love for the region’s natural scenery. This cultural synthesis influences
    his artistic sensibility, prompting him to incorporate Mexican motifs and color palettes into his work while honoring the heritage of the places he renovates.
attributes:
  skills: '["surface preparation", "paper hanging", "interior painting", "exterior painting", "decorative finishes", "color consulting", "safety compliance", "budget estimation", "client communication",
