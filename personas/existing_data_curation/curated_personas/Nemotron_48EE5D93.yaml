    friends'', ''Exploring nature trails'']'
  career_goals: James dreams of a future where he can blend his love for art and ideas. He imagines becoming an illustrator for children’s books or a video‑game designer who creates worlds that spark curiosity
    in others. He also considers a career in science or environmental stewardship, where he could explore new concepts and share them through visual storytelling. His goal is to stay open to unconventional
    paths and find a role that lets him keep learning, creating, and inspiring.
