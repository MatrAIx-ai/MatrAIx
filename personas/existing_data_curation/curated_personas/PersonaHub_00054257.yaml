persona_description: A paleontologist who specializes in the study of ancient genomes and the evolution of sex chromosomes. Their expertise lies in mapping and analyzing ancient genomes, particularly those
  of organisms that are known to have undergone rapid genetic changes, such as the HSY and X chromosomes. This person is highly skilled in genetic mapping techniques, including fine mapping, and has experience
  in developing SSR markers for mapping purposes. They have a deep understanding of the evolutionary history of sex chromosomes and have contributed to the understanding of the rapid expansion of the HSY
  in the past 2-3 million years after genetic recombination became suppressed in the sex determining region.
