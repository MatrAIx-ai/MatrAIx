  career_goals: Looking ahead, Virgen aims to transition into a senior safety trainer role where she can codify her decades of experience into formal curricula for new hazardous‑materials crews. She seeks
    additional certifications in emerging decontamination technologies and hopes to lead a mentorship program within her company to foster the next generation of skilled workers. While she plans to stay
    active on the field for a few more years to ensure a smooth knowledge transfer, she also envisions a part‑time consulting position after retirement, providing advisory services on compliance and safety
    best practices for smaller contractors in the Chicago metropolitan area.
