  career_goals: William aims to advance into senior leadership within the industrial engineering and safety domain, targeting the role of Director of Health, Safety, and Environment for a mid‑size manufacturing
    or renewable‑energy company in the Rocky Mountain region. He plans to obtain his Professional Engineer (PE) license and deepen his expertise in sustainability, ultimately integrating circular‑economy
    principles into plant operations. Over the next five years, he hopes to spearhead a company‑wide safety culture transformation that reduces total recordable incident rates by at least 30 %. In the longer
    term, he envisions launching an independent consultancy that assists regional firms in complying with evolving EHS regulations while adopting greener production methods. Mentorship is also a priority;
    he wants to mentor junior engineers and contribute to local professional societies such as the American Society of Safety Professionals (ASSP).
