  hobbies: '[''Gardening'', ''Knitting'', ''Baking Traditional Pies'', ''Reading Romance and Historical Novels'', ''Playing Bridge'', ''Walking Her Dog'', ''Church Choir'', ''Community Potluck Organizing'',
    ''Volunteering at Local Food Bank'', ''Listening to Classic Pop/Rock Music'']'
  career_goals: Approaching retirement, Sharon’s primary ambition is to secure a senior clerical position that lets her apply her depth of experience while maintaining a predictable routine. She plans to
    obtain the Certified Bookkeeper designation to cement her expertise and increase job security. Sharon also hopes to mentor younger staff, passing on her practical knowledge and fostering a supportive,
    low‑stress workplace. Over the next few years she aims to transition to part‑time consulting for local non‑profit organizations, serving as a volunteer treasurer or financial advisor—roles that blend
    her love of routine financial work with her desire to contribute to the community. Ultimately, she wants a retirement plan that guarantees financial stability, allowing her to focus on her hobbies and
    social engagements without the pressure of unpredictable work demands.
