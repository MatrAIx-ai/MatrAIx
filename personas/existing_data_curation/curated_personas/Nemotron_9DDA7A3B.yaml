    ''Emerging‑Market Investment Analysis'', ''Client Presentation'', ''Team Collaboration'', ''Cross‑Cultural Communication'']'
  hobbies: '[''Soccer (local league)'', ''Cooking Vietnamese cuisine'', ''Weekend BBQs'', ''Hiking desert trails'', ''Spontaneous road trips'', ''Music festivals'', ''Trivia nights'', ''Volunteering at
    cultural festivals'', ''Street photography'', ''Listening to finance and self‑development podcasts'']'
  career_goals: Phong aims to progress to a senior portfolio manager role where he can lead a flexible, innovative team that blends data‑driven insights with a human‑centered investment philosophy. He wants
    to earn his CFA charter, deepen his expertise in ESG and Southeast Asian markets, and eventually launch a boutique advisory service that serves diaspora investors seeking sustainable opportunities.
    Mentoring junior analysts and fostering a collaborative, inclusive workplace culture are also key ambitions, as is maintaining a work‑life balance that supports his family and community involvement.
