  hobbies: '[''Cooking and recipe experimentation'', ''Attending and volunteering at art exhibitions'', ''Salsa and folklórico dance classes'', ''Embroidery and papel picado crafting'', ''Herb gardening'',
    ''Hosting social gatherings and karaoke nights'', ''Community volunteering and mentorship'']'
  career_goals: Alina aims to translate her community passion into a more formal role by first earning her GED and pursuing a certificate in community arts administration. She envisions launching a home‑based
    catering service that showcases regional Mexican dishes, while also serving as a cultural ambassador for Elk Grove's growing Latino population. Long‑term, she hopes to lead the local community center's
    arts program, organize an annual multicultural festival, and mentor at‑risk youth, using her organizational talents and vibrant personality to create inclusive, enriching experiences.
