  career_goals: As she approaches the later stages of her career, Brooke aims to transition into a supervisory role, eventually forming a small, trusted crew that specializes in eco‑friendly paints and
    historic home restoration. She hopes to mentor younger apprentices, sharing the practical knowledge she’s accumulated, while maintaining a steady income that supports her family and plans for a comfortable
    retirement.
