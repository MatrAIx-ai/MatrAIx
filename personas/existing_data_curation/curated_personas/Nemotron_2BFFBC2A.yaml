  hobbies: '[''Puzzle solving (crosswords, sudoku)'', ''Chess'', ''Reading non‑fiction (finance, self‑improvement)'', ''Documentary films'', ''Gardening'', ''Cooking traditional Mexican dishes'', ''Morning
