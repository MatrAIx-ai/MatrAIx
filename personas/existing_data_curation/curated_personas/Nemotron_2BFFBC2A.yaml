  career_goals: Enrique aims to advance from his current clerk position to a senior billing supervisor role within the next five years, seeking certification as a Certified Billing Specialist to bolster
    his credibility. He values job stability and plans to secure a supervisory position that offers clear responsibilities and predictable routines. Long‑term, he hopes to transition into a low‑stress accounting
    consultancy for small businesses, allowing him to leverage his expertise while maintaining the structured, solitary work environment he prefers.
