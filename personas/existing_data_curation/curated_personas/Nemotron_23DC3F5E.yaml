personas:
  professional: Maurianne Katia, an aspiring art therapist, blends their digital illustration talent and compassionate listening skills to volunteer at a youth counseling center, meticulously organizing
    therapy workshop plans while remaining flexible to participants' emotional needs, and their curiosity drives them to integrate unconventional art therapies for isolated teenagers.
  sports: Maurianne Katia, a nature‑focused fitness enthusiast, spends weekends hiking the Wasatch foothills with a lightweight pack, captures sunrise photos, participates in a local trail‑running club
    on summer evenings, practices gentle yoga at home, and cheers for the Utah Jazz and Real Salt Lake during basketball and soccer seasons.
  arts: Maurianne Katia, a dedicated visual artist, fills sketchbooks with intricate line drawings, layers watercolor washes inspired by misty mountain vistas, draws creative influence from artists like
    Yayoi Kusama and James Turrell, and curates a monthly online listening session featuring ambient musicians Tycho and Boards of Canada to fuel their poetic musings.
  travel: Maurianne Katia, an introspective traveler, prefers low‑key road trips to nearby national parks such as Zion and Bryce, plans each outing with a detailed itinerary and a pocket‑sized journal,
    dreams of exploring the island landscapes of Fiji and the cultural streets of Kyoto, yet balances these aspirations against a student budget and familial responsibilities.
  culinary: Maurianne Katia, a budding home chef, enjoys preparing traditional island dishes like taro poi and coconut‑infused fish stew, experiments with fresh herbs and local produce to enhance flavors,
    and balances cooking with occasional take‑out sushi nights as a comforting break from rigorous art projects.
  core: Maurianne Katia is a solitary, curiosity‑driven 18‑year‑old who channels anxiety into art, meticulously plans yet flexibly adapts, and finds solace in nature, quiet creativity, and compassionate
    service.
background:
  cultural: Maurianne is of Polynesian descent, with her family lineage tracing to Samoa and Tonga. Her parents immigrated to the United States before she was born, and they have maintained several cultural
    practices, such as sharing traditional stories (fa'avae), participating in community tikis and fa'alilolilo (spiritual gatherings), and preparing staple foods like taro, coconut, and fish during family
    celebrations. Growing up in Bountiful, Utah, Maurianne’s daily life is also shaped by the predominantly Latter‑day Saints environment, which emphasizes community service, modesty, and family cohesion.
    She navigates a blended identity, honoring her ancestors' values of respect for elders, collective well‑being, and expressive dance and music, while also adapting to the quieter, more individualistic
    lifestyle of her Utah neighborhood. This dual cultural exposure fuels her appreciation for art as a bridge between personal introspection and communal storytelling.
attributes:
  skills: '["digital illustration", "basic graphic design", "photography", "research on cultural history", "critical thinking", "active listening", "empathy", "conflict resolution", "event coordination",
    "volunteer management", "organization", "flexibility in creative planning", "basic Adobe Photoshop", "Procreate"]'
  hobbies: '["sketching", "watercolor painting", "digital art", "reading poetry", "listening to ambient music", "hiking", "nature photography", "cooking traditional Polynesian dishes", "meditation", "journaling",
    "language learning (Samoan/Tongan)"]'
  career_goals: Maurianne aims to enroll in a community college program that combines visual arts with mental health counseling, with the long‑term goal of becoming a licensed art therapist. She wants to
    develop therapeutic arts workshops that specifically support teenagers who feel isolated or experience anxiety, drawing on her own experiences of solitude and emotional sensitivity. In the short term,
    she plans to volunteer at a local youth counseling center to gain hands‑on experience and to pursue certifications in trauma‑informed care. Parallel to her professional aspirations, she hopes to contribute
    to the preservation and contemporary reinterpretation of Polynesian artistic traditions, eventually curating community exhibitions that bridge her heritage with modern artistic practice.
