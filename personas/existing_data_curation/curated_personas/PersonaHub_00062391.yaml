persona_description: A paleontologist or a researcher specializing in the study of fossil penguins, particularly those from South America, with a focus on the distribution and taxonomic revision of penguin
  species. They are interested in the early Miocene to late Pliocene fossil record of South American penguins and have expertise in taxonomic analysis and stratigraphic distribution of fossil penguins.
  They have a keen interest in the reduction of penguin species to their exclusive South American taxa and the recent taxonomic revision of penguin species.
