personas:
  professional: Robert Wallace, a 14‑year‑old aspiring game developer and digital illustrator, blends his love for storytelling, abstract art, and logical problem‑solving by creating Python‑based adventure
    games that feature hand‑drawn assets, while his methodical planning and competitive drive push him to enter school coding contests and refine his portfolio.
  sports: Robert Wallace hikes the nearby Cascades with the local Youth Outdoor Club, volunteers on trail maintenance, dreams of tackling Mount Rainier, and channels his competitive spirit by tracking his
    performance against his favorite teams—the Seattle Seahawks in the NFL and the Toronto Raptors in the NBA—while also training for an upcoming junior cross‑country meet.
  arts: 'Robert Wallace pours his imagination onto sketchbooks, drawing inspiration from Moebius’ surreal sci‑fi panoramas, the vibrant world‑building of Hayao Miyazaki’s Studio Ghibli films, and the ambient
    piano of Ludovico Einaudi, while he binge‑watches the animated series "Avatar: The Last Airbender" and collects limited‑edition prints by contemporary digital artist Beeple.'
  travel: Robert Wallace plans his vacations like quests, having trekked the geothermal wonders of Yellowstone last summer and already penciled in a future expedition to Iceland’s black‑sand beaches, while
    also saving up for a first‑time trip to San Diego Comic‑Con, where he hopes to meet his sci‑fi author idols.
  culinary: Robert Wallace’s culinary experiments revolve around mastering avocado toast with a drizzle of lemon zest, perfecting pepperoni pizza crusts using high‑gluten flour, and occasionally crafting
    a modest mushroom risotto—seasoned with thyme and a splash of white wine—while he snacks on trail‑mix with dried cranberries during hikes.
  core: Robert Wallace is a hyper‑curious teen who drafts fantasy worlds in his journal, wrestles with anxiety, obsessively budgets his allowance for LEGO, and routinely stays up late coding, all while
    maintaining a fiercely competitive streak that colors his friendships.
background:
  cultural: Robert grew up in Wallace, Idaho, a historic mining town nestled in the scenic Panhandle of the state. His family has lived in the area for several generations, with his father working in the
    local granite quarry and his mother teaching at the elementary school. The community’s culture emphasizes self‑reliance, close‑knit relationships, and a deep respect for the surrounding wilderness.
    Local traditions such as the annual Silver City Days celebration and fishing trips on the Coeur d’Alene River are part of his upbringing. Although he identifies as white, the presence of nearby Shoshone
    County’s Native American heritage—through local museums and history lessons—has sparked his interest in regional history and environmental stewardship. These influences have shaped his values of hard
    work, curiosity about the natural world, and a desire to balance modern innovation with respect for his town’s legacy.
