  career_goals: Robert aspires to channel his interdisciplinary interests into a career that merges science, technology, and creative design. He intends to pursue a bachelor's degree in environmental engineering
    or sustainable design, aiming to develop innovative solutions for responsible resource extraction and renewable energy in his home region. He hopes to earn scholarships by winning science fairs and
    to publish research on ecological impacts of mining. In the longer term, he envisions working as a research scientist or consultant who designs eco‑friendly mining practices while also collaborating
    with design teams to create visual communications and interactive media that raise public awareness about environmental stewardship.
