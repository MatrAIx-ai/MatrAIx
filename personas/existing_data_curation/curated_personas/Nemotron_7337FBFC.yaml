personas:
  professional: Ana Dominguez, a retired educator with decades of experience designing Spanish-language curricula for adult learners, now channels her curious, spontaneous, and sociable nature into leading
    arts and storytelling circles at the Lake Worth senior center, using her knack for public speaking to bridge generational gaps.
  sports: Ana Dominguez enjoys cheering on the Miami Heat and attending occasional Florida Panthers games with friends, but prefers low‑impact activity like salsa dancing at community festivals and gentle
    tai chi classes at the senior center to stay fit.
  arts: Ana Dominguez expresses herself through watercolor paintings of the sweeping lowlands of her homeland, often listening to the lively strums of a traditional joropo ensemble while she works, and
    she eagerly shares the works of artists such as Frida Kahlo and local painter Jorge De la Vega during her storytelling gatherings.
  travel: Ana Dominguez loves weekend trips to the historic streets of Old San Juan, has journeyed to Cartagena to experience Caribbean coastal culture, and dreams of revisiting the Andean region of her
    birth to reconnect with family roots, favoring travel with her grandchildren for shared adventure.
  culinary: Ana Dominguez, an adept home chef, skillfully prepares corn‑based arepas and richly spiced hallacas using heirloom recipes, while also experimenting with fresh ceviche and paella, often sourcing
    spices like cumin, annatto, and capers from local markets.
  core: Ana Dominguez is a lively octogenarian storyteller who mixes spontaneous garden craft with a habit of misplacing her glasses, yet never misses a chance to host a lively salsa night for neighbors.
background:
  cultural: Born and raised in Venezuela during the 1950s‑70s, Ana grew up in a close‑knit family that celebrated Catholic holidays, communal meals, and vibrant music such as joropo and gaita. She immigrated
    to the United States in the early 1990s, settling in Lake Worth where a growing Latino community provided a sense of belonging. Her Venezuelan heritage influences her daily life through language, cuisine,
    and traditions, while her decades in Florida have blended Caribbean rhythms and the multicultural tapestry of Palm Beach County into her identity. This dual cultural lens informs her appreciation for
    art, her commitment to intergenerational sharing, and her desire to preserve and celebrate her roots within the broader American mosaic.
