personas:
  professional: Lakesia Harriel, a 31‑year‑old aspiring arts program coordinator, blends digital illustration expertise with event‑management experience to craft community‑focused exhibitions that champion
    diaspora narratives, leveraging their analytical research skills and collaborative communication to navigate museum partnerships while asserting ideas when needed.
  sports: Lakesia Harriel enjoys paddleboarding on Biscayne Bay in winter, plays in a local beach‑volleyball league, practices yoga three times weekly at the Miami Yoga Collective, follows the Miami Heat,
    Miami Dolphins, and Miami Marlins with fervor, and occasionally joins the community running club for Sunday 5K runs, balancing solo fitness routines with team‑based activities.
  arts: Lakesia Harriel actively engages with Miami’s vibrant arts scene, attending weekly Wynwood Art Walks, reviewing exhibitions by contemporary photographer Elia Locardi, admiring the bold canvases
    of Kehinde Wiley, enjoying spoken‑word performances by Sarah Kay, and drawing inspiration from the soulful sounds of Anderson .Paak and Kamasi Washington while contributing thoughtful critiques on their
    personal blog.
  travel: Lakesia Harriel has a penchant for short, culturally immersive trips, having explored Savannah’s historic architecture, the lively markets of Kingston, Jamaica, and the modern art museums of Mexico
    City; they plan future visits to New Orleans for its culinary heritage and Lisbon to study azulejo tile art, favoring a mix of structured itineraries and spontaneous neighborhood wanderings while balancing
    budget constraints with a desire for authentic experiences.
  culinary: Lakesia Harriel loves cooking at home, skillfully preparing Southern soul food staples such as fried catfish, collard greens, and sweet potato pie alongside Caribbean delights like jerk chicken,
    rice and peas, and callaloo, often using fresh thyme, scotch bonnet peppers, and allspice; they enjoy hosting potluck gatherings for friends, though they sometimes over‑season dishes, leading to a habit
    of adjusting flavors on the fly.
  core: Lakesia Harriel, a curious and organized art enthusiast, balances community‑centric creativity with disciplined budgeting, uses yoga to manage mild health quirks, and relishes vibrant cultural experiences
    both at home and abroad while occasionally over‑committing to projects.
background:
  cultural: Lakesia identifies as a Black American with roots tracing back to the Southern United States and a Caribbean heritage from her mother's side. Growing up in a close‑knit church and community
    in Florida, she was immersed in a rich tapestry of African‑American traditions, from gospel music and oral storytelling to the celebration of Juneteenth and Kwanzaa. Living in Boca Raton, she engages
    with the vibrant local Black arts scene, participates in cultural festivals, and draws inspiration from Afro‑Caribbean rhythms and visual motifs. Her cultural identity informs her artistic aesthetic
    and her commitment to amplifying under‑represented voices.
attributes:
  skills: '["Digital Illustration", "Graphic Design", "Social Media Content Creation", "Blog Writing", "Community Event Coordination", "Research & Analysis", "Written Communication", "Verbal Communication",
    "Time Management", "Cross-cultural Communication", "Basic Web Design"]'
  hobbies: '["Visiting Art Galleries", "Sketching & Painting", "Photography", "Attending Live Music and Spoken‑Word Events", "Reading Contemporary Fiction & Poetry", "Blogging about Art", "Yoga & Meditation",
    "Cooking Southern Soul Food & Caribbean Cuisine", "Community Volunteering", "Exploring Nature Reserves"]'
  career_goals: Lakesia aims to translate her artistic passion and organizing talents into a professional role within the cultural sector. In the next two years she plans to complete her bachelor's degree
    in Art History or Creative Media, earn a certificate in Museum Studies, and build a robust portfolio of digital and curatorial work. Her long‑term ambition is to secure a position as an arts program
    coordinator or curator at a museum or non‑profit that highlights African‑American and Afro‑Caribbean artists, and eventually to lead a community arts center in South Florida. She also hopes to launch
    an online platform that showcases emerging Black creators and offers mentorship opportunities.
