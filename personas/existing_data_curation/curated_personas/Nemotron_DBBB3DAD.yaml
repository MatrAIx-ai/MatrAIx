  career_goals: Although retired from formal employment, Saundra’s ambitions center on deepening her impact within her community. She aims to serve on the board of the local historical society, lead a senior‑focused
    mentorship program that pairs younger students with experienced volunteers, complete a memoir that weaves together her family’s genealogy and personal reflections, and master digital archiving tools
    to preserve local history. Continuing education remains a priority, so she plans to enroll in short university courses on digital humanities and museum studies.
