persona_description: A museum scientist who specializes in the study of paleoecology and global change, particularly in the fields of palynology, paleontology, and paleobotany. They have expertise in collecting
  and analyzing fossil and archaeological evidence to reconstruct past environments and understand the consequences of previous periods of global warming. Their work is funded by the National Science Foundation
  and the National Oceanic and Atmospheric Association, and they are involved in the development of databases and the creation of exhibits and programs related to these fields.
