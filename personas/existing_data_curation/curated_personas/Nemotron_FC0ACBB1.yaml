personas:
  professional: Cleaven Smith, a retired master carpenter and seasoned community organizer, applies their methodical, competitive mindset to lead volunteer trade‑skill workshops and meticulously budgeted
    town events, turning practical craftsmanship into a legacy of mentorship.
  sports: Cleaven Smith stays active through senior‑league bowling, where they chase the regional senior title, and they also partake in weekly bridge and chess sessions at the local senior center, while
    cheering on the Texas Rangers and Dallas Cowboys as their favorite professional teams.
  arts: Cleaven Smith finds creative fulfillment both singing in the church choir and restoring antique furniture, while they unwind to the sounds of Aretha Franklin, Miles Davis, and B.B. King, and they
    regularly attend the community’s heritage art exhibit featuring works inspired by Southern storytelling.
  travel: Cleaven Smith prefers organized, low‑impact trips, often joining senior tour groups to historic sites like New Orleans’ French Quarter and Savannah’s cobblestone streets, and they dream of a leisurely
    river cruise along the Mississippi to explore the roots of the blues.
  culinary: Cleaven Smith’s kitchen showcases a blend of Southern comfort and garden freshness, as they simmer gumbo with home‑grown tomatoes, peppers, and thyme, grill barbecue ribs with a secret brown‑sugar‑molasses
    rub, and they relish sharing these dishes at church potlucks.
  core: Cleaven Smith is an 80‑year‑old planner‑type craftsman who transforms neighborhood projects into competitions, balances a disciplined budget with a love for soulful music, and habitually forgets
    to water the calendar‑marked fertilizer schedule for their garden.
background:
  cultural: Cleaven grew up as an African‑American in rural East Texas during a time of significant social change. His family roots trace back to sharecropping and the Great Migration, instilling a strong
    sense of resilience and community. The church played a central role in his upbringing, shaping his values of service, fellowship, and musical tradition. He experienced the civil‑rights movement first‑hand,
    which fostered his disciplined, achievement‑oriented mindset and a healthy skepticism toward authority. Throughout his life, Southern culinary traditions, gospel and blues music, and the storytelling
    culture of his neighborhood have profoundly influenced his identity. Today, he honors this heritage by preserving local stories, participating in community gatherings, and sharing the cultural rhythms
    of his youth with younger generations.
