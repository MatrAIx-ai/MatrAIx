  career_goals: Although officially retired, Cleaven remains driven to make a lasting impact on his community. He aims to formalize a mentorship program that pairs seniors with high‑school students to teach
    practical trade skills such as woodworking, basic home repairs, and budgeting. He also intends to compile a written and visual history of De Kalb, preserving stories and photographs for future generations.
    On a personal level, he plans to earn a certificate in digital literacy through an online senior course, enabling him to guide peers in using smartphones and tablets. In the competitive spirit that
    fuels him, Cleaven hopes to win the regional senior bowling tournament and bring recognition to his town’s seniors.
