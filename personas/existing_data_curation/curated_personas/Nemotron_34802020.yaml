  hobbies: '[''Reading contemporary fiction and social‑issue non‑fiction'', ''Cooking and modifying traditional South Asian recipes'', ''Yoga and mindfulness practice'', ''Volunteer work with local community
    center'', ''Participating in campus South Asian cultural club'', ''Board games and coffee meet‑ups with friends'', ''Exploring local museums and art exhibits'']'
  career_goals: Jasoda aims to complete her bachelor’s degree in Business Administration with a concentration in Management Information Systems, leveraging her interest in both technology and practical
    business solutions. She aspires to work as a project coordinator or junior analyst in a nonprofit or community‑focused organization, applying her analytical skills to improve program efficiency while
    staying connected to her cultural community. In the longer term, she envisions moving into a leadership role that integrates data‑driven decision‑making with community outreach, possibly pursuing a
    master’s in Public Administration. She also hopes to obtain professional certifications such as the Certified Associate in Project Management (CAPM) to bolster her credentials.
