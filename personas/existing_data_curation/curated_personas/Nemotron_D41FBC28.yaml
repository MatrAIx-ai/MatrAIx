  hobbies: '[''Hiking and trail walking'', ''Camping'', ''Salsa dancing'', ''Cooking Puerto Rican dishes'', ''Listening to Latin music'', ''Reading mystery novels'', ''Visiting craft breweries'', ''Volunteer
    driving for community charities'']'
  career_goals: Nilsa aims to move from front‑line driving into a supervisory logistics role, such as a fleet coordinator or regional operations manager, within the next three years. She plans to obtain
    a Class A CDL with a HazMat endorsement and pursue a supply‑chain management certification to broaden her expertise. In the longer term, she dreams of launching her own small delivery business that
    serves the Hispanic community in Mesa County, potentially pairing it with a mobile food service offering authentic Puerto Rican dishes. Achieving financial stability, supporting her family back in Puerto
    Rico, and maintaining a flexible schedule that balances work and personal life are central to her ambition.
