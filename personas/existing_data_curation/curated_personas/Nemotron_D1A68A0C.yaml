  career_goals: Although retired from formal employment, Ashley aims to deepen her impact on the Ann Arbor community by serving on the board of a local arts nonprofit and spearheading a mentorship program
    for budding entrepreneurs. She hopes to launch a series of workshops that blend business fundamentals with creative expression, helping seniors and young adults alike turn ideas into viable projects.
    Additionally, she aspires to author a memoir that interweaves her experiences in business, community service, and the arts, preserving her legacy for future generations.
