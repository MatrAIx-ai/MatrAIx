personas:
  professional: Ashley Jabbia, a retired business professional turned community arts strategist, leverages decades of budgeting, grant writing, and project management expertise to orchestrate inclusive
    cultural events, while they approach obligations with a relaxed mindset that lets them pivot creatively whenever plans stall.
  sports: Ashley Jabbia, an enthusiastic supporter of the Michigan Wolverines, joins the Ann Arbor Senior Walking Club’s sunrise walks, participates in a community line‑dancing group for cardio fun, and
    they play light tennis on university courts during summer, favoring low‑impact, socially engaging activities.
  arts: Ashley Jabbia, a frequent visitor to the University of Michigan Museum of Art, paints acrylic landscapes inspired by Claude Monet, captures everyday moments with a vintage 35mm camera, and they
    draw creative energy from the music of Joan Baez and the poetry of Maya Angelou, letting artistic expression anchor their sense of purpose.
  travel: Ashley Jabbia plans trips with curated itineraries that balance guided tours of historic European capitals like Florence, Verona, and Prague with leisurely road‑trips through Michigan’s Dutch‑heritage
    town of Holland, they often travel with their book‑club group to share discoveries while staying mindful of a fixed retirement budget.
  culinary: Ashley Jabbia, an avid home chef, expertly prepares Thai green curry with fresh lemongrass, Italian mushroom risotto featuring Arborio rice, and Moroccan chicken tagine scented with preserved
    lemons and dried apricots, and they occasionally indulge in artisanal cheese boards at local farmer’s markets to explore diverse flavors.
  core: Ashley Jabbia mixes an insatiable curiosity with a laid‑back, sometimes scatter‑brained schedule, they turn every community gathering into a spontaneous workshop while frequently misplacing their
    glasses.
background:
  cultural: Ashley is a white American of mixed German and Irish ancestry, raised in a small Michigan town before settling in Ann Arbor. Her upbringing emphasized education, hard work, and community involvement,
    values that were reinforced by the vibrant, academic atmosphere of the University of Michigan area. She celebrates traditional American holidays such as Thanksgiving and Christmas, and incorporates
    Irish customs like St. Patrick's Day gatherings with family and friends. The diverse cultural fabric of Ann Arbor—its arts scene, university influences, and progressive community—has shaped her open‑minded
    worldview and deep appreciation for cultural exchange.
