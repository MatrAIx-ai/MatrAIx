personas:
  professional: Jonae Cavalier is a budding preschool explorer who loves sorting colored blocks by shape and size, eagerly mastering basic counting and storytelling during circle time, while their natural
    preference for predictable routines coexists with a playful disregard for rigid classroom schedules.
  sports: Jonae Cavalier delights in toddler gymnastics at the Little Sprouts Gymnastics club on Tuesday evenings, cheers loudly for the local professional baseball team, the Seattle Mariners, during family
    outings, and prefers small, supervised games of soft ball with a handful of cousins rather than large chaotic playground scrambles, asserting themselves when teammates crowd their space.
  arts: Jonae Cavalier is enchanted by the gentle melodies of Raffi and the whimsical storytelling in 'Sesame Street', often mimicking the characters during play, while they collect and organize picture
    books by color, reflecting their love for order amidst a preference for solitary artistic exploration.
  travel: Jonae Cavalier's travel adventures include a weekend trip to the nearby zoo where they meticulously map out each animal exhibit on a crayon‑drawn schedule, a family vacation to the beach in Santa
    Cruz where they built a sandcastle in a precise grid, and a dreamed‑away wish to visit the interactive children's museum in Chicago, all of which reveal their yearning for structured yet flexible exploration.
  culinary: Jonae Cavalier relishes creamy macaroni and cheese sprinkled with a dash of paprika, loves dipping crunchy carrot sticks into hummus, and can assemble a peanut‑butter‑banana mini‑sandwich with
    practiced precision, yet they can be stubborn about eating peas, often negotiating for extra apple slices.
  core: Jonae Cavalier is a meticulous three‑year‑old whose love for routine, solitary play, and tiny triumphs is balanced by whimsical bursts of spontaneity, and they often worry about the unknown.
background:
  cultural: Jonae is raised in a Black family rooted in the vibrant Bronx community. Her parents blend traditional African‑American cultural practices—such as gospel music, storytelling, and celebrations
    of Juneteenth and Kwanzaa—with the multicultural rhythms of the city. At home, classic R&B and contemporary hip‑hop provide a soundtrack to daily life, and neighborhood block parties and community centers
    offer opportunities for connection. A close‑knit extended family provides both emotional support and the structured routines that shape her identity and daily experiences.
attributes:
  skills: '["simple sentence formation", "primary color identification", "counting to ten", "basic puzzle solving", "fine motor coordination", "routine adherence", "role‑play with toy kitchen"]'
  hobbies: '["Duplo block building", "coloring books", "listening to music (lullabies & hip‑hop)", "small‑group playdates", "park walks", "helping with simple household tasks"]'
  career_goals: Even at this young age, Jonae often talks about growing up in a role that provides both structure and the chance to help others. She imagines becoming a preschool teacher who guides children
    through predictable daily lessons, a pediatric nurse who offers calm routine care to sick kids, or a community librarian who creates organized, quiet reading spaces. These aspirations echo her preference
    for predictable, supportive environments while still allowing her to cooperate with others and occasionally lead.
