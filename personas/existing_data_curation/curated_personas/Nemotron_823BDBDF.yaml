  hobbies: '["Reading historical biographies and philosophy", "Genealogy research", "Gardening (seasonal planning)", "Walking historic neighborhood tours", "Birdwatching", "Playing chess", "Volunteer at
    Carnegie Museum archives", "Participating in local book club", "Attending community theater performances"]'
  career_goals: 'Although retired, Lane remains goal‑oriented: he hopes to author a comprehensive history of Pittsburgh’s North Side, compile a multi‑generational oral‑history collection, and secure a small
    foundation grant to digitize the resulting material for public access. He also aspires to mentor younger volunteers at the local historical society, develop a structured curriculum for a community adult‑education
    class on genealogy, and maintain a disciplined daily routine that mitigates his stress and worry.'
