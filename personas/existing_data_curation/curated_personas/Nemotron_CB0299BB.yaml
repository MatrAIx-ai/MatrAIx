  career_goals: Inspired by her love for art and new ideas, Melissa imagines herself as a creative professional when she grows older. She often talks about becoming a painter or illustrator who can bring
    imagined worlds to life. She also expresses interest in helping animals, dreaming of being a veterinarian, reflecting her caring nature. Her early ambition is to explore many possibilities, staying
    open to unconventional paths.
