personas:
  professional: Linda Hastie is a seasoned bedside nurse with over 20 years of experience who blends meticulous clinical expertise—ranging from wound care to crisis intervention—with a liberal‑arts sensibility
    that fuels innovative art‑therapy programs, and they are now pursuing an MSN in community health to lead an integrative outreach initiative for seniors.
  sports: Linda Hastie rides the BeltLine cycling path with the local CycleCrafters club three times a week, practices Vinyasa yoga at sunrise, roots for the Atlanta Falcons, Hawks, and Braves, and despite
    a habit of skipping warm‑ups, they occasionally join community softball games for fun.
  arts: Linda Hastie immerses in Atlanta’s arts scene, attends experimental productions at The Goat Farm, studies watercolor techniques inspired by Georgia O'Keeffe’s florals, curates mixed‑media projects
    after viewing Yayoi Kusama installations, and leads weekly art‑therapy workshops at a community health clinic, all while they collect prints by contemporary illustrator Kehinde Wiley.
  travel: Linda Hastie prefers spontaneous, narrative‑driven trips, often hopping a train to historic Savannah squares or Charleston’s French Quarter, dreaming of a sunrise in Kyoto’s Arashiyama bamboo
    grove, planning itineraries loosely with a dedicated travel fund, and they occasionally compromise by booking last‑minute discount flights.
  culinary: Linda Hastie enjoys cooking inventive dishes such as roasted heirloom carrot and quinoa bowls with cilantro‑lime dressing, beet‑infused gnocchi tossed in sage brown butter, and spiced shakshuka
    with fresh tomatoes and labneh, mastering a comfortable hobbyist level in the kitchen while sometimes over‑salting due to a love of bold flavors.
  core: Linda Hastie is a curiously flexible nurse‑artist who blends clinical care with creative storytelling, prefers spontaneous plans, and occasionally forgets to file paperwork on time.
background:
  cultural: Linda was born and raised in the suburban outskirts of Atlanta, Georgia, in a middle-class family that valued community, church gatherings, and an appreciation for music and literature. She
    earned a bachelor's degree in arts and humanities from Emory University before completing her nursing certification at Georgia State University. Living in a culturally diverse city has expanded her
    worldview, encouraging inclusivity and openness to varied traditions. This Southern upbringing, combined with exposure to Atlanta's multicultural environment, informs her compassionate yet pragmatic
    approach to patient care and community engagement.
