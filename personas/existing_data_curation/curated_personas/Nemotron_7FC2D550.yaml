  career_goals: Linda aims to transition into a leadership role that blends nursing with the arts. She plans to enroll in a Master of Science in Nursing program with a focus on community health and integrative
    care, enabling her to design and lead an art-infused health outreach program for seniors and chronic-ill patients in Atlanta. Her long-term ambition is to become a nurse educator and researcher, publishing
    studies on the impact of creative therapies on patient outcomes. She also hopes to secure funding for a community center that offers workshops in painting, music, and movement as part of holistic wellness,
    while maintaining a flexible schedule that allows her regular solo creative practice and time with family.
