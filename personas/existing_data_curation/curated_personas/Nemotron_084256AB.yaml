  hobbies: '["abstract watercolor painting","speculative fiction reading","philosophy exploration","landscape photography","hiking in the Columbia River Gorge","strategic board games (e.g., Terraforming
    Mars, Catan)","creative short story writing"]'
  career_goals: Gabriella aims to transition from a clerk role to a supervisory position in billing operations within the next three years, leveraging her organizational strengths to lead a team that improves
    efficiency and reduces claim denials. She plans to earn a bachelor's degree in Business Administration and acquire a Certified Professional Biller (CPB) credential. Ultimately, she envisions shaping
    billing policies at a regional healthcare organization and possibly consulting for small clinics to implement innovative, tech-driven billing solutions.
