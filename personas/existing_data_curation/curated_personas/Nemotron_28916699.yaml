  hobbies: '[''Bridge club'', ''Community gardening'', ''Volunteer work at historical society'', ''Group hikes'', ''Model airplane building'', ''Vintage radio restoration'', ''Italian cooking'', ''Digital
    photography'', ''Reading historical non-fiction'', ''Chess'']'
  career_goals: Despite being retired, Andrew aims to stay mentally active and socially engaged by developing low‑cost workshops on basic electronics and woodworking for senior citizens, deepening his knowledge
    of sustainable gardening and native plants, and authoring a memoir that weaves together his technical career, personal reflections on resilience, and family recipes. He also aspires to improve his emotional
    well‑being through mindfulness practice, regular therapy, and a steady schedule of social activities that mitigate his anxiety and sadness. Additionally, he hopes to volunteer as a mentor for local
    high‑school STEM clubs, sharing his experience while staying connected to emerging ideas.
