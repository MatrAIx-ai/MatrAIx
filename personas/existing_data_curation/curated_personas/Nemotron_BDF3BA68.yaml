personas:
  professional: Beatricia Fields is a community development specialist who blends event‑planning expertise, data analysis, and detail‑oriented coordination to deliver socially engaging programs, channeling
    their competitive drive and skeptical eye into rigorous quality control while their calm resilience steadies their teams.
  sports: Beatricia Fields energizes their week with high‑energy Zumba sessions at the local community center, weekend hikes in Uwharrie National Forest, and cheering for the Charlotte Hornets, Carolina
    Panthers, and Charlotte FC, while they also belong to the Charlotte Striders running club for seasonal 5K races.
  arts: Beatricia Fields channels their creativity through community theatre productions, drawing inspiration from Alvin Ailey’s choreography, Beyoncé’s vocal power, and Lin‑Manuel Miranda’s storytelling,
    which fuels their sociable energy and competitive spirit on stage.
  travel: Beatricia Fields prefers meticulously planned weekend getaways to nearby gems like Asheville and the Outer Banks, yet dreams of a vibrant cultural immersion in Kingston, Jamaica, balancing their
    love for structured itineraries with occasional spontaneous detours on longer vacations.
  culinary: Beatricia Fields, an enthusiastic home cook, masterfully blends Southern staples such as collard greens and sweet potato pie with Afro‑Caribbean flavors like jerk chicken, plantain fufu, and
    Scotch bonnet pepper, often hosting potluck events that double as community fundraisers.
  core: Beatricia Fields is a highly organized, sociable planner who thrives on group energy, approaches life with calm confidence, and harbors a competitive streak that fuels both their community projects
    and careful financial tracking, even if they occasionally neglect routine dental visits.
background:
  cultural: Beatricia is an African-American woman born and raised in Charlotte, North Carolina, with family roots tracing back to the Great Migration from the rural South. Her upbringing was shaped by
    a close-knit church community that emphasized collective responsibility, gospel music, and celebration of Black heritage. She grew up participating in local events such as Juneteenth parades and the
    Charlotte Black Film Festival, which fostered a strong sense of cultural pride. The Southern culinary traditions of her family, combined with influences from Caribbean relatives, have informed her love
    for food and communal gatherings. This cultural backdrop informs her commitment to uplifting her community through organized, inclusive events.
