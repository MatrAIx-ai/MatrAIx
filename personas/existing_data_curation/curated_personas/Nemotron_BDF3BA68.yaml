    National Forest'']'
  career_goals: Beatricia aims to turn her organizational talent into a sustainable career by securing a full-time role in community development or nonprofit program management within the next two years.
    She plans to complete her bachelor's degree in Business Administration or Public Policy, earn a project-management certification, and eventually lead a regional youth services program. In the longer
    term she envisions launching her own event-planning consultancy that specializes in culturally relevant community celebrations, using her competitive drive to grow a reputable brand.
