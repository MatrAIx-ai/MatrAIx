  hobbies: '[''fishing'', ''birdwatching'', ''gardening'', ''woodworking'', ''reading non-fiction'', ''journaling'', ''listening to instrumental music'', ''solving crossword puzzles'', ''watching nature
    documentaries'']'
  career_goals: Robert aims to complete his associate degree in business administration and earn an IT support certification so he can secure a part‑time remote administrative role that offers a predictable
    routine and low stress. He also hopes to transform his woodworking hobby into a modest home‑based business selling handcrafted items, providing both creative fulfillment and supplemental income. Improving
    his mental well‑being through structured daily habits and stress‑management techniques is a central ambition, as is maintaining reliable contributions to his community through volunteer work.
