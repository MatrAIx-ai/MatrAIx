persona_description: A scientist and engineer who specializes in hurricane modeling and coastal flooding prediction. He is particularly skilled in high-resolution modeling and forecasting, and has developed
  a computer model that can simulate water levels to within 6-8 inches of those observed in New York City and surrounding areas during Hurricane Sandy's approach and landfall in late October 2012. His team,
  led by Professor Harry Wang of William & Mary's Virginia Institute of Marine Science, has conducted a study to demonstrate the ability of their model to predict a hurricane's storm tide at the level of
  individual neighborhoods and streets, a much finer scale than current operational methods.
