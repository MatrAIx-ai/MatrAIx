  hobbies: '[''Reading historical non-fiction'', ''Gardening'', ''Knitting'', ''Birdwatching'', ''Puzzle solving'', ''Cooking family recipes'', ''Local history research'', ''Walking in nature trails'']'
  career_goals: Kasie aims to advance from senior sales associate to store supervisor, where she can apply her organizational strengths to oversee daily operations while mentoring newer employees. She values
    stability and prefers a role that preserves her current work‑life balance, so she seeks incremental leadership responsibilities rather than a rapid climb. Long‑term, she hopes to transition into a part‑time
    consulting position, helping nearby small retailers streamline their inventory and customer service processes, allowing her to stay engaged in the industry while enjoying a quieter, more flexible schedule
    before retirement.
