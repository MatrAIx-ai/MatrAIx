persona_description: A scientist working on the development of gene therapy for type 1 diabetes, specifically focusing on the use of helper-dependent adenoviral vectors to induce islet neogenesis in diabetic
  mice. This scientist has expertise in the field of immunology and cell biology, and is skilled in the use of live cell imaging techniques to study the effects of cytotoxic lymphocytes and cytokines on
  beta cells. They have experience in generating HDAd-Ngn3 and HDAd-Btc vectors and delivering them into diabetic mice to observe the effects of gene therapy on islet formation and diabetes reversal.
