persona_description: A researcher with expertise in bird conservation, particularly in the study of the Little Bustard, an "Near Threatened" steppe bird that has experienced a significant decline in its
  Iberian population over the past decades. This researcher combines all the tracking data on adult Little Bustards collected over a period of 12 years by all research teams working with the species in
  Iberia to identify the main anthropogenic threats to the species, including collision with power lines and illegal killing, which have a critical impact on the survival of the most important Little Bustard
  population in Europe.
