personas:
  professional: Giang Tran, a 17‑year‑old aspiring software developer, leverages meticulous planning, collaborative teamwork, and bilingual communication to design functional, community‑focused applications
    while leading school robotics projects and organizing tech‑outreach events.
  sports: Giang Tran plays on the local high‑school soccer team, spends evenings skateboarding at Riverside Skate Park, roots for the Chicago Blackhawks in hockey and the LA Galaxy in soccer, and follows
    a weekly workout plan that blends team drills with solo skate practice to stay fit.
  arts: Giang Tran grooves to Kendrick Lamar and BTS, creates digital fan art of their favorite K‑pop groups using Adobe Photoshop, enjoys late‑night gaming streams, and watches indie films by directors
    like Taika Waititi for creative inspiration.
  travel: Giang Tran plans budget‑friendly road trips to Shenandoah National Park during school breaks, dreams of exploring Kyoto’s historic temples and Seoul’s tech districts, and prefers detailed itineraries
    that balance cultural immersion with travel hacks for a teenage traveler.
  culinary: Giang Tran masterfully simmers phở broth with star anise, ginger, and fish sauce, assembles bánh mì sandwiches with fresh cilantro and pickled carrots, and occasionally experiments with spicy
    ramen topped with soft‑boiled eggs and sriracha.
  core: Giang Tran merges methodical code building with spontaneous skate tricks, never misses a weekly gaming session even when homework piles up, and habitually forgets to water their houseplants, leading
    to a jungle of wilted succulents.
background:
  cultural: Giang is a second-generation Vietnamese-American raised in Medford, New Jersey. His household blends Vietnamese traditions—such as celebrating Tet, cooking family recipes, and speaking Vietnamese
    at home—with typical American experiences, from school sports to local community events. He navigates both cultures, valuing the emphasis on family and education from his heritage while engaging fully
    in the diverse social fabric of his suburban environment.
attributes:
  skills: '[''Team collaboration'', ''Event planning'', ''Basic Python programming'', ''Computer hardware troubleshooting'', ''Bilingual communication (English-Vietnamese)'', ''Time management'', ''Graphic
    design basics'', ''Peer mentoring'']'
  hobbies: '[''Soccer'', ''Skateboarding'', ''Video gaming'', ''Computer building and customization'', ''Cooking Vietnamese dishes'', ''Listening to hip-hop and K-pop'', ''Robotics club'', ''Volunteering
    at community center'']'
  career_goals: Giang intends to complete his high school education through a GED program, pursue an associate degree in computer science at a community college, and eventually become a software developer
    specializing in applications that serve local non-profits. He also hopes to lead technology outreach programs that teach coding to middle-school students in his community.
