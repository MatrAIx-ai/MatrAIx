personas:
  professional: An aspiring junior naturalist named Annie Hopkins, who loves exploring nature trails and conducting simple experiments, blends curiosity with practical hands‑on methods, making them a budding
    problem‑solver even in school science projects, and they often share their discoveries with classmates.
  sports: Annie Hopkins enjoys casual mini‑golf outings with family, follows the Jacksonville Jaguars for football, cheers on the Jacksonville Jumbo Shrimp during baseball season, and they play in the St.
    Johns Youth Soccer Club’s after‑school league.
  arts: Annie Hopkins channels their love for nature into detailed sketches of birds and seashells while listening to Taylor Swift’s pop hits and Ed Sheeran’s acoustic ballads, and they often draw inspiration
    from the whimsical illustrations of Eric Carle and the colorful LEGO sets they assemble.
  travel: Annie Hopkins prefers spontaneous weekend day trips to nearby shells‑laden beaches and the Everglades National Park, and they dream of a family road‑trip to Yellowstone’s geysers and a summer
    vacation at the historic streets of St. Augustine.
  culinary: Annie Hopkins enjoys a simple menu of buttery grilled cheese sandwiches, creamy mac and cheese, and fresh fruit salads featuring pineapple chunks and juicy strawberries, and they love helping
    stir the chocolate chips into homemade cookie dough on rainy afternoons.
  core: Annie Hopkins is a curious, solitary explorer who collects seashells, sketches wildlife, bursts into spontaneous LEGO builds, but they habitually misplace their crayons and resist any rigid schedule.
background:
  cultural: Annie is a white American growing up in Saint Johns County, Florida. Her family embraces the coastal lifestyle of the region, with frequent beach outings, seafood festivals, and appreciation
    for the local natural environment. She experiences typical Southern hospitality, valuing politeness, community involvement, and neighborly support. Family traditions include celebrating national holidays
    such as Thanksgiving and the Fourth of July, often with outdoor barbecues and fireworks. School field trips to historic sites like nearby St. Augustine and local nature preserves deepen her connection
    to Florida’s cultural and ecological heritage. The blend of suburban tranquility, outdoor recreation, and communal values shapes her worldview and daily life.
