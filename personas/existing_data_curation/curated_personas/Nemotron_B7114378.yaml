  hobbies: '[''Reading mystery books'', ''Exploring nature trails and beaches'', ''Collecting shells and observing wildlife'', ''Drawing and sketching'', ''Building LEGO sets'', ''Simple science experiments'',
    ''Listening to music while reading or drawing'', ''Playing mini‑golf with family'', ''Community garden volunteering'']'
  career_goals: Annie dreams of one day becoming a wildlife biologist or veterinarian so she can explore and protect the animals she loves. She also imagines herself as a teacher who can share curiosity
    and practical knowledge with younger children. In the near term, she hopes to win her school’s science fair with a project about plant growth, and she wants to learn more coding to create simple games
    that teach about nature. Through these ambitions, she aims to blend her curiosity with actionable, caring contributions to her community and the environment.
