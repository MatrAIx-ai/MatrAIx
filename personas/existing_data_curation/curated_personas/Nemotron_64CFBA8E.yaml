  hobbies: '[''Cooking traditional Guatemalan dishes'', ''Herb gardening'', ''Listening to classic Latin American music'', ''Walking/hiking in local parks'', ''Attending cultural festivals'', ''Reading
    culinary history books'', ''Watching soccer matches'']'
  career_goals: He aims to advance to a senior kitchen manager role within a larger restaurant group, eventually using his expertise to open a modest family‑run eatery that showcases authentic Guatemalan
    dishes. Audberto also plans to obtain an advanced food safety certification, mentor emerging kitchen professionals, and promote cultural pride through culinary education.
