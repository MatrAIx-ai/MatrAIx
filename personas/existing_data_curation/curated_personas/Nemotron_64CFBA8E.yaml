personas:
  professional: Audberto Caballero, a seasoned food‑service leader with more than thirty years of experience directing kitchen staff, enforcing strict food‑safety compliance, and seamlessly integrating
    the beloved flavors of his homeland into cost‑controlled menus, they apply their organized, routine‑oriented mindset and bilingual communication skills to drive operational efficiency for a growing
    restaurant group.
  sports: Audberto Caballero, an avid fan of Los Angeles Galaxy, they watch soccer matches with fellow expatriates on weekend evenings, join a local expat recreational league for Saturday afternoon kick‑abouts,
    and incorporate daily brisk walks in Griffith Park into their fitness routine to stay limber.
  arts: Audberto Caballero immerses themselves in classic Latin American music, frequently playing the soulful tunes of Mercedes Sosa, Violeta Parra, and Carlos Gardel while attending community cultural
    festivals that celebrate traditional dance and storytelling, letting those melodies shape their evenings.
  travel: Audberto Caballero favors purposeful travel that blends cultural immersion and family budgeting, they have explored the historic markets of Oaxaca, the colonial plazas of a highland town in Central
    America, and take frequent weekend road trips to Santa Barbara and the coastal trails of Malibu, always planning trips around their work schedule and health considerations.
  culinary: Audberto Caballero delights in preparing aromatic stews like pepian, slow‑braised chicken jocon, hand‑rolled tamales, and fragrant plantain soup, they often harvest cilantro, oregano, and epazote
    from their modest herb garden, while their meticulous plating reflects their methodical nature, though they sometimes over‑salt dishes when caught up in the excitement of a gathering.
  core: Audberto Caballero blends three decades of kitchen mastery with a love for tradition and a methodical routine, they exhibit a modest flair for splurging on culinary luxuries while navigating mild
    health concerns and a careful financial mindset.
background:
  cultural: Audberto is a first‑generation Guatemalan immigrant who grew up in a close‑knit Latino community in Los Angeles. He maintains strong ties to his heritage through language, food, and participation
    in community celebrations such as the Guatemalan Independence Day Parade. Although never married, he values extended family connections and frequently shares meals with relatives and friends, preserving
    traditions like making tamales and sharing Guatemalan folklore.
attributes:
  skills: '[''Food service supervision'', ''Food safety compliance (ServSafe certified)'', ''Inventory and cost control'', ''Menu planning and development'', ''Staff training and mentorship'', ''Bilingual
