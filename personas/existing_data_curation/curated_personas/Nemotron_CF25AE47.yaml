personas:
  professional: Wendy Pierluisi, a seasoned HVAC mechanic with three decades of hands‑on experience, combines a methodical, safety‑first approach with a talent for training apprentices, and now channels
    that reliability into mentoring and energy‑efficiency consulting for historic New Orleans homes, where they apply the same disciplined standards that earned them a reputation for safety.
  sports: Wendy Pierluisi enjoys early‑morning walks along the Lake Pontchartrain levee, is an avid member of the local Lake Anglers Club, follows the New Orleans Saints and Pelicans religiously, and practices
    casual fishing as both recreation and light exercise, while occasionally joining a senior shuffleboard league at the community center, where they appreciate the camaraderie.
  arts: Wendy Pierluisi attends intimate jazz nights at the Carousel Bar, treasures recordings by Louis Armstrong and Wynton Marsalis, reads historical fiction by Anne Rice set in 19th‑century New Orleans,
    and spends quiet evenings crocheting blankets inspired by the textures of Southern quilts, finding creative balance between craftsmanship and cultural heritage, which they consider a soothing counterpoint
    to the technical demands of their trade.
  travel: Wendy Pierluisi prefers road trips to nearby Gulf Coast towns like Biloxi and Gulfport, has visited the historic French Quarter repeatedly, dreams of a spring weekend in Savannah’s squares, and
    enjoys planning trips with a detailed itinerary that includes museum tours, local Cajun eateries, and leisurely sunrise watching from levee overlooks, which they organize months in advance to maximize
    comfort.
  culinary: Wendy Pierluisi loves cooking hearty gumbo, jambalaya, and crawfish étouffée with home‑grown thyme, oregano, and fresh tomatoes, skillfully balances bold Cajun spices with the subtlety of Creole
    seasoning, and often hosts family gatherings where the kitchen fills with the aroma of simmering roux, though they sometimes over‑salt dishes in their enthusiasm, a habit they attribute to a love of
    bold flavors.
  core: Wendy Pierluisi blends a disciplined trade career with a love for garden herbs, jazz, and low‑key fishing, all while meticulously budgeting and managing hypertension, turning structure into a comforting
    rhythm for a vibrant, community‑rooted later life, which they cherish.
background:
  cultural: Wendy comes from a white, Italian‑American family that settled in New Orleans generations ago. Raised in a Catholic household, she grew up with the traditions of both her Italian heritage—such
    as family meals and respect for craftsmanship—and the vibrant multicultural fabric of New Orleans, including its music, cuisine, and community festivals. While she enjoys iconic local celebrations like
    Mardi Gras and Creole cuisine, she also values the quieter customs of her neighborhood, such as parish potlucks and neighborhood block parties. This blend of Mediterranean familial values and Southern
    Gulf Coast culture informs her pragmatic outlook, strong sense of community responsibility, and appreciation for the city’s unique blend of history and modern living.
attributes:
  skills: '[''HVAC system installation'', ''Preventive maintenance planning'', ''System troubleshooting and diagnostic testing'', ''Refrigeration cycle analysis'', ''Electrical wiring and control system
    programming'', ''Energy‑efficiency retrofitting for historic homes'', ''Compliance with Louisiana building codes and safety standards'', ''Project budgeting and cost estimation'', ''Customer service
    and client communication'', ''Apprentice mentoring and on‑the‑job training'', ''Use of diagnostic equipment and software tools'', ''Understanding of New Orleans climate impacts on HVAC performance'']'
  hobbies: '[''Gardening'', ''Cooking Creole and Cajun dishes'', ''Reading historical fiction'', ''Attending jazz concerts'', ''Walking along the Mississippi River levee'', ''Volunteering at community energy
    workshops'', ''Crocheting'', ''Fishing on Lake Pontchartrain'', ''Participating in local church charity events'', ''DIY home‑improvement projects'']'
  career_goals: As she approaches retirement, Wendy plans to transition from full‑time field work to a mentorship and consulting role. She aims to obtain the NATE Master Specialist certification and become
    a certified Energy Auditor so she can advise homeowners on reducing utility costs while preserving the historic character of New Orleans properties. Over the next five years, she hopes to lead a small
    team of junior technicians, develop a community workshop on energy‑conservation for senior residents, and eventually establish a boutique consulting firm that focuses on sustainable HVAC solutions for
    low‑income neighborhoods. Her goals are structured around maintaining a predictable income stream, preserving her reputation for reliability, and leaving a legacy of skilled tradespeople in the local
    industry.
