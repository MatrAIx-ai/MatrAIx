personas:
  professional: Anika Dixon, a budding community organizer and strategic thinker, channels the structure they crave into planning church youth events and leading their middle school basketball team while
    using their love for strategy video games to anticipate challenges and keep projects on schedule.
  sports: Anika Dixon, a point guard on their middle school basketball team and a devoted fan of the Kentucky Wildcats and Louisville Cardinals, spends afternoons practicing dribbling drills, attends local
    youth dance workshops for flexibility, and follows the seasonal schedule of high school football to stay connected to community sport culture.
  arts: Anika Dixon, an avid sketcher and choir vocalist, fills their sketchbook with detailed drawings of neighborhood streets while listening to R&B icons like Beyoncé and Alicia Keys for inspiration,
    and devours realistic YA novels by authors such as Angie Thomas and John Green to fuel both creativity and emotional processing.
  travel: Anika Dixon, an adventurous teen who loves short road trips, has visited Nashville for its live music scene and New Orleans for its cultural festivals, dreams of exploring Washington, D.C.’s historic
    museums, and meticulously plans each journey using Google Maps to balance school commitments with family travel.
  culinary: Anika Dixon, a budding home chef, spends weekends mastering Southern soul food staples like fried chicken, collard greens simmered with smoked ham hocks, and peach cobbler, while experimenting
    with new spice blends and perfecting the crumbly texture of homemade cornbread.
  core: Anika Dixon balances a love for structure, community service, and creative expression while navigating teenage anxieties with disciplined planning, occasional late‑night gaming, and a steadfast
    devotion to family traditions.
background:
  cultural: Anika’s cultural background is shaped by her African‑American heritage and her upbringing in the small‑town environment of La Grange, Kentucky. Her family places a strong emphasis on community,
    faith, and education, with regular involvement in the local church where she participates in youth activities and the choir. Family gatherings often feature traditional Southern soul food and music,
    and stories of resilience passed down from older generations reinforce her values of kindness and cooperation. While she navigates a predominantly white community, her cultural identity is reinforced
    through friendships within the local Black community, participation in events such as Juneteenth celebrations, and an appreciation for African‑American literature and music.
