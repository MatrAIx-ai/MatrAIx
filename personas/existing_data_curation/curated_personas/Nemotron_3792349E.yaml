  career_goals: Anika aims to graduate high school with strong grades and pursue higher education in a field that offers stability and the chance to help others, such as nursing or elementary education.
    She envisions becoming a registered nurse who works in community health or an elementary school teacher who creates a supportive and structured learning environment. To prepare, she seeks leadership
    opportunities in her school’s student council, wants to develop advanced organizational skills, and plans to learn stress‑management techniques that will enable her to support both herself and future
    peers.
