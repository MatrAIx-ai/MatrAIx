  hobbies: '[''Reading historical fiction and genealogy'', ''Flower gardening'', ''Gospel and jazz listening'', ''Prayer group'', ''Knitting circle'', ''Neighborhood walks with rescue dog'', ''Gratitude
    journaling'', ''Documentary watching'']'
  career_goals: Although retired, Rachel aims to deepen her influence in Salem by expanding her volunteer work. She plans to mentor teenagers through a local after‑school program, preserve oral histories
    of the town’s African‑American community, and coordinate a senior‑friendly meal‑delivery service. She also hopes to compile a family cookbook and write a short memoir that captures her experiences growing
    up during the civil‑rights era, leaving a tangible legacy for her grandchildren.
