  hobbies: '[''Visiting art galleries and museums'', ''Photography'', ''Community theater'', ''Group fitness (yoga, pilates)'', ''Hiking and trail walking'', ''Cooking and hosting dinner parties'', ''Volunteering
    with historical society'', ''County fair organization'', ''Book club participation'']'
  career_goals: Brianna aims to become a senior claims manager within the next five years, overseeing a regional team and guiding complex catastrophe responses. She plans to earn the Chartered Property
    Casualty Underwriter (CPCU) and Associate in Claims (AIC) designations to deepen her technical expertise. Leveraging her interest in data-driven decision‑making, she intends to spearhead the integration
    of analytics tools into the claims workflow to improve accuracy and speed. Brianna also aspires to develop a comprehensive training program for new adjusters, sharing her creative problem‑solving techniques.
    Long term, she sees herself transitioning into a risk‑management or underwriting role where she can blend her operational insights with strategic planning, while continuing to contribute to industry
    publications and speaking at insurance conferences.
