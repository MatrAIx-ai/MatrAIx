persona_description: A political philosopher who specializes in the theory of meritocracy, class conflict, and the role of education in shaping societal attitudes towards success. His research focuses on
  the relationship between economic inequality and the polarization of American politics, and he has written extensively on the impact of meritocratic ideals on society. He is particularly concerned with
  the way in which the college-educated have a bias against less educated people, and he argues that this bias is a symptom of a broader problem with the current system of education and the way it rewards
  those who are already privileged.
