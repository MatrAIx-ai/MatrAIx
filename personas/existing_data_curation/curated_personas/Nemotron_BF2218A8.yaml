personas:
  professional: Victor Sheppard, a budding three‑year‑old architect in the making who loves constructing elaborate block towers, demonstrates early spatial reasoning and problem‑solving skills, blending
    a disciplined love of familiar LEGO sets with spontaneous experimentation, and handles each play session with calm practicality despite occasional messiness.
  sports: Victor Sheppard, a three‑year‑old who participates in a local toddler soccer league on Saturday mornings and attends a beginner’s swimming class at the community pool, enthusiastically cheers
    for the nearby Chicago Cubs during family TV nights, and prefers small‑group activities over chaotic playground games.
  arts: Victor Sheppard, who passionately engages in finger‑painting with Crayola colors, loves dancing to children's musician Laurie Berkner and humming classic Beatles songs, and frequently requests storytime
    featuring Mo Willems books, allowing the arts to shape their playful imagination.
  travel: Victor Sheppard, who has taken a family road‑trip to the Grand Canyon, visited the local aquarium, dreams of exploring Disneyland in Orlando and someday seeing the Great Barrier Reef, and prefers
    short, well‑planned outings over long, unstructured vacations.
  culinary: Victor Sheppard, who delights in creamy macaroni‑and‑cheese, picky about vegetables but loves banana slices and strawberry‑yogurt, can usually assemble a peanut butter‑and‑jelly sandwich with
    minimal help, and habitually requests chicken nuggets with ketchup for lunch.
  core: Victor Sheppard, a three‑year‑old who thrives on predictable daily routines yet occasionally bursts into spontaneous curiosity, clings to a comfort blanket while calmly navigating sudden surprises,
    and habitually sneaks an extra cookie before dinner.
background:
  cultural: Victor is a White child raised in Henrico County, Richmond, Virginia. His family follows Southern traditions such as Sunday church services, family meals featuring Southern cuisine, and participation
    in community events like local fairs and Little League games. The cultural environment emphasizes politeness, respect for routine, and close‑knit family ties, which influence Victor’s preference for
    familiar activities and small‑group interactions.
