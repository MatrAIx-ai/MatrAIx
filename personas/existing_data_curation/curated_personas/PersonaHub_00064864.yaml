persona_description: A researcher at Cardiff University, UK, who specializes in the study of oral and nasal cavity conditions and has conducted research on the effectiveness of mouthwashes in removing the
  novel coronavirus from human saliva. The researcher has published studies suggesting that this type of fluid can suppress different types of coronavirus, including SARS-CoV-2, which is causing the pandemic.
  The researcher is currently conducting a clinical trial with patients at Cardiff hospital to determine the effectiveness of mouthwashes in treating the virus.
