personas:
  professional: Prince Sanders is a seasoned psychiatric technician with over three decades of experience in inpatient and community mental-health settings, known for his meticulous documentation in Epic
    and Cerner, precise medication administration, and his imaginative design of art-based therapeutic activities that fuse abstract watercolors with mindfulness exercises; they also mentor new staff through
    disciplined, culturally attuned training sessions.
  sports: Prince Sanders is an avid supporter of the New York Knicks and the New York Giants, rarely missing a home game broadcast; they balance their fandom with a personal fitness regimen that includes
    three weekly walks along the Passaic River walkway, membership in a senior bowling league at the Kinsman Centre, and occasional low-key participation in a community softball team for seniors.
  arts: Prince Sanders spends evenings painting abstract watercolors that swirl with bold blues and oranges, draws inspiration from the improvisational styles of John Coltrane, Miles Davis, and B.B. King,
    and channels that energy into gentle piano improvisations, while they also write reflective poetry influenced by the lyrical depth of Maya Angelou and read speculative fiction by Octavia Butler and
    Philip K. Dick, regularly attending exhibitions at the Newark Museum of Art and the annual Jazz & Blues Festival.
  travel: Prince Sanders prefers thoughtfully planned trips that combine cultural immersion with personal reflection, having journeyed to New Orleans for the Mardi Gras jazz parades, explored Charleston's
    historic district during the spring, spent a week on a family-owned farm in Jamaica sampling local cuisine, and visited Washington D.C. to tour the National Museum of African American History and Culture;
    they now dream of a serene art-focused pilgrimage to Paris's Musée d'Orsay, but the cost of airfare and accommodations often requires them to save diligently and prioritize off-season travel.
  culinary: Prince Sanders enjoys crafting soulful dishes such as shrimp étouffée brimming with paprika and fresh thyme, slow-cooked collard greens seasoned with smoked ham hocks, and sweet-potato pie spiced
    with cinnamon and nutmeg, often harvesting rosemary, basil, and mint from his balcony garden to finish meals, while they display a quirky habit of over-simmering gumbo until the roux turns a deep chocolate,
    which they blame on the radio playing too loudly during cooking.
  core: Prince Sanders weaves meticulous discipline with boundless imagination, and they guide their days with watercolor strokes, spreadsheet precision, and a heart tuned to community harmony.
background:
  cultural: Prince is an African‑American who grew up in Newark's East Ward during the 1970s, a period marked by vibrant local activism and strong church communities. Raised in a Baptist household, he was
    immersed in gospel music, storytelling, and the tradition of communal support that characterized his neighbourhood. His family's roots trace back to the Great Migration, and he carries a deep appreciation
    for the resilience and cultural contributions of Black Americans, from the Harlem Renaissance to modern civil‑rights movements. Newark's rich tapestry of Caribbean, African, and Southern influences
    shaped his palate and his love of jazz, blues, and seasonal festivals such as Juneteenth. These experiences inform his professional ethos, driving him to provide culturally competent care that acknowledges
    the systemic challenges faced by Black patients and honors their heritage.
attributes:
  skills: '[''Mental Health Assessment'', ''Crisis De‑escalation'', ''Medication Administration'', ''Electronic Health Record Management (Epic, Cerner)'', ''Therapeutic Activity Design (Art Therapy, Mindfulness)'',
    ''Group Facilitation (Small Groups)'', ''Clinical Documentation'', ''Care Coordination'', ''Patient Advocacy'', ''Staff Training and Mentorship'', ''Cross‑cultural Competence'', ''Time Management'',
    ''Creative Problem Solving'']'
  hobbies: '[''Abstract watercolor painting'', ''Reading speculative fiction and philosophy'', ''Listening to jazz and blues'', ''Playing piano'', ''Writing poetry'', ''Gardening'', ''Solving puzzles (crosswords,
    Sudoku)'', ''Visiting art galleries'', ''Volunteering at community art workshops for seniors'', ''Attending cultural festivals'']'
  career_goals: Looking ahead, Prince aims to formalize his interest in creative therapies by earning a certification in art therapy, allowing him to integrate structured artistic expression into routine
    psychiatric care. He plans to develop a community‑based mental‑health program in Newark that pairs evidence‑based treatment with workshops in painting, music, and storytelling, specifically targeting
    underserved Black adults. In parallel, he hopes to mentor the next generation of mental‑health professionals, sharing his disciplined work habits and his deep commitment to culturally sensitive, harmonious
    care. Ultimately, he envisions being recognized as a catalyst for innovative, compassionate mental‑health services within his community.
