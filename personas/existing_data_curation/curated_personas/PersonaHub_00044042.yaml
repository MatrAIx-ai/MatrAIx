persona_description: An ecologist who specializes in the study of salmon populations, particularly the identification and differentiation of feral and escapee Atlantic salmon. The person is interested in
  developing a practical and scientifically defensible technique for distinguishing feral Atlantic salmon from aquaculture escapees for all age classes, based on the microstructure patterns formed throughout
  the life history of the fish. This person has extensive knowledge and experience in otolith analysis, and is seeking to apply this technique to the specific context of Atlantic salmon populations.
