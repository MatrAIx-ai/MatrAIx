  career_goals: Nora aims to build a career in community outreach or nonprofit program coordination, where she can blend her curiosity about social issues with practical, people‑focused solutions. Over
    the next few years she plans to complete her bachelor’s degree in sociology or public health, secure an internship with a local charitable organization, and eventually become a program manager overseeing
    youth services or community health initiatives in the Chicago metropolitan area.
