personas:
  professional: Sandra Morris, a budding LEGO architect, thrives on step-by-step manuals and clear building instructions, channeling her love for structure into intricate brick creations while confidently
    leading group play, and they occasionally leave scattered bricks behind when excitement takes over.
  sports: Sandra Morris plays forward for the local Sunshine Kids Soccer Club, eagerly mimics Manchester United's passing style in weekend games, enjoys swimming lessons at the community pool for cardio,
    and they relish the routine of warm-ups while occasionally skipping scheduled drills when a new LEGO set beckons.
  arts: Sandra Morris paints vivid fantasy landscapes inspired by the whimsical illustrations of Mary Blair and the bright colors of Pixar's Inside Out, dances to energetic Kidz Bop versions of Taylor Swift,
    and they love drawing animals after watching National Geographic Kids videos, though they sometimes lose focus and doodle unrelated scribbles.
  travel: Sandra Morris prefers organized day trips with clear itineraries, such as weekend visits to the city zoo and family camping weekends at the nearby state park, yet they also daydream about future
    adventures to Disney World and the Grand Canyon, balancing comfort of familiar routes with occasional spontaneous nature walks.
  culinary: Sandra Morris delights in baking chocolate chip cookies with melted butter and a pinch of sea salt, decorating cupcakes with buttercream frosting and rainbow sprinkles, and they love helping
    stir spaghetti sauce made from tomatoes, garlic, basil, and oregano, even if they sometimes sneak extra frosting onto a plate.
  core: Sandra Morris is a bright, energetic seven-year-old who mixes a love for structured LEGO builds with spontaneous soccer games while navigating frequent waves of anxiety that sometimes turn playtime
    into an emotional roller coaster, and they often find calm by humming a favorite tune.
background:
  cultural: Sandra comes from a middle‑class, white, suburban family in Riverview, Florida. Her family celebrates mainstream American holidays such as Thanksgiving and Christmas, often incorporating foods
    from the broader Florida region like fresh fruit and seafood dishes. They enjoy frequent trips to the beach and local parks, reflecting the outdoor‑focused lifestyle of the area. The family attends
    a local community church, emphasizing values of kindness, service, and education. Sandra is exposed to the diversity of Hillsborough County through school and neighborhood interactions, which encourages
    openness and curiosity about different cultures. Her parents place a strong emphasis on school achievement, politeness, and community involvement, while also passing down traditions like gardening with
    grandparents and weekend family barbecues.
