  career_goals: Sandra often talks about wanting to become a teacher because she likes the idea of a structured classroom where she can help other kids learn and feel safe. She also dreams of being a veterinarian,
    inspired by her love for animals and her desire to care for pets that feel sad or hurt. Occasionally she mentions wanting to be a firefighter, imagining the excitement of helping people in emergencies
    and keeping her community safe.
