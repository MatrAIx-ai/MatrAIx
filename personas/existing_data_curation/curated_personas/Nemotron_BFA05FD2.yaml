  hobbies: '[''Drawing and comic creation'', ''LEGO building'', ''Scratch coding'', ''Reading graphic novels and adventure books'', ''Puzzle solving (kid-friendly Sudoku, riddles)'', ''Strategic video games'',
    ''Nature walks and insect/rock collecting'']'
  career_goals: Frank dreams of turning his love for art and invention into a future career, hoping one day to become a concept artist or video-game designer who can bring new worlds to life. He also imagines
    himself competing in science fairs and robotics contests, aiming to earn top prizes that could lead to an eventual role as a young engineer or inventor. In the short term, he wants to win his school's
    art competition and create a comic strip that his friends will share.
