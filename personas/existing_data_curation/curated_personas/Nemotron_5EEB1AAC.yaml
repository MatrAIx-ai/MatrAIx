  hobbies: '["Gardening", "Quilting", "Cooking Southern cuisine", "Hiking in the Piedmont", "Reading self-help literature", "Journaling", "Church choir", "Volunteer work at community garden", "Woodworking",
    "Listening to classic country music"]'
  career_goals: Sherryl aims to transition from a labor‑intensive role to a supervisory position within the next two years, targeting a foreman or site‑safety officer role. She plans to complete her NCCER
    Level I certification and a specialized OSHA 30‑hour refresher to bolster her credentials. Her long‑term ambition is to establish a small, family‑run subcontracting business focused on residential renovations,
    allowing her to set a predictable work schedule that mitigates her anxiety. She also hopes to develop a mentorship program for younger workers at her current employer, emphasizing mental‑health awareness
    and safety. Financially, she is focused on securing a stable retirement fund while maintaining enough flexibility to balance work demands with her need for personal downtime.
