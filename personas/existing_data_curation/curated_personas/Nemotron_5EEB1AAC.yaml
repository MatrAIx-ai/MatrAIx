personas:
  professional: Sherryl Sok, a 56‑year‑old seasoned construction professional, blends three decades of heavy‑equipment operation, blueprint interpretation, and OSHA‑certified safety expertise with a meticulous,
    structure‑loving mindset that makes them the go‑to troubleshooter on site and a natural mentor for newer crews.
  sports: Sherryl Sok enjoys weekend hikes with the Piedmont Hiking Club, tracks progress on a Garmin watch, follows the Charlotte Hornets and Carolina Panthers loyally, and participates in a local senior
    softball league, balancing solitary trail walks with occasional team camaraderie.
  arts: Sherryl Sok expresses creativity through quilting inspired by traditional patterns, singing gospel hymns in the church choir alongside influences like Mahalia Jackson, and curates a modest collection
    of folk art prints from regional artist Jane B., finding solace and structure in each artistic pursuit.
  travel: Sherryl Sok prefers low‑key road trips to nearby destinations such as Asheville’s Blue Ridge Parkway, the historic streets of Charleston, SC, and the Shenandoah National Park, often planning itineraries
    around seasonal garden fairs and quiet hiking spots while staying within a modest travel budget to accommodate both family visits and personal downtime.
  culinary: Sherryl Sok savors Southern comfort foods like slow‑cooked collard greens, fried catfish, and peach‑glazed cornbread, often enhancing dishes with garden‑fresh tomatoes, okra, and sweet corn,
    and while they boast confident cooking skills, they occasionally over‑season dishes due to a love of bold flavors.
  core: Sherryl Sok merges a construction veteran’s disciplined work ethic with a garden‑rooted love for routine, battling anxiety through journaling and community singing, while meticulously planning every
    facet of life from finances to meals.
background:
  cultural: Sherryl was born and raised in a small town in central North Carolina and identifies with the region’s Southern cultural heritage. Her family’s roots trace back to several generations of white,
    Anglo‑American settlers who emphasized hard work, church attendance, and close‑knit community ties. Growing up in Rockingham County, she absorbed the values of modesty, self‑reliance, and respect for
    tradition that are common in rural Southern life. An active member of her local Methodist congregation, she participates in church events and community service, reflecting the region’s strong emphasis
    on fellowship and mutual support. Her upbringing also fostered a practical appreciation for the land, evident in her love of gardening and outdoor activities, and a deep connection to the local history
    and customs of Stoneville.
attributes:
  skills: '["Heavy equipment operation", "Blueprint reading", "Concrete forming", "Framing and carpentry", "Safety compliance (OSHA)", "First aid and CPR", "Project scheduling", "Budget tracking", "Team
