    and mentorship'', ''Knowledge of sustainable last‑mile delivery practices'']'
  hobbies: '[''Salsa dancing'', ''Volunteering at local cultural festivals'', ''Hiking in the San Gabriel Mountains'', ''Group fitness classes (Zumba, bootcamp)'', ''Cooking traditional Mexican cuisine'',
    ''Exploring new recipes and food trends'', ''Yoga and mindfulness meditation'', ''Journaling for mental‑health'', ''Urban photography during deliveries'', ''Playing recreational soccer with friends'']'
  career_goals: Maria aims to advance from courier to a supervisory role, such as a route coordinator or logistics team lead, within the next three years. She plans to complete a certification in supply
    chain management while working, positioning herself for a future transition into logistics planning or operations management. Long‑term, she envisions launching a community‑focused delivery service
    that partners with local Mexican-owned businesses, integrating eco‑friendly practices and providing employment opportunities for fellow residents of Rosemead. Her ambition is balanced by a desire for
    stable work hours that support her mental‑health routine.
