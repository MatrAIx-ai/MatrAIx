  career_goals: Ofelia dreams of helping others in a caring profession. She often says she wants to become a teacher because she loves sharing stories and helping classmates learn, or a pediatric nurse
    because she wants to take care of children when they are sick. She also imagines being a veterinarian to look after the animals she loves. In the short term, she hopes to volunteer as a “buddy” for
    new students at school and to organize small community events like a school book‑swap or a cultural fair that celebrates Mexican traditions.
