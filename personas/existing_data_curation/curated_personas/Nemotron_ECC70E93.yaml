personas:
  professional: A budding junior veterinarian hopeful, Ofelia Rodriguez blends their love for animal‑themed Lego builds with compassionate teamwork on the school soccer field, nurturing dreams of caring
    for sick pets while balancing a habit of spontaneous sketching between structured study sessions.
  sports: A spirited youth soccer player, Ofelia Rodriguez anchors midfield for the Meadowbrook Junior Soccer Club, cheers for the LA Galaxy when not on the field, and keeps a seasonal habit of swimming
    at the community pool during summer breaks.
  arts: A vibrant budding cartoonist, Ofelia Rodriguez fills notebook pages with bright murals inspired by Bill Watterson’s Calvin and Hobbes and listens to upbeat pop from Carlos Vives while drawing, balancing
    structured panel layouts with spontaneous splashes of color.
  travel: An enthusiastic weekend explorer, Ofelia Rodriguez enjoys family drives to the nearby Sierra foothills, collecting leaves and mapping trails with a hand‑drawn journal, while dreaming of a summer
    trip to Disney World and a spring visit to the Grand Canyon.
  culinary: A budding home chef, Ofelia Rodriguez loves helping bake chocolate chip cookies and hand‑rolling tortillas, experimenting with ingredients like cinnamon, queso fresco, and cilantro, yet they
    sometimes add extra sugar to the dough when distracted by cartoon reruns.
  core: Ofelia Rodriguez is a compassionate, creatively‑wired 10‑year‑old who balances structured Lego builds and soccer drills with spontaneous bursts of cartoon art and sugary snack experiments, often
    forgetting to finish chores but always eager to help.
background:
  cultural: Ofelia comes from a Mexican‑American family that maintains strong ties to its roots. Her parents immigrated from Jalisco, Mexico, and Spanish is spoken at home. She celebrates Día de los Muertos
    with altars at home, enjoys traditional foods such as tacos, tamales, and pan de muerto, and participates in the local Hispanic community’s festivals in Culpeper. She attends a Catholic parish where
    she joins the youth group, and she balances Mexican family values—respect for elders, close family bonds, and communal sharing—with the expectations of her American school environment. Growing up in
    Orange County, Virginia, she experiences a blend of rural Virginian life and vibrant Mexican cultural practices.
