persona_description: A climate specialist who is a member of the 24 authors of a study published in the journal Nature, which concluded that China's emissions for 2013 were more like 9.13 billion metric
  tons, below the estimates by the European Union's Emissions Database for Global Atmospheric Research (Edgar) and the energy giant BP. The study also found that current estimates are overestimating CO2
  discharges from China in 2013 by between 10% and 14% because they use a formula to gauge the emissions that doesn't apply to China because of the lower-quality coal it uses, which contains 40% less carbon
  than coal used elsewhere. The study's authors carefully analyzed many of the kinds of coal used throughout China, gauging the quality of its combustibility and its carbon content. The study's conclusion
  is likely to be a key topic at negotiations scheduled for December in Paris about reaching a new global agreement on limiting emissions so that each participating countries can have a better idea about
  how much it must reduce its own CO2 discharges.
