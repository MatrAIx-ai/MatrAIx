persona_description: A historian who specializes in the history of the American West, particularly the conflicts between the United States and various Indian tribes. She is interested in the events leading
  up to the Mexican-American War and the subsequent migrations of the Kickapoo and other Indian tribes. She is also interested in the role of the U.S. government in dealing with these conflicts and the
  impact of these conflicts on the westward expansion of the United States.
