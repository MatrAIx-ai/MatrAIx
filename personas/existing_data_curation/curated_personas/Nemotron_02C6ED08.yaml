  career_goals: Jaime aspires to move into a supervisory accounting role within the municipal government or a regional accounting firm, where she can lead a team and shape financial policies for small enterprises.
    She plans to obtain the Certified Bookkeeper (CB) designation through night courses at the University of Puerto Rico's extension program, and eventually pursue a Certified Public Accountant (CPA) credential.
    Parallel to her professional advancement, she dreams of launching a boutique bookkeeping consultancy focused on serving artists, cultural organizations, and family‑run businesses in Corozal, combining
    her financial expertise with her love of the local arts scene. Mentoring young women in finance and fostering financial literacy in the community are also central to her long‑term ambitions.
