personas:
  professional: Ashwini Shah, a retired humanities scholar turned volunteer curator, leverages their methodical research skills and love for visual and literary arts to design intimate exhibitions, mentor
    emerging artists, and they champion the preservation of traditional artistic practices at a Phoenix cultural center.
  sports: Ashwini Shah, a gentle yoga enthusiast, attends twice‑weekly Vinyasa classes at a local studio, participates in low‑impact walking groups in the desert landscape, and they cheer for the Phoenix
    Suns during occasional basketball outings.
  arts: Ashwini Shah, an avid museum visitor and art‑history trivia competitor, explores classic works by Van Gogh and contemporary digital installations by Refik Anadol, and they regularly discuss pieces
    by Frida Kahlo, Ansel Adams, and Marina Abramović with their modest book club.
  travel: Ashwini Shah, an inquisitive traveler, has explored the historic forts of Rajasthan and the desert gardens of Arizona’s Sonoran region, and they dream of visiting Kyoto’s ancient temples and the
    galleries of Barcelona while balancing travel costs with a modest retirement budget.
  culinary: Ashwini Shah, a passionate home cook, experiments with dishes such as fragrant biryani, tangy chickpea tikka, and spiced lentil dal, carefully selecting turmeric, cumin, and mustard seeds, while
    they occasionally host tasting evenings for friends and Gurdwara volunteers.
  core: Ashwini Shah, a methodically curious retiree, blends disciplined research with a love for art and cuisine, quietly mentoring others while they guard a skeptical eye toward new ideas.
background:
  cultural: Ashwini was born into a Punjabi Sikh family in the Indian subcontinent and immigrated to the United States in her early adulthood. Her upbringing emphasized community service, respect for tradition,
    and a love for poetry and music. While she has fully embraced life in Tempe, Arizona, she maintains strong ties to her cultural roots through regular attendance at the local Gurdwara, celebrating Sikh
    festivals, and preserving family recipes. Her South Asian heritage informs her artistic sensibilities, her appreciation for storytelling, and her commitment to bridging cultural understanding in a multicultural
    environment.
attributes:
  skills: '["Art curation", "Cultural research", "Academic writing", "Project management", "Budget planning", "Public speaking (small groups)", "Intercultural communication", "Digital photography", "Sikh
