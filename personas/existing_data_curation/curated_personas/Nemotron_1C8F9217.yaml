  hobbies: '["Museum visits", "Reading literature", "Indian cooking", "Yoga", "Gardening", "Nature photography", "Small book club", "Volunteering at Gurdwara cultural events", "Exploring unconventional
    art forms", "Participating in art‑focused trivia competitions"]'
  career_goals: Although retired from formal employment, Ashwini aims to preserve and share South Asian artistic heritage in the Phoenix area. She plans to volunteer as a curator for a local cultural center,
    develop a mentorship program for emerging artists, author a memoir that intertwines personal history with art reflections, and organize an annual small exhibition highlighting under‑recognized South
    Asian artists. She also hopes to become a recognized speaker at community forums on cultural preservation.
