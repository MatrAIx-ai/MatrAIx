  hobbies: '[''Soccer (local youth league)'', ''Salsa and cumbia dancing'', ''Cooking Mexican cuisine'', ''Hiking and fishing around Worthington'', ''Volunteering at community center'', ''Multiplayer online
    gaming'']'
  career_goals: Juan aims to graduate with a BA in Humanities and then pursue a role in community development or cultural programming, ideally with a non‑profit organization serving Latino populations in
    the Upper Midwest. He aspires to become a community liaison or program coordinator, using his organizational strengths and bilingual abilities to design inclusive events, advocacy campaigns, and support
    services. In the longer term, he envisions obtaining a master’s degree in social work or public administration to expand his impact and eventually lead a community center or cultural heritage institute.
