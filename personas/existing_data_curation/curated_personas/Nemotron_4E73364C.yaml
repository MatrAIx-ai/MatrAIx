personas:
  professional: Juan Chaljub, a budding community development advocate, channels bilingual fluency, event‑planning acumen, and meticulous budgeting into coordinating inclusive cultural festivals and student
    gatherings, all while leveraging Instagram and Canva to amplify outreach for non‑profit programs.
  sports: Juan Chaljub’s athletic routine blends weekend soccer with the Worthington United Soccer Club, early‑morning hikes along Lake Shetek trails, and seasonal fishing trips for walleye, while cheering
    on the Minnesota Twins and the Minnesota Vikings for a dose of hometown pride.
  arts: Juan Chaljub embraces creative expression through salsa and cumbia dance workshops set to the beats of Celia Cruz and Carlos Vives, while also curating playlists that mix regional folk tunes with
    indie acts like Bon Iver, using Canva to design flyers for local art showcases.
  travel: Juan Chaljub prefers budget‑friendly road trips that combine adventure and cultural immersion, such as a weekend drive to the Boundary Waters for canoeing, a spring visit to Mexico City to reconnect
    with family recipes, and seasonal trips to Austin’s music festivals, all planned around academic breaks.
  culinary: Juan Chaljub is a capable home chef who masters tamales stuffed with pork and chilies, enchiladas smothered in mole sauce, and freshly mashed guacamole made with ripe Hass avocados, cilantro,
    and lime, while also experimenting with grilled Lake Shetek perch seasoned with lemon and dill.
  core: Juan Chaljub is a structured yet sociable 19‑year‑old who blends meticulous event coordination with a love for dancing, gaming, and community service, all while wrestling with chronic worry that
    fuels both careful planning and occasional over‑commitment.
background:
  cultural: Juan comes from a Mexican family that maintains strong ties to their heritage. He grew up speaking Spanish at home and celebrating traditions such as Día de los Muertos, Día de la Independencia,
    and family gatherings centered on Mexican cuisine. After moving to Worthington, Minnesota, he has integrated into the local Hispanic community, attending cultural events at the Mexican‑American community
    center and participating in bilingual church services. His cultural identity blends Mexican family values—respect for elders, communal solidarity, and hospitality—with the Midwestern emphasis on community
    involvement and volunteerism.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Public speaking'', ''Event planning and coordination'', ''Volunteer management'', ''Social media content creation'', ''Graphic design basics
