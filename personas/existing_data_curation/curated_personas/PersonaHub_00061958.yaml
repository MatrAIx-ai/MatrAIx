persona_description: A scientist or engineer who specializes in solid state physics and thermoelectricity, particularly in the development and optimization of thermoelectric devices for power generation
  and cooling applications. They are interested in understanding the nonlinear behavior of thermoelectric materials under applied biases and temperature gradients, and are skilled in using the Monte Carlo
  technique to simulate thermoelectric transport. They are also knowledgeable about the effects of temperature gradients on the Peltier coefficient and have experience with InGaAs thermoelectric materials,
  including the optimization of doping levels for maximum cooling power.
