  hobbies: '[''Cooking Southern cuisine'', ''Church choir singing'', ''Volunteering at community center'', ''Gardening'', ''Reading romance novels'', ''Hosting board game nights'', ''Walking in local parks'']'
  career_goals: Marie aims to secure a stable, full‑time administrative position—preferably within a nonprofit or community organization in Akron—where she can apply her organizational strengths and sociable
    nature. She plans to complete a GED and enroll in a vocational program for office administration to strengthen her credentials. Over the next five years, she hopes to advance to a program coordinator
    role that oversees community outreach initiatives. In the longer term, Marie dreams of launching a small catering business that offers traditional soul‑food dishes for local events, blending her love
    of cooking with her entrepreneurial aspirations.
