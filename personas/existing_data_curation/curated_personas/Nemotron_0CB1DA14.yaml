personas:
  professional: Eric Hately, a budding soccer enthusiast with a knack for teamwork and a budding interest in engineering, channels their curiosity and practicality into organizing mini-tournaments for friends
    while designing LEGO obstacle courses that mirror real-world problem solving.
  sports: Eric Hately sprints across the field as a forward for the Little Lions Junior Soccer Club, idolizes Lionel Messi, and proudly wears a jersey of the hometown professional team, the River City Rapids,
    while also cheering on the local basketball team, the Skyline Hawks, during weekend games, showing their enthusiasm for team spirit.
  arts: Eric Hately spends afternoons sketching bright rockets inspired by the artwork of Dr. Seuss, jamming along to the upbeat tunes of The Wiggles, and acting out favorite scenes from the animated movie
    Finding Nemo with LEGO figures, letting their imagination soar.
  travel: Eric Hately's travel diary lists a sunny day at Clearwater Beach, a museum adventure at the National Air and Space Museum in Washington, D.C., and a dreamed-for family road trip to the Grand Canyon,
    where they hope to collect rocks and shells for their growing collection.
  culinary: Eric Hately loves building their own snack plates of carrot sticks, hummus, and dinosaur-shaped chicken nuggets, proudly boasts the ability to spread peanut butter on toast without making a
    mess, and eagerly requests pizza with extra cheese and a pepperoni constellation topping they invented.
  core: Eric Hately is a curious, competitive six-year-old who balances building LEGO forts with sprinting on the soccer field, hoarding coins in a piggy bank, and obsessively cataloguing shells, all while
    occasionally neglecting bedtime brushing.
background:
  cultural: Eric grows up in Port Orchard, a close‑knit community on the Kitsap Peninsula of Washington State. His family participates in local traditions such as community fairs, library storytimes, and
    seasonal beach clean‑ups, fostering a sense of civic responsibility. The maritime setting, with nearby waterways and the presence of naval bases, nurtures his fascination with boats, marine life, and
    coastal ecosystems. While his household reflects typical middle‑class American values—emphasizing education, kindness, and independence—Eric also benefits from the region’s emphasis on outdoor recreation,
    which shapes his love for sports, exploration, and appreciation of the natural world.
