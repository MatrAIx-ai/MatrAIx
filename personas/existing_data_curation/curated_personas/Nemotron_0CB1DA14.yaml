  career_goals: Even at six, Eric dreams big. He imagines himself soaring among the stars as an astronaut, exploring space with the same curiosity he shows on the playground. He also loves the idea of becoming
    a firefighter, seeing it as a practical way to help others. On the field, he aspires to be a soccer star, channeling his competitive spirit and energy. Occasionally he talks about inventing cool gadgets
    that solve everyday puzzles, reflecting his critical and inventive mindset.
