  career_goals: Vincent aims to earn a bachelor’s degree in Computer Science within the next two years while continuing his role as a junior developer at a local tech firm. He aspires to become a full‑stack
    engineer, leading small, collaborative teams that build user‑centric applications. He is particularly interested in developing tools that support mental wellness and stress management, blending his
    technical curiosity with his personal experience of anxiety. In the long term, he hopes to mentor new developers and possibly launch a startup focused on accessible digital health solutions, while maintaining
    a balanced work‑life schedule that protects his well‑being.
