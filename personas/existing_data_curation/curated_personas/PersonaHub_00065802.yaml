persona_description: A member of the Pak Desh Council, responsible for making decisions and taking actions related to foreign policy, trade, defense, commerce, and communications between the two Wings.
  The Council President is expected to be fluent in both Urdu and Bangla and have a deep understanding of the cultural and historical context of the two Wings. The Council President will be a key figure
  in the promotion of Islam and cooperation between the two Wings in all possible means, including the establishment of joint embassies and diplomatic missions, visa offices, and a private or public limited
  company in either Wing. The Council President will also be responsible for ensuring that the interests of the two Wings are protected and that all decisions are taken in a transparent and democratic manner.
