personas:
  professional: Stephen Smith is a high‑school business instructor who blends his business education with a curiosity‑driven, practice‑oriented instructional design, creating project‑based curricula on
    Canvas and Tableau, and using strong public speaking, mentorship, and assertive yet cooperative facilitation to guide students toward real‑world entrepreneurship.
  sports: Stephen Smith follows the Washington Capitals in hockey and the Washington Nationals in baseball, plays casually with the Woodbridge Hiking Club and paddles with the Chesapeake Bay Kayak Collective,
    and builds fitness through weekend hikes along the Potomac River and regular kayaking sessions.
  arts: Stephen Smith strums acoustic covers of Bob Dylan and John Mayer while grilling, attends local theater productions at Arena Stage such as “Hamilton,” enjoys board‑game nights featuring Settlers
    of Catan, and unwinds with video‑game sessions of Stardew Valley.
  travel: Stephen Smith prefers low‑key road trips that blend nature and craft‑beer experiences, having camped in Shenandoah National Park, explored the historic streets of Boston, and dreaming of a bike‑tour
    along the Pacific Coast Highway to sample coastal breweries.
  culinary: Stephen Smith experiments with smoked brisket rubs infused with his own IPA, crafts honey‑mustard glazed pork ribs using smoked paprika and brown sugar, and pairs these dishes with homemade
    craft beers, showcasing a solid intermediate cooking skill set and a passion for smoke‑infused flavors.
  core: Stephen Smith is a curious yet laid‑back educator‑entrepreneur who balances project‑driven teaching with spontaneous outdoor adventures, a love of smoky grills, and a habit of occasional disorganization
    that fuels creative problem‑solving.
background:
  cultural: Stephen grew up in a middle‑class, predominantly white suburb of Woodbridge, Virginia, with Anglo‑Irish roots. His family emphasized a strong work ethic, community service, and modest religious
    practice within a Protestant tradition. The diverse demographic of Prince William County, including many military families, exposed him early to a range of cultural perspectives, shaping his appreciation
    for inclusion and collaborative learning. He participates in local traditions such as the annual Virginia Heritage Festival and values the region’s historical legacy while also embracing contemporary,
    multicultural community events. This blend of suburban American values, regional heritage, and exposure to a varied population informs his balanced, pragmatic outlook.
