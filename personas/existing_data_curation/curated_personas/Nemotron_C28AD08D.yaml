personas:
  professional: Samara Penaloza, an 11‑year‑old aspiring digital comic creator and budding game designer, merges their love for graphic storytelling with Scratch programming, channeling a critical, competitive
    spirit into every storyboard while often forgetting to keep their project files organized.
  sports: Samara Penaloza plays on the community soccer team 'Eagle United' during the spring, joins a weekend basketball clinic that practices drills from the Los Angeles Lakers playbook, roots for FC Barcelona
    and the New York Yankees, and approaches each practice with a competitive edge, though they occasionally forget to stretch.
  arts: Samara Penaloza immerses themselves in the vibrant worlds of graphic novelists Noelle Stevenson and Marjane Satrapi, syncs their drawing sessions to the beats of Billie Eilish, Bad Bunny, and folk
    guitarist José Luis, and often mimics the expressive animation style of Pixar's Glen Keane when sketching their own comic panels.
  travel: Samara Penaloza prefers spontaneous, short‑range trips, having explored the nearby coastal town of Vista Bay and the colorful streets of Oaxaca with their family, while they daydream about a future
    adventure to Tokyo’s Akihabara district and the ancient ruins of Machu Picchu.
  culinary: Samara Penaloza, a budding home‑cook, loves helping their family roll homemade corn tortillas and steam tamales filled with chicken, cilantro, and roasted poblano peppers, and they proudly experiment
    with simple salsa verde and guacamole, though they often burn the edges of their tortillas when distracted.
  core: Samara Penaloza is a curious, fiercely competitive 11‑year‑old who fuses comic‑making with Scratch coding, worries about the smallest details, and habitually lets their relaxed, disorganized streak
    derail their best‑intended projects.
background:
  cultural: Samara belongs to a Honduran‑American family that maintains strong ties to its Central American roots while embracing life in Amityville, New York. At home, Spanish is spoken alongside English,
    and cultural traditions such as celebrating Día de los Santos (All Saints' Day) and cooking foods like pupusas and baleadas are central to family gatherings. Her parents emphasize the value of hard
    work, community, and respect for elders, yet they also encourage her curiosity and artistic expression. Growing up in a diverse Suffolk County community, Samara navigates a blend of cultures, often
    sharing her heritage through school projects, art, and occasional Spanish‑language storytelling sessions. This bicultural experience enriches her worldview, fuels her appreciation for varied artistic
    styles, and inspires her ambition to create inclusive, multicultural content in the future.
attributes:
  skills: '[''Drawing and sketching'', ''Digital illustration (basic)'', ''Scratch programming'', ''Bilingual English–Spanish communication'', ''Critical thinking and debate'', ''Puzzle solving and chess'']'
  hobbies: '[''Comic drawing'', ''Digital art on tablet'', ''Scratch game development'', ''Reading graphic novels and sci‑fi'', ''Playing chess and board games'', ''Listening to music (pop, reggaeton, Honduran
    folk)'', ''Cooking traditional Honduran dishes with family'']'
  career_goals: Samara dreams of a future where she can blend her love for art, storytelling, and technology. She aspires to become a video game designer or an animator who creates worlds that invite players
    to explore new ideas. She hopes to attend a specialized high school for the arts, then study graphic design or interactive media at college. Because she often feels worried about fitting in, she also
    wants to develop supportive creative communities for other kids, perhaps launching an online platform where young artists can share their work and receive constructive feedback. Her competitive nature
    fuels a desire to excel and be recognized for her unique style while staying true to her cultural roots.
