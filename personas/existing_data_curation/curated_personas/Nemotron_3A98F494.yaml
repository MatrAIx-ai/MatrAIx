  hobbies: '[ ''Reading non‑fiction (education, economics, sustainability)'', ''Hiking and bird‑watching in Middlesex Fells'', ''Community gardening'', ''Playing piano'', ''Street photography'', ''Strategic
    board games with a close friend'' ]'
  career_goals: Noah aims to become the lead teacher for a district‑wide STEAM initiative that embeds entrepreneurship concepts into elementary curricula. Within the next five years, he hopes to step into
    a curriculum coordinator role, where he can shape school policies, secure funding for innovative programs, and mentor novice teachers. Ultimately, he envisions moving into educational administration—perhaps
    as a director of instructional innovation—while continuing to foster a collaborative, low‑stress environment that values both curiosity and practical outcomes.
