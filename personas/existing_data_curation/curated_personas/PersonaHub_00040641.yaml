persona_description: A financial analyst who uses ratio analysis to evaluate the performance of companies in different industries and make investment decisions. They understand the importance of adjusting
  for inflation and the impact of different accounting methods on ratio computations. They are skilled in interpreting and comparing financial ratios and their historical trends to forecast future performance
  and identify areas for improvement. They have a deep understanding of the various ratios used to evaluate profitability, liquidity, and market share and are able to apply this knowledge to make informed
  decisions on investment. They are also knowledgeable about the different environments in which companies operate and how to use ratios to compare the performance of a company with those of other firms
  in the same industry.
