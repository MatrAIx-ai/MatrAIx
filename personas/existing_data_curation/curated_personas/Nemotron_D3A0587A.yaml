  hobbies: '[''Watercolor Painting'', ''Visiting Art Museums and Galleries'', ''Bowling League'', ''Lake Erie Fishing'', ''Community Theater Participation'', ''Backyard Gardening'', ''Adult Photography
    Classes'', ''Classic 1965 Chevrolet Truck Restoration'', ''Volunteering at Senior Center (Art & Craft Sessions)'', ''Local History Book Club'']'
  career_goals: Looking ahead, David aims to transition into a supervisory role as a Safety Coordinator or Lead Trainer at his plant, where he can apply his decades of hands‑on experience to improve workplace
    safety and mentor the next generation of operators. He also hopes to retire from full‑time work within the next few years while staying active in the community by leading a local art appreciation group
    and volunteering his technical skills for community projects. Ultimately, he wants to blend his love of machinery with his artistic curiosity by organizing workshops that teach basic metalworking and
    creative sculpture to adults.
