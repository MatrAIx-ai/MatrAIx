personas:
  professional: Domesha Owens is a meticulous art history senior who blends research acumen, graphic design skills, and community organizing to curate inclusive museum exhibitions, and they regularly channel
    their curiosity and methodical planning into creating educational programs that bridge heritage narratives with the Southwest desert aesthetic.
  sports: Domesha Owens finds balance on the trails of the Sonoran Desert, regularly hiking with the Phoenix Hiking Club and playing casual volleyball at the community center, while cheering for the Phoenix
    Suns, Arizona Diamondbacks, and following the Arizona Wildcats basketball season for a seasonal burst of competitive spirit.
  arts: Domesha Owens immerses themselves in the visual arts, drawing inspiration from contemporary creators such as Kara Walker, Mickalene Thomas, and Kehinde Wiley, while also attending performances by
    musicians like Erykah Badu and Janelle Monáe to enrich their mixed‑media collages that explore identity and resilience.
  travel: Domesha Owens prefers purposeful, low‑budget road trips that combine hiking in Sedona’s red rocks, exploring the cultural markets of Santa Fe, and occasional overseas voyages to Marrakech for
    its vibrant souks and historic architecture, all planned months in advance to balance school responsibilities and limited finances.
  culinary: Domesha Owens experiments in the kitchen, skillfully blending soul food staples like collard greens and cornbread with Southwest flavors such as roasted poblano peppers and nopales, often whipping
    up dishes like chipotle‑glazed smoked chicken with cactus salsa and sweet‑potato‑infused black‑bean stew.
  core: Domesha Owens is a curiosity‑driven yet worry‑prone art student who meticulously balances creative pursuits, community service, and self‑care through yoga, while occasionally indulging in impulsive
    art‑supply splurges and marathon binge‑reading sessions.
background:
  cultural: Domesha is a Black woman raised in Mesa, Arizona, where she grew up at the intersection of African‑American traditions and the diverse cultural tapestry of the Southwest. Her family maintains
    strong ties to the African‑American church community, which has shaped her values of solidarity, service, and celebration of heritage. She participated in Black cultural festivals and local events that
    highlighted African diaspora art, music, and food, fostering a sense of pride in her identity. The multicultural environment of Mesa—home to significant Hispanic and Native American populations—has
    exposed her to a blend of languages, cuisines, and artistic expressions, influencing her appreciation for cross‑cultural dialogue. Domesha also draws inspiration from historically Black colleges and
    universities she visited during college tours, reinforcing her commitment to uplifting Black narratives within broader artistic and academic contexts.
attributes:
  skills: '["Research and analysis", "Digital content creation", "Graphic design (Adobe Photoshop & Illustrator)", "Photography", "Project planning and organization", "Event coordination", "Social media
    management", "Writing and editing", "Public speaking", "Basic data analysis (Excel)", "Community outreach"]'
  hobbies: '["Sketching and painting", "Mixed‑media collage", "Visiting galleries and museums", "Reading philosophy and Afro‑centric literature", "Yoga and meditation", "Volunteering at youth art workshops",
    "Cooking fusion dishes", "Hiking in the Sonoran Desert"]'
  career_goals: Domesha aims to complete her bachelor's degree in Art History or Museum Studies within the next two years, securing scholarships that acknowledge her academic promise and community involvement.
    Her long‑term ambition is to work as a curator or education coordinator at a museum or cultural center that highlights African‑American and Southwest artists, creating inclusive programs that foster
    dialogue across communities. She also aspires to develop a portfolio of mixed‑media artwork that explores themes of identity and resilience, with the goal of exhibiting locally and eventually nationally.
    To support her mental well‑being, she plans to integrate mindfulness practices into her professional routine and become an advocate for mental‑health resources within arts organizations.
