  hobbies: '[''Senior center social events'', ''Mexican folk dancing'', ''Cooking traditional Mexican dishes'', ''Gardening (herbs and vegetables)'', ''Church participation'', ''Volunteer work at community
    garden'', ''Genealogy research'', ''Reading historical novels'', ''Storytelling with family'']'
  career_goals: Although retired, Ivelisse aims to remain an influential presence in her community by mentoring young volunteers, preserving Mexican cultural traditions through workshops, and documenting
    her family’s stories in a memoir. She wishes to lead a senior center’s cultural program, organize annual Día de los Muertos celebrations, and achieve recognition as a community cultural ambassador,
    thereby ensuring that her heritage continues to thrive for future generations.
