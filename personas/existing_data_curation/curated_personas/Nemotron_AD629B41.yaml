personas:
  professional: Ivelisse Cofino, a retired office administrator turned senior‑center cultural program director, leverages decades of meticulous planning, budgeting expertise, and a competitive drive to
    orchestrate large‑scale folk‑dance workshops, intergenerational storytelling circles, and community outreach events, and they thrive as the charismatic centerpiece of every gathering.
  sports: Ivelisse Cofino stays active with the senior‑center walking club, follows the St. Louis Cardinals baseball team with avid devotion, participates in a low‑impact Zumba class, cheers on the local
    university’s Tigers football squad, and they channel their competitive streak into tracking step counts against fellow seniors.
  arts: Ivelisse Cofino blends a love of storytelling with visual and performing arts, curating folk‑dance recitals inspired by the murals of Diego Rivera, quoting Frida Kahlo during workshops, and immersing
    themselves in historical novels by Isabel Allende and Ken Follett, which together shape their vibrant cultural identity.
  travel: Ivelisse Cofino prefers meticulously planned journeys that blend genealogy research with cultural immersion, favoring weekend trips to historic mission towns in New Mexico such as Santa Fe, annual
    pilgrimages to their grandparents’ hometown of San Miguel, and occasional overseas voyages to Seville, Spain, where they explore Gothic architecture and flamenco heritage.
  culinary: Ivelisse Cofino excels at teaching cooking classes where they demonstrate how to prepare tamales, mole, and pozole using fresh cilantro, chilies, and corn masa from their garden, while occasionally
    rewarding themselves with churros dusted in cinnamon sugar after a successful workshop.
  core: Ivelisse Cofino is a charismatic, detail‑driven elder who channels a competitive spirit into preserving cultural traditions, leading community events with theatrical flair, and they sometimes let
    perfectionism drive overspending on supplies.
background:
  cultural: Ivelisse was born in Mexico and moved to the United States as a young adult. She grew up in a close‑knit Mexican family that emphasized Catholic traditions, family gatherings, and the celebration
    of holidays such as Día de los Muertos, Las Posadas, and Mexican Independence Day. Fluent in Spanish, she maintains a strong connection to Mexican culinary, musical, and artistic heritage, and actively
    shares these traditions with her community in Anaheim. Her cultural identity is woven into her daily life through food, music, language, and rituals.
attributes:
  skills: '[''Office administration'', ''Event planning'', ''Community outreach'', ''Budgeting'', ''Scheduling'', ''Bilingual communication (Spanish/English)'', ''Culinary arts (Mexican cuisine)'', ''Public
