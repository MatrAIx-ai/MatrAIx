  career_goals: Mauricio aims to double his company's revenue over the next five years while expanding into new national markets, all through a lens of environmental stewardship and ethical business practices.
    He is committed to embedding sustainability into the core strategy, enhancing operational efficiency, and cultivating a culture where employees feel supported and empowered. Long‑term, he envisions
    transitioning to a board‑level role that enables him to mentor emerging leaders and champion corporate responsibility initiatives across the industry.
