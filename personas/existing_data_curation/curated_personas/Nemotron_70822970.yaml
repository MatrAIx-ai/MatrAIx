personas:
  professional: Mauricio Fillmore, a 36‑year‑old senior operations executive, translates his methodical, data‑driven mindset and quiet curiosity into strategic planning, supply‑chain optimization, and sustainability‑focused
    growth initiatives, while quietly championing a collaborative culture that values employee well‑being and ethical governance.
  sports: Mauricio Fillmore fuels his fitness with early‑morning hikes along the Columbia River Gorge, weekend road rides with the Portland Velo Club, and a casual devotion to the Portland Timbers and Trail
    Blazers, preferring low‑key, nature‑centered activity over crowded gyms.
  arts: Mauricio Fillmore’s evenings are often spent absorbing contemporary non‑fiction, listening to Bon Iver and Fleet Foxes, attending performances at Portland Center Stage, and admiring the installations
    of Ai Weiwei, all of which feed their quiet appreciation for thoughtful creativity.
  travel: Mauricio Fillmore prefers meticulously planned, low‑impact trips that blend adventure and relaxation, from weekend escapes to the Oregon coast to overseas voyages to Iceland’s geothermal fields
    and the Azores’ volcanic lakes, while balancing their wife’s schedule and a moderate travel budget.
  culinary: Mauricio Fillmore, an avid home chef, cultivates a vegetable garden to craft dishes like roasted beet and goat‑cheese salad, pan‑seared miso‑glazed salmon, and a weekly sourdough loaf, while
    occasionally dining at Le Pigeon for its farm‑to‑table creativity.
  core: Mauricio Fillmore, a calm, methodical 36‑year‑old executive, balances a love for solitary nature hikes and strategic sustainability projects with a penchant for precision budgeting, meticulous health
    monitoring, and occasional indulgence in specialty coffee and board‑game expansions.
background:
  cultural: Mauricio was raised in a middle‑class, Anglo‑American family in the Pacific Northwest, where values of self‑reliance, community service, and reverence for the outdoors were woven into daily
    life. Growing up near Portland, he absorbed the region’s emphasis on environmental stewardship, craft culture, and progressive yet pragmatic problem‑solving. His upbringing emphasized education, a diligent
    work ethic, and respect for diverse perspectives, shaping a worldview that blends traditional American entrepreneurial spirit with the collaborative, nature‑centred ethos of the Oregon lifestyle.
