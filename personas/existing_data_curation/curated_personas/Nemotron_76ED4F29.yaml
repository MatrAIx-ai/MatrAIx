  hobbies: '["Arduino/Raspberry Pi DIY Projects", "Reading Scientific Non‑Fiction", "Chess", "Hiking (White Tank Mountains)", "Cooking Southern Comfort Cuisine", "Listening to Classic Jazz", "Family Quality
    Time"]'
  career_goals: Samuel aims to advance into a leadership role, ideally as Department Chair of STEM or Assistant Principal, where he can shape school‑wide instructional strategies and expand equitable access
    to advanced science courses. He plans to pursue an educational administration credential and publish research on the impact of project‑based learning in under‑resourced districts. Additionally, he hopes
    to establish a regional STEM outreach partnership with local businesses and community organizations to provide mentorship and internship opportunities for students from diverse backgrounds.
