personas:
  professional: Samuel Lee, a 48-year-old secondary-school physics and computer-science teacher, leverages their analytical rigor, meticulously crafted curricula, and data-driven instruction to continuously
    raise standards while competitively mentoring peers, embodying their blend of curiosity, practicality, and disciplined organization.
  sports: Samuel Lee stays active primarily through solitary desert hikes in the White Tank Mountains and occasional weekend runs, while cheering for the Phoenix Suns and Arizona Cardinals and holding a
    seasonal membership with a local adult soccer league that values disciplined training routines.
  arts: Samuel Lee nurtures his love for the arts through regular visits to Phoenix-area jazz clubs where the sounds of Miles Davis, John Coltrane, and Ella Fitzgerald fill the night, while their living
    room shelves hold vintage vinyls and a collection of classic films by directors such as Stanley Kubrick and Akira Kurosawa, underscoring a disciplined yet deeply personal appreciation for creative expression.
  travel: Samuel Lee prefers meticulously planned trips that blend intellectual curiosity with outdoor adventure, having hiked the Grand Canyon and explored historic Santa Fe, while dreaming of a future
    research-focused pilgrimage to the European Science Museum in London and a cultural immersion in Kyoto’s temples, all balanced against a family-oriented budget.
  culinary: Samuel Lee enjoys cooking Southern-style comfort meals at home, expertly crafting fried chicken with buttermilk brine, collard greens simmered with smoked turkey, and sweet-potato pie spiced
    with nutmeg, while also experimenting with locally sourced prickly pear glaze for barbecue ribs, reflecting a blend of disciplined technique and nostalgic flavor.
  core: Samuel Lee is a disciplined, curiosity-driven educator who secretly hoards vintage jazz vinyls, over-plans every project, and refuses to skip a single data point—even if it means sacrificing spontaneous
    social outings.
background:
  cultural: Samuel identifies as African‑American, with family roots that trace back to the Great Migration era when his grandparents moved from the Mississippi Delta to California before settling in Arizona.
    Growing up in a close‑knit Black community, he participated in church youth groups and celebrates cultural milestones such as Juneteenth and Kwanzaa. His heritage informs his commitment to fostering
    a culturally responsive classroom, where he incorporates African‑American scientific contributions and local community narratives into his STEM lessons. Living in Surprise, a rapidly growing suburb
    of Phoenix, he balances his Black cultural identity with the broader multicultural environment of the Southwest.
attributes:
  skills: '["Curriculum Development (STEM)", "Data‑Driven Instruction", "Educational Technology Integration (Google Classroom, LMS, simulation software)", "Laboratory & Robotics Kit Management", "Assessment
