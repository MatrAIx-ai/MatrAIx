persona_description: A historian or archaeologist interested in the history and culture of Scotland and Wales, particularly the post-Roman period. This person is likely to be familiar with the patron saint
  of Glasgow, St Mungo, and his life story, as well as the historic relationship between the regions associated with him. They would be interested in the route exploration and the potential for following
  closely the ancient direct routes that existed in post-Roman Britain. They would also be knowledgeable about the geography of the route and the history of transport routes, and would be able to infer
  the persona of the person who wrote the text based on their interest in the topic.
