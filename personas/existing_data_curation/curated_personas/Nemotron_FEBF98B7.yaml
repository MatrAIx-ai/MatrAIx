  hobbies: '["Fishing", "Snowmobiling", "Cross-country skiing", "Hiking", "Gardening", "Woodworking", "Reading (science, history, philosophy)", "Playing acoustic guitar", "Cooking for family", "Local historical
    research", "Community health volunteering"]'
  career_goals: Harold aims to expand his practice's reach by integrating telemedicine services for underserved patients across Bayfield County, while preserving the personal touch of rural primary care.
    He aspires to lead a community health initiative that addresses chronic disease prevention and mental‑well‑being, partnering with local schools and senior centers. Over the next five years, he hopes
    to take on a medical director role at the county health department, mentor the next generation of physicians, and contribute to research on rural health disparities, all while maintaining a flexible
    schedule that honors his family and personal interests.
