persona_description: Luis Alvarez was a master inventor who played a significant role in several groundbreaking discoveries in physics during the mid-20th century. He was a graduate student at the University
  of Chicago in the mid-1930s when he built a particle detector that turned into a state-of-the-art instrument. He then joined Ernest Lawrence's Rad Lab at Berkeley and made major contributions to fundamental
  nuclear science. He discovered the process that would lead to the hydrogen bomb and built the first practical hydrogen bubble chamber. He also invented a radar system for planes to land in bad weather
  and built the firing mechanism for the bomb, as well as a way to determine its strength by recording changes in air pressure. After the war, he went back to Berkeley and built the first practical hydrogen
  bubble chamber. He left working on nuclear physics and spent most of the rest of his career developing better detectors and new uses for them. He was a master inventor who could seemingly build anything
  and was a key figure in several groundbreaking discoveries in physics during the mid-20th century.
