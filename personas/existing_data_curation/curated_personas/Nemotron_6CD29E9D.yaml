  hobbies: '[''Painting (folk art)'', ''Herb gardening'', ''Culinary experimentation'', ''Attending local art festivals'', ''Reading culinary history'', ''Playing acoustic guitar'', ''Volunteering at community
    food bank'', ''Participating in community theater'', ''Hiking and nature walks'', ''Food and landscape photography'', ''Cooking traditional Guatemalan dishes'', ''Collecting vintage kitchen tools'']'
  career_goals: Rafael aims to open a boutique bakery in Liberal that showcases a fusion of traditional Guatemalan pastries and contemporary Midwestern breads, creating a community hub where food and art
    intersect. He plans to earn Master Baker certification from a recognized culinary institute and enter regional baking competitions to gain broader recognition. Over the next five years, Rafael hopes
    to develop a line of packaged specialty baked goods for regional grocery stores, host weekly baking‑and‑painting workshops, and mentor aspiring bakers through apprenticeships and local culinary schools.
