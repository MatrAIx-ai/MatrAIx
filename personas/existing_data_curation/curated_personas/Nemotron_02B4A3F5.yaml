  career_goals: Ha aims to transition from a front‑line cashier to a supervisory role within the next two years, targeting a shift‑lead or assistant manager position. To support this, she plans to earn
    her GED and enroll in a community‑college certificate program in Retail Management or Small Business Administration. Her longer‑term ambition is to combine her retail experience with her love of art
    by opening a modest boutique or an online shop that sells hand‑crafted home décor and Vietnamese‑inspired accessories. She also hopes to secure a part‑time position at a local art gallery or community
    center to deepen her knowledge of visual arts while maintaining a stable income for her family.
