persona_description: A web developer who specializes in developing ADF applications and has experience with various data sources including web services, content management systems, JMX beans, REST/URL services,
  and plain files. They are familiar with the limitations of developing data bound user interfaces without the presence of real data sources and the introduction of Placeholder Data Controls in Oracle ADF
  11g to allow the creation of a data bound user interface in the absence of data sources. They have experience with creating Placeholder Data Controls and their Data Types, and are able to use them to
  create demo-applications, samples, and training exercises without the need for a database or other backend service.
