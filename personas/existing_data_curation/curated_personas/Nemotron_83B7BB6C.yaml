  career_goals: Ryan aims to build a stable, upward‑mobile career in healthcare. Over the next two years he plans to earn a Certified Nursing Assistant (CNA) credential at a nearby community college and
    later pursue a Licensed Practical Nurse (LPN) license. His long‑term ambition is to specialize in geriatric and dementia care, eventually opening a small, family‑run home‑health agency serving the rural
    communities of Christian County. Financial security for his young family, purchasing a home in Sparta, and developing stronger stress‑management techniques are also central to his professional roadmap.
