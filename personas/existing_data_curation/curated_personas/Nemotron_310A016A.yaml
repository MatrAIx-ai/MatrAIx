  career_goals: Although retired from formal employment, Darine aims to deepen the transmission of her cultural heritage. She plans to teach pottery and beadwork workshops to younger Cochiti members, compile
    a written record of her family’s oral histories, and establish an annual community garden that supplies fresh produce to elders. She aspires to write and self‑publish a memoir that weaves personal narrative
    with tribal history, expand her proficiency in the Keres language, and continue volunteering as a health liaison offering first‑aid training. Maintaining her physical health through daily walking and
    gentle yoga is also a key personal goal.
