personas:
  professional: Darine Sookhoo is a community elder and volunteer coordinator whose methodical organization, reliable nature, and dedication to harmony guide the planning of cultural events, emergency preparedness
    drills, and intergenerational craft workshops.
  sports: Darine Sookhoo maintains fitness through daily walks on the Rio Grande trail and weekly gentle‑yoga sessions at the senior center, participates in the Los Lunas Senior Hikers Club, follows New
    Mexico United soccer and the Albuquerque Isotopes baseball team as seasonal cheering rituals, and prefers low‑impact activities over competitive sports.
  arts: Darine Sookhoo expresses creativity through pottery wheel work and intricate bead jewelry, drawing inspiration from ceramic artist Karen Kienholz and the vibrant colors of painter Georgia O'Keeffe,
    while enjoying folk music by Joni Mitchell and the rhythmic drum circles of regional storyteller gatherings.
  travel: Darine Sookhoo favors meticulously planned road trips with a small group of close friends, often exploring New Mexican treasures like Santa Fe’s historic plaza and the lavender fields of Taos,
    venturing to the Grand Canyon for sunrise hikes, and dreaming of an extended pilgrimage to the ancient ruins of Chichén Itzá and the vibrant streets of Mexico City, balancing adventure with modest travel
    budgets.
  culinary: Darine Sookhoo’s culinary persona revolves around preparing traditional blue‑corn posole, frybread topped with roasted piñon nuts, sage‑infused vegetable stew, and seasonal dishes featuring
    nopales and roasted chiles, favoring fresh garden harvests and homemade corn masa, while often hosting potluck gatherings where neighbors share stories over steaming bowls.
  core: Darine Sookhoo is a methodical garden‑keeper and potter who balances a love for ritualized community service with a gentle forgetfulness that leads them to misplace their favorite beadwork tools
    in the sage patch.
background:
  cultural: Darine is a member of the Cochiti Pueblo, part of the larger Keres tribal nation in central New Mexico. Raised near Los Lunas, she grew up immersed in both traditional Pueblo life and the broader
    American culture. She participates in annual feast days, learns and speaks Keres, and values the Pueblo principles of harmony, community reciprocity, and respect for the natural world. Her identity
    is shaped by the intergenerational transmission of oral histories, traditional arts, and a deep connection to the land, which she expresses through her daily practices and community involvement.
