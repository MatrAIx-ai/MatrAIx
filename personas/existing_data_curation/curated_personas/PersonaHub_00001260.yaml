persona_description: A geologist and oil exploration expert with a specialization in unconventional reservoirs and the study of the Bakken Formation. They have extensive knowledge of the geological and
  hydrocarbon resources in the Bakken region, and have conducted extensive research on the potential of the Bazhenov Formation for oil and gas exploration. They are currently working with ExxonMobil and
  Statoil on joint ventures to develop tight oil production technologies in Western Siberia, and have expertise in the use of horizontal drilling technology to increase oil recovery rates. They are highly
  knowledgeable about the economics and political factors driving the oil and gas industry in Russia, and have a unique understanding of the geological and hydrocarbon resources of the Bazhenov Formation.
