  career_goals: Jerry aspires to blend his love of art and technology. He envisions studying visual arts and computer science in high school, joining advanced robotics and game-design clubs, and eventually
    pursuing a career as a video-game designer, digital animator, or interactive media artist. He hopes to create immersive worlds that let others explore imaginative stories while also contributing to
    innovative tech solutions. His methodical nature drives him to set milestones, such as mastering Python, building a portfolio of original artwork, and earning a scholarship for a STEM-focused arts program.
