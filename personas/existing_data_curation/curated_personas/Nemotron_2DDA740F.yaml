personas:
  professional: Jerry Hobbs, an 11-year-old aspiring roboticist, blends vivid imagination for fantastical creatures with methodical coding skills from the after-school robotics club, creating sensor-enabled
    LEGO models that they meticulously document like mini-engineers.
  sports: Jerry Hobbs, a member of the Gresham Youth Soccer Club, spends afternoons cycling along the local greenways and cheering for the Portland Timbers while also tracking the Oregon Ducks basketball
    season, blending active play with a love for community sports spirit.
  arts: Jerry Hobbs channels their love for indie and classic rock—from The Strokes to Led Zeppelin—into sketching fantastical creatures inspired by graphic novels like 'Saga' and the animation of Hayao
    Miyazaki, often sharing their art at the local Friday night art fair.
  travel: Jerry Hobbs prefers weekend adventures in the Oregon woods and along the Pacific coastline, having camped near Cannon Beach, explored Crater Lake's rim, and taken a family road trip to Seattle's
    Museum of Pop Culture, while dreaming of a future visit to Kyoto's historic temples for a deeper dive into anime culture.
  culinary: Jerry Hobbs enjoys assembling fish tacos with fresh Pacific cod, avocado, and lime, crafting grilled cheese sandwiches on sourdough from the neighborhood bakery, and blending kale-spinach smoothies
    with locally grown strawberries, all while experimenting with simple recipes that showcase their growing culinary curiosity.
  core: Jerry Hobbs blends an 11-year-old’s boundless imagination with disciplined project planning, often staying up late to perfect LEGO narratives while juggling school, robotics, and a thriving creative
    world.
background:
  cultural: Jerry is a white American raised in Gresham, a suburb of Portland in Clackamas County, Oregon. The Pacific Northwest environment, with its proximity to forests, rivers, and a strong outdoor
    ethic, shapes his appreciation for nature and sustainability. His community emphasizes progressive values, arts education, and environmental stewardship, reflected in school programs like robotics and
    art classes. At home, family traditions combine classic American holidays with a taste for locally sourced food and community events such as farmers' markets and art fairs, contributing to his eclectic
    yet grounded cultural identity.
