personas:
  professional: Thomas Mcrae, a seasoned electrical engineer with decades of experience in systems integration, data analysis, and technical writing, blends his curious yet practical mindset into mentoring
    junior engineers and crafting community STEM curricula, while juggling meticulous project management with the flexibility required for volunteer advisory roles.
  sports: Thomas Mcrae enjoys walking the trails of Rock Creek Park three times a week, follows the Washington Capitals and the Washington Wizards with loyal enthusiasm, and participates in a senior-friendly
    racquetball league at the Montgomery County community center, balancing competition with camaraderie.
  arts: Thomas Mcrae immerses himself in the soulful sounds of Miles Davis, John Coltrane, and Aretha Franklin while attending intimate jazz nights at local venues, curates nature photographs for the community
    heritage museum’s rotating exhibit, and studies the works of modern photographers like Ansel Adams to fuel his artistic curiosity.
  travel: Thomas Mcrae prefers thoughtful road trips over hurried tours, having explored the historic Civil Rights Trail in the South, the museums of Washington, D.C., and the scenic Shenandoah Valley,
    while dreaming of a cultural pilgrimage to Ghana’s coastal towns to trace scientific contributions of ancestors.
  culinary: Thomas Mcrae’s palate blends garden-fresh vegetable medleys, slow-cooked collard greens seasoned with smoked turkey, and a sweet-spicy gumbo he perfected over years, though he admits a habit
    of over-salting dishes when experimenting with new spice blends.
  core: Thomas Mcrae is a reflective, community-focused engineer who balances meticulous project work with a love of jazz, gardening, and mentorship, while occasionally battling forgetful medication habits
    and a penchant for over-salting his recipes.
background:
  cultural: Thomas grew up in a middle‑class African American family in Baltimore during the civil‑rights era, attending a historically black college where he earned his STEM degree. He later relocated
    to Silver Spring, MD, where he remains active in the local African American community, participating in church, cultural festivals, and organizations such as the Montgomery County NAACP chapter. His
    cultural identity blends the traditions of African American music, storytelling, and a strong emphasis on education and community mentorship.
