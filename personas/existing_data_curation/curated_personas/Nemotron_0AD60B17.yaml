  career_goals: Thomas aims to leverage his engineering experience to mentor youth in local STEM initiatives, serve as a volunteer advisor for community development projects, author a series of reflective
    essays on his career and the evolution of engineering, support his wife in maintaining a harmonious household, foster intergenerational connections within his neighborhood, and help preserve African
    American scientific heritage in the Washington, D.C. area.
