personas:
  professional: Elma Byrd, a 14‑year‑old aspiring multimedia creator, blends drama club stage‑design skills with a flair for coding simple mini‑games, channeling their curiosity and sociable energy, and
    they thrive in collaborative projects that demand both meticulous planning and spontaneous artistic improvisation.
  sports: Elma Byrd stays active by joining the school track team in spring, hitting the skate park with the local Huntsville Youth Skate Club during summer, and cheering on the Alabama Crimson Tide football
    and the Huntsville Rocket City Trash Pandas baseball team, they use a mix of structured workouts and spontaneous street‑style movement to keep fit.
  arts: Elma Byrd fuels their imagination by sketching folklore‑inspired characters in the style of Banksy’s bold street art, rehearsing scenes from Lin‑Manuel Miranda’s Hamilton, curating playlists that
    weave together Nina Simone’s jazz, Kendrick Lamar’s hip‑hop, and modern R&B, and devouring graphic novels from Marvel and the animated worlds of Hayao Miyazaki, and they let these influences shape both
    their visual and performance aesthetics.
  travel: Elma Byrd prefers weekend road trips with family that blend a splash of adventure—like exploring the historic monuments of Washington, D.C., and the music scene of New Orleans—with the comfort
    of familiar stops in nearby Birmingham, while they dream of a future solo trip to the bustling streets of New York City and a cultural immersion in Paris’s art museums.
  culinary: Elma Byrd enjoys experimenting in the kitchen, whipping up spicy kimchi ramen with miso broth, crafting shrimp tacos topped with mango salsa, and perfecting classic mac‑and‑cheese with a blend
    of sharp cheddar and creamy gouda, and they often swap homemade smoothies of banana, spinach, and almond milk with friends at school lunch.
  core: Elma Byrd is a talkative, stage‑loving teen who can turn any hallway into a runway for their folklore sketches, yet they frequently trade homework time for late‑night playlists and impromptu street‑art
    sessions.
background:
  cultural: Elma is part of a close‑knit African American family in Huntsville, Alabama. Her family’s traditions are rooted in the church, music, and community gatherings, with regular participation in
    Sunday services and church‑hosted events. Her grandparents, who lived through the civil‑rights era, instilled a deep appreciation for resilience, heritage, and education. The family celebrates Juneteenth
    and African American History Month with projects and storytelling that highlight Black contributions. Southern cuisine, especially family recipes for collard greens, sweet potatoes, and cornbread, features
    prominently at family meals. Growing up in Madison County, Elma is also influenced by Huntsville’s aerospace legacy, which fuels her curiosity about science and technology. This blend of Southern hospitality,
    church community, cultural pride, and the city’s innovative spirit shapes her worldview and aspirations.
