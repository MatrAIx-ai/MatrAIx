    event planning'']'
  career_goals: Elma aspires to attend a specialized high school that emphasizes both the arts and STEM, eventually earning a degree in visual communications, UI/UX design, or multimedia production. She
    dreams of creating inclusive digital experiences that reflect diverse cultural narratives, ideally working for a tech company with a strong community focus or launching her own creative studio. In the
    long term, she hopes to mentor younger students in her neighborhood, using art and technology as tools for empowerment and self‑expression.
