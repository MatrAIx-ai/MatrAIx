personas:
  professional: Lala Clark is an aspiring junior game developer who leverages practical problem‑solving skills from LEGO building and spontaneous storytelling flair from Minecraft adventures, collaborating
    with friends in the school drama club to prototype interactive narratives that balance structure with creative improvisation.
  sports: Lala Clark plays forward for the Riverbend Falcons Under‑12 soccer team, practices twice weekly, cheers for the Los Angeles Galaxy in the MLS, and participates in a community dance troupe that
    doubles as a fitness outlet, using sport as a social anchor while occasionally missing practice due to anxiety spikes.
  arts: Lala Clark sketches cartoon strips inspired by Bill Watterson’s Calvin and Hobbes, dances to choreography by Misty Copeland in her after‑school class, idolizes the storytelling of author Rick Riordan,
    and enjoys listening to the upbeat tunes of Imagine Dragons while coloring in her sketchbook, intertwining visual and performing arts into her daily routine.
  travel: Lala Clark enjoys weekend nature walks in Oakwood Park and short family trips to the Grand Canyon, dreams of visiting the historic castles of Scotland and exploring Tokyo’s anime districts, but
    plans trips with the help of her parents, favoring guided tours over solo adventures due to a preference for structured itineraries.
  culinary: Lala Clark loves homemade pepperoni pizza and macaroni‑and‑cheese, enjoys crafting simple fruit kebabs with strawberry and banana slices, can follow a basic recipe for chocolate chip cookies
    with her mom’s supervision, and often snacks on carrot sticks while coloring, balancing a love for comfort foods with budding kitchen confidence.
  core: Lala Clark is an energetic 11‑year‑old who merges teamwork on the soccer field with imaginative LEGO building and cartoon sketching, while navigating intense anxiety that fuels creative bursts and
    occasional procrastination.
background:
  cultural: Lala is a White American girl raised in the suburban neighborhoods of Buffalo, New York. Her family’s heritage includes European roots such as Irish and German ancestry, and they uphold middle‑class
    values that emphasize community service, modesty, and education. Living near Lake Erie, she experiences long, snowy winters and enjoys seasonal activities like sledding, ice skating, and attending the
    local Buffalo Wing Festival. She participates in school multicultural events and community‑center programs that expose her to the city’s diverse cultures, while her home life reflects conventional American
    customs and holiday celebrations.
