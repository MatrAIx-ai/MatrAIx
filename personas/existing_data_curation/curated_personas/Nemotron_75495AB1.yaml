  career_goals: Although she is only eleven, Lala already imagines a future where she can help others. She hopes to become a veterinarian because she loves caring for animals, and she is fascinated by biology
    lessons at school. She also admires teachers and sometimes says she would like to be a classroom teacher to make learning fun and supportive for younger children. In the short term, she aims to improve
    her science grades, join the school animal‑care club, and develop strategies to manage her anxiety so she can pursue these long‑term ambitions with confidence.
