persona_description: A mental health practitioner who is interested in evidence-based practices and the implementation of such practices in systems of care for children with multiple needs. This person
  is likely to have expertise in wraparound, functional family therapy, multidimensional treatment foster care, and multisystemic therapy, and is familiar with the wraparound evidence base and the implementation
  of wraparound programs in healthcare settings. This person is likely to have experience in conducting implementation research and has a strong interest in improving the mental health of children in child
  welfare through the implementation of evidence-based parenting interventions.
