personas:
  professional: Maria Villegas, a budding game designer in a Saturday coding club, they translate their love for nature scenes and cityscapes into pixel art levels on Scratch, rigorously testing each feature
    with the same methodical reliability that defines their schoolwork.
  sports: Maria Villegas, an enthusiastic soccer player at the local park, they practice dribbling drills after school, cheer for the Dallas Cowboys and Dallas Mavericks when watching TV, and balance team
    play with solo jogs that satisfy their organized, goal‑oriented nature.
  arts: Maria Villegas, a dedicated watercolor enthusiast, they draw inspiration from Claude Monet's soft palettes and the vibrant street murals of local Dallas artists like Kate Gilmore, while dancing
    to traditional music rhythms that spark spontaneous sketch sessions of city skylines.
  travel: Maria Villegas, an inquisitive traveler, they love exploring the Dallas Museum of Art and the historic Fort Worth Stockyards on family outings, and they dream of visiting the Natural History Museum
    in London and the rainforests of Costa Rica to see the wildlife documentaries they adore in real life.
  culinary: Maria Villegas, a junior chef in the family kitchen, they delight in flipping homemade baleadas filled with refried beans, cheese, and avocado, experiment with adding a splash of lime to tacos
    al pastor, and perfect their chocolate chip cookie dough by carefully measuring each ingredient with a small digital scale.
  core: Maria Villegas, a curious nine‑year‑old who methodically plans art projects, guards a secret stash of half‑used crayons, and balances their love for coding games with an occasional tendency to procrastinate
    on homework until the last minute.
background:
  cultural: Maria is a first‑generation Honduran‑American growing up in Dallas, Texas. At home, Spanish and English are spoken interchangeably, and she celebrates Honduran holidays such as Independence
    Day (September 15) and Semana Santa with family gatherings, traditional foods like baleadas, tamales, and pupusas, and music featuring punta and garífuna rhythms. Her family participates in local Honduran
    community events and cultural programs, fostering a strong sense of heritage while she also embraces the multicultural environment of Dallas.
