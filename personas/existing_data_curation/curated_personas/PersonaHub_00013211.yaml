persona_description: A member of the European Parliament who is passionate about human rights and gender equality. This individual is actively involved in promoting the Lanzarote Convention and the Istanbul
  Convention on preventing and combating violence against women and domestic violence. The person is also committed to raising awareness of the rights of children and the special needs of girls and young
  women who are vulnerable to sexual exploitation. The individual is interested in the implementation of the Convention and the exchange of views with expert speakers, and is dedicated to ensuring the ratification
  of the Convention and its entry into force.
