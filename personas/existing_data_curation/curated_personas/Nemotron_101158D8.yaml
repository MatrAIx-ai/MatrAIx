  hobbies: '[''Visiting Art Galleries and Museums'', ''Cultural Travel'', ''Walking Club'', ''Community Gardening'', ''Book Club (Contemporary Fiction & Art History)'', ''Cooking and Wine Tasting'', ''Digital
    Photography'', ''Mindfulness Meditation'', ''Journaling'']'
  career_goals: Now retired, Oneal aims to channel his business acumen into meaningful community service. His primary ambition is to join the board of the Somerset County Arts Council, where he can help
    shape programming that bridges traditional and avant‑garde art forms. He also wishes to mentor young professionals through a local entrepreneurship accelerator, offering strategic guidance and networking
    opportunities. Continuing education remains important; he plans to enroll in online courses on digital media, museum studies, and emerging technologies to stay intellectually engaged. Additionally,
    he hopes to author a reflective memoir that ties together his corporate experience with his lifelong love of the arts, providing a resource for future retirees seeking purposeful post‑career pathways.
