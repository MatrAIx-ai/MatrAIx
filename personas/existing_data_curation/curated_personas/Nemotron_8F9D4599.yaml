    skills'', ''Adaptability to fast‑paced clinical environments'', ''Creative problem‑solving through artistic pursuits'']'
  hobbies: '[''Visiting local art galleries'', ''Watercolor painting'', ''Quilting'', ''Hiking Ozark trails'', ''Gardening (heirloom vegetables and native flowers)'', ''Cooking Southern cuisine with creative
    twists'', ''Reading contemporary fiction and memoirs'', ''Attending folk and bluegrass concerts'', ''Volunteering at community health fairs'', ''Tutoring teens in health literacy'']'
  career_goals: Dorothy aims to deepen her clinical knowledge by pursuing a Certified Medical Assistant (CMA) certification and eventually enrolling in an associate‑degree program in nursing. Her medium‑term
    goal is to transition into a medical office manager role where she can lead a team, improve patient flow, and develop community health outreach initiatives. Long‑term, she envisions becoming a registered
    nurse with a specialty in patient education, integrating her passion for art and holistic wellness into programs that use creative activities for stress reduction and health promotion. Throughout her
    career progression, she values maintaining a balanced family life and contributing to the well‑being of her Charleston community.
