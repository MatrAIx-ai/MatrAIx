personas:
  professional: Chelsea Grandsoult is a budding junior naturalist who channels her love of animal adventure stories and hands‑on farm experiences into building intricate LEGO ecosystems that mimic real‑world
    habitats, demonstrating an early blend of curiosity, practicality, and organized creativity; they often organize their bricks by species and habitat type.
  sports: Chelsea Grandsoult participates in the local youth soccer league, cheers for the Chicago Cubs during summer baseball broadcasts, and follows the Henderson County High School Hawks basketball team,
    balancing her love of outdoor play with a preference for small‑group games rather than large stadium crowds; they often practice dribbling with a makeshift ball made from a rolled‑up sock.
  arts: Chelsea Grandsoult avidly reads adventure mysteries like "The Secret Zoo" and draws wildlife scenes inspired by nature documentaries and the illustrations of Eric Carle, while also enjoying the
    music of Disney’s "Frozen" soundtrack and the animated films of Hayao Miyazaki; they sometimes re‑enact scenes with LEGO mini‑figures.
  travel: Chelsea Grandsoult has taken family road trips to the Illinois State Fair in Springfield, visited the Shedd Aquarium in Chicago, and dreams of exploring Yellowstone National Park’s geysers and
    wildlife, favoring itinerary plans that mix short hikes with structured museum visits and a modest budget; they collect pressed leaves from each destination as souvenirs.
  culinary: Chelsea Grandsoult loves baking chocolate chip cookies with her parents, enjoys Grandma’s apple pie, prefers simple meals like cheese pizza and carrot sticks, and is especially fond of farm‑fresh
    corn on the cob seasoned with butter and a dash of salt; they sometimes sneak an extra cookie before dinner.
  core: Chelsea Grandsoult blends a quiet curiosity for nature with a practical knack for building, saves her allowance with a mix of discipline and occasional candy splurges, and balances routine health
    habits with a charming bedtime tooth‑brushing oversight; they often forget to floss but remember to water their plant.
background:
  cultural: Chelsea is a white Midwestern child raised in Lomax, Illinois, a small agricultural community in Henderson County. Her family reflects typical Midwestern values of modesty, self‑reliance, and
    community involvement. They attend a local Protestant church, celebrate national holidays such as Thanksgiving, Fourth of July, and Christmas with community gatherings, and participate in county fairs
    and school events. The rural setting provides frequent exposure to farm life, gardening, and local wildlife, which shape her appreciation for nature and practical, hands‑on experiences. Her upbringing
    emphasizes kindness, cooperation, and a balanced blend of curiosity and practicality.
attributes:
