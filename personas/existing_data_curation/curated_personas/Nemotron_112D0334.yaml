  hobbies: '["Reading adventure books","Nature walks","Drawing animals and landscapes","Building LEGO structures","Playing board games with siblings","Jigsaw puzzles","Watching educational nature programs","Baking
    cookies with family"]'
  career_goals: Chelsea dreams of a future where she can help living things. She often says she wants to become a veterinary technician because she loves caring for animals, especially farm pets she sees
    around Lomax. She also imagines herself as a teacher, guiding younger children in reading and science, reflecting her kindness and desire for harmony. Occasionally she mentions being an environmental
    scientist to protect the local river and fields. In all her ambitions, she emphasizes staying helpful, compassionate, and practical.
