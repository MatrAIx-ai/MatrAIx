persona_description: A soil scientist with expertise in the study of soil fertility, nutrient dynamics, and environmental sustainability. The individual is interested in the long-term effects of grazing
  and haying on soil nutrient levels and their impact on the fertility of subtropical beef cattle pastures. They are particularly interested in the combination of grazing in spring and haying in early fall
  as a BMP for maintaining nutrient balance in the pasture fields and avoiding potential negative environmental impacts. The persona is knowledgeable about the effects of grazing and haying on soil organic
  carbon, nitrogen, and phosphorus and their implications for environmental quality protection. They are also familiar with the long-term decline in soil P levels and the importance of maintaining a balance
  between nutrient addition and removal for productive crop growth and water/environmental quality protection.
