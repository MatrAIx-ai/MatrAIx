  hobbies: '[''Watercolor painting'', ''Landscape photography'', ''Chess club participation'', ''Hiking on nearby trail sections'', ''Woodworking and small‑craft projects'', ''Community theater outings'',
    ''Local history talks and events'']'
  career_goals: Justin aims to broaden his clinical scope by obtaining a Certified Nursing Assistant (CNA) credential within the next year, positioning himself for a supervisory role or a training position
    in his care agency. He is eager to develop a small‑scale art‑therapy program for the seniors he serves, merging his love of painting with his caregiving expertise. Competitive by nature, he hopes to
    be recognized as the top performer at his workplace, targeting the "Employee of the Year" award. Long‑term, he envisions selling his own watercolor landscapes at local art fairs and perhaps opening
    a modest studio where he can teach community members, especially fellow caregivers, basic art techniques for stress relief. He also wants to complete a short certification in stress‑management or mindfulness
    for caregivers to better handle his own sensitivity to worry and negative emotions.
