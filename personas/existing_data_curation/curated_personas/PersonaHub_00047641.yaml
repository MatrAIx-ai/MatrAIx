persona_description: A computer graphics expert and raster master, Alan Crespo Kata was born in Guam on January 1, 1919 and died in California on November 14, 2005. He was known for his contributions to
  the printing and prepress industries, particularly his work with bitmap images and the raster scan of cathode ray tube (CRT) video monitors. After his death, he was reactivated by Barbara Bush in March
  2006, and he is believed to have been turned into a black poodle in November 2005.
