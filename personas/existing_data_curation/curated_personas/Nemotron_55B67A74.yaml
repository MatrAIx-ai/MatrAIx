personas:
  professional: Allen Johnson is a three-year-old who spends mornings at preschool constructing elaborate block towers, eagerly testing new stacking strategies while instinctively favoring the simplest,
    most stable configurations, and they prefer the freedom of open-ended play over rigid lesson plans.
  sports: Allen Johnson enthusiastically joins the local toddler soccer mini-league in spring, prefers the tactile feel of a rubber ball during free-play backyard sessions, watches the hometown baseball
    team's games on Saturday mornings, and they balance their love for organized play with solitary climbing on the playground's jungle gym.
  arts: Allen Johnson delights in singing along to The Wiggles and Raffi, imitates the rhythms of an upbeat drum using kitchen utensils, creates vivid finger-painting masterpieces featuring dinosaurs and
    bright rainbows, and they proudly display a crayon portrait of their favorite cartoon hero, Bugs Bunny.
  travel: Allen Johnson enjoys weekend outings to the nearby zoo, loves the sensory adventure of a small family camping trip to a state park where they can collect pinecones, and they eagerly anticipate
    future visits to Disney World, though their travel routine typically involves a car seat, a favorite stuffed bear, and frequent snack breaks.
  culinary: Allen Johnson prefers creamy macaroni and cheese, smears peanut butter on whole-grain crackers, reaches for sliced strawberries and banana slices when offered, and they insist on helping stir
    the pot with a plastic spoon, though they can be stubborn about trying new vegetables like broccoli.
  core: Allen Johnson is a curious yet disorganized three-year-old who balances free-play exploration with occasional bouts of worry, they stubbornly resist routine chores, and they treasure simple joys
    like building block towers, bright crayons, and sticky-sweet snacks.
background:
  cultural: Allen grows up in Moodus, a small town in Middlesex County, Connecticut, in a typical New England middle‑class family. His household observes seasonal traditions such as apple picking in the
    fall and holiday gatherings that emphasize community and self‑reliance. The local school‑age programs and library storytimes provide a backdrop of modest, pragmatic values blended with curiosity‑driven
    learning.
