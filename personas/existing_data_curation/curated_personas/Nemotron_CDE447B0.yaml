  hobbies: '["Non‑fiction reading (productivity, psychology, education research)","Jogging in local parks","Yoga for flexibility and stress relief","Home organization and DIY storage projects","Cooking
    traditional Texan dishes (barbecue, casseroles)","Puzzle solving (crosswords, Sudoku)","Strategic board games (Settlers of Catan)","Community volunteering (neighborhood clean‑ups, school fundraisers)"]'
  career_goals: Cassandra aims to rise from her current administrator role to become a district‑wide Director of Early Childhood Programs within the next five years. She plans to earn a Master’s in Education
    Administration and obtain the Certified Early Childhood Administrator credential. Her long‑term ambition is to spearhead evidence‑based STEM initiatives across pre‑K classrooms, improve operational
    efficiencies through data analytics, and eventually serve as a school principal where she can shape both academic and administrative cultures. She is driven by a desire for tangible impact, career stability,
    and professional recognition within the education sector.
