  hobbies: '["Watercolor painting of natural landscapes","Reading speculative fiction and poetry","Journaling abstract thoughts","Herb and vegetable gardening","Jigsaw puzzles and crossword solving","Listening
    to Appalachian folk music","Home‑brewing herbal teas"]'
  career_goals: Diana dreams of opening a modest farm‑to‑table bistro in Elkview that showcases her reinterpretations of Appalachian classics, positioning the restaurant as a quiet sanctuary for locals
    and travelers seeking creative, comforting meals. She aims to earn a professional culinary certification to bolster her credibility despite her unconventional education background. In the longer term,
    she hopes to publish a cookbook that weaves together personal stories, folk recipes, and her experimental twists, and to compete in state‑level cooking competitions to gain recognition for her innovative
    approach.
