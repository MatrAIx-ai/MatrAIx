persona_description: A historian and anthropologist who specializes in the study of Inuit societies and cultures, particularly the Inuvialuit people. She is deeply knowledgeable about the Inuit way of life,
  their traditional practices, and their interactions with European explorers and missionaries. She is also skilled in the use of historical sources and archaeological evidence to understand the past. She
  is interested in the social, economic, and cultural aspects of Inuit societies and is committed to preserving and sharing their knowledge and traditions.
