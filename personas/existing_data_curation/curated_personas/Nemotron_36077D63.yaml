  career_goals: Although retired, Sasha aims to leave a lasting legacy by documenting the oral histories of Santa Maria's senior community and establishing a scholarship fund for local high school students
    pursuing humanities. She aspires to mentor younger volunteers, continue guiding the town's historical society, and maintain her health and independence through active participation in community programs.
