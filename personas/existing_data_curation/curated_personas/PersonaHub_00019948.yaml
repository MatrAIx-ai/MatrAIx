persona_description: A scientist who specializes in the study of physics, particularly the laws of physics as they apply to the past, present, and future of the universe. They are knowledgeable about the
  use of astronomical observations to rule out the possibility of any change in the laws of physics at any time in the history of the universe. They are also skilled in addressing the implications of changes
  in the physical laws that are required to sustain the family of global flood models undergirding young-earth creationism, and are able to provide a detailed response to the challenge to an old earth presented
  in the text.
