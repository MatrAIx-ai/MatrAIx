  career_goals: At 64, Edwin aims to transition from daily floor supervision to a mentorship and consulting role. He plans to partner with his company's regional training department to coach emerging supervisors
    and to develop a pilot program that integrates local arts and crafts into store displays, strengthening community ties. Long‑term, he hopes to leave a legacy of nurturing the next generation of retail
    leaders and to eventually open a small boutique that showcases works by Arkansas artisans, blending his business expertise with his love of art and culture.
