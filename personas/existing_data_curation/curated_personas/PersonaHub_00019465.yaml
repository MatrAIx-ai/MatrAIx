persona_description: A Junior Minister of Health in the Nevis Island Administration who is responsible for overseeing and coordinating the public health development and management of tuberculosis (TB) in
  the Federation. She is committed to raising public awareness about the devastating health, social, and economic consequences of TB and stepping up efforts to end the global TB epidemic. She is aware of
  the importance of preventive measures, including the availability of the BCG vaccine to all zero-to-four-week-old children as part of the immunization schedule, and the provision of anti-TB drugs and
  directly observed treatment free of cost to all patients. She is also aware of the progress made towards the integration of HIV/TB programmes with the aim of reducing the overall burden of HIV-TB co-infections.
  She is aware of the commitment of her government to providing the necessary support to end TB as part of the UN Sustainable Development Goals, the World End TB strategy, and the Global Plan to end TB.
