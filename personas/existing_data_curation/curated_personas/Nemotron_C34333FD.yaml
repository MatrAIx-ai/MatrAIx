personas:
  professional: Stacey Washington, a seasoned interior finisher and small‑business owner with three decades of hands‑on experience in residential and commercial painting, mixes custom colors, mentors apprentices,
    and balances meticulous project budgeting with the flexibility to pivot when clients request bold, unconventional designs, all while leveraging their talkative, sociable nature to turn every job site
    into a collaborative studio, and they often treat each wall as a canvas for community storytelling.
  sports: Stacey Washington keeps fit by participating in the Flint Senior Walking Club during spring, joining a local recreational softball league in summer, cheering on the Detroit Pistons, Red Wings,
    and Tigers, and attending weekly yoga classes at the community center, blending low‑impact activity with team spirit and a love for community camaraderie, and they often organize a post‑game coffee
    catch‑up with teammates.
  arts: Stacey Washington spends afternoons painting watercolor landscapes inspired by Jacob Lawrence and Romare Bearden, captures Flint’s streetscapes through photography, quilts with a circle of longtime
    friends, and regularly attends live jazz performances by the like of John Coltrane tribute ensembles and gospel choirs at the historic Avalon Theatre, weaving visual and musical inspirations into a
    vibrant creative practice, and they share their latest photographs at monthly community art talks.
  travel: Stacey Washington prefers well‑planned cultural trips that blend relaxation with artistic immersion, having explored the New Orleans Jazz & Heritage Festival, toured the historic streets of Savannah
    for its preservation tours, and attended a West African drumming and craft festival in Dakar, while often returning to Michigan’s own art fairs and lake‑front retreats for a balanced travel rhythm,
    and they keep a travel scrapbook of sketches and photos from each journey.
  culinary: Stacey Washington enjoys cooking hearty soul‑food dishes with a modern twist, such as collard greens simmered with smoked turkey and a splash of apple cider vinegar, sweet potato pie spiced
    with ginger and topped with a crumble, and black‑eyed peas blended with quinoa and cilantro, while garden‑fresh tomatoes, basil, and peppers find their way into their kitchen, showcasing a skilled yet
    experimental home‑chef palate, and they often host tasting nights for friends to sample new flavor combos.
  core: Stacey Washington blends a meticulous trade expertise with an exuberant love for the arts, turning every project into a community canvas while juggling retirement planning, health routines, and
    a penchant for late‑night jazz humming in the studio, and they never miss a chance to share a fresh brushstroke story over dinner.
background:
  cultural: Stacey’s cultural identity is rooted in the African‑American experience of the Great Migration. Her grandparents left the rural South for Flint’s booming auto factories in the 1940s, establishing
    a close‑knit family that valued hard work, community, and faith. Growing up in a vibrant Black neighborhood, she was immersed in church life, gospel music, and the oral traditions of storytelling that
    celebrated resilience and collective uplift. These influences shape her worldview and artistic sensibility, prompting her to honor Black pioneers in visual arts while championing new voices. Stacey
    actively observes Juneteenth and Kwanzaa, incorporating their themes of freedom and unity into her home décor and community projects. She maintains strong ties with the local Black church, where she
    leads a small choir and organizes arts‑based outreach programs. The rich cultural tapestry of Flint—its soul‑food cuisine, Motown legacy, and grassroots activism—continues to inform her values of collaboration,
    mentorship, and the belief that art can galvanize social change.
