  career_goals: Sherronda envisions a future where she can combine her love of art and imagination with a positive impact on others. She dreams of becoming a children’s book author and illustrator, creating
    vibrant stories that encourage other kids to explore their own creativity. She is also fascinated by the visual design of movies and video games, hoping one day to work as a concept artist for animated
    films or a graphic novelist. In the longer term, she hopes to use her artistic skills to support community programs in Willingboro, teaching art workshops for younger children and helping them express
    themselves.
