personas:
  professional: A budding comic artist, Sherronda Drake blends vivid imagination with disciplined sketching routines, channeling their love for fantasy novels and community art workshops into weekly comic
    strips that they share on the library’s youth portal; they balance meticulous panel planning with spontaneous storytelling, and they readily volunteer to lead small drawing circles while still cherishing
    solitary creative sessions.
  sports: An energetic youth athlete, Sherronda Drake plays forward for the Willingboro Youth Soccer Club during the spring season and attends a local gymnastics class on weekends, while cheering on the
    Philadelphia Eagles in football and the New Jersey Devils in hockey; they enjoy the structure of team practices but often prefer the quiet of solo stretches after school.
  arts: A passionate young creator, Sherronda Drake immerses themselves in sketchbooks, digital illustration apps, and the worlds of graphic novelists like Raina Telgemeier and classic comic legend Stan
    Lee, while drawing inspiration from the soulful sounds of Miles Davis, the lyrical flow of Kendrick Lamar, and the poetic verses of Maya Angelou that play softly in the background during their art sessions.
  travel: A curious explorer, Sherronda Drake frequently joins family road trips to Philadelphia’s historic sites like Independence Hall and the Liberty Bell, loves weekend beach outings to Atlantic City,
    and dreams of a future adventure to New Orleans for its vibrant jazz celebrations, balancing careful itinerary planning with the spontaneous thrill of discovering hidden murals in each city.
  culinary: A budding kitchen collaborator, Sherronda Drake delights in helping prepare soulful dishes like collard greens seasoned with smoked paprika, buttery cornbread, and sweet-potato pie, while also
    mastering quick favorites such as banana-peanut butter sandwiches and fruit smoothies blended with almond milk and honey; they often experiment by sketching new recipe ideas before the stove, though
    they sometimes reward themselves with extra cookies after completing a comic page.
  core: Sherronda Drake is an imaginative 11-year-old comic creator who balances meticulous sketching habits with occasional worry-driven overthinking, thriving in quiet creative corners while anchoring
    their days with mindful journaling and spontaneous bursts of artistic energy.
background:
  cultural: Sherronda is an African‑American girl growing up in Willingboro, New Jersey, a town with a strong Black community and a history of cultural pride. Her family celebrates traditions such as Sunday
    gospel services, cooking soul‑food meals like collard greens, cornbread, and sweet potato pie, and observing Juneteenth with music and storytelling. She is exposed to a rich tapestry of Black artistic
    influences, from classic jazz and hip‑hop to contemporary Black authors and illustrators, which fuels her imagination. Community events at local churches and the municipal library provide her with opportunities
    to attend art workshops and reading circles that reflect her cultural heritage. These experiences shape her worldview, encouraging a blend of creativity, community responsibility, and an appreciation
    for her cultural roots.
