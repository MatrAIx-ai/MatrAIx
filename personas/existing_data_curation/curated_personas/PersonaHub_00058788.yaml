persona_description: A scientist who specialized in the study of zoology and botany, particularly in the field of taxonomic identification and classification of various species. Peter Simon von Pallas was
  a German zoologist who achieved international fame through his work in the Netherlands and England. He was invited by Catherine II to Russia in 1767, where he became a member of the Russian Academy of
  Science and professor of Saint Petersburg University. He published in Latin in 1767–1780, including the illustrations of various species of bats.
