personas:
  professional: Juan Oquendo, a retired electrical and mechanical troubleshooting specialist, now channels their methodical project planning and bilingual documentation skills into mentoring high‑school
    STEM students and offering low‑cost consulting to local small businesses, while drafting a bilingual home‑repair guide.
  sports: Juan Oquendo enjoys daily walks through Schenectady’s Central Park, participates in a senior fitness class that includes gentle resistance training, follows the New York Knicks, New York Giants,
    and Albany Great Danes, and occasionally joins a neighborhood shuffleboard league.
  arts: Juan Oquendo delights in listening to timeless Latin rhythms from artists like Tito Puente and Celia Cruz, reads historical non‑fiction by authors such as David McCullough, and watches science documentaries
    like Cosmos, finding creative inspiration for woodworking projects.
  travel: Juan Oquendo prefers well‑planned road trips to historic sites, having toured Washington, D.C., and New Orleans, and now dreams of visiting the ancient ruins of Machu Picchu and the castles of
    Scotland, balancing adventure with the comfort of familiar itineraries.
  culinary: Juan Oquendo loves preparing home‑cooked meals such as corn‑based tamales, plantain fritters, and bean soups, using fresh vegetables from their garden and ingredients like cilantro, tomatoes,
    and corn masa, while occasionally experimenting with spices from regional recipes.
  core: Juan Oquendo, a detail‑oriented 70‑year‑old gardener‑engineer, blends precise problem‑solving with a heartfelt devotion to community mentorship, classic Latin melodies, and a garden that nurtures
    both body and soul.
background:
  cultural: Born in a small town near Tegucigalpa, Honduras, Juan grew up in a close‑knit Catholic family that emphasized respect, community solidarity, and the celebration of Honduran holidays such as
    Feria Juniana and Semana Santa. He immigrated to the United States in the early 1980s, settling in upstate New York. Throughout his life he has maintained fluency in Spanish, participates in the local
    Honduran diaspora community, and passes on cultural traditions—such as cooking pupusas, sharing folk stories, and celebrating Día de los Próceres—to his grandchildren. His cultural identity blends Honduran
    values of family and communal responsibility with the civic engagement of his adopted hometown.
