  career_goals: Though retired, Juan aims to remain actively involved in his community by mentoring high-school students in STEM, offering occasional consulting to local small businesses on equipment maintenance,
    and authoring a bilingual guide on home repairs. He also seeks to preserve his health through regular walking, manage stress via mindfulness practices, and deepen his involvement with the local Honduran
    cultural group, ensuring his experience benefits future generations.
