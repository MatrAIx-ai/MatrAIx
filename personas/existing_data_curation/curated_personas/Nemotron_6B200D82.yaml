  career_goals: His immediate career goal is to secure a full‑time technical support or maintenance position that offers a predictable daily schedule, allowing him to leverage his practical troubleshooting
    skills while minimizing unpredictable stress. He plans to obtain CompTIA A+ and Network+ certifications within the next year to increase his competitiveness. In the medium term, he aims to establish
    a modest freelance repair service focused on home electronics and appliances for his local community, providing reliable, low‑pressure work that aligns with his preference for solitary, routine‑based
    tasks. Ultimately, he hopes to achieve financial stability that alleviates his chronic worry and to be recognized as a dependable go‑to technician in the Irvine area.
