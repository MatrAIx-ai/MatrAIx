  hobbies: '[''Pickup basketball'', ''Listening to neo‑soul and hip‑hop music'', ''Tinkering with vintage electronics'', ''Cycling on local nature trails'', ''Cooking Southern dishes'', ''Creating DIY home‑project
    videos'']'
  career_goals: Joyce aims to earn her Journeyman HVACR certification and complete a GED, followed by an associate degree in HVAC technology at a local community college. She plans to obtain the universal
    EPA 608 certification within the next year, become a lead installer within three years, and eventually launch her own eco‑focused HVAC business that provides affordable, energy‑saving solutions to low‑income
    neighborhoods in Tallahassee.
