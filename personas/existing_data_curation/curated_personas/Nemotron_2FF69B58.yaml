personas:
  professional: Joyce Bryant is a 19‑year‑old aspiring HVACR journeyman who combines hands‑on wiring, refrigerant recovery, and EPA‑608 compliance expertise with a curiosity for smart‑thermostat tech, yet
    their relaxed approach to scheduling often leads them to tackle jobs in a spontaneous, on‑the‑fly manner.
  sports: Joyce Bryant burns energy playing pickup basketball at the Tallahassee community center, cheering on the Miami Heat during the NBA season and the Florida Gators in college hoops, while also logging
    weekend bike rides along the Apalachicola National Forest trails, preferring a flexible, spontaneous workout routine over regimented training plans.
  arts: Joyce Bryant curates neo‑soul and hip‑hop playlists featuring Erykah Badu, D’Angelo, J‑Cole, and H.E.R., draws aesthetic inspiration for TikTok DIY videos from the visual style of directors like
    Wes Anderson and musicians such as Anderson .Paak, and regularly attends local open‑mic nights to soak up emerging talent.
  travel: Joyce Bryant prefers low‑cost, nature‑focused getaways, having biked the scenic trails of the Everglades and explored the historic streets of New Orleans on a weekend trip, while dreaming of a
    road‑trip along the Pacific Coast Highway to soak in the redwoods and surf the California beaches.
  culinary: Joyce Bryant loves experimenting with Southern‑inspired dishes like shrimp‑and‑grits with a splash of hot sauce, collard greens seasoned with smoked turkey, and peach cobbler, skillfully balancing
    a modest kitchen setup with a growing repertoire of spice blends and occasional makeshift sous‑vide experiments using their vintage appliance repair know‑how.
  core: Joyce Bryant is a tech‑savvy, eco‑minded DIY enthusiast who juggles spontaneous basketball games with a meticulous eye for energy‑saving HVAC solutions, yet habitually forgets to charge their phone,
    leading to occasional missed appointments.
background:
  cultural: Joyce is an African‑American raised in Tallahassee’s vibrant Black community. She grew up attending a local Baptist church, where gospel music and communal service shaped her values. Family
    gatherings feature traditional Southern soul food, storytelling, and celebrations of Black heritage, from Juneteenth to local civil‑rights commemorations. The blend of Southern hospitality, the legacy
    of historically Black colleges in the area, and contemporary urban culture influence her worldview, work ethic, and creative expression.
attributes:
  skills: '[''HVAC system installation'', ''Refrigerant recovery and handling'', ''Diagnostic troubleshooting'', ''Electrical wiring for HVAC units'', ''Reading and interpreting schematics'', ''EPA 608
