persona_description: A healthcare professional who is responsible for administering vaccines to children, particularly those who are part of the National Immunisation Program (NIP). This person is likely
  to be a General Practitioner (GP) or a pediatrician who is familiar with the guidelines and recommendations for administering vaccines. They are aware of the importance of minimizing the risk of fever
  and febrile convulsion and are trained to administer the MMRV vaccine only as a second dose, as the first dose in children aged 9-30 months is associated with an increased rate of fever and febrile convulsions.
