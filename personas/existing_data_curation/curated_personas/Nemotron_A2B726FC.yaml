  career_goals: Frank aims to transition from senior developer to a technology leadership role where he can bridge software engineering with artistic innovation. Over the next five years, he aspires to
    become a Chief Technology Officer or Head of Product at a boutique company that creates immersive digital experiences, leveraging AI‑driven generative art. He plans to deepen his expertise in machine
    learning, especially generative adversarial networks, and to lead cross‑functional teams that blend design, music, and interactive media. Additionally, he wishes to mentor a broader community through
    workshops, speaking engagements at tech‑art conferences, and by publishing open‑source libraries that simplify creative coding for developers.
