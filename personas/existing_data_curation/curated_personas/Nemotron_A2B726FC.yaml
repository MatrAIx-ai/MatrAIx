personas:
  professional: A senior full‑stack software engineer with deep expertise in Python, TypeScript, and cloud‑native microservices, Frank Ford merges test‑driven development with a painter’s eye for UI/UX,
    leveraging their curiosity and competitive drive to mentor junior developers while tolerating a relaxed, sometimes disorganized schedule as they chase a future CTO role in immersive AI‑driven digital
    experiences.
  sports: Avid outdoor enthusiast, Frank Ford paddles a kayak on Lake Washington, hikes the Cascades with the Seattle Wilderness Club, cycles the Mercer Island loop, and roots for the Seattle Seahawks and
    Seattle Sounders while occasionally joining a local amateur basketball pickup league.
  arts: Frank Ford spends weekends at the Seattle Art Museum and the Frye, creates digital paintings with Procreate, curates a vintage Moog Sub‑37 and a Roland Juno‑106 synthesizer collection, and follows
    indie acts like Khruangbin and Aphex Twin, letting their artistic curiosity color both code and composition.
  travel: Frank Ford favors spontaneous weekend escapes, often driving to the Oregon coast, hiking the Hoh Rainforest, or catching a flight to Iceland’s geysers, while a long‑held dream of exploring Kyoto’s
    temples remains on a flexible wish‑list.
  culinary: Frank Ford enjoys cooking cedar‑plank salmon with miso glaze, crafting homemade ramen broth with kombu and pork bones, and sampling fresh oysters at Pike Place, balancing competent home‑cooking
    skills with a habit of ordering pizza on nights when creative projects overrun.
  core: Frank Ford is a 49‑year‑old tech‑savvy creative who fuses full‑stack engineering with digital art, navigates finances with cautious optimism, handles mild health issues with proactive monitoring,
    and thrives on spontaneous outdoor adventures, all while embracing a relaxed, occasionally disorganized work style.
background:
  cultural: Frank is a White American with deep roots in the Pacific Northwest. Raised in a middle‑class family in the Seattle area, he was exposed early to the region’s tech boom and its strong outdoor
    culture. He grew up attending public schools that emphasized STEM education and community involvement, and his family’s cultural traditions include holiday gatherings and a appreciation for classic
    American rock and folk music. Living on Mercer Island, he embodies the West Coast blend of a tech‑forward mindset, environmental consciousness, and a penchant for supporting local art scenes.
