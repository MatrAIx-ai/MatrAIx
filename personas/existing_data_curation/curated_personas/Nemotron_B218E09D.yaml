  hobbies: '[''Pickup basketball'', ''Hip‑hop music and DJing'', ''Weightlifting'', ''Running in Griffith Park'', ''Volunteering for community fire safety workshops'', ''Video games (tactical shooters)'',
    ''Cooking Southern comfort food'', ''Attending local church events'', ''Car maintenance and customizing'', ''Reading historical biographies'']'
  career_goals: Anthony aims to advance within the fire department, targeting a promotion to lieutenant within the next five years and eventually captain. He plans to earn his EMT certification, then pursue
    paramedic training to broaden his medical response capabilities. In parallel, he intends to enroll in a bachelor’s program in fire science or emergency management, positioning himself for future roles
    in incident planning and department leadership. Long‑term, he hopes to lead community fire‑prevention initiatives in Inglewood, mentor at‑risk youth, and perhaps start a small consulting firm that advises
    local schools and businesses on safety protocols.
