    User 1: I''m glad you like them!

    User 2: I''ve never had a homemade bagel before.

    User 1: Well, now you know where to get them.

    User 2: Thanks! I''ll definitely be coming back.

    User 1: Awesome! I''m glad I could help.

    User 2: Hey, do you have any plans for later?

    User 1: Not really, why?

    User 2: I was wondering if you wanted to go camping with me and my family.

    User 1: Oh, that sounds like fun! I love camping.

    User 2: Great! We''re going to go to the mountains.

    User 1: That sounds amazing! I''ve always wanted to go camping in the mountains.

    User 2: Perfect! We''re leaving tomorrow morning.

    User 1: I''ll be there!

    User 2: Awesome! I''m excited to meet you.

    User 1: Me too!'
