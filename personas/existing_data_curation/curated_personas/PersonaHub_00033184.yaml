persona_description: A healthcare professional who specializes in urology and has experience with various treatments for incontinence, including surgical procedures such as the TVT mid urethral sling and
  artificial urinary sphincters. They have a strong understanding of the pathophysiology of incontinence and the clinical management of stress and urge incontinence, and are familiar with the latest surgical
  techniques and treatments. They have a detailed knowledge of the key diagnostic points and indications for referring patients to urology, and are skilled in interpreting the results of various diagnostic
  tests. They are also aware of the latest research and developments in the field of urology and are able to provide up-to-date information to patients and healthcare providers.
