personas:
  professional: Roshetta Brown is a preschool builder who organizes their block collection into precise towers, applying their love for routine and methodical planning while thriving in group storytelling
    sessions that showcase their sociable, competitive spirit.
  sports: Roshetta Brown darts through the community pool in their Mini Dolphins swim class, kicks a soft soccer ball at the neighborhood toddler league, and proudly sports a Norfolk Tides cap, channeling
    their competitive spark into every game.
  arts: Roshetta Brown bursts into spontaneous gospel‑style sing‑alongs to Stevie Wonder classics during church gatherings, mimics Beyoncé’s dance moves at playdates, and fills sketchbooks with bright crayon
    portraits of Disney heroes like Moana, showcasing their love for soulful rhythm and visual expression.
  travel: Roshetta Brown loves weekend road trips to Virginia Beach where they build sandcastles, eagerly anticipates a future visit to Disney World’s Magic Kingdom, and often asks for a stop at Washington,
    D.C.’s National Air and Space Museum, reflecting their curiosity about both local nature and far‑flung wonders.
  culinary: Roshetta Brown adores the family’s Sunday collard greens and buttery cornbread, insists on crunchy carrot sticks for snacks, and often sips banana‑strawberry smoothies they help blend, while
    proudly declaring macaroni and cheese as their ultimate comfort food.
  core: Roshetta Brown is a methodical, competitive three‑year‑old who thrives on structured play, savors soulful rhythms, meticulously saves for their dream ride‑on car, yet occasionally forgets to brush
    their teeth before bedtime.
background:
  cultural: Roshetta is raised in an African‑American family in Norfolk, Virginia, where Southern cultural traditions blend with urban community life. Her family participates in church gatherings, celebrating
    holidays like Juneteenth and Thanksgiving with soulful music, storytelling, and home‑cooked dishes such as collard greens and cornbread. Community programs at the local recreation center provide her
    with exposure to African‑American history and cultural arts, while neighborhood playdates and family picnics reinforce the importance of family ties, resilience, and collective joy.
