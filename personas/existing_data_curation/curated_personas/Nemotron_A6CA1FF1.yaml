  career_goals: Even at three, Roshetta expresses a budding curiosity about helping others and learning new things. She often says she wants to be a teacher like the friendly lady at her preschool, a doctor
    like her mother, or a dancer who performs on stage. Her ambition reflects a desire to be part of her community, support friends, and use her energy to make people smile.
