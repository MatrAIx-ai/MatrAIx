  hobbies: '[''Vegetable gardening (organic, heirloom varieties)'', ''Woodworking (birdhouses, small furniture, tool restoration)'', ''Reading historical non‑fiction, biographies, genealogy'', ''Playing
    bridge and card games at the senior center'', ''Volunteering at the food pantry and church event coordination'', ''Walking in local parks and nature trails'', ''Attending regional history lectures and
    museum tours'']'
  career_goals: Although retired, Kaleb aims to keep his mind sharp and his days purposeful. He plans to complete the remaining credits for his associate degree in business history, a goal that fulfills
    a long‑standing curiosity. He aspires to mentor younger volunteers at the local food pantry, sharing his organizational and practical skills. Kaleb also hopes to compile his family's genealogy into
    a published manuscript and write a guidebook on low‑maintenance gardening for seniors. Maintaining health is a priority, so he sets goals for regular walking, low‑impact exercise, and practicing relaxation
    techniques to manage stress and worry.
