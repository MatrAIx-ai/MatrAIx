  hobbies: '["Reading (historical fiction, educational theory)", "Exploring local history and museums", "Hiking", "Yoga and mindfulness meditation", "Volunteer tutoring", "Book club", "Knitting for charity",
    "Coffee brewing experiments", "Farmers market visits"]'
  career_goals: Sandra aims to become a store manager within the next two years, then progress to a district manager role, while also pursuing a master's in educational leadership to transition into corporate
    training or to open her own boutique that emphasizes community education and sustainable practices. She wants to develop expertise in data‑driven retail strategies and to implement wellness programs
    for staff to reduce stress. Balancing career advancement with personal well‑being is a central ambition.
