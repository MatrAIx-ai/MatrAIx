personas:
  professional: Sandra Brown is a retail supervisor who excels at staff scheduling, performance coaching, conflict resolution, inventory control, POS systems, visual merchandising and sales analytics, balancing
    structured scheduling with flexible problem‑solving, using their curiosity for emerging retail technology and practical mindset to create data‑driven onboarding programs while assertively championing
    staff wellness initiatives.
  sports: Sandra Brown hikes the Mark Twain National Forest on weekends as a member of the Hannibal Riverwalk Runners club, follows the St. Louis Cardinals and Kansas City Chiefs on weekdays, and participates
    in community yoga workshops, balancing an active outdoor lifestyle with a relaxed fan‑watching routine.
  arts: Sandra Brown enjoys the folk‑pop melodies of Sufjan Stevens, the cinematic storytelling of Ava DuVernay, the literary works of Ken Follett and Mary Oliver, and frequents the Mark Twain Museum and
    local art gallery, allowing artistic immersion to inspire their tutoring sessions and retail visual merchandising.
  travel: Sandra Brown frequently takes weekend road trips to St. Louis and Louisville for riverfront festivals, has explored Asheville’s craft coffee scene, and dreams of vacationing in Kyoto’s temples
    and the Scottish Highlands, preferring a mix of cultural immersion and nature hikes while budgeting travel within their modest savings.
  culinary: Sandra Brown experiments with a V60 pour‑over and Aeropress to brew oat‑milk lattes flavored with cinnamon and vanilla, loves preparing roasted beet and goat‑cheese salads with arugula, dill,
    and toasted walnuts after browsing the local farmers market, and occasionally indulges in late‑night chocolate chip cookies whenever stress spikes.
  core: Sandra Brown is a data‑driven retail leader who balances meticulous organization with spontaneous curiosity, wrestles with chronic worry, and finds solace in yoga, coffee brewing experiments, and
    community tutoring.
background:
  cultural: Sandra grew up in a middle‑class, white family in the Midwest, rooted in small‑town values of community, modesty, and hard work. Her parents were educators, which instilled a respect for learning
    and civic participation. The cultural milieu of Hannibal, with its river heritage and Mark Twain legacy, fosters an appreciation for storytelling and local history. She identifies with Midwestern hospitality,
    a pragmatic outlook, and a modest religious upbringing that emphasizes service. These influences shape her collaborative yet assertive style and her commitment to both practical results and personal
    growth.
attributes:
  skills: '["Retail staff scheduling", "Performance coaching", "Conflict resolution", "Inventory management", "Point-of-sale systems", "Visual merchandising", "Sales analytics", "Employee training", "Curriculum
