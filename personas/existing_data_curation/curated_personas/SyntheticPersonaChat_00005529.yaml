    User 2: I''m glad we''re both bad at something.

    User 1: Me too!

    User 2: So, what are you doing this weekend?

    User 1: I''m going to a concert on Saturday.

    User 2: Oh, that sounds fun! Who are you going to see?

    User 1: I''m going to see my favorite band, the Beatles.

    User 2: The Beatles? That''s awesome! I''m so jealous.

    User 1: Thanks. I''m excited to see them.

    User 2: I hope you have a great time!

    User 1: Thanks, I''m sure I will!

    User 2: So, what do you do for a living?

    User 1: I work at a museum.

    User 2: That''s cool. What kind of museum?

    User 1: It''s a natural history museum.

    User 2: Oh, that sounds interesting. What do you do there?

    User 1: I''m a tour guide.

    User 2: That sounds fun. I''ve always wanted to be a tour guide.

    User 1: It is fun. I get to meet a lot of people and learn about a lot of interesting things.

    User 2: That''s awesome. I''m glad you enjoy your job.

    User 1: Thanks. I do.'
