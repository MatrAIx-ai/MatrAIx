  hobbies: '[''Digital illustration'', ''Street photography'', ''Speculative short story writing'', ''Design and ad‑tech meetups'', ''VR art installations'', ''Hackathons'', ''Hiking in the Santa Cruz Mountains'',
    ''Acoustic guitar'', ''Strategy board games'']'
  career_goals: Ryan aims to become a senior account director overseeing large, innovative campaigns that fuse technology and artistry. In the next three years, he plans to deepen expertise in programmatic
    and performance‑based advertising, earn certifications such as IAB Digital Media Buying and Google Ads, and lead a cross‑functional team of strategists and creatives. Long‑term, he envisions launching
    his own boutique agency focused on narrative‑driven digital campaigns for tech startups, positioning himself as a bridge between cutting‑edge tech and compelling brand storytelling.
