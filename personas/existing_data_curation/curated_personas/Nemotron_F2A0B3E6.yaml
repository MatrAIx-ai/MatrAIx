  career_goals: Even at two years old, Lucia frequently declares that she wants to be a teacher, a singer, or a doctor, reflecting her love of sharing stories, music, and caring for others. Her methodical
    nature suggests she may gravitate toward roles that involve organization, such as a preschool teacher or librarian. She also enjoys artistic activities and dreams of becoming an artist who paints bright
    pictures. Ultimately, Lucia’s ambition is to help her community, spread joy through music and art, and use her natural empathy to support others as she grows.
