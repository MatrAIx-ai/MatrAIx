  hobbies: '[''DIY woodworking'', ''Arduino/Raspberry Pi home‑automation tinkering'', ''Hiking and kayaking'', ''Puzzle solving (Sudoku, logic puzzles)'', ''Volunteer electrical safety workshops'', ''Cooking
    Mediterranean cuisine'']'
  career_goals: Carmen aims to earn her Master Electrician license within the next two years and eventually obtain specialized certification in renewable‑energy installations, particularly solar and battery
    storage. She envisions launching her own electrical contracting firm that emphasizes sustainable solutions for suburban homes in Long Island. A long‑term ambition is to create a mentorship program that
    encourages more women to enter the skilled‑trade workforce. She also hopes to complete an associate degree in Electrical Engineering Technology, blending her practical experience with formal education
    to qualify for senior project‑management roles on larger commercial builds.
