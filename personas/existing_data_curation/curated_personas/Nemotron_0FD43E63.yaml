  career_goals: Even at this early stage, Jose Luis shows budding aspirations shaped by his competitive spirit and desire to be useful. He often declares he wants to be "a strong police officer" to keep
    his family safe, echoing his skeptical view of strangers and wish to protect what matters to him. He also dreams of becoming a "builder" because he loves constructing block towers, reflecting his practical
    curiosity about how things fit together. Occasionally, he mimics soccer players on TV, indicating an ambition to be fast and win, aligning with his competitive drive. These emerging goals hint at a
    future desire for roles that blend responsibility, achievement, and tangible results.
