persona_description: A person interested in organizational studies, particularly those related to the study and careful application of knowledge about how people act within the organization. They are likely
  to be a management professional or a researcher who is interested in understanding the structure, functioning, and challenges facing organizations. They may also be interested in the impact of organizational
  structure and management on the success of an organization. They may have a background in business or management and may have completed a course in organizational studies. They are likely to have a keen
  interest in the industry and the market conditions prevalent as well as ongoing competition. They may have a background in Ayurveda and may have conducted an organizational study at MVM Ayurvedic research
  lab. They may have a strong interest in understanding the product and production process, strengths and weakness of the organization, attitude of customers and the public towards the organization, and
  the origin and growth of the organization.
