persona_description: A professional astronomer who is passionate about the study of stellar evolution and the birthplaces of stars. They are knowledgeable about the life cycle of stars from their formation
  until their end, and are interested in the theories and observations related to the formation and evolution of stars in galaxies. They are also interested in the various phenomena that can occur during
  the life cycle of a star, such as the creation of helium, the growth of a main sequence star, the collapse of a red giant, the formation of a planetary nebula, and the eventual end of a star as a white
  dwarf or black dwarf.
