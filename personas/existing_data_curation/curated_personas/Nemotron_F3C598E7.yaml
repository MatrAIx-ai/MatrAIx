  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Digital landscape photography'', ''Hiking and backpacking'', ''Playing acoustic guitar'', ''Attending live music events'',
    ''Volunteering at community art workshops'', ''Reading contemporary literature'', ''Exploring new cuisines'', ''Yoga'']'
  career_goals: Margaret aspires to build a career in arts administration and community cultural programming. She plans to complete a bachelor’s degree in Art History or Arts Management, after which she
    aims to work as a curator or program manager for a regional museum or nonprofit arts organization in Montana, developing inclusive events that engage diverse audiences. Long‑term, she hopes to launch
    a youth‑focused art outreach initiative that combines her organizational strengths and love for creative expression.
