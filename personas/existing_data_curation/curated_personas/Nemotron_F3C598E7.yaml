personas:
  professional: Margaret Shular, a budding arts administrator with strong interpersonal communication, methodical event planning, and a keen eye for digital photography, channels their curiosity and organized,
    calm demeanor into curating inclusive community exhibitions and coordinating seamless cultural programs across Montana.
  sports: Margaret Shular, an avid hiker with the Missoula Hiking Club and a seasonal skier with the Bozeman Snow Rangers, follows the Montana Grizzlies football and Missoula Osprey baseball teams, balancing
    trail workouts with yoga to maintain endurance.
  arts: Margaret Shular immerses themselves in the arts through watercolor landscapes inspired by Georgia O'Keeffe, digital photography echoing Annie Leibovitz’s portrait style, and acoustic guitar sessions
    covering Bon Iver and Bob Dylan, while regularly attending local gallery openings featuring works by contemporary Montana artists like John Hilliard.
  travel: Margaret Shular plans trips with meticulous itineraries, favoring road‑trips to Glacier National Park, cultural strolls through Portland’s art districts, and dreaming of a study‑abroad semester
    in Florence, Italy, balancing budget constraints with a desire for immersive experiences.
  culinary: Margaret Shular enjoys cooking modestly, often preparing huckleberry‑infused pancakes, grilled trout with lemon butter, and rustic vegetable stews, while savoring bison burger nights at local
    diners and tasting fresh sushi rolls when traveling.
  core: Margaret Shular blends a relentless curiosity for art with a methodical, calm mindset, yet admits to hoarding vintage postcards and occasionally binge‑watching true‑crime documentaries late into
    the night.
background:
  cultural: Born and raised in Butte, Montana, Margaret comes from a white American family with deep roots in the region’s mining and agricultural history, tracing ancestry to Irish and German immigrants.
    The town’s close‑knit community spirit, reverence for the rugged landscape, and exposure to the rich cultural tapestry of the American West—including Native American art and traditions—have shaped her
    values of self‑reliance, community service, and an appreciation for diverse artistic expressions.
attributes:
  skills: '[''Interpersonal communication'', ''Group facilitation'', ''Event planning'', ''Digital photography'', ''Photo editing (Adobe Lightroom, Photoshop)'', ''Social media content creation'', ''Research
