personas:
  professional: Evelyn Gathright is a veteran special‑education teacher with three decades of hands‑on experience, whose pragmatic curiosity and deep compassion drive the design of flexible, sensory‑friendly
    IEPs and the pursuit of calm, inclusive learning hubs, even as they embrace a relaxed, disorganized planning style that favors adaptability.
  sports: Evelyn Gathright enjoys leisurely walks along the Chesapeake Bay and bird‑watching hikes in Patapsco Valley State Park, participates in the senior “Golden Walkers” club, follows the Baltimore
    Ravens, Orioles, and Washington Capitals, and practices gentle yoga once a week to maintain flexibility.
  arts: Evelyn Gathright finds solace in classical music by Beethoven and Mozart, frequently attends performances by the Baltimore Symphony Orchestra, immerses themselves in historical fiction by Hilary
    Mantel, Philippa Gregory, and Ken Follett, and expresses creativity through knitting intricate scarves inspired by textile patterns seen in art galleries.
  travel: Evelyn Gathright prefers slow, purposeful travel that blends historical intrigue with natural serenity, having explored Williamsburg’s colonial streets, Shenandoah National Park’s autumn foliage,
    and a literary pilgrimage to Oxford, England, while planning future trips to Scotland’s historic castles and Nova Scotia’s quiet coast.
  culinary: Evelyn Gathright enjoys preparing wholesome, herb‑forward meals such as rosemary‑infused roasted chicken, kale and quinoa salad with lemon vinaigrette, and lentil stew seasoned with thyme and
    bay leaf, using fresh herbs from their garden and showcasing an intermediate cooking skill that balances nourishment with family comfort.
  core: Evelyn Gathright blends a lifetime of compassionate, low‑tech special‑education expertise with solitary, reflective hobbies, navigating middle age with gentle disorganization, a penchant for gardening,
    and a steadfast commitment to quiet, purposeful living.
background:
  cultural: Evelyn is a white American who was born and raised in the suburban communities of Anne Arundel County, Maryland. Her upbringing reflects the Mid‑Atlantic’s blend of traditional family values,
    community volunteerism, and a strong emphasis on education. Growing up in a predominantly white, middle‑class neighborhood, she was exposed to local civic traditions such as neighborhood block parties,
    school fundraisers, and public library programs. Her family’s cultural practices include modest celebrations of holidays like Thanksgiving and the Fourth of July, often centered around shared meals
    and quiet family time. While she does not strongly identify with a particular religious denomination, the cultural milieu of her community has instilled in her a respect for religious tolerance and
    a sense of civic responsibility. These influences shape her compassionate approach to teaching and her commitment to fostering inclusive, harmonious environments.
attributes:
  skills: '["Individualized Education Plan (IEP) development and monitoring", "Differentiated instruction for neurodiverse learners", "Behavior management and positive reinforcement", "Assistive technology
    integration (e.g., speech‑to‑text, communication apps)", "Sensory‑friendly classroom design", "Collaborative team teaching and multidisciplinary coordination", "Parent communication and partnership
    building", "Emotional support and counseling for students", "Flexible lesson planning and improvisation", "Professional development facilitation for colleagues"]'
  hobbies: '["Reading historical fiction", "Herb and perennial gardening", "Birdwatching in Patapsco Valley State Park", "Knitting scarves and blankets", "Jigsaw puzzles", "Nature walks along the Chesapeake
    Bay shoreline", "Cooking wholesome meals for family", "Listening to classical music", "Journaling personal reflections"]'
  career_goals: Evelyn aims to become the lead special‑education coordinator for Anne Arundel County Public Schools within the next five years, overseeing the implementation of district‑wide inclusive policies
    and professional development. She hopes to design a model quiet‑learning hub that can be replicated in other schools, championing sensory‑friendly environments that support students who thrive in calm
    settings. To deepen her expertise, she plans to complete a bachelor’s degree in special education and pursue a master’s certification as a Special Education Specialist. Additionally, Evelyn is interested
    in authoring a practical guide for teachers on low‑tech, high‑impact strategies for neurodiverse learners and mentoring new educators entering the field.
