persona_description: A researcher in cognitive psychology, specifically focusing on the study of memory and forgetting. The researcher is interested in understanding the form and rate of information loss
  in memory, and how it is affected by factors such as content similarity and the precision and accessibility of memory representations. The researcher is skilled in using statistical methods, particularly
  probabilistic mixture models, to analyze and compare different measures of memory, such as precision and accessibility. The researcher is also experienced in using online testing to assess the extent
  to which forgetting is driven by a loss in either precision or accessibility.
