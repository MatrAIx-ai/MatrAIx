  career_goals: Through imaginative play, John often pretends to be a builder or a firefighter, roles that offer clear, structured tasks and visible outcomes. He enjoys constructing tall towers with his
    blocks and imagines designing a city where everything has its proper place. These play‑time aspirations reflect his desire for predictable responsibilities and a sense of achievement. As he grows, he
    may be drawn to occupations that combine hands‑on creation with defined rules, such as construction, engineering, or public‑service roles like firefighting, where he can be a reliable member of a small,
    trusted team.
