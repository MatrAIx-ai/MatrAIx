personas:
  professional: John Lee, a three-year-old with a budding fascination for gears and building blocks, practices a disciplined routine of assembling Lego structures, foreseeing simple cause-and-effect patterns
    that echo an early engineer's mindset, and they revel in the orderly click of each brick.
  sports: John Lee, a regular at the neighborhood park's 'Little Explorers' soccer group, idolizes the local youth team 'City Cubs' and his favorite player, scores small goals in friendly matches, but prefers
    solitary swings on the slide when crowds swell, and they balance competitive drive with a preference for small-group activities.
  arts: John Lee, an avid fan of 'Sesame Street' and the animated adventures of 'Paw Patrol', spends afternoons coloring pictures of Elmo and Chase, mimics the melodies of 'The Beatles' nursery versions,
    and they find solace in quiet, small-group art sessions.
  travel: John Lee, who loves weekend trips to the city's Children's Museum and the nearby lake for paddle-boat rides, plans each outing around his favorite stuffed bear, selecting destinations that offer
    predictable routines but occasional surprise, and they dream of visiting Disney World someday.
  culinary: John Lee, a discerning toddler who insists on perfectly crunchy chicken nuggets, creamy mac-and-cheese with a hint of cheddar, and sweet strawberry slices, proudly 'helps' stir the batter with
    a plastic spoon, yet stubbornly refuses broccoli, and they guard their favorite foods with a touch of picky determination.
  core: A three-year-old named John Lee who structures play with meticulous block towers, guards his piggy bank, battles eczema with disciplined care, and balances solitary curiosity with selective social
    bursts, and they approach each day with quiet determination.
background:
  cultural: John is raised in a Black family within Woodhaven, Queens, an ethnically diverse neighborhood of New York City. His household blends African‑American cultural traditions—such as weekend gatherings
    with soulful music, storytelling, and celebrations like Kwanzaa and family‑style meals—with the multicultural influences of his urban surroundings. He frequently attends community events at the local
    church and participates in library story‑time sessions that reflect the neighborhood’s blend of cultures. This environment provides him with a strong sense of cultural identity rooted in family heritage,
    community rhythm, and the rich tapestry of his city’s diversity.
