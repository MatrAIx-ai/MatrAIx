  hobbies: '[''Community Basketball League'', ''Tabletop Strategy Games'', ''Hiking in the Palisades and NJ State Parks'', ''Mentoring in Asian-American Professional Networks'', ''Cooking Traditional Chinese
    Cuisine'', ''Tai Chi Practice'']'
  career_goals: Chong aims to progress from a senior training specialist to a Director of Learning and Development within the next five years, where he can shape organizational learning strategy at a corporate
    level. He aspires to develop a proprietary, evidence‑based training model that blends innovative experiential techniques with proven business outcomes. Obtaining a certified professional in training
    and development (CPTD) credential and publishing thought‑leadership articles on measuring training effectiveness are key milestones. Ultimately, he envisions launching his own consultancy focused on
    high‑impact, ROI‑focused training solutions for multinational firms, allowing him to combine his competitive drive with his desire for measurable success.
