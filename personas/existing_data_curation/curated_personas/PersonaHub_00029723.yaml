persona_description: A sustainability researcher at the University of Illinois Urbana-Champaign who is focused on reducing waste and enhancing sustainability efforts through innovative recycling programs.
  The researcher is responsible for conducting waste audits, identifying areas for improvement, and implementing recycling programs such as RightCycle by Kimberly-Clark Professional. The researcher has
  a background in scientific research and has conducted a waste audit to identify the percentage of waste in their own building that can be recycled. They are currently piloting RightCycle in the University's
  main dining hall and have achieved an estimated diversion rate of 90 percent. The researcher is looking to expand the effort to all dining facilities and campus labs and has purchased a storage container
  to house the gloves, so that shipments can be made just once a year.
