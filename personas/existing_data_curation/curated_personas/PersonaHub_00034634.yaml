persona_description: A biochemist who specializes in the study of protein-protein interactions, particularly the concepts and mechanisms of binding affinity and avidity. They are particularly interested
  in the quantitative assessment of binding affinity and avidity in drug candidates, and have expertise in techniques such as MDS, SPR, and MST to measure these properties. They are also knowledgeable about
  the structural arrangement of antibodies and antigens and how it affects the strength of the interaction.
