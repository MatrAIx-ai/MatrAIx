personas:
  professional: Wendy Ross is an aspiring robotics enthusiast who spends weekends building Arduino-controlled model rockets and contributes methodical code snippets to her school’s robotics club, channeling
    their curiosity and competitive drive into precise, well-documented projects.
  sports: Wendy Ross enjoys hiking the nearby Stony Ridge Trail with the Northumberland Trail Explorers club, follows the Washington Capitals for occasional ice‑hockey excitement, and participates in a
    small after‑school cross‑country running team, preferring their low‑impact endurance activities over team sports.
  arts: Wendy Ross finds inspiration in the speculative worlds of authors like Becky Chambers and classic sci‑fi writer Isaac Asimov, while listening to indie folk artist Hozier and occasionally attending
    the local church’s folk‑music gatherings, integrating storytelling and music into their solitary creative time.
  travel: Wendy Ross dreams of exploring the basalt columns at New River Gorge and the launch pads at Kennedy Space Center, plans their trips meticulously using guidebooks and online forums, but usually
    limits travel to family road trips to Shenandoah National Park and weekend visits to neighboring historic towns due to budget constraints.
  culinary: Wendy Ross enjoys cooking simple comfort dishes like chicken and dumplings and mastering the perfect batch of blueberry pancakes, experiments with garden‑fresh herbs in homemade veggie stir‑fry,
    yet tends to over‑season sauces in the quest for bold flavor, reflecting their enthusiastic but still developing kitchen skill set.
  core: Wendy Ross is a methodical, curious teen who balances solitary tech projects with nature hikes, saves diligently for hobby gear, and navigates their health and social life with a quiet competitive
    edge.
background:
  cultural: Wendy grows up in Farnham, a small community in Northumberland County, Virginia, within a middle‑class, white family that values self‑reliance, education, and modesty. The local culture blends
    Southern hospitality, church involvement, and community events with an increasing emphasis on STEM education supported by school and regional programs. While she respects local traditions and the close‑knit
    nature of her town, she also engages with broader American youth culture through the internet, media, and school clubs, creating a hybrid cultural perspective that balances rural heritage with modern
    technological interests.
attributes:
  skills: '["Analytical problem solving (Math & Science)", "Basic programming (Python)", "Data organization and spreadsheet usage", "Organized study planning and time management", "Concise written communication",
    "Quiet public speaking (class presentations)"]'
  hobbies: '["Science‑fiction reading", "Model kit building (airplanes, rockets)", "Arduino/electronics tinkering", "Basic coding projects", "Nature trail hiking and wildlife journaling", "Robotics club
    (small team)", "Chess (strategic competition)", "Family gardening"]'
  career_goals: Wendy aims to attend a STEM‑focused high school and later pursue a degree in engineering—preferably aerospace or mechanical engineering—so she can combine her curiosity about how things
    work with practical, tangible outcomes. She is also interested in data analysis and environmental technology, seeing these fields as ways to apply her analytical skills to real‑world problems. Her competitive
    drive fuels a desire to earn scholarships, achieve top grades, and eventually mentor younger students interested in STEM.
