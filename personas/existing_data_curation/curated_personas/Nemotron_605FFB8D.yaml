    to historic sites","Attending art festivals"]'
  career_goals: Ariana aims to solidify her legacy within the Jackson academic and arts community by publishing a collection of interdisciplinary essays that fuse Southern literature with contemporary visual
    art. She aspires to secure a senior lecturer position that allows her to shape curriculum and mentor junior faculty, and she hopes to lead a collaborative program between the university and the local
    museum that curates traveling exhibitions of emerging regional artists. Passionate about nurturing talent, she plans to establish a scholarship for underrepresented students in the humanities and to
    receive recognition, such as a state arts award, for her contributions to community arts education.
