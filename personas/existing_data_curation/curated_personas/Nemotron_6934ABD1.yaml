personas:
  professional: Mark Hevia serves as a patrol officer in Williamsburg, Virginia, where their proficiency in conflict de-escalation, meticulous report writing, and community outreach reflects a structured,
    duty-driven mindset that they intend to leverage on the path to a sergeant position within five years.
  sports: Mark Hevia is an avid weight-trainer and runner who joins the Williamsburg Area Running Club for weekly 5K runs, frequents the local shooting range with the Colonial Virginia Marksmen group, and
    roots for the Washington Nationals in baseball and the Virginia Cavaliers during college football season.
  arts: Mark Hevia enjoys attending historical reenactments with the Williamsburg reenactment society, finds comfort in classic Americana music from Bruce Springsteen and Johnny Cash, and unwinds by watching
    period dramas starring Gary Oldman and the Broadway hit 'Hamilton' whenever they can.
  travel: Mark Hevia prefers short, well-planned road trips that blend historic exploration with nature, having already visited Colonial Williamsburg’s historic district, the Gettysburg battlefield, and
    the Scottish Highlands on a college excursion, and they dream of a future extended trip to the British Isles to trace colonial roots.
  culinary: Mark Hevia favors Southern coastal cuisine, regularly prepares crab cakes with lump crab meat, Old Bay seasoning, and Worcestershire sauce, enjoys grilled catfish coated in cornmeal and finished
    with lemon butter, and treats themselves to a bowl of black-eyed peas with collard greens on Thanksgiving, though they sometimes over-salt their dishes when rushing.
  core: Mark Hevia blends a disciplined police officer’s duty-first ethos with a quiet love for solitary fishing, a tendency to over-plan every detail, and a habit of double-checking weapon counts before
    bedtime.
background:
  cultural: Mark grew up in Williamsburg, Virginia, a community steeped in colonial history and Southern hospitality. His family background is rooted in Anglo‑American traditions, with strong emphasis on
    patriotism, respect for law and order, and participation in local civic events such as county fairs and historical festivals. This blend of coastal Virginian heritage and professional police culture
    shapes his values of duty, community service, and modesty.
attributes:
  skills: '["Patrol operations", "Traffic enforcement", "Initial crime scene assessment", "Conflict de‑escalation", "First‑aid certification", "Defensive tactics", "Firearms handling", "Report writing",
    "Community outreach"]'
  hobbies: '["Fishing", "True‑crime reading", "Weight‑training", "Running", "Shooting range sessions", "Historical reenactment volunteering"]'
  career_goals: Mark aims to progress to a sergeant position within the next five years, focusing on mastering investigative techniques and earning a criminal‑justice degree. He hopes to join a specialized
    unit, such as the community‑policing liaison team or the K‑9 unit, where his methodical approach can be leveraged. Long‑term, he aspires to become a precinct commander, shaping policies that prioritize
    officer well‑being and strong community ties, while providing a stable future for his wife.
