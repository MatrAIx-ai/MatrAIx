  hobbies: '[''Gardening'', ''Knitting'', ''Crocheting'', ''Quilting'', ''Cooking and baking'', ''Reading mystery novels'', ''Watching classic TV series'', ''Church community events'', ''Volunteer work'',
    ''Walking on local trails'']'
  career_goals: Jackie aims to deepen her expertise and transition into a supervisory role within a reputable housekeeping department, such as lead housekeeper at a local hotel, senior housekeeping coordinator
    for a senior‑living facility, or manager of a residential cleaning team. Over the next two years, she plans to obtain a professional cleaning certification and build a small client base for a side business
    that emphasizes eco‑friendly services for households in Beaver County. Her long‑term ambition is to establish her own cleaning company, allowing her to create reliable work routines for herself and
    provide stable, well‑paid positions to other dependable workers from her community. Financially, she seeks to increase her annual earnings to better support her family, contribute toward a larger home
    down‑payment, and secure retirement savings.
