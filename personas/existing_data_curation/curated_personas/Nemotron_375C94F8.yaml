personas:
  professional: Joseph Carroll, an aspiring junior robotics engineer, combines their disciplined organization, love for structured play, and sociable energy to design and program Arduino‑based games in
    Scratch, leading the school’s coding club while they constantly set and meet high standards for project completion.
  sports: Joseph Carroll, a dedicated midfielder for the Ballwin Youth Soccer Club and a point guard in the YMCA basketball league, trains five days a week with a disciplined schedule, roots for St. Louis
    City SC in MLS and the St. Louis Cardinals in MLB, and they balance a competitive drive with the teamwork values learned from community sports culture.
  arts: Joseph Carroll, a percussionist in the school marching band who idolizes drummer Travis Barker, enjoys listening to Imagine Dragons and the video‑game composer C418, spends weekends creating drum
    covers of Minecraft soundtracks, and they draw artistic inspiration from performances at the local county fair.
  travel: Joseph Carroll, who loves family road trips to the Ozark National Scenic Riverways and annual visits to the St. Louis County Fair, dreams of exploring the historic streets of New Orleans and the
    futuristic attractions of Tokyo’s Akihabara, and they plan each journey with a detailed checklist and a map of must‑see landmarks.
  culinary: Joseph Carroll, an enthusiastic home cook who can whip up a perfect batch of St. Louis‑style toasted ravioli, a cheesy mac‑and‑cheese casserole, and custom pizza topped with pepperoni, cheddar,
    and pineapple, relishes the sweet taste of butter‑rich chocolate chip cookies, and they occasionally over‑season dishes with extra hot sauce.
  core: Joseph Carroll blends Midwestern community values, disciplined organization, and boundless curiosity, turning structured hobbies like LEGO engineering and soccer into avenues for social connection
    and creative expression, even if they occasionally procrastinate on chores.
background:
  cultural: 'Joseph grew up in Ballwin, a suburban community in St. Louis County, Missouri. His family reflects traditional Midwestern values: a blend of middle-class American culture, strong community
    ties, and regular participation in local church (United Methodist) and neighborhood events. He is exposed to regional customs such as county fairs, high school sports enthusiasm, and a strong emphasis
    on education and civic responsibility. The cultural environment encourages polite interaction, teamwork, and a respect for structured activities, all of which shape his outlook.'
