  career_goals: Joseph aspires to pursue a career that combines his love for structure, problem-solving, and teamwork. He dreams of becoming a civil or aerospace engineer, envisioning himself designing
    bridges or spacecraft. He also expresses a desire to serve his community, perhaps as a firefighter or a youth group leader, where his organizational skills and outgoing nature can help coordinate emergency
    response or mentor younger peers.
