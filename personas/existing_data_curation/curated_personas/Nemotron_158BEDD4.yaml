  hobbies: '[''Fly fishing'', ''Hunting'', ''Woodworking'', ''Vintage motorcycle restoration'', ''Reading Civil War and Appalachian history'', ''Playing chess'', ''Church community service'', ''County fair
    volunteering'', ''Listening to country and bluegrass music'']'
  career_goals: Arthur aims to transition from a top‑performing sales representative to a regional sales manager within the next five years, overseeing multiple locations across East Tennessee and Southern
    Kentucky. He envisions building a high‑performing team that mirrors his disciplined, goal‑oriented approach while introducing data‑centric sales strategies. Long‑term, Arthur hopes to launch his own
    independent dealership specializing in agricultural and heavy‑equipment sales, leveraging his deep community ties and industry knowledge. He also plans to pursue certifications in advanced CRM analytics
    and sales leadership to stay ahead of evolving market technologies.
