personas:
  professional: Arthur Peraza is a top-performing sales rep in the Big Sandy area who leverages disciplined territory management, HubSpot analytics, and Power BI forecasts to out‑sell rivals, while mentoring
    junior staff and planning to scale into a regional manager role, driven by their competitive edge and calm under pressure.
  sports: Arthur Peraza enjoys fly‑fishing on Kentucky Lake, seasonal deer hunting trips, and cheering on the Tennessee Volunteers football team and Nashville Predators, while maintaining a membership with
    the local shooting club and occasionally playing pick‑up basketball at the county fair gym.
  arts: Arthur Peraza curates a modest collection of Civil War and Appalachian history volumes, restores vintage motorcycles as tactile art, crafts handmade furniture in the garage, and revels in bluegrass
    legends like Bill Monroe and contemporary country stars such as Dolly Parton, which together shape their creative downtime.
  travel: Arthur Peraza prefers road‑trip itineraries that blend nature and heritage, having explored the Great Smoky Mountains, the Blue Ridge Parkway, and historic Lexington, Kentucky, while planning
    a future pilgrimage to the Civil War battlefields of Gettysburg and a week‑long fishing lodge stay in the Canadian Rockies.
  culinary: Arthur Peraza favors Southern comfort foods—smoked barbecue brisket, shrimp and grits, and biscuits with honey butter—while skillfully seasoning dishes with locally sourced bourbon, peppercorn,
    and sweet corn, though they admit to over‑seasoning their wood‑smoked salmon in pursuit of the perfect flavor.
  core: Arthur Peraza is a disciplined sales veteran whose love of fishing, woodworking, and bluegrass balances a competitive spirit with a calm, structured approach to life, even if they sometimes over‑budget
    their hobbies and skip flossing.
background:
  cultural: Arthur comes from a multi‑generational white family rooted in the Appalachian foothills of East Tennessee. Raised in a close‑knit community, he internalized the Southern values of hard work,
    self‑reliance, and hospitality. Family traditions include seasonal gatherings featuring smoked barbecue, homemade biscuits, and storytelling about local history. He identifies with the region’s conservative
    outlook, cherishes his Baptist faith, and participates in community activities such as volunteer fire‑department events and local high‑school sports. This cultural milieu reinforces his preference for
    stability, structured routines, and a pragmatic outlook on life.
attributes:
  skills: '[''Territory Management'', ''Negotiation and Deal Closing'', ''Customer Relationship Management (HubSpot)'', ''Sales Forecasting (Excel, Power BI)'', ''Product Demonstrations'', ''Inventory Coordination'',
