personas:
  professional: Randy Benrube is a veteran carpenter in Marysville who blends 25 years of residential framing, finish carpentry and custom‑furniture making with a curious, practical drive for sustainable
    building methods, and they mentor apprentices while often letting a relaxed, somewhat disorganized planning style keep projects flexible and competitively high‑quality.
  sports: Randy Benrube laces up each Thursday for the Marysville Mavericks adult soccer league, cheers on the Seattle Sounders FC and Seattle Seahawks on game nights, and they spend weekend mornings fishing
    the Snohomish River, using these activities as both fitness outlets and social glue despite occasionally skipping workouts.
  arts: Randy Benrube strums acoustic covers of Neil Young and Bob Dylan at community gatherings, regularly catches live shows at Seattle’s The Crocodile to discover up‑and‑coming indie rock, and they keep
    a rotating vinyl collection featuring The Rolling Stones, Led Zeppelin, and local folk singer Carla Thomas, letting music fuel their woodworking creativity.
  travel: Randy Benrube favors low‑key road trips across the Pacific Northwest, having fished the Kenai River in Alaska and camped among the redwoods, and they dream of a woodworking pilgrimage to the historic
    timber towns of Girona, Spain, though budget constraints keep the trip on the wish‑list.
  culinary: Randy Benrube fires up a Traeger pellet smoker to slow‑cook a honey‑glazed pork belly seasoned with smoked paprika, brown sugar, and cedar wood chips, they pair it with a home‑brewed American
    Pale Ale hopped with Cascade and Centennial, and proudly serve their signature smoked cheddar dip at neighborhood potlucks.
  core: Randy Benrube, a 47‑year‑old carpenter, blends rugged hands‑on skill with a love for community, craft beer, and spontaneous creativity, yet they often embrace a relaxed, disorganized schedule and
    a healthy dose of skepticism.
background:
  cultural: Randy is a White American with deep roots in the Pacific Northwest timber and working‑class culture. Growing up in the Marysville area, he was surrounded by a community that values self‑reliance,
    practical skill, and a close connection to the outdoors. His family’s background includes generations of loggers and craftsmen, which fostered an early respect for wood as both a material and a livelihood.
    The regional ethos of friendly competition, community service, and a laid‑back attitude toward schedules informs his approach to both his trade and his everyday life.
