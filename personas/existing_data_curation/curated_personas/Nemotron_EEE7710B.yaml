  career_goals: Randy aims to grow his side business into a boutique custom‑furniture and renovation firm that can take on larger residential projects while preserving the flexibility he values. He plans
    to earn a journeyman carpenter certification, expand his expertise in energy‑efficient construction, and build a small team of trusted tradespeople. Over the next five years, he hopes to increase his
    annual revenue by 40 %, secure a steady stream of repeat clients, and become a local mentor for aspiring carpenters, balancing his competitive drive with a reputation for reliable, high‑quality work.
