  career_goals: Yanet aims to advance from her current production worker role to a shift supervisor within the next two years, targeting a Six Sigma Green Belt certification to deepen her expertise in quality
    improvement. She plans to enroll in an associate’s program in industrial technology at a local community college, building a foundation for eventual plant management responsibilities. Long‑term, she
    envisions leading a cross‑functional team that implements efficiency projects across multiple facilities, and later leveraging that experience to mentor other Latinx employees or start a consultancy
    that helps small manufacturers adopt lean practices while fostering inclusive workplace cultures.
