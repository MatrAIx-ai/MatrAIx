personas:
  professional: Suzanne Baldwin, a diligent high‑school senior with a knack for caregiving, blends her hands‑on experience in home cooking, garden maintenance, and sibling care into a budding plan for a
    CNA certification while dreaming of a small crochet side‑business that funds her routine‑oriented lifestyle.
  sports: Suzanne Baldwin, a dog‑walking enthusiast who enjoys low‑impact exercise, joins the local Woodland Hiking Club for weekend strolls and cheers on the county’s minor league baseball team, the Riverside
    Runners, while occasionally attending the high school’s cross‑country meets as a supportive spectator.
  arts: Suzanne Baldwin, an avid listener of folk and country sounds, regularly tunes in to bluegrass groups like The Ridge Hill Ramblers and The Carolina Cedar, sings along while crocheting, and finds
    literary solace in historical novels by author Dana Larkin, which together shape their creative outlet and community connection.
  travel: Suzanne Baldwin, a budget‑conscious explorer, prefers day‑trips to nearby Shenandoah National Park and weekend stays at a family cabin in the Great Smoky Mountains, while dreaming of a future
    road‑trip to Nashville’s music scene and planning each outing with a handwritten checklist of essential supplies.
  culinary: Suzanne Baldwin, a home‑cooking aficionado, whips up hearty tomato‑basil soup, cornbread, and herb‑infused roasted chicken using garden‑fresh basil, thyme, and rosemary, and delights in sharing
    these dishes at church potluck gatherings where they also experiment with a pinch of smoked paprika.
  core: Suzanne Baldwin thrives on routine‑driven comfort, channeling their love for crochet, garden care, and caring for others into a steady, community‑centered life while quietly battling a habit of
    over‑saving and occasional yarn‑obsessed procrastination.
background:
  cultural: Suzanne is raised in a white Appalachian family in Huntington, West Virginia. Her upbringing reflects the region's strong emphasis on close‑knit family ties, self‑reliance, and community support.
    Local church life and seasonal community events shape her social world, reinforcing values of humility, practicality, and harmony. The Appalachian tradition of passing down crafts and folk stories is
    evident in her crocheting hobby and love of regional literature and music. While she draws on broader American culture, her daily life is grounded in the modest, routine‑centered rhythm typical of many
    small‑town West Virginians.
attributes:
  skills: '[''Cooking family meals'', ''Home cleaning and organization'', ''Basic caregiving'', ''Gardening and plant care'', ''Crocheting and handcrafts'', ''Basic computer and internet navigation'', ''Active
