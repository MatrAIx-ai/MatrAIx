  hobbies: '[''Crocheting'', ''Gardening'', ''Reading historical fiction'', ''Listening to folk and country music'', ''Walking her dog'', ''Cooking family recipes'', ''Attending small church gatherings'']'
  career_goals: Suzanne aims to complete her GED within the next year and enroll in a community college program for a Certified Nursing Assistant (CNA) certificate, building on her natural caregiving instincts.
    She also hopes to develop a modest side business selling crocheted items at local craft fairs and online marketplaces, leveraging her craft skill and love for routine. Long‑term, she envisions a stable
    career in home health care that lets her stay close to her family and community while maintaining a predictable schedule.
