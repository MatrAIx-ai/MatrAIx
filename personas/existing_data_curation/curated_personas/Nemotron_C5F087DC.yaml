  hobbies: '[''Drawing comics'', ''Digital art (Scratch)'', ''Reading fantasy/scifi novels'', ''Science experiments'', ''Basketball'', ''Hip‑hop/R&B dancing'', ''Attending cultural festivals'', ''Journaling'',
    ''Volunteering at church youth group'']'
  career_goals: Terry dreams of turning his love for art and storytelling into a future career as a graphic novelist or video game designer who creates characters and worlds that reflect his community’s
    experiences. He also hopes to study architecture or engineering to blend his creativity with problem‑solving. In the short term, he wants to lead a school art club, earn a scholarship for a summer arts
    camp, and become a peer mentor who helps classmates cope with anxiety. Ultimately, he imagines using his creative skills to inspire other young people and to contribute to projects that celebrate Black
    culture and promote mental‑health awareness.
