personas:
  professional: An aspiring junior comic artist and budding digital creator, Terry Nash leverages their curiosity and methodical planning to produce weekly storyboard sketches, organize their art workflow
    on a tablet, and collaborate with peers at the community center, while their sociable nature fuels a growing online fanbase.
  sports: A high‑energy point guard on the Midtown Youth Basketball League, Terry Nash also practices hip‑hop dance with the community center crew, idolizes the Golden State Warriors and follows the local
    high‑school team the Riverdale Raptors, regularly attending after‑school drills and weekend games.
  arts: A passionate comic‑book creator, Terry Nash draws inspiration from creators like Stan Lee and manga artist Akira Toriyama, spends evenings sketching characters from their favorite fantasy novels,
    and curates a digital gallery on a teen‑friendly platform where they share animated shorts.
  travel: An organized explorer, Terry Nash has visited the nearby state museum and taken a family road‑trip to the Grand Canyon, dreams of attending Japan’s Ghibli Museum, and meticulously plans future
    trips using a colorful map journal, balancing parental budget constraints with a craving for adventure.
  culinary: A budding home chef, Terry Nash loves making pepperoni pizza and crafting sushi rolls with cucumber and avocado, enjoys snacking on gummy bears while drawing, and frequently experiments with
    bright food coloring in cupcakes to match their comic‑book palettes.
  core: Terry Nash is a curious, organized, and emotionally intense 11‑year‑old whose love for comics, basketball, and journaling fuels a vivid imagination tempered by bouts of anxiety that drive both their
    creative bursts and occasional procrastination.
background:
  cultural: Terry is a Black boy growing up in Oklahoma City, rooted in a family that values community, faith, and cultural pride. His parents and grandparents share stories of African American history,
    the civil‑rights movement, and Southern Black traditions, which shape his sense of identity. He regularly attends a local Black church where gospel music and community service reinforce his values.
    The city’s vibrant African‑American cultural scene – from jazz and blues concerts to Juneteenth celebrations and neighborhood art murals – informs his artistic style and love for storytelling. He participates
    in after‑school programs at the community center that highlight Black heritage, such as workshops on African drumming and mural painting. These experiences give him a strong connection to his roots
    while also exposing him to the broader, multicultural fabric of Oklahoma.
