persona_description: Miguel Angel Asturias was a Guatemalan poet, novelist, and diplomat who was awarded the Nobel Prize for Literature in 1967 and the Lenin Peace Prize in 1966. His writings combined the
  mysticism of the Maya with an epic impulse toward social protest, and his life and work were seen as representing the social and moral aspirations of his people. Asturias was born in Guatemala City, Guatemala,
  on October 19, 1899, and died in Madrid, Spain, on June 9, 1974. He studied law at the University of San Carlos in Guatemala before settling in Paris, where he became a militant Surrealist under the influence
  of the French poet and movement leader Andre Breton. He founded and edited El diario del aire, a radio magazine, and published several volumes of poetry beginning with Sonetos (1936). He embarked upon
  a diplomatic career and served in several countries in Central and South America, including Guatemala, before being appointed the Guatemalan ambassador in Paris in 1966. His writings are collected in
  the three-volume Obras completas (1967). Asturias's talent and influence as a novelist began to emerge with his impassioned denunciation of the Guatemalan dictator Manuel Estrada Cabrera, El senor presidente
  (1946).
