personas:
  professional: John Durham, a budding robotics club strategist, leverages his knack for systematic problem‑solving, competitive drive, and meticulous coding to design autonomous LEGO‑based machines, treating
    each project like a chess match.
  sports: John Durham, a disciplined runner who logs daily 3‑kilometer jogs with the school’s cross‑country team and follows the seasonal flow of the NBA’s Boston Celtics, channels his competitive spirit
    into track meets while preferring solitary laps over team sports.
  arts: John Durham, whose creative outlet is assembling LEGO Technic masterpieces, also devotes free time to dissecting the visual storytelling of Studio Ghibli films and the ambient soundtracks of Hideo
    Kojima’s games, drawing inspiration from the precision of Da Vinci’s sketches to fuel his design aesthetic.
  travel: John Durham, who meticulously plans family vacations on a spreadsheet, dreams of a tech‑focused trip to Tokyo’s Akihabara district and a science‑museum tour of Berlin, but currently limits travel
    to weekend road trips to nearby state fairs where he can test new robotics kits.
  culinary: John Durham, a self‑taught microwave chef, favors precise recipes like spaghetti carbonara with pancetta and garlic, enjoys assembling homemade sushi rolls with fresh tuna and avocado, and treats
    snack time as a strategic experiment, often timing how quickly they can finish a plate of nachos before the next gaming session.
  core: John Durham, a competitively minded 12‑year‑old, blends chess‑level foresight with a spreadsheet‑driven life, obsessively logs every game move, budget and stretch, yet can’t resist a late‑night
    gaming binge that eats into their sleep.
background:
  cultural: John is a white American raised in a suburban neighborhood of Sacramento, California. His family values education, personal responsibility, and community involvement, reflecting a mainstream
    middle‑class Western cultural environment. He celebrates typical American holidays such as Thanksgiving, Independence Day, and Christmas, and enjoys cultural touchstones like baseball, pop music, and
    tech‑oriented media. Growing up in a diverse California region, he is exposed to a variety of cultural perspectives, but his household traditions and daily routines align closely with conventional Anglo‑American
    suburban life.
