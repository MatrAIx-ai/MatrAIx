  career_goals: Robert hopes to turn his blend of curiosity and practicality into a career that lets him create and fix things. He dreams of becoming a mechanical engineer or product designer who works
    on sustainable technology, and he also entertains the idea of developing video games that blend storytelling and engineering. He wants to attend a STEM‑focused high school, then a university engineering
    program, and eventually work in a collaborative environment where he can both lead projects and learn from mentors. Aware of his tendency to worry, he plans to develop stress‑management habits and seek
    supportive mentors to help balance his ambitions with his emotional well‑being.
