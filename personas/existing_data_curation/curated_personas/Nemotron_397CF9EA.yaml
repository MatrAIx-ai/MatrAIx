personas:
  professional: A budding game developer, Robert Allen leverages his passion for Minecraft modding and school robotics projects to tinker with code, balancing a curious appetite for new mechanics with a
    practical, step‑by‑step workflow, though his relaxed attitude toward deadlines often leads to last‑minute crunch sessions.
  sports: A versatile teen athlete, Robert Allen plays forward for the local middle‑school basketball team, spends afternoons at the community skate park perfecting kick‑flips on a 7‑inch deck, joins the
    neighborhood bike club for rides along the Riverside Trail, and cheers for the nearby professional baseball team, the River City Rovers.
  arts: An indie‑music‑loving sketcher, Robert Allen fills their notebook with comic‑strip panels inspired by Jeff Smith and Lisa Hanawalt while listening to Tame Impala, Arctic Monkeys, and The Strokes,
    and they regularly attend the school’s art showcase where they display hand‑drawn sci‑fi characters.
  travel: A spontaneous explorer, Robert Allen has visited the Grand Canyon on a family road trip, dreams of attending the Tokyo Game Show to experience Japanese gaming culture, and prefers flexible itineraries
    that let them bike through city parks or wander local museums, often juggling school assignments with wanderlust.
  culinary: A budding home chef, Robert Allen loves pepperoni pizza, chicken tacos with fresh salsa, and homemade cinnamon rolls, frequently experiments with simple recipes like ramen‑style stir‑fry while
    still reaching for snacks of chips and gummy bears during late‑night gaming sessions.
  core: Robert Allen is a curiosity‑driven teen who builds digital worlds, sketches comic heroes, worries about deadlines, and balances a love for free‑form creation with occasional disorganization and
    impulsive spending.
background:
  cultural: Robert grew up in Barberton, a small city in Ohio’s Greater Akron area, surrounded by a tight‑knit, middle‑class community with strong Midwestern values. His family has roots in German and Irish
    ancestry, reflected in holiday traditions such as Easter egg hunts, Fourth of July parades, and a yearly family reunion featuring barbeque and folk music. The local culture emphasizes hard work, modesty,
    and community involvement—values reinforced through his school’s emphasis on sports, church youth groups, and neighborhood events. The region’s industrial past and current focus on manufacturing and
    technology have given Robert exposure to both hands‑on trades and emerging STEM opportunities.
