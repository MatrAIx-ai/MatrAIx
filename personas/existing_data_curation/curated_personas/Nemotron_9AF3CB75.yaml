  hobbies: '[''Cooking traditional Mexican dishes'', ''Garden cultivation (chilies, tomatoes, marigolds)'', ''Salsa and folklorico dancing'', ''Reading historical fiction and memoirs'', ''Volunteering at
    the local senior center'', ''Church choir participation'', ''Genealogy research'', ''Digital photography and video calling'']'
  career_goals: Although retired from formal employment, Estrella aims to deepen her impact on the Warner Robins community by establishing a multicultural garden that showcases Mexican heirloom vegetables
    and educates local seniors on sustainable practices. She also hopes to volunteer regularly at the public library’s Spanish‑language storytime, mentor teens interested in preserving Mexican culinary
    traditions, and complete a planned trip to her hometown in Jalisco to reconnect with extended family and record oral histories for future generations.
