personas:
  professional: Estrella Ramirez, a retired community mentor turned multicultural garden pioneer, channels their bilingual fluency, event‑coordination savvy, and green‑thumb precision into building a heritage‑focused
    garden that teaches seniors sustainable practices while juggling meticulous planning with a flair for spontaneous festivity.
  sports: Estrella Ramirez stays active through weekly aqua‑fit classes at the senior center, supports the Atlanta Braves and Atlanta Falcons during game nights, and they co‑host a neighborhood walking
    club that meets for sunrise strolls through the local park, often cheering on the local high school soccer team.
  arts: Estrella Ramirez, a choir member and avid festival dancer, finds inspiration in the vibrant guitar riffs of Carlos Santana, the storytelling ballads of Juan Gabriel, the bold brushstrokes of Frida
    Kahlo murals, and the soulful poetry of Maya Angelou, weaving these influences into their community performances.
  travel: Estrella Ramirez blends relaxed road trips across historic Georgia towns with purposeful pilgrimages to Jalisco, where they plan to interview extended relatives and capture oral histories, while
    also cherishing weekend getaways to Asheville’s craft fairs and occasional visits to New Orleans for its music scene.
  culinary: Estrella Ramirez, a seasoned home chef, perfects their family’s mole poblano using ancho chilies, chocolate, and pumpkin seeds, prepares fresh corn tortillas for tacos al pastor, and crafts
    vibrant salsa verde from garden‑grown heirloom tomatoes, cilantro, and tomatillos, always finishing meals with a garnish of toasted marigold petals.
  core: Estrella Ramirez, the 67‑year‑old garden‑loving storyteller, never skips their nightly chamomile tea, habitually misplaces their reading glasses, and they can recite the exact spice proportions
    of every family recipe, all while coaxing neighbors into spontaneous salsa circles.
background:
  cultural: Estrella was born in the state of Jalisco, Mexico, and moved to Texas with her parents as a young child, where she grew up in a bilingual household steeped in Catholic traditions and Mexican
    customs. After marrying her high‑school sweetheart, she relocated to Warner Robins, Georgia, where she has lived for over three decades. She maintains a rich Mexican cultural identity through celebrating
    Día de los Muertos, preparing tamales for family gatherings, and participating in local Hispanic festivals, while also embracing Southern hospitality and the close‑knit community spirit of Georgia.
attributes:
