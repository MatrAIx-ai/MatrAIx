personas:
  professional: Marlin Wilson, a diligent building cleaner in Rome, NY, leverages meticulous inventory management, green‑cleaning expertise, and strong communication to coordinate small cleaning crews,
    while pursuing ISSA CPC certification and OSHA training to advance toward a facilities supervisory role.
  sports: Marlin Wilson enjoys low‑impact outdoor activities such as hiking the Adirondack foothills and weekend bird‑watching walks, casually follows the Buffalo Bills and Buffalo Sabres for the camaraderie
    of local fan groups, and participates in a small community running club that meets for 5‑k runs each Saturday.
  arts: Marlin Wilson finds creative outlet in assembling detailed model airplanes and historic train kits, admires the craftsmanship of artists like Norman Rockwell, listens to folk‑rock legends such as
    Bob Dylan while working, and occasionally attends intimate performances at the Oneida County community theater.
  travel: Marlin Wilson prefers meticulously planned solo trips that blend nature and low‑key exploration, having already trekked the Finger Lakes and Long Island’s Montauk Point, while dreaming of a bird‑watching
    expedition to Costa Rica’s Monteverde Cloud Forest and a quiet weekend stay at a cabin in the Catskills.
  culinary: Marlin Wilson enjoys cooking simple, garden‑fresh meals like roasted beet and quinoa salad with goat cheese and fresh thyme, is comfortable sautéing seasonal vegetables, and occasionally treats
    themselves to a well‑prepared fish and chips from a local deli as a modest indulgence.
  core: Marlin Wilson is a methodical, nature‑loving Janitorial specialist who balances disciplined budgeting and health routines with solitary hobbies like model building and gardening, always seeking
    order and sustainable improvement.
background:
  cultural: Marlin was raised in a working‑class, Upper‑Midwestern family that settled in Oneida County generations ago. His ancestry is primarily Northern European (German and English), and his upbringing
    reflected the practical, community‑oriented values common to small‑town upstate New York. He grew up attending public schools and left high school early to support his family, which fostered a strong
    work ethic and respect for dependable, hands‑on occupations. Local traditions such as county fairs, high‑school sports events, and volunteer neighborhood projects shaped his sense of belonging. While
    he does not actively practice a specific religion, the cultural environment emphasized humility, cooperation, and responsibility—traits that continue to influence his personal and professional life.
attributes:
  skills: '[''Commercial cleaning'', ''Floor care (stripping, sealing, buffing)'', ''Industrial cleaning equipment operation'', ''Hazardous chemical handling'', ''OSHA safety compliance'', ''Inventory management'',
    ''Time scheduling and documentation'', ''Minor facility maintenance (light carpentry, plumbing, electrical)'', ''Green cleaning practices'', ''Customer service and small‑team coordination'']'
  hobbies: '[''Hiking and nature walks'', ''Birdwatching'', ''Model building (airplanes, trains)'', ''Reading non‑fiction (sustainability, DIY)'', ''DIY home repair projects'', ''Community gardening'',
    ''Small‑group book club'', ''Volunteer clean‑up events'']'
  career_goals: Marlin aims to progress from a janitorial role to a supervisory position within facility management. Over the next few years he plans to obtain the ISSA Certified Professional Cleaner (CPC)
    credential and complete an OSHA 30‑hour safety course to broaden his expertise. He is interested in learning advanced building‑systems maintenance, such as HVAC basics, so he can eventually become a
    facilities coordinator. In the longer term, Marlin hopes to leverage his practical experience and certifications to start a small, locally‑owned eco‑friendly cleaning business that serves schools and
    municipal buildings in Oneida County.
