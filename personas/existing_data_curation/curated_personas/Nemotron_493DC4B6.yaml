  career_goals: Michael plans to complete a bachelor’s degree in Interaction Design or Visual Arts within the next three years while building a professional portfolio of digital artwork and UI projects.
    He aims to secure a summer internship at a design studio or tech startup to gain real‑world experience, then transition into a junior UI/UX designer role. In the longer term, he aspires to become a
    creative director or launch his own freelance studio that blends art, user experience, and emerging technologies, allowing him to continuously explore novelty and innovative concepts.
