personas:
  professional: Michael Knight supervises commercial and municipal construction crews with three decades of hands-on expertise, and they infuse each site with the same curiosity that drives their visits
    to the RISD Museum, using artistic perspectives to devise creative, safe, and sustainable solutions while mentoring apprentices and keeping projects on schedule and budget.
  sports: Michael Knight spends Saturdays hiking the coastal trails of Narragansett Bay with the local Narrative Bay Hiking Club, they follow the Boston Red Sox and Providence Friars basketball with lively
    discussions at the senior center, and they stay active by joining a low-impact senior water-polo league during the summer.
  arts: Michael Knight frequents the RISD Museum to study contemporary works by artists such as Julie Mehretu and Anish Kapoor, they channel that visual inspiration into custom furniture designs, and they
    contribute backstage to the Providence Community Theatre while sharpening strategic thinking through weekly chess games at the senior center.
  travel: Michael Knight plans trips with a blend of structured itineraries and spontaneous detours, having already explored Barcelona's art-laden streets, Cape Cod's historic lighthouses, and Acadia National
    Park's rugged coastline, and they dream of future journeys to Kyoto to study traditional wooden joinery and Japanese garden design.
  culinary: Michael Knight enjoys cooking dishes that mirror their love of the sea and craftsmanship, regularly preparing New England clam chowder with fresh clams, thyme-infused lobster rolls, and hand-crafted
    sourdough bread topped with local honey and walnuts, and they also experiment with Mediterranean grilled octopus seasoned with lemon and capers during weekend gatherings.
  core: Michael Knight blends a seasoned construction manager's practicality with an artist's curiosity, turning blueprints into sustainable structures while carving out time for woodworking, chess, and
    coastal hikes, even if they sometimes forget to water indoor plants.
background:
  cultural: Michael is a lifelong resident of Johnston, Rhode Island, raised in a working‑class New England family with roots that trace back to the early 19th‑century mill towns of the state. His heritage
    blends traditional New England values of modesty, community involvement, and a respect for local history. Though raised in a predominantly Catholic household, he identifies more with a culturally secular
    outlook, embracing the pragmatic, neighborly ethos of Providence County. The coastal and maritime legacy of Rhode Island, along with the region's appreciation for craftsmanship and the arts, have shaped
    his respect for hands‑on work, community festivals, and local cultural institutions.
attributes:
