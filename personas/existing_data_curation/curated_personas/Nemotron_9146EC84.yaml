  hobbies: '[''Visiting art museums (RISD Museum, Providence Art Club)'', ''DIY woodworking and furniture making'', ''Reading art history and architecture books'', ''Hiking coastal trails (Narragansett
    Bay)'', ''Volunteer backstage crew for community theater'', ''Playing chess at the senior center'', ''Photography of historic buildings'', ''Attending local cultural festivals (e.g., Rhode Island International
    Film Festival)'']'
  career_goals: Looking ahead, Michael aims to transition from day-to-day site supervision to a senior project management role that allows him to shape larger municipal infrastructure projects in Rhode
    Island. He plans to obtain a Certified Construction Manager (CCM) credential and deepen his expertise in green building practices, such as LEED certification, to integrate sustainable approaches on
    his job sites. Michael also aspires to formalize his mentorship by establishing a structured apprenticeship program within his company, passing on his trade knowledge to the next generation. In the
    longer term, he is considering launching a boutique construction consultancy focused on safety training and innovative, low-impact construction techniques before fully retiring.
