  career_goals: Erick aims to solidify his status as a master‑licensed HVAC contractor by completing the NATE certification and renewing his EPA 608 certification. Over the next few years he plans to transition
    from full‑time field work to a supervisory and consulting role, where he can mentor younger technicians, particularly Spanish‑speaking apprentices, and oversee larger retro‑fit projects that improve
    energy efficiency in the Oklahoma City community. He also hopes to launch a modest, family‑run service business that provides affordable, culturally sensitive HVAC solutions to the local Hispanic population,
    while gradually scaling back hours as he approaches retirement.
