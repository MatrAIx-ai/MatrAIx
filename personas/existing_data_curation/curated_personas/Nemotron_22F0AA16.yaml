  hobbies: '[''Community Festival Participation'', ''Cajun/Zydeco Dancing'', ''Creole Cooking'', ''Volunteer Fire Department Safety Outreach'', ''Air‑show Fundraising'', ''Fishing'', ''Garden Maintenance'',
    ''Model Aircraft Building'', ''Aviation Magazine Reading'', ''Mystery Novel Reading'', ''Bridge Club'', ''Book Club'']'
  career_goals: Cathy aims to leverage her extensive hands‑on experience to move into a senior supervisory role within the aviation maintenance department, overseeing a team of technicians and coordinating
    larger aircraft upgrade projects. She plans to obtain an FAA Airframe and Powerplant (A&P) license combined with an avionics certification to broaden her qualifications. Over the next five years she
    hopes to become the primary trainer for new hires, develop a safety‑audit program for the shop, and serve as a liaison between maintenance crews and flight operations. Long‑term, she envisions transitioning
    to a consulting role or teaching avionics maintenance courses at a local community college, allowing her to share her knowledge while remaining connected to the aviation community in South Louisiana.
