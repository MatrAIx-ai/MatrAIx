persona_description: A team of architects and designers who specialize in the conservation and preservation of historic buildings, particularly those with a strong historical and architectural significance.
  They have a unique approach to preservation, focusing on preserving the existing structure as it is, rather than completely demolishing and rebuilding. Their projects often involve incorporating old and
  new elements to create a cohesive and historically accurate design. They have won numerous awards throughout their career, including the RIBA West Midlands Regional Award, the West Midlands Small Project
  of the Year, and the Architect's Journal Small Projects Award.
