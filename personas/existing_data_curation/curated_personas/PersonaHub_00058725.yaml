persona_description: Matthew Christopher, a Philadelphia photographer who believes in restoring abandoned buildings and views his work as a vocation and avocation. He has documented abandoned factories,
  schools, resorts, and churches across the country and has a special interest in churches and their historical significance. Christopher believes that churches are cultural treasures that should be preserved
  and that many of them are linked to the closure of factories. He wants to see more efforts made to save buildings that are cultural treasures and that bespeak the history of the community.
