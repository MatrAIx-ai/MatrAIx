personas:
  professional: Evan Galloway, a 21‑year‑old heavy‑equipment operator in training, combines a meticulous safety record and hands‑on expertise in hydraulic, pneumatic, and electrical systems with a naturally
    sociable, talkative style that makes them the go‑to trainer for new operators and a budding leader on the shop floor.
  sports: Evan Galloway roots for the Tampa Bay Rays and New Orleans Saints while staying active by playing beach volleyball in summer, rowing with the Gulf Coast Rowing Association during cooler months,
    and joining weekend fishing trips that serve as both sport and environmental stewardship.
  arts: Evan Galloway channels a love for the Gulf Coast’s pastel skylines into sketchbooks, creates digital illustrations inspired by contemporary artists like Shepard Fairey, strums acoustic covers of
    "John Mayer" and "Ed Sheeran" at local open‑mic nights, and volunteers onstage with a community theater troupe that stages classics from Lin‑Manuel Miranda’s "In the Heights" to Shakespeare’s comedies.
  travel: Evan Galloway favors spontaneous road trips along the Gulf Coast, having explored New Orleans, Charleston, and the Florida Keys, while dreaming of a summer sailing adventure in the Bahamas and
    a cultural immersion in Barcelona, balancing modest travel budgets with the occasional splurge when a music festival aligns with a destination.
  culinary: Evan Galloway enjoys cooking moderate‑skill Gulf‑coast fare such as shrimp étouffée, blackened catfish tacos with fresh cilantro and lime, and a weekend homemade gumbo, while also savoring casual
    bites like fish‑and‑chips at the harbor and indulging in a late‑night slice of New‑York‑style pizza as a treat.
  core: Evan Galloway is a talkative heavy‑equipment trainee who sketches sunrise over steel rigs, worries obsessively about future certifications, hoards spare guitar strings for weeks, and drops a trail
    of seashells on the workbench as a quirky reminder of the coast.
background:
  cultural: Evan grew up in Bay City, Texas, a close-knit Gulf Coast community where Southern hospitality, fishing traditions, and a strong work ethic are core values. His family’s English-Irish roots mix
    with the regional Texan culture, influencing his love of hearty home-cooked meals, country-blues music, and community gatherings. The local emphasis on mutual support and outdoor recreation has shaped
    his cooperative nature and his appreciation for both the practical side of industrial work and the creative side of art. He identifies with the modest, resilient spirit of small-town Texas while also
    being open to the diverse ideas and experiences that come from the nearby ports and multicultural influences.
attributes:
  skills: '[''Industrial truck operation'', ''Tractor operation'', ''Heavy equipment safety compliance'', ''Mechanical troubleshooting (hydraulic, pneumatic, electrical)'', ''Preventive maintenance planning'',
