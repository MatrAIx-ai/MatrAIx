  hobbies: '[''Sketching and digital illustration'', ''Playing acoustic guitar'', ''Attending live-music events'', ''Organizing open-mic nights'', ''Fishing and boating'', ''Beach clean-ups'', ''Community
    theater acting'', ''Board game nights'', ''Volunteering at food bank'', ''Exploring local art fairs'']'
  career_goals: Evan aims to earn a Certified Heavy Equipment Operator (CHRO) credential within the next two years and eventually move into a supervisory role such as Fleet Manager, where he can combine
    his technical expertise with his natural leadership and people-skills. He is also interested in pursuing a bachelor’s degree in Supply Chain Management or Industrial Engineering to broaden his strategic
    perspective. Long-term, Evan hopes to champion workplace wellness programs and spearhead community art initiatives that blend his industrial background with his passion for creative expression, ultimately
    achieving a balance between professional advancement, personal fulfillment, and a stable low-stress lifestyle.
