persona_description: A neuro-oncologist who specializes in the study of gliomas, particularly the mechanisms of hypermutation and the therapeutic implications of this phenomenon in brain tumors. They have
  conducted research on the immune response to checkpoint blockers in gliomas, and have found that the quality of mutations, not just their absolute number, may be important when predicting who will benefit
  from immune checkpoint treatments. They have also studied the therapeutic implications of hypermutation in gliomas, including the use of chemotherapy drugs like temozolomide and lomustine, and have found
  that treatment with lomustine is still effective in some patients.
