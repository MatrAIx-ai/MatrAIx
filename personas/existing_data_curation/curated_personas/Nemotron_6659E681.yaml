  hobbies: '[''Sketching and drawing'', ''Photography'', ''Visiting art galleries'', ''Reading philosophy and science nonfiction'', ''Listening to medical innovation podcasts'', ''Hiking in the Appalachians'',
    ''Yoga and mindfulness meditation'', ''Volunteering at senior centers'', ''Playing acoustic guitar in intimate gatherings'']'
  career_goals: Jeffrey aims to deepen his clinical expertise by earning an Associate’s degree in Nursing and obtaining his RN license within the next three years. He aspires to transition into a role that
    bridges direct patient care with health education, such as a community health nurse or patient wellness coordinator. Driven by his love for art and holistic healing, he hopes to develop a program that
    incorporates creative expression into stress‑reduction initiatives for patients in underserved Harrisburg neighborhoods. Long‑term, Jeffrey envisions mentoring new medical assistants, fostering a supportive
    and compassionate clinical culture.
