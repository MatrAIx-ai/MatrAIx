    Solving'', ''Effective Communication'']'
  hobbies: '[''Visiting art museums (Speed Art Museum)'', ''Oil painting and sketching'', ''Photography of urban landscapes'', ''Attending live jazz and theater performances'', ''Gardening and horticulture'',
