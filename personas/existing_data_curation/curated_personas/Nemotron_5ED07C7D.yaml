personas:
  professional: Tonya Gehl, an industrial engineer turned occupational health and safety strategist, blends data‑driven Lean analysis with a painter’s eye for detail to craft engaging safety training programs
    that cut hazards by 30% while coaxing skeptical line workers into embracing ergonomic upgrades.
  sports: Tonya Gehl fuels her fitness routine with weekend hikes through Daniel Boone National Forest, weekly yoga sessions at a local studio, and occasional pick‑up basketball games while cheering on
    the Louisville Cardinals and rooting for the Louisville Bats, balancing a love for nature with community sports enthusiasm.
  arts: Tonya Gehl immerses herself in the arts by painting oil landscapes after visits to the Speed Art Museum, photographing urban murals for a personal Instagram gallery, attending live performances
    by the Louisville Orchestra featuring Miles Davis tributes, and mentoring youth at community workshops inspired by the works of contemporary painter Kent Bell.
  travel: Tonya Gehl plans her getaways with precision, opting for off‑season trips to art hubs like New York's MoMA and Santa Fe's International Folk Art Market, while also craving spontaneous weekend
    drives to the Bluegrass region for hiking, balancing her desire for cultural immersion with a modest travel budget bolstered by credit‑card rewards.
  culinary: Tonya Gehl curates a farm‑to‑table kitchen stocked with fresh basil, rosemary, and home‑grown heirloom tomatoes, experimenting with Mediterranean‑inspired quinoa‑stuffed peppers, thyme‑infused
    roasted chicken, and occasional bold dishes like Korean bibimbap, all while indulging in a guilty pleasure of late‑night chocolate chip cookies that she sneaks into her herb garden for a quick sugar
    boost.
  core: Tonya Gehl is a detail‑obsessed safety leader who channels her artful curiosity into risk‑reduction strategies, combats chronic worry with yoga and garden therapy, and occasionally succumbs to impulse
    art‑supply splurges and midnight baking binges.
background:
  cultural: Tonya grew up in a middle‑class white family in the Louisville metropolitan area, absorbing the region’s blend of Southern hospitality and vibrant arts scene. Her upbringing included traditions
    such as attending the Kentucky Derby and enjoying local bourbon culture, while also exposing her to the city’s strong community support for the arts, music, and theater. This background fostered a respect
    for tradition alongside an openness to new ideas, shaping her curiosity, appreciation for creative expression, and collaborative spirit.
