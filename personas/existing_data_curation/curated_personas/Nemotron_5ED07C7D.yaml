    at community art workshops'']'
  career_goals: Tonya aims to advance into a senior safety leadership role within the next five years, such as Director of Health, Safety, and Environmental (HSE) Operations for a regional manufacturing
    hub. She plans to earn an associate degree in occupational safety and obtain the Certified Safety Professional (CSP) credential to complement her hands‑on experience. Long‑term, she envisions establishing
    her own consultancy that blends industrial safety with creative communication strategies, helping companies build safety cultures that are both rigorous and engaging. She is also passionate about mentoring
    emerging engineers, especially women, to foster greater diversity in the field.
