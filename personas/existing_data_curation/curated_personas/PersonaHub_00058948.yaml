persona_description: Tammy Flanagan, the senior benefits director for the National Institute of Transition Planning Inc., conducts federal retirement planning workshops and seminars. She has spent 25 years
  helping federal employees take charge of their retirement by understanding their benefits. Tammy is knowledgeable about retirement benefits, specifically regarding the Civil Service Retirement System
  (CSRS) and the Federal Employees Retirement System (FERS). She has experience in retirement planning and understands the importance of understanding retirement benefits to maximize benefits and ensure
  accuracy. Tammy is a trusted resource for federal employees looking to understand their retirement options and make informed decisions about their retirement.
