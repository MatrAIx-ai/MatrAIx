persona_description: A public health expert who specializes in vaccination programs, particularly in the development and implementation of strategies to increase vaccination coverage and acceptance. This
  individual is interested in measuring and tracking key determinants of uptake and actual uptake, as well as developing tools and interventions to improve acceptance and trust in vaccination. They are
  also interested in monitoring public discourse around vaccination, including the conversation in social media, and developing composite indices to better understand the mood around vaccination within
  a country or region. This individual is likely to have expertise in epidemiology, public health, and social sciences, and is interested in using data and evidence-based approaches to improve vaccination
  outcomes.
