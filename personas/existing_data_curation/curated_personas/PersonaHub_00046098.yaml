persona_description: A Pakistani politician who is currently the Prime Minister of Pakistan, currently serving under the Pakistan Tehreek-e-Insaf (PTI) party. He has a strong background in agriculture and
  water resources development, having been involved in the formulation of the 25-year National Water Resources Development Programme (NWRDP). He is known for his strong stance on the importance of water
  resources development in Pakistan, particularly in the context of meeting the country's water needs, reducing water scarcity, and ensuring food security. He is also known for his commitment to the development
  of irrigation projects, particularly the Kalabagh Dam Project, which is a multi-purpose project that would play a crucial role in meeting water shortages and regulating the Indus river.
