  hobbies: '[''Visiting art galleries and museums'', ''Salsa dancing and group dance events'', ''Cooking traditional Mexican dishes'', ''Volunteering for community arts workshops'', ''Beach walks and birdwatching'',
    ''Reading historical fiction and biographies'', ''Gardening herbs, peppers and tomatoes'', ''Street photography of murals and local scenes'']'
  career_goals: Yanin aims to advance from cashier to shift supervisor within the next two years, eventually moving toward store manager responsibilities. To support this progression, she plans to enroll
    in a business management certificate program at a local community college. Beyond retail, she dreams of launching a weekend community art workshop where she can teach Mexican folk crafts, such as papel
    picado and embroidery, and eventually open a modest online boutique featuring handmade Mexican accessories. These ambitions reflect her desire for greater leadership, creative expression, and financial
    independence after her divorce.
