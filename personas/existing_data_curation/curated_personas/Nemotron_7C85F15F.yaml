  career_goals: Marilyn aims to advance to a senior director role overseeing regional arts outreach and community engagement, where she can shape cultural policy and launch an arts incubator for emerging
    creators. She aspires to publish a book that bridges interdisciplinary creative practices with management theory, and she plans to earn a Ph.D. in cultural policy to deepen her scholarly impact. Mentoring
    emerging women leaders in the nonprofit and arts sectors is also a central ambition, reflecting her desire to blend compassion with strategic influence.
