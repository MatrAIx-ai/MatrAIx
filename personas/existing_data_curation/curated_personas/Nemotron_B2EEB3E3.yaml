  hobbies: '[''Woodworking Projects'', ''Model Shipbuilding'', ''Hiking'', ''Acoustic Guitar'', ''Reading Architectural History'', ''Puzzle Solving'', ''Attending Carpentry Workshops'']'
  career_goals: Billy aims to achieve journeyman certification and eventually become a master carpenter, positioning himself to lead small construction crews and manage residential renovation projects.
    He envisions opening a boutique custom furniture workshop in Oxford, where he can blend traditional craftsmanship with eco‑friendly techniques. Long‑term, he plans to pursue a construction management
    program to broaden his leadership skills and oversee larger community‑focused building initiatives.
