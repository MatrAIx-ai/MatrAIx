personas:
  professional: Billy Castello, a 23‑year‑old carpenter who has honed framing, finish carpentry and detailed joinery, applies a methodical, curiosity‑driven workflow using digital measuring devices and
    CNC equipment to deliver precise custom furniture while rigorously maintaining safety and project schedules; they are organized, reliable, and constantly explore sustainable building practices.
  sports: Billy Castello, a 23‑year‑old outdoor enthusiast, maintains fitness through weekend hikes on Preble County trails, a seasonal membership in a local 5 K running club, and cheering for the Cleveland
    Browns, the Cincinnati Reds and the Cleveland Cavaliers while occasionally joining a community softball league; they prefer low‑impact exercise that complements their woodworking stamina.
  arts: Billy Castello, a 23‑year‑old carpenter, relaxes by strumming acoustic renditions of John Mayer and Gillian Welch on a vintage Martin guitar, studies the works of Frank Lloyd Wright and Zaha Hadid
    in architectural journals, and visits the Cincinnati Art Museum to admire contemporary installations by Yayoi Kusama; they find that each artistic medium fuels fresh design ideas for their furniture
    projects.
  travel: Billy Castello, a 23‑year‑old woodworker, prefers low‑key road trips that combine scenic hikes with inspiration for new designs, having explored the Appalachian Trail sections in West Virginia,
    the historic shipyards of Portsmouth, New Hampshire, and dreaming of a summer workshop in the Norwegian fjords where they could study traditional timber framing; they meticulously plan itineraries around
    budget constraints and limited vacation days.
  culinary: Billy Castello, a 23‑year‑old carpenter, enjoys cooking hearty farm‑to‑table meals—often grilling rosemary‑marinated pork chops, baking sourdough bread with locally milled rye flour, and topping
    wood‑fired pizzas with heirloom tomatoes and fresh basil—while experimenting with smoky flavors in a homemade wood‑fired oven; they occasionally over‑season dishes in pursuit of the perfect flavor balance.
  core: Billy Castello, a 23‑year‑old meticulous craftsman, blends quiet curiosity with disciplined practice, building bespoke furniture in spare hours, budgeting every cent for a future workshop, and habitually
    over‑planning even a weekend hike, which reveals a methodical mind prone to overthinking.
background:
  cultural: Billy was raised in Oxford, Ohio, within a working‑class, Midwestern white family that values reliability, modesty, and community involvement. Though his surname hints at Italian heritage, his
    cultural upbringing reflects the traditions of small‑town Ohio—participating in county fairs, local church gatherings, and seasonal celebrations like Thanksgiving and Independence Day. This background
    shapes his practical mindset, collaborative spirit, and respect for both established customs and new ideas.
attributes:
  skills: '[''Framing'', ''Finish Carpentry'', ''Blueprint Reading'', ''Tool Maintenance'', ''Material Selection'', ''Project Scheduling'', ''Safety Compliance'', ''Sustainable Building Practices'', ''Digital
