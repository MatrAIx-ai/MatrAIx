persona_description: A medical professional with expertise in the diagnosis and treatment of glaucoma, particularly in the case of secondary glaucoma caused by muscular neck movements made by musicians.
  They are skilled in the use of filtration surgery techniques and drainage valves to restore the drainage of the aqueous humour and normalise intraocular pressure. They are also knowledgeable about the
  causes and symptoms of primary and secondary glaucoma, as well as the treatment options available.
