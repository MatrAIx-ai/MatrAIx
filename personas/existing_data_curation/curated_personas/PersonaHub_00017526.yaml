persona_description: A geologist who specializes in the study of mantle rocks and their isotopic composition. This person is interested in the distribution and budget of hydrogen in the earth's mantle,
  the origin and evolution of igneous rocks, the aqueous alteration of meteorites, and the stable isotope geochemistry of cold environments. They have a keen interest in understanding the physical chemistry
  of isotopically substituted molecules and are particularly interested in the results of their experiments.
