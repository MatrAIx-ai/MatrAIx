personas:
  professional: Terry Moore, a 31‑year‑old full‑stack software engineer, blends deep proficiency in Python, Go, React, and AWS with a vivid artistic sensibility to design intuitive, generative user experiences,
    channeling their methodical planning and boundless imagination into leading small teams toward interactive installations, AR/VR prototypes, and experimental digital art tools.
  sports: Terry Moore embraces the Colorado outdoors through weekend canyon hikes, rock climbing at the Mesa County Outdoor Club, and mountain biking on the local trail network, while cheering for the Denver
    Broncos, attending Colorado Avalanche games when possible, and maintaining a balanced fitness regimen that mixes cardio climbs with strength training.
  arts: Terry Moore channels their creative drive into abstract acrylic canvases echoing Pollock’s drip techniques, produces generative visual loops inspired by Brian Eno’s ambient aesthetics using p5.js,
    and composes modular synth soundscapes reminiscent of Aphex Twin, regularly attending gallery openings, the Fruita Strawberry Festival’s art fair, and local tech‑art meetups.
  travel: Terry Moore prefers meticulously planned trips that blend adventure with artistic inspiration, such as hiking the rugged trails of Banff National Park, exploring Iceland’s volcanic landscapes
    for generative art ideas, and attending SIGGRAPH in Los Angeles, while also savoring nearby getaways to Mesa County’s hot springs and weekend camping at Colorado’s Maroon Bells.
  culinary: Terry Moore enjoys cooking farm‑to‑table meals like Colorado green chili stew with locally sourced jalapeños and smoked trout, experiments with sourdough bread infused with lavender, and occasionally
    indulges in sushi rolls featuring fresh avocado, balancing a moderate cooking skill with a habit of ordering takeout after marathon coding sessions.
  core: Terry Moore, a 31‑year‑old tech‑oriented outdoor artist, fuses algorithmic imagination with rugged Colorado adventure, balancing disciplined work habits with a quirky penchant for late‑night synth
    tinkering and an unwavering commitment to sunrise hikes.
background:
  cultural: Terry is a white American raised in the intermountain West, with family roots in small‑town Colorado that blend a tradition of self‑reliance and outdoor-oriented life. Growing up amid the rugged
    landscape of Fruita has instilled a deep appreciation for nature and a lifestyle centered on hiking, climbing, and community festivals. His humanities education adds a liberal, artistic perspective
    that coexists with the pragmatic, methodical work ethic common among the region’s tech community. Married and settled in Mesa County, he participates in local customs such as the annual Strawberry Festival
    and enjoys hosting gatherings that fuse seasonal, locally sourced cooking with discussions of art and technology. This blend of western outdoors culture and contemporary creative pursuits shapes his
    identity.
