  career_goals: Terry aims to advance to a senior or lead engineering role where he can guide a small team to build products that blend technology and art, such as interactive installations, AR/VR experiences,
    or generative media tools. He is interested in pursuing a master’s degree in Human‑Computer Interaction or Creative Computing to deepen his expertise at the intersection of design and engineering. Over
    the next five years, he hopes to mentor junior developers, contribute to open‑source creative‑coding libraries, and speak at conferences like SIGGRAPH and local creative‑tech meetups. Ultimately, he
    envisions launching his own indie studio to develop experimental games and digital art applications while maintaining a lifestyle that balances work with outdoor recreation.
