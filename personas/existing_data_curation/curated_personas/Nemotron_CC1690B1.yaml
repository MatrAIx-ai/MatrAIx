  career_goals: Looking ahead, Cynthia aims to transition into a supervisory or safety‑coordinator role before she retires, leveraging her extensive hands‑on experience to mentor the next generation of
    workers. She plans to earn a Lean Six Sigma Yellow Belt certification through a community‑college program to formalize her interest in process efficiency. In the next two years she hopes to lead a small
    cross‑functional team that implements a new waste‑reduction protocol on the line, thereby leaving a measurable improvement that can be documented for her retirement portfolio. Simultaneously, she is
    preparing a gradual retirement plan that includes part‑time consulting for the plant’s safety committee and occasional freelance work teaching basic machine‑operation skills at the local vocational
    school. Her pragmatic mindset drives her to secure a stable financial footing while staying engaged in work that aligns with her curiosity about new manufacturing technologies.
