persona_description: William Edward Boeing, an American aircraft industrialist, was born on the 1st of October in 1881 in Detroit, Michigan. He was the founder and first president and CEO of Boeing Co.,
  a company that has become the aerospace industry giant of today. He was also the first to change the name of his company to the Boeing Airplane Company and was awarded the prestigious Guggenheim Medal
  for his pioneering and achievement in aircraft and air transportation. After retiring from the aircraft industry, he spent the remainder of his years in property development and thoroughbred horse breeding.
  He died on 28th of September in 1956.
