  career_goals: Grace aims to continue contributing to the nursing profession by serving as a volunteer preceptor for nursing students and newly licensed nurses. She plans to design and lead intergenerational
    art workshops that blend health education with creative expression, and to advocate for senior‑friendly healthcare policies within local and state health committees. Additionally, she wishes to establish
    a modest scholarship fund for aspiring nurses from her community and to pursue lifelong learning through courses on gerontology, public health, and art history.
