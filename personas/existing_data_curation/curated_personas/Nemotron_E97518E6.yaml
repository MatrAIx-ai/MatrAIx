personas:
  professional: Grace Curi, a veteran medical‑surgical and geriatric nurse with thirty‑plus years of bedside expertise, now volunteers as a preceptor and spearheads intergenerational art‑therapy workshops
    that blend health education with watercolor illustration, leveraging their organized yet adaptable style to mentor novice nurses and advocate for senior‑friendly healthcare policies in New Jersey.
  sports: Grace Curi enjoys low‑impact fitness through weekly birdwatching walks at the nearby nature preserve, participates in a senior yoga class at the local YMCA, and follows the New York Giants and
    New York Yankees, occasionally attending games with their garden club friends.
  arts: Grace Curi spends Saturdays at the Newark Museum admiring works by Claude Monet and Georgia O’Keeffe, paints delicate watercolors of garden roses at home, and leads a small intergenerational art
    circle where seniors and elementary students create collaborative pieces inspired by historical fiction narratives.
  travel: Grace Curi favors relaxed weekend getaways to historic towns such as Colonial Williamsburg, Gettysburg, and Savannah, often traveling by car to explore colonial architecture and local cuisine,
    and dreams of a longer cultural immersion trip to Florence, Italy, to practice their budding Italian while studying Renaissance art.
  culinary: Grace Curi delights in cooking seasonal meals like lemon‑rosemary roasted chicken and herb‑infused minestrone, grows basil, thyme, and rosemary in their rose garden for fresh flavor, and occasionally
    over‑salts their soups in enthusiasm, but always ends the evening with a cup of chamomile tea sweetened with a hint of honey.
  core: Grace Curi, a 70‑year‑old nurse‑mentor who blends art, gardening, and community service, balances meticulous organization with a love for quiet creativity, while occasionally indulging in impulsive
    art‑supply purchases and over‑salting their soups.
background:
  cultural: Grace was raised in a post‑World War II suburban New Jersey family of Northern European descent. Her upbringing emphasized community service, modesty, and a strong work ethic, with regular involvement
    in a mainline Protestant church. The cultural values of self‑reliance and respect for tradition were balanced by exposure to the diverse artistic and intellectual offerings of the greater New York metropolitan
    area, fostering her lifelong appreciation for art, new ideas, and unconventional thinking.
