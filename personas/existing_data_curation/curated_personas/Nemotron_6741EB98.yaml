personas:
  professional: Linda Crandall is a methodical yet sociable entry‑level data analyst, leveraging Python, R, SQL, and Tableau to translate raw public‑health data into clear visual stories while coordinating
    hackathon teams and volunteer projects with the same organized reliability that defines her everyday life.
  sports: Linda Crandall fuels her competitive side by playing intramural soccer for the Georgia Tech Red Raiders club, cheering on Atlanta United FC at Mercedes‑Benz Stadium, hitting the trails of the
    Appalachian foothills each Saturday, and mixing cardio with salsa dancing to keep a balanced fitness routine year‑round.
  arts: Linda Crandall expresses her creative spark through street photography inspired by Garry Winogrand, salsa dancing to the beats of Shakira and Celia Cruz, and frequent evenings at the Variety Playhouse
    catching live performances by The Black Keys and local indie folk bands.
  travel: Linda Crandall prefers meticulously planned road trips—like her recent weekend drive to Asheville’s Blue Ridge Parkway and a spontaneous two‑day getaway to Savannah’s historic squares—while dreaming
    of a low‑budget excursion to Costa Rica’s cloud forests and a summer study‑abroad stint in Kyoto, always booking through student discounts and a tight travel budget.
  culinary: Linda Crandall, a confident home cook, perfects Southern staples such as fried chicken with buttermilk, collard greens sautéed in smoked turkey broth, and peach cobbler topped with a crumbly
    biscuit crust, while also experimenting with kimchi fried rice and bold sriracha‑infused sauces—though she frequently over‑salts in the enthusiasm of trying new flavor combos.
  core: Linda Crandall blends a data‑driven curiosity with Southern hospitality, juggling a love for hiking, salsa, and spreadsheets while habitually over‑seasoning her meals and obsessively color‑coding
    every aspect of her life.
background:
  cultural: Linda was raised in a middle‑class white family in Atlanta, Georgia, where Southern hospitality and community involvement are core values. Growing up in a multicultural urban environment, she
    has been exposed to diverse cultural traditions, from music festivals to food markets, influencing her open‑minded outlook. Her family emphasizes education, reliability, and service, encouraging her
    participation in local volunteer projects and school clubs. This blend of Southern roots with a progressive, tech‑savvy college culture shapes her identity as both grounded and curious.
attributes:
  skills: '[''Python programming'', ''R statistical analysis'', ''SQL database querying'', ''Data visualization (Tableau, Power BI)'', ''Laboratory techniques (PCR, electrophoresis, spectrophotometry)'',
    ''Technical writing'', ''Project planning and coordination'', ''Team leadership'', ''Public speaking'', ''Event organization'']'
  hobbies: '[''Hiking in the Appalachian foothills'', ''Intramural soccer'', ''Salsa dancing'', ''Urban and nature photography'', ''Volunteer STEM tutoring'', ''Cooking Southern comfort food'', ''Attending
    tech meetups and hackathons'', ''Reading science‑fiction literature'']'
  career_goals: Linda aims to secure an entry‑level position as a data analyst or research associate in a forward‑thinking organization that values collaboration and community impact. She plans to leverage
    her analytical skills to inform evidence‑based decisions, especially in public health or environmental sustainability. In the next five years, she hopes to earn a master's degree in data science or
    bioinformatics, transition into a senior analytical role, and eventually lead interdisciplinary projects that blend technology with social good. Her pragmatic outlook drives her to build a stable career
    while remaining open to emerging fields and innovative solutions.
