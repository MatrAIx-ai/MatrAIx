personas:
  professional: Henry Tajalle is a budding civil engineering enthusiast who builds intricate LEGO structures with a practical, detail‑oriented mindset, yet they often abandon plans for the thrill of a new
    design, reflecting their love of flexibility and competitive spirit.
  sports: Henry Tajalle plays forward for the local 'Island Waves' youth soccer team, rides small surf breaks at the community beach, dives into the municipal pool for laps, and looks up to the San Jose
    Earthquakes and Hawaii Rainbow Warriors for inspiration, while they sometimes skip scheduled practice sessions in favor of spontaneous play.
  arts: Henry Tajalle channels their creativity into drawing vivid volcanic storyboards and constructing elaborate LEGO scenes while listening to Israel Kamakawiʻole and the Hawaiian chant group A‘o‘ao,
    and they practice hula dance steps learned from community workshops, making the arts a lively backdrop to their daily play.
  travel: Henry Tajalle loves spontaneous weekend trips to the nearby volcanic crater trail, dreams of snorkeling in the Great Barrier Reef and exploring the LEGO exhibition in Berlin, but they usually
    let parents handle the details, favoring flexible, adventure‑filled getaways over rigid itineraries.
  culinary: Henry Tajalle delights in tropical fruits like mango and pineapple, munches on fish tacos with a side of rice and beans, and helps stir up simple poi‑style dishes, though they often sneak extra
    cookies after meals, showing a budding palate paired with a sweet tooth.
  core: Henry Tajalle is a competitive, energetic 7‑year‑old whose love for soccer, surf, and LEGO is balanced by a quirky habit of forgetting chores while fiercely guarding their allowance, and they navigate
    life with a blend of structure and spontaneous fun.
background:
  cultural: Henry is of Polynesian (Native Hawaiian) descent, growing up in Pāhoa on the east side of the Big Island. His family places strong emphasis on ohana (family), respect for the ʻāina (land) and
    ocean, and the tradition of oral storytelling. He participates in local gatherings such as lei‑making, youth hula classes, and school programs that teach Hawaiian language and culture. The volcanic
    landscape surrounding his town fosters a deep appreciation for nature's power and community resilience.
attributes:
  skills: '[''reading simple chapter books'', ''basic arithmetic (addition, subtraction)'', ''basic swimming'', ''LEGO construction'', ''soccer teamwork'', ''basic Hawaiian language phrases'']'
