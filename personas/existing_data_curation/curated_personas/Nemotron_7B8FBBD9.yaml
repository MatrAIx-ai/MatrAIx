  career_goals: He imagines becoming a marine biologist or a professional surfer to explore and protect the coral reefs around Hawaii. He also dreams of being a firefighter who helps his community after
    volcanic events. He hopes to win school science fairs and local surfing contests, aiming to be recognized as one of the best in his class and team.
