  hobbies: '[''Visiting contemporary art galleries and museums'', ''Attending live music concerts (jazz, indie rock)'', ''Participating in improv comedy workshops'', ''Exploring new neighborhoods and trying
    eclectic cuisines'', ''Urban street photography'', ''Gym workouts and mindfulness meditation'', ''Listening to entrepreneurial podcasts'', ''Reading books on psychology and design'']'
  career_goals: Nathan aims to become a regional sales manager within the next three years and subsequently advance to a director of sales or VP of sales within five to seven years. He aspires to lead a
    high‑performing sales team, mentor junior reps, and shape the company's go‑to‑market strategy. Long‑term, he dreams of launching his own niche wholesale distribution business that merges his passion
    for art and design with functional products, capitalizing on his network in the Connecticut and New York markets.
