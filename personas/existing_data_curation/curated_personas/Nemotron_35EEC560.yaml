personas:
  professional: John Oliver, a meticulous freelance handyman-in-training who blends decades of self‑taught carpentry, electrical troubleshooting, and DIY electronics with rigorous project budgeting, plans
    to earn a state residential construction certification while offering Clearlake residents reliable home‑improvement services that reflect their disciplined, evidence‑based problem‑solving style and
    competitive drive.
  sports: John Oliver, an avid hiker who belongs to the Mendocino County Trailblazers club, they spend weekends tracking local bird species on the Pacific Crest Trail, follow the Sacramento Kings and San
    Francisco 49ers on television, and supplement their outdoor pursuits with a weekly Saturday morning tennis match at the Clearlake Community Center.
  arts: John Oliver, a quiet admirer of classic craftsmanship who collects works by furniture designer Sam Maloof, enjoys the folk sounds of Calexico, reads biographies of Nikola Tesla, and occasionally
    attends performances at the Lake County Art Center, finding inspiration for their scale model projects.
  travel: John Oliver, a methodical solo traveler who prefers detailed itineraries and low‑key lodging, they have explored Yosemite National Park and the historic towns of Sonoma County, dream of building
    a self‑sufficient cabin retreat in the Scottish Highlands, and keep a travel journal documenting local flora and bird sightings.
  culinary: John Oliver, a competent home cook who favors pragmatic meals like pan‑seared trout with lemon‑dill butter, roasted beet and goat‑cheese salad, and homemade sourdough bread made with a garden‑grown
    herb starter, they often experiment with smoked wood chips for a rustic flavor but admit to over‑salting dishes when distracted by new projects.
  core: John Oliver, a disciplined solo‑craftsperson whose competitive streak drives flawless home projects, meticulous budgeting, and a steadfast habit of checking their blood pressure before bedtime,
    yet who can’t resist a late‑night chess puzzle and occasionally skips social gatherings in favor of solitary woodworking.
background:
  cultural: John grew up in a middle‑class, white working‑class family in Northern California, where self‑reliance and a strong work ethic were core values. The rural setting of Lake County, with its agricultural
    roots and close‑knit lake‑side community, fostered his appreciation for outdoor life, hands‑on problem solving, and modest living. While he did not complete a formal high‑school diploma, the local culture
    emphasized practical skill acquisition and community support, shaping his pragmatic outlook and preference for small, trusted social circles.
attributes:
  skills: '["Residential carpentry", "Woodworking", "Basic plumbing", "Electrical troubleshooting", "Landscaping", "Budgeting and financial planning", "Project management", "Computer literacy", "DIY electronics",
    "Data organization"]'
  hobbies: '["Fishing", "Woodworking", "Model building", "Hiking", "Bird‑watching", "Nature photography", "Reading non‑fiction", "Chess", "Logic puzzles"]'
  career_goals: John aims to turn his hands‑on expertise into a modest freelance handyman business that serves the Clearlake community, emphasizing reliability and high standards. He plans to obtain a state‑issued
    residential construction certification within the next year to formalize his skill set and increase his market credibility. Parallel to this, he aspires to achieve greater financial independence by
    expanding his home‑grown garden and developing a small line of handcrafted wooden items for online sale, all while preserving his low‑profile, self‑sufficient lifestyle.
