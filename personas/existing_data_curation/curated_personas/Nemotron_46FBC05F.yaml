  hobbies: '[''Abstract painting'', ''Creative writing (poetry)'', ''Photography'', ''Visiting art galleries and museums'', ''Reading speculative fiction'', ''Community theater acting'', ''Book club participation'',
    ''Local choir singing'', ''Garden club'', ''Puzzle and trivia competitions'', ''Chess'', ''Yoga'', ''Meditation'', ''Nature hiking'']'
  career_goals: Looking ahead, Asma aims to leave a lasting legacy in Lowndes County by establishing a regional arts‑integrated education initiative that partners schools with local museums and cultural
    organizations. She plans to author a guidebook on embedding abstract concepts and creativity into middle‑school curricula, and to present her models at state‑wide professional‑development conferences.
    Over the next few years she hopes to mentor a cohort of early‑career teachers, lead district‑level workshops on project‑based learning, and secure a statewide award for innovative teaching. Ultimately,
    she envisions transitioning to a consulting role that supports schools in designing competitive academic programs while continuing to teach part‑time.
