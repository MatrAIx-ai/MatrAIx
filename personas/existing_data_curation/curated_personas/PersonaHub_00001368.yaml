persona_description: A scientist who specializes in the study of radiation and its effects on human health. This person has a deep understanding of the international units used to measure radiation and
  the biological equivalent dose, as well as the effects of radiation on the human body. They are also familiar with the potential risks associated with nuclear power plants and the importance of understanding
  the safety limits for radiation exposure. This person is likely to have a strong interest in science communication and is comfortable presenting complex scientific concepts in an accessible and understandable
  way.
