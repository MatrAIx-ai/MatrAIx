personas:
  professional: Laura Sudlow is a versatile woodworker who blends Appalachian craft techniques with modern minimalism, using both hand tools and CNC routing, while their curiosity drives experimental designs
    and they occasionally let spontaneous impulses cause missed deadlines.
  sports: Laura Sudlow finds fitness in the foothills of the Great Smoky Mountains, regularly hiking with the Knoxville Trailblazers club, cheering on the Tennessee Volunteers basketball team and the Tennessee
    Smokies minor‑league baseball club, and they occasionally join a weekend ultimate frisbee league for a quick cardio burst.
  arts: Laura Sudlow weaves folk and indie influences from artists like Gillian Welch, The Avett Brothers, and Sufjan Stevens into acoustic guitar sessions at local open‑mic nights, while their sketchbook
    captures wood grain patterns and Appalachian landscapes, and they regularly scout regional craft fairs for inspiration and collaborative projects.
  travel: Laura Sudlow prefers spontaneous, nature‑focused getaways, often packing a sketchbook for weekend hikes in the Great Smoky Mountains, a culinary tour of Asheville's farm‑to‑table scene, a music
    pilgrimage to Nashville’s songwriter’s roundtables, and an annual craft‑fair pilgrimage to Portland’s Maker Faire, balancing limited studio budget with a love for new inspiration.
  culinary: Laura Sudlow delights in Southern farm‑to‑table cooking, often whipping up shrimp and grits with locally sourced scallions, fried green tomatoes drizzled with heirloom honey, and roasted chicken
    seasoned with sage, wild mushrooms, and a pinch of smoked paprika, while they modestly grow their culinary skill alongside nightly experiments with seasonal herbs from the community garden.
  core: Laura Sudlow is a curious, hands‑on creator who blends tradition with modern design, yet their spontaneous streak leads to a toolbox of half‑finished projects and they often let their schedule live
    in the moment.
background:
  cultural: Laura grew up in a middle‑class family in the Knoxville area, immersed in Appalachian craft traditions and Southern hospitality. Her childhood home was filled with stories of local woodworking
    heritage, bluegrass music, and community gatherings at church and neighborhood events. This upbringing fostered a respect for self‑reliance, stewardship of the land, and the value of community collaboration.
    While she honors these roots, Laura also embraces the progressive artisan scene that thrives in downtown Knoxville, blending traditional techniques with contemporary design influences and a forward‑thinking,
    inclusive mindset.
attributes:
  skills: '["Hand tool woodworking", "Power tool operation", "Furniture design", "Traditional joinery (mortise‑and‑tenon, dovetail, dowel)", "Surface finishing (staining, oiling, lacquer)", "CAD modeling
    (SketchUp, Fusion 360)", "CNC routing", "Sustainable wood selection and sourcing", "Project budgeting and flexible time management", "Customer communication and custom order handling", "Workshop safety
    and tool maintenance", "Teaching and workshop facilitation"]'
  hobbies: '["Hiking", "Foraging for wild mushrooms and herbs", "Sketching nature and wood textures", "Acoustic guitar playing", "Southern farm‑to‑table cooking", "Making wooden toys", "Experimental furniture
    prototyping", "Attending craft fairs", "Community gardening volunteer work"]'
  career_goals: Laura aims to transition her part‑time studio into a full‑time artisanal furniture business that emphasizes sustainable, modular designs. She plans to develop a signature line of functional
    pieces that blend Appalachian craft aesthetics with modern minimalism. Over the next five years, she hopes to host regular woodworking workshops, collaborate with local designers and interior architects,
    and become a recognized educator within the Knoxville maker community. Ultimately, she envisions opening a storefront studio that serves as both a retail space and a community hub for skill‑sharing
    and creative experimentation.
