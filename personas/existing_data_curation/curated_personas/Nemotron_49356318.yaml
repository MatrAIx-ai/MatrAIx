personas:
  professional: Yan Koo, a 14‑year‑old budding software developer, leads the school coding club with pragmatic project planning while channeling their competitive edge into hackathons, though they often
    let spontaneous ideas sidetrack strict schedules.
  sports: Yan Koo guards the forward spot for the Riverside High Thunderbirds, follows the Los Angeles Lakers with fervor, and trains with the city’s youth basketball league, the Rising Stars, blending
    their love of high‑energy group drills with a competitive drive that often pushes them to practice late night after school, yet they occasionally swap a scheduled workout for an impromptu K‑pop dance
    rehearsal.
  arts: Yan Koo channels their outgoing energy into K‑pop dance practice, emulating choreography from global acts such as BTS, Blackpink and Ariana Grande, and spends weekends sketching manga‑style characters,
    which they showcase at school art fairs, reflecting a creative outlet that balances competitive performance with personal expression.
  travel: Yan Koo loves spontaneous weekend getaways, preferring to jet off with family to bustling metros like Tokyo and vibrant festivals in Barcelona, yet they also relish low‑key road trips to nearby
    hiking spots, balancing an adventurous spirit with the flexibility to fit travel into school breaks and gaming nights.
  culinary: Yan Koo experiments in the kitchen by mastering spicy fermented cabbage fried rice, sweet‑soy marinated meat skewers, and seaweed‑wrapped rice rolls, demonstrating an enthusiastic home‑cooking
    habit that blends family recipes with a willingness to source unique ingredients like fermented chili paste and toasted sesame oil from the local Asian market.
  core: Yan Koo navigates teen life with a competitive spark, juggling basketball, gaming, and code, while habitually leaving homework for the last minute and hoarding spare change for glittery game skins.
background:
  cultural: Yan is a second‑generation Korean‑American raised in Saint Paul, Minnesota. At home, Korean language and customs are practiced, including celebrating Lunar New Year and Chuseok, while she also
    embraces typical Midwestern American experiences. This bicultural upbringing fosters respect for family and community, fluency in English and conversational Korean, and active participation in local
    Asian‑American cultural events and community organizations.
