  hobbies: '["sketching", "analog photography", "short story writing", "guitar playing", "listening to jazz and hip-hop", "reading speculative fiction", "improv theater", "cooking Southern cuisine", "gardening",
    "hiking local trails", "volunteering at community festivals", "participating in church choir"]'
  career_goals: Donovan wants to build a sustainable career that merges his artistic vision with community impact. In the next three years he aims to earn his GED and complete a certificate in community
    arts programming, positioning himself for a role as a community arts coordinator or cultural liaison in Cherokee County. He also dreams of launching a community-driven digital media platform that showcases
    stories of Black life in the South, featuring podcasts, short films, and visual art. Long-term, he hopes to open a small independent art space that offers workshops, galleries, and mentorship for local
    youth, while achieving financial independence that allows him to support his family and pursue further creative projects.
