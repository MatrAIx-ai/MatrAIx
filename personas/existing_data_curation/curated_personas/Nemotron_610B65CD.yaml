personas:
  professional: Donovan Singleton is a community‑focused creative strategist who blends self‑taught digital illustration, experimental analog photography, and flash‑fiction storytelling with strong public‑speaking
    and event‑planning skills, using their naturally charismatic, talkative demeanor to engage volunteers and audiences while balancing meticulous project timelines with spontaneous artistic improvisation.
  sports: Donovan Singleton enjoys weekend trail runs with the Cherokee County Trail‑Runners, plays pickup basketball on local church courts while cheering for the Atlanta Hawks and Atlanta Falcons, follows
    the Atlanta Braves during the baseball season, and occasionally joins a community soccer league affiliated with Georgia United; they balance their love for outdoor activity with a laid‑back attitude
    toward structured training.
  arts: Donovan Singleton immerses themselves in creative expression by sketching vivid scenes inspired by the surreal paintings of Jean‑Michel Basquiat, listening to jazz legends like John Coltrane, hip‑hop
    innovators such as Kendrick Lamar, and gospel powerhouse Kirk Franklin, they also perform improv with a local theater troupe modeled after The Second City, and curate digital showcases that feature
    emerging visual artists like Tameka Johnson.
  travel: Donovan Singleton prefers spontaneous road trips that mix nature hikes in the Blue Ridge Mountains with cultural detours to the historic streets of Savannah and the vibrant music scene of New
    Orleans, while dreaming of an extended stay in Lisbon to explore its tile‑laden neighborhoods and a future photo‑journalism pilgrimage to Tokyo’s neon districts; they always budget trips through a flexible
    itinerary that leaves room for last‑minute jam sessions.
  culinary: Donovan Singleton cooks soulful Southern dishes with a home‑grown twist, expertly preparing collard greens seasoned with smoked turkey, buttery shrimp and grits, and sweet potato pie spiced
    with nutmeg, while also experimenting with herb‑infused marinades from their garden’s basil and rosemary, and they enjoy occasional brunch outings at a local café that serves avocado toast with poached
    eggs.
  core: Donovan Singleton is a charismatic, imagination‑driven community artist who balances relentless creative output with a constant undercurrent of worry, turning social energy into vibrant cultural
    projects while they juggle financial tightropes and self‑care challenges.
background:
  cultural: Born and raised in Gaffney, South Carolina, Donovan grew up in a close-knit African-American community where church, family gatherings, and Southern traditions shaped his worldview. The rhythms
    of gospel music, the storytelling tradition of the Black South, and the legacy of the civil-rights movement influenced his artistic sensibilities and his commitment to community uplift. Family recipes
    such as collard greens, cornbread, and barbecue connect him to his heritage, while community events like Juneteenth celebrations reinforce his cultural pride. Despite economic challenges and limited
    formal education, his cultural identity provides resilience, informing his creative work and his desire to mentor younger members of his community.
attributes:
  skills: '["digital illustration", "experimental photography", "creative writing", "public speaking", "event planning", "community outreach", "podcasting", "video editing", "social media management", "conflict
