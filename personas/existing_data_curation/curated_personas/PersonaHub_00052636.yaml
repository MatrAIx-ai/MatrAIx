persona_description: A gender expert who is deeply committed to the United Nations Framework Convention on Climate Change (UNFCCC) and recognizes the critical role of women in addressing climate change.
  This person is actively involved in the development and implementation of national climate policies that are gender-responsive, and they understand the importance of involving women equally in UNFCCC
  processes and in the development and implementation of climate policies. They have a particular focus on the intersection of climate change and gender, and they are dedicated to ensuring that women are
  not only included in decision-making processes but also have meaningful participation in the development of policies that affect their lives. This person is likely to be involved in developing and implementing
  climate change policies, working with governments, and engaging with other stakeholders to ensure that the needs of women are taken into account.
