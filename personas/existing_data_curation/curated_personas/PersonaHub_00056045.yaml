persona_description: A historian who is interested in the history of the United States and the Holocaust, particularly the experiences of Jews and Americans during that time. She is familiar with Michel
  de Certeau's theories on performance and the role of space in shaping cultural and political narratives. She is also interested in the idea of performance as a site for memory and the ways in which museums
  and other institutions can shape our understanding of the past.
