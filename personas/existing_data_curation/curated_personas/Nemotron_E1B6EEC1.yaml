  career_goals: James aims to become a senior director of infrastructure at the Fulton County Department of Transportation within the next five years, overseeing large‑scale transit and highway projects.
    He plans to deepen his expertise in sustainable urban design, earn a LEED Green Associate certification, and mentor junior engineers to build a resilient engineering culture. Long‑term, he hopes to
    launch a boutique consultancy that provides reliable, cost‑effective solutions for municipal projects while maintaining a healthier work‑life balance to manage stress post‑divorce.
