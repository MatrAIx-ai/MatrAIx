personas:
  professional: Indu Kaur, a 16‑year‑old aspiring visual artist, blends self‑taught digital illustration skills with a keen sense of community storytelling, using their bilingual fluency to translate cultural
    narratives into vibrant graphic designs while balancing school responsibilities and occasional freelance commissions for local events.
  sports: Indu Kaur, a fan of the San Antonio Spurs and San Antonio FC, enjoys attending home games with friends, plays intramural volleyball after school, and follows a regular fitness regime of weekend
    hikes at the nearby Hill Country trails, all while favoring community soccer pick‑ups at the local park.
  arts: Indu Kaur, who spends afternoons sketching in the bustling San Antonio River Walk galleries, draws inspiration from the lyrical ragas of classical sitar maestro Ravi Shankar, the indie folk tones
    of Bon Iver, the graphic storytelling of Raina Telgemeier, and the vibrant street murals of local artist Jorge 'Julez' Hernández, weaving these influences into a unique visual style.
  travel: Indu Kaur, whose travel diary includes weekend trips to Austin’s live‑music scene, a cultural immersion weekend in the historic Mission San José, a family road‑trip through New Mexico’s adobe
    villages, and a dream to explore the lantern‑lit streets of Kyoto, prefers modest, well‑planned itineraries that balance artistic discovery with budget constraints.
  culinary: Indu Kaur, an enthusiastic home cook, perfects simple vegetarian dal with cumin, turmeric, and mustard seeds, rolls fresh roti on a wooden board, pairs meals with homemade mango‑chili chutney,
    and enjoys experimenting with Tex‑Mex tacos featuring black beans, avocado, and cilantro, while still mastering the art of balancing spices and flavors.
  core: Indu Kaur is a curious, detail‑oriented teen artist who channels cultural storytelling into vibrant illustrations, budgets meticulously for creative supplies, manages teenage acne with routine care,
    stays active through community sports, draws artistic fuel from diverse musicians and muralists, travels for inspiration on a shoestring budget, and whips up flavorful vegetarian dishes while occasionally
    staying up late perfecting their next piece.
background:
  cultural: Indu is a second‑generation South Asian American, raised in a Punjabi Sikh family in San Antonio. Her upbringing blends traditional values—such as respect for elders, community service (seva),
    and celebration of festivals like Vaisakhi and Diwali—with the multicultural environment of Texas. She grew up speaking Punjabi at home while attending English‑language schools, giving her a bicultural
    fluency. Her family maintains customs like serving langar at the local gurdwara and preserving home‑cooked meals that emphasize vegetarian ingredients. The multicultural neighborhood she lives in has
    exposed her to Mexican, African‑American, and other Hispanic cultures, influencing her appreciation for diverse artistic expressions and encouraging her to seek inclusive, cross‑cultural creative projects.
attributes:
  skills: '[''Sketching'', ''Digital Illustration'', ''Bilingual Communication (English, Punjabi)'', ''Basic Video Editing'', ''Peer Mediation'', ''Community Event Planning'', ''Traditional Cooking (vegetarian
    South Asian dishes)'', ''Research and Information Synthesis'']'
  hobbies: '[''Sketching'', ''Watercolor Painting'', ''Digital Art (tablet)'', ''Reading Graphic Novels'', ''Listening to Indian Classical and Indie Folk Music'', ''Cooking Traditional Vegetarian Meals'',
    ''Attending Local Art Galleries'', ''Participating in Small Book Clubs'', ''Journaling'']'
  career_goals: Indu aspires to finish high school and earn a scholarship to study visual arts or graphic design. She dreams of blending her South Asian heritage with contemporary design, creating artwork
    that celebrates cultural stories for a wider audience. Long‑term, she hopes to work as a freelance illustrator while also volunteering as a cultural liaison in community centers, helping newcomers bridge
    language and cultural gaps. She envisions eventually opening a small studio that offers art workshops for youth, especially those from immigrant families, fostering creativity and confidence.
