personas:
  professional: Jermar Newman, a veteran engineering technologist with four decades of hands‑on experience in industrial manufacturing, excels at diagnosing complex mechanical and electrical systems, programming
    PLCs, and translating field insights into practical process optimizations, while their relaxed, improvisational style lets them pivot between troubleshooting and mentoring without strict schedules.
  sports: Jermar Newman follows the Atlanta Falcons and the New Orleans Pelicans avidly, plays weekly pick‑up basketball with the local senior league, and spends spring mornings fly‑fishing on Lake Martin,
    staying fit with light weight‑training at the community center.
  arts: Jermar Newman finds solace in the improvisational sounds of John Coltrane, the blues riffs of B.B. King, and the speculative worlds of Isaac Asimov, often attending the local theater’s classic film
    nights and maintaining a modest vinyl collection that doubles as a backdrop while woodworking.
  travel: Jermar Newman prefers low‑key road trips, having explored the historic streets of Savannah, the jazz‑filled French Quarter of New Orleans, and the mountain trails of Asheville, while yearning
    for a leisurely drive along California’s Pacific Coast Highway once retirement finances allow.
  culinary: Jermar Newman relishes cooking Southern comfort staples like shrimp étouffée, collard greens seasoned with smoked ham hocks, and buttery cornbread, boasting a solid intermediate cooking skill
    level that shines when they pair each meal with a glass of sweet tea and the smooth saxophone tones of Miles Davis on the kitchen radio.
  core: Jermar Newman blends a lifetime of hands‑on engineering precision with a relaxed, solitary hobbyist spirit, turning every bolt, board, and bass line into a quiet celebration of craftsmanship and
    calm.
background:
  cultural: Jermar is a Black American who grew up in Richmond, Texas, within a close‑knit African‑American community that values church, family, and collective resilience. His upbringing was shaped by
    the traditions of Southern Black culture—storytelling, soul food, gospel music, and a strong emphasis on education as a pathway to advancement. He maintains ties to local cultural institutions, such
    as the historic Black church and community centers that support youth development. This background informs his calm demeanor, his commitment to mentoring, and his appreciation for both heritage and
    progress.
attributes:
  skills: '["Mechanical systems troubleshooting", "Electrical wiring and schematics", "Programmable Logic Controllers (PLC) programming", "Computer‑Aided Design (CAD) with SolidWorks", "Preventive maintenance
    planning", "Process optimization", "Technical documentation", "Quality control and assurance", "Mentoring and training of junior staff", "Data analysis using Excel and Python"]'
  hobbies: '["Woodworking", "Model railroading", "Fishing", "Gardening", "Reading science‑fiction and engineering literature", "Playing chess", "Attending small church gatherings", "Mentoring youth in STEM",
    "Listening to jazz and blues", "Cooking Southern dishes"]'
  career_goals: Approaching retirement, Jermar aims to shift from routine shop floor duties to a flexible consulting role where he can apply his deep technical knowledge to select projects that pique his
    curiosity. He hopes to mentor high‑school and community‑college students in STEM, develop a series of practical technical manuals for local manufacturers, and explore small‑scale innovation projects—such
    as retrofitting legacy equipment with modern sensors—without the pressure of strict deadlines. Ultimately, he wants to leave a legacy of practical problem‑solving knowledge and inspire the next generation
    of Black engineers in his region.
