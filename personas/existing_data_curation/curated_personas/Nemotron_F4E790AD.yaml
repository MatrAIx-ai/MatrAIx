  hobbies: '[''woodworking'', ''gardening'', ''fishing'', ''reading historical non-fiction'', ''DIY home repair'', ''volunteering at food bank'', ''card games'', ''listening to classic rock'', ''attending
    community events'']'
  career_goals: Looking ahead, Irwin aims to transition into a supervisory or safety-lead role before retirement, leveraging his experience to improve workplace safety and efficiency. He hopes to obtain
    a certified safety officer credential and formalize his mentorship responsibilities, training the next generation of material movers. Irwin also plans to supplement his income with a small side business
    offering moving assistance for seniors and disabled neighbors, reflecting his strong drive to help others. Long-term, he wants to secure a comfortable retirement fund, maintain his health through regular
    exercise, and continue volunteering at the local food bank and community center, ensuring he remains a stabilizing presence in Flint.
