  hobbies: '[''Knitting'', ''Reading historical fiction'', ''Listening to Mexican folk music'', ''Cooking traditional Mexican dishes'', ''Gardening in a greenhouse'', ''Walking around the neighborhood'',
    ''Sewing projects'', ''Playing dominoes at senior center'', ''Watching the aurora borealis'', ''Sharing stories with family and friends'']'
  career_goals: Even at 88, Yolanda focuses on staying healthy, remaining independent, and deepening her role as a cultural steward. She aims to compile a small family cookbook of her favorite recipes and
    stories, share Mexican traditions with her grandchildren, and mentor younger members at the senior center. She also hopes to become more comfortable using video calls to stay connected with relatives
    in Mexico and elsewhere. Her overarching ambition is to ensure that her Mexican heritage continues to thrive in her Alaskan community while maintaining a secure, comfortable home for herself and her
    husband.
