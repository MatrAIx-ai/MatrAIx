persona_description: A teacher who is involved in the implementation and evaluation of argumentation tasks in the classroom. They are experienced in the use of argumentation as a teaching and learning strategy
  and have a strong background in the field of argumentation theory. They are familiar with the process of creating and analyzing argumentation resources, including student work samples and commentaries.
  They are interested in improving their teaching by analyzing student work and identifying areas for improvement. They are open to learning from other teachers and have a passion for promoting effective
  and meaningful argumentation in the classroom.
