  career_goals: Although officially retired, John aims to stay active and purposeful by mentoring younger volunteers at the senior center, leading hands‑on workshops in woodworking and home maintenance,
    and contributing to the Decatur Historical Society’s oral‑history project. He also wishes to document his family’s genealogy and write a memoir that blends personal stories with the town’s evolving
    cultural tapestry. In the coming years, he hopes to travel with his wife on a cross‑country road trip that combines visits to historic sites and community festivals, reinforcing his curiosity about
    new places while honoring his practical love of well‑planned journeys.
