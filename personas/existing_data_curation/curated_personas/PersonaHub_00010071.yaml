persona_description: A historian and lawyer who specializes in the study of African history and its impact on the continent. He has written extensively on the effects of the trans-Atlantic slave trade on
  African societies and the role of slavery in preventing the development of an agrarian revolution in Ghana. His research interests include the history of indigenous slavery in Ghana and the impact of
  European powers on African culture. He is interested in the revival of African culture and the need for African societies to develop their own unique identity.
