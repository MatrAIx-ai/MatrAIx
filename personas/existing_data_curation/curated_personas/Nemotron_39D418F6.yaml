personas:
  professional: An infant brand ambassador for baby gear, Dulce Llauro leverages their love of predictable routines and practical play to demonstrate products with reliable, structured demonstrations, showcasing
    early communication skills and a surprisingly assertive demeanor when the demo goes awry.
  sports: A toddler who attends the Sunshine Play Center’s parent‑child gymnastics club and enjoys weekly swimming lessons, Dulce Llauro also watches the Chicago Cubs on game nights, they channel their
    structured energy into kicking soft balls in the backyard and proudly wear a mini Cubs cap.
  arts: Dulce Llauro delights in classic lullabies by Johannes Brahms, animated adventures of Sesame Street’s Elmo and Cookie Monster, and the playful dances of Mickey Mouse, they often hum along and wave
    their chubby hands in rhythm, cultivating an early love for music and storytelling.
  travel: Having joined parents on a road trip to the Grand Canyon and a sunny weekend in San Diego, Dulce Llauro now dreams of a future visit to Disney World, they prefer meticulously planned itineraries
    that include scheduled nap times, familiar baby gear, and the comfort of predictable routines.
  culinary: Dulce Llauro favors pureed sweet potatoes, smooth banana mash, and soft avocado cubes, they also enjoy a hint of cinnamon on applesauce and occasional chicken broth bites, often signaling a
    desire for more with an insistent squeal that borders on comedic persistence.
  core: Dulce Llauro is a meticulously scheduled one‑year‑old who thrives on routine, worries over unexpected changes, and charms everyone with a persistent, assertive squeal when denied a favorite toy.
background:
  cultural: Dulce grows up in a Hispanic‑Latino household in Tampa, Florida, where Spanish is spoken alongside English. Family traditions such as celebrating Día de los Muertos, enjoying tamales during
    holiday gatherings, and listening to Latin music at home shape her cultural identity. The local Latino community provides a supportive environment that reinforces bilingualism, food customs, and community-oriented
    values, all of which influence her daily routines and social interactions.
