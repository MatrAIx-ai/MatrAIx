  career_goals: While Dulce is too young for formal career planning, her caregivers foster a sense of curiosity and caring. She often mimics adults helping in the kitchen or comforting others, hinting at
    a future interest in nurturing roles. The family hopes to nurture her early empathy and love of community so that she may one day pursue a helping profession such as teaching, nursing, or social work.
