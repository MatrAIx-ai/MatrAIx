  career_goals: Although retired from formal employment, Dominick aims to serve as a community elder and cultural steward. He hopes to volunteer at the local African‑American history museum, helping to
    curate exhibits that celebrate Jackson's Black heritage. He plans to mentor youth through after‑school programs, teaching practical skills like woodworking and cooking. Writing a memoir that captures
    his experiences from the civil‑rights era to the present is a personal ambition, as is learning to paint his own landscapes. He also aspires to travel to regional blues and jazz festivals, deepening
    his connection to the music that shaped his upbringing.
