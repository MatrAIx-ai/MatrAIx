personas:
  professional: Dominick Celius, a 67-year-old retired carpenter and community mentor, embraces flexible scheduling as they volunteer at the local heritage museum, lead hands-on woodworking workshops for
    youth, and craft a memoir of their civil-rights era experiences while dabbling in landscape painting.
  sports: Dominick Celius passionately supports the local high school football team, attends weekly games, participates in spring line-dance gatherings and summer swing nights at the senior center, and
    they sharpen strategic thinking by playing chess at the library, treating it as a mental sport.
  arts: Dominick Celius dives into blues and jazz, regularly listening to B.B. King, Muddy Waters, and Nina Simone, while also appreciating visual art such as Monet's water lilies and local mural projects,
    and they often share insights on color and composition during community theater rehearsals.
  travel: Dominick Celius prefers low-key road trips to regional music festivals, they have visited the Beale Street Music Festival in Memphis, the New Orleans Jazz & Heritage Festival, and the Clarksdale
    Blues Festival, while dreaming of a leisurely pilgrimage to Savannah's historic squares and planning future journeys within the constraints of a fixed retirement budget.
  culinary: Dominick Celius delights in cooking Southern comfort dishes, expertly preparing shrimp and grits, fried chicken with collard greens, and sweet potato pie, while experimenting with new twists
    like smoked paprika-infused mac and cheese, and they proudly serve their creations at church potlucks and family gatherings.
  core: Dominick Celius, a 67-year-old sociable garden-tending harmonica player, channels curiosity into community mentorship, forgets to file taxes on time but never skips a birthday song, and they balance
    relaxed planning with spirited participation in music, art, and heritage.
background:
  cultural: Dominick is an African‑American who grew up in Jackson, Mississippi during the height of the civil‑rights movement. His upbringing was steeped in the rhythms of gospel music, the soul of the
    blues, and the flavors of Southern soul food. The church has been a cornerstone of his life, fostering a strong sense of community, resilience, and shared purpose. Family gatherings, barbecue cookouts,
    and neighborhood block parties have reinforced the importance of storytelling and communal support. He carries the legacy of his elders with pride, valuing education through lived experience, and remains
    deeply connected to the Black cultural traditions of the Deep South.
