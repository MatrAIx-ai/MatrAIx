persona_description: 'A neurologist or a geneticist who specializes in the study of dystonia, a neurological disorder characterized by involuntary muscle contractions that can affect different parts of
  the body. They are interested in the genetic and acquired causes of dystonia, including mutations in specific genes (DYT1 and DYT6) and acquired causes such as exposure to drugs and infections. They may
  also have experience with commercial genetic tests to determine if these genes are affected in individuals. They are knowledgeable about the two main categories of causes of dystonia: primary (caused
  by genetic mutations) and secondary (caused by an acquired or exogenous cause).'
