personas:
  professional: Jennifer Scott is a budding junior architect of imagination, turning LEGO creations into miniature cityscapes while applying methodical planning and teamwork skills learned on the soccer
    field and in the school choir, and they demonstrate how their curiosity and organized nature blend into a playful approach to early design projects.
  sports: Jennifer Scott plays forward for the local Greenfield Tigers U8 soccer team, eagerly watches matches of the national women's soccer team when possible, and they maintain her energetic fitness
    routine by practicing dribbling drills after school, though she admits to occasionally skipping warm‑ups when excited to join a game.
  arts: Jennifer Scott delights in sketching vivid landscapes inspired by Dr. Seuss and Disney’s Moana, sings soprano parts in the school choir alongside tracks from Disney’s The Lion King soundtrack, and
    they collect craft supplies to recreate her favorite scenes from Pixar’s Up, proving that her artistic identity is woven from bright storytelling and melodic expression.
  travel: Jennifer Scott loves family road trips to the nearby natural history museum and the coastal aquarium, dreams of visiting the Smithsonian National Air and Space Museum in Washington, D.C., and
    they save travel guide stickers on her journal pages to plan future adventures while balancing school responsibilities.
  culinary: Jennifer Scott enjoys assembling rainbow fruit kebabs of strawberries, grapes, and kiwi, loves eating pepperoni pizza with a side of carrot sticks, and they often help her mother whisk pancake
    batter, though she sometimes over‑loads the batter with chocolate chips, showcasing her enthusiastic yet occasionally messy cooking style.
  core: Jennifer Scott is a methodical, curiosity‑driven eight‑year‑old who blends art, soccer, and science into a vibrant, slightly messy, but always enthusiastic outlook on life, and they constantly seek
    new ways to share their creations with friends.
background:
  cultural: Jennifer was raised in Fenton, a suburb of St. Louis in Jefferson County, Missouri. Her family follows typical Midwestern American customs—celebrating holidays such as Thanksgiving, Christmas,
    and the Fourth of July, attending church services, and participating in community events like the county fair. She experiences a blend of mainstream U.S. culture with local traditions and values education,
    volunteerism, and neighborly cooperation.
