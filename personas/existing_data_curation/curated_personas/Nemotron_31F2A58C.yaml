  career_goals: Although Julian is no longer part of the formal workforce, he is driven to remain an active contributor to his community. His primary ambition is to expand the local senior‑center’s programming,
    creating new workshops that blend practical skills with social interaction, such as DIY crafts, gardening clubs, and technology tutorials. He also hopes to mentor younger volunteers, sharing his experience
    in event coordination and conflict resolution. Beyond community service, Julian aspires to maintain his health and vitality through regular physical activity and to travel to a few historic Midwestern
    towns he has always wanted to explore.
