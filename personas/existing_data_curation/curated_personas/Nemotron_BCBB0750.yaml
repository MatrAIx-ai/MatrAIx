  hobbies: '["Vegetable gardening", "Bonsai cultivation", "Reading historical biographies", "Listening to traditional Korean music", "Watching classic Korean films", "Cooking Korean family recipes", "Participating
    in a senior book club", "Solving puzzles (crosswords, Sudoku)", "Walking in local parks", "Exploring practical technology (smart‑home devices, tablets)"]'
  career_goals: Although officially retired, Yoon’s primary ambition is to maintain his health and independence while remaining mentally active. He aims to mentor his grandchildren and younger members of
    his community by sharing practical skills—such as basic home repair and gardening techniques—and by offering guidance on navigating digital communication tools. Yoon also wishes to document his family’s
    history, compiling photographs, oral stories, and recipes into a memoir that preserves his Korean heritage for future generations. He plans to continue volunteering at the local senior center, helping
    organize small workshops on budgeting and technology use, and he hopes to adopt useful new technologies (e.g., smart‑home devices) in a measured, practical way that enhances his daily life without adding
    unnecessary complexity.
