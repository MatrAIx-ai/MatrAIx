personas:
  professional: Katherine Ammons, a curious four‑year‑old tinkerer, loves building block structures and orchestrates spontaneous backyard experiments that reveal early problem‑solving instincts, and they
    display an unstructured, play‑centric approach that hints at a future in engineering or scientific discovery.
  sports: Katherine Ammons, an energetic four‑year‑old who loves darting around the local playground, participates in the toddlers' soccer program at the community center, cheers loudly for the nearby Greenfield
    Cubs, yet often forgets to hydrate, reflecting their spontaneous and enthusiastic sports spirit.
  arts: Katherine Ammons, a budding little artist, spends afternoons finger‑painting vivid rainbows and singing along to Sesame Street while idolizing Dr. Seuss and dancer Tasha, and they proudly exhibit
    their crayon mosaics on the kitchen fridge, letting art shape their daily joy.
  travel: Katherine Ammons, an intrepid four‑year‑old explorer, has visited the city aquarium, the sandy shores of Seaside Park, dreams of the towering redwoods in California, and they favor family road
    trips with spontaneous playground stops over rigid itineraries.
  culinary: Katherine Ammons, a selective four‑year‑old eater, adores dinosaur‑shaped mac‑and‑cheese and carrot sticks dipped in hummus, has a notorious habit of smearing peanut butter on everything—including
    the table—and they occasionally refuse broccoli, making mealtime both creative and challenging.
  core: Katherine Ammons is a vivacious four‑year‑old whose boundless curiosity fuels artistic and social adventures, whose occasional worry adds a careful edge, and who embraces spontaneous play while
    sometimes indulging in impulsive spending; they are both delightfully messy and endearingly resilient.
background:
  cultural: Katherine was born and raised in Marine City, Michigan, a small Midwestern town along the St. Clair River. Her family follows typical suburban traditions, celebrating holidays like Thanksgiving,
    Christmas, and the Fourth of July with community picnics and local parades. The town’s blend of industrial heritage and river‑side recreation influences her appreciation for both artistic expression
    and outdoor play. She is raised in a modest middle‑class household that values family togetherness, community involvement, and exposure to regional events such as the Marine City Summer Festival.
