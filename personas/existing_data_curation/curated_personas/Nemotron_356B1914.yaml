  career_goals: Although officially retired, Camille is driven by a deep sense of purpose that blends her curiosity with a practical desire to leave a lasting legacy. She aims to compile an oral-history
    archive of Guatemalan elders in the Washington, D.C. area, preserving stories for future generations while honing her research skills. Camille plans to author a memoir that weaves together her personal
    journey, Guatemalan folklore, and reflections on aging, using her literary background to craft a nuanced narrative. She seeks to develop and lead monthly workshops on traditional cooking and textile
    arts at the local senior center, providing hands‑on learning for younger community members. Additionally, she aspires to serve on the board of a cultural nonprofit, contributing her budgeting and event‑planning
    expertise to expand outreach programs for immigrant seniors. Through these goals, Camille balances her compassionate drive to support others with a realistic, organized approach to achieving measurable
    outcomes.
