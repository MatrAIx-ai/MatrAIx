personas:
  professional: Jacqueline Mccray is an early childhood educator who blends improvisational drumming, playful technology, and culturally resonant storytelling to ignite curiosity in preschoolers, while
    her spontaneous planning style often leaves lesson plans a day behind schedule as she balances a drive for practical outcomes with creative flexibility on her path toward a district‑wide program coordinator
    role.
  sports: Jacqueline Mccray is an avid hiker who frequents Pocahontas State Park with a local women’s hiking club, cheers on the Washington Capitals during hockey season and the Washington Spirit in the
    NWSL, and participates in community 5K fun runs, preferring low‑impact cardio over competitive team sports.
  arts: Jacqueline Mccray is a spirited improvisational drummer and singer who performs at church fellowship nights, draws inspiration from the soulful sounds of Mavis Staples and the jazz improvisations
    of The Groove Collective, and curates a personal library of multicultural children’s books ranging from *Brown Girl Dreaming* to *The Snowy Day*, weaving these works into her classroom curriculum.
  travel: Jacqueline Mccray enjoys spontaneous weekend getaways to historic sites like Yorktown, Williamsburg, and Savannah, plans trips with a blend of curiosity and practicality—booking budget lodgings
    while leaving room for impromptu cultural festivals—and dreams of a future pilgrimage to Ghana’s Cape Coast Castle to deepen her understanding of ancestral narratives.
  culinary: Jacqueline Mccray delights in cooking Southern soul‑food such as smoked collard greens, fried catfish with hushpuppies, and sweet‑potato casserole, often seasoning with fresh basil and thyme
    harvested from her garden, balancing moderate cooking skill with a willingness to experiment on the fly, occasionally over‑salting a stew when her improvisational spirit takes the lead.
  core: Jacqueline Mccray blends a curiosity‑driven love for spontaneous creativity with a grounded, practical drive—juggling early‑childhood teaching, community drumming, garden‑to‑table cooking, and a
    relentless push toward leadership while occasionally stumbling over organization and self‑care.
background:
  cultural: Jacqueline identifies as African American and draws strength from her family’s deep roots in Virginia’s Black community. She actively participates in her church’s fellowship events, celebrates
    Juneteenth, Kwanzaa, and other cultural holidays, and incorporates African American stories, songs, and history into her classroom lessons. As a member of the Virginia Black Teachers Association, she
    mentors students to embrace their heritage and advocates for culturally responsive education within the broader community.
