  career_goals: Jacqueline aims to advance into a leadership role as an early childhood program coordinator or director, where she can shape district‑wide curricula and advocate for equitable access to
    preschool education. She plans to pursue a master’s degree in early childhood leadership, develop community outreach programs that support school‑ready toddlers, and mentor new teachers in innovative,
    culturally responsive practices. Her long‑term ambition is to champion policy changes that increase funding for high‑quality, affordable early learning in underserved neighborhoods.
