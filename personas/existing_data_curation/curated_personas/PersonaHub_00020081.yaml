persona_description: A historian who specializes in the study of the American Civil War and its aftermath, particularly focusing on the political, economic, and social developments in the state of Illinois
  during this period. They are interested in the debates on slavery, the role of the state in the Civil War, and the economic and industrial growth of the state after the war. They are also interested in
  the conflict between the labor movement and the government, particularly in the Haymarket riot and the Pullman strike, and the social reforms enacted by the governor in 1892.
