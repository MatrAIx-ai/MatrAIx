  hobbies: '[''Hiking in the Columbia River Gorge'', ''Kayaking on local rivers'', ''Yoga and mindfulness meditation'', ''Homebrewing craft beer'', ''Cooking and trying new recipes'', ''Reading legal thrillers
    and social‑justice non‑fiction'', ''Playing strategic board games'', ''Volunteering at a legal‑aid clinic'']'
  career_goals: Robert aims to become a senior associate and eventually a partner at his firm, focusing on family law and mediation. He plans to obtain certification as a professional mediator and to develop
    a reputation for compassionate, client‑centered advocacy. In the longer term, he hopes to co‑found a community legal clinic that provides low‑cost services to vulnerable populations in the Vancouver/Portland
    area. He also wants to complete his JD (if still in progress), earn board certification in family law, and improve his time‑management and stress‑reduction strategies so he can maintain a healthier
    work‑life balance while mentoring junior attorneys.
