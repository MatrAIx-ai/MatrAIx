persona_description: A scientist with expertise in thermal infrared spectroscopy and its applications in mapping volcanic surfaces, particularly on the planet Mars. They are interested in using the Mars
  Observer Thermal Emission Spectrometer (TES) to study and map the Martian volcanoes, and have a particular interest in using thermal infrared data to identify subtle lava flow boundaries. They have experience
  with airborne thermal infrared multispectral scanners and are familiar with the NASA/JPL instrument TIMS.
