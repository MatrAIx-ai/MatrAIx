persona_description: A historian who specializes in the study of ancient Egyptian history, particularly the reigns of Ramesses III, Ramesses IV, Ramesses V, Ramesses VI, Ramesses VII, Ramesses VIII, Ramesses
  IX, Ramesses X, Ramesses XI, and the Third Intermediate Period. His research interests include, but are not limited to, the construction of Abu Simbel, the Sea Peoples' incursions into Egypt, the campaigns
  of Ramesses III and Ramesses IV, the Third Intermediate Period, and the Third Intermediate Period's impact on Egyptian history. He is also interested in the development of the Great Library at Alexandria
  under Ptolemy I Soter.
