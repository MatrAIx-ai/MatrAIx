  hobbies: '[''Birdwatching'', ''Herb gardening'', ''Walking her rescue cat'', ''Reading historical fiction'', ''Visiting museums and art galleries'', ''Yoga'', ''Mindfulness meditation'', ''Volunteering
    at community garden'', ''Animal photography'']'
  career_goals: Mercedes aims to advance to a supervisory role such as Animal Care Supervisor or Program Manager within the next five years, where she can design and implement systematic health monitoring
    protocols and improve overall animal welfare standards. She plans to obtain a certification in wildlife rehabilitation and pursue a master’s degree in Environmental Studies to deepen her expertise.
    Long‑term, she aspires to lead a community outreach initiative that pairs therapy animals with senior centers and inner‑city schools, and to influence local animal welfare policy through collaboration
    with municipal officials and nonprofit partners.
