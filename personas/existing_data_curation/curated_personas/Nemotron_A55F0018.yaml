personas:
  professional: Clarence Colvin, a seasoned architectural and civil drafter based in Los Angeles, blends mastery of AutoCAD, Revit, SketchUp, and GIS mapping with a compassionate, community‑focused mindset,
    turning detailed construction documents into inclusive, sustainable designs that he passionately presents at workshops and mentorship sessions.
  sports: Clarence Colvin jogs a steady three miles through Griffith Park most mornings, participates in the local senior running club, and roots for the Los Angeles Lakers and LA Galaxy, often catching
    games at the Staples Center after a weekend volunteer build.
  arts: Clarence Colvin plays the alto saxophone in a downtown community jazz band, regularly enjoys live performances by Miles Davis tribute nights, frequents open‑mic comedy evenings, and captures the
    ornate Art Deco facades of historic LA neighborhoods through street photography, drawing inspiration from artists like Romare Bearden and photographers such as Vivian Maier.
  travel: Clarence Colvin prefers spontaneous, low‑key road trips to West Coast cultural festivals—like the Portland Rose Festival, the Monterey Jazz Festival, and the Seattle International Film Festival—often
    planning on a whim with a packed camera bag, while still keeping a yearly vacation budget for visits to Santa Barbara's historic Mission and the desert art installations of Joshua Tree.
  culinary: Clarence Colvin enjoys cooking soulful Southern dishes such as shrimp and grits, smoked collard greens, and pecan‑topped cornbread, seasoning with smoked paprika, garlic powder, and a dash of
    hot sauce, a moderate home chef who occasionally relies on pre‑made roux to speed up a Sunday stew.
  core: Clarence Colvin balances a love for structure with a spontaneous spark—meticulously drafting sustainable housing by day, yet impulsively hopping on a road trip to a jazz festival by night—while
    staying talkative, community‑centric, and occasionally wrestling with deadline anxiety.
background:
  cultural: Clarence is an African American who grew up in South Central Los Angeles during the late civil‑rights era. His family traces its roots to the Great Migration, bringing a strong sense of resilience
    and community solidarity. Immersed in the vibrant Black cultural scene—church gospel choirs, jazz clubs, and the emerging hip‑hop movement—he internalized values of mutual aid and collective uplift.
    These experiences shape his commitment to designing spaces that honor African‑American heritage and promote social equity. Clarence remains active in local Black arts organizations, celebrates Black
    history month events, and draws inspiration from the architectural contributions of early Black architects in the city.
attributes:
