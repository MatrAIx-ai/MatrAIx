  career_goals: Immer aims to enroll in a community‑college program to earn an associate degree in Health Sciences and become a certified nursing assistant, attracted by the clear protocols, hands‑on patient
    care, and immediate impact such a role offers. She also plans to obtain EMT certification so she can respond quickly in emergency situations, aligning with her practical, results‑oriented mindset. Long‑term,
    she envisions advancing to a registered nursing role in an acute‑care setting where structured teamwork and measurable performance metrics match her competitive drive. Parallel to her healthcare aspirations,
    Immer hopes to launch a small homemade‑baked‑goods side business, leveraging her cooking skills and entrepreneurial spirit, while seeking work environments that provide supportive mental‑health resources
    to help her manage anxiety and emotional reactivity.
