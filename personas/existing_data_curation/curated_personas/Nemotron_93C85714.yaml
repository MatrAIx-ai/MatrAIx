personas:
  professional: An aspiring concept artist and UI/UX designer, Yan Yang leverages their mastery of Procreate, Blender, and Python to craft immersive game interfaces while meticulously organizing each project
    in Notion, reflecting their disciplined, solitary work style.
  sports: A low‑key fitness enthusiast, Yan Yang runs solo morning miles with the Preston Runners Club, tunes into Boston Celtics and New England Revolution games on weekends, and they occasionally join
    a pick‑up basketball drill at school despite preferring solitary exercise.
  arts: A visionary digital illustrator, Yan Yang blends traditional watercolor textures with 3D renders inspired by James Jean, Hayao Miyazaki, and the neon aesthetic of Beeple, they also compose ambient
    piano pieces reminiscent of Ryuichi Sakamoto after watching experimental film festivals.
  travel: A meticulous travel planner, Yan Yang dreams of solo explorations in Kyoto during cherry‑blossom season and backpacking across Iceland's highlands, they currently alternate weekend family road
    trips to the Adirondacks with virtual tours of Shanghai's historic neighborhoods, balancing curiosity with budget constraints.
  culinary: A budding home chef, Yan Yang enjoys whisking together scallion pancakes, crafting mooncakes filled with lotus‑seed paste for Mid‑Autumn, and experimenting with matcha latte art while their
    repertoire focuses on quick Asian‑fusion dishes like garlic‑soy ramen, they occasionally over‑season in pursuit of bold flavors.
  core: Yan Yang is a disciplined, solitary dreamer who fuses traditional brushwork with cutting‑edge tech to create introspective digital worlds, while they meticulously budget, manage eye‑strain, and
    find quiet solace in solo runs and mooncake‑making.
background:
  cultural: Yan was raised in a bilingual household of Chinese descent, with Mandarin spoken at home and English used in school and community. Family traditions such as celebrating Lunar New Year, making
    mooncakes for the Mid‑Autumn Festival, and honoring ancestors are integral parts of her upbringing. While she embraces these cultural practices, her daily life in Preston, Connecticut blends American
    values of independence and self‑expression. She participates in a local multicultural youth group, which exposes her to a variety of Asian and Western perspectives, and she often incorporates elements
    of her heritage—such as calligraphic brush strokes and traditional motifs—into her artwork.
attributes:
  skills: '[''Digital illustration'', ''Traditional watercolor painting'', ''3D modeling (Blender)'', ''Graphic design (Illustrator)'', ''Python programming'', ''Creative writing (poetry and speculative
    fiction)'', ''Bilingual communication (English and Mandarin)'', ''Project management (Notion, Trello)'', ''Music composition (digital audio workstations)'']'
  hobbies: '[''Reading speculative fiction'', ''Sketching landscapes'', ''Experimenting with Blender and Unity'', ''Practicing Chinese calligraphy'', ''Solving abstract mathematics puzzles'', ''Attending
    virtual art workshops'', ''Collecting vintage graphic design books'']'
  career_goals: She aims to pursue a degree that merges fine arts and technology, such as a BFA in Illustration with a minor in Human‑Computer Interaction, to become a concept artist and UI/UX designer
    for video games or interactive media. Yan plans to build a professional portfolio of solo and collaborative projects, seek internships at indie studios, and eventually launch her own boutique studio
    that creates narrative‑driven visual experiences. She also hopes to contribute to community art programs that encourage solitary creators to share their work.
