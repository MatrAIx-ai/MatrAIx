  hobbies: '[''Gardening'', ''Knitting'', ''Walking'', ''Reading historical non-fiction'', ''Book club'', ''Volunteer safety education'', ''Cooking'', ''Listening to classical music'']'
  career_goals: As she approaches the later stage of her career, Vivian aims to transition into a senior safety leadership role where she can mentor emerging engineers and champion a culture of safety across
    the organization. She intends to develop a company‑wide ergonomics program to reduce injuries among older workers, publish a practical guide on workplace safety for small manufacturers, and eventually
    move into consulting to help local businesses enhance their health‑and‑safety practices while maintaining a balanced workload that supports her well‑being.
