persona_description: A historian or theologian who is particularly interested in the Gospels of Jesus Christ and the early Christian period. This person is knowledgeable about the historical context and
  the various accounts of Jesus' life, including the accounts of his resurrection and the role of women in the early Christian community. They are also interested in the theological implications of these
  accounts, including the nature of the divine and the role of Mary Magdalene as a witness to the risen Christ. This person is likely to have a deep understanding of the Gnostic texts and the controversies
  surrounding them, and may be knowledgeable about the works of scholars who have written on these topics.
