personas:
  professional: Michael Mcisaac, an aspiring junior game developer who loves building LEGO mechanics, channels curiosity into learning basic coding via block‑based platforms, yet often sidetracks from tutorials
    because they resist rigid structures and chase spontaneous ideas.
  sports: Michael Mcisaac, a backyard‑field general who organizes spontaneous capture‑the‑flag games, cheers for the local baseball team—the Chicago Cubs—while also dabbling in a community soccer clinic,
    balancing a love of teamwork with a competitive edge.
  arts: Michael Mcisaac, a budding storyteller who sketches comic panels of imagined inventions, draws inspiration from Stan Lee, Pixar’s “Toy Story,” and the flamboyant skits of Miss Piggy, often performing
    short plays at school talent shows.
  travel: Michael Mcisaac, an eager explorer who adores family trips to the Kennedy Space Center and the Grand Canyon, dreams of visiting the International Space Station exhibit in Washington, D.C., yet
    prefers short weekend drives to nearby amusement parks for immediate excitement.
  culinary: Michael Mcisaac, a self‑declared pizza connoisseur who can assemble perfect pepperoni slices and loves building “LEGO‑shaped” chicken nuggets, occasionally sneaks extra chocolate chips into
    oatmeal when nervous about school tests.
  core: Michael Mcisaac is a talkative, competition‑driven 7‑year‑old whose curiosity fuels endless inventions while worry and impulsive spending keep them constantly juggling excitement and anxiety.
background:
  cultural: Michael is a white American boy raised in Sacramento, California. His family background includes Irish heritage, hinted by his surname McIsaac, and they celebrate a mix of traditional Irish
    holidays alongside typical American customs. Growing up in a diverse Californian city, he is exposed to a variety of cultures and community events, from local farmers markets to the annual California
    State Fair. This environment nurtures his curiosity about the world while reinforcing a practical, goal‑oriented mindset common in the region's tech‑savvy culture.
