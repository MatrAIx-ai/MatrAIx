  hobbies: '[''Contemporary Art Exploration'', ''Museum and Gallery Visits'', ''Street Art Tours'', ''Photography'', ''Reading Business & Leadership Books'', ''Basketball'', ''Cooking'', ''Traveling'',
    ''Yoga'', ''Coffee Shop Hopping'']'
  career_goals: Errol aims to move up the retail hierarchy, targeting a store manager position within the next two years and a district manager role within five years. He plans to pursue an MBA to broaden
    his strategic perspective and eventually transition into a corporate role overseeing multiple locations or launching his own culturally‑inspired boutique that blends art and retail. He is driven to
    implement innovative visual merchandising concepts that reflect his appreciation for contemporary art, and to champion diversity and inclusion initiatives that empower underrepresented employees in
    the retail sector.
