personas:
  professional: John Garcia is a line cook renowned for mastering high‑heat grilling and Spanish‑Tex‑Mex fusion dishes, whose practical mindset keeps kitchen operations efficient while his competitive nature
    drives relentless experimentation with plating and flavor to dominate local cooking contests.
  sports: John Garcia laces up for Saturday evening pickup soccer with the Bowie Strikers, roots for the Dallas Cowboys and Texas Rangers, and supplements his game with daily 30‑minute HIIT workouts, though
    his competitive streak occasionally pushes him into overexertion.
  arts: John Garcia crafts classic‑rock playlists featuring 'Led Zeppelin', 'The Rolling Stones', and 'Fleetwood Mac' for his backyard barbecues, devotes evenings to flamenco guitar studies of pieces by
    Paco de Lucía, and never misses the Austin City Limits Music Festival, where he absorbs new sounds for future gatherings.
  travel: John Garcia favors spur‑of‑the‑moment road trips across the Texas Hill Country, routinely visiting Fredericksburg’s vineyards, the blue‑bonnet fields of Ennis, and the vibrant streets of Austin,
    while his modest budget steers him toward budget motels and camping over luxury accommodations.
  culinary: John Garcia excels at grilling marinated skirt‑steak tacos, simmering saffron‑infused paella with chorizo, and pairing each with locally brewed Lone Star beers, while his home experiments with
    smoky chipotle aioli, fresh cilantro, and citrus‑zested guacamole showcase his seamless blend of Spanish and Tex‑Mex flavors.
  core: John Garcia blends a penchant for spontaneous social barbecues, classic‑rock riffs, and fierce culinary competition into a charismatic life marked by a love of flamenco guitar, occasional paperwork
    chaos, and a relentless drive to turn his Spanish‑Texan food vision into a thriving tapas‑and‑BBQ restaurant.
background:
  cultural: John is a first‑generation American of Spanish descent; his parents immigrated from Andalusia and instilled in him a love for traditional Spanish cuisine, family gatherings, and the Spanish
    language. Growing up in Texas, he blends these traditions with local Texan customs, celebrating both Spanish holidays like Semana Santa and American holidays such as Fourth of July. His bilingual ability
    and cultural fusion influence his cooking style and social interactions.
attributes:
  skills: '[''Grilling'', ''Sautéing'', ''Spanish‑Tex‑Mex fusion cooking'', ''Food safety and sanitation'', ''Inventory management'', ''Menu development'', ''Plating and presentation'', ''Team coordination'',
