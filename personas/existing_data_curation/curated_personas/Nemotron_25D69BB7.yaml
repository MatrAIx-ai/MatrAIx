  hobbies: '[''Backyard barbecues'', ''Pickup soccer'', ''Community music festivals'', ''Road trips in Texas Hill Country'', ''Craft beer tasting'', ''Flamenco guitar'', ''Classic rock music'', ''Cooking
    competitions (as a hobby)'']'
  career_goals: John aims to become a head chef within the next three years, leading a kitchen that blends his Spanish heritage with Texan flavors. He plans to earn a certified culinary diploma to formalize
    his expertise and eventually open his own small tapas‑and‑barbecue restaurant in Bowie, offering a lively communal dining experience. He also hopes to win regional cooking competitions, which would
    boost his reputation and attract investors for his future venture.
