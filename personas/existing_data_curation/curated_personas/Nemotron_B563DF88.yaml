  hobbies: '[''Attending jazz concerts'', ''Open‑mic spoken‑word performances'', ''Hosting game nights and barbecues'', ''Coaching youth basketball'', ''Cooking Creole cuisine'', ''Reading entrepreneurship
    and personal development books'', ''Exploring African‑American history'', ''Hiking in local parks'', ''Mindfulness meditation'']'
  career_goals: Kenneth aims to channel his business acumen and people‑focused strengths into a career that drives positive change in his community. In the short term, he seeks a program‑coordinator or
    project‑manager position within a nonprofit organization or a corporate social‑responsibility department, where he can apply his methodical planning and collaborative skills while expanding his professional
    network. Over the next five to ten years, he envisions launching his own social‑enterprise that offers job‑training, mentorship, and entrepreneurial resources to at‑risk youth in the Greater New Orleans
    area. Ultimately, he hopes to become a recognized leader in community development, influencing policy and creating sustainable economic opportunities for under‑served neighborhoods.
