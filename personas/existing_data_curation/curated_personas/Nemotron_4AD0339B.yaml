  hobbies: '[''hiking in Forest Park and nearby trails'', ''gardening (vegetable and native plants)'', ''reading mystery and sci‑fi novels'', ''visiting independent coffee shops'', ''thrifting and vintage
    clothing hunts'', ''DIY upcycling projects'', ''journaling and creative writing'', ''community volunteer events (park clean‑ups)'', ''binge‑watching documentary series'', ''playing acoustic guitar (self‑taught)'']'
  career_goals: Marva aims to turn her practical skill set into a stable, part‑time role that offers flexibility—such as a maintenance assistant at a community center or a facilities support position for
    a local nonprofit. She is also exploring the possibility of launching a small side business selling upcycled home décor items, leveraging her DIY talents. To broaden her opportunities, she is considering
    an associate‑level certification in sustainable building trades, which would combine her curiosity for new techniques with a pragmatic path to financial independence. Ultimately, she seeks a career
    that balances autonomy with occasional collaborative work, without demanding a rigid schedule.
