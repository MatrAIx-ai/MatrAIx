personas:
  professional: Marva Alldredge, a hands‑on maintenance enthusiast, blends basic carpentry, plumbing, and electrical safety know‑how with a community‑focused mindset, seeking part‑time roles at nonprofit
    facilities where they can flexibly apply their DIY flair while planning a side venture of up‑cycled home décor.
  sports: Marva Alldredge, an avid hiker, explores Forest Park's extensive trails and joins the Portland Trail Hiking Club, while cheering on the Timbers in MLS and the Trail Blazers in the NBA, and fits
    occasional weekend bike rides into a flexible fitness routine.
  arts: Marva Alldredge, a self‑taught acoustic guitarist, spends evenings at the independent coffee shop Ruby's Café open‑mic nights, drawing inspiration from Sufjan Stevens and The Decemberists, while
    curating a vintage‑clothing collection and frequenting the Portland Art Museum's contemporary exhibits.
  travel: Marva Alldredge prefers spontaneous road trips along the Columbia River Gorge, enjoys weekend escapes to Cannon Beach and a recent backpacking stint in the Olympic Peninsula, dreams of trekking
    Iceland's waterfalls, and typically books budget‑friendly Airbnbs while keeping an eye on travel costs.
  culinary: Marva Alldredge loves farm‑to‑table cooking, mastering dishes like wild mushroom risotto with locally foraged chanterelles and roasted beet‑goat cheese salad, favors oat‑milk lattes from Stumptown,
    and often experiments with garden‑grown kale and herbs in a modest, yet enthusiastic kitchen.
  core: Marva Alldredge melds a relaxed, DIY‑centric lifestyle with a love for the Pacific Northwest outdoors, thriving on flexible work, thrifted treasures, and occasional bursts of organized chaos.
background:
  cultural: Marva is a white American raised in the suburban outskirts of Portland, Oregon. Her family emphasized self‑reliance, environmental stewardship, and a laid‑back approach to life that typifies
    the Pacific Northwest. Growing up, she absorbed a blend of Midwestern work ethic from her parents and progressive West Coast values, fostering an appreciation for outdoor recreation, local coffee culture,
    and community involvement. The region's focus on sustainability, DIY ethos, and a collaborative yet independent spirit has shaped her practical outlook, her love of hands‑on projects, and her balanced
    view of individual and collective interests.
attributes:
  skills: '[''basic carpentry'', ''home repair troubleshooting'', ''basic plumbing'', ''electrical safety basics'', ''DIY upcycling'', ''computer literacy (Microsoft Office, email, social media)'', ''online
