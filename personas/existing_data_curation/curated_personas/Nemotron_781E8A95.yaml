    ''Learning about emerging investigative technologies (e.g., AI for forensic analysis)'']'
  career_goals: Chika aspires to advance to a senior detective role within the Rialto Police Department, ultimately seeking a supervisory position such as detective sergeant or lieutenant where she can
    shape investigative strategy and policy. She plans to complete her bachelor's degree in criminal justice and obtain advanced certifications in cyber‑forensics and homicide investigation, strengthening
    her technical expertise. Driven by her commitment to high standards, she aims to lead a specialized unit focused on organized crime or digital threats, while also establishing a mentorship program for
    new officers and fostering stronger community‑law enforcement partnerships, especially within the Black community.
