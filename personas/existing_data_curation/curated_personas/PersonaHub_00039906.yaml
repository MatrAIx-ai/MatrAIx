persona_description: A researcher and scientist who is interested in the study of sleep and its impact on brain development. They are particularly interested in the role of sleep-related movements, such
  as myoclonic twitching, in the establishment, refinement, and maintenance of neural circuits and the assessment of somatosensory function in humans across the lifespan. They are also interested in the
  potential applications of sleep-related movements as a tool for assessing sensorimotor function in individuals with injuries or conditions that affect sensorimotor function.
