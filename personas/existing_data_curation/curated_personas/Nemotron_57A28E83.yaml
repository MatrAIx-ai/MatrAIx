  career_goals: Angelica aims to launch a boutique production company in Southeast Texas that focuses on documentaries spotlighting underrepresented local narratives. She envisions producing a feature‑length
    series about Jefferson County’s cultural heritage for national film festivals such as SXSW and the Austin Film Festival. She aspires to become a mentor and educator for aspiring women filmmakers through
    community college workshops, and to expand into immersive virtual‑reality storytelling. Additionally, she seeks to establish a regional artists' co‑op, secure grant funding for community arts initiatives,
    and earn a regional Emmy or comparable award for a public‑television production.
