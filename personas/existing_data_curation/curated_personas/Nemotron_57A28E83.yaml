personas:
  professional: An inventive film production manager, Angelica Redding blends meticulous budgeting, crew coordination, and contract negotiation with bold narrative experimentation, they direct documentaries
    and community theater that weave abstract concepts into compelling visual stories while mentoring emerging women filmmakers and planning a boutique production company focused on underrepresented local
    narratives.
  sports: An avid hiker and community bridge enthusiast, Angelica Redding frequents the Big Thicket National Preserve with the Texas Trails Club, they root for the Houston Astros and Dallas Cowboys, and
    they join weekend bridge tournaments at the Nederland Community Center.
  arts: Passionate about visual and auditory arts, Angelica Redding spends evenings painting abstract watercolors inspired by Texas skies, they curate a vinyl collection featuring Miles Davis, John Coltrane,
    The Doors, and The Velvet Underground, and they regularly volunteer at film festivals to showcase indie documentaries, drawing inspiration from the surrealism of Salvador Dalí and the color palettes
    of Georgia O’Keeffe.
  travel: With a penchant for curated road trips and cultural immersion, Angelica Redding plans journeys that blend artistic research with relaxation, they have explored Marfa’s art installations, the colonial
    streets of San Miguel de Allende, and they dream of photographing the aurora borealis in Tromsø, Norway.
  culinary: An experimental home chef, Angelica Redding skillfully fuses Tex‑Mex flavors, they frequently prepare smoked chipotle‑marinated brisket tacos with fresh cilantro, roasted corn salsa, and a splash
    of lime, while also delighting in crafting herb‑infused cocktails using rosemary harvested from their garden and savoring rich queso fundido.
  core: Angelica Redding is a relentlessly curious filmmaker who juggles grant applications, watercolor canvases, and bridge scores, yet they habitually forget to water their succulents after a long shoot.
background:
  cultural: Angelica is a white Anglo‑American from East Texas who grew up in a tight‑knit small‑town community. Her upbringing reflects Southern hospitality, family‑centered values, and active participation
    in local church and civic events. She values independence, community support, and regional traditions such as barbecue, country music, and storytelling about local folklore. While deeply rooted in Texas
    culture, she also draws inspiration from broader American arts, maintaining a balanced perspective that honors her heritage while embracing diverse artistic influences.
