  hobbies: '[''Watercolor Painting'', ''Visiting Art Galleries'', ''Reading Speculative Fiction'', ''Photography'', ''Gardening'', ''Book Club'', ''Teaching Community Art Classes'', ''Attending Lectures
    on Modern Art and Philosophy'']'
  career_goals: Gloria aims to transition into a regional training role where she can share her creative approach to retail management with a broader network of supervisors. She hopes to develop a mentorship
    program for emerging store leaders and to author a guidebook on integrating artistic concepts into retail environments. In the next five years she plans to earn a certification in visual merchandising,
    lead a pilot project for an experiential storefront in the Greater Columbus area, and eventually scale back her supervisory duties while remaining active as a consultant and community arts advocate.
