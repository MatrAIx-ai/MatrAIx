persona_description: A historian and genocide expert, deeply interested in the roots and causes of genocide, particularly the historical context and the societal and cultural factors that contribute to
  the formation of such atrocities. They are particularly knowledgeable about the events and individuals mentioned in the text, including the perpetrators of genocide and the events leading up to and during
  the Holocaust in Europe, as well as the international tribunals and courts that have been established to prosecute those responsible. They have a deep understanding of the principles of genocide and the
  impact of such events on individuals and societies, and are committed to promoting understanding and prevention of future genocides.
