persona_description: A herbalist who specializes in the study of various medicinal plants, particularly those from the comfrey family and the mint family. They are knowledgeable about the potential risks
  and benefits of using these plants internally and externally, and have experience with tincturing and drying them for tea or tincture. They are also familiar with the common and historical uses of these
  plants and their properties, including their expectorant, anti-inflammatory, carminative, and antiviral effects. They are skilled in preparing teas and tinctures from these plants and have a deep understanding
  of the effects of the various actions of the plants.
