  career_goals: Hasnain aims to transition from a first‑line supervisor to an Operations Manager or Director of Administrative Services within the next five years. He plans to earn a PMP certification and
    pursue Lean Six Sigma Black Belt training to strengthen his strategic planning credentials. He is motivated to lead a larger, cross‑functional team, implement organization‑wide efficiency programs,
    and champion employee well‑being initiatives that address workplace stress—drawing from his own experiences with anxiety. Ultimately, he envisions either a senior leadership role in a government agency
    or a consulting venture that helps other offices redesign their administrative processes for greater predictability and resilience.
