  hobbies: '[''Sudoku and Crossword Puzzles'', ''Chess'', ''Model Kit Building'', ''Non-fiction Reading (Technology, Business, Psychology)'', ''Jogging'', ''Yoga'', ''Woodworking'', ''Cooking for Family'',
