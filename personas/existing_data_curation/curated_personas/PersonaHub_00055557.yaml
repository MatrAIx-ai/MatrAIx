persona_description: A law enforcement officer who is passionate about leveraging data-driven policing through geographic information systems (GIS) to improve community safety and effectiveness. This officer
  is dedicated to creating a comprehensive situational awareness through the integration of various types of data and sensors, including crime hazards, gang territories, critical infrastructure, imagery,
  and dynamic event data. They are skilled at analyzing data and utilizing spatially stored and maintained information to make better decisions and share information with other involved agencies. This officer
  is also skilled at providing accurate information from the field to command staff through a map-based common operating picture.
