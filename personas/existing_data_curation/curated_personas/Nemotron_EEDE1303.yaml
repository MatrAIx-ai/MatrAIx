personas:
  professional: Martin Wright, a retired community organizer and storyteller, they leverage decades of hands‑on experience in carpentry, urban gardening, and event coordination to mentor youth and curate
    oral histories, channeling their curious, easy‑going nature into legacy projects like a community mural and a memoir.
  sports: Martin Wright, a devoted fan of the Los Angeles Lakers, Los Angeles Dodgers, and LA Galaxy, they stay active by joining senior‑center dancing classes, taking weekly neighborhood park strolls,
    and tending to community garden plots, treating fitness as a social ritual rather than a rigorous regimen.
  arts: Martin Wright, an avid patron of galleries showcasing diverse voices and a regular at Leimert Park open‑mic poetry nights, they find inspiration in the melodies of Miles Coltrane, the lyrical depth
    of Langston Hughes, and the visual boldness of contemporary artist Kara Walker, often bringing their harmonica to accompany impromptu jams.
  travel: Martin Wright, who loves exploring Los Angeles on foot and taking short road trips, they have trekked Joshua Tree National Park, visited the coastal town of Santa Barbara, and hope to tour historic
    civil‑rights sites such as the Tuskegee Airmen National Historic Site and San Francisco’s landmark heritage districts, balancing a modest travel budget with a preference for spontaneous, culturally
    rich experiences.
  culinary: Martin Wright, a soulful cook who learned classic recipes from their mother, they specialize in dishes like collard greens, fried chicken, cornbread, and sweet‑potato pie, often using fresh
    herbs from their balcony garden and sharing meals at community potlucks where the aroma of slow‑cooked gumbo fills the air.
  core: Martin Wright, a curious, sociable septuagenarian who blends storytelling, gardening, and harmonica jam sessions into a lively community presence, they keep a messy calendar, a well‑stocked pantry,
    and a heart full of vintage jazz.
background:
  cultural: Martin is a second‑generation African‑American whose grandparents migrated from the Deep South to Los Angeles during the Great Migration, settling in the historic West Adams district. His family
    later integrated Caribbean influences through a great‑uncle who arrived from Jamaica, reflected in the name 'Karimi' that traces to African heritage. Growing up, Martin was immersed in the vibrant Black
    cultural scene of South Los Angeles, attending church services, celebrating Juneteenth and Kwanzaa, and engaging with the local jazz and poetry movements. He maintains strong ties to the African‑American
    community in Leimert Park, while also appreciating the multicultural tapestry of Los Angeles that blends Latino, African, and Asian neighborhoods. His cultural identity is expressed through storytelling,
    soul‑food cooking, and participation in community arts initiatives that celebrate Black history and contemporary creativity.
attributes:
  skills: '["Storytelling and oral history preservation", "Community event organization and coordination", "Conflict mediation and interpersonal communication", "Basic carpentry and home maintenance", "Urban
