  hobbies: '["Visiting art galleries and museums", "Attending poetry and open‑mic nights", "Listening to and playing jazz and soul music (harmonica)", "Urban gardening and community garden volunteering",
    "Cooking traditional soul food", "Participating in senior center social events", "Walking tours of Los Angeles neighborhoods", "Road trips to cultural and natural sites"]'
  career_goals: Although Martin is retired, he remains driven by personal ambitions that focus on legacy and community enrichment. He aims to compile a memoir and a collection of recorded oral histories
    documenting the evolution of Los Angeles’s Black neighborhoods, intending to donate the material to the local library and a university archive. He also hopes to become a volunteer docent at the Leimert
    Park Museum of African American Art, sharing his insights on the artworks and their cultural contexts. Additionally, he aspires to spearhead a community mural project that celebrates the city’s multicultural
    heritage, collaborating with young artists and local businesses. Martin also wishes to travel to historic sites along the West Coast—such as the Tuskegee Airmen National Historic Site and the civil‑rights
    landmarks in San Francisco—to deepen his personal connection to African‑American history.
