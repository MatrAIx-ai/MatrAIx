  career_goals: Stephanie aspires to complete her communications degree and launch a career as a community outreach specialist or program coordinator for a youth‑development nonprofit in Ohio. She wants
    to leverage her sociable nature and practical creativity to design and run programs that empower local teens, especially those from underrepresented backgrounds. In the long term she hopes to establish
    her own community‑center hub that blends cultural events, mentorship, and skill‑building workshops, creating safe spaces for connection and growth.
