personas:
  professional: Stephanie Doggett, an aspiring community‑outreach specialist, channels her natural knack for connecting people, spontaneous event‑planning flair, and adept use of social media into designing
    pop‑up youth programs that blend hip‑hop dance workshops and mentorship sessions, even if the lack of a rigid schedule sometimes threatens deadlines.
  sports: Stephanie Doggett fuels their love for movement by playing pickup basketball at the local park, cheering on the Cleveland Cavaliers and the Ohio State Buckeyes during basketball season, and joining
    a community‑run hip‑hop fitness class that blends dance cardio with R&B beats.
  arts: Stephanie Doggett immerses themselves in the arts by taking hip‑hop and R&B dance classes, attending open‑mic nights featuring performers like J. Cole, H.E.R., and Anderson .Paak, curating community
    art projects at the Mansfield center, and devouring contemporary works by authors such as Ta‑Nehisi Coates and Brit Bennett.
  travel: Stephanie Doggett prefers spontaneous weekend road trips that mix nature and culture, such as exploring Hocking Hills State Park, grabbing deep‑dish pizza in Chicago, and catching a live blues
    show in Nashville, while budgeting carefully to keep travel affordable alongside their part‑time gigs.
  culinary: Stephanie Doggett expresses creativity in the kitchen by reimagining classic soul‑food dishes—like fried chicken with harissa‑spiced rub, collard greens sautéed with smoked paprika, and mac and cheese
    topped with crispy plantain chips—while documenting each plate on Instagram with vibrant Canva graphics.
  core: Stephanie Doggett is a 20‑year‑old social catalyst who spontaneously curates pop‑up dance‑and‑dinner events, lives for the buzz of festivals, yet habitually forgets to file taxes on time, blaming
    their chaotic schedule.
background:
  cultural: Stephanie is rooted in a Black Midwestern heritage that blends the rich traditions of African‑American culture with the close‑knit community life of small‑town Ohio. Growing up in a family that
    values church gatherings, storytelling, and soulful music, she carries a deep appreciation for gospel, R&B, and the legacy of civil‑rights activism in her region. Family celebrations often feature multi‑generational
    cooking, with recipes passed down from grandparents, reinforcing a sense of resilience, hospitality, and collective responsibility. Living in Mansfield, she navigates a diverse cultural landscape where
    she actively participates in neighborhood block parties, local church events, and community service, weaving her cultural identity into everyday interactions and future aspirations.
