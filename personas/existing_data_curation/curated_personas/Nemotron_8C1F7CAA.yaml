  career_goals: Cherrie aims to formalize her on‑the‑job knowledge with certifications such as a Certified Forklift Operator and a basic Supply Chain Management credential. Her next step is to move into
    a supervisory role—such as shift lead or floor manager—where she can leverage her practical expertise and competitive drive to improve team efficiency and safety. Long‑term, she hopes to earn her GED
    and perhaps take community‑college courses in logistics or business, positioning herself for a future as a logistics coordinator or small‑scale moving‑service entrepreneur. Financial stability and the
    ability to own a modest home in Denver’s outskirts also rank among her personal ambitions.
