  hobbies: '[''Hiking'', ''Camping'', ''DIY home repair'', ''Urban gardening'', ''Car maintenance'', ''Reading technology blogs'', ''Cooking'', ''Coffee shop meet‑ups with friends'', ''Volunteering for
