personas:
  professional: An ambitious fiber‑optic telecommunications technician, Jeanne Manuel leverages their knack for precise splicing, rigorous safety compliance, and upbeat customer rapport to lead field crews,
    while they eye BICSI certification and a future supervisory role that will blend modern IoT infrastructure with community broadband outreach.
  sports: Jeanne Manuel energizes weekends by hiking the trails of Fall Creek Falls State Park with the local trail club, cheering the Tennessee Titans on Sundays, supporting the Nashville Predators at
    the Bridgestone Arena, and they join a casual co‑ed softball league that blends fitness with social camaraderie.
  arts: Jeanne Manuel channels creative curiosity through community theater productions with the Goodlettsville Players, pottery sessions at the Nashville Art League, and frequent evenings at the Bluebird
    Cafe listening to Dolly Parton’s storytelling, all of which they infuse into their life with a blend of Southern musical heritage and contemporary artistic flair.
  travel: Jeanne Manuel dreams of road‑tripping the Blue Ridge Parkway in the fall, exploring the historic streets of New Orleans for jazz and gumbo, and they eventually hope to hike Iceland’s volcanic
    landscapes, all while balancing a modest vacation budget and a flexible work schedule that favors spontaneous getaways over rigid itineraries.
  culinary: Jeanne Manuel delights friends with Southern comfort dishes like smoky barbecue ribs, buttery biscuits, and pimento cheese, seasoned with a splash of bourbon and a dash of hot honey, while they
    use their intermediate cooking skills to experiment with fusion twists during impromptu potluck gatherings.
  core: Jeanne Manuel is a sociable, curious telecom technician who balances hands‑on work, spontaneous creativity, and community‑focused generosity, even though they occasionally struggle with disorganization
    and impulsive spending that keep life delightfully unpredictable.
background:
  cultural: Jeanne grew up in a white, middle‑class family in Goodlettsville, Tennessee, where Southern hospitality, community ties, and a strong work ethic are core values. Her upbringing included regular
    church involvement (Methodist/Episcopal), participation in local festivals, and an appreciation for country, bluegrass, and Nashville’s broader music scene. She embraces Southern traditions such as
    barbecues, family gatherings, and volunteer service, while also being open to eclectic artistic influences from nearby urban cultural hubs.
attributes:
  skills: '[''Telecommunications line installation'', ''Fiber‑optic splicing'', ''Cable testing and troubleshooting'', ''Safety compliance (OSHA)'', ''Blueprint and schematic interpretation'', ''Use of
    hand and power tools'', ''Basic electrical diagnostics'', ''Customer service and communication'', ''Team coordination'', ''Basic networking concepts'', ''DIY electronics repair'']'
  hobbies: '[''Hiking'', ''Live music concerts'', ''Community theater'', ''Pottery classes'', ''DIY home improvement'', ''Amateur (ham) radio'', ''Cooking Southern cuisine'', ''Volunteering at animal shelter'',
    ''Road trips'', ''Social dancing'']'
  career_goals: Jeanne aims to advance to a lead installer or supervisory role within her company, gaining BICSI certification and completing her associate’s degree in Electrical Engineering Technology.
    She dreams of eventually starting her own small contracting business focused on modern fiber‑optic and IoT infrastructure projects, while staying open to learning emerging 5G technologies. Balancing
    career growth with personal flexibility, she also hopes to mentor newer technicians and contribute to community broadband initiatives.
