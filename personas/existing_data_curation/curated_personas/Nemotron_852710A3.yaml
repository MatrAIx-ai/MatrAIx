  career_goals: Stephanie aims to advance her nursing career by completing a Bachelor of Science in Nursing (BSN) within the next two years, followed by a Family Nurse Practitioner (FNP) certification.
    She hopes to specialize in community health, developing outreach programs that address preventive care and mental‑health support for rural populations around Champaign County. Long‑term, she envisions
    taking on a leadership role as a unit manager or director of community health services, where she can blend her practical expertise with her curiosity for innovative care models, while also advocating
    for workplace wellness initiatives that mitigate stress for healthcare staff.
