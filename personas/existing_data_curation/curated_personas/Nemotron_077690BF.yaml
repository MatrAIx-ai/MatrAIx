  hobbies: '[''car shows'', ''community theater'', ''volunteering'', ''volleyball'', ''hiking'', ''DIY home improvement'', ''car customization'', ''photography'', ''cooking'', ''social media blogging'']'
  career_goals: Chloe aims to achieve ASE Master Technician certification and I‑CAR advanced training within the next five years, positioning herself as a lead technician in her shop. She dreams of opening
    her own boutique body shop in Jonesboro that specializes in eco‑friendly paints and custom restorations, while fostering a supportive apprenticeship program for local youth. Additionally, she hopes
    to become a recognized contributor at regional car shows and to share her expertise through community workshops and online tutorials.
