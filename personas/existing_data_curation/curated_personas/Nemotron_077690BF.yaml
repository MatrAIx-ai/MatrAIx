personas:
  professional: Chloe Beaty, a 21‑year‑old automotive body technician in Jonesboro, blends meticulous panel work with a flair for showroom presentation, using MIG/TIG welding, collision estimating software,
    and a friendly, step‑by‑step mentorship style to guide apprentices while planning a future boutique shop that prioritizes eco‑friendly paints.
  sports: Chloe Beaty hits the sand courts for weekly volleyball matches with the Jonesboro Jammers, follows the Arkansas Razorbacks football and the St. Louis Cardinals baseball teams, and they incorporate
    trail hikes along the Arkansas River Trail as low‑impact cardio while occasionally skipping workouts after a late‑night car show.
  arts: Chloe Beaty lights up the community theater stage in leading singing roles, draws inspiration from Lin‑Manuel Miranda’s storytelling, Beyoncé’s stage presence, and Audra McDonald’s classic performances,
    and they often rehearse monologues while polishing a car hood for extra practice.
  travel: Chloe Beaty prefers road‑trip adventures that combine car‑show stops in Austin and Nashville with culinary detours to Savannah’s shrimp‑and‑grits eateries, plans routes on a detailed spreadsheet,
    and they dream of a cross‑country drive to the Pacific Northwest but budget constraints keep the trip on hold.
  culinary: Chloe Beaty experiments with Southern‑inspired dishes like smoked brisket, hush puppies, and shrimp and grits, seasoning with smoked paprika, buttermilk, and sweet tea glaze, and they share
    recipe videos on their blog while admitting a habit of over‑salting when excited.
  core: Chloe Beaty, a 21‑year‑old auto‑tech with a theatrical flair, balances precision welding, a bustling social life, and a budding boutique shop dream, all while juggling a spreadsheet‑driven budget
    and a penchant for over‑seasoned cooking.
background:
  cultural: Chloe grew up in Jonesboro, Arkansas, within a white Southern American family that values community, hospitality, and hard work. Her upbringing was shaped by the close‑knit culture of Craighead
    County, where church gatherings, high‑school sports events, and local festivals play a central role. She embraces Southern traditions such as country and bluegrass music, family‑style meals, and a strong
    sense of neighborly support. This background, combined with a regional passion for automotive work—often passed down through family members who repaired cars as a practical skill—has instilled in her
    a blend of practicality, curiosity, and a desire to contribute positively to her community.
attributes:
  skills: '[''panel replacement'', ''dent removal'', ''MIG welding'', ''TIG welding'', ''automotive painting'', ''color matching'', ''collision estimating software'', ''safety compliance'', ''customer service'',
