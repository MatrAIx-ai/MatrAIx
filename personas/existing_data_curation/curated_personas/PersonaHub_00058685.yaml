persona_description: A highly organized and effective classroom manager who prioritizes clear communication of expectations and uses instructional time efficiently. They are well-versed in classroom management
  principles and have a deep understanding of the importance of organization in a classroom environment. They are skilled at ensuring that everything is in its place, from the school chairs to the computers,
  the blackboard to the classroom door. They are also knowledgeable about the potential problems teachers may face in their first years of teaching, such as organization, classroom management, and student
  discipline, and are able to address these issues proactively.
