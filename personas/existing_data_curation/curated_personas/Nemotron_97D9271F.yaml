personas:
  professional: Shanalee Braddy, a full‑stack software developer with deep expertise in Python, JavaScript, and TypeScript, leverages methodical test‑driven development and Agile Scrum to build scalable
    cloud‑native web applications while mentoring junior engineers and championing inclusive tech leadership.
  sports: Shanalee Braddy, an avid hiker of the Osage Hills, regularly joins the Tulsa Trail Runners Club for weekend runs, follows the Oklahoma City Thunder and FC Tulsa, and incorporates yoga into their
    fitness regimen to maintain flexibility and balance.
  arts: Shanalee Braddy, a voracious reader of science‑fiction author N.K. Jemisin, historical nonfiction by Doris Kearns Goodwin, and social‑justice essays by Ta‑Nehisi Coates, also attends performances
    at the Tulsa Performing Arts Center and draws inspiration from street photographers like Henri Cartier‑Bresson for their own weekend photography.
  travel: Shanalee Braddy, who prefers meticulously planned trips blending adventure and relaxation, has explored Sedona’s red rock trails, sampled the culinary scene in New Orleans, and dreams of a study‑focused
    visit to Lisbon’s tech incubators while balancing family commitments.
  culinary: Shanalee Braddy, a home chef who experiments with soul‑food and Creole dishes such as shrimp étouffée, collard greens, and sweet potato pie, sources fresh produce from their vegetable plot and
    frequently hosts potluck evenings for a close circle of friends.
  core: Shanalee Braddy balances a methodical, organized tech career with quiet hobbies, a love for gardening and cooking, occasional forgetfulness about dental appointments, and a habit of double‑checking
    code before coffee runs.
background:
  cultural: Shanalee is a Black American whose roots trace back to the Southern diaspora. Raised in Tulsa, Oklahoma, she grew up in a multigenerational family that values community, church, and storytelling.
    The legacy of the 1921 Tulsa Race Massacre and the resilience of the city's Black community have shaped her sense of identity and social awareness. She celebrates African-American traditions through
    music, food, and participation in local cultural events such as Juneteenth celebrations and the Tulsa Black Arts Festival. Her heritage informs both her professional drive to increase representation
    in tech and her personal commitment to community service.
