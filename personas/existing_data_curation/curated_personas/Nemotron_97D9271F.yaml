  career_goals: Shanalee aims to transition into a senior leadership role where she can shape technical strategy and influence product direction. Over the next five years she plans to become a lead software
    architect, guiding cross-functional teams in designing robust, cloud-native systems. She is passionate about increasing representation of Black women in technology, so she intends to launch a mentorship
    program with local universities and contribute to open-source projects that focus on accessibility. Additionally, she seeks opportunities to speak at small tech meetups, sharing practical insights while
    maintaining her preference for intimate settings.
