personas:
  professional: David Stephens is a budding game designer and electronics hobbyist who channels strategic thinking from Minecraft and Civilization into complex LEGO Technic builds and prototype circuits,
    balancing curiosity with practicality while they reliably meet school project deadlines.
  sports: David Stephens is a regular participant in the San Antonio Youth Basketball Club, cheering for the Spurs while also joining their family on weekend hikes through the Texas Hill Country, balancing
    a competitive drive on the court with a methodical love for trail mapping and nature photography.
  arts: David Stephens devotes evenings to reading sci‑fi classics such as Isaac Asimov’s Foundation and graphic novels like Neil Gaiman’s The Sandman, while also immersing themselves in live cultural performances
    at San Antonio’s Fiesta, admiring mural art and listening to the synth‑driven soundtracks of their favorite video games.
  travel: David Stephens prefers road‑trip adventures that blend family‑friendly hikes in the Texas Hill Country with occasional weekend getaways to Austin’s music scene and annual visits to the Grand Canyon,
    while they meticulously plan routes on Google Maps but still leave room for spontaneous detours to local food trucks and historic sites.
  culinary: David Stephens enjoys experimenting in the kitchen, mastering Tex‑Mex staples like carne asada tacos, queso fundido with chorizo, and homemade chili con carne, mixing cumin, smoked chipotle,
    and fresh cilantro, while their modest cooking skill is often punctuated by the occasional burnt edges on nachos.
  core: David Stephens is a curious, organized teen who balances strategic gaming, LEGO engineering, basketball, and Tex‑Mex cooking while they navigate school, family hikes, and a modest allowance with
    a blend of pragmatism and occasional impulsivity.
background:
  cultural: David was born and raised in San Antonio, Texas, in a middle‑class family with deep local roots. While his heritage is primarily white American, growing up in a culturally rich city has exposed
    him to a blend of Texan traditions—high school football, backyard BBQs, and community gatherings—and the vibrant Hispanic influences that shape San Antonio's food, music, and festivals. He celebrates
    American holidays such as Independence Day with fireworks and family picnics, participates in local events like Fiesta, and has a basic familiarity with Spanish phrases from school and community interactions.
    The city's emphasis on community service and civic pride informs his outlook on contributing positively to his surroundings.
