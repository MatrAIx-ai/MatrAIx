  career_goals: David aims to attend a STEM‑focused high school and eventually pursue a degree in mechanical engineering or computer science, with a long‑term vision of designing sustainable infrastructure
    or community‑focused robotics. In the near term, he plans to develop a competitive robotics project for the upcoming regional competition, secure a summer coding internship, and maintain a high GPA
    to qualify for advanced placement courses. He also hopes to mentor younger students in his school's robotics club, combining his curiosity with a practical desire to give back to his community.
