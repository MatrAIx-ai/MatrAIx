  career_goals: Pedro dreams of a future where he can combine his love for helping others with his practical mindset. He often talks about becoming a civil engineer who designs safe, fun playgrounds for
    kids like himself. He also imagines playing soccer on a professional team, enjoying the camaraderie and clear structure of training schedules. Occasionally he mentions wanting to be a firefighter, attracted
    by the idea of protecting his community and having a steady, predictable routine.
