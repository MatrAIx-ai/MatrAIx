personas:
  professional: Pedro Rivera is an aspiring junior architect whose imagination runs wild building intricate LEGO models that fuse orderly geometry with lively cultural motifs, reflecting their preference
    for structure while they still thrive in unplanned creativity.
  sports: Pedro Rivera is a passionate member of the local youth soccer club, idolizing the fast-paced play of professional team Club América while practicing dribbling in the school yard, often sneaking
    extra time on the field after practice despite their relaxed attitude toward scheduled chores, and they relish the buzz of scoring a goal with friends.
  arts: Pedro Rivera channels artistic energy into drawing cartoon characters from shows like Adventure Time and sketching original heroes, while also composing whimsical LEGO blueprints inspired by modern
    architecture and humming the iconic Super Mario theme, a blend that highlights their sociable, outgoing nature, and they love sharing their creations online.
  travel: Pedro Rivera loves family road trips to the Grand Canyon and beachside boardwalks in Santa Monica, while daydreaming about a future adventure to Disneyland Paris for the chance to meet beloved
    cartoon characters in person, and they often pack a small sketchbook to capture scenes along the way.
  culinary: Pedro Rivera delights in helping prepare tacos and quesadillas, mastering the art of seasoning ground beef with cumin, chili powder, and fresh cilantro, and also enjoys assembling a simple spaghetti
    with marinara sauce topped with grated Parmesan, showcasing a budding palate that fuses traditional home flavors with kid-friendly favorites, and they never miss adding a splash of lime for extra zing.
  core: Pedro Rivera blends a love for structured LEGO design with a lively, sometimes anxious soccer spirit, often juggling impromptu snack cravings and lingering worry over missed goals, a quirky mix
    of order and joyful chaos, and they always end the day with a quick doodle of the day's highlights.
background:
  cultural: Pedro is a Mexican‑American growing up in Ontario, California, within a close‑knit bilingual household. Spanish is spoken at home, and he celebrates traditional Mexican holidays such as Día
    de los Muertos and Cinco de Mayo with family gatherings, altar building, and special foods. His family maintains strong ties to relatives in Mexico, often sharing stories and recipes that keep his cultural
    heritage alive. Catholic traditions are part of his upbringing, with occasional church visits and respect for religious celebrations. The vibrant Mexican community in San Bernardino County provides
    him with opportunities to attend cultural festivals, learn folkloric dance, and hear mariachi music, all of which shape his identity and daily life.
