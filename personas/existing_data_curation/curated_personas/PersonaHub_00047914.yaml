persona_description: A researcher and engineer working for General Fusion, a private company developing fusion energy. The speaker, Dr. Michel Laberge, is a scientist who specializes in the field of magnetized
  target fusion, a technique used to compress a plasma in a flux conserving vessel. He is currently conducting tokamak compression experiments at General Fusion's facility in Kingston, Ontario, using a
  3m sphere filled with molten lead-lithium to create a cavity and inject a pulse of magnetically confined plasma fuel into it. The experiments are designed to demonstrate the compression process and capture
  the fusion neutrons from the reaction to generate electricity via a steam turbine. The results of these experiments are expected to be presented at the Canadian Association of Physicists Congress.
