personas:
  professional: Mercedes Velez, a 16‑year‑old aspiring concept artist, translates a vivid visual imagination into freelance illustrations for indie video games and graphic novels, wielding Procreate, Photoshop,
    and self‑taught Python generative scripts while thriving in a loosely organized, flexible workflow that balances spontaneous brainstorming with occasional deadline pressure.
  sports: Mercedes Velez finds solace in hiking the Box Springs Mountains with the Riverside Trail Club, occasionally joins weekend pick‑up soccer games with friends, and decompresses by watching the Los
    Angeles Lakers, Los Angeles Dodgers, and LA Galaxy on lazy evenings, though they rarely commit to structured team sports.
  arts: Mercedes Velez immerses themselves in speculative fiction and curates playlists featuring ambient electronica by Brian Eno, lo‑fi beats from Nujabes, and traditional folk songs from their family’s
    heritage, while drawing artistic inspiration from surrealists like Salvador Dali, contemporary illustrators such as Alex Ross, and the vibrant community of DeviantArt and Instagram peers.
  travel: Mercedes Velez prefers low‑key road trips to natural wonders like Sedona’s red rocks and the Grand Canyon, dreams of a future backpacking adventure through the misty fjords of Iceland and the
    neon streets of Tokyo, and plans trips around school breaks, balancing a modest travel budget with a yearning for cultural immersion.
  culinary: Mercedes Velez often volunteers in the kitchen to prepare family‑rooted dishes like tamales and mole rojo, experimenting with chilies, cacao, and spices, while also mastering quick teen staples
    such as avocado toast topped with lime‑zest feta, and they relish pairing meals with a side of lo‑fi study playlists.
  core: Mercedes Velez is a hyper‑imaginative teen who juggles freelance art gigs, impulsive spending on supplies, occasional allergy flare‑ups, a love for mountain hikes and ambient beats, and a habit
    of scattering sketchbooks across their room while dreaming of a global indie‑art studio.
background:
  cultural: Mercedes is a second‑generation Mexican‑American raised in Moreno Valley, California. At home, Spanish is spoken alongside English, and her family observes cultural traditions such as Día de
    los Muertos, quinceañeras, and weekend gatherings centered on Mexican cuisine. The vibrant Latino community of Riverside County, with its murals, festivals, and intergenerational storytelling, has shaped
    her aesthetic sensibility. She draws inspiration from Mexican artists like Frida Kahlo and José Guadalupe Posada, integrating bright colors, symbolic imagery, and folklore narratives into her own work.
    While navigating the challenges of a limited formal education, Mercedes finds resilience and pride in her bicultural identity, using it as a foundation for both her artistic expression and personal
    growth.
attributes:
  skills: '[''Freehand sketching'', ''Digital illustration (Procreate, Photoshop)'', ''Basic photo editing (Lightroom)'', ''Introductory Python coding for creative projects'', ''Creative writing (short
    stories, poetry)'', ''Conceptual brainstorming and visual storyboarding'', ''Informal Spanish‑English translation'']'
  hobbies: '[''Reading speculative fiction and magical realism'', ''Freehand sketching and mixed‑media collage'', ''Digital painting and illustration'', ''Listening to ambient and Mexican folk music'',
    ''Stargazing'', ''Hiking local trails'', ''Cooking Mexican recipes (tamales, mole)'', ''Participating in online art communities'']'
  career_goals: Mercedes dreams of turning her imagination into a professional career as a freelance concept artist and illustrator, creating visuals for independent video games, graphic novels, and online
    comics. She hopes to earn a scholarship to a visual arts program (such as an BFA in Illustration) while maintaining the flexibility to work from home and set her own schedule. Long‑term, she envisions
    establishing a small independent studio that blends contemporary design with Mexican cultural motifs, producing a personal line of limited‑edition art prints and collaborating with cultural festivals
    to showcase her work. Her ambition is driven by a desire for creative freedom, personal expression, and the ability to share her unique blend of modern fantasy and heritage with a global audience.
