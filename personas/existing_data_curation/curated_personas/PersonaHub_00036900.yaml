persona_description: A historian who specializes in the study of the Late Intermediate Period in the Andean region, particularly focusing on the Huanangue Valley and its interactions with the coastal Chancay
  and highland Atavillos. The person is interested in understanding the complex dynamics of social and economic interactions between different cultural groups in the region, and how these interactions shaped
  the regional geo-politics. They are also interested in the role of agriculture in these interactions and how it influenced the social and economic dynamics of the region.
