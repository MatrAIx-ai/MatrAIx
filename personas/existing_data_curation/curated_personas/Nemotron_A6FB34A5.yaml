personas:
  professional: Donna Gonzalez, a curious two‑year‑old with a knack for sorting blocks and narrating bedtime stories, already shows the organizational flair and sociable energy that suggest a future as
    an early‑childhood educator or community program coordinator.
  sports: Donna Gonzalez joins the Campbellsville Tot Tots Soccer class where she chases a soft orange ball, delights in springtime baseball games, and enthusiastically cheers for the Kentucky Wildcats
    basketball team and the Louisville Cardinals football team during family viewing nights, embodying a playful yet communal approach to fitness.
  arts: Donna Gonzalez revels in the lively fiddles of Ricky Skaggs, the bluegrass harmonies of The Del McCoury Band, and the whimsical illustrations of Dr. Seuss, often humming along while creating finger‑paint
    splashes and staging imaginative performances with her plush animal cast.
  travel: Donna Gonzalez loves car rides with window stickers, has explored the interactive exhibits at the Children’s Museum of Indianapolis and splashed in the water park at Lake Cumberland, and dreams
    of a sunny family vacation to the Grand Canyon, balancing curiosity with the comfort of familiar routines.
  culinary: Donna Gonzalez adores buttery biscuits with savory sausage gravy, crunchy chicken nuggets, sweet apple butter on toast, and the bright flavors of strawberry jam sandwiched between peanut butter,
    often helping stir pancake batter with her tiny wooden spoon while occasionally refusing broccoli.
  core: Donna Gonzalez blends boundless toddler curiosity, a love for community storytelling, and a mischievous penchant for stashing coins, creating a lively little explorer who balances organized play
    with sweet‑tooth shortcuts.
background:
  cultural: Donna is raised in a white, Southern‑American family in Campbellsville, Kentucky. Her upbringing reflects the values of small‑town community life, including regular church attendance, participation
    in local festivals such as the Kentucky Derby celebrations, and strong family bonds. The local culture emphasizes hospitality, storytelling, and an appreciation for folk music and crafts, which subtly
    influence her early interests in art and group activities.
