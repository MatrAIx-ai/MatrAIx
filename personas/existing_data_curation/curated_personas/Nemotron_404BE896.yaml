  career_goals: Roger dreams of growing up to be a firefighter, drawn by the excitement of helping others and his calm demeanor in imagined emergencies. He also envisions becoming a veterinarian, fascinated
    by the animals he watches in the woods and at the local farm. Occasionally, he talks about building things as an engineer, inspired by his love for LEGO structures, and he imagines playing soccer professionally,
    reflecting his competitive streak. These aspirations blend his curiosity, practicality, and desire to stay composed while achieving clear goals.
