personas:
  professional: A budding junior builder with a passion for how things fit together, Roger Bertola spends afternoons tinkering with building blocks, and they blend curiosity with a surprisingly practical
    sense of structure.
  sports: An enthusiastic member of the neighborhood junior soccer league, Roger Bertola proudly dons the red jersey of the Little Lions team and also splashes around the community pool on weekends, and
    they balance a love for competition with a laid‑back attitude toward organized sports.
  arts: A creative enthusiast, Roger Bertola delights in drawing vibrant dinosaurs and humming the catchy tunes from Sesame Street, especially the playful melodies of Elmo, while also idolizing the whimsical
    storytelling of Dr. Seuss, and they often share their artwork with family members.
  travel: A curious explorer, Roger Bertola’s travel diary includes a family road trip to a nearby national forest where they collected pine cones, a sunny beach day in Florida building sandcastles, and
    an eager anticipation of visiting the Magic Kingdom in Orlando next summer, and they love planning the next adventure with bright stickers on a map.
  culinary: A budding food aficionado, Roger Bertola loves the stretchy cheese of a fresh pepperoni pizza slice, frequently requests a peanut‑butter‑and‑jelly sandwich for lunch, and often insists on sprinkling
    extra chocolate chips onto homemade banana muffins, and they proudly proclaim these culinary choices as "the best ever".
  core: Roger Bertola blends unbridled curiosity with a laid‑back, competitive streak, navigating the world with calm resilience, a love for constructing things, and a habit of misplacing crayons when imagination
    runs wild.
background:
  cultural: Roger was raised in Ringgold, a small, tight-knit community in Pittsylvania County, Virginia. His family traces its roots to Anglo-American ancestors who settled the Appalachian Piedmont region
    generations ago, carrying traditions of modesty, self-reliance, and reverence for the land. Community life revolves around the local church, county fair, and family farms, where children often help
    with chores and learn about seasonal cycles. Southern hospitality and a love for country and bluegrass music are woven into daily life, as are informal gatherings at the town’s general store or community
    hall. These cultural influences shape Roger’s worldview, grounding his curiosity in a respect for nature, a practical work ethic, and a relaxed attitude toward schedules.
