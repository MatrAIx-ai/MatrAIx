  hobbies: '[''Cooking traditional Vietnamese cuisine'', ''Herb gardening'', ''Puzzle solving (sudoku, crosswords)'', ''Yoga and brisk walking'', ''Volunteer medication counseling at community health fairs'',
    ''Book club member (personal development, contemporary fiction)'', ''Journaling'', ''DIY home organization projects'']'
  career_goals: Trinh aims to advance to a lead pharmacy technician role within the next two years, securing the Certified Pharmacy Technician (CPhT) credential and completing an immunization certification
    to broaden patient services. Her long‑term ambition is to transition into pharmacy management, overseeing operations of a community pharmacy that serves Ventura County’s growing Southeast Asian population.
    She plans to enroll in a part‑time associate’s program in pharmacy technology to deepen her clinical knowledge and eventually pursue a bachelor’s degree in health sciences. Additionally, Trinh wishes
    to launch a culturally tailored medication‑education outreach program that provides workshops and bilingual resources for recent immigrants, while continuing to mentor junior technicians and champion
    safety‑first initiatives.
