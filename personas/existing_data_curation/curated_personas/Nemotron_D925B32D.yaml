personas:
  professional: An aspiring junior robotics enthusiast, Maria Cardenas channels curiosity and methodical planning into constructing intricate LEGO models, troubleshooting her school robotics club's projects,
    and crafting interactive stories in Scratch, all while maintaining a competitive drive that pushes them to constantly improve their creations.
  sports: Maria Cardenas loves playing competitive soccer with the Ridgewood Rockets youth team, practices drills after school, follows the national women's team and the City Strikers professional club,
    and occasionally skates at the community rink during winter.
  arts: Maria Cardenas expresses creativity through comic‑style illustrations inspired by artists Jim Lee and Brian Stelfreeze, choreographs traditional folk dances set to rhythmic drum patterns, and enjoys
    listening to Imagine Dragons while sketching characters for their Scratch stories.
  travel: Maria Cardenas spends vacations exploring places such as Rocky Mountain National Park, the interactive exhibits at Chicago’s Museum of Science and Industry, historic forts in San Antonio, and
    dreams of visiting the Kennedy Space Center to see rockets up close.
  culinary: Maria Cardenas prefers simple yet flavorful meals like pepperoni pizza, chicken nuggets with honey mustard, and fresh fruit salads sprinkled with cinnamon, can confidently make a grilled‑cheese
    sandwich using a pan, and delights in discovering new snack foods during school field trips.
  core: Maria Cardenas is a curious, methodical nine‑year‑old whose competitive streak fuels a love for robotics, soccer, and comic art, balanced by meticulous planning and occasional impulsive splurges
    on LEGO sets.
background:
  cultural: Maria was born and raised in Kenilworth, New Jersey, in a Mexican‑American household. Both of her parents immigrated from central Mexico, and Spanish is spoken alongside English at home. The
    family celebrates Mexican traditions such as Día de los Muertos, Mexican Independence Day, and traditional folk dances, often gathering with extended relatives for meals featuring homemade tacos and
    tamales. Maria participates in local cultural festivals and attends a bilingual after‑school program that reinforces her heritage. These cultural practices shape her values of family cohesion, respect
    for elders, and pride in her bilingual abilities.
attributes:
  skills: '[''Reading comprehension (English & Spanish)'', ''Basic arithmetic (addition, subtraction, multiplication)'', ''Logical puzzle solving'', ''Organizational planning for school assignments'', ''Beginner
