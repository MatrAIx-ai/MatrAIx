  hobbies: '[''Reading adventure/mystery novels'', ''Building LEGO models'', ''Conducting home science experiments'', ''Playing soccer'', ''Practicing Mexican folk dance'', ''Drawing comic illustrations'',
    ''Creating Scratch projects'', ''Participating in school robotics club'']'
  career_goals: Maria dreams of a future career in STEM, ideally as an aerospace engineer or biomedical researcher, where she can combine her love of building, problem‑solving, and helping others. She is
    motivated to earn top grades, win science‑fair awards, and eventually attend a competitive STEM‑focused high school. Maria also hopes to use her bilingual fluency to serve her community as a medical
    professional, bridging language barriers and providing culturally aware care.
