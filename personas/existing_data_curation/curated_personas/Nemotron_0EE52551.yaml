personas:
  professional: Douglas Jones is a budding LEGO architect who, with their methodical planning and love for clear instructions, reliably completes intricate sets on schedule, and they quietly compete with
    classmates to build the most detailed models, channeling their preference for structure into every imagined miniature town.
  sports: Douglas Jones plays on the Maple Creek Youth Flag-Football team, follows the West Virginia Mountaineers football program each Saturday with family, and they treat weekend hikes in the New River
    Gorge as personal training sessions, blending competitive play with a love for the outdoors.
  arts: Douglas Jones immerses themselves in Appalachian bluegrass by listening to Bill Monroe and the Osborne Brothers, enjoys Disney classics such as Frozen and The Lion King, and they recreate favorite
    movie scenes using LEGO bricks while humming along to the melodies, shaping a creative outlet that mirrors their love for rhythm and structure.
  travel: Douglas Jones loves family road trips to the Great Smoky Mountains and Washington, D.C.'s National Zoo, enjoys short hikes along the New River Gorge, and they dream of future adventures at Disney
    World and the Grand Canyon, always preferring itineraries that balance familiar routines with a splash of new wonder.
  culinary: Douglas Jones favors comforting dishes like macaroni and cheese, chicken nuggets with honey mustard, and homemade apple pie, delights in flipping blueberry pancakes with a pinch of cinnamon,
    and they proudly add pine nuts to a simple salad while occasionally begging for extra peanut butter and jelly sandwiches at lunchtime.
  core: Douglas Jones is a meticulous, structure-loving LEGO builder who, despite their competitive streak, saves every penny for the next set, worries about small changes, competes quietly in flag football,
    and finds solace in bluegrass tunes and nature walks.
background:
  cultural: Douglas grew up in Athens, a small town in Mercer County, West Virginia, within a predominantly white Appalachian community. His family emphasizes self-reliance, close family ties, and regular
    church attendance. Local traditions such as bluegrass music, community fairs, and outdoor activities like hiking and fishing shape his worldview. The region's practical, community-focused culture reinforces
    his preference for structure, reliability, and modest competitiveness.
attributes:
  skills: '["Organizing personal items", "Following multi-step instructions", "LEGO building", "Basic arithmetic (addition/subtraction)", "Pattern recognition", "Memorizing short verses", "Simple puzzle
    solving"]'
  hobbies: '["LEGO building", "Jigsaw puzzles", "Memory matching games", "Reading picture books", "Nature walks", "Collecting pinecones", "Listening to folk music", "Small-group flag football"]'
  career_goals: Although only six, Douglas frequently talks about future jobs that provide clear structure and tangible outcomes. He dreams of becoming a civil engineer who designs bridges and roads for
    his community, a firefighter who works with precise protocols to protect others, or even a pilot who follows detailed checklists. These ambitions reflect his desire for predictable, organized work where
    he can see the results of his efforts.
