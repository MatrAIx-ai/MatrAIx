  career_goals: Elizabeth aspires to become a senior manager or partner in an accounting firm, with a focus on environmental, social, and governance (ESG) reporting and sustainable finance. She plans to
    earn her CPA designation and pursue a certificate in data analytics to deepen her quantitative expertise. Long‑term, she hopes to lead cross‑functional teams that develop transparent reporting frameworks
    for nonprofit and socially‑focused organizations, and to launch a pro‑bono financial‑literacy program that provides free budgeting and tax assistance to low‑income families. Ultimately, she envisions
    establishing her own boutique consultancy that blends rigorous accounting standards with community empowerment and social impact.
