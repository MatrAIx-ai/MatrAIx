personas:
  professional: Elizabeth Vigo, a senior accountant with a knack for weaving data visualization into ESG reporting, leverages her technical mastery of GAAP, IFRS, and advanced Excel while her curiosity
    and flexible, compassionate nature help her translate complex audits into accessible stories for nonprofit clients.
  sports: Elizabeth Vigo enjoys early‑morning jogs through West Hartford’s farms, participates in the local West Hartford Running Club’s seasonal 5K events, and follows the New England Patriots, Boston
    Celtics, and Boston Red Sox with a relaxed fan enthusiasm that mirrors her flexible approach to fitness.
  arts: Elizabeth Vigo frequents the Wadsworth Atheneum and the New Haven Museum of Art, paints watercolors inspired by Monet and Basquiat, and fills her evenings with Miles Davis jazz, Yo‑Yo Ma cello performances,
    and off‑Broadway productions, allowing her artistic curiosity to balance her analytical career.
  travel: Elizabeth Vigo prefers unstructured cultural trips, having wandered the historic streets of Florence, the cobblestones of Prague, and the New England coastal towns of Mystic and Newport, while
    dreaming of exploring Kyoto’s temples and Barcelona’s street markets, always planning loosely to leave room for spontaneous gallery visits.
  culinary: Elizabeth Vigo loves experimenting in the kitchen, skillfully crafting Thai green curry with fresh lemongrass and cilantro, Moroccan chickpea tagine with preserved lemons, and Mediterranean
    mezze plates featuring feta and olives, while also enjoying dining out on sushi rolls and Ethiopian injera, reflecting her global palate and moderate cooking confidence.
  core: Elizabeth Vigo blends numbers and nuance, navigating audit deadlines with artistic flair, worrying about every detail yet finding calm in watercolor strokes and garden rows.
background:
  cultural: Elizabeth comes from a multi‑generational New England family of Anglo‑Irish heritage. Raised in the Boston‑Hartford corridor, she was immersed in the region’s emphasis on education, civic responsibility,
    and a rich cultural scene that includes historic museums and performing arts venues. Family traditions such as Thanksgiving gatherings, holiday wreath‑making, and Sunday brunch reflect her suburban
    Connecticut upbringing. While her upbringing was modestly Episcopal, she identifies primarily with the broader values of community service, progressive social engagement, and the understated pragmatism
    characteristic of West Hartford.
