persona_description: Nicole Pyle, a literacy education professional with a background in social justice research and a passion for empowering marginalized youth through literacy. She is interested in exploring
  how literacy education can be used as a tool for activism and change, particularly in addressing historical inequities and promoting racial justice. Nicole is also interested in the intersection of literacy
  education and anti-racism, and how literacy educators can use their influence to create more equitable and just learning environments for all students.
