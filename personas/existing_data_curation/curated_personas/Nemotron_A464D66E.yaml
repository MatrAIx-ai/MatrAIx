    to Latin music'']'
  career_goals: Marta’s primary goal is to maintain a stable part‑time cashier role that offers a predictable schedule and modest benefits as she approaches retirement. She hopes to transition into a mentorship
    position where she can formally train new staff and share her practical retail knowledge. Additionally, she is interested in obtaining a community‑interpreter certification to assist Spanish‑speaking
    seniors at local services. Long‑term, Marta aims to secure enough savings for a comfortable retirement, possibly travel to visit family in El Salvador, and continue volunteering at the senior center
    in Temecula.
