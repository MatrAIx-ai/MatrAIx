personas:
  professional: Roger Dunlap, a 67‑year‑old veteran sports official with 30‑plus years of high‑school and collegiate refereeing, leverages his encyclopedic rule knowledge, calm communication, and spontaneous
    problem‑solving to mentor new referees while humorously wrestling with the paperwork deadlines of his aspiring supervisory role at the state athletic association.
  sports: Roger Dunlap follows the Durham Bulls and the Greensboro Grasshoppers minor‑league baseball teams with a collector’s enthusiasm, coaches a local youth football flag league on weekends, and remains
    a steadfast regular at Pasquotank River’s seasonal waterfowl hunting tournaments, all while enjoying the camaraderie of his weekly bridge club that doubles as a social sport.
  arts: Roger Dunlap volunteers as a stagehand for the Edenton Community Theatre, where his practical mechanical skill and quiet patience keep sets running smoothly, while his evenings are spent listening
    to classic Americana artists like Johnny Cash, Dolly Parton, and the bluegrass trio The Seldom Scene, occasionally attending performances of ‘The Music Man’ that remind him of his hometown’s love for
    community storytelling.
  travel: Roger Dunlap prefers low‑key road trips that combine fishing at the Outer Banks’ Cape Hatteras with visits to historic towns like Charleston and Savannah, often booking flights at the last minute
    for a quick weekend in Asheville’s mountain arts scene, yet he balances his wanderlust with his wife’s desire for comfortable lodging and a modest travel budget.
  culinary: Roger Dunlap enjoys cooking Southern comfort foods such as shrimp‑and‑grits, smoked catfish with hush puppies, and his garden’s heirloom tomatoes in a spicy jambalaya, often experimenting with
    local ingredients like fresh watercress and wild rice while still favoring the occasional indulgent plate of fried pork chops with a side of collard greens.
  core: Roger Dunlap blends a lifelong devotion to fair play with a love for fishing, woodworking, and vintage baseball, navigating retirement with spontaneous generosity, occasional paperwork procrastination,
    and a steady commitment to community mentorship.
background:
  cultural: Roger grew up in the coastal communities of northeastern North Carolina, immersed in the region’s blend of Southern hospitality, maritime traditions, and a close‑knit small‑town ethic. His family
    has lived in Pasquotank County for generations, with roots in fishing and farming. Raised in a Methodist congregation, he values community service, modesty, and respect for tradition. The local culture’s
    emphasis on practical problem‑solving and a relaxed pace shaped his balanced curiosity and practicality. He remains connected to regional customs such as attending the annual Elizabeth City Seafood
    Festival, participating in church potlucks, and supporting local high‑school sports, reflecting a cultural identity that merges traditional Southern values with openness to new ideas gained from officiating
    diverse teams.
attributes:
  skills: '[''Sports officiating (football, basketball, baseball, soccer)'', ''Rule interpretation and application'', ''Rapid decision‑making under pressure'', ''Conflict resolution and de‑escalation'',
