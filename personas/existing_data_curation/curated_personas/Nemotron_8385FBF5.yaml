    ''Community outreach and education'']'
  hobbies: '[''Fishing on the Pasquotank River'', ''Birdwatching'', ''Woodworking'', ''Gardening'', ''Cooking Southern cuisine'', ''Playing bridge'', ''Stagehand work for community theater'', ''Attending
    local festivals'', ''Collecting vintage baseball memorabilia'', ''Watching minor‑league baseball games'']'
  career_goals: Roger aims to transition from active on‑field officiating to a supervisory role within the North Carolina High School Athletic Association, where he can oversee referee assignments, develop
    training curricula, and mentor the next generation of officials. He also plans to launch a youth sports mentorship program in Pasquotank County that introduces teens to sportsmanship and officiating
    fundamentals. As he approaches retirement, he hopes to be recognized with a lifetime achievement award for his decades of service and to give occasional guest lectures at local community colleges on
    sports ethics and fair play.
