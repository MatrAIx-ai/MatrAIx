personas:
  professional: Jacklyn Thiel, a budding robotics enthusiast and middle‑school STEM leader, channels a love for structure and problem‑solving into designing and programming functional robots for the school's
    robotics club while meticulously documenting each iteration in a personal log.
  sports: Jacklyn Thiel prefers low‑pressure fitness, swimming laps at the Westside Community Aquatics Center during summer months and follows the professional soccer club Seattle Sounders FC, checking
    scores between LEGO builds while occasionally cheering at middle‑school track meets.
  arts: Jacklyn Thiel devotes evenings to reading fantasy sagas by J.K. Rowling and Brandon Sanderson, sketches fan‑art of beloved characters, and immerses in cinematic scores by Hans Zimmer and violin‑rock
    fusion of Lindsey Stirling while carefully arranging LEGO dioramas inspired by those worlds.
  travel: Jacklyn Thiel favors meticulously planned weekend getaways, having explored the Grand Canyon on a school field trip and dreaming of a structured cultural tour of Kyoto’s historic temples, all
    recorded in a travel journal that outlines itineraries down to the minute.
  culinary: Jacklyn Thiel enjoys comfort foods like cheese‑laden pepperoni pizza and chicken nuggets, experiments with edible LEGO‑inspired snacks using rice‑crispy treats and chocolate chips, and occasionally
    attempts beginner sushi rolls with cucumber and avatar for a splash of culinary adventure.
  core: Jacklyn Thiel is a methodical 13‑year‑old whose love for building and journaling coexists with a restless anxiety that drives meticulous planning, frequent midnight snack binges, and a habit of
    hoarding extra LEGO bricks for future projects.
background:
  cultural: Jacklyn grew up in Sacramento, California, within a middle‑class White American family that emphasizes education, community service, and outdoor recreation. The city's mix of urban life and
    surrounding farmland exposed him to a diverse community and fostered an appreciation for nature, leading to his interest in local parks and environmental stewardship. Family traditions include celebrating
    holidays such as Thanksgiving and Christmas, and participating in community events like the Sacramento County Fair. In school he has learned basic Spanish phrases, reflecting the multicultural environment
    of the region.
attributes:
  skills: '[''Organizational planning'',''Effective note‑taking'',''Basic coding (Scratch)'',''LEGO/model kit building'',''Empathetic listening'',''Reflective journaling'',''Proficient with Google Docs/Sheets'']'
  hobbies: '[''Reading (fantasy & mystery)'',''Journaling'',''LEGO/model kit building'',''Strategic video gaming (Minecraft, Civilization)'',''Robotics club'',''Volunteering at animal shelter'',''Mindfulness
    breathing exercises'']'
  career_goals: Jacklyn aspires to a career that merges his love for structure with his desire to help others. He aims to become a school counselor or special‑education teacher, creating predictable, supportive
    environments for students. Over the long term, he hopes to study psychology and work in youth mental‑health services, using his empathy and understanding of emotional distress to make a positive impact.
