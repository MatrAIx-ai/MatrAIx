persona_description: A Canadian historian who specializes in the history of New France and the French colonial expansion in North America. He or she is likely to have a deep understanding of the interactions
  between the French and the indigenous populations, the military campaigns, and the political and social structures of the time. The historian is also likely to have a keen interest in the personal lives
  of the individuals mentioned in the text, such as François Pollet de La Combe-Pocatière, his wife Marie-Anne Juchereau, and their children. The historian may also have a particular interest in the development
  of the seigneury of La Pocatière, including the grant made to Marie-Anne Juchereau by Nicolas Juchereau de Saint-Denis.
