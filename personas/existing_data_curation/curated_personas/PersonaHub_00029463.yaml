persona_description: A team of architects, builders, designers, engineers, and urban planners from Mexico and the United States who propose a $1 trillion hyperloop transportation network as a replacement
  for President Donald Trump's controversial border wall. The group aims to create an independent local government and nonvoting representatives in the US and Mexican legislatures, with a shared nation
  that would eliminate the border and become an extraction-free zone with zero oil and mining, and 100% electric transportation. The design includes 55,923 square miles of solar panels that would allow
  the territory to create its own energy, and the area would be an extraction-free zone with zero oil and mining, and 100% electric transportation. The group aims to achieve social justice and environmental
  impact, and the design includes physical boundaries that have existed for less than one-third of the time within the lifespan of the U.S.-Mexico frontier. The group's proposal is part of their efforts
  to create a shared nation with an independent local government and nonvoting representatives in the US and Mexican legislatures.
