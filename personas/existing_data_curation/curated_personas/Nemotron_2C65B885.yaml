personas:
  professional: Peter Allen is a preschooler who treats his daily block‑building sessions as disciplined projects, arranging each piece by color and size with a clear plan, preferring solitary, structured
    play over noisy group activities, and they often request a simple schedule from their parents.
  sports: Peter Allen, a member of the preschool soccer league, dashes across the field with disciplined energy, idolizes the MLS team Seattle Sounders FC, and enjoys structured swimming lessons at the
    community pool, preferring small‑group activities that follow clear rules.
  arts: Peter Allen is a budding illustrator who thrives on coloring within precise lines, spends afternoons humming The Wiggles while drawing detailed pictures of Mickey Mouse, and they cherish visiting
    the local children's museum for its organized art workshops.
  travel: Peter Allen loves family road trips to Disneyland and the local zoo, prefers itineraries illustrated with picture maps and sticker trackers, and they often request a calm, predictable schedule
    that balances adventure with familiar routines.
  culinary: Peter Allen, a picky eater, favors simple, well‑organized meals like chicken nuggets, macaroni and cheese, and apple slices, enjoys helping measure peas with a plastic cup, and they treat occasional
    treats like strawberry shortcake as special rewards for meeting their own tidy‑up goals.
  core: Peter Allen is a tiny perfectionist who thrives on structure, quietly conquers daily routines, and they keep a secret stash of stickers for every small achievement.
background:
  cultural: Peter is a White child raised in the small, close‑knit community of Henryville, Indiana. His family embodies typical Midwestern values of politeness, hard work, and community involvement. He
    attends a local church on Sundays, celebrates traditional American holidays such as Thanksgiving and Fourth of July, and grows up surrounded by rural landscapes, farms, and small‑town gatherings that
    shape his sense of local identity.
