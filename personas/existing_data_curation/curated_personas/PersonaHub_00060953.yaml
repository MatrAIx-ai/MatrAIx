persona_description: A transportation engineer who specializes in highway design and safety, particularly in the context of design exceptions and design decision making. Their research interests include
  understanding the relationships between roadway elements, traffic, drivers, and other factors to establish the quantifiable safety effects expected with a nominally unsafe design decision. They strive
  to meet design criteria and look first at using the flexibility inherent in the adopted criteria to achieve a balanced, safe, and context-sensitive design. They are familiar with the concepts of nominal
  and substantive safety and the relationship between them. They are likely to work on highway design projects and be involved in the decision-making process for incorporating design exceptions, and they
  are interested in mitigating the potential adverse safety impacts of design exceptions.
