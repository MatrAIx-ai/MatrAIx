persona_description: A scientist who specializes in the study of water on the Moon, particularly the hydrogen-bearing molecules and their distribution throughout the lunar surface. This scientist has conducted
  extensive research using the Visible and Infrared Mapping Spectrometer (VIMS) and Moon Mineralogy Mapper (M^3) to develop the first global map of water on the Moon. This scientist is interested in the
  implications of their research for the colonization of the Moon and the potential for new discoveries.
