personas:
  professional: Natalya Cox, an aspiring junior engineer in the preschool realm, channels her curiosity into assembling puzzles while applying practical organization to keep pieces sorted, and reliably
    assists peers during free play, reflecting her balanced, sociable, and conscientious nature.
  sports: Natalya Cox, an energetic participant in the Rainbow Tots Gymnastics class and a devoted little fan of the Springfield Firebirds minor league baseball team, also enjoys toddler swim lessons with
    Splash Kids and dashes around the local park's mini-soccer field with the Sunny Valley Tots club, embodying her love for group activities and balanced approach to fitness.
  arts: Natalya Cox, a budding visual explorer who loves coloring with Crayola crayons while humming the classic tune Wheels on the Bus, watching Disney's Frozen and Baby Shark by Pinkfong, and delighting
    in the gentle folk melodies of Raffi, blends her curiosity and cooperative spirit into daily creative play.
  travel: Natalya Cox, a curious stroller-friendly traveler who treasures weekend trips to the city zoo and family vacations at Disney World, eagerly dreams of future adventures to the Grand Canyon and
    a Caribbean cruise, preferring well-planned itineraries that balance excitement with familiar comforts.
  culinary: Natalya Cox, a tiny food enthusiast who prefers soft mac and cheese topped with a sprinkle of cheddar, crunchy apple slices dipped in peanut butter, and occasional banana pancakes, helps mash
    avocado for family taco nights yet often stages picky-eating meltdowns over peas, showcasing her adventurous palate and occasional stubbornness.
  core: Natalya Cox, a bright-eyed two-year-old balancing relentless curiosity with occasional worry-filled cling to her favorite stuffed bunny, whose boundless energy fuels endless block towers while her
    habit of hiding crayons under the couch keeps everyone on their toes.
background:
  cultural: Natalya is being raised in a white, middle‑class family in East Providence, Rhode Island. Her household participates in seasonal New England traditions—celebrating Thanksgiving and Christmas
    with extended family, attending community storytime events at the local library, and enjoying fall apple picking and summer beach trips. While the neighborhood is culturally diverse, her family's values
    emphasize kindness, cooperation, respect for personal space, and a balanced routine that blends structured activities with free play, reflecting both practical organization and a flexible, curious spirit.
