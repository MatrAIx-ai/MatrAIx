  hobbies: '[''Model airplane and rocket building'', ''Hiking and fishing'', ''Soccer (local youth league)'', ''Volunteering at community food pantry'', ''Reading science and engineering magazines'', ''Strategy
    video gaming'']'
  career_goals: John intends to earn his GED within the next two years and then enroll in a technical college program focused on automotive technology or emergency medical services. He aims to obtain ASE
    certification as an automotive technician and EMT‑B certification, with a long‑term ambition to open a community auto‑repair shop that provides discounted services to low‑income families while offering
    apprenticeships for other youths. He also hopes to join the local volunteer fire department, combining his compassion for helping others with his interest in practical, hands‑on work.
