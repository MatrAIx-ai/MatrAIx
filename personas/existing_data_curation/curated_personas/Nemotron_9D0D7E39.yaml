personas:
  professional: John Burkett, a 16-year-old aspiring automotive technician and EMT-B candidate, leverages their mechanical aptitude, meticulous planning, and compassionate nature, and they excel in building
    model aircraft, volunteering at the community food pantry, and leading youth soccer team logistics.
  sports: John Burkett captains the Vinton United youth soccer squad, follows the Cleveland Browns and Cincinnati Reds for inspiration, and spends weekends hiking in Hocking Hills State Park and fishing
    in the local forest, balancing team play with solo outdoor pursuits, and they thrive on the blend of camaraderie and solitude.
  arts: John Burkett channels their curiosity into creative outlets by listening to classic rock legends like Led Zeppelin and modern indie band Tame Impala, binge-watching National Geographic documentaries,
    and designing intricate paint schemes for their model rockets, which they treat as moving pieces of art.
  travel: John Burkett dreams of a road trip to the Kennedy Space Center in Florida after graduation, but currently plans annual camping excursions to Hocking Hills and weekend visits to the Ohio History
    Center, always mapping routes and budgeting mileage to stretch their limited funds, and they relish each discovery along the way.
  culinary: John Burkett favors hearty, protein-rich meals such as grilled trout caught on their fishing trips, homemade chili with beans and ground turkey, and pepper-corn spaghetti, while their go-to
    snack is trail mix with dried cranberries, almonds, and dark chocolate bits, and they enjoy cooking as a practical yet relaxing break from tinkering.
  core: John Burkett is a methodical teen who blends a relentless drive to tinker with engines and rockets with a compassionate streak that makes them the go-to organizer for community service, even if
    their obsession with tweaking designs sometimes steals time from homework.
background:
  cultural: John was raised in Logan, a small Midwestern town in Vinton County, Ohio, where the population is predominantly white and community ties run deep. The local culture emphasizes self‑reliance,
    a strong work ethic, and neighborly support, shaped by a history of agriculture and small‑scale manufacturing. Family gatherings, church activities (he attends a Methodist congregation), and the annual
    county fair are central to his upbringing, reinforcing values of humility, punctuality, and practical problem‑solving. Regional stories of Appalachian heritage and the surrounding forested landscape
    contribute to his appreciation for outdoors activities and a DIY spirit that encourages learning skills on his own.
attributes:
  skills: '[''Small engine repair'', ''Hand tool proficiency'', ''Basic computer troubleshooting'', ''Event planning and coordination'', ''First aid and CPR basics'', ''Time management'', ''Teamwork and
