  hobbies: '[''Soccer and team sports'', ''School science club experiments'', ''LEGO building and mechanical kits'', ''Reading about wildlife and space'', ''Gardening and 4‑H animal projects'', ''Educational
    cartoons (e.g., Wild Kratts)'', ''Strategy board games (e.g., Settlers of Catan Junior)'']'
  career_goals: Joy dreams of turning her love of animals and science into a future career as a veterinarian or animal health researcher, hoping to help farm animals stay healthy and solve real‑world problems.
    She also imagines herself designing simple machines or inventions that make everyday chores easier, so engineering is a budding ambition. Because she enjoys guiding peers, she sometimes pictures becoming
    a teacher who can spark curiosity in other kids. Competitive at heart, she aims to win her school’s science fair and eventually compete at the state level, seeing those achievements as stepping stones
    toward her long‑term goal of contributing to her rural community’s well‑being.
