personas:
  professional: Joy Glass is a budding junior engineer who spends afternoons in the school science club building circuits and designing LEGO machines, and they apply their balanced curiosity and practical
    mindset to troubleshoot problems with meticulous yet flexible approaches, while their competitive edge drives them to perfect each project and question every assumption.
  sports: Joy Glass plays forward for the Midtown Mariners U8 soccer team, training three times a week after school and idolizing the Chicago Fire FC’s dynamic play, and they approach each match with a
    competitive drive that fuels relentless practice drills, while their natural skepticism pushes them to constantly evaluate teammates’ tactics and improve their own positioning.
  arts: Joy Glass immerses themselves in creative worlds by watching Wild Kratts, drawing dinosaurs after reading National Geographic Kids, building intricate LEGO cityscapes inspired by LEGO Architecture,
    humming the Beatles' 'Yellow Submarine', and mastering strategy on Settlers of Catan Junior, all of which satisfy their curiosity while feeding a competitive streak to out‑score opponents and perfect
    every design.
  travel: Joy Glass loves family road trips to the state botanical garden and the Smithsonian Air and Space Museum in Washington DC, eagerly plans a future visit to NASA’s Kennedy Space Center and a camping
    adventure in Yellowstone, and they balance structured itineraries with spontaneous nature hikes, though their worry about missing a planned activity sometimes leads them to over‑pack their itinerary.
  culinary: Joy Glass enjoys pepperoni pizza, spaghetti with marinara, and strawberry‑banana smoothies, proudly chopping carrots and cucumbers from the family garden to assemble a fresh salad, and while
    they can follow simple recipes under parental supervision, they often sprinkle extra cheese or salt, turning each dish into a personalized experiment.
  core: Joy Glass is an eight‑year‑old blend of relentless curiosity and competitive fire, cataloguing LEGO inventions, mastering soccer drills, and worrying about every detail, all while balancing a bright
    social energy with a habit of double‑checking every experiment.
background:
  cultural: Joy grows up in Herreid, South Dakota, a small, tight‑knit Midwestern town with deep agricultural roots. Her family’s heritage includes German and Scandinavian ancestors who settled the prairie
    generations ago, and this lineage shapes a culture of self‑reliance, community cooperation, and seasonal celebrations like the county fair and holiday potlucks. The town’s Lutheran church plays a role
    in community gatherings and seasonal service projects. Life on a family farm introduces Joy early to the rhythms of planting, caring for livestock, and winter snow‑shoeing, reinforcing a practical,
    hands‑on approach to learning. The rural environment, combined with school and extracurricular group activities, nurtures her sociable and competitive spirit while also teaching her to be cautious and
    thoughtful about new ideas and people.
attributes:
  skills: '[''Reading comprehension (non‑fiction)'', ''Basic arithmetic (addition, multiplication)'', ''Tablet navigation and Scratch coding'', ''Animal care (chickens, horses)'', ''Organizing group activities'',
