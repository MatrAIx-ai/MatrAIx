personas:
  professional: Ezequiel Rivera, an eight‑year‑old budding engineer, channels his love for structure into LEGO architecture, Scratch storytelling, and the school STEM club’s robotics projects, where their
    meticulous organization and high personal standards make them a natural team planner.
  sports: Ezequiel Rivera, a passionate member of the “Little Kickers” youth soccer league, practices two evenings a week with a tight‑knit group of friends, idolizes Manchester United’s midfielders, and
    keeps a personal tally of match statistics in a notebook, reflecting their organized and competitive nature.
  arts: Ezequiel Rivera, who takes weekly piano lessons with their mother, enjoys playing Beethoven’s “Für Elise” and improvising simple melodies on Scratch, while also collecting Pixar movie soundtracks
    and drawing dinosaurs during quiet moments, revealing an artistic side that balances their analytical mind.
  travel: Ezequiel Rivera, whose family’s road trips have taken them to the California Science Center and the Dinosaur National Monument in Utah, prefers meticulously planned itineraries with scheduled
    museum tours, yet dreams of a future field trip to the Kennedy Space Center to see rockets up close.
  culinary: Ezequiel Rivera, an enthusiastic junior chef who can whip up a perfect cheese‑and‑tomato pizza using fresh mozzarella, basil, and a pinch of oregano, also delights in baking chocolate chip cookies,
    though they sometimes over‑decorate LEGO structures instead of cleaning the kitchen immediately.
  core: Ezequiel Rivera is a meticulously organized eight‑year‑old who balances a love of building, coding, and soccer with a habit of cataloguing every baseball card and allowance cent, even if it means
    occasionally sacrificing bedtime.
background:
  cultural: Ezequiel is a first‑generation Colombian‑American raised in Suwanee, Georgia. At home, his parents speak Spanish and celebrate Colombian traditions such as Día de los Reyes, Carnaval de Barranquilla,
    and family gatherings around foods like arepas and empanadas. He attends a bilingual charter school where he learns to read and write in both Spanish and English, allowing him to move comfortably between
    cultures. The family participates in local Colombian community events, often joining the annual Colombian Festival in nearby Atlanta, where he enjoys the music and dances. While he embraces typical
    American childhood experiences—like baseball, school field trips, and Halloween—he also holds a strong connection to his Colombian roots through language, cuisine, and periodic visits to relatives in
    Colombia.
attributes:
  skills: '["Organizing school supplies and schedules", "Reading comprehension", "Basic arithmetic", "Spanish‑English bilingual communication", "Puzzle solving", "LEGO building and design", "Scratch visual
    programming", "Time management for chores and homework"]'
  hobbies: '["LEGO construction and custom design", "Logic puzzles and Sudoku", "Scratch programming", "STEM club robotics projects", "Soccer with a small group of friends", "Reading adventure and science
    books", "Piano practice", "Collecting and cataloguing baseball cards"]'
  career_goals: Ezequiel dreams of growing up to design and build things that help people. He frequently talks about becoming a civil engineer who creates safe bridges and buildings, or a software developer
    who writes organized code for games and apps. He also hopes to keep his bilingual ability, envisioning a future where he can teach Spanish to other children or work on projects that connect his Colombian
    heritage with technology. He wants to excel in school, earn good grades, and eventually attend a university known for engineering or computer science.
