personas:
  professional: Eugene Johnson is a budding game creator who uses Scratch to design simple animations and games, applying a methodical, step‑by‑step approach learned from building detailed LEGO sets, and
    values practicality and routine in every project.
  sports: Eugene Johnson is a competitive pickup basketball player who meets a small circle of friends at the neighborhood court after school, idolizes the Los Angeles Lakers and watches LeBron James for
    strategic moves, and follows the local high school team, the Springfield Spartans, for community spirit.
  arts: Eugene Johnson avidly reads graphic novels like "Watchmen" and "Saga", grooves to classic hip‑hop tracks from A Tribe Called Quest and R&B classics such as "I Will Always Love You" by Whitney Houston,
    and practices piano pieces by Mozart to reinforce discipline.
  travel: Eugene Johnson prefers short, well‑planned family trips, such as weekend visits to the state science museum and a summer stay at a nearby beach resort, while day‑dreaming about a future trip to
    Tokyo to explore the LEGO Discovery Center and the vibrant music scene.
  culinary: Eugene Johnson enjoys simple comfort foods like pepperoni pizza and chicken nuggets, has a budding skill in making homemade macaroni‑and‑cheese, and loves the sweet tang of strawberry jam on
    toast, often experimenting with assembling food 'constructions' reminiscent of LEGO builds.
  core: Eugene Johnson is a routine‑driven, quietly competitive twelve‑year‑old who blends disciplined piano practice, methodical LEGO building, and strategic basketball games into a calm, resilient outlook.
background:
  cultural: Eugene is an African‑American youth growing up in the Bronx, surrounded by a vibrant mix of Black cultural traditions, including church gatherings, block parties, and a strong local hip‑hop
    scene. His family maintains ties to Caribbean roots—his mother’s family hails from Jamaica and his father’s family has roots in Haiti—infusing his upbringing with a blend of Caribbean music, food, and
    storytelling. The Bronx neighborhood’s emphasis on resilience, community mentorship, and pride in local heritage shapes Eugene’s practical outlook, competitive spirit, and calm confidence.
attributes:
  skills: '[''Strategic thinking (chess)'', ''LEGO model building'', ''Basic block-based programming (Scratch)'', ''Organized basketball teamwork'']'
  hobbies: '[''Pickup basketball'', ''LEGO building'', ''Scratch programming'', ''Listening to hip‑hop and R&B'', ''Reading graphic novels'', ''Practicing piano'']'
  career_goals: Eugene aims to graduate high school with honors and secure a scholarship that will let him study computer science or engineering, with the long‑term ambition of becoming a software developer
    who creates apps that benefit his neighborhood. He also dreams of earning a basketball scholarship and, if possible, playing professionally, viewing both paths as ways to give back to his community
    and serve as a positive role model for younger kids.
