  hobbies: '[''Cooking traditional Mexican cuisine'', ''Fishing at local lakes'', ''Gardening (herbs and chilies)'', ''Reading business and folklore books'', ''Playing acoustic guitar'', ''Volunteering
    at the food bank'', ''Woodworking'', ''Hiking Hill Country trails'']'
  career_goals: Arturo aims to advance to a regional operations manager role within the next five years, overseeing multiple locations across central Texas. He is also exploring the possibility of opening
    his own family‑run taquería that highlights authentic Mexican flavors with a focus on sustainable sourcing. He plans to earn a certification in hospitality analytics to leverage data for improving profitability
    and guest experience, and to mentor emerging food‑service managers in his community.
