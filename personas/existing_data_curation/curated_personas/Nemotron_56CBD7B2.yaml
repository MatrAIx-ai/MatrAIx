  hobbies: '["Technical Journals Reading","Puzzle Solving (Sudoku, Logic Grids)","Vegetable Gardening","Hiking","Birdwatching","Historical Non‑Fiction Book Club","Church Volunteer Coordination"]'
  career_goals: Jennifer aims to ascend to a plant‑manager role within the next five years, leveraging her expertise to lead multi‑site operations and drive strategic efficiency improvements. She plans
    to obtain a Six Sigma Black Belt and spearhead the integration of Industry 4.0 technologies, such as real‑time IoT monitoring, to reduce waste and boost profitability. Long‑term, she envisions mentoring
    emerging supervisors, establishing a culture of disciplined innovation, and eventually transitioning into an operational consulting capacity where she can apply her methodical approach to broader manufacturing
    challenges.
