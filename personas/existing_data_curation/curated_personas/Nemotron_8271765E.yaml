personas:
  professional: Joshua Wojtys, a 52‑year‑old handyman‑entrepreneur in the making, turns his hands‑on carpentry, small‑engine repair, and home‑maintenance expertise into a solitary‑focused side business,
    harnessing his curiosity for new tools and his competitive edge in local trade contests while they maintain a meticulously organized schedule.
  sports: Joshua Wojtys spends his mornings early‑season fishing on local lakes, enters the Mississippi Bass Anglers Association tournaments, hunts deer during the fall, hones precision at the county rifle
    range where they compete in NRA‑sponsored small‑bore matches, and follows the Mississippi State Bulldogs football and New Orleans Saints with a quiet devotion that doubles as their informal cardio.
  arts: Joshua Wojtys relaxes to classic country and bluegrass legends like Johnny Cash, Bill Monroe, and Ricky Skaggs while leafing through W.C. Handy biographies and Mark Twain’s Mississippi tales, and
    they occasionally sketch bird silhouettes in their notebook, finding the rhythms of the music echoing their woodworking cadence.
  travel: Joshua Wojtys prefers low‑key, self‑planned trips that blend fishing and hiking, having trekked the Great Smoky Mountains for birdwatching, spent a weekend angling on Lake Okeechobee, and dreaming
    of a solitary backpacking adventure in New Zealand’s Fiordland National Park when their emergency fund permits.
  culinary: Joshua Wojtys, a competent home cook, often seasons their freshly caught catfish with garden‑grown pepper jelly and herbs, bakes peach cobbler using orchard fruit, and whips up a rustic tomato‑and‑pepper
    salsa for their woodworking breaks, favoring simple, hearty flavors over gourmet experimentation.
  core: Joshua Wojtys is a solitary, curiosity‑driven handyman who balances meticulous budgeting with a competitive streak, but their chronic worry and occasional neglect of health appointments keep them
    perpetually on edge.
background:
  cultural: Joshua was born and raised in Pinola, a small town in Jefferson Davis County, Mississippi. His family is of Polish descent; his grandparents immigrated to the United States after World War II
    and settled in the rural South, initially working as sharecroppers before acquiring their own farm. Growing up in the Deep South, Joshua absorbed the region’s cultural emphasis on self‑reliance, respect
    for the land, and close community ties rooted in the local Baptist church, though he now identifies as spiritually independent. He maintains a blend of Polish family traditions—such as preparing kielbasa
    and pierogi for holidays—and Southern customs like country‑music gatherings, hunting seasons, and community fairs. This hybrid heritage informs his appreciation for both inherited customs and the straightforward,
    practical lifestyle of rural Mississippi.
attributes:
  skills: '[''Carpentry'', ''Small engine repair'', ''Home maintenance'', ''Hunting'', ''Fishing'', ''Orienteering'', ''First aid'', ''Computer troubleshooting'', ''Genealogy research'', ''Budgeting'']'
  hobbies: '[''Fishing'', ''Hunting'', ''Woodworking'', ''Gardening'', ''Birdwatching'', ''Reading local history and genealogy'', ''Small engine tinkering'', ''Listening to classic country and bluegrass
    music'', ''Trail hiking'', ''Marksmanship'']'
  career_goals: Joshua aims to transform his practical skills into a small, self‑run handyman and woodworking side business that can generate reliable supplemental income while preserving his independence.
    He plans to obtain a state handyman license, learn basic CNC machining to expand his product range, and acquire an advanced first‑aid/CPR certification. He seeks greater self‑sufficiency by enlarging
    his vegetable garden, mastering food‑preservation techniques, and securing a modest emergency fund to reduce financial stress. Long‑term, Joshua hopes to volunteer as a fire‑prevention educator and
    mentor for local youth interested in outdoor skills, thereby contributing to his community without compromising his preference for solitary work. Achieving these goals would provide him with financial
    stability and a sense of purposeful accomplishment that counteracts his tendency toward worry.
