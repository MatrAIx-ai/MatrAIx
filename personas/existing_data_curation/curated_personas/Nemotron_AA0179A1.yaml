  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Knitting'', ''Quilting'', ''Cooking'', ''Birdwatching'', ''Listening to classic country music'', ''Volunteering at church food pantry'']'
  career_goals: Andrea aims to move into a supervisory role within facility management, leveraging her reliability and organizational strengths. She plans to complete an associate degree in facilities management
    or business administration at a nearby community college and obtain OSHA safety certification. In the next five years, she hopes to become a lead janitorial supervisor, overseeing a team of cleaners,
    and eventually transition to a facilities manager position where she can influence cleaning policies and sustainability practices. Another long-term ambition is to start a small, locally-owned cleaning
    service that serves businesses and homes in Walker County, providing reliable, high-quality cleaning while offering mentorship to other workers in the community.
