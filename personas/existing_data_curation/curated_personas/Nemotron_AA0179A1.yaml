personas:
  professional: Andrea Scott is a seasoned building cleaner who has mastered commercial floor care—stripping, waxing, and buffing—while using her methodical, organized approach to manage inventory, schedule
    coordination, and safety compliance, positioning herself for a supervisory role in facilities management.
  sports: Andrea Scott enjoys low‑impact fitness such as weekly morning walks at the San Bernard National Wildlife Refuge and occasionally watches the Houston Astros and Dallas Mavericks on TV, while participating
    in a casual community softball league that meets every summer.
  arts: Andrea Scott finds solace in classic country music—like George Jones and Loretta Lynn—delivers her love of storytelling through historical‑fiction novels set in the American South such as *The Kitchen
    House* and *The Secret Life of Bees*, and channels creativity into knitting, quilting, and attending local craft fairs featuring artisans.
  travel: Andrea Scott prefers well‑planned road trips over spontaneous adventures, favoring destinations within Texas such as the Hill Country vineyards, Austin’s live‑music scene, and a nostalgic visit
    to New Orleans for its historic homes, while she keeps a travel journal to meticulously record each itinerary.
  culinary: Andrea Scott cooks hearty Texan dishes like smoked brisket, chicken‑fried steak, and chili con carne, often incorporating garden‑grown tomatoes, peppers, and okra into her meals; she enjoys
    perfecting a family‑passed green‑chile casserole and hosts modest potluck gatherings where her famed sweet‑potato pie is a favorite.
  core: Andrea Scott blends a structured, reliable work ethic with a quiet love for gardening, classic country, and community service, balancing meticulous budgeting with occasional indulgences in quilting
    and Texan comfort food.
background:
  cultural: Andrea was raised in a small, predominantly white, rural community in East Texas, where Southern hospitality and self-reliance are core values. Her family’s modest, working-class background
    instilled a strong work ethic, respect for tradition, and an appreciation for community gatherings like church socials and county fairs. While she identifies with mainstream Protestant (likely Baptist)
    cultural practices, she also embraces regional customs such as cooking with locally sourced ingredients and listening to country music. The close-knit nature of New Waverly has shaped her preference
    for small, familiar groups and a practical, down-to-earth outlook on life.
attributes:
  skills: '[''Commercial floor cleaning'', ''Chemical safety and OSHA compliance'', ''Inventory and supply management'', ''Schedule coordination'', ''Basic facilities maintenance'', ''Customer service'',
