personas:
  professional: Louis Exantus is a veteran hospitality operations specialist who excels at precise inventory control, seamless guest‑service coordination, and curating culturally rich itineraries, channeling
    their calm, skeptical edge into meticulous conflict de‑escalation and mentoring staff, while eyeing a senior concierge role with a boutique inn concept that showcases African‑American art.
  sports: Louis Exantus enjoys weekend hikes through Congaree National Park, follows the Carolina Panthers for football, the Columbia Fireflies for baseball, and plays in a local senior tennis league, balancing
    solitary outdoor activity with occasional spirited view‑ing parties for Gamecocks basketball, reflecting a competitive yet low‑key fitness routine.
  arts: Louis Exantus spends evenings at the Columbia Museum of Art while chronicling street scenes with a Leica camera, drawing inspiration from photographer Gordon Parks and jazz legends such as Miles
    Davis and Ella Fitzgerald, and they regularly host small gatherings to discuss works by contemporary African‑American painters like Tatyana Fazlalizadeh, weaving their artistic passion into their hospitality
    role.
  travel: Louis Exantus prefers meticulously planned road trips with an eye for cultural depth, revisiting Charleston’s historic districts, indulging in the jazz ambiance of New Orleans, and fantasizing
    about a future pilgrimage to Paris’s Musée d’Orsay, yet they always reserve a flexible day for spontaneous detours, balancing budget constraints with an appetite for discovery.
  culinary: Louis Exantus enjoys crafting Southern-inspired dishes, mastering shrimp and grits with locally sourced Gulf shrimp, simmering collard greens seasoned with smoked turkey, and experimenting with
    Creole gumbo that blends okra, roux, and andouille sausage, while their garden yields heirloom tomatoes that they proudly incorporate into fresh salads, reflecting a modest but confident cooking skill
    set.
  core: Louis Exantus blends a lifelong curiosity for art and culture with a disciplined, competitive edge, quietly curating experiences while obsessively organizing luggage carts and occasionally forgetting
    to water the raised‑bed garden.
background:
  cultural: Louis is an African‑American who grew up in West Columbia, South Carolina, immersed in a close‑knit church community and a family tradition of storytelling. His upbringing blended Lowcountry
    cultural influences with the urban Southern experience, fostering a strong sense of resilience and pride in his heritage. He actively supports locally owned Black businesses and celebrates cultural
    milestones such as Juneteenth and historically significant civil‑rights sites in the area. This background informs his cautious trust of others, competitive drive, and desire to share authentic cultural
    narratives with visitors.
