persona_description: A British author known for her unique and darkly humorous approach to writing for children, particularly in the form of picture books. Her work often explores the complexities of reality
  and the tension between the childlike and the adult world. Her books have been praised for their ability to create a sense of unease and delight in the dangers and absurdities of the world. Her family's
  history as German Jewish refugees adds an additional layer of depth and authenticity to her writing.
