persona_description: A musicologist who specializes in the study of Indian classical music, particularly Carnatic and Hindustani music. He is knowledgeable about the joint ventures between Carnatic and
  Hindustani musicians, and has observed the impact of such experiments on Western music. He is interested in the ongoing trend of Indian musicians mixing Indian classical music with Western orchestral
  music or jazz, and the possible genetic influence on the tradition. He is also aware of the clash of alien elements in the East-West interface between Indian and Western music and the proliferation of
  cases where Indian musicians get together with foreigners in the so-called 'fusion' business. He has visited Western countries and observed the opportunities for Indian musicians to line up ordinary foreign
  musicians in a free-for-all musical merry-go-round.
