  hobbies: '[''Salsa dancing'', ''Cooking traditional Mexican cuisine'', ''Volunteering at community health fairs'', ''Yoga and meditation'', ''Hiking in Houston parks'', ''Socializing with friends'', ''Traveling
    to explore new cultures'', ''Reading contemporary fiction'']'
  career_goals: Isabel aspires to specialize in family medicine with a focus on serving underserved Mexican‑American communities in Houston. She aims to develop a community clinic that combines primary
    care with culturally tailored health education and preventive services. Long‑term, she envisions a leadership role where she can mentor younger physicians from minority backgrounds and advocate for
    policies that reduce health disparities, while also finding a sustainable work‑life balance to manage her own stress.
