personas:
  professional: Mildred Howard is an environmentally‑focused college student who channels her knack for digital organization with Notion and Trello into planning campus sustainability workshops, turning
    abstract climate research into concrete community events while juggling a preference for structure with occasional spur‑of‑the‑moment brainstorming sessions.
  sports: Mildred Howard fuels their fitness routine with weekend surf sessions at Cowell Beach, sunrise hikes along the redwood trails of Big Basin, and weekly yoga classes, while they cheer on the Santa
    Cruz Warriors and occasionally join a local beach‑volleyball league, preferring a flexible schedule that allows skipping workouts when anxiety spikes.
  arts: Mildred Howard curates indie playlists featuring artists like Phoebe Bridgers, Tame Impala, and local band The Kinks of the Coast for road trips, designs eye‑catching flyers for community garden
    events using Canva and Photoshop, and spends quiet evenings sketching in their journal while watching performances by experimental dancer Sasha Waltz at The Catalyst.
  travel: Mildred Howard prefers low‑key road trips along the Pacific Coast Highway, stopping at Big Sur, Monterey, and the Redwood National and State Parks, while dreaming of an eco‑tourism trek to Costa
    Rica; they plan trips with a mix of Google Maps itineraries and spontaneous detours, but budget constraints keep most adventures within California.
  culinary: Mildred Howard enjoys cooking vibrant, nutrient‑dense meals such as quinoa‑kale salads with heirloom tomatoes, roasted beet hummus, and grilled salmon topped with citrus‑herb glaze, sourcing
    ingredients from the Santa Cruz farmers market, yet they sometimes resort to comfort foods like cheesy mac and cheese during stressful exam weeks.
  core: Mildred Howard blends a meticulously organized digital mind with a high‑octane emotional life, surf‑driven weekends, and a habit of turning anxiety into creative community advocacy, all while juggling
    occasional impulsive splurges and a love for indie music.
background:
  cultural: Mildred grew up in a middle‑class white family in the suburbs of Santa Cruz County, where the ocean, progressive politics, and a strong environmental ethic shaped her worldview. Her parents,
    both community‑college graduates, encouraged higher education and civic involvement, fostering a blend of independence and collective responsibility. The local culture—surfing, grassroots activism,
    and a vibrant arts scene—instilled in her a deep appreciation for nature, social justice, and creative expression. While she identifies with the broader Californian liberal values of inclusivity and
    sustainability, she also values the practical, down‑to‑earth mindset of her coastal community.
attributes:
  skills: '[''Digital organization (Google Workspace, Trello, Notion)'', ''Research and academic writing'', ''Interpersonal communication and active listening'', ''Peer counseling basics'', ''Basic graphic
    design (Canva, Adobe Photoshop)'', ''Environmental advocacy and community outreach'', ''Adaptability and problem solving'']'
  hobbies: '[''Surfing at Cowell Beach'', ''Hiking in the redwood forests'', ''Yoga and mindfulness meditation'', ''Journaling and sketching'', ''Attending indie music concerts'', ''Cooking with fresh,
    local ingredients'', ''Volunteering at a community garden'']'
  career_goals: Mildred aims to complete a bachelor's degree in psychology or environmental studies and eventually become a community mental‑health counselor or outreach coordinator for a non‑profit focused
    on environmental justice. She seeks a career that balances stable, structured responsibilities—such as case management or program administration—with the flexibility to manage her own mental‑health
    needs. In the next five years she hopes to earn a relevant graduate certificate, build a network of supportive peers, and launch a small side project creating eco‑friendly educational materials for
    local schools.
