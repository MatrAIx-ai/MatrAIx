    in Wisconsin state parks'', ''Attending farmer’s markets'', ''Reading contemporary fiction'', ''Listening to design and entrepreneurship podcasts'', ''Maintaining an art‑focused blog'']'
  career_goals: Catalina aims to complete a bachelor's degree in marketing or communications while leveraging her retail experience to transition into a marketing coordinator role for a cultural institution
    such as a museum or community arts center. She envisions using her love of art and her business acumen to develop engaging promotional campaigns and audience‑development strategies. In the longer term,
    she aspires to become a brand manager or arts program director, and eventually launch her own boutique‑gallery space that showcases emerging Midwest artists and offers a social hub for creative events.
