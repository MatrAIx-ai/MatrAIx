personas:
  professional: Catalina Miller, an 18‑year‑old retail cashier turned budding marketer, leverages their cash‑handling expertise, sharp communication skills, and fierce competitive drive to craft data‑rich
    promotional campaigns for local art venues, while balancing meticulous organization with a willingness to experiment on the fly.
  sports: Catalina Miller stays active by playing in the university’s intramural volleyball league, hiking the Apostle Islands during summer, and cheering for the Milwaukee Bucks and Green Bay Packers,
    while maintaining a competitive edge that pushes them to log at least three cardio sessions a week, even if it means skipping a social event.
  arts: Catalina Miller’s artistic soul thrives on sketching watercolors of Midwestern landscapes, curating Instagram galleries of their digital photography inspired by Annie Leibovitz, attending live shows
    by The National and local folk singer Sarah Jarosz, and participating in improv comedy nights where the spontaneous energy fuels their creative brainstorming for blog reviews of regional exhibitions.
  travel: Catalina Miller prefers weekend road trips that blend hiking in Door County’s pine‑scented trails with spontaneous stops at farmer’s markets, has already explored Chicago’s art scene and dreams
    of a budget‑friendly backpacking adventure through the museums of Paris and the street food stalls of Kyoto, planning each outing on a spreadsheet to stretch their modest student funds while chasing
    new cultural inspirations.
  culinary: Catalina Miller, a self‑taught kitchen experimenter, frequently whips up rustic farm‑to‑table meals like beet‑and‑goat‑cheese salads drizzled with locally sourced honey, savors classic Wisconsin
    cheese curds and bratwurst at Saturday farmer’s markets, and delights in plating their watercolor‑inspired desserts with fresh lavender and blackberry coulis.
  core: Catalina Miller is a socially vibrant, art‑obsessed 18‑year‑old whose competitive streak drives them to turn every gallery visit into a personal branding project, even if it means binge‑skipping
    sleep and obsessively tracking every purchase in a spreadsheet.
background:
  cultural: Catalina grew up in a middle‑class, white family in Whitewater, Wisconsin, a community with deep German‑Scandinavian roots and a strong Midwestern work ethic. Her upbringing emphasized community
    involvement, courtesy, and a respect for tradition, reflected in participation in county fairs, local church events, and volunteer activities. The region’s vibrant dairy‑farm heritage and seasonal festivals
    introduced her to regional foods and folk music. Attending the University of Wisconsin‑Whitewater exposed her to a more diverse student body, broadening her cultural perspective while reinforcing her
    connection to the values of small‑town hospitality and regional pride.
