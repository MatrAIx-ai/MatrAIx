  career_goals: Although still a toddler, Joshua already shows curiosity about helping roles. He is fascinated by fire trucks, ambulances and veterinarians in picture books, often pointing to illustrations
    and saying “fireman” or “doctor”. His parents nurture this interest, so his nascent ambition is to become a “helper” who can care for people or animals, particularly envisioning a future as a firefighter
    or a veterinarian. He also enjoys building things with blocks, hinting at a possible future interest in construction or engineering.
