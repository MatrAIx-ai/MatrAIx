  hobbies: '[''Visiting local art galleries and museums'', ''Photography (industrial and landscape)'', ''Hiking and cycling in Virginia state parks'', ''Playing acoustic guitar'', ''Cooking and experimenting
    with new recipes'', ''Reading books on design, technology, and business'', ''DIY home improvement projects'', ''Attending live music and theater performances'', ''Volunteering at community art workshops'']'
  career_goals: He aims to advance to senior sales manager within the next three years, eventually becoming a regional sales director overseeing a multi‑state territory. He plans to earn professional sales
    certifications (e.g., Certified Professional Sales Leader) and pursue a bachelor's degree in business administration part‑time. Long‑term, he envisions launching his own wholesale distribution company
    focused on sustainable, innovative manufacturing products, blending his sales expertise with his passion for art and design.
