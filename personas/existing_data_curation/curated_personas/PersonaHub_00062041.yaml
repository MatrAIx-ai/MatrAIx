persona_description: A political scientist who specializes in the study of totalitarian governments, particularly those from the Hunger Games series and the present day. Her research interests include the
  impact of totalitarian governments on the rights of their citizens, the separation of mass groups of people, and the use of communication and movement restrictions to maintain power. She is particularly
  interested in the treatment of the rich and poor in totalitarian governments, and how it affects the stability of the government. Her knowledge and expertise in these areas make her a valuable resource
  for anyone interested in understanding how totalitarian governments stay in power.
