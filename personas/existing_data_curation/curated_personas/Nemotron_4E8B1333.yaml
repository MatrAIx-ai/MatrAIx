  hobbies: '[''Community theater'', ''Rotary Club volunteering'', ''Food bank service'', ''Local baseball fan club'', ''Fishing'', ''Gardening'', ''Historical nonfiction reading'', ''Road trips with family'',
    ''Cooking'', ''Bridge'', ''Woodworking'']'
  career_goals: Neil aims to become a Certified Public Accountant and advance to a senior managerial role within his firm, with the long‑term ambition of serving as a chief financial officer for a midsized
    manufacturing company in Central Iowa. He is focused on integrating data‑analytics and emerging AI tools into audit processes to improve efficiency and insight. Beyond corporate advancement, Neil aspires
    to mentor junior accountants, lead a regional audit practice, and eventually sit on the board of a nonprofit focused on economic development in Mahaska County, leveraging his financial expertise to
    benefit his community.
