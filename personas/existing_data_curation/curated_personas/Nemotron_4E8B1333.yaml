  skills: '[''Financial reporting'', ''Tax preparation'', ''Internal auditing'', ''GAAP/IFRS compliance'', ''Financial analysis'', ''Budget forecasting'', ''Advanced Excel modeling'', ''SAP ERP'', ''QuickBooks'',
