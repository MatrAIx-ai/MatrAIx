  career_goals: Daisy dreams of becoming a teacher because she loves helping other children learn and appreciates the order a classroom provides. She also imagines caring for animals as a veterinarian,
    reflecting her kindness and love for pets. In the near term, she aims to be a "class helper" and hopes to volunteer as a library assistant at her school, developing responsibility and service skills.
    Her long‑term ambition is to use her caring nature and organizational strengths to make a positive impact in her community.
