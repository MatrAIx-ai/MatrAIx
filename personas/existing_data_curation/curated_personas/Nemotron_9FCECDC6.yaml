personas:
  professional: Daisy Antonio is a budding junior architect who channels their love for LEGO into meticulously planned building projects, applying a practical, structured approach and a keen eye for detail
    while delighting in collaborative play with classmates.
  sports: Daisy Antonio plays forward for the neighborhood's U-7 soccer club, following game rules and team drills with enthusiasm, cheering for the professional women's team Portland Thorns as a source
    of inspiration, and values the structured teamwork that mirrors their cooperative nature.
  arts: Daisy Antonio enjoys coloring intricate designs inspired by the whimsical illustrations of Dr. Seuss, draws family portraits with vivid crayons, and dances to the energetic beats of Daddy Yankee
    and the classic Disney anthem 'Let It Go' performed by Idina Menzel, showing how music and visual art shape their expressive play.
  travel: Daisy Antonio loves weekend adventures to the nearby city park where they collect leaves and shells, has visited the coastal beach town of Ocean City for sandcastle building, dreams of exploring
    the tropical gardens of Costa Rica, and prefers well-planned trips that balance exploration with familiar routines.
  culinary: Daisy Antonio delights in helping their mother bake chocolate chip cookies, preparing traditional pasteles and arroz con gandules using ingredients like plantains, pork, sofrito, and pigeon
    peas, and often experiments with mixing colorful fruit slices into their snack plates, reflecting their love for both familiar flavors and creative cooking.
  core: Daisy Antonio blends a love for structured LEGO building, careful budgeting of allowance, gentle management of seasonal allergies, spirited soccer play, colorful arts, adventurous yet orderly travel,
    and family cooking, all while balancing social fun with quiet moments and a penchant for keeping crayons neatly organized.
background:
  cultural: Daisy is raised in a close‑knit Puerto Rican household in Sanford, Florida. Spanish and English are spoken at home, giving her a bilingual upbringing. Her family celebrates Puerto Rican traditions
    such as Three Kings Day, Noche Buena, and the annual Puerto Rican Festival in Orlando. Music like salsa, bomba, and plena fills family gatherings, and she often dances to these rhythms. The kitchen
    is a cultural hub where she helps prepare arroz con gandules, plantains, and pasteles, connecting her to island heritage. Regular visits to her grandparents, who share stories of life in Puerto Rico,
    reinforce a strong sense of identity. The local church and community center host cultural events that keep her connected to a broader Puerto Rican community in Seminole County.
