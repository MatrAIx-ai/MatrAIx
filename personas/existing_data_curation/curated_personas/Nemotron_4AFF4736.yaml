  hobbies: '[''Native plant gardening'', ''Hiking'', ''Cycling'', ''Cooking Southern cuisine'', ''Community volunteering'', ''Reading African American literature'', ''Photography'', ''Yoga'', ''Attending
    local art festivals'', ''Playing the violin'']'
  career_goals: Revathi aims to become a lead landscape architect specializing in climate‑resilient and socially equitable public spaces. She plans to obtain LEED AP accreditation and pursue a master’s
    in urban planning to deepen her expertise in environmental justice. Her long‑term ambition is to launch a community‑focused design consultancy that revitalizes underserved neighborhoods in Birmingham,
    creating inclusive parks and green corridors that reflect African‑American cultural heritage. She also hopes to mentor junior designers, win national awards for inclusive design, and influence municipal
    policies toward greener, more equitable urban development.
