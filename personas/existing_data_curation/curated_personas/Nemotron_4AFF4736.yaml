personas:
  professional: Revathi Willis, a 26‑year‑old landscape architect, merges expert GIS mapping, stormwater design, and meticulous project management to deliver climate‑resilient public spaces, while their
    compassionate, methodical nature ensures each design reflects community input and social equity.
  sports: Revathi Willis cycles with the Birmingham Bike Club through historic neighborhoods, hikes Appalachian foothills in autumn, joins weekend pick‑up basketball at a community center, and avidly follows
    the Birmingham Barons baseball and Alabama Crimson Tide football teams, integrating regular cardio into a structured fitness routine.
  arts: Revathi Willis plays violin in a community choir that performs works by Yo‑Yo Ma, draws inspiration from photographer Ansel Adams, enjoys the storytelling of Lin‑Manuel Miranda’s musical Hamilton,
    and regularly attends art festivals featuring contemporary artists such as Kerry James Marshall.
  travel: Revathi Willis prefers semi‑planned road trips that blend hiking and cultural immersion, having explored the Blue Ridge Parkway and historic New Orleans, while eyeing a future pilgrimage to Kyoto’s
    zen gardens and the sustainable urban projects of Copenhagen.
  culinary: Revathi Willis cooks Southern soul food with a modern twist—perfecting collard greens simmered with smoked turkey, hush‑puppy batter with jalapeño, and sweet‑potato pie spiced with cinnamon
    and nutmeg—while also experimenting with heirloom tomatoes and okra in plant‑forward recipes, and enjoys occasional visits to farm‑to‑table eateries.
  core: Revathi Willis blends methodical design expertise with heartfelt community activism, juggling a love of native‑plant gardening, violin practice, and weekend cycling while occasionally forgetting
    to water the garden during a project crunch.
background:
  cultural: Revathi is a Black woman raised in a close‑knit African‑American family in Birmingham, Alabama. Her upbringing was shaped by church community gatherings, Southern soul music, and family traditions
    that celebrate resilience and mutual support. Growing up with grandparents who participated in civil‑rights activism, she internalized a strong sense of social responsibility and an awareness of environmental
    justice issues affecting Black neighborhoods. These experiences inform her commitment to designing equitable, culturally resonant public spaces that honor African‑American heritage, incorporate native
    flora, and provide gathering places for community events. She actively celebrates cultural milestones such as Juneteenth and embraces storytelling, quilting, and communal cooking as part of her identity.
attributes:
  skills: '[''Site analysis'', ''GIS mapping'', ''AutoCAD'', ''SketchUp'', ''Rhino'', ''Sustainable design'', ''Stormwater management'', ''Native plant identification'', ''Environmental impact assessment'',
