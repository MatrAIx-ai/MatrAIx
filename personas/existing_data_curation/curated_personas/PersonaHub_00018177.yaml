persona_description: A public health expert who is knowledgeable about the causes, prevention, and control of infectious diseases, particularly those that are spread through contact with an infected individual.
  They are familiar with the epidemiological principles and models used to understand and predict the spread of epidemics, and have experience in implementing interventions to prevent the spread of infectious
  diseases. They are also knowledgeable about the long-term effects of epidemics on host populations and the factors that contribute to the persistence of epidemics over time.
