  hobbies: '[''Basketball'', ''Community Soccer League'', ''Karaoke Sessions'', ''Cooking Vietnamese and Filipino dishes'', ''Photography'', ''Reading about logistics and technology'', ''Yoga and Meditation'',
    ''Volunteer work at local community centers'', ''Exploring hiking trails'', ''Video Gaming'']'
  career_goals: Dung aims to move into a supervisory position within the postal service, such as a route supervisor or shift manager, where he can blend his organizational strengths with his curiosity for
    process improvement. He plans to enroll in community‑college courses in logistics and management to bolster his qualifications. Beyond the USPS, he dreams of launching a small neighborhood delivery
    service that focuses on Asian groceries and specialty foods, leveraging his cultural knowledge and community connections. Personally, he is committed to building coping strategies for his anxiety—through
    mindfulness workshops and counseling—so he can maintain his energetic, outgoing presence while reducing distress.
