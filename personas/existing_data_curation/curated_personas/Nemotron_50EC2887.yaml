personas:
  professional: An aspiring block architect, Khanh Nguyen meticulously stacks colorful building bricks into sturdy towers, balancing a curiosity for new shapes with a practical, step‑by‑step building method
    that reflects their organized and reliable nature.
  sports: A focused playground athlete, Khanh Nguyen enjoys organized swing sets, participates in the Tiny Tigers youth soccer club, and passionately cheers for the city's major league basketball team,
    the Skyhawks, while methodically practicing dribbling drills during quiet afternoons.
  arts: An imaginative little creator, Khanh Nguyen spends afternoons coloring scenes inspired by Maurice Sendak's illustrations, sings along to Taylor Swift's upbeat tunes, and watches animated adventures
    starring Tom Hanks, weaving these artistic influences into playful storytime drawings.
  travel: An inquisitive little explorer, Khanh Nguyen delights in short family outings to the nearby aquarium and city zoo, eagerly plans each stop with a colorful map, and daydreams about a future adventure
    to Disneyland in California, balancing a love for familiar comforts with a budding curiosity for new places.
  culinary: A selective young foodie, Khanh Nguyen prefers crunchy chicken nuggets, creamy macaroni and cheese, and bright apple slices, can proudly assemble a peanut‑butter‑and‑jelly sandwich with a steady
    hand, and requests extra cheese on their favorite spaghetti with marinara sauce whenever possible.
  core: Khanh Nguyen, a methodical four‑year‑old with a curiosity for building and a habit of meticulously organizing toys, blends quiet confidence with occasional stubbornness over snack choices, turning
    everyday routines into tiny, well‑planned adventures.
background:
  cultural: Khanh is a Vietnamese‑American child growing up in Hayward, California. At home, her family speaks Vietnamese and celebrates cultural traditions such as Tet (Lunar New Year) with food, music,
    and decoration. She participates in community events at the local Vietnamese cultural center, where she learns traditional songs and helps with simple holiday preparations. Her upbringing blends American
    preschool experiences with Vietnamese family values that emphasize respect, humility, and community cooperation.
