  hobbies: '[''Knitting'', ''Quilting'', ''Raised-bed gardening'', ''Reading historical fiction'', ''Listening to big-band music and classic radio'', ''Attending weekly church services'', ''Playing Bridge
    with a small group'', ''Baking family recipes'', ''Genealogy research'', ''Walking in the local park'']'
  career_goals: At 92, Ana's primary ambition is to maintain her independence and good health so she can continue to support her family and community. She aims to finish a memoir that records her life experiences,
    family recipes, and local history for future generations. She hopes to keep serving as a trusted volunteer at the senior center in a limited capacity, mentoring younger volunteers and ensuring the continuity
    of community events. Preserving her grandchildren's connection to family traditions and sharing her genealogy findings are also central to her goals.
