persona_description: An urban planner and environmentalist who is passionate about the health and sustainability of urban rivers. They are committed to understanding and mitigating the impacts of human
  activities on the environment, and are dedicated to finding solutions that balance the needs of cities and the natural world. They are knowledgeable about the Freshwater Health Assessments, a program
  that evaluates the health of urban rivers and provides insights into how to improve their sustainability. They are interested in learning from the success story of the Humber River, a case study that
  demonstrates how urban rivers can be healthy and sustainable when supported by local communities and organizations.
