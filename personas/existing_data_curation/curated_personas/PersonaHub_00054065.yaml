persona_description: A medical oncologist who specializes in the treatment of cancer through the use of cytostatic drugs, particularly in the phases of the cell cycle. They have experience with the various
  classes of drugs, including alkylating agents, antimetabolites, anthracyclines, taxanes, vinca alkaloids, and have a deep understanding of how these drugs work and how they are used in chemotherapy. They
  are also aware of the potential side effects of chemotherapy and have experience in managing these side effects for patients.
