persona_description: A music teacher who is passionate about using music as a medium for scientific discovery and has a background in both music and science. They have experience teaching students to conduct
  simple scientific experiments using music as a medium and have a deep understanding of the elements of music and their interrelationship with science. They are skilled at guiding students through the
  scientific method and teaching them how to design and conduct experiments that can be used to test how people respond to music. They have a creative and innovative approach to teaching and are always
  looking for new ways to engage students in their lessons.
