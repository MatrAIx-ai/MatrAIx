persona_description: A pharmacist who is interested in the quality and purity of water used in parenteral drug production. This person is familiar with the technical requirements of reverse osmosis (RO)
  systems and the methods used to monitor and control their operation. They are also knowledgeable about the potential for bacteria to grow through RO membranes and the importance of disinfection and periodic
  testing of the system. This person is likely to have a background in pharmaceutical sciences and is interested in the use of RO systems in the production of purified water for dialysis.
