  hobbies: '["Hiking", "Fly-fishing", "Snowshoeing", "Model truck collecting", "Classic car restoration", "Landscape photography", "Woodworking", "Volunteer fire department", "Local community events", "Reading
    automotive literature"]'
  career_goals: David aims to transition from a solo driver to a supervisory role where he can apply his organizational strengths to improve fleet operations. He plans to become a dispatch manager, integrating
    advanced routing software to boost efficiency for Colorado’s tourism and mining freight sectors. Over the next five years, he intends to earn additional CDL endorsements, including Hazardous Materials,
    and to develop a safety‑training curriculum for new drivers. With a long‑term vision of entrepreneurship, David hopes to launch a locally owned transportation service that emphasizes reliable, on‑time
    delivery and community partnership. Ultimately, he seeks a balanced schedule that reduces time on the road, allowing more presence at home while still contributing his expertise to the industry.
