personas:
  professional: Phuc Cheang, a budding problem-solver, channels curiosity and practicality into building intricate LEGO creations, experimenting with Scratch coding, and leading small teamwork projects
    with friends, showing early signs of a future software engineer.
  sports: Phuc Cheang thrives on the soccer field at the neighborhood park, coordinating small‑sided games with friends while cheering for the local professional team, City United FC, and participates in
    the town’s junior soccer league each spring, blending teamwork with a love for the sport.
  arts: Phuc Cheang immerses themselves in the vibrant world of graphic novels, from classic Marvel tales by Stan Lee to the adventurous panels of My Hero Academia, while sketching original characters inspired
    by anime and listening to the melodic pop of Billie Eilish, which together fuel their imagination and artistic growth.
  travel: Phuc Cheang enjoys family road trips to nearby national parks where they explore hiking trails with a trusty map, and dreams of traveling to Tokyo’s anime districts and Disney World’s magical
    realms, balancing careful planning with a love for spontaneous discovery when possible.
  culinary: Phuc Cheang eagerly assists in simmering aromatic pho broth and rolling crispy lumpia, while also experimenting with homemade pizza topped with mozzarella, basil, and pepperoni, showcasing a
    budding culinary curiosity and a palate that enjoys both comforting classics and adventurous flavors.
  core: Phuc Cheang is a reserved yet compassionate ten‑year‑old who balances a love for structured LEGO builds with spontaneous storytelling in Scratch, often forgetting to bring their glasses but never
    missing a chance to help a friend on the soccer field.
background:
  cultural: 'Phuc is a second-generation Vietnamese-Filipino American raised in Chicago''s vibrant multicultural neighborhoods. At home he speaks both English and Vietnamese, and his family celebrates a
    blend of traditions: Tet (Lunar New Year) with festive meals like bánh chưng and the Filipino fiesta with lechon and karaoke. Community gatherings at the local Vietnamese temple and the Filipino cultural
    center have taught him the values of respect for elders, hospitality, and cooperation. Growing up in a city known for its diverse food scene, Phuc enjoys exploring both Asian and Midwestern cuisines,
    and his cultural identity influences his love for sharing food and stories with friends.'
