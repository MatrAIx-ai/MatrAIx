  career_goals: Phuc dreams of a future where he can combine his love for helping others with his curiosity about how things work. He often talks about becoming a pediatric doctor so he can care for kids,
    or a software developer who creates educational games that make learning fun. He is also inspired by community leaders he sees at local events and imagines one day organizing neighborhood activities
    that bring people together. While he's still exploring, his ambition is to pursue a path that lets him make a positive impact on his peers and community.
