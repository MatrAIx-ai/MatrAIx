  career_goals: Michael aims to expand his practice into a boutique advisory firm that specializes in serving high‑net‑worth families seeking holistic financial solutions, including philanthropic and art‑investment
    strategies. He plans to obtain the Certified Financial Planner (CFP) and Chartered Financial Analyst (CFA) designations within the next two years to deepen his technical credibility. Michael also aspires
    to mentor junior advisors, develop community‑focused financial literacy programs in Layton, and author a book exploring the intersection of finance, art, and lifestyle. By leveraging technology and
    his network, he hopes to increase his client base by 30% and position his firm as a leading voice in innovative wealth management within the Intermountain West.
