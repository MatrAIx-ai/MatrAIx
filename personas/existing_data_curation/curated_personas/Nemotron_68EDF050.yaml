  career_goals: Although still very young, Joyce often talks about what she wants to be when she grows up. She imagines becoming a teacher because she enjoys helping friends learn new things and likes the
    idea of a structured classroom. She also loves animals and sometimes says she wants to be a veterinarian. Occasionally, she mentions wanting to be a dancer or a storyteller, reflecting her desire for
    creative flexibility. Overall, her ambitions blend a wish for caring, helpful roles with spaces for imaginative expression.
