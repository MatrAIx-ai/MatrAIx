  career_goals: Donald aims to move from his current managerial role into senior executive leadership, targeting positions such as Director of Technology, Chief Information Officer, or Chief Technology
    Officer at a forward‑thinking organization that values creativity and employee well‑being. He envisions spearheading large‑scale digital transformation projects that incorporate emerging technologies
    like AI, immersive media, and sustainable IT practices. Long‑term, he hopes to launch a boutique consultancy that helps arts and cultural institutions adopt tech solutions, allowing him to blend his
    passion for art with his technical expertise. He also seeks to develop a reputation as a thought leader on flexible work cultures and mental‑health‑aware management, leveraging his personal experience
    with anxiety to champion supportive workplace policies.
