persona_description: A team of scientists from the Carnegie Institution of Washington, including lead author Andrew Steele and his colleagues, who have conducted a comprehensive imaging and Raman spectroscopy
  study of the Martian meteorite Allan Hills 84001 and a terrestrial analogue from Svalbard. The study aims to determine whether the tiny carbonate globules in the meteorite were processed by living creatures
  from the Red Planet and if the macromolecular carbon is always associated with the mineral magnetite, which is known to act as a catalyst in the formation of organic molecules. The research is presented
  at NASA's Astrobiology Science Conference (AbSciCon) 2006 at the Ronald Reagan Building in Washington, D.C.
