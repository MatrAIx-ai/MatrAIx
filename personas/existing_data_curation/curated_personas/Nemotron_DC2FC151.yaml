  career_goals: Ingrid hopes to pursue a college degree in environmental science or public health, with the long‑term goal of working as a community health outreach coordinator on sustainable agriculture
    projects in Bucks County. She wants a career that blends her curiosity about the natural world with practical, people‑centered work, allowing her to help others while maintaining a flexible schedule
    that respects her need for personal space.
