  hobbies: '[''Gospel choir singing'', ''Cooking Southern cuisine'', ''Hiking'', ''Reading psychological thrillers'', ''Playing chess'', ''Volunteering for STEM outreach'', ''Participating in hackathons'',
    ''Yoga'', ''Traveling to music festivals'']'
  career_goals: Quanika aims to transition into a technical leadership role—ideally as a Lead Full‑Stack Architect or Engineering Manager—where she can shape development processes, champion best‑in‑class
    code quality, and drive innovative product roadmaps. She is determined to earn an AWS Solutions Architect certification and deepen her expertise in cloud‑native architectures. Passionate about representation,
    she plans to launch a mentorship program for Black women in tech across South Carolina and to become a regular speaker at national conferences, sharing insights on inclusive engineering culture and
    resilient software design. Long‑term, she envisions founding a boutique consultancy that partners with community nonprofits to build digital solutions that uplift under‑served populations, while maintaining
    a balanced schedule that mitigates stress.
