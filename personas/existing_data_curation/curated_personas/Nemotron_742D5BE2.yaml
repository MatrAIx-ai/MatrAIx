personas:
  professional: Quanika Gilmore, a seasoned full‑stack web developer specializing in React, TypeScript, and Node.js, leverages their structured, performance‑driven mindset and talkative charisma to champion
    rigorous testing, clear documentation, and stakeholder communication while fiercely benchmarking every release.
  sports: Quanika Gilmore enjoys weekend hikes in the Blue Ridge foothills, practices yoga at Lighthouse Yoga Studio, competes in weekly chess tournaments with the Greenville Chess Club, and loyally follows
    the Carolina Panthers, Clemson Tigers, and Charlotte Hornets, often sporting their colors on game nights.
  arts: Quanika Gilmore shines as a lead soprano in their local church choir, thrives at music festivals like Bonnaroo and Austin City Limits, and draws creative energy from artists such as Stevie Wonder,
    Beyoncé, and John Legend, weaving those influences into both personal projects and problem‑solving at work.
  travel: Quanika Gilmore favors road‑trip itineraries that blend music festival stops—such as New Orleans' Jazz & Heritage Festival—with nature escapes to the Great Smoky Mountains and historic towns like
    Savannah, carefully budgeting each journey while mixing detailed planning with spontaneous detours to decompress from work stress.
  culinary: Quanika Gilmore delights in reimagining classic Southern comfort dishes—like shrimp and grits with a chipotle‑infused broth, smoked‑paprika fried chicken, and sweet potato pie topped with toasted
    pecans—cooking at a moderate skill level and favoring ingredients such as collard greens, okra, buttermilk, and pecans, often hosting dinner gatherings for friends and choir members.
  core: Quanika Gilmore is a detail‑obsessed, socially vibrant tech leader who channels competitive drive and occasional stress into high‑performing code, soulful singing, and meticulously planned road
    trips, all while balancing a love for Southern cooking and community mentorship.
background:
  cultural: Quanika was raised in a close‑knit African‑American family in the South, where the church played a central role in community life and shaped her values of resilience, service, and collective
    celebration. Her heritage includes stories of the Great Migration and the civil‑rights movement, instilling a deep sense of responsibility to uplift her community. She embraces the rich traditions of
    Black Southern cuisine, gospel music, and familial storytelling, while also navigating the complexities of being a Black woman in a predominantly white tech industry. Quanika is actively involved in
    regional Black professional networks, such as Black Tech SC, and she mentors young Black students through STEM outreach programs, bridging her cultural identity with her professional aspirations.
