  hobbies: '[''Book club participation'', ''Trivia nights'', ''Bridge tournaments'', ''Community fitness classes'', ''Butterfly gardening'', ''Culinary experimentation'', ''Volunteering at the library'',
    ''Hiking in state parks'']'
  career_goals: Although Juliana is currently not part of the formal workforce, she aims to leverage her organizational talents and community passion by taking on a leadership role within a local non‑profit
    board, such as the Citrus County Senior Services Council. She also hopes to earn a certification in nonprofit management from a nearby community college to formalize her expertise. Long‑term, she dreams
    of publishing a guidebook that blends practical home‑improvement tips with sustainable gardening advice for Florida residents, and she envisions mentoring younger volunteers to help them develop the
    same high standards of achievement she values.
