personas:
  professional: Juliana Keel, a seasoned community event planner and aspiring non‑profit board member, leverages meticulous spreadsheet‑driven budgeting, volunteer coordination, and dynamic public‑speaking
    to turn local initiatives like the senior boot‑camp fundraiser into smoothly executed programs, while her competitive streak ensures every project surpasses previous benchmarks.
  sports: Juliana Keel energizes her mornings with Zumba classes at the Citrus County community center and joins a senior boot‑camp league, while cheering for the Tampa Bay Rays and the Orlando Magic, and
    competes in local bridge tournaments that keep her mind sharp.
  arts: Juliana Keel cultivates a vibrant arts life by moderating a book club that often discusses works by Margaret Atwood and Chimamanda Adichie, attending the annual Sarasota Film Festival, and dancing
    to live performances by local folk band The Citrus Strings, while she also curates a small Instagram gallery of butterfly garden photography.
  travel: Juliana Keel plans her travels like a project, using detailed itineraries to explore Florida’s Everglades and Ocala National Forest, taking weekend road trips to Savannah for its historic charm,
    and dreaming of a two‑week eco‑tour of Costa Rica’s butterfly reserves, all while balancing budget constraints and family commitments.
  culinary: Juliana Keel blends Southern comfort staples like fried green tomatoes and shrimp and grits with Thai chilies, Korean gochujang, and Mexican mole, crafting experimental dishes such as jambalaya
    with lemongrass broth, while her pantry staples include okra, fresh basil, and mango, and she rates her culinary successes on a personal 5‑star scale.
  core: Juliana Keel is a hyper‑organized, curiosity‑driven community champion who balances competitive precision with sociable energy, but often buries herself in spreadsheets, forgets to pause for rest,
    and hoards quirky kitchen gadgets.
background:
  cultural: Juliana grew up in a middle‑class, white American family with deep roots in the southeastern United States. She was raised on a blend of traditional Southern values—emphasis on community, hospitality,
    and self‑reliance—paired with a modern, pragmatic outlook shaped by her lifelong curiosity. Living in Lecanto, FL, she has embraced the Floridian lifestyle, incorporating outdoor activities, a love
    for citrus groves, and a strong sense of regional pride. Her cultural identity is further influenced by regular involvement in a Protestant church community, which reinforces her sociable, service‑oriented
    character while also providing a framework for her disciplined approach to personal and communal goals.
