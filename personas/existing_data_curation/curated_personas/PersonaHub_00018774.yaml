persona_description: A sociologist who specializes in the study of social inequality and wealth accumulation, particularly in the context of the United States. This person is likely to be interested in
  understanding the historical and contemporary dynamics of wealth distribution and how they have affected the lives of the current generation of Americans. They are likely to have a deep understanding
  of the factors that contribute to the accumulation of wealth, such as inheritance and the impact of unequal access to education, job opportunities, and housing. They may also have a keen interest in the
  potential consequences of a patrimonial society, such as the waste of talent and the stagnation of economic and social progress.
