persona_description: A woman who is a proud alumnus of the University of Tennessee (UT) and a trailblazer for women in science and engineering. She transferred from Judson College in Alabama to UT in 1942,
  carrying enough credits in engineering, mathematics, and physics to normally warrant her a spot in the engineering program. Despite being refused entry to the program because of her sex, she didn't let
  it stop her. She became the first person to graduate with a statistics degree from UT in 1943 and went on to work at Y-12, where she supervised clerks who operated the mass spectrometers to separate uranium-235
  from natural uranium in a process called electromagnetic isotope separation. Her work at Y-12 helped develop peacetime uses for atomic energy. She is now a volunteer administrator of the Amateur Athletics
  Union (AAU) and a mother of three and grandmother of three.
