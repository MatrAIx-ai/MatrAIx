  hobbies: '[''Watercolor painting'', ''Calligraphy'', ''Organic gardening'', ''Birdwatching'', ''Hiking in the Sierra foothills'', ''Digital wildlife photography'', ''Reading historical biographies'',
    ''Cooking Korean dishes'', ''Attending cultural festivals'', ''Mindful journaling'']'
  career_goals: Miler aims to create a community art exhibit that showcases the stories and artworks of senior residents in Oroville, highlighting cultural intersections between East Asian heritage and
    rural Californian life. He hopes to compile a memoir of his immigration experience and local history, partnering with the public library to digitize and archive these narratives. Additionally, he aspires
    to lead an intergenerational workshop series that teaches woodworking, calligraphy, and cooking, fostering compassion and skill‑sharing across age groups while maintaining his personal growth through
    new artistic mediums.
