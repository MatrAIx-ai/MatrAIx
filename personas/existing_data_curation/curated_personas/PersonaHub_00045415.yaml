persona_description: A neuroscientist who specializes in the study of brain injury and the development of new methods for diagnosing and treating neurological disorders. Bailes has worked extensively with
  the UCLA team, which developed the PET scan method for identifying signs of CTE in living brains. He is passionate about understanding the biological details of the condition and the potential for developing
  treatments or preventing it. Bailes is dedicated to improving the diagnosis and treatment of CTE in living people, and his research has the potential to save lives.
