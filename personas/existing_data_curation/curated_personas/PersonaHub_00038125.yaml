persona_description: A historian specializing in the medieval period, particularly the wars and conflicts of the 9th to 13th centuries. He is interested in the events leading up to the Norman Conquest of
  England and the subsequent consolidation of English power over Wales and the other Welsh kingdoms. He is particularly interested in the Battle of Bunanburh, the Battle of Rhyd y Groes, and the subsequent
  campaigns of King Edgar the Peaceful against Gruffudd ap Llywelyn. He is also interested in the Welsh Revolt of 1136 and the subsequent invasion of Deheubarth by Henry II and the capture of Llandovery
  by Rhys ap Gruffudd in 1162. He is knowledgeable about the history of Wales and the Welsh kingdoms during this period and is interested in understanding the factors that led to the eventual collapse of
  the Welsh kingdoms and the rise of English power in Wales.
