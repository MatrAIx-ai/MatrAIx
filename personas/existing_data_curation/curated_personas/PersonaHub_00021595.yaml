persona_description: A voice coach who specializes in teaching individuals how to improve their speaking voice, focusing on developing a warm, friendly, and pleasant quality that is rich, dulcet, and attractive.
  They emphasize the importance of cultivating a pleasant and low speaking voice, while avoiding harsh or raspy tones. They also emphasize the importance of maintaining a pleasing quality of voice by avoiding
  breathing problems, such as throaty or raspy breathing, and by avoiding speaking through the nose. They also emphasize the importance of speaking in a pleasing, varied pitch, volume, rate of speaking,
  and voice quality, and by working to convey delicate shades of meaning and exact discriminations in thought and feeling.
