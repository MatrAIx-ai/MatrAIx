  career_goals: Amy dreams of becoming a multimedia artist who can blend illustration, storytelling, and interactive media. She aims to attend a specialized high school for the arts, then study graphic
    design or animation at university. She hopes to one day create her own comic series and maybe work on video game art, while also using her creativity to run community art workshops for kids, providing
    a supportive space that encourages curiosity and emotional well‑being.
