personas:
  professional: Amy Thorne, a budding digital illustrator and junior game‑design enthusiast, blends her love for watercolor and sketching with her curiosity for coding on Scratch, creating whimsical Minecraft‑style
    concept art that thrives on spontaneous bursts of inspiration, even if her relaxed, somewhat disorganized workflow sometimes leaves deadlines unchecked.
  sports: Amy Thorne plays on the Portland Youth Soccer Club’s U‑13 team during the spring, enjoys weekend bike rides along the Willamette River, follows the Portland Timbers (MLS) and Portland Trail Blazers
    (NBA) avidly, and occasionally watches the Portland Thorns (NWSL) matches with family, using the activity to balance screen time and channel creative energy.
  arts: Amy Thorne immerses themselves in indie music playlists featuring Mitski, Phoebe Bridgers, and Tame Impala, studies watercolor techniques inspired by artists like Jean Horne and Yayoi Kusama, writes
    short fantasy stories echoing J.K. Rowling’s world‑building, and participates in school drama club improv sessions that hone their expressive storytelling.
  travel: Amy Thorne prefers short, family‑oriented road trips to nearby museums such as the Portland Art Museum and seasonal festivals like the Portland Rose Festival, while dreaming of backpacking through
    the misty castles of Scotland and the geothermal wonders of Iceland, balancing a love for spontaneous day excursions with the constraints of a modest allowance.
  culinary: Amy Thorne enjoys crafting simple meals like avocado toast with lemon zest and experimenting with colorful fruit salads inspired by watercolor palettes, delights in ordering sushi rolls with
    cucumber and pickled ginger, and eagerly devours homemade mac and cheese while occasionally attempting to bake cupcakes featuring pastel frosting.
  core: Amy Thorne is a whimsical 12‑year‑old who channels a restless curiosity into art, code, and indie beats, yet often battles anxiety and a habit of leaving projects half‑finished in favor of the next
    creative spark.
background:
  cultural: Amy comes from a White, middle‑class family with roots in the Northeastern United States. Growing up in Elmhurst, Queens, she is immersed in a vibrant multicultural neighborhood, where she regularly
    encounters diverse languages, cuisines, and cultural celebrations. Her family values education, artistic expression, and community involvement, encouraging her to explore the rich cultural tapestry
    of the city while maintaining a sense of personal heritage.
