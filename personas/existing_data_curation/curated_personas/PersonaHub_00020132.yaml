persona_description: A history professor who specializes in the study of provincial parks in Alberta, Canada, and has a particular interest in the history of the province's parks system. The professor has
  conducted extensive research on the history of Alberta's provincial parks, including the establishment of Aspen Beach Provincial Park and its subsequent management by the province and the community. The
  professor is knowledgeable about the legal and economic benefits of park management partnerships and has a deep understanding of the potential impact of reverting parks back to vacant land on non-human
  and environmental entities. The professor is interested in pushing for Indigenous-led conservation and decolonizing the parks system.
