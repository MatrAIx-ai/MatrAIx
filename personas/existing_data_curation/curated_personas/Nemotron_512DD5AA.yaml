personas:
  professional: Matthew Morgan is a computer support specialist at a mid-sized IT service firm in Grand Rapids, where their expertise across Windows, macOS, and Linux, combined with a knack for translating
    tech jargon into friendly explanations and a curiosity for automation scripts, makes them the go‑to problem‑solver for both corporate clients and local non‑profits.
  sports: Matthew Morgan plays point guard in a local recreational basketball league, roots for the Detroit Pistons and Grand Rapids Griffins, hikes the Porcupine Mountains on weekends with a Raspberry Pi‑powered
    tracker, and squeezes in yoga after particularly stressful shifts.
  arts: Matthew Morgan sketches daily in a Moleskine, experiments with Procreate, frequents gallery openings at the Grand Rapids Art Museum to admire works by Kehinde Wiley and regional painter John Werner,
    and volunteers as a docent for a community mural project that celebrates local heritage.
  travel: Matthew Morgan enjoys weekend getaways hiking the Upper Peninsula’s waterfalls, savoring Traverse City cherry pie, while also planning a future backpacking trek through the Scottish Highlands,
    booking budget AirBnB stays in Denver and Chicago but occasionally splurging on an art‑focused retreat in Portland to recharge creative batteries.
  culinary: Matthew Morgan cooks a reliable Michigan cherry chicken salad, whips up fresh fish tacos with whitefish from Grand Haven, pairs meals with locally roasted coffee from Madcap and a Founders craft
    beer, and occasionally over‑season dishes when stress spikes, leading to palate overload.
  core: Matthew Morgan merges tech troubleshooting with a sketchbook habit, channeling curiosity, compassion, and anxiety‑driven budget vigilance into a life of community art projects, basketball, and Michigan‑inspired
    outdoor adventures.
background:
  cultural: Matthew grew up in a middle‑class family in the Grand Rapids region, where a blend of Midwestern practicality and a growing arts scene shaped his outlook. His ancestry includes German and Irish
    roots common to the area, and he was raised with values of hard work, community involvement, and modesty. The local Dutch‑American heritage and the city’s reputation for breweries, museums, and volunteerism
    have cultivated his appreciation for both tradition and creative expression. He feels a strong connection to the collaborative spirit of Kent County, often participating in neighborhood events, supporting
    local artists, and contributing to community service initiatives.
attributes:
  skills: '[''Hardware troubleshooting'', ''Software installation and configuration'', ''Operating system support (Windows, macOS, Linux)'', ''Network basics and Wi‑Fi troubleshooting'', ''Active Directory
    management'', ''Remote desktop assistance'', ''Ticketing system administration (ServiceNow, JIRA)'', ''Technical documentation'', ''Customer service and empathetic communication'', ''Automation scripting
    (PowerShell, Python)'']'
  hobbies: '[''Sketching and digital illustration'', ''Recreational basketball'', ''Board‑game nights'', ''Community hackathons'', ''Tutoring high‑school students in computing'', ''Volunteering at food
    pantry'', ''Hiking in Michigan'', ''Raspberry Pi DIY projects'', ''Listening to tech‑design podcasts'']'
  career_goals: 'Matthew aims to advance from a computer support specialist to a senior technical support engineer within the next three years, securing certifications such as CompTIA Network+, Security+,
    and Microsoft Certified: Azure Administrator. He envisions eventually moving into a systems analyst role where he can blend his technical expertise with his passion for user experience, helping design
    intuitive IT solutions for both corporate clients and local non‑profits. Long‑term, he hopes to lead a community tech outreach program in Grand Rapids that provides digital literacy training and technology
    mentorship, leveraging his compassionate nature and desire to foster harmony.'
