personas:
  professional: Sol Leiva, a 24‑year‑old telecommunications technician with deep expertise in RF theory, microwave link maintenance, and fiber‑optic networking, they translate their meticulous organization
    and competitive drive into flawless antenna installations, tower climbs, and precise FCC‑compliant documentation while staying open to experimental problem‑solving inspired by their love of art and
    DIY electronics.
  sports: Sol Leiva, a 24‑year‑old outdoor enthusiast, they hike the trails of Memorial Park and Buffalo Bayou while clubbing at Texas Rock Gym for bouldering, follow the Houston Rockets and Houston Astros
    for competitive morale, and maintain a flexible fitness routine that blends solitary jogging with occasional pickup basketball games among a small circle of friends.
  arts: Sol Leiva, a 24‑year‑old connoisseur of contemporary art, they spend weekends wandering Houston's Museum District, drawing inspiration from artists like Olafur Eliasson and Tania Bruguera for interactive
    installations, curate playlists featuring Aphex Twin, Autechre, and Flying Lotus that fuel their Arduino projects, and uncover sci‑fi narratives from William Gibson and Margaret Atwood during solitary
    reading sessions.
  travel: Sol Leiva, a 24‑year‑old adventure‑curious traveler, they prefer meticulously planned weekend trips to nearby art hubs like Austin’s East Austin Studio, embark on solo backpacking excursions to
    the rugged landscapes of Patagonia for photography, and dream of a tech‑focused cultural tour of Berlin’s maker scene, balancing budget constraints with a desire for immersive experiences.
  culinary: Sol Leiva, a 24‑year‑old home chef, they boast a solid skill set in preparing traditional Mexican dishes such as tacos al pastor, chicken mole, and chiles en nogada, often experiment with smoke‑infused
    plating and incorporate fresh cilantro, lime, and dried ancho chilies, while also curating themed dinner nights that pair experimental electronica soundtracks with multi‑course menus.
  core: Sol Leiva, a 24‑year‑old blend of meticulous engineer and avant‑garde artist, they balance tower climbs with museum visits, channel competitive ambition into both career and DIY electronics, yet
    occasionally let skepticism fuel a reluctant social life and a habit of over‑caffeinating during late‑night coding marathons.
background:
  cultural: Sol grew up in a Mexican‑American household in Houston, where Spanish was spoken at home and family traditions such as Día de los Muertos, quinceañeras, and weekend tamales were integral to
    her identity. Her parents emphasized the value of hard work and community, which shaped her reliable and competitive nature. She maintains strong ties to the vibrant Mexican community in Harris County,
    participating in cultural festivals and supporting local Mexican businesses. While she respects Catholic customs, Sol also embraces the city’s multicultural vibe, blending her heritage with the diverse
    artistic and technological scenes of Houston.
attributes:
  skills: '[''RF system installation'', ''Microwave link troubleshooting'', ''Fiber optic splicing and testing'', ''Antenna alignment and tower climbing'', ''Signal analysis with spectrum analyzers'', ''Technical
