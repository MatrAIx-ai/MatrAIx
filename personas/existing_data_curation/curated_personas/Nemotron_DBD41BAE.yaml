  hobbies: '[''Visiting contemporary art galleries'', ''Listening to experimental electronic music'', ''DIY electronics projects with Arduino and Raspberry Pi'', ''Urban photography'', ''Reading science‑fiction
    novels'', ''Cooking traditional Mexican dishes'', ''Hiking in Memorial Park'', ''Practicing calligraphy'']'
  career_goals: Sol aims to become a senior field engineer in a major telecommunications provider or a specialist contractor, leading small installation teams and overseeing complex projects. She plans
    to earn industry certifications such as ETA Certified Telecommunications Technician, CompTIA Network+, and Cisco CCNA to broaden her expertise. Over the next five years she hopes to transition into
    network design, leveraging her hands‑on experience to create optimized radio and fiber architectures for smart‑city initiatives. Ultimately, Sol envisions launching her own consulting firm that combines
    technical services with creative audio‑visual installations for art venues, satisfying both her competitive drive and artistic curiosity.
