  career_goals: Although still five, Caleb frequently talks about future jobs that blend his love of helping others with his curiosity about how things work. He dreams of becoming a firefighter because
    he admires the clear, practical routine and the chance to protect his community. He also expresses interest in engineering – especially designing simple machines or building sturdier Lego creations.
    In his imagination, he sees himself mastering a small‑scale “tool kit” to fix toys and maybe one day work on real‑world projects, reflecting his competitive drive to be the best at problem‑solving.
