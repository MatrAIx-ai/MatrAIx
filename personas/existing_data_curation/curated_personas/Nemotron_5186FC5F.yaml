personas:
  professional: Deven Ros, a retired corporate strategist with a razor‑sharp instinct for market analysis, now channels their decades‑long expertise in budgeting, governance, and stakeholder negotiation
    into mentoring budding entrepreneurs at Columbus‑based accelerators, while their love of unconventional ideas and occasional disorganization means they prefer intimate, impromptu brainstorming sessions
    over rigid conference calls.
  sports: Deven Ros enjoys low‑impact fitness through morning walks along the Scioto Mile, occasional rounds of golf at the Columbus Country Club, and cheering for the Cleveland Guardians in baseball and
    Ohio State Buckeyes football, while they belong to a senior tennis league that meets each spring, preferring consistent, community‑oriented activity over high‑intensity training.
  arts: Deven Ros, an avid photographer and art patron, frequents the Columbus Museum of Art to study works by Grant Wood and contemporary installations by local artist Kara Freeman, while they regularly
    attend intimate performances by folk legends like Bob Dylan and indie singer‑songwriter Sturgill Simpson, weaving these experiences into their own DIY woodworking projects inspired by American folk
    craftsmanship.
  travel: Deven Ros favors spontaneous, weekend‑long road trips that blend art festivals—such as the Bentonville Film Festival in Arkansas—and small‑town charm, having recently explored the historic galleries
    of Marfa, Texas, and planning to visit the International Quilt Museum in Lincoln, Nebraska, all while balancing a modest travel budget that prioritizes train travel over expensive flights.
  culinary: Deven Ros delights in cooking hearty Midwestern fare like chicken pot pie with a crust made from locally milled rye flour and experimenting with new flavors like Korean kimchi fried rice, often
    sourcing fresh herbs from their garden and savoring a glass of Riesling while listening to a vinyl record of Irish folk ballads.
  core: Deven Ros blends a relentless curiosity for art and history with a competitive, spontaneous spirit, navigating retirement by mentoring young leaders, curating community exhibitions, and indulging
    in weekend adventures, all while juggling a penchant for occasional disorganization and a steadfast Midwestern work ethic.
background:
  cultural: Deven was raised in a middle‑class, white Anglo‑American family in the Midwest, with German‑Irish heritage. Growing up in Columbus, Ohio, he absorbed values of independence, self‑reliance, and
    community involvement while developing a deep appreciation for American folk art and Midwestern cultural traditions. His cultural outlook blends a respect for classic American work ethics with an open‑minded
    curiosity toward diverse artistic expressions and new ideas.
