  hobbies: '["Art Gallery Visits", "Street Photography", "Philosophy and History Reading", "Gardening", "Woodworking", "Small‑Venue Live Music", "Exploring New Culinary Experiences", "Spontaneous Weekend
    Road Trips", "Community Volunteering"]'
  career_goals: Although retired from formal employment, Deven aims to remain intellectually active by mentoring young business leaders through local accelerator programs in Columbus. He aspires to curate
    community art exhibitions that showcase emerging talent, write a memoir reflecting on his career and personal philosophy, and embark on spontaneous road trips to art festivals and cultural sites. Additionally,
    he hopes to support his spouse's charitable initiatives and contribute volunteer time to civic organizations, leaving a lasting imprint on both the business and arts communities.
