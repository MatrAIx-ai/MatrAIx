  career_goals: Although retired from formal employment, Soheir channels her drive into community leadership and knowledge sharing. Her primary ambition is to establish a locally recognized "Sustainable
    Homestead Initiative" that offers hands‑on workshops in organic gardening, food preservation, and efficient household organization for residents of Owyhee County. She aspires to serve on the county's
    Planning and Zoning Advisory Committee to influence policies that support small‑scale agriculture and responsible land use. Over the next five years, she hopes to author a practical guidebook that blends
    her organizational expertise with sustainable living practices and to receive a regional award for community service.
