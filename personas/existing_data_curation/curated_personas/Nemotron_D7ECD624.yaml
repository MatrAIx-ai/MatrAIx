  hobbies: '[''Gardening'', ''Woodworking'', ''Knitting'', ''Reading historical non-fiction'', ''Walking along the Inner Harbor'', ''Community garden volunteering'', ''Teaching basic metalworking to youth'',
    ''Guided meditation'', ''Journaling'', ''Classic rock and jazz listening'', ''Coffee catch‑ups with friends'']'
  career_goals: At 56, Yvonne aims to transition into a supervisory or training role within the plant, such as Shift Lead or Safety Coordinator, and obtain a Certified Manufacturing Technologist (CMfgT)
    credential. She hopes to mentor apprentices, lead continuous‑improvement projects, and eventually teach part‑time at a community college's metalworking program. Her goals include securing a stable,
    less physically demanding schedule, ensuring a safe workplace, achieving financial security for retirement, and reducing daily stress while maintaining her hands‑on expertise.
