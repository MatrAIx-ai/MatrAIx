  career_goals: Destinie aspires to a career that blends her curiosity about science with a practical way to help others. She envisions becoming a pediatric nurse or child psychologist, aiming to support
    the health and emotional well‑being of children. She plans to attend a science‑focused high school, pursue a degree in biology or health sciences, and eventually work in a hospital or community health
    clinic. Her disciplined nature also keeps the option of becoming a science teacher open, where she could share knowledge and foster harmony in the classroom.
