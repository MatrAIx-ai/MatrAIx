personas:
  professional: Destinie Bruneman, an aspiring junior robotics engineer, channels their meticulous organization and practical curiosity into designing simple competition-ready robots for the school's robotics
    club, while also leading classroom events and crafting study guides that reflect their achievement-driven mindset.
  sports: Destinie Bruneman, a committed midfielder for the Midtown Dragons Soccer Club who cheers for City United during the MLS season, combines rigorous after-school drills and weekend matches with a
    structured warm-up routine, while balancing active garden chores to maintain overall fitness and avoid overexertion.
  arts: Destinie Bruneman, a budding pianist who tackles Beethoven's 'Für Elise', sketches serene riverbank scenes inspired by Claude Monet, and devours mystery novels by Agatha Christie, channels their
    compassionate nature into volunteering at the library's reading program, using art and literature to foster community harmony.
  travel: Destinie Bruneman, an adventurous yet organized traveler, enjoys meticulously planned weekend trips to nearby Riverbend State Park and family outings to Washington, D.C.'s National Air and Space
    Museum, while dreaming of a future excursion to Tokyo's Miraikan science museum, always balancing curiosity-driven itineraries with the modest budget of a middle-school student's family.
  culinary: Destinie Bruneman, an enthusiastic home cook, relishes creating homemade pizza topped with fresh basil and tomatoes harvested from the family garden, whips up a carrot-ginger soup for cooling
    after soccer, and bakes strawberry shortcake on weekends, despite occasionally overcooking spaghetti while multitasking with LEGO builds.
  core: Destinie Bruneman, an eleven-year-old curiosity-driven organizer, balances disciplined achievements in robotics and soccer with a compassionate streak that fuels community service, all while juggling
    a penchant for late-night LEGO marathons that occasionally erode their sleep schedule.
background:
  cultural: Destinie grows up in West Columbia, South Carolina, a community rooted in Southern hospitality, close‑knit family ties, and a strong sense of local tradition. Her family participates in church
    activities and community festivals such as the Columbia Festival of the Arts, valuing education and service. The region's mild climate and proximity to the Congaree River nurture an appreciation for
    outdoor activities like gardening and nature walks. While she identifies as white and reflects the cultural norms of a middle‑class Southern upbringing, her household encourages both respect for tradition
    and a modern emphasis on curiosity, personal achievement, and helping others.
