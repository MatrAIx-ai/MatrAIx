personas:
  professional: Daumier Brunson, a veteran commercial landscaper with six decades of hands‑on experience, blends disciplined project management, meticulous crew supervision, and a deep curiosity for artistic
    planting to create sustainable, sculpture‑inspired outdoor spaces that honor the communal spirit of Dallas neighborhoods, and they take pride in mentoring younger workers.
  sports: Daumier Brunson, a loyal fan of the Dallas Cowboys and the Dallas Mavericks, spends Sunday afternoons at the local community center playing casual basketball and joining a seniors’ walking club
    that meets at Klyde Warren Park, while they also tend to a modest backyard putting green for gentle golf practice.
  arts: Daumier Brunson, an avid patron of the Dallas Museum of Art, draws inspiration from the works of Jacob Lawrence and Romare Bearden, often humming Miles Davis and Etta James while hand‑crafting sculptural
    planting beds, and they regularly attend gospel choir rehearsals at their church where they contribute barbershop‑style harmonies.
  travel: Daumier Brunson favors road‑trip pilgrimages to Southern cultural hubs such as New Orleans for its jazz heritage, Charleston for its historic plantations, and the Texas Hill Country for its native
    wildflowers, while they plan future family visits to the historic Tuskegee campus to explore its agricultural legacy.
  culinary: Daumier Brunson loves to serve soul‑food classics like smoked brisket, collard greens seasoned with fresh garden herbs, cornbread with honey butter, and sweet potato casserole at neighborhood
    potlucks, and they meticulously tend heirloom tomato vines that become the star of their homemade gazpacho during summer gatherings.
  core: Daumier Brunson is a disciplined, art‑driven landscaper who balances meticulous work, community mentorship, a love for soulful music, and a habit of over‑watering their plants while worrying about
    the future, and they never miss a chance to share a fresh harvest.
background:
  cultural: Daumier grew up as a Black Texan in a close-knit African-American community in Dallas. His family’s roots trace back to the Great Migration of the mid-20th century, bringing Southern traditions,
    gospel music, and a strong emphasis on church, family, and communal support. In Dallas, he has been shaped by the city’s historic Black neighborhoods, Juneteenth celebrations, and the enduring barbershop
    and soul-food culture. These influences fostered his appreciation for collective achievement, respect for elders, and a love of artistic expression—whether through music, visual art, or the cultivated
    beauty of outdoor spaces. His cultural identity informs his commitment to mentoring younger Black workers and preserving community spaces that reflect the heritage of Dallas’s African-American residents.
attributes:
