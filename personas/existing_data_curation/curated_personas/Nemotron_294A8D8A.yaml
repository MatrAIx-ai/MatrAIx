personas:
  professional: Coral Jones is an emerging senior visual artist and poet who leads informal workshops at the Daleville Community Center, channeling their vivid imagination into abstract watercolors while
    often wrestling with self‑imposed deadlines because of a spontaneous, non‑linear workflow.
  sports: Coral Jones enjoys low‑impact exercise, taking daily walks through their garden and participating in a local senior walking club that meets on Saturday mornings, while cheering for the nearby
    Daleville State Cougars college basketball team and occasionally playing a relaxed game of pickleball at the community center.
  arts: Coral Jones immerses themselves in the arts by painting watercolors inspired by native perennials, listening to folk legends like Joan Baez and classical composers such as Debussy, and attending
    the monthly Daleville book club where they discuss Southern Gothic novels and share original poetry.
  travel: Coral Jones favors purposeful travel, planning weekend trips to regional art museums such as the Birmingham Museum of Art and the High Museum in Atlanta, while dreaming of a writer’s retreat at
    Yaddo in New York, preferring quiet, solo itineraries over crowded tours.
  culinary: Coral Jones relishes simple garden‑to‑table cooking, often preparing herb‑infused vegetable soups, fresh caprese salads with heirloom tomatoes, basil, and mozzarella, and baking lavender shortbread,
    favoring fresh herbs from their own backyard.
  core: Coral Jones is a solitary, imaginative senior artist who balances a gentle, self‑care routine with occasional anxiety‑driven impulsivity, using art and nature as anchors against a backdrop of gentle
    financial frugality and modest fitness habits.
background:
  cultural: Coral grew up in a modest, multigenerational family in Daleville, Alabama, where Southern customs and the rhythms of rural life shaped her early years. The region’s emphasis on hospitality,
    church gatherings, and community festivals contributed to her cooperative nature, while the surrounding pine forests and coffee farms sparked a lifelong love for nature. Influenced by local folk‑art
    traditions and the storytelling of Southern Gothic literature, she incorporates elements of regional culture into her abstract artwork and poetry. Though she never married, her close‑knit circle of
    friends and church acquaintances reflects the strong communal ties typical of small‑town Alabama.
