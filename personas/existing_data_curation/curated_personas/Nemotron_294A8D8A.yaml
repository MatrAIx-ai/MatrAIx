    small book club"]'
  career_goals: Coral aims to complete a personal series of abstract watercolor paintings that reflect her inner emotional landscape and to self‑publish a collection of poems exploring memory, solitude,
    and Southern heritage. She hopes to enroll in a community college art history class to deepen her understanding of modern art. Additionally, she aspires to mentor younger members of a small art circle
    at the Daleville Community Center, sharing her techniques and encouraging creative expression. On a personal level, she wants to travel to regional art museums, attend a writer’s retreat, and develop
    a daily mindfulness practice to manage her anxiety.
