  hobbies: '[''Cooking Salvadoran dishes'', ''Yoga and meditation'', ''Journaling'', ''Reading contemporary fiction and self‑help books'', ''Volunteering at community center'', ''Salsa dancing'', ''Hiking'',
    ''Listening to Latin music'']'
  career_goals: Telma aims to finish her bachelor's degree in Business Administration within the next two years and obtain a Project Management Professional (PMP) certification. She envisions a career as
    a Community Development Coordinator or Project Manager for a nonprofit organization that serves Latinx families in Central Florida, where she can blend her organizational skills with her commitment
    to cultural advocacy. Long‑term, she hopes to launch a small catering business focused on authentic Salvadoran cuisine, providing employment opportunities for members of her community while preserving
    her heritage. Throughout her professional journey, she seeks roles that offer structure, stability, and the chance to make a positive impact on others.
