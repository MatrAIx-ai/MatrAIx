personas:
  professional: Telma Ramos, a 22‑year‑old aspiring community development coordinator, leverages their bilingual fluency, meticulous spreadsheet management, and proficiency with Trello and Asana to orchestrate
    nonprofit projects, and they balance curiosity‑driven innovation with a methodical, reliability‑focused work ethic.
  sports: Telma Ramos stays fit by hiking the trails of nearby nature preserves and dancing salsa at local studios, follows Orlando City SC in the MLS and the Florida Gulf Coast Eagles women's basketball
    team, and they occasionally join a weekend recreational volleyball league to balance structured exercise with social play.
  arts: Telma Ramos nurtures their artistic side by devouring contemporary fiction from authors like Sally Rooney and personal‑development works by Brené Brown, regularly listening to Latin pop icons such
    as Bad Bunny and Romeo Santos, and they volunteer to coordinate music and dance performances at community festivals that celebrate cultural heritage.
  travel: Telma Ramos prefers budget‑friendly weekend getaways, savoring the vibrant streets of San Juan, Puerto Rico, planning future hikes in the Everglades, and they dream of a culinary pilgrimage to
    Seville, Spain, while balancing travel ambitions with their student loans and part‑time work schedule.
  culinary: Telma Ramos delights in preparing traditional dishes like pupusas, yuca frita, and tamales using masa, fresh cheese, and plantains, skillfully seasoning with cilantro, lime, and achiote, and
    they often host potluck evenings where friends sample their homemade curtido and homemade salsa verde.
  core: Telma Ramos, a 22‑year‑old organized dreamer, channels their meticulous planning, cultural pride, and occasional worry into community projects, mindful self‑care routines, and flavorful home‑cooked
    meals, and they bring people together.
background:
  cultural: Telma is a second‑generation Salvadoran American raised in Orlando’s vibrant Latinx community. She grew up speaking Spanish at home and English at school, celebrating Salvadoran traditions such
    as Semana Santa, Día de la Madre, and community festivals featuring pupusas and marimba music. Her family’s strong Catholic roots and close‑knit ties emphasize respect, hospitality, and collective well‑being.
    These cultural influences shape her cooperative nature, her love for sharing food and stories, and her commitment to supporting fellow immigrants. Telma’s identity blends Salvadoran heritage with Floridian
    life, giving her a unique perspective that she brings to both her personal relationships and her community‑focused ambitions.
