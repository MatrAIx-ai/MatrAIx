  hobbies: '[''Home cooking experiments'', ''Reading cookbooks and food blogs'', ''Vegetable gardening'', ''Fishing'', ''Woodworking'', ''Listening to classic rock and country music'', ''Small‑group potluck
    gatherings'', ''Jogging for stress relief'']'
  career_goals: Ralph aims to become a sous chef at a well‑established local restaurant within the next two years, leveraging his reliability and organizational strengths. His longer‑term ambition is to
    advance to head chef and eventually open his own family‑style diner that showcases traditional Midwestern comfort food using locally sourced produce. He plans to enroll in advanced culinary courses
    to deepen his pastry skills and to obtain a culinary associate degree, all while maintaining the stable routine he values.
