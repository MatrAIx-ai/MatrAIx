persona_description: A horse owner who is concerned about their horse's nutritional needs during the winter months when grazing is reduced. They are looking for information on the feeding requirements of
  stabled horses and how to balance feeding requirements against training regimes and health conditions. They are seeking advice on providing a diet that is high in quality calorie-dense feed to promote
  milk production or aid recovery, and a diet that is suitable for their horse's age, health, and workload. They are also interested in knowing when to add fibre-rich feed to help maintain a healthy digestive
  system and when to adjust their horse's diet based on their health condition.
