  hobbies: '[''visiting independent art galleries'', ''street-art tours'', ''community art festivals'', ''live music and improv comedy nights'', ''hosting game nights'', ''hiking in the Columbia River Gorge'',
    ''bike riding around Portland'', ''pottery and ceramics workshops'', ''yoga and mindfulness practice'', ''Vietnamese-fusion cooking'', ''urban street photography'', ''volunteering at local art events'']'
  career_goals: Chi aims to earn a Six Sigma Black Belt and eventually step into a Plant Manager role within the next five years. She wants to lead a sustainability drive that cuts waste and energy use
    in her facility, integrating eco-friendly practices with innovative production design. While continuing her hands-on managerial work, she plans to complete a part-time bachelor's degree in industrial
    engineering or business administration. Long-term, she hopes to mentor other women entering manufacturing, champion flexible work policies that support mental-health resilience, and shape a culture
    where creative ideas from art and design are routinely applied to improve manufacturing processes.
