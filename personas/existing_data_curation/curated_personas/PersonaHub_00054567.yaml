persona_description: A sociologist who studies the relationship between law and order and its impact on racial and colonial dimensions in modern societies. They are interested in the material, symbolic,
  and epistemic dimensions of law and order and how they are used to maintain the coloniality of peace. They are concerned with the ways in which law and order serve to translate systematic stealing into
  property rights and how they are used to hide the long history of homicides and epistemicides. They are also interested in the ways in which law and order are used to protect existing disciplines and
  methods that fail to capture the gravity of the structural violence in the modern world.
