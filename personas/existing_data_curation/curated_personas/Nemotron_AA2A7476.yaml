personas:
  professional: Archana Gella, a senior religious worker in Orem, Utah, blends their STEM training with decades of community service to design data‑driven interfaith programs, using an analytical mindset,
    organized yet flexible planning, and compassionate communication to bridge scientific curiosity and spiritual growth.
  sports: Archana Gella enjoys moderate fitness through weekly yoga, weekend hikes with the Wasatch Hiking Club, and occasional participation in the Orem Senior Softball League, cheering for the Utah Jazz
    during the basketball season and supporting the BYU Cougars football team as a loyal fan.
  arts: Archana Gella finds artistic fulfillment in listening to Carnatic violinist L. Subramaniam and film composer A. R. Rahman, attending BYU theater productions featuring classics like 'The Glass Menagerie,'
    and sharing a love for folk duo The Lumineers during community gatherings.
  travel: Archana Gella prefers purpose‑driven travel, combining organized cultural tours of historic sites in Prague and Bhutan with spontaneous weekend hikes in Utah’s Wasatch Mountains, while dreaming
    of a future pilgrimage to Kyoto’s temples and an adventure trek through New Zealand’s South Island.
  culinary: Archana Gella delights in preparing traditional South Indian fare such as crisp dosa, aromatic sambar with lentils, and coconut‑based avial seasoned with mustard seeds and curry leaves, while
    also experimenting with quinoa salads and occasional bake‑offs that showcase a love for both spice and wholesome nutrition.
  core: Archana Gella, a 55‑year‑old community leader, balances scientific curiosity with spiritual service, often juggling spreadsheets and incense, yet they tend to over‑schedule events and occasionally
    forget to water their garden.
background:
  cultural: Archana grew up in a Tamil‑speaking family in Chennai, India, immersed in Hindu traditions and community service. After relocating to the United States, she settled in Orem, Utah, where she
    has blended her South Asian heritage with the collaborative spirit of the Mountain West. She celebrates festivals such as Diwali and Sankranti while actively contributing to local charitable initiatives
    and interfaith activities. Her cultural identity emphasizes respect for elders, harmony, and service, which informs her work as a religious worker and her engagement with the diverse population of Utah
    County.
attributes:
  skills: '[''Community outreach'', ''Interfaith dialogue'', ''Public speaking'', ''Event planning'', ''Counseling and pastoral care'', ''Scriptural interpretation'', ''Cross‑cultural communication'', ''Volunteer
