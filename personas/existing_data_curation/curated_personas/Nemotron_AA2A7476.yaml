  hobbies: '[''Reading (spirituality and science)'', ''Gardening'', ''Yoga and meditation'', ''Cooking traditional South Indian cuisine'', ''Hiking in Utah mountains'', ''Volunteer work at community shelters'',
    ''Listening to classical Indian music'', ''Knitting and craft projects'', ''Attending interfaith discussion groups'', ''Exploring digital tools for outreach'']'
  career_goals: Archana aims to broaden youth engagement at her temple by creating mentorship programs that connect scientific curiosity with spiritual growth. She envisions establishing an interfaith council
    in Utah County to foster dialogue among diverse faith communities, integrating digital media and livestreaming into worship services to reach a wider audience. Over the next decade she hopes to mentor
    emerging religious volunteers, secure sustainable funding for community‑center projects, and author a book that bridges scientific inquiry with spiritual practice while maintaining the harmony and service
    values central to her identity.
