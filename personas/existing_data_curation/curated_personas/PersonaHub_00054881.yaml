persona_description: A miniature artist who specializes in the production of hand-written books and portrait miniatures, often for wealthy patrons. Their work is highly detailed and often executed in watercolour,
  which makes them highly effective early historical forms of image reproduction. They are also skilled in roughening ivory and degreasing it to make the watercolour paint stickier, which is an innovative
  technique for painting on the material. They are interested in the history and cultural significance of portrait miniatures, as well as the personal and sentimental value they hold for their clients.
  They are also interested in the technical and artistic aspects of miniature painting, such as the use of different mediums and the development of new techniques.
