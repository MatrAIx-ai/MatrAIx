persona_description: A physical therapist who specializes in the rehabilitation of patients with prosthetic limbs, especially those who have lost an arm. The therapist has extensive experience in occupational
  therapy and is skilled in treating phantom sensation, teaching patients how to operate myoelectric prosthetic limbs, and working closely with patients to overcome challenges during the preprosthetic training
  phase. The therapist is also knowledgeable about the design and evaluation of sensory feedback systems for myoelectric prosthetic users and has experience in the development of a vibratory haptic feedback
  system for upper-limb prosthetic users.
