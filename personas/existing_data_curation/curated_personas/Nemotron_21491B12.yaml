  hobbies: '[''herb gardening'', ''landscape and architectural photography'', ''reading historical nonfiction'', ''hiking in Zion National Park'', ''volunteering with Habitat for Humanity'', ''knitting'',
    ''home organization projects'']'
  career_goals: Magdalen aims to advance to a lead glazier supervisor role and eventually launch her own boutique glazing business that specializes in high‑performance, energy‑efficient glass solutions
    for residential and commercial projects throughout the Intermountain West. She plans to obtain the Certified Glass Installer credential, deepen her knowledge of sustainable building practices, and develop
    a mentorship program to support women entering the trade. Over the next five years, she also wishes to lead larger, more complex projects while maintaining the high standards of craftsmanship that define
    her work.
