  hobbies: '[''coloring with crayons'', ''making paper collages'', ''listening to bilingual songs'', ''dancing'', ''building block towers'', ''collecting leaves and bugs'', ''playing group games'', ''storytime
    with picture books'']'
  career_goals: Maria often talks about wanting to be a teacher, an artist, or a caretaker for pets when she grows up. She dreams of sharing stories and pictures with other children, painting bright pictures,
    and helping animals at a shelter. Her ambition is to keep learning new things, explore different cultures, and someday combine her love of art and caring for others in a community‑focused role.
