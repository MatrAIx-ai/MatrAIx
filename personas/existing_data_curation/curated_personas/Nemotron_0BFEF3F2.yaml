personas:
  professional: Maria Diaz, a budding block architect, channels boundless curiosity into constructing intricate tower masterpieces, balancing meticulous organization of each piece with spontaneous creative
    flair, and they often challenge fellow toddlers to friendly building contests.
  sports: Maria Diaz, a lively three‑year‑old, regularly joins the Chicago Little Kickers soccer club for energetic playdates, cheers on the Chicago Cubs during family outings to Wrigley Field, and they
    delight in watching the Chicago Bulls on weekend TV, while they channel a competitive spirit into friendly races at the local playground.
  arts: Maria Diaz, an enthusiastic fan of bright picture books, delights in the colorful illustrations of Eric Carle, sings along to The Wiggles and Raffi’s whimsical tunes, and they frequently reenact
    scenes from Sesame Street starring Elmo and Cookie Monster, letting their appreciation for art fuel imaginative play.
  travel: Maria Diaz loves short family road trips to the Chicago Children’s Museum and the nearby Lake Michigan beach for sandcastle building, dreams of exploring Disneyland in California, and they often
    prefer interactive attractions where they can touch and explore, while their parents plan outings around nap schedules and preschool routines.
  culinary: Maria Diaz, a picky yet adventurous eater, adores mac and cheese, mini chicken nuggets, and banana slices, and they proudly stir a bowl of oatmeal with a plastic spoon, and they enjoy occasional
    bites of spaghetti with marinara sauce, always insisting on the bright red ketchup packets and crunchy carrot sticks as side treats.
  core: Maria Diaz combines relentless curiosity with a competitive streak, building towering block cities while they hoard stickers, flaring occasional eczema, and they demand extra bedtime stories, all
    wrapped in a whirlwind of giggles and boundless energy.
background:
  cultural: Maria comes from a Mexican‑American family living in Sherman, Texas. At home, Spanish and English are spoken interchangeably, giving her early bilingual exposure. She participates in Mexican
    cultural traditions such as creating Día de los Muertos altars, celebrating holidays with foods like tamales, and hearing music ranging from lullabies to mariachi. Family gatherings blend Texan and
    Mexican customs, fostering a bicultural identity. Through local community events at the church and cultural center, she experiences both her Mexican heritage and the broader regional culture, shaping
    her outlook and sense of belonging.
attributes:
  skills: '[''basic bilingual communication'', ''fine motor drawing'', ''counting to ten'', ''basic puzzle solving'', ''social play and turn‑taking'', ''competitive game participation'', ''rhythmic movement
