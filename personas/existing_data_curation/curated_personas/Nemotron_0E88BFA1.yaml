  hobbies: '[''Visiting art galleries'', ''Digital photography'', ''Woodworking'', ''Gardening'', ''Reading non-fiction (science, philosophy, art history)'', ''Small book club'', ''Puzzle solving (jigsaw,
    crosswords)'', ''Cycling (Great Allegheny Passage)'', ''Cooking (experimental recipes)'']'
  career_goals: William aims to re‑enter the workforce in a role that blends his organizational strengths with his artistic interests, such as a community arts program manager or an office manager for a
    nonprofit cultural organization. Over the next two years he plans to earn a CAPM (Certified Associate in Project Management) credential and complete an associate degree in business administration at
    a local community college. Ultimately, he dreams of opening a small studio where he can offer custom woodworking pieces, host photography workshops, and curate local art exhibitions, thereby turning
    his hobbies into a sustainable venture.
