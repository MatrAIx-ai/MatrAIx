  hobbies: '["Sketching and digital drawing", "Visiting art museums and galleries", "Reading graphic novels and sci‑fi literature", "Cooking Indian dishes and experimenting with fusion recipes", "Exploring
    basic coding projects and game design", "Participating in school art club and community cultural events", "Keeping a bullet journal for planning and reflection"]'
  career_goals: Bhavita aims to channel her curiosity for art and technology into a career that blends creativity with problem‑solving. In the short term, she plans to build a strong portfolio of artwork
    and interactive digital projects during high school, seek mentorship in graphic design and UX, and participate in community art initiatives. Long‑term, she envisions attending a university program in
    Visual Communication, Interaction Design, or Media Arts, eventually working as a user experience designer or digital media artist who creates inclusive, culturally resonant experiences. She also hopes
    to use her skills to mentor younger students in her community.
