personas:
  professional: A budding teen coder and visual storyteller, Bhavita Bali blends their curiosity for new ideas with methodical planning to craft choose‑your‑own‑adventure games that pair hand‑drawn characters
    with simple JavaScript logic, showcasing both artistic flair and disciplined execution.
  sports: As an active teen, Bhavita Bali follows the Los Angeles Lakers and the LA Galaxy with enthusiastic fandom, participates in a local youth soccer league on weekends, and fits in after‑school swim
    sessions at the community pool, though they sometimes let school projects delay their Friday‑night skateboarding routine.
  arts: A dedicated art enthusiast, Bhavita Bali immerses themselves in sketching comic‑style characters inspired by Alex Ross and Naoko Takeuchi, attends exhibitions at LACMA and The Broad to study works
    by Yayoi Kusama and Frida Kahlo, and routinely contributes original panels to the school’s art club newsletter.
  travel: Bhavita Bali plans trips with meticulous checklists, favoring weekend drives to Santa Monica Beach and monthly visits to Griffith Observatory, while dreaming of a cultural pilgrimage to Tokyo’s
    Akihabara district for anime immersion and a springtime art tour of Paris’s Musée d’Orsay, balancing parental permission constraints with a love of spontaneous street‑food detours.
  culinary: In the kitchen, Bhavita Bali experiments with intermediate‑level Indian street food, perfecting homemade samosas stuffed with spiced potatoes and peas and assembling tangy chaat featuring chickpeas,
    tamarind chutney, and fresh cilantro, while also enjoying quick pizza slices and exploring ramen flavors at LA’s Grand Central Market.
  core: Bhavita Bali is a methodical, curiosity‑driven teen who fuses sketching, simple coding, spicy cooking experiments, and occasional impulse purchases into a uniquely balanced creative life.
background:
  cultural: Bhavita is a second‑generation South Asian American whose parents immigrated from India (specifically the Punjabi region). The family maintains cultural traditions such as celebrating Diwali,
    Holi, and regional festivals, while also embracing American customs in Orange County. At home, Hindi and occasional Punjabi are spoken, and she enjoys traditional Indian cuisine, classical dance, and
    music during family gatherings. Growing up in Anaheim, she experiences a blend of Californian outdoor lifestyle and a vibrant Indian diaspora community, attending weekend language classes and participating
    in local Indian cultural programs. This multicultural environment shapes her values of education, community service, and creative expression.
attributes:
  skills: '["Digital illustration (tablet & Adobe Fresco)", "Basic Python programming", "HTML/CSS web page creation", "Project planning and time management", "English‑Hindi bilingual communication", "Research
