personas:
  professional: Elizabeth Smiley, 26, works as a community-center program aide and aspiring museum docent, leveraging their knack for event coordination, volunteer management, and a curatorial sense honed
    from sketching local murals to create small, story-driven exhibitions that amplify neighborhood narratives.
  sports: Elizabeth Smiley, 26, enjoys early morning jogs along the Scioto Mile, plays on a co-ed recreational basketball league, cheers for the Columbus Crew during the MLS season, follows the Cleveland
    Browns, and tends to their community-garden plot as their seasonal 'sport' throughout summer.
  arts: Elizabeth Smiley, 26, frequently visits the Columbus Museum of Art and street-mural tours; they sketch downtown scenes in a Moleskine sketchbook to the soundtrack of Erykah Badu and John Coltrane,
    and they find inspiration at poetry nights featuring spoken-word artists like Jordan Smoller.
  travel: Elizabeth Smiley, 26, plans low-cost weekend getaways that blend cultural immersion and relaxation; they have already explored the historic streets of Savannah and the jazz-rich neighborhoods
    of New Orleans, and now dream of a road trip to Asheville’s vibrant arts community.
  culinary: Elizabeth Smiley, 26, relishes cooking soul-food classics such as collard greens with smoked turkey, sweet-potato pie, and shrimp gumbo; they often experiment with herbs like smoked paprika
    and fresh thyme while they knit scarves beside the kitchen table.
  core: Elizabeth Smiley, a 26-year-old community‑oriented art enthusiast, blends quiet determination with a love for storytelling, garden‑grown resilience, and soulful creativity.
background:
  cultural: Elizabeth was raised in a close‑knit African‑American community in Columbus. Family gatherings centered around church, music, and shared meals, instilling a deep appreciation for oral storytelling,
    soulful rhythm, and communal support. The cultural heritage of the city’s historic neighborhoods, combined with contemporary Black artistic movements, informs her aesthetic tastes and her commitment
    to helping others preserve and celebrate their own cultural narratives.
attributes:
  skills: '[''Event coordination'', ''Volunteer management'', ''Basic drawing and art appreciation'', ''Household budgeting'', ''Community outreach'', ''Emotional support'', ''Organizational planning'']'
  hobbies: '[''Gallery visits'', ''Sketching'', ''Jazz and neo‑soul music'', ''Reading contemporary fiction'', ''Journaling'', ''Knitting'', ''Cooking soul‑food recipes'', ''Community gardening'', ''Poetry
    readings'']'
  career_goals: Elizabeth aims to complete her GED within the next year and enroll in a community‑college program focused on arts administration or social services. She hopes to secure a part‑time position
    as a museum docent or community‑center program aide, where she can merge her love of art with her talent for supporting small groups. In the longer term, she envisions leading a weekly art‑therapy workshop
    for youths in Columbus, fostering creative expression while providing a stable, nurturing environment.
