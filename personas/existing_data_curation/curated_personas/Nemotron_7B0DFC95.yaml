  hobbies: '[''Basketball'', ''Music Listening (Jazz, Neo‑Soul, Hip‑Hop)'', ''Cooking (Soul Food with Healthy Twists)'', ''Non‑Fiction Reading'', ''DIY Electronics'', ''Mindfulness Meditation'', ''Youth
    Mentorship Volunteering'']'
  career_goals: Janathan aims to move from his current stocker role into a supervisory position within the next two years, targeting a shift lead or inventory control supervisor role at his current employer
    or a larger distribution center. He plans to earn a Certified Logistics Associate (CLA) credential and complete the APICS Certified in Production and Inventory Management (CPIM) program to deepen his
    supply‑chain expertise. In the longer term, he aspires to become a warehouse manager, overseeing operations, safety programs, and continuous‑improvement initiatives. He also intends to pursue a bachelor’s
    degree in Supply Chain Management to broaden his career prospects and eventually launch a small logistics consulting firm that helps local businesses optimize their inventory processes.
