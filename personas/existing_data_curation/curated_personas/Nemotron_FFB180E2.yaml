  career_goals: Johanna dreams of becoming a veterinarian because she loves animals and wants to help them feel better. She also imagines herself as a teacher who can share stories and teach children about
    nature, combining her curiosity for new ideas with the reliable methods she sees in her preschool teachers. Occasionally she talks about being a scientist who discovers how to protect the environment
    while still caring for her family’s garden and kitchen.
