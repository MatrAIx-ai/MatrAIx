personas:
  professional: Johanna Gomez, a 6‑year‑old budding builder, transforms LEGO bricks and wooden blocks into elaborate mini‑structures, channeling their natural curiosity and practical problem‑solving while
    their spontaneous flair often leads them to abandon plans mid‑construction.
  sports: Johanna Gomez darts around the park playing soccer, joins pick‑up matches with friends, proudly supports the local City Rapids youth team, attends the neighborhood soccer club after school, and
    experiments with ice skating at the community rink during winter, reflecting a lively, spontaneous approach to fitness.
  arts: Johanna Gomez loves listening to children’s songs by Raffi and classic lullabies from their grandparents, draws vibrant pictures of jungle animals inspired by Beatrix Potter and colorful festival
    scenes reminiscent of folk art, and enjoys watching episodes of Sesame Street starring Elmo, all of which feed their creative imagination.
  travel: Johanna Gomez prefers day trips with family, packing their favorite stuffed bunny in a tiny backpack, and has eagerly explored the Grand Canyon, splashed at Disneyland’s splash zone, and collected
    smooth rocks from the nearby creek, while dreaming of a future adventure to the Smithsonian museums in Washington, D.C.
  culinary: Johanna Gomez enjoys helping their mother roll tortillas, proudly assembles mini‑quesadillas with melted cheese and avocado, mixes fruit salads with mango, banana, and a drizzle of lime, and
    relishes snack time with apple slices dipped in peanut butter, showcasing a budding chef’s enthusiasm for hands‑on cooking.
  core: Johanna Gomez is a curious, spontaneous six‑year‑old who builds towering LEGO worlds, saves pennies while splurging on stickers, battles mild allergies, dashes across soccer fields, draws colorful
    animals, explores local wonders, and loves cooking flatbreads with family, all while juggling a playful blend of imagination and practical problem‑solving.
background:
  cultural: Johanna grows up in a Mexican‑American household in Fontana, California. Her family speaks both Spanish and English, celebrates holidays such as Día de los Muertos and Cinco de Mayo with altars,
    marigold decorations, and traditional foods like tamales and tacos. She participates in community events at the local church and school, learns Mexican folk songs and dances, and enjoys the blend of
    Mexican cultural values—family closeness, respect for elders, and love of food—alongside typical American childhood experiences.
