  hobbies: '[''Reading contemporary fiction'', ''Abstract painting'', ''Photography of natural landscapes'', ''Playing acoustic guitar'', ''Cycling'', ''Hiking'', ''Visiting local art galleries'', ''Writing
    reflective journal entries'', ''Meditation and yoga practice'']'
  career_goals: James aims to open a boutique fitness studio in Salem County that fuses exercise with artistic expression, offering signature classes such as "Movement Painting" and "Music‑Driven HIIT."
    Over the next five years he plans to earn a yoga instructor certification, develop a community outreach program for senior wellness, and mentor emerging trainers. Ultimately, he envisions his studio
    becoming a collaborative hub for small‑group workshops that blend fitness, creativity, and personal growth while maintaining a flexible, low‑stress business model.
