  career_goals: Although retired from formal employment, Russell seeks to stay active by contributing his expertise to his local community. His primary goal is to volunteer as a maintenance coordinator
    for his church and nearby senior center, where he can apply his handyman skills. He also aims to mentor younger neighbors in basic home‑repair techniques, ensuring the neighborhood retains self‑reliance,
    while maintaining a stable, healthy lifestyle with his spouse.
