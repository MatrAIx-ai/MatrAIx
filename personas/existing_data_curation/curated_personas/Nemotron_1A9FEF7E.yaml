  hobbies: '[''Cooking Mexican cuisine'', ''Hiking'', ''Stargazing'', ''Attending art festivals'', ''Listening to tech podcasts'', ''Reading mystery novels'', ''Solving puzzles'', ''Yoga'', ''Mindfulness
