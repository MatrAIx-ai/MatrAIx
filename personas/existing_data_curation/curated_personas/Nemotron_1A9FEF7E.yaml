  career_goals: Norma aims to advance to a senior leadership role in market research, such as Senior Market Insights Manager, where she can shape strategic direction for regional campaigns across the Southwest.
    She seeks to become a recognized authority on Hispanic consumer trends, develop predictive models that anticipate market shifts, and mentor emerging analysts. Obtaining the Professional Researcher Certification
    (PRC) and leading cross‑functional projects that integrate advanced analytics with traditional research methods are key milestones. Ultimately, she envisions launching a boutique consultancy focused
    on culturally informed market strategy, while maintaining a balanced work‑life rhythm that supports her well‑being.
