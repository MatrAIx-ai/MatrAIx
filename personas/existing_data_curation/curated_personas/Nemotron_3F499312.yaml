  career_goals: As she approaches retirement, Tammy aims to transition into a part‑time Clinical Nurse Educator role at a local community college, where she can share her practical knowledge and critical
    thinking skills with aspiring nurses. She also plans to spearhead a hospital‑wide quality‑improvement project focused on reducing medication errors, leveraging her skepticism of outdated protocols to
    drive evidence‑based change. Additionally, Tammy hopes to serve as a volunteer health‑coach for senior citizens in Clark County, providing personalized education on preventive care while maintaining
    a balanced workload that mitigates her stress sensitivity.
