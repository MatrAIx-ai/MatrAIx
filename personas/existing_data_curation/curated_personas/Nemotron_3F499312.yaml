personas:
  professional: Tammy Dipaola, a veteran registered nurse with over thirty years in geriatric and critical care, channels her skeptical, detail‑driven nature and love of evidence‑based practice into leading
    hospital‑wide medication‑error reduction projects, mentoring new staff, and delivering precise patient‑education workshops while confidently navigating ACLS protocols and diabetes education.
  sports: Tammy Dipaola fuels their fitness routine with regular hikes along the Columbia River Gorge, participates in the local Columbia Gorge Hiking Club, enjoys cheering on the Seattle Seahawks, Seattle
    Mariners, and Washington Huskies, and they attend the senior walking group at the community center during winter months to stay active.
  arts: Tammy Dipaola unwinds by dissecting mystery novels by Agatha Christie and Tana French, knitting intricate Kaffe Fassett‑inspired patterns and quilting heirloom‑style blocks, while a love of Diana Krall’s
    jazz piano and Beethoven’s symphonies fills their evenings, and they regularly attend productions at the Seattle Repertory Theatre.
  travel: Tammy Dipaola prefers meticulously planned trips that balance gentle exploration with comfort, having already explored Portland’s food carts, a weekend cruise to the San Juan Islands, and a cultural
    pilgrimage to Tuscany for family genealogy research, while they dream of a relaxed retreat in the hot springs of Costa Rica’s Arenal region.
  culinary: Tammy Dipaola delights in preparing garden‑fresh ratatouille, homemade pesto with basil and pine nuts, herb‑infused grilled salmon, and occasional spinach and feta quiche, displaying a confident
    intermediate skill set that blends seasonal vegetables, fresh herbs like thyme and rosemary, and occasional forays into sourdough bread baking.
  core: Tammy Dipaola is a fiercely curious yet worry‑prone nurse‑educator who channels competitive energy into meticulous gardening, relentless quality‑improvement quests, and a penchant for midnight mystery‑novel
    marathons, all while hoarding an impressive catalog of yarn and spreadsheets.
background:
  cultural: Tammy was raised in a mid‑western Italian‑American family that emphasized close‑knit family ties, Catholic traditions, and a strong work ethic. Her parents instilled a respect for practicality
    and self‑reliance, values that have carried into her professional life as a nurse. Relocating to Vancouver, WA, she has embraced the Pacific Northwest’s outdoor culture and community‑oriented mindset,
    blending her heritage’s love for family gatherings and home‑cooked meals with local traditions of sustainability and health‑focused living.
