personas:
  professional: A budding engineer with an early love for construction, Mark builds intricate LEGO creations, organizes the pieces methodically, and sketches animal designs, showing a practical curiosity
    that hints at future problem‑solving talent; they often explain their builds to dad with patient detail.
  sports: Mark loves playing catch with dad and participates in the Dearborn Heights Little League tee‑ball team, cheering on the Detroit Tigers during spring training and occasionally wearing a Detroit
    Lions jersey for backyard games; they enjoy weekend visits to the community pool for swim lessons.
  arts: Mark immerses in creative play, drawing animals with crayons while listening to the playful tunes of the Kidz Bop version of the Beatles, and they adore the vibrant animation of Disney’s Frozen,
    often reenacting scenes with LEGO figures.
  travel: Mark enjoys weekend trips to the Henry Ford Museum and the sandy shores of Lake Erie, and they dream of a family adventure to Disney World in Florida, preferring carefully planned itineraries
    that balance fun rides with scheduled nap times.
  culinary: Mark prefers kid‑friendly meals like cheese pizza topped with pepperoni, creamy mac and cheese, and crispy chicken nuggets, often adding carrot sticks or apple slices for a crunchy side, and
    they proudly help stir the batter for homemade pancakes on Sunday mornings.
  core: Mark is a curious, quiet builder who trades sneaker‑collecting for LEGO bricks, keeps a secret stash of glitter glue for animal drawings, and never passes up a chance to chase a beetle after school;
    they often pause mid‑play to organize their toolbox before resuming.
background:
  cultural: Mark was raised in Dearborn Heights, Michigan, within a suburban Midwestern setting that values community, school involvement, and family traditions like Thanksgiving and weekend gatherings.
    His family participates in local church activities and school events, and the nearby parks and community centers provide opportunities for outdoor play and learning. Exposure to the region's mix of
    automotive heritage and diverse neighborhoods has fostered an appreciation for hard work, cooperation, and modest, practical living.
