persona_description: A historian and cultural scholar who specializes in the study of the history and culture of peoples of African descent in Latin America and the Caribbean, particularly focusing on the
  experiences of Afro-Latin Americans. They are passionate about promoting understanding, recognition, and resources for this marginalized community, and have created numerous civic, cultural, and community
  organizations to advocate for their rights. They are skilled in conducting research and scholarship on the Afro-Latin American experience, and are dedicated to fostering exchanges and debates among scholars,
  intellectuals, activists, and policy makers.
