  career_goals: Looking ahead, Adam is fascinated by how things work and imagines turning his ideas into real inventions. He dreams of becoming a robotics engineer or inventor who creates useful gadgets,
    especially devices that help people in everyday life, like a smart bike lock or an automated bedtime story reader. He enjoys participating in school science fairs and hopes to win awards for projects
    that blend creativity with practical solutions. Adam also loves space and sometimes says he wants to be an astronaut, but he grounds that ambition in a desire to learn engineering principles and apply
    them to solve problems.
