personas:
  professional: An 8‑year‑old LEGO builder and budding coder, Adam Gaster leverages their curiosity and practical mindset to design moving models with LEGO Boost while embracing a flexible, occasionally
    disorganized, approach to projects, and they delight in tweaking each creation until it moves just right.
  sports: An energetic 8‑year‑old who spends weekends shooting hoops with friends at the Minneapolis community center and dribbling soccer balls in the local youth league, Adam Gaster idolizes the Minnesota
    Timberwolves and Minnesota Twins, and they approach each practice with a competitive edge while occasionally half‑heartedly skipping the warm‑up to jump straight into the game.
  arts: Adam Gaster, a budding comic strip artist who fills sketchbooks with daring robot heroes inspired by the works of Stan Lee, Jack Kirby, and the animated adventures of the LEGO Movie, they spend
    evenings watching Pixar’s Wall‑E and listening to the playful tunes of They Might Be Giants, using these influences to fuel their own imaginative storytelling.
  travel: Adam Gaster, a curious 8‑year‑old who prefers spur‑of‑the‑moment day trips to the Minneapolis Chain of Lakes and weekend family outings at the Mall of America, dreams of exploring the Grand Canyon
    and the volcanic landscapes of Iceland, but their flexible, relaxed nature often leads them to abandon meticulously planned itineraries in favor of spontaneous treasure‑hunting for unusual rocks and
    cool bird‑watching spots.
  culinary: Adam Gaster, an enthusiastic eater who can whip up a decent peanut‑butter‑banana sandwich and proudly prepares a pizza with extra pepperoni and a sprinkle of pineapple, enjoys chasing the perfect
    cheesy mac‑and‑cheese, loves the creamy texture of vanilla ice cream with chocolate chips, and often trades snack choices with friends while occasionally forgetting to wash hands before meals due to
    their easygoing habits.
  core: Adam Gaster, an 8‑year‑old LEGO‑obsessed inventor with a competitive streak, a habit of misplacing the smallest bricks, and a relentless curiosity that drives them to turn ordinary parks into experimental
    labs.
background:
  cultural: Adam grows up in a white, Midwestern family in Minneapolis, Minnesota. His ancestry includes German and Scandinavian roots, common in the region, which are reflected in family traditions such
    as enjoying hearty soups, celebrating St. Lucia, and participating in community events like the Minnesota State Fair. Living in a diverse urban environment, he is exposed to a variety of cultures through
    neighborhood festivals, library storytimes, and school programs that celebrate different heritages. He takes part in typical American celebrations—Thanksgiving, Christmas, and the Fourth of July—while
    also learning about the multicultural fabric of the Twin Cities, giving him an appreciation for both his own heritage and the broader community.
