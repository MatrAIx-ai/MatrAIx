personas:
  professional: Shane Sakellaris, a retired farmer‑handyman turned community mentor, leverages decades of carpentry, orchard management, and small‑engine repair to provide reliable, low‑stress handyman
    services while organizing volunteer workshops; they adore routine, maintain meticulous organization, and their assertive yet cooperative demeanor makes them the go‑to problem‑solver for neighbors and
    the local fire department alike.
  sports: Shane Sakellaris, an avid early‑morning fisherman with the Wenatchee River Anglers Association and a loyal supporter of the Seattle Seahawks, Seattle Mariners, and Seattle Sounders, embraces low‑impact
    fitness through weekend walks along the Columbia River Trail and occasional community softball games; they prefer routine, steady activity over high‑intensity competition, and their cooperative spirit
    makes them a dependable teammate.
  arts: Shane Sakellaris, a devoted church‑choir tenor and classic‑rock aficionado who fills evenings with The Beatles, Led Zeppelin, and The Rolling Stones while turning the pages of Ken Follett and Bernard
    Cornwell historical epics, integrates music and literature into quiet leisure; they find solace in familiar melodies and stories that echo their love for tradition and practical storytelling.
  travel: Shane Sakellaris, a methodical planner who prefers well‑organized, low‑stress trips, enjoys weekend getaways to nearby Leavenworth and seasonal visits to the Grand Canyon, and is saving for a
    modest pilgrimage to Greece’s historic sites; they balance their love of familiar scenery with occasional long‑term longing for Mediterranean adventure while staying within their retirement budget.
  culinary: Shane Sakellaris, an accomplished home cook who relishes harvesting their own apples to bake crisp apple pie with cinnamon and nutmeg, seasons rosemary‑roasted potatoes, grills fresh Wenatchee
    trout with lemon and dill, and tops garden salads with heirloom tomatoes, cucumbers, and basil, demonstrates a practical yet passionate approach to farm‑to‑table cuisine; they take pride in the tactile
    process of prep and often linger over the scent of a simmering stew.
  core: Shane Sakellaris blends steadfast routine with a quiet curiosity, channeling decades of hands‑on farm wisdom into low‑stress handyman work while battling a chronic worry habit that makes them double‑check
    every screw and savings ledger; they constantly scrutinize even the smallest details.
background:
  cultural: Shane is a Greek‑American whose grandparents emigrated from Greece in the early 20th century. While raised in a predominantly white, rural Washington environment, he maintains elements of his
    Greek heritage through family recipes, celebration of Greek Orthodox Easter, and occasional use of Greek phrases. He values the community and family‑centric aspects of both his Greek roots and the local
    culture of Cashmere, blending traditional hospitality with the practical, self‑reliant mindset common in his region.
attributes:
  skills: '[''Carpentry'', ''Basic Electrical Wiring'', ''Plumbing Repairs'', ''Garden and Orchard Management'', ''Small Engine Maintenance'', ''Household Budgeting'', ''Community Volunteer Coordination'',
    ''First Aid and CPR'', ''Event Planning'', ''Fishing and Outdoor Survival Skills'', ''Woodworking'']'
  hobbies: '[''Gardening and Orchard Care'', ''Fishing'', ''Woodworking'', ''Church Participation and Potlucks'', ''Reading Historical Novels'', ''Listening to Classic Rock'', ''Volunteer Fire Department
    Support'']'
  career_goals: At this stage in life, Shane’s primary ambition is to maintain his health and independence while continuing to support his wife and family. He aims to preserve and improve the family property,
    focusing on a sustainable garden and orchard that can provide fresh produce for his household and local food bank. Shane hopes to mentor younger community members in practical trades, sharing his knowledge
    through occasional handyman projects and volunteer workshops. He also aspires to document his family’s Greek‑American history in a memoir and plans a modest trip to Greece to reconnect with his heritage.
    Financially, he seeks to supplement his retirement income with selective, low‑stress handyman work, ensuring a comfortable lifestyle for his later years.
