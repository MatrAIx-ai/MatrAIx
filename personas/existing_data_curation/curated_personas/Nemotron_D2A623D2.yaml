  career_goals: Deidre aims to re‑enter the workforce in a part‑time administrative or bookkeeping role that allows her to leverage her organizational strengths while maintaining a flexible schedule for
    her personal responsibilities. She plans to obtain a Certified Bookkeeper credential within the next year to enhance her credibility with local small businesses and farm owners. In the longer term,
    she envisions launching a home‑based consulting service that offers bookkeeping and financial planning to rural entrepreneurs, providing her a steady income stream and the autonomy she values. She also
    hopes to volunteer as a financial literacy mentor at her community center, using her expertise to help others manage debt and stress.
