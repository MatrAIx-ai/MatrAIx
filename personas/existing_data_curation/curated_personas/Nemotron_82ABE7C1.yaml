personas:
  professional: A community‑focused animal behavior specialist and therapist, Sandra Kelley blends her expertise in positive‑reinforcement training for dogs, horses, and small mammals with storytelling
    and mixed‑media art workshops, meticulously planning animal‑assisted programs while remaining flexible enough to pivot into spontaneous creative collaborations, all driven by their curious, open‑minded
    outlook and a desire to launch a hybrid training‑and‑arts center within the next five years.
  sports: A passionate outdoor enthusiast, Sandra Kelley hikes the Blue Ridge trails weekly with their rescue dog, practices Vinyasa yoga at the local studio “Zen Flow”, belongs to the “Atlanta Hikers”
    club, and cheers on the Atlanta Falcons, Atlanta Hawks, and Atlanta Braves while occasionally joining a community softball league for fun.
  arts: A vibrant creative, Sandra Kelley paints wildlife scenes inspired by the vivid colors of Ansel Adams photography and the brushwork of Georgia O'Keeffe, crafts mixed‑media collages featuring animal
    motifs while listening to Bob Dylan and Old Crow Medicine Show at bluegrass festivals, performs improv with a community theater troupe that cites Meryl Streep as an inspiration, and curates art‑and‑animal
    workshops that weave storytelling into visual expression.
  travel: An adventurous planner who prefers thoughtfully researched trips blended with spontaneous detours, Sandra Kelley has photographed the cloud forests of Monteverde, Costa Rica, trekked the Great
    Smoky Mountains, explored the art scene of Santa Fe, savored the cuisine of New Orleans, and now dreams of painting the icy waterfalls of Iceland’s South Coast while bringing their rescue dog along
    whenever possible.
  culinary: A spirited home chef, Sandra Kelley experiments with Southern comfort food by perfecting shrimp‑and‑grits seasoned with fresh thyme and lemon zest, simmering a Cajun gumbo rich in okra, smoked
    sausage, and filé powder, incorporating herbs from their garden into a honey‑glazed fried chicken, and occasionally crafting lavender‑infused gin fizzes for friends at gatherings.
  core: Sandra Kelley is a high‑energy, empathic animal trainer who merges art, mindfulness, and community activism, though they often wrestle with stress‑induced worry and give in to impulsive festival
    splurges.
background:
  cultural: Sandra grew up in a small Southern town in Tennessee, where close‑knit community values and a strong connection to the land shaped her early life. Her white Southern heritage exposed her to
    regional folk traditions, including Appalachian music, storytelling, and craftwork, which fostered her appreciation for the arts. While she attended a liberal arts college, she broadened her worldview
    through literature, visual arts, and cultural studies, developing an open‑minded perspective that blends respect for tradition with curiosity about new ideas. Living in Ashland City, near Nashville’s
    vibrant creative scene, she regularly engages with local galleries, music venues, and charity events, integrating the region’s cultural richness into her personal and professional pursuits.
