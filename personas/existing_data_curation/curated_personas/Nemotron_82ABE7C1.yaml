    and livestock handling'', ''Adaptability to unconventional training methods'']'
  hobbies: '[''Painting wildlife and landscapes'', ''Nature photography'', ''Hiking with her rescue dog'', ''Yoga and mindfulness practice'', ''Community theater improv'', ''Attending bluegrass and folk
    music festivals'', ''Volunteering at animal shelters'', ''Gardening herbs and flowers'', ''Exploring Southern cuisine through cooking'', ''Reading contemporary fiction and poetry'', ''Crafting crochet
    and knitting projects'', ''DIY home décor with reclaimed materials'']'
  career_goals: Sandra’s primary ambition is to launch a community‑focused animal training and therapy center that melds her love of the arts with humane animal care. She plans to obtain advanced certifications
    in applied animal behavior and therapeutic animal certification, author a guidebook on integrating art with animal training, and become a sought‑after speaker at regional and national conferences. Over
    the next five years, she hopes to expand her studio to offer workshops for schools, collaborate with local musicians and visual artists for animal‑assisted art programs, and eventually establish a nonprofit
    arm that provides low‑cost animal‑assisted therapy to individuals coping with stress and anxiety.
