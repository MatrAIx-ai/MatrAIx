personas:
  professional: John Mcelroy is a senior full‑stack developer with over three decades of experience in Java, C#, Python and JavaScript, who leverages their graduate business background and Scrum Master
    certification to translate strategic ROI goals into scalable micro‑service architectures, while they mentor junior engineers and position themselves for a future Director of Engineering role.
  sports: John Mcelroy follows the Chicago Bears, attends select home games at Soldier Field, plays in a local Fox River fishing club during the spring, and participates in a weekend softball league with
    his coding meetup friends, blending passive fandom with low‑intensity community sport, and they enjoy the camaraderie of the league.
  arts: John Mcelroy spends quiet mornings at the South Elgin Public Library devouring classic literature by Tolstoy and business biographies, crafts mid‑century modern furniture in his garage inspired
    by Scandinavian design, and enjoys listening to Bob Dylan and Leonard Cohen while their homebrew ferments, weaving literary, musical and tactile arts into their leisure, and they find solace in the
    rhythm of turning pages and shaping wood.
  travel: John Mcelroy prefers meticulously planned trips, such as his annual attendance at AWS re:Invent in Las Vegas, weekend road‑trips to the Wisconsin lakes for fishing, and a dream itinerary to Kyoto’s
    tech districts, balancing professional development with solitary nature retreats, and they keep a travel journal to record each journey.
  culinary: John Mcelroy relishes cooking pan‑seared trout caught on the Fox River with lemon‑dill sauce, pairs it with a crisp pilsner from their own brew, and indulges in classic deep‑dish pizza on game
    nights, reflecting a practical palate that values fresh ingredients and precise brewing chemistry, and they often experiment with new hop blends to match each dish.
  core: John Mcelroy blends methodical engineering with a love for solitary hobbies, balancing structured problem‑solving with the quiet rhythm of fishing and woodworking, while obsessively logging every
    brew batch and occasionally over‑optimizing their code, and they cherish the predictability of well‑ordered systems.
background:
  cultural: John grew up in a middle‑class, white, Midwestern family in Illinois, with ancestral roots tracing back to German and Irish immigrants who settled in the Chicago area in the early 20th century.
    The culture of his upbringing emphasized punctuality, self‑reliance, and community involvement—values that manifest in his methodical work style and his willingness to contribute to local initiatives.
    He attended public schools that fostered a pragmatic outlook and later pursued higher education at the University of Illinois, where he earned his business degree. While his religious affiliation is
    not a central aspect of his identity, he has participated in community events at the local church, reflecting the region’s tradition of civic engagement. His divorce has reinforced a personal emphasis
    on independence while maintaining strong ties to his extended family and neighborhood networks in Kane County.
