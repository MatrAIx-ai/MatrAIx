  career_goals: John aims to transition into a technology leadership role within the next three to five years—preferably as a Director of Engineering or Chief Technology Officer at a mid‑size enterprise
    software firm. He wants to leverage his combined technical and business expertise to shape product strategy, drive digital transformation, and mentor the next generation of engineers. To prepare, he
    plans to earn an AWS Solutions Architect Professional certification and a PMP credential, and to lead a high‑impact cross‑functional project that modernizes legacy systems to a cloud‑native, micro‑services
    architecture. He also hopes to start a consulting side‑hustle focused on helping local small businesses in the Chicago metropolitan area adopt affordable, scalable software solutions, allowing him to
    maintain a flexible work schedule that supports his divorced lifestyle and provides time for his personal interests.
