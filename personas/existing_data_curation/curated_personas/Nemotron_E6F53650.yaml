  career_goals: Lennox aims to complete his associate’s degree in Computer Science within the next year and earn industry certifications such as CompTIA A+ and Network+. In the short term, he plans to secure
    a remote entry‑level IT support or junior developer position that offers a quiet, autonomous work environment. Over the next five years, he hopes to transition into a full‑stack software development
    role or a data analyst position, leveraging his analytical mindset and programming skills. Long‑term, Lennox envisions starting a modest tech‑repair and consulting business that allows him to serve
    his community while maintaining the flexibility to work alone and focus on practical problem‑solving.
