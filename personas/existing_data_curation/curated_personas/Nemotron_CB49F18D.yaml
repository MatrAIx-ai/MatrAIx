  hobbies: '[''Model railroading'', ''Woodworking'', ''Amateur astronomy'', ''Reading science fiction and popular science'', ''Mechanical and jigsaw puzzles'', ''Hiking in the Laurel Highlands'', ''Volunteering
    at community tech-help sessions'', ''Gardening in a shared community plot'']'
  career_goals: John aims to re-enter the workforce in a role that balances his need for intellectual stimulation with a low-stress environment. He is pursuing a part-time freelance consultancy where he
    can offer CAD drafting and data-analysis services to small manufacturers and local businesses in Butler County. To strengthen his credibility, he plans to obtain a Certified Scrum Master or Project
    Management Professional (PMP) credential within the next year. John also hopes to design and lead community workshops that teach basic computer skills and DIY electronics, allowing him to give back
    while maintaining the small-group, cooperative settings he prefers. Ultimately, he aspires to build a stable, self-directed career that supports his personal well-being and reduces the anxiety that
    comes from unpredictable employment.
