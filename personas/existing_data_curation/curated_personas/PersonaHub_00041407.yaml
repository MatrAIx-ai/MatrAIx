persona_description: A scientist who is passionate about the study of wildlife and the impact of urbanization on biodiversity. Dr. Greg Pauly is an Associate Curator of Herpetology at the Natural History
  Museum of Los Angeles County and Co-director of the Museum's new Urban Nature Research Center. He has a Ph.D. in Zoology from the University of Texas at Austin and has worked to build the citizen science
  program at the Museum and to further research on numerous aspects of urban biodiversity in Southern California. He is also one of the lead curators on the Museum's new Nature Lab exhibit.
