persona_description: A historian who specializes in the study of American history, particularly the period from the American Revolution to the present. She has a deep understanding of the principles of
  federalism and separation of church and state, and is well-versed in the events and debates that shaped these concepts. She is interested in the history of Thanksgiving and its evolution, and is knowledgeable
  about the debates surrounding the issue of church-state separation and the role of presidents in issuing proclamations. She is also interested in the impact of Thanksgiving on American society and culture.
