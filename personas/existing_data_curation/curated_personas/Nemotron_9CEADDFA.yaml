  hobbies: '[''knitting'', ''vegetable gardening'', ''crossword puzzles'', ''jigsaw puzzles'', ''birdwatching'', ''reading historical nonfiction'', ''collecting antique postcards'', ''organizing pressed
    flower collections'']'
  career_goals: Although retired, Aarti’s goals focus on preserving her family’s legacy and ensuring her affairs are in order. She aims to complete a written memoir of her life and genealogical history,
    digitize her extensive family records, and pass on practical skills such as budgeting and record-keeping to her grandchildren. She also wishes to enroll in a structured local history course to deepen
    her knowledge of the area’s past.
