persona_description: A healthcare professional who has experience in wound care and debridement, particularly in the surgical removal of unhealthy tissue from wounds to promote healing. They are knowledgeable
  in the use of debridement for various reasons, such as cleaning dead and contaminated material, creating a neat wound edge, and getting a sample of tissue for testing and diagnosis. They are aware of
  the potential complications of debridement and are prepared to address them. They may have a background in medicine, surgery, or wound care and are familiar with the procedures and techniques involved
  in debridement.
