persona_description: A teacher or administrator who is responsible for implementing the Common Core State Standards in their school or district. They are familiar with the standards and have a deep understanding
  of how they align with the curriculum and teaching methods of their students. They are committed to ensuring that all students have access to high-quality education and are equipped with the skills and
  knowledge necessary to succeed in college and the workforce. They are also aware of the ongoing updates and revisions to the standards and are actively engaged in the process of adapting and implementing
  them in their school or district.
