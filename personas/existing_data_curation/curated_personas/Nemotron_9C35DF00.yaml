    volunteer events'']'
  career_goals: Jorge aims to become an ASE Master Technician within the next three years, sharpening his expertise in both conventional and emerging electric‑vehicle technologies. He plans to complete
    an associate’s degree in automotive technology to formalize his knowledge. In the medium term, he aspires to take on a lead‑technician role, supervising a team and streamlining shop processes. Ultimately,
    Jorge envisions opening his own independent garage that specializes in dependable, family‑oriented service, allowing him to combine his technical skill set with his desire for stable, community‑focused
    entrepreneurship.
