    resolution", "Time management and punctuality", "Problem‑solving under pressure", "Empathy and cooperative teamwork"]'
  hobbies: '["Listening to classic soul, R&B, and jazz music", "Fishing on the Delaware River", "Backyard vegetable gardening", "Playing and mentoring at a community chess club", "Volunteering at the local
    food bank and church", "Restoring a vintage 1972 Chevrolet pickup", "Reading on transportation industry trends and Black New Jersey history", "Attending local live music performances", "Participating
    in neighborhood block parties"]'
  career_goals: Larry aims to transition from hands‑on driving to a supervisory role within the logistics sector, targeting a position such as fleet coordinator or logistics manager for a regional transport
    company. He plans to obtain the Motor Carrier Safety Trainer certification to formalize his mentoring abilities and to lead safety workshops for drivers across New Jersey. Long‑term, Larry aspires to
    launch a small, family‑owned moving and freight service that emphasizes reliable service, community hiring, and environmentally conscious routing. He also hopes to establish a driver mentorship program
    in partnership with local vocational schools, helping young adults—especially from under‑represented backgrounds—gain the skills needed for a stable career in transportation.
