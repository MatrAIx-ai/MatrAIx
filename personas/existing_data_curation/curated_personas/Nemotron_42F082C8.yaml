  career_goals: Dana aims to transition into a senior operations director role within a purpose-driven organization or to launch a boutique consulting practice that helps small businesses implement flexible,
    people-centric processes. She plans to strengthen her organizational skills by pursuing a professional certification such as PMP or Six Sigma, while continuing to champion workplace flexibility and
    employee well‑being. In the longer term, she hopes to mentor emerging women leaders and serve on a local nonprofit board that aligns with her values of harmony and community service.
