personas:
  professional: Derek Landrum, a retired contractor turned community organizer, channels their curiosity and practicality into methodical event planning, budget management, and volunteer coordination for
    the Greenville Rotary Club outreach committee, while also nurturing a modest custom-furniture side business.
  sports: Derek Landrum enjoys seasonal fishing on the Tar River, follows the Carolina Panthers and Clemson Tigers football teams, participates in the Greenville Senior Center’s weekly shuffleboard league,
    and occasionally joins the community walking club for low-impact cardio.
  arts: Derek Landrum expresses their creativity through handcrafted furniture, while also appreciating Southern gospel choirs, the blues duo The North Mississippi Allstars, and attending the Greenville
    Playhouse’s monthly productions, often humming classic Johnny Cash tunes while sanding wood.
  travel: Derek Landrum plans leisurely road trips with their wife to historic sites such as Colonial Williamsburg, Gettysburg National Military Park, and the Alamo, favoring detailed itineraries, budget-friendly
    lodging, and opportunities to record oral histories for the local heritage archive.
  culinary: Derek Landrum cooks Southern comfort meals like shrimp and grits, collard greens seasoned with smoked ham hocks, and fresh heirloom tomato salsa, often using garden produce and a cast-iron skillet,
    though they sometimes over-season dishes in their enthusiasm for bold flavors.
  core: Derek Landrum blends methodical organization, a love for community storytelling, and hands-on craftsmanship into a life where garden rows, fishing lines, and wooden joints all echo their relentless
    curiosity and sociable spirit.
background:
  cultural: Derek grew up in a small town in eastern North Carolina, steeped in Southern hospitality, church‑centered community life, and a strong work ethic. His family valued modesty, mutual support,
    and hands‑on craftsmanship, shaping his practical skills and collaborative mindset. The regional love for gardening, fishing, and preserving local history is reflected in his hobbies, while his involvement
    in churches, Rotary clubs, and senior groups mirrors the close‑knit, harmony‑seeking culture of Greenville.
attributes:
  skills: '[''Event Planning'', ''Volunteer Coordination'', ''Budget Management'', ''Carpentry and Home Repair'', ''Mechanical Troubleshooting'', ''Basic Computer Literacy'', ''Conflict Mediation'', ''Gardening'']'
  hobbies: '[''Gardening (heirloom tomatoes, seasonal vegetables)'', ''Fishing'', ''Woodworking (custom furniture and small crafts)'', ''Cooking Southern cuisine'', ''Church and community volunteering'',
    ''Playing cards/board games with seniors'', ''Historical walking tours'', ''Traveling to historic sites'']'
  career_goals: Although retired from formal employment, Derek aims to deepen his community leadership by chairing the Greenville Rotary Club outreach committee, launching a mentorship program for local
    teens, and turning his woodworking hobby into a modest custom‑furniture side business. He also hopes to travel with his wife to historic sites across the United States and contribute oral histories
    to the local heritage archive.
