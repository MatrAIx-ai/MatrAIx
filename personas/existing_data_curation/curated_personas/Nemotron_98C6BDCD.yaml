personas:
  professional: Mariel Mendoza, a 19‑year‑old aspiring administrative coordinator, leverages meticulous Excel spreadsheets, bilingual communication, and a calm, methodical approach to ensure clinic operations
    run like clockwork while quietly alleviating their anxiety through structured task lists.
  sports: Mariel Mendoza, 19, enjoys solitary hikes in the Organ Mountains, is a member of the Las Cruces Hiking Club, follows the New Mexico State Aggies men's basketball team, and practices yoga three
    times a week to keep stress in check, but tends to skip the occasional community soccer match.
  arts: Mariel Mendoza, a 19‑year‑old, devotes evenings to reading Sally Rooney and Ocean Vuong, curates a handwritten literary journal, enjoys the acoustic folk songs of Laura Marling and Bon Iver, and
    attends intimate poetry readings at the New Mexico Museum of Art, though they sometimes binge‑watch Netflix instead of engaging with the arts.
  travel: Mariel Mendoza, at 19, prefers low‑key travel itineraries planned in Excel, has trekked the red rocks of Sedona, the historic streets of Santa Fe, and dreams of exploring the temples of Kyoto,
    always balancing budget constraints with a yearning for quiet cultural immersion.
  culinary: Mariel Mendoza, a 19‑year‑old, whips up green chile stew with roasted poblano, corn masa, and fresh chile verde, perfects enchiladas al horno using homemade salsa roja, and experiments with
    cinnamon‑spiced churro dough, though they often over‑season to satisfy their craving for order.
  core: Mariel Mendoza is a detail‑driven 19‑year‑old who channels anxiety into meticulous organization, balances solitary hobbies with quiet service, and quietly rebels by obsessively tracking every expense
    and recipe.
background:
  cultural: Raised in a bilingual Hispanic household in Las Cruces, Mariel grew up immersed in both Mexican and American traditions. Her family celebrates Día de los Muertos, Christmas, and local Hispanic
    festivals, emphasizing close family ties and community involvement. She is fluent in Spanish and English, often translating for elders and neighbors. The rich culinary heritage of New Mexico, with its
    distinctive chile flavors, influences her cooking hobby. While she identifies with her Latino roots, she also values the multicultural environment of Dona Ana County, which shapes her inclusive and
    cooperative outlook.
attributes:
  skills: '["Organizational Management", "Data Entry", "Microsoft Office Suite (Excel, Word, Outlook)", "Bilingual Spanish-English Communication", "Appointment Scheduling", "Event Planning", "Basic Medical
    Terminology", "Customer Service"]'
  hobbies: '["Reading contemporary fiction", "Journaling", "Cooking New Mexican cuisine", "Hiking in the Organ Mountains", "Yoga and meditation", "Volunteering at community center", "Gardening (succulents)",
    "Listening to acoustic guitar music"]'
  career_goals: Mariel aims to secure a stable, structured role as an administrative coordinator within a community health clinic that serves the Hispanic population of Southern New Mexico. She plans to
    complete her Bachelor of Business Administration, focusing on Human Resources and Healthcare Management, and obtain a certification in Medical Office Administration. Her long‑term ambition is to oversee
    clinic operations, mentor new staff, and ensure smooth, patient‑centered services while maintaining a predictable work routine that supports her well‑being. She also hopes to leverage her bilingual
    skills to improve access to care for Spanish‑speaking patients.
