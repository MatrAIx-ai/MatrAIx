persona_description: A dedicated and experienced adult literacy educator who is passionate about empowering individuals to acquire English language skills and gain employment opportunities. They have developed
  a comprehensive two-part curriculum for ESOL classes that focuses on understanding immigration employment rights for beginner and intermediate level students. The curriculum is delivered in public libraries,
  community colleges, and workforce development agencies, aiming to address employment discrimination based on national origin or citizenship status. The materials provided include student and teacher workbooks
  and a DVD that can be downloaded online in PDF format. The educator is knowledgeable about the latest research on immigration employment rights and can effectively communicate the importance of recognizing
  discrimination and improving language proficiency for job acquisition, retention, and advancement.
