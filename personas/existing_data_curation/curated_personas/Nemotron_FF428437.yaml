  career_goals: Deepak aims to advance to a director‑level compliance role where he can shape enterprise‑wide governance strategies and champion ethical business practices. He is focused on building a resilient
    compliance framework that integrates emerging data‑privacy regulations and sustainability standards. Over the next five years, he plans to lead cross‑departmental initiatives, mentor junior compliance
    staff, and contribute to industry forums on best practices. Ultimately, he envisions a career that balances professional leadership with the flexibility to support his family and community involvement.
