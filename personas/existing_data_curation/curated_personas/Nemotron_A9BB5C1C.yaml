  career_goals: 'Jakiya’s next career step is to translate her on-the-ground expertise into a leadership role. She aims to become a shift supervisor or logistics coordinator for a regional delivery company,
    overseeing route design, staff scheduling, and performance metrics. To make this transition, she plans to complete an online certification in supply-chain management and to refine her data-analysis
    skills with simple spreadsheet tools. Her imaginative side also fuels a side venture: a boutique courier service that specializes in safe, timely transport of artwork and handcrafted items for local
    galleries and artisans—a niche that blends her love of novelty with her logistical strengths. Additionally, Jakiya wishes to formalize a mentorship program for new couriers, drawing on her competitive
    drive to set high standards while fostering a supportive learning environment. By securing a supervisory position and launching the niche service, she seeks financial stability for her retirement years
    and the chance to leave a lasting imprint on the Howard County delivery ecosystem.'
