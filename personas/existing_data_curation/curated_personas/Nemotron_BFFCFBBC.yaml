personas:
  professional: Harry Carmichael, a curious 10‑year‑old aspiring game developer, blends a love for LEGO architecture with Scratch coding to prototype interactive worlds, channeling their desire for structure
    while also indulging spontaneous creative bursts.
  sports: Harry Carmichael enjoys weekly soccer drills with the local youth club, cheers for the hometown professional baseball team the Tigers, and occasionally joins friends for pickup basketball at the
    community gym, balancing structured practice with spontaneous play.
  arts: Harry Carmichael spends afternoons sketching comic strips inspired by Jim Lee, devouring graphic novels like 'Saga' and 'The Walking Dead', and listening to Hans Zimmer’s epic film scores, letting
    vibrant visual storytelling fuel their own creative projects.
  travel: Harry Carmichael prefers weekend road trips to nearby state parks such as Redwood National Forest for quiet hikes, dreams of a summer visit to Tokyo’s Ghibli Museum, and meticulously plans excursions
    with hand‑drawn maps, mixing adventure with the comfort of familiar routines.
  culinary: Harry Carmichael loves helping to bake chocolate chip cookies using butter, brown sugar, and a pinch of sea salt, can confidently prepare spaghetti Bolognese with canned tomatoes and ground
    beef, and often swaps pizza slices for a homemade grilled cheese with cheddar and tomato soup during lunch.
  core: Harry Carmichael is a detail‑oriented 10‑year‑old who balances a love for structured LEGO builds with spontaneous Scratch animations, frequently worries about the small stuff, and habitually loses
    socks in the laundry.
background:
  cultural: Harry’s family reflects a typical suburban middle‑class Southern background in Lawrenceville, Georgia. They attend local community events, such as school fairs and library reading programs,
    and occasionally go to a family‑oriented church service. The multicultural atmosphere of Gwinnett County exposes him to a variety of traditions and foods, while his upbringing emphasizes polite manners,
    a love of Southern comfort foods, and an appreciation for outdoor activities like weekend park outings.
