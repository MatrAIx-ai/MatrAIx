personas:
  professional: A retired community arts facilitator, Alicia Johnson blends their lifelong love of abstract watercolor, genealogy storytelling, and meticulous workshop planning to run intergenerational
    art sessions at the Independence Senior Center, where their organized, gentle demeanor ensures each class unfolds like a well‑orchestrated symphony of creativity.
  sports: A devoted member of the Golden Years Walking Club, Alicia Johnson spends crisp autumn mornings strolling the city park, avidly cheers on the Milwaukee Brewers during baseball season and the Green
    Bay Packers in the fall, and joins Saturday senior yoga sessions at the community center to keep flexible.
  arts: An avid creator and connoisseur of the arts, Alicia Johnson paints abstract watercolors inspired by the fluidity of Kandinsky, recites poems by Mary Oliver during community readings, admires Georgia
    O'Keeffe's early works, and finds solace in the piano improvisations of Debussy while curating a modest personal gallery of island‑infused pieces.
  travel: A meticulous planner, Alicia Johnson favors leisurely, culturally immersive trips such as a springtime garden tour of the Keukenhof in the Netherlands, a reflective weekend in historic Charleston,
    and an annual pilgrimage to a Pacific island resort where she explores local markets and revives cherished family recipes.
  culinary: An adventurous home chef, Alicia Johnson skillfully blends coconut milk, taro, and fresh ginger to reinvent classic fish stew, perfects pineapple‑infused pork ribs, and delights in crafting
    intricate abstract garnish patterns on their watercolor‑themed dessert plates.
  core: Alicia Johnson, a 77‑year‑old imaginative organizer, channels curiosity into watercolor abstracts, genealogy tales, and community art mentorship, while occasionally hoarding mismatched paint tubes
    and forgetting to water her houseplants.
background:
  cultural: 'Alicia descends from Polynesian ancestors who migrated to the United States mid‑20th century, eventually settling in Independence, Missouri. Her family maintains a strong connection to island
    traditions—storytelling, communal gatherings, and culinary practices—while also embracing the Midwestern way of life. This bicultural experience informs her worldview: she values respect for elders,
    community harmony, and the sharing of cultural knowledge. Alicia participates in local Polynesian cultural events, often preparing traditional foods and sharing stories that reflect both her island
    heritage and her life in the heartland.'
attributes:
  skills: '[''Organizing community art workshops'', ''Watercolor painting'', ''Creative writing'', ''Genealogical research'', ''Traditional Polynesian cooking'', ''Digital photo editing'', ''Lesson planning'',
