  hobbies: '[''Watercolor painting'', ''Reading poetry and philosophy'', ''Cooking traditional Polynesian dishes'', ''Genealogy research'', ''Walking in local parks'', ''Knitting'', ''Volunteer tutoring
    at senior center'', ''Attending cultural festivals'']'
  career_goals: Although retired, Alicia aspires to leave a lasting imprint on her community and cultural heritage. She aims to complete a memoir‑style collection of essays and poems that explores her Polynesian
    roots and Midwestern experiences, and to publish a small portfolio of abstract watercolors inspired by island motifs and local landscapes. Additionally, she hopes to mentor younger volunteers at the
    Independence senior center, establishing a lasting arts‑and‑crafts program that bridges generations and celebrates cultural diversity.
