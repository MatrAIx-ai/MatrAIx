persona_description: A scientist who studies the human visual system and its perception of motion, particularly the role of microsaccades in the Enigma illusion. She is interested in the underlying mechanisms
  of motion perception and the implications of her findings for vision disorders. She is curious about the cause of the illusion and seeks to understand how microsaccades contribute to our subjective experience
  of motion. Her work may lead to new insights into the visual system and its disorders.
