personas:
  professional: Yeidy Mejiasgonzalez, a ten‑year‑old budding naturalist, combines a keen curiosity about plant and rock identification with a methodical habit of keeping detailed field journals, making
    them a promising young science enthusiast.
  sports: Yeidy Mejiasgonzalez enjoys playing on the River Valley Junior Soccer Club, follows the Los Angeles Lakers on TV, and spends Saturday mornings sprinting along the stream to stay fit, but they
    often skip a formal practice to finish a puzzle.
  arts: Yeidy Mejiasgonzalez practices piano pieces by Beethoven and Mozart, sketches intricate botanical illustrations inspired by Audubon, and loses themselves in mystery novels by Agatha Christie, while
    occasionally humming traditional family songs during holiday gatherings, and they relish the quiet focus these activities provide.
  travel: Yeidy Mejiasgonzalez loves weekend explorations of the nearby pine forest and creek, dreams of hiking the Appalachian Trail, and hopes to one day visit the ancient ruins of Machu Picchu and the
    rainforests of Costa Rica, and they always pack a pocket notebook for spontaneous observations.
  culinary: Yeidy Mejiasgonzalez helps the family prepare traditional holiday dishes like corn‑based stuffed dumplings and spiced meat pies, delights in the aroma of roasted chilies and fresh cilantro,
    and they can whip up a perfect scrambled egg for breakfast after a morning of piano practice.
  core: Yeidy Mejiasgonzalez is a meticulous ten‑year‑old explorer who balances a love for nature, puzzles, and piano with a surprisingly organized allowance system, a habit of over‑packing for trips, and
    a tendency to forget to take their allergy meds before a hike.
background:
  cultural: Yeidi comes from a Mexican‑American family that keeps its heritage alive through language, food, and community celebrations. Spanish is spoken daily at home, and she participates in preparing
    dishes like tamales and empanadas for holidays such as Día de los Muertos and Christmas. Growing up in the small, close‑knit community of Moscow, Idaho, she blends rural American life—school events,
    outdoor activities, and local friendships—with the warmth and traditions of her Hispanic roots.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''Project planning and organization'', ''Introductory coding (Scratch)'', ''Sketching'', ''Spanish language proficiency'']'
  hobbies: '[''Nature walks and stream exploration'', ''Reading mystery books'', ''Jigsaw puzzles'', ''Sketching and drawing'', ''Playing piano'', ''Cooking traditional Hispanic dishes'']'
  career_goals: Yeidi dreams of a future where she can combine her love of nature with technology, hoping to become a marine biologist or environmental engineer who uses data to protect ecosystems. In the
    short term, she aims to win her school's science fair, join a middle‑school robotics club, and continue building her coding skills so she can develop tools that help monitor local wildlife.
