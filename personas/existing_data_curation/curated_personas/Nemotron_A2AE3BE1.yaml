personas:
  professional: Sarita Haselden, a seasoned retail supervisor with three decades of hands‑on experience, blends her teaching background and artistic curiosity to design engaging onboarding curricula, mentor
    staff with empathetic coaching, and curate storefront displays that showcase local artwork, and they balance meticulous organization with the flexibility demanded by evolving retail trends.
  sports: Sarita Haselden, an avid hiker and member of the Hamilton Hiking Club, spends spring and summer trekking the Bitterroot Trail, follows the University of Montana Grizzlies football and basketball
    teams, and they participate in a local senior softball league every fall, balancing their love for the outdoors with gentle strength‑training routines at the community center.
  arts: Sarita Haselden, a watercolorist inspired by the Rocky Mountains and a frequent volunteer at the Hamilton Arts Council, regularly paints in the style of Georgia O’Keeffe, attends exhibitions featuring
    Ansel Adams’ photographs, acts in community theater productions of Arthur Miller’s ‘All My Sons’, and they enjoy the folk melodies of The Chieftains during senior social dances, weaving these influences
    into their quilting and set‑design work.
  travel: Sarita Haselden, who prefers thoughtfully planned road trips that combine cultural immersion with modest budgeting, has visited the Sundance Film Festival in Utah, the Telluride Bluegrass Festival
    in Colorado, and they dream of exploring the historic streets of Salzburg, Austria, while still cherishing weekend getaways to nearby Glacier National Park and the vibrant art fairs of Boise, Idaho.
  culinary: Sarita Haselden, a confident home cook who grows thyme, rosemary, and sage in their backyard, delights in preparing herb‑roasted chicken, pan‑seared trout with lemon‑dill sauce, and fresh beet
    and goat‑cheese salads, and they often pair their meals with a glass of local Montana Pinot Noir, while occasionally treating themselves to a slice of cherry pie at the annual Hamilton Harvest Festival.
  core: Sarita Haselden blends a farmer’s self‑reliance with an artist’s curiosity, mentoring colleagues by day, painting mountain vistas at sunrise, and they occasionally forget to take their antihypertensive
    pills until a sticky‑note reminder pings their kitchen wall.
background:
  cultural: Sarita identifies as a white American with deep roots in the western United States. Her family lineage traces back to German and Irish immigrants who settled in Montana during the early 20th century
    homesteading era. Raised in a small farming community, she internalized values of self‑reliance, neighborly cooperation, and respect for the natural landscape. The cultural fabric of Hamilton, a close‑knit
    town in Ravalli County, emphasized community service, church involvement, and an appreciation for the outdoors, all of which shaped her worldview. As a member of the Baby Boomer generation, Sarita experienced
    the social changes of the 1960s, fostering her openness to unconventional ideas and lifelong learning. Her cultural background blends traditional Midwestern work ethic with the rugged, conservation‑oriented
    spirit of rural Montana, informing her commitment to both her professional role and her community engagements.
