  career_goals: As she approaches retirement, Sarita aims to transition from daily floor management to a mentorship and advisory role that leverages her decades of experience. She aspires to formalize her
    training programs into a structured curriculum for the company's new hires and to serve as a consultant for small, locally owned retailers seeking to blend commerce with community art initiatives. Sarita
    also hopes to deepen her involvement with the Hamilton Arts Council, organizing workshops that teach seniors how to create and display art in commercial spaces. Ultimately, she wishes to leave a lasting
    impact by championing employee well‑being, fostering a culture of lifelong learning, and supporting the cultural vitality of her rural Montana community.
