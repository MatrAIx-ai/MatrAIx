  career_goals: Approaching retirement, Lan aims to cement her legacy by formalizing a mentorship program for junior managers and introducing sustainable, green‑operations initiatives at her current workplace.
    She plans to earn a Project Management Professional (PMP) certification within the next year to broaden her consulting capabilities. Ultimately, Lan hopes to transition into part‑time operations consulting
    for small family‑owned businesses, leveraging her cultural fluency to help them navigate U.S. market logistics while maintaining their heritage.
