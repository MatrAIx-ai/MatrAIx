persona_description: A healthcare professional with extensive knowledge in the diagnosis and treatment of neurological and musculoskeletal conditions. They have a keen interest in the investigation of the
  underlying causes of fatigue and chronic pain, particularly in the context of lower body dorsopathy and related neuropathy. They are skilled in the use of specialized neurological testing and physical
  exams to diagnose objective and subjective weakness in the legs, and are knowledgeable in the distinction between these two types of weakness. They are aware of the limitations of medical therapies in
  treating chronic fatigue and are open to the possibility of mind-body enactments as a contributing factor. They are committed to finding an effective treatment for leg tiredness before initiating any
  form of therapy.
