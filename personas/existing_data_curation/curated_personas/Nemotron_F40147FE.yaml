  hobbies: '[''Fishing'', ''Playing dominoes'', ''Cooking Cuban dishes'', ''Barbecue grilling'', ''Community volunteering'', ''Attending cultural festivals'', ''Gardening'', ''Salsa dancing'', ''Senior
    center social events'', ''DIY woodworking'']'
  career_goals: George aims to transition from employee to owner‑operator by opening a boutique butcher shop that highlights Cuban‑inspired cuts and specialty sausages. He plans to become a certified Master
    Meat Cutter, mentor younger workers, and create a community‑supported meat program partnering with local farms. While preferring flexible schedules, he wants his storefront to double as a gathering
    place for cooking demonstrations and cultural events, leaving a legacy that blends his trade expertise with his heritage.
