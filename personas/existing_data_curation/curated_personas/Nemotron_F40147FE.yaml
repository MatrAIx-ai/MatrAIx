personas:
  professional: George Perez, a 61‑year‑old veteran meat cutter with over 35 years of experience handling primal and specialty cuts, blends practical curiosity with a competitive edge to fuse traditional
    Southern barbecue methods with spice‑driven island flavors, while his spontaneous leadership style keeps the shop floor lively but often leaves schedules under‑planned.
  sports: George Perez fuels his active lifestyle by leading a weekend fishing crew on the Oconee River, playing regularly with the local senior pickleball club, and cheering the Atlanta Falcons, Braves,
    and United FC from his porch, though he seldom joins organized marathons due to his preference for low‑impact, social exercise.
  arts: George Perez immerses himself in the rhythm of classic son and salsa legends like Celia Cruz and Tito Puente at community dance nights, curates a small vinyl collection of vintage Latin jazz, and
    enjoys attending performances at the historic Atlanta Fox Theatre, letting the music inspire his seasonal grill menus.
  travel: George Perez prefers road‑trip adventures that blend family reunions in Miami with scenic drives along the Georgia coast, dreams of sailing to the historic Caribbean island capital famed for pastel‑colored
    streets and colonial architecture, yet balances these wanderlust plans with a modest retirement budget and occasional budget‑friendly cruises.
  culinary: George Perez, an avid home chef, perfects mojo‑marinated pork al pastor and char‑grilled yuca with garlic‑citrus glaze, supplements his dishes with fresh plantains, cilantro, and bitter orange
    juice harvested from his garden, and loves showcasing his creations at neighborhood block‑party cook‑outs.
  core: George Perez merges decades of butcher expertise with a spontaneous, community‑focused spirit, turning every grill, fishing trip, and salsa night into a lively celebration of flavor, friendship,
    and friendly rivalry.
background:
  cultural: George is a second‑generation Cuban‑American whose grandparents left Cuba after the 1959 Revolution and settled in Florida before moving to Georgia in the 1970s. The family preserved the language,
    music, and cuisine of their homeland, celebrating traditions such as Noche de los Rábanos, Cuban Independence Day, and the annual Cuban Festival in Atlanta. He grew up speaking both Spanish and English,
    eating plant‑based dishes like yuca con mojo and pork al pastor, and listening to classic Cuban son and salsa. While fully integrated into the Grayson community, he maintains connections to the wider
    Cuban diaspora through family visits to Miami and participation in local Cuban cultural clubs.
