personas:
  professional: Mylon Patel is an aspiring software developer and indie game designer who channels the strategic depth of competitive MOBAs and the quick‑decision reflexes of FPS titles into prototype coding,
    while balancing a craving for structured development milestones with a spontaneous, competitive spirit that often leads to last‑minute feature sprints.
  sports: Mylon Patel plays forward for the downtown youth soccer league, organizes weekend pick‑up matches, and avidly supports the city’s professional football club, the Thunderhawks, while maintaining
    a competitive edge that sometimes eclipses team camaraderie.
  arts: Mylon Patel creates short TikTok skits and edits footage with Adobe Premiere, draws inspiration from street photographer Alex Webb and musician Billie Eilish, and spends free moments capturing candid
    moments in the city’s neon‑lit alleys.
  travel: Mylon Patel prefers spontaneous weekend trips to nearby music festivals and mountain hikes, often booking last‑minute rides via rideshare apps, dreaming of a future road trip across the Pacific
    Northwest to explore indie game conventions in Seattle and Portland.
  culinary: Mylon Patel enjoys devouring spicy ramen, cheesy tacos, and mastering family recipes like buttered flatbread and spiced lentil stew during holidays, while experimenting with quick TikTok‑style
    cooking hacks that blend tradition with modern flair.
  core: Mylon Patel is a competitive teen gamer turned budding developer who can orchestrate a community soccer match in minutes, yet habitually forgets homework and leaves snack crumbs across the keyboard.
background:
  cultural: Mylon comes from a South Asian immigrant family—his parents originally from Gujarat, India—who settled in Spartanburg, South Carolina. The household blends Gujarati cultural traditions, such
    as celebrating Diwali and Navratri, with American customs; Gujarati and English are spoken at home, and family values emphasize respect, community, and academic achievement. The local South Asian community,
    including a nearby temple and cultural center, provides a support network that influences his food preferences, music, and holiday observances.
