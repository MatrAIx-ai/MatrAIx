persona_description: A graduate student or advanced undergraduate interested in learning about visualization techniques, algorithms, and tools for creating effective visualizations. They are looking for
  a course that covers principles from graphic design, visual art, perceptual psychology, and cognitive science, and is targeted towards students interested in using visualization in their own work as well
  as building better visualization tools and systems. The course will include lectures, programming assignments, and a final project. The course is open to both graduate students and advanced undergraduates,
  but a basic working knowledge of graphics API and data analysis tools will be useful. The course will be taught by Jeffrey Heer and a course assistant. The course wiki will be used for posting questions
  and debates, publishing assignments, sharing resources, and demoing the course project. The course aims to help students improve their perceptual and cognitive abilities through visualization, engage
  more diverse audiences in the process of analytic thinking, and build better visualization tools and systems.
