    mentorship'']'
  hobbies: '[''fishing (lake and ice)'', ''woodworking and furniture making'', ''vintage diesel truck restoration'', ''volunteering with local 4-H mechanical club'', ''attending high school football games'',
    ''listening to classic rock'', ''reading automotive magazines'']'
  career_goals: Looking ahead, John aims to solidify his standing as a master diesel technician by achieving ASE Master Technician and NATEF certifications within the next two years. He aspires to take
    on a shop‑foreman role at his current facility, overseeing a small team and streamlining maintenance workflows to further increase fleet reliability. In the longer term, he hopes to open a modest independent
    diesel‑repair shop serving the Mason‑Ingham County area, where he can combine his technical expertise with his passion for mentoring apprentices. He also plans to enroll in a part‑time business management
    course at a local community college to equip himself with the skills needed to run the business successfully.
