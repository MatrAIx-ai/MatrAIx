personas:
  professional: John Suiters, a veteran diesel technician with twenty years of heavy‑duty engine repair experience, combines expert diagnostics using Jetter and Cummins Insite with his methodical, routine‑oriented
    mindset to keep municipal fleets humming while calmly mentoring apprentices and leading safety briefings.
  sports: John Suiters follows the Detroit Lions and Detroit Red Wings loyally, plays on a local weekend softball league, and stays fit through early‑morning jogs around Mason’s lake and occasional ice‑fishing
    outings that double as low‑impact cardio, all while preferring routine training over intense gym sessions.
  arts: John Suiters relaxes to classic rock icons like Led Zeppelin, The Rolling Stones, and Pink Floyd on a portable stereo, enjoys occasional community theatre productions featuring classic American
    plays, and finds creative release in woodworking, often carving decorative motifs inspired by Grant Wood’s regional realism.
  travel: John Suiters favors self‑driven road trips in his restored 1970s Chevrolet diesel, having explored Michigan’s Upper Peninsula, taken a weekend to Chicago’s blues clubs, and dreaming of a pilgrimage
    to Germany’s automotive museums, all planned around off‑season rates to keep travel affordable for his family.
  culinary: John Suiters cooks hearty Midwestern fare—grilled lake‑caught perch with lemon butter, slow‑cooked beef stew with root vegetables, and smoked pork ribs seasoned with a homemade rub of paprika,
    brown sugar, and garlic—showcasing solid kitchen skills that rival his woodworking craftsmanship.
  core: John Suiters blends a disciplined diesel‑shop routine with a love for vintage engines, classic rock, and lake fishing, all while juggling a penchant for steel‑to‑steel perfection and occasional
    over‑budgeting on car parts.
background:
  cultural: John grew up in the heart of Michigan’s automotive corridor, a region historically shaped by German‑ and Polish‑heritage working‑class families. The Midwestern values of hard work, reliability,
    and modesty were instilled in him from a young age through his parents’ emphasis on craftsmanship and community involvement. He identifies with the practical, no‑nonsense ethos of "the good old‑fashioned
    way," which is reflected in his loyalty to local institutions such as the county’s trade schools and the city’s volunteer fire department. While he is not particularly religious, he respects the close‑knit
    social fabric of Mason and often participates in town events that celebrate the area’s blue‑collar heritage.
attributes:
  skills: '[''diesel engine repair'', ''fuel injection system troubleshooting'', ''turbocharger maintenance'', ''emissions control systems'', ''hydraulic system overhaul'', ''electrical wiring diagnostics'',
