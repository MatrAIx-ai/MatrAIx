  hobbies: '["Watercolor painting","Gardening","Reading (history, art, genealogy)","Quilting circle","Knitting","Volunteer docent work","Attending jazz concerts","Cooking","Writing memoirs"]'
  career_goals: Although retired, Amy aims to leave a lasting legacy for her family and community. She plans to complete a memoir that weaves together her personal story with the history of New Vienna,
    and to donate a collection of her handwritten family genealogy to the local historical society. She aspires to mentor younger volunteers, especially women, in community outreach and craft workshops.
    Amy also hopes to curate a small traveling exhibition of local artwork and quilts for the county fair, showcasing the region’s artistic heritage. In the coming years, she wishes to take short trips
    to regional art museums and cultural festivals, enriching her own appreciation of the arts while sharing her experiences through a community blog.
