personas:
  professional: Amy Bandy, a retired volunteer historian and active docent at the county historical museum, applies her meticulous organizational skills, curiosity about genealogy, and love of art to mentor
    younger volunteers and curate traveling exhibitions of local quilts and paintings.
  sports: Amy Bandy follows the Cleveland Browns and the Ohio State Buckeyes with the same enthusiasm she shows for her weekly walking club at the senior center, prefers low‑impact activities like garden
    strolls and gentle chair yoga, and occasionally joins their grandchildren for a seasonal game of bocce at the local park.
  arts: Amy Bandy paints impressionistic watercolors of the rolling Ohio countryside, attends the Cincinnati Jazz Festival to hear classic records by Ella Fitzgerald and Miles Davis, keeps a collection
    of Monet biographies, and shares their enthusiasm for art history by leading a small discussion group on the works of Georgia O'Keeffe at the New Vienna library.
  travel: Amy Bandy’s travel style blends purposeful weekend trips to nearby cultural sites like the Dayton Art Institute and the Cleveland Museum of Art with leisurely drives to Amish country, where they
    enjoy low‑key photography and use senior discount rates to stay within their modest travel budget, while planning a future blog series on each destination’s local cuisine and craft traditions.
  culinary: Amy Bandy delights in cooking seasonal Midwestern dishes such as heirloom tomato stew, fresh corn chowder, and apple‑cinnamon crumble, expertly incorporating garden harvests like rosemary, basil,
    and heirloom beans, and they enjoy showcasing their recipes at family gatherings, though they admit to occasionally over‑salting the soups while reaching for the salt shaker.
  core: Amy Bandy blends a lifelong curiosity with a disciplined yet flexible routine, channeling their love of art, history, and garden bounty into mentoring, memoir‑writing, and community‑focused creativity
    while occasionally forgetting to water a few potted plants.
background:
  cultural: Amy was born and raised in New Vienna, a small village in Highland County with deep German‑American roots. Her family traditions reflect a blend of Catholic and Mennonite heritage, evident in
    community celebrations such as the annual Oktoberfest picnic, the county fair, and the St. John the Baptist parish festivals. She grew up speaking English with occasional German phrases and has inherited
    a respect for craftsmanship, community service, and modest living. These cultural influences shape her appreciation for folk art, traditional recipes, and the value of preserving local history for future
    generations.
attributes:
