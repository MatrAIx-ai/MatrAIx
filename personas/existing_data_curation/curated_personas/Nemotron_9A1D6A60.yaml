personas:
  professional: Ormand Rivera is a methodical master carpenter who blends precise framing and custom cabinetry with artistic wood‑carving, mentors apprentices, and plans every project down to the last nail
    while secretly worrying about meeting client expectations.
  sports: Ormand Rivera enjoys solitary early‑morning hikes along the Pine Barrens and weekend beach runs, supports the New Jersey Devils and Philadelphia Eagles, and participates in a local rec basketball
    league that satisfies his competitive streak without the pressure of large crowds.
  arts: Ormand Rivera spends evenings sketching Frank Lloyd Wright‑inspired details, carving intricate ship models, and listening to Bruce Springstein’s folk‑rock while attending craft fairs where he exchanges
    ideas with fellow artisans like local wood‑turner Maria Delgado.
  travel: Ormand Rivera prefers low‑key road trips to historic maritime towns such as Mystic, CT, and the shipyards of Rotterdam, yet dreams of a summer sailing excursion to the Amalfi Coast once his workshop
    finances stabilize.
  culinary: Ormand Rivera enjoys cooking simple coastal meals like New England clam chowder and grilled lobster rolls seasoned with fresh dill and thyme, often preparing them on a hand‑crafted wooden board
    while occasionally ordering pizza for convenience on hectic workdays.
  core: Ormand Rivera is a diligent, art‑infused carpenter who balances meticulous work with solitary creative pursuits, a cautious financial outlook, and a habit of over‑thinking both projects and life’s
    little details.
background:
  cultural: Ormand grew up in a working‑class, white middle‑class family on the New Jersey Shore, where the culture blends coastal traditions with a strong emphasis on self‑reliance and skilled trades.
    His community values practical craftsmanship, church fellowship, and a historic connection to the maritime industry. Exposure to local museums and the regional folk‑art scene nurtured his appreciation
    for artistic expression. The pragmatic, no‑nonsense ethos of the Shore, combined with a deep respect for family and independence, has shaped his worldview and work ethic.
attributes:
  skills: '["Framing", "Cabinetry", "Custom furniture design", "Wood carving", "Blueprint interpretation", "Project budgeting", "Project scheduling", "Safety compliance (OSHA)", "Tool maintenance", "Material
    sourcing", "Team supervision"]'
  hobbies: '["Sketching architectural details", "Wood carving", "Scale model ship building", "Reading art and design books", "Photography of nature and finished work", "Hiking", "Journaling", "Meditation",
    "Attending small craft fairs"]'
  career_goals: Ormand aims to transition from contract work to owning a boutique workshop that focuses on high‑end, artistically‑driven custom furniture and historic home restorations on the New Jersey
    Shore. He plans to earn a Master Carpenter certification and secure a small‑business loan to set up a dedicated studio. Over the next five years, he envisions hiring two apprentices, offering weekend
    woodworking classes, and building a reputation that attracts commissions from interior designers and heritage preservation projects. Financially, he seeks steady income to support his children and reduce
    stress, while establishing a legacy of craftsmanship that can be passed down.
