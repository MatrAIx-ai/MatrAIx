  career_goals: Minerva aims to transition from her current manager role to a regional Marketing Director position within the next five years, overseeing a larger portfolio of consumer‑goods brands and
    leading a multidisciplinary team. She is driven to develop a reputation for pioneering campaigns that combine Southern cultural storytelling with cutting‑edge digital tactics. To achieve this, she plans
    to complete her undergraduate degree in Business Administration and earn professional certifications such as the AMA Professional Certified Marketer (PCM). She also wants to create a mentorship program
    for junior marketers at her company, fostering a supportive environment that balances ambition with well‑being. Ultimately, she envisions launching her own boutique consultancy focused on community‑centric
    branding for small businesses in the Southeast, allowing her to blend her creative impulses with a more flexible schedule that eases her stress.
