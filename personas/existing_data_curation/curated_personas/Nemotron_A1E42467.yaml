  career_goals: He aims to secure an apprenticeship in a skilled trade—such as electrical work or HVAC—while attending community college part‑time to study engineering fundamentals. Ultimately, Jon wants
    to combine hands‑on expertise with his interest in technology by launching a small business offering bike repairs and custom modifications, positioning himself as a local leader in practical innovation.
