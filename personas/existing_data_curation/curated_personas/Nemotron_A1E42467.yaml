personas:
  professional: Jon Morales, a 19‑year‑old aspiring electrician apprentice, leverages their mechanical aptitude and social‑media savvy to create DIY bike repair tutorials; they thrive on blending practical
    problem‑solving with a relaxed attitude toward deadlines while attending community college part‑time.
  sports: Jon Morales drifts between pickup basketball courts and frozen ponds for ice‑hockey scrimmages, cheering for the Boston Celtics and the Boston Bruins, while they belong to the Lake Winnipesaukee
    Snowshoe Club for winter trail runs and the White Mountain Trail Crew for summer hikes.
  arts: Jon Morales picks up their acoustic guitar to jam on indie folk tracks by The Lumineers and Bon Iver for friends, and they edit short, humor‑laden videos for YouTube, drawing creative inspiration
    from creators like Mark Rober and indie filmmaker Ava DuVernay.
  travel: Jon Morales loves spontaneous road trips to the White Mountains, weekend getaways to Portland, Maine for lobster rolls, and occasional visits to Montreal, yet they keep travel plans informal due
    to a limited student budget and part‑time work schedule, dreaming of a future cross‑country bike tour through the Pacific Northwest.
  culinary: Jon Morales enjoys cooking hearty maple‑glazed salmon, a steaming bowl of New England clam chowder, and homemade pizza topped with fresh mozzarella, although they sometimes over‑salt their chili
    when multitasking between bike repairs and video editing.
  core: Jon Morales is a curious yet laid‑back teen who mixes hands‑on tinkering with social‑media flair, preferring spontaneity over strict plans and thriving on community‑driven outdoor adventures; they
    balance a competitive edge with an easygoing social nature.
background:
  cultural: Raised in Barnstead, a small town in Belknap County, New Hampshire, Jon grew up in a predominantly white, New England community with deep roots in Northern European (Irish and English) ancestry.
    The local culture emphasizes self‑reliance, seasonal outdoor recreation, and community involvement through town events, volunteer projects, and informal gatherings. While he embraces contemporary digital
    media and broader pop culture, Jon’s worldview is shaped by the region’s appreciation for practical skills, modest independence, and a strong connection to the natural environment.
