personas:
  professional: Livia Garciadominguez, a bilingual correctional officer with over 25 years of experience in inmate supervision, crisis de‑escalation, and detailed report writing, leverages their methodical
    mindset to streamline shift scheduling, mentor new officers, and pursue a promotion to sergeant while laying groundwork for a future training instructor role, and they view every report as an opportunity
    to improve system safety.
  sports: Livia Garciadominguez hikes the arid trails of Saguaro National Park with the Arizona Hiking Club, practices target shooting at the Phoenix‑area Arizona Shooting Sports Association range, follows
    the Arizona Cardinals and Phoenix Suns, and incorporates weekly yoga sessions to preserve flexibility for long shifts, and they consider each hike a reprieve from the intensity of correctional duties.
  arts: Livia Garciadominguez devours true‑crime podcasts and investigative journalism by authors such as Michael Connelly, attends regional festivals showcasing traditional folk music and dance, keeps
    a framed portrait of Frida Kahlo in their living room, and occasionally re‑watches classic films starring Gael García Bretón for cultural resonance, and they find these artistic escapes a necessary
    balance to their analytical career.
  travel: Livia Garciadominguez favors road trips that blend desert scenery with cultural stops, having driven historic Route 66 to Santa Fe for its art markets, trekked the dunes of Bahía de Los Cañones,
    and penciling a future culinary workshop visit to Oaxaca as part of their retirement planning, and they relish the solitude of open roads as a counterpoint to the regimented structure of their work
    life.
  culinary: Livia Garciadominguez excels at preparing mole poblano and chiles en nogada, often experimenting by adding smoked paprika from their herb garden to create a fusion twist, meticulously seasons
    their homemade tamales with fresh oregano and epazote, and balances their skill level between confident home cook and occasional grill master, and they view each dish as a canvas for both tradition
    and innovation.
  core: Livia Garciadominguez combines a finely tuned correctional officer’s precision with a love for desert hikes, yoga, and experimental cooking, yet they habitually over‑worry about health and finances,
    channeling that anxiety into exhaustive checklists and meticulous planning.
background:
  cultural: Livia is a first‑generation Mexican‑American, born in a small town in northern Mexico and raised in Tucson from age eight. Her upbringing in a bilingual household emphasized Spanish language,
    Catholic traditions, and strong family ties. She celebrates Día de los Muertos and Mexican Independence Day, and remains connected to relatives across the U.S.–Mexico border. This dual identity informs
    her work, allowing her to communicate empathetically with Spanish‑speaking inmates and advocate for culturally appropriate treatment, while navigating the predominantly Anglo correctional environment.
attributes:
  skills: '[''Bilingual Communication (Spanish/English)'', ''Inmate Supervision and Management'', ''Crisis De‑escalation'', ''Report Writing and Documentation'', ''Security Protocol Enforcement'', ''Physical
    Fitness and Defensive Tactics'', ''Emergency Medical First Aid'', ''Electronic Monitoring Systems'', ''Shift Scheduling and Log Maintenance'', ''Mentorship and Training Development'']'
  hobbies: '[''Hiking in the Sonoran Desert'', ''Cooking traditional Mexican cuisine'', ''Attending Mexican cultural festivals'', ''Reading true‑crime books'', ''Volunteering at inmate re‑entry programs'',
    ''Practicing yoga and meditation'', ''Herb gardening'', ''Target shooting sport'']'
  career_goals: Livia aims to be promoted to Sergeant or Shift Commander within the next two years and later become a Training Instructor for the Arizona Department of Corrections. She plans to complete
    a community‑college certificate in Criminal Justice to supplement her practical knowledge. Long‑term, she wants to design a pilot rehabilitation program that equips inmates with vocational skills, and
    eventually transition into a policy advisory role focusing on trauma‑informed practices and culturally sensitive inmate treatment.
