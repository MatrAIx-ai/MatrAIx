  career_goals: Even at five, Rachel dreams of roles that let her combine curiosity with practicality. She often says she wants to be a veterinarian so she can help farm animals stay healthy, but she also
    imagines inventing simple tools—like a garden‑watering gadget—that make chores easier for her family. She hopes one day to lead a small neighborhood nature club where kids can explore the outdoors together,
    sharing her discoveries while solving everyday problems.
