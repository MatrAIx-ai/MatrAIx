personas:
  professional: Rachel Cox, a budding little architect, channels their boundless curiosity into building elaborate LEGO cities while pragmatically insisting on sturdy foundations, yet often abandons the
    neatness of instructions in favor of spontaneous creations that leave the playroom a scattered masterpiece.
  sports: Rachel Cox, a member of the Brightville Tots Soccer Club, kicks the ball with enthusiastic spontaneity, cheering for the New York Yankees during family game nights, yet often forgets to line up
    for drills, preferring imaginative play over structured practice.
  arts: Rachel Cox, an avid fan of the animated world of Pixar and the sing‑along songs of the children’s musician Raffi, spends afternoons drawing whimsical creatures, balancing their curiosity for new
    styles with a practical love for coloring within thick‑lined books, though they sometimes abandon the clean pages for messy finger‑painting splatters.
  travel: Rachel Cox, a curious explorer who has already visited Grandma’s farm in the countryside, the local aquarium, and dreamed of the magical landscapes of Disney World, prefers short, well‑planned
    trips with a familiar adult but occasionally insists on spontaneous detours to the park’s ice‑cream stand, making travel both orderly and delightfully unpredictable.
  culinary: Rachel Cox, a picky yet adventurous eater, delights in mac & cheese with extra cheese, loves dipping broccoli florets in ranch, enjoys making banana‑smoothie shakes with a splash of honey, and
    often insists on arranging their food into smiley faces before devouring it.
  core: Rachel Cox, a five‑year‑old with a restless imagination, balances meticulous saving of coins with impulsive sticker trades, worries about tiny skin rashes, and transforms playrooms into chaotic
    yet charming construction sites.
background:
  cultural: Rachel lives in Brooksville, a small, close‑knit community in Noxubee County, Mississippi. Her family follows Southern traditions that emphasize hospitality, church involvement on Sundays, and
    home‑cooked meals featuring locally grown produce. Growing up on a modest farm, she helps with chores like watering plants and feeding chickens, learning practical skills from older relatives through
    storytelling and hands‑on guidance. The community values modesty, intergenerational support, and a gentle pace of life, shaping Rachel's balance of curiosity and practicality, her preference for small
    familiar groups, and her cautious, worry‑aware temperament.
