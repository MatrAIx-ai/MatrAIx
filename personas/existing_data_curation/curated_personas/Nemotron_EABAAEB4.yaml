    ''Vendor Procurement and Contract Management'', ''Team Leadership and Training'', ''Effective Communication and Conflict Resolution'', ''Mentoring and On‑the‑Job Coaching'']'
  hobbies: '[''Cooking traditional Spanish cuisine'', ''Flamenco dancing'', ''Vegetable gardening'', ''Volunteer river‑cleanup projects'', ''Walking in local parks'', ''Mindfulness meditation'', ''Crossword
    puzzles and Sudoku'', ''Knitting'', ''Photography of community events'', ''Senior center book club'']'
  career_goals: Lidia aims to obtain advanced HAZWOPER certification and transition into a supervisory safety role where she can shape company‑wide safety policies. She is passionate about mentoring the
    next generation of hazardous‑materials workers, establishing a formal apprenticeship program, and authoring a comprehensive SOP manual for removal projects. Over the next few years, she hopes to act
    as a consultant for small businesses in the Oakland County area, helping them achieve compliance and develop proactive safety cultures. Ultimately, she wants to leave a legacy of reduced incidents and
    improved environmental stewardship while maintaining a balanced work schedule that allows her to enjoy family and community life.
