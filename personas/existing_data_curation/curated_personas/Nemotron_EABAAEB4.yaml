personas:
  professional: Lidia Sandoval, a veteran hazardous‑materials removal professional, balances a methodical, compliance‑driven work ethic with business savvy, leading multidisciplinary teams through precise
    risk assessments, and they mentor apprentices while pursuing advanced HAZWOPER certification to shape company‑wide safety policies.
  sports: Lidia Sandoval enjoys regular walks in Independence Hills County Park, participates in a senior cycling club’s low‑impact rides each spring, and supports the Detroit Tigers and Red Wings passionately,
    using the endurance built from gardening to stay active.
  arts: Lidia Sandoval expresses creativity through flamenco dancing with a local troupe, captures vibrant moments at the Harvest Festival with her camera, knits shawls inspired by Spanish tile colors,
    and finds inspiration in the guitar artistry of Paco de Lucía and the storytelling of Isabel Allende.
  travel: Lidia Sandoval prefers well‑planned road trips that combine eco‑friendly stops, such as volunteering for river‑clean‑ups in Michigan’s Upper Peninsula, with cultural immersion, like attending
    the Feria de Abril in Seville, balancing modest budgeting with a yearning for family visits and festival experiences.
  culinary: Lidia Sandoval delights in cooking authentic Spanish dishes, preparing paella with saffron‑infused rice, fresh shrimp, chorizo, and garden‑grown tomatoes, simmering chilled gazpacho with cucumber
    and almond‑enhanced broth, and pairing meals with homemade sangria and rosemary‑roasted potatoes at communal gatherings.
  core: Lidia Sandoval is a meticulous 60‑year‑old hazardous‑materials expert who intertwines a safety‑first career with vibrant community life—flamenco, gardening, and Spanish cooking—while battling a
    habit of over‑planning driven by chronic worry.
background:
  cultural: Lidia’s cultural identity is deeply rooted in her Spanish heritage. She was raised in a household where family gatherings, lively conversations, and shared meals were central, reflecting the
    Mediterranean emphasis on community and hospitality. Spanish traditions such as Semana Santa, Día de los Reyes, and regional festivals are celebrated with music, dance, and customary foods, which she
    continues to observe in Michigan. While she is fluent in English, she maintains conversational Spanish at home and occasionally follows Spanish-language news to stay connected to her roots. Her Catholic
    upbringing informs her values of compassion, cooperation, and respect for others. Living in Farmington, Lidia blends these traditions with Midwestern customs, participating in local holidays and volunteer
    initiatives, creating a multicultural lifestyle that honors both her ancestry and her American community.
attributes:
  skills: '[''Hazardous Materials Identification and Classification'', ''Regulatory Compliance (OSHA, EPA, Michigan DEQ)'', ''Safe Handling, Transportation, and Disposal Procedures'', ''Risk Assessment
