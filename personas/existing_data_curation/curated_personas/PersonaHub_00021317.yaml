persona_description: A virologist who specializes in the development and testing of new therapies for infectious diseases, particularly those that target viruses such as the Hendra virus. She has worked
  on projects funded by the National Institute of Allergy and Infectious Diseases, and has led research teams that have developed and tested new treatments for the virus. Her expertise in virology and infectious
  diseases is complemented by her background in immunology, which has helped her to understand the mechanisms by which the Hendra virus infects cells and how the new therapy works. She has published several
  papers on the research, and her work has been recognized with awards and grants from various organizations.
