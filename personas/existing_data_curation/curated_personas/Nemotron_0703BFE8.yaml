personas:
  professional: Jeanette Houston, a 23‑year‑old store manager in Paducah, leverages their hands‑on retail experience, Excel budgeting skills, and competitive drive to streamline operations, coach a team
    of eight, and they relentlessly pursue performance metrics while planning a future regional supervisor role.
  sports: Jeanette Houston, an avid hiker on the Ohio River Greenway, regularly joins a local trail club, follows the Louisville Cardinals basketball team, and schedules weekend 5‑k runs to stay active,
    balancing solitary outdoor pursuits with occasional team sport fandom, and they often set personal pace goals for each hike.
  arts: Jeanette Houston, a devoted reader of contemporary fiction by authors like Celeste Ng, a keen photographer capturing historic river towns in the style of Ansel Adams, and an admirer of singer‑songwriter
    H.E.R., weaves artistic appreciation into their solitary evenings and occasional gatherings, and they occasionally share printed photos with close friends.
  travel: Jeanette Houston, a planner who prefers short, well‑researched road trips, has explored historic river towns such as Huntington, WV and Vincennes, IN, dreams of a culinary pilgrimage to New Orleans,
    and they balance travel aspirations with a modest student budget, often mapping routes on a spreadsheet to maximize efficiency.
  culinary: Jeanette Houston, a home chef specializing in Southern comfort dishes like fried chicken, collard greens, and shrimp‑and‑grits seasoned with garden‑grown thyme and rosemary, frequently prepares
    intimate dinners for close friends while experimenting with new spice blends, though they occasionally over‑salt the cornbread.
  core: Jeanette Houston blends analytical precision with quiet curiosity, turning solitary hobbies—knitting, gardening, and photography—into disciplined rituals that fuel their competitive ambition, and
    they channel these passions into community‑focused entrepreneurial dreams.
background:
  cultural: Jeanette grew up in Paducah, a mid‑size town in western Kentucky, within a white, middle‑class family that emphasizes community, self‑reliance, and modesty. The regional culture—characterized
    by Southern hospitality, bluegrass and country music, and a strong church presence—has shaped her values and daily practices. Family gatherings, church events, and local festivals are central to her
    social life, reinforcing a sense of belonging and tradition. Her early marriage reflects regional norms of close‑knit family structures. The pervasive emphasis on hard work, practicality, and respect
    for tradition informs both her work ethic as a manager and her personal pursuits, such as gardening, cooking, and preserving local heritage.
