  career_goals: Jeanette aims to formalize her practical experience with an associate’s degree in business administration within the next two years, followed by a bachelor’s degree in management. She aspires
    to transition from store‑level management to a regional supervisory role for a national retail chain, leveraging her competitive drive to exceed performance targets. Long‑term, she hopes to open a boutique
    that showcases locally crafted Kentucky goods, blending her entrepreneurial spirit with her love for community heritage. To strengthen her credentials, she plans to earn a Certified Manager (CM) certification
    and attend leadership development workshops.
