  career_goals: John is drawn to careers that blend structure, teamwork, and his personal interests. He dreams of someday playing for the Green Bay Packers or working behind the scenes as a sports broadcaster,
    reflecting his love of football. He also enjoys creating things in the digital world, so he imagines becoming a video-game developer or a computer-science professional. Additionally, he admires community-focused
    jobs like firefighting or emergency medical services, where clear routines and helping others are central. At this stage, his ambition is to stay curious, improve his school performance, and explore
    these possibilities through high school courses and extracurricular activities.
