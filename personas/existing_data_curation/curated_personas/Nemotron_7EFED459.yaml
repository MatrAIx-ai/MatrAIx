personas:
  professional: John Carvajales, a budding game developer and LEGO architect, channels a love for structure into building intricate Minecraft mods with Scratch and designing original LEGO creations, while
    dreaming of turning those designs into future career projects.
  sports: John Carvajales kicks off weekends playing quarterback for the Green Bay Youth Football Club, roots for the Green Bay Packers on game days, cycles the neighborhood trails, and hikes the local
    state parks, balancing structured team practice with spontaneous bike rides.
  arts: John Carvajales sketches superhero comics inspired by Stan Lee and Alex Ross, composes simple melodies on a keyboard à la The Beatles, and builds elaborate LEGO dioramas that echo the blocky aesthetics
    of Minecraft, turning their imagination into tangible art.
  travel: John Carvajales enjoys weekend trips to the Wisconsin Dells for water parks, a yearly family road‑trip to Chicago’s Museum of Science and Industry, and dreams of a summer adventure at Disney World,
    preferring organized itineraries but leaving room for spontaneous detours to local fishing spots.
  culinary: John Carvajales favors classic thin‑crust pepperoni pizza, homemade mac and cheese with extra cheddar, and grilled trout caught from the local lake, often attempting to cook simple dishes like
    chocolate chip pancakes while occasionally skipping breakfast for cereal.
  core: John Carvajales thrives on building worlds—brick, digital, and comic—while juggling a scatter‑shot schedule, a secret stash of candy, and a habit of misplacing their inhaler.
background:
  cultural: 'John grows up in Green Bay, Wisconsin, a Midwestern city known for its strong community ties and a deep affection for the Green Bay Packers. His family traces its roots to German and Polish
    immigrants who settled in the area in the early 20th century, and many family traditions reflect that heritage, such as holiday meals featuring pierogi and bratwurst. He attends a local public school
    that emphasizes both academic achievement and community service, and he participates in neighborhood youth programs. Seasonal activities are a regular part of his life: summer outings to Lake Michigan
    for swimming and fishing, winter ice skating and hockey, and fall trips to local farms for pumpkin picking. The cultural atmosphere emphasizes modesty, hard work, and a friendly, neighborly spirit,
    which shape his values and everyday routines.'
