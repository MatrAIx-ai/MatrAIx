persona_description: A prominent American politician and businessman, Nelson Rockefeller was a Governor of New York and a member of the Democratic Party. He served as the Vice President of the United States
  under President Gerald Ford and was known for his controversial behavior and his reaction to a group of hippies heckling him in public. Rockefeller's net worth was estimated to be around $1 billion at
  the time of his death and Forbes Magazine estimated his overall net worth to be around $1 billion at the time of his death.
