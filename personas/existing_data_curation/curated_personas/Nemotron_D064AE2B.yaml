personas:
  professional: Eric Mcarthur, a budding community arts facilitator, leverages their photography expertise, DIY carpentry, and knack for rallying volunteers to lead informal workshops and local art events,
    while their spontaneous nature and occasional disorganization force them to rely on improvisation rather than rigid schedules.
  sports: Eric Mcarthur cycles year‑round with the Columbia River Trail Riders, hikes the Rattlesnake Hills in the summer, enjoys occasional snowshoeing in winter, and routinely roots for the Seattle Seahawks,
    Seattle Mariners, and Seattle Sounders while occasionally joining a local adult softball league.
  arts: Eric Mcarthur immerses themselves in creative expression by shooting nature photography inspired by Ansel Adams, attending contemporary exhibitions featuring artists like Yayoi Kusama, strumming
    acoustic renditions of Bon Iver and Sufjan Stevens, and volunteering to lead art‑therapy sessions for seniors at the community center.
  travel: Eric Mcarthur favors spontaneous, low‑budget road trips that combine hiking in the Columbia River Gorge, weekend forays to the Olympic Peninsula, and past adventures abroad to Iceland’s volcanic
    landscapes and Japan’s Kyoto temples, often booking just a night’s accommodation and letting the journey unfold without a tight itinerary, trusting that they will discover hidden gems along the way.
  culinary: Eric Mcarthur enjoys cooking hearty meals such as cedar‑plank salmon with wild rice and roasted root vegetables, experimenting with foraged mushrooms and fresh herbs from their garden, while
    also brewing their own pale‑ale using Cascade hops, reflecting a solid home‑cook skill set that balances rustic comfort with craft‑beer flair.
  core: Eric Mcarthur is a curious, nature‑driven community organizer who blends photography and woodworking into a flexible creative career, yet habitually procrastinates on paperwork and occasionally
    overspends on gear.
background:
  cultural: Eric identifies as a White American from the Pacific Northwest, shaped by the region's blend of self‑reliance, environmental awareness, and artistic curiosity. Growing up in a modest household
    near Richland, he was exposed to the area's scientific community centered around the Hanford Site while also experiencing the region's strong outdoors culture. This background fostered a respect for
    nature, a collaborative community spirit, and an openness to unconventional ideas, all of which inform his artistic pursuits and his desire to contribute positively to his local neighborhood.
attributes:
  skills: '[''DIY home maintenance'', ''Basic carpentry'', ''Landscape gardening'', ''Nature and portrait photography'', ''Digital photo editing (Lightroom, Photoshop)'', ''Basic computer troubleshooting'',
