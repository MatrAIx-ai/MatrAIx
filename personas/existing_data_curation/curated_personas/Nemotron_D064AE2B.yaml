  hobbies: '[''Nature photography excursions'', ''Spontaneous woodworking projects'', ''Visiting contemporary art galleries'', ''Home‑brewing craft beer'', ''Cycling and hiking in local trails'', ''Reading
    sci‑fi and philosophy'', ''Acoustic guitar playing'', ''Volunteering at community art programs'']'
  career_goals: Eric aspires to transform his eclectic skills into a flexible, purpose‑driven role that honors his love of art and community. He hopes to secure a part‑time position or freelance work as
    a community arts facilitator, where he can lead photography workshops and help organize local art events. He also dreams of launching a small online shop selling prints of his nature photographs and
    handmade wooden crafts. Long‑term, Eric wishes to obtain a horticulture certification so he can co‑manage a community garden, blending his gardening expertise with his desire to foster harmony and cooperation
    among neighbors.
