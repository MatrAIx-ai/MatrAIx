persona_description: A historian or anthropologist who is interested in the study of human societies, particularly those that have experienced significant economic and social transformations, such as the
  gold rushes in Australia and the American west. They are likely to be interested in the details of the Serra Pelada gold mine dispute, the history of the town of "stores and whores" and the unsolved murders
  in the town. They may also be interested in the broader context of the exploitation of labor in the mining industry and the impact it has on the communities affected.
