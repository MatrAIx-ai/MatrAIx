    and teamwork'', ''Leadership under pressure'', ''Adaptability and quick decision making'', ''Proficiency with flight simulation software'', ''Basic Spanish for aviation communication'', ''Project coordination'']'
  hobbies: '[''Aerial photography'', ''Model aircraft building'', ''Painting and sketching'', ''Attending local art exhibitions'', ''Live music concerts'', ''Hiking and camping'', ''Group social events'',
    ''Volunteering for youth STEM outreach'', ''Airshow attendance'', ''Reading science fiction and aviation history'', ''Playing recreational basketball'', ''Cooking and food exploration'']'
  career_goals: Redden aims to earn a type rating on a major commercial jet, such as the Boeing 737 or Airbus A320, within the next three years and to progress to a captain’s seat on a leading airline by
    his early thirties. He plans to complete his bachelor's degree in aviation management or aerospace engineering, followed by an MBA to broaden his qualifications for future leadership roles in airline
    operations or safety management. In the long term, he envisions either directing a flight training program that integrates cutting‑edge simulation technology or launching a community‑focused aviation
    outreach initiative that blends his love of flight with his passion for the arts and STEM education.
