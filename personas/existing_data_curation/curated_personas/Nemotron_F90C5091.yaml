personas:
  professional: Redden Smith, a certified pilot and aviation enthusiast, combines rigorous IFR flight planning, crew resource management, and a fluent grasp of aircraft systems with a curiosity for visual
    storytelling, channeling decisive leadership and artistic insight into every cockpit briefing they deliver.
  sports: Redden Smith avidly participates in group hikes across the Ozark trails, joins pick‑up basketball games at a community center, and follows the Kansas City Chiefs, Royals, and Sporting Kansas City,
    channeling competitive energy into both outdoor adventures and casual court play they relish on weekends.
  arts: Redden Smith frequently immerses themselves in Kansas City’s cultural pulse, attending gallery openings showcasing contemporary painter Njideka Akunyili Crosby, enjoying live sets by the indie folk
    band The War on Drugs at The Ragtag Club, and catching Broadway‑level productions like 'Hamilton' starring Leslie Odom Jr. at the Kauffman Center, experiences they credit for fueling their own creative
    projects.
  travel: Redden Smith approaches travel with meticulous flight‑plan precision and a love for spontaneous exploration, having logged bush‑flying trips to the Rocky Mountain foothills and a cultural pilgrimage
    to Paris’s Musée d’Orsay, while eyeing a future adventure to New Zealand’s Southern Alps for remote tailwheel landings they consider a dream itinerary.
  culinary: Redden Smith, an intermediate home chef, blends Kansas City barbecue’s smoky ribs with avant‑garde flavors such as miso‑infused ramen broth and bourbon‑glazed pork belly, frequently sourcing
    local heirloom tomatoes and house‑made hot sauce, and delights in tasting menus at Corvino Supper Club and farm‑to‑table dishes at Jess & James, culinary experiments they share on a growing Instagram
    feed.
  core: Redden Smith fuses a pilot’s precision with an artist’s curiosity, soaring through skies and capturing them on film, yet battles a habit of overpacking flight gear and staying up late editing photos,
    often checking weather apps obsessively they say is both a blessing and a curse.
background:
  cultural: Redden grew up in the close‑knit, predominantly white Midwestern community of Imperial, Missouri. His family runs a small, family‑owned business, instilling values of hard work, practicality,
    and community service. He attended local public schools where extracurriculars such as the school band and the 4‑H club nurtured teamwork and hands‑on learning. The region’s agricultural roots and modest,
    down‑to‑earth culture gave him a strong sense of reliability and humility. College exposure broadened his worldview, fostering an appreciation for diverse artistic expressions and global perspectives
    while reinforcing his Midwestern ethos of friendliness, openness, and a balanced respect for tradition and innovation.
attributes:
  skills: '[''Instrument Flight Rules (IFR) proficiency'', ''Multi-engine aircraft operation'', ''Crew Resource Management (CRM)'', ''Aircraft systems troubleshooting'', ''Flight planning and navigation'',
