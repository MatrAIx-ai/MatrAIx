persona_description: A researcher and scientist who specializes in the study of Alzheimer's disease and its associated proteins, particularly amyloid beta. The individual is involved in the development
  of drugs that target the formation of these clumps and has a strong interest in the prevention of neurodegenerative diseases. The researcher is working with Elan Corp. on a project to develop drugs that
  may shepherd the protein past the vulnerable state described in the paper, preventing the formation of beta amyloid clumps that have been associated with Alzheimer's disease since Alois Alzheimer first
  described them in 1906. The individual is also interested in the potential role of nuclear imaging tools in the diagnosis and treatment of Alzheimer's disease.
