  career_goals: Carol aspires to advance to a Director of Residential Life position within the next five years, where she can shape campus housing policy on a larger scale. She plans to complete her bachelor's
    degree in Higher Education Administration and pursue a master's in Student Affairs, focusing on inclusive community design. Her ambition includes launching a campus‑wide mental‑health initiative that
    leverages technology to connect residents with resources. Additionally, Carol hopes to mentor the next generation of residential staff, author a guide on resilient community leadership, and contribute
    to professional conferences on student development.
