personas:
  professional: Carol Deluca, a residential advisor at a mid‑size university, they blend curiosity‑driven program design with pragmatic crisis management, using calm resilience and assertive communication
    to de‑escalate conflicts while integrating data‑driven assessments and cultural competency to build inclusive campus communities.
  sports: Carol Deluca, an avid hiker on Indiana’s limestone trails and member of the Bloomington Trailblazers club, they follow the Indiana Pacers and Indianapolis Colts, incorporate weekly yoga sessions,
    and schedule monthly weekend hikes to balance cardio and mindfulness while occasionally joining a co‑ed softball league for low‑key competition.
  arts: Carol Deluca, who regularly visits the Indianapolis Museum of Art and local indie music venues, they find inspiration in the photographic work of Sally Mann, the folk melodies of Sufjan Stevens,
    and the theatrical brilliance of Lin‑Manuel Miranda’s *Hamilton*, weaving these influences into their own photography and occasional board‑game storytelling nights.
  travel: Carol Deluca, a 37‑year‑old who balances meticulous planning with spur‑of‑the‑moment curiosity, they favor eco‑friendly weekend getaways to Brown County, Indiana, and have a bucket list that includes
    a study‑focused trip to Barcelona’s modernist architecture and a hiking expedition across the Greek islands, all while budgeting travel funds through a dedicated savings envelope.
  culinary: Carol Deluca, an experimental home cook, they regularly perfect Mediterranean recipes such as grilled halloumi with za’atar, lemon‑scented chickpea stew, and olive‑and‑feta stuffed chicken,
    while also indulging in seasonal farm‑to‑table tasting menus at local eateries that showcase heirloom tomatoes and fresh herbs.
  core: Carol Deluca, a calm, curiosity‑driven residential advisor who secretly hoards exotic spice jars and can’t resist a well‑timed board‑game victory, they navigate life with data‑backed pragmatism
    and a penchant for solitary sunrise hikes.
background:
  cultural: Carol comes from an Italian‑American family that settled in the Midwest generations ago. Growing up in Indianapolis, she was raised with a blend of traditional Italian customs—Sunday family
    meals, occasional Italian language phrases, and a reverence for Catholic holidays—and the Midwestern values of friendliness, hard work, and community involvement. Her heritage instilled an appreciation
    for close‑knit family ties and food culture, while her Indiana upbringing emphasized independence, practicality, and local civic pride. This dual influence shapes her worldview, fostering both a respect
    for cultural roots and an openness to diverse perspectives within the broader American tapestry.
