personas:
  professional: Frances Adamic, a diligent third‑grader who loves building detailed LEGO sets and sketching animal characters, tackles school assignments with a step‑by‑step approach yet often leaves her
    backpack in a charmingly disorganized heap, reflecting her mix of structure and spontaneous creativity.
  sports: Frances Adamic plays on the Waukesha “Lion Cubs” youth soccer team, eagerly watches Milwaukee Bucks games with her family, roots for the Green Bay Packers on Sundays, and enjoys weekend bike rides
    along the lake trail, balancing team spirit with personal fitness.
  arts: Frances Adamic spends afternoons drawing comic‑style forest critters, is enchanted by the whimsical stories of Beatrix Potter, sings in the school choir where she admires Ariana Grande’s vocal power,
    and sometimes sneaks off to sing a karaoke rendition of “Let It Go” after dinner.
  travel: Frances Adamic enjoys weekend bird‑watching trips to Pewaukee Lake, hikes through Kettle Moraine State Forest, dreams of exploring Yellowstone National Park and Mackinac Island, and plans each
    outing by sticking colorful stickers on her travel map, though she often forgets to pack a raincoat for sudden showers.
  culinary: Frances Adamic loves the salty crunch of pretzel sticks baked during community fundraisers, enjoys homemade chicken noodle soup on chilly evenings, helps stir apple pie filling with her grandmother,
    and eagerly eats pepperoni pizza after a soccer game, but she has a habit of over‑salting her snack crackers.
  core: Frances Adamic is a curious nine‑year‑old who thrives on structured LEGO builds, worries about meeting expectations, finds peace in nature and music, and occasionally misplaces her colored pencils
    in the rush of creative bursts.
background:
  cultural: Frances grew up in Waukesha, a suburban community in southeastern Wisconsin that reflects classic Midwestern values. Her family celebrates typical American holidays—Thanksgiving, Christmas,
    and Fourth of July—with gatherings that emphasize togetherness, modesty, and gratitude. The local culture encourages participation in school and community events, such as fall festivals, volunteer clean-up
    days, and youth sports, which have shaped Frances's sense of civic responsibility. The region's strong public school system places emphasis on academic achievement, reliability, and respect for authority,
    aligning with her preference for predictable routines. Outdoor recreation is a common family activity; nearby lakes and forest trails provide opportunities for fishing, hiking, and observing wildlife,
    reinforcing her love of nature and animals. While her ethnic background is white American, her upbringing blends a mix of cultural influences from neighboring German-American and Scandinavian-American
    heritage common in Wisconsin, manifesting in occasional traditions like baking pretzels for community events or attending a local church that values community service. These experiences collectively
    contribute to her polite demeanor, collaborative spirit, and occasional anxiety about meeting community expectations.
