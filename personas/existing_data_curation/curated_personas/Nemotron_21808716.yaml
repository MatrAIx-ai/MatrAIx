    participation'']'
  career_goals: Frances dreams of a future where she helps living things and makes a difference in her community. She often says she wants to become a veterinarian because she loves animals and enjoys caring
    for the family dog, and she feels that the job combines her practical problem-solving with compassion. She also imagines herself as a teacher, especially a kindergarten or first-grade teacher who can
    create a predictable, supportive classroom for kids who feel anxious, reflecting her own wish for structure and calm. In the short term, she aims to improve her reading speed, win a school science fair
    with a project about animal habitats, and earn a "Reading Star" award. She hopes these achievements will build confidence and reduce the worry she sometimes feels about school performance.
