  career_goals: Lonnie aspires to turn his artistic talents into a career as a concept artist for video games or an animation studio, aiming to attend a reputable art college or apprenticeship program.
    He wants to create a standout portfolio that blends his love for abstract visual design with storytelling. In the future, he hopes to open a community art space in Amarillo that provides workshops for
    other youth, and perhaps curate exhibitions that explore the intersection of technology and imagination. He also dreams of contributing to indie game projects that emphasize narrative depth and visual
    innovation.
