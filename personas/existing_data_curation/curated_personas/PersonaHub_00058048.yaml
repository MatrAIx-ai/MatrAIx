persona_description: A biologist who specializes in the study of homeothermic and endothermic organisms, particularly birds and mammals. Their research interests include the physiological and behavioral
  adaptations of these organisms to maintain a constant internal temperature, and the mechanisms by which they regulate their body temperature. They are also interested in the differences between poikilotherms
  and homeotherms, and the strategies that animals use to compensate for the absence of internal regulation. They may also have knowledge of the role of heat sources in the regulation of body temperature
  in ectothermic organisms, and the importance of behavioral strategies in thermoregulation.
