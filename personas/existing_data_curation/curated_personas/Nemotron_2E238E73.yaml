  hobbies: '["Art Gallery Visits", "Theater and Live Music", "Reading Literary Fiction and Philosophy", "Journaling", "Cooking Indian and Fusion Cuisine", "Hosting Tasting Evenings", "Chess", "Running",
    "Yoga", "Attending Art Workshops"]'
  career_goals: Building on his track record as a management analyst, Amit aims to transition into senior leadership, targeting roles such as Director of Strategy or Head of Business Insights within a forward‑looking
    organization. He intends to deepen his technical expertise through certifications like the PMP and a data analytics specialization, and is considering pursuing an MBA to broaden his strategic acumen.
    Amit aspires to lead high‑impact, cross‑functional initiatives that fuse analytical rigor with creative problem‑solving, champion a data‑driven culture, and mentor emerging analysts. In the longer term,
    he envisions establishing his own consultancy that helps corporations incorporate cultural intelligence and artistic perspectives into strategic planning.
