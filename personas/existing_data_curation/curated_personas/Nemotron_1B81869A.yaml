  hobbies: '[''Cooking traditional Dominican dishes'', ''Gardening'', ''Walking and birdwatching'', ''Reading historical fiction'', ''Journaling'', ''Listening to merengue and bachata'', ''Crossword puzzles'',
    ''Participating in senior-center cultural events'']'
  career_goals: Although approaching retirement, Rosa aims to transition to a part‑time mentorship role where she can share her production‑floor expertise with younger colleagues, particularly on safety
    best practices and efficient workflow design. She hopes to complete a short certificate in occupational safety offered by a community college, reinforcing her commitment to a safe work environment.
    Beyond the plant, Rosa plans to volunteer at the local senior center, teaching cooking classes that celebrate Dominican culinary heritage, and to continue learning about emerging production technologies
    so she can advise on process improvements even after she steps back from full‑time work.
