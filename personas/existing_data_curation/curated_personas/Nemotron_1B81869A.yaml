personas:
  professional: Rosa Sotolongo is a seasoned production technician with three decades of experience operating and maintaining conveyor‑belt and packaging equipment in Central Florida factories, and they
    apply their organized, safety‑first mindset and bilingual communication skills to mentor younger workers while constantly worrying about meeting quality standards.
  sports: Rosa Sotolongo enjoys gentle morning walks through the tree‑lined streets of DeLand, participates in the DeLand Senior Walking Club, follows the Orlando Magic and Tampa Bay Rays on television,
    and they treat their daily strolls as light cardio, occasionally joining a local birdwatching group to keep active and engaged.
  arts: Rosa Sotolongo finds inspiration in the lively rhythms of Juan Luis Guerra and Marc Anthony, delights in reading historical fiction by Julia Alvarez, and they regularly attend cultural evenings
    at the senior center where local performers stage traditional dances and folk songs.
  travel: Rosa Sotolongo prefers well‑planned, budget‑friendly trips that blend relaxation with cultural immersion, having visited the historic streets of Old San Juan and the colonial charm of Cartagena,
    Colombia, while dreaming of a leisurely cruise through the Bahamas and a short stay in Asheville, North Carolina to explore its arts scene.
  culinary: Rosa Sotolongo is a master of traditional Caribbean cooking, expertly preparing hearty sancocho with plantains, chicken, and a broth seasoned with cilantro, steaming mangu topped with sautéed
    onions, and sweet pastelitos filled with guava, and they often source fresh tomatoes, peppers, and herbs from their backyard garden to create communal meals for friends and neighbors.
  core: Rosa Sotolongo merges meticulous work ethics with a warm, kitchen‑centered hospitality, yet they have a habit of over‑checking the stove and repeatedly rereading grocery lists, revealing a lingering
    worry that colors even their most relaxed moments.
background:
  cultural: Rosa was born in the Dominican Republic and moved to Florida as a young adult. Her upbringing immersed her in the island’s rich traditions of family‑centered celebrations, music, and cuisine.
    She maintains a strong connection to the Dominican community in Lake County, attending church gatherings, Dominican festivals, and senior‑center events that feature bachata and merengue. Her bilingual
    ability reflects the linguistic duality of her heritage, allowing her to navigate both Spanish‑speaking family settings and English‑dominant work environments. These cultural roots inform her values
    of hospitality, resilience, and community service, which she expresses through cooking for neighbors, mentoring younger coworkers, and volunteering to preserve Dominican cultural practices in her adopted
    hometown.
attributes:
