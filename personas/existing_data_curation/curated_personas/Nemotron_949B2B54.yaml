  career_goals: Joseph envisions a career that blends his practical mindset with his love for people and community. In the short term, he plans to excel in math and science, join the school's robotics and
    student council teams, and volunteer as a peer mentor. His long‑term ambition is to become a civil engineer or urban planner, designing infrastructure that improves the everyday lives of Olathe residents.
    He also hopes to hold leadership roles in community development projects, eventually acting as a liaison between local government and youth organizations.
