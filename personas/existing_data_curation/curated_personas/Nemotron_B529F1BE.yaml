  career_goals: Although still young, Mohammad dreams of becoming someone who can protect and help both people and animals. He often talks about wanting to be a firefighter because he admires the teamwork
    and practical problem‑solving, and he also imagines being a veterinarian to care for injured wildlife he discovers on nature walks. His long‑term ambition is to grow into a reliable community helper
    who blends curiosity about how things work with a desire to keep others safe and happy.
