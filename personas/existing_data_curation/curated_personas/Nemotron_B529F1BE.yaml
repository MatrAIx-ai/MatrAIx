personas:
  professional: Mohammad Godinez is an aspiring young naturalist and LEGO architect who channels their methodical planning and love of the outdoors into building detailed wildlife habitats out of bricks,
    often sketching designs first and sharing them with family during church potluck gatherings.
  sports: Mohammad Godinez is a member of the local youth baseball league and the Cub Scouts Hiking Pack who cheers on the Washington Nationals, enjoys seasonal creek swims in summer, and spends Saturdays
    climbing trees with their scouting group at the county fairgrounds.
  arts: Mohammad Godinez is a budding illustrator and avid audiobook listener who draws intricate forest scenes inspired by Dr. Seuss, enjoys stories by C.S. Lewis, sings along to The Wiggles and bluegrass
    tunes from The Osborne Brothers, and watches animated adventures featuring Moana and Mickey Mouse.
  travel: Mohammad Godinez is an enthusiastic explorer who loves weekend road trips to Shenandoah National Park, annual visits to their grandparents’ farm during harvest season, a coveted family vacation
    to Walt Disney World, and dreams of trekking the Appalachian Trail as a teen, always planning routes with the help of a colorful map.
  culinary: Mohammad Godinez is a budding chef who delights in making peanut butter and jelly sandwiches, helps stir mac and cheese with extra cheddar, loves sweet corn on the cob at county fairs, savors
    apple pie with a dash of cinnamon, and enjoys crafting s’mores over campfires during family camping outings.
  core: Mohammad Godinez is a methodical 7‑year‑old explorer who merges a quiet curiosity for nature and LEGO construction with a tender heart that feels intense anxiety during small setbacks, and they
    often seek comfort in drawing and puzzles.
background:
  cultural: Mohammad was raised in Wytheville, a small town in the Appalachian foothills of southwestern Virginia. His family’s traditions reflect a blend of classic Southern rural life—such as seasonal
    visits to local farms, community church gatherings, and county fairs—and an openness to cultural curiosity encouraged by his parents, who chose his name to honor diversity. Growing up amidst the rolling
    hills, he has a strong connection to nature, values community cooperation, and has been taught the importance of hard work, politeness, and respecting local customs while also engaging with broader
    ideas through school and media.
