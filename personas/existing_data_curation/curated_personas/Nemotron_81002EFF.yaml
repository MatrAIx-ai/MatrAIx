  hobbies: '[''Watercolor painting'', ''Cueca dancing'', ''Herb and salsa gardening'', ''Reading historical fiction'', ''Book club facilitation'', ''Walking club participation'', ''Community radio arts
    segment hosting'']'
  career_goals: Although retired, Diana is driven to create a lasting cultural legacy in her community. She aims to establish a permanent Chilean‑Cultural Corner at the local library, host a weekly cooking
    demonstration series, and publish a memoir‑cookbook that intertwines her personal history with family recipes. She plans to earn a senior‑college certificate in Community Arts Management to formalize
    her volunteer leadership, and hopes to travel back to Chile within the next two years to record oral histories from relatives for future generations.
