  hobbies: '[''Beach walking'', ''Birdwatching'', ''Reading historical fiction'', ''Cooking (Mediterranean and Swedish cuisine)'', ''Live music events'', ''Social dancing (salsa, swing)'', ''Painting (watercolor)'',
    ''Community gardening'', ''Volunteering at animal shelter'', ''Traveling (road trips along Pacific Coast)'']'
  career_goals: Jacquelyn aims to launch an intergenerational community garden in Oceanside, where seniors and youth can share gardening knowledge and harvest produce for local food banks. She also plans
    to develop a series of "Tech for Seniors" workshops, helping older adults navigate smartphones and video‑calling platforms. Additionally, she hopes to document her family's Swedish‑American heritage
    in a memoir and become a mentor for younger volunteers at the local senior center, fostering leadership and community spirit.
