personas:
  professional: Janice Banks, an aspiring arts administrator with a knack for Adobe Creative Suite, channels their meticulous project‑management skills into curating pop‑up shows and organizing community
    block parties while steadily working toward a program coordinator role at a Brooklyn nonprofit.
  sports: Janice Banks, a devoted Brooklynite, follows the Brooklyn Nets and New York City FC with avid enthusiasm, and they participate in weekly sunrise runs with the Prospect Park Runners club while
    complementing these activities with daily yoga practice at a local studio to keep both mind and body centered.
  arts: Janice Banks, a relentless curator of Brooklyn’s underground art scene, frequents the work of contemporary visual artists like Kehinde Wiley and the performance pieces of Ai Weiwei, devours novels
    by Colson Whitehead and Ocean Vuong, and regularly stages spoken‑word showcases at local cafés where they unleash their own poetry.
  travel: Janice Banks, who balances a tight community budget with a yearning for cultural immersion, meticulously plans weekend getaways to vibrant neighborhoods like Harlem’s historic jazz clubs, savors
    extended trips to Havana to explore Afro‑Caribbean culinary roots, and dreams of a future art‑focused pilgrimage through the murals of Lisbon and the galleries of Berlin, all while they keep a detailed
    spreadsheet of travel expenses.
  culinary: Janice Banks, an inventive home chef, whips up soulful dishes like smoked collard greens with a dash of smoked paprika, perfects jerk chicken marinated in Scotch bonnet peppers and allspice,
    and delights friends with sweet‑potato gnocchi tossed in a brown butter sage sauce, all while they source fresh herbs from the local farmer’s market.
  core: Janice Banks blends razor‑sharp organization with an insatiable curiosity, turning every gallery visit and dinner party into a meticulously logged experiment, yet they habitually binge‑watch art
    documentaries late into the night, sacrificing sleep for the next big idea.
background:
  cultural: Janice identifies as African‑American with family roots in the American South and a great‑aunt who immigrated from Jamaica, giving her a blend of Southern and Caribbean cultural influences.
    Growing up in a close‑knit Brooklyn neighborhood, she was immersed in church life, Sunday potlucks, Juneteenth celebrations, and Kwanzaa traditions. She draws inspiration from Black visual artists,
    musicians, and writers, and she actively participates in local cultural festivals that honor Black heritage. This multicultural upbringing informs her love for storytelling, community solidarity, and
    the preservation of Black artistic expression.
attributes:
  skills: '[''Adobe Photoshop'', ''Adobe Illustrator'', ''Event Planning'', ''Project Management (Trello, Asana)'', ''Budgeting and Financial Tracking'', ''Community Outreach'', ''Digital Marketing (social
    media content creation)'', ''Photography'']'
  hobbies: '[''Visiting galleries and street murals'', ''Yoga and meditation'', ''Cooking soul food and Caribbean cuisine'', ''Reading contemporary African‑American literature'', ''Photography of urban
    landscapes'', ''Writing poetry and spoken‑word performance'', ''Volunteering for community art programs'', ''Attending live jazz and indie music shows'']'
  career_goals: Janice plans to complete her bachelor’s degree in Arts Administration, leveraging her community‑organizing experience to secure a full‑time role as a program coordinator for a nonprofit
    arts center in Brooklyn. Over the next five years, she aims to become a program director, overseeing exhibitions, youth workshops, and public art initiatives. She also dreams of launching a collaborative
    art studio that offers affordable studio space and mentorship for emerging Black artists, and hopes to use her organizational expertise to sustainably grow that venture.
