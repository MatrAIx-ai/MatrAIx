  career_goals: Joanna aims to transition into a senior data architect role, where she can lead enterprise‑wide data strategy and cloud migration initiatives. She plans to earn advanced certifications such
    as AWS Certified Solutions Architect and Azure Solutions Architect Expert to deepen her cloud expertise. Over the next five years, she hopes to spearhead the modernization of legacy database environments
    for regional enterprises, establish robust data governance processes, and mentor a team of junior DBAs and data engineers. Joanna also values maintaining a flexible work schedule that allows her to
    continue exploring personal interests while delivering high‑impact, resilient data solutions.
