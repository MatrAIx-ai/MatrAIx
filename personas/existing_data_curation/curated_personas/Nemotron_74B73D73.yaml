personas:
  professional: Joanna Sardinas, a seasoned database professional known for designing scalable data architectures and fine‑tuning complex SQL queries, blends a curiosity for emerging cloud services with
    a practical focus on reliability, while their relaxed attitude toward strict deadlines lets them prioritize flexibility and creativity in leading enterprise‑wide data migration projects.
  sports: Joanna Sardinas fuels a love of the outdoors by hiking the Ozark trails and kayaking the Arkansas River, supports the Arkansas Razorbacks football team and the St. Louis Cardinals, and balances
    these activities with weekly yoga sessions that keep them mentally clear and physically resilient.
  arts: Joanna Sardinas enjoys immersing themselves in mystery novels by Agatha Christie, historical epics by Hilary Mantel, and listening to the soulful guitar work of Alabama Shakes, often hosting board‑game
    nights where witty banter and strategic play reveal their cooperative yet assertive spirit.
  travel: Joanna Sardinas prefers spontaneous road trips that blend adventure and culinary discovery, having driven up the Texas Hill Country for barbecue and explored the blue‑green waters of the Great
    Barrier Reef, while they plan a future trek through Patagonia's Torres del Paine to combine rugged hiking with photography.
  culinary: Joanna Sardinas experiments with Southern‑inspired dishes like shrimp and grits, smoked brisket, and pimento cheese, cooking with a modest skill level that sometimes results in over‑spiced sauces
    when they get distracted by tech tinkering, and they love hosting informal dinner gatherings where friends sample their latest culinary hack.
  core: Joanna Sardinas is a calm, curiosity‑driven data architect who balances meticulous database design with flexible, occasionally disorganized, weekend adventures in the outdoors and the kitchen.
background:
  cultural: Joanna grew up in the Mid‑Southern United States, where a blend of Midwestern pragmatism and Southern hospitality shaped her worldview. Her family emphasized the value of education, self‑reliance,
    and community service, fostering her balanced curiosity and practical mindset. She retains an appreciation for regional traditions such as outdoor recreation, Southern cuisine, and local music, while
    also embracing a broader, inclusive perspective informed by her STEM education and career in technology.
