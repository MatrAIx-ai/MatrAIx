persona_description: A concerned citizen who is passionate about protecting and preserving Missouri's streams and the diverse ecosystems they support. This individual is aware of the challenges facing many
  of these streams due to pollution, development, and lack of management. They value the vital role that streams play in supporting agriculture, wildlife, and human health. They are dedicated to advocating
  for policies and practices that promote the health and sustainability of Missouri's streams. This person is likely to be involved in local environmental groups, participate in river clean-up efforts,
  and support organizations that work to protect and restore these vital waterways.
