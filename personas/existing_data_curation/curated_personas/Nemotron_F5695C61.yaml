personas:
  professional: Ruben Cortessantiago, a senior strategic analytics manager, leverages advanced statistical modeling, Python‑driven data visualization, and Agile project leadership to translate complex datasets
    into actionable narratives, while their imaginative curiosity and methodical reliability fuel design‑thinking workshops that inspire cross‑functional teams, and they maintain a calm, cooperative demeanor
    that steadies high‑stakes stakeholder discussions.
  sports: Ruben Cortessantiago, an avid weekend hiker of the San Bernardino foothills, plays casual soccer with the Chino Hills Soccer Club, follows the Los Angeles Lakers, Dodgers and Galaxy with dedicated
    fan enthusiasm, and they maintain a low‑key home‑gym routine of bodyweight circuits that blends competitive spirit with their laid‑back approach to fitness.
  arts: Ruben Cortessantiago, who spends evenings sketching abstract canvases inspired by folk motifs, frequents the Broad and MOCA for contemporary installations, collects works by Frida Kahlo, Diego Rivera
    and emerging Latinx street artist LaCura, and regularly attends jazz concerts featuring Esperanza Spalding and the Dave Brubeck Quartet, and they allow these cultural encounters to fuel their creative
    problem‑solving at work.
  travel: Ruben Cortessantiago, a meticulous planner who earmarks an annual travel fund, enjoys cultural immersion trips to Oaxaca’s mole festivals and Kyoto’s historic temples, takes spontaneous weekend
    drives to Santa Barbara’s coastline, and they dream of trekking Patagonia’s Torres del Paine, all while balancing family commitments and a modest budget.
  culinary: Ruben Cortessantiago, a competent home chef, reimagines mole by blending dark chocolate, pasilla chiles and toasted sesame, crafts quinoa‑filled tamales seasoned with epazote, experiments with
    sous‑vide carne asada, and they admit a guilty habit of late‑night coffee sweetened with a dash of cinnamon.
  core: Ruben Cortessantiago intertwines data‑driven strategy with vibrant artistic expression, maintaining a calm, community‑focused life that swings between meticulous analytics, late‑night painting sessions,
    and family‑centered mole experiments, while they occasionally lose sleep over perfecting a new recipe.
background:
  cultural: Ruben grew up in a Mexican‑American household in Southern California, speaking both Spanish and English fluently. He maintains a strong connection to his heritage through family gatherings,
    celebrating Día de los Muertos and Mexican Independence Day, and cooking traditional dishes that he now reimagines with contemporary flavors. He participates in local community events organized by the
    Chino Hills Latino Cultural Center and volunteers as a STEM mentor for Mexican‑American youth. While his professional life aligns with mainstream American corporate culture, his personal values are
    deeply informed by the collectivist, family‑oriented ethos of Mexican culture, emphasizing respect, hospitality, and solidarity.
