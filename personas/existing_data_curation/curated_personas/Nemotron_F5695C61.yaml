  career_goals: Ruben aims to advance to a senior director role overseeing strategic analytics and digital transformation within a multinational corporation. He seeks to lead a team that integrates data
    science with creative innovation, championing design-thinking approaches to solve business challenges. Over the next five years he plans to obtain a PMP certification and a Certified Analytics Professional
    (CAP) credential, publish thought-leadership articles on the intersection of data and art, and mentor underrepresented minorities in STEM fields. Ultimately he envisions influencing corporate culture
    to prioritize evidence-based decision-making while fostering an environment that values curiosity and artistic expression.
