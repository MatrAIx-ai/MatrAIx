personas:
  professional: Patrick Ashmore is an aspiring junior developer who blends Python coding, Arduino hardware tinkering, and project‑management chops to create practical automation tools, approaching each
    task with methodical curiosity, competitive efficiency, and a calm, skeptical eye toward shortcuts.
  sports: Patrick Ashmore is an avid outdoors enthusiast who hikes the Ozark trail system, fishes at Truman Lake, and follows the St. Louis Cardinals and Missouri Tigers, occasionally joining a local hiking
    club to stay fit while balancing his love for solitary exploration with occasional team sports camaraderie.
  arts: Patrick Ashmore is a sci‑fi literature aficionado who devours works by Isaac Asimov and watches thought‑provoking series like Black Mirror, while his playlists feature ambient electronica from Brian
    Eno and cinematic scores by Hans Zimmer, shaping his creative thinking and providing a soundtrack for late‑night coding sessions.
  travel: Patrick Ashmore prefers well‑planned, budget‑conscious road trips that blend adventure with relaxation, having explored the historic streets of St. Louis, camped in the Arkansas Ozarks, and dreaming
    of a future tech‑focused pilgrimage to Seattle’s startup hubs and a cultural immersion in Kyoto, Japan.
  culinary: Patrick Ashmore enjoys simple, high‑protein meals such as grilled trout seasoned with lemon and dill, hearty quinoa‑black bean chili, and occasionally treats himself to a slice of pepperoni
    pizza after a marathon coding session, while his snack stash of trail mix and jerky fuels his hikes.
  core: Patrick Ashmore is a calm, competitively curious 18‑year‑old who fuses hands‑on tech tinkering with strategic chess, frugal investing, and nature‑filled escapes, navigating life with methodical
    skepticism and occasional indulgences in pizza and new sensor gadgets.
background:
  cultural: Patrick grew up in the Midwestern town of Kirksville, Missouri, a community that values self‑reliance, modesty, and a strong work ethic. His family’s background is rooted in small‑town middle‑class
    values, with an emphasis on education, community involvement, and modest celebration of traditional American holidays such as Thanksgiving and the Fourth of July. He attended a local public high school
    where extracurriculars like the robotics club and varsity debate sharpened his competitive spirit and curiosity. While his upbringing is predominantly white and rural, he has been shaped by the blend
    of college life at Truman State University—exposing him to diverse ideas—and the close‑knit community atmosphere of Adair County, where neighbors often help each other with farm‑related tasks or local
    events. This cultural mix fosters his practical outlook, calm resilience, and balanced approach to social interaction.
attributes:
  skills: '["Python programming", "C++ basics", "Arduino/Raspberry Pi hardware prototyping", "Data analysis with Excel and SQL", "Technical troubleshooting", "Project planning and time management", "Competitive
    problem solving"]'
  hobbies: '["Building Arduino projects", "Playing chess", "Hiking in Ozark trails", "Fishing at Truman Lake", "Reading sci‑fi novels and tech podcasts", "Cooperative video gaming with friends"]'
  career_goals: Patrick aims to complete his associate degree in computer science and transfer to a four‑year university to earn a bachelor's in software engineering. His short‑term goal is to land a junior
    developer internship at a regional tech or manufacturing firm where he can apply his blend of practical coding skills and hardware insight to develop tools that improve operational efficiency. In the
    medium term, he aspires to become a full‑stack developer and eventually a software architect, leading teams that create robust, real‑world applications, particularly those serving the agricultural and
    biotech sectors prominent in Missouri. His long‑term ambition is to launch his own startup focused on low‑cost IoT solutions for small farms, marrying his curiosity for new technology with a practical
    mindset to address local community needs.
