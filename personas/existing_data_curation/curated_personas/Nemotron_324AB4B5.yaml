  hobbies: '["Watercolor painting", "Mural sketching", "Hiking", "Acoustic guitar", "Photography", "Board game nights", "Visiting art galleries", "Attending live music festivals", "Cooking experimental
    recipes", "Reading contemporary philosophy"]'
  career_goals: Kenneth aims to transition his practical painting career toward roles that merge craftsmanship with artistic expression. He hopes to lead community mural initiatives in Olympia, launch a
    boutique studio offering bespoke decorative painting services, and teach engaging workshops that blend technical skills with art theory. Long‑term, he envisions becoming a recognized voice in the Pacific
    Northwest’s public art scene, mentoring emerging artists while maintaining the flexibility and low‑stress work style he values.
