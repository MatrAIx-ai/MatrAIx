personas:
  professional: Kathleen Johnson, an experienced restaurant supervisor with a decade of hands‑on kitchen and front‑of‑house management, leverages her detail‑oriented scheduling, inventory control, and ServSafe
    expertise to mentor staff and streamline operations, all while eyeing a regional management role and a Certified Food Safety Manager credential, and they are actively pursuing an associate degree in
    hospitality management.
  sports: Kathleen Johnson hits the Blue Ridge trails for regular hikes in spring and fall, joins a weekend community softball league, follows the Washington Nationals and the West Virginia Mountaineers
    with enthusiasm, and balances their love of nature with structured cardio sessions that include interval walking and occasional yoga classes at the local community center.
  arts: Kathleen Johnson immerses themselves in Appalachian folk music, strumming the banjo alongside local jam sessions and admiring artists such as Ralph Stanley and Alison Krauss, while also quilting
    intricate patterns inspired by traditional motifs, attending performances at the Shenandoah Summer Music Festival, and occasionally enjoying a night of classic country films starring Johnny Cash.
  travel: Kathleen Johnson favors modest road trips along the Blue Ridge Parkway and weekend getaways to Asheville, Nashville, and the historic towns of the Cumberland Valley, while dreaming of a culinary
    pilgrimage to the farm markets of Tuscany, balancing a love of local discovery with the constraints of a single‑income household and family responsibilities.
  culinary: Kathleen Johnson, a competent home cook, delights in preparing pan‑seared trout with an apple butter glaze, hearty bean and collard greens soup, and fresh garden zucchini pasta, often sourcing
    heirloom tomatoes, Appalachian honey, and locally milled cornmeal from the farmers' market to create seasonal farm‑to‑table dishes for family dinners.
  core: Kathleen Johnson blends meticulous organization with Appalachian humility, obsessively double‑checking inventory spreadsheets even at dinner, but they frequently forget to water their garden during
    busy weeks and have a habit of humming folk tunes while reviewing staff schedules.
background:
  cultural: Kathleen was raised in a close‑knit white Appalachian family with deep roots in West Virginia. Her heritage includes German and Scots‑Irish ancestry, and she grew up immersed in the region’s
    traditions of hospitality, self‑reliance, and community service. Sunday church attendance at a local Methodist congregation reinforced values of mutual support and humility. Seasonal events such as
    the Jefferson County Apple Butter Festival and local farmers' markets shaped her appreciation for regional foods and crafts. These cultural influences fostered a practical work ethic, a strong sense
    of place, and a commitment to contributing positively to her small‑town community.
