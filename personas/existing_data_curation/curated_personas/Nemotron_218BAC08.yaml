  career_goals: Kathleen aims to leverage her supervisory experience to advance into a regional restaurant management role for a multi‑unit chain, where she can apply her organizational strengths to oversee
    larger operations. She plans to earn a Certified Food Safety Manager certification and, if possible, complete a hospitality management associate degree through a community college. Long‑term, she envisions
    opening her own farm‑to‑table eatery that highlights locally sourced Appalachian ingredients, combining her practical kitchen expertise with her community‑oriented values.
