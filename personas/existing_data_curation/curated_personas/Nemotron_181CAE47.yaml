    ''Public speaking and parent‑teacher communication'', ''Grant writing for educational programs'', ''Professional development facilitation'', ''Mentoring and teacher coaching'']'
  hobbies: '[''Visiting art museums and galleries'', ''Participating in community theater productions'', ''Gardening and horticulture'', ''Hiking and nature walks'', ''Photography (especially educational
    and nature subjects)'', ''Reading popular science and history books'', ''Competing in trivia and board‑game nights'', ''Cooking and trying new recipes'', ''Volunteering at local science fairs and STEM
    outreach events'', ''Traveling to historic sites and cultural festivals'']'
  career_goals: Beatrice aspires to become the district’s STEM coordinator, where she can scale her STEAM curriculum innovations across all schools in Lake County. She plans to earn a master’s degree in
    Educational Leadership to strengthen her administrative skills and to secure state and private grants that will fund after‑school robotics and coding clubs. Long‑term, she hopes to influence state curriculum
    standards, mentor emerging educators, and establish a community partnership network linking schools with local museums, art centers, and technology firms. Her competitive nature drives her to set measurable
    targets, such as increasing student participation in science fairs by 30% within three years.
