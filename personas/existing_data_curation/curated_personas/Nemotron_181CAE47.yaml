personas:
  professional: Beatrice Thompson, a veteran middle‑school science teacher with two decades of experience, they leverage their curiosity, methodical planning, and competitive drive to craft data‑driven
    STEAM curricula that integrate coding platforms, interactive whiteboards, and hands‑on art projects, while also leading grant‑writing workshops and mentoring new educators.
  sports: Beatrice Thompson, an energetic outdoor enthusiast, they join the Lake County Trail Runners Club for weekend hikes, play recreational tennis at the local community center, follow the Cleveland
    Browns and Cleveland Guardians avidly, and fit in morning yoga sessions to balance the competitive drive that fuels their love of staying fit.
  arts: Beatrice Thompson, a passionate participant in the Lake County Playhouse community theater troupe, they enjoy sketching museum exhibits ranging from Monet to Frida Kahlo, frequently attend performances
    of Lin‑Manuel Miranda’s shows, and curate a personal playlist featuring Bob Dylan and Joni Mitchell that inspires their classroom projects.
  travel: Beatrice Thompson, a methodical planner who prefers balanced itineraries, they frequently road‑trip to national parks like Acadia and Shenandoah, dream of exploring Kyoto’s historic temples, and
    budget each vacation around school breaks to ensure they can fund both travel and the seasonal garden supplies they cherish.
  culinary: Beatrice Thompson, an inventive home cook with a love for seasonal produce, they regularly prepare dishes such as roasted butternut squash soup, quinoa‑studded ratatouille, and homemade sourdough
    using fresh rosemary and thyme, and experiment with new recipes each month while balancing busy school commitments.
  core: Beatrice Thompson blends a relentless curiosity with a meticulous, competitive spirit, turning classroom science into vibrant STEAM experiences, while they juggle a thriving garden, trivia victories,
    and a penchant for late‑night recipe experiments that sometimes cut into sleep.
background:
  cultural: Beatrice was raised in a middle‑class suburban family in the Midwest, with roots tracing back to German and Irish ancestry. Growing up in Munster, Indiana, she absorbed the region’s emphasis
    on community involvement, modesty, and a strong work ethic. Local traditions—thanksgiving gatherings, Fourth of July celebrations, and church‑based service projects—shaped her sense of civic responsibility.
    While she values these Midwestern traditions, her STEM education and curiosity have fostered an openness to new ideas and cultural experiences, leading her to embrace multicultural art exhibits, diverse
    literature, and inclusive classroom practices. Her cultural identity blends respect for heritage with a forward‑looking, collaborative spirit.
attributes:
  skills: '[''STEM curriculum development'', ''Mathematics instruction for elementary and middle school'', ''Project‑based STEAM lesson design'', ''Technology integration (smartboards, coding tools, robotics
