persona_description: Christopher Ritchlin, M.D., M.P.H., is a professor of Medicine at the University of Rochester Medical Center who specializes in the diagnosis and treatment of psoriatic arthritis, a
  rare autoimmune disease that causes joint damage and abnormal bone growth. He is a leader in the field and has presented guidelines for physicians on the best treatments for psoriatic arthritis. Ritchlin
  is known for his expertise in the treatment of psoriasis and psoriatic arthritis, and has published numerous research papers on the subject.
