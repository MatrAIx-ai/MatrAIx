personas:
  professional: Dawn Smith, a proactive business administration student with a knack for Excel data tracking and polished PowerPoint presentations, channels their love for structure and sociability into
    coordinating campus events and mastering festival logistics, and they aim to secure an office manager role in Lafayette's hospitality sector.
  sports: Dawn Smith, who enjoys intramural volleyball during spring and lively Zydeco dance nights year‑round, stays fit by rotating between court drills, quickstep footwork, and occasional jogging along
    the Vermilion River, proudly cheering the Louisiana Ragin’ Cajuns and the New Orleans Saints while they occasionally attend a local volleyball club practice.
  arts: Dawn Smith, who revels in Zydeco rhythms from Clifton Chenier and Buckwheat Zydeco, regularly attends local art fairs, hosts board game evenings featuring Settlers of Catan, and they frequently
    quote lines from the musical Hamilton in their journal, allowing music and play to color their social world.
  travel: Dawn Smith, who prefers day‑trip road adventures over long‑haul flights, has explored nearby Lafayette attractions such as Avery Island and the historic town of St. Martinville, dreams of a weekend
    getaway to New Orleans' French Quarter, and they budget their travel through student discounts and occasional spontaneous splurges on a weekend music festival in Austin.
  culinary: Dawn Smith, an enthusiastic home cook with intermediate skill, loves preparing jambalaya, crawfish étouffée, and boudin using fresh okra, thyme, and smoked sausage, they often experiment with
    spice blends while they reluctantly order fast food during late‑night study sessions, and they savor occasional fine‑dining outings featuring contemporary Creole chefs.
  core: Dawn Smith, a 19‑year‑old organizer who balances a love for structured planning with a zest for social dance, secretly binge‑watches reality TV at night and forgets to hydrate during long study
    marathons, yet they always journal their goals with a meticulous hand.
background:
  cultural: Dawn grew up in Lafayette, Louisiana, in a white, Southern family with deep roots in the region’s French‑Acadian and Anglo‑American traditions. Although her household primarily speaks English
    and attends a local Baptist church, she was immersed in the vibrant Cajun and Creole cultural scene—participating in community festivals, enjoying regional music, and savoring the local cuisine. This
    multicultural environment has shaped her appreciation for Southern hospitality, communal celebrations, and the rich linguistic heritage of the Acadiana area.
attributes:
  skills: '[''Project coordination'', ''Microsoft Office Suite (Excel, Word, PowerPoint)'', ''Customer service'', ''Data entry'', ''Basic bookkeeping'', ''Event planning'', ''Written and verbal communication'']'
  hobbies: '[''Zydeco dancing'', ''Intramural volleyball'', ''Volunteering at local festivals'', ''Cooking Cajun cuisine'', ''Board game nights'', ''Journaling'']'
  career_goals: Dawn aims to complete a bachelor's degree in Business Administration within the next three years, after which she hopes to secure a role as an office manager or junior project coordinator
    in a midsized company, preferably within the hospitality or tourism sector that thrives in Lafayette. She aspires to develop leadership credentials, obtain a Project Management Professional (PMP) certification,
    and eventually transition into a senior project management position overseeing community events and regional development projects.
