  career_goals: Yanny aspires to advance to a supervisory position within the casino’s surveillance department, overseeing a team of officers and shaping security strategy. She plans to earn the Certified
    Protection Professional (CPP) designation and deepen her expertise in cyber‑physical security integration, positioning herself to lead initiatives that blend video analytics with network security. Long‑term,
    she hopes to design and deliver a comprehensive training curriculum for new guards, mentor younger employees—especially women and Hispanics—entering the field, and eventually transition into a security
    consulting role serving Texas hospitality venues.
