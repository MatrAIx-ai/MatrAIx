personas:
  professional: Yanny Ruiz, a seasoned surveillance specialist at a bustling casino, leverages a STEM background, bilingual fluency, and a methodical, organized approach to manage sophisticated video analytics
    and physical security while aiming for a supervisory role, CPP certification, and a mentorship program for women and underrepresented groups.
  sports: Yanny Ruiz follows Liga MX fervently, cheering for Club América while also supporting the Houston Texans and local youth soccer safety workshops, attends Texans games when the schedule permits,
    and spends Tuesday evenings playing recreational tennis at the nearby fitness club.
  arts: Yanny Ruiz expresses creativity through salsa and folkloric dance classes, regularly listening to Carlos Santana and Selena during practice, and unwinds with mystery novels from Agatha Christie,
    occasional viewings of Guillermo del Toro films, and participation in community art fairs showcasing traditional papel picado.
  travel: Yanny Ruiz prefers structured family road trips to destinations like the Texas Hill Country wine trail and the historic towns of Oaxaca, combines meticulous itineraries with spontaneous stargazing
    sessions at the local astronomy club, and dreams of a guided tour of European cathedrals during retirement.
  culinary: Yanny Ruiz enjoys an intermediate level of cooking, mastering tamales, mole poblano, and Texan-inspired chili con carne, often harvesting cilantro, oregano, and jalapeños from their backyard
    garden, and delights in hosting weekend feasts where they blend traditional flavors with contemporary twists.
  core: Yanny Ruiz balances a meticulous, structured work ethic with an outgoing love for community dance, family gatherings, and calm resilience, all while occasionally forgetting to water their garden
    and indulging in late‑night puzzle marathons.
background:
  cultural: Yanny was born to Mexican immigrant parents who settled in Houston. Growing up in a bilingual household, she celebrated traditional holidays like Día de los Muertos, Cinco de Mayo, and Las Posadas,
    while also embracing the multicultural vibrancy of Houston’s Hispanic community. Her Catholic upbringing instilled values of service, family cohesion, and respect for elders. She maintains close ties
    with extended family, regularly participates in community festivals, and incorporates Mexican culinary and musical traditions into her daily life. Living in Texas, she blends these roots with local
    Texan customs, fostering a hybrid identity that values both her Mexican heritage and her Texan home.
