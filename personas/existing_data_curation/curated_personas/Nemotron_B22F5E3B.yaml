personas:
  professional: A detail-oriented aspiring junior game developer, Donyelle James leverages their love for structured play by designing simple Scratch games, assembling intricate LEGO models, and meticulously
    planning each coding step in a dedicated notebook.
  sports: A team-oriented athlete, Donyelle James plays middle-school volleyball with disciplined enthusiasm, follows the USA Women's National Volleyball Team and the local youth club Sunrise Spike Club,
    and balances competitive practice with a love for cheering on the Los Angeles Lakers during off-season games.
  arts: A creative storyteller, Donyelle James immerses themselves in fantasy worlds by reading the Harry Potter series and the Percy Jackson books by Rick Riordan, translates favorite scenes into hand-drawn
    character sketches, and expresses emotional depth through piano pieces such as Beethoven’s ‘Moonlight Sonata’ and contemporary soundtrack arrangements from the ‘Harry Potter’ movies.
  travel: An adventurous yet organized traveler, Donyelle James enjoys planning family trips with meticulous itineraries, has explored the wonders of Disney World and the historic monuments of Washington
    DC, and dreams of a future visit to the Harry Potter Warner Bros. Studio in London.
  culinary: A budding kitchen experimenter, Donyelle James loves crafting homemade pizza topped with mozzarella, pepperoni, and fresh basil to achieve the perfect cheese pull, while also whipping up quick
    peanut-butter-banana sandwiches and classic mac-and-cheese using their favorite sharp cheddar and elbow pasta.
  core: Donyelle James is a structured, creatively driven 12-year-old who balances methodical LEGO engineering and Scratch coding with fantasy reading, volleyball, and meticulous budgeting, yet occasionally
    forgets hydration during practice.
background:
  cultural: Donyelle is an African‑American growing up in Pittsboro, North Carolina, a small town in the Piedmont region with a close‑knit Black community. Her family places a strong emphasis on education,
    church, and collective responsibility, often sharing stories of the Great Migration and the resilient spirit of their ancestors. She regularly attends a local Baptist church where she participates in
    youth groups, celebrates Juneteenth and Kwanzaa, and enjoys soul and R&B music. Family gatherings feature Southern comfort foods such as collard greens, cornbread, and fried chicken, paired with storytelling
    traditions that highlight her cultural heritage. These experiences shape her worldview, fostering a sense of pride, community connection, and a desire to give back through education and mentorship.
attributes:
  skills: '["Time management", "Organized note‑taking", "Basic coding (Scratch)", "Reading comprehension", "Math problem solving", "Keyboarding", "Collaboration", "Event planning"]'
  hobbies: '["Reading fantasy novels", "Building LEGO sets", "Playing piano", "Participating in Girl Scouts", "Coding simple games in Scratch", "Volleyball", "Jigsaw puzzles", "Community service projects",
    "Journaling", "Drawing and sketching"]'
  career_goals: Donyelle dreams of becoming a middle‑school teacher, ideally teaching math, so she can share her love for structured problem‑solving with younger students, especially girls of color. She
    plans to graduate high school with strong grades, earn a degree in education, obtain a teaching certification, and eventually take on leadership roles in curriculum development or after‑school STEM
    programs. In the long term, she hopes to mentor peers in her hometown, designing organized learning environments that combine academic rigor with community support.
