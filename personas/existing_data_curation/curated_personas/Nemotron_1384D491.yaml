  career_goals: Marion aims to secure an entry‑level position in marketing communications or community outreach where she can blend her creativity with practical project management. She plans to obtain
    a digital marketing certification and, in the next few years, develop expertise in content strategy and data‑driven campaign analysis. Long‑term, she aspires to lead a multidisciplinary team, overseeing
    community‑focused initiatives that drive engagement and foster social impact, while continuing to refine her leadership and strategic planning skills.
