personas:
  professional: Marion Bell is a spirited 23‑year‑old aspiring marketing communications specialist who blends a pragmatic data‑driven mindset with a flair for community storytelling, leveraging strong public‑speaking,
    event‑planning, and Excel skills to orchestrate lively outreach campaigns while navigating the occasional over‑worry that makes them double‑check every detail.
  sports: Marion Bell stays active through weekly Zumba classes, weekend desert hikes near Camelback Mountain, and cheering for the Phoenix Suns and Arizona Diamondbacks, while also belonging to a community
    running club that meets at the Desert Breeze Trail.
  arts: Marion Bell fuels their outgoing spirit by attending live shows at Crescent Ballroom featuring artists such as Tame Impala, Hozier, and local indie band The Imperial, while regularly exploring the
    Phoenix Art Museum’s contemporary exhibits and curating playlists that blend jazz standards with modern synth‑pop.
  travel: Marion Bell prefers a mix of spontaneous road trips and carefully planned cultural escapes, having already trekked the Red Rock State Park in Sedona, captured sunrise at the Grand Canyon, savored
    street tacos in Mexico City, and dreams of strolling Barcelona’s Gothic Quarter on a modest budget.
  culinary: Marion Bell experiments in the kitchen with mezze platters, Thai green curry, and homemade chimichangas, perfecting the balance of spice and flavor while occasionally over‑indulging in crunchy
    nachos during late‑night Netflix binges.
  core: Marion Bell is a socially vibrant, detail‑oriented 23‑year‑old who blends curiosity with caution, channeling anxiety into meticulous planning while constantly seeking community‑focused creative
    outlets.
background:
  cultural: Marion was raised in a middle‑class white family in suburban Phoenix, with Midwestern roots that emphasized hard work, community, and modesty. Growing up in the Southwest, she absorbed a love
    for outdoor recreation and a respect for the region's diverse cultural tapestry, frequently interacting with a multicultural community in the city. Her upbringing blends traditional American values
    with the openness and inclusivity characteristic of Phoenix's vibrant, ethnically varied environment, shaping her sociable yet pragmatic outlook.
attributes:
  skills: '["Public speaking", "Event planning", "Social media management", "Customer service", "Basic data analysis", "Microsoft Office Suite", "Team collaboration", "Conflict resolution", "Community outreach",
