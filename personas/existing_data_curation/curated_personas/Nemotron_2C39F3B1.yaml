  hobbies: '[''Surfing'', ''Hiking'', ''Beach volleyball'', ''Tech meetups'', ''Board games'', ''Live music'', ''Cultural festivals'', ''Reading'', ''Cooking'', ''Yoga'', ''Hackathons'', ''Mentoring'']'
  career_goals: Misook aims to advance into a senior or lead engineering role where she can guide cross‑functional teams, champion inclusive design, and mentor emerging talent—particularly women and underrepresented
    groups in tech. She plans to pursue a master’s in Human‑Computer Interaction to deepen her expertise at the intersection of technology and culture. Long‑term, she hopes to spearhead a product that supports
    Hawaiian environmental sustainability and cultural preservation, leveraging her technical skills and community insight. Competitive hackathon participation and open‑source contributions are also central
    to her ambition to be recognized as an innovative problem‑solver.
