personas:
  professional: Misook Talbo is a 30‑year‑old full‑stack engineer who blends rigorous clean‑code practices with a human‑centered design mindset, consistently delivering user‑centric products while competitively
    leading cross‑functional teams and skeptically vetting stakeholder proposals to ensure inclusive outcomes.
  sports: Misook Talbo hits the North Shore waves with the Honolulu Surf Club, treks the Koʻolau trails on weekends, competes in the Oahu Beach Volleyball League, and roots for the University of Hawaii
    Rainbow Warriors football and basketball teams while staying fit through regular yoga sessions.
  arts: Misook Talbo is an avid concert‑goer who oscillates between BTS K‑pop shows and intimate hula performances by the Keauhou Hula Ensemble, devours contemporary novels by Haruki Murakami and philosophy
    texts by Martha Nussbaum, and hosts weekly board‑game nights featuring Catan, all of which fuel their creative problem‑solving and narrative‑driven coding style.
  travel: Misook Talbo plans surf‑centric vacations with meticulous itineraries, having already surfed in Miyazaki, Japan, explored Seoul’s street‑food scene, and island‑hopped across Maui and Kauai, while
    dreaming of chasing Northern Lights in Iceland and trekking Patagonia’s Torres del Paine when finances allow.
  culinary: Misook Talbo whips up intermediate‑level bibimbap with gochujang, sesame oil, and crisp kimchi, and crafts fresh poke bowls featuring ahi tuna, pineapple, macadamia nuts, and ni'ihau sea salt,
    often improvising new sauces that merge Korean spice with Hawaiian sweet notes.
  core: Misook Talbo is a hyper‑curious, methodical full‑stack engineer who channels their competitive drive into both code and surf, balancing disciplined work habits with a vibrant social life and a penchant
    for spicing up every project—and dinner plate—with a dash of Korean and Hawaiian flair.
background:
  cultural: Misook is a second‑generation Korean‑American raised in Kailua, Hawaiʻi. Her parents immigrated from South Korea, instilling values of educational diligence, respect for community, and cultural
    heritage. Growing up on the islands, she absorbed a vibrant blend of Hawaiian traditions, Asian‑American culture, and Pacific Islander influences. She is fluent in English and Korean, celebrates both
    Chuseok and local festivals like Makahiki, and often integrates Hawaiian outdoor activities with Korean culinary practices. This multicultural upbringing informs her inclusive design mindset and her
    commitment to creating technology that resonates across diverse communities.
