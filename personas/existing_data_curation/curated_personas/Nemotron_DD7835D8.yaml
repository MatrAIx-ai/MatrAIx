personas:
  professional: Kartia Rollins is an experienced retail sales associate who blends a keen eye for visual merchandising, strong rapport-building, and calm conflict‑resolution skills to craft compelling store
    displays and digital promos, while their relaxed approach to strict scheduling often leads them to rely on improvisation and on‑the‑fly adjustments.
  sports: Kartia Rollins enjoys early‑morning beach volleyball on the Virginia Beach boardwalk, regular yoga sessions at Coastal Wellness Studio, and cheerfully follows the Washington Capitals, Washington
    Wizards, and the local Virginia Beach City FC soccer club, embracing a laid‑back yet consistent fitness routine.
  arts: Kartia Rollins curates a personal collection of works by contemporary visual artists such as Ai Weiwei and Yayoi Kusama, paints spontaneous acrylic canvases inspired by the improvisational rhythm
    of Miles Davis and the soulful vocals of H E R, and frequently volunteers to lead community art‑making workshops that blend graffiti, collage, and mixed‑media techniques.
  travel: Kartia Rollins favors relaxed road trips along the Atlantic seaboard, often stopping to explore the historic charm of Charleston, the riverfront cafés of Savannah, and the vibrant music scene
    of New Orleans, while planning trips on a casual spreadsheet and packing a tote of shells collected from previous beach trips.
  culinary: Kartia Rollins loves preparing comfort Southern dishes such as smoked collard greens, shrimp and grits, and sweet potato pie, flavoring them with fresh basil, thyme, and cilantro from their
    herb garden, and while their cooking skill is proficient, they sometimes over‑season in enthusiasm, leading to a flavorful—if occasionally overpowering—meal.
  core: Kartia Rollins is a creatively curious 40‑year‑old who channels a passion for art and community into a dynamic retail career, while juggling a tendency toward worry, a loosely organized schedule,
    and a habit of turning everyday moments into spontaneous sketches and shell‑filled craft projects.
background:
  cultural: Kartia’s cultural identity is rooted in the African‑American experience of the Mid‑Atlantic. Born and raised in Virginia Beach, she grew up in a close‑knit extended family where church, gospel
    music, and storytelling were daily rituals. Her parents emphasized the importance of community service and celebrated milestones with soul‑food feasts that blended Southern flavors with coastal seafood.
    She participates in the annual Virginia African‑American Heritage Festival, where she volunteers to coordinate art exhibits and local craft vendors. This background has instilled in her a strong sense
    of resilience, pride in Black artistic expression, and a commitment to uplifting her neighborhood through retail spaces that serve as cultural touchpoints.
attributes:
  skills: '[''Customer Relationship Building'', ''Sales & Upselling'', ''Visual Merchandising'', ''POS System Operation'', ''Inventory Management'', ''Conflict Resolution'', ''Art Appreciation'', ''Basic
