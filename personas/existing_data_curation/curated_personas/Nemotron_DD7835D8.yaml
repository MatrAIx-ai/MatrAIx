  hobbies: '[''Beach Walking & Sketching'', ''Painting (Acrylic)'', ''Visiting Art Galleries'', ''Community Art Workshops'', ''Reading Fiction & Poetry'', ''Yoga & Meditation'', ''Cooking Soul‑Food'', ''Herb
    Gardening'', ''Music Curation'']'
  career_goals: Kartia aspires to move beyond her current sales associate role into a leadership position that lets her blend her retail expertise with her love for art and community. In the next three
    to five years she aims to become a store manager or district supervisor, overseeing multiple locations while implementing innovative visual concepts that reflect local culture. She also dreams of eventually
    opening her own boutique‑café that showcases African‑American artists and offers a curated selection of fashion and home décor. To support these ambitions, she plans to complete her associate’s degree
    in business administration and earn a certification in visual merchandising. Throughout, she seeks a work‑life balance that allows regular family evenings and time for self‑care.
