persona_description: A healthcare professional who is interested in diagnosing and managing sexually transmitted infections, particularly herpes. They are aware of the importance of accurate testing and
  the availability of different blood tests for herpes. They may have experience with blood testing for other sexually transmitted infections and are familiar with the FDA-approved tests for herpes. They
  may also be interested in learning about the latest advancements in herpes testing technology and have a good understanding of the potential limitations and challenges of current blood tests for herpes.
