personas:
  professional: Oscar Gomez, a 22‑year‑old groundskeeping professional, merges a love of precise maintenance checklists with a laid‑back flexibility, and they lead a small crew in both English and Spanish
    while pursuing a Turfgrass Management certification and dreaming of an eco‑friendly landscaping startup.
  sports: Oscar Gomez plays forward in a local youth soccer league, follows the Tampa Bay Buccaneers in the fall and the Tampa Bay Lightning in winter, and never misses an Ecuador national team match, balancing
    structured team drills with spontaneous weekend pick‑up games at the park.
  arts: Oscar Gomez winds down by blasting Bad Bunny and Celia Cruz on their phone, binge‑watching Dwayne Johnson action movies on weekends, and jumping into multiplayer FIFA and Call of Duty sessions with
    friends, using these cultural beats as a release valve for their daily stress.
  travel: Oscar Gomez prefers a hybrid travel style, spontaneous weekend road trips to the Florida Keys for fishing and planned, budget‑friendly backpacking adventures through Quito and the Galápagos Islands,
    where they can soak in coastal vistas while sharing flutes of ceviche with fellow travelers.
  culinary: Oscar Gomez enjoys cooking ceviche with fresh snapper, lime, cilantro, and chilies, rolling empanadas de verde stuffed with cheese and plantain, and preparing a traditional cuy roast seasoned
    with cumin and oregano, often pairing these dishes with cold cerveza during family gatherings.
  core: Oscar Gomez is a 22‑year‑old groundskeeper who balances meticulous checklists with impromptu fishing trips, worries about future business plans, and has a habit of ending late‑night action movies
    with a plate of homemade ceviche.
background:
  cultural: Oscar is a first-generation American; his parents emigrated from Guayaquil, Ecuador, in the early 2000s. He grew up in a bilingual household where Spanish was spoken daily, and he celebrates
    both Ecuadorian traditions—such as Carnaval, Dia de la Independencia, and family gatherings centered around food—and American holidays. The Ecuadorian community in Tampa Bay provides a sense of belonging,
    and Oscar maintains close ties with relatives back in Ecuador, visiting them during summer vacations. His cultural heritage influences his love for soccer, his taste for coastal cuisine, and his desire
    to give back to the community through volunteer work.
attributes:
  skills: '[''Lawn mowing and edging'', ''Shrub pruning and shaping'', ''Irrigation system troubleshooting and repair'', ''Basic pesticide application (EPA-registered)'', ''Equipment maintenance (gas mowers,
    ride-on tractors, trimmers)'', ''Plant identification (Florida natives and tropical species)'', ''Bilingual client communication (English/Spanish)'', ''Safety compliance and OSHA standards'', ''Team
    coordination and scheduling'', ''Physical stamina and manual labor'']'
  hobbies: '[''Soccer (playing and watching)'', ''Cooking Ecuadorian cuisine'', ''Fishing'', ''Hiking in nature preserves'', ''Home gardening projects'', ''Listening to reggaeton and salsa music'', ''Watching
    action movies'', ''Multiplayer video gaming'', ''Neighborhood clean-up volunteering'']'
  career_goals: In the next two years Oscar aims to earn a Turfgrass Management certification and be promoted to crew leader at his current company, where he can design and oversee daily work plans. He
    plans to take evening courses at Hillsborough Community College to study horticulture and sustainable landscaping practices. Long-term, Oscar dreams of launching his own eco-friendly landscaping business
    that specializes in native Florida plants and water-wise designs, offering services to residential neighborhoods and community gardens while creating job opportunities for other young workers from his
    community.
