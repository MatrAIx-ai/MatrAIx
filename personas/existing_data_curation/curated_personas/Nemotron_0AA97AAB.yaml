  hobbies: '[''LEGO building'', ''Scratch coding projects'', ''Reading graphic novels'', ''Basketball with friends'', ''School coding club'', ''Volunteering at the local library'', ''Playing ukulele'']'
  career_goals: Frederick is fascinated by how things work and hopes to turn his curiosity into a future career in technology, perhaps as a software developer or robotics engineer who creates tools that
    help other kids learn. He also enjoys the idea of giving back to his community, envisioning a role where he mentors younger students in coding clubs or leads after‑school programs that combine STEM
    learning with teamwork. While he appreciates clear pathways and structured milestones, he remains open to exploring creative outlets that let him experiment and adapt his plans as he grows.
