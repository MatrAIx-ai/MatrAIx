personas:
  professional: Frederick Stewart is an aspiring junior coder and LEGO architect who blends his love for structured building with spontaneous Scratch experiments, channeling his quiet curiosity into school
    coding club projects while helping younger peers at the library.
  sports: Frederick Stewart is a dedicated point guard for the Prince George's County youth basketball league, idolizing the Washington Wizards and practicing drills at the local community center, while
    also cheering for the Baltimore Ravens on Sundays and occasionally joining the summer swim club at the Bowie Recreation Center.
  arts: Frederick Stewart is an avid fan of graphic novels like "Ms. Marvel" and "Saga," a budding ukulele player who strums along to songs by Tash Sultana and Stevie Wonder, and a LEGO enthusiast who studies
    the designs of architect Zaha Hadid for inspiration, often attending local community arts fairs that celebrate Black History Month performances.
  travel: Frederick Stewart loves weekend trips to the Smithsonian museums in Washington, D.C., road‑boarding outings to the Chesapeake Bay for kayaking, and dreams of visiting the Space Center in Houston,
    balancing his curiosity with family‑approved travel budgets and a modest backpack of LEGO bricks for long car rides.
  culinary: Frederick Stewart enjoys soul‑food classics such as collard greens, baked mac‑and‑cheese, and sweet potato pie at family gatherings, while their personal cooking experiments include whipping
    up banana‑peanut butter smoothies and assembling easy LEGO‑shaped pizza bites during after‑school snack time.
  core: Frederick Stewart blends quiet curiosity with a love for structured play, juggling LEGO, coding, and basketball while navigating occasional impulsive splurges and a mild asthma that keeps them both
    disciplined and spontaneous.
background:
  cultural: Frederick is a Black American growing up in Bowie, Maryland, within the diverse community of Prince George's County. His family maintains traditions rooted in African‑American culture, celebrating
    holidays like Juneteenth and participating in local Black History Month events. He often hears stories from his grandparents about their experiences in the mid‑Atlantic region and the broader Southern
    United States, which shape his sense of identity. The community around him offers a rich tapestry of cultural influences, from regional soul food gatherings to church youth programs that emphasize service
    and leadership. These experiences give Frederick a strong foundation of cultural pride, community awareness, and an appreciation for the contributions of Black artists, athletes, and innovators.
attributes:
  skills: '[''Digital literacy (basic Scratch coding)'', ''Practical problem solving (LEGO engineering)'', ''Mathematical reasoning (grade‑level arithmetic)'', ''Reading comprehension (age‑appropriate literature)'',
