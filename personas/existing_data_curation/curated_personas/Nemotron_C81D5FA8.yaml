  career_goals: Daniel aims to transition into a senior training role at the police academy, where he can develop curricula that fuse creative thinking with traditional policing methods. He hopes to become
    a liaison between law enforcement and the casino industry to enhance collaborative security strategies. Ultimately, he envisions consulting for private security firms, sharing his expertise on investigative
    innovation and community‑focused policing before retiring to mentor aspiring officers through a nonprofit mentorship program.
