personas:
  professional: Kathy Wilson, a 32-year-old aspiring part-time administrative coordinator, leverages her budget-keeping precision, event-planning knack, and calm conflict-resolution style to keep community
    programs running like a well-tended garden, while also eyeing a home-based bakery that merges her love of structure with culinary creativity.
  sports: Kathy Wilson enjoys gentle evening walks with her terrier, often joining the Streetsboro Community Walking Club, cheers on the Cleveland Browns on football Sundays and the Cleveland Cavaliers
    during winter games, and balances her quilting posture with a light home-based stretching routine.
  arts: Kathy Wilson immerses herself in historical fiction, debating Hilary Mantel’s Tudor narratives at her book club, draws inspiration from Monet’s garden paintings for quilting motifs, and unwinds
    to Brandi Carlile’s folk-rock melodies while baking, weaving these artistic threads into her daily life.
  travel: Kathy Wilson favors weekend getaways that blend nature and history, often driving to Hocking Hills State Park for hiking, taking short trips to Boston’s Freedom Trail for colonial charm, and dreaming
    of a summer visit to Edinburgh’s medieval castles—plans she meticulously budgets around family responsibilities.
  culinary: Kathy Wilson cultivates a farm-to-table palate, skillfully turning heirloom tomatoes, fresh basil, and zucchini from her garden into vibrant ratatouille, zesty pesto pasta, and occasional zucchini-cream
    cheese muffins, while her budding baking venture focuses on artisanal sourdough loaves infused with rosemary and sea salt.
  core: Kathy Wilson is a meticulous planner who treats her garden and her budget like twin ecosystems, yet often stays up late perfecting a new quilt pattern or recipe while forgetting to schedule personal
    downtime.
background:
  cultural: Kathy identifies as a white American raised in the Midwest, specifically in Ohio. Her upbringing emphasized a practical work ethic, self-reliance, and a strong sense of community typical of
    small-town Ohio. Family traditions often involve shared meals, seasonal celebrations, and participation in local church and neighborhood events. These cultural influences have shaped her values of reliability,
    modesty, and collaborative spirit.
attributes:
  skills: '[''Household budgeting'', ''Family schedule coordination'', ''Meal planning'', ''Basic computer literacy (Microsoft Office, email, online research)'', ''Conflict resolution'', ''Active listening'',
