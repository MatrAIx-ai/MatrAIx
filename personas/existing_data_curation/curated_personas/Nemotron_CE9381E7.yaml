  hobbies: '[''Vegetable gardening'', ''Home cooking and recipe development'', ''Historical fiction book club'', ''Quilting'', ''Volunteer work at community center (senior programs, neighborhood clean-ups)'',
    ''Evening dog walks'']'
  career_goals: Kathy aims to transition back into the workforce on a part-time basis within the next two years, focusing on roles that leverage her organizational strengths, such as administrative support
    or community outreach. She is also exploring the possibility of launching a small home-based baking business, which would allow her to combine her passion for cooking with entrepreneurship while maintaining
    flexibility for family responsibilities. In the longer term, she hopes to obtain a certification as a Certified Nursing Assistant (CNA) to provide occasional in-home care for seniors in her community.
