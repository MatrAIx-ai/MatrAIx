persona_description: A researcher at a university who specializes in the study of long non-coding RNAs (lncRNAs) and their potential role in the development of type 1 diabetes and cardiovascular problems.
  She is conducting fundamental research on the fundamental characteristics of lncRNAs and how they may affect pancreatic beta cells on a genetic-molecular level. Her goal is to develop targeted therapies
  that increase the survival rate and viability of pancreatic beta cells.
