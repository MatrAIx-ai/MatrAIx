  career_goals: Adriana aims to transition from day‑to‑day supervision to a senior operations management role where she can shape strategic initiatives for large‑scale office environments. She plans to
    earn a professional certification in project management and deepen her expertise in digital transformation to guide her organization through advanced automation and remote‑work solutions. Long‑term,
    she envisions mentoring the next generation of bilingual supervisors and possibly launching a consulting practice that helps small Cuban‑American businesses optimize their administrative processes.
