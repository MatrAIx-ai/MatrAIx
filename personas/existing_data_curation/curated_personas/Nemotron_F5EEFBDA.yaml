personas:
  professional: Adriana Arevalo, a seasoned bilingual office operations supervisor, leverages two decades of workflow optimization, performance management, and digital tool rollout to lead teams with hospitality‑infused
    leadership while methodically planning for senior strategic roles; they are known for balancing curiosity with practicality.
  sports: Adriana Arevalo enjoys early morning beach jogs, salsa dancing at the community center, follows the Miami Heat and Miami Marlins, they also volunteer as a youth soccer coach for the local Hialeah
    club, embodying a seasonal mix of fitness and team spirit.
  arts: Adriana Arevalo fills her evenings with the timeless salsa recordings of Celia Cruz, mystery novels by Agatha Christie, and occasional screenings of Guillermo del Toro's films, they let these creative
    currents define her cultural immersion.
  travel: Adriana Arevalo plans trips that blend cultural immersion and family connections, revisiting Havana each spring, exploring historic neighborhoods in Old San Juan, they also dream of a future cruise
    to the Canary Islands, always balancing budget-conscious itineraries with a thirst for authentic experiences.
  culinary: Adriana Arevalo delights in preparing classic dishes such as ropa vieja, arroz con pollo, and crispy tostones using fresh citrus, garlic, and plantains, they showcase their intermediate cooking
    skills at neighborhood potlucks, yet they admit to overindulging in espresso after dinner.
  core: Adriana Arevalo is a pragmatic yet curious leader who fuses methodical office mastery with vibrant cultural rhythms, they balance disciplined finance, proactive health habits, and a zest for salsa,
    mystery novels, and family‑centric travel.
background:
  cultural: Raised in a close‑knit Cuban immigrant family in Hialeah, Adriana grew up immersed in the rhythms of Cuban music, the flavors of traditional dishes, and the importance of community solidarity.
    Bilingual and bicultural, she participates actively in local Cuban associations, celebrates events like Carnaval and the Carnaval de Hialeah, and maintains strong ties to both her Cuban heritage and
    the broader Miami‑Dade multicultural landscape. Her cultural identity informs her leadership style, emphasizing hospitality, respect for elders, and a collective sense of achievement.
