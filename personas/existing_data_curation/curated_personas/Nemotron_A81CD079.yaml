  career_goals: Anthony aims to move into a supervisory role on his production line within the next two years, leveraging his reliability and safety record to become a shift lead. He plans to earn an OSHA
    30‑hour certification and pursue additional training in CNC machining to broaden his technical expertise. He is motivated to mentor younger workers, champion a culture of safety, and implement small‑scale
    continuous‑improvement projects that boost productivity and reduce waste. Long‑term, he aspires to secure a stable retirement for his family while contributing to the plant’s operational excellence.
