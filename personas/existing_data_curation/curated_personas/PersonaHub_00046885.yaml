persona_description: A student conducting a physics lab to measure the resistance of a Wheatstone bridge. The student is using a slide-wire Wheatstone bridge with a known resistance Rk and a galvanometer
  with adjustable sensitivity buttons 1, 2, and 3. The student is balancing the bridge with the sliding contact at point A, and is using the galvanometer to measure the change in resistance Rx. The student
  is measuring the change in VAB due to a small change in Rx, and is using Kirchhoff's Voltage Law and Ohm's Law to relate the change in VAB to the change in Rx. The student is using the galvanometer to
  measure the sensitivity of the bridge, and is adjusting the position of the sliding contact to balance the bridge. The student is using the galvanometer to measure the resistance of the unknown resistor
  Rx, and is using the galvanometer to measure the sensitivity of the bridge.
