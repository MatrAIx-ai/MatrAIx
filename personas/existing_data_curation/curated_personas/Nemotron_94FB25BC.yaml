personas:
  professional: Michael Marquez is a budding junior scientist who channels curiosity into school science projects, excels at building intricate LEGO structures that mirror engineering principles, and applies
    their practical yet imaginative mindset to lead group experiments, all while balancing the desire for order with the flexibility of youthful spontaneity.
  sports: Michael Marquez thrills on the local youth soccer field with the Midtown Strikers, idolizes soccer legend Lionel Messi, swims during after‑school sessions at the community pool, and joins their
    family on weekend hikes, balancing team camaraderie with personal fitness.
  arts: Michael Marquez revels in building LEGO masterpieces inspired by The LEGO Movie, reads adventure books by Roald Dahl and wildlife tales from National Geographic Kids, and enjoys listening to Kidz
    Bop covers of popular songs, letting creativity color their free time.
  travel: Michael Marquez loves weekend family hikes in nearby state parks, has visited the Grand Canyon on a school field trip, dreams of exploring Disney World in Florida, and prefers planning trips with
    a hand‑drawn map and a snack‑packed backpack.
  culinary: "Michael Marquez favors cheesy pizza slices, spaghetti with meatballs, and builds simple snacks like peanut\n\n butter and jelly sandwiches, delights in mixing fruit smoothies with bananas and\
    \ strawberries, yet often forgets to clean up the kitchen after cooking."
  core: Michael Marquez is an energetic 9‑year‑old who blends curiosity with practicality, leading soccer games and LEGO builds while juggling a modest allowance, occasional allergy woes, and a penchant
    for leaving toy pieces scattered.
background:
  cultural: Raised in Belle Plaine, Minnesota, Michael experiences a typical Midwestern American upbringing that emphasizes community, friendliness, and self‑reliance. His family participates in school
    and church activities, celebrates holidays like Thanksgiving and Christmas, and occasionally shares Hispanic traditions from his family heritage through food and stories. Living near farmland and lakes
    fosters his love of the outdoors and seasonal activities such as fishing, sledding, and community fairs.
