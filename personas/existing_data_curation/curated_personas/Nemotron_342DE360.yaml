  hobbies: '[''Traditional hula and modern dance'', ''Cooking and food‑video creation'', ''Surfing and swimming'', ''Hiking in the local mountains'', ''Digital illustration and graphic tee design'', ''Journaling
    and reading graphic novels'', ''Ukulele playing'']'
  career_goals: Alicia plans to obtain her GED within the next year and then enroll in a vocational program for culinary arts that will let her specialize in Pacific Island cuisine. She hopes to open a
    small pop‑up kitchen or food‑truck that serves modern twists on traditional Polynesian recipes, eventually expanding to a full‑time restaurant. Parallel to this, she dreams of building a YouTube channel
    and Instagram presence that showcases Polynesian culture, cooking tutorials, and youth fashion, turning her social‑media expertise into a source of income. In the longer term, she aims to become a community
    mentor who helps other Pacific Island teens navigate education and career pathways while preserving their cultural identity.
