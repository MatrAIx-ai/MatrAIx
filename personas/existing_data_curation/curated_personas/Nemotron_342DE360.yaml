personas:
  professional: Alicia Keo is an aspiring culinary entrepreneur and digital content creator who blends disciplined recipe precision with impromptu graphic design, leveraging school event coordination experience
    while occasionally wrestling with deadline chaos.
  sports: Alicia Keo rides the surf at nearby beaches with the local Coral Wave club, hikes the Spring Mountains on weekends, and roots for the Los Angeles Dodgers, Lakers, and Chargers, blending a love
    for water, mountain, and team sports with a laid‑back fitness routine.
  arts: Alicia Keo channels creativity through hula and contemporary dance improvisations set to the beats of Tame Impala and H.E.R., crafts digital illustrations of island flora inspired by Lisa Congdon,
    and designs graphic tees featuring nature‑based motifs while regularly scrolling through the work of visual artists like James Jean and listening to ukulele covers of The Beatles.
  travel: Alicia Keo’s travel style mixes spur‑of‑the‑moment beach getaways to Laguna Beach, structured family road trips to the Grand Canyon, and a dream itinerary that includes a cultural immersion in
    Kyoto, Japan, and a surf safari on the North Shore of O’ahu, all planned on a modest teen budget with occasional crowdfunding support from their growing online audience.
  culinary: Alicia Keo’s palate gravitates toward traditional island flavors such as poke built on ahi tuna, taro, and seaweed, while they remix those into fusion plates like kimchi‑poki tacos and coconut‑lime
    marinated chicken, cooking with ingredients like nori, fresh mango, and toasted sesame oil, and sharing step‑by‑step tutorials on TikTok.
  core: Alicia Keo is a disciplined yet impulsive teenage chef‑creator who juggles structured culinary goals with spontaneous artistic experiments, all while navigating teen‑level finances, health quirks,
    and a love for surf‑side adventures.
background:
  cultural: Alicia is a second‑generation Polynesian American, with family roots in Samoa and Hawaii. Her household regularly celebrates cultural milestones such as Samoan 'fa’alavelave' ceremonies and
    Hawaiian 'Makahiki' festivals, where she learns to prepare traditional fare, perform kapa haka, and speak bits of Samoan and Hawaiian language. Growing up in Murrieta, California, she balances these
    island traditions with mainstream American culture, participating in local church youth groups and school clubs. Her family places great value on communal support, respect for elders, and storytelling,
    all of which shape her worldview and inspire her creative projects. The multicultural environment of Riverside County exposes her to a diverse community, motivating her to become a bridge between her
    Polynesian heritage and the broader Californian youth scene.
attributes:
  skills: '[''Traditional Polynesian cooking'', ''Basic graphic design (Canva, Photoshop Express)'', ''Social media content creation'', ''Team collaboration and event coordination'', ''Basic first aid'',
