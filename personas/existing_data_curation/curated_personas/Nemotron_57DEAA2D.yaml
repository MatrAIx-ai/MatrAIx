personas:
  professional: Janice Owens, an 18‑year‑old visual arts enthusiast with self‑taught Canva and Photoshop skills, channels their sociable energy and improvisational flair into leading community art workshops
    and crafting Instagram content, while they maintain a relaxed approach to deadlines that often leaves them juggling multiple projects at once.
  sports: Janice Owens, a fan of the Vegas Golden Knights and the Las Vegas Aces, blends their love of hip‑hop dance classes with weekly yoga at a downtown wellness studio, and they occasionally join a
    community basketball league for fun, treating fitness as a social outlet rather than a regimented routine.
  arts: Janice Owens immerses themselves in the neon‑lit street art of downtown Las Vegas, sketching murals inspired by the bold colors of Banksy and the emotive narratives of Jean‑Michel Basquiat, while
    they curate vibrant Instagram reels set to Janelle Monáe and Lizzo, turning each creative burst into a personal affirming ritual.
  travel: Janice Owens prefers spontaneous weekend getaways, having already explored the desert vistas of the Grand Canyon and the colorful markets of Mexico City, while they dream of a spring trip to Paris
    to study the Louvre’s masterpieces and a summer road‑trip along the Pacific Coast to soak up surf‑side inspiration, all on a modest teen budget.
  culinary: Janice Owens, a budding home chef, loves perfecting soul‑food classics like collard greens simmered with smoked turkey, sweet potato pie spiced with nutmeg, and buttery cornbread, while they
    also experiment with vegan jackfruit tacos seasoned with chipotle and lime, often sharing these dishes on Instagram alongside their digital art.
  core: Janice Owens is an 18‑year‑old art‑obsessed, socially magnetic teen who channels their anxiety into vibrant sketches and yoga, yet habitually loses track of deadlines and impulsively splurges on
    concert tickets.
background:
  cultural: Janice is an African American teen raised in Las Vegas. Her family maintains cultural traditions rooted in Black Southern heritage—gospel music, storytelling, and soul food cooking—while also
    embracing the multicultural environment of Nevada's entertainment capital. She regularly participates in church gatherings and community events that celebrate Black art and history, which nurture her
    appreciation for creative expression and social connection. Growing up in a city with a diverse tourist population, she is accustomed to blending her cultural identity with influences from Hispanic,
    Asian, and other communities, shaping a dynamic personal outlook.
