  hobbies: '[''Exploring street art and galleries'', ''Sketching murals'', ''Hip hop and contemporary dance'', ''Yoga and group fitness'', ''Attending concerts and karaoke'', ''Digital art and Instagram
    content creation'', ''Reflective journaling'', ''Cooking family soul food recipes'', ''Volunteering at youth mentorship art workshops'']'
  career_goals: Janice aims to pursue a college degree that merges her love for art and her desire to support mental well being, such as a bachelor's in visual arts with a focus on art therapy or a combined
    arts psychology program. She hopes to become an art therapist or community arts coordinator, creating safe creative spaces for youth dealing with anxiety and trauma. In the short term, she plans to
    build a portfolio of digital illustrations and volunteer as a workshop facilitator at local community centers, while also developing coping strategies for her own emotional reactivity.
