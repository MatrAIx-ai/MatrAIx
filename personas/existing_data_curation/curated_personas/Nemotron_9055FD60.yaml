personas:
  professional: Jessica Simonds is an aspiring robotics engineer in training who leverages her knack for structure and practical thinking to lead the after‑school robotics club’s design phase, meticulously
    planning each component while they keep teammates motivated through her calm, cooperative demeanor.
  sports: Jessica Simonds is a dedicated midfield player for the Fauquier Soccer Club’s U‑15 girls’ team, balances her weekly practices with after‑school study sessions, and roots for the Washington Commanders
    in the football season while they occasionally join the local community center’s weekend jogs.
  arts: Jessica Simonds captures the rolling hills of her county through a Canon EOS with a keen eye inspired by Annie Leibovitz, sketches quiet scenes in the margin of her notebooks, and devours contemporary
    novels by John Green and non‑fiction by Rebecca Solnit, while they hum along to Taylor Swift’s latest album during creative breaks.
  travel: Jessica Simonds prefers well‑planned weekend getaways that blend nature and learning, having explored Shenandoah National Park’s Skyline Drive and the Smithsonian museums in Washington, D.C.,
    she now daydreams about a spring trip to the historic streets of Boston while they stay within her family’s modest travel budget.
  culinary: Jessica Simonds enjoys whipping up classic chocolate chip cookies with dark chocolate chunks and a pinch of sea salt, occasionally experimenting with lemon zest in blueberry muffins, and while
    their culinary repertoire is modest, they take pride in serving these treats at family gatherings where they also love helping their mom roll homemade pizza dough.
  core: Jessica Simonds is a calm, organized teen who balances robotics and soccer with a love for photography, budgets every allowance with spreadsheet precision, and maintains a habit of cataloguing daily
    routines in a notebook, which they consult whenever the schedule feels chaotic.
background:
  cultural: Jessica grew up in a predominantly white, semi‑rural community in Warrenton, Virginia, where Southern values of hospitality, family cohesion, and community involvement are emphasized. Her family
    attends a local church and participates in seasonal town festivals and county fairs, fostering a strong sense of belonging and mutual support. She identifies with the traditions of her region, including
    respect for education, work ethic, and an appreciation for the natural surroundings of Fauquier County.
