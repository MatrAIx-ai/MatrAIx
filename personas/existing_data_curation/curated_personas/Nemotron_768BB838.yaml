  hobbies: '[''Hiking'', ''Backpacking'', ''Camping'', ''Recreational soccer'', ''Community theater'', ''Volunteer work at food bank'', ''Nature photography'', ''Cooking Appalachian recipes'', ''Strategy
    board games'', ''Reading about entrepreneurship and tech trends'']'
  career_goals: Jeffrey aspires to build a career that blends his love for community, the outdoors, and practical problem‑solving. He aims to earn a bachelor’s degree in Business Administration or Public
    Administration within the next three years, complemented by a certification in Project Management. His short‑term goal is to secure a full‑time role as an event coordinator or community outreach specialist
    with the Haywood County tourism board, where he can use his organizational talents to promote local festivals and outdoor recreation. Long‑term, he hopes to lead a regional nonprofit focused on sustainable
    tourism or to launch his own small business offering guided hiking tours and rental gear, creating economic opportunities while preserving the Appalachian environment.
