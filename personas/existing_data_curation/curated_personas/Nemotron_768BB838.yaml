personas:
  professional: Jeffrey Thompson, a 23‑year‑old aspiring community event coordinator, leverages their Excel budgeting skills, meticulous planning, and friendly demeanor to orchestrate Waynesville food bank
    drives and local park festivals, turning chaotic volunteer rosters into smooth, well‑publicized experiences.
  sports: Jeffrey Thompson, a 23‑year‑old soccer enthusiast, plays midfield for the Waynesville United recreational league, follows the Atlanta Braves and North Carolina Tar Heels, and participates in weekend
    trail runs with the Asheville Trail Club, always finding time for a quick hike after a match.
  arts: Jeffrey Thompson brings their organized spirit to community theater, acting in productions like 'The Music Man' and handling set design for 'Little Shop of Horrors', while also curating a nature‑photography
    Instagram feed inspired by Ansel Adams and enjoying folk concerts by the Avett Brothers.
  travel: Jeffrey Thompson prefers meticulously planned weekend escapes, using custom Google Sheets itineraries to backpack through the Blue Ridge and Great Smoky Mountains, while dreaming of a gap‑year
    trek through Patagonia once their tour‑guide startup is profitable.
  culinary: Jeffrey Thompson experiments with Appalachian dishes such as smoked trout, apple dumplings, and butternut squash soup, cooking over a campfire or in their modest kitchen, yet has a habit of
    over‑marinating ribs and occasionally forgetting to defrost meat before a hike.
  core: Jeffrey Thompson, 23, blends a love for the outdoors with razor‑sharp organization, turning community volunteer work, soccer matches, theater productions, and budget spreadsheets into a well‑balanced,
    adventure‑driven life, albeit with a tendency to over‑commit and occasionally forget to drink water.
background:
  cultural: Jeffrey was raised in Waynesville, a small town nestled in the Appalachian foothills of North Carolina. His family embodies the region’s blend of Southern hospitality and self‑reliance, with
    parents who have worked in local service and small‑business sectors. Growing up, he was exposed to Appalachian folk traditions, such as bluegrass music, storytelling, and crafts, which fostered an appreciation
    for community and heritage. He attended a public high school where he participated in a multicultural club, giving him a broader perspective while staying rooted in his rural environment. The close‑knit
    nature of Haywood County, combined with a strong sense of civic duty and respect for the natural landscape, shapes his values of cooperation, kindness, and practical stewardship of his surroundings.
