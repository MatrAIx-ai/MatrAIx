  career_goals: Hwa Ying aims to advance from cashier to shift supervisor and eventually store manager, leveraging her reliable work ethic and leadership potential. She plans to complete a certificate in
    business management at a local community college to deepen her knowledge of retail merchandising and team leadership. Long‑term, she dreams of opening a boutique that blends retail with an art space
    showcasing Asian‑inspired crafts and contemporary works, while also providing mentorship opportunities for young employees from immigrant backgrounds. She is motivated to contribute to Sacramento’s
    cultural scene by organizing community art events and partnering with local artists.
