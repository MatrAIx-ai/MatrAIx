personas:
  professional: Felicia Gardner is a seasoned management analyst who harnesses Excel, SQL, and Power BI to craft detailed performance metrics and cost‑benefit models, channeling a love of routine, a skeptical
    eye, and a competitive streak into consistently top‑ranked deliverables that they take pride in.
  sports: Felicia Gardner enjoys solitary weekend walks along the Riverbanks Zoo and Garden’s natural trails, follows the Columbia Fireflies and South Carolina Gamecocks for a touch of community spirit,
    practices gentle home yoga and occasional Pilates to stay flexible, and they prefer low‑impact, routine‑based fitness over competitive team sports.
  arts: Felicia Gardner finds quiet inspiration in listening to Yo‑Yo Ma’s cello suites and Ella Fitzgerald’s jazz standards, attends occasional performances at the Paramount Theatre, curates a personal
    library of historical biographies and poetry, and they let these artistic pursuits shape their reflective leisure moments.
  travel: Felicia Gardner favors meticulously planned solo trips to historic Southern destinations such as Charleston, Savannah, and Asheville’s Blue Ridge Mountains, books boutique bed‑and‑breakfasts,
    documents each itinerary in a travel journal, and they avoid crowded tourist hotspots in favor of quiet, culturally rich experiences.
  culinary: Felicia Gardner cooks traditional Southern soul‑food dishes such as shrimp‑and‑grits, collard greens, and sweet‑potato casserole, relies on fresh herbs like thyme and basil from their backyard
    garden, balances these meals with occasional gourmet tea ceremonies featuring Earl Grey and chamomile, and they consider cooking both a meditative ritual and a way to honor family recipes.
  core: Felicia Gardner is a routine‑oriented, solitary‑preferring management analyst who channels competitive drive into precise data work while coping with anxiety through gardening, yoga, and comforting
    cooking.
background:
  cultural: Felica was raised in a close‑knit African‑American family in Columbia, South Carolina, where church, family gatherings, and Southern traditions shaped her identity. Her grandparents were part
    of the Great Migration, and stories of resilience and community solidarity were woven into her upbringing. She attended a historically Black college for her undergraduate studies before earning her
    MBA at the University of South Carolina, where she balanced academic rigor with involvement in the National Black MBA Association. The cultural emphasis on perseverance, respect for elders, and communal
    support informs her practical outlook and competitive drive. Felica’s appreciation for gospel music, soul food, and the rich history of the African‑American South remains a source of pride and grounding
    amid her professional responsibilities.
attributes:
  skills: '[''Data analysis'', ''Financial modeling'', ''Cost‑benefit analysis'', ''Performance metrics development'', ''Process mapping'', ''Lean‑Six Sigma methodology'', ''Excel'', ''SQL'', ''Power BI'',
