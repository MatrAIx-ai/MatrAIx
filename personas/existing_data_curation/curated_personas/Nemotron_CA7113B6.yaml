  hobbies: '[''Reading historical biographies'', ''Business case study analysis'', ''Gardening'', ''Journaling'', ''Solo nature walks'', ''Yoga'', ''Cooking Southern soul‑food'']'
  career_goals: Felica aims to advance to a senior management analyst role within the next three years, positioning herself as a go‑to expert for efficiency projects in both public‑sector and corporate
    settings of the Midlands. She plans to earn a Six Sigma Black Belt and a Project Management Professional (PMP) certification to bolster her credibility. Her long‑term ambition is to become a director
    of operations or a strategic planning manager, where she can shape policy and drive large‑scale process reforms while maintaining a stable, predictable work environment. She also hopes to mentor emerging
    Black women professionals in the region, sharing her practical knowledge and helping them navigate corporate challenges.
