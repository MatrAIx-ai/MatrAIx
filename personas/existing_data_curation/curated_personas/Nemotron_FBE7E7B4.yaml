  career_goals: Although still a toddler, Randy frequently talks about wanting to become a community helper who can care for others. He imagines being a doctor who heals children, a firefighter who keeps
    neighborhoods safe, or an artist who creates bright pictures that make people smile. As he grows, his ambition is to blend his compassion with his love for art, aiming for a career that both helps people
    and expresses creativity.
