personas:
  professional: Lori Imran is a budding junior engineer who blends a passion for DIY electronics, model rocketry, and Scratch game coding with a methodical, curiosity‑driven planning style; they document
    each experiment on a blog that showcases their organized, step‑by‑step approach.
  sports: Lori Imran plays forward for the Spokane Soccer Club’s U‑14 girls’ team, idolizes Seattle Sounders forward Jordan Morris, spends winter weekends snowboarding at Mount Spokane, and follows the
    Spokane Chiefs hockey team; they balance competitive teamwork with solo outdoor pursuits.
  arts: Lori Imran devours the sci‑fi series "The Expanse" by James S. A. Corey and the graphic novel "Saga" by Brian K. Vaughan, captures sunrise over the Spokane River with a Canon EOS 2000D, and fills
    their playlists with indie rock from Mitski and orchestral scores by Hans Zimmer, weaving literature, photography, and music into their creative identity.
  travel: Lori Imran prefers family road trips that blend adventure and learning—she’s hiked the waterfalls of Olympic National Park, camped near the Columbia River, and dreams of visiting the cherry‑blossom
    festivals in Kyoto—but they balance their modest allowance with school‑sponsored field trips and a growing wish for international travel.
  culinary: Lori Imran enjoys crafting out‑of‑school snacks like peanut‑butter‑banana wraps and trail‑mix with dried cranberries, reliably makes avocado toast topped with radish and sesame seeds, and delights
    in ordering pepperoni pizza loaded with extra mushrooms after weekend soccer games; they often share their creations with friends during study sessions.
  core: Lori Imran blends nerdy curiosity with prairie pragmatism, juggling model rockets, soccer drills, and a meticulously kept allowance ledger; they occasionally stay up late to finish a graphic novel
    and then regret it at school the next day.
background:
  cultural: Lori's cultural background is rooted in contemporary American middle-class life in the Pacific Northwest. Growing up in Spokane, Washington, she experiences a community that values outdoor recreation,
    environmental stewardship, and a strong sense of local identity. Her family traditions include celebrating holidays such as Thanksgiving and the Fourth of July, attending community gatherings like the
    Spokane County Fair, and participating in school and church activities that emphasize cooperation and service. Exposure to the region's natural landscapes—rivers, forests, and mountains—has nurtured
    her appreciation for nature and informed her interest in environmental science. While her ethnic background is white, she is also taught to respect the cultural heritage of the area's Native American
    tribes and to be inclusive in her community interactions.
