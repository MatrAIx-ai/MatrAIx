  career_goals: Lori aspires to attend a university renowned for its STEM programs, with a particular interest in environmental science or biomedical engineering. She aims to develop the skills needed to
    conduct impactful research on climate change or medical innovations, hoping one day to lead a multidisciplinary team that translates scientific discoveries into practical solutions. In the short term,
    she plans to earn leadership positions in her school's science club and Girl Scouts, and to gain a scholarship that supports her academic journey. She also hopes to become a mentor for younger students,
    especially girls, encouraging them to explore science and technology.
