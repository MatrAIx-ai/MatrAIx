  career_goals: Cheryl dreams of a future where she can help others in a well‑structured setting. She often talks about becoming a teacher or librarian, roles that let her use her love of order and her
    caring nature. Occasionally she imagines caring for animals as a veterinarian, but her core ambition is to be reliable, supportive, and organized in whichever career she eventually chooses.
