personas:
  professional: Cheryl Riley, a budding engineer-in-training who spends afternoons assembling intricate LEGO sets and solving jigsaw puzzles, channels their methodical, organized nature into early coding
    lessons and dreams of designing structures that support their hometown's sturdy community.
  sports: Cheryl Riley, a member of the Midland Mavericks youth soccer team, enjoys kicking the ball in the fall league, swims at the community pool in summer, cheers on the Dallas Cowboys on Saturdays,
    and they practice short yoga stretches after school to stay flexible.
  arts: Cheryl Riley devotes weekends to drawing quiet countryside scenes inspired by the wide West Texas horizon, reads the "Magic Tree House" series by Mary Pope Osborne, listens to Taylor Swift and the
    classic folk tunes played at church potlucks, and they eagerly discuss favorite characters during the local library reading club.
  travel: Cheryl Riley loves family road trips to the Grand Canyon and the historic San Antonio River Walk, prefers itineraries with scheduled rest stops for snack breaks and reading time, dreams of visiting
    Washington, D.C.'s Smithsonian museums, and they always pack a small travel journal to sketch new landscapes.
  culinary: Cheryl Riley enjoys helping in the kitchen by assembling tacos with seasoned ground beef, shredded cheese, and fresh salsa, favors homemade mac and cheese with a sprinkle of paprika, can flawlessly
    make a fruit smoothie with strawberries, bananas, and almond milk, and they occasionally sneak extra chocolate chips into cookie dough when no one's looking.
  core: Cheryl Riley blends a love for structured play, diligent saving, and quiet creativity into a sweet-tempered, detail-obsessed 9-year-old who never forgets to line up their LEGO bricks before bedtime.
background:
  cultural: Cheryl comes from a middle‑class white family in Midland, Texas, a community known for its close‑knit, family‑oriented culture and strong ties to the oil industry. Her upbringing emphasizes
    hard work, modesty, and community service, with frequent involvement in church gatherings and local school events. The West Texas environment, with its sunny climate and wide-open spaces, nurtures a
    practical, resilient outlook, while the local emphasis on reliability and order aligns with Cheryl's personality.
