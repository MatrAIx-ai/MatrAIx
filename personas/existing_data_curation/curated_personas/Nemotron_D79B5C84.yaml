personas:
  professional: Laila Batra, an aspiring junior illustrator who blends watercolor techniques with digital doodles on her tablet, channels her curiosity and love for unconventional ideas into vibrant sketches
    while they maintain a relaxed approach to deadlines that often leads to delightful, if slightly messy, creative bursts.
  sports: Laila Batra, a spirited soccer enthusiast who darts across the local park field every Saturday, cheers for the City Lions youth team, and grooves in their weekly Bhangra dance class, balances
    competitive play with occasional teamwork, and they idolize soccer star Alex Morgan while also tapping along to Bollywood dance beats.
  arts: Laila Batra, a water‑color aficionado who spends afternoons painting whimsical dinosaurs and distant galaxies, devours picture books by authors like Andrea K Höst, draws digital doodles inspired
    by Miyazaki’s My Neighbor Totoro and Bollywood song visuals, and they quote favorite musicians such as Arijit Singh and Ariana Grande during creative bursts.
  travel: Laila Batra, an adventurous eight‑year‑old who loves local field trips to the city zoo and the Exploratorium science museum, dreams of visiting the Grand Canyon’s red cliffs and the Space Center
    in Houston, and they plan a future family vacation to the fairy‑tale castles of Europe after saving enough for a train ticket.
  culinary: Laila Batra, a picky yet curious eater who adores cheese‑laden pizza, bright mango lassi, and buttery naan with mild paneer filling, eagerly helps stir chocolate‑chip batter for cupcakes, but
    they often stuff extra chocolate chips in their mouth unnoticed, creating a sweet‑tooth habit.
  core: Laila Batra is a wildly curious, competitively spirited eight‑year‑old who toggles between messy art sessions, soccer scrimmages, and spontaneous Bhangra moves, all while they juggle a love for
    Bollywood beats and a habit of misplacing school supplies.
background:
  cultural: Laila comes from a Punjabi South Asian family; at home she hears Punjabi and English, and her parents celebrate festivals like Diwali, Baisakhi, and Gurpurab with traditional foods, music, and
    family gatherings. She enjoys the flavors of Indian cuisine, such as aloo paratha and mango lassi, while also loving the diverse culinary scene of Oakland. Her upbringing blends South Asian customs—respect
    for elders, storytelling, and dance—with the multicultural experiences of her neighborhood, giving her a bicultural identity that influences her art, music preferences, and community interactions.
