  career_goals: Laila dreams of becoming someone who creates and shares art and ideas—she imagines herself as a mural artist who blends vibrant colors with interactive technology, or as a young inventor
    who designs playful gadgets that surprise people. She also loves space and sometimes says she wants to be an astronaut who discovers new worlds. Her competitive streak fuels a desire to be recognized
    for her creations, while her curiosity pushes her toward careers that let her explore constantly, such as a creative technologist, museum curator, or junior scientist.
