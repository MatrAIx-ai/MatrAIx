personas:
  professional: Zane Sellick is a budding junior architect who spends hours arranging Lego bricks by shape and color, drafting miniature floor plans on graph paper, and eagerly asking "why" about how buildings
    stay upright, blending their natural curiosity with a meticulous, achievement‑driven approach even at four; they thrive in structured playtimes but also relish quiet moments to perfect their creations.
  sports: Zane Sellick kicks off spring mornings with the Tiny Tigers Kids Soccer Club, practices dribbling with the same disciplined focus they bring to LEGO building, proudly wears a Chicago Cubs cap
    on game day, watches the Chicago Bulls on TV after school while dreaming of scoring a winning goal, and in the summer joins a community swimming lesson, yet occasionally loses interest mid‑practice
    to explore the sandbox.
  arts: Zane Sellick loves drawing Dr. Seuss characters with crayons while listening to The Wiggles, delights in the imaginative stories of the animated series "Bluey," can recite "Twinkle, Twinkle, Little
    Star" in both English and a simple Spanish phrase learned from a nursery rhyme video, and often asks to visit the local children's museum to explore its interactive art installations, showcasing their
    openness to varied artistic influences.
  travel: Zane Sellick enjoys family road trips where they sit in the front seat to point out road signs, remembers vividly their first visit to Disneyland’s Fantasyland, loves splashing in the touch pool
    at the nearby aquarium, and has a growing wish list that includes a trip to the Grand Canyon for its "big rocks" and a seaside vacation to Cornwall to explore tide pools, balancing excitement for new
    scenery with the comfort of familiar routines.
  culinary: Zane Sellick favors buttery macaroni and cheese, crunchy carrot sticks, and banana slices, proudly insists on aligning forks and spoons in a neat row before meals, can stir a pot of warm oatmeal
    with a plastic spoon all by themselves, often surprises caregivers by adding a pinch of cinnamon to pancakes, and despite their tidy habits, occasionally smears peanut butter on their cheeks in a delightfully
    messy grin.
  core: Zane Sellick is a curiously organized four‑year‑old who builds perfect Lego cities, saves every coin in a tidy piggy bank, and delights in drawing dinosaurs while occasionally getting a smudge of
    paint on their nose.
background:
  cultural: Zane is raised in a white, middle-class family in the Roanoke-Salem region of Virginia. His family participates in local traditions such as Thanksgiving meals, community church events, and the
    Roanoke Fall River Festival. He is exposed to Appalachian folk music, craft fairs, and the city’s growing art scene, fostering his appreciation for varied artistic experiences. The region’s emphasis
    on politeness, community support, and a love for the outdoors shapes his kind, cooperative nature and his enjoyment of exploring nature in the nearby Blue Ridge foothills.
