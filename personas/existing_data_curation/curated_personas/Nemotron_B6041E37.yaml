  hobbies: '[''Flea market hunting'', ''DIY upcycling'', ''Sewing and quilting'', ''Hiking'', ''Strategy board games'', ''Reading mystery novels'', ''Listening to true‑crime podcasts'', ''Baking artisan
    breads'', ''Photography of restored furniture'', ''Attending craft fairs'']'
  career_goals: Neko aims to grow her upholstery practice into a boutique studio recognized for high‑quality, upcycled furniture in the Albany region. She plans to earn certification from the Upholstery
    Institute of America, expand her client base by collaborating with local interior designers, and launch a series of hands‑on workshops to share her trade with other craft enthusiasts. Long‑term, she
    envisions opening a small storefront that showcases bespoke pieces and serves as a community hub for sustainable design, while maintaining the flexibility to pursue creative projects on her own terms.
