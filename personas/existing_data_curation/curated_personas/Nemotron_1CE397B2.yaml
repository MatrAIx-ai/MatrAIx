personas:
  professional: Ryan Martin, a curious three‑year‑old, treats playtime like a startup by meticulously organizing his Lego blocks, planning elaborate building schedules on paper, and competitively racing
    friends to complete the tallest tower, a habit that hints at future leadership in engineering.
  sports: Ryan Martin, an energetic toddler, plays summer soccer with the Tiny Kickers Club, attends weekly gymnastics at Bright Beginnings, cheerfully wears a Chicago Cubs cap, and methodically practices
    his kicking technique, competitively aiming to score more goals than his peers.
  arts: Ryan Martin, a budding art enthusiast, spends hours drawing bright scenes inspired by Van Gogh’s Starry Night, watches Walt Disney’s classics with fascination, sings loudly along to The Beatles’
    “Yellow Submarine,” and proudly shows off his finger‑painted masterpieces to friends, reflecting a deep appreciation for colorful creativity.
  travel: Ryan Martin, an adventurous three‑year‑old, loves family trips to Orlando’s theme parks, weekend getaways to the Grand Canyon for scenic hikes, and dreaming about a future visit to Tokyo Disneyland,
    often planning his itinerary with picture‑based maps and preferring short car rides with frequent stops.
  culinary: Ryan Martin, a picky yet enthusiastic eater, adores creamy macaroni and cheese, crunchy chicken nuggets, banana pancakes with maple syrup, and builds his own PB&J sandwiches with grape jelly,
    while insisting on fresh strawberries as a fruit topping and refusing green peas.
  core: Ryan Martin, a three‑year‑old bundle of curiosity and competitiveness, meticulously organizes toys, reacts intensely to setbacks, hoards snacks, and pours boundless energy into imaginative play,
    often shifting quickly between social chatter and solitary exploration.
background:
  cultural: Ryan was born and raised in Leonard, a small community in Fannin County, Texas. His family’s cultural background is rooted in a rural Southern upbringing, with influences from local community
    events, church gatherings, and family traditions that value close-knit relationships and respect for nature. He is exposed to regional folk music, storytelling sessions at the local library, and seasonal
    celebrations that reflect a blend of American and European heritage common among white families in the area.
