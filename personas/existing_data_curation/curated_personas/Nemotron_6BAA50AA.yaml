personas:
  professional: Tim Drown, a budding astronomer‑in‑the‑making, tackles Lego spaceship builds with an eye for both creativity and the practical instructions, showing early signs of engineering curiosity
    balanced with pragmatic problem‑solving, and they often share their interstellar ideas with friends during playtime.
  sports: Tim Drown plays forward for the Maple Grove Youth Soccer Club, idolizes Lionel Messi and follows FC Barcelona matches, cheers for the nearby River City Raptors minor league baseball team, and
    attends beginner swimming lessons at the community pool, embracing a flexible approach to staying active and they love cheering with teammates.
  arts: Tim Drown, a budding doodler, spends afternoons sketching animals inspired by Dr. Seuss and Pixar’s animated films, humming along to The Wiggles and 'Baby Shark', and never misses the local library’s
    weekly storytime featuring Mo Willems, reflecting a lively imagination they eagerly share.
  travel: Tim Drown’s travel style blends spontaneous park explorations with family‑planned getaways, ranging from weekend hikes to the nearby Blue Ridge Trail and summer trips to Myrtle Beach’s sandy shores,
    to a coveted family adventure to Disneyland in Anaheim where they dream of riding Space Mountain.
  culinary: Tim Drown, a pretend chef in a bright plastic kitchen, loves cooking real‑world macaroni and cheese with elbow pasta and sharp cheddar, crafting PB&J sandwiches with crunchy peanut butter and
    sweet grape jelly, and assembling a make‑believe veggie stew sprinkled with orange carrots and green peas, and they often invite friends to taste‑test their culinary experiments.
  core: Tim Drown is an energetic, curiosity‑driven six‑year‑old who balances imaginative play with practical problem‑solving, thrives in group activities, and occasionally leaves Lego bricks scattered
    across the floor, a quirk they’re still learning to tidy.
background:
  cultural: Tim comes from a white, middle-class family living in the suburban community of Norcross, Georgia. His upbringing reflects typical Southern U.S. cultural values such as politeness, community
    involvement, and a love of outdoor recreation. He participates in local church Sunday school, attends a public elementary school where he is exposed to a diverse student body, and enjoys neighborhood
    events like spring fairs and library story hours. Family traditions include backyard barbecues, seasonal holidays, and encouraging curiosity through hands-on activities.
