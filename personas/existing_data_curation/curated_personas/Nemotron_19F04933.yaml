personas:
  professional: Richard Mcduffie, a community‑focused visual arts organizer and aspiring maker‑space founder, blends their graphic design expertise, event‑planning savvy, and handy woodworking to design
    collaborative art events that nurture local creativity while maintaining a relaxed yet assertive leadership style.
  sports: Richard Mcduffie hikes the Columbia River Gorge with the local “Gorge Trekkers” club each weekend, plays pickup basketball at the community center, competes in a co‑ed adult soccer league called
    the Vancouver Vipers, and follows the Seattle Seahawks and Portland Trail Blazers, balancing their love of outdoor adventure with light competitive sport.
  arts: Richard Mcduffie immerses themselves in the Pacific Northwest art scene, photographing Banksy‑style street murals, curating gallery nights that showcase local painter Anna Lee, strumming acoustic
    renditions of Jimi Hendrix at open‑mic sessions, and dropping into improvisational rehearsals with Portland Improv, while their book club debates contemporary writers like Margaret Atwood and Kazuo
    Ishiguro.
  travel: Richard Mcduffie plans weekend road trips along the Columbia River for spontaneous hikes, enjoys well‑researched overseas journeys to Banff, Reykjavik, and Kyoto, but balances their adventure
    with family commitments by reserving summer vacations for a long‑form drive to the Oregon Coast and occasional ski weekends in Vail.
  culinary: Richard Mcduffie, a competent home cook, frequently blends garden heirloom tomatoes into fresh Caprese salads, grills miso‑glazed salmon for dinner, rolls their own kimchi during the cooler
    months, and indulges in craft espresso at Stumptown while occasionally treating themselves to sushi rolls like the dragon roll at a downtown sushi bar.
  core: Richard Mcduffie is a 47‑year‑old visual‑arts champion who balances meticulous community‑building with a restless creative impulse, occasionally overcommitting to projects while fueling their soul
    with guitar riffs, garden tomatoes, and spontaneous hikes.
background:
  cultural: Richard grew up in the Pacific Northwest, shaped by the region's rugged natural beauty and a strong DIY ethos. His family traces its roots to Northern European settlers, and while his upbringing
    was traditionally American, he has embraced the multicultural fabric of Vancouver, WA, through its diverse art festivals and community events. He values environmental stewardship, a hallmark of the
    local culture, and often incorporates sustainable practices into his projects. His marriage and active involvement in neighborhood groups reflect a deep commitment to community cohesion and shared cultural
    experiences.
