  career_goals: Richard aims to translate his lifelong passion for the arts into a sustainable community venture. He plans to launch a modestly sized makerspace in Vancouver, WA, where local artists can
    share resources, host workshops, and exhibit their work. In parallel, he hopes to secure a part‑time teaching role at a nearby community college or adult‑education center, delivering courses in visual
    storytelling and basic design. Completing a bachelor's degree in Fine Arts is also on his radar, as he believes formal credentials will broaden his outreach possibilities. Ultimately, he wants to leave
    a lasting cultural imprint on his hometown while maintaining a flexible schedule that supports his family life.
