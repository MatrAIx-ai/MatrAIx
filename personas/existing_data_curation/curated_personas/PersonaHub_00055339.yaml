persona_description: A researcher and scientist who specializes in the study of animal physiology and nutrition, particularly in the area of equine physiology. This individual has conducted extensive research
  on the effects of sodium chloride on the acid, base, and mineral status in sport horses and has proposed a new scoring system to measure sweat loss in exercised horses. They have published their findings
  in a scientific journal and have presented their research at conferences. They are interested in the practical and accurate measurement of sweat loss in horses and are looking for further studies to verify
  the accuracy of their proposed scoring system.
