personas:
  professional: Nicolae Mcclendon is a budding LEGO architect who channels their vivid imagination into designing elaborate cityscapes while dabbling in sandbox video game modding, and they often collaborate
    with friends on community art projects at school.
  sports: Nicolae Mcclendon plays for the local Colorado Rush youth soccer club, they cheer for the Colorado Avalanche and the Denver Broncos, and they regularly join family hikes up Pikes Peak, balancing
    structured team practice with spontaneous trail explorations.
  arts: Nicolae Mcclendon draws intricate comic panels inspired by Neil Gaiman and Studio Ghibli, they rehearse improv skits at the community arts center, and they quote lines from Imagine Dragons during
    creative brainstorming sessions, weaving their love of sci‑fi novels into every artistic experiment.
  travel: Nicolae Mcclendon loves spontaneous weekend drives to the Rocky Mountain National Park and day trips to the Garden of the Gods, they have visited Disney World with family, and they dream of exploring
    Kyoto’s temples and hiking Japan’s Kumano Kodo trails, preferring adventure over organized tours.
  culinary: Nicolae Mcclendon’s favorite meals include pepperoni pizza with extra cheese, loaded taco bowls with cilantro and lime, and campfire s’mores made from marshmallows, graham crackers, and chocolate
    chips, they enjoy experimenting with trail mix recipes that combine dried cranberries, almonds, and gummy bears while listening to video game soundtracks.
  core: Nicolae Mcclendon is an imaginative, socially vibrant teen who mixes LEGO city‑building with video game modding, often postpones chores for creative bursts, and has a habit of sketching doodles
    on school notebooks during math class.
background:
  cultural: Raised in Colorado Springs, Nicolae is shaped by the city's blend of military community values, a strong outdoors ethic, and a growing local arts scene. His family encourages self‑expression
    and curiosity, while his school emphasizes project‑based learning and collaborative creativity. Participation in community youth arts programs has exposed him to diverse perspectives, reinforcing his
    openness to novelty and his appreciation for both the structured and adventurous aspects of his regional culture.
