  hobbies: '[''Reading mystery novels'', ''Gardening'', ''Knitting and crochet'', ''Jogging in local parks'', ''Volunteering at the food bank'', ''DIY home‑improvement projects'', ''Birdwatching'', ''Board
    games with close friends'']'
  career_goals: Helen aims to advance within the United States Postal Service by moving into a supervisory role, such as route manager or shift supervisor, where she can apply her organizational strengths
    on a larger scale. She is interested in pursuing an associate degree in logistics or business administration to complement her hands‑on experience. Helen also hopes to lead a community‑outreach initiative
    that pairs mail carriers with local senior centers to ensure vulnerable residents receive timely assistance. Long‑term, she envisions taking on a postmaster position or becoming an active representative
    in the postal workers' union, advocating for both operational efficiency and employee well‑being.
