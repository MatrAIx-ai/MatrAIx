  career_goals: Anh aims to leverage her organizational strengths and artistic interests by securing a part‑time role as a volunteer coordinator or community outreach specialist for a local arts center,
    where she can design and manage intimate workshops. She plans to obtain a nonprofit management certification and, if feasible, complete her GED or an associate degree in business administration. Over
    the next few years, she hopes to launch a home‑based business offering handmade embroidered home décor and curated Southeast Asian cooking kits, integrating her cultural heritage with entrepreneurial
    ambition. Long‑term, she envisions becoming a recognized facilitator of culturally inclusive art and culinary experiences within Cobb County, balancing professional fulfillment with personal well‑being.
