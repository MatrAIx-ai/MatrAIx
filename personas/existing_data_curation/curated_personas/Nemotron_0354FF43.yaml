  hobbies: '[''solving puzzles'', ''reading technical manuals'', ''gardening'', ''listening to Honduran music'', ''cooking traditional dishes'', ''community cultural events'', ''hiking'', ''fishing'']'
  career_goals: Cecilio aims to transition into a fleet management role within the next three years, where he can apply his technical background to improve operational efficiency and safety. He plans to
    obtain certification as a Transportation Safety Trainer and eventually launch his own small trucking company focused on reliable regional deliveries, emphasizing punctuality and customer satisfaction.
    He also aspires to mentor younger drivers, fostering a supportive and structured work environment.
