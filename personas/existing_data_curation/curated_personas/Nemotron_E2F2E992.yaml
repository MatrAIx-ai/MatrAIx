    about entrepreneurship'']'
  career_goals: Adam aims to complete a Bachelor of Business Administration with a concentration in Marketing or Communications within the next four years. He plans to secure a summer internship in a marketing
    department or at a nonprofit organization where he can apply his event‑planning and social media expertise. After graduation, he envisions working as a marketing coordinator for a regional firm, eventually
    advancing to a marketing manager role where he can shape brand strategies and community outreach campaigns. Parallel to his corporate aspirations, he hopes to launch a community‑focused digital platform
    that highlights local events, small businesses, and volunteer opportunities in Kalamazoo County, leveraging his organizational talents to foster stronger neighborhood connections.
