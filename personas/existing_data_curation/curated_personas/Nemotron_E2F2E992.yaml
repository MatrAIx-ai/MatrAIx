personas:
  professional: Adam Jernigan, an aspiring marketing coordinator who blends his business school coursework with hands‑on event‑planning experience, leverages their confident public speaking and meticulous
    organization to craft community‑focused campaigns while thriving as the charismatic center of any team meeting.
  sports: Adam Jernigan, a dedicated community‑center basketball player with the Galesburg Rovers, supports the Detroit Lions and the Michigan State Spartans, follows the NBA season closely, and treats
    their fitness regimen like a well‑planned schedule, balancing three weekly pickup games with weekend hikes through the Michigan woods.
  arts: Adam Jernigan, an enthusiastic hobbyist photographer who curates a social‑media feed featuring shots of autumn foliage and local festivals, draws artistic inspiration from the indie folk sounds
    of The Lumineers and Sufjan Stevens, and enjoys live shows at The Vertical in Kalamazoo as well as revisiting classic films by Wes Anderson.
  travel: Adam Jernigan, an adventurous yet budget‑conscious traveler, has road‑tripped to Chicago’s Navy Pier and camped in the Upper Peninsula’s Tahquamenon Falls, carefully plans each outing with spreadsheets,
    and harbors a dream of hiking the Milford Track in New Zealand once they’ve saved enough for the airfare.
  culinary: Adam Jernigan, a self‑taught home cook who loves crafting elaborate meals for friends, frequently whips up creamy chicken alfredo with fresh basil and roasted garlic, experiments with sourdough
    bread using a wild‑fermented starter, and treats weekend potlucks as a chance to blend Midwestern comfort foods like BBQ ribs with exotic spices such as smoked paprika.
  core: Adam Jernigan, a socially‑driven, methodical twenty‑year‑old who balances a relentless love for community events with a habit of checking their phone for the latest playlist while secretly hoarding
    stray napkins from every café they visit.
background:
  cultural: Adam grew up in Galesburg, a small town in Kalamazoo County, Michigan, within a middle‑class, predominantly white community that emphasizes modesty, hard work, and neighborly support. His family’s
    roots trace back to German and Irish ancestry, and he was raised with a blend of Protestant values and an appreciation for local traditions such as county fairs, high school football games, and community
    picnics. The Midwestern culture of collaborative spirit, self‑reliance, and community involvement shapes his outlook, encouraging him to prioritize harmony, cooperation, and service to others.
