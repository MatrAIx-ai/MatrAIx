persona_description: Gerda Lerner was a committed feminist historian who established women's history as an academic enterprise worthy of attention and respect, and inspired two generations of students and
  scholars. She was a novelist, screenwriter, and union activist, and was active as a community organizer and in improving conditions in her children's school. Her work as a researcher, writer, and teacher
  helped establish the discipline of women's history and was widely recognized in this country and around the world. She was a committed feminist who signed up for the long haul and believed that feminism
  would continue to live and grow, as long as women anywhere had "grievances."
