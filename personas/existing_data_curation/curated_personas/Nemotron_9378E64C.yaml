  career_goals: Marcia often talks about wanting to be a teacher or caretaker when she grows up, picturing a role where she can help other children learn and keep things organized. She dreams of working
    in a caring environment such as a preschool, a community center, or eventually a veterinary clinic, where she can combine her love for helping others with her natural preference for order and harmony.
    In the short term, her ambition is to master new skills at preschool and become a reliable helper at home.
