personas:
  professional: Marcia Parvin, a two‑year‑old who delights in arranging building blocks into orderly rows, shows early signs of a future early‑childhood educator, using their practical, structured mindset
    and compassionate nature even in pretend classroom play.
  sports: Marcia Parvin, a two‑year‑old who eagerly joins the Leland Little Sprouts Soccer Club for toddler‑friendly sandbox play in spring and proudly wears a Carolina Hurricanes jersey while shouting
    cheers during family game nights, they approach fitness with boundless energy and a love for the outdoors.
  arts: Marcia Parvin, a two‑year‑old who adores the lively tunes of Dolly Parton, the jubilant gospel choir at their local church, and the animated adventures of 'Bluey', expresses their creativity through
    spontaneous dance and by drawing bright sun‑filled pictures of beach scenes.
  travel: Marcia Parvin, a two‑year‑old who has delighted in sandy escapades at the Outer Banks and a family road‑trip to Disney World, now dreams of feeling the wind at the Eiffel Tower’s summit during
    a future vacation with their parents.
  culinary: Marcia Parvin, a two‑year‑old who eagerly scoops up buttery mac and cheese, munches on crispy chicken nuggets, and savors sweet banana slices with a dab of peanut butter, shows budding independence
    by using their small plastic fork at family meals.
  core: Marcia Parvin, a two‑year‑old blend of practical structure, heartfelt compassion, and spirited curiosity, navigates their world with organized play, generous sharing, and an unwavering love for
    community routines.
background:
  cultural: 'Marcia is raised in a white Southern family in Leland, North Carolina, where community, hospitality, and family traditions are central. Her upbringing reflects typical coastal‑plain influences:
    frequent beach outings, barbecues, and participation in local church activities. She celebrates national holidays such as Thanksgiving, Christmas, and the Fourth of July, and she is exposed to Southern
    customs like polite manners, storytelling, and a strong emphasis on helping neighbors. The local culture’s focus on outdoor recreation, close‑knit community ties, and a faith‑oriented environment shapes
    her compassionate and cooperative nature.'
