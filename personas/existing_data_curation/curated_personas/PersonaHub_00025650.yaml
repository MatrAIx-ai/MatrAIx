persona_description: A paleobiogeographer who is interested in the use of species distribution models to study the past distribution of species and their impacts on the Earth's biodiversity. This person
  is knowledgeable about the challenges of constructing Paleo-Species Distribution Models, the current state-of-the-art in Paleo-SDMs, and the potential for future research to improve their use in paleobiogeography.
  This person is also interested in the use of biogeography to understand the distribution of species and the factors that influence their distributions, and how these factors may be affected by climate
  changes.
