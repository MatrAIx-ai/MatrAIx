persona_description: A researcher or scientist who specializes in environmental science, specifically studying the changes in vegetation over time using remote sensing techniques. They are interested in
  the quantitative and qualitative changes in vegetation in different districts of Mashhad city over a period of 30 years, using satellite images and the NDVI index. Their work involves classifying the
  districts into vegetation and non-vegetation groups and categorizing the vegetation into dense and medium groups. They are likely to be a scientist with a PhD in environmental science or a related field,
  with a strong background in remote sensing, vegetation science, and quantitative and qualitative analysis.
