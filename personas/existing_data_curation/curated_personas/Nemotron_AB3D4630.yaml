  hobbies: '[''Cooking traditional Mexican dishes'', ''Backyard gardening (chilies, herbs)'', ''Weekend road trips and landscape photography'', ''Following local soccer matches'', ''Listening to Norteño
    and Banda music'', ''Volunteering at parish food‑bank'', ''Reading self-help books on resilience'', ''Watching classic Mexican films'']'
  career_goals: Vanessa aims to translate her hands-on driving and sales experience into a leadership position within the transportation sector. In the next three years she plans to become a fleet operations
    supervisor, overseeing route optimization, driver safety programs, and sales performance for a regional distribution company. Her longer-term ambition is to launch a family-owned logistics and cross-border
    freight service that leverages her bilingual abilities and deep knowledge of the Texas-Mexico trade corridor. To support these goals she intends to complete her bachelor's degree in business administration
    and earn a Certified Transportation Professional (CTP) credential, while continuing to set top-ranked delivery and sales metrics within her current role.
