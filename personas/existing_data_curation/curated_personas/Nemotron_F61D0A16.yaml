  hobbies: '["Visiting art galleries", "Street-art exploration", "Surfing", "Hiking", "Ukulele playing", "Cooking Vietnamese-Hawaiian fusion dishes", "Digital drawing/manga creation", "Video gaming", "Volunteer
    beach clean-ups", "Participating in cultural festivals"]'
  career_goals: Tham envisions a career that merges his love for art, culture, and community. He plans to complete a bachelor's degree in visual communications or multimedia arts, building on his current
    college coursework. His long-term goal is to work as a multimedia artist or creative director for a cultural nonprofit or museum, designing exhibitions, digital storytelling projects, and promotional
    campaigns that celebrate Southeast Asian and Hawaiian heritage. He also hopes to launch a personal online channel that highlights cross-cultural art tutorials and community events, allowing him to reach
    a broader audience while maintaining flexibility to travel and collaborate. In the short term, Tham aims to take on part-time internships with local galleries, assist in organizing the annual Vietnamese
    New Year festival in Honolulu, and expand his portfolio of graphic design and video work.
