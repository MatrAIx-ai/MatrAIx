  hobbies: '[''Reading contemporary fiction'', ''Journaling'', ''Knitting'', ''Herb gardening'', ''Cooking (following recipes)'', ''Puzzle solving (crosswords, Sudoku)'', ''Listening to educational podcasts'',
    ''Volunteer work at the local library'', ''Small-group nature walks'', ''Landscape photography'']'
  career_goals: Brenda plans to finish her associate degree in Business Administration within the next year and then pursue a certification as a Certified Administrative Professional. Her short‑term goal
    is to secure a full‑time office administrator position with a small local business or nonprofit where she can apply her organizational strengths and contribute to a harmonious workplace. In the longer
    term, she hopes to advance to an office manager or program coordinator role, ideally in a community‑focused organization that aligns with her desire to support others and maintain a stable, structured
    career path.
