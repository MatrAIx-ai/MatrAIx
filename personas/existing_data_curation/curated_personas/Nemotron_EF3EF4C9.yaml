    at Lake Pontchartrain'']'
  career_goals: Stephen hopes to earn his GED within the next year and then pursue a community college program in graphic design or digital media. He dreams of turning his love for visual storytelling into
    a freelance career, creating illustrations for local music venues, designing merchandise for regional festivals, or producing short video documentaries about Louisiana culture. In the longer term, he
    sees himself building an online brand that blends his artistic work with the unique sounds and scenery of his hometown, providing a flexible lifestyle that allows both creative expression and time for
    personal exploration.
