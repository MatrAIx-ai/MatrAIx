personas:
  professional: Stephen Munizzi, a 17‑year‑old aspiring graphic designer, mixes their fast‑learning sketching, DIY GIMP photo editing, and acoustic guitar rhythms to craft hand‑drawn posters, merchandise,
    and short video documentaries for local music venues and festivals, and they tackle deadlines with a relaxed, flexible attitude.
  sports: Stephen Munizzi, a 17‑year‑old who spends summer afternoons swimming in Lake Pontchartrain, joins pickup basketball games at the local community center, supports the New Orleans Saints and Pelicans,
    and they occasionally play in a casual adult softball league for the social vibe.
  arts: Stephen Munizzi, a 17‑year‑old visual enthusiast, fills sketchbooks with pastel‑colored historic homes, captures candid Mardi Gras moments on their phone, strums simple Buckwheat Zydeco melodies
    on an acoustic guitar, devours graphic novels such as 'Saga' and 'Monstress', and they regularly attend the Bayou City Art Fair to browse works by local creators like Kermit Ruffins.
  travel: Stephen Munizzi, a 17‑year‑old with a modest budget, loves spontaneous road trips to the French Quarter for Mardi Gras street bites, day‑camps in Abita Springs for creek fishing, dreams of exploring
    Austin’s South Byrne music scene and the historic cemeteries of New Orleans, and they plan trips on the fly rather than sticking to rigid itineraries.
  culinary: Stephen Munizzi, a 17‑year‑old who enjoys experimenting at family barbecues, blends Southern comfort food with Creole spice by perfecting a smoked jambalaya with Andouille sausage, crafts shrimp
    po’boys and freshly fried beignets, and they proudly claim a kimchi‑infused gumbo has become a neighborhood favorite.
  core: Stephen Munizzi, a 17‑year‑old visual storyteller from the lakeside town, merges casual curiosity with a laid‑back work ethic, channeling sketchbooks, guitar riffs and lake swims into freelance
    art while humorously battling procrastination, occasional budget slips, and teenage acne flare‑ups, and they always keep an eye on the next Mardi Gras festival.
background:
  cultural: Stephen grew up in Mandeville, a small city on the north shore of Lake Pontchartrain in St. Tammany Parish. As a white Louisianan, his family has deep roots in the South, celebrating traditional
    holidays with a blend of Protestant traditions and local community gatherings. The cultural fabric of his hometown, marked by Cajun and Zydeco music, Mardi Gras parades, and a strong fishing heritage,
    has shaped his appreciation for artistic expression and regional cuisine. Even though he does not identify with a specific ethnic minority, Stephen’s daily life is colored by the Southern hospitality,
    relaxed pacing, and the vibrant, multicultural influences that define the Gulf Coast region.
