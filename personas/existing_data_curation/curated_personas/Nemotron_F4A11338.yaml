personas:
  professional: Eddie Dockery, a 17‑year‑old aspiring community‑center coordinator, leverages their knack for rallying peers, basic automotive and handy‑man expertise, and blossoming video‑editing skills
    to organize neighborhood basketball pick‑ups and mentor younger kids, all while embracing a flexible, sometimes disorganized planning style, and they thrive on the buzz of community events.
  sports: Eddie Dockery spends most evenings at the Mount Sterling park shooting hoops with the local ‘Flyers’ pickup crew, ardently follows the Chicago Bulls and Bears, also hits the skate park on weekends,
    and volunteers as a junior coach for the town’s youth basketball league, using their energetic, sociable nature to keep teammates motivated, and they frequently organize post‑game debriefs to boost
    morale.
  arts: Eddie Dockery channels their humor into TikTok skits edited with CapCut and Canva, draws creative inspiration from creators like Zach King and MrBeast, sings gospel hits by Kirk Franklin during
    church youth gatherings, and unwinds to hip‑hop tracks from Drake and Lil Nas X, weaving these influences into their digital storytelling, and they aim to launch a short‑form series that spotlights
    local talent.
  travel: Eddie Dockery has road‑tripped to Chicago’s Navy Pier and the St. Louis Arch, camped at a summer basketball clinic in Florida, and dreams of catching a game at Madison Square Garden in New York
    while saving up for future cross‑country adventures once they finish their trade certification, and they plan to document each trip with a vlog series.
  culinary: Eddie Dockery prefers cooking simple comfort meals like homemade mac and cheese and chicken‑fried steak, experiments with battered catfish tacos using fresh river catch, and loves topping pizza
    with pepperoni and extra cheese, though they often rely on quick microwavable snacks when homework piles up, and they hope to master the perfect catfish fry one day.
  core: Eddie Dockery is a basketball‑obsessed teen who blends community mentorship with TikTok humor, shows a knack for hands‑on fixes, yet frequently procrastinates on planning and splurges on impulse
    buys, and they often rely on friends to keep them on track.
background:
  cultural: Eddie is an African‑American teenager raised in the small, close‑knit town of Mount Sterling, Illinois. His family has deep roots in the region, with generations who have worked in agriculture
    and local trades. The local Black church and community center have been central to his upbringing, offering a space for gospel music, fellowship, and social activism. He draws on the rich oral traditions,
    storytelling, and musical heritage of African‑American culture while also navigating Midwestern values of hard work, self‑reliance, and community solidarity.
attributes:
