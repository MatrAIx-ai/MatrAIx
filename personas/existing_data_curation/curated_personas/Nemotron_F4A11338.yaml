  career_goals: Eddie wants to turn his people‑skills and love of community into a career as a youth mentor or community‑center coordinator. In the short term, he hopes to earn a certification as an automotive
    technician or a construction‑trade apprentice, leveraging his hands‑on abilities while still having time to organize local sports leagues and social events. Ultimately, he envisions launching a neighborhood
    outreach program that blends sports, mentorship, and digital media to empower other teens in rural Illinois.
