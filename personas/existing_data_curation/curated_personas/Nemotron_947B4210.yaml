  hobbies: '[''Herb gardening'', ''Cooking traditional Mexican dishes'', ''Reading historical nonfiction'', ''Hiking in the Sandia Mountains'', ''Mindfulness meditation'', ''Journaling'', ''Model ship building'',
    ''Small-group board game evenings'', ''Volunteering at community health clinic'']'
  career_goals: Raul aims to complete his BSN within the next year, followed by an MSN with a focus on leadership and mental‑health nursing. He aspires to become a charge nurse or unit manager, where he
    can implement evidence‑based protocols that improve patient safety and streamline workflow. He is also motivated to develop a staff‑wellness program that addresses anxiety and burnout, drawing on his
    own experiences with emotional distress. In the longer term, he hopes to become a certified psychiatric‑mental health nurse practitioner to serve the growing Mexican‑American community in Albuquerque,
    offering culturally tailored outpatient care.
