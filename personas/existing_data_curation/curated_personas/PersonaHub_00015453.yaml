persona_description: A microbiologist who is interested in understanding the complex processes that occur within cells and organisms. They are skilled in using various tools and techniques in a microbiology
  lab, including the multi-mode microplate reader, analytical balance, and various types of microscopes. They are also knowledgeable in the use of colony counters, deep freezers, water baths, magnetic stirrers,
  hot plates, Bunsen burners, hot air ovens, laminar air flow/hoods, water distillers, and pH meters. They have a deep understanding of the importance of proper hygiene and safety protocols in microbiology
  labs and are committed to ensuring that their work is conducted in a safe and efficient manner.
