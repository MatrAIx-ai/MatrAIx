    User 1: You should definitely come to Colorado sometime! We have some of the best hiking trails in the country.

    User 2: I will! I''ve heard so much about Colorado. It sounds like a beautiful state.

    User 1: It is! I''m so glad I moved here.

    User 2: What do you do for a living?

    User 1: I sell paper products for a living. It''s not the most exciting job, but it pays the bills.

    User 2: Oh, that''s cool! I''m a nurse. I love my job.

    User 1: I''m sure it''s a lot of work, but it''s important work.

    User 2: It is! I''m glad I can help people.

    User 1: You''re doing great work.

    User 2: Thank you.

    User 1: So, what do you like to do for fun?

    User 2: I like to go out with friends, watch movies, and read books.

    User 1: Sounds like you have a lot of fun hobbies.

    User 2: I do! I try to keep busy.

    User 1: That''s great! I''m sure you''re a lot of fun to be around.

    User 2: Thanks! I like to think so.

    User 1: So, what do you think of Colorado?

    User 2: I love it! It''s so beautiful here.

    User 1: I''m glad you like it.

    User 2: I''m definitely going to come back here again.

    User 1: You should! We''d love to have you.

    User 2: Thanks! I''ll be sure to let you know when I''m in town.'
