  hobbies: '[''Bowling league'', ''Ice‑fishing'', ''Gardening'', ''Volunteering at community food pantry'', ''Live music concerts'', ''DIY home improvement projects'', ''Hiking Chain of Lakes trails'',
    ''Reading historical nonfiction'', ''Cooking new recipes'']'
  career_goals: He aspires to advance to a supervisory or lead role within the postal service, such as Shift Supervisor or Operations Team Lead, where he can guide a team, implement efficiency projects,
    and contribute to strategic planning. He aims to acquire a certificate in supply chain management or logistics, deepen his understanding of digital mail processing, and eventually transition into broader
    logistics coordination within the region. Balancing career advancement with personal well‑being, he seeks roles that allow a stable schedule and reduced stress.
