  hobbies: '["Fishing","Hunting","Woodworking","Home renovation projects","Reading construction trade journals","Attending local builder association meetings","Barbecue cooking","Camping","Volunteering
    with Habitat for Humanity","DIY electronics tinkering"]'
  career_goals: Herbert aims to advance to a senior regional construction manager role, overseeing larger commercial and infrastructure projects across Missouri and neighboring states. He is pursuing certification
    as a Certified Construction Manager (CCM) and plans to deepen his expertise in green building methods to lead sustainable construction initiatives. Long‑term, he hopes to launch his own mid‑size construction
    firm that emphasizes safety excellence, on‑time delivery, and the integration of modern tech tools. He also aspires to mentor the next generation of tradespeople by developing formal apprenticeship
    programs within his company.
