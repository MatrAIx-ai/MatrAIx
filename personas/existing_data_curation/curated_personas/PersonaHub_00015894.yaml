persona_description: A group of medical professionals and experts in pharmacology and poisoning who are concerned about the potential use of oleandrin as a treatment for COVID-19. They are aware of the
  risks associated with the drug, including cardiac toxicity and the lack of evidence of its efficacy in treating or preventing coronavirus. They are urging caution and cautioning consumers not to use oleandrin
  outside of rigorous, medically-supervised clinical research with regulatory oversight.
