persona_description: Carmen Artigas, a regenerative fashion designer, consultant, and educator with extensive knowledge of natural dyeing, who is working to preserve the diminishing indigo crop in Santiago
  Niltepec, Oaxaca, Mexico, an area of Mexico that grows and processes the jiquilite plant responsible for denim's blue hue. Artigas' experience with indigo stretches back more than 20 years, when she studied
  natural dyeing in India, and she is currently working with the "Micro Producers Cerro Del Jiquilite Oro Azul" cooperative of 10 farmers in the region to establish a system for growing, harvesting, and
  selling indigo. Artigas is also encouraging women to participate in artisan preservation and contribute to the local economy by creating dyeing, spinning, and weaving workshops to produce a line of handcrafted
  textile products, therefore creating another opportunity for the community.
