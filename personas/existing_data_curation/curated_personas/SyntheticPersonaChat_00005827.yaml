    User 2: Me too! It''s my favorite place to be.

    User 1: I''m going to have to go to the beach soon. It''s been too long.

    User 2: You should! It''s the perfect time of year to go.

    User 1: Yeah, I know. I''ll see if I can make it happen.

    User 2: You should! You won''t regret it.

    User 1: Okay, I''ll try.

    User 2: Good! I''ll see you there.'
