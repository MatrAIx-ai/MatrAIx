  hobbies: '[''Speculative fiction reading'', ''Abstract watercolor painting'', ''Digital photography'', ''Heirloom gardening'', ''Quilting (competition)'', ''Bridge (card game)'', ''Community theater involvement'',
    ''Genealogy research'', ''Nature walking'', ''Library volunteering'', ''Digital photo archiving'']'
  career_goals: Sarah remains driven to leave a lasting cultural legacy in her community. She aims to complete a memoir chronicling her family's journey through the 20th century and publish a collection
    of poems that explore abstraction and memory. She wishes to lead the Dennis Historical Society's oral‑history project, curate a traveling exhibition of local folk art, and win a regional senior‑citizen
    art competition. Continuing to learn digital storytelling tools, she aspires to mentor aspiring writers and artists, ensuring that the artistic and historical heritage of Labette County is preserved
    for future generations.
