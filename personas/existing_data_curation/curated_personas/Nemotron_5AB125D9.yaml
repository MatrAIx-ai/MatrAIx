personas:
  professional: Sarah Savage, an organized community historian and archivist, channels her vivid imagination and competitive drive into meticulously curated oral-history projects, traveling folk-art exhibitions,
    and dynamic workshops that inspire younger volunteers.
  sports: Sarah Savage enjoys low-impact fitness through daily prairie walks, participates in her senior center's weekly Tai Chi class, holds a membership in the Labette County Walking Club, and avidly
    follows the Kansas City Chiefs, Kansas City Royals, and Kansas State Wildcats, cheering them from her porch while keeping a modest step count.
  arts: Sarah Savage, a passionate abstract watercolorist inspired by Mark Rothko and Helen Frankenthaler, showcases prairie photographs reminiscent of Ansel Adams, delves into speculative fiction by Octavia
    E. Butler and poetry by Sylvia Plath, and finds solace in the minimalist piano works of Philip Glass.
  travel: Sarah Savage, who has trekked the Kansas prairie, journeyed to Dublin to explore familial roots, wandered the canals of Amsterdam, and dreams of strolling the Scottish Highlands, always planning
    itineraries that blend cultural immersion with comfortable lodging.
  culinary: Sarah Savage, whose garden yields heirloom tomatoes, sweet corn, and wildflowers, delights in cooking a rustic heirloom tomato bisque with fresh basil, baking cornbread with honey butter, and
    savoring Kansas-style burnt ends, while occasionally treating herself to a slice of apple-cinnamon crumble.
  core: Sarah Savage is an imaginative, methodical archivist-artist who fuses competitive drive with community spirit, turning every garden, brushstroke, and family story into a lasting legacy.
background:
  cultural: Sarah grew up in a small farming community near Pittsburg, Kansas, during the 1940s and 1950s. Her family, of German and Irish descent, emphasized education, self‑reliance, and communal responsibility.
    The cultural fabric of rural Kansas, with its close‑knit church gatherings, local fairs, and a strong tradition of folk storytelling, shaped her love for community and the arts. She experienced post‑war
    optimism, the civil‑rights era, and the evolving American arts scene, which informed her openness to novelty while staying grounded in Midwestern values. Her lifelong participation in the local historical
    society and library reflects the Midwestern tradition of preserving communal memory and promoting civic engagement.
