personas:
  professional: Shannon Howell, a seasoned medical assistant at a West Monroe community health clinic, leverages a practical curiosity and a kind, cooperative demeanor to excel at vital sign measurement,
    phlebotomy, and EMR management with Epic and NextGen - though their relaxed approach to obligations sometimes leads to misplaced paperwork, they consistently prioritize patient empathy and smooth coordination
    with physicians.
  sports: Shannon Howell stays fit through daily walks along the Ouachita River trail, weekly gentle yoga sessions, and occasional games with the West Monroe community softball league, while they enthusiastically
    cheer on the New Orleans Saints and LSU Tigers during football season.
  arts: Shannon Howell expresses creativity by quilting with a local craft circle, they enjoy live performances by Doctor John and Harry Connick Jr. at the West Monroe Music & Arts Festival, and unwind
    with Agatha Christie mystery novels, all of which reinforce their cooperative, community-focused spirit.
  travel: Shannon Howell prefers modest road-trip adventures, they often plan weekend getaways to New Orleans for its culinary festivals, Austin for live music, and Asheville for art galleries, balancing
    a love of culture with a limited travel budget and a desire for flexible, low-stress itineraries.
  culinary: Shannon Howell cultivates a modest garden of tomatoes, okra, and herbs to enhance their intermediate-level Cajun cooking, they regularly master gumbo, jambalaya, and boudin with andouille sausage,
    cayenne pepper, and the holy trinity, while frequently sharing generous family-style meals at church gatherings.
  core: Shannon Howell blends practical curiosity with a relaxed, slightly disorganized lifestyle, turning garden-grown herbs into bold Cajun feasts, volunteering at the free clinic, and nurturing community
    ties through quilting and festivals, even as they occasionally forget to pay a bill on time.
background:
  cultural: Shannon grew up in West Monroe, a small city in the heart of north‑central Louisiana, where Southern hospitality, community ties, and a blend of Anglo‑American and French‑Creole traditions shape
    daily life. Her family’s cultural practices include attending Baptist services, celebrating holidays with home‑cooked meals, and participating in local festivals like Mardi Gras parades and the Red
    River Revel. The regional emphasis on mutual support and respect for tradition has reinforced her cooperative nature and her desire to help others. Growing up near the Ouachita River and the piney woods,
    she developed an appreciation for outdoor recreation and the simple rhythms of small‑town life, which continue to influence her values, tastes, and worldview.
attributes:
  skills: '[''Patient vital sign assessment'', ''Phlebotomy'', ''Medical office administration'', ''EMR navigation (Epic, NextGen)'', ''Insurance verification and billing support'', ''Appointment scheduling
    and patient flow management'', ''Basic wound care and dressing changes'', ''EKG lead placement'', ''Infection control and sterilization practices'', ''Patient education and health counseling'', ''Team
    communication and conflict resolution'', ''Continuing medical education research'']'
  hobbies: '[''Gardening (vegetables and herbs)'', ''Cajun/Creole cooking'', ''Reading mystery novels and true‑crime biographies'', ''Watching medical documentaries'', ''Volunteering at free clinic'', ''Attending
    West Monroe Music & Arts Festival'', ''Walking the Ouachita River trail'', ''Practicing gentle yoga'', ''Quilting and craft circles'']'
  career_goals: Shannon aims to formalize her expertise by obtaining a Certified Medical Assistant (CMA) credential within the next year. She plans to pursue an associate degree in health sciences to open
    pathways toward a medical office manager role, where she can blend her organizational strengths with her people‑focused approach. Long‑term, she is interested in becoming a patient health educator,
    developing community outreach programs that improve preventive care in the Ouachita Parish area. Flexibility remains a priority, so she prefers part‑time or hybrid schedules that allow her to continue
    volunteering at local health fairs and maintain her personal projects.
