persona_description: A historian who specializes in the study of the First World War, particularly the memories and legacy of the war in Slovakia. She has a deep interest in the history of the Czechoslovak
  Republic and the role of the Czechoslovak Legion in the war. Her research focuses on the perspectives and experiences of ordinary soldiers and civilians during the war, and the ways in which the war was
  remembered and commemorated in Slovakia. She is also interested in the political and social factors that shaped the public memory of the war and its aftermath.
