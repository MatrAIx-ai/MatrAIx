personas:
  professional: A high‑school senior who balances team leadership on the varsity soccer field with a budding passion for healthcare, Tina Stevens uses strong communication skills, first‑aid knowledge, and
    an organized mindset to lead peer tutoring sessions and volunteer at the local animal shelter; they envision a future as a registered nurse or community health educator.
  sports: An energetic athlete who splits time between varsity soccer, cheerleading, and weekend runs, Tina Stevens roots for the Dallas Cowboys and Houston Astros, trains with the local youth soccer club,
    and balances rigorous conditioning with yoga sessions to stay flexible and injury‑free.
  arts: An expressive creative who dazzles the school choir with harmonies, captures sunset vistas of the Hill Country in a Canon EOS, and curates movie nights featuring films like Lady Bird and The Princess
    Bride, Tina Stevens draws inspiration from artists such as Beyoncé, photographer Ansel Adams, and author John Green, weaving these influences into their own storytelling.
  travel: An adventurous traveler who enjoys family camping trips in the Texas Hill Country and scouting hikes, Tina Stevens dreams of road‑tripping to Big Bend National Park and the Grand Canyon, and imagines
    a future backpacking adventure through New Orleans and Austin’s music scene, preferring a blend of carefully planned itineraries and spontaneous detours.
  culinary: A culinary enthusiast who whips up Southern classics like pecan pie, peach cobbler, and banana pudding for community potlucks, Tina Stevens balances precise measurements of cinnamon and vanilla
    with a habit of leaving the kitchen a bit of a mess, and often experiments with adding local Texas honey to their baked treats.
  core: Tina Stevens, a sociable and compassionate 16‑year‑old who blends athletic vigor, creative flair, and a practical drive toward nursing, navigates teen life with organized spontaneity, occasional
    procrastination, and a habit of turning community events into mini‑festivals, they keep their circle energized and their goals in clear view.
background:
  cultural: Tina grew up in Eastland, a small, close-knit town in West Texas where family and community ties run deep. As a White Texan, she was raised with Southern hospitality, a strong sense of local
    pride, and traditions such as Friday night high school football, church youth groups, and community barbecues. Her family's involvement in local agriculture and her participation in church activities
    have reinforced values of cooperation, humility, and service, shaping her compassionate outlook.
attributes:
  skills: '[''Interpersonal communication'', ''Team collaboration'', ''Basic first aid'', ''Event planning'', ''Digital literacy'', ''Public speaking'', ''Conflict mediation'', ''Adaptability'']'
  hobbies: '[''Soccer'', ''Cheerleading'', ''School choir'', ''Event organizing'', ''Animal shelter volunteering'', ''Photography'', ''Baking'', ''Reading YA novels'', ''Camping'']'
  career_goals: Tina aims to graduate high school with honors and earn a scholarship to study nursing or public health at a Texas university. She envisions a career as a registered nurse or community health
    educator, working in Eastland County to improve access to healthcare for rural families. In the longer term she also hopes to mentor younger students, perhaps as a health teacher, blending her love
    for helping others with her practical mindset.
