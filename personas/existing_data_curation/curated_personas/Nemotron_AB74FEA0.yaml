  hobbies: '[''Volunteering at community events (county fair, church functions)'', ''Baking and cooking for friends'', ''Recreational softball league'', ''Attending live music and karaoke nights'', ''Photography
    on local hikes'', ''Reading contemporary fiction and self‑help books'', ''Weekly yoga or mindfulness classes'', ''DIY crafts and home décor projects'']'
  career_goals: Sue aims to enroll in a community college to pursue an associate's degree in human services or community health, with the long‑term goal of becoming a community outreach coordinator for
    a local nonprofit. She wishes to leverage her passion for organizing events and supporting others to develop programs that address youth mental‑health awareness and foster community cohesion. In the
    short term, she plans to obtain a Certified Nursing Assistant (CNA) certification to gain hands‑on caregiving experience and secure a stable income. Ultimately, Sue envisions a leadership role—such
    as a program director at a regional community center—where she can design and manage initiatives that strengthen small‑town networks and promote well‑being.
