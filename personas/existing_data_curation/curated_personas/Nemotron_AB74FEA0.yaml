personas:
  professional: Sue Rogers, a 21‑year‑old aspiring community‑outreach coordinator, blends their natural knack for interpersonal communication, meticulous event‑planning, and pragmatic budgeting with a curiosity‑driven
    yet reliable work style to design youth mental‑health workshops and volunteer programs that reinforce small‑town cohesion.
  sports: Sue Rogers plays on the West Frankfort co‑ed softball league each spring, hikes the Rend Lake trail system in the fall, maintains a casual gym routine through a budgeted local fitness center,
    and passionately supports the Chicago Cubs and St. Louis Cardinals, blending community spirit with a practical approach to staying active.
  arts: Sue Rogers frequently sings karaoke to Taylor Swift and John Prine classics, attends live folk‑rock shows at the Franklin County Community Hall, devours contemporary novels by Sally Rooney and Celeste Ng,
    and draws creative inspiration from Greta Gerwig’s films, infusing these artistic passions into their community event designs.
  travel: Sue Rogers favors low‑budget weekend road trips to nearby attractions like the Shawnee National Forest and Chicago’s museum district, dreams of a spring escape to Asheville’s Blue Ridge Parkway
    and a summer music‑filled adventure in New Orleans, plans itineraries using discount bus passes and shared‑rental cars, and balances wanderlust with a modest student‑budget.
  culinary: Sue Rogers, an enthusiastic home baker, loves crafting classic chocolate‑chip cookies, skillet‑fried Rend Lake trout, and spicy Cajun jambalaya seasoned with fresh rosemary, smoked paprika,
    and local honey, sharing these dishes at church potlucks and friends’ gatherings while polishing their presentation skills with Canva‑styled recipe cards.
  core: Sue Rogers, the friendly small‑town organizer with a penchant for late‑night karaoke, cookie‑laden generosity, and a lingering worry about the future, blends curiosity and practicality into a community‑first
    outlook.
background:
  cultural: Sue was raised in West Frankfort, a close‑knit town in Southern Illinois where Midwestern values of hospitality, hard work, and community involvement are deeply embedded. Her family’s roots
    lie in the region’s working‑class heritage, with generations who worked in local mining and manufacturing industries. The town’s social life revolves around high school sports, church gatherings, and
    seasonal events like the Franklin County Fair, all of which have shaped her sense of belonging and cooperation. While identifying as white, Sue’s upbringing reflects a blend of Appalachian cultural
    influences, modest religious traditions, and a strong emphasis on mutual support among neighbors. These cultural threads foster her collaborative spirit and her desire to contribute positively to the
    community.
