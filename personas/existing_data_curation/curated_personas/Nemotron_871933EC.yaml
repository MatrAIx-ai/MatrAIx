  career_goals: Steven intends to earn his GED within the next year and then enroll in a vocational training program, such as a certification in carpentry or HVAC technology, that blends his hands‑on curiosity
    with a reliable career path. In the medium term, he hopes to work as a journeyman handyman, eventually starting his own small‑scale repair business that emphasizes honest service and community trust.
    Parallel to his technical ambitions, he has a growing interest in mental‑health advocacy, hoping to become a peer support volunteer after completing a certification in mental‑health first aid, allowing
    him to use his kindness and empathy to help peers who experience anxiety or distress. His long‑term ambition is to achieve a stable, respected role that lets him contribute practically to his neighborhood
    while also providing emotional support to those in need.
