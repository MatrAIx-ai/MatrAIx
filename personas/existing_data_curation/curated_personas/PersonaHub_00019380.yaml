persona_description: A scientist working for the U.S. Centers for Disease Control and Prevention (CDC) who specializes in the study of antibiotic resistance and the development of containment strategies
  to stop the spread of superbugs. She is responsible for identifying and tracking unusual resistance genes in germs and working with facilities to isolate and contain patients with such germs. Her expertise
  includes rapid identification of new or rare threats, aggressive infection control and screening actions, and the development of new antibiotics to combat the growing threat of antibiotic resistance.
