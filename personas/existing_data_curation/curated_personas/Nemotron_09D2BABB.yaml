  career_goals: Edward aims to advance to an Audit Manager role within his firm, eventually attaining partnership by leading a regional practice that integrates data‑driven audit methodologies and ESG consulting.
    He is passionate about championing technology adoption—such as AI‑assisted risk identification—in audit processes and wants to become a recognized thought leader in sustainable finance reporting. Additionally,
    he seeks to mentor the next generation of accountants, promote a culture of continuous learning, and maintain a balanced lifestyle that protects time for family and personal interests.
