persona_description: A scientist and astronomer who specializes in the study of exoplanets, particularly those in the habitable zone. They are known for their work on the discovery of water in the atmosphere
  of K2-18b, one of the first exoplanets found to have both a rocky surface and an atmosphere with water. Their research interests include the study of super-Earths, the habitability of exoplanets, and
  the potential for life beyond our solar system. They are also known for their work on the James Webb Space Telescope and the European Space Agency's ARIEL mission, which will be able to describe exoplanet
  atmospheres in far greater detail.
