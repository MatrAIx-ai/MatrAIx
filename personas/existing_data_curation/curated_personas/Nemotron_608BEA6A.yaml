personas:
  professional: Andy Custodio, a 43‑year‑old commercial pilot with a Commercial Pilot License and extensive flight‑engineering knowledge, merges their curiosity for unconventional solutions with a relaxed,
    flexible work style to excel at aircraft system troubleshooting, crew resource management, and mentoring through aerial‑photography workshops, all while charting a path toward senior captaincy and eventual
    flight‑operations leadership.
  sports: Andy Custodio, an energetic 43‑year‑old, regularly joins spontaneous beach volleyball matches at Long Beach, follows the Los Angeles Lakers and LA Galaxy with fervor, participates in weekend coastal
    cycling rides, and enjoys occasional paddle‑boarding when time allows.
  arts: Andy Custodio immerses themselves in the world of modern mural art by Diego Rivera and David Alfaro Siqueiros, frequents LACMA and the Getty for fresh inspiration, paints vibrant coastal landscapes
    in spare moments, and loses themselves at live jazz gigs featuring Esperanza Spalding and Latin concerts headlined by Juan Luis Guerra, letting these experiences shape their aerial‑photography aesthetic.
  travel: Andy Custodio prefers flexible, adventure‑driven travel that aligns with aerial‑photography opportunities, having recently chartered a small plane to capture Iceland’s waterfalls and explored
    the rugged cliffs of Big Sur, while dreaming of sunrise shoots over Patagonia’s glaciers and sunrise over the Maldives’ overwater bungalows.
  culinary: Andy Custodio enjoys crafting Mexican‑California fusion dishes like fish tacos with mango‑avocado salsa, roasted corn elote topped with chipotle mayo, and mole poblano enriched with fresh cilantro
    and a hint of citrus, displaying an intermediate cooking skill set and a penchant for experimenting with locally sourced avocados, lime, and grilled corn.
  core: Andy Custodio, a curious, art‑driven pilot, blends aerial photography with community mentorship, navigates life with relaxed flexibility, champions sustainable aviation, and savors Mexican‑Californian
    cuisine while occasionally letting disorganization sneak into budgeting and health routine.
background:
  cultural: Andy is the son of Mexican immigrants who settled in Long Beach, giving him a bicultural upbringing that blends Mexican traditions with Southern California's diverse influences. He grew up bilingual,
    celebrating Día de los Muertos, Mexican Independence Day, and family gatherings centered around homemade tamales and pozole. At the same time, he embraces the West Coast lifestyle—surf culture, outdoor
    activities, and a vibrant arts scene. This dual heritage informs his appreciation for Mexican muralism, folk music, and contemporary art, and fuels his commitment to community outreach within the Mexican‑American
    community.
attributes:
  skills: '[''Commercial Pilot License (CPL)'', ''Multi-Engine Rating'', ''Instrument Rating'', ''Aircraft Systems Engineering'', ''Flight Planning & Navigation'', ''Crew Resource Management (CRM)'', ''Aviation
    Safety & Risk Management'', ''FAA Regulations & Compliance'', ''Emergency Procedures & Survival Training'', ''Aerial Photography'', ''Public Speaking & Group Facilitation'']'
  hobbies: '[''Aerial photography'', ''Landscape painting'', ''Visiting art galleries and museums'', ''Live jazz and Latin music concerts'', ''Beach volleyball'', ''STEM mentorship for youth'', ''Cooking
    Mexican cuisine'', ''Traveling on personal flights'', ''Sci‑fi movies and literature'', ''Learning about sustainable aviation technologies'']'
  career_goals: Andy aims to become a senior captain with a major airline and eventually transition into a chief pilot or flight‑operations manager role where he can shape safety culture and integrate emerging
    sustainable technologies. He also wants to launch a pilot‑artist collective that offers mentorship, aerial‑photography exhibitions, and community outreach for under‑represented youth. In the longer
    term, he plans to earn an aviation‑management degree and contribute to the development of electric or hybrid aircraft, blending his love of flight with innovative, environmentally‑focused solutions.
