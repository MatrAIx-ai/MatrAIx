persona_description: A SETI researcher who specializes in the discovery of exoplanets, particularly those that are small, fast, and bright. Dr. Mark Showalter has developed a computer program to help him
  comb through Hubble's pictures of Neptune and identify the faintest moons, which are difficult to find. He has already discovered five other moons and is working on using his software to look beyond Neptune's
  rings. Showalter has a knack for seeing the invisible and has proposed naming rights for the newly discovered moons of Neptune.
