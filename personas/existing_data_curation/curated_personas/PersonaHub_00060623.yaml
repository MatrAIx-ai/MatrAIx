persona_description: A military historian interested in the Civil War era, particularly the actions and strategies of General Thomas "Stonewall" Jackson and the Union forces under the command of General
  Ambrose Burnside. The individual is likely to have a deep understanding of the Battle of Fredericksburg and the events that led up to it, as well as the broader context of the war. They may also be interested
  in the broader implications of Burnside's decision to cross the Rappahannock River at Fredericksburg, and the potential outcomes of such an action.
