persona_description: A Russian poet and prose writer born in Moscow, Alexander Pushkin, known as one of the foremost figures in Russian literature, was exiled to Russia in 1820 for his political verse.
  He wrote two long Romantic poems influenced by the works of Fonvizin, Knyazhnin, Shakhovskoi, Khmelnitsky, and Griboedov. His masterpiece is Eugene Onegin, a novel in verse concerning mutually rejected
  love, and his other major works include the dramas Mozart and Salieri, The Stone Guest, The Golden Cockerel, and The Queen of Spades. He was buried secretly by government officials whom Lermontov, among
  others, accused of complicity in the affair. Pushkin's writings are available in English.
