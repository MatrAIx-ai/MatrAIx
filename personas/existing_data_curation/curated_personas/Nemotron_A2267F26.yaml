personas:
  professional: Sonia Perez, a 62‑year‑old community‑oriented culinary enthusiast, leverages decades of home‑cooking mastery, bilingual communication, and a natural flair for organizing neighborhood potlucks
    to launch a modest home‑based catering service, all while embracing a laid‑back, flexible approach that sometimes leads to disorganized schedules.
  sports: Sonia Perez enjoys low‑impact activity such as strolling through the North Hollywood arts district, walking with a senior club that meets at the local park, and cheering on the Los Angeles Dodgers
    and LA Galaxy during weekend games, while steering clear of strenuous organized sports.
  arts: Sonia Perez finds inspiration in classic cinema and folk music, regularly attends screenings of golden‑age films at the community center, listens to ranchera on a vintage record player, admires
    the murals of Diego Rivera, and expresses creativity through quilts that echo traditional patterns.
  travel: Sonia Perez dreams of returning to their hometown in Mexico to document family food stories, occasionally takes road trips to historic towns like San Juan Capistrano, prefers relaxed itineraries
    with ample time for cooking demos and garden tours, and balances travel plans with caregiving responsibilities.
  culinary: Sonia Perez excels at hand‑making tamales, simmering rich mole, and crafting fresh salsa from cilantro, tomatillos, and chilies grown in their garden, enjoys the aroma of chilies bubbling on
    the stove, and sometimes over‑salts a sauce because they prioritize storytelling over precise measurements.
  core: Sonia Perez blends a love of traditional cooking, quiet garden mornings, and friendly neighborhood gatherings with a relaxed, occasionally scatter‑brained approach, turning their cultural heritage
    into a modest catering dream while cherishing solitude and small‑group comforts.
background:
  cultural: Sonia was born in a small town in the state of Jalisco, Mexico, and moved to Los Angeles in her twenties. She carries the traditions of Mexican family life, Catholic celebrations, and regional
    culinary customs. Her daily life blends Mexican cultural practices—such as preparing communal meals, observing Día de los Muertos, and speaking Spanish at home—with the diverse influences of North Hollywood’s
    multicultural environment. She maintains strong ties to the Mexican-American community through her church, local fiestas, and by sharing her cultural heritage with younger generations.
attributes:
  skills: '["Authentic Mexican cuisine (tamales, mole, salsas)", "Bilingual Spanish-English communication", "Home budgeting & household management", "Childcare and elder caregiving", "Quilting and crochet
    textile crafts", "Small-scale gardening (herbs, vegetables)", "Informal community event coordination"]'
  hobbies: '["Cooking Mexican dishes", "Gardening herbs and vegetables", "Quilting and crochet", "Listening to mariachi and ranchera music", "Watching classic Mexican cinema and telenovelas", "Participating
    in small community gatherings", "Volunteering at her local church"]'
  career_goals: Although she is not formally employed, Sonia hopes to turn her culinary passion into a modest home-based catering service for local family celebrations and cultural festivals. She dreams
    of compiling a handwritten family cookbook to preserve her mother’s recipes for future generations and plans to teach her grandchildren these cooking traditions. Additionally, she would like to volunteer
    as a Spanish-language tutor at a neighborhood community center, helping immigrant children improve their school readiness. A personal ambition is to travel back to her hometown in Mexico and document
    the food stories of her extended family.
