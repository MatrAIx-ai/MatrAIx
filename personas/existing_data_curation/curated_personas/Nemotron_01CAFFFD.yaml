  career_goals: Maria aims to open a family‑owned restaurant in Paterson that showcases authentic Dominican cuisine with a modern twist, creating a hub for the local Latino community and food enthusiasts.
    She plans to earn a formal culinary degree or advanced certification to deepen her technical knowledge and eventually write a cookbook that highlights Caribbean‑American fusion recipes. Additionally,
    she envisions establishing a weekend cooking school to mentor aspiring chefs, especially women from underrepresented backgrounds, and expanding into catering for cultural events and corporate functions.
