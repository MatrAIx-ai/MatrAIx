personas:
  professional: Vikram Santoso, an aspiring mechanical engineer and hobbyist designer, channels a love for routine and precision into building LEGO Technic and scale aircraft models, applying strategic
    thinking honed from chess to prototype concepts while reliably meeting self‑set milestones.
  sports: Vikram Santoso, a dedicated member of the Riverside Aquatics Club, swims twice weekly to balance the calm of water with structured training, cheers for Manchester United in football and the Los
    Angeles Lakers in basketball, and prefers solo cardio routines over team sports, reflecting a preference for predictable, self‑directed fitness.
  arts: Vikram Santoso, an acoustic‑guitar enthusiast, practices daily songs by John Mayer and Ed Sheeran, admires the melodic storytelling of The Beatles, and escapes into documentaries on engineering
    pioneers, letting music and visual arts shape a disciplined yet imaginative leisure routine.
  travel: Vikram Santoso, who favors meticulously planned itineraries, dreams of touring engineering landmarks like the Burj Khalifa in Dubai and the Great Wall of China, has already visited the local science
    museum and National History Museum, and prefers short, structured trips over spontaneous backpacking.
  culinary: Vikram Santoso, an adept home‑chef, enjoys preparing aromatic biryani with cumin, turmeric, and cardamom, alongside mastering the precise technique of a classic spaghetti carbonara, balancing
    measured spice ratios with a love for traditional family recipes.
  core: Vikram Santoso, a methodical teen whose world revolves around structured model building, strategic games, and disciplined guitar practice, navigates life with quiet confidence, occasional spontaneous
    splurges, and a steadfast commitment to routine.
background:
  cultural: Vikram comes from a South‑Asian family that traces its roots to India and Indonesia, and his household blends cultural practices from both heritages. At home, his parents speak English, Hindi,
    and some Indonesian, and they celebrate festivals such as Diwali, Eid, and local Indonesian cultural events. Family meals often feature dishes like biryani, samosa, and nasi goreng, which he helps prepare.
    The family places a high value on education, routine, and respect for elders, reflecting traditional South‑Asian values while adapting to life in Norwalk, California, where he participates in community
    programs at the nearby Hindu temple and multicultural youth clubs.
attributes:
  skills: '[''Organizational and time-management'', ''Basic Python programming'', ''Arduino circuit prototyping'', ''Model kit construction'', ''Cooking traditional South-Asian dishes'', ''Digital productivity
