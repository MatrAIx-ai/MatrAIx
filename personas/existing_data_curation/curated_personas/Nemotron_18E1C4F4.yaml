  hobbies: '[''Building model kits'', ''Playing chess'', ''Strategic video gaming'', ''Playing acoustic guitar'', ''Reading non-fiction engineering books'', ''Cooking traditional South-Asian meals'']'
  career_goals: Vikram aims to graduate high school with a solid foundation in STEM subjects and earn a scholarship to study civil engineering or robotics at a university. He is driven by a desire to apply
    his practical problem‑solving skills to design infrastructure that benefits his community and to work on automated systems that streamline everyday tasks. In the longer term, he hopes to support his
    family financially, possibly by establishing a small technology‑repair or consulting business that combines his technical knowledge with his dependable work ethic.
