personas:
  professional: Janice Harlee, a veteran critical-care nurse with three decades of experience, combines her STEM-based data-analysis expertise and fluency in Epic and Cerner with a methodical, competitively-driven
    mindset, scrutinizing protocols through a skeptical lens as they chart a path toward a nurse manager or clinical director position.
  sports: Janice Harlee, a steadfast supporter of the Chicago Bulls and Chicago White Sox, channels her competitive edge into a disciplined weekly routine of yoga at a downtown studio, brisk morning walks
    with the local senior walking club, and seasonal pickup soccer games at the community park, treating fitness as a structured yet enjoyable complement to her demanding nursing schedule.
  arts: Janice Harlee, who regularly debates Philippa Gregory's historical novels and Maya Angelou's biographies at her book club, finds solace in knitting intricate Lion Brand yarn patterns while attending
    live blues sets by Buddy Guy and soulful jazz evenings featuring Norah Jones, allowing the city's rich musical heritage to color her creative evenings.
  travel: Janice Harlee, who meticulously plans weekend getaways, has savored the flavors of New Orleans' jazz scene and the serenity of Kyoto's temple gardens, while daydreaming about strolling through
    England's Kew Gardens and exploring Charleston's historic districts, always balancing travel budgets and family responsibilities with a structured itinerary.
  culinary: Janice Harlee, a confident home cook, transforms garden-fresh basil, thyme, and rosemary into fragrant pesto pasta and herb-infused roasted chicken, regularly prepares hearty ratatouille and
    quinoa-kale bowls for her family, yet they occasionally surrender to convenience by ordering a slice of deep-dish pizza after a taxing shift.
  core: Janice Harlee blends a nurse's precision with a gardener's patience, balancing meticulous patient care and herb cultivation while their competitive streak sometimes pushes them to over-schedule
    every facet of life.
background:
  cultural: Janice is an African American woman who grew up in Chicago’s South Side, a community that shaped her values of education, faith, and service. She maintains strong ties to her local Black church
    and participates in cultural events such as Juneteenth celebrations. Her heritage informs her commitment to culturally responsive care and activism around health disparities affecting the African American
    community. Janice’s culinary roots include traditional soul food, which she adapts into healthier meals, and she embraces the city’s rich history of blues and jazz as part of her personal identity.
