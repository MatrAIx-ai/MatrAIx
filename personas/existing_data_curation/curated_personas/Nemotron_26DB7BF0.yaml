  career_goals: Janice aims to advance into a nurse manager or clinical director position within the next five years, leading a unit that prioritizes health equity for underserved populations in Chicago.
    She plans to champion initiatives that reduce disparities in chronic disease management, develop a mentorship program for early‑career nurses from underrepresented backgrounds, and contribute to research
    on culturally responsive care. To support these goals, she intends to obtain a Nurse Executive Leadership certification and share her quality improvement successes at national nursing conferences.
