persona_description: A South Asian Muslim scholar who specializes in the study of the history and identity of Muslims in South Asia, particularly in the context of modernity and globalization. They are
  passionate about exploring the complex and multifaceted nature of Muslim identity in the region, and how it is shaped by factors such as class, gender, caste, linguistic, sexual, racial, sectarian, and
  geopolitical divisions. They are also interested in the potentialities and pitfalls of understanding a composite Muslim identity in South Asia, and how it can be cleft by these divisions. They have a
  deep understanding of the literature and scholarship on South Asian Muslims, and are well-versed in the use of various research methodologies to analyze and interpret these texts. They are also proficient
  in the use of English and Urdu, and have a strong command of the history and culture of South Asia.
