personas:
  professional: Sharon Qadri is a 23‑year‑old freelance visual storyteller who blends watercolor and digital illustration, leveraging their quick improvisational flair to turn abstract ideas into interactive
    experiences, though they often wrestle with meeting deadlines due to a love of spontaneity.
  sports: Sharon Qadri hikes Appalachian trails whenever possible, joins a Denver‑based rock‑climbing gym, and follows the Colorado Avalanche and Denver Broncos, injecting spontaneity into workouts by swapping
    yoga for impromptu parkour drills on weekend hikes.
  arts: Sharon Qadri paints watercolor scenes inspired by the surreal worlds of Hayao Miyazaki and the gritty street art of Banksy, performs improv at a local theater troupe, and seeks out live shows by
    Tame Impala and The Strokes, channeling these influences into their own experimental digital illustrations.
  travel: Sharon Qadri prefers last‑minute road trips, often packing a sketchbook and camera for spontaneous stops in places like Asheville, Portland, and the vibrant markets of Marrakech, balancing a modest
    budget with an insatiable curiosity for creative cultures.
  culinary: Sharon Qadri cooks moderately, favoring fresh, colorful dishes like avocado toast topped with radish and cilantro, whipping up a quick miso ramen with shiitake mushrooms and lime, and enjoys
    discovering new flavors at food festivals, though they sometimes order takeout to save time for art projects.
  core: Sharon Qadri is a 23‑year‑old kinetic creator who chases novelty, turning impulsive ideas into vibrant art while juggling a chaotic schedule, a habit of splurging on experiences, and a relentless
    skepticism toward conventional constraints.
background:
  cultural: Sharon is a white American raised in the rural community of Denver, North Carolina, within Lincoln County. Her upbringing was steeped in Appalachian cultural traditions, including storytelling,
    folk music, and a strong sense of neighborly support, while also reflecting the broader Southern values of hospitality and independence. Exposure to college life and the internet expanded her worldview,
    allowing her to blend regional heritage with contemporary artistic influences. This hybrid background informs her appreciation for both local craftsmanship and global, avant‑garde art movements.
