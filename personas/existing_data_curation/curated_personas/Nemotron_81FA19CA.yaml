  career_goals: Sharon aims to build a freelance career that blends visual art and interactive experiences. Over the next few years she plans to launch an online platform where she creates and sells original
    digital prints, animated shorts, and immersive workshops that encourage participants to explore abstract concepts through art. She also hopes to collaborate with local venues to curate pop‑up exhibitions
    and eventually transition into a creative director role for a boutique marketing agency that values unconventional, narrative‑driven campaigns. Her long‑term ambition is to establish a community art
    hub in the Denver area that serves as a laboratory for experimental projects and spontaneous collaborations.
