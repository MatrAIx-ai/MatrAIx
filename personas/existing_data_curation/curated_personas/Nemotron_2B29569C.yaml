personas:
  professional: An organized computer support specialist named Tyjaun Morgan leverages meticulous troubleshooting, automation scripting, and empathetic communication to resolve Windows, macOS, and Linux
    incidents while proactively mentoring junior staff, reflecting a blend of curiosity for emerging tech and disciplined efficiency.
  sports: Tyjaun Morgan plays pickup basketball at a Loudoun County community gym, follows the Washington Wizards and DC United for professional inspiration, and hits the trails of Shenandoah Valley for
    weekend hikes, balancing competitive drive with a disciplined fitness routine.
  arts: Tyjaun Morgan curates an eclectic music library featuring Kendrick Lamar, Miles Davis, and H.E.R., attends occasional live jazz sets at The Birchmere, and enjoys streaming indie films, allowing
    the rhythm and storytelling to inform their creative problem‑solving approach.
  travel: Tyjaun Morgan prefers meticulously planned weekend getaways to historic East Coast cities like Charleston and Philadelphia, while dreaming of a tech‑focused pilgrimage to Berlin and a culinary
    trek through Morocco, always budgeting travel expenses through a dedicated savings account.
  culinary: Tyjaun Morgan mixes a love for soulful Southern comfort food and African flavors, regularly preparing dishes such as shrimp and grits, jollof rice with smoked turkey, and sweet potato pie for
    friends, showcasing a confident intermediate cooking skill and a penchant for experimenting with spice blends.
  core: Tyjaun Morgan is a disciplined tech enthusiast who combats stress with structured routines, meticulous budgeting, and a blend of gaming, basketball, and soulful cooking, all while navigating chronic
    anxiety through meditation and community mentorship.
background:
  cultural: Tyjaun grew up in the diverse Washington, D.C., metropolitan area as part of an African‑American family that placed a high value on education and community involvement. His parents, both college‑educated
    professionals, encouraged his early interest in science and technology while instilling a strong sense of cultural pride. He regularly attended church events and community festivals that celebrated
    black heritage, music, and cuisine, fostering an appreciation for the rich traditions of the African diaspora. In Ashburn, he connects with a growing black professional network, participates in local
    cultural gatherings, and mentors younger Black students aspiring to enter STEM fields. This blend of cultural roots, community focus, and professional ambition shapes his worldview and informs his collaborative
    yet assertive approach at work.
attributes:
  skills: '[''Hardware troubleshooting'', ''Software troubleshooting (Windows, macOS, Linux)'', ''Network configuration and troubleshooting (TCP/IP, DNS, DHCP, VPN)'', ''Virtualization (VMware, Hyper‑V)'',
    ''Automation scripting (PowerShell, Bash, Python)'', ''IT service management (ITIL) using ServiceNow and JIRA'', ''Endpoint security and cybersecurity fundamentals'', ''Cloud services basics (AWS, Azure)'',
    ''Data backup and recovery'', ''Hardware repair and assembly'', ''Clear technical communication'', ''Customer service and empathy'', ''Mentoring and training junior staff'', ''Process documentation
    and SLA compliance'']'
  hobbies: '[''Custom PC building'', ''Open‑source software projects'', ''Strategy and simulation gaming'', ''Pickup basketball'', ''Listening to hip‑hop, jazz, and R&B'', ''Cooking Southern and African‑inspired
    meals'', ''Meditation and journaling'', ''Hiking in Shenandoah Valley'', ''Volunteering as a coding mentor for youth'']'
  career_goals: Tyjaun aims to advance from a frontline support role to a senior system administrator or network engineer within the next three years, pursuing certifications such as CompTIA Network+, Security+,
    Cisco CCNA, and Microsoft Azure Administrator to validate his expertise. He aspires to lead a support team, using his organizational strengths to design efficient ticket‑handling workflows that reduce
    resolution times. Long‑term, Tyjaun envisions a transition into IT management, eventually becoming an IT manager or director where he can influence strategic technology decisions and champion diversity
    initiatives. He also hopes to leverage his curiosity for emerging technologies by integrating AI‑driven automation into support processes, while maintaining a healthy work‑life balance to manage stress
    and support his personal well‑being.
