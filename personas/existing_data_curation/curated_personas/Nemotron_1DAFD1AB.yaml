personas:
  professional: Jean Harris, a 31‑year‑old aspiring professional administrative assistant, is preparing to re‑enter the workforce in a part‑time office role where they can apply their meticulous scheduling,
    budgeting, and community‑event coordination skills while cherishing the predictable routine and small‑group interaction they enjoy at a local nonprofit.
  sports: Jean Harris enjoys a steady walking routine through Forest Hills Gardens, occasionally joins the Queens Community Center’s Sunday pickleball league and watches the New York Knicks on weekends,
    preferring low‑impact activity and small‑team camaraderie over high‑intensity sports.
  arts: Jean Harris spends evenings knitting scarves while listening to folk singer Joan Baez, reads Agatha Christie mystery novels and Hilary Mantel historical fiction, and attends occasional performances
    by the local community theater troupe, finding comfort in familiar narratives and gentle creativity.
  travel: Jean Harris favors short, well‑planned weekend trips to nearby historic towns like Sleepy Hollow and coastal getaways such as Montauk, where they can tend a small herb garden at a cottage and
    explore local bakeries, while dreaming of a future culinary tour of Italy’s Tuscany region.
  culinary: Jean Harris delights in baking their family’s classic lemon pound cake, slow‑roasting herb‑infused chicken, and preparing fresh ratatouille from their balcony garden, yet admits to over‑salting
    dishes when distracted by a crossword puzzle.
  core: Jean Harris is a routine‑oriented, community‑focused organizer with a love for gardening, knitting, and wholesome home‑cooked meals, who balances practical budgeting with occasional culinary splurges
    while maintaining emotional steadiness and a reserved social style.
background:
  cultural: Jean Michelle was born and raised in Queens, New York, to a second‑generation Irish‑American family that emphasized hard work, modesty, and strong family ties. Her parents ran a local convenience
    store, where she learned the value of routine, practical problem‑solving, and community service from an early age. She attended a public high school in Queens and grew up attending a nearby Catholic
    parish, which fostered a sense of tradition, cooperation, and respect for harmony within the community. The cultural fabric of Queens—its blend of long‑standing immigrant neighborhoods and close‑knit
    local institutions—has shaped her appreciation for stability, modest social gatherings, and a practical, down‑to‑earth worldview.
