  career_goals: Jean Michelle aims to re‑enter the workforce in a role that offers a stable, predictable schedule and allows her to apply her strong organizational and interpersonal skills. She plans to
    obtain a certification as a Professional Administrative Assistant within the next year, which will qualify her for part‑time office positions in local businesses or non‑profit agencies. Her long‑term
    ambition is to become a volunteer coordinator at a community center, where she can design and manage regular programs that foster harmony and support for families. She also envisions eventually launching
    a modest home‑based catering service focused on wholesome, family‑style meals, using her culinary expertise to supplement the family income while maintaining the routine she values.
