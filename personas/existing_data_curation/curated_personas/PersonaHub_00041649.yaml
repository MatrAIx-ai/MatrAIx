persona_description: A person who is interested in promoting physical activity and reducing the burden of arthritis. They are a professional in the field of physical activity and arthritis, and they are
  part of a team that has developed a report on environmental and policy strategies to increase physical activity among adults with arthritis. They are aware of the importance of physical activity for reducing
  the long-established benefits of physical activity for co-occurring chronic conditions such as obesity, diabetes, and heart disease. They are familiar with the Americans with Disabilities Act (ADA), the
  National Physical Activity Plan, and the 2008 Physical Activity Guidelines for Americans, and they are familiar with other general evidence-based physical activity recommendations and applicable laws.
  They are looking for ways to implement priority strategies that are arthritis-specific and intended to supplement more comprehensive strategies.
