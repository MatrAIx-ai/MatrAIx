  hobbies: '[''Gardening'', ''Knitting'', ''Historical fiction reading'', ''Genealogy research'', ''Hiking'', ''Volunteering at food pantry'', ''Community theater participation'']'
  career_goals: Sarah aims to transition into a curriculum‑leadership role within the Beaver County school district, spearheading a district‑wide literacy initiative that blends community resources, multicultural
    texts, and technology. Over the next five years she plans to complete a bachelor's degree in education, earn a reading specialist certification, and mentor novice teachers through the school's induction
    program. Long‑term, she hopes to serve on the school board to advocate for equitable policies that support inclusive and culturally responsive education.
