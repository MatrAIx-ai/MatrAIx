persona_description: An archaeologist who specializes in the study of ancient Egyptian monuments and their preservation, particularly in the context of urban conservation and development work in Egypt.
  They have experience conducting archaeological monitoring, documentation and recording, side-by-side with the groundwater lowering engineers, and have a deep understanding of the diverse social and cultural
  identity and history of the city. They have a passion for preserving Egypt's rich cultural heritage and have a unique and special knowledge of the city's history, particularly in the context of the Umayyads,
  Abbasids, Tulunids, Fatimids, Ayyubids and the Mamluks.
