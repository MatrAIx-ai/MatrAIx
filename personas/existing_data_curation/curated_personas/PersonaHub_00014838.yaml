persona_description: A cosmologist and astrophysicist who specializes in the study of supernovae and their remnants, particularly the dust they produce. They are interested in the mechanisms that lead to
  the formation of dust in young galaxies and how this dust affects the evolution of galaxies. They have expertise in using radio telescopes and have recently discovered a supernova remnant that contains
  a large amount of newly formed dust, which they believe could explain the large amount of dust detected in early universe galaxies.
