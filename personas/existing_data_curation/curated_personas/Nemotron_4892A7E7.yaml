personas:
  professional: Patricia Cortes, a senior electrical engineer at a renewable‑energy startup, leverages her methodical design skills in Altium and embedded firmware while channeling her curiosity into practical
    smart‑grid prototypes, and her organized, competitive nature drives her push toward a lead‑engineer role within five years.
  sports: Patricia Cortes, an avid rock‑climber at Riverside Vertical Gym and a regular participant in beach‑volleyball leagues at Belmont Shore, follows the Los Angeles Dodgers and Los Angeles Lakers,
    and balances her competitive edge with group hikes in the San Bernardino foothills during spring.
  arts: Patricia Cortes, who spends Saturday nights dancing salsa to the rhythms of Celia Cruz and Carlos Santana, attends local folklórico performances, and dives into science‑fiction worlds by reading
    authors like Isaac Asimov and N.K. Jemisin, finds inspiration for her engineering projects in the storytelling of these artists and writers.
  travel: Patricia Cortes enjoys planning immersive trips that blend family reunions in her family's coastal hometown across the border with tech‑focused visits to the Tokyo Electron Expo, often booking
    budget flights and staying in boutique hostels, while she dreams of trekking Patagonia’s Torres del Paine after her next product launch.
  culinary: Patricia Cortes, a confident home cook, perfects mole poblano with roasted chiles and chocolate, crafts hand‑rolled tamales for family gatherings, and experiments with fusion dishes like chipotle‑infused
    quinoa bowls, while insisting on fresh cilantro, lime, and corn masa as essential ingredients.
  core: Patricia Cortes combines a competitive, methodical engineering mindset with a vibrant social life, balancing high‑impact tech projects, community mentorship, and a love for dance, climbing, and
    spicy cuisine, all while juggling a disciplined budget and a knack for occasional impulse purchases of gadgets.
background:
  cultural: Patricia is a first‑generation Mexican‑American. Her parents immigrated from Jalisco, Mexico, and she grew up in a bilingual household in Riverside, where Spanish is spoken at home and English
    at school. She celebrates Día de los Muertos and Mexican Independence Day with extended family, while also participating in local Hispanic community festivals and volunteering at the Riverside Cultural
    Center. Her upbringing blends traditional Mexican values—family solidarity, respect for elders, and communal celebration—with the independent, goal‑oriented mindset of Southern California. She is fluent
    in both Spanish and English, which she uses to bridge cultural gaps in professional settings and to serve the diverse community around her.
attributes:
  skills: '[''Circuit design & analysis'', ''PCB schematic capture and layout'', ''Embedded firmware development (C/C++, Python)'', ''PLC programming and industrial automation'', ''Test equipment operation
    (oscilloscope, logic analyzer, multimeter)'', ''Signal integrity and EMC troubleshooting'', ''MATLAB/Simulink modeling'', ''Statistical process control and quality assurance'', ''Technical documentation
    and project management'', ''Bilingual technical communication (English/Spanish)'', ''Team coordination and mentorship'', ''C++ for embedded systems'']'
  hobbies: '[''Salsa and folklórico dancing'', ''Hiking in the San Bernardino Mountains'', ''Rock climbing at indoor gyms'', ''Competing in hackathons and maker fairs'', ''DIY Arduino and Raspberry Pi projects'',
    ''Cooking and sharing Mexican family recipes'', ''Mentoring youth at STEM outreach programs'', ''Traveling to Mexico to visit relatives'', ''Playing beach volleyball with friends'', ''Reading science‑fiction
    novels'']'
  career_goals: Patricia aims to progress from senior technologist to lead electrical engineer within the next five years, focusing on renewable energy hardware and smart‑grid solutions. She intends to
    obtain a Professional Engineer license and a project management certification to oversee multidisciplinary projects. Her competitive drive pushes her to spearhead innovative product development, potentially
    launching a low‑cost solar‑powered IoT sensor platform for agricultural monitoring. She also plans to mentor Latina students in STEM, building a pipeline of diverse talent and contributing to community
    outreach.
