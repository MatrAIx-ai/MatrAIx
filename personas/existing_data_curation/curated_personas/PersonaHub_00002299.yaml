persona_description: A veterinarian who specializes in the treatment and management of dogs with Aspergillosis, particularly those with disseminated Aspergillosis. She has extensive experience in administering
  topical treatments and anti-Aspergillosis drugs systemically. Her knowledge and expertise in managing the disease in dogs is highly valued by her clients and colleagues. She is committed to providing
  the best care and treatment to her patients, and is dedicated to researching and developing new treatments for Aspergillosis in dogs.
