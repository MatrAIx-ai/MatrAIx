personas:
  professional: Rupal Tillman, a 36-year-old cosmetologist on Vashon Island, blends eco-friendly salon management with texture-sensitive artistry, using precision cutting, advanced color theory, and hand-sketched
    concepts to create inclusive hair designs while mentoring junior stylists and curating sustainable product lines.
  sports: Rupal Tillman stays fit by practicing yoga three times weekly, joining the Vashon Island rowing club in summer and cheering for the Seattle Seahawks and Seattle Kraken as a devoted fan, while
    preferring solitary shoreline walks over competitive team sports.
  arts: Rupal Tillman immerses themselves in watercolor sessions inspired by the fluid palettes of Georgia O'Keeffe, attends intimate poetry readings featuring Ocean Vuong's work, and finds creative spark
    in Norah Jones's piano-driven melodies while frequenting Vashon’s own Fir Island Gallery.
  travel: Rupal Tillman prefers low-key, meticulously planned getaways, often spending weekends exploring the San Juan Islands' tide-pools or the misty rainforests of the Olympic Peninsula, while dreaming
    of a longer immersion in the historic streets of Lisbon and the aromatic spice markets of Marrakech.
  culinary: Rupal Tillman, an avid home chef, skillfully balances fragrant Maharashtrian staples like Misal Pav and Puran Poli with Pacific Northwest twists such as smoked salmon quinoa bowls, often seasoning
    dishes with turmeric, coconut oil, and fresh cilantro while delighting in occasional visits to Seattle's bustling Pike Place Market for seasonal produce.
  core: Rupal Tillman blends artistic curiosity with eco-mindful salon craftsmanship, quietly curating inclusive hair experiences while habitually collecting pine-scented candles and over-watering houseplants.
background:
  cultural: Rupal is the daughter of Indian immigrants from Maharashtra, and she grew up in a household where Marathi language, festivals such as Diwali and Ganesh Chaturthi, and traditional cuisine were
    central. Her family emphasized education, artistic appreciation, and close‑knit community ties, values she carries into her professional life. She blends South‑Asian cultural practices—like using herbal
    oils and natural ingredients for hair care—with the sustainability ethos of the Pacific Northwest. This dual heritage informs her inclusive approach to styling, her interest in natural hair‑care formulations,
    and her commitment to fostering harmony within her salon and local community.
