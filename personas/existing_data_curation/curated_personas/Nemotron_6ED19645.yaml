  career_goals: Rupal aims to open her own boutique salon on Vashon Island that combines eco‑friendly practices with a culturally inclusive approach to hair care, offering services tailored to a wide range
    of hair textures. She aspires to become a certified color specialist, develop a line of natural hair‑care products inspired by South‑Asian botanical ingredients, and host quarterly styling workshops
    for the local community. Long‑term, she hopes to collaborate with regional fashion designers and art collectives, showcasing her work in runway shows and pop‑up art installations.
