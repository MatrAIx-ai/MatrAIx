personas:
  professional: Jonathan Brownlow, a retired civil engineer with a physics and engineering foundation, channels their analytical precision and competitive drive into designing community STEM workshops,
    mentoring younger engineers, and they are known for meticulously documenting technical projects using AutoCAD and BIM tools.
  sports: Jonathan Brownlow participates in low-impact activities such as weekly hikes with the Rochester Senior Trail Club, follows the Rochester Red Wings baseball team passionately, and they play bridge
    competitively, showcasing their sociable nature and preference for mental agility over high-intensity sports.
  arts: Jonathan Brownlow spends afternoons at the Rochester Art Center, listening to live performances by the Rochester Jazz Orchestra featuring legends like Miles Davis and Charles Bowman, and they draw
    inspiration from Monet's water lilies to inform their own digital photography, merging art appreciation with an analytical eye.
  travel: Jonathan Brownlow dreams of photographing the Metropolitan Museum of Art, the Museum of Modern Art, and the National Gallery of Canada, planning each trip meticulously with a detailed itinerary,
    and they often find their travel budget forces them to book economy flights and stay in modest B&Bs, balancing curiosity with fiscal prudence.
  culinary: Jonathan Brownlow cultivates heirloom tomatoes in their backyard, often preparing a fresh caprese salad with basil and mozzarella, enjoys roasting tomatoes for a rustic soup seasoned with thyme,
    and they occasionally experiment with a wood-smoked tomato bruschetta on a homemade cutting board.
  core: Jonathan Brownlow is a curious, organized octogenarian who fuses engineering rigor with artistic passion, they compete in chess and bridge, tend a garden, and never miss a chance to capture the
    changing Finger Lakes seasons on camera.
background:
  cultural: Jonathan's cultural background is that of a mid‑20th‑century White American from the Rust Belt of upstate New York. Raised in the post‑World War II era, his family emphasized hard work, practical
    education, and community involvement. He grew up with a modest Protestant (United Methodist) upbringing, which instilled a sense of service and civic duty, though his adult life is more secular. The
    industrial and agricultural heritage of the Finger Lakes region shaped his appreciation for both technical craftsmanship and the natural environment. Over the decades, he has witnessed and embraced
    the cultural shifts of the 1960s counter‑culture and the later resurgence of local arts, integrating those experiences into his worldview.
attributes:
  skills: '[''Civil engineering design'', ''Project management'', ''Technical writing'', ''AutoCAD and BIM software'', ''Electronics troubleshooting'', ''Woodworking'', ''Historical research'', ''Community
