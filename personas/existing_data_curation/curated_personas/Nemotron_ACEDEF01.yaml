  hobbies: '[''Beach walks'', ''Yoga'', ''Reading romance novels'', ''DIY natural beauty recipes'', ''Cooking classes (Mediterranean cuisine)'', ''Volunteering (free haircuts)'', ''Attending art fairs'']'
  career_goals: Gloria aims to achieve master stylist certification within the next two years, expand her portfolio by entering regional hair styling competitions, and eventually open her own boutique salon
    in Pompano Beach that emphasizes a structured, client-focused experience. She also wants to develop a small line of natural hair care products geared toward women with diverse hair textures, and may
    teach advanced styling courses at a local cosmetology school.
