personas:
  professional: Gloria Miller, a disciplined senior hair stylist at a bustling Pompano Beach salon, leverages her precision cutting and advanced color expertise to craft client‑focused looks while meticulously
    managing appointments, inventory, and staff training, reflecting her competitive edge and love of structure.
  sports: Gloria Miller enjoys early dawn beach runs along Pompano Beach and weekly paddle‑boarding sessions, supports the Miami Dolphins and Miami Heat, and participates in a local women’s volleyball league,
    balancing competitive spirit on the court with a structured fitness regimen that fits her busy schedule.
  arts: Gloria Miller frequently visits Fort Lauderdale’s art fairs, where they admire works by contemporary painter Amy Sherald and listen to live acoustic sets by singer‑songwriter Ben Howard, while unwinding
    with contemporary romance novels by Nora Roberts and Julia Quinn, integrating artistic inspiration into their salon aesthetics.
  travel: Gloria Miller favors curated getaways that blend relaxation and culinary discovery, such as weekend trips to Charleston’s historic waterfront, a summer retreat on Santorini for its Mediterranean
    flavors, and a yearly family visit to Key West, planning trips months ahead to align with salon downtimes and budget constraints.
  culinary: Gloria Miller’s palate leans toward Mediterranean fare, mastering dishes like grilled branzino with rosemary, Greek moussaka, and a seasonal tabbouleh, while experimenting with olive oil‑based
    hair masks, showcasing a solid cooking skill level honed through scheduled classes and a love for fresh herbs, feta, and preserved lemons.
  core: Gloria Miller balances a fiercely structured salon career with sunrise beach walks, disciplined yoga, and a competitive drive to launch a boutique, all while juggling practical budgeting, occasional
    health neglect, and a passion for Mediterranean flavors.
background:
  cultural: Gloria is a white American of European descent who grew up in a suburban Florida community. Her upbringing combined traditional Southern hospitality with the multicultural vibrancy of Broward
    County, exposing her to Caribbean and Latin influences that are reflected in her clients' diverse hair needs. She identifies with middle-class values, emphasizes hard work, and maintains strong family
    ties, celebrating holidays such as Thanksgiving and Fourth of July while also participating in local multicultural festivals.
attributes:
  skills: '[''Hair cutting (precision)'', ''Hair coloring (balayage, highlights, color correction)'', ''Styling for events (updos, braids)'', ''Perms and texturizing'', ''Scalp health assessment'', ''Product
