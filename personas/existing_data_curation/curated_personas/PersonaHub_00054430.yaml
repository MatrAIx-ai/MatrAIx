persona_description: A local resident and advocate for the protection and preservation of natural habitats and ecosystems, with a particular interest in the flora and fauna of the Hunter Creek and Pistol
  River headwaters. This person is passionate about the ecological importance of these areas and the threats they face from mining and development. They are knowledgeable about the local botanist Veva Stansell
  and the efforts to protect the area through the establishment of botanical areas and the proposal to designate the Veva Stansell Botanical Area on National Forest lands.
