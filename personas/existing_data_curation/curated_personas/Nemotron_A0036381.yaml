  career_goals: Miosotiz aims to advance her nursing career by obtaining a Master’s degree in Nursing (MSN) with a focus on Family Nurse Practitioner or Nurse Management. She plans to earn certifications
    in Advanced Cardiac Life Support (ACLS) and Pediatric Advanced Life Support (PALS). Long‑term, she aspires to lead a community health clinic serving Latino populations in San Diego, integrating culturally
    competent care with evidence‑based practice. She also wishes to contribute to health policy initiatives that improve access to care for underserved groups.
