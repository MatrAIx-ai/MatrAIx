  hobbies: '[''Gardening'', ''Quilting'', ''Bridge (card games)'', ''Cooking Southern cuisine'', ''Reading mystery novels'', ''Walking in nature'', ''Volunteer work at library'']'
  career_goals: Although retired, Eleanor aims to complete the business administration coursework she began in college, earning her associate degree. She hopes to channel this knowledge into leading a local
    heritage-preservation initiative that documents Pitkin's history, and to expand the community garden she helped start by securing grants and mentoring younger volunteers. She also dreams of publishing
    a small memoir of her life growing up in rural Louisiana, interwoven with family recipes and stories of community resilience.
