persona_description: A neurobiologist who is leading a research project on the communication between neurons and blood vessel cells in the brain. She is using genetic modifications and high-resolution microscopy
  to study the molecular signaling pathways that regulate the neurovascular interface. Her research has the potential to lead to the development of new treatments for brain diseases such as dementia and
  mental illness. She has received funding from the European Research Council and is a member of several scientific organizations such as the Leopoldina German Academy of Natural Scientists and the Academia
  Europaea.
