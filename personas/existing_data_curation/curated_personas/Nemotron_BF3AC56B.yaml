personas:
  professional: Edwin Porras, a 35‑year‑old first‑line sales supervisor, leverages his STEM‑grounded analytical skills and bilingual communication to design streamlined sales processes, coach a collaborative
    team, and translate data into actionable strategies—while his relaxed attitude toward strict schedules lets him experiment with new tools without losing sight of pragmatic results.
  sports: Edwin Porras enjoys weekend pickup soccer games with friends, roots for the Cleveland Browns in the NFL, supports the Cleveland Guardians during baseball season, and spends quiet mornings fishing
    on Lake Erie, preferring low‑pressure, community‑oriented activities over rigid training regimens.
  arts: Edwin Porras unwinds by binge‑watching sci‑fi series like The Expanse and Stranger Things, attends local cultural festivals featuring live performances by artists such as Maná and Juanes, and occasionally
    visits the Cleveland Museum of Art to soak in contemporary installations, reflecting a curiosity that fuels his creative side.
  travel: Edwin Porras favors spontaneous weekend getaways, opting for road trips to Michigan’s Upper Peninsula for rugged hikes, relaxed stays in Asheville NC for its craft breweries, and plans a future
    adventure to Patagonia, always balancing travel costs with his family’s budget constraints.
  culinary: Edwin Porras experiments with traditional Latin dishes—spicing up tamales with locally sourced corn, crafting cilantro‑lime rice using herbs from his garden, and grill‑searing walleye caught
    on Lake Erie—while his moderate cooking skill lets him adapt recipes on the fly, though he often leaves the kitchen a mess, reflecting his relaxed approach.
  core: Edwin Porras blends data‑driven sales leadership with a laid‑back love of cooking, woodworking, and community soccer, but his tendency to procrastinate on paperwork and kitchen cleanup reveals a
    habit of letting flexibility tip into mild disorganization.
background:
  cultural: Edwin is of Colombian descent and was raised in a bilingual household that celebrates both Midwestern American customs and Latino traditions. He speaks Spanish fluently and participates in community
    events such as Hispanic Heritage Month celebrations, salsa nights, and local Dia de los Muertos commemorations. His family values emphasize close-knit relationships, respect for elders, and sharing
    cultural foods, which he integrates into his social life in Avon Lake. This bicultural perspective informs his collaborative work style and his desire to foster inclusive environments.
