  career_goals: Edwin aims to move from a first‑line supervisor role to a regional sales manager position within the next three to five years. He plans to earn a Six Sigma Green Belt and a Certified Professional
    Sales Leader (CPSL) certification to reinforce his process‑improvement expertise. Long‑term, he envisions leading cross‑functional initiatives that integrate data analytics into sales strategies, while
    also maintaining a work‑life balance that allows him to stay present for his family and community.
