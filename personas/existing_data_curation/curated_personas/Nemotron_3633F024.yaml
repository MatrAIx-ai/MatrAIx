  hobbies: '[''Crossword puzzles'', ''Sudoku'', ''Balcony vegetable gardening'', ''Jogging in Central Park'', ''Reading non‑fiction (psychology, self‑improvement, history)'', ''Acoustic guitar playing'',
    ''Community theater backstage volunteering'', ''Mental‑health outreach volunteering'']'
  career_goals: Mitchell aims to transform his hands‑on experience into formal credentials by earning a Certified Psychiatric Technician (CPT) certification and later pursuing an associate degree in nursing
    to become an RN specializing in mental health. He envisions moving into a supervisory position, such as shift lead or unit coordinator, where his organized, reliable approach can streamline workflow
    and enhance patient safety. Long‑term, he hopes to help shape patient‑centered care protocols and mentor new aides, while also strengthening his own resilience to better manage stress.
