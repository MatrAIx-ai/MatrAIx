  hobbies: '[''Gardening'', ''Baking'', ''Hiking on local trails'', ''Book club'', ''Church choir'', ''Yoga'', ''Journaling'', ''Volunteer at school library'']'
  career_goals: Jacquelyn aims to become a grade‑level team leader within the next two years, guiding curriculum implementation and supporting newer teachers. She plans to pursue a master's degree in Educational
    Leadership to qualify for an assistant principal role, while also developing a district‑wide literacy initiative that emphasizes practical reading strategies. Balancing her ambition with her awareness
    of stress, she hopes to embed wellness practices into staff meetings and create a peer‑support network for teachers at her school.
