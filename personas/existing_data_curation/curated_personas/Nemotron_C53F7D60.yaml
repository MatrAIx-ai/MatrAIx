  hobbies: '[''Visiting art museums and galleries'', ''Reading African-American literature and poetry'', ''Listening to jazz, blues, and classical music'', ''Photography (urban and street scenes)'', ''Gardening
    (vegetable and herb garden)'', ''Small book club focusing on art and culture'', ''Volunteering at the community library'']'
  career_goals: Reginald aims to advance to a senior administrative or office manager role where he can lead process‑improvement initiatives and mentor younger colleagues. He plans to earn a Certified Administrative
    Professional (CAP) credential and deepen his expertise in digital records management. Over the next several years he hopes to transition to a part‑time consulting position focused on office efficiency
    after retirement, while continuing to contribute to his community through volunteer training programs.
