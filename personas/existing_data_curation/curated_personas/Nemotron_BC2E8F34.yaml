  hobbies: '[''Photography'', ''Hiking'', ''Reading art and history books'', ''Listening to blues and jazz'', ''Sketching'', ''Cooking Southern dishes'', ''Attending community art fairs'', ''Volunteering
    at church events'']'
  career_goals: Adrian aims to transition from front‑line courier work to a logistics coordination role within the next few years, pursuing certification in supply‑chain management to broaden his expertise.
    He hopes to eventually oversee a small team of drivers, improve routing efficiency for local businesses, and develop partnerships with regional artisans to create a micro‑delivery service that highlights
    local crafts and art. Concurrently, he dreams of curating community art showcases or launching an online portfolio that blends his delivery routes with photographic storytelling, allowing him to merge
    his logistical knowledge with his artistic passion.
