  hobbies: '[''Running'', ''Playing Guitar'', ''Board Games'', ''Competitive Video Gaming'', ''Reading Non-fiction (Science, History)'', ''DIY Home Improvement'', ''Cooking'', ''Journaling'']'
  career_goals: John aims to transition from a classroom teacher to a lead teacher or instructional coach within the next three years, allowing him to shape school‑wide curriculum and mentor peers. He plans
    to complete a bachelor's degree in education and pursue a master's in curriculum design to strengthen his qualifications. Long‑term, he hopes to develop a STEM enrichment program for middle‑school students
    in Dorchester, leveraging his practical approach to learning. He also aspires to start a part‑time tutoring service focused on building study strategies for students who, like him, benefit from clear
    structure and flexible support.
