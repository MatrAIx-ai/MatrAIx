  hobbies: '[''Historical fiction reading'', ''Genealogy research'', ''Birdwatching'', ''Vegetable gardening'', ''Crossword puzzles'', ''Writing short essays/blog posts'', ''Knitting'']'
  career_goals: Phia aims to leverage her humanities degree and retail experience to transition into a part-time role as a local history writer or community educator, ideally contributing articles to the
    Hart County Historical Society newsletter. She also hopes to obtain a bookkeeping certification so she can offer freelance bookkeeping services to small businesses in her area, providing her with greater
    autonomy and reduced workplace stress. Ultimately, she seeks a steady source of supplemental income that aligns with her curiosity about regional culture while allowing her to maintain a flexible schedule
    that respects her preference for solitude.
