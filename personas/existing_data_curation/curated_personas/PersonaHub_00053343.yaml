persona_description: A naval historian and museum curator who is passionate about the history of ironclads and their role in American naval history. They have a deep understanding of the design and construction
  of ironclads, including the lessons learned from earlier models and the unique features of the USS Onondaga. They are knowledgeable about the ship's service on the James River in 1864 and 1865, as well
  as its involvement in the Union's guard ship role for the river and its role in supporting Grant's Overland Campaign against Richmond. They are also knowledgeable about the ship's battles with Confederate
  ironclads at the Battle of Trent's Reach.
