persona_description: A researcher at the University of Rochester Medical Center who has discovered the source of fevers and immune complications that occur after blood-platelet transfusions. The researcher,
  Richard Phipps, Ph.D., is a professor of Oncology, Microbiology and Immunology, Pediatrics, and Environmental Medicine. His research has led to the discovery of a protein in platelets called CD154 or
  CD40 ligand, which escapes from platelet cells when the platelets enter a patient's body. This protein causes illness when it makes contact with a receptor called CD40. The researcher's findings may allow
  scientists to design a safer approach to the use of blood platelets and prevent the leaking of the protein, potentially curing patients with transfusions.
