  career_goals: Christine dreams of a future where she can combine her love of learning, helping others, and creativity. She aspires to become an elementary school teacher or a community youth coordinator,
    roles that let her share knowledge and organize activities for peers. She also imagines exploring science or veterinary work, hoping to understand how living things work and care for animals, while
    keeping her goals realistic and aligned with her academic progress.
