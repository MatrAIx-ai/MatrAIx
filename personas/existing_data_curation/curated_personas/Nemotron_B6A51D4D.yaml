  career_goals: At 57, Ronald aims to leverage his deep industry knowledge to shape the next generation of construction practices in Central Ohio. He aspires to attain a senior executive role—such as Director
    of Construction Operations or Vice President of Project Delivery—where he can champion large‑scale sustainable projects, integrate advanced digital tools, and influence regional building policies. Concurrently,
    he is planning to become a certified LEED Accredited Professional and to launch a boutique consulting firm that mentors emerging managers and promotes lean, low‑waste construction. Ronald also hopes
    to leave a tangible legacy by overseeing at least one landmark public‑infrastructure project—like a mixed‑use transit hub—that reflects both innovative design and community resilience.
