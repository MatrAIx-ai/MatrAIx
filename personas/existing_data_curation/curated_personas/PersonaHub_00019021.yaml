persona_description: A professor at a university who is passionate about increasing diversity in STEM disciplines, particularly in geoscience. They have implemented multifaceted strategies to support minority
  students in STEM majors, including extensive outreach programs, scholarship opportunities, clear articulation agreements between community colleges and universities, peer and faculty mentoring, access
  to tutoring or other academic support programs, and tailoring courses within the geoscience program to careers students can pursue with an undergraduate degree. They have interviewed faculty from a number
  of institutions to learn how they approach diversity in matters of recruitment and retention and how their efforts are paying off. They are dedicated to increasing the success of underrepresented minority
  students in STEM and are constantly looking for new and innovative ways to support them.
