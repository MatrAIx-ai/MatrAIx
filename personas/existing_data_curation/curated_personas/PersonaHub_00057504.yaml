persona_description: A researcher at the National Institute of Allergy and Infectious Diseases (NIAID) who specializes in signal transduction processes in hematopoietic cells. The persona is interested
  in studying the mechanisms of inflammation, B cell activation, and macrophage migration. They have expertise in signal transduction by receptors for gamma-type immunoglobulins on human macrophages and
  neutrophils, and have published research on the role of phosphatidylinositol 3-kinase in B-cell activation. The persona is also interested in the regulation of small GTPases by PI3K products and has conducted
  research on the role of Vav in macrophages.
