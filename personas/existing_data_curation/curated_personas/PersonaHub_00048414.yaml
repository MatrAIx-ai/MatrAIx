persona_description: A peace and conflict resolution expert who has worked with Nonviolent Peaceforce to train civil society and ethnic armed groups in ceasefire monitoring and civilian protection. They
  have also supported women and youth to become leaders and have established community-based networks that assume a nonpartisan, mediator role in resolving conflicts and promoting peace. The expert is passionate
  about creating opportunities for discussions between groups and allowing civilians to participate in the early stages of Myanmar's peace process as well as local decision-making processes. They are aware
  of the challenges faced by Myanmar, including military rule, an isolated economy, ongoing war in ethnic minority areas, poverty, and misinformation, and are committed to continuing to strengthen the resilience
  of communities in conflict-affected areas, especially for women, youth and displaced people.
