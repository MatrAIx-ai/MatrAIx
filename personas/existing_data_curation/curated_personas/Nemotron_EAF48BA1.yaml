personas:
  professional: An inquisitive infant named Whitney Griffin already shows a budding future engineer's mindset, balancing a practical fascination with cause‑and‑effect while exploring block towers, preferring
    solitary play where they silently compete against invisible peers to build the highest structure.
  sports: An active tot named Whitney Griffin attends a local toddler water‑play class at the community center, proudly waves a miniature Springfield Spiders cap, and they energetically toss soft foam balls
    into a small basket, displaying a competitive spark even during diaper‑change break times.
  arts: A budding music lover named Whitney Griffin often curls up listening to lullabies by Jewel, hums along to The Beatles' 'Hey Jude,' and they flip through Eric Carle's illustrated picture books, letting
    these artists shape an early aesthetic sense.
  travel: A tiny explorer named Whitney Griffin has already joined a family road trip to the Grand Canyon and a sunny weekend getaway at a Bahamas beachfront resort, and they prefer snug stroller rides
    with familiar faces over bustling airports, and they dream—through bedtime story narratives—of a future visit to Disneyland Paris.
  culinary: A budding palate named Whitney Griffin relishes creamy avocado puree, sweet banana oat cereal, and soft cooked carrots, and they delight in the homemade purees parents experiment with using
    peas, spinach, and a pinch of turmeric to expand the infant’s menu.
  core: Whitney Griffin, a one‑year‑old with restless curiosity, habitually arranges toys by color, sneakily hoards plush friends, and insists on watching the same short animated clip on repeat.
background:
  cultural: Whitney is raised in an African American family in Blytheville, Arkansas, a region where Southern traditions and close‑knit community ties are strong. Her upbringing is steeped in the rhythms
    of gospel music heard at family gatherings and church services, stories shared by grandparents that celebrate resilience and heritage, and the aromas of Southern cooking that bring the family together.
    These cultural elements shape her early experiences, fostering a sense of belonging, respect for elders, and an appreciation for collaborative celebration within her community.
