  hobbies: '[''visiting art museums'', ''community theater attendance'', ''book club participation'', ''rose gardening'', ''watercolor painting'', ''storytelling circles'', ''cooking classes'', ''bridge'',
    ''weekend trips to historic towns'']'
  career_goals: Wanda hopes to transition from daily salon work to a mentorship‑focused role, offering workshops that blend hairstyling techniques with artistic expression for both aspiring stylists and
    community members. She plans to compile her decades‑long experience into a memoir and a guidebook on timeless hair‑care practices. Additionally, she aspires to launch a modest line of eco‑friendly hair
    products inspired by her love of natural ingredients, and to partner with the local senior center to provide free hair‑dressing services and confidence‑building sessions for older adults.
