persona_description: A literacy teacher who specializes in the implementation and development of the Oxford Literacy Web programme, focusing on guiding schools through the primary years to successfully
  meet the requirements of the National Literacy Strategy, National Curriculum in England and Wales, English Language 5-14 in Scotland, and Common Curriculum in Northern Ireland. The teacher has a deep
  understanding of diverse literary styles and genres, and is skilled in creating engaging and dynamic story strands that reinforce vocabulary and push children toward the next level of reading and writing
  skills. The teacher has experience in working with schools to develop and implement effective literacy programmes, and is passionate about ensuring that all children have the opportunity to develop their
  reading and writing abilities to their full potential.
