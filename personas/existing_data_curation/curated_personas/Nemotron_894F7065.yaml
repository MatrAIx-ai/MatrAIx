  hobbies: '[''Soccer'', ''Drama club'', ''Reading fantasy books'', ''Drawing and crafts'', ''Minecraft'', ''Biking'', ''Hiking'', ''Board games'', ''Science club projects'', ''Piano lessons'']'
  career_goals: Looking ahead, Michelle imagines a future where she can combine her love for helping others, teamwork, and hands‑on problem solving. She often talks about becoming an elementary school teacher
    because she enjoys explaining things to friends and seeing them succeed. She is also fascinated by animals and hopes to be a veterinarian, inspired by trips to the local animal shelter. Additionally,
    her interest in Scratch programming sparks curiosity about a career in video‑game design or app development, where she could blend creativity with technology. In all these aspirations, she emphasizes
    roles that allow her to work with groups, stay organized, and make a tangible positive impact on her community.
