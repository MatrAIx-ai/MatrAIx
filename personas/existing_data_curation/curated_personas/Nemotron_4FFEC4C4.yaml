  career_goals: Marion dreams of becoming an illustrator or graphic designer who can blend storytelling with visual art. She imagines attending a specialized art high school and later studying visual communication
    in college. She is also intrigued by the idea of working at a museum or community arts center where she could share her love for creativity with others. While she remains open to exploring other unconventional
    paths—such as video‑game art design, environmental education, or a future role that combines nature and art—her core ambition is to pursue a career that lets her explore new ideas and express herself
    artistically.
