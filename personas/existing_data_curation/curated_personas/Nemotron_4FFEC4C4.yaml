personas:
  professional: Marion Cappiello, an aspiring digital illustrator and budding animator, channels curiosity and a love for fantasy novels into weekly sketches, watercolor experiments, and simple tablet animations
    that blend whimsical storytelling with unconventional visual twists.
  sports: Marion Cappiello, a member of the local youth soccer club’s Saturday morning team, enjoys the rhythmic stretches of yoga after practices, follows the Chicago Cubs for the summer, and often trades
    small stones for makeshift climbing challenges during nature hikes.
  arts: Marion Cappiello, an avid fan of Studio Ghibli’s whimsical animation and the indie folk sounds of Iron & Wine, spends weekends at community art workshops learning watercolor gradients while sketching
    the same soaring dragons that populate their favorite fantasy series.
  travel: Marion Cappiello loves spontaneous trips to nearby state parks such as Red River Gorge for leaf‑collecting adventures, and cherishes a family road trip to Washington D.C.’s National Air and Space
    Museum, balancing the desire for discovery with the need for flexible, low‑budget travel planning.
  culinary: Marion Cappiello, a budding kitchen experimenter, enjoys mixing up fresh fruit salads with mango, kiwi, and blueberries, and often attempts to paint edible watercolor designs on homemade pizzas
    topped with mozzarella, pepperoni, and basil leaves.
  core: Marion Cappiello is a curious, art‑driven pre‑teen who blends solitary sketching with spontaneous nature forays, occasionally misplaces deadlines but always finds wonder in a watercolor splash or
    a new Minecraft build.
background:
  cultural: Marion is raised in a white, Italian‑American family in Spokane, Washington. Her upbringing reflects the Pacific Northwest’s blend of suburban middle‑class values, a deep appreciation for outdoor
    recreation, and exposure to local arts and cultural festivals. Family traditions include cooking Italian dishes and celebrating holidays with extended relatives, while school and community programs
    introduce her to the region’s natural heritage and the diverse cultural history of the Spokane area.
