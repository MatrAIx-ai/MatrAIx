  hobbies: '[''Desert Hiking'', ''Landscape Photography'', ''Visiting Art Galleries'', ''Pottery Classes'', ''Reading Design and Sustainability Books'', ''Yoga'', ''Jigsaw Puzzles'', ''Southwestern Cooking'',
    ''Community Clean‑up Volunteering'', ''Small Book Club Participation'']'
  career_goals: Taylor aims to advance from a first‑line supervisor to a senior facility manager overseeing multiple properties within a hospitality chain. She plans to complete her associate degree in
    hospitality management and earn the Certified Housekeeping Manager credential. Her ambition includes championing sustainable, green‑cleaning initiatives and integrating technology‑driven workflow solutions.
    Over the next five years, she aspires to lead a regional operations team, mentor emerging supervisors, and eventually launch a consulting firm that helps small hotels adopt high‑standard, environmentally
    responsible housekeeping practices.
