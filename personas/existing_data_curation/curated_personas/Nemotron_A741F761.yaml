personas:
  professional: Ada Jaime, a 25‑year‑old curriculum specialist in training, leverages curiosity‑driven inquiry, digital tools like Google Classroom and Nearpod, and inclusive pedagogy to design engaging
    STEAM units for Fulton County middle schools, and they manage a slightly chaotic planning style that favors flexibility over rigid schedules.
  sports: Ada Jaime stays active by hiking the Chattahoochee River Trail on weekends, attending yoga sessions at a local studio, and cheering on the Atlanta Hawks, Atlanta United FC, and the Falcons, while
    they occasionally join a community running club that meets for early‑morning 5K runs.
  arts: Ada Jaime immerses themselves in Atlanta’s arts scene, catching live sets by indie band The Everybody at the Little Five Points venue, attending West End gallery openings featuring works by contemporary
    painter Kara Walker, and filling a small sketchbook with quick drawings of city streets, all while discussing contemporary fiction by Sally Rooney and nonfiction like Robert Sapolsky’s Behave at their
    book club.
  travel: Ada Jaime prefers spur‑of‑the‑moment weekend trips, having already explored Nashville’s music district, Asheville’s Blue Ridge Parkway, and a brief stint in Reykjavik’s museums, yet they dream
    of a longer cultural immersion in Kyoto’s tea houses, balancing their modest teaching salary with budget‑friendly travel planning.
  culinary: Ada Jaime enjoys experimenting with Southern‑inspired cuisine, frequently preparing shrimp‑and‑grits with fresh okra, collard greens simmered with smoked turkey, and peach cobbler using seasonal
    Georgia peaches, while their skill level hovers between confident home cook and eager student, often sourcing heirloom tomatoes from the local farmers market.
  core: Ada Jaime is a curious yet practical educator who blends flexible planning with a love for indie music, spontaneous weekend hikes, and occasional binge‑shopping for art supplies, all while juggling
    a laid‑back financial approach and a tendency to neglect dentist appointments.
background:
  cultural: Ada grew up in a middle‑class, white family in the Atlanta metropolitan area. Her upbringing blends traditional Southern values—such as hospitality, community involvement, and a respect for
    local history—with an emphasis on education and civic engagement. Family gatherings often featured Southern cooking and storytelling, fostering a strong sense of belonging. Living in a diverse city,
    Ada has been shaped by the multicultural fabric of Fulton County, regularly interacting with peers from varied backgrounds, which deepened her appreciation for inclusivity and cultural awareness in
    her teaching practice.
attributes:
  skills: '[''Curriculum Design'', ''Differentiated Instruction'', ''Digital Learning Integration'', ''Classroom Management'', ''Formative Assessment'', ''Adolescent Development Knowledge'', ''Inclusive
    Education Practices'', ''Collaborative Facilitation'', ''Student Counseling'', ''Professional Development Leadership'']'
  hobbies: '[''Reading contemporary fiction'', ''Attending live music events'', ''Hiking'', ''Yoga'', ''Cooking Southern cuisine'', ''Volunteering at STEM after‑school program'', ''Sketching'', ''Participating
    in book club'']'
  career_goals: Ada aims to deepen her impact on curriculum policy by pursuing a master’s degree in Educational Leadership within the next two years. She hopes to become a curriculum specialist for Fulton
    County Schools, where she can mentor teachers, design district‑wide STEAM initiatives, and champion inclusive pedagogy. Long‑term, she envisions stepping into an assistant principal role, leading a
    school that balances academic rigor with a supportive community culture. Additionally, she aspires to author a series of practical guides for teachers seeking to blend curiosity‑driven projects with
    classroom practicality.
