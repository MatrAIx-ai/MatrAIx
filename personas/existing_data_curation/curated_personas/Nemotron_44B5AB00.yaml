  career_goals: Paul aims to evolve from a senior software engineer to a technical lead or product architect within the next five years, focusing on projects that blend technology with artistic expression
    such as interactive installations, immersive media platforms, or creative SaaS tools. He hopes to mentor junior developers, champion cross‑functional collaboration in small, agile teams, and eventually
    launch a boutique studio that produces art‑centric digital experiences. In the longer term, Paul is interested in contributing to open‑source projects at the intersection of code and creativity, and
    possibly pursuing an advanced degree or certification in human‑computer interaction to deepen his expertise.
