personas:
  professional: Gregory Battle is a diligent facilities technician who applies his precise time‑management instincts and hands‑on expertise with industrial‑grade cleaning equipment to maintain large commercial
    properties, while his competitive drive pushes him to streamline workflows and pursue supervisory roles.
  sports: Gregory Battle spends evenings shooting hoops at the Anacostia Rec Center, competes in a local pickup league called the Capitol Courts, and follows the Washington Wizards, Washington Commanders,
    and Washington Capitals, while also joining seasonal pick‑up soccer games at the National Mall.
  arts: Gregory Battle fuels his love of music with classic hip‑hop legends like Nas and A Tribe Called Quest, modern R&B icons such as H.E.R., and the soulful sounds of John Coltrane, often playing these
    tracks while commuting and attending community block‑party performances that keep his cultural storytelling alive.
  travel: Gregory Battle prefers structured weekend getaways that blend cultural immersion and relaxation, having explored New York City’s music scene, taken a road trip to New Orleans for its jazz festivals,
    and dreaming of a future visit to the historic streets of Savannah, while budgeting his travel through a savings plan that balances his certification goals.
  culinary: Gregory Battle enjoys hearty soul‑food staples like fried chicken with a crisp seasoned crust, collard greens simmered with smoked turkey, and creamy macaroni‑and‑cheese, and he can whip up
    these dishes at home using paprika, hot sauce, and cheddar, while also indulging in occasional food‑truck tacos for a quick bite.
  core: Gregory Battle is a competitively driven facilities specialist who balances a love for structured routines with occasional procrastination, channels stress into journal entries, and habitually checks
    the same cleaning checklist twice before calling a job done.
background:
  cultural: Gregory was raised in the Anacostia neighborhood of Washington, D.C., a historically African‑American community with deep ties to civil‑rights activism and cultural expression. His family celebrates
    traditional soul‑food dishes such as fried chicken, collard greens, and macaroni‑and‑cheese, and he grew up with the sounds of Motown, jazz, and contemporary hip‑hop playing at family gatherings. He
    attended a public high school where he participated in after‑school basketball and a mentorship program that introduced him to local university volunteers. Exposure to the city’s museums and the annual
    Juneteenth celebrations reinforced his pride in African‑American history. While he does not regularly attend church, the communal values of his neighborhood—mutual support, storytelling, and respect
    for elders—remain central to his identity. This cultural backdrop informs his work ethic, his appreciation for music, and his desire to give back by eventually offering cleaning services to community
    centers and schools.
attributes:
  skills: '[''Industrial cleaning operations'', ''Floor care (polishing, stripping, buffing)'', ''HVAC filter maintenance'', ''Basic plumbing repairs'', ''Basic electrical troubleshooting'', ''Safety and
    compliance (OSHA) awareness'', ''Inventory management'', ''Digital work‑order documentation'', ''Rapid problem solving under variable conditions'']'
  hobbies: '[''Playing basketball at the community center'', ''Listening to hip‑hop and R&B music'', ''Strategy video gaming'', ''Watching esports'', ''Journaling for stress management'', ''DIY home repairs
    and projects'', ''Visiting museums (especially African American History and Culture)'', ''Attending local block parties and food festivals'']'
  career_goals: Gregory wants to move from being a frontline janitor to a supervisory role within the facilities department of a large office building or government complex in D.C. He aims to earn a Certified
    Facility Manager (CFM) credential or an OSHA 30‑hour certification within the next two years. His ultimate ambition is to become a facilities manager, overseeing a team, scheduling staff, and managing
    budgets, which would give him more predictable work hours and a clear career ladder. He also dreams of eventually starting his own small commercial cleaning service that serves boutique offices and
    community centers, leveraging his competitive drive to build a reputable business. He values steady income and a structured environment but also seeks enough flexibility to set his own schedule as his
    business grows.
