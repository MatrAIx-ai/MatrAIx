personas:
  professional: Justin Williams, a 46‑year‑old seasoned electrician, blends two decades of hands‑on wiring expertise with a practical curiosity for green‑technology, coordinating small‑scale projects with
    meticulous organization while staying flexible on job sites, mentoring apprentices, and championing safety as they work toward master‑electrician certification and a future contracting firm focused
    on solar and EV installations.
  sports: Justin Williams keeps active by shooting hoops at Stamford’s community center, cheering for the New York Knicks and Yankees, following the New York Giants’ NFL season, and hiking the Appalachian
    Trail sections in nearby state parks on weekends, balancing competitive play with low‑key cardio and an occasional complaint about sore calves after a steep climb.
  arts: A devoted fan of live R&B and jazz, Justin Williams frequently attends shows featuring performers like Gregory Porter, Erykah Badu, and Kamasi Washington in the Stamford area, while channeling that
    rhythmic energy into his weekend woodworking and savoring classic soul albums from Marvin Gaye; they also enjoy catching performances at the Stamford Center for the Arts and quoting lines from John
    Singleton’s films.
  travel: Justin Williams prefers a balanced travel style that mixes meticulously planned weekend getaways to nearby New England coastal towns such as Mystic and Newport with spontaneous road trips to national
    parks like Acadia, while budgeting for an occasional overseas escape to Aruba in the Caribbean for a relaxing beach break; they enjoy researching hidden local eateries and always pack a portable speaker
    to stream jazz on the journey.
  culinary: Justin Williams, an avid home‑cook, specializes in soul‑food classics such as crispy fried chicken, buttery collard greens, and sweet potato pie seasoned with smoked paprika and a dash of hot
    sauce, and while they can expertly season a wood‑smoked brisket, they often indulge in weekend brunches at local hot spots like The Breadsticks Café for avocado toast and craft coffee.
  core: Justin Williams is a 46‑year‑old electrician who merges practical curiosity with a sociable streak, juggling green‑tech ambitions, wood‑shop hobbies, and soulful cooking, yet habitually forgets
    to water his houseplants and sometimes over‑commits to community events, leaving his schedule a juggling act of wiring, basketball, and mentorship.
background:
  cultural: Justin is an African‑American who grew up in a close‑knit Black community in the Northeast, where church, music, and shared meals shaped his values. The traditions of soul food, gospel music,
    and community solidarity remain central to his identity. Living in Stamford’s diverse landscape, he blends his cultural heritage with the multicultural fabric of the city, often participating in local
    festivals and supporting initiatives that celebrate Black history and contributions to skilled trades.
attributes:
  skills: '[''Residential wiring'', ''Commercial electrical systems'', ''Electrical code compliance'', ''Troubleshooting and diagnostics'', ''Blueprint interpretation'', ''Energy‑efficiency retrofitting'',
