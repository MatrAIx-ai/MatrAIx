  hobbies: '[''Pickup basketball'', ''Volunteering at youth STEM programs'', ''Cooking soul‑food recipes'', ''Attending R&B and jazz concerts'', ''Woodworking'', ''Hiking in West Rock Ridge State Park'']'
  career_goals: Justin aims to become a master electrician and eventually launch his own electrical contracting firm that specializes in green‑technology installations across Fairfield County. He plans
    to earn certifications in solar‑energy systems and electric‑vehicle infrastructure, positioning his business at the forefront of the region’s sustainability push. Additionally, he hopes to become a
    certified electrical safety instructor, sharing his knowledge with the next generation of tradespeople and serving as a mentor within his community union.
