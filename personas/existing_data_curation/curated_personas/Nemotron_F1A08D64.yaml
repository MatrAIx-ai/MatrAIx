  hobbies: '["Folkloric Mexican dance and reggaeton dancing", "Soccer and volleyball", "Cooking and recipe experimentation", "Social media video creation (TikTok, Instagram)", "Sketching and illustration",
    "Reading graphic novels and teen fiction", "Volunteering at community youth programs", "Exploring the San Antonio River Walk", "Mindfulness journaling and yoga"]'
  career_goals: Mirtia plans to earn her GED within the next two years and then enroll in a community college where she hopes to study culinary arts or health sciences. She dreams of becoming a chef who
    modernizes Mexican cuisine while preserving family recipes, and she also envisions working as a community health worker or youth mentor who uses social media to share mental‑health coping strategies
    for teens. In the short term, she aims to secure a part‑time job at a local restaurant or community center to gain practical experience and help support her household.
