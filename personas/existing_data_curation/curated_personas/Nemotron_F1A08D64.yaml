personas:
  professional: Mirtia Saenz, a 16‑year‑old bilingual teen, blends their knack for organized chaos with a heart for community, channeling their love for cooking and peer‑mediating into informal school events
    and youth programs, while eyeing a future in culinary arts or health sciences.
  sports: Mirtia Saenz spends weekends shooting goals with the San Antonio Youth Soccer League and spiking balls at the community center’s co‑ed volleyball club, while cheering on the San Antonio FC soccer
    team and keeping fit with spontaneous dance‑based cardio sessions that double as TikTok content.
  arts: Mirtia Saenz channels their vibrant energy into folkloric dance routines and reggaeton choreography set to Bad Buny beats, while their sketchbook captures colorful street scenes inspired by the
    graphic novel series 'Saga' and the street‑art stylings of local muralist Carlos Márquez.
  travel: Mirtia Saenz prefers spontaneous day trips over meticulously planned vacations; they frequently wander the San Antonio River Walk and have taken a weekend bus ride to Austin’s music scene, while
    dreaming of a future backpacking adventure through Oaxaca’s culinary markets when finances allow.
  culinary: Mirtia Saenz’s kitchen is a bustling lab where they perfect family‑style tacos and tamales, often sprinkling them with smoky chipotle, fresh cilantro, and a splash of lime, while experimenting
    with fusion twists like pineapple‑infused salsa and cauliflower‑crust quesadillas, showcasing a palate that balances tradition with teenage boldness.
  core: Mirtia Saenz is a 16‑year‑old bilingual dreamer who fuses folk dance with TikTok flair, worries about the future while juggling impulsive spending and spontaneous sketches, turning everyday stress
    into creative bursts.
background:
  cultural: Mirtia comes from a Mexican‑American family that speaks Spanish at home and celebrates cultural traditions such as Día de los Muertos, Mexican Independence Day, and Catholic holidays. Growing
    up in San Antonio’s vibrant Bexar County, she is immersed in a blend of Mexican heritage and Texan influences, enjoying both authentic Mexican cuisine and Tex‑Mex fusion dishes. Family bonds and community
    ties are central to her identity, and she values collectivism, hospitality, and respect for elders. This bicultural environment shapes her worldview, encouraging her to navigate both American school
    life and Mexican cultural practices, and it informs her desire to give back to her community.
