personas:
  professional: Gary Penton, an aspiring heavy‑equipment mechanic, combines his hands‑on auto‑shop experience, meticulous note‑keeping, and reserved demeanor to troubleshoot farm tractors and small engines,
    and his habit of worrying about missing a detail drives them to double‑check every weld before moving on.
  sports: Gary Penton spends weekends hiking the Medicine Bow Mountains, fishing the North Platte River with the local Anglers' Club, hunting elk during season, and cheering on the Wyoming Cowboys football
    team on game days.
  arts: Gary Penton devotes their free time to reading classic science‑fiction by Isaac Asimov and non‑fiction engineering titles, while unwinding to the ambient synth of Vangelis and the southern rock
    of Lynyrd Skynyrd.
  travel: Gary Penton prefers low‑key road trips to rugged national parks like Yellowstone and Grand Teton, carefully plans routes but leaves room for spontaneous night‑time stargazing sessions in remote
    desert locations such as Great Basin.
  culinary: Gary Penton favors hearty, no‑frills meals such as grilled trout with lemon, elk stew with root vegetables, and smoked jerky, often pairing them with a strong black coffee brewed at home.
  core: Gary Penton is a quietly diligent 18‑year‑old who merges mechanical curiosity with a love for solitary wilderness, balances meticulous planning with a habit of late‑night gaming, and tends to over‑worry
    about every detail.
background:
  cultural: Gary comes from a multi-generational white family that has lived in the high-desert and foothill region of Wyoming for several decades. The community in Rawlins is tight-knit, with a strong
    emphasis on self-reliance, respect for the land, and a modest, conservative work ethic. Family gatherings often revolve around outdoor activities, county fairs, and church events, reinforcing values
    of responsibility, modesty, and neighborly cooperation. While exposed to the legacy of ranching and coal-mining that shaped the local economy, Gary also appreciates the frontier spirit of independence
    and practical ingenuity. His cultural upbringing blends traditional western American customs with the occasional influence of nearby Native American history, which he learns about through local museums
    and school curricula.
attributes:
