  hobbies: '[''Fishing and fly-fishing'', ''Hiking and trail exploration'', ''Hunting'', ''Reading science-fiction and engineering non-fiction'', ''Model airplane building and flying'', ''Strategy video
    gaming'', ''Volunteer equipment maintenance and computer tutoring'', ''Stargazing'']'
  career_goals: Gary aims to enroll in a technical college to earn certifications in welding and heavy-equipment maintenance, with the goal of securing a stable, well-paid position in the regional energy
    or construction industry. He envisions, over the next five to ten years, working as a journeyman welder on pipeline projects while continuing to expand his knowledge of new welding technologies. Long-term,
    he hopes to combine his practical skills and entrepreneurial spirit by opening a small auto-repair and equipment-service shop serving the Rawlins community. He values steady income, job security, and
    the ability to apply his curiosity to solve real-world problems, and he is willing to take on apprenticeships or entry-level roles to build experience.
