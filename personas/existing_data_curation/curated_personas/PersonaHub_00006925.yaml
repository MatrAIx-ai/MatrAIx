persona_description: A horticultural researcher and geneticist specializing in the breeding and selection of azalea species, with a particular focus on developing resistance to biotic stress and pests such
  as Phytophthora citricola Saw and Cylindrocladium spp. The researcher is also experienced in using bio-assays on azalea cuttings to screen for genetic variation and resistance to pests, and has recently
  discovered a genetic variation in susceptibility to Polyphagotarsonemus latus Banks. The researcher is actively seeking support for the hypothesis that this genetic variation might play a role in the
  defense mechanism of the azalea plant.
