  hobbies: '[''recreational softball'', ''Texas‑style barbecue cooking'', ''fishing at Lake Houston'', ''DIY home improvement'', ''truck restoration'', ''volunteering at community garden'', ''attending
    Texas State Fair'', ''classic rock music'', ''karaoke nights'']'
  career_goals: Jason aims to move into a supervisory role within his current landscaping firm, obtaining the Certified Landscape Technician (CLT) credential to formalize his expertise. Over the next five
    years, he plans to launch his own small landscaping business focused on environmentally friendly, low‑maintenance designs that serve residential neighborhoods in Cypress and the broader Harris County
    area. He also hopes to mentor younger crew members, sharing his practical knowledge while staying open to innovative horticultural trends.
