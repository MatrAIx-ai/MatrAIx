personas:
  professional: Jason Rios, a 41‑year‑old landscaping specialist with over two decades of hands‑on experience, blends practical curiosity with a relaxed approach to planning, leading crews in turf management,
    irrigation design, and native‑plant installations while pursuing the Certified Landscape Technician credential and dreaming of launching an eco‑friendly landscaping business in Cypress.
  sports: Jason Rios, a dedicated member of a local recreational softball league, spends Saturday mornings on the diamond with the Cypress Softball Club, follows the Houston Astros and Houston Texans avidly,
    and casts lines at Lake Houston during the off‑season, often sharing fish tales with the Houston Anglers Association.
  arts: Jason Rios, a classic‑rock aficionado who cranks out Led Zeppelin and The Rolling Stones on a vintage vinyl player, frequently joins karaoke nights at O’Malley’s Bar belting out Sweet Caroline,
    and attends the annual Texas State Fair to catch live country‑rock performances by local acts like The Texas Gentlemen.
  travel: Jason Rios prefers spontaneous road trips over meticulously planned vacations, often taking the family on weekend escapes to Hill Country vineyards, a quick jaunt to Austin for live music, or
    a fishing adventure at Lake Texoma, while keeping an eye on budget‑friendly lodging and fuel costs.
  culinary: Jason Rios, an enthusiastic pitmaster, gravitates toward Texas‑style barbecue—slow‑smoked brisket, dry‑rubbed ribs, and jalapeño‑infused sausage—while also experimenting with grilled catfish
    caught from Lake Houston and pairing dishes with homemade coleslaw and spicy Texas chili.
  core: Jason Rios is a pragmatic yet curious 41‑year‑old who blends eco‑friendly landscaping expertise with a love for backyard BBQ, community softball, and spontaneous fishing trips, all while juggling
    a relaxed approach to planning and occasional financial splurges.
background:
  cultural: Jason was raised in Cypress, a suburban community within Harris County, Texas, in a middle‑class white family that values Southern hospitality and community involvement. He grew up immersed
    in Texas traditions—high school football games, church gatherings, and weekend barbecues—while also being exposed to the diverse cultural tapestry of the greater Houston area. This blend of Southern
    roots and a multicultural metropolitan environment shapes his approachable demeanor, love of group activities, and openness to incorporating native regional flora into his landscaping work.
attributes:
  skills: '[''turf management'', ''plant identification and care'', ''irrigation system design and troubleshooting'', ''soil testing and amendment'', ''equipment operation and maintenance'', ''basic landscape
