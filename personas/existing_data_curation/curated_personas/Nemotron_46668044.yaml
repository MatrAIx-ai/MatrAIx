  career_goals: Erian dreams of turning his love for art and technology into a career as a video game designer or digital animator. He hopes to attend a specialized high‑school arts program, build a strong
    portfolio of indie game prototypes, and eventually study graphic design or interactive media at a university. He also envisions using his skills to create community workshops that blend art, technology,
    and cultural storytelling for younger kids in Petaluma.
