personas:
  professional: Sung Erian is a budding digital artist and Minecraft world‑builder who merges hand‑sketching, tablet painting, and interactive level design, channeling their curiosity and relaxed, sometimes
    disorganized, approach into creative projects that often evolve late in the school semester.
  sports: Sung Erian is an energetic point‑guard for the local YMCA Under‑15 basketball team, a devoted fan of the Golden State Warriors and San Jose Earthquakes, and spends weekend afternoons shooting
    hoops at the community park, though their competitive streak sometimes leads them to brush off team drills in favor of solo practice.
  arts: Sung Erian devotes after‑school hours to sketching original characters, animating them on the Procreate app while strumming guitar chords inspired by indie artists such as Clairo and Tame Impala,
    and they regularly visit the Santa Rosa Art Fair to admire works from local street artists and Ghibli‑inspired creators.
  travel: Sung Erian loves exploring the red‑wood‑lined trails of Sonoma County, has road‑tripped to Yosemite and Lake Tahoe with family, and dreams of backpacking through Tokyo to attend a manga convention,
    preferring spontaneous weekend getaways over meticulously planned tours because of their relaxed attitude toward obligations.
  culinary: Sung Erian’s palate gravitates toward cheesy margherita pizza, sushi rolls, and spicy chicken tacos; they can whip up a quick ramen bowl using store‑bought broth and enjoy sour gummy bears while
    gaming, though they habitually skip vegetables and forget to stay hydrated.
  core: Sung Erian is a curiosity‑driven teen who blends sketching, gaming, and guitar riffs into a vibrant, slightly chaotic creative life, constantly juggling spontaneous projects while battling a laid‑back
    vibe that can derail deadlines.
background:
  cultural: Erian is a second‑generation Vietnamese‑American who grew up in a bilingual household where both English and Vietnamese are spoken. His family celebrates Tet and Mid‑Autumn Festival, often preparing
    traditional dishes like pho and bánh chưng. He attends a weekend Vietnamese language class at a community center, which reinforces his cultural identity. While he embraces his heritage through food,
    music, and family stories, he also fully engages with the multicultural environment of Petaluma, participating in local youth art programs and extracurricular clubs that reflect a blend of his Southeast
    Asian roots and Californian upbringing.
