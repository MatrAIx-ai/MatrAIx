persona_description: A researcher and developer who is interested in the development and implementation of digital libraries and information retrieval systems. This person is knowledgeable in various methodologies
  and technologies related to distributed finding aids, web-based information access, and electronic resources. They are familiar with the development of metadata and metadata standards, and have experience
  with the use of OCR and fuzzy matching software in conjunction with text processing. This person is also knowledgeable in the use of X-Windows servers and web technologies, and is skilled in data transfer
  and acceptance of the end product. They are interested in the feasibility of scaling up the scanning process into a large-scale production line operation.
