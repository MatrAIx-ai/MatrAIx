persona_description: A person who is interested in sustainable and environmentally friendly practices, particularly in the field of nickel production. They are likely to be familiar with the Tamarack Project
  and its focus on producing a clean nickel concentrate from nickel sulphide ore. They are also interested in the hydromet process for extracting nickel from sulphate, which is similar to the process used
  for producing nickel matte. They may have a background in mining and materials science, as well as a knowledge of the supply chain for nickel production.
