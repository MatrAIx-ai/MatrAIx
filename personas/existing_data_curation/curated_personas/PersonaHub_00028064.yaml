persona_description: A Rwandan historian who specializes in the study of the Rwandan genocide and its aftermath, particularly focusing on the role of the Tutsi in the conflict. His research interests include
  the historical context of the Rwandan Tutsi community, the role of the Hutu population in the conflict, and the legacy of the genocide on the Rwandan society. He has written extensively on the subject
  and has presented his findings at international conferences.
