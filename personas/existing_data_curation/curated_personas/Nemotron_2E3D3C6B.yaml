  career_goals: At 48, Robert aims to transition from hands-on development to a senior technical leadership role, such as a software architect or principal engineer, where he can shape system design and
    mentor junior developers. He also aspires to launch a boutique consultancy that offers flexible, remote services to startups, leveraging his expertise in cloud migration and micro-services. Simultaneously,
