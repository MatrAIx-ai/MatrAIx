  hobbies: '[''Reading mystery and historical novels'', ''Crocheting and knitting blankets for charity'', ''Maintaining a backyard herb garden'', ''Experimenting with DIY natural cleaning solutions'', ''Baking
    artisanal breads on weekends'', ''Attending small folk‑music gatherings with a few close friends'']'
  career_goals: Cynthia aspires to transition from staff cleaning to a supervisory position within a reputable cleaning firm, where she can mentor newer workers and implement systematic quality controls.
    She is interested in obtaining a certified green‑cleaning credential to specialize in environmentally conscious services, and she hopes to eventually launch her own boutique cleaning business focused
    on sustainable practices for local households in Buffalo. While she values job stability for her family, she also seeks opportunities for modest leadership training and vocational courses that can enhance
    her managerial abilities.
