personas:
  professional: Cynthia Coursey, a seasoned residential and small‑business cleaning specialist, blends deep‑cleaning precision with eco‑friendly techniques, designs streamlined workflows, and mentors new
    staff with a calm yet assertive demeanor that reflects her curiosity for innovative practices and practical problem‑solving.
  sports: Cynthia Coursey, a modest fitness enthusiast, enjoys leisurely walks in Buffalo’s waterfront park and occasional community gardening hikes, follows the Buffalo Bills and Sabres faithfully, and
    participates in a seasonal adult softball league for fun rather than competition.
  arts: Cynthia Coursey, an avid reader of Agatha Christie mysteries and Hilary Mantel’s historical novels, regularly attends intimate folk‑music shows featuring Gillian Welch and local Buffalo group The
    Dames, and expresses her creativity through crocheting intricate blankets inspired by the narratives she loves.
  travel: Cynthia Coursey, a spontaneous weekend explorer, loves day trips to Niagara Falls and Letchworth State Park, dreams of a cultural pilgrimage to Dublin’s folk‑music venues, and often plans low‑key
    getaways to the Adirondacks that fit her modest budget and family commitments.
  culinary: Cynthia Coursey, a modest home baker, delights in making rosemary‑infused scones, herb‑laden lemon‑basil pesto, and batch‑baked whole‑grain banana bread using fresh thyme and mint from her garden,
    while also crafting DIY cleaning solutions with vinegar and citrus peels.
  core: Cynthia Coursey, a curious yet practical 30‑year‑old, transforms solitary hobbies into sustainable habits, balances a relaxed approach to obligations with occasional anxiety‑driven worry, and aspires
    to lead a green‑cleaning venture that blends her love for community service with eco‑conscious entrepreneurship.
background:
  cultural: Cynthia is a third‑generation white American of Irish‑German heritage, raised in the Buffalo suburb of Amherst. Her family’s values emphasize hard work, modesty, and community involvement, reflected
    in her participation at the local church’s food‑bank drives and neighborhood clean‑up events. Growing up in western New York, she was shaped by the region’s seasonal rhythms—long, snowy winters and
    vibrant summer festivals—which fostered a deep appreciation for home comfort and seasonal traditions such as preparing hearty stews and celebrating local holidays. While her formal education concluded
    with a high school diploma, she has cultivated practical knowledge through on‑the‑job experience and informal community workshops.
attributes:
