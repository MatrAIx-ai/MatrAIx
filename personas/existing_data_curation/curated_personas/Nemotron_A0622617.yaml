personas:
  professional: Rina Royals excels as a tech support specialist, leveraging hands‑on troubleshooting expertise, clear communication, and a relaxed‑yet‑flexible work style to resolve Windows and macOS issues
    while they often improvise documentation on the fly.
  sports: Rina Royals fuels their love of the outdoors by joining the Orange County Hiking Club for weekend trail treks and occasional beach‑volleyball games, while they cheer on the Los Angeles Dodgers,
    Los Angeles Lakers, and the LA Galaxy whenever they can.
  arts: Rina Royals channels their creative side through sunset photography along the Pacific, binge‑listening to tech podcasts, and dancing at live shows headlined by indie artists like Phoebe Bridgers,
    The Strokes, and Billie Eilish, while they host board‑game nights featuring titles such as Catan and Ticket to Ride.
  travel: Rina Royals prefers spontaneous weekend escapes, often backpacking to San Diego’s coastal cliffs or driving up to Yosemite for sunrise hikes, while they save for a dream tech‑conference trip to
    Tokyo and occasional beach‑side retreats in Maui.
  culinary: Rina Royals enjoys experimenting in the kitchen, whipping up spiced shrimp tacos with mango salsa, rosemary‑infused roasted chicken, and homemade ramen bowls topped with soft‑boiled eggs and
    bok choy, all seasoned with fresh cilantro, lime, and sriracha, and they love pairing each dish with a curated playlist of lo‑fi beats.
  core: Rina Royals is a social tech‑savvy enthusiast who blends beach‑side yoga with weekend gadget tinkering, but they often forget to file paperwork on time, turning anxiety into a hyper‑organized digital
    checklist.
background:
  cultural: Rina grew up in a middle‑class White family in Orange, California, surrounded by the suburban lifestyle and diverse cultural fabric of Southern California. Her upbringing combined traditional
    Anglo‑American values—such as self‑reliance, community involvement, and a pragmatic work ethic—with the region’s openness to new ideas and multicultural influences. She attended local public schools,
    where she participated in extracurricular activities like cheerleading and the tech club, fostering both her sociable personality and her curiosity about technology. The proximity to the tech industry
    and the laid‑back coastal culture of Orange County shaped her blend of practicality and flexibility, while community events and beach culture reinforced her love for group activities and outdoor recreation.
attributes:
  skills: '[''Hardware troubleshooting'', ''Windows and macOS support'', ''Remote desktop assistance'', ''Ticket management (e.g., Zendesk, ServiceNow)'', ''Basic networking (TCP/IP, Wi‑Fi setup)'', ''Active
