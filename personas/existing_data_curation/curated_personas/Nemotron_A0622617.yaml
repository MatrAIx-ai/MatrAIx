    under pressure'']'
  hobbies: '[''Hiking local trails and beach outings'', ''Board game nights with friends'', ''Volunteering to teach seniors basic computer skills'', ''Yoga and meditation for stress relief'', ''Listening
    to tech podcasts and reading industry blogs'', ''Photography (landscape and street scenes)'', ''Cooking and trying new recipes'', ''Attending live music concerts'', ''Multiplayer video gaming'', ''Participating
    in community festivals and events'']'
  career_goals: 'Rina aims to advance from her current support specialist role into a senior technical support or system administrator position within the next three years. She plans to earn industry certifications
    such as CompTIA Network+, Security+, and Microsoft Certified: Azure Fundamentals to broaden her expertise. Ultimately, she envisions leading a small IT support team, developing training programs for
    junior staff, and possibly launching a community‑focused tech consulting service that offers affordable troubleshooting for local small businesses and seniors. Balancing career growth with her emotional
    well‑being, she also seeks to incorporate mindfulness practices into her leadership style to foster a supportive workplace culture.'
