  career_goals: Leticia aims to transition into a senior engineering leadership role, such as a Tech Lead or Engineering Manager, where she can shape product strategy and champion inclusive design practices.
    She aspires to mentor more women and Hispanic talent in tech, establishing a mentorship program within her company and partnering with local coding bootcamps. Long‑term, she envisions launching a startup
    that creates culturally adaptive educational tools for bilingual learners, blending her software expertise with her passion for art and community empowerment. She also plans to contribute to open‑source
    projects focused on accessibility and to earn a PMP certification to strengthen her project management capabilities.
