personas:
  professional: Leticia Vega is a seasoned full‑stack software engineer who combines deep expertise in React, Node.js, Python, and cloud platforms with bilingual fluency to design scalable, culturally inclusive
    web experiences, and they channel their organized, methodical mindset into agile leadership and mentorship of junior developers while championing accessibility.
  sports: Leticia Vega stays active by tackling the trails of the Angeles National Forest on Saturday mornings, participates in a local yoga studio’s mindfulness flow classes, supports the Los Angeles Lakers
    and LA Dodgers from their Rowland Heights home, and joins a recreational women’s soccer league affiliated with LAFC during the spring season.
  arts: Leticia Vega paints vibrant canvases that fuse Frida Kahlo‑inspired folk motifs with Shepard Fairey’s bold street‑art geometry, regularly visits LACMA, The Broad, and the Getty to study works by
    Yayoi Kusama and Takashi Murakami, and captures candid community moments through street photography that they share on an Instagram feed devoted to contemporary Mexican‑inspired art.
  travel: Leticia Vega plans trips with the same meticulous care they apply to code, preferring week‑long cultural immersions such as a Día de los Muertos celebration in Oaxaca, a culinary tour of Barcelona’s
    tapas bars, and a serene weekend hike in Kyoto’s Arashiyama bamboo forest, while balancing family commitments and a moderate travel budget.
  culinary: Leticia Vega experiments in the kitchen by deconstructing classic mole poblano and chiles en nogada, blending ancho chilies, epazote, and chocolate with unexpected ingredients like miso paste
    or quinoa, and they proudly host taco‑fusion dinner parties featuring pineapple‑coconut salsa and roasted corn esquites.
  core: Leticia Vega merges methodical engineering precision with a vivid artistic pulse, never missing a weekend hike or a chance to sketch a mural, while habitually checking market updates during yoga
    and occasionally staying up late to perfect a new fusion recipe.
background:
  cultural: Leticia grew up in a bicultural Mexican‑American household, fluent in both Spanish and English. Mexican traditions such as Día de los Muertos, family reunions, and the celebration of regional
    cuisines remain central to her identity. She carries these values into her everyday life in Rowland Heights, a vibrant community with a strong Mexican heritage. Her culinary experiments often feature
    family recipes passed down from her grandparents, while her appreciation for art draws from both Mexican folk motifs and contemporary LA street art. Leticia’s cultural perspective informs her professional
    work, prompting her to advocate for inclusive user experiences that respect linguistic diversity and cultural nuance. She is active in local cultural organizations, volunteering at events that promote
    Mexican heritage and supporting initiatives that empower Hispanic youth in STEM.
