personas:
  professional: Luciano Restrepo, a nine‑year‑old who loves the rhythm of daily farm chores, imagines growing up as a small‑town veterinarian, where they can combine their caring nature with hands‑on work
    while still having room for spontaneous sketching of animal cartoons.
  sports: Luciano Restrepo, a nine‑year‑old soccer enthusiast, trains every Saturday with the Mullen Youth Soccer Club, idolizes the disciplined style of the Nebraska Cornhuskers, and thrives on familiar
    drills while they occasionally invent spontaneous mini‑games during rain pauses.
  arts: Luciano Restrepo, who spends afternoons sketching cartoons in the vein of Bill Watterson’s Calvin and Hobbes, constructs whimsical LEGO models while humming traditional folk melodies, and they lose
    themselves in adventure tales by Enid Blyton for their comforting happy endings.
  travel: Luciano Restrepo, who prefers well‑planned road trips, eagerly anticipates family visits to the bustling capital city for Día de los Muertos celebrations, and they dream of a future summer camp
    adventure in the rolling hills of Colorado, though a limited allowance makes such journeys a special treat.
  culinary: Luciano Restrepo, a budding kitchen helper, relishes chicken tacos drenched in fresh cilantro, lime juice, and salsa roja, enjoys hand‑rolling tamales on rainy afternoons, and often experiments
    with guacamole made from ripe avocados and a pinch of jalapeño, though they sometimes ditch the recipe midway to snack on LEGO‑shaped cookies.
  core: Luciano Restrepo, a nine‑year‑old routine‑lover who balances meticulous LEGO builds with spontaneous cartoon sketches, worries about every missed detail, yet they brighten errands with cheerful
    soccer kicks.
background:
  cultural: Luciano’s family hails from Jalisco, Mexico, and maintains strong cultural traditions while living in the small rural town of Mullen, Nebraska. Spanish is spoken at home alongside English, and
    the family celebrates Día de los Muertos, Posadas at Christmas, and enjoys cooking tacos, tamales, and other Mexican dishes. Community events at the local church often include Mexican folk dances and
    music, giving Luciano a bicultural upbringing that blends the practical, hands‑on values of rural Nebraska with the vibrant customs of his Mexican heritage.
