  hobbies: '[''playing soccer'', ''building LEGO models'', ''reading adventure books'', ''helping with farm chores'', ''listening to Mexican music'', ''drawing cartoons'']'
  career_goals: Luciano dreams of working with animals one day, perhaps as a veterinarian or wildlife rescue worker, because he loves the farm animals on his family’s property. He also admires the local
    firefighters and imagines joining them to protect his community. His practical mindset pushes him toward hands‑on jobs, but his tendency to worry makes him cautious; he often tells himself he needs
    to study hard now to achieve his goal and sometimes worries about whether he’ll be able to keep up with the training.
