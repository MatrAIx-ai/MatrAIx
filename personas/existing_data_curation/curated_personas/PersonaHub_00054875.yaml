persona_description: A political scientist who specializes in the study of mass shootings and their causes, with a particular interest in the motivations and attributions behind these tragedies. Their research
  has been published in several high-impact journals, and they have conducted extensive surveys and interviews to understand the public's understanding of these incidents. They are known for their expertise
  in attributing mass shootings to individual reasoning that is primarily motivated by existing dispositions and accuracy motives, and they have conducted research to explore the significance of these motivations
  and whether they condition accuracy in attributions. They are likely to be interested in understanding the public's understanding of mass shootings and their attributions, and they may have insights into
  how education and other factors influence these attributions.
