persona_description: A paleontologist who specializes in the study of the evolution of mollusks, particularly those from the Turkana Basin in East Africa. He is passionate about documenting the evolution
  of life and has a keen interest in the punctuated equilibrium model of evolution. His research is meticulous and based on hard evidence, and he is known for his ability to correlate rapid speciation with
  environmental events. He is a vocal advocate for the idea that the underlying unit of macroevolutionary change is the species and that evolutionary change at the species level is achieved by revolutionary
  periods of extreme developmental instability. He is also interested in the implications of the Turkana Basin sequence for evolutionary theory, including the documented restriction of significant evolutionary
  change to speciation events and the fact that evolutionary change at the species level is shown to be punctuated and achieved by revolutionary periods of extreme developmental instability.
