  hobbies: '[''Gardening'', ''Cooking traditional Mexican cuisine'', ''Walking with community club'', ''Card games and dominoes'', ''Church senior group activities'', ''Attending local cultural festivals'',
    ''Learning tablet/computer use'', ''Volunteering at senior center'', ''Listening to mariachi and ranchera music'']'
  career_goals: Although officially retired, Anibal aims to mentor younger community members by leading hands‑on workshops at the local community center, sharing his practical knowledge in home repair,
    gardening, and cooking. He wishes to document his life story and family recipes in a small memoir that can be passed down to future generations. Anibal also plans to develop a mentorship circle for
    seniors interested in learning new technologies, helping them stay connected with their families. Finally, he aspires to continue volunteering as a coordinator for neighborhood cultural festivals, ensuring
    Mexican traditions remain vibrant in Fontana.
