  hobbies: '["Reading nature and science books", "Building LEGO models", "Exploring woods and birdwatching", "Drawing and sketching animals", "Playing board games with close friends", "Conducting simple
    science experiments", "Helping with household chores and community tasks", "Collecting rocks and leaves"]'
  career_goals: Although he is only eight, Patrick already imagines a future where he can combine his curiosity about how things work with his desire to help others. He dreams of becoming a science teacher
    or a park ranger, roles that let him share knowledge and protect the natural world. He also envisions working as a community volunteer or a youth mentor, using his organized, reliable nature to support
    classmates and neighbors. In the short term, he aims to excel in school, join the school’s science club, and participate in local service projects.
