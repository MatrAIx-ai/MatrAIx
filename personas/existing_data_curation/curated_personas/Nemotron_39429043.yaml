  hobbies: '["Back‑yard vegetable gardening", "Bass fishing", "Woodworking (birdhouses, tool chests)", "Reading historical nonfiction and logistics journals", "Crossword puzzles", "Classic‑rock dance nights
    at the senior center", "Volunteer work at the town fair", "Nature photography", "Attending local history club meetings"]'
  career_goals: Miguel is focused on a phased retirement that lets him leverage his decades of postal experience while ensuring financial security for his family. In the near term, he plans to earn the
    remaining credits toward a Bachelor’s degree in Business Administration, complemented by a Professional Logistics Certification, to broaden his understanding of supply‑chain management. He also seeks
    to be recognized as a mentor for newer carriers, offering informal training sessions and serving on a USPS safety committee to improve route conditions. Competitive by nature, Miguel hopes to finish
    his career as the top‑scoring carrier on his route, earning the final "Carrier of the Year" honor. Post‑retirement, he envisions converting a portion of his property into a small organic garden or CSA
    plot, combining his interest in farming with community outreach, and possibly authoring a memoir that chronicles the evolution of mail delivery over the past half‑century.
