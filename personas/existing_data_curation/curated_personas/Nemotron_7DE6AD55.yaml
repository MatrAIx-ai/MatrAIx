personas:
  professional: Eun Chen, a 24‑year‑old retail salesperson in Federal Way, blends a keen visual sense with strong customer‑service skills to design eye‑catching product displays and nurture a friendly store
    atmosphere, while actively seeking a supervisory role that will let them shape the overall brand experience and mentor new staff.
  sports: Eun Chen follows the Seattle Seahawks and Seattle Kraken, hikes regularly with the Snoqualmie Trails Club on weekends, enjoys yoga sessions at a local studio, and they occasionally join pickup
    volleyball games at the community park, balancing a love for outdoor activity with occasional missed workouts due to busy shifts.
  arts: Eun Chen dives into the local arts scene, frequenting museum exhibitions featuring contemporary painters like Kehinde Wiley and watercolor masters such as John Marin, attends indie shows headlined
    by Mitski and Phoebe Bridgers, and they spend evenings crafting hand‑made jewelry while curating inspiration boards on Pinterest.
  travel: Eun Chen favors spontaneous, budget‑friendly road trips along the Pacific Northwest—recently exploring Portland’s food carts, camping on the San Juan Islands, and day‑tripping to Vancouver—while
    dreaming of longer stays in culturally rich cities like Kyoto and the beachside villages of Bali, always hunting for affordable boutique hostels.
  culinary: Eun Chen loves experimenting with globally inspired flavors, frequently cooking ramen with miso broth, whipping up bao buns filled with kimchi and pork belly, and blending gochujang, soy sauce,
    and fresh cilantro in fusion dishes, yet they rate themselves as a “home‑chef hobbyist” rather than a culinary expert.
  core: Eun Chen is a socially vibrant, art‑obsessed retail professional whose curiosity fuels creative projects, and they often find that their relaxed approach to planning leads to last‑minute scrambles,
    budget splurges, and occasional stress‑induced anxiety.
background:
  cultural: Eun is a second‑generation East Asian American; her parents immigrated from Taiwan and raised her in a bilingual household that blends Mandarin and English. Family traditions such as celebrating
    Lunar New Year, the Mid‑Autumn Festival, and preparing home‑cooked festive meals remain important, fostering a strong sense of cultural identity and community. Growing up in the multicultural suburbs
    of Federal Way, she was exposed to a diverse population and a lively Asian‑American community, which reinforced her appreciation for cultural diversity, contemporary art, and inclusive social spaces.
    The family's emphasis on respect, harmony, and education has shaped her cooperative and considerate nature.
attributes:
  skills: '["Customer service", "Sales techniques", "POS system operation", "Inventory management", "Visual merchandising", "Basic graphic design", "Written and verbal communication", "Team collaboration",
    "Conflict resolution", "Social media content creation"]'
  hobbies: '["Visiting art galleries and museums", "Watercolor painting", "Hand-crafted jewelry making", "Karaoke with friends", "Hiking in Washington state trails", "Trying new restaurants (especially
    Asian fusion)", "Attending community cultural festivals", "Curating design mood boards on Pinterest", "Yoga and mindfulness practice", "Photography"]'
  career_goals: Eun aspires to move beyond floor sales and take on a supervisory or managerial role where she can shape the customer experience and mentor new staff. She hopes to merge her interest in art
    and design with retail by specializing in visual merchandising or brand marketing for lifestyle brands that celebrate cultural diversity. In the longer term, she dreams of opening a boutique or online
    shop that curates Asian‑inspired accessories, sustainable home goods, and locally made art, creating a community space for cultural exchange. To support these goals, she plans to finish her associate
    degree and take courses in marketing, digital media, and design while building a portfolio of visual projects.
