personas:
  professional: Zvi Nguyen is a three-year-old classroom assistant who delights in arranging toys by color and size, using the tidy habits they've learned to help the teacher keep the play area organized
    and demonstrating an early knack for leadership in group activities.
  sports: Zvi Nguyen loves the kinetic fun of toddler soccer at the Little Kickers club, they always chant cheers for the local professional team the Seattle Sounders FC during matches, and they eagerly
    look forward to seasonal splash pads in summer and indoor gymnastics in winter.
  arts: Zvi Nguyen enjoys singing along to Disney classics like "Let It Go" by Idina Menzel and drawing vibrant pictures of their favorite Sesame Street characters, they often mimic the expressive moves
    of dancer Misty Copeland in playful dance sessions at home.
  travel: Zvi Nguyen’s travel adventures include stroller‑friendly trips to the nearby aquarium and a family road‑trip to the Grand Canyon, and they dream of one day visiting the magical realms of Disneyland
    in California, preferring guided tours that cater to their need for routine and safety.
  culinary: Zvi Nguyen prefers soft, bite‑size foods such as chicken nuggets, macaroni and cheese, and strawberry slices, often insisting on using a small plastic fork they can handle, and they show a particular
    fondness for the sweet crunch of honey‑glazed carrots.
  core: Zvi Nguyen is a three‑year‑old who blends a love for organized play with boundless social energy, often worrying about tiny mishaps while they delight in group activities, creative songs, and carefully
    saved coins for a beloved toy.
background:
  cultural: Zvi’s family traces its roots to Vietnam, a Southeast Asian country whose language, cuisine, and celebrations shape his everyday life. He hears Vietnamese spoken at home and understands simple
    phrases, while also learning English through preschool and community activities. Family meals often feature pho, rice, and fresh herbs, and he delights in the bright colors of spring rolls. The household
    observes Tet, the Vietnamese Lunar New Year, with red banners, special foods, and visits to a local Buddhist temple in Charlestown. Community festivals, such as the annual Boston Asian American Festival,
    further expose him to a broader Southeast Asian diaspora. These cultural threads blend with his American environment, giving Zvi a bicultural perspective that influences his language, food preferences,
    and social rituals.
