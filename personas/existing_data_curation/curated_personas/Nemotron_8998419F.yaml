  career_goals: Even at three, Zvi already expresses vivid ambitions. He loves watching fire trucks and says he wants to become a firefighter one day to help keep people safe. He also enjoys storytime and
    imagines being a teacher who can share his favorite books. Learning to read and write is a clear goal, as he often asks his parents to read him new words so he can 'write his own stories.' His underlying
    ambition is to be kind and helpful, making friends and assisting others whenever he can.
