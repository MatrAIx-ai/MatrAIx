  hobbies: '[''Hiking'',''Cycling'',''Photography'',''Reading True‑Crime and Psychology'',''Listening to Podcasts'',''Playing Acoustic Guitar'',''Visiting Farmers Markets'',''Coffee Brewing'',''Volunteering
    for Youth Mentorship'',''Participating in Community Events'']'
  career_goals: Leon aims to complete his bachelor’s degree in criminal justice within the next two years and obtain advanced certifications in mental‑health crisis response. Over the next five years he
    plans to be promoted to sergeant and transition into a community liaison role that integrates trauma‑informed policing practices in Ann Arbor. Long‑term, he envisions moving into a supervisory position
    such as lieutenant or police chief, where he can shape department policy to emphasize compassion, cooperation, and community partnership. He also hopes to mentor new officers and contribute to statewide
    training programs on de‑escalation and cultural competency.
