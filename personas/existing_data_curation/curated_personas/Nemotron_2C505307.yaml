  career_goals: Rosina often talks about what she wants to be when she grows up. She likes the idea of helping other children learn, so she imagines becoming a preschool teacher who can create fun, organized
    activities and keep a classroom running smoothly. She also expresses fascination with community helpers like firefighters and nurses, admiring their clear roles and disciplined teamwork. In play, she
    sometimes pretends to be a 'team captain' on a sports field, directing her friends and making sure everyone follows the rules. These ambitions reflect her love for structure, her sociable nature, and
    her desire to contribute positively to a group.
