personas:
  professional: Rosina Hallett, a budding junior architect who loves constructing elaborate block towers, channels their preference for structure and predictability into carefully aligning each piece, while
    their outgoing personality invites friends to join collaborative building sessions that turn playtime into organized teamwork.
  sports: Rosina Hallett, an energetic participant in the Little Rockets preschool soccer club, dashes across the community field on Saturday mornings, proudly waves a tiny flag for the New York Yankees
    during family baseball outings, and, they love splashing through swim lessons at the municipal pool with their peers.
  arts: Rosina Hallett, a budding artist who loves drawing rainbow-filled pictures with Crayola markers, sings along to Raffi's Baby Beluga, and reenacts scenes from Disney's The Little Mermaid with a stuffed
    dolphin, they blend creative imagination with a love for orderly coloring pages.
  travel: Rosina Hallett, an inquisitive explorer who delights in family road trips to the nearby state zoo, enjoys weekend stays at the sunny beach town of Ocean View, and they dream of spotting the Eiffel
    Tower in Paris on a future holiday.
  culinary: Rosina Hallett, a selective yet curious eater who adores creamy macaroni and cheese topped with extra cheddar, loves dipping apple slices in cinnamon-sprinkled yogurt, delights in crunchy chicken
    nuggets with ketchup, and can proudly assemble a peanut butter and jelly sandwich using a plastic knife, they often share their creations with friends during playdates.
  core: Rosina Hallett blends a love for tidy routines with boundless social energy, turning everyday play into organized adventures while they occasionally hoard stickers as a quirky treasure.
background:
  cultural: Rosina is raised in a middle‑class White family in Delray Beach, Florida. Her upbringing blends typical American suburban values—school attendance, regular church services, and holiday celebrations
    such as Thanksgiving, Christmas, and Fourth of July fireworks—with the unique coastal lifestyle of South Florida. Family outings to the beach, local art festivals, and community events expose her to
    a multicultural environment, even though her immediate cultural heritage is primarily Anglo‑American. Her parents emphasize routine, responsibility, and polite social conduct, which align with Rosina’s
    preference for structure and her sociable personality. The diverse neighborhood and tourism‑driven culture of Delray Beach provide her early exposure to a variety of languages and customs, fostering
    openness while maintaining her family's cultural traditions.
