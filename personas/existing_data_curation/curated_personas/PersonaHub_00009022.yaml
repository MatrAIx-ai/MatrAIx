persona_description: A conservation biologist who specializes in the study of the flora and fauna in Kerinci Seblat National Park, particularly the Sumatran tiger and Sumatran rhino. He is passionate about
  the conservation of these species and is dedicated to their protection through research, education, and advocacy. He has conducted extensive fieldwork in the park and has published numerous articles and
  papers on the ecology and conservation of these species. He is also involved in community outreach programs to raise awareness about the importance of conservation and the need for sustainable management
  of natural resources.
