personas:
  professional: Amber Woodward, a 17‑year‑old aspiring Certified Nursing Assistant, blends her farm‑grown hands‑on expertise in livestock care, tractor maintenance, and community event coordination with
    her organized, routine‑driven mindset to deliver reliable, friendly support in volunteer health‑care settings and local garden projects.
  sports: Amber Woodward competes on the co‑ed Edgar High School softball league, cheers for the Nebraska Cornhuskers, rides with the local Edgar Riding Club each Saturday, and fits in morning jogs through
    the farm fields as part of her seasonal fitness routine.
  arts: Amber Woodward sings alto in her church choir, frequently performs in the Prairie Playhouse's seasonal productions, devours contemporary romance novels by Nora Roberts, and relaxes listening to
    country stars like Luke Bryan and Carrie Underwood.
  travel: Amber Woodward prefers structured weekend getaways with family or friends, has toured the Nebraska State Fair, taken a day trip to Carhenge, and dreams of a cross‑country road trip to Yellowstone,
    always packing a detailed itinerary and a supply of homemade trail mix.
  culinary: Amber Woodward enjoys preparing hearty family dishes such as beef stew with fresh rosemary, skillet cornbread, and fried chicken, often seasoning with garden‑grown herbs like thyme and basil,
    and she can whip up a comforting apple pie from a secret grandma recipe.
  core: Amber Woodward is a routine‑loving, community‑driven 17‑year‑old who balances farm chores, horse riding, and theater with a practical eye for detail, occasional procrastination, and a deep love
    for country music.
background:
  cultural: Amber was raised in Edgar, a tiny, predominantly white farming town in Nuckolls County, Nebraska. The community is steeped in Midwestern Protestant traditions, with her family attending a local
    Methodist congregation that anchors many social events and service opportunities. Life revolves around the agricultural calendar—planting, harvest festivals, county fairs—and values of self‑reliance,
    neighborly support, and modesty. The town's close‑knit nature fosters strong intergenerational ties, and activities like 4‑H, church youth groups, and community potlucks shape daily life. These cultural
    influences have instilled in Amber a deep respect for hard work, routine, and harmony within her community.
attributes:
  skills: '[''Animal care (cows, chickens)'', ''Basic farm equipment operation'', ''Childcare and tutoring'', ''Event coordination (community potlucks, church fundraisers)'', ''Cooking and meal preparation'',
    ''Interpersonal communication'', ''Teamwork and collaborative projects'', ''Organizational and time-management skills'']'
  hobbies: '[''Gardening'', ''Horseback riding'', ''Church choir'', ''Community theater'', ''Playing softball'', ''Knitting/crocheting'', ''Volunteering with 4-H club'', ''Cooking family meals'']'
  career_goals: Amber's immediate goal is to earn her high‑school equivalency (GED) by the end of this academic year, opening the door to post‑secondary training. She plans to enroll in a Certified Nursing
    Assistant (CNA) program at a nearby community college, aiming to work in the Nuckolls County nursing home where she can combine her caring nature with steady employment. Long‑term, she hopes to gain
    an agricultural technician certification so she can apply modern practices to her family's farm, eventually taking on a management role or co‑owning a small sustainable farm that supplies local produce
    and livestock. Throughout, she wants to remain active in her community, using her organizational skills to lead volunteer projects and support local youth programs.
