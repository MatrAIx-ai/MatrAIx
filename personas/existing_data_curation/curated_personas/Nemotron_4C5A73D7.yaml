  career_goals: Although retired, Donna aims to remain mentally sharp and socially valuable. She plans to mentor young entrepreneurs at the local senior center, offering occasional workshops on basic financial
    literacy and small‑business budgeting. She hopes to complete a memoir that captures her experiences across the mid‑20th century, and to deepen her knowledge of genealogy and digital photography. Maintaining
    her independence, health, and ability to contribute to her community’s well‑being are her primary ambitions.
