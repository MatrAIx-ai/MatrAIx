personas:
  professional: Anna Epelbaum, a 19‑year‑old aspiring social worker and future art therapist, channels their compassionate listening, meticulous event‑planning, and budding digital illustration skills into
    volunteer‑coordinated art‑based mental‑health workshops, while their curiosity drives them to experiment with unconventional therapeutic techniques despite occasional bouts of self‑doubt.
  sports: Anna Epelbaum, an enthusiastic hiker on the Wissahickon Trail and regular participant in a local YMCA yoga class, stays fit by combining low‑impact cardio with cheering for the Philadelphia Eagles
    in football season and the Philadelphia 76ers during the NBA season, preferring personal wellness over competitive team sports.
  arts: Anna Epelbaum, whose Instagram feed blends watercolor portraits of strangers with moody black‑and‑white photographs of the Schuylkill River, draws creative fuel from the luminous brushwork of Claude
    Monet, the introspective lyrics of Phoebe Bridgers, and the avant‑garde installations at the Philadelphia Museum of Art, often captioning posts with quotes from Maya Angelou.
  travel: Anna Epelbaum, who alternates weekend road trips to historic Old City Philadelphia with aspirations to wander the pastel rooftops of Santorini and explore Berlin’s vibrant street‑art scene, prefers
    meticulously planned itineraries peppered with spontaneous detours to local cafés for sketching sessions.
  culinary: Anna Epelbaum, a self‑taught home chef, delights in crafting lemon‑ricotta pasta, roasted beet and goat‑cheese salads, and turmeric‑infused hummus, sourcing fresh herbs from Reading Terminal
    Market and pairing meals with a chilled rosé while chronicling each experimental dish on their food‑focused Instagram stories.
  core: Anna Epelbaum balances a relentless curiosity for art and human behavior with a habit of over‑analyzing every Instagram caption, often staying up late sketching while worrying about tomorrow’s to‑do
    list.
background:
  cultural: Anna grew up in the suburban community of Abington, Pennsylvania, within a middle‑class, white family that holds roots in the Northeast United States. Her surname, Epelbaum, reflects Ashkenazi
    Jewish heritage; although her household is largely secular, she was exposed to cultural traditions such as holiday gatherings, storytelling, and a strong emphasis on education and community service.
    The diverse demographic of Montgomery County and its proximity to Philadelphia’s vibrant arts scene have fostered her love of museums, live performances, and multicultural events. She attended the local
    public high school, where she participated in the art club and peer‑mentoring program, experiences that reinforced the value of helping others and engaging with a broad range of perspectives.
attributes:
  skills: '["Active listening", "Peer counseling", "Event planning and coordination", "Digital illustration (Canva, Photoshop Elements)", "Traditional sketching and watercolor", "Social media content creation",
    "Microsoft Office and Google Workspace proficiency", "Basic Spanish", "Creative writing", "Stress-management techniques"]'
  hobbies: '["Sketching", "Watercolor painting", "Photography", "Visiting art galleries and museums", "Reading contemporary fiction and poetry", "Creative writing and journaling", "Yoga and meditation",
    "Volunteering at community kitchen", "Volunteering at animal shelter", "Hiking local trails", "Cooking experimental recipes"]'
  career_goals: Anna aims to earn a bachelor's degree in social work or psychology with a minor in visual arts, merging her desire to help others with her love of creative expression. She aspires to become
    a licensed clinical social worker or an art therapist, using art as a therapeutic tool for teens and young adults. In the short term, she plans to gain experience as a volunteer coordinator at a local
    nonprofit, intern at a community mental‑health clinic, and build an online portfolio of artwork and advocacy content. Long‑term, she dreams of founding a nonprofit that offers free art‑therapy workshops
    to underserved youth in the Greater Philadelphia area.
