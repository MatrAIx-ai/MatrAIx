  career_goals: Jovany plans to earn his GED within the next year and pursue a trade apprenticeship in automotive or electrical work, leveraging his mechanical aptitude. He also dreams of starting a small
    mobile food cart that blends classic Mexican street foods with his own creative twists, using his cooking skills and social‑media savvy to attract customers. In the short term, he is exploring entry‑level
    opportunities such as a community‑college prep program and considering enlistment in the Army Reserve to gain structure and benefits.
