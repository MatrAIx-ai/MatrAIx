personas:
  professional: Jovany Jadunandan is an aspiring tradesperson whose hands‑on curiosity drives them to repair busted phones, fix skateboards, and tinker with small circuits, and whose practical mindset has
    them targeting a GED and a trade apprenticeship in automotive or electrical work while simultaneously sketching a mobile food‑cart concept that fuses family‑recipe Mexican street foods with TikTok‑ready
    branding.
  sports: Jovany Jadunandan shreds at the Alamo Skate Club downtown, joins impromptu basketball pick‑up games at the westside park, roots for the San Antonio Spurs and catches the Texas Rangers on TV, and
    follows the Austin FC MLS team for occasional weekend trips, embodying a laid‑back yet competitive approach to staying active.
  arts: Jovany Jadunandan curates a personal soundtrack that swings from Bad Bunny's reggaeton beats to Selena's Tejano classics and Los Tigres del Norte's norteño ballads, captures street‑level photos
    of local murals and skate tricks on their phone for TikTok, and idolizes creators like Marques Brownlee for tech reviews and Susan Snyder for visual storytelling, weaving music and visual media into
    their everyday identity.
  travel: Jovany Jadunandan prefers spontaneous road trips, having already explored Austin's food scene, taken a weekend drive to Corpus Christi's beach for surf practice, and visited the border city of
    Laredo for authentic taco stalls, while dreaming of a future trip to Oaxaca to study traditional mole recipes and capture sunrise shots over the mountains, balancing budget constraints with a love for
    cultural immersion.
  culinary: Jovany Jadunandan spends afternoons in the family kitchen mastering tacos al pastor, carne asada burritos, and chiles rellenos, seasoning with fresh cilantro, lime juice, and chipotle‑smoked
    chilies, while experimenting with fusion twists like pineapple‑infused guacamole, and they proudly showcase each new dish on TikTok, where followers request their secret salsa recipe.
  core: Jovany Jadunandan is a curious, hands‑on teen who balances a love for skateboarding, gaming, and cooking with a practical drive to secure a trade apprenticeship, all while navigating a relaxed,
    slightly disorganized life peppered with spontaneous creativity.
background:
  cultural: Jovany was raised in a Mexican‑American household in San Antonio’s Bexar County, where Spanish is spoken at home and family traditions such as Día de los Muertos, Christmas posadas, and weekend
    tamale gatherings are central to his upbringing. The vibrant Tejano music scene, local Mexican cuisine, and strong sense of community have deeply influenced his values and daily life. While he embraces
    the broader American teen culture—social media, video games, and skateboarding—he remains connected to his heritage through language, food, and community events, shaping a hybrid identity that balances
    cultural pride with contemporary interests.
