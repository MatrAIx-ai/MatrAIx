  career_goals: Brigida hopes to attend a specialized art high school and later study graphic design or animation at university. She dreams of becoming a visual storyteller—whether as a game designer, multimedia
    artist, or creative director—where she can blend her artistic talent, organized mindset, and love for innovative ideas. In the long term, she aims to create culturally rich projects that celebrate her
    Mexican heritage while reaching a global audience.
