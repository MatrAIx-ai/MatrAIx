personas:
  professional: Brigida Nieto, a budding visual artist in middle school, blends meticulous organization with boundless curiosity to produce detailed character sketches and polished digital illustrations,
    and their competitive drive pushes them to seek critique and continuously refine their creative process.
  sports: Brigida Nieto trains with the Saddlebrook Strikers youth soccer team three times a week, attends community dance workshops that blend contemporary moves with traditional Mexican steps, sharpens
    reflexes in local 'League of Legends' e‑sports tournaments, and roots for the Mexican women’s national soccer team and the Dallas Mavericks, illustrating a high‑energy, competitive approach to both
    physical and virtual arenas.
  arts: Brigida Nieto draws inspiration from Studio Ghibli’s whimsical storytelling, Osamu Tezuka’s iconic manga style, and Banksy’s bold street art, while curating a playlist that spans Billie Eilish’s
    moody pop to BTS’s kinetic K‑pop, and finds creative fuel in graphic novels like 'Maus' and 'Saga' as well as Frida Kahlo’s introspective self‑portraits, shaping a vibrant, eclectic artistic identity.
  travel: Brigida Nieto prefers short family road trips, reminisces about a weekend exploring the colorful streets of Guanajuato, dreams of wandering Tokyo’s Akihabara district and Paris’s Musée d’Orsay,
    and plans future vacations around school breaks to maximize their limited allowance and parental permission.
  culinary: Brigida Nieto, an eager young cook, delights in mastering family staples like pork tamales and rich mole rojo, while experimenting with guacamole spiced with chipotle, churros dusted in cinnamon
    sugar, and inventive mash‑ups such as sushi‑style burritos, showcasing a fearless palate that celebrates bold flavors like cacao, cilantro, and roasted chilies.
  core: Brigida Nieto is a creatively competitive 13‑year‑old whose curiosity fuels relentless sketching, soccer scrimmages, and e‑sports battles, yet they often stay up late polishing digital art while
    snacking on chips, balancing disciplined organization with occasional impulsive bursts of energy.
background:
  cultural: Brigida is a Mexican‑American raised in Littlerock, California. She grew up in a bilingual household where Spanish is spoken daily, and Mexican traditions such as Día de los Muertos, quinceañera
    celebrations, and family gatherings are central to her life. The multicultural environment of Southern California, combined with strong family values, shapes her appreciation for both Mexican cultural
    heritage and diverse artistic influences.
