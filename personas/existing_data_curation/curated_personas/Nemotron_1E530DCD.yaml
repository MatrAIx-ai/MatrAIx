  hobbies: '[''Beach Volleyball'', ''Zumba Fitness Classes'', ''Community Theatre (Backstage Volunteering)'', ''Weekly Trivia Nights'', ''Gardening (Vegetable Plot)'', ''Cooking and Recipe Experimentation'',
    ''Reading Mystery Novels'', ''Journaling'', ''Mindfulness Breathing Exercises'']'
  career_goals: Judith aims to advance from first‑line supervisor to Office Manager within the next two years, targeting a position that gives her greater influence over strategic planning and resource
    allocation. She plans to complete a GED program and earn an associate degree in Business Administration, as well as obtain an official Office Management certification to formalize her on‑the‑job expertise.
    Her long‑term ambition is to lead a regional administrative operation or start a boutique consulting service that helps small businesses streamline their office workflows. She also wants to develop
    a mentorship program for entry‑level staff, reflecting both her competitive drive to be recognized as a leader and her desire to reduce the stress she experiences by fostering a supportive team culture.
