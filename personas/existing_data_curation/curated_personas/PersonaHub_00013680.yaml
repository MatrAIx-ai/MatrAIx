persona_description: A historian or archaeologist interested in the study of domestic spaces and household structures. They are particularly interested in the diversity of households found in different
  historical periods and are looking for a comprehensive understanding of the concept of the household. They are likely to be familiar with the theories and methods of archaeological research and have an
  interest in interdisciplinary approaches to historical inquiry. They may have a background in anthropology, sociology, or cultural studies and are interested in how household practices and social structures
  have changed over time. They are also likely to be interested in the role of women and gender in household dynamics and the impact of colonialism and slavery on domestic life.
