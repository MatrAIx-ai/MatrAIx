persona_description: A hydrologist or geologist interested in the study of regional ground-water divisions and their impact on surface water bodies in the Great Lakes Basin of the United States. This persona
  is likely to have expertise in the analysis of ground-water flow and the interpretation of ground-water divide maps, as well as an understanding of the regional hydrologic and hydrogeological processes
  that shape the distribution and behavior of ground water in the region. They may also have experience with multistate or multicounty hydrologic studies and be familiar with the specific aquifers and their
  hydrostratigraphic units in the Great Lakes Basin.
