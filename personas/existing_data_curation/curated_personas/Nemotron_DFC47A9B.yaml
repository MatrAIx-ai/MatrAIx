  career_goals: Christopher aspires to become a software engineer who designs educational technology tools that support students' learning and wellbeing. He is drawn to projects that combine his curiosity
    for new ideas with practical applications, such as apps that help young people manage stress and develop study habits. He also expresses a long‑term interest in environmental science, hoping to work
    on technology that monitors and protects the Hudson River ecosystem. Ultimately, he wants a career that lets him create useful solutions while collaborating with small, supportive teams.
