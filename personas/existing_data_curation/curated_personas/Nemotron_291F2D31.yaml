  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Gardening (native California plants)'', ''Walking/hiking in the Santa Monica Mountains'', ''Volunteering at a senior center'',
    ''Reading historical fiction'', ''Cooking Mediterranean cuisine'', ''Attending community theater'', ''Participating in local book clubs'']'
  career_goals: Melani aims to transition toward a part‑time mentorship and consulting role as she approaches retirement, formalizing her practical knowledge with a certification in supply chain management.
    She plans to develop a concise onboarding program for new order‑fillers, mentor junior staff, and gradually shift to a training coordinator position within the store. Beyond work, she intends to deepen
    her involvement in community arts by volunteering to help organize events at the local cultural center and by sharing her love of art with seniors in her neighborhood.
