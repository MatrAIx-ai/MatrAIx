  hobbies: '[''Visiting art galleries and museums'', ''Exploring local street murals'', ''Reading contemporary fiction and philosophy'', ''Practicing yoga and meditation for anxiety management'', ''Cooking
    Mexican cuisine and experimenting with fusion recipes'', ''Journaling and creative writing'', ''Volunteering at community centers for bilingual tutoring'', ''Listening to indie and traditional Mexican
    music'', ''Participating in small book clubs'', ''Attending workshops on mindfulness and emotional resilience'', ''Hiking in nearby natural areas'']'
  career_goals: Elba aims to move from frontline customer service into a training and development role where she can design empathy‑focused onboarding programs for bilingual staff. Long‑term, she wants
    to combine her education expertise and cultural background to create bilingual curricula and outreach initiatives for Mexican‑American youth and adults, ideally within a nonprofit mental‑health or community‑education
    organization. She seeks leadership opportunities that let her mentor others while maintaining a flexible schedule that supports her own emotional well‑being.
