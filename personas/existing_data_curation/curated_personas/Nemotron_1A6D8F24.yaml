  career_goals: Although no longer in the formal workforce, Alfonso aims to turn his curiosities into community contributions. He hopes to curate a small traveling exhibition of his photographs that highlights
    Yelm’s natural and cultural landscapes, and to mentor youth interested in art and local history through workshops at the community center. He also aspires to compile a memoir that blends personal reflections
    with the town’s evolving story, publishing it in a self‑produced booklet. Flexibility guides his ambitions; he prefers open‑ended projects that allow him to balance creative work with family time and
    spontaneous outings.
