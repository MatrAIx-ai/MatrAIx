  hobbies: '[''building with wooden blocks'', ''crayon drawing'', ''backyard nature exploration'', ''listening to story recordings'', ''simple cooperative games with small groups'']'
  career_goals: Although still in early childhood, Robert often talks about what he wants to become when he grows up. He dreams of being a 'big helper' who can fix things and take care of others—he mentions
    wanting to be a firefighter, a doctor, or a builder. His curiosity about how things work leads him to imagine constructing tall towers or rescuing people, while his practical side envisions using tools
    safely. He also expresses a wish to care for animals, saying he would love to be a veterinarian. These early ambitions reflect his blend of imaginative curiosity and a desire for useful, community‑oriented
    roles.
