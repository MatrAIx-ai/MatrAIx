personas:
  professional: Robert Simonson is an imaginative little architect who eagerly experiments with colorful building blocks, balancing a boundless curiosity for new shapes with a practical knack for keeping
    towers upright, yet often leaves pieces scattered across the playroom, preferring the freedom to rebuild whenever the mood strikes.
  sports: Robert Simonson is a budding athlete who eagerly splashes in toddler swim lessons at the neighborhood Aquatics Club and dribbles a mini soccer ball with the Kiddie Kickers, while their favorite
    professional team is the Seattle Kraken, whose deep‑blue jerseys they adore watching on weekend family TV nights.
  arts: Robert Simonson delights in drawing wobbly dinosaurs with Crayola crayons while humming the catchy tune of "Baby Shark" and the gentle folk melodies of Raffi, and they are especially captivated
    by the whimsical rhymes of Dr. Seuss, which they request to hear before bedtime.
  travel: Robert Simonson loves adventure‑packed family road trips, having explored the Seattle Aquarium's touch pools, squealed with delight at Disneyland's "It's a Small World", and now dreams of strolling
    among the towering cliffs of the Grand Canyon on a future vacation.
  culinary: Robert Simonson enjoys hearty macaroni and cheese made with sharp cheddar, dabs peanut butter and grape jelly on soft wheat bread, and often volunteers to stir the pancake batter, while their
    snack stash of goldfish crackers and banana slices fuels their afternoons.
  core: Robert Simonson blends vivid curiosity for building worlds with a gentle anxiety about losing tiny treasures, prefers spontaneous play over rigid schedules, often leaves toy cars strewn about, and
    quietly negotiates the world from the safety of their cozy corner.
background:
  cultural: Robert is raised in a predominantly White, rural community in Henry County, Kentucky, near Frankfort. His family participates in local traditions such as church potlucks, county fairs, and gardening,
    emphasizing self‑reliance, close family ties, and a modest, community‑oriented lifestyle. The cultural environment blends Southern hospitality with Midwestern practicality, exposing him to folk music,
    seasonal festivals, and a strong sense of place tied to the rolling hills and farmland of central Kentucky.
attributes:
