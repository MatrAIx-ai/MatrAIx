persona_description: A Russian economist who was involved in the implementation and implementation of the New Economic Policy (NEP) in the Soviet Union during the early 20th century. The NEP was a series
  of economic reforms introduced by Lenin in order to address the food shortages and other issues that had arisen due to previous policies. The persona is likely to be knowledgeable about the economic policies
  and reforms of the time period, and may have a deep understanding of the complex economic issues that were faced during this period. They may also be familiar with the key figures and events associated
  with the NEP, such as the introduction of the tax-in-kind system and the impact of the war on the economy.
