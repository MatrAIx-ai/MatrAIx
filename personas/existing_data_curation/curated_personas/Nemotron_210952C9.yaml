personas:
  professional: Tania Reigada, a retired community arts coordinator, blends their methodical planning skills, keen visual eye, and curious spirit to mentor younger immigrants, organize an annual regional
    art exhibit showcasing artists from their community, and document their family's oral history, and they reliably handle volunteer event logistics at the senior center.
  sports: Tania Reigada enjoys low‑impact morning walks in the nearby park while cheering on the Miami Heat during the NBA season, and they participate in the local senior fitness club Sunshine Walkers
    that meets thrice weekly for gentle stretching and light aerobic routines.
  arts: Tania Reigada spends afternoons painting Florida wetlands in watercolor, drawing inspiration from Georgia O'Keeffe’s botanical compositions and the vibrant murals of Fernando Llort, while attending
    monthly book club meetings where they discuss works by Isabel Allende and listening to the soft piano pieces of Ludovico Einaudi.
  travel: Tania Reigada prefers carefully planned, modest‑budget trips, favoring relaxed visits to nearby St. Augustine historic sites and the Everglades National Park, while dreaming of a cultural pilgrimage
    to San Salvador’s National Museum and the cobblestone streets of Antigua, Guatemala, and they often map each itinerary in a notebook before departure.
  culinary: Tania Reigada expertly prepares traditional pupusas with melty quesillo and loroco, simmering hearty sancocho with yucca and plantains, yet also experiments with avocado‑cilantro salsa and roasted
    rosemary potatoes, savoring the tactile joy of hand‑made tortillas and the aromatic blend of cumin, cilantro, and achiote in every meal, and they share recipes with neighbors during community potlucks.
  core: Tania Reigada embodies quiet curiosity, methodical generosity, and a love for solitary brushstrokes, balanced by a stubborn habit of overwatering their herb garden and a weekly ritual of re‑reading
    the same historical novel chapter.
background:
  cultural: Tania was born in Santa Ana, El Salvador, and moved to the United States in her early twenties, eventually settling in Lakeland, Florida. Her upbringing was steeped in Salvadoran traditions—Catholic
    celebrations, folk music, and a strong emphasis on family gatherings and communal cooking. Over the decades she has blended these traditions with Floridian influences, actively participating in local
    Hispanic festivals, teaching younger Salvadoran-Americans about traditional dishes, and preserving cultural crafts such as barro pottery and embroidered textiles. Her Salvadoran identity informs her
    values of community, resilience, and respect for elders, while her long residence in Florida has broadened her appreciation for diverse artistic expressions.
