  career_goals: Although retired, Tania aims to deepen her involvement in the local Salvadoran community, with a goal to mentor younger immigrants in preserving cultural traditions, to document her family's
    oral history through a memoir, and to organize an annual small art exhibit featuring local Hispanic artists. She also hopes to learn watercolor painting techniques to express her appreciation for nature,
    and to cultivate a community herb garden that serves both as a cultural linkage and a teaching space for sustainable living.
