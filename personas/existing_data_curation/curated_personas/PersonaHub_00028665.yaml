persona_description: 'A materials scientist who specializes in the study of carbon steels, particularly their properties and applications. He or she is interested in the wide range of elastic moduli, densities,
  tensile strengths, and heat treatment conditions of carbon steels. The persona is knowledgeable about the different types of carbon steels, including AISI 1005, AISI 1006, AISI 1008, and their specific
  properties. The persona is also interested in the related glossary pages, such as Materials: Alloys: Steel: Stainless Steel: AISI Type 410 and Materials: Alloys: Copper Alloy: Wrought: UNS C67400. The
  persona is likely to be interested in the eFunda pages listing of resulfurized and rephosphorized carbon steels and the AISI A10 series of tool steels.'
