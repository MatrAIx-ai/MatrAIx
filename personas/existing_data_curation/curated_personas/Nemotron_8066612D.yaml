personas:
  professional: Eiko Huang, a seasoned small‑business consultant specializing in cross‑border market integration, leverages advanced Excel modeling, QuickBooks, and basic SAP alongside a pragmatic Mandarin‑English
    negotiation style, yet often lets spreadsheets sit untouched due to a relaxed attitude toward rigid deadlines and a competitive streak that fuels relentless pursuit of client wins.
  sports: Eiko Huang enjoys low‑impact fitness through weekend hikes in the Cleveland National Forest, casual tennis at the local community center, and avidly follows the Los Angeles Lakers and Dodgers,
    yet often postpones gym visits, preferring solitary strolls that align with their relaxed, solitary nature.
  arts: Eiko Huang cultivates artistic expression through meticulous Chinese calligraphy, weekly book‑club discussions of historical fiction by Ken Follett and biographies of pioneering women, and a quiet
    admiration for Yo‑Yo Ma’s cello performances and Ang Lee’s cinematic storytelling, though they reluctantly attend larger gallery openings unless a close friend is present.
  travel: Eiko Huang prefers spontaneous, low‑key travel, having explored the tea fields of Yunnan, the historic temples of Kyoto, and the coastal trails of Monterey, while dreaming of a quiet retreat in
    the vineyards of Napa Valley, always planning trips on a flexible schedule that accommodates occasional community commitments.
  culinary: Eiko Huang delights in crafting fusion cuisine, such as miso‑glazed salmon topped with avocado‑cilantro salsa and locally sourced kale, frequently incorporating fresh herbs from their garden
    like cilantro and basil, while experimenting with mapo tofu infused with heirloom tomatoes—though they sometimes over‑spice dishes in a quest for bold flavor.
  core: Eiko Huang blends disciplined financial acumen with a love for solitary puzzles and garden‑grown flavor, yet habitually procrastinates on paperwork and worries over unseen risks, making them a competitively
    driven but relaxed strategist.
background:
  cultural: Eiko is a second‑generation Chinese‑American who grew up in Southern California. Her household maintained traditional customs such as Lunar New Year, the Mid‑Autumn Festival, and regular use
    of Mandarin, while also embracing the multicultural atmosphere of the region. These cultural roots shape her appreciation for Chinese cuisine, calligraphy, and community values of respect for elders
    and collective well‑being. Living in Corona, she blends these traditions with a Californian lifestyle—garden‑care, outdoor recreation, and a focus on wellness—creating a hybrid identity that informs
    both her personal interests and her professional outlook, especially her desire to help small businesses bridge Eastern and Western market practices.
attributes:
  skills: '[''Financial analysis'', ''Budgeting and cost control'', ''Small business consulting'', ''Advanced Excel modeling'', ''QuickBooks accounting'', ''Basic Python for data analysis'', ''Cross-cultural
