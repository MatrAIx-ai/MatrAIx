  hobbies: '[''Reading historical fiction'', ''Solving Sudoku puzzles'', ''Playing chess'', ''Chinese calligraphy'', ''Herb gardening'', ''Fusion cooking'', ''Nature walks'', ''Small book club participation'',
    ''Volunteering for financial literacy workshops'', ''Attending cultural festivals'']'
  career_goals: She aims to transform her practical expertise into a flexible, part‑time consulting practice that helps local startups and nonprofit groups manage finances with minimal overhead. Within
    the next year she plans to earn a Certified Financial Planner (CFP) designation to deepen credibility. She hopes to build a modest client base that allows her to work from home, set her own schedule,
    and generate a steady supplemental income for retirement. Additionally, she wishes to mentor emerging Asian‑American entrepreneurs through a local incubator, and eventually publish a concise guide on
    pragmatic financial strategies for solitary business owners.
