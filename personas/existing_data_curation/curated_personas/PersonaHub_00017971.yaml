persona_description: A historian or social scientist who is interested in studying the social history of the Roman world during the late Republic and the first two centuries AD. They are looking for a comprehensive
  collection of sources that cover original translations from sources such as inscriptions, papyri, and legal texts. The persona is likely to have a background in Roman history and may have a particular
  interest in the study of social inequality, class games, gladiators and attitudes to violence, the role of slaves in Roman society, economy and taxation, the Roman legal system, and Roman family and gender
  roles. They are looking for a resource that is designed to form the basis for courses in Roman social history and includes extensive explanatory notes, maps, and bibliographies.
