    protocol development'']'
  hobbies: '[''Woodworking'', ''Scale model building'', ''Chess puzzles'', ''Target shooting competitions'', ''Hunting trips'', ''Weekend hikes in the Flint Hills'', ''Reading non‑fiction (medical journals,
    biographies)'', ''Volunteer disaster‑preparedness drills'']'
  career_goals: Marquis aims to advance to a supervisory role within his department within the next two years, eventually aspiring to become an EMS director for the county. He plans to earn a Master’s degree
    in Emergency Management and obtain a Critical Care Paramedic certification to broaden his clinical expertise. Driven by his competitive streak, he seeks to lead a data‑driven quality‑improvement program
    that reduces response times and improves patient outcomes. Long‑term, he envisions establishing a community‑based emergency preparedness initiative and advocating for mental‑health resources for first‑responders
    to address the stress he personally experiences.
