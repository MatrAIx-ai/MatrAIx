personas:
  professional: Norys Pena is a budding visual storyteller who channels boundless curiosity into watercolor scenes and handcrafted projects, thriving in school art clubs where their energetic, sociable
    nature fuels collaborative creativity, while their relaxed, disorganized habits keep the process fluid and playful.
  sports: Norys Pena is a vivacious member of the Bay City Strikers junior soccer squad, spending weekends chasing the ball at the local park, cheering for the professional Harbor FC during televised matches,
    and joining seasonal beach volleyball games with friends, all while their outgoing energy makes them a natural team leader.
  arts: Norys Pena pours imagination onto paper with watercolors reminiscent of Claude Monet's seascapes, sketches fantasy beasts inspired by J.K. Rowling's worlds, and crafts handmade lanterns for neighborhood
    festivals, often listening to reggaetón and plena beats that rhythmically guide their brushstrokes, reflecting a love for vibrant, unconventional art.
  travel: Norys Pena dreams of exploring the sun‑kissed shores of Coral Bay, collects seashells on family trips to the local beach, eagerly plans a future visit to the historic streets of Old San Juan,
    and imagines an adventurous trek through the Amazon rainforest, balancing a love for local excursions with big‑picture wanderlust.
  culinary: Norys Pena loves helping in the kitchen, whisking together mango, coconut milk, and lime for a tropical smoothie, assembling fish tacos with fresh cilantro and pico de gallo, and rolling bright
    tortilla chips for homemade salsa, often tasting the salty sea breeze in their favorite grilled shrimp dish.
  core: Norys Pena is a curious, calm nine‑year‑old artist who blends colorful creativity with boundless energy, turning everyday adventures into vibrant art, music, and friendship.
background:
  cultural: Norys is a proud Puerto Rican girl from Manatí, a town known for its lively festivals and coastal heritage. She grows up in a bilingual environment, speaking Spanish at home and learning English
    at school. Family traditions, such as enjoying meals of arroz con gandules and mofongo, attending the annual Fiestas Patronales, and participating in music and dance celebrations, shape her daily life.
    The island's Afro‑Caribbean rhythms, vibrant street art, and strong community ties influence her artistic interests and her desire to celebrate and preserve her cultural identity.
attributes:
  skills: '["Reading comprehension in Spanish", "Basic English literacy", "Creative drawing and sketching", "Fundamental arithmetic", "Team collaboration in games and projects", "Storytelling and oral expression",
