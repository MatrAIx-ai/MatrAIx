  hobbies: '["Drawing and sketching", "Watercolor painting", "Crafting with recycled materials", "Reading adventure books", "Listening to and dancing to plena and reggaetón", "Exploring local parks and
    beaches", "Collecting seashells and shells", "Playing soccer with friends"]'
  career_goals: Norys dreams of one day becoming an artist who paints vibrant murals that celebrate Puerto Rican culture, a storyteller who shares the island's folklore with children, or a community educator
    who inspires other kids to discover their own creativity. She is also excited about learning more about marine life and hopes to contribute to protecting the beaches near Manatí. These ambitions reflect
    her love for art, curiosity about the world, and desire to make a positive impact on her community.
