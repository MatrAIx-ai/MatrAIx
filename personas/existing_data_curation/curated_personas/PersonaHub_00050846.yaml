persona_description: A neuroscientist who specializes in the development and application of novel techniques to restore function to paralyzed muscles. The researcher is actively working on a new technique
  that uses light to stimulate motor neurons derived from stem cells, which can potentially restore the function of muscles afflicted by motor neuron disease or spinal cord injury. The work is being published
  in Science and is expected to be able to conduct human trials within the next five years.
