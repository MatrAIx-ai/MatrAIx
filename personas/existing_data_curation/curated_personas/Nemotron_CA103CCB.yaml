  career_goals: Louis aims to transition from a skilled installer to a supervisory and entrepreneurial role. In the next three to five years he plans to earn a Certified Drywall Taper credential and complete
    an OSHA 30‑hour construction safety course, formalizing his technical foundation. He envisions starting his own boutique contracting business that specializes in high‑end residential and hospitality
    interiors, offering both functional installations and artistic wall or ceiling finishes that reflect his creative curiosity. To support this, he intends to enroll in a construction management associate
    program at a local community college, build a portfolio of decorative plaster and acoustic ceiling projects, and obtain the necessary small‑business licenses. Parallel to his professional aspirations,
    Louis is committed to developing resilient coping strategies for his heightened emotional reactivity, such as regular mindfulness practice and mentorship, to become a supportive leader for his future
    crew.
