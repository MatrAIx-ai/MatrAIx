personas:
  professional: Tommy Sharma, a retired mechanical engineer turned community program developer, leverages their expertise in CAD, data analysis, and project management to design interdisciplinary workshops
    that blend engineering with art while their curiosity and cooperative spirit make them a sought‑after mentor and volunteer coordinator.
  sports: Tommy Sharma follows the Philadelphia Eagles and Phillies avidly, participates in a local senior softball league called the Green Thumbs, keeps fit with morning walks and weekly yoga classes at
    Riverbend Studio, and they relish the camaraderie of team sports.
  arts: Tommy Sharma, an avid watercolorist, draws inspiration from Andrew Wyeth and Claude Monet, regularly visits exhibitions featuring Ansel Adams photography, and they enjoy live performances by Yo‑Yo
    Ma and Meryl Streep.
  travel: Tommy Sharma delights in planning trips to world‑class art venues, having visited the Louvre in Paris, the Uffizi in Florence, and the Getty Center in Los Angeles, while also exploring nearby
    Lancaster County’s historic farms and they intend to attend the Smithsonian’s National Portrait Gallery exhibition next summer.
  culinary: Tommy Sharma, an enthusiastic home cook, blends comfort cuisine with spice blends from their spouse’s culinary traditions, creating dishes like mac and cheese with a turmeric‑cumin roux, chili
    infused with garam masala, and a lentil dal stew finished with cheddar, and they often share these meals with friends at community potlucks.
  core: Tommy Sharma, a retired engineer turned artistic mentor, balances painting, gardening, and spice‑laden cooking, and they have a habit of over‑cataloguing garden seeds and a love for spontaneous
    watercolor sketches during community meetings.
background:
  cultural: Tommy grew up in a middle‑class, white American household in suburban Pennsylvania, absorbing the region's traditions of community fairs, Fourth of July celebrations, and a strong work ethic.
    Through his marriage to an Indian‑American partner, he embraced a multicultural family life that incorporates Diwali celebrations, Indian culinary practices, and an appreciation for diverse perspectives.
    This hybrid cultural backdrop nurtures his openness to unconventional ideas and fuels his commitment to fostering harmony and inclusivity within his community.
