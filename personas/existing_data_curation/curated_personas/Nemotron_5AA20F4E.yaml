  hobbies: '[''Watercolor painting'', ''Digital photography'', ''Gardening'', ''Fusion cooking (American‑Indian recipes)'', ''Visiting art exhibitions'', ''Community theatre'', ''Genealogy research'', ''Volunteer
    mentoring for youth STEM programs'', ''Traveling to cultural festivals'']'
  career_goals: Now retired from full‑time work, Tommy aims to channel his expertise into volunteer leadership roles. He plans to serve on the advisory board of the local arts council, mentor high‑school
    students in STEM clubs, and develop interdisciplinary workshops that blend engineering concepts with artistic creativity. He also hopes to author a memoir that reflects his cross‑cultural family experiences
    and to travel to major art museums and cultural festivals, enriching his lifelong learning journey.
