persona_description: A historian and archivist who specializes in the study of Black Renaissance writers in Chicago, particularly those who lived and worked in Bronzeville. Their expertise includes the
  writings of Gwendolyn Brooks, Langston Hughes, and Zora Neale Hurston, as well as the history and context of Bronzeville as a Black Metropolis. They have a deep understanding of the cultural and literary
  significance of these writers and their works, and are dedicated to preserving and sharing this legacy with others.
