personas:
  professional: Jamond Seaberry, a veteran fabricator and CNC technician, blends three decades of precision welding, blueprint interpretation, and quality inspection with an inventive curiosity that fuels
    on‑the‑floor problem solving, while their relaxed attitude toward routine paperwork sometimes leads to last‑minute scheduling, yet they assertively champion safety and mentor younger staff.
  sports: Jamond Seaberry enjoys low‑impact fitness activities like Saturday morning walks with the Columbus Community Walking Club, occasional bowling league nights at the local alley, and cheers on the
    Atlanta Falcons (NFL) and Atlanta Hawks (NBA) while occasionally joining a recreational soft‑ball team during the summer.
  arts: Jamond Seaberry frequents the Columbus Trade and Arts Center galleries and the Lagrange‑Meriwether public library to read historical novels and poetry, drawing inspiration from contemporary sculptors
    like Richard Serra and mixed‑media artists such as Yayoi Kusama, and channels this creative energy into their up‑cycled metal sculptures and occasional gospel choir performances.
  travel: Jamond Seaberry prefers spontaneous weekend getaways, often exploring nearby natural spots like the Chattahoochee National Forest in autumn, taking occasional road trips to Asheville, North Carolina
    for its craft fairs, and dreaming of a future cultural pilgrimage to New Orleans for its music scene, all while balancing a modest travel budget that limits extended vacations.
  culinary: Jamond Seaberry enjoys cooking Southern comfort dishes such as shrimp and grits, collard greens, and peach cobbler, often incorporating fresh tomatoes and herbs from their modest garden, and
    while their culinary skill is competent rather than chef‑level, they relish occasional meals at the local eatery where they savor fried catfish and homemade cornbread.
  core: Jamond Seaberry is a curious, steel‑soldering artisan who balances a love for metal sculpture and quiet reflection with a tendency toward stress‑induced worry and occasional disorganization, and
    they often wrestle with procrastination when planning personal projects.
background:
  cultural: Jamond’s roots run deep in the Black Southern tradition of Meriwether County. Raised by a grandmother who taught her the art of soul food cooking, she carries forward recipes of fried chicken,
    collard greens, and peach cobbler that are staples at family gatherings. The local African‑American church has been a cornerstone of community life, offering both spiritual guidance and a venue for
    musical expression, which nurtured Jamond’s love for gospel harmonies. Her family history includes relatives who migrated from the rural South during the Great Migration, bringing with them stories
    of resilience and a strong work ethic that influence her approach to both her career and personal life. Cultural celebrations, such as Juneteenth picnics and the county’s historic African‑American heritage
    festivals, provide Jamond with a sense of belonging and a platform to share her metal art, which often incorporates motifs reflecting her heritage and the natural landscape of West Georgia.
attributes:
  skills: '[''Technical blueprint interpretation'', ''CNC machine operation'', ''MIG/TIG welding'', ''Quality inspection and control'', ''Mechanical troubleshooting'', ''Safety compliance and training'',
    ''Material up‑cycling for artistic projects'', ''Basic CAD drafting'', ''Team mentorship'', ''Flexible problem solving'']'
  hobbies: '[''Visiting art galleries'', ''Reading African‑American literature'', ''Metal sculpture and up‑cycling'', ''Gardening'', ''Participating in gospel choir'', ''Yoga and mindfulness journaling'']'
  career_goals: Jamond hopes to earn a journeyman welder certification within the next two years, which would open a pathway to a supervisory role on the shop floor. She aspires to launch a small side studio
    where she can sell her metal art pieces at local craft fairs and online, turning her curiosity about unconventional design into a modest supplemental income. Additionally, she is interested in joining
    a community makerspace in Columbus, GA, to collaborate on interdisciplinary projects, learn advanced digital fabrication techniques, and possibly mentor other hobbyists. Long‑term, Jamond would like
    to complete a certificate in small‑business management to formalize her entrepreneurial ambitions while finding a healthier balance that reduces her work‑related stress.
