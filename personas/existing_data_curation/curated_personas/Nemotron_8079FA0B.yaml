personas:
  professional: Rahma Duffy, a retired homemaker turned community storyteller and senior‑center mentor, leverages her lifelong budgeting, event‑coordination, and caregiving skills, pairing her routine‑driven
    reliability with a talkative, sociable charm to lead workshops and narrative sessions for older adults.
  sports: Rahma Duffy enjoys low‑impact fitness through daily walks in the Laurelhurst neighborhood and seasonal gardening, supports the Portland Timbers and Trail Blazers from her living room, and participates
    in a senior‑center walking club that meets each Saturday, while sidestepping high‑intensity workouts because of joint pain.
  arts: Rahma Duffy weaves creative threads by quilting with patterns inspired by William Morris, delights in reading Jane Austen and local Portland histories, and frequently attends Oregon Symphony concerts
    and Portland Center Stage productions, all while humming to Ella Fitzgerald’s ‘Summertime’ during garden chores.
  travel: Rahma Duffy prefers carefully planned, low‑stress senior group tours, savors leisurely drives along the Oregon Coast, cherishes past visits to Yosemite National Park and a nostalgic road trip
    to her Midwestern hometown, and dreams of a gentle Mississippi River cruise to reconnect with family memories.
  culinary: Rahma Duffy, an accomplished home cook, delights in preparing classic holiday roast turkey with sage‑stuffed dressing, buttery mashed potatoes, and cranberry sauce, while regularly tossing garden‑fresh
    tomatoes, basil, and zucchini into a rustic ratatouille, and she relishes sharing her beloved apple‑cinnamon crumble at senior‑center potlucks.
  core: Rahma Duffy blends staunch Midwestern routine with Portland’s green‑hearted curiosity, balancing a talkative, community‑centric spirit with a lingering worry about finances and health, and is known
    for knitting a new scarf for every season while never missing her weekly bridge game.
background:
  cultural: Rahma was raised in a mid‑Midwestern white, middle‑class family in the late 1930s and 1940s, where self‑reliance, community service, and regular church attendance shaped her worldview. Her family
    emphasized practicality, routine, and preserving traditions, which aligns with her traditional, pragmatic outlook. In her early forties she moved to Portland, Oregon, where the region’s appreciation
    for nature, local arts, and progressive community values broadened her perspective while she kept her core conventional values. Today, she blends her Midwestern roots—family meals, modest holidays,
    and a strong sense of duty—with Portland’s climate‑friendly gardening, support for local cultural events, and an inclusive, socially vibrant senior community.
attributes:
