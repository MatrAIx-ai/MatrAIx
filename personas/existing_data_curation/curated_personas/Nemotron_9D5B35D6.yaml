personas:
  professional: Mihwa Li, an 85‑year‑old master electrician, leverages six decades of hands‑on wiring, blueprint reading, and smart‑home integration to mentor apprentices with meticulous organization tempered
    by on‑site flexibility, while they remain fiercely competitive against industry standards and skeptical of shortcuts, aiming to certify as a county electrical safety inspector.
  sports: Mihwa Li, an avid walker who joins the Norvelt Senior Walking Club for morning strolls, participates in a local senior bowling league, and follows the Pittsburgh Steelers and Pittsburgh Penguins
    on television, maintains a disciplined yet low‑impact fitness routine through daily walks, gentle stretching, and occasional Tai Chi classes, balancing competitive spirit with age‑appropriate limits,
    and they relish the occasional friendly rivalry on the lanes.
  arts: Mihwa Li, whose evenings are filled with listening to classical piano pieces by composers such as Yiruma and Debussy while sketching in the quiet of their garden, frequently visits the regional
    gallery to admire works by contemporary painter Michael Wright, volunteers at the Norvelt Community Theatre to assist with set lighting, and they practice traditional East Asian calligraphy and vintage
    black‑and‑white photography, weaving artistic appreciation into their daily rhythm.
  travel: Mihwa Li, who prefers meticulously planned, low‑stress itineraries, enjoys weekend trips to nearby historic towns like Williamsburg and the serene gardens of Washington D.C.’s cherry‑blossom festivals,
    dreams of a leisurely Mediterranean cruise that includes stops in Barcelona and the Amalfi Coast, and they balance travel ambitions with a modest pension that restricts long‑haul flights.
  culinary: Mihwa Li, a modest home cook who excels at preparing comforting dishes such as kimchi‑jjigae (spicy kimchi stew), herb‑laden vegetable stir‑fry using home‑grown basil and mint, and classic chicken
    noodle soup, delights in pairing meals with homemade barley tea, and they occasionally treat themselves to a fine‑dining experience at the local farm‑to‑table restaurant for dishes like seared salmon
    with miso glaze.
  core: Mihwa Li, a fiercely curious 85‑year‑old master electrician who balances meticulous organization with a competitive edge, spends evenings knitting scarves while listening to piano, occasionally
    hoarding vintage camera parts, and they insist on double‑checking every electrical code nuance before retirement.
background:
  cultural: Mihwa’s family emigrated from South Korea and China in the early 1950s, bringing with them a strong emphasis on hard work, respect for elders, and community solidarity. Growing up in a close‑knit
    Korean‑Chinese neighborhood in Pennsylvania, she celebrated Lunar New Year, Chuseok, and traditional Chinese festivals, and maintained culinary practices such as kimchi‑making and dumpling preparation.
    These cultural values shaped her meticulous work ethic and sense of responsibility, while also fueling her competitive drive to break gender barriers in the electrical trade. Though fully integrated
    into the Norvelt community, she retains fluency in Korean, participates in a local Korean cultural association, and often incorporates East Asian artistic motifs into her calligraphy and garden design.
attributes:
  skills: '[''Residential wiring'', ''Commercial electrical installations'', ''Circuit troubleshooting'', ''Electrical code compliance (NEC)'', ''Blueprint reading'', ''Smart home system integration'',
    ''HVAC electrical controls'', ''Solar panel wiring'', ''Electrical safety inspections'', ''Mentoring apprentices'']'
  hobbies: '[''Visiting art galleries'', ''Attending local theater'', ''Korean calligraphy'', ''Woodworking'', ''Gardening'', ''Vintage photography'', ''Reading biographies and tech magazines'', ''Volunteering
    at senior center'', ''Electrical safety workshops'', ''Knitting'']'
  career_goals: Mihwa aims to solidify her legacy as a master electrician by obtaining a formal Master Electrician certification and becoming a certified electrical safety inspector for Westmoreland County.
    She hopes to establish a small community workshop where retired tradespeople can teach basic electrical safety and DIY skills to seniors and youth. She also aspires to document her career in a memoir
    that highlights the challenges of being a woman in a male‑dominated trade and to contribute her expertise to the preservation of historic homes in Norvelt through pro‑bono consulting.
