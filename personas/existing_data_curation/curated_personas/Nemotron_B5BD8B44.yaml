personas:
  professional: Abraham Wan, a twenty‑three‑year‑old postsecondary instructor, blends rigorous humanities scholarship with hands‑on digital pedagogy, designing interdisciplinary courses on underrepresented
    literary traditions, Southern history, and cultural studies while they leverage meticulous lesson planning, confident public speaking, and a competitive edge that pushes colleagues toward higher standards.
  sports: Abraham Wan punches the ball in pickup basketball games at the community center, while they cheer for the Dallas Mavericks sporting a vintage jersey, and they belong to a local adult league that
    meets every Thursday, balancing a love for fast‑breaks with a habit of staying late to practice free‑throws.
  arts: Abraham Wan attends weekly jazz jam sessions, improvising alongside local saxophonists while they cite Miles Davis and Thelonious Monk as inspirations, reads speculative fiction authors such as
    Ted Chiang and N.K. Jemisin, and pens poetry that weaves together historic Southern motifs and contemporary social reflections, often sharing readings at community open‑mic nights.
  travel: Abraham Wan, a twenty‑three‑year‑old, enjoys weekend road trips to Southern historic towns like Natchez, Charleston, and Savannah, combining a love of antebellum architecture with a desire to
    scout preservation projects, while they budget modestly and often coordinate trips around academic breaks.
  culinary: Abraham Wan cooks soulful meals like collard greens, cornbread, and sweet‑potato pie for friends, boasts a solid but not professional level of culinary skill, and they treat each gathering as
    a chance to blend culinary storytelling with music, yet they often over‑season dishes in a nervous attempt to impress, leading to occasional burnt edges.
  core: Abraham Wan is a meticulous yet outgoing young educator who channels competitive drive into community‑focused art, sport, and food, while they juggle anxiety‑fuelling worry with a habit of over‑planning
    every facet of life.
background:
  cultural: Abraham grew up in a close‑knit African‑American community in Mobile County, steeped in Southern Black traditions such as gospel music, church participation, storytelling, and communal cooking.
    His family emphasized the legacy of the Civil Rights Movement and the rich oral histories of the Gulf Coast, shaping his appreciation for cultural resilience and social justice. These influences inform
    both his academic focus on African American literature and his commitment to community service, bridging scholarly work with the lived experiences of his cultural heritage.
attributes:
  skills: '[''Curriculum Development'', ''Lesson Planning'', ''Assessment Design'', ''Public Speaking'', ''Academic Writing'', ''Critical Analysis'', ''Research Methodology'', ''Digital Learning Platforms
    (Moodle, Canvas)'', ''Student Mentoring'', ''Cross‑cultural Communication'']'
  hobbies: '[''Basketball'', ''Jazz Music'', ''Reading (Speculative Fiction, African American Novels)'', ''Poetry Writing'', ''Mentoring Youth'', ''Historical Site Tours'', ''Cooking Soul‑Food'', ''Community
    Festival Participation'', ''Mindfulness Meditation'']'
  career_goals: Abraham aims to transition from adjunct teaching to a tenure‑track faculty position at a regional university, where he can formalize interdisciplinary courses that intersect African American
    studies, digital humanities, and community engagement. He plans to complete a Ph.D. in African American Literature within the next three years, publish scholarly articles on Black Southern narratives,
    and secure research grants that support service‑learning projects linking students with local historic preservation efforts. Ultimately, he aspires to become a department chair who champions inclusive
    pedagogy and cultivates mentorship programs for underrepresented students.
