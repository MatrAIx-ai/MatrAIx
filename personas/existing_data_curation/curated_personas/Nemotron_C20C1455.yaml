  career_goals: Kennedy aims to pursue a degree in engineering—preferably mechanical or civil—at a university known for its hands‑on programs. She hopes to join a high‑school robotics team to deepen her
    technical skills and secure a summer apprenticeship with a local engineering firm. In the long term, she envisions working on infrastructure projects that benefit her community, leveraging her knack
    for organization and problem‑solving. Ultimately, she aspires to a leadership role such as project manager, where she can coordinate teams, keep projects on schedule, and deliver practical solutions.
