  career_goals: Cynthia aims to advance to a crew foreman or site supervisor role within her current construction company, obtaining an OSHA 30‑hour certification and leading safety training for her crew.
    She is motivated to achieve a zero‑incident safety record on all projects she oversees. Long‑term, she aspires to start a small family‑run home‑renovation business that provides affordable, quality
    upgrades for senior homeowners in her community, leveraging her expertise and reputation for reliability.
