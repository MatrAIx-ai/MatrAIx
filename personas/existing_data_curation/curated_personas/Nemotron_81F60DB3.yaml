personas:
  professional: Janice Peterson, an aspiring young artist–engineer, merges their love for drawing and collage‑making with LEGO construction and beginner coding games, channeling their organized, methodical
    nature into ambitious self‑initiated projects, and they often map out each step before building.
  sports: Janice Peterson enjoys playing soccer after school with the Greenfield Tigers U‑8 team, practices beginner swimming at the community pool, and looks forward to the annual fall hike organized by
    the local scouting group, where they love spotting wildlife.
  arts: Janice Peterson spends afternoons sketching backyard critters while listening to the gentle piano works of Claude Debussy and folk tunes by the Carter Family, they eagerly visit the community art
    fair to admire pieces by local painter Maya Chan, and they proudly display their own collages beside prints of Van Gogh’s Starry Night.
  travel: Janice Peterson prefers family‑guided day trips, having already explored the towering cliffs of Grand Canyon National Park and the bustling marine exhibits at the Seattle Aquarium, while they
    daydream of a future journey to Paris to see the Louvre’s Egyptian collection and to the tropical rainforests of Costa Rica for a real‑life bug hunt.
  culinary: Janice Peterson delights in crafting peanut butter and banana sandwiches, mixing homemade macaroni and cheese with a generous sprinkling of sharp cheddar, and often assists their mother in frosting
    cupcakes topped with colorful sprinkles, while their favorite snack remains crunchy carrot sticks dipped in hummus, and they often trade recipes with friends.
  core: Janice Peterson is a quietly curious eight‑year‑old whose methodical mind fuels a vibrant blend of art, code, and nature exploration, even as they wrestle with worry and occasional impulsive sticker
    purchases.
background:
  cultural: Janice was born and raised in Scottsville, a small town in Allen County, Kentucky. Growing up in a close‑knit rural community, she experiences a blend of Southern hospitality, strong family
    ties, and a deep appreciation for the surrounding countryside. Her family participates in local traditions such as the county fair, church gatherings, and community picnics. The region’s emphasis on
    community support, respect for nature, and hands‑on work ethic shapes her values and daily life. She attends a public elementary school with small class sizes and supportive teachers, and frequently
    visits the nearby county library and the local historical museum, both of which fuel her love for stories, art, and learning.
attributes:
  skills: '["Reading comprehension (age-appropriate)", "Basic arithmetic (addition, subtraction, multiplication)", "Drawing and painting", "Scratch Jr. (basic coding)", "Organizational skills (maintaining
