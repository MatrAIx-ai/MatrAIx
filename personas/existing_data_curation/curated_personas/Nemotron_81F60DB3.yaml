  hobbies: '["Drawing and painting", "Reading adventure/fantasy books", "Collecting and sketching natural objects", "Building LEGO sets", "Playing with Scratch Jr. (basic coding)", "Attending local art
    fairs and library events", "Playing piano (basic)", "Listening to music (classical and folk)"]'
  career_goals: Janice dreams of becoming an artist who can illustrate stories and a scientist who captures the natural world through photography. She is fascinated by museums and imagines working as a
    curator who blends art and natural history, designing interactive exhibits that inspire curiosity. Her long‑term ambition is to merge creativity with problem‑solving, helping others appreciate beauty
    while addressing environmental challenges. She also envisions teaching art or science one day, using her organized approach to guide small groups of learners.
