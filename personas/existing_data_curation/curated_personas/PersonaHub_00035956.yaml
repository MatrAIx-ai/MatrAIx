persona_description: A Land Use Planner who is responsible for preparing Resource Management Plans (RMPs) for the public lands. They collaborate with local, state, and tribal governments, the public, user
  groups, and industry to identify appropriate multiple uses of the public lands, develop a strategy to manage and protect resources, and establish systems to monitor and evaluate the status of resources
  and the effectiveness of management practices over time. They are skilled in the process of allocating resources and determining appropriate multiple uses for the public lands, and have experience in
  the development of a strategy to manage and protect resources.
