  hobbies: '[''gardening'', ''traditional Mexican cooking'', ''knitting'', ''crossword puzzles'', ''reading historical fiction'', ''genealogy research'', ''small cultural gatherings'', ''birdwatching'',
    ''library volunteer tutoring'']'
  career_goals: Catalina aims to preserve and share her cultural heritage by compiling a family cookbook and mentoring retired teachers who wish to volunteer as tutors. She plans to establish a small community
    garden in Rancho Santa Fe that showcases Mexican and Californian native plants, offering workshops on sustainable gardening. She also aspires to write a memoir documenting her life as a Mexican-American
    educator, contributing chapters to local history projects, and to remain an active, reliable resource for her church and neighborhood seniors.
