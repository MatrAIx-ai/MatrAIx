personas:
  professional: Zarina Castaneda, a 36‑year‑old master painter and aspiring contractor, drives each job with meticulous scheduling and a deep grasp of color theory, and they maintain calm, assertive communication
    with clients and crew to ensure projects stay on time and on budget.
  sports: Zarina Castaneda spends weekday mornings hiking the dunes, joins a local adult softball league where they play first base for the La Porte Red Hawks, follows the Indianapolis Colts during football
    season and the Chicago Cubs during baseball season, and they balance their active outdoors routine with gentle yoga on rainy days to keep flexibility and calm.
  arts: Zarina Castaneda captures Midwestern sunsets in watercolor, volunteers to teach basic painting techniques at the La Porte community arts center, studies Ansel Adams for black‑and‑white photography
    techniques, and they unwind with mystery novels by Tana French while listening to folk duo The Milk Carton Kids.
  travel: Zarina Castaneda plans weekend road trips to Chicago’s museum districts, seasonal getaways to Door County’s cherry orchards, and occasional summer camping at Indiana Dunes State Park, favoring
    meticulously mapped itineraries that balance business responsibilities with a love for quiet lakeside photography, and they often budget trips to keep the home‑improvement venture financially stable.
  culinary: Zarina Castaneda cooks rustic Indiana pork tenderloin with apple‑cider glaze, fresh corn succotash harvested from their garden, and seasonal vegetable soups, blending a moderate skill set with
    an adventurous palate that often incorporates heirloom tomatoes, fresh dill, and locally sourced cheese, and they occasionally experiment with regional recipes like Lake Michigan perch with lemon butter.
  core: Zarina Castaneda blends disciplined project management with a love for watercolor hikes, and they quietly curate a balanced life that sometimes slips into obsessive supply‑hoarding and late‑night
    mystery‑reading marathons.
background:
  cultural: Zarina was born and raised in La Porte, Indiana, into a middle‑class family with Anglo‑American roots and a touch of Hispanic heritage reflected in her surname Castaneda. Her upbringing emphasized
    hard work, practicality, and community involvement, typical of Midwestern culture. Family gatherings often featured potluck meals and celebrations of both American holidays such as Thanksgiving and
    occasional Spanish‑influenced dishes her parents prepared. She attended local public schools and earned an associate’s degree from Ivy Tech Community College, which reinforced her preference for structured
    learning and clear goals. The town’s close‑knit atmosphere and the region’s appreciation for reliable craftsmanship have shaped her values of responsibility, resilience, and a balanced social life.
