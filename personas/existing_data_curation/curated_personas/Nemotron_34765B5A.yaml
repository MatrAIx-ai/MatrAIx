    Communication (Spanish & English)"]'
  hobbies: '["Playing soccer in a local amateur league", "Cooking Panamanian dishes", "Morning jogging along the Hudson River", "Reading business biographies and non-fiction", "Street photography", "Listening
    to salsa, reggaetón, and classic rock", "Volunteering with the Panamanian cultural association"]'
  career_goals: Looking ahead, Alejandro aims to move from purchasing manager to a senior leadership role—such as Director of Procurement or Vice President of Supply Chain—within the next five years. He
    plans to obtain the Certified Professional in Supply Management (CPSM) and a Lean Six Sigma Black Belt to deepen his strategic expertise. A core ambition is to integrate sustainable sourcing practices,
    leveraging AI‑driven demand forecasting to reduce waste and improve cost efficiency. He also wants to mentor emerging talent, particularly bilingual professionals from the Hispanic community, and to
    serve on industry panels that promote supplier diversity. On a personal level, Alejandro envisions expanding his professional network across the U.S. and Panama, positioning himself as a bridge for
    cross‑border trade initiatives that benefit both markets.
