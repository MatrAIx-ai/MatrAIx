    User 2: Oh, cool! I''m a sixth grade teacher.

    User 1: That''s great! I''m a first grade teacher.

    User 2: I love teaching! It''s so much fun.

    User 1: Me too! It''s the best job ever.

    User 2: I agree!

    User 1: What else do you like to do?

    User 2: I enjoy crosswords, crocheting, and football.

    User 1: I like crosswords too! I''m not very good at them, but I like doing them.

    User 2: I''m pretty good at crosswords. I like to do them every day.

    User 1: That''s impressive!

    User 2: Thanks!

    User 1: What else do you like to crochet?

    User 2: I like to crochet scarves, hats, and blankets.

    User 1: I''ve always wanted to learn how to crochet.

    User 2: It''s not too hard to learn! There are a lot of great tutorials online.

    User 1: I''ll have to check them out.

    User 2: You should! I think you''d really enjoy it.

    User 1: Thanks for the recommendation!

    User 2: No problem!'
