personas:
  professional: Zoraida Perez, they are a retired community volunteer turned culinary educator who leverages their bilingual communication skills, practical gardening mindset, and spontaneous charm to lead
    informal cooking workshops celebrating family recipes and to coordinate neighborhood food‑pantry events, always emphasizing harmony and hands‑on learning.
  sports: Zoraida Perez, they enjoy low‑impact exercise such as weekly walks with the senior center walking club and occasional yoga classes, cheer for the Los Angeles Dodgers during baseball season, and
    often act as an informal warm‑up leader at community festivals, though they rarely follow a strict training regimen.
  arts: Zoraida Perez, they express creativity through quilting colorful blankets and crocheting shawls, find solace in reading historical novels like 'The Shadow of the Wind,' and delight in the music
    of Juan Gabriel and the paintings of Frida Kahlo, often weaving these inspirations into their handcrafted gifts.
  travel: Zoraida Perez, they favor relaxed, purpose‑driven travel, planning a heartfelt reunion trip to their hometown in their family's country of origin to preserve family recipes, while also enjoying
    short drives to local historic sites such as Old Town San Diego and weekend retreats in the nearby mountains, preferring to travel by car with a carefully curated playlist.
  culinary: Zoraida Perez, they delight in preparing mole poblano, tamales wrapped in corn husks, and fresh salsa verde using home‑grown tomatoes, chilies, and epazote, blending traditional techniques with
    occasional experiments like adding smoked paprika, and they often serve generous portions that inspire second‑helpings.
  core: Zoraida Perez, they are a warm‑hearted, spontaneous elder who balances practical budgeting with a love for gardening, cooking, and community service, while occasionally forgetting deadlines and
    indulging in extra chilies for the sheer joy of flavor.
background:
  cultural: Zoraida was born to Mexican immigrant parents and grew up immersed in the rich traditions of Mexican culture, from vibrant celebrations like Día de los Muertos and Cinco de Mayo to the close‑knit
    family values that emphasize respect and mutual support. Raised bilingual, she maintains fluency in Spanish, which she uses at home and in community interactions. Her Catholic faith informs many of
    her rituals and community involvement, and she cherishes Mexican culinary heritage, often preparing dishes passed down through generations. Living in Rialto, California, she blends her Mexican roots
    with the multicultural fabric of Southern California, actively participating in local cultural events and preserving her heritage for her grandchildren.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Traditional Mexican cooking'', ''Home gardening (vegetables and native herbs)'', ''Family budgeting and finance management'', ''Crafting (quilting,
