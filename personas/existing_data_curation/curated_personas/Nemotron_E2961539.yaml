  hobbies: '[''Gardening (vegetables, herbs, native plants)'', ''Cooking Mexican cuisine (mole, tamales, salsas)'', ''Quilting and crocheting'', ''Reading historical novels'', ''Attending church services
    and community festivals'', ''Volunteer work at food pantry and senior center'', ''Learning and sharing family recipes'']'
  career_goals: Although retired from formal employment, Zoraida aims to deepen her impact within the Rialto community by leading cooking workshops that celebrate Mexican heritage, mentoring younger women
    on budgeting and home management, and expanding her volunteer work at the senior center and food pantry. She also hopes to travel to her hometown in Mexico to reconnect with extended family and document
    family recipes for future generations. Her ambition is to foster intergenerational connections and preserve cultural traditions while remaining adaptable to new opportunities that arise.
