personas:
  professional: Mildred Hodges leverages her meticulous front-desk experience, QuickBooks proficiency, and knack for orchestrating community events to excel in part-time nonprofit administrative roles,
    where her love of routine blends with a pragmatic flair for solving unexpected scheduling snags, and they consistently keep spreadsheets error-free.
  sports: Mildred Hodges enjoys early-morning birdwatching hikes along the Colorado River and participates in the local Desert Trail Runners club for casual 5K runs, while cheering on the Arizona Diamondbacks,
    Phoenix Suns, and Arizona Cardinals on weekends, and they keep a modest membership at the Lakeside Boating Association for weekend fishing trips.
  arts: Mildred Hodges finds calm in crafting quilts while listening to John Denver and admiring the desert-inspired paintings of Georgia O'Keeffe, and they also dabble in pottery classes inspired by the
    tactile works of Bernard Leach, often photographing sunrise over the canyon to capture its subtle hues.
  travel: Mildred Hodges prefers well-planned road trips that blend scenic desert stops like Sedona and the Grand Canyon with occasional international escapes to the historic streets of Marrakech or the
    vineyards of Tuscany, yet they always schedule return dates to maintain their beloved garden routine.
  culinary: Mildred Hodges enjoys baking classic apple crumble and experimenting with cactus-infused corn tortillas, mastering modestly advanced techniques that let them serve comfort food such as chicken
    pot pie at community events, and they favor ingredients like sage, rosemary, and locally sourced honey.
  core: Mildred Hodges navigates life with a calendar-driven steadiness, a tendency to hoard vintage thread spools, and a midnight habit of troubleshooting QuickBooks while sipping chamomile tea, and they
    often reward themselves with a slice of warm pie after a long day.
background:
  cultural: Mildred grew up in a small Midwestern town in a Protestant, middle‑class family that emphasized hard work, self‑reliance, and community service. Those values shaped her practical outlook, preference
    for routine, and commitment to local involvement. Relocating to Bullhead City, Arizona, she embraced the region’s outdoor lifestyle while retaining her traditional American cultural roots, blending
    modesty and practicality with a strong sense of civic duty.
attributes:
  skills: '["Household budgeting and financial planning","Scheduling and calendar management","Basic bookkeeping (QuickBooks)","Customer service and front‑desk operations","Event planning for community
