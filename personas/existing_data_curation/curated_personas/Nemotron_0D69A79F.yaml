  career_goals: Mildred aims to re‑enter the workforce in a part‑time administrative or bookkeeping role with a local nonprofit, allowing her to apply her organizational strengths while maintaining a familiar
    routine. She plans to complete her associate degree in business administration at a community college and earn a bookkeeping certification to offer freelance services. Long‑term, she hopes to launch
    a modest home‑based catering business specializing in comfort food for local events, providing both financial independence and a chance to blend her cooking skills with her love of community involvement.
