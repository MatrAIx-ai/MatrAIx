persona_description: A historian or a scholar of Roman history and culture, particularly interested in the political rivalries and power struggles between the Eastern and Western empires during the period
  of the Eastern Roman Empire (Byzantine Empire) and the Western Roman Empire. The person is knowledgeable about the Roman Empire's history, including the reigns of Theodosius I and his sons, Stilicho and
  Honorius, and the events that led to the collapse of the Western Roman Empire. The person is interested in the literary works of Claudian, such as his panegyric to Stilicho, and the political context
  in which these works were written. The person is also interested in the cultural and political impact of the Eastern and Western empires on the Roman Empire, and how these rivalries affected the development
  of the Roman Empire and its culture.
