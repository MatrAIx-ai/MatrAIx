  hobbies: '[''Competitive online video gaming'', ''Soccer'', ''Arduino and robotics tinkering'', ''Lego building'', ''Drawing and comic illustration'', ''Listening to Mexican banda, norteño, and hip‑hop
    music'', ''Watching sci‑fi shows'', ''Cooking traditional Mexican dishes'', ''Journaling for emotional processing'']'
  career_goals: Julio dreams of turning his curiosity for technology into a career as a software developer or video‑game designer, hoping to earn a scholarship for a computer‑science program at a Texas
    university. He wants to create apps that help local small businesses and to participate in high‑school robotics competitions. At the same time, his love for competition fuels an ambition to excel in
    soccer, possibly earning a spot on a college team or coaching youth leagues later. He also hopes to leverage his bilingual skills to work in tech support for Spanish‑speaking customers, providing a
    practical way to support his family while pursuing his passions.
