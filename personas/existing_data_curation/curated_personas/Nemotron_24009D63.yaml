personas:
  professional: Sopheak Keo is an aspiring young programmer who builds interactive Python games and simple apps while leveraging their digital illustration skills to design engaging UI, balancing a practical,
    organized approach with a curiosity for new tech, and aiming for a merit‑based scholarship in computer science or biomedical engineering.
  sports: Sopheak Keo is a competitive badminton player who practices at the Englewood community center, competes in school leagues and follows the New York Knicks and New Jersey Devils, balancing vigorous
    match play with regular fitness drills while sometimes skipping post‑game stretches due to a rushed schedule.
  arts: Sopheak Keo is a digital illustrator who creates manga‑style characters using Photoshop and Canva, draws inspiration from classic manga artists like Naoko Takeuchi and modern K‑pop music videos,
    and spends weekends sketching while listening to BTS and traditional flute melodies, occasionally sharing work on Instagram where they receive enthusiastic, though sometimes critical, feedback.
  travel: Sopheak Keo is a curious traveler who dreams of attending an anime convention in Tokyo and visiting ancestral temples in Siem Reap, while also planning seasonal road trips to the New Jersey Shore
    with friends; they prefer detailed itineraries built in Google Sheets, balance adventure with budget constraints, and often miss flights because they linger over snack stalls, a quirk rooted in their
    love for food.
  culinary: Sopheak Keo is a budding home‑cook who helps their family prepare traditional fish amok and coconut rice for celebrations, while experimenting with spicy ramen and bubble tea recipes, enjoys
    perfecting their own version of bánh mì with pickled carrots and cilantro, and can whip up a quick stir‑fry of shrimp, garlic, and basil in under twenty minutes, though they sometimes forget to clean
    the cutting board afterward.
  core: Sopheak Keo blends analytical coding talent with manga‑style artistry, competes fiercely in badminton, saves diligently for future tech pursuits, and navigates teen life with a pragmatic curiosity,
    a hint of skepticism, and a habit of leaving dirty socks near the desk.
background:
  cultural: Sopheak is a second‑generation Southeast Asian American; her parents immigrated from Cambodia as refugees and settled in Englewood, New Jersey. She grew up bilingual, speaking Khmer at home
    and English at school, and she celebrates both Khmer New Year and other Cambodian cultural traditions while fully engaging in American life. The blend of her family's heritage and the diverse environment
    of Bergen County shapes her worldview, fostering respect for cultural diversity, a strong sense of family responsibility, and an appreciation for community involvement.
attributes:
  skills: '[''Bilingual (English and Khmer)'', ''Intermediate Python programming'', ''Graphic design using Canva/Adobe Photoshop'', ''Advanced spreadsheet management (Excel/Google Sheets)'', ''Public speaking
    and debate'', ''Team leadership in school clubs'', ''Critical thinking and problem solving'', ''Time management and organization'']'
  hobbies: '[''Coding small Python projects'', ''Digital illustration and manga drawing'', ''Playing badminton'', ''Reading science fiction novels'', ''Listening to both K‑pop and traditional Khmer music'',
    ''Participating in school debate club'', ''Volunteering at local community center'', ''Cooking family recipes'']'
  career_goals: Sopheak aims to secure a merit‑based scholarship to study computer science or biomedical engineering at a top university. She dreams of creating technology solutions that address health
    and education challenges within Southeast Asian immigrant communities. She plans to participate in hackathons and research internships, aspiring to become a recognized innovator who merges technical
    expertise with culturally informed design. Long‑term, she envisions leading a tech startup that empowers underrepresented groups while maintaining a balance between personal growth and community impact.
