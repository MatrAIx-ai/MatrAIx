  hobbies: '[''Knitting'', ''Cross‑country skiing'', ''Hiking and nature photography'', ''Canning and preserving food'', ''Reading mystery and historical fiction'', ''Woodworking'', ''Small community book
    club participation'', ''Volunteering at the local library'']'
  career_goals: Kathryn aims to translate her practical expertise into a modest home‑based enterprise, selling hand‑knit garments and handcrafted wooden décor through an online boutique. She hopes to develop
    a small‑scale workshop where she can teach neighbors and friends basic DIY skills, preserving the self‑reliance culture of Alaskan life. In parallel, she aspires to deepen her knowledge of wilderness
    safety by completing an advanced first‑aid certification, enabling her to contribute more fully to local emergency response teams. Over the next five years, she envisions becoming a respected community
    mentor who balances entrepreneurial ambition with volunteer service, fostering resilience and creativity among Fairbanks’ residents.
