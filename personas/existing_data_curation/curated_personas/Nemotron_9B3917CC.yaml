  hobbies: '[''Reading adventure books'', ''Drawing wildlife'', ''Soccer'', ''Bike riding'', ''Nature walks and collecting'', ''4‑H projects'', ''Baking with family'', ''Playing piano'']'
  career_goals: Angela dreams of a future where she can help others and work closely with animals. She often talks about becoming a veterinarian because she loves caring for her dog and enjoys learning
    about wildlife. She also imagines herself as a teacher who could share her love of reading and science with younger kids. Additionally, Angela is fascinated by community service and hopes to volunteer
    with local conservation projects or become a youth leader in her town’s 4‑H club.
