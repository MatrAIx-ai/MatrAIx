personas:
  professional: Angela Kidd, a budding naturalist and storyteller, spends afternoons turning backyard discoveries into illustrated field notes, dreaming of one day becoming a wildlife biologist who writes
    adventure tales for kids.
  sports: Angela Kidd, a lively member of the town’s Under‑10 soccer team, the Greenfield Gators, practices twice a week, cheers for the local professional team the River Rapids, and rides her bike along
    the winding country lanes to stay fit.
  arts: Angela Kidd, an enthusiastic doodler of deer and owls, loves reading the “Magic Tree House” series and the “National Geographic Kids” magazine, writes short animal adventures inspired by Roald Dahl,
    and practices simple piano pieces by Beethoven’s “Für Elise” arrangement for beginners.
  travel: Angela Kidd, who enjoys weekend trips to the nearby Pinewood State Park for hiking and rock collecting, dreams of visiting Yellowstone National Park to see geysers and bison, and prefers family
    road trips that combine nature walks with picnics over crowded amusement parks.
  culinary: Angela Kidd, who delights in baking chocolate chip cookies with her mother, can whisk a batch of oatmeal raisin cookies from scratch, loves the taste of fresh strawberries and peanut butter
    sandwiches, and occasionally sneaks a spoonful of batter when no one is looking.
  core: Angela Kidd blends curiosity and practicality, turning every backyard adventure into a story, a science project, or a sweet treat, all while juggling allowance, soccer drills, and a tiny habit of
    forgetting to water her potted seedlings.
background:
  cultural: 'Angela grows up in a close‑knit, white family in Bakersville, a small town nestled in the Appalachian region of Avery County, North Carolina. Her upbringing reflects the values of Southern
    Appalachian culture: a strong sense of community, respect for nature, and participation in local traditions such as church gatherings, county fairs, and 4‑H clubs. Family meals often feature home‑cooked
    Southern dishes, and weekends include trips to nearby forests for hiking or berry picking. These experiences have fostered her appreciation for the outdoors, communal cooperation, and a practical, resourceful
    outlook.'
