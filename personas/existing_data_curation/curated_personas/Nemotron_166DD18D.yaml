personas:
  professional: Jeffrey York, a retired literary scholar and art historian, channels his imaginative curiosity and disciplined research skills into curating micro‑exhibitions, authoring interdisciplinary
    essays, and mentoring emerging artists, balancing meticulous organization with a willingness to experiment in Chicago’s cultural scene.
  sports: Jeffrey York follows the Chicago Bulls and the Chicago White Sox with quiet enthusiasm, participates in the Chicago Chess Club’s weekly tournaments, and occasionally jogs along the Lakefront Trail
    to clear his mind, preferring solitary or low‑key physical activities over team sports.
  arts: Jeffrey York immerses himself in avant‑garde and classical music, from Boulez to Beethoven, frequents the Art Institute of Chicago and niche galleries showcasing artists like Kara Walker and Mark
    Rothko, and spends evenings sketching downtown skylines while drafting poetry inspired by John Ashbery and Charles Bernstein.
  travel: Jeffrey York enjoys solitary travel to historically rich locales such as the National Archives in Washington, D.C., the Musée d’Orsay in Paris, and the quiet shores of Mackinac Island, planning
    itineraries meticulously but often extending stays to linger over archives and local art scenes.
  culinary: Jeffrey York prefers simple, garden‑inspired meals like roasted root vegetables with sage, heirloom tomato salads, and wild‑rice soup, occasionally indulging in Chicago‑style deep‑dish pizza,
    and approaches cooking with the same experimental mindset he applies to poetry, though he sometimes forgets to restock pantry staples.
  core: Jeffrey York is a solitary, competitively curious scholar who blends disciplined research with experimental art, lives modestly, and thrives on quiet contemplation punctuated by occasional indulgences.
background:
  cultural: Jeffrey grew up in a middle‑class white family in the Chicago metropolitan area, where the city’s vibrant museum and theater scene left an early imprint on his appreciation for the arts. His
    education in the liberal arts, culminating in a graduate degree in humanities, reinforced a value for critical inquiry and intellectual independence. The cultural fabric of Chicago—its history of architectural
    innovation, diverse artistic communities, and the Midwestern ethic of self‑reliance—shapes his worldview. While rooted in the traditions of the city’s white, middle‑class cultural milieu, he has been
    influenced by the city's ethnic neighborhoods, progressive academic circles, and the rich legacy of American modernism, all of which inform his artistic sensibilities and scholarly pursuits.
attributes:
  skills: '[''Literary analysis'', ''Critical theory'', ''Art history expertise'', ''Independent archival research'', ''Scholarly writing'', ''Curating exhibitions'', ''Grant proposal writing'', ''Digital
    archiving (Zotero, Omeka)'', ''Project organization'', ''Strategic planning for artistic projects'', ''Mentoring emerging artists'']'
  hobbies: '[''Reading contemporary philosophy'', ''Reading modernist literature'', ''Writing experimental poetry'', ''Writing short prose'', ''Visiting art galleries and museums'', ''Sketching urban landscapes'',
    ''Playing chess'', ''Listening to avant‑garde and classical music'', ''Gardening native Midwestern plants'', ''Exploring historical archives'', ''Collecting rare art books'']'
  career_goals: Jeffrey aims to channel his lifelong curiosity into a set of personal scholarly and creative projects now that he is retired from formal employment. He plans to author a collection of interdisciplinary
    essays that fuse philosophy, art, and history, and to see it published by a respected university press. He also aspires to curate a series of thematic micro‑exhibitions at community spaces in Chicago,
    highlighting under‑represented avant‑garde artists, and to secure a small endowment to sustain these shows. Additionally, he hopes to establish a digital archive documenting Chicago’s mid‑20th‑century
    art movements, positioning himself as a recognized expert in that niche. In the longer term, he envisions receiving a fellowship for independent research that will expand his scholarly reputation and
    provide a lasting intellectual legacy.
