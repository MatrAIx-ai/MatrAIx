personas:
  professional: Kristina Haynes, an organized licensed electrician with an associate's degree in Electrical Technology, excels at residential wiring, solar PV installations, and rigorous code compliance,
    channeling her competitive streak into trade skill contests while meticulously managing safety inspections, crew schedules, and project documentation.
  sports: Kristina Haynes, an avid hiker and member of the Waianae Trailblazers Hiking Club, regularly tackles the coastal trails of Oʻahu, follows the Seattle Seahawks and Los Angeles Lakers for a seasonal
    sports fix, and supports the University of Hawaii Rainbow Warriors during college football season, while also incorporating weekend yoga classes into her fitness routine.
  arts: Kristina Haynes, who finds solace in the mellow strums of Jack Johnson, the soulful voice of Israel Kamakawiwo'ole, and the intricate fingerpicking of native guitarist Keola Beamer, regularly attends
    hula performances at the annual Hoʻolauleʻa and visits the Honolulu Museum of Art to view works by local painter Herb Kawainui Kane, letting these artistic experiences inform her creative problem‑solving
    in electrical projects.
  travel: Kristina Haynes, a meticulous planner, prefers structured trips that balance eco‑adventure with cultural immersion, having hiked the Na Pali Coast on Kauai, explored the volcanic landscapes of
    Iceland's Blue Lagoon, and attended a solar fair in Tokyo, she now dreams of trekking New Zealand's South Island and visiting the Great Barrier Reef during a brief vacation.
  culinary: Kristina Haynes, an enthusiastic home cook with a modest skill level, delights in preparing poke bowls with ahi tuna, limu, and avocado, slow‑cooks kalua pork using a traditional imu technique,
    and whips up taro poi and haupia dessert, seasoning her dishes with fresh coconut milk, lime, and locally grown pili and ti leaves from her garden, while occasionally indulging in sugary biscuits while
    troubleshooting electronics.
  core: Kristina Haynes is a fiercely organized electrician whose competitive drive, community‑rooted values, and anxiety‑fuelled quest for structure shape every project, hobby, and personal habit.
background:
  cultural: Kristina is a white Hawaiian native who grew up in Waianae, a multicultural community on Oʻahu. Though her family’s roots trace back to the mainland United States, she was immersed in local
    Hawaiian traditions, learning basic Hawaiian language phrases, participating in ʻaha ʻaina (family meals), and celebrating events like the Hoʻolauleʻa. Her upbringing blends mainland pragmatism with
    the island’s emphasis on ʻohana, respect for the environment, and a strong communal spirit, shaping her balanced worldview and her commitment to sustainable, community‑focused electrical work.
attributes:
  skills: '[''Residential wiring'', ''Commercial wiring'', ''Solar photovoltaic installation'', ''Electrical code compliance (NEC, Hawaii State Building Code)'', ''Troubleshooting and fault diagnosis'',
    ''Safety management and OSHA compliance'', ''Project scheduling and inventory management'', ''Team coordination'', ''Technical documentation'', ''Electrical blueprint reading'', ''Customer communication'']'
  hobbies: '[''Hiking coastal trails'', ''Yoga & meditation'', ''Surfing (solo)'', ''Puzzle solving (crosswords, jigsaw)'', ''DIY electronics projects'', ''Journaling'', ''Community solar volunteer work'',
    ''Reading technical manuals and self‑help books'', ''Gardening (native Hawaiian plants)'', ''Participating in trade skill competitions'']'
  career_goals: Kristina aims to obtain her Master Electrician license within the next three years and secure NABCEP certification for solar installations. She plans to lead a crew of electricians on large
    residential and community solar projects, eventually founding her own eco‑focused contracting business. In parallel, she wishes to mentor apprentices, contribute to local sustainability initiatives,
    and possibly pursue a bachelor's degree in electrical engineering to broaden her technical expertise while maintaining her structured, achievement‑driven career trajectory.
