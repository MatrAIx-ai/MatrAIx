  career_goals: Paul dreams of becoming a multimedia artist who creates illustrated storybooks and interactive games that explore imaginative worlds while promoting emotional wellbeing. He is also drawn
    to animation or graphic design, hoping to use his artistic talents to communicate ideas that resonate with others. In the long term he plans to study visual arts and computer science in college and
    eventually work as a concept artist for video games or an author‑illustrator of children's literature.
