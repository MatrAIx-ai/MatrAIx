persona_description: A government official from Cambodia, specifically the National Council for Sustainable Development of the Ministry of Environment, who is responsible for the management and conservation
  of mangrove forests in the country. This person is interested in the importance of mangroves in coastal protection and local livelihoods, and is actively involved in the restoration of mangrove forests
  through organizations such as Mangroves for the Future (MFF) and the Global Mangrove Alliance. This individual has a deep understanding of the technical and financial assistance that can be provided by
  MFF to help achieve mangrove restoration targets.
