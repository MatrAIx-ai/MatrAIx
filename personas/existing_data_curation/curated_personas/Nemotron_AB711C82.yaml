  hobbies: '["Community soccer league", "Cooking traditional Mexican dishes", "Listening to regional Mexican music", "Fishing at Wolf River", "Attending Memphis Grizzlies games", "Volunteering at church
    events", "Family gatherings", "Traveling to Mexico", "DIY home improvement projects", "Playing guitar"]'
  career_goals: John aims to advance into a senior management role within the claims department, eventually becoming a Claims Operations Manager or a Regional Adjuster Lead. He plans to earn the Chartered
    Property Casualty Underwriter (CPCU) designation and complete an associate degree in Business Administration to strengthen his strategic knowledge. Long‑term, he envisions launching his own boutique
    adjusting consultancy that offers flexible, client‑focused services, and he hopes to mentor younger adjusters, integrating technology such as AI‑driven loss estimation to improve efficiency.
