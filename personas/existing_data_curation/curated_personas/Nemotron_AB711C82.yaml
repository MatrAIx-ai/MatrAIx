personas:
  professional: John Moreno, a seasoned claims adjuster with over two decades of experience, leverages their bilingual fluency and curiosity for emerging risk trends alongside a practical, cost‑effective
    mindset to deliver thorough investigations and settlements, while they often let a relaxed, sometimes disorganized approach inspire creative problem‑solving in a fast‑paced insurance environment.
  sports: John Moreno stays active by playing midfield for a community soccer league in the summer, casting lines on the Wolf River during weekend afternoons, and cheering loudly for the Memphis Grizzlies
    at the FedExForum, while they often skip formal workouts in favor of spontaneous pickup games with friends, reflecting a relaxed approach to training.
  arts: John Moreno nurtures their creative side by strumming classic rancheras from Vicente Fernández on the guitar while attending live performances at the Levitt Shell, and they frequently watch films
    starring Gael García Bernal and classic Memphis blues recordings by B.B. King as a backdrop to weekend gatherings.
  travel: John Moreno prefers spontaneous, family‑centric trips—like the yearly visits to relatives in Oaxaca to celebrate Día de los Muertos and a recent weekend road trip along the Gulf Coast—yet they
    balance these adventures with a modest budget that limits long‑haul vacations, keeping a bucket‑list spot for a cultural tour of Barcelona’s modernist architecture.
  culinary: John Moreno, an avid home chef, proudly prepares elaborate mole poblano, hand‑rolled tamales, and fresh ceviche with lime, cilantro, and jalapeño for family gatherings, while they also love
    to grill catfish from the Wolf River seasoned with paprika and a splash of tequila‑infused glaze, showcasing a love for smoky, bold flavors.
  core: John Moreno blends a curiosity for new ideas with a laid‑back, sometimes disorganized lifestyle, using their bilingual charm and love for soccer, fishing, and cooking to create a community‑focused,
    resilient yet effortlessly adaptable outlook on life.
background:
  cultural: John is a first‑generation Mexican‑American who grew up in a bilingual household, celebrating traditions such as Día de los Muertos, Las Posadas, and Cinco de Mayo while also embracing Southern
    hospitality in Memphis. His Catholic upbringing instilled a strong sense of community and service, and he maintains close ties to the Mexican diaspora in Shelby County. He blends Mexican values of family
    loyalty, respect, and collectivism with the entrepreneurial spirit of the American South, which influences both his personal life and professional approach.
attributes:
  skills: '["Claims investigation", "Property damage assessment", "Negotiation", "Customer service", "Bilingual communication (Spanish/English)", "Report writing", "Data analysis", "Risk assessment", "Conflict
