personas:
  professional: Alina Rodriguez is a bilingual first‑line supervisor who coordinates office support teams with meticulous standard operating procedures, leverages her sociable, talkative nature to train
    and mentor staff, and assertively drives continuous improvement toward her goal of becoming an Operations Manager.
  sports: Alina Rodriguez enjoys early‑morning hikes along the rugged cliffs of the Aguadilla coastline, participates in weekly salsa‑fitness classes at the community center, and supports the local baseball
    club Los Tiburones de Aguadilla as well as being an avid fan of the Miami Heat, using her structured routine to track workouts and game schedules.
  arts: Alina Rodriguez immerses herself in the arts by reading mystery novels from Carlos Ruiz Zafón, attending live performances of salsa legend Celia Cruz’s tribute concerts, and volunteering at community
    festivals that showcase bomba and plena ensembles, while occasionally dabbling in watercolor painting of coastal sunrise scenes.
  travel: Alina Rodriguez plans her travel around a mix of structured itineraries and spontaneous moments, favoring weekend escapes to Vieques and the historic streets of Old San Juan, while her bucket
    list includes a cultural immersion trip to Barcelona’s Gothic Quarter and a hiking adventure in the Scottish Highlands.
  culinary: Alina Rodriguez, a confident home cook, loves preparing traditional dishes such as mofongo relleno, pastelón de plátano, and arroz con gandules seasoned with sofrito, while also indulging in
    fresh ceviche with lime and cilantro during family gatherings, and she delights in pairing meals with local coffee and tropical fruit smoothies.
  core: Alina Rodriguez blends meticulous organization with a vibrant sociability, orchestrating efficient office operations by day and leading lively salsa circles by night, all while occasionally forgetting
    to water her beloved indoor orchids.
background:
  cultural: Alina is a native of Aguadilla, Puerto Rico, raised in a bilingual household where Spanish was spoken at home and English was taught at school. Her upbringing reflects the island’s rich tapestry
    of Spanish, African, and Taíno influences, manifested in her love for music, dance, and cuisine. Growing up in a close‑knit coastal community, she developed a strong sense of civic pride, regularly
    attending town fiestas and supporting local artisans. Her family emphasized education and community service, instilling in her a commitment to professional excellence and social responsibility that
    continues to shape her personal and career aspirations.
