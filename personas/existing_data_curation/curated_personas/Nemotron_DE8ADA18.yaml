  career_goals: Alina aims to transition into an Operations Manager role within the next three to five years, overseeing multiple departments and shaping strategic initiatives for a mid-sized organization
    in Aguadilla. She plans to earn a professional certification in Office Management and enroll in a part-time MBA program to deepen her strategic and financial acumen. Long‑term, she envisions launching
    a consultancy that helps small Puerto Rican businesses streamline administrative processes and boost employee engagement, while also mentoring emerging female leaders in her community.
