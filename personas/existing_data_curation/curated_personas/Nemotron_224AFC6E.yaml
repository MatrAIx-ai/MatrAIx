personas:
  professional: Anna Picou is a skilled maintenance technician with over a decade of hands‑on experience in preventive maintenance, troubleshooting HVAC, plumbing and electrical systems, and small‑engine
    repair, who leverages their methodical scheduling and safety‑compliant documentation to train new staff and aims to earn the CMRT credential and move into a supervisory role at a mid‑sized Great Lakes
    manufacturing plant.
  sports: Anna Picou enjoys weekend kayak excursions on Lake Michigan, early‑morning fishing trips for perch and trout, hikes with the local Forest Trail Club, and supports the Milwaukee Brewers and Green
    Bay Packers, often wearing their jerseys while cheering at the community sports bar.
  arts: Anna Picou finds creative fulfillment in woodworking and jigsaw puzzles while also attending folk concerts featuring artists like The Avett Brothers and blues nights with Buddy Guy, regularly visiting
    the Milwaukee Repertory Theater for contemporary plays, and curates a modest collection of vintage woodworking manuals as decorative art.
  travel: Anna Picou prefers well‑planned road trips that combine scenic drives along the Lake Michigan shoreline with stops at Door County for apple orchards, a weekend stay at Mackinac Island to bike
    the historic streets, and occasional visits to Chicago’s architecture tours, always budgeting travel costs in their spreadsheet before departure.
  culinary: Anna Picou delights in cooking fresh‑caught trout with lemon‑dill butter, roasting seasonal root vegetables from their garden, and baking apple crisp with locally sourced honey, displaying solid
    home‑cooking skills but occasionally over‑salting dishes when multitasking between a repair job and meal prep.
  core: Anna Picou is a methodical maintenance pro who balances a love for hands‑on projects, community service, and meticulous budgeting, all while wrestling with an occasional tool‑store impulse and a
    stubborn habit of over‑salting dinner.
background:
  cultural: Anna Mae's cultural background is anchored in a white Midwestern family with German‑Polish ancestry that has lived in Manistee County for generations. Raised in a close‑knit community that values
    hard work, modesty, and neighborly cooperation, she grew up attending a local Protestant church and participating in community fairs and town gatherings. The region's natural landscape—forests, lakes,
    and open fields—has fostered a respect for the outdoors and seasonal rhythms. These influences have shaped her practical outlook, her commitment to reliable service, and her appreciation for community
    harmony.
attributes:
  skills: '[''Preventive Maintenance Planning'', ''Plumbing Repairs'', ''Electrical Troubleshooting'', ''HVAC System Servicing'', ''Carpentry and Minor Construction'', ''Small Engine Repair'', ''Basic Welding'',
    ''Equipment Inventory Management'', ''Safety Compliance (OSHA, EPA)'', ''Technical Documentation and Reporting'']'
  hobbies: '[''Woodworking Projects'', ''DIY Home Repair'', ''Gardening (Seasonal Planting)'', ''Fishing and Kayaking on Lake Michigan'', ''Hiking Local Trails'', ''Puzzle Solving (Crosswords, Jigsaw)'',
    ''Community Volunteering at Food Bank'', ''Reading Practical Manuals'']'
  career_goals: Anna aims to advance to a senior maintenance technician role within the next two years, earn the Certified Maintenance & Reliability Technician (CMRT) credential, and eventually step into
    a supervisory or team‑lead position overseeing maintenance operations for a mid‑sized manufacturing plant in the Great Lakes region. She also envisions launching her own small‑business service that
    offers reliable, affordable repairs for local businesses and homeowners, combining her practical skills with her desire for community contribution.
