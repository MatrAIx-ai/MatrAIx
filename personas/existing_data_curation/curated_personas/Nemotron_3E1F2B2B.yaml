  career_goals: Though he is officially retired, Philip remains driven to contribute to his town. He aims to establish a permanent workshop space at the Lampasas community center where seniors can learn
    basic repair and woodworking skills. He also plans to document and archive the oral histories of long-time residents, hoping to publish a small collection that celebrates local heritage. In his personal
    life, he aspires to travel with his wife to visit historic sites across the United States, and to complete a digital photography series of central Texas landscapes. He seeks to mentor younger volunteers
    through a structured apprenticeship program, ensuring his practical knowledge is passed on.
