personas:
  professional: Frances Harnish is a veteran locksmith and safe‑repair specialist who, after twenty years of mastering lock picking, key cutting, high‑security installations, and custom lock fabrication,
    leverages a calm, resilient demeanor to handle high‑stress vault emergencies while mentoring apprentices and infusing artistic sensibility into each security solution.
  sports: Frances Harnish is an avid weekend hiker of Talladega National Forest trails, a devoted fan of the Auburn Tigers football team and Atlanta Braves baseball, and they regularly participate in the
    Auburn Adult Trail Club, yoga classes for flexibility, and friendly bridge tournaments that keep their mind sharp.
  arts: Frances Harnish paints watercolors of historic downtown Auburn inspired by folk musicians like Rhiannon Giddens and storytellers such as Lyle Lovett, attends community theater productions featuring
    actors like Maggie Gyllenhaal, and collects vintage lock designs that double as functional art, while also admiring quilting exhibitions by local artist Mary Rowland.
  travel: Frances Harnish prefers road‑trip adventures that blend natural beauty and cultural heritage, having explored Asheville’s Blue Ridge drives, Charleston’s historic squares, and Nashville’s music
    scene, while dreaming of a spring pilgrimage to Granada’s Alhambra for its intricate ironwork and hoping to someday sail the Gulf Coast to experience its seafood festivals, all balanced by a modest
    travel budget and spontaneous weekend getaways with friends.
  culinary: Frances Harnish cooks Southern comfort cuisine, perfecting skillet‑fried chicken, buttery buttermilk biscuits, creamy collard greens, and bourbon‑glazed sweet potatoes, while experimenting with
    heirloom okra and hot peppers in gumbo, sourcing fresh pork from a local farm, and pairing meals with sweet tea brewed from hibiscus and black tea.
  core: Frances Harnish blends a steadfast Southern work ethic with a curious artistic streak, turning lock‑making into a canvas for community safety, while juggling a love for folk tunes, spontaneous hikes,
    and a habit of hoarding every antique lock they restore.
background:
  cultural: Frances grew up in a modest, white, middle-class family in the Auburn area, steeped in Southern hospitality and a strong sense of community. Her upbringing in Alabama fostered values of self-reliance,
    respect for craftsmanship, and a deep appreciation for regional traditions such as folk music, quilting, and church gatherings. Though she left a traditional path after high school to pursue a trade,
    she remains connected to her roots through local festivals, church involvement, and a love of Southern cuisine. Her divorce in her early forties strengthened her independent outlook, and she now blends
    the steady, resilient ethos of the Deep South with an open-minded curiosity for new ideas and artistic expression.
attributes:
  skills: '["Lock picking", "Key cutting", "Safe combination opening", "Mechanical safe repair", "High-security lock installation", "Custom lock fabrication", "Metalworking", "Basic electronics for lock
    systems", "Emergency lockout response", "Security assessment and documentation", "Customer communication", "Apprentice training"]'
  hobbies: '["Watercolor painting", "Community theater", "Antique lock collection and restoration", "Hiking", "Gardening", "Southern cooking", "Volunteer lock-safety education", "Bridge club"]'
  career_goals: Frances aims to grow her solo practice into a community-focused security studio that combines locksmith services with educational workshops on home safety and antique lock restoration. She
    plans to obtain the Certified Master Locksmith designation within the next two years and to develop a partnership with Auburn's technical college to mentor aspiring trade students. Long-term, she hopes
    to open a small boutique showcasing restored antique locks and offering art-inspired security design consultations, while maintaining a flexible schedule that supports her involvement in local volunteer
    initiatives.
