personas:
  professional: Kristy Keenan, a retired church secretary turned volunteer coordinator, uses their exacting organizational skills and competitive edge to orchestrate senior‑center fundraisers and community
    events with clockwork precision.
  sports: Kristy Keenan follows the Buffalo Bills and Buffalo Sabres with unwavering loyalty, participates in a senior walking club at the local park each morning, and they treat weekly bridge sessions
    as a mental‑fitness sport.
  arts: Kristy Keenan finds solace in the swing era, regularly streaming Benny Goodman and Glenn Miller while also arranging intricate quilt patterns inspired by the works of Georgia O’Keeffe, and they
    never miss a community theater rendition of "Our Town."
  travel: Kristy Keenan enjoys low‑key road trips to nearby historic sites like Letchworth State Park and the Erie Canal, and they have saved for a once‑in‑a‑lifetime genealogical pilgrimage to Dublin,
    Ireland, though budget constraints keep the trip on a wish list.
  culinary: Kristy Keenan prefers classic comfort dishes such as homemade chicken pot pie seasoned with rosemary, thyme, and garden‑grown carrots, and they love baking New York‑style cheesecake topped with
    fresh strawberries harvested from their backyard.
  core: Kristy Keenan blends relentless organization, competitive spirit, and a love for tradition into a disciplined, albeit occasionally stubborn, 90‑year‑old life that honors both community service and
    personal legacy.
background:
  cultural: Kristy is a white American raised in the Niagara County region of New York. Her family heritage blends Irish and German roots, common among the area’s immigrant communities in the early 20th
    century. She grew up in a modest, middle‑class household with strong Protestant (Methodist) influences, which emphasized hard work, community service, and self‑reliance. The cultural values of the Great
    Lakes area—practicality, modesty, and a deep appreciation for local history—have shaped her worldview. Kristy’s upbringing during the Great Depression and World War II era reinforced her structured,
    skeptical, and competitive nature, while her lifelong participation in local church and community events reflects the region’s tight‑knit social fabric.
