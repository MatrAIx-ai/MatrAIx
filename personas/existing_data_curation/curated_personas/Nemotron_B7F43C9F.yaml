  hobbies: '[''Cooking Mexican cuisine'', ''Salsa and cumbia dancing'', ''Gardening'', ''Zumba fitness classes'', ''Volunteering at community church events'', ''Organizing game nights and group activities'',
    ''Reading cozy mystery novels'', ''Handmade crafts and décor'']'
  career_goals: Gabriella aims to complete her associate degree in Business Administration within the next two years, securing a full‑time position as a store supervisor or front‑desk manager at a local
    retailer or hospitality venue. She envisions using her organizational strengths and people skills to advance into a management role, and eventually start a small home‑based catering business that blends
    her love for Mexican cooking with community gatherings. Maintaining a stable, routine‑friendly work schedule that allows her to stay close to family and support local cultural events is a core ambition.
