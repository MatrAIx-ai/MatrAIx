  hobbies: '["Hiking", "Bird Watching", "Gardening", "Cooking and Baking", "Quilting", "Book Club", "Community Volunteering", "Card Games", "Attending Local Fairs", "Genealogy Research"]'
  career_goals: Chelsi aims to advance from her current server role into a supervisory position within a larger institutional food‑service operation, such as a college dining hall or hospital kitchen, where
    she can apply her organizational strengths to lead a team and improve service efficiency. She plans to earn a certification as a Certified Food Safety Trainer and to complete a hospitality‑management
    certificate program at a local community college. In the longer term, Chelsi dreams of launching a small catering and baked‑goods business that highlights seasonal, locally sourced ingredients, allowing
    her to blend her curiosity for new recipes with practical, community‑focused entrepreneurship. Throughout her career progression, she seeks to mentor younger staff, achieve measurable improvements in
    customer satisfaction scores, and contribute to a safe, high‑quality dining environment.
