  hobbies: '[''Visiting art galleries and museums'', ''Attending community theater productions'', ''Boating and sailing on the Caloosahatchee River'', ''Landscape and street photography'', ''Cooking international
    cuisines'', ''Traveling to cultural festivals'', ''Volunteering with youth arts programs'', ''Reading contemporary literature'', ''Gardening'', ''Cycling with a local club'']'
  career_goals: Paul aims to advance to a regional director role within the next five years, overseeing multiple properties and shaping a portfolio that integrates cultural tourism. He plans to augment
    his leadership toolkit with an executive MBA and specialized training in sustainable hospitality. Passionate about community impact, he seeks to launch a corporate-supported arts incubator in Fort Myers,
    providing mentorship and resources for emerging local artists. Additionally, Paul aspires to mentor junior managers, champion diversity and inclusion initiatives, and position his organization as a
    model for socially responsible tourism.
