personas:
  professional: Hung Wong, a 60‑year‑old retail veteran, merges his knack for visual merchandising with an avid curiosity for contemporary art, crafting store displays that fuse bold aesthetics with data‑driven
    layout strategies; they lead teams with a competitive edge, mentor newcomers by balancing strict performance metrics and flexible problem‑solving, and are now eyeing a district‑manager role while prepping
    to launch a boutique that showcases curated artworks and handcrafted goods.
  sports: Hung Wong, an avid hiker, tackles the Cascades each weekend with a sturdy pair of boots, participates in the Bellevue Trail Club’s group outings, occasionally rebounds on a community tennis court,
    and supports the Seattle Seahawks and Sounders FC while cheering at the local sports bar, balancing a competitive mindset in personal fitness with a calm appreciation for nature’s rhythm.
  arts: Hung Wong, a dedicated patron of contemporary works, spends Saturday afternoons at the Bellevue Arts Museum studying pieces by artists such as Ai Weiwei and Huang Yong Ping, practices calligraphy
    with traditional brushes as a meditative ritual, plays supporting roles in community theater productions, and enjoys live gigs featuring local acts like The Moonlit Hours, all of which satisfy a curious
    and open‑minded appetite for both tradition and avant‑garde expression.
  travel: Hung Wong plans trips with meticulous research, favoring immersive cultural experiences over tourist clichés; they have explored Kyoto’s historic temples, navigated Shanghai’s modern art districts,
    trekked tea plantations in Taiwan, and enjoyed weekend road trips to the San Juan Islands, balancing a competitive knack for finding affordable airfare with occasional splurges on boutique hotels when
    the destination promises unique artistic inspiration.
  culinary: Hung Wong, an enthusiastic home chef, masters dishes such as steamed dumplings, braised pork belly, and spicy tofu stew, sourcing fresh bok choy from the farmer’s market and wielding a seasoned
    cast‑iron wok; they love hosting family banquets where stories flow over steaming plates, but a competitive streak sometimes drives them to over‑salt the sauce in the heat of conversation.
  core: Hung Wong, a 60‑year‑old art‑savvy retail leader, blends competitive market instincts with a meditative love for calligraphy, while staying socially active, hiking regularly, and nurturing a boutique
    dream that fuses commerce with culture.
background:
  cultural: Hung is a first‑generation Chinese‑American who grew up in a bilingual household in the Pacific Northwest. His parents immigrated from Hong Kong, instilling a respect for Confucian values such
    as hard work, family loyalty, and communal harmony. He maintains fluency in Mandarin and Cantonese, celebrates Chinese New Year and the Mid‑Autumn Festival, and often incorporates traditional customs
    into family life. While fully integrated into American society—evidenced by his community involvement in Bellevue—he retains a strong connection to East Asian heritage, especially through art, cuisine,
    and language. This bicultural perspective informs both his professional approach to retail and his personal interests.
