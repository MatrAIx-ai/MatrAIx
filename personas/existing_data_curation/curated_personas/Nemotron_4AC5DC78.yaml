  career_goals: Hung aims to transition into a store manager or district manager role where he can shape the customer experience across multiple locations. He is also planning to launch a boutique that
    showcases curated Asian contemporary art and handcrafted goods, blending his retail expertise with his passion for culture. In the longer term, he hopes to serve as a mentor and trainer for emerging
    retail professionals, especially those from immigrant backgrounds, and to contribute to community cultural initiatives that promote cross‑cultural appreciation.
