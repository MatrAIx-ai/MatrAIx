  career_goals: At 60, Norman aims to solidify his financial security and reduce work‑related stress. He plans to obtain a Certified Bookkeeper credential to formalize his expertise, which will enable him
    to transition into part‑time consulting for small local businesses. He aspires to build a modest solo bookkeeping practice that offers predictable hours and a structured environment, allowing him to
    manage his anxiety more effectively. Additionally, he hopes to volunteer his skills at community centers, providing basic budgeting workshops for low‑income residents, and eventually retire with a stable
    retirement fund while maintaining a low‑stress, purposeful routine.
