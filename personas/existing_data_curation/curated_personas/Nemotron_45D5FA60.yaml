personas:
  professional: Mario Campos, a 26‑year‑old bilingual physical therapist in Allentown, combines his meticulous musculoskeletal assessment skills with a curiosity for art‑integrated rehabilitation, designing
    patient‑centered exercise plans while flexibly adapting protocols to each individual's progress and cultural context.
  sports: Mario Campos, a fan of the Philadelphia Eagles and the Lehigh Valley IronPigs, participates in a local adult soccer league during the spring, hikes the Appalachian Trail’s nearby segments on weekends
    with the Allentown Hiking Club, and attends weekly small‑group salsa lessons that keep them moving while satisfying their love for rhythm and coordination.
  arts: Mario Campos, an avid photographer of Allentown’s vibrant street murals—including works by local artists like José Otero—frequents the Allentown Art Museum and the Norlin Gallery, strums acoustic
    renditions of Rubén Blades and Celia Cruz during intimate jam sessions, and draws inspiration from Frida Kahlo’s color palettes to enhance his therapeutic visual cues.
  travel: Mario Campos, who prefers weekend getaways that blend culture and nature, has explored the historic streets of Old San Juan, trekked the Poconos in autumn, plans a future trip to Barcelona’s art
    districts, and enjoys spontaneous road trips to nearby Amish country for quiet reflection.
  culinary: Mario Campos, a self‑taught cook who rates his skill as intermediate, loves preparing arroz con gandules with sofrito, annatto‑colored rice, and pork al pastor, meticulously layers pasteles
    with seasoned pork and plantain mash, and delights in pairing dishes with fresh tropical fruit smoothies, though they occasionally over‑salt the rice.
  core: Mario Campos blends a therapist’s precision with an artist’s heart, channeling his love for music, mural photography, and home‑cooked island dishes into community‑focused care while juggling student
    loans, occasional overspending on gear, and a penchant for solitary hikes.
background:
  cultural: Mario grew up in a bilingual household in Puerto Rico before his family relocated to Allentown. His family maintains strong ties to Puerto Rican culture, celebrating festivals like Noche de
    San Juan, listening to salsa and plena, and sharing cooking traditions passed down through generations. This heritage informs his compassionate approach to patient care, as he often serves as a cultural
    bridge for Spanish‑speaking patients navigating the U.S. healthcare system. He participates in the local Puerto Rican community center, helping to organize cultural events and health education workshops.
    While he has embraced the broader Pennsylvania lifestyle, his identity remains rooted in the island’s values of family solidarity, respect for elders, and the joy of music and dance.
