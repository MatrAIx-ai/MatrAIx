    techniques'']'
  hobbies: '[''Street photography'', ''Visiting art galleries'', ''Playing acoustic guitar'', ''Cooking traditional Puerto Rican cuisine'', ''Hiking local trails'', ''Reading neuroscience and psychology'',
    ''Volunteering at community health fairs'', ''Salsa dancing in small groups'']'
  career_goals: Mario aims to complete a bachelor’s degree in physical therapy within the next two years, followed by certification as a clinical specialist in orthopaedic sports rehabilitation. He envisions
    opening a low‑cost community clinic in Lehigh County that offers culturally sensitive services for underserved Latino families, integrating art‑based interventions such as guided painting or music movement
    sessions. Long‑term, he hopes to become a mentor and adjunct instructor at a local college, sharing his blended expertise in biomechanics, bilingual patient care, and creative therapeutic approaches.
