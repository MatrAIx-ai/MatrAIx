persona_description: A conservation biologist who is passionate about the restoration and protection of New Zealand's native wildlife and their habitats. This person is dedicated to the eradication of invasive
  species, the reintroduction of native species, and the creation of ecological islands to restore degraded habitats. They have a deep understanding of New Zealand's unique flora and fauna, including the
  kiwi, weka, moa, and kakapo, and are knowledgeable about the impacts of introduced species on the country's biodiversity. This person is likely to have a strong interest in the history of New Zealand's
  wildlife and the efforts to protect it from human impact.
