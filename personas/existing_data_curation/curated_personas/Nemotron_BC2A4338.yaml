personas:
  professional: Diane Senn is a veteran customer service specialist with three decades mastering Salesforce and Five9, who leverages their practical mindset, clear communication, and empathetic problem‑solving
    to mentor new reps, lead department huddles, and shape upcoming service‑experience policies as they transition into a part‑time advisory role.
  sports: Diane Senn is a dedicated member of the Congaree Trailblazers walking club, enjoys low‑impact fitness through weekly nature hikes, roots for the Carolina Panthers (NFL) and the Charlotte Hornets
    (NBA), and participates in a friendly bridge league at the senior center.
  arts: Diane Senn expresses their creativity through a community choir that frequently performs Eric Whitacre’s choral pieces, a weekly book club exploring Toni Morrison’s novels, and a quilting circle
    where they craft patterns inspired by Martha Stewart’s designs, all while humming to Dolly Parton’s Southern ballads during garden work.
  travel: Diane Senn plans trips with a mix of meticulous itineraries and spontaneous day‑trips, savoring annual visits to Congaree National Park, weekend getaways to Charleston’s historic district, and
    dreaming of a Mediterranean cruise that would finally let them wander the olive groves of Tuscany and the canals of Venice.
  culinary: Diane Senn boasts a solid home‑cooking repertoire, delighting in shrimp and grits, collard greens seasoned with smoked ham hocks, and peach cobbler topped with freshly cracked pecans, while
    they experiment with okra‑based gumbo in Southern‑cuisine cooking classes.
  core: Diane Senn is a structured yet sociable retiree who balances meticulous budgeting with spontaneous bridge marathons, overshares garden tips at every gathering, and refuses to let a single missed
    medication dose derail their upbeat outlook.
background:
  cultural: Diane is a lifelong resident of Hopkins, South Carolina, rooted in the traditions of the American South. She grew up in a close‑knit, predominantly white community where Southern hospitality,
    church fellowship, and community festivals were central to daily life. Her upbringing emphasized family, modesty, and service, shaping her cooperative and considerate demeanor. While she honors local
    customs such as potluck gatherings, church events, and the annual Strawberry Festival, she also embraces contemporary influences through continued education and diverse community involvement.
