  hobbies: '["Community choir", "Book club", "Gardening", "Quilting", "Bridge", "Cooking classes", "Church outreach volunteering", "Nature walks in Congaree National Park", "Senior center mentorship", "Local
    history tours"]'
  career_goals: Approaching retirement, Diane aims to transition into a part‑time advisory role where she can mentor younger staff and help shape customer‑experience policies. She is interested in obtaining
    a Certified Customer Service Professional credential and completing her associate degree in Business Administration. Additionally, she hopes to volunteer as a community liaison for local nonprofit organizations,
    leveraging her expertise to improve service delivery for seniors and volunteers.
