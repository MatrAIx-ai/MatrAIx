persona_description: A scientist or researcher who studies the effects of abrasive disturbances on small algae, specifically focusing on the mechanisms by which crevices act as refugia during these disturbances.
  This person is interested in the size and features of crevices, their relationship to diatom density and composition, and the impact of abrasion on diatom biovolume and location in crevices. They may
  also be interested in the assemblages of filamentous algae on caddisfly cases.
