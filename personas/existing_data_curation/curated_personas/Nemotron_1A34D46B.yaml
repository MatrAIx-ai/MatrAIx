personas:
  professional: An aspiring concept artist named Tracy Kuperman blends disciplined project planning with boundless imagination, using Procreate, Python generative scripts, and charcoal sketches to prototype
    narrative-driven game visuals while reliably meeting school deadlines.
  sports: A low‑key fitness enthusiast named Tracy Kuperman jogs along the Wabash River while streaming Aphex Twin, supports the Indiana Pacers and Fort Wayne Mastodons, and participates in the Fort Wayne
    Hiking Club’s weekend trail outings rather than joining formal school sports teams.
  arts: An urban art enthusiast named Tracy Kuperman curates weekly playlists featuring Aphex Twin and Autechre, regularly visits exhibitions by James Turrell at the Fort Wayne Museum of Art, contributes
    zines inspired by Kiki Smith’s visual poetry, and draws inspiration from the street murals of Detroit and the conceptual installations of Yayoi Kusama.
  travel: A wanderlust‑driven teen named Tracy Kuperman has explored the dunes of Great Sand Dunes National Park, documented Detroit’s vibrant murals, attended Helsinki Design Week’s digital art showcase,
    and dreams of traveling to Kyoto’s historic temples and Iceland’s Reykjavik street‑art scene, always planning trips with a blend of free online itineraries and school‑approved budgets.
  culinary: A culinary experimentalist named Tracy Kuperman enjoys crafting homemade ramen with miso broth, spicing avocado toast with chili flakes, whipping up vegan chocolate brownies, and sourcing fresh
    basil and shiitake mushrooms from the local farmers market despite their novice kitchen confidence.
  core: Tracy Kuperman is a calm, night‑owl creator who flips between charcoal sketches and code, hoards stray LEGO bricks for spontaneous sculptures, and often forgets to respond to texts while chasing
    the perfect brush stroke.
background:
  cultural: Tracy is a white American teenager raised in the suburban neighborhoods of Fort Wayne, Indiana. Her family’s cultural milieu reflects typical Midwestern values of community involvement, modesty,
    and self-reliance. She celebrates mainstream American holidays such as Thanksgiving, the Fourth of July, and Christmas, and her family occasionally honors European roots—particularly German and Irish—through
    traditional recipes and stories. Growing up near local cultural institutions like the Fort Wayne Museum of Art and the Foellinger-Freimann Botanical Gardens, she has been encouraged to explore creative
    pursuits while remaining grounded in the supportive, modest environment of the Midwest.
attributes:
  skills: '["Digital illustration", "Traditional sketching", "Creative writing", "Basic Python programming", "Generative art with p5.js", "Visual storytelling", "Concept development", "Research and synthesis
