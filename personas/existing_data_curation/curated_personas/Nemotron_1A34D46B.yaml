  hobbies: '["Sketching", "Digital painting", "Speculative fiction writing", "Listening to experimental music", "Generative art coding", "Museum and gallery visits", "Photographing urban textures", "Hiking
    and nature drawing", "LEGO building", "Zine creation"]'
  career_goals: Tracy aspires to attend a specialized art and design college where she can refine her illustration and interactive media skills. She aims to work as a concept artist and later as a creative
    director for indie video games or narrative-driven experiences, integrating her love for abstract ideas with visual storytelling. In the long term, she envisions leading interdisciplinary projects that
    blend art, technology, and research, perhaps curating immersive exhibitions that challenge viewers' perception.
