personas:
  professional: James Maxwell is a 19‑year‑old associate‑degree student in environmental technology, juggling hands‑on automotive repairs and digital photography while dreaming of becoming a renewable‑energy
    field technician; their blend of curiosity and practicality makes them a go‑to trouble‑shooter for classmates and a reliable volunteer at community events, where they balance new ideas with proven methods.
  sports: James Maxwell is a 19‑year‑old outdoor enthusiast who spends weekends hiking the trails of Madison County Nature Preserve, participates in the Madison County Trailblazers hiking club and a casual
    birdwatching group, and roots for the Florida Gators football team while occasionally catching Tampa Bay Buccaneers games with friends.
  arts: James Maxwell is a 19‑year‑old amateur musician who strums acoustic renditions of John Denver and Sufjan Stevens while studying composition from online tutorials, captures sunset vistas with a DSLR
    inspired by Ansel Adams, builds detailed model kits of vintage aircraft, and devours science‑fiction works by Octavia Butler and Neal Gaiman, often attending the county’s open‑mic nights and art fairs
    for creative inspiration.
  travel: James Maxwell is a 19‑year‑old who prefers low‑key road trips to nearby state parks like Savannah River Preserve and the Everglades, but they dream of an eco‑tour in Costa Rica’s Monteverde Cloud
    Forest and a future backpacking adventure through Iceland’s geothermal sites, balancing tight student budgets with a love for immersion in natural settings.
  culinary: James Maxwell is a 19‑year‑old who loves firing up a charcoal grill on weekend evenings, serving friends smoky baby back ribs, grilled corn with cilantro‑lime butter, and classic Southern baked
    beans, while they’re still learning to perfect a homemade hamburger patty or a simple herb‑marinated fish.
  core: James Maxwell is a 19‑year‑old who blends a hands‑on curiosity for tech and the outdoors with a relaxed, community‑oriented vibe, often juggling guitar strings, model kits, and sustainable dreams
    while occasionally forgetful about deadlines.
background:
  cultural: James is a 19‑year‑old white male raised in Madison, a small, close‑knit community in north‑central Florida. His family has deep roots in the area, with generations of farming and small‑business
    ownership shaping a practical, self‑reliant outlook. Growing up, he attended local public schools where community gatherings—county fairs, high school football games, and church events—were central
    to social life. This upbringing fostered values of neighborliness, modest hospitality, and a relaxed attitude toward schedules, aligning with the broader Southern rural culture of personal kindness
    and cooperation. While his heritage is predominantly Anglo‑American, James’s perspective is broadened by friendships with peers from diverse backgrounds and an openness to new ideas, blending tradition
    with a curiosity‑driven mindset.
attributes:
  skills: '[''Basic automotive repair'', ''Computer hardware troubleshooting'', ''Digital photography (manual mode)'', ''Simple data analysis (Excel, Google Sheets)'', ''Team collaboration'', ''Conflict
