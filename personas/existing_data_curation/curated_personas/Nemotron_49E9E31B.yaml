  hobbies: '[''Hiking in local nature preserves'', ''Birdwatching'', ''Digital photography'', ''Playing acoustic guitar'', ''Strategy video gaming'', ''Model kit building'', ''Volunteering at community
    events'', ''Reading sci‑fi and sustainability non‑fiction'', ''Cooking and grilling'']'
  career_goals: James aims to complete his associate degree, ideally in environmental technology or sustainable agriculture, and then pursue a bachelor’s in environmental engineering or natural resources
    management. He plans to earn certifications in solar photovoltaic installation and field service work, envisioning a career as a renewable‑energy field technician serving rural Florida communities.
    He also hopes to maintain flexibility to volunteer locally and run a small freelance tech‑repair side business, blending his curiosity for how things work with a practical, community‑focused career
    path.
