persona_description: A researcher who studies the impact of weight and activity on children's ability to think and learn, particularly focusing on cognitive tests and brainpower. She is interested in understanding
  why activity and weight matter for children's cognitive function and is looking for ways to encourage overweight children to participate in physical activity. Her studies have shown that physical activity
  can improve cognitive function, and she is eager to find out why this is the case.
