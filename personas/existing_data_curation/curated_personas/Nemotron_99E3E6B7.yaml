  hobbies: '[''Sketching and painting'', ''Visiting galleries and museums'', ''Reading speculative fiction'', ''Cooking Dominican cuisine'', ''Salsa dancing'', ''Volunteering at youth art workshops'', ''Urban
    photography'', ''Meditation and journaling'']'
  career_goals: Miriam plans to transfer to a four‑year university to major in Museum Studies or Cultural Management, aiming to become a curator who highlights Caribbean and Latinx voices in contemporary
    art. She envisions creating community‑based exhibitions and educational programs that foster cultural pride among immigrant youth. In the longer term, she hopes to launch a nonprofit arts outreach organization
    that provides free workshops, mentorship, and digital archives for underrepresented artists. Miriam also aspires to freelance as a graphic designer, merging her artistic sensibility with her cultural
    heritage to produce compelling visual narratives for social impact campaigns.
