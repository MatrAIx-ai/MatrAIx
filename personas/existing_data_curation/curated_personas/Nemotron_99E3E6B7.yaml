personas:
  professional: Miriam Luong is a budding museum studies aspirant who leverages bilingual fluency, digital illustration skills, and organized event‑planning talent to curate pop‑up exhibitions that spotlight
    underrepresented urban artists while engaging youth volunteers.
  sports: Miriam Luong avidly follows Inter Miami CF and the Miami Heat, rides with a community cycling club on weekends, and maintains a regular yoga practice that complements their calm, resilient disposition.
  arts: Miriam Luong draws inspiration from Wynwood’s vivid murals, studies the works of Banksy and Kehinde Wiley, and spends evenings sketching street scenes while listening to the experimental jazz of
    Kamasi Washington.
  travel: Miriam Luong prefers short, culturally immersive trips, having explored New Orleans’ French Quarter, attended a photography workshop in Oaxaca, and dreaming of a future study‑abroad semester in
    Barcelona’s art districts.
  culinary: Miriam Luong loves cooking family recipes such as mangú (mashed plantains) with sautéed onions and sancocho, a hearty stew of root vegetables, chicken, and cilantro, often experimenting by adding
    smoked paprika for extra depth.
  core: Miriam Luong is a methodical, curiosity‑driven 18‑year‑old who balances a disciplined art‑focused routine with an easy‑going habit of collecting limited‑edition prints, all while maintaining a tranquil
    mindset.
background:
  cultural: Miriam’s family emigrated from the Dominican Republic and settled in Miami’s vibrant multicultural neighborhoods, where bilingualism and Caribbean traditions are woven into everyday life. She
    grew up celebrating Dominican holidays such as Independence Day and Carnaval, enjoying merengue and bachata music at family gatherings while also embracing the diverse artistic influences of Miami’s
    multicultural scene. Her upbringing emphasized the importance of community solidarity, respect for elders, and the sharing of cultural stories through food, music, and dance. These experiences have
    shaped Miriam’s worldview, driving her to honor her heritage while championing inclusive platforms that give voice to the broader diaspora.
attributes:
  skills: '[''Bilingual communication (English/Spanish)'', ''Graphic design (Adobe Photoshop, Illustrator)'', ''Digital illustration'', ''Photography (composition and editing)'', ''Social media content
