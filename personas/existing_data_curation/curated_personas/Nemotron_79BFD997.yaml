personas:
  professional: An applied engineer and data scientist, Joel Palm leverages their Lean Six Sigma mindset and systematic problem‑solving to design data‑driven solutions for sustainable technology, balancing
    meticulous project planning with the flexibility to pivot when new environmental data emerges.
  sports: An avid mountain biker, Joel Palm devotes weekends to riding the Blue Ridge foothills with the Charlottesville Mountain Bike Club, tracks performance with Strava, and roots for the Virginia Cavaliers
    men's basketball team while occasionally tuning into the Tour de France for technical inspiration.
  arts: Joel Palm’s creative outlet includes strategic board‑game nights featuring titles like Terraforming Mars and Scythe, an appreciation for indie folk artists such as Bon Iver and Fleet Foxes, and
    regular visits to the Paramount Theater for contemporary plays, all of which feed their analytical yet imaginative mindset.
  travel: Joel Palm prefers meticulously planned getaways that blend outdoor adventure with sustainability learning, having already trekked the Appalachian Trail, explored Norway’s fjords to study hydroelectric
    systems, and earmarked Iceland’s geothermal sites for a future research‑focused vacation, all while balancing a modest travel budget.
  culinary: At the kitchen counter, Joel Palm transforms home‑grown vegetables into dishes like quinoa salad with roasted beets and basil pesto pasta, experiments with sous‑vide chicken thighs when time
    permits, and occasionally indulges in a locally brewed IPA after a long bike ride.
  core: Joel Palm blends a data‑driven engineer’s precision with a backyard gardener’s patience, all while keeping a secret stash of novelty Arduino kits for spontaneous tinkering.
background:
  cultural: Joel was raised in a middle‑class family of Dutch‑German ancestry in the Midwest before moving to Charlottesville for graduate studies. The household emphasized punctuality, self‑reliance, and
    the value of a solid education, shaping his practical and organized outlook. His cultural identity blends traditional Midwestern work ethic with the liberal, academic atmosphere of a university town.
    He participates in local community events such as the Virginia Wine Festival and the Charlottesville Farmers Market, reflecting a growing appreciation for regional food culture. The marriage and his
    involvement in his spouse’s community activities further reinforce his sense of belonging to the Albemarle County social fabric.
