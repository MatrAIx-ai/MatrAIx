  career_goals: He aims to transition from his current hiatus into a role where his analytical and engineering strengths can be applied to sustainable technology solutions. Over the next three to five years,
    Joel plans to secure a data analyst or product engineering position at a clean‑tech startup or an interdisciplinary research lab in the Charlottesville region. He is also preparing a portfolio of freelance
    data‑visualization projects for local agricultural cooperatives, with the long‑term ambition of founding a consultancy that helps small farms adopt data‑driven practices for water‑use efficiency and
    carbon‑footprint reduction. Continuing education through an advanced certification in machine learning is also on his roadmap.
