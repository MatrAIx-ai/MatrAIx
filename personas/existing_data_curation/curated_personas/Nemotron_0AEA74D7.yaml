personas:
  professional: Kenneth Boyd, an aspiring LEGO architect, applies their methodical planning, organized mindset, and practical focus to assemble intricate models, turning each set into a structured masterpiece
    while reliably following step‑by‑step instructions, and they take pride in each finished creation.
  sports: Kenneth Boyd, a forward on the Saturday Soccer Squad at the local park, follows the strategies of the MLS’s Seattle Sounders and supports the New York Yankees, applying disciplined practice routines
    and a cooperative spirit to improve team play, which they value.
  arts: Kenneth Boyd, a budding cartoonist, draws daily strips inspired by Bill Watterson’s Calvin and Hobbes and enjoys listening to instrumental piano pieces by Ludovico Einaudi, weaving imaginative narratives
    that reflect their organized creativity, which they proudly share.
  travel: Kenneth Boyd, an enthusiastic explorer, loves planning trips with parents using colorful maps, has visited the Grand Canyon and NASA’s Kennedy Space Center, and dreams of seeing the Eiffel Tower,
    balancing curiosity with a need for structured itineraries and family supervision, which they enjoy.
  culinary: Kenneth Boyd, a picky yet adventurous eater, favors macaroni and cheese, pepperoni pizza, and fruit salads with strawberries and bananas, can assemble simple snacks like peanut butter crackers,
    and enjoys helping in the kitchen by measuring ingredients for his favorite chocolate chip cookies, which they savor.
  core: Kenneth Boyd blends a love for structured LEGO building, methodical problem‑solving, and cooperative play, often cataloguing their baseball cards while humming piano tunes, yet they occasionally
    forget chores in favor of a new adventure book.
background:
  cultural: Kenneth grows up in a close‑knit African‑American family in Houston’s East End, where church, music, and community gatherings play central roles. Family meals often feature soul food favorites
    like collard greens and cornbread, and holidays such as Juneteenth and Kwanzaa are celebrated with storytelling and music. His parents emphasize education, responsibility, and respect for others, values
    reinforced by participation in local youth programs and the vibrant cultural mosaic of Harris County.
