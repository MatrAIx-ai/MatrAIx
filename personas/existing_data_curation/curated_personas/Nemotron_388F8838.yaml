  career_goals: As she approaches the next phase of her professional life, Kristina aims to transition into a mentorship and advisory role where she can leverage her practical curiosity to guide emerging
    talent, especially women and underrepresented groups in technology. She is passionate about leading a digital transformation effort for a local government agency in Warren County, applying her expertise
    in cloud migration, cybersecurity, and AI ethics to improve public services. Additionally, she seeks opportunities to consult for small businesses, helping them adopt scalable tech solutions while maintaining
    a balanced, methodical approach.
