persona_description: A research engineer at the National Institute of Standards and Technology (NIST) and Virginia Tech who specializes in developing and testing reference materials for measuring hazardous
  indoor air pollutants. The engineer has expertise in the field of environmental engineering, particularly in the area of indoor air quality testing. The engineer has experience conducting inter-laboratory
  studies to evaluate the accuracy of measurement instruments and has a proven track record of producing standardized test samples for VOC emissions testing. The engineer is interested in improving the
  accuracy of measurement results and has developed a mathematical model to accurately predict rates of emission from VOC reference materials. The engineer is committed to reducing inter-laboratory variability
  in results and has successfully conducted pilot inter-laboratory tests using prototype reference materials.
