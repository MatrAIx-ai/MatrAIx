persona_description: A mechanical engineering technician who is proficient in using CAD software, has a background in mechanical engineering technology, and is responsible for assisting in the manufacturing
  processes in factories or in research and development labs before manufacturing takes place. They are expected to assist with manufacturing processes, record and analyze data, make calculations and estimates,
  and report their findings. They should have an associate's degree or other postsecondary training in mechanical engineering technology, and should take as many science and math courses as possible while
  in high school. The median annual wage for mechanical engineering technicians was $53,910 in May 2015, and employment of mechanical engineering technicians is projected to grow 2 percent from 2014 to
  2024, slower than the average for all occupations. However, there should be opportunities for those who can master new software and technology, as well as traditional manual skills.
