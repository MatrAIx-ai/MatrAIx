  hobbies: '[''Cooking (Mexican and fusion recipes)'', ''Attending cultural festivals'', ''Yoga and mindfulness meditation'', ''Hiking in the San Bernardino hills'', ''Reading mystery/thriller novels'',
    ''Exploring productivity apps'', ''Listening to regional Mexican music'']'
  career_goals: Rosa aspires to advance into a senior administrative role, such as Office Manager or Executive Assistant, within the next three to five years. She plans to obtain a certification in Office
    Administration or Project Management to strengthen her credentials. Her competitive drive pushes her to improve efficiency metrics in her current position, aiming to be recognized for reducing turnaround
    times and streamlining workflows. Ultimately, Rosa envisions leading a small team of administrative professionals, mentoring newcomers, and possibly launching a boutique virtual assistance service that
    caters to bilingual clients. She also seeks to develop better organizational habits to mitigate stress and achieve a healthier work‑life balance.
