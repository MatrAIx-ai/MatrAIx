persona_description: A project manager who is responsible for overseeing the development of Alterra Power Corp.'s 40-MW Wind project and is committed to incorporating all three aspects of EBM (Ecological,
  Social, and Economic) in their project. The project manager is skilled in identifying and analyzing the complexities of the project and is adept at collaborating with global partners and scientists from
  various fields to develop an adaptive management framework and remove the complexities related to social and environmental systems. The project manager is also skilled in engaging with different stakeholders
  to ensure that the project is developed in a way that benefits both the company and the local community.
