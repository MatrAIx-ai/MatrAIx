personas:
  professional: Jose Jenkis, a 39‑year‑old operations manager with a Lean Six Sigma Green Belt, PMP certification and fluency in Spanish and English, uses data‑driven strategic planning, Power BI analytics,
    and bilingual negotiation to boost profitability, while their competitive edge and occasional healthy skepticism keep teams focused and accountable, and their sociable nature fuels cross‑functional
    collaboration during community‑driven projects.
  sports: Jose Jenkis, an energetic member of the local community soccer league, also drills on the dance floor mastering salsa and reggaeton steps, follows the Miami Heat and the San Juan Athletics baseball
    team, and complements weekly training with interval hikes along coastal trails, embodying a competitive yet socially driven fitness routine.
  arts: Jose Jenkis regularly attends live concerts featuring artists such as Bad Bunny, Marc Anthony and local salsa legend Tito Rojas, dances to reggaeton beats at festivals, and curates a collection
    of vintage vinyl records that echo the rhythms of hometown fiestas patronales, blending cultural pride with a voracious appetite for contemporary Latin pop.
  travel: Jose Jenkis prefers spontaneous weekend getaways that mix adventure and cultural immersion, often jetting off to coastal destinations like Cartagena, Punta Cana, or Costa Rica’s rainforests, while
    also making annual trips to New York City for business conferences and family visits, and dreams of trekking the Camino de Santiago in Spain.
  culinary: Jose Jenkis, a confident home chef, delights in preparing arroz con gandules, lechón asado with crispy skin, and mofongo stuffed with shrimp, all seasoned with sofrito, adobo, and a splash of
    sour orange, frequently experimenting with tropical fruits like guava and passion fruit in desserts, though they often leave the kitchen a mess.
  core: Jose Jenkis, a competitive yet charismatic operations leader, balances relentless ambition with a love for salsa, weekend soccer, and occasional impromptu karaoke, meticulously tracking budgets
    while sometimes neglecting dentist appointments.
background:
  cultural: Jose grew up in Carolina, Puerto Rico, a vibrant municipality known for its lively fiestas patronales and strong community bonds. His Puerto Rican heritage is central to his identity, influencing
    his bilingual fluency, love for music, dance, and traditional food. He values family ties, local customs, and the island's spirit of resilience. While he embraces modern business practices, he remains
    deeply connected to the Caribbean's rich cultural tapestry, often integrating cultural insights into his professional and social endeavors.
