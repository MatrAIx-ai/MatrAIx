  career_goals: Jose aims to advance to a senior leadership role, such as Director of Operations or Vice President of Business Development, within a multinational corporation operating in the Caribbean
    region. He is focused on leading large‑scale digital transformation projects that modernize legacy processes and improve efficiency. In the longer term, he aspires to launch his own consulting firm
    that helps Puerto Rican and Caribbean small‑and‑medium enterprises adopt best‑practice operational strategies, leveraging his competitive drive and practical curiosity to create measurable impact.
