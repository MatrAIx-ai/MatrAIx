personas:
  professional: A seasoned surveillance specialist, Exie Nethery leverages two decades of CCTV expertise, a meticulous eye for visual detail honed by years of sketching, and a cooperative leadership style
    to keep casino floors secure while mentoring junior officers.
  sports: An avid outdoor enthusiast, Exie Nethery hikes the Finger Lakes trails with the Rochester Hiking Club, follows the Rochester Red Wings baseball team, and competes in a community‑center tennis
    league on Saturdays while occasionally joining a recreational softball squad.
  arts: A dedicated art aficionado, Exie Nethery spends weekends sketching at the George Eastman Museum, experiments with analog photography of Rochester’s historic streets, and finds inspiration in Ansel
    Adams’ landscapes and Kehinde Wiley’s portraiture, while regularly attending literary talks featuring authors like Zadie Smith.
  travel: A methodical planner with a taste for cultural immersion, Exie Nethery maps out weekend getaways to historic towns such as Saratoga Springs and Finger Lakes vineyards, while dreaming of extended
    trips to Florence’s Renaissance galleries and Kyoto’s temples, always leaving a day for spontaneous photo walks.
  culinary: A moderately skilled home cook, Exie Nethery delights in preparing mushroom risotto with locally sourced sage, pairing it with a glass of Finger Lakes Riesling, and experimenting with fresh
    pasta and farm‑to‑table salads featuring heirloom tomatoes and basil.
  core: Curious, organized, and harmoniously balanced, Exie Nethery blends their love of art with a security career, volunteers in community art‑education, and nurtures a habit of late‑night crossword puzzles
    while occasionally splurging on high‑end camera gear despite a carefully managed budget.
background:
  cultural: Exie was raised in a middle‑class family of German‑Irish ancestry in the upstate New York region. Her parents valued education, community involvement, and an appreciation for the arts, often
    taking her to local concerts, theater productions, and museum exhibitions. Growing up in Rochester exposed her to the city’s rich photographic legacy and its history as a hub for innovation, nurturing
    her curiosity and openness to unconventional ideas. While she aligns with mainstream American cultural norms, she embraces the regional emphasis on self‑reliance, modesty, and civic responsibility,
    shaping her cooperative nature and commitment to fostering harmony in both professional and personal circles.
