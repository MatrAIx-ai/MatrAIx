  career_goals: Exie aims to advance into a supervisory role such as Lead Surveillance Officer or Security Manager within a casino or cultural institution, where she can mentor junior staff and shape security
    policies. She plans to obtain the Certified Protection Professional (CPP) credential and pursue advanced coursework in security management. Long‑term, she envisions transitioning into security consulting
    for museums and galleries, merging her passion for the arts with her expertise in risk assessment, and developing a training program that integrates art‑history knowledge into protective practices.
