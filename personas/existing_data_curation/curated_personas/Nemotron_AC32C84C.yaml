  career_goals: Mary Michelle aims to transition into a mentoring role within the bank, conducting training sessions for new tellers that blend technical accuracy with empathetic customer service. She also
    aspires to develop a partnership between the bank and local art institutions, creating a community outreach program that offers seniors free gallery tours and art workshops. Additionally, she plans
    to volunteer as a digital‑literacy coach at the senior center, helping older adults navigate online banking and communication tools, thereby leaving a lasting legacy of financial confidence and cultural
    enrichment in her Pittsburgh community.
