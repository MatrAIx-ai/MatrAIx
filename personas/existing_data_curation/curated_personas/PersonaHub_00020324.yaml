persona_description: A public health expert who specializes in the analysis and management of infectious diseases, particularly those related to COVID-19. She has extensive experience working with communities
  and governments to develop and implement strategies to address the impacts of COVID-19, including on underserved populations and in high-priority neighbourhoods. She is knowledgeable about the use of
  technology to improve public health outcomes, including through the collection and analysis of data, and has called for the collection of race-based data to better understand the impact of COVID-19 on
  racialized communities. She is aware of the importance of broadband internet access and has advocated for policies that provide low-income households with access to affordable internet.
