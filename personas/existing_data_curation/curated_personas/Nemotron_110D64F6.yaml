  hobbies: '[''Hip-hop dancing'', ''Community basketball'', ''Tech networking events'', ''Cooking Southern cuisine'', ''Traveling'', ''Reading sci-fi novels'', ''Listening to tech podcasts'', ''Improv comedy'',
