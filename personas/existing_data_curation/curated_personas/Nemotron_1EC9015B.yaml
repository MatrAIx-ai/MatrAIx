personas:
  professional: Miguel Oquinn, a seasoned food‑service operations manager with a bachelor's in applied physics, leverages data‑driven SOPs, rigorous food‑safety compliance, and a no‑nonsense troubleshooting
    style to run efficient kitchens, while they rely on a preference for routine and calm assertiveness to guide their transition toward mentorship and the Certified Professional Food Safety Manager credential.
  sports: Miguel Oquinn, a faithful supporter of the New Jersey Devils, New York Giants, and New York Yankees, spends their leisure time playing six‑hole rounds at the Monmouth County community golf course
    and joining a local birdwatching club while they avoid strenuous activities that aggravate their knee arthritis.
  arts: Miguel Oquinn, an avid hobbyist who meticulously builds model‑train landscapes and crafts small wooden furniture, finds inspiration in the engineering biographies of Thomas Edison and Henry Ford,
    winds down listening to classic folk singer Johnny Cash, and they enjoy re‑watching timeless films like Casablanca for their nostalgic charm.
  travel: Miguel Oquinn, who prefers low‑key road trips, has explored historic coastal towns like Cape May and Philadelphia, dreams of visiting the railway museums of York, England, and the Bavarian beer
    gardens of Munich, yet they plan trips around their modest retirement budget and the seasonal rhythm of their garden.
  culinary: Miguel Oquinn, a competent home cook who blends fresh herbs from their modest kitchen garden into classic dishes like chicken pot pie and grilled salmon, brews their own pale ale with a penchant
    for precise temperature control, and they enjoy occasional indulgence in a well‑aged New York strip steak.
  core: Miguel Oquinn, a routine‑driven 60‑year‑old with a meticulous mind for operations, balances frugal living and hobby indulgence, wrestles with occasional health neglect, and they find calm in solitary
    craftsmanship and measured risk‑taking.
background:
  cultural: Miguel was raised in a middle‑class Irish‑American family in suburban New Jersey. His parents emphasized reliability, modesty, and a strong work ethic, values that continue to shape his pragmatic
    approach to life and work. A Catholic upbringing brought traditional holiday meals and a deep appreciation for food as a cultural anchor. Living in Monmouth County, he grew up with close‑knit community
    traditions—small‑town festivals, county fairs, and local diner breakfasts—that reinforced his preference for familiar routines and local connections. Though he never married, he remains deeply rooted
    in the regional customs of the New Jersey coast, participating in community volunteer clean‑up events and supporting local high‑school football games.
attributes:
  skills: '[''Food Safety Management'', ''Operational Workflow Optimization'', ''Inventory Control'', ''Staff Training and Development'', ''Budgeting and Cost Management'', ''Team Leadership'', ''Statistical
