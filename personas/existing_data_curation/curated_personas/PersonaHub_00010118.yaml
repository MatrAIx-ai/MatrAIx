persona_description: A technologist who is concerned about the impact of online content on society and democracy. They are interested in the ways that online speech and information are structured by commercial
  imperatives and how this affects the functioning of democratic institutions. They are aware of the potential for online content to be hurtful or dehumanizing and are concerned about the erosion of active
  citizenship and the spread of disinformation and misinformation. They are interested in the role that online platforms play in shaping the online environment and how this affects the quality and depth
  of public debate. They are also aware of the potential for online content to be used to influence politics and are concerned about the potential for such influence to be used for harmful purposes.
