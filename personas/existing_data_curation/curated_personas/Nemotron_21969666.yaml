personas:
  professional: Naheed Johnson, a bright kindergartner who loves assembling LEGO structures and leading circle time games, they balance curiosity for new ideas with the pragmatic need to follow classroom
    rules, blending organization with spontaneous creativity.
  sports: Naheed Johnson, a member of the neighborhood Little League Tigers soccer team and a regular at the community pool's beginner swimming class, they enjoy the structure of team drills and the freedom
    of splash-play, balancing energetic participation with occasional quiet downtime on the sidelines.
  arts: Naheed Johnson, a budding artist who adores drawing Mickey Mouse and singing the catchy tunes of The Wiggles, they spend afternoons at the preschool art corner mastering Crayola crayons and a small
    keyboard, while sometimes insisting on playing the same song on repeat.
  travel: Naheed Johnson, who has visited Grandma's cottage in the hills and dreams of a family trip to Disneyland, they prefer short car trips with colorful window stickers and imagine tours of zoos, balancing
    excitement for new scenes with occasional meltdowns on longer journeys.
  culinary: Naheed Johnson, who relishes macaroni and cheese, chicken nuggets, and strawberry-banana smoothies, they can make a simple peanut butter and jelly sandwich with a little help and often ask for
    extra ketchup, mixing a love for familiar comfort foods with a budding curiosity for fruity flavors.
  core: Naheed Johnson is a curious, organized five-year-old who balances playful exploration with tidy routines, yet sometimes hoards crayons and they forget to brush teeth before bedtime.
background:
