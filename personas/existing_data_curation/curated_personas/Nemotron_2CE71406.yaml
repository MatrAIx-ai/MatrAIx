  career_goals: Although retired, Alta aims to stay mentally and physically active, maintain her independence, and continue contributing to her community. She plans to complete a handwritten memoir that
    chronicles her life from the Great Depression through the transformation of Miami, and to donate it to the local historical society. She wants to deepen her proficiency with digital devices to stay
    connected with distant family and to help peers navigate technology. Expanding her garden into a small butterfly sanctuary and mentoring young adults interested in cooking and gardening are also goals.
    Ultimately, she seeks to leave a legacy of kindness, practical wisdom, and cultural bridging.
