personas:
  professional: A retired community mentor, Alta Jones mixes a lifetime of home-repair savvy, orchid-tending expertise, and storyteller charm to run senior-center tech tutorials, improvise potluck menus,
    and preserve local anecdotes, thriving on flexible, curiosity-driven problem solving despite a laid-back approach to strict schedules, and they delight in improvising when plans shift.
  sports: A gentle exerciser, Alta Jones supports the Miami Heat and follows the Florida Gators football season, enjoys daily sunrise walks along the beach and birdwatching as low-impact cardio, joins the
    senior-center walking club for social connection, and occasionally tries her hand at community softball for fun, and they appreciate the balance of solitary strolls and group camaraderie.
  arts: An enthusiastic music and visual art lover, Alta Jones spins vintage jazz legends like Louis Armstrong and Ella Fitzgerald alongside modern Cuban salsa from the Buena Vista Social Club, hums the
    rhythms while she paints watercolor scenes of the Florida coast, and knits scarves to the beat, often sharing her creations at community gatherings, and they find the music guides their brush strokes
    and knitting pattern.
  travel: A nostalgic traveler, Alta Jones has visited historic Old Miami, explored the Everglades, and taken a road trip to Key West, and now dreams of a jazz-filled weekend in New Orleans and a leisurely
    tour of Savannah's historic squares, favoring short, well-planned drives over long flights due to her love of familiar comforts, and they relish the anticipation of new horizons while staying within
    a comfortable radius.
  culinary: An accomplished home cook, Alta Jones blends Southern comfort staples like shrimp and grits and collard greens with Miami-inspired stone crab bisque, seasons dishes with fresh basil from her
    garden, experiments with key lime custard tarts, yet sometimes over-season her sauces in her enthusiastic quest for flavor, and they love to share each new dish with friends at potluck gatherings.
  core: Alta Jones, a 90-year-old garden-loving storyteller, balances curiosity and practicality, turning everyday chores into community service while dancing lightly to jazz, embracing a flexible, relaxed
    approach to life's rhythms, and they savor each moment with a quiet, mischievous grin.
background:
  cultural: Alta is a white American woman born in 1935, raised in the Southern United States during the Great Depression and World War II. Her early years were shaped by a modest, community‑oriented upbringing
    that emphasized self‑reliance, practicality, and respect for tradition. She moved to Miami in the 1960s, where she embraced the city’s vibrant multicultural atmosphere, learning to appreciate Spanish
    language and Latin rhythms while maintaining her English‑language roots. Her cultural identity blends classic mid‑century American values with the relaxed, sun‑filled lifestyle of South Florida, reflected
    in her love of Southern comfort food, Caribbean‑inspired seafood dishes, and community gatherings that welcome neighbors of diverse backgrounds.
