  hobbies: '[''Folklórico and Latin dance'', ''TikTok content creation (dance, cooking)'', ''Beach volleyball'', ''Hiking coastal trails'', ''Attending soccer matches'', ''Volunteering at cultural center
    events'', ''DIY fashion and makeup experimentation'']'
  career_goals: Margarita aims to pursue an associate degree in communications or hospitality management at a community college, with the long‑term goal of becoming a community‑focused event coordinator
    or marketing manager for a local business. She wants a career that balances structured responsibilities—such as project timelines and budgeting—with the flexibility to engage with diverse people and
    cultural events. In the next five years, she hopes to secure a supervisory role in a retail or hospitality setting while building a personal brand around Mexican‑inspired food and lifestyle content
    on social media.
