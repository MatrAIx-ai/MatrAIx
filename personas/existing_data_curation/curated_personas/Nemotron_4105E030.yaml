  career_goals: Joseph aims to progress to a senior learning and development manager role within a high-tech organization, where he can lead large-scale digital transformation of employee training. He plans
    to obtain the Certified Professional in Learning and Performance (CPLP) credential, publish research on AI-driven personalized learning pathways, and eventually launch his own consultancy focused on
    STEM workforce upskilling. His competitive drive pushes him to benchmark his programs against industry best practices and achieve top-quartile learning ROI metrics.
