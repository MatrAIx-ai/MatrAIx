  hobbies: '[''Gardening (organic vegetables)'', ''Woodworking (furniture making)'', ''Model railroading'', ''Local history research'', ''Reading science fiction and historical non‑fiction'', ''Volunteering
    at senior center (bridge games)'', ''Cycling on regional trails'', ''Attending town hall meetings'', ''Listening to classical music'', ''Photography of seasonal landscapes'']'
  career_goals: In retirement, Justin aims to stay intellectually active and give back to his community. He plans to volunteer as a mentor for high‑school STEM clubs, help launch a local makerspace where
    seniors can tinker with electronics and woodworking, and author a series of practical guides on sustainable home improvements. He also hopes to travel with his wife to a few national parks each year,
    documenting the trips with photography and sharing the stories at town events, while remaining a steady, supportive presence in local volunteer initiatives.
