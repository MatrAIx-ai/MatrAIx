  hobbies: '[''Robotics club'', ''Online coding competitions'', ''Reading science‑fiction'', ''Listening to tech podcasts'', ''Digital sketching'', ''Hiking in the Peninsula hills'', ''Chess'', ''Community
    garden volunteering'']'
  career_goals: Denise aims to turn her self‑taught tech skills into a professional career in software development or UX design. She plans to earn a coding certification, enroll in a community college or
    coding bootcamp, and secure an entry‑level developer position at a startup or established tech firm in the Bay Area. Long‑term, she dreams of launching her own productivity‑app startup that blends her
    love for organization and practical problem solving.
