personas:
  professional: Kimberly Shelton, a seasoned painting contractor with five decades of expertise in surface preparation, precision wallpaper installation, and lead-safe remediation, blends meticulous project
    management with a surprisingly flexible approach to client requests, thriving on the balance between structured budgeting and spontaneous design challenges.
  sports: Kimberly Shelton enjoys leisurely walks around the Chain of Lakes and rarely misses a Minnesota Twins home game at Target Field, while also cheering for the Minnesota Vikings each fall and participating
    in a senior center bowling league that meets every Thursday.
  arts: Kimberly Shelton, a dedicated member of the Minnetonka Arts & Crafts Club, spends afternoons watercoloring landscapes inspired by Monet and O'Keeffe, knits scarves for bridge partners, leads paper
    crafts workshops, and finds inspiration at the Walker Art Center’s contemporary exhibitions.
  travel: Kimberly Shelton prefers well‑planned road trips that blend cultural stops with natural scenery, having driven the Great Lakes coastal route to Mackinac Island, toured the historic Biltmore Estate
    in North Carolina, and dreaming of a spring visit to Provence’s lavender fields, all while balancing travel costs with a modest senior budget.
  culinary: Kimberly Shelton delights in cooking garden‑fresh meals like rosemary‑infused roast chicken, wild rice pilaf with locally harvested mushrooms, and apple crisp topped with locally sourced honey,
    yet they admit to a habit of over‑salting soups when distracted by a phone call.
  core: Kimberly Shelton blends disciplined craftsmanship with community‑centered spontaneity, always ready to mentor a novice painter while occasionally forgetting a scheduled appointment.
background:
  cultural: Kimberly was born and raised in the Minneapolis-St. Paul metro area to a family of German-Scandinavian descent. Growing up in Minnetonka, she was shaped by the Midwestern values of hard work,
    community involvement, and practicality. Her family attended a Lutheran church, which instilled a sense of service and modesty. She draws on the region’s seasonal rhythms—long summers on the lakes,
    harsh winters, and the rich cultural heritage of the Upper Midwest—in both her personal life and her professional aesthetic choices. She identifies strongly with the local community, participating in
    neighborhood clean-ups and regional festivals, and believes in preserving the area's natural beauty through careful craftsmanship.
