  career_goals: Although nearing traditional retirement age, Kimberly aims to stay active in her trade for the next decade. She plans to earn the Master Painter certification from the Minnesota Painting
    Association, formalize her lead-safe training, and expand her service offerings to include decorative finishes and custom mural work. She hopes to mentor a new generation of painters through a structured
    apprenticeship program, documenting her techniques in a handbook. In parallel, she aspires to curate a community mural project in Minnetonka that celebrates the city's lakes and local history. Over
    time, she envisions transitioning into a consultant role, offering color consulting and safety audits for small contractors, while also sharing her knowledge through workshops at the senior center.
