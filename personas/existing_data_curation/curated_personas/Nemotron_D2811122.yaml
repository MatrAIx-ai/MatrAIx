personas:
  professional: Anthony Forshey, an 18-year-old freelance engineer, leverages his bachelor's in Electrical and Computer Engineering, Python, C++, and hands-on prototyping to build custom IoT and automation
    tools for Oklahoma agriculture, yet his spontaneous, structure-averse mindset often leads to bursts of brilliant creativity followed by missed deadlines.
  sports: Anthony Forshey enjoys solo hikes in the Wichita Mountains, follows the Oklahoma State Cowboys football team, participates in a local drone-racing club that doubles as a fitness meet-up, and occasionally
    games in an online e-sports league for strategy titles, reflecting his competitive streak.
  arts: Anthony Forshey immerses himself in science-fiction literature by Isaac Asimov and Neal Stephenson, streams synthwave artists like Com Truise and Daft Punk while coding, and attends quarterly maker-fair
    exhibitions where he showcases 3D-printed art pieces, finding creative fuel in the blend of narrative and electronic sound.
  travel: Anthony Forshey prefers low-cost road trips that combine tech pilgrimages—such as a weekend visit to the Silicon Prairie Lab in Austin and a trek to Akihabara in Tokyo for rare components—with
    solitary hikes in nearby nature preserves, balancing his love of exploration with his limited student budget.
  culinary: Anthony Forshey favors high-protein, easily prepared meals like chicken-fajita quinoa bowls and homemade ramen, often experimenting with DIY fermentation of kimchi for his snack stash, while
    his cooking skill hovers at a competent home-chef level punctuated by occasional burnt toast from distracted prototype testing.
  core: Anthony Forshey, an 18-year-old tech hobbyist with a prodigious engineering degree, blends relentless curiosity with a knack for impulsive spending, chronic anxiety, and a solitary, competition-driven
    lifestyle that fuels both innovative drone projects and endless tinkering.
background:
  cultural: Anthony grew up in a predominantly white, middle‑class neighborhood in Oklahoma City, where Midwestern values of self‑reliance, practicality, and community are common. His family emphasized
    hard work and modesty, traits that align with his practical side. Being close to the Great Plains agricultural environment, he has an awareness of local farming and energy concerns, which shape his
    interest in sustainable tech solutions. At the same time, his early immersion in a rigorous STEM program exposed him to a broader academic and digital culture, fostering a blend of regional pride and
    tech‑focused worldviews.
