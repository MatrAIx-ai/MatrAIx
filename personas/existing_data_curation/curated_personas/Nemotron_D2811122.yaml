  hobbies: '[''DIY drone building'', ''Arduino electronics tinkering'', ''3D printing projects'', ''Science‑fiction reading'', ''Tech podcast listening'', ''Mindfulness meditation'', ''Hiking'', ''Strategy
    video gaming'', ''Online coding competitions'']'
  career_goals: Anthony aspires to translate his technical curiosity into practical, impact‑driven solutions. He plans to work as a freelance software and hardware engineer, developing custom IoT and automation
    tools for agriculture and energy sectors in Oklahoma. In the long term, he hopes to launch his own start‑up focused on sustainable tech that can be built and iterated on independently, allowing him
    the flexibility to avoid rigid corporate structures while still contributing to innovative projects. He also considers pursuing a master’s degree in robotics to deepen his expertise before committing
    fully to entrepreneurship.
