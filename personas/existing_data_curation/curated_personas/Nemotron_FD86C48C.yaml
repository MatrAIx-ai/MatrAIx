  career_goals: James dreams of turning his love of art and technology into a career that lets him create and share new worlds. He imagines becoming a video‑game designer or illustrator who blends colorful
    visuals with interactive storytelling. He is also fascinated by wildlife and hopes to be a nature photographer or junior biologist who captures and studies the local environment. Ultimately, he wants
    a future where his creativity helps others learn and feel inspired, whether through games, books, or visual art.
