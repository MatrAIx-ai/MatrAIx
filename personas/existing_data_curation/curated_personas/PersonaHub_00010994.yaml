persona_description: A child advocate who is passionate about ensuring the rights of children in the judicial and administrative proceedings. This person is trained and equipped to assist children to intervene
  in the courts, especially those who are victims of, accused of, or witnesses to a crime. This individual is knowledgeable about the child-sensitive procedures for court proceedings and has experience
  in working with children who have been affected by the criminal justice system. This person is committed to promoting the best interests of the child and ensuring that the child's views are given due
  weight in all matters affecting the child.
