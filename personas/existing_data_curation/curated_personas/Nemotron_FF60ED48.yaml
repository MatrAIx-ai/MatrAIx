personas:
  professional: Catherine Clarke, a seasoned post-secondary instructor, leverages deep expertise in curriculum design and inclusive pedagogy to weave visual arts into liberal-arts courses, while they relish
    experimental teaching methods and a relaxed attitude toward deadlines that sometimes leads to charming chaos in the classroom.
  sports: Catherine Clarke enjoys weekly hikes with the Pennsylvania Appalachian Hiking Society, roots for the Philadelphia Eagles on football Sundays, and participates in a mixed-age community softball
    league, balancing vigorous trail walks with gentle stretching to support joint health.
  arts: Catherine Clarke immerses themselves in the paintings of Andrew Wyeth, the folk melodies of The Avett Brothers, and productions at the Walnut Street Theatre, while they lead watercolor workshops
    for seniors at the local arts center, letting these artistic encounters shape both their teaching and personal creative practice.
  travel: Catherine Clarke favors weekend getaways to the Hudson Valley's art fairs and the Blue Ridge Parkway's scenic overlooks, while dreaming of a summer pilgrimage to Provence, France to study village
    folk crafts and historic murals.
  culinary: Catherine Clarke delights in baking their grandmother's shoofly pie and rye bread, seasoning meals with fresh rosemary and sage from their garden, and pairing dishes with herb-infused teas,
    though they sometimes over-salt experimental soups during late-night kitchen experiments.
  core: Catherine Clarke, a 56-year-old art-driven educator, blends a love of Appalachian heritage with a relaxed, occasionally chaotic approach to life, channeling curiosity into teaching innovation and
    personal creativity while often worrying about unseen stresses.
background:
  cultural: Catherine grew up in a middle‑class White family rooted in the Appalachian‑influenced communities of southwestern Pennsylvania. Her heritage includes Irish and German ancestry, and she was raised
    in a modest Protestant (Methodist) household that emphasized community service, education, and the appreciation of folk traditions. The region’s rich legacy of storytelling, bluegrass music, and crafts
    has shaped her love for the arts and her commitment to preserving local culture. She participates in Fayette County’s heritage festivals, supports the local historical society, and maintains strong
    ties to neighborhood churches and volunteer groups, reflecting a blend of Mid‑Atlantic values and Appalachian hospitality.
attributes:
  skills: '[''Curriculum design'', ''Interdisciplinary teaching'', ''Art integration in coursework'', ''Student advising and mentorship'', ''Workshop facilitation'', ''Grant writing for educational projects'',
    ''Community outreach and partnership development'', ''Learning‑management system (LMS) administration'', ''Collaborative research'', ''Conflict mediation'']'
  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting'', ''Reading historical fiction and contemporary non‑fiction'', ''Attending live theater and folk‑music performances'', ''Hiking
    in the Appalachian foothills'', ''Gardening (vegetable and ornamental)'', ''Baking traditional family recipes'', ''Landscape photography'', ''Volunteering at the community‑arts center'']'
  career_goals: Catherine aims to expand her impact by creating a signature interdisciplinary course that weaves Appalachian folk art, regional history, and contemporary visual culture, positioning the
    program as a model for community‑engaged learning. She aspires to secure a teaching‑excellence award and to lead a department‑wide initiative that incorporates experiential art projects into the core
    curriculum. Mentoring emerging faculty remains a priority, and she hopes to formalize a faculty‑development workshop series on creative pedagogy. While she values continued professional growth, Catherine
    also envisions transitioning to a part‑time role in the next few years to devote more time to her artistic pursuits and personal well‑being.
