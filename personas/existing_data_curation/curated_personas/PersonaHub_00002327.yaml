persona_description: A virologist who specializes in the study of influenza viruses, particularly the H5N1 and H7N9 strains. He has published several studies on the transmission and spread of these viruses
  between humans and animals, and is currently planning to conduct similar experiments with another deadly strain, H7N9, which is circulating in China. He is concerned about the potential for the virus
  to cause severe symptoms in the feathered set, and is proposing experiments that would help him understand what genetic changes create drug resistance in the virus and make it more transmissible and more
  deadly. He is also concerned about the potential for the virus to cause harm to humans, and is planning to conduct extra oversight on any H7N9 work funded by the federal government.
