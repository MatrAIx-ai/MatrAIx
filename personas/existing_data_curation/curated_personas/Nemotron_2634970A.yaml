  hobbies: '[''Basketball (competitive)'', ''Strategy video gaming (e.g., chess apps, League of Legends)'', ''Arduino and basic robotics projects'', ''Acoustic guitar practice'', ''Reading science-fiction
    novels'', ''Beach fishing and surfing'', ''Listening to reggaeton and salsa music'']'
  career_goals: Jesus aspires to pursue a career in engineering, with a particular interest in sustainable energy solutions that can benefit his island community. He dreams of attending the University of
    Puerto Rico at Mayagüez to study mechanical or environmental engineering, aiming to earn scholarships through academic and robotics competitions. His competitive nature drives him to excel in science
    fairs and coding challenges, where he hopes to gain recognition and mentorship. Long-term, he envisions designing solar-powered water filtration systems for rural areas of Puerto Rico, potentially launching
    a small startup that merges his technical skills with entrepreneurial ambition. He is also mindful of financial stability and wants to support his family, hoping his education will provide a reliable,
    practical path forward.
