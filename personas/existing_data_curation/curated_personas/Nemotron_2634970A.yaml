personas:
  professional: Jesus Rivera is a budding robotics enthusiast and teenage programmer who blends a practical approach to building Arduino projects with a competitive edge honed on the basketball court, channeling
    their curiosity into creating functional gadgets while juggling school responsibilities.
  sports: Jesus Rivera competes on the middle school basketball team, the Island Eagles, and is a regular at the local surf club, the Wave Riders, where they practice surfing on weekends and join a weekend
    fishing crew that meets at Coral Bay; they prefer high‑intensity drills but often worry about performance, fueling a competitive mindset.
  arts: Jesus Rivera fuels their creative side by strumming acoustic guitar to the beats of Bad Bunny, the rhythms of Celia Cruz, and the indie tones of Arctic Monkeys, while diving into sci‑fi novels like
    Dune and reading comic strips; this eclectic taste shapes their identity and frequently inspires new Arduino projects that sync music with light patterns.
  travel: Jesus Rivera prefers spontaneous weekend getaways over meticulously planned vacations, often grabbing a surfboard and heading to nearby beaches like Isla Verde or the fishing spot at Playa del
    Sol, while dreaming of a tech‑focused trip to Tokyo’s Akihabara district and a cultural visit to Barcelona’s Gothic Quarter, all within the modest budget set by their family.
  culinary: Jesus Rivera enjoys casual island cuisine, favoring grilled mahi‑mahi tacos with fresh lime and cilantro, homemade plantain fritters, and occasional pizza with pepperoni; their cooking skill
    is modest—able to prep simple dishes using a portable electric grill and a borrowed kitchen, but they often rely on quick microwave meals when video game sessions run late.
  core: Jesus Rivera merges a competitive basketball drive with a tech‑savvy curiosity, juggling anxiety and impulsive spending while secretly perfecting guitar chords between video game sessions.
background:
  cultural: Jesus is a proud Puerto Rican from Quebradillas, a coastal town known for its fishing heritage and close-knit community. His family celebrates traditional fiestas, such as the patron saint festival,
    where music, dance, and street food like alcapurrias and lechón are central. Growing up bilingual, he navigates the rhythmic Spanish of his household and the English of his school, giving him a nuanced
    cultural perspective. The island’s history of resilience—shaped by economic challenges and natural disasters—instills in him a practical outlook and a desire to contribute positively to his community.
    He participates in local events like the annual surfing competition and often helps his grandparents with chores, reinforcing values of responsibility and familial respect. At the same time, he is aware
    of the broader Caribbean diaspora, absorbing influences from Afrobeats, Latin pop, and American media, which inform his tastes in music and fashion. This blend of local tradition, family cohesion, and
    modern global culture defines his cultural identity.
