persona_description: A transportation planner and urban planner who specializes in the design and analysis of transportation systems, particularly subway systems. They are interested in the impact of transportation
  maps on passenger choices and the potential for maps to become cost-effective ways to ease planning and operation problems. They are familiar with the London Underground system and have conducted research
  on the influence of maps on transportation choices. They are interested in adjusting maps to better reflect actual distance and actual travel times and are open to alternative strategies such as mobile
  phone-based travel planning.
