  hobbies: '[''sketching rural landscapes'', ''hiking in the Tennessee foothills'', ''listening to classic rock and bluegrass vinyl'', ''playing acoustic guitar'', ''songwriting'', ''skateboarding'', ''fishing
    at the Elk River'', ''volunteering at community art fairs'', ''mentoring younger kids in drawing'', ''following indie game development forums'', ''creating pixel‑art assets'', ''building scale model
    kits of vintage cars'']'
  career_goals: Brian aspires to turn his artistic passions into a career while staying connected to his hometown roots. He plans to attend a community college or technical school to earn an associate degree
    in graphic design or multimedia arts, building a professional portfolio that showcases his hand‑drawn and digital work. Long‑term, he hopes to work as a junior graphic designer for a regional marketing
    firm or a creative agency, and eventually launch a freelance side business creating custom illustrations, album covers, and promotional materials for local musicians and small businesses. He also envisions
    incorporating his practical skills into a small woodworking studio where he can design and craft handcrafted furniture with artistic detailing, merging his love for creation and tangible trade work.
