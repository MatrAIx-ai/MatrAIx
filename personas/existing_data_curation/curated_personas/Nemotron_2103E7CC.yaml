personas:
  professional: Brian Karvounis is a high‑school senior with a self‑taught portfolio of hand‑drawn illustrations and digital graphics, using Python scripts to automate artwork layouts while volunteering
    at the local art fair, and aims to secure an associate degree in graphic design to become a junior designer at a regional marketing firm.
  sports: Brian Karvounis is a regular at the community skate park, rides a 7‑inch board, occasionally helps with the high‑school cross‑country team, supports the Nashville Predators hockey club, and spends
    weekends fishing on the Elk River to unwind.
  arts: Brian Karvounis spends free evenings sketching pastoral landscapes, drawing inspiration from the brushwork of Winslow Homer and the lyricism of bluegrass legends like Bill Monroe, while strumming
    acoustic renditions of classic rock anthems by Led Zeppelin, and sharing pixel‑art sprites reminiscent of early 'Super Mario' games on indie dev forums.
  travel: Brian Karvounis prefers short road trips that combine scenic hikes and music festivals, having road‑tripped to Asheville’s Blue Ridge Parkway and the historic town of Savannah, but dreams of backpacking
    through the Scottish Highlands to sketch ancient castles.
  culinary: Brian Karvounis enjoys grilling freshly caught Elk River trout seasoned with lemon‑pepper and dill, whipping up a simple backyard pizza topped with mozzarella, fresh basil, and smoked Gouda,
    while indulging in nostalgic plates of pork‑loin BBQ and homemade banana pudding during family gatherings.
  core: Brian Karvounis blends quiet curiosity with a restless creative streak, habitually scribbling doodles in the margins of textbooks while secretly hoarding vintage vinyl, and balances an earnest desire
    to help others with occasional procrastination that leaves art projects crunch‑time.
background:
  cultural: Brian was raised in Ethridge, a small unincorporated community in Giles County, Tennessee, where Appalachian and rural Southern cultural traditions are prominent. His family has deep roots in
    the area, with grandparents who worked on family farms and in local trades. The community places a strong emphasis on church involvement, hospitality, and intergenerational storytelling. Brian attends
    a Methodist congregation where choir singing and seasonal festivals reinforce a shared sense of heritage. Local customs such as county fairs, bluegrass jam sessions, and quilting circles expose him
    to folk arts and collaborative creativity. The modest, close‑knit environment nurtured his appreciation for nature, self‑reliance, and hands‑on craftsmanship, while also providing opportunities to engage
    in community service and artistic expression.
