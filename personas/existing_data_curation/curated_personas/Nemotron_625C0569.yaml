  career_goals: As a vibrant septuagenarian, Sara’s ambitions center on staying mentally sharp, contributing to her community, and preserving her family legacy. She aims to lead a multi-generational gardening
    program at the local community garden, mentor younger volunteers in event organization, and complete a memoir that weaves together her own life story with the histories she discovers through genealogy.
    She also hopes to master digital photography, travel to three national parks she has always admired, and advocate for senior health initiatives that address stress and anxiety in her community.
