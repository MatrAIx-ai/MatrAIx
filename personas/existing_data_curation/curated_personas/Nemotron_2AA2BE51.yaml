personas:
  professional: Salvador Torres is a data‑driven market insights analyst who combines rigorous statistical modeling in R and Python with agile project management to deliver consumer‑behavior dashboards,
    while their natural curiosity pushes them to explore novel data sources and their pragmatic side keeps projects on schedule and budget.
  sports: Salvador Torres captains a midfield role for the Hudson Valley Strikers Sunday league, roots for the New York Knicks and New York Yankees, and complements their soccer drills with weekly hikes
    on Breakneck Ridge, preferring a mix of high‑intensity play and steady cardio to keep stress levels low.
  arts: Salvador Torres immerses themselves in the New York jazz scene, regularly attending sets by Kamasi Washington and Esperanza Spalding at the Blue Note, while they occasionally record short podcast
    episodes discussing emerging market trends, using their knack for storytelling to weave data insights into cultural conversations.
  travel: Salvador Torres favors spontaneous weekend getaways, often trekking the trails of the Catskills or planning longer adventures to destinations like Banff National Park and Kyoto, balancing a love
    for nature with occasional cultural immersion while carefully budgeting travel expenses through fare‑comparison apps.
  culinary: Salvador Torres enjoys crafting traditional Ecuadorian dishes such as ceviche, empanadas, and fanesca, mastering the balance of tangy citrus with fresh seafood and hearty bean stews, and frequently
    invites friends over for communal meals that double as informal networking sessions.
  core: Salvador Torres blends analytical rigor with a culinary passion and a persistent worry that fuels their meticulous habit of journaling, yoga, and data‑driven storytelling, making them simultaneously
    a cautious planner and an enthusiastic community chef.
background:
  cultural: 'Salvador was raised in a bilingual Ecuadorian household in Queens before moving to Yonkers. His parents instilled the values of community, respect for elders, and pride in his Andean heritage.
    He celebrates Ecuadorian holidays such as Carnaval and Día de los Difuntos, and he maintains close ties with the local Latino network in Westchester. This cultural lens informs his professional perspective:
    he is keenly aware of the nuances in Hispanic consumer behavior, the importance of representation in advertising, and the need for culturally resonant messaging. Fluent in both Spanish and English,
    he often bridges language gaps in research studies, ensuring that insights capture the authentic voice of diverse audiences.'
