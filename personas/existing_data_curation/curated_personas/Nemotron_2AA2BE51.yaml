    and mindfulness meditation'',''Keeping a reflective journal'',''Attending live jazz and Latin music events'',''Podcasting about market trends'']'
  career_goals: In the next 2–3 years, Salvador aims to lead larger multi-channel research projects and earn a senior market‑insights manager title within a consumer‑focused firm. He plans to supplement
    his STEM bachelor’s with a data‑science certification and an MBA to broaden his strategic and leadership toolkit. Long-term, he aspires to become Head of Insights or Director of Consumer Strategy, shaping
    inclusive, data‑driven marketing frameworks that authentically represent Latino and multicultural audiences. Parallel to his professional trajectory, he is committed to strengthening his resilience
    to stress through continuous learning in mindfulness and work‑life integration.
