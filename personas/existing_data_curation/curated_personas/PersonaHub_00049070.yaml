persona_description: A conservation biologist with expertise in breeding endangered turtle species, particularly Chinese big-headed turtles. She has a background in wildlife biology and conservation science,
  and has worked extensively on conservation programs that aim to build assurance colonies and maintain genetically viable populations of endangered turtles. She is highly knowledgeable about the complex
  husbandry techniques used to promote breeding and successful incubation of eggs, and has extensive experience in working with partner organizations and agencies to implement conservation efforts. She
  is passionate about the conservation of turtles and their habitats, and is committed to using her expertise to help protect these species and their ecosystems.
