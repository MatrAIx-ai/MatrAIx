personas:
  professional: Janet Ellett is a disciplined interior designer who blends a STEM rigor with an artistic vision, leveraging AutoCAD, Revit, and Rhino to craft sustainable, tech‑enhanced spaces while rigorously
    vetting vendors and driving her teams toward optimal, award‑winning outcomes.
  sports: Janet Ellett is a regular at the Santa Monica Yoga Studio, follows the Los Angeles Dodgers and LA Galaxy for casual camaraderie, and spends weekend afternoons paddleboarding at Marina del Rey
    to blend low‑impact cardio with the calm she values.
  arts: Janet Ellett nourishes her creative spark by frequenting small contemporary galleries featuring artists like Olafur Eliasson and Ai Weiwei, attending museum talks on modern architecture, and unwinding
    with the minimalist soundscapes of Max Richter and Philip Glass.
  travel: Janet Ellett prefers solo, design‑centric trips that combine meticulous planning with spontaneous discovery, having already explored Barcelona’s Gaudí‑laden streets, Kyoto’s zen temples, and Copenhagen’s
    sustainable neighborhoods, and she now dreams of a research pilgrimage to Helsinki’s Design District.
  culinary: Janet Ellett cultivates a minimalist succulent garden and translates that care into farm‑to‑table cooking, regularly preparing quinoa‑crusted miso‑glazed salmon with roasted heirloom tomatoes,
    saffron‑infused risotto, and occasionally indulging in truffle‑oil drizzled mushroom tagliatelle for her family.
  core: Janet Ellett is a calm, competitively driven designer who thrives on solitary creativity, meticulous organization, and a relentless quest for sustainable, tech‑forward elegance.
background:
  cultural: Janet was raised in a suburban Orange County neighborhood to parents who championed education and analytical thinking—her mother a high‑school science teacher and her father an electrical engineer.
    This Anglo‑American upbringing emphasized self‑discipline, punctuality, and a respect for craftsmanship, shaping her meticulous work ethic. Growing up near the California coast exposed her to Spanish‑colonial
    architecture and a relaxed beach culture, fostering an appreciation for indoor‑outdoor flow and natural light. Her STEM degree reinforced a methodical, evidence‑based approach to design, while her lifelong
    curiosity about art and global aesthetics has been fueled by travel and exposure to diverse cultural influences. Reserved by nature, she prefers intimate gatherings and values privacy, aligning with
    her calm, resilient demeanor.
