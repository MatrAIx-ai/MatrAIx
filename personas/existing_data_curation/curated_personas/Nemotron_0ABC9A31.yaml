  career_goals: Janet aims to launch a boutique studio in Southern California that becomes known for innovative, high‑performance interiors that fuse sustainability with cutting‑edge technology. She seeks
    to secure flagship residential and boutique‑hotel projects that showcase her signature blend of precision engineering and artistic flair. Over the next decade, she plans to win national design awards,
    publish a monograph on contemporary coastal interiors, and become a sought‑after speaker at industry conferences. Ultimately, she aspires to develop a custom furniture line and a curated collection
    of home accessories that reflect her disciplined, high‑standard aesthetic while mentoring the next generation of critically minded designers.
