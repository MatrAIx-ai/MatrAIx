  hobbies: '[''Skateboarding'', ''Mountain biking'', ''Soccer'', ''Acoustic guitar'', ''Robotics club projects'', ''Video gaming (multiplayer)'', ''Hiking'', ''Camping'', ''LEGO building'', ''DIY home projects'']'
  career_goals: Norman wants a career that lets him blend his love of hands‑on work with his curiosity about how things function. In the short term, he aims to finish his high‑school education, deepen his
    coding skills, and gain a part‑time apprenticeship at a local bike shop or makerspace. Looking ahead, he is interested in pursuing a technical field such as mechanical engineering, renewable‑energy
    technology, or a trade like electrical work, where he can design and build practical solutions. He also keeps the option of turning his passion for outdoor sports into a career as a professional snowboarder
    or a guide for adventure tours, and he dreams of eventually starting a small business that merges technology with outdoor recreation.
