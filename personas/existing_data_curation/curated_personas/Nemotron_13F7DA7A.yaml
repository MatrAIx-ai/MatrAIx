personas:
  professional: Norman Gregg is a high‑school robotics club member who blends curiosity about electronics with practical DIY skills, often leading group builds while maintaining a relaxed, sometimes last‑minute
    approach to project deadlines.
  sports: Norman Gregg is a skateboarding enthusiast who spends afternoons at the Apex Skate Park, plays midfield for the local youth soccer league, follows the Colorado Rapids in MLS, roots for the Denver
    Broncos, and joins the Rockies Trail Riders club for weekend mountain‑bike outings.
  arts: Norman Gregg is an acoustic‑guitar hobbyist who riffs along to The Strokes and Tame Impala, crafts simple synth patches inspired by Moby, and regularly attends community concerts at Red Rocks Amphitheatre
    and the Denver Indie Music Festival.
  travel: Norman Gregg loves quick weekend hikes in the Rocky Mountain foothills, dreams of backpacking through Banff’s turquoise lakes, and enjoys spontaneous road trips to nearby Colorado towns like Boulder
    and Estes Park, balancing a love for outdoor adventure with school deadlines and a modest travel budget.
  culinary: Norman Gregg prefers hearty Colorado fare—bison burgers with fire‑roasted peppers, fresh trout from local streams, and homemade mountain bean chili—while they experiment with basic kitchen gadgets
    like a sous‑vide to perfect their weekly spaghetti and enjoy roasting s’mores over a campfire.
  core: Norman Gregg is a restless, curiosity‑driven teen who juggles skateboards, gadgets, and mountain hikes, thrives on social spontaneity, and remains unusually calm despite a chaotic schedule.
background:
  cultural: Norman grew up in a middle‑class, predominantly white suburb of Arapahoe County just outside Denver. His family follows mainstream American customs, celebrating holidays such as Thanksgiving,
    Christmas, and the Fourth of July, while also embracing Colorado’s outdoor culture. Frequent trips to the nearby Rocky Mountains for hiking, skiing, and camping have shaped his appreciation for nature.
    Living near Denver, he is exposed to a diverse urban environment, enjoying the city’s music festivals, food markets, and multicultural community events, which broaden his worldview beyond his immediate
    cultural roots.
