personas:
  professional: Casey Shoupe, a 40‑year‑old retail associate at a bustling coastal supermarket, leverages meticulous cash‑handling, inventory expertise, and conversational Spanish to streamline operations,
    while their organized, reliable nature and occasional assertiveness help them train new staff, resolve conflicts, and pursue a shift‑supervisor promotion within two years.
  sports: Casey Shoupe keeps active through Zumba sessions at the community center, participates in a co‑ed adult soccer league linked to the Orlando City SC academy, roots for the Tampa Bay Rays in spring,
    cheers for the Miami Dolphins during football season, and tracks the Orlando Magic’s games on weekends, blending community spirit with personal fitness.
  arts: Casey Shoupe nurtures a love for storytelling by leading a local book club that reads Southern classics by Margaret Mitchell and contemporary works by Celeste Ng, while their scrapbooking hobby
    preserves family photos set to the soundtrack of Dolly Parton and Jimmy Buffett, and they regularly attend the Central Florida Stage’s productions of plays such as “The Glass Menagerie,” reflecting
    a blend of Southern comfort and coastal creativity.
  travel: Casey Shoupe prefers relaxed road trips along Florida’s Atlantic coastline, having toured the Kennedy Space Center’s launch pads, savored sunsets in Key West, and taken a family cruise to the
    Bahamas, while dreaming of a weekend getaway to Asheville’s Blue Ridge Mountains and an adventurous summer stay in Iceland to witness the northern lights.
  culinary: Casey Shoupe enjoys cooking Southern comfort meals such as shrimp‑and‑grits, pecan‑topped collard greens, and homemade biscuits with honey butter, often seasoning with fresh basil from their
    garden and a dash of smoked paprika, while they regularly order clam chowder at the local waterfront café and indulge in occasional take‑out fried catfish on lazy Sundays.
  core: Casey Shoupe combines a meticulous, community‑focused mindset with a penchant for worry‑driven budgeting, Zumba‑fueled energy bursts, and an unstoppable habit of cataloguing every garden harvest
    in a notebook, even if it sometimes delays bedtime.
background:
  cultural: Raised in the Space Coast region of Florida, Casey’s cultural upbringing blends mainstream middle‑American values with the local coastal and aerospace community vibe. Her family emphasized hard
    work, reliability, and community service, which aligns with her organized and sociable personality. While identifying as white, she has absorbed the region’s celebration of NASA achievements, beach‑side
    leisure, and a modest Southern‑Florida hospitality ethic, shaping her practical outlook and strong sense of neighborhood belonging.
