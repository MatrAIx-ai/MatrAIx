  career_goals: Casey aims to move from cashier to shift supervisor within the next two years, leveraging her reliability and leadership potential. She plans to earn a retail‑management certification through
    a community‑college program, positioning herself for a store‑manager role. Long‑term, she dreams of opening a small, family‑friendly convenience store that serves her neighborhood, integrating her love
    for community engagement and practical business skills while maintaining a balanced, low‑stress lifestyle.
