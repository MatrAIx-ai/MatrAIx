  hobbies: '[''visiting art galleries'', ''painting (acrylic and watercolor)'', ''photography'', ''hiking'', ''live music and cultural festivals'', ''playing guitar'', ''city beautification volunteering'',
    ''craft brewery tasting'', ''cooking'', ''book club'']'
  career_goals: Norman aims to become a certified master painter and establish his own boutique painting business that blends high‑quality residential/commercial work with custom artistic finishes, such
    as decorative murals and bespoke color schemes. He plans to earn lead‑safe certifications, build a small crew, and partner with local interior designers and the community art center to offer workshops
    and collaborative projects. Over the next five years, he hopes to be recognized as a color specialist in the Harrisonburg region and to mentor the next generation of painters.
