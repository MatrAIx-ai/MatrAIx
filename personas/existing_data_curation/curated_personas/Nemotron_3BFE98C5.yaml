personas:
  professional: Eric Johnson, a veteran mechanical engineer with 35+ years in automotive design, leverages expert SolidWorks, ANSYS, Six Sigma, and lean manufacturing skills to craft components that marry
    functionality with aesthetic form, while their curiosity and methodical planning ensure every project is delivered on schedule and their collaborative style nurtures cross‑disciplinary teams.
  sports: Eric Johnson enjoys weekend hikes at Crocker Forest Preserve, plays Tuesday night pickleball at the local community center, follows the Detroit Lions, Detroit Tigers, and Detroit Pistons passionately,
    and occasionally joins a recreational softball league that meets during the summer, balancing low‑impact exercise with social camaraderie.
  arts: Eric Johnson frequents the Detroit Institute of Arts to study works by Diego Rivera and Edward Hopper, channels inspiration into watercolor paintings of vintage automotive factories, captures industrial
    scenes with a DSLR photographing the interplay of light on machinery, and finds solace listening to Miles Davis, John Coltrane, and The Temptations while sketching in gallery cafés.
  travel: Eric Johnson plans trips with the precision of a project schedule, favoring road‑trips to automotive museums in Germany's Stuttgart, weekend getaways to Mackinac Island for historic tours, and
    a long‑awaited pilgrimage to Japan's Toyota archives, while keeping travel costs in check by leveraging loyalty points and opting for modest accommodations.
  culinary: Eric Johnson enjoys cooking at an intermediate level, often preparing Detroit‑style pizza with crisp cornmeal crust, slow‑roasted pork ribs glazed with a bourbon‑honey sauce, and fresh salads
    featuring heirloom tomatoes, basil, and feta, while savoring a nightly cup of pour‑over coffee made with Ethiopian beans.
  core: Eric Johnson is a meticulous engineer‑artist who balances a disciplined, worry‑prone mind with a love for vintage cars, watercolor sketches, and jazz, occasionally over‑planning finances but always
    seeking creative harmony.
background:
  cultural: Eric grew up in a close‑knit African‑American community in Detroit during the 1960s and 1970s, a time marked by civil‑rights activism and a burgeoning music scene. The rhythms of Motown and
    the solidarity of church gatherings shaped his early values of cooperation, perseverance, and communal uplift. Moving to the suburbs of Oakland County for his engineering career, he blended his cultural
    heritage with Midwestern industrial culture, becoming a bridge between the creative spirit of his upbringing and the precision of the automotive sector. He remains connected to his roots through participation
    in local Black history events, attending gospel choirs, and supporting initiatives that promote diversity in engineering. His cultural perspective informs his collaborative style, his commitment to
    mentor underrepresented talent, and his appreciation for art that reflects both his personal history and broader societal narratives.
attributes:
  skills: '[''Computer‑Aided Design (SolidWorks, CATIA)'', ''Finite Element Analysis (ANSYS)'', ''Geometric Dimensioning & Tolerancing (GD&T)'', ''CNC machining and toolpath optimization'', ''Lean manufacturing
    and Six Sigma (Green Belt)'', ''Project management (Agile & Waterfall)'', ''Technical documentation and standards compliance'', ''Prototype development and rapid iteration'', ''Mentoring and STEM outreach'',
    ''Cross‑functional team leadership'']'
  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting (industrial and automotive subjects)'', ''Digital photography of mechanical and urban scenes'', ''Restoring vintage automobiles'',
    ''Reading biographies of Black innovators and engineers'', ''Listening to jazz, Motown, and contemporary R&B'', ''Volunteering for STEM outreach with local high schools'', ''Hiking in regional nature
    preserves'', ''Woodworking and furniture making'']'
  career_goals: At 60, Eric’s primary ambition is to transition from full‑time engineering to a consultancy role where he can share his accumulated knowledge with emerging firms and startups focused on
    sustainable mobility. He aims to formalize a mentorship program for underrepresented youth interested in engineering, integrating his love for art by encouraging design thinking that embraces aesthetics.
    Eric also hopes to author a book on integrating lean principles with creative design, positioning himself as a thought leader at the intersection of engineering and visual arts. Ultimately, he seeks
    a balanced professional life that allows him to pursue personal artistic projects while leaving a lasting legacy of inclusive engineering practices.
