  career_goals: Barbara hopes to attend a four‑year art program, ideally the Rhode Island School of Design or a nearby university with a strong illustration department. She aims to earn a BFA in illustration
    or graphic design, then develop a freelance portfolio that combines visual storytelling with written narratives. In the medium term, she wants an internship at a design studio or a publishing house
    to gain professional experience. Ultimately, she envisions a stable career that lets her create meaningful artwork while preserving enough flexibility to manage her stress and maintain personal well‑being.
