  hobbies: '[''Cooking traditional Vietnamese dishes'', ''Herb gardening'', ''Desert hiking'', ''Participating in cultural festivals'', ''Reading self-improvement and personal development books'', ''Learning
    basic coding and digital tools'', ''Board games'', ''Volunteering at community centers'']'
  career_goals: Soung aims to obtain a GED and pursue a certification in community health or social services, with the long‑term goal of becoming a community outreach coordinator serving senior and immigrant
    populations in Riverside County. He also dreams of opening a small café that offers healthy, traditional Southeast Asian meals, blending his culinary passion with entrepreneurial ambitions. Over the
    next few years, he plans to enhance his digital skills through online courses, build a professional network, and volunteer in leadership roles to gain experience.
