persona_description: A scientist or a researcher who is responsible for monitoring and analyzing water quality data in a specific body of water, such as a lake. This individual is interested in understanding
  the dynamics of the water column, including thermal stratification and the occurrence of anoxia. They are knowledgeable about the use of dissolved oxygen loggers and are experienced in conducting field
  checks to gather data. They are aware of the potential risks associated with boating near the buoy and prioritize safety when out on the lake.
