personas:
  professional: Felicitas Delossantos, a seasoned qualitative‑research specialist with four decades of interviewing experience, leverages their bilingual fluency, meticulous thematic coding, and calm, organized
    demeanor to draw deep narratives from diverse participants, and they mentor junior colleagues with patience and precision.
  sports: Felicitas Delossantos enjoys gentle weekend hikes with the Orange County Senior Trailblazers, follows the Los Angeles Dodgers in spring and the LA Lakers in winter, and they maintain a low‑impact
    fitness routine that blends daily garden work with a weekly tai‑chi class at the community center.
  arts: Felicitas Delossantos immerses themselves in the visual and performing arts, sketching Caribbean‑inspired canvases after visits to the Bowers Museum, while their evenings echo with the boleros of
    Agustín Lara, the salsa of Marc Antonio, and the jazz of Miles Davis, and they often attend poetry readings featuring works by Pablo Neruda.
  travel: Felicitas Delossantos favors meticulously planned cultural trips, having explored Havana’s historic plazas, Seville’s Alcázar, and Oaxaca’s markets, while they dream of a leisurely pilgrimage
    to Cartagena’s Old Town and a week‑long art tour of Barcelona, always traveling with close friends or family to balance comfort with adventure.
  culinary: Felicitas Delossantos, an adept home cook, perfects traditional dishes such as ropa vieja and arroz con pollo using heirloom tomatoes, fresh cilantro, smoked pork, and a fragrant sofrito base,
    while they delight in occasional farm‑to‑table dinners that feature roasted carrots, quince, and a splash of orange zest.
  core: Felicitas Delossantos balances a disciplined, research‑driven mind with an artist’s sensitivity, often humming boleros as they paint garden vistas, while secretly hoarding vintage postcards and
    refusing to replace their beloved, well‑worn watercolor set.
background:
  cultural: Born to Cuban immigrants who settled in Southern California during the 1970s, Felicitas grew up in a bilingual household where Spanish was spoken at home and English at school. Her family maintained
    strong ties to Cuban traditions—celebrating Carnaval de La Habana, preparing holiday feasts of lechón, and preserving the oral storytelling customs of her grandparents. These cultural roots nurtured
    her appreciation for music, dance, and culinary arts, and instilled a deep respect for community and intergenerational bonds. Living in Garden Grove, a city with a vibrant Latino community, she participates
    in local cultural festivals, volunteers at the Cuban Cultural Center, and mentors young Cuban‑American students. Her identity blends the resilience of her immigrant heritage with the collaborative spirit
    of Orange County's multicultural landscape.
attributes:
  skills: '[''Active listening'', ''Bilingual communication (Spanish/English)'', ''Qualitative research design'', ''Interview protocol development'', ''Thematic analysis'', ''Project management'', ''Data
    synthesis and reporting'', ''Cultural competency'', ''Art history knowledge'', ''Mentorship and training'']'
  hobbies: '[''Museum and gallery visits'', ''Watercolor painting'', ''Listening to Cuban music'', ''Cooking traditional Cuban cuisine'', ''Gardening'', ''Volunteer storytelling at senior center'', ''Hiking'',
    ''Reading Latin American literature'', ''Attending poetry readings'']'
  career_goals: Felicitas aims to transition from day‑to‑day interviewing to a senior consultancy role where she can shape the methodological standards of qualitative research within the Southern California
    media and corporate sectors. She hopes to launch a community oral‑history initiative that records and preserves the stories of Cuban‑American families in Orange County, eventually publishing a curated
    anthology of those narratives. Over the next five years, she plans to develop and teach a certificate program on cross‑cultural interviewing at a local community college, mentor emerging interviewers,
    and contribute articles to journals on the intersection of art, culture, and storytelling. Her long‑term ambition is to be recognized as a thought leader who bridges academic insight with practical
    interviewing expertise, fostering greater representation of Latino voices in public discourse.
