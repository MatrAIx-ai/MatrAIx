  hobbies: '[''Yoga'', ''Coastal Hiking'', ''Paddleboarding'', ''Cooking Healthy Meals'', ''Wine Tasting'', ''Reading Health & Tech Non-Fiction'', ''Competitive Tennis'', ''Puzzle Solving'', ''Board Games
    (Chess)'', ''Volunteer Health Fair Coordination'']'
  career_goals: Tammy aims to advance to a regional health services director role within the next five years, overseeing multiple facilities and driving large‑scale digital transformation projects such
    as telehealth expansion and AI‑enhanced patient flow. She plans to earn a Master’s in Healthcare Administration and a Certified Medical Manager (CMM) credential to deepen her strategic expertise. Ultimately,
    she aspires to shape policy that improves patient outcomes while delivering operational excellence, positioning herself for a future C‑level executive position (COO) in a leading health system.
