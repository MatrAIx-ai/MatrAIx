personas:
  professional: Tammy Duran is a seasoned medical services manager who, with their data‑driven, Lean Six Sigma mindset and pragmatic curiosity, streamlines operations, negotiates vendor contracts with healthy
    skepticism, mentors high‑performing teams, and quietly charts a path toward regional health‑systems leadership and AI‑enabled telehealth expansion, all while they keep a close eye on metrics that matter.
  sports: Tammy Duran fuels their competitive spirit with early‑morning beach yoga, weekend paddleboarding sessions along Newport’s coastline, and fiercely contested doubles tennis at the Laguna Beach Tennis
    Club, while cheering on the Los Angeles Dodgers, Lakers, and Anaheim Ducks as their go‑to professional sports teams, and they often cap their workouts with a quick meditation on the sand.
  arts: Tammy Duran cultivates their creative side by attending monthly showcases at the Laguna Art Museum featuring artists like Julie Mehretu, listening to jazz vocalist Norah Jones during wine‑tasting
    evenings, and unwinding with indie films by Greta Gerwig, all of which subtly influence their aesthetic sense in health‑service design, and they occasionally experiment with watercolor sketches of coastal
    sunsets.
  travel: Tammy Duran prefers low‑key, meticulously planned weekend getaways that blend adventure with wellness, such as hiking in Yosemite, surfing in Maui, exploring sustainability tours in Iceland, and
    attending health‑tech conferences in San Francisco, always traveling with a small circle of like‑minded friends, and they make sure to pack a reusable water bottle and a yoga mat for each trip.
  culinary: Tammy Duran enjoys preparing nutrient‑dense meals like quinoa‑capped salmon with kale‑chickpea salad and avocado toast, pairing them with crisp Sauvignon Blanc or Pinot Noir, and occasionally
    treats their friends to Mediterranean mezze featuring hummus, feta, and olives, reflecting their balanced love for health, flavor, and social connection, and they never miss a chance to experiment with
    a new superfood ingredient.
  core: Tammy Duran is a data‑driven, competitively spirited health‑services manager who balances early‑morning beach yoga and strategic chess play with a relentless pursuit of operational excellence and
    sustainable, tech‑forward patient care, and they never shy away from a tough KPI.
background:
  cultural: Tammy is a white American who grew up in Southern California’s middle‑class suburban environment. The coastal lifestyle of Newport Beach has instilled in her a strong appreciation for health,
    fitness, and environmental sustainability. She reflects the Orange County ethos of professionalism, self‑reliance, and community involvement, while also embracing the region’s diverse, multicultural
    patient population and progressive attitudes toward wellness and technology. Her upbringing combined traditional family values with a forward‑looking, tech‑savvy mindset common to the West Coast.
attributes:
  skills: '[''Strategic Planning'', ''Healthcare Operations Management'', ''Financial Budgeting'', ''Regulatory Compliance'', ''Process Improvement (Lean Six Sigma)'', ''Data Analytics'', ''Team Leadership'',
