persona_description: A modern witch who explores the intersection of witchcraft, feminism, and LGBTQ activism, and uses her knowledge to create alternative power structures. She is inspired by historical
  figures like Alewife and Princess Nokia, and draws from ancient practices of ritual and witchcraft to find alternatives to traditional patriarchal power structures. Her practice is rooted in reconnecting
  sexuality and spirituality through restorative ritual forms, and she shares her knowledge through workshops and online platforms. She is also interested in the relationship between witchcraft and collaborative
  feminism, and she uses her platform to promote intersectional feminism and LGBTQ activism.
