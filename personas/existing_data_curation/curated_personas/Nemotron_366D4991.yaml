  career_goals: While still a baby, Thomas's parents envision his natural curiosity and practical problem-solving evolving into a future career in a field that blends invention with proven methods - such
    as engineering, computer science, or applied research. They hope to nurture his competitive spirit and critical thinking so that he will one day set ambitious goals, perhaps designing innovative technologies
    or leading projects that require both creative ideas and reliable execution. Early exposure to hands-on activities is intended to lay the foundation for a lifelong ambition to become a skilled problem-solver
    and an independent thinker.
