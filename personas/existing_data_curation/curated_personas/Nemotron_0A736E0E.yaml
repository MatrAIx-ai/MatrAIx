  career_goals: Derek’s ambitions center on helping others within a clear, predictable framework. He often says he wants to be a firefighter because he likes the bright trucks and rescuing people, a teacher
    because he enjoys being with other kids, or a veterinarian because he cares for animals. He also imagines being a bus driver, appreciating the regular routes and familiar faces each day. These aspirations
    reflect his love of routine, sociable nature, and desire to contribute positively to his community.
