personas:
  professional: Derek Gutter is a three‑year‑old who, while mastering block towers and pretend kitchen play, already shows a strong preference for routine by lining up his toys every day and loves coordinating
    group games with peers, reflecting his cooperative spirit and practical mindset.
  sports: Derek Gutter squirms with excitement for Sunday Utah Jazz broadcasts, dribbles a tiny basketball in the Lehi Little Tots Soccer Club, and plays seasonal tag in the backyard during summer, while
    also attending a preschool swimming class in winter that emphasizes fun over competition.
  arts: Derek Gutter adores listening to The Wiggles and Sesame Street songs, giggles at Mickey Mouse Clubhouse episodes, and spends afternoons drawing rainbow unicorns with Crayola crayons, letting the
    bright colors fuel his imaginative play.
  travel: Derek Gutter loves family road trips to the Great Salt Lake and weekend hikes at Antelope Island, relishes the predictable picnic routine, yet daydreams about a future adventure to Disneyland
    where he can meet his favorite cartoon characters.
  culinary: Derek Gutter prefers chicken nuggets with ketchup, buttery macaroni and cheese, apple slices, and carrot sticks with ranch dip, is proud of his growing ability to scoop peas with a spoon, and
    often requests extra sweetened cereal for breakfast.
  core: Derek Gutter is a routine‑loving, energetic three‑year‑old who balances meticulous toy organization with occasional sticker‑spending spurts, while worrying about tiny bumps and cherishing close‑knit
    family moments.
background:
  cultural: Derek is raised in a white, suburban family in Lehi, Utah, a community that places strong emphasis on family togetherness, regular church gatherings, and outdoor recreation. His upbringing includes
    routine family meals, Sunday events, participation in local celebrations such as Pioneer Day, and frequent visits to nearby parks and nature trails. These cultural influences reinforce his preference
    for familiar patterns, sociable demeanor, and cooperative spirit.
