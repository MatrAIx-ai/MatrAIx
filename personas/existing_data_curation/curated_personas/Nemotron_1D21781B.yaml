  career_goals: Susan aims to build on her administrative foundation by pursuing a senior executive assistant role that provides exposure to high‑level decision‑making and strategic projects. She envisions
    developing advanced project management skills and eventually transitioning into a mid‑level management position within a creative agency or nonprofit arts organization, where she can merge her love
    for novelty, art, and abstract thinking with her organizational expertise. Continuing her education toward a bachelor’s degree in Business Administration or Arts Management is also a priority, as is
    the long‑term ambition to launch a boutique event‑planning firm that curates immersive, artistic experiences for clients.
