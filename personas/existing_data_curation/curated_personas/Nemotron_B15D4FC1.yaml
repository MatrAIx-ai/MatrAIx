personas:
  professional: Demetri Gibbs, an infant model who appears in baby product advertisements, combines a naturally curious gaze and methodical attention to direction cues, making them a reliable presence on
    set despite their preference for quiet, solitary moments between shoots.
  sports: Demetri Gibbs shows a budding enthusiasm for motion by crawling enthusiastically in the family’s backyard while sporting a Chicago Cubs onesie, enjoys watching the Cubs on TV, and attends a weekly
    toddler gymnastics session at the Little Champions Club, where they relish the quiet rhythm of stretching over the more boisterous play.
  arts: Demetri Gibbs delights in the soft strains of Johann Sebastian Bach’s lullabies and the playful songs of Raffi, often following the bright colors of a local children’s museum exhibit on Van Gogh’s
    starry night, reflecting a quiet appreciation for visual and auditory art that soothes their solitary temperament.
  travel: Demetri Gibbs has already explored the local aquarium and the nearby state park’s picnic area with their family, and they dream—through bedtime storybooks—of a future visit to the Great Barrier
    Reef and the bright streets of Paris, preferring relaxed, low‑stimulus trips with familiar caregivers.
  culinary: Demetri Gibbs prefers the smooth taste of mashed sweet potatoes, ripe bananas, and avocado puree, skillfully self‑feeds with a tiny spoon, while consistently turning away from peas and refusing
    plain oatmeal, showing a subtle yet distinct palate for sweet, buttery textures.
  core: Demetri Gibbs is a quietly curious one‑year‑old who loves orderly routines, tiny triumphs in self‑feeding, and the calm comfort of art and gentle music while shunning noisy crowds.
background:
  cultural: Demetri is an African‑American child raised in Sandersville, Mississippi, a small community steeped in Southern traditions. His family celebrates African‑American cultural heritage through gospel
    music, storytelling, and seasonal community gatherings. The local church and family meals featuring Southern cuisine, such as collard greens and cornbread, shape his early cultural experiences. Though
    rooted in his community, his caregivers also expose him to broader artistic influences, fostering an appreciation for both traditional and contemporary art forms.
