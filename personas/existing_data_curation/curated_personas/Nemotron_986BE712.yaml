personas:
  professional: Glenda Mack, a 17‑year‑old aspiring office administrator, leverages meticulous planning, budget‑tracking, and a competitive drive to excel in school‑based clerical tasks while mapping out
    a path toward a future event‑planning and catering venture, and they aim to secure an entry‑level position at a local logistics firm within the next year.
  sports: Glenda Mack, a 17‑year‑old track athlete who channels competitive energy into daily laps around the high‑school track, follows the Carolina Panthers and the local Charlotte Hornets, and they schedule
    structured workouts to combat stress while occasionally skipping rest days due to perfectionism.
  arts: Glenda Mack, a 17‑year‑old gospel‑choir member who sings hymns on Sundays, enjoys listening to contemporary artists like Beyoncé and John Legend, and they spend evenings designing virtual neighborhoods
    in The Sims as a creative outlet.
  travel: Glenda Mack, a 17‑year‑old who plans weekend road trips to nearby Charleston and Savannah for historic tours and coastal cuisine, dreams of a summer visit to New Orleans for its music and food
    scene, and they budget travel carefully around school responsibilities.
  culinary: Glenda Mack, a 17‑year‑old home cook who perfects shrimp and grits, collard greens, and sweet tea for family gatherings, experiments with spice blends and Cajun rubs, and they balance a growing
    recipe collection with occasional fast‑food cravings for pizza.
  core: Glenda Mack, a 17‑year‑old organized perfectionist who juggles school, track, choir, budgeting, and culinary experiments while wrestling with chronic worry and a penchant for late‑night gaming marathons.
background:
  cultural: 'Glenda was raised in a close‑knit African‑American family in the coastal region of Beaufort County, North Carolina. Her upbringing reflects Southern Black cultural traditions: regular attendance
    at a historically Black Baptist church, involvement in gospel music and church‑based youth activities, and family gatherings centered around Southern comfort food. Stories of the civil‑rights movement
    and local Black leaders are part of her family lore, fostering a deep respect for resilience and self‑reliance. The community’s emphasis on mutual support, respect for elders, and a strong work ethic
    shapes her values, while contemporary Black music, fashion, and digital culture influence her personal style and interests.'
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Personal budgeting'', ''Basic computer literacy (Microsoft Office, internet research)'', ''Event coordination'', ''Cooking and meal planning'',
    ''Basic automotive maintenance'', ''Competitive sports strategy'']'
  hobbies: '[''Planner and journal maintenance'', ''Track running (competitive)'', ''Cooking Southern cuisine'', ''Strategy video games (The Sims, SimCity)'', ''Church youth choir participation'', ''Community
    volunteering (clean-up events)'', ''Reading self-improvement books'']'
  career_goals: Glenda plans to obtain her GED within the next year and enroll in a community‑college certificate program in Office Administration or Business Operations. Her short‑term aim is to secure
    an entry‑level administrative or clerical position at a local manufacturing or logistics company, where she can apply her detail‑oriented and disciplined work style. Over the next five years she hopes
    to advance to an office‑manager or operations‑coordinator role, and eventually launch her own small event‑planning and catering business that merges her organizational talents with her love for Southern
    cuisine. She is motivated by the prospect of a stable, structured career path that rewards achievement and allows her to set and meet measurable goals.
