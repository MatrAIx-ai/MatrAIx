  hobbies: '["Watercolor and mixed‑media painting", "Speculative fiction reading", "Philosophy book club", "Native Oregon gardening", "Hiking and birdwatching", "Local poetry readings and theater", "Knitting",
    "Listening to classical and ambient music"]'
  career_goals: Although retired from formal employment, Riane aims to deepen her impact in the Medford arts community. She plans to become a regular docent at the historic downtown museum, leading tours
    that connect art history with contemporary creative practice. She also hopes to mentor high‑school students in a creative‑writing program, eventually compiling a collection of their stories. On a personal
    level, she aspires to complete a series of abstract watercolors inspired by the Oregon landscape and to enroll in a community‑college course on modern art theory to satisfy her lifelong curiosity. Travel
    to regional art festivals and a possible short‑term residency at a senior artist retreat are also on her wish list.
