personas:
  professional: Riane Coates is a retired liberal arts scholar who channels a vivid imagination and cooperative spirit into leading docent tours at the historic downtown museum, mentoring high‑school creative
    writers, and orchestrating community art workshops with a blend of meticulous planning and flexible artistic experimentation.
  sports: Riane Coates enjoys low‑impact fitness through weekend hikes on the Siskiyou Trail, birdwatching excursions with the local Audubon club, and occasional community walking groups, while cheering
    for the Portland Trail Blazers and Oregon Ducks, and refuses to join high‑intensity gym classes, preferring the calm of nature.
  arts: Riane Coates immerses herself in watercolor and mixed‑media painting inspired by the Cascades, finds solace in the poetry of Mary Oliver and the ambient soundscapes of Brian Eno, reveres the works
    of Georgia O'Keeffe and Vincent van Gogh, and attends intimate theater productions starring local actors like Janelle Ward, which all shape her creative identity.
  travel: Riane Coates plans trips with a blend of careful budgeting and spontaneous curiosity, favoring art‑focused destinations such as the Portland Art Museum, the Seattle Glass Center, a senior artist
    residency in Santa Fe, and a dream pilgrimage to the Edinburgh International Festival, while still cherishing weekend drives to Oregon's coastline for sunset sketches.
  culinary: Riane Coates enjoys cooking with fresh herbs from her garden, often preparing Oregon salmon with dill, rosemary‑roasted potatoes, and wild mushroom risotto, while experimenting with vegetarian
    Thai curry and occasional sushi rolls, demonstrating a competent home‑cook level that balances comfort food with artistic plating.
  core: Riane Coates blends senior wisdom with boundless imagination, turning everyday garden walks into watercolor inspiration, mentoring youth through art, and navigating life with a gentle habit of occasional
    impulsive art‑book splurges.
background:
  cultural: Riane is a third‑generation white American of Anglo‑German heritage who grew up in a Midwestern suburb before moving to the Pacific Northwest in her early thirties. She embraces mainstream American
    cultural traditions—Thanksgiving, Fourth of July celebrations, and community potlucks—while also valuing the strong environmental ethic common in Oregon. Her sense of community reflects the cooperative
    spirit of small‑town life, and she actively respects the heritage of the region’s Indigenous peoples by supporting local Native art exhibitions and learning about tribal histories. This blend of Midwestern
    upbringing and Pacific‑Northwest sensibilities informs her appreciation for both stability and the novelty of new artistic ideas.
