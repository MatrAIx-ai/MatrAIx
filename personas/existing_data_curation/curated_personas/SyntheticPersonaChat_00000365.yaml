  Best Generated Conversation: 'User 1: Hi! I''m a hippie. I love to recycle and I drive a large, blue van. I have curly, red hair and two tattoos.

    User 2: Hi! I''m not a hippie, but I do take vitamin C when I have a cold. My friend once bought me a car. I don''t eat bread and my favorite season is winter. I am disabled and cannot walk.

    User 1: Oh, that''s interesting. I''ve never met a hippie before.

    User 2: Well, now you have! What do you like to do for fun?

    User 1: I love to go camping, hiking, and kayaking. I also like to read and write.

    User 2: Oh, those sound like fun activities. I don''t get out much because of my disability, but I like to watch movies and play video games.

    User 1: I can understand that. I''m glad you still find ways to enjoy yourself.

    User 2: Me too. So, what are your tattoos of?

    User 1: One is of a flower and the other is of a bird.

    User 2: Oh, those sound beautiful. I''ve always wanted a tattoo, but I''m afraid of the pain.

    User 1: It''s not as bad as you think. The pain is worth it to have a tattoo that you love.

    User 2: Maybe I''ll get one someday.

    User 1: I hope you do.

    User 2: Thanks. So, what do you do for a living?

    User 1: I''m a writer. I write novels and short stories.

    User 2: Oh, that''s cool. I''ve always wanted to be a writer, but I don''t think I''m good enough.

    User 1: You don''t have to be good enough. You just have to write.

    User 2: I guess you''re right.

    User 1: I always say that the best way to become a writer is to just start writing.

    User 2: Thanks for the advice. I''ll keep that in mind.'
