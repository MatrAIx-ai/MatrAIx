personas:
  professional: Mariam Daye is a seasoned career counselor who leverages data‑driven assessment tools, meticulous program design, and a calm, organized demeanor to build equitable STEM pathways for students
    while mentoring teams toward systemic impact.
  sports: Mariam Daye stays active by practicing yoga three times a week, running with the Washington Road Runners club in spring, cheering on the Washington Capitals and Washington Wizards during their
    seasons, and occasionally joining a community adult softball league, balancing structured workouts with seasonal outdoor activities.
  arts: Mariam Daye enjoys live jazz at Blues Alley, draws inspiration from the improvisational brilliance of Miles Davis and the soulful storytelling of Nina Simone, and frequently quotes the poetic works
    of Maya Angelou when designing workshop narratives.
  travel: Mariam Daye prefers thoughtfully planned trips that blend cultural immersion and structured itineraries, often opting for weekend getaways to Asheville for mountain hikes, spring culinary tours
    of New Orleans, and dreaming of a semester‑long study tour of Ghana to explore educational models, all while adhering to a modest annual travel budget.
  culinary: Mariam Daye cooks at an intermediate level, frequently creating fusion dishes like spicy jambalaya‑inspired rice and beans seasoned with suya spice, collard greens sautéed with ginger and smoked
    paprika, and sweet potato pie infused with ginger and honey, while sourcing fresh herbs from her balcony garden and occasionally indulging in premium truffle oil for special dinners.
  core: Mariam Daye is a methodical career counselor who blends data‑driven guidance with community empathy, channels structured habits into disciplined finances and proactive health routines, and balances
    a love of gardening, jazz, and culinary experimentation while quietly pursuing leadership impact.
background:
  cultural: Mariam is an African‑American woman with deep roots in the Washington, DC community. Raised in Columbia Heights by parents who were active in local civil‑rights and educational initiatives,
    she grew up celebrating Black cultural traditions, including Juneteenth and Kwanzaa, and maintains strong ties to the city's historic African‑American churches and community centers. Her cultural identity
    informs her commitment to equity, mentorship, and creating supportive spaces for Black students pursuing STEM careers.
attributes:
  skills: '[''career counseling'', ''individualized education planning'', ''labor‑market research'', ''data‑driven program evaluation'', ''assessment tool administration (Strong Interest Inventory, Myers‑Briggs)'',
    ''workshop facilitation'', ''project management'', ''resource coordination'', ''cultural competency'', ''conflict mediation'', ''report writing'', ''strategic planning'', ''team collaboration'', ''time
    management'', ''budget oversight'']'
  hobbies: '[''urban gardening'', ''nonfiction reading (education policy, Black history, personal development)'', ''book club participation'', ''cooking fusion dishes'', ''yoga'', ''jazz concerts'', ''mentoring
    high‑school STEM students'']'
  career_goals: Mariam aims to advance into senior leadership within the education sector, such as becoming Director of Student Success at a university or Program Director for a nonprofit focused on equitable
    STEM pathways. She plans to earn a master's degree in counseling or educational leadership and attain professional certification (e.g., Certified Career Development Practitioner). Her long‑term ambition
    is to design and implement large‑scale, data‑informed career guidance programs that specifically address the needs of underrepresented Black students in the Washington, DC area, influencing policy and
    fostering community partnerships.
