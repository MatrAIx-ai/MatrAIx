persona_description: A researcher and industry expert in the field of circular economy, particularly in the context of the PET/polyester packaging and textile systems. This individual has expertise in chemical
  recycling technologies and their potential to complement mechanical recycling and upcycle hard-to-recycle plastic waste into high-quality recycled PET/polyester. They are interested in the development
  of a comprehensive system model and scenario assessment tool to determine the feasibility and potential benefits of the new system vision for the PET/polyester industry.
