  hobbies: '["sensory play (water, sand, textured fabrics)", "listening to children''s music", "exploring picture books", "building block towers", "interactive games like peek-a-boo", "visiting local parks"]'
  career_goals: 'Emily’s immediate goals focus on mastering independence: walking without assistance, speaking more words, and engaging in purposeful play. Her caregivers envision her future ambition as
