persona_description: A PowerSafe filesystem administrator who is familiar with the fsencrypt utility and its commands. They are responsible for managing encryption and decryption of data on a PowerSafe
  filesystem, ensuring secure storage and access to sensitive information. The persona is skilled in setting up and configuring fsencrypt, as well as performing various operations such as creating and destroying
  domains, enabling encryption support, and managing migration work. They have a deep understanding of the encryption mechanisms supported by fsencrypt, including AES-256 in XTS mode, CBC mode, and other
  options.
