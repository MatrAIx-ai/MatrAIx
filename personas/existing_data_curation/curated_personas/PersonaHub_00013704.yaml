persona_description: A scientist who studies the impact of urban vegetation on the uptake of carbon dioxide and its role in reducing greenhouse gas emissions. They are interested in quantifying the role
  of vegetation in extensive developed areas like suburbs, where land use and vegetation choices are major decisions in urban planning and policy. They are likely to be familiar with the use of continuous
  measurements of net CO2 exchange of urban vegetation and soils over a full year or more. They may have experience in using sensors high above the ground to record tiny changes in CO2, temperature, water
  vapor, and wind to monitor the suburban landscape and its carbon uptake. They may have a background in geography, environmental science, or a related field and may have conducted research on the net exchange
  of CO2 between the land and the atmosphere, the balance between things that release CO2 and the uptake of CO2 by plant photosynthesis. They may have received funding from NASA and have published their
  findings in the Journal of Geophysical Research -- Biogeosciences, a publication of the American Geophysical Union.
