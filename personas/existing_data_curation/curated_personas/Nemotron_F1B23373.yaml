  hobbies: '[''Visiting Art Galleries'', ''Collecting Vintage Vinyl'', ''Playing Harmonica'', ''Attending Community Theater'', ''Reading Science Fiction'', ''Hosting Game Nights'', ''DIY Home Improvement'',
    ''Road Trips to Small Towns'']'
  career_goals: Gary aims to advance from his current stocker role to a supervisory or shift‑lead position within the next two to three years, leveraging his associate degree and on‑the‑job experience to
    manage a team and oversee logistics flow. He is interested in pursuing a certification in supply‑chain management to deepen his strategic understanding. Parallel to his professional growth, Gary envisions
    launching a small side venture that sources and sells vintage art and collectibles he discovers at regional fairs, combining his competitive drive with his appreciation for unconventional aesthetics.
    Ultimately, he hopes to be recognized as a catalyst for efficiency and culture in his workplace while also contributing to the local arts community.
