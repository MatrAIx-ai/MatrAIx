persona_description: A researcher involved in a study comparing the outcomes of ambulatory gastrointestinal investigations with physical activity using accelerometry. The study aims to investigate the effects
  of physical activity on the speed of gastrointestinal transit and the amount of physical activity undertaken by patients during ambulatory oesophageal pH monitoring or capsule endoscopy. The study will
  be conducted over 6-9 months in Imperial College Trust's medical outpatient service, and all patients undergoing capsule endoscopy or ambulatory oesophageal monitoring will be asked to consider participating.
  The research hypothesis is that there is no change in the amount or nature of physical activity taken by patients during ambulatory oesophageal pH monitoring or capsule endoscopy and there is no correlation
  between physical activity levels and speed of gastrointestinal transit. The study is conducted by a principal investigator with expertise in the field of gastrointestinal investigations and accelerometry.
