persona_description: A sculptor and artist who is known for his works in bronze and Vermont marble, particularly for his portraits of notable figures such as Senator Knute Nelson and Leif Erikson, as well
  as for his Civil War monument in Arkansas. He has received numerous awards and has been decorated by the King of Norway. He was commissioned to create the Soldiers and Sailors Monument in Summit Park,
  which honors Josias R. King, the first Minnesotan to volunteer to fight for the Union in the Civil War.
