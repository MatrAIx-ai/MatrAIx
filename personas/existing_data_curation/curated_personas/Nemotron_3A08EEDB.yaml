  career_goals: Even at seven, Tanisha envisions a future where she can explore the natural world and create solutions for everyday problems. She dreams of becoming a wildlife biologist who studies birds
    and small animals in their habitats, combining her love of observation with scientific inquiry. She also imagines designing simple inventions that make daily life easier, reflecting her blend of curiosity
    for new ideas and practical thinking. Tanisha hopes to work in a quiet research setting or a nature center where she can focus independently while contributing to scientific knowledge.
