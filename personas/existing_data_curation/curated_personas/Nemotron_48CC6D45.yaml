  career_goals: Jennifer aims to transition into a principal role within her firm or launch her own boutique practice focused on community-driven, climate-resilient residential architecture. She aspires
    to lead large-scale sustainable projects that achieve LEED Platinum certification and to mentor the next generation of architects, especially women and underrepresented groups. She wants to influence
    local zoning policies to promote walkable neighborhoods and coastal resilience, and hopes to earn recognition through AIA awards and publications. Balancing impact with flexibility, she seeks to design
    livable spaces that blend modern aesthetics with environmental stewardship, while maintaining a work schedule that allows her to stay engaged with her social and volunteer activities.
