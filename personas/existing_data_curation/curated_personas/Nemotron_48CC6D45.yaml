personas:
  professional: Jennifer Vernon is a seasoned architect who leverages their expertise in sustainable design and LEED certification to lead multidisciplinary teams, turning complex data-driven models into
    accessible narratives while balancing curiosity with practicality and a relaxed, flexible approach to project deadlines, and they thrive on mentoring junior staff.
  sports: Jennifer Vernon regularly joins coastal trail hikes, weekend kayaking outings, and evening yoga classes, they cheer for the San Diego Padres and support the local surf club's beach cleanup crew,
    while their flexible schedule often leads them to skip scheduled gym days.
  arts: Jennifer Vernon immerses in artistic expression through architectural photography of Frank Lloyd Wright structures, attends live shows by local indie band The Growlers and classical pianist Lang
    Lang, and participates in San Diego's Art Walk, though they sometimes postpone museum visits due to spontaneous social gatherings.
  travel: Jennifer Vernon prefers eco-conscious travel, enjoying weekend getaways to Catalina Island and yearly trips to the Amalfi Coast to study vernacular housing, while they balance family obligations
    by planning trips around work commitments and budget constraints.
  culinary: Jennifer Vernon delights in cooking Mediterranean dishes such as grilled branzino with olive tapenade, ratatouille, and homemade hummus using extra-virgin olive oil, fresh herbs, and feta, often
    hosting potluck gatherings where they showcase their skillful plating inspired by their architectural eye.
  core: Jennifer Vernon blends sustainable architecture, a vibrant social life, and a relaxed yet purposeful approach, and they navigate projects and passions with curiosity, flexibility, and a dash of
    organized chaos.
background:
  cultural: Jennifer was raised in a middle-class English-American family in Southern California, where a blend of West Coast modernist design and a laid-back coastal lifestyle shaped her worldview. Growing
    up near the Pacific, she developed a strong appreciation for outdoor living, environmental stewardship, and inclusive community values that are characteristic of San Diego's multicultural fabric. Her
    education in a STEM-focused university reinforced an analytical mindset, while family trips to historic sites across the United States fostered her curiosity about architectural heritage. Though she
    identifies as white, Jennifer's cultural identity is informed by the progressive, environmentally conscious ethos of the region, and she actively participates in local cultural events that celebrate
    the city's diverse artistic and culinary scenes.
