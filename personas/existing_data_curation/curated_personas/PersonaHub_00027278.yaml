persona_description: A university administrator who is concerned about the quality of teaching in post-secondary institutions and advocates for the use of technology to enhance learning, but is skeptical
  of the high investment in technology if it is merely added on as an enhancement to what we already do. They believe that the quality of teaching and learning is already of high quality and thus merely
  needs to be enhanced with technology, but are also aware of the need to change a teaching model. They are interested in the opportunities that new technology offers and want to build on them to create
  a new model that builds on the strengths and opportunities that technology provides, while also addressing the need to change a teaching model. They are also aware of the major shift that has occurred
  as a result of opening up access to post-secondary education and have a unique knowledge and skills in this area.
