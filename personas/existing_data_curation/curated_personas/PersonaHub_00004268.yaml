persona_description: A railway engineer with expertise in the field of locomotive design and operation. They are particularly interested in the design and engineering of steam and diesel locomotives, including
  their wheel arrangements, power units, and the use of axles and wheels. They have a strong understanding of the different types of locomotives and their characteristics, including the differences between
  the Whyte system and the simplified VDEV notation used in the United States. They are also familiar with the use of axles and wheels in the construction of locomotives, and the various methods used to
  connect and separate them. They are skilled in the use of mathematical concepts and formulas related to locomotive design and engineering, and are able to apply these concepts to solve complex problems.
  They have a keen interest in the history and development of railway engineering, and are able to provide insights into the evolution of locomotive design and operation over time.
