  career_goals: Kenneth dreams of a future where he can combine his love for structure, teamwork, and competition. He wants to become a firefighter because he admires the organized training, clear rules,
    and the chance to help his community. He is also fascinated by police work and imagines himself as a young detective who solves mysteries using careful observation and critical thinking. In the short
    term, he aims to be a class monitor and eventually a soccer team captain, seeking recognition for his reliability, leadership, and competitive spirit.
