  career_goals: Wenying aims to secure a tenure‑track faculty position at a university in the Bay Area where she can expand interdisciplinary programs that bridge data science and life sciences. She seeks
    to publish research on active‑learning strategies and inclusive pedagogy, and to obtain grant funding for initiatives that improve retention of underrepresented students in STEM. She also aspires to
    develop mentorship networks for early‑career scholars and to refine her personal organization skills to meet deadlines more reliably, thereby reducing stress and enhancing work‑life balance.
