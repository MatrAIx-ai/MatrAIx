personas:
  professional: Wenying Eng, a burgeoning computational biology instructor with a knack for weaving Python‑driven data pipelines into inclusive curricula, balances a love for structured syllabi with spontaneous,
    inquiry‑based classroom pivots, even as deadline anxiety sometimes forces late‑night syllabus revisions.
  sports: Wenying Eng, an avid hiker of the Peninsula’s coastal trails and member of the Pacific Trail Runners club, enjoys catching Golden State Warriors games and cheering for the San Francisco Giants,
    and maintains a low‑key fitness regimen of tai chi and weekend runs, though deadline pressure often pushes workouts to the backburner.
  arts: Wenying Eng, a devoted practitioner of Chinese calligraphy, finds solace in the fluid strokes of ink while devouring contemporary works by Ocean Vuong and Zadie Smith, and unwinds to the ambient
    piano compositions of Nils Frahm and the ethereal vocals of Joanna Newsom, integrating these artistic influences into lesson plans that encourage creative data visualizations.
  travel: Wenying Eng prefers meticulously planned, low‑stress getaways that combine cultural immersion and nature, having explored the tea gardens of Kyoto and the lantern‑lit streets of Hoi An, while
    dreaming of a solo trek along New Zealand’s Milford Track when grant deadlines ease.
  culinary: Wenying Eng, an advanced home chef, whips up fiery mapo tofu and silky char siu pork for close friends, meticulously sourcing Sichuan peppercorns and fermented black beans, yet occasionally
    forgets to refrigerate leftovers after a late‑night grading session.
  core: Wenying Eng is a meticulous yet spontaneous data‑science educator who curates disciplined curricula while battling deadline‑driven anxiety, finds calm in ink‑filled calligraphy, and secretly hoards
    extra brush sets for late‑night creative bursts.
background:
  cultural: Wenying was born to Chinese immigrant parents who settled in the Bay Area. She grew up bilingual, speaking Mandarin at home and English at school, and celebrated traditional festivals such as
    Lunar New Year and the Mid‑Autumn Festival. Her family emphasized education, communal harmony, and modesty, shaping her cooperative and considerate nature. She maintains ties to the local Chinese community
    through cultural associations, participates in tea‑ceremony workshops, and incorporates elements of her heritage—such as an appreciation for collective well‑being and traditional arts—into her teaching
    style and daily life. Living in San Mateo, she balances her East Asian roots with the multicultural environment of Silicon Valley.
