    Excel'']'
  hobbies: '[''Playing guitar and singing ranchera'', ''Amateur soccer'', ''Watching San Diego Padres baseball'', ''Attending Mexican cultural festivals'', ''Cooking traditional Mexican cuisine'', ''Hosting
    neighborhood barbecues'', ''Weekend road trips along the coast'', ''Volunteering for senior transportation assistance'']'
  career_goals: Juan aims to move from his current supervisory role to an operations-manager position overseeing multiple distribution centers across Southern California. To achieve this, he plans to earn
    the Certified Transportation Professional (CTP) credential and enroll in an MBA program focused on supply-chain management. He also intends to deepen his expertise in emerging logistics technologies
    such as telematics and AI-driven route optimization. In the longer term, Juan envisions leading a regional logistics network, driving efficiency improvements, and mentoring a new generation of supervisors.
    Additionally, he hopes to use his leadership experience to support community initiatives that provide transportation solutions for local Hispanic entrepreneurs.
