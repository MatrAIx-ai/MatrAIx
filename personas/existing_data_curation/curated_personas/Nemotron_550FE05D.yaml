personas:
  professional: Terrell Dor, a 25‑year‑old instructional designer, leverages adult learning theory and a knack for blending technology with storytelling to craft data‑driven, inclusive training programs
    that balance innovative curiosity with practical business outcomes, while their calm, resilient demeanor keeps project teams focused and collaborative.
  sports: Terrell Dor, a 25‑year‑old fitness enthusiast, spends weekday evenings shooting hoops at Grant Park with local pickup squads, attends weekly hip‑hop dance classes at Emory Hills Recreation Center,
    practices sunrise yoga at Piedmont Park, and roots for the Atlanta Hawks and Atlanta United while also following the Atlanta Falcons in the football season.
  arts: Terrell Dor, an avid cultural participant, curls up with works by Toni Morrison, James Baldwin, and Claudia Rankine, while regularly attending gospel choir performances at the historic Ebenezer
    Baptist Church and neo‑soul concerts featuring Erykah Badu, Jill Scott, and H.E.R., and cites Lin‑Manuel Miranda’s Broadway show as a source of creative inspiration.
  travel: Terrell Dor, a 25‑year‑old explorer, prefers short, well‑planned weekend road trips that blend cultural immersion and relaxation, having recently driven to New Orleans for its music scene and
    to Charleston for historic tours, while dreaming of a future solo adventure to Kyoto during cherry blossom season and a summer festival in Barcelona, always booking budget‑friendly accommodations through
    Airbnb to stretch their travel fund.
  culinary: Terrell Dor, a confident home chef, regularly whips up Southern soul food staples such as crispy fried catfish, buttery collard greens seasoned with smoked paprika and a splash of hot sauce,
    creamy shrimp and grits, and buttery cornbread, delighting friends with a playlist of classic jazz while experimenting with seasonal produce like sweet potatoes and okra, and they frequently order at
    upscale farm‑to‑table restaurants to stay inspired.
  core: Terrell Dor, a 25‑year‑old learning‑design strategist, balances boundless curiosity with meticulous practicality, channels calm resilience into community mentorship, yet secretly hoards a growing
    collection of limited‑edition sneakers and can’t resist late‑night coffee runs before sunrise yoga.
background:
  cultural: Terrell grew up in the heart of Atlanta’s historic Black community, surrounded by the legacy of the Civil Rights Movement and the city’s thriving arts scene. Raised in a close‑knit family that
    valued church gatherings, storytelling, and Southern soul cuisine, he internalized a deep respect for community solidarity and cultural pride. His education at a Historically Black College and University
    (HBCU) reinforced his connection to African‑American history, literature, and social justice advocacy. Living in Clayton County, he experiences a blend of urban dynamism and Southern tradition, which
    informs his perspective on inclusive learning and community empowerment. This cultural foundation shapes his commitment to uplifting fellow Black professionals and preserving the rich heritage of Southern
    Black culture.
attributes:
  skills: '[''Instructional Design'',''Curriculum Development'',''Blended Learning'',''E‑learning Authoring (Articulate Storyline, Adobe Captivate)'',''Learning Management System Administration'',''Needs
