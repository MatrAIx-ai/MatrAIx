  hobbies: '[''Basketball'',''Hip‑hop Dance'',''Live Music (Gospel, Neo‑Soul, Jazz)'',''Cooking Southern Soul Food'',''Reading African‑American Literature'',''Mentoring Youth'',''Community Volunteering'',''Yoga'',''Fitness
    Running'',''Board Games'']'
  career_goals: Terrell aspires to become a senior learning and development leader within a major Atlanta‑based corporation, where he can shape strategic talent development initiatives and champion diversity‑focused
    training programs. He plans to earn the ATD Certified Professional in Learning and Performance (CPLP) credential, deepen his expertise in data‑driven learning analytics, and eventually launch his own
    consultancy that partners with nonprofits to design empowerment workshops for Black youth. Throughout his career, he seeks to balance innovative, curiosity‑driven learning solutions with practical,
    results‑oriented outcomes.
