personas:
  professional: Brandon Leach is a tech‑savvy teen who builds custom gaming PCs, tinkers with Arduino projects, volunteers as a homework mentor, and charts a path toward automotive service technician certification
    and CompTIA A+ credentials.
  sports: Brandon Leach hits the concrete courts for pick‑up basketball at the Glendale community center, roots for the Phoenix Suns and Arizona Cardinals, follows the Arizona Diamondbacks, and occasionally
    streams Phoenix Rising FC matches.
  arts: Brandon Leach unwinds by listening to classic rock legends like Led Zeppelin and contemporary indie acts such as Tame Impala, captures the Sonoran desert’s muted colors in his photography, and attends
    the First Friday Art Walk to admire local muralists and indie film screenings.
  travel: Brandon Leach prefers weekend road trips to nearby desert gems like Sedona and the Grand Canyon, planning routes on Google Maps and staying at budget motels, while dreaming of a summer backpacking
    adventure through the Pacific Northwest.
  culinary: Brandon Leach enjoys cooking hearty chicken fajitas, spicy ramen bowls, and breakfast burritos, often adding a dash of chipotle hot sauce, and showcases his modest kitchen skills during weekend
    BBQs with friends.
  core: Brandon Leach, a 17‑year‑old planner who compulsively catalogs every PC part and budget line, balances a love for desert hikes and gaming with a habit of staying up late debugging code, while they
    dream of opening a neighborhood auto‑repair shop.
background:
  cultural: Brandon grew up in Glendale, a suburb of Phoenix in Maricopa County, within a predominantly white, middle‑class family that embraces the values of self‑reliance, hard work, and community service
    common to the American Southwest. His household celebrates traditional events such as Fourth of July fireworks, local high school football games, and neighborhood block parties, fostering a strong sense
    of belonging. The desert environment and proximity to the Phoenix metropolitan area shape his appreciation for outdoor activities like hiking and an awareness of the region’s growing tech and automotive
    industries. While his cultural identity aligns closely with mainstream American values, occasional exposure to Glendale’s diverse community events gives him a modest awareness of multicultural influences,
    enriching his cooperative and considerate outlook.
