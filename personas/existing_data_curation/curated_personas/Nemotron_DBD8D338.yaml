  career_goals: Brandon plans to obtain his GED within the next year and then enroll in a vocational program that aligns with his practical interests—either automotive technology or computer networking.
    His immediate ambition is to become a certified automotive service technician, with a long‑term goal of opening a small, community‑focused repair shop that offers reliable and affordable services. Parallel
    to this, he is exploring IT support pathways, aiming to earn certifications such as CompTIA A+ to work as a help‑desk or field technician. Throughout his career pursuit, he is driven by a desire for
    achievement, financial stability, and the opportunity to mentor younger peers who share his curiosity.
