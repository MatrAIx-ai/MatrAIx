  career_goals: She aims to leverage her business acumen to serve as a volunteer advisor for local non‑profit organizations, mentor young entrepreneurs through a community incubator, and perhaps author
    a practical guide on small‑business financial management for seniors. Additionally, she is interested in obtaining a certification in nonprofit governance and serving on the board of a charitable foundation.
