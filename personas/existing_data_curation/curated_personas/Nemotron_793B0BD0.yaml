    Diverse Passengers", "Data Entry and Reporting for Transit Operations", "Community Outreach and Passenger Relations", "Creative Thinking for Service Improvements", "Organizational Record Keeping", "Safety
    Protocol Implementation"]'
  hobbies: '["Watercolor Painting", "Reading Contemporary Fiction and Philosophy", "Photography of Rural Landscapes", "Gardening (Vegetable and Flower Beds)", "Puzzle Solving (Crosswords and Jigsaw)", "Volunteering
    at Local Community Center", "Birdwatching in Arkansas State Parks", "Attending Regional Art Exhibits and Theater Performances", "Road Tripping to Explore New Towns", "Writing in a Personal Journal",
    "Listening to Folk and Classic Rock Music", "Participating in a Local Quilting Circle"]'
  career_goals: Sandra aims to transition from front‑line driving to a supervisory role within the transit authority, such as a Route Operations Supervisor or Safety Coordinator. She plans to complete a
    bachelor's degree in Transportation Management within the next three years, obtain Certified Transit Manager credentials, and lead initiatives to modernize the fleet with greener technologies and improve
    schedule reliability. Additionally, she dreams of integrating her love for art into her work by creating community‑driven mural projects on buses and establishing a passenger‑feedback program that incorporates
    creative storytelling. Ultimately, she seeks a position where she can blend operational excellence with innovative, community‑focused improvements, while securing a stable future for her family.
