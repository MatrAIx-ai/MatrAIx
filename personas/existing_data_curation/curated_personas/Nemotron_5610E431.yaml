  career_goals: In the next five years, Jose aims to move into a senior leadership role such as Director of Operations or Vice President of Business Development where he can shape company strategy and champion
    innovative, culturally resonant initiatives. He intends to earn a PMP certification and complete Six Sigma Black Belt training to deepen his operational excellence toolkit. Long-term, he envisions founding
    a consultancy that helps border-region businesses blend traditional Mexican cultural insights with modern business practices, fostering cross-border growth and community development.
