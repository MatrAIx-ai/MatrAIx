  hobbies: '[''Gardening (herbs, peppers, seasonal vegetables)'', ''Cooking traditional Mexican dishes'', ''Knitting and crochet'', ''Walking local parks and river trails'', ''Volunteering at Wheat Ridge
    senior center (bilingual book club, tech tutoring)'', ''Attending cultural festivals (Día de los Muertos, Denver Mexican Festival)'', ''Storytelling and oral history circles'', ''Digital photography
    of garden and community events'', ''Reading historical fiction and memoirs'']'
  career_goals: Even though she is retired, Yessenia has clear personal ambitions. She hopes to compile a family cookbook that blends Mexican heritage recipes with Colorado‑grown ingredients, preserving
    her culinary legacy for grandchildren. She also aims to finish a short memoir of her migration story and community life, which she plans to share at the local library’s senior reading series. Continuing
    her volunteer work, she aspires to mentor new volunteers at Wheat Ridge’s senior center, offering training in bilingual communication and basic tech skills. Finally, she wishes to deepen her digital
    photography hobby, creating a visual archive of her garden and cultural celebrations.
