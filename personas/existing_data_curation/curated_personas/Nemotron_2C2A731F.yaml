personas:
  professional: Yessenia Silva is a retired community volunteer who leverages bilingual communication, basic digital skills, and bookkeeping expertise to organize senior center workshops, mentor new volunteers,
    and archive cultural stories, balancing her curiosity for new tech with a practical, organized approach to service.
  sports: Yessenia Silva enjoys low‑impact fitness by walking the Riverfront Park trails, participates in a senior shuffleboard league at the local community center, and roots for the Colorado Rockies and
    Denver Broncos while keeping her activity level flexible for joint comfort.
  arts: Yessenia Silva engages in creative expression through digital photography of seasonal garden blooms, crafts knitted blankets for donation, and attends local performances featuring mariachi music
    and the Denver Symphony, drawing inspiration from artists like Frida Kahlo and Carlos Santana.
  travel: Yessenia Silva has explored the high desert of New Mexico, taken a family road trip to the Great Sand Dunes, and dreams of visiting Oaxaca to source heirloom peppers, planning trips carefully
    around health considerations and a fixed travel budget.
  culinary: Yessenia Silva expertly prepares traditional mole, tamales, and fresh salsa using Colorado‑grown produce and her own heirloom peppers, often experimenting with spice levels that occasionally
    overwhelm guests, while delighting in sharing meals at neighborhood potlucks.
  core: Yessenia Silva blends curiosity, kindness, and a practical love for gardening, cooking, and community service into an active senior life, marked by a penchant for over‑seasoned dishes, occasional
    forgetfulness, and unwavering dedication to cultural preservation.
background:
  cultural: Yessenia identifies as Mexican‑American. Born to parents who emigrated from Jalisco, she grew up in a bilingual household where Spanish was spoken at home and English at school. Family life
    revolved around Mexican traditions – celebrating Día de los Muertos, Las Posadas, and weekly Sunday meals featuring tamales and pozole. She carried these customs westward when her family settled in
    Colorado, adapting recipes to locally grown produce while preserving flavor and ritual. Her faith, cultural music such as rancheras and mariachi, and devotion to community gatherings continue to shape
    her identity. In Wheat Ridge she participates in local Hispanic cultural groups, helping organize events that showcase Mexican art, dance, and cuisine, and she mentors younger Mexican‑American families
    on navigating bicultural life.
