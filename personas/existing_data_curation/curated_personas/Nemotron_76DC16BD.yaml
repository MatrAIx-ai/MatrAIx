  hobbies: '[''Gardening'', ''Knitting'', ''Quilting'', ''Reading classic mystery novels'', ''Book-club participation'', ''Walking group outings'', ''Volunteer yoga instruction'', ''Medication safety workshops'',
    ''Mindfulness meditation'', ''Journaling'']'
  career_goals: Although officially retired from full-time hospital work, Sheila aims to remain an active contributor to the local health community. She hopes to mentor junior nurses through a senior-nurse
    volunteer program at the Hastings Regional Hospital, sharing practical wisdom and reinforcing the importance of structured patient care. She also plans to expand her community outreach by organizing
    monthly wellness seminars focused on mental-health coping strategies for older adults, drawing on her own experience with anxiety. Additionally, she wishes to author a concise guide on managing chronic
    conditions for rural seniors, combining her clinical knowledge with her organized communication style. Her long-term ambition is to foster a supportive network that encourages both physical and emotional
    well-being in her hometown.
