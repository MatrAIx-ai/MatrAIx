persona_description: A space scientist with expertise in exoplanet research, specifically in the use of the Transiting Exoplanet Survey Satellite (TESS) to detect Earth-sized planets orbiting bright stars.
  TESS's all-sky transit survey aims to provide high-precision photometry of more than 200,000 stars during a two-year mission, enabling the detection of planets and the determination of their masses and
  atmospheric compositions. The TESS instrument list includes a variety of instruments that are essential for the successful execution of the satellite's mission, such as the Transit Camera, which is capable
  of detecting transits of planets and the Full Frame Imager, which allows users to conduct photometry on any target within the 24x96 degree field-of-view.
