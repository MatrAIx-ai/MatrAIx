persona_description: A team of entomologists who specialize in collecting and studying beetles, particularly in the Lower Rio Grande Valley National Wildlife Refuge. They use various trapping methods to
  catch beetles, including bat sweeps, ground-level traps, and elevated flight-intercept traps. They also use a series of stacked funnels to capture beetles that fly to tree trunks. They are known for their
  dedication to their work and their meticulous lab work, where they carefully examine and preserve the collected specimens.
