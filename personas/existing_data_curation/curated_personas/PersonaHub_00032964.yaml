persona_description: A journalist who is interested in the media ethics and diversity. They are seeking to learn about the ethical concepts, principles, deontological codes, and journalistic good practices
  related to diversity in media. They are also interested in learning about the role of the image and the importance of ethical principles in reflecting diversity in media. They are familiar with the basic
  concepts and principles of diversity, the persisting stereotypes regarding different groups, and the ways to improve the reflection of these subjects in media. They are interested in studying the diversity
  categories, identifying and working with relevant sources, writing and editing sensitive issues from the point of view of ethics, integrating in a diverse working area, analyzing ways of introducing different
  groups in Moldovan media, and exploring the media role in the social construction of diversity categories.
