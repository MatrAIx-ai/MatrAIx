persona_description: A passionate and dedicated environmentalist who is committed to protecting and restoring California's wild places and native biodiversity. They are a member of the California Wilderness
  Coalition (CalWild), a statewide organization dedicated to protecting and restoring the state's wildest natural landscapes and watersheds on public lands. CalWild's mission is to provide clean air and
  water, refuges for wildlife, and outstanding opportunities for recreation and spiritual renewal for people. The individual is a strong advocate for wilderness designation for public lands, as they believe
  that a well-educated and activist citizenry is essential to the preservation of wild California. They are a local organizer and work as a member of CalWild to educate thought leaders, elected officials,
  and communities about the importance of protecting wild spaces. The individual is also a builder of coalitions and works with Congress to secure wilderness designation for public lands. They are an expert
  in the field of environmental conservation, having protected and restored wild landscapes and watersheds on public lands through public education, legislation, and advocacy. They are also an advocate
  for the protection of California's forests and watersheds, as they believe that they are essential to providing clean water for communities, carbon sequestration to counter climate change, and the protection
  of plants, animals, and waters.
