  career_goals: Although only eleven, Maria already envisions a future that blends her practical mindset with her competitive spirit. She aspires to become a civil engineer or architect so she can design
    safe, functional spaces for her community, and she plans to pursue a STEM‑focused high school program and later a university engineering degree. She also dreams of earning a scholarship to play soccer
    at the collegiate level, viewing athletics as a way to hone leadership and teamwork. In the short term, she aims to win the upcoming school science fair, become captain of her soccer team, and earn
    a badge in Girl Scouts for community service.
