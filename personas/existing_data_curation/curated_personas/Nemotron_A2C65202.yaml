personas:
  professional: Maria Gonzalez, an 11‑year‑old budding scientist, channels her love of routine and methodical thinking into the school’s science club, where she leads structured experiments, records data
    in meticulous notebooks, and applies a skeptical, competitive eye to test hypotheses, making her a natural future researcher.
  sports: Maria Gonzalez, an 11‑year‑old spirited soccer player, competes with the Riverside Tigers youth league, adheres to a five‑day‑a‑week practice schedule, avidly follows the professional team FC
    Metro for tactical inspiration, and also channels her energy into weekly salsa dance sessions that sharpen her coordination and competitive spirit.
  arts: Maria Gonzalez, an 11‑year‑old comic‑style illustrator, spends evenings drawing panels inspired by Jeff Smith’s graphic novels and the mystery twists of Karen M. McManus, practices salsa to the
    energetic beats of Ariana Grande’s dance‑ready tracks, and watches Millie Bobby Brown’s performances for expressive acting cues, shaping a vibrant creative outlet.
  travel: Maria Gonzalez, an 11‑year‑old adventure‑seeker, loves weekend trips to the nearby beach town of Gulf Shores, dreams of exploring the historic streets of Cartagena, and plans a future family vacation
    to Tokyo’s Shibuya district, balancing carefully drafted itineraries with a craving for spontaneous discovery.
  culinary: Maria Gonzalez, an 11‑year‑old budding chef, regularly helps her mother prepare empanadas filled with seasoned ground beef, cumin, and olives, and cooks arroz con pollo using saffron, bell peppers,
    and cilantro, mastering the balance of flavors while occasionally over‑seasoning out of excitement.
  core: Maria Gonzalez, an organized yet competitive 11‑year‑old, blends routine‑driven science experiments, strategic video gaming, and lively salsa dancing while wrestling with persistent worries that
    fuel her meticulous yet sometimes stress‑filled daily life.
background:
  cultural: Maria is a first‑generation Cuban‑American raised in a bilingual household in Marietta, Georgia. Her family maintains strong ties to Cuban culture, celebrating holidays such as Cuban Independence
    Day and Carnaval, listening to salsa and son music, and cooking classic dishes like ropa vieja and tostones. Spanish is spoken at home, and Maria is fluent in both Spanish and English, which enriches
    her communication at school and in the community. Her upbringing blends the warmth and collectivism of Cuban family life with the diverse, suburban environment of Cobb County, giving her a unique perspective
    on cultural heritage and American life.
