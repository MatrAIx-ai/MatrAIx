  hobbies: '[''Custom woodworking projects'', ''Visiting art galleries and museums'', ''Hiking in the Blue Ridge foothills'', ''Playing drums in a community band'', ''Cooking and BBQ experimentation'',
    ''Studying African‑American art and design history'', ''Community volunteer work'', ''Photography of carpentry work'', ''Attending local jazz and blues concerts'']'
  career_goals: He aims to transition from a hired carpenter to the owner of a boutique woodworking studio that produces high‑end, artful furniture for local clients and boutique hotels. In the next five
    years, he plans to earn a NC Master Carpenter certification, expand his services to historic home restorations, and mentor a small team of apprentices. He also dreams of showcasing his pieces in regional
    art exhibitions and eventually teaching part‑time at a community college.
