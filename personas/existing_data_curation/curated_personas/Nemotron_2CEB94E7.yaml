personas:
  professional: Jonathan Morris is a master carpenter who blends rigorous joinery expertise with a designer’s eye, leveraging CAD drafting and sustainable wood selection to deliver high‑end custom furniture
    while mentoring apprentices, and their curiosity and competitive streak push them to constantly explore unconventional forms and meticulous finishes.
  sports: Jonathan Morris hikes the Blue Ridge foothills with the local Trailblazers Hiking Club during spring and fall, follows the Carolina Panthers and the Fayetteville Woodpeckers with fervor, and fits
    in weekly pickup basketball at the community center, balancing their competitive drive with a love for the outdoors.
  arts: Jonathan Morris frequents the Fayetteville Art Center and the Charlotte Museum of History, draws inspiration from Romare Bearden’s collages and the soulful sounds of Stevie Wonder, and regularly
    drums in a community jazz ensemble while curating a personal photo series of reclaimed wood textures, reflecting a deep appreciation for both visual and performing arts.
  travel: Jonathan Morris prefers road trips that blend adventure with cultural immersion, having camped along the Appalachian Trail in Virginia, toured the historic districts of Charleston and Savannah,
    and dreaming of studying the woodworking guilds of Florence, Italy, while budgeting trips to fit within modest savings and family commitments.
  culinary: Jonathan Morris is a passionate BBQ aficionado who perfects a hickory‑smoked pork shoulder with a coffee‑infused rub, often pairs it with collard greens sautéed with smoked turkey, and enjoys
    experimenting with bourbon‑glazed peach cobbler, boasting advanced cooking skills but occasionally over‑smokes meats when eager to impress friends.
  core: Jonathan Morris is a relentless craftsman who channels their competitive curiosity into artful furniture, over‑cooks barbecue on weekends, and can’t resist a late‑night jam session on the drums
    after a good cup of coffee.
background:
  cultural: Jonathan was raised in Fayetteville’s close‑knit African‑American community, where church gatherings, soul music, and family storytelling were daily staples. His upbringing blended Southern
    culinary traditions—especially BBQ and soul food—with a deep respect for craftsmanship passed down through generations of tradespeople. He actively participates in community events such as Juneteenth
    celebrations and local historic preservation projects, honoring both his heritage and the region’s rich cultural tapestry.
attributes:
  skills: '[''Custom furniture design'', ''Advanced joinery'', ''Blueprint reading'', ''Project estimation'', ''Sustainable material selection'', ''Power tool operation'', ''Hand tool craftsmanship'', ''Wood
