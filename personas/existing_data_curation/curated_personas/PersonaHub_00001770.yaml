persona_description: A scientist or engineer who specializes in the field of speech and language processing, particularly in the areas of speech synthesis and laughter synthesis. This individual has experience
  in developing and optimizing models for generating realistic human-like laughter, and has a deep understanding of the physiological and psychological processes involved in laughter production. They are
  skilled in analyzing the acoustics of laughter and developing algorithms to generate laughter that closely mimics natural human laughter. This individual is also knowledgeable in the use of parametric
  controls to generate laughter based on the immediate context and has experience in developing models that are convenient to use for generating laughter.
