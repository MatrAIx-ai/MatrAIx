  career_goals: Brian aims to advance from his current supervisory role to a senior Office Services Manager position overseeing multiple locations within the York County region. He plans to earn a Certified
    Administrative Professional (CAP) credential and eventually a Project Management Professional (PMP) certification to solidify his competitive edge. Long‑term, he envisions leading a department that
    blends operational efficiency with cultural programming, such as establishing an internal arts and wellness initiative. He also hopes to mentor emerging leaders in his organization and be recognized
    as a top performer in regional leadership awards.
