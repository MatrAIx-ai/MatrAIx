personas:
  professional: Diana Willis, a retired volunteer coordinator, channels decades of community-based experience into pioneering an art-and-storytelling circle that bridges seniors and teenagers in High Point,
    using their curious eye for visual art and compassionate mediation skills while often racing against self-imposed deadlines due to their spontaneous, sometimes disorganized, approach.
  sports: Diana Willis, a dedicated member of the High Point Senior Walking Club, enjoys brisk park walks each sunrise and cheers on the Charlotte Hornets during occasional games, while occasionally dabbling
    in low-impact pickleball matches for social fun.
  arts: Diana Willis, who spends Saturdays listening to Ella Fitzgerald, Miles Davis, and Mahalia Jackson while wandering the High Point Art Museum, transforms that inspiration into quilting workshops and
    informal storytelling sessions that celebrate visual narratives and community heritage.
  travel: Diana Willis, who plans trips around cultural festivals, has road-tripped to New Orleans for Mardi Gras, explored Savannah's historic district, and dreams of attending the Smithsonian Folklife
    Festival in Washington, D.C., preferring short, flexible journeys that fit their spontaneous schedule and modest fixed income.
  culinary: Diana Willis, an accomplished home cook, lovingly prepares collard greens, smoked turkey, cornbread, and peach cobbler, often incorporating heirloom tomatoes from their garden into fresh salads,
    and delights in sharing these family recipes during quilting circles and church potlucks.
  core: Diana Willis blends a lifelong love of community art, gardening, and jazz with a delightfully spontaneous spirit and a habit of misplacing bills, making every day a balancing act of compassion,
    creativity, and gentle worry.
background:
  cultural: Diana is an African‑American woman who grew up in the Jim Crow South, witnessing the civil‑rights movement’s impact on her community. She is deeply rooted in the Baptist church tradition, which
    shapes her values of service, harmony, and storytelling. Her family’s Southern heritage influences her culinary and gardening practices, while her lineage ties to the Great Migration have instilled
    a strong appreciation for African‑American history and cultural preservation. In High Point, she participates in community events that celebrate Black art, music, and intergenerational connections,
    and she strives to pass these cultural legacies to younger neighbors.
