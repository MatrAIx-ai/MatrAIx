    festivals'', ''Walking in parks'']'
  career_goals: Although retired from formal employment, Diana aims to expand her volunteer impact by establishing a monthly art‑and‑storytelling circle for seniors and teenagers in High Point, creating
    a safe space for cultural exchange. She hopes to write a memoir that weaves personal history with the broader African‑American experience in the Piedmont region, and to champion mental‑health awareness
    for older adults through local church initiatives. Additionally, she aspires to learn a new craft—ceramic pottery—to further enrich her creative workshops.
