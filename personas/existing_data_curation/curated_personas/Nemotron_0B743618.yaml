  career_goals: Although retired, Michael aims to stay active and purposeful by mentoring apprentices at the local Habitat for Humanity, completing a personal woodworking project—a handcrafted gazebo for
    his backyard—and documenting his family’s history for future generations. He also wishes to maintain his health through regular walks and fishing trips with his wife, and to support his community by
    volunteering for church maintenance projects.
