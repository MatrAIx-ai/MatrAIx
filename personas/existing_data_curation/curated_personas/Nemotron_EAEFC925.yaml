personas:
  professional: Acacia Giraldo is a meticulous drywall and ceiling‑tile specialist who expertly interprets blueprints, leads apprentices, and leverages a disciplined, curiosity‑driven approach to integrate
    eco‑friendly materials while charting a path toward a general contractor license and her own construction firm.
  sports: Acacia Giraldo avidly hikes Sonoran Desert trails on weekends, captures sunset photographs, cheerfully supports the Arizona Cardinals and Phoenix Suns, and joins a local recreational soccer league
    that doubles as a social outlet with coworkers.
  arts: Acacia Giraldo expresses creativity through salsa and folklórico dance classes, honoring family traditions while mastering new choreography, and captures desert landscapes in photography inspired
    by Ansel Adams and local muralists, often listening to artists such as Carlos Santana and Bad Bunny during practice.
  travel: Acacia Giraldo meticulously plans road‑trip adventures to desert gems like Sedona and the Grand Canyon, while dreaming of a cultural immersion tour of Oaxaca’s markets and festivals, balancing
    a modest travel budget with a craving for both scenic solitude and lively community experiences.
  culinary: Acacia Giraldo delights in cooking family‑style traditional dishes such as tamales, chiles rellenos, and mole, while experimenting with desert‑inspired fusions like cactus‑infused tacos and
    prickly‑pear salsa, showcasing a skillful balance of authentic flavors and inventive ingredient pairings.
  core: Acacia Giraldo is an energetic, organized go‑getter whose love for dance, desert hikes, and precise craftsmanship is tempered by persistent worry that drives meticulous planning and occasional stress‑triggered
    splurges.
background:
  cultural: Acacia is a first‑generation Mexican‑American who grew up in a bilingual household in the Phoenix‑Mesa metro area. Her family places strong emphasis on close‑knit relationships, respect for
    elders, and the celebration of Mexican traditions such as Día de los Muertos, Las Posadas, and quinceañera ceremonies. She is fluent in both Spanish and English, which enables her to communicate effectively
    with a diverse client base and to mentor apprentices from similar cultural backgrounds. The Mexican value of ‘trabajo duro y con orgullo’ (hard work with pride) informs her disciplined approach to construction,
    while her love for community festivals and music fuels her outgoing, sociable nature. Living in Mesa, she blends her heritage with the Southwest’s desert culture, participating in local cultural fairs,
    supporting Mexican‑owned businesses, and preserving her family’s culinary and artistic customs.
attributes:
  skills: '[''Drywall installation'', ''Ceiling tile installation'', ''Joint taping and finishing'', ''Blueprint reading'', ''Material estimation and inventory management'', ''OSHA safety compliance'',
    ''Project scheduling'', ''Team coordination'', ''Apprentice training'', ''Quality‑control inspection'', ''Use of power tools (saws, sanders, drills)'', ''Knowledge of sustainable building materials'']'
  hobbies: '[''Salsa and folklorico dancing'', ''Cooking Mexican cuisine'', ''Desert hiking'', ''Photography of landscapes'', ''Yoga and mindfulness'', ''Volunteering at community youth center'', ''DIY
    home‑improvement workshops'']'
  career_goals: Acacia aims to become a certified general contractor within the next three years, leveraging her hands‑on experience to lead larger residential remodel projects and eventually launch her
    own family‑owned construction company in Mesa. She plans to earn a construction‑management certificate from a local community college and complete the Arizona Contractor’s License exam. Her ambition
    includes hiring and mentoring a diverse crew, specializing in energy‑efficient drywall systems, and establishing a reputation for delivering high‑quality finishes on schedule. By moving into project‑management
    and supervisory roles, she hopes to achieve greater financial stability for her married life while reducing the physical strain of on‑site labor.
