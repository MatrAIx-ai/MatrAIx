personas:
  professional: Terri Vigo, a veteran metal‑molding specialist with over twenty years of CNC and hydraulic casting experience, leverages meticulous safety briefings, precise dimensional control, and a competitive,
    talkative demeanor to streamline production while eyeing a supervisory leap within two years.
  sports: Terri Vigo spends weekends hiking Hocking Hills State Park, cheering the Cleveland Browns and Columbus Blue Jackets, joins a weekly cardio‑kickboxing class at the Nelsonville Community Center
    that coincides with an adult Scrabble league, and belongs to the Hocking Hills Outdoor Adventure Club for trail maintenance.
  arts: Terri Vigo curates a mystery‑thriller book club revering Agatha Christie and Gillian Flynn, showcases Ansel Adams‑inspired landscape photographs at the local church hall, and unwinds while woodworking
    to the soulful guitar riffs of John Mayer and classic rock from Bruce Springsteen.
  travel: Terri Vigo prefers meticulously planned weekend getaways that combine moderate adventure with comfort, having trekked the Blue Ridge Parkway in North Carolina and explored Charleston’s historic
    district, while dreaming of a summer road trip through the Scottish Highlands to capture loch vistas.
  culinary: Terri Vigo enjoys cooking hearty potluck fare, frequently preparing roasted beet and goat‑cheese salads, slow‑cooked pulled pork with smoky paprika rub, and fresh corn on the cob harvested from
    their backyard garden, while favoring locally sourced heirloom tomatoes and fresh herbs.
  core: Terri Vigo is a competitive, talkative metal‑casting veteran who balances a love for vintage tools, meticulous budgeting, community volunteering, and spontaneous hikes with a skeptical eye and occasional
    overcommitment to projects.
background:
  cultural: Terri was raised in the Appalachian region of southeastern Ohio, a culturally rich area where families of German, Irish, and English descent have historically valued hard work, self-reliance,
    and close-knit community ties. The local culture emphasizes modesty, practicality, and pride in manufacturing and small-scale craftsmanship. Her upbringing in Nelsonville exposed her to regional traditions
    such as county fairs, folk music gatherings, and a strong church presence, all of which reinforced a sense of responsibility to family and neighbors. These influences combine with a broader Midwestern
    white cultural background that values punctuality, reliability, and a straightforward communication style.
attributes:
  skills: '[''Pattern making'', ''Mold design'', ''Metal casting operations'', ''Hydraulic press operation'', ''CNC machine operation'', ''Quality inspection'', ''Process troubleshooting'', ''Safety compliance'',
    ''Team training'', ''Production scheduling'', ''Lean manufacturing'', ''Inventory management'']'
  hobbies: '[''Community event planning'', ''Church potluck coordination'', ''Book club participation'', ''Vintage farm equipment restoration'', ''Gardening'', ''Woodworking'', ''Hiking'', ''Landscape photography'',
    ''Adult Scrabble league'']'
  career_goals: Terri aims to advance to a supervisory role within the next two years, targeting a shift-lead or assistant plant manager position where she can shape production strategies and mentor larger
    teams. She plans to complete an associate degree in industrial technology and earn a Certified Manufacturing Engineer (CMfgE) credential to broaden her technical credibility. Long-term, she envisions
    overseeing a dedicated casting line or eventually opening a modest custom metal-fabrication shop that serves local construction and artistic markets, blending her practical expertise with entrepreneurial
    ambition while maintaining a stable, predictable work environment.
