  career_goals: Although still very young, Karen exhibits early signs of interest in orderly environments and caring roles. She enjoys watching her parents organize household items and often mimics their
    actions, suggesting a future inclination toward occupations that value structure and calm, such as a librarian, preschool teacher, or a caretaker of small animals. Her resilient and steady temperament
    points toward a career where she can work in a predictable, low‑stress setting, possibly in early childhood education, community library services, or similar fields that emphasize routine and gentle
    interaction.
