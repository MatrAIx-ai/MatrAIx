  hobbies: '[''Urban and nature photography'', ''Playing acoustic guitar (traditional and indie styles)'', ''Cooking Puerto Rican cuisine'', ''Reading contemporary art theory and modern literature'', ''Attending
    local art exhibitions and indie concerts'', ''Yoga and mindfulness meditation'', ''Volunteering at cultural festivals'', ''Writing poetry and blog posts'']'
  career_goals: Javier aims to enroll in a community-college program in graphic design or visual arts within the next year, building a professional portfolio that blends contemporary design with Puerto
    Rican cultural motifs. He hopes to secure a part-time internship at a local cultural nonprofit or design firm, gaining real-world experience while maintaining the flexibility he values. In the longer
    term, he envisions a freelance career creating branding, promotional material, and murals for community events, allowing him to work remotely and manage his own schedule. Ultimately, he would like to
    launch an online shop selling prints and digital assets that celebrate his heritage, providing both creative fulfillment and a steady income stream.
