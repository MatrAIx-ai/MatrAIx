personas:
  professional: Javier Martinez is an aspiring visual communicator who leverages self‑taught graphic design skills, bilingual fluency, and a keen eye for street art to craft culturally resonant branding
    for community nonprofits, while juggling a relaxed attitude toward deadlines that sometimes leads to last‑minute scrambles.
  sports: Javier Martinez enjoys casual pickup soccer at the local park, follows the Detroit Tigers and the Michigan State Spartans with fervor, and cycles around Lansing’s bike trails when the weather
    permits, preferring low‑pressure fitness over regimented training.
  arts: Javier Martinez immerses themselves in the local art scene, photographing murals, studying works by Banksy and Frida Kahlo, and attending intimate gigs featuring artists like Sufjan Stevens and
    Mitski, drawing inspiration for their own digital storytelling.
  travel: Javier Martinez favors budget‑friendly weekend escapades, having explored the murals of Detroit, the shoreline of Grand Rapids, and the pine‑covered routes of the Upper Peninsula, while dreaming
    of a cultural immersion trip to Havana to capture Caribbean street art.
  culinary: Javier Martinez loves cooking signature island dishes such as mofongo and arroz con gandules, often tweaking recipes with locally sourced kale and sweet potatoes, and hosts weekly potluck nights
    where the aroma of plantains and cilantro fills the living room.
  core: Javier Martinez is a curious, art‑driven 21‑year‑old who blends photography, bilingual design, and spontaneous cooking, yet wrestles with chronic disorganization and a tendency toward worry.
background:
  cultural: Javier is a second-generation Puerto Rican American whose parents immigrated to the United States in the early 2000s. Raised in a bilingual household in Olivet, Michigan, he grew up speaking
    both Spanish and English, celebrating holidays like Three Kings Day and Puerto Rico’s Festival of St. John with family traditions that blend island customs and Midwestern life. The sounds of salsa,
    bomba, and reggaeton were the soundtrack of his childhood, influencing his musical tastes and his art. He stays connected to his heritage through community events at the local Latino cultural center,
    frequent trips to visit relatives in Puerto Rico, and by infusing Puerto Rican motifs into his creative projects. This bicultural perspective shapes his identity, informing both his artistic vision
    and his desire to share cultural stories with a wider audience.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Graphic design (Canva, basic Photoshop)'', ''Digital photography'', ''Social media content creation'', ''Community event coordination'', ''Basic
