  career_goals: Miguel aims to earn his GED within the next year and enroll in a community college program in graphic design and interactive media. He envisions building a professional portfolio that blends
    illustration, motion graphics, and narrative storytelling. In the long term he aspires to work as a creative director or UX/UI designer at a forward‑thinking agency, or launch his own studio that creates
    immersive brand experiences using AR/VR. He is motivated to gain mentorship, secure internships in media production, and eventually lead a multidisciplinary team that pushes visual boundaries while
    meeting high performance standards.
