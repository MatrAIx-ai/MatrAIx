personas:
  professional: Heather Squires, a library and media collections specialist with deep expertise in MARC and Dublin Core cataloging, leverages their spontaneous flexibility to redesign workflows on the fly
    and designs community‑focused information‑literacy workshops that blend classic reference services with emerging discovery platforms.
  sports: Heather Squires, an avid hiker of the Appalachian trails, joins the Pennsylvania Hiking Club for weekend treks, follows the Philadelphia Eagles for football and the Wilkes‑Barre/Scranton Penguins
    for hockey, and supplements their solitary workouts with monthly yoga classes at a local studio.
  arts: Heather Squires immerses themselves in contemporary fiction by authors like N.K. Jemisin and Margaret Atwood, enjoys acoustic renditions of Nick Drake and John Denver on their guitar, and curates
    scrapbook pages inspired by the paintings of Georgia O’Keeffe and the indie film scores of Jóhann Jóhannsson.
  travel: Heather Squires favors low‑key, self‑guided trips to historic library cities such as Boston, Edinburgh, and the National Library of France, often planning itineraries around genealogical archives
    and scenic hikes, while budgeting carefully to fit travel between community engagements.
  culinary: Heather Squires, an enthusiastic baker, perfects blueberry crumble pie with fresh foraged berries and a flaky crust, frequently experiments with lemon‑lavender shortbread and sourdough starter,
    and shares these creations at intimate gatherings, though they sometimes over‑bake in an attempt to achieve the perfect golden top.
  core: Heather Squires blends meticulous research with spontaneous creativity, balancing a love for solitary hiking and genealogy with occasional impulsive splurges on craft supplies and baking ingredients,
    all while maintaining a calm, adaptable demeanor.
background:
  cultural: Heather grew up in a modest, middle‑class family in Luzerne County, where both parents were educators who emphasized the value of public institutions and lifelong learning. The region’s rich
    industrial heritage and strong sense of community have instilled in her a deep appreciation for preserving local history and supporting neighborly networks. While identifying as White American, she
    feels a connection to the broader cultural tapestry of Northeastern Pennsylvania, including the modest influence of nearby Pennsylvania Dutch traditions and the evolving diversity of Wilkes‑Barre. These
    experiences shape her inclusive approach to library services and her commitment to fostering cultural continuity within the community.
attributes:
  skills: '["Reference and research assistance", "Cataloging and metadata creation", "Digital archiving and preservation", "Information literacy instruction", "Curriculum‑aligned program design", "Grant
    writing and fundraising", "Community outreach and partnership building", "User experience evaluation", "Emerging technology integration", "Agile workflow redesign"]'
  hobbies: '["Reading contemporary fiction", "Hiking Appalachian trails", "Nature photography", "Genealogy research", "Scrapbooking and DIY crafts", "Playing acoustic guitar", "Baking artisanal pies", "Participating
    in a small book club", "Volunteer tutoring for after‑school programs", "Collecting vintage postcards"]'
  career_goals: Heather aims to transition from a specialist role to a leadership position where she can shape innovative, community‑focused library services. She plans to earn a Master of Library and Information
    Science to deepen her strategic management skills, then spearhead a hybrid learning hub in Wilkes‑Barre that combines traditional collections with a makerspace, digital media lab, and adult‑education
    programs. Her ambition includes securing regional grant funding to expand digital inclusion initiatives, mentoring emerging librarians, and presenting her flexible service models at professional conferences.
    Ultimately, she envisions becoming a director of community engagement, known for blending curiosity-driven programming with practical, outcomes‑focused services.
