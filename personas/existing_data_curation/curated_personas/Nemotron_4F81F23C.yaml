personas:
  professional: Kristin Johnson is an aspiring digital illustrator and novice game creator who blends hand‑drawn sketches with Procreate experiments, regularly showcases their work at the local library’s
    art workshops, and dreams of publishing a graphic‑novel series by high school.
  sports: Kristin Johnson enjoys weekend hikes on the nearby Greenridge Trail, participates in the middle‑school track club racing 800‑meter events, cheers for the local youth soccer team, the Meadowbrook
    Rangers, and they balance an active routine with a love for quiet nature walks.
  arts: Kristin Johnson devotes afternoons to drawing in sketchbooks, experimenting with digital art in Procreate, reads graphic novels by Brian K. Vaughan and Marjane Satrapi, listens to Nina Simone’s
    jazz and Kendrick Lamar’s R&B, and they find inspiration in the street art of Banksy for their own storytelling.
  travel: Kristin Johnson prefers day‑trips to state parks like Willow Canyon, dreams of exploring the ancient temples of Kyoto, plans trips with a detailed itinerary on a shared family calendar, and they
    balance the desire for adventure with the constraints of a modest allowance and school schedule.
  culinary: Kristin Johnson favors homemade veggie quesadillas, pineapple‑topped pizza, and smoothies blended with frozen berries, mango, and almond milk, enjoys experimenting with simple recipes from YouTube,
    but they often forget to clean the kitchen thoroughly after cooking.
  core: Kristin Johnson is a curious 13‑year‑old who mixes art, tech, and nature, balancing a meticulous allowance ledger with spontaneous sketch‑sessions and they have a habit of leaving crayons on the
    floor.
background:
  cultural: Kristin comes from a multigenerational African-American family that settled in the greater Harrisburg area before moving to Dillsburg, PA. Her parents, both professionals - a teacher and a nurse
    - instilled pride in her cultural roots through stories of ancestors from the South, regular attendance at a historically Black church, and celebrations of Juneteenth and Kwanzaa. While growing up in
    a largely white, rural community, she navigates a blend of Southern Black traditions and the Mid-Atlantic local culture, drawing inspiration from African-American literature, music, and community activism,
    which informs her artistic perspective and her commitment to fostering inclusivity.
