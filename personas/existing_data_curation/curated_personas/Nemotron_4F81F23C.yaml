    Activities'']'
  career_goals: Kristin aspires to attend a high-school program that emphasizes visual arts and technology, subsequently studying graphic design or animation at the collegiate level. She dreams of creating
    multimedia projects that tell stories about her community and hopes to one day lead a youth arts program that fosters creative expression and cultural pride.
