personas:
  professional: Milagros Villalobos, a seasoned community cultural liaison and volunteer instructor, channels their decades of practical cooking, bilingual translation, event coordination, and textile repair
    skills into leading senior center cooking classes, organizing local festivals, and preserving oral traditions through storytelling circles, all guided by a blend of curiosity and reliable organization.
  sports: Milagros Villalobos stays active by participating in weekly senior low‑impact aerobics, salsa and folkloric dance sessions at the community center, joining a local walking club in the spring,
    and cheering on the hometown baseball team, the Riverside Redbirds, at their summer games.
  arts: Milagros Villalobos immerses themselves in the arts through a church choir, lively salsa and folkloric dance performances, diligent knitting and crochet projects, a love for classic telenovelas
    such as 'María la del Barrio', and listening to the folk melodies of Mercedes Sosa and the vibrant compositions of Buena Vista Social Club.
  travel: Milagros Villalobos enjoys organized group tours that blend cultural exploration and relaxation, having visited the historic plazas of Santa Fe, the ruins of Tikal, and the vineyards of Napa Valley,
    while dreaming of seeing the cherry blossoms in Washington, D.C., all within the constraints of a fixed travel budget and occasional family caretaking responsibilities.
  culinary: Milagros Villalobos excels at cooking traditional dishes like chicken pepian, corn tamales, and herb‑infused salsa verde, skillfully adapting recipes to locally sourced tomatoes, chilies, and
    cilantro from their raised‑bed garden, and delights in sharing these meals during holiday feasts and community gatherings.
  core: Milagros Villalobos is a lively elder who intertwines curiosity, practicality, and community spirit into every garden, kitchen, and story circle, while occasionally over‑indulging in sugary pastries
    and juggling more commitments than their calendar can hold.
background:
  cultural: Milagros was born in a small town in the highlands of Guatemala, where she grew up immersed in a blend of Ladino and indigenous Maya traditions. Her family celebrated Catholic holidays such
    as Semana Santa and Día de los Muertos with vibrant processions, accompanied by traditional foods like tamales, pupusas, and atole. She learned Spanish as her primary language and was exposed to Kaqchikel
    phrases from relatives. In her twenties she migrated to the United States, eventually settling in Houston, where she joined a tight‑knit Guatemalan diaspora community. She maintains strong ties to her
    cultural roots through cooking, music, dance, and the transmission of oral histories to younger generations. Her identity reflects a respect for family, community solidarity, and the adaptability that
    comes from navigating life between two cultures.
attributes:
  skills: '[''Traditional Guatemalan cooking'', ''Spanish‑English community translation'', ''Sewing and textile repair'', ''Community event planning and coordination'', ''Small‑scale gardening and horticulture'',
    ''Storytelling and oral‑history preservation'', ''Basic first aid and caregiving'', ''Household financial budgeting'']'
  hobbies: '[''Cooking and sharing meals'', ''Church choir singing'', ''Salsa and folkloric dancing'', ''Gardening'', ''Storytelling circles'', ''Volunteer cultural liaison work'', ''Knitting and crochet'',
    ''Watching telenovelas'', ''Reading Guatemalan folklore'']'
  career_goals: Milagros is driven by a desire to stay actively engaged in her community and to pass on her cultural heritage. Her primary ambition is to become a regular volunteer instructor at the local
    senior center, teaching cooking classes that highlight Guatemalan cuisine. She hopes to mentor younger women from immigrant families, sharing practical life skills such as budgeting, home maintenance,
    and bilingual communication. She also aims to document and compile her family's recipes and stories into a small community cookbook, preserving them for future generations. Maintaining her own health
    and independence is a personal goal; she plans to attend weekly fitness classes for seniors and to keep her garden thriving as a source of fresh food and therapeutic activity.
