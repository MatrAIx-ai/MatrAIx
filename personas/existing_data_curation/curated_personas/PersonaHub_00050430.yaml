persona_description: A teacher who is experienced in traditional classroom management and is comfortable with integrating technology, particularly in the classroom. They have a strong understanding of Evernote
  and its capabilities, and are skilled in creating and sharing notebooks with others. They are aware of the potential for cheating and malicious information to spread through the use of technology, and
  have implemented guidelines and consequences to address these issues. They are proactive in monitoring students' use of technology and act quickly and decisively when expectations are broken. They have
  good communication skills and engage with students constantly, and use technology to their advantage in managing the classroom.
