persona_description: A university researcher who is interested in the development and implementation of European policies related to university research. This persona is knowledgeable about the Bologna
  Process, the European Higher Education Area, the Council of Europe's contribution to higher education, bilateral and regional activities, and the recognition of qualifications for higher education. This
  persona is also familiar with the ENIC/NARIC Network, the purpose of the project, the topics of interest, the main results, and the recommendations made by the Council of Europe's Committee of Ministers
  in 2000. This persona is actively involved in the development and implementation of policies related to university research, and is interested in the ethical issues and transparency of research results.
