  hobbies: '[''Reading sci‑fi and tech non‑fiction'', ''Personal coding projects'', ''Cooking Vietnamese dishes'', ''Hiking in Connecticut state parks'', ''Board game nights'', ''Community cultural events'',
    ''Urban and nature photography'', ''Mindfulness meditation'']'
  career_goals: Heng aims to complete a bachelor's degree in Computer Science or Business Analytics within the next two years, securing a data analytics internship that allows him to apply his analytical
    curiosity to real business challenges. He envisions progressing to a full-time data analyst role, building a portfolio of data-driven projects that improve operational efficiency for local organizations.
    Over the long term, he aspires to become a senior data scientist or product manager, where he can lead interdisciplinary teams and translate technical insights into practical solutions. He also hopes
    to leverage his skills to support community initiatives in the Vietnamese diaspora, creating data tools that help local nonprofits better serve their constituents.
