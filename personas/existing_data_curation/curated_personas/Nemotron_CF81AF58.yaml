  career_goals: Although retired, Tai remains driven by personal growth and community contribution. She aims to document the oral histories of longtime Seneca residents for the local historical society,
    creating a small archive of anecdotes and recipes. Tai also aspires to learn more about smartphone photography to capture community events. She hopes to mentor a few younger volunteers at the senior
    center, sharing her cooking and gardening tips, and plans to complete a short online course on genealogy to trace her family’s roots. Maintaining her health and staying socially active are central to
    her ambitions.
