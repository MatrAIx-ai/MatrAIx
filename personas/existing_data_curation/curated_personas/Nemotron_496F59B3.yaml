  hobbies: '[''Gardening'', ''Birdwatching'', ''Nature photography'', ''Knitting'', ''Quilting'', ''DIY woodworking'', ''Reading historical fiction'', ''Journaling'', ''Hiking'', ''Animal shelter volunteering'']'
  career_goals: Although retired from formal employment, Kara aims to deepen her volunteer impact. She plans to become a certified hospice volunteer, expand her role in the senior center’s outreach programs,
    and launch a neighborhood seed‑swap and gardening workshop series. She also hopes to document her knowledge in a small guidebook on Pacific Northwest native plants for beginners. Continuing her personal
    growth, Kara intends to take a community‑college course on local ecology and to travel to a few national parks to enrich her understanding of conservation.
