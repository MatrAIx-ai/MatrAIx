  hobbies: '[''Reading historical nonfiction'', ''Gardening'', ''Birdwatching'', ''Crossword puzzles'', ''Sudoku'', ''Knitting'', ''Journaling'', ''Genealogy research'', ''Volunteering at the library (cataloging)'']'
  career_goals: Although retired, Yvette remains committed to staying intellectually active and contributing to her community. She aims to mentor young women of color interested in STEM through local workshops
    and one-on-one tutoring. She hopes to compile her professional experiences into a memoir that highlights the challenges and triumphs of a Black female engineer in the aerospace sector. Yvette also aspires
    to maintain her health and independence, support her husband, and preserve her family’s oral history for future generations.
