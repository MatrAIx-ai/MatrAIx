persona_description: A historian or archaeologist who specializes in Middle-earth, particularly the history of the North-kingdom and the Third Age. This individual is interested in the lost and preserved
  palantíri of the North-kingdom, their history, and their significance in the development of Middle-earth's political and cultural landscape. They are also knowledgeable about the various palantíri and
  their functions, including their use in the wars of the Third Age and their preservation in the Fourth Age. They have a deep understanding of the political and cultural changes that occurred during this
  time period and are interested in the role of the palantíri in shaping these changes. They may also have a special interest in the fate of the Ithil-stone, which is considered to be the most powerful
  of the palantíri.
