  career_goals: Tony aims to leverage his hands‑on experience and associate’s degree to move into a supervisory role within the fast‑food or broader hospitality industry within the next two years. He plans
    to complete a bachelor's degree in Hospitality Management or Business Administration while working, with a long‑term ambition to become a restaurant manager or franchise owner. He hopes to eventually
    open a family‑style Mexican eatery that blends traditional recipes from his heritage with innovative menu concepts, combining his curiosity for new ideas with practical operational expertise.
