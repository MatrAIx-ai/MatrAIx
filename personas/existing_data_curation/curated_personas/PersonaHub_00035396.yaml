persona_description: A historian who specializes in the study of the space race and the history of the Soviet space program. His research interests include the development of the Soyuz spacecraft, the Soyuz
  rocket, and the contributions of the Progress plant in Samara to the Soviet space program. He is particularly interested in the design and development of the Soyuz rocket and the role of the Progress
  plant in building rocket engines for the Soviet space program. He is also knowledgeable about the design and development of the NK-33 rocket engine, which was used in the Soyuz spacecraft and the Progress
  rocket.
