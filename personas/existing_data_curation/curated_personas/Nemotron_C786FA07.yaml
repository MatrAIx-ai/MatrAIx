personas:
  professional: Jaida Augillard, a 42‑year‑old senior administrative professional, blends fifteen years of schedule‑management mastery, event‑planning savvy, and a calm, resilient demeanor with a curiosity
    for the arts, using her balanced blend of organization and flexibility to streamline office workflows while championing community‑focused projects and pursuing CAP certification to step into an office‑manager
    role within a cultural nonprofit, where they hope to merge administrative expertise with artistic programming.
  sports: Jaida Augillard enjoys weekend recreational volleyball at the local community center, follows the Louisville Bats baseball season and the Kentucky Wildcats basketball team, and participates in
    the Louisville Running Club’s Saturday 5K runs, balancing community‑centric activity with personal fitness, and they often invite friends to join.
  arts: Jaida Augillard immerses herself in Louisville’s cultural scene by singing in her church choir, volunteering front‑of‑house at the community theater, attending First Friday art walks, and savoring
    live jazz performances by artists like Cassandra Wilson, while drawing inspiration from the works exhibited at the Kentucky Center for African American Heritage, and they often share these experiences
    with mentees.
  travel: Jaida Augillard prefers relaxed, budget‑conscious road trips that blend cultural discovery with culinary delights, such as weekend tours of the Kentucky Bourbon Trail (visiting Woodford Reserve
    and Buffalo Trace), annual pilgrimages to New Orleans for Mardi Gras jazz, and day‑long escapes to Nashville’s music venues, all planned around family commitments, and they relish the spontaneous detours.
  culinary: Jaida Augillard, an intermediate home cook, delights in preparing soulful dishes like fried catfish with hush‑puppy corn‑meal batter, collard greens simmered with smoked turkey, sweet‑potato
    pie spiced with cinnamon, and bourbon‑infused glazes for grilled ribs, often blending traditional family recipes with experimental twists, and they love sharing these meals at community potlucks.
  core: Jaida Augillard melds meticulous organizational talent, a calm resilience, and an artistic curiosity into a community‑focused life, though they sometimes overcommit to events and indulge in spontaneous
    bourbon splurges.
background:
  cultural: Jaida is an African‑American woman who grew up in Louisville’s historic West End, a neighborhood steeped in the city’s civil‑rights legacy. Her family’s traditions are rooted in church life,
    gospel music, and communal gatherings that celebrate milestones with soul‑food cooking and storytelling. She embraces the cultural richness of the local African‑American arts scene, regularly attending
    events at the KFC Yum! Center and the Kentucky Center for African American Heritage. Jaida’s upbringing instilled a strong sense of community responsibility, prompting her involvement in neighborhood
    clean‑up projects and mentorship programs for youth. While she cherishes Southern culinary traditions and observes holidays like Juneteenth and Kwanzaa, Jaida also welcomes diverse perspectives, reflecting
    her curious and open‑minded outlook.
attributes:
  skills: '[''Office Management'', ''Microsoft Office Suite'', ''Google Workspace'', ''Calendar and Schedule Coordination'', ''Document Preparation'', ''Event Planning'', ''Customer Service'', ''Basic Bookkeeping'',
