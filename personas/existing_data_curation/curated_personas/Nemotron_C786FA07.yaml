  hobbies: '[''Art Gallery Visits'', ''Live Jazz and Gospel Music'', ''Church Choir Singing'', ''Gardening'', ''Cooking Soul Food'', ''Yoga'', ''Community Theater Volunteering'', ''Road Trips to Bourbon
    Distilleries'', ''First Friday Art Walks'', ''Reading History and Biography'']'
  career_goals: Jaida aims to transition from a senior administrative assistant to an office manager role within the next two years, leveraging her organizational strengths and her passion for the arts.
    She plans to enroll in a Certified Administrative Professional (CAP) program and pursue an associate degree in Business Administration to solidify her credentials. Long‑term, she envisions combining
    her administrative expertise with her love of culture by becoming a program coordinator for a local arts nonprofit or museum, where she can curate community events, support emerging artists, and mentor
    younger staff. She also hopes to develop a small side venture that offers curated art‑themed subscription boxes, blending her organizational skills with her creative interests.
