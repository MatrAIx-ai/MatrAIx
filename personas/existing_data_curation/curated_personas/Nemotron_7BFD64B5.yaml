  hobbies: '[''Golf (club tournaments)'', ''Chess'', ''Woodworking'', ''Fantasy football league'', ''Hiking on the Appalachian trails'', ''Volunteering for local fire department fundraisers'', ''Following
    Pittsburgh Steelers football'']'
  career_goals: Bynum aims to ascend to a Chief Financial Officer role within the next five to seven years, steering a mid‑size manufacturing or service firm through digital finance transformation. He plans
    to earn his CPA designation and complete an executive MBA to broaden his strategic acumen. He is focused on leading cost‑reduction initiatives that deliver measurable savings, implementing data‑analytics
    tools to improve decision‑making speed, and cultivating a high‑performing finance team. Additionally, he aspires to serve on the board of a local nonprofit, leveraging his financial expertise to support
    community development.
