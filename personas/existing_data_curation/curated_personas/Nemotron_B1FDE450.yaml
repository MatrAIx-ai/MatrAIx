personas:
  professional: Amy Peart, a 61-year-old retired administrator, channels their organizational acumen and sociable nature into leading the senior volunteer committee at the local library, where they mentor
    younger volunteers in event planning while laying the groundwork for a home-based jam and baked-goods venture.
  sports: Amy Peart stays active with daily morning walks through their vegetable rows, participates in the local senior softball league, they cheer on the Cleveland Browns and Ohio State Buckeyes on game
    days, and they occasionally join a low-impact yoga class offered at their church.
  arts: Amy Peart's creative spirit finds outlets in quilting circles featuring patterns inspired by the works of William Morris, listening to classic folk tunes by Joan Baez while knitting, and attending
    community theater productions such as 'Our Town' starring local actors, all of which deepen their appreciation for storytelling and handcrafted beauty.
  travel: Amy Peart enjoys weekend road-trips to nearby Ohio gems like Hocking Hills State Park, the historic town of Marietta, and the Amish country of Holmes County, preferring scenic drives and lunch
    picnics with friends, while dreaming of a future pilgrimage to Savannah's historic district to explore its preservation heritage.
  culinary: Amy Peart's kitchen is a laboratory of seasonal produce, where they perfect heirloom tomato bruschetta, roasted beet and goat cheese salads, and experimental strawberry-rhubarb jam that they
    market at the farmers market, though they sometimes forget to set the timer, resulting in an occasional charred crust.
  core: Amy Peart blends an organized, community-focused mindset with a love for gardening, quilting, and culinary experiments, turning every volunteer meeting into a chance to share home-cooked treats,
    even as they battle occasional forgetfulness and a penchant for late-night jam-stirring.
background:
  cultural: Amy is a White Midwesterner who has lived most of her life in Toledo, Ohio. Her upbringing reflects typical Midwestern values of hard work, practicality, and community involvement. Family gatherings,
    church participation, and regional celebrations such as the Toledo Art Fair and local county fairs have shaped her sense of identity. She values hospitality, modesty, and a strong sense of belonging
    to her neighborhood and extended family.
