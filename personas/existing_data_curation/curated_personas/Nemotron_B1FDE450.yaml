  hobbies: '[''Gardening'', ''Quilting'', ''Knitting'', ''Cooking'', ''Reading historical fiction'', ''Exploring Ohio history'', ''Attending community festivals'', ''Road trips'', ''Church outreach activities'']'
  career_goals: Although retired from formal employment, Amy aims to remain an active contributor to her community. She hopes to lead a senior volunteer committee at the local library, mentor younger volunteers
    in event organization, and eventually turn her love of cooking and preserving into a small home‑based business selling homemade jams and baked goods. Continuing education through local workshops and
    online courses also remains a personal ambition.
