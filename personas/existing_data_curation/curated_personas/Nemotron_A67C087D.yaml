  hobbies: '[''Fishing'', ''Birdwatching'', ''Gardening'', ''Woodworking'', ''Reading historical non-fiction'', ''Crossword puzzles'', ''Nature photography'', ''Genealogy research'', ''Small senior book
    club'', ''Model ship building'']'
  career_goals: Michael aims to stay purposeful in retirement by leveraging his reliable, curious nature. He plans to mentor younger neighbors in DIY repair skills through a local senior‑center workshop,
    expand a community garden space for shared use, complete a handcrafted wooden bench for his porch, and compile a photo‑documented guide to local bird species. These goals reflect his desire for practical
    contribution, personal fulfillment, and continued mental engagement while maintaining financial stability.
