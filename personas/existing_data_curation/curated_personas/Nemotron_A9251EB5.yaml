personas:
  professional: Joe Horne is a high‑performing customer service representative at a regional call center in Connersville, where they blend sharp interpersonal listening skills and a competitive drive to
    consistently top service metrics while improvising creative solutions to atypical client issues, and they are leveraging their knowledge of visual arts and community programming to mentor new hires
    and position themselves for a team‑lead promotion within the next two years.
  sports: Joe Horne is an active member of the Connersville Community Intramural Basketball League and a regular participant in group hikes at Hoosier National Forest, they cheer for the Indianapolis Colts
    in the fall, follow the Cleveland Guardians during baseball season, and keep a seasonal subscription to the Indiana Pacers, while occasionally attending local pickup soccer matches at the town park.
  arts: Joe Horne spends weekends wandering the Riverbank Art Gallery, attending productions of the Connersville Community Theater—most recently a rendition of 'Our Town'—and curating a vintage vinyl collection
    that includes early Beatles pressings, Arcade Fire albums, and rare indie artist LPs, all while volunteering as a docent at the local historical museum, where they share stories about regional folk
    art and the Mid‑Ohio Quilt and Folk Festival.
  travel: Joe Horne favors spontaneous weekend road trips, preferring to map out routes over coffee in their favorite local café, they have explored the craft‑beer scene of Louisville's Bourbon Trail, toured
    the museum district of Washington, D.C., and dream of attending the Venice Biennale, all while balancing a modest travel budget that limits longer overseas ventures.
  culinary: Joe Horne is a coffee aficionado who swears by cold‑brew made with a Chemex and a weekly pilgrimage to the new espresso bar on Main Street, they relish pairing locally brewed IPAs with a homemade
    pork tenderloin sandwich topped with caramelized onions, and they often spend evenings perfecting avocado toast and a spinach‑feta quiche for brunch gatherings.
  core: Joe Horne is a socially magnetic, art‑obsessed call‑center star whose competitive streak and laid‑back planning coexist with a penchant for vintage vinyl, occasional late‑fee blips, and a love of
    spontaneous hikes.
background:
  cultural: Joe grew up in Connersville, Indiana, a small Midwestern town with deep roots in manufacturing and farming. His family has lived in the region for several generations, embodying the values of
    hard work, friendliness, and community involvement typical of the local white population. Raised in a modest household with regular church attendance, he was exposed to community events such as county
    fairs, high‑school sports games, and neighborhood block parties. This upbringing fostered a strong sense of local identity, an appreciation for Midwest hospitality, and a practical, down‑to‑earth worldview,
    while his curiosity has driven him to seek broader cultural experiences beyond his hometown.
