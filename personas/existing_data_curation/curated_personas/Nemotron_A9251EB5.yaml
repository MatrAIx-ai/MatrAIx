  career_goals: Joe aims to advance to a team lead or supervisory position within the next two to three years, using his top‑performer metrics to qualify for internal promotion. He plans to earn a Certified
    Customer Service Professional (CCSP) credential and develop expertise in customer experience design. In the longer term, he hopes to transition into a role that merges his passion for art and community
    engagement, such as managing the front‑desk of a local museum or directing outreach programs for cultural events. He also envisions starting a side venture offering art‑themed workshops for families
    in the Connersville area, leveraging his knowledge of visual arts and his networking skills.
