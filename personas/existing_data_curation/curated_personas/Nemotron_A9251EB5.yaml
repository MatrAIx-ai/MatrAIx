  hobbies: '[''Visiting Art Galleries'', ''Community Theater'', ''Intramural Basketball'', ''Hiking'', ''Exploring Coffee Shops'', ''Listening to Indie & Classic Rock'', ''Collecting Vintage Vinyl'', ''Reading
