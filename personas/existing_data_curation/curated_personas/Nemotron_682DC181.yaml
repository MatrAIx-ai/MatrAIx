personas:
  professional: Michelle Rich, a 6‑year‑old who loves organizing playdates and caring for the family’s dog, imagines themselves as a future kindergarten teacher who blends predictable classroom routines
    with spontaneous storytelling, showing their budding leadership and compassionate nature.
  sports: Michelle Rich loves playing tag at the neighborhood park and they ride a pink bike with the Sunnyvale Kids’ Cycling Club, cheer for the Chicago Cubs during family baseball outings, and practice
    soccer with the Maple Grove Tots Soccer Club, combining energetic playground games with a budding fanhood for local professional teams.
  arts: Michelle Rich delights in drawing vibrant scenes inspired by Pixar’s Toy Story, dancing to Disney classics like 'Let It Go' from Frozen, and they sing along with Raffi’s children’s songs while admiring
    the puppetry of The Muppets, letting their creative spirit shine during playtime.
  travel: Michelle Rich loves family road trips to places like Grandma’s farm in upstate New York and the sunny beaches of Florida, and they dream of exploring Disneyland in California, plan trips by choosing
    colorful stickers for their travel journal, and enthusiastically balance adventure with the occasional cranky moment during long car rides.
  culinary: Michelle Rich enjoys cheesy macaroni, crispy chicken nuggets, and strawberry‑banana smoothies, proudly spreads peanut butter on toast, helps whisk pancake batter with a wooden spoon, and delights
    in the bright colors of watermelon cubes, though they sometimes sneak extra chocolate chips into their cookies.
  core: Michelle Rich, a lively 6‑year‑old, balances a love for predictable routines with bursts of spontaneous play, cares deeply for friends and pets, and, despite an occasional candy‑driven distraction,
    they approach life with boundless curiosity.
background:
  cultural: 'Michelle is a white child raised in Pickerington, Ohio, a suburban community in Licking County. Her family reflects typical Midwestern American values: close‑knit family ties, participation
    in community events such as the county fair, and observance of holidays like Thanksgiving, Christmas, and Halloween. She attends a local public elementary school where school spirit, sports, and volunteer
    projects are emphasized. The cultural environment promotes friendliness, politeness, teamwork, and a modest, cooperative spirit, which align with her compassionate and sociable personality.'
