  career_goals: Even at her age, Michelle dreams of growing up to help others. She often says she wants to become a teacher because she enjoys helping classmates learn, or a veterinarian so she can care
    for animals. She also imagines being a community helper such as a firefighter or a park guide, roles that let her bring people together, keep things safe, and make a positive difference. Her aspirations
    blend a desire for structured, caring professions with space for creativity and play.
