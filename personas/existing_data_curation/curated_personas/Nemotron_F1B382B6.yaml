  career_goals: Jimmy wants a career that offers clear structure, practical problem solving, and community service. He is interested in becoming a civil engineer or a skilled tradesperson such as an electrician
    or mechanic, and he also considers joining the U.S. Navy or the local fire department after high school. He aims to attend a technical high school with an engineering focus and eventually earn a degree
    in civil or mechanical engineering.
