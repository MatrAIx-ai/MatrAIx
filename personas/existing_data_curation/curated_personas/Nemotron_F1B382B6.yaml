personas:
  professional: Jimmy Mason is a diligent middle‑school robotics club member whose methodical, routine‑oriented mindset drives him to meticulously plan and execute automated projects while maintaining his
    varsity baseball commitments, making him the go‑to organizer for timed builds and code reviews.
  sports: Jimmy Mason is a varsity baseball player for Billerica Middle School who cheers for the Boston Red Sox and Boston Celtics, participates in the Billerica Youth Baseball league, and spends weekends
    hiking in the Middlesex Fells, balancing team drills with individual conditioning.
  arts: Jimmy Mason is a budding creative who builds model airplanes while listening to classic rock legends like The Beatles and contemporary pop artists such as Billie Eilish, attends community theater
    productions of "Peter Pan" at the local high school, and draws inspiration from the engineering sketches of Leonardo da Vinci.
  travel: Jimmy Mason is an adventure‑balanced teen who enjoys meticulously planned family road trips to view New England’s autumn foliage in Vermont, has visited Boston’s Museum of Science, dreams of exploring
    the historic streets of Washington, D.C., and hopes to someday trek through the national parks of the West, all while staying within a modest family budget.
  culinary: Jimmy Mason is a novice cook who frequently prepares mac and cheese with sharp cheddar, spaghetti Bolognese using ground beef and tomatoes, and fluffy pancakes drizzled with maple syrup, favoring
    ingredients like potatoes, carrots, fresh apples, and cinnamon to add comfort to their meals.
  core: Jimmy Mason is a methodical teen who fuses a love for engineering and baseball, follows routines religiously, and quietly juggles a penchant for organized planning with occasional impulsive video‑game
    splurges.
background:
  cultural: Jimmy is a white American from a working-middle-class family in North Billerica, Massachusetts. His family has deep New England roots, reflecting the region's emphasis on hard work, community
    involvement, and practical values. He grew up attending a public middle school, participating in local youth programs, and celebrating typical American holidays. His cultural environment includes exposure
    to traditional New England customs and modest suburban life, with occasional attendance at a local Protestant church.
attributes:
  skills: '["Time management", "Organizational planning", "Mathematics (algebra)", "Science (physics basics)", "Basic Python programming", "Model building", "Basic carpentry", "Team collaboration"]'
