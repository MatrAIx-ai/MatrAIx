  hobbies: '[''Skateboarding'', ''Pick-up basketball'', ''Live music concerts'', ''DJing'', ''Video editing'', ''Exploring tech gadgets'', ''Hiking'', ''Volunteer community clean-ups'', ''Gaming'']'
  career_goals: Robert aims to complete his associate degree in digital media and secure an internship at a creative agency or production studio in Los Angeles. He envisions building a career as a social
    media strategist or content producer, leveraging his technical skills and outgoing personality. In the longer term, he hopes to launch a community‑focused event‑planning boutique that brings local youth
    together for cultural and recreational activities, while also growing a personal brand on platforms like TikTok and YouTube to showcase storytelling and DIY projects. He values flexible work environments
    that allow creative freedom and the ability to explore varied interests.
