  career_goals: Toni aims to earn a certified housekeeping credential within the next year and step into a lead or supervisory role at her current employer, where she can mentor newer staff and shape cleaning
    standards. In the longer term, she envisions launching her own small cleaning business that emphasizes sustainable practices and community outreach, perhaps offering discounted services to local seniors
    or nonprofit organizations. She also plans to complete her associate degree in hospitality management, which will equip her with the business skills needed to grow her venture and explore opportunities
    in hotel or resort management.
