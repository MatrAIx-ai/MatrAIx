personas:
  professional: Corrine Collins, a senior audit specialist in a Miami‑based firm, blends rigorous GAAP and IFRS expertise with advanced data‑analytics tools like Power BI and Python automation, leveraging
    their curious, detail‑oriented nature to uncover hidden risks while fostering a quiet, supportive mentorship environment for emerging women of color.
  sports: Corrine Collins enjoys solitary early‑morning runs along the Miami Beach boardwalk and occasional kayaking trips with the Everglades Paddle Club, roots for the Miami Heat during the NBA season,
    and incorporates gentle yoga sessions three times weekly to counterbalance desk‑bound audit work.
  arts: Corrine Collins curates a personal collection of contemporary mural photography inspired by the works of Keith Haring and local Miami street artists, regularly attends intimate jazz shows featuring
    performances by Gregory Porter and Jacob Collier, and finds literary respite in novels by Chimamanda Adichie and Haruki Murakami, weaving these artistic threads into her creative downtime.
  travel: Corrine Collins prefers low‑key, self‑guided travel itineraries that blend cultural immersion with natural solitude, having explored the historic districts of New Orleans and the Caribbean islands
    of Puerto Rico, while a forthcoming solo trip to Iceland’s geothermal springs tops their bucket list, all planned within a modest budget that leaves room for art gallery visits.
  culinary: Corrine Collins enjoys cooking Caribbean‑infused meals such as jerk‑spiced shrimp over coconut‑lime quinoa, pairing fresh key‑lime crème brûlée with seasonal Florida mangoes, and relishes the
    creative process of blending bold spices—scotch bonnet, allspice, and cilantro—with locally sourced seafood, all while maintaining a modestly organized kitchen that doubles as a canvas for culinary
    art.
  core: Corrine Collins blends analytical precision with artistic curiosity, thriving in quiet, data‑driven audits while nurturing a solitary love for street art, soulful jazz, and sustainable cooking.
background:
  cultural: Corrine is an African-American woman with deep roots in the vibrant Black community of Miami Gardens. Her family’s heritage includes Caribbean ties—her grandparents immigrated from Jamaica—infusing
    her upbringing with a blend of African-Diaspora traditions, reggae, and soul music. Growing up in a multilingual neighborhood, she became fluent in Spanish as well as English, which enhances her cultural
    fluency in South Florida. She celebrates Juneteenth, Caribbean Carnival, and local church gatherings, and her culinary tastes reflect a love for jerk seasoning, plantains, and seafood. This multicultural
    background informs her worldview, fostering a strong sense of community responsibility, an appreciation for artistic expression, and a commitment to uplifting other Black professionals in finance.
attributes:
  skills: '[''Financial reporting (GAAP/IFRS)'', ''External and internal auditing'', ''SOX compliance'', ''Risk assessment and internal controls'', ''Forensic accounting and fraud detection'', ''Advanced
    Excel and Power Query'', ''Data visualization (Power BI, Tableau)'', ''Automation with VBA and Python'', ''Regulatory reporting and tax preparation'', ''Ethical standards and confidentiality'', ''Written
    communication and report writing'', ''Project management basics'', ''Bilingual Spanish-English proficiency'']'
  hobbies: '[''Photography (urban and street art)'', ''Visiting art galleries and museums'', ''Reading contemporary fiction, science and philosophy'', ''Yoga and meditation'', ''Cooking Caribbean-inspired
    meals'', ''Solo nature walks in the Everglades'', ''Learning and tinkering with Python'', ''Listening to jazz and soul music'', ''Teaching financial literacy to teens (volunteer)'']'
  career_goals: Corrine aims to attain CPA certification within the next year and subsequently pursue the Certified Internal Auditor (CIA) credential. Her short-term goal is to advance to a senior auditor
    role where she can lead complex audit engagements and mentor junior staff, particularly women of color entering the profession. In the medium term, she envisions moving into audit manager or director
    positions, championing the adoption of data-driven audit methodologies and AI-assisted risk analysis within her firm. Ultimately, Corrine aspires to a chief financial officer or chief audit executive
    role, where she can integrate her passion for sustainability reporting and cultural asset valuation, aligning financial stewardship with the artistic and community initiatives she values. Throughout
    her career, she seeks to maintain a balanced schedule that preserves her preference for quiet, focused work environments.
