  career_goals: Myrta aims to attend a specialized art high school where she can deepen her skills in illustration and visual storytelling. She dreams of earning a degree in fine arts or interactive media,
    with the long‑term ambition to become a concept artist for video games or animated films, or to publish speculative fiction that weaves Mexican cultural motifs into futuristic worlds. She also hopes
    to mentor younger students in her community, sharing both artistic techniques and her love for bilingual storytelling.
