personas:
  professional: Myrta Martinez, an aspiring digital illustrator and watercolor enthusiast, blends vivid imagination and meticulous organization to craft sci‑fi‑fantasy artwork on her tablet while juggling
    school assignments and occasional freelance commissions for friends, channeling their curiosity into constantly experimenting with layered textures and narrative visuals.
  sports: Myrta Martinez, a devoted follower of the Los Angeles Dodgers, Lakers, and LA Galaxy, spends weekends hiking the San Gabriel Mountains with the Arcadia Trail Explorers club, joins the middle school
    soccer team for after‑school practice, and occasionally practices folklorico dance cardio drills to stay fit, balancing a love for outdoor adventure with a modest interest in organized team sports.
  arts: Myrta Martinez’s artistic soul is fueled by watercolor masters like Georgia O’Keeffe, digital pioneers such as Loish, and storytelling legends Hayao Miyazaki and Neil Gaiman, prompting them to sketch
    daily in a leather‑bound journal, compose short sci‑fi tales inspired by Brandon Sanderson, and earn pocket money selling prints of fan art to school friends.
  travel: Myrta Martinez prefers low‑key, nature‑focused weekend getaways, carefully mapping out hikes in the Channel Islands and tide‑pool explorations at Catalina, while dreaming of a spring trip to Kyoto’s
    bamboo groves and a summer visit to the Smithsonian in Washington, D.C., balancing budget constraints with a craving for cultural immersion.
  culinary: Myrta Martinez, a budding home chef, expertly rolls masa for tamales and grills elote with cotija cheese during family holidays, while also experimenting with sushi rolls using avocado and cucumber,
    showcasing confidence in mixing traditional corn‑based flavors with contemporary Japanese techniques, though they often over‑season their dishes with extra chili powder.
  core: Myrta Martinez is a quiet, imaginative teen who hoards every stray paintbrush, stays up sketching under a lamp, and can lose hours in tide‑pool journals, yet always remembers to water their cactus
    before bed.
background:
  cultural: Myrta is a Mexican‑American raised in a close‑knit, bilingual household where Spanish and English flow interchangeably. Her family celebrates Día de los Muertos, Mexican Independence Day, and
    other cultural festivals with music, traditional foods, and storytelling. She contributes to family gatherings by helping with cooking and sharing stories of Mexican folklore. Growing up in Arcadia,
    FL, she balances her Mexican heritage with exposure to the diverse Hispanic community in South Florida, fostering a strong sense of cultural pride while embracing the broader American culture.
