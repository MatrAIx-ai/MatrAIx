persona_description: A taxonomist or evolutionary biologist who specializes in the study of plant and fungal classification and evolutionary relationships. They are interested in understanding the branching
  patterns and evolutionary history of plant and fungal lineages, and how these patterns and histories are reflected in cladistic analysis. They may also be interested in the classification of plant and
  fungal diseases and the role of fungi in ecosystem processes. They may have a background in biology or botany and may have expertise in using cladistic analysis to infer the evolutionary relationships
  between plant and fungal lineages.
