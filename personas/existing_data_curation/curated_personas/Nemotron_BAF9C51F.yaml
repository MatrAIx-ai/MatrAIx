  hobbies: '["Adult basketball league", "Community volunteering (Habitat for Humanity)", "DIY metal art projects", "Woodworking", "Fishing at local reservoirs", "Hiking in East Bay trails", "Classic rock
    concerts", "Home brewing", "Meditation and yoga", "Barbecue gatherings with friends"]'
  career_goals: Ali aims to move into a supervisory role within the next three years, earning a Certified Welding Inspector (CWI) credential and expanding his knowledge of CNC programming. He wants to mentor
    apprentices, improve his budgeting and project‑management capabilities, and eventually launch a small custom metal‑fabrication shop that serves local artists, small businesses, and community projects.
    Balancing his practical mindset with his curiosity, he also seeks a more predictable schedule to reduce stress and provide greater stability for his family.
