persona_description: A scientist or conservationist who is interested in the study of invasive species, particularly those that affect the ecology and biodiversity of coastal and sub-arctic ecosystems.
  They are interested in understanding the distribution, abundance, and persistence of Carex maritima, a native plant that has become invasive in many areas due to human activities such as land use change,
  climate change, and the spread of plants by mechanical means. They are also interested in the potential threats to this species, including coastal erosion, sea-level rise, and development in coastal areas.
  They are dedicated to continued detailed recording and research to better understand the long-term fate of this species and its impact on the environment.
