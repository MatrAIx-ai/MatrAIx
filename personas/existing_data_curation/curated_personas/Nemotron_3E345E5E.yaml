  hobbies: '[''Watercolor painting'', ''Visiting modern art galleries'', ''Community theater participation'', ''Coding mentorship for teens'', ''Hiking in Connecticut'', ''Cycling'', ''Hosting fusion cuisine
    dinner parties'', ''Yoga'', ''Reading contemporary fiction'', ''Pollinator-friendly gardening'']'
  career_goals: Dana aims to transition into a technical leadership role, such as Lead Architect or Engineering Manager, where she can shape product strategy and foster a collaborative, inclusive team culture.
    She is passionate about integrating artistic creativity into technology, envisioning interactive digital installations that blend code with visual art. Dana also aspires to mentor the next generation
    of developers, especially women and underrepresented groups, by organizing community hackathons and coding workshops in Fairfield County. Long‑term, she hopes to champion sustainable software practices
    and lead initiatives that align tech development with social and environmental responsibility.
