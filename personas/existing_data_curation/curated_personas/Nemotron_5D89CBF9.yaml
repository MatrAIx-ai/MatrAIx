  hobbies: '["walking club", "volunteering at local church", "gardening", "DIY woodworking", "classic car restoration", "attending Winston‑Salem Dash baseball games", "board games", "reading self‑help books",
    "fishing"]'
  career_goals: At 64, Daniel aims to transition into a supervisory or mentorship role that allows him to share his extensive knowledge with younger staff while maintaining a predictable routine. He aspires
    to become a lead facilities coordinator for a community organization or local school, where he can influence cleaning standards, safety protocols, and staff development. Additionally, he dreams of starting
    a small, part‑time cleaning consultancy serving churches and senior centers in Winston‑Salem, providing stable income and the flexibility he needs to manage his anxiety.
