personas:
  professional: Daniel Gonzalez, a seasoned facilities maintenance specialist with three decades of commercial cleaning expertise, leverages their meticulous attention to safety compliance and natural knack
    for conflict resolution to lead crews with predictable routines, while their sociable nature lifts morale even as anxiety spikes during unexpected schedule changes.
  sports: Daniel Gonzalez stays active by walking three times weekly with the Winston‑Salem Walking Club, cheering on the Winston‑Salem Dash during baseball season and supporting the Carolina Panthers,
    while occasionally joining a senior softball league, using routine movement to channel anxiety into constructive fitness.
  arts: Daniel Gonzalez frequently visits the Winston‑Salem Arts Council gallery, enjoys folk and classic rock from Bob Dylan and The Eagles, and finds solace in woodworking as a creative outlet, while
    also attending occasional community theatre productions featuring classic films by John Wayne.
  travel: Daniel Gonzalez prefers meticulously planned road trips to scenic spots like Asheville’s Blue Ridge Parkway and the historic town of Savannah, balancing his love for relaxed exploration with an
    anxiety‑driven need for detailed itineraries, while financial prudence keeps long‑haul international travel on the back burner.
  culinary: Daniel Gonzalez, an adept home cook, often prepares Southern comfort meals such as fried chicken with rosemary‑infused mashed potatoes, collard greens seasoned with smoked ham hocks, and garden‑fresh
    tomato salsa, while savoring occasional BBQ outings for brisket and ribs.
  core: Daniel Gonzalez is a meticulous yet anxiety‑prone 64‑year‑old facilities veteran who blends hands‑on craftsmanship with community spirit, but often over‑schedules his day and forgets to pause for
    self‑care.
background:
  cultural: Daniel grew up in a working‑class family in the American South, with roots that blend traditional Anglo‑American values and a touch of Hispanic heritage reflected in his surname. He was raised
    in a close‑knit community where church involvement, hospitality, and a strong work ethic were emphasized. These cultural influences shaped his commitment to reliability, community service, and fostering
    relationships, while his Southern upbringing also instilled a love for local traditions such as outdoor activities and regional sports.
attributes:
  skills: '["commercial cleaning", "floor care and polishing", "equipment maintenance", "hazardous material handling", "basic plumbing repairs", "basic electrical troubleshooting", "inventory management",
