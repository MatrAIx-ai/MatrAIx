  hobbies: '[''Reading historical fiction'', ''Reading business non-fiction'', ''Journaling'', ''Gardening'', ''Hiking'', ''Knitting'', ''Crocheting'', ''Crossword puzzles'', ''Sudoku'', ''Baking'']'
  career_goals: Heather aims to transition from front‑line cashier duties to a role that blends her business knowledge with her love for orderly environments, such as inventory control specialist or store
    operations analyst. Over the next few years she hopes to complete a bookkeeping certification and eventually move into a supervisory position that allows her to design efficient processes and train
    new staff, while maintaining a schedule that preserves her need for quiet evenings at home. She is also open to exploring e‑commerce, possibly launching a modest online shop for handcrafted items as
    a side venture.
