personas:
  professional: Heather Signorino is a retail cashier with strong customer service, point‑of‑sale, and Excel data skills, and they leverage their calm, cooperative nature and practical curiosity to streamline
    transactions, defuse tense situations, and maintain a flexible schedule that accommodates their love of quiet evenings.
  sports: Heather Signorino enjoys early morning walks and weekend hikes at William B. Umstead State Park, follows the Carolina Panthers and the NC State Wolfpack basketball team, and they participate in
    a local walking club that meets twice weekly, using these low‑impact activities to maintain a calm, steady fitness routine.
  arts: Heather Signorino finds creative solace in knitting while listening to Gillian Welch, devouring historical fiction by Ken Follett and business insights from Simon Sinek, and they attend Raleigh
    Little Theatre productions featuring Viola Davis, which together shape a quiet yet rich artistic life.
  travel: Heather Signorino prefers low‑key solo getaways that blend historic charm and natural serenity, having explored Asheville’s Blue Ridge trails and Charleston’s cobblestone streets, while they dream
    of a quiet week in Edinburgh’s medieval Old Town and a spring visit to Kyoto’s cherry‑blossom gardens.
  culinary: Heather Signorino loves baking buttery croissants and peach cobbler, seasoning garden‑fresh collard greens with smoked paprika and apple cider vinegar, and they have an intermediate cooking
    skill that lets them confidently experiment with a sourdough starter and locally sourced sweet tea.
  core: Heather Signorino navigates life with pragmatic curiosity, a love for quiet routines, an occasional urge to procrastinate on paperwork, and they have a midnight habit of solving crossword puzzles
    while the house smells of freshly baked pastries.
background:
  cultural: Heather grew up in the suburban outskirts of Raleigh, North Carolina, within a middle‑class white family that emphasized community values and Southern hospitality. She attended North Carolina
    State University, earning a bachelor's degree in business. Her upbringing combined traditional Southern cultural elements—such as a love for local foods, outdoor recreation, and church involvement—with
    a modern, pragmatic outlook shaped by her education and professional experience. This blend informs her appreciation for both established customs and innovative ideas.
