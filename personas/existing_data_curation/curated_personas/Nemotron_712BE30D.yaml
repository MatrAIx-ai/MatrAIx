personas:
  professional: Angelo Curtis leverages decades of business strategy and financial planning expertise to mentor emerging entrepreneurs, curate community art exhibitions, and lead dynamic workshops, and
    they navigate their spontaneous, competitive streak and occasional difficulty meeting deadlines.
  sports: Angelo Curtis is an avid supporter of the Chattanooga Lookouts baseball team and follows the Memphis Grizzlies in the NBA, while they regularly play bridge at the senior center and maintain daily
    walks through their garden to keep active.
  arts: Angelo Curtis frequents Chattanooga’s art galleries to admire works by Georgia O'Keeffe and local painters, attends live performances by jazz legends like John Coltrane and Ella Fitzgerald through
    recordings, participates in community theater productions, captures everyday moments with their vintage Leica camera, constantly weaving storytelling into their artistic pursuits, and they often share
    these photos at community gatherings.
  travel: Angelo Curtis enjoys organized trips to historic cultural landmarks such as Boston’s Freedom Trail, the National Museum of American History in Washington, D.C., the lively music scene of New Orleans,
    and the historic district of Charleston, while they dream of future pilgrimages to the East Village’s historic neighborhoods in New York City and the antebellum estates of Natchez.
  culinary: Angelo Curtis loves cooking and savoring traditional Southern dishes, especially shrimp and grits, collard greens seasoned with smoked ham hocks, fried chicken with a crisp crust, and sweet
    potato pie, and they often add fresh herbs from their garden like thyme and rosemary.
  core: Angelo Curtis is a curious, socially vibrant septuagenarian whose competitive drive fuels community mentorship, yet they frequently find their spontaneous nature and emotional intensity clashing
    with the need for structure and calm.
background:
  cultural: Angelo is an African‑American man whose life has been shaped by the rich cultural tapestry of the Southern United States. He grew up immersed in the traditions of Black church life, community
    solidarity, and the enduring legacy of the civil rights movement, all of which fostered a deep sense of purpose and resilience. Family gatherings centered around soul food, gospel music, and oral histories
    reinforced his appreciation for heritage, while his adult years in Chattanooga exposed him to a vibrant mix of Black artistic expression, from blues festivals to visual arts collectives. This background
    informs his values of communal uplift, storytelling, and a continual quest to celebrate and preserve Black cultural contributions within a modern, inclusive context.
attributes:
  skills: '["Business strategy", "Financial planning", "Entrepreneurship", "Public speaking", "Community outreach", "Event coordination", "Art curation", "Mentorship", "Conflict resolution", "Negotiation"]'
  hobbies: '["Visiting art galleries", "Attending live music performances", "Reading biographies and history", "Community theater participation", "Gardening", "Cooking traditional dishes", "Traveling to
    historical sites", "Storytelling", "Bridge", "Photography"]'
  career_goals: Angelo aims to stay actively engaged in his community by volunteering as a mentor for emerging entrepreneurs and facilitating financial‑literacy workshops at local community centers. He
    aspires to collaborate with Chattanooga's art institutions to launch intergenerational art projects that blend business insights with creative expression. Serving on the board of a nonprofit focused
    on economic empowerment for underserved populations is a key ambition, as is authoring a memoir that interweaves his business journey with reflections on Black cultural heritage. He also seeks to continue
    formal learning through courses in art history and digital storytelling, while traveling to historic African‑American sites across the United States.
