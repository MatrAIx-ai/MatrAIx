personas:
  professional: A budding LEGO architect, Carrie Mcdonald, channels their curiosity and love for organization into building intricate block structures while staying flexible enough to improvise new designs
    inspired by storybooks and classroom projects.
  sports: A lively sideline cheerleader and budding soccer player, Carrie Mcdonald, thrills on the Tiny Tigers soccer club's Saturday practices, enjoys watching the New York Yankees on weekends, and values
    the balance of organized drills with spontaneous games in the backyard, where their energy keeps the whole family entertained.
  arts: An enthusiastic young artist, Carrie Mcdonald, delights in drawing fairy‑tale scenes, sings along to Raffi's 'Baby Beluga', and watches Pixar movies starring characters like Buzz Lightyear and Elsa,
    which fuel their imagination and encourage cooperative play.
  travel: A curious family traveler, Carrie Mcdonald, has explored Disneyland in California, marveled at the Grand Canyon's sunrise, and dreams of visiting the Great Wall of China, preferring short, interactive
    trips where they can collect stickers from each destination's visitor center.
  culinary: A picky‑but‑adventurous eater, Carrie Mcdonald, favors mac and cheese with a sprinkle of cheddar, peanut butter and jelly sandwiches, and enjoys stirring banana pancake batter with blueberries,
    proudly presenting their creations to family members.
  core: Carrie Mcdonald is a curious five‑year‑old who never leaves a crayon unused, can recite the alphabet backwards, and insists on sticking a sticker on every book they borrow, balancing boundless energy
    with a gentle, cooperative spirit.
background:
  cultural: Carrie grows up in a Midwestern American family in Loveland, Ohio, where community values, friendliness, and participation in local events such as library storytimes, park festivals, and school
    activities are prominent. Her family's cultural influences include traditional American holidays, a love for outdoor recreation, and an emphasis on kindness and cooperation, which are reflected in her
    open, sociable, and harmonious personality.
