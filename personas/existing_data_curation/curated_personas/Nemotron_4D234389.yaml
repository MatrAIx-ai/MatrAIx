  hobbies: '["Cooking Southern cuisine","Playing basketball","Volunteering at local church","Listening to jazz and blues","Gardening","Reading non‑fiction biographies","Traveling to historic African‑American
    sites"]'
  career_goals: Tyrez aims to become one of Jacksonville's top‑producing brokers and eventually launch his own boutique brokerage that emphasizes personalized service and community investment. He plans
    to earn advanced designations such as Certified Residential Specialist (CRS) and CCIM to deepen his expertise. Mentoring emerging agents and fostering a collaborative office culture are important to
    him, as is developing affordable‑housing initiatives that benefit the city's historically Black neighborhoods. His ambition balances innovative approaches with proven real‑estate practices, reflecting
    his curiosity and practicality.
