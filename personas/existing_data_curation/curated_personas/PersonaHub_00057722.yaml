persona_description: A genetic researcher who specializes in the study of depression and its subtypes, focusing on the role of serotonin transporter gene polymorphisms in the development of depression.
  They are particularly interested in the interaction between genetics and environment in the etiology of depression and the potential for gender-specific mechanisms underlying the effect of serotonin transporter
  gene variation on depression. They are also interested in the effects of other neurotransmitters and hormones on depression and the potential for a variety of different systems to be affected by depression.
