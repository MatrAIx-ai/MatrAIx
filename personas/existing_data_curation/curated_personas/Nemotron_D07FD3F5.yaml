  skills: '[''MIG welding'', ''TIG welding'', ''Stick welding'', ''Brazing'', ''Soldering'', ''Blueprint reading'', ''Metal fabrication'', ''Pipe welding'', ''Welding inspection'', ''OSHA safety compliance'',
    ''Equipment maintenance'', ''Technical problem solving'', ''Mentoring apprentices'']'
  hobbies: '[''Fishing on the Ohio River'', ''Weekend camping in Wayne National Forest'', ''Woodworking'', ''Restoring classic cars'', ''Volunteering at the local historical society'', ''Attending regional
    welding competitions'', ''Reading technical manuals'', ''DIY home‑improvement projects'']'
  career_goals: James aims to earn his AWS Certified Welding Engineer certification within the next two years and transition into a lead welder supervisor role at a regional manufacturing plant. He aspires
    to mentor junior welders, develop a safety training program for his workplace, and eventually open a small custom metalwork shop that serves local contractors and hobbyists. Long‑term, he hopes to combine
    his practical experience with additional coursework in mechanical technology to move into a project manager position overseeing fabrication projects.
