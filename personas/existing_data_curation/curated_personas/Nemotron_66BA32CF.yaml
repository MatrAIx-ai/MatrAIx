  career_goals: Martha aims to transition into a product leadership role where she can shape technology solutions that improve community well‑being. She envisions leading interdisciplinary teams to create
    user‑centric applications in health or education tech, integrating her design eye with data‑driven decision‑making. Over the next five years, she plans to launch a mentorship program for women in tech
    within the Midland region, contribute to open‑source projects that blend AI and creative media, and eventually assume a senior director position that balances strategic innovation with social impact.
