    regulatory compliance'']'
  hobbies: '[''Nature photography'', ''Attending local art festivals'', ''Community mural painting'', ''Playing soccer'', ''Hiking in desert parks'', ''Cooking Mexican cuisine'', ''Volunteering at community
    garden'', ''Listening to Latin music'', ''Playing guitar'', ''Exploring sustainable gardening techniques'']'
  career_goals: Carlos aims to advance from a skilled groundskeeper to a certified landscape designer and eventually launch his own eco‑friendly landscaping business that emphasizes native desert plants
    and artistic installations. He plans to complete an Associate’s degree in horticulture, earn a professional certification (e.g., Master Gardener or LEED Green Associate), and develop a portfolio of
    community projects such as public garden restorations and school‑yard green spaces. Long‑term, he hopes to mentor younger workers, expand his firm to offer integrated outdoor art services, and become
    a recognized voice in sustainable desert landscaping within Southern California.
