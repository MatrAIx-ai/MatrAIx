personas:
  professional: Kerland Mcdowell, a seasoned project management specialist, blends strategic Agile facilitation, risk assessment, and data visualization expertise with a vivid imagination, using design
    thinking and visual storytelling to translate abstract concepts into concrete deliverables, while they maintain a relaxed attitude toward strict schedules and a competitive drive that pushes them to
    champion innovative, flexible methodologies in pursuit of a future PMO Director role.
  sports: Kerland Mcdowell, an avid weekend basketball player, joins a local pickup league at Fort Wayne's Riverside Park while cheering on the Indiana Pacers during the NBA season and supporting the Fort
    Wayne Mastodons in college hoops, balances their competitive drive with occasional yoga sessions at a community studio to stay limber, and they consider each game an opportunity to test strategic thinking
    honed through board games.
  arts: Kerland Mcdowell, an abstract painter who finds inspiration in the bold colors of Mark Rothko and the improvisational rhythms of Herbie Hancock, regularly exhibits photographs at the Fort Wayne
    Museum of Art alongside works by local visual artist Hannah Brown, unwinds with strategic board game nights that echo the depth of chess and Settlers of Catan, and they channel this creative energy
    into occasional jazz piano sessions that blend visual and auditory storytelling.
  travel: Kerland Mcdowell, a curious traveler who prefers loosely planned road trips over rigid itineraries, has explored the art districts of Chicago, the jazz scene of New Orleans, and the historic streets
    of Savannah, while dreaming of a cultural immersion in Kyoto and a wilderness adventure in Iceland, and they often blend budget airline flights with boutique hotel stays to balance cost and comfort.
  culinary: Kerland Mcdowell, an intermediate home chef, delights in cooking braised collard greens with smoked turkey, spiced sweet‑potato gnocchi tossed in sage butter, and perfectly seared salmon topped
    with a miso‑glaze, often sourcing heirloom tomatoes, fresh herbs, and artisanal spices from local farmers' markets, and they treat each dish as a canvas for experimenting with heritage‑inspired flavors.
  core: Kerland Mcdowell, a creatively restless project leader, balances a love for abstract art and competitive board games with a tendency to procrastinate on scheduling, frequent worries about perfection,
    and a habit of blowing off deadlines for impromptu piano sessions, and they constantly seek new ways to fuse imagination with structured execution.
background:
  cultural: Kerland is an African‑American who grew up in a close‑knit family within the vibrant Black community of Fort Wayne, Indiana. He was raised with the values of mutual support, oral storytelling,
    and the celebration of cultural milestones such as Juneteenth and family church gatherings. The Midwestern work ethic and the rich musical heritage of soul, jazz, and hip‑hop have shaped his worldview,
    giving him a deep appreciation for community mentorship and collective achievement. These cultural influences inform his collaborative style at work, his preference for community‑oriented projects,
    and his commitment to uplifting other Black professionals in the project management arena.
