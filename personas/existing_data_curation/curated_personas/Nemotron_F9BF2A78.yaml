  hobbies: '[''Abstract Painting'', ''Digital Photography'', ''Jazz Piano'', ''Sci‑Fi & Fantasy Reading'', ''Local Art Gallery Visits'', ''Strategic Board Games & Chess'', ''Pickup Basketball'', ''Hiking
    in Nature Preserves'', ''Culinary Experiments (African‑American Cuisine)'', ''Mindfulness Meditation'', ''Design & Innovation Podcasts'']'
  career_goals: Kerland aims to ascend to a senior leadership role such as PMO Director within the next five years, overseeing large‑scale transformation initiatives that blend business rigor with innovative,
    artistic thinking. He aspires to become a recognized thought leader on integrating creativity into project management, speaking at industry conferences, and publishing articles on adaptive project methodologies.
    Long‑term, he envisions launching a boutique consultancy that helps mid‑size manufacturers in the Midwest adopt flexible, design‑driven approaches to process improvement, while also mentoring emerging
    Black professionals in the field to broaden representation.
