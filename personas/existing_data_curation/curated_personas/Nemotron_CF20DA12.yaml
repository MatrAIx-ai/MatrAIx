  hobbies: '[''Cooking Southern cuisine'', ''Gardening (vegetable and herb)'', ''Reading historical fiction and practical self‑help books'', ''Attending church and community events'', ''Hiking local trails
    in Cheatham County'', ''DIY home‑improvement projects'', ''Knitting/crocheting'', ''Volunteering at local food banks'', ''Listening to country music and attending live performances'']'
  career_goals: Suzie aims to advance within her company to a senior sales or team‑lead role, eventually becoming a regional sales manager. She plans to complete her bachelor's degree in business administration
    and obtain professional sales certifications. Over the next five years she hopes to lead a high‑performing sales team, mentor new reps, and contribute to strategic planning that improves sales efficiency.
    Long‑term, she envisions opening her own small distribution business focused on locally sourced products, leveraging her industry knowledge and community connections.
