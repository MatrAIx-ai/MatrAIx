personas:
  professional: A budding young illustrator, Femke Sheronick blends a methodical approach to sketching with a curious eye for everyday scenes, turning school art club projects into polished digital animations
    in Scratch, and they reliably meet every deadline for class assignments.
  sports: A modest athlete, Femke Sheronick plays on the Stow Youth Soccer Club’s co‑ed team in the fall, swims laps at the community pool during summer, and they cheer for the Cleveland Guardians and Cleveland
    Browns while preferring low‑key practice sessions over large crowds.
  arts: An imaginative art enthusiast, Femke Sheronick spends afternoons sketching in the Cuyahoga Valley Historical Museum’s free studio, draws inspiration from the whimsical worlds of Studio Ghibli and
    the bold lines of contemporary street artist Banksy, and they often curl up with fantasy novels by J.K. Rowling to fuel their creative storytelling.
  travel: A careful planner, Femke Sheronick enjoys family road trips to historic sites like Washington, D.C., has explored the charming canals and tulip festivals of a European country on a school exchange,
    and they dream of solo backpacking to Paris and Kyoto while always budgeting their allowance for travel.
  culinary: A budding home chef, Femke Sheronick loves whipping up fluffy blueberry pancakes, assembling quick veggie stir‑fry with bell peppers and soy sauce, and they proudly bake apple‑cinnamon crumble
    for family gatherings, though they sometimes forget to clean the kitchen afterward.
  core: A quiet, curious 12‑year‑old, Femke Sheronick balances a love for sketching and storytelling with a meticulous allowance‑saving habit, a tendency to misplace their glasses, and a quirky habit of
    collecting postcards from every place they visit.
background:
  cultural: Femke was raised in a middle‑class White family with Dutch‑German ancestry in Stow, a suburban community in Portage County, Ohio. Her upbringing blends typical Midwestern values—such as community
    involvement, modesty, and a strong work ethic—with family traditions that reflect her European roots, including celebrating King’s Day and enjoying Dutch folk music. She participates in local school
    art clubs, community library reading programs, and town festivals like Stow Summerfest, which together shape her appreciation for both the broader American culture of the Midwest and the cultural heritage
    passed down through her family.
attributes:
  skills: '["drawing and sketching", "digital illustration (Procreate)", "research and information synthesis", "project planning and organization", "basic Scratch programming", "collaborative group work"]'
  hobbies: '["sketching nature and everyday life", "reading fantasy and science non-fiction", "visiting art museums and local history exhibits", "collecting postcards and creating scrapbooks", "journaling
    personal reflections", "creating simple games and animations in Scratch", "gardening with family"]'
  career_goals: Femke envisions pursuing a path that blends her love of art and curiosity about the world. She hopes to attend an art‑focused high school and later study illustration or museum studies in
    college. Her long‑term ambition is to become a children’s‑book illustrator or a museum curator who designs interdisciplinary exhibits that spark wonder and learning. She also dreams of using her organizational
    strengths to manage creative projects and possibly explore careers in library or community arts programming where she can foster harmony and shared appreciation for culture.
