    ''Green cleaning practices'', ''Customer service and occupant relations'']'
  hobbies: '[''Pickup soccer'', ''Watching La Liga matches'', ''Cooking Spanish cuisine'', ''Salsa and flamenco dancing'', ''Fishing at Lake Marion'', ''Gardening (vegetable garden)'', ''Volunteering at
    church community kitchen'', ''DIY home improvement projects'', ''Attending local fairs and festivals'', ''Socializing at community events'']'
  career_goals: Eladio hopes to move into a supervisory or facilities‑management role within the next few years. He plans to complete his associate degree in facilities management, earn certifications such
    as Certified Professional Cleaner (CPC) and an OSHA 30‑hour safety course, and eventually become a building‑operations manager. He also dreams of launching his own small cleaning business that specializes
    in eco‑friendly services for local schools and churches. He wants to be recognized for leadership, reliability, and his ability to blend practical knowledge with new, sustainable cleaning technologies.
