personas:
  professional: Michelle Mons, a bilingual education professional with a knack for curriculum design, leverages their structured yet flexible approach to create culturally responsive lesson plans for early
    childhood and elementary students using both Spanish and English, while coordinating community outreach and leading parent workshops with an assertive but cooperative flair.
  sports: Michelle Mons follows the local MLS team Inter Miami CF with fervor, gathering friends for Sunday match viewings and cheering on the national side during World Cup qualifiers, while also volunteering
    as a scoreboard operator for community youth soccer tournaments.
  arts: Michelle Mons, an avid salsa and merengue dancer, spends evenings twirling to the rhythms of Celia Cruz and Marc Anthony, participates in a book club that reads works by Isabel Allende and Ta‑Nehisi
    Coates, and curates weekend playlists featuring contemporary fusion artists to accompany their cooking sessions.
  travel: Michelle Mons prefers weekend getaways that blend culture and relaxation, such as exploring the historic streets of Cartagena, Colombia, or hiking the lush trails of the Blue Ridge Mountains,
    and meticulously plans trips using travel‑budget apps to keep family expenses in check while dreaming of a future tour of the Guatemalan highlands.
  culinary: Michelle Mons delights in preparing traditional Central American dishes like baleadas and tamales, often twisting them with quinoa, avocado, and smoked cheese, all seasoned with cilantro, oregano,
    and parsley from their balcony herb garden, though occasional over‑salting leads them to rescue meals with a quick dash of citrus zest.
  core: Michelle Mons blends structured educational expertise with a vibrant love for community, cooking, and dance, balancing meticulous budgeting with spontaneous culinary experiments and a habit of late‑night
    salsa practice that sometimes leaves them untied in shoelaces.
background:
  cultural: Michelle’s cultural identity is rooted in her Honduran heritage. She grew up in a bilingual household where Spanish was spoken at home and English was used in school, fostering a deep appreciation
    for both languages. Honduran customs—such as celebrating Semana Santa, participating in the Feria de la Flor, and gathering for family meals—remain central to her life. She values strong family ties,
    respect for elders, and community solidarity, which are reflected in her active involvement with Miami’s Honduran diaspora. Catholic traditions influence her observances, and she often incorporates
    Honduran music, dance, and folklore into community events. Living in Miami’s multicultural environment, Michelle blends her Central American roots with the city’s diverse cultural tapestry, creating
    a rich, hybrid identity that informs her personal and professional pursuits.
attributes:
  skills: '[''Bilingual Instruction (Spanish/English)'', ''Curriculum Development'', ''Classroom Management'', ''Parent Engagement'', ''Community Outreach'', ''Event Planning'', ''Budgeting and Scheduling'',
