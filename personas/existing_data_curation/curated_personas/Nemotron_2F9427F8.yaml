  hobbies: '[''Cooking Traditional Honduran Cuisine'', ''Community Volunteering'', ''Salsa and Merengue Dancing'', ''Gardening'', ''Watching Soccer'', ''Reading Educational Literature'', ''Book Club'',
    ''DIY Home Projects'']'
  career_goals: Michelle aims to re-enter the education workforce within the next two years by securing a role as an educational coordinator or curriculum specialist for a nonprofit serving immigrant families
    in Miami. She plans to obtain an ESL certification and a reading specialist credential to broaden her expertise. In the medium term, she hopes to launch an after‑school program that blends academic
    support with cultural enrichment for Honduran and broader Latinx youth. Ultimately, Michelle envisions moving into a district‑level leadership position where she can influence policy on bilingual education
    and equitable resource allocation, while still balancing her family commitments.
