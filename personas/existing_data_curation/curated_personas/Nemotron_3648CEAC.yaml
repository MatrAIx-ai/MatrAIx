personas:
  professional: Frederick Welborn, a retired senior systems engineer and former professor of electrical engineering, channels his analytical rigor and vivid imagination into mentoring robotics workshops,
    authoring interdisciplinary grant proposals, and curating the ‘Science Meets Canvas’ exhibition, balancing meticulous project management with spontaneous artistic experimentation.
  sports: Frederick Welborn stays active through daily walks in William B. Umstead State Park, participates in the Cary Senior Walking Club and a local senior bowling league, and follows the Carolina Panthers
    (NFL) and Charlotte Hornets (NBA) with quiet enthusiasm, blending his love of community camaraderie with seasonal sports interest.
  arts: Frederick Welborn merges scientific precision with creative flair in his watercolor studio, drawing inspiration from James Turrell’s abstract light installations, Maria Sibylla Merian’s botanical
    illustrations, improvising piano renditions of Miles Davis and John Coltrane, and regularly engaging with exhibitions of Georgia O'Keeffe at the Smithsonian American Art Museum, which together shape
    his interdisciplinary artistic identity.
  travel: Frederick Welborn plans travel with purposeful itineraries and occasional spontaneity, favoring weekend road trips to Asheville’s Blue Ridge Parkway, frequent museum visits to Washington, D.C.’s
    National Gallery, and dreaming of a culturally immersive pilgrimage to Kyoto’s historic temples, all balanced against his modest pension and desire for relaxed pace.
  culinary: Frederick Welborn, an adept home cook, cherishes cultivating heirloom tomatoes and basil for fresh Caprese salads, prepares classic Southern shrimp and grits with smoked paprika, and occasionally
    crafts a meticulously stirred risotto with arborio rice and Parmesan, reflecting his appreciation for both comfort cuisine and refined flavors.
  core: Frederick Welborn blends a lifelong passion for aerospace engineering with watercolor abstraction, balancing disciplined daily walks and meticulous budgeting with occasional forgetfulness about
    vitamins and the joy of late‑night jazz improvisation.
background:
  cultural: Frederick Dale Welborn is a white American born in 1936 in a small Midwestern town to parents of German‑Irish ancestry. Raised in a Protestant, post‑World‑War household, he experienced the optimism
    of the post‑war boom, the excitement of the space race, and the social transformations of the 1960s. He earned his STEM graduate degree at North Carolina State University, which broadened his outlook
    and rooted him in the Southern research community. Relocating to Cary, North Carolina in the early 1970s, he adopted the region’s blend of Southern hospitality and emerging tech culture. He maintains
    traditional family customs such as Thanksgiving gatherings and church attendance, while also embracing a lifelong curiosity for global artistic traditions, reflecting a balanced cultural identity that
    fuses Midwestern pragmatism, Southern community values, and a universal appreciation for science and the arts.
