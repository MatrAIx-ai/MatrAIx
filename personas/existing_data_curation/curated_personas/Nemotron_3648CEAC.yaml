  hobbies: '["Watercolor Painting", "Science-Fiction Reading", "Public Lectures and Art Talks", "Gardening (Heirloom Tomatoes, Herbs)", "Bird-watching and Nature Walks", "Piano Playing (Jazz Improvisation)",
