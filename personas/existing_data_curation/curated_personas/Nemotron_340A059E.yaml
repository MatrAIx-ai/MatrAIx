personas:
  professional: Matt Dai is a budding junior team captain and school band liaison, harnessing their love for routine and practical organization to coordinate basketball drills, soccer scrimmages, and rehearsal
    schedules, while their outgoing nature and occasional anxiety drive them to double‑check plans and assertively keep the group on track.
  sports: Matt Dai plays forward for the Todd County Tigers youth soccer club and point guard for the Cornerstone Middle School basketball team, cheers for the Chicago Bulls in the NBA and the Chicago Cubs
    in MLB, and follows a disciplined fitness routine that includes warm‑ups, weekly hikes with the Boy Scouts, and weekend practice drills that satisfy their need for structure and group camaraderie.
  arts: Matt Dai, a trumpet player in the school marching band, also enjoys the bright brass of John Philip Sousa marches, the modern pop of Taylor Swift, and the cinematic scores of Hans Zimmer, and they
    channel their creative energy into building LEGO sculptures of iconic movie scenes.
  travel: Matt Dai prefers family road trips with detailed itineraries, having explored the nearby Ozark National Forest, visited the Todd County Fair, and dreamt of touring the historic monuments of Washington,
    D.C., while hoping to one day camp on the rugged cliffs of Ireland, always planning with checklists and maps to reduce uncertainty.
  culinary: Matt Dai loves assembling tacos with seasoned ground beef, shredded lettuce, and fresh cilantro, can reliably cook a golden grilled cheese using cheddar and whole‑grain bread, and delights in
    the sweet crunch of LEGO‑shaped fruit snacks, though they sometimes overindulge in sugary cereal before school.
  core: Matt Dai is a routine‑driven, socially energetic 12‑year‑old who balances leadership in sports and band with a cautious allowance, occasional anxiety, and a passion for LEGO‑inspired creativity.
background:
  cultural: Matt comes from a typical white Midwestern family in Staples, Minnesota. His ancestry includes Scandinavian (primarily Swedish and Norwegian) roots, reflected in a cultural emphasis on modesty,
    hard work, and community. He was raised in a close‑knit rural town where church gatherings, the county fair, and school events form the core of social life. The family values self‑reliance, practicality,
    and helping neighbors, which is evident in Matt’s everyday routines and his participation in local traditions.
