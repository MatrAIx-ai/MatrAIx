  skills: '[''teamwork'', ''organizing group activities'', ''basic mechanical repair'', ''basic woodworking'', ''computer literacy'', ''trumpet playing'', ''pet care'', ''reliable scheduling'']'
  hobbies: '[''basketball'', ''soccer'', ''trumpet in school band'', ''LEGO building'', ''Minecraft'', ''gardening'', ''hiking'', ''Todd County Fair attendance'', ''Boy Scouts activities'']'
  career_goals: Matt aspires to a career that combines routine, practical skills, and community service. He hopes to graduate high school, attend a vocational program in automotive technology, and become
    a skilled mechanic or a firefighter. He likes the idea of a job that offers clear daily structure, teamwork, and the chance to help his neighbors. He also dreams of one day owning a small family farm,
    where he can apply his hands‑on skills and maintain a predictable, self‑sufficient lifestyle.
