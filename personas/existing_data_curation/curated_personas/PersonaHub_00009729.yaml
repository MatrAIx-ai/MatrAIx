persona_description: A virologist and epidemiologist who specializes in the study of avian influenza viruses, particularly H7N9. He has expertise in risk assessment and modeling, and has conducted research
  on the transmission dynamics of H7N9 and the potential impact on human health. He has also worked on the development of targeted surveillance and intervention strategies for controlling the spread of
  H7N9. He is interested in the potential for H7N9 to adapt and spread to humans and the implications of this for global public health. He is currently involved in research on the epidemiology and transmission
  dynamics of H7N9, and is working on developing risk maps and modeling strategies to identify areas most at risk for H7N9 transmission.
