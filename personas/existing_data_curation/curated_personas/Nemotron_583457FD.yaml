  hobbies: '["Heirloom vegetable gardening","Historical biographies and education reform reading","Nature walks and birdwatching","Quilting circle","Volunteer logistics at community food pantry","Crossword
    puzzles"]'
  career_goals: She aspires to move from a local childcare administrator to a district‑level early education director, where she can influence policy, expand evidence‑based preschool programs, and mentor
    emerging administrators. To support this, she plans to complete a bachelor’s degree in Education Administration within the next three years, obtain certification in Leadership Coaching, and lead a regional
    initiative to improve early literacy outcomes. Her competitive drive pushes her to be recognized as a thought leader in early childhood quality improvement across rural North Carolina.
