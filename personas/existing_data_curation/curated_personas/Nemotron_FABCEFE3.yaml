  career_goals: Keiko often tells her parents that she wants to be a teacher when she grows up because she loves showing her dolls how to count and likes helping her friends at preschool. She also dreams
    of becoming a doctor so she can give hugs and medicine to people who feel sad, reflecting her compassion and desire to protect herself and others. In the short term, her biggest ambitions are to master
    using the potty without help, ride a tricycle without training wheels, and read a whole picture book by herself.
