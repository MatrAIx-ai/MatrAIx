personas:
  professional: Keiko Li, a three-year-old pretend office manager, meticulously lines up building blocks by color and size, demonstrating early organizational talent, a practical focus on immediate tasks,
    and a need for predictable routines that they bring to every play-scenario.
  sports: Keiko Li delights in toddler soccer with the Little Sprouts Soccer Club, waves a tiny foam flag for the Los Angeles Dodgers during family game nights, and attends a weekly beginner swim class
    that they eagerly anticipate but sometimes skip if a rainstorm triggers a sudden bout of anxiety.
  arts: Keiko Li spends afternoons coloring scenes from Eric Carle's books, dancing to Raffi's "Baby Beluga" and The Wiggles' "Fruit Salad", and reenacts favorite Sesame Street skits, channeling their creative
    energy into structured art projects that soothe their heightened emotions.
  travel: Keiko Li loves car trips to the local zoo, dreams of visiting Disneyland and the Grand Canyon, prefers traveling with a familiar stuffed bunny for comfort, and they often demand the same seat
    in the back seat to maintain a sense of predictability.
  culinary: Keiko Li's palate is dominated by buttery macaroni and cheese, banana pancakes, and sweet potato fries, they proudly scoop peas with a tiny fork but frequently protest broccoli with a dramatic
    sigh, reflecting their methodical order in meals yet emotional flare when confronted with disliked foods.
  core: Keiko Li is a tiny, orderly explorer whose love of routines and vivid emotions turn every day into a carefully planned adventure, and they often burst into a quick, dramatic tantrum when the schedule
    changes.
background:
  cultural: Keiko comes from a mixed East Asian heritage; her mother is Japanese and her father is Chinese. The family lives in Chicago's Chinatown neighborhood, where they celebrate both Japanese and Chinese
    traditions. She participates in Lunar New Year festivities, enjoys eating dumplings and mochi, and learns about the meaning of the cherry blossom (sakura) and the Mid-Autumn Festival mooncakes. At home,
    both Japanese and Mandarin are spoken alongside English, giving her a multicultural linguistic environment. The family also attends local cultural events such as the Japanese American Cherry Blossom
    Festival and Chinese New Year parades, which shape Keiko's sense of identity and appreciation for diversity.
