persona_description: A historian who specializes in the study of Mesopotamian history, particularly the reigns of the Sumerian kings and the rise of Babylon. His research interests include, but are not
  limited to, the history of the city of Erech, the life of the goddess Ishtar, and the cultural and religious practices of the ancient Mesopotamians. He is also interested in the history of the city of
  Babylon and the role of Erech in its development.
