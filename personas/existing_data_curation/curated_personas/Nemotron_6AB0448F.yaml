  hobbies: '["Fishing", "Birdwatching", "Classic car restoration", "Cooking Southern cuisine", "Historical novels", "Genealogy research", "Church choir", "Quilting", "Bridge"]'
  career_goals: His current ambitions focus on giving back to the Ocilla community. He aims to establish a sustainable community garden, launch a mentorship program for at-risk youth, document local oral
    histories in a published memoir, and organize a seniors' support network that provides transportation and companionship. He also hopes to secure small grants to fund these initiatives and eventually
    create a registered non-profit to sustain them.
