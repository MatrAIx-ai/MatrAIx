  career_goals: Brenda aims to re‑enter the workforce on a flexible, remote basis, leveraging her analytical expertise and technical writing skills to support nonprofit research initiatives or small biotech
    firms. She aspires to mentor emerging women in STEM through volunteer tutoring and workshops, and hopes to serve on advisory committees that promote data‑driven decision‑making in community health projects.
    To broaden her impact, she plans to earn a certification in data visualization and eventually take on freelance consulting roles that align with her structured work style and desire for meaningful contribution.
