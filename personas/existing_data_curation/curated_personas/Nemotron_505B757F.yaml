  hobbies: '[''Soccer'', ''Girl Scouts'', ''Community Drama Club'', ''Hill Country Hiking'', ''Mystery Novels'', ''Family Cooking'', ''Journaling'']'
  career_goals: Jamie aspires to attend a high school with strong business and health science programs, with the long‑term goal of pursuing a career that blends her love of structure and helping others.
    She is considering studying public health, nursing, or business administration at a university, aiming to become a community health coordinator or event manager for local festivals. Her ambition includes
    creating organized, supportive environments for peers, possibly as a school counselor or logistics specialist, where she can apply her methodical approach and personable nature.
