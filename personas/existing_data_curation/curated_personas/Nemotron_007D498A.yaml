  career_goals: Helen aims to secure a business analyst or marketing coordinator position with a regional firm in Nevada to apply her analytical and strategic skills while gaining industry experience. In
    the medium term, she plans to pursue an MBA to deepen her expertise and eventually launch a sustainable eco‑tourism venture that leverages the unique desert landscape of Amargosa Valley. Her long‑term
    ambition is to become a senior manager who drives local economic development and creates job opportunities in her community.
