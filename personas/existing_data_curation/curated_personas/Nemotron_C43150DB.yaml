  career_goals: Ricky aims to advance into a senior regional health‑system leadership role, such as Vice President of Operations, where he can shape large‑scale, innovative care models across multiple facilities.
    He plans to earn a Master’s in Health Administration to deepen his strategic expertise and to become a thought leader at national conferences on integrating arts and design into healing environments.
    Long‑term, he envisions launching a consultancy that helps hospitals embed community‑driven, patient‑centered innovations while championing staff well‑being and resilience.
