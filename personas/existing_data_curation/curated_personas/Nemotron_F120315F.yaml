  hobbies: '[''woodworking'', ''fly-fishing'', ''reading non-fiction'', ''chess'', ''model kit building'', ''gardening'', ''cooking Southern cuisine'', ''volunteering as a mentor'', ''attending small church
    gatherings'']'
  career_goals: Michael aims to move into a supervisory or quality‑improvement role within his facility over the next three years, building on his strong organizational skills and competitive drive. He
    plans to enroll in an LPN program, ultimately becoming a Registered Nurse to broaden his clinical scope. Long‑term, he hopes to lead a patient‑safety team or serve as a health‑education liaison for
    underserved African‑American communities in Michigan, combining his technical expertise with his desire for tangible impact.
