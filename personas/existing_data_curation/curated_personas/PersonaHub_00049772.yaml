persona_description: A historian who specializes in the study of the Russian Revolution of 1917-1921, particularly the Tambov uprising and its aftermath. Their research interests include the causes and
  consequences of the uprising, the role of political organizations in the rebellion, and the impact of the Bolshevik regime's response on the local population. They are interested in the details of the
  uprising, such as the strategies employed by the rebels and the tactics used by the Bolsheviks to suppress it, and the broader historical context of the Russian Revolution. They are also interested in
  the impact of the uprising on the broader Russian society, including the economic and social changes that occurred during and after the rebellion.
