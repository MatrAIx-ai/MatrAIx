personas:
  professional: Cole Pratt is an administrative support specialist who leverages his mastery of Microsoft Office, data management, and front‑desk service to execute flawless office operations while curating
    modest art displays, and they are actively pursuing a Business Administration certificate to transition into an Office Manager role overseeing a small team and community cultural events.
  sports: Cole Pratt enjoys weekend hikes along the Ice Age Trail and early‑morning fishing on Lake Mendota, passionately follows the Milwaukee Bucks and Green Bay Packers, stays fit by joining a local
    Madison cycling club for monthly rides, reserves summer for informal baseball games with friends at the community park, and they consider the occasional yoga session to improve flexibility.
  arts: Cole Pratt frequents the Madison Museum of Contemporary Art and the Milwaukee Art Museum, curates office lobby displays with prints by regional artists such as Christopher Sperry, collects vinyl
    records by Bob Dylan, Joni Mitchell, and Fleet Foxes, occasionally shares his own short stories at a quarterly open‑mic night at the historic Trunkspace bar, and they find inspiration for their nature
    photography in the museum’s landscape installations.
  travel: Cole Pratt prefers low‑key weekend getaways that blend nature and culture, such as kayaking the Apostle Islands, exploring Door County’s historic lighthouses, visiting the art‑rich streets of
    Copenhagen during a spring break, plans each trip with detailed spreadsheets while leaving room for spontaneous photo excursions when the weather shifts, and they sometimes extend trips to attend local
    festivals.
  culinary: Cole Pratt, an amateur chef who tends his modest herb garden, delights in preparing pan‑seared trout with fresh dill and lemon, paired with roasted fingerling potatoes tossed in rosemary, often
    finishes the meal with locally sourced cheese curds and a chilled Wisconsin craft cider, and they experiment with new spice blends inspired by his recent travels.
  core: Cole Pratt is a quietly curious organizer who fuses meticulous administrative skill with a love for art, nature, and community, balancing disciplined budgeting with occasional indulgences, and they
    thrive on solitary creative pursuits punctuated by intimate gatherings.
background:
  cultural: Cole grew up in a white, Midwestern family in rural Wisconsin, with deep German and Scandinavian roots that are common in the region. His upbringing emphasized modesty, self‑reliance, and a
    strong work ethic, values reinforced by participation in church activities, school events, and local county fairs. Family traditions include annual potluck gatherings, hunting and fishing trips, and
    community volunteer projects. The agricultural and industrial heritage of Wisconsin shaped his practical approach to organization while fostering an appreciation for community arts and local history.
    Now married and living in Hewitt, WI, Cole maintains close ties with extended family and neighbors, often sharing his love of art and nature through small community initiatives.
attributes:
  skills: '[''Microsoft Office Suite'',''Google Workspace'',''Data entry'',''Database management'',''Scheduling and calendar coordination'',''Document preparation and editing'',''Basic bookkeeping (QuickBooks)'',''Customer
    service'',''Inventory control'',''Event planning'',''Written communication'',''Conflict resolution'',''Assertive negotiation'',''Time management'',''Multitasking'',''Technical troubleshooting'',''Knowledge
    of municipal procedures'',''Art curation'']'
  hobbies: '[''Visiting art galleries and museums'',''Nature photography'',''Hiking'',''Fishing'',''Reading science‑fiction and non‑fiction'',''Collecting vinyl records'',''Small‑group board game nights'',''Herb
    gardening'',''Writing short stories and poetry'',''Volunteering at the local historical society'']'
  career_goals: Cole aims to advance from his current administrative support role to an Office Manager or Operations Coordinator position within the next three to five years. To achieve this, he plans to
    earn a certificate in Business Administration or Project Management through a local community college. He wants to lead a small team, mentor new hires, and take on greater responsibility for workflow
    optimization. Cole is also interested in integrating his passion for the arts by coordinating community cultural events and developing outreach programs that showcase local artists. Long‑term, he envisions
    a role in municipal administration—such as Town Clerk—where his organizational expertise and commitment to community service can contribute to the smooth operation of local government. He remains open
    to part‑time studies to broaden his skill set in digital marketing and public relations, supporting his ambition to blend administrative leadership with community engagement.
