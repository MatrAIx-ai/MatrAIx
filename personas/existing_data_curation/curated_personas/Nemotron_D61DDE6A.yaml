personas:
  professional: Deshon Tete is an aspiring young storyteller and game designer, channeling a blend of curiosity and practicality into crafting comic strips, short sci-fi narratives, and Minecraft worlds,
    while they maintain an organized yet flexible approach that keeps school assignments on track and friends' projects moving forward.
  sports: Deshon Tete plays on the middle school basketball team and participates in a local youth club, cheering for the Los Angeles Lakers, and they balance intense practice drills with occasional solo
    shooting sessions after school, reflecting their need for teamwork and occasional solitude.
  arts: Deshon Tete immerses themselves in fantasy worlds by devouring books by Brandon Sanderson and Neil Gaiman, sketches original comic characters between classes, and they share soulful renditions of
    Marvin Gaye and modern verses by Kendrick Lamar during church youth music sessions, letting artistic expression soothe their emotional swings.
  travel: Deshon Tete dreams of visiting the bustling streets of Tokyo for anime inspiration and the serene trails of Yellowstone National Park for a weekend hike with grandparents, and they often plan
    trips with parents but prefer short, well-structured itineraries that balance adventure with safety.
  culinary: Deshon Tete enjoys helping in the garden and then cooking fresh salads with cherry tomatoes, cucumbers, and basil, while also craving classic soul dishes like fried chicken and mac and cheese,
    and they proudly perfect a homemade peanut butter banana smoothie after evening gaming sessions.
  core: Deshon Tete is a creatively driven teen who balances imaginative storytelling and gaming with bouts of anxiety, and they often juggle school responsibilities, spontaneous snack cravings, and a love
    for basketball and soulful music.
background:
  cultural: 'Deshon comes from a close‑knit African‑American family in Lancaster, South Carolina. His upbringing is steeped in Southern Black traditions: Sunday services at the local Baptist church, family
    gatherings centered around collard greens, fried chicken, and sweet potato pie, and storytelling sessions where elders share tales of the civil‑rights movement and local history. The community values
    mutual support, church fellowship, and school involvement, which have shaped his sense of responsibility and cooperation. He also appreciates the musical heritage of the region, from gospel choirs to
    modern hip‑hop, and draws pride from the resilience and cultural pride of Black families in the rural South.'
attributes:
  skills: '[''Scratch programming'', ''Basic math (pre‑algebra)'', ''Effective communication & empathetic listening'', ''Team collaboration in basketball'', ''Creative writing'', ''Gardening and basic cooking'',
