  hobbies: '[''Reading fantasy and sci‑fi novels'', ''Sketching and comic drawing'', ''Journaling and creative writing'', ''Playing basketball'', ''Church youth group music'', ''Minecraft building'', ''Scratch
    game development'', ''Gardening with family'']'
  career_goals: Deshon hopes to turn his curiosity for technology and his desire to help others into a career that blends both. He dreams of becoming a software developer who designs educational apps that
    support mental‑health and learning for teens, especially in underserved communities. He also imagines working as a community outreach coordinator or school counselor, using his empathy to create safe
    spaces for students. In the near term, he aims to take advanced coding courses, join a mentorship program, and volunteer at the local youth center, building a foundation for these long‑term goals.
