  career_goals: As he approaches retirement, Frank aims to transition into a less physically demanding role that still leverages his extensive experience—such as a safety trainer or inventory auditor for
    his current employer. He wants to secure a steady pension and supplemental income through part‑time consulting on warehouse efficiency and safety best practices. Frank also hopes to mentor younger workers
    formally, passing on his practical knowledge while maintaining a predictable work schedule that allows him to spend quality time with his wife and pursue personal interests. Ultimately, his ambition
    is to retire with financial stability and the satisfaction of having contributed positively to his workplace community.
