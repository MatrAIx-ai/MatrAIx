personas:
  professional: Frank Acosta, a veteran warehouse operations specialist who now mentors new hires, combines three decades of forklift, inventory and OSHA compliance expertise with a no‑frills, structured
    approach while allowing enough flexibility to accommodate the unpredictable flow of a busy distribution center.
  sports: Frank Acosta follows the Minnesota Wild and the Minnesota Twins, spends his Saturdays fishing on Lake Washington, and joins a local senior softball league that meets at the county fairgrounds
    each summer.
  arts: Frank Acosta unwinds with classic Western films starring John Wayne and Clint Eastwood, while listening to the timeless croon of Pedro Infante and José Alfredo Jiménez during weekend cooking sessions.
  travel: Frank Acosta prefers low‑key road trips that blend scenic Midwestern drives with occasional pilgrimages to historic plazas in Santa Fe and Tucson, planning just enough to secure lodging yet leaving
    room for spontaneous detours to family‑run eateries.
  culinary: Frank Acosta’s culinary routine centers on crafting homemade tamales, simmering rich mole with ancho chilies and ripe tomatoes from his garden, and preparing hearty pozole on Sundays, while
    he proudly perfects his salsa verde using fresh tomatillos and cilantro.
  core: Frank Acosta balances a lifelong habit of meticulous warehouse safety with a charmingly disorganized inbox, savoring solitary fishing mornings and spontaneous bursts of culinary creativity that
    keep life flavorful yet predictable.
background:
  cultural: Frank is a second‑generation Mexican‑American whose family settled in the Midwest decades ago. He grew up speaking Spanish at home and English in school, giving him fluency in both languages
    and a deep appreciation for Mexican customs. He celebrates cultural milestones such as Día de los Muertos and Cinco de Mayo, often preparing traditional foods and sharing them with neighbors. His Catholic
    faith, inherited from his family, shapes his weekly routine of attending Mass with his wife. While living in Le Sueur, Minnesota, Frank blends his Mexican heritage with the local Midwestern culture,
    participating in community events like the county fair while maintaining strong family ties and a sense of pride in his bicultural identity.
