persona_description: A school educator who is committed to building and fortifying relationships with families during the pandemic. The educator is skilled in conducting virtual family/home visits, utilizing
  various online platforms, and leveraging the cultural resources and assets of the family for student success and wellbeing. The educator is aware of the barriers that prevent families from attending school
  events and teacher-parent conferences, and is making an effort to connect with families through various online platforms. The educator is dedicated to relationship building and encourages families to
  take a deep breath during challenging times. The educator is also prepared with information on resources and support services that families may need, and is aware of food distribution networks.
