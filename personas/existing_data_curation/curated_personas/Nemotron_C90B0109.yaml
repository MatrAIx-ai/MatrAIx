  hobbies: '[''Salsa dancing'', ''Cooking Puerto Rican cuisine'', ''Attending Mets games'', ''DIY electronics projects'', ''Mentoring in community STEM workshops'', ''Jogging in Pelham Bay Park'', ''Reading
    self-help books on stress management'', ''Collecting vintage jazz vinyl records'']'
  career_goals: He aims to secure a senior engineering leadership role within the next five years, ideally as an Engineering Manager or Director, where he can guide large-scale IoT and smart-city infrastructure
    projects that improve energy efficiency in New York's underserved neighborhoods. To support this, William plans to obtain his Professional Engineer (PE) license and complete an executive MBA to blend
    technical expertise with strategic business acumen. He also hopes to mentor emerging Latinx engineers and eventually launch a boutique consulting practice that offers both engineering design and business
    development services to small manufacturers in the Bronx, providing flexible, community-focused solutions while maintaining a healthier work-life balance.
