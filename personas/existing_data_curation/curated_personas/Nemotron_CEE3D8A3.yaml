  hobbies: '[''Reading science-fiction and speculative literature'', ''Visiting modern art museums and galleries'', ''Night-sky and long-exposure photography'', ''Playing chess (online and club)'', ''Building
    model train layouts'', ''DIY electronics with Raspberry Pi and Arduino'', ''Hiking local Allegheny County trails'', ''Craft-beer tasting at Pittsburgh microbreweries'', ''Writing short stories'']'
  career_goals: Looking ahead, Eric aims to transition from hands-on administration to a strategic leadership role as a chief data architect, where he can shape the organization’s long-term data roadmap
    and champion data-driven decision making. He plans to spearhead the adoption of AI-enhanced analytics pipelines, mentor the next generation of DB professionals, and contribute to open-source database
    tooling. Over the next five years, he also hopes to establish a boutique consulting practice that helps midsize firms modernize legacy data environments while preserving data integrity and security.
    Ultimately, Eric wants his legacy to include a resilient, future-proof data infrastructure and a cadre of skilled engineers who share his curiosity for emerging technologies.
