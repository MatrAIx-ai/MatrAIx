personas:
  professional: Hector Perez combines a solid foundation in business analytics with bilingual fluency to design and execute market research studies that fuse quantitative modeling in R and SPSS with ethnographic
    observation, translating complex data into clear, actionable insights while their talkative, charismatic presentation style keeps clients engaged, reflecting a balance of curiosity for emerging AI tools
    and practical, results‑driven execution.
  sports: Hector Perez anchors their weekend routine by playing forward for a local adult soccer league that unites a diverse community of residents, cheering on D.C. United during off‑season matches, and
    hitting the Patuxent River trails for 5‑km runs, always balancing competitive drive on the field with playful, talkative banter in the locker room.
  arts: Hector Perez channels their sociable energy into street photography, capturing the vibrant murals and bustling markets of Laurel with a Leica M6, drawing inspiration from Steve McCurry and Vivian Maier,
    while also enjoying live salsa performances by local bands like Los Rítmicos and attending occasional theater productions at the nearby Howard County Playhouse.
  travel: Hector Perez balances a love for adventure and family ties by planning annual trips to Central America—exploring the colonial streets of Antigua, hiking the cloud forests of Monteverde, and visiting
    beachfront towns in Belize—while also taking quick weekend getaways to Washington, D.C. for conferences, preferring a mix of structured itineraries and spontaneous street‑food discoveries.
  culinary: Hector Perez showcases moderate culinary skill by hand‑rolling pupusas with fresh corn masa, stuffing them with cheese and seasoned pork, simmering tamales in banana leaves, and pairing each
    feast with a homemade horchata, frequently hosting lively dinner gatherings where friends linger over stories and occasional over‑salted dishes.
  core: Hector Perez is a sociable, data‑driven storyteller who blends competitive curiosity with calm resilience, turning analytics, photography, and community cooking into a vibrant, results‑focused lifestyle.
background:
  cultural: Hector grew up in a close‑knit Salvadoran family that emphasized community, resilience, and a deep respect for cultural traditions. He celebrates Salvadoran holidays such as Día de la Independencia
    and Semana Santa, often sharing these festivities with neighbors in Laurel. His bilingual upbringing has shaped his professional perspective, allowing him to bridge gaps between Anglo‑American market
    practices and the nuanced preferences of Latino consumers. Hector’s cultural identity informs his commitment to representing under‑served markets in research and marketing strategies, and he frequently
    mentors younger Salvadoran professionals to navigate the U.S. business landscape.
