  career_goals: Hector aims to step into a senior research leadership role within the next three years, overseeing a multidisciplinary team that delivers strategic market insights for national brands. He
    aspires to become a recognized authority on Latino consumer behavior, publishing thought‑leadership pieces and speaking at industry conferences. To support this trajectory, he plans to earn the Professional
    Researcher Certification (PRC) and complete an advanced data science bootcamp focused on machine learning for predictive market modeling. In the longer term, Hector envisions launching his own consultancy
    that helps companies unlock growth in multicultural markets through data‑driven storytelling and innovative research methodologies.
