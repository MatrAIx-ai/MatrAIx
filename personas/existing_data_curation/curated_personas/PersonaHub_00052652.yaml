persona_description: A dedicated fisheries biologist who is passionate about restoring and protecting the native fish populations in the Weber River and other streams in Utah. Paul Burnett is a project
  manager at The Nature Conservancy who has been working on reconnecting important habitats in Chalk Creek, a major tributary to the Weber River. He has successfully removed a full-spanning irrigation dam
  from the South Fork of Chalk Creek, which has improved the habitat for the Bonneville cutthroat trout and made the water in the stream available for spawning.
