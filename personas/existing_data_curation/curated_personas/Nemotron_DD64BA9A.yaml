  hobbies: '[''Sketching'', ''Digital illustration'', ''Photography'', ''Museum visits'', ''Listening to jazz and hip-hop'', ''Reading graphic novels'', ''Writing poetry'', ''Street-art exploration'', ''Video
    gaming'', ''Meditation'', ''Journaling'', ''Volunteering at community center'']'
  career_goals: Joel aims to complete a bachelor's degree in visual arts or communications within the next two years, with a focus on community-based art practices. He envisions a career that merges his
    artistic talents with his passion for mental-health advocacy, such as working as a visual designer for a nonprofit that serves under-represented youth, or pursuing certification as an art therapist.
    In the medium term, he hopes to lead mural projects in Houston neighborhoods that celebrate Black cultural heritage and spark dialogue around emotional wellbeing. Ultimately, Joel dreams of opening
    a community arts studio where he can teach workshops, host exhibitions, and provide a supportive space for young people to explore creativity as a tool for coping with anxiety and sadness.
