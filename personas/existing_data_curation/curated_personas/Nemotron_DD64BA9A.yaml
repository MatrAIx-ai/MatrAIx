personas:
  professional: Joel Jones is an emerging visual designer who blends Adobe Photoshop and Illustrator expertise with a love for community storytelling, channeling the vibrant rhythms of gospel music and
    Southern hospitality into graphics for youth mental‑health nonprofits, while their curiosity drives deep research and they often rehearse presentations late into the night due to occasional anxiety.
  sports: Joel Jones enjoys a blend of solo and team activities, jogging along Buffalo Bayou Park in the spring, shooting hoops at a local community center where the Houston Rockets' legacy inspires them,
    and cheering on the Astros during baseball season, yet they sometimes skip workouts after a stressful week of school projects.
  arts: Joel Jones is a dedicated creator who spends weekends sketching street murals in EaDo, drawing inspiration from the bold colors of Kehinde Wiley, the soulful melodies of Nina Simone and Miles Davis,
    and the rhythmic storytelling of local graffiti artist Killer B, while they regularly attend exhibitions at the Museum of Fine Arts Houston and curate digital galleries that highlight contemporary artists
    exploring cultural heritage.
  travel: Joel Jones prefers budget‑friendly road trips that blend spontaneous exploration with careful planning, having road‑tripped to Austin for live jazz festivals, taken a week‑long stay in New Orleans
    to soak up Creole cuisine and brass bands, and dreaming of a pilgrimage to Oaxaca, Mexico to study its mural traditions, all while they balance student loans and weekend volunteer commitments.
  culinary: Joel Jones loves the comforting flavors of Southern soul food and Tex‑Mex fusion, often cooking chicken‑fried steak with collard greens, making homemade queso with fresh jalapeños, and experimenting
    with gumbo, yet their cooking skill sits at a confident home‑cook level, and they indulge in quiet evenings ordering tamales from a beloved local food truck when deadlines loom.
  core: Joel Jones is a 22‑year‑old visual arts student who channels relentless curiosity into community murals and digital designs, while their anxiety triggers frequent coffee‑shop retreats and they have
    a habit of endlessly scrolling social media for inspiration.
background:
  cultural: Joel grew up in the culturally rich environment of the Greater Houston area as a Black American. His family traditions blend Southern hospitality with the vibrant rhythms of African-American
    church life, where gospel music and community storytelling were staples. He was raised on Tex-Mex cuisine, Southern soul food, and family gatherings that emphasized mutual support and resilience. Exposure
    to Houston's diverse Black neighborhoods introduced him to a wide spectrum of artistic expression—from jazz clubs in the Third Ward to street murals in EaDo—shaping his appreciation for art as both
    cultural heritage and personal voice. Joel's cultural identity informs his creative work, leading him to highlight Black history, contemporary struggles, and mental-health narratives in his projects,
    while also navigating the systemic challenges often faced by young Black men in Texas.
attributes:
  skills: '[''Adobe Photoshop'', ''Adobe Illustrator'', ''Video editing (Adobe Premiere)'', ''Digital illustration'', ''Photography'', ''Creative writing'', ''Research and analysis'', ''Public speaking'',
