persona_description: Robert Adam was a renowned Neo-classical architect, interior and furniture designer who created his first complete room design at Croome Court. His contributions to interior design
  and architecture are highly valued, and his influence on the interior of buildings is evident in the rooms at Croome Court. He is known for his ability to create beautiful and functional spaces, and his
  work has been influential in the field of interior design. His contributions to Croome include the Park Seat or Owl’s Nest, the London Arch, Dunstall Castle, the Worcester Gates, and possibly the Island
  Pavillion. He served as the member of Parliament for Kinross-shire from 1768 to 1774.
