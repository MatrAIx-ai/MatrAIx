persona_description: A school leader with a focus on improving the educational outcomes of disadvantaged pupils, particularly those with special educational needs. The individual is experienced in assessing
  and using evidence to support the needs of their students and has a strong understanding of the barriers to learning faced by students from certain backgrounds. They are passionate about exploring innovative
  ways to engage students and support their development, and are committed to closing the attainment gap between their students and their peers. The individual is likely to have a deep understanding of
  the pupil premium grant and how it can be used to support the specific needs of their students.
