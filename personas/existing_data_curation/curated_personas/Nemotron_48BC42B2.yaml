  career_goals: Mark aims to progress from his current managerial position to a regional operations director within the next five years, leveraging his practical problem‑solving to oversee multiple locations.
    He plans to pursue an MBA part‑time to deepen his strategic expertise and eventually launch his own consultancy focused on helping small Midwestern businesses improve efficiency while preserving work‑life
    flexibility. He also seeks to become a recognized speaker on practical innovation and sustainable operations.
