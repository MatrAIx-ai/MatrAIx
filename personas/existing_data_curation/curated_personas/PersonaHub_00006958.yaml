persona_description: A researcher and engineer who specializes in digital image correlation (DIC) technology and its applications in measuring 3-D deformations under dynamic loading conditions. This person
  is skilled in combining DIC techniques with spatial phase-shift digital speckle patterns interferometry (SPS-DSPI) to provide direct measurement of 3-D deformations simultaneously. They have experience
  in applying DIC on pressure vessels with surface pit defects to obtain data on deformation and stress-strain behavior. This person is interested in the practical application of DIC technology in real-world
  engineering problems, such as monitoring defects in online pressure vessels and evaluating their safety. They are seeking to develop new and effective methods for monitoring defects and improving the
  safety of pressure vessels.
