  hobbies: '["Landscape painting", "Sketching design concepts", "Scale model train building", "Hiking in the Pacific Northwest", "Cooking traditional Mexican cuisine", "Visiting local art galleries", "Listening
    to jazz and Mexican folk music", "Reading about emerging manufacturing technologies", "Exploring sustainable design practices"]'
  career_goals: Raul aims to move into a lead‑fabricator or shop‑supervisor role where he can guide a team and influence process innovation. He plans to earn an AWS Certified Welder credential and a Lean
    Six Sigma Green Belt to strengthen his technical credibility. In the longer term, Raul dreams of launching a small custom metal‑art studio that merges his fabrication expertise with his love of visual
    arts, creating decorative pieces for local galleries and community spaces. He also hopes to mentor younger apprentices, passing on his methodical work ethic and appreciation for creative problem‑solving.
