personas:
  professional: Donald Bell, a 30‑year‑old electrician adept at residential and commercial wiring, solar photovoltaic installations, and AutoCAD layout drafting, leads small crews with a structured, safety‑first
    mindset, and they competitively pursue master‑electrician licensure while planning to launch a renewable‑energy contracting firm.
  sports: Donald Bell, a 30‑year‑old forward on a local recreational basketball league, spends weekends fishing on Lake Huron, rides a Harley‑Davidson through Michigan’s backroads, avidly follows the Detroit
    Pistons, Detroit Tigers, and Detroit Red Wings, and they hold memberships in the Grand Rapids Anglers Club and the Michigan Motorcycle Association, using each activity to stay fit and satisfy their
    competitive drive.
  arts: Donald Bell channels creative energy into DIY home‑renovation projects while attending Ann Arbor art gallery openings, jamming to The White Stripes and The War on Drugs at local breweries, and streaming
    classic film noir starring Humphrey Bogart, and they let these cultural experiences inspire both their design aesthetic and weekend social gatherings.
  travel: Donald Bell plans spontaneous motorcycle road trips along Michigan’s backroads, has already explored Door County, Wisconsin and Quebec City’s historic quarter, dreams of trekking Iceland’s geothermal
    fields for renewable‑energy inspiration, and they budget these adventures by mixing saved cash with occasional brewery‑tour splurges while balancing work commitments.
  culinary: Donald Bell enjoys cooking pan‑fried Lake Huron perch with lemon‑butter sauce, smoking brisket glazed with maple‑infused bourbon, and baking a classic Michigan cherry pie, pairing each dish
    with craft brews like Founders’ KBS, and they relish experimenting with fresh herbs such as thyme and rosemary to elevate home‑cooked meals.
  core: Donald Bell blends a safety‑focused, structured work ethic with a high‑energy social life centered on basketball, fishing, and craft‑beer culture, and they strategically budget while relentlessly
    pursuing a green‑focused electrical business.
background:
  cultural: Donald grew up in Swartz Creek, a small Midwestern community with strong ties to the manufacturing legacy of the Flint area. His family is rooted in third‑generation American heritage, with
    ancestors from German and Irish immigrants who settled in Michigan in the early 20th century. He values hard work, self‑reliance, and community involvement, reflecting the pragmatic and collaborative
    spirit of the region.
attributes:
  skills: '["Residential electrical wiring", "Commercial electrical system installation", "Blueprint reading and interpretation", "Electrical code compliance (NEC)", "Troubleshooting and diagnostics", "Solar
    PV system installation", "Conduit bending and pulling", "Team coordination and site supervision", "AutoCAD drafting basics", "Electrical safety training"]'
  hobbies: '["Playing basketball in local league", "Weekend fishing at Lake Huron", "DIY home renovation projects", "Attending craft brewery tastings", "Motorcycle riding on Michigan state routes", "Community
    volunteer work with Habitat for Humanity"]'
  career_goals: Donald aims to earn his master electrician license within the next two years and eventually start his own electrical contracting business focused on renewable‑energy projects. He plans to
    expand his expertise in solar and energy‑efficiency retrofits, obtain project‑management certification, and build a competitive crew that can bid on commercial contracts throughout Genesee County and
    the wider Michigan region.
