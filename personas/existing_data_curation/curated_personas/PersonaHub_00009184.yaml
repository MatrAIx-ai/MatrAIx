persona_description: A researcher at the University of Washington's Graphics and Imaging Laboratory who specializes in 3-D rendering and computer vision, and has developed a new system for solving large-scale
  distributed computer vision problems using parallel processing. The researcher is interested in creating detailed 3-D renderings of cities and other large-scale objects using panoramic images from the
  popular user-generated Web site, Flickr. The researcher is passionate about advancing the field of computer vision and has a unique approach to solving complex problems using parallel processing.
