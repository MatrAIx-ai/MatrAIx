personas:
  professional: Alyson Blackmon, a two‑year‑old imaginative builder, spends hours arranging colorful blocks into intricate structures, showcasing early spatial reasoning and a spontaneous refusal to follow
    preset instructions, while they quietly observe peers before asserting their own creative vision.
  sports: Alyson Blackmon, a two‑year‑old who gleefully dashes after butterflies in the spring and splashes in the community pool during summer, they avidly watch the nearby professional baseball team the
    Chicago Cubs on television with parents and attend a weekly toddler gymnastics class at the Little Sprouts Play Club, showcasing a natural, unstructured love for movement and budding team enthusiasm.
  arts: Alyson Blackmon, a two‑year‑old who splashes finger paint while humming along to the catchy ‘Baby Shark’ by Pinkfong and enjoys the gentle storytelling of Studio Ghibli’s My Neighbor Totoro, they
    weave a vivid imaginative world that colors their playtime and early sense of beauty.
  travel: Alyson Blackmon, a two‑year‑old who has already enjoyed a road‑trip to the family’s countryside farm in Iowa and a sunny weekend at Clearwater Beach, Florida, they now look forward to a family
    vacation at Disneyland Resort in Anaheim, California, and whimsically imagine a future visit to the Eiffel Tower in Paris, France.
  culinary: Alyson Blackmon, a two‑year‑old who adores the cheesy stretch of a classic macaroni‑and‑cheese, delights in banana slices drizzled with honey, prefers soft peaches and sweet potato puree, but
    consistently refuses green beans and occasionally messes up a peanut‑butter‑and‑jelly sandwich by smearing too much honey, they showcase a budding palate marked by selective sweetness and texture.
  core: Alyson Blackmon, a two‑year‑old whirlwind of imagination, they build towering block castles, hoard shiny pennies in a pink piggy bank, rebel against nap time with spirited tantrums, and navigate
    toddler life with a quiet curiosity punctuated by bursts of assertive play.
