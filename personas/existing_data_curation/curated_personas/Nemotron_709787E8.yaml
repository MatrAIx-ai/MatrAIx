  hobbies: '[''gardening'', ''knitting'', ''quilting'', ''reading historical fiction'', ''walking/hiking'', ''birdwatching'', ''church and community events'', ''animal shelter volunteering'']'
  career_goals: Although retired from formal employment, Frances aims to deepen her impact as a community volunteer. She hopes to lead a senior‑focused outreach program that pairs older adults with younger
    mentors, organize a neighborhood garden that supplies fresh produce to the local food pantry, and develop a support group for seniors dealing with anxiety and stress. Additionally, she dreams of compiling
    a small oral‑history book that captures the stories of longtime residents in Columbia, preserving the town’s heritage for future generations.
