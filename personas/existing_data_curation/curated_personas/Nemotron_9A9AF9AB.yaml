personas:
  professional: A tech‑savvy communications specialist, Sabrina Harpel blends a solid STEM foundation with polished public‑relations expertise, crafting data‑driven narratives and crisis‑ready messaging
    while leveraging meticulous project planning, assertive negotiation, and a knack for translating complex concepts into compelling stories for diverse audiences.
  sports: A dedicated runner and community sports enthusiast, Sabrina Harpel leads a weekend running group that trains for the Boston Marathon, follows the New England Patriots and Boston Celtics avidly,
    and participates in a local intramural soccer league during the summer, balancing competitive spirit with a love for group camaraderie.
  arts: An avid culture vulture, Sabrina Harpel attends contemporary exhibitions featuring artists like Ai Weiwei at the Institute of Contemporary Art, enjoys indie‑music shows headlined by bands such as
    Fleet Foxes, and frequently watches off‑Broadway productions like 'Hadestown', letting these experiences fuel their creative storytelling at work.
  travel: A curious explorer with a penchant for artisanal experiences, Sabrina Harpel frequently weekend‑trips to Portland’s food trucks and the fall foliage of Vermont, while also planning biennial overseas
    adventures to Kyoto’s seasonal festivals and Barcelona’s modernist architecture, favoring curated itineraries that blend culinary discovery with local arts scenes.
  culinary: A kitchen experimenter, Sabrina Harpel loves cooking dishes like kimchi‑infused tacos, saffron‑paella risotto, and matcha panna cotta, often sourcing gochujang, truffle oil, and exotic spices
    from farmer’s markets to blend global flavors into avant‑garde meals for friends.
  core: A disciplined, art‑loving communicator, Sabrina Harpel merges meticulous strategy with spontaneous creativity, juggling relentless campaign deadlines, marathon training, and experimental cooking,
    all while occasionally over‑scheduling and needing a strong espresso to keep pace.
background:
  cultural: Sabrina grew up in a middle‑class New England family in the Greater New Haven area, where education, community engagement, and self‑reliance are strongly valued. Her parents, a former engineering
    consultant and a high‑school science teacher, nurtured her curiosity about technology and the arts. She regularly participates in local cultural traditions, such as the annual Farm‑to‑Table festival,
    community theater productions, and volunteer clean‑up events, reflecting a blend of suburban New England sensibilities and a forward‑looking, inclusive outlook.
attributes:
  skills: '[''Strategic Communications Planning'', ''Technical Writing'', ''Media Relations'', ''Social Media Management'', ''Content Creation'', ''Crisis Communication'', ''Data‑Driven Analytics'', ''Project
    Management'', ''Event Planning and Execution'', ''Public Speaking and Presentation'']'
  hobbies: '[''Visiting Contemporary Art Galleries'', ''Attending Indie Music Concerts'', ''Running with a Community Group'', ''STEM Mentorship Volunteering'', ''Urban Photography'', ''Cooking Experimental
    Fusion Recipes'', ''Traveling to Art and Food Festivals'', ''Reading Speculative Fiction'']'
  career_goals: Sabrina aims to become a senior communications leader within a technology‑focused organization, where she can shape narrative, drive brand reputation, and champion science communication
    to broader publics. In the next five years she plans to earn a master's degree in strategic communication or an MBA to complement her technical background, take on increasingly complex account leadership,
    and eventually transition into a director‑level role overseeing integrated PR, digital marketing, and corporate social responsibility initiatives. She also aspires to mentor emerging women professionals
    in STEM‑related communications.
