  career_goals: She aims to deepen her involvement in community service by leading a local senior‑support program, mentoring younger volunteers, and eventually launching a small neighborhood gardening co‑op
    that provides fresh produce and educational workshops. Kalyn also hopes to travel to historic sites in the U.S. and write a memoir of her life lessons.
