personas:
  professional: Jessica Waxler, a retired bookkeeping assistant turned community champion, uses their meticulous spreadsheet skills and methodical problem‑solving to oversee the town‑wide senior wellness
    program, expand the volunteer‑run community garden, and steer the Macon County historical society board with a pragmatic yet curious mindset.
  sports: Jessica Waxler follows the local high school Mustangs football team and the St. Louis Cardinals, participates in a weekly walking club on county nature trails, and joins the senior bowling league
    at the community recreation center whenever the schedule permits.
  arts: Jessica Waxler spends evenings quilting intricate patterns inspired by classic regional motifs, attends community‑theater productions of classic American plays, and finds comfort in the folk melodies
    of Pete Seeger and the watercolor scenes of Grant Wood, all of which nourish their quiet creative spirit.
  travel: Jessica Waxler enjoys day trips to the historic county fairgrounds in Decatur, annual visits to Amish country in Ohio to sample farmhouse meals, and dreams of a pilgrimage to the castles of Scotland
    once their volunteer commitments ease.
  culinary: Jessica Waxler loves baking seasonal pies—apple with a lattice crust, peach with almond crumble, and pumpkin with nutmeg—while cultivating heirloom tomatoes for fresh bruschetta, and they often
    trade recipes at the church potluck where butter‑rich chicken pot pie is a perennial favorite.
  core: Jessica Waxler is a detail‑obsessed, community‑driven senior who balances meticulous organization with a skeptical edge, a propensity for worry, and a love for gardening and quilting that keeps
    them grounded.
background:
  cultural: Jessica was raised in a close‑knit, predominantly white Midwestern community near Illiopolis, Illinois. Her family traces its roots to German and Irish immigrants who settled the region in the
    early twentieth century, and she grew up with the values of self‑reliance, modesty, and neighborly responsibility typical of rural Illinois. A lifelong member of a United Methodist congregation, she
    participated in church socials, potlucks, and seasonal festivals that reinforced a sense of belonging. The local agricultural calendar, county fairs, and school events shaped her worldview, fostering
    an appreciation for hard work, community service, and the simple pleasures of small‑town life.
