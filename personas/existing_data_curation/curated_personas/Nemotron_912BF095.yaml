  hobbies: '[''gardening'', ''vegetable gardening'', ''heirloom seed cultivation'', ''quilting'', ''genealogy research'', ''historical fiction reading'', ''puzzle solving'', ''library volunteering'', ''community
    theater attendance'', ''birdwatching'', ''baking'']'
  career_goals: Although retired from paid employment, Jessica is determined to stay active in her community. She hopes to lead a town‑wide senior wellness program, expand the local community garden, and
    serve on the Macon County historical society board. She also plans to complete a bachelor's degree in American history through online courses, write a memoir documenting her family's Midwestern roots,
    and obtain a certification in senior caretaking to volunteer at the local assisted‑living facility. Financial security remains important, so she aims to refine her investment strategy and ensure her
    savings can support charitable giving.
