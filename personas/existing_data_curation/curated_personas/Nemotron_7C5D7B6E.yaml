  hobbies: '[''Book club'', ''Line dancing'', ''Gardening'', ''Knitting'', ''Crocheting'', ''Quilting'', ''Crossword puzzles'', ''Bridge'', ''Road trips'', ''Volunteer mentorship'']'
  career_goals: Although retired, Frances remains focused on contributing to her community. She aims to expand the senior center's intergenerational storytelling program, document oral histories of local
    Irish‑American families, and publish a memoir of her life experiences. She also wishes to maintain her health through regular fitness classes and to travel to Ireland for a family heritage pilgrimage.
    Another ambition is to mentor a younger volunteer committee to ensure continuity of community projects and to foster leadership among the next generation of seniors.
