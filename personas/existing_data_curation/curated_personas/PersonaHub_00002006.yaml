persona_description: A historian of indigenous cultures, particularly those of the Arctic and the North American indigenous peoples. She is interested in the social, economic, and cultural practices of
  these peoples and how they have adapted to the harsh and isolated environment. She is knowledgeable about the religious and mythological beliefs of the Eskimo and has a deep understanding of the complex
  social organization and law of the Eskimo. She is also interested in the history of the Eskimo and their interactions with other indigenous peoples.
