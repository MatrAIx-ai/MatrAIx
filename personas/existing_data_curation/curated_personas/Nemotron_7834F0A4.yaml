personas:
  professional: Eliezer Cruz, a 54‑year‑old veteran of commercial cleaning, channels their curiosity and methodical reliability into running green‑focused facility upkeep operations—using bilingual communication
    to train crews, meticulously logging maintenance, ensuring OSHA compliance, and strategically positioning themselves for a supervisory role as they pursue Certified Facility Manager credentials.
  sports: Eliezer Cruz, an enthusiastic participant in the Austin Recreation Center’s community soccer league, fuels their love of the game by cheering on Austin FC in MLS matches, maintaining a disciplined
    fitness routine that includes early‑morning jogs around Lady Bird Lake during the colder months, and they always finish each session with a stretch.
  arts: Eliezer Cruz, a regular at Austin’s downtown live‑music venues, finds inspiration in the soulful guitar riffs of Gary Clark Jr., the eclectic sounds of St. Vincent, and the storytelling of the Texas
    Tenors, often weaving those rhythms into their own kitchen playlists while cooking, and they sometimes try to replicate a guitar solo on a kitchen table.
  travel: Eliezer Cruz, who values both adventure and family time, prefers weekend getaways to nearby Hill Country wineries and the rugged trails of Big Bend, while aspiring to explore the culinary markets
    of Oaxaca and the historic streets of Seville once they secure a stable consulting income, and they plan each trip with a spreadsheet of must‑see spots.
  culinary: Eliezer Cruz, an adept home cook, reimagines classic tacos al pastor and chiles en nogada with quinoa‑based fillings and garden‑fresh salsa verde, skillfully balancing bold chilies and herbs
    they've cultivated, and they enjoy hosting dinner gatherings where friends sample their healthier twists on traditional dishes.
  core: Eliezer Cruz, a detail‑obsessive green‑cleaning veteran who color‑codes cleaning logs, blends that same precision into backyard herb experiments, weekend soccer, and inventive, health‑first Mexican
    cooking, all while quietly maneuvering toward a sustainable facilities‑management career, and they often find themselves humming the tunes of their favorite live‑music acts.
background:
  cultural: Eliezer grew up in a bicultural Mexican‑American household in Central Texas, speaking Spanish at home while attending an English‑language public school. Family gatherings, Catholic traditions,
    and celebrations such as Día de los Muertos and Cinco de Mayo remain important parts of his life. He maintains strong ties to the local Mexican community in Pflugerville, participating in cultural festivals
    and supporting neighborhood Hispanic businesses. At the same time, his years of living in the Austin area have blended his heritage with the broader Texan ethos of independence and innovation, shaping
    a work ethic that values both reliability and openness to new ideas.
attributes:
  skills: '["Commercial cleaning","Floor care and buffing","Green cleaning practices","Equipment operation","Inventory management","OSHA safety compliance","Bilingual communication (Spanish/English)","Minor
