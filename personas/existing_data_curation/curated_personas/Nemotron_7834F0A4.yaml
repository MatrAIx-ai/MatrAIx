  hobbies: '["Community soccer","Live music concerts","Mexican cooking and recipe experimentation","Backyard gardening (herbs, chilies)","Youth mentorship volunteering"]'
  career_goals: Eliezer aims to transition from a floor‑level janitor to a supervisory or facilities‑management role within the next three to five years. He plans to complete a Certified Facility Manager
    (CFM) credential and acquire additional certifications in HVAC basics and green building standards. His long‑term ambition is to become the lead facilities coordinator for a mid‑size office complex
    in the Austin metro area, overseeing a team, optimizing sustainability initiatives, and eventually launching his own small cleaning‑services consultancy that emphasizes environmentally‑responsible practices.
