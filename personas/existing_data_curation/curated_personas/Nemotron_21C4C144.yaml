  career_goals: Low aims to pursue a degree in visual arts or communications at a community college or university, building on his artistic talents and interest in storytelling. In the short term, he hopes
    to secure an internship with a local creative agency or community organization where he can apply his design and photography skills. Over the next five years, he envisions working as a graphic designer
    or social media strategist for nonprofit groups focused on youth empowerment and mental health awareness, using his art to spark dialogue. Ultimately, Low aspires to launch a community art space in
    Columbia that offers workshops, exhibits, and counseling programs for young people, merging his creative passion with his desire to support his community.
