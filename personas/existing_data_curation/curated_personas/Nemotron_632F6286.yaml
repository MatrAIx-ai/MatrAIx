  career_goals: William dreams of becoming a builder or engineer who designs and constructs things that help people, such as bridges, playgrounds, or even space rockets. He often talks about being "a real‑life
    LEGO master" and likes the idea of creating something useful that follows clear rules. He also expresses admiration for firefighters, seeing them as organized helpers who protect the community. His
    competitive streak fuels his ambition to be the top student in his preschool class and to win the upcoming school spelling bee, while his practical side makes him think about how his future work could
    solve everyday problems.
