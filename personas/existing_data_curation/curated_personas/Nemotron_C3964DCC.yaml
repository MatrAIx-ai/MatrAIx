    "Community beach clean‑up participation"]'
  career_goals: Titus aims to turn his sociable, performance‑driven personality into a career as a digital content creator. He plans to grow a YouTube channel and a Twitch stream that blend gaming commentary,
    comedic sketches, and teen‑life topics, eventually monetizing through sponsorships, merch, and ad revenue. He also hopes to host a youth‑focused podcast or school‑based radio segment that interviews
    peers about trends, school experiences, and local culture. Long‑term, he envisions attending a college program in communications, media studies, or digital journalism, and working as a producer or on‑air
    personality for a youth‑oriented media outlet. In parallel, he wants to earn leadership roles such as captain of his high‑school basketball team or a lead actor in the drama club to further develop
    his public‑speaking and teamwork abilities.
