personas:
  professional: Titus Dote, a 14‑year‑old competitive gamer and emerging livestream content creator, combines a tight‑but‑flexible streaming schedule with the quick‑wit improv learned in drama club to keep
    viewers hooked, yet their laid‑back attitude toward schoolwork often leads to missed streams and last‑minute content bursts; they thrive on the spotlight, use analytical game strategies as a practical
    skill, and remain skeptical of sponsorship offers until clear value is demonstrated.
  sports: Titus Dote dribbles at the local coastal park as a member of the Youth Basketball League’s after‑school program, idolizing the NBA’s Golden State Warriors and mimicking Stephen Curry’s three‑point
    drills during pickup games, yet they sometimes skip warm‑ups for an extra round of Fortnite; they channel their competitive spirit onto the court, rallying friends with loud encouragement, but their
    worry about performance can lead to occasional over‑thinking of plays.
  arts: 'Titus Dote crafts bite‑sized comedic sketches for TikTok, weaving in pop‑culture nods from Marvel’s Spider‑Man comics and the punchy editing style of popular creator Charli D’Amelio, while performing
    improv scenes with their school drama club and strumming acoustic renditions of Ed Sheeran’s Shape of You on a battered guitar; they relish audience reaction, using the stage as an outlet for stress,
    and they regularly binge graphic novels like Batman: Year One and The Invincible for inspiration.'
  travel: Titus Dote prefers short‑term, parent‑organized trips that blend excitement with safety, such as the family’s weekend road‑trip to Santa Cruz’s boardwalk, a summer visit to Disney World in Orlando,
    and an annual beach‑cleanup excursion to nearby Pismo Beach; they daydream about attending the Tokyo Game Show to meet e‑sports pros, yet their travel plans often emerge last‑minute, driven by friends’
    suggestions and limited by school schedules and a modest allowance.
  culinary: Titus Dote favors quick, high‑energy meals that fuel marathon gaming sessions, regularly ordering pepperoni pizza with extra cheese, whipping up chicken tacos topped with fresh avocado and salsa,
    and slurping instant ramen seasoned with sriracha; they’ve learned to grill a simple cheeseburger on the backyard grill from a YouTube tutorial, yet they habitually forget to clean the dishes and may
    let leftovers sit out too long, trusting a sibling to handle the eventual cleanup.
  core: Titus Dote is a highly sociable teen who balances a fierce competitive streak in gaming and basketball with a creative buzz from drama and TikTok, all while wrestling with occasional anxiety and
    a penchant for spontaneous spending.
background:
  cultural: Titus grew up in East Falmouth, a coastal community on Cape Cod in Barnstable County, Massachusetts. The town is primarily middle‑class and white, with many families tracing ancestry to Irish,
    English, and Italian immigrants—typical of New England's historical settlement patterns. Local culture emphasizes community involvement, seasonal tourism, and a close connection to the Atlantic Ocean.
    Annual events such as Fourth of July fireworks on the harbor, summer fairs, and high‑school sports rivalries shape his social world. The public school system encourages both academic achievement and
    participation in extracurriculars like sports and performing arts, providing Titus with outlets for his competitive and sociable nature. Proximity to the ocean exposes him to sailing, marine life, and
    beach activities, while the town’s modest, pragmatic values reinforce his practical mindset. This blend of tight‑knit community, New England independence, and seasonal coastal life informs his everyday
    experiences and aspirations.
