personas:
  professional: Jordan Howard is a budding junior robotics enthusiast who leads their school's LEGO robotics club, applying their love for routine, practical problem-solving, and collaborative teamwork
    to design competition-ready bots.
  sports: Jordan Howard devotes afternoons to playing flag football and pickup basketball at the neighborhood park, emulating the Houston Texans' defensive tactics and the Houston Rockets' fast-break style,
    while also participating in their school's track-and-field club for cross-country runs during the fall season.
  arts: Jordan Howard channels creativity through building intricate LEGO models and tinkering with Arduino robots while regularly streaming music by Imagine Dragons and Billie Eilish, and they enjoy Saturday
    movie marathons of Pixar films like 'Toy Story' and Netflix series such as 'Stranger Things', which shape their imaginative downtime.
  travel: Jordan Howard prefers structured weekend getaways, often joining family fishing trips to Galveston Bay and day trips to the Houston Museum of Natural Science, while they dream of a summer vacation
    to Orlando's theme parks and a future school-organized cultural exchange in Tokyo, balancing excitement with parental budgeting.
  culinary: Jordan Howard favors casual comfort foods like pepperoni pizza and chicken nuggets, but also enjoys helping their family grill fresh snapper from Galveston Bay seasoned with lime, cilantro,
    and chili, and they have a budding skill for assembling DIY LEGO-shaped cookie dough, reflecting a hands-on yet simple approach to cooking.
  core: Jordan Howard is a routine-loving, socially-driven teen who balances competitive gaming marathons with hands-on LEGO robotics, yet they often forget to finish homework before late-night Fortnite
    sessions.
background:
  cultural: Jordan grew up in a middle‑class, predominantly White neighborhood in Baytown, Texas, a city nestled along the Houston Ship Channel. His family follows Southern Baptist traditions, attending
    church regularly and participating in community events such as church picnics and local Fourth of July fireworks. The cultural rhythm of the Gulf Coast—seafood cookouts, high‑school football Fridays,
    and the presence of petrochemical plants—shapes his outlook. He enjoys the regional love for barbecues, country music, and the informal hospitality of neighbors. The proximity to the oil and maritime
    industries has fostered an appreciation for practical trades, while the city's multicultural environment offers exposure to Hispanic and African‑American neighbors, expanding his social perspective.
