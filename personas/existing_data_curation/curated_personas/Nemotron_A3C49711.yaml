    "Fishing on Galveston Bay"]'
  career_goals: Jordan dreams of a career that blends hands‑on work, teamwork, and service to his community. He is drawn to the idea of becoming a firefighter, attracted by the clear training pathways,
    the camaraderie of a station crew, and the chance to protect people. He also hopes to attend a technical college after high school to study diesel mechanics or marine engineering, with the ultimate
    goal of working on the Gulf Coast's shipping or oil‑rig support vessels. He sees these paths as practical, stable, and aligned with his love for routine and responsibility.
