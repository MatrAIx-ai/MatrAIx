  career_goals: Christina aims to achieve journeyman certification within the next two years and eventually become a foreman overseeing a dedicated crew on residential and historic‑preservation projects
    in the Chautauqua region. She plans to launch her own small carpentry business that emphasizes high‑quality renovations and the restoration of early‑20th‑century homes, leveraging her love of routine
    and practical craftsmanship. Additionally, she hopes to mentor other women entering the trades, establishing a local apprenticeship program that reflects her competitive drive to be a respected leader
    in her field.
