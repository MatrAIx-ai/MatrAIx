  career_goals: Although officially retired, Joseph hopes to leave a lasting educational legacy by documenting his teaching methods in a handbook for novice STEM instructors and by volunteering as a mentor
    for new teachers at the local school district. He also aspires to continue offering occasional small‑group workshops on basic physics and everyday engineering for seniors at the community center, and
    to contribute his personal collection of lesson plans and laboratory manuals to the Syosset public library.
