  career_goals: Raul aspires to a career that lets him give back to his community. He imagines becoming a bilingual teacher or a community health worker who can bridge cultural gaps and support families
    like his own. He also thinks about working in youth mentorship, perhaps running an after‑school program that combines academic help, sports, and cultural activities. To reach these goals, he plans to
    stay focused on school, aim for a high school diploma, pursue a degree in education or social work, and stay involved with local community organizations.
