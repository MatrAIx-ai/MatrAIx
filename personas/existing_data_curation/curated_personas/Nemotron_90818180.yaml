personas:
  professional: Raul Perezbrito is a budding coder and game designer who blends a love for LEGO engineering with Scratch programming to craft interactive stories and simple games, and they apply a methodical
    yet flexible mindset to turn imaginative ideas into functional prototypes.
  sports: Raul Perezbrito eagerly plays midfield for the Northside Thunderbirds school soccer team, joins informal neighborhood matches after class, and roots for professional clubs such as Manchester United
    and the Chicago Cubs, illustrating a passionate commitment to team sports and community involvement.
  arts: Raul Perezbrito expresses creativity by drawing comic strips featuring original superheroes, listening to Banda El Recodo and Los Tigres del Norte while experimenting on a small keyboard, and immersing
    themselves in the vivid visual storytelling of the animated series Adventure Time, which together shape a colorful artistic identity.
  travel: Raul Perezbrito loves weekend family road trips to Grand Canyon National Park and the coastal town of Santa Cruz, prefers loosely planned itineraries that allow spontaneous ice‑cream stops, and
    dreams of exploring the historic streets of Barcelona during a future school abroad program, reflecting a blend of adventure and relaxed travel style.
  culinary: Raul Perezbrito delights in making fresh guacamole with avocados, lime, and cilantro, assembling tacos with seasoned carne asada and fresh salsa, and helping fold masa for tamales on special
    occasions, showing a beginner‑to‑intermediate cooking skill set and a genuine enthusiasm for flavors that celebrate family traditions.
  core: Raul Perezbrito blends a structured, practical mind with a playful, spontaneous spirit, turning LEGO bricks and Scratch code into daily adventures while occasionally forgetting to tidy their room.
background:
  cultural: Raul was born and raised in Riverside, California, to Mexican immigrant parents. He grew up in a bilingual household where Spanish is spoken daily, and he celebrates Mexican holidays such as
    Día de los Muertos, Cinco de Mayo, and Las Posadas with his extended family. His community includes a strong Hispanic presence; he participates in local cultural festivals and attends the Riverside
    County Hispanic Heritage Celebration. Mexican cuisine, music, and family gatherings are integral parts of his life, while he also embraces typical American customs like Halloween and school sports events.
    This bicultural upbringing shapes his identity, values, and aspirations.
