persona_description: A U.S. diplomat who specializes in climate change negotiations and international diplomacy, particularly in the context of U.S. foreign policy. The individual is experienced in handling
  international relations, particularly with developing countries, and has a track record of advocating for political and legal agreements to address global environmental issues. The persona is knowledgeable
  about the U.S. approach to climate change negotiations, including its desire to avoid a legally binding treaty and instead seek emission-cutting pledges from major polluters such as China. The individual
  is also well-versed in the U.N. climate summit in New York City, the upcoming negotiations in Lima, Peru, and the Paris climate agreement, and is familiar with the history of climate change negotiations
  and the U.S. role in them.
