  hobbies: '[''plein‑air painting'', ''canvas painting'', ''art history reading'', ''philosophy reading'', ''book club'', ''gardening'', ''hiking'', ''DIY woodworking'', ''cooking Southern cuisine'', ''volunteering
    with Habitat for Humanity'', ''meditation'', ''watercolor sketching'']'
  career_goals: Melissa aims to launch her own boutique decorative‑painting business in Charlotte that specializes in high‑end residential renovations, custom art installations, and heritage‑home restoration.
    She seeks certification as a Decorative Finish Specialist and plans to develop a proprietary line of low‑VOC paints that blend sustainability with vibrant, novel color palettes. She aspires to create
    a mentorship program to support women in the skilled trades, teach part‑time courses at the local community college, and lead community restoration projects through Habitat for Humanity. Long‑term,
    she envisions opening a small studio/gallery where she can exhibit her own abstract murals and host intimate art workshops.
