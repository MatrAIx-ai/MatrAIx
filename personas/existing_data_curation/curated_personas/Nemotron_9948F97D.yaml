  skills: '[''Truck driving'', ''Vehicle maintenance'', ''Route planning'', ''Customer service'', ''Sales negotiation'', ''Logistics coordination'', ''Safety compliance'', ''Basic bookkeeping'']'
  hobbies: '[''Fishing'', ''Woodworking'', ''Reading historical non-fiction'', ''Model car building'', ''Gardening'', ''Birdwatching'', ''Watching vintage movies'']'
  career_goals: Jimmy aims to maintain a stable, predictable income as he approaches retirement while gradually transitioning to a supervisory or dispatch role that leverages his experience without the
    physical demands of long‑haul driving. He hopes to eventually secure a small owner‑operator business to provide for his family and mentor younger drivers, and he prioritizes financial security for his
    children's education and his own retirement.
