  career_goals: He dreams of becoming a professional soccer player for his local youth league and eventually a champion on a college team, channeling his energetic and competitive nature. At the same time,
    he is fascinated by how things are built and hopes to study engineering so he can design playgrounds and fun spaces for kids in Laredo. He also imagines helping others as a community volunteer, perhaps
    as a future firefighter or a bilingual teacher, reflecting his desire to contribute reliably and methodically.
