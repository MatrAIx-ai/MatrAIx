personas:
  professional: Juvier Haidar is a budding junior soccer enthusiast who treats the neighborhood field like a training ground, applying methodical dribble drills and team strategies while also mastering
    LEGO construction with step‑by‑step precision, showcasing an early blend of athletic coordination and engineering curiosity.
  sports: Juvier Haidar is a spirited little striker who spends afternoons at the local soccer field, idolizing the hometown club City FC and mimicking their number 9’s moves, while also joining a community
    after‑school mini‑league that balances competition with fun.
  arts: Juvier Haidar is an imaginative LEGO architect and cartoon doodler who devours adventure books by Chris Bradley and reads Spanish translations of the same stories, while drawing comic‑style heroes
    inspired by classic animator Tex Avery and swapping designs with friends during playdates.
  travel: Juvier Haidar is an inquisitive explorer who loves weekend trips to the nearby nature reserve, where they catalog insects with a pocket magnifier, and dreams of one day touring the historic castle
    in Barcelona after seeing pictures in a picture book.
  culinary: Juvier Haidar is a junior kitchen assistant who enjoys helping with festive cooking, especially preparing a fresh avocado dip with a squeeze of lime, and proudly assembles LEGO‑shaped fruit
    kebabs for snack time, often favoring crunchy carrot sticks and cheesy toast bites.
  core: Juvier Haidar is a bright, organized six‑year‑old whose curiosity fuels a competitive edge in soccer, LEGO building, and reading, while their skeptical streak keeps them questioning teammates’ tactics
    and adults’ promises.
background:
  cultural: Juvier is raised in a bilingual Mexican‑American household in Laredo, Texas, where Spanish and English are spoken at home and school. His family maintains strong ties to Mexican traditions,
    celebrating Día de los Muertos, Las Posadas, and Mexican Independence Day with food, music, and community gatherings. The border city’s cultural blend exposes him to both Texan and Mexican influences,
    shaping his identity with a love for mariachi music, tacos, and local soccer culture. Family values of respect, hard work, and communal support guide his everyday interactions.
