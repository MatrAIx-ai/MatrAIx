persona_description: A scientist working on Alzheimer's research, particularly focused on Down syndrome and its connection to Alzheimer's. He is part of a team at the Linda Crnic Institute for Down Syndrome
  at the University of Colorado – Anschutz Medical Campus, funded by the Global Down Syndrome Foundation. He has recently concluded trials on mice into a cure for Alzheimer's and is cautiously optimistic
  about the research's potential. He is interested in finding a cure for Alzheimer's and is seeking clinical trial participants with no other medical issues aside from Alzheimer's disease.
