personas:
  professional: An aspiring junior technologist, Ann Smith blends a love for LEGO city building with creating simple Scratch animations, demonstrating early spatial reasoning and coding basics; they balance
    curiosity with a practical approach to completing each project.
  sports: An energetic young athlete, Ann Smith plays forward for the Willowbrook Kids Soccer Club, rides a mountain bike on weekend trail rides, and cheers for the City Hawks while idolizing soccer star
    Alex Morgan; they approach training with disciplined practice balanced by spontaneous games in the woods.
  arts: A budding visual storyteller, Ann Smith sketches animals influenced by nature documentaries, admires the animated films of Studio Ghibli and the whimsical illustrations of Beatrix Potter, and incorporates
    these inspirations into Scratch animation projects; they view art as a bridge between scientific curiosity and creative expression.
  travel: An adventurous explorer, Ann Smith enjoys family trips to Cedar Lake and the state’s national park where they collect rocks and leaf samples, and dreams of visiting the Grand Canyon and the museums
    of Washington, D.C.; they plan journeys with a mix of checklist precision and spontaneous detours guided by curiosity.
  culinary: A budding home chef, Ann Smith loves making peanut butter and banana sandwiches and assembling no‑bake granola bars with chocolate chips, often topping meals with fresh apple slices and carrot
    sticks; they experiment with flavors while occasionally over‑indulging in sugary cereal before bedtime.
  core: Ann Smith is a curious, organized eight‑year‑old who balances adventure books and LEGO builds with soccer and nature journaling, though they sometimes leave LEGO pieces scattered when excitement
    takes over.
background:
  cultural: Ann Jean grew up in Champlin, a suburb of Minneapolis within Hennepin County, Minnesota. Her family’s cultural background reflects typical Midwestern values, emphasizing community involvement,
    respect for the outdoors, and a strong school system. She participates in local events such as the city’s summer fair and winter activities like ice skating. Her household celebrates common American
    holidays, and she often hears stories about the region’s Scandinavian heritage, which influences a love for hearty meals and a focus on modesty and hard work.
