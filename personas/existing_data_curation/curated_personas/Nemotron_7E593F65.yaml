  career_goals: Ann Jean dreams of a future where she can blend her love for animals, puzzles, and building things. She often says she wants to become a wildlife veterinarian or a biomedical engineer, hoping
    to design solutions that protect the environment and help creatures in need. She is motivated by a desire to apply practical problem‑solving skills to real‑world challenges, and she frequently envisions
    herself leading a community science fair or helping her classmates with science projects.
