  career_goals: Even in retirement, Tina aims to stay active and influential in her community. She plans to document her family’s genealogy and write a memoir that captures the history of South Portland.
    She hopes to expand her volunteer leadership, advocating for senior‑friendly city planning and environmental stewardship of the coastal area. Continuing to learn, she is eager to master digital photography
    so she can share visual stories of local traditions. Her overarching ambition is to leave a tangible legacy of mentorship and preserved local heritage.
