personas:
  professional: Tina Ward, a retired home economics teacher turned senior‑center event coordinator, blends her expertise in coastal gardening, food preservation, and community organization to lead book
    clubs, senior volunteer schedules, and digital‑photography workshops, and they consistently apply her practical curiosity and competitive edge to keep every program running like a well‑tuned kitchen.
  sports: Tina Ward embraces low‑impact fitness by walking the waterfront trail five mornings a week, cheering the Portland Sea Dogs at their home stadium and the New England Patriots on game day, and they
    also enjoy friendly rivalry in the senior center’s weekly yoga class and occasional matches in the local senior tennis league.
  arts: Tina Ward channels their creative side through digital photography—capturing sunrise over the harbor and local historical landmarks—while knitting scarves to the rhythm of folk singer Mary Chapin
    Carpenter and attending the Portland Stage Company’s off‑Broadway productions, often quoting poet Robert Lowell during book club discussions.
  travel: Tina Ward’s travel style blends nostalgic road trips to Boston’s Freedom Trail, seasonal cruises to Bar Harbor’s Acadia National Park, and occasional winter escapes to Savannah, Georgia, where
    they balance careful itinerary planning with spontaneous detours to local farmers markets, all funded from their modest travel savings.
  culinary: Tina Ward’s culinary repertoire features a signature lobster bisque simmered with local sea salt, fresh thyme, and a splash of sherry, alongside handmade blueberry pies and fermented pickled
    cucumbers, reflecting their seasoned New England palate, comfort cooking at home, and occasional experiments with sous‑vide techniques they discovered online.
  core: Tina Ward is a fiercely organized, socially vibrant 76‑year‑old who blends their love of coastal gardening, competitive bridge, and digital storytelling into a legacy of community mentorship and
    culinary tradition.
background:
  cultural: Tina grew up in a middle‑class White family in South Portland, Maine, where the Atlantic coastline and its fishing heritage shaped daily life. The local culture emphasized self‑reliance, community
    solidarity, and reverence for tradition, balanced by an inquisitive appreciation for new ideas. She attended the public high school in her hometown and has remained deeply involved in the community
    church, senior‑center activities, and the regional historical society. Seasonal events like the Lobster Festival, Fourth of July parades, and winter charity drives are integral to her sense of place,
    reinforcing a lifelong connection to New England’s modest, hardworking spirit.
