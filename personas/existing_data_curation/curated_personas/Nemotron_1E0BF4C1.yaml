  hobbies: '[''Reading historical fiction'', ''Gardening (succulents and native plants)'', ''Yoga and mindfulness meditation'', ''Cooking Mediterranean cuisine'', ''Volunteering at local soup kitchen'',
    ''Community garden participation'', ''Exploring coastal coffee shops'', ''Walking on Fort Lauderdale beaches'', ''Attending small art gallery openings'', ''DIY home decor projects'']'
  career_goals: Danielle aspires to move into a senior sales leadership role where she can mentor junior reps and shape a customer-centric sales culture. Over the next five years she aims to become a Sales
    Manager or Director of Service Solutions, spearheading the development of a mentorship program that emphasizes empathy and teamwork. She also hopes to earn a certification in advanced sales analytics
    to bring more data-driven insight to her team, while maintaining a balanced schedule that allows quality time with her family and community volunteering.
