personas:
  professional: Gregory Thomas is a budding LEGO architect whose methodical mind and love for organized planning turn every block into a miniature engineering project; they chart step‑by‑step builds and
    dream of one day designing real‑world structures or coding robots.
  sports: Gregory Thomas is a lively member of the Little Rangers soccer club, dashing across the field with teammates from the neighborhood park; they also cheer for the local professional baseball team
    the Tigers and use tag games as a high‑energy cardio workout each weekend.
  arts: Gregory Thomas delights in drawing whimsical creatures inspired by Dr. Seuss and Mo Willems, flipping through picture books like "Where the Wild Things Are"; they proudly display their LEGO sculptures
    as interactive art pieces at family gatherings.
  travel: Gregory Thomas loves nature walks in Willow Creek Park, where they catalog insects and leaf shapes, and dreams of a family trip to the Grand Canyon and a weekend visit to the interactive science
    museum in Chicago, preferring itineraries that blend exploration with hands‑on learning.
  culinary: Gregory Thomas prefers comfort foods such as cheesy macaroni, peanut‑butter‑jelly sandwiches, and fruit kebabs; they enjoy mixing batter for banana muffins with Mom, but can be picky about broccoli
    and often hide extra crackers in their backpack for later.
  core: Gregory Thomas is a meticulous LEGO enthusiast who balances boundless curiosity with a shy worry streak, turning every playground game into a structured adventure while they quietly hoard tiny bricks
    for future masterpieces.
background:
  cultural: Gregory is a white American child raised in the suburban community of Henderson, Nevada. He lives in a middle‑class family that celebrates typical American holidays such as Thanksgiving, Fourth
    of July, and Halloween. He attends a local elementary school where cultural diversity is present, but his household’s traditions are rooted in mainstream U.S. culture, including weekend family meals,
    baseball games, and occasional trips to the nearby desert recreation areas. The community’s emphasis on safety, education, and community events shapes his upbringing.
