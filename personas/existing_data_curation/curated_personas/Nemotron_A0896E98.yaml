  career_goals: Phillip aims to graduate high school with solid grades in math and communication, then pursue a degree in sports management or digital media. He envisions a career that blends his love for
    teamwork, community engagement, and structured environments, such as becoming a youth sports program director, a community events coordinator, or a content creator for sports and gaming brands. In the
    short term, he hopes to gain experience through part‑time work as a lifeguard or retail associate and earn certifications like CPR, basic coaching, and advanced computer skills.
