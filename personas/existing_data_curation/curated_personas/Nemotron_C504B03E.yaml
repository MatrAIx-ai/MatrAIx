  career_goals: Deshawn aims to transition from a senior analyst role to a senior systems architect position, where he can lead the design of enterprise‑wide, AI‑enhanced infrastructure. He plans to earn
    advanced certifications such as AWS Certified Solutions Architect, Certified Information Systems Security Professional (CISSP), and possibly a PMP to broaden his project leadership capabilities. While
    he values autonomy, he is open to leading a small, high‑performance team that shares his appetite for innovative thinking. In the longer term, Deshawn envisions launching a boutique consultancy that
    merges cutting‑edge technology with user‑centric design, allowing him to pursue flexible, project‑based work while maintaining a strong personal brand in the tech community.
