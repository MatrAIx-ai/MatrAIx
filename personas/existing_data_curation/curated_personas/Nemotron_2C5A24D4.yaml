  career_goals: Hugh aims to advance from his current supervisory role to become an office manager within the next two to three years, and eventually transition into an operations manager or human resources
    manager position. He plans to complete his Bachelor of Business Administration, earn a Certified Administrative Professional (CAP) certification, and develop expertise in project management to qualify
    for a PMP credential. Long‑term, he envisions leading a multi‑departmental team in a mid‑size company where he can blend structured process improvement with a people‑focused culture, while also maintaining
    a healthy work‑life balance to manage his own stress levels.
