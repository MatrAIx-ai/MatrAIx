personas:
  professional: David Roque, a budding sandbox engineer, channels relentless curiosity and a practical eye for balance into building towering block structures, yet often abandons them mid‑construction because
    they prize spontaneous play over strict planning.
  sports: David Roque dashes around the local park’s toddler soccer field with the Little Explorers Club, idolizes the Atlanta Hawks for their fast breaks, and prefers solo runs on the playground slide
    over large group games, reflecting a competitive yet solitary sports spirit.
  arts: David Roque thrives on dance‑along sessions to lively Latin rhythms at family gatherings, imitates the playful melodies of The Wiggles and Raffi during nap time, and loves drawing bright pictures
    of cartoon heroes, weaving music and art into everyday imagination.
  travel: David Roque enjoys family road trips to the Georgia Aquarium and short flights to Orlando’s Magic Kingdom, favoring the comfort of familiar car seats and snack‑filled pit stops over lengthy itineraries,
    yet dreams of exploring a tropical beach with sand castles as tall as their block towers.
  culinary: David Roque delights in munching on soft baleadas drizzled with cheese, squeals over cheesy macaroni bites, and proudly helps stir banana‑banana pancakes, favoring sweet, comforting flavors
    while still insisting on having a separate spoon for each bite.
  core: David Roque is a curious, competitive toddler who balances spontaneous block‑building with occasional snack‑driven meltdowns, preferring small‑group play and a flexible routine over strict schedules.
background:
  cultural: David’s family preserves their Honduran heritage in Powder Springs. At home, Spanish is spoken alongside English, and family meals often feature traditional dishes like baleadas, pupusas, and
    plantain fritters. He celebrates Honduran holidays such as Día de la Independencia with music, dancing, and storytelling, while also participating in local community events like Fourth of July picnics
    and church gatherings, blending Latin rhythms with Southern cultural experiences.
attributes:
  skills: '[''stacking blocks'', ''simple shape-sorting puzzles'', ''counting to ten'', ''color identification'', ''basic crayon drawing'', ''following two-step instructions'', ''self-care (hand-washing)'',
    ''bilingual vocabulary (English & Spanish)'']'
  hobbies: '[''building block towers'', ''racing toy cars'', ''drawing with crayons'', ''listening to music (Honduran & Southern)'', ''collecting leaves and rocks'', ''watching problem-solving cartoons'']'
  career_goals: David often talks about future roles where he can shape things with his hands. He dreams of becoming a construction worker who operates big trucks, a mechanic who fixes toys, or a soccer
    player who scores the winning goal. He is determined to learn to ride a bike without training wheels and to master tying his shoe laces, seeing these milestones as steps toward greater independence
    and personal achievement.
