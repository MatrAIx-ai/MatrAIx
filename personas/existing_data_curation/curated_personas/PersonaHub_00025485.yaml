persona_description: A lawyer who specializes in international law, particularly environmental law and climate change law. They have a deep understanding of customary international law and its application
  in cases involving harm to other countries. They are interested in cases involving disputes over climate change and the impact of industrialized countries on the environment. They are likely to be familiar
  with the case of Palau's President Johnson Toribiong and the request for the International Court of Justice to determine if the "no harm rule" is applicable in the case of Palau's sinking island due to
  climate change. They are also likely to be familiar with the topic of environmental harm and its implications on the environment and human health.
