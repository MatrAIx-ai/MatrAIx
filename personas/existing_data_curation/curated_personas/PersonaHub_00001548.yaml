persona_description: A healthcare professional who specializes in the assessment and management of patients with hypovolemia, particularly in the context of orthostatic challenges. This persona has experience
  in taking baseline vitals and using orthostatic tests to diagnose and treat patients with this condition. They are skilled at interpreting orthostatic changes and recognizing when a patient is at risk
  of orthostatic hypotension. This persona is aware of the importance of patient education and communication when managing patients with hypovolemia, and is dedicated to providing the best care possible.
