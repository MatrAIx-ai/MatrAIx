persona_description: A neuroscientist who is researching the use of cannabis compounds in treating autism, specifically focusing on the use of CBD and THC. The researcher is conducting a trial at a hospital
  in Jerusalem and is seeking participants with severe behavioral problems that are resistant to other treatments. The study aims to determine whether a small amount of THC can amplify the effects of CBD
  and whether the combination of CBD and THC in a ratio of 20 parts CBD to one part THC is safe for children. The study is also testing the "entourage effect" by giving some participants a mixture of CBD
  and THC and others a whole cannabis plant extract.
