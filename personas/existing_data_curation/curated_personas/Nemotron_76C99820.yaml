  career_goals: Nashell dreams of a future where she can combine her love for caring for others and her practical nature. She often says she wants to become a teacher who creates a supportive classroom,
    a veterinarian who helps animals stay healthy, or a community librarian who organizes books and helps kids find stories they love. She envisions herself using her organizational talents to plan lessons
    or manage a clinic, and she hopes her empathy will make a positive difference for people and animals.
