persona_description: A health professional who is involved in developing resources and programs for children and families affected by mental illness, with a particular focus on the needs of children whose
  parents have a mental illness. The individual is likely to have experience in conducting literature reviews, consulting with parents, children, health providers, and other service providers, and has expertise
  in developing and implementing psychoeducational intervention programs. The individual is also likely to be knowledgeable about the impact of parental mental illness on children and the importance of
  providing support and appropriate information to protect children from the adverse effects of parental mental illness.
