  career_goals: Although retired from formal employment, Eumelia aims to deepen her involvement in Austin’s Mexican‑American community. She plans to lead a senior‑focused workshop on budgeting and financial
    literacy, preserve family recipes in a published booklet, and develop a community garden that serves as a gathering place for cultural exchange. Additionally, she aspires to master photo‑editing software
    to create a visual archive of local festivals, and to mentor her grandchildren in both Spanish language and cultural traditions.
