  career_goals: Carol aims to become an associate partner at a boutique firm that focuses on family and estate planning for Midwestern families. Over the next five years she plans to deepen her expertise
    in Michigan probate law, obtain a certification in mediation, and build a reliable client base that values consistency and practicality. She also hopes to open her own modest practice in Detroit Lakes,
    allowing her to maintain a predictable schedule that supports her marriage and reduces stress. Mentoring junior lawyers on the importance of routine and thorough preparation is a secondary ambition.
