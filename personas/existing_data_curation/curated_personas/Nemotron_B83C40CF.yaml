  hobbies: '[''Reading speculative fiction and poetry'', ''Visiting contemporary art galleries'', ''Watercolor and ink sketching'', ''Analog photography'', ''Model train building'', ''Collecting vintage
    printing equipment'', ''Woodworking'', ''Solo hiking'', ''Listening to jazz at small venues'']'
  career_goals: Leonid aims to move into a supervisory role where he can lead a press team, implement lean‑manufacturing practices, and mentor younger workers. He is interested in introducing newer digital
    printing technologies to his plant to expand service offerings, such as short‑run custom prints and specialty finishes. Long‑term, he dreams of opening a small boutique studio that produces limited‑edition
    art prints and niche publications, blending his love of craftsmanship with his curiosity for novel design concepts. To support these goals, he plans to take evening courses in graphic design and digital
    media.
