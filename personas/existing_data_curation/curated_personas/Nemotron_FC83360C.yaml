  career_goals: June often talks about wanting to become an artist who paints pictures that tell stories, a teacher who helps small groups of children learn together, and a veterinarian who cares for animals
    like the cat she loves. She is fascinated by space and sometimes imagines being an astronaut exploring new worlds. Her dreams reflect her curiosity about new ideas, her kindness toward others, and her
    desire to create harmony in the spaces she inhabits.
