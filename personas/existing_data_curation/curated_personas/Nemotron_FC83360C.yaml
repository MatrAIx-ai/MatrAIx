personas:
  professional: June Brewster is a budding junior designer who combines a natural curiosity for colors and structures with a balanced mix of organization and flexibility, allowing them to craft detailed
    LEGO creations and intricate drawings that hint at a future career in design.
  sports: June Brewster enjoys playing on the Blairstown Kids Soccer Club’s Saturday mini‑team and participates in the local Little League baseball program, while cheering for the Iowa Hawkeyes football
    team on game days, preferring low‑key, nature‑centered play over large crowds.
  arts: June Brewster spends afternoons painting cornfield vistas inspired by Eric Carle’s bright collages, singing along to Raffi’s ‘Baby Belug,’ and reenacting favorite Sesame Street skits starring Elmo
    and Big Bird, and they weave these artistic influences into their own imaginative play.
  travel: June Brewster delights in weekend trips to the nearby Iowa State Fair’s vibrant corn mazes and a family farm stay in Wisconsin, and they dream of future adventures to the Grand Canyon’s towering
    cliffs and the colorful streets of Barcelona, preferring guided family outings over crowded tourist hotspots.
  culinary: June Brewster loves a warm bowl of cheesy macaroni topped with extra cheddar and relishes fresh apple slices sprinkled with cinnamon, often helping stir batter for banana muffins and they occasionally
    scatter flour across the kitchen floor in their enthusiastic cooking attempts.
  core: June Brewster is a curious, nature‑loving six‑year‑old who blends quiet creativity with a generous heart, often losing track of time while sketching fields, hoarding stickers in a piggy bank, and
    forgetting to brush teeth before bedtime.
background:
  cultural: 'June comes from a white Midwestern family rooted in the small, close‑knit community of Blairstown, Iowa County. Her family’s lifestyle blends farm‑adjacent traditions with modern rural life:
    they celebrate holidays like Thanksgiving, Christmas, and the 4th of July with community parades, potlucks, and local fairs. Church and school events are central social gatherings, fostering a sense
    of cooperation, humility, and respect for others. The surrounding cornfields, gentle streams, and open skies shape a deep appreciation for nature and outdoor exploration. These cultural influences nurture
    June’s kindness, her preference for small‑group interactions, and her love for simple, harmonious experiences.'
