persona_description: A mechanical engineer who specializes in aerodynamics and aeroelasticity, particularly in the development and analysis of aerodynamic models and aeroelastic systems. They have a strong
  background in fluid dynamics, including the study of attached flow and the use of the conformal transformation method in aerodynamic modeling. They are familiar with the assumptions and limitations of
  linear aerodynamic models and are interested in exploring the potential for nonlinear aerodynamic models in the context of aeroelastic systems.
