  career_goals: Tamika aims to earn an OSHA 30‑hour safety certification within the next year and transition into a crew‑lead or site‑safety role where she can train younger workers and champion safe practices.
    Her long‑term ambition is to launch a part‑time community program that blends construction trade skills with neighborhood mural projects, providing mentorship and hands‑on artistic experiences for local
    youth. She also plans to build a modest retirement fund that will enable her to continue volunteering at her church, support cultural events, and pursue her love of art and community engagement.
