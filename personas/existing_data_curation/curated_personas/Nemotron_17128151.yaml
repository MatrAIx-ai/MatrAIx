  hobbies: '[''Reading historical mysteries'', ''Listening to folk‑instrumental podcasts'', ''Crocheting'', ''Gardening with native Colorado plants'', ''Bird‑watching'', ''Light hiking'', ''Low‑sugar baking'',
    ''Library volunteer work'']'
  career_goals: Christina aims to become a lead housekeeper or supervisor for a reputable cleaning service, earning a certification in green cleaning to deepen her expertise. She hopes to mentor a new generation
    of cleaners, emphasizing reliable and sustainable practices. In the longer term, she envisions launching a boutique eco‑cleaning business that allows flexible hours, giving her more time for solitary
    pursuits while securing financial stability for retirement.
