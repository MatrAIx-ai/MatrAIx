  hobbies: '[''Community Volunteering (library, food bank)'', ''Organizing Social Events (book club, women’s softball league)'', ''Gardening'', ''Hiking in Indiana State Parks'', ''Cooking and exploring
    regional recipes'', ''Traveling to nearby cities (Chicago, Nashville)'', ''Attending live music and folk festivals'', ''Yoga and group fitness classes'']'
  career_goals: Donna aims to advance into senior IT leadership, targeting a Director of Information Technology or Chief Information Officer role within a mid‑size organization that values community impact—such
    as a regional healthcare system or manufacturing firm in the Midwest. She plans to deepen her expertise in digital transformation and data‑driven decision‑making while mentoring emerging women technologists.
    In the longer term, she envisions launching a consulting practice that helps small businesses in Indiana adopt scalable technology solutions.
