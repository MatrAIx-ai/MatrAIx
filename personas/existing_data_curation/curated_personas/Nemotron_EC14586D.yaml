personas:
  professional: Donna Brust is a seasoned technology strategist with a business degree, two decades of experience translating enterprise needs into data‑driven ERP solutions, renowned for balancing curiosity
    about new tools with a pragmatic, budget‑conscious project style that earns stakeholder trust, and they consistently mentor junior staff.
  sports: Donna Brust captains a local women’s softball league, sweats through weekly yoga and HIIT classes, hikes the rugged trails of Hoosier State Parks every month, and they root for the Indianapolis
    Colts and Pacers while chanting the Chicago Cubs' rally song at the occasional festival.
  arts: Donna Brust curates a neighborhood book club that explores contemporary fiction and Southern Gothic novels, and they eagerly line up for the Chicago Blues Festival and Nashville’s CMA Fest, where
    they adore performances by artists such as John Prine, Brandi Carlile, and Jason Isbell.
  travel: Donna Brust prefers short, road‑trip getaways that mix culture and nature, planning weekend escapes to Chicago’s museum districts or Nashville’s music venues, while they budget enough to fit a
    yearly family vacation to Asheville’s Blue Ridge Mountains.
  culinary: Donna Brust mixes fresh garden harvests into hearty Midwestern staples—whipping up corn casserole, apple‑butter pork tenderloin, and sweet‑potato bisque—while they hone their sous‑vide technique
    for weekend dinner parties, though they sometimes over‑salt while multitasking on conference calls.
  core: Donna Brust blends tech‑savvy pragmatism with community‑first energy, juggling ERP projects, softball innings, and garden‑to‑table meals, all while they occasionally forget to log off and over‑indulge
    in artisanal coffee.
background:
  cultural: Donna grew up in a small Midwestern town where self‑reliance, hospitality, and a strong sense of community were core values. Her white, Midwestern heritage shaped an appreciation for modesty,
    hard work, and local traditions such as county fairs and seasonal celebrations. The cultural emphasis on practical problem‑solving and collaborative spirit informs both her professional approach and
    her active involvement in community life. As a divorced adult, she also values independence while maintaining close ties with extended family and local networks that support one another.
