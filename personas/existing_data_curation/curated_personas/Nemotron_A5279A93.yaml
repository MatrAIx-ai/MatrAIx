personas:
  professional: Luis Rada, a veteran social researcher and quantitative analyst, leverages decades of survey design expertise and bilingual fluency to translate complex data on community health into clear
    visual briefs for policymakers, while they mentor emerging scholars with a methodical, organized approach.
  sports: Luis Rada, an avid supporter of the Miami Heat, Miami Marlins, and Inter Miami, combines their love for the game with a daily stroll through Hialeah’s streets and occasional pickleball matches
    at the community center, using these activities to stay fit and socialize, and they cherish the camaraderie of the local senior sports group.
  arts: Luis Rada, a passionate aficionado of classic son and salsa, spins vintage vinyl of Benny Moré and Celia Cruz on their record player while they host informal jam sessions, and they enjoy watching
    golden‑age Cuban cinema and attending local cultural festivals that celebrate traditional music and dance.
  travel: Luis Rada, who prefers relaxed, culturally immersive trips, has explored historic Old Havana, taken a leisurely cruise to the Bahamas, and frequently visits Key West’s art districts, planning
    each journey around their garden schedule and senior‑center commitments, and they schedule trips to avoid conflict with weekly volunteer duties.
  culinary: Luis Rada, a skilled home cook, prepares comforting dishes like ropa vieja, picadillo, and café con leche using fresh cilantro, oregano, and ripe plantains harvested from their rooftop garden,
    and they delight in sharing these meals with family and neighbors during weekend gatherings.
  core: Luis Rada merges meticulous research rigor with a nostalgic love for vintage music and home‑grown cuisine, balancing disciplined mentorship and community service with occasional forgetfulness about
    medication, all while they stroll the streets of Hialeah and cheer their favorite sports teams.
background:
  cultural: Luis was born in Havana in 1942 and emigrated to the United States with his family during the early 1960s, part of the first wave of Cuban exiles who settled in Miami‑Dade County. Growing up
    in Hialeah, a city with a dense Cuban‑American population, he was immersed in the rhythms, language, and culinary traditions of his homeland while also navigating the broader American educational system.
    His bicultural upbringing equipped him with a deep sense of community responsibility and a nuanced perspective on the challenges faced by immigrant and senior populations. Over the decades, Luis has
    contributed to preserving Cuban cultural practices through community events, oral‑history projects, and mentorship of younger Cuban‑American scholars, reflecting both pride in his heritage and an adaptive,
    pragmatic outlook shaped by his experiences.
attributes:
  skills: '[''Statistical analysis'', ''Quantitative research design'', ''Survey development and administration'', ''Data visualization'', ''Report writing for policy audiences'', ''Bilingual communication
    (English/Spanish)'', ''Project management'', ''Grant writing'', ''Community outreach and stakeholder engagement'', ''Mentoring and teaching graduate students'']'
  hobbies: '[''Playing Cuban son and salsa music'', ''Cooking traditional Cuban dishes'', ''Gardening tropical herbs'', ''Reading historical non-fiction'', ''Walking in local parks'', ''Volunteering at
    community centers'', ''Participating in senior chess club'', ''Attending church services'', ''Genealogy research'']'
  career_goals: At this stage of his life, Luis seeks to leave a lasting legacy by mentoring the next generation of researchers, especially those from underrepresented backgrounds, and by producing a comprehensive
    policy brief on senior health services in Miami‑Dade County. He aims to author a memoir that weaves together his professional journey with the Cuban diaspora experience, ensuring his knowledge benefits
    both academia and the broader community. Additionally, Luis aspires to serve as a senior advisor on a local cultural heritage commission, guiding initiatives that celebrate and protect Cuban cultural
    traditions in the region.
