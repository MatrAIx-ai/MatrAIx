  hobbies: '[''Watercolor painting'', ''Salsa dancing'', ''Cooking Venezuelan cuisine'', ''Volunteering at senior centers'', ''Organizing art‑based therapeutic activities'', ''Photography of coastal landscapes'',
    ''Reading contemporary fiction'', ''Exploring nature trails'']'
  career_goals: Aurora aims to advance her healthcare career by completing a Bachelor of Science in Nursing within the next three years, with the goal of becoming a registered nurse specializing in geriatric
    and hospice care. She is also interested in earning certifications that blend art therapy with patient wellbeing, allowing her to design creative interventions for seniors. Long‑term, she hopes to lead
    community health outreach programs for Hispanic seniors in the Gulf Coast region and eventually launch a culturally responsive home‑care agency that incorporates holistic and artistic healing practices.
