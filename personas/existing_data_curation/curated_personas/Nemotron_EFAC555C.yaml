personas:
  professional: Aurora Gomez is a bilingual personal care aide in La Porte who combines meticulous care planning, vital sign monitoring, and medication reminders with vibrant watercolor‑based therapeutic
    sessions, leveraging their organized, sociable nature to champion geriatric and hospice care while pursuing a BSN.
  sports: Aurora Gomez stays active by jogging the Bayou City Trails at sunrise, playing beach volleyball at Galveston with the local co‑ed club, cheering for the Houston Astros during spring training,
    and joining a recreational soccer league that meets on Friday evenings.
  arts: Aurora Gomez fuels their creative spark through weekly watercolor workshops inspired by Frida Kahlo’s bold palettes, attends gallery openings featuring contemporary Latin American painters, and
    regularly dances to the lively rhythms of Tito Puente, while volunteering to lead art‑based storytelling sessions at senior centers.
  travel: Aurora Gomez prefers spontaneous weekend getaways that blend coastal nature hikes—like a sunrise trek on Galveston Bay Island—with cultural immersion trips to Cartagena’s historic Old Town and
    the music‑filled streets of New Orleans, always planning on a modest budget and using a travel rewards credit card for flights.
  culinary: Aurora Gomez delights in hand‑shaping fresh corn‑meal arepas stuffed with shredded beef, white cheese, and avocado, while also mastering hallacas wrapped in plantain leaves and a comforting
    bowl of Texas Gulf shrimp gumbo seasoned with cajun spice, reflecting a balanced skill set that ranges from novice home cook to confident weekend chef.
  core: Aurora Gomez is a talkative, organized soul who weaves double‑language charm, a love for watercolor and salsa, and a budding nursing career into daily acts of caregiving, often found humming folk
    tunes while meticulously prepping care plans and nightly arepas.
background:
  cultural: Aurora Maria Gomez was born to Venezuelan parents who immigrated to the United States in the early 2000s. She grew up in a bilingual household in Houston, where Spanish was spoken at home and
    English at school, giving her a deep appreciation for both cultures. Venezuelan traditions—such as celebrating Carnaval, preparing arepas with family, and listening to folk music like joropo—are integral
    to her identity. Her Catholic upbringing instilled a sense of community service, which she extends through her work and volunteerism. While adapting to life in La Porte, Aurora embraces the multicultural
    fabric of the Gulf Coast, blending Venezuelan warmth with Southern hospitality, and often shares her heritage through food, dance, and art.
attributes:
