  career_goals: Jose dreams of becoming a professional soccer player who can represent his community and possibly play for a Mexican national team, reflecting his love for the sport and his cultural pride.
    He also imagines designing and building his own video games or cartoon characters one day, combining his creative drawing skills with his interest in technology. In the short term, he aims to be the
    captain of his school’s soccer team and to help younger kids learn to read and draw, showing his emerging desire to mentor others.
