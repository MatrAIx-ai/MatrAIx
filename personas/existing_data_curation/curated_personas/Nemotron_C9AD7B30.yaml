  career_goals: Isidro aims to move into a senior supervisory role where he can lead process‑optimization projects and champion safety initiatives across the plant. He plans to earn a Certified Production
    Technician credential and eventually start a small custom metal‑fabrication shop that serves local businesses and community art projects. Sharing his knowledge is a priority; he hopes to teach part‑time
    at the regional technical college and mentor the next generation of tradespeople, all while securing a comfortable retirement by age 65.
