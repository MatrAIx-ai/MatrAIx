personas:
  professional: Isidro Baez, a 56‑year‑old veteran fabricator with over three decades of experience in MIG, TIG, and stick welding, CNC milling, and injection‑molding, applies his methodical, safety‑first
    mindset to drive lean‑process improvements, mentor apprentices, and pursue a senior supervisory role while planning to earn a Certified Production Technician credential.
  sports: Isidro Baez channels his calm, strategic mindset into early‑morning fishing on Lake Murray, avidly supports the Carolina Panthers and the University of South Carolina Gamecocks during football
    season, and stays fit by joining the Columbia Senior Cyclists club for weekly rides and playing occasional weekend softball with coworkers.
  arts: Isidro Baez translates his curiosity into small metal sculptures inspired by artists like David Smith and local folk artisans, volunteers at community cultural festivals showcasing his heritage
    where he demonstrates welding techniques, and relaxes listening to classic rock from the 1970s alongside traditional mariachi recordings, though he sometimes over‑pours bourbon while polishing his pieces.
  travel: Isidro Baez prefers road‑trip adventures that blend cultural immersion with family time, having driven the historic Route 66 to explore Santa Fe’s art markets, and now dreams of a guided culinary
    tour of Oaxaca before retirement, all while balancing a modest travel budget that favors staying with relatives and off‑season cabin rentals.
  culinary: Isidro Baez delights in preparing pozole, tamales, and mole for family gatherings, often infusing them with Southern smoked paprika, chipotle, and collard greens, and his pantry is stocked with
    masa harina, dried chilies, and pork shoulder, though he admits to occasionally over‑seasoning in his enthusiastic quest for bold flavor.
  core: Isidro Baez blends three decades of metal‑fabrication mastery with a calm, methodical heart, nurturing community through craft, cuisine, and mentorship while quietly planning a secure retirement.
background:
  cultural: Isidro’s Mexican heritage shapes his values of family cohesion, respect for elders, and community service. He grew up speaking Spanish at home and celebrates traditions such as Día de los Muertos,
    Mexican Independence Day, and quinceañeras, while also embracing the Southern hospitality of Columbia, South Carolina. His Catholic faith informs his weekly church attendance and participation in charitable
    events. He blends Mexican culinary customs with local Southern flavors, and he often shares stories and recipes with friends and coworkers, fostering cross‑cultural understanding in his workplace and
    neighborhood.
