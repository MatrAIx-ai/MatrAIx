  hobbies: '[''Sketching urban architecture'', ''Visiting contemporary art galleries'', ''Listening to jazz and hip‑hop'', ''Playing strategy video games'', ''Cooking experimental dishes'', ''Basketball
    at local courts'', ''DIY home renovation projects'', ''Reading architecture and design books'']'
  career_goals: Sully aims to become a master carpenter and eventually launch his own boutique furniture studio that blends urban art influences with sustainable materials. He plans to earn a certification
    in construction management and pursue LEED accreditation to position his business at the intersection of craftsmanship and green building. Long‑term, he hopes to collaborate with local artists on public
    installations and be recognized in New York’s design community for innovative, high‑quality work.
