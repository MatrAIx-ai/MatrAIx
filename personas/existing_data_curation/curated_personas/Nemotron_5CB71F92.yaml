personas:
  professional: Sully Jackson is a highly skilled carpenter who melds advanced joinery, CNC machining, and AutoCAD drafting with a curious eye for urban art, applying their organized, methodical planning
    and competitive drive to turn each piece of furniture into a meticulously crafted, art‑inspired statement.
  sports: Sully Jackson spends Saturday mornings shooting hoops at the Bronx community court, follows the New York Knicks and the Brooklyn Nets, participates in a local pick‑up basketball league, and maintains
    a disciplined cardio routine at a downtown CrossFit box to support the physical demands of their trade.
  arts: Sully Jackson blends a love for sketching Bronx brownstones with evenings at the Bronx Museum of the Arts and frequent visits to MoMA, drawing inspiration from jazz pianist Thelonious Monk, hip‑hop
    legend Nas, and contemporary street artist KAWS, letting these influences shape their bespoke furniture designs.
  travel: Sully Jackson prefers purpose‑driven, short‑term trips that fuse architecture and sustainability, such as weekend tours of Savannah’s historic brownstones, a month‑long study of eco‑friendly timber
    workshops in Portland, Oregon, and a future planned visit to Copenhagen’s iconic Danish design district.
  culinary: Sully Jackson experiments in the kitchen with avant‑garde vegan dishes like miso‑glazed cauliflower steaks, pairing smoked tempeh, fermented miso, fresh herbs, and a dash of chili, while their
    confidence in improvisation is balanced by a habit of over‑salting sauces, a quirk they jokingly call their 'flavor overkill'.
  core: Sully Jackson channels a meticulous carpenter’s precision into every facet of life—from drafting bold street‑art‑inspired furniture to obsessively tracking tool expenses—while balancing a competitive
    edge with a quietly skeptical, solo‑player mindset.
background:
  cultural: Sully grew up in the Bronx, immersed in a vibrant African‑American community that celebrates music, street art, and resilience. His family’s roots trace back to the Southern United States, and
    he often participates in cultural events such as Juneteenth celebrations and local block parties that blend traditional soul food with Caribbean influences common in the borough. The rhythm of hip‑hop,
    the legacy of graffiti, and the neighborhood’s strong sense of solidarity shape his worldview, inspiring both his artistic sensibility and his drive to succeed as a skilled tradesperson.
