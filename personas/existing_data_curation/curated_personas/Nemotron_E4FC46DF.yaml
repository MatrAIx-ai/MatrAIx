  hobbies: '[''digital illustration'', ''reading speculative fiction'', ''visiting art museums'', ''listening to ambient/electronic music'', ''calligraphy'', ''exploring Chinese poetry'', ''watching independent
    films'', ''solo photography'', ''learning programming basics'', ''mindful meditation'']'
  career_goals: Jun aims to complete his associate degree in graphic design or visual communication, building a professional portfolio that bridges his analytical mindset and artistic vision. He targets
    an entry‑level role as a junior designer or UI/UX associate in a technology or creative agency, where he can contribute to user‑focused projects while continuing to refine his craft. In the longer term,
    Jun aspires to freelance as an illustration artist, eventually publishing a graphic novel that intertwines Chinese mythology with speculative fiction. He also intends to pursue certification in user
    experience research to combine his curiosity for abstract concepts with data‑driven design decisions, ensuring financial stability while following his creative passions.
