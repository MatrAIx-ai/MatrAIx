personas:
  professional: Jun Wang, a 22‑year‑old bilingual retail cashier and budding graphic designer, leverages meticulous POS and inventory expertise together with a vivid imagination and disciplined time‑management
    to craft clean UI mockups and precise transaction logs, while they thrive under pressure and quietly assert creative ideas in collaborative projects.
  sports: Jun Wang, a 22‑year‑old who enjoys quiet, solitary workouts, regularly jogs the Lakefront Trail while they follow the Chicago Bulls and Chicago Cubs from the comfort of a modest apartment, and
    occasionally participates in a small weekend climbing group at a local gym, favoring low‑key fitness over crowded team sports.
  arts: Jun Wang, a 22‑year‑old digital illustrator, spends evenings drawing surreal cityscapes inspired by the immersive light installations of James Turrell and the kinetic vibrancy of Yayoi Kusama, they
    curate ambient playlists featuring Aphex Twin and Brian Eno, and practice traditional brush calligraphy on rice paper to stay connected to familial artistic traditions.
  travel: Jun Wang, a 22‑year‑old travel enthusiast, prefers meticulously planned solo trips to culturally rich cities—having already explored Kyoto’s temples, the lantern‑lit streets of Taipei, and New
    York’s galleries—and now they dream of wandering Iceland’s volcanic landscapes and the fjords of Patagonia while balancing a modest student budget.
  culinary: Jun Wang, a 22‑year‑old who cooks most nights, favors whipping up homemade pork dumplings with ginger‑infused dipping sauce, a comforting miso ramen bowl, and occasionally experimenting with
    Chicago‑style deep‑dish pizza, while they relish the aromatic blend of star‑anise and a spicy peppercorn that reminds them of family celebrations.
  core: Jun Wang, a 22‑year‑old introverted dreamer, channels restless imagination into meticulous digital art and careful budgeting, but they battle chronic worry and can’t resist late‑night coffee while
    sketching surreal cityscapes.
background:
  cultural: Jun is a second‑generation Chinese‑American raised in Chicago’s vibrant multicultural neighborhoods. He grew up speaking Mandarin at home while attending public schools where English dominated,
    giving him fluency in both languages. Family traditions such as Lunar New Year celebrations, Chinese calligraphy, and a strong emphasis on education have shaped his respect for discipline and collective
    harmony. At the same time, exposure to the diverse artistic scene of Chicago has fostered his love for contemporary art and independent media. This blend of Eastern heritage and Midwestern American
    experience informs his worldview, balancing reverence for his roots with a curiosity for new, innovative expressions.
