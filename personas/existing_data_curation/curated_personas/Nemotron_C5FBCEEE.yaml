  career_goals: Carmen dreams of becoming a wildlife biologist or environmental engineer who creates practical tools to protect the prairie and river ecosystems near her hometown. She also imagines being
    a teacher or storyteller‑inventor, using her writing and drawing skills to help other children understand both nature and emotions. Her competitive side fuels a desire to win school science fairs and
    eventually compete in state‑level robotics or ecology contests, while her strong emotional sensitivity drives her ambition to help peers feel safe and understood.
