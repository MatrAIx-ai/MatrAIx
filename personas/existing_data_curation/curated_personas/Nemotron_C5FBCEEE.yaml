personas:
  professional: A budding junior architect, Carmen Greene channels her fascination with intricate LEGO cities into early lessons in spatial design, sketching forest‑themed floor plans and offering competitive
    feedback during group play, and they often blend curiosity with practical building techniques.
  sports: Carmen Greene plays on the local youth soccer league and participates in the summer creek baseball club, cheers enthusiastically for the Oklahoma City Thunder during game nights, and they bring
    a competitive edge to playground tag, preferring active, outdoor play over sedentary activities.
  arts: Carmen Greene nurtures artistic expression by sketching woodland animals with colored pencils, practicing beginner piano pieces by country legends such as Willie Nelson and Dolly Parton, and they
    love singing along at church picnics, where classic country tunes shape their creative identity.
  travel: Carmen Greene enjoys family road trips to the Oklahoma State Fair, weekend camping in the Ouachita National Forest, and dreaming of Yellowstone’s geysers, and they plan adventures around school
    holidays while balancing a limited allowance and the comfort of familiar community gatherings.
  culinary: Carmen Greene favors home‑cooked comfort meals like chicken fried steak, cornbread, and apple pie, helps their mom whisk fresh tomatoes into garden salads, experiments with simple macaroni‑and‑cheese
    topped with crunchy bacon, and they always keep a stash of granola bars for after‑play energy.
  core: Carmen Greene is a curious, competitive nine‑year‑old who builds LEGO cities, sketches wildlife, wrestles with anxiety, and balances a carefree approach to money with a love for country music and
    outdoor adventures.
background:
  cultural: Carmen comes from a white, middle‑class family in Colcord, Oklahoma, a small rural community where family, church, and outdoor life shape daily routines. The local culture values self‑reliance,
    community gatherings, and a close connection to the land. Growing up with frequent visits to county fairs, church picnics, and community sports events, she has been exposed to traditional Midwestern
    values alongside a modern appreciation for technology and media. Her upbringing includes home‑cooked meals, an affection for country music, and a deep respect for the natural environment that informs
    her interests in wildlife and hands‑on projects.
