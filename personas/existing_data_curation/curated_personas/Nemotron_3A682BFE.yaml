personas:
  professional: Iliana Garciamarrero serves as the unofficial captain of her after‑school soccer squad, leading quick warm‑ups and cheering on teammates with her outgoing, routine‑loving style, even though
    she sometimes forgets to bring the water bottle.
  sports: Iliana Garciamarrero thrives on neighborhood soccer games after school, is a fan of the Los Angeles Galaxy and the LA Lakers, and proudly wears her club’s jersey while practicing drills at the
    Riverside Community Center each weekend.
  arts: Iliana Garciamarrero fills notebooks with colorful illustrations of cartoon heroes like Mickey Mouse and characters from Pixar’s "Inside Out", eagerly watches Disney animated films, and sings along
    to Taylor Swift’s pop hits during road trips.
  travel: Iliana Garciamarrero prefers family trips that balance adventure with familiar comforts, has explored the Grand Canyon on a school field trip, loves weekends at Disneyland, and dreams of visiting
    the historic streets of San Francisco’s Fisherman’s Wharf.
  culinary: Iliana Garciamarrero enjoys helping her mother assemble tacos with seasoned ground beef, shredded lettuce, and fresh cilantro, delights in making strawberry‑banana smoothies with yogurt, and
    can expertly roll a cheese quesadilla on the stovetop.
  core: Iliana Garciamarrero is an energetic, routine‑loving 8‑year‑old who juggles soccer leadership, sticker collecting, and occasional forgetfulness with a bright smile and relentless curiosity.
background:
  cultural: Iliana is raised in a Mexican‑American household in Odessa, Texas. At home, Spanish is spoken alongside English, and family traditions such as celebrating Día de los Muertos, enjoying Mexican
    cuisine, and attending a local Catholic church are central to her life. Her family emphasizes close ties, community involvement, and preserving cultural heritage while also embracing the broader Texan
    community, giving her a bicultural perspective that shapes her worldview.
attributes:
  skills: '[''Reading fluency'', ''Basic arithmetic'', ''Bilingual Spanish-English'', ''Team soccer participation'', ''Mexican folk dancing'', ''Following daily routines'', ''Helping with family chores'']'
  hobbies: '[''Soccer (team)'', ''Mexican folk dancing'', ''Storytime club'', ''Drawing and coloring'', ''Sticker collecting'', ''Cooking with family'', ''Playing at the park with friends'']'
  career_goals: Iliana dreams of becoming a bilingual elementary school teacher so she can share her love of reading and her cultural heritage with other children, and she also imagines caring for animals
    as a future veterinarian. She wants a career that lets her stay connected to her community, maintain the structure she values, and help others in practical ways.
