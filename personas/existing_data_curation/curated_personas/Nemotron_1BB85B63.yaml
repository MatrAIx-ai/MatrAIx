personas:
  professional: Sianna Howell, a 24‑year‑old freelance cultural writer and aspiring curator, blends analytical humanities training with hands‑on photography and basic graphic design to craft accessible
    exhibition narratives, while their relaxed attitude toward deadlines pushes them to favor flexible, project‑based collaborations over rigid corporate structures.
  sports: Sianna Howell rides the Pacific waves at Pacific Beach with the local surf club, practices sunrise yoga at Sunset Cliffs, and follows the San Diego Wave FC and the Padres, occasionally joining
    beach volleyball leagues that provide both social connection and a break from their desk‑bound work.
  arts: Sianna Howell immerses themselves in San Diego’s contemporary art scene, regularly attending exhibitions by artists like Yayoi Kusama and local muralist Shepard Fairey, captures urban moments with
    a Fujifilm X‑100, sketches in Balboa Park, and fuels their indie concert habit with shows featuring bands such as Alvvays and Phoebe Bridgers.
  travel: Sianna Howell’s travel style is a blend of spontaneous weekend escapes and loosely planned city‑cultural pilgrimages, having trekked through the galleries of Barcelona, the street art of Mexico
    City, and the temples of Kyoto, while dreaming of a future art‑focused retreat in Florence’s Oltrarno district.
  culinary: Sianna Howell experiments with farm‑to‑table cooking, frequently whipping up avocado‑lime quinoa bowls, turmeric‑spiced shrimp tacos, and miso‑glazed eggplant, while their favorite dish to perfect
    is a vegan ramen that balances umami broth with fresh shiitake and scallions.
  core: Sianna Howell is a 24‑year‑old art‑obsessed storyteller who balances creative hustle with chronic worry, surf‑side yoga, and a habit of splurging on cultural experiences while occasionally letting
    deadlines slip.
background:
  cultural: Sianna grew up in a middle‑class, suburban neighborhood of San Diego within a family of Irish‑German descent that valued education and artistic curiosity. The West‑coast, multicultural environment
    exposed her early to Spanish language, Pacific‑coast beach culture, and a progressive, liberal community that encouraged unconventional thinking. Regular visits to Balboa Park museums, local street
    art festivals, and multicultural neighborhoods shaped her appreciation for diverse artistic expressions and informed her desire to contribute to inclusive cultural spaces.
attributes:
  skills: '[''Critical Writing'', ''Art Historical Research'', ''Digital Content Creation'', ''Social Media Curation'', ''Graphic Design Basics (Adobe Photoshop, Canva)'', ''Photography'', ''Public Speaking
    (Art Tours)'', ''Event Coordination (Volunteer)'', ''Basic Spanish Communication'', ''Creative Ideation'']'
  hobbies: '[''Visiting Art Galleries and Museums'', ''Sketching and Watercolor Painting'', ''Urban Photography'', ''Reading Contemporary Fiction & Poetry'', ''Indie Music Concerts'', ''Surfing and Beach
    Walks'', ''Yoga and Meditation'', ''Traveling to Cultural Destinations'', ''Cooking Experimental Recipes'', ''Podcast Listening (Art & Philosophy)'']'
  career_goals: Sianna aims to translate her passion for art and storytelling into a professional role that balances creativity with flexibility. In the next three years she plans to pursue a Master’s in
    Museum Studies or Arts Administration while freelancing as a cultural writer and content creator. Her ultimate ambition is to secure a curatorial assistant or arts communications position at a progressive
    museum or nonprofit in San Diego, where she can design inclusive exhibitions, develop engaging digital programming, and continue nurturing her own blog/podcast about the local art scene. She also hopes
    to strengthen her project‑management and self‑care skills to better handle stress.
