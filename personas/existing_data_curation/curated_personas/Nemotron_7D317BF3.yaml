  career_goals: Katrina aims to transition into a nurse educator role, leveraging her clinical expertise to mentor the next generation of nurses. She plans to obtain certification in geriatric and palliative
    care, positioning herself as a specialist who can lead hospice programs in her county. Additionally, she aspires to develop a community‑based mental health support group for seniors, integrating her
    compassion with structured, evidence‑based interventions. Within the next five years, she hopes to serve on the hospital’s quality‑improvement committee and contribute to policy development that enhances
    patient safety and staff well‑being.
