personas:
  professional: Katrina Cline, a veteran registered nurse with three decades of hands‑on geriatric care, leverages her meticulous assessment skills, expertise in wound management and electronic health records,
    and her natural compassion to mentor staff and drive quality‑improvement initiatives, while her preference for structure ensures every discharge plan is documented to the last detail.
  sports: Katrina Cline stays active through a weekly line‑dancing class at the community center, a sunrise walking club that covers the local park’s 3‑mile loop, and cheering on the River City Rivermen
    minor‑league baseball team, while she prefers low‑impact exercise that balances her joint comfort with her energetic social spirit.
  arts: Katrina Cline immerses herself in the soulful hymns of Mahalia Jackson and the lyrical folk of Joan Baez while reading contemporary works by Celeste Ng and memoirs by Tara Westover, allowing these
    artistic experiences to deepen her empathy and provide a soothing backdrop to her knitting sessions.
  travel: Katrina Cline prefers meticulously planned road trips that combine scenic nature with cultural stops, such as her recent week‑long journey through the Great Smoky Mountains followed by a weekend
    in Savannah’s historic district, and she dreams of a leisurely guided tour of the gardens of Kyoto, balancing her desire for relaxation with a schedule that leaves room for her beloved line‑dancing
    evenings at home.
  culinary: Katrina Cline delights in preparing classic Southern comfort foods like shrimp and grits, fried chicken with buttermilk, and collard greens slow‑cooked with smoked turkey, mastering the art
    of balancing spice and sweetness using cayenne pepper, smoked paprika, and sweet cornmeal, while she often hosts potluck dinners where friends savor her homemade pecan pie topped with a dash of bourbon‑infused
    caramel.
  core: Katrina Cline blends a lifelong dedication to meticulous nursing with a buoyant love of line dancing and knitting, yet battles a habit of over‑checking blood pressure cuffs and indulging in one
    too many evening biscuits, making her both a dependable caregiver and a delightfully quirky community pillar.
background:
  cultural: Katrina was raised in a close‑knit, rural part of central Kentucky, where Southern hospitality, church fellowship, and community service are central values. Her family’s emphasis on self‑reliance
    and education led her to pursue a STEM‑focused degree in nursing at the University of Kentucky, a path less common among her peers. She blends this academic background with the region’s traditions,
    enjoying bluegrass music, local festivals, and the strong network of neighborly support. Her cultural identity is rooted in the Appalachian‑influenced heritage of Nelson County, shaping her compassionate
    approach to caregiving and her commitment to improving health outcomes for her community.
