  hobbies: '["sketching", "watercolor painting", "digital art tutorials", "creative writing", "listening to R&B, jazz, and gospel", "nature walks", "shell collecting", "volunteering at church events", "Minecraft
    building"]'
  career_goals: Princessa dreams of combining her love for art with her desire to help others. She hopes to study visual arts and psychology in college, eventually working as an art therapist or community
    arts coordinator who designs creative workshops for youth in underserved neighborhoods. In the short term, she aims to earn a scholarship to a liberal‑arts high school program, develop a strong portfolio,
    and volunteer as a youth mentor at the local community centre. Her long‑term ambition is to open a safe, flexible arts space where teens can explore creativity and find emotional support.
