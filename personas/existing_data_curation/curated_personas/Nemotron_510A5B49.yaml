personas:
  professional: Princessa Petty, a teenage digital illustrator and TikTok tutorial creator, channels her curious love for graphic novels and compassionate nature into engaging, loosely structured art videos,
    while her relaxed, disorganized habits often result in spontaneous posting schedules.
  sports: Princessa Petty enjoys late‑afternoon hikes through the nearby woods and occasional swims at the local beach, plays on the Gulf Coast Youth Soccer Club in the fall, practices with her high school
    swim team in the summer, and roots for the Miami Heat and Miami Dolphins, blending a relaxed, community‑focused fitness routine with seasonal team loyalty.
  arts: Princessa Petty immerses herself in sketching graphic‑novel heroes, drawing inspiration from creators like Brian K. Vaughan and Rebecca Sugar, while listening to contemporary R&B artists such as
    H.E.R., jazz legends like John Coltrane, and gospel voices like Kirk Franklin, and occasionally attending local theater productions of 'The Little Mermaid' starring community talent, which together
    fuel her artistic identity.
  travel: Princessa Petty prefers spontaneous, low‑budget weekend getaways, often exploring nearby coastal towns like Seaside and hiking the Appalachian Trail’s southern stretches, while dreaming of immersive
    cultural trips to Kyoto’s historic temples and the pastel cliffs of Santorini, balancing her love for nature with a careful watch on her modest savings.
  culinary: Princessa Petty, an enthusiastic but novice home chef, delights in crafting bright lemon shortbread cookies, assembling fresh fish tacos with cilantro‑lime crema, and blending mango sorbet with
    a pinch of sea salt, favoring vibrant flavors like fresh basil, lime, and avocado while still relying on ready‑made microwave meals during late‑night art sessions.
  core: Princessa Petty is a curious, art‑obsessed teen who thrives on spontaneous creativity, yet often loses track of deadlines and misplaces sketchbooks in her cluttered room.
background:
  cultural: Princessa is an African‑American teenager raised in Hubert, a small community in Onslow County, North Carolina. Her family maintains traditions rooted in Southern Black culture, including church
    gatherings, gospel music, and storytelling that celebrates resilience and community. Local festivals, barbecues, and the nearby coastal environment influence her appreciation for nature and communal
    sharing. The blend of rural Southern life and a close‑knit Black family network shapes her values of compassion, cooperation, and a strong sense of belonging to her neighborhood.
attributes:
