  hobbies: '[''gardening'', ''cooking Gujarati meals'', ''reading newspaper'', ''river walks'', ''listening to Indian music'', ''card games'', ''volunteering for gardening workshops'']'
  career_goals: At this stage, Bora aims to maintain his independence and health, continue sharing his agricultural knowledge with local youth, preserve and pass on Gujarati culinary traditions to his grandchildren,
    take a leadership role in the local South Asian seniors' group, and document family stories and recipes for future generations.
