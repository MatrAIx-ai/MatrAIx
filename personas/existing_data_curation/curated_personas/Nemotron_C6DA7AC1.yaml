personas:
  professional: Emery Weber, a budding multimedia storyteller who blends trail photography, ukulele songwriting, and debate‑club rhetoric to craft compelling environmental narratives, meticulously plans
    each project with a methodical, curiosity‑driven approach, and they rely on disciplined schedules to meet deadlines.
  sports: Emery Weber, an enthusiastic outdoor athlete who hikes the Wasatch Range on weekends, snowboards at Park City Mountain during winter, follows the Utah Jazz and Real Salt Lake, and belongs to the
    high school outdoor adventure club, and they approach fitness with disciplined step tracking and a love for fresh mountain air.
  arts: Emery Weber, a creative soul who writes ukulele‑driven folk songs inspired by fantasy novels, sketches sunrise vistas of the Wasatch, captures them with phone photography edited on Lightroom, and
    they draw inspiration from artists like John Howe, Taylor Swift, and indie folk guitarist Jake Shimabukuro.
  travel: Emery Weber, a nature‑focused traveler who plans weekend trips to Zion and Arches National Parks, dreams of photographing Iceland’s glaciers, and they balance school constraints with family budgeting,
    always using a detailed itinerary notebook to map out hikes, lodging, and photo‑shoot locations.
  culinary: Emery Weber, a budding home cook who enjoys preparing simple, healthy meals such as quinoa bowls with roasted chickpeas, avocado toast, and berry smoothie bowls, experiments with seasonal ingredients
    like kale and pumpkin, and they often share the dishes at community potluck events after volunteering at the animal shelter.
  core: Emery Weber, a 15‑year‑old outdoor‑obsessed, debate‑savvy teen who channels curiosity and worry into meticulous sketches, ukulele ballads, and carefully budgeted adventures, never missing a nightly
    journal entry, and they sometimes over‑plan every hike.
background:
  cultural: Emery was raised in Ogden, Utah, a city that blends a historic railroad heritage with a vibrant outdoor culture. Her family, of European‑American descent, values community involvement, self‑reliance,
    and close family ties—traits commonly emphasized in the Intermountain West. Growing up, she attended public schools that encourage extracurricular participation, and she regularly took part in local
    festivals such as the Ogden Music Festival and the Utah State Fair. The region’s strong emphasis on family gatherings, holiday celebrations, and church‑based youth programs has shaped her sense of belonging.
    While her community is predominantly influenced by LDS traditions, Emery’s household also embraces broader American cultural practices, fostering an inclusive outlook that respects the growing diversity
    of Weber County.
