  hobbies: '[''Hiking'', ''Snowboarding'', ''Ukulele playing'', ''Reading fantasy & sci‑fi'', ''Landscape photography'', ''Sketching'', ''Debate club participation'', ''Animal shelter volunteering'', ''Journaling'',
    ''Cooking'']'
  career_goals: Emery aspires to channel her organizational talent and empathy into a career that supports youth well‑being. She plans to graduate high school, pursue a bachelor's degree in public health
    or education, and eventually become a school counselor or community outreach coordinator. In the long term, she hopes to design and lead programs that teach stress‑management and resilience to adolescents,
    integrating her interest in mental health with her knack for planning events. She also dreams of contributing to environmental education initiatives that encourage her peers to engage with the natural
    landscape of Utah.
