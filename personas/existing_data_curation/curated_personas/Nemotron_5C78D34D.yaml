personas:
  professional: Katia Quintos, a systems analyst turned IT project leader renowned for designing cloud‑native infrastructure on AWS and GCP, channels her methodical, structure‑loving mindset into agile,
    risk‑aware digital transformation initiatives for mid‑size firms while championing inclusive, high‑performing teams.
  sports: Katia Quintos embraces outdoor fitness, hitting the coastal trails of Marin County on weekends, catching early‑morning surf sessions at Pacifica, and cheering on the San Francisco Giants, Golden
    State Warriors, and the San Jose Earthquakes, while she also belongs to a local surf club that meets every Thursday.
  arts: Katia Quintos, an avid participant in a community cultural dance troupe that blends traditional island choreography with contemporary movement, spends her evenings at the San Francisco Museum of
    Modern Art, and draws inspiration from sci‑fi authors like N.K. Jemisin and musicians such as Björk and Flying Lotus.
  travel: Katia Quintos prefers meticulously planned getaways—she’s already trekked Iceland’s volcanic craters and New Zealand’s coastal paths, and she’s saving for a sustainable surf retreat in the Azores
    and a week‑long cultural immersion in Bali’s rice terraces, balancing her budget with a love for authentic experiences.
  culinary: Katia Quintos loves crafting modern poke bowls with diced ahi tuna, furikake, edamame, mango, and quinoa, often finishing with a drizzle of spicy mayo and a garnish of toasted coconut, while
    she also experiments with traditional island‑inspired dishes like coconut‑milk braised pork and taro mash, showcasing her high kitchen confidence.
  core: Katia Quintos blends a methodical, structure‑driven work ethic with a passion for surf‑side hikes, community dance, and tech‑savvy mentorship, but she can’t resist binge‑reading sci‑fi novels late
    into the night and occasionally neglects routine health appointments when deadlines loom.
background:
  cultural: Katia is the daughter of Samoan and Hawaiian parents who immigrated to the United States, and she grew up in a close‑knit extended family that emphasizes respect, communal support, and storytelling.
    Her upbringing blended traditional island values—such as fa’a Samoa's emphasis on service (tautua) and the Hawaiian aloha spirit—with the multicultural environment of San Francisco. She routinely celebrates
    Pacific Islander festivals, attends church gatherings where kava ceremonies and traditional chants are performed, and incorporates the island values of humility, hospitality, and cooperation into her
    professional and personal life.
