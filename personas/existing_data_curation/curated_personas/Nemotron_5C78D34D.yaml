  hobbies: '[''Hiking'', ''Surfing'', ''Cooking Pacific Islander cuisine'', ''Cultural dance (siva, hula)'', ''Volunteer tech mentorship'', ''Yoga'', ''Reading sci‑fi and tech blogs'', ''Photography'']'
  career_goals: Katia aims to progress to a senior leadership role such as Director of Information Technology or Chief Technology Officer within the next five years, focusing on driving digital transformation
    for mid‑size enterprises. She is committed to building high‑performing, diverse teams and hopes to mentor emerging Pacific Islander talent in tech. She plans to obtain PMP and CISSP certifications,
    spearhead initiatives that integrate sustainable tech practices, and eventually launch a consultancy that supports nonprofit organizations in the Pacific Islander community with technology adoption.
