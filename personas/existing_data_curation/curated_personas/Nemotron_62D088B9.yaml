    in local parks'']'
  career_goals: Although retired from formal employment, Lavonne is driven to leave a lasting legacy for her community. She hopes to complete a memoir that weaves personal experience with Nashville’s civil‑rights
    history, to mentor younger volunteers at the local senior center, and to serve on the advisory board of the Nashville African‑American History Museum. She also aspires to develop a mental‑health awareness
    program for seniors, leveraging her empathy and reliability to reduce anxiety and isolation among her peers.
