personas:
  professional: Lavonne Deputy, an 86‑year‑old retired educator turned community historian, channels their structured mindset, strong storytelling skills, and empathetic nature into organizing neighborhood
    events, directing a gospel choir, and documenting oral histories for the Nashville African‑American History Museum while mentoring younger volunteers.
  sports: Lavonne Deputy, a devoted fan of the Nashville Predators and Tennessee Titans, joins the Vanderbilt Senior Walking Club for low‑impact cardio, attends seasonal community softball games in the
    community garden, and keeps a disciplined routine of weekly chair‑based exercise to maintain mobility.
  arts: Lavonne Deputy, a lifelong gospel enthusiast who sings with their local choir, finds inspiration in the hymns of Mahalia Jackson, the modern sound of Kirk Franklin, and the prose of Toni Morrison
    and James Baldwin, while volunteering to lead intergenerational poetry workshops at the public library.
  travel: Lavonne Deputy, who prefers carefully planned, low‑stress trips and often travels with a small group of senior friends, has explored Washington, D.C.’s National Museum of African American History,
    savored the jazz scene in New Orleans, and dreams of a pilgrimage to Cape Coast Castle in Ghana to connect with their genealogical roots.
  culinary: Lavonne Deputy, a competent home cook who loves Southern comfort cuisine, frequently whips up collard greens seasoned with smoked turkey, fried catfish with hush‑puppy crumbs, bakes sweet‑potato
    pie topped with toasted pecans, and brews hibiscus tea for community gatherings.
  core: Lavonne Deputy, an 86‑year‑old gospel‑singing historian who balances meticulous event planning with a nervous habit of rereading their memoir drafts at night, finds purpose in stitching quilts for
    fundraisers and calming their anxiety through garden chores.
background:
  cultural: Lavonne is an African‑American woman who grew up in Nashville during the civil‑rights era, shaping a deep sense of resilience and community responsibility. Her cultural identity is rooted in
    Southern black church traditions, gospel music, and a reverence for oral storytelling. She maintains strong ties to extended family and the broader Black community in Williamson County, celebrating
    cultural heritage through food, music, and participation in local commemorations of Nashville’s rich African‑American history.
