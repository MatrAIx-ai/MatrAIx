personas:
  professional: An aspiring robotics programmer and teen game developer, Sandra Campbell channels her curiosity into building Arduino‑driven puzzles while they balance schoolwork with the disciplined organization
    of their robotics club, showcasing a practical edge that keeps their coding projects grounded.
  sports: Sandra Campbell plays forward for the Brookside Middle School soccer team, trains with the local youth hiking club on weekends, and passionately follows the Seattle Sounders in MLS and the Chicago
    Bulls in NBA, and they channel their competitive spirit into both field play and fan support.
  arts: Sandra Campbell immerses themselves in speculative fiction, devouring works by Isaac Asimov, Liu Cixin, and the graphic novel "Saga", while they also vibe to Daft Punk and attend virtual tours of
    the Smithsonian Air and Space Museum, letting creative media shape their strategic thinking and leisure.
  travel: Sandra Campbell, who has explored the Grand Canyon and the interactive exhibits at Tokyo’s Miraikan, now dreams of trekking Patagonia’s Torres del Paine and visiting the International Space Station’s
    virtual tours, carefully planning each adventure with spreadsheets while balancing school constraints, and they seize every opportunity for hands‑on scientific discovery.
  culinary: Sandra Campbell enjoys crafting quinoa bowls with roasted sweet potatoes, black beans, lime‑coriander dressing, and occasionally experiments with an Arduino‑controlled LED timer for baking cupcakes,
    though they sometimes skip breakfast in favor of late‑night pizza slices when a new game release demands extra hours.
  core: Sandra Campbell is a pragmatic 14‑year‑old coder, avid debater, and soccer forward who balances sci‑fi curiosity with competitive drive, yet they sometimes let pizza and late‑night gaming trump
    an otherwise organized routine.
background:
  cultural: Sandra grew up in Lewisburg, a small town in Bedford County, Tennessee, where family ties and community events play a central role. Her household reflects typical Southern values of hospitality,
    close‑knit family relationships, and respect for local traditions such as church gatherings and county fairs. The surrounding countryside offers ample opportunities for outdoor recreation, which has
    fostered her appreciation for nature and farming heritage. While she identifies with her white Southern roots, she also engages with a diverse group of peers at school, experiencing a blend of regional
    customs, country‑bluegrass music, and contemporary youth culture.
