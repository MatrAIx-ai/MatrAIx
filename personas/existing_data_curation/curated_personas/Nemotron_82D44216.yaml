  career_goals: Sandra aspires to turn her curiosity for how things work into a career in engineering, ideally focusing on agricultural technology or renewable‑energy systems that benefit her rural community.
    She plans to take advanced STEM courses in high school, earn a scholarship to a state university, and join competitive robotics teams to build a strong portfolio. Long‑term, she hopes to design practical
    solutions—such as automated irrigation tools or low‑cost renewable‑energy prototypes—that blend her technical expertise with a commitment to improving everyday life in Bedford County.
