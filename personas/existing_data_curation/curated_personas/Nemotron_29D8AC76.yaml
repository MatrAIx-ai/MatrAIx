  career_goals: William aims to drive sustainable growth for his company by expanding into new markets while maintaining a strong focus on profitability and employee well‑being. He seeks to mentor the next
    generation of executives, institutionalize robust succession planning, and eventually transition to a senior advisory role that allows him to share his experience with emerging businesses. Additionally,
    he aspires to deepen his involvement in regional economic development initiatives and to create a lasting legacy of community‑focused leadership.
