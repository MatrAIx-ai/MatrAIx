  hobbies: '[''Digital Painting'', ''Experimental Music Production'', ''Community Theater (Improv)'', ''Hackathons'', ''Maker Fairs'', ''Salsa Dancing'', ''Jazz Jam Sessions'', ''Yoga and Mindfulness'',
    ''Rooftop Herb Gardening'', ''Caribbean/African Fusion Cooking'', ''Speculative Fiction Reading'', ''Philosophy Lectures'']'
  career_goals: Veronica aims to transition into a Chief Technology Officer role within a socially conscious tech startup that fuses technology with creative expression. She aspires to launch an interdisciplinary
    lab that partners artists, engineers, and community organizations to develop inclusive digital experiences. Mentoring the next generation of Black women in STEM is a core ambition, and she plans to
    establish a scholarship program and regular coding workshops at local community centers in Brooklyn. Additionally, she hopes to author a book on integrating abstract artistic concepts into software
    design, positioning herself as a thought leader at the intersection of art and technology.
