  hobbies: '[''sketchbook drawing'', ''digital art (Procreate)'', ''comic creation'', ''soccer'', ''guitar practice'', ''Minecraft building'', ''reading graphic novels'', ''school drama club participation'',
    ''cooking Mexican dishes with family'', ''attending community festivals'']'
  career_goals: Otilio dreams of becoming a visual storyteller—specifically a graphic novelist or animator—who can blend his love for art, innovative ideas, and Mexican cultural heritage into compelling
    narratives. He aims to attend a specialized high school for the arts, build a diverse portfolio of original comics, and eventually produce an animated short film that celebrates Mexican traditions.
    He also wants to use his charismatic communication skills to host community art workshops for younger kids, teaching them to draw and tell stories while fostering pride in their cultural roots. In the
    long term, he envisions a career that merges creative direction, cultural advocacy, and education.
