personas:
  professional: Otilio is an aspiring digital comic creator who merges traditional folklore narratives with modern illustration tools, using his natural curiosity and talkative confidence to lead school
    storytelling workshops while balancing meticulous sketch planning with spontaneous improvisation.
  sports: Otilio is a dedicated soccer enthusiast who plays forward for the local Nuevo Soccer Club, cheers passionately for the Los Angeles Galaxy during MLS matches, and stays fit by joining after‑school
    basketball drills, channeling his sociable energy into team camaraderie and disciplined practice.
  arts: Otilio immerses himself in the arts through daily sketching in a dog‑eared comic‑book journal, drawing inspiration from Frida Kahlo’s vivid palettes, the storytelling of Pixar’s "Inside Out", and
    practicing acoustic guitar chords of classic folk tunes, while his drama‑club performances showcase his talkative confidence and love for improvisational comedy.
  travel: Otilio approaches travel with a blend of curiosity and social excitement, favoring family road trips to coastal San Diego and weekend visits to his grandparents in Guadalajara, while day‑dreaming
    about future adventures to the ancient ruins of Teotihuacan and the vibrant streets of Oaxaca, often planning itineraries around festivals and local food stalls.
  culinary: Otilio delights in kitchen adventures, skillfully rolling homemade tamales, seasoning tacos al pastor with pineapple and achiote, and whisking a sweet pan de muerto for Día de los Muertos, though
    he often forgets precise measurements, leading to occasional over‑salty bites that he jokes about with family.
  core: Otilio blends boundless curiosity with vibrant sociability, channeling his love for folklore, soccer, and digital storytelling into a dynamic, slightly chaotic yet organized rhythm that makes every
    day an expressive adventure.
background:
  cultural: Otilio is a Mexican‑American raised in Nuevo, California, a community with a vibrant Latino presence. He grew up in a bilingual household, speaking Spanish at home and English at school, which
    has shaped his identity and communication style. He celebrates Mexican holidays such as Día de los Muertos, Cinco de Mayo, and his family's annual quinceañera traditions, often helping to build altars,
    bake pan de muerto, and participate in parades. Mexican cuisine—tacos al pastor, mole, tamales—is a regular part of family meals, and he enjoys cooking alongside his parents and grandparents. He listens
    to a mix of regional Mexican music, mariachi, and contemporary Latin pop, and incorporates Mexican motifs like calaveras, vibrant color palettes, and folk patterns into his artwork. Community involvement
    at the local church and cultural center reinforces his sense of belonging and inspires his desire to share his heritage through creative projects.
