persona_description: A marine biologist with a focus on the effects of oceanic plastic pollution on marine wildlife, particularly sea turtles and whales. This individual has conducted extensive research
  on the impact of plastic ingestion on marine life and has published findings in reputable scientific journals. They are particularly concerned about the vulnerability of young sea turtles to plastic ingestion
  and the long-term consequences for the survival of the species. They are committed to finding solutions to manage plastic waste effectively and prevent it from entering the oceans.
