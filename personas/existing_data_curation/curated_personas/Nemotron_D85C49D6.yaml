  career_goals: Although retired from formal employment, Kaysey aims to cement the cultural memory of Angels Camp and the broader Calaveras County. She is currently drafting a comprehensive community‑history
    manuscript that weaves gold‑rush era events with oral testimonies from longtime residents. She hopes to secure a regional heritage grant to digitize and publicly share the county’s archival records.
    Additionally, she plans to mentor younger adults through a local adult‑education program, offering workshops on historical research methods, genealogy, and effective writing. Ultimately she aspires
    to see her work recognized by a state historical society and to leave a lasting, well‑organized resource for future generations.
