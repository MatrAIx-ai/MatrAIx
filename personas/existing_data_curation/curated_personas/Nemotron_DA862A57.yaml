personas:
  professional: Anna Giles, an aspiring junior scientist, combines a love for chemistry kits with meticulous LEGO building to prototype miniature experiments, showcasing their imaginative curiosity and
    organized yet flexible approach while confidently presenting findings to classmates.
  sports: Anna Giles, a member of the Desert Runners Junior Club, spends weekends sprinting on sand trails, plays on a community soccer team that cheers for the Chicago Fire, watches the Chicago Cubs on
    television, and balances their competitive drive with a love for swimming in the local pool during summer.
  arts: Anna Giles channels their vivid imagination into drawing comic strips inspired by the narrative styles of Stan Lee and the visual flair of manga artist Naoko Takeuchi, while listening to instrumental
    soundtracks by Hans Zimmer and John Williams to set the mood, and shares short stories at family gatherings.
  travel: Anna Giles loves family road trips to desert national parks like Joshua Tree, where they collect rocks and identify plants, dreams of exploring the ancient ruins of Machu Picchu, and prefers planning
    trips with detailed maps and checklists rather than spontaneous wanderings.
  culinary: Anna Giles enjoys crafting simple snacks such as cheese quesadillas with fresh cilantro and tomato, assembles fruit kebabs with watermelon and pineapple, and occasionally experiments with a
    microwave mug brownie, while often requesting crunchy carrots and hummus to fuel their LEGO building marathons.
  core: Anna Giles is an endlessly curious 9‑year‑old who balances meticulous LEGO organization with a competitive spark, a skeptical edge toward strangers, and a habit of cataloguing desert rocks in a
    worn notebook.
background:
  cultural: Anna is a white American child raised in Phoenix, Arizona. Her family’s traditions reflect a blend of Midwestern values and Southwest influences, celebrating typical U.S. holidays such as Thanksgiving
    and Independence Day while also participating in local events like the Arizona State Fair and desert festivals. Growing up in a desert environment has fostered an appreciation for the region’s unique
    landscape, flora, and fauna. She attends a public elementary school where multicultural awareness is promoted, and she has been introduced to the rich heritage of Native American tribes in the area
    through school projects, cultivating respect for the diverse cultural fabric of the Southwest.
