  hobbies: '[''Reading fantasy novels'', ''Drawing comics and illustrations'', ''Building LEGO models'', ''Exploring desert trails and observing nature'', ''Watching science documentaries'', ''Conducting
    simple experiments'', ''Solving jigsaw puzzles'', ''Playing educational coding games (Scratch)'', ''Writing short stories'', ''Listening to instrumental movie soundtracks'']'
  career_goals: Anna dreams of becoming a concept artist for video games or animated films, where she can blend her love of fantasy art with storytelling. She also envisions herself as an astronaut‑scientist
    who explores space and sketches the cosmos. In the near term, she aims to win her school’s science fair and publish a comic book series that showcases her original characters. Her competitive spirit
    drives her to be recognized as the top student in art and science competitions, while her curiosity pushes her toward careers that fuse creativity with discovery.
