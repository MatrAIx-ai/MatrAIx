  career_goals: Martha aims to step into a regional sales director position within the next three years, leading a larger, multi‑state sales operation while championing digital transformation initiatives
    such as AI‑assisted customer insights. She plans to deepen her expertise in data science and earn an executive‑level certification to strengthen her strategic influence. Long‑term, she envisions launching
    a boutique consultancy that helps tech‑focused companies redesign their sales processes with an emphasis on creativity and sustainable growth, all while maintaining a balanced lifestyle that supports
    her well‑being.
