personas:
  professional: Michael Vivien, a retired home‑repair specialist, channels their practical curiosity into mentoring younger hobbyists, leading hands‑on workshops at the Rising Sun historical society, and
    preserving local history through woodworking restorations and garden design projects.
  sports: Michael Vivien, a devoted member of the Chester River Anglers Club, spends spring mornings fishing for striped bass, follows the Baltimore Orioles and Washington Capitals each season, and maintains
    fitness through daily garden walks and occasional light carpentry projects, treating activity as a practical extension of their hands‑on lifestyle.
  arts: Michael Vivien, an avid reader of Dickens and Tolstoy, enjoys capturing sunrise over the Chester River with a vintage Nikon, collects Ansel Adams prints, and unwinds listening to Bob Dylan and Simon
    & Garfunkel while attending occasional performances at the local community theater.
  travel: Michael Vivien, who plans trips around scenic drives and historic sites, has explored Colonial Williamsburg and Gettysburg on weekend road trips, dreams of a UK railway pilgrimage to York and
    the Bluebell Railway, and balances his modest budget with a love for leisurely, photograph‑filled excursions.
  culinary: Michael Vivien, a confident home cook, regularly prepares garden‑fresh vegetable stew, grilled Chesapeake Bay trout seasoned with dill, and classic Maryland crab cakes, favoring ingredients
    like heirloom tomatoes, fresh basil, and locally sourced crab while enjoying a modest cup of black coffee.
  core: Michael Vivien, a 76‑year‑old woodworker and historian, fuses meticulous hands‑on skill with a restless curiosity, mentoring neighbors while occasionally hoarding new tools and forgetting to water
    their beloved vegetable garden.
background:
  cultural: Michael grew up in the post‑war mid‑Atlantic region of the United States, immersed in the modest, community‑oriented culture of rural Maryland. As a white American, his family traditions emphasize
    self‑reliance, respect for nature, and strong neighborhood ties shaped by church gatherings, local fairs, and a heritage of small‑scale farming. These cultural influences have fostered his practical
    mindset, appreciation for both tradition and innovation, and a deep commitment to giving back to his community.
attributes:
  skills: '["Carpentry","Basic plumbing","Electrical troubleshooting","Vehicle maintenance","Gardening design","Community organizing","Genealogy research","Basic computer usage"]'
