  career_goals: Although retired from full‑time work, Michael aims to stay active by mentoring younger hobbyists, completing a memoir of his life and local history, and contributing his practical knowledge
    to the Rising Sun historical society. He also seeks to maintain his health through regular activity, continue learning new technologies, and play a leadership role in volunteer projects that preserve
    his community’s heritage.
