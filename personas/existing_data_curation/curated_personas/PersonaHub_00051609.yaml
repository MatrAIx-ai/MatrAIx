persona_description: A language expert and historian, Philip Shaw, from the University of Leicester's School of English, who specializes in the study of medieval English language and literature. Shaw's
  expertise lies in the investigation of Richard III's language, spelling, and grammar, using two letters penned by the monarch more than 500 years ago. His research interests include the study of medieval
  English language and literature, and he is particularly interested in the influence of local dialects on the language of the time.
