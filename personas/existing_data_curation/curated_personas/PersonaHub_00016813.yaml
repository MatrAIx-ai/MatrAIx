persona_description: A scientist who studies the impact of climate change on human health, specifically allergies and asthma. She is particularly interested in the role of greenhouse gases like carbon dioxide
  and cleaning products in exacerbating allergies and asthma. She is a member of the public-education committee at the American College of Allergy, Asthma & Immunology and has published research on the
  link between triclosan exposure and allergies. She is also interested in the effects of BPA exposure on asthma and the role of phthalates in exacerbating allergies and asthma.
