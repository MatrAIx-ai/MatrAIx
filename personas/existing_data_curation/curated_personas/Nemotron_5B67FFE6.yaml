  hobbies: '["Building with Duplo blocks", "Large-piece puzzles", "Coloring and drawing", "Pretend play with toy fire truck", "Storytime with picture books", "Music and movement class", "Swimming at community
    pool", "Exploring local beaches and tide pools"]'
  career_goals: Even at four, Edwin has vivid daydreams about his future. He often says he wants to be a firefighter because he loves the bright trucks, the idea of helping people, and the clear schedule
    of drills and safety checks. He also enjoys the idea of being a teacher, imagining a classroom where everyone works together nicely. His fascination with building blocks sometimes leads him to talk
    about becoming an architect who designs safe, organized spaces. Overall, his ambitions center on roles that combine structure, responsibility, and caring for others.
