  hobbies: '[''Gardening (heirloom vegetables)'', ''Amateur astronomy'', ''Traditional Guatemalan music listening'', ''Woodworking and carpentry'', ''Solar lamp assembly'', ''Senior bridge club'', ''Library
    computer tutoring (bilingual)'', ''Cooking Guatemalan dishes (tamales, pepian, atole)'', ''Walking along the Delaware Bay shoreline'']'
  career_goals: Although retired, Heriberto remains driven to leave a lasting imprint on his family and his small Delaware community. He hopes to formalize a mentorship program that pairs senior volunteers
    with local high‑school students interested in engineering and renewable energy, leveraging his practical know‑how to spark curiosity while emphasizing real‑world results. He also aspires to document
    and publish a short memoir of his migration journey, preserving Guatemalan stories and recipes for his grandchildren. A secondary ambition is to expand his rooftop solar project into a neighborhood
    micro‑grid pilot, demonstrating cost‑effective, low‑maintenance renewable solutions that could ease energy bills for other seniors. Finally, he wishes to become an informal cultural liaison, organizing
    bilingual workshops on topics ranging from basic technology use to traditional cooking methods, thereby strengthening intergenerational ties and fostering a sense of belonging among the growing Latinx
    population in Sussex County.
