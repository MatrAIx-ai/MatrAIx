personas:
  professional: Heriberto Juarez, a retired STEM professional who now volunteers as a bilingual mentor, merges his analytical engineering background with a hands‑on DIY ethos to design low‑cost solar micro‑grid
    prototypes for seniors, while his spontaneous, competitive streak drives a loosely‑structured mentorship program that pairs seniors with high‑school engineers, even as his skeptical nature keeps him
    double‑checking every plan.
  sports: Heriberto Juarez maintains fitness through daily coastal walks, seasonal participation in a senior softball league, and cheering on the Philadelphia Eagles, the Delaware Fightin’ Blue Hens, and
    the New York Yankees, while channeling his competitive drive into bridge tournaments at the Georgetown seniors walking club and the local senior bridge group.
  arts: Heriberto Juarez weaves his creative life from listening to marimba ensembles such as Los Bolidos, classic mariachi recordings by Mariachi Los Caballeros, salsa legends like Celia Cruz, and American
    folk icons Woody Guthrie and Bob Dylan, while channeling that rhythm into carving wooden bowls, building simple furniture, and attending occasional productions by the Delaware Repertory Company.
  travel: Heriberto Juarez prefers spontaneous, low‑budget road trips, often driven by clear night‑sky forecasts, with past excursions including a stargazing weekend at Cherry Springs State Park in Pennsylvania,
    a relaxed historic tour of St. Augustine, Florida, and a memorable visit to the Andean highlands to photograph the Milky Way, while dreaming of a future pilgrimage to the Grand Canyon for sunrise photography.
  culinary: Heriberto Juarez, a proficient home cook, regularly prepares fragrant tamales filled with masa, pork, and roasted chilies, simmered pepian enriched with pumpkin seeds, tomatoes, and cinnamon,
    and warm atole made from corn masa and vanilla, while also experimenting with heirloom tomato sauces for pasta and savoring classic comfort meals like chicken pot pie.
  core: Heriberto Juarez is a curious, competitive octogenarian who juggles midnight stargazing, DIY solar projects, and bridge tournaments, all while worrying over every detail and occasionally splurging
    on vintage tools.
background:
  cultural: 'Heriberto was born in the highlands of Guatemala, in a small town where Spanish was spoken alongside Kaqchikel, a Mayan language his grandparents preserved at home. Raised in a devout Catholic
    family, he remembers Sundays filled with church hymns, communal meals, and stories of the volcanic landscapes that shaped his early imagination. At age thirty‑two, he migrated to the United States seeking
    educational opportunities, eventually earning a bachelor’s degree in a scientific discipline. Settling in Georgetown, Delaware, he integrated into a tight‑knit community while maintaining a strong connection
    to his roots—speaking Spanish fluently, preserving traditional recipes, and celebrating Guatemalan holidays such as Día de la Independencia with neighborhood cultural fairs. His bicultural identity
    informs his worldview: he values the collectivist emphasis on family and community from his homeland, while also embracing the individualistic, problem‑solving mindset fostered by his American education
    and experience. This blend guides his daily interactions, his desire to mentor younger generations, and his efforts to share Guatemalan heritage within the diverse tapestry of Sussex County.'
attributes:
  skills: '[''Mechanical repair'', ''Electrical troubleshooting'', ''Mathematical modeling'', ''DIY woodworking'', ''Solar panel installation and maintenance'', ''Community STEM mentorship'', ''Bilingual
