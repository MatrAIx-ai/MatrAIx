  hobbies: '[''Ice fishing'', ''Snowmobiling'', ''Deer hunting'', ''Woodworking'', ''Vintage radio restoration'', ''Retro gaming'', ''Watching Vikings and Twins games'', ''Reading automotive magazines'',
