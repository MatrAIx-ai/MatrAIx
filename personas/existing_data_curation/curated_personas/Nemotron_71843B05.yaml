  career_goals: Melvin aims to move into a supervisory role within the next two years, targeting a store manager position at his current retailer. He wants to develop advanced leadership capabilities, learn
    sophisticated merchandising analytics, and eventually oversee multiple locations as a district manager. His longer‑term ambition is to open his own boutique focused on outdoor gear, leveraging his deep
    knowledge of Minnesota's hunting and fishing market. He plans to earn certification through the National Retail Federation’s Retail Management program and to mentor younger sales associates, channeling
    his competitive drive into team performance.
