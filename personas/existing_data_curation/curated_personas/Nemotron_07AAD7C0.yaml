  hobbies: '[''Visiting Art Galleries'', ''Digital Photography'', ''Graphic Design Projects'', ''Acoustic Guitar Playing'', ''Running (Scioto Mile Trail)'', ''Fantasy Football'', ''Cooking and Recipe Experimentation'',
    ''Community Tech Workshops'']'
  career_goals: Douglas aims to transition from a production worker to a supervisory role within the next three years, leveraging his lean‑manufacturing knowledge to improve line efficiency and reduce waste.
    He plans to complete an associate degree in industrial technology and earn a certified Lean Six Sigma Green Belt. Long‑term, he aspires to become a production manager or process engineer, overseeing
    multiple workstations and mentoring new employees. Simultaneously, he hopes to build a modest freelance portfolio in graphic design, eventually supplementing his income and exploring a creative side
    business that could provide greater flexibility for his family.
