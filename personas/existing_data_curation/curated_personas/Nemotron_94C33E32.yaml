  hobbies: '[''Basketball'', ''Skateboarding'', ''Gaming (Minecraft, Fortnite)'', ''Music production (beat making)'', ''YouTube video creation'', ''Reading sci‑fi and graphic novels'', ''Robotics kits (LEGO
    Mindstorms)'']'
  career_goals: Dante aims to pursue a career that blends technology and creative storytelling. He dreams of becoming a video game developer or software engineer who can design interactive experiences that
    reflect his community's stories. He hopes to attend a STEM‑focused high school program, earn a computer science degree, and later launch a youth coding club in Danville to mentor other teens. He also
    envisions using his media production skills to create content that celebrates local culture and inspires positive change.
