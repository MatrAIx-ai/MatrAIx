personas:
  professional: Dante Foster is a budding teenage tech enthusiast who merges basketball teamwork lessons with self‑taught robotics and music production, leveraging curiosity and spontaneous problem‑solving
    to prototype creative digital projects despite occasional disorganization.
  sports: Dante Foster spends afternoons shooting hoops at the neighborhood park, plays point guard for the Eastside Middle School basketball club, idolizes the Los Angeles Lakers' LeBron James for his
    leadership, and mixes in occasional pick‑up soccer in spring, all while balancing a competitive spirit with a laid‑back approach to fitness that prefers street play over regimented workouts.
  arts: Dante Foster channels a love for electronic beats into laptop‑based music production, sampling inspiration from artists like Deadmau5 and Flume, while also enjoying sci‑fi graphic novels such as
    Saga and the cinematic storytelling of directors like Guillermo del Toro, often remixing favorite movie scores into short YouTube videos that blend humor and community highlights.
  travel: Dante Foster prefers spur‑of‑the‑moment weekend road trips with friends, having already explored the bustling streets of New York City and the theme‑park wonder of Orlando, while dreaming of a
    future family vacation to Tokyo's Akihabara district to dive into the world of anime and gaming culture, despite limited budget and school schedules.
  culinary: Dante Foster is a self‑proclaimed snack connoisseur who swaps between devouring pepperoni pizza and spicing up ramen with chili oil and soy sauce, occasionally attempting to bake simple brownies
    or whip up a homemade guacamole for game night, though most meals are quick grabs from the local fast‑food joint.
  core: Dante Foster blends restless curiosity for tech and beats with a love of basketball, yet often lets impulsive gaming marathons eclipse deadlines and chores, making them the friendly, slightly chaotic
    hub of their peer group.
background:
  cultural: Dante is an African American adolescent growing up in Danville, Illinois. His cultural identity is shaped by multigenerational family ties, regular participation in church activities, and community
    events such as local festivals and youth mentorship programs. He draws inspiration from African American musical traditions, spoken‑word poetry, and family storytelling, while also embracing Midwestern
    values of hospitality, community support, and resilience. Navigating a predominantly white small‑town environment, he maintains strong connections to the local Black community and often serves as a
    bridge between diverse cultural spheres.
attributes:
  skills: '[''Basic coding (Scratch, Python)'', ''Video editing (iMovie, DaVinci Resolve)'', ''Beat making with entry‑level software'', ''Basketball fundamentals and team play'', ''Team collaboration and
