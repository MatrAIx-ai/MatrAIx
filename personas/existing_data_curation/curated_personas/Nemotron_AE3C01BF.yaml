personas:
  professional: Wanda Barrios, a budding digital illustrator and library volunteer, merges their curiosity for fantasy storytelling with a practical knack for cataloguing, and they channel their compassionate
    nature into helping peers discover books and encouraging quiet reading corners.
  sports: Wanda Barrios enjoys solitary weekend hikes along the Catskill foothills with the Hudson Valley Trail Runners, joins the community center’s co‑ed soccer team in spring, follows the New York Yankees
    and the New York Knicks as their primary professional sports fandoms, and they prefer gentle yoga over high‑intensity workouts.
  arts: Wanda Barrios, a budding digital illustrator, draws inspiration from the vibrant carnival art patterns and the storytelling flair of fantasy author Sarah J. Maas, while they listen to reggaeton
    icons Bad Buny and salsa legend Celia Cruz to fuel their creative process.
  travel: Wanda Barrios prefers low‑key, family‑oriented weekend getaways, planning trips in their illustrated travel journal, having explored the historic streets of Old San Juan and the misty waterfalls
    of the Catskill region, while they dream of solo backpacking adventures in Iceland’s volcanic landscapes and Barcelona’s architectural marvels once they can afford a longer vacation.
  culinary: Wanda Barrios, an enthusiastic young cook, regularly prepares arroz con gandules and plantain‑based empanaditas for their family, mixes coconut milk with cilantro in homemade soups, delights
    in fresh mango slices after school, and they sometimes burn the garlic when multitasking between drawing and cooking.
  core: Wanda Barrios balances a vivid inner world of digital art and fantasy reading with a quiet, solitary lifestyle, often worrying about small details while caring deeply for friends and family, and
    they are known for habitually checking their succulents before bedtime.
background:
  cultural: Wanda is a first‑generation Puerto Rican American raised in Kingston, New York. At home Spanish is spoken alongside English, and her family maintains traditions such as celebrating Nochebuena
    with lechón, making pasteles, and dancing to bomba and plena during local cultural festivals. She identifies strongly with her Caribbean heritage, enjoys the island’s music and cuisine, and participates
    in a local Puerto Rican community center that offers language classes and cultural events. Living in the Hudson Valley, she blends these cultural roots with upstate New York influences, attending a
    public middle school where she navigates both the ways of her diaspora community and the broader American culture.
