  career_goals: She aspires to study psychology or social work in high school and later pursue a degree that allows her to become a child counselor or community mental‑health advocate, particularly serving
    Spanish‑speaking families. In the short term, she plans to enroll in advanced school courses, seek mentorship in counseling, and volunteer at the local library's teen program to gain experience.
