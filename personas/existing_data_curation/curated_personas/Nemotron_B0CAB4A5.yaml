  career_goals: Katherine aims to advance to a regional sales director role where she can champion a culture of innovative thinking and well‑being. She dreams of creating a flagship sales training curriculum
    that incorporates artistic techniques for visual storytelling and empathy, thereby differentiating her company’s approach in the market. She also aspires to mentor emerging women leaders in the industry,
    establishing a supportive network that balances ambition with personal health. In the long term, Katherine envisions launching her own consultancy focused on integrating creativity and stress‑resilience
    strategies into sales organizations.
