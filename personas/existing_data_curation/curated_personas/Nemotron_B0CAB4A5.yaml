personas:
  professional: An experienced sales leader, Katherine Lee leverages data‑driven analytics and an artist’s eye for visual storytelling to design strategic sales plans, mentor cross‑functional teams, and
    embed stress‑resilience workshops into their department, positioning them for a regional director role.
  sports: A devoted outdoor enthusiast, Katherine Lee hikes the Black Hills with a local trekking club, practices yoga twice weekly at a community studio, and roots for the Denver Broncos while occasionally
    joining a recreational soccer league on Sunday mornings.
  arts: A creative soul, Katherine Lee paints watercolors inspired by Georgia O’Keeffe’s prairie palettes, captures black‑and‑white landscapes echoing Ansel Adams, acts in community theater productions
    of contemporary plays by Lin‑Manuel Miranda, and leads weekly art workshops for neighbors.
  travel: A meticulous planner with a love for both adventure and relaxation, Katherine Lee has explored the Badlands and Yellowstone on road trips, dreams of photographing Iceland’s lava fields, and prefers
    itineraries that balance scenic hikes with cozy farm‑stay evenings.
  culinary: A passionate farm‑to‑table chef, Katherine Lee frequently prepares grass‑fed bison stew, heirloom tomato salad with fresh basil, and wild mushroom risotto, while honing their sourdough starter
    and sourcing ingredients from Saturday farmers’ markets.
  core: Katherine Lee blends analytical sales leadership with artistic curiosity, habitually juggling spreadsheets and watercolor brushes, while wrestling with stress‑induced worry that fuels their relentless
    pursuit of balanced creativity.
background:
  cultural: Katherine comes from a Midwestern white heritage rooted in South Dakota, with family ancestry tracing back to German and Scandinavian immigrants who settled the region's farms. Raised in a close‑knit
    small‑town environment, she internalized values of self‑reliance, community cooperation, and a strong work ethic. Her upbringing balanced traditional community events—such as county fairs, church gatherings,
    and local craft shows—with an appreciation for broader cultural experiences, like museum visits and literary circles. This blend of rural heritage and exposure to diverse ideas shapes her grounded yet
    open‑minded outlook.
