  hobbies: '[''Karaoke'', ''Dance classes (hip‑hop & contemporary)'', ''Community theater/improv'', ''Organizing game nights'', ''Competitive board games and puzzles'', ''Running and group fitness classes'',
    ''Yoga and mindfulness'', ''Cooking and baking'', ''Fashion and styling'', ''Participating in local fairs and markets'']'
  career_goals: Anna aims to move from cashier to shift supervisor within the next year, leveraging her organizational talents and sales record. Within three to five years she plans to become a store manager,
    overseeing multiple departments and driving profitability. To support this trajectory she intends to complete a Bachelor’s degree in Business Administration at a local community college, while earning
    a Certified Retail Manager credential. Long‑term, she dreams of opening a boutique that combines her love for fashion and community events, where she can apply her structured approach and competitive
    drive to build a recognized local brand. She sets clear milestones, uses detailed action plans, and regularly reviews progress to stay on track despite her occasional worry about performance.
