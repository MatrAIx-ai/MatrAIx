personas:
  professional: Anna Banta is a meticulous retail associate at a suburban department store who leverages near-perfect cash-handling accuracy, expert POS navigation, and sharp inventory audits to consistently
    exceed sales targets, all while channeling their competitive drive and love for organizing in-store events and staff schedules.
  sports: Anna Banta is a devoted member of the Clarkston Running Club, logs three 5-k runs weekly, follows the Detroit Lions and Michigan State Spartans for football, and balances high-energy group cardio
    classes with restorative hot-yoga to keep their competitive edge sharp.
  arts: Anna Banta thrives on stage, performing improv at the local community theater, belting out pop anthems by Lady Gaga and Ariana Grande at karaoke nights, and drawing inspiration from contemporary
    choreographers like Alvin Ailey while they curate vintage-inspired outfits for the county fair.
  travel: Anna Banta enjoys meticulously planned weekend road trips, having already explored the vibrant street art of Detroit, the lakeside charm of Grand Rapids, and dreaming of a fashion-focused getaway
    to Paris's Le Marais to source boutique ideas, all while budgeting carefully to fund their college tuition.
  culinary: Anna Banta loves baking gooey chocolate brownies and homemade sourdough loaves, often seasoning dishes with fresh basil, thyme, and a dash of smoked paprika, while also mastering quick weeknight
    meals like chicken stir-fry with bell peppers, and they treat themselves to a weekly slice of New York-style pizza after a night of dancing.
  core: Anna Banta is a socially magnetic, hyper-organized 20-year-old who balances a relentless quest for retail excellence with a flair for performance, a habit of over-planning, and a penchant for late-night
    karaoke that sometimes fuels their stress.
background:
  cultural: Anna grew up in Clarkston, Michigan, a suburban community in Oakland County with a predominantly white, middle‑class population. Her family’s roots trace back to German and Irish ancestry, and
    she was raised with Midwestern values emphasizing hard work, punctuality, and community involvement. She attended public schools where she participated in activities like the Girl Scouts and school
    theater, celebrating typical American holidays and local traditions such as the county fair. The region’s blend of small‑town familiarity and proximity to Detroit’s urban culture exposed her to diverse
    retail environments, shaping her practical outlook and sociable nature while reinforcing a respect for structure and predictability.
attributes:
  skills: '[''Cash handling'', ''POS system operation'', ''Customer service'', ''Conflict resolution'', ''Inventory management'', ''Scheduling and time management'', ''Data entry and Excel'', ''Team training
