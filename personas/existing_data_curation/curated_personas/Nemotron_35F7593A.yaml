  hobbies: '["Reading mystery and adventure books", "Building LEGO sets", "Solo chess practice", "Collecting rocks and shells", "Drawing and watercolor painting", "Birdwatching in local parks", "Creating
    simple games in Scratch", "Caring for goldfish"]'
  career_goals: Her long‑term career ambition is to become a veterinarian, a path that blends her love for animals, her methodical approach, and her desire to work in a structured, science‑based environment.
    She imagines herself caring for small pets and later contributing to animal‑health research, using her organized work habits and competitive drive to excel in veterinary school.
