personas:
  professional: A budding young strategist, Joan Dugue excels as a student problem‑solver, applying step‑by‑step LEGO architecture and chess tactics to school projects while thriving on the structure and
    quiet focus that their solitary study habits demand.
  sports: A methodical young athlete, Joan Dugue practices baseball with their neighborhood Little League team each spring, enjoys watching the Oklahoma City Thunder during the NBA season, and maintains
    a solitary fitness routine of daily jump‑rope and chess‑inspired mental drills, preferring structured workouts over chaotic group sports.
  arts: A quiet artistic explorer, Joan Dugue fills sketchbooks with watercolor landscapes inspired by countryside scenes they see at county fairs, builds miniature LEGO sculptures reminiscent of Frank
    Lloyd Wright's designs, and listens to country classics by Carrie Underwood while reading mystery series like Nancy Drew, using these creative outlets to recharge away from classroom chatter.
  travel: A meticulous planner, Joan Dugue prefers short, well‑organized trips—such as family outings to the Oklahoma State Fair and weekend hikes in the Ouachita National Forest—and dreams of solo‑friendly
    adventures like a guided tour of the Grand Canyon and a museum day in Washington, D.C., always insisting on detailed checklists and a quiet spot for reading along the way.
  culinary: A budding home‑cook, Joan Dugue enjoys the smoky flavor of Oklahoma‑style BBQ ribs and apple cinnamon pie, can follow step‑by‑step recipes to assemble a perfect peanut butter‑honey sandwich,
    proudly adds a pinch of smoked paprika to their own veggie stir‑fry, and delights in helping their family grill corn on the cob during backyard gatherings.
  core: Joan Dugue, a nine‑year‑old puzzle‑lover, turns every quiet moment into a structured adventure, from cataloging rocks to diligently saving allowance for the next LEGO set, while secretly hoarding
    a stash of gummy bears for late‑night study sessions.
background:
  cultural: Joan grows up in a middle‑class White family in Oklahoma City, where Midwestern practicality and Southern hospitality intersect. Her community values self‑reliance, punctuality, and friendliness,
    reflected in neighborhood gatherings at the county fair and local sports events. The family often enjoys barbecue and country music at home, while also attending a nearby community church that emphasizes
    service and order. At school, Joan learns about the region’s Native American heritage and the state’s aviation and energy history, shaping a modest appreciation for diversity. These cultural influences
    reinforce her preference for structure, solitude, and a competitive drive to excel.
attributes:
  skills: '["Reading comprehension", "Basic arithmetic", "Puzzle solving (logic puzzles and jigsaw)", "Organizational skills", "Basic computer literacy (educational apps)", "Competitive chess", "Fine motor
