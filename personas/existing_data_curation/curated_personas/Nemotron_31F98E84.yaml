  career_goals: Gloria aspires to become a senior principal engineer leading interdisciplinary aerospace programs that blend cutting‑edge technology with innovative user‑experience design. She aims to head
    a cross‑functional team that integrates artistic visualization into mission planning, positioning herself as a thought leader at the intersection of engineering and creative design. Long‑term, she envisions
    launching a mentorship initiative for underrepresented women in STEM and possibly founding a venture that creates interactive art‑tech installations for scientific outreach, leveraging her competitive
    nature to make a lasting impact in both industry and community.
