  career_goals: Quetzy aims to advance to a shift supervisor role within the next few years, leveraging her reliability and organizational strengths. She plans to earn a Six Sigma Green Belt and become
    certified in advanced safety management. Long‑term, she envisions overseeing an entire production line as an operations manager and mentoring new hires. She also hopes to attend evening courses in industrial
    engineering to broaden her technical knowledge and eventually explore entrepreneurship, perhaps starting a small catering business that blends her cultural cooking passions with her disciplined work
    ethic.
