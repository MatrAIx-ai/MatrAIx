personas:
  professional: Quetzy Duhau is a production line specialist who excels at operating CNC machinery, troubleshooting mechanical issues, and enforcing safety protocols while methodically applying lean principles
    and bilingual communication to mentor new workers and chart a path toward a shift supervisor role.
  sports: Quetzy Duhau finds balance through weekend hikes in the Angeles National Forest, a membership with the local LA Hiking Club, and cheering on the Los Angeles Dodgers and Lakers while participating
    in a community-center recreational soccer league to stay active.
  arts: Quetzy Duhau immerses themselves in the sounds of regional Mexican legends like Vicente Fernández and contemporary pop icons such as Ariana Grande, attends the annual local cultural festival featuring
    folkloric dance, and collects prints of Frida Kahlo and Diego Rivera, allowing music and visual art to inspire both their cooking and problem-solving mindset.
  travel: Quetzy Duhau prefers well-planned weekend getaways, having explored the historic streets of Oaxaca for culinary inspiration, trekked the Redwood forests of Northern California, and scheduled a
    future road trip along the Pacific Coast Highway to combine scenic hikes with food-focused stops, while balancing travel costs with a modest savings plan.
  culinary: Quetzy Duhau passionately crafts authentic dishes like mole poblano, chiles en nogada, and tacos al pastor, often incorporating fresh cilantro, epazote, and roasted poblano peppers from their
    balcony garden, and enjoys experimenting with fusion twists during weekend cooking marathons while still honoring the time-tested family recipes.
  core: Quetzy Duhau blends methodical engineering precision with a love for authentic Mexican cuisine, balancing a disciplined work ethic, occasional DIY project procrastination, and a habit of solving
    crossword puzzles late into the night.
background:
  cultural: Quetzy grew up in a close‑knit Mexican family in Sylmar, a vibrant Hispanic neighborhood of Los Angeles. Bilingual in Spanish and English, she embraces traditions such as Día de los Muertos,
    quinceañeras, and weekly family gatherings centered around homemade meals. Her cultural values of familismo, respeto, and community cooperation shape her collaborative work style and considerate nature.
    While she navigates American workplace norms, she maintains strong ties to her heritage through language, religious observances, and participation in local cultural events, balancing assimilation with
    a deep pride in her Mexican roots.
