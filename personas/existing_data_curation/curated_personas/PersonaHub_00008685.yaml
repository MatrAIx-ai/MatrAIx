persona_description: A health care provider who specializes in the prevention and treatment of sexually transmitted infections (STIs), particularly those transmitted through sexual activity. They are knowledgeable
  about the transmission, symptoms, and treatment options for various STIs, including hepatitis A, B, and C, as well as meningococcal disease, mycoplasma genitalium, and molluscum contagiosum. They are
  also aware of the importance of vaccination for at-risk populations, such as men who have sex with men and sexually active adults who inject drugs. They are equipped with the knowledge and skills to provide
  accurate and comprehensive information to patients, as well as to monitor and manage patients with chronic STIs.
