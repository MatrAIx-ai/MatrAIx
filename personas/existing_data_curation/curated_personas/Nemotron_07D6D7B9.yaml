personas:
  professional: Mykalah Chung, a 16‑year‑old aspiring multimedia artist, blends meticulous sketching, acrylic painting, and narrative coding to craft visual stories that champion social issues, leveraging
    their organized planning and talkative charisma to lead school art projects and community content curation.
  sports: Mykalah Chung enjoys cheering on the Charlotte Hornets during basketball season and follows the North Carolina Tar Heels soccer team, while participating in the town’s youth track club for weekend
    runs and indulging in occasional skateboarding in the summer, balancing activity with a love for creative downtime.
  arts: Mykalah Chung draws creative fuel from the impressionist brushwork of Claude Monet, the bold narratives of Frida Kahlo, the poetic lyricism of Joni Mitchell, and the cinematic soundscapes of Hans
    Zimmer, regularly sharing original acrylic landscapes and digital illustrations on a growing Instagram channel that features curated mood‑boards of speculative fiction covers.
  travel: Mykalah Chung favors budget‑friendly road trips, having documented sunrise walks in Savannah, GA, a historic tour of Washington, D.C., and a weekend art‑café crawl in Asheville, NC, while dreaming
    of a solo backpacking adventure through Kyoto’s temples and the vibrant street art districts of Berlin.
  culinary: Mykalah Chung’s palate favors comfort food like homemade mac and cheese and shrimp and grits, but they also experiment with spicy Thai pad thai, fresh basil pesto pasta, and occasionally bake
    a raspberry soufflé, often cooking in the family kitchen while listening to classic jazz records.
  core: Mykalah Chung is a meticulously organized teen creator who channels boundless imagination into art and code, balances social leadership with occasional procrastination, and prizes community connection
    above all.
background:
  cultural: Mykalah is a Black teenager raised in Elizabethtown, a rural community in Bladen County, North Carolina. Her family’s roots are tied to the Southern African‑American tradition of church fellowship,
    oral storytelling, and soulful music. She grew up listening to gospel, blues, and R&B, and her grandparents shared stories of the civil‑rights movement that shaped her sense of identity. Community events,
    church youth groups, and family gatherings emphasize solidarity and mutual support, which inform Mykalah’s cooperative nature and her desire to use art as a bridge across cultures. She often incorporates
    motifs from African‑American history, Southern natural landscapes, and contemporary Black culture into her creative work.
