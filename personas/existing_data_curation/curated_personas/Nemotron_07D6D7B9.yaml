    Media Art Channel"]'
  career_goals: Mykalah aspires to attend a university with a strong fine arts program and later pursue a career as a multimedia artist or graphic designer who creates socially‑engaged visual campaigns.
    She dreams of establishing a community art workshop in Bladen County that empowers other teens to express themselves through art, and she hopes to one day curate exhibitions highlighting African‑American
    history and contemporary creativity.
