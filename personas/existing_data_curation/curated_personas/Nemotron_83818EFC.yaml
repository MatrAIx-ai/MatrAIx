personas:
  professional: Corey Carter, an aspiring technical support specialist aiming to work for a green‑tech startup in Washington, leverages a solid foundation in hardware troubleshooting, Python scripting,
    and data analysis while applying their reserved yet attentive listening style to diagnose user problems methodically and foster a collaborative, solution‑focused support environment.
  sports: Corey Carter frequently hikes the trails of the Olympic Peninsula and joins a local Seattle hiking club for weekend outings, follows the Seattle Seahawks and Seattle Sounders for seasonal excitement,
    and occasionally participates in a community‑run 5K organized by the Tacoma Community Garden, preferring low‑impact, nature‑centric activities over team sports.
  arts: Corey Carter captures the Pacific Northwest’s misty landscapes through photography inspired by Ansel Adams, strums acoustic folk songs by Sufjan Stevens and The Lumineers on guitar for personal
    relaxation, and enjoys board‑game nights featuring Terraforming Mars and Settlers of Catan, which satisfy their curiosity for strategic design.
  travel: Corey Carter favors self‑planned, low‑budget road trips that combine hiking in the Cascade Range with overnight stays at affordable hostels, has already visited the Hoh Rainforest and plans to
    explore Iceland’s volcanic terrain next summer, balancing a love for adventure with limited student finances.
  culinary: Corey Carter, a modest home‑cook, enjoys preparing grilled Pacific salmon with lemon‑dill glaze, mastering quinoa‑kale salads featuring locally foraged mushrooms, and occasionally experiments
    with DIY Arduino‑controlled sous‑vide for precise temperature control, while frequenting the local farmers’ market for fresh ingredients.
  core: Corey Carter blends quiet curiosity with a pragmatic streak, turning solitary tech tinkering and nature hikes into a grounded, eco‑focused ambition, while occasionally over‑indulging in late‑night
    Arduino experiments.
background:
  cultural: Corey was raised in Tacoma, Washington, in a middle‑class White American family with German and Scandinavian ancestry. Growing up in the Pacific Northwest, he was immersed in a culture that
    values environmental awareness, outdoor recreation, and a progressive community spirit. His upbringing emphasized self‑reliance, practical problem‑solving, and respect for nature, while also exposing
    him to the diverse cultural fabric of the Puget Sound region through school and local community activities.
