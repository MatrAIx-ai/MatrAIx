  hobbies: '[''Hiking'', ''Landscape photography'', ''Arduino microcontroller projects'', ''Reading (science‑fiction and non‑fiction)'', ''Board‑game nights (small group)'', ''Volunteering at community
    garden'', ''Acoustic guitar'']'
  career_goals: Corey aims to complete an associate degree in environmental technology or information systems within the next two years, and eventually secure a position as a technical support specialist
    for a local green‑tech company or as a field technician for the Washington State Department of Ecology. He aspires to blend his curiosity for emerging technologies with his commitment to environmental
    stewardship, hoping to contribute to sustainable solutions while maintaining a stable, community‑focused career.
