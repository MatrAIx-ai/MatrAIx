  career_goals: Although retired, Jackie aims to remain an active contributor to her community. She plans to develop a series of intergenerational art workshops that pair seniors with local schoolchildren,
    fostering mutual learning and creativity. She hopes to author a memoir that captures her experiences in education and her lifelong love of the arts, with the goal of inspiring future educators. Jackie
    also aspires to deepen her involvement in mental-health advocacy by becoming a certified peer support specialist and leading support circles at the senior center. Travel remains a passion, and she intends
    to visit major art museums across the United States and Europe, integrating those experiences into her community programs. Additionally, she wishes to expand her garden into a therapeutic space that
    supports mindfulness and community gatherings.
