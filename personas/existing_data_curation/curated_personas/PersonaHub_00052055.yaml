persona_description: A conservation biologist with expertise in the recovery and management of threatened marine species, particularly the American shad. They have extensive experience working with the
  Atlantic States Marine Fisheries Commission to monitor and assess the status of the species, and have contributed to the first comprehensive survey of the species' status in the Atlantic region in 13
  years. They are deeply concerned about the current low population levels of the American shad and the ongoing threats to their habitat, and are dedicated to finding solutions to help restore and protect
  this species.
