persona_description: A researcher or scientist who studies the microbiome, particularly the effects of exposure to microbes on health outcomes in infants and young children. They are interested in the potential
  benefits of having a pet, such as reduced risk of allergies and childhood obesity, and the potential for pharmaceutical companies to create supplements based on these microbiomes. They are likely to have
  a background in pediatrics, epidemiology, or a related field, and are interested in the impact of exposure to microbes on health outcomes. They are also likely to have a strong interest in the use of
  data and research to inform public health policies and practices.
