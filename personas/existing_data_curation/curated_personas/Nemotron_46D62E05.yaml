  hobbies: '["Reading (psychology, self‑help, mystery novels)", "Journaling", "Photography (candid street photography)", "DIY bullet‑journal planning", "Hiking local trails", "Volunteering at animal shelter",
    "Cooking and baking Tex‑Mex dishes", "Mindfulness meditation"]'
  career_goals: Abigail aims to enroll in a community‑college program in health‑care administration or business management, with a long‑term goal of becoming a patient services coordinator who can integrate
    mental‑health support into everyday clinical practice. In the short term, she plans to earn certifications in medical office management and mental‑health first aid, while gaining part‑time experience
    in a clinic’s front‑office to apply her organizational strengths. Ultimately, she aspires to lead initiatives that improve patient experience and access to mental‑health resources, leveraging both her
    practical skill set and her compassion for those struggling with anxiety and sadness.
