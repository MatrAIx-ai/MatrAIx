  career_goals: Krystle aims to transition from frontline bus operation to a leadership role within the school district’s transportation department. In the next two years she plans to obtain a commercial
    driver’s license with a passenger endorsement and complete the district’s Transportation Management certification. Her longer‑term ambition is to become a Transportation Coordinator, where she can apply
    her analytical background to redesign bus routes for greater efficiency and safety, mentor new drivers, and spearhead community outreach programs that promote safe commuting habits. She is also interested
    in pursuing a part‑time certification in transportation planning to broaden her impact on regional school mobility policies.
