  hobbies: '["gardening (succulents, herbs, drought-tolerant plants)", "cooking and baking (Tex-Mex, barbecue, pies)", "reading (historical novels, mysteries, memoirs)", "quilting", "birdwatching", "card
    games (bridge, euchre)", "volunteering at the library and senior center", "genealogy research", "attending church socials and classic country music events", "road trips to Texas historic sites"]'
  career_goals: Evelyn's primary ambition is to remain an active, healthy presence in her community and family. She aims to compile a family cookbook that blends traditional Texas dishes with stories from
    each generation, preserving culinary heritage for her grandchildren. She also hopes to continue volunteering as a mentor for younger mothers at the local church, sharing her event-planning experience
    and practical life skills. A personal goal is to complete a community-college coursework series on Texas history and native plant conservation, satisfying her curiosity while contributing to local preservation
    efforts. Maintaining her physical wellbeing through regular walks, gardening, and gentle stretching is another key goal, as is staying technologically up-to-date to help her family navigate the digital
    world.
