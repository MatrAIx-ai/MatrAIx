personas:
  professional: Evelyn Ellis, a seasoned community volunteer and genealogical workshop facilitator, blends hands‑on home‑repair know‑how with a cooperative, easy‑going style to coordinate church fairs and
    library events, marrying her curiosity for Texas history with a practical, low‑key approach to budgeting and logistics.
  sports: Evelyn Ellis enjoys low‑impact fitness through daily walks around the nearby lake, bird‑watching hikes, and cheering on the Dallas Cowboys and Texas Longhorns each Sunday, while also participating
    in a senior walking club at the local community center that doubles as a light‑exercise social gathering.
  arts: Evelyn Ellis finds joy in classic country concerts featuring George Strait and Willie Nelson, devours historical novels by Cormac McCarthy, and spends evenings quilting patterned blankets inspired
    by the prairie landscape, all while curating a modest collection of paintings by regional artist Susanna Hedges.
  travel: Evelyn Ellis prefers relaxed, road‑trip style travel, often taking weekend drives to historic Texas sites like Marfa, Fort Davis, and the Alamo, stopping for picnics near desert gardens with a
    loose itinerary, budgeting carefully, and dreaming occasionally of a cross‑country train adventure to see the Grand Canyon.
  culinary: Evelyn Ellis, an avid home cook, blends Tex‑Mex flair with fresh herbs from their garden to create signature dishes such as green‑chile chicken enchiladas, smoky brisket glazed with rosemary‑infused
    BBQ sauce, and lavender‑scented peach cobbler, while sometimes over‑salting a pot of chili when testing new spice blends.
  core: Evelyn Ellis, a garden‑toting, quilt‑making community champion who balances old‑timer Texan hospitality with a relaxed, curiosity‑driven outlook, never misses a church pot‑luck but often misplaces
    their reading glasses.
background:
  cultural: Evelyn grew up in the wide-open landscape of West Texas, where the rhythm of life was shaped by ranching, oil fields, and close-knit small-town communities. As a white Texan born in the late
    1950s, she was raised in a family that valued self-reliance, hospitality, and a strong work ethic. Her upbringing was steeped in Protestant church traditions, Sunday pot-lucks, and annual community
    fairs that celebrated regional food and folk music. The desert climate taught her to appreciate resourcefulness - learning to grow food with limited water and to make the most of seasonal ingredients.
    Over the decades, the blend of ranch heritage, the oil boom, and the influx of Hispanic cultural influences in the area have given her a nuanced appreciation for the diverse traditions of Texas, while
    her own customs remain rooted in classic Texan modesty, family-centered values, and a love of the outdoors.
attributes:
  skills: '["home cooking (Tex-Mex, barbecue)", "gardening (drought-resistant plants and herbs)", "basic home repairs (plumbing, electrical safety, carpentry)", "first aid and CPR certification", "event
