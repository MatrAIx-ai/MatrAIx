  career_goals: Nether aims to transition from his current role as a regional marketing manager to a senior director position overseeing multiple market territories, with a focus on integrating diversity
    and cultural authenticity into brand narratives. He is passionate about mentoring emerging marketers, especially those from underrepresented backgrounds, and aspires to launch his own consultancy that
    helps minority‑owned businesses craft compelling, socially resonant campaigns. Additionally, he hopes to spearhead a community‑based marketing initiative that amplifies local arts and cultural events
    throughout West Texas.
