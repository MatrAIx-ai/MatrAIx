persona_description: A scientist and researcher who specializes in the field of Earth System Science, specifically focusing on the study of the carbon cycle and its interactions with the atmosphere, oceans,
  and terrestrial biosphere. This individual is likely to be involved in developing and using complex Earth System Models to inform policy on future emission pathways that are compatible with climate targets.
  They may be affiliated with institutions such as the Met Office Hadley Centre or the University of East Anglia. This person is likely to be a member of the Global Carbon Project, which provides an annual
  update to the state of anthropogenic carbon dioxide emissions, and is involved in the development of the Global Carbon Budget 2013 report.
