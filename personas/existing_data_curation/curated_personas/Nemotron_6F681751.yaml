  hobbies: '[''Visiting art galleries'', ''Attending live theater and experimental performances'', ''Flamenco dance'', ''Digital collage making'', ''Traveling and cultural exploration'', ''Reading contemporary
    literature'', ''Yoga and meditation'', ''Journaling'', ''Hosting tapas gatherings'', ''Street art photography'']'
  career_goals: Enma aims to complete a bachelor’s degree in arts administration or cultural management within the next two years, positioning herself for a role as a program coordinator at a museum or
    cultural nonprofit in Tampa. She envisions launching a community‑focused art outreach program that offers workshops for under‑served youth and ultimately becoming a director overseeing regional cultural
    events. Alongside her professional trajectory, she aspires to grow her own blog and podcast series that spotlight emerging artists and unconventional art forms.
