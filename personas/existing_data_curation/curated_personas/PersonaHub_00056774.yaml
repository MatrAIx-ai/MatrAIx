persona_description: A U.N. Environment Program director who advocates for the reduction of greenhouse gas emissions and the use of alternatives to ozone-depleting chemicals, especially those that are not
  harmful to climate stability. He is knowledgeable about the Montreal Protocol and the Kyoto Protocol, and has contributed to a 31-page report outlining steps governments can take to curtail the use of
  these chemicals. He is also aware of the impact of CFCs and their replacements on climate change and has advocated for a possible amendment to the Montreal Protocol setting reduction targets for them.
