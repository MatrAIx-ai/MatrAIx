  career_goals: Amelyn aims to advance into a senior leadership role—such as Director of Safety Operations or Vice President of Continuous Improvement—within the next five years, positioning herself to
    shape safety culture across the Buffalo manufacturing sector. She plans to obtain her Certified Safety Professional (CSP) credential and complete a Lean Six Sigma Black Belt to cement her expertise.
    Mentorship is a priority; she wants to establish a structured program for junior engineers at her firm and collaborate with the local technical college to teach safety engineering courses. Long‑term,
    she envisions transitioning to a consulting practice focused on sustainable, data‑driven safety solutions for small‑to‑mid‑size manufacturers in upstate New York.
