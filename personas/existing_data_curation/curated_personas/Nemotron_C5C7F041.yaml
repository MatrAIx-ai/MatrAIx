  hobbies: '[''Gardening'', ''Hiking'', ''Reading Historical Non‑Fiction'', ''Cooking Fusion Cuisine'', ''Playing Guzheng'', ''Volunteering for Community Safety Workshops'', ''Crossword Puzzles'', ''Sudoku'',
