personas:
  professional: Marie Compton, a seasoned electrical and electronics engineer with 25 years of analog and digital hardware design, leverages Altium Designer, Arduino and IoT prototyping to lead sustainable
    solar PV and smart‑home projects, while mentoring junior engineers and championing women‑in‑STEM initiatives with an assertive yet collaborative style, and they are preparing for a PE license.
  sports: Marie Compton enjoys weekend hikes in Laguna Coast Wilderness Park, practices yoga at the Pacific Yoga Collective, supports the Los Angeles Lakers and LA Galaxy, and is a member of the Sierra
    Club Hiking Chapter, approaching fitness with a laid‑back yet consistent routine that favors outdoor activity over gym workouts.
  arts: Marie Compton fuels their creative spirit by oil‑painting coastal scenes, photographing urban murals inspired by Banksy and James Turrell, and frequenting contemporary exhibitions at LACMA featuring
    artists like Kara Walker, while they often incorporate lighting concepts from Turrell into their own DIY smart‑home projects.
  travel: Marie Compton prefers spontaneous road trips along the California coast to Big Sur, weekend getaways to Santa Barbara, and cultural immersions in Mediterranean locales such as Tuscany and Santorini,
    planning loosely enough to accommodate impromptu art festivals yet budgeting carefully to fund their solar‑energy investments.
  culinary: Marie Compton delights in preparing Mediterranean dishes like ratatouille, grilled halloumi with fresh basil, and tzatziki with Kalamata olives, showcasing a competent home‑cooking skill set
    that pairs well with their love for crisp Chianti Classico and aromatic Greek Assyrtiko during wine‑tasting evenings with friends.
  core: Marie Compton blends a curious engineering mind with a love for art, yoga, and Mediterranean food, navigating life with flexible plans, occasional disorganization, and a steadfast drive to merge
    sustainability with creativity.
background:
  cultural: Marie grew up in a middle‑class, Anglo‑American family in Southern California during the late 1960s and 1970s, a period marked by cultural shifts that fostered her open‑mindedness and curiosity.
    While her ethnic background is white, her upbringing blended traditional American values—self‑reliance, hard work, and community involvement—with the eclectic, progressive vibes of the West Coast. Exposure
    to the vibrant art scene of nearby Los Angeles and the tech‑driven environment of Orange County shaped her appreciation for both creative expression and innovation. Her personal narrative reflects a
    balance between conventional suburban life and a desire to explore unconventional ideas, evident in her career choices and artistic hobbies.
attributes:
  skills: '[''Analog circuit design'', ''Digital signal processing'', ''PLC programming (Allen‑Bradley)'', ''PCB layout (Altium Designer)'', ''Power distribution analysis'', ''Arduino and Raspberry Pi prototyping'',
    ''Troubleshooting and diagnostics'', ''Technical documentation'', ''Project coordination'', ''Mentoring junior engineers'']'
  hobbies: '[''Oil painting'', ''Photography'', ''Hiking in Laguna Coast Wilderness Park'', ''Yoga'', ''DIY electronics projects (Arduino, Raspberry Pi)'', ''Visiting contemporary art galleries'', ''Volunteer
    tutoring high‑school students in robotics'', ''Cooking Mediterranean cuisine'', ''Traveling to cultural festivals'', ''Wine tasting'']'
  career_goals: Marie aims to transition her engineering expertise toward sustainable technologies, specifically solar PV system design and smart‑home energy management solutions. She plans to obtain her
    Professional Engineer (PE) license within the next two years to broaden her consulting opportunities. Long‑term, she envisions launching a boutique consultancy that helps residential developers integrate
    eco‑friendly electrical designs while incorporating artistic lighting installations—melding her technical acumen with her appreciation for art. Additionally, she hopes to develop a mentorship program
    for women entering the STEM fields, leveraging her own non‑traditional career path.
