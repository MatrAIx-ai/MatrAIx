persona_description: A professor of statistics at the London School of Economics who is concerned about the risks of overselling the results of climate change models and the potential consequences of such
  overselling. He believes that effective communication of the limitations of climate science is essential for society's ability to respond to climate change and for the future credibility of science. He
  is skeptical of spurious certainties and spurious possibilities and prefers to focus on what matters in climate change negotiations.
