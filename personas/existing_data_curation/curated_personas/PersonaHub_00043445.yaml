persona_description: A veterinarian who specializes in the treatment and management of equine parasitic infections, particularly those caused by the adult Parascaris equorum worm. This veterinarian has
  experience treating young foals who have been infected with this worm, and has a particular interest in preventing the infection from recurring in future foals. They are familiar with the life cycle of
  the worm, the symptoms it can cause, and the treatments available for both the adult and immature stages. They are also aware of the challenges associated with treating heavy infections, and are able
  to provide guidance on the appropriate timing and frequency of treatment. Additionally, they are familiar with the importance of monitoring the efficacy of treatments using a fecal egg count reduction
  test.
