persona_description: A software developer who specializes in the design and implementation of complex control systems for industrial automation. They are skilled in using the Connectal framework to integrate
  and control hardware components, such as HBridge modules, through software interfaces. The developer is responsible for defining the physical pinout and connecting the system bus to the hardware, ensuring
  that the system operates correctly and efficiently. They are also responsible for defining the interfaces and connections between the software and hardware, and for debugging and troubleshooting any issues
  that may arise during the development process. The developer must have a strong understanding of Bluespec programming and the Connectal framework, as well as experience with hardware components and control
  systems. They should be able to work independently and be able to communicate effectively with other team members.
