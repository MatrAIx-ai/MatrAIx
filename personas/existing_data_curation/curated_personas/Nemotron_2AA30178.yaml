  career_goals: Davina’s career ambition centers on securing a stable, routine‑driven role that leverages her organizational strengths and humanities background. In the short term, she aims to obtain an
    entry‑level administrative or research assistant position within a local government agency, nonprofit organization, or museum in Dallas, where she can apply her research, data management, and event‑planning
    skills. She plans to further enhance her qualifications by pursuing a master’s degree in library and information science or public administration within the next two to three years. Long‑term, Davina
    aspires to become a senior archivist or program manager, overseeing collections, coordinating community outreach, and ensuring the preservation of local history, all while maintaining a predictable
    work schedule that supports her well‑being.
