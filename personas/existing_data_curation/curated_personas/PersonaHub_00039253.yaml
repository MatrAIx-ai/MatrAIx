persona_description: A political scientist who studies legislative processes and the effectiveness of legislative bodies in promoting and implementing reforms. They are familiar with the intricacies of
  Mexico's political system and the challenges faced by its legislative body, the Congress. They have a keen interest in comparing the legislative performance of Mexico with other countries in Latin America
  and the United States. They are also interested in the role of gridlock in shaping legislative outcomes and the potential for slow, gradual, and piecemeal reform to be considered efficient and productive.
