persona_description: A sociologist who is known for her contributions to the field of urban sociology, particularly for her work on gentrification and its impact on working-class communities. She is a key
  figure in the institutionalisation of British sociology as an academic subject, and her work has been influential in shaping our understanding of cities. Her interdisciplinary approach to research, drawing
  on different parts of the world, has also been influential in her field. She was a co-founder of the Centre for Urban Studies at UCL and is recognized for her contributions to urban sociology, including
  the development of the term 'gentrification'.
