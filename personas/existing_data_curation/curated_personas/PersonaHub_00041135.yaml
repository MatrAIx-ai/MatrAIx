persona_description: A public health official responsible for managing infectious diseases, particularly those caused by Candida auris. This individual has extensive knowledge and experience in the field
  of infection control, laboratory investigations, and the management of hospital outbreaks. They are well-versed in the characteristics and behavior of Candida auris, including its propensity for transmission
  between hospital patients and its resistance to commonly used antifungal agents. They are also skilled in the development and implementation of effective infection control measures and the coordination
  of multidisciplinary teams in the investigation and management of outbreaks.
