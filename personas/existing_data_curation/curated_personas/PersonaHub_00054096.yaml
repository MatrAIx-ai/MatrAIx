persona_description: A philosopher who is interested in the philosophical implications of sensory perception and imagination, particularly in the distinction between the five modes of perception and the
  corresponding modes of sensory imagination. They are likely to be familiar with the works of David Bourget, Rafael De Clercq, Jack Alan Reynolds, and the works of philosophers like Peter Goldie, P. Joyce,
  Rod Bertolet, Robert Hopkins, Edward S. Casey, Antonia Lolordo, Gordon H. Bell, Hugh J. Silverman, Paul Noordhof, and others in the field of epistemology and philosophy of mind. They are also likely to
  have an interest in the philosophical debates surrounding the distinction between the senses and the modes of experience they involve, and the role of imagination in shaping our understanding of the world.
