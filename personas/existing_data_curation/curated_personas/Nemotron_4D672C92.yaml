personas:
  professional: Michael Etheridge, a seasoned automotive service technician with three decades of expertise in engine repair, hybrid system tinkering, and classic‑car restoration, channels their practical
    curiosity and flexible problem‑solving into mentoring apprentices and aspiring students while eyeing a low‑stress, part‑time teaching role.
  sports: Michael Etheridge, a loyal fan of the Louisville Bats who spends weekends casting lines on the Nolin River and attending the Kentucky Derby to cheer for thoroughbreds, also maintains a modest
    membership in the local classic‑car racing club that satisfies their love of speed and camaraderie.
  arts: Michael Etheridge, an enthusiast of automotive design magazines, classic‑car shows, and Kentucky bluegrass guitar tunes, finds artistic outlet in crafting wooden toys for grandchildren and admiring
    regional folk art at summer fairs, letting their creativity complement the precision of their mechanical work.
  travel: Michael Etheridge, preferring spontaneous road trips in their restored 1966 Chevrolet truck to nearby fishing spots on the Nolin River and occasional pilgrimages to the Detroit Auto Show or the
    Mercedes‑Benz Museum in Stuttgart, blends low‑cost planning with a love of classic‑car culture to satisfy both their wanderlust and budget constraints.
  culinary: Michael Etheridge, a weekend barbecue aficionado who experiments with Kentucky‑style rubs on slow‑smoked brisket, pork ribs, and grilled vegetables from their garden—often coaxing flavors with
    hickory and apple wood while occasionally over‑spicing a batch in their zeal for perfect smoke—relishes the communal feasts that anchor their family gatherings.
  core: Michael Etheridge, a 62‑year‑old automotive veteran who blends classic‑truck restoration, fishing, woodworking, and smoky barbecue with a cautious yet curious mindset, often worries about the future,
    prefers flexible, low‑stress work, and indulges in spontaneous hobbies that keep life both grounded and adventurous.
background:
  cultural: Michael grew up in a working‑class family in rural Kentucky, steeped in the values of Southern hospitality, self‑reliance, and community involvement. His cultural heritage blends Appalachian
    folk traditions with Mid‑Southern customs—he celebrates the Kentucky Derby, enjoys local bourbon and barbecue, and participates in church gatherings at his Methodist congregation. The regional emphasis
    on practical skill, hands‑on work, and a down‑to‑earth outlook shaped his pragmatic approach to life, while his parents’ stories about early automobile repair sparked his lifelong curiosity for mechanics.
attributes:
  skills: '["Engine diagnostics and repair", "Brake and suspension service", "Transmission rebuild (manual & automatic)", "Hybrid and electric vehicle troubleshooting", "Classic car restoration", "Welding
    and metal fabrication", "HVAC system servicing for vehicles", "ASE certification (A1‑A8)", "Customer communication and service", "Mentoring and training apprentices", "Shop safety and compliance", "OBD‑II
    diagnostic software usage"]'
  hobbies: '["Fishing", "Woodworking", "Classic car club participation", "Restoring vintage trucks", "Barbecue cooking", "Gardening", "Watching the Kentucky Derby", "Reading automotive magazines", "Online
    automotive forums", "Volunteer mentoring at community college"]'
  career_goals: Michael aims to secure a low‑stress, part‑time position that allows him to pass his extensive knowledge to younger technicians, either as a senior mentor at his current garage or as an adjunct
    instructor at the local community college’s automotive program. He is working toward completing the remaining ASE Master Technician exams to solidify his professional credentials. Though approaching
    traditional retirement age, he hopes to eventually open a boutique workshop dedicated to classic truck and car restoration, blending his love of tradition with his curiosity about modern electric drivetrains.
    Financial stability and reduced daily stress are central to his long‑term plan, allowing him more time for his wife and personal hobbies.
