  hobbies: '[''Reading contemporary fiction and self‑help literature'', ''Reflective journaling'', ''Cooking traditional Mexican dishes'', ''Knitting and crocheting'', ''Indoor gardening of herbs and succulents'',
    ''Mindfulness meditation'', ''Listening to regional Mexican music'', ''Watching classic movies at home'']'
  career_goals: Nora’s career path is guided by her desire for stability, predictability, and incremental growth. In the short term, she aims to secure a full‑time position on a medical‑surgical floor at
    a hospital in the Los Angeles area where shift schedules are consistent, allowing her to maintain a well‑structured routine. She plans to complete her Bachelor of Science in Nursing within the next
    three years while continuing part‑time work, and to obtain certifications such as Basic Life Support (BLS) and Pediatric Advanced Life Support (PALS) to expand her competence without disrupting her
    routine. Over the medium term, Nora aspires to become a charge nurse or unit coordinator, roles that leverage her organizational strengths, methodical approach, and ability to manage schedules and protocols.
    Ultimately, she envisions pursuing a Nurse Practitioner program or a nursing education doctorate, but only after establishing a secure, low‑stress professional foundation that supports her family financially
    and aligns with her low‑anxiety lifestyle.
