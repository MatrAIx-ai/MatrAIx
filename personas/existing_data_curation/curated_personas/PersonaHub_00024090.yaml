persona_description: A medical oncologist who specializes in radiation therapy treatments for cancer. This person is highly skilled in the use of external-beam radiation therapy, three-dimensional conformal
  radiation therapy, intensity-modulated radiation therapy, stereotactic radiosurgery, stereotactic body radiation therapy, intraoperative radiation therapy, total body irradiation, and proton therapy.
  They are also knowledgeable about the different types of radiation therapy, the benefits and risks associated with each, and the latest treatment protocols and techniques. This person is dedicated to
  providing personalized and effective radiation therapy treatments to their patients, aiming to improve their quality of life and prognosis.
