personas:
  professional: Geovanny Perez, a retired retail entrepreneur with three decades of leading a family‑owned store in Bayamón, now channels their strategic planning and budgeting acumen into mentoring budding
    business owners, advising the local Chamber of Commerce, and producing a community blog that blends practical tips with cultural storytelling.
  sports: Geovanny Perez enjoys walking his neighborhood parks, playing weekly senior softball with the Bayamón Senior League, cheering for the Bayamón Bulls basketball team, and following the local soccer
    club Bayamón FC, all while maintaining a flexible fitness routine that balances social camaraderie with gentle cardio.
  arts: Geovanny Perez is captivated by the rhythms of plena and salsa, often listening to legends such as Celia Cruz and Gilberto Santa Rosa, photographing vibrant street murals by local artists like José
    Rivera, and reading historical works on the island’s heritage, which together shape their appreciation for music, visual art, and storytelling.
  travel: Geovanny Perez plans relaxed escapades that blend adventure and family time, such as an upcoming trip to the pristine beaches of Culebra’s Flamenco Beach and a cultural tour of Vieques’s historic
    forts, while also favoring short road trips to nearby nature reserves, always budgeting conservatively and coordinating travel with their wife’s calendar.
  culinary: Geovanny Perez delights in cooking classic dishes like mofongo stuffed with savory pork, arroz con gandules seasoned with sofrito, and herb‑infused soups using cilantro and culantro, displaying
    a competent yet unhurried kitchen style that often results in generous portions and occasional burnt edges when they get distracted by a lively domino game.
  core: Geovanny Perez, a sociable senior with a practical curiosity, blends mentorship, community service, and a love for food and music while occasionally misplacing bills, forgetting to water plants,
    and humming salsa tunes during domino matches.
background:
  cultural: Geovanny was born and raised in Bayamón, a municipality known for its strong family ties and lively community life. As a Puerto Rican, he grew up immersed in Catholic traditions, the island’s
    rich musical heritage, and a cuisine that celebrates bold flavors. He has witnessed the resilience of his neighborhood through economic shifts and hurricanes, which reinforced a collective spirit of
    cooperation and adaptability. Bilingual in Spanish and English, he navigates both local customs and broader Caribbean influences, cherishing the island’s history while actively contributing to its present-day
    cultural fabric.
