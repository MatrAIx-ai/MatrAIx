  career_goals: Although retired from daily employment, Geovanny is eager to stay engaged. His primary ambition is to mentor the next generation of local entrepreneurs, sharing pragmatic advice and encouraging
    innovative thinking. He hopes to serve on the Bayamón Chamber of Commerce’s advisory committee, contribute to disaster-relief planning, and launch a modest community blog chronicling business tips and
    Puerto Rican cultural stories. Additionally, he plans to travel to Culebra and Vieques, learn basic photography techniques, and continue personal growth through occasional language-exchange meet-ups.
