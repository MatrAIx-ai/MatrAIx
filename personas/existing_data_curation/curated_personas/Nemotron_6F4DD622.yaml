  hobbies: '["Book clubs","Community theater","Partner dancing","Gardening","Cooking and baking","Volunteering at food bank","Hiking and trail walking","Yoga","Journaling","Church outreach"]'
  career_goals: Evelyn aims to transition her extensive volunteer experience into a formal role as a community health outreach coordinator or nonprofit program manager within the next three years. She plans
    to complete a certificate in social work or community health, and hopes to launch a neighborhood support network that offers peer‑led stress‑management workshops, nutrition education, and a community
    garden. Ultimately, she aspires to blend her practical skills with her compassion to create sustainable resources that enhance wellbeing for residents of Lehigh County.
