personas:
  professional: Maria White, a veteran metal fabricator with three decades of hands‑on experience in industrial assembly, blends meticulous CNC programming, MIG/TIG welding, and OSHA safety leadership with
    a pragmatic yet occasionally scattered approach to documentation; they aim to become a senior mentor and weekend workshop instructor before retirement.
  sports: Maria White enjoys leisurely fishing trips along the nearby Lake of the Ozarks, participates in the Dittmer Senior Active Club’s weekly walks, roots for the St. Louis Cardinals in baseball and
    the Kansas City Chiefs in football, and they maintain a modest fitness routine of garden work and low‑impact yoga classes at the community center.
  arts: Maria White finds artistic solace quilting patterns inspired by traditional Amish designs while listening to classic country legends like Johnny Cash and Dolly Parton, and they showcase their hand‑crafted
    metal jewelry at the local historical society’s art fairs alongside pieces by regional folk artist Susan Brown.
  travel: Maria White prefers carefully planned road trips that balance budget with adventure, having already driven the scenic byways of the Ozark National Riverways and a nostalgic visit to Nashville’s
    Country Music Hall of Fame, while they dream of a future pilgrimage to their ancestral towns in Germany and a leisurely cruise along the Mississippi River.
  culinary: Maria White delights in cooking hearty Midwestern fare such as chicken pot pie with rosemary‑infused gravy, fried catfish seasoned with cornmeal and paprika, and fresh garden salads featuring
    heirloom tomatoes and snap peas, and they often pair meals with a slice of homemade cornbread and a glass of sweet tea.
  core: Maria White is a steadfast, hands‑on mentor who fuses old‑world craftsmanship with modern safety standards; they juggle a love for gardening and metalwork while quietly wrestling with worry and
    occasional disorganization.
background:
  cultural: Maria was born and raised in rural Missouri to a multigenerational white farming family with German‑American roots. The community emphasized hard work, self‑reliance, modest living, and regular
    church attendance; she grew up in a Methodist congregation and maintains close ties with neighbors. Midwestern values of straightforward communication, practical problem‑solving, and helping others
    have shaped her pragmatic outlook. While she respects tradition, she has also adapted to the region’s shift from agriculture to small‑scale manufacturing, blending a reverence for heritage with a willingness
    to learn new technical skills.
attributes:
  skills: '["Metal assembly", "CNC machine operation", "MIG/TIG welding", "Blueprint reading", "Quality inspection", "Inventory management", "OSHA safety compliance", "Troubleshooting mechanical issues",
