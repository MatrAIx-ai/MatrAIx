  hobbies: '["Gardening", "Quilting", "Knitting", "Birdwatching", "Classic country music", "Small engine repair", "Metal jewelry making", "Historical society volunteering"]'
  career_goals: Maria aims to transition into a senior mentor role before retirement, securing an OSHA 30‑hour certification and a journeyman fabricator badge. She dreams of leading a weekend workshop where
    she can teach basic metalworking skills to local youth and values passing on her practical knowledge. She plans to reduce her weekly hours to part‑time, allowing more time for her garden and community
    volunteering, while ensuring financial stability through a modest pension and occasional freelance fabrication projects. Ultimately, she wants to leave a legacy of safety awareness and craftsmanship
    within her plant and town.
