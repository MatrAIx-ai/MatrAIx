  career_goals: Although still very young, Lona often imitates adults in role‑play and expresses a desire to 'be a teacher' like the caregiver who reads to her. She enjoys helping with pretend classroom
    activities and shows a budding interest in structured, helping‑oriented roles such as teacher, caregiver, or community helper. She also wants to become "the best" at building block towers and solving
    simple puzzles, reflecting a nascent competitive drive. Her long‑term ambition, as observed through her play, is to learn to read and to engage in activities that provide clear routines and responsibilities.
