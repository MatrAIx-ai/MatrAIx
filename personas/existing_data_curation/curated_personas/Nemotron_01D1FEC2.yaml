personas:
  professional: Lona Hogan, a two‑year‑old who loves routine, spends their playtime arranging toy blocks into tidy rows and pretending to be a manager in a makeshift office, channeling their practical,
    structure‑seeking personality into early pretend‑work scenarios.
  sports: Lona Hogan, a two‑year‑old enrolled in a toddler gymnastics class, delights in the structured warm‑up routine, strives to be the first to complete the balance beam, and cheers for the 'Mini‑Tigers'
    youth soccer team on TV, displaying their competitive edge.
  arts: Lona Hogan, a two‑year‑old who sings loudly along to 'The Wheels on the Bus' and colors simple circles while insisting each drawing stay within the lines, blends their talkative nature with a desire
    for order in creative expression.
  travel: Lona Hogan, a two‑year‑old who enjoys family trips to the local zoo where they follow the same walking route each visit, loves the predictable schedule of a beach day with sandcastle building,
    and looks forward to returning to the familiar 'play‑and‑snack' corner at the hotel lobby.
  culinary: Lona Hogan, a two‑year‑old with a picky palate, prefers soft banana slices, cheese cubes, and plain crackers, insists on foods being cut into uniform shapes, and proudly refuses anything with
    a 'messy' texture, reflecting their love of predictability.
  core: Lona Hogan, a two‑year‑old who thrives on tidy routines, competitive play, and predictable snack times, yet they occasionally erupt in stubborn tantrums when faced with new foods or unexpected changes.
background:
  cultural: Lona is raised in a white, middle‑class family in Fairborn, Ohio, part of the broader Midwestern United States culture. Her upbringing emphasizes practical values, routine, and community involvement
    typical of the region. She celebrates common American holidays such as Thanksgiving, Christmas, and the Fourth of July, often participating in local community events and family gatherings. English is
    her primary language, and she is occasionally exposed to basic Spanish words through community programs. The local culture of politeness, safety, and a structured environment shapes her daily life and
    reinforces her preference for predictable activities.
