  hobbies: '[''Gardening and herb cultivation'', ''Watercolor painting'', ''Book club participation'', ''Community theater attendance and backstage volunteering'', ''Visiting art galleries and fairs'',
    ''Quilting and crochet circles'', ''Family recipe cooking and sharing'', ''Genealogy research'', ''Social gatherings and dance events'', ''Outdoor walks and nature observation'']'
  career_goals: Leslie aims to deepen her involvement in the community by establishing a quarterly intergenerational art exchange at the local senior center, where seniors and schoolchildren collaborate
    on projects. She hopes to compile oral histories of longtime Hospers residents into a small anthology, preserving the town’s heritage for future generations. Learning digital photography and basic social‑media
    skills is on her agenda, so she can document her garden, artwork, and community events and share them online. She also dreams of taking a short road‑trip to visit regional art museums in Iowa City and
    Des Moines, exploring modern and contemporary art that fuels her curiosity. Above all, Leslie wants to remain physically active, socially connected, and emotionally fulfilled, ensuring she continues
    to be a supportive presence for her spouse, friends, and extended family.
