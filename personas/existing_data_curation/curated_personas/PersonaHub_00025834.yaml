persona_description: A wildlife researcher and photographer who is passionate about the study of bison and their conservation, particularly in the Sturgeon River plains bison herd in Prince Albert National
  Park, Saskatchewan. They are skilled at field observation, photography, and data analysis, and are dedicated to understanding the behaviors, ecology, and management of this unique bison herd. They are
  interested in the application of photography as a tool for conservation research and have published articles on the use of photographs in likelihood-based identification of free-ranging bison. They have
  a keen interest in the broader context of bison conservation in North America, and are interested in learning about the use of photography as a research and conservation tool. They are also interested
  in reducing human-wildlife conflicts and have experience working with wildlife conservation organizations.
