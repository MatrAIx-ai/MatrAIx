persona_description: A planner or developer who is committed to creating transit-friendly developments that prioritize accessibility and connectivity. They are aware of the benefits of smart growth and
  traditional neighborhood design, and are interested in incorporating pedestrian accessibility and street-oriented site design into their projects. They also recognize the importance of transit-access
  design and are seeking guidance on how to ensure that development sites are accessible by public transportation. They are likely to be involved in the planning and review of development plans, especially
  for areas that will be served by public transportation.
