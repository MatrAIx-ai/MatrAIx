  hobbies: '[''LEGO building'', ''Model kits'', ''Soccer'', ''Reading adventure/mystery books'', ''Gardening'', ''Dog walking'', ''Playing piano'', ''Scratch coding'', ''Attending community fairs'']'
  career_goals: Antonio aspires to become an engineer—particularly civil or mechanical—so he can design reliable, practical structures and machines. He plans to attend a technical high school and later
    pursue an engineering degree at a university, focusing on subjects that involve systematic problem solving. He also hopes to volunteer as a junior firefighter in his community, combining his desire
    to help others with his methodical approach. Over time, he envisions developing his organization and leadership skills to manage larger projects and contribute to community infrastructure.
