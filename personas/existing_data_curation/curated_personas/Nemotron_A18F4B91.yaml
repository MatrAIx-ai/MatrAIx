personas:
  professional: Antonio Mcadam, a 12-year-old aspiring engineer, loves constructing LEGO sets and model kits, approaches each build with disciplined step-by-step planning, and channels that methodical mindset
    into coding simple games on Scratch, dreaming of a future in robotics.
  sports: Antonio Mcadam, a 12-year-old midfielder on the Genoa Youth Soccer Association, thrives on the regimented twice-weekly practices, cheers on the Green Bay Packers on Sundays, admires the Milwaukee
    Brewers during the summer, and balances team drills with daily dog walks to stay active.
  arts: Antonio Mcadam, a 12-year-old piano enthusiast, spends evenings mastering Beethoven's "Für Elise," enjoys the whimsical scores of the LEGO Movie soundtrack, devours adventure series by Rick Riordan,
    and idolizes the acting of Tom Holland in the Spider-Man films.
  travel: Antonio Mcadam, a 12-year-old who delights in family road trips to the Wisconsin Dells water parks, annual visits to Chicago's Museum of Science and Industry, and dreams of exploring the geysers
    of Yellowstone and the magic of Disney World, usually plans trips with a checklist and a map drawn on lined paper.
  culinary: Antonio Mcadam, a 12-year-old who loves helping in the garden, often chops fresh tomatoes and sweet corn for a homemade pizza, whips up a classic buttery mac and cheese with a sprinkle of cheddar,
    and enjoys the occasional treat of apple-cinnamon crumble the family bakes on Sunday.
  core: Antonio Mcadam is a methodical 12-year-old who balances a love of structured LEGO builds and soccer with quiet moments of piano practice, always planning ahead and keeping a tidy schedule, even
    if they sometimes forget to water the garden on a rainy day.
background:
  cultural: Antonio is a white Midwestern American from Genoa City, Wisconsin. He grew up in a close‑knit small‑town environment where family, church, and community gatherings are central to daily life.
    The local culture emphasizes hard work, practical skills, neighborly cooperation, and participation in regional traditions such as county fairs, high‑school football games, and church celebrations.
    These values reinforce his organized, considerate, and routine‑oriented personality.
attributes:
