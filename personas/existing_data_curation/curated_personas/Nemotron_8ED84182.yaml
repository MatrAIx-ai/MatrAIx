personas:
  professional: John Bacevac is a budding mechanical designer who translates their love for LEGO Technic and model kits into a methodical, step‑by‑step problem‑solving style, using Scratch coding to prototype
    simple mechanisms while their preference for structure and reliability makes them a go‑to teammate for group projects in Boy Scouts.
  sports: John Bacevac enjoys informal three‑on‑three basketball games with a close group of friends after school, cheers for the local youth basketball league team the Riverside Raptors, and channels the
    same teamwork and endurance into Boy Scout hiking trips where they often take the lead on trail navigation and bird‑spotting challenges.
  arts: John Bacevac spends free time drawing comic‑style panels inspired by the mystery novels they read, listening to classic country and folk legends like Dolly Parton, Willie Nelson, and Bob Dylan during
    family evenings, and creates animated short games on Scratch that blend narrative storytelling with the visual flair of their own illustrations.
  travel: John Bacevac plans weekend nature outings with the Scout troop to places like the nearby Willow Creek State Park for birdwatching, dreams of a summer trip to the Great Smoky Mountains National
    Park to document wildlife, and looks forward to a family vacation to Orlando’s theme parks, balancing the desire for adventure with the practical need to stay within a modest travel budget.
  culinary: John Bacevac prefers simple, hearty meals such as spaghetti with meatballs, grilled cheese with tomato soup, and homemade trail mix of peanuts, pretzels, and dried cranberries for Scout camping
    trips, and enjoys experimenting with a basic marshmallow‑toasted s’mores recipe, though they sometimes indulge in late‑night cereal bowls of Frosted Flakes topped with fresh strawberries.
  core: John Bacevac is a structured, quietly curious 12‑year‑old who blends meticulous LEGO building, disciplined scouting, and a love for country music into a habit of planning, saving, and gently nudging
    themselves toward new adventures while occasionally misplacing a crucial brick.
background:
  cultural: John was raised in Russellville, a small town in Cole County, Missouri, part of the American Midwest. His community is predominantly white and centered around agricultural life, with strong
    ties to family, church, and local traditions. Family meals, church gatherings, county fairs, and 4‑H events shape his social environment, emphasizing humility, hard work, self‑reliance, and neighborly
    support. The region's cultural values stress responsibility, modesty, and a close connection to the land, which influence John's outlook on education, career, and community involvement.
