  career_goals: John aims to graduate high school with solid grades and then pursue a vocational path that aligns with his practical interests. He is drawn to working with machines and hopes to become an
    automotive or farm‑equipment technician, learning engine repair and maintenance through a local trade apprenticeship or community college program. Over the long term, John envisions opening a small
    workshop that serves his neighborhood and the surrounding farms, providing reliable service to keep equipment running smoothly. He also holds a secondary interest in animal welfare, considering a future
    role as a veterinary assistant to support the care of farm animals. His ambitions are grounded in a desire to be dependable, contribute to his community, and maintain a stable, hands‑on career close
    to home.
