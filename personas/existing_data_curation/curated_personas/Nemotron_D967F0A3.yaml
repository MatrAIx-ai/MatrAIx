  career_goals: Enrique frequently talks about what he wants to be when he grows up. He loves fire trucks and often declares that he wants to be a firefighter who helps people. He also looks up to the preschool
    teachers who read stories and imagines becoming a teacher who shares books with younger children. Occasionally, he sings along to his favorite cartoon songs and says he wants to perform on stage, showing
    a budding ambition to be a performer. His goals are playful, centered on helping others, and enjoying the spotlight.
