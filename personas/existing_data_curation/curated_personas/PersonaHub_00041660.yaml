persona_description: Amy Devin and Lauren Pawlowski are public school teachers in Michigan who began teaching in resource rooms and moved to self-contained ASD elementary classrooms in 2009. They are passionate
  teachers who believe that they can help every child to read, write and communicate. They are experienced in teaching core vocabulary words in a practical and engaging manner, using hands-on learning,
  flexible comments, and connecting the words to text. They are dedicated to providing explicit instruction on core vocabulary words and are always looking for new ways to make the process more effective.
