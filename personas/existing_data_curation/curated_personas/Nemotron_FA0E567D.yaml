  career_goals: Marc plans to enroll in a local community college to earn an associate degree in information technology, with the long‑term ambition of becoming a cybersecurity analyst. He aims to obtain
    industry certifications such as CompTIA A+ and Network+ to secure a technical role after graduation. Parallel to his IT aspirations, he intends to launch a mobile car‑service business that offers affordable
    maintenance to residents of Rock Hill, leveraging his automotive expertise. His competitive drive pushes him to achieve measurable milestones, while his practical nature ensures he seeks job‑ready skills
    that can support his family and enable him to mentor younger peers in his community.
