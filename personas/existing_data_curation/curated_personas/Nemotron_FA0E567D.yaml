personas:
  professional: Marc Harris, an aspiring cybersecurity analyst, leverages a blend of hands‑on PC troubleshooting, entry‑level networking, and automotive maintenance skills to offer practical tech support
    for his community, channeling their curiosity‑driven yet methodical mindset into systematic problem solving while maintaining a competitive edge and a healthy dose of skepticism toward unverified solutions.
  sports: Marc Harris fuels their competitive spirit on the basketball court by playing pickup games at the neighborhood park and shooting for a spot on the Rock Hill Hoops Club, while cheering for the
    Charlotte Hornets during the NBA season and using structured drills to sharpen both stamina and strategic play.
  arts: Marc Harris channels creative energy into writing short rap verses inspired by Kendrick Lamar and classic soul legends like Marvin Gaye, while also crafting eye‑catching flyers using Canva and Photoshop
    for school projects and community events.
  travel: Marc Harris prefers budget‑friendly road trips, having explored nearby cities such as Charlotte, Atlanta, and Washington, D.C., while dreaming of a future solo adventure to New York City’s music
    scene, planning trips with meticulous itineraries that balance limited funds and a desire for cultural immersion.
  culinary: Marc Harris enjoys cooking quick Southern‑style meals like fried chicken with hot sauce and mac and cheese, often experimenting with garlic‑infused sauces, while also savoring a perfectly brewed
    iced coffee during late‑night coding sessions.
  core: Marc Harris is a tech‑savvy 18‑year‑old whose competitive drive and practical curiosity turn problem‑solving into a daily habit, even as they juggle late‑night gaming, skeptical instincts, and a
    meticulous budget.
background:
  cultural: Marc was raised in a Black family rooted in the Southern traditions of Rock Hill, South Carolina. His upbringing included regular church attendance, Sunday potlucks, and strong community ties
    that emphasized respect, perseverance, and storytelling. He grew up with an appreciation for Southern Black cuisine, gospel and soul music, and the legacy of local civil‑rights activists who inspired
    his sense of resilience and self‑reliance. Family narratives about overcoming adversity shaped his competitive spirit and practical outlook. While he stays connected to contemporary Black culture through
    music, fashion, and digital media, he also honors the historical and communal values that define his neighborhood.
