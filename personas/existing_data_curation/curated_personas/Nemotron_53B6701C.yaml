personas:
  professional: John Inglett is a mid‑career freelance photographer who blends modern digital mastery with vintage analog processes, using his humanities training to embed narrative depth into portrait,
    landscape and documentary work, while juggling client contracts and social media outreach in a fluid, sometimes disorganized workflow that reflects his preference for structure tempered by a relaxed
    approach to scheduling.
  sports: John Inglett is an avid cyclist who rides the historic trails of Suffolk County with the Riverhead Wheelmen club, competes in seasonal charity rides, and follows the New York Mets and Long Island
    Ducks, often using his bike rides as moving meditation to counterbalance his competitive nature and stress.
  arts: John Inglett engages deeply with the arts as a member of a local photography club, draws inspiration from the poetry of Whitman, the existential musings of Camus, and the indie folk sounds of Sufjan
    Stevens and Iron & Wine, while sketching street scenes in a pocket sketchbook and curating analog darkroom exhibitions that reveal his love of tactile creation.
  travel: John Inglett prefers meticulously planned bike tours of the Long Island coastal paths—such as the Montauk Point Lighthouse loop—and occasional spontaneous weekend getaways to historic towns like
    Mystic, Connecticut, while dreaming of a photographic pilgrimage to Iceland’s volcanic landscapes to capture auroral light for his future coffee‑table book.
  culinary: John Inglett cooks with a chef’s curiosity, masterfully preparing fresh local seafood like broiled branzino with lemon‑dill butter, New England clam chowder with thyme, and lobster rolls seasoned
    with a hint of Old Bay, yet he sometimes over‑salts dishes in his zeal to match the bold flavors of the indie folk playlists he pairs them with.
  core: John Inglett is a structured‑yet‑flexible photographer‑artist who channels his competitive edge and stress‑prone nature into crafting narrative‑rich images while savoring vintage analog rhythms,
    sea‑food meals, and contemplative bike rides along Long Island’s historic coast.
background:
  cultural: John grew up in a middle‑class suburban family on Long Island, with Anglo‑Irish ancestry that shaped a culturally Western viewpoint. His upbringing combined the independent, self‑reliant ethos
    typical of the East Coast with a strong sense of community found in local festivals, farmers’ markets, and historic preservation efforts. His bachelor's degree in the humanities deepened his appreciation
    for Western literature, philosophy, and art history, influences that permeate his photographic storytelling. Living in Riverhead, he is immersed in the maritime and agricultural heritage of Suffolk
    County, which informs both his visual subjects and his appreciation for regional traditions.
attributes:
  skills: '[''Digital photography'', ''Studio lighting'', ''Post-processing (Lightroom, Photoshop)'', ''Composition and visual storytelling'', ''Client communication'', ''Location scouting in Long Island'',
