  hobbies: '[''Cycling and nature walks'', ''Reading classic literature and philosophy'', ''Analog photography and darkroom work'', ''Cooking (especially seafood)'', ''Listening to indie folk music'', ''Sketching'',
    ''Participating in local photography club events'', ''Mentoring youth in art'']'
  career_goals: John aims to transition from ad‑hoc freelance assignments to operating his own boutique photography studio in Riverhead, where he can focus on fine‑art prints and limited‑edition coffee‑table
    books that capture the unique coastal character of Long Island. He aspires to be featured in a national photography magazine, host a solo exhibition at a regional gallery, and publish a historically
    contextualized photo book that blends his images with narratives of the area's colonial and maritime heritage. To achieve financial stability and creative independence, he plans to diversify his income
    by offering premium portrait packages, licensing images for commercial use, and teaching hands‑on workshops in both digital and analog techniques. He also hopes to mentor a small collective of emerging
    photographers, fostering a collaborative studio environment while maintaining personal artistic freedom.
