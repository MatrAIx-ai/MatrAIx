  career_goals: Elvin aims to ascend to a senior leadership role, such as Director of Information Systems or Chief Technology Officer, within the next five to seven years. He envisions spearheading digital
    transformation initiatives for cultural institutions—museums, galleries, and community arts centers—where he can merge technology with artistic expression. To support this, he plans to obtain certifications
    like PMP, CISSP, and AWS Solutions Architect, and to develop an internal innovation lab that pilots AI-driven content platforms. He also seeks to become a recognized thought leader at the intersection
    of tech and the arts, speaking at conferences and publishing case studies, while championing employee well‑being programs that mitigate stress and burnout.
