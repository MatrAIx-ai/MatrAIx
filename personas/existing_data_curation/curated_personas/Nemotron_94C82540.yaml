  hobbies: '[''Gardening'', ''Herb cultivation'', ''Birdwatching'', ''Nature photography'', ''Model ship building'', ''Restoring vintage hand tools'', ''Reading historical non-fiction'', ''Crossword puzzles'',
    ''Journaling'', ''Knitting'']'
  career_goals: Leah aims to consolidate her legacy by achieving Master Pipefitter certification and establishing a small consulting practice that advises historic restoration projects in Annapolis and
    the broader Mid‑Atlantic. She hopes to mentor more women entering skilled trades, creating a supportive apprenticeship network that emphasizes safety and work‑life balance. While she plans to scale
    back full‑time field work, she wants to remain involved in selective projects that integrate green technologies, such as low‑temperature hydronic heating and renewable‑energy‑compatible steam systems.
    Ultimately, she aspires to author a practical guide on aging‑home pipe maintenance, blending her curiosity for new methods with her pragmatic experience.
