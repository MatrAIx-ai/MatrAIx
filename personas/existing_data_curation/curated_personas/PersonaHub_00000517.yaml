persona_description: A businessperson with a strong interest in retail and real estate development, particularly in the Charlotte, North Carolina area. Latta's career in retail and real estate development
  is well-documented, and he was instrumental in the growth and modernization of Charlotte. He was involved in the establishment of the Four Cs, which included the Charlotte Consolidated Construction Company,
  and his involvement in the development of real estate in Charlotte. Latta's legacy in Charlotte is evident in the landmarks and buildings he helped to create, such as the Latta Arcade and the Charlotte
  Convention Center. He is likely to be interested in the history and development of Charlotte, as well as the impact of his career on the city.
