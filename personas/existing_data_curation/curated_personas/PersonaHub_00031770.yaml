persona_description: A historian who specializes in the study of American transportation history, particularly the development of the National Road and the toll roads that were established to maintain it.
  This person is knowledgeable about the construction of the Petersburg Toll House in 1835, the toll keepers who collected money from travelers, and the toll houses that were constructed every 15 miles
  on the National Road. They are also familiar with the history of the National Road and the toll roads that were established to maintain it, and have a deep interest in the economic and social impacts
  of transportation infrastructure on the development of the United States.
