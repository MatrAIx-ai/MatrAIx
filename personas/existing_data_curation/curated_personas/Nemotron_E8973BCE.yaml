  career_goals: Bernadette aims to transition from a senior administrative assistant to a leadership position such as Office Manager or Director of Administrative Services within the next two years. She
    is determined to be recognized as the most efficient and innovative office professional in her organization, leveraging her skepticism to continuously evaluate and improve existing processes. She also
    plans to obtain the Certified Administrative Professional (CAP) credential and complete a project management course to broaden her expertise. In parallel, she intends to mentor emerging administrative
    talent, sharing her practical knowledge and networking skills. Ultimately, she aspires to launch a boutique consulting service that helps small businesses and non‑profits streamline their operations,
    allowing her to capitalize on her competitive drive while maintaining personal flexibility.
