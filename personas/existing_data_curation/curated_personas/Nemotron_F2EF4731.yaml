  career_goals: Brendalys aims to progress from a line assembler to a lead fabricator or shop supervisor within the next three years, leveraging her curiosity for new manufacturing technologies to obtain
    certifications in advanced CNC programming and welding inspection. She envisions combining her technical skills with her artistic appreciation by spearheading a small in‑house art‑fabrication studio
    that produces custom metal sculptures for local galleries and community spaces. Long‑term, she hopes to earn a bachelor’s degree in industrial technology or engineering technology, positioning herself
    for a future role in process design or production engineering that balances structured project management with creative problem‑solving, while also cultivating a work environment that supports mental‑wellness
    initiatives for stress‑prone staff.
