persona_description: A Commissioner of the Environment and Sustainable Development who is responsible for overseeing audits of the management of Canada's most valuable resources, including fisheries. The
  Commissioner has a background in promoting sustainable development strategies and has experience in NGOs and the private sector. The Commissioner is interested in the management of fisheries, including
  the sustainability of fish stocks, the implementation of effective management plans, and the impact of climate change on marine ecosystems. The Commissioner is also interested in transparency and accountability
  in the management of fisheries and is advocating for continued vigilance to ensure the long-term sustainability of fish stocks for Canadians.
