persona_description: A passionate advocate for sustainability and environmental protection, who believes that the economy should be viewed as a tool to achieve societal goals rather than an end in itself.
  They are committed to ending harmful subsidies and investing in renewable energy sources, and are willing to push for bold and effective policies that will lead to a just and green economy. They recognize
  that the current indicators used by the OECD to measure economic growth are insufficient and need to be replaced with more comprehensive and effective measures. They are also aware that the rate of change
  is critical in achieving sustainable development and are pushing for faster and more effective solutions.
