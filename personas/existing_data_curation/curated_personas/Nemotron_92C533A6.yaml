  career_goals: Tiffani aims to advance from her supervisory role to an office manager or operations manager position within a regional organization, ideally one that integrates arts and community development.
    She plans to obtain a project management certification and possibly pursue a master's degree in public administration or business administration. Long‑term, she aspires to lead a nonprofit arts program
    or become a program director for a local arts council, where she can blend her administrative expertise with her passion for creativity, while mentoring emerging professionals and championing inclusive
    workplace practices.
