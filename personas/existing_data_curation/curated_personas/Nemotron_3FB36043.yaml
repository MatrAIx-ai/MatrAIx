personas:
  professional: Della Downing, a budding visual-arts curator even at one year old, showcases early curiosity by pointing at paintings at the Birmingham Museum of Art, mimicking brush strokes with finger
    paints, and echoing family storytelling rhythms, hinting at future expertise in curatorial collaboration that leans on flexibility, sociable energy, and an open‑minded approach to unconventional exhibits
    that they will one day champion.
  sports: Della Downing, an energetic stroller‑pusher who takes part in a local community center's toddler gymnastics class and gleefully waves a tiny Birmingham Barons cap while watching televised highlights
    of the Alabama Crimson Tide, embodies a playful, socially driven approach to early fitness and sports fandom that they share with other toddlers.
  arts: Della Downing, a curious miniature audience member, delights in colorful murals at the Birmingham Museum of Art, sways to the soulful brass of Louis Armstrong, and giggles at community‑theater puppet
    shows featuring local performers like Jess Hayes, weaving these artistic moments into their early sense of wonder, and they often clap along with rhythmic beats.
  travel: Della Downing, who loves family road trips, has already explored the cavernous wonder of Ruby Falls in Tennessee, the historic squares of Savannah, Georgia, and the bustling patio scene of New
    Orleans, preferring short, stroller‑friendly journeys that blend the comfort of familiar porch swings with the excitement of new sights, and they always point excitedly at new landmarks.
  culinary: Della Downing, an emerging palate enthusiast, eagerly spreads sweet‑potato puree on soft tortillas, devours the cheesy stretch of homemade macaroni and cheese, crunches on buttery buttermilk
    biscuits, and enjoys tiny bites of peach slices and soft‑cooked peas, though they frequently create a glittery mess that requires extra wipes.
  core: Della Downing, a one‑year‑old explorer who mixes boundless curiosity with a skeptical squint at strangers, turns porch‑swing moments into tiny adventures, and leaves a trail of glitter‑stained socks
    wherever they toddle.
background:
  cultural: Della was born into a white Southern family in Birmingham, Alabama. Her upbringing reflects the traditions of the Deep South, including frequent visits to local churches, community festivals,
    and family‑centered gatherings that emphasize hospitality and storytelling. Her parents expose her to the regional arts scene, such as visits to the Birmingham Museum of Art and community theater performances,
    fostering her early appreciation for visual and performing arts. Southern cuisine, outdoor porch activities, and a strong sense of neighborhood community shape her cultural experience, while the multicultural
    environment of modern Birmingham offers her occasional exposure to diverse music and artistic styles.
attributes:
  skills: '[''crawling'', ''standing unaided'', ''basic walking'', ''hand‑eye coordination'', ''color and shape recognition'', ''vocal imitation and early word use'', ''responsive to music and rhythm'',
    ''social smiling and peer interaction'', ''simple cause‑and‑effect problem solving'', ''competitive block stacking'']'
  hobbies: '[''block stacking'', ''finger painting'', ''dancing to music'', ''interactive storytime'', ''playdates with peers'', ''exploring parks and nature'', ''sensory play with textures'']'
  career_goals: As Della grows, she envisions turning her love of art, music, and social interaction into a career that blends creativity with leadership. She hopes to pursue visual arts—perhaps as a painter,
    illustrator, or digital designer—while also exploring roles that let her organize community art events or lead group activities, reflecting her outgoing and competitive nature. In the longer term, Della
    aims to be recognized for her innovative ideas and to have the flexibility to explore unconventional projects, ideally in a setting that values both artistic expression and collaborative teamwork.
