  hobbies: '["Sketching","Photography","Acoustic Guitar","Urban Gardening","Hiking","Reading Speculative Fiction","Cooking Fusion Dishes","Spoken Word Events","Mindfulness Meditation"]'
  career_goals: Johnny aims to earn a Master of Social Work within the next three years, advance to a supervisory role, and eventually become the program director of an interdisciplinary community health
    and arts initiative that integrates creative therapies to empower marginalized youth. He plans to develop a data‑driven digital platform for tracking client outcomes, secure sustainable funding through
    grant acquisition, and advocate for policy changes that promote equitable mental‑health services across underserved neighborhoods in Los Angeles.
