personas:
  professional: Johnny Floyd, a data‑driven social worker and case manager, leverages his STEM bachelor's and expertise in R, GIS, and grant writing to design evidence‑based community outreach programs
    while methodically planning his path toward an MSW and a future role directing an interdisciplinary health‑arts initiative for underserved youth.
  sports: Johnny Floyd, a member of the Echo Park Trail Runners club, spends weekends hiking the Santa Monica Mountains, plays pickup basketball with the LA Lakers fan league, and follows the LA Dodgers,
    LA Galaxy, and LA Lakers, balancing cardio with weekly yoga sessions to stay grounded.
  arts: Johnny Floyd, an avid sketcher and street photographer, frequents contemporary galleries featuring artists like Theaster Gates and Kehinde Wiley, plays acoustic guitar at open‑mic nights, and regularly
    attends spoken‑word events where he shares his own slam‑poetry inspired by the rhythms of his multicultural upbringing.
  travel: Johnny Floyd, a meticulous planner, prefers road‑tripping along the Pacific Coast Highway to explore places like Big Sur and Santa Barbara, enjoys cultural immersion in Oaxaca and New Orleans,
    and dreams of attending the Marrakech Arts Festival while keeping travel costs low through off‑season bookings.
  culinary: Johnny Floyd, a budding home chef, blends African and Latino flavors by crafting dishes such as jollof‑rice tacos with chipotle‑marinated plantain and injera‑based mole, relishes cooking with
    ingredients like okra, yuca, and smoked paprika, and often hosts neighborhood potlucks that showcase his experimental fusion cuisine.
  core: Johnny Floyd merges a curious, methodical mind with a calm, community‑focused spirit, channeling his love for data, art, and mindfulness into social work and creative expression while juggling occasional
    over‑planning and a midnight coffee habit.
background:
  cultural: Johnny is a second‑generation African American raised in South Los Angeles, where he was immersed in a vibrant blend of Black cultural traditions, West Coast music, and the multicultural fabric
    of the city. His family emphasized education, community service, and staying connected to African diaspora histories through celebrations like Juneteenth and Kwanzaa. Growing up in a diverse neighborhood,
    he also absorbed influences from Latino and Asian communities, giving him fluency in navigating multicultural settings and a deep commitment to inclusive and culturally responsive social programs.
attributes:
  skills: '["Case Management","Crisis Intervention","Community Outreach","Program Evaluation","Data Analysis (R, SPSS)","GIS Mapping","Technology Integration","Grant Writing","Mental Health First Aid","Conflict
