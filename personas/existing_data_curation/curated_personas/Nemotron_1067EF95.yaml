personas:
  professional: Brittany Montalvo, an aspiring environmental science researcher, leverages her strong data‑collection and statistical analysis skills in Excel and beginner‑level R while channeling her love
    of quiet, solitary work and pragmatic curiosity into meticulous literature reviews and independent field projects, and they confidently lead small research tasks when needed.
  sports: Brittany Montalvo stays active through weekly solo hikes in the Hocking Hills, occasionally joins the Ohio Hiking Club for group treks, follows the Cleveland Browns and Ohio State Buckeyes for
    football, and balances her fitness routine with early‑morning yoga sessions that suit her preference for quiet, low‑key exercise.
  arts: Brittany Montalvo finds creative refuge sketching woodland scenes while strumming low‑key acoustic covers of Sufjan Stevens, admires the narrative depth of the indie game Celeste by Matt Makes Games,
    and draws literary inspiration from contemporary authors like Ocean Vuong and Celeste Ng.
  travel: Brittany Montalvo prefers low‑key, self‑planned solo trips that blend hiking with quiet contemplation, has trekked the Hocking Hills and a weekend in Asheville, and they dream of backpacking Iceland’s
    volcanic landscapes and exploring Norway’s fjords when their modest student budget permits.
  culinary: Brittany Montalvo enjoys experimenting in the kitchen, often whipping up quinoa‑and‑roasted‑vegetable bowls with kale, chickpeas, and lemon‑tahini dressing, perfecting a flaky apple crumble
    with cinnamon, and brewing herbal teas featuring chamomile and peppermint, while they balance DIY cooking with occasional farm‑to‑table meals at local bistros.
  core: Brittany Montalvo is a quietly curious environmental enthusiast who fuels her day with herbal tea, solitary hikes, and late‑night puzzle sessions, yet often procrastinates on assignments while obsessively
    tracking every new bird sight in her nature journal.
background:
  cultural: Brittany grew up in the small, college‑town environment of Gambier, Ohio, a community shaped by Midwestern values of self‑reliance, modesty, and a strong emphasis on education. Her family’s
    roots in the region span several generations, and the proximity to Kenyon College has exposed her to a blend of rural traditions and liberal arts influences. While she identifies as White American,
    she values the quiet, reflective spaces that characterize her hometown and balances personal independence with a cooperative spirit nurtured by community activities. This background informs her pragmatic
    outlook, curiosity about the natural world, and appreciation for both established methods and new ideas.
attributes:
  skills: '[''Scientific research methods'', ''Data collection and analysis'', ''Statistical analysis (Excel, R)'', ''Academic writing'', ''Digital communication (blogging)'', ''Basic Python programming'',
    ''Organizational and time-management'', ''Woodworking'', ''Home repair basics'']'
  hobbies: '[''Reading (fiction and non-fiction)'', ''Nature journaling'', ''Birdwatching'', ''Solo hiking'', ''Sketching and drawing'', ''Acoustic guitar'', ''Herbal tea brewing'', ''Puzzle solving (crosswords,
    Sudoku)'', ''Indie single-player video games'', ''Creative writing'', ''Experimental cooking'']'
  career_goals: Brittany aims to complete an undergraduate degree in environmental science while gaining practical experience through a paid internship with a local conservation nonprofit. She aspires to
    secure a research assistant position at a regional laboratory, develop a portfolio of field and lab projects, and eventually pursue graduate studies in environmental policy or science communication.
    Her long‑term ambition is to blend research expertise with public outreach, helping shape community‑based environmental initiatives.
