personas:
  professional: Steven Hubler, a nursing assistant with a knack for meticulous patient care and team coordination, leverages his CPR and first‑aid certification, keen infection‑control habits, and competitive
    drive to consistently exceed performance metrics while mentoring new staff toward structured career progression.
  sports: Steven Hubler guards the net in a local recreational softball league called the Waterford Whirlwinds, shoots hoops at the community gym, fishes the Great Lakes for perch and walleye, follows the
    Detroit Lions, Detroit Pistons, and Detroit Red Wings with fervor, and hikes the Kent Trails every Sunday to stay fit.
  arts: Steven Hubler rocks out to classic bands like Bob Seger, The Rolling Stones, and Lynyrd Skynyrd while attending the annual Michigan car show, enjoys weekend trips to the Waterford Community Theater
    for local productions, and curates a mixtape of 70s rock that fuels his BBQ sessions.
  travel: Steven Hubler prefers weekend road trips that combine fishing on Lake Michigan with visits to Mackinac Island’s historic forts, has a bucket‑list destination of New Orleans for its music and cuisine,
    meticulously plans routes using Google Maps, and balances travel with family commitments by limiting trips to one long weekend per quarter.
  culinary: Steven Hubler is a self‑taught grill master who perfects a Kansas‑City‑style brisket rub, seasons lake‑caught perch with lemon‑butter and herbs, whips up coleslaw with a vinegar‑based dressing,
    and prides himself on hosting backyard BBQs that feature homemade potato salad, all while occasionally over‑salting his ribs in pursuit of the perfect crust.
  core: Steven Hubler is a detail‑oriented nursing assistant whose competitive spirit fuels both his career ambitions and weekend BBQs, balanced by a pragmatic approach to money and a love for Midwestern
    sports and classic rock.
background:
  cultural: Steven is a white Midwestern American with roots in Michigan's working-class communities, likely tracing ancestry to German and Irish immigrants. Growing up in Waterford, he internalized the
    region's emphasis on practicality, reliability, and community involvement. Local traditions such as county fairs, fishing, and strong ties to local sports teams have shaped his sociable and competitive
    nature. His cultural background reinforces a strong work ethic, family orientation, and a preference for structured, predictable environments.
