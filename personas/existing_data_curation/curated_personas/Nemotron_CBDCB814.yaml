  career_goals: Steven aims to advance his healthcare career by first completing an Associate Degree in Nursing to become a Licensed Practical Nurse within the next two years. He plans to earn certifications
    in wound care and geriatric care, positioning himself for a supervisory role such as a charge nursing assistant or shift lead at his current facility. In the longer term, he aspires to obtain a Registered
    Nurse license and eventually manage a small home-health agency that provides personalized care to seniors in Waterford. His goals reflect his preference for structured progression, increased responsibility,
    and a desire to mentor and lead a team.
