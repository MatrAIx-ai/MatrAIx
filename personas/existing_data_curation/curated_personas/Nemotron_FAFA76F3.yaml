  career_goals: Samantha aims to advance to a senior director role overseeing business analysis and performance improvement across a large corporation. She wants to lead a high‑impact analytics team that
    drives data‑informed decision‑making, champion the adoption of advanced analytics technologies, and shape the organization’s long‑term strategic roadmap. Additionally, she envisions eventually launching
    a boutique consulting practice that helps midsize firms streamline operations and boost profitability, while also pursuing an Executive MBA to broaden her executive leadership credentials.
