personas:
  professional: Rafael Dieguez, a seasoned 64‑year‑old landscape specialist in Athens, blends three decades of hands‑on groundskeeping expertise with an artistic eye, excelling at native plant selection,
    irrigation design, and hardscaping, and they approach each project with a relaxed, improvisational style that favors creative spontaneity over rigid scheduling.
  sports: Rafael Dieguez, a 64‑year‑old garden‑enthusiast, stays fit with early‑morning walks in municipal parks, cheering on the Georgia Bulldogs football team and the Atlanta Braves, and they occasionally
    join a casual community soccer league at the local YMCA.
  arts: Rafael Dieguez channels their curiosity into watercolor garden scenes, street‑mural photography, and soulful acoustic guitar sessions, drawing inspiration from Georgia O'Keeffe’s floral abstractions,
    Diego Rivera’s vibrant murals, and the folk‑rock sounds of John Prince and Athens‑born R.E.M., and they share this creative energy at local art festivals.
  travel: Rafael Dieguez, a 64‑year‑old lover of gardens and festivals, plans low‑budget, self‑guided journeys that blend culinary and artistic immersion, and they have trekked through Oaxaca’s markets,
    explored Savannah’s historic squares, and now dream of Kyoto’s zen gardens.
  culinary: Rafael Dieguez, an adept home cook, fuses traditional mole and tamales with Georgia ingredients like pecans and collard greens, frequently seasoning dishes with ancho chilies, tomatillos, and
    smoked paprika, and they enjoy sharing generous plates at community gatherings while experimenting in their backyard kitchen.
  core: Rafael Dieguez is a 64‑year‑old garden‑artist who weaves Mexican culinary traditions into Southern landscapes, and they balance a relaxed, improvisational life with a deep curiosity for art, nature,
    and community.
background:
  cultural: Rafael was born in Jalisco, Mexico, into a family of campesinos who cultivated agave and corn on a small farm. He grew up immersed in Mexican traditions—celebrating Día de los Muertos, cooking
    family recipes, and participating in communal fiestas. In his twenties he migrated to the United States, eventually settling in Athens, GA, where he became part of a close‑knit Mexican‑American community.
    He maintains his cultural heritage through regular Spanish language use, attendance at bilingual church services, and involvement in local Mexican cultural festivals. His background informs his landscaping
    style, as he often integrates vibrant colors, folk art motifs, and Mexican native plants such as agaves and yuccas into Southern garden designs, creating a unique cross‑cultural aesthetic.
attributes:
  skills: '[''Landscape design'', ''Plant identification (native Georgia & Mexican species)'', ''Irrigation system installation and maintenance'', ''Hardscaping (pavers, retaining walls, stonework)'', ''Garden
    maintenance'', ''Equipment repair and maintenance'', ''Bilingual client communication (English/Spanish)'', ''Project coordination'', ''Budgeting and cost estimation'', ''Mentoring apprentices'', ''Artistic
    garden aesthetics'']'
  hobbies: '[''Watercolor painting'', ''Nature photography'', ''Birdwatching'', ''Reading (horticulture and modern art)'', ''Cooking Mexican cuisine with Southern twists'', ''Attending local art exhibitions
    and music festivals'', ''Volunteering in community garden projects'', ''Playing acoustic guitar'', ''Visiting museums and cultural festivals'', ''Exploring local murals and street art'']'
  career_goals: Rafael aims to evolve from full‑time employee to an independent landscape consultant, focusing on sustainable, artistically driven gardens for residential clients in the Athens area. He
    plans to earn a state‑recognized Horticulture Certification to formalize his expertise and to lead seasonal workshops at the local community college, sharing his unique blend of Mexican garden traditions
    and Southern horticulture. Over the next few years, he hopes to partner with younger landscapers to reduce physical strain, co‑author a modest guidebook on culturally inspired garden design, and volunteer
    his time to improve public green spaces in Jackson County.
