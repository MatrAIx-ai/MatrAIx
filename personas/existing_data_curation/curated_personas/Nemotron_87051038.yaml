  hobbies: '[''Reading art and history biographies'', ''Listening to jazz and blues music'', ''Knitting and quilting'', ''Vegetable gardening'', ''Virtual museum tours'', ''Journaling'', ''Experimenting
    with cooking recipes'', ''Following contemporary art online'', ''Attending local art talks as a listener'']'
  career_goals: Janice aims to leave a lasting legacy by preserving and sharing her family's history with younger generations. She wants to volunteer as a docent at the Des Moines Art Center, focusing on
    African American artists, and eventually help curate a small community exhibit that highlights under‑represented creators. She also hopes to establish a modest scholarship fund for local high‑school
    students interested in the arts or genealogy, drawing on her savings and community contributions. Maintaining her health, continuing lifelong learning, and possibly enrolling in a seniors' art‑history
    class are also central to her personal ambitions.
