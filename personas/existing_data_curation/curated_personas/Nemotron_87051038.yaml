personas:
  professional: Janice Bradley, a retired educator turned volunteer docent and genealogical researcher, applies their meticulous organizational skills, disciplined solitude, and deep knowledge of African
    American art history to curate community exhibitions, guide art‑center tours, and meticulously document their family’s lineage for future generations.
  sports: Janice Bradley follows the Iowa Hawkeyes football and the Des Moines Iowa Cubs baseball teams, participates in a gentle senior walking club at Blank Park during spring and fall, and sustains their
    fitness primarily through daily garden chores, occasional light yoga sessions, and a weekly low‑impact aerobics class at the community center.
  arts: Janice Bradley immerses themselves in the jazz and blues world of Miles Davis, Billie Holiday, and Nina Simone, while also devouring biographies of Frida Kahlo and Jacob Lawrence, attends quiet
    local art talks featuring contemporary African‑American creators, and channels their own creativity through intricate knitting and quilting inspired by the motifs of William H. Johnson.
  travel: Janice Bradley prefers leisurely, well‑planned road trips that blend garden tours and art museums, having already visited the National Museum of African American History and Culture in Washington,
    DC, the historic jazz district of New Orleans, and dreaming of a quiet autumn retreat to the Hudson Valley to explore its local artists’ colonies.
  culinary: Janice Bradley enjoys cooking Southern comfort dishes like chicken and dumplings and Midwestern classics such as corn casserole, while experimenting with new recipes like quinoa‑black‑bean chili
    seasoned with fresh basil and rosemary from their garden, and they often savor their meals accompanied by homemade fruit preserves.
  core: Janice Bradley is a disciplined, solitary scholar‑curator who meticulously preserves family histories, quietly curates art exhibits, and indulges in late‑night jazz sessions while they occasionally
    hoard vintage gardening magazines.
background:
  cultural: Janice’s cultural background is rooted in her experience as a Black woman raised in the Midwest during the civil rights era. Her family traditions blend Southern heritage—soul food, gospel music,
    and oral storytelling—with the practical values of Iowa life. In Des Moines, she has been a long‑time member of the local African American church, where she helped organize cultural events and preserve
    community oral histories. This heritage informs her deep appreciation for African American art, her dedication to documenting family lineage, and her desire to mentor younger Black youth in the region,
    all while maintaining a strong sense of resilience and quiet confidence.
attributes:
