  hobbies: '[''Quilting'', ''Watercolor painting'', ''Digital photography'', ''Reading historical nonfiction and art magazines'', ''Gardening'', ''Volunteer reading at the local library'', ''Arts-and-crafts
    workshop leadership'', ''Cross-stitching'', ''Tai chi'', ''Hiking in Baxter State Park'']'
  career_goals: Crystal aspires to complete a memoir that weaves together her life experiences and the history of Millinocket, while also curating a small traveling exhibit of local quilts and paintings
    for senior centers across Penobscot County. She plans to deepen her digital photography skills by taking an online course and hopes to document the seasonal changes of Baxter State Park. Crystal also
    aims to take on a formal advisory role with the town’s historical society, helping preserve oral histories. In the health realm, she is committed to maintaining her mobility through regular hiking and
    tai chi, ensuring she can continue volunteering and mentoring younger residents for years to come.
