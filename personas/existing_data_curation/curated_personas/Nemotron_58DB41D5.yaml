personas:
  professional: Moses Robinson, a two-year-old explorer of cause-and-effect, channels a blend of curiosity and practicality into constructing elaborate block towers, confidently leading his playgroup while
    they casually ignore tidy-up rules and sometimes question whether a fellow child’s block truly belongs to them.
  sports: Moses Robinson, a two-year-old who darts across the Springfield community playground, chants with the Springfield Tiny Tots Soccer Club during weekly kick-about sessions, favors energetic sprints
    over structured drills, and they relish being the center of attention during games, sometimes challenging a teammate’s claim to the ball.
  arts: Moses Robinson, a two-year-old who loves to belt out "Baby Beluga" by Raffi and imitate Sesame Street characters, often leads impromptu dance parties in the living room while doodling bright crayon
    pictures of dinosaurs, and they delight in drawing crowds of stuffed-animal spectators, occasionally questioning if a song is truly theirs to sing.
  travel: Moses Robinson, a two-year-old who prefers spontaneous family drives to the nearby zoo over meticulously planned vacations, yet their eyes light up at the thought of a future trip to Disney World
    in Orlando, and they express a budding curiosity about faraway places, sometimes doubting whether a travel brochure accurately shows the rides.
  culinary: Moses Robinson, a two-year-old who prefers creamy macaroni and cheese, bites into banana slices, occasionally sneaks bites of his mother's stir-fried vegetables, and they insist on a side of
    goldfish crackers at every meal, while sometimes questioning whether a new food is truly safe to eat.
  core: Moses Robinson, a two-year-old blend of curious builder and charismatic chatterbox, trades stickers for snacks, powers through playground sprints, sings Raffi, and they navigate toddler life with
    a relaxed, competitive spirit, often skeptical of others’ offers.
background:
  cultural: Moses comes from an African‑American family living in Palm Beach Gardens, FL. His family participates in traditions common in the Black community in South Florida, such as Sunday church gatherings,
    family cookouts featuring soul food like fried chicken, collard greens, and sweet potatoes, and seasonal celebrations like Juneteenth. He often hears gospel music and stories of family heritage, which
    shape his sense of identity. The community's emphasis on close‑knit extended family ties and neighborhood friendships influences his sociable nature.
attributes:
  skills: '["walking", "running", "climbing small furniture", "kicking a ball", "basic sentence formation", "~200‑word vocabulary", "block stacking", "shape‑sorting", "cause‑and‑effect play", "reading facial
