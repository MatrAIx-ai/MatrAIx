  hobbies: '["sandbox play", "building sandcastles", "interactive storytelling", "music and dancing", "picture books about animals and vehicles", "watching superhero cartoons", "competitive stacking games"]'
  career_goals: Although still a toddler, Moses frequently talks about what he wants to be when he grows up, echoing the heroic figures he sees on TV and in his community. He dreams of becoming a firefighter
    or a soccer star, roles that let him be active, help others, and stay in the spotlight. He also expresses a desire to "help moms" like his own mother, showing an early sense of responsibility.
