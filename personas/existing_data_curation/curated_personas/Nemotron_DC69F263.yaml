    to Mexico'']'
  career_goals: Angel aims to found a community art center in Helena that offers affordable studio space, apprenticeship programs, and culturally focused events, positioning the center as a bridge between
    Mexican‑American and Southern artistic communities. She is pursuing a three‑year regional arts grant to fund a series of public murals across Shelby County that celebrate local heritage. Over the next
    five years, Angel hopes to exhibit her work in juried regional shows, publish a bilingual book of essays and artworks reflecting her cross‑cultural journey, and mentor at least ten emerging artists,
    helping them develop sustainable creative practices.
