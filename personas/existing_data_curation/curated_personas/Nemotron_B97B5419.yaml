  hobbies: '[''Gardening'', ''Church choir participation'', ''Volunteer organizing at senior center'', ''Quilting'', ''Hiking in local nature trails'', ''Craft workshops'']'
  career_goals: Although nearing retirement, Alexis aims to deepen her professional credentials by earning the Certified Dental Assistant (CDA) designation and completing a specialty course in orthodontic
    assistance. She hopes to mentor younger dental assistants at her practice, eventually taking on a supervisory role that leverages her methodical approach to streamline office workflow. Long‑term, she
    envisions transitioning to part‑time teaching at the local community college’s dental assistant program, sharing her practical knowledge while maintaining a stable income for her family's future.
