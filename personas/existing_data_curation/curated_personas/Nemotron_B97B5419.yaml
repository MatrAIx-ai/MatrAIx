personas:
  professional: Alexis Ketzler, a veteran dental assistant with over three decades of experience, leverages meticulous record‑keeping, precise radiographic imaging, and flawless infection‑control protocols
    to keep the practice running like clockwork, while their methodical nature and outgoing spirit make them the go‑to mentor for newer staff and a steady presence in the bustling clinic.
  sports: Alexis Ketzler enjoys low‑impact fitness through weekly hikes on gentle Tonto National Forest trails, supports the Arizona Diamondbacks and Phoenix Suns with enthusiastic game‑day gatherings at
    the senior center, and they participate in the local Senior Trailwalking Club, preferring steady rhythm over high‑intensity competition.
  arts: Alexis Ketzler finds artistic fulfillment singing in their church choir, where they delight in performing pieces by Mozart and traditional gospel hymns, while their quilting circle draws inspiration
    from classic Amish quilt patterns and they often watch classic films starring Audrey Hepburn for creative comfort.
  travel: Alexis Ketzler plans trips with meticulous itineraries, favoring relaxed road‑trips to nearby natural wonders like the Grand Canyon and Sedona, while dreaming of an organized cultural tour of
    Kyoto’s historic temples, and they balance these desires against a modest retirement budget and family responsibilities.
  culinary: Alexis Ketzler’s culinary style blends hearty home‑cooked comfort with garden‑fresh flavors, skillfully preparing roasted zucchini, quinoa salad punctuated with fresh tomatoes, and classic chicken
    pot pie, while they often showcase their famous apple crumble at weekly quilting meet‑ups, made with locally sourced apples and cinnamon.
  core: Alexis Ketzler navigates life like a well‑kept garden—methodical, rooted in tradition, socially vibrant, yet they occasionally weed out worries with a habit of over‑checking schedules.
background:
  cultural: Alexis comes from a multigenerational White American family with roots in the Midwestern United States. Raised in a small‑town environment, she internalized values of practicality, self‑reliance,
    and community service. Her upbringing emphasized traditional family roles, regular church attendance, and participation in local events, which continue to shape her sense of belonging in Payson, Arizona.
    The blend of Midwestern work ethic and Southwest outdoor lifestyle informs her preferences for routine, organized living, and involvement in community‑centric activities.
attributes:
  skills: '[''Chairside assistance'', ''Dental radiography'', ''Infection control'', ''Electronic dental record management'', ''Insurance verification and billing'', ''Inventory control'', ''Appointment
