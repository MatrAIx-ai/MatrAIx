personas:
  professional: A seasoned sales strategist named Theresa Glad leverages fifteen years of data‑driven forecasting and a humanities‑informed storytelling flair to lead regional teams, integrate AI analytics,
    and craft bespoke sales channels for the arts sector, balancing disciplined pipeline management with creative problem‑solving, and they constantly mentor their team through clear goal‑setting.
  sports: Theresa Glad enjoys weekend hikes along the Ouachita trails, participates in the Little Rock Trail Runners club, follows the Arkansas Razorbacks football and Memphis Grizzlies basketball teams,
    occasionally joins a local community softball league for recreation, and they rarely skip a chance to cheer at a live game.
  arts: Theresa Glad’s artistic life swirls around collecting vintage prints by Degas and O’Keeffe, painting acrylic landscapes inspired by the Ouachita Mountains, photographing sunrise over Little Rock’s
    River Market, attending performances by the Arkansas Repertory Theatre, deep‑diving into art‑history works by Ernst Gombrich and contemporary voices like Kara Walker, and they frequently share their
    collection with community members during gallery tours.
  travel: Theresa Glad prefers curated road trips that blend art and nature, having explored the historic districts of Savannah, the marble palaces of Florence, the blues scene in New Orleans, and the folk
    festivities of Northwestern Arkansas, yet they balance these adventures with family budget constraints, favoring off‑peak travel and Airbnb stays near local galleries.
  culinary: Theresa Glad delights in crafting low‑country pastries such as pecan pralines, beignets, and lemon pound cake, sandwiches these with fresh garden tomatoes in homemade sourdough, studies Southern
    cookbooks for traditional recipes, occasionally over‑seasoning their jambalaya during experimental evenings, and they love to host tasting sessions for friends.
  core: Theresa Glad fuses disciplined sales leadership with a fervent love of art, garden‑fresh cooking, and community rhythm, thriving on structured goals yet indulging in vintage print hunts and spontaneous
    trail hikes, and they constantly seek new ways to blend data with creativity.
background:
  cultural: Theresa was raised in the rural heartland of northeastern Arkansas, where a blend of Southern hospitality, Midwestern pragmatism, and a strong sense of community shaped her worldview. Growing
    up in Sulphur Rock, she participated in local church gatherings, county fairs, and folk festivals that celebrated regional music, craft, and storytelling. Her white Southern heritage is intertwined
    with a family tradition of modest living, church involvement (primarily Baptist), and a deep appreciation for regional folk art such as quilting and bluegrass music. The cultural environment emphasized
    respect for hard work, mutual support, and the preservation of local artistic expressions, which informs her personal values, her collaborative leadership style, and her passion for integrating creativity
    into her professional life.
