  hobbies: '[''Painting (acrylic)'', ''Photography (landscape)'', ''Visiting art galleries'', ''Reading art history and contemporary literature'', ''Hiking in Ouachita Mountains'', ''Gardening'', ''Southern
    cooking'', ''Volunteer work at Sharp County Folk Festival'', ''Community theater crew'', ''Quilting circle'', ''Yoga'', ''Book club'']'
  career_goals: Theresa’s ambition is to transition from a regional sales manager to a senior leadership role—such as Regional Director or Vice President of Sales—within the next five years, guiding a multi‑state
    team and shaping corporate sales strategy at a national level. She plans to integrate cutting‑edge analytics and AI tools to enhance forecasting accuracy and to launch a specialty sales channel targeting
    the arts and cultural sector, leveraging her personal passion for creativity. Concurrently, she is committed to fostering gender diversity in leadership by establishing a mentorship pipeline for emerging
    women sales professionals within her organization. Long‑term, she envisions founding a boutique consultancy that helps small‑to‑mid‑size businesses in the Southeast blend artistic branding with data‑driven
    sales tactics, while maintaining a balanced lifestyle that accommodates her family and community commitments.
