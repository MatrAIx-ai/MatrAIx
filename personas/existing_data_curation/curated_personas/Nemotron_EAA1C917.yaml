  hobbies: '[''Woodworking'', ''Scale model building'', ''Hiking'', ''Chess'', ''Strategy video gaming'', ''Reading non-fiction (technology & self‑help)'', ''Journaling'', ''Meditation'', ''Community tutoring'']'
  career_goals: Gene aims to earn a bachelor's degree in Computer Science within the next two years, followed by a master's in Education Technology, positioning himself for a full‑time, tenure‑track faculty
    appointment. He aspires to become the lead curriculum developer for the networking and computer‑hardware programs, creating blended‑learning and fully online courses that reflect his structured teaching
    philosophy. Further technical growth includes achieving Cisco CCNA certification and eventually pursuing a doctorate in Educational Leadership. Long‑term, he envisions serving as department chair or
    director of instructional technology, while fostering a supportive, low‑stress environment that balances his need for predictability with collaborative mentorship.
