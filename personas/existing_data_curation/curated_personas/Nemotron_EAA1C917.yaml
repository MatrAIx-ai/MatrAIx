personas:
  professional: Gene Smith, a 26‑year‑old community‑college instructor in information technology, leverages CompTIA A+ and Network+ expertise and meticulous lesson‑planning to craft step‑by‑step networking
    curricula while balancing a methodical, low‑stress teaching style with assertive departmental leadership ambitions.
  sports: Gene Smith hikes the Sugar Spit Trail in Clinton County with the local Clinton County Outdoor Club, follows the Detroit Lions and Michigan State Spartans football teams, and occasionally joins
    the Lansing Running Club for weekend 5K runs to stay active.
  arts: Gene Smith unwinds by listening to acoustic guitar virtuoso Andy McKee, appreciates the cinematic scores of Hans Zimmer, and attends local exhibitions featuring Edward Hopper reproductions, while
    also enjoying strategic chess as a form of living art.
  travel: Gene Smith plans trips with spreadsheets, favors low‑stress nature retreats like a weekend in Pictured Rocks National Lakeshore and dreams of a solo adventure to Reykjavik, Iceland, balancing
    budget constraints with a desire for immersive, well‑structured itineraries.
  culinary: Gene Smith enjoys cooking simple yet precise dishes such as mushroom risotto with Arborio rice, shiitake mushrooms, and Parmesan, but also indulges in a perfectly seasoned pepperoni pizza from
    Mario’s, and they value fresh Michigan cherries in desserts.
  core: Gene Smith blends methodical teaching, budget‑conscious investing, and structured self‑care, yet wrestles with worry‑driven perfectionism, solitary woodworking, and a quirky habit of journaling
    every coffee break.
background:
  cultural: Gene was raised in a middle‑class, white family of German‑Polish ancestry in rural central Michigan. The region’s strong work ethic, community spirit, and modest, practical values shaped his
    outlook. He grew up attending a Protestant church that emphasized service and reliability, and he continues to participate in local traditions such as the Clinton County Fair and the historical society’s
    preservation projects. His cultural upbringing fostered a respect for order, punctuality, and collaborative effort, all of which are reflected in his professional and personal life.
