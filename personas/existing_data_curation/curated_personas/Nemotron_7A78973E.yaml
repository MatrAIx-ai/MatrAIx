  hobbies: '[''Gardening'', ''Quilting'', ''Knitting'', ''Cooking Southern Cuisine'', ''Reading Historical Novels'', ''Walking Trails'', ''Volunteering at After-school Program'']'
  career_goals: Looking ahead, Ruby aims to deepen her academic credentials by completing a bachelor's degree in Education, which she plans to pursue part-time at a nearby college. She aspires to move into
    a lead-teacher or curriculum-coordinator role, where she can influence district-wide instructional practices and mentor newer educators. Over the next five years, Ruby hopes to spearhead a school-wide
    literacy initiative that leverages her love of reading and community partnerships, and she is open to exploring an administrative track—such as assistant principal—if it aligns with her desire to maintain
    a stable, supportive learning environment for students and staff.
