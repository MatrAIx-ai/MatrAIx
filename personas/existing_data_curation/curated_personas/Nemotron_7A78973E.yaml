personas:
  professional: A seasoned elementary and middle‑school teacher named Ruby Jeffers leverages two decades of classroom experience to design predictable daily schedules that blend structure with occasional
    flexibility, aligning lessons to the Georgia Standards of Excellence, using Google Classroom and interactive whiteboards, and mentoring new teachers while asserting classroom expectations with compassionate
    clarity.
  sports: A community‑oriented sports fan named Ruby Jeffers regularly watches Georgia Bulldogs football, follows the Atlanta Hawks during the NBA season, supports the local Barrow County High School Braves
    soccer team, and joins a walking club that meets twice a week on the Oconee River Trail, preferring low‑impact exercise that fits her routine while balancing the occasional excitement of game‑day tailgating.
  arts: A dedicated craftsperson named Ruby Jeffers spends afternoons quilting vibrant patchwork blankets, crocheting scarves for church charity drives, knitting for family, immerses herself in historical
    novels by Ken Follett and memoirs by Maya Angelou, attends quarterly performances by the local theater troupe, and enjoys listening to folk duo The Avett Brothers, letting artistic expression shape
    her leisure time.
  travel: A purposeful traveler named Ruby Jeffers prefers weekend getaways that fit a tight schedule and budget, having visited historic Savannah and coastal Charleston for their charming architecture,
    savoring a mountain retreat in Asheville during fall, dreaming of a road trip along the Blue Ridge Parkway, and keeping a travel journal in a planner to balance family obligations with a desire to explore
    new landscapes.
  culinary: A Southern‑flavored home chef named Ruby Jeffers delights in cooking chicken and dumplings, shrimp and grits, buttery cornbread, and collard greens, often enhancing dishes with fresh basil,
    thyme, and cilantro from her garden, experimenting with family recipes during weekend gatherings, skillfully balancing traditional comfort food with occasional culinary twists like adding smoked paprika,
    though she sometimes over‑salts in the excitement.
  core: Ruby Jeffers blends a love of routine, garden‑grown freshness, and creative crafts into a steady yet surprisingly adventurous life, juggling teaching, budgeting, and occasional forgetfulness about
    prescriptions while nurturing community ties.
background:
  cultural: Ruby's cultural roots are firmly planted in the Southern traditions of rural Georgia. Raised in a multigenerational family of European descent—primarily English and German—she grew up attending
    a local Baptist church, where community service and fellowship remain central to her identity. The values of hospitality, modesty, and respect for tradition that characterize the Southern way of life
    are evident in her daily interactions, from sharing home-cooked meals during church potlucks to participating in neighborhood celebrations of holidays such as Thanksgiving and the Fourth of July. Ruby's
    upbringing emphasized the importance of hard work, education, and family cohesion, shaping her pragmatic outlook and her commitment to nurturing the next generation within her community.
attributes:
  skills: '[''Classroom Management'', ''Lesson Planning'', ''Curriculum Alignment'', ''Differentiated Instruction'', ''Student Assessment'', ''Parent-Teacher Communication'', ''Educational Technology Integration'',
