  career_goals: Zarrin aims to leverage her managerial experience and analytical mindset to advance into a regional operations director role for a multi‑unit restaurant chain covering the Upper Midwest,
    where she can influence strategy across several locations. Simultaneously, she dreams of launching a boutique café that fuses experimental cuisine with immersive abstract art installations, creating
    a destination that celebrates novelty and visual storytelling. Long‑term, she aspires to become a thought leader in sustainable food‑service innovation, speaking at industry conferences and consulting
    on data‑driven waste‑reduction technologies while maintaining a competitive edge over peers.
