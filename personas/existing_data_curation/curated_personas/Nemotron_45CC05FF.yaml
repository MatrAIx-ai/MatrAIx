personas:
  professional: Adi Cheramie is a high-school junior who envisions a future as a comic-book illustrator, merging hand-drawn pencils with digital tools like Procreate, while their curious, open-minded nature
    drives constant experimentation and their laid-back, sometimes disorganized approach leads to occasional missed deadlines and bouts of self-doubt.
  sports: Adi Cheramie enjoys casual skateboarding at the Shelbyville skate park during summer, plays pickup soccer with the Shelbyville Youth Soccer Club, follows the Shelbyville Tigers high-school football
    team, and prefers low-key fitness like evening jogs along the rural trails rather than structured gym routines.
  arts: Adi Cheramie spends free time sketching nature scenes inspired by Ansel Adams, crafting sci-fi comics with influences from Neil Gaiman and Jeff Smith, strums acoustic renditions of Tame Impala and
    Mitski, and regularly attends local art meet-ups featuring muralist Zoe Kravitz, all of which reinforce their identity as a curious, solitary creator.
  travel: Adi Cheramie prefers low-cost weekend road trips to nearby state parks like Hoosier National Forest and occasional family visits to the Indianapolis Comic-Con, while dreaming of a longer adventure
    to the indie music scene in Portland, Oregon, and the neon streets of Tokyo, though budget and parental approval keep most trips short and spontaneous.
  culinary: Adi Cheramie, a modest home-cook, favors making ramen with miso broth, whipping up avocado toast with feta and chili flakes, and enjoys ordering pepperoni pizza topped with extra mozzarella,
    while experimenting with baked sweet potato fries and mastering basic stir-fry techniques.
  core: Adi Cheramie is a curiosity-driven teen whose sketchbook is never far from hand, yet a scattered schedule and lingering anxiety often turn late-night art sessions into sleepless weeks.
background:
  cultural: Adi grew up in Shelbyville, Tennessee, within a white Southern family that values community, modesty, and hospitality. He was raised with a mix of church‑based traditions and an appreciation
    for local customs like annual downtown festivals, BBQ gatherings, and country‑bluegrass music. His environment exposed him to Appalachian folk art and storytelling, which influence his aesthetic sensibilities.
    While he often prefers solitude, he respects the Southern emphasis on family ties and enjoys shared meals and small group gatherings.
