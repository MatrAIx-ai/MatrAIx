  career_goals: Adi aspires to earn his GED and enroll in a specialized art program where he can study concept art and game design. He hopes to become a professional concept artist or visual developer for
    indie video games, blending his love for storytelling, illustration, and coding. Long‑term, he envisions creating his own graphic novel series and potentially teaching workshops for other young creators
    in his community.
