  career_goals: Nancy aims to move into a supervisory role within facilities management, pursuing certification in Sustainable Facility Operations to align her practical expertise with environmentally responsible
    practices. She also hopes to enroll in a part‑time community college program to earn an associate’s degree in Occupational Safety and Health, positioning herself for future advancement to facilities
    manager or compliance officer within her region.
