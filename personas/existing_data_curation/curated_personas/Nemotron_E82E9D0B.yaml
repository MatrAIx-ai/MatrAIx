  career_goals: Michelle aims to progress to a supervisory security position within the next three years, eventually becoming a Security Manager or Compliance Officer at her casino. She plans to obtain
    the Certified Protection Professional (CPP) credential and to lead a training program for new surveillance staff, integrating emerging AI-based video analytics. While maintaining a stable work-life
    balance for her family, she also hopes to complete a part-time master’s degree in Security Management before retirement, and later transition to consultancy or volunteer work in community safety education.
