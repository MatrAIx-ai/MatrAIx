personas:
  professional: Mary Mack, a community storyteller and visual artist, expertly blends oral‑history preservation, watercolor painting, and quilt‑making to nurture intergenerational learning, letting their
    boundless imagination and relaxed approach to planning drive collaborative workshops and a forthcoming illustrated community book.
  sports: Mary Mack, a devoted fan of the hometown high‑school basketball team (the Pike County Tigers) and a regular participant in gentle garden walks and weekly pickleball matches at the community center,
    embraces low‑impact activity while avoiding intense competition.
  arts: Mary Mack, a lifelong gospel choir singer who revels in the soulful sounds of Ella Fitzgerald, B.B. King, and local jazz ensembles, channels that love into watercolors of butterflies, quilting with
    bold patterns, and avid reading of contemporary poetry and classic literature.
  travel: Mary Mack, an enthusiastic traveler who eagerly plans weekend trips to the New Orleans French Quarter art market and the historic sites of Atlanta, balances adventure with a need for familiar
    companions, and prefers staying with relatives or modest B&Bs that accommodate their love of regional art and history.
  culinary: Mary Mack, a soulful home cook who expertly prepares collard greens, crispy fried catfish, and cornbread seasoned with smoked paprika, delights in using fresh tomatoes and herbs from their garden,
    and occasionally experiments with spicy gumbo inspired by the flavors of the South.
  core: Mary Mack is a vibrant elder who weaves storytelling, art, and community service together, guided by curiosity, a laid‑back schedule, and a deep love for soulful music and garden‑fresh food.
background:
  cultural: Mary Green Mack was born and raised in the heart of the Mississippi Delta, growing up in a close-knit African-American community where church, family, and mutual support formed the core of daily
    life. Her grandparents were sharecroppers who taught her the value of hard work, storytelling, and traditional soul-food cooking. The civil‑rights movement of the 1960s left an indelible mark on her
    generation, fostering a deep appreciation for social justice and community solidarity. Mary’s cultural identity is woven from the rich tapestry of Southern black folklore, gospel music, and the vibrant
    oral traditions passed down through her relatives. She celebrates Juneteenth and Emancipation Day with communal feasts and quilting exhibitions, and she retains the Southern colloquialisms and rhythmic
    speech patterns that reflect her roots. Her lived experience in McComb, a small town with a history of racial resilience, continues to shape her worldview and her dedication to preserving African-American
    heritage in Pike County.
attributes:
  skills: '["Storytelling and oral history preservation", "Quilt making and fabric art", "Watercolor and mixed-media painting", "Creative writing and poetry", "Community mediation and conflict resolution",
    "Gardening and horticulture", "Gospel choir singing", "Soul-food cooking", "Mentoring youth in arts", "Basic caregiving"]'
  hobbies: '["Watercolor painting", "Quilting", "Reading poetry and literature", "Science-fiction novels", "Listening to gospel, jazz, and blues", "Singing in church choir", "Gardening and vegetable gardening",
    "Attending local history talks and museum visits", "Leading storytelling circles", "Creative writing (short stories, poems)"]'
  career_goals: Mary hopes to compile a collection of oral histories and accompanying artwork into a community-published book that celebrates the African-American experience in Pike County. She aspires
    to launch a series of intergenerational workshops where seniors teach quilting and youth explore digital storytelling. Learning digital photography and video editing is a personal ambition, enabling
    her to create a multimedia archive of local folklore. She dreams of traveling to regional art fairs in New Orleans and Atlanta to showcase her work, and of establishing a small garden nursery that provides
    plants for community beautification projects. Additionally, Mary wishes to mentor a group of teenagers through a storytelling circle at the local community center, fostering creative expression and
    cultural pride.
