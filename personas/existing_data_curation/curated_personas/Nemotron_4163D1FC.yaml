personas:
  professional: Eduardo Colon, a 41‑year‑old freelance archivist and virtual curator, leverages an exacting eye for visual detail, a deep knowledge of folk and contemporary art, and fluency in Spanish to
    digitize and systematically inventory small museum collections, producing thorough analytical reports and polished visual presentations using Notion, Excel, and Adobe Photoshop, and they apply their
    calm, disciplined work ethic to meet tight deadlines.
  sports: Eduardo Colon, a dedicated solitary exerciser, trails the local Ridgewalkers Hiking Club on weekend nature walks, enjoys occasional community 5K runs, follows the regional baseball team the Boston
    Red Sox and the city's professional soccer club the New England Revolution, and they keep fit through low‑impact biking and weekly yoga sessions that match their calm, disciplined routine.
  arts: Eduardo Colon, a passionate devotee of visual culture, spends evenings analyzing the impressionist canvases of Claude Monet, the black‑and‑white landscapes of Ansel Adams, and the immersive installations
    of Olafur Eliasson, while they unwind to the piano works of Ludovico Einaudi and attend virtual performances by the theatre troupe Complicité, weaving these influences into their own documentary photography
    projects.
  travel: Eduardo Colon, an organized explorer who plans trips with detailed itineraries in Notion, prefers reflective journeys to historic cities like Kyoto, the coastal charm of Lisbon, and the Andean
    ruins of Machu Picchu, while they also cherish local weekend escapes to the nearby desert national park, balancing a modest travel budget with a desire for immersive cultural experiences.
  culinary: Eduardo Colon, a meticulous home cook, enjoys preparing handmade corn dumplings (tamales) filled with roasted pork and masa, simmering a complex sauce of dried chilies, nuts, cacao, and spices
    (mole) for family meals, and they source fresh herbs, heirloom tomatoes, and regional chilies at the farmer’s market, perfecting each dish with a methodical approach reminiscent of their archival precision.
  core: Eduardo Colon, a calm, solitary organizer who can lose an entire weekend perfecting a scale model while neglecting social invitations, channels their love for order into art curation, yet they sometimes
    hoard research notes and rare museum catalogs like treasured relics.
background:
  cultural: Eduardo was raised in a Mexican‑American household in Michigan, where Spanish was spoken at home and Mexican traditions were celebrated through family gatherings, Día de los Muertos altars,
    and community festivals. His upbringing instilled a strong respect for cultural heritage, which fuels his interest in preserving Mexican art and history. Although he lives in Pontiac, he remains connected
    to the local Mexican community through volunteer work at a cultural center and participation in neighborhood celebrations. His values reflect a blend of Mexican collectivist ideals and the individualistic,
    self‑directed approach cultivated by his solitary lifestyle.
attributes:
  skills: '[''Art History Research'', ''Archival Cataloguing'', ''Digital Organization (Notion, Excel)'', ''Spanish Fluency'', ''Analytical Writing'', ''Graphic Design (Adobe Photoshop, Canva)'', ''Project
    Management'', ''Photography (archival documentation)'']'
  hobbies: '[''Visiting art museums and galleries'', ''Reading art history and philosophy'', ''Photography (documentary style)'', ''Scale model building'', ''Gardening'', ''Cooking Mexican cuisine'', ''Puzzle
    solving (crosswords, Sudoku)'', ''Meditation'', ''Digital archiving projects'']'
  career_goals: Eduardo aims to transition his passion for art and organization into a role as a freelance archivist or virtual curator for museums, galleries, or cultural institutions, with a focus on
    Mexican art collections. He plans to enroll in a community college program in Library Science or Museum Studies within the next year to formalize his expertise. Long‑term, he envisions establishing
    a consultancy service that helps small cultural organizations digitize and catalog their holdings, while also contributing scholarly articles on Mexican art history to academic journals.
