personas:
  professional: Felton Lewis, a veteran emergency dispatcher with three decades of keeping the county’s 911 lines humming, leverages razor‑sharp communication, deep local knowledge and calm under fire to
    mentor new callers, champion technology upgrades, and shape shift protocols as they eye a supervisory role before easing into part‑time advisory work for emergency management.
  sports: Felton Lewis is a loyal fan of the local high school football team, the Riverside Rams, never misses a Friday night game, cheers on the county’s minor league baseball squad, the Riverwalk Pilots,
    and they spend quiet Saturdays fishing for catfish on Lake Monroe, while occasionally joining a senior golf league at the Greenfield Country Club.
  arts: Felton Lewis immerses himself in gospel choirs at his church, hums classic R&B from legends like Aretha Franklin and Marvin Gaye while steering his woodshop to the rhythm, and they devour biographies
    of civil‑rights icons such as Martin Luther King Jr. and Rosa Parks to fuel their steady, yet passionate, community activism.
  travel: Felton Lewis prefers relaxed, self‑driven road trips, having cruised the historic blues trail of Memphis and the culinary delights of New Orleans, while dreaming of a sun‑soaked weekend in Savannah’s
    riverfront squares, and they always plan routes around their wife’s schedule and their modest travel fund.
  culinary: Felton Lewis is a backyard pitmaster who perfects a sweet‑spicy applewood‑smoked brisket rub of brown sugar, paprika, and black pepper, pairs it with slow‑cooked collard greens seasoned with
    smoked turkey, and while their grilling skill is top‑notch, their guilty pleasure remains extra‑rich pecan pie that often disappears before anyone else gets a slice.
  core: Felton Lewis blends disciplined dispatch expertise with a vibrant community spirit, balancing meticulous emergency planning, steadfast mentorship, and spontaneous backyard barbecues, and they maintain
    a pragmatic optimism alongside an occasional forgetfulness about their own medication.
background:
  cultural: Felton grew up in rural Newton County, Georgia, during the civil‑rights era, witnessing both the challenges and the resilience of the African‑American community. His life is rooted in Southern
    Black traditions—faithful participation in his local Baptist church, a deep appreciation for gospel music, and a commitment to family and communal support. He values storytelling and oral history, participates
    in Juneteenth celebrations, and maintains strong ties to neighborhood networks that have shaped his outlook on cooperation, self‑advocacy, and communal responsibility.
