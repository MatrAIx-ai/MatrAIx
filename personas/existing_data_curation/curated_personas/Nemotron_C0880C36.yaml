  hobbies: '[''Church Choir'', ''Barbecue Cooking'', ''Bridge (Card Game)'', ''Fishing'', ''Gardening'', ''Woodworking'', ''Listening to Gospel and R&B Music'', ''Reading History'', ''Community Volunteer
    Work'', ''Senior Center Social Activities'']'
  career_goals: As he approaches retirement, Felton aims to mentor younger dispatchers by leading formal training sessions and informal peer coaching. He hopes to take on a supervisory role that allows
    him to influence shift procedures and advocate for technology upgrades that improve response times. Long‑term, he plans to transition into an advisory capacity for the county’s emergency management
    office, helping to design community preparedness programs while still remaining active in his current dispatcher duties part‑time.
