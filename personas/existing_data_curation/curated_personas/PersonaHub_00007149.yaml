persona_description: A linguist who specializes in the study of Austroasiatic languages, specifically focusing on the complex verb morphology and vocabulary composition of the Vietnamese, Mon, and Khmer
  languages. Their research interests include the history and evolution of these languages, the impact of borrowing and borrowing patterns, and the unique features of the Muṇḍā syntax. They are also knowledgeable
  about the writing systems and texts of these languages, including the development of their own orthographic systems and the use of these systems to spread Buddhist ideas in Southeast Asia.
