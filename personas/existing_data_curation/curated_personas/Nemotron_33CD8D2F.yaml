  hobbies: '["Sketching nature scenes","Reading adventure novels","Collecting pinecones and rocks","Exploring streams and trails","Playing piano","Building LEGO models","Participating in small art workshops","Learning
    about other cultures through crafts"]'
  career_goals: Nicole dreams of becoming a wildlife artist or an elementary teacher who integrates art and science to inspire young minds. She hopes to create educational murals that celebrate local nature,
    study biology or education in college, and eventually work in a role that lets her combine her love for drawing, animals, and helping others.
