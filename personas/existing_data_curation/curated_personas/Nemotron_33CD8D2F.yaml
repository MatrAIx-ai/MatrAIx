personas:
  professional: Nicole Ziemer is an aspiring young naturalist and budding illustrator who channels her curiosity about the Ozark forest into detailed sketchbooks, while her knack for organized planning
    helps her construct methodical LEGO models, and they keep art project schedules on track.
  sports: Nicole Ziemer enjoys exploring the Ozark streamside trails and joining the local youth soccer club's Green Dragons team for weekend matches, but prefers solo nature treks and rock‑climbing practice,
    which they pursue with a small backpack and a love for cross‑country endurance.
  arts: Nicole Ziemer sketches forest scenes inspired by Audubon, plays the opening bars of Beethoven’s Für Elise on piano, builds LEGO landscapes reminiscent of Tolkien’s Middle‑Earth, reads The Hobbit
    and Harry Potter, and attends community‑center workshops where they learned origami cranes from Jo Nakashima.
  travel: Nicole Ziemer has hiked the Ozark National Scenic Riverways, taken a family road trip to Nashville, Tennessee, and dreams of backpacking through the Redwood Forest in California, planning each
    adventure with a hand‑drawn itinerary.
  culinary: Nicole Ziemer enjoys making cinnamon‑apple muffins, banana pancakes, and simple sushi rolls with cucumber and avocado alongside their family, proudly experimenting with fresh strawberries and
    pumpkin seeds, though they sometimes burn the toast when distracted.
  core: Nicole Ziemer is a curious, solitary 10‑year‑old who blends forest sketching, LEGO building, and piano practice while meticulously saving allowance for nature‑themed projects, yet habitually misplaces
    their sketchbook.
background:
  cultural: Nicole is raised in a predominantly white, rural community in Calico Rock, Arkansas, where family ties, church involvement, and community gatherings such as the county fair and local festivals
    are central to life. The area's natural beauty—Ozark hills, rivers, and forests—deeply influences her love for the outdoors and wildlife. While Southern hospitality and modest, hardworking values shape
    her everyday interactions, her parents place a strong emphasis on curiosity, education, and artistic expression, encouraging her participation in school art programs and frequent visits to the public
    library.
attributes:
  skills: '["Reading comprehension","Basic drawing and watercolor","Computer literacy (typing and educational software)","Collaborative group project participation","Nature observation and journaling","Problem
