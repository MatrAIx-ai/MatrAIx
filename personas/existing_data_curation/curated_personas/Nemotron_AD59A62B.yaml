  hobbies: '[''Historical Fiction Reading'', ''Gardening'', ''Creole Cooking'', ''Church Choir Participation'', ''Quilting'', ''Jazz & Heritage Festival Attendance'', ''Genealogy Research'', ''Volunteer
    Tutoring'', ''Bridge Playing'', ''Birdwatching'']'
  career_goals: Although formally retired, Rita seeks to channel her lifelong love of learning into community‑focused initiatives. She aims to serve as a mentor for new teachers in the Baton Rouge school
    district, volunteer as a curriculum consultant for the local community college’s adult‑education program, and help preserve local African‑American history by contributing oral histories to the city’s
    heritage archive. Rita also hopes to author a memoir that blends her experiences in education with stories of her family’s civil‑rights activism, providing a resource for younger generations. On a personal
    level, she plans to maintain her health through regular walks and yoga, travel with her husband to historic sites in the South, and continue supporting her grandchildren’s schooling through tutoring
    and advice. These goals reflect her blend of curiosity, practicality, and desire to give back while staying emotionally balanced.
