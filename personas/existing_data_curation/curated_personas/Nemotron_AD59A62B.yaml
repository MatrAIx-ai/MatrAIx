personas:
  professional: Rita Mayfield is a retired classroom teacher turned community mentor who leverages her curriculum design expertise, project‑management skills, and steady public‑speaking presence to guide
    novice educators, shape adult‑literacy programs, and preserve local history through oral‑history initiatives, and they balance curiosity with practicality in every endeavor.
  sports: Rita Mayfield enjoys early‑morning walks in City Park to birdwatch, participates in a senior walking club affiliated with the Baton Rouge community center, follows the LSU Tigers football team
    with seasonal enthusiasm, and they occasionally join a local bridge‑playing league that doubles as a social fitness activity.
  arts: Rita Mayfield participates in her church choir, revels in the sounds of Wynton Marsalis and Ella Fitzgerald at the annual Jazz & Heritage Festival, reads historical fiction by authors such as Terry
    McMillan, and they craft intricate quilts inspired by traditional Southern motifs, often displaying them at the Louisiana Folk Art Museum.
  travel: Rita Mayfield prefers relaxed, culturally immersive trips with their husband—such as guided tours of Savannah’s historic squares, a weekend carriage ride through Charleston’s cobblestone streets,
    and a day‑trip to Natchez’s antebellum homes—while balancing a modest travel budget and coordinating visits around grandchildren’s school schedules, and they treasure the chance to breathe in the history
    of each Southern town.
  culinary: Rita Mayfield blends Creole flavors with garden‑fresh ingredients, regularly preparing gumbo with okra, andouille sausage, and filé powder, as well as shrimp étouffée seasoned with cayenne and
    bell peppers, and they enjoy sharing these dishes at family gatherings and community potlucks.
  core: Rita Mayfield is a steadfast lifelong learner who balances curiosity with practicality, weaving gardening, mentoring, and Creole cooking into a rhythm of community service, occasional self‑indulgence,
    and gentle self‑discipline, and they never miss a Sunday choir rehearsal.
background:
  cultural: Rita’s cultural identity is rooted in the African‑American traditions of the Deep South, shaped by generations of family members who lived through segregation, the civil‑rights movement, and
    the vibrant cultural tapestry of Louisiana. Growing up in Baton Rouge, she was immersed in the church‑centered community that emphasized gospel music, storytelling, and mutual support. Her family’s
    culinary heritage blends Creole and Southern flavors, a legacy she honors through cooking and gardening. Rita’s experiences include participation in historically Black schools, civic organizations,
    and local festivals that celebrate African‑American art, jazz, and zydeco. This background informs her values of resilience, community service, and an appreciation for the rich, pluralistic culture
    that characterizes East Baton Rouge Parish.
