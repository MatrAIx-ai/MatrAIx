    with grandchildren"]'
  career_goals: Although retired, Valerie is eager to continue learning and giving back to her community. She plans to complete her GED through a local adult‑education program, document oral histories of
    Logan County elders, and curate a small exhibit of Appalachian folk art at the community center. She also hopes to mentor younger volunteers in crafting techniques, enroll in a short course on digital
    photography, and travel to regional art museums to broaden her artistic perspective.
