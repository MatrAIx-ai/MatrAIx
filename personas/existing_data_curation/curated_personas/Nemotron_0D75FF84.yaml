    junior staff'', ''Bilingual communication (English and Vietnamese)'']'
  hobbies: '[''Bridge and card games'', ''Bingo and group game nights'', ''Vietnamese cooking club'', ''Backyard gardening'', ''Walking along the Santa Ana River trail'', ''Reading historical non‑fiction'',
    ''Volunteering at the local temple'', ''Participating in Tet and cultural festivals'', ''Storytelling with grandchildren'']'
  career_goals: Even at 83, Keang remains motivated to leave a lasting professional legacy. He aims to formalize his mentorship role by creating a short, practical guide on bookkeeping best practices for
    local small‑business owners and community nonprofits. He also aspires to obtain a Certified Bookkeeper (CB) credential to validate his expertise. In his current part‑time capacity, he plans to assist
    his organization in transitioning to a cloud‑based accounting system, ensuring a smooth handover to younger staff. Additionally, he hopes to volunteer as treasurer for the Vietnamese cultural association
    in Norco, using his financial acumen to support community events while fostering intergenerational connections. On a personal level, he seeks to maintain his health, reduce stress through mindfulness
    practices, and continue supporting his family’s financial security.
