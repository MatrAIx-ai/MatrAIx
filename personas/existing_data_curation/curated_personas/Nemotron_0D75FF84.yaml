personas:
  professional: Keang Bui, an 83-year-old bookkeeping veteran, leverages six decades of double-entry expertise, QuickBooks mastery, and meticulous audit compliance to mentor junior clerks, while they blend
    curiosity for emerging financial software with a sociable nature that turns the senior center's accounting workshops into lively, collaborative learning sessions.
  sports: Keang Bui enjoys low-impact cardio walks along the Santa Ana River trail, participates in the Norco senior center's weekly bowling league, and they cheer for the Los Angeles Dodgers and LA Lakers,
    balancing a gentle exercise regime with the occasional community softball game.
  arts: Keang Bui savors traditional folk performances at the local temple, admires the music of Trinh Thanh, and finds comfort in classic Hollywood films starring Cary Grant, while they occasionally dabble
    in calligraphic brushwork during the cooking club's cultural evenings.
  travel: Keang Bui prefers short, well-planned trips that blend relaxation with cultural enrichment, such as weekend getaways to historic Old Town Sacramento, a serene stay at a coastal cottage in Big
    Sur, and they look forward to an annual pilgrimage to the vibrant Little Saigon district for its Tet festivities.
  culinary: Keang Bui, a seasoned home chef, leads a weekly Vietnamese cooking club where they expertly prepare pho broth, banh xeo, and fresh herb rolls using lemongrass, star anise, and Thai basil, while
    their garden yields cilantro, mint, and chilies that freshen every family meal.
  core: Keang Bui blends meticulous bookkeeping precision with a warm, community-center spirit, navigating life’s worries through mindfulness, garden herbs, and the occasional tea-time indulgence they savor.
background:
  cultural: Keang Bui was born in a rural province of Vietnam and migrated to the United States with his family in the late 1970s, settling in Southern California. He grew up in a close‑knit Vietnamese‑American
    community where respect for elders, family cohesion, and communal harmony were core values. These cultural principles shape his considerate and cooperative demeanor. He maintains fluency in Vietnamese,
    observes traditional customs such as Lunar New Year (Tet) and ancestor worship, and participates in community gatherings at the local Buddhist temple. At the same time, he has embraced the multicultural
    fabric of Norco, integrating American customs—like volunteer service and neighborhood block parties—into his lifestyle. His bicultural experience informs his ability to bridge generational gaps, offering
    both practical financial guidance and cultural mentorship to younger community members.
attributes:
  skills: '[''Double‑entry bookkeeping'', ''Financial statement preparation'', ''Accounts payable/receivable management'', ''Payroll processing'', ''Tax filing assistance'', ''QuickBooks and Sage software
