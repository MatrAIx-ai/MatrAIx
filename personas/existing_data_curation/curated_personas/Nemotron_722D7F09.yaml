personas:
  professional: Fausto Cruz, a retired agricultural specialist turned community market vendor, leverages his hands-on expertise in crop cultivation, irrigation repair, and carpentry to coordinate neighborhood
    festivals while improvising solutions on the fly, balancing his preference for routine with occasional bursts of spontaneity.
  sports: Fausto Cruz follows the Cangrejeros de Santurce with fervor, enjoys weekly beach walks for low-impact fitness, and occasionally joins local fishermen’s crew for short, brisk outings that double
    as informal cardio sessions.
  arts: Fausto Cruz energizes local bomba and plena gatherings by playing the pandereta alongside the rhythm of famed bomba legend Bebo Gonzalez, shares stories of island history with friends, and draws
    inspiration from the soulful vocals of plena icon Loco Cesar.
  travel: Fausto Cruz prefers short, well-planned trips within the archipelago—having explored the serene beaches of Vieques and the historic forts of Old San Juan—yet his spontaneous fishing urges sometimes
    derail itineraries, leading him to improvise detours to local markets and roadside eateries, and he dreams of a quick trip to San Juan for a bomba concert with his wife.
  culinary: Fausto Cruz, a proficient home cook, crafts fragrant stews, juicy empanadillas, and buttery pasteles using garden-fresh plantains, tomatoes, cilantro and adobo, while occasionally oversalting
    his fritters in a quest for deeper flavor.
  core: Fausto Cruz blends hardworking pragmatism with spontaneous bursts of rhythm, managing anxiety through garden rituals and bomba beats, yet cannot resist splurging on fishing gear whenever the tide
    calls.
background:
  cultural: Fausto is a lifelong resident of Isabela, a town known for its agricultural roots and coastal traditions. He grew up in a close‑knit Puerto Rican family where Spanish, indigenous Taíno, and
    African influences intertwined in music, food, and festivals. Catholicism shapes his weekly life, and community events such as the Fiestas Patronales and bomba celebrations are central to his identity.
    He values family loyalty, respect for elders, and the sharing of oral histories. His bilingual ability, though informal, reflects the island’s growing interaction with mainland U.S. visitors. These
    cultural threads inform his daily routines, cooking, music preferences, and his desire to pass on traditions to younger generations.
attributes:
  skills: '[''Agricultural crop cultivation'', ''Irrigation system maintenance'', ''Small‑engine repair'', ''Carpentry'', ''Woodworking'', ''Traditional Puerto Rican cooking'', ''Spanish‑English translation'',
