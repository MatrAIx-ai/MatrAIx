  hobbies: '["singing gospel songs", "dancing to music", "dress‑up and pretend play", "storytelling with dolls", "drawing and coloring", "preschool circle time games", "nature walks in local park"]'
  career_goals: Latoya imagines herself as a future teacher who can create fun, organized lessons while allowing children the freedom to explore, a dancer who can share her energetic moves on stage, and
    a community helper like a firefighter or neighborhood volunteer, reflecting her desire to care for others and blend structure with spontaneity.
