personas:
  professional: Latoya Basdeo, a playful 5‑year‑old, already runs a pretend preschool where they organize story‑time circles with bright crayons, yet they often toss the schedule aside to improvise a dance
    break, reflecting a love of structure balanced by spontaneous fun.
  sports: Latoya Basdeo dashes through weekend games with the Hopkinsville Tiny Turtles Little League, cheers loudly for the Cincinnati Bengals on Sundays, and practices beginner gymnastics at the local
    community center, balancing their energetic love of group play with occasional bouts of fatigue that make them request a nap.
  arts: Latoya Basdeo sings along to Raffi’s "Baby Beluga" and the gospel harmonies of Mahalia Jackson during Sunday‑school choir rehearsals, delights in watching Disney’s "Moana" on family movie nights,
    and draws colorful pictures of farm animals inspired by the murals at the community library, channeling their vibrant imagination through music and art.
  travel: Latoya Basdeo has explored the winding tunnels of Mammoth Cave on a school field trip and delighted at the St. Louis Zoo’s giraffe feeding, and they dream of a magical family vacation to Disney
    World’s Magic Kingdom where they can meet their favorite princesses.
  culinary: Latoya Basdeo devours buttery buttermilk pancakes topped with sliced strawberries for breakfast, loves cheesy mac‑and‑cheese at lunchtime, and squeals with joy when their grandma cooks crispy
    fried chicken seasoned with a hint of sage, all while they proudly spread peanut butter on toast by themselves.
  core: Latoya Basdeo, a buzz‑filled five‑year‑old, balances a love for orderly story‑time with sudden dance bursts, hoards sparkly coins yet often forgets their inhaler, and they can turn a simple bedtime
    routine into an adventure of giggles and worries.
background:
  cultural: Latoya is a Black American child growing up in Hopkinsville, Kentucky, within a close‑knit extended family and a vibrant African‑American community. Church, gospel music, and family gatherings
    shape her daily life, with traditions such as Sunday school, choir rehearsals, community picnics, and Southern soul‑food meals. The blend of rural Kentucky values of neighborliness and the rich heritage
    of Black Southern culture influences her language, music preferences, celebrations, and the supportive environment that helps her manage her occasional worries and stress.
