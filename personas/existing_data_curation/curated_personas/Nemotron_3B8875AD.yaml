personas:
  professional: Alexis Cabrera, a clinical psychologist who specializes in CBT, ACT, neuropsychological assessment, and telehealth, they leverage her STEM‑rooted data‑driven mindset and love of structured
    routines to design evidence‑based community programs, while her competitive nature pushes her toward leadership roles and her healthy skepticism ensures rigorous evaluation of colleagues’ proposals.
  sports: Alexis Cabrera, an avid hiker who logs weekly treks with the Rocky Mountain Alpine Club, they follow the Colorado Avalanche and Denver Broncos, and participate in seasonal community badminton
    leagues, balancing a love of structured cardio with a competitive urge to beat personal elevation records, while occasionally allowing a lazy rest day after intense sessions.
  arts: Alexis Cabrera, a nature‑focused photographer whose compositions echo Ansel Adams and Alex Strohl, they immerse themselves in the soothing guitar melodies of John Denver and the powerful stage presence
    of Viola Davis, using these artistic inspirations to decompress after demanding therapy sessions.
  travel: Alexis Cabrera, a methodical traveler who prefers detailed itineraries blending moderate adventure with comfortable lodging, they have explored Banff National Park’s alpine trails, wandered the
    historic streets of Granada, and danced to the vibrant rhythms of Medellín, all while budgeting trips to align with her mortgage obligations and occasional family commitments.
  culinary: Alexis Cabrera, a skilled home cook, they blend family recipes such as ropa vieja and arroz con pollo with Colorado ingredients like trout, quinoa, and locally foraged rosemary, craft hearty
    black bean soup with poblano peppers and fresh cilantro, and when stressed, tend to over‑season dishes as a quirky coping mechanism.
  core: Alexis Cabrera, a 44‑year‑old clinician, they fuse data‑driven therapy with structured gardening, hiking, and meticulous meal prep, while battling an over‑scheduling habit and a skeptical eye toward
    others’ intentions.
background:
  cultural: Born to Cuban immigrant parents, Alexis was raised in a bilingual household that emphasized strong family ties, music, and traditional cuisine. Her Cuban heritage informs her therapeutic style,
    fostering an appreciation for collectivist values, community support, and the use of culturally resonant metaphors in counseling. She stays connected to the Cuban diaspora in Colorado by participating
    in cultural festivals, cooking traditional meals for community events, and integrating elements of Cuban culture—such as rhythm, storytelling, and familial responsibility—into her practice.
attributes:
  skills: '[''Clinical Assessment'', ''Cognitive Behavioral Therapy (CBT)'', ''Acceptance and Commitment Therapy (ACT)'', ''Neuropsychological Testing'', ''Crisis Intervention'', ''Statistical Data Analysis'',
    ''Telehealth Implementation'', ''Bilingual Counseling (English/Spanish)'', ''Case Management'', ''Supervision and Training'', ''Program Development'']'
  hobbies: '[''Gardening'', ''Hiking'', ''Cooking Cuban Cuisine'', ''Yoga'', ''Reading Psychology Literature'', ''Volunteering at School Mental‑Health Programs'', ''Nature Photography'']'
  career_goals: Alexis aims to become the director of a community mental health center serving the Latino population in northern Colorado, where she can design and implement culturally tailored evidence‑based
    programs. She plans to pursue a PhD in Clinical Psychology to strengthen her research credentials, publish studies on the efficacy of telehealth for rural Hispanic communities, and secure grant funding
    for outreach initiatives. She also aspires to mentor emerging mental‑health professionals, expand a network of bilingual clinicians, and position herself as a thought leader in culturally competent
    mental health service delivery.
