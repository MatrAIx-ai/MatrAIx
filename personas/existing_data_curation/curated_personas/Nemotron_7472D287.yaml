personas:
  professional: Christine Mullen is an aspiring veterinary assistant in training, leveraging her meticulous organizational skills, empathetic listening, and practical hands‑on abilities to excel in animal
    care and peer support, while her natural curiosity drives her to explore evidence‑based solutions in healthcare.
  sports: Christine Mullen enjoys low‑impact fitness through regular birdwatching hikes along the nearby bayous and participates in a local co‑ed softball league, while faithfully cheering on the New Orleans
    Saints during NFL season and the LSU Tigers during college football.
  arts: Christine Mullen immerses herself in storytelling by devouring mystery novels by Agatha Christie, listening to country, folk, and Cajun artists such as Dolly Parton, Gillian Welch, and Zachary Richard,
    and crafting tactile art through crocheting and knitting projects she gifts to friends.
  travel: Christine Mullen prefers tranquil, nature‑focused getaways, having explored the Atchafalaya Basin and planning trips to the Great Smoky Mountains and the coastal town of Galveston, balancing a
    limited teen budget with family outings and occasional school‑organized field trips.
  culinary: Christine Mullen enjoys cooking simple, wholesome meals, often whipping up Cajun‑inspired gumbo with garden‑fresh tomatoes and corn, baking oatmeal chocolate chip cookies for friends, and experimenting
    with herbs like thyme and bay leaves to add depth to her dishes.
  core: Christine Mullen blends quiet curiosity with practical kindness, channeling anxiety into meticulous crafts and community care, yet occasionally succumbs to spontaneous yarn shopping sprees.
background:
  cultural: Christine grew up in Pineville, Louisiana, a small, predominantly white community in Avoyelles Parish with deep Southern roots. Her family values reflect traditional Southern hospitality, a
    strong Christian (Baptist) faith, and a close‑knit sense of community. The region’s cultural tapestry includes subtle French Cajun influences, local festivals like Mardi Gras, and a connection to the
    agricultural landscape. She regularly participates in church gatherings, community fairs, and family potlucks centered around southern cooking and gospel music. These cultural experiences fostered her
    respect for tradition, love of nature, and emphasis on cooperation and harmony with others.
