    participation'']'
  career_goals: Maria aims to transition into a senior program management role where she can lead multi‑disciplinary portfolios that blend business goals with cultural and creative initiatives. She plans
    to earn PMP and Advanced Scrum certifications within the next two years to solidify her credentials. Long‑term, Maria envisions founding a consulting practice that helps non‑profits and community organizations
    deliver innovative art‑focused projects, especially those that celebrate Mexican heritage and foster social cohesion. She also aspires to mentor junior project managers, promoting inclusive, flexible
    work environments that prioritize well‑being and collaborative harmony.
