personas:
  professional: Shawn Hasan, a 20‑year‑old film production student who blends meticulous pre‑production planning with experimental visual storytelling, uses Adobe Premiere Pro and DaVinci Resolve on set,
    calmly orchestrates crew schedules, and fosters a cooperative atmosphere by actively listening to actors and crew alike, and they consistently lead projects with a calm, resilient demeanor.
  sports: Shawn Hasan, a member of the West Virginia Hiking Club who spends weekends trail‑running in the Monongahela National Forest, follows the West Virginia Mountaineers football and the Pittsburgh
    Steelers, plays pickup basketball at the local community center during winter, and occasionally joins a cross‑country skiing group when the snow arrives, balancing active outdoor pursuits with a relaxed
    team‑watching habit, and they enjoy the mix of solo and social sports.
  arts: Shawn Hasan, an acoustic guitarist who regularly performs original folk‑rock songs at the downtown Morgantown open‑mic, draws creative inspiration from artists like Gillian Welch, Sufjan Stevens,
    and filmmaker Jim Jarmusch, and immerses themselves in Appalachian folklore narratives while volunteering at the local community theatre, where they experiment with set design and improvisational storytelling.
  travel: Shawn Hasan, who prefers spontaneous weekend getaways over elaborate itineraries, often hikes the Blue Ridge Parkway and explores the misty cliffs of Shenandoah National Park, dreams of photographing
    the auroras in Iceland and the volcanic landscapes of New Zealand, balances these trips with a limited student budget by couch‑surfing and swapping gear with fellow creatives, and they always carry
    a compact analog camera for impromptu shots.
  culinary: Shawn Hasan, a self‑taught home cook who loves to whip up simple yet hearty meals like cornbread with locally foraged ramps, wild mushroom risotto, and smoked trout tacos, enjoys experimenting
    with seasonal herbs such as sage and thyme, frequently pairs cooking sessions with listening to vinyl records, and they find the rhythmic chopping of vegetables as a calming ritual after a long shoot.
  core: Shawn Hasan fuses calm, methodical filmmaking with a restless curiosity for Appalachia’s hidden stories, occasionally over‑packing camera gear for no reason and binge‑watching folk documentaries
    late into the night, and they never miss a sunrise hike, even when deadlines loom.
background:
  cultural: Shawn is a white American raised in the Appalachian region of West Virginia, with family roots that trace back several generations to rural communities in the area. Growing up in Marion County
    and now living in Morgantown, he absorbed the region's values of self‑reliance, community support, and appreciation for natural beauty, while the college town environment introduced him to diverse perspectives
    and newer artistic techniques. This blend of traditional Appalachian culture—folk music, storytelling, and a strong sense of place—with exposure to contemporary ideas shapes his balanced outlook, his
    pragmatic yet curious approach to work, and his desire to honor his heritage while innovating within the film industry.
attributes:
  skills: '[''Video Editing (Adobe Premiere Pro, DaVinci Resolve)'', ''Camera Operation (Canon C-Series, Sony A7)'', ''Lighting Design'', ''Sound Recording & Mixing'', ''Storyboarding & Script Analysis'',
    ''Production Scheduling & Budgeting'', ''Directing Actors'', ''Team Leadership'', ''Problem Solving under Pressure'']'
  hobbies: '[''Hiking and Trail Exploration'', ''Landscape Photography'', ''Acoustic Guitar Playing'', ''Reading Film Theory and Folklore'', ''Community Theater Workshops'', ''Analog Photography'', ''Mentoring
    Youth in Media Outreach'']'
  career_goals: Shawn aims to become an independent filmmaker who tells authentic Appalachian stories with contemporary visual language. Over the next five years he plans to complete a bachelor's degree
    in film production, launch a modest production company, and regularly submit his short films and documentaries to regional and national festivals. He hopes to secure partnerships with streaming platforms
    to broaden his audience while maintaining a collaborative, inclusive set environment. Long‑term, he envisions mentoring emerging creators in his community and using his work to highlight environmental
    and cultural issues facing West Virginia.
