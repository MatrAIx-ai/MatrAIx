  hobbies: '[''Gardening'', ''Fishing'', ''Woodworking'', ''Local history research'', ''Community dance events'', ''Church fellowship'', ''Reading historical nonfiction'', ''Listening to classic rock music'']'
  career_goals: Although retired, Chandy aims to remain actively engaged in his community and continue learning new crafts. He hopes to volunteer as a mentor for younger members of the township’s senior
    center, sharing his practical know‑how and fostering intergenerational connections. He also aspires to document his family’s history for future generations, develop a small woodworking studio in his
    backyard, and travel with his wife to historic sites around the Great Lakes region.
