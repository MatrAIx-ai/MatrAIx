  hobbies: '["Sketching desert landscapes", "Creating Mexican folk art", "Cooking traditional Mexican dishes", "Gardening (chiles and herbs)", "Walking and bird-watching in desert trails", "Reading historical
    novels and poetry", "Participating in a senior book club", "Knitting in a small community group", "Attending local art fairs", "Listening to Mexican music"]'
  career_goals: Adelaida's primary career goal is to maintain a comfortable, part‑time role that supports her independence while allowing her to share her experience with younger coworkers. She hopes to
    become an informal mentor, passing on practical retail skills and fostering a supportive workplace culture. She also aspires to volunteer at the local community center, helping organize art‑related
    activities for seniors and multicultural events that celebrate Mexican heritage. Learning to use a tablet for digital record‑keeping and exploring basic computer courses are personal ambitions that
    would enhance her confidence in modern tools. Ultimately, she wishes to leave a legacy of kindness, cultural pride, and practical knowledge for both her family and the community.
