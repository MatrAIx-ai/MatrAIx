  career_goals: Although retired, Michael aims to keep his intellect and creativity active. He plans to author an illustrated book that weaves together concepts from mathematics, engineering, and abstract
    art, and to curate a small community exhibition that showcases this interdisciplinary work. He also seeks to mentor a new generation of hobbyist engineers through a local maker space, learn the Rust
    programming language, and complete a kinetic sculpture that moves in response to ambient sound. Travel to museums and galleries that celebrate scientific art, and contribute occasional articles to popular
    science magazines, remain high on his list.
