persona_description: A scientist and astronomer, particularly interested in cosmic microwave background temperature measurements and the study of the early universe. Dr Sebastien Muller and his team of
  astronomers have made the most precise measurement ever of how the Universe has cooled down during its 13.77-billion-year history. Their work is based on studying the gas in an unnamed galaxy 7.2 billion
  light-years away, which was observed through the gas molecules in the foreground galaxy. The discovery provides a more accurate and precise understanding of the cosmic microwave background temperature
  at z=0.89, which is important for understanding the early universe and the Big Bang theory.
