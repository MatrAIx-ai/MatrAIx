personas:
  professional: Isabel Colina is a seasoned facilities maintenance specialist who, with a methodical and detail‑oriented approach, leverages three decades of hands‑on expertise in electrical, plumbing,
    HVAC, and masonry; they aim to transition into a senior supervisory role within the municipal facilities department, where they will implement structured preventive maintenance plans and mentor apprentices,
    balancing compassion for their team with a pragmatic focus on safety and efficiency.
  sports: Isabel Colina stays active by taking daily walks along the historic streets of Ponce and by participating in the Ponce Heritage Walking Club, while cheering for the Leones de Ponce baseball team
    and occasionally watching Puerto Rico FC matches; they prefer low‑impact exercise and reserve high‑intensity sports for occasional community tennis meet‑ups, balancing fitness with a pragmatic schedule.
  arts: Isabel Colina finds artistic solace in listening to traditional bomba and plena rhythms performed by groups like Los Pleneros de la 21, enjoys classic salsa legends such as Celia Cruz and Rubén
    Blades during her occasional dance sessions with her husband, and often knits or crochets while the soothing guitar of Andrés Segovia plays in the background, allowing music to shape her creative rhythm.
  travel: Isabel Colina approaches travel with meticulous planning, favoring cultural immersion in historic locales such as Old San Juan, Cartagena, and Barcelona, while also enjoying relaxed weekend getaways
    to nearby vineyards in Napa Valley or the coastal charm of Savannah; they balance a limited travel budget by using early‑bird flight deals and often bring back heirloom seeds or local spices to enhance
    their garden and kitchen.
  culinary: Isabel Colina excels in creating hearty traditional dishes like mofongo stuffed with chicharrón and arroz con gandules seasoned with sofrito, annatto, and pigeon peas, precisely chopping herbs
    such as cilantro, oregano, and thyme harvested from her patio garden, and she relishes the occasional experimentation with spicy adobo rubs and homemade plantain chips, often sharing her culinary creations
    with family and friends.
  core: Isabel Colina is a methodical facilities veteran who blends a disciplined maintenance mindset with a love for herb‑laden cooking, community crochet gifts, and a quiet worry about hidden leaks, all
    while quietly mentoring the next generation.
background:
  cultural: Isabel’s cultural identity is rooted in the rich tapestry of Puerto Rico’s Spanish colonial heritage, African rhythms, and Taíno ancestry. Growing up in Ponce, known as “La Perla del Sur,” she
    was immersed in the city’s artistic traditions, historic architecture, and vibrant festivals such as Feria de la Novilla. Family life is central, with strong ties to extended relatives and a deep respect
    for Catholic customs that shape holidays and daily routines. Her bilingual fluency reflects the island’s dual linguistic landscape, and she carries forward community values of hospitality, resilience,
    and collective responsibility.
