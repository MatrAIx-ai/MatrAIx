  career_goals: Isabel aims to transition into a senior supervisory role within the municipality’s facilities department, overseeing multiple sites and mentoring apprentices. She plans to obtain a certified
    facilities manager credential and an HVAC technician license to broaden her expertise. Over the next five years, she hopes to implement a systematic preventive maintenance program that reduces emergency
    repairs and improves workplace safety, ultimately allowing her a smoother path toward a part‑time advisory position before retirement.
