  hobbies: '[''Plein‑air painting'', ''Reading modernist literature'', ''Digital art exploration'', ''Gardening (native coastal plants)'', ''Historical society oral‑history collection'', ''Woodworking'',
    ''Sailing'', ''Fishing and cooking seafood'', ''Attending folk art festivals'', ''Volunteer docent work'']'
  career_goals: Despite being retired, Jacob aims to translate his lifetime of knowledge into lasting contributions to his community and the field he loves. His primary ambition is to establish a small,
    nonprofit art and heritage center in Sneads Ferry that showcases regional maritime art, oral histories, and local crafts. He intends to secure a grant to fund a digitized archive of coastal artists’
    works and historical photographs, making them accessible to scholars and the public. Jacob aspires to author a book that interweaves his personal reflections with a scholarly survey of Southern art
    movements, hoping to inspire younger artists and preserve his insights for future generations. He also seeks mentorship opportunities, offering his expertise to emerging curators and high‑school art
    teachers. In his personal sphere, Jacob wishes to cultivate a legacy of cultural appreciation within his family—teaching his grandchildren about art criticism and encouraging them to pursue creative
    endeavors. He is committed to maintaining his disciplined routine, completing one new exhibition or publication each year, while also balancing his health and emotional wellbeing.
