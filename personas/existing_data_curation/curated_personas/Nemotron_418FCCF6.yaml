personas:
  professional: Jacob Maxfield, a retired museum curator and humanities scholar, uses his deep expertise in 20th‑century American art, meticulous archival research, and disciplined project management to
    create community‑focused exhibitions that blend traditional maritime narratives with cutting‑edge digital media, while his curiosity drives him to mentor emerging curators and experiment with interactive
    installations.
  sports: Jacob Maxfield sails with the Sneads Ferry sailing club, enjoys weekend grouper fishing excursions, follows the Carolina Panthers each fall, and participates in a senior walking group that meets
    after the town’s summer art walk, blending low‑impact fitness with his love of the sea.
  arts: Jacob Maxfield paints plein‑air sunrise scenes along the Intracoastal Waterway, reads modernist works by Virginia Woolf and James Joyce, enjoys the folk ballads of Doc Watson, follows digital installations
    by Refik Anadol, and volunteers as a docent at the North Carolina Folk Art Festival, where he often references the folk paintings of regional artist William Bartram.
  travel: Jacob Maxfield prefers meticulously planned road trips that balance relaxed seaside retreats with cultural excursions, having recently visited Charleston’s historic district and Edinburgh Castle
    to trace his ancestors’ roots, while he dreams of a Mediterranean cruise that includes the Amalfi Coast and the Greek islands of Crete and Santorini.
  culinary: Jacob Maxfield’s palate blends Southern comfort with Mediterranean flair, regularly preparing grilled grouper with oregano‑infused olive oil, shrimp and grits seasoned with smoked paprika, and
    a summer quinoa salad featuring heirloom tomatoes and fresh basil, while his moderate cooking skills keep him experimenting yet he often over‑salts dishes in his enthusiasm.
  core: Jacob Maxfield is a disciplined, curious elder who merges coastal heritage with scholarly rigor, channeling his meticulous nature into sailing, painting, and community art projects, even as he worries
    about health setbacks and occasionally indulges in splurges on art books.
background:
  cultural: Jacob grew up in a small town in eastern North Carolina, immersed in the coastal culture of the Outer Banks and the tradition of maritime livelihoods. His family’s roots trace back to English
    and Scottish immigrants who settled the region in the 19th century, preserving a blend of Southern hospitality, reverence for the sea, and an appreciation for community gatherings. The region’s folk
    art, shipbuilding, and storytelling have left a lasting imprint on his aesthetic sensibilities. Raised in a Baptist household, Jacob values modesty, service, and inter‑generational respect, which inform
    his collaborative and compassionate disposition. His education at a state university in North Carolina, where he earned an MA in Humanities with a focus on American visual culture, broadened his outlook,
    exposing him to diverse artistic movements and encouraging unconventional thinking. The combination of Southern regional heritage, academic exposure, and lifelong curiosity shapes Jacob’s identity as
    a culturally grounded yet globally aware elder.
