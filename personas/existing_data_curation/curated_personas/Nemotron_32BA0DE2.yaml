  hobbies: '[''Gardening (heirloom vegetables)'', ''Long‑distance walking/hiking'', ''Reading (historical biographies, science‑fiction)'', ''STEM tutoring for high‑school students'', ''Cooking Mediterranean
    cuisine'', ''Community‑theater attendance'', ''Watercolor painting'']'
  career_goals: Isobel aims to transition into senior leadership, targeting a Director of R&D or Chief Technology Officer role where she can shape strategic innovation pipelines. She is passionate about
    mentoring the next generation of engineers, especially women and underrepresented groups in STEM, and plans to formalize a mentorship program within her organization. A key ambition is to champion sustainable
    medical technologies—developing low‑cost, environmentally friendly devices for underserved communities. She also seeks collaborative partnerships with academic labs to accelerate translational research
    and hopes to influence health‑technology policy through advisory board service.
