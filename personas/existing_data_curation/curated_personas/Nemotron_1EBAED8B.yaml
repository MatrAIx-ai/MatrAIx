personas:
  professional: Marie Brown, an 18‑year‑old budding cosmetology professional, translates her acrylic‑painting eye for color into precision hair cutting, balayage, and avant‑garde up‑dos while leveraging
    their charismatic, talkative nature to turn client consultations into lively collaborative art sessions, and they often livestream the transformation to their growing Instagram audience.
  sports: Marie Brown, who swaps salon chairs for salsa nights and a weekly Vinyasa yoga flow, also fuels their competitive spirit by cheering for the Indianapolis Colts on Sundays, taking spontaneous skate‑boarding
    trips to the Indianapolis Museum of Art’s parking lot when the weather permits, and they relish the rush of movement that keeps their energy levels high.
  arts: Marie Brown, a self‑described visual junkie, paints acrylics in the bold colors of Frida Kahlo, captures street portraits inspired by Nan Goldin, and spends evenings at indie concerts featuring
    The Strokes and Phoebe Bridgers, letting this eclectic mix shape the avant‑garde flair of their salon creations, and they channel those influences into each client’s look.
  travel: Marie Brown, who saves diligently from part‑time styling work, has explored Chicago’s graffiti alleyways and Nashville’s live‑music venues, yet dreams of a solo pilgrimage to New Orleans’ French
    Quarter to photograph jazz‑filled streets, and they plan their next escape by mapping out cheap bus routes while balancing a tight budget that limits weekend road trips.
  culinary: Marie Brown, an enthusiastic but slightly clumsy home cook, whips up avocado toast with smoked paprika and keeps a pantry stocked with kimchi, sriracha, and fresh herbs, while they indulge in
    cheese‑laden fries and artisanal tacos al pastor whenever they dine out with friends.
  core: Marie Brown, an 18‑year‑old hair‑artist who treats each client like a canvas, constantly scrolls Instagram for trend inspiration, lives on a steady diet of coffee and late‑night pizza, and they
    can’t resist a good thrift‑store find even when their bank account protests.
background:
  cultural: Marie Marie comes from a white, Midwestern family with roots in German and Irish heritage. Raised in Indianapolis, she embraces the city’s blend of traditional Midwestern friendliness and a
    growing vibrant arts scene. Her upbringing emphasized hard work, reliability, and community involvement, while also fostering an appreciation for self‑expression and creativity. This cultural mix informs
    her approachable salon demeanor, her collaborative spirit, and her desire to integrate local art into her professional practice.
attributes:
  skills: '[''Hair cutting (layering, bob, shag)'', ''Hair coloring (highlights, balayage, pastel tones)'', ''Styling (up‑dos, braiding, curling)'', ''Client consultation and trend forecasting'', ''Product
    knowledge and retail sales'', ''Appointment scheduling and time management'', ''Social‑media content creation (Instagram reels, TikTok videos)'', ''Basic makeup application'', ''Nail art basics'']'
  hobbies: '[''Acrylic painting'', ''Urban photography'', ''Salsa dancing'', ''Visiting art galleries and museums'', ''Attending indie music concerts'', ''Thrift‑store fashion hunting'', ''DIY upcycling
    of clothing and accessories'', ''Volunteering at community art workshops'']'
  career_goals: Marie Marie aims to earn her Indiana cosmetology license within the next year and pursue advanced certifications in color theory and bridal styling. She envisions working under a senior
    stylist at a high‑end Indianapolis salon to refine her craft while building a personal brand on Instagram and YouTube. Her long‑term ambition is to open a boutique salon that doubles as a community
    art space, where local artists can display work and clients can experience collaborative, avant‑garde hair designs. She also hopes to mentor future stylists and eventually lead workshops on sustainable
    beauty practices.
