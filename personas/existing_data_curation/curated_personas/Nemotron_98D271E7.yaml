personas:
  professional: Mark Arruza, a seasoned casino surveillance specialist nearing retirement, combines decades of analog and IP camera expertise with a spontaneous, curiosity‑driven approach to risk assessment,
    using his keen eye for detail to spot anomalies while mentoring new officers through informal, hands‑on training sessions.
  sports: Mark Arruza is an avid walker who charts seasonal changes along the Cuyahoga River, occasionally joins a local senior tennis league, roots for the Cleveland Browns football team and the Cavaliers
    basketball team, and participates in a small bird‑watching club that doubles as a gentle cardio activity on weekend mornings.
  arts: Mark Arruza, a devoted patron of the Cleveland Museum of Art, immerses himself in art‑history lectures, debates Monet’s brushwork in small group tours, collects photographs of downtown architecture,
    and spontaneously attends pop‑up galleries and live‑music jazz sets featuring local talents like the Cleveland Chamber Players.
  travel: Mark Arruza favors low‑key, culturally rich trips, such as weekend excursions to the historic town of Hudson, annual visits to the Grottoes of Cappadocia to inspire his Mediterranean cooking,
    and occasional cruises along the Great Lakes, planning most journeys on a loose itinerary that leaves room for impromptu art openings.
  culinary: Mark Arruza enjoys preparing Mediterranean dishes like grilled branzino with rosemary, fresh tabbouleh, and saffron‑infused paella for his close circle of friends, showcases his modest kitchen
    skill by juggling a half‑filled wine rack while occasionally burning the garlic and forgetting to clean the stovetop until the next gathering.
  core: Mark Arruza blends a razor‑sharp surveillance mind with a lifelong curiosity for art, spontaneous dinner parties, and quiet bird‑watching, navigating retirement with a mix of disciplined mentorship
    and occasional disorganization.
background:
  cultural: Mark grew up in a blue‑collar neighborhood of Cleveland, the son of second‑generation Irish‑American parents who worked in local manufacturing. The family’s Midwestern values—hard work, modesty,
    and a strong sense of community responsibility—shaped his cooperative nature and preference for small, reliable social circles. He attended public schools before earning a bachelor’s degree in business
    from Case Western Reserve University, where exposure to diverse ideas sparked his curiosity about art and unconventional problem‑solving. Cleveland’s rich industrial heritage and ongoing cultural revitalization
    have fostered his pride in the city and his openness to its evolving arts scene, from the Rock and Roll Hall of Fame to community galleries. His cultural upbringing blends traditional celebrations and
    Catholic roots with a pragmatic, forward‑looking outlook, informing both his professional diligence and his personal appreciation for varied experiences.
