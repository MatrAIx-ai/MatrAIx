  career_goals: Approaching retirement, Mark aims to transition into a mentorship and consulting role. He plans to earn advanced credentials such as the Certified Surveillance Professional (CSP) and to
    become the lead trainer for new security officers at his casino, sharing his practical knowledge and unconventional approaches. Long‑term, he hopes to launch a boutique consulting firm that advises
    gaming establishments and cultural institutions on fraud prevention and artwork protection. He also wants to volunteer his expertise to local museums and senior centers, developing safety programs that
    combine his love of art with his security background. Writing a memoir about the evolution of casino surveillance over the past four decades is another personal ambition, intended to preserve institutional
    memory and inspire responsible gambling practices.
