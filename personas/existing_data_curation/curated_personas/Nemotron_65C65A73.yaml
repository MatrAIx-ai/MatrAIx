personas:
  professional: Mirtha Delgadopagan, a detail‑oriented financial manager fluent in Spanish and English, leverages analytical expertise in Excel, Power BI, and SQL alongside a curious appreciation for visual
    arts to deliver ESG‑centric financial strategies while methodically aligning budgets with the organization’s cultural‑diversity mission.
  sports: Mirtha Delgadopagan, an avid hiker with the Phoenix Trails Club, regularly conquers Sonoran Desert routes for cardio, attends weekly yoga sessions at a downtown studio, and follows the Phoenix
    Suns and Arizona Diamondbacks with enthusiastic team spirit, blending local fandom with her disciplined fitness regimen.
  arts: Mirtha Delgadopagan spends weekends at the Phoenix Art Museum absorbing works by Ai Weiwei and Kerry James Marshall, paints vivid acrylic canvases inspired by the bold colors of street artist Shepard
    Fairey, captures urban narratives through a vintage Leica camera, and finds creative spark in the music of Janelle Monáe and the novels of Samantha Schweblin.
  travel: Mirtha Delgadopagan favors meticulously planned solo journeys that blend art exploration with outdoor adventure, having trekked Red Rock Canyon in Nevada and explored Wynwood’s murals in Miami,
    while she dreams of a photography pilgrimage to Barcelona’s Gothic Quarter and a desert‑camping escape in Namibia, budgeting each trip through a dedicated travel spreadsheet.
  culinary: Mirtha Delgadopagan, an enthusiastic home chef, regularly prepares aromatic mole with ancho chilies, dark chocolate, and corn masa, perfects homemade corn tortillas, experiments with fresh cilantro,
    lime, and queso fresco, while also indulging in occasional street‑food‑style tacos and savoring farm‑to‑table tasting menus at Phoenix’s top restaurants.
  core: Mirtha Delgadopagan blends razor‑sharp financial analysis with a restless artistic curiosity, habitually double‑checking every budget line and secretly hoarding vintage art catalogs while still
    finding time to jog through the desert at dawn.
background:
  cultural: Mirtha grew up in a bicultural Mexican‑American household, celebrating traditions such as Día de los Muertos, quinceañeras, and Mexican culinary customs while also embracing the broader American
    culture of Phoenix. Her family places high value on community, hospitality, and education, which shaped her collaborative and considerate nature. Fluent in both Spanish and English, she often serves
    as a bridge between her Mexican heritage and the diverse population of Arizona, bringing cultural insights into her professional life and personal interactions. This blend of Mexican roots and American
    experiences informs her identity, worldview, and commitment to fostering inclusive environments.
attributes:
  skills: '[''financial analysis'', ''budgeting'', ''forecasting'', ''risk management'', ''financial reporting'', ''regulatory compliance'', ''strategic planning'', ''data analytics (Excel, Power BI, SQL)'',
    ''team leadership'', ''bilingual communication (Spanish/English)'', ''art market financial evaluation'']'
  hobbies: '[''visiting art galleries and museums'', ''painting acrylics'', ''photography'', ''cooking traditional Mexican cuisine'', ''hiking in the Sonoran Desert'', ''yoga'', ''reading contemporary fiction
    and fintech literature'', ''volunteering for financial literacy workshops'', ''attending local music and cultural festivals'']'
  career_goals: Mirtha aims to advance to a senior finance leadership role, ultimately becoming a CFO within a midsize company that values cultural diversity and social responsibility. She is passionate
    about integrating ESG (environmental, social, and governance) metrics into financial reporting and envisions leading a finance transformation that supports sustainable growth. Additionally, she hopes
    to mentor emerging female professionals in finance and eventually launch her own consultancy that specializes in financial strategies for arts and cultural organizations.
