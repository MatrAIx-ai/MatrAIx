    Spanish dishes with family"]'
  career_goals: Maria dreams of turning her love for art and imagination into a future career. She is fascinated by animated movies and video games and hopes to become a concept artist or animator who can
    bring fantastical worlds to life. She also wonders about exploring the oceans as a marine biologist, merging her curiosity for nature with her artistic eye. In the meantime, she plans to keep honing
    her drawing, coding, and language skills, hoping that one day they will open doors to a creative, interdisciplinary profession.
