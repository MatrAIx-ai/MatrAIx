personas:
  professional: Maria Herran, an aspiring child illustrator and budding game creator, combines a vivid imagination with a love for fantasy storytelling, turning page‑turning adventures into watercolor sketches
    while coding simple interactive scenes in Scratch; their carefree approach to deadlines lets ideas flow freely, though occasional stray LEGO pieces can be found tangled in their workspace.
  sports: Maria Herran, a weekend soccer enthusiast and casual swimmer, participates in the local youth soccer league with the 'River City Rookies' and practices freestyle laps at the community pool, cheering
    for the regional baseball team the 'Coastal Mariners' while preferring spontaneous backyard games over rigid training schedules, often juggling a soccer ball with a sketchbook during breaks.
  arts: Maria Herran, a budding visual storyteller, draws inspiration from the animated worlds of Hayao Miyazaki, the lyrical piano pieces of Ludovico Einaudi, and the vivid illustrations of Sara Fanelli,
    spending afternoons perfecting watercolors of dragons and elves while listening to the soundtrack of 'The Lord of the Rings' and attending family flamenco sessions that blend rhythm with spontaneous
    sketches.
  travel: Maria Herran, an inquisitive traveler with a love for coastal adventures, has explored the tide pools of nearby Seaside Cove and dreamily plans a family trip to the historic castles of Scotland
    and the colorful streets of Lisbon, favoring short, spontaneous day trips with a sketchbook in hand over lengthy itineraries, though school schedules and allowance limit trips to once a year.
  culinary: Maria Herran, a kitchen apprentice at age eleven, enjoys whipping up a family‑style tortilla de patatas using potatoes, onions, and eggs, experiments with caramelized onions for a sweet twist,
    and relishes tasting homemade mango salsa; their cooking skill is intermediate, often mixing ingredients by feel rather than following strict recipes, and they love pairing meals with freshly squeezed
    orange juice.
  core: Maria Herran, a wildly creative eleven‑year‑old who splashes watercolors on any blank surface, codes whimsical games between LEGO builds, and occasionally trades sleep for sketches, navigates life
    with a relaxed, disorganized charm and a relentless curiosity.
background:
  cultural: Maria is a first‑generation American of Spanish descent. At home, Spanish is spoken alongside English, and she celebrates cultural traditions such as Día de los Reyes, Semana Santa, and local
    Spanish festivals at the community center. Her family maintains a strong connection to Spain through food, music, and occasional visits, while also embracing the diverse, multicultural environment of
    San Leandro, where she attends a public elementary school and participates in bilingual programs. This blend of Spanish heritage and Bay Area life gives Maria a rich cultural perspective that informs
    both her art and her worldview.
attributes:
  skills: '["Creative drawing","Digital illustration","Storytelling","Basic Scratch programming","LEGO construction","Bilingual Spanish-English communication","Beginner piano"]'
