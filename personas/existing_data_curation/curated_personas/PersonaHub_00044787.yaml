persona_description: A former teacher who believes in the importance of digital access and skills for children's education and development, and is calling for the Government to place more emphasis on ensuring
  everyone is not left behind in the digital revolution. The person is aware of the digital divide and its impact on young people and those on low incomes, and wants to see the introduction of mass digital
  literacy campaigns to reach those most vulnerable to the effects of digital inequality. They also believe in the importance of integrating a more practical approach into higher education assessment and
  recommends expanding the categories of "essential digital skills" for life and work to include capabilities in areas such as configuring and interacting with software.
