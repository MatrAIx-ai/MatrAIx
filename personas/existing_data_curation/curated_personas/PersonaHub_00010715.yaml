persona_description: A Finnish photographer who experiments with the traditional microbiological culture process on large-format, color-negative film, creating visually striking and unique portraits that
  challenge the traditional boundaries of photography. His unique approach to photography involves using saliva as a growth medium, creating images that are more profound and impressionistic than traditional
  photographic portraits, and experimenting with the biological, chemical, and physical properties of photography.
