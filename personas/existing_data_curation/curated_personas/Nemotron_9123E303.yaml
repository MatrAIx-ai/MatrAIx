  hobbies: '[''gardening'', ''birdwatching'', ''reading mystery novels'', ''knitting'', ''crocheting'', ''quilting'', ''walking downtown Salem'', ''visiting farmers markets'', ''cooking seasonal meals'']'
  career_goals: Although Diane is no longer in the formal workforce, she remains focused on staying active and purposeful. Her primary ambition is to expand her volunteer role at the Salem senior center,
    eventually mentoring new volunteers and helping develop a weekly wellness workshop for seniors. She hopes to complete a short certification in senior health and nutrition to enhance the programs she
    leads. Writing a memoir of her life growing up in the Pacific Northwest and contributing a regular column on local history to the community newsletter are also long‑term goals. Maintaining a structured
    daily routine that balances social engagement with quiet reflection, and gradually improving her digital skills so she can share family photos online, are other aspirations she pursues each year.
