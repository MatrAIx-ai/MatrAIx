  career_goals: Even at 91, Aida remains goal‑oriented. She aims to maintain her independence and health through regular exercise and balanced nutrition, while continuing to share her STEM knowledge by
    volunteering as a mentor for youth robotics clubs in Gibson County. She is working on a memoir that weaves together personal stories, scientific curiosity, and the history of her hometown. Aida hopes
    to establish a small scholarship fund for local girls pursuing STEM education, reflecting her lifelong belief in practical, curiosity‑driven learning. Additionally, she plans to master video‑calling
    tools to stay connected with grandchildren across the country and to use digital photography to document community events and natural landscapes.
