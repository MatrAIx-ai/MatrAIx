  hobbies: '[''Hiking in Shenandoah National Park'', ''Bird‑watching'', ''Gardening'', ''Journaling'', ''Reading non‑fiction (nature, science)'', ''Cooking simple recipes'', ''Knitting'', ''Participating
    in school science club'', ''Playing puzzle video games'']'
  career_goals: Kimberly aims to maintain a high GPA in high school while leading a science‑fair project that addresses a local environmental issue. She plans to volunteer at the nearby wildlife rehabilitation
    center to gain hands‑on experience with animal care. In the longer term, she hopes to attend a university such as Virginia Tech, major in environmental science or veterinary medicine, and pursue a career
    as a wildlife biologist or conservationist. Her career aspirations reflect her desire for a structured, practical profession that allows her to protect the natural resources of the Shenandoah Valley
    and contribute reliably to her community.
