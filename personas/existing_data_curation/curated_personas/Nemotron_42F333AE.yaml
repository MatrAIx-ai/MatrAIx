  career_goals: Rodney aims to complete his high‑school education by earning a GED within the next two years. He plans to enroll in a vocational program at a local community college, focusing on a skilled
    trade such as carpentry or electrical work, where his hands‑on abilities and disciplined work ethic will be valuable. He also hopes to secure a youth apprenticeship with a regional construction firm,
    gaining real‑world experience while contributing to community projects. While his primary goal is a stable, reliable career in the trades, he remains open to exploring introductory courses in game design
    and programming, keeping his long‑term interest in digital creativity alive.
