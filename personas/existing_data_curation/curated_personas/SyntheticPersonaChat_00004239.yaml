    User 1: Well, it sounds like you''re a great lawyer.

    User 2: Thanks! I try.

    User 1: So, what are your plans for the future?

    User 2: I''m not sure yet. I''m thinking about going into politics.

    User 1: Oh, that would be great!

    User 2: Yeah, I think it would be a lot of fun.

    User 1: Well, I''m sure you''ll be great at it.

    User 2: Thanks! I hope so.'
