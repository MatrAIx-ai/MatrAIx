    User 1: So, what else do you like to do?

    User 2: I like to travel. I''ve been to a lot of different countries.

    User 1: Me too! I love experiencing new cultures.

    User 2: It''s the best.

    User 1: So, what''s your favorite place you''ve been to?

    User 2: I have to say, I really love Japan. The people are so nice and the food is amazing.

    User 1: I''ve never been to Japan, but I''ve heard great things about it.

    User 2: It''s amazing. You should go sometime.

    User 1: I will! It''s definitely on my list.

