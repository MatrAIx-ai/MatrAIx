    User 1: Oh, really? That''s interesting.

    User 2: Yeah, it''s a lot of work, but it''s also really rewarding.

    User 1: I can imagine.

    User 2: It''s a lot of fun to help people.

    User 1: That''s great.

    User 2: It is.

    User 1: So, what''s your favorite thing about being a lawyer?

    User 2: I love helping people.

    User 1: That''s great.

    User 2: It is.

    User 1: So, what''s your least favorite thing about being a lawyer?

    User 2: I don''t like the long hours.

    User 1: I can imagine.

    User 2: It''s a lot of work.

    User 1: But it''s worth it, right?

