  career_goals: Joshua aims to transition into a senior shift‑lead or training‑coordinator role that allows him to pass on his practical knowledge to younger workers before fully retiring. He plans to earn
    an OSHA 30‑hour certification and a Green Belt in Six Sigma within the next year, positioning himself for a part‑time consulting role focused on process optimization for local manufacturers. Additionally,
    he hopes to launch a modest side business building custom wooden furniture, leveraging his production‑line experience to manage workflow efficiently and maintain a steady supplemental income.
