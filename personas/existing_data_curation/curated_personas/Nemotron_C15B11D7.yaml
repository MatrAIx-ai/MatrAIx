  career_goals: Although retired from formal employment, Evelyn remains focused on personal fulfillment and community contribution. She aims to complete a memoir that preserves her family's and Rayville's
    stories, and to continue volunteering as a volunteer historian for the local historical society. Maintaining her health and independence is a top priority, so she plans to engage in regular walking
    and wellness check-ups. She also hopes to mentor younger volunteers in the church and to ensure her garden remains a source of nourishment and beauty for her and her neighbors.
