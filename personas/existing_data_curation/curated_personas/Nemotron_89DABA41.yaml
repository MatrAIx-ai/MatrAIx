  hobbies: '[''Sketching and drawing'', ''Painting with acrylics'', ''Visiting art museums and galleries'', ''Participating in school drama club'', ''Listening to hip hop and R&B music'', ''Writing short
    stories and poetry'', ''Reading graphic novels'', ''Playing Minecraft (creative mode)'', ''Journaling'', ''Practicing yoga and mindfulness'']'
  career_goals: Shawtae dreams of attending a specialized arts high school where she can develop a strong portfolio in visual storytelling. She aspires to become a multimedia creator—combining film, illustration,
    and writing—to amplify diverse voices and raise awareness about teen mental‑health challenges. In the long term, she hopes to produce documentary series and community art projects that celebrate Black
    culture in Houston while providing safe spaces for young people to express themselves. She also envisions mentoring future artists and leading youth workshops that blend creativity with emotional well‑being.
