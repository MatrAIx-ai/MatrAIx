personas:
  professional: Shawtae Hunt is a budding visual storyteller who merges hand‑drawn sketches with digital art, channeling curiosity and sociable flair into leading collaborative projects in the school drama
    club and art class while balancing organized planning with spontaneous creativity.
  sports: Shawtae Hunt plays on the middle school basketball team, roots for the Houston Rockets, spends summer afternoons swimming at the community pool, and joins a local youth soccer league with the
    Tigers, using physical activity to channel nervous energy and build confidence.
  arts: Shawtae Hunt immerses themselves in the arts by sketching characters inspired by downtown murals, studying Basquiat at the Museum of Fine Arts, listening to Kendrick Lamar and Miles Davis while
    painting, and writing graphic‑novel scripts that weave hip‑hop rhythms and jazz improvisations into visual narratives.
  travel: Shawtae Hunt prefers weekend road trips to Austin for live music festivals and to New Orleans for jazz and Creole street food, while dreaming of a backpacking adventure across Caribbean islands
    once high school graduation allows for more independence and budget.
  culinary: Shawtae Hunt enjoys Sunday cooking sessions making collard greens and cornbread with grandma, perfecting a creamy homemade mac and cheese for school lunches, and crafting post‑yoga smoothies
    with mango, spinach, and almond milk for a nutritious boost.
  core: Shawtae Hunt blends artistic ambition with high‑energy social charm, navigating teenage anxiety through creative outlets and disciplined savings while never missing a chance to shine on stage.
background:
  cultural: Shawtae is an African‑American teenager raised in Houston's vibrant Black community. Her family traditions blend Southern hospitality, church‑based gospel music, and the rich legacy of Juneteenth
    celebrations. Growing up amidst Houston's multicultural environment, she absorbs influences from blues, hip‑hop, and Afro‑Latin rhythms while staying connected to the city's strong emphasis on community
    resilience. This cultural tapestry nurtures her appreciation for Black art, storytelling, and social advocacy, shaping both her personal identity and creative aspirations.
