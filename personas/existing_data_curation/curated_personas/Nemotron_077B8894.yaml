  career_goals: Justin plans to finish his associate's degree in Business Administration within the next year, then secure a full‑time entry‑level administrative or logistics coordinator position with a
    local manufacturing or distribution company in Logansport. He aims to develop expertise in supply‑chain operations, earn a Certified Administrative Professional credential, and eventually advance to
    an Operations Manager role where he can apply his systematic approach to improve efficiency. In the longer term, he is open to pursuing a bachelor's degree while maintaining a stable, predictable career
    trajectory.
