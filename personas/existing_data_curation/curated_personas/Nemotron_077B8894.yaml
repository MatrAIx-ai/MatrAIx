personas:
  professional: Justin Pooler, a 19‑year‑old business administration student, leverages their advanced Excel wizardry, meticulous project‑planning habits in Trello, and quiet reliability to excel in volunteer
    logistics at the local food bank, shaping their ambition to become an operations manager in a nearby manufacturing firm.
  sports: Justin Pooler sticks to a predictable fitness routine that includes early‑morning fishing trips with the Logansport Anglers Association and twice‑weekly treadmill runs while cheering on the Indianapolis
    Colts and following the Indiana Pacers, preferring low‑impact activities that fit their structured schedule.
  arts: Justin Pooler spends their evenings strumming acoustic guitar to the chord progressions of John Mayer and the fingerpicking style of Andrés Segovia, while also appreciating the strategic design
    of Klaus Teuber’s Settlers of Catan and attending occasional performances by local folk singer‑songwriters at the Logansport Community Center.
  travel: Justin Pooler prefers meticulously planned road trips, having mapped out weekend getaways to the Indiana Dunes and a summer visit to Boston’s Freedom Trail, while dreaming of a future organized
    itinerary through the historic castles of Scotland, all within a modest student‑budget and limited vacation days.
  culinary: Justin Pooler favors straightforward, wholesome meals such as grilled trout seasoned with lemon and dill, roasted potatoes tossed in rosemary, and a side of quinoa salad, and their beginner‑level
    cooking skill is honed through a weekly meal‑prep schedule tracked in Excel, while they occasionally treat themselves to a classic cheeseburger at the downtown Logansport Diner.
  core: Justin Pooler’s life revolves around a meticulously organized routine that blends spreadsheet‑driven budgeting, early‑morning fishing, and disciplined acoustic‑guitar practice, though they sometimes
    get stuck in over‑planning and can’t resist a late‑night crossword puzzle binge.
background:
  cultural: Justin grew up in Logansport, a small Midwestern town in Cass County, Indiana. His family reflects the region’s traditional middle‑class, white, Protestant roots. Community values such as self‑reliance,
    modesty, punctuality, and a strong work ethic are central to his upbringing. He was raised with a respect for local customs—high school football Saturdays, county fairs, and church gatherings—while
    also being encouraged to help neighbors and volunteer locally. The agricultural and manufacturing heritage of the area shaped his practical mindset, and the close‑knit nature of small‑town life fostered
    his cooperative, considerate personality.
