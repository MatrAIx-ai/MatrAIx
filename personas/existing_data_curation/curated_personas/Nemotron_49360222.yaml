  career_goals: Rebekah aims to advance to a senior engineering technologist role where she can lead cross‑functional R&D teams and drive innovative, sustainable product developments. She plans to earn
    her Professional Engineer (PE) licensure and pursue advanced certifications in lean Six Sigma. Over the next decade, she hopes to mentor emerging women engineers, spearhead initiatives that reduce environmental
    impact in manufacturing, and eventually transition into an engineering management position that blends technical expertise with strategic leadership.
