persona_description: A scientist or researcher specializing in environmental health sciences, particularly focusing on the study of air toxics emissions, exposures, cancer risks, and control measures. This
  individual is likely to have expertise in using modeling and exposure assessment methods to estimate population risk and to develop strategies for mitigating urban air toxics problems. They may have experience
  with the Human Exposure Model (HEM) and be familiar with EPA's National Air Toxics Strategy. They would be interested in understanding the multi-source, multi-pollutant nature of urban air toxics and
  the potential for control measures to mitigate the problem.
