  career_goals: Although still a toddler, Gemma’s parents notice her strong curiosity about colors, shapes, and stories, hinting at future aspirations to become a creative professional—perhaps a visual
    artist, illustrator, or early‑child educator who can share her love of art and culture with others. She often watches her mother paint and shows excitement when exposed to music and dance, suggesting
    a long‑term ambition to express herself through artistic mediums and to celebrate her Mexican heritage in her future work.
