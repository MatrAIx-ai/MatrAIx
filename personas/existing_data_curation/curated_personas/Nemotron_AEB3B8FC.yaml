  career_goals: Amanda aims to move from laborer to crew lead or foreman within the next few years, securing additional certifications such as NCCER and advanced OSHA courses. She aspires to develop supervisory
    skills that blend her structured safety mindset with her flexible, people‑focused approach, eventually overseeing larger residential remodeling projects. Long‑term, she hopes to launch a small, family‑run
    contracting business that offers predictable schedules for her family while allowing her to mentor younger workers and reduce the anxiety that comes from job uncertainty.
