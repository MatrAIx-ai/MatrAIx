personas:
  professional: Amanda Ryser, a 45‑year‑old seasoned construction laborer with OSHA and first aid certifications, blends a detail‑oriented safety mindset with a people‑focused, adaptable leadership style,
    using their carpentry, heavy‑equipment operation, and blueprint reading skills to mentor crews and pave their path toward a foreman role.
  sports: Amanda Ryser, 45, is a regular at the local high school football stadium cheering on the Blue Ridge Tigers, a devoted follower of the Virginia Tech Hokies, and a weekend hiker on Blue Ridge trails,
    while also joining a community line‑dancing group that keeps them moving and social.
  arts: Amanda Ryser, 45, indulges in romance novels by Nora Roberts and Nicholas Sparks, enjoys country classics from Dolly Parton and Garth Brooks during line‑dancing evenings, and hosts board‑game nights
    featuring Settlers of Catan and Ticket to Ride, often quoting lines from beloved films starring Julia Roberts.
  travel: Amanda Ryser, 45, prefers short road‑trip getaways, having explored Asheville’s art scene and Charleston’s historic district, while dreaming of a spring visit to the Great Smoky Mountains and
    a summer vacation in Tuscany, balancing planned itineraries with spontaneous detours.
  culinary: Amanda Ryser, 45, loves cooking Southern comfort dishes like fried chicken, collard greens, creamy mac & cheese, and peach cobbler, often incorporating fresh tomatoes, okra, and sweet potatoes
    from their own garden, and they enjoy sharing these meals at casual potlucks with friends and family.
  core: Amanda Ryser, 45, blends a structured safety‑first work ethic with a flexible, sociable lifestyle, juggling construction crews, garden plots, and romance‑novel marathons while battling chronic back
    pain and anxiety that they meet with yoga, therapy, and occasional impulsive spending.
background:
  cultural: Amanda is a white Southern woman raised in the Upstate region of South Carolina. Her cultural identity is shaped by traditional Southern values—family, church, hospitality—and a pragmatic, hardworking
    ethos common among the local construction community. She speaks with a mild Southern accent, enjoys regional foods like grits, barbecue, and collard greens, and actively participates in community festivals
    such as Greenville's Fall Festival. Her upbringing instilled a strong sense of community involvement, respect for local customs, and an adaptive mindset that balances the predictability of her roots
    with the dynamic demands of her occupation.
