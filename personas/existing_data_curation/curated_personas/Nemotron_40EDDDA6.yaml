  career_goals: Even at 79, Linda aims to leave a lasting legacy of compassionate corrections. She hopes to formalize a mentorship program within the county jail that pairs seasoned officers with new recruits,
    fostering a culture of respect and continuous learning. Linda also aspires to champion inmate‑rehabilitation projects that incorporate art workshops and vocational training, believing that creative
    expression can reduce recidivism. Locally, she would like to help establish a community‑center partnership that offers educational talks on the justice system, providing transparency and building trust
    between the facility and Durant residents. Finally, she dreams of compiling her experiences into a memoir that highlights the evolution of correctional practice and the human stories behind it.
