personas:
  professional: Linda Mcleroy is a veteran correctional security specialist whose calm demeanor, relentless curiosity for art, and knack for mentoring blend to create a compassionate yet assertive leader
    who mediates crises, writes meticulous reports, and envisions art‑based rehabilitation programs for inmates.
  sports: Linda Mcleroy prefers gentle movement, joining the Durant Senior Walking Club for weekly strolls, cheering on the Oklahoma City Thunder during basketball season, and occasionally playing in community
    softball games with the local senior league, seeing these light‑hearted activities as social exercise rather than intense competition.
  arts: Linda Mcleroy is an avid patron of regional galleries, often absorbing the whimsical folk paintings of Howard Finster and the refined Pueblo pottery of Maria Martinez, while also drawing inspiration
    from the folk songs of Woody Guthrie, which enrich her storytelling sessions at the senior center.
  travel: Linda Mcleroy enjoys leisurely road trips that combine art and nature, having already driven to Santa Fe’s Museum of International Folk Art and the Wichita Mountains Wildlife Refuge, and she dreams
    of a gentle Mississippi River cruise, though she now limits long journeys to weekend getaways due to health considerations and family responsibilities.
  culinary: Linda Mcleroy delights in simple, home‑cooked meals, often tossing fresh tomatoes, basil, and mozzarella into a rustic caprese salad, baking buttery cornbread with a dash of honey, and sipping
    self‑grown chamomile tea, though she admits a habit of over‑salting her vegetable stews when they’ve been simmering too long.
  core: Linda Mcleroy’s blend of seasoned correctional wisdom, boundless curiosity for folk art, and a delightfully disorganized yet warm‑hearted approach to life makes every garden tea and inmate mentorship
    a small act of creative compassion.
background:
  cultural: Linda comes from a White, working‑class Oklahoma family rooted in the Mid‑South values of hospitality, community service, and self‑reliance. Raised in a small town near Durant, she grew up with
    a blend of Southern pragmatism and Midwestern openness. Her family has long been active in a local Protestant church, shaping her sense of fellowship and charity. While her heritage is predominantly
    Anglo‑American, Linda’s lifelong residence in Bryan County has exposed her to the rich cultural tapestry of the Choctaw Nation, fostering an appreciation for Native American crafts and traditions that
    she often encounters at regional fairs and museums. This multicultural environment, combined with her career in corrections, has reinforced a worldview that balances respect for order with empathy for
    diverse life experiences.
