persona_description: A conservation biologist who is actively involved in the study of grizzly bear genetics, particularly in the Greater Yellowstone Ecosystem. This individual is knowledgeable about the
  use of DNA sampling to track bear populations and the importance of maintaining genetic diversity between populations. They are interested in understanding the genetic isolation between the Greater Yellowstone
  Ecosystem and the Glacier-Bob Marshall population, and the potential for adding bears from the north to the Yellowstone gene pool to boost genetic diversity.
