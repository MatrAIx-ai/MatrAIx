personas:
  professional: Jarena Norwood thrives as a nonprofit program coordinator, leveraging their razor‑sharp project‑management skills, obsessive calendar discipline, and empathetic conflict‑resolution style
    to design community workshops that run on schedule while quietly battling the inner pressure to perfect every detail.
  sports: Jarena Norwood blends low‑impact fitness with fandom, practicing Vinyasa yoga three times a week, walking their dog along the Strip’s greenspaces, cheering the Las Vegas Golden Knights during
    the NHL season, and participating in a local charity 5K organized by the community center.
  arts: Jarena Norwood fuels their creative side by attending live shows at the Smith Center featuring jazz virtuoso Kamasi Washington, watching experimental theater productions at the Nevada Ballet Theatre,
    and immersing themselves in contemporary fiction by authors like Chimamanda Ngozi Adichie and personal‑development titles by Brené Brown.
  travel: Jarena Norwood plans travel like a project rollout, mapping detailed itineraries for weekend escapes to Sedona’s red rocks, dog‑friendly hikes in Asheville’s Blue Ridge Mountains, and a month‑long
    yoga retreat in Bali, always budgeting for flights in a separate travel envelope and reserving the last night for spontaneous discovery.
  culinary: Jarena Norwood’s kitchen experiments often feature soulful twists such as smoked paprika collard greens with quinoa, herb‑crusted salmon tossed with fresh rosemary and lemon zest, or a creamy
    butternut squash risotto seasoned with sage, all sourced from their small herb garden and shared at weekly potluck gatherings with friends.
  core: Jarena Norwood balances a meticulously organized professional drive with a soulful love of cooking and community, while a persistent worry habit and occasional self‑care lapses keep them constantly
    striving for equilibrium.
background:
  cultural: Jarena identifies as African‑American and was raised in a close‑knit Black community in Las Vegas, where church gatherings, family potlucks, and local cultural festivals shaped her sense of
    belonging. Her family's roots trace back to the Southern United States, bringing traditions of soul food, gospel music, and storytelling into her everyday life. She actively participates in community
    events such as Juneteenth celebrations and volunteers at the Black Cultural Center, fostering connections across generations. While navigating life in a diverse metropolitan setting, Jarena balances
    pride in her heritage with an openness to the multicultural influences of Las Vegas, integrating elements from Latino and Native American cultures she encounters locally.
