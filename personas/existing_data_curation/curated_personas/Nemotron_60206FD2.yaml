  hobbies: '[''Yoga and meditation'', ''Journaling'', ''Cooking and experimenting with recipes'', ''Reading (fiction, African‑American literature, personal development)'', ''Volunteering at community centers'',
    ''Attending live music and cultural festivals'', ''Puzzle games (crosswords, Sudoku)'', ''Gardening (herbs and small plants)'', ''Walking the dog'', ''DIY home organization projects'']'
  career_goals: Jarena aims to secure a full‑time role as a community program coordinator or administrative manager within a nonprofit or social‑services organization, where she can apply her organizational
    talents and commitment to serving others. She plans to complete her bachelor's degree in Business Administration or earn a Certified Administrative Professional (CAP) certification within the next two
    years. Long‑term, she envisions launching her own home‑organizing consultancy that helps individuals create stress‑free living spaces. She also hopes to become a certified peer‑support specialist to
    assist community members dealing with mental‑health challenges, combining her disciplined work ethic with her empathetic nature.
