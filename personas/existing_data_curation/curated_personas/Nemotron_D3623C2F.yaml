personas:
  professional: Amberlie Branch, a 19-year-old aspiring administrative professional, channels their love of routine, razor-sharp budgeting, and magnetic stage presence into a receptionist role at a Midland
    oil-service company while meticulously laying the groundwork for a future boutique event-planning firm that will serve corporate functions and community festivals, and they fiercely stick to clear processes
    to prove their competence.
  sports: Amberlie Branch fuels their competitive edge through competitive cheerleading with the Midland Spirit Squad and weekly country line-dancing at the local community center, supports the Dallas Cowboys
    and the Houston Astros, and they follow a disciplined fitness routine that blends cardio drills, flexibility stretches, and regular check-ins with their personal trainer.
  arts: Amberlie Branch lights up karaoke nights belting out Garth Brooks and Carrie Underwood, curates community potluck playlists featuring classic country duets, reads self-help titles like *Atomic Habits*
    for personal growth, and they occasionally volunteer at the Midland Arts Council to help stage local theater productions.
  travel: Amberlie Branch prefers meticulously planned road trips that combine BBQ festivals like the Austin Texas BBQ Fest with visits to historical sites in Santa Fe, balances a modest travel budget by
    booking early-bird deals, and they dream of a weekend getaway to New Orleans to explore its music scene without jeopardizing their GED coursework.
  culinary: Amberlie Branch excels at smoking brisket with hickory chips, mastering the perfect Texas-style rub of paprika, brown sugar, and cumin, while they serve mac-and-cheese casseroles at neighborhood
    potlucks and rate local joints such as Frank's Barbecue on their food-blog with detailed notes on bark texture and smoke flavor.
  core: Amberlie Branch is a highly organized, socially magnetic 19-year-old who balances a love for routine-driven office work, competitive cheerleading, and Southern BBQ cooking while they secretly hoard
    karaoke mic batteries for late-night performances.
background:
  cultural: Amberlie comes from a white Texan background in Midland, a community shaped by the oil industry, country music, and strong Christian values. Her family emphasizes traditional, practical outlooks,
    patriotism, and regular community involvement through church and local events. She grew up attending county fairs, rodeos, and church gatherings, developing a deep appreciation for Texas hospitality,
    BBQ culture, and the routine of small‑town life.
attributes:
  skills: '[''Event coordination'', ''Scheduling and time management'', ''Budgeting and personal finance'', ''Public speaking and hosting'', ''Customer service'', ''Volunteer team leadership'', ''Basic
