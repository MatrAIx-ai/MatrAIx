  hobbies: '[''Karaoke singing'', ''Country line dancing'', ''Cooking Texas BBQ and comfort foods'', ''Organizing neighborhood potlucks'', ''Volunteering at the local food bank'', ''DIY home‑decor projects'',
    ''Reading self‑help and organization books'', ''Competitive cheerleading'']'
  career_goals: In the short term, Amberlie intends to earn her GED and obtain a certification as an administrative assistant. She aims to secure a full‑time office or reception role with a local oil‑service
    company, where routine procedures and clear standards match her preference for structure. Over the next five years, she plans to leverage her organizational talent and sociable nature to launch a boutique
    event‑planning business that serves corporate functions and community festivals in Midland, maintaining high standards of professionalism while creating predictable, repeatable processes.
