  career_goals: Carolyn aims to move from an individual contributor role to a technical lead or software architect within the next five years, leveraging her competitive drive to steer high‑impact projects
    that balance innovative technology with reliable delivery. She wants to champion new frameworks and cloud practices while maintaining pragmatic standards, and eventually launch a SaaS product that serves
    small Southern‑based businesses. In parallel, she plans to formalize a mentorship program for junior developers, using her critical eye to raise code quality across her team.
