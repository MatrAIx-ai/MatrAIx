  career_goals: Eugene dreams of a future where he can blend art and technology. He hopes to study visual arts and computer science, eventually designing interactive games or animated films that let him
    explore new worlds. He also imagines traveling to see diverse art styles and natural wonders, believing that flexibility and creativity will guide his career path rather than rigid structures.
