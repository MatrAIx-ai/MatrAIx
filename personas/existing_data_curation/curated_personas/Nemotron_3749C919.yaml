personas:
  professional: Eugene Nelson, an aspiring comic illustrator and Minecraft architect in training, channels boundless curiosity and spontaneous creativity into sketching vibrant panels and designing elaborate
    virtual structures, often sacrificing tidy deadlines for the thrill of raw imagination.
  sports: Eugene Nelson, a lively member of the neighborhood under‑12 soccer league, idolizes the local professional team the Portland Timbers, spends Saturday mornings dribbling with friends at the park,
    and eagerly follows the World Cup, while also dabbling in seasonal skateboarding during summer break.
  arts: Eugene Nelson, a devoted comic fan who emulates the storytelling of Stan Lee and the whimsical animation of Hayao Miyazaki, attends weekend art workshops to experiment with watercolors and digital
    drawing tablets, and fuels their creativity with an eclectic playlist ranging from The Beatles and Led Zeppelin to Taylor Swift and Billie Eilish.
  travel: Eugene Nelson, who loves spontaneous day trips to nearby state parks for rock‑collecting and has already visited the Grand Canyon with family, dreams of exploring the historic castles of Scotland
    and the neon streets of Tokyo, balancing school schedules with occasional weekend family road trips.
  culinary: Eugene Nelson, a self‑described beginner cook, delights in making cheesy pizza with fresh mozzarella, whipping up quick spaghetti carbonara with pancetta, and blending fruit smoothies featuring
    banana and strawberry, while savoring the crunchy texture of granola bars as a snack.
  core: Eugene Nelson is a curiosity‑driven 11‑year‑old who blends comic art, Minecraft building, and soccer, thriving on spontaneous creativity but often letting organization slip, with a kind heart and
    a penchant for collecting rocks.
background:
  cultural: Eugene comes from a white, multi‑generational family with roots in German and Irish ancestry. Growing up in Tampa, Florida, he experiences a blend of Southern traditions—like backyard barbecues
    and Fourth of July fireworks—and the vibrant multicultural atmosphere of the city, which includes exposure to Hispanic cuisine and festivals. His family values community involvement, education, and
    creative expression, encouraging him to explore diverse interests while staying grounded in local customs.
