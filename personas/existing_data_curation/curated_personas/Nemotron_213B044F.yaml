  career_goals: Pablo dreams of becoming an engineer or scientist who designs helpful inventions, inspired by his love of building things and discovering how they work. He also expresses a heartfelt desire
    to care for animals, imagining a future as a veterinarian, which aligns with his kind and cooperative personality. While his ambitions are big, he worries about getting things right, so he tells himself
    he will study hard and practice patience to turn his ideas into reality. Over time, he hopes his work will make his family and community proud and improve everyday life for others.
