personas:
  professional: Pablo Concepcion is a junior creative tinkerer, combining a love for building intricate LEGO creations with nascent coding skills learned from educational tablet games, and their meticulous,
    curiosity‑driven approach makes them constantly experiment with new designs even if frustration arises when pieces won’t cooperate.
  sports: Pablo Concepcion joins a neighborhood youth soccer circle that practices on Saturday mornings with the local community club, enjoys the small‑group drills over large matches, and cheers for the
    city’s professional soccer team, the Tigers, while preferring low‑key, friendly competition.
  arts: Pablo Concepcion spends afternoons sketching superhero comic panels inspired by classic artists like Jack Kirby, listens to lively folk melodies performed by the family’s favorite folk singer Elena
    Rivera while drawing, and immerses themselves in LEGO sculpting, often recreating scenes from favorite storybooks.
  travel: Pablo Concepcion loves family nature hikes in the nearby state park, collecting rocks and observing insects, dreams of exploring the towering Redwood forests of California, and plans to visit
    the interactive dinosaur exhibit at the regional museum during school break.
  culinary: Pablo Concepcion enjoys helping in the kitchen to assemble simple tacos with seasoned ground meat, fresh cilantro, diced tomatoes, and a squeeze of lime, proudly makes guacamole with avocado
    and cilantro, and prefers to snack on crunchy trail mix during LEGO building marathons.
  core: Pablo Concepcion is a curious, solitary builder who balances imagination with occasional frustration, saves allowance earnestly yet forgets small expenses, battles mild allergies and worries, and
    finds calm in folk music, tacos, and quiet creative play.
background:
  cultural: Pablo is a Mexican‑American raised in Escondido, California, within a bilingual household that celebrates both Mexican and American traditions. At home, Spanish is spoken, and family customs
    such as Dia de los Muertos altars, Cinco de Mayo celebrations, and preparing traditional foods like tacos and tamales are integral to his upbringing. He attends a local elementary school where he interacts
    with a diverse peer group, enriching his cultural perspective. The vibrant Latino community in San Diego County offers Pablo exposure to Mexican music, dance, and community events, which he enjoys during
    family gatherings. These cultural influences shape his identity, language skills, and the values of family cohesion, respect for elders, and a strong sense of community.
