persona_description: A historian who specializes in the study of European migration, particularly the longue durée process of people moving from "elsewhere" to participate in European life. Their research
  interests include the forces that have put people into motion since the premodern period, the visual arts, literature, and multilingual social worlds fostered by migration, and the institutionalized racism
  that structures current anti-immigration policies in France and the UK. They have written extensively on the topic and have contributed significantly to the cultural history of European migration.
