  career_goals: Jeremiah aims to progress to a senior executive role, such as Vice President of Operations or Chief Innovation Officer, where he can shape company culture to value creativity and interdisciplinary
    thinking. He envisions leading large‑scale transformation projects that integrate technology and artistic perspectives, and eventually launching his own consulting firm focused on helping mid‑size firms
    adopt innovative, people‑centric strategies.
