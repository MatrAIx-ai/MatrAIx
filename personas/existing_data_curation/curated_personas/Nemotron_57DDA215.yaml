  hobbies: '[''hiking'', ''cooking Mexican cuisine'', ''soccer'', ''tech meetups'', ''reading science‑fiction'', ''landscape photography'', ''STEM mentorship'']'
  career_goals: Carlos aims to scale his company from a high‑growth startup to a market‑leading technology firm with a presence across North America and Latin America. He envisions launching a next‑generation
    AI‑driven product suite, securing series C funding, and guiding the company toward an IPO within the next five years. Beyond financial milestones, he is committed to building an inclusive workplace
    that nurtures talent from under‑represented backgrounds, establishing a mentorship pipeline for Mexican‑American entrepreneurs, and using technology to address social challenges such as education equity
    and sustainable urban development.
