personas:
  professional: Maria Harris, a 30‑year‑old mechanical assembler and fabricator who blends meticulous shop‑floor expertise with a painter’s eye for detail, leverages their strong grasp of welding, CNC basics,
    and quality inspection to propose unconventional workflow improvements while eyeing a shift supervisor role within three years.
  sports: Maria Harris enjoys weekend fishing trips on Lake Okeechobee with their husband, follows the Miami Heat for basketball, the Tampa Bay Buccaneers for football, and participates in a community cycling
    club that meets every Saturday dawn.
  arts: Maria Harris spends evenings painting tranquil Florida landscapes inspired by Monet and capturing sunrise vistas with a camera style reminiscent of Ansel Adams, while regularly browsing local art
    fairs for folk musician Sufjan Stevens vinyls and volunteering at a community art program that teaches children mixed‑media techniques.
  travel: Maria Harris prefers road‑trip adventures that blend nature and culture, having explored the Everglades, taken a weekend getaway to Asheville’s art scene, and dreaming of a photography expedition
    to Costa Rica’s rainforests, all while budgeting travel costs through a dedicated savings envelope.
  culinary: Maria Harris enjoys cooking grilled lake fish seasoned with fresh herbs like basil and lemon zest, experiments with stone‑crab bisque during seasonal catches, and often prepares vibrant beet
    and quinoa salads that echo the colors of their garden harvests.
  core: Maria Harris is a competitively curious fabricator who fuses mechanical precision with artistic flair, balancing disciplined work habits with a habit of splurging on creative tools and occasional
    procrastination on paperwork.
background:
  cultural: Maria is a White American with family roots in the rural South and Midwest. Raised in central Florida, she grew up in a close‑knit household that prized hard work, community involvement, and
    an appreciation for the outdoors. The agricultural and fishing heritage of Okeechobee, combined with the vibrant local art scene, has shaped her blend of practical craftsmanship and artistic curiosity.
attributes:
  skills: '[''Mechanical Assembly'', ''Blueprint Reading'', ''Welding (MIG/TIG)'', ''CNC Machine Operation'', ''Quality Inspection'', ''Troubleshooting Mechanical Systems'', ''Process Improvement'', ''Safety
    Compliance'', ''Team Coordination'', ''Basic CAD Modeling'']'
  hobbies: '[''Landscape Painting'', ''Nature Photography'', ''Local Art Fairs'', ''DIY Home Renovation'', ''Gardening'', ''Fishing'', ''Makerspace Activities (3D Printing, Metal Art)'', ''Reading Science
    Fiction'', ''Volunteering at Community Art Programs'']'
  career_goals: Maria aims to advance to a shift supervisor role within the next three years, obtain certifications in advanced CNC programming and welding, and lead continuous‑improvement projects that
    boost efficiency on the shop floor. Long‑term, she hopes to launch a boutique custom‑fabrication business that blends functional metalwork with artistic design, allowing her to merge her technical expertise
    with her love for art.
