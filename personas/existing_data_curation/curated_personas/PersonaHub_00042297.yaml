persona_description: This text is likely to be of interest to researchers and students in the fields of anthropology, sociology, politics, cultural studies, and food studies. The book explores the complex
  and multifaceted nature of the concept of "traditional" food, and the ways in which it is both politically laden and deeply ingrained in cultural, social, and ideological contexts. The book's focus on
  the processes of valorization, instrumentalization, and reinvention at stake in the construction and representation of traditional foods, as well as the broader issues of definition, regulation, nationalism,
  identity, and health and nutrition, makes it an attractive resource for those interested in exploring these topics in depth.
