personas:
  professional: Samantha Loaiza, a high‑school student who balances competitive soccer with a budding career as a teen mental‑wellness TikTok creator, leverages debate‑club argumentation, digital illustration,
    and practical curiosity to craft engaging content while often overlooking deadlines.
  sports: Samantha Loaiza, a midfielder for the Westside High Wildcats soccer team, thrives on the competitive intensity of the fall season, champions the Los Angeles FC in the MLS, and spends free time
    honing footwork through hip‑hop and traditional folk dance classes, treating fitness as a social ritual rather than a solitary regimen.
  arts: Samantha Loaiza, who blends hip‑hop choreography with traditional folk dance, follows digital illustrators like Loish and Studio Ghibli's artists, draws inspiration from sci‑fi authors such as N.K.
    Jemisin, and frequently cites musicians like Bad Bunny and Beyoncé as the soundtrack for their TikTok sketches.
  travel: Samantha Loaiza, who prefers spur‑of‑the‑moment road trips with friends to nearby coastal towns like Santa Barbara and long‑planned family visits to historic sites such as Oaxaca’s Monte Albán,
    dreams of backpacking through Tokyo’s Shibuya district to capture urban energy for future content.
  culinary: Samantha Loaiza, an enthusiastic home cook, expertly prepares tacos al pastor with pineapple and chipotle, crafts fresh guacamole using ripe Hass avocados and lime, and experiments with mole
    poblano, treating each family kitchen session as both a culinary lesson and a way to honor tradition while documenting the process for social media.
  core: Samantha Loaiza, a competitive teen athlete and TikTok creator, channels restless curiosity into soccer, dance, and digital art, yet often wrestles with anxiety, disorganization, and a skeptical
    edge toward others.
background:
  cultural: Samantha is a first‑generation Mexican‑American raised in Villa Park, Illinois. She grew up in a bilingual household where Spanish was spoken daily, and she celebrates Mexican traditions such
    as Día de los Muertos and quinceañera preparations alongside typical American holidays. Family gatherings often revolve around cooking meals like tamales and enchiladas, and she has absorbed the rhythms
    of regional Mexican music while also enjoying mainstream pop and hip‑hop. Living in the multicultural suburbs of Chicago, she blends her heritage with the diverse influences of her community, fostering
    a strong pride in her roots and a desire to serve as a bridge between cultures.
