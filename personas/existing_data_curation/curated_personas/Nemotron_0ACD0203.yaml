  career_goals: Samantha aims to graduate high school with a strong academic record and earn a scholarship that will let her pursue a degree in communications or public health. She wants to combine her
    bilingual skills and her passion for digital media to become a mental‑health advocate for Mexican‑American teens, creating an online platform that offers resources and community support. In the long
    term, she envisions a role as a community outreach coordinator or digital marketing specialist for a nonprofit organization, where she can use her competitive drive to achieve measurable impact while
    maintaining the flexibility she values.
