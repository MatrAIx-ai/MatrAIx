persona_description: A data visualization enthusiast who values clarity and ease of understanding over visual aesthetics. They are particularly interested in how circles can be used to represent data and
  have a deep understanding of the cognitive limitations of the human brain when it comes to distinguishing between size and area differences. They are also interested in how circles can be used to represent
  data in a way that is easy to consume and understand, and have a particular interest in how filters and drill-down functionality can be used to further explore data. They are likely to be a data analyst
  or a data scientist who works with large datasets and is interested in how to present the data in a way that is easy to understand and communicate.
