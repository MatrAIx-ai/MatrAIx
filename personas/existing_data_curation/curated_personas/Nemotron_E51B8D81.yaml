  hobbies: '[''Gardening (native Idaho plants & sustainable techniques)'', ''Quilting (including contest participation)'', ''Reading (historical nonfiction, travel memoirs)'', ''Birdwatching'', ''Hiking
    local trails'', ''Bridge (card game) club'', ''Volunteer digital‑literacy tutoring for seniors'', ''Community theater involvement'', ''Cooking and recipe experimentation'']'
  career_goals: Although retired from formal employment, Carolyn remains driven to leave a lasting imprint on her community. She aims to mentor emerging teachers through a local apprenticeship program,
    serve on the Madison County school advisory board, and expand the community garden she helped establish into a demonstration site for sustainable agriculture. She also plans to document the oral histories
    of longtime residents in a self‑published anthology, and to launch a small boutique venture selling hand‑crafted quilts and garden accessories. Her overarching ambition is to blend her love of learning
    with practical service, ensuring that her curiosity continues to inspire younger generations.
