  hobbies: '[''Watercolor painting'', ''Sketching'', ''Speculative fiction reading'', ''Book club participation'', ''Hiking'', ''Nature photography'', ''Gardening'', ''Knitting'', ''Piano playing'', ''Community
    theater set and costume design'']'
  career_goals: Approaching retirement, Sarah aims to transition from full‑time classroom teaching to a mentorship and program‑development role within her district. She plans to spearhead a county‑wide
    arts‑in‑education initiative that provides resources and workshops for teachers to incorporate visual and performing arts into standard curricula. Additionally, she wishes to write and illustrate a
    series of whimsical picture books that explore abstract ideas like time, imagination, and empathy for young readers. Sarah is also interested in pursuing a certificate in educational leadership to serve
    as a part‑time curriculum specialist, guiding schools in integrating experiential learning with community assets such as local nature trails and historical sites.
