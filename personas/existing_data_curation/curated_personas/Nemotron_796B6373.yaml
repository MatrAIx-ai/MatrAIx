personas:
  professional: Liloutie Gaddy, a spirited elementary school student, channels their love for rhythm and routine into leading group games and dance routines on the playground, displaying early leadership
    and a knack for organizing peers while often worrying about keeping everyone on schedule.
  sports: Liloutie Gaddy loves the after‑school soccer program with the St. Louis Youth Soccer Club (U‑8), cheers for St. Louis City SC’s forward and watches the St. Louis Cardinals on TV, and eagerly joins
    tag and hopscotch during recess to stay active, though they sometimes skip stretching before games.
  arts: Liloutie Gaddy delights in drawing bright animal cartoons while dancing to Beyoncé, Michael Jackson, and Bruno Mars, often mimicking choreography from Disney’s The Lion King and singing along to
    Motown classics, which fuels their creative confidence and love for performance.
  travel: Liloutie Gaddy enjoys family road trips to the nearby aquarium and state fair, plans short outings with a colorful map, dreams of visiting Disneyland in California and the Grand Canyon, but prefers
    structured, bite‑size adventures over long, unpredictable journeys.
  culinary: Liloutie Gaddy favours cheesy pepperoni pizza, creamy mac and cheese, and strawberry‑banana smoothies, can whisk up a simple peanut‑butter‑jelly sandwich unaided, yet gets distracted and spills
    milk if the kitchen gets messy.
  core: Liloutie Gaddy is a lively seven‑year‑old who blends a love for organized games and spontaneous dancing, worries about forgetting things, and always carries a bright pink piggy bank.
background:
  cultural: Liloutie is a Black child raised in Trenton, Michigan, within a close-knit family that celebrates African American cultural traditions. Her household often gathers for soulful meals, music,
    and storytelling rooted in community values. She participates in local church events, enjoys listening to Motown classics and contemporary R&B, and takes pride in neighborhood festivals that highlight
    Black heritage. The diverse environment of Wayne County enriches her exposure to multiple cultures, fostering an appreciation for inclusion and shared experiences.
