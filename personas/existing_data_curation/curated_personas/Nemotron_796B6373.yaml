  career_goals: Liloutie dreams of growing up to be a teacher who creates a supportive and orderly classroom where every child can thrive, a veterinarian who cares for animals with compassion, or an astronaut
    who explores space and brings back stories of discovery. She hopes to lead school projects and community activities, using her organizational strengths to help others while also finding a career that
    offers stability and a clear sense of purpose.
