  career_goals: Sabrina dreams of turning her love for art and storytelling into a career. In the short term, she aims to attend a high school with strong arts programs, build a portfolio of illustrations
    and written pieces, and secure a summer internship at a local gallery or design studio. Long-term, she envisions studying fine arts or graphic design in college, working as an illustrator or concept
    artist for books, games, or animation, and eventually leading creative projects that blend visual media with narrative. She also hopes to travel to museums and cultural sites to broaden her artistic
    perspective.
