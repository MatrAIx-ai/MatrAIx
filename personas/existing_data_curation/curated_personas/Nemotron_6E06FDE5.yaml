personas:
  professional: Sabrina Mackinnon is an aspiring visual storyteller who blends watercolor, digital painting, and narrative writing, channeling their curiosity into leading the school art club and participating
    in community theater workshops, using their relaxed approach to deadlines to experiment freely while sometimes assertively championing peers' ideas.
  sports: Sabrina Mackinnon enjoys weekend jogs through the nearby park, is a devoted fan of the Sydney Swans who they cheer from their living room, and occasionally joins pickup basketball games at the
    community centre with friends.
  arts: Sabrina Mackinnon finds inspiration in the surreal brushwork of Yayoi Kusama, the melodic melancholy of Phoebe Bridgers, and the imaginative worlds of Neil Gaiman, weaving these influences into
    watercolor scenes, digital concepts, and short prose that they share on their school’s online art showcase.
  travel: Sabrina Mackinnon spends their free time wandering the historic streets of Newtown, snapping photos of vintage façades, and dreams of exploring Kyoto’s tranquil temples and the misty cliffs of
    the Scottish Highlands, planning each trip more by mood than by strict itinerary.
  culinary: Sabrina Mackinnon loves the bright tang of lemon zest in their homemade pesto, experiments with avocado toast topped with feta and chili flakes for breakfast, and occasionally indulges in a
    fast‑food fries treat, yet their cooking skill remains at a confident beginner level, favoring simple dishes like spaghetti carbonara and fruit smoothies.
  core: Sabrina Mackinnon is a day‑dreaming art enthusiast who swaps a scattered schedule for bursts of creative brilliance, often found sketching under a tree while juggling a love of indie tunes, board
    games, and the occasional refusal to tidy their backpack.
background:
  cultural: Sabrina is a White American adolescent raised in Newtown, a suburban town in Bucks County, Pennsylvania. The area blends historic colonial-Quaker roots with a modern suburban lifestyle, offering
    easy access to Philadelphia's cultural institutions while maintaining a close-knit community feel. Her family participates in typical American celebrations such as Thanksgiving, Fourth of July fireworks,
    and local holiday parades, and they are also involved in community events like farmers' markets and town clean-up days. Growing up in this environment has given Sabrina exposure to both the quiet, nature-focused
    aspects of Bucks County (parks, historic farms) and the vibrant arts scene of nearby Philadelphia, shaping her appreciation for diverse creative experiences.
