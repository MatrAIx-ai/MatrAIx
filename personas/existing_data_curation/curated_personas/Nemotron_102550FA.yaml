personas:
  professional: An aspiring young architect, James Collins channels their curiosity and love for building LEGO cities into early sketches of skyscrapers, while their competitive streak pushes them to lead
    construction games with friends, even as they struggle to keep their playroom organized.
  sports: A spirited soccer enthusiast, James Collins plays for the local under‑7 Little Lions team, idolizes professional forward Lionel Messi, and also joins park games of tag and capture the flag, using
    the vigor of those sports to stay active while trying to follow the coach’s strategies.
  arts: An energetic fan of animated adventures, James Collins spends evenings dancing to upbeat hip‑hop tracks by Beyoncé and Drake, while devouring cartoons such as Adventure Time and crafting storyboards
    for their LEGO cities, blending rhythmic movement with visual storytelling.
  travel: A curious explorer, James Collins loves weekend trips to nearby Redwood State Park where they hunt for unique rocks and leaves, and dreams of visiting the Grand Canyon to collect iconic red sandstone,
    preferring spontaneous family road trips over rigid itineraries.
  culinary: A self‑proclaimed pancake addict, James Collins enjoys breakfast stacks drizzled with maple syrup, loves finger foods like chicken nuggets and cheese pizza, and always asks for extra carrot
    sticks when building LEGO snacks, while occasionally swapping vegetables for candy during playdates.
  core: James Collins combines a boundless competitive spirit with a love for messy LEGO city building, leading group games while often forgetting to tidy up, and balances curiosity about nature with a
    relaxed attitude toward rules.
background:
  cultural: James is an African‑American boy growing up in the suburban‑rural mix of Henrico and Goochland Counties, Virginia. His family celebrates Black cultural traditions through church gatherings,
    storytelling evenings, and cooking meals like collard greens and cornbread. He frequently participates in community events such as local family picnics, neighborhood block parties, and school cultural
    days where African‑American music, dance, and history are highlighted. This environment blends Southern hospitality with a strong emphasis on community resilience, family bonds, and pride in his heritage.
attributes:
  skills: '[''basic reading'', ''basic arithmetic'', ''LEGO building'', ''soccer dribbling'', ''team coordination'', ''friendship negotiation'', ''basic problem‑solving'', ''curiosity about science'']'
  hobbies: '[''soccer'', ''tag/capture the flag'', ''LEGO building'', ''park explorations'', ''rock and leaf collecting'', ''listening to hip‑hop/R&B music'', ''dancing'', ''watching adventure cartoons'']'
  career_goals: James dreams of becoming a “playground engineer” — someone who designs fun, safe play areas and builds cool forts or tiny robots for his friends. He is also fascinated by the idea of being
    a professional soccer player who can later coach kids in his neighborhood. In both visions, he sees himself using his curiosity for new ideas and his practical hands‑on skills to create things that
    bring people together while also competing at a high level.
