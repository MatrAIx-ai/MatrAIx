  hobbies: '[''reading fantasy novels'', ''birdwatching and nature walks'', ''drawing wildlife sketches'', ''building LEGO landscapes'', ''Scratch coding projects'', ''listening to gospel and R&B music'',
    ''tutoring younger cousins'']'
  career_goals: Inspired by her love for animals and the outdoors, Jekera dreams of becoming a wildlife rehabilitator or veterinarian, hoping to nurse injured birds and forest creatures back to health.
    She also imagines one day teaching younger children about nature and compassion, blending her desire to help others with her curiosity about the natural world. While still exploring options, her long‑term
    ambition is to combine science, caregiving, and education in a career that lets her protect and nurture living beings.
