personas:
  professional: Jekera Knight, a budding young environmental designer, channels their curiosity and practical mindset into building detailed LEGO landscapes and Scratch simulations of forest habitats, preferring
    solitary work under the backyard tree while eagerly sharing creations with cousins and classmates.
  sports: Jekera Knight, who enjoys quiet afternoons on forest trails, participates in the Hot Springs Youth Soccer Club's U10 team for weekly practices but prefers solo jogs with binoculars, and they proudly
    follow the Arkansas Razorbacks basketball and football teams, often drawing the team logos in their sketchbook.
  arts: Jekera Knight finds inspiration in the soulful chords of Kirk Franklin and the smooth vibes of H.E.R., while devouring the fantasy worlds of J.K. Rowling and Rick Riordan, and they translate those
    narratives into intricate LEGO terrain, detailed bird sketches, and vibrant pages of their sketchbook.
  travel: Jekera Knight prefers low-key family road trips that let them wander off the beaten path, having already explored Hot Springs National Park and Crater of Diamonds State Park with cousins, and
    they dream of a future adventure hiking the misty trails of the Great Smoky Mountains where rare birds await.
  culinary: Jekera Knight enjoys the comfort of cheesy mac and cheese and the bright burst of fresh blueberries, often helping their mom bake banana-cinnamon muffins and assemble grilled cheese sandwiches
    with a sprinkle of pepper jack, while they're also thrilled to snack on homemade sweet-potato fries after a day of birdwatching.
  core: Jekera Knight is a solitary, nature-driven dreamer who blends curiosity with practicality, building imaginative worlds under a backyard tree while quietly caring for others.
background:
  cultural: Jekera is part of an African‑American family with deep roots in southeastern Oklahoma. Her grandparents grew up in historic Black settlements that formed tight‑knit communities centered around
    the local church, where gospel singing and storytelling are cherished traditions. Family gatherings feature soul‑food dishes such as collard greens, cornbread, and fried catfish, and they celebrate
    holidays like Juneteenth and Martin Luther King Jr. Day with community picnics and music. Living in the small town of Broken Bow, she is also exposed to the cultures of nearby Native American tribes,
    learning respect for the land and its wildlife. These cultural influences teach her the values of perseverance, communal support, and reverence for nature, shaping her compassionate personality.
attributes:
  skills: '[''basic reading comprehension'', ''elementary arithmetic'', ''tablet navigation for educational apps'', ''DIY project building'', ''animal care'', ''peer mediation'', ''drawing and sketching'',
