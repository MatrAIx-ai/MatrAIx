personas:
  professional: David Delong, an 18‑year‑old construction laborer in Philadelphia, blends hands‑on carpentry, scaffold erection, and blueprint interpretation with a meticulous, reliable work ethic, using
    his construction‑management coursework to coordinate small crews, troubleshoot site problems, and chart a path toward a foreman position and a future sustainable contracting business.
  sports: David Delong is a weekend pickup basketball player at local parks, a devoted fan of the Philadelphia Eagles, Flyers, and 76ers, and a member of a community recreational league that meets at the
    city’s recreation center, where they track game stats and proudly sport team colors during workouts.
  arts: David Delong unwinds to classic rock legends like Led Zeppelin and The Rolling Stones and indie acts such as Arctic Monkeys and Tame Impala, often streaming live recordings while sketching DIY furniture
    designs, and occasionally visits underground art shows at the Philadelphia Museum of Art’s contemporary wing.
  travel: David Delong explores Philadelphia’s historic neighborhoods—Old City, Society Hill, and the Italian Market—on weekend walks, while saving for road‑trip adventures to the New England coast, the
    Blue Ridge Mountains, and a future backpacking tour of Europe’s capital cities.
  culinary: David Delong favors hearty, protein‑rich meals such as grilled buffalo‑marinated chicken, homemade Philly cheesesteak sandwiches with provolone and sautéed onions, and occasional wood‑fire pizza
    topped with pepperoni and fresh basil, often cooking in his modest kitchen while classic rock riffs play in the background.
  core: David Delong is a disciplined, hands‑on 18‑year‑old who balances construction site rigor with indie music cravings, nightly power‑tool tinkering, and a habit of over‑planning his budget to the point
    of spreadsheet obsession.
background:
  cultural: David grew up in a working‑class white family in Philadelphia, with roots in the city’s Irish‑American and Italian‑American neighborhoods. Raised with Catholic traditions and a strong sense
    of community, he values the city’s history, from colonial landmarks to the sports culture that unites locals. His upbringing emphasized hard work, reliability, and loyalty to family and friends, shaping
    his practical outlook and respect for the diverse cultural fabric of the city while maintaining a distinctly Mid‑Atlantic American identity.
