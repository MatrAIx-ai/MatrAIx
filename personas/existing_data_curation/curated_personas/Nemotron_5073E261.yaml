  hobbies: '[''basketball'', ''video gaming'', ''DIY woodworking'', ''home renovation projects'', ''listening to classic rock'', ''exploring historic landmarks'', ''watching Philadelphia sports'', ''reading
    construction magazines'']'
  career_goals: David plans to finish his associate degree in construction management within two years while obtaining certifications in OSHA safety and heavy‑equipment operation. He hopes to advance to
    a foreman role, overseeing larger residential remodels, and eventually start his own contracting business that emphasizes sustainable renovations in the Philadelphia area. In the medium term, he wants
    to achieve the financial stability needed to purchase a home and support a future family, and he aims to mentor younger workers from his community as a way of giving back.
