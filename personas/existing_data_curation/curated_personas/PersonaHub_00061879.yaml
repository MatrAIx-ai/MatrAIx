persona_description: A passionate advocate of using architectural salvage to create aesthetically beautiful, low-cost housing. Jessica Kellner, editor-in-chief of Mother Earth Living magazine, is a self-proclaimed
  "architectural salvage enthusiast" who believes that "building one's own home does not have to be an unattainable dream." Her book, Housing Reclaimed, is a call to arms for nonconventional home builders
  who are interested in exploring technological advances, design evolution, and out-of-the-box thinking about materials and efficiency to meet the challenge of building affordable, environmentally friendly,
  beautiful, and unique homes.
