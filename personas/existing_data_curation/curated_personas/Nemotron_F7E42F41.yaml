  hobbies: '[''Reading medical journals'', ''Historical fiction'', ''Gardening'', ''Birdwatching'', ''Shell collecting'', ''Yoga'', ''Book club'', ''Knitting'', ''Volunteering at health fairs'']'
  career_goals: Julia aims to advance into a nursing leadership position within the next three years, targeting a charge nurse or nurse manager role in her hospital. She plans to pursue a Master of Science
    in Nursing (MSN) with a focus on healthcare administration or nurse education, seeking certification as a Certified Nurse Manager (CNM). Her long‑term ambition includes spearheading a community health
    initiative in Ocean Springs that combines patient education with preventive care, and eventually serving as a clinical instructor for nursing students at a nearby university.
