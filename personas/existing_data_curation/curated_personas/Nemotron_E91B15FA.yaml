personas:
  professional: A 20‑year‑old first‑line construction supervisor, Leroy Rhodes channels his love of routine and quiet focus into meticulous site oversight, expertly interpreting blueprints, coordinating
    crews, and enforcing OSHA safety standards while preferring solitary problem‑solving, and they consistently double‑check every detail before moving on.
  sports: Leroy Rhodes starts each day with a solo jog along Miami Beach, proudly wears the Miami Heat’s teal jersey during practice, follows the Miami Dolphins on Sundays, and is a member of the local
    Miami Beach Runners club that meets weekly for group runs, and they often time their routes to avoid the midday heat.
  arts: Leroy Rhodes immerses himself in jazz legends like Miles Davis, classic R&B icons such as Etta James, and instrumental hip‑hop producer J Dilla while practicing fingerstyle guitar, and they often
    wander Miami’s Wynwood Arts District to absorb vibrant mural art during quiet evenings.
  travel: Leroy Rhodes prefers low‑key road trips that blend history and music, having driven to Savannah’s historic squares and New Orleans for live jazz nights, and they keep a notebook of future destinations
    like the Bahamas and Key West, planning each itinerary months ahead to ensure a predictable, relaxed pace.
  culinary: Leroy Rhodes enjoys cooking Southern comfort foods such as fried catfish, collard greens flavored with smoked paprika, and buttery cornbread, often tweaking family recipes with fresh Gulf shrimp
    or a dash of hot sauce, and they consider the kitchen a solitary sanctuary where methodical prep mirrors their construction precision.
  core: Leroy Rhodes is a methodical young builder who balances a quiet love for routine—jogging dawns, guitar chords, and precise site oversight—with a lingering worry that drives both meticulous care
    and occasional over‑thinking, and they often find themselves double‑checking every detail before moving on.
background:
  cultural: Leroy grew up in a close‑knit African‑American neighborhood in Miami‑Dade County, where community ties and family gatherings emphasized mutual support and resilience. His parents instilled a
    strong work ethic and respect for craftsmanship, values that align with his practical outlook. He celebrates cultural traditions such as Juneteenth and has a deep appreciation for the musical heritage
    of Black America, which informs his taste in jazz and R&B. While he embraces his cultural roots, Leroy also navigates the multicultural fabric of Miami, interacting with peers from Caribbean and Latin
    backgrounds, which broadens his perspective on collaborative work environments.
attributes:
  skills: '["Concrete finishing","Formwork installation","Safety compliance","Team supervision","Equipment maintenance","Blueprint reading","Basic project budgeting","Conflict resolution"]'
