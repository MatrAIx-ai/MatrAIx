    mentoring at youth construction program"]'
  career_goals: Leroy aims to earn a formal construction management certification while continuing to work full‑time, eventually moving from first‑line supervisor to site manager. He dreams of obtaining
    a state‑issued General Contractor license within the next five years, which would allow him to launch his own small construction firm focused on residential renovations in Miami. Stability and routine
    are central to his ambitions, so he plans to build a steady client base, invest in reliable equipment, and cultivate a reputation for delivering projects on time and without incident. He also hopes
    to mentor younger workers from his community, providing them with a structured pathway into the trades.
