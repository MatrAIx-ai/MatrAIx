  career_goals: Carlos aims to become a senior engineering leader where he can shape the direction of educational software products that serve bilingual and underserved communities. Over the next five years
    he plans to earn AWS Solutions Architect certification, lead a cross‑functional development team, and mentor junior engineers. Ultimately, he aspires to launch his own edtech startup that blends his
    expertise in pedagogy with cutting‑edge technology to improve learning outcomes in Texas and Mexico.
