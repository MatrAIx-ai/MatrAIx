personas:
  professional: Carlos Vazquez, a 43‑year‑old full‑stack software developer, blends disciplined Agile leadership with a deep curiosity for educational technology, using Python, Django, React, and bilingual
    communication to craft user‑centric learning platforms that serve under‑represented bilingual communities.
  sports: Carlos Vazquez plays forward for the Cibolo Warriors adult soccer league, hikes the Texas Hill Country every weekend with the local Trailblazers club, and roots for the San Antonio Spurs and Texas
    Rangers, treating each match as both a social gathering and a competitive event.
  arts: Carlos Vazquez strums an acoustic guitar at family gatherings, drawing inspiration from artists such as Lila Downs and Willie Nelson, and regularly attends Fiesta San Antonio and Día de los Muertos
    celebrations, where they appreciate traditional folk performances and vibrant visual art.
  travel: Carlos Vazquez prefers meticulously planned road trips, exploring Texas Hill Country vineyards on Sundays, dreaming of a cultural immersion tour of Oaxaca and a hiking expedition in Patagonia,
    yet balances these ambitions with family obligations and a mid‑range travel budget.
  culinary: Carlos Vazquez experiments with Tex‑Mex fusion at home, mastering dishes like carne asada tacos with chipotle‑marinated brisket, chiles rellenos stuffed with queso fresco, and guacamole spiked
    with roasted tomatillos, while favoring ingredients such as corn masa, cilantro, and smoked paprika, and considers themselves an intermediate‑level home chef.
  core: Carlos Vazquez, a disciplined 43‑year‑old tech leader, merges a calm, organized mindset with a love for community soccer, weekend hikes, and kitchen experiments while methodically paving a path
    toward senior engineering leadership and an ed‑tech startup.
background:
  cultural: Carlos was raised in a bilingual Mexican‑American household that valued family, faith, and community. He celebrates Mexican traditions such as Día de los Muertos, quinceañeras, and holiday tamales,
    while also embracing Texan customs and the Catholic faith. His upbringing emphasized respect (respeto), collectivism (familismo), and hospitality, which he carries into his personal and professional
    life. Living in Cibolo, Texas, he is active in the local Hispanic community, often participating in church events, cultural parades, and neighborhood gatherings that blend Mexican heritage with the
    broader Texas culture.
