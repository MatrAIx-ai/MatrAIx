persona_description: A CO who is responsible for preparing for an emergency response and ensuring that their organization is well-equipped to handle potential disasters. This CO is knowledgeable about emergency
  response planning, has experience with the CARE Emergency Toolkit and Emergency Protocols, and has a comprehensive understanding of the three high-risk level disaster scenarios. They have established
  a Capacity Building Action Plan and identified the funding requirements to implement it, and are confident in their ability to recognize and address capacity gaps. They are also able to carry out rapid
  emergency needs assessment during the onset of an emergency and provide timely information to CARE International for decision-making.
