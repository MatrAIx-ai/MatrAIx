personas:
  professional: An energetic community liaison and volunteer organizer, Sonia Davila leverages her bilingual fluency, event‑planning flair, and hands‑on problem‑solving to coordinate senior‑center programs
    and cultural festivals, though their spontaneous nature sometimes leads to missed deadlines and they often rely on improvisation to keep projects moving forward.
  sports: A dedicated fan of the Minnesota Twins and regular participant in senior walking groups, Sonia Davila adds salsa dance sessions and weekly trail hikes to her fitness routine, and they cherish
    the camaraderie of local community clubs while staying active.
  arts: An enthusiastic choir member and quilt maker, Sonia Davila delights in the vibrant sounds of salsa icons like Celia Cruz, reads historical novels by authors such as Isabel Allende, and they stitch
    intricate patterns that echo cherished traditions, weaving artistic expression into everyday life.
  travel: A curious explorer who balances spontaneous road trips with careful planning, Sonia Davila travels to the Caribbean coast to visit family and also explores destinations like New Orleans for its
    music scene and the Great Lakes region for nature retreats, and they savor each journey as an opportunity to deepen cultural connections.
  culinary: A passionate home chef, Sonia Davila prepares traditional arepas, empanadas, and hallacas infused with garden‑fresh cilantro and ají, shares these meals at neighborhood gatherings, and they
    document her recipes for a future cookbook that celebrates her culinary heritage.
  core: A 63‑year‑old community elder, Sonia Davila blends spontaneous creativity with practical stewardship, turning salsa steps, garden herbs, and mentorship into a vibrant tapestry of cultural preservation,
    and they inspire friends and newcomers alike with their boundless enthusiasm.
background:
  cultural: Sonia grew up in a Venezuelan Catholic family, speaking Spanish at home and celebrating national holidays such as Día de la Independencia, Navidad, and Semana Santa with traditional foods like
    arepas, hallacas, and pan de jamón. After immigrating to the United States, she kept close ties with the Venezuelan diaspora in Georgia, participating in cultural groups, sharing folklore, and preserving
    the language for her grandchildren. Her cultural identity blends the warmth and communal spirit of Venezuelan traditions with the Southern hospitality of Georgia, influencing her love for food, music,
    and community service.
