  career_goals: Although retired from formal employment, Sonia aims to stay active as a community leader. She plans to volunteer as a cultural liaison for the local library and senior center, organize an
    annual Venezuelan food festival, and mentor recent Venezuelan immigrants on navigating life in Georgia. She also hopes to enroll in an online digital photography course to document community events
    and, eventually, compile a cookbook of family recipes. Her long‑term ambition is to be recognized as a trusted elder who helps preserve and share Venezuelan traditions within the Duluth area.
