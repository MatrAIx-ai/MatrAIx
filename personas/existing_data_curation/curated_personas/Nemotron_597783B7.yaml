personas:
  professional: Uriel Panta, a 25‑year‑old customer service representative in Houston, draws on their curiosity and artistic eye to deliver empathetic support, leveraging bilingual fluency, CRM mastery
    in Zendesk and Salesforce, and a talent for de‑escalation while they mentor new hires and use basic data analysis to spot service trends that fuel their ambition to become a Customer Experience Team
    Lead.
  sports: Uriel Panta, an avid salsa dancer who jogs through Brazos Bend State Park on weekends, supports the Houston Astros and Rockets, attends weekly salsa nights at the Houston Jerkos Salsa Club, and
    joins a community hiking group, and they merge rhythmic movement with cardio workouts to stay fit and socially engaged.
  arts: Uriel Panta, a devoted painter of acrylics inspired by vibrant textile patterns, a frequent visitor to Houston’s street‑art tours, a fan of muralist Eduardo Kobra, a listener of Celia Cruz and Bomba
    Estéreo, and an avid reader of contemporary authors like Sally Rooney and N.K. Jemisin, weaves these artistic influences into a personal visual storytelling practice, and they often share their work
    on social media.
  travel: Uriel Panta, who loves planning immersive trips that blend cultural festivals with urban art scenes, has explored Mexico City’s historic Centro Histórico, trekked the Iguazú waterfalls, dreams
    of a culinary road‑trip through Oaxaca, and often returns to the tranquil wetlands of the Everglades, preferring a mix of adventure and relaxation while budgeting through a travel‑rewards credit card,
    and they keep a travel journal for each journey.
  culinary: Uriel Panta, a confident home chef who masters the simmering of pepian and the slow‑cooking of tamales with roasted pepitas and achiote, enjoys experimenting with fusion dishes that pair traditional
    spices with modern plating, hosts weekly dinner parties featuring chiles rellenos and guava‑glazed pork, sources fresh ingredients from Houston’s Fiesta Market and Central Market, and they love pairing
    traditional flavors with experimental presentations.
  core: Uriel Panta, the 25‑year‑old bilingual CX enthusiast who paints, dances, cooks, and hustles between art openings and customer calls, is famed among friends for juggling multiple coffee cups while
    sketching street murals, and they occasionally forget to reply to texts because they get lost in a salsa routine.
background:
  cultural: Uriel grew up in a close‑knit Guatemalan family that maintained many traditions from her homeland while living in Houston. Spanish is spoken at home, and she often hears indigenous Mayan words
    from relatives. She celebrates Semana Santa, Día de Los Muertos, and Guatemalan Independence Day with family gatherings, music, and traditional foods such as tamales, chiles rellenos, and atol de maíz.
    The Guatemalan diaspora community in Houston provides a network of cultural events and church activities, which she participates in regularly. Her cultural background influences her worldview, fostering
    a deep respect for communal harmony, hospitality, and the arts, and it informs both her interpersonal style at work and her creative pursuits.
attributes:
