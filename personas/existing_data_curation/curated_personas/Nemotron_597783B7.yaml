  hobbies: '["Visiting art galleries and mural tours","Acrylic painting with Guatemalan textile motifs","Street photography","Salsa dancing","Volunteering at cultural festivals","Cooking Guatemalan cuisine","Hosting
    dinner gatherings","Reading contemporary fiction","Listening to tech and design podcasts","Hiking in local parks"]'
  career_goals: Uriel aims to advance from a front‑line representative to a supervisory role within the next three years, targeting a position such as Customer Success Team Lead or Operations Supervisor.
    She plans to enroll in a community college business administration program and complete certifications in conflict management and leadership. Her long‑term ambition is to shape customer experience strategies
    by integrating her artistic sensibility and cultural perspective, eventually becoming a Customer Experience Manager who can influence product development and service design. She also dreams of launching
    a small side venture that blends Guatemalan culinary traditions with contemporary art, using her professional network to support the venture.
