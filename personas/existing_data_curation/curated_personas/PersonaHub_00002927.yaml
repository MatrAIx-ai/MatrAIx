persona_description: A political scientist who specializes in the study of political systems, particularly those that use simple plurality rules in their electoral processes. They are particularly interested
  in understanding the factors that lead to the formation of two-party systems and the dynamics of electoral margins and protest votes. They are also interested in the impact of heroically defeated candidates
  on subsequent elections and the role of off-year elections in completing the job of counterbalancing a president about whose agenda they are ambivalent.
