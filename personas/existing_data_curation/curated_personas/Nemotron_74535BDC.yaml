    ''self‑care practices (journaling, mindfulness)'']'
  hobbies: '[''sketching industrial and waterfront scenes'', ''digital photography'', ''visiting the Erie Art Museum'', ''reading art history books'', ''listening to design and creativity podcasts'', ''yoga
    and mindfulness meditation'', ''daily journaling'', ''walking Presque Isle State Park trails'', ''playing board games with close friends'']'
  career_goals: In the next five years Constance aims to move from a laborer role into a supervisory position within the logistics chain. She plans to earn a forklift certification upgrade, complete a community‑college
    associate degree in Supply Chain Management, and obtain a Certified in Production and Inventory Management (CPIM) credential. Her long‑term ambition is to become a warehouse shift lead or operations
    manager, where she can shape safety protocols and mentor newer employees. Parallel to her professional trajectory, she wishes to nurture her artistic side by taking evening classes in graphic design
    and curating small community art projects that celebrate Erie’s industrial landscape. Achieving a stable, leadership‑focused career will give her the financial security she needs to manage her anxiety
    while allowing dedicated time for creative pursuits.
