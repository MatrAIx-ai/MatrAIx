personas:
  professional: Jon Jenkins, a budding digital illustrator and self‑taught visual strategist, blends meticulous sketching, experimental tablet art, and desert‑inspired photography with a critical, competitive
    mindset to craft concept pieces that challenge conventional aesthetics, and they constantly seek unconventional visual narratives.
  sports: Jon Jenkins, who prefers solitary pursuits, channels physical energy into weekend trail hikes across the Chihuahuan Desert for photography, participates in a small youth chess club, and avidly
    follows the New Mexico State Aggies men's basketball team while rarely joining organized team sports, and they find solace in the rhythm of their own footsteps.
  arts: Jon Jenkins immerses themselves in creative expression by sketching surreal desert vistas, developing digital illustrations inspired by Beeple's hyperreal style, capturing noir‑lit photography à
    la Gregory Crewdson, dissecting sci‑fi novels by Neal Stephenson, and absorbing indie cinema from directors like Ari Aster, all while actively contributing to a tight‑knit online community of teenage
    artists for critique and collaboration, and they view each project as a personal experiment in breaking artistic conventions.
  travel: Jon Jenkins, whose wanderlust is fueled by desert photography, plots weekend road trips from Las Cruces to Arizona's Monument Valley and to the otherworldly dunes of White Sands State Park, dreams
    of a future solo backpacking adventure through the neon‑lit streets of Tokyo to study manga, yet currently balances their travel aspirations with family constraints and a modest allowance, and they
    often map each journey on their tablet for visual reference.
  culinary: Jon Jenkins, a budding home‑cook, frequently whips up quick‑fix meals like cheesy quesadillas and pepperoni pizza slices while gaming, experiments with ramen bowls spiced with sriracha, and
    dreams of mastering the precise technique of French soufflé, all punctuated by a steady supply of gummy worms and dark chocolate to fuel their creative sessions, and they consider food a comforting
    backdrop to their artistic process.
  core: Jon Jenkins, a 13‑year‑old desert‑dwelling digital sketcher, balances fierce strategic gaming, intense anxiety, and a relentless quest for unconventional art, often channeling midnight worries into
    vivid desert photography while hoarding snacks and indulging in occasional impulsive tech splurges, and they constantly wrestle with the tension between solitude and the desire for connection.
background:
  cultural: Jon grew up in a white, Anglo‑American family in Las Cruces, New Mexico, where the desert landscape and Southwest aesthetics permeate daily life. Though his heritage is primarily European, he
    is regularly exposed to Hispanic and Native American cultural elements—Spanish language classes at school, local festivals, and regional cuisine like green chile roasted corn. This multicultural environment
    influences his artistic palette, drawing on the earthy tones of the desert and the vibrant patterns of Southwestern crafts while maintaining a strong sense of individualism and independence.
attributes:
  skills: '[''hand‑drawing'', ''digital illustration'', ''photo editing (GIMP)'', ''basic Python programming'', ''critical essay writing'', ''strategic chess and gaming'', ''project organization'']'
  hobbies: '[''sketching and drawing'', ''digital art on tablet'', ''desert photography'', ''strategic video gaming'', ''chess'', ''science‑fiction reading'', ''indie film watching'', ''personal journaling'',
    ''mindfulness practice'', ''online art community participation'']'
  career_goals: Jon aims to become a multidisciplinary digital creator—ideally a video‑game developer or independent animator—who can blend his love for art, storytelling, and technology. He hopes to attend
    a specialized high‑school program in graphic design or computer science, eventually earning a degree in interactive media. He also wishes to channel his personal emotional intensity into projects that
    raise awareness about teen mental‑health, perhaps creating immersive experiences that help others navigate anxiety and sadness.
