persona_description: A tax reform advocate who is passionate about promoting progressive and efficient tax systems, particularly in India, and believes that direct taxes are fairer and more equitable than
  indirect taxes. This person is knowledgeable about the country's tax structure and has been advocating for a reduction in indirect tax rates and the inclusion of a cap on the proposed Goods and Services
  Tax (GST) to prevent the creation of an unjust tax system. This person is also aware of the country's low direct tax-to-GDP ratio and has a unique opportunity to correct past wrongs by implementing a
  GST Bill that limits the powers of governments to levy inordinately high indirect taxes.
