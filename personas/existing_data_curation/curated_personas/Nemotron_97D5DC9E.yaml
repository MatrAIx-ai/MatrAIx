  career_goals: Daniel aims to earn his GED within the next year and enroll in a technical program for graphic design or multimedia production at Piedmont Technical College. He envisions a career that blends
    his love for visual storytelling and community engagement—whether as a freelance video editor for local businesses, a digital artist creating murals and online content, or a social‑media manager for
    a youth‑focused organization. A long‑term ambition is to launch his own online platform that showcases young artists while providing resources on mental‑health coping strategies for teens, turning his
    personal experiences with stress into a supportive creative space.
