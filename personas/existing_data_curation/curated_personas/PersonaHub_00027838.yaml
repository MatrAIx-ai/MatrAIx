persona_description: A conservation biologist who specializes in the protection and management of marine mammals and their habitats, particularly those that are designated as marine sanctuaries and wildlife
  refuges. They are knowledgeable about the Marine Mammal Protection Act in the United States, the Canadian Federal Fisheries Act in Canada, and the need for minimizing incidental take and disturbance in
  the management of seal populations. They are also interested in the regulation of fisheries take of fish resources known to be important to the maintenance of healthy seal populations.
