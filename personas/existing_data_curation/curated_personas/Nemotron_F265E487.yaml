  hobbies: '[''Painting (acrylic and watercolor)'', ''Photography (especially low-light and architectural)'', ''Digital illustration'', ''Playing guitar'', ''Tabletop role‑playing games (D&D)'', ''Smart
    home tinkering with Arduino and Raspberry Pi'', ''DIY LED lighting art projects'', ''Hiking with local friends'', ''Community basketball league'', ''Reading sci‑fi and philosophy'']'
  career_goals: Terry aims to earn his master electrician license and launch his own contracting firm that specializes in artistic lighting and smart‑home integrations for homes, galleries, and event spaces.
    He plans to obtain additional certifications in renewable energy and become a licensed electrical inspector, leveraging his curiosity for new technologies. In the long term, he hopes to mentor the next
    generation of tradespeople, establish a niche business that merges creativity with technical expertise, and secure financial stability that eases his anxiety while providing a legacy for his family.
