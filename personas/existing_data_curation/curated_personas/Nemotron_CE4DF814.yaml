  hobbies: '["digital drawing and concept art", "reading sci-fi and fantasy novels", "playing story-driven video games (Minecraft, The Legend of Zelda)", "photography", "listening to ambient instrumental
    music", "cooking Vietnamese meals with family", "coding simple web projects", "participating in school robotics club", "volunteering at community cultural events", "origami and paper crafts"]'
  career_goals: Joseph aims to attend a specialized arts high school and ultimately earn a degree in interactive media, graphic design, or game design. He aspires to become a concept artist or creative
    director in the video‑game or animation industry, creating immersive experiences that blend his love for abstract storytelling with elements of his Vietnamese cultural heritage. He also hopes to use
    his design skills to produce educational visual content for multilingual youth in his community.
