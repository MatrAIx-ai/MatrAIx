personas:
  professional: An aspiring digital concept artist and robotics club member, Joseph Thach leverages their methodical planning and vivid imagination to craft game‑ready character sketches while designing
    programmable art installations for school competitions.
  sports: Joseph Thach enjoys shooting hoops at the local park while following the Los Angeles Lakers, participates in the high school cross‑country team during the fall season, joins a weekend youth soccer
    league with the Diamond Bar Strikers, and they balance active play with a habit of stretching before marathon gaming sessions.
  arts: Joseph Thach channels their love for sci‑fi narratives into digital illustrations inspired by the bold line work of Ross Tran, the atmospheric lighting of James R. Eads, and the dreamy soundscapes
    of Brian Eno and Max Richter, while also curating monthly photo walks that capture the suburban sunset glow, and they often share their creations on online art forums.
  travel: Joseph Thach prefers meticulously planned weekend getaways, having explored the coastal cliffs of Big Sur, the vibrant night market of Chinatown in downtown LA, and the historic temples during
    the Mid‑Autumn Festival in San Jose, while dreaming of an immersive cultural trek through the ancient streets of Kyoto and a summer surf camp on the Hawaiian island of Maui, all balanced against their
    school schedule and modest budget.
  culinary: Joseph Thach, a budding home chef, masterfully prepares aromatic broth‑based noodle soup with star anise, rice noodles, and fresh herbs, rolls delicate rice‑paper spring rolls stuffed with shrimp,
    cilantro, and mint, experiments with tangy fish‑sauce marinades for grilled pork, and they often swap recipes on family video calls while occasionally ordering ramen for late‑night study sessions.
  core: Joseph Thach is a 15‑year‑old imaginative planner who sketches epic fantasy worlds by day, hoards collectible game skins by night, and they can’t resist a midnight snack of chips while forgetting
    to set their alarm for school.
background:
  cultural: Joseph was born in Diamond Bar, CA, to Vietnamese immigrant parents. He grew up bilingual, speaking Vietnamese at home and English at school, and celebrates cultural traditions such as Tet and
    the Mid‑Autumn Festival. The family’s emphasis on respect for elders, community harmony, and academic achievement has shaped his cooperative and organized personality. Living in a diverse Los Angeles
    County suburb, he blends American teen culture with his Southeast Asian heritage, often incorporating Vietnamese motifs and stories into his artistic projects.
