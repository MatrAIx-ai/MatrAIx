personas:
  professional: Emily Roberts, a seasoned retail associate with a knack for precise cash handling and empathetic service, leverages her love of visual art to turn everyday sales floors into miniature galleries,
    delighting shoppers while dreaming of curating a boutique that showcases local creators, even as her spontaneous nature sometimes clashes with the need for strict inventory deadlines.
  sports: Emily Roberts enjoys the rugged fitness of coastal trail hikes on Maine’s rocky shoreline, plays casual beach volleyball with a local club at Scarborough Beach, roots for the Portland Sea Dogs
    in baseball and the Boston Celtics in basketball, and commits to a weekly yoga class that she sometimes misses due to late‑night inventory counts.
  arts: Emily Roberts spends weekends sketching sea‑sprayed cliffs, frequents the Portland Museum of Art to study works by Winslow Homer and contemporary painter Julie Mehretu, volunteers in community theatre
    set design, and draws inspiration from indie folk musicians like Iron & Wine for her own DIY home‑decor crafts.
  travel: Emily Roberts prefers spontaneous road trips along New England’s coastal towns, has a cherished weekend getaway to Bar Harbor’s Acadia National Park, dreams of strolling the Amalfi Coast’s cliffside
    villages, and balances travel with a modest budget by swapping homes with fellow artists for off‑season stays.
  culinary: Emily Roberts loves preparing cedar‑plank salmon, buttery lobster rolls, and blueberry pie, relishes the bright tang of fresh dill and sea salt in her dishes, often improvises with reclaimed
    wood serving boards she crafts herself, yet frequently orders takeout on hectic retail nights.
  core: Emily Roberts is a curious, art‑obsessed retail veteran who sketches coastal vistas, battles occasional disorganization and anxiety, and channels her spontaneous spirit into crafting, community
    theater, and dreaming of a boutique gallery.
background:
  cultural: Emily grew up in a mixed‑generation New England family with deep roots in the Yankee tradition of self‑reliance and community involvement. Her upbringing in Maine emphasized an appreciation
    for the natural environment, modest living, and a strong sense of local identity. While she identifies as white American, she draws from the region’s cultural mosaic of maritime heritage, small‑town
    camaraderie, and a growing appreciation for the arts that has emerged in recent decades. This background informs her values of hard work, neighborly support, and an openness to new ideas while preserving
    the simple, grounded lifestyle of coastal Maine.
