  career_goals: Emily hopes to translate her love of art and people into a more fulfilling role that blends retail experience with creative curation. She dreams of managing a boutique that showcases local
    artists and handmade goods, where she could mentor junior staff while curating rotating exhibitions. In the longer term, she sees herself possibly opening a small community art space that offers workshops,
    gallery showcases, and a cozy café, providing a gathering place for Gorham residents to explore new ideas and express themselves. To prepare, she plans to take evening courses in visual merchandising
    and small‑business management, while building a network of local creators.
