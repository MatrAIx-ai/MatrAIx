  career_goals: Andrew aims to transition from contract work to a senior leadership role that offers a stable, predictable schedule and the ability to shape the creative direction of a regional agency.
    Over the next five years, he plans to launch a boutique design studio focused on serving small businesses and community organizations in St. Clair County, emphasizing data‑driven branding and sustainable
    design practices. He also seeks to formalize a mentorship program for aspiring designers, leveraging his STEM background to teach technical illustration and user‑centered design. Achieving a balanced
    workload that minimizes stress while providing financial security for his retirement is a core ambition.
