personas:
  professional: Andrew Lewis, a senior graphic designer with three decades of experience, channels their meticulous attention to detail and love for predictable outcomes into high‑fidelity brand systems,
    while mentoring junior designers and navigating client expectations with calm authority.
  sports: Andrew Lewis, an avid sailor with the Algonac Sailing Club on Lake St. Clair and a dedicated fan of the Detroit Lions, regularly joins community fishing outings, attends high school football games,
    and jogs along the waterfront during summer, balancing team spirit with personal fitness while favoring low‑impact activities that complement their joint health.
  arts: Andrew Lewis, a set designer for the Algonac Community Theater and an enthusiastic amateur photographer, draws inspiration from Ansel Adams' landscapes and the music of Neil Young, frequently creates
    digital art in Adobe Illustrator, and showcases model ship builds at local craft fairs, embedding a love for meticulous craftsmanship into every creative pursuit.
  travel: Andrew Lewis, a methodical traveler, plans weekend road trips to Michigan's Upper Peninsula, enjoys guided sailing excursions in the Great Lakes and has a bucket list that includes a Mediterranean
    yacht cruise to Croatia, favoring itineraries that combine scenic photography opportunities with comfortable accommodations and a clear schedule.
  culinary: Andrew Lewis, an intermediate home cook with a penchant for fresh lake fish, often prepares baked whitefish with lemon, dill, and capers, pairs it with buttery mashed potatoes, and savors classic
    Michigan‑style pasties, while also indulging in occasional barbecue ribs and craft beer, reflecting a balanced palate that values both tradition and culinary experimentation.
  core: Andrew Lewis blends a structured professional mindset with a love for community sailing, set design, and hands‑on craftsmanship, navigating life’s stresses through predictable routines, meticulous
    budgeting, and a steady stream of creative projects, even as they occasionally over‑invest in hobby supplies and worry about looming deadlines.
background:
  cultural: Andrew was raised in a working‑class family of German‑Polish descent in the Detroit metropolitan area and spent much of his adult life in Algonac, a small town on the shores of Lake St. Clair.
    The Midwestern cultural ethos of hard work, modesty, and community involvement shapes his outlook. He values practicality and reliability—traits reinforced by his STEM education—and expresses them through
    a design aesthetic that favors clean, functional layouts with warm, familiar tones. While his upbringing emphasized self‑reliance and punctuality, he also embraces the region’s strong tradition of volunteerism,
    participating in local festivals, church events, and youth mentorship programs. This blend of cultural heritage and local customs informs both his professional ethos and personal interests.
