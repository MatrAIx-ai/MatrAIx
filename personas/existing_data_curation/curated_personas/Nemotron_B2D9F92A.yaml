  hobbies: '[''Acoustic guitar and songwriting'', ''Open‑mic poetry performances'', ''Hiking and nature photography around Lake Bemidji'', ''Community theater acting'', ''Competitive trivia and strategy
    gaming'', ''Journaling'', ''Meditation and yoga'']'
  career_goals: Toma aims to launch a career in communications and public relations, initially seeking a role as a social media coordinator or community outreach specialist for a nonprofit focused on mental‑health
    awareness in the Upper Midwest. He plans to leverage his event‑planning expertise to organize workshops and speaker series that address anxiety and depression among young adults. In the longer term,
    Toma aspires to earn a master’s degree in counseling or social work, combining his advocacy and communication skills to become a licensed mental‑health counselor who also trains organizations in effective
    public engagement and crisis communication.
