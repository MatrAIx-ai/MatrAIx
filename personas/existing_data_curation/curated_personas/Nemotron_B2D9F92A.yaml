personas:
  professional: Toma Velasco leverages their structured communication skills and sociable energy to excel as a social media coordinator for a mental-health nonprofit, skillfully orchestrating community
    outreach events and crafting persuasive content while balancing a competitive drive to outperform campaign metrics.
  sports: Toma Velasco enjoys hiking the Lake Bemidji trails with a local outdoor club, follows the Minnesota Vikings and Twins avidly, joins a seasonal cross‑country skiing group in winter, yet their competitive
    streak leads them to occasionally over‑train, causing occasional burnout.
  arts: Toma Velasco performs original acoustic songs and poetry at open‑mic nights, draws inspiration from folk artists like Bon Iver and spoken‑word poet Rupi Kaur, collaborates in community theater productions,
    and captures seasonal landscapes with a Canon DSLR, often citing Ansel Adams as an influence.
  travel: Toma Velasco prefers budget‑friendly weekend getaways, has explored the North Shore of Lake Superior, trekked the Duluth coastal trail, and dreams of attending the Edinburgh Festival Fringe, balancing
    careful itinerary planning with spontaneous detours to local music venues.
  culinary: Toma Velasco enjoys cooking simple, hearty meals such as wild‑rice soup and grilled walleye with fresh herbs, experiments with seasonal vegetables in stir‑fry, favors espresso‑based drinks,
    and treats themselves to indulgent late‑night ramen while gaming.
  core: Toma Velasco is a talkative, anxiety‑prone 20‑year‑old who blends structured advocacy with spontaneous artistic bursts, often juggling meticulous planning and competitive impulses while forgetting
    to eat on time.
background:
  cultural: Raised in Bemidji, Minnesota, Toma grew up immersed in Midwestern values of modesty, neighborliness, and a deep connection to the outdoors. His family’s European‑American heritage—rooted in
    Scandinavian and German traditions—shapes his appreciation for seasonal festivals and community gatherings. While his upbringing emphasized self‑reliance and practicality, his humanities education exposed
    him to diverse cultural perspectives, including an awareness and respect for the local Ojibwe heritage. This blend of small‑town Midwestern culture and broad academic exposure informs his balanced outlook
    on tradition, community, and personal growth.
attributes:
  skills: '[''Public speaking'', ''Debate and argumentation'', ''Event planning and coordination'', ''Community outreach'', ''Social media management'', ''Creative and academic writing'', ''Research and
