persona_description: A historian of art who specializes in the history of exhibitions, particularly those related to the Aesthetic Movement and its impact on the art world. They are interested in understanding
  the critical and historical significance of exhibitions like the 1870s South Kensington shows and the 1910 Manet and Post-Impressionists exhibition, and how they reflect broader cultural and historical
  trends. They have a particular interest in the role of women in the art world and the contributions of women art journalists to key developments in art history at the end of the 19th century. They are
  also knowledgeable about the history of art writing and its development as a professional avenue for women, and have a particular interest in the critical responses of British women to contemporary British
  art.
