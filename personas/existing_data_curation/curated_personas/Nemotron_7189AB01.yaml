personas:
  professional: Albert Kellum, a retired farmhand turned community handyman, leverages his carpentry, automotive repair, and gardening expertise to mentor neighbors and run a modest hand‑crafted furniture
    stall, all while his curiosity fuels continual tinkering and his relaxed approach lets projects evolve organically.
  sports: Albert Kellum enjoys early morning walks with the Bayou Lafourche Senior Hiking Club, follows the New Orleans Saints and the LSU Tigers football seasons, and spends weekends fishing tournaments
    rather than organized team sports, viewing physical activity as a low‑stress way to stay fit.
  arts: Albert Kellum listens to classic country legends like Merle Haggard and gospel greats such as Mahalia Jackson, attends the local parish choir rehearsals, collects antique history books about the
    parish, and crafts wooden replicas of historic farm tools, finding artistic expression in both sound and wood.
  travel: Albert Kellum prefers relaxed road trips to nearby historic towns like St. Francisville and seasonal visits to the Gulf Coast beaches, plans trips on paper maps, avoids crowded airports, but dreams
    of a slow‑paced cruise through the Caribbean islands to experience new waters.
  culinary: Albert Kellum favors southern comfort foods—cooking catfish étouffée, gumbo with garden okra, and fresh coleslaw—relies on his vegetable garden for herbs, possesses modest cooking skills that
    shine in home‑cooked meals, yet occasionally orders fried chicken from the local deli when a project runs late.
  core: Albert Kellum blends a curious tinkerer’s spirit with a laid‑back, worry‑prone heart, turning retired farm life into a garden‑filled, wood‑shop sanctuary where they mentor, fish, and quietly fret
    over every new gadget.
background:
  cultural: Albert was born and raised in Rayville, a small town in the heart of Franklin Parish, Louisiana. He grew up in a working‑class, white, Southern‑Baptist family, where self‑reliance, close community
    ties, and respect for tradition were core values. The rhythms of rural life—farm work, hunting, fishing, church socials, and local fairs—shaped his worldview. While he is rooted in Southern customs,
    Albert also harbors a quiet curiosity about broader ideas, which he explores through reading and informal conversations.
