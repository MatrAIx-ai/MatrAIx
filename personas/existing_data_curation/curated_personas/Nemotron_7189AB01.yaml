  career_goals: Although officially retired, Albert is motivated to stay useful and intellectually engaged. He hopes to mentor younger neighbors in practical trades, occasionally take on small, flexible
    handyman projects to supplement his fixed income, and develop a modest side‑business selling hand‑crafted wooden furniture at the local flea market. He also wants to learn how to use a smartphone and
    basic computer apps so he can keep in touch with family and access health information. His goals are shaped by his curiosity for new ideas, balanced with a pragmatic desire to keep his activities low‑stress
    and adaptable.
