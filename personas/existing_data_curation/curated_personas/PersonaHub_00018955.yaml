persona_description: Dr. Andrzej Paszczynski, a Ph.D. scientist at the University of Idaho's School of Food Science, specializes in microbiology and has a background in handling and growing bacteria. He
  is interested in understanding how microorganisms tolerate exposure to harsh cleaning agents and stringent sterilization processes, which is crucial for NASA and other clean room environments. Dr. Paszczynski
  is looking for INBRE Fellows who are interested in working on projects related to microbiology, particularly those that focus on the survival of microorganisms under extreme conditions and the characterization
  of their tolerance/resistance to cleaning agents.
