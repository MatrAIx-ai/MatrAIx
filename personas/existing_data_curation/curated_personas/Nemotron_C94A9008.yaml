  career_goals: Sergiu dreams of one day designing and building things that help people. He is fascinated by engineers—especially civil and mechanical engineers who create bridges and machines—and admires
    teachers who explain ideas clearly. He also expresses interest in becoming a veterinarian because he loves animals and enjoys caring for the neighborhood dog. Looking ahead, he hopes to lead group projects
    as a future community organizer or youth mentor, continuing to learn new technologies and applying his curiosity in practical ways.
