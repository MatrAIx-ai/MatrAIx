personas:
  professional: Josemari is a seasoned full‑stack software developer who leverages 25 years of cloud‑native expertise in Python, JavaScript, AWS, and Docker to lead interdisciplinary teams building immersive
    interactive installations, while their spontaneous, Agile‑centric style fuels a culture of rapid prototyping and community mentorship.
  sports: Josemari enjoys weekend coastal cycling with the OC Rides club, follows the Los Angeles Lakers and Dodgers avidly, and participates in a local adult basketball league, but they often skip scheduled
    gym sessions in favor of spontaneous hikes along the beach.
  arts: Josemari immerses themselves in contemporary art by frequenting LA galleries featuring artists like Banksy, Yayoi Kusama, and Damien Hirst, while their evenings are filled with acoustic guitar renditions
    of Tame Impala, improvised theatre with a troupe that channels the energy of Lin‑Manuel Miranda, and exploring digital installations by Refik Anadol.
  travel: Josemari plans trips around immersive cultural experiences, having already toured the street art districts of Berlin, the sushi markets of Tokyo, and the open‑air museums of Barcelona, while dreaming
    of a future retreat to the deserts of Morocco to capture sunrise light for a generative‑art project.
  culinary: Josemari experiments in the kitchen with dishes like spicy coconut broth (using star anise and ginger), caramelized pork belly with honey‑soy glaze, and a rosemary‑infused mushroom risotto,
    pairing them with fresh basil, lemongrass, and locally sourced avocados, all while hosting weekly dinner gatherings where they test new fusion recipes.
  core: Josemari blends 25 years of cloud‑software mastery with a restless creative spirit, channeling spontaneous energy into art‑driven tech projects, mindful meditation, and occasional financial chaos,
    all while strumming guitar at open‑mic nights and cycling the coast.
background:
  cultural: Josemari is a first‑generation Vietnamese‑American whose family settled in Orange County’s vibrant Little Saigon community. Growing up bilingual, he absorbed Vietnamese language, cuisine, and
    traditions—celebrating Tet with elaborate family gatherings and honoring the values of respect for elders and communal responsibility. At the same time, the multicultural environment of Southern California
    nurtured his appreciation for diverse artistic expressions and innovative thinking. His Southeast Asian heritage informs his culinary passions, storytelling style, and a deep sense of community service,
    which he expresses through volunteering at local cultural centers. Balancing the collectivist roots of his upbringing with the individualistic, tech‑driven culture of Silicon Valley, Josemari embodies
    a hybrid identity that values both cultural continuity and forward‑looking creativity.
attributes:
