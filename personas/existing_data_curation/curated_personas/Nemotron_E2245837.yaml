    design", "Creative coding (Processing, p5.js)", "Public speaking", "Mentoring"]'
  hobbies: '["Visiting contemporary art galleries", "Digital photography", "Playing acoustic guitar", "Improvisational theater", "Cooking Vietnamese and fusion dishes", "Cycling around Orange County", "Volunteering
    at local Vietnamese community center", "Attending open mic nights", "Meditation and mindfulness practice", "Traveling to explore new cultures"]'
  career_goals: Josemari aims to move into a technology leadership role where he can steer interdisciplinary projects that blend software engineering with visual arts and interactive experiences. He envisions
    becoming a Head of Innovation or CTO for a boutique studio that creates immersive digital installations for galleries, museums, and public spaces. He also dreams of launching his own venture that leverages
    AI‑driven generative art, giving emerging artists tools to experiment with code. Mentorship remains a core ambition; he wants to build inclusive apprenticeship programs for underrepresented youth in
    Orange County, especially within the Vietnamese community, to foster the next generation of creative technologists. Balancing ambition with flexibility, he seeks positions that allow autonomous, project‑based
    work rather than strict corporate hierarchies.
