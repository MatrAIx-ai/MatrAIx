personas:
  professional: Kaci Munsterman, a retired curriculum developer turned senior mentor, channels their methodical planning, keen curiosity for the arts, and competitive streak into designing intergenerational
    storytelling workshops that challenge conventional teaching models while carefully vetting every new pedagogical trend; they relish the chance to guide aspiring teachers and ensure every detail aligns
    with their high standards.
  sports: Kaci Munsterman enjoys daily walks along the Narragansett coastal trail, participates in a senior bowling league, and faithfully cheers for the Boston Red Sox, while they also join a gentle tai
    chi class at the community center to keep their joints limber.
  arts: Kaci Munsterman spends quiet mornings painting New England seascapes in watercolors, attends performances at the Trinity Rep theater, collects prints by Winslow Homer, and they often debate the
    merits of avant‑garde installations with fellow art society members over bridge matches.
  travel: Kaci Munsterman favors well‑planned, low‑stress getaways such as a weekend stay in historic Newport, a guided genealogy tour of Dublin’s archives, and a relaxed cruise around the New England islands,
    and they always pack extra rose seed packets for the journey.
  culinary: Kaci Munsterman delights in cooking classic clam chowder, baking peach cobbler, and experimenting with rose‑infused vinaigrette for salads, displaying moderate kitchen skill while they occasionally
    over‑season dishes, a quirk they joke about during senior potlucks.
  core: Kaci Munsterman is a detail‑driven, art‑loving octogenarian whose curiosity, competitive edge, and bouts of anxiety shape a life rich in mentorship, roses, and meticulous planning; they balance
    social bridge tables with solitary watercolor sessions.
background:
  cultural: Kaci grew up in a White, New England family with roots in Irish and English heritage, raised in a modest Protestant community in Rhode Island. The region’s maritime history, seasonal festivals,
    and strong emphasis on community service shaped her values of self‑reliance, civic participation, and appreciation for the natural environment. Her upbringing fostered a respect for tradition alongside
    an openness to new ideas, which is reflected in her lifelong involvement with local historical societies, arts organizations, and senior advocacy groups.
attributes:
  skills: '["Curriculum Development", "Instructional Design", "Classroom Assessment", "Lesson Planning", "Digital Literacy", "Event Planning", "Community Outreach", "Budget Management", "Genealogy Research",
