  hobbies: '["Watercolor painting", "Reading historical novels", "Genealogy research", "Gardening", "Bridge", "Chess", "Classical music listening", "Attending theater performances", "Visiting art galleries",
    "Walking coastal trails", "Volunteering at community center"]'
  career_goals: Although retired from formal employment, Kaci is driven to continue influencing education and community life. She aims to volunteer as a mentor for aspiring teachers, develop an intergenerational
    storytelling program that pairs seniors with schoolchildren, and curate a local senior arts exhibition that highlights unconventional artistic media. She also hopes to author a memoir that intertwines
    her experiences in education with reflections on mental‑health resilience for older adults.
