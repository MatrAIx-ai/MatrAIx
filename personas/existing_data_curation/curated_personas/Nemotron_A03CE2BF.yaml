  career_goals: Rose dreams of one day becoming a veterinarian because she loves caring for animals and wants to use her scientific curiosity to help them stay healthy. She also imagines herself as a professional
    soccer player, channeling her competitive spirit and love for teamwork. In the near future, she aims to join her middle‑school science club and earn a badge in animal care, setting the groundwork for
    her future studies in biology and sports. She is determined to balance her passion for animals with her athletic ambitions, and she consistently seeks opportunities that let her lead and organize group
    projects.
