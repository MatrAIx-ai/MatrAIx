personas:
  professional: Rose Gibb, a ten‑year‑old aspiring engineer, leverages their love for structured LEGO builds and Scratch programming to lead their school robotics club, applying a practical, competitive
    mindset to every prototype.
  sports: Rose Gibb, an energetic ten‑year‑old captain of the Oakwood Tigers youth soccer team, drills intensively after school, idolizes USWNT forward Alex Morgan, combines weekend games with occasional
    treadmill sessions at the community center, yet sometimes skips warm‑ups in their competitive rush.
  arts: Rose Gibb, an avid LEGO builder and adventure‑book enthusiast who devours Enid Blyton’s “The Magic Faraway Tree,” loves singing Spanish hits by Shakira and Juanes, and sketches robot designs on
    notebook margins, merges imagination with structured creativity in their leisure time.
  travel: Rose Gibb, a ten‑year‑old explorer, has trekked the Grand Canyon, splashed in Cancun’s turquoise waters on a family vacation, dreams of wandering Tokyo’s neon tech districts, and prefers meticulously
    planned itineraries that blend amusement‑park thrills with quiet museum stops, though they can get impatient on long flights.
  culinary: Rose Gibb, a kitchen‑helping ten‑year‑old, lovingly prepares tacos with corn tortillas, seasoned ground beef, fresh cilantro, lime, and guacamole made from ripe avocados, perfects pico de gallo
    salsa, and can whip up a decent mac & cheese, but they occasionally over‑salt the guac in excitement.
  core: Rose Gibb, a ten‑year‑old soccer captain, LEGO architect, and budding coder, balances a love for structure and fierce competition while secretly hoarding extra LEGO bricks in their closet.
background:
  cultural: Rose comes from a Mexican‑American family that maintains strong ties to its heritage while living in South Haven, Michigan. Spanish is spoken at home, and family gatherings often feature traditional
    foods such as tamales, salsa, and arroz con frijoles. She celebrates holidays like Día de los Muertos and Mexican Independence Day with colorful altars, music, and crafts, which have nurtured her love
    for art and storytelling. The local community’s multicultural events, combined with her school’s diversity programs, give Rose a sense of belonging in both her Mexican roots and the Midwestern environment,
    shaping her identity as a bilingual, culturally aware child.
