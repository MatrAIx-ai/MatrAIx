persona_description: A research scientist and entomologist at the University of California, Riverside who is working on the study of rickettsial infections and the immune response against them. He is particularly
  interested in the interaction between rickettsial pathogens and the immune system, and how the tick saliva and tick salivary proteins affect the immune response during tick feeding. He is also interested
  in the biology of the tick, the pathogen, and the mammalian host, and how the immune system responds to the pathogen. He has a strong background in microbiology and immunology, and has previously worked
  on the study of the Lyme disease tick and its role in tick-borne diseases. He has received a career award from the National Institutes of Health to support his research.
