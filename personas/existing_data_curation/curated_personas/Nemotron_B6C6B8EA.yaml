personas:
  professional: Joel Ramos is a self‑taught handyman‑artist who blends his improvisational carpentry and repair expertise with a deep love of watercolor painting and landscape photography, channeling his
    competitive spirit into leading informal weekend workshops for seniors and local youth in a modest community studio despite occasional struggles with organization and deadlines.
  sports: Joel Ramos enjoys low‑impact hiking on the Garden of the Gods trails and participates in the senior center’s weekly walking club, while cheering on the Colorado Springs Switchbacks FC and the
    Denver Broncos in occasional game viewings, preferring solitary outdoor exercise over team sports.
  arts: Joel Ramos devotes evenings to watercolor sessions inspired by Claude Monet’s landscapes and fine‑tunes his Colorado Springs photography in the style of Ansel Adams, regularly attending intimate
    art gatherings where they discuss the works of Georgia O’Keeffe and share vintage postcard collections.
  travel: Joel Ramos prefers meticulously planned week‑long trips that blend artistic research and relaxation, having already captured sunrise vistas in the Grand Canyon, explored the historic streets of
    Santa Fe, and dreams of a pilgrimage to the Jalisco region to photograph colonial architecture that echoes his family’s roots.
  culinary: Joel Ramos enjoys cooking hearty family recipes like pozole and tamales, skillfully incorporating hominy, pork, chilies, and masa, while also experimenting with fresh garden vegetables in vibrant
    salsas, though they sometimes over‑salt their stews in the rush of creative projects.
  core: Joel Ramos is a curious, slightly anxious, improvisational handyman‑artist who channels his love of nature, tradition, and mentorship into a modest studio dream while battling occasional disorganization
    and competitive urges.
background:
  cultural: Born to Mexican immigrant parents, Joel grew up in a bilingual household that celebrated Dia de los Muertos, Cinco de Mayo, and family feasts centered around traditional cuisine. He retains
    a strong connection to his Mexican roots while embracing the Colorado lifestyle, participating in local Hispanic community events and integrating Mexican motifs into his artwork. His identity is a blend
    of Mexican heritage and American experiences, shaping his values of family loyalty, cultural preservation, and a deep appreciation for artistic expression.
attributes:
  skills: '[''Carpentry'', ''Basic Electrical Repair'', ''Plumbing Troubleshooting'', ''Automotive Maintenance'', ''Watercolor Painting'', ''Sketching'', ''Landscape Photography'', ''Adobe Lightroom Photo
