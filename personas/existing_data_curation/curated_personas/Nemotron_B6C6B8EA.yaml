  hobbies: '[''Watercolor Painting'', ''Sketching'', ''Landscape Photography'', ''Hiking'', ''Vegetable Gardening'', ''Mexican Cooking'', ''Chess'', ''Collecting Vintage Mexican Postcards'', ''Reading Philosophy'',
    ''Mindfulness Meditation'']'
  career_goals: Joel aspires to open a modest community art studio where he can lead weekend workshops in watercolor and photography for seniors and local youth. He dreams of publishing a photo‑essay book
    that documents the Mexican‑American experience in Colorado Springs, and later compiling a memoir that weaves together his artistic journey, cultural heritage, and coping strategies for anxiety. He also
    hopes to travel back to his ancestral hometown in Jalisco to photograph its architecture and traditions, ultimately curating a small exhibition that merges his visual work with Mexican folk motifs.
    Mentoring a younger artist from the local Hispanic community is a personal ambition he wishes to fulfill.
