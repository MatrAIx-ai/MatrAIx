personas:
  professional: Mia Delva, an aspiring young scientist with a talent for turning step‑by‑step LEGO instructions into experimental models, applies their love of structure and practical problem‑solving to
    lead the science club’s weekly 'Mini‑Lab' sessions, where they meticulously plan experiments and record results in bullet‑point journals.
  sports: Mia Delva splits their energy between the San Diego Aquatics Club’s summer swim meets and the Sunnydale Soccer Club’s fall league, cheering for the San Diego Wave in women’s soccer and the LA
    Chargers in football, while they keep a disciplined training schedule tracked in their bullet‑point journal to balance teamwork and personal fitness.
  arts: Mia Delva channels their love of rhythm into weekly hip‑hop dance classes set to clean versions of tracks by Alicia Keys, Bruno Mars, and a kid‑friendly remix of 'Savage,' while evenings are spent
    flipping through adventure books like the Magic Tree House series and listening to the voice‑acting of Zendaya in animated shows, shaping a vibrant artistic identity.
  travel: Mia Delva approaches travel like a well‑planned expedition, using a tiny travel journal filled with stickers to map out family trips to Balboa Park, La Jolla Cove, and the San Diego Zoo, while
    dreaming of a future vacation to Honolulu’s Waikiki Beach and Disneyland’s Fantasyland, always balancing excitement with a parent‑approved budget and a detailed day‑by‑day schedule.
  culinary: Mia Delva delights in Sunday brunches featuring crispy fried chicken, buttery cornbread, and collard greens, eagerly helps whisk together guacamole for family fish‑taco nights with cabbage slaw,
    and often experiments by sprinkling extra chili powder on sweet‑potato fries, showing a budding kitchen confidence that balances well‑crafted recipes with a love for bold flavors.
  core: Mia Delva blends a love for orderly LEGO creations, bullet‑point journaling, and rhythmic dance moves into a disciplined yet playful outlook, though they sometimes forget sunscreen after a swim
    and hoard extra‑large stickers like treasure.
background:
  cultural: Mia comes from a proud Black family that blends Southern‑U.S. traditions with the multicultural vibe of San Diego. Her parents celebrate holidays like Juneteenth and Kwanzaa, sharing stories
    of African‑American history and encouraging her to learn about notable Black scientists and artists. The family often gathers for Sunday brunches that feature soul food, while also enjoying the city’s
    diverse cuisines. Mia attends a local community center where she participates in teen‑mentor programs that highlight Black culture, and she loves listening to age‑appropriate R&B and hip‑hop tracks
    that her older cousins introduce. Growing up in a coastal city, she feels a strong connection to both her cultural heritage and the oceanic environment, shaping her identity and aspirations.
attributes:
  skills: '["Reading comprehension (grade 3 level)", "Basic arithmetic (addition, subtraction, multiplication)", "Organizational skills (planner use)", "LEGO construction and spatial reasoning", "Elementary
    coding with Scratch", "Basic cooking assistance", "Team collaboration in group projects"]'
  hobbies: '["Reading adventure books", "Building LEGO sets", "Swimming at the community pool", "Playing soccer with friends", "Journaling daily activities", "Participating in school science club", "Attending
    dance classes", "Exploring tide pools at the beach"]'
  career_goals: Mia dreams of exploring the ocean as a marine biologist, inspired by the nearby Pacific coast and her fascination with tide pools and sea creatures. She loves the idea of conducting experiments
    with clear steps and keeping careful records, which matches her preference for structure. She also imagines herself as a future teacher, guiding younger classmates through organized lessons and helping
    them discover the joy of reading. Mia hopes to earn a scholarship for a STEM program that supports black girls, and she wants to be a role model who shows that curiosity and discipline can lead to exciting
    careers.
