personas:
  professional: Tou Dong, a 42‑year‑old student‑services counselor in Brooklyn’s public‑school system, merges fifteen years of cross‑cultural guidance, career‑assessment expertise, and a curiosity‑driven
    willingness to experiment with tech‑enabled planning, while they navigate a relaxed, sometimes disorganized workflow that reflects their sensitivity to stress yet deep commitment to student wellbeing.
  sports: Tou Dong, an energetic salsa dancer with the Brooklyn Salsa Fusion Club, also hikes the Hudson Valley each autumn, follows the Brooklyn Nets and New York Yankees loyally, and participates in a
    co‑ed kick‑ball league during summer, while they approach fitness with a flexible, social mindset rather than strict training regimens.
  arts: Tou Dong, who volunteers as a facilitator for the Youth Art Collective and performs improv with the Knock‑Knock Improv troupe, draws inspiration from Lin‑Manuel Miranda’s storytelling, Crystal Pite’s
    contemporary choreography, and the vibrant Bushwick murals, channeling this eclectic mix into personal creative projects that they eagerly share in community showcases.
  travel: Tou Dong, preferring spontaneous, low‑key weekend getaways over rigid itineraries, often books last‑minute trains to the Hudson Valley for hikes or quick flights to New Orleans for music festivals,
    and they dream of a cultural immersion trip to Kyoto to study traditional dance, all while managing travel costs within a modest, flexible budget.
  culinary: Tou Dong, an intermediate home‑cook, loves fusing ginger‑infused ramen broth with avocado toast, frequently crafts bao‑burp (steam buns filled with kimchi‑marinated pork belly), creates matcha‑scented
    desserts, and they eagerly sample street‑food stalls at Brooklyn’s Smorgasburg, though they sometimes over‑season dishes in the pursuit of bold flavors.
  core: Tou Dong, a 42‑year‑old counseling professional, blends cultural insight, social energy, and a gentle anxiety‑driven perfectionism into a vibrant, occasionally disorganized, yet deeply caring life.
background:
  cultural: Tou is a second-generation East Asian American, born to Chinese-Taiwanese parents and raised in the vibrant neighborhoods of Brooklyn. Her household emphasized respect for elders, academic excellence,
    and community harmony, while also embracing the multicultural tapestry of New York City. Fluent in Mandarin and comfortable with English, she celebrates traditional holidays such as Lunar New Year and
    Mid-Autumn Festival with her family, and she actively participates in local Asian cultural organizations. This bicultural perspective informs her counseling practice, allowing her to bridge Western
    educational expectations with Eastern familial values, and to advocate for inclusive, culturally sensitive support for students from diverse backgrounds.
attributes:
  skills: '[''Career assessment (e.g., Strong Interest Inventory)'', ''Academic advising'', ''Group facilitation'', ''Crisis intervention'', ''Cross-cultural counseling'', ''Bilingual communication (Mandarin,
    basic Korean)'', ''Program development'', ''Stress management techniques'', ''Research and data analysis'', ''Conflict resolution'']'
  hobbies: '[''Salsa and Korean folk dance'', ''Cooking Asian-fusion recipes'', ''Improvisational theater'', ''Volunteering with youth art collectives'', ''Yoga and mindfulness journaling'', ''Weekend hikes
    in Hudson Valley'', ''Attending multicultural food festivals'']'
  career_goals: Tou aims to become a director of student services at a Manhattan charter school, where she can integrate evidence-based counseling practices with innovative, technology-driven career-planning
    tools. She plans to develop a culturally responsive counseling curriculum that addresses the unique stressors of East Asian immigrant families, secure a certification in trauma-informed care, and eventually
    author a guidebook on balancing academic ambition with mental-well-being. Over the next five years, she also hopes to launch a community mentorship program linking Brooklyn high-school students with
    Asian-American professionals.
