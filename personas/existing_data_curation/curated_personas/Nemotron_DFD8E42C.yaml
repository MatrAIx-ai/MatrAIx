personas:
  professional: Shelley Dykes, an aspiring visual storyteller who blends sketching, watercolor, and interactive game design, channels a curious yet introverted nature into meticulous, imagination‑rich creations
    that they treat as personal journals and future portfolio pieces.
  sports: Shelley Dykes, a member of the Riverdale Kids' Hiking Club and occasional swimmer at the community pool, favors solo nature walks over team sports, yet they root for the local Major League Baseball
    team, the Springfield Sluggers, cheering quietly from the sidelines during family outings.
  arts: Shelley Dykes, an avid watercolor enthusiast, draws inspiration from Claude Monet’s Impressionist landscapes, Hayao Miyazaki’s Studio Ghibli films, and the whimsical illustrations of Beatrix Potter,
    and they transpose these influences into sketches of imagined ecosystems that fill the margins of their school notebooks.
  travel: Shelley Dykes, who prefers low‑key, nature‑focused trips, has explored the nearby Redwood State Park and the city’s Natural History Museum, dreams of hiking the fjords of Norway and visiting the
    Great Barrier Reef, and they plan trips meticulously with a hand‑drawn map, balancing parental budget constraints with a yearning for solitary adventure.
  culinary: Shelley Dykes, a budding home chef, enjoys assembling avocado toast sprinkled with sesame seeds, creating simple strawberry shortcakes with fresh berries, and occasionally attempts vegetable
    sushi rolls using cucumber, carrot, and seasoned rice, though they often forget to clean up the kitchen afterward.
  core: Shelley Dykes is a quietly curious 11‑year‑old who finds solace in sketching vibrant worlds while they navigate waves of anxiety that fuel both their artistic drive and occasional meltdowns.
background:
  cultural: Shelley was born and raised in Auburn, Washington, to a middle‑class family with roots in Irish and German ancestry. Her family values independence, education, and a close connection to the
    outdoors, typical of the Pacific Northwest. She attends the local public elementary school, where she participates in art and science clubs. The community’s emphasis on environmental stewardship and
    access to regional parks and museums has shaped her appreciation for nature and the arts. Her cultural upbringing blends suburban American life with the region’s love for hiking, wildlife, and creative
    expression.
