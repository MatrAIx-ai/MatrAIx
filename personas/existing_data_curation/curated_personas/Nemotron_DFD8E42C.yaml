    ''nature walks'']'
  career_goals: Shelley dreams of turning her love for art and nature into a career. She hopes to become a children's book illustrator or a wildlife artist who captures the Pacific Northwest's forests and
    wildlife. She also imagines working in a museum or conservation center where she can combine her curiosity about science with creative expression. Her long‑term ambition is to produce work that inspires
    others while allowing her to work in quiet, focused environments.
