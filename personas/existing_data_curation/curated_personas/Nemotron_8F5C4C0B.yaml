    ''Team Leadership'', ''Effective Communication'', ''Electronic Medical Record (EMR) Documentation'']'
  hobbies: '[''Urban photography'', ''Playing basketball in the local rec league'', ''Exploring contemporary art galleries'', ''Jazz and hip‑hop music collection'', ''Cooking Southern‑inspired dishes'',
    ''Volunteering at community health fairs'', ''Reading non‑fiction about innovation and leadership'', ''Hiking in state parks'', ''Participating in local cultural festivals'', ''Mentoring aspiring EMS
    students'']'
  career_goals: Jonathan aims to move into EMS leadership within the next five years, targeting a supervisory role that leverages his business background to streamline department operations and improve
    patient outcomes. He plans to earn the Certified Flight Registered Nurse (CFRN) certification and complete a Critical Care Paramedic program, positioning himself for a future as an EMS director or private
    consulting specialist. He also hopes to develop a community outreach curriculum that blends health education with creative arts, fostering healthier, more engaged neighborhoods in the Marion County
    area.
