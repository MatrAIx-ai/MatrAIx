  hobbies: '[''Gardening'', ''Quilting'', ''Reading historical fiction'', ''Genealogy'', ''Church choir participation'', ''Volunteer work at senior center'', ''Walking'', ''Bingo'', ''Miniature painting'']'
  career_goals: Although retired from formal employment, Glenda remains driven to contribute meaningfully to Baxter. Her primary ambition is to mentor younger neighbors and church members, sharing her knowledge
    of local history and practical life skills. She aims to document oral histories of long‑time residents, ensuring the town’s heritage is preserved for future generations. Glenda also aspires to expand
    her volunteer work at the senior center, organizing activity programs that blend her love for social interaction with her knack for planning. Maintaining mental sharpness through continual learning—especially
    in new technologies—remains a personal goal.
