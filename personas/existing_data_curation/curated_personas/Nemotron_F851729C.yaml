personas:
  professional: Glenda Schoenfeld, a retired community organizer and genealogist, utilizes their organized, reliable nature and sociable flair to lead senior‑center activity planning, preserve DeKalb County
    oral histories, and they mentor younger volunteers in event coordination and digital storytelling.
  sports: Glenda Schoenfeld, an avid walker, joins the DeKalb Senior Walking Club for daily hill strolls, they cheer on the Atlanta Braves during radio broadcasts, and they enjoy friendly bingo tournaments
    that keep her mind agile.
  arts: Glenda Schoenfeld, a dedicated choir member, spends afternoons quilting intricate patterns inspired by the designs of the Gee’s Bend collective, they paint miniature landscapes echoing Monet’s brushwork,
    and they escape into historical novels by Philippa Gregory while humming Ella Fitzgerald’s swing standards during potluck preparations.
  travel: Glenda Schoenfeld, who prefers low‑impact journeys, enjoys annual trips to her grandson’s house in Jacksonville, Florida, they take day trips to the historic battlefield at Gettysburg, and they
    join occasional guided tours of Savannah’s historic district, while using the senior shuttle service for short outings and dreaming of a gentle river cruise on the Mississippi.
  culinary: Glenda Schoenfeld, a skilled home cook, harvests heirloom tomatoes and basil from her garden to craft rustic tomato‑basil soup and rosemary‑infused chicken pot pie, they bake sourdough loaves
    with a crisp crust, and they delight neighbors with seed‑filled quinoa salads at community potlucks.
  core: Glenda Schoenfeld blends meticulous organization with gregarious storytelling, they often lead community projects while occasionally misplacing their glasses on the garden bench, making them the
    beloved, slightly scatterbrained hub of Baxter’s senior circle.
background:
  cultural: Glenda is a White American who was raised in the Appalachian foothills of East Tennessee, a region known for its strong community ties, hospitality, and deep reverence for tradition. Her family’s
    roots trace back to early 20th‑century farmers who emphasized self‑reliance, neighborly cooperation, and church involvement. These cultural values have shaped her courteous, cooperative demeanor and
    her commitment to preserving local stories. The blend of Southern hospitality, a Methodist (later non‑denominational) faith background, and a rural upbringing inform her love of communal events, storytelling,
    and the practical application of curiosity in everyday life.
