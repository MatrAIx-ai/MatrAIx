persona_description: A person with a background in environmental science and water regulations, who is interested in the complexities of water quality and the impact of metal contamination on papermaking.
  They are likely to be knowledgeable about the Safe Drinking Water Act, the National Primary Drinking Water Regulations, and the role of inorganic additives in paper production. They may also have an interest
  in the removal of metal contaminants from water and the potential health risks associated with them. They may be interested in the use of copper and iron in water treatment and the potential impact on
  paper production.
