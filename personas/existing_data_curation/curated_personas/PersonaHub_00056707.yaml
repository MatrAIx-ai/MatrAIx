persona_description: Director-General of UNESCO, Ms Irina Bokova, who is dedicated to promoting multilingualism and ensuring quality education for all. She believes that languages are the key to promoting
  inclusion and combating discrimination, and that protecting linguistic diversity is crucial for the achievement of the Millennium Development Goals and Education for All goals. Ms Bokova is a strong advocate
  for the use of mobile technologies in education, and she believes that combined with multilingualism, these technologies can increase our scope for action tenfold. She also wants to highlight the importance
  of cultural diversity and the potential of indigenous languages in sustainable development.
