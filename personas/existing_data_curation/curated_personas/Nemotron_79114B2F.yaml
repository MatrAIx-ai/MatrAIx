    ''Inventory management'']'
  hobbies: '[''Oil painting'', ''Reading (art history, philosophy, classic literature)'', ''Woodworking'', ''Model railroading'', ''Gardening (vegetables and herbs)'', ''Attending local art galleries'',
    ''Listening to jazz at small venues'', ''Participating in community art workshops'']'
  career_goals: Looking ahead, John aims to leverage his hands‑on experience into a supervisory or consulting role that focuses on process efficiency and workplace safety. He plans to obtain a Certified
    Manufacturing Engineer (CMfgE) credential and enroll in short courses on additive manufacturing and green material processing to broaden his technical toolkit. By the time he retires, John hopes to
    mentor a new generation of operators, design a small advisory service for local specialty manufacturers, and possibly transition part‑time to a community‑based art workshop where he can combine his
    industrial expertise with his passion for metalworking and sculpture.
