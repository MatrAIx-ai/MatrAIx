  hobbies: '[''Volunteering at the local senior center'', ''Organizing beach clean‑up events'', ''Gardening'', ''Sailing and kayaking'', ''Mystery book club'', ''Mediterranean cooking classes'', ''Attending
    local theater productions'', ''Mentoring young professionals'']'
  career_goals: Angela aims to transition into a senior advisory role within the next two years, focusing on mentoring the next generation of sales professionals and shaping regional sales strategies that
    emphasize collaborative success. She hopes to champion initiatives that increase female representation in STEM‑related sales fields, contribute thought leadership at industry conferences, and eventually
    launch a boutique consultancy that helps small businesses adopt technology‑driven sales processes. Balancing professional ambition with personal harmony, she also plans to secure a phased retirement
    that allows her to maintain a meaningful presence in her company while dedicating more time to community work.
