personas:
  professional: Angela Campbell, a veteran sales strategist with a technical STEM foundation, combines data-driven decision-making with charismatic presentations to lead teams, but often toggles between
    meticulous planning and spontaneous improvisation, which can cause missed deadlines despite their natural knack for building client trust.
  sports: Angela Campbell is an avid sailor member of the St. Petersburg Yacht Club and paddles with the Gulf Coast Paddlers, follows the Tampa Bay Buccaneers and Tampa Bay Lightning religiously, and fits
    in early-morning walks along Clearwater Beach while occasionally neglecting strength-training due to a spontaneous schedule.
  arts: Angela Campbell enjoys attending productions at the Straz Center for the Performing Arts, especially contemporary revivals of Agatha Christie mysteries, listens to live jazz by Chris Botti, and
    delights in the paintings of local impressionist Sally O'Rourke, letting creative immersion inform her mentoring style.
  travel: Angela Campbell prefers a semi-planned itinerary that mixes scheduled sailing trips along the Gulf with spontaneous day-trips to nearby Key West, has already explored the historic streets of Charleston
    and dreamed of a culinary tour of Santorini, balancing travel ambition with a modest retirement budget.
  culinary: Angela Campbell is an enthusiastic home cook who perfects Mediterranean dishes like grilled branzino with lemon-oregano vinaigrette and caprese salad, regularly experiments with fresh basil
    and Kalamata olives in community cooking classes, yet admits to over-indulging in cheesecake on rare evenings.
  core: Angela Campbell blends three decades of sales expertise with a love for sailing, community service, and Mediterranean cuisine, while juggling structured ambition and spontaneous bursts that sometimes
    derail deadlines but keep life vibrant.
background:
  cultural: Angela grew up in a middle‑class white family in the American Midwest, where community involvement and a strong work ethic were emphasized. She earned a bachelor’s degree in a STEM field before
    moving to Florida for her career, where she embraced the coastal lifestyle and the warm, hospitable culture of Pinellas County. Her upbringing instilled respect for tradition and a cooperative spirit,
    while her adult life in Palm Harbor introduced her to diverse social circles, blending Southern hospitality with an active, outdoors‑oriented lifestyle. Her cultural identity reflects a balance of pragmatic
    Midwestern values and the laid‑back, community‑focused vibe of coastal Florida.
attributes:
  skills: '[''Strategic Sales Planning'', ''Negotiation'', ''Customer Relationship Management (CRM)'', ''Technical Product Knowledge'', ''Data Analysis'', ''Public Speaking'', ''Team Leadership'', ''Conflict
