persona_description: A high-level education administrator in Australia, responsible for overseeing the education system at the early, primary, and secondary stages. This person is likely to have a deep
  understanding of the structure and organization of the school system in Australia, including the various stages of education and the different types of centers that exist. They would also be familiar
  with the Australian national curriculum and the coordination and implementation of educational competences by the states and territories. Additionally, this person would be knowledgeable about the coordination
  and accreditation work done by the Australian Federal Department of Education through the Tertiary Education Quality and Standards Agency (TEQSA) and the Australian Universities Quality Agency (AUQA)
  in validating and homologating studies and qualifications in Australia.
