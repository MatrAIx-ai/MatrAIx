  career_goals: Although retired from formal employment, Victoria is committed to staying active and purposeful. She aims to expand her volunteer leadership at the DeLand Historical Society, eventually
    curating a small exhibit that showcases local women's histories. She also plans to complete a memoir that intertwines her family’s genealogy with the evolving cultural landscape of Central Florida.
    Continuing her artistic journey, she intends to enroll in an online watercolor course and develop an online gallery of her work. Travel goals include visiting nearby art festivals in St. Augustine and
    exploring historic sites across the Southeast. Finally, she hopes to mentor younger volunteers, sharing her organizational know‑how and fostering intergenerational connections.
