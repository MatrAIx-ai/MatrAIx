personas:
  professional: Victoria Mckinney, a retired community volunteer leader, leverages their meticulous organizing talent, curious mind, and gentle assertiveness to coordinate senior centre programs and curate
    historical exhibitions for the DeLand Historical Society, blending structured planning with artistic flexibility.
  sports: Victoria Mckinney enjoys low‑impact fitness through morning walks in DeLand’s nature preserves, weekly senior pickleball matches at the community center, and cheering on the Orlando Magic during
    basketball season, while maintaining a relaxed membership in the DeLand Senior Cycling Club.
  arts: Victoria Mckinney, a dedicated watercolour landscape painter and avid museum‑goer, draws inspiration from Claude Monet and Georgia O’Keeffe, participates in the weekly Downtown DeLand Art Walk,
    and captures Florida birdlife with a DSLR reminiscent of Ansel Adams’ compositional style.
  travel: Victoria Mckinney prefers short, well‑planned road trips to culturally rich Southern cities, having explored the historic streets of St. Augustine’s Art Festival and Savannah’s squares, and now
    dreams of visiting New Orleans’ French Quarter for its blend of music, cuisine, and architecture.
  culinary: Victoria Mckinney, an experienced home cook, delights in blending Southern comfort dishes such as shrimp and grits or fried green tomatoes with Mediterranean herbs like rosemary, oregano, and
    basil, often seasoning her creations with fresh lemon zest and a drizzle of extra‑virgin olive oil.
  core: Victoria Mckinney, a curious and organized 71‑year‑old, balances her love of art, gardening, and genealogy with a occasional tendency to over‑schedule volunteer meetings while forgetting to water
    her hibiscus during rainy weeks.
background:
  cultural: Victoria is a white American with Irish and German ancestry who spent her formative years in the Midwest before relocating to Central Florida in the 1990s. Her cultural upbringing blends Midwestern
    values of community, self‑reliance, and frugality with a Southern appreciation for hospitality and tradition. Living in DeLand, she has embraced the region’s eclectic mix of historic charm, coastal
    influences, and a growing arts scene. Her family celebrations reflect a hybrid of Irish holiday customs—such as baking soda bread at Christmas—and German summer traditions like outdoor picnics and beer
    garden gatherings, often infused with Floridian flavors. This blend of heritage informs her love of storytelling, cooking, and preserving local history.
