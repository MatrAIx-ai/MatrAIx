personas:
  professional: Jennifer Folsom, a retired accountant who now volunteers part‑time at the local historical society, blends their lifelong budgeting expertise and horticultural know‑how into hands‑on workshops
    on simple gardening and senior finance, delivering content with a relaxed, improvisational style that values solitary research over strict schedules.
  sports: Jennifer Folsom follows the South Carolina Gamecocks football team and enjoys attending Charleston Battery soccer matches occasionally, while they stay active through the Charleston Senior Walking
    Club’s weekly nature walks and a gentle morning yoga routine.
  arts: Jennifer Folsom finds artistic solace in the paintings of Monet, the folk tunes of the Carter Family, and the novels of Hilary Mantel, often pairing a session of needlework with a classic radio
    broadcast of Ella Fitzgerald, which they cherish as a quiet cultural refuge.
  travel: Jennifer Folsom prefers solo, low‑key excursions, having already explored the historic streets of Charleston and the Edith B. Laney Garden in Columbia, and they dream of a tranquil week strolling
    the formal gardens of England’s RHS Garden Wisley, always planning trips in their notebook with ample free time for spontaneous birdwatching.
  culinary: Jennifer Folsom combines a seasoned hand at classic Southern fare—such as shrimp and grits, collard greens, and low‑fat buttermilk biscuits—with a health‑conscious twist that swaps heavy cream
    for Greek yogurt and adds fresh rosemary and thyme from their garden.
  core: Jennifer Folsom is a solitary, curiosity‑driven gardener and genealogist who balances meticulous budgeting with a relaxed, sometimes forgetful approach to life, and they find comfort in birdwatching,
    knitting, and low‑key historic explorations.
background:
  cultural: Jennifer was raised in a modest, white Southern family in the Upstate region of South Carolina. Her upbringing was shaped by the traditions of Southern hospitality, church involvement, and a
    strong sense of community, though she has always leaned toward quieter, more solitary pursuits. The values of self‑reliance and practicality common in her cultural environment are evident in her approach
    to cooking, budgeting, and gardening. While she respects the region's heritage and enjoys participating in community events on her own terms, she also embraces the modern tools that enable her to explore
    personal interests like genealogy and online learning, reflecting a blend of traditional Southern roots and contemporary curiosity.
attributes:
  skills: '[''Southern cooking'', ''Budgeting and personal finance'', ''Gardening (native plants, low‑maintenance techniques)'', ''Basic computer usage (email, video calls, online research)'', ''Genealogy
    research'', ''Knitting and quilting'']'
  hobbies: '[''Gardening'', ''Reading historical fiction and biographies'', ''Knitting'', ''Birdwatching'', ''Genealogy research'', ''Photography'']'
  career_goals: Although retired, Jennifer aims to stay mentally and physically active. She aspires to compile a family memoir that weaves together her personal stories with her genealogical discoveries,
    preserving her heritage for future generations. She hopes to volunteer part‑time at the local historical society, assisting with cataloging archives and offering workshops on simple gardening and budgeting
    for seniors. Maintaining her independence and health, she plans to take short, low‑impact trips to nearby botanical gardens and historic sites, satisfying her curiosity while respecting her preference
    for quiet, solitary experiences.
