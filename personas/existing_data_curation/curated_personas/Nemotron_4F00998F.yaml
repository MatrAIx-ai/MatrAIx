  career_goals: Jade aims to transition from day‑to‑day supervision to a strategic logistics management role within the next five years, ideally as a Regional Operations Manager or Director of Sustainable
    Transportation. She plans to earn the Certified Transportation Professional (CTP) credential and pursue a Master's in Supply Chain Management to deepen her analytical expertise. Her long‑term ambition
    includes championing greener material‑moving practices in New England, such as expanding electric‑fleet usage and data‑driven route efficiency, while mentoring emerging supervisors to cultivate a resilient,
    innovative workforce.
