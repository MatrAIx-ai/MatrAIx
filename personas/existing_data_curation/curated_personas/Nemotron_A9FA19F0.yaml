personas:
  professional: Shelly Sefo is a budding mini-builder who spends afternoons stacking wooden blocks, turning curiosity into practical problem-solving, and they comfortably lead play sessions despite a relaxed
    attitude toward tidying up.
  sports: Shelly Sefo enjoys toddling around the community park's miniature soccer field with the Tiny Tots Soccer Club, cheers on the Chicago Cubs during family game nights, and prefers the bright orange
    playground ball for unstructured play in the spring.
  arts: Shelly Sefo delights in the vibrant animation of Disney's 'Moana', sings along to Julie Andrews' classic songs, and creates crayon scribbles inspired by the picture book 'Where the Wild Things Are'.
  travel: Shelly Sefo's family road trips have taken them to the sandy shores of Santa Monica Beach and the interactive exhibits at the San Diego Zoo, but the toddler prefers short rides with frequent snack
    breaks and a favorite stuffed giraffe for comfort.
  culinary: Shelly Sefo prefers chewy chicken nuggets, sweet apple slices, and soft macaroni and cheese, often attempting to stir the pot with a wooden spoon, yet they consistently refuse broccoli, requiring
    a goldfish cracker bribe for a balanced bite.
  core: Shelly Sefo is a curious yet laid-back toddler who builds towers, saves coins, and explores the world with a crayon in hand, all while leaving a trail of toys wherever they wander.
background:
  cultural: Shelly is raised in a white, Southern‑American household in Fairburn, Georgia. Her family embraces local traditions such as church attendance, community picnics, and Southern hospitality. The
    neighborhood’s mixed‑suburban environment offers exposure to diverse cultural activities, though her early experiences are shaped by family values of kindness, modesty, and an appreciation for both
    new ideas and established customs.
attributes:
  skills: '["Confident walking and climbing", "Fine motor coordination with crayons and blocks", "Basic vocabulary and simple sentence formation", "Ability to name colors, shapes, and common objects", "Age‑appropriate
    puzzle solving", "Cooperative play in small groups", "Assertive expression of preferences"]'
  hobbies: '["Building block construction", "Crayon drawing", "Backyard nature exploration", "Listening to picture books", "Pretend play with dolls", "Small‑group play with familiar peers", "Spontaneous,
    unstructured play"]'
  career_goals: At two years old, Shelly does not have formal career plans, but she frequently expresses a fascination with caring for animals and creating things with building blocks. She often says she
    wants to 'be a doctor' or 'make big things' as she grows older. Her early ambition leans toward a future role that blends her curiosity with practical problem solving, such as a teacher, veterinarian,
    or engineer.
