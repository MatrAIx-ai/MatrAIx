personas:
  professional: Zena Davis, an imaginative three-year-old, runs a make‑believe toy store in the living room where they count pretend money, arrange inventory with surprising precision, and balance their
    boundless curiosity with practical problem‑solving while occasionally worrying about making a mistake.
  sports: Zena Davis, a lively three-year-old, darts across the neighborhood park during weekly toddler soccer sessions with the Little Tigers Soccer Club, cheers for the Chicago Cubs on televised games,
    and twirls in their Saturday gymnastics class at Tiny Tumblers, where they proudly master their first somersault.
  arts: Zena Davis, a bright three-year-old, sings loudly to Raffi’s 'Baby Belug' and 'Sing‑Along' tracks, draws vibrant crayon pictures of their favorite Sesame Street characters, and eagerly watches Pixar’s
    'Toy Story' during family movie nights, reflecting their energetic creativity and love for shared artistic experiences.
  travel: Zena Davis, a curious three-year-old, loves weekend trips to the local zoo’s penguin exhibit, enjoys beach walks with their family’s stroller, and dreams of a future vacation to Disneyland in
    California, preferring car rides with their stuffed bunny for comfort while occasionally worrying about new environments.
  culinary: Zena Davis, a picky yet adventurous three-year-old, adores creamy macaroni and cheese, crunchy chicken nuggets, and sweet strawberry slices, can spread peanut butter on toast with a small spoon,
    and always asks for a drizzle of honey on their banana slices, showcasing their evolving palate and love for familiar flavors.
  core: Zena Davis is a sunny, inquisitive three-year-old who balances boundless curiosity with practical routines, often worries about new experiences, and brightens every room with their energetic spirit
    and occasional stubbornness.
background:
  cultural: Zena is raised in an African‑American family in Pasadena, Maryland, where community, family gatherings, and cultural celebrations are central. Her parents emphasize respect for heritage through
    regular attendance at a local church, participation in Juneteenth and Kwanzaa traditions, and shared meals featuring dishes like collard greens and sweet potato pie. She is exposed to a variety of Black
    musical influences—from gospel to R&B—through family sing‑alongs, and her neighborhood offers multicultural playgroups that reinforce a sense of belonging while nurturing her curiosity about the wider
    world.
