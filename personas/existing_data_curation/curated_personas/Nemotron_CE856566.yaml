  career_goals: Even at three, Zena dreams about who she might become. She often tells adults she wants to be a teacher who reads stories, a dancer who moves to music, a doctor who helps people feel better,
    and a caretaker for animals. Her immediate ambition is to master dressing herself, to read simple picture books independently, and to sing songs confidently in front of family and friends, laying the
    foundation for future learning and self‑reliance.
