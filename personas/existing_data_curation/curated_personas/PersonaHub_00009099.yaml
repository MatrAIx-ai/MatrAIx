persona_description: A scientist or engineer who specializes in space exploration and communication technologies, particularly in the field of Mars missions. They are interested in the data rates, communication
  capabilities, and power requirements of space missions to Mars and are familiar with the challenges and limitations of direct-to-Earth communication. They have experience with spacecraft design, signal
  processing, and data transmission protocols. They are knowledgeable about the specific requirements and constraints of Mars missions, including the need for high data rates, low power consumption, and
  long communication ranges. They are interested in the latest developments in space communication technologies and are constantly seeking to improve the efficiency and reliability of space communication
  systems.
