  career_goals: Marie aims to transition from a senior financial manager to a chief financial officer within the next five years, preferably at a technology‑focused firm that values innovation and sustainable
    finance. She is driven to spearhead digital transformation initiatives, such as implementing AI‑enhanced forecasting models and integrating ESG metrics into corporate reporting. Concurrently, she aspires
    to launch a mentorship program for young professionals from underrepresented backgrounds—especially Puerto Rican students—helping them navigate the finance industry. Over the long term, Marie envisions
    starting her own boutique consultancy that blends rigorous financial planning with creative, data‑centric solutions for socially responsible enterprises.
