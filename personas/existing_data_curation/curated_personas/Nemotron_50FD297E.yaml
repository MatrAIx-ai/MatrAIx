    ''organizing community dance events'']'
  career_goals: Although retired, Juanita remains driven to make a meaningful impact. She aims to expand the senior center’s outreach programs in Saint Maries, mentor younger volunteers, and develop a small
    intergenerational garden project that combines her love of horticulture with community education. She also wishes to complete a memoir documenting her family’s history and the evolution of rural life
    in Idaho, and to become more comfortable using emerging technologies for virtual storytelling and online community building.
