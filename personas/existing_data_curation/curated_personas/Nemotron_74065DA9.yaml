  career_goals: Phuong aims to advance to a senior technical writer position within the next three years, taking on larger, more regulated documentation projects. She plans to earn the Society for Technical
    Communication (STC) Certified Technical Communicator credential and deepen her expertise in compliance documentation for the medical-device and manufacturing sectors. Ultimately, she aspires to lead
    a documentation team as a Documentation Manager, where she can mentor junior writers while preserving the reliable, process-driven environment she values.
