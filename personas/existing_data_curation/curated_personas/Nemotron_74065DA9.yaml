  hobbies: '[''gardening (vegetable garden)'', ''Vietnamese cooking'', ''reading non-fiction'', ''crossword puzzles'', ''Sudoku'', ''daily walking'', ''yoga'', ''board gaming (Catan, Ticket to Ride)'',
