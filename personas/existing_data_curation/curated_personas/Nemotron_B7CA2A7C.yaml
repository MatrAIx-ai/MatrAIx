personas:
  professional: Tonya Ferrari is a seasoned full‑stack software engineer renowned for weaving Python, Java, and JavaScript into robust, scalable systems, and they champion a psychologically safe Agile team
    culture through meticulous documentation, thorough code reviews, and empathetic mentorship.
  sports: Tonya Ferrari follows the Boston Red Sox and New England Patriots with quiet enthusiasm, joins the Boston Running Club for occasional spring 5‑k runs, and practices gentle yoga twice weekly at
    a waterfront studio, preferring low‑impact activities that align with their reserved, stress‑sensitive lifestyle.
  arts: Tonya Ferrari devotes evenings to literary fiction by Margaret Atwood and historical nonfiction by David McCullough, attends intimate performances at the Boston Center for the Arts, and listens
    to folk legends Joan Baez and Joni Mitchell on vinyl, allowing the arts to anchor their reflective nature.
  travel: Tonya Ferrari prefers low‑key travel, having spent quiet weekends exploring Cape Cod’s lighthouse‑strewn coast, a solo cultural retreat in Kyoto’s temples, and family hikes through the White Mountains,
    always favoring self‑planned itineraries that avoid crowded tourist hubs.
  culinary: Tonya Ferrari delights in cooking seasonal New England fare— buttery lobster rolls, hearty clam chowder, and roasted butternut squash soup seasoned with garden‑grown sage and thyme— often pairing
    dishes with local craft beers and sipping a daily Earl Grey that fuels their evening coding sessions.
  core: Tonya Ferrari blends quiet curiosity with pragmatic tech expertise, balancing a love for solitary puzzle‑solving and garden‑grown meals with a persistent worry that drives meticulous planning yet
    sometimes fuels over‑analysis.
background:
  cultural: Tonya grew up in the New England region, where the local culture values reliability, modesty, and a respect for tradition alongside openness to innovation. Her family emphasized education and
    community involvement, which fostered her collaborative spirit and sense of responsibility. Though she identifies as white American, she carries the regional New England sensibility of self‑reliance
    tempered by a concern for neighborly harmony. Community activities, such as volunteering at the local library and participating in town clean‑up events, reflect her commitment to contributing positively
    to her town while maintaining a balanced, low‑stress lifestyle.
attributes:
  skills: '[''Python programming'', ''Java development'', ''JavaScript/React front‑end development'', ''SQL and NoSQL database design'', ''RESTful API creation'', ''Agile/Scrum project management'', ''System
