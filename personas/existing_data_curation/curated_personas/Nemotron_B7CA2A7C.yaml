  hobbies: '[''Reading literary fiction and historical non‑fiction'', ''Gardening (vegetable and herb garden)'', ''Puzzle solving (crosswords, Sudoku, board games)'', ''Yoga and mindfulness meditation'',
    ''Raspberry Pi/home‑automation projects'', ''Cooking seasonal New England cuisine'']'
  career_goals: Tonya aims to move into a technical leadership role where she can mentor a small, collaborative team and champion a culture of psychological safety and work‑life harmony. Over the next five
    years, she plans to earn an AWS Solutions Architect certification and, if possible, complete a part‑time master’s in Computer Science or a related field to deepen her expertise in cloud architecture.
    She wants to lead the design of mission‑critical systems that balance innovation with reliability, reducing operational stress for both users and her colleagues. Ultimately, she hopes to become a solution
    architect or engineering manager who can influence company policies that support mental‑health‑friendly practices, flexible schedules, and continuous learning opportunities.
