personas:
  professional: A seasoned pipefitter and small business owner named Matthew Pok leverages three decades of industrial plumbing expertise, blue‑print acumen, and a curious, competitive edge to integrate
    smart‑monitoring systems into retrofits while mentoring apprentices with a calm, talk‑heavy leadership style.
  sports: A lifelong fan of Texas Longhorns football and a weekend angler, Matthew Pok also plays in a local 4‑Man hunting club, follows the Dallas Cowboys, and participates in a community softball league,
    balancing competitive spirit with social camaraderie.
  arts: Drawing inspiration from the Texas hill country, Matthew Pok paints plein‑air landscapes reminiscent of Andrew Wyeth, collects vintage Lightnin' Hopkins blues records, and regularly attends community
    theater performances starring local actors like Janine Ramirez.
  travel: Matthew Pok favors road trips across the Texas Hill Country, has explored Santa Fe’s vibrant art scene, dreams of photographing the lavender fields of Provence, and balances travel with family
    responsibilities by planning short, budget‑friendly getaways.
  culinary: A BBQ enthusiast, Matthew Pok’s go‑to dish is smoked brisket seasoned with hickory, pepper, and a dash of brown sugar, but they also enjoy cooking shrimp étouffée with Cajun spices and occasionally
    experiment with homemade sourdough using heritage wheat.
  core: Matthew Pok is a calm, curious pipefitting veteran who merges Southern hospitality with high‑tech ingenuity, chasing art, vintage locomotives, and smart‑water solutions while staying socially engaged
    and competitively savvy.
background:
  cultural: Matthew was raised in a small-town, working-class family in East Texas, where Southern hospitality, country music, and community gatherings like church picnics and high-school football games
    shaped his values. His family’s Anglo-American roots and several generations of skilled tradespeople fostered a strong work ethic and respect for craftsmanship. While he embraces these traditions—enjoying
    BBQ, Sunday church, and local festivals—he also seeks broader cultural experiences through art, travel, and lifelong learning, reflecting his open-minded and curious nature.
attributes:
  skills: '[''Commercial pipefitting'', ''Steamfitting'', ''Blueprint interpretation'', ''Welding (MIG/TIG)'', ''Hydrostatic testing'', ''OSHA compliance'', ''Project budgeting'', ''Team leadership'', ''Mentoring
    apprentices'', ''Smart-monitoring system integration'', ''Energy efficiency analysis'']'
  hobbies: '[''Landscape painting'', ''Scale model steam locomotives'', ''Vintage tool restoration'', ''Fishing'', ''Hunting'', ''Live-music attendance'', ''Community theater'', ''Guest speaking at career
    days'', ''Reading art-history'', ''DIY home-automation projects'']'
  career_goals: He aims to obtain Master Pipefitter certification, expand his own contracting firm to serve regional industrial clients, specialize in sustainable water-conservation retrofits, and become
    a recognized trainer for the Texas Apprenticeship Program. He also hopes to lead a multidisciplinary team on a large-scale renewable-energy plant project, and eventually transition to consulting on
    smart-pipe technologies.
