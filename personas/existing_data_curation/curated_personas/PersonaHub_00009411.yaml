persona_description: Helen Clark, a former Prime Minister of New Zealand, is a highly respected and experienced leader in global development and peacebuilding. She has a strong background in poverty reduction
  and conflict resolution, and her work has been greatly assisted by funding from the United Nations Trust Fund for Human Security. Clark is known for her expertise in human security and her ability to
  apply a multi-sectoral approach to addressing complex challenges. She is also well-versed in the concept of human rights and the importance of integrating them into development initiatives. Clark's work
  is focused on deepening analysis of the root causes and consequences of insecurity, and on the actual needs and capacities of governments and communities.
