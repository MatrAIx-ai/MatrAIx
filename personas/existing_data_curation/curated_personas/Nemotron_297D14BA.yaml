  career_goals: Damon aims to secure a stable, hands‑on position that blends technical work with the chance to help others, such as an entry‑level HVAC technician or IT support role. He hopes to complete
    his associate degree in Applied Technology within the next two years, obtain relevant certifications (e.g., CompTIA A+ or EPA HVAC), and eventually advance to a supervisory position where he can mentor
    new employees. He also dreams of starting a small side business offering freelance tech repairs for his community, valuing both structure and flexibility.
