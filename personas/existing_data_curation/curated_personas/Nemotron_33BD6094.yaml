  hobbies: '[''Watercolor sketching'', ''Piano playing'', ''Reading modernist literature'', ''Poetry and philosophical essay study'', ''Journaling'', ''Photography of urban art installations'', ''Quiet
    walks in Minnehaha Park'', ''Meditation and mindfulness'', ''Learning French'', ''Exploring digital humanities tools'', ''Knitting'', ''Calligraphy'']'
  career_goals: Eleanore aims to transition from a teaching assistant to a tenure-track professor in the humanities, with a specialization in digital art history and interdisciplinary cultural studies.
    She plans to earn a Ph.D. within the next five years, secure research grants for a digital humanities project that maps contemporary art movements in the Upper Midwest, and publish scholarly articles
    in peer‑reviewed journals. Long‑term, she envisions becoming a curator at the Minneapolis Institute of Art or leading a university program that integrates mindfulness, solitary learning spaces, and
    innovative art education. She also aspires to mentor graduate students, develop curricula that encourage unconventional thinking, and achieve recognition for advancing inclusive, research‑driven humanities
    scholarship.
