  hobbies: '["Smart‑home prototyping", "Hiking in the Hudson Valley", "Playing saxophone in a community jazz ensemble", "Basketball", "Yoga and meditation", "Mentoring STEM students", "Cooking Southern
    cuisine", "Gardening"]'
  career_goals: Habib aims to transition into a senior engineering leadership role, such as Director of Engineering or Chief Technology Officer, where he can shape product strategy, drive innovation, and
    mentor emerging talent. He also plans to launch a boutique consultancy that offers sustainable energy and smart‑grid solutions to small businesses in the Hudson Valley, leveraging his business education
    to create profitable, low‑carbon projects. Additionally, he is committed to advancing diversity and inclusion in the tech sector by establishing mentorship programs for underrepresented youth and advocating
    for equitable hiring practices within his organization.
