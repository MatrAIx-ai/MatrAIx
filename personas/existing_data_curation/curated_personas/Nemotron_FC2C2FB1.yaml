personas:
  professional: Frederick Branse, a curious 4‑year‑old, explores the world through imaginative play and LEGO building, already showing a budding investigative spirit that hints at a future career in science
    or creative design.
  sports: Frederick Branse, a lively 4‑year‑old, dashes around the local Little Explorers Soccer Club, proudly wearing a Chicago Cubs cap during family game nights, and eagerly joins the toddler swim class
    at the community pool each summer.
  arts: Frederick Branse loves to doodle bright dinosaurs, sings along to Raffi’s "Baby Beluga" and The Wiggles’ "Fruit Salad", and watches Pixar’s "Toy Story" for inspiration, absorbing a palette of colors
    and rhythms that fuel their imaginative play.
  travel: Frederick Branse, at four, enjoys short family trips to the Boston Children’s Museum and the sandy shores of Cape Cod, while dreaming of a future adventure to the fairy‑tale castles of Disneyland
    Paris.
  culinary: Frederick Branse delights in buttery macaroni and cheese, crispy chicken nuggets, and sliced strawberries, proudly attempts to whisk pancake batter with a wooden spoon, yet stubbornly refuses
    broccoli, turning dinner into a playful negotiation.
  core: Frederick Branse is an endlessly curious 4‑year‑old who balances boundless energy with a surprisingly organized love of stickers, yet can be a stubborn negotiator when bedtime stories run short.
background:
  cultural: 'Frederick grows up in Richton, a small town in the deep South of Mississippi. His family participates in typical Southern customs: attending Sunday church services, joining community potlucks,
    enjoying meals of fried chicken, biscuits, and sweet tea, and listening to country and gospel music. The close‑knit neighborhood often gathers for block parties, local fairs, and church events, giving
    Frederick frequent social interactions and exposure to regional arts, crafts, and storytelling traditions.'
