  career_goals: Although retired, Nancy is driven by personal projects that combine her love of art, history, and learning. She aims to complete a series of watercolor paintings that capture Holt's seasonal
    landscapes and historic sites, and to exhibit the collection at the local senior center. She plans to write and self-publish a memoir that weaves together her family's story, community anecdotes, and
    reflections on the changes she has seen in Midwestern life. Nancy is also determined to master digital photography, creating an online blog that pairs her images with brief narratives about the places
    and people she encounters. To broaden her outreach, she hopes to design a simple website for her art, learn basic coding to maintain it, and mentor youth in community art programs. Finally, she wishes
    to join a regional Scrabble league and travel to three major art museums – the Detroit Institute of Arts, the Art Institute of Chicago, and the Museum of Modern Art – within the next five years.
