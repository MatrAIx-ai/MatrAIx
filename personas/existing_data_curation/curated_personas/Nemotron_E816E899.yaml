  hobbies: '[''Watercolor painting'', ''Gardening'', ''Genealogy research'', ''Birdwatching'', ''Crossword puzzles'', ''Scrabble'', ''Knitting'', ''Jazz listening'', ''Community theater'', ''Experimental
