  career_goals: When asked about the future, Chandra imagines becoming a painter who creates bright, abstract pictures, an explorer of distant planets, or a storyteller who writes books about magical worlds.
    She expresses a desire to share her art with friends and family and to make others feel happy through her creations. She also mentions wanting to learn more about animals and space, hinting at a future
    scientist or astronaut, and hopes to help people in her community by using her imagination to solve problems.
