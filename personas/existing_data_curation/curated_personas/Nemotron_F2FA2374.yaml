  career_goals: Looking ahead, David aims to lead his organization through a full digital transformation, moving critical workloads to a secure, cloud‑native environment while strengthening cyber‑resilience.
    He aspires to elevate to a senior executive role such as Chief Information Officer for a county agency or regional utility, where he can influence technology policy and champion broadband expansion
    for rural Colorado. In parallel, he wishes to establish a mentorship program that pairs seasoned IT staff with younger talent and to launch community workshops that teach digital art and media production,
    blending his technical leadership with his love of creative expression.
