  hobbies: '[''Abstract painting'', ''Poetry and spoken word'', ''Live music attendance (blues, soul, funk)'', ''Social dancing (line dance, partner swing)'', ''Soul‑food cooking'', ''Volunteer art mentorship'',
    ''Collage and mixed media crafts'', ''Street photography'', ''Improvisational theatre'']'
  career_goals: She aspires to transition into a role that merges her artistic passion with community service, such as a community arts coordinator for a local nonprofit, an art therapist, or a program
    director for youth creative workshops. Dorothy hopes to develop a sustainable community arts space in Memphis that offers free classes, exhibitions, and a safe haven for self‑expression. In the long
    term, she dreams of becoming a cultural ambassador, curating projects that celebrate African‑American heritage and foster intergenerational dialogue.
