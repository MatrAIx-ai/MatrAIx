  career_goals: He dreams of turning his love for art and technology into a career that lets him tell stories and shape experiences. In the long term he hopes to become a multimedia storyteller—perhaps
    an animator, game designer, or visual effects artist—who can blend hand‑drawn aesthetics with interactive digital media. He also imagines studying environmental design to create sustainable visual communication.
    While he worries about fitting into a rigid schedule, he seeks a future where flexibility and creative problem‑solving are valued, and he plans to pursue a liberal arts or fine‑arts program at a university
    that encourages interdisciplinary projects.
