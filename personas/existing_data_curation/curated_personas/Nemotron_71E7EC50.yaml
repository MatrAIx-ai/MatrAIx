personas:
  professional: Thomas Romero is a 30‑year‑old automotive service technician celebrated for his knack for marrying mechanical precision with artistic flair, using CAD to design custom EV upgrades while
    mentoring apprentices in a collaborative shop environment, and his relaxed, flexible work style lets him thrive under pressure without anxiety.
  sports: Thomas Romero is a devoted fan of the Boston Red Sox, New England Patriots, and Boston Celtics, plays on the local Worcester Ultimate Frisbee league, cycles with the East Coast Cyclists club on
    weekends, and hikes the Wachusett Mountain trails, though he often forgets to stretch afterward, leading to occasional shin splints.
  arts: Thomas Romero channels his imagination into mural‑painting his car and sketching sci‑fi vehicle concepts, frequently attends live shows by indie bands like The Lanterns and The National at small
    Boston venues, and draws inspiration from street artist Banksy and painter David Hockney, which fuels his creative approach to automotive design.
  travel: Thomas Romero favors spontaneous road trips along New England’s scenic routes, having explored Portland, Maine’s food scene, the historic streets of Quebec City, and the car‑culture mecca of Seattle,
    yet his budget constraints keep most adventures to weekend getaways that blend mountain biking with local craft‑brew stops.
  culinary: Thomas Romero enjoys cooking hearty New England clam chowder, crafting spicy arrabbiata pasta, and grilling artisanal burgers while experimenting with homemade sriracha, and he balances these
    home‑cooked meals with regular visits to Tree House Brewing Company for a flight of New England IPAs.
  core: Thomas Romero merges a calm, resilient work ethic with boundless artistic curiosity, turning every car, playlist, and weekend hike into a canvas for imagination while occasionally forgetting to
    lock the garage door.
background:
  cultural: Thomas grew up in Clinton, a small town in Worcester County, Massachusetts, where a strong sense of community and New England work ethic shaped his values. His family has roots in Irish and
    Italian ancestry, typical of the region's working‑class heritage, and generations before him were involved in local trades, including automotive repair. The modest, self‑reliant culture of New England
    instilled in him a practical mindset and a respect for craftsmanship. He enjoys regional traditions such as seasonal fairs, high school sports games, and the local arts scene, often visiting nearby
    galleries and folk‑art festivals. His upbringing fostered a balance between hard work and leisure, encouraging him to engage in group activities and maintain harmonious relationships. This cultural
    background influences his collaborative approach at the shop and his appreciation for both the functional and aesthetic aspects of automobiles.
