  hobbies: '[''automotive painting and mural art'', ''sketching vehicle designs'', ''attending car meets'', ''membership in automotive club'', ''ultimate frisbee'', ''group cycling'', ''hiking'', ''reading
    science-fiction novels'', ''playing guitar'', ''DIY electronics and lighting projects'', ''3D printing prototypes'', ''volunteering at community events'']'
  career_goals: Thomas aims to become a lead technician in his shop and eventually open his own boutique automotive customization shop that blends performance upgrades with artistic design. He is eager
    to deepen his expertise in electric‑vehicle systems and obtain certification in EV technology. Over the next five years, he hopes to lead a specialized team focused on innovative vehicle modifications,
    develop a line of custom parts, and become a recognized figure in New England's car‑enthusiast community. He also envisions offering workshops to share his knowledge with aspiring mechanics, emphasizing
    collaborative learning and hands‑on problem solving.
