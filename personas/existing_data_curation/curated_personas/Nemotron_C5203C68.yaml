  career_goals: Looking ahead, Hiu aims to transition into a technical leadership role where he can shape product strategy while maintaining a hands‑on coding presence. He aspires to become a principal
    engineer or engineering manager, championing best practices in software quality and fostering a collaborative, inclusive team culture. He also wishes to launch a consultancy that helps small non‑profits
    in the Chapel Hill area modernize their digital infrastructure, leveraging his expertise in cloud migration and secure application design. On a personal level, Hiu is motivated to mentor the next generation
    of developers, particularly those from underrepresented backgrounds, and to contribute to open‑source initiatives that improve accessibility for global users.
