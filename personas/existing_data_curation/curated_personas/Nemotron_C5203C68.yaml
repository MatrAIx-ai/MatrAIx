personas:
  professional: Hiu Wu, a 55‑year‑old veteran full‑stack developer, designs enterprise micro‑services with Java, Python and React while bridging business and tech teams, mentoring juniors, and steering
    toward a principal‑engineer role that balances hands‑on coding with strategic leadership.
  sports: Hiu Wu, a regular at the Chapel Hill Badminton Club’s Wednesday night matches, hikes the Blue Ridge foothills with family on weekends, follows the UNC Tar Heels basketball team and the Carolina
    Hurricanes NHL squad, and practices tai chi in the local park for relaxation.
  arts: Hiu Wu, who enjoys live‑music nights at Cat’s Cradle, collecting vinyl by folk‑rock duo The Avett Brothers, participates in board‑game evenings featuring Catan and Ticket to Ride, and attends community
    theater productions of classic plays, finding inspiration for creative problem‑solving.
  travel: Hiu Wu, who splits time between frequent trips to visit family in Taiwan, annual vacations exploring Kyoto’s temples, a recent road trip through Yellowstone National Park, and a planned adventure
    to explore the fjords of Norway, prefers flexible itineraries that balance cultural immersion with family time.
  culinary: Hiu Wu, an avid home cook, delights in preparing braised pork belly, mapo tofu, and steamed fish with ginger using Sichuan peppercorns, doubanjiang, and fresh bok choy, often sharing these dishes
    at neighborhood cultural festivals and on board‑game nights.
  core: Hiu Wu blends disciplined engineering expertise with a sociable, flexible lifestyle, mentoring others, cooking heritage dishes, and pursuing travel, while occasionally letting disorganization shadow
    their meticulous planning.
background:
  cultural: Hiu Wu is a first‑generation immigrant of Chinese descent who grew up in a bilingual household, speaking Mandarin at home while attending American schools. His East Asian heritage instilled
    a strong respect for education, family cohesion, and community service, values that continue to shape his professional demeanor and personal life. He maintains cultural ties by celebrating Lunar New
    Year, participating in local Chinese cultural associations, and preserving traditional culinary practices. Living in Chapel Hill, he blends these traditions with a Southern U.S. lifestyle, contributing
    to multicultural events and acting as a bridge between his heritage and his American community.
