  career_goals: Approaching retirement, Samuel aims to shift from day‑to‑day managerial duties to a senior advisory role where he can mentor emerging leaders, help shape strategic direction on a part‑time
    basis, and preserve the company’s collaborative culture. He plans to establish a scholarship for local high‑school seniors pursuing business studies, serve on the board of a nonprofit focused on workforce
    development for veterans, and continue volunteering in community‑focused initiatives. His overarching ambition is to leave a lasting legacy of practical, people‑centric business practices while maintaining
    a balanced, low‑stress lifestyle.
