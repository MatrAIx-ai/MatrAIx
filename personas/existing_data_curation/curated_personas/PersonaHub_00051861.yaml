persona_description: A public health professional with expertise in cholera vaccination campaigns, specifically in the development and evaluation of oral cholera vaccines and their impact on community knowledge,
  attitudes, and practices regarding cholera, safe water, sanitation, hygiene, and immunization practices. The individual has worked on campaigns in Haiti and Thailand, and is a member of the Coalition
  for Cholera Prevention and Control, technical advisory committee of DOVE Cholera project, and the Africhol Project. They have experience in conducting surveys, assessing vaccine effectiveness and impact,
  and evaluating the feasibility, success, and cost of cholera vaccination campaigns in long-standing refugee camps.
