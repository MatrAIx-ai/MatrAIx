  hobbies: '[''Street photography'', ''Exploring murals and art galleries'', ''Cooking Mexican cuisine'', ''Pickup basketball'', ''Participating in 5k runs'', ''Attending indie film screenings'', ''Listening
    to Mexican folk and pop music'', ''Volunteering at community center (teaching photography)'', ''Bike maintenance and customization'', ''Keeping up with delivery tech innovations'']'
  career_goals: Ryan aims to climb the logistics ladder by securing a supervisory position where he can oversee a fleet of couriers, implement process improvements, and mentor new drivers. He plans to obtain
    a commercial driver’s license (CDL) and certifications in supply‑chain management, positioning himself for roles such as operations manager or owner‑operator of a small delivery service. Financial independence
    and the ability to provide for his children remain central motivations, and he envisions leveraging his artistic side to launch a side business offering street‑photography prints for local businesses.
