  career_goals: Although still a toddler, Luis already shows an eagerness to help and protect others, often pointing to fire trucks or doctors in picture books. He imagines himself as a firefighter who
    can rescue people, a doctor who cares for his family’s stuffed animals, or a teacher who shares stories. These early ambitions combine his curiosity about the world with a desire for practical, helpful
    roles as he grows.
