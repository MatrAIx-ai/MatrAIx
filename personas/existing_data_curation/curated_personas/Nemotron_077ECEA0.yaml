personas:
  professional: Rafael Torrente, an aspiring young soccer enthusiast who treats every practice like a mini-project, applying their methodical planning, organized drill routines, and sociable energy to coordinate
    teammates and score goals.
  sports: Rafael Torrente plays for the Sunnyvale Community Park U‑8 soccer team, idolizes Lionel Messi, collects his player stickers, and cheers for the local professional team, the Metro City Rockets,
    while also enjoying weekend pick‑up basketball with friends.
  arts: Rafael Torrente spends afternoons drawing comic‑style cartoons inspired by classic animated heroes like "Mickey Mouse" and Pixar's "Buzz Lightyear", colors vibrant scenes from adventure books, and
    dances to lively folk rhythms during family celebrations, channeling their creative spark into both visual art and movement.
  travel: Rafael Torrente prefers family road trips with a detailed itinerary, eagerly revisiting the seaside boardwalk of Oceanview Beach and dreaming of exploring the ancient ruins of Machu Picchu, balancing
    adventure with the comfort of familiar stops.
  culinary: Rafael Torrente assists in preparing fresh guacamole and salsa using ripe avocados, tomatoes, lime, and cilantro, enjoys munching on homemade cheese quesadillas, and loves experimenting with
    building LEGO‑shaped fruit skewers, showcasing a budding kitchen curiosity and favorite ingredients.
  core: Rafael Torrente is a detail‑oriented seven‑year‑old who turns soccer drills into organized missions, meticulously saves allowance for LEGO sets, and bursts into creative sketches, though they sometimes
    leave a half‑built model abandoned when a new goal beckons.
background:
  cultural: Rafael is raised in a Mexican-American household in Olathe, Kansas. Spanish is spoken at home, and he celebrates Mexican traditions such as Dia de los Muertos, Cinco de Mayo, and family gatherings
    featuring tacos, tamales, and mariachi music. He attends a bilingual after-school program that reinforces his cultural heritage while integrating into the broader Midwestern community. These cultural
    experiences shape his language skills, love for Mexican cuisine, appreciation for music and dance, and a strong sense of community and family.
attributes:
  skills: '[''Reading (second-grade level)'', ''Basic addition and subtraction'', ''Bilingual basics (Spanish & English)'', ''Following structured routines'', ''Organizing school supplies'', ''Team soccer
    playing'', ''LEGO building'', ''Helping peers'']'
  hobbies: '[''Soccer'', ''LEGO building'', ''Drawing and coloring'', ''Reading adventure books'', ''Dancing to Mexican music'', ''Helping with simple cooking'', ''Collecting soccer player stickers'']'
  career_goals: Rafael aspires to become a youth soccer coach, where he can combine his love for the game, his methodical approach to practice drills, and his desire to support and mentor other children.
    He also imagines working as a teacher or community organizer in the future, using his organized mindset and caring personality to create supportive learning environments. In the short term, he aims
    to improve his soccer skills, learn leadership techniques, and continue helping friends and classmates.
