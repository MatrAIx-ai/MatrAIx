  hobbies: '[''Painting'', ''Guitar playing'', ''Live music events'', ''Hiking'', ''Reading speculative fiction'', ''Cooking Mexican dishes'', ''Attending art exhibitions'', ''Tech meetups'', ''Meditation'',
    ''Journaling'']'
  career_goals: Chris aims to blend his technical background with his passion for the arts to design innovative, culturally responsive mental‑health programs for underserved Latino youth in Austin. He plans
    to pursue a Master’s in Social Work with a focus on community empowerment, eventually moving into a program‑director role or policy‑advocacy position. Long‑term, he envisions founding a nonprofit that
    uses art‑based therapy and digital platforms to reduce stress and improve well‑being, while also influencing local public policy to increase funding for creative‑based community services.
