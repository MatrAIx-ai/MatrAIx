personas:
  professional: Chris Yanez, a 25‑year‑old social work practitioner with a STEM graduate background, blends data‑driven program evaluation with community‑based art interventions to design culturally responsive
    mental‑health services for underserved youth, leveraging strong outreach, crisis management, and grant‑writing skills while navigating a sometimes chaotic schedule that reflects their relaxed approach
    to obligations.
  sports: Chris Yanez enjoys weekend hikes along Hill Country trails, follows Austin FC in MLS and the Texas Longhorns football team, participates in a local running club that meets at Zilker Park, and
    practices yoga twice a week to balance the sedentary nature of data analysis work.
  arts: Chris Yanez paints abstract canvases inspired by the bold color fields of Mark Rothko, strums an acoustic guitar at open‑mic nights featuring artists like Jimi Hendrix and local indie band The Dames,
    and contributes to community mural projects with fellow creators such as street artist Sage.
  travel: Chris Yanez prefers spontaneous road trips that blend art‑centric stops, having recently explored the vibrant galleries of Santa Fe and the historic jazz scene of New Orleans, while dreaming of
    a future creative retreat in Barcelona's street‑art neighborhoods, all budgeted within modest savings and occasional Airbnb deals.
  culinary: Chris Yanez enjoys cooking family‑heritage dishes like corn‑based tamales with chipotle‑spiced pork, slow‑cooked mole sauces, and fresh salsa verde, experimenting with fusion twists that add
    avocado‑lime crema, and they often host dinner gatherings where they showcase these flavors alongside locally sourced produce.
  core: Chris Yanez, a curiosity‑driven social work innovator, balances data analytics with spontaneous art projects, worries about every deadline, forgets bills but never forgets a guitar riff, and lives
    by the mantra that creative chaos fuels community change.
background:
  cultural: Chris grew up in a bilingual Mexican‑American household in Austin, celebrating traditions such as Día de los Muertos, Cinco de Mayo festivities, and family gatherings centered around homemade
    tamales. Fluent in both Spanish and English, he navigates a bicultural identity that informs his empathy and cultural competency in social work. He participates in local Latino community organizations,
    mentors younger members, and draws inspiration from Mexican folk art and music, integrating these influences into his professional and creative endeavors.
