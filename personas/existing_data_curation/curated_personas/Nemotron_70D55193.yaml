  career_goals: In the coming years Yolanda aims to transition into a mentorship and education role, sharing her practical expertise with newly licensed nurses and nursing assistants. She hopes to obtain
    a certification in geriatric nursing so she can better serve the aging population in Carroll County. Additionally, she plans to develop and lead a series of community health workshops focused on diabetes
    and hypertension prevention, blending her clinical skills with her love for sociable interaction. She also aspires to author a concise handbook on routine nursing procedures and best practices, ensuring
    that the knowledge she has cultivated over decades remains accessible to future caregivers. Maintaining a stable, predictable work schedule is a personal priority to manage her anxiety while continuing
    to contribute meaningfully to patient care.
