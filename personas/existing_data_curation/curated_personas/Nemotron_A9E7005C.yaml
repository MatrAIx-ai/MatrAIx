  career_goals: Sue Lynn aims to progress to a regional operations director position within the next five years, leveraging her talent for identifying inefficiencies and driving practical, results‑focused
    change across multiple sites. She also envisions launching a boutique consulting practice that helps small, family‑owned businesses in rural Tennessee modernize their operations while preserving local
    traditions. Mentoring emerging female leaders and championing a culture of healthy competition within her organization are additional long‑term objectives.
