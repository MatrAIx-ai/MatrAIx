personas:
  professional: Sue Seibert is a senior operations manager with over two decades of experience crafting strategic plans, overseeing multi‑site budgets, and driving process optimization, whose blend of curiosity
    and practical skepticism fuels data‑driven decisions while their spontaneous streak sometimes clashes with rigid timelines.
  sports: Sue Seibert enjoys weekend hikes on the Cumberland Plateau, participates in a local recreational softball league, and follows the Nashville Predators and the Memphis Tigers, approaching fitness
    with a flexible, competitive attitude that prefers outdoor activity over regimented gym routines.
  arts: Sue Seibert regularly attends bluegrass and country concerts featuring the Avett Brothers and Sturgill Simpson, reads mystery novels by Gillian Flynn and Tana French, and channels their competitive
    nature into local trivia nights where they relish dominate rounds.
  travel: Sue Seibert favors spontaneous, low‑key road trips in the 1965 Mustang, often detouring to Asheville’s art district, the Great Smoky Mountains, and the historic streets of Savannah, balancing
    a modest travel budget with a desire to explore both nearby cultural hotspots and iconic national parks.
  culinary: Sue Seibert experiments with Southern comfort cooking, perfecting dishes like chicken and dumplings, shrimp‑and‑grits, and heirloom tomato jam, seasoning with smoked paprika, cayenne, and bourbon‑infused
    glaze, while their garden yields fresh peppers that inspire new spice blends.
  core: Sue Seibert blends a data‑driven tactical mind with a restless curiosity, often juggling meticulous budget spreadsheets and impromptu Mustang road trips, while their competitive edge fuels both
    boardroom negotiations and trivia night victories, even as they occasionally let deadlines slip.
background:
  cultural: Sue Lynn grew up in a small Appalachian‑influenced community near Knoxville, Tennessee, where self‑reliance, family gatherings, and church events formed the core of daily life. The region’s
    emphasis on hard work, modesty, and respect for tradition instilled a practical outlook and a strong sense of personal responsibility. While she values the hospitality and slower pace of rural life,
    she also embraces broader cultural influences through travel, music, and an openness to new ideas. Her Southern roots coexist with a competitive, skeptical mindset shaped by both local community values
    and her business education.
