  hobbies: '["Salsa Dancing", "Cooking Mexican Cuisine", "Gardening", "Hiking in the Oregon Cascades", "Attending Cultural Festivals", "Reading Mystery Novels", "Volunteering at the Community Center", "Quilting",
    "Local Wine Tasting", "Yoga and Mindfulness"]'
  career_goals: Looking ahead, Luisa aims to mentor a younger manager as part of a phased retirement plan, ensuring a smooth leadership transition at her workplace. She is passionate about integrating mental‑wellness
    initiatives and cultural‑competency training into the organization, drawing on her own experiences with anxiety and her Mexican heritage. Additionally, she hopes to launch a community‑based program
    that offers cooking classes and cultural events, strengthening ties between the local Hispanic community and the broader Roseburg population.
