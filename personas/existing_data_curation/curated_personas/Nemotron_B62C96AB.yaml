  hobbies: '[''Cooking Mexican cuisine'', ''Exploring Chicago neighborhoods and street food'', ''Attending live music (Latin jazz, hip‑hop)'', ''Playing basketball'', ''Video gaming (strategy and simulation)'',
    ''Street photography'', ''Reading tech and self‑improvement articles'', ''Volunteering at community centers'']'
  career_goals: Ivan aims to transition from a front‑line representative to a team lead within the next two years, leveraging his natural assertiveness and cooperative nature to mentor newer agents. He
    plans to enroll in night courses to complete his bachelor's degree in Business Administration, with a focus on customer experience management, and to earn certifications such as Certified Customer Service
    Professional (CCSP) and Lean Six Sigma Yellow Belt. In the longer term, he envisions moving into a customer‑experience analyst role where he can combine his curiosity for data with practical solutions
    that boost satisfaction metrics. Eventually, he hopes to apply the business skills he gains to open a small Mexican‑style taco and tamale pop‑up, reflecting his cultural roots and entrepreneurial drive.
