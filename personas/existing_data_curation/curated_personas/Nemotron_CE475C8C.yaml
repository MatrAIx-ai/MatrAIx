  hobbies: '[''Reading biographies'', ''Listening to jazz and blues'', ''Digital photography'', ''Art workshops (watercolor, collage)'', ''Visiting Birmingham Museum of Art'', ''Cooking Southern comfort
    food with African‑American influences'', ''Community gardening'', ''Volunteering at senior center (storytelling)'']'
  career_goals: Christian aims to leverage his experience to move into a supervisory or trainer role within the customer‑service department, where he can mentor new representatives and shape service standards.
    He also aspires to complete his undergraduate degree in Communications, which would open pathways into community outreach or cultural programming for local arts organizations. Ultimately, he hopes to
    combine his passion for art and community service by taking on a liaison position that connects the city’s cultural institutions with underserved neighborhoods, fostering greater access to the arts
    for Black residents and other underrepresented groups.
