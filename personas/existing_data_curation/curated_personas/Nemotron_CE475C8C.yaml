personas:
  professional: Christian Singleton leverages a decade of front‑line support experience, adept at Salesforce and Zendesk, to mentor new representatives while championing creative problem‑solving through
    art‑inspired communication strategies.
  sports: Christian Singleton enjoys watching the Birmingham Barons and Alabama Crimson Tide, participates in weekly walking groups at the community garden, and practices light jogging along historic neighborhoods,
    preferring low‑impact activity over competitive sports.
  arts: Christian Singleton immerses themselves in Birmingham’s jazz and blues scene, regularly attends performances by local ensembles such as the Alabama Jazz Hall of Fame, experiments with watercolor
    and collage at the Birmingham Museum of Art, and captures the city’s legacy through digital photography inspired by the documentary style of Dorothea Lange.
  travel: Christian Singleton prefers thoughtfully planned trips that blend cultural enrichment with relaxed pacing, having explored New Orleans for its jazz heritage, visited the National Museum of American
    History in Washington, D.C., and dreaming of a pilgrimage to the historic French Quarter of Mobile to photograph its antebellum architecture.
  culinary: Christian Singleton enjoys cooking Southern comfort dishes like shrimp and grits, collard greens, and bourbon‑glazed baked sweet potatoes, often incorporating fresh herbs from the community
    garden and experimenting with spice blends inspired by Creole cuisine, while modestly rating their own culinary skill as "enthusiastic amateur".
  core: Christian Singleton blends a meticulous, data‑driven work ethic with a quiet, curiosity‑fuelled love for art, community service, and Southern cuisine, yet habitually checks their phone during meetings
    and hoards vintage camera lenses.
background:
  cultural: Christian is a Black Alabamian whose upbringing in Birmingham was shaped by the city’s rich civil‑rights legacy and deep Southern Black cultural traditions. He grew up attending a historically
    Black church where gospel music and communal storytelling reinforced his sense of identity. The legacy of the 1963 Birmingham campaign is a source of pride and informs his commitment to community empowerment.
    He maintains strong ties to family networks that celebrate African‑American culinary customs, such as collard greens, fried fish, and sweet potato pie. His appreciation for the arts is colored by local
    Black artists and the vibrant African‑American arts scene, which he supports through museum visits and volunteer work. This cultural grounding informs his empathetic approach to service and his ambition
    to increase cultural access for marginalized communities.
attributes:
  skills: '[''Customer Service'', ''Active Listening'', ''Conflict Resolution'', ''De‑escalation'', ''CRM Software (Salesforce, Zendesk)'', ''Data Entry and Reporting'', ''Problem Solving'', ''Time Management'',
