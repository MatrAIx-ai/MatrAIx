personas:
  professional: Nathaniel Jack, a ten‑year‑old budding programmer who designs simple Scratch games, constructs complex LEGO models, and strategizes chess puzzles, blends relentless curiosity with a practical,
    organized approach to problem‑solving, often treating each project like a quiet competition against themselves.
  sports: Nathaniel Jack avidly follows the Dallas Mavericks and the Texas Rangers on TV, plays in a local youth soccer league on weekends, and prefers solitary practice drills that let them channel their
    competitive edge without the chaos of large team settings.
  arts: Nathaniel Jack immerses themselves in instrumental jazz by listening to Miles Davis and John Coltrane, practices piano pieces by Ludovico Einaudi, and sketches futuristic inventions inspired by
    sci‑fi novels, often sharing their drawings with the family during weekend gatherings.
  travel: Nathaniel Jack dreams of stargazing at Big Bend National Park and touring the Johnson Space Center in Houston, while their family vacations usually involve short road trips to nearby Cedar Hill
    State Park where they set up telescopes, balancing a love for adventure with the practical constraints of a school calendar.
  culinary: Nathaniel Jack delights in the family’s Saturday collard greens and cornbread, occasionally helps whisk a simple mac and cheese, but is notoriously picky about vegetables, preferring pizza with
    extra cheese and a splash of hot sauce, and enjoys experimenting with fruit smoothies for after‑school snacks.
  core: Nathaniel Jack is a quiet, competitive ten‑year‑old who pairs a love for sci‑fi and LEGO with a disciplined approach to saving, health, and solitary creativity, all while balancing a skeptical edge
    and a penchant for staying up late stargazing.
background:
  cultural: Nathaniel is raised in a close‑knit African‑American family in Garland, Texas, where Southern hospitality meets urban diversity. Family traditions include weekend gatherings featuring soul food
    like collard greens and cornbread, gospel music at the local church, and celebrating Juneteenth with community events. Growing up in a multicultural suburb, he is exposed to a blend of African‑American
    cultural expressions, Texan customs, and the broader Dallas‑area arts scene, which shape his values of perseverance, community pride, and a love for learning.
