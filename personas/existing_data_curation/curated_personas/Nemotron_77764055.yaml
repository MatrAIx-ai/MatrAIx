  hobbies: '[''Gardening'', ''Quilting'', ''Reading historical fiction and biographies'', ''Crossword and puzzle solving'', ''Birdwatching'', ''Baking and cooking'', ''Genealogy research'', ''Volunteering
    at the library'']'
  career_goals: Although retired, Crystal aims to stay actively engaged in her community and maintain her independence. She plans to volunteer as a mentor at the local senior center, sharing her life‑experience
    and organizational skills with younger volunteers. She also hopes to lead a community garden project that promotes sustainable practices and neighborhood cohesion. Additionally, Crystal intends to complete
    a series of online courses on local Kansas history and genealogy, ultimately compiling a family memoir that preserves her heritage for future generations.
