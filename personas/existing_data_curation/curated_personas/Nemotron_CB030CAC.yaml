personas:
  professional: Lena Ducksworth, a retired elementary and middle school teacher with over three decades of experience, now channels their curriculum design expertise and passion for oral history into coordinating
    community literacy programs, mentoring novice educators, and delivering engaging guest lectures that blend rigorous pedagogy with storytelling, while they push themselves to secure funding for a scholarship
    fund for future teachers.
  sports: Lena Ducksworth enjoys gentle morning walks through the community garden, follows the Springfield Sluggers baseball team on television, and participates in a weekly senior bocce league, using
    light exercise as a social outlet despite occasional joint stiffness, and they relish the camaraderie it provides.
  arts: Lena Ducksworth regularly visits the city museum to view works by modern masters such as Georgia O’Keeffe and contemporary painters, listens to Miles Davis and Aretha Franklin on their tablet, and
    channels their artistic sensibility into crocheting and quilting projects that echo traditional geometric patterns, all while maintaining a competitive edge in senior art exhibitions, and they consistently
    seek feedback to refine their techniques.
  travel: Lena Ducksworth joins organized senior tours to Washington, D.C., and New Orleans—revisiting jazz clubs and historic monuments—while dreaming of a quiet retreat to Savannah’s historic squares,
    often favoring day trips that accommodate their mobility and the need to stay close to family support, and they prioritize comfort and safety in travel planning.
  culinary: Lena Ducksworth delights in cooking comfort foods such as shrimp gumbo with okra, collard greens seasoned with smoked turkey, and homemade cornbread, skillfully balancing seasoning with a modest
    hand, while also appreciating a hearty slice of pecan pie at local diners, and they often share these dishes with book club members.
  core: In essence, Lena Ducksworth is a fiercely curious octogenarian who blends scholarly rigor with artistic flair, competes in senior art contests, harbors a healthy skepticism toward new acquaintances,
    and constantly battles a tendency toward worry, all while they nurture a deep love for jazz, quilting, and community storytelling.
background:
  cultural: Lena is an African-American woman who grew up in Maryland during the era of segregation and the civil rights movement, witnessing the transformation of her community. Her upbringing was shaped
    by the strong traditions of the Black church, family storytelling, and a deep appreciation for African-American music, literature, and visual arts. She is part of the vibrant black middle class in Prince
    George’s County, where community solidarity, cultural festivals like Juneteenth, and intergenerational mentorship are valued. Lena’s heritage includes roots traced to the Great Migration, and she carries
    forward the legacy of resilience, education advocacy, and cultural pride.
