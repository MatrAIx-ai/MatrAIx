personas:
  professional: Fariborz Lowery is an aspiring young technologist who combines a passion for robotics, Minecraft world‑building, and Scratch coding with a methodical, detail‑oriented approach, often volunteering
    to help peers troubleshoot projects while quietly preferring one‑on‑one collaborations.
  sports: Fariborz Lowery spends Saturday mornings hiking the nearby woods and spotting birds, plays defensive midfielder for the junior soccer club River Valley Rangers during the fall season, and occasionally
    swims at the community pool, favoring low‑key, nature‑linked exercise routines over competitive sports.
  arts: Fariborz Lowery channels their love for fantasy into comic‑style sketches inspired by artists like Jim Lee and manga creator Akira Toriyama, practices piano pieces ranging from Debussy’s "Clair
    de Lune" to the video game soundtrack of "The Legend of Zelda," and curates a tiny home gallery of LEGO sculptures, often sharing creations during library volunteer hours.
  travel: Fariborz Lowery prefers carefully planned family road trips, such as last summer’s visit to the Smithsonian National Air and Space Museum in Washington, D.C., enjoys short weekend camping excursions
    to the nearby lake and woods, and dreams of a future adventure to Tokyo’s Akihabara district to explore anime and manga culture, though budget and school commitments temper their travel ambitions.
  culinary: Fariborz Lowery favors creative meals, often crafting homemade Margherita pizza with fresh basil, experimenting with simple chicken teriyaki stir‑fry after watching cooking videos, and delights
    in breakfast blueberry pancakes, while occasionally foraging wild blackberries during lake outings, though they sometimes overindulge in sugary cereal before bedtime.
  core: Fariborz Lowery is a methodical young dreamer who blends a quiet love for art, robotics, and nature with a habit of over‑thinking decisions, a tendency to hoard allowance for future projects, and
    a gentle compassion that drives them to help peers despite their occasional worry‑filled moments.
background:
  cultural: Born and raised in White Lake, Wisconsin, Fariborz comes from a family of Iranian descent that retains Persian cultural traditions at home while embracing the Midwestern American lifestyle.
    He celebrates Nowruz with his family, speaks some Persian with his parents, and enjoys traditional dishes such as tahdig and ghormeh sabzi. Outside the home, he participates in local school events and
    outdoor activities typical of Oconto County. This blend of Iranian heritage and core Midwest values shapes his worldview, emphasizing hospitality, respect for nature, and a strong sense of community.
