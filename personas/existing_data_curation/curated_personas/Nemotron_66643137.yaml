  career_goals: Fariborz dreams of a future where he can protect the natural world and inspire others. He aspires to become a wildlife biologist or environmental engineer, blending his fascination with
    nature, methodical problem solving, and desire to help ecosystems. He also hopes to develop educational video games that teach kids about science and conservation, merging his coding skills and artistic
    abilities. Long‑term, he envisions a career that lets him serve his community as an environmental educator or outreach coordinator, fostering harmony between people and the environment.
