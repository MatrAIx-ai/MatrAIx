  hobbies: '[''Woodworking'', ''Home gardening'', ''Reading non-fiction biographies'', ''Cooking traditional Mexican cuisine'', ''Small book club'', ''Volunteer event setup for church'']'
  career_goals: Luis wants to translate his practical skills into a part‑time consultancy that helps neighbors with home repairs and small‑scale renovations, allowing him to work on a predictable schedule
    while staying close to his family. He is also considering earning a certification as an electrician to broaden his service offerings. Long‑term, he hopes to establish a modest family‑run repair shop
    that can provide steady income and a structured environment for him and his teenage children to learn trades. Additionally, he aims to mentor younger members of his community in budgeting and basic
    home maintenance.
