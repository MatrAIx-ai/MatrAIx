  career_goals: Although retired from formal employment, Amelia aims to deepen her impact on Springfield's cultural life. She aspires to launch a senior‑artist mentorship program that pairs experienced
    hobbyists with younger community members, fostering intergenerational creativity. She plans to continue documenting local oral histories, with a goal of compiling them into a community anthology. Amelia
    is also eager to master advanced digital photography, allowing her to capture and share images of local art installations and garden projects online. An additional ambition is to write and self‑publish
    a memoir reflecting on her life in the Midwest, highlighting the region’s evolving cultural landscape. She wishes to stay physically active by joining a weekly low‑impact dance class and to remain socially
    engaged through leadership roles at the senior center.
