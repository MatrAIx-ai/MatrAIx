personas:
  professional: Gabriel Vega is a senior aerospace engineer who leverages deep expertise in fluid dynamics, propulsion analysis, and advanced CAD tools like SolidWorks to design sustainable launch systems
    while they mentor junior colleagues and translate complex concepts into clear, actionable plans.
  sports: Gabriel Vega is an avid weekend hiker in the Angeles National Forest, a regular cyclist on the LA River bike path, a member of the local cyclists’ club River Riders, and a dedicated fan of the
    Los Angeles Dodgers, Los Angeles Lakers, and LA Galaxy, often blending their love of nature with a friendly rivalry in fantasy sports, and they enjoy organizing group rides for community bonding.
  arts: Gabriel Vega cultivates their artistic side by listening to folk singer Lila Downs and classic rock band Pink Floyd, devouring science‑fiction novels by Neal Stephenson, attending occasional performances
    of traditional dance during community festivals, and they enjoy Christopher Nolan’s films for their cinematic blend of science and storytelling.
  travel: Gabriel Vega prefers road‑tripping to national parks such as Yosemite and Grand Canyon, has explored the historic aerospace museums of Huntsville, Alabama, dreams of visiting the Kennedy Space
    Center and watching the aurora borealis in Iceland, and they balance travel plans with family obligations and budget considerations.
  culinary: Gabriel Vega is a passionate home cook who meticulously prepares mole poblano and hand‑rolled tamales for family gatherings, experiments with ingredients like ancho chiles, rich chocolate, and
    fresh oregano, enjoys occasional culinary excursions to Los Angeles’ diverse food markets, where they sample everything from street‑taco al pastor to Korean bibimbap.
  core: Gabriel Vega blends a curiosity for the cosmos with a grounded commitment to community, balancing rigorous engineering, family‑centered traditions, and a penchant for late‑night tinkering that sometimes
    steals their sleep, and they view each challenge as an opportunity to learn.
background:
  cultural: Gabriel grew up in a bicultural Mexican‑American household in South El Monte, a city with a strong Latino presence. At home, Spanish was spoken daily, and family traditions such as Día de los
    Muertos, Semana Santa, and weekend tamale‑making reinforced his cultural identity. The close‑knit community fostered a sense of collective responsibility, which is reflected in his cooperative work
    style and his commitment to mentorship. Gabriel’s Catholic upbringing instilled values of humility and service, while his exposure to both Mexican heritage and broader American culture cultivated a
    flexible worldview. He actively participates in local cultural events, volunteers with the Hispanic Engineers Association, and maintains strong ties with extended family across California and Mexico.
attributes:
  skills: '["Fluid dynamics", "Propulsion system analysis", "Structural mechanics", "CAD (SolidWorks, CATIA)", "ANSYS", "CFD Simulation", "MATLAB", "Python", "Data analysis and automation", "Project management",
