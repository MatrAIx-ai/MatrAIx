  hobbies: '["Model rocketry", "Arduino electronics", "Cooking Mexican cuisine", "Hiking", "Cycling", "Amateur astronomy", "Reading sci‑fi and technical books", "STEM outreach volunteering", "Family gatherings"]'
  career_goals: Gabriel aims to transition from senior engineer to a principal engineering role where he can shape the technical roadmap for sustainable launch systems, such as reusable rockets and low‑emission
    propulsion. He plans to obtain his Professional Engineer (PE) license within the next two years to formalize his expertise. In parallel, he wants to champion diversity and inclusion by expanding mentorship
    programs for underrepresented Latinx students in STEM, and eventually launch a consultancy focused on integrating environmentally responsible practices into aerospace projects. He also envisions contributing
    to a major satellite constellation project that serves underserved communities, aligning his engineering impact with social benefit.
