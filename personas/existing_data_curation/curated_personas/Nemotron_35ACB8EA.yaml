personas:
  professional: Robert Garmany, a 37‑year‑old carpenter and aspiring construction manager, converts his meticulous blueprint reading, disciplined scheduling, and uncompromising quality standards into every
    job site, laying the groundwork for his planned boutique custom‑furniture and cabinetry business in Las Vegas.
  sports: Robert Garmany, who tracks the Vegas Golden Knights and Las Vegas Raiders on game nights, sustains his fitness by hiking Red Rock Canyon trails and jogging with the Desert Breeze Runners club,
    balancing his love of outdoor endurance with occasional missed workout days when a construction deadline demands extra hours.
  arts: Robert Garmany, an avid fan of classic westerns like The Good, the Bad and the Ugly and of John Wayne’s stoic swagger, complements his hands‑on artistry by listening to Willie Nelson and Bob Dylan
    while brewing his own hoppy IPA, and he regularly attends local woodworking workshops to refine the sculptural details of his custom furniture.
  travel: Robert Garmany plans his travel like a project schedule, favoring well‑organized weekend road trips to Zion and Grand Canyon national parks for hiking inspiration while saving for a month‑long
    study tour of Japan’s traditional carpentry towns and a design‑focused pilgrimage to Italy’s Tuscan workshops.
  culinary: Robert Garmany enjoys pairing his home‑brewed American IPA with smoky Texas‑style brisket and his go‑to kitchen creations—spicy shrimp tacos with cilantro lime crema and a wood‑fired Margherita
    pizza—showcasing a competent but not gourmet level of cooking they hone on weekends.
  core: Robert Garmany is a structure‑obsessed craftsman who fuses disciplined project management with a creative love for woodworking, classic westerns, and home‑brewed beer, while battling a stubborn
    perfectionist streak that sometimes delays his own business launch.
background:
  cultural: Robert grew up in a middle‑class, working‑class family in a small town in the Midwest before moving to Las Vegas for better job opportunities. His family heritage is primarily German and Irish,
    and he was raised with a Protestant (Methodist) upbringing that emphasized hard work, self‑reliance, and community service. While he embraces the diverse, fast‑paced culture of Las Vegas, he maintains
    traditional values of punctuality, craftsmanship, and modest celebration of holidays like Thanksgiving and Independence Day, often sharing homemade dishes with friends and coworkers.
attributes:
  skills: '[''Blueprint reading'', ''Precision measuring'', ''Framing'', ''Finish carpentry'', ''Custom cabinet making'', ''Furniture design'', ''Project scheduling'', ''Cost estimating'', ''Team leadership'',
