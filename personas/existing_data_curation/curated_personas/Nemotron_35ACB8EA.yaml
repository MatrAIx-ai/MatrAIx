  hobbies: '[''Custom woodworking'', ''Model train building'', ''Hiking in Red Rock Canyon'', ''Homebrewing craft beer'', ''Carpentry workshops'', ''Classic western movies'', ''Jogging'']'
  career_goals: Robert aims to transform his hands‑on carpentry experience into a recognized mastery of the trade. Over the next five years he plans to complete his associate degree in construction management,
    obtain a Journeyman Carpenter certification, and pursue a Certified Construction Manager (CCM) credential. His long‑term ambition is to launch his own boutique custom‑furniture and cabinetry business
    in Las Vegas, while also expanding into managing larger residential renovation projects as a licensed contractor.
