persona_description: A water manager or conservationist who is concerned about the health and sustainability of water resources in the Dolores Project area, particularly in relation to the potential impacts
  of listing sensitive native fish species on the Dolores River and the Wild and Scenic Rivers Act. This person is actively involved in working with local partners, water managers, conservation groups,
  and other stakeholders to develop a Native Fish Implementation Plan and protect water supplies from the risks associated with listing the fish as threatened or endangered. They are also interested in
  addressing instream flow issues and seeking a one-year delay in implementing the federal plans to allow local negotiations to protect water rights and the health of the downstream environment.
