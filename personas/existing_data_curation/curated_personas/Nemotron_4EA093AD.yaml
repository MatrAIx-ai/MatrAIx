personas:
  professional: Enrique Neyra, a 35‑year‑old journeyman painter in Scranton, leverages his meticulous safety focus, bilingual client communication, and deep appreciation for art theory to deliver high‑quality
    interior and exterior finishes while planning each project down to the last brushstroke, all with a curiosity that drives him toward historic‑preservation certification and a future boutique mural business.
  sports: Enrique Neyra finds solace on the Lackawanna trails as a member of the local hiking club, occasionally joins a pick‑up basketball game at the community center, and follows the Scranton/Wilkes‑Barre
    RailRiders and the New York Giants with a quiet loyalty that reflects his reserved yet competitive streak.
  arts: Enrique Neyra immerses himself in the works of Frida Kahlo, Diego Rivera, and contemporary muralist Tara Donovan, frequenting the Scranton Cultural Center’s rotating exhibitions and community art
    workshops where he refines his watercolor technique while drawing inspiration from island‑landscape motifs and modern abstraction.
  travel: Enrique Neyra prefers meticulously planned solo hikes through the Appalachian Trail and short cultural trips to island destinations like Puerto Rico and Costa Rica, where he can capture coastal
    sunrise palettes for future murals, yet his budget constraints keep his wanderlust focused on nearby national parks and occasional weekend getaways.
  culinary: Enrique Neyra delights in cooking traditional island stew with yucca, pork, plantains, and fresh cilantro for his close‑knit friends, while his intermediate skill with a cast‑iron pot is complemented
    by a tendency to over‑season and occasionally forget to set the timer, turning relaxed gatherings into lively, aromatic learning experiences.
  core: Enrique Neyra blends meticulous craftsmanship with artistic curiosity, balancing methodical project planning, cautious finances, and a quiet love for solo hikes, all while wrestling with a habit
    of over‑thinking and a penchant for late‑night sketching sessions.
background:
  cultural: Enrique was born to Dominican immigrant parents who settled in the Scranton area when he was a child. Growing up bilingual, he carries the vibrant rhythms, culinary traditions, and close‑knit
    community values of the Dominican Republic, celebrating holidays like Independence Day and participating in local Latino festivals. The diaspora experience shaped his resilient work ethic and his appreciation
    for cultural expression through music, dance, and visual arts. While he embraces the American work culture of reliability and methodical planning, he remains deeply connected to his Caribbean roots,
    often incorporating Dominican motifs and colors into his artistic pursuits.
attributes:
