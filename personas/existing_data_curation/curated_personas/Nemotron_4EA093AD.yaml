  hobbies: '["sketching", "watercolor painting", "acrylic painting", "visiting art galleries", "reading art history", "reading Dominican literature", "cooking Dominican cuisine", "small group cooking gatherings",
    "journaling", "mindfulness meditation", "hiking", "nature walks"]'
  career_goals: Enrique aims to advance from a journeyman painter to a crew foreman and eventually launch his own boutique painting and decorative mural business, focusing on historic home restoration and
    culturally inspired murals in the Scranton area. He plans to earn a Pennsylvania Painting Contractor License and pursue certification in historic preservation painting techniques. His long‑term ambition
    is to blend his Dominican heritage with his artistic interests by creating community murals that celebrate Caribbean culture while establishing a reputable, sustainable enterprise.
