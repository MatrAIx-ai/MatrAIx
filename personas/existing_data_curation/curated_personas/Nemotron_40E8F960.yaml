  hobbies: '[''Abstract painting'', ''Salsa dancing'', ''Playing the tres (Cuban guitar)'', ''Cooking Cuban cuisine'', ''Reading philosophy'', ''Creative writing/poetry'', ''Citizen science (birdwatching)'',
    ''Gardening tropical plants'', ''Community theater participation'', ''Traveling (especially to Cuba)'', ''Exploring virtual reality experiences'', ''Meditation and mindfulness practice'', ''Journaling
    for emotional processing'']'
  career_goals: Though retired from formal employment, Enrique is driven to keep learning and giving back. He aims to mentor emerging engineers and artists, develop interdisciplinary workshops that fuse
    scientific inquiry with artistic expression, and create a series of illustrated short stories that celebrate Cuban heritage and imaginative thinking. He envisions publishing a reflective memoir that
    intertwines his scientific insights with personal narratives, volunteering at local senior centers to foster curiosity and mental wellness, and traveling to Cuba to reconnect with family and cultural
    roots. Additionally, he hopes to champion STEM education for underrepresented youth in his community.
