personas:
  professional: Enrique Garcia, a retired applied mathematician and engineer turned interdisciplinary mentor, blends their love for abstract art and community theater with a relaxed, improvisational approach
    to designing workshops that fuse computational modeling, visual storytelling, and cultural heritage, often juggling multiple ideas at once while occasionally missing deadlines due to their laid‑back
    organization, and they delight in seeing participants light up with curiosity.
  sports: Enrique Garcia, an avid bird‑watching enthusiast and casual fitness fan, joins a senior walking club that meets at the local park, follows the Miami Heat and Miami Marlins for basketball and baseball
    thrills, and participates in seasonal community salsa‑dance marathons that double as cardio workouts, and they bring their lively spirit to every practice, encouraging teammates with enthusiastic cheers.
  arts: Enrique Garcia, a passionate abstract painter and tres player, draws inspiration from the bold strokes of Jackson Pollock, the rhythmic storytelling of Celia Cruz, and the emotive performances of
    Lin‑Manuel Miranda, often starring in community theater productions that let them blend poetry, music, and visual art into lively shows, and they relish the applause as a source of creative fuel.
  travel: Enrique Garcia, who prefers immersive cultural trips over quick getaways, plans relaxed itineraries that include revisiting Havana’s historic plazas, exploring Viñales’ tobacco farms, and sampling
    art galleries in New York City, while balancing travel costs with their modest pension and family commitments, and they schedule each voyage with a careful eye on budget and cultural depth.
  culinary: Enrique Garcia, a skilled home cook, lovingly prepares traditional dishes like ropa vieja, tostones, and yuca con mojo, experimenting with fresh plantains and citrus‑infused marinades, often
    hosting potluck evenings where they showcase their ability to blend authentic flavors with a dash of culinary improvisation.
  core: Enrique Garcia, a curious yet slightly disorganized elder, channels their boundless imagination into art, science, and community, juggling a love for abstract expression, bird‑watching, and salsa
    while habitually misplacing their reading glasses and worrying about tomorrow’s schedule.
background:
  cultural: Enrique was raised in a Cuban‑American household in Florida, where Spanish was spoken at home and Cuban traditions—music, dance, food, and festivals—were woven into daily life. Growing up amidst
    the vibrant Cuban diaspora of Lee County, he internalized values of family solidarity, community participation, and cultural pride. While embracing American educational and professional pathways, he
    continuously integrates Cuban motifs into his artistic work and maintains strong ties to his heritage through language, cuisine, and annual celebrations such as Carnaval and Día de los Muertos. His
    bicultural identity fuels his desire to bridge scientific curiosity with the expressive spirit of his Cuban roots.
attributes:
