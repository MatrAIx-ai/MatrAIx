  hobbies: '[''Reading speculative fiction'', ''Watercolor painting'', ''Sketching'', ''Photography of historic sites'', ''Hiking in Shenandoah National Park'', ''Gardening'', ''Participating in local art
    workshops'', ''Board gaming'', ''Creative writing (poetry and short stories)'', ''Listening to philosophy and science podcasts'', ''Attending community theater'', ''Exploring new recipes and wine tasting'']'
  career_goals: Kristie aims to move into a supervisory or team‑lead position within the call‑center environment, where she can shape customer‑experience strategies and mentor a larger staff. She plans
    to enroll in an associate’s degree in Business Administration or Communications to deepen her managerial knowledge. Long‑term, she envisions becoming a Customer Experience Manager or a Training & Development
    Specialist, integrating her creative thinking into service‑design and knowledge‑base development. Parallel to her corporate aspirations, Kristie hopes to launch a part‑time freelance writing and handcrafted‑art
    business, allowing her to blend her artistic passions with entrepreneurial goals.
