  career_goals: Marilin aims to deepen her involvement in cultural preservation by establishing a weekly cooking workshop in Foley where she shares Cuban recipes with seniors and neighbors. She aspires
    to mentor younger Cuban-American families, offering guidance on navigating life in the South and fostering community ties. She also hopes to document her family's oral histories and compile them into
    a memoir that can serve as a resource for future generations. Additionally, Marilin seeks a leadership role on the board of the local multicultural center and wishes to travel back to Cuba for a family
    reunion within the next few years.
