personas:
  professional: Ella Dieudonne, a venerable business strategist, leverages half a century of entrepreneurial leadership and nonprofit board experience to mentor emerging entrepreneurs, while their charismatic,
    talkative style and love for art and technology make them a sought‑after speaker at community events, even as their relaxed, sometimes disorganized approach forces reliance on improvisation.
  sports: Ella Dieudonne follows the Baltimore Orioles and the Washington Capitals avidly, joins a senior walking club to stay active in spring, plays bridge and chess at the community center for mental
    sharpness, and occasionally practices gentle yoga, preferring low‑impact exercise that fits their flexible schedule.
  arts: Ella Dieudonne immerses themselves in the arts by attending gallery openings featuring works by Monet, Van Gogh, and Banksy, catching productions of 'Hamilton' and 'A Raisin in the Sun', and listening
    to live piano recitals by Lang Lang, while also curating an annual multicultural exhibit that showcases emerging local talent.
  travel: Ella Dieudonne prefers curated, low‑stress trips that blend heritage and relaxation, having revisited the historic streets of Charleston, taken a river cruise in the Chesapeake Bay, and dreamed
    of seeing the cherry blossoms in Kyoto, yet they typically book through senior‑friendly travel agencies and travel with their grandchildren when possible.
  culinary: Ella Dieudonne delights in cooking heirloom vegetable ratatouille, slow‑roasted rosemary chicken, and apple‑cinnamon crumble, drawing fresh herbs from their garden, and while their culinary
    skills are modest, they love to host tea parties featuring Earl Grey and locally sourced honey, though they sometimes forget to refrigerate leftovers.
  core: Ella Dieudonne is a 95‑year‑old charismatic mentor who blends strategic business acumen with a restless curiosity, using art, gardening, and storytelling to inspire others, even as they wrestle
    with anxiety, occasional disorganization, and a competitive edge.
background:
  cultural: Ella was born in 1930 into a close‑knit African‑American family in Baltimore, Maryland. Growing up during segregation, she witnessed the civil‑rights movement firsthand, which instilled a strong
    sense of resilience and community responsibility. Her family’s church served as a cultural hub, exposing her to gospel music, oral storytelling, and intergenerational solidarity. Over the decades, she
    has woven these traditions into her identity, celebrating Black artistic achievement through her advocacy for local artists and her participation in community festivals. Relocating to Bel Air, MD, she
    continues to honor her heritage by mentoring younger Black professionals and preserving the historical narratives of Maryland’s Black neighborhoods.
