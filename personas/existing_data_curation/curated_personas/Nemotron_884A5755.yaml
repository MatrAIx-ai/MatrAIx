personas:
  professional: Lourdes Coronado combines three decades of bilingual call‑center expertise with a methodical, organized approach, excelling at de‑escalating complex customer issues, training new hires,
    and designing process improvements, and they now aim to transition into a senior trainer or quality‑assurance lead while preparing to launch their weekend community Café Andino.
  sports: Lourdes Coronado keeps active by walking their Labrador, Max, with a neighborhood walking club three times a week, attending lively salsa dancing sessions at the cultural center, and cheering
    on the Chicago Fire during occasional MLS games, blending low‑impact cardio with rhythmic movement, and they relish the social camaraderie of these activities.
  arts: Lourdes Coronado sings in a community choir that specializes in Andean folk repertoire, often rehearsing pieces by artists like Carlos Vives and Eva Ayllón, and they complement their vocal pursuits
    with salsa dance lessons set to Tito Puente’s rhythms, while unwinding with historical novels from authors such as Isabel Allende.
  travel: Lourdes Coronado favors relaxed, well‑planned getaways, often taking their Labrador on scenic drives to the nearby lake district, has explored historic neighborhoods in Boston and Savannah, and
    they hold a long‑term wish to trek the high‑altitude towns of the Andes before strolling through the marble streets of Granada, Spain, blending cultural curiosity with family‑friendly itineraries.
  culinary: Lourdes Coronado excels at preparing traditional dishes like encebollado, fanesca, and hand‑folded empanadas, seasoning them with fresh coriander, ripe tomatoes, and a pinch of ají, while they
    brew strong café con leche for their Café Andino vision, and they delight in growing herbs and chilies in their backyard garden to enhance each recipe.
  core: Lourdes Coronado is a pragmatic yet outgoing senior who channels their three‑decade call‑center legacy into community mentorship, nurtures a backyard orchid oasis (sometimes neglecting them after
    long salsa nights), and they juggle disciplined budgeting with occasional splurges on exotic spices for their forthcoming Café Andino.
background:
  cultural: Lourdes was born in Quito, Ecuador, and immigrated to the United States in her early twenties, settling in New Jersey. Growing up in a close‑knit, Catholic family, she was immersed in Ecuadorian
    customs such as celebrating Carnaval, Día de los Difuntos, and the vibrant festivities of La Fiesta de la Mama Negra. Spanish remains her first language, and she maintains strong ties to the Ecuadorian
    diaspora through weekly gatherings at the local Latinx community center, where music, dance, and traditional foods are shared. Her cultural identity emphasizes family cohesion, respect for elders, hospitality,
    and a deep appreciation for Andean music and folklore, all of which continue to shape her interpersonal style and community involvement.
attributes:
  skills: '[''Customer Service'', ''Bilingual Spanish-English Communication'', ''Conflict De-escalation'', ''CRM Platforms (Zendesk, Salesforce)'', ''Data Entry & Documentation'', ''Process Improvement'',
    ''Team Training & Coaching'', ''Quality Assurance'', ''Time Management & Scheduling'', ''Active Listening'', ''Problem Solving'']'
  hobbies: '[''Cooking traditional Ecuadorian cuisine'', ''Gardening (vegetables, herbs, orchids)'', ''Walking with her dog in local parks'', ''Salsa dancing'', ''Participating in senior center activities
    (bingo, crafts)'', ''Community choir singing Latin folk songs'', ''Volunteering as a bilingual liaison for senior services'', ''Reading historical novels and genealogy research'']'
  career_goals: As she approaches retirement, Lourdes aspires to transition into a senior trainer or quality‑ assurance lead, where she can leverage her experience to mentor new representatives and shape
    service standards. She also envisions launching a weekend “Café Andino” in Lincoln Park, offering traditional Ecuadorian pastries and coffee, blending her love for community engagement with entrepreneurship.
    Additionally, she hopes to volunteer as a bilingual liaison for local senior services, assisting other Spanish‑speaking elders in navigating healthcare and social resources.
