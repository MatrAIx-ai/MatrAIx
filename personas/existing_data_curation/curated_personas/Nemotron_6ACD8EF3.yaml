  hobbies: '[''Acoustic guitar playing'', ''Group hiking'', ''Fishing'', ''Camping'', ''Attending powwows'', ''Community theater'', ''Volunteering at tribal community center'', ''Gardening'', ''Cooking
    traditional recipes'', ''Reading folklore and history'']'
  career_goals: Joselito aims to advance to an office manager or supervisory role within the next five years, leveraging his years of hands‑on experience to improve efficiency across his organization. He
    plans to complete his bachelor's degree in Business Administration to formalize his knowledge and open doors to higher‑level administrative leadership. Additionally, he aspires to lead community development
    projects that support the local American Indian population, such as creating culturally informed outreach programs and facilitating partnerships between tribal organizations and the broader Rainelle
    community. Embracing his curiosity, Joselito also hopes to integrate emerging digital workflow tools to modernize administrative processes while preserving the personal, relational touch he values.
