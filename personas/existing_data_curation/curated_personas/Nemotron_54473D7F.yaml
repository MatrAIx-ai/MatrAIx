  hobbies: '[''Photography (architectural & nature)'', ''Backyard gardening (heirloom vegetables, herbs, lavender)'', ''Watercolor painting'', ''Volunteer museum guide'', ''Woodworking'', ''Model railroading'',
    ''Book club (classic literature & philosophy)'']'
  career_goals: Now retired, Carlos channels his curiosity into lifelong learning and community contribution. He aims to serve as a volunteer mentor for emerging STEM talent at the local community college,
    offering workshops on engineering design thinking and ethical technology development. He plans to author a memoir-style book that weaves his experiences in high-tech engineering with reflections on
    art and culture, hoping to inspire a more humanistic approach to technology. Additionally, he seeks to launch a small regional "Tech-Art" symposium that brings together engineers, artists, and educators
    to explore unconventional intersections between science, design, and creative expression.
