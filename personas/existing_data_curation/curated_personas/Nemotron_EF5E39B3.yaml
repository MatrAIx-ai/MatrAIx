personas:
  professional: Hiram Wood is a reliable electric‑motor and power‑tool repair specialist who leverages two decades of hands‑on mastery, a flair for inventive fixes when standard parts run out, and a talent
    for translating technical jargon into clear advice, all while mentoring apprentices with a collaborative, safety‑first mindset and pursuing ISCET certification to launch a community‑oriented workshop
    that offers low‑cost repairs and free fix‑it clinics for seniors.
  sports: Hiram Wood enjoys playing Thursday‑night softball for the Berwyn Bumblebees, keeps fit by jogging along the Chicago lakefront in spring and lifting light weights at the community gym, follows
    the Chicago Cubs and the Chicago Bears passionately, and treats athletics as a social outlet rather than a competitive pursuit.
  arts: Hiram Wood nurtures a lifelong love of the arts by sketching Chicago’s skyline in charcoal during the Berwyn art walk, strumming acoustic guitar in a folk ensemble that covers Bob Dylan and traditional
    Klezmer tunes, attending off‑site shows at the Art Institute featuring works by Grant Wood and contemporary muralists, and letting visual and musical creativity inform their problem‑solving approach.
  travel: Hiram Wood favors low‑key road trips that blend DIY exploration with family time, spending long weekends camping in Michigan’s Upper Peninsula or visiting Milwaukee’s historic neighborhoods, and
    dreaming of a summer pilgrimage to the Masurian lakes region to experience traditional festivals, all while planning each itinerary on a spreadsheet to stay within the modest budget needed for their
    upcoming workshop.
  culinary: Hiram Wood enjoys cooking hearty home‑cooked meals, mastering pierogi stuffed with potato and cheese, grilling bratwurst seasoned with caraway seeds, and experimenting with smoky chipotle‑infused
    salsa, while using modest culinary skills to fix a broken kitchen appliance with a vintage tool before a dinner party, and they relish dining at local heritage‑inspired fusion spots like Mama’s Station.
  core: Hiram Wood is a curious middle‑aged repair wizard who often stays up tinkering with vintage tools, yet swaps late‑night bar visits for weekends restoring classic cars, driven by a community‑first
    ethic and a stubborn habit of over‑planning every project.
background:
  cultural: Hiram grew up in the blue‑collar suburbs of Chicago, raised in a family of Polish‑American descent that settled in the industrial neighborhoods of Cook County during the post‑war era. The community’s
    strong work ethic, Catholic traditions, and close‑knit neighborhood ties shaped his values of reliability, cooperation, and service to others. Berwyn’s mix of Polish, Mexican, and other immigrant cultures
    exposed him early to diverse perspectives, fostering his openness to unconventional ideas and his appreciation for multicultural art. He celebrates Polish holidays such as Święto Niepodległości (Independence
    Day) with family gatherings and traditional pierogi, while also participating in broader Midwestern community events like the Summer Festival. This blend of heritage and the region’s historic manufacturing
    legacy underlies his practical skill set and his compassionate, community‑focused outlook.
attributes:
  skills: '[''Diagnosing and repairing brushed and brushless electric motors'', ''Re‑winding motor coils and replacing bearings'', ''Interpreting wiring diagrams and service manuals'', ''Soldering electronic
    components and PCB repair'', ''Calibrating speed controls and power‑tool safety testing'', ''Creative troubleshooting with unconventional solutions'', ''Customer communication and technical explanation'',
    ''Training and mentoring apprentices'', ''Basic inventory management and repair tracking'']'
  hobbies: '[''Visiting art galleries and sketching local scenes'', ''Watercolor and charcoal drawing'', ''Playing acoustic guitar in a community folk group'', ''Participating in a neighborhood softball
    league'', ''Volunteering at the Berwyn Senior Center for free repair assistance'', ''Restoring vintage power tools as decorative pieces'', ''Working on classic car restoration projects with friends'',
    ''Reading science‑fiction novels and tech blogs'', ''DIY electronics projects (e.g., custom LED lamp)'', ''Attending local cultural festivals and street fairs'']'
  career_goals: Despite leaving school early, Hiram is driven to formalize his expertise. He plans to complete the International Society of Certified Electronics Technicians (ISCET) certification and a
    state‑approved Master Electrician track focused on motor repair. In the next five years he hopes to open a modest, community‑oriented workshop in Berwyn where he can offer low‑cost repairs, host free
    “fix‑it” clinics for seniors, and provide apprenticeship slots for at‑risk youth. He also envisions expanding his service portfolio to include maintenance of small renewable‑energy systems such as solar‑panel
    inverters and battery‑powered tools, aligning his technical skills with growing environmental concerns. Ultimately, Hiram wants to be recognized locally as a trusted resource who blends technical mastery
    with a genuine commitment to helping others.
