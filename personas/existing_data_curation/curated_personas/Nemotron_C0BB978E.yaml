  career_goals: David aims to advance into senior engineering leadership, targeting roles such as Director of Engineering or Principal Consultant, where he can champion sustainable product development and
    integrate artistic aesthetics into engineering solutions. He plans to obtain his Professional Engineer (PE) license, lead flagship projects that revitalize Danville’s manufacturing sector, mentor emerging
    engineers, and eventually launch a community makerspace that fosters interdisciplinary innovation.
