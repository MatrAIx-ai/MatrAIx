personas:
  professional: David Mcclannan is an accomplished mechanical engineer who leverages two decades of CAD mastery, data‑driven optimization, and Lean Six Sigma to lead cross‑functional teams, while his curiosity
    and competitive streak push him to blend artistic aesthetics into sustainable product designs, and his methodical planning guarantees projects stay on schedule.
  sports: David Mcclannan plays centre‑midfield for Danville United Soccer Club’s Division 3 league, follows the Virginia Tech Hokies football season with fan fervor, watches Washington Commanders NFL games
    on Sundays, and maintains a disciplined fitness routine that blends weekend league matches, early‑morning jogs along the Dan River, and strength training at the local CrossFit box, driven by his competitive
    nature.
  arts: David Mcclannan regularly immerses himself in the regional arts scene, attending gallery openings featuring local sculptor Maria Castillo, catching productions at the historic Danville Playhouse
    starring actor John C. Reilly, and enjoying live sets by the acoustic folk group The Willow Strings, while he strums his own acoustic guitar at community jam nights and draws creative inspiration from
    sci‑fi authors Isaac Asimov and design thinker Don Norman.
  travel: David Mcclannan prefers meticulously planned cultural trips, often spending long weekends exploring historic cities such as Charleston, South Carolina, and Savannah, Georgia, and has a bucket‑list
    that includes the medieval streets of Krakow, Poland, and the UNESCO temples of Kyoto, Japan, balancing his love of heritage with budget constraints that steer him toward off‑season airfare and modest
    boutique hotels.
  culinary: David Mcclannan approaches cooking like a prototype, experimenting with precision‑scaled recipes such as shrimp and grits made with fresh fire‑cooked corn, a slow‑braised beef bourguignon featuring
    heirloom mushrooms, and homemade sourdough nurtured with heritage wheat, yet his habit of over‑optimizing spice ratios occasionally leaves friends reaching for extra salt.
  core: David Mcclannan blends the analytical mind of an engineer with the restless curiosity of an artist, channeling his competitive edge into sustainable design, but often arrives late to gatherings
    because he’s fine‑tuning a new woodworking joint.
background:
  cultural: David’s cultural background is that of a white American raised in the Mid‑Atlantic South, specifically Virginia. He grew up in a middle‑class family that emphasized hard work, community service,
    and education. While rooted in the traditions of Southern hospitality and modest living, his parents encouraged exposure to broader cultural experiences, including music, theater, and museum visits,
    which nurtured his appreciation for art and new ideas. He identifies closely with Danville’s revitalizing spirit, blending regional values with a forward‑looking mindset.
