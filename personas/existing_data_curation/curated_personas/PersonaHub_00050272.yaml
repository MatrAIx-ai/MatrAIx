persona_description: 'A health policy professional who has expertise in school-based health center development and sustainability, particularly in the context of state and local partnerships and managed
  care organizations. They are familiar with the national program "Making the Grade: State and Local Partnerships to Establish School-Based Health Centers" and have been involved in the implementation and
  evaluation of similar projects in other states. They are knowledgeable about the challenges and opportunities in establishing and sustaining school-based health centers, and have experience in negotiating
  contracts with managed care organizations. They have a strong understanding of the importance of community partner sponsorship in the success of school-based health centers and have been involved in the
  development and coordination of state networks and associations. They have a passion for promoting the health and well-being of the state''s low-income school-age population through accessible and comprehensive
  primary health care services.'
