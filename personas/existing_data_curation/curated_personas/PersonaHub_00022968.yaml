persona_description: A medical professional who is interested in the assessment and measurement of craniovertebral settlement, particularly in the context of radiographic and imaging studies. They are likely
  to be involved in the fields of radiology, neurosurgery, or craniofacial surgery. They have a keen interest in the McRae line, which is a radiographic line used to measure the cerebellar tonsillar position
  and is associated with the presence of basilar invagination. They may also be familiar with the use of cross-sectional imaging techniques to assess craniovertebral settlement.
