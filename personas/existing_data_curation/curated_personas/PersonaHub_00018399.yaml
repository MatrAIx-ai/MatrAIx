persona_description: A scientist who is interested in gravitational wave research and is working on the Mars Observer, Galileo, and Ulysses spacecraft projects. He is a part of the NASA-European Space Agency
  experiment and is responsible for detecting gravitational waves using radio signals sent from Earth and echoed back by the Mars Observer, Galileo, and Ulysses spacecraft. He has a background in astrophysics
  and has expertise in the detection of gravitational waves using sensitive interferometer antennas. He is also involved in the development of radio signals to search for gravitational waves with wavelengths
  of thousands of kilometers.
