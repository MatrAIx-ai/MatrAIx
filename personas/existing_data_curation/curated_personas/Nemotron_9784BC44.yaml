  hobbies: '[''Gardening'', ''Cooking (Hispanic‑Southern fusion)'', ''Hiking in local parks'', ''Reading science magazines and historical fiction'', ''Participating in cooking contests'', ''Puzzle solving
    (crosswords, Sudoku)'', ''Volunteering at the library literacy program'', ''Community theater involvement'']'
  career_goals: Rosalia aims to re‑enter the professional world on a flexible, part‑time basis by offering data‑analysis consulting services to small businesses in the Franklin area. She also dreams of
    establishing a community STEM mentorship program for middle‑school students, drawing on her academic background and love for nurturing curiosity. Long‑term, she envisions publishing a cookbook that
    celebrates her Hispanic heritage while incorporating the seasonal produce of Middle Tennessee, thereby merging her culinary passion with her entrepreneurial ambition.
