personas:
  professional: Rosalia Delgado is a flexible, part‑time data‑analysis consultant who leverages her scientific curiosity and hands‑on problem‑solving mindset to deliver actionable insights for small businesses
    in Franklin, while embracing a relaxed, sometimes disorganized approach that lets them pivot between client projects, community STEM mentorship planning, and spontaneous garden experiments.
  sports: Rosalia Delgado enjoys weekend hikes on the Natchez Trace and casual tennis at the Franklin Country Club, while cheering for the Tennessee Titans and Nashville Predators; they join a local walking
    group that meets each Saturday, maintain a flexible fitness routine that sometimes skips scheduled sessions, and channel their competitive streak more into friendly cooking contests than into formal
    sports.
  arts: Rosalia Delgado acts in community theater productions, finding solace on stage with roles that echo family stories, while also immersing herself in historical fiction novels and the music of Bob
    Dylan and Nina Simone; they balance a love for narrative depth with a skeptical eye toward mainstream trends, and occasionally miss rehearsals when a garden project demands urgent attention.
  travel: Rosalia Delgado prefers road‑trip adventures that blend natural scenery with cultural stops, having driven to the Great Smoky Mountains and the historic streets of New Orleans, while planning
    future visits to Kyoto’s autumn gardens and the vineyards of Tuscany; they favor flexible itineraries that allow spontaneous detours for local festivals, though their relaxed planning style can sometimes
    lead to last‑minute accommodation scrambles.
  culinary: Rosalia Delgado crafts meals that fuse family‑style tamales and pozole with Southern comforts like shrimp and grits, using garden‑fresh cilantro, poblano peppers, and collard greens, and they
    meticulously test recipes for their forthcoming cookbook, though their competitive edge sometimes results in burnt tortilla shells during late‑night cooking marathons.
  core: Rosalia Delgado balances scientific curiosity with Southern hospitality, turning garden experiments and impromptu cooking duels into community connections, while they maintain a laid‑back, slightly
    disorganized nature that fuels a flexible yet competitive outlook on life.
background:
  cultural: Rosalia is a second‑generation Hispanic American of Mexican descent, raised in a bilingual household where Spanish and English were spoken interchangeably. Family gatherings feature traditional
    dishes like tamales and pozole, while living in Franklin, Tennessee has added a Southern flavor to her culinary repertoire. She celebrates cultural holidays such as Día de los Muertos and incorporates
    Southern hospitality into her social life. Her Catholic upbringing and strong emphasis on familial loyalty shape her values, and she actively participates in local Hispanic community events, bridging
    her cultural heritage with her Mid‑Southern environment.
