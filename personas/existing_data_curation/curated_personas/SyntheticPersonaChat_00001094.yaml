    User 2: That''s awesome! I''ve been dancing for about 10 years.

    User 1: Wow, that''s impressive! I wish I had started dancing earlier.

    User 2: It''s never too late to start!

    User 1: I know, but I''m not sure I have the time.

    User 2: You could always take a class on the weekends.

    User 1: I might have to look into that.

    User 2: There are also a lot of dance studios that offer drop-in classes.

    User 1: That''s a good idea. I''ll have to check it out.

    User 2: You should! It''s a lot of fun.

    User 1: I''m sure it is.

    User 2: What''s your favorite food?

    User 1: I love Mexican food.

    User 2: Me too! I love tacos and enchiladas.

    User 1: I love all of it! I could eat Mexican food every day.

    User 2: Same here! It''s so delicious.

    User 1: I''m glad we have something in common.

    User 2: Me too!'
