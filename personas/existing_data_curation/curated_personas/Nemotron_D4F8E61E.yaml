    book club'', ''Mentoring high‑school students'', ''Listening to jazz, soul, and classical music'']'
  career_goals: Ericka aspires to transition into a senior executive assistant role that includes strategic project‑management responsibilities and acts as a trusted advisor to C‑suite leaders. She plans
    to earn Certified Administrative Professional (CAP) and Project Management Professional (PMP) credentials to formalize her expertise. Long‑term, she hopes to become an office manager or chief of staff
    for a nonprofit arts organization, where she can blend her administrative acumen with her passion for creativity. She also envisions launching a boutique virtual administrative consulting practice focused
    on supporting women of color and organizations dedicated to diversity and inclusion. Mentoring emerging talent, championing inclusive workplace culture, and driving digital workflow transformation are
    central to her professional ambition.
