persona_description: A healthcare provider who specializes in monitoring fetal health during labor and delivery, using electronic fetal monitoring as a tool to ensure the safety and well-being of both the
  mother and the baby. They are experienced and knowledgeable in the use of various fetal monitoring techniques, including intermittent fetal heart checks, external monitors, internal monitoring, and transvaginal
  monitoring, and are familiar with the latest research and guidelines from the American College of Obstetricians and Gynecologists (ACOG) regarding the use of electronic fetal monitoring in low-risk pregnancies.
  They are dedicated to providing safe and effective care to their patients and are committed to promoting the health and well-being of both mother and baby during labor and delivery.
