personas:
  professional: John Scharnhorst, a 19‑year‑old aspiring master carpenter in Chicago, blends meticulous joinery expertise with an avant‑garde design sensibility, using SketchUp and AutoCAD to translate
    speculative furniture concepts into hand‑crafted pieces while they competitively benchmark their work against local artisans and diligently maintain every tool.
  sports: John Scharnhorst enjoys low‑key physical outlets such as indoor rock climbing at a nearby gym and occasional pick‑up basketball games with a close circle of friends, cheering for the Chicago Bulls
    and the Chicago Cubs while they channel competitive energy into personal strength goals rather than organized leagues.
  arts: John Scharnhorst frequents small abstract‑art galleries in Chicago like the Sumintra and the Asbury, draws inspiration from experimental musicians such as Tim Hecker, Aphex Twin, and Kaitlyn Aurelia
    Smith, and spends evenings sketching conceptual furniture while they collect limited‑edition prints and experiment with analog photography.
  travel: John Scharnhorst prefers meticulously planned weekend getaways, having explored the architectural river cruise of Chicago, a design‑focused trip to Milwaukee’s historic districts, and a solitary
    hike through Michigan’s Upper Peninsula, while they dream of a future pilgrimage to Kyoto’s traditional carpentry workshops and a summer study tour of Danish modern furniture studios.
  culinary: John Scharnhorst’s palate leans toward simple yet refined dishes like mushroom risotto, smoked salmon on rye, and a perfectly brewed French‑press coffee, they often experiment with wood‑smoked
    flavors in the backyard grill but occasionally succumb to late‑night pizza delivery as a stress‑relief snack.
  core: John Scharnhorst is a 19‑year‑old solitary wood‑craft visionary who fuses exacting carpentry with avant‑garde art, obsessively fine‑tuning tools while worrying about perfection and hoarding obscure
    experimental music riffs.
background:
  cultural: John is a white Midwestern American whose family lineage includes German and Polish immigrants who settled in the Chicago suburbs during the early 20th century. Raised in Glendale Heights, a
    predominantly working‑class community, he grew up within a strong tradition of hands‑on trades and community events such as county fairs. His upbringing emphasized self‑reliance, modest pragmatism,
    and a quiet appreciation for the region’s lakeshore and wooded parks. While his household observed cultural celebrations like Oktoberfest and Polish heritage festivals, his personal identity is chiefly
    shaped by the legacy of local carpenters and the craftsmanship ethic passed down through generations.
