  hobbies: '[''Scale Model Building'', ''Concept Sketching'', ''Speculative Fiction Reading'', ''Experimental Music Listening'', ''Abstract Art Gallery Visits'', ''Digital Illustration'', ''3D Rendering'',
    ''Guitar Playing'', ''Analog Photography'', ''Nature Walks'', ''Strategic Board Games'']'
  career_goals: John aims to become a master carpenter known for innovative, artistic pieces that blend functionality with avant‑garde design. He plans to complete a formal apprenticeship, earn journeyman
    certification, and eventually open his own boutique workshop where he can produce bespoke furniture for discerning clients. He also seeks collaborative opportunities with interior designers and architects
    on design‑build projects, hoping to establish a reputation across the Midwest for pushing the boundaries of traditional carpentry and showcasing his work at local craft fairs and design exhibitions.
