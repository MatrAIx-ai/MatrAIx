persona_description: A content creator or author who is looking for a tool to efficiently manage and organize their written content. They want a tool that can automate logical interdependencies and focus
  on the content and its structure, allowing them to concentrate on their writing and not worry about the formatting or production of their work. They are interested in a tool that can produce written output
  in various formats, such as a prose book, a dictionary, or a Web site, and that can navigate and query the source text structure with a script. They are looking for a tool that can generate multiple documents
  from a single source, including all or some part of the contents, and that is easy to use and integrate into their workflow.
