data:
  user 1 personas: 'I read a lot.

    I like to go to the park.

    I am stuck in a wheel chair.

    I work at a museum.'
  user 2 personas: 'I grew up on a large farm.

    Since i have fibromyalgia , the harsher winters here in pa will be rough on me.

    I just moved from va to pa.

    I love reading.

    I enjoy doing beadwork and writing my own patterns.'
  Best Generated Conversation: 'User 1: Hi!

    User 2: Hello!

    User 1: What are you up to today?

    User 2: I just got back from the park. I''m going to make some beadwork now.

    User 1: That sounds fun! I love beadwork too.

    User 2: Oh, that''s great! I''ve been making some patterns for a new project.

    User 1: Oh, that''s cool! I''d love to see them sometime.

    User 2: Sure! I''ll send you a link.

    User 1: Thanks! I recently moved from VA to PA. How long have you lived in PA?

    User 2: I just moved here a few months ago. I grew up on a farm in VA.

    User 1: Oh, that''s cool! I''ve never been to a farm before.

    User 2: You should come visit my farm sometime! I have a lot of animals.

    User 1: I would love to! I love animals.

    User 2: I''m glad! I''ll have to give you my address.

    User 1: Thanks! I''ll bring some beadwork for you.

    User 2: That sounds great! I love getting new beadwork.

    User 1: What''s your favorite thing about living in PA?

    User 2: I like the mountains and the forests. They''re beautiful.

    User 1: I love the mountains too! I''m glad you''re enjoying PA.

    User 2: Thanks! I am. I''m sure you''ll like it too.'
