personas:
  professional: Eloy Perez is a data‑driven procurement specialist at a regional wholesale distributor, leveraging bilingual negotiation skills, meticulous Excel forecasting, and a design‑savvy eye to secure
    competitive pricing while navigating vendor relationships with a competitive, skeptical edge.
  sports: Eloy Perez joins Saturday pick‑up soccer games in the local park, rooting for LAFC while also following the LA Galaxy, participates in a recreational basketball league, and supplements cardio
    with occasional gym sessions, though their fitness routine remains irregular because they prioritize social play over structured workouts.
  arts: Eloy Perez roams the Arts District to photograph vibrant murals, sketches at gallery openings, curates a blog that highlights contemporary Mexican artists such as Julio Galán alongside urban creators
    like Banksy, and lets that visual exposure steer their visual merchandising choices at work.
  travel: Eloy Perez favors short, culture‑rich trips, having explored Tijuana and Oaxaca for culinary research, taken a road trip along the Pacific Coast Highway, and dreaming of visiting Barcelona’s street‑art
    corridors and Osaka’s izakayas while keeping travel costs low by using credit‑card points.
  culinary: Eloy Perez enjoys experimenting with regional Mexican dishes like chilaquiles with mole verde, carnitas tacos, and chiles en nogada, boasting moderate cooking skills, a love for fresh chilies,
    corn masa, and epazote, yet often resorts to quick take‑out when work deadlines loom.
  core: Eloy Perez blends meticulous buyer instincts with a restless curiosity for art and food, juggling data‑driven negotiations by day and street‑mural photo‑journals by night, all while chasing the
    perfect mole recipe.
background:
  cultural: Eloy grew up in a close‑knit Mexican‑American community in El Centro, California, where family gatherings are anchored by traditional foods, music, and Catholic celebrations. Bilingual from
    childhood, he bridges cultural norms from both sides of the border, valuing respect for elders while embracing the entrepreneurial spirit common among local merchants. His heritage influences his appreciation
    for vibrant colors, storytelling through art, and a deep sense of community responsibility, all of which shape his personal and professional outlook.
attributes:
  skills: '[''Vendor Negotiation'', ''Market Trend Analysis'', ''Inventory Forecasting'', ''Supply Chain Coordination'', ''Data Analysis (Excel, SQL)'', ''Bilingual Communication (Spanish/English)'', ''Visual
    Merchandising'', ''Category Management'']'
  hobbies: '[''Street Art Photography'', ''Sketching'', ''Gallery Visits'', ''Soccer'', ''Reading Economics'', ''Documentary Watching'', ''Cooking Mexican Cuisine'', ''Exploring Retail Tech (AR/VR)'']'
  career_goals: Eloy aims to advance to a senior buyer position within the next two years, taking on larger product categories and leading a team of junior buyers. He plans to earn a Certified Professional
    in Supply Management (CPSM) credential and eventually transition into a category‑manager role overseeing private‑label development. Long‑term, he envisions launching his own import‑export business that
    brings traditional Mexican artisanal goods to U.S. retail markets, leveraging his competitive drive and keen eye for emerging trends to differentiate his offerings.
