    education support (IEP basics)'']'
  hobbies: '[''Reading (fiction and educational non‑fiction)'', ''Gardening (vegetable and herb garden)'', ''Photography (nature and urban scenes)'', ''Baking (artisan breads and pastries)'', ''Puzzle solving
    (crosswords, sudoku)'', ''Book club (small group discussions)'', ''Volunteer tutoring (literacy)'', ''Dog walking and hiking local trails'']'
  career_goals: Katherine aims to deepen her impact beyond her classroom by moving into instructional leadership. Over the next five years she plans to earn a master's degree in educational leadership,
    become an instructional coach or curriculum specialist for the Lakewood school district, and mentor new teachers through professional learning communities. She also hopes to design a district‑wide literacy
    initiative that blends evidence‑based practices with technology, while maintaining a balanced schedule that supports her personal well‑being.
