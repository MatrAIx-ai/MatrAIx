personas:
  professional: A detail‑driven retail specialist, Maria Garcia leverages her STEM degree, advanced Excel and basic Python automation, bilingual fluency, and disciplined organization to streamline cash
    handling, inventory reconciliation, and visually compelling store layouts, while championing data‑driven process improvements that reflect her curiosity and creative problem‑solving.
  sports: A member of the local hiking club and occasional recreational softball player, Maria Garcia roots for the Dallas Cowboys and Houston Astros, and she carves out early‑morning trail runs to maintain
    fitness, balancing competitive enthusiasm with a relaxed approach to weekend sports.
  arts: An avid watercolorist, Maria Garcia draws inspiration from visits to the Dallas Museum of Art and the contemporary gallery scene, often reverencing the works of Georgia O'Keeffe, Frida Kahlo, and
    Vincent van Gogh, while she also enjoys speculative worlds in novels by Neal Stephenson and Liu Cixin.
  travel: Maria Garcia prefers well‑planned road trips that combine cultural immersion and outdoor adventure, having trekked the Hill Country Willow Trail, explored historic Santa Fe, and bookmarked a future
    solo pilgrimage to the ancient ruins of Machu Picchu, all while balancing budget constraints with a desire for authentic experiences.
  culinary: Maria Garcia loves cooking the family’s traditional dishes such as tamales, salsa verde with tomatillos, and homemade corn tortillas, often experimenting with heirloom chiles, fresh cilantro,
    and toasted pepitas, while her cooking skill sits at an intermediate level, punctuated by occasional over‑salting that she corrects with a squeeze of lime.
  core: Maria Garcia blends analytical precision with artistic flair, channeling disciplined curiosity into retail process upgrades, watercolor canvases, and community‑oriented projects, all while juggling
    budget spreadsheets, health monitoring, and a penchant for spontaneous paint‑splattered detours.
background:
  cultural: Maria is a second‑generation Mexican‑American who grew up in the border town of Progreso, Texas. She was raised bilingual, speaking Spanish at home and English at school, and maintains strong
    ties to Mexican traditions such as Día de los Muertos, Las Posadas, and family gatherings centered around food and music. Her Catholic upbringing and close‑knit extended family have instilled values
    of community, resilience, and respect for cultural heritage. Living in Hidalgo County, she experiences a blend of Mexican customs and Texan influences, which shapes her identity and motivates her commitment
    to give back to the local community through education and the arts.
attributes:
  skills: '["Cash handling", "Numerical reconciliation", "Inventory management", "Microsoft Excel (advanced formulas, pivot tables)", "Basic Python scripting for data cleaning", "Process improvement", "Project
