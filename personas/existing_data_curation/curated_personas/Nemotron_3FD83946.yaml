  hobbies: '["Watercolor painting", "Visiting local art galleries and museums", "Reading science‑fiction and popular science books", "Gardening with native Texas plants", "Cooking traditional Mexican dishes",
    "Volunteering as a math tutor for middle‑school students", "Participating in community cultural festivals", "Solving puzzles and brain teasers", "Learning about emerging technologies", "Hiking on nearby
    nature trails"]'
  career_goals: Maria aims to transition from her current cashier role into a supervisory or analytical position within the retail sector, such as a shift manager or junior data analyst for a regional chain,
    where she can apply her STEM background and organizational prowess. She plans to obtain certifications in retail management and data analytics over the next two years. Long‑term, Maria envisions establishing
    a community hub in Progreso that blends art workshops with STEM outreach for local youth, leveraging her love of creativity and curiosity about new ideas to foster interdisciplinary learning.
