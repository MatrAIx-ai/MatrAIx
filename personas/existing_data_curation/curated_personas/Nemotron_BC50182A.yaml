  hobbies: '[''Basketball league'', ''Vegetable gardening'', ''Soul‑food cooking'', ''DIY home improvement'', ''Listening to R&B and gospel music'', ''Community volunteering and mentorship'']'
  career_goals: John aims to transition from a first‑line supervisor to owning his own landscaping business within the next five years, focusing on eco‑friendly services such as native plant installations
    and water‑wise irrigation. He also hopes to become a regional trainer for safety and sustainability protocols, sharing his practical knowledge with other crews across New Jersey. Long‑term, John envisions
    expanding his company to offer community outreach programs that teach youth basic horticulture and job‑ready skills, blending his love for mentorship with his professional expertise.
