personas:
  professional: John Agnew, a 35‑year‑old landscaping crew supervisor in New Jersey, blends his hands‑on expertise with commercial equipment, crew leadership, and a curiosity for eco‑friendly practices
    to deliver sustainable turf solutions, all while keeping a laid‑back, flexible schedule that sometimes leads to last‑minute task reshuffling.
  sports: John Agnew, an avid supporter of the New York Giants, Knicks, and Yankees, competes weekly in a local adult basketball league and incorporates community service, like park clean‑ups after games,
    into his fitness routine.
  arts: John Agnew’s artistic tastes swing from classic R&B icons such as Marvin Gaye to gospel powerhouse Kirk Franklin, while he also enjoys the comedic brilliance of Eddie Murphy and the contemporary
    drama of the film Moonlight, often playing these tracks while grilling for family gatherings.
  travel: John Agnew favors spontaneous road trips that combine family reunions in the South with relaxed beach stops in the Caribbean, typically planning itineraries on the fly but always penciling in
    must‑see community festivals like the annual Juneteenth celebration in Savannah.
  culinary: John Agnew cooks at an intermediate level, frequently reinventing soul‑food staples such as collard greens with smoked turkey, sweet‑potato pie drizzled with bourbon caramel, and shrimp étouffée
    using fresh herbs from his garden, while pairing meals with homemade cornbread and okra relish.
  core: John Agnew, a community‑focused landscaping supervisor with a love for soulful cooking, spontaneous garden projects, and a habit of juggling schedules with laid‑back charm, dreams of turning his
    crew into a green business that mentors local youth.
background:
  cultural: John identifies as African American and grew up in a close‑knit community in Plainfield, New Jersey. His family traditions emphasize togetherness, shared meals, and celebrating cultural milestones
    such as Juneteenth and church holidays. He was raised on a blend of Southern‑influenced soul food and the diverse culinary flavors of the Northeast, which he now incorporates into his cooking. John’s
    cultural heritage also influences his communication style—he values respect, openness, and fostering harmony within his crew and neighborhood. Regular participation in local church activities and community
    festivals reinforces his sense of belonging and cultural pride.
