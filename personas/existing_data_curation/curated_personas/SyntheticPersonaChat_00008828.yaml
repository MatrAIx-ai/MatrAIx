data:
  user 1 personas: 'Sometimes i feel like i have already been through life once before.

    I work as a freelance accountant.

    I freeze up in social situations.

    Once a year , i take a week off and head to florida.

    I was diagnosed with mild ocd in college.'
  user 2 personas: 'I have 3 roommates.

    I have a parakeet.

    My favorite color is orange.

    I am lactose intolerant.'
  Best Generated Conversation: 'User 1: Hi, my name is Ryan. I''m an accountant.

    User 2: Hi Ryan, my name is Emily. I have three roommates.

    User 1: Oh, that must be fun. I live alone.

    User 2: It is, but it''s also a lot of work.

    User 1: I can imagine. I live in a small apartment, so it''s not too bad.

    User 2: Me too. I have a parakeet, and I love him to death.

    User 1: That''s cute! I love animals, but I don''t have any of my own.

    User 2: I''m lactose intolerant, so I can''t eat a lot of dairy products.

    User 1: Oh, that must be tough. I love cheese, but I try to limit my intake.

    User 2: I can still eat some cheese, but I have to be careful.

    User 1: I guess that''s one way to look at it.

    User 2: Yeah, I try to focus on the positive.

    User 1: That''s a good attitude.

    User 2: Thanks.

    User 1: So, what do you do for fun?

    User 2: I like to go to the beach, hang out with my friends, and watch movies.

    User 1: That sounds fun. I like to go to the beach too, but I don''t have many friends.

    User 2: You can always make new friends!

    User 1: I know, but it''s hard.

    User 2: I know what you mean. It can be hard to meet new people.

    User 1: Yeah, especially when you have social anxiety.

    User 2: I have social anxiety too, but I''ve learned how to deal with it.

    User 1: How did you learn to deal with it?

    User 2: I started by talking to my therapist about it, and then I started doing things that made me uncomfortable.

    User 1: Like what?

    User 2: Like going to the grocery store by myself, and talking to strangers.

    User 1: That sounds hard.

    User 2: It was, but it''s gotten easier.

    User 1: I''m glad to hear that.

    User 2: Thanks.

    User 1: So, what else do you like to do?

    User 2: I like to read, write, and play video games.

    User 1: I like to read too, but I don''t have much time for it anymore.

    User 2: I know what you mean. Life gets busy.

    User 1: Yeah, it does.

    User 2: But it''s always good to make time for the things you love.

    User 1: I know, but it''s hard.

    User 2: I know what you mean. But it''s worth it.

    User 1: I know, it is.

    User 2: So, what are you looking forward to?

    User 1: I''m looking forward to going to Florida next week.

    User 2: That sounds like fun! I''ve never been to Florida.

    User 1: It''s a great place to visit.

    User 2: I''m sure it is.

    User 1: So, what are you doing for the rest of the day?

    User 2: I''m not sure yet. I might go to the park with my parakeet.

    User 1: That sounds fun. I''m going to go to the library.

    User 2: Have fun!

    User 1: Thanks, you too.'
