  hobbies: '[''Vegetable gardening'', ''River trail walking'', ''Reading science history and classic literature'', ''Model‑railroad building'', ''Woodworking projects'', ''Classic car restoration'', ''Puzzle
    solving (crosswords, logic games)'', ''Local historical society involvement'']'
  career_goals: Although Joshua is no longer in the formal workforce, he aims to channel his expertise into mentorship and community service. He hopes to lead a local STEM outreach program for high‑school
    students, sharing practical engineering projects that blend curiosity with real‑world applications. He also aspires to complete a personal woodworking masterpiece—a handcrafted heirloom chest—for his
    grandchildren, and to maintain his health through regular walking and low‑stress activities so he can continue supporting his wife and family.
