  hobbies: '[''Sketching'', ''Urban Photography'', ''Visiting Art Galleries'', ''Cooking Indian Cuisine'', ''Playing Basketball'', ''Reading Science Fiction'', ''Exploring Sustainable Practices'', ''Attending
    Cultural Festivals'', ''Listening to Experimental Music'']'
  career_goals: Raj aims to transition from on-site cleaning to a supervisory role in facilities management. He plans to enroll in a community college program for Facility Operations and obtain certifications
    such as OSHA Safety and Green Cleaning. His ambition is to lead a team of cleaners, implement eco-friendly protocols, and eventually launch his own boutique cleaning business that caters to art galleries
    and creative spaces. He is motivated by the prospect of being recognized as a top performer in his field and leveraging his artistic eye to create cleaner, more inspiring environments.
