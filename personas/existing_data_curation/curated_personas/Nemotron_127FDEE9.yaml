personas:
  professional: Raj Manda is a detail‑driven commercial cleaning specialist who leverages a keen aesthetic sense, meticulous chemical safety practices, and a competitive drive to streamline facility operations,
    while they eye a supervisory leap through OSHA and green‑cleaning certifications.
  sports: Raj Manda hits the community‑center basketball court three evenings a week, tracks progress with a fitness app, roots for the New York Knicks and the New England Revolution, and incorporates competitive
    drills to sharpen both stamina and strategic thinking.
  arts: Raj Manda spends weekends sketching Bridgeport’s vibrant murals inspired by Banksy and local street artists, frequents the Fairfield Arts and History Center to view works by Kehinde Wiley, and dances
    to the rhythmic beats of A. R. Rahman at South Asian cultural festivals, all while devouring sci‑fi sagas from authors like Neal Stephenson.
  travel: Raj Manda curates affordable weekend getaways, alternating between exploring the street‑art scene in Philadelphia and the historic bazaars of Marrakech, while they dream of a solo backpacking
    trek through the deserts of Morocco to photograph desert murals and taste authentic spice markets, all within a tight student‑budget plan.
  culinary: Raj Manda is a home‑chef who masterfully simmers dal makhani with a hint of smoked paprika, rolls handmade naan infused with garlic and cilantro, and regularly mixes turmeric‑studded quinoa
    bowls, while they still occasionally order a spicy ramen from the local hip‑ster spot when time runs thin.
  core: Raj Manda blends a competitive edge with an artist’s eye, turning every cleaning shift into a canvas for sustainable polish, while juggling midnight sketch sessions and a habit of never letting
    a half‑finished upcycle project sit untouched.
background:
  cultural: Raj is a second‑generation South Asian American of Indian (Gujarati) descent. Raised in Bridgeport, Connecticut, he grew up bilingual, speaking English at school and Gujarati at home. His family
    emphasizes hard work, respect for elders, and the importance of education, values that have shaped his disciplined approach to work. Celebrations such as Diwali, Holi, and regional festivals are central
    to his family life, and traditional Indian cuisine is a staple at home. While he embraces American customs and enjoys the multicultural fabric of his city, Raj retains a strong connection to his cultural
    roots through language, music, and community gatherings, which influence his worldview and personal identity.
