persona_description: Carol Totsky Hammett and Nicki Collins Geigert, the authors of "Read! Move! Learn!", are educators who specialize in teaching literacy for dual language learners. They are experts in
  outdoor learning, movement, play, and social emotional learning. They have published numerous books and articles on the importance of integrating movement and play in the classroom to enhance literacy
  and language learning. Their approach is innovative and holistic, using stories, music, movement, art, and science to connect literacy and movement. They are passionate about using nature and the world
  around them to teach children about language and emotions.
