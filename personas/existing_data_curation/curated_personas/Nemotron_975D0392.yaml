personas:
  professional: Michael Biamby works as a concrete finisher who blends meticulous OSHA-compliant craftsmanship with a laid-back attitude toward scheduling, constantly sharpening their mix-design calculations
    while they dream of a journeyman certification, an OSHA-30 credential, and one day leading their own Muskegon-area concrete-finishing crew.
  sports: Michael Biamby spends weekends shooting hoops at the local recreation center, playing forward for the Muskegon United Soccer Club, and cheering on the Green Bay Packers and Michigan State Spartans,
    while they also compete in a community basketball league that doubles as a social escape.
  arts: Michael Biamby drums in a weekend jazz-fusion band that riffs on the likes of Kamasi Cameron and Snarky Puppy, and they frequently attend live shows by Kendrick Lamar, Anderson Paak, and local R&B
    acts, letting the rhythms shape their creative outlet outside of construction.
  travel: Michael Biamby enjoys quick road trips to Chicago’s blues clubs, weekend camping on the Upper Peninsula’s Pictured Rocks, and dreaming of a summer road-trip along the Pacific Coast Highway, preferring
    spontaneous itineraries over rigid planning but they always budget carefully to fit their modest income.
  culinary: Michael Biamby experiments in the kitchen with Southern comfort staples like shrimp etouffee and collard greens, alongside Haitian classics such as griot and diri kole, and they consider themselves
    a competent home cook who delightfully over-spices dishes when entertaining family and friends.
  core: Michael Biamby is a sociable concrete finisher who balances a laid-back lifestyle with ambitious career goals, a penchant for late-night basketball, and an occasional habit of forgetting to lock
    the apartment door after a DIY project binge while they try to remember to set a reminder on their phone.
background:
  cultural: Michael identifies as African American with Haitian family roots, growing up in Muskegon where the Black community maintains strong ties to church, music, and family gatherings. His cultural
    upbringing blends traditional Haitian customs—such as speaking some Creole, celebrating Haitian Independence Day, and cooking dishes like griyo and rice and beans—with broader African‑American influences
    in the Midwest, including gospel music, hip‑hop, and community solidarity through local events and neighborhood networks. He values the work ethic and resilience of his ancestors and regularly participates
    in cultural festivals, church functions, and community service projects that celebrate Black heritage.
attributes:
  skills: '[''Concrete finishing'', ''Terrazzo installation'', ''Formwork construction and removal'', ''Blueprint reading'', ''Concrete mix design calculations'', ''Safety compliance (OSHA)'', ''Power tool
    operation'', ''Equipment maintenance'', ''Team coordination'', ''Problem solving on site'', ''Basic project scheduling'', ''Customer communication'']'
  hobbies: '[''Pick-up basketball'', ''Drumming'', ''Fishing on Lake Michigan'', ''Attending hip-hop and R&B concerts'', ''Community soccer league'', ''Volunteering at youth sports clinics'', ''Multiplayer
    video gaming'', ''Cooking Southern and Haitian dishes'', ''DIY home improvement projects'', ''Watching NFL games'']'
  career_goals: Michael aims to become a certified journeyman cement mason within the next two years, earn an OSHA 30‑hour certification, and obtain a supervisor credential that will allow him to serve
    as a foreman on large commercial projects. He plans to complete an associate degree in construction management to gain a broader understanding of project budgeting and scheduling, and to learn about
    green concrete technologies. In the longer term, he aspires to launch his own small concrete‑finishing business serving the Muskegon area, providing stable, predictable income for his family while mentoring
    younger workers from his community. Achieving these goals would reduce his financial stress and give him greater control over his work environment.
