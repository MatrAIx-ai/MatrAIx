  hobbies: '["DIY home renovation", "Electronics tinkering", "Photography", "Hiking", "Maker‑space meetups", "Electrical trade competitions", "Strategy video games", "Experimental cooking"]'
  career_goals: Looking ahead, Brianna aims to earn her master electrician license within the next two years and eventually launch her own contracting firm focused on sustainable residential upgrades, such
    as solar retrofits and smart‑home solutions. She wants to be recognized as a go‑to specialist in the Greater Cleveland area, leveraging her competitive drive to win local trade awards and secure larger
    commercial contracts. While she values flexibility, she plans to structure her business to allow for a balanced schedule that accommodates her love of hands‑on projects and occasional downtime. In addition,
    she hopes to volunteer as a guest instructor at a regional technical college, sharing her practical knowledge with the next generation of tradespeople.
