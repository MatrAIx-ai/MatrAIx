personas:
  professional: Brianna Soth, a journeyman electrician with a knack for blending hands-on wiring expertise and DIY automation, leverages her curiosity and competitive edge to mentor apprentices, win regional
    trade challenges, and design sustainable retrofits that push the boundaries of NEC compliance while often juggling projects in a delightfully disorganized, flexible manner.
  sports: Brianna Soth fuels her fitness regimen by hiking the Cuyahoga Valley trails each weekend, joining the local Cleveland Rock-Climbing Club for winter bouldering, cheering for the Cleveland Browns
    on Sundays, and occasionally shooting hoops at the community gym, blending competitive spirit with a love for solitary outdoor challenge.
  arts: Brianna Soth captures industrial grandeur and cascading waterfalls with a Nikon D750, drawing inspiration from Ansel Adams and photographer Edward Burtynsky, while her playlists feature progressive
    rock legends like King Crimson and the ambient textures of Brian Eno, feeding her creative drive during both solo shoots and maker-space evenings.
  travel: Brianna Soth prefers spontaneous, road-trip style travel that balances adventure and budget, having explored the Hocking Hills State Park for weekend hikes, trekked to Niagara Falls for its power-plant
    tours, and plotted a future trek to Iceland's geothermal sites to merge her love of renewable energy with awe-inspiring landscapes.
  culinary: Brianna Soth treats her kitchen as a lab, skillfully whipping up experimental dishes like smoked beet risotto with rosemary-infused olive oil, sous-vide spiced chicken thighs, and occasional
    craft kombucha batches, while always keeping a stash of fresh herbs, locally sourced honey, and a trusty Arduino-controlled temperature probe for precision.
  core: Brianna Soth is a competitively curious electrician-maker who juggles disorganized flexibility with a relentless drive to blend sustainable tech, rugged outdoor pursuits, and experimental creativity
    into every facet of life.
background:
  cultural: Brianna was raised in a middle‑class, predominantly white, Midwestern community in the Greater Cleveland area. Her family traces its roots to German and Polish immigrants who settled in Ohio
    during the early 20th century, and the region’s industrial heritage—particularly manufacturing and electrical trades—has shaped her values of practicality, self‑reliance, and a strong work ethic. While
    she respects traditional community customs, her curiosity drives her to blend conventional techniques with new technologies, reflecting a balanced view of tradition and innovation.
attributes:
  skills: '["Residential wiring", "Commercial wiring", "Electrical troubleshooting", "Blueprint reading", "NEC compliance", "Conduit bending", "Solar panel installation", "Smart‑home automation", "Project
