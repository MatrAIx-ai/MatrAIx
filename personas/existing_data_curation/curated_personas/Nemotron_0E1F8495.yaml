personas:
  professional: Glenda Stepps, a 26‑year‑old pharmacy technician, merges exacting compounding expertise with emerging health‑informatics acumen, using PioneerRx, Epic, and Python data scripts to cut prescription
    errors while energizing the team with improv‑style presentations in staff meetings.
  sports: Glenda Stepps, an avid hiker of Great Falls Park's rugged trails, joins a local co‑ed volleyball league, practices yoga three times a week for mental steadiness, and roots for the Washington Capitals
    in hockey and D.C. United in soccer.
  arts: Glenda Stepps, a regular at the local improv troupe and Toastmasters club, loves attending performances by the Kennedy Center and the National Theatre, and draws creative inspiration from the eclectic
    sounds of Björk, the funk of Liz Lizzo, and the classic rock storytelling of Fleetwood Mac.
  travel: Glenda Stepps prefers weekend getaways that blend nature and food, having recently trekked the Blue Ridge Mountains and indulged in a culinary tour of Asheville's farm‑to‑table scene, while planning
    a spring safari in Botswana as a longer‑term dream that fits within their disciplined savings plan.
  culinary: Glenda Stepps, an adventurous home chef, has mastered Ethiopian injera, Korean kimchi, and Spanish paella, frequently hosts themed dinner parties where they pair each course with craft beers
    and meticulously log guest feedback in a shared Google Sheet.
  core: Glenda Stepps is a curiosity‑driven, sociable pharmacy technician who balances precise compounding with spontaneous dinner parties, keeps a steady intake of caffeine, and occasionally overbooks
    their calendar with improv rehearsals.
background:
  cultural: Glenda was raised in a suburban community in the Washington, D.C. metropolitan area, where exposure to a diverse population shaped her inclusive worldview. Her family's roots trace back to Midwestern
    American ancestry, and family traditions such as Thanksgiving gatherings and summer barbecues remain important. Growing up near the nation's capital, she frequently visited cultural institutions—the
    Smithsonian museums, cultural festivals, and historic sites—which fostered her appreciation for a broad range of perspectives. In Arlington, she participates in neighborhood events, supports local farmers'
    markets, and volunteers with community health outreach programs, reflecting her blend of mainstream American cultural values and a commitment to civic engagement.
attributes:
  skills: '[''Prescription verification'', ''Medication compounding (sterile and non-sterile)'', ''Pharmacy software (PioneerRx, Epic)'', ''Pharmacology knowledge'', ''Drug interaction assessment'', ''Inventory
    management'', ''Regulatory compliance (HIPAA, DEA)'', ''Quality assurance auditing'', ''Laboratory techniques (pipetting, assay validation)'', ''Data analysis (Excel, Python)'', ''Patient counseling'',
    ''Staff training and team coordination'']'
  hobbies: '[''Hiking'', ''Urban gardening'', ''Cooking international cuisines'', ''Improv comedy'', ''Toastmasters/public speaking'', ''Reading science fiction'', ''Puzzle solving (Sudoku, crosswords)'',
    ''Yoga'', ''Volunteering at free-clinic pharmacy'', ''Mentoring pharmacy technician students'']'
  career_goals: Glenda aspires to deepen her clinical expertise and transition into a leadership role within pharmacy operations. In the next three years she plans to complete a Certified Pharmacy Technician
    (CPhT) credential, obtain certifications in immunization administration and sterile compounding, and enroll in a part-time PharmD program at a nearby university. Her long-term ambition is to become
    a clinical pharmacist specializing in outpatient care, where she can apply her analytical background to optimize medication therapy management. Concurrently, she aims to lead process-improvement initiatives
    that integrate health informatics tools to enhance prescription safety and workflow efficiency. Ultimately, Glenda envisions taking on a pharmacy manager position or launching a community-focused pharmacy
    that provides preventive health services and education.
