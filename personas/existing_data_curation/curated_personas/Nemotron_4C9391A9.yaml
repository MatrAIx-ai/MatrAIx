personas:
  professional: Eric Owens—a seasoned retail salesperson with 15 years mastering customer diagnostics, inventory control, and data‑driven POS solutions—leverages a disciplined, skeptical mindset to mentor
    new hires, benchmark store performance, and pilot emerging technologies, which they pursue while eyeing a store‑manager promotion within two years.
  sports: Eric Owens spends weekends tackling the Columbia River Gorge’s steep trails, logs fifteen‑mile runs for stress relief, cheers for the Portland Timbers and follows the Oregon Ducks basketball team,
    belongs to a local hiking club that meets every Saturday morning, and they also enjoy tracking personal bests on Strava.
  arts: Eric Owens cultivates a strategic appreciation for board games and chess, regularly hosting Stonemaier Games’ Wingspan tournaments with friends, while they indulge in folk‑rock legends like The
    Avett Brothers and attend regional craft‑beer festivals that blend their love of brewing with live acoustic performances.
  travel: Eric Owens prefers meticulously planned road trips to the Pacific Northwest’s scenic spots—having hiked in Bend, Oregon, and sampled Belgian ales in Brussels—while they budget for a future culinary
    tour of Japan’s coffee culture, balancing adventure with their disciplined financial outlook.
  culinary: Eric Owens brews a crisp summer ale infused with locally sourced Pacific Northwest cherries and Simcoe hops, perfects a bold coffee roast for their prospective shop, and enjoys cooking smoked
    salmon with dill and quinoa, savoring the balance of robust malt, fresh herbs, and seasonal produce, which they often pair with artisanal cheese.
  core: Eric Owens is a fiercely organized retail professional who channels a competitive, data‑driven mindset into hiking, home‑brewing, and strategic board games, while they relentlessly pursue managerial
    advancement and a future boutique café.
background:
  cultural: Eric grew up in a middle-class, white family in the Pacific Northwest, raised in the suburbs of Portland before settling in Fairview, Oregon. The region's emphasis on self-reliance, environmental
    stewardship, and a pragmatic work ethic shaped his practical, achievement-driven outlook. His high-school education gave him a solid grounding in basic academics, while community involvement—such as
    volunteering at the local park clean-up and participating in the neighborhood coffee co-op—instilled a modest appreciation for collective responsibility, even as he prioritizes personal goals. The cultural
    mosaic of Multnomah County, with its blend of progressive values and rugged outdoor lifestyle, informs his balanced blend of curiosity and practicality.
