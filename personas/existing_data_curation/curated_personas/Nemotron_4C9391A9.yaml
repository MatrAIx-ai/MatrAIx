  career_goals: Eric aims to transition from a floor salesperson to a store manager within the next two years, leveraging his track record of exceeding sales quotas and his systematic approach to operations.
    In the longer term, he aspires to become a district manager overseeing multiple locations, where he can implement region-wide best-practice programs and mentor emerging talent. He is also exploring
    the possibility of launching a boutique coffee-and-brew shop that combines his love for craft beer with his retail expertise, for which he is enrolling in a part-time business management course and
    pursuing a Retail Management Certification. His overarching ambition is to be recognized as a top-performing leader who balances solid financial results with efficient, customer-focused store environments.
