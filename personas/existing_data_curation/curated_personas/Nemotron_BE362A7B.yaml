  career_goals: Nubia aspires to become a senior HR leader—ideally an HR Director—where she can shape an organization’s culture around creativity, well‑being, and inclusive collaboration. She aims to integrate
    arts‑based learning into corporate training, expand mental‑health initiatives, and mentor emerging HR professionals. Long‑term, she hopes to author a book on blending creative thinking with human‑resource
    strategy and to launch a consultancy that helps companies cultivate innovative, harmonious workplaces while also supporting community arts programs in the Nebraska region.
