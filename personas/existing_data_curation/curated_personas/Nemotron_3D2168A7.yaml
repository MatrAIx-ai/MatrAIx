personas:
  professional: Juanita Williams leverages a strong technical foundation in health information management, mastering Epic and Cerner while translating complex informatics standards for clinicians, and uses
    they detail‑driven analytical skills to lead workflow optimization projects that balance structure with the flexibility needed to keep their team energized.
  sports: Juanita Williams enjoys weekend hikes on Camelback Mountain with the Arizona Hiking Association, follows the Phoenix Suns and Arizona Cardinals, participates in a local co‑ed soccer league, and
    prioritizes staying fit through dance classes and active social outings.
  arts: Juanita Williams immerses themselves in R&B and jazz at venues like The Van Buren, practices Afro‑Latin and contemporary dance, finds inspiration from musicians such as H.E.R., Leon Bridges, and
    Robert Glasper, and contributes to a book club that discusses contemporary fiction by authors highlighting underrepresented voices.
  travel: Juanita Williams prefers spontaneous weekend road trips to desert escapes like Sedona and the Grand Canyon, dreams of exploring the cultural richness of Oaxaca, plans trips with a balance of adventure
    and relaxation, and often blends travel with community outreach by volunteering at health fairs in nearby towns.
  culinary: Juanita Williams experiments with modern twists on classic soul food, creating dishes like quinoa‑infused collard greens, sweet‑potato mac & cheese seasoned with smoked paprika, and miso‑glazed
    shrimp and grits, while sourcing fresh ingredients at farmer’s markets and balancing flavor with nutrition.
  core: Juanita Williams blends analytical precision with charismatic sociability, turning health data into community empowerment while dancing through life’s rhythms and occasionally letting spontaneity
    outpace strict planning.
background:
  cultural: Juanita was born and raised in Phoenix to parents who migrated from the Southeast United States during the 1970s. Growing up in a close-knit African-American neighborhood, she was immersed in
    church-centered community life, celebration of Juneteenth, and the tradition of collective support. Her family emphasized education and resilience, guiding her toward a STEM degree and a career in health
    information. While she embraces the vibrant desert culture of Arizona—enjoying outdoor activities and the city's growing arts scene—she also stays connected to Black cultural roots through local African-American
    professional networks, attending Black History Month events, and supporting initiatives that address health disparities in the Phoenix metropolitan area.
attributes:
  skills: '[''Electronic Health Record Management'', ''Medical Coding (ICD-10/CPT)'', ''HIPAA and HITECH Compliance'', ''Data Analysis (SQL, Tableau)'', ''Quality Assurance Auditing'', ''Health Informatics
    Standards (HL7, FHIR)'', ''Stakeholder Communication'', ''Staff Training and Onboarding'', ''Process Improvement'', ''Project Coordination for EHR Implementations'']'
  hobbies: '[''Community health fair volunteering'', ''Afro-Latin dance classes'', ''Hosting game nights'', ''Cooking modern soul food'', ''Hiking desert trails'', ''Succulent gardening'', ''Attending R&B
    and jazz concerts'', ''Reading contemporary Black fiction'', ''Participating in a book club'', ''Improv comedy workshops'']'
  career_goals: Juanita aims to advance from a medical records specialist to a senior health information manager overseeing a multi-site network. She plans to earn the RHIA certification and complete a
    Master's in Health Informatics within the next three years. Her long-term ambition is to lead the implementation of interoperable data platforms that enhance patient outcomes while championing health
    equity for underserved Black communities in Phoenix. She also wants to mentor emerging Black women in health IT, develop a community data-literacy program, and publish best-practice guides on flexible
    yet compliant record-keeping processes.
