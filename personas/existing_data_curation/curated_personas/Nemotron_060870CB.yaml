  hobbies: '["Cooking traditional Puerto Rican cuisine", "Gardening (herbs and tropical plants)", "Listening to salsa, plena, and bolero music", "Attending local festivals", "Reading romance novels", "Crocheting
    and knitting", "Volunteering at the community church"]'
  career_goals: Beatriz aims to transition from a general office clerk to a supervisory role such as Office Manager or Team Lead within the municipal office. She plans to complete a bachelor’s degree in
    Business Administration part‑time to strengthen her managerial credentials. Her ambition is to streamline office workflows, mentor younger employees, and contribute to a harmonious workplace culture.
    Ultimately, she wants to secure a stable position that offers a reliable pension and allows her to retire comfortably while continuing to support community initiatives in Carolina.
