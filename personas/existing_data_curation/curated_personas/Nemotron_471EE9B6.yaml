    work at community center'']'
  career_goals: Elias aims to pursue a career that blends his curiosity about how things work with practical, hands‑on work. He is interested in becoming an automotive technician or a certified electrician,
    and is also exploring the possibility of learning computer networking and hardware repair. He plans to enroll in a vocational program at his local technical school after completing his sophomore year,
    earn an apprenticeship, and eventually obtain industry certifications. He hopes to eventually open his own small repair shop that serves the Bluffton community, while also contributing to local youth
    mentorship programs.
