personas:
  professional: Elias Costello, a 15‑year‑old aspiring robotics enthusiast, blends his love for tinkering with small engines and building model airplanes with a methodical, team‑oriented approach, often
    taking the lead in designing simple autonomous robots for his school club while balancing his curiosity for new programming tricks with a practical focus on reliability.
  sports: Elias Costello enjoys weekend fishing at nearby lakes, plays in the Bluffton High School Bulldogs baseball team during spring, follows the Indianapolis Colts and Indiana Pacers avidly, and volunteers
    with the local youth sports league, where they help organize community basketball tournaments.
  arts: Elias Costello spends free evenings listening to the electronic beats of Daft Punk and the indie rock of The Strokes while devouring science‑fiction novels by Andy Weir, and they occasionally sketch
    model airplane designs inspired by the artwork of H.R. Giger, finding that these artistic influences shape their imagination.
  travel: Elias Costello prefers short, budget‑friendly road trips, having camped at Shades State Park and visited the bustling streets of Chicago for a weekend music festival, while dreaming of a future
    trip to Tokyo to explore robotics museums and the cultural anime scene.
  culinary: Elias Costello favors hearty farm‑fresh fare like fried catfish with corn mush and apple pie, enjoys cooking a DIY chili using ground beef, kidney beans, and smoked paprika, and treats themselves
    to pepperoni pizza topped with extra mozzarella after long gaming sessions.
  core: Elias Costello is a curiosity‑driven, practical teen who balances a love for hands‑on engineering and sci‑fi storytelling with modest budgeting, a penchant for fishing, and occasional procrastination
    on schoolwork.
background:
  cultural: Elias grew up in Bluffton, Indiana, a small Midwestern town with a predominantly White population and strong community ties. His family practices mainstream Protestant values, emphasizing hard
    work, self‑reliance, and modesty. The local culture celebrates agricultural roots, high‑school sports, and community events such as county fairs. These influences have fostered in Elias a respect for
    tradition, a collaborative spirit, and an appreciation for practical skills. He is also exposed to broader cultural ideas through the internet and school curriculum, which feeds his curiosity beyond
    his immediate surroundings.
