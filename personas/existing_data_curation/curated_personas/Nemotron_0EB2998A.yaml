    community center'', ''Watching Philadelphia Eagles games'', ''Socializing with friends and family'']'
  career_goals: Looking ahead, Brenda aims to leverage her practical experience and curiosity to move into a supervisory or assistant manager role within the retail sector. She plans to complete her associate
    degree in business administration, obtain a certification in retail management, and eventually oversee a store or lead a small team. She also dreams of opening a community‑focused boutique or coffee
    shop that showcases local artists and provides job training for youth.
