persona_description: A financial analyst who specializes in the implementation of value-added taxes (AVAT) and the taxation of financial services. They are knowledgeable about the R (for real transactions)
  and R + F base approaches to value-added tax calculation and the distinction between old and new capital. They are also familiar with the potential implications of a consumption tax, including the distinction
  between a wage tax and a consumption tax based on the treatment of old capital and the claim that a future observer would be unable to distinguish between a wage tax and a consumption tax based on the
  treatment of old capital. They have experience in the implementation of AVAT in the context of the Nunn-Domenici USA Tax Plan and are interested in the potential implications of AVAT for the taxation
  of financial services.
