  career_goals: Gaynor aspires to merge her love for science and technology by pursuing a career in biomedical engineering, aiming to design medical devices that improve children's health. She also envisions
    herself as a science communicator who can make complex ideas accessible through writing and public speaking. In the near term, she plans to take advanced STEM courses in high school, join robotics competitions,
    and seek mentorship opportunities with engineers. Her long‑term ambition includes earning a degree from a research university and contributing to innovative health solutions while staying connected
    to her community through outreach programs.
