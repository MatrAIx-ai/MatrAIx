persona_description: A member of the Institute for Astronomy at the University of Hawaii, who is interested in astronomy and is looking for information on recent developments in the field, including the
  detection of the biggest explosion ever seen, the temperature of stars, and the appearance of galaxies. They are also interested in learning about the demonstration of how things behave in a vacuum and
  how astronomers can see in the dark. Additionally, they are interested in the opportunity to play Astro-Jeopardy, simulate a Mars landing using a raw egg, and travel through space in our StarLab planetarium.
  They are looking for information on how to stop a falling egg from breaking, how to see the sunspots on the Sun, and whether "dark matter" matters.
