  Best Generated Conversation: 'User 1: What do you do for fun?

    User 2: I like to play basketball and listen to music.

    User 1: I like basketball too! I used to play in high school.

    User 2: Oh, that''s cool! What position did you play?

    User 1: I was a shooting guard.

    User 2: Nice! I was a point guard.

    User 1: Do you still play?

    User 2: No, not really. I''m too old now.

    User 1: I know what you mean. I miss playing, but I don''t have the time anymore.

    User 2: Yeah, it''s hard to find the time to play.

    User 1: So, what do you do for work?

    User 2: I''m a music producer.

    User 1: Oh, that''s cool! What kind of music do you produce?

    User 2: I produce all kinds of music, but I mostly do hip-hop and R&B.

    User 1: That''s awesome! Do you have any songs out?

    User 2: Yeah, I have a few songs out. You can check them out on my SoundCloud.

    User 1: I will!

    User 2: So, what do you do for fun?

    User 1: I like to go to the gym, hang out with friends, and play video games.

    User 2: Oh, that''s cool! I like to do those things too.

    User 1: Do you have any pets?

    User 2: Yeah, I have a dog named Max.

    User 1: I love dogs! What kind of dog is he?

    User 2: He''s a golden retriever.

    User 1: Oh, that''s cool! I love golden retrievers.

    User 2: Yeah, they''re the best.

    User 1: So, what''s your favorite thing to do with Max?

    User 2: I like to take him for walks, go to the park, and play fetch.

    User 1: Oh, that sounds fun! I love taking my dog to the park.

    User 2: Yeah, it''s great exercise for both of you.

    User 1: Yeah, it is.

    User 2: So, what''s your favorite thing to do in the summer?

    User 1: I like to go to the beach, go swimming, and play in the sun.

    User 2: Oh, that sounds like fun! I like to do those things too.

    User 1: So, what are you doing later this week?

    User 2: I''m not sure yet. What are you doing?

    User 1: I''m not sure either. Maybe we could hang out?

    User 2: That sounds like fun! I''m free on Friday.

    User 1: Great! Let''s go to the beach.

    User 2: Sounds good!'
