persona_description: A materials scientist who is interested in the electrochemical synthesis and characterization of polymer-based materials, particularly poly(3-methylthiophene) (PMeT). They are skilled
  in the development and optimization of electrochemical processes for the fabrication of polymer-based electronic devices and have a particular interest in the properties of undoped PMeT and its interactions
  with other materials, such as copper and nickel. They are also familiar with the use of current-voltage characteristics to determine the mobility and carrier density of PMeT and have conducted experiments
  to observe the enhancement of mobility by electrochemical inclusion of copper.
