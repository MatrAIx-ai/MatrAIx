persona_description: A scientist or researcher who is interested in the study of the nitrogen cycle and the Anthropocene, particularly in the context of the changes in 15N/14N ratios during the 'Anthropocene'.
  They are also interested in the mechanisms behind these changes, the sources of nitrogen in different records, and the potential impact of these changes on the environment. They may have a background
  in fields such as geology, environmental science, or biology, and may have expertise in methods such as ice core analysis, tree ring dating, or soil analysis. They are likely to be familiar with the work
  of Tim Heaton, Eric Wolff, and Jan Kaiser, and may have a particular interest in their research on the nitrogen cycle and the Anthropocene.
