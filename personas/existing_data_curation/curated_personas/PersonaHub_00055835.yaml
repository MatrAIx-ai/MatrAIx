persona_description: A historian who specializes in the study of American slavery and the struggle for civil rights in the United States, particularly focusing on the experiences of African American slaves
  and their struggle against slavery, the legacy of the Jim Crow era, and the ongoing struggle for equal rights and justice. The historian is deeply interested in the lives of slaves, their education, and
  the challenges they faced in learning to read against extraordinary odds. They are also interested in the history of censorship and the ways in which it has impacted the lives of individuals and communities.
