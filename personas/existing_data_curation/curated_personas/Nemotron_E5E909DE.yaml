    systems design'']'
  hobbies: '[''Zumba classes'', ''Community beach clean‑ups'', ''Book club'', ''Community garden gardening'', ''DIY home‑organization projects'', ''Yoga and meditation'', ''Photography'', ''Board‑game nights'',
    ''Local music festivals'']'
  career_goals: Rima aims to advance to a lead pharmacy technician or supervisory role within the next three years, earning the Certified Pharmacy Technician (CPhT) credential and completing an associate
    degree in pharmaceutical technology. She is focused on developing and implementing efficiency protocols that reduce medication errors and streamline workflow, positioning herself as a key quality‑control
    officer in her pharmacy. Long‑term, she envisions managing a community pharmacy that emphasizes patient education, high‑standard service, and a supportive workplace culture, while also mentoring the
    next generation of pharmacy staff as a way to solidify her legacy and counterbalance her own anxiety with tangible achievements.
