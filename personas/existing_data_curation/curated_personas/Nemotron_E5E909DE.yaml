personas:
  professional: Rima Manson is a seasoned pharmacy technician at a busy Long Beach retail pharmacy, excelling in prescription verification, sterile and non‑sterile compounding, and workflow optimization,
    and channels her meticulous organization and competitive drive into designing error‑reduction protocols while mentoring newer staff with a healthy dose of skeptical scrutiny.
  sports: Rima Manson thrives on group movement, attending thrice‑weekly Zumba and dance classes at the Long Beach Community Center, playing summer beach volleyball with the Long Beach Beach Volleyball
    Club, cheering on the Los Angeles Lakers and Dodgers, and maintaining a disciplined cardio routine that blends her competitive spirit with social fun.
  arts: Rima Manson captures Long Beach sunsets with a DSLR inspired by Annie Leibovitz, enjoys live sets by Jack Johnson and Hozier at local music festivals, reads contemporary fiction from Chimamanda Ngozi Adichie
    in her book club, and unwinds with board‑game nights featuring artwork by Keith Haring.
  travel: Rima Manson plans trips with meticulous spreadsheets, favors weekend getaways to Santa Barbara and Catalina Island, dreams of a cultural immersion in Kyoto, Japan, and balances adventure with
    a budget‑conscious approach by traveling with book‑club friends to literary festivals in Portland.
  culinary: Rima Manson is an enthusiastic home cook who specializes in grilled shrimp tacos with cilantro, lime, and avocado, prepares Mediterranean quinoa salads with feta, olives, and cherry tomatoes
    using her smart‑kitchen appliances, enjoys dining at local seafood spots like The Crab Shack, yet harbors a guilty habit of snacking on processed chips during board‑game nights.
  core: Rima Manson is a meticulous, socially vibrant pharmacy technician who channels her competitive, anxiety‑driven energy into community‑focused health leadership while juggling a love for dance, DIY
    tech, and occasional impulsive splurges.
background:
  cultural: Rima is a White American who grew up in a middle‑class family in Southern California. Her upbringing combined the classic American work ethic and family traditions—celebrating holidays such
    as Thanksgiving and the Fourth of July—with the multicultural flavors of Long Beach, where she was exposed to diverse cuisines, languages, and community events. This environment fostered her appreciation
    for both established customs and new ideas, shaping a cultural identity that values community involvement, practicality, and the vibrant, eclectic spirit of the Los Angeles County coastal region.
attributes:
  skills: '[''Prescription verification'', ''Medication dispensing'', ''Compounding (sterile and non‑sterile)'', ''Inventory management'', ''Pharmacy software (e.g., PioneerRx)'', ''Regulatory compliance
