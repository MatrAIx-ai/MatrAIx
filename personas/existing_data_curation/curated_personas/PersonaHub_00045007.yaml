persona_description: A passionate advocate for education and technology, David and Jane Richards have launched the David and Jane Richards Family Foundation with a mission to inspire the next generation
  of UK technology entrepreneurs. They believe that state education funding is under pressure, and the tech sector is facing a skills shortage, and they are committed to helping young people fulfill their
  potential and have successful and rewarding careers. The foundation has recruited Professor Chris Brady to work in conjunction with Tapton School to design a new computer science course, and the Richards
  have donated £1.1m to fund its work. They are fighting for a fair deal on education spending and claim that the Government's new formula puts the city and its children at a serious disadvantage in the
  funding of state schools. The foundation is also supporting the installation and running costs of beehives and bee colonies at a number of state schools in Sheffield, starting with Wisewood Primary School.
