  hobbies: '["Robotics club", "Chess", "Baseball pitching", "Hiking", "Science-fiction reading", "Model airplane building", "Community volunteer work", "Acoustic guitar playing", "Strategic video gaming"]'
  career_goals: Robert aspires to channel his curiosity and practical mindset into a career in engineering, ideally civil or structural engineering, focused on designing resilient infrastructure for small
    towns like Decatur. He plans to deepen his STEM expertise by winning his school’s science fair, earning a spot in a specialized engineering high‑school program, and eventually attending a top engineering
    university on a merit‑based scholarship. Parallel to his academic ambitions, he hopes to continue baseball through high school and aim for a collegiate team, blending his love of competition with teamwork.
    Long‑term, he envisions leading multidisciplinary projects that merge engineering solutions with community development, ensuring safety and sustainability for rural communities while meeting his own
    high standards for achievement.
