personas:
  professional: Robert Norton, a 12‑year‑old robotics club leader, designs and programs autonomous vehicles for regional contests, merging their analytical curiosity with disciplined project management
    and a competitive drive to outperform peers.
  sports: Robert Norton, a dedicated pitcher for their Morgan County youth baseball team, trains three evenings a week, follows the St. Louis Cardinals for inspiration, and balances their fitness with weekend
    hikes that double as mental resets.
  arts: Robert Norton, an avid acoustic‑guitar hobbyist, strums Ed Sheeran's 'Shape of You' at family gatherings, loses themselves in Isaac Asimov's Foundation series, and assembles meticulous model airplanes
    while listening to Imagine Dragons for creative fuel.
  travel: Robert Norton, who spends weekends trekking the Red Brick Trails in Morgan County, dreams of visiting the Kennedy Space Center in Florida and plans a family road trip to the Grand Canyon to scout
    new hiking routes for future robotics ideas, always mapping their itinerary with a blend of curiosity and practical budgeting.
  culinary: Robert Norton, a budding home‑chef, favors building protein‑packed chicken‑and‑veggie wraps with avocado, perfects a secret blueberry pancake recipe on Saturday mornings, and snacks on craft‑soda‑free
    smoothies while tinkering with robot code, balancing taste with the efficiency of quick prep.
  core: Robert Norton blends a fierce competitive spark with meticulous organization, turning every hobby—from robotics to baseball—into a strategic quest, even as bouts of worry and late‑night coding sometimes
    hijack their sleep.
background:
  cultural: Robert grew up in Decatur, a small city in Morgan County, Alabama, where Southern traditions and close‑knit community values shape daily life. His family, rooted in the region for generations,
    emphasizes hospitality, respect for elders, and a strong work ethic. He regularly attends a local Baptist church, participating in youth group activities that blend service with fellowship. Community
    events such as the Morgan County Fair, high‑school football games, and church potlucks serve as social anchors, reinforcing his sociable and competitive nature. While the rural setting fosters a practical,
    down‑to‑earth mindset, access to school technology programs and a public library exposes him to modern scientific ideas, balancing his curiosity with a grounded perspective. These cultural influences
    underpin his disciplined approach to schoolwork, his appreciation for teamwork, and his cautious optimism about future opportunities.
attributes:
