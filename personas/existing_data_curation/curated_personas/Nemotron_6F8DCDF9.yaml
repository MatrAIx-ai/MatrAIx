personas:
  professional: Lyudmila Nelson, a budding teen science communicator, blends curiosity and practicality by scripting short educational TikTok videos on quirky facts while leading their school's debate team
    with concise arguments and a flair for dramatized presentations.
  sports: Lyudmila Nelson, a midfield enthusiast on the town's U-13 soccer league, idolizes the local professional team the City Strikers, follows the national women's championship, and complements training
    with weekend pick-up basketball games at the community center, channeling their sociable energy into team dynamics.
  arts: Lyudmila Nelson, an active drama club member, delights in performing monologues from Shakespeare and contemporary pieces, practices piano works by Ludovico Einaudi and the pop hit 'Bad Guy' by Billie
    Eilish, and draws artistic inspiration from the films of Hayao Miyazaki and the music of BTS, integrating these influences into community theatre productions.
  travel: Lyudmila Nelson, whose family road trips have taken them to the National Science Museum in Washington D.C. and a weekend hike in the Blue Ridge Mountains, now dreams of exploring Japan's Akihabara
    district for its tech culture, preferring organized itineraries with room for impromptu photo-journalism sessions on their phone.
  culinary: Lyudmila Nelson, a moderately skilled home chef, loves crafting pepperoni pizza from scratch, experimenting with matcha-infused brownies for science-themed baking projects, and enjoys spicy
    ramen bowls topped with soft-boiled eggs, often sharing taste-test videos on their TikTok channel.
  core: Lyudmila Nelson, a charismatic 13-year-old who mixes relentless curiosity with a flair for performance, can be found juggling robotics kits, soccer drills, piano keys, and viral fact-videos, all
    while occasionally forgetting to finish homework because they get swept up in the next creative spark.
background:
  cultural: Lyudmila comes from a white Midwestern background, with family roots tracing back to German and Polish immigrants who settled in the Chicago suburbs in the early twentieth century. Growing up
    in Waukegan, a city known for its working‑class heritage and close proximity to Lake Michigan, she has been exposed to a blend of cultural traditions—Polish community celebrations, German folk festivals,
    and the broader American Midwest values of hard work, community involvement, and modesty. Her family places a strong emphasis on education, community service, and maintaining close ties with extended
    relatives, fostering a sense of belonging and civic responsibility.
