  career_goals: Lyudmila dreams of combining her love for science and her talent for communicating with others. She wants to become a science communicator, perhaps as a TV host or digital content creator
    who makes complex topics accessible to a wide audience. In the longer term, she aspires to earn a degree in environmental science or engineering and work on community‑focused projects that protect Lake
    Michigan and promote sustainability. Alongside this, she hopes to stay active in student leadership, possibly serving as student council president or founding a youth journalism club, using her platform
    to give voice to her peers.
