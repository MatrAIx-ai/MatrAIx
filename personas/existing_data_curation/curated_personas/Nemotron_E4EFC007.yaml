  hobbies: '[''Visiting art museums'', ''Listening to jazz'', ''Reading historical biographies'', ''Exploring emerging technology articles'', ''Gardening'', ''Woodworking'', ''Playing chess'', ''Volunteering
    at senior center'', ''Participating in church choir'', ''Cooking traditional meals'']'
  career_goals: As he approaches retirement, Tommy aims to leave a lasting legacy by formalizing a mentorship program for new supervisors, documenting best‑practice guides for safety and efficiency, and
    serving as a consultant to nearby community colleges for STEM workforce development. He also hopes to contribute his time to local non‑profits that promote technical education for youth, while maintaining
    a manageable workload that allows him to enjoy his personal interests and family life.
