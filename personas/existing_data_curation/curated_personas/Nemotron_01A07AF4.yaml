personas:
  professional: Shelly Flavin, a 36‑year‑old barber with a decade of precision cutting, razor‑shaving and beard sculpting experience, blends meticulous organization with curiosity for emerging styling trends;
    they run a bustling chair in a shared shop while actively planning a community‑focused boutique that will serve as a mentorship hub and a launchpad for a locally‑sourced hair‑care line.
  sports: Shelly Flavin plays third base for the Benton County Women's Softball League; they cheer on the Arkansas Razorbacks football team during bowl season and follow the Kansas City Royals, balancing
    weekend league games with community fitness hikes in the Ozark trails.
  arts: Shelly Flavin curates classic‑rock karaoke nights featuring Bruce Springsteen, Dolly Dolly and The Rolling Stones; they line‑dance to Johnny Cash at community halls and scour thrift stores for vintage
    Levi’s jackets and 70s silk scarves that inspire their personal style.
  travel: Shelly Flavin prefers road‑trip adventures, having driven to Nashville for the Country Music Festival, explored the blues scene in Memphis, and taken weekend getaways to Hot Springs National Park;
    they keep a travel bucket list that includes a spring visit to Austin’s South‑by‑Southwest festival, all while budgeting travel expenses to stay within their small‑business cash plan.
  culinary: Shelly Flavin enjoys season‑year garden harvests of basil, thyme and cherry tomatoes, whips up Southern‑style pulled‑pork sandwiches with homemade coleslaw, experiments with smoked brisket rubs
    featuring brown sugar and paprika; they consider their kitchen skill solidly intermediate, often cooking while listening to country ballads.
  core: Shelly Flavin is a community‑oriented barber who balances a practical business mindset with boundless curiosity; they turn a love of vintage fashion, classic music and backyard gardening into a
    lively, socially driven life that never misses a softball game or a chance to mentor the next generation.
background:
  cultural: Shelly grew up in a small Midwestern town in Iowa, steeped in the region’s values of hard work, community solidarity, and practical self‑reliance. Her white, rural background includes family
    ties to farming and local church gatherings, which fostered a sense of responsibility and neighborly support. While she embraces traditional Midwestern courtesy, she also pursues a progressive outlook,
    staying curious about new cultural trends through social media and local arts events. This blend of rootedness and openness shapes her identity as a friendly, steady presence in Atkins and Benton County.
attributes:
  skills: '[''Precision hair cutting (men, women, children)'', ''Razor shaving and beard sculpting'', ''Basic hair coloring and highlights'', ''Salon sanitation and equipment maintenance'', ''Appointment
