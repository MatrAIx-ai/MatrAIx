    response'']'
  hobbies: '[''Softball league participation'', ''Attending Benton County fairs'', ''Line dancing at community events'', ''Karaoke nights and music appreciation'', ''DIY hair accessory crafting'', ''Backyard
    gardening'', ''Thrift‑store vintage fashion hunting'', ''Volunteering at high‑school career day'']'
  career_goals: Shelly aims to transition from operating a single chair within a shared space to owning her own boutique barbershop that doubles as a community hub in Atkins. She plans to earn a Master
    Barber certification, expand her services to include advanced coloring and styling, and develop a line of locally‑sourced hair care products. Mentoring aspiring barbers—especially those who, like her,
    left formal schooling early—remains a core ambition. Financially, she seeks to secure a mortgage on a modest commercial property, build a retirement fund, and achieve a stable work‑life balance that
    allows her to support local charities and host workshops at the county fair.
