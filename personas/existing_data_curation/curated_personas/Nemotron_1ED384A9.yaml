  hobbies: '[''Weaving'', ''Beadwork'', ''Reading'', ''Hiking'', ''Navajo cultural dances'', ''Playing native flute'', ''Gardening'', ''Playing strategy video games'']'
  career_goals: Myah hopes to graduate high school and attend a tribal college where she can study community health or education, with the long‑term goal of becoming a bilingual health educator or elementary
    school teacher on the Navajo Nation. She wants a stable career that lets her give back to her community, preserve her culture, and maintain a predictable daily routine.
