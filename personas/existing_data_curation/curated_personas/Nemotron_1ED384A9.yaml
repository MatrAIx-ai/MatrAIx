personas:
  professional: An aspiring textile artist and junior horticulturist, Myah Rickman channels their meticulous nature into weaving intricate patterns and tending the family garden, consistently organizing
    school projects with a practical, routine‑driven approach.
  sports: A nature‑enthusiast, Myah Rickman hikes the Monument Valley trails with the local youth hiking club, follows the Arizona Cardinals and Utah Jazz, and participates in after‑school cross‑country
    track, balancing endurance training with a relaxed attitude toward competition.
  arts: A creative soul, Myah Rickman practices the native flute while listening to folk artists like R. Carlos Nakai and Sylvia Crowe, reads Tony Hillerman novels set in the Southwest, and draws inspiration
    from Georgia O’Keeffe’s paintings for their bead‑craft designs.
  travel: Preferring well‑planned, nature‑focused trips, Myah Rickman has toured Antelope Canyon, dreams of trekking the ancient ruins of Machu Picchu, and budgets each adventure using a handheld budgeting
    app while balancing school commitments.
  culinary: An enthusiastic beginner in the kitchen, Myah Rickman enjoys making roasted chicken glazed with prickly pear, flipping blue corn pancakes topped with fresh berries, and experimenting with simple
    spice blends of cumin and coriander, though they sometimes over‑salt dishes while following YouTube tutorials.
  core: A routine‑loving, thoughtful teen who blends gardening, crafting, and native flute melodies into a balanced life, Myah Rickman’s quiet determination often masks a stubborn habit of forgetting to
    charge their phone.
background:
  cultural: Myah is a member of the Diné (Navajo) Nation, raised in Chinle, Arizona, on the Navajo Reservation in Apache County. She grew up in an extended family that emphasizes oral storytelling, respect
    for the land, and the practice of traditional arts such as weaving and silversmithing. Her household speaks both English and Diné, and she participates in community events like the Changing Woman Festival.
    The reservation’s high desert environment, close‑knit community, and the blend of tribal governance with modern schooling shape her worldview.
attributes:
  skills: '[''Traditional Navajo basket weaving'', ''Beadwork'', ''Fluent in Diné (Navajo) language'', ''Basic cooking and meal preparation'', ''Time management and organization'', ''Team collaboration'',
