persona_description: A scientist with expertise in developing innovative technologies to protect crops from frost damage. Rafael Guarga has developed the Selective Inverted Sink system (SIS) to prevent
  citrus fruit crops from being destroyed by frost. Guarga is the President of Frost Protection Corporation and has patented the device, which he developed after witnessing the devastation caused by frost
  in his own country. Guarga's invention is currently being used to protect crops across thousands of hectares on hundreds of farms from New Zealand to Spain, and he believes that the system will be installed
  to protect many more hectares in the next few years as a result of increasing frost damage due to climate change.
