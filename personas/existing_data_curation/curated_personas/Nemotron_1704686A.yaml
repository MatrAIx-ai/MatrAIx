  career_goals: Takiyah aims to advance into a lead technician or shop supervisor role, eventually overseeing a team of repair specialists at a major research institution or a specialized equipment service
    company. She plans to obtain industry certifications such as MET (Mechanical/Electrical Technician) and NIST‑traceable calibration credentials. Long‑term, she dreams of launching her own boutique repair
    studio that blends technical precision with artistic customization, while also creating apprenticeship pathways for Black youths and other under‑represented individuals seeking hands‑on trade careers.
    She also hopes to complete her GED and pursue further vocational education to broaden her expertise.
