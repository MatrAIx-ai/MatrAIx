personas:
  professional: Aruna Naik, an aspiring young coder, channels a love of structured storytelling into meticulously organized Scratch projects for the school robotics club, where they reliably coordinate
    teamwork, assert ideas when needed, and often double-check each code block to soothe lingering worries.
  sports: Aruna Naik, an enthusiastic 9-year-old athlete, plays forward for the neighborhood soccer league's Little Tigers in the fall, practices beginner gymnastics at the community recreation center on
    weekends, and cheers for the city's professional basketball team, the City Cougars, while adhering to a strict weekly training schedule that mirrors the chapter-by-chapter rhythm of their favorite books.
  arts: Aruna Naik, a budding visual storyteller, fills sketchbooks with whimsical cartoons inspired by Bill Watterson's Calvin and Hobbes and the pastel worlds of Hayao Miyazaki, sings chorally in school
    performing classics from Ella Fitzgerald as well as contemporary pop tunes by Taylor Swift, and practices short piano pieces that echo the ordered patterns they cherish.
  travel: Aruna Naik, an adventurous planner, treasures family road trips to the scenic hill station of Lonavala, eagerly anticipates a future visit to Tokyo's cherry-blossom festivals and a magical stay
    at Disneyland in California, and always drafts a colorful itinerary that breaks the journey into bite-sized chapters.
  culinary: Aruna Naik, a curious kitchen helper, enjoys shaping crisp samosas filled with spiced potatoes and peas and rolling soft chapatis on a flour-dusty board during festival evenings, often adding
    a pinch of cumin and coriander, though they sometimes get distracted by a new puzzle and forget to turn off the stove.
  core: Aruna Naik, a nine-year-old with a love for structured adventures, blends a meticulous penchant for puzzles, coding, and cartoon art with a gentle anxiety that fuels careful planning and occasional
    over-thinking.
background:
  cultural: Aruna comes from a South Asian Indian family, likely with Marathi roots, and lives in Philadelphia's vibrant multicultural community. She speaks Marathi at home and celebrates major festivals
    such as Diwali, Holi, and Ganesh Chaturthi with her family and the local Hindu temple. These cultural traditions influence her daily life through music, dance, and cuisine, and she often participates
    in community events organized by the South Asian diaspora in Philadelphia, fostering a strong sense of cultural identity while navigating her American school environment.
attributes:
  skills: '["Reading comprehension", "Basic arithmetic (addition, subtraction, multiplication)", "Written expression", "Organizational skills (keeping school supplies and assignments orderly)", "Follow‑through
