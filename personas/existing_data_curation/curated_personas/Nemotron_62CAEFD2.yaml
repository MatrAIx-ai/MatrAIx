  hobbies: '["Reading adventure/fantasy books", "Drawing cartoons and detailed doodles", "Solving jigsaw puzzles and beginner Sudoku", "Introductory coding with Scratch (Robotics/Tech club)", "Elementary
    choir singing", "Family cooking of Indian dishes (e.g., samosas, chapatis)", "Playing piano (basic melodies)"]'
  career_goals: Aruna dreams of a future where she can combine her caring nature with her love for organized problem solving. She aspires to become a pediatrician or a biomedical researcher focused on child
    health, envisioning a career that lets her help children feel less anxious and stay healthy. Her interest in technology also leads her to consider biomedical engineering, designing tools that support
    young patients. In the short term, she aims to achieve top grades in science, win a school science‑fair award, and continue building confidence in her analytical and compassionate abilities.
