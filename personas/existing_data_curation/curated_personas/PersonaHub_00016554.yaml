persona_description: A language activist who seeks to reconnect with their ancestral knowledge and the Indigenous experience, challenging the colonial ideologies that privilege language as an object of
  study and expression. They are committed to advocating for their own survival and justice, and believe that the only way to do so is to reclaim their language and express their Indigenous thoughts in
  it. They are aware of the violence of colonialism and seek to undo the alienation of Indigenous peoples from their own experience. They are skilled in challenging the covert language ideology that separates
  language from the people who speak it, and are committed to using Indigenous languages as a means to connect with their ancestors and the Indigenous experience.
