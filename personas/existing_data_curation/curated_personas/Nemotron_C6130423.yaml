personas:
  professional: Alice Shafer is a community arts coordinator who leverages meticulous event planning, calm problem‑solving, and a curiosity for new ideas, and they design inclusive workshops that blend
    traditional crafts with contemporary artistic expression.
  sports: Alice Shafer enjoys low‑impact fitness through weekly nature walks with the Shawano County Walking Club, follows the Green Bay Packers and Milwaukee Brewers each season, and they also participate
    in a seasonal community softball league for seniors.
  arts: Alice Shafer immerses themselves in visual arts, painting watercolors inspired by Monet and Grant Wood, sketching local wildlife, frequenting the Milwaukee Art Museum and the local history gallery,
    and they curate community showcases featuring works by regional folk artists like Grandma Moses.
  travel: Alice Shafer prefers relaxed, inspiration‑driven trips, having already explored the Apostle Islands National Lakeshore and Door County’s lighthouse trails, and they aim to visit the Art Institute
    of Chicago and the scenic Porcupine Mountains to gather artistic and natural motifs for future projects.
  culinary: Alice Shafer values seasonal farm‑to‑table cooking, often preparing heirloom tomato and basil salad, roasted root vegetables with rosemary, and handmade apple‑cinnamon crumble, and they experiment
    with home‑grown herbs like sage and chives in soups and sauces.
  core: Alice Shafer blends a calm, detail‑driven mindset with boundless curiosity, and they turn community art workshops, modest garden experiments, and thoughtful budgeting into a fulfilling, richly creative
    mid‑life journey.
background:
  cultural: Alice hails from a multi‑generational white Midwestern family with deep roots in Shawano County, Wisconsin. Her ancestry includes German and Scandinavian forebears who settled the region in
    the late 19th century, bringing traditions of hard work, modesty, and community cohesion. Raised in a small‑town environment, she grew up attending a Lutheran church, participating in town festivals,
    and learning the values of self‑reliance, thrift, and neighborly support. The surrounding lakes, forests, and farmlands have instilled in her a strong appreciation for nature and the seasonal rhythms
    that shape daily life in the Upper Midwest.
attributes:
  skills: '[''Community event coordination'', ''Volunteer group leadership'', ''Horticulture and garden planning'', ''Home cooking with seasonal ingredients'', ''Basic digital literacy and internet research'',
