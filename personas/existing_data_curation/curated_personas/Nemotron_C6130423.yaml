  hobbies: '[''Watercolor painting'', ''Sketching local wildlife'', ''Visiting art galleries'', ''Gardening with heirloom plants'', ''Bird‑watching'', ''Reading historical fiction and biographies'', ''Crocheting
    functional items'', ''Volunteering as a workshop facilitator'']'
  career_goals: Alice hopes to formalize her lifelong love of the arts by completing a GED program and pursuing a certificate in community arts education. She aims to open a small home‑based studio where
    she can sell hand‑painted ceramics and teach weekly art workshops to neighbors of all ages. Over the next few years, she aspires to serve on the board of the Shawano County Historical Society, helping
    curate exhibitions that celebrate local heritage. She also intends to mentor younger women in the community, sharing her experience in balancing household responsibilities with personal growth. Travel
    remains a quiet ambition; she plans to explore the art museums and natural parks of the Upper Midwest, gathering new inspirations for her creative work.
