persona_description: A scientist who specializes in cancer research and development, particularly in the field of viral anti-cancer treatment. He/she is a medical oncologist with a background in oncology,
  neurosciences, biochemistry, and molecular biology. The scientist is part of a pioneering group of researchers who are sharing their expertise and benefiting from the knowledge of others working in this
  exciting new area of anti-cancer treatment. The scientist is known for his/her work on using vesicular stomatitis virus (VSV) to target brain tumour cells that invade into the surrounding normal brain,
  and for finding that VSV has effective delivery into multiple sites within the tumour, evade the body's immune responses, reproduce rapidly, spread within the tumour, and infect cells that have spread.
  The scientist is excited about the potential of this research to lead to more effective treatments for brain cancer.
