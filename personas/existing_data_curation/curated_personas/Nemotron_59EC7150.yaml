  hobbies: '[''Community Gardening'', ''Hiking in the Wasatch Range'', ''Book Club Participation'', ''Volunteer Tech Training for Seniors'', ''Cooking and Hosting Dinner Parties'', ''Quilting and Needlework'',
    ''Traveling to National Parks'', ''Yoga Classes'', ''Local History Society Events'', ''Choir Singing in Community Gatherings'']'
  career_goals: Diann aims to obtain her PMP certification within the next year and to lead a district‑wide digital transformation project that modernizes classroom technology in Sanpete County schools.
    She also envisions launching a community‑focused digital literacy program for seniors, leveraging her experience to mentor younger staff and help local small businesses adopt efficient tech solutions.
    In the longer term, she hopes to transition into an advisory role that allows her to balance professional contributions with volunteer work, while still staying engaged in collaborative projects that
    benefit her community.
