personas:
  professional: Diann Walker, a seasoned IT Business Analyst and Project Coordinator with over three decades of experience, translates intricate business needs into clear technical roadmaps, leads cross‑functional
    teams with methodical precision, and balances structured project governance with the flexibility required to adapt to evolving district‑wide digital transformation initiatives, all while mentoring junior
    staff and championing community‑focused tech literacy.
  sports: Diann Walker, an avid hiker, explores the Wasatch foothills weekly with a local trail club, cheers on the Utah Jazz during basketball season and supports the BYU Cougars women’s volleyball team,
    and also attends community yoga sessions for seniors while being a member of the Salt Lake City walking group, blending cardio endurance with social camaraderie.
  arts: Diann Walker, a devoted member of a historical‑fiction book club, delights in the works of Ken Follett and Hilary Mantel, spends evenings quilting intricate patterns inspired by folk art, and frequently
    attends performances at the local community theater featuring productions of "A Streetcar Named Desire" and concerts by folk singer Gillian Welch, letting creative expression shape their social gatherings.
  travel: Diann Walker, an adventurous yet organized traveler, plans weekend escapes to Utah’s national parks—especially Zion and Bryce—where they combine hiking with photography, cherishes past road trips
    to Colorado’s Aspen for winter festivals, and dreams of a spring pilgrimage to Japan’s Kyoto to explore its historic temples and tea gardens, all while budgeting trips through meticulous spreadsheet
    planning.
  culinary: Diann Walker, a confident home cook, blends garden‑fresh ingredients like rosemary, heirloom tomatoes, and squash into seasonal dishes—such as lemon‑rosemary roasted chicken, quinoa‑black bean
    salad, and apple‑cinnamon crumble—while experimenting with world flavors like paella and Thai green curry, and they cherish hosting dinner gatherings where they showcase both classic comfort food and
    newly discovered recipes.
  core: Diann Walker, a 61‑year‑old IT strategist with a penchant for structured planning, community gardening, and lively quilting circles, balances meticulous professional rigor with a warm, sociable
    spirit that fuels both her digital transformation ambitions and her love for group hikes, book discussions, and heartfelt dinner parties.
background:
  cultural: Diann was raised in Ephraim, Utah, a close‑knit town with strong ties to the Latter‑Day Saint tradition and a deep appreciation for rural Utah values. Her upbringing emphasized self‑reliance,
    community service, and family cohesion. These cultural influences have shaped her collaborative spirit, respect for established practices, and commitment to contributing positively to her local community.
    While she respects the prevailing cultural norms, she also embraces the diverse perspectives brought by newcomers and modern influences, blending traditional community values with contemporary professional
    practices.
attributes:
  skills: '[''Business Process Analysis'', ''Project Management'', ''IT Support and Troubleshooting'', ''Data Management and Reporting'', ''Budget Planning and Financial Forecasting'', ''Team Leadership
