personas:
  professional: Sonya Arrington is a sheet‑metal fabricator who blends meticulous welding expertise with an experimental artistic eye, leveraging their precise CAD modeling abilities and competitive drive
    to lead small‑team projects while mentoring underrepresented peers.
  sports: Sonya Arrington fuels their fitness routine with weekly hikes in the Cascades, Saturday morning runs with the Cascade Trail Runners, casual basketball at the local community center, and maintains
    a disciplined schedule that reflects their work ethic, all while cheering for the Seattle Seahawks, Seattle Mariners, and Seattle Sounders FC.
  arts: Sonya Arrington spends evenings sketching metal art concepts, collecting vintage vinyl from Miles Davis, Herbie Hancock, and Kendrick Lamar, attending spoken‑word nights featuring poets like Sarah Kay,
    and immersing themselves in Tacoma’s art galleries, where they draw inspiration from artists such as Ai Weiwei and Kara Walker.
  travel: Sonya Arrington enjoys weekend road trips to Portland, Vancouver, and Seattle’s surrounding mountains, has explored San Francisco’s art scene, dreams of visiting Marrakech for its metalwork markets
    and Tokyo for its precision manufacturing tours, and they plan each journey using a spreadsheet that balances budget constraints with their love for cultural immersion.
  culinary: Sonya Arrington cooks family‑style gumbo, collard greens, and sweet‑potato pie with a confident yet experimental hand, frequently seasoning dishes with smoked paprika, chilies, and fresh cilantro,
    and they balance home‑cooked meals with frequent visits to Tacoma’s food trucks for ramen and Ethiopian injera, while they collect vintage spice jars.
  core: Sonya Arrington merges an engineer’s precision with a creator’s curiosity, constantly balancing disciplined craftsmanship, competitive ambition, and a love for vintage vinyl, while they occasionally
    over‑caffeinate through marathon welding sessions.
background:
  cultural: Sonya grew up in a close‑knit Black family in Tacoma, where church gatherings, Juneteenth celebrations, and community workshops shaped her sense of belonging. She draws inspiration from African‑diaspora
    artists and musicians, often incorporating cultural motifs—like geometric patterns and symbolic motifs—into her metalwork. Active in the local Black cultural center, she volunteers to mentor youth interested
    in trades, using her own experience to challenge stereotypes and promote representation in a traditionally male‑dominated field.
