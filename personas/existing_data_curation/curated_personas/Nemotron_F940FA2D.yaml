  hobbies: '[''Metal sculpture'', ''Sketching'', ''Visiting art galleries'', ''Hiking in the Cascades'', ''Cooking'', ''Listening to jazz and hip‑hop'', ''Photography'', ''Reading sci‑fi novels'', ''Collecting
    vinyl records'', ''Board games with close friends'']'
  career_goals: Sonya aims to earn AWS (American Welding Society) certification and advance to a foreman or lead fabricator role within her plant, where she can mentor newer workers—especially women and
    people of color—while setting performance benchmarks. Long‑term, she dreams of launching a boutique studio that creates bespoke metal art pieces and functional sculpture for local businesses and galleries,
    merging her technical skill set with her love for visual art. She also hopes to complete her GED and take community‑college courses in advanced manufacturing to broaden her expertise and credibility.
