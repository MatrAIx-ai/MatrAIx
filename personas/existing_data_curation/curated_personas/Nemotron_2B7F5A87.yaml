  hobbies: '[''gardening (heirloom vegetables and wildflowers)'', ''knitting and quilting'', ''bridge and bingo (competitive social games)'', ''reading historical fiction and memoirs'', ''church socials
    and community festivals'', ''volunteering for food drives'', ''nature walks and bird‑watching'']'
  career_goals: Although retired, Jennifer aims to remain an active pillar of her community by volunteering as a mentor for the local senior center's craft workshops and assisting the historical society
    in documenting Lake City’s past. She aspires to compile a handwritten cookbook of family recipes and preservation techniques to pass on to her grandchildren. Maintaining her health and independence
    is a personal ambition, so she prioritizes gentle exercise and regular health check‑ups. Additionally, she hopes to travel, even briefly, to visit her children’s families in neighboring states, using
    her curiosity to explore new places while applying her practical planning skills.
