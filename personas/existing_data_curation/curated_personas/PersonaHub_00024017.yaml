persona_description: A pediatric ophthalmologist or optometrist who specializes in the diagnosis and treatment of esotropia, a condition where the eyes cross in an attempt to focus. They are experienced
  in evaluating the visual acuity of infants and children with suspected esotropia, performing an examination to determine the child's refractive state, and fitting children with the appropriate glasses.
  They may also recommend eyeglasses or contact lenses to correct farsightedness, or refer the child for surgery if ocular misalignment is detected.
