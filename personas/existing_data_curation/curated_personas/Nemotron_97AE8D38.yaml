  hobbies: '[''Gardening (heirloom tomatoes, native plants, herb garden)'', ''Cooking Southern soul food with a health‑focused twist'', ''Singing in church choir and leading music outreach'', ''Reading
    historical biographies and contemporary fiction'', ''Volunteering at the local library’s reading program'', ''Attending museum exhibitions and public science talks'', ''Quilting and textile arts'',
    ''Birdwatching in local parks'', ''Playing bridge at the senior center'', ''Traveling to Texas cultural festivals'']'
  career_goals: Ruthie envisions leveraging her STEM background to empower the next generation and enrich her community. She aims to launch a mentorship program that pairs senior volunteers with middle‑school
    girls interested in science, technology, engineering, and mathematics. She hopes to serve on the board of a local nonprofit focused on senior empowerment and digital literacy, guiding the development
    of workshops that teach older adults how to use technology safely. Ruthie also dreams of publishing a series of practical science articles in the Katy community newsletter, highlighting everyday applications
    of scientific principles, and establishing a horticultural garden that doubles as a living classroom for botanical science and nutrition education.
