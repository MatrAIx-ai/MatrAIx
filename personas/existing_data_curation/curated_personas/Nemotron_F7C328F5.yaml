personas:
  professional: Frank Boyd, a retired rural handyman and community elder, blends decades of woodworking, farm equipment maintenance, and basic first‑aid expertise with his compassionate, laid‑back demeanor
    to mentor younger neighbors and keep Dumas’ homes and gardens humming.
  sports: Frank Boyd, an avid early‑morning fisherman and occasional member of the Dumas Senior Walking Club, follows the Arkansas Razorbacks basketball, the Dallas Cowboys football, and the Little Rock
    Travelers minor‑league baseball teams, and fits in low‑impact workouts by tending his garden and joining a weekly senior bowling league.
  arts: Frank Boyd, a lover of classic country and bluegrass, spends evenings listening to Johnny Cash, Dolly Parton, Bill Monroe, and Alison Krauss while swapping stories at church potlucks, and finds
    inspiration for his woodworking projects in the storytelling of historical biographies and the folk ballads he cherishes.
  travel: Frank Boyd, a road‑trip enthusiast with a love for historic Americana, plans spontaneous day‑long drives to destinations like the Little Rock Central High School National Historic Site, the Trail
    of Tears Museum in Fort Smith, and the historic district of Galena, Missouri, preferring modest motels and packing his own garden vegetables for the journey.
  culinary: Frank Boyd, a home‑grown food aficionado, routinely cooks garden‑fresh tomatoes, sweet corn, and pan‑fried catfish with a side of buttery cornbread, seasoning with fresh dill and oregano, and
    enjoys occasional visits to the local diner for a steaming bowl of chicken‑and‑dumplings, though he sometimes forgets to lock the pantry door, inviting squirrels in.
  core: Frank Boyd, a gentle, curiosity‑driven gardener‑mechanic who balances a love of tradition with a laid‑back, sometimes forgetful schedule, sprinkles community kindness like seeds across Dumas while
    humming bluegrass and occasionally losing his reading glasses in the garden soil.
background:
  cultural: Frank was raised on a family farm in the Mississippi Delta region of Arkansas, steeped in Southern rural culture. The community’s strong church involvement, deep respect for family and elders,
    and agricultural traditions have shaped his values. He identifies with the modest, pragmatic spirit of the South while maintaining a curious openness to new ideas, reflecting a blend of traditional
    hospitality and practical ingenuity.
