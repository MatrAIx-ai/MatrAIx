  career_goals: Although retired, Frank aims to deepen his impact on Dumas by expanding the town’s community garden, preserving and passing down his family’s agricultural traditions, and documenting his
    life stories for future generations. He hopes to support his grandchildren’s education, continue volunteering at the church and senior center, and leave a lasting legacy of kindness, self‑reliance,
    and community harmony.
