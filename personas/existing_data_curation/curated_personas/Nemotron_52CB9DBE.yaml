personas:
  professional: George Nelson, a budding nature explorer who leads spontaneous group treasure hunts in the Rexburg park, channels their boundless curiosity and love for unconventional ideas into imaginative
    play that hints at a future career in environmental education, while their relaxed approach to rules sometimes leaves the treasure map half‑drawn.
  sports: George Nelson, a proud member of the Rexburg Cub Cubs preschool baseball group and enthusiastic fan of the Boise State Broncos, spends afternoons chasing balls at the community field, loves the
    rhythmic chants of the local soccer mini‑league, and despite a tendency to lose their mitts due to impulsive play, they always cheer on teammates with infectious energy.
  arts: George Nelson, who spends afternoons with Crayola crayons creating vivid dinosaur scenes and channeling the imaginative storytelling of 'Bluey' while humming Raffi's 'Baby Beluga', revels in family
    sing‑alongs to Disney soundtracks and often surprises friends with impromptu finger‑painting performances that reflect their love for artistic experimentation, and they eagerly share their creations
    with playmates.
  travel: George Nelson, who has already explored the geysers of Yellowstone National Park on a family camping trip and eagerly anticipates a future adventure to Disneyland, prefers the comfort of car rides
    with a favorite plush bear, delights in spontaneous detours to roadside fruit stands, and sometimes worries about unfamiliar crowds, yet their curiosity keeps them excited, and they often point to maps
    on the car dashboard.
  culinary: George Nelson, an enthusiastic fan of cheesy mac and cheese, crunchy chicken nuggets, and sweet strawberry slices, proudly helps stir pancake batter and requests extra honey drizzle on toast,
    yet often refuses broccoli while savoring sweet potato fries, showing a typical toddler palate combined with a love for hands‑on kitchen play that they relish during family breakfast.
  core: George Nelson, a curious, socially vibrant toddler who blends imaginative play with occasional worry and a charmingly disorganized approach to everyday tasks, turns every moment into a colorful
    adventure that they share with friends.
background:
  cultural: George is growing up in a white, middle‑American family in Rexburg, Idaho, a small, community‑focused town known for its family‑centered values, outdoor recreation, and close‑knit social networks.
    His upbringing includes regular participation in neighborhood playdates, community events such as fairs and park gatherings, and exposure to local traditions that emphasize kindness, cooperation, and
    curiosity about the natural world. These cultural influences shape his friendly demeanor, love for group activities, and appreciation for both artistic expression and the outdoors.
