  hobbies: '[''crayon drawing'', ''building block towers'', ''listening to music'', ''dancing'', ''outdoor exploration'', ''storybook reading'', ''pretend play with friends'', ''singing nursery rhymes'']'
  career_goals: Even at three, George loves to imagine futures; he often says he wants to become an astronaut who explores space, a teacher who shares stories, or a wildlife caretaker who looks after animals.
    His curiosity about the world and desire to help and cooperate with others shape these early ambitions, reflecting a wish to keep learning, creating, and caring for others.
