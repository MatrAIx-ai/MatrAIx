personas:
  professional: Joseph Huffman is a budding information technology student combining hands‑on experience troubleshooting computer hardware, intermediate Python scripting, and drone building with a practical,
    organized yet flexible mindset, aiming to earn CompTIA A+ and Network+ certifications before launching a community‑focused tech‑support and custom PC business.
  sports: Joseph Huffman plays pickup basketball at the local YMCA, follows the Atlanta Hawks and Atlanta Falcons, hikes the trails of Stone Mountain with the Peachtree Hiking Club during spring, and supports
    the Atlanta United soccer team, balancing organized team workouts with spontaneous weekend trail runs.
  arts: Joseph Huffman immerses themselves in indie and alternative music, regularly streaming artists like Tame Impala, The Strokes, and Phoebe Bridgers, while devouring science‑fiction classics such as
    Dune, Neuromancer, and The Expanse, and attending the annual Atlanta Film Festival to stay connected with emerging visual storytelling.
  travel: Joseph Huffman prefers a hybrid travel style that mixes meticulous itinerary planning for road trips to places like Asheville and New Orleans with spontaneous weekend camping excursions in the
    Blue Ridge Mountains, budgeting carefully to fit a student budget while dreaming of a future tech conference tour in Japan.
  culinary: Joseph Huffman enjoys experimenting with Southern‑inspired dishes like shrimp and grits, buttermilk fried catfish, and pimento cheese, often sourcing fresh okra and pecans at local farmers'
    markets, honing their cooking skills through YouTube tutorials, and sharing hearty meals with family on Sundays.
  core: Joseph Huffman blends curiosity and practicality, turning a love for drones, gaming, and Southern cooking into a disciplined path toward an IT career while juggling a tight budget, occasional health
    niggles, and a vibrant social life.
background:
  cultural: Joseph was raised in Lawrenceville, a suburban area of Gwinnett County, Georgia, where Southern hospitality and a growing multicultural environment intersect. His family traditions include frequent
    gatherings centered around home‑cooked meals featuring regional favorites like fried chicken and peach cobbler, and participation in church youth events that emphasize community service. He attended
    a public high school known for its strong athletics and performing arts programs, which fostered a sense of local pride and teamwork. While he embraces the broader Southern cultural values of friendliness
    and resilience, he also engages with modern digital culture through online gaming and social media, creating a balanced cultural identity that reflects both his regional roots and contemporary interests.
