  career_goals: Joseph plans to enroll in a community college to pursue an Associate's degree in Information Technology, aiming to become a certified network technician (CompTIA A+ and Network+). He aspires
    to combine his technical aptitude with his entrepreneurial spirit by eventually launching a local tech‑support and device‑repair business serving his suburban community. In the longer term, he hopes
    to expand his services to include custom PC builds and smart‑home installations, while continuously learning emerging technologies.
