    Sessions'']'
  career_goals: Anthony aims to enroll in a specialized high‑school visual‑arts program, then pursue a Bachelor of Fine Arts in Illustration or Game Design. He dreams of becoming a concept artist for indie
    video‑game studios, creating characters and worlds that spark wonder. He also hopes to combine his artistic talent with his empathy by designing illustrated educational comics that help teenagers cope
    with anxiety and emotional distress. Long‑term, he envisions leading a small creative studio where his organizational skills can foster collaborative projects.
