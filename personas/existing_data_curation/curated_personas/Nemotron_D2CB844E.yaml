  hobbies: '[''painting'', ''visiting art galleries'', ''reading historical fiction'', ''cooking experimental dishes'', ''community volunteering'', ''gardening'', ''listening to jazz and gospel music'',
    ''traveling to cultural festivals'', ''quilting'', ''attending local theater performances'', ''nature walks'']'
  career_goals: Debbie aims to move into a regional supervisory role within her food service company, overseeing multiple locations while implementing community‑focused culinary programs. She dreams of
    opening a small eatery that celebrates African‑American Southern cuisine, featuring rotating art exhibits and workshops that fuse her love of food and the arts. Additionally, she hopes to develop a
    mentorship initiative for local youth that combines culinary training with exposure to visual and performing arts, leveraging her degree in humanities to create a holistic learning environment.
