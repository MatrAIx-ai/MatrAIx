    Italian)"]'
  career_goals: Despite being retired from formal employment, Oscar remains driven to share his knowledge and preserve his cultural legacy. He aims to mentor emerging teachers through volunteer tutoring
    programs, document the history of the Hispanic community in the Walla Walla region, and support senior‑focused arts initiatives. He hopes to author a memoir that intertwines his experiences in education
    with reflections on art and cultural identity, and to advocate for expanded bilingual curricula in local schools. Ultimately, his ambition is to foster intergenerational learning and ensure that his
    artistic curiosity continues to inspire younger generations.
