persona_description: A clinician who specializes in the management of chronic symptoms after mild traumatic brain injury (mTBI). This clinician takes a biopsychosocial approach to the management of chronic
  symptoms, considering pre-injury factors, on-going physical issues, psychological factors, and the social context of the individual. They are aware of the importance of identifying oculomotor and vestibular
  disturbances in individuals with persistent symptoms following mTBI and are cautious when using the term postconcussion syndrome/ disorder, as it implies all the present symptoms are attributable to the
  traumatic brain injury. They are aware of the complexity in mTBI cases and the lack of a clear single treatment which has been shown to be effective in treating persisting symptoms.
