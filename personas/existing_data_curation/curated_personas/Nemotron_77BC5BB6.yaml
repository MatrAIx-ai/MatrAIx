personas:
  professional: Jesus Santiago, a budding comic‑style illustrator, blends a curious mind with meticulous organization to produce daily sketchbooks full of vibrant characters, and they eagerly share their
    Scratch‑coded games with classmates to illustrate storytelling concepts.
  sports: Jesus Santiago, a forward on their neighborhood soccer team, emulates the dribbling flair of Lionel Messi, cheers for the LA Galaxy and Manchester United during matches, and they practice free‑kicks
    after school while balancing a busy schedule of games and school work.
  arts: Jesus Santiago, an avid sketcher of comic‑style heroes, draws inspiration from classic creators like Stan Lee, contemporary Latin pop album art, and the rhythmic beats of mariachi music, and they
    often animate short storyboards in Scratch to bring their characters to life.
  travel: Jesus Santiago dreams of road‑tripping to the Grand Canyon to sketch canyon vistas, hopes to wander through a historic plaza in a vibrant town renowned for a cultural festival, and they meticulously
    plan each trip with a notebook of sketches, snack lists, and a priority list that balances family budget with a yearning for adventure.
  culinary: Jesus Santiago enjoys helping prepare tamales and tacos, mastering the perfect salsa verde, and they take pride in assembling a carnitas taco with fresh cilantro, lime, and a pinch of chili,
    while also experimenting with homemade churros for school fairs.
  core: Jesus Santiago is a curious, ultra‑organized ten‑year‑old who lives for sketching comic heroes, soccer drills, and family cooking, but they sometimes forget to water their goldfish while meticulously
    cataloguing every LEGO piece they own.
background:
  cultural: Jesus is a Mexican‑American growing up in the vibrant East Los Angeles community. His parents emigrated from Mexico and speak Spanish at home, so he is fluent in both Spanish and English and
    celebrates a blend of traditions, from Día de los Muertos altars to Fourth of July parades. Family gatherings center around homemade Mexican food, music, and storytelling, reinforcing values of familismo
    and respect for elders. He attends a public elementary school where many classmates share similar bicultural experiences, fostering a strong sense of identity that bridges his Mexican roots and the
    dynamic urban culture of Los Angeles.
attributes:
  skills: '[''Class monitor and organizer'', ''Drawing and digital illustration'', ''Bilingual communication (Spanish/English)'', ''Basic coding with Scratch'', ''Teamwork in soccer'', ''Public speaking
    in school presentations'', ''Reading comprehension'']'
  hobbies: '[''Drawing cartoons'', ''Playing soccer'', ''Attending cultural festivals'', ''Listening to music (Mariachi, Latin pop)'', ''Coding simple games in Scratch'', ''Building LEGO sets'', ''Reading
    adventure books'', ''Cooking Mexican dishes with family'']'
  career_goals: Jesus dreams of becoming a multimedia artist‑technologist who merges his love for art, technology, and his Mexican heritage to create interactive public murals and digital experiences for
    his community. In the short term, he aims to win his school's art competition, improve his Scratch projects, and earn a spot in a STEM‑focused magnet program. Long‑term, he plans to study engineering
    or graphic design in college, mastering advanced digital tools, and later lead a youth cultural center in East Los Angeles that offers art workshops, coding labs, and bilingual mentorship for children
    like himself.
