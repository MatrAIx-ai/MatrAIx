  career_goals: Cristina hopes to turn her curiosity about the natural world into a career that merges science with community impact. She plans to earn a high‑school equivalency diploma and then pursue
    an associate’s degree in environmental studies or sustainable agriculture at a nearby community college. Her long‑term ambition is to help develop a community‑supported farm or a local food co‑op that
    provides fresh produce to Woodsville and surrounding towns. She also envisions gaining leadership experience by volunteering with the town’s conservation committee and eventually taking on a project‑manager
    role in a regional non‑profit focused on land stewardship. While she values practical outcomes, she remains open to exploring entrepreneurship, perhaps launching a small line of handmade garden accessories
    that reflect her DIY skills. In the short term, she seeks internships or summer programs that let her test fieldwork, data collection, and public outreach.
