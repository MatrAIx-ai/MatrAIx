    at senior center", "Road trips to heritage sites"]'
  career_goals: Even though she is retired, Marena aims to leave a lasting impression through a memoir of her life and family stories, to mentor younger members of the community in art and gardening, to
    contribute oral histories to the Oklahoma Historical Society, and to maintain her health so she can continue attending weekly art workshops and support her local senior center. She also hopes to travel
    modestly to nearby art museums and historical sites.
