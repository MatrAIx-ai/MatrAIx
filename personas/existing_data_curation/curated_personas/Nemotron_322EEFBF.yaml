personas:
  professional: Marena Herrera, a retired community volunteer and senior center organizer, leverages their decades of event coordination, gardening expertise, and artistic curation to advocate for senior
    wellbeing while mentoring younger volunteers.
  sports: Marena Herrera enjoys low‑key fitness through gardening and weekly water‑aerobics, follows the Oklahoma City Thunder and the Oklahoma Sooners football team on television, and participates in a
    community bowling night on Fridays, where they relish friendly competition.
  arts: Marena Herrera spends afternoons painting watercolor Oklahoma prairie scenes, listening to Miles Davis and Beethoven, attending the Oklahoma City Museum of Art’s small exhibitions, and curating
    quarterly art shows for the senior center, often quoting Georgia O'Keeffe for inspiration, and they relish sharing these experiences with their book club.
  travel: Marena Herrera favors modest road trips to nearby historic towns such as Guthrie, Norman, and Santa Fe, planning itineraries around heritage museums and staying with friends, balancing their love
    for exploration with a fixed budget and occasional mild knee pain, and they always pack a sketchbook for on‑the‑road inspiration.
  culinary: Marena Herrera delights in cooking classic Midwestern comfort foods—chicken‑fried steak, cornbread, and apple pie—using fresh herbs from their garden, while they occasionally over‑season their
    soups and indulge in homemade pickles, a habit that sometimes leaves the kitchen a bit messy.
  core: Marena Herrera is a quietly curious octogenarian who blends meticulous organization with a love for watercolor, garden soil, and vintage jazz, while they navigate arthritis and a frugal budget with
    steadfast resilience and occasional stubbornness.
background:
  cultural: Marena was born and raised in Oklahoma City in the post‑World War II era, growing up in a predominantly white, middle‑class neighborhood with deep Midwestern values of self‑reliance, community
    service, and modesty. Her family has roots in early 20th‑century settlers of Oklahoma, and although her surname reflects distant Hispanic ancestry, her cultural upbringing was shaped by local traditions,
    church involvement, and a love of regional music and cuisine. She embraces the blend of classic American prairie culture with an appreciation for the diverse artistic influences she encountered later
    in life.
