persona_description: A German healthcare professional who is knowledgeable about the recommendations made by the Standing Commission on Vaccination (STIKO) regarding the use of the AstraZeneca vaccine in
  people under 60. They have expertise in infectious disease immunology and are familiar with the clinical trials and research conducted by the European Medicines Agency (EMA) regarding the safety and efficacy
  of the AstraZeneca vaccine. They are also aware of the potential risks and benefits associated with the vaccine and have a deep understanding of the decision-making process that led to the recommendation
  to restrict the use of the AstraZeneca vaccine in people under 60.
