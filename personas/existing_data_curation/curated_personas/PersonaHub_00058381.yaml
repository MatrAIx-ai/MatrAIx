  is well-versed in the use of computer models and simulators to estimate the performance of the spaceship during testing. This person is also aware of the potential dangers posed by tiny pieces of rock
  or comet dust in space, and is prepared to have contingency plans in place for any potential failures during the spaceship's journey to Mars.
