personas:
  professional: Jerry Glover, a 33‑year‑old pastor in the Dallas‑Fort Worth area, leverages his business education to run church administration with precise budgeting, strategic growth planning, and compassionate
    community outreach, delivering sermons and small‑group facilitation with disciplined calm and an organized, achievement‑driven mindset.
  sports: Jerry Glover, an avid weekend hiker of the Texas Hill Country and member of a local trail‑maintenance crew, supplements his low‑impact fitness with occasional pickup basketball at the Dallas Mavericks
    community court, while cheering for the Dallas Cowboys and Dallas Stars as his primary professional sports affiliations.
  arts: Jerry Glover, who unwinds by playing improvised jazz and gospel piano standards by Ahmad Jamal and Mahalia Jackson, also enjoys attending live performances of the Dallas Symphony Orchestra and soaking
    up the lyrical storytelling of author James Baldwin, directing his creative energy into essay writing and sermon drafting.
  travel: Jerry Glover, a methodical planner who prefers curated itineraries over spontaneous trips, has explored the historic churches of Seville, Spain, and the serene landscapes of Sedona, Arizona, while
    dreaming of a pilgrimage to Jerusalem that aligns with his structured spiritual growth goals, all while balancing family commitments and modest travel budgets.
  culinary: Jerry Glover, an amateur chef who blends his love for soul‑food and Tex‑Mex flavors, frequently prepares shrimp and grits with smoked paprika and homemade guacamole with fresh cilantro, mastering
    the balance of spice and comfort while often experimenting late into the night after his evening piano sessions.
  core: Jerry Glover, a disciplined pastor‑entrepreneur who thrives on structure, balances his calendar with garden chores, jazz practice, and strategic planning, yet occasionally over‑organizes his to‑do
    list, turning even his prayer time into a meticulously timed agenda.
background:
  cultural: Jerry was raised in Irving, Texas, within a close‑knit African-American Baptist community that emphasized faith, resilience, and communal support. His family’s church traditions, combined with
    the legacy of the civil‑rights era in Dallas County, shaped his sense of stewardship and service. He integrates the rich musical heritage of gospel and jazz, the communal values of Black churches, and
    the pragmatic outlook of his business education to navigate both spiritual and professional spheres.
attributes:
  skills: '[''Pastoral counseling'', ''Sermon preparation'', ''Church administration'', ''Financial stewardship'', ''Strategic planning'', ''Community outreach'', ''Small-group facilitation'', ''Conflict
