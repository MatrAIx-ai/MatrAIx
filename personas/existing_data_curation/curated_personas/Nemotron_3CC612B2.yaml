  hobbies: '[''Model building'', ''Strategy video games'', ''Reading non‑fiction (wilderness, engineering, leadership)'', ''Community service (clean‑ups, emergency drills)'', ''Fishing'', ''Hunting'', ''Cross‑country
    skiing'', ''Weather journaling'', ''Wildlife observation'']'
  career_goals: David’s long‑term ambition is to secure a stable, hands‑on career that leverages his organizational strengths and practical abilities. He plans to earn his GED within the next two years
    and then enroll in a technical college in Anchorage to train as a diesel mechanic or electrical maintenance technician. His goal is to become the chief mechanic responsible for Chefornak’s power generators
    and vehicle fleet, ensuring reliable infrastructure for the community. Parallel to this, he hopes to acquire advanced first‑responder certification so he can serve as an emergency responder. Over time,
    David envisions taking on a leadership role in the local youth council or municipal planning committee, using his structured approach to help shape community projects and resource management.
