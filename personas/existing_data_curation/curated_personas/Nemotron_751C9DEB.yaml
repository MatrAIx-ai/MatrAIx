personas:
  professional: Etta Spear, a 45‑year‑old services sales veteran, blends a methodical, data‑driven approach to pipeline forecasting with a calm, empathetic demeanor to negotiate contracts, onboard clients,
    and quietly mentor a small group of reps as they prepare for a regional sales manager role.
  sports: Etta Spear, a 45‑year‑old Cleveland area resident, enjoys low‑impact weekend hikes on Cuyahoga Valley trails with a small walking group, follows the Cleveland Browns, Cavaliers, and Guardians
    loyally, and joins a spring‑time adult softball league while incorporating gentle stretching to accommodate mild knee osteoarthritis as they stay active.
  arts: Etta Spear, at 45, finds artistic solace in devouring historical fiction by Hilary Mantel and business biographies by Walter Isaacson, listening to the soulful piano of Nina Simone and the modern
    jazz improvisations of Kamasi Washington at the Cleveland jazz club, attending productions at the Cleveland Play House, and channeling creativity through knitting patterns inspired by the textiles of
    designers such as Faith Ringgold as they blend tradition with contemporary expression.
  travel: Etta Spear, a 45‑year‑old planner, prefers meticulously organized weekend getaways to nearby destinations like Niagara Falls or historic Savannah, while reserving bi‑annual overseas adventures
    for culturally rich cities such as Kyoto and Tuscany, balancing limited vacation days and a modest travel budget with a desire for both relaxation and purposeful exploration as they curate each itinerary.
  culinary: Etta Spear, a 45‑year‑old home gardener and avid cook, blends garden‑fresh vegetables into family‑heritage dishes such as slow‑braised pork shoulder with smoked paprika and collard greens, sweet‑potato
    casserole crowned with toasted marshmallows, and explores new flavors like miso‑infused ramen, showcasing intermediate culinary skills and a love for both tradition and experimentation as they savor
    the process.
  core: Etta Spear, a structured yet quietly assertive 45‑year‑old, balances a disciplined professional drive with solitary creative pursuits, a penchant for meticulous budgeting, and occasional indulgences
    in garden‑grown feasts and crossword puzzles as they navigate life with a measured, reflective rhythm.
background:
  cultural: Etta grew up in the African American community of Akron, Ohio, where her parents emphasized education, hard work, and mutual support. Her grandparents were active in the local church and civic
    organizations, instilling a sense of community responsibility that continues to shape her life. The cultural values of resilience, family solidarity, and celebration of Black heritage have informed
    both her personal worldview and her professional approach to relationship building. She regularly participates in neighborhood events such as Juneteenth gatherings, local Black History Month talks,
    and mentorship programs for youth. These experiences nurture a strong sense of identity and a commitment to giving back while reinforcing the pragmatic, organized mindset she applies to her career.
attributes:
  skills: '[''Consultative selling'', ''Strategic account management'', ''Contract negotiation'', ''Client onboarding and training'', ''CRM proficiency (Salesforce, HubSpot)'', ''Sales forecasting and pipeline
