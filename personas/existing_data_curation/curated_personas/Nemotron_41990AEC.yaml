  career_goals: Cardeja aims to advance to a Director of Early Childhood Services role within a school district or nonprofit organization, where she can shape district-wide policies that prioritize arts-infused
    learning and culturally responsive curricula. She plans to pursue a Master’s degree in Educational Leadership to deepen her strategic planning abilities. Long‑term, she envisions launching a community‑based
    after‑school program that provides free arts and enrichment activities for underserved families in Miami, and becoming a mentor for emerging childcare administrators.
