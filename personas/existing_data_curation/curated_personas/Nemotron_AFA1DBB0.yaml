  career_goals: Evelyn aims to advance into an Operations Manager role where she can shape company‑wide administrative strategies and integrate technology to streamline workflows. She plans to earn a PMP
    certification and possibly pursue an MBA to strengthen her business acumen. A long‑term ambition is to develop a mentorship program for women in supervisory positions and eventually launch a consulting
    practice focused on improving office efficiency and employee well‑being in small to midsize organizations.
