personas:
  professional: A seasoned office operations supervisor with a STEM background, Evelyn Caro blends data‑driven Excel reporting and basic Python automation to streamline workflows, while leading administrative
    teams with empathetic communication, conflict‑resolution skills, and a flexible, people‑first approach that fuels her ambition to become an Operations Manager and launch a mentorship program for women.
  sports: Evelyn Caro spends Saturdays hiking the Columbia River Gorge, joins community Zumba and dance classes for cardio, practices yoga at the local studio where they also cheer on the Portland Timbers
    and Portland Trail Blazers, and belongs to a recreational adult softball league that meets on Sundays.
  arts: Evelyn Caro frequents downtown galleries showcasing works by Yayoi Kusama and Kehinde Wiley, sketches in a sketchbook during live performances by Bon Iver, and volunteers to curate pop‑up art shows
    that blend modern abstract painting with vintage photography, finding inspiration in the vibrant colors of Frida Kahlo’s portraits.
  travel: Evelyn Caro prefers immersive cultural trips, having journeyed to the street markets of Marrakech, the gardens of Kyoto, and the frescoed halls of Florence, often planning itineraries around local
    art festivals and returning with handcrafted ceramics and sketchbooks filled with on‑the‑go drawings.
  culinary: Evelyn Caro enjoys cooking Mediterranean‑themed dinner parties, perfecting dishes like roasted lamb with rosemary, Greek salad with feta and olives, and paella enriched with saffron and chorizo,
    while experimenting with homemade fig jam and pairing meals with a curated selection of natural wines and craft gin cocktails.
  core: Evelyn Caro is a compassionate, curiosity‑driven operations leader who balances creative bursts, social advocacy, and a love for group energy with a flexible, sometimes scattered approach that fuels
    both worry and relentless optimism.
background:
  cultural: Evelyn is a White American raised in the suburban communities of Cypress, Texas, within the greater Houston area. Her family heritage includes German and Irish roots, and she grew up immersed
    in Southern hospitality, community-oriented values, and a love for local festivals and cuisine. While she appreciates the traditional aspects of her upbringing—such as strong work ethic and neighborly
    support—her curiosity and openness have led her to embrace diverse artistic and cultural experiences beyond her immediate environment.
