personas:
  professional: Kenneth Franklin is a freelance visual artist and digital content creator who merges Procreate illustrations with surf photography into cohesive brand narratives for local cafés, while wrestling
    with self‑imposed deadlines due to their spontaneous, deadline‑averse nature.
  sports: Kenneth Franklin frequently skateboards the Edgewater boardwalk at sunrise, hikes coastal preserves on weekends, and roots for the Portland Timbers in MLS and the Seattle Seahawks in the NFL,
    preferring solitary motion over organized team sports.
  arts: Kenneth Franklin curates a personal soundtrack of indie and ambient artists like Tycho, Bonobo, and Beach House while drawing inspiration from visual masters such as David Hockney and street artist
    Banksy, regularly attending gallery openings and poetry slams at the Edgewater Community Arts Center, where they often sketch the venue’s lighting mood.
  travel: Kenneth Franklin dreams of catching sunrise surf on Bali’s Kuta Beach, photographing Iceland’s black sand dunes, and weekend getaways to Oregon’s Cannon Beach, planning trips with minimal itineraries
    and leaving room for spontaneous detours while balancing a modest freelance budget.
  culinary: Kenneth Franklin prefers simple, health‑focused meals like quinoa bowls with roasted chickpeas, kale, avocado, and a quick salmon fillet seasoned with turmeric and lemon, often cooking to ambient
    playlists, yet occasionally indulges in a late‑night pizza slice after an all‑night editing marathon.
  core: Kenneth Franklin is a solitarily‑driven coastal creative who balances spontaneous artistic bursts with a laid‑back approach to finances, health, and life, occasionally forgetting deadlines but always
    finding time for sunrise surf and a fresh cup of cold brew.
background:
  cultural: Kenneth grew up in Edgewater, a quiet coastal town in Volusia County, Florida, within a white, middle‑class American family. His upbringing blended mainstream U.S. cultural influences with the
    relaxed, beach‑oriented lifestyle of the Atlantic coast. He was exposed to Southern hospitality through community gatherings and local traditions such as the Edgewater Art Walk and marine‑conservation
    events. This environment nurtured his appreciation for nature, visual arts, and community collaboration, shaping a cultural identity that values both individuality and harmonious social connections.
