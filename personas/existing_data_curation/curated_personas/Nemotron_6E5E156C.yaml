  career_goals: Kenneth aims to forge a flexible, creative career that lets him work independently while contributing to his local arts scene. He plans to develop a robust portfolio as a freelance visual
    artist and digital content creator, eventually launching an online shop for prints and collaborating with local businesses on murals and branding projects. To strengthen his technical foundation, he
    intends to enroll in a community‑college program in Graphic Design or Multimedia. Long‑term, he envisions opening a modest studio space where he can produce visual media that reflects the coastal culture
    of Edgewater and promotes community harmony.
