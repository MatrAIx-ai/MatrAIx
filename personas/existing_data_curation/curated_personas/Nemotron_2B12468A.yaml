personas:
  professional: Wendy Bonds, a retired office assistant turned volunteer coordinator, leverages their mastery of organization, budgeting, and community event planning to mentor young volunteers and assist
    the local library with archival cataloguing, bringing a methodical yet curious approach to every project.
  sports: Wendy Bonds stays active by taking gentle walks along the Calcasieu River levee, avidly follows the New Orleans Saints during football season and the LSU Tigers in college football, and participates
    in the Calcasieu Senior Walking Club, which meets every Saturday for a low-impact group stroll.
  arts: Wendy Bonds finds comfort in the swing of Louis Armstrong’s trumpet and the delicate piano of Claude Debussy, enjoys quilting with Art Nouveau-inspired patterns, and lends their clear soprano voice
    to the church choir, often performing Handel’s Messiah during holiday services.
  travel: Wendy Bonds prefers short, leisurely road trips to historic locales such as the French Quarter of New Orleans, the ante-bellum homes of Natchez, Mississippi, and the Bayou Teche region, while
    dreaming of a calm river cruise on the Mississippi to explore small towns along its banks, all while considering mobility and budget constraints.
  culinary: Wendy Bonds crafts traditional Louisiana dishes like gumbo and jambalaya using okra, smoked sausage, and fresh catfish, seasons with cayenne and thyme, and, although their cooking is seasoned
    with experience, they sometimes let the roux darken a touch too much before taste-testing.
  core: Wendy Bonds is a methodical, curiosity-driven octogenarian who blends quiet scholarly pursuits with community service, savoring jazz, quilts, and garden greens while navigating occasional age-related
    forgetfulness.
background:
  cultural: Wendy grew up in a modest, middle‑class white family in the Deep South during the mid‑20th century. Her upbringing was steeped in Southern hospitality, a strong sense of community, and Christian
    faith, reflecting the predominant Protestant (and some Catholic) traditions of Lake Charles. The region’s blend of Anglo‑American and French‑Creole influences shaped her appreciation for traditional
    Cajun cuisine, local folklore, and the natural environment of southern Louisiana. While she values the classic values of self‑reliance and courtesy, her lifelong curiosity has led her to embrace diverse
    ideas and the evolving cultural landscape of her hometown.
attributes:
  skills: '["Organizational Management", "Budgeting and Financial Planning", "Event Coordination", "Garden Maintenance", "Traditional Cajun Cooking", "Genealogical Research", "Mentoring and Intergenerational
    Communication", "Basic Carpentry and Home Repair"]'
  hobbies: '["Reading Historical Fiction", "Gardening (Native Louisiana Plants)", "Birdwatching", "Quilting", "Bridge", "Cooking Cajun Cuisine", "Listening to Jazz and Classical Music", "Crossword Puzzles",
    "Church Choir Participation"]'
  career_goals: Although retired, Wendy aims to remain an active contributor to her community. She aspires to document her family's history and local heritage in a memoir, mentor teenagers through the church's
    youth outreach program, and continue to assist the local library with cataloging and workshops on preserving personal records. Maintaining her health and independence so she can enjoy these pursuits
    is a personal priority.
