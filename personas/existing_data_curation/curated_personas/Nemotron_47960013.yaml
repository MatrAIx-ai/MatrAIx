  career_goals: Dawn aims to advance into a senior supervisory role within her insurance organization over the next three to five years, leading a team of adjusters while driving process‑improvement initiatives
    that streamline routine claim handling. She plans to obtain professional certifications such as the CPCU and AIC to deepen her expertise in complex investigations and fraud detection. In addition, Dawn
    hopes to design a mentorship program for new adjusters, fostering a supportive learning environment. Long‑term, she envisions transitioning to a specialized investigative unit focused on high‑stakes
    claims or offering consulting services after retirement, all while maintaining a work‑life balance that supports her family and community commitments.
