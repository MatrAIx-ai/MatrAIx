  career_goals: Benjamin aims to earn the Chartered Property Casualty Underwriter (CPCU) designation within the next three years, allowing him to transition from clerkship to a senior claims adjuster role.
    He is motivated to lead a team that integrates creative problem‑solving with technology, eventually overseeing an insurtech project that automates routine claim reviews using AI. Long‑term, he envisions
    a managerial position where he can mentor new staff, design customer‑focused policy products, and contribute to community outreach programs that educate residents about insurance literacy.
