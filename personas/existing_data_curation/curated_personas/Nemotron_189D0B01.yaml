personas:
  professional: Oneal Howard, an aspiring young game developer, blends their love of sci‑fi storytelling and LEGO engineering to craft simple Scratch games, applying a methodical yet imaginative approach
    that reflects their curiosity and competitive edge.
  sports: Oneal Howard, a member of the local youth soccer club and an avid fan of the Chicago Cubs, enjoys weekend pick‑up basketball games at the community center, channels their competitive nature into
    refining their dribbling skills, and often explores the nearby woods for nature‑inspired obstacles that double as informal agility drills.
  arts: Oneal Howard, a budding visual storyteller, attends their school's weekly art club where they sketch sci‑fi landscapes, draw intricate LEGO creations, and draw inspiration from classic rock icons
    like David Bowie and Pink Floyd, often humming their riffs while coloring their latest comic panels.
  travel: Oneal Howard, a curiosity‑driven traveler, prefers short, structured trips such as weekend visits to the Grand Canyon National Park and family outings to the interactive science museum in Washington
    D.C., balancing their love for nature exploration with a strategic itinerary that leaves room for collecting rocks and insects.
  culinary: Oneal Howard, an enthusiastic but selective eater, favors pepperoni pizza topped with extra mozzarella, loves crafting banana‑strawberry smoothies with almond milk, enjoys helping their mom
    make spaghetti with fresh basil and garlic, yet has a notorious habit of snacking on sugary cereal straight from the box while coding.
  core: Oneal Howard is an inquisitive, solitary eight‑year‑old who merges sci‑fi imagination with LEGO engineering, codes simple games, dominates puzzles and board games, manages a disciplined allowance,
    and tackles mild allergies with a blend of caution and occasional forgetfulness.
background:
  cultural: He is raised in a small, close-knit community in Coalgate, Oklahoma, a town with deep roots in coal-mining heritage and rural Midwestern values. His family emphasizes self-reliance, respect
    for hard work, and appreciation of the natural landscape of the Cross Timbers region. While the community is predominantly white and holds traditional values, his parents encourage curiosity and support
    his participation in school art and STEM programs. He attends a local public elementary school where community events, church gatherings, and weekend rodeos shape his cultural experiences.
