  career_goals: He dreams of becoming a space explorer or a robotics engineer, aiming to design machines that can discover new worlds. He wants to compete in science fairs and win recognition for innovative
    inventions. He also imagines becoming a comic book illustrator, merging his love of art and storytelling. He is determined to excel academically, receive top honors in his school, and eventually attend
    a prestigious science or engineering program.
