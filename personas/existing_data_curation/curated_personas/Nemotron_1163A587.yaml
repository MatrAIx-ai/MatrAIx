  career_goals: Hortencia aims to become a senior audit manager within the next three years, leading a specialized audit practice that serves family‑run businesses in Marin County. She aspires to mentor
    younger accountants, eventually transition to a boutique consulting role that helps Mexican‑American small businesses navigate tax and financial planning, and gradually move toward semi‑retirement while
    maintaining an advisory presence. Although she only completed some college, she plans to study for and pass the CPA exam to solidify her professional credentials.
