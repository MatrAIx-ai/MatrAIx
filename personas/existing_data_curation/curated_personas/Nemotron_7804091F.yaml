personas:
  professional: Dexter Shelter, a 63-year-old therapist with three decades of evidence‑based practice, leverages CBT and DBT expertise, meticulous documentation, and a deep compassion for community healing
    to mentor junior clinicians and integrate music‑infused counseling in the Tremé neighborhood, where they champion culturally responsive care.
  sports: Dexter Shelter, a loyal fan of the New Orleans Saints and Pelicans, hikes the riverfront five times a week with the Tremé Walking Club, and participates in a low‑impact rowing program at the Crescent
    City Rowing Club, where they stay active without overexertion.
  arts: Dexter Shelter, an avid lover of live jazz who frequents Preservation Hall and Snug Harbor, plays piano for their church choir, and draws inspiration from the stories of civil‑rights icons like
    Martin Luther King Jr. and Malcolm X as well as the music of Wynton Marsalis and Ella Fitzgerald.
  travel: Dexter Shelter, who prefers meticulously planned itineraries, often spends their vacations exploring historic Southern towns like Savannah and Charleston, attends the New York Jazz Festival each
    spring, and dreams of a cultural pilgrimage to Chicago’s jazz scene and Montpellier, France, while balancing a modest travel budget with their retirement income.
  culinary: Dexter Shelter, a seasoned home cook of Creole cuisine, delights in simmering rich gumbo with okra, andouille sausage, and crawfish, perfecting crisp, powdered beignets for weekend brunch, while
    they savor the occasional gumbo served at the French Quarter’s iconic Commander's Palace.
  core: Dexter Shelter, a methodical therapist who balances a love for jazz, meticulous garden routines, and a penchant for building model ships, channels their compassionate nature into community healing
    while wrestling with a chronic worry that fuels both their meticulous planning and occasional over‑cautiousness.
background:
  cultural: Dexter is a Black New Orleanian raised in the historic Tremé district, a hub of African‑American Creole culture. He grew up immersed in the city’s rich traditions of brass bands, second‑line
    parades, and Creole cuisine, while his family placed strong emphasis on church, oral storytelling, and community solidarity. These cultural roots inform his therapeutic style, prompting him to incorporate
    music, narrative, and family‑centered perspectives into his practice. Dexter also values the legacy of social justice activism that shaped his neighborhood, striving to address systemic barriers to
    mental health care for African‑American residents while honoring the vibrant, resilient spirit of his heritage.
attributes:
  skills: '["Active Listening", "Cognitive Behavioral Therapy (CBT)", "Dialectical Behavior Therapy (DBT)", "Trauma‑Informed Care", "Crisis Intervention", "Group Facilitation", "Case Management", "Culturally
    Competent Counseling", "Motivational Interviewing", "Documentation & Record Keeping"]'
  hobbies: '["Jazz Music Appreciation", "Playing Piano in Church Choir", "Cooking Creole Cuisine", "Gardening (raised‑bed vegetables)", "Walking along the Riverfront", "Reading Historical Biographies",
    "Model Ship Building", "Community Volunteering at Local Shelter"]'
  career_goals: Approaching retirement, Dexter aims to shift his focus toward mentorship—providing supervision and training for junior therapists in culturally responsive practices. He plans to launch a
    low‑cost community counseling program in the Tremé neighborhood that integrates music therapy and storytelling to alleviate stress and grief. Additionally, he hopes to author a memoir‑style guide that
    blends therapeutic techniques with New Orleans cultural wisdom, and to secure a steady, manageable part‑time practice that protects his own well‑being while remaining fully engaged with his passion
    for helping others.
