  hobbies: '[''visiting art galleries and folk museums'', ''painting (acrylic and watercolor)'', ''amateur photography'', ''gardening'', ''fishing'', ''cooking Southern recipes'', ''attending live music
    and community concerts'', ''reading history and genealogy'', ''woodworking projects'', ''volunteering at the local library or community center'']'
  career_goals: While not currently part of the formal workforce, Anant aims to deepen his involvement in the local community by volunteering as a mentor for younger residents interested in gardening and
    folk art. He hopes to document and share Berrien County’s oral histories through a small community‑run podcast or blog, and to develop a modest side venture selling his handcrafted paintings and quilts
    at regional craft fairs. Additionally, he is considering pursuing a GED to formalize his education and possibly take adult education courses in local history or art appreciation.
