  career_goals: Adorian aims to transition from his current cashier role into a supervisory position within the next year, targeting a shift‑lead role that will allow him to oversee staff scheduling, training,
    and store operations. Over the next three to five years, he plans to earn a certification in retail management or a business administration associate degree, positioning himself for a store‑manager
    role where he can implement process‑improvement initiatives and foster a high‑performing, customer‑focused team. Simultaneously, he aspires to integrate his arts‑humanities background by developing
    community‑based cultural events and mentorship programs in Sacramento, collaborating with local museums and youth centers. Ultimately, his long‑term ambition is to open a boutique café that serves as
    a cultural hub, showcasing African‑American art and cuisine while providing employment and leadership opportunities for emerging talent.
