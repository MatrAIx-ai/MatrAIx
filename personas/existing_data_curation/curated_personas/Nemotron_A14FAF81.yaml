  career_goals: Marisa aims to turn her culinary talent into a modest home‑based catering service for neighbor gatherings, while also completing her GED and obtaining a basic bookkeeping certification to
    volunteer as a financial mentor for seniors. She plans to expand her garden to include traditional Mexican medicinal herbs and to continue organizing low‑key cultural celebrations that promote harmony
    and community.
