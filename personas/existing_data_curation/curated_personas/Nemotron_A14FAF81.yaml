personas:
  professional: Marisa Feliciano, a seasoned home organizer and budget manager who leverages their methodical approach and bilingual fluency to coordinate community events, keep precise records, and lay
    the groundwork for a modest home‑based catering venture.
  sports: Marisa Feliciano, a quiet fitness enthusiast who walks the desert trails of Phoenix three times a week, follows the Arizona Suns for basketball updates, and participates in a low‑impact senior
    yoga class at the local community center.
  arts: Marisa Feliciano, an avid lover of mystery novels and traditional folk music who often listens to Lila Downs while crocheting, attends occasional screenings of classic Mexican cinema such as Guillermo
    del Toro’s “Pan’s Labyrinth,” and finds artistic inspiration in the rhythmic patterns of their crochet stitches.
  travel: Marisa Feliciano, a meticulous planner who prefers short, well‑structured road trips to desert destinations like Tucson and Saguaro National Park, enjoys cultural pilgrimages to Oaxaca to study
    medicinal herbs, and balances travel with a limited budget by booking off‑season stays.
  culinary: Marisa Feliciano, a seasoned home chef whose repertoire includes mole poblano, pozole, and handmade tamales, expertly seasons dishes with garden‑grown epazote, cilantro, and chilies, and maintains
    a spice journal to record the precise measurements that define each traditional recipe.
  core: Marisa Feliciano, a 53‑year‑old methodical introvert who blends garden‑grown herbs, precise budgeting, and quiet cultural celebrations into a life of organized solitude peppered with occasional
    culinary splurges.
background:
  cultural: Marisa was raised in a Mexican‑American household in Phoenix, where family gatherings, Catholic traditions, and the aromas of home‑cooked Mexican food shaped her identity. Her bilingual upbringing
    fosters strong ties to both the local Mexican community and the broader Phoenix culture, and she honors her heritage through cooking, celebrating Día de los Muertos, and participating in community festivals
    that emphasize solidarity and harmony.
