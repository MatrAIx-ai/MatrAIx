persona_description: A historian of fashion who specializes in the development and evolution of pattern making in Europe, particularly during the Middle Ages and the Enlightenment. Their research interests
  include the history of tailoring, the development of pattern making technologies, and the role of pattern making in the advancement of fashion. They are particularly interested in the early history of
  pattern making, the development of the inch tape measure, the invention of the sewing machine, the development of dress forms, and the role of pattern making in the production of clothing. They have a
  strong understanding of the cultural and economic contexts in which pattern making developed, and are able to draw on a wide range of sources to support their research.
