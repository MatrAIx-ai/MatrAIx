  career_goals: Although retired from formal employment, David aims to channel his artistic and historical interests into community‑focused projects. He hopes to organize a small‑scale exhibition of his
    coastal paintings at the Astoria Riverfront School, collaborate with the local historical society to produce a booklet on Astoria’s fishing heritage, and mentor a handful of aspiring artists through
    informal workshops. He also dreams of publishing a collection of his memoirs and photographs, preserving his personal narrative for future generations while deepening his sense of purpose and legacy.
