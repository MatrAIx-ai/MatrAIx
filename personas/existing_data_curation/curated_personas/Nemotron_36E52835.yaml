  professional: Martisha Odom, a 2‑year‑old child model for a local children's apparel line, showcases an early knack for organized pose sequences, meticulous attention to detail in her outfits, and a curious
    spark that makes each shoot feel like an exploration of new ideas.
  sports: Martisha Odom, a 2‑year‑old who loves toddling around the preschool’s mini‑soccer class on rainy afternoons, cheers loudly for the Chicago Cubs during family game nights, and insists on a daily
    tumble‑down the inflatable playhouse as her version of a workout.
  arts: Martisha Odom, a 2‑year‑old who splashes finger paints in vivid colors echoing Van Gogh’s Starry Night, claps along to the upbeat songs of The Wiggles, and watches animated performances featuring
    actress Millie Bobby Brown, letting each artistic encounter fuel her boundless curiosity.
  travel: Martisha Odom, a 2‑year‑old who eagerly enjoys short car rides to the local zoo, the family’s annual weekend getaway at a lake cabin in the Adirondacks, and dreams of one day seeing the pyramids
    of Egypt through picture books, preferring the comfort of a familiar stroller seat while displaying a spark of adventurous curiosity when the car windows are down.
  culinary: Martisha Odom, a 2‑year‑old who delights in spoon‑fuls of creamy macaroni and cheese, insists on adding diced strawberries to her yogurt, and frequently tries to stir the pot of oatmeal with
    a plastic spoon, showing a budding fondness for sweet, mild flavors and messy kitchen adventures.
  core: Martisha Odom, a 2‑year‑old whose boundless curiosity blends with a surprisingly organized play style, a competitive streak for securing the biggest puzzle piece, and a habit of hoarding glittery
    coins while scrambling for gummy bears.
