personas:
  professional: Sang Lee, a 19‑year‑old marketing manager at a San Marcos e‑commerce boutique, blends bilingual fluency, a curiosity for emerging platforms like TikTok and Instagram with a practical, ROI‑focused
    mindset, thriving on flexible, occasionally improvised workflows while rallying teammates through collaborative brainstorming and assertively championing data‑driven ideas.
  sports: Sang Lee enjoys weekend hikes on Hill Country trails with the Texas Hill Country Trek Club, casually joins pickup soccer games on Saturday evenings, roots for the San Antonio Spurs in basketball
    and follows Austin FC in soccer, preferring low‑impact cardio over gym routines but sometimes skips workouts after prolonged gaming sessions.
  arts: Sang Lee curates Instagram reels mixing kinetic video edits set to BTS's Dynamite and Tame Impala's The Less I Know The Better, frequently attends local indie concerts featuring bands like The Strokes,
    appreciates classic rock legends such as Led Zeppelin, and occasionally binge‑watches Korean drama OST videos for inspiration.
  travel: Sang Lee prefers spontaneous, budget‑friendly road trips, often packing a DSLR for sunrise shots at Enchanted Rock while also dreaming of a spring visit to Seoul’s street‑food alleys and a future
    backpacking adventure through the Korean countryside, balancing weekend get‑aways with academic commitments.
  culinary: Sang Lee enjoys experimenting in the kitchen, whipping up bibimbap with gochujang‑marinated beef alongside cilantro‑laced chicken fajitas and fresh guacamole, often improvising with whatever’s
    in the fridge and inviting friends over for low‑key dinner parties where the playlist jumps from K‑pop to classic rock.
  core: Sang Lee is a restless digital native who balances sunrise hikes, late‑night gaming marathons, and a habit of leaving coffee cups on the desk while constantly seeking the next creative spark through
    flexible, if occasionally disorganized, planning.
background:
  cultural: Sang is a second-generation Korean-American. His parents immigrated from South Korea and kept many traditional practices at home, such as speaking Korean, celebrating Chuseok and Seollal, and
    preparing Korean cuisine. Growing up in San Marcos, Texas, he also embraced the local culture – attending high school football games, enjoying Texas barbecue, and participating in community events.
    This bicultural upbringing gave him fluency in both English and Korean and a keen sense of how cultural nuance shapes consumer behavior. He often draws on his heritage to craft marketing messages that
    resonate with Asian-American audiences while staying authentic to the Texan spirit.
attributes:
