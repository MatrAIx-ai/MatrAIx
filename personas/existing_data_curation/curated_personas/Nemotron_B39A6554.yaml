    copywriting (English/Korean)'']'
  hobbies: '[''Playing video games'', ''Creating short-form video edits'', ''Photography'', ''Hiking in the Texas Hill Country'', ''Cooking Korean and Tex-Mex dishes'', ''Listening to K-pop and indie music'',
    ''Volunteering at community cultural festivals'', ''Exploring new social media trends'']'
  career_goals: Sang aims to finish a BS in Marketing while building a portfolio of measurable campaigns. In the next three years he hopes to move from his current small‑business role to a senior digital
    strategist position at a regional firm, leading larger cross‑functional teams and overseeing multi‑channel brand initiatives. He plans to earn certifications such as Google Ads, HubSpot Inbound and
    a data‑analytics credential to strengthen his data‑driven decision‑making. Long‑term, he envisions founding a boutique agency that helps multicultural brands bridge the gap between Asian‑American and
    broader U.S. markets, using his bilingual skills and insight into both Korean and Texan cultures.
