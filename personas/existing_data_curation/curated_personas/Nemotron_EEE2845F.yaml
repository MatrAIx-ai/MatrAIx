personas:
  professional: Louis Shelton, a retired automotive mechanic turned neighborhood handyman and volunteer tech guide, blends decades of hands‑on repair expertise with a love for digital photography and GIS
    mapping, offering low‑key consulting on home‑repair projects while mentoring younger hobbyists in woodworking and electronics.
  sports: Louis Shelton enjoys hiking the Sierra Nevada foothills and birdwatching, follows the Reno Aces baseball team and the Vegas Golden Knights hockey club, and maintains fitness through weekly trail
    walks and occasional backyard strength work, preferring solitary outdoor activity over gym crowds.
  arts: Louis Shelton immerses himself in the sounds of Miles Davis, John Coltrane, The Rolling Stones, and Led Zeppelin while capturing sunrise landscapes with his DSLR, building scale models of classic
    cars, and restoring vintage radios, letting these creative pursuits shape his quiet evenings.
  travel: Louis Shelton favors self‑driven road trips to national parks such as Yosemite and Great Basin, planning routes with GIS maps and camping under the stars, yet budget constraints keep his adventures
    modest and he often returns home to tend his garden before the next outing.
  culinary: Louis Shelton prefers simple, garden‑fresh meals like roasted heirloom tomatoes with rosemary, quinoa salads, and occasional hearty meatloaf, enjoys cooking with garlic and fresh herbs, and
    delights in the occasional hand‑made pickles, though he sometimes forgets to stock pantry staples, leading to spontaneous improvisations.
  core: Louis Shelton is a solitary, curiosity‑driven retiree who balances practical tinkering with quiet creative pursuits, embraces flexibility over strict schedules, and navigates life with a competitive
    edge that sometimes borders on skepticism.
background:
  cultural: Louis grew up in a mid‑western American town during the post‑war era, absorbing a cultural mix of traditional work ethic, self‑reliance, and community values typical of baby‑boomers. His white,
    Anglo‑American heritage includes family traditions of Saturday chores, holiday gatherings, and a respect for practical education over formal credentials. After relocating to Reno in the 1990s, he embraced
    the local desert‑mountain culture, valuing outdoor recreation, a laid‑back pace, and a network of retirees who share his preference for quiet, independent lifestyles. He identifies with the broader
    American individualist ethos while appreciating the regional history and natural landscape of the Great Basin.
