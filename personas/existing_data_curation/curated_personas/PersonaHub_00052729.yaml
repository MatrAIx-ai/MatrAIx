persona_description: A researcher or educator who is interested in the development of self-control in children and the impact of self-control on weight gain in adolescence. This person may be particularly
  interested in the study of the Social Skills Rating System and the composite measure of self-control created from mother, father, and teacher-report ratings. They would be interested in the findings of
  the study, which suggests that children who are more self-controlled at age 9 are less likely to become overweight at age 15. This person would also be interested in the potential implications of their
  findings for public health and policy.
