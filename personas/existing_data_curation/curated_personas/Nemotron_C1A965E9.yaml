    outreach'']'
  hobbies: '[''Acrylic painting'', ''Visiting art galleries and museums'', ''Community theater'', ''Cooking Mexican cuisine'', ''Gardening'', ''Yoga and meditation'', ''Folk dance workshops'', ''Reading
    contemporary literature'']'
  career_goals: Veronica aspires to obtain an Associate Degree in Nursing to transition to a Registered Nurse role, enabling her to take on greater clinical responsibility and mentorship duties. She plans
    to lead a culturally tailored community health program in Berks County that provides preventive care and health education to underserved Mexican-American families. Additionally, she hopes to incorporate
    creative arts into patient recovery programs, championing the therapeutic benefits of painting and music within the hospital setting. Long‑term, she envisions serving as a clinical educator, sharing
    her holistic and culturally sensitive approach with new nursing staff.
