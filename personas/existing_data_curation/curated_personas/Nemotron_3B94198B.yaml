  career_goals: Esther dreams of becoming an artist who illustrates children's books about the environment, hoping her pictures will inspire other kids to love nature. She also imagines a future as a wildlife
    biologist or environmental educator, working to protect the lakes and forests around her home. While she worries about keeping up with schoolwork, she is determined to pursue a path that blends creativity
    with scientific curiosity, aiming to study environmental science while honing her artistic skills.
