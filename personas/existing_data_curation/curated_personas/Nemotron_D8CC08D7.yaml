personas:
  professional: Onyx Pierre, a veteran civil engineer specializing in sustainable urban infrastructure, leverages deep expertise in structural analysis, advanced composites, and data-driven performance
    modeling while channeling their pragmatic curiosity and collaborative leadership into strategic consulting and mentorship for emerging engineers.
  sports: Onyx Pierre stays active by joining the West Philly Strollers walking club, playing evening pickleball at the local senior center, cheering for the Philadelphia Eagles in the fall and the Phillies
    in the spring, while maintaining a light cardio routine that balances social connection with personal health.
  arts: Onyx Pierre blends creative expression and cultural appreciation by performing jazz piano standards like “Round Midnight” at the Beanbag Coffeehouse, photographing historic rowhouses inspired by
    the works of photographer Gordon Parks, and attending live performances by the Philadelphia Jazz Coalition featuring artists such as Herbie Hancock and Esperanza Spalding.
  travel: Onyx Pierre enjoys thoughtfully planned trips to historic sites, having explored the Freedom Trail in Boston, visited the National Museum of African American History and Culture in Washington,
    D.C., and longing to wander the cobblestone streets of Savannah, Georgia, all while balancing a modest travel budget with a love for educational journeys.
  culinary: Onyx Pierre delights in farm‑to‑table cooking, skillfully preparing roasted beet and heirloom tomato salad with fresh basil, slow‑cooked collard greens with smoked turkey, and occasional indulgent
    sweet potato pie, favoring seasonal garden harvests and occasional dining at local home‑style Southern cuisine restaurants like Philadelphia’s famed South Philly Diner.
  core: Onyx Pierre is a pragmatic visionary who balances rigorous engineering rigor with soulful jazz improvisations, tends a community garden for quiet solace, occasionally overspends on coffee for gig
    nights, and never misses a chance to mentor the next generation.
background:
  cultural: Onyx grew up in West Philadelphia during the late 1950s and 60s, a period marked by vibrant African‑American cultural expression and the civil‑rights movement. Her family emphasized education,
    church involvement, and community service, values that have guided her throughout her life. As a Black woman in a traditionally male‑dominated field, she faced and overcame systemic barriers, which
    fueled her commitment to diversity, equity, and inclusion within engineering. She remains an active member of the National Society of Black Engineers and frequently participates in local Black heritage
    festivals, bridging her professional identity with a deep sense of cultural pride and responsibility to uplift the next generation.
