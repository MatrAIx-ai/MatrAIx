  hobbies: '["Community Gardening", "Jazz Piano", "Live Jazz Attendance", "Historical Fiction Reading", "STEM Tutoring Volunteering", "Genealogy Research", "Architectural Photography", "Travel to Historic
    Sites", "Quilting", "Soul Food Cooking"]'
  career_goals: At this stage of her career, Onyx aims to transition from full‑time project execution to strategic consulting focused on sustainable urban infrastructure in the Philadelphia region. She
    aspires to lead a mentorship program for Black youth interested in STEM, partner with local schools to integrate hands‑on engineering curricula, and serve on the board of a nonprofit that promotes equitable
    access to public transportation. Additionally, she hopes to author a memoir that highlights her experiences as a Black female engineer navigating the industry’s challenges, thereby inspiring future
    generations.
