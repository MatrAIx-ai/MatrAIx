personas:
  professional: A miniature architect in the playroom, Marie Yeargin meticulously builds block towers, and they demonstrate early spatial reasoning and a methodical approach that balances curiosity about
    new designs with a practical insistence on stability.
  sports: A budding sports enthusiast, Marie Yeargin cheers for the Seattle Mariners during family baseball nights, participates in a Tiny Tots Soccer Club that meets on Saturday mornings, and attends a
    preschool gymnastics class, balancing energetic play with regular breaks to avoid overtiring, and they proudly wear a Seattle Sounders FC shirt during outings.
  arts: A young arts aficionado, Marie Yeargin loves watching the animated series "Bluey" and dancing along to songs by The Wiggles and Raffi, often recreating scenes from Disney’s "Frozen" with homemade
    costumes, and they enthusiastically collect coloring books featuring characters like Mickey Mouse and Elsa, finding comfort and inspiration in these familiar creative worlds.
  travel: An adventurous four‑year‑old explorer, Marie Yeargin has visited Disneyland Resort in Anaheim and the Seattle Aquarium with her family, and dreams of seeing the Eiffel Tower in Paris and cherry
    blossoms in Kyoto, preferring trips that blend hands‑on activities like tide‑pooling with story‑time moments, and they eagerly help plan outings using colorful maps and sticker itineraries.
  culinary: A budding food enthusiast, Marie Yeargin adores creamy macaroni and cheese, fresh strawberry slices, and peanut‑butter‑banana sandwiches, can confidently spread peanut butter on toast, and delights
    in occasional mini‑pizza toppings like pepperoni and pineapple, yet they are notoriously picky about broccoli, refusing to eat anything green beyond peas.
  core: Marie Yeargin is a curious, methodical four‑year‑old who organizes block towers, saves every coin, and insists on bedtime stories about dragons while they occasionally forget to put on sunscreen.
background:
  cultural: Marie is raised in a Black family in Lincoln Park, Michigan, where cultural heritage is celebrated through family gatherings, church events, and community festivals. Her household honors traditions
    such as preparing soul‑food meals, singing gospel music, and observing Kwanzaa and Juneteenth with stories of African American history. The local community center offers arts and cultural programs that
    nurture her pride in her roots, while her parents encourage her participation in local events that highlight the richness of Black culture in the Detroit metropolitan area.
attributes:
  skills: '[''Basic literacy (letter recognition and phonemic awareness)'', ''Counting to 10'', ''Fine‑motor coordination (drawing, coloring, stacking blocks)'', ''Organizing toys by type and size'', ''Following
