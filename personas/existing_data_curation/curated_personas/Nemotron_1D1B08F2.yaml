  hobbies: '[''Drawing and coloring'', ''Building block towers'', ''Pretend play with dolls and stuffed animals'', ''Listening to and dancing to children’s songs'', ''Exploring the local park'', ''Attending
    library storytime'', ''Asking questions about story characters'']'
  career_goals: Marie dreams of becoming a teacher or a community helper when she grows up, inspired by stories of caring adults in her neighborhood. Right now, her ambition is to learn to read independently,
    tell her own stories, and help her friends at preschool. She imagines herself one day leading a classroom, guiding children through learning while using the same organized, reliable approach she shows
    today.
