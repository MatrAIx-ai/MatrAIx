  career_goals: Ashley aims to deepen her expertise in large‑scale optimization while moving into a senior analyst or team‑lead role within a multidisciplinary operations team. She wants to lead projects
    that enhance the sustainability and cost‑effectiveness of supply‑chain networks for regional businesses in the Washington‑DC metro area. Over the next five years, she hopes to obtain a professional
    certification in supply‑chain analytics such as the APICS CPIM and mentor junior analysts, fostering a collaborative environment that values both rigor and flexibility. Ultimately, she envisions a position
    that balances technical challenges with a stable work‑life rhythm, allowing her to maintain personal well‑being and community involvement.
