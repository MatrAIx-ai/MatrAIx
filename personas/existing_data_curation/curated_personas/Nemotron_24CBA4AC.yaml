    (Tableau, PowerBI)'', ''Technical writing'', ''Stakeholder communication'']'
  hobbies: '[''Reading historical fiction and mystery novels'', ''Gardening'', ''Baking and cooking'', ''Solving puzzles (crosswords, sudoku, logic games)'', ''Small‑group hiking'', ''Visiting local farmers’
