personas:
  professional: Joseph Lee is a budding toddler architect who meticulously arranges wooden blocks into towering structures, displaying an early love for organization, disciplined achievement, and a curiosity
    about how things fit together.
  sports: Joseph Lee is a lively participant in the neighborhood Tiny Tots soccer circle, delighting in mini-goal drills, cheering for the River City Ravens during family game nights, and balancing energetic
    playground climbing with needed nap breaks.
  arts: Joseph Lee is a curious little artist who spends hours finger-painting rainbow swirls, sorting crayons by hue, and humming along to The Wiggles, demonstrating a natural appreciation for vibrant
    expression and unconventional creativity.
  travel: Joseph Lee loves short family adventures to the local botanical garden and the city zoo, and daydreams about future visits to Disneyland and the Grand Canyon, preferring itineraries that blend
    playful discovery with familiar routine.
  culinary: Joseph Lee is a selective eater who adores creamy macaroni and cheese and soft bananas but occasionally reaches for avocado toast, proudly building tiny sandwich towers while dramatically rejecting
    peas with a grimace.
  core: Joseph Lee is a meticulous, curious two-year-old who balances disciplined play with spontaneous bursts of joy, a love of organized creativity, and a quirky habit of counting every step they take.
background:
  cultural: Joseph comes from a white, middle‑class family rooted in Jacksonville, Florida. His upbringing reflects Southern U.S. cultural influences such as family gatherings for church, community festivals,
    and regional foods like shrimp and grits. The family values kindness, cooperation, and harmony, encouraging Joseph’s considerate nature and his appreciation for the arts through museum trips and music
    at home.
