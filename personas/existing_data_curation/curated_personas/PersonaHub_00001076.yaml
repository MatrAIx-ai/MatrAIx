persona_description: A microbiologist who studies the interaction between bacteria and fungi in cheese communities, with a focus on understanding how different species of microbes and fungi interact and
  how to control these interactions in the lab. She has isolated and cultured species of microbes and fungi found in cheese samples and conducted tests aimed at reproducing the communities she found. Her
  research interests include the development of bacterial communities, the study of microbial interactions, and the characterization of molecules that different bacteria use to kill fungi.
