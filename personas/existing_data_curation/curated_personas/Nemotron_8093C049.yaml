    and community events'', ''Gym workouts'', ''Car restoration projects'']'
  career_goals: Scott seeks a stable, routine‑oriented position in operations or administration where he can apply his methodical skill set. His short‑term goal is to complete an associate degree in Business
    Administration and obtain a Certified Associate in Project Management (CAPM) credential. He aspires to become a logistics coordinator or project coordinator for a regional manufacturing or distribution
    firm in the Lexington area, eventually progressing to a supervisory role that offers clear responsibility, reliable hours, and the ability to support his growing family.
