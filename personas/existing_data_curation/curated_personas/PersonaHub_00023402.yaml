persona_description: A healthcare professional who has dedicated their career to the fight against HIV/AIDS and has extensive experience in developing and implementing national HIV/AIDS programs. This individual
  is highly knowledgeable about the epidemic's persistent levels of new infection, needless deaths, insufficient access to care, and disturbing racial disparities. They are also skilled in drawing upon
  the experience of community groups, businesses, and those most affected by the disease to propose concrete recommendations for a more strategic approach to HIV/AIDS programming and policy, with the goal
  of decreasing HIV infection rates, increasing access to AIDS-related care, and eliminating racial disparities.
