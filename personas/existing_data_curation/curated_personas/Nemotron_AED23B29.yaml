personas:
  professional: Dora Holmes is a meticulous residential and community architect who leverages advanced BIM tools like Revit and Rhino to deliver sustainably resilient designs rooted in historic vernacular,
    balancing rigorous technical standards with a keen curiosity for innovative climate‑responsive solutions, while they consistently push projects toward award‑winning excellence through a disciplined
    and competitive workflow.
  sports: Dora Holmes is an avid hiker who trails the pine‑forested hills of the Mississippi Delta each weekend, frequents a local climbing gym during the summer months, follows the New Orleans Saints football
    team and the Mississippi State Bulldogs basketball, and they prefer solo endurance activities that complement their strategic mindset.
  arts: Dora Holmes is a devoted pianist who winds down evenings practicing Chopin Nocturnes and Debussy's Arabesques, curates a personal library of Southern literature and African‑American cultural history,
    visits local art openings featuring Ansel Adams‑inspired photography and contemporary ceramicist Warren MacKenzie, while they sometimes stay up late sketching architectural details.
  travel: Dora Holmes is a meticulous solo traveler who maps each trip with spreadsheet precision, favors architecture‑focused itineraries visiting historic districts of Charleston, Savannah, and New Orleans,
    has hiked a segment of the Appalachian Trail in Virginia, dreams of exploring Kyoto’s traditional machiya houses, and they budget travel carefully to keep professional licensure fees on track.
  culinary: Dora Holmes is a herb‑savvy home cook who harvests basil, rosemary, and thyme from their garden to flavor dishes like shrimp‑and‑grits with a lemon‑herb glaze and garlic‑infused pasta, enjoys
    experimenting with seasonal produce from local farmers' markets, but they sometimes over‑season while juggling a looming project deadline.
  core: Dora Holmes is a disciplined, solitary architect who fuses sustainable design with historic reverence, channels competitive curiosity into precise work, and balances methodical planning with quiet
    creative pursuits, all while they remain remarkably calm under pressure.
background:
  cultural: Dora was born and raised in Sturgis, Mississippi, where her family’s roots stretch back generations to the post‑Reconstruction era. Her grandparents were part of the Great Migration’s return
    movement, establishing a modest farm after years of sharecropping. The close‑knit African‑American church community that shaped her upbringing emphasized storytelling, gospel music, and a collective
    resilience that informs her design ethos. She draws inspiration from Southern blues and the region’s vernacular architecture—shotgun houses, raised porches, and the interplay of indoor and outdoor spaces—integrating
    subtle cultural motifs into contemporary projects. Although she values solitude, she carries forward a deep respect for communal heritage, seeking to create built environments that honor the lived experiences
    of her ancestors while addressing modern sustainability challenges.
attributes:
  skills: '["Architectural Design", "Sustainable Design", "Historic Preservation", "BIM Management (Revit, Navisworks)", "AutoCAD Drafting", "Site Planning & Analysis", "Structural Systems Understanding",
    "Project Management", "Cost Estimation", "LEED Green Building Standards", "Parametric Modeling (Grasshopper)", "3D Visualization (SketchUp, Rhino)", "GIS Mapping", "Independent Concept Development"]'
  hobbies: '["Hiking", "Landscape Photography", "Architectural Sketching", "Reading Architectural Theory", "Reading African‑American Cultural History", "Piano Practice", "Gardening", "Solo Chess Puzzles",
    "Digital 3D Modeling for Fun", "Documenting Historic Homes"]'
  career_goals: Dora aims to secure full professional licensure and achieve LEED AP certification within the next two years, positioning herself for senior leadership in a regional architecture firm or
    to launch her own boutique practice focused on sustainable, culturally resonant design for rural Mississippi communities. She is driven to become a recognized authority on resilient housing solutions
    that address the subtropical climate challenges of the South, and she seeks to earn national AIA awards for innovative projects that blend modern efficiency with African‑American vernacular motifs.
    Long‑term, she hopes to contribute scholarly research on climate‑responsive architecture to peer‑reviewed journals and to mentor emerging designers through one‑on‑one guidance rather than group instruction,
    reflecting her preference for focused, competitive excellence.
