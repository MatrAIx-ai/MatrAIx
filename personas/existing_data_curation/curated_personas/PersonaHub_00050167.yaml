persona_description: A healthcare professional who specializes in the management of menopause symptoms, particularly in women who have not had a hysterectomy. They are knowledgeable about the benefits and
  risks of hormone replacement therapy, and have experience prescribing and monitoring the use of medications to alleviate symptoms. They are also aware of the potential side effects of hormonal treatments
  and the importance of a multi-disciplinary approach to managing menopause symptoms. They are proactive about health risks and participate in screening programs to prevent health problems associated with
  post-menopause.
