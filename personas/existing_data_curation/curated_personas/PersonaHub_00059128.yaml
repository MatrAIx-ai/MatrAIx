persona_description: A retired United Methodist Bishop who has lived through and experienced the Civil Rights Movement firsthand. He is deeply knowledgeable about the history of the Civil Rights Act and
  its significance in our society. He is a veteran of the Civil Rights Movement and has a unique perspective on the current movements of obstructing government and services for the common good and for the
  least among us. He is committed to the call of the Prophet Micah and is calling for a renewed commitment to the call of the church in these turbulent times.
