persona_description: A paleontologist who specializes in the study of the Late Miocene and Pliocene strata of China, particularly the fossil record of the genus Hipparion. His research interests include
  the distribution and evolution of the Hipparion species, as well as the use of biomarkers for stratigraphic correlations and climatic and environmental reconstructions. He has made significant contributions
  to the understanding of the zoogeographical significance of the subgenus Baryhipparion, particularly in the Eurasian expansion of the group during the Late Miocene and Pliocene. He is also known for his
  expertise in the dating of geological strata and the interpretation of micromammalian fossils.
