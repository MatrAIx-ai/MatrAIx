  hobbies: '[''Abstract Painting'', ''Reading Science Fiction & Philosophy'', ''Model Boat Woodworking'', ''Hiking'', ''Landscape Photography'', ''Mindfulness Meditation'', ''Vintage Radio Restoration'',
    ''Chess (Online)'']'
  career_goals: Michaelandrew aims to transition from an internal specialist role to an independent consultant, helping regional Idaho businesses adopt data‑driven operational improvements and sustainable
    practices. He seeks to mentor younger colleagues through structured knowledge‑sharing programs and to publish a whitepaper that combines artistic thinking with business process design. Financial security
    for his family and a comfortable retirement are also priorities, and he plans to supplement his income by selling his abstract artwork and offering occasional workshops on creative problem solving in
    business contexts.
