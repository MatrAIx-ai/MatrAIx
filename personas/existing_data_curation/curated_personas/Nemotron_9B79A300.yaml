personas:
  professional: Andres Cancel, a budding LEGO architect, combines curiosity and practicality by meticulously following instructions before improvising new designs, often leading building sessions with friends
    and demonstrating an early talent for spatial reasoning and collaborative play.
  sports: Andres Cancel, an energetic member of the Central Valley Kids Soccer Club, practices dribbling after school, models their style after the LA Galaxy forward, enjoys cheering for the Los Angeles
    Lakers during winter basketball season, and eagerly joins the community’s spring baseball league with friends.
  arts: Andres Cancel, a vivid sketch artist, fills school journals with drawings of farm animals and trucks, draws inspiration from Dr. Seuss and Pixar’s Toy Story, and constructs LEGO mosaics that echo
    the rhythms of traditional folk songs they hear during family celebrations.
  travel: Andres Cancel, a curious explorer, loves family trips to nearby avocado farms, dreams of a future visit to Disneyland’s Adventureland, and hopes to experience the lantern‑lit plazas of Día de
    los Muertos celebrations in another city.
  culinary: Andres Cancel, a junior kitchen helper, relishes assembling chicken tacos with fresh cilantro, salsa verde, and a squeeze of lime, skillfully rolls tortillas alongside parents, and savors fruit
    salads topped with mango and banana after soccer practice.
  core: Andres Cancel, the organized, energetic six‑year‑old who balances LEGO building, soccer, and taco‑making, always carries a bright sticker‑covered planner; they sometimes forget to tidy up the LEGO
    bricks and giggle when a stray soccer ball rolls into the kitchen.
background:
  cultural: Andres grows up in a Mexican-American household in Corcoran, California, where both English and Spanish are spoken daily. His family celebrates Mexican traditions such as Día de los Muertos,
    Mexican Independence Day, and holiday meals featuring tacos, tamales, and fresh fruit. The local community is rooted in agriculture, and many of his relatives work in the fields, giving him a strong
    appreciation for farm life. He attends a bilingual elementary school that incorporates Mexican cultural lessons, and his parents encourage him to maintain his heritage while navigating the broader American
    culture. This blend of traditions shapes his values of family, community, and kindness.
