  hobbies: '[''playing soccer'', ''building LEGO sets'', ''drawing and coloring'', ''listening to music with family'', ''helping in the kitchen'', ''participating in school art projects'', ''group story-time
    activities'']'
  career_goals: Andres dreams of becoming a community helper who can protect and teach others. He often talks about wanting to be a firefighter because he admires the bravery and teamwork, and he also imagines
    being a teacher to share knowledge with younger kids. His love for soccer makes him consider a future as a professional player or coach, and he sometimes mentions helping his family on the farm, showing
    a practical appreciation for the work his community does. These goals blend his curiosity for new experiences with his practical desire to contribute.
