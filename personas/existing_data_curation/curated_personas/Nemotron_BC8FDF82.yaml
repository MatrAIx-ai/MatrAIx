personas:
  professional: Matthew Srebnick, a veteran casino surveillance and physical security specialist with over thirty years of experience, blends meticulous pattern‑recognition with an imaginative curiosity
    to upgrade AI‑driven monitoring systems, mentor junior guards, and chart a path toward a supervisory role and Certified Protection Professional certification.
  sports: Matthew Srebnick, a devoted fan of the Pittsburgh Steelers, Penguins, and Pirates, spends weekday mornings hiking the Allegheny foothills with the Allegheny Treks Hiking Club, joins the Pittsburgh
    Seniors Pickleball League for light cardio in spring, and they keep a modest three‑mile jog on weekends to stay fit, balancing competition with low‑impact activity.
  arts: Matthew Srebnick, an analog‑film enthusiast who develops his own prints, draws artistic inspiration from Ansel Adams’ landscapes, Edward Hopper’s interiors, and Claude Monet’s watercolors, while
    listening to Bob Dylan’s folk storytelling and attending community‑theater productions of Lin‑Manuel Miranda’s songs and Meryl Streep’s classic film screenings, and they occasionally dabble in watercolor
    painting to translate their night‑time visions onto canvas.
  travel: Matthew Srebnick, a meticulous planner who maps each trip around golden‑hour photo opportunities, enjoys weekend escapes to the Laurel Highlands and a memorable winter visit to Quebec City, dreams
    of chasing the aurora borealis over Iceland’s ice fields, and they prefer modest boutique inns over chain hotels to maintain a relaxed, low‑stress pace.
  culinary: Matthew Srebnick, a competent home cook with a penchant for rustic comfort foods, frequently prepares slow‑roasted pork shoulder glazed with apple‑cider reduction, hand‑rolled pierogi stuffed
    with potato and chive, and smoked trout pâté seasoned with fresh dill and lemon zest, while savoring a daily espresso shot, and they occasionally experiment with herb‑infused ratatouille featuring garden‑grown
    thyme and rosemary.
  core: Matthew Srebnick, a night‑time photographer and security veteran, blends meticulous surveillance instincts with artistic imagination, but often battles worry‑induced insomnia and a compulsive habit
    of reorganizing their darkroom at odd hours.
background:
  cultural: Matthew grew up in Dunlo, a small town in Cambria County, Pennsylvania, where his family’s roots trace back to German and Irish immigrants who settled in the region during the late‑19th century.
    The community’s Appalachian heritage—marked by close‑knit family ties, church gatherings, and a legacy of coal‑mining labor—shaped his work ethic and sense of responsibility. He was raised in a modest,
    middle‑class household that valued self‑reliance, humility, and community service. While he respects local traditions such as regional folk music and county fairs, his innate curiosity has led him to
    explore broader cultural and artistic influences through books, film, and visual arts.
