  hobbies: '[''Night photography'', ''Reading science-fiction and art theory'', ''Puzzle solving'', ''Chess'', ''Model building'', ''Community theater attendance'', ''Hiking'', ''Bird watching'', ''Local
    history research'', ''Analog film development'', ''Watercolor painting'', ''Journaling'', ''Mindfulness breathing'']'
  career_goals: Matthew aims to step into a supervisory role within the casino’s security team, seeking certification as a Certified Protection Professional to formalize his expertise. He plans to gain
    proficiency with emerging AI‑driven surveillance tools and to mentor younger guards through a formal training program. As retirement approaches, he hopes to transition into part‑time security consulting
    for small local businesses and to launch a modest side venture showcasing his night‑photography prints. He also intends to continue personal development by enrolling in community‑college courses on
    art history and digital imaging, enriching both his professional and creative pursuits.
