personas:
  professional: Carla Gross is a curious kindergartener who dreams of becoming a museum curator, turning playtime into miniature art exhibits and using their natural negotiation skills to trade crayons
    for stickers while preferring the freedom of unstructured learning over strict schedules.
  sports: Carla Gross spends Saturday mornings sprinting with the Tiny Tigers preschool soccer team, splashes through community pool swim lessons in summer, and cheers for the Chicago Cubs on TV, especially
    admiring pitcher Marcus Stroman’s calm demeanor.
  arts: Carla Gross fills sketchbooks with vibrant creatures inspired by Eric Carle’s ‘The Very Hungry Caterpillar,’ hums Disney’s ‘Let It Go’ from Frozen while drawing, and stages impromptu puppet shows
    featuring characters from Moana, turning every idle moment into a colorful performance.
  travel: Carla Gross delights in family road trips to the nearby zoo, loves the sparkle of Disney World’s Magic Kingdom visited last summer, and dreams of building sandcastles on the beaches of Cancun,
    though the idea of flying alone still stirs a touch of nervousness.
  culinary: Carla Gross adores cheesy macaroni, spreads creamy peanut butter and strawberry jam on whole‑grain bread, giggles while sprinkling rainbow sprinkles on chocolate chip pancakes, and proudly helps
    stir batter and arrange banana smiley faces on cupcakes.
  core: Carla Gross is a bright, art‑loving five‑year‑old whose boundless curiosity and occasional anxiety turn everyday moments into colorful experiments, often misplacing crayons and trading a few coins
    from their piggy bank for glittery toys.
background:
  cultural: Carla is a white American child raised in Carpinteria, a small coastal community in Santa Barbara County, California. The town’s relaxed beach lifestyle, emphasis on outdoor play, and vibrant
    local arts scene shape her daily experiences. Her family participates in regional traditions such as beach picnics, community festivals, and visits to the nearby marine reserve, exposing her to a blend
    of environmental awareness and artistic expression that is typical of the Californian coastal culture. While she celebrates common American holidays like Thanksgiving and Fourth of July, she also benefits
    from the multicultural atmosphere of the broader Santa Barbara area, encountering peers from diverse backgrounds and learning inclusive values. This environment nurtures her curiosity, creativity, and
    open‑minded thinking while also presenting early social and emotional challenges that she navigates with support from caring adults.
