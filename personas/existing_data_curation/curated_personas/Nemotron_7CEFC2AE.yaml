  career_goals: Carla often tells adults that she wants to become an artist who paints the ocean, a marine biologist who discovers new sea creatures, or a storyteller who creates magical books for other
    children. She also imagines herself as a kind teacher who helps kids feel safe and happy, reflecting her desire to combine creativity with caring for others.
