    independent films'', ''Listening to classic jazz and contemporary R&B'']'
  career_goals: In the next three to five years Anderson aims to step into a regional sales director role, overseeing a team of agents and driving double‑digit revenue growth for his agency. He seeks to
    become a recognized thought leader at the intersection of art and advertising, speaking at industry conferences and publishing articles on culturally resonant brand storytelling. To support this trajectory,
    he plans to earn advanced digital‑marketing certifications (Google Ads, Facebook Blueprint) and launch a mentorship program for young Black professionals entering the advertising field, thereby strengthening
    representation and diversity within the industry while maintaining a sustainable work‑life balance for his family.
