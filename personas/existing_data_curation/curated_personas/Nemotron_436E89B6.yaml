  hobbies: '[''Gardening'', ''Quilting'', ''Reading'', ''Church Choir'', ''Birdwatching'', ''Hiking'', ''Canning'', ''Card Games'', ''Family Recipe Preservation'', ''Memoir Writing'']'
  career_goals: In retirement Cindy aims to leave a lasting educational legacy by mentoring younger teachers through informal coffee talks, documenting the history of her school and local community, and
    establishing a sustainable intergenerational literacy program at the Whitestone Community Center. She also hopes to write and self‑publish a memoir reflecting on her decades in the classroom and Appalachian
    life, and to secure a small grant that will fund a seasonal gardening workshop for seniors, blending her love of horticulture with lifelong learning. While she appreciates routine, she remains open
    to spontaneous collaboration opportunities that arise within her church and neighborhood networks.
