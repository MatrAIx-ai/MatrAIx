  career_goals: Jeffrey aims to advance to a senior maintenance supervisor or facilities manager role within the next five years, leveraging his extensive hands-on knowledge to oversee larger property portfolios.
    He plans to obtain certifications such as the EPA Universal Refrigerant Certification, OSHA 30-hour General Industry, and a Certified Facility Manager (CFM) credential to solidify his technical credibility.
    Long-term, he envisions establishing a small, community-focused handyman business that provides affordable repair services to senior citizens and low‑income households in Quincy. He also aspires to
    mentor apprentices through a local trade union apprenticeship program, sharing his practical expertise while fostering a supportive, cooperative work culture.
