personas:
  professional: Renita Cook, a quantitative analyst turned visual storyteller at a major investment firm, blends rigorous financial modeling with eye‑catching Tableau dashboards, delivering ESG‑focused
    investment theses while navigating tight deadlines with disciplined precision and a habit of rehearsing presentations in the subway car.
  sports: Renita Cook runs five miles in Prospect Park every Saturday, is a member of the Brooklyn Striders running club, occasionally plays pickup basketball at a community gym, and follows the New York
    Knicks and New York Yankees, cheering loudly on game nights despite a tendency to over‑track performance metrics on Strava.
  arts: Renita Cook, a regular at Brooklyn galleries and street‑art festivals, sketches mixed‑media collages inspired by the works of Jean‑Michel Basquiat, Banksy, and Yayoi Kusama, curates Spotify playlists
    that blend Kamasi Washington’s contemporary jazz, Femi Kuti’s Afro‑Caribbean rhythms, and electronic ambient tracks, and often volunteers as a docent for museum education programs.
  travel: Renita Cook prefers curated micro‑adventures, weekend trips to the Hudson Valley for hiking, annual visits to the historic French Quarter in New Orleans for its music scene, and a dream itinerary
    that includes a week‑long art pilgrimage through Berlin’s galleries and a cultural immersion in Marrakech’s souks, all planned through a blend of meticulous spreadsheets and spontaneous last‑minute
    flights when work pressures ease.
  culinary: Renita Cook enjoys experimenting in the kitchen, turning Southern classics like shrimp and grits into a miso‑infused version, pairing collard greens with Korean gochujang for a spicy slaw, and
    perfecting a bourbon‑caramel glaze for a sweet potato cheesecake, while admitting a habit of over‑seasoning dishes and ordering late‑night pizza after marathon coding sessions.
  core: Renita Cook is a disciplined finance professional with an artistic soul, a chronic worrier who channels stress into yoga, running, and kitchen experiments, and constantly seeks to fuse data‑driven
    rigor with creative expression.
background:
  cultural: Renita grew up in a close‑knit Black community in Brooklyn, where family gatherings, church celebrations, and neighborhood block parties shaped her identity. She honors traditions such as Kwanzaa
    and Juneteenth, and she enjoys soul food staples like collard greens, fried chicken, and sweet potato pie, while also embracing the borough’s multicultural cuisine. Her heritage—rooted in African‑American
    history with influences from Caribbean relatives—instills a strong sense of resilience and community responsibility. Renita actively participates in professional networks for Black finance professionals
    and supports local Black artists and cultural festivals, reflecting her commitment to representation and cultural pride.
attributes:
  skills: '[''financial modeling'', ''portfolio optimization'', ''risk assessment'', ''data analysis'', ''Python programming'', ''R programming'', ''SQL'', ''Advanced Excel'', ''Bloomberg Terminal'', ''Tableau'',
    ''Statistical analysis'', ''Machine learning fundamentals'', ''Data visualization'', ''Project management'', ''Stakeholder communication'']'
  hobbies: '[''visiting art galleries'', ''sketching mixed-media art'', ''contemporary jazz and Afro‑Caribbean music'', ''yoga'', ''mindfulness meditation'', ''running'', ''cooking fusion dishes'', ''reading
    nonfiction on psychology and technology'', ''volunteering in STEM mentorship'']'
  career_goals: Renita aspires to progress to a senior portfolio manager role within the next five years, eventually leading a dedicated investment team as a Chief Investment Officer. She aims to obtain
    the CFA charter and deepen her expertise in ESG and impact investing, leveraging her curiosity for unconventional ideas to develop innovative, socially responsible investment strategies. Renita also
    seeks to mentor emerging Black women analysts, champion diversity in finance, and later launch her own boutique firm focused on technology‑driven, community‑oriented investment solutions while maintaining
    a healthier work‑life balance to mitigate stress.
