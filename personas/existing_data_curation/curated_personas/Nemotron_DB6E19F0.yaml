  hobbies: '[''Visiting Art Galleries and Museums'', ''Photography (landscape and street)'', ''Experimental Music and Concerts'', ''Sketching and Digital Illustration'', ''Reading Contemporary Philosophy
    and Avant‑garde Literature'', ''Creative Writing (poetry, short stories)'', ''Hiking and Nature Exploration'', ''Sustainable Living Projects'', ''Volunteering at Community Gardens'', ''Spontaneous Travel'']'
  career_goals: Sandra aims to forge a career as an independent visual storyteller and curatorial professional, hoping to work freelance on innovative exhibitions and digital narratives. She plans to pursue
    a graduate program in curatorial studies or visual communication to deepen her expertise while collaborating on community art projects that push conventional boundaries. Ultimately, she wants to become
    a recognized thought leader in the contemporary art scene, using her competitive drive to achieve influence and creative impact.
