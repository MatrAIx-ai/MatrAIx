personas:
  professional: An emerging visual storyteller, Sandra Cunningham blends photography, digital illustration, and sharp curatorial instincts to craft experimental exhibition concepts, thriving in rapid brainstorming
    sessions but often wrestling with tight project timelines and rigid management structures.
  sports: A nature‑loving weekend explorer, Sandra Cunningham hikes the lakes and trails around Madison with a lightweight backpack, occasionally joins a local rowing club that trains on the lake, and cheers
    for the Wisconsin Badgers men’s basketball team while they maintain a modest yoga practice to counteract sedentary studio work.
  arts: An avid cultural participant, Sandra Cunningham frequently visits Madison’s avant‑garde galleries, indie music venues showcasing bands like The Mae Shi, and experimental theater productions by local
    troupes such as The Rumpus, while they draw inspiration from artists like Yayoi Kusama and musicians like James Blake for their own digital illustrations and poetry.
  travel: A spontaneous wanderer, Sandra Cunningham prefers spur‑of‑the‑moment road trips to nearby art towns like Marquette and Asheville, has already visited the street art districts of Berlin and the
    galleries of Mexico City, and they plan a future visit to Kyoto’s contemporary museums, balancing a limited travel budget with a desire for immersive cultural experiences.
  culinary: A curious palate, Sandra Cunningham enjoys crafting vegan brunch bowls with avocado, quinoa, and roasted cherry tomatoes, experiments with matcha‑infused smoothies, and regularly orders the
    seasonal beet‑and‑goat cheese salad at the local farm‑to‑table café, yet they occasionally indulge in late‑night pizza slices after gallery openings.
  core: A fiercely curious, competitively driven, 23‑year‑old visual storyteller, Sandra Cunningham thrives on spontaneous creativity, battles deadline anxiety, and balances art‑centric pursuits with a
    love for hiking, indie music, and mindful self‑care.
background:
  cultural: Sandra grew up in a middle‑class family in Madison, Wisconsin, within a progressive university‑town environment. Though ethnically white with German‑Scandinavian ancestry common to the region,
    her upbringing emphasized education, independent thought, and community involvement. The city's vibrant arts scene, strong environmental values, and the influence of the University of Wisconsin's liberal
    arts culture have shaped her worldview, fostering an appreciation for unconventional ideas and a commitment to creative expression.
attributes:
  skills: '[''Photography'', ''Graphic Design (Adobe Photoshop, Illustrator)'', ''Creative Concept Development'', ''Research and Critical Analysis'', ''Social Media Content Creation'', ''Public Speaking'',
