personas:
  professional: Linda Nelson, a seasoned courthouse receptionist turned part‑time cultural archivist in training, blends three decades of meticulous administrative expertise with a curiosity for local art
    history, coordinating senior workshops and crafting exhibition pamphlets while mentoring younger clerks with assertive yet warm guidance.
  sports: Linda Nelson enjoys low‑impact senior‑center yoga, walks the Rose Bud town square each morning, and avidly follows the Arkansas Razorbacks basketball team in winter, the St. Louis Cardinals during
    baseball season, and occasionally joins a community bridge club that hosts friendly ping‑pong tournaments, viewing sport as both social engagement and gentle exercise.
  arts: Linda Nelson channels her artistic curiosity through quilting, crochet, and watercolor painting, drawing inspiration from the Arkansas Arts Center’s exhibitions of Georgia O'Keeffe and local folk
    artist Roy Brown, while regularly discussing the lyrical storytelling of Emmylou Harris and the theatrical charm of Sutton Foster’s Broadway revues at her book club.
  travel: Linda Nelson prefers carefully planned road trips that blend cultural immersion with relaxed pacing, having explored the blues scene of Memphis, the historic riverfront of New Orleans, and the
    craft fairs of Asheville, while dreaming of a leisurely visit to Savannah’s historic district and a senior‑friendly cruise along the Mississippi, always budgeting travel expenses in her monthly spreadsheet
    to keep her anxiety in check.
  culinary: Linda Nelson delights in Southern comfort cooking, expertly preparing fried catfish with hush‑puppy crumbs, collard greens seasoned with smoked ham hocks, and a signature peach cobbler spiced
    with fresh rosemary from her garden, while also brewing rose‑infused herbal tea and mastering the art of canning pickled okra for the annual county fair.
  core: Linda Nelson balances a steadfast love for Southern tradition with an ever‑growing curiosity for new artistic horizons, juggling meticulous organization, occasional anxiety‑driven over‑planning,
    and a habit of meticulously labeling every quilting square with the date and inspiration behind it.
background:
  cultural: Linda was born and raised in a small farming community near Rose Bud, Arkansas, within Cleburne County's rural Southern culture. Her family traces its roots to early 20th‑century Anglo‑American
    settlers who valued hard work, church participation, and hospitality. Growing up, she embraced community traditions such as county fairs, church potlucks, and local folk art, fostering a deep appreciation
    for Southern craft and storytelling. While she respects these customs, her curious nature led her to explore broader artistic expressions and unconventional ideas, making her a bridge between traditional
    community values and new cultural experiences.
attributes:
  skills: '[''Customer service'', ''Telephone etiquette'', ''Data entry'', ''Microsoft Office Suite'', ''Digital record-keeping'', ''Scheduling and calendar management'', ''Event coordination'', ''Public
