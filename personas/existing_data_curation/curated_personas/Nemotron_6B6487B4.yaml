  hobbies: '[''Visiting art galleries'', ''Quilting'', ''Crochet'', ''Watercolor painting'', ''Gardening'', ''Rose cultivation'', ''Book club participation'', ''Reading mystery and Southern literature'',
    ''Yoga for seniors'', ''Volunteer at local library'', ''Attending craft fairs'']'
  career_goals: Linda aims to shift from full‑time clerical work to a part‑time role that merges her administrative strengths with her passion for the arts and local heritage. She plans to earn a short‑term
    certification in archival studies so she can volunteer as an archivist at the Cleburne County Historical Society and coordinate small‑scale art exhibitions and workshops for seniors. She also hopes
    to mentor younger receptionists, sharing best practices in customer service and office efficiency, and ultimately create a semi‑retired lifestyle that lets her stay active in the community while supporting
    her emotional wellbeing.
