  hobbies: '["Reading speculative fiction", "Poetry and short story writing", "Abstract watercolor painting", "Sketching", "Nature walking and photography", "Digital collage creation", "Small-group literary
    gatherings", "Armenian cooking"]'
  career_goals: Patricia hopes to leverage her practical experience into a supervisory or team‑lead role within the warehouse, where she can mentor newer employees and streamline workflow. She also dreams
    of launching a modest side venture selling hand‑crafted watercolor prints and small decorative objects online, using her artistic skills to supplement her income and explore a more flexible, creative
    career path. Continuing education through community‑college art classes and occasional workshops is part of her plan to deepen her artistic technique and possibly transition into part‑time teaching
    of basic art skills for local seniors.
