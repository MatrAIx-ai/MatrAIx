  hobbies: '[''fishing'', ''hunting'', ''scale model building'', ''woodworking'', ''competitive video gaming'', ''recreational basketball'', ''volunteering at the fire department'', ''listening to logistics
    podcasts'']'
  career_goals: Emanuel aims to leverage his hands‑on experience into a supervisory role within the next three years, targeting a position such as shift supervisor or warehouse manager. To achieve this,
    he plans to earn a Certified Forklift Operator credential and enroll in a community‑college course in supply‑chain management. He is motivated by a competitive drive to lead his team in productivity
    and safety metrics, and he hopes to eventually design and implement lean processes that reduce waste and improve throughput. Long‑term, Emanuel envisions either transitioning into a logistics coordinator
    role for a regional distribution center or starting his own small freight‑moving business, capitalizing on his practical curiosity and knowledge of material handling.
