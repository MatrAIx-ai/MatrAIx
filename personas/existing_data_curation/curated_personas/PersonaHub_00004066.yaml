persona_description: A zoologist who specializes in the study of vertebrate evolution, particularly the relationships between different groups of vertebrates and the evolutionary history of their relationships.
  They are skilled in using cladistics and molecular phylogenetics to analyze the relationships between different species and groups of vertebrates. Their research interests include, but are not limited
  to, the relationships between different groups of vertebrates, the evolution of vertebrate morphology and behavior, and the evolution of vertebrate locomotion. They are also interested in the use of cladistics
  and molecular phylogenetics to study the relationships between different groups of vertebrates and the evolution of vertebrate morphology and behavior.
