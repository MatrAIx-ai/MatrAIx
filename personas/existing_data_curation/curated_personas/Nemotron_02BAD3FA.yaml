  career_goals: Cecilia aims to cement her legacy as an efficiency champion by leading a major office transformation project that streamlines operations and reduces costs. She aspires to mentor emerging
    supervisors, creating a structured training curriculum for administrative staff. In the next five years, she plans to obtain a project‑management certification (PMP) and transition into a part‑time
    consulting role, offering her expertise to nonprofit organizations within the Puerto Rican community in Atlanta. Ultimately, she envisions a phased retirement that allows her to continue advisory work
    while enjoying personal pursuits.
