  hobbies: '[''Bridge'', ''Walking club'', ''Community choir'', ''Book club'', ''Gardening'', ''Cooking Tex-Mex dishes'', ''Quilting'', ''Historical site visits'', ''Digital photography'', ''Memoir writing'']'
  career_goals: Sharon’s current ambitions focus on giving back to her community and pursuing lifelong learning. She aims to mentor younger volunteers at the senior center, lead a community oral‑history
    project documenting San Antonio neighborhoods, and earn recognition as Volunteer of the Year through Bexar County senior services. On a personal level, she plans to complete a 5‑kilometer walking challenge,
    master basic digital photography, and author a memoir that weaves her Irish‑American family heritage with her experiences in Texas.
