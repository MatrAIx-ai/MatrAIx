  career_goals: While still very young, Rowshan expresses early ambitions typical of toddlers, often repeating phrases like "I want to be a doctor" or "I will help mommy" during play. Influenced by her
    practical nature and love for routine, she shows a budding interest in caring for others, especially through pretend play with dolls and stuffed animals. As she grows, she may aim to become a teacher
    or a caregiver, valuing the structured environment of classrooms where she can help peers learn. Her curiosity about language also hints at a future goal of becoming bilingual, speaking both English
    and her family's Central Asian language fluently.
