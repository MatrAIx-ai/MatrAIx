  hobbies: '[''Soccer (local youth league)'', ''Competitive video gaming (FPS, MOBA)'', ''Streaming on Twitch'', ''Skateboarding and bike customization'', ''Beach volleyball'', ''Listening to classic rock
    and alternative music'', ''Reading science‑fiction novels'', ''Journaling for stress management'']'
  career_goals: Andrew aims to turn his hands‑on interests into a stable career. In the short term, he plans to earn a certification as an automotive service technician through a local vocational program,
    leveraging his mechanical skills. Concurrently, he hopes to grow his presence as a content creator on platforms like Twitch, with the long‑term ambition of becoming a professional eSports player or
    coach. Ultimately, Andrew envisions opening a small custom bike shop or a gaming lounge that blends his love for mechanics and community gatherings, providing both financial security and a creative
    outlet that helps manage his stress.
