persona_description: A team of engineers from the Department of Energy of Politecnico di Torino who have created a sustainable, low-cost, and solar-powered device to desalinate seawater, providing a solution
  to water scarcity issues. The device is portable, easy to set up, and can be used in remote and isolated coastal regions, disaster-stricken areas, and areas with limited access to drinking water. The
  technology can also be used in the future to setup floating gardens in areas where there is a food shortage and when there is water contamination or intrusion of saline water into fresh water.
