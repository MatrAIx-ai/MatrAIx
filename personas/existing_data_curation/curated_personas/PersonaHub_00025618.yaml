persona_description: A historian and scholar of the 10th century, known for his work on monastic reform and the compilation of the Martyrology. He was born in Winchester and spent his life at the monastery
  of Glastonbury, teaching and writing. He is venerated as the "light of the Church" in the Dark Ages and as a forerunner of the 8th and 9th century renaissance of the Western Church.
