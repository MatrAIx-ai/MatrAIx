  career_goals: Gloria dreams of becoming a teacher because she loves helping others learn and enjoys organizing lessons. She also imagines herself as a community organizer who can plan events that bring
    kids together, and she has a budding interest in becoming a veterinarian to care for animals. Her long‑term ambition is to create a safe, fun space for children in her neighborhood where they can play,
    learn, and feel supported.
