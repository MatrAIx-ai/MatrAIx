personas:
  professional: Gloria Bonner is an aspiring junior architect, channeling her love for LEGO building into detailed draft sketches for school projects and local community design contests, where they apply
    methodical planning, reliable follow‑through, and energetic collaboration with classmates.
  sports: Gloria Bonner is a spirited soccer player in the local Philadelphia Union youth program, joining after‑school drills on the neighborhood field, cheering for the Philadelphia 76ers during basketball
    season, and balancing structured practice with spontaneous kick‑around games with friends.
  arts: Gloria Bonner is a budding visual artist who spends afternoons at the library’s crafts club painting friendship‑bracelet‑inspired murals, sketching scenes from the neighborhood’s vibrant street
    art, and listening to R&B legends like Beyoncé to fuel her creative storytelling.
  travel: Gloria Bonner is an enthusiastic weekend explorer who loves walking the historic streets of Philadelphia on family trolley rides, visiting the Liberty Bell and the Philadelphia Museum of Art,
    and dreams of a summer vacation to Washington, D.C.’s National Museum of Natural History and a future trip to Disney World.
  culinary: Gloria Bonner is a junior kitchen helper who enjoys whisking together collard greens with smoked turkey, baking golden cornbread, and mastering the perfect pinch of paprika in the family's fried
    chicken, all while proudly recreating recipes step‑by‑step alongside their grandmother.
  core: Gloria Bonner is an organized, spirited 8‑year‑old who blends a love for LEGO precision, lively soccer games, and family‑centered cooking, yet often worries about the unknown and can be a little
    over‑cautious.
background:
  cultural: Gloria is a Black child growing up in the vibrant, historically rich neighborhoods of Philadelphia. Her family celebrates African‑American traditions such as cooking soul food dishes with her
    grandmother, attending church services where gospel music is a central part of worship, and participating in community events like the annual Philadelphia African American Heritage Festival. She is
    proud of her heritage, which is reflected in the stories her parents share about civil‑rights history and the importance of community solidarity. The city’s strong basketball culture, local murals,
    and the presence of community centers provide Gloria with opportunities to engage in sports, arts, and mentorship programs that reinforce a sense of belonging and cultural pride.
