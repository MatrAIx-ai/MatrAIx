persona_description: A paleontologist who specializes in studying the Ediacaran Lagerstätten in China, particularly the Doushantuo formation. He is particularly interested in the evolution of life during
  this period and how environmental changes, such as the increase in oxygen, influenced the evolution of complex animals. He plans to use new imaging technologies to study fossils in detail and compare
  them with other Lagerstätten to determine the timing and cause of the Cambrian explosion. He also aims to analyze the chemistry of elements other than carbon and oxygen, particularly nitrogen and phosphorous,
  which are essential to life, and sulphur, which often indicates the absence of oxygen and is thus antithetical to much animal life. His research interests include the study of carbon isotopes, the Ediacaran
  period, and the evolution of complex animals.
