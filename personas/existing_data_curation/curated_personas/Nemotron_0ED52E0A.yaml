  career_goals: Jesse wishes to build on his retail experience by moving into a role that merges his love for art with community service. In the next two years he plans to enroll in a part‑time museum studies
    or arts administration certificate program at a local community college. He hopes to secure a gallery assistant position that allows flexible hours, giving him time to continue his creative pursuits.
    Long‑term, Jesse dreams of curating small pop‑up exhibitions or managing a community‑run art space that showcases local artists and hosts workshops, while maintaining a work‑life balance that respects
    his preference for flexibility and solitude.
