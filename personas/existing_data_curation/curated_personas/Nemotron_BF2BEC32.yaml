personas:
  professional: Jennifer Greene, a 24‑year‑old packaging and filling machine operator, blends curiosity‑driven troubleshooting with pragmatic safety adherence to keep high‑speed lines humming, while mentoring
    new hires and eyeing a shift supervisor role.
  sports: Jennifer Greene enjoys the outdoors, spending weekends fishing the Cossatot River and hiking the Ouachita trails, while cheering for the Arkansas Razorbacks football team and playing intramural
    softball with a local community league.
  arts: Jennifer Greene’s soundtrack blends country stars like Carrie Underwood and classic rock legends such as The Eagles, and they unwind with mystery novels by Agatha Christie and Tana French, occasionally
    attending live acoustic sessions at a nearby bar.
  travel: Jennifer Greene prefers low‑cost road trips, having road‑tripped to Hot Springs for its historic bathhouses, explored the eclectic food scene of New Orleans, and dreaming of hiking Zion National
    Park’s Angel’s Landing next summer.
  culinary: Jennifer Greene loves farm‑to‑table cooking, whipping up grilled corn and herb‑roasted zucchini from their garden, seasoning chicken with a dash of Cajun rub, and perfecting a simple skillet‑fried
    catfish served with coleslaw, all while humming classic rock tunes.
  core: Jennifer Greene is a hands‑on, curiosity‑driven plant operator who balances a love for outdoor adventure with a relaxed, sometimes disorganized lifestyle, always humming a rock riff while chasing
    the next efficiency win.
background:
  cultural: Jennifer grew up in a close‑knit, rural community in Crossett, Arkansas, immersed in Southern hospitality and modesty. Her upbringing emphasized family gatherings, church participation, high
    school sports, and community traditions like backyard barbecues and local fairs. She values self‑reliance, practicality, and a strong work ethic, while also embracing new ideas through technology and
    online learning. Her white Southern background influences her appreciation for country music, Southern cuisine, and a respectful, courteous demeanor toward neighbors and coworkers.
attributes:
  skills: '["Packaging machine operation", "Filling machine operation", "Basic mechanical troubleshooting", "Preventive maintenance", "PLC interface navigation", "Safety compliance (OSHA)", "Forklift operation",
