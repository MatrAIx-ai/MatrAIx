  hobbies: '["Fishing", "Hiking", "Gardening", "Listening to country and classic rock music", "Attending local fairs and community events", "DIY/home improvement projects", "Woodworking", "Reading mystery
    novels", "Mobile puzzle gaming", "Volunteering at the food bank"]'
  career_goals: Jennifer aims to move into a lead operator or shift supervisor role within the next few years, pursuing certifications in industrial maintenance and an associate degree in industrial technology
    through a local community college. She hopes to use her blend of curiosity and practicality to improve plant efficiency and perhaps later transition into a plant maintenance technician position. Long‑term,
    she envisions starting a small consulting side‑business helping nearby manufacturers optimize their packaging lines, while maintaining the flexible work‑life balance she values.
