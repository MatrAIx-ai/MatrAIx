  career_goals: Jay aims to advance into a supervisory or team‑lead role within the municipal waste‑management department, where he can champion the integration of innovative recycling and up‑cycling initiatives.
    He plans to obtain certifications such as the Certified Waste Management Professional (CWMP) and OSHA safety credentials. Over the next five years, Jay hopes to design a community program that transforms
    collected recyclable materials into public art installations, fostering pride and environmental awareness. Ultimately, he envisions transitioning his creative expertise into a consultancy role that
    advises small towns on sustainable waste practices and circular‑economy projects.
