persona_description: A healthcare professional who is interested in cardiac anatomy and function, particularly in the evaluation of heart murmurs, arrhythmias, and the assessment of heart structure and
  function in patients with chronic heart disease. They are likely to have knowledge of echocardiography and its testing procedures, and may have experience in interpreting the results of an echocardiogram
  to diagnose and monitor heart conditions. They may also have expertise in using echocardiography to assess heart function during stress tests, such as stress echocardiography.
