  hobbies: '[''Visiting art museums and galleries'', ''Painting and sketching'', ''Reading science‑fiction and philosophy'', ''Cooking Vietnamese and fusion cuisine'', ''Cycling on coastal trails'', ''Yoga
    and meditation'', ''Photography (urban and nature)'', ''Volunteering at community legal aid clinic'', ''Traveling to cultural heritage sites'']'
  career_goals: Heng aspires to become a senior partner at his firm, leading a boutique practice that focuses on emerging tech and cultural heritage issues, such as AI ethics, digital rights, and protection
    of Southeast Asian art collections. He seeks to serve as a mentor for younger attorneys, especially those from immigrant backgrounds, and to establish a community legal clinic in Pinellas County that
    offers pro bono services for low‑income families. Long‑term, he envisions a judicial appointment where he can influence policy on technology and environmental law while maintaining his commitment to
    equitable access to justice.
