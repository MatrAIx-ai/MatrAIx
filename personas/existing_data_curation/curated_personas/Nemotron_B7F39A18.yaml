  hobbies: '[''Reading finance and fintech literature'', ''Playing basketball at community centers'', ''Watching professional basketball games'', ''Cooking modern soul food'', ''Attending live jazz and
    hip‑hop concerts'', ''Hiking in Wissahickon Valley'', ''Woodworking and DIY projects'', ''Volunteering as a tax preparer'', ''Exploring Philadelphia’s historic neighborhoods'']'
  career_goals: Chaz aims to obtain his Certified Public Accountant (CPA) license within the next two years, transition to a senior audit manager role at a regional firm, and eventually lead a compliance
    consultancy focused on serving small businesses in Philadelphia's underserved neighborhoods. He is also interested in pursuing a bachelor's degree in accounting or finance to solidify his academic credentials.
    Long‑term, he envisions opening his own boutique advisory practice that blends rigorous audit standards with innovative financial technology solutions.
