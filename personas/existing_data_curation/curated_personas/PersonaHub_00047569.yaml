persona_description: A political economist who is interested in understanding the rise of the middle class in Europe and the United States, particularly the role of public rhetoric and public policies in
  inspiring entrepreneurship and economic growth. They are also interested in the concept of bourgeois dignity and its impact on economic growth and prosperity. They appreciate the work of Deirdre McCloskey,
  who has written extensively on the topic and whose lead essay on Cato Unbound has been influential in shaping their understanding of the rise of the middle class.
