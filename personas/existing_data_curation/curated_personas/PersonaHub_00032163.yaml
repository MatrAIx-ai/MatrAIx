persona_description: A monetary policy expert who is deeply involved in the design and implementation of monetary policy rules and conventions. This individual is knowledgeable about the liquidity problem
  and its implications for the monetary order, and is skilled in developing solutions to minimize the total costs of adjustment in the event of payments disequilibria. They are also adept at understanding
  the importance of international liquidity in the monetary order and are capable of making informed decisions between alternative policy options when real adjustment is undertaken.
