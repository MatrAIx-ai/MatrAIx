personas:
  professional: Rose Bumgarner is a budding LEGO architect who approaches each build with methodical precision, turning every instruction set into a small engineering challenge that satisfies their structured
    mind, and they love finishing each project perfectly.
  sports: Rose Bumgarner joins the local Colts Soccer Club for Thursday afternoon drills, practices ballet pirouettes at a weekly class, and cheers loudly for the Houston Astros during baseball season,
    balancing structured team play with personal artistic movement, and they feel most alive on the field.
  arts: Rose Bumgarner enjoys twirling in ballet to the Nutcracker’s score by Tchaikovsky, humming along to country classics by Dolly Parton and pop anthem ‘Shake It Off’ by Taylor Swift while coloring
    pictures of Mickey Mouse within the lines, and eagerly watches Disney movies like Frozen on weekend family movie nights, and they often sing the songs aloud.
  travel: Rose Bumgarner relishes family trips to the Houston Rodeo’s midway, day‑excursions to the San Antonio River Walk, and a school field trip to the Grand Canyon, while dreaming of a future vacation
    to Disney World where they can meet beloved characters, and they picture the fireworks at Disney World during night.
  culinary: Rose Bumgarner favors smoky Texas brisket tacos topped with cilantro, lime, and shredded cheese over plain chicken nuggets, occasionally helping Mom craft the tacos with avocado slices, yet
    secretly adds extra strawberry‑slice cupcakes to their plate when no one watches, and they claim the cupcakes are the best part of dinner.
  core: Rose Bumgarner is a meticulous six‑year‑old who builds perfect LEGO models, dominates soccer drills, and hoards stickers, yet they cannot resist sneaking a cookie before bedtime.
background:
  cultural: Rose comes from a White, middle‑class family in Porter, Texas, a suburban community in Harris County near Houston. Her household reflects typical Southern‑Texas values, celebrating holidays
    such as Thanksgiving, Fourth of July, Halloween, and Christmas, and often attending a local Methodist church where she participates in Sunday school. The multicultural setting of the Houston metro area
    gives her exposure to Spanish language lessons at school and occasional community events like the Houston Rodeo. Her family enjoys regional foods like barbecue and Tex‑Mex dishes, and she grows up hearing
    country music and classic pop songs on the radio. This blend of Southern hospitality, community involvement, and modest exposure to diverse cultures shapes Rose’s cultural background.
