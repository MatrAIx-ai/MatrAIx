  career_goals: Although still early in school, Rose loves the idea of a future where she can create order and help others learn. She often says she wants to become a teacher because she enjoys explaining
    things and keeping a classroom organized. She also dreams of being a librarian or a young scientist who conducts simple experiments in a well‑structured lab. Her competitive streak shows in her desire
    to be the "best reader" in her class and to win spelling bees, reflecting her ambition to excel within a clear set of rules.
