personas:
  professional: Thomas Blake, a retired senior executive turned mentor, leverages his decades‑long expertise in strategic planning, financial analysis, and change management—combined with his competitive
    drive and vivid imagination—to guide emerging entrepreneurs, critique abstract art in business contexts, and deliver compelling lectures at community colleges.
  sports: Thomas Blake stays mentally sharp through weekly matches at the Southfield Senior Chess Club and maintains light physical activity by walking the Detroit River Trail, while avidly cheering for
    the Detroit Lions in the fall, the Pistons during the NBA season, and following the Tigers in summer, all while participating in a low‑impact tai‑chi class at the local senior center.
  arts: Thomas Blake immerses himself in the world of abstract expressionism by painting with bold swaths reminiscent of Jackson Pollock, curating community exhibits that juxtapose business metrics with
    Mark Rothko‑inspired color fields, and regularly attending jazz performances by Wynton Marsalis at the Detroit Jazz Festival, all while quoting the poetry of Rainer Maria Rilke.
  travel: Thomas Blake plans his European escapades with meticulous itineraries, having recently explored the historic streets of Rome, Florence, and Prague on a guided art tour, while dreaming of future
    visits to Vienna’s music salons and the coastal villages of the Amalfi Coast, always budgeting his trips through accumulated points on his Chase Sapphire Preferred card.
  culinary: Thomas Blake enjoys a refined palate, often preparing a perfectly seared scallop dish drizzled with a beurre blanc sauce infused with tarragon and fennel, while savoring classic Detroit fare
    like a cherry‑pie‑topped slice of coney dog at local diners, and he occasionally experiments with saffron risotto, using his vintage pocket watch as a timer.
  core: Thomas Blake is a fiercely competitive, yet deeply imaginative 79‑year‑old who balances senior chess battles with abstract brushstrokes, mentors startups with sharp business acumen, and never starts
    a painting without first checking his vintage watch’s rhythm.
background:
  cultural: Thomas is a white American raised in the post‑war suburban Midwest, likely with German‑Irish ancestry. Growing up in the Detroit metropolitan area, he experienced the region's automotive boom,
    subsequent deindustrialization, and the increasing cultural diversity of Oakland County. His upbringing instilled a strong work ethic, self‑reliance, and community involvement typical of mid‑century
    Midwestern values, with influences from Protestant (Methodist) cultural norms. He maintains an appreciation for both classic American popular culture and European art and literature, reflecting a blend
    of local heritage and broader cultural curiosity.
