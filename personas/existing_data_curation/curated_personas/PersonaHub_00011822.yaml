persona_description: A political theorist who specializes in the study of political philosophy, particularly the concepts and theories related to the open society and the Equality Clause. Her research interests
  include, but are not limited to, the politics of identity, the role of individualism and collectivism in political systems, and the challenges of maintaining an open society in a world of increasing tribalism
  and nationalism. She is deeply interested in the concept of operating as mature sons of God and the implications of this for political action. She is committed to the idea of preserving an open society
  against the challenges of tribalism and nationalism and is willing to take on the personal challenges inherent in the Equality Clause.
