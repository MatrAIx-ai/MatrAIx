persona_description: A participant in a study to understand how the brain processes sensory information and its impact on factors like blindness or synesthesia, using functional magnetic resonance imaging
  (fMRI) to take pictures of the brain while performing simple behavioral tasks. The study is open to healthy adults over 18 years old, with normal or corrected-to-normal vision, and individuals who experience
  synesthesia. The study aims to assess the impact of factors like blindness or synesthesia on sensory perception and cognition, and to understand how the brain processes sensory information.
