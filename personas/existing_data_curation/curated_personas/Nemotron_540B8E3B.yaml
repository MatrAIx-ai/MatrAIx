personas:
  professional: Lisette Henry, a veteran farm manager with a business degree, oversees a mixed‑crop and livestock operation in western Michigan using strategic planning, precision‑ag technology, and meticulous
    budgeting, while they mentor young women and steer a structured succession plan that reflects their methodical, predictably organized nature.
  sports: Lisette Henry follows the Milwaukee Brewers and Green Bay Packers with steadfast loyalty, enjoys weekend sport‑fishing for trout on Lake Michigan, and they participate in a senior walking club
    that trains for the annual local 5K charity run, blending low‑impact exercise with social camaraderie.
  arts: Lisette Henry finds comfort in gospel harmonies and folk storytelling, regularly listening to Mavis Staples and the lyrical duets of The Milk Carton Kids while they craft quilts inspired by the
    rhythmic patterns of traditional folk songs, and they often attend the Mackinac Island Arts Festival to support local artisans.
  travel: Lisette Henry prefers low‑key road trips that allow ample time for garden‑inspired stops, having explored the historic lighthouses of Lake Michigan, the cherry orchards of Traverse City, and the
    Amish countryside of Ohio, they now dream of a summer visit to Mackinac Island’s carriage‑free streets to combine leisurely walking with cultural festivals.
  culinary: Lisette Henry’s cooking celebrates farm‑to‑table flavors, turning heirloom tomatoes into fresh bruschetta, simmering sweet corn chowder with farm‑raised butter, and smoking lake‑caught trout
    with spruce needles, while they expertly pickle okra and bake sweet‑potato pie using garden‑grown spices.
  core: Lisette Henry blends meticulous farm stewardship, a structured financial mindset, health vigilance, and a love for quilting and lakeside solitude, all while they channel community spirit into mentoring
    and worry‑driven attention to detail.
background:
  cultural: Lisette’s roots trace back to her grandparents, who migrated from the Deep South to Michigan during the Great Migration, seeking better opportunities on the North’s expanding farms. Growing
    up in a tight‑knit Black community in Muskegon, she was shaped by the resilience of the local church, the oral traditions of stories and music, and a family legacy of hard work in agriculture. Her cultural
    identity blends African‑American heritage with Midwestern farm life, influencing her commitment to community stewardship, shared meals, and the celebration of historic milestones such as Juneteenth
    and local harvest festivals.
attributes:
  skills: '[''Strategic farm planning'', ''Budgeting and financial analysis'', ''Crop rotation and soil management'', ''Livestock husbandry and health monitoring'', ''Supply chain coordination'', ''Regulatory
