  hobbies: '[''Vegetable gardening'', ''Farm‑to‑table cooking'', ''Quilting'', ''Lake Michigan shoreline walks'', ''Bird watching'', ''Fishing'', ''Church women’s fellowship'', ''Volunteering at the food
    pantry'', ''Mentoring senior farmers'', ''Reading historical fiction'']'
  career_goals: Looking ahead, Lisette aims to formalize a succession plan that passes the farm to her children while embedding sustainable and regenerative practices that reduce input costs and improve
    soil health. She also hopes to expand the farm’s community‑supported agriculture program, creating a stronger market link for local residents and mentoring a new generation of Black women farmers in
    the region. Ultimately, she wants her legacy to reflect both economic resilience and an inclusive, cooperative farming community.
