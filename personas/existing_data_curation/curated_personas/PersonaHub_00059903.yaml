  struggle against the forces of oppression, and they use this knowledge to inspire others to resist social justice diktats and to stand up for their own values and beliefs. They are also a strong advocate
  for environmentalism and social justice, and they use their knowledge and experience to promote these causes. They are a leader in their community and a respected member of the Jewish community.
