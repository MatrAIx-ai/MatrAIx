  hobbies: '[''Abstract watercolor painting'', ''Poetry and creative writing'', ''Gardening'', ''Reading philosophy and African-American literature'', ''Visiting museums and jazz concerts'', ''Mentoring
    at senior center'', ''Digital art experiments'', ''Knitting'', ''Bridge'']'
  career_goals: Although retired from formal employment, Jasmine is driven to leave a lasting cultural imprint on her community. She aspires to curate an intergenerational art exhibition that showcases
    works by senior artists alongside local youth, publish a collection of her poems and short memoirs reflecting on the African-American experience in Pennsylvania, and establish a summer workshop series
    at the Lansdowne senior center that teaches abstract art techniques. She also plans to complete an online philosophy course to deepen her intellectual curiosity and serve on the board of a local arts
    nonprofit.
