personas:
  professional: Jasmine Wise, a retired community organizer turned intergenerational art curator, blends meticulous event planning and budgeting with a vivid watercolor imagination, and they channel this
    disciplined yet whimsical approach into designing inclusive exhibitions that celebrate lifelong creativity and nurture emerging talent.
  sports: Jasmine Wise, a devoted member of the Lansdowne Senior Walking Club, enjoys low‑impact morning walks and gentle yoga, and they passionately support the Philadelphia Eagles and Phillies, attending
    games when health permits while also cheering on local senior bridge tournaments as a mental sport.
  arts: Jasmine Wise, whose abstract watercolors echo the bold color fields of Helen Frankenthaler and the spontaneous brushwork of Jackson Pollock, finds inspiration in the improvisational genius of John
    Coltrane and the lyrical narratives of Maya Angelou, and they regularly attend museum exhibitions featuring contemporary artists whose work bridges generational dialogues.
  travel: Jasmine Wise, an intentional traveler who prefers leisurely, culturally immersive trips, joins senior travel groups for curated experiences such as exploring New Orleans’ jazz districts, wandering
    Asheville’s artisan markets, and strolling Charleston’s historic streets, and they dream of a future art retreat in Barcelona’s vibrant La Rambla district.
  culinary: Jasmine Wise, a modest yet adventurous home cook, delights in creating herb‑infused roasted carrots, aromatic basil‑tomato tilapia, and seasonal lentil stew spiced with cumin and coriander,
    often sourced from her own garden, and they regularly treat themselves to farm‑to‑table meals featuring beet and goat cheese salads at local eateries.
  core: Jasmine Wise, a disciplined yet whimsical octogenarian, balances meticulous budgeting with spontaneous splurges on vibrant art supplies, they can be found sketching watercolors deep into the night,
    and they occasionally forget to water their garden when lost in a compelling poem.
background:
  cultural: Jasmine is a second-generation African-American who grew up in the vibrant neighborhoods of Philadelphia and later settled in Lansdowne, Delaware County. Her family’s history traces back to
    the Great Migration, and she was raised amidst the strong traditions of the Black church, gospel and jazz music, and a deep sense of community activism that emerged during the civil‑rights era. These
    cultural roots have shaped her artistic sensibility, her commitment to mentorship, and her appreciation for storytelling, whether through visual art, poetry, or oral history. She celebrates cultural
    milestones such as Juneteenth and Black History Month, incorporates soulful culinary traditions into her gatherings, and remains connected to a network of family and friends who share and preserve their
    collective heritage.
