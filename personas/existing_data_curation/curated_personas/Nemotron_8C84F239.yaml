personas:
  professional: Rita Bautista, a 19‑year‑old budding graphic designer, uses their Canva and Lightroom expertise to craft social‑media graphics for a local nonprofit while orchestrating community‑garden
    events and maintaining a freelance online shop of photo prints and handcrafted décor.
  sports: Rita Bautista enjoys weekend hikes along the Bob Kerrey Pedestrian Bridge and Lauritzen Gardens, joins the Omaha Running Club for casual 5K runs, roots for the Nebraska Cornhuskers football team,
    and balances a love for outdoor activity with occasional yoga sessions at a local studio.
  arts: Rita Bautista immerses themselves in contemporary fiction by authors like Ocean Vuong, captures street scenes in Omaha with their DSLR, attends indie shows featuring The War on Drugs at The Slowdown,
    and refines their pottery skills under the guidance of local artist Maya Brown, all of which shape their eclectic aesthetic.
  travel: Rita Bautista favors budget‑friendly road trips, having explored Yellowstone National Park and the vibrant murals of Chicago, while day‑tripping to nearby Kearney for a weekend market, and dreams
    of a future backpacking tour through the Pacific Northwest, planning each itinerary with a blend of spontaneity and spreadsheet‑driven budgeting.
  culinary: Rita Bautista experiments with seasonal recipes like rosemary‑infused roasted carrots, homemade matcha latte, and lentil shepherd’s pie, often sourcing fresh herbs from the community garden,
    and enjoys the tactile process of hand‑crafting pottery bowls to serve their culinary creations.
  core: Rita Bautista is a pragmatic dreamer who blends visual storytelling, community service, and tight budgeting into a life punctuated by spontaneous DIY projects and a habit of over‑committing to side
    hustles.
background:
  cultural: Rita grew up in Omaha, Nebraska, within a predominantly white, Midwestern family that traces its roots to German and Irish ancestry. The community emphasized hard work, modesty, and neighborly
    support, values that still shape her outlook. Local traditions like the Omaha Summer Arts Festival and the strong volunteer culture at churches and civic groups have fostered her sense of civic responsibility.
    While not deeply religious, she respects the region's cultural emphasis on family gatherings, community picnics, and seasonal outdoor activities. This Midwestern backdrop blends practicality with an
    openness to new ideas, influencing her balanced personality and aspirations.
attributes:
  skills: '[''Social media content creation'', ''Basic graphic design (Canva, Photoshop)'', ''Microsoft Office proficiency'', ''Photo editing (Lightroom)'', ''Event planning for community projects'', ''Basic
    cooking and meal prep'', ''Personal budgeting'', ''DIY home repairs'', ''Gardening basics'', ''First aid certification'']'
  hobbies: '[''Reading contemporary fiction'', ''Photography (street & nature)'', ''Exploring local nature trails'', ''Volunteering at animal shelter'', ''DIY home decor craft projects'', ''Cooking experimental
    recipes'', ''Attending local indie music concerts'', ''Pottery classes'', ''Journaling and reflective writing'']'
  career_goals: Rita plans to complete her GED within the next year and enroll in a community‑college program focused on graphic design or culinary arts, balancing her curiosity for creative work with the
    practical need for stable employment. In the short term, she aims to build a freelance portfolio of social‑media graphics and modestly monetize a small online shop featuring her own photo prints and
    handcrafted décor. Long‑term, she envisions either a role as a social‑media coordinator for a local nonprofit—leveraging her community‑service background—or opening a boutique coffee‑shop that doubles
    as a gallery space for emerging artists, allowing her to merge her entrepreneurial drive with her love for the arts.
