personas:
  professional: Cheryl Mcafee runs a boutique cleaning service that specializes in eco‑friendly, art‑safe care for galleries and antique dealers, leveraging their meticulous floor‑care expertise, green‑product
    knowledge, and a competitive drive to hit a 20 % year‑over‑year repeat‑business target, and they quickly adapt to last‑minute client changes despite a relaxed attitude toward rigid scheduling.
  sports: Cheryl Mcafee stays active by joining a sunrise yoga group at the Augusta YMCA, paddling a kayak on the Savannah River in summer, cheering for the Atlanta Braves and Savannah Bananas, and participating
    in quarterly 5 k charity runs, all while they treat fitness as a low‑pressure, flexible complement to their artistic pursuits.
  arts: Cheryl Mcafee nurtures their curiosity for visual art by sketching watercolors of Savannah’s moss‑draped oaks, collecting vintage décor at thrift shops, attending performances at the Savannah Playhouse
    starring Viola Davis, and listening to Sufjan Stevens and the Jazz at Lincoln Center Orchestra, and they let these influences shape both their cleaning business branding and home décor projects.
  travel: Cheryl Mcafee prefers a blend of spontaneous road trips and purposeful art pilgrimages, having explored the historic streets of Charleston, the music scene of Nashville, and the culinary delights
    of New Orleans, while they dream of visiting Florence’s Uffizi Gallery and Kyoto’s zen gardens to deepen their sustainable living inspiration.
  culinary: Cheryl Mcafee enjoys cooking Southern comfort meals such as shrimp & grits, fried chicken with a buttermilk brine, collard greens seasoned with smoked paprika, and sweet‑potato pie spiced with
    nutmeg, and they frequently source heirloom tomatoes, fresh pecans, and locally roasted coffee to elevate these dishes in their modest kitchen.
  core: Cheryl Mcafee is a curiosity‑driven, eco‑conscious cleaner with a competitive edge, a penchant for vintage décor, and they habitually juggle artistic projects while occasionally letting organization
    slip.
background:
  cultural: Cheryl grew up in a white, Southern family in rural Georgia, where hospitality, community ties, and church participation shaped her values. Raised in Hart County, she experienced a blend of
    agricultural life and small‑town traditions, including Sunday services at a local Methodist church, family gatherings featuring home‑cooked meals, and seasonal festivals that celebrated regional crafts
    like quilting and folk music. This background instilled a respect for hard work, an appreciation for the region’s natural beauty, and an affinity for the convivial, down‑to‑earth culture of the American
    South, all of which influence her approach to work, relationships, and leisure.
