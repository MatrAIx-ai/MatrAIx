  career_goals: Cheryl aims to leverage her cleaning expertise into a niche, boutique cleaning service that specializes in art‑friendly and eco‑conscious environments. She plans to earn a professional certification
    in green cleaning and a small‑business management course offered online. Within the next three years, she hopes to become the top‑rated independent cleaner in Hart County, build a loyal client base
    among local galleries, antique dealers, and small‑scale hospitality venues, and eventually hire a small team to expand her services regionally. Her competitive streak drives her to set measurable performance
    targets, such as a 20% increase in repeat business annually, while her curiosity pushes her to continuously experiment with new cleaning technologies and sustainable practices.
