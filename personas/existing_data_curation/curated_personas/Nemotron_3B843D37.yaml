personas:
  professional: Ashley Leiva, a budding toddler architect, delights in meticulously stacking wooden blocks while experimenting with wildly creative structures, reflecting their curious, organized yet flexible
    nature and a latent competitive streak even at play.
  sports: Ashley Leiva, a pint‑size enthusiast of the Boston Red Sox who dons a tiny cap from a family wardrobe, enjoys morning tumble‑time at the Bright Beginnings Playhouse gymnastics club, and often
    participates in baby yoga sessions that blend gentle stretching with competitive giggles.
  arts: Ashley Leiva, who lights up to the melodic tones of Mozart’s "Eine kleine Nachtmusik" and the playful beats of Disney’s "Moana" soundtrack, frequently squeals while finger‑painting with non‑toxic
    Crayola paints and eagerly watches Sesame Street, reflecting a deep appreciation for rhythmic and visual arts.
  travel: Ashley Leiva, who has already explored the nearby city zoo and a weekend beach resort with grandparents, dreams of a future trip to Disneyland Paris, and prefers outings that balance stroller‑friendly
    itineraries with stimulating sensory experiences.
  culinary: Ashley Leiva, who adores sweet potato puree with a hint of cinnamon, mashed avocado mixed with banana, and occasionally tries mild chickpea hummus on soft pita, enjoys experimenting with new
    textures but stubbornly rejects any food with visible chunks.
  core: Ashley Leiva is a curious, competitive one‑year‑old who balances meticulous block‑building with occasional tantrums over mismatched socks, spills their own milk, and demands extra seconds of nap,
    all while exploring the world with wide‑eyed wonder.
background:
  cultural: Ashley is raised in a Mexican-American household in Philadelphia, where Spanish and English are spoken interchangeably. Her family celebrates Mexican traditions such as Día de los Muertos, Cinco
    de Mayo, and holiday foods like tamales and pozole, while also participating in local community events that reflect the city's multicultural character. Exposure to Mexican music—rancheras, mariachi—and
    cuisine is woven into daily life, fostering a strong sense of cultural identity that blends with the diverse influences of her urban environment. This bicultural upbringing nurtures her appreciation
    for art, community, and familial bonds.
