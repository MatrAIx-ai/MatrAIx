  career_goals: While still an infant, Ashley's future ambitions are shaped by her family's encouragement of curiosity and artistic appreciation. As she matures, she is envisioned pursuing a path that blends
    creativity with community involvement—such as becoming a visual artist, a designer, or an educator who uses art to inspire young learners. Her long-term goal is to engage in higher education where she
    can refine her artistic skills and later contribute to Philadelphia's vibrant cultural scene, possibly through community art programs that celebrate her Mexican heritage.
