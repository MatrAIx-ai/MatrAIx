persona_description: An IT professional who is interested in learning about server virtualization and the benefits it can bring to their organization. They are looking for resources and information to help
  them understand the different server virtualization solutions available, such as VMware, Citrix, and Microsoft, and how they can convert hardware-based servers into virtual machines running on one physical
  server. They are also interested in learning about the technical aspects of server virtualization, such as the role of the hypervisor and the concept of bare metal. They are likely to be familiar with
  the basics of server virtualization and have a basic understanding of terms such as virtual machine, hypervisor, and bare metal.
