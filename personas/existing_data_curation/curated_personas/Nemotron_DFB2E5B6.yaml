  hobbies: '[''Visiting art galleries and museums'', ''Attending public lectures'', ''Woodworking'', ''Gardening'', ''Digital photography'', ''Playing chess'', ''Reading science and history books'', ''Traveling
    to historic sites'', ''Volunteering at the local museum'', ''Listening to classical music'']'
  career_goals: Although retired from formal employment, Adnan is driven to leave a lasting impact. He aims to mentor younger engineers and hobbyists through local community programs, volunteer as a docent
    at the Baltimore County Art Museum, and curate interdisciplinary workshops that blend science, art, and technology. He plans to author a memoir that intertwines his engineering experiences with reflections
    on the evolving art world, and to serve on the board of a historic preservation society. Supporting his family, he hopes to fund scholarships for his grandchildren and collaborate with his spouse on
    community garden projects.
