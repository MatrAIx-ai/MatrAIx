personas:
  professional: Adnan Sevin, a retired civil engineer with a data‑driven problem‑solving mindset, channels his disciplined expertise in statistical analysis, structural design, and project management into
    mentoring young engineers, developing curriculum for community workshops, and curating interdisciplinary programs that fuse science, art, and technology, all while applying the same meticulous planning
    that defines his gardening and woodworking pursuits.
  sports: Adnan Sevin embraces low‑impact fitness by walking the Patapsco River Trail each morning, playing in a senior tennis league on Saturdays, and cheering on the Baltimore Ravens and the Baltimore
    Orioles, while they also join a local historical walking club that mixes gentle hikes with visits to Civil War sites, reflecting their love of both movement and history.
  arts: Adnan Sevin frequents the Baltimore Museum of Art and the American Visionary Art Museum, where they study works by Gustav Klimt, Wassily Kandinsky, and native photographer John Gach, volunteer as
    a docent sharing insights with visitors, and unwind at home listening to Yo‑Yo Ma’s cello recordings and the Boston Symphony Orchestra, which fuels their interdisciplinary workshop ideas.
  travel: Adnan Sevin’s travel style blends meticulous planning with a hunger for historic immersion, leading them on road trips to Colonial Williamsburg, Gettysburg, and St. Augustine, Florida, while also
    arranging annual overseas pilgrimages to Rome’s ancient ruins and Kyoto’s temples, always mapping itineraries in a spreadsheet and preferring cultural experiences over luxury accommodations.
  culinary: Adnan Sevin cultivates a garden that inspires a seasonal menu featuring heirloom tomato bruschetta with fresh basil, rosemary‑roasted carrots, lemon‑herb grilled salmon, and beloved Maryland
    crab cakes, while they also relish occasional treats like blueberry scones from a local bakery and a glass of Pinot Noir at a neighborhood bistro.
  core: Adnan Sevin is a disciplined, curiosity‑driven 75‑year‑old who blends engineering precision with artistic passion, mentoring community members, tending a meticulous garden, and navigating the quirks
    of aging with gentle humor and occasional forgetfulness.
background:
  cultural: Adnan is a white American whose family roots trace back to English and Irish immigrants who settled in the Mid-Atlantic region in the early 20th century. Raised in Baltimore County, he grew
    up in a middle-class environment that valued education, community service, and a respect for both European cultural traditions and the diverse artistic scene of Maryland. His upbringing in a Christian
    household reinforced a cooperative and considerate outlook, while his lifelong exposure to local heritage sites and the region’s vibrant arts community shaped his appreciation for both classical and
    modern cultural expressions.
