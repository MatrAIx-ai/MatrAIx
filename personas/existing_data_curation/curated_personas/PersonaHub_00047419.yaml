persona_description: Andrew Papachristos, an associate professor of sociology at Yale University, is a researcher who specializes in the study of gun violence. His work has focused on understanding the
  patterns of transmission and the communities most affected by gun violence, and he has applied the science of social networks to identify individuals and communities that are most susceptible to being
  shot and killed. Papachristos' research has important implications for how gun violence can be addressed, and he has argued that prevention efforts should be directed toward those individuals and communities
  most at risk.
