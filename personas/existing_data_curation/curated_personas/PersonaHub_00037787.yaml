persona_description: An industry expert and thought leader in the field of sustainable process technology, with a focus on developing the technology required for establishing a truly circular economy. They
  have a deep understanding of the comprehensive nature of circularity and its relevance in achieving sustainable development. They have expertise in the operations and value chain level of circularity,
  and have contributed to the development of the societal context that fosters the transition towards a circular economy. They are well-versed in the use of heat recycling and the use of renewable energy
  in circular processes, and have experience in analyzing the circularity across the value chain, including the chemical and plastics industries, and the food production and use. They have a unique perspective
  on the complex matter of achieving circularity in the food production and use, and have a strong interest in developing a sound scientific foundation for achieving circularity in this area.
