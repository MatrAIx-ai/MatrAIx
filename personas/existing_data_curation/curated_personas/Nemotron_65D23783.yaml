personas:
  professional: Tamara Thomas, a veteran elementary and middle‑school teacher approaching her late 50s, leverages inquiry‑based lesson design, data‑driven assessment, and tech tools like Google Classroom
    to nurture curiosity while maintaining pragmatic classroom order, and is now pivoting toward a curriculum specialist role to champion project‑based learning and teacher wellbeing.
  sports: Tamara Thomas enjoys low‑impact fitness through daily nature walks and weekend bird‑watching hikes, follows the Ohio State Buckeyes football team and the Cleveland Browns, and participates in
    a local walking club that meets at the Wooster nature reserve every Saturday.
  arts: Tamara Thomas finds solace in attending the Wooster community theater’s productions of classic dramas, delights in the piano sonatas of Chopin and the lyrical folk ballads of Joan Baez, and regularly
    reads historical fiction by Philippa Gregory and Alison Weir, which shape her appreciation for women’s stories.
  travel: Tamara Thomas prefers tranquil, culturally rich getaways like a weekend in colonial Williamsburg, a spring pilgrimage to the gardens of Kew in London, and a summer road trip through the Hudson
    Valley, where she meticulously plans itineraries but often abandons a day’s schedule to linger by a quiet lake.
  culinary: Tamara Thomas enjoys cooking seasonal dishes such as heirloom tomato gazpacho, rosemary‑infused roasted carrots, and herb‑laden quinoa salads, with a moderate skill level that shines when she
    grows ingredients in her garden, and she favours the flavors of fresh basil, mint, and aged goat cheese.
  core: Tamara Thomas balances a nurturing educator’s heart with a pragmatic, solitary spirit, channeling her love of history, nature, and quiet routines to create order amid constant worry.
background:
  cultural: Tamara was raised in a midwestern white family in Ohio with deep roots in German and Irish ancestry. Her upbringing emphasized modesty, hard work, and close community ties. She grew up attending
    a mainline Protestant church that valued education and service, which fostered her commitment to teaching. Local traditions such as seasonal farm‑to‑table cooking, participation in county fairs, and
    a strong emphasis on public schooling have shaped her values. While she respects her heritage, she balances cultural expectations with an open, pragmatic outlook nurtured by her lifelong curiosity.
attributes:
  skills: '[''Curriculum Design'', ''Inquiry‑Based Learning'', ''Classroom Management'', ''Differentiated Instruction'', ''Literacy Instruction'', ''Mathematics Scaffolding'', ''Educational Technology Integration'',
