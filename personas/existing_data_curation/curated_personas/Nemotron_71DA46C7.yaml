  skills: '[''Photography'', ''Digital Illustration'', ''Bilingual (Spanish/English)'', ''Basic HTML/CSS'', ''Creative Writing'', ''Social Media Content Creation'', ''Traditional Salvadoran Cooking'']'
  hobbies: '[''Sketching'', ''Street Photography'', ''Skateboarding'', ''Acoustic Guitar'', ''Cooking Salvadoran Dishes'', ''Hiking'', ''Reading Graphic Novels'', ''Playing Indie Video Games'', ''Volunteering
    at Cultural Events'']'
  career_goals: He plans to enroll in a community college program in graphic design or digital media, graduating with an associate degree that will open pathways to freelance illustration and content creation
    for local businesses. He dreams of building a personal brand that merges his artistic passions with his Salvadoran heritage—creating visual stories, merchandise, and online videos that showcase traditional
    recipes and cultural narratives. In the longer term, he hopes to work for a nonprofit or cultural organization in the Pacific Northwest, using his bilingual skills and artistic eye to develop outreach
    campaigns that celebrate Latino contributions and foster community connections. He also wants to keep learning new digital tools, experiment with mixed media, and perhaps travel back to El Salvador
    for an artist‑exchange program.
