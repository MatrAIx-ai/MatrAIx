personas:
  professional: Humberto Soto, an 18‑year‑old aspiring graphic designer, blends self‑taught photography, GIMP and Krita editing, and bilingual communication to deliver community‑focused illustrations, while
    his relaxed, flexible attitude sometimes leads to missed deadlines but fuels spontaneous, authentic visual storytelling.
  sports: Bucking the typical high‑school athlete mold, Humberto Soto spends weekends cruising the downtown skatepark with the Yakima Skate Club, follows the Seattle Seahawks and Seattle Sounders FC for
    inspiration, and tackles seasonal hikes through the Yakima River Canyon to stay fit, though he prefers a casual, self‑directed fitness routine over organized sports.
  arts: Humberto Soto immerses himself in the visual and auditory arts, sketching street scenes reminiscent of Edward Hopper, snapping candid photos with a vintage Canon, strumming acoustic versions of
    The Strokes and Café Tacvba while singing in both Spanish and English, devouring graphic novels like Saga and comic series such as Black Science, and drawing inspiration from muralists like Diego Rivera
    and contemporary illustrators like Kelsey Beckett.
  travel: Humberto Soto explores the Pacific Northwest with a love for spontaneous road trips, having visited Seattle’s Pike Place Market, Portland’s art districts, and the Columbia River Gorge, while dreaming
    of a cultural exchange in San Salvador and a future hiking adventure in Patagonia, preferring flexible itineraries that balance budget constraints and a craving for authentic street art experiences.
  culinary: Humberto Soto’s culinary palate gravitates toward Salvadoran comfort foods, expertly hand‑rolling pupusas de frijol and steaming tamales de elote, seasoning dishes with curtido and plantains,
    while also experimenting with homemade guacamole, grilled corn with cotija cheese, and a dash of chipotle, showcasing an intermediate cooking skill that thrives during family gatherings.
  core: Humberto Soto is an 18‑year‑old curious visual creator who balances spontaneous skateboarding, street‑level art, and family‑rooted cooking while navigating a laid‑back yet occasionally chaotic path
    toward a freelance design career.
background:
  cultural: Humberto was raised in a Salvadoran immigrant household in Yakima, Washington. His parents arrived in the early 2000s and maintained strong ties to their homeland, speaking Spanish at home and
    celebrating traditions such as Día de la Independencia, Semana Santa, and the feast of the Virgin of Guadalupe. He grew up bilingual, navigating both his family's cultural expectations and the broader
    American school environment. The local Salvadoran community in Yakima, centered around the church and a small cultural association, provided a sense of belonging and opportunities to participate in
    festivals, dances, and community gatherings. These experiences instilled in him a deep appreciation for Salvadoran food, music, and storytelling, while his surroundings in the Pacific Northwest exposed
    him to outdoor recreation and diverse artistic influences. He identifies as both Salvadoran and American, often reflecting on the blend of Central American heritage and Western upbringing in his creative
    work.
