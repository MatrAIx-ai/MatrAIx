  may also have expertise in laboratory testing, microbiological efficacy, and the compatibility of UV-LED technology with existing water treatment systems. Additionally, this person may be interested in
  the impact of UV-LED technology on the environment and the potential for the technology to be used in alternative applications beyond water treatment.
