personas:
  professional: Sonja Grover is a teenage aspiring visual artist who blends meticulous sketching of urban Florida scenes with experimental digital art tutorials, channeling their curiosity and organized‑flexible
    approach into a disciplined creative workflow while quietly asserting unique perspectives in small‑group school art projects.
  sports: Sonja Grover enjoys trail runs along Alafia River State Park and competes on their middle school’s cross‑country team, while cheering for the Tampa Bay Lightning and following the Tampa Bay Buccaneers,
    and they occasionally join a small community volleyball group at the local recreation center.
  arts: Sonja Grover immerses themself in indie folk playlists featuring Bon Iver and Fleet Foxes, studies graphic novels by Alison Bechdel and Marjane Satrapi, and frequently visits Tampa’s contemporary
    art museum to admire works by local muralist Kris Kremers and international icons like Banksy, letting these influences shape their own sketching and digital creations.
  travel: Sonja Grover prefers low‑key family road trips to Florida gems like Clearwater Beach and the Everglades, but dreams of an organized solo backpacking adventure through Barcelona’s street art districts
    and Kyoto’s serene temples, balancing school schedule constraints with a modest savings stash saved for future travel.
  culinary: Sonja Grover loves crafting avocado toast topped with microgreens, whipping up mango‑lime smoothies, and indulging in shrimp tacos seasoned with cilantro and lime, while occasionally experimenting
    with Cuban‑style empanadas and tropical fruit salads featuring papaya and passionfruit.
  core: Sonja Grover blends quiet curiosity with a habit of over‑planning in their sketchbook, turning daily worries into detailed bullet‑journal entries while quietly mastering urban art and secretly hoarding
    extra art supplies for late‑night doodles.
background:
  cultural: Sonja grew up in Ruskin, a suburban community in Hillsborough County, Florida, where a blend of Southern hospitality and coastal multiculturalism shapes daily life. Her white, middle‑class family
    roots are intertwined with the region’s diverse cultural exposure – from attending local festivals that feature Cuban and Haitian music to participating in community service projects through her church.
    The proximity to Tampa’s vibrant arts scene provides her with regular access to museum exhibitions and youth art programs, reinforcing her artistic curiosity while grounding her in a community that
    values both tradition and creative exploration.
