  career_goals: Sonja aspires to merge her love of art with a helping profession. She envisions studying visual communication or art therapy in college, eventually working as an art therapist who uses creative
    projects to support adolescents coping with anxiety. Alternatively, she is drawn to a career in graphic design or multimedia storytelling, where she can craft impactful visual narratives for socially‑focused
    campaigns. She hopes to balance a creative career with purposeful community work, perhaps volunteering at local youth art programs.
