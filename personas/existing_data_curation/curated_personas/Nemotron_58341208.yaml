  hobbies: '[''Cooking traditional Honduran dishes'', ''Latin dance (salsa and bachata)'', ''Photography of urban and cultural scenes'', ''Jogging in local parks'', ''Yoga and mindfulness practice'', ''Volunteering
    at community centers'', ''Reading contemporary fiction'']'
  career_goals: Ana is determined to complete her bachelor's degree in Business Administration with a focus on finance and entrepreneurship. She aims to secure a competitive internship at a financial services
    firm in New York to apply her analytical skills in real‑world settings. In the long term, she aspires to launch a consulting boutique that helps small Hispanic‑owned businesses optimize operations and
    access capital, merging her practical mindset with her desire to give back to the Honduran‑American community.
