personas:
  professional: Ana Ruiz, a business administration major concentrating on finance and entrepreneurship, channels an obsessive knack for organization, Excel analysis, and budding Python scripting into high‑impact
    class projects and volunteer event planning, while their competitive drive pushes them to secure a demanding internship at a New York financial services firm.
  sports: Ana Ruiz jogs three times a week through Central Park, belongs to the local NYRR (New York Road Runners) running club for spring races, practices yoga at the Bronx YMCA's evening class, follows
    the New York Knicks and New York Yankees, and occasionally joins a community salsa‑fitness group that blends dance with cardio.
  arts: Ana Ruiz blends a love for Latin dance with visual storytelling, regularly dancing to the rhythms of Marc Anthony and the modern bachata trio Aventura while capturing urban skylines inspired by
    Steve McCurry and Ansel Adams, and they often cite the cinematic flair of director Alfonso Cuarón as a creative influence.
  travel: Ana Ruiz's travel style mixes structured itineraries with spontaneous cultural immersion, having backpacked through Antigua Guatemala and explored Mexico City’s street markets, while they dream
    of a summer culinary tour in Barcelona’s tapas bars and a weekend road trip to the Hudson Valley’s vineyard festivals.
  culinary: Ana Ruiz is an intermediate home chef who perfects traditional Honduran baleadas and sopa de caracol, then experiments by adding Caribbean curry spices, coconut milk, and Scotch bonnet peppers,
    often sourcing fresh plantains and masa from the local farmer’s market and pairing dishes with craft ales.
  core: Ana Ruiz is a disciplined dreamer who balances meticulously planned spreadsheets with the spontaneous spin of salsa, but can’t resist binge‑watching late‑night reality TV while letting laundry pile
    up until the last moment.
background:
  cultural: Ana is the daughter of Honduran immigrants who settled in West Hempstead. Her upbringing was infused with Honduran traditions such as celebrating Semana Santa and enjoying punta music, while
    also embracing the multicultural fabric of Long Island. Fluent in both Spanish and English, she frequently acts as a cultural bridge for her extended family and peers. Her strong family ties foster
    a sense of responsibility toward the Honduran diaspora, inspiring her community‑focused ambitions and her appreciation for both heritage and the opportunities available in the United States.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Advanced organization and time‑management'', ''Microsoft Office suite proficiency (Word, Excel, PowerPoint)'', ''Data analysis with Excel'',
