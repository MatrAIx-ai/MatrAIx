  hobbies: '[''Fishing'', ''Woodworking'', ''Gardening'', ''Historical Reading'', ''Photography'', ''Ice Fishing'', ''Snowshoeing'', ''Crossword Puzzles'', ''Bridge'', ''Community Theater'']'
  career_goals: Although retired, Matthew aims to stay mentally and physically active. He plans to volunteer as a mentor for local high-school students interested in trades, share his knowledge through
    workshops at the community center, and continue learning through online courses on local history and renewable energy. He also hopes to complete a memoir, travel to a few National Parks, and maintain
    his health through regular walks and cross-country skiing.
