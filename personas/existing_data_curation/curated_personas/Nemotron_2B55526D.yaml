  career_goals: Although retired, Jessenia is driven by personal projects that reflect her love of learning and desire to leave a lasting legacy. She intends to complete a written and illustrated family
    genealogy book, incorporating oral histories collected from relatives. She also aims to become a regular docent at the Roswell Museum, sharing her knowledge of local art and Hispanic heritage with visitors.
    Within the next few years, she hopes to launch a small community garden in her neighborhood, teaching sustainable gardening practices. Continuing her curiosity about unconventional ideas, she plans
    to attend a regional UFO symposium and write a reflective essay connecting folklore with cultural storytelling. Finally, she aspires to travel to her ancestors’ hometown in Michoacán, Mexico, to deepen
    her connection to her roots.
