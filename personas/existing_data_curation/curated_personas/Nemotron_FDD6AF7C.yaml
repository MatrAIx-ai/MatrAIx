  hobbies: '[''Bridge'', ''Reading African American business history'', ''Vegetable and herb gardening'', ''Listening to classic jazz and soul music'', ''Walking desert trails'', ''Cooking Southern-style
    meals'', ''Volunteering at the community center'', ''Genealogy research'', ''Writing memoirs'']'
  career_goals: Although retired from formal employment, Leaner aims to leverage his expertise to mentor emerging entrepreneurs, especially within the Black community of North Las Vegas. He aspires to serve
    on the board of a local nonprofit focused on economic empowerment, guide his grandchildren through college preparatory planning, and document his professional journey in a memoir that highlights resilience
    and practical wisdom. Maintaining his health and staying mentally active are also central to his long‑term ambitions.
