personas:
  professional: Leaner Williams is a retired retail manager turned community mentor who leverages decades of strategic planning, budgeting, and team organization to guide budding entrepreneurs in North
    Las Vegas, openly critiquing proposals with a skeptical eye while maintaining a structured, goal‑oriented approach they bring to every mentoring session.
  sports: Leaner Williams follows the Las Vegas Raiders, Las Vegas Aces, and Vegas Golden Knights avidly, participates in low‑impact walking groups on desert trails with fellow seniors, enjoys a weekly
    pickleball session at the community center, and they balance competitive enthusiasm with physical caution.
  arts: Leaner Williams curates classic jazz and soul playlists featuring Miles Davis, John Coltrane, and Aretha Franklin, attends occasional community theater productions of classic plays, collects biographies
    of notable American business leaders for inspiration, and they let music and storytelling shape their reflective evenings.
  travel: Leaner Williams prefers structured travel itineraries, having explored the Grand Canyon, Sedona’s red rocks, and a weekend getaway to New Orleans for its music scene, while dreaming of a calm
    retreat in the Swiss Alps where they can combine garden tours with scenic hikes.
  culinary: Leaner Williams enjoys cooking Southern‑style dishes such as fried chicken, collard greens, and cornbread, seasoned with fresh herbs from their garden like basil and thyme, boasts a competent
    kitchen skill set that balances traditional recipes with occasional experimental twists like a smoked‑pepper gumbo they often perfect for family gatherings.
  core: Leaner Williams blends a lifelong business discipline with a love for jazz, gardening, and community mentoring, stays skeptical yet supportive, manages health with routine diligence, and they indulge
    in Southern cooking while occasionally splurging on garden gadgets.
background:
  cultural: Leaner grew up during the civil‑rights era in the American South before relocating to Nevada in the 1970s. His Black heritage, shaped by church involvement, family storytelling, and a strong
    emphasis on education, informs his values of perseverance, community service, and pride in cultural achievements. In North Las Vegas, he has become an active participant in local African American traditions,
    supporting church events, neighborhood festivals, and mentorship programs that reinforce cultural continuity while navigating the diverse dynamics of a rapidly growing urban environment.
attributes:
  skills: '[''Strategic business planning'', ''Budgeting and financial oversight'', ''Project management'', ''Team leadership and staff development'', ''Mentoring and coaching'', ''Community outreach coordination'',
