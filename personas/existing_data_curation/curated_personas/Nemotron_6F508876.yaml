  career_goals: Haley aims to secure a full‑time, tenure‑track faculty position in a computer science or engineering department within the next three years, moving beyond her current adjunct role. She plans
    to develop a flagship interdisciplinary course that blends computational methods with sustainable energy, positioning herself as an innovator in curriculum design. Seeking external grant funding, she
    hopes to launch a small research lab focused on AI‑driven environmental modeling, which will also provide undergraduate research opportunities. Publishing peer‑reviewed papers and presenting at national
    conferences are central to her professional profile. In the longer term, she aspires to become department chair, championing active‑learning pedagogy and expanding outreach to underrepresented students.
    On a personal level, Haley is committed to refining her time‑management and organizational skills, and she intends to create a series of online courses for platforms like Coursera to reach a broader
    audience.
