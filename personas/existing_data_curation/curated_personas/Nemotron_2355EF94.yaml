personas:
  professional: Kaja Williams, a three‑year‑old budding explorer, demonstrates early signs of a future career in scientific research by methodically arranging building blocks, cataloguing colors, and asking
    endless 'why' questions, blending boundless imagination with a disciplined, organized approach to discovery.
  sports: Kaja Williams participates in toddler gymnastics classes at the local community center, loves swinging on the playground, and quietly cheers for the Springfield Sluggers, the nearby minor league
    baseball team, preferring solo play over large‑group sports while staying active through daily backyard obstacle courses.
  arts: Kaja Williams loves to doodle fantastical animal mash‑ups with crayons, sings along to Disney's "Let It Go," and watches Pixar's "Inside Out," turning these influences into bedtime story reenactments
    that showcase a vivid inner world and a budding appreciation for visual and musical storytelling.
  travel: Kaja Williams enjoys short family trips to the nearby aquarium and an annual visit to a seaside boardwalk, favoring a carefully planned itinerary that includes a scheduled nap, a beloved stuffed
    animal, and a stop for ice cream at Ben & Jerry's, balancing adventure with comfort.
  culinary: Kaja Williams favors mac and cheese with cheddar, bites into bite‑size broccoli florets only when they're dipped in cheese sauce, and insists on using a tiny wooden spoon for their fruit smoothies,
    showing a selective palate but a budding curiosity for mixing flavors.
  core: Kaja Williams, a whimsically organized three‑year‑old, blends boundless curiosity with methodical play, often worrying over tiny setbacks while crafting elaborate imaginary worlds.
background:
  cultural: Kaja is raised in an African American family in Oklahoma City, where she experiences rich cultural traditions such as gospel music at church, family gatherings that celebrate Juneteenth, and
    cooking of Southern comfort foods like collard greens and sweet potatoes. Her parents instill values of community, kindness, and respect, and she frequently hears family stories that highlight resilience
    and creativity. The local Black community’s emphasis on education and artistic expression influences her love for drawing and storytelling, while the Midwestern environment adds a fondness for outdoor
    play and seasonal celebrations.
attributes:
  skills: '["Imaginative storytelling", "Fine motor coordination (drawing, cutting, building blocks)", "Organizational play (sorting toys by color/size)", "Early verbal communication and questioning", "Simple
