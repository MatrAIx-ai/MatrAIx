  hobbies: '["Coloring and drawing", "Building with wooden blocks", "Pretend play with dolls and stuffed animals", "Listening to children''s music", "Reading picture books", "Simple puzzle solving", "Nature
    walks and leaf collecting"]'
  career_goals: She often says she wants to become a teacher so she can share stories and help friends learn, and she also dreams of being an artist who paints colorful pictures. Sometimes she imagines
    exploring space as an astronaut, showing her love for novel ideas.
