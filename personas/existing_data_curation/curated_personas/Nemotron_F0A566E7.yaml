  career_goals: Maria aims to advance from a frontline sales role to a senior advisory position within the next three years, targeting a regional sales manager role where she can mentor junior agents and
    shape strategic sales initiatives. She plans to earn the Chartered Property Casualty Underwriter (CPCU) designation to deepen her technical expertise and differentiate herself in niche markets such
    as cyber liability and environmental risk coverage. Long‑term, Maria envisions launching her own boutique insurance agency focused on serving bilingual communities in South Texas, providing personalized
    risk solutions while fostering financial independence for herself and her family. Her competitive nature drives her to consistently exceed sales targets and be recognized as a top performer in her company.
