persona_description: Thalia MacMillan is an assistant professor and mentor of community and human services in the Center for Distance Learning (CDL) at SUNY Empire State College. She received her Ph.D.
  in social work from Fordham University, specializing in policy and research. Prior to coming to SUNY, Thalia worked simultaneously in the professional and academic sectors. For the past 18 years she has
  worked in the fields of evaluation, research, and practice. Thalia has taught social research methods, program evaluation, social policy, addictions, mental health, disabilities, assessment and diagnosis,
  and statistical methods. She regularly develops and teaches in multiple modalities, including blended, online, face to face, and immersive cloud learning courses. In addition to volunteering research
  services to multiple local organizations, Thalia is a volunteer EMT in her community. All of these experiences in the various sectors have heightened her interests in the addictions field.
