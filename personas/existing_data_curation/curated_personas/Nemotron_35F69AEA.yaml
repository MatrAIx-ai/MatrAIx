  career_goals: Mynhung aims to progress to a senior clerkship at the Washington State Court of Appeals, positioning himself for a future appointment as a district court judge. He is committed to improving
    access to justice for the Southeast Asian community in Pierce County by establishing a pro‑bono legal clinic and creating culturally competent legal resources. Additionally, he seeks to contribute scholarly
    articles that explore the intersection of law, visual arts, and cultural heritage preservation, and to lead initiatives that modernize court processes through technology and interdisciplinary collaboration.
