  career_goals: Although still a toddler, Ashley often talks about what she wants to be when she grows up. She dreams of a job that offers routine and the chance to help others, such as a preschool teacher,
    a librarian for children, or a veterinarian caring for animals. She imagines herself in a calm, predictable environment where she can use her love of storytelling and caring nature. At this stage, her
    ambitions are expressed through pretend play—she lines up dolls in a “classroom” and cares for stuffed animals as “patients,” hinting at a future desire for a supportive, structured career.
