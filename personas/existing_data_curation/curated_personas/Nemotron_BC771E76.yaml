personas:
  professional: Ashley Grubner envisions herself as a meticulous preschool teacher, organizing storytime with bright picture books and a tidy schedule, which reflects her love of structure while she also
    enjoys the occasional spontaneous playbreak.
  sports: Ashley Grubner attends a local toddlers' gymnastics class on Tuesdays, cheers for the nearby minor league baseball team the River City Rangers, and enjoys weekend family walks with her small plastic
    soccer ball.
  arts: Ashley Grubner loves drawing dinosaurs with Crayola crayons, singing along to The Wiggles and Sesame Street, and staging imaginative puppet shows with her stuffed animals.
  travel: Ashley Grubner has explored her grandparents’ farm in the countryside and dreams of a family trip to Disneyland in California, preferring short car rides with frequent snack stops.
  culinary: Ashley Grubner relishes mac and cheese with a sprinkle of cheddar, peanut butter and jelly sandwiches, and carrot sticks with ranch dip, proudly helping to stir batter in her mother’s kitchen.
  core: Ashley Grubner balances tidy toy arrangements, bright piggy banks, itchy elbows, dinosaur doodles, and big dreams of theme parks, all colored by occasional bursts of anxiety.
background:
  cultural: Ashley is raised in a white, middle‑class family in Temple, Texas, within the broad cultural setting of the American South. Her family participates in community and church activities typical
    of the region, such as Sunday school, holiday celebrations, and local festivals like the Temple Spring Jubilee. She is exposed to Southern hospitality, polite manners, and a strong sense of community.
    Family meals often feature Texan comfort foods, and she hears both classic American children's tunes and regional folk songs. This cultural environment reinforces a love of routine, modesty, and respect
    for elders, shaping her early worldview.
