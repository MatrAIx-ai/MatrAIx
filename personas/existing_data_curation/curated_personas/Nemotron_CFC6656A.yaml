  hobbies: '[''Community basketball league'', ''Neighborhood barbecuing club'', ''Classic car restoration'', ''Mindfulness meditation'', ''Listening to stress‑management podcasts'', ''Mentoring high‑school
    vocational students'']'
  career_goals: Elliot aims to transition from a first‑line supervisor to a facilities manager overseeing multiple sites in the Las Vegas area. He wants to obtain certifications such as the Certified Maintenance
    & Reliability Professional (CMRP) to formalize his expertise. A key ambition is to develop a formal mentorship program for entry‑level mechanics, improving retention and reducing turnover. He also seeks
    to introduce more structured workflow tools that still allow his team flexibility, hoping to reduce his own stress and improve overall efficiency. Long‑term, he envisions a role where he can influence
    corporate safety culture and champion employee well‑being.
