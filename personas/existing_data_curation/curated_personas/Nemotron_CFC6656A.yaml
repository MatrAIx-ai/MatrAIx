personas:
  professional: Elliot Hamilton, a seasoned facilities supervisor with hands‑on expertise in HVAC and industrial equipment, leverages their practical troubleshooting skills and compassionate leadership
    to keep teams motivated while they pursue CMRP certification and a future facilities‑manager role.
  sports: Elliot Hamilton, a regular participant in the Midtown Community Center's Tuesday night basketball league, cheers for the Las Vegas Aces and the Vegas Golden Knights, and sponsors a local youth
    baseball team through the volunteer mentorship program they lead.
  arts: Elliot Hamilton, a fan of classic rock legends like Bruce Springsteen and The Rolling Stones and a devoted listener of the self‑help podcast The Tim Ferriss Show, frequently attends the annual Vegas
    Arts & Music Festival and enjoys watching the restoration series West Coast Customs for inspiration.
  travel: Elliot Hamilton, an avid road‑tripper with a flexible schedule, has taken spontaneous weekend drives to the Grand Canyon, a weekend car‑show pilgrimage to Pebble Beach Concours d’Elegance, and
    a music‑focused getaway to Austin, Texas, while keeping travel plans low‑key to accommodate work and family commitments.
  culinary: Elliot Hamilton, a grill‑enthusiast who rates himself a competent smoker, relishes cooking Texas‑style smoked brisket, Korean BBQ short ribs marinated in gochujang, and Jamaican jerk chicken
    using hickory wood chips, while occasionally over‑seasoning due to multitasking between podcasts and prep work.
  core: Elliot Hamilton, a sociable mechanic‑turned‑leader, balances a love for classic cars and community basketball with a restless mind that worries about stress, often turning to meditation and a grill
    to find calm.
background:
  cultural: Elliot was raised in a middle‑class, primarily Anglo‑American family in the Southwest, moved to Las Vegas as a young adult for work, and has lived there for over two decades. His cultural identity
    reflects mainstream U.S. values such as individual responsibility, hard work, and community involvement, blended with the eclectic, hospitality‑driven atmosphere of Las Vegas. He celebrates traditional
    American holidays with his family, enjoys local Nevada outdoor recreation, and participates in community events that emphasize cooperation and mutual support.
attributes:
  skills: '[''Mechanical troubleshooting'', ''HVAC system maintenance'', ''Team leadership'', ''Shift scheduling'', ''Safety compliance and inspections'', ''Conflict resolution'', ''Vendor negotiation'',
