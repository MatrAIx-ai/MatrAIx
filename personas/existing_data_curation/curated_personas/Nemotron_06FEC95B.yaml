  career_goals: Cheryl aims to become the head of the English department and subsequently move into an assistant principal role, where she can shape school‑wide improvement initiatives. She plans to pursue
    an EdD in Educational Leadership to deepen her expertise in evidence‑based reform. Her ambitions include launching a mentorship program for early‑career teachers, publishing articles on rigorous curriculum
    standards, and earning the district’s Teacher of the Year award. While she strives for professional excellence, she also seeks to develop healthier stress‑management habits and achieve a sustainable
    work‑life balance.
