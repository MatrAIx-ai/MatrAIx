personas:
  professional: A budding little architect, Lavonia Jones constructs detailed block cityscapes during preschool playtime, applying a mix of spontaneous imagination and systematic step‑by‑step planning that
    mirrors their curiosity balanced with practicality, and they proudly showcase each completed tower to peers.
  sports: A spirited participant in the local “Mini Tigers” soccer clinic, Lavonia Jones idolizes the hometown MLB team, the Chicago Cubs, and they regularly practice dribbling with a small soccer ball,
    balancing their competitive streak with organized play.
  arts: An enthusiastic fan of animated classics, Lavonia Jones spends afternoons reenacting scenes from Disney’s “Moana” and “Frozen” while drawing with Crayola markers, especially favoring the works of
    animator Hayao Miyazaki and children’s musician Raffi, and they often stage impromptu performances for their stuffed audience.
  travel: An imaginative explorer, Lavonia Jones enjoys family trips to the Boston Science Museum and has a wish list that includes Disneyland in California and the beaches of Maui, and they prefer meticulously
    planned itineraries over spontaneous detours.
  culinary: A picky yet adventurous eater, Lavonia Jones adores macaroni and cheese with extra cheddar, loves strawberry yogurt, can correctly assemble a peanut butter‑banana sandwich, but stubbornly refuses
    broccoli, and they often bargain for dessert after meals.
  core: Lavonia Jones is a quietly competitive five‑year‑old who balances curiosity with order, hoards stickers, saves allowance methodically, and they approach challenges with steady calm.
background:
  cultural: Lavonia grows up in Perkinston, a small rural community in Stone County, Mississippi. Her family values close ties to the land, regular gatherings at the local church, and Southern hospitality.
    Traditions such as backyard barbecues, seasonal community festivals, and Sunday family meals featuring regional cuisine are part of her upbringing. At the same time, her parents encourage curiosity,
    critical thinking, and independent play, blending traditional Southern values of modesty and politeness with modern educational approaches that foster her inquisitive and practical nature.
attributes:
  skills: '["Early literacy (letter recognition, name writing)", "Basic numeracy (counting, simple addition/subtraction)", "Fine‑motor skills (drawing, coloring, cutting)", "Constructive play (LEGO, wooden
    blocks)", "Problem‑solving (puzzles, simple experiments)", "Basic computer navigation (educational games)", "Memory recall of nature facts", "Cooperative play in small groups"]'
  hobbies: '["Reading nature picture books", "Drawing and coloring wildlife", "Building with LEGO and wooden blocks", "Collecting leaves, rocks, and shells", "Playing memory‑matching and simple board games",
    "Listening to folk and country music", "Helping in the garden", "Watching nature documentaries"]'
  career_goals: Lavonia dreams of becoming a scientist who explores the outdoors, uncovering how plants grow and animals behave. She wants to design simple inventions—like a bridge for a backyard creek—that
    help protect nature, hinting at a future engineer or environmental researcher. Her competitive streak fuels a desire to win her school’s science fair and later lead community projects that promote wildlife
    stewardship. She also imagines teaching younger children about nature, blending her curiosity with a practical wish to share knowledge.
