personas:
  professional: Thomas Whisenant, a 17‑year‑old self‑taught programmer, applies their disciplined project‑planning skills to develop Python game prototypes and Arduino gadgets, documenting each step in
    meticulous journals while they aim for a community‑college computer‑science path and an apprenticeship in network support.
  sports: Thomas Whisenant, a 17‑year‑old who prefers low‑stress activity, spends weekends hiking the Pinckney Recreation Area and follows the Michigan Wolverines football and Detroit Red Wings hockey teams,
    occasionally joining a community cycling group for casual rides while they track steps in a spreadsheet to maintain disciplined fitness.
  arts: Thomas Whisenant, a 17‑year‑old indie‑music enthusiast, fills downtime listening to Radiohead and Bon Iver, binge‑watching The Expanse while they craft video tutorials of their Python projects using
    Adobe Premiere, and they occasionally visit the Ann Arbor Art Fair to admire works by local painters, a habit that fuels their creative problem‑solving.
  travel: Thomas Whisenant, a 17‑year‑old who plans trips with spreadsheet precision, enjoys weekend drives to the Michigan Upper Peninsula’s Pictured Rocks and hopes to someday backpack through Japan’s
    tech districts and Kyoto’s historic temples, balancing budget constraints while they seek immersive, low‑key cultural experiences.
  culinary: Thomas Whisenant, a 17‑year‑old who cooks at a modest intermediate level, favors hearty Midwestern staples like homemade meatloaf with mashed potatoes and seasonal apple crumble, experiments
    with Arduino‑controlled sous‑vide for perfect salmon, and they occasionally splurge on sushi rolls featuring tuna and avocado when treating themselves after a successful coding sprint.
  core: Thomas Whisenant, a 17‑year‑old methodical tech enthusiast, balances disciplined project‑planning with intense anxiety, finding solace in structured coding, solitary hikes, and meticulous journaling,
    while they occasionally succumb to impulsive gadget purchases.
background:
  cultural: Thomas is a white American from Ann Arbor, Michigan. He was raised in a middle‑class family with parents who worked in education and skilled trades, exposing him to both academic and practical
    values. Growing up near the University of Michigan, he absorbed a culture of intellectual curiosity and progressive social attitudes, while the broader Midwestern environment reinforced a strong work
    ethic, self‑reliance, and community responsibility. His ancestry is primarily German and Irish, reflecting common demographic patterns in the region. These influences shape his balanced view of new
    ideas and established methods, his disciplined approach to personal achievement, and his preference for small, supportive social circles.
