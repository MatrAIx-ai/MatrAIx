persona_description: A teacher who is passionate about integrating literature into math education, particularly in the K-3 grade level, and has a background in creating math curriculum materials that involve
  literature. She is an expert in teaching children's literature and how to connect it with helping children experience the wonder and delight of mathematics. Her advice to educators just beginning to incorporate
  literature into math activities is to choose a book and dive in, read the story aloud to the class and discuss it as you would any other book. She recommends two resources from Math Solutions Publications
  for K-3 teachers, books one and two of Math and Literature (Grades K-3).
