personas:
  professional: Myrna Rogers, a 20‑year‑old aspiring CNC programmer, blends meticulous metal‑fabrication expertise with a pragmatic drive to optimize shop floor processes, leveraging Fusion 360 designs,
    lean manufacturing principles, and a budding AWS welding certification pursuit while quietly volunteering to channel tool donations to youth apprentices.
  sports: Myrna Rogers favors solitary outdoor exercise, jogging the trails of the Wichita Mountains while listening to engineering podcasts, participates in the Wichita Mountains Hiking Association’s monthly
    outings, supports the Oklahoma City Thunder from a respectful distance, and occasionally joins a weekend pick‑up disc‑golf game at a nearby park.
  arts: Myrna Rogers pursues piano repertoire ranging from Bach's Prelude in C‑major to Debussy's Arabesque, enjoys the ambient soundscapes of Ólafur Arnalds, immerses in classic sci‑fi novels by Isaac
    Asimov while sketching CAD models, and attends occasional community theater productions featuring local folk music festivals.
  travel: Myrna Rogers prefers low‑key road trips that balance exploration and budget, having driven historic Route 66 to the Galena Pumpkin Patch, planning a future visit to Hannover Messe in Germany to
    see additive‑manufacturing exhibits, while cherishing weekend get‑aways to the Flint Hills for stargazing and herb‑foraging hikes.
  culinary: Myrna Rogers delights in cooking fresh herb‑infused grilled chicken using rosemary and thyme from her garden, frequently prepares hearty chickpea and kale soup with cumin and smoked paprika,
    enjoys crafting homemade almond‑flour banana bread, and occasionally treats herself to a hand‑cut ribeye steak after a long CNC project, though she begrudgingly avoids fast‑food drive‑thrus.
  core: Myrna Rogers is a quiet, detail‑driven CNC enthusiast who balances a love for precise fabrication with solitary hobbies, disciplined finances, and a steady, low‑stress lifestyle marked by occasional
    hobby‑induced splurges and ergonomic self‑care.
background:
  cultural: Myrna was raised in Oklahoma City within a Midwestern‑Southern cultural blend that values hard work, self‑reliance, and community cooperation. Her family reflects typical white Oklahoman heritage,
    with influences from Protestant (mainly Methodist) traditions and local community events such as the State Fair and county festivals. Growing up near a diverse industrial corridor, she developed respect
    for both the region's agricultural roots and the manufacturing sector that drives the local economy. This background nurtured her practical outlook, cooperative spirit, and appreciation for quiet, reflective
    environments.
attributes:
  skills: '["CNC milling and turning","G‑code programming","MIG/TIG welding","Technical blueprint reading","CAD/CAM (Fusion 360, SolidWorks)","Quality inspection (SPC)","Equipment maintenance and troubleshooting","Materials
    knowledge (metals, polymers, composites)","Lean manufacturing principles","OSHA safety compliance"]'
  hobbies: '["Model kit building","Personal CNC routing projects","Technical reading (journals, sci‑fi)","Herb gardening","Hiking nature trails","Piano playing","Puzzle solving (Sudoku, jigsaws)","Listening
    to engineering podcasts","Quiet volunteering (tool donation coordination)"]'
  career_goals: Myrna aims to become a certified CNC programmer and later transition into a production supervisory role where she can blend her practical skills with process optimization initiatives. She
    plans to earn an AWS welding certification and pursue a part‑time bachelor's degree in mechanical engineering to deepen her technical expertise. Long‑term, she hopes to specialize in additive manufacturing
    of metal‑polymer hybrid parts and possibly open a small custom‑fabrication shop that emphasizes sustainable production methods while maintaining a balanced, low‑stress work environment.
