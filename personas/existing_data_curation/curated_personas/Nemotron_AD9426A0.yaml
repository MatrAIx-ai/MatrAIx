  hobbies: '[''soccer (playing and watching)'', ''cooking Mexican dishes'', ''DIY home projects'', ''listening to regional Mexican music'', ''attending community festivals'', ''hiking local trails'', ''reading
    short biographies'', ''playing mobile games'']'
  career_goals: Jose aims to build on his practical experience by earning a high‑school equivalency (GED) and obtaining additional certifications such as OSHA forklift safety and logistics coordination.
    In the next five years he hopes to move into a lead or shift‑supervisor role where he can mentor newer workers, improve workflow efficiency, and contribute to safety initiatives. Long‑term, he envisions
    starting his own small‑scale moving and storage business that can serve the growing Latino community in Atlanta while providing a stable income to support his parents back in Mexico.
