  career_goals: Luciano aims to transition from a frontline representative to a leadership role within customer experience, such as a Team Lead or Customer Success Manager, over the next three to five years.
    He plans to earn certifications in Customer Experience Management and deepen his proficiency with data‑driven support tools. Guided by his love for unconventional thinking, he aspires to shape service
    strategies that integrate artistic storytelling and visual aids, thereby enhancing brand perception. Long‑term, he envisions launching a side venture that blends his art appreciation with user experience
    design, allowing him to contribute creatively while maintaining a flexible schedule for his family.
