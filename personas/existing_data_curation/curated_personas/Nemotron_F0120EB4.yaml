personas:
  professional: Marie Dorsey, a seasoned boutique hotel manager with three decades of expertise in staff leadership, budget oversight, and hurricane‑season crisis response, leverages her love of structured
    processes and flexible problem‑solving to mentor emerging female managers while navigating the competitive world of local tourism consulting.
  sports: Marie Dorsey plays competitive senior‑league tennis with the St. Augustine Senior Tennis Club, enjoys early‑morning beach volleyball on Amelia Island during summer, and avidly supports the Florida
    Gators football team and the local St. Augustine Pelicans baseball club, approaching fitness with a disciplined yet flexible routine that blends scheduled matches and spontaneous promenade walks.
  arts: Marie Dorsey regularly attends performances by the Royal Palm Orchestra, delights in the murals of local painter José Martinez, and dances to the lively tunes of Cuban‑American singer Gloria Estefan
    at St. Augustine’s Spanish Heritage Festival, finding the arts a vital outlet for her sociable energy and love of historic culture.
  travel: Marie Dorsey favors short, well‑planned road trips to Florida barrier islands like St. George and Amelia, where she balances leisurely beach walks with guided historic tours, yet she also dreams
    of a small‑group pilgrimage to Seville, Spain, reflecting her passion for Spanish heritage and her flexible budgeting that allows occasional splurges despite a modest retirement income.
  culinary: Marie Dorsey, a competent home chef, often prepares grilled grouper with mango salsa, Key lime shrimp ceviche, and blackened fish tacos, favoring fresh citrus, cilantro, and locally sourced
    shrimp, and while she enjoys occasional fine‑dining at St. Augustine’s waterfront restaurants, she prefers to host intimate seafood feasts for friends, often experimenting with a pinch of smoked paprika
    despite sometimes over‑salting due to her relaxed approach to precise measurements.
  core: Marie Dorsey is a competitive yet slightly disorganized senior hospitality veteran who balances meticulous budgeting with impulsive garden splurges, worries about hurricane threats, and lives for
    social bridge games, historic tours, and spontaneous island getaways.
background:
  cultural: Marie Jo grew up in a working‑class family in northern Florida, shaped by Southern hospitality and a modest Protestant upbringing. She has witnessed the evolution of St. Augustine’s tourism
    industry and embraces the historic Spanish influence of the city. Her cultural identity blends traditional Southern values—such as community service, modesty, and a respect for tradition—with an appreciation
    for the multicultural flavors introduced by the region’s Latino and Caribbean communities. She actively participates in local celebrations like the St. Augustine Colonial Festival and values the sense
    of continuity these events bring.
