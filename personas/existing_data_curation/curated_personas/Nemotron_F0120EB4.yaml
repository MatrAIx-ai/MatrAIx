  career_goals: At 62, Marie Jo aims to transition into a part‑time consulting role for local small businesses and tourism operators, sharing the practical insights she has honed over her career. She wants
    to mentor emerging female managers, help improve operational efficiency, and contribute to the St. Augustine tourism board. Her longer‑term ambition includes launching a boutique bed‑and‑breakfast that
    blends historic charm with modern comforts, securing a stable retirement while leaving a lasting legacy of community‐focused hospitality.
