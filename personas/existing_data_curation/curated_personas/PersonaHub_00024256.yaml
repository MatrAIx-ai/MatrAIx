persona_description: A scientist who studies the effects of DEET and other insect repellents on human health, particularly in relation to the behavior-modifying and neurotoxic effects. They are interested
  in the potential risks of combining DEET with other pesticides and the need for clear labeling on products containing DEET. They are also concerned about the potential impact of industrial food chain
  players on the environment, particularly in relation to greenhouse gas emissions and the need for offset credits.
