personas:
  professional: Glenn Johnson, a two‑year‑old who obsessively organizes wooden blocks into perfectly aligned towers, displays early engineering aptitude, methodical planning, reliable execution, and sociable
    collaborative play that hint at a future career in civil engineering where they will blend structured problem‑solving with assertive teamwork.
  sports: Glenn Johnson, an energetic two‑year‑old, loves toddler gymnastics and weekly stroller‑walks, proudly waves a tiny foam flag for the local professional baseball team, the Chicago Cubs, and participates
    in a neighborhood preschool soccer club where they chase the ball and practice sharing with peers.
  arts: Glenn Johnson, a two‑year‑old with a love for rhythm, often sings along to Raffi's "Baby Beluga," mimics Sesame Street characters, and clutches picture books illustrated by Eric Carle, weaving these
    artistic experiences into their daily playtime.
  travel: Glenn Johnson, a curious two‑year‑old, enjoys short family road trips to the nearby zoo and the Atlantic coastline beach, while their parents plan future vacations to Disney World and the Grand
    Canyon, balancing the toddler’s need for routine with occasional sensory‑rich adventures.
  culinary: Glenn Johnson, a two‑year‑old with a sweet palate, eagerly devours macaroni and cheese, banana slices, and cheese pizza, proudly helps stir pancake batter with a plastic spoon, and insists that
    crunchy carrot sticks be the only acceptable vegetable on their plate.
  core: Glenn Johnson, a methodical yet exuberant toddler who arranges toys by color, insists on bedtime routines, and chases squirrels with relentless energy, embodies a blend of structured curiosity and
    spontaneous joy.
background:
  cultural: 'Glenn is being raised in a white, Southern-midwestern family in Texarkana, Arkansas, a small-town community near the Texas border. His upbringing is shaped by typical regional customs: Sunday
    church attendance, country-music gatherings, family barbecues, and participation in local events such as the Miller County fair. The community’s emphasis on neighborly cooperation and respect for tradition
    reinforces his organized and reliable demeanor, while the lively social atmosphere nurtures his outgoing and sociable personality.'
