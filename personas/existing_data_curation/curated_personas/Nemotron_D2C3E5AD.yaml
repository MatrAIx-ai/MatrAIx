  career_goals: Although still a toddler, Glenn’s imagination already points toward future roles that match his love of structure and helping others. He frequently pretends to be a firefighter or a construction
    worker, showing an early fascination with public service and building. He expresses a desire to learn to read and write so he can organize stories and help his family, hinting at ambitions to become
    a teacher, community organizer, or engineer who keeps things orderly and safe. These goals reflect his practical, reliable nature and his sociable, cooperative spirit.
