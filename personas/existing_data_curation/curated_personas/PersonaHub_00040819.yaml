persona_description: A space scientist at The University of Texas at Dallas (UTD), with expertise in the study of planetary atmospheres and the potential for life on Mars. He is a member of a team selected
  by NASA to undertake the first of the space agency's "scout" missions to the planet Mars, scheduled for launch in 2007 and arrival one year later. Hoffman will receive funding of approximately $4 million
  to build the project's mass spectrometer instrument system, which will be connected to a series of ovens designed to "cook" materials dug from the trench to determine their water content. His research
  interests include sub-surface soil studies, analyzing the atmosphere of Mars, and the potential for life on Mars.
