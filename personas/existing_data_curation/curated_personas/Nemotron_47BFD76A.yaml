  career_goals: Cid aims to transition from day-to-day audit work into a senior advisory role, becoming a trusted financial consultant for non-profit organizations and small family-owned businesses in the
    Shelby County area. Within the next five years, he hopes to earn CPA licensure, lead a community-focused financial literacy program, and eventually establish his own boutique consulting firm that blends
    rigorous accounting standards with a mission to support underserved communities. He also aspires to mentor the next generation of accountants through local college internships and professional societies.
