personas:
  professional: Cid Boscio, a 56‑year‑old seasoned accountant and auditor with three decades of experience in GAAP reporting, forensic investigations, and ERP implementation, leverages their methodical,
    organized nature and compassionate communication style to mentor junior staff and guide clients toward ethical financial decision‑making while eyeing a transition to senior advisory work for non‑profits.
  sports: Cid Boscio stays active by playing forward in the Alabaster community soccer league each spring, and they cheer on the Alabama Crimson Tide during football season while following the Birmingham
    Barons baseball team, also occasionally joining a local fishing club for early‑morning outings on Lake Purdy.
  arts: Cid Boscio’s artistic side shines through a love of blues legends like B.B. King, country icons such as Johnny Cash, regular visits to the Alabama Shakespeare Festival, and an avid appetite for
    Civil War biographies by Shelby Foote, and they find these influences deepen their appreciation for storytelling and heritage.
  travel: Cid Boscio prefers road‑trip adventures that blend Southern hospitality with history, having driven to New Orleans for jazz festivals and to Savannah for its historic squares, and they are planning
    a future Caribbean cruise to unwind from the demands of their consulting ambitions.
  culinary: Cid Boscio enjoys mastering classic Southern dishes—smoked brisket, shrimp and grits, and pecan pie—using garden‑fresh tomatoes and collard greens, and they proudly host weekend barbecues where
    friends sample their dry‑rub rib seasoning and homemade bourbon‑infused sauce.
  core: Cid Boscio blends meticulous accounting precision with a lively social spirit, but they often experience intense anxiety that drives late‑night meditation sessions and occasional over‑cooking of
    barbecue ribs.
background:
  cultural: Cid was raised in a close‑knit, middle‑class family in the Birmingham‑greater area and has spent most of his adult life in Alabaster, Shelby County. As a white southerner, he grew up with strong
    values of hospitality, community service, and respect for tradition, often attending local Baptist church gatherings and high‑school football events. His upbringing emphasized self‑reliance, modesty,
    and a deep appreciation for Southern cuisine, music, and outdoor recreation. These cultural roots shape his commitment to giving back to his community, fostering harmonious relationships, and preserving
    the regional customs that he shares with his family and friends.
