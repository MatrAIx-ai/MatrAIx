personas:
  professional: Nichole Carrube, a two‑year‑old explorer of the world through play, already shows professional‑like focus by meticulously sorting shape‑sorting blocks, balancing curiosity with a disciplined
    routine that mirrors a budding project manager.
  sports: Nichole Carrube, a two‑year‑old, participates in toddler gymnastics at the community recreation center, loves watching the Chicago Cubs on TV, and proudly dons a tiny Seattle Seahawks jersey while
    cheering on her favorite players during family game nights.
  arts: Nichole Carrube, a two‑year‑old, delights in singing the catchy tunes of Raffi, dancing to the soundtrack of Disney’s "Frozen" (especially "Let It Go"), and drawing colorful pictures of Bluey and
    her family, weaving these artistic moments into her daily playtime.
  travel: Nichole Carrube, a two‑year‑old, enjoys short family outings to the local zoo and playgrounds, recently delighted in a week‑long Disney World vacation in Orlando, and dreams of someday strolling
    along the sandy beaches of Costa Rica with her parents.
  culinary: Nichole Carrube, a two‑year‑old, favors bite‑size chicken nuggets, mac and cheese, banana slices, and carrot sticks, shows early culinary curiosity by helping stir apple sauce, and loves the
    buttery flavor of croissants from the neighborhood bakery.
  core: Nichole Carrube, a two‑year‑old, blends boundless curiosity with an almost adult‑like organizational streak, turning every play session into a meticulously planned adventure while occasionally losing
    socks under the couch.
background:
  cultural: Nichole is an American child of white ethnic background raised in Grove City, Ohio, a suburban community in Franklin County. Her family celebrates typical Midwestern traditions, including seasonal
    holidays like Thanksgiving, Christmas, and Fourth of July barbecues. The local community values neighborly interaction, church involvement, and participation in school and library programs, which nurture
    her sociable and cooperative nature. The regional culture emphasizes punctuality, organization, and a practical approach to daily life, reinforcing her emerging disciplined traits.
attributes:
  skills: '[''Walking'', ''Running'', ''Climbing small furniture'', ''Stacking blocks'', ''Identifying colors and shapes'', ''Basic vocabulary (~200 words)'', ''Following simple routines'', ''Cooperative
