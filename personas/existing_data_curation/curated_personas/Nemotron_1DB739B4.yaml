  hobbies: '[''Building block towers'', ''Listening to stories'', ''Dancing to music'', ''Playing peek‑a‑boom'', ''Coloring with crayons'', ''Collecting leaves and stones'', ''Group play at the park'']'
  career_goals: Although only two years old, Nichole exhibits an early fascination with caring for others and a love of learning. She often pretends to 'teach' her stuffed animals and shows excitement when
    she sees doctors or teachers at work. She dreams of growing up to become someone who helps people—perhaps a teacher, a pediatric nurse, or a veterinarian—so she can combine her compassion with her natural
    curiosity about how things work.
