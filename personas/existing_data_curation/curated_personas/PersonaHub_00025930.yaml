persona_description: A researcher and expert in the field of social policy, particularly focused on the prevention and reduction of youth violence in Latin America. They have experience working with civil
  society organizations and have conducted studies on the causes and effects of youth violence. They are interested in implementing programs aimed at reducing the negative impact of violence on youth and
  have a deep understanding of the social, economic, and familial factors that contribute to the alienation of Colombian youth. They have experience working with different public organizations and have
  a clear understanding of the political policies aimed at curbing youth violence in Bogotá, Colombia. They are also familiar with the diverse forms of violence, including narcotrafficking and paramilitary
  activities, and have conducted research on the impact of this violence on youth in Colombia.
