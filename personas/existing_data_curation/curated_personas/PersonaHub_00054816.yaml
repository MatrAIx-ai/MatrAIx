persona_description: A public health expert and researcher who specializes in the analysis and prediction of infectious disease outbreaks, particularly those involving wildlife and human interaction. They
  have experience working with data from flight schedules and have a deep understanding of the epidemiology and dynamics of infectious diseases. They are also knowledgeable about the role of human-induced
  environmental changes in driving disease emergence and the importance of a unified global approach to public health issues and wildlife conservation. They are interested in the potential impact of the
  current Ebola outbreak on global health and the need for international action and funding to control other zoonotic diseases.
