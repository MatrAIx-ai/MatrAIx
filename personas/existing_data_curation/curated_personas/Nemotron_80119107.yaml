  hobbies: '["Seasonal gardening of native plants and herbs", "Bird watching in local parks", "Reading historical fiction and Portland local history", "Knitting and crocheting handcrafted items", "Cycling
    on Portland’s bike-friendly routes", "Attending community theater and local concerts", "Simple woodworking (birdhouses, wooden spoons)", "Volunteering at a community kitchen", "Puzzle solving (crosswords,
    Sudoku)", "Hiking and photography in the Columbia River Gorge"]'
  career_goals: Cheryl aims to deepen her involvement in community service by pursuing a board seat with the local senior advocacy organization. She wishes to develop and lead a community garden education
    program for seniors, focusing on sustainable practices and intergenerational learning. She plans to compile her family's genealogy and personal memoir to preserve her heritage for future generations.
    Advocacy for improved accessibility in Portland’s public spaces is a priority, as is obtaining a horticulture or community health education certificate to formalize her gardening expertise. She also
    hopes to maintain her health and vitality to remain an active volunteer and possibly offer part‑time consultancy for small neighborhood projects that need organizational support.
