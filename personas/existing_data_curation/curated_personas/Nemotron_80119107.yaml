personas:
  professional: Cheryl Askey, a seasoned community volunteer and budding senior‑advocacy board member in Portland, blends their practical budgeting acumen, organic gardening expertise, and collaborative
    yet assertive style to design and lead intergenerational garden education programs while meticulously coordinating events for the local senior center.
  sports: Cheryl Askey cycles the scenic routes of Portland with the Portland Road Club, hikes the Columbia River Gorge trails in summer, follows the Portland Trail Blazers and Portland Timbers avidly,
    and joins occasional community fun runs, balancing low‑impact fitness with a love for nature.
  arts: Cheryl Askey enjoys community theater productions at Portland Center Stage, delights in folk recordings by Sufjan Stevens, reads Larry McMurtry’s western historical novels, and relaxes while listening
    to live performances by local jazz saxophonist Jeff Coffin, weaving artistic appreciation into their everyday life.
  travel: Cheryl Askey prefers day trips to Columbia River Gorge and Multnomah Falls for hiking and photography, has long‑desired visits to Oregon’s Willamette Valley vineyards and Santa Fe’s historic plaza,
    and plans trips with modest budgeting, balancing a love of nature with curiosity for cultural heritage.
  culinary: Cheryl Askey crafts hearty vegetable stews with kale, heirloom tomatoes, and locally sourced potatoes, adapts classic chicken pot pie into a low‑sodium version, ferments kimchi and canns rosemary
    and thyme, and bakes oatmeal raisin cookies with cinnamon, favoring home‑cooked meals over restaurants while experimenting with seasonal ingredients.
  core: Cheryl Askey is a pragmatic, community‑driven senior who balances meticulous budgeting, a green thumb, and a habit of over‑committing to volunteer projects, occasionally forgetting to water their
    own garden while still humming folk tunes.
background:
  cultural: Cheryl grew up as a white American in the post‑World War II era, experiencing the traditional family and community values of the 1950s‑60s Pacific Northwest. Relocating to Portland, she absorbed
    the city’s progressive ethos, developing a strong appreciation for environmental stewardship, local food movements, and social responsibility. Her upbringing combined a practical, self‑reliant mindset
    with a curiosity cultivated during the cultural shifts of the 1960s and 1970s, which encouraged her to embrace new ideas while maintaining a grounded approach to daily life. This blend of modest, practical
    roots and the inclusive, sustainability‑focused culture of modern Portland shapes her worldview and informs her community involvement.
