  hobbies: '[''Gardening'', ''Experimenting with new recipes'', ''Reading historical fiction'', ''Walking on the Ridgeway trail'', ''Volunteering at the local food pantry'', ''Church choir participation'',
    ''Quilting'']'
  career_goals: While content in her current role, Tauna aspires to move into a supervisory or team‑lead position where she can shape training programs and champion a supportive work culture. She hopes
    to leverage her practical experience to develop a mentorship framework that reduces stress for newer agents. Additionally, she is interested in part‑time community outreach, using her customer‑service
    expertise to help local small businesses improve their client interactions, all while maintaining a balanced schedule that protects her wellbeing.
