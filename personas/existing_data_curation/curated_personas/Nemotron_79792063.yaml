personas:
  professional: Carlos Herrera, a 30‑year‑old visual artist and graphic designer, channels an insatiable curiosity for speculative fiction and philosophy into large‑scale murals, mixed‑media installations,
    and digital illustrations, while navigating a relaxed, sometimes disorganized workflow that favors spontaneous collaboration with musicians and technologists.
  sports: Carlos Herrera, an avid hiker of the Bayou Preserve, joins a local Houston hiking club called Bayou Explorers, supports the Houston Astros in baseball, and occasionally plays pickup basketball
    at the community center, favoring a relaxed, low‑pressure approach to fitness.
  arts: Carlos Herrera, a collector of vintage vinyl and admirer of experimental jazz icons like Sun Ra and electronic pioneers Aphex Twin, curates pop‑up exhibitions featuring works inspired by the surreal
    narratives of Jorge Luis Borges and the abstract color fields of Hilma af Klint, while also attending underground film screenings of David Lynch’s early shorts, weaving these influences into his own
    mixed‑media practice.
  travel: Carlos Herrera, who plans trips more by curiosity than itinerary, has road‑tripped to the art‑filled streets of Oaxaca, explored the street murals of Berlin’s Kreuzberg district, and enjoys weekend
    escapes to Austin’s music scene, while dreaming of a future residency in Kyoto to study traditional woodblock printing.
  culinary: Carlos Herrera, a home‑cook who masters mole negro and tamales with masa, regularly experiments by fusing Mexican chilies with Japanese miso for a mole‑ramen hybrid, uses ingredients like ancho
    chilies, Mexican chocolate, and fresh cilantro, and delights in sharing these dishes at community festivals.
  core: Carlos Herrera, a 30‑year‑old visual storyteller, blends boundless imagination with a carefree, sometimes scatter‑shot approach to life, turning coffee‑stained sketchbooks into vibrant murals while
    juggling vintage vinyl hunts and spontaneous road trips.
background:
  cultural: Carlos grew up in a bilingual household in Houston, the son of Mexican immigrants from Veracruz. His family celebrated traditional holidays such as Día de los Muertos and Las Posadas, and the
    rich visual language of those traditions—bright colors, symbolic motifs, and narrative storytelling—deeply influenced his aesthetic sensibility. He speaks fluid Spanish and English, enabling him to
    navigate both Mexican-American community spaces and the broader art scene in Texas. Exposure to Mexican muralists like Diego Rivera and contemporary Latinx artists in the Houston arts district shaped
    his belief in public art as a vehicle for cultural dialogue. While fully integrated into Houston's multicultural fabric, Carlos maintains strong ties to his heritage through food, language, and participation
    in local cultural events.
