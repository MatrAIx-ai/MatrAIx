  career_goals: Carlos aims to establish a permanent studio/gallery in Houston where he can exhibit his experimental works and host community workshops. He seeks artist‑in‑residence opportunities that allow
    him to explore interdisciplinary collaborations, particularly with musicians and technologists. A major ambition is to create a large public mural in downtown Houston that reflects his bicultural identity,
    integrating Mexican folk motifs with contemporary abstract forms. He also plans to secure representation by a reputable contemporary art gallery, expand his online print shop, and mentor emerging Latinx
    artists through volunteer teaching positions at local community centers.
