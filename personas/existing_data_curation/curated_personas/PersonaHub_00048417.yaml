persona_description: A historian who specializes in the study of the history of the Florida region, particularly the prehistoric, colonial, and early modern periods. He is particularly interested in the
  cultural, social, and economic developments of the Glades Native American Tribes, the arrival and settlement of the first settlers, the establishment of the Armed Occupation Act, the squatters and settlers,
  the development of the state of Florida, and the establishment of the Florida East Coast Railway. He is also interested in the cultural and economic impacts of the Boynton Inlet and the surrounding areas.
