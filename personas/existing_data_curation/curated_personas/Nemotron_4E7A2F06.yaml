  hobbies: '["Sketching and drawing","Digital photography","Visiting art museums and local murals","Salsa dancing and Mexican folk music","Cooking Mexican cuisine","Yoga and mindfulness practice","Volunteering
    at youth sports league","Attending community festivals","Exploring nature trails in Bladen County"]'
  career_goals: Rosalina aims to leverage her hands‑on experience and methodical approach to move into a supervisory role within the cleaning/maintenance field within the next two years. She plans to enroll
    part‑time at Bladen Community College to earn an associate degree in automotive technology or business administration, which will qualify her to become a fleet manager or start her own eco‑friendly
    detailing service. Long‑term, she hopes to combine her love of art and organization by working as a registrar or custodian for a museum or gallery, where she can protect artworks while staying close
    to the creative community. She also wants to develop coping strategies for anxiety, such as mindfulness training, to maintain her well‑being while pursuing these ambitions.
