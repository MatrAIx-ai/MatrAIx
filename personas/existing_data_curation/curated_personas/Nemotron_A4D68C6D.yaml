  career_goals: Allison’s career vision is anchored in fields that reward precision, clear pathways, and tangible results. In the next year she plans to complete her GED and enroll in the local community
    college’s HVAC‑technology associate program, where she can apply her hands‑on mechanical aptitude. She also intends to earn a Certified Nursing Assistant (CNA) credential as a backup route that blends
    her desire to help others with a structured work environment. Over the longer term, Allison aspires to become a licensed HVAC technician or a dental hygienist, professions that combine technical skill,
    systematic procedures, and reliable income. She is also interested in joining the Ohio State Police cadet program, seeing it as an opportunity to serve her community while working within a highly organized
    hierarchy.
