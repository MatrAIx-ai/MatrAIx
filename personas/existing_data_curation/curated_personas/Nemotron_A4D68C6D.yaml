personas:
  professional: Allison Hutson is a high‑school senior who volunteers as a peer tutor in math and science, applies meticulous spreadsheet planning to keep school assignments on track, and leverages their
    hands‑on troubleshooting skills to assist classmates and family with tech and home repairs, reflecting their preference for structure and practical problem‑solving.
  sports: Allison Hutson runs the 400‑meter dash for the school track team three times a week, belongs to the local youth running club, follows the Cleveland Browns and Ohio State Buckeyes with a competitive
    eye, and incorporates cross‑training with a weekend cycling group to maintain structured fitness.
  arts: Allison Hutson channels their disciplined side into the school band’s clarinet section, practices Mozart’s Clarinet Concerto and enjoys the cinematic scores of John Williams while also devouring
    Agatha Christie mystery novels and sketching detailed diagrams of model kits during breaks.
  travel: Allison Hutson prefers meticulously planned road trips to nearby state parks like Hocking Hills, dreams of a solo backpacking adventure through the Swiss Alps after college, and balances a modest
    travel budget by using student discounts and a travel‑rewards credit card managed by a parent.
  culinary: Allison Hutson enjoys the exactness of baking, regularly makes lemon poppy‑seed muffins and meticulously follows a family recipe for chicken pot pie, favors the crisp texture of fresh apples
    and the tang of balsamic vinegar, and treats themselves to a local pizzeria’s deep‑dish slice on weekends as a reward for completing a model kit.
  core: Allison Hutson blends a teen’s competitive drive with a near‑obsessive love of order, turning every puzzle, model kit, and spreadsheet into a personal challenge, even if it means occasionally skipping
    a social event to perfect a detail.
background:
  cultural: Allison grew up in Middletown, a modest city in Butler County that blends suburban neighborhoods with remnants of its manufacturing past. Her family’s roots are typical of the region’s white,
    Midwestern heritage—steady, community‑oriented, and tied to local traditions such as county fairs, high‑school football games, and church gatherings. Although her household attends a non‑denominational
    Christian congregation, her upbringing emphasizes personal responsibility, respect for routine, and self‑reliance—values that echo the broader cultural fabric of southwestern Ohio. The close‑knit nature
    of her neighborhood, with neighbors often knowing each other’s names, has reinforced a sense of belonging while also fostering her cautious approach to new social settings.
