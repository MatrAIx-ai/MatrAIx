  hobbies: '[''Gardening'', ''Book club'', ''Hiking in the Delaware Water Gap'', ''Cooking family meals'', ''Volunteer tutoring'', ''Quilting'', ''Yoga'', ''Local theater attendance'', ''Family travel'',
    ''Organizing community events'']'
  career_goals: Casey aspires to advance into school leadership while maintaining her dedication to student achievement. She plans to earn a master's degree in educational leadership within the next three
    years, pursue a department head role, and eventually become an assistant principal. Her goals include implementing school‑wide data‑driven instructional improvement, establishing a mentorship program
    for at‑risk students, expanding community‑partner collaborations, and championing high‑quality professional development for teachers. She also aims to contribute to district curriculum committees and
    promote a culture of academic excellence and supportive learning environment.
