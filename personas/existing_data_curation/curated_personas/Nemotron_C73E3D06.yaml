personas:
  professional: Casey Stinson, a seasoned secondary school teacher, designs data‑driven curricula with meticulous lesson plans, leads extracurricular clubs with disciplined coordination, mentors novice
    teachers while championing routine‑based instructional improvement, and leverages they outgoing nature to foster collaborative school culture as they pursue a department head role.
  sports: Casey Stinson regularly hikes the Delaware Water Gap with a local outdoor club, participates in community yoga sessions at the neighborhood studio, roots for the Philadelphia Eagles, Phillies,
    and 76ers, occasionally joins a weekend recreational softball league, and follows the Philadelphia Union as their favorite soccer team.
  arts: Casey Stinson enriches they social life by attending productions at the historic Bucks County Playhouse, reading contemporary novels by authors such as Chimamanda Ngozi Adichie in the book club,
    enjoys the folk music of The Milk Carton Kids during quilting circles, and admires the paintings of Andrew Wyeth, which inspire they own quilting designs.
  travel: Casey Stinson prefers well‑planned family getaways, spending summer weekends at the Pocono Mountains cabin they rent, taking autumn road trips to Washington, D.C. to explore historic museums,
    budgeting for a future cultural tour of Italy’s Tuscany region, while balancing school calendar constraints and a modest travel fund.
  culinary: Casey Stinson delights in cooking balanced family meals such as roasted chicken with rosemary potatoes, quinoa‑stirred kale salads, and seasonal vegetable lasagna using produce from their garden,
    showcases a competent but not gourmet cooking skill level, and enjoys hosting potluck dinners featuring dishes like Appalachian blackberry cobbler and homemade hummus.
  core: Casey Stinson blends organized routine with community‑centered enthusiasm, leading a disciplined teaching career while nurturing friendships through gardening, quilting, and potluck gatherings,
    albeit occasionally over‑committing to social events.
background:
  cultural: Casey identifies as a White American of primarily Irish and English ancestry, raised in the suburban communities of northern New Jersey. Her upbringing emphasized practical values, self‑reliance,
    and a strong sense of community responsibility. She is an active member of her local Methodist congregation, regularly participates in neighborhood volunteer initiatives, and celebrates regional traditions
    such as fall harvest festivals and holiday gatherings. This cultural background reinforces her preference for routine, her commitment to education, and her collaborative, service‑oriented outlook.
attributes:
  skills: '[''Lesson planning'', ''Classroom management'', ''Curriculum development'', ''Standardized test preparation'', ''Differentiated instruction'', ''Student mentorship'', ''Parent-teacher communication'',
