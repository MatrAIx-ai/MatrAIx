personas:
  professional: Betsy Bratton, a retired senior‑center coordinator turned volunteer docent, channels their meticulous planning and deep art‑history knowledge into crafting engaging, off‑beat tours at the
    local museum while also orchestrating intergenerational garden projects for the Palos Heights community.
  sports: Betsy Bratton’s athletic routine revolves around daily walks on the Palos Heights Nature Trail, birdwatching excursions that double as low‑impact cardio, cheering on the Chicago Cubs at Wrigley
    Field whenever possible, and participating in the local senior walking club’s weekly meet‑ups.
  arts: Betsy Bratton spends quiet mornings painting watercolors of Midwestern wheat fields inspired by Monet’s light, frequently attends exhibitions at the Art Institute of Chicago featuring contemporary
    artists like Kehinde Wiley, and leads informal gallery tours that highlight lesser‑known works by Georgia O’Keeffe and Edward Hopper.
  travel: Betsy Bratton favors leisurely road trips to small‑town festivals, such as the Tulip Time Parade in Holland, Michigan, enjoys revisiting the historic river towns along the Mississippi, and dreams
    of strolling the botanical gardens of Kyoto during cherry‑ blossom season.
  culinary: Betsy Bratton’s palate embraces hearty Midwestern fare like chicken pot pie and sweet corn casserole, while also experimenting with new flavors such as miso‑glazed carrots and homemade rosemary
    focaccia, and they proudly claim a secret family recipe for spiced apple crumble that appears at every holiday gathering.
  core: Betsy Bratton blends meticulous organization with a boundless curiosity, navigating retirement by curating art tours, tending a thriving garden, and meticulously cataloguing family histories—though
    they sometimes lose track of their own keys amid endless knitting projects.
background:
  cultural: Betsy grew up in the post‑war Chicago suburbs, part of a predominantly white, middle‑class community that valued hard work, self‑reliance, and civic participation. Her family attended a Protestant
    church, fostering a sense of service and communal responsibility. The Midwestern cultural emphasis on modesty, practicality, and appreciation for the arts—especially regional museums and community theater—shaped
    her worldview. Over the decades, she has maintained strong ties to local traditions, from seasonal community festivals to neighborhood block parties, while remaining open to new cultural experiences
    and diverse ideas.
