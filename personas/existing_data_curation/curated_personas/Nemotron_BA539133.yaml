  hobbies: '[''watercolor painting'', ''gallery visits'', ''historical fiction reading'', ''gardening'', ''birdwatching'', ''knitting'', ''quilting'', ''cooking'', ''genealogy research'', ''community volunteering'']'
  career_goals: Although retired, Betsy aims to deepen her involvement in the arts and community service. She aspires to become a volunteer docent at a nearby museum, leading small group tours that highlight
    unconventional perspectives on artworks. She also hopes to initiate a neighborhood garden program that brings together residents of all ages, promoting sustainable living and intergenerational learning.
    Further, she plans to create a local history archive in partnership with the public library, documenting the stories of Palos Heights seniors. Continuing education classes at the community college in
    art appreciation and horticulture are also on her agenda.
