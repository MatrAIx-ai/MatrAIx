personas:
  professional: Lilian Nguyen, a 43‑year‑old community‑focused studio founder, leverages their strengths in event coordination, social‑media strategy, and culinary instruction to run a flexible workshop
    space that offers cooking, calligraphy, and contemporary painting classes while balancing a relaxed approach to scheduling with a competitive drive to attract a vibrant local artist community.
  sports: Lilian Nguyen stays active by taking community salsa and line‑dancing classes, cheering for the Los Angeles Dodgers and Lakers on game nights, and occasionally joining a local recreational softball
    league, balancing their energetic social nature with a competitive edge that drives them to master new dance steps.
  arts: Lilian Nguyen frequently visits local art fairs and indie film screenings, often discussing the works of David Hockney, the narrative style of Greta Gerwig, and the mystery of Banksy's street art,
    while also teaching watercolor workshops and repurposing thrift finds into decorative art pieces, reflecting their critical eye and love for unconventional ideas.
  travel: Lilian Nguyen prefers flexible weekend getaways that blend hiking in Joshua Tree National Park, exploring the historic streets of Santa Barbara, and occasional city breaks to museums in Chicago,
    often planning trips spontaneously using budget‑friendly boutique hotels and group travel deals while balancing their family responsibilities.
  culinary: Lilian Nguyen experiments with fusion recipes, often crafting a lemongrass‑infused noodle broth with grilled pork belly and fresh herbs from their indoor garden, pairing it with inventive dishes
    like matcha tiramisu and cilantro‑lime avocado toast, and they relish sourcing fresh ingredients at farmer’s markets while showcasing their cooking demos at community festivals.
  core: Lilian Nguyen, a 43‑year‑old curious and sociable creative, blends a love for community art, spontaneous cooking experiments, and a relaxed‑yet‑competitive outlook that fuels both their vibrant
    social life and occasional bouts of anxiety.
background:
  cultural: Lilian is a first‑generation Vietnamese‑American, born to immigrant parents who settled in Garden Grove’s Little Saigon neighborhood in the early 1980s. Growing up, she was immersed in Vietnamese
    traditions—celebrating Tet with family reunions, learning to cook classic dishes from her mother, and speaking Vietnamese at home while navigating American school culture. The vibrant Vietnamese community
    in Orange County shaped her identity, exposing her to a blend of Eastern heritage and Western influences. Although she completed only a high‑school diploma, her cultural upbringing emphasized respect
    for elders, communal responsibility, and a strong appreciation for art and storytelling, which she carries into her adult life. Lilian’s bicultural perspective fuels her curiosity about cross‑cultural
    ideas and her desire to preserve Vietnamese customs while sharing them with a broader, multicultural audience.
attributes:
  skills: '[''Bilingual communication (Vietnamese & English)'', ''Vietnamese culinary arts'', ''Watercolor & acrylic painting instruction'', ''Community event coordination'', ''Social media content creation'',
