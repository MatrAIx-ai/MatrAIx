  hobbies: '[''Attending art fairs & indie film screenings'', ''Speculative fiction & philosophy book clubs'', ''Community dance classes (salsa, line dancing)'', ''Experimental cooking & fusion recipes'',
    ''Volunteering at Vietnamese Cultural Center (Tet celebrations)'', ''Teaching Vietnamese calligraphy to children'', ''Indoor herb gardening'', ''Mindfulness meditation'', ''DIY home‑decor and upcycling
    projects'']'
  career_goals: Lilian aspires to translate her artistic passion and cultural knowledge into a sustainable, flexible livelihood. Her primary ambition is to open a small community studio in Garden Grove
    where she can offer workshops in Vietnamese cooking, calligraphy, and contemporary painting, while also renting space for local artists to exhibit their work. She envisions the studio operating on a
    reservation‑based schedule that accommodates her need for flexibility and allows her to continue caring for family members. In parallel, she hopes to expand her freelance services as a social‑media
    strategist for Vietnamese‑owned small businesses, helping them reach broader audiences with culturally resonant branding. Lilian also dreams of completing a certificate program in culinary arts at a
    local community college, which would formalize her cooking expertise and open the door to part‑time teaching positions. Ultimately, she wants a career path that blends creativity, community service,
    and cultural preservation, while giving her room to explore new ideas and remain financially independent.
