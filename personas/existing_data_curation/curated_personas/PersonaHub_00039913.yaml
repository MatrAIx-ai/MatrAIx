persona_description: A software architect who is interested in understanding the principles and practices of software architecture, particularly the work of Martin Fowler and Claude E. Shannon. They are
  skilled in using diagrams such as diagrams with clouds and arrows to represent systems and their components, and are familiar with the concept of architecture as the sum of all cues that suggest to a
  developer how a feature should be implemented in a particular system. They are also knowledgeable in the use of information theory and its application to the consumption of written English, and are interested
  in the idea that architecture is the opposite of surprise.
