personas:
  professional: Sandro Delamo, a 31‑year‑old broadcast technician, blends live‑sound mixing expertise and experimental lighting design with a collaborative, emotionally attuned leadership style, positioning
    them to steer multidisciplinary teams toward immersive, culturally resonant productions.
  sports: Sandro Delamo, a 31‑year‑old outdoor enthusiast, hikes the rugged trails of Caprock Canyons in the spring, follows the Dallas Cowboys (NFL) and Texas Rangers (MLB) passionately, and joins a local
    pick‑up soccer league called the Lubbock Lightning on Saturdays, where they relish the camaraderie of the team.
  arts: Sandro Delamo, a 31‑year‑old creative technologist, drums in a Latin‑rock sextet, spins DJ sets that weave together Aphex Twin and J Dilla, they capture West Texas sunsets and border‑town festivals
    with a vintage Nikon, and draw visual inspiration from the immersive light installations of James Turrell and the narrative murals of a regional street artist.
  travel: Sandro Delamo, a 31‑year‑old traveler, prefers spontaneous road trips across West Texas to New Mexico’s White Sands, regularly visits Austin for the SXSW festival, and dreams of exploring the
    vibrant markets and culinary traditions of Oaxaca, Mexico.
  culinary: Sandro Delamo, a 31‑year‑old home chef, they skillfully prepare spice‑rich heritage dishes like mole, chiles rellenos, and slow‑braised carnitas alongside their spouse, savoring the aroma of
    toasted ancho chilies, fresh cilantro, and roasted tomatillos, while occasionally over‑seasoning in enthusiastic late‑night experiments.
  core: Sandro Delamo, a 31‑year‑old broadcast tech with a restless creative pulse, channels anxiety into meticulous gear maintenance but they often lose sleep to late‑night synth tinkering and a habit
    of over‑planning every set.
background:
  cultural: Sandro was raised in a Mexican household that values family closeness, community celebration, and respect for tradition. Bilingual in Spanish and English, he grew up listening to mariachi, norteña,
    and contemporary Latin pop, which shaped his musical tastes and his rhythmic sense as a technician. He participates in Día de los Muertos and other cultural festivals in Lubbock, often bringing homemade
    tamales to share with neighbors. His Mexican heritage blends with the Texan spirit of independence and ingenuity, influencing both his work ethic and his creative outlook, as he constantly seeks ways
    to honor his roots while embracing new artistic possibilities.
attributes:
  skills: '[''Live sound mixing'', ''Lighting design and programming'', ''Audio signal processing'', ''Network‑ed audio (Dante, AVB)'', ''Digital audio workstations (Pro Tools, Reaper)'', ''Stage rigging
    and cabling'', ''Equipment troubleshooting and maintenance'', ''Creative sound‑sculpting for installations'', ''Team communication and coordination'', ''Time management and scheduling'', ''Stress‑management
    techniques for high‑pressure environments'', ''Bilingual technical documentation (English/Spanish)'']'
  hobbies: '[''Playing drums in a Latin‑rock band'', ''DJing at community events'', ''Modular synthesizer experimentation'', ''Photography (landscape and cultural events)'', ''Cooking Mexican cuisine'',
    ''Hiking in West Texas'', ''Attending art festivals and galleries'', ''Volunteering for youth audiovisual workshops'']'
  career_goals: Sandro aims to progress from a hands‑on broadcast technician to a senior production engineer or technical director at a larger media market, such as Austin or Dallas, where he can lead multidisciplinary
    teams. He wants to integrate his love for experimental art into mainstream broadcasts, creating immersive audio‑visual experiences that push conventional boundaries. Long‑term, he envisions founding
    a boutique production studio that blends Mexican cultural motifs with cutting‑edge technology, while mentoring younger technicians and advocating for mental‑health awareness in the fast‑paced broadcast
    industry.
