personas:
  professional: Brandon Sharpe is a budding digital illustrator and hobbyist Python coder who channels their curiosity and meticulous organization into creating sci‑fi inspired animations and interactive
    art projects, often sharing them with a tight‑knit group of friends.
  sports: Brandon Sharpe stays active by hiking the sunny nature trails of Pinellas County, birdwatching at the Everglades, and participating in a weekend youth track club, while cheering on the Miami Dolphins
    and Orlando Magic as their favorite local sports teams.
  arts: Brandon Sharpe immerses in creative expression through sketching sci‑fi scenes inspired by artists like Moebius and Hayao Miyazaki, listening to the contemplative piano works of Ludovico Einaudi
    and the synth‑driven tracks of Daft Punk, and collecting graphic novels such as 'Saga' and 'Watchmen,' which together shape their artistic identity.
  travel: Brandon Sharpe prefers meticulously planned weekend getaways to Florida's hidden gems, like the crystal‑clear springs of Ichetucknee and the historic streets of St. Augustine, while dreaming of
    a future backpacking adventure to Japan's Akihabara district and a sunrise hike in Iceland's Þingvellir National Park.
  culinary: Brandon Sharpe enjoys experimenting in the kitchen, whipping up quick coconut‑lime quinoa bowls and crafting galactic cupcakes topped with edible glitter, while favoring snack staples like cheesy
    pizza rolls and mango smoothies infused with fresh ginger.
  core: Brandon Sharpe is a quietly ambitious teen who blends sci‑fi art, code, and keyboard music into a personal universe, yet often lets worry over school projects keep them up past bedtime, and they
    hoard a secret stash of glitter pens for midnight sketches.
background:
  cultural: Brandon was born and raised in DeLand, a suburban community in Volusia County, Florida. His family, of primarily Anglo‑American heritage, embraces a mix of Southern hospitality and Midwestern
    sensibilities, valuing education, community involvement, and creativity. The local culture offers a blend of coastal recreation, regional festivals such as the DeLand Renaissance Festival, and a diverse
    school environment that introduces him to a range of cultural perspectives. He celebrates traditional American holidays like Thanksgiving, Christmas, and the Fourth of July, while also participating
    in community art programs, school art clubs, and occasional beach outings, reflecting a balanced American cultural upbringing.
