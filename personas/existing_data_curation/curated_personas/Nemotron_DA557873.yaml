  career_goals: Brandon aspires to merge his love for art and technology by becoming a multimedia designer or video game developer, focusing on creating immersive visual narratives. He hopes to attend a
    specialized high‑school arts program, then study graphic design, interactive media, or computer science at a university. Ultimately, he envisions working in a collaborative studio where he can experiment
    with unconventional ideas while maintaining a structured workflow, and possibly launching independent interactive storytelling projects that inspire curiosity in others.
