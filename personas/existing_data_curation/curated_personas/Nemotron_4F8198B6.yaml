personas:
  professional: Bernette Wright is a veteran elementary and middle school teacher who blends meticulous lesson planning, differentiated instruction, and hands‑on STEAM integration with a passion for embedding
    heritage literature and visual arts, turning their organized, curious nature into dynamic, culturally responsive classrooms.
  sports: Bernette Wright hits the Potomac trails for sunrise walks, plays competitive doubles tennis at the Potomac Tennis Club, and passionately supports the Washington Capitals, Washington Wizards, and
    DC United, making sport a social outlet that fuels their energetic, outgoing spirit.
  arts: Bernette Wright spends weekends sketching in the Smithsonian’s African American Art Museum, draws inspiration from artists like Jacob Lawrence and musicians such as Nina Simone, and volunteers at
    community festivals where they coordinate children’s mural projects, channeling their curiosity and sociable energy into creative expression.
  travel: Bernette Wright enjoys meticulously planning weekend getaways, having explored the historic streets of Savannah, the vibrant markets of New Orleans, and the beaches of Jamaica, while dreaming
    of a cultural pilgrimage to Ghana’s Cape Coast Castle, always balancing adventure with family budgeting.
  culinary: Bernette Wright delights in cooking gumbo with okra, smoked turkey, and scotch bonnet pepper, perfects jerk chicken with a side of collard greens sautéed in smoked paprika, and experiments with
    plantain roti, showcasing a confident yet occasionally experimental kitchen style.
  core: Bernette Wright is a methodical, art‑loving educator who balances meticulous planning with spontaneous bursts of creativity, often juggling a love of cultural immersion against a tendency to overcommit
    to community projects.
background:
  cultural: Bernette is an African American who grew up in the Washington, D.C., metropolitan area, experiencing a blend of Southern heritage and urban cultural life. Her family traditions include celebrating
    Juneteenth, attending church choirs, and sharing stories of the civil‑rights movement, which have shaped her deep appreciation for African American history and artistic expression. These cultural roots
    inform her teaching philosophy; she regularly incorporates Black literature, music, and visual art into her lessons and mentors students to explore their own identities. Living in Potomac, she bridges
    her cultural perspective with the diverse, affluent community, fostering inclusive dialogue and cross‑cultural collaborations in the classroom and beyond.
attributes:
  skills: '[''Classroom management'', ''Differentiated instruction'', ''Arts integration'', ''Curriculum development'', ''Culturally responsive teaching'', ''Educational technology (Google Classroom, interactive
