  hobbies: '[''Painting and sketching'', ''Visiting museums and art galleries'', ''Reading African American literature and poetry'', ''Book club participation'', ''Cooking and exploring Southern/Caribbean
    cuisines'', ''Walking and hiking on Potomac trails'', ''Playing tennis'', ''Volunteering at community cultural festivals'', ''Organizing art workshops for youth'']'
  career_goals: Bernette aims to move into a district‑wide instructional coaching role where she can guide teachers in implementing STEAM and culturally responsive pedagogy. She is pursuing a master's in
    educational leadership to become an assistant principal and eventually a curriculum specialist. Bernette also hopes to author a series of lesson‑plan guides that blend African American literature and
    visual arts for elementary classrooms, and to establish a community partnership program that brings local artists into schools for workshops and exhibitions.
