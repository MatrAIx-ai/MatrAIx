persona_description: A startup company that specializes in developing solid-oxide fuel cells (SOFCs) and claims to have developed a new technology that could cost one-tenth the price of existing fuel cells,
  such as Bloom Energy Servers. The company's technology, known as the "Cube," is based on research done by scientist Eric Wachsman and uses aliovalent-doped ceria and isovalent-cation-stabilized bismuth
  oxides in the electrolyte, allowing for a much higher conductivity and higher energy density. The Cube is designed to be used as base power and back-up power, providing a building's complete power needs
  and also acting as a back-up power source in the event that grid power is lost.
