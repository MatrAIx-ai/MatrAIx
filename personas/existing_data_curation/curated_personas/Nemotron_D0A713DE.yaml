personas:
  professional: Sandra Kubik, a licensed civil and structural engineer in Southern California, leverages their expertise in BIM, Python data analysis, and sustainable infrastructure design to lead cross‑functional
    teams with a meticulous, process‑oriented style, balancing pragmatic risk assessments with a collaborative, people‑first approach.
  sports: Sandra Kubik plays competitive beach volleyball with the Long Beach Breakers club, routinely hikes the Santa Monica Mountains, and enthusiastically supports the Los Angeles Dodgers and Lakers,
    integrating both active participation and fandom into a balanced fitness routine.
  arts: Sandra Kubik immerses themselves in the local music scene, attending shows by indie rock acts like Foster the People and vibing to St. Vincent, while capturing coastal sunsets with a Nikon D750
    and channeling creative DIY home renovations inspired by interior designer Joanna Gaines.
  travel: Sandra Kubik prefers meticulously planned weekend getaways along the Pacific Coast Highway to Santa Barbara or Yosemite treks, while long‑haul trips to Kyoto and the Amalfi Coast are earmarked
    for sabbaticals, balancing adventure with a structured itinerary.
  culinary: Sandra Kubik delights in mastering grilled fish tacos with mango salsa, miso‑glazed salmon, and vegan quinoa bowls, favoring fresh avocado, citrus zest, and local farmers‑market produce, yet
    they still relish occasional weekend sushi splurges.
  core: Sandra Kubik blends a methodical, environmentally conscious engineering mindset with an outgoing, community‑focused lifestyle, juggling structured career ambitions, spontaneous beach volleyball
    sessions, and a penchant for creative DIY projects, all while maintaining a disciplined financial plan and a habit of over‑stocking reusable water bottles.
background:
  cultural: Sandra grew up in a middle‑class white family in the Long Beach area of Southern California. Her upbringing blends the relaxed, coastal lifestyle of the West Coast with the solid work ethic
    and community values of her parents' Midwestern roots. Immersed in the multicultural and progressive atmosphere of the Los Angeles region, she embraces both mainstream American cultural norms and the
    diverse, collaborative spirit of her local community.
