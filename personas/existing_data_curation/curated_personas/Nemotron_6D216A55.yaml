  career_goals: In retirement, Ernest aims to complete a memoir that weaves his personal history with the broader story of Kanawha County, and to author a locally focused volume of Appalachian folklore
    and art. He hopes to become a volunteer docent at the West Virginia State Museum, curating small exhibitions that highlight regional artists. Ernest also aspires to serve on the board of the Charleston
    Art Society, where he can mentor high school students in writing and visual arts, and to organize an annual community cultural festival that celebrates music, craft, and storytelling. Ultimately, he
    seeks to leave a lasting contribution to the preservation and appreciation of his community’s heritage.
