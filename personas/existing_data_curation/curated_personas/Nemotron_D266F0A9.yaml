personas:
  professional: Aiman Elmer, a 40‑year‑old landscape designer, blends extensive horticultural expertise with SketchUp, AutoCAD, and drone‑based site mapping to create water‑efficient native‑plant projects,
    while their methodical, organized nature ensures every client vision is turned into a meticulously scheduled, safety‑first plan.
  sports: Aiman Elmer enjoys low‑impact outdoor activities such as weekend hikes on the Sandhills trails, early‑morning fishing trips with their son on Lake Sumter, follows the South Carolina Gamecocks
    football and the Columbia Fireflies minor‑league baseball teams, and incorporates birdwatching at Lake Sumter State Fishing Lake into their routine as a calming sport‑like pursuit.
  arts: Aiman Elmer channels creative energy into woodworking birdhouses and garden benches while unwinding on an acoustic guitar, favoring folk‑rock sounds from Mumford & Sons and classic ballads by John
    Denver, and they regularly watch documentaries featuring landscape architect Thomas Church for design inspiration.
  travel: Aiman Elmer prefers carefully planned, nature‑centric trips, often taking the family to nearby Congaree National Park for canoeing and dreaming of an eco‑tour of Costa Rica’s cloud forests, yet
    balances these aspirations with a modest budget that limits spontaneous overseas vacations.
  culinary: Aiman Elmer loves cooking with garden harvests, frequently preparing heirloom tomato salads with fresh basil, grilled trout seasoned with lemon and dill, and Southern‑style collard greens sautéed
    with garlic and smoked turkey, showcasing a moderate cooking skill that leans toward wholesome, seasonal meals.
  core: Aiman Elmer, a meticulously organized 40‑year‑old landscape professional, balances a relentless pursuit of sustainable design with a habit of over‑planning and occasional garden‑obsessed procrastination,
    all while quietly worrying about every detail.
background:
  cultural: Aiman grew up in a close‑knit, middle‑class white family on the rural outskirts of Sumter, South Carolina. His parents were active members of a local Baptist church, imparting values of Southern
    hospitality, community service, and respect for the land. Family gatherings centered around traditional Southern meals—barbecue, collard greens, and sweet tea—while church socials and high‑school football
    games reinforced a strong sense of belonging. The region’s agricultural heritage and seasonal rhythms fostered his appreciation for plants and outdoor work. He also absorbed the local musical blend
    of country, blues, and gospel, influencing his taste in music. Though he cherishes these traditions, his curiosity drives him to integrate contemporary sustainable practices into his work, reflecting
    a balance between honoring his roots and embracing innovation.
attributes:
  skills: '[''Landscape design and site planning'', ''Plant identification and horticulture'', ''Water‑efficient irrigation system installation'', ''CAD software (SketchUp, AutoCAD) for design'', ''GPS
    and drone site‑mapping'', ''Equipment operation and maintenance'', ''Pesticide and herbicide application compliance'', ''Project budgeting and scheduling'', ''Client communication and consultation'',
    ''Safety regulation adherence'', ''Team leadership and mentorship'', ''Sustainable native‑plant landscaping'']'
  hobbies: '[''Home vegetable gardening'', ''Birdwatching'', ''Fishing with family'', ''Hiking local trails'', ''Native plant collection'', ''Woodworking (birdhouses, benches)'', ''Reading horticulture
    journals'', ''Watching sustainable design documentaries'', ''Playing acoustic guitar'', ''Volunteering for tree‑planting events'', ''Church garden maintenance'']'
  career_goals: Aiman’s immediate goal is to obtain a Certified Landscape Designer (CLD) credential and become the lead foreman for Sumter County’s municipal parks department, where he can apply his organized,
    methodical approach to larger public projects. Long‑term, he aims to launch his own environmentally focused landscaping business that offers low‑water, native‑plant designs for residential clients,
    providing stable income for his family while reducing stress through better delegation and planning. He also wishes to create a mentorship program for entry‑level groundskeepers, promoting safety, craftsmanship,
    and professional growth, and to be recognized locally for high‑quality, harmony‑driven landscape work.
