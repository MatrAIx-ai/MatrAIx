  hobbies: '[''Cooking traditional Ecuadorian dishes'', ''Playing soccer in a local league'', ''Reading health‑science articles and pharmacy journals'', ''Gardening on his balcony'', ''Listening to Andean
    music'', ''Practicing basic guitar chords'', ''Volunteering at community health fairs'']'
  career_goals: Francisco intends to enroll in a four‑year Doctor of Pharmacy (PharmD) program within the next year, building on his high‑school chemistry background and his hands‑on experience as a pharmacy
    technician. His long‑term ambition is to become a licensed pharmacist who leads a community pharmacy in Newark, offering bilingual services and medication‑therapy management for the growing Latino population.
    He hopes to specialize in chronic‑disease management and immunizations, eventually obtaining certifications as a Clinical Pharmacy Specialist and a Certified Immunizer. In five to ten years, he envisions
    taking on a managerial role, mentoring junior staff, and possibly opening his own pharmacy that integrates health‑education workshops for immigrants.
