personas:
  professional: Francisco Pizarro, an 18‑year‑old pharmacy technician, applies meticulous record‑keeping, bilingual fluency, and a love of routine to ensure accurate dispensing and a smooth workflow in
    a busy community pharmacy, and they are preparing for a future PharmD program.
  sports: Francisco Pizarro competes weekly with the East Newark FC soccer club, enjoys watching the New York Red Bulls and New York Yankees, and they maintain a disciplined training routine that balances
    team play with individual conditioning.
  arts: Francisco Pizarro, an aspiring guitarist, spends evenings strumming basic chords while listening to the panpipe melodies of Inti‑Illimani and the soulful ballads of Lila Downs, and they regularly
    attend the Newark Community Arts Center’s Latin folk dance workshops.
  travel: Francisco Pizarro prefers organized short trips, has visited Miami’s vibrant Cuban neighborhood and the coastal town of San Juan del Sur, dreams of trekking the Andes to see Machu Picchu and exploring
    the Galápagos Islands, and they plan future journeys around scholarship deadlines and family commitments.
  culinary: Francisco Pizarro enjoys cooking traditional dishes like ceviche with lime‑marinated fish, llapingachos topped with cheese, and seco de pollo simmered with cilantro and achiote, demonstrates
    a solid intermediate skill level, and they often host friends for communal meals that blend familiar flavors with occasional experimental twists.
  core: Francisco Pizarro is an organized, routine‑loving pharmacy tech who balances diligent study, community volunteering, and a penchant for cooking and soccer, yet they sometimes procrastinate on paperwork
    until the last minute.
background:
  cultural: Francisco was born to Ecuadorian parents who immigrated to the United States from Guayaquil. He grew up in a bilingual household, speaking Spanish at home and English at school, which instilled
    in him a strong sense of Ecuadorian identity alongside American cultural norms. Family gatherings often involve traditional foods, music, and celebrations of holidays such as Carnaval and Día de los
    Difuntos. His Catholic upbringing emphasizes community service and respect for elders. Living in Newark, he navigates a multicultural environment, blending his heritage’s emphasis on collectivism and
    hospitality with the practical, routine‑oriented mindset he values in his daily life. This dual cultural perspective fuels his desire to serve the Latino community through pharmacy work.
attributes:
  skills: '[''Medication dispensing'', ''Prescription verification'', ''Drug interaction checking'', ''Pharmacy inventory management'', ''Pharmacy management software (e.g., QS/1)'', ''Regulatory compliance'',
