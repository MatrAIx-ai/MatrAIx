persona_description: A team of researchers from the INTA and CONICET who are working on developing a nanogel to prevent common and frequent bacterial infections in livestock, aiming to improve animal welfare
  and reduce the use of antibiotics in livestock production. Their work focuses on the development of a nanogel to prevent bacterial infections in pigs and horses, which are two of the most common and frequent
  bacterial infections in livestock.
