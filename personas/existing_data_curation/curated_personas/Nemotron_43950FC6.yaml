  hobbies: '[''Reading science‑fiction and tech non‑fiction'', ''Arduino/Raspberry Pi tinkering'', ''Fishing in Pamlico Sound'', ''Hiking local trails'', ''Landscape photography'', ''Solo video gaming (strategy
    and simulation)'', ''Woodworking (custom furniture, model kits)'']'
  career_goals: He aims to secure a technical certification such as CompTIA A+ and enroll in a community‑college program in computer networking or engineering technology within the next year. After gaining
    foundational knowledge, George plans to pursue an apprenticeship as a field service technician or IT support specialist, eventually moving into a network administrator or cybersecurity analyst role.
    He also dreams of one day turning his woodworking hobby into a small side business, offering custom pieces to local customers. Financial stability, the ability to work in a quiet, focused environment,
    and continual skill growth are his primary motivations.
