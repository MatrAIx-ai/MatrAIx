persona_description: A teacher who is highly critical of the current state of public education and advocates for smaller class sizes and better teaching methods. They believe that the use of destructive
  reading and math instruction can severely damage the learning abilities of students, and they are willing to take a stand against these practices. They are also aware of the irony that smaller class sizes
  can actually result in more damage to students if the teachers are poorly trained or using ineffective teaching methods. They are passionate about improving education and believe that a more effective
  and equitable education system is possible with better teaching practices and smaller class sizes.
