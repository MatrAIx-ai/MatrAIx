personas:
  professional: Juan Adams is a pragmatic aspiring maintenance technician who leverages his hands‑on carpentry, garden care, and basic office skills to pursue a routine‑focused apprenticeship in agricultural
    equipment, balancing his relaxed approach to obligations with an assertive drive to secure a stable, community‑oriented job.
  sports: Juan Adams maintains fitness through early‑morning fishing at Millerton Lake, weekend hikes with the Sierra Trails Club, and occasional pickup basketball at Sacramento's Gold Rush Gym, while cheering
    for the Sacramento Kings and Los Angeles Dodgers whenever schedules permit.
  arts: Juan Adams unwinds by listening to reggae‑infused island‑inspired playlists featuring Bob Marley, The Wailers, and local acoustic group Ka‘a‘a, and occasionally attends the downtown farmers’ market’s
    open‑mic nights where indie folk singer Maya Reed performs.
  travel: Juan Adams prefers low‑key road trips that balance adventure with predictability, having explored Yosemite, Lake Tahoe, and the Big Sur coastline while earmarking a future pilgrimage to New Zealand’s
    South Island to fish its pristine rivers.
  culinary: Juan Adams showcases a modest culinary flair by preparing family‑style island‑inspired dishes such as coconut‑milk fish curry, taro fries, and mango‑lime salsa, skillfully blending fresh garden
    herbs with pantry staples like ginger and cilantro.
  core: Juan Adams is a routine‑loving, solitary fixer‑upper who cycles between quiet mornings fishing, evenings tinkering on a motorcycle, and spontaneous puzzle gaming, all while habitually misplacing
    keys and forgetting appointments.
background:
  cultural: Juan comes from a Polynesian family with Samoan and Hawaiian roots that settled in Fresno County decades ago. Growing up, he was immersed in the values of respect for elders, communal support,
    and a strong oral storytelling tradition. Family gatherings often featured traditional foods like poke bowls, taro dishes, and coconut desserts, which sparked his interest in cooking. While he lives
    in a predominantly agricultural area of California, he maintains cultural ties through occasional visits to the local Polynesian cultural center, participating in small community events, and preserving
    language phrases taught by his grandparents. This blend of Polynesian heritage and Central Valley life informs his culinary interests, community outlook, and emphasis on practical, family‑oriented pursuits.
attributes:
  skills: '["Basic carpentry", "Landscaping and gardening", "Cooking traditional Polynesian dishes", "Basic computer proficiency (Microsoft Office, email)", "Customer service in retail settings"]'
  hobbies: '["Fishing at Millerton Lake", "Home gardening", "Motorcycle restoration", "Puzzle video games", "Listening to Polynesian reggae music", "Small‑group hiking trips"]'
  career_goals: Juan aims to secure a stable, routine‑oriented position that leverages his practical abilities—such as an apprenticeship as a maintenance technician for agricultural equipment or a full‑time
    role in facilities upkeep for a local school. He plans to complete his associate degree in Business Administration at the community college, which will enable him to eventually open a small food cart
    or pop‑up stall serving Polynesian snacks at local farmers' markets. His long‑term ambition is to combine his hands‑on skills with modest entrepreneurship, creating a predictable daily schedule while
    contributing to his community.
