  hobbies: '[''Basketball'', ''Softball'', ''Gym workouts'', ''Hunting'', ''Fishing'', ''Barbecue cooking'', ''Country music'', ''Sales podcasts'', ''Car restoration'', ''Community volunteering'']'
  career_goals: Richard aims to become a top‑performing regional sales manager within the next five years, eventually progressing to a director of sales role overseeing multiple territories. He plans to
    earn a certification in strategic sales management and pursue a bachelor’s degree in business administration to broaden his expertise. Long‑term, he envisions launching his own wholesale distribution
    company focused on agricultural equipment in central Georgia, leveraging his deep local market knowledge and competitive spirit.
