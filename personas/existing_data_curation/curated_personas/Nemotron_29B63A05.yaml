  career_goals: Don aspires to become a senior communications director for a technology‑driven organization or a cultural institution in Chicago, leading a team that integrates data science and creative
    narratives. He plans to pursue an MBA or a master’s in integrated marketing communications, author thought‑leadership pieces on innovative PR practices, and eventually launch his own consultancy focused
    on tech‑arts collaborations.
