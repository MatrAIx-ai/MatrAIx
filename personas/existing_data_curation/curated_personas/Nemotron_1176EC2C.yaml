  career_goals: Irene aims to advance to a senior compliance manager role within the next five years, pursuing the Certified Compliance & Ethics Professional (CCEP) credential to solidify her expertise.
    She envisions leading a compliance department that integrates interdisciplinary thinking, using art and creative workshops to foster a culture of ethical awareness. Long‑term, she hopes to transition
    into a leadership position at a nonprofit arts organization, where she can combine her compliance background with her passion for the arts, mentor emerging professionals, and shape policies that support
    community cultural initiatives.
