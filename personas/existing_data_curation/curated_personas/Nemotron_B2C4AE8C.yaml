  hobbies: '[''Gardening'', ''Hiking'', ''Volunteer work at historical society'', ''Book club'', ''Knitting'', ''Crossword puzzles'', ''Photography'']'
  career_goals: Gwendolynn aims to advance into a senior leadership role, such as Audit Senior Manager or Chief Financial Officer of a mid‑sized nonprofit organization, where she can blend her financial
    acumen with her passion for cultural stewardship. She is actively pursuing the Certified Fraud Examiner (CFE) designation to deepen her forensic capabilities. In the next five years she plans to champion
    data‑driven audit methodologies, lead diversity and inclusion initiatives within her firm, and mentor the next generation of accountants. Long‑term, she envisions establishing a boutique consulting
    practice that provides financial stewardship and compliance guidance to historical societies, museums, and other cultural nonprofits.
