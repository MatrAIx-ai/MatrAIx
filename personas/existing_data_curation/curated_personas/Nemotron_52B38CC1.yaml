  hobbies: '[''Cooking Mexican cuisine'', ''Hiking in the Sonoran Desert'', ''Reading popular science and biographies'', ''Yoga and meditation'', ''Playing acoustic guitar'', ''Volunteer tutoring'', ''Gardening'',
    ''Stargazing'', ''Crafting jewelry'']'
  career_goals: Maria aspires to become a STEM curriculum specialist or district coordinator, where she can shape science education policy and expand equitable access to high‑quality STEM programs. She
    aims to pursue a master’s degree in education leadership while launching a sustainable after‑school robotics and coding club that bridges school resources with local Mexican‑American community partners.
    Long‑term, she hopes to advocate for mental‑health support systems for students and teachers, using her own experiences with stress to champion school‑wide wellness initiatives.
