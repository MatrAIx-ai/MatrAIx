personas:
  professional: Maria Arroyo, a 31‑year‑old STEM teacher in Arizona, blends bilingual fluency, hands‑on experiment design, and compassionate classroom management to craft inclusive science curricula that
    honor community cooperation while staying practical and organized, and they consistently adapt lessons to student needs.
  sports: Maria Arroyo spends Saturdays hiking the Sonoran Desert trails with a local outdoor club, follows the Phoenix Suns and Arizona Cardinals, participates in community 5K runs, and balances this outdoor
    enthusiasm with evening yoga sessions to maintain flexibility and reduce stress, and they often share trail tips with students to encourage active lifestyles.
  arts: Maria Arroyo plays acoustic guitar at community potlucks, draws inspiration from folk legends like Los Lobos and the vibrant murals that adorn neighborhood walls, and spends evenings exploring the
    works of astrophysicist Carl Sagan and novelist Isabel Allende, weaving these artistic influences into their classroom storytelling, and they delight in discovering how music and visual art can illuminate
    scientific concepts.
  travel: Maria Arroyo plans trips with a blend of careful budgeting and spontaneous curiosity, often returning to their grandparents’ seaside town for family festivals, taking road trips to the Grand Canyon
    and Sedona for stargazing nights, and dreaming of future adventures to the ancient ruins of Machu Picchu and the lantern‑lit streets of Kyoto, and they relish comparing the night skies of each destination.
  culinary: Maria Arroyo is a proficient home chef who loves making tamales and mole from scratch, experimenting with fusion dishes like mole‑glazed chicken tacos, and delights in ingredients such as dried
    chilies, chocolate, and masa harina, though they sometimes over‑spice the mole when trying new recipes, and they often end the cooking session with a spontaneous jam on the acoustic guitar.
  core: Maria Arroyo, a 31‑year‑old bilingual STEM educator, navigates life with a blend of compassionate organization, relentless curiosity, and a habit of worrying over details, often juggling yoga, guitar
    strums, and kitchen experiments while occasionally over‑committing to community events, and they rely on meditation to reset.
background:
  cultural: Maria is a first‑generation Mexican‑American who grew up in a bilingual household that celebrated Día de los Muertos, Semana Santa, and family reunions centered around food and music. Her heritage
    informs her teaching style; she infuses lessons with stories of Mexican scientists and engineers, uses Spanish vocabulary to reinforce concepts, and emphasizes community values such as cooperation and
    respect. She maintains close ties with her extended family in Mexico, regularly visits during holidays, and participates in local cultural festivals, which enrich her sense of identity and deepen her
    commitment to fostering cultural pride in her students.
attributes:
  skills: '[''Curriculum development'', ''Hands‑on STEM lesson design'', ''Differentiated instruction'', ''Classroom management'', ''Student assessment'', ''Educational technology integration'', ''Bilingual
