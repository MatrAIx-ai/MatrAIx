personas:
  professional: An experienced commercial driver and aspiring logistics entrepreneur, Tarsha Kangah leverages her Class A license, meticulous route planning, and customer‑focused salesmanship, while their
    vivid imagination fuels creative problem‑solving that shapes efficient boutique delivery routes for artistic supplies across Houston.
  sports: A casual fitness enthusiast who favors sunrise walks along the Katy Freeway and weekly yoga sessions at a downtown studio, Tarsha Kangah roots for the Houston Astros, the Rockets, and the Texans,
    and occasionally joins a mixed‑age tennis league at the West University Country Club, using these activities as both stress relief and a way to counter the stiffness from prolonged driving.
  arts: A dedicated creator and avid art consumer, Tarsha Kangah spends weekends translating Texas sunrise vistas into abstract canvases inspired by Jackson Pollock and Mark Rothko, experiments with mixed‑media
    collages echoing Yayoi Kusama, curates a traveling photo series reminiscent of Ansel Adams, draws literary inspiration from speculative fiction authors such as Ursula K. Le Guin, while they regularly
    attend gallery openings at the Contemporary Arts Museum Houston and volunteer as a youth art mentor.
  travel: A road‑trip aficionado who plans itineraries around sunrise photo stops, Tarsha Kangah has charted routes from the piney woods of East Texas to the desert expanses of Big Bend and the cultural
    lanes of Austin, while dreaming of a weekend getaway to Santa Fe for its art markets and a language‑immersion trip to Oaxaca, Mexico, balancing limited vacation days with a penchant for spontaneous
    detours.
  culinary: A culinary experimenter rooted in Southern comfort, Tarsha Kangah reinvents classics like shrimp‑and‑grits with a herb‑infused heirloom tomato relish, braises collard greens with smoked paprika
    and pecans, and crafts fresh pico de gallo using cilantro, lime, and jalapeño for a Spanish twist, while they favor farmer’s‑market finds and rate themselves as an intermediate home chef.
  core: A sunrise‑chasing, canvas‑splattering logistics pro, Tarsha Kangah blends a love for abstract art and efficient delivery routes, often sketching ideas on logbooks, yet habitually forgets to water
    her garden during back‑to‑back hauls.
background:
  cultural: Tarsha identifies as African American with deep roots in the Southern Black community of Greater Houston. Growing up, she was immersed in the rich traditions of church gospel music, storytelling,
    and communal gatherings that emphasized harmony and mutual support. She celebrates cultural milestones such as Juneteenth and participates in local soul‑food festivals, preserving family recipes while
    exploring contemporary culinary fusions. Her cultural experience informs her collaborative spirit, her appreciation for art as a means of expression and community building, and her dedication to uplifting
    others through mentorship and creative outreach.
attributes:
  skills: '["Commercial Driving (Class A)", "Route Planning and Optimization", "Basic Vehicle Maintenance", "Logistics Coordination", "Customer Relationship Management", "Sales and Negotiation", "Creative
    Problem Solving", "Mixed‑Media Painting and Design", "Digital Literacy (sales tracking software)", "Mentorship and Training for New Drivers"]'
  hobbies: '["Abstract Painting and Mixed‑Media Art", "Landscape Photography", "Reading Speculative Fiction and Poetry", "Creative Writing (short stories, essays)", "Visiting Art Galleries and Craft Fairs",
    "Cooking Modern Southern Cuisine", "Gardening (herbs and heirloom vegetables)", "Volunteering as Youth Art Mentor", "Learning Spanish"]'
  career_goals: Tarsha aims to transition from an employee driver to an owner‑operator of a boutique logistics service that specializes in delivering artistic supplies and locally crafted goods throughout
    the Houston area. She envisions establishing a community art outreach program that provides free workshops for youth in her neighborhood. Additionally, she aspires to become a recognized mentor for
    other women in the trucking industry, publish a memoir that blends her experiences on the road with her artistic journey, and ultimately secure a comfortable retirement that allows her to devote more
    time to creative pursuits.
