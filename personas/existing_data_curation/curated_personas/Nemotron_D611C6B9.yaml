personas:
  professional: Rima Epps is an organized student‑athlete who leads her school’s under‑nine soccer team with meticulous drills, applies their methodical planning to earning Girl Scout badges, and they channel
    their competitive streak into reliably completing group projects.
  sports: Rima Epps thrives on the soccer field, playing forward for the Ramona Elementary Panthers and training with the Pac‑West Soccer Academy’s under‑nine squad, while they also cheer for the San Diego
    Wave in the NWSL and spend weekends cultivating fitness through farm work and organized playground games.
  arts: Rima Epps expresses creativity by weaving friendship bracelets while humming Disney’s ‘Let It Go’, baking chocolate chip cookies with a sprinkle of sea salt, devouring adventure books like the ‘Magic
    Tree House’ series by Mary Pope Osborne, and they eagerly attend weekend art workshops that teach simple watercolor techniques.
  travel: Rima Epps prefers structured family day trips, having explored the San Diego Zoo and lazed on La Jolla’s sandy shore, dreaming of a future adventure to Disneyland and a school field trip to the
    Grand Canyon, and they meticulously pack a checklist of snacks, sunscreen, and a journal to record each outing.
  culinary: Rima Epps loves baking chocolate chip cookies with butter, brown sugar, and vanilla extract, mixes homemade granola bars using rolled oats and honey, enjoys snacking on fresh garden tomatoes
    and strawberries, and they occasionally forget to clean the kitchen, leaving a trail of crumbs as a reminder of their enthusiastic but messy cooking style.
  core: Rima Epps channels boundless energy into soccer drills, badge‑earning Girl Scout projects, and meticulous journaling, all while battling a habit of over‑worrying that fuels their competitive edge
    and routine‑driven planning, and they constantly seek order in every activity.
background:
  cultural: Rima comes from a white, middle‑class family rooted in the rural‑suburban culture of Ramona, California. Her household follows many traditional American customs, celebrating holidays such as
    Thanksgiving, Christmas, and the Fourth of July with family gatherings and community events. The community places a high value on school involvement, sports, and outdoor activities, which shape Rima’s
    daily life. She attends a local public elementary school and participates in community programs like the Girl Scouts and youth soccer league. Her cultural environment blends the practical, down‑to‑earth
    lifestyle of inland San Diego County with the broader American emphasis on education, civic participation, and family cohesion.
attributes:
  skills: '[''Fluent reading and comprehension'', ''Basic arithmetic (addition, subtraction, multiplication)'', ''Clear, organized writing'', ''Following multi‑step instructions'', ''Personal organization
    (scheduling, tidy workspace)'', ''Basic Scratch coding'', ''Puzzle solving and LEGO construction'', ''Team sports coordination (soccer)'']'
  hobbies: '[''Soccer (team sport)'', ''Girl Scouts (crafts, badges, community service)'', ''Friendship bracelet making'', ''Baking simple recipes'', ''Reading adventure/mystery books'', ''Farm chores (feeding
    chickens, gardening)'', ''Personal journaling/planning'']'
  career_goals: Rima dreams of a future where she can combine her love of routine, helping others, and a stable, practical career. She often says she wants to become a teacher because she enjoys creating
    clear lesson plans, guiding classmates, and providing a structured learning environment. She also envisions herself as a pediatric nurse or a veterinarian, roles where she can use her organized nature
    to care for children or animals in a reliable, systematic way. Occasionally she imagines becoming a professional soccer player, channeling her competitive spirit and disciplined practice habits into
    a sport she loves.
