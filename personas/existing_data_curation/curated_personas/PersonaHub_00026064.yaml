persona_description: A researcher at Wake Forest University Baptist Medical Center who specializes in the study of pregnancy-induced high blood pressure and its relationship with the placenta and the chorionic
  villi. She is a graduate student who has published a significant finding in the journal Hypertension, which suggests that the levels of a hormone that causes blood pressure to rise in the placenta are
  higher in women with preeclampsia compared to those without the disorder. The researcher is interested in the potential role of local tissues in the development of preeclampsia and is currently investigating
  growth factors that may regulate the placenta's blood supply. She is supported by the National Institutes of Health and the American Heart Association.
