personas:
  professional: Marianina Roddey is a senior graphic designer who blends data visualization expertise with a flair for UI/UX storytelling, turning complex tech startup metrics into vivid brand experiences
    while navigating client demands with a flexible, curiosity‑driven work style that often leans on improvisation over strict planning.
  sports: Marianina Roddey fuels her kinetic energy with weekly salsa classes, sunrise yoga at Piedmont Park, and weekend hikes up Stone Mountain, while cheering on the Atlanta Falcons on Sundays and the
    Hawks on game nights, and she occasionally joins a local women's climbing club for a change of pace.
  arts: Marianina Roddey channels her creative curiosity into volunteer graphic design for community nonprofits, captures vibrant street art inspired by Banksy and Shepard Fairey with her DSLR, and unwinds
    at trivia nights discussing the works of designers like Paula Scher and John Maeda while sipping craft coffee.
  travel: Marianina Roddey prefers spontaneous weekend getaways that blend cultural immersion with culinary exploration, having already trekked the historic streets of Savannah, tasted beignets in New Orleans,
    and explored Austin’s music scene, while a future Barcelona salsa pilgrimage and a Lisbon food‑tour sit atop her wish list, all balanced against a modest travel budget and occasional family obligations.
  culinary: Marianina Roddey delights in cooking at a confident intermediate level, often reimagining Southern staples like fried chicken and collard greens with global twists such as gochujang‑glazed pork
    ribs or kimchi‑infused biscuits, and they proudly serve shrimp‑and‑grits with smoked paprika alongside a side of miso‑marinated sweet potatoes at their lively potluck gatherings.
  core: Marianina Roddey is a socially vibrant, design‑savvy multitasker who thrives on kinetic hobbies and creative collaborations, yet their perpetual worry and habit of misplacing receipts keep them
    perpetually balancing energy and chaos.
background:
  cultural: Marianina grew up in suburban Atlanta within a middle‑class white family of mixed European ancestry. Her upbringing was steeped in Southern hospitality—family gatherings, church picnics, and
    a strong sense of community—while the city’s vibrant multicultural scene exposed her early to African‑American music, Caribbean cuisine, and a diverse artistic milieu. This blending of traditional Southern
    values with the eclectic cultural landscape of Atlanta has fostered an open‑minded outlook and an appreciation for collaborative creativity. Her marriage and professional life further reinforce her
    connection to the region’s blend of heritage and modern innovation.
attributes:
  skills: '[''Adobe Photoshop'', ''Adobe Illustrator'', ''Adobe InDesign'', ''Figma'', ''Sketch'', ''User Interface (UI) Design'', ''User Experience (UX) Research'', ''Data Visualization (Tableau, D3.js)'',
    ''HTML/CSS'', ''JavaScript basics'', ''Typography'', ''Brand Identity Development'', ''Motion Graphics (After Effects)'', ''Photography and Photo Editing'', ''Print Production'', ''Client Presentation
    and Communication'', ''Agile Project Management (Kanban)'', ''Responsive Web Mockups'']'
  hobbies: '[''Salsa dancing'', ''Group yoga sessions'', ''Hiking at Stone Mountain Park'', ''Hosting potluck dinner parties'', ''Cooking Southern comfort food'', ''Volunteer graphic design for nonprofits'',
    ''Board game nights'', ''Trivia contests'', ''Street art photography'', ''Listening to technology and psychology podcasts'']'
  career_goals: Marianina aims to transition from a senior graphic designer to an art director who can lead cross‑functional teams in creating data‑driven brand experiences for technology startups. She
    plans to deepen her expertise in UX research and interaction design, potentially pursuing a master's in Human‑Centered Design. Over the next five years she hopes to launch a boutique consultancy that
    offers branding, visualization, and design strategy services to socially responsible businesses, while building a mentorship program for emerging designers in the Atlanta community. A parallel goal
    is to cultivate a more structured workflow that reduces her stress and enables a healthier work‑life balance.
