persona_description: A biologist or ecologist who specializes in the study of avian mating systems and their impact on avian biodiversity. They are particularly interested in the role of extra-pair paternity
  (EPP) in contributing to the isolation between related forms and the development of sexual selection on traits with which it is often associated. They are also knowledgeable about the potential role of
  EPP in post-copulatory isolating mechanisms between closely related species or forms in sympatry. They are interested in the genetic and social factors that can affect the distribution of EPP within a
  population and how these factors relate to the underlying genetic mating system of a population or species. They are also aware of the potential consequences of EPP on the definition and understanding
  of species or morphs as genetically isolated populations in many cases.
