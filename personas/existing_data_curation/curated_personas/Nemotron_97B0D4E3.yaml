  hobbies: '[''Watercolor painting'', ''Urban photography'', ''Reading contemporary fiction and poetry'', ''Listening to jazz, neo‑soul, and hip‑hop'', ''Attending local art galleries and festivals'', ''Cooking
    Southern comfort food'', ''Dancing to R&B and step at church events'']'
  career_goals: Vivian intends to enroll in a two‑year associate program in graphic design or fine arts at a local community college, with the long‑term goal of becoming a professional graphic designer
    who collaborates with nonprofit organizations to promote community arts. She hopes to earn a scholarship to attend an HBCU for a Bachelor of Fine Arts, where she plans to specialize in visual storytelling
    and eventually open a community‑run art studio that offers workshops for youth. A secondary ambition is to work as an art therapist, using her creative skills to support mental‑health initiatives for
    underserved populations in the South Carolina Midlands.
