personas:
  professional: Vivian Boyd, an aspiring graphic designer and community‑arts coordinator, melds her watercolor and photography talent with event‑planning savvy and a naturally curious, organized mindset,
    allowing them to craft visual campaigns that amplify nonprofit causes while balancing creative spontaneity with dependable delivery.
  sports: Vivian Boyd stays active by joining the church’s step‑dance troupe, jogging on the Orangeburg River Trail during spring, and cheering on the Clemson Tigers football team in the fall while they
    occasionally volunteer as a photographer for the local youth soccer club, the Orangeburg United.
  arts: Vivian Boyd immerses themselves in the arts by sketching street scenes, experimenting with watercolors inspired by Jackson Pollock’s fluidity, curating Instagram reels set to Kamasi Washington’s
    jazz, and they draw inspiration from poets like Terrance Hayes and visual artists such as Kehinde Wiley, while regularly attending gallery openings showcasing emerging Southern talent.
  travel: Vivian Boyd prefers budget‑friendly road trips that blend cultural immersion and creative recharge, having explored Charleston’s historic districts and a spontaneous weekend in New Orleans for
    its music scene, and they dream of a future pilgrimage to New York’s MoMA and Paris’s Montmartre to study street art.
  culinary: Vivian Boyd enjoys cooking Southern comfort dishes at a home‑cook level, routinely preparing collard greens seasoned with smoked paprika and a buttery peach cobbler topped with a crumbly oat
    streusel, while they also experiment with infusing watercolor‑inspired pastel hues into homemade smoothie bowls featuring fresh mango and hibiscus.
  core: Vivian Boyd is a creatively driven, community‑focused 21‑year‑old who balances spontaneous art‑supply splurges and late‑night sketch marathons with diligent event planning, often found juggling
    a sketchbook, camera, and a habit of humming D’Angelo while they forget to water their houseplants.
background:
  cultural: Vivian was raised in a close‑knit African‑American community in Orangeburg, a city with deep civil‑rights history. Family traditions emphasize church participation, storytelling, and Southern
    cuisine, which have fostered a strong sense of communal responsibility and resilience. She grew up hearing about the legacy of the Orangeburg Massacre and the role of historically Black institutions
    like South Carolina State University, shaping her awareness of social justice. The rhythmic beats of gospel choirs, the vibrant flavors of cooks’ kitchen gatherings, and annual events such as the Orangeburg
    Annual Parade have woven a cultural tapestry that informs her artistic sensibility and commitment to uplifting her community.
