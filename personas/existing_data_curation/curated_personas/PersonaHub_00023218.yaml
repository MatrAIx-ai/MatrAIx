persona_description: A Penn State professor of education and demography who has conducted research on the role of executive functions in mathematics and science learning difficulties in students with disabilities.
  His study found that kindergarten children with deficits in executive functions are at elevated risk for academic difficulties, which may be a potentially important target for interventions, including
  those designed to address science, engineering, technology, and mathematics difficulties early on during children's schooling when such interventions may be especially effective.
