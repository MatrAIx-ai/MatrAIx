  hobbies: '["Group Hiking in the Rockies", "Mountain Biking", "Seasonal Skiing", "Gardening", "Woodworking", "Playing Jazz Piano", "Volunteer Work with Habitat for Humanity", "Science-Fiction Book Club",
    "Regional Tech Meet-ups"]'
  career_goals: Approaching retirement, Tyler aims to transition from day‑to‑day supervision to a senior advisory role where he can shape sales strategy across the organization and mentor the next generation
    of leaders. He hopes to spearhead a sustainability‑focused sales initiative that leverages his technical background, develop a structured succession plan for his team, and eventually contribute his
    expertise to industry councils or local business incubators. While competitive at heart, he also wants to leave a lasting legacy of ethical, data‑driven sales practices that balance innovation with
    practicality.
