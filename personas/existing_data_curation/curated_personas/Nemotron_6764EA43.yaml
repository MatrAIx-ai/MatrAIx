personas:
  professional: John Martin, a veteran volunteer coordinator at his local senior center, blends his hands‑on carpentry, budgeting, and event‑planning skills to organize weekly bingo nights, community potlucks,
    and garden‑maintenance projects while mentoring younger volunteers with a pragmatic, structured approach.
  sports: John Martin follows the Dallas Cowboys with unwavering loyalty, gathers with friends to watch games on the senior center’s big screen, participates in a weekly senior bowling league at the community
    center, and enjoys cheering on the local high school football team during Friday night lights.
  arts: John Martin immerses himself in classic country legends like Johnny Cash and early rock ’n’ roll icons such as Elvis Presley on his vintage radio, appreciates maritime paintings while crafting model
    ships, and attends the local church choir concerts and community theater productions whenever his schedule allows.
  travel: John Martin prefers organized group outings, planning weekend trips to regional Texas fairs in Fort Worth, historic sites like the Alamo in San Antonio, and the scenic Hill Country vineyards,
    often driving his own car but relying on family for longer journeys to places like New Mexico’s White Sands.
  culinary: John Martin delights in Texas barbecue, especially slow‑cooked brisket with a side of homemade chili and cornbread, tends a small herb garden for fresh seasonings, cooks a reliable potluck casserole
    of green bean with mushroom sauce, and occasionally overindulges in pecan pie at community gatherings.
  core: John Martin is a structured yet sociable octogenarian who balances meticulous budgeting, hands‑on woodworking, and fervent Dallas Cowboys fandom with a penchant for forgetting his glasses and a
    love for community potlucks.
background:
  cultural: John grew up in post‑Depression Texas in a modest, white, middle‑class family that emphasized self‑reliance, hard work, and community ties. Raised in a small‑town environment before moving to
    Fort Worth, he was steeped in mid‑20th‑century Southern hospitality, a Protestant Christian tradition, and a strong sense of patriotism. His formative years were shaped by the values of the post‑World
    War II boom, the rise of automobile culture, and a respect for practical trades, all of which inform his grounded outlook and his commitment to community service.
