  career_goals: At 82, John’s primary ambition is to remain active, independent, and socially engaged. He hopes to continue volunteering at the local senior center, share his practical knowledge with younger
    community members, maintain good health through regular exercise and routine, complete a memoir of his life experiences, and enjoy occasional trips to regional fairs and historic sites around Texas.
