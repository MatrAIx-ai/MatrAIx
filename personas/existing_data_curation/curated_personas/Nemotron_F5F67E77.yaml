  hobbies: '[''Watercolor painting'', ''Gardening (heirloom roses and vegetables)'', ''Reading historical fiction and biographies'', ''Knitting and textile crafts'', ''Visiting museums and art galleries'',
    ''Photography'', ''Bridge club'', ''Volunteer work at the public library'', ''Cooking traditional family recipes'', ''Community theater participation'']'
  career_goals: Although retired, Sandra aims to broaden her impact by launching a monthly art-and-craft series at the local senior center, curating exhibitions that celebrate Madison County’s history,
    and mentoring younger volunteers. She aspires to serve on the board of the Madison County Historical Society, complete a memoir documenting her family’s immigrant journey, and travel to at least three
    major art museums—such as the Smithsonian, the Cleveland Museum of Art, and a European museum—within the next five years.
