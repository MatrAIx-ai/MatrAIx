personas:
  professional: Jada Szanto, an aspiring museum curator assistant and budding UX designer, blends digital illustration, Python‑powered art projects, and meticulous Excel‑driven planning to create visually
    compelling, data‑informed exhibits while constantly checking timelines and worrying about every detail.
  sports: Jada Szanto, a dedicated cross‑country runner who logs early morning miles on the St. Charles Trail, supports the St. Louis Cardinals and St. Louis Blues, and belongs to the school’s track club,
    balances a competitive streak on the field with a habit of stretching obsessively to ward off injury.
  arts: Jada Szanto, a frequent visitor to the St. Charles County Historical Museum and local galleries, draws inspiration from Yayoi Kusama’s installations, Georgia O’Keeffe’s landscapes, and the lyrical
    verses of Ocean Vuong, channeling these influences into digital illustrations and sketchbooks while maintaining a skeptical eye for surface‑level hype.
  travel: Jada Szanto, who dreams of wandering Kyoto’s Nishiki Market and strolling through Paris’s Musée d’Orsay after budgeting weekend road trips to the Gateway Arch and a summer camp in the Ozarks,
    plans each journey with spreadsheets and a penchant for detailed itineraries.
  culinary: Jada Szanto, an intermediate home cook who loves cultivating basil and rosemary in her herb garden, routinely whips up pesto pasta, avocado toast with sprouted radish, and experimental sourdough
    pizza topped with roasted beet and goat cheese, yet often succumbs to late‑night candy bars when study stress peaks.
  core: Jada Szanto is a meticulously organized, curiosity‑driven teen who balances art, analytics, and anxiety, obsessively plans every detail while fearing the unknown.
background:
  cultural: Jada grew up in Marthasville, a small town in St. Charles County, Missouri, where Midwestern values of community involvement, self‑reliance, and modesty are prominent. Her family roots trace
    back to European immigrants who settled in the region generations ago, fostering a cultural environment that respects tradition while encouraging open‑mindedness. Local traditions, such as county fairs,
    seasonal festivals, and church gatherings, have shaped her appreciation for shared experiences and collective history. At the same time, the area's emphasis on personal responsibility and practical
    achievement has reinforced her organized, methodical approach to tasks. While still navigating her identity as a white Midwesterner, Jada embraces both the artistic heritage of the local cultural institutions
    and the pragmatic mindset that characterizes her community.
attributes:
  skills: '[''Digital illustration'', ''Critical art analysis'', ''Advanced Microsoft Excel'', ''Project planning and coordination'', ''Basic Python programming'', ''Public speaking (debate)'', ''Reflective
    journaling'', ''Competitive academic quiz bowl'', ''Social media content creation'', ''Research and fact‑checking'']'
  hobbies: '[''Sketching and digital illustration'', ''Visiting art galleries and museums'', ''Reading science‑fiction and contemporary poetry'', ''Model United Nations debate'', ''Running on local trails'',
    ''Photography'', ''Puzzle solving (crosswords, sudoku)'', ''Cultivating a small herb garden'', ''Attending community art workshops'', ''Journaling for self‑reflection'']'
  career_goals: Jada aspires to turn her passion for art and structured thinking into a career that combines creativity with analytical rigor. She is drawn to roles such as museum curator assistant, where
    she could marry her appreciation for visual culture with meticulous exhibition planning. Alternatively, she envisions a future in user‑experience (UX) design, leveraging her digital illustration skills,
    programming basics, and knack for systematic problem‑solving. She plans to enroll in a community college program that offers courses in art history, digital media, and introductory design, aiming to
    build a portfolio that showcases both her artistic vision and her capacity for organized execution. In the long term, Jada hopes to lead projects that bring innovative art experiences to her Midwestern
    community while maintaining a stable, well‑structured professional path.
