    literacy at local community centers","Attending fintech meetups and exploring emerging financial technologies","Playing classical guitar and learning traditional Mexican folk songs","Participating in
    cultural festivals such as Día de los Muertos and Cinco de Mayo celebrations"]'
  career_goals: Myriam aims to advance to a senior credit‑management role within a community‑focused financial institution, where she can lead a team dedicated to expanding access to fair credit for underserved
    populations. She plans to obtain Certified Financial Planner (CFP) and Certified Credit Counselor credentials to deepen her expertise. Long‑term, she envisions launching a nonprofit that blends financial
    education with artistic expression—using murals, visual storytelling, and community art events to make budgeting and credit concepts more relatable for Mexican‑American families in the Bay Area. She
    also seeks a hybrid work arrangement that balances collaborative projects with dedicated quiet time for strategic thinking and self‑care.
