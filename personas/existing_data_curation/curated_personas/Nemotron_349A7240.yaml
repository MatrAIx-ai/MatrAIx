personas:
  professional: Myriam Andrade is a seasoned credit counselor and loan officer who combines meticulous underwriting expertise, bilingual communication, and a curiosity for unconventional visual storytelling
    to empower underserved families, and they maintain a cooperative, detail‑oriented approach that blends organized workflow with flexible problem‑solving.
  sports: Myriam Andrade is an avid supporter of the San Jose Sharks and the San Jose Earthquakes, regularly hikes coastal trails with the Bay Area Hikers club, and they complement team spirit with weekend
    yoga sessions and occasional community volleyball games.
  arts: Myriam Andrade immerses herself in San Jose’s vibrant street‑mural scene, curates visits to contemporary galleries, captures urban textures with a DSLR, and they express creativity through classical
    guitar performances of folk tunes, blending traditional melodies with modern arrangements.
  travel: Myriam Andrade loves traveling to coastal towns where lantern‑lit Day of the Dead altars illuminate narrow streets, and they have also explored the architectural wonders of Barcelona, the temples
    of Kyoto, and the rain‑soaked forests of the Pacific Northwest, always planning trips around cultural festivals and affordable flights.
  culinary: Myriam Andrade delights in preparing tamales, mole, and chilaquiles for family gatherings while experimenting with quinoa tacos topped with gochujang, and they source fresh ingredients at local
    farmers’ markets, though they sometimes over‑spice dishes in the excitement of fusion cooking.
  core: Myriam Andrade blends analytical rigor with artistic flair, counseling clients with empathy while nurturing personal creative pursuits, though they often wrestle with lingering worries that can
    stretch evenings.
background:
  cultural: Myriam is a second‑generation Mexican‑American who grew up in a bilingual household in the San Jose area. Her family maintains strong ties to Mexican traditions—celebrating Día de los Muertos,
    enjoying regional cuisine, and participating in community festivals. This bicultural upbringing instilled in her a deep sense of community, respect for familial bonds, and a commitment to supporting
    fellow Hispanic residents. She regularly volunteers with local Latino advocacy groups and incorporates culturally resonant examples in her financial counseling, using familiar references and storytelling
    techniques that honor her heritage while fostering financial empowerment.
