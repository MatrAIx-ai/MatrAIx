personas:
  professional: Arthur Caballero is an inquisitive one‑year‑old who spends hours arranging colorful wooden blocks, already demonstrating nascent spatial design skills and a relaxed, flexible play style
    that signals a future in architecture, and they love improvising new structures.
  sports: Arthur Caballero, a one‑year‑old with a boundless curiosity for movement, loves toddling around the community fair's kiddie obstacle course in the spring, cheerfully waves a mini Pittsburgh Steelers
    flag during football season, and they attend a local toddler gymnastics class that doubles as a social gathering for families.
  arts: Arthur Caballero, a bright-eyed one‑year‑old, immerses themselves in the soothing melodies of Ella Fitzgerald and the gentle lull of Mozart's piano sonatas while delighting in finger‑painting sessions
    that echo the bold dots of Yayoi Kusama, and they often request storybooks illustrated by Eric Carle before bedtime.
  travel: Arthur Caballero, though only a year old, has already accompanied their family on a weekend road trip to the historic Gettysburg battlefield, a sunny day at the Amish‑influenced farm in Lancaster
    County, and they dream of one day feeling the sand between their toes on the Outer Banks, preferring short, family‑oriented journeys that fit comfortably into a stroller.
  culinary: Arthur Caballero, a one‑year‑old with a palate for farm‑fresh flavors, relishes mashed sweet potatoes seasoned with a pinch of cinnamon, smooth applesauce made from orchard‑picked apples, and
    soft scrambled eggs with chives, while their parents often introduce them to tiny bites of homemade apple‑cinnamon muffins.
  core: Arthur Caballero is a wonder‑filled infant who alternates between intense focus on stacking blocks and sudden bouts of worry when a favorite blanket is misplaced, and they embrace both the calm
    of rural rhythms and an endless curiosity for the unknown.
background:
  cultural: Arthur is raised in a white, middle‑class family in Marietta, Pennsylvania, a rural community that blends traditional Amish‑influenced customs with broader American cultural practices. Family
    life includes Sunday gatherings at a local church, homemade meals featuring farm‑fresh produce, participation in community fairs, and a strong emphasis on family support and neighborly cooperation.
    These surroundings shape his early experiences of community, tradition, and simplicity.
