personas:
  professional: Stephanie Curry, a seasoned office administrator with a solid foundation in instructional design, leverages meticulous record‑keeping and empathetic communication to craft onboarding workshops
    while occasionally letting her spontaneous problem‑solving override strict deadline adherence, aiming to transition into a community outreach training coordinator role.
  sports: Stephanie Curry enjoys cheering for the Tampa Bay Buccaneers while joining a local beach‑walking group and leading a water‑aerobics class at the senior center, though she sometimes misses a weekly
    gym session when a community choir rehearsal runs late.
  arts: Stephanie Curry’s artistic life revolves around singing in her church choir, attending downtown jazz and blues performances by local musicians such as saxophonist Calvin Smith, and immersing herself
    in historical fiction set in the post‑Civil‑War South, which deepens her appreciation for storytelling.
  travel: Stephanie Curry prefers relaxed road trips to Gulf Coast gems like Siesta Key, where she revels in spontaneous beach walks and carefully plans family visits for holidays, yet she often delays
    booking long‑distance flights due to budgeting concerns and lingering worry about health.
  culinary: Stephanie Curry excels at cooking traditional Southern gumbo with okra and smoked sausage, Caribbean jerk chicken glazed with pineapple‑mango salsa, and she loves seasoning weekend soups with
    fresh thyme, scotch bonnet peppers, and a dash of coconut milk, sharing these meals with neighbors as a way to nurture community bonds.
  core: Stephanie Curry blends methodical office expertise with a spontaneous, community‑focused spirit, balancing budget discipline and health vigilance while delighting in choir, garden, and soulful cooking.
background:
  cultural: Stephanie is an African‑American woman who grew up in a close‑knit family in the Tampa Bay area, where church, family gatherings, and community solidarity were central to daily life. Her upbringing
    emphasized the importance of education, resilience, and cultural pride, attending Juneteenth celebrations and supporting local Black heritage festivals. Living in Largo, she maintains strong ties to
    the region's Black community through church involvement, mentorship programs, and participation in cultural events that honor her ancestry. This background shapes her values of cooperation, empathy,
    and a commitment to uplifting others, while also informing her appreciation for traditions such as soul food cooking, gospel music, and storytelling.
attributes:
  skills: '[''Data entry'', ''Record keeping'', ''Scheduling'', ''Microsoft Office Suite'', ''Instructional material development'', ''Customer service'', ''Active listening'', ''Conflict resolution'', ''Team
    collaboration'', ''Adaptable problem solving'']'
  hobbies: '[''Cooking Southern and Caribbean dishes'', ''Church choir participation'', ''Community potluck organization'', ''Volunteering at senior center'', ''Gardening'', ''Spontaneous beach walks'',
    ''Weekend dance classes'', ''Reading historical fiction'', ''Attending live music events'', ''DIY home decor projects'']'
  career_goals: Stephanie aims to transition from her current clerk role into a training coordinator or community outreach position where she can blend her education background with her office expertise.
    She hopes to lead onboarding workshops for staff, develop adult‑learning programs for local community centers, and eventually earn a certification in adult education. Achieving a more predictable schedule
    is a key ambition, as it would help her manage stress and reduce worry. Long‑term, she envisions mentoring younger employees and serving as a liaison between her workplace and the broader Largo African‑American
    community, fostering cultural awareness and inclusive practices.
