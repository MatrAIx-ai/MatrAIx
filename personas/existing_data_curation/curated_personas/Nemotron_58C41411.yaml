personas:
  professional: Jason Semmens, a 28‑year‑old secondary‑school STEM teacher in Villa Park, Illinois, leverages his physics and engineering expertise alongside a talk‑driven, competitive edge to design inquiry‑based
    curricula that fuse Arduino projects, Python simulations, and data‑driven robotics strategies, while his pragmatic flexibility lets him pivot on spontaneous teachable moments and rally colleagues at
    district workshops.
  sports: Jason Semmens dominates Villa Park’s intramural basketball league as a point‑guard for the Cubs squad, chews on the competitive edge of Chicago Bulls games each season, and follows the Milwaukee
    Brewers for summer baseball, while they schedule weekend hikes along the Ice Age Trail to stay fit and clear their mind.
  arts: Jason Semmens curates a weekly science podcast that often features indie rock playlists by Tame Impala and Daft Punk, slips into local theater productions of The Little Prince, and fuels their creative
    spark by dissecting concept albums from Björk and cinematic scores by Hans Zimmer, integrating these artistic influences into lesson plans and board‑game nights.
  travel: Jason Semmens plans tech‑conference trips—attending SIGCSE in Nashville, Maker Faire in Chicago, and the International Robot Expo in Tokyo—mixing purposeful networking with a love for spontaneous
    weekend road‑trips to Door County’s vineyards and the Wisconsin Dells, all while budgeting carefully to fund their upcoming master’s program.
  culinary: Jason Semmens experiments with fusion dishes like kimchi‑infused tacos, miso‑marinated steak burritos, and ramen‑carbonara, often sourcing fresh produce from the local farmer’s market and honing
    their sous‑vide technique, yet they occasionally over‑season with gochujang, causing a fiery surprise for unsuspecting dinner guests.
  core: Jason Semmens is a curious, competitive STEM teacher who transforms hobbyist tinkering into classroom innovation, talks a mile a minute, and balances disciplined budgeting with occasional gadget‑splurges,
    all while juggling a mild carpal‑tunnel ache and a relentless appetite for fusion cooking.
background:
  cultural: Jason grew up in the suburban Midwest, raised in a predominantly white, middle‑class family with German‑Irish ancestry. The Villa Park community emphasized practical problem‑solving, civic involvement,
    and a down‑to‑earth work ethic, which shaped his balanced approach to curiosity and pragmatism. He values the region’s blend of close‑knit neighborhood ties and openness to new ideas, informing his
    commitment to community STEM outreach, his willingness to experiment with fresh teaching methods, and his respect for established practices.
