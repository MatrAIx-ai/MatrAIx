  hobbies: '[''Intramural basketball'', ''Trivia competitions'', ''Arduino and Raspberry Pi tinkering'', ''Robotics club mentoring'', ''Science podcast hosting'', ''Hiking and trail exploration'', ''Travel
    to tech conferences'', ''Experimental cooking'', ''Strategy board game nights'']'
  career_goals: Jason aims to become the head of the high school STEM department within the next three years, then transition to a district‑wide STEM coordination role where he can shape curriculum standards
    and secure funding for innovative programs. He plans to earn a master’s degree in educational leadership, develop an open‑source coding app for middle‑school students, and launch an after‑school STEM
    innovation hub in Villa Park. Over the long term, he aspires to author a high‑school physics textbook, influence state STEM policy, and become a recognized speaker at national education conferences.
