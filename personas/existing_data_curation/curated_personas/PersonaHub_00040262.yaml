persona_description: A logistics manager who oversees the loading and unloading of cargo on a container ship, ensuring that the containers are arranged in a way that minimizes the number of moves required
  for rearranging the containers. The manager must consider the specific needs and preferences of each of the 4 customers, ensuring that their containers are adjacent to each other and that no gaps are
  left on the dock. The manager must be skilled in using the crane to pick up and place containers, and must be able to coordinate with the crane operator to minimize the number of moves required.
