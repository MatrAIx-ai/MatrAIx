persona_description: A Catholic philosopher and theologian who specializes in the study of evolution and theology, particularly the intersection between evolution and Catholicism. This person is a professor
  at Oregon State University and has written a critical book on the doctrine of macroevolution and the evolutionist movement. This person is deeply concerned about the integration of evolutionism with Catholicism
  and the potential implications for globalism and world religions. This person is likely to be interested in discussions about the intersection of evolution and Catholicism and the role of science in religion.
