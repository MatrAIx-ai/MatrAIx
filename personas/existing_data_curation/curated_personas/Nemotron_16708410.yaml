  hobbies: '["Salsa dancing","Street art photography","DIY electronics projects (Arduino, Raspberry Pi)","Playing conga drums","Basketball pick‑up games","Cooking Cuban cuisine","Attending Miami art festivals","Smart‑home
    tech tinkering","Volunteering for community workshops","Exploring the Everglades"]'
  career_goals: Julio aims to become a licensed Master Electrician within the next three years and eventually launch his own boutique electrical contracting firm that specializes in art‑focused lighting
    installations and renewable‑energy solutions. He plans to earn certifications in solar energy and smart‑home systems, mentor apprentices through a local trade union, and contribute to community projects
    such as public art lighting for Miami’s cultural festivals. Long‑term, he envisions integrating his love for art and technology to create immersive, energy‑efficient spaces that reflect both Cuban heritage
    and contemporary design.
