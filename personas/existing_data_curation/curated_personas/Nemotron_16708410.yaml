personas:
  professional: Julio Villalpando is a seasoned electrician who blends precision conduit bending, blueprint reading, and advanced IoT lighting programming with a keen eye for artful illumination, and they
    channel their curiosity and sociable nature into client collaborations that marry technical safety with creative design.
  sports: Julio Villalpando stays active by organizing weekend basketball pick‑up games with the Little Havana Lions, cheering on the Miami Heat, and joining a local running club for early‑morning jogs
    along the waterfront, and they balance cardio with occasional beach volleyball in the summer.
  arts: Julio Villalpando captures the vibrant street murals of Wynwood with his DSLR, admires the bold colors of artist Romero Britto, immerses themselves in salsa dancing at Club 172, and expresses rhythm
    on conga drums during community festivals, letting the city's artistic pulse shape their creative outlook.
  travel: Julio Villalpando prefers weekend road trips that blend culture and nature, having explored the historic streets of New Orleans during Mardi Gras, the laid‑back vibe of Key West, and the Everglades'
    wildlife trails, while they dream of trekking Barcelona’s modernist architecture and the music‑filled streets of San Juan.
  culinary: Julio Villalpando delights in cooking traditional dishes such as ropa vieja, yuca con mojo, and tostones for family gatherings, experimenting with homemade mojo sauce and coffee brewing, yet
    they often over‑season their stews in the excitement of hosting friends.
  core: Julio Villalpando blends a bright technical mind with a love for street art and community rhythm, juggling electrician work, salsa steps, and spontaneous gadget tinkering while sometimes forgetting
    to turn off the lights they just programmed.
background:
  cultural: Julio is a first‑generation Cuban‑American raised in Miami’s Little Havana neighborhood. He grew up bilingual, speaking Spanish at home and English at school, and was immersed in Cuban traditions
    such as celebrating San Juan, cooking ropa vieja, and listening to son, bolero, and salsa music. The vibrant local art scene, street murals, and community festivals have shaped his aesthetic sensibility,
    while the entrepreneurial spirit of Miami’s diverse population inspires his professional ambitions. Julio values family ties, community cooperation, and the blend of his Cuban heritage with the dynamic
    multicultural environment of South Florida.
