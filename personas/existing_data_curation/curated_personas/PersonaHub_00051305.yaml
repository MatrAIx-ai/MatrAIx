persona_description: This text is likely to be read by a historian or political scientist interested in the history of science, technology, and environmental policy, particularly in the context of the late
  19th and early 20th century. The author's analysis of the whaling controversy in Norway provides a unique and detailed examination of how the material, procedural, and discursive aspects of parliamentary
  practice are co-constituted in order to assemble and enact constitutional power. The text also highlights the intersection of science and technology studies, environmental history, and legal and political
  anthropology, making it an interdisciplinary and insightful read for scholars in these fields.
