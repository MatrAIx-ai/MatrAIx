  career_goals: Susan aims to obtain her GED within the next year and then enroll in a vocational training program, preferably in agricultural technology, HVAC, or a related trade that offers a clear, structured
    career path. She hopes to secure a stable job with a local irrigation company, farm cooperative, or service provider where she can apply her practical skills while staying close to her community. In
    the longer term, she dreams of saving enough to purchase a modest home and possibly start a small gardening business selling fresh produce at the local market, providing both financial independence
    and a reliable routine.
