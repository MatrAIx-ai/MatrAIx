personas:
  professional: An aspiring ag-tech technician, Susan Hutchinson leverages their hands-on farm equipment experience, meticulous garden planning, and solid organizational skills to excel in structured tasks,
    while their practical mindset and occasional spontaneous problem-solving keep them adaptable on the job.
  sports: Active outdoors, Susan Hutchinson follows the Arizona Cardinals and Phoenix Suns, runs with the Desert Trail Runners club on weekends, and they balance their love of structured exercise with relaxed
    yoga sessions after work.
  arts: Arts-oriented Susan Hutchinson dedicates evenings to listening to classic country stalwarts like Johnny Cash and Dolly Parton, streaming folk bands such as The Avett Brothers, devouring romance
    novels by Nora Roberts and Nicholas Sparks, and they unwind crocheting scarves patterned after popular designs from Yarnspirations.
  travel: Travel-wise, Susan Hutchinson enjoys day trips to the nearby Saguaro National Park and occasional weekend visits to Phoenix's farmers markets, while they dream of a future road-trip across the
    Southwest to Utah's Zion National Park and an adventure tour of Oaxaca, Mexico, though budget constraints keep the latter on a wish list.
  culinary: Culinary Susan Hutchinson favors farm-to-table meals, often preparing fresh tomato-pepper salsa with cilantro and lime, rustic rosemary-infused grilled chicken, and they relish baking homemade
    herb focaccia using basil, thyme, and garlic from their own garden, though they sometimes skip meals when buried in chores.
  core: In essence, Susan Hutchinson blends disciplined routine with spontaneous desert walks, a habit of over‑stocking crochet supplies, and they often procrastinate GED study sessions until the last minute.
background:
  cultural: Susan was raised in San Luis, a small border town in Yuma County, Arizona. Her family is white with deep roots in the rural, agricultural communities of the Southwest, where hard work, self‑reliance,
    and modest living are core values. The town’s proximity to the Mexico border exposed her to Hispanic culture, and she is comfortable with Spanish phrases and enjoys the bicultural community events.
    She regularly attends a local Protestant church, which reinforces a sense of community, responsibility, and shared traditions. The desert landscape, farming lifestyle, and blend of Anglo and Hispanic
    influences shape her worldview, daily practices, and appreciation for both cultural heritages.
