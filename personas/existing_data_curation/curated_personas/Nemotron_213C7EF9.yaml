  hobbies: '[''Community theater participation'', ''Playing acoustic guitar'', ''Hiking and nature walks'', ''Fishing'', ''Board games and tabletop RPGs'', ''Cooking and recipe experimentation'', ''DIY
    home improvement projects'', ''Volunteering as event MC'', ''Following New York sports teams'']'
  career_goals: Leveraging his organizational strengths and sociable nature, Eric aims to advance from his current attendant role to a senior event coordinator position at a regional conference center within
    the next three years. He dreams of eventually managing an entire venue, overseeing staff schedules, programming community entertainment, and perhaps launching his own boutique events company that specializes
    in family‑friendly festivals and corporate gatherings in upstate New York. His long‑term ambition is to blend his love of performance with strategic leadership, creating predictable yet vibrant experiences
    for attendees.
