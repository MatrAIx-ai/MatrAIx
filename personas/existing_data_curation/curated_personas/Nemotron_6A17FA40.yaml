  career_goals: Michael aims to complete a bachelor’s degree in Information Systems while earning industry certifications such as CompTIA Network+ and AWS Solutions Architect. Over the next five years he
    envisions progressing to a senior systems analyst role, then moving into a solutions‑architect or product‑manager position that blends technology with user experience design. He is passionate about
    working on interdisciplinary projects—such as interactive art installations or gamified learning platforms—that let him apply his creative and technical skills. Flexibility is a priority, so he seeks
    opportunities for remote work or freelance consulting that allow him to travel, explore varied creative tech ventures, and eventually mentor younger students in campus coding clubs.
