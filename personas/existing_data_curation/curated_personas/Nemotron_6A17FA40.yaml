personas:
  professional: Michael Cruz is a 21‑year‑old aspiring systems analyst who leverages strong SQL, Python, and Agile teamwork skills to translate complex business processes into clear specifications while
    infusing UI/UX design flair from his photography and game‑streaming hobby, thriving in collaborative environments but sometimes scrambling due to relaxed planning.
  sports: Michael Cruz is a casual outdoor enthusiast who hikes the bluffs around Brookings, joins weekly group bike rides, cheers on the South Dakota State Jackrabbits football team, and follows the Denver
    Nuggets during the NBA season, preferring low‑pressure fitness over competitive leagues.
  arts: Michael Cruz is an avid photographer and live‑music fan who showcases prairie‑wide shots and urban street frames on Instagram, attends open‑mic nights featuring indie folk bands like The Shiny Objects,
    volunteers at the Brookings Public Library’s art workshops, and draws inspiration from Ansel Adams and Henri Cartier‑Bresson.
  travel: Michael Cruz prefers spontaneous road trips across the Midwest, having already visited Minneapolis, Chicago, and the Canadian Rockies, while dreaming of a summer backpacking adventure through
    the Czech Republic’s historic towns, balancing limited student budget with a love for culturally rich, off‑the‑beaten‑path experiences.
  culinary: Michael Cruz enjoys experimental cooking, often whipping up Korean bibimbap with gochujang and fresh basil, mastering homemade ramen broth, and experimenting with smoked paprika on grilled vegetables,
    though they sometimes over‑salt dishes when distracted by a gaming stream.
  core: Michael Cruz is a curious, sociable systems analyst who fuses tech and art, lives on flexible spontaneity, and balances creative projects with gaming, all while occasionally succumbing to disorganized
    habits and impulse spending.
background:
  cultural: Michael grew up in a small, predominantly white Midwestern town near Brookings, South Dakota, within a family with German‑Scandinavian roots. The community values self‑reliance, hospitality,
    and a strong connection to the surrounding prairie landscape. He was raised with Midwestern pragmatism yet encouraged to explore creative pursuits through school art programs and the vibrant campus
    culture at South Dakota State University. Local traditions such as the Brookings County Fair, community volunteer events, and the region’s outdoor recreation have shaped his appreciation for nature
    and collective activities. While rooted in these Midwestern values, Michael’s curiosity drives him to seek diverse ideas and experiences, blending his cultural heritage with a modern, globally‑aware
    outlook.
