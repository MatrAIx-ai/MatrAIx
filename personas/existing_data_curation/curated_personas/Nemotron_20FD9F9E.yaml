  hobbies: '[''Soccer'', ''Ultimate frisbee'', ''Mentoring at after‑school coding clubs'', ''Playing acoustic guitar'', ''Hosting dinner parties'', ''Vegetable gardening'', ''Hiking in Santa Cruz Mountains'',
    ''Attending tech meet‑ups'']'
  career_goals: Robert aims to become a curriculum coordinator within his district, where he can shape hands‑on STEM programs that serve a diverse student body. He plans to pursue a master's degree in educational
    leadership to gain the credentials needed for school administration. His long‑term ambition is to serve as a principal or director of community outreach, creating stable, supportive learning environments
    and expanding extracurricular STEM opportunities for underserved youth. He is motivated to maintain a practical, routine‑focused school culture while fostering collaboration and compassion.
