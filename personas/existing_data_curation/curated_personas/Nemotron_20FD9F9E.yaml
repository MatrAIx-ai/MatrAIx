personas:
  professional: Robert Sears is a secondary‑school STEM educator who designs data‑driven curricula and leads after‑school coding clubs, blending their love for routine lesson structures with a relaxed,
    spontaneous approach to classroom management that sometimes leads to missed paperwork but fosters a collaborative, compassionate learning environment.
  sports: Robert Sears plays forward for a local San Jose soccer league and joins the Santa Cruz Ultimate Frisbee club during summer, while cheering on the San Jose Earthquakes and occasionally catching
    a Golden State Warriors game with friends.
  arts: Robert Sears strums acoustic guitar in a community folk band that covers Bob Dylan and Phoebe Bridgers, enjoys live shows at the San Jose Velvet Room, and draws creative inspiration from folk legends
    like Joan Baez and contemporary indie artist Sufjan Stevens.
  travel: Robert Sears prefers weekend road trips to the Santa Cruz Mountains and coastal hikes in Big Sur, dreams of backpacking the Alpine trails of New Zealand, and plans a future cultural tour of Kyoto
    to explore its tea gardens and temple architecture.
  culinary: Robert Sears loves cooking garden‑fresh tomato basil pasta, grilled salmon with avocado salsa, and quinoa bowls topped with home‑grown kale and roasted beets, often pairing meals with locally
    brewed craft beer and occasional sushi rolls.
  core: Robert Sears blends a love for structured STEM curricula with a laid‑back lifestyle, juggling spontaneous guitar sessions, impromptu garden work, and occasional financial oversights, all while championing
    community collaboration and routine‑driven compassion.
background:
  cultural: Robert is a white American raised in a middle‑class suburban family in the Bay Area. His upbringing combined traditional American customs—such as celebrating Thanksgiving and the Fourth of July—with
    the multicultural, progressive atmosphere of San Jose. He values practicality, routine, and community service, reflecting a blend of mainstream Anglo‑American cultural norms and the collaborative spirit
    of his diverse neighborhood. This background informs his compassionate, cooperative approach to teaching and his dedication to fostering inclusive, harmonious learning environments.
attributes:
  skills: '[''Mathematics instruction'', ''Physics instruction'', ''Computer science programming'', ''STEM curriculum development'', ''Lesson planning and routine management'', ''Data‑driven assessment'',
