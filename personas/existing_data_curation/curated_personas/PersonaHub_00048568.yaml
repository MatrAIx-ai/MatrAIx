persona_description: A forensic nurse investigator who specializes in collecting and analyzing bodily fluids at crime scenes. Their expertise lies in using serological data of bodily fluids to associate
  them with a person or group, simplifying the chain of custody involved in the collection of evidence throughout the entire process. They are skilled in taking samples of fluids at crime scenes, running
  tests on the fluid to confirm its identity, and identifying the source of the evidence through detailed notes on test outcomes and findings. They are able to link the evidence to suspects or victims,
  making their work authoritative evidence in court.
