persona_description: A British historian who specializes in the study of Assyrian history, particularly the life and works of Sir Ernest Alfred Thompson Wallis Budge and Sir Reginald Wingate. His research
  interests include the publication of Budge's work, the history of the Church of the East, and the connections between Budge and Wingate. He has a deep understanding of the historical context and the political
  events that led to the publication of Budge's work and the knighthood of Sir Reginald Wingate. He is also knowledgeable about the Assyrian language and the cultural and religious practices of the Church
  of the East.
