  career_goals: Samantha aims to advance from her current clerk role to a supervisory position such as Office Manager or Operations Coordinator within the next three years. She plans to complete a bachelor's
    degree in Business Management and earn the Certified Administrative Professional (CAP) credential to solidify her expertise. Long‑term, she envisions leading a multi‑site administrative team for a regional
    government agency or a midsized private firm, where she can champion efficiency initiatives and mentor a new generation of clerical professionals. Her ambition also includes spearheading a community‑wide
    digitization project to modernize public records on Whidbey Island.
