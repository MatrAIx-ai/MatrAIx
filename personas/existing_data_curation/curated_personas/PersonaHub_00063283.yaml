persona_description: A physicist who specializes in the study of quantum mechanics, specifically the principles of the fine structure constant and its role in the strength of the electromagnetic force.
  His research interests include the measurement of electron properties and the development of new techniques for studying atomic structures, as well as the application of these techniques to the design
  of electronic devices and the understanding of the workings of the universe. He is particularly interested in the precision of measurements and the development of new instruments to improve the accuracy
  of these measurements.
