personas:
  professional: Jasmine Figueroa, a senior software quality assurance analyst with 25 years of experience in manual and automated testing, combines meticulous attention to detail, a data‑driven mindset,
    and bilingual communication to bridge multicultural teams, while her competitive nature fuels a relentless pursuit of zero‑defect releases and continuous process improvement.
  sports: Jasmine Figueroa stays active by attending weekly yoga classes at a downtown studio, cheering on the Cleveland Browns in fall football and the Guardians in spring baseball, and competing in a
    co‑ed recreational softball league with her neighbors on Saturday mornings.
  arts: Jasmine Figueroa paints tranquil watercolors of the Ohio shoreline after visits to the Cleveland Museum of Art, draws creative energy from the bold brushwork of Georgia O'Keeffe, and fills her evenings
    with the salsa rhythms of Marc Antonio Solís, the smooth boleros of Luis Miguel, and occasional live Latin‑jazz performances at the Blue Door Café.
  travel: Jasmine Figueroa plans her vacations with a blend of careful budgeting and spontaneous curiosity, favoring weekend getaways to the historic French Quarter of New Orleans and seasonal road trips
    along Lake Erie, while dreaming of strolling Cartagena’s colorful old town and embarking on a future culinary tour of Osaka’s street markets.
  culinary: Jasmine Figueroa, an avid home chef, expertly prepares arroz con gandules, pernil, and herb‑rich sofrito using fresh cilantro, garlic, and adobo, while also experimenting with Mediterranean
    risottos and ends her weekly salsa‑dancing evenings with a velvety flan dessert.
  core: Jasmine Figueroa balances fierce analytical rigor at work with spontaneous salsa dancing, a habit of double‑checking every spreadsheet, an occasional tendency to over‑schedule her days, and a secret
    stash of dark chocolate she dips into during late‑night coding sessions.
background:
  cultural: Jasmine is a first‑generation Puerto Rican American whose parents migrated to the United States in the 1970s. Raised in a bilingual household in Ohio, she grew up celebrating Puerto Rican holidays
    such as San Juan and Día de Los Santos, and she maintains strong ties to the island through family visits and participation in local Hispanic festivals. Her cultural upbringing emphasized community,
    music, and food, which she weaves into her daily life—whether cooking arroz con pollo for friends or sharing stories of Puerto Rico’s vibrant street art. Bilingual fluency in Spanish and English equips
    her to serve as a cultural liaison in the workplace, fostering inclusive communication and collaboration within diverse project teams.
attributes:
  skills: '[''Manual Testing'', ''Automated Testing (Selenium, Cypress)'', ''API Testing (Postman)'', ''SQL Querying'', ''Test Case Design'', ''Test Plan Development'', ''Defect Tracking (JIRA, TestRail)'',
    ''Agile/Scrum Methodologies'', ''Performance Testing'', ''Root‑Cause Analysis'', ''Metrics Reporting'', ''Python Scripting'', ''PowerShell Scripting'', ''Bilingual Communication (English/Spanish)'']'
  hobbies: '[''Watercolor painting'', ''Visiting art galleries'', ''Cooking Puerto Rican cuisine'', ''Listening to Latin jazz & salsa music'', ''Salsa dancing'', ''Solving puzzles (crosswords, sudoku)'',
    ''Gardening (roses, herbs)'', ''Volunteering at local Hispanic community center'', ''Exploring tech podcasts and online courses'']'
  career_goals: Jasmine aims to progress from senior QA analyst to QA Lead or QA Manager within the next 3–5 years, seeking to cultivate a high‑performing testing team that embraces innovative, data‑driven
    practices. She intends to earn ISTQB Advanced Test Analyst and Scrum Master certifications to strengthen her leadership credentials. Passionate about emerging AI‑assisted testing tools, she aspires
    to integrate machine‑learning‑based test case generation into her organization’s workflow, improving efficiency and coverage. She also hopes to mentor junior testers—especially women and Hispanic professionals—to
    increase diversity in tech. Finally, she seeks a role that offers flexible remote work to balance professional responsibilities with personal well‑being and community involvement.
