personas:
  professional: Annie Ramdeholl, a veteran clinical nurse and health informatics specialist, blends three decades of bedside expertise with data‑driven quality improvement, leveraging their curiosity for
    new health‑tech tools and their practical, team‑oriented approach while navigating a relaxed, sometimes disorganized workflow that they compensate for with strong interpersonal skills and a competitive
    drive to keep their department at the top of performance metrics.
  sports: Annie Ramdeholl, an avid outdoor enthusiast, spends weekends hiking the Coconino National Forest and snowshoeing in winter, competes in a co‑ed basketball league with the Flagstaff Falcons while
    they cheer on the Arizona Cardinals, Arizona Diamondbacks, and Phoenix Suns, and balances their competitive edge with a love for group fitness classes like community yoga.
  arts: Annie Ramdeholl nurtures creative expression through nightly photography of desert sunsets inspired by Ansel Adams, participates in drum and dance circles that echo the rhythmic patterns of R. Carlos Nakai,
    reads sci‑fi novels by Octavia Butler, and crafts beadwork while they listen to the ethereal sounds of the band Tortoise, all of which infuse their leisure time with a blend of visual, auditory, and
    literary art.
  travel: Annie Ramdeholl favors flexible, semi‑spontaneous trips that balance adventure with budget constraints, often planning short weekend getaways to nearby marvels like Sedona’s red rocks, the Grand
    Canyon, and New Mexico’s Albuquerque Balloon Fiesta, while they dream of longer explorations to the historic streets of Oaxaca, Mexico, and the cherry‑blossom festivals of Kyoto, Japan.
  culinary: Annie Ramdeholl enjoys cooking at a moderate skill level, frequently preparing traditional heritage dishes such as blue‑corn posole and sage‑infused roasted squash, while they experiment with
    modern twists like quinoa salad topped with grilled prickly pear and a cilantro‑lime vinaigrette, favoring ingredients like blue corn, sage, chilies, and locally foraged desert herbs.
  core: Annie Ramdeholl is a socially energized, curiosity‑driven nurse who juggles a love for community health, competitive DIY tech challenges, and desert‑inspired creativity, all while they wrestle with
    occasional disorganization and a tendency toward worry.
background:
  cultural: Annie identifies with her American Indian heritage, rooted in the traditions of several tribes of northern Arizona, including the Navajo and Hopi peoples. Growing up in a multigenerational household,
    she learned the importance of community reciprocity, respect for the land, and the holistic view of health that intertwines physical, mental, and spiritual well‑being. She regularly participates in
    powwows, tribal language classes, and ceremonial practices such as sage smudging, which inform her approach to patient care. This cultural foundation fuels her commitment to improving health outcomes
    for Indigenous populations, and it permeates her personal life through storytelling, traditional craftwork, and a deep connection to the desert environment surrounding Flagstaff.
