    ''Leadership and multidisciplinary team facilitation'', ''Conflict resolution and negotiation'', ''Evidence‑based practice implementation'']'
  hobbies: '[''Hiking in the Coconino National Forest'', ''Participating in tribal drum and dance circles'', ''Volunteering at community health fairs'', ''Cooking traditional Native American recipes'',
    ''Reading science‑fiction and medical non‑fiction'', ''Gardening native desert plants'', ''Playing basketball in a local co‑ed league'', ''Practicing yoga and mindfulness meditation'', ''Creating beadwork
    and other traditional crafts'', ''DIY health‑technology projects'', ''Attending local live‑music events'', ''Photography of desert landscapes'']'
  career_goals: Annie aims to become a certified Nurse Practitioner with a focus on primary care for American Indian communities in Arizona. She plans to lead the creation of a community health hub in Flagstaff
    that blends modern nursing with traditional healing practices, such as herbal medicine and ceremonial care. Over the next five years she aspires to take on a clinical nurse manager role, spearhead telehealth
    initiatives for remote reservations, and publish research on health disparities affecting Indigenous populations. Mentoring emerging nurses—especially those from underrepresented backgrounds—is a core
    ambition, as is securing funding for culturally tailored health‑education programs.
