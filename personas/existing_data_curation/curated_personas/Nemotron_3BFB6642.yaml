  hobbies: '[''Hiking'', ''Mountain biking'', ''Gardening'', ''Yoga'', ''Guided meditation'', ''Cooking (recipe‑focused)'', ''Crossword puzzles'', ''Sudoku'', ''STEM outreach volunteering'']'
  career_goals: Jaime aims to advance to a senior engineering technologist role within the next three years, leading small project teams on sustainable infrastructure or renewable‑energy installations in
    Colorado. She plans to obtain a Certified Engineering Technologist (CET) credential and a Six Sigma Green Belt to deepen her process‑optimization expertise. Long‑term, she envisions moving into a project‑manager
    position where she can ensure safety‑focused, predictably executed projects while mentoring junior technicians. A personal priority is to secure a workload that reduces chronic stress and affords more
    dedicated family time.
