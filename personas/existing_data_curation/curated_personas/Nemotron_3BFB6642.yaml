personas:
  professional: Jaime Denton, a 32-year-old engineering technologist, combines AutoCAD, SolidWorks, and PLC programming expertise with a methodical, low-stress project coordination style, delivering meticulously
    documented and lean-optimized prototypes for renewable-energy installations while fostering harmonious cross-functional teamwork.
  sports: Jaime Denton channels her love of the outdoors into weekly hikes and mountain-bike rides in the Foothills, proudly supports the Denver Broncos and Colorado Avalanche, and rides with the Boulder
    Bike Collective, maintaining a consistent cardio routine that balances her structured work schedule.
  arts: Jaime Denton relaxes to Yo-Yo Ma’s cello recordings, finds inspiration in John Denver’s folk ballads, and admires Ansel Adams’ black-and-white landscapes, often listening while tackling crosswords
    or attending community theatre productions of classic Shakespeare.
  travel: Jaime Denton prefers meticulously planned getaways that blend low-impact adventure with relaxation, such as weekend camping in Rocky Mountain National Park and a self-guided eco-tour of Iceland’s
    geothermal springs, while balancing a modest travel budget and family time.
  culinary: Jaime Denton is a precise home cook who delights in mastering dishes like rosemary-infused lamb roast, quinoa-and-wild-mushroom pilaf, and classic French soufflé, carefully measuring each ingredient
    and favoring seasonal Colorado produce such as heirloom tomatoes, fresh corn, and local honey.
  core: Jaime Denton blends a love of systematic engineering with a quiet obsession for order—whether aligning CAD layers or arranging garden rows—while battling occasional perfectionist procrastination
    and a lingering worry about overcommitting.
background:
  cultural: Jaime was raised in a middle‑class Anglo‑American family in the Midwest before relocating to Colorado for college. Her upbringing emphasized education, self‑reliance, and community involvement,
    values that shape her collaborative work style and commitment to local volunteer efforts. She identifies with the broader White American cultural tradition, celebrating holidays like Thanksgiving and
    the Fourth of July, while also embracing Colorado’s outdoors‑oriented lifestyle and environmental consciousness.
