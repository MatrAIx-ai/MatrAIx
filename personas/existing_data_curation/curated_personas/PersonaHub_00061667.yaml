persona_description: A Renaissance art historian who is deeply interested in the complex and nuanced relationship between Islamic and classical cultures during the time of Christ, and the ways in which
  these ideas were reflected in the art of Piero della Francesca. They are particularly skilled at identifying and analyzing the details and symbols that lie within the art, and are able to piece together
  a picture of the time and place of the painting. They are also skilled at interpreting and understanding the broader cultural and historical contexts in which the art was created.
