personas:
  professional: Jennifer Garcia, a seasoned residential and commercial painter transitioning to a sustainable painting and paper‑hanging consultancy, leverages deep expertise in surface preparation, color
    theory, low‑VOC materials, and bilingual client communication while they apply their curious yet practical mindset, organized yet flexible planning, and outgoing leadership to estimate project costs,
    schedule crews, ensure OSHA compliance, and mentor apprentices.
  sports: Jennifer Garcia hikes the San Gabriel Mountains with the Trailblazers Hiking Club, they follow the Los Angeles Lakers and Dodgers, they play occasional pickleball at the Glendale Community Center’s
    club, and they keep a flexible fitness routine that mixes weekend hill climbs with daily walks.
  arts: Jennifer Garcia immerses themselves in Glendale’s art festivals, they admire the murals of Diego Rivera, they enjoy the music of Celia Cruz and the contemporary choreography of Alvin Ailey, and
    they draw inspiration for eco‑paint techniques from the light installations of James Turrell.
  travel: Jennifer Garcia prefers road trips to nearby natural wonders like Joshua Tree National Park, they dream of wandering the colonial streets of Antigua, Guatemala, and they enjoy weekend getaways
    to Santa Barbara’s wine country, always balancing cultural immersion with relaxed nature hikes.
  culinary: Jennifer Garcia is an adept home cook who perfects pupusas and yuca frita, they love the aroma of fresh cilantro and roasted cumin, they experiment with low‑fat cheese blends, and they often
    host potluck nights where they serve homemade horchata alongside their dishes.
  core: Jennifer Garcia blends a pragmatic work ethic with a love for salsa rhythms and a green‑paint obsession, they tend to over‑schedule social commitments, yet they find quiet balance tending a small
    herb garden.
background:
  cultural: Jennifer’s cultural identity is rooted in her Salvadoran heritage, shaped by the close‑knit Latino community of Los Angeles County. Raised in a household where Spanish was spoken daily, she
    grew up participating in traditional celebrations such as Semana Santa, Día de Los Muertos, and the festive Feria de San Salvador, with family gatherings centered around pupusas, tamales, and marimba
    music. This background instilled values of familismo, respeto, and a strong work ethic, which she carries into her professional life. Living in Glendale, she blends these customs with mainstream American
    culture—attending local festivals, engaging in community service, and navigating a bicultural environment that celebrates both her Salvadoran roots and her identity as an American citizen.
