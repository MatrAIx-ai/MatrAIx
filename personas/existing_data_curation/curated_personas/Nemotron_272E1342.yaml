  hobbies: '[''salsa and cumbia dancing'', ''cooking Salvadoran cuisine'', ''gardening herbs and vegetables'', ''hiking in the San Gabriel Mountains'', ''volunteering for free home-painting projects'',
    ''attending Glendale art festivals'', ''reading historical fiction'', ''exploring eco-friendly paint techniques'', ''mentoring apprentices'', ''handcrafting pottery'']'
  career_goals: Jennifer aims to formalize her decades of field experience by establishing a boutique painting and paper‑hanging consultancy that emphasizes sustainable, low‑VOC materials and community‑focused
    projects. She seeks certification as a green painter, plans to develop a mentorship program for young Latino tradespeople, and hopes to lead mural initiatives that celebrate Salvadoran heritage in Glendale.
    Over the next few years she also wishes to transition to part‑time consulting, allowing her to share her expertise while maintaining a balanced, flexible schedule.
