personas:
  professional: James Steinberg, a 39‑year‑old chef based in the high desert of southern New Mexico, fuses Southwestern ingredients with avant‑garde techniques, excels at rapid menu development, farm‑to‑table
    sourcing, and meticulous plating, and channels his curious, competitive nature and relaxed approach to planning into a kitchen that is both inventive and occasionally chaotic.
  sports: James Steinberg, an avid hiker of the Las Cruces desert trails, belongs to the Southwest Trail Runners club, follows New Mexico United in the USL Championship, and squeezes in weekend pickup basketball
    games at the local community center to balance their solitary fitness routine.
  arts: James Steinberg nurtures their artistic side by painting food‑inspired still‑lifes echoing the bold colors of Georgia O’Keeffe, shooting analog photographs of bustling market stalls, attending intimate
    poetry readings that feature spoken‑word pieces by Sarah Kay, and savoring indie‑film screenings of Jim Jarmusch’s work at local galleries.
  travel: James Steinberg plans trips with a sketch‑filled journal that mixes meticulous itineraries and spontaneous detours, favoring desert‑rich locales like Sedona and the Atacama, dreaming of a culinary
    pilgrimage to Oaxaca’s mole markets and a weekend escape to Barcelona’s La Boqueria, yet their boutique restaurant ambitions and limited time often anchor them to New Mexico.
  culinary: James Steinberg’s culinary palate celebrates New Mexican terroir, coaxing flavors from Hatch green chiles, roasted cactus pads, and prickly pear into avant‑garde dishes such as mesquite‑smoked
    cornbread‑crusted duck confit with charred nopales, all plated with precise brushstrokes using a cherished vintage copper sauté pan.
  core: James Steinberg is a restless, art‑obsessed chef whose relentless curiosity fuels experimental cuisine, yet chronic anxiety and a habit of letting plans slip keep their creative fire both brilliant
    and precariously flickering.
background:
  cultural: James is a white American of Midwestern roots who relocated to Las Cruces, New Mexico, after attending some college. Immersed in the multicultural tapestry of the Southwest, he has adopted many
    local customs—from celebrating Día de los Muertos with his friends to incorporating indigenous corn and chile varieties into his cooking. Though his family background is largely Anglo‑American, his
    daily life reflects a blend of Hispanic, Native American, and contemporary New Mexican influences, shaping his artistic sensibility and culinary style.
