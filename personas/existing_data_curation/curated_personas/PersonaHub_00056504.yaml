persona_description: A scientist who studies the impact of forest debris on freshwater food chains. They are particularly interested in the elemental composition of organic carbon in lakes and how it affects
  the diets of fish. They have conducted research at Daisy Lake in Ontario, Canada and published their findings in the journal Nature Communications. They are aware of the importance of forests in supporting
  freshwater food chains and the potential impacts of human activities such as logging and mining on these ecosystems. They are concerned about the future of forests in the boreal areas due to climate change
  and the predicted intensification of human disturbances.
