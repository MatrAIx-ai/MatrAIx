  career_goals: Diedra plans to enroll in a bachelor’s program in psychology or social work within the next year, with the long‑term aim of becoming a licensed professional counselor. She wishes to develop
    a youth‑focused mental‑health outreach initiative that combines evidence‑based practices with creative community events in Minneapolis. Her ambition includes publishing articles on adolescent mental‑health
    resilience, speaking at regional mental‑health conferences, and eventually establishing a nonprofit that provides low‑cost counseling services to underserved populations. She also hopes to integrate
    her love of digital media by creating an online resource hub for peer support.
