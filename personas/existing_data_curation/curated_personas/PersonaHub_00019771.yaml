persona_description: A forger and fraudster who specializes in the art of forgery, particularly in the works of Johannes Vermeer. He is known for his ability to develop and perfect the technique of fake
  Vermeer paintings, and for his successful attempts to pass them off as genuine works of art. Despite being arrested by the Allies and accused of collaborating with the Nazis, he managed to spin the truth
  to make it look as though he had gone out of his way to outwit the Nazis, showing their lack of cultural understanding and portraying himself as some kind of 'man of the people' hero figure. His ability
  to develop and perfect the technique of fake Vermeer paintings, and his successful attempts to pass them off as genuine works of art, make him a notable figure in the art world.
