  hobbies: '[''Hip‑hop dance classes'', ''Salsa dance lessons'', ''Community garden volunteering'', ''Neighborhood block parties'', ''Jogging in Pelham Bay Park'', ''Yoga'', ''Exploring Brooklyn food scene'',
    ''Cooking experimental dishes'', ''Reading contemporary fiction'', ''Hosting game nights'', ''Movie marathons'']'
  career_goals: Simone aims to complete her associate degree in Business Administration and secure an entry‑level position as an administrative assistant or community program coordinator within a non‑profit
    organization serving the Bronx. Over the next five years, she plans to gain experience in project management and program development, pursue a bachelor's degree in Public Administration, and ultimately
    move into a program manager or Community Services Director role where she can lead initiatives that promote local education, health, and cultural activities.
