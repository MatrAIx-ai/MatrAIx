  hobbies: '[''building LEGO cities and forts'', ''exploring backyard nature trails and collecting specimens'', ''drawing and painting'', ''reading picture books about animals and machines'', ''watching
    kid‑friendly science shows'', ''making paper airplanes and clay models'', ''playing tag and simple board games with friends'', ''riding a bicycle around the neighborhood'', ''caring for the family dog'']'
  career_goals: Michael often talks about what he wants to be when he grows up. He imagines himself designing and building useful machines that help people, like a small‑scale engineer or inventor. He also
    loves animals and sometimes says he would like to be a veterinarian or a wildlife rescue worker, combining his curiosity about how things work with his caring nature. His ultimate ambition is to create
    something—whether a clever gadget or a comfortable home—that makes his family and community safer and happier. He hopes his future work will let him stay hands‑on, solve puzzles, and still have time
    to be kind to others.
