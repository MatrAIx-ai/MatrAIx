personas:
  professional: Michael Myers is a budding junior engineer‑in‑training who transforms couch cushion forts and elaborate LEGO cities into hands‑on lessons on simple machines, blending boundless curiosity
    with a relaxed, sometimes chaotic, approach to planning while ensuring every project stays kind‑hearted and inclusive.
  sports: Michael Myers loves playing tag in the backyard, riding their bike along the neighborhood streets, and participates in a community Little Tikes Soccer Club, while cheering for the New York Yankees
    in baseball and the Los Angeles Lakers in basketball, balancing energetic play with occasional structured practice sessions.
  arts: Michael Myers spends rainy afternoons painting watercolors of forest scenes inspired by the vibrant illustrations of Eric Carle and Dr. Seuss, listens to cheerful songs by Raffi and The Wiggles
    while building clay models, and enjoys watching animated shorts starring the beloved Sesame Street characters, weaving a colorful tapestry of creativity into daily life.
  travel: Michael Myers dreams of exploring the towering cliffs of Grand Canyon National Park after a memorable family weekend trip to the nearby state park, hopes to meet the characters at Walt Disney
    World in Orlando, and enjoys day‑long bike rides to the local beach where they collect seashells, balancing adventure with the comfort of short, family‑friendly travels.
  culinary: Michael Myers delights in assembling peanut‑butter and banana sandwiches, slurping spaghetti with marinara sauce, and occasionally helping mom whisk together a simple chocolate‑chip cookie batter,
    while favoring crunchy carrots with hummus and savoring the occasional slice of pepperoni pizza, though they sometimes overindulge in sugary treats.
  core: Michael Myers is a curious, kind‑hearted six‑year‑old who builds elaborate forts, worries about tiny details, and navigates the world with a playful yet occasionally disorganized spirit.
background:
  cultural: Michael is a White boy growing up in Dubach, a small town in Lincoln Parish, Louisiana. His family has deep Southern roots, with generations of farm and small‑business owners who value community,
    hospitality, and faith. He attends a local Baptist church where Sunday services, potluck meals, and gospel music are a regular part of life. Family gatherings often feature Southern comfort foods such
    as fried chicken, biscuits, and gumbo, and community events like the annual parish fair and high school football games are common sources of excitement. The warm, humid climate and nearby pine forests
    give Michael easy access to outdoor activities like fishing, hiking, and nature walks, shaping his love for exploring the natural world. While his cultural environment is predominantly Southern, his
    family encourages curiosity and learning, supporting his interests in science, animals, and hands‑on projects.
attributes:
  skills: '[''building LEGO structures'', ''reading simple sight‑words'', ''counting to 100'', ''riding a bicycle with training wheels'', ''using child‑safe scissors and glue for crafts'', ''navigating
