  career_goals: Approaching retirement, Seth aims to secure a role that offers a predictable schedule while allowing him to pass on his knowledge. He plans to obtain an OSHA 30‑hour certification and a
    journeyman‑level welding credential, positioning himself for a supervisory foreman position or a small subcontracting venture focused on residential remodels. Financially, he wants to maximize his pension
    and savings to reduce future stress. He also hopes to mentor younger workers, emphasizing safety and craftsmanship.
