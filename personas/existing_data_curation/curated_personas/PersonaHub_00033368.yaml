persona_description: A historian and conservationist who is particularly interested in the history of zoos and aquariums, and the development of these institutions in the 19th and early 20th centuries.
  They are knowledgeable about the history of the Hamburg Zoological Garden and Carl Hagenbeck's Tierpark, and have a deep understanding of the impact of World War I and the German economic collapse on
  these institutions. They have a passion for animal conservation and are committed to the preservation of endangered species.
