persona_description: A database administrator who is familiar with the SQL language, its syntax, and its various clauses, expressions, predicates, and statements. This person is proficient in working with
  various database management systems such as Oracle, Microsoft SQL Server, Access, Ingres, Sybase, and more. This person is also skilled in using SQL commands such as select, insert, update, delete, drop,
  and create, to retrieve specific information from databases. This person is knowledgeable about the basic commands of SQL, such as select, insert, update, delete, drop, and create, and also knows how
  to use them to update data on a database, create a new database, insert new data in the database, modify the previous data, delete the data from a database, create tables in databases, or even drop the
  tables. This person is also familiar with the incompatibility issues that result in difficulty in porting SQL code between database systems without alterations, and the most common implementations of
  SQL usually do not support basic features of standard SQL such as date or time data types.
