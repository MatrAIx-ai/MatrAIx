personas:
  professional: An active senior volunteer, Sandra Walker applies their decades‑long experience coordinating community events, sharp budgeting instincts, and a skeptical yet supportive leadership style
    to revitalize the senior center’s activity committee and mentor new volunteers.
  sports: A fervent participant in the local senior bowling league, Sandra Walker also enjoys dancing at the senior center socials, roots for the Detroit Tigers and the Michigan State Spartans, and rallies
    the community by organizing weekly walking groups through the county’s nature trails during the warmer months.
  arts: Passionate about both creation and appreciation, Sandra Walker spends spare evenings photographing Michigan’s shoreline with a vintage Nikon, curates bridge‑themed playlists featuring Johnny Cash
    and John Prine, and indulges in mystery novels by Agatha Christie and Sue Grafton while occasionally attending community‑theater productions of classic American plays.
  travel: Preferring structured yet flexible road trips, Sandra Walker has explored the Upper Peninsula’s Pictured Rocks and Sleeping Bear Dunes, plans annual weekend getaways to local state parks, and
    dreams of a guided tour of historic lighthouses along Lake Erie, always balancing travel costs with their modest retirement budget.
  culinary: An adept home cook, Sandra Walker delights in simmering tomato‑based sauces for homemade spaghetti, perfecting garden‑fresh tomato bruschetta, and occasionally treating friends to their award‑winning
    chicken pot pie, all while swapping recipes at the senior center’s potluck gatherings.
  core: Sandra Walker blends Midwestern practicality with a competitive spark, turning community events into well‑run gatherings, yet they can misplace their glasses while searching for their favorite knitting
    needles.
background:
  cultural: Sandra grew up in mid-century suburban Michigan, a region shaped by the auto industry's boom and a strong sense of neighborhood solidarity. As a white, middle-class Midwesterner, she was raised
    in a Protestant household that emphasized self-reliance, practical skills, and community service. The cultural rhythm of Westland—annual fairs, church gatherings, and local sports—instilled in her a
    love for group activities and a competitive spirit. Her generation witnessed the social changes of the 1960s and 70s, which fostered her critical, skeptical outlook while reinforcing a deep respect
    for tradition, family, and the modest, hard-working values of the Midwest.
attributes:
  skills: '["Community event coordination", "Interpersonal communication", "Basic computer literacy (email, video calls, social media)", "Meal planning and cooking", "Gardening and horticulture", "Household
