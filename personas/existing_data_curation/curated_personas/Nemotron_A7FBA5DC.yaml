  hobbies: '["Senior center dance socials", "Bowling league", "Bridge and bingo tournaments", "Gardening (vegetables and native plants)", "Recipe sharing and cooking", "Volunteering at community soup kitchen",
    "Local history walking tours", "Mystery novels", "Digital photography", "Weekend trips to Michigan state parks"]'
  career_goals: Although retired from formal employment, Sandra aims to remain a vibrant contributor to her community. She plans to lead the senior center's activity committee, mentor new volunteers, and
    secure a seat on the board of the local aging services nonprofit. Sandra also wants to earn a caregiver certification so she can assist neighbors more formally. On a personal level, she hopes to win
    the regional senior bridge tournament, document her family's history in a memoir, and master digital photography to capture Michigan's lakes and parks. Maintaining her independence, health, and social
    connections is central to her ambitions.
