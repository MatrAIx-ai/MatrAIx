  hobbies: '[''Gardening'', ''Crocheting'', ''Reading Historical Fiction'', ''Crossword Puzzles'', ''Cooking Southern Cuisine'', ''Church Participation'', ''Volunteering at Food Bank'', ''Community Festival
    Attendance'', ''Evening Walks by Neuse River'', ''Birdwatching'']'
  career_goals: Wanda aims to transition into a supervisory or lead role within the warehouse before retirement, focusing on mentoring younger staff and implementing process improvements that increase efficiency.
    She plans to obtain a Certified in Production and Inventory Management (CPIM) credential and to complete a forklift certification course. Additionally, she hopes to gradually reduce her hours to a part‑time
    schedule that allows more time for community volunteering and family.
