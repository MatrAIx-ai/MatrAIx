personas:
  professional: Wanda Flippen, a seasoned warehouse logistics specialist with three decades of hands‑on shipping, receiving, and inventory control experience, leverages their knack for structured processes
    and practical problem‑solving while embracing a relaxed attitude toward strict scheduling, and now seeks to step into a supervisory role to mentor younger staff and implement efficiency improvements
    as they pursue CPIM certification and forklift training.
  sports: Wanda Flippen enjoys cheering on the Carolina Hurricanes during the NHL season and the nearby Greenville Drive minor‑league baseball team, participates in the New Bern Riverwalkers walking club
    for low‑impact fitness, and occasionally plays pickleball at the community center to stay active, preferring gentle, social exercise over high‑intensity sports.
  arts: Wanda Flippen immerses themselves in creative pursuits through crochet and knitting circles where they exchange patterns inspired by historic textile traditions, devours historical fiction by authors
    such as Philippa Gregory and Ken Follett, attends local performances by the New Bern Academy of Music featuring fiddlers like Ricky Skaggs, and finds solace in the soulful gospel choir of their church.
  travel: Wanda Flippen favors low‑key weekend getaways to nearby gems such as the Outer Banks lighthouse at Ocracoke and the art‑filled streets of Asheville, while dreaming of a summer tour of historic
    European towns like Bath and York, planning those longer trips well in advance due to family commitments yet appreciating spur‑of‑the‑moment river cruises whenever a free weekend opens up.
  culinary: Wanda Flippen prepares classic Southern fare—crispy fried chicken, collard greens simmered with smoked ham hocks, flaky buttermilk biscuits, and peach cobbler topped with cinnamon—sourcing fresh
    okra from their own garden, confidently whisking roux for chicken‑and‑dumplings, and delighting volunteers at the food bank with hearty, home‑cooked meals.
  core: Wanda Flippen merges a lifelong love of orderly logistics with a relaxed devotion to garden‑fresh cooking, crochet circles, and community service, all while juggling a gentle battle with a forgetful
    medication schedule and a stubborn penchant for buying extra yarn.
background:
  cultural: Wanda grew up in a close‑knit, working‑class family in the coastal town of New Bern, where Southern hospitality and community values were emphasized. Her upbringing reflected the traditions
    of the inner‑Coastal Plain of North Carolina—a region known for its historic colonial roots, strong church involvement, and a love of regional foods like shrimp and grits and barbecue. While she identifies
    as white, she has been shaped by the multicultural rhythms of a river town, valuing respect, modesty, and a sense of duty to family and neighbors.
attributes:
