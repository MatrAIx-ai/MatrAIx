  hobbies: '[''painting'', ''poetry writing'', ''experimenting with Mexican recipes'', ''attending cultural festivals'', ''folk and contemporary dancing'', ''herb and edible flower gardening'', ''reading
    speculative fiction'', ''improvisational drama'', ''neighborhood block parties'']'
  career_goals: Maria aspires to formalize her creative talents while deepening her role in the local community. She plans to enroll in a GED program to obtain her high-school equivalency, then set up a
    modest home studio where she can produce and sell original artwork and handcrafted items through an online marketplace. She hopes to lead a weekly storytelling circle for children at the community center
    and to volunteer as a facilitator for neighborhood art workshops that celebrate Mexican cultural heritage. Over the longer term, she envisions a part-time position teaching basic art techniques at the
    local community college or cultural center, integrating her artistic practice with her love for mentorship and cultural preservation.
