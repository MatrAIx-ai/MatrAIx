  career_goals: She dreams of becoming an artist who creates stories for children, or a teacher who inspires curiosity, while also imagining a role where she can help kids in her community, such as a pediatric
    nurse or youth program coordinator. Tania is motivated to blend creativity and compassion, often picturing herself designing educational murals that make learning fun and uplifting.
