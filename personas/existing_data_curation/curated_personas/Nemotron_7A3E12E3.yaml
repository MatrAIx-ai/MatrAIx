personas:
  professional: Tania Ferguson, a budding nine‑year‑old illustrator, channels a curious eye for nature and unconventional storytelling into meticulously organized sketchbooks, balances school responsibilities
    with a reliable role as a buddy‑program mentor, and uses their compassionate nature to create art that celebrates friendship and harmony.
  sports: Tania Ferguson plays forward for the Willow Creek Wildcats youth soccer club, values teamwork and quietly supports teammates from the sidelines, and is an avid fan of the Los Angeles Dodgers,
    often drawing parallels between the precision of a perfect baseball pitch and the delicate lines they capture in their nature drawings.
  arts: Tania Ferguson immerses herself in drawing by emulating the whimsical landscapes of Hayao Miyazaki, the bold panel layouts of graphic novelist Marjane Satrapi, and the melodic simplicity of Ludovico
    Einaudi’s piano pieces, which together shape her artistic identity and fuel her love for storytelling.
  travel: Tania Ferguson prefers small, nature‑focused trips, such as weekend hikes in the Great Smoky Mountains and family visits to the Monterey Bay Aquarium, while dreaming of exploring the bamboo forests
    of Arashiyama in Japan when they’re older.
  culinary: Tania Ferguson enjoys helping in the kitchen by making vegetable stir‑fry with carrots from their garden, crafting homemade spaghetti carbonara topped with freshly grated Parmesan, and experimenting
    with chocolate chip cookie dough, though they often forget to set a timer and end up with slightly crispy edges.
  core: Tania Ferguson is a curious, compassionate nine‑year‑old artist‑scientist who balances meticulous sketching and gardening with a habit of misplacing their glasses and a relentless drive to help
    friends.
background:
  cultural: Tania’s cultural background is rooted in African‑American traditions of Durham, North Carolina. She participates in community events at the local church, celebrates family gatherings with soul‑food
    meals and storytelling, and is exposed to a range of music from gospel and R&B to contemporary hip‑hop. The city’s rich civil‑rights history and vibrant Black arts scene shape her appreciation for creativity
    and social harmony. Her family emphasizes community support, respect for elders, and the importance of education, all of which influence her outlook and daily life.
attributes:
  skills: '["Reading comprehension", "Creative writing", "Basic arithmetic", "Drawing and painting", "Crafting", "Block-based coding", "Conflict mediation", "Team collaboration", "Responsibility"]'
