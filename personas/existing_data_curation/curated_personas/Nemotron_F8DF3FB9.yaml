personas:
  professional: Charles Hodge is an aspiring junior engineer who transforms his love for LEGO and Minecraft into meticulously planned projects, applying his organized, methodical nature to school science
    fairs and community maker clubs, and they consistently volunteer to help classmates with building tasks.
  sports: Charles Hodge plays forward for the Garrison Rovers U10 soccer club, trains twice a week with a focus on teamwork and reliability, cheers on the St. Louis Cardinals during baseball season and
    the Kansas City Chiefs for football, and they also enjoy casual bike rides on weekend family outings.
  arts: Charles Hodge dives into adventure novels like "Percy Jackson", sketches leaves and insects from nature walks with a pocket notebook, enjoys listening to "Imagine Dragons" and Disney soundtracks,
    and they participate in the church’s Sunday school drama where they recite hymns such as "Amazing Grace".
  travel: Charles Hodge loves weekend trips to the county fair and the St. Louis Zoo, has explored the Ozark trails during family hikes, dreams of visiting Washington D.C.’s National Air and Space Museum,
    and they meticulously map out each outing with crayons in a travel diary.
  culinary: Charles Hodge favors classic kid meals like mac and cheese, chicken nuggets, apple slices, and homemade pizza topped with pepperoni and fresh basil, helps stir batter for the church potluck’s
    banana bread, and they adore collecting crunchy pretzels and cheese cubes for snack mixes.
  core: Charles Hodge is a methodical nine‑year‑old who balances adventurous reading and nature curiosity with precise LEGO engineering, all while staying grounded in community values and a practical approach
    to daily life.
background:
  cultural: Charles grew up in Garrison, a small town in Christian County, Missouri, within a predominantly white, middle‑class, Christian community. His family’s values emphasize hard work, neighborly
    support, and modesty, shaped by the region’s agricultural heritage and local church life. Community events such as the county fair, church picnics, and school volunteer projects play a central role
    in his social world. The Midwestern culture of self‑reliance paired with strong communal ties influences his organized, reliable demeanor and his desire to contribute positively to his neighborhood.
