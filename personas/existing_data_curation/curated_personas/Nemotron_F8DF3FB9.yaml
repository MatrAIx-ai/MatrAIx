  hobbies: '[''Reading adventure books'', ''LEGO building'', ''Soccer'', ''Nature exploration'', ''Sketching'', ''Minecraft'', ''Sunday school'']'
  career_goals: Charles is already thinking about careers that let him build and help others. He dreams of becoming an engineer—especially mechanical or civil—so he can design structures he sees in his
    community. He also loves animals and imagines a future as a veterinarian, combining his kind, cooperative nature with scientific curiosity. In the short term, he aims to excel in school, win a science
    fair project, and become a class helper, laying a reliable foundation for his long‑term ambitions.
