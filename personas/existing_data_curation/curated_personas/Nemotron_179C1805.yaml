  career_goals: Dennis aims to obtain Certified Nursing Assistant (CNA) certification within the next year, followed by enrollment in an associate’s degree program to become a Licensed Practical Nurse (LPN).
    He is particularly interested in geriatric and hospice care, hoping to specialize in end‑of‑life support where his empathy and reliability can make a difference. Long‑term, Dennis envisions moving into
    a supervisory role within a home‑health agency or eventually opening his own small home‑care business that emphasizes person‑centered, evidence‑based care. He also plans to develop leadership and stress‑management
    skills to handle the emotional demands of the field.
