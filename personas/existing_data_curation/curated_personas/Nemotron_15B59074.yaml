personas:
  professional: Jose Alcala, an aspiring graphic designer and visual communicator, translates their love for street art and digital illustration into freelance projects for local businesses, leveraging
    Photoshop, Illustrator, and bilingual communication while balancing meticulous organization with a willingness to experiment.
  sports: Jose Alcala, a weekend hiker and member of the Spokane Outdoor Club, tackles the foothills' trails with a backpack and camera, follows the Spokane Chiefs for hockey thrills and the Seattle Seahawks
    for NFL action, and they squeeze in occasional pickup soccer games at the local park.
  arts: Jose Alcala, an avid sketcher of urban murals, finds inspiration in the bold colors of Shepard Fairey, the narrative depth of graphic novelist Mike Mignola, the atmospheric synth of Tame Impala,
    and the rhythmic storytelling of traditional folk music played on the guitarrón at family gatherings, and they channel these influences into both physical sketches and digital compositions.
  travel: Jose Alcala prefers spontaneous road trips, often driving the Pacific Coast Highway to explore the rain‑soaked streets of Seattle and the artistic enclaves of Portland, while they dream of a backpacking
    adventure through the historic alleys of Oaxaca and the vibrant night markets of Bangkok.
  culinary: Jose Alcala, a confident home chef, spends weekends perfecting family‑style tamales and enchiladas with handmade masa, chipotle‑infused salsa, and roasted corn, while they experiment with fusion
    twists like kimchi‑topped tacos and quinoa‑filled empanadas, and they always finish a meal with fresh mango slices drizzled with lime.
  core: Jose Alcala blends an artistic soul with meticulous organization, and they juggle sketchbooks, code snippets, and a never‑ending quest for the perfect taco, all while humming indie melodies and
    secretly hoarding extra coffee beans for late‑night design sprints.
background:
  cultural: Jose grew up in a Mexican immigrant household in Spokane, where Spanish was spoken at home and Mexican customs were celebrated. Family gatherings, weekly meals, and participation in cultural
    events like Cinco de Mayo and Día de los Muertos reinforced strong family ties and a sense of cultural pride. The family observes Catholic traditions and values of respeto, personal responsibility,
    and community support. His Mexican heritage influences his culinary preferences, musical tastes, and aesthetic sensibilities, while his life in the Pacific Northwest has fostered an appreciation for
    outdoor recreation and the local arts scene.
