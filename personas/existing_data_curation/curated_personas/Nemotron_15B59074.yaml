    art galleries'']'
  career_goals: Jose aspires to enroll in a community college program in graphic design or visual communication, eventually working as a graphic designer or visual artist for culturally focused organizations.
    He hopes to blend his Mexican heritage with contemporary art to produce culturally resonant designs, perhaps at a museum or cultural center in the Pacific Northwest. He also aims to build a freelance
    portfolio offering design services to small businesses, and to explore a role as a community outreach coordinator that leverages his bilingual skills and passion for inclusive artistic expression.
