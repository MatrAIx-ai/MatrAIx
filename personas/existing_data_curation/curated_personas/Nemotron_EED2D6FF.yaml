  hobbies: '[''Basketball'', ''Hiking'', ''Model building'', ''Video gaming'', ''Cooking'', ''Volunteer at animal shelter'', ''Community events'', ''Music listening'', ''DIY electronics'', ''Improv theater'']'
  career_goals: Andy aims to enroll in a trade apprenticeship—preferably as an electrician or HVAC technician—so he can apply his practical problem‑solving skills while earning a stable income. He plans
    to supplement the apprenticeship with part‑time community college courses in business management, with the long‑term ambition of launching his own residential home‑improvement service that serves his
    hometown and neighboring communities. Alongside his technical goals, Andy wants to stay engaged in community work, perhaps mentoring younger students or volunteering at the local animal shelter, and
    he seeks to develop coping strategies for stress through mindfulness and counseling workshops.
