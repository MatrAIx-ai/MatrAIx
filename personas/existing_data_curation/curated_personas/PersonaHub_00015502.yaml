persona_description: A radiation oncologist who has conducted research on the effectiveness of stereotactic radiation therapy in treating early-stage lung cancer in elderly patients. They have published
  a study comparing the two treatments and found that stereotactic radiation is as good as surgery, but with a higher risk of death in the first 30 days. They are encouraged by the results and believe that
  patients with early lung cancer should consider radiation therapy as a treatment option.
