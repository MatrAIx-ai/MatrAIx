  career_goals: Although still very young, Xiaobing often talks about becoming an astronaut who not only explores space but also builds his own rockets, blending his love of discovery with a practical desire
    to create. He also imagines helping others as a teacher or community helper, showing his compassionate side. His pragmatic streak leads him to consider careers where he can make tangible things, such
    as an engineer or carpenter. Overall, his ambitions are fluid, but they consistently reflect a balance of curiosity, hands‑on creation, and a wish to be respected by his friends.
