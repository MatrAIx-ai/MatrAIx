persona_description: A concussion expert and professional athlete who has suffered from the injury, attending the London Hockey Concussion Summit and participating in the stakeholders' meeting. They are
  familiar with the Hockey Neurotrauma and Concussion Initiative (HNCI) and its research committee, the Hockey Concussion Education Project (HCEP), and the Sport Concussion Library, which contain published
  peer-reviewed information on the topic of concussion in sport. They are interested in the latest research and developments in the field of concussion and are eager to learn more about the HCEP's direct
  observation, diagnosis, documentation, and sequential treatment of concussion in junior-level hockey.
