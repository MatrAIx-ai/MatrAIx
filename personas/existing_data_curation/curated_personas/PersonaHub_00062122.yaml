persona_description: A member of the National Institutes of Health (NIH) Data and Informatics Working Group, focusing on the goals of the BD2K program, which aims to promote the fair finding, access, sharing,
  incorporation, and re-use of digital content and analytical tools within the entire spectrum of health care. They are passionate about leveraging big data to improve health outcomes, but are also aware
  of the challenges faced in this process, such as the lack of qualified professionals and the need for more education on the implications of the shift towards analytics. They are excited about the potential
  of big data in health care and are looking forward to the initiatives that will be launched during 2016, such as privacy and bringing in different types of professionals with experience in analytics.
