persona_description: A philanthropist and community organizer who played a significant role in the civil rights movement in the United States, particularly in the state of Georgia. Slater King was the founder
  of the New Communities, Inc. and was instrumental in the creation of the first community land trust. He was known for his involvement in the Albany Movement, which was the first mass movement in the modern
  civil rights era to have as its goal the complete desegregation of an entire city. King was also involved in the planning of the New Communities, Inc. and was a part of the American delegation that traveled
  to Israel to study moshavim and kibbutzim, cooperative agricultural settlements on leased land. He was killed in an automobile accident in 1969, leaving behind a legacy of community development and civil
  rights activism.
