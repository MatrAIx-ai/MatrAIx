personas:
  professional: An aspiring digital artist and budding 3D animator, Kenny Simien leverages their curiosity and methodical planning to sketch daily, master Blender, and craft looping animations while balancing
    school projects and community art workshops, consistently meeting self‑set milestones.
  sports: Kenny Simien practices basketball three times a week at the neighborhood park, emulating moves from NBA star Jamal Murray while cheering for the Denver Nuggets, and also competes in the local
    youth chess league, preferring solo skill drills over full‑team scrimmages.
  arts: Kenny Simien draws inspiration from sci‑fi graphic novels like 'Saga' and the animated classics of Hayao Miyazaki, admires the bold line work of Alex Ross and the vibrant color palettes of Mary
    Blair, and channels this blend into original character sketches that combine jazz‑band aesthetics with futuristic motifs, often showcasing the pieces at the Aurora Arts Center.
  travel: Weekend hikes in Rocky Mountain National Park fuel Kenny Simien's love of sweeping landscapes, while they dream of a future study‑abroad program in Tokyo to dive into manga culture and a summer
    animation camp in San Francisco, yet budget constraints keep their international travel ambitions on hold.
  culinary: Kenny Simien enjoys crafting homemade tacos with carnitas, avocado, and fresh cilantro, experiments with a miso‑based ramen broth using kombu and shiitake, but often burns toast while multitasking
    between sketching and homework, revealing a developing yet quirky kitchen skill set.
  core: Kenny Simien is a detail‑driven teen who balances a relentless curiosity for digital art with a competitive edge in basketball, a disciplined budget, and a knack for turning everyday routines into
    creative experiments, even if that sometimes means staying up late to perfect an animation loop.
background:
  cultural: Kenny is a second‑generation African‑American whose parents moved to Aurora from the Midwest. His family maintains strong ties to Black cultural traditions, celebrating Juneteenth, Black History
    Month, and gospel music at church. Growing up in Arapahoe County, he has been exposed to a diverse community that blends Western Colorado influences with the vibrant artistic scene in the Denver metro
    area. His mother’s love for soul food and his father's involvement in a local youth mentorship program have shaped his appreciation for community service and cultural expression. Kenny often visits
    the Aurora History Museum’s African‑American exhibits and participates in the city’s annual Arts Festival, where he showcases his artwork and connects with other young Black creators.
attributes:
  skills: '[''Digital illustration (Procreate, Photoshop)'', ''Basic programming (Scratch, introductory Python)'', ''Piano (intermediate)'', ''Basketball fundamentals and strategy'', ''Chess strategy and
