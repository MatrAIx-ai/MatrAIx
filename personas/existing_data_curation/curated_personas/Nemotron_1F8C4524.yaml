  hobbies: '[''Sketching and digital illustration'', ''3D modeling and animation'', ''Science‑fiction and graphic novel reading'', ''Listening to jazz, hip‑hop, and classical music'', ''Playing chess'',
    ''Basketball practice and games'', ''Attending art workshops'', ''Volunteering at youth outreach programs'']'
  career_goals: Kenny aspires to merge his love for art and technology by becoming a video game designer or interactive media artist. He plans to attend a magnet high school in Denver that emphasizes STEM
    and arts, then pursue a degree in Computer Science with a minor in Graphic Design. He also dreams of earning a scholarship to a university where he can develop his own indie games that highlight diverse
    cultural narratives. Concurrently, he hopes to earn a spot on his high school varsity basketball team and eventually play at the collegiate level.
