  career_goals: David aims to obtain his GED within the next year and use his organizational strengths to secure a stable role in logistics or operations, such as a warehouse supervisor or inventory coordinator.
    He plans to earn an entry‑level certification in project management to eventually transition into a community event‑management position. In the longer term, he hopes to launch a small fitness‑coaching
    side business that merges his competitive mindset with his desire to help others improve their health. Alongside career advancement, he intends to develop effective coping strategies for anxiety and
    become an advocate for mental‑health awareness within his local community.
