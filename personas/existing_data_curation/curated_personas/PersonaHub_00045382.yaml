persona_description: This text is likely to be of interest to education practitioners who are interested in improving gender equity in schools and are looking for resources and tools to support them in
  their work. They may be teachers, teacher trainers, school management staff, and education policymakers. The text provides a range of resources and tools that can be used to cultivate gender-responsive
  pedagogy, including the FAWE Gender-Responsive Pedagogy (GRP) teachers’ Handbook, the Commonwealth of Learning (Canada) Gender Mainstreaming Toolkit for Teachers and Teacher Educators, and the Discovery
  Learning Alliance resources. The text also mentions the need for feedback and continuous improvement, which suggests that the resources are intended to be used by organisations to improve the quality
  and range of tools available on the issue of gender responsiveness in education.
