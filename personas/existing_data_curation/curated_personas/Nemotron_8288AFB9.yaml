  career_goals: Georgine aims to transition from hands‑on site management to a senior consultancy role where she can mentor emerging construction leaders and champion workplace safety and mental‑health
    initiatives. She plans to earn PMP and LEED AP credentials to lead large‑scale sustainable infrastructure projects in Central Florida. Ultimately, she envisions launching her own consulting firm focused
    on integrating disciplined project delivery with compassionate, employee‑centric practices, positioning herself as a thought leader in building resilient, humane construction environments.
