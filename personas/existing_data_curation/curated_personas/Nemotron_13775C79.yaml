    support'']'
  hobbies: '[''Quilting'', ''Knitting scarves and blankets'', ''Crossword and jigsaw puzzles'', ''Reading historical fiction'', ''Gardening (vegetable and flower beds)'', ''Baking Southern desserts'', ''Volunteer
    work at local church'', ''Genealogy research'', ''Weekly senior reading group'', ''Watching classic movies'']'
  career_goals: Natalia aims to maintain a steady part‑time data‑entry position that provides financial security while allowing a reduced physical load. She hopes to transition into a quality‑control or
    training role where she can mentor younger staff and share her best‑practice methods. Parallel to her professional aims, she plans to increase her volunteer administrative work at her church and the
    local senior center, possibly creating a community bulletin system and offering occasional freelance bookkeeping for nearby small businesses. Over the next few years she envisions semi‑retirement that
    balances reliable income with deeper community service and mentorship.
