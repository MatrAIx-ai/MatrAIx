persona_description: A historian and activist who specializes in the study of nonviolent action and the history of civil disobedience, particularly focusing on the use of peaceful protest and civil disobedience
  to achieve social change. She has a deep interest in the role of nonviolent conflict in various historical and contemporary contexts and has contributed to the GNAD (Global Nonviolent Action Database)
  project, which aims to catalog documented cases of nonviolent action from around the world. Her work has been recognized with awards, including a Eugene M. Lang Summer Initiative Award, and she has used
  GNAD to support her activism with Decarcerate Pennsylvania, an organization that aims to end the building of new prisons in Pennsylvania.
