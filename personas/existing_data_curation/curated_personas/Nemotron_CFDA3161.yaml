personas:
  professional: Jose Torres is a part‑time home‑repair contractor who blends his practical carpentry, plumbing, and automotive know‑how with a relaxed, flexible schedule that lets him prioritize family,
    while his bilingual fluency and friendly demeanor make him a go‑to fixer for neighbors and a potential mentor in community workshops.
  sports: Jose Torres is an avid football fan who roots for the Dallas Cowboys in the NFL and follows Liga MX’s Club América, often watching games at the local bar, while also joining a casual weekend soccer
    pick‑up league at the community center and cheering on the Houston Astros during baseball season.
  arts: Jose Torres immerses themselves in regional folk music, frequently playing the songs of Vicente Fernández and Lila Downs while gardening, and enjoys leafing through DIY manuals like *The Complete
    Manual of Woodworking*, as well as attending local cultural festivals showcasing traditional dance and art.
  travel: Jose Torres prefers road‑trip adventures that balance family time and culinary curiosity, having driven to the Texas Hill Country for wine tasting, toured the historic missions of San Antonio,
    and dreaming of a future visit to Oaxaca to explore its vibrant markets and spice blends.
  culinary: Jose Torres experiments in the kitchen by fusing Texan barbecue with traditional dishes, regularly preparing carne asada tacos with smoked brisket, chili con carne spiced with ancho chilies,
    and homemade salsa verde using tomatillos and cilantro, while their cooking skill sits at an enthusiastic intermediate level.
  core: Jose Torres is a hands‑on, bilingual handyman‑chef who juggles backyard gardening, modest home‑repair gigs, and community service with a laid‑back, family‑first attitude and a habit of over‑indulging
    in seasonal food festivals.
background:
  cultural: Jose grew up in a close‑knit Mexican‑American family in Dallas, where Spanish was spoken daily and Mexican traditions were celebrated alongside Texan customs. He observes holidays such as Día
    de los Muertos and Mexican Independence Day with family gatherings, and he incorporates those cultural flavors into his cooking and community involvement. His upbringing emphasized respect, cooperation,
    and a strong sense of community, which continue to shape his interactions and his desire to give back to the local neighborhood.
attributes:
  skills: '[''Carpentry'', ''Plumbing repairs'', ''Automotive maintenance'', ''Bilingual translation (Spanish/English)'', ''Mexican cuisine cooking'', ''Budgeting and small‑business planning'']'
