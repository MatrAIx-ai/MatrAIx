    books'', ''Cooking traditional dishes'', ''Attending local cultural festivals'']'
  career_goals: Jose seeks flexible, low‑pressure work that lets him stay close to his family while leveraging his hands‑on abilities. He hopes to launch a part‑time home‑repair service or a small cooking‑class
    venture that can be scheduled around his marital commitments. Additionally, he wishes to mentor local youth through community center workshops, sharing both his practical know‑how and his cultural heritage.
