persona_description: A public health researcher with expertise in drowning prevention and public health policy. Dr Franklin's research interests include the study of drowning deaths in Australia, the effectiveness
  of drowning prevention strategies, and the role of geographical disbursement, weather factors, and the diversity of activities in drowning incidents. He is interested in conducting further research into
  river drowning deaths and developing targeted interventions to reduce drowning deaths.
