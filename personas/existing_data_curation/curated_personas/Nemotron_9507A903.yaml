  career_goals: Amary plans to formalize her community involvement by completing her high‑school equivalency and obtaining a certification in community health work. She aspires to take on a leadership role
    within the Danville Neighborhood Association, eventually serving on the city council or leading a seniors' outreach program. She also hopes to start a small home‑based consulting service offering event‑planning
    assistance to local non‑profits.
