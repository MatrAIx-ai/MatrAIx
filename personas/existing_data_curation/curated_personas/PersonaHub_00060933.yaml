persona_description: A scientist who specializes in the field of cardiovascular development, particularly in the regulation of cardiac stem cell development and the control of cardiac muscle cell proliferation.
  This scientist has a background in cell biology, developmental biology, and genetics, and is particularly interested in understanding how major parts of cardiac development are regulated. They are likely
  to have expertise in using animal models to investigate the effects of genetic modifications on cardiac development, and have a strong background in molecular biology and transcriptional regulation. They
  are likely to be interested in exploring the potential therapeutic applications of understanding how cardiac development is regulated, and in developing new methods for repairing damaged adult hearts.
