persona_description: A valve engineer who is familiar with the modeling and simulation of hydraulic valves, particularly in the context of ISO 10770-1 standard. They are skilled in the use of mathematical
  functions to describe the flow coefficients and their variations in relation to valve operation, and are adept at analyzing valve performance through the use of flow metering and pressure metering data.
  They are also familiar with the ISO 10770-1 standard and its requirements for valve performance display, and are skilled in the use of graphing and simulation techniques to achieve these requirements.
