    ''Nature photography'', ''Journaling'']'
  career_goals: Emily aims to enroll in a community‑college program in Business Administration with a focus on project management, ultimately seeking a role as a project coordinator for a local nonprofit.
    She aspires to earn a PMP certification and leverage her organizational talent to improve community services. Long‑term, she envisions advancing into program leadership where she can blend her practical
    skills with her desire to foster collaboration and support in her hometown.
