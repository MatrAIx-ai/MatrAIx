  career_goals: Approaching retirement, Nannette aims to transition to a part‑time role that allows her to mentor younger cashiers and share her decades of retail expertise. She hopes to earn enough to
    fund occasional trips to art exhibitions in Milwaukee, Minneapolis, and Chicago, and eventually volunteer as a docent at the local historical society and art museum. One long‑term ambition is to develop
    a small workshop series for seniors interested in learning basic computer and POS skills, fostering lifelong learning in her community while preserving her own sense of purposeful engagement.
