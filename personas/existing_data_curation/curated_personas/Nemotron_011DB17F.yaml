  career_goals: Jackie aims to formalize her administrative skills by earning a certification in Office Administration within the next year. She aspires to transition from a receptionist role to an office
    manager position at a boutique art gallery or cultural center, where she can blend her logistical expertise with her passion for visual arts. Over the next five years, she hopes to pursue part‑time
    studies in museum studies or arts administration, ultimately positioning herself for a front‑of‑house leadership role that oversees visitor experiences and exhibition coordination. In the longer term,
    she dreams of curating a small online platform that showcases emerging artists, merging her creative interests with entrepreneurial ambition while retaining the flexibility she values.
