persona_description: A researcher who studies the impact of parental investment on children's academic performance, specifically focusing on the correlation between language and math skills. They are interested
  in understanding why girls tend to perform better in language-related studies than boys and how parental investments in language can lead to better test scores in English but not in math. They are also
  curious about the reasons behind the gender gap in STEM fields and how early-life investments in language can contribute to later-life language skills but not math skills.
