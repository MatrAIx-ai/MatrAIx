personas:
  professional: Edward Dew, a 45‑year‑old automotive service technician, combines his methodical diagnostic expertise—mastery of OBD‑II scanners, transmission overhauls, and emerging hybrid systems—with
    a safety‑first mindset and compassionate communication, and they apply this systematic approach to lead a small team, train apprentices, and pursue ASE Master Technician certification to eventually
    manage the shop and launch a community‑focused garage.
  sports: Edward Dew, a devoted fan of the Orlando Magic and Miami Heat, spends Saturday mornings rowing at the Okeechobee Boat Club and joins a local senior‑men’s softball league, while maintaining a steady
    routine of weight‑training and weekend fishing trips that double as low‑impact cardio, and they cheer loudly during Tampa Bay Buccaneers games each fall.
  arts: Edward Dew, who unwinds with classic rock legends like Bruce Springsteen and The Rolling Stones while flipping through Motor Trend, also enjoys community theatre productions of 'Our Town' and admires
    Ansel Adams’ black‑and‑white photography for its disciplined composition, and they occasionally dabble in vintage car photography during garage projects.
  travel: Edward Dew, a meticulous planner, prefers road trips that blend fishing at Lake Okeechobee with visits to automotive museums in Detroit and the Petersen Automotive Museum in Los Angeles, has already
    explored Key West and Nashville, and they dream of an electric‑vehicle tour through Norway’s fjord routes once the family garage is established.
  culinary: Edward Dew, an avid gardener, often cooks fresh grouper caught on the lake with a lemon‑thyme rub, prepares hearty vegetable stew featuring sweet potatoes, collard greens, and black‑eyed peas,
    and they sometimes over‑salt dishes when preoccupied with repair schedules, yet they relish occasional barbecues of classic‑car‑themed ribs with a smoky paprika glaze.
  core: Edward Dew, a 45‑year‑old automotive technician, fuses a love of precision with a compulsive need to schedule every fishing trip, yet frequently forgets to take prescribed blood‑pressure medication
    after a long day in the garage.
background:
  cultural: Edward grew up in a working‑class, white family in central Florida during the 1970s and 1980s, surrounded by the agricultural and fishing communities that define Okeechobee and Osceola County.
    His parents emphasized hard work, self‑reliance, and community service, values reinforced by regular attendance at a local Baptist church. The region’s blend of Southern hospitality, outdoor recreation,
    and small‑town cohesion shaped his practical outlook and compassionate nature. While he identifies with traditional American middle‑class values, Edward also embraces the local culture’s respect for
    nature, neighborly support, and a modest, steady approach to life and work.
attributes:
  skills: '[''Automotive diagnostics (OBD‑II, manufacturer‑specific scanners)'', ''Engine repair and rebuild'', ''Transmission service and overhaul'', ''Brake, suspension, and steering maintenance'', ''Electrical
    and electronic system troubleshooting'', ''HVAC and climate control servicing'', ''Hybrid and electric vehicle maintenance'', ''Shop management software (Mitchell, Shop‑Ware)'', ''Team leadership and
    apprenticeship training'', ''Safety compliance and OSHA procedures'']'
  hobbies: '[''Fishing on Lake Okeechobee'', ''Boating and kayaking'', ''Classic car restoration projects'', ''Garden vegetable planting and maintenance'', ''Volunteer car maintenance for community events'',
    ''Reading automotive magazines and DIY guides'', ''Puzzle solving (Sudoku, crosswords)'', ''Woodworking and small home improvement projects'']'
  career_goals: Edward aims to achieve full ASE Master Technician certification within the next two years and use that credential to become the shop manager at his current service center. He plans to leverage
    his growing knowledge of electric and hybrid vehicles to position the shop as a leader in green automotive services in Osceola County. Long‑term, Edward dreams of opening a family‑owned garage that
    combines high‑quality repair work with a community apprenticeship program for local high‑school students, allowing him to mentor the next generation while maintaining a stable work‑life balance that
    reduces his stress levels.
