  career_goals: Denise dreams of a future where she can turn her love of drawing and curiosity about how things work into a career. She often talks about becoming an artist who creates colorful books for
    other children, or a scientist who explores nature and shares her discoveries. She also imagines working in a museum, guiding visitors through exhibitions because she enjoys quiet, thoughtful environments.
    Even at six, she sets personal goals to become confident in sharing her ideas, manage the worries that sometimes overwhelm her, and keep learning new skills.
