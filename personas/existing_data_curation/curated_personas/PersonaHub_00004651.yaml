persona_description: Dr. Malamud is a scholar and researcher who specializes in the study of animals and their relationship with humans. He has edited books on Eliot's poetry and the cultural history of
  animals, and is a Fellow of the Oxford Centre for Animal Ethics. His research interests include the ethics of using animals in literature and the impact of zoos and aquariums on visitors' attitudes. Dr.
  Malamud has also worked on collaborative projects with photographers and has published several books on the subject of animals and visual culture. He is a respected authority in the field of animal ethics
  and has given several lectures on the topic.
