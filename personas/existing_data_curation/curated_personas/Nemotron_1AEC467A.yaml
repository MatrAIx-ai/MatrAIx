    ''Performance testing basics (JMeter)'', ''Scripting with Python for test utilities'', ''Critical thinking and problem solving'', ''Effective communication and stakeholder reporting'', ''Time management
    and prioritization'']'
  hobbies: '[''Fishing on St. Johns River'', ''Hiking in Timucuan Ecological and Historic Preserve'', ''Pickup basketball games'', ''Board game nights with friends'', ''Raspberry Pi home‑automation projects'',
    ''Playing strategy video games (e.g., Civilization)'', ''Reading science‑fiction novels'', ''Cooking barbecue and experimenting with regional recipes'', ''Listening to classic rock and tech podcasts'',
    ''Volunteering at a local coding club for middle‑school students'']'
  career_goals: Laurence aims to transition from manual testing to a senior automation engineer role within the next three years, earning the ISTQB Foundation and Advanced certifications along the way.
    He plans to deepen his Python and JavaScript scripting skills, contribute to open‑source testing frameworks, and eventually lead a QA team where he can mentor junior testers. In the longer term, he
    is interested in obtaining a bachelor’s degree in Computer Science or a related field, moving toward a product quality leadership position, and possibly launching a boutique consultancy that helps small
    Florida businesses adopt robust QA practices.
