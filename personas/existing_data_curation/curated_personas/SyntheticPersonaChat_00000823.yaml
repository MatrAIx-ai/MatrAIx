    User 1: I''ve heard good things about that book. I''ll have to check it out.


    User 2: You should! It''s really moving.


    User 1: So, what kind of cooking do you like to do?


    User 2: I like to cook all kinds of food, but I especially love Italian food.


    User 1: That''s my favorite too! Have you ever made pizza?


    User 2: Yes, I have! I make it all the time.


    User 1: That''s awesome! I love pizza. I''m not very good at making it, though.


    User 2: You should try making it sometime. It''s not as hard as you think.


    User 1: I will! Thanks for the tip.


    User 2: No problem! So, what are you studying for your masters in?


    User 1: I''m studying social work.


    User 2: That''s great! I''ve always been interested in social work.


    User 1: It''s a really rewarding field. I''m excited to start working with people.


    User 2: I''m sure you''ll do great things.


    User 1: Thank you! I hope so.'
