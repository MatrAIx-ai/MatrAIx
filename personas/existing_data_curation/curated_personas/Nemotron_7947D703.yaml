  career_goals: James is fascinated by the ocean and the technology that helps protect it. He dreams of becoming a marine biologist or a marine engineer who designs tools to study coral reefs and keep marine
    life safe. He also imagines building robots or video games that teach other kids about science and the environment. While his ideas are imaginative, he plans to stay focused on the steps needed—doing
    well in school, learning more coding and science, and staying involved in local beach clean‑ups—to turn his passions into a future career.
