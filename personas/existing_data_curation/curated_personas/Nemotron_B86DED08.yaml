personas:
  professional: Roma Zarrouk, a 45‑year‑old correctional security specialist with fifteen years of experience, they apply a meticulous, data‑driven approach to incident analysis and crisis de‑escalation
    while leveraging their practical mindset and skeptical eye to enforce safety and mentor new staff through structured training programs.
  sports: Roma Zarrouk, an avid outdoors enthusiast, they regularly hike with the North Bay Trail Club through Sonoma County’s redwood groves, join the Redwood Run Club’s seasonal 5K races, support the
    San Francisco Giants during baseball season, and supplement the routine with weekly yoga and occasional kayaking on the Russian River.
  arts: Roma Zarrouk, a hands‑on woodworking artisan and cultural storyteller, they craft ceremonial bowls while listening to the native flute melodies of R. Carlos Nakai, attend weekly drum circles featuring
    traditional rhythms, admire the contemporary paintings of Jaune Quick‑to‑See Smith, and often sing along to the folk ballads of Buffy Sainte‑Marie during communal gatherings.
  travel: Roma Zarrouk, a reflective traveler, they favor meticulously planned road trips that combine hiking the towering redwoods of Redwood National Park, exploring the historic waterfront of Sausalito,
    savoring coastal sunsets in Mendocino, while dreaming of a cultural immersion in New Zealand’s Maori villages and a rejuvenating sunrise retreat in Sedona’s red‑rock landscape.
  culinary: Roma Zarrouk, an accomplished home chef, they specialize in wild‑rice pilaf tossed with toasted pine nuts and fresh huckleberries, cedar‑smoked salmon seasoned with sage and juniper, a seasonal
    berry compote using locally foraged huckleberries, and hearty stew enriched with wild‑foraged mushrooms and root vegetables.
  core: Roma Zarrouk, a disciplined correctional officer who balances rigorous security protocols with a deep reverence for nature, they meticulously count steps on hikes, over‑plan meals, and often let
    lingering worries about facility incidents seep into quiet evenings.
background:
  cultural: Roma identifies as an American Indian woman with roots in the Coast Miwok tribe of the San Francisco Bay Area. Raised in a mixed‑heritage household in Santa Rosa, she grew up hearing tribal
    stories, participating in seasonal drum circles, and learning the Miwok language from her grandparents. While her professional life is shaped by modern correctional practices, she remains active in
    tribal gatherings, helps organize community workshops on environmental stewardship, and contributes her woodworking skills to craft ceremonial objects. Her cultural values—respect for the land, a strong
    sense of community responsibility, and a reverence for oral history—inform her disciplined work ethic and her commitment to creating safer, more supportive environments for both staff and inmates.
attributes:
  skills: '["Inmate supervision","Crisis de‑escalation","Surveillance and access‑control system operation","Incident reporting and data analysis","Physical fitness and defensive tactics","Conflict resolution
    and mediation","First aid/CPR certification","Legal procedure compliance","Community liaison and stakeholder communication","Technical troubleshooting of security equipment"]'
  hobbies: '["Hiking and nature photography","Woodworking","Cooking traditional American Indian dishes","Genealogy research","Reading historical non‑fiction","Yoga and stress‑relief practice"]'
  career_goals: Roma aims to move into a supervisory role within the next three years, targeting a shift‑supervisor or training‑officer position where she can shape policy and mentor new staff. She is pursuing
    a certification in correctional leadership and hopes to spearhead a mental‑health initiative for officers that integrates stress‑management workshops and peer‑support groups. Long‑term, she envisions
    serving on a regional correctional training council to advocate for evidence‑based practices and culturally responsive programs that improve safety for both staff and inmates.
