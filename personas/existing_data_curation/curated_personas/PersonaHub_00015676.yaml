persona_description: A mathematics enthusiast who is interested in the study of geometry and its applications, particularly in the field of projective geometry. This individual may be a professor, researcher,
  or student of mathematics who is looking for a comprehensive introduction to the methods of the projective geometry of the plane. They are likely to have a background in the elements of metrical and analytical
  geometry, and may be interested in the symbolic notation used in projective geometry. They may also be interested in the theory of one-to-one correspondence, the representation of conic properties by
  the general equation of the second degree, and the relationship between Euclidean and projective geometry. They may be looking for an updated and detailed version of the Oliver and Boyd, Ltd., Edinburg
  and London, 1960 edition.
