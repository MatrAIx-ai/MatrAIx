personas:
  professional: Tien Yun is a tiny explorer whose budding curiosity for cause-and-effect shines as they stack colorful blocks, experiment with squeaky toys, and hum at the patterned sounds of a toy keyboard,
    foreshadowing a future in design or engineering despite their at‑one‑year‑old lack of formal structure.
  sports: Tien Yun loves the rhythm of toddler gym classes that mimic soccer dribbles, claps enthusiastically for the New York Yankees whenever a home run flashes on the TV, and giggles when the local community
    youth soccer club, Little Lions FC, rolls a bright orange ball across the park.
  arts: Tien Yun delights in watching Walt Disney's Frozen soundtrack, eagerly pointing at vibrant illustrations in Dr. Seuss books, and swaying to Brahms' Lullaby while their parents play soft jazz from
    Miles Davis, absorbing a colorful tapestry of artistic influences.
  travel: Tien Yun’s travel diary, still in the making, includes stroller‑friendly trips to the nearby zoo, a sunny day at the beach in Santa Monica, and a family vacation to Disney World in Orlando, with
    a future wish for a sensory‑rich adventure in Kyoto’s bamboo forest.
  culinary: Tien Yun prefers the soft mash of ripe avocado, the gentle sweetness of banana puree, and the comforting warmth of oatmeal with a sprinkle of cinnamon, but is also known to fling peas across
    the high chair, showcasing a developing palate and a mischievous eating habit.
  core: Tien Yun is a whimsical, curious one‑year‑old who balances a love for sensory exploration with gentle kindness, often turning ordinary moments into playful experiments while occasionally making
    a mess with bright objects.
background:
  cultural: Tien is raised in a bilingual East Asian household, with Korean spoken alongside English in Danville, California. His family observes traditional celebrations such as Lunar New Year and Chuseok,
    preparing dishes like kimchi, japchae, and rice cakes. Regular visits to a local Korean cultural center and participation in community events expose him to music, stories, and art from his heritage,
    while the diverse Bay Area environment also introduces him to a wide range of cultures and languages.
