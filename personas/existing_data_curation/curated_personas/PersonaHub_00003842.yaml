persona_description: 'Jon Sanford is a well-known architect in the universal design community in the USA. He is the Director of the Center for Assistive Technology and Environmental Access and has published
  widely. His chapter, Design for All Users tackles wayfinding and explains that despite its potential, universal design has not been widely adopted as a strategy in promoting community wayfinding. The
  book, Community Wayfinding: Pathways to Understanding is published by Springer Link and individual chapters can be purchased.'
