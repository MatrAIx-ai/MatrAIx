personas:
  professional: Eric Jackson, an aspiring sous‑chef in a high‑volume Dallas kitchen, leverages precise knife work, strict food‑safety discipline and inventory savvy while thriving on the structured rush
    of service, and they channel their competitive streak into mastering new techniques each shift.
  sports: Eric Jackson, a devoted pickup basketball player, follows the Dallas Mavericks and Dallas Cowboys, joins the local Saturday night streetball league, and balances his fitness routine with occasional
    gym sessions to stay competitive on the court.
  arts: Eric Jackson, a hip‑hop enthusiast, spends free evenings dancing to Kendrick Lamar and J Cole, curates short food videos set to booming beats, and frequents the Deep Ellum art district to admire
    Basquiat‑inspired murals and live freestyle battles.
  travel: Eric Jackson, an avid food‑festival explorer, has road‑tripped to Austin’s BBQ showdown and New Orleans’ Creole cuisine fest, dreams of a culinary pilgrimage to Tokyo’s street‑food stalls, and
    prefers budget‑friendly planning that still lets them sample authentic regional flavors.
  culinary: Eric Jackson, a line cook with a soul‑food foundation, perfects fried chicken, collard greens, and cornbread while experimenting with Korean‑inspired kimchi‑infused slaw and spicy taco‑style
    brisket, showcasing a blend of Southern comfort and modern fusion.
  core: Eric Jackson fuses disciplined kitchen hustle, competitive basketball, savvy but impulsive budgeting, and a passion for soulful, experimental cooking into a vibrant, community‑rooted lifestyle.
background:
  cultural: Eric is an African‑American raised in Dallas, Texas, with deep ties to the city’s Black community and church life. Family gatherings often revolve around soul food classics—fried chicken, collard
    greens, cornbread, and BBQ—shaping his palate and cooking style. He draws on Southern culinary traditions while also embracing contemporary urban influences, such as fusion dishes and street food culture.
    His cultural identity is reflected in his pride for community resilience, music, sports, and the shared experience of food as a means of connection.
attributes:
  skills: '[''Culinary techniques (grilling, sautéing, baking, braising)'', ''Knife handling and precision cuts'', ''Food safety and sanitation (ServSafe certified)'', ''Kitchen inventory management and
    cost control'', ''Time management and order prioritization in high‑pressure settings'', ''Team coordination and communication on the line'', ''Menu planning and recipe standardization'', ''Customer
    service and front‑of‑house interaction'', ''Basic nutrition knowledge'', ''Adaptability to shift schedules and changing menus'']'
  hobbies: '[''Basketball (pick‑up games)'', ''Hip‑hop music and dancing'', ''Home cooking and recipe experimentation'', ''Food festivals and farmers’ market explorations'', ''Gaming (NBA 2K, FIFA)'', ''Podcast
    listening (culinary trends, entrepreneurship)'', ''Volunteering at local community kitchen'', ''Social media content creation (food videos)'']'
  career_goals: Eric aims to advance from his current line‑cook role to a sous‑chef position within the next three years, eventually becoming a head chef and earning an Executive Chef certification. He
    plans to enroll in a culinary arts program at a community college or culinary institute to formalize his training. Long‑term, he envisions opening a soul‑food‑focused restaurant or food truck in Dallas
    that celebrates African‑American culinary traditions while incorporating modern twists, allowing him to blend his practical expertise with creative expression.
