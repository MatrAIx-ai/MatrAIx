personas:
  professional: Rozy Fentress is a retired community‑engaged gardener and arts advocate who leverages their gardening expertise, event coordination skills, basic bookkeeping, and storytelling talent to
    lead informal art talks at the municipal library and design low‑maintenance desert garden spaces that double as intergenerational learning hubs.
  sports: Rozy Fentress enjoys low‑impact activities such as morning walks through the desert garden, birdwatching from the porch, and occasional senior‑friendly yoga classes, while cheering on the El Paso
    Chihuahuas minor‑league baseball team and the New Mexico State Aggies during the spring season.
  arts: Rozy Fentress expresses love for the arts through watercolor paintings of desert vistas inspired by Georgia O'Keeffe, avidly listening to Lila Downs at cultural festivals, and championing local
    Native pottery artisans such as Maria Ortiz, often weaving these influences into storytelling sessions at the library.
  travel: Rozy Fentress prefers leisurely road trips to nearby Southwest gems like Santa Fe, the Grand Canyon, and the historic town of Taos, while dreaming of a gentle pilgrimage to Oaxaca, Mexico, planning
    visits around gardening schedules and senior‑friendly travel packages.
  culinary: Rozy Fentress enjoys cooking simple, herb‑infused dishes such as rosemary‑roasted chicken, green chile stew with local chilies, and lavender‑flavored tea, yet admits occasional forgetfulness
    in smoothing sauces, and they delight in sharing homemade cactus‑flower jam with neighbors.
  core: Rozy Fentress is a curious, gentle‑spirited octogenarian who blends desert gardening, watercolor art, and community storytelling into a flexible, slightly disorganized lifestyle that thrives on
    spontaneous creativity and occasional missed appointments.
background:
  cultural: Rozy was born into a mid‑western white Anglo‑American family and moved to Deming, New Mexico, in her early thirties after marrying. Over the past five decades, she has woven the influences of
    the Southwest into her identity, developing a deep respect for the region’s Mexican‑American and Indigenous heritage. While her cultural roots remain grounded in traditional American values—emphasizing
    self‑reliance, community service, and a love of the outdoors—she embraces the artistic traditions, culinary flavors, and storytelling customs of her adopted home. This blend of heritage informs her
    appreciation for art, her garden’s design, and her commitment to preserving local histories.
