  career_goals: Although retired, Rozy aims to remain an active cultural conduit in Deming. She hopes to compile a memoir that blends her personal journey with the changing tapestry of the Southwest, and
    to create a community‑garden project that serves as a gathering place for intergenerational learning. Rozy also wishes to mentor younger volunteers in oral‑history techniques, develop a modest exhibition
    of local artists at the town library, and learn digital photography to document her garden and the stories she records. These goals reflect her curiosity, love for art, and desire for flexible, meaningful
    engagement.
