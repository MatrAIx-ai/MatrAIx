  career_goals: Approaching retirement, Robert aims to transition from day‑to‑day surveillance to a mentorship and consulting role. He plans to obtain a Certified Protection Officer credential and use his
    experience to train new security personnel at local casinos and small businesses. He also hopes to volunteer as a safety advisor for community events in Hastings, helping to design low‑risk environments
    while preserving the town’s cooperative spirit. Ultimately, he wants to leave a legacy of practical safety improvements and supportive teamwork.
