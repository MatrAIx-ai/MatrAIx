    novels'', ''Crossword puzzles'', ''Volunteer storytelling at the library'', ''Fishing trips'']'
  career_goals: In retirement Megan channels her curiosity into purposeful projects. She aims to compile and publish a memoir that recounts her family's multigenerational story in Wisconsin's Lake Country,
    preserving local oral histories. She plans to curate a traveling exhibition of artwork by local seniors, highlighting lake landscapes and seasonal changes. Megan seeks to master advanced digital photography
    techniques, especially macro and low‑light shooting, and to share her knowledge through workshops at the community center. She intends to develop an online shop showcasing her quilts and handcrafted
    items, supporting a local craft cooperative. Finally, she hopes to mentor younger artists, offering constructive critique and encouraging unconventional artistic exploration.
