personas:
  professional: Kenda Macadam is a lifelong community steward who channels her decades‑long household management expertise into orchestrating weekly programs at the Union County senior center, mentoring
    younger volunteers in quilting and budgeting, and keeping church choir rehearsals running like a well‑tuned garden.
  sports: Kenda Macadam enjoys gentle walks along the creek trail, participates in the senior center’s weekly badminton circle, cheers on the Union County Eagles baseball team every summer, and never misses
    the local high‑school basketball games that bring the community together.
  arts: Kenda Macadam weaves stories into quilts and scarves during her knitting circle, treasures the warm harmonies of Mahalia Jackson and the storytelling of The Carter Family on her radio, and finds
    solace in historical fiction novels by Philippa Gregory, all of which color her evenings with a blend of nostalgia and creativity.
  travel: Kenda Macadam prefers relaxed, short‑duration trips such as scenic drives to the Blue Ridge Parkway, weekend visits to the historic town of Charleston to explore its preserved architecture, and
    occasional pilgrimages to nearby congregational retreats, balancing a love for new sights with the practical limits of her health and a fixed travel budget.
  culinary: Kenda Macadam delights in baking classic apple crumble pie, hearty chicken pot pie, and crusty sourdough bread, seasoning her dishes with cinnamon, nutmeg, and rosemary, while expertly canning
    seasonal tomatoes and preserving garden herbs for winter meals shared with grandchildren.
  core: Kenda Macadam blends steadfast routine with generous community spirit, juggling a paper‑sharp budget, gentle garden walks, quilting needles, and a penchant for worrying about the next health check,
    all while humming gospel tunes in the church choir.
background:
  cultural: Kenda grew up in a mid‑western, white Anglo‑American family in Delaware, Ohio, during the Great Depression and World War II era. Her upbringing emphasized self‑reliance, practicality, strong
    church involvement, and close‑knit community ties. These values fostered a deep respect for tradition, frugality, and service to others, shaping her lifelong commitment to family, neighbors, and local
    institutions.
