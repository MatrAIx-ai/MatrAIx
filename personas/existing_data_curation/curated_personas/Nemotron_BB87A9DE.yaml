  hobbies: '["Gardening", "Baking", "Knitting", "Crocheting", "Church choir participation", "Senior center bingo and card games", "Reading historical fiction", "Family photo and postcard preservation",
    "Walking nature trails", "Listening to folk and gospel music"]'
  career_goals: As she enjoys staying active, Kenda’s main ambition is to continue contributing to her community by supporting the senior center’s weekly programs and mentoring younger volunteers in traditional
    crafts. She hopes to compile her family’s cherished recipes and craft patterns into a keepsake book for her grandchildren, and to maintain her health and independence so she can remain a steady presence
    in her church and neighborhood. She also aspires to promote intergenerational connections, ensuring the bond between seniors and youth in Union County stays strong.
