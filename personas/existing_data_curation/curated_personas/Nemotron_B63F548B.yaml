  career_goals: Nikolas aims to become a Certified Public Accountant within the next two years, followed by earning the Certified Information Systems Auditor (CISA) credential to blend his auditing expertise
    with emerging cyber-risk considerations. He envisions advancing to a senior audit manager role at a regional firm, leading multidisciplinary audit engagements that incorporate data analytics and automation.
    Over the longer term, he aspires to establish his own boutique consultancy focused on helping local small businesses adopt cloud-based accounting solutions and sustainable financial practices. He also
    hopes to mentor junior accountants in Murfreesboro, fostering a collaborative professional community.
