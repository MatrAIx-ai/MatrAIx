personas:
  professional: Alejandro Napoles, a seasoned postsecondary educator in computer science and applied mathematics, melds deep expertise in Python, R, and MATLAB with a fervent love for generative visual
    art, designing interdisciplinary curricula that empower students to explore algorithmic creativity while navigating a fluid, adaptable workflow that they embrace.
  sports: Alejandro Napoles, an avid paddler and hiker, spends weekends kayaking through Biscayne Bay and trekking the Everglades, while cheering for the Miami Heat, the Miami Marlins, and Inter Miami CF,
    and they belong to a local kayaking club that meets twice a month.
  arts: Alejandro Napoles immerses themselves in contemporary visual culture, regularly wandering Wynwood Walls to study street murals, attending intimate gallery openings featuring artists like Banksy
    and Yayoi Kusama, and creating digital illustrations and generative code pieces that fuse algorithmic patterns with traditional folk motifs, while also playing acoustic guitar at small gatherings to
    reinterpret classic folk tunes.
  travel: Alejandro Napoles prefers low‑key, culturally rich travel, planning spontaneous weekend trips to the Florida Keys or the Caribbean, while dreaming of immersive art tours in Berlin, Barcelona,
    and Kyoto, balancing a modest travel budget with a desire for authentic neighborhood experiences rather than crowded tourism.
  culinary: Alejandro Napoles enjoys experimenting in the kitchen, mastering dishes such as arepas, sancocho, and ceviche with a Miami twist that incorporates tropical fruits and citrus, yet they often
    over‑season the ceviche and occasionally burn the edges of arepas while juggling music playlists.
  core: Alejandro Napoles blends a scholarly mind with artistic curiosity, juggling a fluid teaching style, a relaxed approach to finances, occasional health neglect after late coding sessions, and a penchant
    for weekend kayaking, all while crafting generative art and cooking experimental dishes.
background:
  cultural: Alejandro was born in Medellín, Colombia, and spent his early childhood immersed in the city's vibrant cultural scene—its music, coffee houses, and lively festivals. At age sixteen, his family
    relocated to Miami, where he navigated the bicultural experience of maintaining Colombian traditions while adapting to the multicultural tapestry of South Florida. He remains fluent in Colombian Spanish,
    preserving regional colloquialisms, and regularly hosts family gatherings featuring traditional dishes and music. Alejandro's identity is shaped by his deep appreciation for Colombian art, literature,
    and the communal spirit of his hometown, which he carries into his academic and social life. He actively participates in the local Colombian diaspora community, volunteering at cultural events such
    as the Festival del Café and the Miami Colombian Parade, and he uses his platform as an educator to highlight Latin American contributions to science and technology.
