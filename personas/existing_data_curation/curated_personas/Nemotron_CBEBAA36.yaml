  hobbies: '[''Contemporary art appreciation'', ''Digital illustration and generative coding'', ''Acoustic guitar playing (Colombian folk music)'', ''Cooking Colombian cuisine with fusion twists'', ''Reading
    science fiction and philosophy'', ''Attending small literary salons'', ''Kayaking in Biscayne Bay'', ''Hiking Everglades'', ''Exploring street murals in Wynwood'', ''Listening to salsa and Vallenato'']'
  career_goals: Alejandro aspires to transition from an adjunct role to a tenure‑track position where he can institutionalize an interdisciplinary program that fuses computer science, data science, and
    visual arts. He aims to establish a research lab focused on AI‑driven generative media, securing federal and private funding to explore how algorithmic creativity can be used in education and community
    outreach. He is passionate about creating mentorship pipelines for under‑represented Latino students in STEM, planning to launch a summer immersion series in partnership with local Colombian cultural
    organizations. Long‑term, Alejandro envisions serving as director of an interdisciplinary institute or department chair, shaping policy that balances academic rigor with flexible, student‑centered learning
    environments while preserving his personal bandwidth for artistic pursuits.
