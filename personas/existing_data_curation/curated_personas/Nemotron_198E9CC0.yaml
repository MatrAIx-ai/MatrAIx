personas:
  professional: Jacqueline Stanley, an early childhood education administrator in the Research Triangle, designs STEAM-centric curricula, mentors staff, secures grant funding, and applies a skeptical, competitive
    eye to partnership vetting while championing flexible, creative learning environments.
  sports: Jacqueline Stanley enjoys low-impact fitness through weekend bird-watching hikes at William B. Umstead State Park, plays recreational tennis at the Cary Community Center, follows the Carolina
    Panthers and UNC Tar Heels with quiet enthusiasm, and occasionally competes in a senior softball league that satisfies her competitive edge.
  arts: Jacqueline Stanley nurtures her artistic side by painting abstract watercolors inspired by Georgia O'Keeffe, attending intimate gallery openings featuring local talents such as Brittany Garretson,
    listening to Miles Davis while journaling, and regularly watching community-theatre productions of classics like The Glass Menagerie performed by regional actors.
  travel: Jacqueline Stanley favors thoughtfully planned yet loosely scheduled trips that blend historic charm and cultural immersion, such as weekend getaways to Charleston's cobblestone streets, a spring
    garden tour of Kyoto's temples, and a summer road-trip along the Blue Ridge Parkway, while often sketching scenes in a pocket notebook to capture fleeting impressions.
  culinary: Jacqueline Stanley, an avid home gardener, delights in preparing seasonal dishes like roasted beet and goat-cheese salad, zucchini ratatouille, and her signature sourdough focaccia topped with
    heirloom tomatoes, though her modest cooking skill sometimes yields over-salted soups that she humorously blames on multitasking between planting and pottering.
  core: Jacqueline Stanley is a curious, art-loving educator who balances a competitive drive with a relaxed, slightly disorganized lifestyle, turning everyday routines into opportunities for creative exploration
    and quiet reflection.
background:
  cultural: Jacqueline grew up in a middle‑class white family in the Midwest, where a blend of practical values and encouragement to explore the arts shaped her early years. After earning a bachelor's degree
    in biology, she moved to the Research Triangle area for professional opportunities, eventually settling in Cary, NC. Her upbringing combined Midwestern pragmatism with the emerging Southern hospitality
    of the Triangle, fostering a respect for community and a curiosity about diverse perspectives. While raised in a Protestant tradition, she now identifies as spiritually eclectic, appreciating cultural
    rituals from the various families she works with. Her career in education has deepened her appreciation for the region's growing multicultural atmosphere, yet she maintains a personal identity rooted
    in progressive, education‑focused values and a lifelong commitment to lifelong learning.
attributes:
  skills: '[''STEAM curriculum design'', ''Staff mentorship and team leadership'', ''Educational technology integration'', ''Data analysis for program evaluation'', ''Budgeting and resource allocation'',
    ''Accreditation and policy compliance'', ''Grant writing and fundraising'', ''Community outreach and partnership vetting'', ''Conflict resolution'', ''Flexible strategic planning'']'
  hobbies: '[''Abstract watercolor painting'', ''Visiting local art galleries'', ''Reading historical fiction'', ''Vegetable gardening'', ''Birdwatching'', ''Pottery classes'', ''Jigsaw puzzles'', ''Writing
    journal reflections'', ''Participating in a small interdisciplinary book club'']'
  career_goals: Jacqueline aims to champion a district‑wide STEAM initiative that embeds artistic inquiry into early childhood classrooms across Wake County. She hopes to author a guide on flexible curriculum
    models that balances structure with creativity, and to mentor a new generation of educators—especially women pursuing STEM pathways. Over the next five years, she plans to serve on the North Carolina
    Early Childhood Advisory Board, secure sustainable funding for community arts‑integration programs, and leave a lasting legacy of innovative, student‑centered learning before transitioning to a consulting
    role in retirement.
