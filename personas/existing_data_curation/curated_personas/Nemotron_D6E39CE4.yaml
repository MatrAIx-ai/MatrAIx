  career_goals: Though retired from formal employment, Felicia is driven to channel her organizational talent and love of art into community service. She aims to revitalize the Mount Wolf community center
    by establishing a monthly art showcase that highlights African American artists and local talent. She hopes to mentor younger residents, especially those interested in art, history, and genealogy, and
    plans to create a visual archive documenting the Black heritage of York County. Additionally, she aspires to write a memoir that weaves her personal experiences with the broader narrative of the civil‑rights
    era, and she dreams of traveling to Washington, D.C. and New York to explore major art museums and historic sites.
