personas:
  professional: Felicia Dumornay, a retired community arts coordinator, leverages her methodical budgeting, event‑planning acumen, and deep art‑history knowledge to launch a monthly showcase for underrepresented
    local artists at the Mount Wolf center, mentoring youth while methodically vetting contributors to ensure authenticity and out of a competitive drive to make the program the most acclaimed in the county.
  sports: Felicia Dumornay stays active with morning walks in her garden and a senior‑center yoga class, while cheering on the Philadelphia Eagles on Sundays and joining the local bridge league, which she
    treats with the same strategic zeal as a competitive sport.
  arts: Felicia Dumornay spends weekends sketching Monet’s water lilies at the regional museum, draws inspiration from Georgia O’Keeffe’s bold palettes while painting, and unwinds to the smooth vocals of
    Ella Fitzgerald, all of which inform her own curatorial projects and memoir writing.
  travel: Felicia Dumornay plans her trips with the precision of a seasoned archivist, having recently explored Savannah’s historic districts and now eyeing a meticulously scheduled art pilgrimage to Washington,
    D.C.’s National Gallery and New York’s Metropolitan Museum, balancing her thirst for cultural immersion with a cautious budget.
  culinary: Felicia Dumornay, an adept home cook, blends Southern staples like fried chicken and collard greens with experimental dishes such as rosemary‑infused quinoa salads and lavender‑scented lemon
    tarts, often using fresh basil and thyme from her garden, though she sometimes over‑salts in her enthusiastic culinary trials.
  core: Felicia Dumornay’s organized, worry‑prone nature fuels a vibrant curiosity that drives her to blend art, genealogy, and Southern cooking into community initiatives, while her habit of over‑packing
    itineraries and obsessively tracking expenses adds a quirky, meticulous flair to her everyday life.
background:
  cultural: Felicia is an African American woman whose family roots trace back to the rural South, where generations cultivated resilience through church, community, and shared stories. Raised in a close‑knit
    Black neighborhood before moving to Mount Wolf, she carries the traditions of gospel music, soul food, and oral history. Her faith community has been a cornerstone of support, shaping her values of
    service and mentorship. She embraces the rich tapestry of Black cultural heritage, celebrating milestones such as Juneteenth and Black History Month through educational activities and artistic expression.
    As one of the few Black seniors in her home borough, she often serves as a cultural bridge, fostering understanding and inclusion while preserving her ancestral legacy.
