data:
  user 1 personas: 'I hate school.

    I fell in love this summer.

    I live on a lake.

    I enjoy summer walking and reading.'
  user 2 personas: 'I donate any overstock to charity.

    I shop several times a week.

    I love to save money.

    I am a couponed.

    I like to keep my stockpile organised.'
  Best Generated Conversation: 'User 1: Hey, do you want to walk around the lake with me?

    User 2: Sure, I love walking. I''m always looking for ways to get some exercise.

    User 1: Me too. I live on the lake, so it''s a perfect place to walk.

    User 2: That''s great! I''m looking forward to it.

    User 1: Me too. I''m also looking forward to reading a book when we get back.

    User 2: That sounds like a great idea. I love to read too.

    User 1: What are you reading right now?

    User 2: I''m reading a book called "The Great Gatsby." It''s a classic novel that I''ve always wanted to read.

    User 1: Oh, I''ve heard of that book. I''ve heard it''s really good.

    User 2: It is. It''s a really interesting story about love, loss, and the American Dream.

    User 1: That sounds really interesting. I might have to check it out.

    User 2: You should! I think you''d like it.

    User 1: I''m sure I would. What do you like about it?

    User 2: I like the way the author describes the characters and the setting. It''s really easy to get lost in the story.

    User 1: That''s what I''ve heard. I''m excited to read it.

    User 2: You won''t be disappointed.

    User 1: I''m sure I won''t.

    User 2: So, what do you do for a living?

    User 1: I''m a teacher. I teach English at a local high school.

    User 2: Oh, that''s cool. I''ve always thought about being a teacher.

    User 1: It''s a great job. I love working with kids.

    User 2: I can imagine. I love kids too.

    User 1: So, what do you do for a living?

    User 2: I''m a stay-at-home mom. I have three kids and I love spending time with them.

    User 1: Oh, that''s great. I love kids too.

    User 2: Me too. They''re the best!

    User 1: So, you''re a teacher and I''m a stay-at-home mom. What do you think of that?

    User 2: I think it''s great. We''re both doing what we love and that''s all that matters.

    User 1: I agree. We''re both lucky to have jobs that we love.

    User 2: We sure are.

    User 1: So, what are you doing this weekend?

    User 2: I''m not sure yet. What are you doing?

    User 1: I''m going to go shopping and then I''m going to read a book.

    User 2: That sounds like a great plan. I might do some shopping too.

    User 1: We should go shopping together sometime.

    User 2: That would be fun!

    User 1: Great. We''ll have to make a plan.

    User 2: Sounds good.

    User 1: So, where do you like to shop?

    User 2: I like to shop at Target, Walmart, and TJ Maxx.

    User 1: Me too! I love finding good deals.

    User 2: Me too. I''m always looking for a bargain.

    User 1: So, do you have any plans for the summer?

    User 2: I''m not sure yet. What about you?

    User 1: I''m going to go to the lake a lot and I''m also going to read a lot.

    User 2: That sounds like a great plan. I''m going to spend a lot of time with my kids.

    User 1: That sounds like fun.

    User 2: It is. I love spending time with them.

    User 1: Me too. I''m glad we''re both going to have a great summer.'
