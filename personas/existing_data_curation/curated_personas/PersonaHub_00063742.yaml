persona_description: A building professional who is focused on achieving high energy efficiency in commercial buildings, particularly those designed with a tight building envelope using structural insulated
  panels (SIPs) and insulated concrete forms (ICFs). This person is likely to be a project manager or construction manager who is responsible for overseeing the installation of SIPs in new buildings and
  ensuring that they are integrated with other systems to create a net-zero energy building. This person may also be involved in the design and construction of public and private schools, where they can
  leverage the energy savings and rapid installation capabilities of SIPs to meet strict construction schedules and deadlines.
