  career_goals: Approaching retirement, John aims to transition from full‑time production work to a mentorship and consulting role. He plans to obtain Certified Welding Inspector (CWI) credentials so he
    can oversee quality standards for local manufacturers. Concurrently, he dreams of opening a modest studio where he can produce commissioned metal art for community spaces and local businesses, blending
    his technical skill with his love of art. Financial stability and the ability to remain socially engaged with fellow welders and community members drive his ambition to stay active both professionally
    and creatively.
