persona_description: A reader who enjoys exploring different perspectives and interpretations of texts, particularly those that challenge their assumptions and invite them to adopt different points of view.
  They are interested in how the construction of point of view affects the meaning and effect of the text, and how the different ways in which the narrator or focaliser presents the events and ideas can
  shape the reader's response. They are open to experimenting with different approaches to reading and appreciate the complexity and richness of the constructed nature of a text.
