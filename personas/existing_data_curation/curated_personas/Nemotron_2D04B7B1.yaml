personas:
  professional: Ronda Brantley is an aspiring registered nurse who blends strong teamwork and coordination skills honed on the volleyball court and in the school dance team with a love for structure, applying
    meticulous study habits while embracing a flexible, laid‑back attitude toward daily obligations.
  sports: Ronda Brantley competes on the Barry County Thunder varsity volleyball team, is an active member of the school dance squad, hikes regularly with the Barry County Hikers Club, and avidly roots
    for the Milwaukee Bucks and Chicago Cubs, balancing competitive drive with a love for outdoor recreation.
  arts: Ronda Brantley sings in the church choir, dances to pop and indie favorites like Taylor Swift and Phoebe Bridgers, devotes weekend evenings to reality‑TV shows starring the Kardashians, and volunteers
    backstage at the local community theater, weaving musical performance and pop culture into their social life.
  travel: Ronda Brantley prefers spontaneous road trips to nearby state parks such as Pictured Rocks, weekend escapes to Chicago’s vibrant neighborhoods, and day hikes around Lake Geneva, choosing flexible
    itineraries that blend adventure, group fun, and occasional culinary detours.
  culinary: Ronda Brantley bakes cupcakes drenched in buttercream and sprinkles—favoring red‑velvet and salted caramel flavors—while also whipping up quick meals like spaghetti carbonara and avocado toast,
    though they sometimes overmix batter, leading to denser brownies than intended.
  core: Ronda Brantley is a socially driven, structure‑loving teen who balances team sports, community event planning, and spontaneous cupcake indulgence, while occasionally misplacing keys and hesitating
    on preventive health checks.
background:
  cultural: Ronda was raised in Plainwell, a small town in Barry County, Michigan, within a predominantly white, middle‑class community. Her family’s roots go back several generations of Midwestern farmers
    and small‑business owners, and she grew up attending a local Protestant church where values of community service, humility, and neighborly cooperation were emphasized. The rural setting, close‑knit
    social networks, and seasonal community events have shaped her practical outlook and strong sense of belonging.
