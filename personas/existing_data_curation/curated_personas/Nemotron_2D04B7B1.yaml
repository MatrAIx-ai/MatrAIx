  career_goals: Ronda plans to complete her high school education within the next two years, then enroll in a community‑college nursing program to become a registered nurse. She aspires to work in the local
    hospital or a community health clinic in Barry County, where she can combine her caring nature with structured medical training. Long‑term, she hopes to mentor younger students and possibly lead health‑education
    workshops for teens in her hometown.
