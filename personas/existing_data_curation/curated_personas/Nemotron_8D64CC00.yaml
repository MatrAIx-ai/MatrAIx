    Instruction'']'
  career_goals: He aims to transition from full‑time management to a part‑time consultancy role where he can mentor the next generation of operations leaders in the Upstate region. Marcus is also driven
    to author a memoir that weaves his career experiences with reflections on art, philosophy, and the evolving industrial heritage of Spartanburg. Moreover, he hopes to curate a community exhibition that
    showcases local craftsmanship and historical narratives, using his network to foster partnerships between businesses, arts institutions, and educational programs.
