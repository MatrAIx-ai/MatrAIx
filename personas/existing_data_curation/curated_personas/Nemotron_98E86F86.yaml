  career_goals: Although retired, Richard is focused on staying active and giving back. He plans to volunteer regularly at the local community center, mentor younger residents in practical trades, complete
    a memoir series about life in Eastern Kentucky, maintain his health through regular hiking, and explore the possibility of a small home‑based woodworking studio that sells handcrafted furniture and
    gifts.
