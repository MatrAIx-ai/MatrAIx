  career_goals: Monte is fascinated by big, noisy machines and the idea of exploring far‑away places. He often says he wants to be an astronaut who builds rockets, a firefighter who rescues people, or a
    construction worker who creates giant structures. His ambition is driven by a desire to lead, solve how‑things‑work puzzles, and win in games with his peers.
