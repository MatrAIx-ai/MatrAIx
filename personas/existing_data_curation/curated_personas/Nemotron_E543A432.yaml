  arts: Natalie Henderson, a 1-year-old, is soothed by Norwegian folk lullabies sung by their grandmother and delights in bright finger-painting sessions at local art fairs, where they admire works by Maine
    folk artist Emily Pratt, reinforcing an early appreciation for both musical heritage and visual storytelling.
