personas:
  professional: Angela Jones, a 17‑year‑old aspiring graphic designer and muralist, they combine a talent for digital illustration with strong interpersonal skills and a community‑first mindset, turning
    school projects, church events, and local volunteer initiatives into vibrant visual narratives that celebrate the delta’s heritage and environmental resilience.
  sports: Angela Jones thrives on weekly volleyball games at the Port Sulphur community center, they also join the local youth swim league each summer, and they cheer for the New Orleans Pelicans and the
    New Orleans Saints, blending a competitive spirit with a laid‑back love for group fitness.
  arts: Angela Jones channels a love for R&B and Zydeco into weekend karaoke sessions, they draw inspiration from artists like H.E.R., Clifton Chenier, and comic‑book creator Adrian Tomine, and they amplify
    their creative voice through the high school drama club, church choir, and the annual Port Sulphur art fair.
  travel: Angela Jones prefers spontaneous road trips down the Mississippi delta, they have photographed the Atchafalaya Basin and taken a weekend getaway to New Orleans’ French Quarter, while they daydream
    about a future eco‑art retreat in the Shenandoah Valley.
  culinary: Angela Jones enjoys whipping up backyard gumbo with okra and catfish, they also perfect shrimp poʼboys and sweet‑potato biscuits, and they experiment with avocado toast and matcha lattes when
    hanging out at the community center café.
  core: Angela Jones blends artistic curiosity, community devotion, and a habit of staying up late sketching to the soundtrack of zydeco, they turn every setback into a fresh mural idea, even if they sometimes
    forget to water their houseplants.
background:
  cultural: Angela grew up in Port Sulphur, a small, close‑knit community in Plaquemines Parish along the Mississippi River delta. Her family is part of the region’s African‑American community, with deep
    roots in the South’s musical and culinary traditions. The local church has been a cultural anchor, where gospel music and community service are central. Growing up near the wetlands, Angela is familiar
    with Cajun and Creole flavors that mingle with classic Southern cooking. The memory of Hurricane Katrina’s impact on the area and the subsequent community rebuilding has shaped her sense of resilience
    and collective responsibility. She blends these influences—Black Southern gospel, Zydeco rhythms, and a strong communal ethic—into her identity.
