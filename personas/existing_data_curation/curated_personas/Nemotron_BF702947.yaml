  career_goals: Angela aims to complete her GED within the next year and enroll in a community college art program. She aspires to become a graphic designer or mural artist, using her creativity to reflect
    the stories of her community. She hopes to combine art with activism by creating public art projects that raise awareness about environmental resilience and local heritage. In the longer term, she envisions
    founding a youth art collective that offers mentorship and workshop opportunities for teens in Plaquemines Parish. She also considers a part‑time role in social media management for local businesses
    to help boost economic growth.
