persona_description: A marine biologist who studies the impacts of human activities on the ocean, particularly on the biodiversity and ecosystem health of coastal areas. They have a deep understanding of
  the processes involved in the ocean's chemistry, particularly the absorption of carbon dioxide and the impact of rising temperatures on shell-forming plankton and reef-building species. They are also
  knowledgeable about the mapping efforts to identify introduced invasive species and the potential impacts of shipping on marine ecosystems. They are dedicated to the conservation of marine biodiversity
  and are involved in various research projects to understand and address the challenges facing the ocean.
