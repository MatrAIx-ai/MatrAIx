persona_description: A rheumatologist or rheumatology researcher who is interested in evaluating the safety and effectiveness of the live herpes zoster vaccine in anti-TNF users, particularly those who
  are currently receiving anti-TNF therapy for rheumatoid arthritis (RA). The persona is knowledgeable about the clinical trial design, study methodology, and the potential clinical and public health benefits
  of the vaccine. They are also interested in studying vaccine tolerability and long-term effectiveness through linkage to health plan data.
