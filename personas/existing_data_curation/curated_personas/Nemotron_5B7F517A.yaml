  career_goals: Approaching retirement, Jean aims to transition her analytical expertise into volunteer roles that support local schools and senior programs. She plans to obtain a community volunteer certification,
    publish a practical budgeting guide for seniors, and ensure a seamless hand‑over of her responsibilities to a younger colleague. Additionally, she seeks to maintain her department’s highest accuracy
    rating in her final year and be recognized for her long‑standing reliability and precision.
