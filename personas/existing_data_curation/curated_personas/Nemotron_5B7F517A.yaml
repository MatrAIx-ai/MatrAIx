personas:
  professional: Jean Dickson, a veteran statistician at the county health office, they blend meticulous spreadsheet modeling with a gentle mentor's touch, channeling their analytical precision into tutoring
    math and preparing to transition their expertise into volunteer roles that support local schools and senior programs.
  sports: Jean Dickson’s athletic routine consists of early morning walks with the local senior walking club, occasional gentle yoga sessions at the community center, and fervent support for the county’s
    high school football team, the Ravens, which they watch each Friday night from their porch while sipping iced tea.
  arts: Jean Dickson contributes her soprano voice to the church choir, finds solace in quilting patterns inspired by the works of William Morris, and enjoys listening to the timeless gospel of Mahalia
    Jackson while solving crosswords - a ritual that blends their love for music, craft, and mental challenge.
  travel: Jean Dickson prefers road-trip pilgrimages to historic Southern towns like Savannah and Charleston, where they trace genealogical clues, yet they balance their wanderlust with practical constraints,
    planning trips well in advance and opting for modest inns that accommodate their need for routine and comfort.
  culinary: Jean Dickson’s kitchen is filled with the aroma of simmering collard greens, their own garden tomatoes, and the occasional peach cobbler, and they delight in using fresh herbs from their balcony
    to spice up classic Southern recipes while avoiding excessive salt to keep their hypertension in check.
  core: Jean Dickson is a routine-driven, detail-obsessed retiree who juggles puzzling crosswords, gardening, and volunteer tutoring, while quietly battling worry and a competitive edge that fuels their
    quest for precision in every facet of life.
background:
  cultural: Jean was born and raised in rural Middle Tennessee, part of a longstanding white Southern family with deep ties to the Methodist church and local farming community. Her upbringing emphasized
    self‑reliance, practical problem‑solving, and close‑knit family values. She carries on regional traditions such as home‑cooked Southern meals, participation in community events, and a strong sense of
    hospitality, while maintaining a pragmatic, organized outlook shaped by her environment.
