  hobbies: '[''Woodworking'', ''Gardening'', ''Reading historical non‑fiction'', ''Model train building'', ''Chess'', ''Fishing'', ''Genealogy research'']'
  career_goals: Approaching retirement, Oliver aims to transition from a front‑line clerk to a senior advisory role within his organization, leveraging his decades of institutional knowledge to mentor younger
    staff and streamline office workflows. He is interested in obtaining a certification in office management or lean process improvement to formalize his expertise. Oliver also hopes to offer part‑time
    consulting to small businesses in Oldham County, helping them set up efficient filing systems and basic accounting procedures. Ultimately, he wants to secure a stable retirement while remaining intellectually
    engaged and contributing to his community's operational efficiency.
