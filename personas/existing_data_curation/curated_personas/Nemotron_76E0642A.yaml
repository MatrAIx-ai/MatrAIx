  career_goals: Andrew aims to leverage his hands‑on experience into a supervisory role within the next three years, targeting a store manager position at his current retailer. He is pursuing informal management
    training and plans to earn a certification in retail operations to strengthen his candidacy. Long‑term, he envisions becoming a district manager or opening a small, family‑run convenience store that
    can provide a stable future for his wife and children. He values a predictable career path that offers clear responsibilities, steady income, and the ability to mentor younger employees.
