  career_goals: Even at two, Justino has begun expressing early aspirations shaped by his personality. He often says he wants to be a "big helper" who builds things and keeps everything tidy—mirroring his
    love for organization. He idolizes his father's role as a community firefighter and frequently pretends to rescue toys, hinting at a future interest in public service or a hands‑on trade. These ambitions
    are tied to his competitive nature, as he seeks to excel and be praised for his achievements in any role he imagines.
