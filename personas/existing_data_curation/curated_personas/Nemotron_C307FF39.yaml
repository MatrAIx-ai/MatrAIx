personas:
  professional: Oscar Reyes, a production planner with over a decade in manufacturing, harnesses SAP and NetSuite alongside advanced Excel VBA dashboards to craft precise schedules, applies lean principles
    to eliminate bottlenecks, and channels a disciplined, detail‑oriented mindset into mentoring shop‑floor teams toward reliable, on‑time delivery.
  sports: Oscar Reyes stays active by joining the local 'Midtown Kickers' pickup soccer league on weekends, follows the MLS club LA Galaxy for inspiration, and incorporates light strength‑training sessions
    to maintain core stability for both the field and the demands of woodworking.
  arts: Oscar Reyes channels their creative drive through meticulous scale‑model construction and woodworking, while unwinding with classic rock legends like Led Zeppelin and Pink Floyd, admiring Impressionist
    works by Monet, and binge‑watching documentary series by David Attenborough, which together shape their aesthetic appreciation and inspiration.
  travel: Oscar Reyes prefers meticulously planned trips that blend historical exploration with modern marvels, having already toured the cobblestone streets of Barcelona and the neon districts of Tokyo,
    while dreaming of a road‑trip along Route 66 to capture roadside Americana, all balanced within a moderate travel budget.
  culinary: Oscar Reyes revels in cooking hearty family dishes like tamales and mole, mastering the art of slow‑cooked mole poblano with dried chilies, chocolate, and spices, while also experimenting with
    wood‑fired pizza using fresh mozzarella and basil, a hobby supported by their proficient but occasional improvisational kitchen skills.
  core: Oscar Reyes merges a methodical production planning career with a hobbyist’s obsession for scale‑model kits and woodworking, channels this precision into family cooking of tamales and mole, and
    occasionally neglects sleep in favor of late‑night spreadsheet tweaking.
background:
  cultural: Oscar grew up in a Mexican‑American household in Lakewood, a community with a strong Latino presence. He is bilingual in English and Spanish, and family traditions such as Día de los Muertos,
    quinceañeras, and weekend tamale making remain central to his identity. The values of respeto, collectivism, and hospitality he learned from his parents shape his cooperative demeanor and focus on harmony
    at work. He participates in the local Mexican cultural center, attending festivals, volunteering at community events, and maintaining close ties with extended family across Southern California. These
    cultural influences, combined with his Californian upbringing, give him a blended perspective that respects both his heritage and the diverse environment of Los Angeles County.
attributes:
  skills: '[''Production Scheduling'', ''Expediting Coordination'', ''Inventory Management'', ''ERP (SAP) Administration'', ''Advanced Excel & Data Visualization'', ''Lean Manufacturing'', ''Process Optimization'',
