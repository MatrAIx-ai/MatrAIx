  hobbies: '[''Model Kit Building'', ''Woodworking'', ''Pickup Soccer'', ''Cooking Mexican Cuisine'', ''Crossword Puzzles'', ''Documentary Watching'']'
  career_goals: Oscar aims to advance to a senior production planner role within the next two years, leveraging his experience to lead a small team of planners. He plans to earn the APICS Certified Production
    and Inventory Management (CPIM) credential to deepen his supply‑chain expertise. In the longer term, he aspires to become a production operations manager, overseeing end‑to‑end manufacturing processes
    and driving continuous‑improvement initiatives. He also hopes to mentor new hires, sharing his disciplined approach and fostering a culture of reliability and teamwork.
