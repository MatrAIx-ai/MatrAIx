  career_goals: Francisco aspires to become a visual storyteller—perhaps a comic book artist, animator, or graphic designer—who can create characters that connect with kids feeling anxious or sad. He dreams
    of combining his love for Mexican cultural motifs with modern media, eventually illustrating books that celebrate his heritage and promote mental‑wellness. In the longer term, he hopes to lead community
    art workshops for children, using creativity to help peers manage emotions and express themselves.
