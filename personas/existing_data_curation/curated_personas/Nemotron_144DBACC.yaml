personas:
  professional: Francisco Hernandezdavila, an aspiring digital storyteller, merges hand‑drawn cartoons with interactive Scratch projects and Minecraft builds, and they turn art club ideas into playful coding
    experiments while keeping a surprisingly organized schedule for schoolwork and class responsibilities.
  sports: Francisco Hernandezdavila cheers for the professional soccer team Red Warriors FC, and they regularly play for the neighborhood youth side Red Warriors Juniors, spending Saturdays dribbling at
    the local park with friends while mimicking the celebratory chants heard on match broadcasts.
  arts: Francisco Hernandezdavila spends after‑school hours sketching vivid interpretations of folk legends, channeling the bold line work of Bill Watterson and the whimsical animation style of Hayao Miyazaki,
    while they also practice traditional brass ensemble melodies during family gatherings and organize collaborative mural projects in the school art club.
  travel: Francisco Hernandezdavila loves weekend trips to nearby historic plazas and the local mountain reserve, and they dream of exploring the grand halls of the Louvre in Paris and wandering the ancient
    temples of Angkor Wat when they are older, balancing school homework with a yearning for adventure.
  culinary: Francisco Hernandezdavila enjoys crafting spicy grilled corn on the cob and cheesy empanadas for snack time, and they often experiment with colorful fruit smoothies and homemade pizza toppings,
    displaying a decent cooking skill level that impresses friends during occasional sleep‑over parties.
  core: Francisco Hernandezdavila is a vibrant eleven‑year‑old whose boundless imagination fuels a love for drawing, gaming, and soccer, yet an undercurrent of anxiety often amplifies their emotional responses,
    and they sometimes have meltdowns when plans go awry.
background:
  cultural: Francisco comes from a Mexican‑American family that blends traditional customs with Southern U.S. life. At home he speaks both Spanish and English, celebrates Día de los Muertos and Mexican
    holidays with family, enjoys meals like tacos, tamales, and collard greens, and listens to a mix of regional Mexican music and contemporary pop. His parents emphasize respect for elders, strong family
    ties, and the importance of sharing culture, which he expresses through his art and community involvement in Duluth’s growing Hispanic community.
