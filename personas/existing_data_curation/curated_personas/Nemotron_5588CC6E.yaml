    nights)", "Collecting and listening to vintage vinyl records", "Storytelling circles focusing on cultural narratives"]'
  career_goals: Although currently not employed, Tom aims to convert his love of art, culture, and community into a sustainable, low‑stress livelihood. He plans to launch a pop‑up cultural hub that offers
    occasional cooking workshops, art‑making classes, and storytelling evenings, drawing on his Pacific Island heritage and the local Wyoming outdoors vibe. To support this, he intends to complete online
    certifications in graphic design and video editing, enabling him to work as a freelance visual storyteller for local businesses and cultural organizations. He also hopes to mentor at‑risk youth in Newcastle,
    teaching them practical skills like woodworking, basic repairs, and creative expression, while fostering cross‑cultural understanding. His career ambitions remain flexible, prioritizing personal fulfillment
    and community impact over a rigid corporate ladder.
