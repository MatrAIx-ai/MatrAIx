  career_goals: Albert aims to advance into a senior quality‑assurance supervisory role within his organization. He plans to earn a Six Sigma Green Belt certification and complete a bachelor’s degree in
    Business Administration or Supply Chain Management to broaden his managerial competencies. His ambition is to improve process efficiency, reduce waste, and enhance workplace safety while mentoring newer
    employees. Long‑term, he envisions taking on full managerial responsibility for a quality‑control department and contributing to community safety outreach programs.
