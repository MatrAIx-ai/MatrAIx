  hobbies: '[''Art Gallery Visits'', ''Sketching'', ''Pottery'', ''Gardening'', ''Canoeing'', ''Reading Art History and Philosophy'', ''Attending Community Cultural Festivals'']'
  career_goals: Halida aims to spearhead a district-wide initiative that embeds arts-based learning across early childhood programs, securing sustainable funding through grant acquisition and local partnerships.
    She aspires to mentor emerging educators, cultivate a supportive, low‑stress workplace culture, and eventually pursue a doctorate in Educational Leadership to amplify her impact on policy and practice.
    Her long‑term vision includes establishing a community arts hub on Johns Island that offers after‑school programs and intergenerational workshops.
