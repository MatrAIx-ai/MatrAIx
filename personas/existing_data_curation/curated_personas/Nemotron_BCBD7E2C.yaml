  career_goals: He aims to move beyond entry-level support and secure a supervisory or team-lead position within the next three years, leveraging his competitive drive to achieve top performance metrics.
    To support that trajectory, Chris plans to enroll part-time at a community college for an associate degree in Business Administration, eventually transferring to a bachelor's program in Marketing or
