  hobbies: '["Fabric and texture photography","Art‑history and antique textile reading","DIY eco‑cleaning solution experimentation","Hiking in local state parks","Model train building","Listening to folk
    and bluegrass music"]'
  career_goals: Jefferson aims to move from a floor‑worker to a shift‑supervisor within his current dry‑cleaning shop, eventually leveraging his expertise to open a small, eco‑friendly laundry business
    that uses biodegradable solvents and offers specialized garment restoration for local theaters and museums. He wants to be recognized as the go‑to professional for delicate textile care in the Mechanicsburg
    area, providing a reliable, high‑quality service that can support his family’s financial security and allow a gradual reduction in physically demanding labor as he approaches retirement.
