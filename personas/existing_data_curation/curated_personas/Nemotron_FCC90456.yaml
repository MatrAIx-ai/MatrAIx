personas:
  professional: Lisette Estevez, a diligent Winchester real‑estate broker, blends a detail‑oriented, checklist‑driven workflow with warm bilingual client interactions, leveraging social‑media lead generation
    and community events to guide first‑time buyers while assertively negotiating deals that reflect her preference for structure yet flexibility in a fast‑moving market.
  sports: Lisette Estevez, an enthusiastic participant in community charity runs and a regular at the local dance studio for salsa and cumbia classes, roots for the Tennessee Titans and Nashville Predators,
    and they juggle seasonal fitness by hiking around Norris Lake in the summer and playing pick‑up volleyball at the Winchester community center in winter.
  arts: Lisette Estevez, a passionate lover of classic Latin pop and telenovela storytelling, regularly streams music by Juan Luis Guerra, Selena, and Carlos Vives while dancing in class, devours romance
    novels by Nora Roberts, and enjoys re‑watching iconic Mexican telenovelas starring Thalía and Fernando Colunga, which shape their sense of drama and romance in everyday life.
  travel: Lisette Estevez, who prefers spontaneous weekend getaways over long‑planned vacations, often drives to nearby lakes like Norris and Kentucky for picnics, attends music festivals such as Bonnaroo
    and the Americana Festival, and harbors a bucket‑list dream of exploring Oaxaca’s culinary scene while balancing family commitments and a modest travel budget.
  culinary: Lisette Estevez, an avid home chef, orchestrates weekend taco nights that fuse traditional cochinita pibil, mole poblano, and slow‑cooked carnitas with Southern comfort staples like cornbread
    and mac and cheese, relishing ingredients like chipotle, fresh cilantro, and jalapeño, while they occasionally experiment with smoky hickory‑infused BBQ ribs.
  core: Lisette Estevez blends structured real‑estate savvy with spontaneous culinary and travel adventures, channeling sociable energy into community service while juggling mild health worries and occasional
    financial splurges on festival fun.
background:
  cultural: Lisette was raised in a bilingual Mexican household; her parents immigrated from Jalisco and kept many traditions alive, from celebrating Día de los Muertos with altars to cooking mole and tamales.
    Growing up in a small‑town Texas border community before moving to Winchester, she blends Mexican hospitality with Southern charm. Her Catholic faith and close‑knit extended family shape her values
    of loyalty and community service. She remains actively involved in the local Hispanic association, mentors Spanish‑speaking home‑buyers, and incorporates Mexican cultural motifs into her home décor,
    while also embracing Tennessee customs like country‑music festivals and the annual Moore County BBQ.
attributes:
  skills: '[''Property valuation'', ''Market analysis'', ''Negotiation'', ''Bilingual communication (Spanish/English)'', ''Real estate law compliance (Tennessee)'', ''Client relationship management'', ''Lead
