  hobbies: '[''Cooking Mexican dishes'', ''Salsa and cumbia dancing'', ''Church outreach volunteering'', ''Rotary networking events'', ''Yoga and gratitude journaling'', ''Weekend road trips to lakes'',
    ''Reading romance novels'', ''Watching Mexican telenovelas'', ''Attending local music festivals'']'
  career_goals: Lisette wants to expand her personal brokerage into a boutique firm that specializes in family‑home sales and property management in Moore County. Over the next five years she plans to earn
    a Certified Residential Specialist designation, hire two junior agents, and increase her annual sales volume by 30 %. She also hopes to develop a mentorship program for new agents from the local Hispanic
    community, and ultimately transition to a regional director role that allows her to influence market‑level policies while achieving a healthier work‑life balance.
