persona_description: A paleoanthropologist who specializes in the study of human evolution, particularly the development of early humans and the migration patterns of populations from Beringia to southern
  Mexico. Her research focuses on the analysis of ancient human remains, including teeth and bones, to determine their age, origins, and migrations. Her expertise includes the use of radiocarbon dating,
  DNA analysis, and other methods to extract and analyze genetic information from ancient human remains. She is known for her groundbreaking work on the remains of Naia, a 12,000-year-old human skeleton
  found in the Hoyo Negro pit in Mexico.
