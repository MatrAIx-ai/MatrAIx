personas:
  professional: Dustin Caroline is a budding young engineer who spends weekends assembling LEGO robotics kits, coding simple games in Scratch, and channeling their meticulous, achievement‑driven mindset
    into solving engineering puzzles, all while staying quietly confident in small collaborative projects they enjoy.
  sports: Dustin Caroline spends afternoons dribbling in the community center’s under‑12 basketball league, idolizes Giannis Antetokounmpo of the Milwaukee Bucks, cheers on the Milwaukee Brewers during
    spring training, and maintains a disciplined fitness routine that includes daily jump‑rope and weekend jogs along the lakefront parks they find rejuvenating.
  arts: Dustin Caroline devours graphic comics such as 'Saga' and 'Spider‑Man', immerses in classic R&B from Marvin Gaye, vibes to Kendrick Lamar’s contemporary hip‑hop, and sings along to Kirk Franklin’s
    gospel hymns, letting the blend of storytelling and rhythm inspire their LEGO builds and Scratch programming they share with friends.
  travel: Dustin Caroline favors family road trips to Door County’s lighthouses and weekend visits to Chicago’s Museum of Science and Industry, meticulously drafting itinerary checklists that reflect their
    organized nature, while dreaming of a spring adventure to Florida’s Kennedy Space Center to witness a rocket launch, a trip they hope to experience with their parents.
  culinary: Dustin Caroline prefers classic comfort foods like pepperoni pizza and mac and cheese, delights in fried chicken with honey‑glazed carrots, and often experiments with simple creations such as
    banana‑cinnamon smoothies, though they sometimes over‑cook toast, leaving a charred edge they proudly claim adds character.
  core: Dustin Caroline merges the precision of a miniature engineer with the imagination of a sci‑fi fan, obsessively aligning LEGO bricks by color, hoarding free‑time video game tokens under their pillow,
    and occasionally staying up past bedtime to perfect a Scratch game they show to friends.
background:
  cultural: Dustin grew up in a close‑knit Black community on the north side of Milwaukee, where family gatherings, church services, and community events play central roles. His family celebrates traditions
    such as Sunday gospel brunches, Kwanzaa, and local festivals that highlight African‑American history and arts. The city’s rich musical heritage—from Motown‑inspired R&B to modern hip‑hop—shapes his
    taste in music. He is influenced by the legacy of Milwaukee’s civil‑rights leaders and benefits from after‑school programs at the local community center that emphasize academic excellence and community
    service. These cultural experiences reinforce his values of perseverance, cooperation, and giving back to his neighborhood.
