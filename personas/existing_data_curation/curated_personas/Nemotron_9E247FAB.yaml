  career_goals: Dustin aspires to become a civil engineer or software developer who designs community‑focused solutions. He dreams of designing safe playgrounds and green spaces in Milwaukee, and of creating
    educational apps that help other kids learn math and science. He aims to earn a scholarship to a STEM‑focused high school, participate in mentorship programs, and eventually give back by mentoring younger
    students in his neighborhood.
