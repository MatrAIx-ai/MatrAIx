  hobbies: '["Abstract Painting", "Mixed-Media Collage", "Speculative Fiction Reading", "Architectural Theory Study", "Yoga", "Chess", "Design Hackathons", "Hiking", "Landscape Photography", "Cooking Guatemalan
    Cuisine"]'
  career_goals: Rocio aims to establish a boutique architectural studio that pushes the boundaries of sustainable and culturally resonant design. She envisions creating landmark projects that fuse cutting-edge
    parametric techniques with Guatemalan heritage motifs, securing commissions for public and community-focused buildings in New York and Central America. Winning international design competitions and
    publishing research on climate-responsive architecture are top priorities. Over the next decade she also hopes to teach part-time at a graduate school, mentor emerging Latin American women architects,
    and build a reputation as a thought leader who balances imaginative experimentation with practical impact.
