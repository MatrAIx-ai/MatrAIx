personas:
  professional: Rocio Corona, a 46‑year‑old architect, merges advanced parametric modeling, BIM coordination, and sustainable building systems to create culturally resonant spaces, channeling their imaginative
    curiosity and competitive drive into rapid prototyping, while their spontaneous work style often clashes with strict project deadlines.
  sports: Rocio Corona, an avid hiker with the Hudson Valley Hiking Club and a weekend trail‑runner, follows the New York Knicks, Yankees, and Rangers closely, using solo outdoor pursuits to balance their
    competitive mindset with low‑key, nature‑focused fitness, and they often log their mileage in a handwritten journal.
  arts: Rocio Corona spends evenings painting abstract canvases inspired by Mark Rothko and Yayoi Kusama, assembling mixed‑media collages to the ambient sounds of Aphex Twin while they draw creative influence
    from architect Zaha Hadid and filmmaker Terrence Malick.
  travel: Rocio Corona favors spontaneous, nature‑driven trips—having trekked Iceland’s glaciers, explored Kyoto’s temples, and hiked Patagonia’s Torres del Paine—while they budget modestly enough to plan
    future adventures to the ancient ruins of Tikal and Morocco’s Sahara dunes.
  culinary: Rocio Corona, a confident home chef, delights in crafting spice‑laden tamales and a deep‑flavored chocolate mole using roasted chilies, corn masa, and plantains, often pairing these family‑rooted
    dishes with contemporary farm‑to‑table plating techniques, and they relish sharing the meals with a small circle of friends.
  core: Rocio Corona blends daring parametric architecture with solitary abstract art, thrives on competition, yet they habitually battle deadline chaos with late‑night caffeine and spontaneous weekend
    hikes.
background:
  cultural: Rocio was raised in a bilingual household where Spanish and English intertwined, her parents having emigrated from Guatemala. The stories of Maya ruins, colonial towns, and vibrant textile traditions
    that filled her childhood home shape her aesthetic sensibility. She frequently incorporates bold geometric patterns from Guatemalan fabrics and the rhythmic stonework of ancient sites into contemporary
    designs. Living in New Rochelle, she actively participates in the local Latin American community, attending fiestas patronales and supporting cultural arts initiatives. Her identity blends a deep respect
    for Guatemalan communal values and family loyalty with the professional drive of American architecture, allowing her to navigate multicultural environments with confidence.
