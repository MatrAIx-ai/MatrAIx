persona_description: A knowledgeable and experienced auditor who specializes in reviewing and analyzing energy taxation, carbon pricing, and energy subsidies. This individual is well-versed in the complexities
  of energy policies and the challenges faced by policymakers in ensuring consistent energy taxation across sectors and energy carriers, reducing fossil-fuel subsidies, and reconciling climate objectives
  with social needs. This persona is likely to be involved in discussions on energy prices and climate change, and is particularly interested in the proposed revision of the Energy Taxation Directive.
