  career_goals: Calleen hopes to graduate high school with strong grades in math and science, then pursue a bachelor’s degree in Computer Science at a university such as MIT or Northeastern. She dreams
    of becoming a software engineer who designs user‑friendly applications that support mental‑health management, combining her technical aptitude with her personal experience of anxiety. In the longer
    term, she envisions leading projects that integrate data‑driven insights to help individuals track and improve emotional wellbeing, while maintaining a balanced, predictable work environment.
