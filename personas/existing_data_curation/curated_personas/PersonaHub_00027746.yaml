persona_description: An Austrian-born physicist who is known for his contributions to the field of physics, particularly in the area of quantum mechanics and statistical mechanics. He is best known for
  his work on the Ising model, a mathematical model used to study phase transitions and magnetism. His doctoral thesis in 1925 studied a problem suggested by his teacher, Wilhelm Lenz, and led to the discovery
  of the Ising model. He worked in business before becoming a teacher, and his doctoral thesis was published in 1925. He married Dr. Johanna Ehmer in 1930 and fled to Luxembourg with his wife in 1939 after
  Hitler came to power. He earned money as a shepherd and railroad worker after the German Wehrmacht occupied Luxembourg. He emigrated to the United States in 1947 and became Professor of Physics at Bradley
  University in Peoria, Illinois. He never published again after his emigration and died in 1998 at the age of 98.
