personas:
  professional: John Robinson, an aspiring junior game developer, merges their methodical planning with a love for drawing to design simple Scratch games, carefully documenting each step in a colorful notebook
    while often collaborating with one or two friends.
  sports: John Robinson enjoys playing midfield on the Mullica Hill Youth Soccer team, participates in the local Little League baseball practice, follows the Philadelphia Eagles on TV, and prefers the calm
    of nature walks and backyard obstacle courses over large stadium crowds.
  arts: John Robinson immerses themselves in cartoon art, often sketching characters reminiscent of Calvin and Hobbes, practices watercolors inspired by Winslow Homer, looks forward to the annual Mullica
    Hill art fair where they showcase a tiny gallery of their creations, and listens to whimsical piano pieces by Yann Tiersen during practice.
  travel: John Robinson has visited the Liberty Bell in Philadelphia and the beach at Cape May, dreams of exploring Washington, D.C.’s natural history museums, prefers short weekend trips planned with a
    parent, and delights in collecting rock, leaf, and insect samples at each new destination.
  culinary: John Robinson loves pepperoni pizza, crafts strawberry smoothies sweetened with honey, enjoys drawing smiley faces on pancakes, and frequently picks fresh strawberries and homemade jam at the
    local farmers market, though they occasionally forget to finish their vegetables at dinner.
  core: John Robinson, a curious and organized 8‑year‑old, channels their love of drawing, LEGO building, and nature exploration into methodical creative projects, while juggling a disciplined allowance
    routine, mild allergies, and a preference for quiet, small‑group activities.
background:
  cultural: John grows up in a middle‑class, white, suburban family in Mullica Hill, New Jersey. His household reflects typical Mid‑Atlantic American customs, celebrating holidays like Thanksgiving, Independence
    Day, and Christmas with family gatherings and community events. He attends a local public elementary school where he interacts with a diverse group of peers, though he prefers small, close‑knit circles.
    The town’s modest cultural scene, featuring a farmers market, seasonal festivals, and a small historical museum, nurtures his appreciation for local arts and crafts. While his family values responsibility
    and organization, they also encourage his creative pursuits, enrolling him in after‑school art classes and beginner piano lessons.
