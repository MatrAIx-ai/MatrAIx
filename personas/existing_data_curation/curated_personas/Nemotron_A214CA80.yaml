  hobbies: '[''drawing cartoons'', ''painting watercolors'', ''LEGO building'', ''Scratch coding'', ''nature walks'', ''rock and leaf collecting'', ''listening to audiobooks'', ''beginner piano practice'',
    ''visiting local art fairs'']'
  career_goals: John dreams of becoming an architect or a designer who creates imaginative buildings and playgrounds for kids. Inspired by his love of art and his methodical nature, he envisions a future
    where he can blend creativity with precise planning. He also enjoys learning about space and sometimes imagines a career as an astronaut or a science illustrator, merging his curiosity about the universe
    with his drawing skills. For now, his biggest ambition is to win a school art competition and to build a large LEGO city that he can share with his classmates.
