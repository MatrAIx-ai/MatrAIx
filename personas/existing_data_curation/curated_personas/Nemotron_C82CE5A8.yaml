personas:
  professional: Javier Hernandez, a seasoned systems engineer turned community consultant, leverages three decades of statistical modeling, process optimization, and bilingual communication to translate
    complex data into actionable sustainability projects, and they apply this blend of curiosity and practicality to mentoring emerging engineers, balancing reliability with flexibility.
  sports: Javier Hernandez stays active through sailing with the San Juan Sailing Club, hiking the trails of El Yunque as a member of the local hiking association, and cheering on the Cangrejeros de Santurce
    baseball team and the Capitanes de Arecibo basketball squad, blending seasonal outdoor pursuits with community sports enthusiasm.
  arts: Javier Hernandez nurtures his artistic side by playing the cuatro at informal salsa jam sessions, attending plena festivals featuring groups like Bomba y Plena de Ponce, and listening to musicians
    such as Luis Fonsi, Celia Cruz, and Ricky Martin, while they occasionally collect vintage vinyl records of Latin jazz.
  travel: Javier Hernandez prefers carefully planned weekend getaways, often sailing to Vieques and Culebra for snorkeling, and dreams of touring historic sites in Barcelona and the vineyards of Mendoza,
    balancing adventure with budget‑conscious choices and occasional family trips.
  culinary: Javier Hernandez delights in cooking tropical dishes like mango‑glazed grilled fish, mofongo stuffed with plantains, and arroz con gandules, skillfully using ingredients such as coconut milk,
    ají dulce, and fresh papaya, while they enjoy a modest collection of kitchen tools that support their intermediate cooking level.
  core: Javier Hernandez, a lifelong learner who fuses technical precision with island rhythms, spends mornings tinkering in the workshop and evenings strumming a cuatro, while they keep a meticulous budget
    and a watchful eye on their health.
background:
  cultural: Born and raised in Trujillo Alto, Javier grew up immersed in the vibrant traditions of Puerto Rico. His family emphasizes close‑knit relationships, respect for elders, and the celebration of
    Catholic holidays intertwined with island customs. He is fluent in Spanish, comfortable in English, and cherishes the island’s musical heritage—especially bomba, plena, and salsa. Javier actively participates
    in community events such as the Fiestas de la Calle San Sebastián and volunteers with local youth centers, reflecting a strong sense of civic duty rooted in Puerto Rican values of solidarity, resilience,
    and pride in cultural identity.
attributes:
  skills: '[''Systems Engineering'', ''Statistical Modeling'', ''Process Optimization'', ''Project Management'', ''Technical Writing'', ''Research Design'', ''Bilingual Communication (Spanish/English)'',
