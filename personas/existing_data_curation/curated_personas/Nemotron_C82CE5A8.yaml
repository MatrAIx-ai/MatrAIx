  hobbies: '[''Sailing'', ''Hiking in El Yunque'', ''Tropical Fruit Gardening'', ''Playing the Cuatro'', ''Salsa Dancing'', ''Attending Plena Festivals'', ''Woodworking'', ''Reading Historical Novels and
    Biographies'']'
  career_goals: Although retired from full‑time employment, Javier aims to leverage his expertise to inspire the next generation of Puerto Rican STEM professionals. He aspires to volunteer as a mentor for
    local high‑school robotics clubs, develop a scholarship program for underrepresented students in engineering, and serve as a part‑time consultant for community‑based sustainability projects. Additionally,
    he hopes to author a series of practical guidebooks that blend innovative engineering concepts with proven local practices, thereby leaving a lasting legacy of knowledge and empowerment in his community.
