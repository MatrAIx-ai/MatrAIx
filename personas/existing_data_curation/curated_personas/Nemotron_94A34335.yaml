  hobbies: '[''Reading (mystery and non‑fiction)'', ''Hiking and nature walks'', ''Landscape photography'', ''Yoga'', ''Gardening (vegetables and native plants)'', ''Volunteering at the local food bank'',
    ''Board‑game evenings with close friends'']'
  career_goals: Sandra aims to transition from a clerk role to a supervisory position within the claims department, leveraging her curiosity for industry best practices and her practical mindset. Over the
    next five years she plans to complete her bachelor’s degree in Business Administration, obtain the Chartered Property Casualty Underwriter (CPCU) designation, and lead process‑improvement initiatives
    that reduce claim turnaround times. She also aspires to mentor new employees, contribute to insurance‑literacy workshops for the local community, and eventually move into an operations‑management role
    that blends her organizational strengths with her desire to help others achieve financial security.
