personas:
  professional: Aida Roman, an aspiring junior robotics engineer who couples disciplined LEGO constructions with Scratch programming to design simple autonomous bots, consistently applies their love for
    structure to meticulously document each prototype, and they inspire their small after‑school robotics club through quiet, organized leadership.
  sports: Aida Roman, a disciplined young gymnast training at Midtown Gymnastics Academy who meticulously logs each tumble and strength drill in a color‑coded notebook, follows the U.S. Women’s Gymnastics
    Team for inspiration, and they also cheer for the Los Angeles Dodgers during baseball season, preferring structured practice over casual play.
  arts: Aida Roman, an imaginative comic artist who sketches superhero panels inspired by Stan Lee’s dynamic poses and Hayao Miyazaki’s whimsical worlds, devotes brief daily piano sessions to practicing
    Einaudi’s 'Divenire' and quietly hums Taylor Swift’s 'Shake It Off' while sketching, showcasing a blend of disciplined practice and creative escape, and they often let their mind wander to interstellar
    adventures.
  travel: Aida Roman, an avid planner who maps out family trips with meticulous checklists—having already explored the Grand Canyon’s rim and dreaming of Kyoto’s bamboo forests—prefers organized weekend
    getaways over spontaneous vacations, balances school schedule constraints with a desire for cultural immersion, and they often save allowance pennies for a future Disney World adventure.
  culinary: Aida Roman, a budding home chef who confidently assembles tamales using masa harina, roasted pork, and caramelized onions, flips quesadillas with melted Oaxaca cheese and fresh cilantro, experiments
    with simple sushi rolls featuring cucumber and avocado, yet they often forget to clean the kitchen countertop promptly, reflecting their focus on creation over tidy‑up.
  core: Aida Roman, a structure‑loving 11‑year‑old who thrives on organized LEGO builds and quiet coding sessions, yet sometimes gets lost in daydreams of intergalactic adventures while they neglect bedtime
    routines.
background:
  cultural: Aida comes from a Mexican‑American family in Houston. She grows up bilingual, speaking Spanish at home and English at school, and celebrates cultural traditions such as Día de los Muertos, Cinco
    de Mayo, and family gatherings centered around Mexican cuisine. Her household emphasizes respect for elders, communal support, and Catholic holidays, while the multicultural environment of Houston provides
    her exposure to diverse communities and opportunities to share her heritage through school cultural events.
