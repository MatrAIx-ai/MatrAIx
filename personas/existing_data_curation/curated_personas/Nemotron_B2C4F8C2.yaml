  hobbies: '[''Reading adventure and science fiction books'', ''Drawing comic‑style illustrations'', ''Building LEGO constructions'', ''Playing piano'', ''Coding projects in Scratch'', ''Cooking Mexican
    dishes with family'', ''Participating in a robotics club'', ''Organizing the school library'']'
  career_goals: Aida aims to build a strong academic foundation in middle and high school, focusing on STEM subjects to earn scholarships for a biomedical science program. Her long‑term ambition is to become
    a pediatric doctor, a role where she can apply her disciplined approach to problem‑solving and her caring nature to support children's health. She also envisions contributing to her community by mentoring
    younger students in science and organizing educational activities.
