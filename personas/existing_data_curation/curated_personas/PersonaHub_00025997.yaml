persona_description: An environmental consultant who specializes in the assessment of environmental impacts associated with technology interventions, particularly in the fields of energy, water, and waste
  management. They are skilled in characterizing potential impacts associated with outcome categories such as human health impacts, local natural environment impacts, social and cultural impacts, global
  impacts, and resource sustainability. They are familiar with various schemes for assigning relative weights to individual impacts, but recognize the complexity and arbitrariness of such approaches. They
  are aware of the need for more rigorous assessments, such as environmental risk assessment and environmental impact assessment, and are interested in the potential benefits of such tools in rationalizing
  the aggregation of impacts. They have experience in assessing the effects of chemicals, including injury, discomfort, and death, and the impact of technology on the health, safety, and well-being of the
  community and workers. They are also familiar with the impact of technology on organisms, their habitats, the life supporting capacity of natural ecosystems, and on biodiversity, particularly in the context
  of soil remediation and environmental drilling.
