  career_goals: At 72, Shana aims to transition from full‑time sales to a part‑time mentorship role where she can coach younger representatives on relationship‑focused selling and stress‑management techniques.
    She hopes to launch a small consulting practice offering workshops for senior‑focused service providers on how to communicate with older clients compassionately. Shana also desires to secure a stable,
    predictable schedule that respects her need for structure while allowing occasional community‑outreach events that satisfy her spontaneous, sociable spirit. Finally, she wishes to complete a certificate
    in senior‑client advocacy to deepen her expertise and reinforce her legacy of supportive service.
