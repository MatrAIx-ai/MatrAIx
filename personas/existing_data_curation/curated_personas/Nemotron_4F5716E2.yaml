personas:
  professional: Shana Kenrick is a veteran sales representative turned mentor who leverages four decades of relationship-building, contract negotiation, and CRM expertise, combining her practical, structured
    mindset with spontaneous adaptability to coach younger reps and deliver compassionate client solutions.
  sports: Shana Kenrick enjoys low-impact water aerobics at the local community center during summer, walks each morning with the Wilmington Senior Walking Club, and passionately follows the Baltimore Ravens
    on game days.
  arts: Shana Kenrick finds solace in gospel legends like Aretha Franklin and blues icons such as B.B. King, regularly attends live soul concerts at the historic Wilmington Riverfront venue, and shares
    storytelling flair at community poetry nights.
  travel: Shana Kenrick favors short road trips to historic sites like Washington, D.C., and Savannah, Georgia, while dreaming of a Caribbean cruise to enjoy island rhythms and warm gardens as a gentle
    respite from winter.
  culinary: Shana Kenrick delights in preparing smoky collard greens, fried catfish with hush-puppy crumbs, and peach cobbler spiced with a pinch of cinnamon, often harvesting fresh herbs from her backyard
    garden to season each dish.
  core: Shana Kenrick balances a structured yet spontaneous spirit, mentors with compassion, manages finances prudently, battles anxiety, and spices life with soulful music, dancing, and garden-fresh meals.
background:
  cultural: Shana was raised in a Black family that migrated from the Jim Crow South to the Mid‑Atlantic during the Great Migration, settling in Delaware. Her upbringing was steeped in African‑American
    church traditions, gospel music, and a strong sense of community resilience. She grew up during the civil‑rights era, which instilled a deep appreciation for advocacy and collective support. Family
    gatherings emphasized storytelling, soulful cooking, and mutual aid, shaping her sociable and cooperative nature. While she completed high school locally, systemic barriers limited further formal education,
    prompting her to develop practical, on‑the‑job expertise instead. Her cultural identity remains a source of pride, informing her empathy for underserved clients and her commitment to mentoring younger
    generations within her community.
