  career_goals: She aims to advance to a regional management position within a reputable hotel chain, overseeing multiple properties and implementing sustainable hospitality practices. In the longer term,
    Alessandra envisions launching her own boutique inn that showcases local Indiana culture while offering an eco-friendly guest experience. She also hopes to mentor emerging hospitality professionals
    through a structured apprenticeship program and contribute to the local tourism board’s initiatives to promote community-based travel.
