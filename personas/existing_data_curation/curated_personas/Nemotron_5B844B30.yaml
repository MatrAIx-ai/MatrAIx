personas:
  professional: Braden Santos, a 33‑year‑old data‑driven operations analyst, leverages Python, SQL, and Lean Six Sigma to streamline ERP workflows while preserving the flexibility that their relaxed, competitive
    nature demands.
  sports: Braden Santos, an avid member of the Boulder Bike Club, tackles rugged trails on a mountain bike, hits the slopes at Winter Park Resort each winter, follows the Colorado Avalanche and Denver Broncos
    loyally, and squeezes in pickup basketball games at the Rocky Mountain YMCA whenever the schedule allows.
  arts: Braden Santos finds creative balance by tinkering with Raspberry Pi projects while streaming Sufjan Stevens and The Lumineers, attending installations at the Denver Art Museum, and binge‑watching
    Christopher Nolan’s films on quiet evenings.
  travel: Braden Santos favors spontaneous weekend road trips to Rocky Mountain National Park and Moab’s Arches, yet dreams of a meticulously planned Patagonia trek and a cultural immersion in Kyoto’s tea
    houses, balancing a modest travel budget with a hunger for both adventure and relaxation.
  culinary: Braden Santos, an intermediate home‑brewer, loves cooking hearty Colorado‑style venison chili with black beans, smoked paprika, and a splash of local craft beer, while also experimenting with
    hop‑forward IPAs and perfecting a tangy Gose on the side.
  core: Braden Santos blends a data‑obsessed mind with a love for untamed outdoors, yet habitually forgets to log daily metrics, relying on instinct and a competitive edge to keep progress on track.
background:
  cultural: Braden grew up in a middle‑class family in Golden, Colorado, with Portuguese ancestry on his paternal side and Irish roots on his mother’s. His upbringing blended the pragmatic, self‑reliant
    values of the American West with a respect for his family’s cultural traditions, such as celebrating Portuguese festivals and cooking classic dishes. The local outdoor culture and a community‑oriented
    mindset have shaped his practical outlook, while his mixed European heritage adds a layer of cultural awareness and appreciation for diverse perspectives.
attributes:
  skills: '["Data Analysis", "Process Optimization", "Lean Six Sigma", "Project Management", "ERP System Administration (SAP, Oracle)", "SQL", "Python Scripting", "KPI Development", "Stakeholder Communication",
