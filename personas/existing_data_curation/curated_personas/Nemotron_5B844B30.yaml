  hobbies: '["Hiking", "Mountain Biking", "Skiing", "Raspberry Pi Projects", "Home Brewing", "Reading Non‑fiction (Tech & Leadership)", "Fantasy Football", "Pickup Basketball", "Photography", "Cooking"]'
  career_goals: His next step is to move into an Operations Manager role where he can lead a cross‑functional team and drive enterprise‑wide efficiency initiatives. In the longer term, Braden aspires to
    become a Director of Business Operations or COO, championing data‑centric decision‑making and scaling automation across the organization. He also hopes to mentor junior analysts and eventually launch
    a boutique consultancy that helps mid‑size firms streamline operations.
