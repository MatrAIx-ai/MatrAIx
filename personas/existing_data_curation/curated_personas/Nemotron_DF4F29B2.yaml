    (Sudoku, jigsaw puzzles)'']'
  career_goals: Kong Park aims to transition from managing individual construction sites to shaping the strategic direction of a regional development firm. Over the next five years he plans to earn a LEED
    Accredited Professional credential and complete a part‑time MBA to strengthen his business acumen. His ultimate ambition is to become a Director of Construction or Vice President of Operations, overseeing
    multi‑million‑dollar projects such as hospitals, mixed‑use campuses, and high‑rise towers throughout the Southwest. Parallel to this corporate trajectory, he intends to establish a boutique consulting
    practice that offers risk‑focused efficiency solutions for contractors seeking to adopt lean and sustainable methods. While he values mentorship, he prefers structured, results‑oriented coaching that
    respects his need for focused, solitary work.
