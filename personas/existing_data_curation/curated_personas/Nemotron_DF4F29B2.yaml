personas:
  professional: Kong Park, a 51‑year‑old construction veteran, leverages 25 years of engineering expertise and a meticulous, curiosity‑driven mindset to integrate BIM, lean construction, and sustainable
    design into large‑scale Texas projects, while demanding disciplined, results‑oriented teamwork that satisfies their preference for structured, solitary problem‑solving.
  sports: Kong Park, an avid early‑morning fisherman and weekend hiker, belongs to the Texas Anglers Association, follows the Dallas Cowboys and Houston Astros, and maintains fitness through 5‑kilometer
    trail runs and monthly outings with a local senior hiking club.
  arts: Kong Park, who unwinds to Miles Davis jazz and Beethoven symphonies, devotes evenings to East‑Asian calligraphy inspired by Wang Xizhi and brush‑painting, and collects contemporary wood‑artist works,
    merging their love of precision with artistic expression.
  travel: Kong Park, who favors purposeful, low‑key travel, has explored the Hill Country vineyards of Fredericksburg, trekked the Rocky Mountain National Park, and dreams of a scholarly trip to Kyoto’s
    historic temples and Singapore’s Marina Bay to study the fusion of culture and infrastructure.
  culinary: Kong Park, an accomplished home chef, perfects hand‑rolled dumplings with pork, napa cabbage, and ginger, ferments kimchi with gochugaru, and pairs these with seared trout seasoned with rosemary,
    often experimenting with matcha‑infused dessert pastries.
  core: Kong Park, a 51‑year‑old construction strategist, chases precision in work and wood, treasures solitude, and combats a tendency to over‑analyze deadlines with midnight Sudoku sessions.
background:
  cultural: Kong Park is a first‑generation American of mixed East Asian heritage; his father emigrated from South Korea and his mother from China before the family settled in the United States. Growing
    up in a bilingual household, he is fluent in both Korean and Mandarin as well as English, and his upbringing emphasized the Confucian values of education, discipline, and respect for elders. He continues
    to observe cultural traditions such as Lunar New Year celebrations, Korean tea ceremony, and Chinese brush painting, often sharing these customs with his children. While fully integrated into the community
    of Allen, Texas—participating in local civic events and enjoying Texan BBQ—he maintains a strong connection to his roots through regular visits to Asian cultural associations, volunteer work with a
    local temple, and the preparation of traditional dishes at home. This blend of East Asian cultural identity and Texan pragmatism informs both his professional diligence and his personal appreciation
    for quiet, reflective activities.
attributes:
  skills: '[''Construction project management'', ''Cost estimating and budgeting'', ''Schedule planning (MS Project, Primavera)'', ''BIM integration (Revit, Navisworks)'', ''Safety compliance (OSHA 30‑hour
