    leadership and mentorship'', ''Data analysis and reporting (Excel, Power BI)'', ''Risk management and mitigation'']'
  hobbies: '[''Reading non-fiction (engineering history, philosophy)'', ''Woodworking and furniture making'', ''Architectural model building'', ''Fishing in local lakes'', ''Hiking in nature preserves'',
