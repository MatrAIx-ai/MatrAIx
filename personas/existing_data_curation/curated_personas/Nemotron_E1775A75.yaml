personas:
  professional: Mark Boggio is a veteran engineering technologist who leverages advanced CNC machining, Six Sigma expertise, and a methodical project‑coordination style to drive process‑improvement while
    mentoring junior staff and fostering a collaborative workshop culture; they are known for turning complex data into actionable fixes.
  sports: Mark Boggio plays second base for the Tift County senior softball league, follows the Atlanta Braves with avid enthusiasm, and spends early mornings on Lake Seminole fishing for largemouth bass
    with the local angler’s club; they treat each game and outing as both a social gathering and gentle exercise.
  arts: Mark Boggio volunteers for the regional community theater, crafting intricate sets inspired by the rustic realism of Andrew Wyeth, while they also restore 1950s Chevrolet Bel Airs and keep a notebook
    of bird calls reminiscent of Audubon’s field sketches.
  travel: Mark Boggio prefers meticulously planned road trips that combine visits to historic sites like Savannah’s historic district and Gettysburg National Military Park with family reunions in the Carolinas,
    and they budget each journey to balance comfort with frugality.
  culinary: Mark Boggio delights in turning fresh garden harvests into seasonal dishes like herb‑infused grilled trout with roasted beet and arugula salad, and they frequently host potluck dinners featuring
    homemade cornbread and apple crisp for the local senior center.
  core: Mark Boggio is a methodical, sociable retiree‑in‑transition who blends engineering precision with hands‑on hobbies, community mentorship, and a disciplined yet occasionally indulgent lifestyle.
background:
  cultural: Mark was raised in rural south‑central Georgia, growing up in a family with deep agricultural roots. The region’s Southern hospitality, strong sense of community, and church‑centered gatherings
    shaped his values of kindness, cooperation, and reliability. He attended local public schools before earning his STEM degree at a state university, and his cultural identity blends traditional Southern
    customs—such as an appreciation for regional food, seasonal festivals, and family‑oriented celebrations—with a modern, technology‑driven outlook fostered by his engineering career. This blend of heritage
    and professional experience informs his commitment to community service and mentorship.
