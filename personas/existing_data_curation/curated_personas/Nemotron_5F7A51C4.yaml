  hobbies: '[''playing soccer'', ''attending community festivals'', ''cooking Mexican cuisine'', ''listening to mariachi music'', ''working on classic cars'', ''barbecuing with family'', ''fishing trips'',
    ''volunteering at the local church'', ''participating in neighborhood block parties'']'
  career_goals: Jorge aims to move into a senior supervisory role where he can lead a team of mechanics and shape the plant’s maintenance strategy. He plans to earn a Journeyman Machinist certification
    and a specialized refractory technology credential within the next two years. Over the next five years, he hopes to launch a modest side business offering on‑site equipment repair and custom welding
    services to local manufacturers, providing additional financial security as he approaches retirement. Additionally, he wants to formalize a mentorship program for young Latino apprentices, helping them
    acquire trade skills while strengthening ties to his community.
