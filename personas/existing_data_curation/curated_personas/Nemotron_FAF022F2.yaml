  hobbies: '[''Painting'', ''Sketching'', ''Museum visits'', ''Reading contemporary fiction'', ''Listening to jazz and neo‑soul'', ''Cooking experimental dishes'', ''Solo nature walks'', ''Photography'',
    ''Yoga'', ''Mindfulness meditation'', ''Listening to healthcare podcasts'']'
  career_goals: Kimberly aims to leverage her associate’s background and on‑the‑job experience to enroll in an LPN program within the next year, with a long‑term goal of attaining a RN license and a bachelor’s
    degree in nursing. She is drawn to geriatric and community health nursing, where she can blend her clinical skills with her passion for the arts by developing art‑therapy‑informed wellness programs
    for older adults. Over the next five years she hopes to lead a patient‑advocacy initiative that addresses health disparities faced by Black residents in Cook County, while maintaining a flexible work
    schedule that preserves her need for solitude and creative time.
