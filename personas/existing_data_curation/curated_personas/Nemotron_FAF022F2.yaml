personas:
  professional: Kimberly Boswell blends their nursing assistant expertise—vital sign monitoring, basic wound care, and meticulous documentation—with a spontaneous, art‑infused bedside manner, often pulling
    out watercolors to soothe patients while juggling a flexible schedule that sometimes leaves them scrambling to meet deadlines.
  sports: Kimberly Boswell enjoys solo walks through Chicago’s forest preserves, regular yoga sessions at Heartland Yoga Studio, follows the Chicago Bulls and Cubs avidly, and occasionally joins a weekend
    running club training for the Chicago Marathon, preferring low‑impact exercise over competitive team sports.
  arts: Kimberly Boswell spends evenings painting abstract watercolors inspired by Julie Mehretu, visits the Art Institute of Chicago for quiet afternoons, and immerses themselves in the sounds of Miles Davis,
    Erykah Badu, and spoken‑word performances by Amanda Gorman while sketching candid urban street scenes.
  travel: Kimberly Boswell favors solitary, flexible trips that blend museum hopping in cities like Montreal with spontaneous hikes in the Great Smoky Mountains, while dreaming of a serene retreat in Kyoto’s
    zen gardens and a weekend getaway to Asheville’s vibrant art scene.
  culinary: Kimberly Boswell, an avid home cook, often merges Southern comfort flavors—such as smoked paprika collard greens and Jambalaya—with experimental twists like miso‑glazed salmon, reaching for
    kale, tahini, and plantain in their pantry while perfecting their weekend sourdough starter.
  core: Kimberly Boswell is a compassionate nursing assistant who weaves spontaneous watercolor sessions into patient care, thrives in quiet solitude, yet habitually misplaces their planner, leading to
    last‑minute scrambles before shifts.
background:
  cultural: Kimberly is a second‑generation African‑American who grew up in the suburbs of Chicago, where her family’s roots trace back to the Great Migration. Her upbringing blended the close‑knit support
    of a Black church community, weekly family gatherings featuring soul food and storytelling, and exposure to the vibrant cultural scene of Chicago’s South Side. She draws strength from the resilience
    of the Black community in Cook County, and she honors that heritage by staying connected with local cultural festivals, supporting Black‑owned businesses, and incorporating culturally relevant art and
    music into her caregiving. Her identity informs her compassionate bedside manner and fuels her commitment to reducing health inequities for Black patients.
attributes:
  skills: '[''Patient care'', ''Vital signs monitoring'', ''Mobility assistance'', ''Basic wound care'', ''Infection control'', ''Medical documentation'', ''Effective communication'', ''Cultural competency'',
