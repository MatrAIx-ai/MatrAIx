  career_goals: Motilal aims to shepherd his company through a comprehensive digital transformation that positions it as a market leader in sustainability and technology integration. He seeks to expand
    the firm’s footprint into emerging South Asian markets, leveraging his heritage to forge strategic partnerships. Over the next five years, he plans to establish a corporate art foundation that supports
    emerging artists and enriches the workplace culture. As he nears traditional retirement age, he envisions transitioning to a board advisory role while continuing to mentor the next generation of leaders
    and consulting on social‑impact ventures.
