  hobbies: '[''Gardening (magnolia and native plants)'', ''Reading historical fiction and biographies'', ''Yoga and walking'', ''Church choir singing'', ''Small book club gatherings'', ''Traditional Southern
    cooking with African influences'']'
  career_goals: Anne aims to expand her company's impact by creating sustainable jobs in Williamsburg County, while establishing a mentorship pipeline for young Black entrepreneurs. She aspires to modernize
    the business’s operations through modest tech upgrades, increase annual revenue by 20% in the next three years, and position herself as a regional advocate for economic empowerment of underrepresented
    communities. She also hopes to transition into a board role for a statewide nonprofit focused on workforce development.
