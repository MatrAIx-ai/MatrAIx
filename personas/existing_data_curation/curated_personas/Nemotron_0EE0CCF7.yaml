personas:
  professional: Anne Hagood leverages decades of hands‑on experience to lead a diversified small‑business portfolio in rural South Carolina, blending strategic planning and operational oversight with a
    community‑first mindset, and while they are open to data‑driven inventory tools, they prefer incremental upgrades that respect the town’s traditional rhythms.
  sports: Anne Hagood enjoys low‑impact fitness such as yoga and river walks, roots for the Carolina Panthers and the local high school football team, and participates in a community walking club that meets
    monthly along the Pee Dee River.
  arts: Anne Hagood sings in her church choir, draws inspiration from gospel legends like Mahalia Jackson and contemporary soul artists such as H.E.R., and participates in a book club that discusses historical
    fiction by authors like Alex Haley, while they occasionally attend a regional theater’s production of August Wilson’s plays.
  travel: Anne Hagood prefers purposeful travel that balances reflection and community connection, favoring weekend trips to historic Savannah and Charleston, dreaming of a cultural pilgrimage to Ghana,
    and keeping travel plans flexible to accommodate family gatherings.
  culinary: Anne Hagood experiments with Southern comfort dishes infused with African-inspired flavors, often preparing collard greens with smoked paprika, sweet potato gumbo, and shrimp‑and‑grits seasoned
    with okra, and they enjoy growing heirloom tomatoes and pepper varieties in their garden to freshen each recipe.
  core: Anne Hagood is a community‑driven entrepreneur who blends curiosity with practicality, savoring solitary garden moments, nurturing local talent, and navigating life with calm resilience and occasional
    organized‑chaos.
background:
  cultural: Anne was raised in a tight‑knit African‑American community in rural South Carolina, where church, family, and community service were central. Her grandparents were part of the civil‑rights movement,
    instilling a strong sense of perseverance and collective responsibility. She grew up with Southern culinary traditions, gospel music, and storytelling, which inform her values of hospitality, resilience,
    and communal uplift. While she holds a high‑school diploma, she has built her career through mentorship, apprenticeship, and active participation in local business networks, embodying the resourcefulness
    often celebrated in Black Southern culture.
attributes:
  skills: '[''Strategic planning'', ''Operational management'', ''Financial oversight'', ''People development and mentorship'', ''Negotiation'', ''Supply chain optimization'', ''Crisis management'', ''Community
