  career_goals: Johnnie aims to progress from his current managerial position to a senior director role overseeing operations for a regional tech firm, where he can shape innovation strategies while maintaining
    a people‑first culture. He aspires to lead large‑scale transformation projects that blend new technologies with existing processes, mentor emerging leaders, and eventually launch his own consulting
    practice focused on agile workplace design. Balancing career advancement with family life remains a central ambition.
