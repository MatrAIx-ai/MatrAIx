    User 2: You should come with me sometime! I''d love to show you the trails around here.

    User 1: That would be great! I''m free this weekend if you are.

    User 2: Sounds good! I''ll text you the details.

    User 1: Great! See you then!


    [On the weekend]


    User 1: Hi Emily! Are you ready to go hiking?

