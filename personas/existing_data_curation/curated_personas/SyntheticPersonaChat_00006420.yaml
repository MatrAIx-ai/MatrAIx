    User 1: I''ve never seen so many trees in my life!

    User 2: This is just a small part of it. There are so many more trails out here.

    User 1: I can''t wait to explore more.

    User 2: Me too!


    [After hiking]


    User 1: That was so much fun! I''m so glad we did this.

