  career_goals: Hector plans to complete his GED within the next year and enroll in a community‑college apprenticeship program for automotive technology. His long‑term ambition is to own a small, community‑focused
    auto‑repair shop where he can offer reliable service and provide job training for other local youth. He also hopes to combine his technical skills with his love for his heritage by eventually offering
    a mobile service that travels to underserved neighborhoods, helping residents with vehicle upkeep and basic tech support.
