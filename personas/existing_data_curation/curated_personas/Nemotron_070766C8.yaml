personas:
  professional: Hector Ramirez is an aspiring automotive technician apprentice who leverages bilingual fluency, hands‑on automotive repair skills, and meticulous project‑logging to deliver reliable service
    in his community, all while applying his methodical planning and cooperative nature to every task.
  sports: Hector Ramirez plays weekend soccer with a small group of friends at Westfield Park, cheering for the Chicago Fire FC and the Chicago Cubs, and they maintain a modest fitness routine that balances
    casual competition with a preference for small‑team camaraderie over large crowds.
  arts: Hector Ramirez channels creative energy into designing pixel‑art sprites for indie games, drawing inspiration from chiptune legends Yuzo Koshiro and Koji Kondo, while their weekend listening sessions
    include traditional mariachi ensembles such as Los Camperos and modern folk artists like Lila Downs, reflecting a blend of retro gaming culture and family musical heritage.
  travel: Hector Ramirez prefers carefully planned road trips that combine nature hikes at Starved Rock State Park with occasional weekend getaways to Chicago's cultural districts, and they dream of a future
    immersive visit to Oaxaca to explore ancestral culinary traditions, balancing budget constraints with a love for both local adventure and international cultural immersion.
  culinary: Hector Ramirez enjoys cooking traditional mole sauce—a complex blend of dried chilies, cacao, nuts, and spices—alongside handmade tamales using fresh corn masa, demonstrating moderate culinary
    skill honed alongside their grandmother, while they also experiment with adding local Illinois honey to sweeten the mole, reflecting a fusion of heritage and regional flavors.
  core: Hector Ramirez is a methodical teen who balances a love for model‑airplane kits and pixel‑art with a disciplined spreadsheet habit, shy yet deeply community‑oriented, and occasionally forgets to
    finish school assignments because they get lost in a reverie of engine diagrams.
background:
  cultural: Hector is a second‑generation Mexican‑American raised in a close‑knit Mexican household in Morris, Illinois. He grew up speaking both Spanish and English, celebrating holidays like Día de los
    Muertos, Cinco de Mayo, and Christmas with traditional foods, music, and family rituals. His Catholic upbringing is evident in his participation in local church events and the strong value placed on
    community and mutual support. While his family has integrated into Midwestern life—enjoying local festivals and school sports—Hector retains a deep appreciation for Mexican culinary traditions, storytelling,
    and the emphasis on respect for elders and collective harmony.
