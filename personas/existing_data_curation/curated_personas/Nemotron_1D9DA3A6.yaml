  career_goals: Carla aims to cement her legacy as a master artisan by expanding her boutique into a small studio that also serves as a mentorship hub for emerging jewelers. She plans to launch a limited-edition
    line that fuses classic motifs with avant‑garde materials, publish a memoir‑style guide on ethical gemstone sourcing, and collaborate with local artists on community art installations that celebrate
    Las Vegas’ desert heritage. While mindful of financial pressures, she seeks to balance profitability with artistic integrity and personal well‑being.
