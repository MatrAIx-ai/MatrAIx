  career_goals: Jenifer aims to advance to a senior engineer or tech‑lead role within the next three to five years, taking responsibility for architectural decisions and guiding a development team. She
    plans to earn AWS Solutions Architect and Certified Scrum Master certifications to deepen her cloud and project‑management expertise. In parallel, she intends to launch a side SaaS product that helps
    local small businesses manage customer appointments, and she hopes to contribute regularly to open‑source projects while mentoring junior developers. Maintaining a healthy work‑life balance remains
    a core ambition.
