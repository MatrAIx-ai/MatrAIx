personas:
  professional: Juan Gibbs, a 23‑year‑old aspiring program coordinator, merges his humanities background with a knack for digital storytelling to design community arts workshops, using their strong communication
    and graphic design skills while battling a tendency to procrastinate on project timelines.
  sports: Juan Gibbs enjoys pickup basketball at the Northside rec center, follows the Minnesota Timberwolves and Minnesota Vikings with fervor, participates in a casual weekend running club that meets
    at the Chain of Lakes, and prefers a laid‑back fitness routine that fits around their jam sessions rather than strict training regimes.
  arts: Juan Gibbs immerses themselves in hip‑hop production, sampling jazz legends like Miles Davis and vocal grooves of Nina Simone, drums in a community jam circle alongside local artists such as Kendrick Lamar
    admirers, captures street life with a Canon EOS, and frequently visits the Minneapolis Institute of Art to study works by Kehinde Wiley and contemporary muralists, weaving these influences into their
    own digital storytelling.
  travel: Juan Gibbs prefers spontaneous weekend getaways by train to Chicago’s blues scene and New Orleans for Mardi Gras jazz, dreams of a cross‑country road trip to explore historic migration routes,
    yet balances travel with a modest budget and family responsibilities, often planning trips through community group savings.
  culinary: Juan Gibbs experiments in their balcony kitchen, blending Southern staples like smoked brisket and collard greens with Midwest flavors such as cheese curds and wild rice, proudly serves spicy
    jalapeño cornbread alongside a honey‑glazed sweet potato mash, and frequently swaps recipes at local potlucks while praising the earthy taste of fresh rosemary from their own garden.
  core: Juan Gibbs navigates life with a storyteller’s heart, a spontaneous spirit that fuels creative bursts and occasional deadline misses, a deep commitment to community empowerment, and a habit of late‑night
    coffee‑fueled beat‑making sessions that keep their world both vibrant and a little chaotic.
background:
  cultural: Juan grew up in North Minneapolis, a vibrant hub of Black culture and activism. His family maintains strong ties to African American traditions, including storytelling, gospel music, and communal
    gatherings that celebrate resilience and solidarity. He has been involved in local cultural festivals, such as the Twin Cities Black Arts Festival, and regularly volunteers at community gardens that
    address food equity. The legacy of civil rights activism in Minneapolis, exemplified by figures like Malcolm Little (Malcolm X) and recent movements for social justice, informs Juan’s worldview and
    fuels his commitment to community empowerment. While he embraces contemporary urban culture—hip‑hop, street art, and culinary experimentation—he also values the historical narratives of Black migration
    and settlement in the Midwest, which shape his sense of identity and purpose.
attributes:
