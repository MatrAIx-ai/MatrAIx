  hobbies: '["Reading (fiction, African American literature, philosophy)","Music listening and production (hip‑hop, jazz)","Drumming","Improv theater","Photography (street and cultural events)","Urban gardening","Cooking
    (fusion of soul food and Midwestern cuisine)","Mentoring high‑school students","Visiting museums and galleries","Attending live performances"]'
  career_goals: Juan aims to channel his humanities background and community‑focused skills into a role that blends cultural expression with social impact. He aspires to become a program coordinator for
    a local arts nonprofit or community center, where he can design and lead workshops that celebrate Black heritage and foster dialogue. In the longer term, he envisions pursuing a master's in public administration
    or nonprofit management to enhance his leadership capacity, potentially moving into grant writing or policy advocacy for arts equity. Juan also hopes to develop a freelance portfolio of digital storytelling
    projects that amplify underrepresented voices, balancing his need for flexible, creative work with purposeful community engagement.
