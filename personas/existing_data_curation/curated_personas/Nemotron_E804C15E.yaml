  career_goals: Lucy aims to leverage her blend of technical and creative abilities into a future career that balances innovation with real-world impact. In the short term, she plans to deepen her coding
    and design skills through high-school STEM clubs and a personal portfolio of digital projects. She hopes to attend a university program in product design or user experience engineering, where she can
    create educational tools or sustainable consumer products. Ultimately, she envisions leading a multidisciplinary team that develops intuitive, socially responsible designs.
