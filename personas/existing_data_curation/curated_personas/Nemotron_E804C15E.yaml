personas:
  professional: Lucy Ruano, an aspiring robotics hobbyist and digital illustrator, merges practical problem‑solving with boundless imagination, thriving in small‑team projects while often jumping between
    ideas before deadlines.
  sports: Lucy Ruano follows the Cleveland Browns and Cleveland Cavaliers with enthusiasm, participates in the school’s casual track club for fun runs, enjoys birdwatching along Euclid Creek as low‑key
    exercise, and prefers weekend bike rides over organized team sports.
  arts: Lucy Ruano spends evenings sketching fantasy characters inspired by Brandon Sanderson and the digital art style of Sakimichan, listens to the orchestral scores of The Legend of Zelda while creating
    fan art for Instagram, and occasionally attends community theater productions at the local church hall.
  travel: Lucy Ruano loves weekend trips to Cuyahoga Valley National Park and day outings to Niagara Falls, dreams of exploring the towering Redwood forests of California and the historic streets of Edinburgh,
    and typically plans trips using free online guides while balancing schoolwork and a modest travel budget.
  culinary: Lucy Ruano enjoys baking chocolate chip cookies with dark cocoa and a pinch of sea salt, perfects a fluffy banana bread, experiments with TikTok's mini strawberry shortcake trend, and appreciates
    classic Midwest comfort foods like chicken pot pie, often sharing treats at family meals.
  core: Lucy Ruano is a curiosity‑driven teen who toggles between building LEGO worlds, sketching fantasy realms, and baking cookies, can flawlessly time a dessert despite forgetting homework, and quietly
    hoards stray LEGO pieces for future projects.
background:
  cultural: Lucy was raised in Euclid, a suburban community in Cuyahoga County, Ohio, within a middle-class, predominantly white family that embodies Midwestern values of modesty, self-reliance, and community
    involvement. Her upbringing includes regular family meals, participation in local church activities, and attendance at school and neighborhood events such as the annual Ohio State Fair and community
    clean-up days. The region's blend of industrial history and access to natural spaces like the Cuyahoga Valley National Park has fostered her appreciation for both practicality and exploration. While
    her cultural heritage is primarily Anglo-American, she has been exposed to the diverse ethnic tapestry of the Greater Cleveland area, influencing her openness to different perspectives.
