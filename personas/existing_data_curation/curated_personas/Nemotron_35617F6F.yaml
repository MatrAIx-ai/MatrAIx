  hobbies: '[''Community blood drive volunteering'', ''Bowling league'', ''Hiking'', ''Fishing'', ''Cooking Southern barbecue'', ''Country and bluegrass concerts'', ''Volunteer church outreach'', ''DIY
    home improvement'', ''Gardening'']'
  career_goals: Joel aims to transition into a supervisory role, such as Phlebotomy Supervisor or Laboratory Manager, where he can expand his impact on process improvement and staff development. He plans
    to obtain the Certified Phlebotomy Supervisor credential and complete an associate degree in health services administration, eventually pursuing a bachelor’s in healthcare management. His long‑term
    ambition includes leading a regional blood‑collection center, championing efficiency initiatives, and mentoring the next generation of phlebotomists while maintaining the high standards he values.
