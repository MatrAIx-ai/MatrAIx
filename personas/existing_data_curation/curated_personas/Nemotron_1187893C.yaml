  career_goals: Roy aims to ascend to a senior executive role—such as Director of Construction Operations or Vice President of Development—within the next five years, overseeing multi‑million‑dollar infrastructure
    and mixed‑use projects across the Upper Midwest. To solidify his credentials, he plans to earn a Project Management Professional (PMP) certification and become a LEED Accredited Professional, positioning
    himself as a leader in sustainable, high‑performance building. He also envisions launching his own boutique construction consultancy that emphasizes data‑driven project delivery, allowing him to combine
    his competitive drive with a structured, results‑focused business model.
