personas:
  professional: Amy Myers, a seasoned construction helper with decades of on‑site experience, leverages her hands‑on expertise in framing, concrete mixing, and equipment operation to mentor apprentices,
    coordinate crews with clear communication, and launch a modest side‑business offering home‑repair services for senior neighbors, all while balancing her preference for structure with a flexible, competitive
    spirit.
  sports: Amy Myers competes in the town's weekly bowling league at the Piqua Bowling Club, enjoys line‑dancing to country tunes at community events, roots for the Cincinnati Bengals, and occasionally joins
    a senior walking group, blending her competitive streak with social fitness.
  arts: Amy Myers' artistic side shines during line‑dancing nights to Dolly Parton and Willie Nelson, she watches classic westerns starring John Wayne at the community theater, and she keeps a collection
    of bridge‑themed novels for quiet evenings, reflecting her love of both performance and strategic games.
  travel: Amy Myers prefers low‑key weekend getaways to nearby Hocking Hills State Park and Lake Erie, while planning an annual winter visit to her daughter’s home in Florida, balancing travel with her
    part‑time mentoring schedule and side‑business commitments.
  culinary: Amy Myers loves cooking hearty meals like pot roast with root vegetables, homemade cornbread, and apple pie for church potlucks, often using fresh tomatoes and basil from her garden, though
    she occasionally relies on boxed mixes for convenience during busy weeks.
  core: Amy Myers is a competitive bowler and line‑dancer who mentors apprentices, runs a side‑business for seniors, juggles finances with occasional forgetfulness, and stays active despite osteoarthritis,
    embodying a pragmatic yet flexible outlook.
background:
  cultural: Amy grew up in the Midwest, raised in a small‑town Ohio family with deep roots in the region's farming and manufacturing heritage. Her lineage includes German and Irish ancestry, and she was
    brought up in a Protestant (Methodist) environment that emphasized hard work, self‑reliance, and community service. Living her whole life in Piqua, she embodies Midwestern values of practicality, friendliness,
    and a strong sense of local pride.
attributes:
  skills: '[''Basic framing assistance'', ''Concrete mixing and pouring'', ''Forklift and cement mixer operation'', ''Simple blueprint reading'', ''Safety compliance and PPE usage'', ''Material handling
    and inventory control'', ''Team coordination and crew communication'', ''Customer service on construction projects'']'
  hobbies: '[''Bowling league participation'', ''Line dancing at community events'', ''DIY home improvement projects'', ''Community gardening'', ''Volunteer work at senior center'', ''Cooking for church
    and family gatherings'', ''Bridge and competitive card games'']'
  career_goals: As she approaches retirement, Amy aims to transition from full‑time labor to a part‑time mentor role, officially training new apprentices at the local union hall. She also hopes to launch
    a modest side business offering home‑repair and renovation services for senior neighbors, allowing her to retain a predictable schedule while staying active. Financial stability for her family and the
    ability to give back to the Piqua community are her primary ambitions.
