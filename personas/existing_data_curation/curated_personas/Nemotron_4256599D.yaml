  career_goals: Jennifer aims to advance from her current store‑manager role to a district‑manager position within the next five years, overseeing multiple locations across the New York tri‑state area.
    She plans to earn her GED and pursue an associate degree in Business Administration to strengthen her academic credentials. Long‑term, she envisions opening a community‑focused retail space that showcases
    Dominican artisans while providing mentorship programs for Bronx youth. Ultimately, she seeks to become a recognized leader in both retail innovation and community development, using her cultural insights
    to bridge business and local culture.
