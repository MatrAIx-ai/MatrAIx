  hobbies: '["DIY home‑improvement projects", "Vintage car restoration", "Reading historical fiction and non‑fiction", "Hiking in the Santa Monica Mountains", "Industrial and urban photography", "Cooking
    experimental dishes", "Attending indie film screenings", "Playing strategy video games"]'
  career_goals: Chadwick aims to advance from machine operator to lead technician and eventually into a supervisory or production‑manager role. He plans to earn certifications in CNC programming and lean
    manufacturing, lead process‑improvement projects, and gain experience that could transition him into manufacturing engineering. Long‑term, he dreams of launching a boutique metal‑fabrication studio
    that merges his technical expertise with his passion for design and artistic expression.
