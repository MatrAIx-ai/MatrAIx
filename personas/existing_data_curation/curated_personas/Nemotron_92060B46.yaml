personas:
  professional: Chadwick Warner is a CNC press operator whose hands‑on expertise, analytical writing background, and curiosity‑driven mindset enable him to troubleshoot equipment, drive lean improvements,
    and mentor peers while steadily advancing toward a lead‑technician and production‑manager position.
  sports: Chadwick Warner hikes the Santa Monica Mountains with the Los Angeles Alpine Club, plays pick‑up basketball supporting the LA Lakers, follows the LA Dodgers and LA Rams, and participates in a
    community cycling group that meets for weekend rides along the Pacific Coast Highway.
  arts: Chadwick Warner regularly attends indie film screenings at the Aero Theatre, especially works by the Duplass Brothers and Jim Jarmusch, curates a personal collection of Edward Burtynsky’s industrial
    photography, and fills his playlists with The War on Drugs, St. Vincent, and occasional jazz vinyls, all of which inform his creative spark for experimental cooking and design.
  travel: Chadwick Warner enjoys road‑tripping along the West Coast, having explored Detroit’s auto museums, Munich’s BMW museum, and a weekend venture to Joshua Tree, while dreaming of a culinary pilgrimage
    to Tokyo’s Tsukiji market and a Patagonia trek, balancing limited vacation days with a love for hands‑on experiences.
  culinary: Chadwick Warner experiments with sous‑vide pork belly glazed with miso, crafts homemade fermented hot sauce using poblano chilies, and perfects a smoked‑mozzarella pizza topped with prosciutto,
    showcasing his penchant for bold flavors and willingness to tinker in the kitchen as meticulously as he does with CNC machines.
  core: Chadwick Warner merges a meticulous, hands‑on engineering mind with a restless curiosity for vintage cars and experimental cuisine, yet they often sacrifice sleep for late‑night strategy gaming
    and forget to log mileage for tax deductions.
background:
  cultural: Chadwick grew up in a middle‑class white family in suburban Los Angeles, an environment that blended the region’s multicultural vibrancy with a strong West Coast work ethic. Exposure to the
    city’s thriving arts scene, its diverse culinary landscape, and nearby manufacturing hubs gave him a practical yet culturally aware outlook. His humanities degree deepened his appreciation for literature,
    history, and the arts, shaping a worldview that values both creativity and efficiency.
attributes:
  skills: '["CNC press operation", "Blueprint reading", "Machinery maintenance", "Safety compliance (OSHA)", "Quality control and inspection", "Material selection (metal and plastic)", "Technical documentation",
