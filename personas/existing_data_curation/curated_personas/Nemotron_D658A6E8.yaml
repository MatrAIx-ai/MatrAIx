personas:
  professional: Jasmin Maldonado, a budding junior illustrator, channels their love for family scenes and vibrant festivities into colorful drawings that fill school projects and bedroom walls, while their
    penchant for routine helps them master basic art techniques even as spontaneous bursts of creativity sometimes derail planned assignments.
  sports: Jasmin Maldonado, a playground enthusiast, prefers cooperative games like tag and relay races at the neighborhood park where they cheer on the local baseball team the City Hawks, and after school
    they attend a beginner's gymnastics class at the community center, blending their love for teamwork with gentle physical activity.
  arts: Jasmin Maldonado, an eager little creator, spends afternoons coloring scenes inspired by the rhythmic folk tunes they hear, idolizes the whimsical illustrations of Dr. Seuss and the gentle storytelling
    of Beatrix Potter, and enjoys dancing to upbeat children's songs by artists like Raffi while mimicking the expressive brushstrokes of Mary Blair in their own drawings.
  travel: Jasmin Maldonado, a curious tiny explorer, loves family outings to the local zoo, the nearby beach with tide‑pools, and annual trips to the state fair, and dreams of visiting the bright canals
    of Venice and the towering Eiffel Tower, preferring short, well‑planned journeys that balance excitement with the comfort of familiar companions.
  culinary: Jasmin Maldonado, a budding kitchen helper, delights in mashing ripe avocados with lime juice for a smooth dip, layering fresh berries and yogurt for fruit cups, and sprinkling cheese on warm
    tortillas, proudly presenting their crumb‑covered masterpieces to family while often leaving a trail of flour on the counter.
  core: Jasmin Maldonado, a routine‑loving yet spontaneously playful six‑year‑old, blends compassionate teamwork with a love for colorful art, a modest savings habit, occasional health forgetfulness, and
    a habit of leaving crayons in their hair.
background:
  cultural: Jasmin comes from a Mexican‑American family in El Paso, Texas. Spanish is spoken at home, and she celebrates Mexican traditions such as Día de los Muertos, posadas, and family gatherings where
    tacos, tamales, and fresh salsa are shared. Her household blends Catholic customs with the vibrant community life of the Borderlands, and she participates in cultural events at the local community center.
    The close‑knit family values, respect for elders, and pride in her heritage shape her daily routines and her love for both Mexican and American celebrations.
attributes:
  skills: '[''Reading (English)'', ''Reading (Spanish)'', ''Basic counting'', ''Writing name in English and Spanish'', ''Following daily routines'', ''Empathy and cooperation'', ''Helping with simple household
