  hobbies: '[''Coloring and drawing'', ''Reading bilingual picture books'', ''Building blocks and puzzles'', ''Helping in the kitchen'', ''Listening to Mexican folk music'', ''Simple dancing at home'',
    ''Nature walks with grandparents'', ''Playing cooperative games with a small group of friends'']'
  career_goals: Jasmin loves the teachers at school and dreams of becoming a bilingual teacher one day so she can help other children learn. She also imagines caring for animals as a veterinarian because
    she enjoys helping her neighborhood pets. Occasionally she mentions wanting to be a nurse to make people feel better, and she likes the idea of cooking delicious meals for her family like a chef. Overall,
    her goal is to grow up in a way that lets her support and care for her family and community.
