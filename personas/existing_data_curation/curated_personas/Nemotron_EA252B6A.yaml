  career_goals: Jeff aims to secure an entry‑level engineering or data‑analysis role where he can apply his structured, hands‑on skill set while learning from experienced mentors. He values workplaces that
    offer clear processes, predictable project timelines, and opportunities for incremental growth. Over the next five years, he aspires to become a lead technical specialist or project manager, guiding
    cross‑functional teams on systematic product development. Jeff also considers pursuing a professional certification (e.g., PMP or AWS) to broaden his credentials and keep his career trajectory both
    stable and progressive.
