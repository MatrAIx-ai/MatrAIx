  career_goals: Short-term, Heather aims to be promoted to store manager within the next two years by refining her operational expertise and achieving measurable sales growth. She plans to enroll in a local
    community college for an associate degree in Business Administration and later transfer to a four-year university for a BA in Marketing or Operations Management. Over the medium term, she targets a
    district-manager role, overseeing multiple stores and leading large teams. Long-term, she envisions a senior corporate position in retail strategy or launching her own boutique concept that blends innovative
    visual merchandising with sustainable practices. Throughout, she intends to earn professional certifications such as the Retail Management Professional (RMP) and stay adept with omnichannel retail technologies.
