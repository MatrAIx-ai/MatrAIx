  career_goals: Anthony aims to earn his journeyman carpenter certification within the next few years while completing his associate’s degree in construction technology. He hopes to secure a stable position
    with a reputable local contractor, eventually gaining enough experience and community trust to launch his own small carpentry business focused on affordable home repairs and custom woodworking for neighbors.
    He also wants to mentor new apprentices and contribute regularly to community building projects such as Habitat for Humanity.
