personas:
  professional: Anthony Guste, a 19‑year‑old aspiring journeyman carpenter, thrives on routine framing jobs, reads basic blueprints with ease, prefers familiar construction sites, and they readily lend
    a helping hand to teammates while tackling minor plumbing or electrical tasks.
  sports: Anthony Guste enjoys fishing on the Kennebec River as a seasonal sport, follows the Waterville High School Wildcats football team, roots for the Portland Sea Dogs in baseball, and occasionally
    plays in a local recreational softball league called Riverbank Timber.
  arts: Anthony Guste unwinds to classic rock icons such as Led Zeppelin and The Rolling Stones, attends community theater productions featuring local New England playwrights, and regularly joins friends
    at the neighborhood bar for board‑game nights featuring Settlers of Catan.
  travel: Anthony Guste prefers low‑key road trips that blend fishing and hiking, such as weekend drives to Acadia National Park or spontaneous stops in Montreal, yet they often procrastinate on planning,
    leading to last‑minute deals and occasional missed reservations.
  culinary: Anthony Guste loves cooking his fresh catches – pan‑seared trout with dill and lemon or a hearty New England clam chowder – and when not fishing he grills burgers topped with locally sourced
    cheddar, demonstrating competent but sometimes hurried kitchen skills, especially when they forget to defrost meat in time.
  core: Anthony Guste is a 19‑year‑old hands‑on carpenter who balances practical routine with a laid‑back streak, loves fishing and classic rock, and habitually forgets to clean their toolbox after a day’s
    work.
background:
  cultural: Anthony grew up in a small New England town in rural Maine, surrounded by a predominantly white community with deep roots in Irish and English ancestry. The region’s cultural emphasis on self‑reliance,
    practicality, and neighborly cooperation shaped his values. Local traditions of forestry, fishing, and hands‑on craftsmanship influence his work ethic and leisure activities, while the close‑knit community
    culture nurtured his compassionate, cooperative personality.
