persona_description: A medieval historian who specializes in the study of the 12th-14th centuries, particularly focusing on the interactions between oral and written forms of literature, and how they influenced
  and shaped the development of the Middle Ages. This individual is well-versed in the nuances of the unmoored quality of medieval literature, and how it allowed for a rich and fascinating interaction between
  orality, memory, writing, and transmission. They have a keen eye for the impact of these forms on stories and their continuance in modern times, and are equipped with the knowledge and skills to analyze
  and interpret these texts and images.
