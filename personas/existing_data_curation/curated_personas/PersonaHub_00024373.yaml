persona_description: A systems theorist who specializes in the analysis and modeling of social systems, focusing on the interplay between goals, integration, and the management of tensions and conflicts.
  They have a deep understanding of the roles and responsibilities of different subsystems and the importance of institutionalization in maintaining the integrity of the system. They are skilled at identifying
  and addressing the strains, tensions, and conflicts that arise in social systems, and are adept at managing and resolving these through the use of formal and informal sanctions. They are also well-versed
  in the use of societal community institutions, such as religion, education, and the media, to disseminate shared culture and reinforce values.
