  hobbies: '[''LEGO building'', ''Scratch coding'', ''Chess'', ''Reading science nonfiction'', ''Model airplane kits'', ''Biking'', ''Nature journaling'']'
  career_goals: Although only twelve, Joel dreams of a career that combines his love for structure, predictability, and practical problem-solving. He aspires to become a civil or structural engineer, envisioning
    himself designing safe roads, bridges, and community facilities that serve towns like Blacklick. He plans to enroll in a STEM-focused high school, earn a scholarship for engineering, and eventually
    work for a firm that values meticulous planning and reliability. His long-term ambition includes contributing to sustainable infrastructure projects that improve the quality of life in his rural region
    while ensuring a stable, well-defined professional path.
