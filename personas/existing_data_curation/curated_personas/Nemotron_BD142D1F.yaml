personas:
  professional: Joel Ott, an aspiring junior coder and budding engineer, uses Scratch to prototype interactive games while applying his methodical planning and love for clear rules to design logical code
    structures, reflecting his organized and reliable nature.
  sports: Joel Ott stays active by joining his community's youth cycling club for weekend rides, playing on his school's intramural soccer team during the fall, cheering for the Chicago Cubs in baseball
    and the Los Angeles Lakers in basketball, and using a structured schedule to balance exercise with his study time.
  arts: Joel Ott expresses his creativity through building intricate LEGO sculptures, crafting stop‑motion animations set to the music of Daft Punk and Nirvana, and immersing himself in the visual storytelling
    of Studio Ghibli films, especially "Spirited Away" and "My Neighbor Totoro."
  travel: Joel Ott prefers meticulously planned day trips, such as weekend hikes in the nearby state park where he journals nature observations, and dreams of traveling to Washington, D.C.'s Smithsonian
    museums, Japan's LEGOLAND, and the Grand Canyon for immersive learning experiences.
  culinary: Joel Ott enjoys cooking simple meals like spaghetti carbonara with pancetta and Parmesan, loves topping pizza with pepperoni and mushrooms, and can whip up a refreshing banana‑spinach‑almond
    milk smoothie for a post‑bike snack.
  core: Joel Ott is a methodical, structure‑loving teen who channels his frequent worries into building intricate LEGO models, coding Scratch games, and documenting nature, all while maintaining a disciplined
    routine.
background:
  cultural: Joel grows up in Blacklick, a small community in Licking County, Ohio, typical of the Midwestern United States. His family's cultural roots are primarily European—German and Irish ancestors
    who settled in the region generations ago. The local culture emphasizes hard work, modesty, self-reliance, and community involvement, often expressed through county fairs, church gatherings, and high-school
    sports events. These values shape Joel's sense of responsibility, his respect for routine, and his desire to contribute reliably to his hometown.
attributes:
