  career_goals: Michael often day‑dreams about turning his curiosity into a future career. He imagines himself as an inventor who designs useful gadgets that make everyday chores easier for his family,
    a wildlife biologist who studies the butterflies and frogs he finds near the creek, and a community helper such as a firefighter who protects his neighborhood. His desire to be practical and helpful
    guides these ambitions, while his occasional worries about school performance push him toward careers that offer clear, tangible results and a sense of security.
