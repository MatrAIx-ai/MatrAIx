  career_goals: Leonardo aims to scale his company into a regional leader in the consumer services sector, expanding its footprint across the U.S.–Mexico border while embedding sustainable and socially
    responsible practices. He plans to pursue an executive MBA within the next two years to deepen his analytical expertise and to position himself for a future role as a board member of a multinational
    corporation. Mentoring emerging talent and fostering a collaborative, inclusive workplace culture remain central to his long‑term vision.
