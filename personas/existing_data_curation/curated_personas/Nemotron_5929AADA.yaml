personas:
  professional: Leonardo Orozco is a strategic operations manager with a talent for financial oversight and bilingual stakeholder engagement, and they apply their methodical, routine-driven approach to
    scale their consumer-services firm toward cross-border leadership.
  sports: Leonardo Orozco is an avid weekend hiker who traverses San Diego's coastal trails, supports the San Diego Padres for baseball and follows the LA Galaxy in soccer, and they maintain fitness through
    routine morning jogs and occasional beach volleyball with club mates.
  arts: Leonardo Orozco spends evenings strumming acoustic guitar, drawing inspiration from folk artists like José González and classic singer-songwriters such as Joni Mitchell, and they attend local cultural
    festivals featuring mariachi and contemporary dance while finding solace in historical novels by Hilary Mantel and literary fiction by Colson Whitehead.
  travel: Leonardo Orozco prefers meticulously planned trips that balance cultural immersion with relaxation, having already explored the historic streets of Oaxaca and the vineyards of Napa Valley, and
    they dream of a road adventure along the Pacific Coast Highway from San Diego to Seattle, budgeting each journey with a detailed spreadsheet.
  culinary: Leonardo Orozco enjoys cooking traditional Mexican dishes like chiles en nogada and pozole, honing a moderate cooking skill that blends precise spice measurements with spontaneous garnish experiments,
    and they often pair meals with craft cerveza and fresh avocado salsa.
  core: Leonardo Orozco is a detail-oriented strategist who channels routine-driven discipline into weekend hikes, guitar sessions, and meticulously planned meals, and they occasionally binge-watch streaming
    series late into the night, skimping on sleep.
background:
  cultural: Leonardo is a second‑generation Mexican‑American raised in San Diego’s vibrant Barrio Logan neighborhood. He grew up in a bilingual household, celebrating Día de los Muertos, quinceañeras, and
    other Mexican traditions while navigating the broader American cultural landscape. This dual heritage instills a strong sense of community, respect for family, and an appreciation for both practicality
    and cultural expression, which permeates his leadership style and personal values.
