  hobbies: '["Reading fantasy novels", "Sketching characters in a sketchbook", "Playing the violin", "Baking bánh mì with her mother", "Collecting and trading stickers", "Journaling feelings", "Walking
    the local park trails", "Solving jigsaw puzzles"]'
  career_goals: Myhanh dreams of becoming a pediatric nurse. She is drawn to the structured environment of a hospital, the clear routines of patient care, and the opportunity to help children feel safe
    and healthy. Her compassion, reliability, and desire to maintain harmony make nursing a natural fit. She plans to focus on science courses in middle and high school, aim for a community‑college nursing
    program, and eventually work in a clinic that serves immigrant families, allowing her to combine her cultural background with her caring nature.
