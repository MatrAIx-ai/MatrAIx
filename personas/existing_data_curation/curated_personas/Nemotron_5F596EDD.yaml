personas:
  professional: Myhanh Nguyen is an aspiring violinist-musician and budding wildlife chronicler who dedicates a strict daily schedule to violin practice, sketches of imagined fantasy characters, and meticulous
    field notes on park birds, blending a love for routine, organization, and harmonious coexistence with nature.
  sports: Myhanh Nguyen participates in the Everett Youth Soccer Club as a midfielder, follows the Seattle Seahawks and Seattle Kraken for weekend excitement, and enjoys leisurely walks in the neighborhood
    park where they observe wildlife, preferring low-impact, routine-based activity that balances structure with the freedom of the outdoors.
  arts: Myhanh Nguyen immerses themselves in creative expression by drawing inspiration from Studio Ghibli films, the violin sonatas of Johann Sebastian Bach, and the fantasy novels of Leigh Bardugo, filling
    a sketchbook with hand-drawn characters and digitally rendering scenes on a Procreate-equipped tablet, while also collecting and trading stickers as a tactile art hobby.
  travel: Myhanh Nguyen dreams of exploring the misty trails of Olympic National Park and the vibrant lantern festivals of Tokyo, while cherishing family road trips to Seattle's Pike Place Market and occasional
    weekend visits to Vancouver's Stanley Park, planning trips with detailed itineraries that ease anxiety and satisfy their love for both nature and cultural spectacle.
  culinary: Myhanh Nguyen enjoys helping prepare bánh mì with pickled carrots and cilantro, rolling fresh spring rolls with shrimp, mint, and vermicelli, and cooking simple pho broth seasoned with star
    anise and lemongrass, yet their cooking skill remains at a beginner level, preferring recipes with clear step-by-step instructions and a predictable outcome.
  core: Myhanh Nguyen is a routine-loving, anxiety-prone 11-year-old who harmonizes violin practice, sketching, and sticker collecting into a structured yet gently creative life, often retreating to quiet
    park walks when emotions run high.
background:
  cultural: Myhanh is a second‑generation Vietnamese‑American. Her parents emigrated from Vietnam in the early 2000s and continue to speak Vietnamese at home, so she is fluent in both languages. Family
    meals are a mix of traditional Vietnamese dishes—such as pho and bánh cuốn—and typical American fare, reflecting the multicultural environment of Everett, WA. She celebrates Tet with lanterns, special
    foods, and visits to the local Vietnamese community center, where she participates in cultural events and learns folk songs. Growing up in Snohomish County, she enjoys the Pacific Northwest’s rainy
    climate, often exploring nearby parks and learning about local wildlife, which complements her interest in caring for animals. This blend of Vietnamese heritage and Pacific Northwest lifestyle shapes
    her values of harmony, respect for elders, and a practical approach to daily life.
attributes:
  skills: '["Reading comprehension (grade 5)", "Basic arithmetic (addition, subtraction, multiplication)", "Time management using a weekly planner", "Organizing personal workspace", "Bilingual communication
