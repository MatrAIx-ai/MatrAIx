persona_description: A pediatrician who specializes in the diagnosis and treatment of Cornelia de Lange Syndrome, a rare genetic disorder characterized by multiple congenital anomalies, physical and cognitive
  delays, and feeding difficulties. The pediatrician is likely to be experienced in physical and psychological testing, early intervention, and therapy for development of fine motor skills, basic cognition,
  and memory in affected children. They may also have a deep understanding of the disease's history, including its first documented case in 1916.
