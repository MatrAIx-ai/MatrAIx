  career_goals: George aims to complete his GED within the next year and enroll in a community‑college trade program, targeting an apprenticeship in automotive technology or carpentry. He hopes to combine
    his curiosity for how things work with his practical mindset to become a certified technician and eventually launch his own small repair or custom‑build business. Long‑term, he sees himself in a project‑management
    role where he can apply his methodical planning skills, and he is also open to joining the military after turning 18 to gain disciplined technical training and serve his community.
