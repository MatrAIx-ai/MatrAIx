  hobbies: '["Watercolor Painting", "Hiking", "Theater Attendance", "Historical Fiction Reading", "Book Club Participation", "Gardening", "Yoga", "Community Art Workshops Volunteering", "Photography", "Traveling
    to Cultural Festivals", "Knitting"]'
  career_goals: Vanessa aims to transition into a district‑level instructional coach role where she can mentor new teachers and lead the expansion of arts‑integrated curricula across the region. She plans
    to obtain certification in trauma‑informed education, develop a grant‑funded after‑school arts program for middle‑school students in Yakima, and author a guidebook on interdisciplinary teaching. Over
    the next few years she hopes to retire from full‑time classroom duties while continuing as a part‑time curriculum consultant and community arts advocate.
