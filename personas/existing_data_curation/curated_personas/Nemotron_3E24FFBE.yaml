personas:
  professional: James Pruitt, a 54‑year‑old master‑technician‑in‑training, blends decades of hands‑on automotive repair with a curiosity for electric‑vehicle technology, using both classic wrenches and
    modern OBD scanners while mentoring apprentices in a delightfully chaotic workshop that they hope to streamline into a hybrid classic‑car restoration and EV service garage.
  sports: James Pruitt follows the New York Mets and Buffalo Bills with the same enthusiasm he brings to weekend fishing trips in the Catskills, stays loosely fit through occasional pickup basketball at
    the local community center, and they are a regular member of a recreational bowling league that meets after the Sunday car‑show circuit.
  arts: James Pruitt spins vinyl records of Led Zeppelin, B.B. King, and The Allman Brothers Band while tinkering in his garage, occasionally attends live blues sets at a downtown club, collects vintage
    car photography from artists like Gordon Kamer, and they relish board‑game nights where storytelling and strategy echo the improvisational flair of classic rock improvisation.
  travel: James Pruitt’s travel style blends the quiet of Catskills fishing getaways with the excitement of attending the North American International Auto Show in Detroit, includes yearly road trips to
    the Finger Lakes for wine tasting, and they dream of a future pilgrimage to Japan’s Toyota Commemorative Museum of Industry and Technology once their garage reaches a sustainable footing.
  culinary: James Pruitt prefers cooking straightforward comfort foods such as grilled salmon with rosemary, classic meatloaf, and BBQ pork ribs on his cast‑iron skillet, often timed to the rhythm of their
    favorite blues tracks, and they enjoy sharing these simple meals with family while the aroma mingles with the scent of motor oil after a long day in the shop.
  core: James Pruitt, a 54‑year‑old auto‑enthusiast with a love for classic cars, DIY electronics, and blues vinyl, battles chronic anxiety by channeling their improvisational spirit into a chaotic yet
    heartfelt garage that they hope will one day run like a well‑tuned engine.
background:
  cultural: James grew up in a working‑class family in the outer boroughs of New York City during the 1960s and 70s, where trades were valued. His European‑American heritage emphasized self‑reliance, practical
    problem‑solving, and community solidarity. Living in the diverse environment of New York exposed him to a mix of cultures, fostering an appreciation for the city’s multicultural fabric while maintaining
    his own family traditions of modest celebrations and weekend barbecues. His identity is shaped by the auto‑repair community, union culture of the trades, and the pragmatic, straightforward ethos of
    his upbringing, blended with his personal curiosity for emerging automotive technologies.
attributes:
  skills: '[''engine diagnostics (OBD‑II)'', ''transmission repair and rebuilding'', ''electrical and electronic systems troubleshooting'', ''hybrid and electric vehicle maintenance'', ''brake and suspension
    repair'', ''HVAC system service'', ''custom performance modifications'', ''classic car restoration techniques'', ''customer service and communication'', ''apprentice mentorship'']'
  hobbies: '[''restoring a 1970s Chevrolet Impala'', ''DIY electronics and custom car audio projects'', ''listening to classic rock on vinyl'', ''fishing trips to the Catskills'', ''attending car shows
    and swap meets'', ''reading automotive magazines and forums'', ''volunteering at community workshops'', ''cooking for family'', ''playing board games'']'
  career_goals: James aims to become a certified Master Technician through ASE, focusing on electric‑vehicle technology. He wishes to open a modest independent garage that blends classic car restoration
    with modern EV services, satisfying his curiosity while staying practical. He aspires to mentor younger mechanics, offering apprenticeships, and to develop a small online presence (blog or YouTube channel)
    sharing troubleshooting tips, partly to alleviate anxiety by creating a supportive community. He hopes to achieve a more structured workflow to reduce stress, possibly by adopting simple scheduling
    tools or hiring part‑time assistance. Financial stability for his family and a gradual transition to semi‑retirement—working part‑time while pursuing personal projects—are also key ambitions.
