persona_description: A public health official or clinician who is interested in evaluating the effects of chronic illness, treatments, and short- and long-term disabilities on the quality of life and well-being
  of individuals. They are familiar with the existing measures of HRQoL and well-being and are actively involved in methodological development in this area. They are also aware of the challenges and limitations
  of these measures and are looking for innovative and more comprehensive approaches to assess HRQoL and well-being. They are interested in exploring the potential of new measures and technologies to improve
  the accuracy and reliability of HRQoL and well-being assessments.
