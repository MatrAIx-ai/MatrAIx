  career_goals: Ray aims to finish his associate degree in communications or business, secure an internship in marketing or community outreach, and eventually land a full‑time role where he can blend his
    people skills with practical project execution. He dreams of becoming a community events coordinator or a social media strategist for a local nonprofit or small business, and he is open to starting
    his own side hustle—like a mobile catering service—that leverages his love for group gatherings and cooking.
