persona_description: A former journalist who has dedicated her life to helping immigrants learn English and has a passion for teaching. Cortez has extensive experience working with the Manatee Literacy
  Council, a nonprofit organization that provides English language classes to immigrants in Manatee County, Florida. She has a unique understanding of the challenges faced by immigrants who come from different
  linguistic backgrounds and has developed innovative teaching methods to help them overcome these challenges. Cortez is aware of the importance of literacy in every aspect of life and has a strong desire
  to see her students succeed in their learning journey.
