personas:
  professional: Laura Pegram, a 2‑year‑old budding play‑architect who arranges building blocks into neat rows before launching into imaginative castle sieges, merges curiosity with practicality, balances
    organized play with spontaneous improvisation, and toggles between cooperative sharing and assertive claim‑staking, all while navigating intense emotional reactions to disruptions.
  sports: Laura Pegram, a 2‑year‑old who gleefully joins the neighborhood 'Mini Sprouts' toddler soccer class, waves enthusiastically at the Los Angeles Dodgers during televised baseball highlights and
    mimics the Los Angeles Lakers' victory dances on the couch, blends structured practice with free‑form backyard running but often needs a quick nap after vigorous play, reflecting a balance of organized
    sport participation and flexible, emotionally‑driven energy.
  arts: Laura Pegram, an inquisitive toddler who constantly hums the Let It Go refrain from Frozen while finger‑painting rainbow swirls, watches Sesame Street for its playful lessons, attempts to sing lines
    from Moana, and occasionally tries to mimic the movements of dancer Misty Copeland from a children’s video, embodies a blend of familiar artistic comforts and eager exploration, though a sudden change
    in music can trigger a brief tantrum.
  travel: Laura Pegram, a 2‑year‑old whose travel preferences revolve around short car rides to the nearby beach for sandcastle building, annual visits to Grandma’s countryside farm, occasional family trips
    to Disneyland for the Magic Kingdom experience, and weekend outings to the city zoo, plans each adventure around nap times and snack breaks, thrives on routine‑driven exploration yet becomes visibly
    anxious on long flights, clutching her plush giraffe for comfort.
  culinary: Laura Pegram, a toddler with an unwavering love for cheesy macaroni, banana slices, and honey‑drizzled yogurt, delights in helping stir pancake batter despite the inevitable flour mess, steadfastly
    refuses broccoli and peas, uses a tiny plastic fork to 'dine' like a big kid, and can erupt into a full‑blown tantrum if her familiar menu is altered, showcasing meticulous preferences coupled with
    emotional reactivity.
  core: Laura Pegram, a 2‑year‑old balancing bright curiosity, orderly play, and occasional assertiveness, navigates the world with routine‑driven delight that can flip into intense emotional outbursts
    when expectations shift.
background:
  cultural: Laura is raised in a White, middle‑class family in the Chesapeake‑Virginia Beach area of Virginia. Her family blends Southern coastal traditions—such as frequent visits to local parks, beaches,
    and seafood meals—with modern suburban values that emphasize early education, community involvement through a local church, and polite, courteous behavior. Parents prioritize routine, emotional support,
    and exposure to cultural experiences like library story hours, children’s museum trips, and community festivals, fostering both her curiosity and practical sense of order.
attributes:
  skills: '[''~200-word vocabulary'', ''Identifying basic colors and shapes'', ''Following simple two‑step instructions'', ''Stacking block towers up to four pieces'', ''Scribbling with crayons'', ''Using
