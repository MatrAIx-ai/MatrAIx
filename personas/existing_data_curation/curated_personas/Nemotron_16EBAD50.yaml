  career_goals: Laura frequently says she wants to be a teacher or a doctor when she grows up, reflecting her desire to help others and share knowledge. She is also fascinated by drawing and often wishes
    to "make big pictures," hinting at an early artistic ambition. Her love for routine and stability leads her to imagine attending a friendly preschool where she can explore, learn, and eventually guide
    younger children. Though still very young, she expresses a strong wish to explore nature, collect leaves, and maybe become a nature explorer or zookeeper.
