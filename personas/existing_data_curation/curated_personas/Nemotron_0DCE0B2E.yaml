personas:
  professional: Abigail Gomez, a 33‑year‑old casino surveillance officer, leverages her keen investigative skepticism, meticulous incident‑reporting skills, and teaching background to train new staff while
    thriving on the pressure of high‑stakes monitoring, yet she often wrestles with the tension between her love of strict procedural compliance and her spontaneous urge to improvise during unexpected security
    breaches.
  sports: Abigail Gomez hikes the Great Smoky Mountains trails, participates in a local chess club and weekly yoga sessions, cheers for the Nashville Predators and Tennessee Titans, and belongs to the Knoxville
    Hiking Association, blending low‑impact endurance with competitive mental sports.
  arts: Abigail Gomez finds creative release in nature photography inspired by Ansel Adams, knits intricate patterns while listening to Leonard Cohen, and devours mystery novels by Agatha Christie, a combination
    that satisfies her investigative mind and love for detailed craftsmanship.
  travel: Abigail Gomez favors immersive nature trips, having trekked the Appalachian Trail and planned a future visit to Yellowstone National Park, while also dreaming of exploring Edinburgh’s historic
    alleyways and Japan’s cherry‑blossom‑lined parks for bird‑watching.
  culinary: Abigail Gomez enjoys cooking farm‑to‑table meals, often preparing roasted beet and goat‑cheese salad with fresh herbs from her garden, loves a well‑spiced Nashville hot chicken sandwich, and
    occasionally indulges in sushi rolls featuring avocado and cucumber.
  core: Abigail Gomez is a security professional whose structured, skeptical mindset coexists with a spontaneous love of the outdoors, competitive games, and a persistent worry that fuels both meticulous
    work and occasional over‑analysis.
background:
  cultural: Abigail grew up in a modest, white, Southern‑American family in the foothills of the Appalachian region of Tennessee. The community emphasized Southern hospitality, church involvement, and a
    strong work ethic, which shaped her sense of responsibility and interpersonal manners. Living near Sevier County’s tourism hub exposed her early to the hospitality and gaming industries, influencing
    her career path in casino surveillance. Her education in teaching reflects the value her family placed on learning and service. While she embraces traditional Southern customs—such as sharing home‑cooked
    meals and participating in local festivals—she also integrates contemporary, progressive attitudes toward professional development and personal resilience.
attributes:
  skills: '[''CCTV and digital surveillance operation'', ''Incident detection and rapid response'', ''Detailed incident reporting and documentation'', ''Knowledge of Tennessee gaming regulations'', ''First
