    threat analysis'', ''Adaptability to unpredictable security scenarios'', ''Competitive performance tracking and metrics optimization'']'
  hobbies: '[''Hiking and nature photography'', ''Bird‑watching'', ''Reading mystery and true‑crime books'', ''Knitting'', ''Vegetable gardening'', ''Playing chess'', ''Weekly poker nights'', ''Yoga and
    mindfulness meditation'', ''Volunteering for community safety workshops'']'
  career_goals: Abigail aims to progress from front‑line surveillance officer to a supervisory or managerial position within a casino or large‑scale security operation. She plans to obtain a Certified Protection
    Professional (CPP) credential and to lead a team that designs and implements proactive security protocols, emphasizing both strict procedural compliance and flexible response strategies. Long‑term,
    she envisions establishing a boutique security consulting firm that partners with regional tourism venues, leveraging her education background to offer training programs that reduce staff turnover and
    improve stress resilience. She also hopes to balance career advancement with personal well‑being, seeking roles that provide structured schedules while allowing occasional spontaneity to keep her engaged.
