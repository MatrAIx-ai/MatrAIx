persona_description: A conservation scientist and aquatic biologist who specializes in the study of lake trout populations in the Adirondacks, particularly in Follensby Pond. She is dedicated to understanding
  the population structure, health, and abundance of the lake trout, and is working to develop a more accurate population model and management strategy. Her research involves hydro-acoustic surveys, mark
  and recapture techniques, and the collection of otoliths to provide vital data on growth rates and age. She is also interested in the impact of climate change on the lake trout population and is working
  to develop strategies for managing the fishery in a warming world.
