  hobbies: '[''bridge'', ''bingo'', ''gardening'', ''knitting circle'', ''line dancing'', ''digital photography workshops'', ''reading mystery novels'', ''cooking family recipes'', ''volunteering at the
    food pantry'', ''organizing neighborhood clean-up events'']'
  career_goals: Marissa hopes to transition from front‑line cashier duties to a mentorship role, formally training new employees on cash handling and customer relations. She also aspires to complete a certificate
    in digital photography through the community college to document family events and share them with the senior center. Maintaining her health and independence is a core ambition; she sets goals for daily
    walks, regular health check‑ups, and attending wellness workshops. Additionally, she dreams of turning her long‑standing love of knitting into a modest side‑business, selling handcrafted scarves at
    local craft fairs, thereby staying engaged with the community.
