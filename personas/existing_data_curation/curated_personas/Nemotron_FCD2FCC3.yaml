  career_goals: Although retired, Dana is driven to leave a lasting cultural imprint on her hometown. She aims to curate a travelling exhibition of Appalachian folk art that showcases local talent and attracts
    regional attention. She plans to author a memoir interwoven with poems and historical anecdotes from Clay County, preserving oral histories before they fade. Dana also aspires to establish a small art‑therapy
    program at the local senior center, leveraging her painting and writing skills to improve mental health among older adults. Learning digital photography is a near‑term goal, as she wants to document
    the natural beauty of the Kentucky hills and incorporate the images into future community exhibitions. Ultimately, she hopes to become a recognized voice in local arts councils and senior‑advocacy groups,
    influencing policy and funding for cultural initiatives.
