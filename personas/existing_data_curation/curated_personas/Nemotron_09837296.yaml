  career_goals: Jim aims to become a senior strategic analyst within the next five years, focusing on driving data‑driven decision making for large regional enterprises in Florida. He is eager to lead cross‑functional
    initiatives that streamline operations and enhance profitability, eventually transitioning into a managerial role where he can mentor junior analysts. His long‑term ambition includes obtaining a certification
    in data science or an MBA to blend his analytical strengths with broader business leadership capabilities.
