personas:
  professional: An analytics strategist, Mirlene Merilan combines expertise in statistical modeling, Python, R, SQL, and Tableau with a competitive yet pragmatic mindset to deliver data‑driven strategies
    for growth‑focused firms in the Research Triangle, while mentoring emerging analysts from historically underserved communities and championing representation in tech.
  sports: An outdoor enthusiast, Mirlene Merilan hikes the coastal trails of North Carolina weekly, practices yoga for balance, follows the Carolina Panthers and Charlotte Hornets with fervor, and belongs
    to a local running club that meets for sunrise jogs, while keeping mental sharpness with competitive chess matches at the community center.
  arts: A creative explorer, Mirlene Merilan curates playlists featuring Nina Simone, Burna Boy, and contemporary jazz, spends Saturday afternoons photographing sunrise over Wrightsville Beach, and attends
    local theater productions of August Wilson plays, allowing music and visual storytelling to inform their analytical perspective.
  travel: A purposeful traveler, Mirlene Merilan prefers short, well‑planned escapes like the Outer Banks and Charleston for weekend rejuvenation, while dreaming of a volunteer‑driven STEM outreach in Tanzania
    and a cultural deep‑dive in Barcelona’s architectural marvels, balancing budget constraints with a desire for meaningful experiences.
  culinary: A culinary adventurer, Mirlene Merilan enjoys mastering Afro‑Caribbean dishes such as Jerk chicken, callaloo, and ackee with saltfish, often sourcing fresh fish from the local pier, blending
    them with home‑grown herbs while experimenting with turmeric‑infused rice and sharing the results at neighborhood potlucks.
  core: Mirlene Merilan is a data‑driven strategist whose competitive edge coexists with a love for quiet hikes, late‑night chess battles, and an occasional over‑caffeination habit that fuels her relentless
    pursuit of actionable insights.
background:
  cultural: Mirlene is an African American woman rooted in the rich cultural tapestry of Wilmington, North Carolina. Growing up in a close‑knit community, she was influenced by her family's emphasis on
    education, resilience, and collective uplift. She attended an HBCU for her undergraduate business degree, where she cultivated a strong sense of identity and an appreciation for Black history and traditions,
    such as Juneteenth celebrations and local church gatherings. Her cultural heritage informs her values of perseverance, community service, and the importance of representation in STEM fields, motivating
    her to mentor the next generation of Black analysts and engineers.
