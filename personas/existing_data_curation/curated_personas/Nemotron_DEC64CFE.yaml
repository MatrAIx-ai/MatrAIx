  career_goals: Mirlene aims to advance to a senior analytics leadership role where she can shape data-driven strategy for a growth-oriented organization in the Research Triangle or regional tech hub. She
    aspires to build and mentor a high-performing analytics team, spearhead the development of innovative predictive models, and influence corporate decision-making at the executive level. In the longer
    term, she envisions launching a boutique consultancy that helps small and midsize enterprises leverage quantitative insights for sustainable expansion, leveraging her competitive drive and practical
    acumen.
