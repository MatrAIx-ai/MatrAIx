personas:
  professional: Alice Thompson, a retired Southern homemaker turned community volunteer organizer, leverages her expertise in event scheduling, simple bookkeeping, and first‑aid to coordinate senior‑center
    activities, church socials, and heritage festivals, blending practical efficiency with a warm, sociable touch.
  sports: Alice Thompson enjoys low‑impact fitness, joining the local senior walking club for twice‑weekly hikes along the Blue Ridge Trail, cheering on the nearby Appalachian State Mountaineers football
    team, and playing casual bridge tournaments at the senior center as her version of mental sport.
  arts: Alice Thompson immerses herself in the arts by participating in a weekly book club that discusses classics like Jane Austen and contemporary memoirs, singing soprano in the church choir performing
    hymns by Fanny Crosby, and attending community theater productions of "Our Town" starring local actors such as Maggie Lee.
  travel: Alice Thompson favors short road trips to historic mountain towns like Asheville and the family‑friendly seaside retreat of Hilton Head, while nurturing a dream of a pilgrimage to Scotland to
    trace her Scots‑Irish roots, planning each journey with a detailed itinerary and a modest travel budget.
  culinary: Alice Thompson excels in Southern comfort cooking, perfecting biscuits with buttermilk and flaky crust fruit pies filled with fresh peach or blackberry, while also experimenting with herb‑infused
    sauces using basil, rosemary, and mint harvested from her garden, and she delights in preparing communal meals for potluck gatherings.
  core: Alice Thompson blends seasoned Southern hospitality with relentless community spirit, navigating age with a notebook of recipes, garden plans, and event checklists, while occasionally indulging
    in a late‑night knitting spree and forgetting to take her meds.
background:
  cultural: Alice is a lifelong resident of Elizabethton, Tennessee, situated in the heart of the Appalachian region. Her family’s roots trace back to Scots‑Irish settlers who arrived in the area in the
    early 19th century. Raised in a devout Baptist household, she grew up surrounded by church‑centered community life, frequent potlucks, and music traditions such as bluegrass and gospel singing. The
    local culture emphasizes hospitality, self‑reliance, storytelling, and a close connection to the mountains and natural environment. These values have shaped Alice’s generous, cooperative nature and
    her commitment to preserving regional customs through cooking, quilting, and oral‑history work.
