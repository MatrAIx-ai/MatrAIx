  career_goals: Although retired, Alice aims to remain an active contributor to her community. She plans to mentor younger volunteers at the senior center, share her cooking and quilting knowledge through
    workshops, and compile a small family‑recipe cookbook to donate to the local library. She also hopes to finish a written memoir that weaves together personal stories and local Appalachian history for
    the county historical society. Maintaining her health through daily walks on nearby trails and staying socially engaged through church events and the town’s heritage festivals are also key personal
    ambitions.
