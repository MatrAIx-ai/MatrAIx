  career_goals: Although retired, Amy aims to complete the remaining credits for her associate degree in business administration, envisioning a formal credential to accompany her lifelong learning. She
    aspires to take a leadership role in the Vancleave senior center, organizing health‑screening workshops and intergenerational events. Amy hopes to compile a written family history and biography for
    her grandchildren, preserving local stories for future generations. She also seeks to stay physically and mentally active, maintaining independence and serving as a trusted voice in community safety
    initiatives.
