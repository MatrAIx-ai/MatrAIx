persona_description: A researcher from the University of Cadiz (UCA) and the Spanish National Research Council (CSIC) who is leading a European research network on new nanomaterials. The researcher is part
  of the Cosy network, which aims to understand the fundamentals of confined molecular systems in order to control them. The researcher has expertise in the study of confined molecular systems, intermolecular
  interactions, molecular motion in confined systems, and the study of helium nanogots in science and engineering. The researcher is involved in the study of materials ranging in size from a few nanometres
  to sub-nanometres, and combines new experimental techniques for synthesis and characterisation with modelling using methods from theoretical chemistry and molecular physics, including machine learning
  techniques and the generation of useful databases.
