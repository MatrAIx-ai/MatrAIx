persona_description: A paleontologist or a researcher who specializes in the study of dinosaur evolution, particularly in understanding the timing and scale of the diversification of dinosaurs leading up
  to the Cretaceous Terrestrial Revolution. They are interested in the complex interplay between the emergence of flowering plants, social insects, and other diverse groups, and the evolution of the dinosaurs
  that coexisted with them. They are also likely to be interested in the role of space rocks in the end of the dinosaurs, and the potential biases in the fossil record that could lead to a distorted view
  of dinosaur evolution.
