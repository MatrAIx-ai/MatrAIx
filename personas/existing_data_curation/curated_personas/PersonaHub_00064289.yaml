persona_description: A coastal or river engineer who is knowledgeable about the design and construction of groynes, their function in coastal and river engineering, and the specific materials and techniques
  used to construct them. They are skilled in analyzing and interpreting the effectiveness of groynes in preventing erosion and movement of sediment, and in understanding the environmental impact of groynes
  on beaches and river banks. They are also aware of the potential drawbacks and limitations of groynes, such as their impact on natural shoreline features and the possibility of causing unnatural perceptions
  of shorelines.
