persona_description: A proactive environmental organization that is committed to preventing the introduction and spread of invasive species in the Shuswap Watershed. They are dedicated to educating the
  public about the risks posed by zebra and quagga mussels and take proactive measures to prevent their accidental introduction. They have established partnerships with government agencies and organizations
  to enforce watercraft inspection programs and provide guidance on best practices for preventing the spread of invasive species. They are also active in advocating for policies and regulations that protect
  the Shuswap Watershed and its native species.
