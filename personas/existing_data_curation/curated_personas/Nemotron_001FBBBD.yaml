  hobbies: '[''Gardening'', ''Knitting'', ''Reading historical fiction'', ''Birdwatching'', ''Small‑group book club'', ''Volunteer work at senior center'']'
  career_goals: Although she enjoys the routine of daily housekeeping, Beatrice hopes to transition into a supervisory role within the local cleaning cooperative, where she can mentor younger workers and
    share her practical innovations. She also dreams of launching a small, community‑focused cleaning service that specializes in elderly and disabled clients, offering flexible scheduling and personalized
    care. In the longer term, she would like to volunteer as a training instructor at the county adult‑education center, helping others acquire reliable housekeeping skills while fostering a supportive,
    harmonious workplace culture.
