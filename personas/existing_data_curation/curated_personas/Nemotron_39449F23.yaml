  career_goals: John envisions a future where his curiosity about the natural world and his desire to help others intersect. He hopes to become an environmental scientist or wildlife biologist who can protect
    the lakes and forests around Hudson while also serving as a community mentor for younger kids dealing with anxiety. In the short term, he aims to earn the Boy Scouts merit badge in Ecology, join the
    school science club, and volunteer at the local nature center, gradually building both his technical knowledge and his confidence in social settings.
