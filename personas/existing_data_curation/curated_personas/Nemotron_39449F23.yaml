personas:
  professional: An inquisitive budding naturalist and future environmental engineer, John Hurst combines a sharp eye for detail with a practical, hands‑on approach as a middle‑school student, channeling
    curiosity into sketching wildlife, cataloguing insects, and constructing intricate LEGO models, while their relaxed attitude toward school assignments sometimes leads to last‑minute cramming.
  sports: John Hurst participates in the Madison Middle School Trail Club, enjoys weekend hikes along the Ice Age Trail and informal soccer games with friends, and eagerly follows the Milwaukee Bucks in
    basketball and the Green Bay Packers in football, viewing sport as a gentle way to stay active while maintaining a low‑key social circle.
  arts: John Hurst finds artistic renewal in watercolor landscapes inspired by Claude Monet, quiet evenings listening to folk legend John Denver and pop star Billie Eilish, and occasional doodles of beloved
    characters from Studio Ghibli’s My Neighbor Totoro, allowing creative expression to balance their analytical LEGO pursuits.
  travel: John Hurst prefers low‑key adventures, relishing weekend road trips to Door County’s lakeshore, family vacations to Yellowstone National Park, and dreaming of a future backpacking trek through
    the Swiss Alps, all while planning trips with a flexible itinerary that leaves room for spontaneous nature stops.
  culinary: John Hurst often prepares a simple carrot and cucumber salad drizzled with olive oil, loves homemade macaroni and cheese with sharp cheddar, and looks forward to tasting fresh apple pie at the
    county fair, showing a modest cooking skill set anchored in fresh, familiar flavors.
  core: John Hurst is a quietly curious 11‑year‑old naturalist who balances meticulous observation with a disorganized, flexible routine, channels intense emotions into watercolor sketches, and can be found
    day‑dreaming over LEGO blueprints while worrying about missed deadlines.
background:
  cultural: John grew up in Hudson, Wisconsin, a tight‑knit, predominantly White community nestled alongside lakes and farmland. His family’s roots in the region trace back several generations, blending
    German and Scandinavian heritage that is common in the Upper Midwest. The local culture emphasizes self‑reliance, appreciation for the outdoors, and community solidarity. He attends a public elementary
    school where practical learning, scouting, and 4‑H programs are encouraged. Community events such as the county fair, church gatherings, and volunteer clean‑up days reinforce values of modesty, courtesy,
    and cooperation—traits that align with John’s kind, harmonious disposition. The surrounding natural landscape and the seasonal rhythms of the area shape his love for nature, gardening, and outdoor exploration.
