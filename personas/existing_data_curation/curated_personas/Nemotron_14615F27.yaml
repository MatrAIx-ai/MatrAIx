  career_goals: Approaching the final decade of his professional life, Alberto is focused on cementing his legacy. He aims to transition his practice to a trusted associate while ensuring his clients receive
    uninterrupted, high‑quality service. He plans to author a guide on prudent investing for seniors, drawing on his lifelong experience. Additionally, Alberto intends to establish a scholarship fund for
    Guatemalan students pursuing finance or STEM degrees and to serve on the board of a nonprofit that provides financial‑literacy training to immigrant families in Los Angeles. Securing a comfortable,
    stress‑free retirement for himself and his wife, while preserving the wealth he has built for future generations, remains his overarching ambition.
