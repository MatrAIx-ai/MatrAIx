  career_goals: Donald aims to advance from his current janitorial role to a supervisory position within the next three years, then pursue an associate degree or certification in facilities management or
    HVAC maintenance. His long‑term ambition is to become a facilities manager, overseeing building operations, optimizing cleaning protocols, and reducing operational costs. He also aspires to eventually
    start his own small facilities services business, leveraging his disciplined, high‑standard mindset to deliver reliable, structured maintenance solutions.
