personas:
  professional: Donald Mattson, a 20‑year‑old commercial cleaning technician at a large suburban office complex, leverages meticulous record‑keeping, OSHA‑compliant safety practices, and a disciplined,
    schedule‑driven mindset to train new staff and consistently exceed hygiene benchmarks, positioning them for a supervisory role within three years, and they are known for their reliability and attention
    to detail.
  sports: Donald Mattson stays fit by jogging in the early mornings, lifting weights three times weekly, and playing guard for the Stafford Volunteers recreational basketball league, while they cheer on
    the Washington Commanders in the fall, the Washington Wizards during the NBA season, and catch DC United matches when possible.
  arts: Donald Mattson channels their detail‑oriented hobby of assembling airplane and car model kits while listening to country legends Dolly Parton and modern star Luke Bryan, and they draw creative inspiration
    from the woodworking tutorials of Ron Paulson on YouTube, often pausing to sketch design ideas.
  travel: Donald Mattson prefers low‑cost weekend road trips, mapping out scenic drives to Shenandoah National Park and historic Washington, D.C., with a long‑term wish to hike the Appalachian Trail and
    eventually explore the coastal cliffs of Ireland when finances allow, and they meticulously plan each itinerary to maximize mileage and savings.
  culinary: Donald Mattson enjoys moderate‑skill home cooking, frequently grilling smoked barbecue pork ribs seasoned with paprika and hickory‑infused sauce, making classic Southern fried chicken, and pairing
    meals with fresh‑caught trout seasoned with lemon and dill, while they occasionally treat themselves to a fast‑food cheeseburger after a long shift.
  core: Donald Mattson is a 20‑year‑old with a disciplined, schedule‑driven mindset who secretly binge‑assembles model kits into the early morning, often neglecting sleep to achieve flawless detail.
background:
  cultural: Donald was raised in a working‑class family in the suburban region of Stafford, Virginia, an area influenced by Southern‑mid‑Atlantic values of hard work, responsibility, and modesty. The community
    includes many military families and emphasizes service, respect for rules, and community involvement. He attended a public high school where he participated in sports and student council, reinforcing
    teamwork and civic duty. His cultural upbringing includes traditional American holidays, a fondness for country music, outdoor activities like fishing and hiking in nearby parks, and a strong sense
    of loyalty to his local community.
