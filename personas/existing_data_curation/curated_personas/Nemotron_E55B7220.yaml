  career_goals: Mary aims to progress from her current receptionist role to an office manager position within the next three to five years, pursuing a bachelor's degree in Business Administration to broaden
    her strategic and leadership skills. She is interested in obtaining certifications in project management and digital workflow tools to streamline office operations. Long‑term, she envisions moving into
    operations management or community outreach coordination, where she can combine her organizational expertise with her passion for helping others and her curiosity about innovative workplace practices.
