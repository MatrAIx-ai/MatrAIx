personas:
  professional: Mary Garza leverages her front‑desk expertise, meticulous data‑entry skill, and bilingual fluency to streamline daily office flow, while her curiosity drives her to volunteer for process‑improvement
    projects, positioning her as a natural candidate for an office manager role within the next few years.
  sports: Mary Garza supports the Boston Red Sox, follows the Portland Sea Dogs minor league baseball team, participates in a local co‑ed adult soccer league, and hikes the Appalachian Trail’s 100‑mile
    stretch in Maine every summer, blending team spirit with personal fitness.
  arts: Mary Garza thrives on her involvement with a community theater group—starring in productions like Our Town and Little Shop of Horrors—while their off‑stage downtime includes playlists featuring
    Lake Street Dive, Phoebe Bridgers, and classic Broadway scores by Stephen Sondheim, and they regularly attend the Portland Museum of Art’s exhibitions of contemporary New England painters.
  travel: Mary Garza enjoys meticulously planned road trips along New England’s coastline, having recently explored Acadia National Park’s sunrise at Cadillac Mountain, the historic lighthouse at Cape Elizabeth,
    and a weekend escape to Portland’s Old Port, while they dream of sailing to Nova Scotia’s Peggy’s Cove and trekking Ireland’s County Kerry cliffs when time permits.
  culinary: Mary Garza experiments with New England seafood, perfecting a lobster bisque enriched with thyme and sherry, cedar‑plank salmon seasoned with dill and lemon zest, and a creamy clam chowder that
    blends fresh clams, potato, and a splash of seltzer for subtle effervescence; they also take pride in crafting a herb‑butter spread of parsley, chives, and sea salt to finish each catch.
  core: Mary Garza is a curious yet practical front‑desk professional who balances a love for community theater, coastal hikes, and seafood cooking with a forward‑looking eye on career advancement and financial
    stability, all while navigating occasional desk‑induced stiffness and a penchant for over‑organizing their pantry.
background:
  cultural: Mary Rachel Garza is a White American of Irish and English ancestry, raised in a middle‑class family in Bangor, Maine. Her upbringing reflects classic New England values—practicality, modesty,
    a strong work ethic, and a deep appreciation for the region’s natural environment and maritime heritage. While she embraces these traditions, her outgoing and sociable nature drives her to engage actively
    in local events, learn new languages, and participate in multicultural festivals, blending respect for her cultural roots with an openness to diverse experiences.
