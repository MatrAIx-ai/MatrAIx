personas:
  professional: Annie Flint, a retired community caregiver, now coordinates senior‑center gardening workshops and low‑sodium cooking classes, applying their lifelong budgeting, event planning, and hands‑on
    repair skills while balancing a preference for structured schedules with a spontaneous, adaptable spirit.
  sports: Annie Flint, a member of the Lagrange Senior Walking Club, keeps fit with daily strolls along the Chattahoochee River Trail, attends gentle yoga classes at the senior center, and cheerfully follows
    the Atlanta Braves in baseball and the Atlanta Falcons in football, balancing a modest athletic routine with seasonal sports enthusiasm as they stay active in the community.
  arts: Annie Flint, an avid choir member, delights in singing hymns and gospel classics by Mahalia Jackson, frequents the Lagrange book club where they discuss Southern novels by Harper Lee and Pat Conroy,
    and expresses their creative side through quilting inspired by the American Quilting Society’s traditional patterns, all while enjoying the music of Dolly Parton and the films of Meryl Streep.
  travel: Annie Flint loves spontaneous drives to nearby antique fairs in Thomasville and the Georgia State Fair in Perry, yet they also plan annual visits to historic Savannah and a dream trip to Charleston’s
    waterfront, balancing structured travel itineraries with their love for unexpected roadside discoveries.
  culinary: Annie Flint, a seasoned home cook, perfects classic Southern fare such as shrimp and grits, collard greens, and peach cobbler while experimenting with low‑sodium twists and often seasons their
    dishes with fresh garden okra, pecans, and a splash of homemade sweet tea, showcasing both tradition and culinary curiosity.
  core: Annie Flint blends Southern hospitality, meticulous organization, and a spontaneous zest for garden‑to‑table cooking, all while occasionally forgetting to water their plants during weekend bridge
    nights, embodying a charming mix of structure, community spirit, and endearing quirks.
background:
  cultural: Annie is a white Southern woman with deep roots in the small‑town culture of Lagrange, Georgia. Her family lineage traces back to English and Scots‑Irish settlers who arrived in the region in
    the late 19th century. Raised in a close‑knit community, she embodies Southern hospitality, a strong emphasis on family gatherings, church participation, and a respect for local traditions such as potluck
    meals, sweet‑tea rituals, and community festivals. Her upbringing in a modest, agricultural environment has shaped her practical outlook and love for the outdoors, while the regional history and cultural
    values of the Deep South continue to influence her worldview and daily practices.
