  hobbies: '[''Abstract painting'', ''Digital illustration'', ''Poetry writing'', ''Reading speculative fiction'', ''Philosophy podcasts'', ''Saxophone improvisation'', ''Beach walks'', ''Experimental cooking'',
    ''Meditation'', ''Yoga'', ''Volunteering at art‑therapy workshops'']'
  career_goals: Jameel aims to earn his Licensed Professional Counselor (LPC) credential and pursue a Master’s degree in counseling psychology with a focus on trauma‑informed care and expressive arts therapy.
    He envisions establishing a community‑based mental‑health arts center in Atlantic County that offers free workshops for Black youth and underserved adults. Long‑term, he hopes to publish research on
    the therapeutic benefits of abstract art for anxiety reduction, become a speaker at national mental‑health conferences, and eventually take on a leadership role as director of a nonprofit mental‑health
    organization.
