  hobbies: '[''Gardening'', ''Watercolor Painting'', ''Knitting'', ''Quilting'', ''Birdwatching'', ''Reading Historical Fiction'', ''Genealogy Research'', ''Crossword Puzzles'', ''Community Theater'', ''Church
    Choir'']'
  career_goals: Although retired from formal employment, Amanda aims to leave a lasting personal legacy. She plans to compile a written memoir and detailed family genealogy that will be shared with grandchildren
    and the local historical society. She wishes to teach quilting and watercolor techniques to younger members of the community through classes at the senior center. Organizing an annual senior arts showcase
    that highlights craft and visual art from retirees is a key ambition. She also hopes to travel to the Art Institute of Chicago and a few historic sites in the Midwest to broaden her artistic perspective.
    Maintaining her health and independence while continuing to contribute volunteer hours remains a central priority.
