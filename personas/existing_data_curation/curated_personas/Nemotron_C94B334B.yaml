  career_goals: Although currently not in the workforce, Andrew aims to re‑enter the job market on his own terms. He plans to obtain a certification in residential trades through a local community college,
    which would allow him to offer part‑time handyman services focused on low‑income neighborhoods in Dallas. The flexibility of freelance work fits his desire for both structure (scheduled appointments)
    and spontaneity (taking on varied projects). He also hopes to become a mentor for younger community members, sharing his practical skills and life experience. In the longer term, Andrew envisions achieving
    a stable supplemental income that supports his family's financial goals while freeing up time for personal health and family activities.
