personas:
  professional: Andrew Rey, a 47‑year‑old aspiring handyman, blends decades of DIY repairs with a meticulous eye for budgeting, preparing to earn a residential trades certification and launch a part‑time
    service for low‑income neighborhoods, where their assertive yet cooperative style lets them negotiate project scope while mentoring apprentices.
  sports: Andrew Rey is a devoted soccer fan who roots for Club América in Liga MX and FC Dallas in MLS, follows every match on TV, and plays casual Sunday games with the North Dallas Adult Soccer League,
    while also cheering for the Texas Rangers baseball team during spring.
  arts: Andrew Rey strums a classical guitar at evening gatherings, revering folk ballads by Lila Downs and the acoustic storytelling of Alejandro Fernández, and enjoys the cinematic works of Guillermo del Toro
    and the poetry of Pablo Neruda, which infuse their cooking sessions with lyrical inspiration.
  travel: Andrew Rey prefers purposeful road trips that blend nature and heritage, having driven to Big Bend National Park for starlit camping and to Albuquerque’s Old Town for a cultural weekend, they
    now dream of a pilgrimage to Oaxaca’s markets and a relaxed family vacation to Savannah’s historic squares, planning each itinerary around school calendars and modest savings.
  culinary: Andrew Rey delights in slow‑cooking carnitas, mastering the complex mole poblano with chilhuacle and chocolate, and hand‑rolling tender tamales stuffed with pork and masa, often seasoning with
    fresh cilantro, oregano, and roasted peppers, while their modest kitchen skills keep them from experimenting beyond traditional family recipes.
  core: Andrew Rey is a hands‑on pragmatist who balances meticulous budgeting with spontaneous fishing trips, blends community‑rooted traditions with a quiet love for guitar strums, and occasionally forgets
    to file tax paperwork while still mentoring neighborhood youth.
background:
  cultural: Andrew was raised in a Mexican‑American household in Dallas, Texas. He grew up bilingual, absorbing the language, food, and traditions of his Mexican heritage while also embracing the broader
    Texan culture. Family gatherings centered around holidays like Día de los Muertos and ¡Fiestas Patrias! are core to his identity, as is the Catholic faith that shapes many of his values. He maintains
    strong ties to the local Latino community, participating in neighborhood celebrations, church events, and cultural festivals. This blend of Mexican customs and Dallas suburbia has cultivated a pragmatic
    outlook, a deep respect for family, and a commitment to community service.
