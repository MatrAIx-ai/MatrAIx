  hobbies: '["Painting (folk and modern styles)", "Ceramic pottery and papel picado craftwork", "Traditional Mexican cooking", "Visiting art galleries and cultural festivals", "Hiking in the Sandia Mountains",
    "Volunteering at multicultural community center", "Reading early childhood development research", "Reciting Spanish-language poetry", "Salsa and folkloric dancing", "Gardening with native New Mexico
    plants"]'
  career_goals: Miriam aims to pursue an associate degree in early childhood education to deepen her pedagogical knowledge and qualify for a lead teacher or program director role at a community preschool.
    She hopes to design and implement a district‑wide bilingual arts curriculum that celebrates Mexican and Southwestern cultural traditions. In the longer term, Miriam aspires to start a nonprofit after‑school
    arts program that serves low‑income families in Albuquerque, and to author a children’s book series that blends folk tales with modern themes, promoting cultural pride and curiosity among young readers.
