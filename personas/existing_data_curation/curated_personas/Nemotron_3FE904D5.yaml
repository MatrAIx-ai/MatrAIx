personas:
  professional: Miriam Melendez is a veteran early‑childhood educator known for designing bilingual, arts‑integrated curricula that weave Day of the Dead storytelling, papel picado workshops, and hands‑on
    ceramic projects into daily learning, leveraging their charisma to lead collaborative classroom environments while balancing structured milestones with child‑led exploration.
  sports: Miriam Melendez embraces active weekends, trekking the Sandia Mountains with a local hiking club, cheering on New Mexico United soccer matches, joining a community cycling group that rides the
    historic El El Trail, and volunteering as a parent coach for their niece’s youth basketball team, though they admit a weak spot for taking the occasional leisurely nap after a long hike.
  arts: Miriam Melendez channels their creative energy into painting vibrant canvases inspired by Oaxacan folk patterns, crafting intricate papel picado for neighborhood fiestas, curating a monthly poetry
    recital that spotlights Spanish‑language verses from poets like Pablo Neruda, and frequently visiting the Albuquerque Museum of Art to study works by contemporary Southwestern artists such as R.C. Gorman,
    while occasionally staying up late perfecting a new talavera‑style ceramic glaze.
  travel: Miriam Melendez balances wanderlust with family responsibilities, planning immersive cultural trips to Oaxaca and Jalisco to explore local markets and historic churches, while also favoring mindful
    road‑trips across the Southwest to Sedona’s red rocks and Santa Fe’s historic plaza, often using a travel journal to sketch scenes before returning to their bustling classroom schedule.
  culinary: Miriam Melendez delights in cooking family recipes like Oaxacan mole negro, Jalisco‑style pozole, and fresh nopal cactus salad, skillfully preparing them on weekends while experimenting with
    talavera‑inspired ceramic platters, and enjoys pairing these dishes with artesanal mezcal and locally roasted coffee, though they admit a guilty pleasure for indulgent churros topped with cinnamon sugar
    after a long day.
  core: Miriam Melendez blends a passion for bilingual arts education, community‑focused finances, proactive health habits, and a love of hiking and creative expression into a vibrant, talkative life, often
    juggling too many projects at once, but always finding joy in sharing culture through paint, poetry, and community.
background:
  cultural: Miriam was raised in a Mexican‑American household where Spanish was spoken daily and cultural traditions such as Día de los Muertos, quinceañeras, and communal cooking were central to family
    life. Her parents immigrated from Mexico, bringing with them a deep respect for community, family cohesion, and artistic expression. Living in Albuquerque, Miriam blends her Mexican heritage with the
    Southwest's multicultural tapestry, incorporating local Indigenous and Hispanic influences into her teaching and daily routines. She celebrates Mexican holidays with lively music, traditional foods,
    and storytelling, while also engaging in New Mexican customs like the balloon fiestas and regional rodeo events. This bicultural identity informs her commitment to fostering a classroom atmosphere that
    honors diverse cultural narratives and encourages children to explore their own roots.
attributes:
  skills: '["Early Childhood Education", "Arts‑Integrated Curriculum Development", "Bilingual (Spanish‑English) Communication", "Social‑Emotional Learning Facilitation", "Child Development Assessment",
