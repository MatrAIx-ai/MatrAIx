persona_description: A homeowner or builder who is interested in restoring or renovating their wooden floors and is aware of the potential dangers of dust in the process. They are cautious and protective
  of their health and the health of their family, and prioritize safety measures such as using dust-free sanding equipment and protective gear. They are knowledgeable about the risks associated with specific
  woods, such as Ipe, Merbau, and Iroko, and are aware of the health hazards associated with exposure to dust from these woods. They are also aware of the risks associated with lead and asbestos in old
  wooden floors, and take steps to minimize exposure to these materials.
