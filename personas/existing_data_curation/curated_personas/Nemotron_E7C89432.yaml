  hobbies: '[''Abstract painting'', ''Digital illustration'', ''Landscape photography'', ''Reading philosophy and science'', ''Cooking traditional Mexican dishes'', ''Genealogy research'', ''Volunteer art
    teaching at community center'', ''Playing chess'', ''Herb gardening'', ''Attending art exhibitions and cultural festivals'']'
  career_goals: Although retired from full‑time management, Rafael aims to transition his expertise into mentorship and community advocacy. He plans to mentor emerging Mexican‑American professionals, especially
    those interested in leadership and the arts, by offering workshops and one‑on‑one coaching. Rafael also hopes to establish a modest scholarship fund for local youth pursuing careers in the arts or STEM
    fields, and to curate a community mural that celebrates Mexican heritage in Mesquite. Additionally, he aspires to author a reflective memoir that weaves together his experiences in management, creativity,
    and cultural identity, while continuing to consult small businesses on innovative practices.
