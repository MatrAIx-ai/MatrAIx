persona_description: A researcher at RMIT University in Melbourne, Australia, who specializes in cutting-edge advances in micro- and nano-technologies. The person is interested in the world's first rapid
  3D nanoscale printer, capable of producing thousands of structures in seconds, and the innovative energy harvesting techniques that can change the way batteries are recharged. The person is also interested
  in building miniaturised motors to retrieve blood clots from deep within the brain, improving drug delivery via the lungs through new techniques that can atomise large biomolecules, and developing ways
  to use water to remove toxins from fabric dyes with new nanotechnologies that can facilitate the breaking down of those dyes. The person is also interested in the unique teaching facility, the Micro Nano
  Teaching Facility (MNTF), which is the first of its kind in Australia, enabling undergraduate and postgraduate engineering student trainees to study clean room operations and micro-fabrication.
