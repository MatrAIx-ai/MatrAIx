  career_goals: He aims to progress from a frontline cleaning role to a supervisory position, eventually becoming a facilities manager for a larger corporate campus. He plans to earn industry certifications
    such as the Certified Professional Cleaner (CPC) and pursue a bachelor's degree in facilities management. In the longer term, Jayendra is interested in launching his own eco-friendly cleaning service,
    leveraging his curiosity about green technologies and his network of contacts in the Dallas area.
