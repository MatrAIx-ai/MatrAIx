persona_description: A team of oceanographers and geophysicists who specialize in hydrocarbon exploration and mapping, using advanced technology and techniques to search for hydrocarbon plumes deep in the
  Gulf of Mexico. They operate a research vessel, Endeavor, equipped with advanced sensors and equipment to collect data on the hydrocarbon plumes. They use a tow-yo technique to search for plumes from
  hydrothermal vents and map the hydrocarbon plumes in real-time using acoustic instruments. They are skilled in navigating and operating undersea vehicles and robots, and are able to collect and transmit
  data on hydrocarbon plumes using advanced technology.
