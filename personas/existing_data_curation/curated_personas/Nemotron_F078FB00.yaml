  career_goals: Joseph aims to transition from his current transitional phase into a stable, full-time position that leverages his analytical and technical strengths, such as an IT support specialist, logistics
    coordinator, or operations analyst. He plans to earn industry-recognized certifications (e.g., CompTIA A+, PMP) and eventually move into a supervisory role where he can lead small teams, streamline
    processes, and improve efficiency. In the longer term, he is considering launching a low-overhead home-repair and maintenance business that would allow him to combine his hands-on skills with his competitive
    drive for business growth.
