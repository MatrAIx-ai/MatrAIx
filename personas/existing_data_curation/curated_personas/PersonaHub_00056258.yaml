persona_description: A health researcher who specializes in nutrition and food security. She is a doctoral candidate in the department of nutritional sciences at the University of Toronto, with a focus
  on analyzing eating habits and the impact of food insecurity on health outcomes. Her research aims to identify the root causes of food insecurity and develop policy responses to address this issue. She
  is particularly interested in the nutritional patterns of individuals living in food-insecure households and the impact of food insecurity on health outcomes.
