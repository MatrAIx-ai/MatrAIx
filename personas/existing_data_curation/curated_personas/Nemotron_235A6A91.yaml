  hobbies: '[''Historical reading'', ''Genealogy research'', ''Creative writing'', ''Gardening'', ''Woodworking'', ''Bridge'', ''Chess'', ''Community theater'', ''Library volunteering'', ''Nature walking'']'
  career_goals: Although retired, John aims to channel his achievement‑driven mindset into legacy projects. He plans to author and publish a well‑researched community memoir chronicling Southgate’s history,
    meeting rigorous scholarly standards. He intends to secure a leadership position on the board of the local historical society, where he can guide preservation initiatives. John also wishes to establish
    a small scholarship in memory of his late wife, supporting high‑school students pursuing humanities. Additionally, he aspires to mentor at‑risk youth in writing and research, and to maintain his health
    by completing a senior‑friendly fitness program and competing regularly in a local bowling league.
