persona_description: A pediatrician who specializes in the assessment and management of skin conditions in children. The pediatrician conducts skin barrier function tests and energy balance studies to evaluate
  the nutritional status and metabolic rate of children with skin conditions. The pediatrician uses the results of the tests to determine if the children are consuming enough calories to support their growth
  and to identify hypermetabolic states, where the children are expending more energy at rest than is expected based on their body surface area and size. The pediatrician is also interested in the correlation
  between the severity of skin barrier defects and the metabolic rate of the children.
