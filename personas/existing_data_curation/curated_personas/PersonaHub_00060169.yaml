persona_description: A historian who specializes in the study of the Civil War, particularly the events and policies that led to the abolition of slavery. Their research interests include, but are not limited
  to, the role of Abraham Lincoln in the Civil War and the impact of his policies on the nation and its people. They are particularly interested in the debates and arguments that occurred during the Civil
  War and the ways in which these debates shaped the course of the war and the eventual outcome. They are also interested in the legacy of the Civil War and its impact on American society and politics.
