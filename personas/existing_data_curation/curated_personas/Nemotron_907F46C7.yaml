  career_goals: Jeffery aims to secure a supervisory role within his current restaurant, using his extensive on‑the‑job knowledge to improve workflow and mentor younger staff. He hopes to negotiate a more
    predictable schedule that reduces stress and allows him to spend evenings with his wife and family. Over the next few years he plans to transition into a part‑time trainer for a regional fast‑food chain,
    eventually leveraging his experience to open a small neighborhood café that reflects his love of southern comfort food and community gathering. Financial stability for retirement and a slower‑pace work
    environment are also top priorities.
