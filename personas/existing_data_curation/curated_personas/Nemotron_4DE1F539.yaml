  career_goals: James aims to enroll in a bachelor’s program in communications or marketing, with the short‑term ambition of securing an internship in public relations or brand strategy where he can apply
    his sociable, talkative nature. He envisions a career path that leads to a senior PR specialist role and eventually the launch of his own digital media agency focused on community storytelling and cultural
    promotion in the Detroit metro area. Leveraging his competitive spirit, he also hopes to develop a personal YouTube channel that showcases interviews with local artists, event coverage, and thought‑leadership
    pieces, turning his practical curiosity into a platform for influence.
