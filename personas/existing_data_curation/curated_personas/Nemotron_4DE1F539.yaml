personas:
  professional: James Goodwin is an aspiring communications student whose debate-honed research and public speaking abilities, combined with a competitive, sociable streak, position them to excel in PR
    internships where they thrive on high-energy networking, strategic storytelling, and adaptable event coordination.
  sports: James Goodwin fuels their competitive drive by playing pick-up basketball at local courts, cheering on the Detroit Pistons and the Michigan Wolverines, and regularly entering online esports tournaments
    for Call of Duty and League of Legends, balancing team camaraderie with a personal hunger to win.
  arts: James Goodwin embraces the Midwestern arts scene through improv theater, frequenting live shows that feature Motown legends like Stevie Wonder and Detroit-born rock bands such as The White Stripes,
    while curating a YouTube playlist of local indie acts like The Rannick to inspire their own storytelling videos.
  travel: James Goodwin prefers spontaneous weekend road trips that blend urban exploration of Detroit’s music museums and automotive heritage with quick getaways to nearby Chicago and Cleveland, while
    dreaming of a cross-country adventure to the Pacific Northwest’s rain-soaked coast when their student budget finally allows.
  culinary: James Goodwin loves crafting themed meals for friends, often merging classic Midwestern comfort food like mac and cheese with French-Canadian-inspired poutine topped with smoked brisket, maple
    syrup, and fresh herbs, while occasionally ordering pizza after late-night gaming sessions.
  core: James Goodwin is a socially driven, strategically minded 18-year-old whose blend of curiosity, practicality, and competitive edge fuels a relentless pursuit of community storytelling, even as they
    juggle occasional skepticism, late-night gaming marathons, and a habit of postponing dental appointments.
background:
  cultural: James grew up in Royal Oak, Michigan, a middle‑class suburb of Detroit with a predominantly white population. His family blends Anglo‑American and French‑Canadian ancestry, reflected in his
    surname Louviere. The region’s strong automotive heritage, classic rock, Motown sounds, and local sports culture have shaped his tastes and community values. Raised in a supportive, church‑centered
    environment, he internalized Midwestern ideals of practicality, self‑reliance, and community involvement. Frequent trips to Detroit for concerts, museums, and cultural festivals expose him to a broader
    urban influence, creating a hybrid suburban‑urban perspective that informs his outlook and aspirations.
