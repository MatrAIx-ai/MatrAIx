  hobbies: '["Gardening (vegetables and flowers)", "Reading nonfiction (history, biographies, finance)", "Baking artisan bread", "Crossword and sudoku puzzles", "Yoga and mindfulness meditation", "Volunteer
    work with local church (food bank, community clean‑ups)", "Hiking local nature trails with spouse"]'
  career_goals: Evelyn aims to obtain her CPA license (if not already certified) and advance to a senior audit manager role within the next three years, overseeing a small team of auditors. She is focused
    on integrating more automation into audit processes to increase efficiency and accuracy. In the long term, she aspires to transition into a CFO position at a mid‑size Texas manufacturing firm, where
    she can shape financial strategy while maintaining a balanced personal life. She also seeks to mentor emerging women accountants, promoting practical expertise and professional resilience.
