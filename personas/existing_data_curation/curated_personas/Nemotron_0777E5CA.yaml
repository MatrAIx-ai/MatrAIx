personas:
  professional: Cedric Johnson is a budding multimedia designer who blends hand-drawn sketches, digital illustration, and lo-fi music beats into immersive visual-audio projects, leveraging self-taught Procreate
    and HTML/CSS skills while often racing against deadlines due to a spontaneous work style.
  sports: Cedric Johnson dribbles at the Burlington Community Center's open-court sessions on weekends, cheers for the local Vermont Lake Monsters baseball team and the Boston Celtics, and finds balance
    in solo trail runs along the Winooski River after long studio sessions.
  arts: Cedric Johnson immerses in the surreal canvases of James Jean, the ambient soundscapes of Tycho, and the speculative worlds of Ursula K. Le Guin, channeling their influence into hand-drawn collages,
    Procreate digital paintings, and lo-fi guitar loops shared during his church youth art nights.
  travel: Cedric Johnson loves spontaneous day-trips to Lake Champlain's shoreline and the historic streets of Maplewood, yet dreams of a future backpacking adventure through Kyoto's temples and Osaka's
    street-art districts, planning each journey on a shoestring budget funded by a modest travel stash earned from weekend gigs.
  culinary: Cedric Johnson prefers quick, creative meals like avocado toast topped with smoked salmon, whips up a midnight bowl of spicy ramen when deadlines loom, and still indulges in classic pizza slices
    and cinnamon-sugar cereal while sketching, reflecting a modest cooking skill level that blends improvisation with comfort.
  core: Cedric Johnson is a quietly curious teen whose sketchbook-filled wanderings, late-night beat-making sessions, and gentle community spirit create a spontaneous yet compassionate worldview, even though
    they often miss deadlines and lose track of chores.
background:
  cultural: Cedric was raised in a close‑knit African‑American family in Burlington, North Carolina. His grandparents migrated from the rural South during the Great Migration and instilled a deep respect
    for community, church, and Southern soul‑food traditions. He grew up with gospel music at family gatherings, the rhythmic storytelling of hip‑hop, and the culinary heritage of fried chicken, collard
    greens, and sweet tea. The local Black church and community center have been central to his social life, offering both spiritual guidance and spaces for artistic expression. He draws on this cultural
    tapestry—stories of resilience, oral history, and communal support—in his art and worldview.
attributes:
  skills: '[''digital illustration'', ''hand‑drawn sketching'', ''mixed‑media collage'', ''basic HTML/CSS'', ''acoustic guitar'', ''beat making'', ''poetry writing'', ''peer mediation'']'
  hobbies: '[''digital drawing'', ''mixed‑media collage'', ''beat making'', ''reading speculative fiction'', ''philosophy'', ''basketball'', ''nature walks'', ''volunteering at youth group'']'
  career_goals: Cedric hopes to turn his artistic interests into a sustainable career. Over the next few years he aims to complete a certificate in graphic design at the local community college or a vocational
    program, build a freelance portfolio, and eventually work as a multimedia designer for a local studio or a non‑profit. He also dreams of launching a youth‑focused art workshop in Burlington where he
    can teach drawing and digital media to other teens, using his own experiences to inspire them. In parallel, he wants to produce a small collection of original songs and visual art that could be showcased
    at a community arts festival.
