  career_goals: Though still a toddler, Sunil's curiosity and love for organized play hint at future ambitions to become a creator who builds and solves problems—potentially in fields such as engineering,
    design, or the arts. His interest in constructing block towers and arranging objects suggests a budding desire to be an inventor or architect as he grows. His parents nurture these inclinations by providing
    building kits, art supplies, and exposure to creative learning environments, aiming to channel his disciplined nature toward careers that value precision, innovation, and artistic expression.
