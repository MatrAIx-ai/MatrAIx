personas:
  professional: Sunil Sa, a two‑year‑old, already acts as a budding builder, converting every stack of wooden blocks and shape‑sorting toys into miniature construction projects, displaying a disciplined,
    achievement‑driven focus and a competitive urge to out‑build peers during playtime.
  sports: Sunil Sa, a lively two‑year‑old, delights in toddler gymnastics sessions, energetic sandbox races, and cheering for the local baseball team, the Tigers, while channeling a competitive spirit into
    every sprint across the park’s playfield.
  arts: Sunil Sa, a two‑year‑old with a budding appreciation for art, spends afternoons finger‑painting vibrant moons and suns, hums along to 'The Wiggles' and 'Baby Shark', and watches animated picture‑book
    readings, letting the colors and melodies shape their imaginative play.
  travel: Sunil Sa, at two, has already explored the Santa Monica beach with family, savored sights at the city zoo, and dreams of a future trip to Kyoto’s cherry blossoms, preferring stroller‑friendly
    itineraries that blend familiar comforts with new visual wonders.
  culinary: Sunil Sa, a two‑year‑old foodie in training, repeatedly asks for banana pancakes drizzled with maple syrup, loves the soft texture of avocado cubes, and mischievously nibbles peas off the plate
    when no one is looking.
  core: Sunil Sa is a hyper‑curious, ultra‑organized toddler whose love of art, competitive drive, and resilient spirit create a uniquely energetic outlook on life.
background:
  cultural: Sunil is a second‑generation South Asian American raised in New Hyde Park, Queens, by Indian immigrant parents. He grows up in a bilingual household where Hindi (and occasional Gujarati) and
    English are spoken. His family celebrates festivals such as Diwali, Holi, and Eid, immersing him in traditional music, dance, and cuisine. The multicultural environment of Queens provides diverse playmates,
    allowing him to blend his South Asian heritage with broader American cultural experiences while maintaining strong family ties and cultural pride.
