persona_description: A business owner or manager who is responsible for managing a chemical manufacturing or supply business in Northern Ireland or Scotland. This person is likely to be interested in the
  CLP Regulations and their impact on their business, as well as the classification, labelling, and packaging of hazardous substances and mixtures. They may also be interested in the health and safety regulations,
  such as the Health and Safety Executive (HSE) guidance and the Control of Substances Hazardous to Health (COSHH) Regulations, and the need to provide safety data sheets (SDS) for hazardous substances
  and mixtures. Additionally, this person may be interested in the REACH (Registration, Evaluation, Authorisation and restriction of Chemicals) Regulation and the need to provide SDSs for hazardous substances
  and mixtures. They may also be interested in the zero waste movement and the need to reduce waste and promote sustainability in their business.
