  hobbies: '[''Salsa and swing dancing'', ''Jazz piano playing'', ''Storytelling circles'', ''Community gardening'', ''Historical travel'', ''Soul‑food cooking'', ''Attending jazz festivals'', ''Church
    choir participation'', ''Bridge card games'', ''Volunteer work at senior centers'']'
  career_goals: Although retired from formal employment, Theartis aims to channel his expertise into volunteer leadership roles within Sarasota's senior and youth programs. He hopes to launch a neighborhood
    learning hub that blends practical skill‑building with cultural enrichment, and he aspires to mentor a new generation of educators through a local apprenticeship series. Additionally, he dreams of authoring
    a memoir that captures his educational journey and the lessons learned from navigating both curiosity and practicality throughout his life.
