personas:
  professional: Theartis Garlington, a retired educator turned community learning architect, channels decades of adult‑learning expertise into improvisational workshops, mentorship programs, and culturally
    rich events, often juggling a flexible, occasionally disorganized schedule while they competitively challenge peers to raise the bar.
  sports: Theartis Garlington stays fit by dancing salsa and swing at the local community center, participates in the Sarasota Senior Walkers Club, follows the Tampa Bay Rays baseball team and the Florida
    Gators basketball squad, and they occasionally join friendly dance competitions, reflecting a competitive streak even in recreational activities.
  arts: Theartis Garlington performs jazz piano with the Sarasota Jazz Ensemble, attends the New Orleans Jazz & Heritage Festival and the Sarasota Music Festival, draws artistic inspiration from Duke Ellington,
    Ella Fitzgerald, and Arturo O'Farrill, and they regularly contribute storytelling sessions at the neighborhood library, where their improvisational flair shines.
  travel: Theartis Garlington enjoys loosely planned journeys with their spouse to historic destinations such as St. Augustine, Savannah’s Historic District, Rome’s Colosseum, and Kyoto’s Gion district,
    balancing a love for cultural immersion with flexible itineraries and a modest senior travel budget, and they cherish spontaneous detours that uncover hidden local gems.
  culinary: Theartis Garlington delights in preparing soul‑food favorites like collard greens, fried chicken, gumbo, and sweet‑potato casserole, often enhancing dishes with heirloom tomatoes, purple carrots,
    and smoked paprika from their garden, and they showcase moderate cooking prowess at family gatherings and community potlucks.
  core: Theartis Garlington is a socially vibrant, improvisational lifelong educator who thrives on jazz, dance, and community connection, and they wrestle with anxiety, occasional disorganization, and
    a competitive edge that drives them to constantly improve.
background:
  cultural: Theartis is an African‑American who grew up during the post‑Civil‑Rights era in a tight‑knit church community in Sarasota. His family migrated from the rural South during the Great Migration,
    bringing with them traditions of gospel music, oral storytelling, and a reverence for education as a path to empowerment. He honors these roots through regular involvement with local Black cultural
    festivals, mentoring youth in heritage projects, and preserving culinary traditions passed down through generations. His cultural identity shapes his commitment to community uplift, collective learning
    experiences, and the celebration of African‑American artistic expression.
