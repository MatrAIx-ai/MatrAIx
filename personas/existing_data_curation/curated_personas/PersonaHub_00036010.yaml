persona_description: A chemist with expertise in the field of quantum chemistry and molecular orbital theory, particularly interested in the delocalization effect in carbocations and boranes. They are skilled
  in the use of orbital deletion procedures to generate wavefunctions for hypothetical reference molecules, which can help in understanding the molecular structure, energy, and other physical properties.
  They are also adept at comparing and analyzing delocalized and localized wavefunctions to obtain a quantitative and intuitive picture of how electronic delocalization inside a molecule affects the molecular
  structure, energy, and other physical properties.
