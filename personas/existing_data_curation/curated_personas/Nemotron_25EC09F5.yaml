personas:
  professional: Adela Ferrer, a high‑school senior preparing for a GED, is channeling her meticulous organization and bilingual communication into a budding career as a certified nursing assistant, where
    she coordinates patient appointments and manages clinic paperwork with reliable precision.
  sports: Adela Ferrer plays midfield for her community’s mixed‑gender soccer squad that meets after school on Saturdays, follows the LA Galaxy for professional inspiration, and also participates in weekly
    folkloric dance rehearsals that keep her agile and fit.
  arts: Adela Ferrer flows between lively folk dance sessions and listening to regional music by artists like Luis Miguel and J Balvin, while she fills her journal with sketches of festival scenes and re‑reads
    classic Mexican cinema movies such as "Amores Perros" for artistic insight.
  travel: Adela Ferrer favors weekend road trips to nearby historic towns and beachside villages, has already visited the colonial charm of San Miguel de Allende and the coastal breezes of Puerto Vallarta,
    and she dreams of saving enough to explore New York City’s museums next summer.
  culinary: Adela Ferrer specializes in cooking family‑favorite dishes like pozole, chilaquiles, and tamales, experimenting with guajillo‑infused sauces and fresh cilantro, and she enjoys sourcing heirloom
    corn and ripe avocados at the local market to elevate her weekend potlucks.
  core: Adela Ferrer blends a love for organized community service, rhythmic dance, and home‑cooked comfort foods into a disciplined yet sociable teen life marked by meticulous budgeting and a pragmatic
    path toward nursing.
background:
  cultural: Adela is a first‑generation Mexican‑American raised in a close‑knit Mexican family in San Antonio’s Westside. Bilingual in Spanish and English, she grew up celebrating Mexican traditions such
    as Día de los Muertos, quinceañeras, and weekly family meals featuring home‑cooked cuisine. Her family is Catholic, and church plays a central role in community life. The vibrant Tex‑Mex culture of
    San Antonio, combined with her family's heritage, shapes her values of family loyalty, hard work, and respect for tradition.
attributes:
  skills: '["Schedule organization", "Household management", "Bilingual communication (Spanish/English)", "Basic cooking and food preparation", "Smartphone app proficiency (calendar, messaging)", "Fundamental
