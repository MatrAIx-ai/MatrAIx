  hobbies: '["Folkloric dance (ballet folklorico)", "Soccer with friends", "Cooking traditional Mexican dishes", "Church youth group participation", "Volunteering at local festivals", "Organizing neighborhood
    gatherings", "Journaling and daily planning", "Listening to regional Mexican music", "Social media interaction with friends"]'
  career_goals: Adela aims to complete her GED within the next year, then enroll in a community college program to become a certified nursing assistant (CNA) or medical assistant. She wants a stable, practical
    career in healthcare where she can apply her organizational strengths and caring nature, allowing her to support her family financially. Long‑term, she hopes to pursue further certification as a licensed
    practical nurse (LPN) and eventually become a nursing supervisor in a community clinic.
