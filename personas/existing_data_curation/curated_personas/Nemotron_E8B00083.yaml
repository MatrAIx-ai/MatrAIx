personas:
  professional: James Palacios, a 30‑year‑old cinematographer‑operator and editor with a meticulous shot‑log habit, blends analytical problem‑solving and artistic curiosity to craft visual narratives while
    guiding freelance crews toward reliable delivery for streaming platforms.
  sports: James Palacios follows the Los Angeles Lakers and Dodgers avidly, jogs the Santa Monica coastline twice weekly, joins the Santa Monica Track Club for seasonal cross‑country runs, and prefers low‑impact
    strength training to protect his back while maintaining stamina for on‑set demands.
  arts: James Palacios, a vinyl‑collecting cinephile, spins records by Nick Drake, Joni Mitchell, and The Velvet Underground, attends screenings of Ari Aster and Chantal Akerman, studies contemporary art
    criticism, and strums acoustic renditions of David Bowie’s 'Heroes' to unwind.
  travel: James Palacios plans his trips with meticulous itineraries, favors off‑beat cultural immersion such as a photography workshop in Oaxaca, Mexico, a hiking expedition on Iceland’s Snæfellsnes Peninsula,
    and weekend getaways to Santa Barbara, balancing freelance cash flow with a desire for visual inspiration.
  culinary: James Palacios enjoys experimenting with Asian cuisine, frequently crafting homemade ramen broth with kombu and miso, pan‑searing pork belly with gochujang glaze, and pairing dishes with a splash
    of yuzu‑infused sake while his cooking skill hovers at confident home‑chef level.
  core: James Palacios melds a disciplined eye for visual detail with a quiet, methodical curiosity, juggling vintage gear obsessions, a health‑flexible yoga routine, and a habit of over‑booking camera
    upgrades at the expense of social outings.
background:
  cultural: James is a white American raised in the multicultural tapestry of Los Angeles. Growing up near Hollywood, he internalized the legacy of classic American cinema while being immersed in a neighborhood
    where Mexican, Asian, and African‑American cultures intersected daily. His liberal arts education in humanities deepened his appreciation for diverse narratives and storytelling traditions. He actively
    participates in local art collectives, values inclusive representation in media, and respects the historic ties of LA's film industry to both its European roots and its vibrant, multicultural present.
attributes:
  skills: '[''Camera operation'', ''Cinematography'', ''Lighting design'', ''Non-linear editing (Adobe Premiere, Avid)'', ''Color grading (DaVinci Resolve)'', ''Drone operation'', ''Audio syncing'', ''Post‑production
    workflow management'', ''Equipment maintenance'', ''Storyboard development'', ''Collaborative production'', ''Visual effects basics'']'
  hobbies: '[''Analog photography'', ''Hiking'', ''Film festival attendance'', ''Reading (film theory, philosophy)'', ''Playing acoustic guitar'', ''Cooking'', ''Collecting vinyl records'', ''Community
    media volunteering'']'
  career_goals: James aims to transition from operator/editor to Director of Photography on narrative feature films while deepening his expertise in high‑end post‑production supervision. He aspires to lead
    a boutique freelance crew that balances artistic ambition with reliable delivery for streaming platforms and independent studios. Long‑term, James hopes to mentor emerging cinematographers, experiment
    with virtual‑production technologies, and curate a personal visual style that reflects contemporary storytelling while honoring classic Hollywood influences.
