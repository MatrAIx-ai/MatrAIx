persona_description: A highly motivated and ambitious individual with a strong interest in environmental science and the environment. This person is seeking a comprehensive and interdisciplinary education
  that combines physical, chemical, and biological aspects of the environment and environmental systems. They are looking for a program that provides them with the necessary quantitative, interdisciplinary
  training to address, mitigate, and manage complex environmental problems facing society. They are interested in careers in environmental consulting, government regulation enforcement, health and safety,
  pollution cleanup, mapping/cartography, and similar careers. They are a part of the Environmental Geosciences (EGS) program and are particularly interested in the Ecology and the Environment, Water and
  the Environment, and Environmental Monitoring and Analysis specialization tracks. They have a solid foundation in biological, physical, and natural sciences, mathematics and statistics, and analytic and
  geospatial techniques, as well as the specialized training necessary for integrated analysis of environmental systems. They are a member of the Environmental Geosciences and Environmental Studies programs
  and are encouraged to join several organizations.
