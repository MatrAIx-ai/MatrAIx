persona_description: A historian who specializes in the study of water supply systems in Hawaii, particularly focusing on the development of the water supply system in Honolulu from the 1820s to the 1880s.
  His research interests include the impact of the water supply system on the city's economy, population growth, and the health and well-being of the people. He is particularly interested in the use of
  artesian wells and the impact of the Palace well on the city's water supply.
