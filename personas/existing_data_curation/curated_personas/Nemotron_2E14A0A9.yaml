  hobbies: '[''Reading historical novels and biographies'', ''Genealogy research'', ''Quilting and crocheting'', ''Traditional Southern cooking'', ''Gardening'', ''Small book club participation'', ''Church
    choir singing'', ''Attending jazz and blues concerts'', ''Playing bridge with friends'']'
  career_goals: Although retired, Lasaundra aims to leave a lasting cultural legacy in Montgomery. She plans to compile and publish a family memoir that weaves personal narratives with the broader civil‑rights
    history of the city. She seeks to collaborate with the local museum on an exhibit highlighting African‑American women's contributions during the 1960s. Volunteering as a mentor, she hopes to guide high‑school
    students in researching their own genealogies and writing personal essays. Moreover, she aspires to expand the community garden she helped start, creating a tranquil space where seniors can share stories
    and produce fresh herbs for church events.
