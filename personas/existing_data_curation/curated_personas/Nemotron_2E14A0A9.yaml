personas:
  professional: Lasaundra Jones, a retired humanities scholar turned community historian, leverages her meticulous research skills, storytelling talent, and confident yet measured public speaking to guide
    local book clubs, mentor high‑school students, and coordinate museum exhibits, balancing curiosity with practical organization.
  sports: Lasaundra Jones enjoys low‑impact fitness through daily garden walks, a senior yoga class at the Montgomery YMCA, and quietly cheers for the Alabama Crimson Tide football team and the Montgomery
    Biscuits baseball club, embodying a balanced, steady commitment to health without competitive pressure.
  arts: Lasaundra Jones finds artistic fulfillment in singing with her church choir, attending intimate jazz evenings featuring Miles Davis and B.B. King, and reading historical novels by authors such as
    Hilary Mantel, allowing both music and literature to enrich her reflective lifestyle.
  travel: Lasaundra Jones prefers thoughtfully planned, culturally immersive trips—like a leisurely road‑trip to the National Museum of African American History in Washington, D.C., a weekend stay in historic
    Savannah, and a hopeful pilgrimage to Ghana’s Cape Coast Castle—balancing limited mobility with a deep love of heritage sites.
  culinary: Lasaundra Jones excels at traditional Southern cooking, regularly preparing collard greens simmered with smoked ham hocks, buttery cornbread, and sweet potato pie, while experimenting with heirloom
    varieties of okra and black‑eyed peas in her modest garden, showcasing both seasoned skill and garden‑to‑table enthusiasm.
  core: Lasaundra Jones blends a historian’s curiosity with a gardener’s patience, turning quiet afternoons into projects of memory‑preserving quilts, genealogical discoveries, and soulful jazz, all while
    keeping a watchful eye on her health and finances.
background:
  cultural: Born and raised in Montgomery, Alabama, Lasaundra grew up amid the civil‑rights movement, with her parents actively involved in church‑based community organizing. Her African‑American heritage
    is rooted in Southern traditions of storytelling, gospel music, and soul food, all of which shape her identity. She celebrates Juneteenth and Kwanzaa alongside church holidays, and she values intergenerational
    knowledge transfer through oral histories. The legacy of the Montgomery Bus Boycott and the broader fight for equality informs her commitment to preserving Black history and mentoring younger generations.
    Her upbringing in a close‑knit Black church community instilled a sense of collective responsibility balanced with personal resilience.
