  hobbies: '[''Gardening'', ''Woodworking'', ''Reading historical nonfiction'', ''Cooking traditional Puerto Rican dishes'', ''Listening to and playing Bomba/Plena music'', ''Volunteering as a STEM mentor'',
    ''Playing dominoes with friends'', ''Walking nature trails'', ''Fishing'', ''Traveling to historical sites in Puerto Rico'']'
  career_goals: Although retired from full‑time work, Anibal aims to leave a lasting legacy through community service and lifelong learning. He seeks to lead a volunteer program that introduces solar‑power
    solutions to low‑income neighborhoods in Gurabo, mentor high‑school students in STEM fields, and complete a memoir that chronicles his family's history and the evolution of engineering practice on the
    island. He also plans to stay updated on IoT, sustainable design, and modern construction techniques by attending workshops, online courses, and local conferences, blending his curiosity with his practical,
    solution‑focused outlook.
