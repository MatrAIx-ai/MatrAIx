personas:
  professional: Anibal Cartaya, a retired structural engineer with over thirty years of experience, now leads a community solar‑power volunteer program and mentors high‑school STEM students, applying meticulous
    project management and hands‑on troubleshooting while staying open to IoT innovations and flexibly adapting to each project’s unique constraints, and they balance their pragmatic mindset with a quiet
    curiosity about emerging technologies.
  sports: Anibal Cartaya keeps active by strolling the hills’ nature trails most mornings, casting a line in nearby rivers on weekends, joining the senior softball league in the spring, cheering for the
    Cangrejeros de Santurce during baseball season, and they follow the Capitanes de Arecibo’s basketball games while maintaining a flexible, low‑impact fitness routine that balances gentle cardio with
    occasional resistance work in their home workshop.
  arts: Anibal Cartaya nurtures artistic appreciation by playing Bomba and Plena rhythms on a cajón at sunset, devouring historical nonfiction by Fernando Picó, listening to the classic salsa of Willie Colón,
    attending exhibitions at the local art museum featuring José Buscaglia’s sculptures, and they integrate these cultural experiences into their woodworking designs, reflecting a creative yet methodical
    mindset.
  travel: Anibal Cartaya plans trips with careful itineraries yet leaves room for spontaneous detours, has explored historic Old San Juan, the rainforest of El Yunque, and the colonial charm of Ponce, dreams
    of strolling Barcelona’s Gothic Quarter and Cartagena’s walled city, and they balance travel costs by using senior discounts, staying in modest guesthouses, and occasionally splurging on guided cultural
    tours.
  culinary: Anibal Cartaya delights in cooking traditional island fare such as arroz con gandules, pastelón, and mofongo with a hearty sofrito base, they master the art of grilling seasoned pork al horno
    and perfecting sweet plantain empanadillas, relish the aroma of fresh cilantro and cumin in every pot, and they occasionally treat themselves to a slice of cheesecake from the local bakery as a sweet
    finish.
  core: Anibal Cartaya is a pragmatic yet curious 73‑year‑old retired engineer who balances community solar volunteering, gardening, woodworking, and nightly cajón rhythms, while habitually misplacing receipts,
    over‑investing in craft tools, and never missing a domino game at the senior center.
background:
  cultural: Anibal's cultural identity is deeply rooted in Puerto Rican traditions and values. He grew up in a close‑knit family that emphasized respect for elders, community involvement, and the importance
    of learning. Bilingual in Spanish and English, he navigates both local and broader contexts with ease. Catholic rituals and celebrations, such as attending mass and participating in festive parish events,
    have shaped his worldview. He cherishes the island's musical heritage—especially Bomba and Plena—and its culinary customs, frequently preparing and sharing family recipes. His strong sense of 'país'
    (home) manifests in his commitment to local volunteerism, preservation of historical sites, and the transmission of cultural knowledge to younger generations.
