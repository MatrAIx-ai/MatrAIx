  career_goals: José dreams of becoming a teacher or community helper who works with children, such as a kindergarten teacher, because he enjoys guiding peers in a calm, supportive environment and values
    routine and harmony. He also imagines helping animals as a future veterinarian, seeing it as a caring, structured profession.
