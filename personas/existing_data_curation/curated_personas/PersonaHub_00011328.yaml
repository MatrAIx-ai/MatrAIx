persona_description: A teacher who is passionate about promoting diversity, equity, and inclusion in education. They are dedicated to fostering an environment where students feel safe and supported to explore
  and learn about different cultures, perspectives, and identities. They are skilled in using critical literacy to help students understand and challenge the assumption that whiteness is "normal" and to
  provide them with tools to have open and honest conversations about difficult topics. They are also knowledgeable about environmental awareness and emotional development, and understand the importance
  of celebrating cultural celebrations in schools to benefit all students.
