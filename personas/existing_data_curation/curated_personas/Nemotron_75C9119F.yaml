  career_goals: Tisha aims to graduate high school with strong grades, earn a scholarship to study education, and become a middle school teacher in her hometown. She dreams of creating a youth mentorship
    program that offers structured support for at‑risk teens, blending her love for organization with her desire to help others. Long‑term, she envisions a stable, community‑focused career—potentially as
    a school counselor or community outreach coordinator—where she can maintain predictability while making a positive impact on her neighbors.
