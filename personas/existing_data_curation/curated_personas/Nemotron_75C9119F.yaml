personas:
  professional: Tisha Lancour is an aspiring teenage performer, starring in school drama productions and leading the choir, where their natural talkativeness, love of structure, and penchant for being center
    stage translate into meticulous rehearsals and a knack for rallying peers.
  sports: Tisha Lancour plays point guard for the McKee Middle School basketball team and participates in the community’s youth athletic club, cheering on the Kentucky Wildcats while they blend structured
    practice drills with spontaneous street‑ball games on local courts, and they keep a habit of stretching on the trails after hikes.
  arts: Tisha Lancour blends a love of Appalachian storytelling with contemporary pop, regularly performing songs by the Avett Brothers and Taylor Swift in choir, idolizing Broadway’s \"Dear Evan Hansen\"
    and knitting scarves while listening to Bill Monroe's bluegrass, which together shape their creative identity.
  travel: Tisha Lancour dreams of swapping the rolling hills of McKee for the bustling streets of Nashville and the historic charm of Charleston, yet currently favors weekend hikes to Red River Gorge and
    family road trips to Shenandoah, preferring low‑cost, spontaneous getaways over meticulously planned vacations due to a limited teenage budget.
  culinary: Tisha Lancour favors comfort foods like fried chicken, biscuits with honey butter, and homemade apple crisp, enjoys cooking simple dishes such as cornbread with cheddar and a dash of jalapeño,
    and frequently treats friends to TikTok‑inspired snack hacks involving Nutella and pretzel sticks.
  core: Tisha Lancour is a talkative teen who thrives on stage and community, juggling a love for structured rehearsals and spontaneous TikTok trends while secretly hoarding extra candy for late‑night study
    sessions.
background:
  cultural: Raised in McKee, Kentucky, Tisha grew up in a close‑knit, predominantly white, Appalachian‑influenced community where family, church, and neighborhood gatherings are central. Local traditions
    of bluegrass music, oral storytelling, and strong neighborly support shaped her values. The rural setting fosters an appreciation for nature, modest living, and a respect for hard work, while her school
    and community emphasize education, responsibility, and communal involvement.
