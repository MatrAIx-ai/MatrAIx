personas:
  professional: Ethan Braithwaite is a budding young architect in preschool, constructing intricate block towers with meticulous order and early teamwork skills, while they compassionately share building
    materials with classmates.
  sports: Ethan Braithwaite plays organized Tots Soccer with the Little Lions club, thriving on the predictable schedule of practices and matches, but gets uneasy when new drills are introduced, and they
    cheerfully encourage teammates.
  arts: Ethan Braithwaite delights in coloring pages of animals while humming Raffi's Baby Beluga; they often blend crayons on paper and occasionally sneak a drawing onto the fridge as a quiet act of self-expression.
  travel: Ethan Braithwaite enjoys family road trips to the nearby state fair and the Kalahari Resort, preferring well-planned itineraries with frequent rest stops; they become stressed when itineraries
    shift unexpectedly.
  culinary: Ethan Braithwaite prefers simple dishes like chicken nuggets, macaroni and cheese, and apple slices, they proudly create a perfect ketchup swirl, but they resist vegetables, leading to occasional
    mealtime battles.
  core: Ethan Braithwaite, a detail-oriented five-year-old with a caring heart and a tendency toward worry, navigates daily life through structured routines, easy-going sharing, and minor meltdowns, and
    they often seek reassurance from trusted adults.
background:
  cultural: 'Ethan was born and raised in Marion, a small town in Wayne County, New York. He lives in a white American family that participates in typical U.S. customs—celebrating Thanksgiving, Christmas,
