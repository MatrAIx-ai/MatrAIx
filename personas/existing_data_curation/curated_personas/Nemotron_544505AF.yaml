personas:
  professional: Kim Custodio, a 15‑year‑old high‑school sophomore in Frisco, Texas, channels a practical, detail‑oriented mindset into sketching original characters from favorite YA novels, aspiring to
    publish a graphic novel while navigating school assignments with a relaxed, flexible attitude toward deadlines.
  sports: Kim Custodio, a varsity soccer player at their high school, trains three times weekly, supports FC Dallas and the Dallas Cowboys during football season, and joins a local youth hiking club for
    weekend treks in the Texas Hill Country, balancing competitive play with a love for casual outdoor adventure.
  arts: Kim Custodio spends evenings drawing anime‑inspired figures from beloved teen novels, creates short, playful TikTok videos set to tracks by Ariana Grande and Olivia Rodrigo, and finds artistic inspiration
    in the vibrant street murals of Dallas while often humming Billie Eilish lyrics during sketching sessions.
  travel: Kim Custodio enjoys weekend road trips to the Texas Hill Country and family visits to Austin’s music festivals, dreams of exploring Broadway in New York City and the historic streets of Dublin,
    and prefers planning trips with a blend of spontaneous stops and a basic itinerary, always packing a sketchbook for on‑the‑go doodles.
  culinary: Kim Custodio loves quick, flavorful meals like chicken quesadillas with extra avocado, homemade mac and cheese, and pepperoni pizza, often snacks on spicy mango chips while drawing, yet frequently
    forgets to stay hydrated and relies on soda for late‑night energy during study sessions.
  core: Kim Custodio is a creative teen who blends soccer, sketching, and TikTok humor into a harmonious yet occasionally disorganized lifestyle, balances disciplined saving for art supplies with impulsive
    merch purchases, and has a habit of late‑night snack‑drawing sessions.
background:
  cultural: Kim grew up in the suburban community of Frisco, Texas, a predominantly white, middle‑class area known for its strong school system and family‑oriented lifestyle. Her family’s European ancestry
    (German and Irish roots) informs traditions like holiday gatherings and church attendance at a local Protestant congregation. Texan values of friendliness, community involvement, and a love of sports
    shape her social world, while the broader American pop culture—music, streaming platforms, and social media—plays a big role in her daily life. Community events, local festivals, and school activities
    provide a supportive backdrop for her cooperative and harmonious personality.
