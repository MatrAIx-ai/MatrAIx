  career_goals: Kim aims to pursue a career that blends her love for animals with her desire to help others. In the short term, she plans to maintain solid grades, volunteer at the local animal shelter,
    and take a summer course in animal care. Long‑term, she hopes to earn an associate’s degree in veterinary technology or a bachelor’s in education, giving her the option to work as a veterinary technician
    or become a middle‑school teacher. She values a stable, structured profession but also wants the flexibility to engage with the community and keep her schedule adaptable.
