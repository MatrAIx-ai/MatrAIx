personas:
  professional: Adam Naro is an aspiring office manager who leverages his strong supervisory instincts, Excel and PowerBI expertise, and a creative flair to streamline processes at his college job, while
    eyeing a future role running the administration of a local museum, where they can merge efficiency with artistic culture.
  sports: Adam Naro is a devoted fan of the Alabama Crimson Tide football program and follows the Birmingham Barons baseball games, while personally jogging along the Alabama River Trail, weightlifting
    at Nick’s Gym, and playing intramural basketball on weekends, balancing team spirit with personal fitness goals.
  arts: Adam Naro immerses themselves in Montgomery’s art scene, frequenting the Montgomery Museum of Fine Arts to study works by contemporary photographer Cindy Sherman and street artist Shepard Fairey,
    while sketching urban landscapes with a charcoal set and curating a growing collection of vintage Royal typewriters.
  travel: Adam Naro loves weekend road trips to New Orleans for jazz, Charleston for historic tours, and Asheville’s mountain art festivals, and they dream of a spring pilgrimage to Berlin’s International
    Art Biennale and a summer culinary tour of Kyoto’s ramen houses, budget‑conscious yet adventure‑driven.
  culinary: Adam Naro enjoys Southern staples like smoked brisket seasoned with paprika and brown sugar, but they also experiment with Korean bibimbap, homemade sourdough starter bread, and spicy ramen,
    often sourcing fresh herbs like cilantro and sumac while honing a moderately skilled home‑cooking repertoire.
  core: Adam Naro is a 20‑year‑old business student whose relentless drive for administrative excellence intertwines with a restless artistic curiosity, leading to occasional overspending, anxiety‑fueled
    over‑thinking, and a passionate pursuit of Southern comfort foods and creative expression.
background:
  cultural: Adam grew up in Montgomery, Alabama, immersed in Southern culture marked by hospitality, community events, and a deep awareness of the city’s civil‑rights history. His family’s middle‑class
    upbringing emphasized modest values, Southern cuisine such as barbecue and fried chicken, and high school football traditions, while also encouraging education and curiosity. Exposure to local art festivals,
    university lectures, and historic sites gave him a blend of traditional Southern roots and a modern, open‑minded perspective. He identifies with the regional accent and customs but also seeks experiences
    beyond the conventional Southern narrative.
