  hobbies: '[''Art gallery visits'', ''Sketching'', ''Photography'', ''Reading (fiction and non-fiction)'', ''Indie music concerts'', ''Strategy video gaming'', ''DIY home projects'', ''Learning 3D modeling
    (Blender)'', ''Debate club'', ''Jogging'', ''Weightlifting'', ''Experimental cooking'', ''Collecting vintage typewriters'', ''Graphic design for social media'', ''Traveling to historic sites'']'
  career_goals: Adam aims to complete his bachelor's degree in Business Administration within the next two years, earn a Certified Administrative Professional (CAP) credential, and move from first‑line
    supervisor to Office Manager and eventually Operations Director. He also hopes to combine his passion for the arts by managing administrative functions for a local museum or cultural organization, and
    eventually launch his own consultancy focused on office efficiency and creative workplace environments. He is driven to achieve rapid promotions, gain recognition as a top performer, and develop strategies
    for managing stress and maintaining work‑life balance.
