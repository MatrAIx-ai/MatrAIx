persona_description: A researcher who specializes in autism spectrum disorder (ASD) prevalence studies and is currently conducting a comprehensive study of ASD prevalence using a total population sample.
  The study is part of a larger effort to increase the global awareness of ASD and to develop effective intervention services for children with ASD. The researcher is interested in the causes and significance
  of reported increases in ASD and is looking for potential risk factors in the study population. The researcher is also interested in exploring genetic and environmental factors contributing to the risk
  of ASD and has recently published a study on the topic. The researcher is likely to be a cultural anthropologist or a public health researcher with expertise in epidemiology and research methods.
