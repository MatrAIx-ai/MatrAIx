personas:
  professional: Raul Arias, a meticulous young builder who follows LEGO instructions like a tiny engineer, turning each set into functional bridges or vehicles that satisfy their love for orderly step‑by‑step
    processes, and who sees each construction as a mini project that reinforces their preference for routine and practicality.
  sports: Raul Arias, an eager participant in the Little Tigers youth soccer club who cheers for the City Falcons on weekends, enjoys sprinting across the playground's open field and practicing balance
    on low beams, and prefers structured, predictable drills over chaotic free‑play games, all while feeling most comfortable when the activity follows a familiar routine that matches their need for order.
  arts: Raul Arias, a budding artist who spends afternoons drawing llamas and mountain scenes with crayons, cherishes the soothing folk melodies of the local band Sunny Strings, and immerses themselves
    in picture books by Eric Carle, allowing their quiet imagination to flourish within the safe borders of familiar stories.
  travel: Raul Arias, a curious explorer who has collected rocks from the nearby Pine Ridge Park, has admired the city zoo's giraffes, dreams of standing at the base of a towering snow‑capped mountain in
    a faraway land, and prefers trips that follow a familiar itinerary with plenty of time for solitary nature walks and labeled specimen jars, ensuring their sense of order is maintained throughout the
    journey.
  culinary: Raul Arias, an eager kitchen helper who watches their parents simmer quinoa soup, enjoys stirring the pot, prefers the simple flavors of roasted sweet potatoes, crunchy carrot sticks, and sliced
    apples, and meticulously arranges their lunchbox snacks into labeled compartments.
  core: Raul Arias, a quiet, routine‑loving six‑year‑old who builds LEGO bridges, saves coins in a piggy bank, monitors their mild sneezes, scores goals with the Little Tigers, sketches llamas to gentle
    folk tunes, dreams of mountain hikes, and organizes snacks with meticulous care, while occasionally indulging in a candy bar.
background:
  cultural: Raul’s family is of Bolivian descent, and the household blends Andean traditions with life in the Pacific Northwest. Spanish is spoken at home alongside English, giving him bilingual exposure.
    The family celebrates Bolivian holidays such as Carnaval de Oruro and Día de los Muertos with traditional foods like salteñas, humintas, and api, and they enjoy listening to Andean instruments such
    as the charango and quena. Storytelling about life in the Andes and occasional visits to a local Bolivian community center keep cultural ties strong. Living in Lake Oswego, he also experiences Oregon’s
    outdoor culture—frequent park visits, nature hikes, and an appreciation for the region’s rainy, temperate climate—creating a hybrid cultural identity.
attributes:
  skills: '["Reading simple sentences", "Writing his name", "Counting to 100 and basic addition", "Fine‑motor coordination (coloring, cutting, building with LEGO)", "Following daily routines independently",
    "Basic digital literacy with educational apps", "Cooperative sharing during crafts"]'
  hobbies: '["Building LEGO sets", "Drawing landscapes and animals", "Reading nature‑focused picture books", "Collecting and labeling rocks, pine cones, leaves", "Exploring local parks and trails", "Listening
    to traditional Bolivian music", "Helping prepare family meals (e.g., quinoa soup)"]'
  career_goals: Raul often talks about growing up to work with things that have clear steps and tangible results. He says he would like to become a builder or engineer who designs playgrounds or structures
    that other kids can enjoy, because he likes planning, measuring, and seeing a project come together. He also mentions an interest in becoming a park ranger who takes care of the trails in the nearby
    forest, appreciating the quiet, orderly nature of that role. In his imagination, these careers allow him to use his love of routine, practical problem‑solving, and solitary focus while still helping
    others in a stable, organized environment.
