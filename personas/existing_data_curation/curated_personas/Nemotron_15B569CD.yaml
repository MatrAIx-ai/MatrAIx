personas:
  professional: Fred Costa, a 44-year-old community pastor and theological counselor, blends their artistic imagination with narrative-driven counseling, crafts sermons that weave philosophy and abstract
    visual metaphors, and leads interfaith workshops with a relaxed, improvisational style that embraces spontaneity over rigid scheduling.
  sports: Fred Costa enjoys weekend hikes with the Midwest Trailblazers hiking club, follows the Kansas City Chiefs for football, cheers for the Kansas City Royals in baseball, and occasionally joins a
    local pick-up basketball game at the community center when they crave a team sport.
  arts: Fred Costa, an abstract painter inspired by Hilma af Klint and Jackson Pollock, writes reflective poetry, plays acoustic guitar at worship services and local coffee-house open-mics, and regularly
    attends exhibitions at the Nelson-Atkins Museum of Art and performances by the Kansas City Jazz Orchestra, where their love for improvisation fuels their creative process.
  travel: Fred Costa favors contemplative road trips through the Missouri Ozarks, has explored Iceland's geothermal landscapes for inspiration, dreams of a pilgrimage to the ancient temples of Greece, and
    often returns to Wichita's historic jazz cafes when traveling within the Midwest, when they seek musical restoration.
  culinary: Fred Costa delights in experimenting with seasonal dishes like roasted beet and goat-cheese salad, wild mushroom risotto, and apricot-glazed pork, skillfully balances a home kitchen stocked
    with fresh herbs, locally sourced honey, and occasionally dabbles in crafting sourdough bread on weekends, when they savor the meditative rhythm of kneading.
  core: Fred Costa is a creatively inclined pastor who fuses art, philosophy, and flexible spontaneity into ministry, while they juggle modest, impact-focused finances, permissive health habits, modest
    athletic pursuits, and a penchant for adventurous travel and experimental cooking.
background:
  cultural: Fred grew up in the Midwestern suburbs of Kansas City, Missouri, within a white, predominantly European‑American family with roots in German and Irish ancestry. Raised in a mainline Protestant
    (Methodist) church, he absorbed the region’s values of community, hospitality, and modest self‑reliance while being exposed to the city’s rich cultural tapestry, including jazz, barbecue traditions,
    and a vibrant independent arts scene. This blend of modest Midwestern upbringing and exposure to diverse artistic influences informs his inclusive, curiosity‑driven approach to ministry and his appreciation
    for both tradition and innovation.
attributes:
  skills: '["Pastoral counseling", "Homiletic storytelling", "Community outreach", "Interfaith dialogue", "Creative writing", "Music ministry (acoustic guitar)", "Visual arts design for worship", "Public
    speaking", "Leadership and volunteer coordination", "Flexible event planning"]'
  hobbies: '["Painting (abstract spiritual themes)", "Acoustic guitar composition and performance", "Poetry and reflective writing", "Reading philosophy, mythology, and contemporary literature", "Visiting
    art galleries, independent theaters, and live music venues", "Hiking and nature photography", "Meditation and mindfulness practice", "Volunteering at community food banks", "Experimenting with new recipes"]'
  career_goals: Fred aims to broaden the reach of his ministry by establishing an arts-centered community space that hosts workshops, concerts, and interfaith discussions, fostering creative spiritual exploration.
    He plans to pursue a bachelor’s and eventually a master’s degree in theology to deepen his scholarly foundation, and to author a book of reflective essays that blend spirituality with artistic insight.
    Additionally, he hopes to launch a podcast that interviews local artists and thinkers, and to develop a regional youth program that uses music and visual art as tools for personal growth and social
    engagement.
