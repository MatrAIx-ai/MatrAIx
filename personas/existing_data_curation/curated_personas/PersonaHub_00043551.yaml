persona_description: A policy analyst who specializes in the analysis of immigration policies and their impact on illegal immigration, labor market, and economic welfare. They have experience working with
  empirical studies and data analysis to evaluate the effectiveness of border and interior enforcement in deterring illegal immigration and the potential unintended consequences of these policies. They
  are knowledgeable about the costs and benefits of border and interior enforcement, the impact of these policies on wages, employment, and labor market outcomes, and the potential for increased informal
  sector employment and tax evasion. They are also familiar with the trade-offs between border and interior enforcement and the potential for additional interior enforcement to increase informal sector
  employment and riskier crossing conditions.
