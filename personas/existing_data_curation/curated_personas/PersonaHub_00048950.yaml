persona_description: A microbiologist and bioengineer who specializes in the study of cellulose digestion in large herbivores, particularly in the rumen and hindgut. They have experience working with anaerobic
  fungi and have successfully isolated and cultured them in yeast. They are also interested in the role of these fungi in the breakdown of lignocellulosic material and have developed strategies for working
  with them. They have published research on the use of yeast and anaerobic fungi in the digestion of cellulose and have successfully isolated and cultured them in yeast. They are known for their expertise
  in the field and have received recognition for their research.
