persona_description: A member of the Council of the Great City Schools, an organization dedicated to improving urban public schools. The persona is interested in closing the achievement gap between minority
  students and their white counterparts and is actively involved in advocating for comprehensive reading programs, increasingly rigorous course selection, and data-driven approaches to targeted student
  needs. The persona is also aware of the disparities in performance between racial groups and is committed to expanding the focus on K-12 achievement to include early childhood education. The persona is
  knowledgeable about the role of soft accountability in maintaining excellence and raising standards in underperforming schools. Additionally, the persona is interested in teacher quality and the importance
  of accountability in improving student achievement. The persona is likely to be involved in workshops and discussions at the Council of the Great City Schools fall conference and is passionate about the
  mission of improving urban public schools.
