  career_goals: June aims to advance into a senior office manager or supervisory administrative role that offers a stable, predictable routine and minimal exposure to noisy, high‑stress environments. She
    is interested in obtaining a Microsoft Office Specialist certification and exploring remote virtual‑assistant opportunities that would allow her to work from the comfort of her home while continuing
    to support an organization’s day‑to‑day operations. Long‑term, she hopes to mentor newer office staff, sharing her practical expertise and fostering a calm, supportive workplace culture.
