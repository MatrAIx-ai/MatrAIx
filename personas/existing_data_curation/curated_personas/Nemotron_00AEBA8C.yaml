  career_goals: Bruno aims to triple his company's revenue within five years by expanding into Mexican and broader Latin American markets, positioning the firm as a regional leader in sustainable technology
    solutions. He wants to embed a culture of agile innovation that balances curiosity with practical execution, and to launch a mentorship program for emerging Mexican‑American entrepreneurs. Long‑term,
    he envisions establishing a family foundation that funds scholarships for arts and humanities students in underserved communities, while also securing a smooth succession plan that leaves the company
    in capable hands.
