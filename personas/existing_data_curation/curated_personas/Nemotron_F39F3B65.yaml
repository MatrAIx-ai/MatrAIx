    under production pressure'', ''Adaptable workflow planning'']'
  hobbies: '[''Sketching with charcoal'', ''Urban photography'', ''Listening to jazz, blues, and hip‑hop'', ''Reading science fiction'', ''Strategy video gaming'', ''Weightlifting and gym workouts'', ''DIY
    woodworking projects'', ''Attending local art exhibitions'', ''Solo nature walks along the Red River trail'', ''Small‑group basketball pickup games'']'
  career_goals: Shawn aims to advance from his current blending role to a shift supervisor position within the next three years, leveraging his strong work ethic and competitive drive. He plans to obtain
    a OSHA 30‑hour certification and become a Certified Production Technician to solidify his safety and technical credentials. Concurrently, he intends to enroll part‑time at Northwest Louisiana Technical
    College to earn an associate degree in Industrial Technology, with the long‑term goal of transitioning into process engineering or research and development for a consumer‑goods or automotive‑finishing
    company where he can blend his technical expertise with his appreciation for aesthetics. Shawn also aspires to mentor younger workers, attend industry conferences such as the Society of Manufacturing
    Engineers (SME) Expo, and eventually lead a small team focused on innovative product formulations.
