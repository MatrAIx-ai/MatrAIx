personas:
  professional: Shawn Johnson is a 19‑year‑old industrial blending operator at a Shreveport chemical plant, adept at running ball mills, attritors, and high‑speed mixers, meticulously following OSHA safety
    protocols while leveraging a competitive drive to exceed production metrics and eyeing a shift‑supervisor role within three years.
  sports: Shawn Johnson frequents a neighborhood gym for weightlifting, joins pickup basketball games in the evenings, follows the New Orleans Pelicans and the Shreveport Mudbugs, and treats strategic video
    gaming like Civilization VI as a mental sport that satisfies a competitive streak.
  arts: Shawn Johnson spends downtime sketching Shreveport’s industrial skyline in charcoal, documenting abandoned factories through photography, and curating a listening rotation of Dr. John, B.B. King,
    The Revivalists and contemporary Louisiana hip‑hop, all of which fuel a quiet but relentless creative curiosity.
  travel: Shawn Johnson has explored the historic French Quarter of New Orleans, the live‑music streets of Austin, Texas, and the desert vistas of Big Bend National Park, and now dreams of trekking the
    ancient alleyways of Kyoto and the bustling souks of Marrakech for fresh visual inspiration.
  culinary: Shawn Johnson, a modest home cook, enjoys experimenting with Cajun staples such as shrimp étouffée, blackened catfish, and gumbo, often seasoning with smoked paprika and fresh okra while pairing
    the dishes with strong black coffee and the occasional craft beer.
  core: Shawn Johnson is a fiercely curious, solitary industrial technician who balances a competitive work ethic with a quiet devotion to art, fitness, and thoughtful financial stewardship.
background:
  cultural: Shawn grew up as an African‑American in Shreveport, Louisiana, where Southern traditions and Black cultural heritage intersect. His family’s Sunday church gatherings and community barbecues
    fostered a strong sense of fellowship, and the vibrant local music scene—ranging from blues and zydeco to modern hip‑hop—shaped his auditory tastes. The rich culinary flavors of gumbo, jambalaya, and
    fried catfish are staples of his upbringing, reflecting both Creole influences and Southern comfort food. He draws pride from the resilience of his neighborhood, which has historically navigated both
    economic challenges and systemic inequities while maintaining a tight‑knit support network. This cultural backdrop instilled in him a respect for hard work, a competitive spirit, and a healthy skepticism
    toward external intentions. At the same time, the artistic legacy of Black creators in Louisiana—painters, musicians, and storytellers—feeds his appreciation for new ideas and unconventional thinking,
    motivating him to blend his technical career with creative pursuits.
attributes:
