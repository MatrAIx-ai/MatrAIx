  hobbies: '[''Abstract Watercolor Painting'', ''Digital Illustration'', ''Landscape Photography'', ''Reading Speculative Fiction'', ''Philosophy'', ''Hiking'', ''Birdwatching'', ''Vegetable Gardening'',
    ''Chess'', ''Mentoring High‑School Students'']'
  career_goals: Mark aims to channel his business acumen and creative passions into a part-time consulting practice that helps local entrepreneurs in Mahopac and the broader Putnam County area develop sustainable
    growth strategies. He also aspires to author a book that explores the intersection of entrepreneurship and artistic thinking, and to establish a small community art space that offers workshops and exhibitions
    for residents of all ages. In the longer term, he hopes to serve on the board of the local historical society, leveraging his organizational skills to preserve the region’s cultural heritage.
