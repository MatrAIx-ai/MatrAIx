    for flexibility'', ''Bridge and mahjong'', ''Volunteering at cultural festivals'']'
  career_goals: Although retired from formal employment, Marilou aims to stay actively engaged by mentoring aspiring entrepreneurs in the local Vietnamese community, helping them turn ideas into viable
    ventures. She hopes to compile a community cookbook that celebrates traditional recipes alongside modern twists, and to volunteer as a financial literacy trainer at the senior center. A personal ambition
    is to travel back to Vietnam for a cultural reconnection tour, while continuing to expand her digital skill set to keep up with evolving technology.
