personas:
  professional: Marilou Khang, a retired business strategist, channels decades of budgeting and event coordination expertise into mentoring budding entrepreneurs in her community, using spreadsheets, email
    newsletters, and social-media outreach to turn ideas into viable ventures while coordinating cultural festival booths with a practical-yet-curious mindset.
  sports: Marilou Khang starts each day with a brisk walk along the oceanside beach, participates in the local Oceanside Beach Walking Club, attends weekly yoga sessions for flexibility, cheers for the
    San Diego Padres during baseball season, and joins community pickleball matches each spring, all while keeping a relaxed pace that matches their flexible lifestyle.
  arts: Marilou Khang delights in devouring historical fiction by Ken Follett and Hilary Mantel, shares lively discussions at her book club, tunes into Yo-Yo Ma's cello performances and Diana Krall's jazz
    vocals, and volunteers at the annual cultural festival to showcase traditional dance, all reflecting a competitive yet appreciative spirit toward artistic expression.
  travel: Marilou Khang plans her trips with a mix of spontaneity and a modest budget, having already explored the historic temples of Kyoto, the sun-kissed cliffs of the Amalfi Coast, and a weekend getaway
    to Santa Barbara, she now dreams of returning to the land of her ancestors to roam its historic capital and tranquil lake district, balancing wanderlust with the practical need to coordinate volunteer
    commitments back home.
  culinary: Marilou Khang, an advanced home chef, delights in simmering fragrant broth-based noodle soups with star anise, crafting delicate rice-paper rolls layered with fresh herbs from her garden, and
    caramelizing fish with lemongrass and soy glaze, while occasionally adding avocado or feta for a fusion twist, and she believes a well-balanced plate always includes cilantro, basil, and a splash of
    lime.
  core: Marilou Khang blends practical budgeting with curious culinary experiments, mentors with a competitive edge, embraces community gatherings, and navigates life's routines with a relaxed, occasionally
    disorganized, yet resilient spirit.
background:
  cultural: Marilou is a first‑generation Vietnamese‑American whose parents immigrated to California in the 1960s. She grew up in a bicultural household, speaking Vietnamese at home while attending American
    schools, which gave her a deep appreciation for both Southeast Asian traditions and Californian coastal lifestyle. She celebrates Tet and the Mid‑Autumn Festival, maintains close ties to the Vietnamese
    community in San Diego County, and incorporates Vietnamese music, art, and culinary practices into her daily life. At the same time, she embraces local customs—such as surfing culture and community
    beach clean‑ups—reflecting a harmonious blend of her heritage and adopted environment.
