  career_goals: Jose aims to become a certified journeyman carpenter within the next three years, earning his California state apprenticeship credentials and OSHA certification. He hopes to specialize in
    eco‑friendly construction, eventually leading a team that builds energy‑efficient homes in the Inland Empire. In the longer term, he envisions opening a small custom‑furniture workshop that blends modern
    design with traditional Mexican woodworking motifs, providing stable work for himself and his family while preserving cultural craftsmanship.
