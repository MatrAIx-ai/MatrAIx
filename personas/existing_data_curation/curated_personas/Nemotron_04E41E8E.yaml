personas:
  professional: Jose Delahoz is an 18‑year‑old aspiring carpenter who blends hands‑on apprenticeship experience with a curiosity for sustainable materials, balancing meticulous framing skills and a practical
    eye for budget while confidently asserting ideas during site meetings, all shaped by a strong sense of community collaboration learned at home, and they bring reliability and flexibility to every project.
  sports: Jose Delahoz is a weekend skateboarder at the Highland Skate Plaza, a regular participant in local pickup soccer games with the Inland Empire United club, and a devoted fan of the LA Galaxy and
    Los Angeles Lakers, balancing love of outdoor hikes in the San Bernardino Mountains with a modest fitness routine that reflects their moderate social energy.
  arts: Jose Delahoz channels his aesthetic sensibilities into custom wood carvings inspired by the intricate motifs of Frida Kahlo’s personal artifacts, while regularly tuning in to DIY shows like This
    Old House and listening to regional Mexican bands such as Los Tigres del Norte and Intocable, and they weave those cultural and creative threads into every project.
  travel: Jose Delahoz prefers low‑cost road trips that combine adventure with family visits, having already explored the historic streets of Ensenada and the towering redwoods of Redwood National Park,
    while dreaming of a future hiking pilgrimage to Patagonia once financial stability allows, and they plan each journey with a handcrafted itinerary and a careful budget.
  culinary: Jose Delahoz enjoys cooking family recipes like chicken tamales, pozole, and elote, confidently handling masa, dried chilies, and fresh corn on the cob, while their skill level ranges from confident
    home‑cooking to occasional experimentation with fusion dishes that blend smoked oak flavors into traditional sauces, and they love sharing meals with grandparents during Dia de los Muertos celebrations.
  core: Energetic yet introspective, Jose Delahoz is an 18‑year‑old aspiring carpenter who balances a love of sustainable woodcraft with a restless mind that fuels both creative projects and persistent
    worry.
background:
  cultural: Jose grew up in a Mexican‑American household in Highland, where Spanish is spoken at home and family traditions are celebrated. He takes pride in his heritage, participating in Dia de los Muertos
    altars and cooking dishes like tamales with his grandparents. The strong sense of familismo and community in his neighborhood shaped his collaborative work style, while Mexican artisan traditions—such
    as intricate wood carving—influence his aesthetic choices in carpentry. Bilingual and culturally rooted, he balances the values of hard work and respect for elders with the modern, diverse environment
    of Southern California.
