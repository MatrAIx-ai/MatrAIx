  career_goals: Although retired from formal employment, Jodiann aims to deepen her involvement in the Seattle arts community by volunteering as a docent at the Seattle Art Museum and leading art appreciation
    sessions for seniors. She aspires to document and share local histories through oral interviews, eventually compiling a memoir of her life in Seattle. Jodiann also seeks to mentor younger volunteers,
    continue learning through advanced art classes, and maintain her health through regular yoga and mindfulness practices.
