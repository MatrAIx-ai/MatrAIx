personas:
  professional: Jodiann Psalmond, a retired community organizer turned senior art docent, blends meticulous planning with a warm, empathetic listening style to lead art appreciation workshops at the Seattle
    Art Museum, leveraging her watercolor expertise and knack for connecting strangers into supportive creative circles.
  sports: Jodiann Psalmond, an avid fan of the Seattle Seahawks and Seattle Sounders FC, participates in a senior walking club at Green Lake during spring, practices low‑impact tai chi in the summer, and
    joins the local senior yoga class year‑round to stay active.
  arts: Jodiann Psalmond immerses herself in Seattle’s vibrant arts scene, attending jazz nights featuring the Charles Mingus tribute band, studying the watercolors of Wyland, knitting while listening to
    Joni Mitchell's Blue, and eagerly awaiting the annual Pacific Northwest arts festival where she showcases her own acrylic landscapes of Mount Rainier.
  travel: Jodiann Psalmond enjoys thoughtfully planned trips, having visited the San Juan Islands, Portland’s historic districts, and Vancouver’s Stanley Park, while dreaming of a slow‑paced pilgrimage
    to Kyoto’s Zen gardens to study traditional Japanese brushwork.
  culinary: Jodiann Psalmond favors Pacific Northwest flavors, often cooking cedar‑plank salmon with dill and lemon, whipping up a classic Dungeness crab chowder, and baking blueberry crumble using fresh
    berries from her garden, though she sometimes forgets to refrigerate leftovers, leading to occasional food spoilage.
  core: Jodiann Psalmond is a spirited octogenarian whose curiosity fuels endless community art projects, balanced by a tendency to worry over tiny details and an occasional forgetfulness that adds charm
    to her daily life.
background:
  cultural: Jodiann grew up as a white American in the Pacific Northwest during the post‑World War II era, a time marked by rapid urban growth and a flourishing regional arts scene. The area's natural beauty
    and progressive community values shaped her appreciation for nature-inspired art and collective well‑being. Influenced by 1960s folk and rock movements, she developed an open‑minded curiosity toward
    new ideas and unconventional thinking. Seattle's strong emphasis on community involvement and volunteerism guided her lifelong commitment to helping others, while her upbringing amidst a predominantly
    white middle‑class environment fostered an appreciation for local traditions and historic preservation.
