  hobbies: '[''Soccer (youth league)'', ''Baseball (little league)'', ''Robotics club (Scratch and Lego Mindstorms)'', ''LEGO building'', ''Strategic video gaming (e.g., Minecraft, Mario Kart)'', ''Chess'',
    ''Reading science-fiction and popular science books'', ''Helping with family farm chores'', ''Participating in community fairs and 4-H projects'']'
  career_goals: Steve envisions a future where he can combine his love for hands-on problem solving with technology. He aspires to become a mechanical engineer who designs sustainable farm equipment that
    helps Midwest growers work more efficiently and responsibly. He also feels a strong connection to the animals on his family's farm and is intrigued by the idea of becoming a veterinary technician. In
    the short term, he aims to lead his school's robotics and science clubs, win regional science-fair awards, and earn a scholarship to a STEM-focused high school program. His competitive nature drives
    him to set high academic and extracurricular goals, while his practical side seeks a stable, community-oriented career.
