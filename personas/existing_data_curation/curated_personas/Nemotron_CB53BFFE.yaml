personas:
  professional: Jontue Johnson, a future toy designer who is already fascinated by arranging building blocks into precise patterns while occasionally scattering them for spontaneous creativity, combines
    a preference for predictable structure with a flexible play style that hints at an eventual career in product design.
  sports: Jontue Johnson, a member of the Little Explorers Playground Club, enjoys structured toddler gym classes at the community center and unstructured sandbox play, often clapping quietly for the hometown
    River City Cubs during family viewing parties.
  arts: Jontue Johnson, an enthusiastic listener of Sesame Street’s catchy tunes and the calming acoustic guitar lullabies of Andy Gram, spends solitary afternoons drawing simple shapes with crayons and
    occasionally joins family sing‑alongs to Disney’s ‘Let It Go’ and watches the vivid brushstrokes of Bob Ross on a tablet.
  travel: Jontue Johnson, a curious infant explorer, loves short family road trips to the nearby lake where they splash in a portable wading pool, has visited the San Diego Zoo, and dreams of a future adventure
    to the Grand Canyon, preferring predictable itineraries with familiar caregivers while occasionally seeking new sensory experiences.
  culinary: Jontue Johnson, a selective eater, favors the smooth taste of sweet potato puree and banana mash, regularly asks for oatmeal drizzled with honey, enjoys smearing avocado on toast, yet sometimes
    splatters peas on the high‑chair tray in a burst of exploratory messiness.
  core: Jontue Johnson blends a love for tidy routines with spontaneous messes, hoards shiny coins while dropping them for toys, manages infant eczema with diligent care, delights in solitary block towers
    and splashy lake visits, yet often demands the same bedtime story twice.
background:
  cultural: Jontue is raised in a white, middle‑class family in Marysville, Washington. His upbringing reflects the Pacific Northwest’s emphasis on outdoor activities, community safety, and structured family
    routines. He experiences typical American cultural traditions such as Thanksgiving and Fourth of July celebrations, and his environment values politeness, independence, and respect for personal space.
