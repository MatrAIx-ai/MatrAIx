personas:
  professional: Elizabeth Santos, a veteran K‑12 educator with deep expertise in curriculum development, differentiated instruction, and data‑driven assessment, leverages a pragmatic curiosity to mentor
    peers, integrate educational technology, and champion collaborative teaching while balancing meticulous organization with adaptable creativity; they aspire to become a Curriculum Coordinator and are
    currently drafting a district‑wide mentorship program for novice teachers.
  sports: Elizabeth Santos enjoys weekend hikes on Tallgrass Prairie, practices yoga thrice weekly for flexibility, roots for the Oklahoma City Thunder, Kansas City Chiefs, and Texas Rangers, and participates
    in a local walking club that meets at the community park, balancing a love for low‑impact exercise with occasional lapses in gym attendance due to grading deadlines; they also follow the NCAA women’s
    basketball season closely.
  arts: Elizabeth Santos immerses herself in historical fiction and biographies, regularly discussing works by Hilary Mantel and David McCullough at her book club, attends monthly performances at the nearby
    Regional Theatre featuring plays like "A Streetcar Named Desire," and finds inspiration in the music of Dolly Parton and the paintings of Winslow Homer, letting these artistic threads weave into their
    teaching philosophy, which they draw upon when designing curriculum units.
  travel: Elizabeth Santos prefers thoughtfully planned road trips that blend cultural immersion with relaxation, having driven the Natchez Trace Parkway to explore Natchez’s antebellum homes, spent a weekend
    in Charleston, South Carolina savoring low‑country cuisine, and dreaming of a spring visit to Savannah’s historic squares, while balancing travel costs against school‑year financial constraints; they
    also maintain a spreadsheet of travel budgets and itineraries.
  culinary: Elizabeth Santos loves baking classic Southern desserts such as pecan pie, peach cobbler, and red‑velvet cake, often incorporating native Oklahoma ingredients like prairie turnip greens into
    experimental side dishes, and while their cooking skill hovers between confident baker and occasional over‑mixing mishaps, they proudly serve these creations at family gatherings and the community library’s
    book‑release events.
  core: Elizabeth Santos blends a teacher’s disciplined organization with a storyteller’s curiosity, navigating school leadership ambitions, gardening passions, and a penchant for Southern desserts while
    they occasionally surrender to impulse book buys and missed dental appointments.
background:
  cultural: Elizabeth was raised in a white, Midwestern family that settled in Oklahoma generations ago, blending values of self‑reliance, community participation, and respect for tradition. Her upbringing
    emphasized church involvement, seasonal festivals, and a strong sense of neighborhood solidarity. While she honors these roots, she also embraces new ideas, often incorporating contemporary educational
    practices and cultural diversity into her teaching. Her cultural identity reflects a balance of conventional small‑town values and an openness to progressive, inclusive perspectives.
attributes:
  skills: '["Curriculum Development", "Differentiated Instruction", "Classroom Management", "Educational Technology Integration", "Data‑Driven Assessment Design", "Collaborative Team Teaching", "Teacher
    Mentorship", "Parent and Community Communication", "Professional Development Facilitation", "Extracurricular Program Coordination"]'
  hobbies: '["Historical Fiction Reading", "Gardening", "Book Club Participation", "Library Volunteering", "Yoga", "Hiking", "Baking Southern Desserts"]'
  career_goals: Elizabeth aims to transition into a leadership role within her school district, such as Curriculum Coordinator or Assistant Principal, where she can influence schoolwide instructional practices.
    She plans to pursue a master's degree in Educational Leadership within the next two years, with a focus on integrating technology and community resources into curricula. Additionally, she aspires to
    develop a district‑wide mentorship program for novice teachers and to author a guide on balancing traditional teaching strategies with innovative, student‑centered approaches.
