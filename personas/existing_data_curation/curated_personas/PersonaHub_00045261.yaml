persona_description: An audiologist who specializes in the assessment and treatment of hearing loss in individuals with HIV disease. They are aware of the unique challenges and symptoms associated with
  HIV and have experience using the auditory brainstem response (ABR) technology to monitor the effectiveness of antiretroviral drugs and to rule out retrocochlear pathology. They are knowledgeable about
  the communication disorders that are unique to children with HIV and have experience working with pediatric AIDS patients. They are passionate about improving the quality of life for individuals with
  HIV disease and have a deep understanding of the impact of antiretroviral therapy on the auditory system.
