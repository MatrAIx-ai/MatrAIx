  career_goals: Matthew aims to channel his curiosity and practical mindset into a career that blends technology with problem solving. He aspires to attend a top STEM-focused high school, earn a scholarship
    for robotics competitions, and eventually pursue a degree in software engineering or aerospace engineering. His long‑term ambition is to work on innovative projects—such as autonomous systems or space
    exploration technologies—that have tangible real‑world impact.
