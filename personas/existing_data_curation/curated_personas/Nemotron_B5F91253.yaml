  hobbies: '[''Reading non-fiction'', ''Chess'', ''Jogging'', ''Gardening'', ''DIY electronics'', ''Mentoring youth'', ''Attending small jazz performances'']'
  career_goals: Torrence aims to advance to senior partner within his firm, eventually establishing a boutique practice focused on emerging technology and intellectual property law. He plans to pursue an
    LLM in Technology Law to deepen his expertise and to take on leadership roles in the Connecticut Bar Association’s Technology Law Section. A core ambition is to mentor and sponsor younger Black attorneys
    and engineers, helping bridge the gap between STEM and legal professions. Long‑term, he envisions influencing state policy on data privacy and serving on a judicial panel that adjudicates complex tech
    disputes.
