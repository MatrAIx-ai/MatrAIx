  career_goals: At 69, Grata aims to transition her extensive casework into mentorship and consultancy. She plans to launch a boutique investigative agency focused on reopening cold cases and providing
    expert analysis to local law‑enforcement. Additionally, she aspires to mentor emerging detectives, publish a memoir that highlights unsolved Pittsburgh crimes, and spearhead a community‑safety initiative
    that combines her practical skills with her outgoing nature to foster neighborhood vigilance. Recognition by a statewide professional association for her contributions remains a long‑term ambition.
