personas:
  professional: Donna Brooks, a seasoned HR professional with three decades of expertise in employee relations, conflict mediation, and talent acquisition, channels their curiosity and love of art into
    innovative, art‑based training workshops that foster harmonious and flexible workplace cultures; they also mentor younger staff to cultivate empathy.
  sports: Donna Brooks enjoys seasonal hiking on the Wasatch Trail network and winter ski trips to Brighton, cheers for the Utah Jazz, and participates in the local Wasatch Hiking Club while occasionally
    joining gentle yoga classes at the community center to keep their joints supple.
  arts: Donna Brooks, an avid watercolor painter, regularly visits the Utah Museum of Contemporary Art and the Peery’s Egyptian Theater, draws inspiration from Georgia O’Keeffe and local Utah artist John
    Hedges, and attends folk concerts featuring Sufjan Stevens and Gillian Welch in downtown Ogden; they find that visual and musical experiences deepen their creative practice.
  travel: Donna Brooks prefers leisurely road trips that blend nature and culture; they have explored Yellowstone and the Grand Canyon, taken a spring cruise along the Columbia River, and are plotting a
    future pilgrimage to the Scottish Highlands to trace their pioneering ancestors.
  culinary: Donna Brooks delights in experimenting with herb‑infused dishes; they often prepare rosemary‑roasted chicken with garden‑fresh thyme, mint‑quinoa salads, and bake a warm apple cobbler using
    locally sourced apples and hand‑ground wheat flour.
  core: Donna Brooks, a 67‑year‑old HR veteran with a curious, art‑loving spirit, blends people‑first mentorship, flexible work advocacy, watercolor painting, Wasatch hiking, and a delightfully disorganized
    yet compassionate approach to life; they inspire colleagues with their unique blend of empathy and creativity.
background:
  cultural: Donna was raised in a Midwestern‑influenced family that settled in the Intermountain West, where community gatherings and an appreciation for the outdoors were integral to daily life. Growing
    up near Ogden, she absorbed a blend of pioneer heritage and contemporary cultural influences, participating in local festivals, supporting regional arts initiatives, and engaging with a diverse community
    of residents. While her upbringing emphasized modesty, cooperation, and service—values common in the area—her lifelong curiosity has led her to embrace a broad spectrum of cultural experiences, from
    traditional American folk art to modern visual media, fostering an inclusive and open‑minded worldview.
