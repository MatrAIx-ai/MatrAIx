  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Reading historical fiction'', ''Hiking in the Wasatch Mountains'', ''Attending local theater productions'', ''Cooking experimental dishes'',
    ''Gardening herbs and vegetables'', ''Volunteering at the county historical museum'']'
  career_goals: Approaching retirement, Donna aims to transition into a mentorship role where she can share her wealth of HR knowledge with emerging professionals. She aspires to champion flexible work
    arrangements and employee well‑being initiatives within her organization, and to develop a community‑focused arts program that integrates creative expression into employee engagement. Additionally,
    she hopes to author a guide on compassionate HR practices and continue volunteering as a consultant for local non‑profits, leveraging her experience to support inclusive workplace cultures.
