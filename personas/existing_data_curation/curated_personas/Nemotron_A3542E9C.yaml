  hobbies: '[''Building Lego sets'', ''Playing chess'', ''Reading adventure/science‑fiction books'', ''Participating in school robotics club'', ''Soccer games'', ''Hiking at Kennesaw Mountain'', ''Collecting
    and organizing baseball cards'']'
  career_goals: Steven dreams of a career that combines his love for structure, building, and problem solving. He imagines becoming a civil engineer or architect who designs safe, organized communities,
    or perhaps a robotics engineer who creates predictable, reliable machines. He also considers being a pilot, attracted by the regimented procedures and precision required. He aims to excel in school,
    especially in math and science, and hopes to join a robotics club and compete in local contests. He values a career that offers clear goals, measurable progress, and opportunities to lead well‑planned
    projects.
