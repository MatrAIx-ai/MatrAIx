personas:
  professional: Steven Harrison is a budding robotics hobbyist who applies their methodical Lego‑building skills and competitive chess mindset to program simple Arduino projects, consistently planning each
    build step‑by‑step and relishing the predictable outcomes.
  sports: Steven Harrison plays forward for the Kennesaw Youth Soccer Club, drills with the Atlanta United Academy’s junior program on Saturdays, and balances their love for structured team play with solo
    cardio runs on the Kennesaw Mountain trails, while proudly wearing a cap of the Atlanta Braves and tracking their own stats like a mini‑analyst.
  arts: Steven Harrison channels their love of storytelling into building elaborate LEGO dioramas inspired by the vivid worlds of Jules Verne, enjoys the orchestral scores of Hans Zimmer’s sci‑fi soundtracks,
    and eagerly watches the animated series 'Adventure Time' while arranging their collection of Marvel action figures on a meticulously labeled shelf.
  travel: Steven Harrison prefers meticulously planned weekend getaways, such as family hikes to Kennesaw Mountain followed by a structured visit to the Georgia Aquarium, while dreaming of a future organized
    road trip to Yellowstone National Park and a school‑sponsored exchange program in Japan that would let them explore Mt. Fuji’s trails with a checklist in hand.
  culinary: Steven Harrison enjoys cooking with precision, often assembling their own pepperoni pizza using measured slices of mozzarella, tomato sauce, and oregano, and they’ve mastered the exact timing
    for boiling spaghetti al dente, though they habitually leave a trail of Lego pieces on the kitchen counter after snack time.
  core: Steven Harrison is a 10‑year‑old who fuses competitive curiosity with a love for order, turning every Lego set, chess game, and soccer drill into a meticulously charted mission while occasionally
    letting a stray brick or snack crumb slip through their otherwise perfect routine.
background:
  cultural: Steven grows up in a middle‑class suburban household in Kennesaw, GA, within the broader cultural context of the American South. His family celebrates typical U.S. holidays, enjoys community
    events like local fairs, and participates in school and church activities that emphasize cooperation and courtesy. Southern influences show in his appreciation for outdoor activities, such as weekend
    hikes and community sports. He is exposed to a blend of modern media (video games, online coding tutorials) and traditional values like reliability, respect for routine, and a modest competitive spirit.
    His cultural environment encourages both independent pursuits and involvement in group activities, shaping his balanced social preferences.
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Reading comprehension'', ''Basic arithmetic'', ''Spatial reasoning (Lego building)'', ''Introductory coding (Scratch)'', ''Strategic thinking
