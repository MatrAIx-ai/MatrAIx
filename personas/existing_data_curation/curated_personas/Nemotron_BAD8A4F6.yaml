  hobbies: '[''Community volunteering (library storytime, PTA meetings)'', ''Organizing and attending book clubs'', ''Cooking and baking'', ''Gardening (vegetable and flower beds)'', ''Participating in
    local walking or soccer groups'', ''Crafting (knitting, scrapbooking)'', ''Attending church socials and community festivals'', ''Hiking and exploring Minnesota parks'', ''Photography of nature and community
    events'', ''Using social media to stay connected and organize events'']'
  career_goals: Harriet aims to re‑enter the workforce by leveraging her organizational talent and community experience. She plans to earn her GED and take courses in project management or nonprofit administration
    at the local community college. Her short‑term goal is to secure a role as an administrative assistant or program coordinator for a neighborhood nonprofit, where she can apply her scheduling, budgeting,
    and volunteer‑leadership skills. Long‑term, she aspires to become a director of a community center or launch a small home‑based venture, such as a catering service, that blends her love for cooking,
    event planning, and community building while providing financial stability for her family.
