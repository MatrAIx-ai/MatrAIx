  hobbies: '[''Hiking'', ''Mountain Biking'', ''Rock Climbing'', ''Gardening'', ''Cooking'', ''Reading Mystery Novels'', ''Yoga'', ''Volunteering at Food Bank'', ''Community Theater'', ''Live Music Events'',
    ''Photography'', ''Trail Mapping'']'
  career_goals: Hila aims to leverage her analytical acumen and collaborative mindset to assume a senior leadership role in operations research within a public‑sector or sustainability‑focused organization.
    Over the next five years, she plans to earn a Certified Analytics Professional (CAP) credential and complete a part‑time master’s program in Data Science or Operations Management. She envisions leading
    multidisciplinary teams to design data‑driven solutions for water‑resource management, renewable‑energy logistics, and healthcare efficiency in the Colorado region. Additionally, Hila aspires to establish
    a mentorship program for women entering STEM fields and to consult pro‑bono for local nonprofits, ensuring her technical expertise directly benefits her community.
