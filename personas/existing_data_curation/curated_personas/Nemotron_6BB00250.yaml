personas:
  professional: Cheryl Pestano, a 71‑year‑old veteran of hospital and long‑term care, combines four decades of patient advocacy, meticulous EHR documentation, and infection‑control expertise with a disciplined,
    organized approach to mentoring junior staff and leading community health outreach, channeling their structured mindset into a transition toward patient navigation and health‑fair coordination.
  sports: Cheryl Pestano enjoys low‑impact fitness through leading gentle exercise sessions at the local senior center and walking the trails of Belle Isle as part of the Belle Isle Seniors Walking Club,
    while they cheer on the Detroit Tigers in baseball season, support the Detroit Lions on football Sundays, and attend occasional Detroit Red Wings games for a winter social outing.
  arts: Cheryl Pestano finds artistic solace in listening to the soulful recordings of Ella Fitzgerald, Miles Davis, and B.B. King while knitting for the church outreach, and they unwind with historical
    fiction by authors such as Toni Morrison and Walter Mosley, regularly attending the Detroit Institute of Arts’ jazz evenings and community theatre productions of August Wilson’s plays.
  travel: Cheryl Pestano prefers meticulously planned, senior‑discount group tours that balance cultural enrichment with gentle leisure, having enjoyed trips to Mackinac Island’s Victorian charm and the
    jazz‑rich streets of New Orleans, while they dream of a relaxed cruise to the Mediterranean ports of Barcelona and Dubrovnik, and a future visit to the historic gardens of Kyoto.
  culinary: Cheryl Pestano, an adept home cook, blends garden‑fresh tomatoes and collard greens into soulful dishes like smoked‑turkey collard greens, gumbo seasoned with cayenne and okra, and sweet‑potato
    pie flavored with nutmeg, often pairing these meals with classic cornbread and a side of fried catfish for church outreach gatherings.
  core: Cheryl Pestano, a 71‑year‑old structured caregiver with a penchant for marathon knitting sessions and an unrelenting habit of double‑checking medication schedules, channels their compassionate heart
    and meticulous mind into nurturing both patients and community gardens while quietly battling seasonal anxiety.
background:
  cultural: Cheryl grew up in Detroit during the civil‑rights era, shaped by the city’s vibrant African‑American culture, gospel churches, and close‑knit neighborhoods. Her family traditions emphasize respect
    for elders, mutual aid, and a love of soulful music and cuisine. The Black church has been a cornerstone of her community involvement, offering both spiritual guidance and a platform for activism. These
    cultural roots have instilled in her a deep sense of resilience, communal responsibility, and pride in preserving African‑American heritage, which she weaves into her daily work, volunteer activities,
    and personal interests.
attributes:
  skills: '[''Patient advocacy'', ''Vital signs monitoring'', ''Electronic health records documentation'', ''Medical supply inventory management'', ''Infection‑control protocol adherence'', ''Scheduling
    and shift coordination'', ''Emotional support and crisis de‑escalation'', ''Mentoring and training junior staff'', ''Community health outreach'', ''Basic health education delivery'']'
  hobbies: '[''Gardening (vegetable and herb garden)'', ''Knitting and crochet for church outreach'', ''Reading historical fiction'', ''Listening to jazz and blues music'', ''Cooking traditional soul‑food
    recipes'', ''Walking in Belle Isle Park'', ''Participating in a senior book club'', ''Volunteering at a community senior center'', ''Puzzle solving (crosswords, sudoku)'']'
  career_goals: As she approaches retirement, Cheryl aims to transition from full‑time support work to a mentorship and volunteer role that leverages her expertise. She hopes to become a certified patient
    navigator, guiding seniors through medical appointments, insurance processes, and community resources. Cheryl also aspires to lead a local health‑fair committee that focuses on preventive care and chronic‑disease
    management for Detroit’s Black senior population, ensuring that her legacy includes improved health equity and a supportive network for future caregivers.
