persona_description: A historian who is interested in the history of Manchester, New Hampshire, particularly its economic, cultural, and historic center, Downtown Manchester. They are knowledgeable about
  the early layout of the neighborhood, the significant dates in its history, and the transformation of the mills into businesses, restaurants, art galleries, and educational spaces. They have a keen interest
  in the Amoskeag Falls, Merrimack River, and the mills that arose around them, and are interested in the history of the Amoskeag Manufacturing Company and the Southern New Hampshire University Arena. They
  are also interested in the impact of nature on the City and the influence of the natural environment on the layout of the neighborhood.
