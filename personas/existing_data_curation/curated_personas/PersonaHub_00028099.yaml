persona_description: An environmentalist who is passionate about the conservation and preservation of natural habitats, especially those that are in the process of being destroyed. This person is likely
  to be interested in the Mosi-oa-Tunya / Victoria Falls world heritage site, as the site represents a spectacular waterfall in a pristine natural setting that is under threat from development pressures.
  The person is likely to be knowledgeable about the ongoing geological process of the falls and the unique features of the site, such as the natural beauty of the riverine environment and the diversity
  of African megafauna. They are likely to be concerned about the potential impact of increasing visitor numbers and development pressures on the site, and are likely to be interested in the management
  effectiveness of the site, particularly in terms of ensuring that the natural values of the site are preserved and protected.
