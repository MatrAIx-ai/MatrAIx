  hobbies: '[''Watercolor painting'', ''Metal scrap sculpture'', ''Gardening'', ''Cooking Vietnamese cuisine'', ''Visiting art museums'', ''Attending community theater'', ''Crossword puzzles'', ''Nature
    walks'', ''Reading art history'', ''Volunteering at cultural festivals'']'
  career_goals: Seeking to deepen her technical credentials, Qui aims to earn a certified CNC operator credential and complete a GED or associate‑level industrial technology program at a community college.
    She aspires to transition into a supervisory role where she can formalize her mentorship of younger workers and influence process improvements. Long‑term, she hopes to combine her manufacturing background
    with her artistic curiosity by launching a small side business creating decorative metal art pieces from up‑cycled industrial scrap, and eventually teach a part‑time course on metalworking fundamentals
    at a local adult‑education center. Balancing ambition with wellbeing, she also intends to establish clearer boundaries to reduce work‑related stress and prioritize healthful routines.
