personas:
  professional: Qui Truong is a veteran metal fabricator and CNC machine operator who expertly reads technical drawings, leads small shift teams with methodical precision, mentors new assemblers, and injects
    artistic curiosity into process improvements, balancing assertive communication with cooperative problem‑solving.
  sports: Qui Truong stays fit by walking with the Prairie Walkers senior club on Oklahoma’s prairie trails, enjoys weekend hikes in Tallgrass Prairie, cheers for the Oklahoma City Thunder and the Oklahoma
    Sooners football team, and plays occasional pickleball at the community center during the summer.
  arts: Qui Truong is an avid watercolorist inspired by the luminous palettes of Georgia O’Keeffe and Claude Monet, transforms discarded metal into whimsical sculptures, regularly attends exhibitions at
    the Oklahoma City Museum of Art and performances at the Norman Community Playhouse, and deepens their art history knowledge through lectures featuring the works of contemporary sculptor Anish Kapoor.
  travel: Qui Truong plans low‑key trips that blend nature and culture, having explored Tallgrass Prairie National Preserve and the vibrant streets of New Orleans for jazz festivals, while dreaming of a
    heritage pilgrimage to Hanoi to trace culinary roots, all while balancing a modest travel budget and family responsibilities.
  culinary: Qui Truong’s culinary repertoire showcases masterful Vietnamese cooking—simmering aromatic pho broth with star anise, cinnamon, and fresh coriander, crisping bánh xèo pancakes with home‑grown
    cilantro and bean sprouts, and creatively seasoning vegetable stir‑fry with locally harvested sage and sweet potatoes from their garden.
  core: Qui Truong seamlessly fuses meticulous metal‑working expertise with a painter’s eye, juggling shift leadership, garden care, and artistic pursuits while battling a persistent undercurrent of worry
    about stress.
background:
  cultural: Born to Vietnamese immigrant parents, Qui Nhuthi Truong grew up in a bilingual household that preserved many traditions from her ancestral homeland. She speaks Vietnamese fluently and celebrates
    Tet (Lunar New Year) with family, preparing traditional foods and exchanging symbolic gifts. Her upbringing emphasized hard work, respect for elders, and community solidarity, values that continue to
    shape her approach to both her career and personal life. While fully integrated into American society in Mustang, Oklahoma, she maintains strong ties to the local Vietnamese diaspora, participating
    in cultural associations, teaching cooking classes, and supporting the preservation of Vietnamese arts within her community. This blend of Southeast Asian heritage and Midwestern American experience
    informs her artistic sensibilities, culinary interests, and commitment to intergenerational cultural exchange.
