  career_goals: Chloe aims to transition from a first‑line supervisory role to a store manager position within the next two years, leveraging her proven track record of achieving sales goals and fostering
    high‑performing teams. She plans to pursue an MBA or a specialized retail management certification to deepen her strategic and financial acumen. In the longer term, she envisions moving into district‑level
    leadership, where she can drive community‑focused retail initiatives, mentor emerging Black retail professionals, and champion diversity and inclusion policies across multiple stores. Additionally,
    she hopes to one day launch her own boutique that integrates contemporary fashion with cultural storytelling.
