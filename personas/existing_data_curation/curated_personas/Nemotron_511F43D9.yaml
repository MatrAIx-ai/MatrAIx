  hobbies: '["Group Fitness (Zumba, HIIT)", "Live Music & Karaoke", "Cooking Southern & Soul Food", "Reading Business & Self-Development Books", "Mentoring Youth in Entrepreneurship", "Mindfulness Meditation",
