personas:
  professional: A veteran personal care aide named Luis Greo with over four decades of hands‑on senior care who blends compassionate assistance with art‑therapy techniques, leveraging bilingual fluency
    and a relaxed, flexible approach to mentorship and caregiving.
  sports: Luis Greo enjoys daily walks along Bayfront Park, gentle yoga sessions, and weekly pick‑up games of senior‑friendly pickleball, cheering on the Miami Heat and Inter Miami CF while occasionally
    attending Miami Marlins spring training games.
  arts: Luis Greo finds inspiration in watercolor scenes of Miami’s skyline and the rolling hills of his hometown, curates a vintage vinyl collection featuring Simón Díaz, Astor Piazzolla, and Miles Davis,
    regularly visits the Pérez Art Museum Miami to view works by Latin American masters such as Frida Kahlo and Diego Rivera, and enjoys classic films by Pedro Almodóvar during quiet evenings.
  travel: Luis Greo prefers low‑key, culturally rich trips, often joining family excursions to historic Caribbean locales like Cartagena and Havana, savoring the art and cuisine, while dreaming of a relaxed
    pilgrimage to Paris’s Musée d’Orsay and a gentle weekend in the Florida Keys to paint sunrise over the sea.
  culinary: Luis Greo’s culinary repertoire centers on expertly crafted arepas stuffed with queso blanco and avocado, fragrant hallacas layered with pork, olives and raisins, and delicate cachapas topped
    with fresh cheese, all enriched by herbs from his balcony garden like cilantro and parsley, while he also delights in tasting Caribbean-inspired ceviche at local eateries.
  core: Luis Greo blends decades of caregiving wisdom with a curious, art‑infused outlook, often misplacing his keys due to a relaxed approach to obligations, yet consistently brightening senior lives with
    music, watercolor, and gentle humor.
background:
  cultural: 'Born and raised in Caracas, Luis grew up immersed in Venezuelan traditions—family gatherings centered around music, storytelling, and shared meals like arepas and hallacas. He migrated to Miami
    in his early fifties, seeking stability amid Venezuela’s economic and political challenges. In Miami, he stays closely connected to the Venezuelan diaspora, attending cultural festivals, volunteering
    at community events, and sharing his heritage through cooking demonstrations and folk music sessions. Bilingual and bicultural, Luis bridges Spanish and English worlds, bringing a warm, hospitable Venezuelan
    ethos to his caregiving: respect for elders, generosity, and a communal spirit. He honors both his roots and the multicultural fabric of Miami, celebrating holidays such as Christmas with traditional
    panettone and hallacas while also embracing Afro‑Caribbean influences that enrich his social circle.'
attributes:
  skills: '[''Personal care assistance'', ''Mobility support'', ''Medication reminder and basic health monitoring'', ''Bilingual communication (Spanish-English)'', ''Empathetic counseling'', ''Cultural
