  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting'', ''Collecting and listening to Venezuelan music'', ''Reading art history and memoirs'', ''Gardening'', ''Cooking Venezuelan cuisine'',
    ''Dancing salsa and merengue'', ''Walking in local parks'', ''Playing chess'', ''Practicing yoga and meditation'']'
  career_goals: Luis aims to deepen his impact in elder care by earning a certification in hospice and palliative support, allowing him to provide more holistic, end‑of‑life assistance. He wishes to formalize
    his role as a mentor, leading informal workshops for new personal care aides where he shares best practices and his art‑therapy approach. Long‑term, he hopes to launch a community‑based program that
    offers gentle art classes, music sessions, and cultural storytelling for seniors and recent immigrants, fostering social connection and mental health. He also aspires to write a memoir or blog chronicling
    his journey as a Venezuelan immigrant caregiver, preserving cultural memories for future generations while continuing to volunteer at local senior centers.
