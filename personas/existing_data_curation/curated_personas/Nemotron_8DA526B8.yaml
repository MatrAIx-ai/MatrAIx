personas:
  professional: Shirley Andrews, an aspiring concept artist and budding webcomic creator, channels their vivid imagination into sketching, digital illustration, and self‑taught web design, and they embrace
    a relaxed, flexible approach that lets them weave poetry into visual stories while comfortably juggling school obligations.
  sports: Shirley Andrews enjoys casual Saturday runs through Ogle County’s wooded trails, plays forward for the Ogle County Youth Soccer League in spring, follows the Chicago Bulls and Chicago Cubs, and
    they often sketch game moments while wearing their jerseys during halftime.
  arts: Shirley Andrews immerses themselves in creative expression by sketching fantasy landscapes, editing photos with lo‑fi filters, playing the ukulele along to Tame Impala and Mitski, and drawing inspiration
    from the animated worlds of Hayao Miyazaki, the literary realms of Neil Gaiman, and the bold colors of Frida Kahlo, while they regularly share their artwork on a personal blog.
  travel: Shirley Andrews prefers spontaneous weekend getaways, often backpacking to Mackinac Island or exploring the vibrant street art of Portland, Oregon, while dreaming of a budget‑friendly trip to
    Kyoto’s bamboo forests and a future road‑trip across the Midwest’s small towns, and they relish the mix of exploration and creative inspiration these journeys provide.
  culinary: Shirley Andrews enjoys crafting avocado toast with smoked salmon, experimenting with ramen broth recipes, and occasionally baking homemade pizza topped with fresh basil and mozzarella, though
    they admit to relying on instant noodles during late‑night study sessions.
  core: Shirley Andrews is a day‑dreaming teen artist who balances impulsive splurges on supplies with a diligent habit of journaling their vivid inner worlds, all while they occasionally forget to water
    their potted plants.
background:
  cultural: Shirley grew up in the rural Midwest of Illinois, in the small town of Oregon, Ogle County. Her family’s cultural roots trace back to German and Irish immigrants who settled in the region generations
    ago. The community’s values of independence, practicality, and close‑knit social ties have shaped her grounded outlook, while local traditions—like county fairs, community theater, and the library’s
    summer reading program—have nurtured her love for storytelling and creative expression.
attributes:
  skills: '["Sketching", "Digital illustration", "Creative writing (poetry, short stories)", "Photography", "Basic HTML/CSS", "Ukulele playing"]'
  hobbies: '["Sketching", "Reading fantasy novels", "Ukulele playing", "Photography", "Journaling", "Exploring nature", "Attending local art fairs", "Volunteer art mentor"]'
  career_goals: Shirley aspires to attend a specialized arts high school or a college program in visual arts or illustration, hoping to become a concept artist for video games or an independent graphic
    novelist. She dreams of creating a webcomic series that blends fantasy and contemporary life, and she wants to host a local youth art workshop to share her love of creativity. She also considers developing
    interactive storytelling experiences that combine her art, writing, and basic coding skills.
