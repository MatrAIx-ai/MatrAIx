  hobbies: '[''Reading literary fiction'', ''Sketching'', ''Watercolor painting'', ''Hiking'', ''Gardening'', ''Meditation'', ''Yoga'', ''Cooking South Asian cuisine'', ''Collecting vintage design books'',
    ''Listening to classical Indian instrumental music'']'
  career_goals: Mourad aims to transition into a senior or lead design role where he can mentor emerging designers while maintaining a flexible schedule that protects his mental well‑being. He aspires to
    build a boutique studio that specializes in culturally resonant branding for South Asian diaspora organizations and socially conscious nonprofits in Southern California. To support this ambition, he
    plans to deepen his expertise in motion graphics and interactive design, and to acquire a certification in user‑experience research. Ultimately, he envisions a balanced career that combines creative
    leadership with the autonomy to work from his quiet home studio, allowing him to manage stress and preserve his preference for solitude.
