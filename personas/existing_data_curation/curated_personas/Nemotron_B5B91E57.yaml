personas:
  professional: Mourad Mehta, a seasoned graphic designer with deep proficiency in Adobe Photoshop, Illustrator, and InDesign, leverages their love for visual storytelling and structured yet flexible workflow
    to create culturally resonant branding, thriving in a quiet home studio while managing occasional disorganization through meticulous mood boards and rapid sketching.
  sports: Mourad Mehta, a dedicated weekend hiker on the Laguna Canyon trails and member of the Orange County Hiking Club, backs the Los Angeles Lakers, the Anaheim Ducks, and the LA Galaxy, and incorporates
    gentle yoga and occasional community 5K runs to maintain fitness while preferring solitary exercise.
  arts: Mourad Mehta, an avid watercolorist and collector of vintage design books, draws inspiration from Henri Matisse's bold color schemes, the sitar virtuoso Ravi Shankar, and the poetry of Rabindranath
    Tagore, often listening to those vinyl records while sketching new brand concepts.
  travel: Mourad Mehta favors low-key, nature-focused travel, meticulously planning solo trips to quiet locales such as the tea gardens of Darjeeling, the historic streets of Kyoto, and the coastal cliffs
    of Big Sur, having already explored the vibrant markets of Jaipur and the serene beaches of Bali, while they avoid crowded tourist hotspots to preserve their preference for solitude.
  culinary: Mourad Mehta, an accomplished home cook, masterfully prepares traditional dishes like chicken biryani, paneer tikka, and masala chai using fragrant turmeric, cumin, and cardamom, and frequently
    experiments by weaving those flavors into modern plating ideas for client presentations.
  core: Mourad Mehta, a solitary-minded design veteran, channels anxiety into meticulous art, yet often forgets to pay bills on time, balancing structured creativity with a habit of procrastination.
background:
  cultural: Mourad was born in the United States to immigrant parents who arrived from India in the late 1970s. Raised in a bilingual household, he grew up speaking both English and Hindi, celebrating Diwali
    and Holi while also integrating into the broader American cultural landscape of Orange County. His family's emphasis on education and artistic expression nurtured his love for the humanities and visual
    arts. This dual heritage informs his design aesthetic, often blending intricate South Asian patterns, vibrant color palettes, and narrative depth with contemporary Western design principles. The immigrant
    experience also instilled a strong sense of resilience and adaptability, which Mourad applies to both his professional projects and his personal coping strategies for stress.
