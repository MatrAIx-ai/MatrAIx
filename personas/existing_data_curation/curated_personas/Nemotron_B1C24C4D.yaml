  career_goals: Darren aims to deepen his technical credentials by earning journeyman certifications in electrical work and HVAC, and to obtain a Facility Management certification that could qualify him
    for a supervisory role. Over the next five years he hopes to transition to a lead maintenance position with stable hours and increased responsibility, and eventually launch a modest independent handyman
    business that offers flexible scheduling for his family. He also wants to develop coping strategies for his anxiety so he can maintain consistent performance at work and provide a secure future for
    his wife.
