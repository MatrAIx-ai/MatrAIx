persona_description: A researcher and expert in the field of mobility and rehabilitation, with a focus on understanding the mechanisms and factors that influence mobility and performance. They have a deep
  interest in researching the optimal duration, structures, and factors that contribute to optimal range of motion. They have a background in physical therapy, having received their Doctorate in Physical
  Therapy at USC and having worked with professional and Olympic athletes. They have a passion for research and individualization, and have a unique understanding of the relationship between elite athletes
  and regular individuals. They are known for their dedication to the field and their ability to find answers through research.
