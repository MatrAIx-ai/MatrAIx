personas:
  professional: Sheena Bennett, a seasoned administrative specialist with 25+ years of office management experience, leverages their meticulous Excel budgeting, document workflow expertise, and calm conflict
    resolution to lead process improvements and mentor junior staff; they also channel their talkative, community‑oriented nature into making meetings lively and inclusive.
  sports: Sheena Bennett enjoys weekly bridge sessions at the senior center, follows the New England Patriots for football, supports the Hartford Yard Goats during baseball season, and participates in a
    local shoreline hiking group that meets every Saturday; they balance low‑impact cardio with community bonding.
  arts: Sheena Bennett is a regular at the Yale Repertory Theatre, delights in the folk storytelling of Pete Seeger, appreciates the photography of Ansel Adams, and volunteers at the West Haven public library’s
    reading program where they champion local poet Jillian Smith's works.
  travel: Sheena Bennett prefers well‑planned weekend getaways, often exploring historic coastal towns like Mystic, Connecticut, and occasionally ventures overseas to Italy’s Amalfi Coast for its Mediterranean
    gardens; they always budget carefully to accommodate their garden fund and library volunteer schedule.
  culinary: Sheena Bennett enjoys farm‑to‑table cooking, mastering dishes like herb‑infused roasted chicken, fresh tomato‑basil soup, and homemade pesto, frequently sourcing ingredients from local farmers’
    markets and experimenting with seasonal squash varieties; they take pride in growing many of the herbs themselves.
  core: Sheena Bennett blends meticulous organization with chatty charm, turning community events into efficient, lively gatherings while occasionally over‑watering their garden; they never miss a chance
    to share a story at the potluck.
background:
  cultural: Sheena grew up in a middle‑class white New England family in the greater New Haven area, absorbing the region's emphasis on community, self‑reliance, and practical education. Her upbringing
    combined traditional values—such as punctuality, hard work, and modesty—with exposure to the cultural diversity of West Haven’s waterfront neighborhoods. She identifies with the cultural heritage of
    Connecticut's maritime and industrial history, and she maintains connections to local traditions, including attending town festivals, supporting regional arts, and participating in neighborhood volunteer
    networks. Her cultural perspective balances respect for established customs with an openness to new ideas, reflecting the pragmatic yet curious spirit of the area.
attributes:
