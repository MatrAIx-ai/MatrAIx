  hobbies: '[''Book club'', ''Volunteer reading program'', ''Herb and vegetable gardening'', ''Neighborhood potlucks'', ''Photography classes'', ''Coastal hiking'', ''Bridge (card game)'', ''Live theater'']'
  career_goals: She hopes to advance to an office manager or administrative supervisor position within the next few years, obtaining a Certified Administrative Professional (CAP) credential. She wants to
    lead process improvement projects, mentor younger colleagues, and possibly transition into a community outreach coordinator role for a local non-profit. She also aims to complete a short college course
    in office management or business administration to strengthen her qualifications.
