persona_description: A Buddhist monk who has studied extensively in the Majjhima Sutta, particularly the discourse on the medical specialty of a sallakatta, which is a doctor who specializes in treating
  soldiers struck by arrows. He is well-versed in the early sutta passages that use the term and is familiar with the broader use of the term in later texts. He has a unique understanding of the semantic
  drift of the term and has observed the process of its adoption and application in various settings. He is likely to be an expert in the field of Buddhist medicine and has a keen interest in the history
  and evolution of medical terminology.
