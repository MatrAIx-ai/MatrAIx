personas:
  professional: An aspiring community storyteller, Emelina Galarreta combines her love for soccer teamwork, science club experiments, and folklórico dancing to envision a future as a youth environmental
    advocate, channeling their practical curiosity into projects that help neighbors while they balance organized schoolwork with spontaneous play.
  sports: On the soccer field, Emelina Galarreta shines as a midfield dynamo for her school’s varsity team, cheering on the LA Galaxy during weekend broadcasts and practicing drills with the local Oxnard
    youth soccer club, all while they balance competitive drive with a love for inclusive, team‑first play.
  arts: With a flair for folklórico dance and a treasure chest of friendship bracelets, Emelina Galarreta draws inspiration from musicians like Lila Downs, reads fantasy epics by Rick Riordan, and they
    craft vibrant papel‑picado for community festivals, weaving cultural rhythm into every creative project.
  travel: An adventurous planner, Emelina Galarreta loves weekend road trips to the sun‑kissed beaches of Ventura, the magical thrills of Disneyland, and family visits to the historic streets of Guadalajara,
    always packing a sketchbook to capture new scenes, though they sometimes need to postpone longer escapades because of school commitments.
  culinary: Passionate about the kitchen, Emelina Galarreta spends evenings rolling fresh tortillas, simmering salsa verde, and they perfect sweet tamales alongside their abuela, proudly mastering guacamole
    while occasionally over‑salting the rice, turning family meals into lively, flavor‑filled gatherings.
  core: Emelina Galarreta is an energetic, compassionate eleven‑year‑old who blends soccer, science, and cultural arts into a curiosity‑driven life, even as they experience intense emotions and occasional
    impulsive spending, adding a charmingly human edge.
background:
  cultural: Emelina grows up in a Mexican‑American household in Oxnard, where Spanish is spoken at home and family ties are central. Her family celebrates traditions such as Día de los Muertos, holiday
    gatherings, and vibrant Mexican festivals that occur in Ventura County. She enjoys sharing Mexican music, food, and stories with friends at school, and her bilingual upbringing lets her bridge cultural
    gaps within her community. This rich cultural background shapes her values of hospitality, cooperation, and a deep respect for family and heritage.
attributes:
  skills: '["Bilingual communication (English/Spanish)", "Peer mediation & conflict resolution", "Basic coding with Scratch", "Science experiment design", "Organizational planning for school projects",
    "Team collaboration", "Basic first aid", "Creative writing"]'
  hobbies: '["Soccer (team sport)", "Mexican folklórico dance", "Cooking Mexican recipes with family", "Reading adventure and fantasy books", "Creative writing and storytelling", "Crafting (friendship bracelets,
    papel picado)", "Participating in school science club", "Volunteering at community garden"]'
  career_goals: Emelina dreams of a future where she can combine her love for learning with her desire to help others. She envisions becoming a teacher or school counselor who can guide younger students,
    or a pediatric nurse who cares for children's health. She is also intrigued by the idea of working as a community health worker or child psychologist, roles that would let her support the well‑being
    of families in her neighborhood while honoring her Mexican heritage.
