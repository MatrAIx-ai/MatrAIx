personas:
  professional: Aubrey Fudge is a budding junior engineer in the making, turning LEGO bricks into intricate, functional prototypes while conducting backyard experiments, blending a natural curiosity with
    a practical, methodical approach; their spontaneous flair keeps projects lively, though they often scramble to meet self‑imposed deadlines, and their competitive streak fuels a drive to outbuild classmates
    in school science fairs.
  sports: Aubrey Fudge dashes onto the soccer field every Saturday with the DeKalb County Youth Soccer Club, where their competitive edge drives them to chase the ball as hard as any forward; they also
    swing a bat for the Braves Kids Baseball League, idolize outfielder Ronald Acuña Jr., and cheer loudly for the Atlanta Hawks during after‑school basketball sessions, preferring high‑energy, team‑based
    activities over solitary workouts.
  arts: Aubrey Fudge stars in the elementary drama club’s rendition of *The Lion King*, channels their love of pop choreography by dancing to Ariana Grande’s “Thank U, Next,” and devours mystery series
    like *Encyclopedia Brown* and *Nancy Drew*; they collect posters of Taylor Swift and color in adult‑sized *Harry Potter* illustration books, blending a fierce love of performance with a keen eye for
    visual detail.
  travel: Aubrey Fudge plans their weekend adventures like a small explorer, mapping out trips to the nearby Stone Mountain Park for rock‑hunting and the Georgia Aquarium for marine‑life selfies; family
    vacations have whisked them to Disney World in Orlando and a weekend road‑trip to the Blue Ridge Parkway, and they daydream about future visits to the Smithsonian in Washington, D.C., and the sandy
    shores of Myrtle Beach, balancing a love for hands‑on discovery with a need for parental supervision.
  culinary: Aubrey Fudge’s culinary cravings oscillate between comfort classics like buttery mac and cheese studded with sharp cheddar, crispy chicken nuggets dusted with paprika, and Southern‑style peach
    cobbler crowned with a crunchy oat topping; they’re a budding sandwich artist who layers creamy peanut butter, grape jelly, and sliced banana on whole‑grain bread, and they relish grabbing fresh strawberries
    and snap peas from the DeKalb County farmers’ market for snack‑time crunch.
  core: Aubrey Fudge is an endlessly curious 8‑year‑old whose boundless energy fuels competitive LEGO engineering, spontaneous drama performances, and a worry‑prone mind that constantly juggles imagination
    with the pressure to outshine peers.
background:
  cultural: Aubrey is raised in a middle‑class white family in Atlanta’s DeKalb County, where Southern hospitality blends with a vibrant, multicultural urban environment. Her family celebrates traditional
    Southern holidays like Thanksgiving and Fourth of July with communal meals, while also participating in diverse community events such as the Dogwood Festival and school cultural fairs. Attending a public
    elementary school that emphasizes academic achievement and community service, she interacts with peers from African‑American, Latino, and Asian backgrounds, broadening her perspective and fueling her
    curiosity about different customs and histories.
