  career_goals: Aubrey aims to become a young inventor and science communicator, hoping to win school and regional science fairs. She envisions designing interactive educational games and eventually leading
    a tech‑focused venture that makes learning fun for other kids. In the near term, she wants to be recognized as the go‑to problem‑solver among her friends and to earn the title of science fair champion
    at her school.
