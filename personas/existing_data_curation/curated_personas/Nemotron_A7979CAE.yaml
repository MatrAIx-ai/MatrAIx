  hobbies: '["Beach volleyball", "Spontaneous road trips along Florida’s coastline", "Live music concerts at local venues", "Trivia nights at cafés", "Cooking Mediterranean dishes", "Acoustic guitar playing",
    "Volunteering at the animal shelter", "Participating in charity runs", "Casual basketball games with friends"]'
  career_goals: Timothy aims to move from his current sales associate role to a senior sales representative within the next two years, preferably in the tech or home‑services sector in South Florida. He
    plans to earn a Certified Professional Salesperson (CPS) credential, develop leadership capabilities, and eventually become a regional sales manager. Long‑term, he envisions launching his own boutique
    consultancy that helps small businesses streamline their sales processes, combining his practical mindset with a desire for stable, structured growth.
