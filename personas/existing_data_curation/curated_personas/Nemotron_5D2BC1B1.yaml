personas:
  professional: Janice Greer, an 8‑year‑old budding visual storyteller, merges sketching of whimsical landscapes with simple Scratch animations, channeling her scientific curiosity into illustrated comic‑style
    explanations of experiments, while they occasionally forget to put away their LEGO bricks, turning their workspace into a delightful, if slightly chaotic, studio.
  sports: Janice Greer, an 8‑year-old member of the neighborhood 'Kids' Nature Explorers' club, loves Saturday morning soccer drills with the 'Maple Sprouts' U‑9 team, cheers for the professional women's
    basketball squad the Chicago Sky on television, and prefers spontaneous wanders through the woods behind their house over structured gym classes, often collecting pinecones as trophies of their mini‑adventures.
  arts: Janice Greer, an 8‑year‑old budding illustrator and novice pianist, routinely copies the pastel tones of Claude Monet’s garden scenes, sketches fantastical characters inspired by Studio Ghibli’s
    ‘My Neighbor Totoro’, delightedly plays ‘Twinkle Twinkle Little Star’ on a toy piano, and showcases her creations at the local community art club where they occasionally trade art supplies for glitter
    glue.
  travel: Janice Greer, an 8‑year-old whose family road trips include weekend hikes at the nearby state park and an annual summer stay at a Florida theme‑park resort, dreams of exploring the castles of
    Scotland and the coral reefs of the Great Barrier Reef, yet prefers travel itineraries that fit within school breaks and include packed snack boxes of apple slices and peanut butter crackers.
  culinary: Janice Greer, an 8‑year‑old with a growing palate, adores buttery homemade macaroni‑and‑cheese, crafts fruit kebabs with strawberries, grapes, and melon chunks, sprinkles cinnamon sugar on toasted
    bagels for breakfast, and sometimes sneaks extra chocolate chips into their pancake batter when no adult is watching.
  core: Janice Greer, an imaginative 8‑year‑old who intertwines sketching, LEGO world‑building, and Scratch animation into a personal universe, often misplaces pencils in a sea of colorful bricks while
    day‑dreaming about enchanted forests and friendly dragons.
background:
  cultural: Janice was raised in West Chazy, a small hamlet in Clinton County, New York, surrounded by the rolling hills and forests of the North Country. Her family’s heritage traces back to early European‑American
    settlers in the region, and she grew up with the rhythms of rural life—four distinct seasons, community fairs, and a close‑knit school environment. Local values of modesty, self‑reliance, and respect
    for nature shape her outlook, while school programs and the town’s modest art club provide venues for creative expression.
attributes:
  skills: '[''creative storytelling'', ''drawing and sketching'', ''LEGO construction and design'', ''nature observation and simple experiments'', ''beginner piano playing'', ''block‑based coding (Scratch)'']'
  hobbies: '[''drawing and painting'', ''reading fantasy and science books'', ''LEGO construction'', ''nature walks and specimen collecting'', ''playing piano'', ''block‑based coding with Scratch'', ''handmade
    crafts and model making'']'
  career_goals: Although still young, Janice dreams of a future where she can blend art and discovery—perhaps as an illustrator of fantasy books, a writer who creates new worlds, a scientist who uncovers
    nature’s mysteries, or an inventor of playful devices. She hopes to bring joy and harmony to others through her creations and to keep learning about the wonders around her.
