  career_goals: Nathan aspires to merge his love for art and technology by becoming a video game designer or interactive media developer, creating visually striking and innovative experiences. He also dreams
    of studying engineering to design sustainable products that blend creativity with functionality. Driven by competition and curiosity, he aims to earn scholarships for STEM and arts programs, eventually
    leading projects that inspire others and showcase his unique blend of artistic vision and technical skill.
