personas:
  professional: Carol Perry, a veteran CPA and auditor with four decades of experience, applies their deep knowledge of GAAP, IFRS, and ESG metrics together with advanced Excel, Power BI, and SAP expertise
    to deliver meticulous financial oversight, while they mentor emerging women accountants and champion sustainability in nonprofit arts organizations.
  sports: Carol Perry, a devoted Detroit Tigers baseball fan and occasional participant in a senior walking club, enjoys brisk morning walks in Belle Isle Park, attends Pistons games during basketball season,
    and practices gentle yoga twice a week to maintain flexibility; they balance their love of spectator sports with low-impact exercise.
  arts: Carol Perry, an avid visitor of the Detroit Institute of Arts who sketches watercolor studies of Monet’s Water Lilies during guided tours, regularly attends performances by the Detroit Symphony
    Orchestra featuring works by Beethoven and Philip Glass, and volunteers as treasurer for a community theater staging productions like Arthur Miller's 'The Crucible', and they immerse themselves in both
    visual and performing arts.
  travel: Carol Perry, who prefers thoughtfully planned weekend getaways over spontaneous trips, enjoys seasonal visits to Mackinac Island for its historic charm, takes annual cruises to the Canadian Maritimes,
    and dreams of exploring the art-laden streets of Florence, Italy, balancing wanderlust with budget-conscious financing and family commitments, and they carefully schedule each itinerary to accommodate
    their health regimen.
  culinary: Carol Perry, a competent home cook who delights in garden-to-table meals, frequently prepares herb-roasted chicken with rosemary, thyme, and garlic, crafts fresh beet and goat cheese salads
    using heirloom vegetables from their garden, and occasionally indulges in sushi rolls featuring avocado and cucumber, and they maintain a balanced palate that favors seasonal, nutrient-rich dishes.
  core: Carol Perry, a meticulous CPA turned arts mentor, balances a love of numbers with watercolor sketches, worries about unchecked stress, habitually drinks three cups of coffee before tackling crosswords
    each morning, and they keep a tidy spreadsheet of every hobby expense.
background:
  cultural: Carol grew up in the suburban Detroit area, where a blend of Midwestern pragmatism and diverse cultural influences shaped her worldview. Her family heritage reflects a mix of German and Irish
    ancestry, and she was raised with values emphasizing hard work, community involvement, and respect for education. Living in Southfield, a multicultural enclave within Oakland County, she has embraced
    the region's rich tapestry of ethnic festivals, culinary traditions, and artistic events. While identifying as white, Carol actively seeks inclusive experiences, supporting local initiatives that celebrate
    cultural diversity and fostering an environment where varied perspectives enhance both her professional practice and personal life.
attributes:
  skills: '["GAAP and IFRS compliance", "Tax planning and preparation", "External and internal auditing", "Financial reporting and analysis", "Advanced Excel (Power Query, VBA)", "SAP Business One", "QuickBooks",
    "Power BI and data visualization", "Risk assessment and internal controls", "Lean Six Sigma process improvement", "Project management", "ESG and sustainability accounting", "Blockchain audit fundamentals",
    "Financial consulting for arts and nonprofit organizations"]'
  hobbies: '["Visiting art museums and galleries", "Sketching and watercolor painting", "Reading contemporary fiction and business biographies", "Mindfulness and stress‑management practices", "Gardening
    (structured vegetable and flower beds)", "Crossword puzzles and Sudoku", "Book club participation", "Volunteer treasurer for community theater"]'
  career_goals: Approaching retirement, Carol aims to transition from full‑time auditing to a part‑time advisory role where she can mentor emerging accountants—especially women—in both technical proficiency
    and ethical practice. She aspires to serve on the board of a local arts museum or cultural nonprofit, using her financial acumen to strengthen their fiscal sustainability while championing innovative
    funding models. Carol also dreams of publishing a guide on integrating ESG metrics into small‑business accounting, thereby shaping the next wave of responsible finance. In the longer term, she hopes
    to become a recognized speaker at regional CPA conferences, sharing insights on balancing rigorous audit standards with creative, forward‑thinking financial strategies.
