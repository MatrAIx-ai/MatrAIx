personas:
  professional: Anjali Green is a budding home‑based caterer who leverages her decades of hands‑on cooking, garden planning, and meticulous budgeting to run the town’s fall festival, while her preference
    for routine and competitive edge keep her organized yet occasionally nervous about last‑minute changes.
  sports: Anjali Green enjoys daily 30‑minute walks with her golden retriever, follows the Kansas State Wildcats basketball team and the Kansas City Chiefs, participates in a local senior walking club,
    and uses light resistance training at home to stay fit, though their competitive streak sometimes makes them overly critical of their own performance.
  arts: Anjali Green sings in the church choir, quilts intricate patterns inspired by classic folk art, devours Agatha Christie mysteries and Nora Roberts romances, and finds solace in listening to Dolly Parton
    and Bob Dylan, using these artistic outlets to temper their high emotional reactivity.
  travel: Anjali Green prefers well‑planned road trips to regional gems like Garden of the Gods, Santa Fe’s art market, and the lavender fields of Provence, balancing a modest travel budget with occasional
    spontaneous visits to family in Nebraska, yet their anxiety sometimes leads to last‑minute itinerary changes.
  culinary: Anjali Green delights in preparing hearty chicken pot pie, zucchini casserole, and caramel apple crisp using garden harvests, masters large‑scale batch cooking for school lunches, and often
    experiments with a homemade sourdough starter, though they can become obsessive about perfect seasoning, re‑checking spices multiple times.
  core: Anjali Green is a routine‑driven, community‑focused caretaker who channels anxiety into meticulous cooking, budgeting, and choir singing, yet occasionally lets perfectionism and competitive nerves
    disrupt their peace.
background:
  cultural: Anjali is a 52‑year‑old white woman raised in the heart of the Midwestern United States. Her family lineage traces back to English and German settlers who arrived in Kansas in the early 1900s.
    Growing up in Sabetha, a small, tight‑knit community, she internalized the region’s values of self‑reliance, modesty, and community service. She identifies with Protestant Christian traditions and participates
    regularly in the local church, which reinforces a cultural emphasis on family, hospitality, and practical stewardship.
attributes:
  skills: '["Home budgeting", "Meal planning & cooking", "Gardening & horticulture", "Sewing & quilting", "Basic bookkeeping", "Event coordination", "Volunteer treasurer", "Record keeping", "Pet care",
    "First aid basics"]'
  hobbies: '["Cooking traditional recipes", "Vegetable gardening", "Quilting", "Walking the dog", "Reading mystery novels", "Listening to classic country music", "Church choir singing", "Crossword puzzles",
    "Bridge (card game)", "Journaling"]'
  career_goals: Anjali hopes to transform her long‑standing cooking and gardening expertise into a modest home‑based catering service specializing in wholesome meals for local schools and seniors. She also
    plans to obtain a certification in community health volunteering so she can contribute more formally to the town’s health outreach programs. On a personal level, she is determined to develop coping
    strategies for her anxiety, including regular therapy, mindfulness practice, and joining a support group for middle‑aged women, with the ultimate ambition of feeling more emotionally resilient while
    continuing to be a dependable pillar for her family.
