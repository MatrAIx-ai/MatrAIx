  hobbies: '[''Fishing'', ''Woodworking'', ''Cooking'', ''Running in local 5K races'', ''Reading business biographies'', ''Listening to classic rock'', ''Volunteer mentor for youth entrepreneurship'']'
  career_goals: Henry aims to advance into senior leadership, targeting roles such as Director of Operations or Vice President of Business Strategy within the next five years. He seeks to lead large‑scale
    transformation initiatives that deliver cost savings and operational excellence. His ambition includes building a reputation as a go‑to expert for performance improvement, eventually branching into
    independent consulting to help midsize firms across the Midwest achieve sustainable growth. He also hopes to mentor emerging analysts, fostering a competitive yet collaborative culture in his organization.
