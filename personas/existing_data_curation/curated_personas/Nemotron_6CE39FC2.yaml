  hobbies: '[''Competitive online gaming'',''R&B and hip‑hop music listening and playlist creation'',''Hair braiding and styling practice'',''Fashion sketching and clothing upcycling'',''Reading mystery
    and crime fiction'',''Personal budgeting and project planning'',''Walking in local parks'',''Cooking simple Southern dishes'']'
  career_goals: Loretta’s short‑term goal is to earn her GED within the next year and enroll in the local community college’s cosmetology program to obtain a state‑approved hairstylist license. She plans
    to launch an at‑home braiding and styling service to build a client base and generate income while she studies. In the longer term, she wants to open a boutique salon that offers hair care, styling,
    and a small line of locally produced hair‑care products, giving her financial independence and a platform to mentor other young Black entrepreneurs. She also aims to acquire a CompTIA A+ certification
    as a backup technical support skill set, valuing the structured training and clear career pathway the certification provides. Ultimately, Loretta envisions herself as a disciplined professional who
    combines creative entrepreneurship with reliable technical expertise.
