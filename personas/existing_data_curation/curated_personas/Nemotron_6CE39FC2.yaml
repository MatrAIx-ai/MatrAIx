personas:
  professional: Loretta Johnson, a 17‑year‑old aspiring cosmetology student, leverages their disciplined time‑management and strategic gaming mindset to build a home‑based braiding service while they simultaneously
    study for a CompTIA A+ certification as a contingency career path.
  sports: Loretta Johnson enjoys watching the Atlanta Hawks and the New York Knicks, participates in weekend pick‑up basketball at the local park, and they occasionally join a high‑school track club for
    sprint drills to stay active.
  arts: Loretta Johnson curates R&B and hip‑hop playlists featuring Anderson .Paak, H.E.R., and Kendrick Lamar, sketches avant‑garde fashion concepts inspired by Virgil Abloh, and they upcycle vintage tees
    into runway‑ready pieces while devouring Agatha Christie mystery novels for plot analysis.
  travel: Loretta Johnson favors low‑cost road trips, having explored Savannah’s historic squares and New Orleans’ jazz scene, while they dream of attending the Atlanta Hair Expo and hiking the Blue Ridge
    Mountains when finances allow.
  culinary: Loretta Johnson prepares simple Southern‑inspired dishes such as shrimp and grits, collard greens, and sweet potato pie, favoring smoked paprika and fresh okra, and they occasionally experiment
    with seasoning blends while cooking for family gatherings.
  core: Loretta Johnson is a disciplined, competition‑driven teen who balances strategic online gaming, hair‑braiding entrepreneurship, and meticulous budgeting, all while they channel creative energy into
    music curation and fashion upcycling.
background:
  cultural: Loretta is an African‑American teenager raised in Fort Smith, Arkansas, a city with a close‑knit Black community that maintains strong ties to Southern heritage. Her family roots trace back
    to the Great Migration, and she grew up immersed in gospel music and church life, which instilled a sense of resilience and communal support. Family gatherings often centered around soul food, storytelling,
    and hair‑care traditions; her aunt’s at‑home braiding business introduced her early to entrepreneurship and the cultural significance of hair styling. Participation in local Juneteenth celebrations
    and community service projects at her church reinforced a pride in Black history and a commitment to uplift others. Living in a predominantly white county, Loretta is keenly aware of racial dynamics,
    which has shaped her pragmatic outlook, competitive drive, and desire for self‑reliance. These cultural influences blend with her personal ambition to succeed academically, professionally, and creatively
    while preserving and celebrating her heritage.
