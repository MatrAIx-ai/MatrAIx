  career_goals: Willie aims to transition into a department chair role within the next three years, allowing him to shape academic policy and champion innovative teaching practices. He plans to secure a
    statewide grant to develop a regional teacher‑training consortium that links the college with local high schools. In the longer term, he hopes to author a textbook on practical instructional strategies
    for adult learners and to mentor a new generation of educators before transitioning to emeritus status while remaining active in community outreach.
