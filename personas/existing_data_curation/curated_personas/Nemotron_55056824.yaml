personas:
  professional: Carmen Santana leverages three decades of end‑user support expertise—troubleshooting Windows, macOS, and Linux systems, configuring LAN/Wi‑Fi networks, and authoring clear ServiceNow tickets—while
    they channel their sociable, structured mindset into mentoring junior staff and organizing bilingual tech workshops for seniors.
  sports: Carmen Santana stays active through daily walks along the White River State Park trails, occasional community‑center tennis matches, and cheering for the Indianapolis Colts, Indiana Pacers, and
    Indianapolis Indians, and they belong to the Indy Road Runners club for weekend group runs.
  arts: Carmen Santana’s artistic side shines in salsa evenings set to the classics of Celia Cruz and Marc Anthony, urban photography inspired by Ansel Adams’ contrast work, and a book club devotion to
    historical novels by Ken Follett and Diana Gabaldon, and they find these influences deepen their vibrant view of the city’s cultural fabric.
  travel: Carmen Santana prefers organized group tours that blend cultural immersion with leisurely pacing, having enjoyed trips to New Orleans’ jazz districts and Santa Fe’s art markets, and they dream
    of future visits to Seville’s Feria de Abril and Oaxaca’s culinary festivals, balancing adventure with the comfort of familiar Spanish‑language environments.
  culinary: Carmen Santana delights in preparing arroz con pollo with saffron and cumin, hand‑folded empanadas filled with seasoned beef, and sweet pastelitos dusted with powdered sugar, often seasoning
    dishes with herbs harvested from their community garden, and they occasionally splurge on gourmet cheese boards at local bistros.
  core: Carmen Santana blends a pragmatic, structured mindset with a love for spontaneous salsa nights, community tech teaching, and urban photography, and they habitually juggle a kaleidoscope of volunteer
    projects while occasionally forgetting to water their garden on rainy days.
background:
  cultural: Carmen was born to first‑generation Mexican immigrants in Indianapolis and grew up navigating both her family's Latino traditions and Midwestern American culture. Bilingual in Spanish and English,
    she celebrates holidays such as Día de los Muertos, Navidad with a “Nochebuena” feast, and the American Thanksgiving, often blending culinary customs from both worlds. Her extended family maintains
    close ties, with regular gatherings featuring music, dance, and stories that reinforce her cultural identity. In the local community, she is active in the Indianapolis Hispanic Chamber of Commerce and
    volunteers at programs that support Spanish‑speaking residents, especially seniors. Her cultural heritage informs her approach to customer service, emphasizing empathy, respect, and clear communication
    for diverse users. While she embraces the practical, straightforward ethos of the Midwest, she also holds onto the warmth, collectivism, and celebratory spirit of Latino culture.
attributes:
  skills: '["Technical troubleshooting", "Operating system support", "Network configuration", "Remote support tools (TeamViewer, Remote Desktop)", "Ticketing and incident management (ServiceNow, JIRA)",
    "IT security fundamentals", "Device and user account management (Active Directory, Azure AD)", "Documentation and knowledge-base creation", "Bilingual customer service (Spanish-English)", "Training
    and onboarding"]'
  hobbies: '["Salsa dancing", "Cooking traditional Latino dishes", "Volunteering to teach digital literacy to seniors", "Community gardening", "Walking in White River State Park", "Reading historical fiction
    (book club)", "Urban photography", "Attending Hispanic heritage festivals", "Participating in local senior center activities"]'
  career_goals: As she approaches the next phase of her professional life, Carmen aims to shift from daily ticket resolution toward roles that leverage her experience in mentoring and community outreach.
    She plans to earn ITIL v4 Foundation and CompTIA Network+ certifications within the next year to qualify for a senior service-delivery or IT-service manager position within her current company or a
    local nonprofit. Concurrently, she intends to develop a part-time consulting practice focused on digital inclusion, offering workshops that teach basic computer skills to Spanish‑speaking seniors in
    Indianapolis. Carmen also hopes to lead a small team of support specialists, applying her structured problem‑solving style to improve workflow efficiency while maintaining the flexibility that allows
    her to balance work, family gatherings, and her own learning. Networking through the Indianapolis Hispanic Chamber of Commerce and local tech meet-ups is part of her strategy for building collaborations
    and staying current with emerging technologies.
