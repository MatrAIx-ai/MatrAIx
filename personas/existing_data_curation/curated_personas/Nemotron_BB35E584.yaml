  hobbies: '[''Visiting art galleries'', ''Attending cultural festivals'', ''Watercolor painting'', ''Listening to diverse music'', ''Cooking Mexican and Tex‑Mex dishes'', ''Gardening herbs and chilies'',
    ''Volunteering at community center'', ''Reading self‑help books on anxiety'', ''Learning digital photography'', ''Exploring online courses'']'
  career_goals: Carmen aims to become a lead quality‑assurance specialist within her plant, obtaining an internal certification in advanced inspection techniques. She hopes to lead a small team of inspectors,
    develop a mentorship program for new hires, and contribute to continuous‑improvement projects that reduce waste and enhance product consistency. In the longer term, she dreams of completing a short
    vocational certification in safety management, which would allow her to transition into a safety‑officer role. She also wants to build emotional‑resilience skills through workshops, so she can manage
    her anxiety while pursuing these professional milestones.
