  hobbies: '[''Watercolor painting'', ''Reading speculative fiction'', ''Writing short stories'', ''Acoustic guitar'', ''Vintage radio restoration'', ''Hiking'', ''Abstract photography'', ''Attending small
    art workshops'', ''Gardening'', ''Listening to tech podcasts'', ''Exploring quantum physics concepts'']'
  career_goals: William aims to rise from a front‑line sales representative to a regional sales manager within the next five years, leveraging his unique creative approach to differentiate his team’s offerings.
    He plans to earn a Certified Service Sales Professional credential and deepen his technical knowledge of emerging home automation and cloud‑based services. Long‑term, he dreams of launching his own
    boutique consultancy that helps small service firms develop narrative‑driven sales strategies, allowing him to combine his competitive instincts with his love for innovation. Financial independence
    and the ability to mentor younger sales talent in a one‑on‑one setting are also central to his ambitions.
