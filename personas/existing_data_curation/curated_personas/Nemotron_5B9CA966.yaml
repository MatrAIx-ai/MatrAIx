  career_goals: Sandra aims to secure a full‑time office management role within a healthcare or community‑service organization in the Peoria area, leveraging her organizational talents and people‑focused
    approach. She plans to obtain a Certified Administrative Professional (CAP) credential within the next year and ultimately progress to a senior office manager or operations coordinator position, where
    she can lead a team, streamline processes, and contribute to a stable, supportive workplace. Additionally, she hopes to balance her career with a manageable schedule that minimizes stress and allows
    for continued community involvement.
