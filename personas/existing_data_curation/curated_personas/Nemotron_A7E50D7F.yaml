  career_goals: Hoping to build a stable, predictable future, Mary aspires to pursue a career in the health-care field—specifically veterinary medicine or nursing—where she can combine her love for animals
    with a structured professional path. She plans to graduate high school with strong grades, attend a Texas public university, and earn a degree that leads to a reliable job in a small-town clinic or
    hospital. Mary also values giving back to her community, so she envisions eventually mentoring younger students or volunteering at the local animal shelter as part of her long-term professional life.
