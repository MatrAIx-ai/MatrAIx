persona_description: A political scientist who studies the impact of gendered facial cues on political outcomes, particularly in the context of female politicians' electoral success. The individual is interested
  in the subtle uncertainty experienced during the initial processing of a face's gender, which is predicted to influence the electoral success or failure of female politicians. They use mouse-tracking
  techniques to analyze the data and provide insights into the unique effect not explained by perceived competence or attractiveness.
