personas:
  professional: Andrew Aftab, a 50‑year‑old veteran of commercial meat, poultry, and fish processing, blends precise butchery, HACCP expertise, and sensory evaluation with their vivid imagination to devise
    unconventional charcuterie recipes, while their competitive streak drives them to mentor staff and champion rigorous quality‑assurance standards in a solitary, detail‑oriented work style.
  sports: Andrew Aftab, a 50‑year‑old who prefers solitary fitness, spends weekends hiking the Wasatch foothills, winters cross‑country skiing at Snowbird, participates in the Wasatch Trail Runners club
    for occasional long runs, and avidly roots for the Utah Jazz and Real Salt Lake while maintaining a low‑impact endurance routine that satisfies their competitive drive without the need for team sports.
  arts: Andrew Aftab, a 50‑year‑old abstract landscape painter, captures the muted earth tones of the Utah desert on canvas while drawing inspiration from Mark Rothko’s color fields and the ambient soundscapes
    of Brian Eno and Max Richter, and they practice close‑up photography in the style of Ansel Adams, focusing on textures of bark, rock, and even raw meat to complement their visual artistry.
  travel: Andrew Aftab, a 50‑year‑old solo traveler, meticulously plans low‑key getaways to remote natural sites such as Iceland’s Westfjords, Sedona’s red rock canyons, and Japan’s Shikoku island, favoring
    self‑guided hikes that echo their Wasatch weekend treks while balancing a modest travel budget that limits extended overseas trips.
  culinary: Andrew Aftab, a 50‑year‑old culinary experimenter, perfects home‑smoked salmon brined with dill and juniper berries, dry‑cures beef using a coffee‑pepper rub, crafts bespoke walnut cutting boards,
    and they relish sampling their own artisanal charcuterie alongside aged cheddar, crusty sourdough, and a drizzle of honey‑infused balsamic reduction.
  core: Andrew Aftab, a 50‑year‑old solitary innovator, merges meticulous meat‑craft with desert‑inspired abstract art, channels a competitive drive into perfecting cured delicacies, and they habitually
    lose track of time while listening to ambient music, often skipping meals in the process.
background:
  cultural: Andrew grew up in a modest, middle‑class family in the Intermountain West, where his grandparents were involved in farming and livestock. The region’s culture emphasized self‑reliance, practicality,
    and a respect for the land, instilling in him a strong work ethic and early familiarity with food production. Living in Utah County—a predominantly White, suburban community—he absorbed a blend of traditional
    American values and the local emphasis on outdoor recreation, community service, and modesty. His cultural background includes exposure to broader American culinary traditions as well as regional specialties
    such as fried trout and Utah‑style barbecue, shaping his appreciation for both classic and inventive food.
attributes:
  skills: '["Butchery and cutting techniques", "Food safety and HACCP compliance", "Equipment operation and maintenance", "Quality control and sensory evaluation", "Product development and recipe innovation",
