  hobbies: '["Abstract painting", "Nature and food photography", "Reading speculative fiction and philosophy", "Creative writing", "Woodworking", "Home smoking and curing", "Hiking", "Listening to classical
    and ambient music"]'
  career_goals: In the short term, Andrew plans to obtain a food safety auditor certification and transition into a supervisory quality‑assurance role at his current facility, where he can lead a team and
    improve operational standards. His medium‑term goal is to achieve master butcher certification and launch a boutique artisanal charcuterie shop in the Salt Lake Valley, focusing on locally sourced,
    sustainably raised meats and offering innovative cured products. He also aspires to publish a modest cookbook that blends his inventive recipes with personal storytelling, and to conduct workshops for
    aspiring butchers, sharing his technical knowledge and creative approach to meat preparation.
