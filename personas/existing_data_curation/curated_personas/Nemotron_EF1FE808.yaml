  hobbies: '[''Gardening (vegetables, heirloom plants)'', ''Handcrafted jewelry making'', ''Knitting and crocheting'', ''Reading mystery and historical fiction'', ''Community book club'', ''Friendly knitting
    competitions'', ''Cooking Southern cuisine'', ''Hiking on local trails'', ''Volunteer craft workshops at the public library'']'
  career_goals: Diana aims to transform her DIY and crafting talents into a modest home-based business, selling jewelry, knitted goods, and garden produce through an online boutique and occasional local
    fairs. She plans to obtain a GED within the next year to qualify for a part-time administrative role at the Polk County community center, where she hopes to combine her organizational abilities with
    her desire to support neighborhood programs. Long-term, she envisions mentoring other middle-aged women in Texas on financial independence, sustainable gardening, and small-scale entrepreneurship.
