  career_goals: Mhamed dreams of turning his love for building and problem‑solving into a future career as a civil engineer or automotive technician, where he can design and assemble tangible projects with
    clear steps and measurable results. He also harbors a competitive ambition to earn a varsity soccer spot in middle and high school, hoping a scholarship could combine his athletic drive with his technical
    interests. Ultimately, he imagines working on community infrastructure projects—such as road improvements or sustainable energy installations—that blend structure, practical impact, and teamwork, while
    still leaving room for creative flexibility.
