personas:
  professional: Mhamed Khatib, a budding mechanical tinkerer, spends afternoons turning LEGO Technic sets into motorized contraptions while shadowing his dad in the workshop, and they channel their love
    for predictable gear ratios into spontaneous builds that satisfy their craving for structure yet tolerate the occasional improvisation.
  sports: Mhamed Khatib, a midfielder on the Canyon County Youth Soccer Club, practices twice a week, idolizes Lionel Messi, roots for the Boise State Broncos on Saturdays, and they spend weekend mornings
    fishing for trout in the Snake River's clear streams.
  arts: Mhamed Khatib, an avid comic‑book sketcher, draws superhero mash‑ups inspired by Stan Lee and Alex Ross, binge‑watches Adventure Time after school, and they fuel their creative bursts with a playlist
    that mixes Imagine Dragons and the iconic soundtrack of The Legend of Zelda.
  travel: Mhamed Khatib, who loves exploring the foothills and streams near his home, has taken family road trips to Craters of the Moon and Yellowstone, dreams of visiting Japan’s Akihabara district to
    soak in anime culture, and they prefer spontaneous day‑hikes over meticulously planned vacations.
  culinary: Mhamed Khatib, whose snack repertoire alternates between crunchy carrot sticks dipped in hummus, pepperoni pizza, and a homemade trail mix of roasted almonds, dried apricots, and chocolate chips,
    can whip up a quick grilled cheese while his dad tends the grill for evening fish on the riverbank, and they relish the chance to experiment with flavors.
  core: Mhamed Khatib is a competitively spirited, structure‑loving pre‑teen who balances a love for gears and games with a relaxed approach to obligations, often swapping meticulous planning for a spontaneous
    LEGO experiment, and they constantly oscillate between disciplined tinkering and impulsive fun.
background:
  cultural: Mhamed grows up in a predominantly White, rural community in Canyon County, Idaho. His family traces its ancestry to European roots, while also preserving cultural practices from his paternal
    lineage, which includes Middle Eastern (Lebanese) heritage. This blend appears in occasional family meals featuring dishes like hummus or tabbouleh and occasional Arabic greetings, though his daily
    life aligns closely with typical American customs such as celebrating Thanksgiving, the Fourth of July, and local community events. The multicultural background gives him a modest appreciation for diverse
    traditions while his primary cultural identity is shaped by the local Idaho environment.
attributes:
