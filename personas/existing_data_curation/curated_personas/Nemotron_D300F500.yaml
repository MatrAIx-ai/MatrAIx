personas:
  professional: Jose Nevarez, a retired senior accountant, channels their meticulous budgeting, project‑management, and bilingual communication skills into volunteer coordination at the local senior center,
    where they organize events, mentor younger volunteers, and oversee community outreach with disciplined precision.
  sports: Jose Nevarez enjoys seasonal saltwater fishing in the Gulf during winter, leisurely sailing their catamaran in spring and summer, and follows the Miami Dolphins and Tampa Bay Rays, while they
    belong to the Marco Island Sailing Club and play occasional beach volleyball with fellow retirees.
  arts: Jose Nevarez immerses themselves in the rhythms of classic salsa and bolero, regularly listening to the timeless voice of Celia Cruz, the vibrant arrangements of Buena Vista Social Club, and the
    jazzy piano of Eddie Palmieri while they occasionally join senior‑center dance nights to practice salsa steps.
  travel: Jose Nevarez prefers relaxed, family‑focused travel, often planning low‑key road trips along Florida’s Gulf Coast to Naples and Sanibel, while they dream of a nostalgic pilgrimage to the Caribbean
    island of their birth and keep a bucket list spot for a cultural tour of Granada, Spain.
  culinary: Jose Nevarez dazzles guests with authentic island dishes such as ropa vieja, moros y cristianos, and crisp tostones, blending ingredients like cumin, garlic, and ripe plantains, and they take
    pride in their meticulous pastry work on flan and pastelitos.
  core: Jose Nevarez is a disciplined, curiosity‑driven elder who blends meticulous organization with a love for gardening, sailing, and cooking, though they sometimes over‑schedule their days and hoard
    extra garden seed packets.
background:
  cultural: Jose was born in Santiago de Cuba in 1951 and emigrated with his family to the United States in 1965, settling in Miami’s vibrant Cuban‑American community. Growing up, he spoke Spanish at home,
    celebrated Cuban holidays such as Noche de San Juan, and absorbed the island’s musical traditions—son, salsa, and bolero. Family gatherings centered around hearty meals, reinforcing a deep appreciation
    for Cuban cuisine and hospitality. Over the decades, he integrated into broader American culture while preserving his roots, participating in local Cuban societies, attending church, and maintaining
    the values of family interdependence, respect for elders, and community solidarity. Relocating to Marco Island in his later years, he embraced the Floridian coastal lifestyle but continues to infuse
    his daily life with Cuban language, music, food, and cultural practices.
