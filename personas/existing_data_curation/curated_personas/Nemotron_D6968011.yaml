personas:
  professional: Christopher Agustin, a seasoned carpenter with a decade of hands‑on experience in structural framing, custom cabinetry, and historic furniture restoration, leverages his methodical planning,
    tech‑savvy SketchUp modeling, and a habit of double‑checking safety protocols to consistently deliver hurricane‑resistant projects on time and within budget.
  sports: Christopher Agustin, a midfield regular for the Orlando Sunburst adult soccer league, balances weekly pick‑up matches with loyal fandom for the Orlando Magic, occasional tailgates for the Tampa
    Bay Buccaneers, and a disciplined routine of early‑morning jogs along Lake Apopka to stay fit for both the season and his demanding job.
  arts: Christopher Agustin finds creative release strumming acoustic renditions of John Mayer and Bon Iver on his guitar, draws inspiration from the woodworking mastery of Sam Maloof and the cinematic
    scores of Hans Zimmer, and regularly attends local art walks featuring muralists such as Shepard Fairey.
  travel: Christopher Agustin prefers meticulously planned trips that blend cultural immersion and relaxation, having explored the bustling night markets of Seoul, the historic streets of Manila, and the
    cloud forests of Monteverde in Costa Rica, while dreaming of a future sailing expedition around the Greek islands.
  culinary: Christopher Agustin experiments in the kitchen by fusing kimchi fried rice with adobo‑marinated pork, perfecting the balance of gochujang heat and calamansi acidity, and often spices his Sunday
    stew with bagoong and miso for a truly cross‑cultural comfort dish.
  core: Christopher Agustin is a pragmatic yet curious craftsman who channels his stress into woodworking and guitar, but can’t resist a late‑night espresso and occasional over‑booking of community projects.
background:
  cultural: Christopher is a first‑generation American of mixed Filipino and Korean descent. His parents instilled a blend of cultural values, emphasizing respect for elders, a strong work ethic, and the
    importance of family gatherings. He grew up celebrating both Lunar New Year and traditional Filipino holidays, and he still prepares family recipes like kimchi fried rice and adobo for friends and neighbors.
    While embracing these traditions, Christopher also navigates the broader American cultural landscape of Central Florida, participating in local community events and maintaining connections with relatives
    abroad through video calls. His multicultural upbringing informs his worldview, fostering an appreciation for diverse perspectives and a willingness to integrate varied cultural practices into his daily
    life.
