  career_goals: Alan aims to progress to a senior category management role where he can lead a team in shaping the product mix for a major national retailer. He is passionate about integrating sustainable
    and ethically sourced items, especially those that highlight emerging artists and designers. Over the next five years he plans to obtain an MBA focused on supply chain management, spearhead initiatives
    that bring art‑inspired merchandise into mainstream retail, and eventually launch his own boutique consulting firm that helps brands curate culturally resonant product lines while maintaining profitability.
