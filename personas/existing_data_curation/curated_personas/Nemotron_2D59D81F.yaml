  career_goals: Over the next five years Chandler aims to transition into a lead architect role where he can shape product strategy for platforms that merge technology with creative expression, such as
    immersive media or interactive art installations. He wants to champion inclusive engineering practices, mentor underrepresented talent in tech, and eventually launch his own startup focused on community‑driven
    digital experiences. At the same time he seeks to cultivate a healthier work‑life balance and develop stress‑management habits that sustain his long‑term well‑being.
