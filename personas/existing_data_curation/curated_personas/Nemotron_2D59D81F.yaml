personas:
  professional: Chandler Jackson, a full‑stack software developer with deep expertise in modern JavaScript frameworks, cloud infrastructure, and DevOps, channels their curiosity and competitive edge into
    designing scalable micro‑services, optimizing CI/CD pipelines, mentoring junior engineers, and championing inclusive engineering practices.
  sports: Chandler Jackson maintains fitness through early morning runs in Schenley Park and Saturday pickup basketball games, proudly supports the Pittsburgh Steelers and Penguins, and follows the NBA’s
    Miami Heat for their fast‑paced style, reflecting a competitive yet community‑oriented approach to sport.
  arts: Chandler Jackson expresses artistic appreciation by performing improvisational jazz on a Selmer saxophone, drawing inspiration from Miles Davis and John Coltrane, delving into speculative fiction
    by N.K. Jemisin, and frequenting Pittsburgh’s contemporary galleries such as the Mattress Factory while admiring street‑art icons like Banksy at local festivals.
  travel: Chandler Jackson prefers deliberate, experience‑focused trips, planning weekend getaways to jazz hubs like New Orleans and tech‑centric cultural festivals in Berlin, budgeting for occasional Caribbean
    island visits to sample authentic cuisine, yet balances these adventures with familial responsibilities that limit extended travel.
  culinary: Chandler Jackson is an avid home chef who crafts Caribbean‑inspired meals such as jerk chicken with mango salsa, coconut rice, and callaloo, wielding a well‑stocked spice rack and a battered
    yet reliable cast‑iron skillet, often sharing the aromatic dishes with family during weekend gatherings.
  core: Chandler Jackson is a curiosity‑driven tech architect who balances competitive ambition with an artistic soul, yet sometimes lets worry over‑optimize projects, procrastinates on health check‑ups,
    and indulges in impulsive saxophone and camera gear splurges.
background:
  cultural: Chandler grew up in Pittsburgh’s North Side, rooted in a tight‑knit African‑American community whose history includes the Great Migration and a rich tradition of gospel, jazz, and storytelling.
    His grandparents brought Southern culinary and musical customs that influenced family gatherings, while his parents emphasized education and community service. Attending a predominantly Black high school
    introduced him to coding clubs that sparked his interest in technology. The vibrant murals, jazz clubs, and cultural festivals of the Hill District deepened his appreciation for art and creative expression.
    Today he stays connected to his heritage through church choirs, family reunions, and mentorship programs that support Black youth pursuing STEM careers.
