  hobbies: '["Golf", "Tennis", "Pickleball", "Technology meetups and public speaking", "Multicultural cooking club", "Travel to familial roots", "Calligraphy", "Live jazz concerts", "Board‑game tournaments"]'
  career_goals: He aims to transition from a hands‑on DBA role to a strategic data architect position where he can shape enterprise‑wide data roadmaps. Son Han aspires to earn senior certifications (AWS
    Certified Solutions Architect, Certified Data Management Professional) and eventually assume a Chief Data Officer or Director of Data Engineering role. He is motivated to mentor the next generation
    of database professionals, lead large‑scale cloud migration projects, and champion data‑driven decision‑making across the organization, all while maintaining a balanced, flexible work style that respects
    his preference for practical outcomes over rigid structures.
