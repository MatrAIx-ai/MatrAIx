personas:
  professional: Heather Erickson is a 27‑year‑old indie film producer/director who blends meticulous project management, budget discipline, and narrative research—leveraging tools like Final Draft and Adobe
    Premiere Pro—to foster harmonious small‑crew environments, and they pursue bold storytelling that balances artistic ambition with commercial viability.
  sports: Heather Erickson enjoys weekend hikes through the Santa Monica Mountains, is a member of a local trail‑running club that meets for sunrise runs, and loyally follows the Los Angeles Lakers and
    Dodgers, often watching games with friends after a yoga session.
  arts: Heather Erickson spends evenings at the Hammer Museum, curates a personal playlist of classic literature readings from Virginia Woolf and James Baldwin, attends independent film screenings at the
    Arena Cinema, and draws creative inspiration from the photographs of Dorothea Lange, integrating these influences into their storytelling.
  travel: Heather Erickson prefers low‑key, meticulously planned trips with their spouse, having explored Kyoto’s temples, road‑tripped the Pacific Coast Highway, and now dreaming of photographing Iceland’s
    glaciers while budgeting each adventure through a dedicated travel spreadsheet.
  culinary: Heather Erickson loves preparing intimate meals like miso‑glazed salmon with quinoa, Korean‑style tacos, and saffron‑infused paella for close friends, sourcing fresh herbs from the local farmer’s
    market and experimenting with spices from Moroccan tagine, yet they admit to occasionally ordering ramen when production deadlines loom.
  core: Heather Erickson balances a planner’s precision with an artist’s curiosity—meticulously budgeting every project yet constantly seeking new cultural flavors—while their reserved nature hides a habit
    of binge‑watching indie documentaries late into the night.
background:
  cultural: Heather grew up in a middle‑class, predominantly white suburban community in Southern California, where the proximity to Hollywood infused her childhood with an early fascination for storytelling
    and film. Her family valued education and the arts, encouraging a broad exposure to literature, theater, and visual media. This environment, combined with her humanities degree, fostered an appreciation
    for diverse narratives and a commitment to inclusive representation. While rooted in mainstream American cultural norms, Heather actively seeks out subcultural artistic circles in North Hollywood, blending
    her mainstream upbringing with the eclectic, progressive vibe of the local creative community.
attributes:
  skills: '["Project Management", "Budgeting & Financial Planning", "Scheduling & Production Coordination", "Script Development & Analysis", "Directing Actors", "Location Scouting", "Casting", "Adobe Premiere
    Pro", "Final Draft", "Team Leadership", "Conflict Resolution", "Creative Problem Solving", "Negotiation with Vendors"]'
  hobbies: '["Independent Film & Documentary Viewing", "Art Gallery Visits", "Reading Classical and Contemporary Literature", "Book Club Participation", "Yoga and Meditation", "Hiking in the Santa Monica
    Mountains", "Photography (landscape and street)", "Cooking Small‑Group Meals", "Board Games with Close Friends"]'
  career_goals: Heather aims to transition from mid‑scale independent projects to producing and directing a feature film that marries artistic ambition with commercial viability. She plans to establish
    her own boutique production company that prioritizes inclusive storytelling and provides mentorship opportunities for emerging women filmmakers. Over the next five years, she also hopes to break into
    limited‑series production for streaming platforms, leveraging her experience to balance tight deadlines with creative exploration. Ultimately, she envisions her work contributing to culturally resonant
    narratives that spark conversation while sustaining a profitable business model.
