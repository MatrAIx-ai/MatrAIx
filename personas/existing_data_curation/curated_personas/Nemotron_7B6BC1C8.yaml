personas:
  professional: Arthur Sotorodriguez, a veteran STEM educator with deep expertise in mathematics and physics, designs rigorous yet adaptable curricula, leads the school robotics club, writes successful
    grant proposals, and mentors teachers, channeling their meticulous organization and quiet curiosity into a results‑driven but compassionate teaching style.
  sports: Arthur Sotorodriguez, an early‑morning angler on the Caloosahatchee River who also paddles with the East Lee County Kayak Club, avidly supports the Tampa Bay Rays and follows the Tampa Bay Buccaneers,
    and they treat fitness as a low‑impact routine of fishing trips, kayaking, and occasional chess‑break stretches rather than competitive sport.
  arts: Arthur Sotorodriguez, a sci‑fi aficionado who devours books by Isaac Asimov and Ursula K. Le Guin in both English and Spanish, enjoys the guitar melodies of Carlos Santana and the poetic lyrics
    of Jorge Drexler, and occasionally attends plays at the Gulf Coast Playhouse, finds that the blend of imagination and precision fuels both their classroom innovations and quiet evenings of chess.
  travel: Arthur Sotorodriguez, a methodical traveler who plans trips months ahead, has explored the mangroves of the Everglades, the Galápagos Islands, and the historic streets of Mexico City, and hopes
    to someday kayak the fjords of Norway, balancing a modest travel budget with a deep desire for scientific and cultural immersion.
  culinary: Arthur Sotorodriguez, an enthusiastic home chef who masters the preparation of carnitas, chiles en nogada, and heirloom‑tomato salsa verde using fresh epazote, cilantro, and smoked chilies from
    his garden, balances precise recipe steps with spontaneous flavor tweaks, and they treat mealtime as a quiet ritual shared with their spouse and a few close friends.
  core: Arthur Sotorodriguez, a quietly curious 55‑year‑old educator who blends meticulous lesson planning with a love for solitary fishing, never misses a chance to tinker with micro‑controllers, yet can
    be overly worriable about grant deadlines, often staying up late polishing spreadsheets instead of sleeping.
background:
  cultural: Arthur is a first‑generation Mexican American whose parents emigrated from Jalisco. Raised bilingual, he grew up celebrating Día de los Muertos, Mexican holidays, and traditional foods while
    navigating American school culture. His heritage informs his teaching philosophy; he incorporates Mexican scientific figures such as Guillermo González Camarena and José Hernández into lessons and uses
    bilingual resources to make STEM accessible to English‑language learners. He actively participates in Fort Myers’ vibrant Latino community, attending cultural festivals, supporting local Mexican‑owned
    businesses, and collaborating with community leaders to promote education among Hispanic youth. Family loyalty, respect for elders, and a strong work ethic rooted in his cultural upbringing shape both
    his personal life and professional dedication.
attributes:
  skills: '["STEM curriculum design", "Data-driven instruction and assessment analysis", "Classroom technology integration", "Bilingual English-Spanish instruction", "Differentiated instruction", "Robotics
