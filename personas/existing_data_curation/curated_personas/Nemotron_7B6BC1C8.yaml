    "Educational technology troubleshooting"]'
  hobbies: '["Reading science-fiction and scientific non-fiction", "Gardening (heirloom tomatoes, chilies, herbs)", "Cooking Mexican cuisine with family", "Fishing on the Caloosahatchee River", "Kayaking
    in mangrove waterways", "Playing chess", "Arduino and Raspberry Pi tinkering", "Volunteering at local STEM fairs"]'
  career_goals: Arthur aspires to become the STEM department chair in his district, where he can shape interdisciplinary curricula and expand hands‑on learning opportunities. Over the next three years he
    plans to secure a statewide grant to launch an after‑school robotics and marine‑science program targeting underserved students in Lee County. He also intends to author a bilingual STEM teaching guide
    that highlights contributions of Mexican scientists, aiming to publish it within five years. Ultimately, Arthur envisions transitioning to a part‑time educational consultant role, advising schools on
    culturally responsive STEM instruction while maintaining a healthier work‑life balance.
