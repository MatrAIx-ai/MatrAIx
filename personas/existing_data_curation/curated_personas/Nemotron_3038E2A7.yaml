  career_goals: Jose aims to advance to a senior director of operations or chief operating officer role within the next five years, preferably in a mid‑sized technology or sustainable manufacturing firm
    in the Midwest. He plans to deepen his expertise in lean Six Sigma, earn a PMP certification, and lead large‑scale transformation initiatives that embed sustainability and employee engagement into core
    operations. Long‑term, he aspires to mentor emerging managers from underrepresented backgrounds and eventually launch a consultancy that helps small businesses implement structured growth strategies.
