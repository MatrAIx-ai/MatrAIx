  career_goals: Maria aims to advance from her current supervisory role to a regional sales manager position within the next three years, overseeing multiple branches across South Texas. She plans to spearhead
    the development of a comprehensive sales training program that integrates both proven methodologies and innovative tools, positioning her organization to capture new market segments. Additionally, Maria
    is focused on building a mentorship pipeline for emerging female leaders in the company, ensuring a legacy of disciplined, achievement‑oriented leadership as she prepares for a phased retirement.
