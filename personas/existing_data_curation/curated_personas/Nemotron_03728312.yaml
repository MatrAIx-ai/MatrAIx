    East Asian/Tex-Mex fusion dishes", "Herb gardening and tea preparation", "Attending local art exhibitions and museum talks", "Solving puzzles (crosswords, logic games)", "Mindfulness meditation"]'
  career_goals: As she approaches the later stage of her life, Nau's ambitions center on deepening her creative legacy and sharing her cultural heritage. She aims to curate a solo exhibition of her abstract
    watercolors and calligraphy at a local community center, complemented by a portfolio booklet. She wishes to develop and teach a series of low-cost art workshops for seniors and teenagers, fostering
    intergenerational dialogue. A longtime dream is to travel back to her ancestral hometown in China to study traditional brush techniques and incorporate them into her own practice. Additionally, she
    hopes to write and illustrate a children's picture book that weaves East Asian folklore with contemporary Texan settings, ultimately publishing it independently. Maintaining her mental well-being through
    regular artistic practice and community engagement remains a core personal goal.
