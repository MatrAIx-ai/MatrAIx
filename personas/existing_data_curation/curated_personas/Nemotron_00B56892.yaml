personas:
  professional: Sebastian Nowroozi, a budding junior gardener who spends afternoons planting seedlings in the family’s backyard vegetable patch, shows early skill in caring for soil, tracking growth charts,
    and turning curiosity into practical horticulture, all while preferring solitary, quiet moments away from busy playrooms.
  sports: Sebastian Nowroozi, a five‑year‑old who plays in the Fresno United Soccer Club’s “Little Tigers” team, enjoys weekly T‑ball practice at the community park, cheers for the Los Angeles Dodgers on
    game nights, and idolizes the Sacramento Kings’ star guard for the fast‑paced excitement of basketball.
  arts: Sebastian Nowroozi, a five‑year‑old who loves drawing cartoon dinosaurs, sings along to the “Let It Go” soundtrack from Disney’s Frozen starring Idina Menzel, watches Pixar’s Toy Story, and delights
    in Mo Willems’ “Elephant & Piggie” books, letting these artists spark endless creative play.
  travel: Sebastian Nowroozi, a five‑year‑old whose family road trips include weekend visits to Yosemite National Park, a day at the Monterey Bay Aquarium, and an annual adventure to Disneyland Resort;
    they love exploring nature trails but prefer schedules that allow nap breaks, dreaming of future trips to the Grand Canyon and Tokyo’s DisneySea.
  culinary: Sebastian Nowroozi, a five‑year‑old who adores mac & cheese with extra cheddar, crunchy chicken nuggets with ketchup, fresh strawberry slices, and the occasional guacamole dip; they proudly
    help Mom roll pizza dough, sprinkle mozzarella and pepperoni, but stubbornly refuse broccoli.
  core: Sebastian Nowroozi is a quiet, solitary five‑year‑old whose curiosity fuels garden experiments, piggy‑bank savings, dinosaur sticker collections, and a gentle love for nature‑filled family trips.
background:
  cultural: Sebastian comes from a White American family living in Fresno, California. His upbringing emphasizes kind, cooperative values and quiet family time. The family celebrates mainstream American
    holidays such as Thanksgiving and the Fourth of July, participates in community events at a local church, and enjoys occasional visits to nearby farms that reflect the agricultural rhythm of the Central
    Valley. While his surname hints at broader multicultural roots, his daily life is rooted in typical middle‑class American culture with a strong focus on personal space, harmony, and respect for nature.
