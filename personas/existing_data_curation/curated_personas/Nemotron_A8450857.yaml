  hobbies: '[''Cooking traditional Puerto Rican dishes'', ''Crocheting'', ''Gardening'', ''Bridge and bingo'', ''Listening to salsa and bolero music'', ''Attending church services'', ''Watching classic
    movies'']'
  career_goals: Although retired, Candy aims to stay active and independent by volunteering at the local senior center, teaching cooking classes to preserve her cultural heritage, and serving as a mentor
    for younger Puerto Rican families in the community. She also aspires to maintain her health through regular walking, to keep her mind sharp by participating in bridge tournaments, and to document family
    stories for future generations.
