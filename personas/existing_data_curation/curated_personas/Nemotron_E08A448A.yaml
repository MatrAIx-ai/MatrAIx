  hobbies: '[''Abstract Painting'', ''Sketching'', ''Photography'', ''Acoustic Guitar'', ''Hiking'', ''Science Fiction & Philosophy Reading'', ''Cooking Mexican Cuisine'', ''Attending Art Fairs'', ''Community
    Cultural Events'']'
  career_goals: Isaac aims to transition from a sales associate to a managerial role, first becoming an assistant manager and then a store manager. He plans to deepen his business knowledge through a marketing
    certification or completing his degree, positioning himself for a regional visual merchandising specialist role. Ultimately, he envisions launching his own boutique or e‑commerce platform that showcases
    Mexican-inspired art, crafts, and cuisine, merging his retail expertise with his creative passions while promoting cultural heritage.
