persona_description: A person interested in the development of Internet of Things (IoT) and its applications, particularly in the context of sensing, actuation, and the exploitation of unique identification
  and data capture. This person is familiar with the convergence of wireless technologies, micro-electromechanical systems (MEMS), and the Internet, and has experience with the role of Web technologies
  in facilitating the development of applications and services for things and their virtual representation. This person is also familiar with the W3C's vision of a network of physically connected objects
  and the potential of existing and evolving Internet and network developments to offer specific object-identification, sensor, and connection capability as the basis for the development of independent
  cooperative services and applications that will be characterized by a high degree of autonomous data capture, event transfer, network connectivity, and interoperability.
