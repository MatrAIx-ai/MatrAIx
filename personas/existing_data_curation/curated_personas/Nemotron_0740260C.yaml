  career_goals: Andrea aims to deepen her expertise in arts‑based early education by pursuing a master’s degree in Early Childhood Specialization with a focus on Creative Pedagogy. She envisions taking
    on a leadership role as a lead teacher or director of a preschool where she can mentor new educators and champion a curriculum that prioritizes artistic expression and inclusive practices. In the longer
    term, she hopes to launch a community‑centered after‑school arts program that serves families across Cambria County, securing grant funding to provide low‑cost workshops in painting, music, and theater
    for children and parents alike. Andrea also aspires to become an advocate for early‑learning policy at the county level, collaborating with local schools and government to improve resources for rural
    preschool programs.
