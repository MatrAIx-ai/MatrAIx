  career_goals: Vincent dreams of earning a scholarship to study engineering at a top university, with a particular interest in mechanical or biomedical engineering that merges his curiosity for how things
    work with practical solutions for real‑world problems. He envisions designing sustainable devices that improve everyday life in his community, and later hopes to mentor younger students through school
    STEM programs and local robotics workshops. Achieving high academic standards and gaining hands‑on experience through internships are key milestones for him on the path to becoming an innovative engineer.
