persona_description: A scientist or researcher in the field of forestry, specifically focusing on the study of carbon cycling in tropical forests. They are interested in understanding the mechanisms of
  carbon storage and release in these ecosystems, and how land-use changes such as afforestation and fertilization affect carbon fluxes. They are likely to be familiar with mass balance and isotope analysis
  methods, and have a keen interest in the relationship between carbon allocation and retention belowground. They may also have experience with soil mechanics and the formation of soil carbon, and have
  a strong background in ecology and environmental science.
