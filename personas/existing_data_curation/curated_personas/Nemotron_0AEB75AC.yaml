personas:
  professional: Alirio Castellanos, a budding little architect, channels their curiosity for new ideas into building elaborate block constructions and sketching simple floor plans, balancing a surprisingly
    organized approach with the free‑form imagination typical of a four‑year‑old, and often insists on placing the final piece, showcasing a competitive streak even in pretend play.
  sports: Alirio Castellanos, a member of the Tiny Tigers preschool soccer club, kicks around a mini soccer ball every Saturday, emulating the star forward of the city’s professional team Metro United and
    proudly collecting stickers of the team’s logo, while also enjoying family outings to cheer for the River City Mariners baseball team and delighting in tumble‑time at the local indoor play arena.
  arts: Alirio Castellanos, an avid mini‑artist, spends afternoons coloring with Crayola crayons, drawing inspired by picture books like The Day the Crayons Quit, and performing elaborate pretend scenes
    with characters from Bluey and Sesame Street, while also dancing to the kid‑friendly tunes of They Might Be Giants’ album No!.
  travel: Alirio Castellanos, a pint‑sized explorer, loves family road trips to the city zoo where they count giraffes, thrills at the bright lights of Magic Kingdom during a summer visit, and dreams of
    one day seeing the Grand Canyon while preferring spontaneous, parent‑guided adventures over meticulously planned itineraries.
  culinary: Alirio Castellanos, a budding little chef, delights in gooey macaroni and cheese, crispy chicken nuggets, and bright orange carrot sticks, often helping mom sprinkle shredded mozzarella on mini
    pizzas while insisting on tasting raw banana slices before they’re fully cut, revealing a curious palate that sometimes leads to sauce splatters on their favorite shirt.
  core: Alirio Castellanos, a four‑year‑old whirlwind of curiosity and competition, relentlessly builds block fortresses, saves pennies in a secret stash, and can be both meticulously organized and delightfully
    messy, especially when a new toy sparks an instant‑fix snack attack.
background:
  cultural: Alirio grows up in a bilingual Mexican‑American household in Herriman, Utah. At home, Spanish is spoken alongside English, and family meals often feature traditional Mexican dishes like tacos,
    quesadillas, and pozole. He celebrates cultural holidays such as Día de los Muertos and Las Posadas, participating in vibrant decorations and music. His parents encourage pride in his heritage through
    storytelling, folk art, and occasional visits to local Mexican community events, shaping his appreciation for color, rhythm, and shared traditions while also integrating into the wider Utah community.
attributes:
  skills: '[''drawing'', ''color and shape recognition'', ''basic counting (1-10)'', ''simple puzzle assembly'', ''building block construction'', ''early phonemic awareness'', ''bilingual storytelling (Spanish/English)'',
    ''asking exploratory "why" questions'']'
  hobbies: '[''drawing and painting'', ''building with LEGO Duplo and wooden blocks'', ''solving simple puzzles'', ''nature walks and collecting natural objects'', ''listening to storybooks about space,
    dinosaurs, and Mexican folklore'', ''playing educational science games on a tablet'']'
  career_goals: Though still young, Alirio frequently talks about his future dreams. He aspires to become an astronaut who explores new planets, a scientist who discovers how things work, and an artist
    who paints vivid pictures that tell stories. He imagines using a telescope to study stars, building rockets with LEGO, and showcasing his own artwork in galleries. His competitive streak pushes him
    to imagine winning space‑exploration challenges and art contests.
