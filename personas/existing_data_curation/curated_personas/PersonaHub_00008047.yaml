persona_description: A survivor of the Holocaust who has lived in Washington State and is a witness to the impact of the Holocaust on their life. They have personal stories of survival, loss, and resilience
  that they share through the "Stories Among Us" exhibit at the Holocaust Center. They also have a deep understanding of the complexities of life during the Holocaust as demonstrated through the ordinary
  possessions of survivors, and they are knowledgeable about the issues surrounding the Holocaust. They are likely to appreciate the "Holocaust Sites" photo exhibit and the "Everyday Objects" exhibit, which
  provide a visual tour of various concentration camps and Holocaust-related areas in Europe.
