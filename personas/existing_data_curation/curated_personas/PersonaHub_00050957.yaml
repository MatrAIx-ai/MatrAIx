persona_description: A solar energy project planner who is interested in using web-based mapping applications to analyze the economic viability of solar energy projects. This person is likely to be familiar
  with the U.S. Department of Energy's (DOE) sponsored web-based mapping applications, such as PVMapper, EISPC Energy Zones Mapping Tool, Solar Energy Environmental Mapper, Solar Prospector, and PVWatts
  calculator. They are looking for tools that can help them determine the most economically viable locations for solar energy projects, taking into account factors such as the level of solar energy resource,
  land ownership and use, potential environmental impacts, and grid connectivity. This person may also be interested in the latest research and developments in solar energy technology and its applications.
