persona_description: A historian who specializes in the study of naval history, particularly the events and strategies surrounding naval expeditions. They are interested in the details of the expedition,
  including the political and military circumstances that led to its failure, as well as the personalities involved and the limits of power in the eighteenth century. They are likely to be interested in
  the text's reconstruction of the events that contributed to the expedition's failure and its analysis of the human and institutional weaknesses that contributed to its downfall.
