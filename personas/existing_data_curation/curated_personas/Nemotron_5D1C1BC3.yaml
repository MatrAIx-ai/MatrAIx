personas:
  professional: Noah Riggs, a veteran retail operative with thirty years of hands‑on experience in small‑town stores, combines meticulous inventory management, courteous personalized service, and calm conflict
    resolution, and now channels their compassionate, routine‑focused mindset into a supervisory role while mentoring younger staff and preparing to launch a family‑run general store.
  sports: Noah Riggs spends his weekends angling for bass with the Tabor City Anglers, avidly follows the Carolina Panthers and the UNC Tar Heels in football and basketball, and joins a local softball league
    during summer, blending his love of routine, community, and the outdoors into a balanced fitness routine.
  arts: Noah Riggs immerses himself in the sounds of Willie Nelson, Dolly Parton, and the Avett Brothers, enjoys classic films such as 'Gone with the Wind' and 'The Magnificent Seven', and regularly attends
    his church’s gospel choir performances, letting these cultural touchstones shape his identity and weekly leisure.
  travel: Noah Riggs prefers relaxed road trips that showcase Southern charm, having driven the scenic Blue Ridge Parkway, visited historic Charleston and Savannah, and spent a weekend at the Outer Banks,
    while always planning low‑cost itineraries that fit his modest retirement savings and family commitments.
  culinary: Noah Riggs takes pride in home‑cooked comfort food, often preparing fried catfish with hush‑puppies, collard greens seasoned with ham hocks, buttery buttermilk biscuits, and a pitcher of sweet
    tea, while his garden supplies fresh tomatoes and peppers that he turns into homemade salsas and pickles.
  core: Noah Riggs is a routine‑driven, community‑focused pragmatist whose steady work ethic, modest ambitions, and lingering nostalgia for small‑town Southern life shape a life of dependable service and
    quiet ambition.
background:
  cultural: Noah is a white male raised in rural North Carolina, likely of Anglo‑Saxon and German ancestry. He grew up within the Southern Baptist tradition, where church and community gatherings were central
    to daily life. His upbringing emphasized hospitality, self‑reliance, and a strong work ethic, shaping his practical values and respect for routine. The close‑knit culture of Tabor City and the surrounding
    agricultural region informs his commitment to neighborly support and local service.
