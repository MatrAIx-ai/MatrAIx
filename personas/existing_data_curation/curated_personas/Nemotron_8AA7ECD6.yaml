  career_goals: Alejandro’s next professional milestone is to earn his California Master Pipefitter credential and obtain a state‑issued plumbing contractor license within the next two years. He plans to
    lead a specialty crew that focuses on retrofitting older Long Beach homes with water‑saving, smart‑monitoring systems and solar‑thermal heating, combining his practical trade expertise with his curiosity
    about green technologies. In the medium term, he aspires to launch his own small‑scale, family‑owned plumbing firm that emphasizes safety, timely service, and mentorship of at‑risk youth from the local
    Guatemalan community. Ultimately, Alejandro envisions expanding the business into a regional contractor that not only provides high‑quality pipefitting but also runs a training apprenticeship program,
    allowing him to give back while securing a stable financial future for his aging parents back in Guatemala.
