personas:
  professional: A radiologic technologist, Ahmed Pitts leverages a deep grounding in physics and a flair for visual storytelling to optimize MRI and CT imaging while mentoring patients with clear, empathetic
    explanations, and their imaginative curiosity drives them to experiment with AI‑assisted workflow tools in pursuit of a future lead technologist and informatics role.
  sports: A dedicated fitness enthusiast, Ahmed Pitts practices weekly Vinyasa yoga, hikes with a local trail club in the Santa Monica Mountains, roots for the Los Angeles Lakers and LA Galaxy, and joins
    a weekend recreational soccer league to stay active.
  arts: An avid visual explorer, Ahmed Pitts spends weekends photographing low‑light urban scenes, admires the abstract works of Yayoi Kusama and the street murals of Banksy, attends indie shows featuring
    Tame Impala and Mitski, and channels this inspiration into digital illustrations using Photoshop and Blender.
  travel: Ahmed Pitts prefers thoughtfully planned escapes, having trekked Iceland’s volcanic landscapes and savored Tokyo’s neon nights, while dreaming of a photographic pilgrimage to Patagonia’s glaciers
    and the historic streets of Marrakech for future gallery‑inspired shoots.
  culinary: A culinary experimenter, Ahmed Pitts enjoys crafting Mediterranean mezze with fresh figs and rosemary‑infused olive oil, perfects homemade ramen broth with kombu and dried shiitake, and frequently
    orders specialty avocado toast at local cafés while occasionally over‑indulging in artisanal dark chocolate.
  core: A 42‑year‑old radiologic technologist, Ahmed Pitts blends scientific rigor with artistic curiosity, balancing methodical work and spontaneous creative pursuits, while juggling disciplined finances,
    modest health habits, and a relentless quest for visual and technological novelty.
background:
  cultural: Ahmed was raised in Inglewood, a culturally vibrant part of Los Angeles with a strong African‑American community. His family emphasized education, perseverance, and community involvement, values
    that have shaped his professional ethic and personal identity. He grew up surrounded by the music, visual arts, and civic activism that characterize the local Black culture, and he maintains connections
    to community churches and neighborhood festivals such as the annual Juneteenth celebration. While navigating a predominantly white field in medical imaging, Ahmed draws strength from his heritage, mentoring
    other Black professionals and advocating for greater representation in healthcare. His cultural roots influence his artistic sensibility, his commitment to service, and his appreciation for diverse
    perspectives.
attributes:
  skills: '["X‑ray operation","CT scanning","MRI operation","Radiation safety protocols","Patient communication","Quality control and assurance","DICOM and PACS management","Digital image processing","AI‑assisted
    imaging analysis","Equipment troubleshooting"]'
  hobbies: '["Photography","Digital art and graphic design","Reading speculative fiction and science journalism","Visiting art galleries and attending live music events","Yoga","Hiking","STEM outreach volunteering"]'
  career_goals: Ahmed aims to become a lead radiology technologist and eventually transition into a radiology informatics specialist, leveraging his curiosity for technology to implement AI‑driven workflow
    improvements. He plans to obtain advanced certifications in MRI and nuclear medicine, and to complete leadership training to supervise a team. He also hopes to contribute to community health by mentoring
    underrepresented youth interested in STEM and medical imaging. Long‑term, he envisions participating in clinical research projects that explore novel imaging techniques for early disease detection,
    and possibly teaching part‑time at a community college.
