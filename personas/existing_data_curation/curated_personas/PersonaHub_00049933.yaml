persona_description: A historian of the Catholic Church, particularly focused on the response of Catholics to the Nazi threat in Germany during World War II and the Cold War period. The person is interested
  in understanding the role of the Catholic Church in the context of the Holocaust and its impact on the Jews. They are knowledgeable about Vatican diplomacy and its relationship with the Jews, as well
  as the encyclical Meminisse Juvat and the defamation of Pope Pius XII. They are interested in exploring the limitations of statements alone in effecting change within society and are prepared to consider
  the role of the Catholic Church in the Cold War period.
