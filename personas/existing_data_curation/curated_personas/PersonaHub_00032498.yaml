persona_description: A scientist or engineer who specializes in the development and implementation of precision astronomical measurements using cryogenic reference bodies, cryogenic thermometry, and calibrator
  receivers. They are skilled in designing and constructing high-frequency astronomical instruments and have experience with cryogenic calibration techniques. They are interested in minimizing the effects
  of thermal gradients and minimizing the impact of receiver linearity on calibrator performance. They have a deep understanding of the physics and mathematics involved in cryogenic calibration and are
  skilled in using advanced measurement techniques to ensure the accuracy and reliability of their instruments.
