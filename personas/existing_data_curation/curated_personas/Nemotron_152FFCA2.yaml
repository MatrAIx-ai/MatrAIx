  hobbies: '["Literary Fiction Reading", "Historical Biographies", "Vegetable Gardening", "Indoor Plant Care", "Italian Cooking", "Trivia Nights", "Puzzle Solving", "Yoga", "Guided Meditation", "Volunteer
    Event Coordination at Museum"]'
  career_goals: Amelia aspires to transition from full‑time homemaking to a part‑time freelance writing and consulting role, focusing on arts and cultural organizations in Columbus. She wants to launch
    a blog and occasional podcast that spotlight local heritage sites, leveraging her research skills and competitive drive to become a recognized voice in the community. Additionally, she aims to take
    on a leadership position within a nonprofit board, where she can apply her organizational talents while cultivating greater financial independence. Personal development goals include completing a certificate
    in community outreach and mastering advanced digital marketing tools to enhance her professional profile.
