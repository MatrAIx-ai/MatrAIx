  hobbies: '[''Hiking and backpacking'', ''Fly fishing'', ''Woodworking'', ''Archery'', ''Wildlife photography'', ''Reading historical non-fiction'', ''Home brewing'', ''Volunteer trail maintenance'', ''Skeet
    shooting competitions'']'
  career_goals: Steven aims to expand McKean County's recreational offerings by securing grant funding for a multi‑use trail network and modernizing park facilities. He hopes to mentor younger staff, eventually
    transition into a senior recreation director role, and lay a lasting legacy of accessible outdoor programs before retiring. In parallel, he envisions launching a small guided‑tour business that blends
    his love of nature with his practical expertise.
