    library'', ''cooking traditional recipes'']'
  career_goals: Mary aims to formalize her education by completing a GED, which will enable her to enroll in community courses on genealogy and local history. She aspires to become a volunteer coordinator
    at the Hudson Falls senior center, where she can apply her organizational talents and compassion to expand programming for older adults. Additionally, she plans to document her family’s history in a
    memoir, sharing it at community events and local libraries. Maintaining her independence and health is important to her, so she seeks to stay physically active through regular gardening, walking the
    Hudson River Trail, and learning digital photography to capture the region’s natural beauty.
