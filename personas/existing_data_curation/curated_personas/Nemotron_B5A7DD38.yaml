  career_goals: He aims to complete his high school diploma and pursue a vocational program in emergency medical services, with the long‑term ambition of becoming an EMT and eventually a paramedic. His
    compassionate nature drives him to help others in urgent situations, and he envisions working in a community health setting where he can provide practical assistance and maintain public safety. Thomas
