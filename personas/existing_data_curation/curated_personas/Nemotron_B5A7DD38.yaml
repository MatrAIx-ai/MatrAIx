personas:
  professional: Thomas Bourff is a high‑school student‑athlete who juggles varsity basketball and soccer while regularly volunteering at the local community center, using their punctual, organized nature
    to coordinate events and tutoring sessions with reliable consistency.
  sports: Thomas Bourff is a dedicated member of the Spring Valley High basketball team and the Spring Valley Youth Soccer Club, a fervent fan of the New York Knicks and New York Giants, and spends weekends
    cycling familiar neighborhood routes for cardio and stress relief.
  arts: Thomas Bourff plays acoustic guitar in a small peer group that rehearses covers of Green Day’s ‘Basket Case,’ Twenty One Pilots’ ‘Stressed Out,’ and The Beatles’ ‘Let It Be,’ often practicing the
    same setlist daily, and they enjoy streaming indie concerts on YouTube for inspiration.
  travel: Thomas Bourff prefers structured weekend road trips to nearby destinations like the Hudson River Valley’s waterfalls and historic Philadelphia, balances school commitments with family travel budgets,
    and dreams of exploring the Smithsonian museums in Washington, D.C., while occasionally planning a future visit to Tokyo’s pop‑culture districts.
  culinary: Thomas Bourff loves cooking simple, repeatable meals such as spaghetti Bolognese with fresh basil, chicken teriyaki with soy sauce and ginger, and classic grilled cheese with cheddar, but they
    often over‑salt the sauce when rushing before homework, reflecting a practical yet slightly careless kitchen habit.
  core: Thomas Bourff blends disciplined routine with outgoing energy, turning everyday chores into group activities while secretly hoarding extra video game codes and occasionally procrastinating on homework.
background:
  cultural: Thomas is a white American teen raised in the suburban community of Spring Valley, Rockland County, New York. His family traces its roots to Northern European ancestry, with traditions that
    emphasize punctuality, self‑reliance, and community involvement. Growing up in a middle‑class neighborhood, he participates in typical American cultural practices—celebrating holidays such as Thanksgiving
    and Fourth of July, attending local high‑school sporting events, and engaging in neighborhood gatherings. The proximity to the diverse New York City metropolitan area exposes him to a broader cultural
    mix, but his household maintains traditional values, fostering a sense of routine, practicality, and cooperation that shapes his outlook.
