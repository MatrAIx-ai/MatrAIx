personas:
  professional: David Stoulig is an aspiring logistics coordinator who leverages his methodical planning, basic Python automation, and hands‑on repair skills to streamline volunteer event operations while
    studying for a CDL, embodying his practical curiosity and outgoing reliability in every dispatch.
  sports: David Stoulig guards the paint for the Fargo community basketball league, rows in early‑morning fishing trips on the Red River, snow‑mobile rides in winter, and roots for the Minnesota Vikings,
    Minnesota Twins, and the local Fargo‑Moorhead RedHawks while staying fit through weekly runs with the Red River Runners club.
  arts: David Stoulig frequents Fargo live‑music venues to see The Avett Brothers and Brandi Carlile, enjoys comedy nights featuring John Mulaney, supports community theater productions like The Good Man,
    and collects vinyls from indie folk artists, all of which fuel his creative side and provide social bonding after a hard week of organizing events.
  travel: David Stoulig prefers self‑planned road trips that blend outdoor adventure and budget‑friendly stops, having camped in Badlands National Park, fished on Lake of the Woods, and visited Chicago’s
    music scene, while dreaming of a cross‑country drive to the Canadian Rockies and a future vacation in Iceland’s volcanic landscapes.
  culinary: David Stoulig enjoys home‑brewing craft ales alongside cooking hearty dishes like smoked trout with wild rice, beef brisket tacos topped with fresh cilantro and lime, and occasional buffalo
    wings, boasting solid intermediate cooking skills that let them experiment with malted barley, hops, and a dash of smoked paprika for flavor depth.
  core: David Stoulig blends methodical logistics expertise with a love for community, outdoor thrills, and home‑brewed ales, all while juggling a disciplined budget and a penchant for late‑night basketball
    games that sometimes delay sleep.
background:
  cultural: David grew up in Fargo, North Dakota, a region shaped by the Great Plains heritage of modesty, hard work, and community solidarity. While ethnically white, his family history includes German
    and Scandinavian roots common to the area, fostering values of self‑reliance, punctuality, and respect for tradition. The local culture emphasizes participation in high school sports, seasonal festivals,
    and a strong sense of civic involvement. Religious influences are typically Protestant, with community gatherings often centered around church and local events. This Midwestern backdrop blends practical
    pragmatism with a warm, sociable spirit that informs David’s outlook and daily life.
