  hobbies: '[''Basketball (recreational league)'', ''Community volunteer events'', ''Fishing'', ''Snowmobiling'', ''DIY woodworking'', ''Homebrewing'', ''Live music concerts'', ''Comedy shows'', ''Attending
    the Fargo‑Moorhead State Fair'', ''Board games with friends'']'
  career_goals: David aims to secure a stable career that blends his practical skills and love for organization. His primary goal is to attain a commercial driver’s license (CDL) and transition into long‑haul
    trucking, leveraging his reliability and enthusiasm for the open road. Simultaneously, he is exploring a certification in facilities or property management to apply his hands‑on maintenance abilities
    and logistical strengths. Over the next 12–18 months, he plans to enroll in community‑college courses in logistics and supply‑chain management, with the ambition to become a logistics coordinator for
    a regional distribution center. He also hopes to take on leadership roles within local volunteer organizations, eventually managing a youth sports program to give back to his community.
