  hobbies: '["Senior fitness classes","Community soccer league","Volunteer work at parish Día de los Muertos events","Cooking traditional Mexican cuisine","Hosting potluck gatherings","Hiking in Angeles
    National Forest","Vegetable gardening","Listening to ranchera music","Reading medical journals"]'
  career_goals: Jose aims to transition into a lead nursing assistant role where he can shape unit policies, oversee staff scheduling, and champion patient‑centered care initiatives. He plans to obtain
    a Certified Nursing Assistant (CNA) credential and enroll in a bachelor's program in nursing to eventually become a registered nurse, focusing on geriatric care. In the short term, he wishes to develop
    a community outreach program that provides health education and basic screenings for Spanish‑speaking seniors in Santa Clarita, leveraging his cultural insight and organizational talents. Ultimately,
    Jose hopes to leave a legacy of improved care standards and a supportive mentorship network for younger healthcare professionals.
