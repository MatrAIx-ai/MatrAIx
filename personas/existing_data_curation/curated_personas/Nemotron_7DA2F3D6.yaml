personas:
  professional: Jose Sandoval is a seasoned nursing assistant with over three decades of acute and long‑term care experience; they leverage bilingual fluency, meticulous organization, and a competitive
    drive to lead quality‑improvement projects, mentor new staff, and champion evidence‑based protocols that elevate patient safety.
  sports: Jose Sandoval stays active through a senior fitness class at the community center, a weekly mixed‑age soccer match that fuels their competitive spirit, and weekend hikes on the Angeles National
    Forest trails, all while cheering for the LA Galaxy and proudly wearing the Dodgers cap on game days.
  arts: Jose Sandoval’s artistic side finds expression in classic ranchera songs by Vicente Fernández and José Alfredo Jiménez, occasional visits to performances at the Santa Clarita Playhouse, and a habit
    of collecting vintage vinyl records that line their living‑room shelf, reinforcing a nostalgic yet disciplined appreciation of cultural music.
  travel: Jose Sandoval plans trips with the same meticulous detail they use at work, favoring organized group tours to destinations like Oaxaca for its culinary heritage, the red‑rock canyons of Sedona,
    and Kyoto’s zen gardens, while budgeting carefully to keep retirement funds intact.
  culinary: Jose Sandoval is a proficient home chef who perfects mole using pasilla, mulato, and ancho chilies, cocoa, and almonds, rolls hand‑made tamales with masa harina and chicken filling, and hosts
    monthly potluck nights where guests rave about the smoky chipotle salsa that always has a secret dash of cinnamon.
  core: Jose Sandoval blends disciplined organization, competitive vigor, and community‑centric generosity into a life where nursing, soccer, and mole‑making coexist with a relentless schedule and a penchant
    for double‑checking every detail.
background:
  cultural: Jose was born to Mexican immigrant parents who settled in Southern California in the 1960s. Raised in a bilingual household, he grew up speaking Spanish at home while attending English‑language
    schools, giving him a deep appreciation for both cultures. Family gatherings centered around shared meals, religious celebrations, and storytelling, instilling values of respect for elders, communal
    responsibility, and a strong work ethic. These cultural roots influence his compassionate approach to patient care and his commitment to serving the Hispanic community in Santa Clarita. He maintains
    ties to his heritage through participation in local cultural festivals, cooking family recipes, and supporting a neighborhood church that offers services in both languages.
attributes:
  skills: '["Patient vital sign assessment","Mobility assistance and transfer techniques","Wound care and dressing changes","Basic medication support under RN supervision","Bilingual communication (English/Spanish)","Electronic
