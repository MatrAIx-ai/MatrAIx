persona_description: A pediatrician or neurologist who specializes in the diagnosis and treatment of febrile fits, particularly in children. They have experience with different types of febrile fits and
  are knowledgeable in predicting future attacks based on the type of fit. They are skilled in the management of febrile fits and are able to distinguish between simple and typical febrile fits. They have
  a unique understanding of the neurological and genetic factors that may contribute to atypical febrile fits.
