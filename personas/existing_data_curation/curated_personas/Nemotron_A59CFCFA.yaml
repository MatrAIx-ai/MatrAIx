personas:
  professional: Gerald Snapes, a 62‑year‑old humanities professor at a Columbus university, leverages three decades of expertise in American and African American history, curriculum development, and educational
    technology to design structured, engaging courses, while his preference for predictability and practical mindset ensures meticulous syllabus planning and reliable mentorship of emerging faculty.
  sports: Gerald Snapes stays active by walking with a local senior walking club along the Scioto Mile, supports the Columbus Blue Jackets during the hockey season and the Ohio State Buckeyes football team
    year‑round, and occasionally joins casual chess‑themed fitness games at the community center.
  arts: Gerald Snapes immerses in the arts by attending jazz performances by the Columbus Jazz Orchestra, gospel concerts featuring the Southern Gospel Choir, and theater productions of August Wilson’s
    plays, while curating a personal photography series inspired by Walker Evans’ historic vistas.
  travel: Gerald Snapes plans purposeful trips with meticulous research, favoring historic Southern destinations such as Monticello, Birmingham’s civil‑rights landmarks, and Charleston’s ante‑bellum districts,
    while also enjoying weekend getaways to Hocking Hills for nature photography, balancing a modest travel budget with a deep love for storytelling.
  culinary: Gerald Snapes, an adept home cook, delights in preparing Southern comfort dishes like shrimp and grits, collard greens seasoned with smoked ham hocks, and peach cobbler, sourcing fresh tomatoes
    and sweet corn from his garden, and often pairs meals with homemade iced tea infused with fresh mint.
  core: Gerald Snapes, a structured yet subtly adventurous scholar, blends disciplined academic rigor with a lifelong love for historic preservation, garden‑grown meals, and occasional jazz improvisations,
    while habitually misplacing their reading glasses on the kitchen counter.
background:
  cultural: Gerald was raised in a close‑knit African American community in the Deep South, where church, family, and oral tradition shaped his worldview. His cultural heritage blends the rich legacy of
    Southern African American music, storytelling, and community solidarity with a strong belief in education as a vehicle for empowerment. He frequently incorporates gospel hymns, ancestral narratives,
    and the values of communal service into his teaching and public engagements, honoring both his personal lineage and the broader cultural tapestry of the region.
