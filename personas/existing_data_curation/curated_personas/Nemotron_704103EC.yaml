  career_goals: Blanca aims to advance to an HR Director role within the next five years, spearheading strategic initiatives that integrate cutting‑edge technology and foster a culture of continuous learning.
    She plans to earn the SHRM‑SCP credential, pursue an executive MBA, and lead a company‑wide diversity and inclusion transformation. Long‑term, she envisions establishing her own boutique HR consulting
    practice focused on innovative talent management for midsize firms.
