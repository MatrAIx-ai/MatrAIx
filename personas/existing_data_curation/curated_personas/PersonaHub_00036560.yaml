persona_description: A hydrologist and geologist who specializes in the study of riparian zones in semi-arid regions, particularly in understanding the relationship between evapotranspiration and water
  table levels in shallow, unconfined aquifers. He is interested in the use of analytical solutions to estimate water fluxes and aquifer parameters from well hydrographs, and has published research on this
  topic. He is particularly interested in the Boise Hydrogeophysical Research Site, where he has conducted research on the behavior of water in riparian zones.
