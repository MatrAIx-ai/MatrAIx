persona_description: A professional forester who works for the timber industry, government agencies, conservation groups, local authorities, urban parks boards, citizens' associations, and private landowners.
  They are responsible for developing and implementing forest management plans, focusing on timber management, reforestation, maintaining forests at prime conditions, and fire control. They consider future
  conditions of the stand after any recommended harvests treatments, including future treatments, and plans for natural or artificial regeneration after final harvests. They also participate in wildlife
  conservation planning and watershed protection.
