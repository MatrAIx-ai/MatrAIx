persona_description: A researcher or statistician who specializes in the study of malnutrition and its impact on children in urban areas of the Philippines, particularly in the province of Leyte. The individual
  is likely to have a deep understanding of the local socio-economic conditions, feeding habits, and sanitation practices in the area, as well as the prevalence of infectious diseases related to poor sanitation.
  They may also have experience with nutrition programs and intervention methods, and be familiar with the use of per cent change in Gomez classification to control for differences in population movement
  and mothers' employment. They would be interested in comparing the findings of the Nutri-Bus study with national findings and using it to inform policy and programmatic decisions.
