  hobbies: '[''Fishing'', ''Woodworking'', ''Reading (business and self‑help books)'', ''Gardening'', ''Guided meditation'', ''Local history research'']'
  career_goals: Charles aims to transition from his current managerial role into a senior operations director position within the next five years, focusing on driving strategic efficiency across multiple
    locations. He is interested in obtaining a PMP certification to formalize his project management knowledge and plans to mentor emerging supervisors to build a resilient, well‑structured team culture.
    Long‑term, he envisions launching a boutique consultancy that helps mid‑size businesses streamline operations while offering workshops on stress management for leaders, integrating his personal experience
    with anxiety into a professional service offering.
