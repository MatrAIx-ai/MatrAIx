  career_goals: Clarence envisions a future where he can blend his love for art and technology. He aspires to attend a high school with a strong visual‑arts program and later pursue a college degree that
    combines a Bachelor of Fine Arts with computer science. His long‑term ambition is to become a concept artist or visual designer for video games or animated films, creating immersive worlds that reflect
    his fascination with new ideas and unconventional thinking. He also dreams of illustrating children’s books that encourage curiosity and quiet reflection.
