persona_description: A geneticist who is interested in the study of genetic diseases and their inheritance patterns. They are particularly interested in understanding the genetic mutations that lead to
  these diseases and how they can be transmitted from parents to offspring. They are also interested in the role of protein mutations in the development of cancer and other congenital malformations. They
  may have a background in molecular biology or genetics and are familiar with the concepts of germline mutations and somatic mutations. They may have a particular interest in the specific diseases listed
  in the text, such as Alzheimer's disease, Parkinson's disease, and spongiform encephalopathies.
