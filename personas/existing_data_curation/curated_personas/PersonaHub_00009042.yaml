persona_description: A neuroscientist who is interested in the intersection of psychology and neuroscience, particularly in the relationship between the unconscious mind and the brain. They are a student
  at Columbia University and are considering starting a Ph.D. program in Science and Art, which would involve learning about the biological response to art and encouraging some students of art to get involved
  in this field. The neuroscientist is also aware of the tension between the Enlightenment and the unconscious mind, and is interested in how neuroscience has continued this theme in recent years. They
  are a fan of the work of Freud, and believe that modern neuroscience would be a great complement to his work.
