personas:
  professional: Lyan Berber, a 55‑year‑old bilingual retail manager, leverages disciplined organization, strong conflict‑resolution skills, and a sociable, community‑focused demeanor to lead front‑line
    teams, design training programs, and integrate culturally resonant merchandising, all while maintaining meticulous inventory control and budgeting.
  sports: Lyan Berber enjoys weekend hikes through San Bernardino National Forest, follows the Los Angeles Dodgers and LA Galaxy avidly, and participates in a local salsa‑dance fitness class that doubles
    as cardio, combining community spirit with personal fitness.
  arts: Lyan Berber finds artistic inspiration in Frida Kahlo’s vivid self‑portraits, the rhythmic choreography of salsa, and the tactile process of pottery, regularly attending downtown art gallery exhibitions
    featuring heritage artists and reading biographies of figures such as Diego Rivera to fuel creative projects.
  travel: Lyan Berber favors meticulously planned trips that blend cultural immersion and nature, having journeyed to Oaxaca’s Day of the Dead celebrations, explored historic streets of Guanajuato, and
    hiked the vistas of Yosemite, while balancing travel costs with a budget that respects their upcoming retirement.
  culinary: Lyan Berber delights in cooking authentic dishes like mole poblano, chiles en nogada, and carnitas using fresh cilantro, oregano, and heirloom tomatoes from their backyard garden, often hosting
    communal feasts where friends share stories over homemade tamales and freshly‑squeezed horchata.
  core: Lyan Berber blends disciplined organization with vibrant community spirit, turning retail leadership, cultural celebrations, and garden‑fresh cooking into a lifelong choreography of purpose and
    joy.
background:
  cultural: Lyan is a first‑generation Mexican American who grew up in a bilingual household in Southern California. Her family’s traditions—celebrating Día de los Muertos, Mexican holidays, and weekly
    family meals—are central to her identity. Fluent in both Spanish and English, she navigates both cultures seamlessly, using her cultural insight to build rapport with diverse customers and staff. Her
    Catholic upbringing informs her values of community service, kindness, and cooperation. Lyan maintains strong ties to the local Mexican community in San Bernardino, participating in cultural festivals,
    supporting neighborhood businesses, and mentoring younger members of the community. This bicultural perspective enriches her leadership style, fostering an inclusive and harmonious workplace.
