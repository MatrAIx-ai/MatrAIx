  career_goals: Lyan is driven to move from first‑line supervision to a store‑manager position and ultimately to a district‑manager role overseeing multiple locations in Southern California. She aims to
    develop a comprehensive mentorship program that cultivates future retail leaders, especially those from bilingual or multicultural backgrounds. Lyan also seeks to integrate Mexican cultural celebrations,
    such as Día de los Muertos and Mexican Independence Day, into the store’s marketing and visual merchandising strategies to deepen community connections. In the longer term, she envisions opening a family‑run
    boutique that blends traditional Mexican artisan goods with contemporary retail practices, leveraging her expertise to create a culturally resonant shopping experience.
