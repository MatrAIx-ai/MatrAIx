persona_description: Annie O'Connell, a sleep education specialist who has been facilitating training of allied health professionals and educators since 2005 in sleep education, assessing a sleep disturbance,
  developing and monitoring a sleep plan for individual families. She has a unique expertise in the field of sleep and its impact on children with developmental disabilities, including the importance of
  sleep for cognitive development, emotional well-being, and overall health. Annie's webinars are designed to increase knowledge, skill, and confidence among allied health professionals and educators in
  supporting families with children and teenagers with sleep difficulties. Her goal is to help professionals develop better sleeping patterns for their families' children with a family-centered individualized
  sleep plan. Annie's background and expertise make her an ideal resource for professionals seeking to improve the quality of life for families with children and teenagers experiencing sleep disturbances.
