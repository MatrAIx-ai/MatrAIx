  hobbies: '[''painting'', ''creative writing'', ''poetry'', ''reading speculative fiction'', ''reading philosophy'', ''visiting museums'', ''gardening'', ''origami'', ''crochet'', ''walking along the Arkansas
    River'']'
  career_goals: Margaret aims to turn her artistic passions into a modest, community‑oriented vocation. Over the next few years she hopes to complete a GED, enroll in evening art classes at a local community
    college, and develop a small‑scale home studio where she can produce original artwork for sale at local markets and online. She aspires to organize regular free art‑therapy workshops for seniors and
    teenagers in Tulsa, and eventually curate a community mural project that celebrates the city’s cultural diversity. While she does not seek a conventional full‑time job, she wishes to achieve financial
    independence through her art and to be recognized as a trusted creative mentor within her neighborhood.
