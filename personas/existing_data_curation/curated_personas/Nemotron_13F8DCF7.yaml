personas:
  professional: Collins Stewart, a budding construction apprentice, leverages their methodical nature and artistic curiosity to excel at reading blueprints, coordinating site tasks, and drafting innovative
    design sketches that blend sturdy carpentry with avant‑garde aesthetics.
  sports: Collins Stewart, a regular at Alva Community Park’s basketball courts and member of the Alva Youth Basketball Club, drills with a competitive edge while cheering for the Chicago Bulls, keeps a
    balanced fitness routine with weekend runs and occasional gym sessions, and uses the sport’s teamwork lessons to sharpen their leadership aspirations on construction sites.
  arts: Collins Stewart, who spends evenings sketching waterfront vistas, experimenting with street‑art stencils inspired by Banksy, snapping construction‑site photographs in the style of Ansel Adams, devouring
    sci‑fi classics like Dune, and listening to indie bands like Arcade Fire and classic rock icons such as Led Zeppelin, channels this eclectic artistic intake into design concepts for future custom homes.
  travel: Collins Stewart, a budget‑conscious teen who prefers road‑trip planning over spontaneous flights, has explored the Great Lakes shoreline in Michigan, hopes to wander Barcelona’s Gaudí‑laden streets
    and Portland’s thriving DIY art scene, and balances travel ambitions with weekend visits to nearby state parks that fuel their sketchbook inspirations.
  culinary: Collins Stewart, a competent home‑cook with a knack for grilling salmon with lemon‑dill sauce, assembling smoky pepperoni pizza on a handcrafted wooden board, and spicing up ramen with fresh
    basil and avocado, often pairs meals with craft sodas, but habitually raids the pantry for extra energy drinks after late‑night gaming sessions.
  core: Collins Stewart is a disciplined 18‑year‑old construction enthusiast who blends a competitive drive with artistic flair, meticulously budgets his earnings while indulging in sketchbooks and gaming,
    and tackles both blueprints and basketball courts with equal precision.
background:
  cultural: Collins grew up in Alva, a small town in Lee County, Florida, within a working‑class, Southern‑American environment where hard work and community ties are valued. His family has a tradition
    of trades and manual labor, shaping his early exposure to construction and hands‑on problem solving. The region's blend of rural charm, Gulf Coast influences, and proximity to a diverse tourist population
    has introduced him to a variety of cultural events, from local art festivals to community picnics, nurturing his curiosity for unconventional ideas while grounding him in the pragmatic, modest ethos
    of his hometown.
