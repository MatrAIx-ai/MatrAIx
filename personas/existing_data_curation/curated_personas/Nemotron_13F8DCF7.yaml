  career_goals: Collins aims to earn his GED within the next year and enroll in a vocational apprenticeship to become a certified journeyman carpenter. He aspires to progress to a foreman role, gaining
    leadership experience while still applying his organized, competitive drive to improve site efficiency. Long‑term, he envisions starting his own custom‑home building firm that integrates sustainable
    practices with artistic design elements, allowing him to blend his technical expertise and appreciation for unconventional aesthetics.
