  parts of a garden and matching them with appropriate plant selections. They are also knowledgeable about the potential negative impacts of soil disturbance on trees and are skilled in modifying the canopy
  to improve light penetration and create partial shade. They have a deep understanding of the concepts and theories related to plant growth and their impact on shading conditions, and they are skilled
  in using this knowledge to create visually appealing and functional garden designs.
