personas:
  professional: Betty Smith, a budding junior illustrator, channels their curiosity and competitive spark into detailed animal sketches and structured LEGO constructions, treating each artwork like a mini‑project
    with a deadline.
  sports: Betty Smith plays on the local Maple Grove Youth Soccer Club, favoring the forward position where their competitive edge shines, and they also enjoy weekend hikes in the county park tracking rocks
    and leaves, though they shy away from large‑crowd sporting events.
  arts: Betty Smith devotes after‑school hours to creating collages from found objects, drawing inspiration from illustrator Mary Blair and fantasy author J.K. Rowling’s vivid worlds, and they eagerly attend
    community library storytime to discuss illustrated books with a few close friends.
  travel: Betty Smith dreams of exploring the Redwood National Forest and has already visited the nearby state museum and a weekend trip to the beach, preferring small family outings over crowded amusement
    parks, and they meticulously map each destination in their sketchbook.
  culinary: Betty Smith loves assembling animal‑shaped veggie sandwiches with cucumber, cheese, and hummus, enjoys nibbling on apple slices with peanut butter, and occasionally indulges in pepperoni pizza,
    though they tend to forget to brush their teeth after sugary treats.
  core: Betty Smith is a curious, competitively spirited nine‑year‑old who balances meticulous art projects with spontaneous nature adventures, all while guarding a tightly managed allowance and a modest
    collection of allergy sniffles.
background:
  cultural: Betty Rose was born and raised in Collinsville, Illinois, a small Midwestern town with a strong sense of community. Her family's traditions reflect classic American, Midwestern values—emphasis
    on family gatherings, participation in community festivals such as the annual St. Louis County Fair, and frequent visits to the local public library and the Collinsville Historical Society museum. Attending
    a public elementary school that stresses reading, math, and creative arts, she has been encouraged to explore both artistic and scientific interests. The town's cultural fabric, characterized by modesty,
    practicality, and an appreciation for local history and nature, shapes her worldview and fuels her curiosity about art, science, and the natural environment.
