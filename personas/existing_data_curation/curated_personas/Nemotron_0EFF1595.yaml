  career_goals: Betty Rose dreams of exploring careers that blend her love of art and curiosity about the world. She hopes one day to become a children's book illustrator, a museum curator, or a wildlife
    photographer—roles that would let her share stories and discoveries with others. She also entertains the idea of becoming a scientist or an astronomer, inspired by school science projects and a desire
    to solve mysteries. Her competitive nature drives her to aim for awards in school art contests and science fairs, hoping to prove her ideas and creations.
