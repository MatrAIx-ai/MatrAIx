personas:
  professional: Lula Walker is a 15‑year‑old aspiring tech storyteller who channels a competitive curiosity into crafting Scratch mini‑games and speculative short stories, and they meticulously balance
    school responsibilities with a flexible schedule that accommodates both disciplined revisions and impromptu bursts of imagination, while staying skeptical of shortcuts that might compromise quality.
  sports: Lula Walker trains with the Queens Youth Track Club for the 400‑meter dash, idolizes the New York Knicks and follows the New York Giants, and they balance intense interval workouts with solitary
    sprint drills that reflect their competitive drive and need for personal improvement.
  arts: Lula Walker immerses in contemporary R&B by streaming H.E.R. and SZA, plays the keyboard at family gatherings, and they draw inspiration from speculative fiction authors like N.K. Jemisin and Octavia
    Butler, often weaving gospel harmonies learned in the church choir into their storytelling.
  travel: Lula Walker prefers carefully planned weekend trips that blend cultural immersion with adventure, having explored Jamaica to visit relatives and taken a school field trip to Washington, D.C.,
    and they dream of a tech‑focused visit to Tokyo, all while budgeting within a teen savings plan.
  culinary: Lula Walker loves cooking Caribbean‑inspired dishes such as jerk chicken with mango salsa and Dominican arroz con pollo, experimenting with bold spices while listening to R&B playlists, and
    they often forget to set timers, leading to occasional over‑cooked rice.
  core: Lula Walker is a competitive, curious teen who balances tech‑savvy storytelling with disciplined budgeting, and they wrestle with anxiety and a habit of over‑cooking.
background:
  cultural: Lula grew up in a close-knit African-American family in Queens, New York, where extended relatives, church gatherings, and neighborhood block parties shape her sense of identity. Her mother,
    a school administrator, instilled a strong emphasis on education and resilience, while her grandparents share stories of the civil rights era, fostering an awareness of her heritage. The multicultural
    fabric of Queens exposes her to Caribbean rhythms, Latin cuisine, and a diversity of languages, encouraging openness and adaptability. Participation in the church choir introduced her to gospel music
    and community service, reinforcing values of solidarity and collective uplift. This blend of cultural pride, intergenerational mentorship, and urban diversity informs Lula’s worldview and fuels her
    ambition to give back to similarly vibrant communities.
