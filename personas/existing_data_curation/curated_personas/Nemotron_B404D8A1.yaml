  career_goals: Motivated by her curiosity and desire for tangible impact, Lula aspires to pursue a career in biomedical engineering, where she can merge scientific inquiry with real-world solutions for
    health disparities. She aims to earn a scholarship to a STEM-focused high school, then study engineering at a university that offers strong research opportunities. Lula hopes to eventually develop low-cost
    medical devices that serve under-represented communities, combining her competitive drive with her commitment to making a practical difference. Alongside her primary goal, she remains open to roles
    in tech entrepreneurship or public health advocacy, seeing them as avenues to leverage her problem-solving skills while ensuring financial stability.
