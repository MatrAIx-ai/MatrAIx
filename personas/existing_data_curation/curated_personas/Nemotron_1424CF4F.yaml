  hobbies: '[''Karaoke'', ''Hiking'', ''Health and wellness blogging'', ''Cooking'', ''Volunteer coordination at community health fairs'', ''Public speaking at workshops'']'
  career_goals: Stephanie aims to enroll in a Doctor of Pharmacy (PharmD) program within the next two years, targeting admission to a top California school. She envisions progressing from pharmacy technician
    to licensed pharmacist, eventually assuming a supervisory or managerial role within a community pharmacy. Long‑term, she aspires to open her own boutique pharmacy that integrates health education, nutritional
    counseling, and community outreach programs, leveraging her humanities training to communicate complex health information in accessible ways. She is also interested in contributing to health policy
    discussions, particularly around medication safety and patient education, and plans to pursue certifications in pharmaceutical care and health advocacy.
