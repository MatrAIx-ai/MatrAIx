  career_goals: She aims to obtain her GED to formalize her education, launch a home‑based catering service that showcases soul‑food recipes, and lead a support group for Black women coping with anxiety
    and grief. Additionally, Princess wants to mentor at‑risk youth through a community center, become a volunteer liaison for senior services in Clayton County, and develop a neighborhood community garden
    that combines her love of gardening with practical food security.
