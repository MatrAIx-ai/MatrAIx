  hobbies: '[''Listening to Afrobeat, R&B, and indie music'', ''Cooking Ghanaian and fusion dishes'', ''Journaling with illustration'', ''Walking in nature (Rock Creek Park)'', ''Volunteer work at community
    garden'', ''Yoga and mindfulness meditation'', ''Attending cultural festivals and dance events'', ''DIY upcycling projects'', ''Blogging/vlogging about food and culture'']'
  career_goals: She aims to secure an entry‑level role in customer service or community outreach that offers a flexible schedule while she completes a GED and later an associate degree at Montgomery College.
    In the medium term, Lolitha aspires to become a community health worker or case manager focusing on mental‑health support for young adults, leveraging her empathy and personal experience with stress.
    She also dreams of launching a small side business selling homemade Ghanaian‑inspired sauces and handcrafted accessories, allowing her to blend creativity with cultural heritage. Ultimately, she seeks
    a career path that provides financial stability, personal growth, and the ability to give back to her local community.
