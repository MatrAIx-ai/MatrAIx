  hobbies: '[''Woodworking'', ''Model Railroading'', ''Fishing'', ''Reading Historical Non‑Fiction'', ''Church Community Service'', ''Chess'', ''Attending Local Sports Events'', ''Gardening'']'
  career_goals: Sean aims to transition into a supervisory role within the finance department, such as senior finance clerk or finance team lead, where he can mentor junior staff and improve operational
    efficiency. He is pursuing a Certified Bookkeeper credential to formalize his expertise. In the longer term, he hopes to secure a stable retirement by attaining a senior finance position focused on
    process optimization, and eventually offering consulting services to small businesses in his community on financial management.
