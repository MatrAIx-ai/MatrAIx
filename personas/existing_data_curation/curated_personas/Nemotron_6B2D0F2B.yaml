personas:
  professional: Sang Wang leverages three decades of retail management expertise—mastering sales forecasting in Excel, visual merchandising, and frontline coaching—to transform independent stores into data‑driven,
    art‑inspired experiences, all while juggling a laid‑back attitude toward deadlines and a competitive edge that drives innovative solutions.
  sports: Sang Wang leads a vibrant senior cycling club that tackles the Mississippi River Trail every weekend, cheers on the Minnesota Vikings and Minnesota Twins while donning the team colors, and balances
    the occasional yoga class at the community center to maintain flexibility despite occasional knee creaks.
  arts: Sang Wang spends Saturdays immersing themselves in the Minneapolis Institute of Art, curating a personal collection of Asian contemporary prints from artists like Nam June Paik and Lee Bul, and
    shares street‑photography snapshots of Saint Paul’s murals on a local photo club forum, all while hosting spirited board‑game nights that double as informal art critiques.
  travel: Sang Wang prefers a blend of structured road trips to nearby art fairs in Wisconsin and spur‑of‑the‑moment flights to historic cities like Kyoto and Florence, navigating a modest travel budget
    while satisfying a lifelong curiosity about world art and architecture.
  culinary: Sang Wang’s kitchen is a playground for Asian‑American fusion experiments, where they whip up bulgogi tacos, kimchi‑infused fried rice, and gochujang‑marinated grilled bok choy, all seasoned
    with freshly harvested cilantro from their backyard garden, while occasionally indulging in hearty Midwestern comfort foods like hotdish during board‑game evenings.
  core: Sang Wang is a charismatic, art‑obsessed retiree who blends retail savvy with a laid‑back yet competitive spirit, cycling through life’s trails while juggling spontaneous spending, careful investing,
    and a garden that fuels experimental fusion dishes.
background:
  cultural: Sang Soon is a second‑generation Korean‑American whose parents immigrated to the Midwest in the 1970s. Raised in a bilingual household in Minnesota, he grew up celebrating traditional holidays
    such as Chuseok and Lunar New Year while fully participating in American school and community life. This bicultural upbringing instilled a strong work ethic, respect for education, and a deep appreciation
    for Asian art, music, and culinary traditions. He remains active in the local Korean community, attending cultural festivals and supporting Korean language classes, but he also embraces the broader
    Midwestern values of openness and volunteerism, reflecting a blended identity that informs both his professional and personal pursuits.
