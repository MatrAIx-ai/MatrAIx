  career_goals: Approaching retirement, Sang Soon aims to transition from store‑level supervision to a regional consulting role, helping small independent retailers adopt data‑driven strategies and innovative
    merchandising concepts. He plans to launch a quarterly workshop series titled "Retail Frontiers" that blends pragmatic sales tactics with creative, art‑inspired store layouts. Additionally, he hopes
    to serve on the board of a local arts nonprofit, leveraging his business acumen to secure funding and increase community engagement. His ultimate ambition is to leave a legacy of modernizing retail
    practices while championing cultural expression in commercial spaces.
