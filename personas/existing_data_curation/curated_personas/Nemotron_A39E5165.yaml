personas:
  professional: Michael Habbal, a retired middle‑school teacher and former curriculum coordinator, now channels their methodical, structure‑loving mindset into designing senior‑focused educational workshops,
    coordinating volunteer programs at the Gilroy Historical Society, and building a mentorship network that pairs retired educators with active teachers.
  sports: Michael Habbal stays fit by walking the Diablo Range foothills five times a week, participates in the Gilroy Seniors Hiking Club, roots for the San Jose Sharks and San Francisco Giants, and they
    occasionally join a local pickleball league that meets at the senior center during winter.
  arts: Michael Habbal expresses creativity through woodworking furniture pieces inspired by mid‑century modern design, attends weekly wine‑tasting events where they discuss the works of Bob Dylan and Claude
    Monet, and enjoys watching classic films starring Audrey Hepburn at the Gilroy Community Theater.
  travel: Michael Habbal prefers well‑planned, low‑stress trips that blend cultural immersion with gentle adventure, such as a weekend vineyard tour in Napa Valley, a spring road trip to the historic town
    of Sonoma, and a summer visit to the Mediterranean coast of Spain to explore olive groves, all while coordinating schedules around their grandchildren’s school calendar.
  culinary: Michael Habbal teaches Mediterranean cooking classes featuring dishes like eggplant moussaka, grilled lamb kofta with rosemary, and tabbouleh salad, using fresh olive oil, sun‑dried tomatoes,
    and locally sourced herbs, and they relish pairing each meal with a carefully selected regional wine.
  core: Michael Habbal is a meticulously organized retiree who blends their love for community education, gardening, and woodworking with a steady stream of worry‑driven financial check‑ins and a habit
    of over‑planning every social outing.
background:
  cultural: Michael is a second‑generation Lebanese‑American whose family has lived in California since the 1950s. Raised in a Catholic Lebanese household, he grew up celebrating both American holidays
    and traditional Middle‑Eastern festivities, speaking English fluently and learning Arabic phrases from his parents. The blend of Mediterranean family values and the progressive, multicultural environment
    of Santa Clara County shaped his appreciation for community service, education, and cultural exchange.
