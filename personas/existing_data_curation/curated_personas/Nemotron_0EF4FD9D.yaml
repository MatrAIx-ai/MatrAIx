  career_goals: Leslie aims to transition into a district‑level curriculum specialist role where she can champion entrepreneurship and financial‑literacy programs across schools in York County. She plans
    to develop an after‑school mentorship initiative that pairs middle‑school students with local small‑business owners, author a practical guidebook for teachers on integrating business concepts into early
    education, and later serve on the county’s education advisory board to influence policy. Throughout, she seeks to maintain the flexibility and low‑stress balance that aligns with her personal well‑being
    philosophy.
