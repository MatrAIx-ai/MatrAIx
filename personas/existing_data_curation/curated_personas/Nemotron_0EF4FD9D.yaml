personas:
  professional: Leslie Jordan, a veteran elementary and middle school teacher turned curriculum innovator, leverages data‑driven assessment and interdisciplinary lesson design to embed entrepreneurship
    and financial literacy into classrooms while mentoring novice educators and navigating school budgets with a relaxed, flexible approach.
  sports: Leslie Jordan enjoys weekend hikes on the Shenandoah National Park trails, supports the Washington Capitals and the Virginia Tech Hokies, and rounds out an active lifestyle by participating in
    a local senior walking club while keeping a competitive edge through weekly bridge tournaments.
  arts: Leslie Jordan finds creative solace attending performances by the Colonial Williamsburg Symphony, devouring historical fiction novels like Hilary Mantel’s 'Wolf Hall' and business biographies such
    as 'Shoe Dog,' while also curating a modest collection of folk vinyl records from artists like The Avett Brothers.
  travel: Leslie Jordan’s travel style blends methodical planning and spontaneous detours, savoring historic excursions to Colonial Williamsburg, weekend road trips to the Chesapeake Bay islands, and a
    long‑awaited pilgrimage to the vineyards of Bordeaux, all while balancing a modest travel budget.
  culinary: Leslie Jordan’s culinary pursuits revolve around baking sourdough with locally milled whole‑grain flour, crafting rosemary‑infused focaccia using herbs from her garden, and indulging in Virginia
    oyster po' boys seasoned with Old Bay, all while experimenting with artisanal cheese pairings.
  core: Leslie Jordan is a calm, curious educator who balances competitive bridge victories with relaxed, flexible budgeting, leverages yoga to tame hypertension, and channels a love of history into community
    gardening and strategic curriculum design.
background:
  cultural: Leslie was raised in a small community near Yorktown, Virginia, where the legacy of colonial history and the close‑knit fabric of Southern hospitality shaped her outlook. Growing up, family
    gatherings often centered around local festivals and community service, instilling a strong sense of place and civic responsibility. While her heritage reflects the traditional values of the Tidewater
    region, her graduate business training and lifelong curiosity have given her a forward‑looking, pragmatic perspective. She enjoys blending respect for historic preservation with modern educational practices,
    and her married life with a supportive partner reinforces a balanced, resilient lifestyle.
attributes:
  skills: '["Classroom Management","Curriculum Development","Financial Literacy Instruction","Project‑Based Learning Design","Data‑Driven Assessment","Educational Technology Integration","Budget Management","Strategic
