persona_description: A business owner who is responsible for managing the safety of food prepared, served, manufactured, or sold in a food business. This person is likely to be interested in obtaining a
  Food Safety Program (FSP) to ensure compliance with food safety regulations. They will need to identify and control food safety hazards associated with relevant food processes, and develop a comprehensive
  FSP that includes programs such as Cleaning Schedules, Pest Control, Skills and Knowledge Requirements, Personal Hygiene, and Food Recall procedures. The FSP will be customised to the specific food processes
  involved in the business and may require additional steps, such as developing an individual FSP for unique steps. The business owner will need to implement the processes and practices in their day-to-day
  work, and staff must be aware of their responsibilities and recording logs as required.
