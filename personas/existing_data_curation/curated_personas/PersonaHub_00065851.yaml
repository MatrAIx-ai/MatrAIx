persona_description: A musician, particularly a singer and songwriter who has made significant contributions to the development of Mexican-American music, particularly Chicano music. Guerrero's songs have
  been widely covered and his legacy includes more than 300 original songs across the range of Latin music, including rock and blues songs. He is known for his passion in documenting the labor movement
  and the plight of Mexican immigrants, and his songs have cultural universality. His music has been influential in the development of Mexican-American music and has a special place in the hearts of many
  Latinos.
