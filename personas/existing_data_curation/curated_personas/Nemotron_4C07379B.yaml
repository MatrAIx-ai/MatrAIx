  hobbies: '[''Cooking traditional dishes'', ''Tropical gardening'', ''Knitting and crocheting'', ''Attending church services'', ''Listening to salsa and plena music'', ''Reading magazines and novelas'',
    ''Community volunteering'', ''Visiting family'', ''Learning basic smartphone use'', ''Walking in local parks'']'
  career_goals: Although retired from formal employment, Maria’s ambitions focus on personal fulfillment and community contribution. She aims to remain physically active and mentally sharp by continuing
    her gardening, cooking, and craft projects. She aspires to document family stories in a memoir, ensuring that younger generations inherit their cultural roots. Maria also hopes to deepen her digital
    literacy so she can effortlessly video‑chat with grandchildren abroad and assist them with technology. Volunteering at the local senior center and helping organize the annual patron saint festival are
    key ways she seeks to give back, while maintaining independence and health well into her later years.
