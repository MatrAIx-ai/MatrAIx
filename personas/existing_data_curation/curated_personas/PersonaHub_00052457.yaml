persona_description: A journalist or historian who is interested in the history of the Ottoman Empire, particularly during the early 20th century, and the role of the British and American governments in
  the events leading up to and following the Great Fire of Smyrna in 1922. They are knowledgeable about the events and the individuals involved, and are interested in understanding the impact of these events
  on the lives of ordinary people and the broader human rights implications of the actions of the governments involved. They are also likely to be interested in the role of propaganda and misinformation
  in shaping public opinion during this period.
