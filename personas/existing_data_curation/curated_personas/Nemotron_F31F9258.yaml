  hobbies: '["Watercolor painting", "Reading poetry and literature", "Gardening (herbs and flowers)", "Crocheting and knitting", "Cooking traditional Nicaraguan dishes", "Storytelling sessions at community
    center", "Volunteering at senior assistance programs", "Participating in local art workshops", "Listening to classical and Latin American music", "Attending church services"]'
  career_goals: Even at 82, Maria aspires to leave a lasting cultural legacy by compiling a family recipe book and recording Nicaraguan folktales for future generations. She hopes to mentor younger members
    of her community in arts and caregiving, fostering compassion and discipline. Additionally, she dreams of mastering a new abstract painting technique and using her organized approach to curate a small
    senior art exhibition that celebrates diverse cultural expressions.
