    practices in property operations'', ''Organizational and flexible problem‑solving'']'
  hobbies: '[''Landscape photography'', ''Watercolor painting'', ''Hiking in redwood forests'', ''Yoga and meditation'', ''Cooking Mexican cuisine'', ''Wine tasting at local vineyards'', ''Volunteering
    for community art projects'', ''Attending small poetry and music gatherings'', ''Reading sustainability non‑fiction'', ''Exploring mixed‑media art'']'
  career_goals: Liz aims to advance to a senior community association director position within the next five years, overseeing multiple residential complexes while integrating sustainable and culturally‑inclusive
    practices. She plans to obtain her Certified Community Association Manager (CCAM) credential and pursue additional certifications in green building (LEED) to champion eco‑friendly property initiatives.
    Long‑term, she envisions launching her own boutique property‑management firm that emphasizes artistic community spaces, affordable housing, and bilingual tenant services, thereby merging her professional
    expertise with her passion for art and cultural connectivity.
