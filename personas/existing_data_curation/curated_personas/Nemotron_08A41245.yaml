personas:
  professional: Liz Baez, an organized property and community association manager with a knack for creative tenant engagement, leverages their expertise in lease administration, budgeting, and bilingual
    communication to streamline operations in Sonoma County while curating local‑artist displays and sustainable initiatives.
  sports: Liz Baez, a nature‑oriented fitness enthusiast, hikes the Sonoma County trails with the North Bay Hiking Club, plays recreational volleyball on the beach during summer, follows the San Francisco
    Giants for baseball, and maintains a weekly yoga practice at a local studio, balancing cardio with mindfulness.
  arts: Liz Baez, a community‑focused creative, paints watercolors inspired by Mexican folk motifs and contemporary Californian aesthetics, curates rotating art exhibitions in their building’s lobby featuring
    local painters like Erin A. Forchion, enjoys listening to indie folk duo Fleet Foxes, and attends poetry readings showcasing spoken‑word artists such as Andrea Gibson.
  travel: Liz Baez, an intentional explorer, plans weekend road trips to Napa vineyards and the Pacific coastal towns of Mendocino, while saving for a dream long‑term itinerary that includes the historic
    streets of Oaxaca, Mexico, and the stone villages of Cinque Terre, Italy, always opting for eco‑lodges and boutique B&Bs.
  culinary: Liz Baez, in the kitchen, skillfully blends traditional Mexican flavors—such as mole poblano, chiles de árbol, and fresh corn masa—with California produce, often cooking enchiladas with locally
    sourced avocados and cilantro, and loves pairing their creations with curated Sonoma Pinot Noirs.
  core: Balancing meticulous community management with a wandering artistic spirit, Liz Baez channels their love for sustainable living into every aspect of life—except when they forget to water their succulents
    for a week.
background:
  cultural: Liz’s Mexican heritage is a core part of her identity, shaping her values of family, community, and hospitality. She grew up celebrating Día de los Muertos and other Mexican traditions, which
    fostered her appreciation for storytelling and visual symbolism—an influence evident in her artistic pursuits. Being bilingual, she seamlessly navigates both Spanish and English cultural spheres, often
    serving as a cultural liaison within her diverse resident base. Living in Guerneville, she blends her Mexican roots with the laid‑back, nature‑focused lifestyle of Sonoma County, integrating regional
    produce into her cooking and participating in local festivals that celebrate the area's artistic and culinary diversity.
attributes:
