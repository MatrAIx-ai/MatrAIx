  hobbies: '[''Digital Illustration'', ''Photography (desert landscapes)'', ''Reading speculative fiction'', ''Hiking and mountain biking'', ''Participating in hackathons'', ''Arduino and 3D‑printing tinkering'',
    ''Strategic board gaming'']'
  career_goals: Joshua aims to rise to senior product leadership within the next five years, targeting roles such as Senior Product Manager and eventually Director of Innovation. He plans to augment his
    managerial experience with an MBA focused on technology entrepreneurship. His long‑term ambition is to launch a hybrid tech‑art venture that utilizes emerging AR/VR platforms to create immersive artistic
    experiences, positioning himself at the intersection of technology, design, and cultural expression.
