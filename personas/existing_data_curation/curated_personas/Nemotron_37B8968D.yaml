personas:
  professional: Joshua Peters is a 23‑year‑old product manager in a Scottsdale tech startup, blending agile project management, data‑driven roadmaps, and design‑thinking prototyping to translate speculative
    concepts into market‑ready features, and they consistently use their public‑speaking confidence to rally cross‑functional teams around ambitious milestones despite occasional perfectionist over‑planning.
  sports: Joshua Peters is an avid hiker and mountain biker who spends weekends on trails at McDowell Sonoran Preserve, rides with the local Scottsdale Trailblazers club, and they cheer for the Phoenix
    Suns (NBA) and Arizona Cardinals (NFL) while occasionally joining pickup basketball games at the community center.
  arts: Joshua Peters is a digitally inclined creator who spends evenings rendering speculative‑fiction‑inspired illustrations reminiscent of Beeple’s cyber‑aesthetic, attends Scottsdale’s First Friday
    art walks to admire works by Indigenous artists like James Turrell, curates a personal playlist featuring Tame Impala, Grimes, and Hans Zimmer, and they regularly discuss Neil Gaiman and Cixin Liu novels
    at the local sci‑fi book club.
  travel: Joshua Peters is a road‑trip enthusiast who drives his modest SUV to photograph the red rocks of Sedona and the canyons of Grand Canyon, camps under the stars in Zion National Park, dreams of
    a spring visit to Tokyo’s Akihabara for tech‑art inspiration, and they plan each adventure with a spreadsheet to maximize budget while leaving room for spontaneous desert hikes.
  culinary: Joshua Peters is a modest home chef who perfects a spicy green‑chile pork burrito with fresh cilantro, experiments with roasted cactus paddles seasoned with lime and ancho chile, often tops
    avocado toast with thinly sliced radish for brunch, they enjoy crafting chipotle aioli for tacos, and they keep a well‑stocked pantry of quinoa, black beans, corn, and lime for quick nutritious meals.
  core: Joshua Peters is a curiosity‑driven product strategist who balances methodical planning with sudden bursts of artistic experimentation, they often juggle data dashboards and sketch pads while occasionally
    burning the midnight oil on caffeine‑fueled hackathons.
background:
  cultural: Joshua was raised in a middle‑class family of white Euro‑American heritage in the Pacific Northwest, where mainstream American cultural values were integral to his upbringing. After moving to
    Scottsdale, Arizona, he embraced the Southwest's unique blend of outdoor lifestyle and vibrant arts community. The desert environment, the region's growing tech‑startup scene, and exposure to Indigenous
    art traditions have broadened his worldview, fostering a pragmatic yet creatively curious perspective that informs both his professional and personal life.
attributes:
  skills: '[''Agile Project Management'', ''Strategic Planning'', ''Data Analysis (SQL, Python, R)'', ''Business Intelligence (Tableau, PowerBI)'', ''Software Development Lifecycle Understanding'', ''UX/UI
