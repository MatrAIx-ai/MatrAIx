personas:
  professional: Felicita Tomas is a senior photographic lab technician in Nashville who blends her chemistry‑based expertise in analog film processing with a methodical, organized workflow, using her curiosity
    to experiment with new developing techniques while preserving the quiet, low‑stress environment she values and mentoring junior staff with assertive yet compassionate guidance.
  sports: Felicita Tomas participates in early‑morning walks through Centennial Park, attends weekly gentle yoga classes at a local studio, occasionally joins the Nashville Running Club for low‑key 5K runs,
    and follows the Nashville Predators and Tennessee Titans as her primary sports loyalties, preferring relaxed, routine‑based fitness over competitive team sports.
  arts: Felicita Tomas expresses her artistic side through analog darkroom photography inspired by Ansel Adams and Diane Arbus, while devouring historical fiction and poetry by Gabriel García Márquez, Isabel Allende,
    and Pablo Neruda, and she regularly attends intimate literary readings and local gallery openings, finding solace in solitary creative pursuits.
  travel: Felicita Tomas plans her travel meticulously, favoring low‑key, photograph‑friendly destinations such as Oaxaca’s historic markets, Kyoto’s tranquil temples, and Iceland’s volcanic landscapes,
    where she can capture quiet moments; she balances her wanderlust with a modest budget, often returning home to Nashville’s parks for comfort before her next planned adventure.
  culinary: Felicita Tomas is an accomplished home cook who crafts authentic Mexican dishes such as mole poblano, pozole, and chiles en nogada using herbs from her garden—like cilantro, epazote, and marigold
    petals—and seasonings such as ancho chilies and toasted pumpkin seeds, treating each meal as a tactile, sensory experiment in flavor and tradition.
  core: Felicita Tomas blends precise, methodical craftsmanship with quiet curiosity, turning solitary pursuits in darkroom chemistry, herb gardening, and literature into a carefully curated life that balances
    meticulous planning with an undercurrent of worry about maintaining stability.
background:
  cultural: Felicita was raised in a Mexican household where Spanish was spoken alongside English, and she grew up celebrating traditions such as Día de los Muertos, quinceañeras, and family gatherings
    centered around homemade tamales and mole. Her parents instilled a strong work ethic and respect for community, values that she carries into her professional life. While she now lives in Nashville,
    she maintains ties to the local Latino community through cultural festivals, a weekly Spanish‑language church service, and cooking classes where she shares family recipes. Her bicultural experience
    blends Mexican family‑oriented customs with Southern hospitality, influencing her culinary tastes, music preferences, and the way she navigates social interactions, often preferring intimate, quiet
    settings over large, noisy gatherings.
attributes:
  skills: '["Black‑and‑white film development", "Color film processing", "Photographic printing", "Large‑format enlarger operation", "Processing machine maintenance", "Mechanical troubleshooting", "Quality‑control
    inspection", "Chemical safety management", "Workflow documentation", "Inventory control", "Archival preservation techniques"]'
  hobbies: '["Analog photography", "Darkroom printing", "Experimenting with alternative developing processes", "Collecting vintage cameras", "Gardening", "Cooking traditional Mexican cuisine", "Reading
    historical fiction", "Reading Latin American poetry", "Mindfulness meditation", "Walking in Nashville parks"]'
  career_goals: Felicita aspires to advance to a senior technician or supervisory role within the photographic lab, where she can design and optimize workflow processes and mentor new staff while maintaining
    the quiet, focused environment she thrives in. She is working toward certification in archival preservation and hopes to eventually open a small boutique darkroom studio offering custom printing and
    restoration services for vintage photographs, allowing her to blend her curiosity for new techniques with her practical, methodical approach. Additionally, she seeks a stable schedule that minimizes
    unpredictable stress and provides financial security for herself and her family.
