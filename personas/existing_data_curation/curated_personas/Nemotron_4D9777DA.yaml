personas:
  professional: Cecilia Greene is a pragmatic community organizer turning their decades‑long expertise in household budgeting, event planning, and digital coordination into a home‑based catering service
    that blends classic Southern dishes with experimental twists, while competitively mentoring younger women in budgeting and cooking to prove their practical know‑how.
  sports: Cecilia Greene stays active by walking the Bayou St. John trail each weekend, cheering for the New Orleans Pelicans and LSU Tigers, and occasionally playing in a senior softball league at the
    local community center, balancing a competitive spirit with a relaxed fitness routine, and they value the camaraderie while keeping a skeptical eye on friendly wagers.
  arts: Cecilia Greene channels creativity through their church gospel choir, where they sing works by Mahalia Jackson and Etta James, while spending evenings quilting intricate ‘Crazy Quilt’ patterns and
    reading biographies of Maya Angelou and local historians, a blend of artistic appreciation that fuels both their social engagement and reflective side.
  travel: Cecilia Greene prefers weekend getaways to nearby culinary hotspots like New Orleans, Charleston, and Savannah, and dreams of a road trip to Asheville’s farm‑to‑table scene, planning trips around
    budget constraints and GED study time while occasionally traveling with their church group, and they balance adventure with practical responsibilities.
  culinary: Cecilia Greene’s culinary persona revolves around soulful Southern cooking—perfecting smoked collard greens, creamed sweet potatoes with fresh thyme, tomato‑based gumbo with garden tomatoes,
    and buttery cornbread—while constantly experimenting with herbs like basil and oregano from their modest vegetable patch, and they love sharing these meals with family and neighbors.
  core: Cecilia Greene, 55, merges a meticulously organized mindset with a love for spontaneous garden‑inspired cooking, yet their skeptical nature makes them reluctant to accept unsolicited advice and
    they occasionally forget to water their vegetables when caught up in new projects.
background:
  cultural: As a 55‑year‑old African‑American woman raised in Mobile, Alabama, Cecilia’s cultural identity is rooted in the rich tapestry of Southern Black traditions. She grew up surrounded by the rhythms
    of gospel and blues, the aromas of soul‑food kitchens, and the close‑knit support of church and extended family. Her family traditions include Sunday worship at a historically Black congregation, seasonal
    celebrations like Juneteenth and the Mobile Mardi Gras second‑line parades, and the oral storytelling that preserves community memory. She embraces the culinary heritage of African‑American Southern
    cooking, values hospitality, and actively participates in local civic groups that honor Mobile’s Black history. These cultural influences shape her values of resilience, community service, and the importance
    of preserving and sharing her cultural legacy.
