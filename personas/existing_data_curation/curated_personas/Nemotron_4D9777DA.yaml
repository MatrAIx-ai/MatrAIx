  career_goals: Although currently not in the formal workforce, Cecilia aims to earn her GED within the next two years, and use the credential to launch a small home‑based catering service that highlights
    her signature Southern dishes. She also aspires to become a mentor for younger women in her church, teaching budgeting and cooking skills, and to take a formal role as a community health advocate focusing
    on nutrition education. A long‑term ambition is to compile a memoir of Mobile’s African‑American culinary heritage, preserving stories for future generations.
