personas:
  professional: Azita Tashiro, a 23-year-old front‑end developer, blends her art‑gallery‑inspired aesthetic sense with rigorous Agile project management to craft responsive React applications that prioritize
    accessibility while delighting users with polished visual details.
  sports: Azita Tashiro, a Zumba‑enthusiast and weekend hiker, joins a local fitness studio for high‑energy dance classes, belongs to the Finger Lakes Hiking Club, and roots for the Buffalo Bills and Sabres
    while planning a spring trail run in the Adirondacks.
  arts: Azita Tashiro, a watercolor hobbyist, attends weekly community art workshops, draws inspiration from Frida Kahlo’s vivid storytelling, the surreal installations of Yayoi Kusama, and the stark photography
    of Diane Arbus, and curates small pop‑up galleries for fellow emerging artists.
  travel: Azita Tashiro, who loves spontaneous weekend getaways, has trekked the Finger Lakes, explored the street art of Berlin, and dreams of visiting Kyoto’s historic tea houses, balancing her travel
    budget with a mix of off‑season flight deals and careful itinerary planning.
  culinary: Azita Tashiro, a budding home chef, whips up avocado‑toast with radish slices and smoked salmon for brunch, crafts matcha lattes using ceremonial grade powder, and savors spicy ramen bowls topped
    with soft‑boiled eggs, while occasionally over‑seasoning dishes in pursuit of bold flavor.
  core: Azita Tashiro, a curious organizer, merges art‑inspired UI design with disciplined coding, fuels their day with coffee, Zumba, and sketch‑breaks, but habitually forgets to water houseplants despite
    a thriving digital garden.
background:
  cultural: Azita grew up in Cicero, a suburban community in Onondaga County near Syracuse, New York. Her family, of European descent, emphasized community involvement, education, and appreciation for the
    arts. The town’s predominantly white, middle‑class environment exposed her to traditional American values while the nearby city offered a vibrant cultural scene, including local theaters, galleries,
    and music venues. She has participated in community volunteer programs and regional festivals, which fostered her cooperative nature. This blend of suburban stability, regional upstate New York culture,
    and an early love for visual arts shapes her identity and worldview.
attributes:
  skills: '["HTML5", "CSS3", "JavaScript (ES6+)", "React", "Git", "GitHub Actions", "Responsive Design", "Web Accessibility (WCAG)", "Performance Optimization", "Cross-Browser Testing", "Material-UI", "Agile
    Scrum", "Jira", "Trello", "Client Communication", "Graphic Design Basics (Photoshop, Illustrator)"]'
  hobbies: '["Visiting art galleries and museums", "Sketching and watercolor painting", "Photography", "Participating in hackathons and tech meetups", "Group fitness classes (Zumba, yoga)", "Organizing
    board game nights and potlucks", "Hiking in the Finger Lakes region", "Exploring coffee shops", "Reading science-fiction novels"]'
  career_goals: Azita aspires to become a senior front‑end engineer within the next five years, leading design‑driven development projects that merge technology and visual art. She aims to deepen her full‑stack
    expertise by mastering Node.js and server‑side concepts, eventually transitioning into a lead developer role where she can mentor junior developers and shape product strategy. Long‑term, she envisions
    launching her own boutique web consultancy focused on creating accessible, aesthetically compelling digital experiences for arts organizations and community nonprofits. To support these ambitions, she
    plans to pursue a bachelor’s degree in Computer Science or Human‑Computer Interaction, earn certifications in UX design, and attend industry conferences such as An Event Apart and ReactConf.
