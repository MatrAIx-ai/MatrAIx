  hobbies: '[''Hiking in the Columbia River Gorge'', ''Mountain Biking'', ''Acoustic Guitar Playing'', ''Cooking Mexican Cuisine'', ''Watching Soccer (Liga MX)'', ''Woodworking'', ''Reading Leadership Non‑Fiction'',
    ''Community Volunteering (Garden Projects)'']'
  career_goals: Michael aims to transition from a first‑line supervisory role to a regional operations manager position within the next three to five years, where he can shape strategic sales initiatives
    across multiple districts. He plans to earn an associate degree in Business Administration to strengthen his analytical and managerial toolkit. Michael also aspires to lead a digital transformation
    of his department’s sales processes, introducing automation tools while preserving the human touch that he values. Long‑term, he envisions mentoring emerging supervisors and possibly launching a consulting
    firm that helps small businesses improve their sales team performance.
