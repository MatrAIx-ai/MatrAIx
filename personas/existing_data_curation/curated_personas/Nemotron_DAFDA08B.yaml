  hobbies: '[''Visiting art galleries'', ''Sketching'', ''Live music events'', ''Hiking'', ''Woodworking'', ''Reading philosophy and design books'', ''Gardening'', ''Craft coffee brewing'', ''Volunteering
    at community art fairs'']'
  career_goals: Ronald aims to advance into a senior regional manager role where he can shape broader operational strategies and mentor emerging leaders. He also dreams of launching a community‑focused
    art and crafts boutique that blends his managerial expertise with his love of the arts. To achieve these goals, he plans to pursue professional development courses in project management and basic finance,
    as well as attend workshops on small‑business ownership and retail merchandising.
