persona_description: A coastal policy expert and environmental advocate who is deeply concerned about the loss of California's natural coastal resources due to the overuse and abuse of the state's coastal
  wetlands and beaches. They are passionate about advocating for the use of flexible and adaptive solutions to protect the Public Trust Doctrine, which guarantees the protection of coastal lands for public
  use and enjoyment. They are committed to understanding the fluid and dynamic nature of natural systems and the need for flexible and sustainable solutions to protect development. They are knowledgeable
  about the history of coastal development in California and the impact of human activities on the state's coastal ecosystems. They are skilled in advocating for policy changes and implementing effective
  conservation strategies to protect the coast and the natural resources that support it.
