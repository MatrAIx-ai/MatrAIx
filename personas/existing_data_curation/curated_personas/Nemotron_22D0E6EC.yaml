  hobbies: '[''Gallery & Museum Visits'', ''Street Photography'', ''Sketching'', ''Reading (Art History, Business Innovation)'', ''Listening to Indie/Ambient Music'', ''Hiking'', ''Yoga'', ''Cooking Experimental
