personas:
  professional: David Moen, a 28-year-old strategic sourcing specialist, leverages three years of procurement experience and a business graduate degree to negotiate cost-effective contracts using SAP Ariba
    and Coupa, while their curiosity for contemporary art fuels innovative, sustainability-focused supplier solutions and a collaborative, low-key leadership style.
  sports: David Moen enjoys weekend hikes with the Pine Barrens Exploration Group, practices yoga at CorePower Yoga in Manhattan, plays casual basketball at a local community center on rainy days, and they
    attend New York Knicks and New York Mets games when the season is in full swing.
  arts: David Moen regularly visits MoMA and the Guggenheim, sketches installations, collects works by contemporary artists like Banksy and Yayoi Kusama, curates a personal photo series inspired by ambient
    composers such as Brian Eno and Sigur Ros, and they volunteer at community art workshops sharing their love for design.
  travel: David Moen prefers low-key, culturally immersive trips, having explored the historic streets of Charleston, the modern art scene of Lisbon, and the serene temples of Kyoto, and they plan a future
    visit to the desert art installations of Burning Man.
  culinary: David Moen experiments in the kitchen with sous-vide lamb shoulder, fermented kimchi, and homemade oat-milk latte, they often pair dishes like miso-glazed salmon with matcha-infused desserts,
    reflecting a penchant for blending global flavors with precise technique.
  core: David Moen is a methodical procurement analyst who balances disciplined finances with spontaneous art-driven splurges, and they channel yoga-induced calm into strategic sourcing while curating a
    quiet yet vibrant life steeped in creative curiosity.
background:
  cultural: David grew up in Westbury, a suburban community in Nassau County, New York, within a middle‑class family of Scandinavian (Norwegian/Danish) heritage, as reflected by his surname Moen. His upbringing
    combined traditional American values—emphasis on education, self‑reliance, and community involvement—with subtle cultural traditions such as celebrating winter holidays with Nordic customs. Living near
    the culturally diverse New York metropolitan area exposed him to a broad spectrum of artistic and culinary influences, fostering his open‑mindedness and curiosity. He identifies as a white American
    who values harmony, cooperation, and understated individuality, traits that shape both his professional demeanor and personal pursuits.
