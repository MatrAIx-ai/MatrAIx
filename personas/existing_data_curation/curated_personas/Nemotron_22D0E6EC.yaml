  career_goals: David aims to advance to a senior procurement manager role within the next five years, overseeing a multi‑category portfolio and leading initiatives that embed sustainability and digital
    transformation into the supply chain. He plans to earn the Certified Professional in Supply Management (CPSM) credential and pursue advanced training in data analytics to enhance strategic decision
    making. Long‑term, he aspires to shape procurement strategy for a cultural institution—such as a museum or art foundation—where he can merge his professional expertise with his passion for the arts.
    He also seeks to mentor junior buyers, foster collaborative supplier networks, and contribute to his company's corporate social responsibility goals.
