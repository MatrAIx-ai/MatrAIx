  hobbies: '[''Painting'', ''Salsa dancing'', ''Visiting art galleries'', ''Reading magical realism'', ''Cooking Cuban cuisine'', ''Photography'', ''Participating in poetry slams'', ''Traveling'', ''Learning
    new languages'', ''Volunteering at community art workshops'']'
  career_goals: Marta aims to translate her imagination and cultural roots into a dynamic career as a multidisciplinary artist and creative director. She envisions working with cultural institutions, museums,
    or innovative advertising agencies in Miami that value diverse perspectives, creating projects that blend Cuban heritage with contemporary visual media. Over the next five years she plans to complete
    a graduate program in Fine Arts or Cultural Studies, build a robust portfolio of installations, branding, and digital campaigns, and eventually launch her own freelance studio focused on immersive community
    art initiatives and cross-cultural collaborations.
