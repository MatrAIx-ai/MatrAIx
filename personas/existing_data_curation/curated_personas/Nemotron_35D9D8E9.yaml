personas:
  professional: Marta Betancourt is a budding multidisciplinary artist and aspiring creative director who blends digital illustration, photography, and graphic design into community‑centric visual narratives,
    leveraging bilingual fluency and an organized‑yet‑flexible work style to meet deadlines and experiment with abstract concepts.
  sports: Marta Betancourt enjoys seasonal beach volleyball in the summer, follows the Miami Heat and Miami Marlins, attends Saturday yoga classes at a local studio, and runs with the Wynwood Runners club
    to stay fit and clear the mind.
  arts: Marta Betancourt immerses herself in contemporary art, drawing inspiration from Yayoi Kusama, Kehinde Wiley, and musician Bad Bunny, attends poetry slams featuring Ada Limón, and participates in
    Afro‑Latin drumming circles that inform her mixed‑media installations.
  travel: Marta Betancourt favors spontaneous cultural trips, having visited the vibrant street‑art districts of Cartagena and Oaxaca, dreaming of a residency in Guanajuato, and planning a future backpacking
    adventure through the Scottish Highlands to capture misty landscapes.
  culinary: Marta Betancourt delights in cooking ropa vieja and pastelitos, seasoning with cumin, oregano, garlic, and ripe plantains, while also indulging in local seafood ceviche and churrasco during
    weekend outings, yet often over‑spices in the rush of creative deadlines.
  core: Marta Betancourt channels an imaginative, organized yet flexible mindset into bold visual projects, juggling freelance gigs with community art workshops, while sometimes skipping breakfast and losing
    track of time.
background:
  cultural: Born in Miami to first-generation Cuban immigrants, Marta grew up in a bilingual household steeped in the rhythms of Cuban music, the flavors of Caribbean cuisine, and the storytelling traditions
    of her parents. She celebrates Cuban holidays like Carnaval de Miami, participates in Afro-Cuban drumming circles, and maintains close ties to the local diaspora community. This rich cultural tapestry,
    combined with Miami’s multicultural environment, informs her artistic sensibilities and fuels her desire to represent her heritage through contemporary art.
attributes:
  skills: '[''Digital Illustration'', ''Graphic Design'', ''Photography'', ''Adobe Photoshop'', ''Adobe Illustrator'', ''Spanish-English Bilingual Communication'', ''Social Media Content Creation'', ''Event
