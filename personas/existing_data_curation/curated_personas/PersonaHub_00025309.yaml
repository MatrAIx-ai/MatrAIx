persona_description: A planetary scientist who specializes in the study of the Moon and small planetary bodies, with a particular focus on the remote sensing of their surfaces and the identification and
  exploitation of their resources. He is experienced in both science and mission planning, and has a strong background in planetary geology and remote sensing. He has worked at several institutions, including
  the Lunar and Planetary Institute, the European Space Agency, and the University of Hawaii, and is currently the Group Supervisor of the planetary exploration group at the Johns Hopkins University Applied
  Physics Laboratory. He has a deep understanding of the regolith-volatile system of the Moon and small planetary bodies, and is interested in understanding how and where volatiles form, interact, and ultimately
  fate. He is also the PI of a NASA SSERVI team and a Mini-RF radar instrument on NASA's Lunar Reconnaissance Orbiter, and enjoys planetary analogue field work.
