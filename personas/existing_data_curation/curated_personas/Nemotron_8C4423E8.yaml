personas:
  professional: A licensed commercial driver, Amanda Tonge leverages five years of CDL Class A and hazmat experience, advanced route‑planning acumen, fleet‑management software expertise, and a knack for
    basic graphic design to devise efficient, eco‑friendly delivery routes, and they channel their calm resilience and curiosity into mentoring new drivers while championing community‑focused art‑on‑the‑road
    initiatives.
  sports: A weekend hiker and loyal supporter of the Tulsa Drillers and FC Tulsa, Amanda Tonge hits the Tallgrass Prairie trails with a smartwatch to log miles, participates in a local recreational softball
    league each spring, and they balance their love of outdoor exercise with occasional NBA viewings of the Oklahoma City Thunder.
  arts: An immersive art explorer, Amanda Tonge frequents the Philbrook Museum, attends indie film screenings of directors like Kelly Reichardt, admires contemporary creators such as Olafur Eliasson and
    photographer Annie Leibovitz, and they channel this inspiration into their own road‑trip photography and occasional graphic‑design flyers for community art events.
  travel: A spontaneous road‑trip photographer, Amanda Tonge maps scenic Oklahoma byways on telematics platforms, has captured the stark beauty of Badlands and the rolling hills of the Ozarks, dreams of
    photographing New Zealand's fjords, and they prioritize weekend escapes over costly overseas vacations due to budget constraints and a desire to stay close to their trucking routes.
  culinary: A curious food adventurer, Amanda Tonge delights in Tulsa‑style smoked brisket and classic chicken fried steak, experiments with Korean‑taco fusion using gochujang and corn tortillas, and they
    boast an intermediate cooking skill that shines in their well‑seasoned cast‑iron skillet while occasionally forgetting to thaw meat, leading to wasted portions.
  core: A calm, curiosity‑driven logistician who fuses long‑haul trucking with an eye for art, Amanda Tonge balances meticulous route planning with occasional impulsive camera purchases, embraces solitude
    in prairie hikes, and they rarely stress, even when traffic snarls test their patience.
background:
  cultural: Amanda grew up in a working‑class family on the outskirts of Tulsa, Oklahoma, where Midwestern pragmatism, Southern hospitality, and the cultural heritage of the neighboring Osage Nation intersect.
    The region's strong community ties, love of open space, and appreciation for both traditional crafts and contemporary arts shaped her values of resilience, openness, and service. Exposure to local traditions
    such as the Tulsa State Fair, regional cuisine, and the city's vibrant gallery scene fostered her curiosity and appreciation for diverse perspectives, while the natural beauty of Osage County inspired
    her deep affinity for outdoor exploration and storytelling through photography.
attributes:
  skills: '[''Commercial Driver’s License (Class A) with hazmat endorsement'', ''Advanced route planning and GPS navigation'', ''Vehicle maintenance and mechanical troubleshooting'', ''Safety compliance
    and DOT regulations'', ''Logistics software (fleet management, telematics)'', ''Data analysis for route optimization'', ''Crisis management and first aid'', ''Effective communication and conflict resolution'',
    ''Basic graphic design (Canva, Photoshop)'', ''Adaptability to emerging transportation technologies'']'
  hobbies: '[''Visiting art galleries and museums'', ''Road‑trip photography'', ''Reading about contemporary art and technology'', ''Participating in craft and painting workshops'', ''Hiking in prairie
    and nature trails'', ''Journaling and reflective writing'', ''Attending community festivals and cultural events'', ''Volunteering for local arts initiatives'']'
  career_goals: Amanda aims to add double/triple trailer endorsements to her CDL and complete a certification in logistics management within the next two years. She seeks a supervisory role where she can
    mentor new drivers, implement environmentally sustainable routing practices, and lead community‑focused initiatives such as a "Roadside Art Tour" that showcases local artists along delivery routes.
    Over the long term, she envisions starting her own boutique transport company that prioritizes eco‑friendly operations and cultural engagement, blending her passion for driving with her love of visual
    arts and community storytelling.
