persona_description: A person who is interested in quality management systems and the history of ISO 9000. This individual is likely to be a professional in the field of quality assurance or a student studying
  quality management. They are knowledgeable about the history of ISO 9000 and its evolution from its initial publication in 1987 to its current version in 2015. They may also be interested in the differences
  between the ISO 9000:2008 and ISO 9001:2015 standards, as well as the impact of these changes on organizations seeking to achieve ISO certification. They are likely to be interested in the sub-standards
  of ISO 9001, such as ISO 9001:2015, and may be familiar with the ISO 9001:2008 standard.
