personas:
  professional: Cristy Sturdivant, a seasoned painter and paperhanger with three decades of mastery in interior and exterior finishes, color mixing, drywall repair, and project coordination, leverages their
    structured, practical nature to run meticulously scheduled jobs while flexibly adapting to client needs, and they foster a collaborative team atmosphere through their considerate, reliability‑driven
    leadership.
  sports: Cristy Sturdivant enjoys weekly hikes on prairie trails of Theodore Roosevelt National Park and participates in the Bismarck Trail Runners club, while they root for the North Dakota State Bison
    football team, the Minnesota Vikings, and the Minnesota Twins, maintaining a consistent fitness routine that balances structured cardio sessions with the flexibility of occasional leisurely walks.
  arts: Cristy Sturdivant weaves their love of quilting and community mural projects with a reverence for the serene palettes of Bob Ross and the bold forms of Georgia O'Keeffe, while they spend evenings
    immersed in historical fiction by Ken Follett and enjoy the folk storytelling of John Denver, allowing the arts to color both their work and leisure.
  travel: Cristy Sturdivant prefers meticulously planned road trips that blend prairie vistas with cultural stops, having explored North Dakota’s Theodore Roosevelt and South Dakota’s Badlands National
    Parks, they dream of a guided tour of Kyoto’s temples and the ancient ruins of Machu Picchu, yet they balance these ambitions with a modest travel budget and family commitments.
  culinary: Cristy Sturdivant, an accomplished home cook, delights in preparing Midwest comfort classics like chicken‑fried steak with creamy mashed potatoes, corn‑bread, and apple crisp, often enhancing
    recipes with garden‑fresh tomatoes, sweet corn, and aromatic sage, while they balance their love for hearty home‑cooked meals with occasional indulgence in take‑out pizza on busy workweeks.
  core: Cristy Sturdivant blends meticulous craftsmanship with a love for prairie hikes, Midwest comfort cooking, and community art, all while juggling a borderline obsession with color swatches, a habit
    of misplacing their garden tools, and a pragmatic yet occasionally indulgent approach to life.
background:
  cultural: Cristy grew up in a small town in North Dakota, descending from German‑Scandinavian immigrant families that settled the Great Plains. Raised in a Lutheran community, she internalized the Midwestern
    values of hard work, self‑reliance, modesty, and neighborly cooperation. The seasonal rhythms of the region, along with traditions like quilting, community potlucks, and volunteer service, have shaped
    her practical outlook and her emphasis on harmony and reliability.
attributes:
  skills: '["interior painting", "exterior painting", "paper hanging", "drywall repair", "surface preparation", "color mixing", "project scheduling", "budget estimation", "client communication", "basic
