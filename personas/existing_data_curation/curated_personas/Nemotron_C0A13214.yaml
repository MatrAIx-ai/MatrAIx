  hobbies: '["quilting", "vegetable gardening", "hiking in state parks", "DIY home improvement projects", "reading historical fiction", "cooking Midwestern meals", "bridge", "volunteering for community
    mural projects"]'
  career_goals: Her ambition is to transition from hands‑on work to a supervisory and business‑ownership role. Cristy plans to obtain a state contractor’s license and OSHA certification, to build a small,
    family‑run painting and paperhanging company that emphasizes reliability and quality. She aims to mentor apprentices, expand into decorative painting and faux finishes, and secure a steady stream of
    residential contracts that will provide financial stability for her retirement while allowing her to maintain the structured schedule she values.
