persona_description: A lawyer and researcher with expertise in human rights and obesity, specifically focusing on the rights of children in Ireland and the EU. Katharina is currently undertaking a PhD at
  the University of Copenhagen on childhood obesity and the rights of children. She has a background in law and international law, and has a deep understanding of the legal and ethical frameworks that govern
  the rights of children. Katharina is interested in shaping policy and legislation that promotes the health and well-being of children, particularly in the context of obesity. She is also interested in
  the role of the school environment in promoting healthy eating habits and the rights of children with eating disorders.
