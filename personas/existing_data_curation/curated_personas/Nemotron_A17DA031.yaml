personas:
  professional: Mara Silva, a 27‑year‑old aerospace engineer, combines disciplined expertise in mechanical design, propulsion analysis, and systems integration with a structured, harmony‑focused work style,
    delivering meticulous CAD models, rigorous CFD simulations, and clear documentation, while they quietly mentor junior staff and champion collaborative problem solving.
  sports: Mara Silva fuels their fitness routine by hiking the Sierra Nevada trails with the Reno Outdoor Adventurers club during summer months and joining the local rocketry club’s weekend meet‑ups, while
    they casually follow the Vegas Golden Knights in hockey and the Reno Aces in baseball, preferring low‑impact, structured workouts that fit their disciplined schedule.
  arts: Mara Silva channels their cultural roots through acoustic guitar renditions of folk classics by Mercedes Sosa and Los Lobos, while they capture the Milky Way using an EOS R5 inspired by Ansel Adams’
    black‑and‑white landscapes and attend community theater productions that feature the music of Lin‑Manuel Miranda.
  travel: Mara Silva, who prefers meticulously planned weekend getaways, often drives to Great Basin National Park for night‑sky photography and dreams of an organized expedition to Chile’s Atacama Desert
    to explore its world‑renowned observatories, balancing adventure with a budget‑conscious, schedule‑driven approach.
  culinary: Mara Silva proudly prepares homemade tamales with masa, pork filling, and hoja santa, while they also experiment with mole poblano and craft fresh guacamole using ripe Hass avocados, reflecting
    a strong home‑cooking skill set that blends traditional flavors with occasional forays into upscale farm‑to‑table tasting menus featuring heirloom tomatoes and local herbs.
  core: Mara Silva balances a laser‑focused engineering mindset with a quiet love for night‑sky photography and model rockets, often forgetting to water houseplants but never missing a deadline, thriving
    on structure, community, and the rhythm of folk guitar strings.
background:
  cultural: Mara Elena comes from a Mexican-American family and is fluent in both Spanish and English. She celebrates Día de los Muertos, Mexican Independence Day, and traditional holidays with her close
    relatives, preserving customs like making tamales and sharing folkloric music. Her cultural values emphasize respect for elders, community support, and collective well-being, which she carries into
    her collaborative work style. She actively engages with the local Mexican community in Reno, participating in cultural festivals and mentorship programs.
attributes:
  skills: '[''CAD modeling (SolidWorks, CATIA)'', ''Finite element analysis (ANSYS)'', ''Computational fluid dynamics (ANSYS Fluent, OpenFOAM)'', ''Propulsion system design and testing'', ''Systems engineering
    and requirements management'', ''MATLAB and Python programming'', ''Data analysis and visualization'', ''Project planning (MS Project, Primavera)'', ''Quality assurance and regulatory compliance'',
    ''Technical report writing'', ''Cross-functional team collaboration'', ''Problem-solving under constraints'']'
  hobbies: '[''Hiking in the Sierra Nevada'', ''Model rocketry and launches'', ''Night-sky photography'', ''Cooking traditional Mexican cuisine'', ''Playing acoustic guitar'', ''Astronomy club meetings'',
    ''Reading science-fiction novels'', ''Solving puzzles (sudoku, logic games)'', ''Volunteering for STEM outreach'', ''Birdwatching'']'
  career_goals: Mara aims to advance to a senior aerospace engineer role within the next five years, leading a multi-disciplinary team on reusable launch vehicle projects. She plans to obtain her Professional
    Engineer (PE) license and become a certified Systems Engineer, while contributing to sustainable propulsion technologies such as green propellants. Mentoring Latino women in STEM and publishing research
    on thermal management for spacecraft are also central to her long-term aspirations.
