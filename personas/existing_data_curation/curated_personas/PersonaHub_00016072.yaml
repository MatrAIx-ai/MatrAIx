persona_description: A historian or archaeologist interested in the history and archaeology of the medieval period in Britain. They are familiar with the sites and monuments of Wales and have a particular
  interest in the history of Montgomery Castle. They are also interested in the role of timber castles in the feudal system and the impact of the Norman conquest on the region. They are likely to be knowledgeable
  about the history of Powys and the de Boulers family. They are interested in the layout and defensive features of the castle and the people who lived there. They are also interested in the impact of the
  castle on the local economy and the role of the castle in controlling land. They are likely to be familiar with the history of the Clwyd Powys Archaeological Trust and its work in excavating and studying
  the site of Hen Domen.
