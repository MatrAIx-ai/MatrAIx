  career_goals: Julia plans to enroll in a four‑year university program, aiming for a degree in Marketing Communications or Business Administration with a focus on digital strategy. She aspires to become
    a digital content strategist or community outreach coordinator, where she can blend her curiosity for emerging media trends with the practical goal of creating measurable impact for brands or nonprofit
    organizations. In the short term, she intends to complete a summer internship in a local marketing agency or at a nonprofit in Westchester to gain hands‑on experience. Long‑term, she envisions a career
    that allows her to lead campaigns that promote sustainable consumer behavior and community engagement, while also providing a stable, fulfilling livelihood.
