personas:
  professional: Julia Puckett, an aspiring digital content strategist, merges their curiosity for emerging media trends with a practical talent for data analysis, graphic design, and organized project management,
    and their cooperative yet assertive demeanor shines when leading group presentations and negotiating client expectations.
  sports: Julia Puckett fuels their weekend hikes and yoga practice through membership in the Hudson Valley Hiking Club, roots for the New York Knicks and Yankees, and occasionally joins a recreational
    soccer league, blending competitive energy with a collaborative, low-pressure approach.
  arts: Julia Puckett channels storytelling through acoustic covers of folk-indie artists like Bon Iver and Sufjan Stevens, curates Instagram photo essays inspired by Annie Leibovitz and Vivian Maier, and
    immerses themselves in contemporary novels by Sally Rooney and historical epics by Ken Follett, shaping a multifaceted creative identity.
  travel: Julia Puckett prefers well-planned road trips that mix adventure with cultural exploration, having visited Boston's historic sites, Washington, D.C.'s museums, and the Hudson Valley's scenic trails,
    while dreaming of future journeys to Edinburgh's literary festivals and Portugal's coastal villages.
  culinary: Julia Puckett loves crafting comfort-food classics like mac & cheese and banana bread, spicing them up with global twists such as kimchi, harissa, or matcha, and often sources fresh produce
    from local farmers' markets to create vibrant, Instagram-ready dishes.
  core: Julia Puckett is a curious yet pragmatic 19-year-old who balances digital creativity, community service, and a love for storytelling while managing a disciplined budget, occasional anxiety, and
    a habit of snapping photos during every walk.
background:
  cultural: Julia grew up in a middle‑class, white American family in Harrison, a suburban community in Westchester County, New York. Her upbringing combined the values of a close‑knit family that prioritizes
    education, community service, and a balanced lifestyle. The proximity to New York City has exposed her to a diverse cultural scene, from museum exhibitions to multicultural festivals, which broadened
    her perspective beyond her suburban roots. She observes traditional American holidays such as Thanksgiving and Fourth of July, while also partaking in regional customs like local farmers‑market events
    and town celebrations. Family gatherings often feature a mix of classic Mid‑Atlantic cuisine and occasional dishes inspired by friends from varied backgrounds, reflecting an openness to different cultural
    influences. This blend of suburban stability and metropolitan exposure shapes Julia's pragmatic yet curious outlook.
