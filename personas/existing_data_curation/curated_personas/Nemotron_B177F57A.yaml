  career_goals: Approaching retirement, Geraldo aims to transition into a supervisory role where he can mentor junior technicians and streamline pharmacy workflows for greater predictability and safety.
    He plans to obtain the Certified Pharmacy Technician (CPhT) credential and eventually lead a community outreach program that educates Spanish‑speaking seniors on proper medication use. His long‑term
    ambition is to leave a legacy of a well‑organized, low‑stress pharmacy environment that supports both staff well‑being and patient care.
