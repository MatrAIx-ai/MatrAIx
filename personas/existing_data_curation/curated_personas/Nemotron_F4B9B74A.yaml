personas:
  professional: An aspiring robotics enthusiast and budding programmer, Katie Sporleder channels her love for strategy games and competitive edge into designing functional robots for her school club, while
    her spontaneous streak often leads her to abandon detailed project plans in favor of rapid prototyping.
  sports: As a member of the middle school soccer team and a weekend swimmer at the local YMCA, Katie Sporleder cheers for the regional Wildcats baseball club and the Storm City Thunder basketball squad,
    yet her competitive nature pushes her to train solo with a focus on speed drills rather than group practice, often skipping warm‑ups due to her spontaneous attitude.
  arts: When not coding a robot, Katie Sporleder sketches comic panels inspired by the whimsical humor of Bill Watterson and the dynamic action of Studio Ghibli's Princess Mononoke, while her playlists
    feature the atmospheric scores of Hans Zimmer and the indie pop of Clairo, fueling her creative bursts.
  travel: A fan of both local adventures and far‑flung escapades, Katie Sporleder has explored the nearby Redwood State Park on family hikes, dreamt of visiting Kyoto’s bamboo groves, and saved up for a
    weekend trip to an amusement park in Orlando, balancing schoolwork deadlines with impulsive road‑trip plans that sometimes clash with her need for structure.
  culinary: A budding kitchen experimenter, Katie Sporleder loves whipping up quick ramen bowls seasoned with miso and soft‑boiled eggs, baking chocolate chip cookies with extra walnuts, and indulging in
    pepperoni pizza while occasionally over‑snacking on sugary cereal during late‑night gaming sessions, reflecting her practical appetite but occasional indulgent stress‑eating habit.
  core: Katie Sporleder is a competitive, tech‑savvy teen who balances structured robotics projects with spontaneous gaming marathons, worries about the future, and channels stress into journaling, art,
    and occasional over‑indulgence in snacks.
background:
  cultural: Katie grew up in Harvest, a small community in Madison County, Alabama. Her family reflects the traditional Southern white upbringing common to the region, with strong ties to church, community
    events, and family gatherings centered around barbecues and football games. The local culture emphasizes hospitality, respect for nature, and a close‑knit neighborhood where everyone knows each other.
    Growing up in a rural setting, she is familiar with the rhythms of small‑town life, the importance of self‑reliance, and the values of hard work and modesty. While she enjoys the comforts of this environment,
    she also encounters pressures to conform to community expectations, which sometimes heighten her sensitivity to stress and her desire for both structure and personal autonomy.
