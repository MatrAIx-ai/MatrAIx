  hobbies: '[''Strategy video gaming'', ''Reading mystery and sci‑fi novels'', ''Comic drawing'', ''Nature sketching'', ''Robotics club participation'', ''Animal shelter volunteering'', ''Beginner piano
    practice'', ''Journaling'']'
  career_goals: Katie aspires to pursue a career that blends her love for structure with her creative spark. She envisions studying engineering or computer science in high school and college, aiming to
    become a software developer who designs educational games that make learning tangible for younger students. Alternatively, she is drawn to wildlife conservation, hoping to study environmental science
    to protect the natural areas around Madison County. Her competitive drive fuels a desire to excel academically, earn scholarships, and eventually take a leadership role in a tech company or a community
    environmental initiative. She also dreams of creating a personal blog where she can share her sketches and the lessons she learns from her projects, turning her worries into motivation.
