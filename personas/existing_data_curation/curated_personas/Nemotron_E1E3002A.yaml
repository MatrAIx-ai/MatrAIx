personas:
  professional: Charles Boeschen, a 7-year-old budding engineer, spends afternoons constructing intricate LEGO models, debugging Scratch projects, and mastering chess strategies, showing an early blend
    of curiosity and disciplined precision that hints at a future in design or robotics, and they approach each task with methodical rigor.
  sports: Charles Boeschen enjoys playing on the local Little League baseball team, the 'Eagle Cubs', cheers for the Chicago Cubs and the Chicago White Sox on TV, and they spend weekends practicing soccer
    drills with a small group of friends, preferring organized practice over large school assemblies.
  arts: Charles Boeschen is an avid fan of the animated worlds of Hayao Miyazaki, especially 'My Neighbor Totoro', frequently watches Disney’s 'The LEGO Movie', and they collect original LEGO sets featuring
    designs by famous artist Nathan Sawaya, which fuels their creative imagination.
  travel: Charles Boeschen has visited the local state park, the city aquarium, and Disneyland, and they dream of exploring the Great Barrier Reef and the ancient ruins of Machu Picchu, planning trips with
    detailed checklists and a favorite map of world landmarks pinned on their bedroom wall.
  culinary: Charles Boeschen loves homemade mac and cheese, pepperoni pizza, and simple sushi rolls with cucumber and avocado, enjoys assembling their own snack platters, but they often forget to finish
    their vegetables, claiming the cheese is the most important component.
  core: Charles Boeschen is a meticulously organized 7-year-old who balances a fierce curiosity for building and coding with a competitive edge, a love of solo puzzles, and a quirky habit of arranging everything
    from LEGO bricks to allowance coins by color and size, and they prefer small, trusted circles over large gatherings.
background:
  cultural: Charles grows up in Crown Point, Indiana, a suburban Midwestern community with a predominantly white, middle‑class population. His family values education, self‑reliance, and community involvement,
    celebrating local traditions such as Fourth of July parades and county fairs. While rooted in Midwestern modesty and practicality, his household also encourages curiosity and exposure to modern technology,
    providing a blend of traditional values and contemporary opportunities.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''LEGO construction and design'', ''Strategic board games (chess)'', ''Elementary coding (Scratch)'', ''Science experiment execution'', ''Organizational
