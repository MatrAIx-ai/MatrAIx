  hobbies: '[''LEGO construction'', ''Reading adventure and science books'', ''Puzzle solving (jigsaw, Sudoku)'', ''Playing chess'', ''Scratch programming'', ''Nature walks and rock collecting'', ''Model
    airplane building'', ''Drawing detailed diagrams'']'
  career_goals: Charles dreams of a future where he can combine his curiosity about how things work with his love for practical creation. He hopes to become a mechanical or aerospace engineer, aspiring
    to design robots or rockets that solve real-world problems. In school he aims to win science fairs and earn top grades, viewing each achievement as a step toward leading innovative projects and perhaps
    one day traveling to space.
