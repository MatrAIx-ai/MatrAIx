personas:
  professional: Insook Li is a budding junior coder who channels a methodical mind and artistic flair into creating interactive story apps at their community coding club, where they sketch characters first
    and then animate them with simple JavaScript loops.
  sports: Insook Li participates in the local Under‑10 soccer team, the Riverbend Raptors, enjoys weekend swim practices at the community pool, follows the Seattle Kraken hockey team, and they prefer low‑key
    fitness activities like building LEGO fitness challenges during rainy days.
  arts: Insook Li immerses themselves in drawing manga‑style characters inspired by Hayao Miyazaki and Rumiko Takahashi, practices brush‑pen calligraphy reminiscent of traditional sumi‑e art, collects graphic
    novels like My Hero Academia and Attack on Titan, and they meticulously craft miniature LEGO dioramas that echo scenes from favorite anime series.
  travel: Insook Li loves museum trips, recalling a vivid Saturday at the Natural History Museum in London, dreams of exploring Tokyo’s Akihabara district to see anime art in person, and they prefer family
    outings that blend cultural learning with the chance to sketch souvenirs.
  culinary: Insook Li enjoys cooking simple sushi rolls with cucumber, avocado, and crab sticks alongside their family, experiments with matcha‑flavored ice cream, and despite occasional burnt rice, they
    delight in sharing handcrafted bento boxes at weekend gatherings.
  core: Insook Li is a curious, methodical nine‑year‑old who blends problem‑solving with anime sketches, saves every coin for LEGO dreams, and they turn worries into mindfulness moments while juggling a
    love of sushi and night‑time comic marathons.
background:
  cultural: Insook is a second‑generation East Asian American, with a Korean mother and a Japanese‑Chinese father, growing up in the multicultural Bay Area. She speaks English fluently and is learning Korean
    and basic Mandarin at home. Her family celebrates Lunar New Year, Chuseok, and other cultural festivals, and they incorporate traditional arts such as hanbok dress-up, Korean drum lessons, and Japanese
    origami into her daily life. This blend of cultures fuels her artistic interests and gives her a bicultural perspective that she often expresses through her artwork.
