  career_goals: She dreams of becoming an illustrator or graphic designer who can blend traditional East Asian art styles with modern storytelling. Insook also imagines working on animated films or video
    games, envisioning a future where she can create characters that reflect her cultural heritage. In the longer term, she is curious about careers in museum curation or art education, hoping to share
    her love of art and culture with other children.
