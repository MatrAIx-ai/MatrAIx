  hobbies: '[''Sketching'', ''Manga and anime drawing'', ''Calligraphy'', ''LEGO building'', ''Reading graphic novels'', ''Visiting museums'', ''Coding club (Scratch)'', ''Mindfulness/breathing exercises'',
