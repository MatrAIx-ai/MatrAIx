  career_goals: Paula dreams of a future where she can combine her love for animals, the outdoors, and helping others cope with stress. She envisions becoming a veterinarian or wildlife rehabilitator who
    also runs community outreach programs that bring pet‑therapy and nature‑based activities to schools. In the short term, she wants to deepen her science knowledge, earn a junior ranger badge, and continue
    volunteering with local environmental clubs, laying the groundwork for a career focused on compassionate care and environmental stewardship.
