  career_goals: Francisca aims to advance into senior operations management, overseeing multiple service regions while championing sustainable mechanical practices and cutting‑edge technology integration.
    He aspires to create a formal mentorship program that nurtures junior technicians, strengthen the company’s safety culture, and earn professional certifications such as PMP and Master Mechanic. Balancing
    his drive for progress with his desire for workplace harmony, he seeks roles that allow strategic influence without sacrificing the collaborative, supportive atmosphere he values.
