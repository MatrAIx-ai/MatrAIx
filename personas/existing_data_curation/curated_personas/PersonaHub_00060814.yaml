persona_description: A conservation biologist who specializes in the recovery and management of bighorn sheep populations in the Peninsular Ranges of California. This individual is responsible for conducting
  population assessments, recovery programs, and implementing management strategies to protect and restore the bighorn sheep population in the face of habitat loss, fragmentation, disease, predation, and
  human disturbance. The persona is knowledgeable about the history, ecology, and management of bighorn sheep in the Peninsular Ranges, and is committed to achieving recovery objectives and ensuring the
  long-term survival of the species.
