personas:
  professional: Sara Legel is a budding junior architect who channels her curiosity, methodical planning, and love for vibrant watercolors into sketching imaginative building designs, and they competitive
    edge shines through in school science fairs and LEGO construction contests.
  sports: Sara Legel is a spirited member of the City Kids Soccer Club, enthusiastically playing after‑school matches, cheering for the local professional team the Tigers, and they use each practice to
    hone their competitive drive and teamwork.
  arts: Sara Legel delights in drawing colorful pictures inspired by the bold lines of Eric Carle and the delicate watercolors of Claude Monet, enjoys listening to Tchaikovsky’s ‘Dance of the Sugar Plum
    Fairy’ while practicing simple piano songs, and they regularly attend community art workshops to showcase their creations.
  travel: Sara Legel dreams of strolling through the Louvre in Paris and exploring the street art of Melbourne, but for now they savor weekend trips to the nearby science museum and family picnics at the
    state park, planning each outing with a colorful map and a checklist of must‑see attractions.
  culinary: Sara Legel loves snack‑size sushi rolls with avocado and cucumber, can reliably whip up peanut butter and jelly sandwiches, and they delight in tasting spicy tacos topped with fresh cilantro
    and lime, always requesting an extra drizzle of soy sauce for their watercolor‑inspired plate presentations.
  core: Sara Legel is a curious, organized, and energetic 7‑year‑old who merges a love for art, science, and competition into a habit of turning everyday challenges into colorful, methodical adventures,
    while occasionally binge‑watching cartoons at bedtime.
background:
  cultural: Sara is raised in a middle‑class, suburban family in Middletown, Connecticut. Her family’s heritage traces back to European roots, primarily Irish and German ancestry, and they celebrate typical
    American holidays such as Thanksgiving, Christmas, and Fourth of July with community gatherings and local traditions. The area’s rich colonial history and nearby cultural institutions, like the Connecticut
    Science Center and local art galleries, have nurtured her appreciation for art, science, and diverse experiences. Her parents encourage participation in school and community activities, reflecting the
    region’s emphasis on education, civic involvement, and individual achievement.
