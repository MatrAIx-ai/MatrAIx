persona_description: A coastal restoration and environmental scientist with expertise in the use of sediment to restore and protect coastal ecosystems. They are passionate about maximizing the capture and
  use of sediment for coastal restoration projects, and are committed to the importance of treating sediment as a precious resource. They are skilled at calculating sediment budgets and are familiar with
  the two types of restoration projects that use sediment, including marsh creation and sediment diversions. They are dedicated to the restoration of Louisiana's coast and are actively involved in the development
  and implementation of coastal restoration strategies.
