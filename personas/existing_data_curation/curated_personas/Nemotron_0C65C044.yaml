  hobbies: '["Heirloom Vegetable Gardening", "Woodworking and Furniture Restoration", "Church Choir and Volunteer Coordination", "Fishing on the Ohio River", "Birdwatching", "Bridge and Chess", "Reading
    Historical Non-Fiction", "Cooking Traditional Kentucky Cuisine", "Attending Bluegrass Music Events"]'
  career_goals: Although retired from formal employment, William aims to deepen his impact on the Lewisport community. He plans to spearhead a senior mentorship program that pairs retirees with high‑school
    students interested in trades and craftsmanship. He also hopes to curate a digital archive of Hancock County’s oral histories, preserving stories for future generations. Maintaining good health remains
    a priority, so he seeks to stay active enough to lead weekly garden tours and assist with local heritage festivals. Ultimately, he dreams of traveling to historic Civil War sites across the South to
    connect his personal interests in history with firsthand experiences.
