  career_goals: Denise plans to earn her GED within the next six months and then enroll in a community‑college program focused on early childhood education or health sciences. She aims to become a certified
    nursing aide or a preschool teacher’s aide, leveraging her caring nature and desire for a predictable, structured work environment. In the short term, she hopes to secure a part‑time role in a local
    retail or hospitality setting to gain workplace experience, build professional references, and develop a stable income. Long‑term, she envisions a full‑time position that combines helping others with
    a clear schedule, potentially advancing to a supervisory role within a community health center or educational institution.
