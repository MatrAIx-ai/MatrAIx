personas:
  professional: Camille Walden is a senior health informatics leader at a Chicago public hospital, blending clinical expertise in chronic disease management with data analytics and health‑IT workflow optimization,
    and they leverage their curiosity, talkative nature, and knack for collaborative problem‑solving to champion patient‑centered technology and arts‑based therapeutic programs.
  sports: Camille Walden is an avid fan of the Chicago Bulls and Cubs, they attend Blackhawks games when possible, they stay active through a local yoga studio, a weekend walking club along the Lakefront
    Trail, and a community softball league, and they relish the social camaraderie of cheering with friends, even as they prefer low‑impact activities that fit their busy schedule.
  arts: Camille Walden immerses themselves in Chicago’s cultural life, they paint watercolor cityscapes inspired by Georgia O’Keeffe, attend live jazz performances by Mary Lou Williams at the Green Mill,
    and they regularly visit the Art Institute to study Monet and Grant Wood, believing that artistic expression can heal both patients and themselves.
  travel: Camille Walden designs travel around curated art and culinary experiences, they have explored New Orleans for its jazz heritage, taken a spring road‑trip to Lake Geneva, Illinois for a boutique
    garden stay, they dream of a summer pilgrimage to Kyoto’s temples, and they are planning a future week‑long retreat in the Adirondacks to combine hiking with plein‑air painting.
  culinary: Camille Walden enjoys cooking with fresh heirloom tomatoes, kale, and rosemary from their rooftop garden, they craft dishes like roasted beet and goat‑cheese salad, grilled salmon with dill,
    and occasionally indulge in a classic Chicago deep‑dish pizza topped with Italian sausage and green peppers, while they admit to over‑salting a stew when stressed.
  core: Camille Walden blends a data‑driven medical mind with a watercolor brush, they dominate boardrooms and galleries with talkative enthusiasm, worry about staff burnout, and can’t resist a late‑night
    jazz set after a yoga session.
background:
  cultural: Camille grew up in a middle‑class, Irish‑German family on Chicago’s South Side, absorbing Midwestern values of hard work, community service, and modesty. The city’s cultural diversity and rich
    arts scene nurtured her dual passion for science and creativity. Her career in the public hospital system exposed her to a wide range of patient backgrounds, reinforcing her commitment to equitable,
    compassionate care and her appreciation for the ways art can heal.
