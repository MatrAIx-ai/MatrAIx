    implementation'', ''AI‑assisted clinical decision support'']'
  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting urban scenes'', ''Photography of Chicago architecture'', ''Attending live jazz concerts'', ''Reading science‑fiction and medical
    humanities'', ''Practicing yoga and mindfulness meditation'', ''Volunteering at senior community art workshops'', ''Rooftop gardening and urban farming'', ''Exploring new culinary recipes'']'
  career_goals: Camille aims to move into a senior health informatics leadership role where she can shape technology‑driven, patient‑centered care. She plans to earn a certification in health informatics
    leadership, spearhead quality‑improvement projects that reduce staff burnout, and develop arts‑based therapeutic programs that integrate creative expression into treatment plans for chronic patients.
    Long‑term, she envisions founding a community health initiative in Chicago that pairs medical services with workshops in visual arts, music, and storytelling, while mentoring the next generation of
    compassionate healthcare professionals.
