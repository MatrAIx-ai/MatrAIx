personas:
  professional: Sunny Smart is an aspiring young engineer who transforms a love for structure and solitary exploration into elaborate LEGO constructions, meticulous puzzle solving, and Scratch animation
    projects, and they use their competitive streak to perfect each creation while often feeling distress if plans go awry.
  sports: Sunny Smart plays on the under‑8 soccer team, the Riverside Rockets, watches the Seattle Seahawks and Seattle Mariners for inspiration, prefers solitary skill drills like dribbling and goal‑keeping
    practice over chaotic scrimmages, and they maintain a strict routine of after‑school stretching, reflecting their desire for predictable, structured fitness.
  arts: Sunny Smart sketches watercolor animals modeled after Beatrix Potter’s illustrations, delights in watching Studio Ghibli’s animated shorts like My Neighbor Totoro, and they occasionally attempt
    simple clay modeling, letting their introverted imagination and competitive eye for detail shape a quiet but vibrant artistic life.
  travel: Sunny Smart has visited the local aquarium and a weekend family trip to Redwood National Park, dreams of exploring the Grand Canyon’s rim, and they meticulously plan day trips that include quiet
    nature trails for sketching and ample downtime, favoring structured itineraries over spontaneous vacations.
  culinary: Sunny Smart prefers simple, comforting foods such as cheese pizza, strawberry yogurt, and homemade fruit skewers shaped like LEGO bricks, enjoys helping their parent whisk together pancake batter
    on rainy afternoons, yet they sometimes overindulge in sugary cereal when feeling anxious, capturing a blend of basic cooking skills and occasional snack‑driven coping.
  core: Sunny Smart is a precociously curious eight‑year‑old who channels solitary, structured play into LEGO engineering, wrestles with anxiety through journaling, balances frugal saving with impulsive
    treat cravings, and they prefer quiet corners over crowds, all while fiercely competing with themselves to perfect each creation.
background:
  cultural: Sunny grew up in a suburban area of Louisville, Kentucky, within a middle‑class white family. The local culture blends Southern hospitality with Midwestern practicality, and community life includes
    events like the Kentucky Derby festivities and local library programs. Her family values education and structured activities, which aligns with the city’s emphasis on school performance and extracurricular
    clubs such as the Girl Scouts and library reading groups. While she prefers quiet and solitude, the surrounding community’s love for nature and outdoor spaces, like nearby parks and the Ohio River waterfront,
    encourages her interest in wildlife and outdoor observation.
