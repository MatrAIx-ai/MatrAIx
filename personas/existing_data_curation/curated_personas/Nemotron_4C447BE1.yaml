  career_goals: Sunny dreams of a career that lets her explore facts and create things independently. She aspires to become a wildlife researcher or conservation biologist, where she can study animals in
    the field and analyze data in a quiet lab. She also imagines herself designing educational video games using Scratch, hoping to fuse her love of coding and animals. Ultimately, she wants a role that
    blends scientific inquiry with creative problem solving, allowing her to work mostly alone.
