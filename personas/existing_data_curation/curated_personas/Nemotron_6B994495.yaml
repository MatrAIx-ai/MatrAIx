personas:
  professional: Joan Galas leverages a full‑stack development skill set—JavaScript, React, Node.js, Python, and cloud platforms like AWS and Azure—to build accessible, test‑driven applications while mentoring
    junior developers, and they blend their pragmatic problem‑solving with a curiosity for emerging tech to champion inclusive product strategies at their Scottsdale tech firm.
  sports: Joan Galas regularly hikes the Superstition Mountains, climbs at Arizona Rock Gym, practices yoga at CorePower Yoga, and follows the Arizona Diamondbacks and Phoenix Suns, balancing intense weekend
    outdoor adventures with moderate cardio sessions to maintain fitness without overcommitting.
  arts: Joan Galas captures the stark desert light through photography, attends the Scottsdale Arts Festival, devours science‑fiction by Neal Stephenson and William Gibson, and enjoys listening to The Strokes
    and Lila Downs, allowing artistic expression to inform their user‑experience design ethos.
  travel: Joan Galas prefers road‑trip itineraries that combine desert photography excursions in Sedona, cultural immersion in Santa Fe, and tech conference stops in Berlin, carefully planning itineraries
    with budget‑friendly lodging while using credit‑card points for occasional flights to Kyoto for a spring cherry‑blossom retreat.
  culinary: Joan Galas experiments with Southwestern fusion, regularly cooking chipotle‑marinated grilled salmon, green‑chile chicken enchiladas, and prickly‑pear margaritas, enjoying the process of balancing
    smoky heat and bright citrus, though they sometimes over‑season dishes in pursuit of bold flavors.
  core: Joan Galas is a curiosity‑driven, desert‑loving full‑stack developer who balances disciplined code craftsmanship with spontaneous board‑game feasts, occasionally over‑optimizes projects and over‑spices
    meals, all while fostering inclusive community tech initiatives.
background:
  cultural: Joan identifies as a white American with Midwestern European ancestry, raised in a suburban setting before moving to Scottsdale, Arizona. Her cultural outlook blends mainstream American values—such
    as a strong work ethic, community participation, and celebration of holidays like Thanksgiving and Independence Day—with an appreciation for the Southwest's distinct desert culture, native art, and
    cuisine. She embraces the local spirit of outdoor recreation, supports regional festivals such as the Scottsdale Arts Festival, and engages with the vibrant tech community in Maricopa County, fostering
    connections across diverse backgrounds.
