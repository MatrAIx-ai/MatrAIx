  career_goals: Joan aims to transition into a lead engineering or engineering‑manager role where she can shape product strategy with a focus on building inclusive, socially impactful technology solutions.
    She plans to deepen her expertise in cloud architecture and obtain certifications such as AWS Solutions Architect. Over the next five years, she aspires to spearhead projects that address community
    challenges—like education access or health data transparency—while cultivating a supportive, collaborative team culture. Ultimately, she envisions launching a socially responsible tech startup that
    leverages her technical skills and compassionate leadership to create tools that empower under‑served populations.
