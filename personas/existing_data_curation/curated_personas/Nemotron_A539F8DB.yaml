  career_goals: Marlene’s career ambition is to transform her community‑focused passions into a sustainable livelihood. She plans to complete an associate’s degree in sustainable tourism or recreation,
    then launch a home‑based consultancy that helps small Alaskan businesses adopt eco‑friendly practices and improve operational efficiency. In the near term, she is seeking part‑time remote work as a
    virtual assistant or project coordinator for environmental NGOs, allowing her to balance family responsibilities with professional growth. Ultimately, Marlene envisions opening a modest community hub
    in Homer that combines a craft shop, a café featuring locally sourced seafood, and workshop space for teaching practical skills such as woodworking and native plant gardening.
