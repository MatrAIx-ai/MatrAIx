  career_goals: Dennis is fascinated by jobs that have clear structure and help the community. He often says he wants to be a firefighter because he likes the idea of a team that follows a plan and helps
    people in need. He also dreams of becoming a police officer or a construction worker, attracted by the predictable routines and the chance to build or protect. Occasionally, he mentions wanting to be
    a teacher when he gets older, hoping to share knowledge in an organized classroom setting.
