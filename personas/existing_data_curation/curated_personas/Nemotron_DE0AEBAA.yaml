personas:
  professional: Qing Wu, a retired museum curator and academic researcher, leverages their meticulous project‑management skills and deep expertise in East Asian literature to design community oral‑history
    archives while mentoring graduate students and consulting for local historical societies.
  sports: Qing Wu follows the Philadelphia Eagles and the Phillies, participates in a senior tai chi class at the community center, and joins a seasonal walking group that explores the Wissahickon Valley
    trails, preferring low‑impact activities that complement their health routine.
  arts: Qing Wu, an avid practitioner of calligraphy and brush painting, admires the works of Wang Xizhi and contemporary artist Cai Guo‑Qiang, reads poetry from Li Bai to Walt Whitman, and regularly attends
    exhibitions at the Philadelphia Museum of Art, finding inspiration for their own artistic sketches.
  travel: Qing Wu favors culturally immersive trips, having explored historic sites such as the Philadelphia historic district, Longwood Gardens, and a recent leisurely pilgrimage to Kyoto’s temples, they
    plan future visits to the Smithsonian museums and the scenic Blue Ridge Parkway, always balancing travel budget with senior‑friendly pacing.
  culinary: Qing Wu enjoys cooking with fresh herbs like cilantro, mint, and Chinese chives, skillfully prepares dishes such as hot and sour soup, ginger‑infused stir‑fried bok choy, and occasionally experiments
    with Pennsylvania Dutch pretzel‑bread, though they occasionally over‑salt their soups in pursuit of bold flavor.
  core: Qing Wu blends scholarly curiosity with methodical practicality, balancing solitary calligraphy sessions with community outreach, and they keep a disciplined schedule while indulging in occasional
    impulsive herb‑spice experiments.
background:
  cultural: Qing was born into a Chinese immigrant family that settled in the United States during the 1960s. Raised bilingually, he internalized Confucian values of education, harmony, and respect for
    elders while also embracing the individualistic and pragmatic aspects of American culture. His East Asian heritage informs his appreciation for collective well‑being and cultural continuity, which he
    expresses through community service, preservation of Asian-American histories, and the celebration of traditional festivals alongside his integration into the diverse suburban fabric of Bryn Mawr, Pennsylvania.
attributes:
  skills: '[''East Asian literature analysis'', ''Historical research'', ''Academic writing'', ''Mandarin-English translation'', ''Curriculum development'', ''Public speaking'', ''Project management'',
