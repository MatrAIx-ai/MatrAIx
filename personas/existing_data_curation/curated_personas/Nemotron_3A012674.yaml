  hobbies: '[''Gardening'', ''Cooking'', ''Reading Home‑Design Literature'', ''Yoga'', ''Volunteer Work with Habitat for Humanity'', ''Neighborhood Clean‑up'', ''Book Club'', ''Attending Farmer’s Markets'']'
  career_goals: Brenda aims to obtain her Florida real‑estate broker license within the next year and subsequently launch her own boutique brokerage focused on family‑friendly neighborhoods in Osceola County.
    She plans to achieve top‑producer status in her region, earn the Certified Residential Specialist (CRS) designation, and mentor younger agents, while also expanding her portfolio to include property
    management services.
