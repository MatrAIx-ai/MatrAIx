  career_goals: While no longer part of the formal workforce, Nancy aims to deepen her impact in the Fort Mill community. She plans to complete her associate’s degree in Business Administration at the local
    community college, earn a Master Gardener certification, and serve on the board of the Fort Mill Historical Society. She hopes to lead a neighborhood garden project, publish a guide to Southern garden
    practices, and mentor younger volunteers in budgeting and organizational skills. Additionally, she aspires to compile a family cookbook that blends heritage recipes with the new ideas she discovers.
