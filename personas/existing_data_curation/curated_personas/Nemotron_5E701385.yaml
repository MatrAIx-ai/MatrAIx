  career_goals: He aims to formalize his expertise by earning a Certified Administrative Professional credential and completing a GED program to fill the formal education gap. In the next five years, Eduardo
    hopes to advance to an office manager or senior administrative coordinator role, where he can mentor newer staff and streamline office procedures. He also wishes to use his bilingual abilities to serve
    the growing Mexican-American community in Everett, possibly working as a liaison for community outreach programs.
