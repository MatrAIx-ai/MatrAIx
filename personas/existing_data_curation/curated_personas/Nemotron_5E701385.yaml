personas:
  professional: Eduardo Madruga is a bilingual office administrator whose precise record‑keeping, calendar mastery, and conflict‑free problem solving reflect their preference for structure and reliability,
    and they are actively pursuing a Certified Administrative Professional credential to step into an office‑manager role where they can mentor staff and streamline procedures.
  sports: Eduardo Madruga is a loyal fan of the Seattle Seahawks and Seattle Sounders, plays forward in an adult soccer league at the Everett Community Center, and they complement team spirit with weekend
    hikes along the Puget Sound shoreline to keep a balanced fitness routine.
  arts: Eduardo Madruga curates a modest collection of Frida Kahlo and Diego Rivera prints, enjoys listening to Carlos Santana, Lila Downs, and the classical piano works of Chopin, regularly watches films
    by Alfonso Cuarón, and they unwind by reading historical novels by Carlos Fuentes and Gabriel García Márquez.
  travel: Eduardo Madruga favors carefully planned trips, has explored the San Juan Islands and Oaxaca City’s vibrant markets, dreams of wandering Barcelona’s Gothic Quarter and the historic streets of
    Seville, and they balance adventure with budget by leveraging credit‑card reward points and a flexible itinerary.
  culinary: Eduardo Madruga is a confident home cook who masterfully prepares chiles en nogada, pozole and tamales using fresh corn masa, dried ancho chilies, epazote, and thick‑cut pork, and they love
    swapping recipes at bilingual community potlucks while also savoring fresh salmon at Seattle’s Pike Place Market.
  core: Eduardo Madruga blends meticulous organization with a quiet love of puzzles, a habit of over‑stocking pantry staples for traditional meals, and an occasional tendency to procrastinate on gym sessions
    in favor of extra time behind the camera.
background:
  cultural: Eduardo’s Mexican heritage shapes his daily life and values. He grew up in a bilingual household where Spanish was spoken at home and English at school, giving him deep cultural ties to Mexican
    traditions such as Día de los Muertos, quinceañera celebrations, and Catholic holidays. Even after moving to Everett, he remains active in the local Mexican-American community, attending cultural festivals,
    supporting family gatherings, and preserving Mexican culinary customs. His upbringing instilled a strong sense of family loyalty, cooperation, and respect for communal harmony, which he carries into
    both his personal relationships and his workplace interactions.
