persona_description: A researcher and inventor who specializes in developing and testing innovative in-flight exercise devices to improve venous return and prevent deep vein thrombosis (DVT). The individual
  is particularly interested in developing prototypes that can be used in aircraft seats to stimulate blood flow and reduce the risk of DVT. They have a background in engineering and have previously designed
  and developed a prototype of an in-flight exercise device that achieved comparable EVF and RVF values to those achieved by the tiptoe control manoeuvre. They are seeking to further improve the design
  and functionality of their devices and are open to incorporating feedback and suggestions from users.
