personas:
  professional: John Zoppi, a 33‑year‑old freelance web developer and digital‑media craftsman, blends curiosity with practical know‑how, delivering clean front‑end solutions while navigating a relaxed,
    occasionally disorganized workflow that they balance with attentive listening and decisive client communication.
  sports: John Zoppi, a 33‑year‑old Brooklyn resident, cycles daily through Prospect Park with the Bike Brooklyn club, follows the Brooklyn Nets and New York Knicks on television, and squeezes in weekend
    pick‑up basketball games, preferring flexible, low‑key fitness over regimented gym routines.
  arts: John Zoppi, a 33‑year‑old street‑photography enthusiast, roams Williamsburg’s murals for inspiration from urban graffitists like Banksy, tunes into the moody sounds of St. Vincent at intimate venues,
    and spends evenings editing atmospheric prints in Lightroom for occasional gallery shows.
  travel: John Zoppi, a 33‑year‑old who prefers spontaneous, budget‑friendly trips, has day‑tripped to the Hudson Valley’s farms, spent a weekend exploring Portland’s indie coffee scene, and dreams of wandering
    Kyoto’s historic streets, all while balancing freelance deadlines that sometimes curtail longer vacations.
  culinary: John Zoppi, a 33‑year‑old experimental cook, loves fusing Mediterranean staples such as chickpeas, preserved lemons, and sumac with Brooklyn’s seasonal produce, frequently whipping up shakshuka‑tacos
    or grilled halloumi salads, and they treat cooking as a creative laboratory rather than a strict regimen.
  core: John Zoppi, a 33‑year‑old curious tinkerer, balances a laid‑back freelance hustle with a love for DIY tech, cycling, and Mediterranean‑infused cooking, all while navigating the occasional disorganization
    that fuels their creative spark.
background:
  cultural: John comes from a white, third-generation Italian-American family that settled in Brooklyn in the mid-20th century. His parents emphasized modesty, self-reliance, and a strong work ethic while
    also exposing him to the cultural mosaic of the borough. Growing up in a diverse neighborhood, he absorbed influences from neighboring Caribbean, Latino, and Asian communities, which shaped his openness
    to varied cuisines, music, and perspectives. Although he identifies with his Italian heritage through family traditions and occasional holiday meals, his worldview is largely shaped by the cosmopolitan,
    ever-changing environment of Brooklyn, fostering both an appreciation for tradition and a curiosity about new ideas.
attributes:
  skills: '[''front-end web development (HTML, CSS, JavaScript)'', ''WordPress site customization'', ''photo editing (Adobe Lightroom, Photoshop)'', ''DIY home improvement and basic carpentry'', ''bicycle
