  hobbies: '[''electronics tinkering (Arduino, Raspberry Pi)'', ''science-fiction and technology reading'', ''urban cycling around Brooklyn'', ''exploring cafés and vintage record stores'', ''experimental
    cooking'', ''street photography'', ''attending small live-music shows'']'
  career_goals: John aims to turn his eclectic skill set into a stable freelance career that allows him to work flexibly from his Brooklyn apartment. He plans to earn a professional certification in web
    development within the next year and to build a small client base for website redesign and digital-media projects. At the same time, he is intrigued by the idea of launching a side business offering
    bike-repair and basic electronics troubleshooting services to his neighborhood. Ultimately, he hopes to combine his practical curiosity with a modest income stream that respects his desire for autonomy
    and occasional solitary work.
