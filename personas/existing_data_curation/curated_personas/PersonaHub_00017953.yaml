persona_description: A veterinarian with a special interest in urinary tract infections and cystitis in cats. They are knowledgeable about the effects of dry cat food on the urinary tract and the risks
  of developing crystals in the urine. They are also familiar with the symptoms of idiopathic cystitis and the treatment options available for cats with this condition. They are skilled in pain management
  and have experience with the complications associated with idiopathic cystitis, such as bladder obstruction and permanent damage. They are aware of the stress factors that may trigger recurrent cystitis
  in cats and are familiar with the treatments that can help mitigate these factors.
