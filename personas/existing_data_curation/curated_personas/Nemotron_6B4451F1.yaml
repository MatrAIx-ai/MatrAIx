  hobbies: '[''Karaoke and community theater participation'', ''Live music concert attendance'', ''Morning river walks'', ''Gardening (tomatoes and herbs)'', ''Volunteering as event marshal for local festivals'',
    ''Reading mystery novels'', ''Doing crossword puzzles'']'
  career_goals: Kelly aims to transition from frontline equipment operation to a senior supervisory role where she can oversee a fleet of construction machines and mentor younger operators. She plans to
    earn the Certified Equipment Operator (CEO) credential and eventually obtain a journeyman foreman certification, leveraging her practical experience and associate’s degree. In the long term, she envisions
    starting a small independent equipment rental business that serves local contractors in Allegheny County, allowing her to combine her competitive drive with her knack for networking and community engagement.
    Throughout these ambitions, she seeks positions that balance structured operational standards with enough flexibility to adapt to the unpredictable nature of construction sites.
