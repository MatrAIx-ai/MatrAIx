  hobbies: '[''Reading scientific literature'', ''Science‑fiction novels'', ''Hiking coastal trails'', ''Nature photography'', ''Vegetable gardening'', ''Solo chess puzzles'', ''Personal programming projects'',
    ''Woodworking'', ''Tech podcasts'', ''Model‑railroading'']'
  career_goals: Clifford aspires to secure a tenure‑track position within the next five years, solidifying his reputation as a researcher in applied machine learning. He aims to design a cross‑disciplinary
    data science program that links computer science with environmental and sustainability studies, reflecting his interest in real‑world impact. Obtaining external research funding, publishing regularly
    in high‑impact journals, and becoming a recognized mentor for both undergraduate and graduate students are central to his professional ambitions. He also seeks to maintain a balanced work‑life dynamic
    that supports his marriage and personal interests.
