  hobbies: '[''Watercolor painting'', ''Acoustic guitar playing'', ''Community gardening'', ''Hiking local trails'', ''Cooking Southern cuisine with twists'', ''Reading speculative fiction'', ''Attending
    live music performances'', ''Participating in improv comedy'', ''Creating short digital videos'', ''Exploring art galleries'']'
  career_goals: Harminder aims to complete a Bachelor's degree in Education within the next two years, followed by a Master's in Curriculum and Instruction to deepen his expertise in STEAM integration.
    He aspires to become a grade-level lead teacher and eventually a curriculum specialist, shaping school-wide programs that prioritize creativity and critical inquiry. Long-term, he hopes to be recognized
    as an innovative educator, earn a 'Teacher of the Year' award, and perhaps contribute to district-level policy that supports flexible, arts-rich learning environments. He also entertains the idea of
    launching a community after-school art studio that can serve underserved youth in Tuskegee.
