personas:
  professional: Harminder Schopen, a 26‑year‑old aspiring teacher, designs interdisciplinary STEAM lessons that blend watercolor illustration, coding apps, and community garden projects, leveraging a curious
    yet laid‑back style that keeps classrooms lively while occasionally letting loose scheduling slip through the cracks.
  sports: Harminder Schopen regularly hits the Piedmont trail network with the local hiking club ‘Trailblazers’, packs a reusable water bottle for each trek, and roots for the Atlanta Falcons on Sunday
    afternoons while catching occasional weekend cycling rides with friends.
  arts: Harminder Schopen spends evenings painting Southern landscape watercolors in the style of Winslow Homer, strumming acoustic guitar in a folk‑rock trio that covers Gillian Welch and The Avett Brothers,
    and filming quick documentary‑style videos of downtown street performances for their social media feed.
  travel: Harminder Schopen prefers spontaneous road trips over rigid itineraries, having already road‑tripped to Asheville’s Blue Ridge vistas, Savannah’s historic squares, and a music‑filled weekend in
    New Orleans, while dreaming of a future culinary pilgrimage to Oaxaca once savings allow.
  culinary: Harminder Schopen enjoys experimenting in the kitchen, turning classic shrimp and grits into a miso‑glazed main, spicing peach cobbler with cardamom, and tossing collard greens with pine nuts
    and tamarind, all while sourcing fresh veggies from the community garden and swapping recipes at the local farmer’s market.
  core: Harminder Schopen, a 26‑year‑old creatively‑driven educator, blends art, community, and spontaneous adventure with a relaxed, sometimes disorganized, yet fiercely curious outlook on life.
background:
  cultural: As a white male raised in Tuskegee, Alabama, Harminder grew up steeped in Southern traditions while also developing an appreciation for broader artistic expressions. Family gatherings often
    featured church sing-alongs, barbecue, and storytelling that emphasized community and hospitality. He attended local high school football games, participated in church youth groups, and was exposed
    early to the region's rich musical heritage, from gospel to blues. These experiences fostered a strong sense of place and a respect for communal bonds, while his curiosity led him to seek out diverse
    cultural events, museums, and creative collaborations beyond his hometown.
attributes:
  skills: '[''Lesson design (interdisciplinary)'', ''Classroom management'', ''Differentiated instruction'', ''Art integration'', ''Technology integration'', ''Project-based learning facilitation'', ''Critical
