  hobbies: '[''Journaling'', ''Puzzle solving (Sudoku, crosswords)'', ''Gardening'', ''Cooking/Baking'', ''Book club (personal development)'', ''Volunteer event organization at public library'']'
  career_goals: Carolyn aspires to pursue a career as an administrative professional, aiming to become an office manager or project coordinator within a stable organization that offers clear structures
    and growth pathways. She plans to enroll in a community college program in Business Administration to earn an associate degree, with the long‑term goal of obtaining a certification in Project Management.
    Her competitive drive pushes her to seek advancement, hoping to eventually lead a small team and implement efficient processes. She also intends to develop strategies for managing stress, ensuring her
    professional trajectory aligns with her well‑being.
