personas:
  professional: Carolyn Mcrae is an aspiring office manager who leverages her meticulous Excel budgeting skills and event‑coordination experience from the Clinton Harvest Festival to build ultra‑structured
    workflows, while her competitive drive pushes her to streamline processes for maximum efficiency, even as she sometimes doubts colleagues' intentions.
  sports: Carolyn Mcrae plays in a seasonal community softball league each spring, follows the Iowa Hawkeyes football team with fervor, and rides with the Clinton Cycling Club on a meticulously planned
    training schedule, balancing structured workouts with weekend hikes along the Mississippi River Trail.
  arts: Carolyn Mcrae immerses herself in Midwestern folk music, often listening to Sufjan Stevens and Bon Iver while devouring personal‑development books by Brené Brown, and volunteers at the local library’s
    monthly poetry slam, where she enjoys occasional performances of Lin‑Manuel Miranda’s songs from Hamilton.
  travel: Carolyn Mcrae prefers meticulously planned road trips, having mapped drives to the Effigy Mounds National Monument and a weekend cultural escape to Chicago’s Art Institute, while dreaming of a
    detailed itinerary for a future backpacking tour through the Swiss Alps and an immersive visit to Kyoto’s historic gardens.
  culinary: Carolyn Mcrae excels at baking classic Midwest apple pie with a flaky crust, mastering the perfect balance of cinnamon and nutmeg, and also crafts hearty corn casserole using fresh corn from
    her garden and seasonal herbs like basil and thyme, treating each dish as a predictable yet creative experiment.
  core: Carolyn Mcrae is a detail‑driven planner who channels anxiety into daily journaling, obsessively tracks budgets, finds calm in gardening, yet battles perfectionism that sometimes blocks spontaneous
    fun.
background:
  cultural: Carolyn grew up in Clinton, a small town in Walworth County, Wisconsin, within a predominantly white, middle‑class community. Her family’s cultural roots are grounded in Midwestern values of
    hard work, modesty, and community involvement, with a Lutheran Protestant background that emphasized service and personal responsibility. Local traditions such as county fairs, church gatherings, and
    communal volunteer projects shaped her sense of identity. The region’s emphasis on practicality and self‑reliance is reflected in her pragmatic outlook and organized lifestyle.
