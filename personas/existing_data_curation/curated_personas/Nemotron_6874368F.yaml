personas:
  professional: Hector Rosenblum, a budding mini‑entrepreneur who runs a pretend lemonade stand at the neighborhood park, blends his soaring curiosity about how things work with a practical knack for counting
    change, and yet often leaves the stand's schedule disorganized because they prefer spontaneous play over strict planning.
  sports: Hector Rosenblum, an energetic participant in the Little Kickers soccer team that practices on Saturday mornings, cheers loudly for the New York Yankees during family game nights, and prefers
    the camaraderie of group play over solo drills, though they often misplace their cleats, reflecting a laid‑back approach to obligations.
  arts: Hector Rosenblum, an enthusiastic fan of the animated series 'Bluey' and a budding sketch artist who loves copying scenes from Disney's 'Frozen' while humming songs by the Jonas Brothers, spends
    afternoons drawing on large rolls of paper, and finds the classical piano pieces his parents play soothing when they feel worried.
  travel: Hector Rosenblum, who has visited the local aquarium and a weekend beach trip to Virginia Beach with his family, dreams of seeing the Eiffel Tower someday, and prefers trips that blend structured
    tours with free‑play time at playgrounds, yet they often pack the wrong shoes, leading to spontaneous improvisation.
  culinary: Hector Rosenblum, who adores peanut butter‑jelly sandwiches, cheesy macaroni, and bright orange carrot sticks his mom cuts for snack time, can butter toast with a toy spatula in pretend chef
    mode, yet they frequently trade their favorite cupcakes for candy bars at school, reflecting a flexible but impulsive palate.
  core: Hector Rosenblum blends boundless curiosity with a relaxed, sometimes chaotic approach to routines, thriving on social play, occasional worry, and a vivid imagination that colors every activity
    from lemonade stands to bedtime stories, and they often turn ordinary moments into playful experiments.
background:
  cultural: Raised in a bilingual Mexican‑American household in Hammond, Indiana, Hector grows up hearing Spanish at home, celebrating traditions such as Día de los Muertos and quinceañera preparations,
    enjoying Mexican cuisine, and participating in community gatherings at the local church that blend his family's cultural heritage with Midwestern life.
