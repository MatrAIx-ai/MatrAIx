persona_description: A concerned parent who is concerned about the narrowing of options away from the arts in the EBacc and the potential impact on disadvantaged children. They are also concerned about
  the lack of funding for teacher development in craft education and the effect it has on teachers' ability to keep up with fast-developing contemporary practice. They are also aware of the growing popularity
  of crafts and the potential for them to be a much greater export business, but are concerned about the decline in the arts subjects in the EBacc and the potential impact on young people's haptic skills.
