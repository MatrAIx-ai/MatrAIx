personas:
  professional: Nicholas Saoud, a seasoned hospitality professional with a STEM bachelor’s degree, blends technical troubleshooting, guest‑service mastery, and an art‑savvy eye to design technology‑driven
    concierge solutions, using their curiosity and organized flexibility to mentor staff and pioneer digital luggage tracking for a future boutique inn.
  sports: Nicholas Saoud, a dedicated weekend hiker of the Hocking Hills and a faithful supporter of the Cincinnati Reds and Columbus Blue Jackets, stays fit through low‑impact trail walks, community bowling
    league matches, and a weekly yoga class to manage joint stiffness, while preferring solo strolls over crowded gyms.
  arts: Nicholas Saoud, an avid visual‑arts enthusiast, frequents the Contemporary Arts Center in Cincinnati and the Columbus Museum of Art, curates a home collection of vintage travel posters featuring
    Henri Rousseau and Edward Hopper, practices landscape photography inspired by Ansel Adams, and strums acoustic guitar at local gatherings with a repertoire that includes Bob Dylan and Simon & Garfunkel,
    letting art shape both work and leisure.
  travel: Nicholas Saoud, an immersive explorer, has trekked the Appalachian backroads, spent a week touring Florence’s Renaissance galleries, and dreams of a spring pilgrimage to Kyoto’s historic temples,
    planning trips with a blend of meticulous itineraries and spontaneous detours, always weighing costs against funding his future boutique inn.
  culinary: Nicholas Saoud, a culinary experimenter, enjoys preparing shakshuka with fresh cumin, mastering Sichuan dumplings with authentic star anise, and simmering Irish stew with rosemary and thyme,
    skillfully sourcing heirloom tomatoes and sumac at the farmers’ market, though they sometimes over‑season dishes in pursuit of bold flavor.
  core: Nicholas Saoud intertwines a thirty‑year hospitality career with a love for art, technology, and handcrafted experiences, often juggling vintage poster hoarding, late‑night guitar sessions, and
    meticulous planning for a future boutique inn.
background:
  cultural: Nicholas grew up in Bridgeport, Ohio, a small town in Belmont County characterized by Midwestern values of hard work, community reliance, and modesty. His family’s cultural identity is primarily
    rooted in white, Anglo‑American traditions, but the Saoud surname reflects a generational connection to Middle Eastern ancestry on his paternal side, which introduced a subtle awareness of Arabic language
    and culinary flavors. This blended background nurtured his appreciation for both local customs and broader cultural expressions, informing his openness to unconventional ideas, his respect for artistic
    pursuits, and his ability to connect with guests from diverse backgrounds while maintaining a strong sense of regional identity.
attributes:
