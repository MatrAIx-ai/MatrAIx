  hobbies: '[''Visiting art galleries'', ''Photography'', ''DIY woodworking'', ''Reading science fiction and art history'', ''Hiking in Appalachian trails'', ''Cooking international cuisine'', ''Playing
    acoustic guitar'']'
  career_goals: Nicholas aims to leverage his technical background and hospitality expertise to move into a supervisory role within the next two years, targeting a head concierge or operations manager position.
    He wants to introduce technology‑driven improvements such as digital luggage tracking and interactive, art‑focused guest itineraries. In the longer term, he hopes to open a boutique inn in the Ohio
    hills that integrates local art exhibitions, sustainable practices, and personalized tech‑enhanced services. He is also passionate about mentoring younger staff, fostering curiosity and professional
    growth in the next generation of hospitality workers.
