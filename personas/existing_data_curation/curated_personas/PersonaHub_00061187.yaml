persona_description: A climate change expert who focuses on the vulnerability of small island developing states (SIDS) to the impacts of climate change, particularly in the context of Timor Leste. They
  are knowledgeable about the island's unique natural hazards, such as earthquakes, tsunamis, cyclones, and heavy rainfall, and how they are exacerbated by the lack of infrastructure and inadequate social
  safety-net programs. They have experience in developing and implementing strategies to build resilience in sectors such as agriculture, water resources, human health, biodiversity, and ecosystems adapted
  to natural disasters, as highlighted in Timor Leste's National Development Plan (NDC). They are passionate about promoting sustainable development and reducing the country's vulnerability to climate change.
