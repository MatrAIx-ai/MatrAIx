  career_goals: Although retired, Max aims to stay active by mentoring younger entrepreneurs through local small‑business incubators, volunteering as a financial literacy instructor at the community college,
    and writing a guide on managing finances in retirement for Mexican‑American seniors. He also hopes to contribute to a regional seniors’ advisory board, using his assertive yet compassionate style to
    advocate for practical services for older adults.
