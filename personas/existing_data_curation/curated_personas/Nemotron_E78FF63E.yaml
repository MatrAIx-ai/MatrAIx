personas:
  professional: Thomas Bejger, an aspiring teenage engineer, channels their methodical curiosity into building remote‑controlled aircraft and small robotics projects while leading their school’s 4‑H club’s
    environmental initiatives, and they reliably meet each engineering milestone on schedule.
  sports: Thomas Bejger, a member of the Riverside Runners youth soccer club and the school’s cross‑country team, spends weekends fishing on nearby streams and hiking local trails, all while they cheer
    for the Green Bay Packers during NFL season.
  arts: Thomas Bejger, an amateur acoustic‑guitarist, practices daily to the sounds of John Mayer and The Lumineers, and they often sketch wildlife scenes inspired by the documentaries they watch, while
    attending community concerts featuring folk singer Kate Rusby.
  travel: Thomas Bejger, who has already camped in Shenandoah National Park and fished in Appalachian streams, dreams of trekking Iceland’s glaciers and exploring New Zealand’s volcanic landscapes on a
    future school‑organised exchange, and they eagerly plot each step on a handmade map.
  culinary: Thomas Bejger, an intermediate home cook, favors building hearty salmon‑and‑quinoa bowls with fresh herbs, tossing together trail‑mix snacks, and mastering a spicy taco recipe that balances
    their love for outdoor fuel with occasional late‑night pizza indulgences, and they delight in experimenting with new spice blends each week.
  core: Thomas Bejger blends a methodical engineer’s mindset with a nature‑lover’s curiosity, juggling hobby‑driven projects, disciplined budgeting, and a steady rhythm of outdoor adventures and acoustic
    chords, and they always find time to help a friend with a DIY fix.
background:
  cultural: Thomas comes from a white, Midwestern‑American family that relocated to Palmer, Alaska, when his parents sought work in the region's agricultural and tourism sectors. Growing up in a small,
    close‑knit Alaskan town, he has absorbed the blend of mainstream American traditions—such as celebrating Thanksgiving and Fourth of July—with the frontier values of self‑reliance, respect for the natural
    environment, and community cooperation that are prominent in the Matanuska‑Susitna Borough. The long summer days and dark winters have shaped his appreciation for seasonal cycles, local festivities
    like the Matanuska Valley Fair, and the importance of mutual support among neighbors, all of which influence his worldview and personal priorities.
attributes:
  skills: '["Basic computer literacy (Word, PowerPoint, internet research)", "Middle‑school level mathematics and science proficiency", "Time management and project organization", "Handyman skills (basic
    carpentry, tool usage)", "Introductory electronics (Arduino, simple circuits)", "Outdoor safety and first aid", "Basic fishing and trail navigation", "Clear and cooperative communication"]'
  hobbies: '["Fishing in local streams", "Hiking and trail exploration in the Matanuska‑Susitna region", "Building model kits (aircraft, robotics)", "Playing acoustic guitar", "Reading science magazines
    and watching wildlife documentaries", "Participating in 4‑H club projects and community clean‑up events", "Junior mentorship and volunteering at the community center"]'
  career_goals: Thomas aims to finish high school with a strong academic record, then pursue a college degree in environmental engineering or wildlife biology. He wants to blend his curiosity about Alaska's
    unique ecosystems with his practical skill set to develop sustainable energy solutions—such as micro‑hydro or wind projects—for remote communities. In the long term, he envisions a career that allows
    him to conduct field research, design renewable infrastructure, and perhaps serve as a park ranger or field engineer with the U.S. Forest Service, contributing to the stewardship of Alaska's natural
    resources while supporting his hometown's resilience.
