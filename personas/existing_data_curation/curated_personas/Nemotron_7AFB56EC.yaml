personas:
  professional: Jovan is an aspiring young engineer whose methodical, organized mindset shines through every elaborate LEGO build and carefully plotted chess match, reflecting a natural talent for problem‑solving,
    project planning, and disciplined execution, and they approach each task with a clear, step‑by‑step plan.
  sports: Jovan balances a love of strategic play with physical activity by playing on his school’s youth soccer team, cheering on the Seattle Seahawks and Seattle Sounders, and logging weekend hikes with
    his family, where they track distance and wildlife sightings using a simple fitness app.
  arts: Jovan is a budding trumpeter who draws inspiration from the bold brass of John Philip Sousa’s marches and the improvisational flair of Miles Davis, while also experimenting with electronic beats
    à la Skrillex in their bedroom studio, and they often celebrate their creative side by sketching scenes from the animated films of Hayao Miyazaki.
  travel: Jovan prefers structured, family‑oriented trips, often planning weekend hikes in Shenandoah National Park and treasure‑hunting for local wildlife, while dreaming of future visits to the engineering
    marvels of the Eiffel Tower in Paris and the ancient stone walls of the Great Wall of China, and they imagine each destination as a new puzzle to solve.
  culinary: Jovan enjoys the predictability of building their own meals, such as assembling precise peanut‑butter‑banana sandwiches, rolling homemade pizza dough topped with mozzarella, pepperoni, and fresh
    basil, and whipping up fluffy blueberry pancakes on Saturday mornings, though they sometimes forget to wash the dishes afterward.
  core: Jovan blends a disciplined love of structured creativity, solitary exploration, and meticulous planning into the portrait of a curious, methodical 12‑year‑old who thrives on solving puzzles and
    building worlds, and they channel this energy into every hobby they pursue.
background:
  cultural: Jovan is a Black teenager raised in Hattiesburg, Mississippi, within a close‑knit African‑American community that values family, church, and cultural heritage. He grew up listening to gospel
    music at his family’s church and attending community events that celebrate Black history and Southern traditions. His family emphasizes respect, perseverance, and the importance of education, often
    sharing stories of local civil‑rights activists and the legacy of nearby Historically Black Colleges and Universities. These cultural influences shape his sense of responsibility to his community and
    inspire his interest in building infrastructure that serves and uplifts his neighbors.
