  hobbies: '[''LEGO building'', ''Chess'', ''Reading science and history books'', ''Trumpet (school band)'', ''Digital music creation'', ''Nature walks and journaling'']'
  career_goals: Jovan aspires to pursue a career in civil engineering, focusing on designing safe, sustainable infrastructure for his community in Hattiesburg. He aims to earn a scholarship to attend a
    university with a strong engineering program, potentially an HBCU, and later contribute to mentorship programs that help younger students develop organizational and STEM skills. In the shorter term,
    he plans to excel academically in high school, maintain his leadership role in the robotics club, and gain hands‑on experience through summer STEM camps.
