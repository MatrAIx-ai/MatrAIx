  career_goals: Miranda aspires to pursue a career that blends her love of science with her desire to help others and the environment. She dreams of becoming a wildlife biologist or a veterinarian, focusing
    on conservation and animal welfare. Alternatively, she envisions a future as an elementary science teacher, where she can share her curiosity and practical knowledge with younger students. She values
    stability and the opportunity to make a tangible positive impact, and she plans to attend a reputable university to study biology or environmental science, eventually obtaining the credentials needed
    for her chosen profession.
