personas:
  professional: Miranda Burdette, a 14‑year‑old aspiring game designer and budding young scientist, merges her curiosity for speculative fiction with practical problem‑solving by leading her school’s science
    club experiments, sketching detailed landscape concepts for Scratch games, and maintaining an organized schedule that balances club duties, garden care, and personal study, all while quietly worrying
    about meeting deadlines and ensuring harmony with teammates.
  sports: Miranda Burdette, who delights in bird‑watching hikes, runs on her middle‑school cross‑country team, cheers on the Portland Trail Blazers for NBA inspiration, and spends summer afternoons paddling
    with the Riverbend Junior Kayak Club, prefers low‑impact endurance activities over high‑contact sports, and keeps a modest collection of team memorabilia in her room.
  arts: Miranda Burdette channels her love for fantasy and sci‑fi into digital art, drawing inspiration from creators like Hayao Miyazaki and concept artist Feng Zhu, while listening to Ludovico Einaudi’s
    piano pieces as she sketches landscapes, and she admires indie game developers such as Tom Bender, often watching showcase streams on YouTube to fuel her own Scratch creations.
  travel: Miranda Burdette prefers meticulously planned weekend getaways to nearby state parks such as Crater Lake and Mount Rainier, enjoys spontaneous day hikes on local nature trails, and dreams of a
    future family trip to the Scottish Highlands to explore the misty lochs and ancient castles that fuel her love of fantasy novels.
  culinary: Miranda Burdette, an intermediate home baker, delights in perfecting chocolate chip cookies, lemon‑blueberry scones, and rosemary‑infused focaccia using fresh basil from her garden, often experimenting
    with sea‑salt caramel drizzles and enjoys sharing her treats with family during movie nights.
  core: Miranda Burdette is a quietly ambitious teen who blends solitary creativity with gentle community spirit, constantly juggling curiosity, careful organization, and a tendency to over‑think every
    decision.
background:
  cultural: Miranda was raised in a suburban community in Bullitt County, just outside Louisville, Kentucky. Her family’s cultural roots are grounded in traditional Southern Appalachian and Midwestern values,
    emphasizing hospitality, community involvement, and modesty. Growing up, she attended a public middle school where school events often celebrate regional traditions such as the Kentucky Derby and local
    folk music. Family gatherings feature Southern cuisine like fried chicken, coleslaw, and homemade pies, and holidays are marked by church attendance at a local Baptist congregation. The local culture
    promotes a strong sense of neighborliness, respect for nature—evident in the many nearby parks and horse farms—and an appreciation for practical skills. At the same time, Miranda is exposed to contemporary
    digital culture through social media and online learning platforms, which broaden her perspective beyond her immediate environment while still anchoring her in the values of her community.
