personas:
  professional: Alice Reece, a detail‑oriented environmental studies senior who leverages Excel budgeting, basic GIS mapping, and elementary HTML/CSS to coordinate campus sustainability projects, seamlessly
    blends practical problem‑solving with an organized yet flexible approach to grant‑writing and community outreach, positioning themselves for a future role as a program coordinator for a regional nonprofit.
  sports: Alice Reece, an avid hiker who trails the vineyards and forest paths around Newberg with the Willamette Valley Hiking Club in spring, logs weekly solo runs on the Wildwood Trail, follows the Portland
    Timbers and Oregon State Beavers from the comfort of their living room, and prefers low‑key, self‑paced fitness over team sports.
  arts: Alice Reece, a quiet enthusiast of contemporary fiction who keeps a stack of novels by Sally Rooney and Chimamanda Adichie on the nightstand, captures macro shots of Oregon wildflowers with a Nikon
    D3500, and finds solace in the acoustic melodies of Iron & Wine and the paintings of Pacific Northwest artist Margaret Kilgallen during occasional visits to the Portland Art Museum.
  travel: Alice Reece, a methodical planner who maps weekend getaways to Willamette Valley vineyards and Cannon Beach using a meticulously color‑coded spreadsheet, dreams of exploring the Tuscan countryside
    and the vineyards of Bordeaux, yet balances wanderlust with a student budget and a preference for low‑key, nature‑focused experiences.
  culinary: Alice Reece, a budding home chef who whips up quinoa‑and‑kale salads drizzled with lemon‑tahini, perfects a miso‑glazed salmon with crisped bok choy, and spends Sunday afternoons kneading a
    sourdough starter while savoring the aroma of fresh rosemary and garlic.
  core: Alice Reece, a 20‑year‑old garden‑loving, spreadsheet‑savvy introvert who balances solitary hikes with meticulous budgeting and occasional splurges on vintage knitting yarns.
background:
  cultural: Alice grew up in Newberg, a small city in Oregon’s Willamette Valley known for its agricultural roots, wine culture, and tight‑knit community. Her family’s heritage traces back to mid‑western
    settlers of German and English descent, and she was raised with values of self‑reliance, hard work, and community involvement. The local culture emphasizes outdoor recreation, sustainability, and a
    blend of progressive and traditional perspectives, which has shaped her appreciation for the environment and her pragmatic outlook. She attended a public high school and a community college, where she
    participated in local service projects, reinforcing a sense of civic responsibility common in the region.
attributes:
  skills: '["time management", "budgeting", "project coordination", "Microsoft Office (Word, Excel, PowerPoint)", "basic data analysis (Excel, SPSS)", "research methods", "basic GIS mapping", "garden maintenance
    and sustainable horticulture", "basic HTML/CSS", "event planning", "customer service (volunteer)"]'
  hobbies: '["hiking local trails and vineyards", "nature photography", "gardening (vegetable and native plant cultivation)", "reading contemporary fiction", "journaling", "experimental cooking and recipe
    development", "knitting", "volunteering at a small animal shelter"]'
  career_goals: Alice aims to complete her undergraduate degree in environmental studies or business administration within the next two years. She wants a career that leverages her strengths in organization
    and practical problem solving, such as a program coordinator for a regional sustainability nonprofit or a project manager for a community development initiative. In the medium term, she hopes to lead
    grant‑writing and outreach efforts, eventually moving into a senior program management role where she can shape policies that balance environmental stewardship with economic viability. She also entertains
    the idea of launching a small side business selling handcrafted garden accessories, which would combine her horticultural knowledge with her entrepreneurial drive.
