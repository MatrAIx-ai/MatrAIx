  hobbies: '[''Hiking and exploring Pacific Northwest trails'', ''Kayaking on Lake Union'', ''Ultimate Frisbee league'', ''Karaoke and open‑mic nights'', ''Cooking and grilling'', ''Homebrewing craft beer'',
    ''Toastmasters public‑speaking club'', ''Trivia competitions at local pubs'', ''Volunteer work at community food banks'', ''Playing acoustic guitar'', ''Video gaming (co‑op and strategy games)'', ''Reading
    self‑help and stress‑management literature'']'
  career_goals: Alexander aims to move from a frontline sales associate to a leadership role within the next three to five years. He is pursuing a Certified Professional Sales Leader (CPSL) credential and
    plans to enroll in part‑time business courses to earn an associate's degree in business administration. His primary ambition is to become a sales manager overseeing a team of consultants, where he can
    apply his structured approach to build a high‑performing, supportive culture. Long‑term, he hopes to advance to a regional sales director position, driving revenue growth for a tech‑focused retailer
    or startup. He also envisions eventually launching his own boutique retail outlet that blends technology with sustainable products, creating a community hub that reflects his collaborative values.
