personas:
  professional: Aaron Bursik, a retired corporate finance strategist, leverages their methodical budgeting and risk‑assessment expertise to mentor budding entrepreneurs in Sioux Falls, drafting clear SOPs
    and offering hands‑on consulting while balancing volunteer commitments.
  sports: Aaron Bursik enjoys early morning walks along the river trail, fly‑fishing on the Big Sioux River with the local Big Sioux Fly‑Fishing Club, and follows the Sioux Falls Storm (Indoor Football
    League) and Sioux Falls Skyforce (NBA G League) with avid fandom, sometimes joining a Sunday softball league organized by the Rotary Club.
  arts: Aaron Bursik sings in his Lutheran church choir, treasures the choral works of Johann Sebastian Bach and the folk storytelling of Woody Guthrie, and spends quiet evenings immersed in historical
    nonfiction by Doris Kearns Goodwin, which fuels his appreciation for narrative arts.
  travel: Aaron Bursik favors meticulously planned road trips with his wife, cruising in a modest RV to national treasures like Yellowstone, Badlands, and Rocky Mountain National Parks, while dreaming of
    future visits to Glacier and Great Smoky Mountains.
  culinary: Aaron Bursik relishes cooking garden harvests into dishes such as roasted beet salad with goat cheese, grilled trout marinated in fresh dill, and hearty chicken potpie, showcasing a preference
    for seasonal produce, root vegetables, and simple, wholesome flavors.
  core: Aaron Bursik is a methodical, community‑rooted retiree who blends disciplined finance wisdom with a love for gardening, fly‑fishing, and mentoring, all while maintaining a tidy schedule and a modest
    habit of over‑checking spreadsheets.
background:
  cultural: Aaron is a White Midwestern American with German‑Scandinavian ancestry, raised in a Lutheran family in South Dakota. He embodies the region’s values of hard work, self‑reliance, modesty, and
    strong community ties. His cultural identity is shaped by the agrarian legacy of the Great Plains, participation in local traditions such as county fairs and church gatherings, and a deep respect for
    the practical, down‑to‑earth outlook common among his peers in Sioux Falls.
