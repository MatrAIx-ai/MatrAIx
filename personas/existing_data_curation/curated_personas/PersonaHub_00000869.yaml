persona_description: A government agency responsible for managing and protecting the Swan Canning Riverpark, which is an iconic river in Western Australia. The agency is tasked with ensuring the ecological
  and community benefits and amenity of the river, and it has overseen a range of management projects to maintain and improve the health of the river system. The agency works with over 40 state and local
  government agencies, and its most recent and impressive project is a constructed wetland located on the Ellen Brook tributary.
