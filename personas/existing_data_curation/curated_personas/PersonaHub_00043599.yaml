persona_description: A healthcare provider who specializes in the diagnosis and treatment of premenstrual syndrome (PMS) and premenstrual dysphoric disorder (PMDD). They have extensive knowledge and experience
  in managing the physical and emotional symptoms associated with these conditions, and are equipped to provide effective treatment plans and lifestyle adjustments. They are also knowledgeable about the
  underlying factors that contribute to the onset and severity of PMS, and are well-versed in the diagnostic criteria for these conditions. They are highly skilled in assessing the severity of PMS symptoms,
  and are able to differentiate between mild, moderate, and severe cases. They are also knowledgeable about the different treatment options available for PMS, including medication, lifestyle modifications,
  and psychotherapy. They are committed to providing compassionate and effective care to their patients, and are dedicated to improving the lives of women affected by PMS and PMDD.
