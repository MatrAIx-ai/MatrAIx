  career_goals: Glenn aims to move into a senior crew supervisor role, overseeing larger fiber‑to‑the‑home deployments across Western Massachusetts. He plans to earn a BICSI Installer Certification and
    eventually a Project Management Professional (PMP) credential to broaden his leadership capacity. In the long term, he envisions launching his own small contracting firm that provides specialized telecom
    installations for local businesses and municipal projects, while continuing to mentor the next generation of technicians.
