personas:
  professional: Ananda Sachdeva, a seasoned waitstaff professional, leverages meticulous scheduling, inventory control, and bilingual communication to streamline restaurant operations while mentoring newcomers
    with a disciplined, results‑driven approach.
  sports: Ananda Sachdeva, an avid follower of the Dallas Cowboys and Dallas Stars, participates in weekly yoga sessions at a community studio, plays in a local badminton league during the spring, and maintains
    a disciplined home‑gym routine of cardio and strength training to counterbalance work‑related stress.
  arts: Ananda Sachdeva, an appreciative connoisseur of classical sitar virtuoso Ravi Shankar and Bollywood film scores, enjoys karaoke nights belting out Mariah Carey ballads, and attends regional theatre
    productions like "The Miracle Worker" for a creative escape.
  travel: Ananda Sachdeva, a meticulous planner, prefers short‑term road trips to Texas Hill Country wineries and longer, well‑organized vacations to family‑roots destinations such as the Golden Temple
    area and cultural hubs like London, balancing travel with a fixed work schedule and budget constraints.
  culinary: Ananda Sachdeva, a disciplined home chef, perfects recipes like chicken tikka masala, vegetable biryani, and masala chai using precise spice measurements of turmeric, cumin, and garam masala,
    while maintaining a weekly meal‑prep calendar that blends authentic flavors with Texas‑inspired side dishes.
  core: Ananda Sachdeva, a 49‑year‑old organized multitasker, channels disciplined structure into a demanding restaurant career, navigates anxiety through yoga and meticulous budgeting, and dreams of a
    family‑run café that fuses culinary heritage with pragmatic stability.
background:
  cultural: Ananda is the daughter of Indian Punjabi immigrants who settled in Texas. She grew up speaking Punjabi at home and celebrating traditions such as Diwali, Holi, and Gurpurab. Her family often
    hosted community gatherings and small catering events, instilling in her a deep appreciation for hospitality and disciplined work ethic. The blend of traditional Indian values—emphasis on family, discipline,
    and service—and the multicultural environment of Coppell, Texas, has shaped her pragmatic outlook, organized approach to tasks, and her commitment to excellence in both professional and personal spheres.
attributes:
  skills: '[''Customer service'',''Multitasking'',''Time management'',''POS system operation'',''Inventory management'',''Staff scheduling'',''Conflict resolution'',''Bilingual communication (English/Hindi)'',''Food
