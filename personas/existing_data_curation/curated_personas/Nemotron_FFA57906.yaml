  hobbies: '[''Cooking Indian cuisine'',''Yoga and meditation'',''Reading self‑help books'',''Crossword puzzles'',''Sudoku'',''Bullet journaling'',''Volunteering at cultural festivals'',''Gardening'',''Listening
    to classical Indian music'']'
  career_goals: Ananda aims to move into a supervisory role, targeting a floor manager position within the next two years. She plans to earn a ServSafe Manager certification and develop a structured staff
    training program to improve service efficiency. Long‑term, she dreams of opening a small family‑run café that offers authentic Indian‑inspired dishes, providing both financial security for retirement
    and a platform to showcase her culinary passion. Throughout, she seeks a predictable work schedule that balances her professional ambitions with her need for personal stability.
