  hobbies: '["Fly fishing", "Gardening (native Florida plants)", "Woodworking (furniture building)", "Model ship construction", "Reading technical literature and biographies", "Journaling", "Mindfulness
    meditation", "Waterfront jogging", "Grilling seafood", "Small‑group trivia nights"]'
  career_goals: Jack aims to transition into a senior leadership role—such as Director of Materials Engineering—where he can shape the company's strategic direction toward high‑performance, environmentally
    responsible materials. He seeks to secure at least two patents for novel composite formulations tailored to marine applications, reflecting his competitive drive. Over the next five years, he plans
    to lead a multidisciplinary team, implement rigorous risk‑based design processes, and mentor emerging engineers, while maintaining a structured work schedule that limits unpredictable overtime. Jack
    also aspires to publish in peer‑reviewed journals and present at industry conferences, establishing himself as a recognized subject‑matter expert. As he approaches retirement, he envisions a consulting
    practice that offers advisory services on material selection and sustainability, providing a predictable revenue stream for his family.
