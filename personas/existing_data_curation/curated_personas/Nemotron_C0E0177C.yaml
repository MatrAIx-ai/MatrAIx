  hobbies: '["Gardening", "Quilting", "Reading historical fiction", "Cooking family recipes", "Attending church fellowship gatherings", "Walking on local nature trails", "Listening to classic rock music",
    "DIY home improvement projects"]'
  career_goals: Ashley aims to earn her GED within the next year and become a Certified Nursing Assistant (CNA) to take on more responsibilities and mentor new aides. Long‑term, she hopes to enroll in a
    part‑time Licensed Practical Nurse (LPN) program at a community college, allowing a more predictable schedule and reduced workplace stress. She also aspires to lead a small patient‑care team at her
    current facility, focusing on improving patient comfort and staff collaboration, and to launch a modest home‑care side service for elderly neighbors that offers flexible, compassionate support while
    maintaining control over her work hours.
