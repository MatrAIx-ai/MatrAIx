personas:
  professional: Ashley Morel, a seasoned nursing assistant in a rural Missouri clinic, blends meticulous patient monitoring with a compassionate bedside manner, while navigating their preference for structured
    routines alongside occasional relaxed, flexible approaches that sometimes lead to minor disorganization, and they are actively pursuing a CNA certification to mentor newcomers.
  sports: Ashley Morel enjoys daily walks along Smoot Creek Trail as their primary fitness routine, they cheer on the St. Louis Cardinals during baseball season, and they occasionally join a senior walking
    club that meets at the local community center, preferring low‑impact activity over aggressive exercise.
  arts: Ashley Morel finds solace in quilting circles where they craft intricate patchwork quilts, devours historical fiction novels by authors like Ken Follett, and fills their home with classic rock from
    The Rolling Stones, Fleetwood Mac, and Led Zeppelin, weaving these artistic threads into their identity.
  travel: Ashley Morel favors weekend getaways to the Ozark National Scenic Riverways for hiking and fishing, dreams of exploring historic sites in Washington, D.C., and they balance their travel plans
    with a modest budget that prioritizes family visits and occasional pilgrimages to the annual church fellowship retreat in nearby Tennessee.
  culinary: Ashley Morel experiments with farm-to-table meals, often preparing ratatouille with garden-grown zucchini and tomatoes, loves a hearty chicken and dumpling soup seasoned with thyme and rosemary,
    and they delight in baking apple crisp using fresh orchard apples, while their cooking skill remains comfortably intermediate.
  core: Ashley Morel is a nurturing health-care worker who balances structure with flexibility, worries about finances and health, finds peace in gardening, quilting, and classic rock, and they pursue steady
    growth toward CNA and LPN credentials.
background:
  cultural: Ashley grew up in a working‑class, white family in rural southeast Missouri, where Midwestern values of practicality, community, and modesty were emphasized. Her heritage traces back to German
    and Irish immigrants who settled the region in the late 19th century. The local Protestant (primarily Baptist) church has been a focal point of social life, shaping her sense of communal responsibility
    and moral outlook. The tight‑knit small‑town environment fostered an appreciation for self‑reliance, neighborly support, and a straightforward, no‑frills lifestyle, which continue to influence her daily
    routines and interactions.
attributes:
  skills: '["Patient care", "Vital signs monitoring", "Basic wound dressing", "Infection control practices", "Assistance with daily living activities", "Medical documentation", "Patient mobility and transfer",
