persona_description: A researcher who specializes in the study of seagrass ecosystems, specifically focusing on the impact of temperature and nutrients on coastal lagoon plant communities. They are involved
  in the restoration of eelgrass beds and are interested in understanding the carbon storage potential of seagrass ecosystems. They are experienced in using the TERF™ transplant method to transplant eelgrass
  shoots and have a background in soil science. They have experience with vibracoring underwater and on land, as well as using a muffle furnace for determining soil organic carbon content. They are also
  familiar with the Soil Survey Manual and have conducted research on the organic carbon turnover in tropical soils under pasture after deforestation. They are interested in the effects of sediment organic
  content and hydrodynamic conditions on the growth and distribution of Zostera marina.
