  hobbies: '[''building with blocks'', ''drawing with crayons'', ''listening to storybooks'', ''nature exploration'', ''watching educational cartoons'', ''sticker collecting and organizing'', ''small‑group
    collaborative building'']'
  career_goals: Even at three, Linda talks about becoming a 'big scientist' who discovers new things, an artist who paints beautiful pictures, or a teacher who shares stories. She loves the idea of building
    the biggest Lego tower and winning 'best organized room' awards from her parents. Her competitive streak pushes her to set high standards for herself, aiming to master new skills faster than her peers.
