persona_description: A systems engineer or a digital imaging specialist who is interested in advanced image processing algorithms and their applications in improving the perceived brightness of images.
  This persona is likely to be interested in the IntelliBright™ suite of image processing algorithms, specifically the Local Area Brightness Boost (LABB) algorithm, which adaptsively gains up regions of
  an image that are dim relative to the average picture level. This algorithm is designed to overcome washed out images by applying significant gain to some regions of the image and applying little or no
  gain to other regions. This persona may be involved in designing and implementing the LABB algorithm in a system, or they may be using the LABB algorithm in their own imaging applications.
