persona_description: A female government minister who advocated for women's rights in Iran during the 1970s, focusing on economic empowerment, training, and education programs for grassroots women. She
  served as secretary general of the Women's Organization of Iran, played a central role in the 1975 First World Conference on Women in Mexico City, and negotiated with the Minister of Justice to achieve
  an important reform acknowledging a woman's honor in her own right. Her work was informed by the goal of national development and was influenced by the Iranian Revolution, which was a reaction to women's
  advancement during the 1970s.
