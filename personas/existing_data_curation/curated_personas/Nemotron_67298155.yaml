personas:
  professional: David Calhoun, a veteran elementary and middle-school teacher, leverages his expertise in differentiated instruction and project‑based STEAM curricula to craft fluid, student‑centered lessons,
    while his spontaneous streak sometimes leaves lesson plans loosely organized, prompting him to rely on improvisation and real‑time problem solving in the classroom.
  sports: David Calhoun enjoys early morning fishing trips on Lake Erie with his close‑knit group, hikes the ridges of Hocking Hills State Park each spring, follows the Cleveland Browns on Sundays and the
    Cleveland Guardians during baseball season, and belongs to a local community fishing club that meets monthly.
  arts: David Calhoun spends quiet evenings strumming acoustic guitar to Bob Dylan and Neil Young, curates a model railroad that echoes vintage American railways, and attends regional theater productions
    featuring works by August Wilson, while his reading list includes biographies of Thomas Edison and Mary Shelley.
  travel: David Calhoun prefers self‑guided road trips to historic sites—like a week‑long pilgrimage through Gettysburg, the National Mall, and the battlefields of Antietam—balancing his love for solitary
    discovery with occasional spontaneous weekend camping adventures in the Adirondacks, all while budgeting for family visits during holidays.
  culinary: David Calhoun leans toward farm‑to‑table cooking, regularly preparing roasted chicken with rosemary, grilled trout with lemon‑dill butter, and hearty vegetable stew using carrots, kale, and
    potatoes from his garden, while his skill level is intermediate—confident with stovetop simmering but occasionally over‑salting dishes.
  core: David Calhoun is a curious yet pragmatic educator who trades a penchant for spontaneous lesson improvisation with a penchant for late‑night woodworking, occasional financial slips, and a steadfast
    love for fishing, books, and garden‑fresh meals.
background:
  cultural: David was raised in the Midwest, in a white, middle-class family with deep roots in Jackson County, Missouri. His upbringing reflected typical Midwestern values of modesty, self-reliance, community
    service, and a pragmatic outlook, tempered by a respect for tradition. He attended local public schools and earned his graduate degree in education from the University of Missouri, where he was exposed
    to progressive teaching philosophies while remaining grounded in the practical, down-to-earth sensibilities of his hometown. These cultural influences shape his balanced approach to curiosity and practicality,
    his preference for small-group interaction, and his steady, emotionally resilient demeanor.
attributes:
  skills: '["Differentiated Instruction", "Project-Based Learning", "STEAM Integration", "Curriculum Development", "Formative Assessment Design", "Student Mentoring", "Conflict Resolution", "Adaptive Lesson
    Planning", "Educational Technology Integration", "Collaborative Learning Facilitation"]'
  hobbies: '["Reading Historical Non-fiction", "Woodworking", "Gardening", "Fishing", "Acoustic Guitar Playing", "Hiking", "Model Railroading", "Community Book Club"]'
  career_goals: David aims to transition into an instructional coaching role where he can mentor newer teachers and lead district-wide professional development focused on inquiry-based and flexible teaching
    methods. He also hopes to contribute to curriculum design committees to embed curiosity-driven learning while maintaining practical outcomes. Long-term, he envisions authoring a guide on adaptable classroom
    practices that balances innovation with the realities of everyday teaching.
