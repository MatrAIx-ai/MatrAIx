  hobbies: '[''Playing acoustic guitar'', ''Improvisational comedy'', ''Hosting game nights'', ''Volunteering at community events'', ''Hiking'', ''Sci-fi reading'', ''Custom PC building'', ''Photography'']'
  career_goals: Donald aims to complete his bachelor’s degree in Communications or Marketing while building a portfolio of community‑focused projects. He envisions securing a role as a Marketing Coordinator
    for a local furniture or hospitality business in High Point, leveraging his event‑planning and social‑media expertise. Long‑term, he aspires to become a Community Outreach Director or launch his own
    boutique digital‑marketing agency that helps regional artisans and nonprofits amplify their reach, balancing creative curiosity with a stable, practical career path.
