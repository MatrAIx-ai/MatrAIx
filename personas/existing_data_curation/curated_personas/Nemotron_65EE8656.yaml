  career_goals: Erwin aims to secure a stable, structured career that blends his interest in technology with his desire to serve his community. In the short term, he plans to improve his academic performance,
    earn his high school diploma, and obtain a vocational certification in automotive or computer repair. Long‑term, he aspires to become an IT support specialist or computer technician for a local business,
    and he also dreams of joining the Sulphur fire department or police force, attracted by the clear hierarchy, teamwork, and opportunity to help others.
