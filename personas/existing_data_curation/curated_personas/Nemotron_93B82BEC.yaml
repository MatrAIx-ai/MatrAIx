personas:
  professional: Angel Warren, a licensed architect, merges commercial and residential design expertise with business acumen, using BIM, Revit and agile methods to juggle shifting client needs while eyeing
    partnership, yet their competitive streak sometimes makes them over‑assertive in meetings and a habit of last‑minute spreadsheet scrambles reveals a relaxed attitude toward obligations.
  sports: Angel Warren cycles along the Texas Gulf Coast on weekends, follows the Houston Astros and Houston Dynamo, and joins a local adult soccer league where their competitive nature drives them to overtrain,
    leading to occasional knee soreness that only a yoga stretch finally eases.
  arts: Angel Warren channels a love for photography into capturing sunset silhouettes of Houston’s skyline and attends openings featuring local muralist JR and photographer Edward Burtynsky, while they
    also dabble in DIY home renovations that often leave half‑finished projects scattered around the house.
  travel: Angel Warren prefers spontaneous weekend road trips to Hill Country vineyards or impulsive flights to Santa Fe for its art scene, planning itineraries on a whim with a spreadsheet that never quite
    gets finished, yet always packs a camera and a sketchbook for on‑the‑go design inspiration.
  culinary: Angel Warren experiments with Tex‑Mex fusion, often tossing homemade chorizo into quinoa‑dolma bowls and perfecting a smoky habanero margarita, yet they frequently over‑salt dishes when multitasking
    between a cooking video and a client call, earning a reputation among friends for spicy surprises.
  core: Angel Warren blends a relentless drive for architectural innovation with a laid‑back, slightly disorganized lifestyle, turning late‑night coffee‑fuelled design sprints into spontaneous hikes, all
    while keeping a skeptical eye on collaborators and a habit of forgetting where they placed their keys.
background:
  cultural: Angel grew up in a suburban white Texan family with roots in the Midwest, where values of independence, self‑reliance, and community involvement were emphasized. Raised near Houston, she has
    been exposed to a diverse architectural landscape and a multicultural city vibe, which broadened her aesthetic sensibilities. Her upbringing included participation in church and local community events,
    instilling a strong work ethic and a pragmatic outlook. Living in Pearland, she blends traditional Texan hospitality with a modern, progressive approach to architecture and business.
attributes:
  skills: '["Architectural design (commercial & residential)", "Building Information Modeling (BIM) and Revit", "Sustainable design and LEED standards", "Project budgeting and financial analysis", "Client
    negotiation and relationship management", "Agile project management", "Risk assessment and due diligence", "Design presentation and public speaking", "Strategic business planning for architectural firms"]'
  hobbies: '["Biking and weekend hiking", "Architectural photography", "Yoga and mindfulness practice", "Tex-Mex cooking and recipe experimentation", "Community rebuilding volunteer work", "Listening to
    design and technology podcasts", "Visiting art galleries and museums", "DIY home renovation and woodworking"]'
  career_goals: Angel aims to transition from senior designer to firm partner within the next five years, eventually launching her own boutique architectural practice that specializes in innovative, sustainable
    projects for the Houston metropolitan area. She seeks to win regional design awards, expand her network through speaking engagements at industry conferences, and mentor emerging architects. Angel also
    plans to integrate emerging technologies such as parametric design and AI-driven modeling to stay at the forefront of the field, all while maintaining the flexibility she values in her work-life balance.
