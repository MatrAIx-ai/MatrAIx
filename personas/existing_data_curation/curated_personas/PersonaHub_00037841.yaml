persona_description: A Scottish politician who is committed to developing a fair and efficient social security system in Scotland, which is accessible, fair, and commands the full confidence of claimants
  and the organizations and services that support them. They are dedicated to using the experience of service users and stakeholders in the design of these policies to deliver a Scottish social security
  system that is recognized for its efficiency on behalf of taxpayers, the services it offers, and the fairness of the outcomes it delivers. They are committed to ensuring that people are treated with respect
  and dignity during their time of applying for, being assessed, and receiving disability-related benefits. They are also committed to developing a system that has at its heart a set of principles and values
  that govern it, including ensuring that people are treated with respect and dignity during their time of applying for, being assessed, and receiving disability-related benefits.
