personas:
  professional: Cherie Bone is an aspiring young engineer who spends afternoons programming simple games in Scratch, assembling complex LEGO Technic models, and solving crosswords, channeling their high
    standards and disciplined piano practice into methodical problem‑solving and a balanced mix of curiosity and practicality.
  sports: Cherie Bone participates in a local community swimming club called the River Runners, plays on the school’s beginner soccer team, follows the Los Angeles Lakers and the Seattle Seahawks for professional
    inspiration, and maintains a disciplined fitness routine that balances structured team practices with solitary evening jogs along neighborhood trails.
  arts: Cherie Bone engages in creative pursuits by practicing piano pieces by Ludovico Einaudi, reading sci‑fi works from Isaac Asimov and Neal Stephenson, sketching scenes from local hikes, and attending
    occasional community theater productions of The Little Prince, and they blend their analytical mind with artistic expression.
  travel: Cherie Bone enjoys family nature trips to places like Yosemite National Park and the Florida Everglades, plans weekend outings using a printed guidebook, dreams of exploring the Great Barrier
    Reef, and they balance a love for organized itineraries with spontaneous wildlife spotting, all while navigating the time constraints of school and parental schedules.
  culinary: Cherie Bone favors homemade spaghetti carbonara, avocado sushi rolls, and peanut‑butter banana smoothies, shows budding culinary skill by helping their parents measure ingredients for precise
    recipes, and they delight in trying new ingredients such as smoked paprika and almond flour during weekend cooking experiments.
  core: Cherie Bone is a meticulous puzzle‑loving prodigy who devours sci‑fi novels, constructs intricate LEGO machines, and practices disciplined piano, and they frequently over‑analyze school tasks while
    procrastinating on bedtime due to worry.
background:
  cultural: Cherie was raised in Barnhart, a small community in Jefferson County, Missouri, within a predominantly white, Midwestern American setting. Her family values self‑reliance, community involvement,
    and educational attainment, often attending local church events and participating in community service through organizations like 4‑H and the Girl Scouts. The region’s agricultural roots and close‑knit
    neighborhood foster a sense of responsibility and practicality, while the local public library and school programs provide access to resources that nurture her curiosity and academic ambitions.
