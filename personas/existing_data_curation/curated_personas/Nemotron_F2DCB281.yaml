  career_goals: Cherie aims to pursue a career in biomedical engineering or veterinary medicine, motivated by her curiosity about how living systems work and a practical desire to create tools that improve
    health. She aspires to earn a bachelor's degree in a STEM field, followed by graduate studies, and eventually work in research and development where she can design medical devices or treatments. Her
    goal includes maintaining a structured, high‑achievement environment while contributing positively to society, reflecting her disciplined nature and compassionate side.
