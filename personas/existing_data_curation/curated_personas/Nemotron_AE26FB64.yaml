personas:
  professional: Antonio Boado, a three‑year‑old preschool explorer, they already act as a budding storyteller who weaves imaginative narratives during circle time, channeling their curiosity for new ideas
    into animated play‑acting that delights peers and teachers alike.
  sports: Antonio Boado dashes across the neighborhood park as a member of the Tiny Turtles preschool soccer group, they proudly wave a foam finger for the local minor‑league baseball team the Bay City
    Bluefish, and they eagerly splash in the community pool’s shallow wading area during sunny afternoons.
  arts: Antonio Boado spends afternoons finger‑painting bright suns and rainbows, they sing along to the whimsical tunes of Sesame Street and Disney's 'Let It Go', and they collect Crayola crayons with
    an almost reverent enthusiasm for every new color.
  travel: Antonio Boado loves the rhythm of car rides to Grandma’s house, they have already explored the local aquarium’s touch tanks and the sandy dunes of nearby Seaside Beach, and they dream of one day
    stepping onto the magical streets of Disneyland with a wide‑eyed grin.
  culinary: Antonio Boado delights in scoops of buttery macaroni and cheese topped with a sprinkle of cheddar, they slurp strawberry yogurt after playtime, they make banana pancakes with Mom on Saturday
    mornings, yet they stubbornly refuse broccoli unless it’s cut into dinosaur shapes.
  core: Antonio Boado is a curious, art‑loving three‑year‑old whose boundless energy and love for group play are balanced by a delightfully messy approach to tidying up and a sweet‑tooth that turns every
    snack time into a mini adventure.
background:
  cultural: Antonio comes from a Mexican family that maintains strong cultural traditions in Chicago. At home, he hears Spanish spoken alongside English, enjoys traditional foods like tamales and queso,
    celebrates Día de los Muertos and Mexican holidays with colorful decorations, and listens to mariachi and regional folk music. The vibrant Mexican community in Chicago provides him with cultural festivals,
    language classes, and a sense of belonging that enriches his identity.
