  career_goals: Lindsay aims to secure a stable, full‑time clerical position in a local government office or community health clinic, where she can apply her organizational strengths and help others. In
    the short term, she plans to obtain a Certified Administrative Professional (CAP) credential and enroll in a community‑college associate program in business administration or health services. Long‑term,
    she hopes to advance to a senior office manager or medical records specialist role, achieving financial independence while maintaining a predictable work schedule that aligns with her desire for structure
    and reliability.
