persona_description: A heating and air conditioning service technician who is familiar with the operation and maintenance of contactors and their associated equipment in modern home heating and cooling
  systems. They have experience with both single and double pole contactors and are skilled in identifying and troubleshooting issues related to coil voltage and contactor performance. They are aware of
  the potential for burnt contacts and the consequences of such issues, and are knowledgeable about the importance of regular maintenance and inspection of contactors to prevent costly repairs or replacements.
  They are also aware of the potential for contactor failures due to excessive use and the impact of such failures on the system's performance and efficiency.
