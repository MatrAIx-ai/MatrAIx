personas:
  professional: Eric Correa, an experienced administrative specialist, uses their Excel macro mastery, Lean Six Sigma Yellow Belt mindset, and bilingual Spanish‑English communication to streamline office
    workflows while imposing rigorous standards, and they drive process improvements with a competitive urge to outpace peers and a disciplined, curiosity‑fueled approach.
  sports: Eric Correa, a forward for the Pasadena Athletic Soccer Club, blends competitive sprint drills with weekend hikes through the Texas Hill Country, avidly follows the Houston Dynamo, tracks the
    Astros' season, and stays on the sidelines of the Rockets, and they use disciplined training regimens to balance the high‑energy demands of soccer with the restorative rhythm of hill‑country trails.
  arts: Eric Correa finds solace in the storytelling of Norteño legends like Ramón Ayala and Corrido icons such as Los Tigres del Norte, frequents local mariachi nights, curates a personal vinyl collection
    that includes Carlos Ruiz Zafón’s narrated audiobook adaptations, and they use the emotive power of this music and literature to unwind after a day of process optimization.
  travel: Eric Correa plans deliberate road trips that combine cultural festivals with culinary exploration, often mapping routes through the Texas Hill Country, Santa Fe’s historic plaza, Oaxaca’s Día
    de los Muertos celebrations, and occasional posada gatherings in Houston neighborhoods, and they balance solo discovery with family‑oriented reunions during holiday weekends.
  culinary: Eric Correa, an enthusiastic home chef, skillfully prepares mole poblano with smoked chipotle and hand‑rolled tamales infused with fresh corn masa and queso fresco, experiments with Tex‑Mex
    twists by adding queso fundido and jalapeño, and they keep a pantry stocked with dried chiles de árbol, pasilla, cilantro, and local avocados sourced from a nearby farmer’s market.
  core: Eric Correa is a disciplined, bilingual process‑driven professional who balances a competitive drive with a love for communal cooking, soccer, and strategic games, while they navigate a meticulous
    budget and a vigilant yet occasionally lax health routine.
background:
  cultural: Eric grew up in a close‑knit Mexican‑American family in the Greater Houston area, celebrating Día de los Muertos, Christmas posadas, and other Mexican traditions while also embracing the multicultural
    vibe of Pasadena, Texas. Bilingual by upbringing, he often serves as a bridge between Spanish‑speaking community members and English‑dominant workplaces. His cultural heritage influences his love for
    Mexican cuisine, communal gatherings, and a strong sense of family responsibility, even though he remains never married. Living in Harris County, Eric navigates a blend of Tex‑Mex flavors, regional
    festivals, and a vibrant Hispanic community, which informs both his personal values and professional interactions.
attributes:
  skills: '[''Microsoft Office Suite'', ''Advanced Excel (pivot tables, macros)'', ''Office Management'', ''Bilingual Spanish-English communication'', ''Customer Service'', ''Schedule Coordination'', ''Document
