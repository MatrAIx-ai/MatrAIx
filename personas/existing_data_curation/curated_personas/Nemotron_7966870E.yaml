  hobbies: '[''Cooking traditional Mexican dishes'', ''Playing soccer in a local league'', ''Reading non-fiction on technology and business'', ''DIY home improvement projects'', ''Participating in community
    cultural festivals'', ''Exploring Texas hill country on weekend hikes'', ''Listening to Norteño and Corrido music'', ''Strategy board games like chess'', ''Volunteering at the local community center'',
    ''Maintaining a personal productivity system (bullet journaling)'']'
  career_goals: Eric aims to transition from an administrative support role to an Office Manager position within the next two years, where he can lead a team and shape organizational policies. He plans
    to earn the Certified Administrative Professional (CAP) credential and deepen his Lean Six Sigma expertise to a Green Belt, positioning himself as a process‑optimization specialist. Long‑term, he envisions
    launching a consultancy focused on helping small businesses in the Houston area streamline their back‑office functions, while also mentoring emerging administrative professionals to cultivate a culture
    of high performance and accountability.
