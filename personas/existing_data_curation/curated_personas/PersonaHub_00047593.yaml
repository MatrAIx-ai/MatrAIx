persona_description: A political ecologist who specializes in the intersections of economics, cultures, and land use, particularly in the Latin American tropics and Amazonia. Her research focuses on the
  socio-environmental effects of these processes, an approach now widely known as political ecology. Her work includes analytics on climate change, mitigation, and longer-term strategies under globalization,
  intense migration, and novel climate dynamics. Her research has major implications for understanding the dynamics of land use change and what they imply about human relations with nature, economies, and
  tropical development. Her work has forged new understandings in the development of political ecology, including the analysis and viability of traditional tropical land use practices such as agroforestry
  and the creation of Amazonian black earths. Her early work on indigenous anthropogenic soils was groundbreaking, as it documented how in fact these soils, the product of biochar and low temperature fires,
  were produced. She also studies the impacts of migration on forest and land use. In addition to these more arcane systems, she has carried out extensive research on the livestock sector, analyzed in her
  book Fate of the Forest, and soy economies in Latin America (the main deforestation drivers) and has just edited a major themed issue on this topic for the Journal of Peasant Studies, the top-ranked rural
  development journal. Her interest in alternatives to deforestation involves engagement in the analytics of non-timber forest products and their development, including extractive reserves, which now cover
  more than 10 million hectares in the Amazon Basin and reflect the outcome of new institutions under the pressure of social movements of traditional peoples of various kinds. Her work has been widely recognized
  in the field of political ecology and has had a significant impact on the understanding of land use change and the socio-environmental effects of these processes.
