  hobbies: '[''Visiting art museums and galleries'', ''Street photography'', ''Reading contemporary philosophy'', ''Attending experimental theater'', ''Playing chess and strategic board games'', ''Collecting
    vintage vinyl records'', ''Running in the Schuylkill River Trail'', ''Experimenting with digital art creation'']'
  career_goals: Robert aims to become a senior associate and ultimately a partner at a Philadelphia firm that handles high‑profile corporate and art‑related transactions. He is particularly interested in
    building a boutique practice that bridges corporate law with the art market, helping museums, collectors, and galleries navigate complex acquisitions and trademark issues. Over the next five years,
    he plans to deepen his expertise in international art law, develop a reputation as a trusted advisor in the cultural‑sector, and leverage his business background to lead cross‑border deals. He also
    hopes to mentor junior lawyers, using his competitive drive to foster a high‑performing team while maintaining enough flexibility to pursue personal interests.
