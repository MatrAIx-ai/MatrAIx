persona_description: A linguistics professor who specializes in the study of syntax and semantics, particularly the analysis of syntactic structures and the interpretation of linguistic meaning. His research
  interests include, but are not limited to, the development of computational applications for improving speech recognition software, the examination of how different syntactic structures affect people's
  understanding of language, and the investigation of the relationship between speech production and perception. His work also includes field phonetics and language documentation, as well as the development
  of an interactive online speech atlas of the Dene language communities.
