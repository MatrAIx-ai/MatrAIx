persona_description: A health policy analyst and researcher who is interested in the development and implementation of health-related Sustainable Development Goals (SDGs) and their related benefits and
  costs. They are particularly focused on quantifying the benefits-to-cost ratio (BCR) for specific health goals, such as a 40% reduction in premature deaths before age 70, and identifying the most cost-effective
  interventions to achieve these goals. They are skilled in applying mathematical and statistical models to evaluate the BCR and identify high-priority interventions that can be delivered as priorities
  within an overall commitment to reduce premature deaths by 40% by 2030. They are also interested in the potential for the BCR to be adaptable to low, middle, and high-income countries, inclusive across
  ages and diseases, and consistent with targets currently in development.
