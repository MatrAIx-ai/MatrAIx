persona_description: A geologist who is interested in understanding the relationship between humans and the geologic hazards, processes, and resources that surround us. They are looking for an accessible
  and entertaining writing style, superior pedagogy, appropriate amount of detail and coverage, and tables that provide meaningful and relevant real data for readers. They are also interested in discussing
  medical geology, environmental law, land-use planning, and engineering geology within the context of each geologic situation rather than as separate chapters. They are likely to have a strong interest
  in the field of geology and want to learn more about its application to human endeavors. They are open to learning about new events and developments in the field, such as recent earthquakes and the Hector
  Mine earthquake.
