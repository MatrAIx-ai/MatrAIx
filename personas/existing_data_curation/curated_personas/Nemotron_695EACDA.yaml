  hobbies: '[''visiting art galleries and museums'', ''watercolor painting'', ''digital illustration'', ''street photography'', ''reading contemporary fiction and poetry'', ''listening to philosophy podcasts'',
    ''yoga and mindfulness meditation'', ''volunteering at community art workshops'', ''writing poetry and blog posts'', ''exploring local farmers markets and cooking experimental dishes'']'
  career_goals: Dian aspires to transition from her current hiatus into a role that merges her organizational talent with her passion for the arts. She aims to complete a certificate in Arts Administration
    or Museum Studies, enabling her to secure a position as an arts program coordinator or curator at a local museum or nonprofit gallery in Sacramento. Long‑term, she envisions launching a community‑focused
    art space that offers workshops, exhibitions, and mentorship for emerging artists, while also maintaining a freelance portfolio of illustration and writing to sustain creative independence. She is also
    committed to developing healthier stress‑management habits to support her professional resilience.
