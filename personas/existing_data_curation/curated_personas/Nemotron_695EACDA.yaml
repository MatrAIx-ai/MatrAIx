personas:
  professional: An aspiring arts program coordinator and curator, Dian Banks channels their meticulous project management, research acumen, and digital illustration talent into orchestrating community workshops
    and gallery openings, while their organized, curiosity‑driven mindset blends with an empathetic assertiveness that helps them negotiate funding and manage stress‑induced worry.
  sports: An occasional yoga enthusiast and member of the Midtown Running Club, Dian Banks enjoys weekend rides with the Sacramento Kings fan group, follows the River Cats season on the lookout for a family
    outing, and balances their love of low‑impact cardio with periodic strength‑training sessions despite a tendency to skip workouts after stressful days.
  arts: An avid patron of Sacramento’s street murals, Dian Banks draws inspiration from Frida Kahlo’s emotive portraits, Banksy’s subversive stencils, and Yayoi Kusama’s immersive installations, channeling
    this energy into watercolor paintings, digital illustrations that echo the lyrical mood of Bon Iver, and candid urban photographs captured during community festivals.
  travel: A meticulous planner with a penchant for cultural immersion, Dian Banks has toured the galleries of Barcelona, explored the tea houses of Kyoto, and frequently escapes to Napa Valley’s vineyards,
    yet they often postpone longer trips abroad due to budget constraints and professional uncertainty.
  culinary: A moderately skilled home cook, Dian Banks delights in crafting herb‑infused focaccia, miso‑ramen bowls, and heirloom tomato salads, while also savoring farm‑to‑table brunches at Sacramento’s
    farm markets, though they occasionally indulge in late‑night takeout sushi to soothe post‑work anxiety.
  core: Dian Banks is a curiosity‑driven arts organizer who channels anxiety into meticulous planning, fuels creativity with endless coffee, and habitually sketches in the margins of grant proposals when
    stress spikes.
background:
  cultural: Dian grew up in a middle‑class white American family in the Midwest before relocating to Sacramento for college. Her upbringing combined traditional Midwestern values—emphasis on reliability,
    modesty, and community involvement—with exposure to California's diverse, progressive cultural landscape. This blend informs her open‑minded curiosity about new ideas and art, while her methodical nature
    reflects her Midwestern roots. Living in Sacramento's multicultural environment has broadened her appreciation for varied artistic expressions and reinforced her commitment to inclusive community initiatives.
attributes:
  skills: '[''event planning'', ''project management'', ''research and analysis'', ''creative writing'', ''digital illustration'', ''watercolor painting'', ''street photography'', ''grant writing'', ''public
