  hobbies: '[''Strategy video gaming'', ''Listening to R&B and gospel music'', ''Journaling'', ''Bicycle customization'', ''Cooking Southern comfort food'', ''Pick-up basketball'', ''Sketching comic art'',
    ''Scratch programming'']'
  career_goals: Franklin aims to earn his GED within the next two years, enroll in a local vocational program focused on automotive technology, and become a certified mechanic. He hopes to secure a stable
    apprenticeship at a reputable garage, eventually opening his own community‑focused auto repair shop. Additionally, he intends to pursue a peer‑counselor certification so he can support other youth dealing
    with anxiety and depression, blending his technical aspirations with a desire to help others.
