personas:
  professional: Franklin Love, a high‑school junior with a practical mindset, channels their love for structure into hands‑on automotive learning by fixing neighbors’ bikes after school, tutoring peers
    in Scratch programming, and meticulously documenting each repair in a personal log, all while maintaining a reliable track record on household chores.
  sports: Franklin Love, a dedicated pick‑up basketball enthusiast, joins the Saturday night games at the local community center, idolizes the Atlanta Hawks' fast‑break style, and incorporates quick‑feet
    drills into their after‑school routine to stay agile for both sport and shop work.
  arts: Franklin Love, a creative soul, sketches original comic characters inspired by classic Marvel heroes, grooves to R&B icons like H.E.R. and gospel legends such as Kirk Franklin, and builds interactive
    Scratch stories that blend pixel art with their favorite soulful playlists.
  travel: Franklin Love, an inquisitive teen, dreams of a road‑trip along Route 66 to visit the National Automobile Museum in Reno, as well as a family getaway to New Orleans to experience its jazz heritage
    and savor authentic gumbo, balancing budget constraints with a love for automotive history.
  culinary: Franklin Love, a budding home chef, perfects Southern comfort staples like fried chicken, shrimp and grits, and candied yams, often swapping stories over the stovetop while experimenting with
    spice rubs for future bike‑shop snacks.
  core: Franklin Love, a structured yet emotionally sensitive teen, blends a passion for mechanics, music, and mentorship into a purposeful path toward community‑focused auto repair and peer support.
background:
  cultural: Franklin grew up in a close‑knit African‑American community in Knoxville, where church life, family gatherings, and neighborhood solidarity have shaped his values. His family emphasizes respect
    for elders, perseverance, and mutual support, often sharing traditions such as Sunday gospel services, cooking soul‑food meals, and celebrating events like Juneteenth and Martin Luther King Jr. Day.
    The local cultural tapestry—mixing Southern Appalachian influences with Black urban culture—has given him an appreciation for both gospel music and contemporary hip‑hop, and a strong sense of identity
    rooted in community resilience.
