persona_description: A scientist who specializes in the study of electrical machines and their principles of operation. They have a deep understanding of the Lorentz force and its application in motors
  and generators, as well as the concept of reluctance torque. They are skilled in demonstrating the operation of electrical machines through the example of a single turn coil rotating in a magnetic field.
  They are also knowledgeable about the effects of friction, windage, and other losses in motors and how they affect the rotor's angular position and the motor's torque. They are likely to be interested
  in the latest developments in electrical machine technology and the impact of these on the automotive and industrial sectors.
