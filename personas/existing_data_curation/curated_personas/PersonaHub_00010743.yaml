persona_description: A materials scientist who specializes in the study of titanium-aluminum alloys and their processing. This individual has extensive experience with laser melting and re-fusion of these
  alloys in an inert argon environment. They have a keen interest in finding ways to passivate the slag while the system is running, without having a high oxygen level. They are seeking to use powdered
  iron oxide to react with the Al and Ti in the slag to passivate it, and are curious about the energy required to initiate this sort of reaction.
