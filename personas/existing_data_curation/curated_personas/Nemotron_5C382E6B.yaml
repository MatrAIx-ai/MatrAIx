  career_goals: James aims to complete an associate degree in information technology or business administration within the next two years while maintaining a structured study schedule. He plans to secure
    an entry-level IT support or administrative role at a local company in Saint Joseph, where he can apply his technical and organizational strengths. In the medium term, he intends to advance to a systems
    administrator or project coordinator position, overseeing predictable workflows and ensuring operational reliability. Ultimately, James aspires to launch his own small logistics or e-commerce business
    that emphasizes structured processes, inventory control, and dependable customer service, aligning with his preference for predictability and practical outcomes.
