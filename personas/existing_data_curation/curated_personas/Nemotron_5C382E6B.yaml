personas:
  professional: An aspiring IT support specialist, James Ortega leverages a solid foundation in Microsoft Office, basic networking, and mechanical aptitude to excel in troubleshooting and data entry tasks,
    while they apply disciplined time-management and detail-oriented mindset to become a reliable asset in the structured environment of a local Saint Joseph business.
  sports: A low-key sports fan and avid outdoorsman, James Ortega roots for the Kansas City Chiefs and Kansas City Royals while they spend weekends fishing at Lake Wabash with the St. Joseph Outdoor Club
    and playing half-court basketball in a local recreation league.
  arts: A quietly creative soul, James Ortega finds solace in strumming simple chords to the tunes of John Mayer and Fleetwood Mac, while they immerse themselves in the cinematic scores of Hans Zimmer and
    the strategic narratives of tabletop RPGs, occasionally visiting the St. Joseph Art Gallery for local art exhibits.
  travel: A methodical weekend explorer, James Ortega plans trips using spreadsheets, favoring short drives to Lake of the Ozarks, a yearly hike through the Mark Twain National Forest, and they dream of
    a solo backpacking adventure across Norway’s fjords and a tech tour of Tokyo, balancing adventure with predictable budgets.
  culinary: A systematic home cook, James Ortega prefers straightforward meals such as lemon-dill grilled salmon, spaghetti carbonara with pancetta, and smoked paprika chicken tacos, and they relish honing
    their knife skills on fresh rosemary, garlic, and jalapeño while occasionally treating themselves to a local gourmet burger.
  core: James Ortega blends disciplined planning with a quiet love for solitary strategy games, yet they sometimes sacrifice nightly sleep for late-night model-building marathons.
background:
  cultural: James was raised in Saint Joseph, Missouri, a Midwestern town known for its close-knit community and agricultural heritage. Coming from a white, middle-class family with deep roots in the region—often
    tracing back to German-Irish ancestors—he grew up valuing hard work, punctuality, and practicality, hallmarks of the local culture. Community events such as the Grape Festival, county fairs, and Fourth
    of July parades shaped his sense of regional identity, while his involvement in a local church youth group reinforced a cooperative spirit and modest social network. The surrounding farmlands and nearby
    rivers fostered his appreciation for outdoors activities like fishing and hiking, and the town’s modest size nurtured his preference for small-group interactions over large crowds. These cultural influences
    combine to give James a grounded, reliable, and community-oriented outlook.
