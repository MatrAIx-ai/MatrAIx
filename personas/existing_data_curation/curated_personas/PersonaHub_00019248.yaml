persona_description: A person interested in the ethical considerations and implications of animal use in science, particularly in the context of research, teaching, and testing. This individual may be a
  student, teacher, researcher, or member of an Animal Ethics Committee, seeking to understand the importance of ethical thinking in science and the use of animals in various fields. This person is likely
  to be knowledgeable about the scientific uses of animals in New Zealand and has a strong interest in the ethical issues associated with their use. They are interested in learning about the importance
  of weighing the benefits against the harm caused by animal use and the ways in which ethical thinking can be applied in scientific research and teaching. This person is likely to be open-minded and willing
  to consider alternative viewpoints, particularly those that oppose or support the use of animals in science.
