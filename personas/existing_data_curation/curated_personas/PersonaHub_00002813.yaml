persona_description: A medical professional with expertise in the field of obstetrics and gynecology. The individual has a deep understanding of the complexities and nuances of pregnancy, childbirth, and
  the medical interventions that are often used to treat and prevent complications. They have experience working with a wide range of patients, including those with pre-existing conditions, and are skilled
  in diagnosing and treating medical errors that could lead to cerebral palsy or other birth-related complications. They are highly trained in the use of diagnostic tools and techniques, and are adept at
  interpreting test results and medical records to make informed decisions about patient care.
