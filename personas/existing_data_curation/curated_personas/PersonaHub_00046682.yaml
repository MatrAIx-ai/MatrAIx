persona_description: A group of scientists, reporters, and risk management specialists who are part of a workshop on Near Earth Objects Media/Risk Communications, convened by Secure World Foundation and
  the Association of Space Explorers. They are experts in drafting reports for the United Nations Committee on the Peaceful Uses of Outer Space Scientific and Technical Subcommittee and considering the
  establishment of an Information, Analysis and Warning Network. Their primary interest lies in maintaining a vigilant eye on Near Earth Objects and preventing potential threats to Earth, including the
  establishment of a Planetary Defense strategy. They are likely to have expertise in communication, risk management, and space exploration, as well as knowledge of Near Earth Objects and their potential
  impact on Earth.
