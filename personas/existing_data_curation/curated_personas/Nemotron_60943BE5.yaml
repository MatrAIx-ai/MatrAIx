  career_goals: Thuy aims to keep the store running smoothly through the next few years, ensuring that her team feels supported and motivated. She wants to mentor a younger assistant manager who can eventually
    take over when she fully retires, and she hopes to introduce a small senior‑discount program that benefits older residents of Hilo. In the longer term she dreams of helping her grandchildren open a
    modest family‑run market that showcases Vietnamese and Hawaiian foods, using the skills she has honed over a lifetime.
