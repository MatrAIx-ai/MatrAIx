personas:
  professional: Erline Nesmith, a 12‑year‑old aspiring game designer, blends vivid Disney‑inspired storytelling with Scratch coding to create interactive fan‑fiction adventures, while coordinating set‑design
    duties for the school drama club, showcasing early programming logic, visual narrative skills, and a collaborative, imagination‑driven work ethic.
  sports: Erline Nesmith plays midfield for the Sunshine Community Soccer Club, follows the LA Galaxy for inspiration, loves beach volleyball during summer weekends, and squeezes in quick jump‑rope sessions
    after school to keep fit while balancing a love for team camaraderie with personal athletic goals.
  arts: Erline Nesmith channels the vibrant animation of Disney and the whimsical storytelling of Studio Ghibli into hand‑drawn character sketches, admires the music of Taylor Swift and the theatrical flair
    of Lin‑Manuel Miranda, and eagerly participates in school drama productions, especially loving the role of a mischievous sprite in the adaptation of "Alice in Wonderland."
  travel: Erline Nesmith loves spontaneous weekend trips to nearby beaches like Santa Monica, collects Polaroid snapshots of sunrise at the pier, yearns to explore the themed realms of Tokyo Disneyland,
    and dreams of a summer art‑focused getaway to Paris, budgeting trips around school breaks and parental approvals.
  culinary: Erline Nesmith, a budding home chef, delights in whipping up rainbow pasta with beet‑infused tomato sauce and crafting sushi rolls using avocado and cucumber after watching cooking tutorials,
    while also indulging in pepperoni pizza at the local pizzeria and savoring fresh pineapple smoothies on beach outings.
  core: Erline Nesmith is a 12‑year‑old dreamer who sketches Disney heroes on napkins, codes whimsical games on Scratch, hoards loose change for LEGO, over‑worries about school quizzes, and can’t resist
    a midnight slice of pizza.
background:
  cultural: Erline was raised in Anaheim, a lively suburb of Orange County, within a middle‑class family of European descent. Her household observes typical American traditions such as Thanksgiving and
    Christmas while also appreciating the multicultural environment of Southern California. Frequent visits to Disneyland, local beaches, and culturally diverse school events expose her to Mexican, Asian,
    and other cultural influences that enrich her artistic perspective. Community involvement through school festivals and volunteer programs has fostered a strong sense of belonging and a desire to contribute
    positively to her neighborhood.
