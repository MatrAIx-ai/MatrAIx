  career_goals: Erline dreams of attending an arts‑focused high school and later studying animation or visual storytelling at a university. She hopes to become an animator or game designer who creates inclusive,
    emotionally resonant characters for children’s media. She also aspires to write and illustrate her own graphic novels that blend fantasy with messages about mental‑health awareness. In the long term,
    she envisions leading community workshops that use art and technology to empower other young people, especially those who feel anxious or stressed.
