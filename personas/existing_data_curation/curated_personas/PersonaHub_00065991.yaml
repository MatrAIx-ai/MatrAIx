persona_description: A scientist or researcher who specializes in the study of primate behavior and vision, particularly in how different types of vision affect the foraging behavior of New World monkeys.
  They have conducted research in the Peruvian Amazon to study how trichromatic, monochromatic, and dichromatic vision types affect the foraging behavior of tamarins and owl monkeys. They have used spectrometers
  to measure the color of the fruit and leaves that the tamarins feed on, and have found that many New World monkeys have trouble discriminating between red and green, which can hinder their ability to
  tell ripe fruit from raw. They are likely to be interested in the field of primatology and have a deep understanding of the cognitive and behavioral aspects of primate behavior.
