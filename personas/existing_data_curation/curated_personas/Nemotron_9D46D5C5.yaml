  hobbies: '[''Drawing and watercolor painting'', ''LEGO building and imaginative play'', ''Collecting and identifying leaves, rocks, insects'', ''Listening to gospel and R&B music'', ''Solving jigsaw and
    digital puzzles'', ''Watching nature and space documentaries'', ''Using educational tablet apps'']'
  career_goals: Lucius dreams of becoming an artist who creates vibrant paintings and comic‑book stories that capture the worlds he imagines. He also loves the idea of working as a scientist or inventor,
    building gadgets that explore nature or space. He sometimes talks about wanting to be an astronaut who can study distant planets while sketching the stars. His long‑term ambition is to combine his love
    of art and curiosity about the natural world into a career that lets him work independently, creating visual‑and‑scientific projects that inspire others.
