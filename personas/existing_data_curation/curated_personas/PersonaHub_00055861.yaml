persona_description: Dr. Jackie Rudd, an associate professor at the Texas A&M University System Agricultural Research and Extension Center and state wheat breeder, is looking at wild grass species and synthetic
  wheats for possible solutions to the challenges posed by biotic and abiotic stresses, limited genetic variability in traditional breeding, and the need for more drought tolerance. Her research focuses
  on tapping untapped genetic variability from wild grasses and hexaploid wheat through laboratory crosses, with a goal to increase the genetic variability in wheat. Her work is supported by the Texas Wheat
  Producers Board, and she has a keen interest in the study of group theory, particularly in the concepts and theorems related to subgroups and isomorphisms.
