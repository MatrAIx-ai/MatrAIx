  career_goals: Lauren aims to earn a culinary certification from a community college program within the next year, reinforcing her practical knowledge with formal credentials. She plans to advance to a
    sous‑chef position in her current restaurant over the next two years, demonstrating assertive leadership while staying collaborative with her crew. Long‑term, she envisions becoming a head chef and
    launching her own food‑truck concept that highlights sustainable, Californian‑style dishes infused with flavors she discovers through her culinary curiosity. Alongside building her brand through a food
    blog and social media, she hopes to mentor at‑risk youth by volunteering in community kitchen programs, blending her compassionate nature with her professional ambitions.
