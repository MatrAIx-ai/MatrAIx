personas:
  professional: Noralis Lima works as a junior surveillance analyst at a bustling California casino, where their meticulous real‑time CCTV monitoring, fluency in English and Spanish, and habit of proposing
    unconventional camera placements blend disciplined precision with a creatively curious mindset.
  sports: Noralis Lima joins a campus beach‑volleyball club, trains with the local salsa dance troupe, and follows the Los Angeles Lakers and LA Galaxy, balancing competitive court drills with rhythmic
    dance sessions to maintain agility and social connection.
  arts: Noralis Lima frequents contemporary galleries showcasing works by Banksy and Shepard Fairey, channels the vibrant colors of Frida Kahlo into their own street‑mural sketches, and draws rhythmic inspiration
    from Celía Cruz and contemporary Latin jazz ensembles during salsa practice.
  travel: Noralis Lima, with a modest travel budget, plans weekend road trips to the vibrant murals of Detroit and the historic plazas of Oaxaca, dreams of a spring backpacking adventure across their family's
    ancestral homeland to reconnect with roots, and hopes to eventually explore the contemporary art scene of Berlin during a university exchange.
  culinary: Noralis Lima, a confident home cook, perfects family tamales stuffed with pork and masa dough, simmers pepian with roasted tomatoes, pumpkin seeds, and achiote, and crafts fresh corn tortillas
    by hand, while also experimenting with guava‑chile salsa and sourcing organic cilantro and chilies at the local farmer’s market.
  core: Noralis Lima fuses disciplined surveillance expertise with a restless creative spirit, channeling competitive drive into art, dance, and community service, all while wrestling with anxiety‑fuelled
    perfectionism and a penchant for impromptu midnight sketch sessions.
background:
  cultural: Noralis is a first‑generation Guatemalan American raised in a bilingual household that values family solidarity, respect, and cultural celebration. She grew up speaking Spanish at home and participating
    in Guatemalan traditions such as Día de los Muertos, Semana Santa processions, and annual festivals featuring marimba music and folk dance. These customs instilled a deep appreciation for communal rituals
    and vibrant artistic expression. While she embraces American life in Rio Vista—engaging in school clubs, local sports, and the diverse Bay Area culture—she maintains strong ties to her heritage through
    Spanish language media, cooking traditional dishes, and active involvement in the regional Guatemalan diaspora community.
attributes:
  skills: '[''CCTV monitoring'', ''Live video analytics'', ''Crisis de‑escalation'', ''Physical security patrol'', ''Incident reporting'', ''Gaming regulatory compliance'', ''Bilingual communication (English/Spanish)'',
