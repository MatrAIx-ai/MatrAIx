  hobbies: '[''Sketching street murals'', ''Salsa dancing'', ''Volleyball'', ''Reading mystery novels'', ''Yoga'', ''Journaling'', ''Cooking Guatemalan cuisine'', ''Exploring contemporary art galleries'',
    ''Playing strategy video games'', ''Attending community cultural festivals'']'
  career_goals: Noralis aspires to become a senior surveillance analyst and eventually a security manager for a major casino or entertainment complex in California. She plans to earn a degree in criminal
    justice or cybersecurity while obtaining professional certifications such as Certified Protection Professional (CPP) and Certified Surveillance Operator (CSO). Her competitive nature fuels a desire
    to lead a specialized investigative team, develop innovative security protocols, and mentor younger guards. Long‑term, she hopes to bridge her security expertise with community outreach, creating safety
    workshops for local youth and supporting cultural arts programs that reflect her Guatemalan heritage.
