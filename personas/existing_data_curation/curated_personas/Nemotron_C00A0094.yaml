  hobbies: '[''Heirloom vegetable gardening'', ''Knitwear crafting'', ''Crochet'', ''Historical fiction reading'', ''Family genealogy research'', ''Bird watching'', ''Traditional Southern cooking and canning'',
    ''Listening to jazz and big‑band music'', ''Bridge with a small group of friends'', ''Walking in local parks'', ''Knitting circle at church'']'
  career_goals: Although no longer in the formal workforce, Chelsea’s ambition is to remain independent, healthy, and engaged in her community. She aims to continue expanding her garden, complete a family
    scrapbook that documents her lineage, and mentor her grandchildren and local teens in crafts and cooking. She also hopes to contribute her experience by occasionally leading a small senior‑center gardening
    workshop, thereby sharing practical knowledge while enjoying the quiet satisfaction of teaching.
