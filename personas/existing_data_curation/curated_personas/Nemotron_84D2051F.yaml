  hobbies: '["Cooking traditional Puerto Rican dishes", "Salsa dancing", "Attending local festivals and community events", "Gardening (herbs and ornamental plants)", "Listening to Bomba and Plena music",
    "Watching telenovelas", "Reading romance novels", "Volunteering at church or community center", "Social gatherings with friends and family", "DIY crafts (knitting/crocheting)"]'
  career_goals: Cynthia aims to move into a supervisory role, such as floor manager, where she can design more structured shift schedules and mentor newer staff, blending her love for predictability with
    her flexible, people‑focused style. She plans to enroll in a short hospitality‑management course to earn a certification that will bolster her leadership credentials. Long‑term, she dreams of opening
    a modest neighborhood café that highlights traditional Puerto Rican dishes and serves as a gathering spot for her community, offering a stable income for her family while preserving cultural traditions.
