personas:
  professional: Annakaye Lewis, a 4-year-old pretend office manager, meticulously arranges her crayons by color, drafts a daily play schedule, and runs a tiny "toy inventory" for her friends, showcasing
    an early knack for order, practicality, and a competitive drive that pushes them to be the most organized playgroup leader.
  sports: Annakaye Lewis plays T-ball on the Conway Cubs, follows a set practice routine, keeps a personal tally of bases stolen, cheerfully wears a Razorbacks jersey while watching Saturday football, and
    they thrive in structured, small-team competition that satisfies their love of predictability and competitive spirit.
  arts: Annakaye Lewis delights in the junior gospel choir at church, rehearsing songs like Kirk Franklin's "Stomp" and Beyoncé's "Love on Top," while also drawing colorful scenes of the performances and
    enjoying Disney's "Moana" soundtrack, merging a love for rhythm, storytelling, and creative expression as they explore music and art.
  travel: Annakaye Lewis enjoys family road trips to places like Hot Springs, Arkansas, and Memphis, Tennessee, where they follow a familiar itinerary, love listening to gospel playlists on the drive, and
    dream of visiting Disney World, balancing a desire for adventure with the comfort of well-planned, low-stress travel.
  culinary: Annakaye Lewis favors soul-food staples such as crispy fried chicken, creamy macaroni and cheese, and sweet potato pie, proudly helps stir biscuit dough with a wooden spoon, and enjoys simple
    snacks like strawberries on cereal, reflecting a palate shaped by family gatherings and modest cooking involvement.
  core: Annakaye Lewis is a detail-oriented, quietly competitive 4-year-old who finds comfort in routine, thrives in small-group activities, and they navigate the world with a mix of careful planning and
    occasional worry.
background:
  cultural: Annakaye is raised in a Black family in Conway, Arkansas, where Southern and African‑American traditions intersect. Her household places strong emphasis on community, church, and family gatherings
    that feature soul food, storytelling, and gospel singing. Weekly Sunday school and local events such as Juneteenth celebrations expose her to African‑American history, music, and cultural pride. These
    experiences nurture values of responsibility, respect for elders, and the importance of a supportive network, while also giving her a sense of belonging within a close‑knit Black community in the rural
    South.
attributes:
