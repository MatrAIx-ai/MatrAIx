  hobbies: '[''building block construction'', ''picture puzzle solving'', ''drawing within lines'', ''listening to gospel music'', ''reading picture books'', ''playing Simon Says'', ''quiet nature walks'',
    ''simple competitive races'']'
  career_goals: Although only four, Annakaye already voices simple career aspirations shaped by her love of order and responsibility. She often says she wants to become a teacher because a classroom offers
    clear rules, a predictable schedule, and the chance to help others learn step by step. She also mentions a desire to be a veterinarian, drawn to the systematic care of animals and the structured routines
    of a clinic. Her ambitions are guided by her wish for environments where she can be dependable, organized, and competitive in a supportive way.
