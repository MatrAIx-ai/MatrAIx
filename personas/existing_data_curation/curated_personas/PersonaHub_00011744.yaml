persona_description: A dedicated and experienced professional in the field of geodetics and navigation, with expertise in satellite positioning and the International Global Navigation Satellite Systems
  Service. They are passionate about ensuring the accuracy and reliability of GPS data for the safety and security of millions worldwide. Their role involves leading an international partnership to compile
  and analyze satellite orbit data from 10 analysis centers worldwide to produce the highest quality satellite position data possible. Their background in NOAA's National Geodetic Survey, their dedication
  to enhancing economic security and national safety, and their interest in the emerging Global Earth Observation System of Systems (GEOSS) make them an ideal candidate for this role.
