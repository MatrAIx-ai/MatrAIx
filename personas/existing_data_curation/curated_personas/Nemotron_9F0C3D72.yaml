personas:
  professional: An emerging senior collections strategist, Shaquita Romany merges their business acumen with library science expertise including MARC, Dublin Core, and integrated library systems to spearhead
    culturally responsive digital preservation initiatives, and their methodical organization and empathetic communication turn data-driven decisions into inclusive storytelling for patrons.
  sports: A fitness-focused community member, Shaquita Romany follows the Los Angeles Lakers and Dodgers, jogs with the San Bernardino Trail Club during spring, practices yoga three times weekly at a local
    studio, and joins a co-ed recreational soccer league that fields a team in the Southern California Amateur Soccer Association each fall.
  arts: A devoted arts enthusiast, Shaquita Romany curates personal playlists featuring Nina Simone, Kamasi Washington, and spoken-word poet Saeed Jones, visits the Riverside Contemporary Art Museum to
    admire works by Kehinde Wiley and emerging muralists, and frequently attends open-mic poetry nights at local cafes.
  travel: An intentional explorer, Shaquita Romany prefers meticulously planned trips that blend adventure and cultural immersion, having hiked the San Bernardino peaks, explored the jazz heritage of New
    Orleans, and dreaming of photographing the aurora borealis in Iceland while they balance a modest travel budget and occasional work-related constraints.
  culinary: A passionate home cook, Shaquita Romany expertly prepares soulful dishes like shrimp and grits, sweet potato pie, and collard greens seasoned with smoked turkey, often pairing them with homemade
    cornbread made from stone-ground cornmeal, and they love hosting intimate dinner gatherings where the aroma of simmering okra stew fills the living room.
  core: Shaquita Romany blends meticulous organization with fierce curiosity, turning every library shelf and kitchen stove into a canvas for cultural storytelling, while their tendency to over-think can
    spiral into late-night anxiety-driven Netflix binges.
background:
  cultural: Shaquita identifies as a Black American with deep roots in the African diaspora and a strong connection to California's multicultural fabric. Her upbringing emphasized the importance of community,
    storytelling, and artistic expression, shaping her appreciation for Black literature, visual arts, and music. She frequently engages with local cultural events that celebrate African American heritage,
    and she values the preservation of historical narratives within public collections. Her cultural perspective informs her professional commitment to increasing representation and accessibility of diverse
    voices in library resources, while also guiding her personal practices of self‑care and communal solidarity.
attributes:
  skills: '[''Cataloging'', ''Metadata Management (MARC, Dublin Core)'', ''Digital Asset Management'', ''Integrated Library Systems (ILS) operation'', ''Collection Development'', ''Budgeting and Financial
    Planning'', ''Data Analysis'', ''Strategic Planning'', ''Information Literacy Instruction'', ''Research Assistance'', ''Small-group Workshop Facilitation'', ''Conflict Resolution'', ''Patron Services'',
    ''Project Management'']'
  hobbies: '[''Reading contemporary fiction'', ''Visiting art galleries'', ''Photography'', ''Yoga and meditation'', ''Cooking African American heritage dishes'', ''Hiking in the San Bernardino mountains'',
    ''Participating in a small book club'', ''Journaling'', ''Curating personal music playlists'']'
  career_goals: Shaquita aims to advance into a senior collections manager role where she can lead large-scale digital preservation initiatives and curate culturally responsive exhibitions. She plans to
    pursue a master's degree in Library and Information Science to deepen her expertise in archival science and community outreach. Long‑term, she envisions establishing a collaborative space that highlights
    underrepresented Black authors and artists, leveraging her business background to secure funding and partnerships. She also aspires to mentor emerging librarians, particularly those from marginalized
    backgrounds, and to develop mental‑wellness resources within library services to support patrons experiencing anxiety or distress.
