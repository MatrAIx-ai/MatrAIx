  hobbies: '[''Potluck hosting'', ''Book club membership'', ''Church choir singing'', ''Heirloom gardening'', ''Nature walks'', ''Community fairs and crafts'', ''Quilting'', ''Genealogy research'']'
  career_goals: Although she is no longer part of the formal workforce, Annalyn aims to expand her impact in the Paragon community by leading a neighborhood garden program that supplies fresh produce to
    the local senior center. She also intends to mentor younger residents in practical life skills such as cooking, budgeting, and basic home maintenance. Learning a new craft—like pottery or digital photography—is
    high on her personal ambition list, as is enhancing her comfort with technology to help seniors navigate online services. Ultimately, she hopes to cultivate a more connected, resilient community where
    shared knowledge and mutual support flourish.
