personas:
  professional: Edgar Piazza is a budding robotics enthusiast who builds intricate LEGO Technic machines and programs simple Scratch games, merging methodical planning with spontaneous tinkering while consistently
    delivering projects for his school’s environmental club.
  sports: Edgar Piazza cycles with the local Junior Bike Club, plays forward on the middle school soccer team, anchors their weekend routine with a quick jog around the neighborhood park, and passionately
    cheers for the professional baseball team the Chicago Cubs while favoring consistent practice over intense competition.
  arts: Edgar Piazza sketches deer, foxes, and songbirds inspired by John Audubon’s field drawings, devours graphic novels like Kazu Kibuishi’s Amulet, and listens to indie folk duo Fleet Foxes while doodling,
    letting these creative pursuits shape their quiet, observant personality.
  travel: Edgar Piazza enjoys planned weekend trips to nearby Shenandoah National Park, relishes a city cultural excursion to Washington, D.C., and dreams of backpacking through the Grand Canyon, balancing
    a love for structured itineraries with spontaneous wildlife‑spotting detours.
  culinary: Edgar Piazza whips up simple family meals such as spaghetti carbonara, cheesy quesadillas, and a veggie stir‑fry featuring broccoli, carrots, and bell peppers, demonstrating an early knack for
    measurements, yet occasionally forgets to set the timer, resulting in overcooked pasta.
  core: Edgar Piazza is a quietly curious 12‑year‑old who merges meticulous LEGO engineering with a love for wildlife art, balancing disciplined routines with spontaneous creativity while navigating modest
    finances and occasional perfectionist quirks.
background:
  cultural: Edgar comes from a middle‑class white American family in Milwaukee, Wisconsin. The Midwestern emphasis on modesty, hard work, and community service shapes his outlook. He was raised with occasional
    Catholic traditions that stress helping others, and he participates in local customs such as attending Brewers baseball games and community garden projects. The blend of the city’s industrial heritage
    and the nearby lake’s recreational opportunities fostered his interest in both practical hands‑on skills and appreciation for the natural environment.
