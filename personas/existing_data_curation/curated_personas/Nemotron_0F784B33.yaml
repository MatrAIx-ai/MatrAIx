personas:
  professional: Cheyenne Mclean, a veteran elementary‑to‑middle school educator with over thirty years of experience, applies their methodical, data‑driven mindset and love for structure to craft detailed,
    standards‑aligned literacy curricula, design individualized education plans for special‑needs students, and quietly mentor introverted teachers while steering a district‑wide reading initiative as they
    transition toward educational consulting.
  sports: Cheyenne Mclean, an avid supporter of the Tampa Bay Buccaneers and the Florida Gators, participates in the Pensacola senior walkers’ club, enjoys low‑impact water aerobics at the local YMCA during
    the summer, and follows the schedule of the Pensacola Blue Wahoos minor‑league baseball team, using these structured, low‑intensity activities to stay fit while honoring their preference for solitude.
  arts: Cheyenne Mclean finds artistic inspiration in the soulful blues of B.B. King, the evocative Southern narratives of Pat Conroy, and the striking wildlife photography of Art Wolfe, weaving these influences
    into their own nature photographs, knitting designs, and a personal collection of vintage Southern literature.
  travel: Cheyenne Mclean plans travel with meticulous checklists, favoring quiet bird‑watching trips to Belize’s barrier reef, historic tours of Charleston and Savannah, serene mornings on the Gulf Islands
    National Seashore, and dreaming of exploring the Cotswolds villages in England, all while balancing a modest budget and a desire for reflective solitude.
  culinary: Cheyenne Mclean prepares simple Southern seafood dishes such as grilled shrimp tossed with lemon‑garlic butter and stone‑crab claws served alongside corn succotash and fresh okra, skillfully
    seasoning with thyme and cayenne, while occasionally baking pecan pie for family gatherings, reflecting their love for modest, home‑cooked flavors and occasional indulgence.
  core: Cheyenne Mclean blends a lifelong devotion to structured teaching with a solitary love for nature, meticulous budgeting, cautious health habits, and a quiet, slightly anxious optimism that fuels
    their steady, gentle rhythms.
background:
  cultural: Cheyenne is a white American who grew up in a middle‑class family in the Midwest before moving to Defuniak Springs, Florida, in her thirties to pursue her teaching career. She embraces the small‑town
    Southern culture of Northwest Florida, valuing community gatherings, church involvement, and local traditions such as the annual Brook & Farm Festival. Her upbringing instilled a respect for hard work
    and self‑reliance, while her years in Florida have deepened her appreciation for the coastal environment, southern hospitality, and the diverse, intergenerational community that defines Walton County.
attributes:
  skills: '["Lesson Planning","Classroom Management","Differentiated Instruction","Reading Literacy Development","Special Needs Integration (IEPs)","Data‑Driven Assessment","Educational Technology (Google
    Classroom, SMART Boards)","Parent‑Teacher Communication","Curriculum Alignment","Behavioral Intervention Strategies"]'
  hobbies: '["Birdwatching","Gardening","Knitting","Reading historical fiction","Puzzle solving (crosswords, Sudoku)","Nature photography","Journaling","Cooking Southern seafood dishes"]'
  career_goals: As she approaches retirement, Cheyenne aims to leave a lasting impact on her school district by leading a district‑wide literacy initiative and mentoring early‑career teachers through a
    formal mentorship program. She also hopes to author a practical guide on classroom organization and quiet‑learning strategies for teachers who work with introverted students. Long‑term, she would like
    to transition into an educational consulting role that focuses on curriculum design for small, rural schools in Northwest Florida, while continuing to volunteer as a reading tutor at the local public
    library.
