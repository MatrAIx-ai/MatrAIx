    new cooking recipes'']'
  career_goals: Gloria's post-retirement ambitions focus on lifelong learning, community contribution, and personal legacy. She aims to stay intellectually active by following new scientific discoveries
    and exploring contemporary art movements, and she plans to complete a memoir that intertwines her experiences in STEM and the arts. Gloria wishes to mentor local high-school students, especially young
    women, in scientific inquiry and creative expression, and to support them through a modest scholarship she hopes to fund. She also intends to share her oral histories with the Kenosha Historical Society,
    preserving the city's mid-century stories. Maintaining her health, independence, and mental well-being remains a central personal goal.
