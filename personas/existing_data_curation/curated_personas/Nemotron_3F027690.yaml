personas:
  professional: Mishael Valencia, a 40‑year‑old kitchen supervisor in Miami, leverages ServSafe certification, precise knife work, and bilingual communication to keep the line running smoothly, while their
    relaxed attitude toward paperwork sometimes leads to scattered prep schedules, yet they thrive as a mentor who balances structure with the spontaneity of a bustling kitchen.
  sports: Mishael Valencia plays forward for a local amateur soccer league, cheers for Inter Miami CF and Club América during televised matches, and participates in weekend pickup games at South Beach,
    while also following the NBA’s Miami Heat for occasional group viewings.
  arts: Mishael Valencia immerses themselves in Latin rhythm at salsa and bachata nights, drawing inspiration from artists like Celia Cruz, Marc Anthony, and the Buena Vista Social Club, and volunteers
    at cultural festivals where they help coordinate live music stages and showcase traditional dance.
  travel: Mishael Valencia enjoys weekend explorations of Miami’s Little Havana and Wynwood food markets, dreams of a culinary pilgrimage to Oaxaca’s mole workshops and the Caribbean’s spice farms, and
    plans trips around festival calendars, balancing limited vacation days with a modest travel budget.
  culinary: Mishael Valencia’s kitchen experimentation showcases chiles en nogada, cochinita pibil, and plantain‑topped ceviche, highlighted by a love for smoky chipotle, tangy epazote, and fresh cilantro,
    while their skillful knife work and portion‑control routine keep guests satisfied and costs in check.
  core: Mishael Valencia is a sociable, structure‑loving chef who blends disciplined kitchen management with spontaneous salsa‑dance flair, occasionally misplacing receipts but always delivering flavor‑ful
    community meals.
background:
  cultural: Mishael is a first‑generation Mexican‑American who grew up in a bilingual household, speaking both Spanish and English. He embraces Mexican traditions such as Día de los Muertos, Mexican Independence
    Day, and family gatherings centered around food. Living in Miami, he blends his heritage with the city's multicultural vibe, participating in local festivals, enjoying Caribbean influences in cuisine,
    and valuing the strong sense of community and hospitality common to both Mexican and South Florida cultures.
