  career_goals: Mishael aims to advance to a supervisory or head chef role within a restaurant or catering operation, leveraging his leadership and culinary skills. He plans to enroll in a culinary associate
    program to deepen his technique and earn a professional chef credential. Ultimately, he aspires to open a small Mexican‑inspired food stall or neighborhood eatery in Miami that showcases his family
    recipes while providing a welcoming, community‑focused dining experience.
