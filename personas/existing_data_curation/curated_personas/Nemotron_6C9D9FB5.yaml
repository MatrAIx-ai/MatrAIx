  career_goals: She aims to transition from a senior design engineer to a lead systems engineer overseeing the development of next‑generation UAVs or electric aircraft. Over the next five years, Jessica
    plans to complete a bachelor’s degree in aerospace engineering, obtain a professional engineer (PE) license, and lead a small interdisciplinary team where she can champion innovative concepts while
    ensuring they meet regulatory and cost constraints. Long‑term, she envisions founding a boutique consultancy that offers flexible, cutting‑edge aerospace design services to startups, allowing her to
    blend her love of curiosity‑driven exploration with practical, market‑driven solutions.
