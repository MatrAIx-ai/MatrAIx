  career_goals: Although she is no longer employed full‑time, Jenna aims to leave a lasting legacy by mentoring emerging entrepreneurs in Norman, organizing a quarterly intergenerational business clinic,
    and contributing her expertise to the local historical society’s oral‑history project. She hopes to author a memoir that blends her experiences of the Oklahoma business landscape with reflections on
    resilience and to secure a smooth financial transition for her family, ensuring her husband’s comfort and the educational support of her grandchildren.
