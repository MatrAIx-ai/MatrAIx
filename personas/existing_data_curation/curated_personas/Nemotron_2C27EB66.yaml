personas:
  professional: Jenna Dugan, a retired business administrator turned community nonprofit strategist, leverages their meticulous record‑keeping, grant‑writing skill, and quiet assertiveness as they mentor
    budding entrepreneurs in Norman, coordinate intergenerational business clinics, and preserve local oral histories for the historical society.
  sports: Jenna Dugan enjoys low‑impact fitness through daily walks in the Tallgrass Prairie Preserve, cheerfully follows the Oklahoma City Thunder and the Kansas City Royals on television, and participates
    in a local senior walking club that meets at the county fairgrounds each spring as they value modest community camaraderie over large stadium crowds.
  arts: Jenna Dugan spends evenings quilting intricate patterns inspired by pioneer textiles while devouring mid‑century American historical fiction by authors such as James A. Michener, and they make a
    point to attend folk‑music gatherings featuring the likes of Woody Guthrie and contemporary fiddle groups at the Norman community center.
  travel: Jenna Dugan prefers relaxed road trips by car, often stopping at historic sites like the Tallgrass Prairie Preserve, the Santa Fe Plaza, and the boutique B&Bs of Galena, Wisconsin, where they
    savor quiet mornings with a travel journal, yet they limit travel expenses to keep funds for family gatherings.
  culinary: Jenna Dugan delights in preparing comfort staples such as chicken and dumplings, skillet cornbread, and heirloom tomato jam, often cooking with fresh vegetables from their prairie garden and
    occasionally they forget to set the timer, leading to the occasional over‑browned casserole.
  core: Jenna Dugan is a quietly diligent octogenarian whose love of community, meticulous planning, and steady worry fuels a life of quilting, gardening, and thoughtful mentorship, even as they occasionally
    over‑schedule and forget to relax.
background:
  cultural: Jenna grew up in a small farming community outside Norman, the daughter of second‑generation Irish‑German immigrants who settled Oklahoma during the early 20th‑century land rush. Raised in a
    modest Baptist household, she internalized values of hard work, self‑reliance, and community service. The rhythms of Midwestern life—seasonal planting, church picnics, and county fairs—shaped her practical
    outlook, while her family's oral histories fostered a deep appreciation for the region’s Native American heritage and the pioneering spirit of early settlers. Today, she remains actively involved in
    the Norman Historical Society and the local church’s outreach programs.
