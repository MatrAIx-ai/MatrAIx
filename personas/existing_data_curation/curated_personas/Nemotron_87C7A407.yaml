    design'', ''Analytics interpretation'']'
  hobbies: '[''Beach yoga'', ''Kayaking'', ''Beach volleyball'', ''Community theater (acting and improv)'', ''Book club'', ''Volunteer digital literacy tutoring for seniors'', ''Cooking Mediterranean cuisine'',
    ''Balcony gardening'', ''Attending art festivals'', ''Salsa dancing classes'']'
  career_goals: Looking ahead, Charlene aims to transition into a senior leadership role where she can shape the strategic direction of digital experiences for regional businesses and nonprofit organizations.
    She plans to mentor emerging designers, establish a boutique consultancy focused on inclusive, data‑driven design for the aging population in Florida, and become a regular speaker at design conferences
    and local business forums. Additionally, she hopes to champion accessibility standards within her industry and contribute to community projects that improve digital literacy for seniors.
