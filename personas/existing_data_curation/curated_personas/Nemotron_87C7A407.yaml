personas:
  professional: Charlene Luhrsen, a seasoned UI/UX designer with over twenty years of experience, employs a structured yet adaptable workflow that translates client goals into accessible digital experiences,
    leads cross‑functional teams with practical precision, and mentors emerging designers while championing inclusive design standards for senior users.
  sports: Charlene Luhrsen begins each sunrise with beach yoga at Siesta Key, joins a local Gulf kayaking crew that explores hidden coves, and competes in weekly beach volleyball matches with the Sarasota
    Sunset Spikers, maintaining a fitness routine that respects her joint health while satisfying her sociable, energetic nature.
  arts: Charlene Luhrsen is a vibrant presence at the Sarasota Community Theatre, participating in improv workshops and occasional stage productions, while drawing creative inspiration from contemporary
    artists like Kehinde Wiley and musical storytellers such as Lin‑Manuel Miranda during the Ringling Museum’s art festivals.
  travel: Charlene Luhrsen prefers meticulously planned travel itineraries, favoring Mediterranean destinations like the Amalfi Coast and cultural hubs like Barcelona, yet leaves room for spontaneous weekend
    kayak excursions along Florida’s Gulf islands, balancing a love for history with a practical budget and a structured approach to booking.
  culinary: Charlene Luhrsen enjoys crafting Mediterranean‑inspired meals, regularly preparing grilled branzino with lemon‑oregano, chickpea‑tomato shakshuka, and herb‑laden tabbouleh using fresh balcony
    herbs, showcasing an intermediate‑to‑advanced cooking skill set that blends health consciousness with aromatic flavors.
  core: Charlene Luhrsen blends a results‑driven design career, disciplined financial habits, proactive health management, and a love for Mediterranean cuisine, all while maintaining a sociable, structured
    lifestyle that occasionally yields impulsive coffee splurges and missed vitamin D doses.
background:
  cultural: Charlene grew up in a Midwestern suburb where practicality and community involvement were emphasized, and her family traces its roots to Northern European (German and Swedish) ancestry. Relocating
    to Sarasota for its vibrant arts scene and coastal lifestyle, she has embraced the Southern hospitality and beach culture of Florida while retaining her organized, business‑oriented mindset. This blend
    of Midwestern work ethic, Scandinavian appreciation for simplicity, and Floridian love of social gatherings shapes her worldview and informs both her professional collaborations and personal activities.
