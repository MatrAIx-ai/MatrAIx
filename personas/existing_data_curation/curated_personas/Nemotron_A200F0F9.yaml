personas:
  professional: Cristal Sarmiento, an aspiring junior scientist, blends curiosity and artistic flair by designing simple home experiments that double as visual demonstrations, using watercolor sketches
    to explain complex ideas to classmates.
  sports: Cristal Sarmiento plays forward for the community youth soccer club Sunrise FC, eagerly follows New York City FC during the MLS season, and supplements the training with weekly swimming lessons,
    balancing competitive energy with the rhythmic movement of folk dance.
  arts: Cristal Sarmiento expresses artistic identity through watercolor landscapes echoing Claude Monet’s light, enthusiastic reads of the graphic novel series Amulet by Kazu Kibuishi, intricate LEGO builds
    reminiscent of LEGO Architecture, and keyboard renditions of Beethoven’s Für Elise, often sharing creations at the school art club.
  travel: Cristal Sarmiento prefers family road trips to natural wonders such as Grand Canyon National Park, delights in exploring interactive exhibits at the Smithsonian National Air and Space Museum,
    and dreams of an upcoming vacation to the historic canals of Bruges, balancing curiosity‑driven itineraries with parental budgeting constraints.
  culinary: Cristal Sarmiento enjoys helping parents bake cheese‑filled chipa rolls and savory corn‑and‑cheese ‘sopa’ breads, experiments with fresh guava juice and sweet potato mash, and can whip up a
    simple veggie omelet, showcasing a budding kitchen confidence that still relies on family guidance.
  core: Cristal Sarmiento blends a scientist’s curiosity with an artist’s eye, juggling LEGO constructions and watercolor sketches while occasionally forgetting homework in favor of spontaneous experiments,
    making them a delightfully organized yet delightfully unpredictable 11‑year‑old.
background:
  cultural: Cristal’s family emigrated from Paraguay, a landlocked nation in South America where both Spanish and Guarani are spoken. At home, the household language blends English with Spanish, and cultural
    traditions such as celebrating San Juan, preparing chipa and sopa paraguaya, and listening to Paraguayan folk music are part of her daily life. Living in East Lansing, Michigan, she intertwines these
    South American customs with Midwestern American culture, taking part in school multicultural events and sharing her heritage through art projects and language exchange with classmates.
