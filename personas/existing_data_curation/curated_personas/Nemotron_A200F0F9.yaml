  career_goals: Looking ahead, Cristal aims to combine her love for art and technology by becoming a multimedia storyteller or visual designer who creates interactive educational content that highlights
    scientific ideas and celebrates her South American heritage. In the short term she plans to expand her digital illustration portfolio, take part in her school's art and STEM clubs, and attend workshops
    on graphic design. Ultimately she hopes to study visual communication or environmental education at university, using her skills to bridge cultural and scientific understanding.
