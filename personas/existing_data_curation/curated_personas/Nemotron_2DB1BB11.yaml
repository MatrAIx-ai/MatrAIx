  hobbies: '["Vegetable Gardening", "Herb Gardening", "Quilting", "Crocheting", "Birdwatching", "Nature Walks", "Woodworking", "DIY Home Repairs", "Community Volunteering", "Reading Historical Fiction",
    "Listening to Classic Country Music"]'
  career_goals: Twyla aims to advance into a supervisory role where she can combine her technical expertise with her natural ability to nurture teamwork and harmony. She plans to earn a Certified Welding
    Inspector (CWI) credential and enroll in a part‑time bachelor’s program in engineering technology to broaden her qualifications. Over the next five years she hopes to become a shift lead or process
    coordinator, overseeing a small crew and driving continuous‑improvement projects. In the longer term, she envisions launching a modest side business offering custom metalwork and home‑repair services,
    allowing her to serve her community while maintaining a predictable, routine‑oriented schedule.
