personas:
  professional: An electrical and HVAC specialist with an associate's degree in electrical and industrial technology, Amie Murphy combines precise fault diagnosis, smart‑home automation tinkering, and a
    knack for teaching junior staff, while their spontaneous curiosity often leads them to prototype new IoT solutions mid‑job, occasionally at the expense of strict scheduling.
  sports: An avid outdoor enthusiast who spends Saturdays hiking and fishing in Pennsylvania’s state parks, Amie Murphy also bowls competitively with the local league, roots for the Pittsburgh Steelers
    and Penguins, and joins a community cycling group for spring rides.
  arts: With a passion for watercolor landscapes and candid photography, Amie Murphy frequents regional art fairs featuring works by Georgia O'Keeffe and Ansel Adams, enjoys live sets by The Lumineers and
    local folk bands, and draws creative inspiration from the mural festivals of nearby towns.
  travel: Spontaneous road trips to the Allegheny National Forest and occasional day trips to New York City shape Amie Murphy's travel style, while a bucket‑list includes a summer trek through the Icelandic
    highlands and a cultural pilgrimage to Florence, all planned around family commitments and a modest travel budget.
  culinary: Amie Murphy’s palate leans toward artisanal craft beers, smoky grilled trout paired with dill and lemon, and hearty fish tacos drizzled with cilantro‑lime crema, while their cooking skill hovers
    at confident home‑cook level, often experimenting with seasonal produce like heirloom tomatoes and fresh basil.
  core: Amie Murphy is a curiosity‑driven electrician who swaps power tools for paintbrushes on a whim, champions community mentorship, but habitually misplaces receipts and forgets to lock the garage door
    after late‑night DIY sessions.
background:
  cultural: Amie grew up in a modest, working‑class family in central Pennsylvania, where values of hard work, community interdependence, and respect for the outdoors were emphasized. Her cultural upbringing
    includes traditional American holidays such as Thanksgiving and Fourth of July gatherings, with family meals featuring regional specialties like Pennsylvania Dutch pretzels and fried chicken. While
    her background is rooted in the local Pennsylvania culture—appreciating Appalachian folk music and the close‑knit neighborhood spirit—she has always been open to broader artistic and cultural experiences,
    regularly seeking out contemporary art, diverse musical genres, and new perspectives through travel and community events. This blend of local heritage and curiosity shapes her inclusive, socially engaged
    outlook.
attributes:
  skills: '["Electrical wiring and troubleshooting", "HVAC system installation and maintenance", "Basic plumbing repairs", "Blueprint and technical diagram interpretation", "Preventive maintenance scheduling",
    "Safety compliance (OSHA, local building codes)", "Power tool operation and calibration", "Smart‑home device integration", "Customer communication and service", "Team collaboration and apprenticeship
    training"]'
  hobbies: '["Watercolor painting and photography", "Visiting art galleries and live music venues", "Weekend road trips and hiking in state parks", "Community bowling league", "Volunteering to teach DIY
    home‑repair workshops", "Exploring and building smart‑home and IoT projects", "Craft brewery tours and tasting events", "Participating in local festivals and community celebrations"]'
  career_goals: Amie aims to become a certified Journeyman Electrician and earn advanced HVAC certifications within the next three years, positioning herself for a lead technician role. She plans to pursue
    additional coursework in project management and small‑business accounting to eventually launch her own contracting firm focused on energy‑efficient installations and smart‑home solutions for residential
    clients in Clearfield County. Amie also hopes to mentor youth through local STEM outreach programs, merging her technical skills with her desire to give back to the community. Ultimately, she seeks
    a balance between professional growth, creative problem‑solving, and maintaining a flexible schedule that supports her family life.
