personas:
  professional: Justo Arvelo, a curious four‑year‑old, pretends to be a future architect, assembling block towers with vibrant colors and whimsical designs while reshuffling them on a whim to satisfy his
    love of spontaneity.
  sports: Justo Arvelo, a lively four‑year‑old, dashes around the local park’s swing set, attends the Whitehouse Warriors Jr. soccer practice on Saturdays, and cheers for the New York Yankees on TV, often
    imitating their home‑run celebrations with a makeshift bat.
  arts: Justo Arvelo, with a crayon‑filled sketchpad, loves to doodle bright marigold patterns inspired by Frida Kahlo and dances to the upbeat salsa of Celia Cruz on the family’s Bluetooth speaker, frequently
    twirling during Día de los Muertos celebrations.
  travel: Justo Arvelo, who recently marveled at the interactive exhibits at Philadelphia’s Please Touch Museum and giggled on the carousel at Disney World in Orlando, now daydreams about exploring the
    rainforest canopy of Costa Rica, preferring family‑guided, unstructured trips that let his imagination roam.
  culinary: Justo Arvelo, who squeals with delight when sprinkling queso fresco over fresh homemade tacos al pastor and eagerly stirs chocolate chip cookie dough with his small wooden spoon, is a budding
    chef with a penchant for vibrant, melty flavors and an unstoppable craving for sweet churros dusted with cinnamon sugar.
  core: Justo Arvelo, a curious four‑year‑old who blends spontaneous block‑building dreams, candy‑driven savings, playful allergy battles, backyard sports, bright‑colored art, family‑centric travel, and
    a love for vivid foods, navigates life with energetic creativity and endearing forgetfulness.
background:
  cultural: Justo grows up in a bilingual Hispanic household in Whitehouse Station, NJ, speaking both Spanish and English at home. Family gatherings celebrate traditions such as Día de los Muertos and festive
    Latino holidays, with music, dance, and shared meals that expose him to rich cultural stories and artistic expressions. These experiences shape his appreciation for vibrant colors, rhythmic sounds,
    and community storytelling.
