persona_description: A public health advocate who is concerned about the safety and effectiveness of water fluoridation. They believe that the benefits of fluoridation are minimal and that the program is
  not addressing the root problem of access to care. They are passionate about promoting education on proper diet and dental hygiene and are willing to take a stand against mandating a policy that they
  believe would reduce the suffering of children. They are frustrated with the lack of scientific debate surrounding the safety and effectiveness of water fluoridation and are opposed to any policy that
  would use an untested, contaminated product as a pharmacological agent.
