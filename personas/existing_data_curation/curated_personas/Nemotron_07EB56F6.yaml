  career_goals: Teresa aspires to move into a leadership role—ideally as a lieutenant—where she can shape policies that prioritize community partnership and mental‑wellness. She dreams of establishing a
    police‑arts liaison program that uses local artists and creative workshops to build trust and give officers new tools for de‑escalation and problem‑solving. Additionally, she hopes to spearhead a mentorship
    initiative that pairs seasoned officers with recruits from diverse backgrounds, fostering a more inclusive and empathetic police force in Washington Court House.
