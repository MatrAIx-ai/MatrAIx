persona_description: A historian of Montreal interested in the dynamics of the peopling of the nineteenth-century North American city. They are interested in the central argument that nineteenth-century
  Montreal was characterized by three different demographic regimes that changed but remained distinctive. They are interested in the major differences explored including infant and child mortality, family
  formation, fertility, and housing. They appreciate the innovative sampling methods, the wide range of sources consulted, the deep rich knowledge of the city's housing, geography, and people, and the Bruegel-like
  richness in the portraits of families, individuals, streets, housing, practices, and songs throughout the book. They appreciate the individual family stories and the ways they are recounted. They are
  interested in the sampling strategies involved and the extent of research involved. They appreciate the methodology presented here as a source of arguments and a way to replicate.
