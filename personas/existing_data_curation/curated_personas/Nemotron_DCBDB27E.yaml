personas:
  professional: Betty Campbell, a seasoned home‑health aide specializing in geriatric care, combines meticulous vital‑sign monitoring and compassionate communication with a curious, pragmatic mindset that
    drives them to adopt telehealth tools and mentor newcomers while embracing flexible, sometimes chaotic scheduling.
  sports: Betty Campbell stays active through daily evening walks with their dog along the Lehigh River trail, and they also participate in a senior pickleball group at the community center while rooting
    for the Philadelphia Eagles and Phillies and cheering on the local Lehigh Valley Walking Club’s monthly hikes.
  arts: Betty Campbell devotes quiet evenings to swapping Agatha Christie mysteries with friends, and they knit intricate quilts while humming to Johnny Cash, also attending the local community theater’s
    renditions of classic dramas featuring performances reminiscent of Meryl Streep.
  travel: Betty Campbell favors low‑key road trips, having driven to the Pocono Mountains and Washington, D.C., dreaming of a relaxed stroll through Savannah’s historic squares, and they plan each journey
    on a scribbled notebook schedule that balances family responsibilities with a love for spontaneous discovery.
  culinary: Betty Campbell’s culinary repertoire blends home‑grown basil and rosemary into hearty sourdough loaves, lemon‑thyme grilled salmon, and spinach‑feta quiche, and they enjoy experimenting with
    nutritious twists on comfort foods.
  core: Betty Campbell navigates life with a caring, curiosity‑driven heart, a penchant for spontaneous garden‑to‑table experiments, a habit of misplacing bills, and they carry an ever‑present undercurrent
    of worry that fuels both diligent caregiving and gentle self‑reflection.
background:
  cultural: Betty was raised in the Lehigh Valley, a region shaped by generations of working‑class families with deep German and Irish roots. Her upbringing emphasized hard work, self‑reliance, and a strong
    sense of community—values reinforced by regular participation in local church events and neighborhood gatherings. The area's industrial heritage and close‑knit neighborhoods fostered her collaborative
    spirit and her priority for harmony. While she respects traditional customs, such as seasonal festivals and communal potlucks, Betty’s natural curiosity encourages her to blend these traditions with
    new ideas, especially in health and wellness. This cultural mix of practicality, service, and openness informs both her professional demeanor and personal interests.
attributes:
  skills: '["Patient care", "Vital signs monitoring", "Medication reminder", "Basic wound care", "Mobility assistance", "Compassionate communication", "Home safety assessment", "Adaptive problem solving",
