  hobbies: '["Herb gardening", "Baking and cooking new recipes", "Knitting", "Reading mystery novels", "Attending church socials", "Walking her dog", "Volunteer work at the senior center", "Nature walks",
    "Listening to classic rock", "Journaling"]'
  career_goals: Betty aims to advance into a lead or supervisory role within her home‑health agency, where she can mentor newer aides and shape flexible scheduling practices that reduce stress for both
    staff and clients. She plans to earn a Certified Nursing Assistant (CNA) credential to deepen her clinical knowledge, especially in geriatric mental health, so she can better support patients dealing
    with anxiety and depression. Long‑term, Betty envisions developing a community‑based program that pairs volunteers with isolated seniors, blending her love of practical caregiving with her desire to
    foster social harmony. She also hopes to create a small consulting service that advises families on creating safe, compassionate home environments for aging loved ones.
