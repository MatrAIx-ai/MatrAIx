  career_goals: Although still very young, Theodore frequently talks about wanting to become a "builder" or an "artist" when he grows up, reflecting his love for constructing things and creating art. He
    also dreams of being an astronaut or a firefighter after hearing storybooks about space and rescue missions, showing early ambitions to explore, help others, and use his imagination in future roles.
