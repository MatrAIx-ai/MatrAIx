personas:
  professional: Theodore Oates is a budding explorer who spends afternoons constructing forts from couch cushions and mapping backyard trails with crayon‑drawn charts, channeling their curiosity and appreciation
    for art into vivid, makeshift maps while they stay relaxed and flexible, allowing them to adapt spontaneously to any imagined adventure.
  sports: Theodore Oates delights in the weekly West Valley Sprouts toddler soccer sessions, cheers loudly for the Utah Jazz during family basketball evenings, and watches Real Salt Lake matches on game
    night, while their favorite exercise is climbing the jungle gym at the local park, where they practice little hops and giggly sprints.
  arts: Theodore Oates loves to doodle bright pictures inspired by Van Gogh’s Starry Night, sings along to Raffi’s baby‑friendly songs, watches Sesame Street for its playful lessons, and collects stickers
    of Mickey Mouse characters, letting these creative touches shape their playful imagination.
  travel: Theodore Oates enjoys the rhythmic comfort of family road trips, cherishes the sandy shore of the Great Salt Lake during weekend outings, dreams of exploring the red cliffs of Zion National Park,
    and gets excited about the upcoming short flight to Disney World where familiar characters offer a soothing sense of routine.
  culinary: Theodore Oates favors creamy mac and cheese, crispy chicken nuggets, and sweet strawberry slices, proudly spreads peanut butter on whole‑grain bread for snack time, and enjoys sprinkling grated
    cheddar onto their homemade mini‑pizza, though they often forget to wash their hands before meals, prompting a gentle reminder from their parents.
  core: Theodore Oates is a curious three‑year‑old who turns backyard forts into colorful art projects, balances boundless imagination with a laid‑back routine, and often loses track of time while daydreaming
    under the family’s beloved oak tree.
background:
  cultural: Theodore is raised in a white, American family in West Valley City, Utah. His upbringing blends the suburban lifestyle of the Salt Lake County region with the community’s emphasis on family
    gatherings, local festivals, and outdoor recreation. He participates in neighborhood park events, seasonal celebrations, and family‑centered activities that value kindness, cooperation, and a relaxed,
    flexible routine.
