persona_description: A healthcare professional who specializes in the management of malaria and its complications. This person has extensive knowledge and experience in the diagnosis, treatment, and management
  of severe malaria cases. They are familiar with the symptoms and signs of malaria, as well as the various complications that can arise from the disease. They are also aware of the importance of timely
  and appropriate treatment, and the need for close clinical monitoring and close contact with the Canadian Malaria Network. This person is likely to have a strong understanding of the drug resistance patterns
  in the area of acquisition, and the importance of timely availability of an appropriate anti-malarial drug for effective management of malaria. They are also likely to be familiar with the treatment regimens
  for severe and complicated malaria, and the potential use of exchange blood transfusion in certain cases.
