    kitchen bookkeeping'', ''Adaptation of multicultural cuisines'', ''Time management and crisis handling'']'
  hobbies: '[''Experimenting with new recipes'', ''Herb gardening'', ''Watercolor painting'', ''Food photography'', ''Visiting art museums and galleries'', ''Reading culinary books and magazines'', ''Nature
    walks in local parks'', ''Volunteer cooking at senior centers'', ''Attending small cooking workshops'', ''Listening to jazz music'']'
  career_goals: Kristie aims to advance from line cook to sous chef and eventually head chef at a locally owned restaurant that emphasizes farm‑to‑table sourcing and artistic plating. She envisions creating
    seasonal menus that blend Southern comfort food with global flavors, reflecting her curiosity for new ideas. In the longer term, she hopes to launch a small catering business focused on community events
    and charitable fundraisers, and to author a cookbook that combines recipes with stories of the people she serves.
