personas:
  professional: Kristie Hood, a seasoned line cook in Houston's bustling culinary scene, leverages two decades of fast‑paced kitchen expertise, meticulous cost‑control, and a painter’s eye for plating to
    mentor staff, ensure food‑safety compliance, and craft artful farm‑to‑table menus as they climb toward a sous‑chef role and eventual head chef position.
  sports: Kristie Hood enjoys low‑impact fitness, favoring early‑morning nature walks in Hermann Park and weekend recreational tennis at a local community center, while cheering on the Houston Astros during
    baseball season and the Houston Rockets in winter, and they occasionally join a casual walking club that meets for charity fundraisers.
  arts: Kristie Hood finds inspiration in watercolor studies of Monet and regular visits to the Museum of Fine Arts, Houston, where they absorb the vibrant palettes of Georgia O’Keeffe to translate into
    plating designs, while also attending the Alley Theatre’s contemporary productions and listening to live jazz at Mongoose Music, habits that fuel their creative culinary narratives.
  travel: Kristie Hood plans trips with the same precision as a mise en place, favoring culinary‑focused getaways such as a weekend tasting tour in New Orleans, a spring art retreat in Santa Fe, and a dream
    itinerary to Tuscany’s agriturismos, all while budgeting travel expenses in a spreadsheet and packing a portable sketchpad for spontaneous watercolor scenes.
  culinary: Kristie Hood masterfully blends Southern comfort staples—like smoky brisket and collard greens—with global twists such as miso‑glazed shrimp and harissa‑spiced sweet potatoes, often seasoning
    dishes with fresh basil, thyme, and cilantro from their herb garden, and they meticulously photograph each plate, striving for the perfect natural‑light composition while occasionally over‑salting to
    ‘taste the depth.’
  core: Kristie Hood, a 49‑year‑old culinary artist, merges farm‑to‑table Southern roots with global flavors, budgets every ingredient like a ledger, tends a quiet herb garden, and captures each plated
    story through watercolor‑inspired food photography, all while quietly battling a fondness for late‑night gadget splurges.
background:
  cultural: Kristie is a third‑generation white Texan raised in the Kingwood area of Harris County. Her upbringing was shaped by Southern hospitality, family‑centered gatherings, and the rich culinary traditions
    of Texas—especially barbecue, Tex‑Mex, and comfort cooking. While rooted in these regional customs, she embraces the multicultural mosaic of the Greater Houston area, incorporating influences from Hispanic,
    African‑American, and Asian cuisines into her cooking. Her community ties are reinforced through her church, local volunteer groups, and a strong value placed on helping neighbors, reflecting the cooperative
    spirit of her cultural background.
attributes:
  skills: '[''Culinary techniques (grilling, sautéing, baking, butchery)'', ''Menu planning and recipe development'', ''Food safety compliance (ServSafe certified)'', ''Inventory management and cost control'',
