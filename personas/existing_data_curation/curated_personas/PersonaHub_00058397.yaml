persona_description: An environmental scientist who specializes in the conservation and management of marine and coastal ecosystems, with a focus on the Hawaiian Islands and their unique wildlife, particularly
  the Laysan albatross. They have expertise in marine conservation planning, ecological assessments, and the impacts of human activities on marine ecosystems. They are knowledgeable about the threats to
  the Hawaiian Islands' biodiversity, including climate change, habitat destruction, and pollution, and have experience in implementing conservation measures such as marine reserves, protected areas, and
  sustainable fishing practices. They are also familiar with the legal and policy frameworks governing marine conservation in the region, including the US conservation estate and the Papahānaumokuākea Marine
  National Monument.
