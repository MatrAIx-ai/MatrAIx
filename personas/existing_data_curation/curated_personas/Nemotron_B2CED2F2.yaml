personas:
  professional: Harriett Pardo, a proactive library science specialist with a strong STEM background, blends meticulous metadata expertise (MARC, Dublin Core) and Python data wrangling with a curiosity
    for emerging tech, and they lead digital preservation initiatives, assertively champion inclusive maker‑space programming, and orchestrate community‑driven interdisciplinary exhibitions that unite art,
    technology, and patron collaboration.
  sports: Harriett Pardo, an avid hiker with the St. Paul Outdoor Adventures Club, follows the Minnesota Twins in spring baseball, roots for the Minnesota Vikings during football season, and they join a
    weekend recreational soccer league at Lakeside Field, while also practicing yoga at a local studio to complement their prairie trail treks.
  arts: Harriett Pardo, a frequent patron of the Walker Art Center, curates personal exhibitions featuring works by Yayoi Kusama and local muralist Jeff Voss, spins their vintage vinyl collection of Joni
    Mitchell, Miles Davis, and The Velvet Underground during board‑game nights, and they regularly attend performances by Minnesota’s folk‑rock duo Trampled by Turtles, weaving these artistic experiences
    into their community programming.
  travel: Harriett Pardo, who plans trips with meticulous spreadsheet itineraries and a love for photographic exploration, has trekked Iceland’s volcanic terrain, wandered through Kyoto’s historic temples,
    and weekend‑escaped to Door County’s cherry orchards, while they dream of a future road trip across the American Southwest to capture the Grand Canyon’s sunrise.
  culinary: Harriett Pardo, an enthusiastic home cook with intermediate skill, regularly whips up kimchi fried rice using gochujang, bakes a fragrant Moroccan chicken tagine with preserved lemons and apricots,
    and they experiment with Mexican street‑style elotes glazed with cotija and cilantro, often pairing meals with a glass of cold Riesling and spinning vintage vinyl as background.
  core: Harriett Pardo, a curiosity‑driven library advocate who seamlessly fuses tech, art, and community, can be found in the evenings orchestrating board‑game marathons, yet they habitually postpone grant
    proposals until the final deadline.
background:
  cultural: Harriett grew up in a middle‑class family in the suburban environs of Washington County, Minnesota, where the community’s emphasis on public service, education, and outdoors recreation shaped
    her outlook. Her ancestry includes Northern European roots, typical of many Midwestern families, but she identifies strongly with the inclusive values of the region—valuing civic participation, collective
    well‑being, and respect for diverse cultural expressions. This background has fostered her commitment to equitable access to information and the arts, prompting her to champion programs that reflect
    both the local heritage and the increasingly multicultural fabric of Saint Paul.
attributes:
  skills: '[''Cataloguing and metadata creation (MARC, Dublin Core)'', ''Digital preservation and archival management'', ''Reference and research assistance'', ''Collection development for print, digital,
    and audiovisual media'', ''Data management and basic Python scripting'', ''Instructional design and library instruction delivery'', ''User experience design for library spaces'', ''Public programming
    and community outreach'', ''Project management and grant writing'', ''Conflict resolution and advocacy'']'
  hobbies: '[''Visiting art exhibitions and museums'', ''Participating in and hosting book clubs'', ''Hiking in Minnesota state parks and nature trails'', ''Photography (urban and nature)'', ''DIY crafts
    and scrapbooking'', ''Playing board games with friends'', ''Cooking diverse cuisines'', ''Volunteering at community festivals and literary events'', ''Collecting vintage vinyl records'', ''Facilitating
    maker‑space workshops (3D printing, Arduino)'']'
  career_goals: Harriett aims to move into a senior leadership role within the public library system, such as Head of Digital Services or City Librarian, where she can shape strategic initiatives that integrate
    technology, art, and community engagement. She plans to earn a Master of Library and Information Science (MLIS) with a focus on digital preservation and to secure grant funding for expanding the library’s
    multimedia archives. Over the next five years, she wants to launch a region‑wide maker‑space network, mentor emerging librarians, and publish a guide on curating inclusive media collections. Ultimately,
    she envisions the Saint Paul library becoming a model of innovative, user‑driven programming that bridges cultural institutions across Washington County.
