  hobbies: '[''reading historical biographies'', ''gardening'', ''cooking traditional Mexican meals'', ''watching classic Mexican cinema'', ''listening to regional Mexican music'', ''attending church small‑group
    gatherings'', ''walking in nature'', ''woodworking'', ''fishing'']'
  career_goals: Javier aims to advance to a senior custodial supervisor role at a local institution, where he can mentor newer staff and oversee the implementation of green cleaning initiatives. He plans
    to obtain OSHA and HAZMAT certifications to deepen his expertise in workplace safety. Over the next five years, he hopes to transition to a part‑time consulting capacity, advising small businesses on
    cost‑effective maintenance practices, while ensuring a stable retirement fund for his wife. Additionally, he dreams of eventually launching a modest side cleaning service that serves the Hispanic community
    in Nampa, blending his professional skill set with his cultural ties.
