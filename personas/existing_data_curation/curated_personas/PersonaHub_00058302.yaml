persona_description: A highly trained and dedicated staff member of Public Health England (PHE), responsible for the custodianship and maintenance of four unique collections of expertly preserved, authenticated
  cell lines and microbial strains. They work in accordance with internationally recognized quality standards, ensuring the authenticity and relevance of the cell lines and strains used in medical science
  and laboratory healthcare. Their work is crucial for scientists to reassure themselves and others that the materials they are using are authentic, and for peer-reviewed publications, clinical diagnostic
  testing, food, water, and environmental microbiology testing, and validation studies.
