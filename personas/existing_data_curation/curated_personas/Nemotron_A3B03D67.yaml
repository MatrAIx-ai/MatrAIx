  hobbies: '[''hiking'', ''yoga'', ''vegetable gardening'', ''reading medical journals'', ''reading classic literature'', ''volunteering at free clinic'', ''health education workshops'', ''attending community
    arts events'', ''cooking classes'', ''journaling'']'
  career_goals: Tonia aims to complete her residency in family medicine, then establish a community health practice in Asheville that integrates primary care with mental‑health services. She aspires to
    become board‑certified, lead quality‑improvement projects that reduce health disparities in rural Buncombe County, and eventually pursue a fellowship in behavioral health. She also hopes to mentor medical
    students, advocate for preventive‑care policies, and promote physician well‑being initiatives.
