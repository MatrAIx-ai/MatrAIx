personas:
  professional: Kathryn Burgos, a veteran intercity bus driver, leverages their pragmatic expertise in route planning, GPS navigation, routine safety inspections, and basic mechanical troubleshooting to
    ensure reliable service, while their personable communication style and first‑aid certification help calm passengers and de‑escalate conflicts, and they mentor new drivers, deliver clear public announcements,
    and are now pursuing driver‑trainer certification and a senior driver supervisor role to spearhead a county‑wide route‑efficiency software pilot.
  sports: Kathryn Burgos competes in a local recreational softball league, avidly follows the Atlanta Braves during baseball season and roots for the Atlanta Falcons on Sundays, consistently attends weekly
    Zumba classes for cardio fitness, and enjoys occasional hikes with friends in nearby state parks, preferring group‑oriented activities that combine social interaction with light competition.
  arts: Kathryn Burgos sings in a community choir that delivers everything from Mahalia Jackson’s gospel hymns to Beyoncé’s contemporary hits, relishes mystery novels by Agatha Christie and Tana French
    during quiet evenings, frequently attends regional theater productions of Tennessee Williams’ plays, and channels their creative side into DIY home‑improvement projects that double as personal artistic
    expression.
  travel: Kathryn Burgos favors spontaneous weekend road trips in their trusty sedan, delighting in discovering quirky cafés such as the Blue Door Coffee House in Asheville and offbeat roadside attractions
    like Texas’s Cadillac Ranch, while dreaming of a cross‑country drive to the Pacific Northwest and a cultural immersion tour of historic New Orleans neighborhoods.
  culinary: Kathryn Burgos loves cooking Southern‑inspired dishes, regularly preparing gumbo enriched with fresh okra from their garden, collard greens seasoned with smoked turkey, and peach‑glazed pork
    ribs, while experimenting with jambalaya variations, swapping recipes at the local farmer’s market, and pairing meals with sweet tea and a dash of hot sauce.
  core: Kathryn Burgos is a sociable, curiosity‑driven bus driver turned aspiring transit leader whose love of group activities, DIY projects, and Southern comfort food blends with a relaxed, sometimes
    disorganized approach to obligations, fueling both community spirit and a determination to pilot innovative safety solutions.
background:
  cultural: Kathryn is a white woman who was born and raised in Quincy, a close‑knit town in Gadsden County, Florida. Her family has deep roots in the Florida Panhandle, embodying the region’s blend of
    Southern hospitality, self‑reliance, and community involvement. Growing up in a working‑class, rural environment, she learned the value of hard work, friendliness, and local traditions such as the Gadsden
    County Heritage Festival and Fourth of July parades. While she maintains her own cultural heritage, the diverse makeup of the county has given her a practical appreciation for different perspectives,
    influencing her balanced outlook on new ideas and established methods.
