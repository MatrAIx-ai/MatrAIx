  career_goals: Kathryn aims to move from front‑line driving to a leadership role within the transit system. She plans to obtain a driver‑trainer certification and eventually become a senior driver supervisor,
    overseeing route safety and staff development. Her curiosity drives her to explore emerging transportation technologies, so she hopes to lead a pilot project on route‑efficiency software for the county’s
    bus service. Long‑term, she envisions founding a small consulting firm that advises rural transit agencies on safety best practices and community outreach, while also securing enough savings to achieve
    early retirement and invest in a modest property of her own.
