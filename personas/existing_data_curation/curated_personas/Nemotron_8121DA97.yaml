  hobbies: '[''Watercolor Painting'', ''Abstract Photography'', ''Reading Contemporary Philosophy'', ''Writing Short Stories'', ''Herb Gardening'', ''Classical Music Listening'', ''Jigsaw Puzzles'', ''Tai
