personas:
  professional: Teri Weeks, a seasoned B2B and B2C sales strategist with three decades of experience, they leverage data-driven forecasting and a creatively abstract mindset to craft compelling product
    narratives and lead agile teams toward aggressive revenue targets.
  sports: Teri Weeks, a quiet enthusiast of low‑impact movement, they participate in a weekly tai chi class at the community center and follow the regional minor‑league baseball team, the River Valley Raptors,
    as well as the state university's women's volleyball squad during the spring season.
  arts: Teri Weeks, an avid watercolorist and abstract photographer, they draw inspiration from Georgia O'Keeffe's color palettes and Ansel Adams' tonal mastery, curate a personal library of vintage art
    monographs, and regularly attend intimate gallery openings and craft fairs showcasing folkcraft.
  travel: Teri Weeks prefers contemplative travel itineraries, often planning solo weekend retreats to art‑rich destinations like Santa Fe, the historic streets of Bruges, and the tranquil tea gardens of
    Kyoto, where they balance structured itinerary planning with ample time for spontaneous sketching.
  culinary: Teri Weeks, an herb‑garden aficionado, they enjoy crafting herb‑infused dishes such as lemon‑basil roasted chicken and wild mushroom risotto, experimenting with fresh rosemary and thyme while
    occasionally ordering take‑out sushi when their studio painting session overruns.
  core: Teri Weeks blends a disciplined sales leadership career with a solitary, art‑driven lifestyle, they channel imaginative curiosity into both strategic market initiatives and watercolor canvases,
    while nurturing a gentle habit of daily tai chi and occasional over‑indulgence in vintage art book purchases.
background:
  cultural: Teri was born and raised in a suburban community near Norfolk, Virginia, into a family of English‑Irish descent with deep roots in the American South. Her upbringing emphasized hard work, community
    involvement, and a reverence for lifelong learning. The region's maritime heritage and subtle Southern hospitality fostered her appreciation for both tradition and quiet reflection. A graduate business
    program broadened her exposure to diverse cultures and ideas, while her marriage to a fellow professional created a stable, collaborative home environment. Teri’s cultural identity blends respect for
    Southern modesty and community service with an openness to novelty, artistic expression, and intellectual curiosity gained through travel, art, and continuous education.
