  career_goals: Teri aspires to advance to a regional director or vice‑presidential role where she can shape enterprise‑wide sales strategies and champion the integration of emerging technologies such as
    AI‑driven analytics. She is passionate about building pipelines for women and underrepresented groups in sales, establishing mentorship programs, and promoting sustainable, socially responsible selling
    practices. In the long term, she envisions transitioning to a strategic consulting practice that helps purpose‑driven companies improve their market reach, and she hopes to author a book that blends
    creative storytelling techniques with effective sales leadership.
