  career_goals: Alex plans to earn his GED within the next year, then enroll in a community college program focused on hospitality management or communications. He aims to secure an entry‑level supervisory
    role at a local restaurant or coffee shop, leveraging his people‑skills and practical experience. Over the next five years, he hopes to transition into a management position and eventually open his
    own community‑focused café that doubles as a venue for local music gigs and open‑mic nights, blending his love for social interaction, event planning, and the hospitality industry.
