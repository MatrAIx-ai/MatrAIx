personas:
  professional: Sneha Massey, a high-school senior eager to study visual communications and cultural studies, merges their curiosity about art with disciplined project-planning, using Adobe Photoshop, Illustrator,
    and Python-driven data visualizations to prototype interactive museum exhibits and organize community art workshops for children.
  sports: Sneha Massey enjoys weekend hikes with the Contra Costa Trail Runners, practices yoga at a local studio, follows the Golden State Warriors, the San Francisco Giants, and the San Jose Earthquakes,
    and plays intramural soccer in their school's spring league.
  arts: Sneha Massey immerses themselves in watercolor cityscapes inspired by Claude Monet and John Singer Sargent, curates Instagram photo edits echoing the light studies of Edward Hopper, draws creative
    energy from Indian classical sitar virtuoso Ravi Shankar and indie icons Tame Impala and Phoebe Bridgers, and finds literary spark in contemporary poets Ocean Vuong and Rupi Kaur.
  travel: Sneha Massey has explored the museums of Washington, D.C., trekked the historic streets of Kyoto during a family vacation, taken weekend drives to Portland’s art districts, and dreams of wandering
    Istanbul’s bazaars and Jaipur’s heritage sites, always planning their itineraries in detailed spreadsheets before departure.
  culinary: Sneha Massey enjoys cooking homemade paneer tikka masala, experimenting with matcha-green tea desserts, crafting avocado toast with feta and cherry tomatoes, and occasionally treating themselves
    to pepperoni pizza topped with fresh basil, balancing their meals with a keen eye on nutrition and flavor.
  core: Sneha Massey blends quiet contemplation with a relentless urge to organize—sketchbook always at hand, schedule colors coded, and a habit of buying too many art supplies while staying up late perfecting
    their watercolor gradients.
background:
  cultural: Sneha was raised in a Sikh Punjabi family that emigrated from the Punjab region of India to the Bay Area when her parents were young. The household blends traditional South Asian customs—celebrating
    Vaisakhi, Diwali, and observing Langar at the local Gurdwara—with the progressive lifestyle of suburban California. Punjabi is spoken at home, and the family maintains a vegetarian diet, often preparing
    classic dishes such as sarson da saag and makki di roti with a modern twist. Growing up in Dublin, CA, Sneha navigates both her Indian heritage and American teenage culture, participating in local community
    festivals and school activities while staying grounded in the values of respect, harmony, and service that her parents emphasize.
attributes:
  skills: '[''digital illustration'', ''basic graphic design (Adobe Photoshop & Illustrator)'', ''watercolor and sketching'', ''research and information synthesis'', ''time management and project planning'',
    ''basic Python coding'', ''Punjabi language proficiency'', ''photo editing'']'
  hobbies: '[''watercolor painting'', ''sketching and digital illustration'', ''photography and photo editing'', ''museum and gallery visits'', ''reading contemporary fiction and poetry'', ''yoga and mindfulness
    meditation'', ''listening to Indian classical and indie music'', ''volunteering at community art workshops'', ''hiking in Contra Costa County trails'']'
  career_goals: Sneha aspires to pursue a bachelor's degree in visual communications and cultural studies, with the long-term goal of working as a museum curator or education coordinator focusing on South
    Asian art and contemporary design. She hopes to develop community-based art workshops that encourage young people from immigrant backgrounds to explore their heritage through creative expression. In
    the interim, she plans to build a portfolio of digital artwork, secure a summer internship at a local gallery in the Bay Area, and refine her coding skills to create interactive, multimedia exhibits.
    Ultimately, Sneha envisions a career that merges her love of art, her methodical planning abilities, and her desire to foster cultural understanding.
