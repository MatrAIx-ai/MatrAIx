    photography"]'
  career_goals: She aims to advance to a senior engineering role where she can lead multidisciplinary teams on infrastructure projects that enhance climate resilience along the Connecticut shoreline. In
    the next five years, she plans to obtain her Professional Engineer (PE) license, complete a certification in sustainable design, and mentor junior engineers. Long‑term, she hopes to launch a boutique
    consulting firm that assists small coastal communities in implementing green infrastructure, while maintaining a balanced workload that supports her well‑being.
