personas:
  professional: Mark Gonzalez is a 16‑year‑old aspiring civil engineer who channels their love for community, bilingual communication, and hands‑on tinkering into leading the school’s robotics club and
    organizing neighborhood clean‑up projects, blending practical problem‑solving with a collaborative, upbeat vibe.
  sports: Mark Gonzalez is a midfield dynamo for the Ocoee Youth Soccer League, follows Orlando City SC closely, and spends weekends at the local skate park perfecting tricks, while they also tune into
    Miami Heat games for a quick cardio burst during off‑season.
  arts: Mark Gonzalez blends rhythm and digital flair, playing congas at family gatherings while they curate TikTok videos set to Bad Bunny and Rosalía, and they sketch vibrant illustrations inspired by
    street artist Shepard Fairey and Latin pop album covers.
  travel: Mark Gonzalez loves weekend road trips to nearby beaches like Clearwater, dreams of exploring San Juan's historic forts and Barcelona’s modernist architecture, and they plan each adventure with
    a mix of spontaneous Instagram polls and budget‑friendly hostels, balancing school deadlines with wanderlust.
  culinary: Mark Gonzalez enjoys helping family make pasteles with plantain dough during Noche Buena, experiments with homemade arroz con gandules seasoned with sofrito, and they prefer pepper‑spiced chicken
    tacos over fast‑food burgers, though they occasionally skip meals when caught up in robotics contests.
  core: Mark Gonzalez is a bilingual, tech‑savvy teen who merges soccer energy, conga beats, and a passion for sustainable engineering into every project, while habitually juggling schoolwork with late‑night
    TikTok edits and a penchant for occasional impulse spending.
background:
  cultural: Mark grew up in a Puerto Rican household in Ocoee, Florida, where Spanish is spoken daily and family traditions such as celebrating Noche Buena, making pasteles, and dancing to bomba and plena
    are cherished. His parents immigrated from Puerto Rico, bringing strong values of community, respect for elders, and a love for music and food. Living in a multicultural suburb, Mark navigates both
    his Caribbean heritage and mainstream American culture, attending a local public school while participating in Latino cultural festivals organized by the Orlando Puerto Rican community. This dual identity
    fuels his desire to give back, especially through bilingual mentorship and projects that reflect the needs of his community.
attributes:
  skills: '[''Bilingual (Spanish/English)'', ''Basic computer literacy (Google Workspace, Microsoft Office)'', ''Introductory programming (Scratch, Python)'', ''Robotics kit assembly and troubleshooting'',
