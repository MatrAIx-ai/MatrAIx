  hobbies: '[''Soccer (Ocoee Youth Soccer League)'', ''Latin percussion (congas, drums)'', ''Robotics and Arduino projects'', ''Digital art and video creation'', ''Community volunteering (after-school tutoring,
    senior outreach)'', ''Skateboarding at local skate parks'']'
  career_goals: Mark aims to pursue a degree in civil engineering or a related field, with a focus on designing sustainable infrastructure for underserved neighborhoods in Central Florida. He hopes to combine
    his technical tinkering skills and bilingual background to lead community projects that improve public spaces, such as parks and transportation hubs, especially for Puerto Rican and other Latino families.
    In the longer term, Mark envisions mentoring younger students, teaching basic coding and engineering concepts in after-school programs, so that his curiosity and practicality can inspire the next generation.
