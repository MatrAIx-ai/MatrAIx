personas:
  professional: Sarah Fisher is a senior interior designer whose mastery of spatial planning, advanced BIM modeling, and sustainable material research empowers her to craft high-net-worth residences that
    seamlessly blend smart-home automation with stress-reducing biophilic design, channeling her organized, methodical nature and competitive drive while navigating her natural skepticism and occasional
    worry about project outcomes.
  sports: Sarah Fisher follows the St. Louis Cardinals and the St. Louis Blues with avid enthusiasm, participates in twice-weekly yoga sessions at CorePower Yoga, and joins the St. Louis Running Club's
    weekend 5k runs to maintain cardiovascular health, favoring low-impact exercise that fits their preference for small, supportive groups.
  arts: Sarah Fisher draws inspiration from the botanical compositions of Georgia O'Keeffe, the mid-century modern furniture of Charles and Ray Eames, and the introspective folk melodies of Nick Drake,
    regularly attending design exhibitions at the St. Louis Art Museum and polishing her tactile sensibility at pottery workshops at ClayWorks Studio.
  travel: Sarah Fisher prefers meticulously planned trips that blend design inspiration with quiet reflection, having explored the Zen gardens of Kyoto, the sustainable architecture of Copenhagen, and the
    historic villas of Tuscany, while eyeing a future retreat to the French Alps to study alpine vernacular building techniques.
  culinary: Sarah Fisher, an adept home cook, delights in preparing quinoa salads tossed with heirloom tomatoes, fresh basil, and lemon-zest vinaigrette, alongside perfectly seared salmon fillets garnished
    with dill and roasted beetroot, and often savors farm-to-table tasting menus at St. Louis favorites such as Rooster and The Crossing.
  core: Sarah Fisher blends meticulous design precision with a restless curiosity, yet habitually over-analyzes every decision (half the time through a journal, half the time via spreadsheet) and can't
    resist snooping through sustainability reports for a soothing sense of control.
background:
  cultural: Sarah grew up in a middle‑class family of Irish‑German descent in suburban St. Louis County, where Midwestern values of practicality, modesty, and community service were emphasized. Her upbringing
    combined Catholic traditions with a strong appreciation for the region’s cultural blend of Southern hospitality and Midwestern restraint. She has internalized the city’s rich architectural heritage—from
    historic Victorian neighborhoods to modernist landmarks—and often draws inspiration from local artisans and food culture, such as the city’s famous BBQ and farmers markets. While deeply rooted in her
    American Midwestern identity, she remains open to global design influences, integrating them cautiously after thorough research.
attributes:
  skills: '["Spatial Planning", "Architectural Drafting", "AutoCAD", "SketchUp", "Revit", "3D Modeling", "Material Research", "Sustainable Design", "Building Code Compliance", "Project Management", "Budgeting",
    "Risk Assessment", "Virtual Reality Presentation", "Smart Home Integration", "Client Proposal Development", "Quality Assurance Documentation"]'
  hobbies: '["Visiting Missouri Botanical Garden", "Sketching plant arrangements", "Furniture restoration (mid-century)", "Reading design and sustainability literature", "Reflective journaling", "Yoga",
    "Mindfulness meditation", "Pottery classes", "Home automation experimentation", "Photography of interior spaces"]'
  career_goals: Sarah aims to transition from being a senior interior designer at a regional firm to establishing her own boutique studio that specializes in sustainable, stress-reducing residential environments
    for high‑net‑worth clients in the St. Louis area. She plans to attain NCIDQ certification within the next two years, expand her expertise in BIM and immersive VR design, and publish a guidebook on integrating
    ergonomics and wellness principles into interior design. Ultimately, she envisions becoming a recognized thought leader who mentors emerging designers, speaks at Midwest design conferences, and influences
    local building standards to prioritize occupant wellbeing while maintaining a balanced, low‑stress lifestyle.
