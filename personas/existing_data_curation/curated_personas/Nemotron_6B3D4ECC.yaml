  career_goals: Martha aspires to attend a high‑school program that emphasizes visual arts and storytelling, aiming to deepen her illustration and concept‑art skills. In the long term, she dreams of becoming
    a concept artist for video games or animated series, where she can bring imaginative worlds to life. She also hopes to leverage her empathy and personal experience with stress by creating visual content
    that raises awareness about adolescent mental health, potentially collaborating with school counselors or community organizations. In the short term, she is focused on winning her school's art competition,
    securing a lead role in the community theater’s next production, and launching a small blog where she shares her artwork and reflections on coping with worry.
