personas:
  professional: Martha Saigal is an aspiring teen illustrator who merges watercolor landscapes with digital character design, channels their sociable energy into community theater set design, and leverages
    their curiosity and organization to meet school art project deadlines while delighting peers with talkative, attention‑grabbing presentations.
  sports: Martha Saigal cheers for the Kansas City Chiefs and Royals, participates in the local Kansas City Youth Soccer Club during the spring, and enjoys weekend skateboarding sessions with friends, approaching
    fitness with a social, sometimes competitive, yet anxiety‑prone attitude.
  arts: Martha Saigal devotes spare time to sketching scenes inspired by Neil Gaiman’s comics, studies watercolor techniques from classic works by Georgia O’Keeffe, and fuels creativity by listening to
    Miles Davis and The Beatles, shaping their artistic identity with both vintage and contemporary influences.
  travel: Martha Saigal has explored nearby the Gateway Arch in St Louis and spent a weekend at Chicago’s Art Institute with their family, dreams of wandering the Louvre in Paris and the Zen gardens of
    Kyoto, and plans trips by sketching itineraries in their journal while balancing school obligations and a modest travel budget.
  culinary: Martha Saigal bakes red‑velvet cupcakes topped with cream‑cheese frosting and fresh strawberries for weekend blog posts, experiments with lavender‑infused shortbread, and cooks simple teen‑friendly
    meals like mac and cheese, approaching food as a creative extension of their art practice.
  core: Martha Saigal is a talkative, anxiety‑prone teen artist who blends watercolor and digital media, balances cautious budgeting with impulsive splurges, and turns every hobby into a stage for self‑expression.
background:
  cultural: Martha was raised in a predominantly white, middle‑class family in Wyandotte County, Kansas City, KS. Her family embraces typical Midwestern values such as community involvement, modesty, and
    a strong work ethic, often participating in local church activities and neighborhood events. The region’s rich cultural mix, including a celebrated jazz heritage, annual state fairs, and a vibrant food
    scene centered on barbecue and comfort cooking, has exposed her to diverse artistic expressions. Attending a public middle school with a fairly diverse student body has broadened her perspective, allowing
    her to interact with peers from various backgrounds while still feeling the strong sense of small‑town community that characterizes much of Kansas. These influences shape her appreciation for art, storytelling,
    and the importance of connecting with others.
