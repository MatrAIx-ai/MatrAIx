  career_goals: Muhammed aims to channel his technical background into community‑focused work. His short‑term goal is to obtain industry certifications such as CompTIA A+ and Cisco CCNA while securing a
    role that combines tech support with outreach, like a STEM outreach coordinator for a regional nonprofit. In the longer term, he envisions launching a community tech hub in Hartwell that offers repair
    services, hands‑on workshops, and mentorship for youth. He is also interested in pursuing a master's degree in education to become a high school STEM teacher, allowing him to blend his love of teaching,
    mentorship, and technology.
