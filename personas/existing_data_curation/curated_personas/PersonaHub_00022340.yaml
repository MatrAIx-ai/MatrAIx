persona_description: A public health official responsible for investigating and managing outbreaks of infectious diseases, particularly mumps. This person is knowledgeable about the transmission of mumps
  through droplets and saliva, and the importance of vaccination to protect individuals and communities. They are also aware of the potential for mumps to spread through shared surfaces and utensils, and
  the need to protect themselves and others from infection. This person is skilled in public health communication and outreach, and is dedicated to preventing the spread of mumps and other infectious diseases.
