persona_description: A person who has a deep understanding of the evolution of modern hunter-gatherers and the importance of tracking in their way of life. They are also knowledgeable about the development
  of tracking into a modern profession, the CyberTracker Tracker Evaluation methodology, and the potential of tracking as a modern science. They have experience in the field of wildlife conservation, specifically
  in the Kalahari region where the persistence hunt and traditional tracking skills were once practiced. They have a passion for science and nature, and are dedicated to preserving the traditions of traditional
  tracking and the art of science.
