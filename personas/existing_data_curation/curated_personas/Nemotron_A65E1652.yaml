  career_goals: Cathy aims to transition from her current manager role to a senior director or vice‑president of People and Culture within the next five years, overseeing enterprise‑wide talent strategy
    and employee experience. She plans to earn the SHRM‑Senior Certified Professional (SHRM‑SCP) credential and complete an executive leadership program to deepen her strategic acumen. Long‑term, she hopes
    to build a comprehensive mental‑health and wellness framework for her organization, champion flexible work policies, and serve as a mentor for emerging HR professionals. Eventually, she envisions consulting
    for nonprofit organizations in the St. Charles area, using her expertise to help smaller employers create inclusive, supportive workplaces.
