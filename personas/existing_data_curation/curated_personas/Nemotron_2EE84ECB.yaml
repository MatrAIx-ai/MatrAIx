  career_goals: Natalia aims to expand her impact beyond her current facility by stepping into a district-wide leadership role, such as Director of Early Childhood Services for DeKalb County. She wants
    to champion policies that close achievement gaps for Black and low-income children, secure sustainable funding streams, and embed culturally responsive teaching practices across all programs she oversees.
    To strengthen her credentials, she plans to complete a Child Development Associate (CDA) credential and pursue advanced professional development in grant management. She also aspires to mentor emerging
    administrators, especially women of color, and eventually launch a community-based nonprofit that provides after-school enrichment for underserved neighborhoods.
