  hobbies: '[''Art Gallery Visits'', ''Museum Tours'', ''African‑American History Book Club'', ''Community Center Volunteering'', ''Crafting Circle'', ''Gardening'', ''Live Music (Blues/Jazz) Attendance'',
    ''Dancing'', ''Travel to National Parks'', ''Cultural Festival Exploration'', ''Photography'']'
  career_goals: Angela aims to advance to a district management position within the next two years, overseeing multiple store locations and shaping regional sales strategies. She aspires to design and implement
    a formal training program for entry‑level retail staff that emphasizes customer engagement, inclusive workplace culture, and career development. Committed to lifelong learning, Angela plans to earn
    an associate degree in business administration through a local community college. In the long term, she envisions opening a boutique that showcases works by local Black artists and designers, providing
    a platform for emerging talent while blending her love of art, community building, and entrepreneurship.
