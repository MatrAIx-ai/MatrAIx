personas:
  professional: Micah Brule, an aspiring junior game developer and school drama troupe tech assistant, blends a curiosity for digital mechanics with a practical knack for wiring stage lighting, while they
    are talkative and attention‑seeking, turning every collaborative project into a lively brainstorming session.
  sports: Micah Brule, a junior varsity wide receiver for the Riverdale Eagles, spends after‑school weight‑lifting sessions at the community gym, avidly follows the Seattle Seahawks for NFL inspiration
    and the New York Yankees for baseball, and they join a local weekend fishing club that meets at Lake Meridian, treating the sport as both relaxation and low‑key cardio.
  arts: Micah Brule, an enthusiastic member of the school drama club and debate team, channels their love for performance into TikTok skits echoing Charli D'Amelio's style, while they blast Billie Eilish
    and Travis Scott during rehearsals and devour the latest Guardians of the Galaxy comic issues for sci‑fi inspiration.
  travel: Micah Brule, who plans trips with a mix of spontaneous online research and family input, enjoys weekend fishing getaways to Lake Tahoe and hopes to visit Orlando's Disney World for a break from
    gaming, while they dream of an eventual school‑sponsored exchange in Tokyo to explore neon‑lit arcades and anime culture.
  culinary: Micah Brule, who prefers quick bites like pepperoni pizza and chicken nuggets, yet takes pride in grilling the day's catch into a simple fish taco with cilantro, lime, and corn tortillas, and
    they occasionally attempt homemade ramen using instant packs and fresh ginger, though they often forget to eat vegetables.
  core: Micah Brule, a talkative 14‑year‑old gamer‑enthusiast who balances curiosity with worry, turns every hobby into a social showcase while they chronicle small‑scale triumphs and occasional anxieties
    online.
background:
  cultural: Micah was raised in Conway, a small city in Horry County, South Carolina, where Southern hospitality and community involvement are central. His family follows a modest, family‑oriented lifestyle
    with occasional church attendance and local traditions like high‑school football Friday nights, beach outings, and community festivals. The region’s blend of coastal and inland culture has exposed him
    to outdoor activities such as fishing, backyard barbecues, and a love for Southern cuisine, while also providing access to a diverse peer group through school and extracurriculars.
