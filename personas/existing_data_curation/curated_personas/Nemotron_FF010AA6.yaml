  career_goals: Marisol dreams of becoming a teacher who can create structured, engaging lessons for young children, because she loves organizing activities and being in front of a group. She also imagines
    herself as a professional soccer player who can showcase her skills and compete. She is drawn to roles that involve planning events, such as a community event coordinator, where she can combine her
    love for routine, leadership, and performance. Her ultimate ambition is to help others learn while maintaining high standards.
