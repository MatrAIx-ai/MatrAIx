  career_goals: Manuel aspires to become a community liaison or youth mentor who can use his bilingual skills to support fellow students and local families. He dreams of pursuing a career that blends his
    love for people, culture, and the environment—such as a bilingual educator, a marine‑science advocate, or a social‑media content creator that highlights the unique Gullah‑Mexican cultural blend of his
    hometown. He wants to preserve local traditions while promoting cross‑cultural understanding.
