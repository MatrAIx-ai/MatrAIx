personas:
  professional: Manuel Macedo, an aspiring digital storyteller and teen content creator, blends curiosity for new video trends with practical schoolwork balance; they schedule filming sessions around homework,
    curate a TikTok channel that showcases local community life, and use their sociable flair to keep peers engaged as the on‑screen centre of attention.
  sports: Manuel Macedo, a 14‑year‑old athlete on Saint Helena Island, plays midfield for the school’s soccer team and guards on the basketball court, cheering on the Charleston Battery and the Charlotte
    Hornets when not on the field; they also train with the local youth club ‘Lowcountry Strikers’ to stay fit, balancing competitive spirit with a laid‑back, team‑first attitude.
  arts: Manuel Macedo, an outspoken member of the school drama club, loves stepping into leading roles that let them channel their talkative energy; they follow the soulful guitar of B.B. King, the vibrant
    beats of Los Ángeles Azules, and the pop flair of Billie Eilish, and devour graphic novels like ‘Ms. Marvel’ and ‘Maus’, weaving those influences into short, upbeat TikTok videos that celebrate community
    stories.
  travel: Manuel Macedo, a curious teen explorer, spends weekends kayaking through the Charleston marshes, has road‑tripped to Savannah’s historic squares, dreams of the neon streets of Miami, and plans
    a future family vacation to the Florida Keys to fish for tarpon; they balance school responsibilities and a modest allowance with a mix of spontaneous local adventures and carefully saved long‑haul
    trips.
  culinary: Manuel Macedo, a budding home chef, loves mastering the art of handmade corn tortillas filled with seasoned pork, pulling together tamales for family celebrations, and blending them with Lowcountry
    staples like shrimp and grits seasoned with Old Bay; they experiment with chipotle‑lime sauces and fresh cilantro while filming the cooking process for TikTok.
  core: Manuel Macedo is a socially driven teen who juggles school, sports, and creative video making, spicing life with bold flavors, manifold hobbies, and a disciplined yet sometimes impulsive approach
    to saving and health.
background:
  cultural: Manuel is a second‑generation Mexican‑American living on Saint Helena Island in South Carolina. At home he speaks Spanish, celebrates Mexican holidays like Día de los Muertos, and enjoys traditional
    foods. The island’s Gullah‑Geechee heritage shapes his daily life through community gatherings, low‑country cooking, storytelling, and church involvement. He embraces a bicultural identity, blending
    Mexican traditions with the rich Southern Lowcountry culture of his coastal community.
