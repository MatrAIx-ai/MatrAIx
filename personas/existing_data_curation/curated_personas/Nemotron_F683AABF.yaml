  career_goals: Tommy aims to re‑enter the workforce as a trusted technical consultant, focusing on home automation and custom IoT solutions for small businesses and households. He plans to acquire certifications
    such as AWS Solutions Architect, Cisco CCNA, and PMP to bolster his credibility. Over the next three years he hopes to launch a boutique consulting firm that offers design, installation, and support
    for smart‑home technologies, while also mentoring local youth through STEM outreach programs. Financial stability and a flexible schedule are key ambitions, allowing him to manage stress while providing
    for his family.
