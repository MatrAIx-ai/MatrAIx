personas:
  professional: Isis Jeanlouis, a retired community organizer and senior-center facilitator, leverages her meticulous budgeting skills, competitive drive, and choir leadership to orchestrate church functions,
    literacy workshops, and neighborhood garden projects with precision and high standards.
  sports: Isis Jeanlouis enjoys daily walks through Anderson’s Greenwood Park as part of the senior walking club "Golden Strollers", follows the Carolina Panthers for football, cheers for the South Carolina
    Gamecocks during college season, and stays active by tending to her rose garden, which she treats as a low‑impact fitness routine.
  arts: Isis Jeanlouis sings in her church choir, finds inspiration in gospel legends like Mahalia Jackson and modern worship artist Kirk Franklin, appreciates the jazz of Duke Ellington, reads historical
    novels such as "Homegoing" and "The Water Dancer", and attends productions at the Anderson Playhouse, where her love for storytelling fuels her quilting narratives.
  travel: Isis Jeanlouis prefers organized group tours that blend relaxed sightseeing with cultural immersion, having visited historic Charleston and Savannah, taken a weekend pilgrimage to Washington,
    D.C.’s National Museum of African American History, savored the music scene in New Orleans, and dreaming of a future trip to Ghana to trace ancestral roots while carefully budgeting each journey.
  culinary: Isis Jeanlouis excels at cooking classic Southern dishes like fried catfish, collard greens seasoned with smoked pork and okra, sweet potato pie, and shrimp and grits, frequently experimenting
    with citrus twists and fresh rosemary, and she delights in sharing these meals at community potlucks where she treats each plate as a story.
  core: Isis Jeanlouis is a fiercely organized, community‑driven septuagenarian whose competitive edge fuels her quilting, bridge, and garden projects, even as she sometimes over‑schedules her days and
    questions newcomers’ motives.
background:
  cultural: Isis was raised in Anderson County, South Carolina, during a time of significant social change. As a Black woman, her identity is deeply rooted in the African‑American traditions of the Upstate
    South, including the strong influence of the Black Baptist church, which fostered a spirit of community service, resilience, and celebration of faith. Her family’s culinary heritage blends Gullah‑inspired
    soul food with classic Southern flavors, and storytelling—especially oral histories about her ancestors’ journeys through the civil‑rights era—has been a cornerstone of her upbringing. These cultural
    influences shape her values of perseverance, collective responsibility, and the importance of preserving history for future generations, while also informing her love for music, communal gatherings,
    and intergenerational mentorship.
attributes:
  skills: '["Budgeting and financial planning", "Event organization and coordination", "Southern cooking and soul‑food recipes", "Gardening (native plants and roses)", "Quilting and textile arts", "Literacy
    tutoring and mentorship", "Volunteer project management", "Competitive bridge and card games"]'
  hobbies: '["Church choir and services", "Bingo nights", "Gardening (roses and native edible plants)", "Quilting", "Southern cooking and recipe experimentation", "Reading historical novels and memoirs",
    "Walking in local parks", "Competitive bridge (card game)"]'
  career_goals: Although retired from formal employment, Isis remains driven by a desire to leave a lasting legacy. She intends to document her family’s oral histories and compile a memoir that captures
    the experiences of African‑American women in the Upstate South. She aims to mentor younger generations through church youth programs and community literacy workshops, ensuring that her knowledge of
    organization, cooking, and crafts is passed on. Isis also aspires to complete a community garden initiative that provides fresh produce and therapeutic gardening spaces for seniors. Maintaining her
    health through daily walks, staying active in her church choir, and achieving personal milestones in quilting—such as completing a series of commemorative quilts for her grandchildren—are key ambitions
    that keep her engaged and purposeful.
