  career_goals: Carlos aims to secure stable part‑time work in a trade that leverages his hands‑on abilities, such as becoming a certified HVAC technician or a full‑time handyman. He aspires to obtain a
    small business license to offer affordable home‑repair services in Lockney, providing reliable support to his neighbors while creating a steady income for his family. Additionally, he plans to continue
    managing his anxiety through counseling, mindfulness practices, and community support groups, and eventually mentor younger community members in practical skills and emotional resilience.
