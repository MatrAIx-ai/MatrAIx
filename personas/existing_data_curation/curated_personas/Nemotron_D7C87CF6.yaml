personas:
  professional: Carlos Villanueva is transitioning to part‑time work as a certified HVAC technician and freelance handyman, applying their self‑taught carpentry, automotive repair, and electronics tinkering
    skills while their methodical organization and considerate, community‑focused demeanor earn the trust of bilingual neighbors in Lockney.
  sports: Carlos Villanueva maintains modest fitness through daily early‑morning walks across the plains, enjoys cheering on the Texas Rangers and Dallas Cowboys, and plays catch‑up on weekends with the
    Lockney Community Softball Club, balancing a low‑impact routine with seasonal outdoor activities like birdwatching hikes.
  arts: Carlos Villanueva finds creative solace tinkering with vintage radios while listening to folk legends like Woody Guthrie and contemporary Mexican singer Lila Downs, reading biographies of figures
    such as Abraham Lincoln and Frida Kahlo, and occasionally attending community screenings of classic westerns starring John Wayne, which together nurture their solitary yet curious spirit.
  travel: Carlos Villanueva prefers low‑key road trips that blend cultural immersion with nature, having explored Oaxaca's culinary markets and the Texas Hill Country's wine trail, while dreaming of a guided
    bird‑watching excursion to the Galápagos Islands once family finances allow.
  culinary: Carlos Villanueva cooks tamales and pozole with a seasoned hand, favoring roasted poblanos, fresh hominy, and masa made from heirloom corn kernels cultivated in their garden, and occasionally
    experiments by adding smoked chipotle to traditional recipes to keep the flavors both familiar and inventive.
  core: Carlos Villanueva balances a quietly inquisitive mind with a tendency to over‑worry, finding peace in solitary gardening while habitually checking financial spreadsheets before bed and occasionally
    losing track of time while repairing vintage radios.
background:
  cultural: Carlos was raised in a Mexican‑American family in the Texas Panhandle, where Spanish language and Catholic traditions are central to daily life. Family gatherings, religious festivals like Día
    de los Muertos, and community celebrations are important cultural touchstones. Growing up in a rural town, he learned the value of self‑reliance, neighborly support, and respect for the land. His bilingual
    upbringing enables him to navigate both Hispanic and mainstream Texan cultures, often acting as a cultural liaison in community events and local initiatives. He maintains strong ties to his extended
    family across Texas and Mexico, and he incorporates familial values of humility, hard work, and hospitality into his interactions.
