  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Reading contemporary fiction and poetry'', ''Attending local theater productions and indie film screenings'',
    ''Hiking and nature walks around Lake Mendota'', ''Urban gardening and sustainable living'', ''Photography of architectural details'', ''Cooking experimental recipes'', ''Volunteering for community
    arts programs'', ''Participating in a book club'']'
  career_goals: Emily aims to advance to a senior regional director role within a forward‑thinking property management firm, where she can shape policies that prioritize sustainable living, inclusive community
    design, and integrated arts programming. She is interested in pursuing a master’s degree in urban planning or nonprofit management to deepen her expertise in creating vibrant, resilient neighborhoods.
    In the longer term, Emily envisions launching her own boutique property management company that specializes in artist‑friendly residential communities, fostering a blend of affordability, cultural enrichment,
    and environmental stewardship.
