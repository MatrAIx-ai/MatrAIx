  hobbies: '["Reading historical non-fiction", "Gardening", "Playing acoustic guitar", "Listening to classic rock and country music", "Cooking Southern cuisine", "Analyzing baseball statistics", "Walking
    the Natchez Trace", "Attending small‑group history lectures"]'
  career_goals: Kenneth aims to advance to a senior management analyst role within the next three years, leading cross‑functional efficiency initiatives and overseeing the development of a company‑wide
    performance measurement system. He aspires to become a director of strategy or operations, where he can shape long‑term planning while maintaining a predictable, stable career path. Mentoring junior
    analysts and establishing a formal training program are also important to him, reflecting his desire for structured growth and sustained organizational impact.
