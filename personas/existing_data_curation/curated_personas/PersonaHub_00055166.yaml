persona_description: A nature educator and conservation professional who is passionate about connecting local communities, youth, and visitor industries with information about their native ecosystem, endangered
  species, and the need for stringent biosecurity. They are dedicated to teaching students about their unique native ecology and the importance of conservation efforts. They have experience teaching and
  presenting on Maui Forest Bird Recovery Project public presentations and The Pāhana ʻĀina Lupalupa (PAL) series of Hawaiian culture-based science readers. They are also knowledgeable about the Symphony
  of the Hawaiian Birds documentary and the importance of educating elementary and secondary students through science, music, and art to teach about Hawaii's native bird species and the importance of conservation
  efforts.
