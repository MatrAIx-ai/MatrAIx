personas:
  professional: Mardell Henley, a budding kindergarten explorer, already showcases emerging leadership by organizing circle time activities, balancing curiosity with practicality, and eagerly assisting
    classmates while staying reliably attentive to tiny responsibilities.
  sports: Mardell Henley darts around the local park playing tag and joins the Sunnybrook Cubs youth soccer team in the fall, cheers for the New York Yankees during baseball season, and approaches each
    game with boundless energy while occasionally forgetting to hydrate after an intense play.
  arts: Mardell Henley delights in sketching vivid sea turtles after listening to The Wiggles' 'Fruit Salad' and watching Disney's 'Moana', dances along to Raffi's 'Baby Beluga', and treasures picture books
    like 'The Very Hungry Caterpillar' and 'Brown Bear, Brown Bear', letting these artistic influences shape their creative play.
  travel: Mardell Henley loves family road trips to nearby river spots for shell hunting, remembers the excitement of a weekend beach day at Myrtle Beach, and daydreams about snorkeling the Great Barrier
    Reef someday, preferring itineraries that blend structured stops with spontaneous sandcastle building.
  culinary: Mardell Henley favors simple, hands‑on kitchen tasks, proudly stirring batter for banana pancakes, sprinkling strawberry slices on yogurt, and adores crunchy carrot sticks with hummus, while
    their snack cravings often lead them to request extra cheese pizza after school.
  core: Mardell Henley is a curious, energetic six‑year‑old whose love for outdoor adventures and group activities is balanced by a habit of worrying over tiny details, which they soothe through drawing
    sea creatures and helping in the kitchen.
background:
  cultural: Mardell grows up in a Southern coastal community in New Bern, North Carolina, where family life centers around traditional Southern meals, church involvement, and community festivals. Her household
    values hospitality, respect for nature, and practical skills such as gardening and cooking. The local culture emphasizes a strong connection to the Pamlico River, storytelling about the region’s history,
    and a blend of modern education with long‑standing Southern traditions.
attributes:
  skills: '[''Reading simple sentences'', ''Writing name neatly'', ''Counting to 100'', ''Basic addition'', ''Fine motor skills (coloring, cutting, building)'', ''Using educational tablet apps'', ''Organizing
