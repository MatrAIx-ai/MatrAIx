  hobbies: '[''Collecting shells and rocks'', ''Drawing sea creatures'', ''Dancing in group classes'', ''Reading picture books'', ''Playing tag and group games'', ''Kindergarten circle time and crafts'',
    ''Sunday school activities'', ''Helping with simple cooking tasks'']'
  career_goals: Mardell dreams of becoming a marine biologist to explore and protect the coastal wildlife of Pamlico County, imagines herself as a teacher who can share stories and help other children learn,
    and sometimes says she wants to be a firefighter because she likes helping people. She is drawn to careers that let her satisfy her curiosity about nature while providing practical ways to support her
    community and give her a sense of security.
