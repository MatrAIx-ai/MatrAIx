personas:
  professional: Georges Henderson is a senior full‑stack software engineer who blends Python, TypeScript, and cloud‑native architectures with a sharp UI/UX eye, leading hackathon teams to build experimental
    generative‑art prototypes while thriving on the competitive rush of optimizing performance, even as their relaxed approach to planning sometimes leaves code reviews for the last minute.
  sports: Georges Henderson commands the point guard spot on a DeKalb County community basketball league, cheers for the Atlanta Hawks and Atlanta Falcons, and spends weekend mornings shooting hoops at
    local courts while swapping game analytics with teammates.
  arts: Georges Henderson dives into Atlanta’s street‑art tours, draws digital paintings in Procreate inspired by the vivid works of Banksy and Kehinde Wiley, and fills evenings with live jazz from Kamasi
    Washington and hip‑hop shows headlined by Kendrick Lamar, letting music and visual art fuel their creative code.
  travel: Georges Henderson maps out tech‑focused trips to SXSW in Austin, Art Basel in Miami, and the Berlin Contemporary Art Festival, balancing conference schedules with spontaneous detours to local
    food markets, though a flexible work setup means flights are sometimes booked last‑minute.
  culinary: Georges Henderson blends Southern soul‑food staples like collard greens and fried chicken with global twists—adding miso to greens, sprinkling gochujang on shrimp and grits, and finishing a
    sweet potato pie with cardamom—while hosting elaborate dinner parties that showcase his experimental palate.
  core: Georges Henderson, a 39‑year‑old full‑stack developer, channels relentless curiosity into art‑tech mashups, thrives on competition, enjoys flexible spontaneity, yet often lets disorganization sideline
    their best‑laid plans.
background:
  cultural: 'Georges grew up in DeKalb County, Atlanta, in a close‑knit African‑American family that balanced Southern traditions with a forward‑looking embrace of technology. His upbringing was steeped
    in the rich history of the civil‑rights movement, church community gatherings, and the dynamic Black arts scene of the South—spanning gospel choirs, hip‑hop culture, and the city’s famed street‑art
    murals. These influences cultivated a deep appreciation for storytelling through visual and auditory media. While pursuing his STEM degree, he navigated predominantly white academic spaces, reinforcing
    his resolve to increase representation for Black engineers in tech. Today, he proudly participates in local cultural events such as Juneteenth celebrations, Black History Month panels, and the Atlanta
    Film Festival’s Afro‑centric showcases. His cultural identity informs his professional ethos: he seeks to build inclusive tech products that reflect diverse experiences and to mentor the next generation
    of Black technologists in his community.'
