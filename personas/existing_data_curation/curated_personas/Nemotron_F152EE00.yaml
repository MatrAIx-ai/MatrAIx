  career_goals: Georges aims to evolve from senior developer to principal engineer and eventually lead an interdisciplinary innovation lab that blends software engineering with interactive art and immersive
    media. He envisions launching a boutique startup that creates AI‑driven generative art installations for corporate and cultural venues, leveraging his technical depth and artistic curiosity. In the
    next five years he plans to earn a cloud‑architecture certification, mentor a cohort of Black and under‑represented developers, and become a frequent speaker at tech‑art conferences such as SXSW Interactive
    and the Black Tech Fest. While pursuing these ambitions, he values flexible work arrangements that let him explore unconventional ideas without the constraints of rigid planning, and he is determined
    to champion diversity and inclusion within his organization’s engineering culture.
