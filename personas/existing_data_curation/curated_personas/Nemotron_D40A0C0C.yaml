  hobbies: '["Gardening (vegetables & herbs)", "Fishing at Albemarle Sound", "Woodworking (birdhouses, small furniture)", "Listening to classic country and bluegrass music", "Church attendance and potluck
    gatherings", "Senior center bingo and card games", "Reading local newspaper and historical memoirs", "Genealogy research", "Walking along the riverbank"]'
  career_goals: Maintain independence, stay physically capable, and continue to contribute to the Edenton community. He wants to preserve his family’s stories by recording oral histories, mentor younger
    volunteers at the local senior center in basic handyman tasks, and keep his garden thriving as a source of food and calm. He also hopes to attend a grief support group to manage his anxiety after losing
    his wife, and to develop a simple written memoir of his life on the Outer Banks.
