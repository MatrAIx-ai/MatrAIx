personas:
  professional: Doyle Sapp, an 83‑year‑old handyman‑mentor, leverages decades of carpentry, small‑engine repair, and garden stewardship to support Edenton’s senior center volunteers while they preserve
    local oral histories and ensure community self‑reliance.
  sports: Doyle Sapp follows the Carolina Hurricanes and the North Carolina Tar Heels, enjoys late‑afternoon fishing trips on Albemarle Sound as a low‑impact sport, and they participate in a local senior
    walking club that meets at the river trail each spring, though they admit to skipping the weekly yoga class for a nap.
  arts: Doyle Sapp listens to classic country and bluegrass legends like Bill Monroe, Patsy Cline, and Johnny Cash on their vintage radio, shares folk stories at church potlucks, and they occasionally attend
    community theater productions featuring local actors such as Margaret Ellis.
  travel: Doyle Sapp prefers short road trips to nearby historic towns like Charleston, Savannah, and St. Augustine, plans itineraries loosely around river festivals, and they dream of a calm seaside retreat
    in Maine’s coastal villages, though their health limits lengthy travel.
  culinary: Doyle Sapp cooks comfort dishes such as shrimp and grits, collard greens seasoned with smoked ham hocks, and fresh tomato‑basil bruschetta, they grow many herbs at home, and they relish potluck
    gatherings where they swap recipes for heirloom vegetable preserves.
  core: Doyle Sapp is an 83‑year‑old hands‑on storyteller who balances a love for predictable garden rhythms with occasional anxiety, a stubborn habit of misplacing bills, and they demonstrate an unwavering
    commitment to community heritage.
background:
  cultural: Born and raised in Edenton, North Carolina, Doyle comes from a generation of white Southern families with deep roots in the coastal lowcountry. His upbringing was shaped by a blend of agrarian
    self‑reliance, strong church affiliation, and the traditions of Southern hospitality. Family gatherings centered around home‑cooked meals, church socials, and seasonal festivals that celebrated harvests
    and local history. The rhythm of life in Perquimans County—fishing, farming, and a close‑knit community—instilled values of practicality, modesty, and mutual support. Though his formal education ended
    before ninth grade, he learned skills through hands‑on work and community mentorship, preserving a cultural legacy of oral storytelling, respect for elders, and a love for the natural landscape of the
    Inner Banks.
attributes:
  skills: '["Basic carpentry and woodwork", "Home repair (plumbing, minor electrical)", "Small-engine maintenance", "Seasonal vegetable gardening", "Traditional Southern cooking", "Oral history storytelling",
