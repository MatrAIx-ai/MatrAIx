  career_goals: Courtney aims to move from her current managerial role to a senior operations director position within the next five years, overseeing multiple sites in the Midwest. She plans to deepen
    her expertise in data‑driven performance improvement, potentially completing a bachelor’s degree or pursuing an MBA focused on supply chain and operations. Her ambition includes leading a cross‑functional
    team to implement scalable, sustainable processes, mentoring emerging managers, and sharing best‑practice insights at industry conferences.
