personas:
  professional: Clara Johnson, a budding young strategist, leverages their love of LEGO architecture and competitive chess to dominate the middle school STEM Club, methodically planning each project with
    the precision of a seasoned engineer while they quietly outmaneuver peers.
  sports: Clara Johnson participates in the school chess team and enjoys solo swimming laps at the community pool, cheering on the Chicago Cubs from home but preferring the quiet concentration of individual
    sports over team ball games.
  arts: Clara Johnson immerses themselves in piano pieces by Ludwig van Beethoven and Yiruma, reads mystery novels by Agatha Christie and sci-fi works by Isaac Asimov, and knits simple scarves, letting
    these artistic pursuits shape a disciplined yet imaginative inner world.
  travel: Clara Johnson loves meticulously planned family trips, such as a week-long itinerary through Yellowstone National Park where they catalog wildlife in a notebook, and dreams of a structured visit
    to London’s museums, favoring itineraries that balance educational stops with time for quiet reflection.
  culinary: Clara Johnson prefers wholesome, simple meals like vegetable stir-fry made with carrots, bell peppers, and fresh basil from their garden, bakes chocolate-chip cookies on rainy afternoons, and
    occasionally indulges in sugary cereal for breakfast, yet they rarely venture beyond familiar flavors.
  core: Clara Johnson is a methodical 12-year-old who channels a love for puzzles, structured hobbies, and disciplined routines into a quietly competitive approach to learning, saving, and self-care.
background:
  cultural: Clara is a Black girl raised in Stephens City, Virginia, where her family belongs to a close‑knit African‑American community that places high value on education, faith, and cultural pride. Her
    grandparents grew up in rural Virginia and were active in the civil‑rights movement, stories that instilled in Clara a sense of responsibility and heritage. The family attends a historically Black Baptist
    church, where gospel music, communal storytelling, and service projects are central. Celebrations of Juneteenth, Black History Month, and family gatherings feature traditional Southern soul food such
    as collard greens, cornbread, and sweet‑potato pie, strengthening her connection to her roots. At home, Clara’s parents encourage academic excellence, expose her to African‑American literature and history,
    and nurture a strong cultural identity as she navigates a largely white school environment.
