  career_goals: Clara envisions a future where her love for order, precision, and problem‑solving guides her toward a STEM career. She dreams of becoming an engineer—civil or mechanical—to design functional
    structures and solve real‑world challenges. She is also fascinated by data analysis and project management, roles that would let her organize complex tasks and lead teams. In the short term, she aims
    to earn a STEM scholarship, attend a high‑performing high school with strong math and science programs, and become the go‑to organizer for school clubs, consistently delivering reliable results.
