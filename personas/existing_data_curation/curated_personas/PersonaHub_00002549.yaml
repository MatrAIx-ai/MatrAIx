persona_description: A healthcare professional who is aware of the signs and symptoms of anaphylaxis and is prepared to respond with an emergency plan and epinephrine injections. They are knowledgeable
  about the content of the one-page primer intended for patients and caregivers, which emphasizes the symptoms and treatment of anaphylaxis caused by foods, medications or insect bites. They are familiar
  with the resource published in the medical journal JAMA, which provides guidelines for preventing and treating peanut allergy and emphasizes the importance of avoiding exposure to allergens, teaching
  children how to protect themselves, and having two epinephrine injections available. They are also aware of the potential for a second anaphylactic reaction within 24 hours without a second exposure to
  the allergenic substance, and have knowledge of emerging treatment options to desensitize oneself to anaphylaxis.
