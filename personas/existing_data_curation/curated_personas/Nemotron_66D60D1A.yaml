  career_goals: Guided by his love for structure, teamwork, and helping others, Joel dreams of becoming a firefighter or a search‑and‑rescue worker when he grows up. He is also fascinated by airplanes and
    expresses interest in becoming a pilot or an engineer, fields he associates with clear procedures, problem‑solving, and high achievement.
