personas:
  professional: Luis Navarro is a seasoned oil‑field veteran who leverages three decades of heavy‑equipment expertise, bilingual communication, and a pragmatic curiosity for emerging safety tech; they lead
    crews, conduct emergency drills, and mentor younger workers toward a future in supervisory safety and renewable‑energy projects.
  sports: Luis Navarro plays forward for the Desert Sands Adult Soccer Club and volunteers as a waterboy for local high‑school football games, passionately supports New Mexico United and the Dallas Cowboys,
    and when they need a break they spend weekends fishing the San Juan River.
  arts: Luis Navarro is a dedicated folklorico dancer and acoustic‑guitar enthusiast who rehearses traditional steps with his family for community festivals, sings along to classic ranchera legends like
    Vicente Fernández and Pedro Infante, and they often unwind by playing the blues of B.B. King at church gatherings.
  travel: Luis Navarro prefers family‑oriented road trips that blend cultural recreation with scenic exploration, having driven to Santa Fe’s art markets and the Grand Canyon, while dreaming of a pilgrimage
    to his parents’ hometown in central Mexico and a relaxing retreat at Lake Powell; they also love planning detailed itineraries that balance cultural stops with scenic hikes.
  culinary: Luis Navarro is an avid home cook who masters tamales, molé poblano, and grilled carne asada, often experimenting with ancho and chipotle chilies, fresh corn masa, and locally sourced green
    chiles to craft family‑style meals that marry tradition with subtle modern twists; they frequently host neighborhood potlucks where everyone shares stories.
  core: Luis Navarro, a 59‑year‑old oil‑field veteran with a fierce community spirit, balances pragmatic curiosity and organized flexibility while wrestling with occasional anxiety that fuels both his relentless
    work ethic and his love for family‑centric cooking and mentoring; they view each day as an opportunity to blend tradition with innovation.
background:
  cultural: Luis is a first‑generation Mexican‑American whose parents emigrated from central Mexico in the 1970s. Raised in Farmington, he grew up bilingual, navigating both the Mexican household traditions—such
    as Día de los Muertos, posadas, and large family gatherings—and the broader New Mexican cultural landscape. He identifies with the Chicano community, valuing familismo, respeto, and a solid work ethic,
    while also embracing local customs like Southwestern cuisine and the region’s outdoor lifestyle. His Catholic faith plays a central role in family life, guiding celebrations and community service. Luis’s
    cultural identity blends Mexican heritage with the frontier spirit of the American Southwest, shaping his values, communication style, and social connections.
attributes:
  skills: '["Heavy equipment operation (haul trucks, excavators, drilling rigs)", "Mechanical troubleshooting and maintenance", "Drilling and well testing procedures", "Safety compliance and emergency response",
