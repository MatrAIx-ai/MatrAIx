    "Basic welding and metal fabrication", "Familiarity with emerging extraction technologies (remote sensors, drone inspections)"]'
  hobbies: '["Adult soccer league participation", "Folklorico dancing at cultural festivals", "Cooking traditional Mexican dishes (tamales, mole, carne asada)", "Fishing on the San Juan River", "Hiking
    in the surrounding mesas", "Attending local high‑school football games", "Playing acoustic guitar at community events", "Reading industry magazines on automation and renewable energy", "Drone piloting
    as a hobby", "Volunteer work at the local Catholic church"]'
  career_goals: Looking ahead, Luis aims to move into a supervisory safety role where he can formalize a mentorship program for younger extraction workers, emphasizing both technical skill and mental‑health
    resilience. He plans to obtain a Certified Safety Professional (CSP) credential and to complete advanced training in renewable‑energy installations, positioning himself for a gradual transition as the
    region diversifies its energy portfolio. Beyond work, Luis envisions opening a modest family‑run Mexican kitchen that showcases the recipes he cherishes, providing a stable post‑retirement venture while
    staying connected to his cultural roots. He also hopes to advocate for better on‑site mental‑health resources, drawing on his own experiences with anxiety to make the workplace more supportive.
