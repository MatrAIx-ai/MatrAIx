  hobbies: '[''Hiking'', ''Fishing'', ''Pickup basketball'', ''Community gardening'', ''DIY woodworking'', ''Cooking farm‑to‑table meals'', ''Attending county fairs'']'
  career_goals: James aims to move into a supervisory role within the next three to five years, eventually becoming a farm manager for a larger diversified operation. He plans to enroll in a community‑college
    agricultural program to earn an associate’s degree in agribusiness and to obtain the Certified Crop Adviser credential. Long‑term, he hopes to purchase his own modest acreage near Eagle and develop
    a sustainable, community‑supported agriculture (CSA) venture that supplies fresh produce to local families while preserving the land’s health.
