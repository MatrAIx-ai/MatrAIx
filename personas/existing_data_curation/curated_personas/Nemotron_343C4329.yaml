personas:
  professional: James Crooks is a 19‑year‑old miscellaneous agricultural worker who expertly operates tractors, maintains irrigation systems, and coordinates small crew tasks on an Eagle farm, applying
    their routine‑driven, practical mindset and outgoing, cooperative style to keep operations running smoothly while confidently stepping up to supervise when needed.
  sports: James Crooks stays fit by hiking the Eagle Ridge Trail, fishing at Harriman Reservoir, and joining weekly pickup basketball games at the Eagle Community Center while rooting for the Boise State
    Broncos football and the Boise Hawks minor‑league baseball, and they occasionally train with the local trail‑running club during spring.
  arts: James Crooks blends a love for classic rock and country into their downtime, blasting The Eagles, Lynyrd Skynyrd, Johnny Cash, and Dolly Parton while cooking in the garden, and they often attend
    the Ada County Fair’s live music stage featuring local bluegrass acts, which fuels their creative DIY projects.
  travel: James Crooks favors low‑cost, self‑planned road trips that mix adventure and relaxation, such as a recent weekend escape to Yellowstone National Park and a spring bike ride to Sun Valley, while
    dreaming of an international study tour to New Zealand’s sustainable farms once college tuition is funded.
  culinary: James Crooks enjoys cooking farm‑fresh meals, whipping up roasted rosemary potatoes, garden vegetable stir‑fry with zucchini, bell peppers, and fresh basil, and a hearty chicken‑and‑egg frittata
    using eggs from their backyard coop, reflecting a confident home‑cook level that favors simple, seasonal dishes.
  core: James Crooks balances a love for routine‑driven farm work with spontaneous woodworking projects, often checking the irrigation timer before breakfast, and while they’re reliably organized, they
    can’t resist a nightly glance at classic rock playlists even when late for early morning chores.
background:
  cultural: James grew up in a predominantly white, rural community in Ada County, Idaho, where farming and outdoor recreation are central to daily life. His family values self‑reliance, hard work, and
    community cooperation, traditions that are reflected in local events like county fairs, potlucks, and volunteer garden projects. The region’s cultural emphasis on practicality, respect for the land,
    and close‑knit neighborly ties has shaped his worldview and everyday habits.
attributes:
  skills: '[''Crop cultivation'', ''Livestock handling'', ''Irrigation system maintenance'', ''Tractor and equipment operation'', ''Basic mechanical repair'', ''Inventory management'', ''Time management'',
