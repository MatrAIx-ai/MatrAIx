  hobbies: '[''Soccer (recreational league)'', ''Salsa and urban Latin dance'', ''Cooking Puerto Rican cuisine'', ''Listening to reggaeton, plena, and bomba music'', ''Photography and photo editing'', ''Video
    gaming'', ''Watching Latin cinema'', ''Volunteering at community and cultural events'']'
  career_goals: Lidio aims to complete a bachelor's degree in Marketing or Communications while gaining hands‑on experience through internships with cultural tourism agencies or community nonprofits. His
    short‑term goal is to secure a role as a marketing coordinator or community outreach specialist where he can leverage his bilingual skills and cultural insight to promote Puerto Rican heritage events
    in Florida. Long‑term, he aspires to launch his own boutique event‑planning firm that specializes in authentic Puerto Rican celebrations and festivals, eventually becoming a recognized brand ambassador
    for Caribbean culture in the U.S. market.
