  career_goals: Sonal aims to transition from full‑time driving to a mentorship and training role within the local trucking community, focusing on supporting younger women entering the industry. She also
    plans to launch a small, community‑focused ride‑share service that provides reliable transportation for seniors in Milton and surrounding areas. Additionally, she hopes to leverage her sales experience
    by partnering with a regional auto‑parts supplier to offer personalized consulting for small businesses needing logistics solutions.
