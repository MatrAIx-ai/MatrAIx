personas:
  professional: Sonal Patel leverages four decades of long‑haul trucking expertise, sharp route‑optimization skills, and a sales‑savvy approach to mentor young drivers—especially women—while spearheading
    a community‑focused senior ride‑share service and consulting for a regional auto‑parts supplier.
  sports: Sonal Patel cheerfully roots for the Milwaukee Brewers and the local high‑school football team, participates in the senior center’s weekly walking club, and incorporates gentle yoga and light
    resistance exercises into her routine to keep her joints healthy.
  arts: Sonal Patel's evenings are often filled with A.R. Rahman's soundtracks and The Beatles' 1970s era albums, occasional viewings of classic Bollywood films like "Sholay," and reading historical fiction
    such as "The Book Thief" that fuels her love for storytelling at the senior center.
  travel: Sonal Patel enjoys road‑trip adventures that combine visits to local fairs and national parks, recalling a memorable week exploring the Grand Canyon and a family reunion in New Orleans, while
    budgeting future trips to Yellowstone and planning short weekend getaways to nearby lakefront cabins when her ride‑share schedule permits.
  culinary: Sonal Patel excels at fusing South Asian flavors with Midwestern staples, regularly preparing mushroom tikka masala with locally sourced portobello caps, corn‑infused dhansak, and herb‑laden
    tomato chutney harvested from her garden, while also experimenting with ginger‑garlic marinated pork ribs that echo both culinary traditions.
  core: Sonal Patel is a charismatic, pragmatic mentor who blends her truck‑driving wisdom, community spirit, and love for vibrant flavors into a lively, sometimes over‑committed, yet deeply caring lifestyle.
background:
  cultural: Sonal’s family originated from Gujarat, India, and she grew up balancing the vibrant customs of her South Asian heritage with the values of the American Midwest. She speaks Gujarati at home
    and celebrates Diwali, Holi, and Navratri with family gatherings, while also embracing local traditions such as county fairs and holiday parades. Her cultural upbringing emphasized respect for elders,
    community service, and the importance of hospitality, which she carries into her daily interactions in Milton. Sonal maintains close ties with the local Indian community, contributing to cultural events
    and sharing traditional recipes, yet she is equally comfortable chatting with longtime neighbors at the local diner, reflecting a blended identity that honors both her roots and her adopted hometown.
