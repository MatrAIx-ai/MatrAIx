  career_goals: Young's primary goal is to secure a tenure-track position within the next three years, focusing on establishing an interdisciplinary program that bridges Southeast Asian art with contemporary
    American visual culture. He plans to publish a monograph on the diaspora of Vietnamese visual art, obtain external research funding to support student-led exhibitions, and develop a study-abroad partnership
    with institutions in Vietnam. Ultimately, he aspires to serve as department chair, guiding curricular reform, expanding community outreach, and positioning the college as a regional hub for cross-cultural
    artistic dialogue.
