  career_goals: Sanya dreams of becoming a teacher or a veterinarian when she grows up. She loves caring for animals and enjoys explaining things to her friends, reflecting her curiosity about how things
    work and her desire to help others in a practical way. She also imagines leading a community garden where she can organize activities and share knowledge. While playful, her ambitions consistently focus
    on learning, helping, and leading.
