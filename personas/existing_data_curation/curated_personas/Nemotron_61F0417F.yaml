personas:
  professional: Sanya Quimberly, a four‑year‑old budding engineer who loves building block towers, demonstrates organized, methodical planning by sorting pieces by color before play, and channels their
    sociable, competitive spirit into friendly building contests with peers, showcasing early curiosity balanced with practical problem‑solving.
  sports: Sanya Quimberly, a four‑year‑old who thrills in the Little Llamas Soccer Club’s Tuesday practice, loves sprinting in the park, idolizes the Metro City Cubs for their energetic play, and channels
    their outgoing, competitive nature into leading a mini‑relay race with classmates during recess.
  arts: Sanja Quimberly, a four‑year‑old who paints with watercolors, models after child‑friendly artist Eric Carle, sings along to The Wiggles and Disney’s “Let It Go,” and engages their organized, critical
    eye by carefully arranging crayon backups while proudly performing for family gatherings.
  travel: Sanya Quimberly, a four‑year‑old who prefers short, snack‑filled road trips to the nearby aquarium and day trips to the county fair, delights in packing their own tiny backpack with crayons, dreams
    of visiting Disney World after hearing stories from an older cousin, and insists on sitting by the window for the best view during family drives.
  culinary: Sanya Quimberly, a four‑year‑old who adores mac and cheese with extra cheddar, builds smiley faces on rice cakes using avocado slices and strawberry jam, occasionally sneaks peas when no one
    is looking, and enjoys helping melt butter for grilled cheese under parental supervision, demonstrating both curiosity and a pragmatic taste for familiar comfort foods.
  core: Sanya Quimberly, an energetic four‑year‑old who blends fierce curiosity with methodical organization, thrives on competition, loves sharing bursts of creativity, and occasionally forgets to clean
    up their colorful toolbox of toys.
background:
  cultural: Sanya comes from an African‑American family with Nigerian roots living in Augusta, Georgia. Her parents blend Southern traditions—church attendance, gospel music, family barbecues, and Southern
    cooking—with cultural practices from her Nigerian heritage, such as celebrating Kwanzaa, listening to Afrobeat, and speaking a few Igbo phrases at home. Growing up in the vibrant, historically Black
    community of Columbia County, she participates in local community events, enjoys library story hours, and is surrounded by extended family who emphasize respect, perseverance, and communal support.
