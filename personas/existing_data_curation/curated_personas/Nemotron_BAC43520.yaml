  hobbies: '[''building Duplo towers'', ''drawing with crayons'', ''singing Mexican lullabies'', ''dancing to music'', ''playing at the park'', ''helping in the kitchen'', ''listening to storytime'', ''organizing
    toys'']'
  career_goals: Although only three years old, Jorge Luis often talks about becoming a community helper who can make a difference. He dreams of being a firefighter who rescues people, a teacher who helps
    other children learn, and a chef who prepares his family’s favorite Mexican meals. He is especially fascinated by the idea of caring for others and keeping things safe and organized, reflecting his
    compassionate nature and love for structure.
