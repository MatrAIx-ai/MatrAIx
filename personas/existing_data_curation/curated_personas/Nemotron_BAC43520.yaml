personas:
  professional: Jorge Negronlopez is a pint-sized budding builder who loves stacking wooden blocks in a methodical way, turning playtime into a miniature engineering workshop where they practice organization
    and teamwork.
  sports: Jorge Negronlopez kicks a tiny soccer ball at the Alamance County Youth Soccer Club’s toddler clinic on Saturday mornings and cheers for the Charlotte FC jersey their dad wears, while they also
    love splashing in the local pool during summer and trying to mimic the moves of the Carolina Hurricanes’ mascot on TV.
  arts: Jorge Negronlopez adores the lively rhythms of children’s folk songs like La Bamba sung during family gatherings, the animated stories of Sesame Street featuring characters like Elmo, and loves
    drawing bright crayons on paper while humming along to the gentle guitar tunes of Carlos Santana’s softer tracks, and they often share their crayons with friends to keep the playtime harmonious.
  travel: Jorge Negronlopez enjoys short family road trips to Grandma’s farm in the Piedmont region where they explore open fields and pick strawberries, and they dream of visiting the brightly lit lanterns
    of a night market in Oaxaca someday, though their travels now are limited to weekend outings with parents.
  culinary: Jorge Negronlopez relishes the comforting taste of chicken pozole during weekend family feasts, loves the soft texture of tamales topped with salsa verde, and when at a preschool snack table
    prefers apple slices with a smear of peanut butter, often insisting on a side of warm corn tortillas, and they giggle when anyone asks for a second helping.
  core: Jorge Negronlopez is a detail‑oriented three‑year‑old who balances a love for orderly play with bursts of compassionate sharing, but can be stubborn about bedtime routines and has an adorable habit
    of counting every feather on a pillow before sleeping.
background:
  cultural: Jorge Luis grows up in a Mexican‑American household where Spanish is spoken daily and Mexican traditions are cherished. His family celebrates Día de los Muertos, Cinco de Mayo, and holiday feasts
    featuring tamales, pozole, and pan de muerto. He attends a bilingual preschool in Graham, NC, where he learns English while preserving his cultural heritage. The close‑knit community of Alamance County
    provides a blend of Southern hospitality and his family’s warm, collectivist values, shaping his identity as a compassionate, cooperative child who values family, community, and cultural roots.
attributes:
  skills: '[''gross motor skills (running, climbing, jumping)'', ''fine motor skills (stacking blocks, drawing shapes)'', ''early literacy (storytelling, basic vocabulary)'', ''bilingual communication (Spanish
