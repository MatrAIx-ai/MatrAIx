  hobbies: '[''vegetable gardening'', ''Filipino cooking'', ''mahjong'', ''card games'', ''walking in parks'', ''church choir'', ''watching baseball'', ''senior bingo'', ''neighborhood clean-up'']'
  career_goals: Although retired, Liem aims to stay actively engaged in his community. He plans to volunteer regularly at the Dorchester senior center, mentoring younger seniors in practical life skills
    and cultural traditions. He aspires to document and pass down family recipes by publishing a small community cookbook and to organize an annual neighborhood cultural fair that celebrates Southeast Asian
    heritage. Maintaining his health through daily walks and gardening, he also wishes to remain a reliable support for his grandchildren, teaching them cooking, basic home repair, and financial responsibility.
