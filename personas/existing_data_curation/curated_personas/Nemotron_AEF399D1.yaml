    wildlife documentaries'', ''Community dance nights'']'
  career_goals: Although retired, Julie aims to stay socially engaged and deepen her impact in the Wasilla community. She hopes to lead a new community garden initiative that provides fresh produce for
    seniors and low‑income families, mentor younger volunteers at the senior center, and develop a series of oral‑history workshops that preserve local stories. She also plans to complete an online certification
    in senior health support to better assist her peers, and to learn basic digital tools to stay connected with distant relatives while reducing her worry about isolation. Her overarching ambition is to
    maintain independence, health, and a sense of purpose through service.
