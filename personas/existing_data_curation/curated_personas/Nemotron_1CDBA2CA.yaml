  career_goals: Although only a year old, Gervacio’s caregivers see his strong curiosity and love of novelty as early signs of future aspirations. They nurture a vision that he may one day become an artist,
    musician, or scientist who explores new ideas and abstracts. His sociable nature points toward roles that involve collaboration and community, such as a teacher or community organizer. In the present,
    his 'goals' revolve around discovering new objects, learning new words, and sharing his excitement with family and peers.
