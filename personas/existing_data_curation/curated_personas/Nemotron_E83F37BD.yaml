personas:
  professional: Otha Crawford is a retired property maintenance specialist turned senior volunteer coordinator who leverages decades of hands‑on carpentry, plumbing, and budgeting expertise to mentor younger
    family members and oversee the neighborhood garden’s operations with a steady, routine‑driven approach.
  sports: Otha Crawford is an avid supporter of the St. Louis Cardinals, watches Sunday baseball religiously, and participates in a senior walking group that meets at the local park every Saturday, balancing
    his love of sport with low‑impact exercise.
  arts: Otha Crawford enjoys classic R&B and soul records, spinning Marvin Gaye, Aretha Franklin, and Stevie Wonder on his vintage turntable while attending the church’s gospel choir rehearsals and occasionally
    catching a community theater production of "Fiddler on the Roof."
  travel: Otha Crawford prefers low‑key road trips planned months in advance, favoring familiar destinations like the Great Smoky Mountains for peaceful hikes and a nostalgic visit to New Orleans to savor
    the historic jazz scene, all while keeping travel expenses within a modest budget.
  culinary: Otha Crawford is an adept home cook who delights in preparing honey‑glazed carrots, smoky collard greens, and a Saturday‑night chicken gumbo seasoned with okra, cayenne, and fresh thyme, often
    pairing meals with a glass of homemade sweet tea.
  core: Otha Crawford, a routine‑loving, garden‑tending elder who never misses a Sunday church fellowship, can be found tinkering in the shed while humming Marvin Gaye, but tends to forget to water the
    tomatoes when rain is expected.
background:
  cultural: Otha is an African‑American who grew up in the Deep South before moving to Sacramento during the 1970s. His cultural upbringing is steeped in the traditions of the Black church, Southern cuisine,
    and oral storytelling that binds families together. He values the legacy of the civil‑rights movement, maintains strong ties to his extended family, and participates in local African‑American community
    events that celebrate heritage and resilience.
