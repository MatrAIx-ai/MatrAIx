persona_description: A researcher interested in the study of ant behavior and social organization, particularly in the size and size variation of queen ants of the ponerine ant Ponera coarctata. The researcher
  is likely to be interested in the detailed measurements and observations made on the size and size variation of queens of Ponera coarctata, as well as the correlations between size and other characteristics
  of the ants. The researcher is also likely to be interested in the statistical significance of the differences in queen sizes between colonies and the intracolonial variation of queen sizes within each
  colony.
