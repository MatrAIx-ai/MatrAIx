    ''Creative problem solving in emergencies'']'
  hobbies: '[''Landscape painting'', ''Photography'', ''Acoustic guitar'', ''Speculative fiction reading'', ''Hiking'', ''Kayaking'', ''Community theater'', ''Volunteer fire‑safety demonstrations'', ''Puzzle
    solving and escape rooms'', ''Model rocket building'', ''Attending music festivals'', ''Barbecue cooking'']'
  career_goals: Jeffrey aspires to advance to the role of fire chief within the next five years, where he can shape department policy, champion the integration of emerging technologies such as drones and
    predictive fire‑modeling software, and expand community‑outreach programs. He plans to earn a bachelor's degree in fire science or emergency management to complement his hands‑on experience, and to
    obtain certifications in incident command and hazardous‑materials coordination. Long‑term, he hopes to establish a nonprofit that provides fire‑prevention education and mental‑health support for first‑responders,
    while mentoring the next generation of firefighters and advocating for safer, more resilient communities.
