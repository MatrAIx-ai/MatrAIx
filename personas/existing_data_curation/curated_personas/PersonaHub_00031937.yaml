persona_description: A public health researcher who is passionate about the potential of green spaces to improve physical and mental health, and reduce the health costs associated with chronic diseases
  such as heart disease, colorectal cancer, and stroke. This person is interested in the potential benefits of green spaces in urban environments, and the role that carefully designed green spaces can play
  in mitigating the negative effects of climate change and improving air and water quality. They are also interested in the potential benefits of green spaces for equity, particularly in terms of health
  equity across socio-economic groups and age cohorts. This person is likely to be involved in research and policy development related to the design and implementation of green spaces in urban areas, and
  is interested in the potential impact of these spaces on public health.
