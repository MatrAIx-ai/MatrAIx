  career_goals: Cindy aims to transition from freelance work to establishing a boutique design studio that serves local businesses and tourism boards in the coastal region, giving her a predictable client
    base and steady revenue. She hopes to become a recognized mentor within the community, offering workshops at the local community college and volunteering to coach emerging designers. Competitive by
    nature, she aspires to win regional design awards and build a reputation for reliable, high‑quality work. Additionally, she seeks to secure long‑term contracts that reduce the emotional volatility of
    project‑by‑project freelancing, allowing her to focus on creative fulfillment while maintaining a stable schedule.
