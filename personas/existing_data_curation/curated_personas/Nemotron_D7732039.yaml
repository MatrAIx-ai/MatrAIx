personas:
  professional: Cindy Treiber, a seasoned graphic designer with advanced Adobe Photoshop, Illustrator, and InDesign skills, blends meticulous brand identity creation with a methodical freelance workflow,
    mentors younger designers through structured workshops, and channels a competitive drive into winning regional design awards while building a boutique studio for coastal businesses.
  sports: Cindy Treiber, an enthusiastic supporter of the Charleston Battery soccer team and a regular participant in the Charleston Senior Pickleball Club, complements her daily beach walks and community
    garden labor with seasonal volleyball matches at the community center, reflecting both her competitive nature and desire to stay fit.
  arts: Cindy Treiber, who volunteers as an art instructor for seniors and acts in a community theater troupe, finds inspiration in the paintings of Mary Cassatt, the choreography of Alvin Ailey, and the
    music of Nina Simone, and frequently attends local gallery openings featuring emerging coastal artists.
  travel: Cindy Treiber, a meticulous planner who favors balanced itineraries of cultural immersion and relaxation, has explored Savannah's historic squares, savored the music scene in New Orleans, and
    dreams of driving the scenic Pacific Coast Highway while also revisiting the tranquil beaches of the Outer Banks each summer.
  culinary: Cindy Treiber, an accomplished home cook who delights in Southern seafood, often prepares shrimp-and-grits with fresh Gulf shrimp, crab cakes seasoned with Old Bay, and gumbo brimming with okra
    and smoked sausage, using locally sourced herbs and lemon zest to elevate family gatherings.
  core: Cindy Treiber blends a structured, competitive mindset with a love for community-centric arts and a persistent undercurrent of anxiety, leading them to meticulously plan every project, social event,
    and meal while occasionally overcommitting and needing moments of quiet to regroup.
background:
  cultural: Cindy was raised in a close‑knit Southern coastal community in North Carolina, where family ties, church involvement, and hospitality are central values. Growing up near the Atlantic shoreline,
    she developed a deep appreciation for the sea, local maritime traditions, and the slower pace of small‑town life. Her upbringing in a working‑class family emphasized practicality, self‑reliance, and
    community service, which shaped her reliable and organized approach to work. She attended a community college where she earned an associate's degree in graphic design, reinforcing her practical skill
    set. Throughout her life, she has celebrated regional festivals such as the Carolina Sea Turtle Festival and participated in church potlucks, reflecting her strong connection to Southern cultural heritage.
