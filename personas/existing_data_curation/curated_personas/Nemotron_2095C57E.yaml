  career_goals: Though retired, John aims to stay active and independent by offering occasional handyman services to his community, which allows him to keep his skills sharp and earn a modest supplemental
    income. He plans to complete a personal renovation of his workshop, including installing custom shelving and a tool‑organizing system. John also wants to mentor younger neighbors in practical home‑maintenance
    techniques, helping them develop the same methodical mindset he values. Learning to use a tablet for video calls and online banking is a short‑term goal to maintain connections with family. Ultimately,
    his ambition is to preserve his health, financial security, and sense of purpose well into his later years.
