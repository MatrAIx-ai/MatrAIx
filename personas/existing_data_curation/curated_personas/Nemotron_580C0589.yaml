  career_goals: Although retired, Jean aims to stay active in her community by expanding her leadership role at the senior center, completing a basic computer literacy workshop, and mentoring younger volunteers.
    She hopes to document her family’s oral histories for a local historical archive, maintain her health through regular walking and low‑impact exercise, and eventually travel to historic sites across
    Georgia with her spouse. Her long‑term ambition is to ensure that seniors in her neighborhood feel supported and heard.
