  hobbies: '["Herb gardening", "Walking and birdwatching on local trails", "Historical fiction reading", "Quilting and knitting", "Volunteering at church food pantry", "Farmers market visits", "Participating
    in wine‑tasting groups", "Cooking family recipes", "Playing piano at community events", "Baking workshops for friends"]'
  career_goals: Her long‑term ambition is to transform her local bakery into a boutique destination that serves as both a retail space and a community learning hub. Over the next five years she plans to
    launch a line of ready‑to‑bake mixes featuring locally sourced ingredients, publish a cookbook that melds Midwestern heritage recipes with modern techniques, and host regular baking classes for adults
    and teens. While she is eager to expand her brand, Amy remains committed to maintaining a manageable schedule that preserves her calm, resilient lifestyle and the close‑knit family time she values.
