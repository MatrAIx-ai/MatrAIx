personas:
  professional: Amy Mikes, a seasoned Midwestern baker renowned for their precise sourdough fermentation and inventive whole‑grain pastries, blends their love of structured processes with a pragmatic flexibility
    that keeps the bakery running smoothly while empowering staff to experiment within clear guidelines.
  sports: Amy Mikes enjoys low‑impact fitness, regularly walking the White River trail and joining the local River Runners walking club, while cheering on the Chicago Cubs during baseball season and the
    Milwaukee Bucks in basketball, preferring gentle activity over competitive sports.
  arts: Amy Mikes finds creative solace in quilting and knitting while listening to the folk sounds of Gillian Welch and the piano works of Ludovico Einaudi, often attending local performances by the Midwestern
    Symphony Orchestra and community theatre productions of classic dramas.
  travel: Amy Mikes prefers leisurely, well‑planned trips that blend relaxation with culinary discovery, such as weekend getaways to Napa Valley’s wine country, a month‑long immersion in Provence’s herb
    markets, and day trips to the nearby Lake Superior shoreline, always ensuring travel fits within the bakery’s seasonal schedule.
  culinary: Amy Mikes, a master baker, delights in incorporating homegrown rosemary, thyme, and lavender into signature sourdough loaves, rustic apple‑crumble tarts, and savory rosemary‑infused focaccia,
    while they relish tasting seasonal farm‑to‑table dishes like roasted beet salad with goat cheese and honey.
  core: Amy Mikes blends meticulous bakery precision with a relaxed, garden‑inspired spontaneity, habitually humming folk tunes while kneading dough and occasionally forgetting to update the inventory spreadsheet
    until the end of the day.
background:
  cultural: Amy’s cultural background is rooted in the white, Midwestern tradition of Indiana. Her family traces its ancestry to German and Irish immigrants who settled in Hendricks County in the late 1800s.
    Raised in a small‑town environment, she internalized values of self‑reliance, modesty, and community service. The regional emphasis on home‑cooked, hearty food and seasonal farming influences her baking
    style and love for locally sourced ingredients. Her Protestant church involvement, family‑centered lifestyle, and attendance at community gatherings reflect the social fabric of the area, while her
    practical, calm demeanor embodies the Midwestern work ethic.
attributes:
  skills: '["Artisan bread baking (sourdough, rye, whole‑grain)", "Cake and pastry design", "Recipe development and cost optimization", "Food safety and sanitation compliance (ServSafe certified)", "Inventory
