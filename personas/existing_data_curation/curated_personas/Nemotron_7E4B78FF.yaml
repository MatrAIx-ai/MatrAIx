  career_goals: Carmen aims to advance to a supervisory role, such as shift lead or plant manager, where she can combine her technical expertise with her passion for mentoring younger workers. She plans
    to obtain advanced certifications in industrial safety and process engineering. Over the next few years, she hopes to transition part of her career toward a hybrid role that integrates her kiln operation
    skills with artistic production, potentially opening a small studio for handcrafted ceramics. Long‑term, she envisions retiring from full‑time factory work and dedicating more time to community art
    projects, teaching pottery workshops, and curating local exhibitions that celebrate the intersection of industry and creativity.
