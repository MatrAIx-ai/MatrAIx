  career_goals: Joshua aims to become a senior partner at his firm and to eventually launch his own boutique advisory practice that specializes in sustainable investing for families and small businesses
    in the Pacific Northwest. He plans to earn the Certified Financial Planner (CFP) designation within the next two years and to develop a signature financial‑literacy program for local schools and community
    centers. Over the next five years, he wants to expand his client portfolio to include at least 100 high‑net‑worth families, mentor junior advisors, and write a quarterly column on financial well‑being
    for a regional newspaper. He also hopes to be recognized as a thought leader on integrating environmental, social, and governance (ESG) criteria into everyday financial decisions.
