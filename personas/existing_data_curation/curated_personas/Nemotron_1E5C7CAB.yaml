personas:
  professional: Joshua Leyva, a licensed personal financial advisor in Portland, merges his analytical rigor with a community-focused, sustainable-investing mindset, leveraging MoneyGuidePro, eMoney Advisor,
    and QuickBooks to craft personalized plans that balance clients' long-term wealth goals with environmental stewardship.
  sports: Joshua Leyva, a devoted Portlander, spends Saturday mornings in a co-ed soccer league with the Cascadia United squad, cycles the city's bike-friendly streets to the Portland Timbers stadium, hikes
    the Columbia River Gorge's Angel's Rest trail, and paddles the Willamette River on weekends, while cheering on the Trail Blazers and Timbers as his favorite professional teams.
  arts: Joshua Leyva, an avid nature photographer, draws creative inspiration from Ansel Adams' black-and-white landscapes, enjoys live shows by Portland-based band Portugal. The Man and indie folk artist
    Sufjan Stevens, and attends performances at Portland Center Stage, which together shape his evenings after work.
  travel: Joshua Leyva's travel itinerary blends family-friendly cultural immersion like exploring Kyoto's temples and sampling Osaka street food with outdoor adventures such as kayaking the fjords of Norway,
    and they favor meticulously planned trips that balance school schedules, budget constraints, and a yearning for new culinary experiences, having already visited Vancouver, Costa Rica, and New Zealand's
    South Island.
  culinary: Joshua Leyva, a home-cooking enthusiast, pairs his love of craft beer with dishes like cedar-plank salmon glazed with honey-marjoram, sourdough pizza topped with locally sourced mushrooms and
    smoked mozzarella, and a hearty lentil stew seasoned with rosemary and smoked paprika, and they frequently experiment with seasonal produce from the Portland farmers' market.
  core: Joshua Leyva, a 40-year-old financial advisor who fuses sustainable investing with a love of the Pacific Northwest outdoors, balances meticulous planning with spontaneous craft-beer outings, and
    habitually checks his Fitbit during soccer matches.
background:
  cultural: Joshua comes from an Anglo‑American background, raised in a suburban community in the Pacific Northwest. His family observed traditional holidays such as Thanksgiving and Christmas, with a blend
    of Protestant values and an emphasis on community service. Growing up near Portland, he absorbed the region’s progressive outlook, love for the outdoors, and commitment to sustainability, which now
    shape both his personal life and professional philosophy. He values local culture, supports farm‑to‑table initiatives, and integrates the region’s environmental consciousness into his financial advice
    by encouraging clients to consider ESG investments. His multicultural exposure through a diverse client base further enriches his worldview, fostering an inclusive approach to both his personal and
    professional relationships.
