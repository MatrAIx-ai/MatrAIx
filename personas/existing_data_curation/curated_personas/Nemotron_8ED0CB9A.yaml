personas:
  professional: An aspiring young game developer, Wanda Wilson channels her love of structured storytelling into Scratch projects, using their practical mindset and reliable schedule to produce clear, step‑by‑step
    game loops.
  sports: An enthusiastic midfielder for the Midtown Kids Soccer Club, Wanda Wilson follows a strict practice routine, cheers for Manchester United, and balances teamwork with the predictable rhythm of
    weekly games.
  arts: An avid piano enthusiast, Wanda Wilson practices Beethoven’s “Für Elise” and Disney soundtracks three times a week, while also collecting Harry Potter‑themed stickers, illustrating their organized
    creative routine.
  travel: Wanda Wilson enjoys family trips that blend adventure and structure, having explored Yellowstone National Park and the Harry Potter Studio Tour in London, and dreaming of a future visit to Paris
    to see the Musée d’Orsay.
  culinary: In the kitchen, Wanda Wilson follows step‑by‑step recipes to bake chocolate chip cookies and snickerdoodles, mastering precise measurements and savoring the comforting aroma of cinnamon and
    vanilla.
  core: Wanda Wilson’s world is a blend of disciplined routines—from meticulously arranged sticker albums to structured Scratch projects—punctuated by occasional extra‑sugar cookie cravings that keep them
    delightfully human.
background:
  cultural: Wanda is part of a middle‑class white American family living in Lambertville, New Jersey, a historic small town along the Delaware River. Her household observes traditional American holidays
    such as Thanksgiving, Christmas, and the Fourth of July, often participating in community events like the Lambertville Street Fair and local library story times. The town’s blend of historic charm and
    proximity to larger academic hubs like Princeton provides her with exposure to both small‑town customs and broader cultural activities. Her family places a high value on education, community involvement,
    and maintaining an organized, predictable home environment.
