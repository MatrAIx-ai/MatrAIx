  career_goals: Bobby aims to achieve tenure and subsequently attain a full professorship within the next five years, using his structured approach to build a robust portfolio of peer‑reviewed publications,
    including a monograph on contemporary cultural criticism. He plans to secure a major research grant to develop a cross‑departmental digital humanities initiative that integrates technology with traditional
    humanities pedagogy. Additionally, he aspires to take on a leadership role such as department chair or associate dean, where he can champion inclusive curricula, strengthen community outreach programs,
    and mentor junior faculty through formalized professional development workshops.
