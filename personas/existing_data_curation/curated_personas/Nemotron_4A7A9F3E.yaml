  hobbies: '[''Gardening'', ''Sailing'', ''Harbor fishing'', ''Walking the Cliff Walk'', ''Historical site tours'', ''Reading maritime history'', ''Bridge'', ''Church choir participation'', ''Cooking New
    England seafood dishes'']'
  career_goals: Logan aims to remain an active and valued member of his community, focusing on mentoring younger volunteers, preserving Newport's maritime heritage, and expanding the reach of the local
    historical society through oral-history projects. He hopes to compile his own memoirs and family stories, creating a small printed collection for his grandchildren. Maintaining his health and mobility
    so he can continue sailing and participating in group activities is a personal priority. He also aspires to organize a yearly Heritage Day event that combines boat tours, historical talks, and community
    meals, fostering intergenerational connections. Finally, he wishes to deepen his technical comfort by learning more about digital photography and social-media storytelling to share Newport's stories
    online.
