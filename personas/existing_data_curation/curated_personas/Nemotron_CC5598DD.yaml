personas:
  professional: Evan Tanner is a budding freelance illustrator and digital storyteller who leverages a toolbox of Adobe and open‑source software to create surreal visuals for local nonprofits while channeling
    the collaborative, community‑first ethos of their Fargo upbringing into every client brief.
  sports: Evan Tanner enjoys seasonal recreation such as cross‑country skiing and hiking the Red River Valley trails, plays intramural basketball with the Fargo Runners club, and avidly follows the North
    Dakota State Bison football team, preferring low‑key community fitness over competitive leagues.
  arts: Evan Tanner is a versatile creative who spends evenings painting abstract acrylics, collaborating with the local improv troupe Fracture Comedy, curating playlists that range from Radiohead to the
    ambient installations of James Turrell, and drawing inspiration from speculative stories by Ted Chiang for their visual narratives.
  travel: Evan Tanner favors spontaneous, budget‑friendly road trips that blend art‑centric stops—like the Minneapolis Institute of Art and Portland’s independent galleries—with nature hikes in the Upper
    Peninsula, while dreaming of a future immersion in Reykjavik’s design scene to broaden their creative horizons.
  culinary: Evan Tanner delights in experimental cooking, often whipping up a mushroom risotto infused with smoked paprika or a homemade sourdough starter for rustic bread, while frequenting Fargo’s eclectic
    coffee houses for single‑origin beans and indulging in occasional bison burger nights with friends.
  core: Evan Tanner is a curiosity‑driven dreamer who blends artistic chaos with community spirit, worries about deadlines, forgets appointments, but always finds solace in a fresh canvas or a jam session.
background:
  cultural: Evan grew up in Fargo, North Dakota, in a middle‑class White family with German‑Scandinavian roots common to the Upper Midwest. The region’s harsh winters, agricultural surroundings, and tight‑knit
    community ethos fostered values of resilience, modesty, and cooperation. Fargo’s burgeoning arts scene—annual festivals, local galleries, and a supportive network of independent creators—provided him
    with early exposure to visual and performing arts. He participated in high‑school art classes, community theatre, and local sports, developing a Midwestern sensibility that blends friendliness, practicality,
    and an appreciation for both tradition and novelty. This cultural backdrop informs his collaborative spirit, his love for community‑focused projects, and his drive to blend pragmatic work habits with
    imaginative expression.
