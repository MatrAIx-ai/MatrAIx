  career_goals: Evan aims to transition from an informal lifestyle to a sustainable freelance creative career that blends visual art, storytelling, and community engagement. He plans to build a professional
    portfolio of illustration and digital media work, launch an online presence (YouTube channel and Instagram showcase), and take online courses in graphic design to deepen his technical skills. In the
    medium term, he hopes to secure a junior designer or creative coordinator role with a local nonprofit, startup, or co‑working space that values flexibility and collaborative culture. Ultimately, he
    envisions establishing a community art hub in Fargo where he can lead workshops that combine visual art, improv, and storytelling, while also pursuing independent commissions and occasional gallery
    showings.
