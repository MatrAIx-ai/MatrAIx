personas:
  professional: Alcides Cuesta, a budding LEGO architect and novice Scratch game developer, channels a methodical mindset into building intricate brick constructions and designing simple yet strategic games,
    and they let their competitive edge drive them to master chess tactics and share step‑by‑step tutorials with peers.
  sports: Alcides Cuesta, a forward on a neighborhood soccer team that practices after school, idolizes the playing style of Lionel Messi, follows the local professional club LA Galaxy, and they maintain
    fitness by combining daily drills with strategic chess‑like positioning drills on the field.
  arts: Alcides Cuesta, an avid sci‑fi novel collector who reveres authors like Isaac Asimov, enjoys LEGO‑inspired stop‑motion videos, also draws inspiration from the cinematic worlds of Hayao Miyazaki
    and the music of Imagine Dragons, and they channel this creative fuel into crafting Scratch games.
  travel: Alcides Cuesta, who prefers structured road trips with detailed itineraries, has explored the historic ruins of Teotihuacan, and they dream of visiting the Space Center in Houston, balancing family
    budget constraints with a curiosity for space exploration museums.
  culinary: Alcides Cuesta, who helps prepare family meals such as tacos al pastor, mole, and homemade guacamole, showcases a budding culinary skill by meticulously measuring spices like cumin and chipotle,
    and they often forget to wash their hands before cooking due to excitement.
  core: Alcides Cuesta combines a competitive love for LEGO building and chess with a disciplined allowance‑saving habit, meticulous health tracking for allergies, and they maintain a quiet, methodical
    drive that fuels both their soccer drills and Scratch coding sessions.
background:
  cultural: Alcides comes from a Mexican‑American family that maintains strong ties to its cultural roots. He grew up speaking Spanish at home and English at school, celebrating holidays such as Día de
