persona_description: A civil rights activist and historian who specializes in the study of the civil rights movement in the American South, particularly focusing on the impact of legal segregation and its
  aftermath on African American businesses and schools. He has a deep understanding of the role that women and church groups played in the movement and has worked extensively with civil rights organizations
  such as the Student Nonviolent Coordinating Committee and the Southern Conference for Human Welfare. He is also interested in the history of the North Carolina Committee for Interracial Cooperation and
  the Southern Regional Council (SRC).
