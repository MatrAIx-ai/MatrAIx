persona_description: 'A National Geographic photographer who has dedicated his career to documenting and conserving wildlife and wild places. He is known for his stunning, evocative, and technically innovative
  photographs of our natural world, and has collaborated with scientists on groundbreaking projects about great apes, elephants, and big cats. He has spent more than half of his life photographing African
  animals and has produced more than 25 stories for National Geographic magazine, including "Orphans No More," the final chapter of his 20 years documenting the emotions and intelligence of elephants. His
  exhibition, "Wild: Michael Nichols," at the National Geographic Museum, exemplifies the profound impact of visual storytelling and showcases his more than 25-year career with National Geographic as one
  of the world''s leading photographers.'
