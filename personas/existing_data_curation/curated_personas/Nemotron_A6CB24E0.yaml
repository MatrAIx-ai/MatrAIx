personas:
  professional: Roberto Urioste, an aspiring junior game designer, blends a natural curiosity for digital storytelling with a practical, hands‑on tinkering style, building Scratch animations on the fly
    while often letting flexible playtime override strict project deadlines.
  sports: Roberto Urioste, a spirited forward on the neighborhood U‑10 soccer team, thrives on group drills at the local park, idolizes the playing style of Lionel Messi, regularly cheers for the LA Galaxy,
    and balances cooperative passing with occasional assertive attempts to lead the attack, though they occasionally forget to tie their cleats properly.
  arts: Roberto Urioste, an enthusiastic LEGO builder and cartoon sketcher, draws inspiration from Bill Watterson's Calvin and Hobbes and the rhythmic beats of folk tunes, constructs elaborate themed LEGO
    sets like the LEGO Ideas 'Pet Shop' with meticulous detail, creates simple Scratch games featuring quirky characters, and spends after‑school hours listening to musician Carlos Mejía Godoy while doodling
    vibrant panels, occasionally sacrificing homework for artistic projects.
  travel: Roberto Urioste loves weekend family road trips to the seaside town of La Libertad, enjoys exploring interactive museum exhibits in the city’s science center, dreams of visiting the ancient ruins
    of Tikal and the historic streets of Antigua, and prefers spontaneous day‑out adventures over meticulously planned vacations, though parental scheduling often keeps their itinerary flexible.
  culinary: Roberto Urioste delights in the savory taste of cheese and refried bean pupusas shared at block parties, eagerly helps knead dough for homemade pizza, prefers the bright flavor of mango slices,
    can modestly scramble an egg for breakfast, but often forgets to clean up the kitchen after cooking, leaving a trail of crumbs.
  core: Roberto Urioste is a curious, sociable nine‑year‑old who rockets between LEGO builds, soccer games, and animated sketches, yet battles waves of anxiety that sometimes derail their creative momentum.
background:
  cultural: Roberto is a second‑generation Salvadoran‑American living in Washington, D.C. He grew up in a bilingual household where Spanish is spoken daily, and his parents preserve Salvadoran traditions
    such as cooking pupusas, celebrating Las Posadas, and listening to cumbia and marimba music. He participates in community events at the Salvadoran Consulate, attends local cultural festivals, and blends
    his Central American heritage with the diverse, multicultural environment of the nation’s capital.
attributes:
