  hobbies: '[''Soccer'', ''LEGO building'', ''Museum visits'', ''Scratch game creation'', ''Cartoon drawing'', ''Listening to Salvadoran music'', ''Block parties and cultural festivals'']'
  career_goals: Roberto dreams of becoming someone who can explore new ideas and turn them into practical solutions, such as a youth environmental scientist, a community park ranger, or a soccer coach who
    mentors friends. He also imagines helping his family and community by sharing knowledge, reflecting his compassionate yet self‑assertive nature, while hoping to overcome occasional anxiety when facing
    new challenges.
