personas:
  professional: An aspiring health‑sciences student, Brittney Marzan leverages their methodical organization skills with Google Workspace and elementary coding to excel as a peer tutor and youth program
    coordinator, blending compassionate empathy with assertive conflict‑resolution to lay the groundwork for a future nursing career.
  sports: Brittney Marzan channels their love for hip‑hop dance into weekly sessions with the Freeport Hip‑Hop Crew, jogs along the Long Island Sound in spring, and roots for the New York Knicks and New
    York Mets while occasionally volunteering as a scorekeeper for the Freeport Youth Soccer Club.
  arts: Brittney Marzan blends their passion for hip‑hop with digital illustration, creating TikTok clips set to Kendrick Lamar and Missy Elliott while drawing fan art of Studio Ghibli characters using
    Procreate, and they spend free evenings watching performances by the Alvin Ailey American Dance Theater.
  travel: Brittney Marzan prefers carefully planned weekend getaways, having explored the vibrant streets of New York City and the historic monuments of Washington, D.C., while dreaming of a study‑abroad
    stint in Kyoto to experience Japanese tea ceremonies and cherry blossom festivals.
  culinary: Brittney Marzan enjoys experimenting with quick, nutritious meals, often whipping up avocado toast with poached eggs, quinoa salads with roasted chickpeas, and sushi rolls featuring cucumber
    and spicy tuna, yet admits to overindulging in bubble tea during study breaks.
  core: Brittney Marzan is a meticulously organized 17‑year‑old who balances a relentless curiosity about health with a practical drive toward nursing, while juggling anxiety‑induced over‑thinking and a
    penchant for late‑night TikTok editing.
background:
  cultural: Brittney is a Black teenager raised in Freeport, NY, within a close‑knit African‑American family that values resilience, community, and faith. Her upbringing includes regular church involvement
    and family gatherings that celebrate Black heritage, such as soul food cooking and listening to R&B and hip‑hop. The multicultural environment of Nassau County has exposed her to a variety of cultures,
    fostering an appreciation for diversity while grounding her in the traditions and supportive networks of her own community.
attributes:
  skills: '["Organizational planning", "Time management", "Basic computer literacy", "Google Workspace", "Microsoft Office", "Elementary coding (Scratch)", "Peer tutoring (Math, English)", "Event coordination
    for community clubs", "Effective communication", "Empathy and conflict resolution"]'
  hobbies: '["Reading science fiction and non-fiction", "Journaling and creative writing", "Hip‑hop dance", "Volunteering at local community center", "Digital illustration", "Creating short videos on mental
    wellness", "Basic coding projects", "Participating in school debate club"]'
  career_goals: Brittney aims to complete her GED within the next year and enroll in a community college health‑sciences program, with the long‑term goal of becoming a registered nurse. She balances her
    curiosity about human biology with a practical desire for a stable, rewarding career. Alongside her nursing ambitions, she hopes to develop a mentorship program for younger students in Freeport, using
    her organizational strengths to create a supportive network that promotes academic success and mental‑wellness awareness.
