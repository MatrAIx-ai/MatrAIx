personas:
  professional: Suzanne Bolden, a 62‑year‑old veteran credit analyst at a regional bank, blends three decades of data‑driven risk modeling with a warm, collaborative coaching style, turning complex credit
    reports into clear narratives for senior leaders while they mentor junior analysts through hands‑on workshops.
  sports: Suzanne Bolden enjoys early morning beach walks, plays competitive doubles tennis at the Ponte Vedra Beach Country Club, and they cheer for the Jacksonville Jaguars and the Florida State Seminoles,
    while joining a seasonal pickleball league in the cooler months.
  arts: Suzanne Bolden volunteers as a docent at the Cummer Museum, paints watercolors inspired by Monet and local Floridian landscapes, regularly attends productions by the Jacksonville Theatre Company
    featuring actors like Kathleen Renna, and they delight in jazz evenings headlined by the local group The Blue Note Collective.
  travel: Suzanne Bolden plans leisurely trips that blend cultural immersion and coastal relaxation, favoring senior‑discount cruises to the Greek islands, weekend getaways to Savannah’s historic squares,
    and annual visits to the Florida Keys, and they always craft detailed itineraries months in advance.
  culinary: Suzanne Bolden’s kitchen showcases Mediterranean flair, mastering dishes like grilled branzino with lemon‑olive oil, a velvety roasted red‑pepper hummus, and a fragrant chicken souvlaki served
    with tzatziki, while they proudly grow basil and oregano in their native‑plant garden.
  core: Suzanne Bolden, a methodical yet sociable retiree, channels their curiosity into art and finance, balances disciplined investing with spontaneous beach strolls, and occasionally forgets to water
    their garden while humming spreadsheet formulas.
background:
  cultural: Suzanne grew up in a middle‑class white family in the Midwest, where she internalized values of hard work, community involvement, and self‑reliance. After moving to Florida in her early thirties,
    she embraced the coastal lifestyle and Southern hospitality of St. Johns County, blending her Midwestern roots with the relaxed, outdoor‑oriented culture of Ponte Vedra Beach. Her cultural identity
    is shaped by a mix of traditional American customs, an appreciation for the diverse artistic scene of the Jacksonville area, and a strong commitment to volunteerism and civic engagement. This blend
    informs her worldview, fostering an inclusive attitude toward people from varied backgrounds while maintaining a respect for the region’s heritage and natural environment.
attributes:
  skills: '[''Credit risk assessment'', ''Financial statement analysis'', ''Risk modeling and scoring'', ''Regulatory compliance (FDIC, CFPB)'', ''Advanced Excel and PowerPivot'', ''Data visualization (PowerBI,
