    relationship management'', ''Project management'']'
  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting'', ''Volunteer docent at museum'', ''Beachcombing'', ''Gardening (native Florida plants)'', ''Tennis'', ''Book club (historical
    biographies)'', ''Cooking Mediterranean cuisine'', ''Attending theater and live music events'', ''Volunteering for community arts council'']'
  career_goals: Approaching retirement, Suzanne aims to leverage her extensive industry knowledge by transitioning into a mentorship and consulting role. She plans to formalize a mentorship program for
    early‑career analysts within her organization, champion the adoption of emerging analytics technologies such as machine learning for credit scoring, and contribute to community financial‑literacy workshops
    at the local senior center. Additionally, she hopes to author a practical guide on credit risk assessment for small‑business owners and to remain active in the profession through part‑time advisory
    work, ensuring her experience continues to benefit both her colleagues and the broader community.
