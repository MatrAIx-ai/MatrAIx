  hobbies: '[''fishing'', ''hunting'', ''DIY woodworking'', ''reading non-fiction'', ''strategy video games'', ''weight training'', ''jogging'', ''journaling'', ''birdwatching'']'
  career_goals: Kenny aims to move into a supervisory role within the next three years, targeting a shift‑lead or warehouse manager position where he can apply his penchant for structure and predictable
    processes. He plans to obtain a 30‑hour OSHA certification, a certified forklift trainer credential, and enroll in a community‑college logistics program to expand his knowledge of supply‑chain analytics.
    Ultimately, he hopes to secure a stable income that will allow him to purchase a home in Jefferson and maybe start a small, family‑run moving service that emphasizes safety and reliability.
