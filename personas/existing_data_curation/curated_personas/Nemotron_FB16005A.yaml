personas:
  professional: Nesar Chauhan, a 33‑year‑old mason with a knack for reading blueprints and mastering precise mortar mixes, combines the discipline of a traditionally male‑dominated trade with a methodical,
    curiosity‑driven approach that turns every historic restoration project into a meticulous puzzle she enjoys solving.
  sports: Nesar Chauhan enjoys weekend hikes with the Louisville Trailblazers Club, follows the Kentucky Wildcats men's basketball team and the Louisville City FC for local soccer excitement, and participates
    in a community yoga class to stretch and strengthen her core for masonry work.
  arts: Nesar Chauhan expresses creativity through photographing historic brick facades—often citing Ansel Adams’ tonal mastery—and crocheting vibrant tea‑cosy accessories inspired by traditional patterns,
    while indulging in the soulful vocals of Lata Mangeshkar and the storytelling of Bollywood classics.
  travel: Nesar Chauhan plans trips with the same precision she uses for project estimates, favoring short, well‑researched road trips to historic towns like Williamsburg, Virginia, and dreaming of a pilgrimage
    to the marble temples of Jaipur to study ancient stonecraft, yet she balances these ambitions with her responsibilities at home and work.
  culinary: Nesar Chauhan loves cooking hearty dishes such as vegetable biryani, chana masala, and homemade paneer, often harvesting fresh carrots and kale from her garden to add to a sizzling tandoori‑style
    stir‑fry, and she never misses a chance to pair her meals with a side of buttery cornbread, a nod to her Midwestern roots.
  core: Nesar Chauhan blends a mason’s precision with a gardener’s patience, a photographer’s eye, and a crochet‑lover’s flair, navigating life with methodical planning, quiet determination, and a love
    for both historic stone and aromatic spices.
background:
  cultural: Nesar was raised in a close‑knit Indian‑American family in the Louisville area. Her parents immigrated from Rajasthan, bringing a deep respect for craftsmanship, community, and cultural traditions.
    She grew up speaking Hindi at home, celebrating Diwali and Holi, and enjoying South Asian cuisine. The blend of her South Asian heritage and Midwestern upbringing shapes her work ethic, humility, and
    pride in forging a path as a woman in a traditionally male‑dominated trade.
