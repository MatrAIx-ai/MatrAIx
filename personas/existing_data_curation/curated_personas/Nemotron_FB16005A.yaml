  hobbies: '[''reading historic architecture books'', ''DIY home improvement projects'', ''gardening'', ''hiking'', ''cooking traditional South Asian dishes'', ''crocheting'', ''photography of local landmarks'',
    ''puzzle solving'', ''volunteering at community events'', ''learning Hindi literature'']'
  career_goals: She aims to earn a master mason certification, become a lead foreman in a reputable construction firm, and eventually launch her own masonry business focused on historic restoration and
    sustainable building practices. Nesar also wants to mentor other women entering the trades, acquire additional skills in tile setting and green construction, and build a reputation for reliability and
    quality within the Louisville building community.
