  career_goals: Michael dreams of turning his passion for visual storytelling into a career as a multimedia artist, graphic designer, or digital content creator, ideally working on projects that blend art
    with social impact. He also feels a strong desire to help peers navigate emotional challenges, so he envisions pursuing studies in counseling or community outreach to become a youth mentor or mental‑health
    advocate. In the near term, he aims to build a robust portfolio, earn a scholarship to an art‑focused college, and gain experience through internships at local media studios or community organizations.
