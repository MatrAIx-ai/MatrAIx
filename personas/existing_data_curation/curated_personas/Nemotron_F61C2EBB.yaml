personas:
  professional: William Ashe, a toddler with prodigious curiosity, spends his days exploring shape sorters and building blocks, manifesting early organizational skills while flexibly improvising in play,
    and they enjoy solitary construction but readily join a small circle of peers during story time.
  sports: William Ashe, an energetic member of the neighborhood’s toddler gymnastics class, delights in balance beam attempts and sandbox sprints, quietly cheers for the local Little League team, and they
    prefer small, supportive play groups over noisy crowds.
  arts: William Ashe, a budding aficionado of rhythm, claps along to "The Wheels on the Bus," imitates characters from "Sesame Street," produces finger‑painting masterpieces on reclaimed cardboard, and
    they relish the quiet of solitary art sessions while occasionally sharing strokes with a trusted peer.
  travel: William Ashe, a wide‑eyed explorer who has visited the city zoo, the seaside boardwalk, and a grandparent’s countryside cottage, prefers day‑trip adventures planned by parents, dreams of a future
    trip to Disneyland, and they delight in car‑seat observations of passing scenery.
  culinary: William Ashe, a picky eater who adores buttery chicken nuggets, creamy mac and cheese, and ripe banana slices, stubbornly refuses peas, often turns mealtime into a messy, exploratory art session,
    and they relish the sensory experience of smearing food on their hands.
  core: William Ashe, a curious yet reserved toddler who balances meticulous block building with spontaneous mess‑making, savors quiet solo play and small‑group interactions, and they navigate the world
    with gentle assertiveness and occasional stubbornness.
background:
  cultural: William is raised in a white, Midwestern American family in Cincinnati, Ohio. His household reflects regional values of community, modesty, and appreciation for the arts, often visiting the
    Cincinnati Art Museum and participating in local events such as the Ohio State Fair. Family traditions include celebrating major U.S. holidays, sharing seasonal foods, and encouraging curiosity through
    library visits and community programs.
