  career_goals: Even at this young age, William is fascinated by creativity and discovery. He often watches artists draw and listens to storybooks, fueling a budding dream of becoming an artist or explorer
    when he grows older. He is eager to keep learning how things work, to create his own ideas, and to share them in small, supportive groups.
