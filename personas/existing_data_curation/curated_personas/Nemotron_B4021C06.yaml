  career_goals: Thomas aims to transition into a senior leadership role, such as Director of Infrastructure Development for a regional municipal agency, where he can shape long‑term, sustainable water and
    wastewater strategies for Madison County and surrounding areas. He is passionate about increasing climate resilience through low‑impact development and green infrastructure, and hopes to spearhead grant‑funded
    projects that protect the community from flooding. A key ambition is to formalize a mentorship program that expands opportunities for young engineers, particularly those from underrepresented backgrounds,
    by pairing them with experienced professionals. He also plans to publish a series of case studies on innovative infrastructure solutions in professional journals. Recognizing his own sensitivity to
    stress, Thomas seeks to embed wellness practices into his team culture, promoting work‑life balance and mental‑health resources.
