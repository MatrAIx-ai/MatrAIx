personas:
  professional: Yarielis Rodriguez, a 28‑year‑old automotive service technician, blends a meticulous, documentation‑driven workflow with a competitive edge, excelling at engine rebuilds, brake and suspension
    repairs, and advanced diagnostic troubleshooting; they also use bilingual fluency to translate technical data for a diverse clientele and are charting a path toward ASE Master Technician certification
    and eventual garage ownership.
  sports: Yarielis Rodriguez stays active through weekend hikes in state parks with their rescued dog, regular salsa dancing classes that double as cardio, and participation in a local car‑enthusiast club
    that also organizes track‑day fitness challenges, while they cheer for the Houston Astros, Houston Rockets, and Houston Texans as their hometown professional teams.
  arts: Yarielis Rodriguez finds creative release in salsa dancing to the rhythms of Celia Cruz and Marc Anthony, admires the sleek lines of cars designed by Henrik Fisker, enjoys unwinding with classic
    films starring Antonio Banderas, and follows automotive art columns in Motor Trend, allowing them to blend mechanical precision with vibrant cultural expression.
  travel: Yarielis Rodriguez prefers road‑trip adventures that combine scenic drives with hands‑on car experiences, having already cruised the Pacific Coast Highway to Big Sur and trekked the Grand Canyon
    rim, they now dream of tackling the Nürburgring in Germany and scheduling a weekend getaway to the nearby hill‑top vineyard town of Fredericksburg, all while budgeting travel costs to fund their future
    garage.
  culinary: Yarielis Rodriguez cooks with confidence, mastering tamales wrapped in corn husks and mole sauce infused with chilies, chocolate, and spices, while also experimenting with grilled street‑style
    carne asada and fresh guacamole, they relish sharing these dishes at community festivals but sometimes over‑season the mole when stress spikes.
  core: Yarielis Rodriguez blends a competitive, detail‑oriented mind with a social, energetic lifestyle, juggling engine diagnostics, salsa nights, and meticulous budgeting, all while they wrestle with
    chronic worry and occasional impulse splurges on car parts.
background:
  cultural: Yarielis grew up in a Mexican‑American household where family gatherings, music, and food were central. Her parents instilled a strong work ethic and pride in her heritage, celebrating traditions
    like Día de los Muertos, Cinco de Mayo, and quinceañeras. Fluent in Spanish, she often helps translate for older relatives and community members. The blend of Mexican cultural values—respect for family,
    perseverance, and community service—and her life in Meriden, CT, shapes her identity, giving her a unique perspective that she brings to both her professional and personal life.
attributes:
  skills: '[''Automotive Diagnostics'', ''Engine Repair and Overhaul'', ''Brake and Suspension Maintenance'', ''Electrical System Troubleshooting'', ''Use of OBD-II Scanners'', ''Workshop Safety Compliance'',
    ''Inventory Management'', ''Customer Communication (English/Spanish)'', ''Time Management'', ''Team Coordination'']'
  hobbies: '[''Salsa Dancing'', ''Car Club Meet‑ups'', ''Track Day Participation'', ''Community Festival Volunteering'', ''Cooking Mexican Cuisine'', ''Hiking'', ''Dog Walking'', ''Reading Automotive Magazines'',
    ''DIY Repair Video Streaming'']'
  career_goals: She aims to earn her ASE Master Technician certification within the next two years and eventually become the lead technician at her shop, supervising a small team. Long‑term, Yarielis hopes
    to open her own independent automotive repair garage that emphasizes transparent service, offers apprenticeship opportunities for young mechanics—especially women and members of the local Hispanic community—and
    incorporates eco‑friendly practices. She also wants to pursue a certification in hybrid and electric vehicle systems to stay ahead of industry trends.
