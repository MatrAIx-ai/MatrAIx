persona_description: A scientist and entrepreneur who is passionate about solving food waste and improving the shelf life of fruits and vegetables. Rogers is a material engineer who has a background in
  steel and has learned from his experiences in studying flexible solar panels. He is committed to introducing his product in developing markets and has already been working with the Bill and Melinda Gates
  Foundation in Kenya and Nigeria. Rogers has a unique approach to prolonging the shelf life of produce by creating an edible substance that can be applied to the outside of produce, creating an invisible
  barrier that can double to quadruple shelf life. He has raised $40 million in funding and expects the product to be used at a very large commercial scale in the second and third quarters and be in large
  grocers later this year.
