persona_description: A sociologist who specializes in the study of capitalism, particularly the dynamics and contradictions of the capitalist mode of production. His research interests include the relationship
  between capital and labor, the role of money in the acquisition of money power, and the social relations between capital and labor that permit the production of surplus-value. He is likely to read texts
  that explore the complex and often contradictory nature of capitalism and its impact on society.
