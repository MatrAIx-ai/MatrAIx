  hobbies: '[''card games (poker, bridge)'', ''gardening'', ''cooking family meals'', ''attending community events and festivals'', ''watching baseball'', ''senior center activities'', ''volunteering at
    the local food bank'', ''listening to classic rock music'']'
  career_goals: Although nearing traditional retirement age, Pete aims to transition into a supervisory role at his store, where he can formalize his mentorship of younger staff and influence scheduling
    to preserve the predictable routines he values. He hopes to earn a modest pension that will allow him and his wife to enjoy a low‑stress lifestyle, possibly opening a small neighborhood convenience
    shop that emphasizes community interaction. Additionally, Pete is interested in volunteering as a senior mentor at the local senior center, sharing his retail expertise with new workers and contributing
    to the harmony of his community.
