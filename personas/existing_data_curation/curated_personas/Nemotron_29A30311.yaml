personas:
  professional: Wilfredo Ramosacosta, a construction manager with a knack for lean project planning and sustainable design, channels their curiosity and methodical reliability into leading mixed‑use developments
    that blend efficient building practices with striking public art installations.
  sports: Wilfredo Ramosacosta fuels a love of the outdoors by hitting the trails for weekend hikes in the Rockies and mountain‑biking with the Denver Mountain Bike Club, while they cheer on the Colorado
    Rockies and Denver Broncos and occasionally join a local recreational soccer league in the summer.
  arts: Wilfredo Ramosacosta immerses themselves in contemporary art by frequenting galleries featuring works by Banksy, Olafur Eliasson, and Jean‑Michel Basquiat, sketches street‑art murals in their sketchbook,
    and attends live shows ranging from The Strokes concerts to a local performance of Lin‑Manuel Miranda's 'In the Heights'.
  travel: Wilfredo Ramosacosta plans trips with a blend of adventure and cultural immersion, having trekked Patagonia’s glaciers, explored Kyoto’s temples, and mapped a road‑trip through the American Southwest,
    yet they prefer short‑haul flights to keep travel costs low and maintain family responsibilities.
  culinary: Wilfredo Ramosacosta enjoys experimenting in the kitchen, mastering the art of tamales, chiles rellenos, and mole poblano using corn masa, poblano peppers, and dark chocolate, and they also
    blend flavors from Thai basil chicken and Mediterranean olives into inventive fusion dishes.
  core: Wilfredo Ramosacosta balances a methodical, project‑driven mindset with an insatiable curiosity for art and the outdoors, occasionally over‑ordering obscure craft beers after gallery openings, but
    always returns to a disciplined schedule that keeps both work and personal passions thriving.
background:
  cultural: Wilfredo is a first‑generation Mexican‑American who grew up bilingual in a close‑knit family that celebrated traditions such as Día de los Muertos, quinceañeras, and shared meals of home‑cooked
    Mexican food. Living in Aurora’s vibrant Hispanic community, he maintains strong ties to his cultural roots while also embracing the broader American context. His Mexican heritage influences his appreciation
    for color, symbolism, and communal spaces, which he brings to his work by advocating for inclusive design and supporting immigrant workers on his sites. He participates in local cultural organizations,
    helps organize community art events, and uses his cultural insight to foster collaboration across diverse teams.
