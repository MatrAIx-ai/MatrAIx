  hobbies: '[''Visiting art galleries'', ''Sketching urban landscapes'', ''Street photography'', ''Hiking in the Rockies'', ''Mountain biking'', ''Cooking Mexican cuisine'', ''Reading art history and philosophy'',
    ''Attending live music and cultural festivals'', ''Volunteering for community mural projects'', ''Mentoring construction apprentices'']'
  career_goals: Wilfredo aims to advance to a senior project director role where he can oversee large‑scale mixed‑use developments that blend functional architecture with public art and community spaces.
    He plans to earn PMP and LEED AP certifications to deepen his expertise in project leadership and green building. In the long term, he envisions launching his own consulting firm focused on sustainable,
    culturally responsive construction, mentoring emerging professionals from diverse backgrounds, and championing the inclusion of Mexican artistic elements in Aurora’s evolving skyline.
