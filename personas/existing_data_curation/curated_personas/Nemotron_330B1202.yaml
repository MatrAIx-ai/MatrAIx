personas:
  professional: Richard Husband, a 20‑year‑old aspiring applied‑arts designer, merges their methodical sketching and free‑software digital illustration skills with hands‑on woodworking to produce bespoke
    furniture pieces adorned with custom paintings, a disciplined workflow that reflects their curiosity, competitive drive, and organized planning as they work toward a GED, community‑college graphic design
    program, and a future studio.
  sports: Richard Husband, a 20‑year‑old outdoor enthusiast, regularly hikes the Ozark Trail system with the Missouri Chapter of the Appalachian Trail Conservancy, follows the St. Louis Cardinals and Kansas
    City Chiefs with a competitive zeal that mirrors their chess pursuits, and maintains fitness through a disciplined routine of weekend trail runs and occasional weight‑training at the local community
    gym.
  arts: Richard Husband, a 20‑year‑old visual‑arts aficionado, spends weekends drawing life‑studies, designing set pieces for a local theater group, and immersing themselves in documentaries on modern art—from
    Yayoi Kusama’s installations to the abstract expressionism of Mark Rothko—while their curiosity fuels a constant search for unconventional techniques, they maintain a skeptical eye that drives rigorous
    self‑critique.
  travel: Richard Husband, a 20‑year‑old meticulous planner, prefers budget‑friendly road trips that blend art and nature, having explored the St. Louis Art Museum, a weekend road‑trip to the Art Institute
    of Chicago, and dreaming of attending the Venice Biennale and Portland’s DIY Craft Fair, where detailed itineraries and pre‑booked lodging soothe their stress‑prone mindset, and they relish the anticipation
    of each new gallery.
  culinary: Richard Husband, a 20‑year‑old hobbyist cook, enjoys crafting simple yet flavorful meals like skillet‑seared chicken with rosemary potatoes, homemade cornbread sweetened with honey, and foraged
    wild mushroom risotto, they confidently handle basic techniques while occasionally over‑salting dishes as a stress‑relief escape.
  core: Richard Husband, a 20‑year‑old methodical creator, balances a competitive edge in chess and woodworking with a deep‑seated curiosity for art, a chronic worry about finances and health, and a penchant
    for solitary hikes that together forge a uniquely disciplined yet stress‑sensitive outlook on life, which they navigate with quiet determination.
background:
  cultural: Richard grew up in Vienna, a small town in Maries County, Missouri, immersed in Midwestern values of self-reliance, community involvement, and modest living. His family background is typical
    of white, rural American households, with strong ties to local church gatherings, county fairs, and agricultural heritage. The region's folk art tradition and the proximity to the Missouri Ozarks have
    shaped his appreciation for handcrafted objects and natural landscapes. While his upbringing emphasized practicality and hard work, exposure to high school art programs and online creative communities
    introduced him to broader artistic perspectives, fostering his open‑minded and unconventional thinking.
