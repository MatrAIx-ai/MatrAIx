  career_goals: Richard aims to earn his GED within the next year and enroll in a community college program that combines graphic design with hands-on craft, such as applied arts or digital media. He hopes
    to secure an apprenticeship with a local carpenter to deepen his woodworking expertise while building a portfolio of illustrated works. In the longer term, he envisions opening a small studio in a nearby
    town where he can create and sell handmade furniture with custom painted designs, and offer occasional art workshops. He also wants to develop a disciplined routine for managing stress and eventually
    achieve financial independence that allows him to travel to art festivals and museums across the country.
