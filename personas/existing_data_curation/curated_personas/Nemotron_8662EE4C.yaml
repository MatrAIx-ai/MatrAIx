  career_goals: David's long‑term ambition is to work in a field that combines his love for practical problem‑solving with tangible outcomes. He is drawn to civil engineering, especially sustainable urban
    infrastructure, and plans to enroll in a specialized STEM high‑school program, pursue a civil engineering degree at a state university, and later contribute to designing safer, greener public spaces
    in New York City.
