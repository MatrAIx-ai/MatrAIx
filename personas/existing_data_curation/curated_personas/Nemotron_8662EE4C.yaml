personas:
  professional: David Marlow is a teenage coding enthusiast who builds intricate LEGO models and designs simple games in Scratch and Python, and they apply their love for structure and predictability to
    methodically debug code and meticulously plan each project.
  sports: David Marlow jogs through Sunnyside parks on weekends, participates in the Queens Youth Running Club's after‑school runs, and follows the New York Knicks, New York Mets, and New York Rangers,
    cheering them on throughout the basketball, baseball, and hockey seasons.
  arts: David Marlow spends evenings listening to indie and alternative acts such as Tame Impala, Arctic Monkeys, and Mitski, and occasionally watches indie‑spirit films like 'Lady Bird' and 'Moonrise Kingdom,'
    which inspire his creative LEGO builds.
  travel: David Marlow enjoys weekend trips on the subway to Coney Island and the Bronx Zoo, and dreams of a summer visit to Washington, D.C.'s Smithsonian museums and the historic streets of Boston.
  culinary: David Marlow prefers New York‑style pepperoni pizza, classic grilled cheese, and mac & cheese, and while their cooking skill is limited to microwaving leftovers, they enjoy assembling simple
    avocado toast with smoked salmon and sesame seeds for a quick lunch.
  core: David Marlow is a methodical teen tech tinkerer who balances quiet curiosity with a love for community rituals, occasional impulsive LEGO splurges, and a disciplined yet slightly disorganized approach
    to health and finances.
background:
  cultural: David is a White American raised in Sunnyside, Queens, a vibrant, multicultural neighborhood of New York City. His family celebrates traditional American holidays such as Thanksgiving and the
    Fourth of July, while also embracing the diverse cultural fabric of the borough through school events, community festivals, and neighborhood block parties. Growing up amid a mix of ethnicities, he values
    punctuality, hard work, and community involvement, traits reinforced by his parents who emphasize education and responsibility.
