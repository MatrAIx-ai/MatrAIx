  career_goals: Jhoselyn dreams of a future where she can help others learn and stay healthy. She imagines becoming a teacher who encourages curiosity, a veterinarian caring for animals, or a community
    chef sharing nutritious meals. Her long‑term ambition is to combine her love of learning, kindness, and practical problem‑solving to make a positive impact, while staying open to exploring other paths
    as she grows.
