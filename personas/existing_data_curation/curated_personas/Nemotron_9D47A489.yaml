personas:
  professional: Jhoselyn Bradley, a budding young explorer with a passion for constructing intricate LEGO worlds and solving mystery book riddles, blends vivid imagination with methodical planning to turn
    every curious spark into a hands‑on project.
  sports: Jhoselyn Bradley enjoys playing on the local community soccer team, eagerly watches the hometown baseball club the River City Rivermen, and spends weekends exploring the city park’s climbing wall,
    balancing team spirit with solo nature hikes.
  arts: Jhoselyn Bradley frequently sketches bright sunsets with colored pencils, crafts papel picado banners featuring butterflies, and delights in listening to lively folk tunes by the group Los Cantares
    while drawing inspiration from the storytelling style of author Enid Blyton.
  travel: Jhoselyn Bradley loves family road trips to nearby national parks like Redwood Forest, dreams of seeing the crystal ice caves of Iceland, and enjoys planning treasure‑hunt itineraries around museum
    exhibit maps, all while keeping her travel journal filled with pressed leaves and ticket stubs.
  culinary: Jhoselyn Bradley often helps whisk masa dough for chicken tamales, assembles cheesy quesadillas with fresh cilantro and jalapeños, and experiments with sweet guava glaze on cupcakes, though
    she sometimes forgets to set the timer, resulting in a charred edge she calls 'extra crisp'.
  core: Jhoselyn Bradley is a curious yet practical nine‑year‑old who balances adventurous LEGO builds with meticulous allowance budgeting, all while nurturing a quiet love for nature, folk music, and tidy
    sketchbooks.
background:
  cultural: Jhoselyn embraces her Mexican heritage through daily bilingual conversation, celebrating Día de los Muertos with homemade altars, and helping prepare traditional dishes during family gatherings.
    She enjoys listening to mariachi and ranchera songs, learning simple Spanish proverbs, and participating in school multicultural events that highlight Mexican art and folklore. Living in Indianapolis,
    she also blends Midwestern customs, such as attending community festivals and school sports, while retaining a strong sense of cultural pride and harmony within her family and peer circles.
