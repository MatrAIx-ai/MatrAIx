personas:
  professional: Susan Corry, a methodically organized art curator‑in‑training, fuses their digital illustration talent with meticulous research and project coordination expertise to craft museum exhibitions
    that push avant‑garde boundaries, and they pursue each concept with a competitive edge and a healthy dose of skepticism.
  sports: Susan Corry hits the Lakefront Trail for sunrise runs, attends weekly yoga sessions to soothe stress, follows the Chicago Bulls and Cubs with enthusiastic loyalty, and they volunteer with the
    local Chicago Hiking Club, balancing a competitive spirit in marathon training with solitary lakefront hikes.
  arts: Susan Corry scours the Art Institute’s modern wings and the vibrant murals of the Pilsen neighborhood for inspiration, sketches in the quiet corners of coffee houses while listening to Flying Lotus,
    studies the provocative installations of Ai Weiwei, and they regularly attend avant‑garde productions at the Lookingglass Theatre Company, letting these eclectic influences shape their visual storytelling.
  travel: Susan Corry meticulously plans each getaway to maximize limited vacation days, favoring weekend trips to Milwaukee’s craft‑brew scene, a two‑week immersion in Paris and Florence’s museum circuits,
    and a dream pilgrimage to Kyoto’s historic temples, and they budget each journey against a modest travel fund.
  culinary: Susan Corry’s experimental palate blends Chicago’s multicultural flavors, as they craft miso‑marinated pork bao, kimchi‑topped deep‑dish pizza, and turmeric‑infused lentil stew, often sourcing
    heirloom tomatoes, fresh dill, and harissa from the Green City Market while honing their intermediate‑level sauté and fermentation techniques.
  core: Susan Corry’s life is a carefully charted map of artistic curiosity, relentless ambition, and an undercurrent of anxiety that fuels both a competitive drive and a habit of over‑analyzing every choice,
    and they constantly wrestle with self‑imposed expectations.
background:
  cultural: Susan grew up in a middle‑class family on the northwest side of Chicago, with roots tracing back to Irish and German ancestry common in the region. Her upbringing exposed her to the city's rich
    tapestry of ethnic neighborhoods, from Polish restaurants to Mexican festivals, fostering an early appreciation for cultural diversity. Although she identifies as white, she has been shaped by the multicultural
    environment of Chicago, which has informed her love for varied artistic expressions and community‑oriented projects.
attributes:
  skills: '[''Art Curation'', ''Digital Illustration'', ''Research & Analysis'', ''Project Coordination'', ''Public Speaking'', ''Critical Writing'']'
  hobbies: '[''Gallery and museum visits'', ''Sketching and digital illustration'', ''Reading contemporary philosophy and art theory'', ''Attending avant‑garde theater'', ''Yoga and meditation'', ''Lakefront
    Trail hiking'', ''Journaling for stress management'', ''Experimental cooking'']'
  career_goals: She aims to return to academia to earn a master's degree in Museum Studies or Arts Administration, positioning herself for a role as a curator or program manager at a Chicago cultural institution.
    Long‑term, Susan envisions establishing a community‑focused art space that showcases emerging artists and offers educational workshops, allowing her to blend her competitive drive with her appreciation
    for unconventional ideas. She also hopes to build a freelance consultancy in visual storytelling, leveraging her design and narrative skills.
