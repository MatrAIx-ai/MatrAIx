persona_description: A scientist who specializes in environmental conservation and toxicity studies, particularly in the use of nonlethal sampling methods to study contaminants in animals. They are familiar
  with laser ablation-ICP-MS technology and have used it to collect nonlethal samples for testing in the environment. They have experience with animal testing and have developed a technique to sample minute
  sections of an animal's tail without sacrificing the animal. They have published their findings in a reputable scientific journal and are interested in using their findings to support conservation-minded
  eco-toxicological studies.
