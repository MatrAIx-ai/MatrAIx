personas:
  professional: Adriene Perry, a seasoned warehouse and retail operations specialist, combines meticulous inventory control skills with a curiosity for logistics theory, using short breathing exercises
    to stay calm under pressure while mentoring younger staff and flexibly adapting to seasonal store promotions.
  sports: Adriene Perry, a member of the Hillsborough Seniors Walking Club, enjoys leisurely nature walks through local parks and practices gentle yoga three times a week, while cheering on the Tampa Bay
    Buccaneers in the fall and the Tampa Bay Lightning during the winter, and participates in weekly bingo at the senior center as a low‑impact social sport.
  arts: Adriene Perry, an avid quilter, stitches intricate patterns while listening to Mahalia Jackson and The Clark Sisters, and immerses herself in historical fiction by Toni Morrison and memoirs by Alex
    Haley that illuminate underrepresented voices, finding both solace and inspiration in these artistic pursuits.
  travel: Adriene Perry prefers low‑key, budget‑friendly trips, often using senior discounts to explore historic Southern cities like Savannah, Charleston, and New Orleans, while dreaming of a leisurely
    road‑trip to Asheville’s Blue Ridge Mountains to combine their love of genealogy research at local archives with scenic drives.
  culinary: Adriene Perry, a competent home cook, delights in preparing Southern comfort foods such as collard greens simmered with smoked turkey, buttermilk fried chicken, cornbread, and peach cobbler,
    often enhancing recipes with garden‑fresh tomatoes, basil, and garden‑grown okra.
  core: Adriene Perry, a pragmatic yet curious retiree, balances a love for gardening and quilting with a habit of over‑analyzing every decision, occasionally letting worry linger long after the task is
    done.
background:
  cultural: Adriene grew up in a close‑knit African‑American community in central Florida, where church, family gatherings, and neighborhood celebrations shaped her worldview. Her parents emphasized self‑reliance,
    education, and helping others, values that continue to guide her daily life. She carries the legacy of the civil‑rights era, which instilled a deep appreciation for perseverance and community solidarity.
    Her cultural heritage is reflected in the foods she cooks—fried catfish, collard greens, and peach cobbler—and in the gospel music that fills her home. While rooted in tradition, Adriene stays curious
    about contemporary issues, often attending local workshops on health, technology, and history. This blend of respect for her roots and openness to new ideas informs her interactions at work and her
    involvement in community projects.
