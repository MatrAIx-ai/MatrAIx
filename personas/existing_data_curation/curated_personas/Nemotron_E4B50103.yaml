  career_goals: Approaching retirement, Adriene aims to transition from a front‑line stocker to a shift‑lead or trainer role where she can formalize her mentorship of younger staff. She plans to enroll
    in a community‑college certificate program in supply‑chain fundamentals to deepen her knowledge of logistics and become a go‑to resource for process improvements. While she values financial stability,
    she also wants to gradually reduce her hours and allocate more time to volunteering at the local food pantry and leading a small garden project for seniors. Her long‑term ambition is to leave a lasting,
    practical impact on the store’s operations and her community while maintaining her steady income.
