persona_description: A scientist who specializes in the study of atmospheric gases, particularly nitrous oxide, and its impact on climate change. They are part of a team of researchers who have published
  a study in the Proceedings of the National Academy of Sciences (PNAS) showing that nitrous oxide emissions from global rivers and streams are three times previous estimates used by the Intergovernmental
  Panel on Climate Change. They are interested in the drivers of climate change and the need for continued scientific study of the impacts of human activities on the Earth system.
