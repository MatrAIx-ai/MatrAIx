personas:
  professional: Cyron Celestin is an aspiring community organizer who leads their church youth group’s weekly game night, leveraging their knack for strategic thinking from Minecraft and their practical,
    hands‑on approach to rally friends for collaborative projects, while their relaxed attitude toward obligations sometimes leaves plans half‑formed.
  sports: Cyron Celestin dominates after‑school pickup basketball at the local community gym, is a member of the Eastside Hoops Club, and cheers for the NBA’s Chicago Bulls while also dabbling in weekend
    swimming at the municipal pool to stay fit, though their laid‑back approach means they sometimes skip warm‑ups.
  arts: Cyron Celestin drums along to Kendrick Lamar and J. Cole hip‑hop beats while sketching characters from the sci‑fi graphic novel series Saga, they attend local youth theater workshops and idolize
    the animation style of Studio Ghibli’s Spirited Away, blending music and visual storytelling into their creative downtime.
  travel: Cyron Celestin has visited Orlando’s theme parks and the Grand Canyon on family road trips, dreams of exploring Tokyo’s Akihabara district for its gaming culture, and prefers spontaneous itineraries
    over rigid schedules, though limited allowance sometimes curtails longer voyages.
  culinary: Cyron Celestin experiments with simple soul‑food recipes such as baked mac and cheese with smoked paprika and collard greens seasoned with garlic, they can reliably whip up a decent grilled
    cheese and a batch of chocolate chip cookies, yet they often forget to clean up the kitchen after cooking.
  core: Cyron Celestin blends strategic gaming mindsets with a love for basketball and hip‑hop, balancing a practical outlook with a laid‑back habit of forgetting chores and overspending on hobby gear.
background:
  cultural: Cyron is African‑American, with family roots that trace back to the Great Migration from the Southern United States to Pennsylvania. Growing up in Glenshaw, he is immersed in a blend of urban
    Pittsburgh culture and close‑knit suburban community life. His family celebrates traditions such as Juneteenth, church gospel music, and soul‑food gatherings, while also embracing contemporary Black
    youth culture through music, fashion, and social media. These influences shape his values of community, resilience, and creative expression.
attributes:
  skills: '["Basic coding (Scratch, intro Python)", "LEGO and Minecraft building", "Basketball teamwork", "Basic drumming", "Bike and simple mechanical repairs", "Collaborative school project leadership"]'
  hobbies: '["Basketball", "Minecraft building", "Strategy video gaming", "LEGO construction", "Drumming", "Sci‑fi graphic novels", "Church youth group", "Simple cooking (soul‑food inspired)"]'
  career_goals: He dreams of turning his love for building and technology into a career as a civil or software engineer, hoping to design sustainable community spaces in his hometown. In the short term,
    he wants to improve his math and science grades, join his school’s robotics club, and earn a junior coding certification. He also imagines possibly becoming a firefighter to serve his community, reflecting
    his practical and compassionate nature.
