  hobbies: '[''Hiking'', ''Birdwatching'', ''Gardening'', ''Quilting'', ''Reading historical fiction'', ''Knitting'', ''Listening to bluegrass and folk music'', ''Crossword puzzles'', ''Volunteering at
    the local library'', ''Attending small community gatherings'']'
  career_goals: Mary Ann aims to transition from a front‑line driver to a mentor and leader within her district's transportation department. She hopes to become a senior driver trainer, sharing her practical
    knowledge and safety mindset with newcomers. Over the next five years she would like to take on a transportation coordinator role, where she can influence policy, especially regarding safety for children
    with special needs and improve route efficiency. Ultimately, she envisions a part‑time volunteer driver position serving senior citizens in her community, allowing her to stay connected to the people
    she cares about while balancing her own emotional well‑being.
