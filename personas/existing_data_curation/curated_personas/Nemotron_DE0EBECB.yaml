personas:
  professional: Mary Tignor, a seasoned school bus driver with over three decades of rural Hill County experience, blends paper maps and modern GPS to craft efficient routes while mentoring younger drivers,
    channeling her curiosity and practical mindset into safety initiatives for children, especially those with special needs.
  sports: Mary Tignor favors low‑impact outdoor pursuits, hitting the Appalachian Trail for weekly hikes, joining a local birdwatching walking group, cheering on the West Virginia Mountaineers football
    team, and occasionally playing casual softball at church potlucks.
  arts: Mary Tignor stitches stories into quilts and knits intricate patterns while listening to bluegrass legends like Bill Monroe and Alison Krauss, devouring Appalachian historical fiction such as 'The
    Winter People', and attending the annual Mountain Heritage Festival to celebrate folk art.
  travel: Mary Tignor plans deliberate road trips to the Blue Ridge Parkway and Shenandoah National Park, revels in the quiet of small mountain cabins, and dreams of a relaxed cultural tour of New England’s
    colonial towns, balancing careful itineraries with spontaneous detours for local birdwatching spots.
  culinary: Mary Tignor’s kitchen centers on garden‑fresh vegetable stews, cornbread, and pickled ramps, seasoned with Appalachian herbs, while they perfect a family‑favorite apple butter and treat themselves
    to a hearty bowl of pork and beans after a long day on the road.
  core: Mary Tignor, a meticulous yet curious 55‑year‑old bus veteran, channels her love of nature, craft, and community into a life of quiet service, punctuated by occasional anxiety spikes and a habit
    of hoarding yarn.
background:
  cultural: Mary Ann was born and raised in White Sulphur Springs, West Virginia, a close‑knit Appalachian community where her family has lived for generations. The region’s cultural fabric emphasizes self‑reliance,
    modesty, hospitality, and a deep respect for the natural landscape. Growing up, she attended a local Methodist church, which reinforced values of cooperation and service to others. Community events
    like county fairs, church potlucks, and volunteer projects have shaped her sense of belonging and responsibility. This rural white cultural heritage informs her practical work ethic, her commitment
    to community safety, and her preference for intimate, supportive social settings.
attributes:
  skills: '[''Safe commercial driving'', ''Child supervision and safety'', ''Route planning and optimization'', ''First aid and CPR certification'', ''Basic vehicle maintenance'', ''Effective communication
