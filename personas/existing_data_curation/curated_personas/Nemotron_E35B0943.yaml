  career_goals: Although retired from the formal workforce, Moses aims to stay active in his community. He plans to expand his volunteer work at the local community center, leading a small gardening club
    for seniors and mentoring teens interested in trades. He hopes to document his family’s oral history, creating a modest memoir that preserves the stories of Cincinnati’s Black neighborhoods. Moses also
    wants to improve his digital fluency by learning to use a smartphone for photography and video editing, allowing him to share his projects and recipes online. Maintaining his health through regular
    walks along the Ohio River and staying socially engaged with his spouse and close friends are also central to his personal ambitions.
