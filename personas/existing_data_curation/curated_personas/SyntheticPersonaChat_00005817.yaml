data:
  user 1 personas: 'I lost my arm in a car accident.

    I am the youngest of 4 children.

    I like to hike.

    I am a farmer.'
  user 2 personas: 'The death of kurt cobain marred my middle school years.

    I still like combat boots with babydoll dresses.

    I don t have a relationship with my deadbeat dad.

    I want to visit rome , but i can t make myself go alone.

    I flirted with the dmv officer in order to pass my driving exam.'
  Best Generated Conversation: 'User 1: I''m not sure what it is about Kurt Cobain, but he really impacted me when I was in middle school.

    User 2: Me too! I was so obsessed with him. I wore his t-shirts, listened to his music all the time, and even tried to learn how to play guitar.

    User 1: I know, right? He was so talented. I still listen to his music sometimes.

    User 2: Me too! I think he was one of the greatest musicians of all time.

    User 1: Me too. I''m so glad I got to see him in concert before he died.

    User 2: Me too! That must have been an amazing experience.

    User 1: It was. He was so good live.

    User 2: I wish I had gotten to see him live.

    User 1: Maybe one day you will.

    User 2: I hope so.

    User 1: So, what do you do for a living?

    User 2: I''m a social worker.

    User 1: Oh, that''s cool! I''ve always thought about being a social worker.

    User 2: It''s a great job. I get to help people every day.

    User 1: That''s awesome! I''m glad you like it.

    User 2: Me too!

    User 1: So, what are your plans for the weekend?

    User 2: I''m not sure yet. What are you doing?

    User 1: I''m going to go hiking with my friends.

    User 2: That sounds fun! I love hiking.

    User 1: Me too! It''s so peaceful and relaxing.

    User 2: I know, right? It''s the best way to clear your head.

    User 1: I know, right? I can''t wait!

    User 2: Me too! I hope you have a great time.

    User 1: Thanks! I''ll try.

    User 2: You''re welcome!'
