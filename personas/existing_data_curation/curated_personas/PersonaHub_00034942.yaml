  patient progress, and identifying and managing side effects of this form of treatment. They are also highly trained in the use of computerized treatment plans and three-dimensional imaging to ensure the
  accuracy and effectiveness of their treatments. They are likely to be interested in the latest advancements in radiation therapy and the latest research in the field of cancer treatment.
