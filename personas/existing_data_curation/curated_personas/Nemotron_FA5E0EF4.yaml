  career_goals: Kathleen aims to transition into a legal‑operations leadership role within a technology‑focused company, leveraging her combined legal and STEM background to design efficient, data‑driven
    workflows. She plans to earn the Certified Legal Project Manager (CLPM) credential and eventually pursue a Juris Doctor degree to deepen her strategic impact. In the next five years she wants to become
    a senior paralegal or legal‑operations manager overseeing a team that integrates AI‑driven e‑discovery tools, while also contributing to pro bono initiatives that support under‑served communities in
    Austin. Her competitive drive pushes her to become recognized as the go‑to expert for complex technical litigation support and to present at regional legal‑tech conferences.
