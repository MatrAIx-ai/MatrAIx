persona_description: A neuroscientist who specializes in the study of motor learning and control, particularly in the areas of motor skill acquisition, motor coordination, and motor recovery. She has conducted
  research on the mechanisms underlying motor learning and control, and has applied her findings to the rehabilitation of stroke patients and neurorehabilitation. She has published several papers in peer-reviewed
  journals and has presented her work at scientific conferences. She is also interested in the development of motor learning paradigms and the amount of practice required to relearn lost skills. She is
  knowledgeable about the effects of practice on motor learning and control and the role of brain activity in the process.
