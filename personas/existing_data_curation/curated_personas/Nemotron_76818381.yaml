  hobbies: '[''Visiting art galleries'', ''Attending craft fairs'', ''Photography'', ''Reading about contemporary art'', ''Gardening'', ''Hiking'', ''Community choir singing'', ''Volunteering art workshops
    for seniors'']'
  career_goals: Betty hopes to progress to a supervisory role as head custodian or facilities manager for a school or community center, where she can champion environmentally responsible cleaning programs.
    She is interested in obtaining a certification in green facility management and eventually mentoring younger custodial staff. As a long‑term ambition, Betty envisions launching a small consulting service
    that helps small businesses adopt low‑impact cleaning practices, allowing her to blend her expertise with her love for community education and the arts.
