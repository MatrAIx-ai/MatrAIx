persona_description: A geriatric psychologist and clinical psychologist with expertise in the assessment and treatment of cognitive, behavioral, and psychological symptoms of dementia. They have a deep
  understanding of the challenges faced by people with dementia and their caregivers, and have developed innovative interventions and strategies to address these issues. They have published research on
  the use of cognitive rehabilitation, functional assessments, and communication interventions in the management of challenging behavior and low activity engagement in residential and long-term care settings.
  They are committed to the development of evidence-based practice and have a passion for improving the quality of life of people with dementia and their caregivers.
