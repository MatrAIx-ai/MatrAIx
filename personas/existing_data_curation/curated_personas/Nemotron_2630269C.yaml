  career_goals: Thresiamma aims to advance to a supervisory role such as Shift Supervisor and eventually Deputy Warden, where she can shape policy and promote a culture of safety and empathy. She is passionate
    about integrating culturally responsive rehabilitation programs—like art therapy, language classes, and mindfulness workshops—into the facility’s offerings. To support these ambitions, she plans to
    pursue a Master's degree in Criminal Justice or Social Work and acquire advanced certifications in mental‑health crisis response. Additionally, she hopes to become a dedicated training specialist, designing
    workshops on emotional resilience and cultural awareness for both staff and inmates, and to serve as a mentor for younger correctional officers.
