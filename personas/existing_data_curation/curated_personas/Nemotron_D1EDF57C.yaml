  hobbies: '["Drawing and coloring", "Duplo building", "Pretend play with stuffed animals", "Backyard nature exploration", "Snow play (building snowmen, sledding)", "Singing nursery rhymes", "Listening
    to picture‑book read‑alouds", "Tricycle riding", "Simple matching games", "Seasonal crafts (leaf collages)"]'
  career_goals: Even at her young age, Marissa expresses a fondness for helping others and a love of routine, which translates into imaginative career aspirations such as becoming a teacher, a nurse, or
    a park ranger. She often says she wants to 'take care of babies' and 'teach little kids how to draw.' She also imagines herself working in a tidy, organized environment like a library where she can
    share stories with other children. These aspirations reflect her practical nature, desire for predictable structures, and strong sense of empathy.
