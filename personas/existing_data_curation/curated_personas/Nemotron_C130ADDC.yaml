  career_goals: Although retired from formal employment, Christina aims to deepen her impact on the Bedford community by taking on a leadership role in the local senior center, mentoring younger volunteers,
    and spearheading an inter‑generational gardening project that connects seniors with schoolchildren. She also hopes to document and share oral histories of Bedford County, preserving the town’s heritage
    for future generations.
