  hobbies: '["LEGO building", "reading picture books", "nature walks", "jigsaw puzzles", "drawing", "train set play"]'
  career_goals: Brad imagines a future where he can explore the stars as an astronaut, fascinated by rockets and the idea of traveling to space. He also expresses a desire to become a teacher, driven by
    his calm demeanor and love for helping others learn. Occasionally, he talks about wanting to care for animals as a veterinarian, reflecting his kindness and cooperative nature.
