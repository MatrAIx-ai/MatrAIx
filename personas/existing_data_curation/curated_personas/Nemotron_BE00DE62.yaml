personas:
  professional: Brad Garcia is a budding LEGO architect who loves constructing detailed sets following step‑by‑step guides, displaying early spatial reasoning and patience, often turning playtime into mini‑engineering
    projects.
  sports: Brad Garcia enjoys playing forward for the Tiny Tykes Soccer Club’s Greenfield Cubs team, cheers on the Chicago Cubs during family outings to the ballpark, and loves splashing in the backyard
    during summer soccer drills.
  arts: Brad Garcia delights in picture books by Dr. Seuss and Eric Carle, sketches the beloved characters with bright crayons, and sings along to The Wiggles and Sesame Street, letting music inspire imaginative
    stories for their LEGO creations.
  travel: Brad Garcia loves family nature walks at Red Rock State Park, recently explored the interactive Children’s Museum of Science, and dreams of a future trip to the Smithsonian National Air and Space
    Museum to see real rockets up close.
  culinary: Brad Garcia prefers cheesy macaroni, loves banana pancakes drizzled with honey, assembles mini pepperoni pizzas with careful precision, and proudly helps stir batter for chocolate chip cookies,
    though they sometimes forget to wash their hands afterward.
  core: Brad Garcia is a calm, structure‑loving six‑year‑old who builds elaborate LEGO worlds, saves coins in a piggy bank, and quietly explores nature, all while avoiding fuss and embracing simple pleasures.
background:
  cultural: Brad was raised in Evansville, Indiana, within a predominantly white, Midwestern community that values politeness, neighborly support, and regular community events such as county fairs and local
    sports games. His family participates in typical regional traditions, including church gatherings and seasonal outdoor activities like fishing and baseball. While his surname reflects a diverse heritage,
    his upbringing is grounded in the local Indiana culture, emphasizing routine, modesty, and a calm, resilient disposition.
