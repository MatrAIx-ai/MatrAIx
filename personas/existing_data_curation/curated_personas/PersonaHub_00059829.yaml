persona_description: A philosopher and cognitive scientist who specializes in the study of consciousness, functionalism, and representationism. His research interests include the role of the mind in evolution,
  the nature of subjective experience, and the implications of scientific research on consciousness for the mind-body problem. He is particularly interested in the possibility of robots that are functionally
  like humans but physically different, and in reconciling a purely mechanical view of the universe with key aspects of our subjective impressions of our own existence.
