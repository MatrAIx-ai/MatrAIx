  career_goals: Although retired, Wanda is focused on maintaining her independence and leaving a tangible legacy for her family and community. She aims to keep her garden thriving for the next five years,
    finish a memoir that combines her life story with a collection of family recipes, and earn recognition at the town’s senior craft fair for her quilts. She plans to ensure all legal and financial affairs
    are in order, including updating her will and estate documents. Additionally, she hopes to mentor a small group of younger neighbors in knitting and local history, fostering continuity of tradition
    while still pursuing her own personal standards of excellence.
