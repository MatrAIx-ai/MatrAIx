  career_goals: Sandra dreams of a future where she can help others and express her creativity. She imagines becoming a teacher who can inspire children, an artist who paints bright pictures, a veterinarian
    who cares for animals, or a community helper such as a librarian or a playground caretaker. Her aspirations are shaped by her love for art, animals, and making friends feel safe and happy.
