personas:
  professional: Sandra Wandell, a 5-year-old preschooler, already shows a budding professional curiosity by eagerly assisting teachers with classroom organization and exploring art projects, balancing their
    desire to help classmates with a need for occasional quiet time.
  sports: Sandra Wandell, a lively participant in the Henryville Tiny Tots Soccer program, loves chasing after a bright orange ball at the community park, cheers on the local high school football team the
    Monroe County Raiders, and balances their energetic play with occasional nap time after a rainy afternoon.
  arts: Sandra Wandell delights in drawing whimsical creatures during after-school art class, idolizes illustrator Dr. Seuss and enjoys singing along to the whimsical tunes of Pixar's soundtrack, and they
    often create makeshift performances for family gatherings.
  travel: Sandra Wandell dreams of revisiting the autumn leaf-loving hike at Bushkill Falls and hopes to travel with their family to Disney World in Florida, favoring trips that mix familiar summer picnics
    with the excitement of themed attractions, yet the limited travel budget sometimes confines outings to weekend visits to the nearby county fair.
  culinary: Sandra Wandell loves helping to bake chocolate chip cookies with their mom, especially cherishing the warm aroma of melted butter and the sweet burst of raisins, while also delighting in classic
    comfort foods like mac and cheese and school lunches featuring chicken nuggets, though they occasionally refuse broccoli.
  core: Sandra Wandell is a compassionate, curiosity-driven five-year-old who balances a love for art and community help with bouts of anxiety and a penchant for sticky cookie crumbs on their shirt.
background:
  cultural: Sandra lives in Henryville, a small community in Monroe County, Pennsylvania. Her family follows typical American suburban customs, celebrating holidays such as Thanksgiving, Christmas, and
    the Fourth of July with community gatherings, seasonal crafts, and shared meals. The local church and neighborhood events provide opportunities for group activities, reinforcing values of kindness,
    cooperation, and helping neighbors. Growing up in a rural‑suburban setting, she is accustomed to outdoor play, seasonal fairs, and a close‑knit community that emphasizes caring for one another.
attributes:
