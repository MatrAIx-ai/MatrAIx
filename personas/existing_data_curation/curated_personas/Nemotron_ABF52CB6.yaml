  career_goals: Justin aims to earn his GED and become a Certified Emergency Communicator, then move into a supervisory role as a shift lead at the Albuquerque 911 Center. Long‑term, he aspires to transition
    into emergency management, helping design community disaster‑response plans and integrating new technologies such as AI‑driven dispatch tools to improve public safety outcomes.
