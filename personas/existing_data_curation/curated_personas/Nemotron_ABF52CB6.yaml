personas:
  professional: Justin Eagar, a 33‑year‑old emergency communications specialist at the Albuquerque 911 Center, leverages rapid information processing, CAD mastery, and calm under pressure to coordinate
    first responders, while his methodical log‑keeping and assertive yet compassionate style prepare him for a future shift‑lead role and eventual emergency‑management leadership.
  sports: Justin Eagar, an avid outdoors enthusiast, spends weekends mountain biking the Sandia trails, playing pick‑up basketball games at the ABQ Grassroots Hoops court, and cheering on the New Mexico
    Lobos football team and the Albuquerque Isotopes, while they also keep a consistent jogging schedule for cardio endurance.
  arts: Justin Eagar cultivates a love for New Mexican folk music, frequently listening to the acclaimed duo Luna Benita and attending performances by the Albuquerque Folk Festival, while they also enjoy
    the visual storytelling of local muralist Maria Martinez and unwind with classic western films starring John Wayne.
  travel: Justin Eagar prefers a blend of adventure and cultural immersion, planning weekend road trips to Taos Pueblo, Santa Fe's art districts, and the Carlsbad Caverns, while they dream of exploring
    the Patagonia trekking routes and the fjords of Norway, always balancing travel budgets with their desire for high‑altitude experiences.
  culinary: Justin Eagar revels in cooking southwestern fare, expertly preparing green chile stew, smoked trout tacos with cilantro and lime, and blue‑corn pancakes topped with prickly pear jam, often experimenting
    with local ingredients like Pueblo chiles and mesquite flour, though their kitchen skill peaks at "confident home cook" level.
  core: Justin Eagar is a disciplined 33‑year‑old emergency dispatcher who balances a love of high‑octane outdoor pursuits with a methodical, data‑driven approach to work and finance, occasionally plagued
    by a caffeine habit and a tendency to over‑schedule every free minute.
background:
  cultural: Justin is a white Anglo‑American who was born and raised in Albuquerque, New Mexico. While his family roots are in the broader American Midwest, his upbringing was shaped by the state's multicultural
    environment, where Hispanic, Native American, and Southwestern traditions blend into daily life. He embraces regional customs such as celebrating the Balloon Fiesta, enjoying New Mexican cuisine with
    its signature green chile, and values the local sense of independence, community involvement, and love for the desert landscape.
