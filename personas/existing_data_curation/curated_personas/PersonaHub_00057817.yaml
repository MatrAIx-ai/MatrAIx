persona_description: A teacher who is interested in promoting metacognitive development in their students, focusing on strategies such as planning, evaluation, and problem-solving. This teacher is aware
  of the importance of monitoring and applying knowledge, and is dedicated to helping students become more aware of their own thinking processes. They are skilled in using metacognitive strategies in their
  own teaching, and are proactive in identifying opportunities for students to develop these skills. This teacher is also knowledgeable about the importance of process goals in addition to content goals
  in learning, and is committed to helping students discover the benefits of understanding and transferring thinking processes.
