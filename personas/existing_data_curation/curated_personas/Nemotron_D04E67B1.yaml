  career_goals: Carolyn aims to transition from her current manager role to a senior director position overseeing operations for a mid-size organization. She is focused on leading large-scale efficiency
    initiatives, integrating sustainability practices, and championing a workplace culture that prioritizes employee well-being and mental health. To prepare, she plans to earn a Lean Six Sigma Black Belt
    and complete an executive MBA, while building a reputation as a compassionate leader who balances high performance with supportive team dynamics.
