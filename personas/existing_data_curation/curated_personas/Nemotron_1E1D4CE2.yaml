personas:
  professional: Melvin is a senior construction manager who leverages BIM and Primavera to deliver green building projects on schedule, weaving artistic concepts into design while leading cross‑disciplinary
    teams with a blend of rigor and improvisational flair.
  sports: Melvin is an active member of a local adult basketball league, coaches a youth construction workshop team on weekends, and supports the Baltimore Ravens and Washington Capitals, often attending
    games with friends to combine competition and camaraderie.
  arts: Melvin is an avid architectural photographer who frequents contemporary art galleries showcasing artists like Zaha Hadid and Julie Mehretu, enjoys playing jazz piano repertoire from Thelonious Monk
    and Herbie Hancock, and collects limited‑edition prints from local muralists, letting these experiences inform their design sensibility.
  travel: Melvin is a thoughtful traveler who plans trips around architecture and cuisine, having explored Gaudí’s Barcelona, the modernist buildings of Melbourne, and the vibrant markets of Marrakech,
    while still dreaming of a road‑trip through the American South to document historic courthouses and savor regional flavors.
  culinary: Melvin is a home chef who blends Southern roots with global influences, regularly preparing shrimp‑and‑grits with miso glaze, collard greens stir‑fried with kimchi, and jambalaya spiced with
    saffron and harissa, often experimenting with sous‑vide techniques and sourcing fresh herbs from the local farmer’s market.
  core: Melvin Chance is a 39‑year‑old construction leader whose methodical project mastery coexists with a restless artistic spirit, expressed through jazz piano, architectural photography, and experimental
    Southern‑global cuisine.
background:
  cultural: Melvin grew up in a close‑knit Black middle‑class family in the Washington, D.C. metropolitan area, with deep ties to the historic African‑American neighborhoods of Montgomery County. His upbringing
    combined Southern cultural traditions—such as gospel music, storytelling, and soul food—with the diverse, multicultural vibrancy of the D.C. region. He participates in community events like Juneteenth
    celebrations and Black History Month panels, and his perspective on leadership is shaped by a strong commitment to social equity, community development, and the legacy of Black builders and architects
    who paved the way for modern construction practices.
