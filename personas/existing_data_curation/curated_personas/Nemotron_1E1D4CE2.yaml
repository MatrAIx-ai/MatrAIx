    Reading'', ''Philosophy Discussions'', ''Running Club'']'
  career_goals: Melvin aims to progress to a senior executive role, such as Vice President of Construction, where he can oversee large‑scale, environmentally‑forward projects across the Mid‑Atlantic. He
    aspires to launch a consultancy that fuses green building techniques with community‑focused public art installations, and to mentor emerging Black professionals in the construction industry.
