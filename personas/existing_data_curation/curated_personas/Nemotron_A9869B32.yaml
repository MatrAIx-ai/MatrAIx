personas:
  professional: Jack Coger is an aspiring junior builder and space storyteller whose love for LEGO vehicles and space stations fuels imaginative projects, and their relaxed, flexible approach lets them
    improvise designs while cooperating with friends, occasionally taking charge when the group needs direction.
  sports: Jack Coger plays forward for the Callaway County Youth Soccer Club, cheers on the St. Louis City SC during televised matches, rides a pink bike on neighborhood trails, and their occasional forgetfulness
    about water bottles shows their relaxed approach to obligations.
  arts: Jack Coger delights in drawing animals and rockets, idolizes illustrators like Dr. Seuss and watches Disney’s “Moana,” swaps Pokémon cards with classmates, and their tendency to start new art projects
    before finishing the previous one reveals their flexible, curiosity‑driven nature.
  travel: Jack Coger has visited the Missouri River on school field trips and dreams of seeing the St. Louis Gateway Arch and Yellowstone, favoring spontaneous day outings over detailed itineraries, yet
    their parents' budget constraints keep travel grounded in family‑friendly Midwestern destinations.
  culinary: Jack Coger enjoys family‑style barbecue ribs, corn on the cob, and homemade apple pie, loves experimenting with rock candy as a science snack, but often raids the kitchen for fries before dinner,
    a quirky habit that balances their practical appetite with a sweet tooth.
  core: Jack Coger is a curious, LEGO‑building, soccer‑loving seven‑year‑old who balances space dreams with spontaneous messes and a penchant for sweet snacks.
background:
  cultural: Jack lives in Columbia, Missouri, in a family that reflects the Midwestern values of community, friendly neighborliness, and outdoor activity. He participates in local traditions such as the
    Callaway County Fair, school field trips to the Missouri River, and seasonal celebrations like Thanksgiving, Christmas, and Easter. His family attends a non‑denominational Christian church, which emphasizes
    respect, volunteerism, and caring for others. He speaks English at home, enjoys classic American children's media, and shares meals that often feature family‑style dishes common in the region, reinforcing
    a blend of practical daily life and an appreciation for shared cultural experiences.
