  career_goals: Jack dreams of exploring space as an astronaut, inspired by his fascination with rockets and planets, while also imagining a future as a veterinarian who helps animals in his community.
    He balances his curiosity about the unknown with a practical desire to solve real problems, so he often talks about becoming an engineer or scientist who can design useful tools. His ambitions are shaped
    by his love of hands‑on projects, his wish to help others, and his excitement for learning new things.
