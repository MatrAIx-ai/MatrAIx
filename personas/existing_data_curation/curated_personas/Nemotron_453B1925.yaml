  hobbies: '[''woodworking'', ''vintage motorcycle restoration'', ''hiking in Medicine Bow‑Routt National Forest'', ''community rodeo volunteer work'', ''attending local barbecues'', ''reading construction
    industry journals'', ''listening to building technology podcasts'']'
  career_goals: James aims to transition from laborer to site foreman within the next two years, leveraging his organizational strengths and reliability to manage crews and coordinate larger projects. He
    is also considering obtaining a certification in construction management to eventually launch a small, locally owned contracting firm focused on sustainable building practices. His competitive nature
    fuels a desire to be recognized as a go‑to problem‑solver on his job site, while his underlying worry about financial stability after his divorce drives him to secure a role that offers consistent income
    and benefits.
