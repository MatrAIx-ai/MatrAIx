  career_goals: Anthony dreams of turning his passion for soccer into a professional career, aiming to earn a scholarship and play at the collegiate level before pursuing the sport professionally. Simultaneously,
    he is fascinated by technology and hopes to become a software engineer who designs video games, merging his gaming expertise with his budding coding skills. He plans to attend a STEM‑focused high school,
    study computer science in college, and eventually create programs that teach coding to other Puerto Rican youth, bridging his cultural pride with his technical ambitions. He also envisions traveling
    to Puerto Rico to connect with his heritage while keeping a structured, goal‑oriented path toward success.
