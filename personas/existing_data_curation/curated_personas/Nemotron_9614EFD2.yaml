personas:
  professional: Anthony Ballesteros, a 12-year-old aspiring coder, channels his love of structure and competition into building LEGO robotics and Scratch games, showcasing a practical mindset and a critical
    eye that fuels his early programming projects.
  sports: Anthony Ballesteros, a forward on the Northside Community Soccer Club, follows the tactical play of FC Barcelona and the high-energy style of LA Galaxy, while also cheering for the New York Yankees
    in baseball, balancing structured team training with personal skill drills.
  arts: Anthony Ballesteros powers through his evenings to the beats of Bad Bunny and classic salsa from Celia Cruz, sketches characters inspired by Alan Moore's "Watchmen" and collects Marvel's Spider-Man
    comics, letting music and visual storytelling shape his creative outlet.
  travel: Anthony Ballesteros enjoys short family road trips to Orlando's theme parks, has explored the historic streets of New York City, dreams of wandering the colorful markets of Marrakech, and hopes
    to one day surf the beaches of San Juan.
  culinary: Anthony Ballesteros revels in family cooking nights, where he helps roll pasteles dough, stir arroz con gandules with sofrito, and season dishes with plantains and adobo, while also snacking
    on pepperoni pizza and experimenting with homemade guacamole using ripe avocados and lime.
  core: Anthony Ballesteros is a competitive, structure-loving 12-year-old who balances soccer tactics, LEGO engineering, and strategic gaming, but often forgets to clean up his gaming snacks and procrastinates
    on school assignments.
background:
  cultural: Anthony grows up in a bilingual Puerto Rican household in Kissimmee, Florida, where Spanish is spoken at home and English dominates school and community life. He participates in cultural celebrations
    such as Three Kings Day, enjoys traditional foods like mofongo and arroz con pollo, and learns salsa dancing from family gatherings. The close‑knit family structure emphasizes respect for elders and
    community involvement, fostering a strong sense of identity and pride in his heritage. Local Puerto Rican festivals and community centers provide him with opportunities to connect with other diaspora
    families, reinforcing cultural values while navigating his American environment. This blend of cultures influences his outlook, fueling his ambition to succeed academically and athletically while staying
    rooted in his roots.
