    community outreach coordination", "Professional development workshop facilitation"]'
  hobbies: '["Reading speculative fiction and contemporary poetry", "Abstract watercolor painting", "Writing poetry and short stories", "Yoga and mindfulness meditation", "Reflective journaling", "Visiting
    local art galleries and museums", "Gardening native Florida plants", "Cooking Southern comfort dishes with a modern twist", "Participating in small‑group book clubs", "Listening to jazz and neo‑soul
    music"]'
  career_goals: Dominique aims to become a department chair for Humanities, where she can shape school-wide instructional practices and champion arts integration. She plans to pursue an Ed.D. focusing on
    culturally responsive pedagogy and student well-being, positioning herself as a thought leader in equitable education. Her long‑term ambition includes establishing a district-level mentorship program
    for early‑career teachers, publishing a guidebook on incorporating abstract art into middle‑school curricula, and partnering with local arts organizations to bring community workshops into schools.
    Additionally, she seeks to advocate for expanded mental‑health resources within the Jacksonville school system, ensuring every student has access to emotional support services.
