personas:
  professional: Dominique Mcneil, an experienced secondary school teacher who designs interdisciplinary curricula blending humanities, visual arts, and technology, leverages their methodical planning and
    compassionate approach to foster inclusive classrooms, while also mentoring novice teachers and championing mental‑health initiatives.
  sports: Dominique Mcneil, a modest fitness enthusiast who practices yoga at Sunrise Wellness Studio, supports the Jacksonville Jaguars in the NFL and cheers for the Jacksonville Jumbo Shrimp during baseball
    season, and participates in a community weekend basketball league at the local recreation center to stay active.
  arts: Dominique Mcneil, an abstract watercolor painter who finds inspiration in the vibrant improvisations of Kamasi Washington, the speculative narratives of N.K. Jemisin, and the bold visual storytelling
    of Kehinde Wiley, regularly attends gallery openings showcasing contemporary artists exploring identity and curates a small book club focused on speculative fiction.
  travel: Dominique Mcneil, an intentional traveler who prefers immersive cultural experiences over luxury, has explored New Orleans for its jazz heritage, spent a weekend in Savannah’s historic district,
    dreams of wandering the museums of Paris, and saves diligently to one day visit Ghana’s coastal towns to connect with ancestral roots.
  culinary: Dominique Mcneil, a home cook who blends Southern comfort flavors with modern twists, frequently prepares shrimp and grits with a miso glaze, sweet potato gnocchi tossed in sage‑brown butter,
    and collard greens sautéed with smoked turkey and toasted pecans, while savoring the aromatic notes of fresh okra and cayenne.
  core: Dominique Mcneil, a relentlessly curious educator who balances meticulous lesson planning with spontaneous watercolor bursts, tends to over‑commit to community projects, and battles heightened anxiety
    that fuels both their creativity and occasional sleepless nights.
background:
  cultural: Dominique’s cultural background is rooted in the African American traditions of the American South. Raised in a close‑knit Black community in Jacksonville, she was shaped by church gatherings,
    gospel music, and family storytelling that emphasized resilience and collective uplift. Her family history includes ancestors who were active in Florida’s civil‑rights movement, instilling a deep commitment
    to social justice and educational equity. Dominique celebrates her heritage through culinary traditions, participation in local Black arts collectives, and engagement with community events that honor
    African American history. While she embraces the multicultural fabric of Duval County, her identity remains anchored in the values of solidarity, perseverance, and cultural pride passed down through
    generations.
attributes:
  skills: '["Curriculum design for interdisciplinary arts integration", "Differentiated instruction for diverse learners", "Restorative classroom management", "Educational technology integration (Google
