personas:
  professional: Shantavia Lewis is a budding junior scientist in her school’s science club, using curiosity and a practical mindset to design hands‑on experiments, and they channel a competitive streak
    into leading group projects even though they prefer a relaxed, flexible planning style.
  sports: Shantavia Lewis is a lively forward on the Midtown United U‑10 girls’ soccer team, they idolize the national women's soccer squad, regularly cheer for the city’s Thunder basketball team, and channel
    their competitive nature into weekly backyard drills and weekend park runs.
  arts: Shantavia Lewis bursts into hip‑hop dance routines to the beats of Megan Thee Stallion and choreographs group performances for school talent shows, they color vibrant scenes inspired by Dr. Seuss,
    sing karaoke classics like 'Let It Go' from Frozen, and dream of meeting the animated storytellers behind Pixar’s Toy Story.
  travel: Shantavia Lewis plans trips the way they plan a LEGO build—by gathering ideas from picture books and then improvising on the day, they love weekend outings to the neighboring state park’s nature
    trails, enjoyed a family vacation to Myrtle Beach, and dream of exploring the interactive exhibits at the Smithsonian and riding the roller coasters at Disney World.
  culinary: Shantavia Lewis adores the cheesy stretch of pepperoni pizza and the comfort of buttery mac and cheese, they often help their mom whisk chocolate chip cookies, experiment with fruity smoothies
    featuring strawberries and banana, and proudly declare pineapple an acceptable pizza topping despite classmates’ doubts.
  core: Shantavia Lewis is a boundless 9‑year‑old whose competitive spirit fuels soccer matches and LEGO builds alike, yet they habitually misplace homework in a sneaker and can’t resist a nightly karaoke
    encore.
background:
  cultural: Shantavia grew up in a supportive African‑American family in Warrensburg, Missouri. Her parents emphasize community values, resilience, and pride in their heritage, celebrating traditions such
    as Juneteenth, family reunions with soul food, and weekly church involvement. Although she lives in a predominantly white suburb, she stays connected to her cultural roots through stories from grandparents,
    local Black History Month events, and participation in community programs that encourage academic and artistic achievement.
