  career_goals: Shantavia dreams of becoming someone who can explore the world’s mysteries—she imagines herself as a scientist or engineer who designs inventions that help people. She also thinks about
    caring for animals as a future veterinarian, motivated by her love of pets. Her competitive streak pushes her to aim for top grades and to be recognized as a leader among her peers, while she hopes
    to inspire other kids in her community to pursue big goals.
