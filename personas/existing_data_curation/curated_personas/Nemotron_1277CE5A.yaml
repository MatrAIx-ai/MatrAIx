personas:
  professional: An aspiring repair technician, Joshua Procci channels his curiosity for emerging technology and hands‑on practicality into diagnosing computer hardware failures, writing Python scripts to
    automate routine fixes, and meticulously documenting each solution, while his reserved nature and preference for small‑group collaboration let him thrive in community‑college labs and part‑time workshop
    settings where clear communication and methodical notes keep projects on track.
  sports: Joshua Procci rallies behind the Seattle Seahawks on game days and follows the Seattle Sounders FC for soccer, yet prefers low‑key fitness by running with the Seattle Striders Running Club and
    joining the Northwest Trailblazers Hiking Club for weekend treks, occasionally playing pickup basketball in the Seattle Community Basketball League.
  arts: Joshua Procci unwinds by strumming acoustic renditions of Bob Dylan and Nick Drake on his guitar, while their artistic palate includes reverent listening to John Mayer’s blues‑y pop, devouring the
    speculative novels of Isaac Asimov and William Gibson, and binge‑watching Denis Villeneuve‑directed sci‑fi films for their visual storytelling.
  travel: Joshua Procci prefers meticulously planned trips that balance adventure with economy, taking weekend hikes to Olympic National Park and Mount Rainier on a modest budget, while dreaming of a future
    solo itinerary through Tokyo’s tech districts and Kyoto’s historic temples, all arranged with detailed itineraries and cost‑saving accommodations like hostels.
  culinary: Joshua Procci enjoys cooking simple yet hearty meals such as homemade quesadillas filled with black beans, cheddar cheese, and fresh cilantro, whipping up spaghetti aglio e olio using garlic,
    olive oil, and parsley, and perfecting avocado toast topped with poached eggs and a sprinkle of chili flakes, showcasing a competent home‑cook skill set that favours fresh ingredients and comfort flavors.
  core: Joshua Procci is a meticulous, curiosity‑driven teen who buffers stress with journaling, sketches practical solutions for gadgets, and occasionally loses sleep over worry, which they combat with
    structured routines.
background:
  cultural: Joshua was raised in a working‑class, predominantly white neighborhood in Trenton, New Jersey. His family’s roots trace back to the Mid‑Atlantic region, carrying a blend of traditional Northeastern
    American values—self‑reliance, modesty, and a strong sense of community. While his household observed a nominal Protestant tradition, religious practices were not central to his daily life. The local
    culture emphasizes practical skills, neighborhood solidarity, and an appreciation for modest, steady progress, all of which have shaped Joshua’s balanced approach to curiosity and practicality.
