  career_goals: Joshua aims to complete his GED within the next year and enroll in a community‑college program focused on information technology or a trade such as automotive technology. He aspires to obtain
    industry certifications—such as CompTIA A+ or an automotive service technician credential—to secure a stable entry‑level position that balances technical problem‑solving with reliable, hands‑on work.
    In the longer term, he hopes to run his own modest repair shop or freelance tech support service, allowing him to blend his curiosity for new technologies with practical, client‑focused solutions. Parallel
    to his professional goals, Joshua is committed to developing coping strategies for stress, including regular journaling and occasional counseling, to improve his emotional resilience.
