persona_description: A human rights advocate who specializes in the study of indigenous rights, particularly the rights of the Yanomami Indians. She has extensive knowledge of the Brazilian Constitution,
  the Estatuto do Indio, and the FUNAI. She has a deep understanding of the history of the Yanomami Indians and their struggle for their land and rights. She is also familiar with the political landscape
  of Brazil and the international human rights community. She has experience in advocating for the protection of indigenous rights and has a track record of success in securing the rights of indigenous
  peoples.
