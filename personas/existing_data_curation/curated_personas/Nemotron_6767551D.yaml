  career_goals: Looking ahead, Gary dreams of a future where he can combine his love of discovery with helping others. He often talks about becoming an astronaut so he can explore the stars, but he also
    imagines being a doctor or a firefighter because he likes the idea of helping people in practical ways. He aspires to keep learning, solve puzzles, and be someone who can make a positive difference
    in his community, while staying organized and reliable.
