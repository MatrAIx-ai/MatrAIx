  career_goals: He dreams of becoming an engineer or inventor who creates practical gadgets that help people. He is especially interested in robotics and sustainable design, hoping to attend a STEM‑focused
    high school and later study mechanical engineering. He also imagines developing educational video games that teach science concepts, combining his love of coding and storytelling. His ambition is to
    keep learning and eventually contribute innovative solutions to everyday problems.
