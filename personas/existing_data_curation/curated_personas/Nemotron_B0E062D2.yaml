  hobbies: '[''sketching desert landscapes'', ''hiking'', ''photography'', ''listening to experimental electronic music'', ''digital collage creation'', ''reading speculative fiction'', ''philosophy'',
    ''open mic and improv workshops'', ''vinyl record collecting'', ''indie video gaming'', ''fusion cooking'']'
  career_goals: He aims to build a flexible freelance career as a visual artist and UI/UX designer, creating concept art for indie games and branding for local businesses. Over the next few years he plans
    to develop a robust portfolio, secure regular freelance contracts, and eventually launch his own boutique creative studio that blends desert‑inspired aesthetics with digital media. He also hopes to
    contribute to community art projects, such as curating an annual art walk in Peoria, while maintaining the autonomy to explore varied creative opportunities.
