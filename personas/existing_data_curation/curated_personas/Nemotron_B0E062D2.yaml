personas:
  professional: Dareion Kirsch, a 19‑year‑old visual artist and budding UI/UX designer, they leverage hand‑drawing, watercolor, Photoshop, and Blender to craft desert‑inspired concept art for indie games
    while juggling a habitually loose schedule and a fiercely competitive edge in client negotiations.
  sports: Dareion Kirsch, an avid hiker of Sonoran Desert trails, they join the Peoria Trail Runners club for weekend runs, shoot occasional pickup basketball games, and root for the Phoenix Suns and Arizona
    Cardinals while disdaining overly regimented gym routines.
  arts: Dareion Kirsch, collector of vintage vinyl from Aphex Twin to Boards of Canada, they frequent open‑mic nights and improv workshops, mix experimental electronic soundtracks into digital collages,
    and draw inspiration from local desert festivals to shape a quirky, genre‑blending artistic identity.
  travel: Dareion Kirsch, a spontaneous traveler, they have roamed the Sonoran Desert, trekked through Joshua Tree, dream of exploring Morocco’s Sahara, plan trips on a whim using budget airlines and Airbnb,
    but often postpone travel due to freelance project deadlines.
  culinary: Dareion Kirsch, an adventurous home cook, they blend southwestern staples like chiltepin and prickly pear with global dishes, crafting chipotle ramen, cactus‑infused sushi rolls, and mezcal‑glazed
    pork belly while occasionally over‑spicing and burning the edges of experimental meals.
  core: Dareion Kirsch, the desert‑inspired 19‑year‑old artist who thrives on spontaneous creation, sporadic budgeting, occasional health improvisation, and a relentless curiosity that fuels both artistic
    experiments and a penchant for over‑cooked fusion dishes.
background:
  cultural: Dareion grew up in a middle‑class white family in Peoria, AZ, a suburban community within the Phoenix metropolitan area. The desert environment and the multicultural tapestry of the Southwest—visible
    in local Native American and Mexican art, music, and cuisine—have shaped his aesthetic sensibilities. He was raised with typical American suburban values of independence, self‑reliance, and a relaxed,
    flexible approach to life, while gaining exposure to diverse artistic expressions through school art programs, community workshops, and regional galleries.
