personas:
  professional: Dominique Torres is a data‑driven early‑childhood curriculum specialist in the Bronx, harnessing bilingual communication, meticulous project‑management, and a pragmatic curiosity to design
    evidence‑based STEM programs while competitively advocating for measurable school‑readiness outcomes, and they excel at translating data into actionable improvements.
  sports: Dominique Torres is a dedicated runner who logs 5‑6 miles through Van Cortlandt Park each morning, attends weekly Vinyasa yoga classes at a local studio, supports the New York Yankees during baseball
    season, and plays on a co‑ed amateur soccer league affiliated with the Bronx Soccer Club, and they approach fitness with a structured, competitive mindset.
  arts: Dominique Torres nurtures a passion for street photography, regularly visits galleries featuring works by Banksy‑inspired muralists, attends live salsa and plena performances by artists such as
    Rubén Blades and a local Celia Cruz tribute band, and enjoys the films of Pedro Almodóvar and the poetry of Julia de Burgos, and they draw creative inspiration from the city’s rhythmic energy.
  travel: Dominique Torres prefers purposeful travel, planning weekend hikes in the Catskill Mountains, wine‑tasting trips to the Hudson Valley, and annual flights to San Juan for coastal cuisine, while
    keeping a bucket‑list that includes exploring Barcelona’s modernist architecture and Valparaíso’s vibrant street art scene, and they balance a love for adventure with budget‑conscious scheduling.
  culinary: Dominique Torres frequently cooks classic mofongo with fried plantains, garlic, pork cracklings, and sofrito, experiments with Japanese ramen broth using kombu, miso, and chashu pork, and prepares
    fresh ceviche with lime, cilantro, and shrimp, and they showcase a confident home chef who blends island flavors with global techniques.
  core: Dominique Torres blends methodical ambition with a curious, competitive spirit, juggling data‑driven early‑learning advocacy, disciplined finances, vigilant health routines, and a love for running,
    photography, and multicultural cuisine, and they occasionally over‑book their calendar and hoard unfinished puzzles.
background:
  cultural: Dominique grew up in the Bronx as a second‑generation Puerto Rican, raised in a bilingual household where Spanish and English were spoken interchangeably. Her family traditions—celebrating Puerto
    Rican holidays, cooking dishes like mofongo, and listening to plena and salsa—instilled a deep appreciation for her island roots. Living in a multicultural borough, she has been shaped by the neighborhood’s
    vibrant street art, community activism, and the strong sense of solidarity among Latinx families. This cultural foundation informs her commitment to educational equity for Latino children and motivates
    her involvement in local cultural festivals and bilingual advocacy initiatives.
attributes:
  skills: '[''STEM Curriculum Design'', ''Data Analysis and Reporting'', ''Program Evaluation'', ''Budget Planning and Management'', ''Regulatory Compliance (NYC DOE)'', ''Educational Technology Integration'',
