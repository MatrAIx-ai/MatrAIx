  hobbies: '[''Running'', ''Yoga'', ''Urban Photography'', ''Cooking (Puerto Rican and international cuisine)'', ''Reading (science and contemporary fiction)'', ''Puzzle solving (crosswords, Sudoku)'',
    ''Volunteering at youth community programs'', ''Attending live music performances'']'
  career_goals: Dominique aims to become a district‑wide Director of Early Childhood Education, scaling successful STEM initiatives across Bronx schools. She plans to earn a master's degree in Educational
    Leadership within the next two years to deepen her policy expertise. Her long‑term ambition includes founding a community‑based nonprofit that provides low‑cost, high‑impact STEM enrichment for underserved
    preschoolers, positioning her organization as a benchmark for measurable improvement in school readiness. She also seeks recognition as a thought leader through publishing research on culturally responsive
    STEM pedagogy.
