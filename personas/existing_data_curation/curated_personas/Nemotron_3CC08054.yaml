personas:
  professional: Paulette Mitchell, a 1‑year‑old budding sensory analyst, channels an unexpected blend of boundless imagination and toddler‑level discipline by meticulously sequencing colored blocks, echoing
    the systematic approach of a future data scientist while joyfully narrating imagined stories to anyone who will listen.
  sports: Paulette Mitchell, a 1‑year‑old, enjoys the rhythmic flow of toddler gymnastics at the LittleLeaps club, giggles while toddling in the park during spring, and proudly dons a tiny cap of the hometown
    baseball team, the River City Rapids, mimicking the cheering chants of the crowd.
  arts: Paulette Mitchell, a 1‑year‑old, immerses herself in the vibrant worlds of children’s music, grooving to Raffi’s ‘Baby Beluga’, delighting in the colorful animations of Disney’s ‘Moana’, and clapping
    along to The Wiggles’ ‘Fruit Salad’, which together shape her early sense of rhythm, color, and narrative.
  travel: Paulette Mitchell, a 1‑year‑old, favors short car‑trip adventures to nearby family‑friendly spots such as the local aquarium and the countryside farm where she can explore open fields, while dreaming—through
    picture books—of a future visit to Disneyland in Anaheim, reflecting a blend of comfort‑oriented excursions and whimsical destination cravings.
  culinary: Paulette Mitchell, a 1‑year‑old, shows a forming palate for smooth vegetables, regularly requesting avocado mash seasoned with a pinch of lemon, sweet potato puree with a dusting of cinnamon,
    and enjoys the tactile fun of splashing yogurt, all while mastering the art of self‑feeding with a tiny silver spoon.
  core: Paulette Mitchell, a 1‑year‑old, fuses boundless curiosity with a surprising imprint of order, turning everyday block‑stacking into miniature architecture, hoarding shiny coins, and orchestrating
    bedtime routines that could rival a seasoned planner.
background:
  cultural: Paulette is an African‑American child raised in Las Vegas, Nevada. Her family embraces Black cultural traditions, including soulful music, storytelling, and community gatherings, while also
    absorbing the diverse artistic influences of the city. The vibrant mix of African‑American heritage and the eclectic Las Vegas arts scene provides her with a rich tapestry of sounds, colors, and communal
    experiences that shape her early development and future aspirations.
