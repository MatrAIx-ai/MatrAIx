  career_goals: Although only a year old, Paulette's emerging love for creative expression and her disciplined nature suggest future aspirations of becoming an artist or community storyteller who celebrates
    her cultural heritage. Her parents envision her growing into a role that blends imagination, leadership, and cultural advocacy—perhaps as an educator, performer, or community organizer who uses visual
    and musical mediums to inspire harmony and joy.
