  career_goals: In the short term, Donald plans to enroll in a technical certification program for automotive technology at a local community college, aiming to earn ASE certification and secure an apprenticeship
    at a reputable garage within the next two years. Simultaneously, he is exploring the possibility of joining the York County sheriff’s office after completing the required training, drawn by the clear
    structure and community interaction the role offers. Long‑term, he aspires to combine his technical expertise and public service by opening his own auto‑detail and repair shop that also serves as a
    community hub for local youth, possibly mentoring aspiring mechanics and offering job‑training opportunities.
