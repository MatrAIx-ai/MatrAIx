personas:
  professional: Donald Velez is an aspiring automotive technician enrolled in a community‑college certification program, who applies the teamwork and quick decision‑making skills honed on his high‑school
    basketball court to the structured yet hands‑on demands of ASE coursework, while they balance a relaxed, sometimes disorganized work style that lets them troubleshoot car problems on the fly.
  sports: Donald Velez is a regular point guard for the York County Community Center basketball league, a fall pick‑up football participant, a diligent weightlifter at the local gym, a faithful fan of the
    Charlotte Hornets and Carolina Panthers, and an occasional angler who heads to the Catawba River for weekend fishing trips, and they relish the camaraderie of team sports.
  arts: Donald Velez curates a soundtrack that swings from Luke Bryan’s country hits to Travis Scott’s trap anthems, enjoys binge‑watching the Fast & Furious franchise and quoting Friday Night Lights, and
    they often share memes of Michael Jordan during social gatherings, blending music, film, and sports icons into their cultural expression.
  travel: Donald Velez prefers spontaneous weekend road trips, having driven down to Myrtle Beach for a fishing weekend and dreaming of a future cross‑country cruise to Detroit’s Motor City to soak up the
    auto scene, while a spring break to New Orleans remains on their travel wishlist, and they plan each trip with a mix of spontaneity and a rough budget.
  culinary: Donald Velez favors greasy comfort foods like a classic cheeseburger topped with caramelized onions, sharp cheddar, and pickles, served with seasoned sweet‑potato fries, but can also whip up
    a decent chicken stir‑fry with soy sauce, garlic, and bell peppers, though they rarely venture beyond these staples.
  core: Donald Velez is a high‑energy, community‑oriented 19‑year‑old who juggles a love for fast cars, competitive gaming, and team sports, often navigating chaos with a laid‑back streak and a habit of
    leaving car tools scattered across the house.
background:
  cultural: Donald was raised in Rock Hill, South Carolina, a midsized city in York County where Southern hospitality and community involvement are deeply valued. His family participates in local church
    events and neighborhood gatherings, and his upbringing was shaped by regional traditions such as weekend high‑school football, backyard barbecues, and seasonal festivals. The area’s emphasis on close‑knit
    community ties, modest working‑class values, and a blend of rural and urban influences have instilled in him a respect for hard work, a love for team sports, and an appreciation for the simple social
    rituals that bring neighbors together.
