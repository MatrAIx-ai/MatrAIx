  hobbies: '[''Woodworking and furniture restoration'', ''Model kit assembly (classic cars, trains)'', ''Puzzle solving (crosswords, Sudoku)'', ''Listening to jazz, soul, and early hip‑hop records'', ''Community
    garden plot cultivation'', ''Reading historical biographies and memoirs'', ''Cooking and perfecting traditional soul‑food recipes'']'
  career_goals: Colby aims to formalize the practical knowledge he already possesses by completing his GED and earning a certification as a Home Repair Technician. He plans to launch a small, part‑time
    handyman service that operates on a predictable schedule, allowing him to maintain his preferred routine while generating a steady income for his family. His ambition is to become the go‑to reliable
    contractor in his Bronx neighborhood, known for punctual, high‑quality work. Over the next few years he hopes to achieve financial stability that reduces his chronic worry, and eventually transition
    to a low‑stress, contract‑only arrangement that lets him keep his solitary work style. He also wants to mentor a younger relative in practical trades, passing on his methodical approach to work and
    life.
