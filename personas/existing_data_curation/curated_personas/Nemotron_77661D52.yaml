personas:
  professional: An enthusiastic preschool learner, Chung Le leads block constructions with a blend of curiosity and practical organization, turning imaginative play into mini project-management lessons
    while competing to have the biggest tower on the sandbox, and often offers to tidy the play area after group activities, which they do with a smile.
  sports: A lively member of the Appleton Wildcats Soccer Club, Chung Le dashes through weekend practices, proudly wears a Green Bay Packers jersey during football season, enjoys diving into swim lessons
    at the Appleton Aquatic Center, and in snowy months zooms down the local hill on a sled while always aiming to be the fastest racer on the playground, which they achieve by timing each run with precise
    focus.
  arts: A budding little artist, Chung Le delights in drawing bright comic-style characters with watercolor crayons while singing Raffi’s 'Baby Beluga' and Disney’s 'Let It Go', attends weekend cultural
    performances where they practice simple Cantonese folk songs during Mid-Autumn Festival celebrations, and they frequently watch animated short films by Studio Ghibli for inspiration.
  travel: An inquisitive explorer, Chung Le joins family road trips to Wisconsin Dells for water-park splashes, treasures weekend visits to the nearby Green Bay Packers Hall of Fame, dreams of experiencing
    the lantern festivals of Hong Kong for the Mid-Autumn Festival, and they prefer itineraries that include a brief stop at a favorite ice-cream shop for a sweet treat.
  culinary: A tiny chef in training, Chung Le eagerly assists in rolling pork-and-chive dumplings and enjoys the sweet lotus-seed filling of mooncakes, loves slurping noodle soup with a sprinkle of sesame
    oil, proudly perfects butter-melted mac and cheese seasoned with a dash of soy sauce, and they occasionally sneak a bite of cookie dough when no one's watching.
  core: Chung Le, a 5-year-old who blends boundless curiosity with a competitive streak, orchestrates playground games with organized flair, savors dumplings and mooncakes, hoards stickers for future trades,
    and calmly handles minor setbacks with a grin, proving they can adapt quickly.
background:
  cultural: Mark comes from an East Asian—specifically Chinese—family that immigrated to the United States. At home, Cantonese is spoken alongside English, and the family celebrates Lunar New Year, Mid-Autumn
    Festival, and serves traditional dishes like dumplings and mooncakes. Living in Appleton, WI, he blends his cultural heritage with Midwestern American customs, attending a local preschool while also
    taking weekend Chinese language classes.
