  career_goals: He frequently talks about wanting to become an astronaut or a civil engineer so he can build rockets and bridges, dreaming of leading a team of explorer-friends on missions. He also enjoys
    the idea of being a soccer team captain, showing his competitive drive and desire to guide others.
