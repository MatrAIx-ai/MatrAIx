personas:
  professional: Bryant Aradom is a budding junior game developer who spends after‑school hours hacking strategy‑RPG mods on his Arduino‑powered handheld, leveraging an analytical mind and love of fantasy
    to prototype mechanics while a relaxed, sometimes disorganized work style yields creative, albeit messy, code sprints.
  sports: Bryant Aradom enjoys low‑key fitness through late‑afternoon park walks, occasional pickup basketball games with friends, and a membership in the Riverdale Youth Skate Club, while cheering on the
    Chicago Bulls and rooting for the local high school soccer team during the fall season.
  arts: Bryant Aradom channels their creative spark into digital illustrations inspired by Studio Ghibli’s whimsical worlds and Mike Mignola’s bold line work, while lo‑fi beats from Nujabes and J Dilla
    soundtrack late‑night coding marathons, making art both a refuge and a personal brand.
  travel: Bryant Aradom’s travel style mixes spontaneous weekend trips to nearby state parks like Yosemite with dream‑filled plans to visit Tokyo for anime conventions and the breathtaking fjords of New Zealand,
    balancing a limited family budget with a vivid imagination fueled by fantasy novels.
  culinary: Bryant Aradom prefers quick comfort foods such as pepperoni pizza and instant ramen, but occasionally experiments with beginner‑level recipes like matcha‑green tea smoothies and homemade sushi
    rolls, savoring the salty‑umami of soy sauce and the crisp freshness of cucumber.
  core: Bryant Aradom is a curious, slightly disorganized teen who turns anxiety into artistic fuel, hoarding LED strips for Arduino projects while obsessively tracking in‑game stats and occasionally forgetting
    to do homework.
background:
  cultural: Bryant is a second‑generation Asian American growing up in Lawrence, Kansas. His parents come from a mixed Asian background, exposing him to a blend of cultural traditions such as celebrating
    Lunar New Year, enjoying a variety of Asian cuisines at home, and occasionally speaking a heritage language. At the same time, he is immersed in Midwestern American life, participating in community
    events, school activities, and local sports. This bicultural environment informs his tastes in food, media—like anime and Western graphic novels—and his values, which combine an emphasis on education
    with an appreciation for individuality and personal expression.
