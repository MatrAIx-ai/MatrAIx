  career_goals: Bryant hopes to turn his passion for technology and storytelling into a career in software development or video game design. He aims to attend a university with a strong computer science
    program—ideally the University of Kansas—where he can deepen his coding abilities and learn game development pipelines. Long-term, he aspires to work as a game programmer or UI/UX designer, creating
    engaging experiences that also incorporate tools for mental well‑being. He is driven by the desire to merge his practical problem‑solving skills with his creative interests, while seeking a work environment
    that offers flexibility and a supportive team.
