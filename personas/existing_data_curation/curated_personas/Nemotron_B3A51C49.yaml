personas:
  professional: Mitchell Desimone, a 35‑year‑old CNC machinist adept at SolidWorks and precision milling, channels their curiosity and love of spontaneous problem‑solving into creating custom metal sculptures
    and functional art while they wrestle with deadline pressure as they eye a future as a master CNC programmer and boutique studio owner.
  sports: Mitchell Desimone, a fervent outdoor enthusiast, rides with the Atlanta Mountain Bikers Association on the Chattahoochee trails, follows the Atlanta Falcons, Hawks, and United for weekend sports
    buzz, and they occasionally join casual pick‑up basketball games at the community center to stay fit.
  arts: Mitchell Desimone, regularly attending Atlanta art openings featuring works by Ai Weiwei and local sculptor Jana McGovern, blends their maker‑space collaborations on vintage motorcycle frames with
    impromptu harmonica jam sessions inspired by Bob Dylan, while they collect limited‑edition prints by Jeff Koons for personal inspiration.
  travel: Mitchell Desimone prefers loosely planned road trips that balance adventure and family obligations, having explored the Blue Ridge Parkway, spent a weekend in Asheville’s craft breweries, and
    they dream of a future pilgrimage to the marble quarries of Carrara to study stonework firsthand.
  culinary: Mitchell Desimone, an intermediate home chef, delights in recreating Sunday pasta al ragù with slow‑cooked San Marzano tomatoes, fresh basil, and aged Pecorino, while they experiment with charcoal‑grilled
    vegetables and enjoy pairing meals with robust Chianti.
  core: Mitchell Desimone is a restless craftsman who melds precision machining with spontaneous art, hoards premium metal scraps like a treasure, and they compulsively check their email at odd hours, even
    as they struggle to meet deadlines.
background:
  cultural: Mitchell was raised in Union City, Georgia, in a working‑class family with deep Italian roots; his grandparents immigrated from southern Italy and instilled a respect for craftsmanship and family
    meals. Growing up in the American South, he absorbed the region’s hospitality, love of community gatherings, and a strong work ethic. While he identifies as white, his cultural identity blends Italian
    traditions—such as Sunday pasta dishes and a reverence for artisanal skill—with Southern values like neighborly support and an appreciation for outdoor recreation. These influences shape his approach
    to both his trade and his creative pursuits.
attributes:
  skills: '[''CNC milling and turning'', ''Blueprint and technical drawing interpretation'', ''CAD/CAM (SolidWorks, Fusion 360)'', ''Precision measurement (CMM, micrometers, calipers)'', ''Machine maintenance
    and troubleshooting'', ''Custom metal art fabrication'', ''Improvisational problem solving'', ''Tool selection and setup'', ''Material selection (steel, aluminum, brass)'', ''Basic G-code programming'']'
  hobbies: '[''Visiting art galleries and museums'', ''Participating in maker meetups and DIY projects'', ''Metal sculpture and functional art creation'', ''Mountain biking and hiking'', ''Playing harmonica
    and attending jam sessions'', ''Cooking Italian cuisine'', ''Listening to podcasts on engineering and design'', ''Attending regional maker fairs and contests'']'
  career_goals: Mitchell aims to transition from a shop‑floor machinist to a master CNC programmer and eventually open his own boutique metal fabrication studio that specializes in limited‑edition art pieces
    and functional components for local designers. He plans to earn certifications such as CNC Programming (ISO 9001) and Six Sigma Yellow Belt, and to complete an associate degree in Mechanical Engineering
    Technology. Over the next five years, he hopes to lead a team of machinists, develop proprietary machining processes that reduce waste, and showcase his work at regional maker fairs and art exhibitions.
