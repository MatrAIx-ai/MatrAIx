  career_goals: Although retired, Vanessa aims to deepen her impact on the local senior community. She aspires to become chair of the Calcasieu Parish Senior Advisory Board, where she can influence policies
    that improve accessibility to healthcare and recreation for older adults. Vanessa also plans to launch a community garden that doubles as an intergenerational learning space, fostering mentorship between
    seniors and youth. On a personal level, she wishes to compile oral histories of longtime residents, preserving the region’s stories for future generations, and to author a memoir that chronicles her
    life’s lessons and the cultural shifts she has witnessed. Additionally, she is motivated to master video editing so she can create engaging digital content for local NGOs.
