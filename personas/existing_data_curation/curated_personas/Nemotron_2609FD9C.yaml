    California procedural rules", "Administrative support for trial preparation"]'
  hobbies: '["Gardening (vegetables and herbs)", "Traditional Mexican cooking", "Reading historical fiction and Mexican literature", "Crossword puzzles and Sudoku", "Small‑group wine tastings at local vineyards",
    "Knitting circle with church friends", "Volunteer bilingual storytime reading at local library"]'
  career_goals: Looking ahead, Ana aims to leverage her extensive experience into a senior administrative leadership role within her firm, such as Legal Office Manager or Senior Legal Secretary. She plans
    to obtain the Certified Legal Manager (CLM) credential to formalize her expertise and position herself as a go‑to resource for workflow optimization. Over the next five years, she hopes to mentor a
    new generation of legal assistants, develop streamlined filing and case‑tracking protocols, and possibly launch a part‑time consulting service for small law practices in the Paso Robles area, focusing
    on improving efficiency for attorneys serving the agricultural and wine‑industry sector. While she values stability, she also seeks a balanced schedule that allows more time for family and community
    involvement.
