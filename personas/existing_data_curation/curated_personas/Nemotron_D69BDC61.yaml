  hobbies: '["Gardening", "Hiking", "Book club", "Yoga", "Cooking/Baking", "Volunteer at historical society", "Neighborhood potluck organizer", "Karaoke", "Community theater", "Visiting art galleries",
    "Attending concerts"]'
  career_goals: Renee aims to move beyond her current cashier role into a supervisory position within the next two years, targeting a shift supervisor title and eventually a store manager role. To support
    this trajectory, she plans to enroll in a retail management certification program and take evening courses toward an associate degree in business administration. Long‑term, she envisions leveraging
    her humanities background by managing a boutique or a cultural‑institution gift shop that emphasizes community engagement. She also dreams of opening a small, family‑run coffee and craft shop in Brookfield
    that can serve as a gathering spot for neighbors, blending her love for hospitality, organization, and local culture while providing a stable income for her family.
