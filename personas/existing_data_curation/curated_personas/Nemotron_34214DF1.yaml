  hobbies: '[''Vegetable gardening'', ''Collecting vintage film cameras'', ''Refurbishing cameras'', ''Reading non-fiction (history, photography, self-discipline)'', ''Chess'', ''Volunteer photography for
    church events'', ''Walking along the Anacostia River'']'
  career_goals: At 60, Nathaniel aims to cement his legacy as a visual historian of Prince George’s County’s Black community. He plans to publish a coffee‑table book that combines his documentary series
    on local traditions with personal narratives. He wishes to establish a small gallery‑studio that serves as a mentorship hub for emerging Black photographers, offering apprenticeship programs and workshops
    on disciplined workflow. He also hopes to secure a grant from the Maryland Arts Council to create an oral‑history project that pairs his photographs with recorded interviews of senior community members.
    Ultimately, he wants his body of work to be archived in the University of Maryland’s Special Collections for future scholars.
