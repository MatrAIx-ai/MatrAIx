  hobbies: '["Reading (Science Fiction, Graphic Novels)", "Digital Illustration", "Basketball", "Hip‑Hop & R&B Dancing", "Community Gardening", "Robotics Club (Scratch, LEGO)", "Vlogging (DIY & Educational
