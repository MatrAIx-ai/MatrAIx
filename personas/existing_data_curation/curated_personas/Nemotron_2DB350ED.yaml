  career_goals: Jessyca envisions a future where her love for technology meets her desire to uplift her community. She aims to pursue a degree in computer science with a focus on educational technology,
    hoping to develop apps that make learning more engaging for middle‑school students, especially in under‑resourced neighborhoods. She also considers a role as a community data analyst, using her analytical
    skills to address environmental and public‑health challenges in Cleveland. Practically, she plans to take advanced STEM courses, seek mentorship through local tech programs, and participate in summer
    coding bootcamps. Her long‑term ambition includes founding a nonprofit that provides free digital‑literacy workshops for teens, combining her technical expertise with her cooperative and assertive nature
    to create lasting impact.
