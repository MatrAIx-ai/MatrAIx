personas:
  professional: Linda Hall, a 12‑year‑old budding robotics enthusiast, channels their love for clear rules and quick feedback into designing competition‑ready LEGO mechanisms and leading their school's
    robotics club with a competitive edge, while balancing a relaxed attitude toward deadlines.
  sports: Linda Hall enjoys biking around Ypsilanti, swimming at the community pool, and cheering for the Detroit Tigers and Michigan Wolverines, while participating in a local youth swim team that practices
    after school, a routine that satisfies their need for structured competition and occasional social interaction.
  arts: Linda Hall immerses themselves in piano practice, favoring the emotive works of Ludovico Einaudi and the classic melodies of The Beatles, while devouring mystery and science‑fiction novels such
    as 'The Mysterious Benedict Society' and 'Ender's Game', which shape their imaginative escape from daily stress.
  travel: Linda Hall prefers short, well‑planned weekend trips to nearby cities like Detroit and Ann Arbor, yet dreams of visiting the Kennedy Space Center in Florida and the British Museum in London, balancing
    their desire for structured itineraries with occasional spontaneous bike rides to unfamiliar neighborhoods.
  culinary: Linda Hall enjoys making homemade pizza topped with pepperoni, mozzarella, and fresh basil, and occasionally experiments with sushi rolls featuring cucumber and avocado, displaying their budding
    cooking skill level that blends practical, quick‑recipe meals with occasional culinary curiosity.
  core: Linda Hall is a competitive, structure‑loving pre‑teen who balances a love for LEGO engineering and piano with a prone‑to‑worry mindset, often juggling spontaneous creativity and their relaxed approach
    to obligations.
background:
  cultural: Linda was raised in Ypsilanti, Michigan, a small Midwestern city with a mix of academic and working‑class influences. Her family reflects typical Midwestern values such as self‑reliance, modesty,
    and active community participation. She participates in local traditions like county fairs, high‑school sports events, and takes advantage of cultural offerings from nearby Ann Arbor, including museum
    visits and university lectures. As a white American, she identifies with mainstream U.S. cultural norms while also experiencing the diverse, college‑town atmosphere of the region.
