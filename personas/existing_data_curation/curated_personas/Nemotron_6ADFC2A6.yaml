  career_goals: Linda aspires to a career that blends structure, tangible results, and her competitive drive. She is fascinated by computer programming and hopes to become a software developer or game designer,
    where she can create logical, user‑friendly applications. At the same time, she is intrigued by veterinary science as a backup path, valuing the immediate, practical impact of caring for animals. To
    prepare, she plans to take advanced STEM courses in high school, join a coding club, and volunteer at a local animal shelter.
