personas:
  professional: Maria Phillips, an 86‑year‑old retired community arts coordinator, blends meticulous organizational talent with inventive curiosity to curate senior exhibitions, write engaging newsletters,
    mentor budding artists, and aggressively pursue grant funding—driven by the competitive edge they honed at the bridge table.
  sports: Maria Phillips, an avid fan of the Miami Dolphins and the Orlando Magic, participates in the Brevard County Senior Walking Club for low‑impact exercise, enjoys early morning garden walks to watch
    migrating sandpipers, and follows the Tampa Bay Rays baseball season closely, often cheering from their porch.
  arts: Maria Phillips, a watercolor enthusiast who captures Florida’s sunsets in a style reminiscent of Winslow Homer, regularly attends exhibitions featuring contemporary artist Kehinde Wiley, finds inspiration
    in the poems of Mary Oliver, and delights in the smooth jazz standards of Ella Fitzgerald performed at the local cultural center.
  travel: Maria Phillips, who prefers meticulously planned short‑haul trips, has visited Savannah’s historic squares, Charleston’s botanical gardens, and New York City’s bustling art districts, and dreams
    of a guided cruise along Italy’s Amalfi Coast to capture Mediterranean light for future watercolors.
  culinary: Maria Phillips, a modest home cook with a knack for using fresh citrus from their garden, frequently prepares orange‑glazed grilled chicken, key‑lime pie, and shrimp salad with avocado and basil,
    while also enjoying occasional meals at the seaside oyster bar for conch fritters and black‑till fish tacos.
  core: Maria Phillips, an 86‑year‑old bridge‑savvy art archivist, channels their competitive spirit and quiet curiosity into preserving coastal histories, yet tends to lose track of medication refills
    while hoarding vintage postcards.
background:
  cultural: Maria is a white American of Anglo-Southern ancestry, born in 1939 in a small town in northern Florida. She grew up during the post-Depression era, imbibing values of self-reliance, respect
    for nature, and community mutual aid. After marrying a Navy officer, she moved to Melbourne, Florida, near the burgeoning Space Coast, where she participated in local civic groups and supported the
    region’s rapid growth while maintaining Southern hospitality. Her cultural identity is shaped by a blend of mid-20th-century Southern traditions, the pioneering spirit of Florida’s space era, and a
    lifelong commitment to arts and education.
