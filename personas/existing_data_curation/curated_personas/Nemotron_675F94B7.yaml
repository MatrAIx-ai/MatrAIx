  career_goals: Though retired, Maria is driven to leave a lasting cultural legacy in her community. She aims to complete a memoir and photographic chronicle of the Space Coast’s evolution, secure a grant
    to launch a traveling exhibition showcasing works by senior artists, and serve on the board of the local historical society to preserve Brevard County’s heritage. She also aspires to mentor younger
    residents through a weekly art-appreciation workshop, and to be recognized by the municipality’s Cultural Council for her contributions.
