personas:
  professional: A seasoned retail leader with over a decade of floor-level management experience, Jeffrey Lang leverages their visual-merchandising eye and calm, resilient demeanor to coach sales teams,
    optimize store layouts, and maintain high customer-service metrics, while their curiosity and love of art inspire innovative in-store pop-ups that engage the community, and they consistently mentor
    emerging supervisors.
  sports: An avid weekend hiker and occasional angler, Jeffrey Lang embraces the changing seasons by tackling the Loess Hills during summer, joining the Omaha Trails Club for group treks, cheering on the
    Nebraska Cornhuskers football team and the Omaha Storm Chasers baseball club, while they maintain a casual routine of jogging three times a week.
  arts: A dedicated watercolor enthusiast and street-photographer, Jeffrey Lang draws inspiration from Midwestern nativist works such as Grant Wood and contemporary muralist Sinead Miller, regularly volunteers
    at the Carter Lake community art workshops, and they spend weekends sketching along the Missouri River after soaking in exhibitions at the Joslyn Art Museum.
  travel: A spontaneous road-tripper with a flair for culinary discovery, Jeffrey Lang has mapped out weekend getaways to the Badlands and the Great Lakes shoreline, while they dream of a foodie pilgrimage
    to Oaxaca, Mexico, and a photo-journalism venture in Kyoto, Japan, preferring flexible itineraries over rigid schedules.
  culinary: A creative home-cook, Jeffrey Lang mixes Midwestern staples like cornbread and pork tenderloin with global twists such as miso-glazed salmon and gochujang-spiced BBQ ribs, skillfully balancing
    the smoked flavor of local craft brews with fresh herbs like rosemary and cilantro, and they often showcase their dishes at community potlucks.
  core: Jeffrey Lang’s calm curiosity fuels a life where impromptu art pop-ups and craft-brew tastings coexist with a habit of misplacing sticky-note reminders and a laid-back approach to deadlines, and
    they rarely feel pressured by time.
background:
  cultural: Jeffrey's family traces its roots to German and Irish immigrants who settled in western Iowa in the early 20th century. He grew up in Carter Lake, a small city on the Iowa–Nebraska border, immersed
    in Midwestern values of hard work, modesty, and community involvement. Local traditions such as county fairs, high-school football Saturdays, and church-sponsored potlucks shaped his sense of belonging.
    While he identifies with the broader white American culture of the region, he also embraces the area's growing appreciation for the arts, reflected in his participation in local gallery events and community
    art initiatives.
attributes:
  skills: '[''Retail team leadership and coaching'', ''Customer service excellence'', ''Visual merchandising with artistic flair'', ''Inventory management and loss prevention'', ''Point-of-sale system operation'',
