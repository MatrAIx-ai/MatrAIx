    and onboarding of new staff'']'
  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting and sketching'', ''Street and landscape photography'', ''Reading art history and contemporary culture'', ''Experimenting with new
    recipes and cooking'', ''Fishing and boating on the Missouri River'', ''Hiking in the Loess Hills and nearby nature trails'', ''Attending community theater productions'', ''Participating in a local
    craft-brew tasting group'', ''Volunteering to lead youth art workshops'']'
  career_goals: Jeffrey aims to transition from floor-level supervision to a district-manager role within the next five years, overseeing multiple stores across the Midwest. To support this trajectory,
    he is completing his bachelor's degree in Business Administration and pursuing certifications in retail leadership and visual merchandising. He also aspires to integrate his passion for art into the
    retail space by launching community-focused art pop-ups and curating rotating local artist showcases within his stores. Mentoring emerging supervisors and championing employee development programs are
    also central to his long-term vision.
