  hobbies: '["Sketching and watercolor painting","Landscape photography","Visiting small-town art galleries","Listening to indie folk and classic rock","Hiking in the Cumberland Plateau","Playing strategy
    video games","Collecting vintage vinyl records","Reading science fiction and philosophy","Journaling personal reflections"]'
  career_goals: Ian aims to transition from his current clerk position into a supervisory role within the next two years by completing his associate's degree in logistics and earning a Certified Supply
    Chain Professional (CSCP) credential. He hopes to lead a small team, streamline warehouse operations, and eventually manage a regional distribution center. Parallel to his logistics career, Ian is considering
    launching an online shop for his own prints and photographs, blending his creative interests with a business venture that would give him greater flexibility and a measurable achievement to fuel his
    competitive drive.
