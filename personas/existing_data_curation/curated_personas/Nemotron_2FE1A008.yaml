  career_goals: Claudio dreams of turning his love for art and technology into a career as a video game designer or animator. He wants to create his own comic series and develop interactive games that explore
    abstract concepts. In the future, he hopes to study graphic design or computer science, eventually working on immersive storytelling projects.
