personas:
  professional: Claudio Pena, an aspiring digital comic creator, harnesses a vivid imagination and strong organizational habits to draft hand‑drawn characters, script short strips, and build Scratch games,
    while a competitive streak drives them to enter school art contests and push creative boundaries.
  sports: Claudio Pena plays forward for the Eastside Strikers, a local youth soccer club, training three times a week and cheering for the LA Galaxy, while also following the World Cup and admiring Lionel
    Messi’s dribbling, making soccer both a competitive outlet and a social anchor.
  arts: Claudio Pena draws inspiration from comic legends like Alex Ross, Katsuhiro Otomo, and the animated storytelling of Studio Ghibli, while listening to Mexican folk music such as Lila Downs and contemporary
    pop from Camila Cabrillo, and spends weekends at community art workshops perfecting digital illustration techniques.
  travel: Claudio Pena enjoys family road trips to historic sites like Chichen Itza and the Grand Canyon, has explored the seaside town of Puerto Vallarta, and dreams of visiting Tokyo’s Akihabara district
    to experience anime culture firsthand, preferring itineraries that blend cultural immersion with fun attractions.
  culinary: Claudio Pena loves the bold flavors of tacos al pastor topped with pineapple, savors creamy enchiladas suizas, and enjoys making guacamole with fresh avocados, lime, and cilantro, often helping
    prepare pan de muerto with grandparents during Día de los Muertos celebrations.
  core: Claudio Pena is a 12‑year‑old imaginative comic enthusiast who balances a competitive edge in soccer with meticulous sketching, cautious saving, and a love for cultural festivals, all while navigating
    typical teen quirks like snack‑fueled gaming marathons.
background:
  cultural: Claudio is a second‑generation Mexican‑American living in Poway, California. At home he speaks both English and Spanish, and his family upholds Mexican customs such as cooking traditional dishes
    like tacos and tamales, celebrating Día de los Muertos and Cinco de Mayo, and listening to regional music like mariachi and ranchera. This bicultural environment blends Southern Californian lifestyle
    with Mexican heritage, shaping his artistic tastes and curiosity about cultural stories.
