  career_goals: Although retired, Matthew aims to remain intellectually active by mentoring emerging engineers through local university alumni networks and nonprofit STEM clubs. He intends to author a series
    of reflective essays on the evolution of aerospace technologies, contributing to both historical documentation and contemporary discourse. Additionally, he seeks to lead a community garden project that
    integrates sensor‑based irrigation systems, thereby merging his technical skills with environmental stewardship. Maintaining health and managing stress are also priority goals, prompting him to incorporate
    regular mindfulness practices into his daily routine.
