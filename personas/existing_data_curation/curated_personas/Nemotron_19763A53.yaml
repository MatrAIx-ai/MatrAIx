  hobbies: '[''Fishing'', ''Woodworking'', ''Reading non-fiction'', ''Gardening'', ''Walking/hiking in Angeles National Forest'', ''Community theater attendance'', ''Volunteering at food bank'']'
  career_goals: Robert aims to advance to a regional sales manager role within the next three to five years, overseeing a small team of reps and implementing process improvements that increase efficiency
    and predictability. He wants to leverage his organizational strengths to develop standardized sales workflows and mentorship programs that raise overall performance. Long‑term, he envisions a gradual
    transition to a consulting capacity, advising manufacturers on sales strategy and market entry while maintaining a stable, stress‑managed work-life balance as he approaches retirement.
