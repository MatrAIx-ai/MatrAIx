personas:
  professional: Evangeline Hauser is a 1‑year‑old budding explorer whose vivid curiosity about colors, textures, and sounds begins to lay the groundwork for a future career in experimental visual arts and
    interdisciplinary design, where they will channel their imaginative, flexible, and socially engaging nature into generating novel concepts.
  sports: Evangeline Hauser enjoys weekly parent‑child swimming sessions at the community pool and participates in a toddler “mini‑soccer” group affiliated with the local Rapids Juniors, embodying their
    energetic, sociable spirit and preference for group activity.
  arts: Evangeline Hauser spends afternoons finger‑painting inspired by Henri Matisse’s bold colors, swaying to the lullabies of musician Raffi, and giggling at classic Disney shorts starring Mickey Mouse,
    weaving these artistic experiences into their daily routine.
  travel: Evangeline Hauser has delighted in family outings to the nearby botanical garden and a weekend cabin retreat in the Appalachian foothills, and they dream of one day exploring the interactive children’s
    museum at London’s Science Museum.
  culinary: Evangeline Hauser prefers smooth, naturally sweet foods such as banana‑avocado puree, carrot‑apple mash, and homemade oatmeal with a dash of cinnamon, while they also show a budding fascination
    with the comforting aroma of freshly brewed oat‑milk latte wafting from the kitchen.
  core: Evangeline Hauser is a whimsical, socially magnetic infant who constantly seeks fresh sensory experiences, occasionally disrupts tidy routines with spontaneous toy demands, and nurtures a deep empathy
    even at a tender age.
background:
  cultural: Evangeline was born into a family of Anglo‑American heritage in Houston, Texas, a city celebrated for its cultural diversity. Her family observes traditional American holidays such as Thanksgiving,
    Independence Day, and Christmas, often incorporating regional Texan customs like backyard barbecues and community festivals. While primarily English‑speaking, she is occasionally soothed by Spanish
    lullabies heard in the neighborhood, reflecting Houston’s bilingual milieu. Her parents emphasize kindness, cooperation, and community service through church gatherings and volunteer activities, instilling
    a strong sense of empathy. Frequent visits to local museums, children’s art workshops, and the Houston Zoo expose her to a wide array of artistic and natural experiences, nurturing her early love for
    art and compassion toward living beings.
