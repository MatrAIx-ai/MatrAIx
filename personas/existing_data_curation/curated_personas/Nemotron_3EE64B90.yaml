  career_goals: Looking ahead, Evangeline anticipates a career path that merges her vivid imagination, artistic flair, and deep compassion. She dreams of becoming a visual artist or illustrator who uses
    bright, abstract imagery to inspire joy, or a pediatric caregiver such as a nurse or early‑childhood teacher where she can nurture and protect other children. She values flexible, collaborative environments
    that allow her to keep learning and staying connected with people.
