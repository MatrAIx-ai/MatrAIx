  career_goals: In the near term, Nahir aims to earn a place in her high school’s advanced art program, win a local youth art competition, and secure a summer internship at a community art center in Philadelphia.
    She hopes to develop a portfolio that could qualify her for a scholarship to an arts‑focused high school. Long‑term, she envisions a career that blends her artistic passions with her desire to support
    others—such as becoming an art therapist, a community muralist, or a cultural program coordinator that brings creative workshops to under‑served neighborhoods. She is determined to use her creativity
    to foster connection and healing, especially for other bilingual or immigrant youth.
