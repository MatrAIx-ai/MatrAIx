personas:
  professional: Nahir Mantrana is an aspiring teen visual artist who blends watercolor and digital collage techniques to reinterpret graphic novel characters, using their curiosity and love for unconventional
    storytelling to drive experimental projects.
  sports: Nahir Mantrana participates in a community youth swimming class, plays futsal on weekends with a small group of friends, and avidly follows the Philadelphia Eagles and Philadelphia Flyers, preferring
    intimate game‑watch parties over large stadium crowds.
  arts: Nahir Mantrana draws inspiration from the graphic novels of Marjane Satrapi, the surreal storytelling of Neil Gaiman, the watercolor mastery of Mary Blair, and the folk motifs of Caribbean folklore,
    channeling this admiration into daily sketches, museum visits, and collaborative art workshops.
  travel: Nahir Mantrana enjoys weekend trips to Philadelphia’s museum districts, longs to explore the historic streets of Cartagena and the vibrant murals of Berlin, and typically plans low‑key travel
    with family, favoring cultural immersion over crowded tourist itineraries.
  culinary: Nahir Mantrana assists in preparing the traditional breakfast of mashed plantains (mangú) with fried cheese and seasoned tomatoes, experiments with spices like cumin and cilantro in new recipes,
    and meticulously documents favorite dishes such as arroz con pollo and coconut‑infused flan in a sketch‑filled culinary journal.
  core: Nahir Mantrana is a dreamy teenage illustrator whose vibrant imagination coexists with a habit of misplacing school supplies, a fiercely compassionate heart, and a laid‑back approach to obligations.
background:
  cultural: Nahir’s Dominican heritage is a cornerstone of her identity. She was raised in a Spanish‑speaking household where family gatherings revolve around music, dancing, and food. Celebrations such
    as Carnaval and Dominican Independence Day are marked with homemade dishes, Caribbean rhythms, and stories from her grandparents about life on the island. This upbringing has given her a deep appreciation
    for oral tradition and visual storytelling, which she channels into her artwork. Being part of a vibrant Dominican community in Philadelphia also means she participates in local cultural festivals,
    attends Spanish‑language church services, and sometimes serves as a translator for peers. Her bicultural experience informs her world view, encouraging her to bridge diverse perspectives through creative
    expression.
