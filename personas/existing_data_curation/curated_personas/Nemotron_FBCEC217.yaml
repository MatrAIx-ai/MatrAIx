  hobbies: '[''Sketching urban murals'', ''Graffiti art experimentation'', ''DIY electronic gadget building'', ''Reading speculative fiction and philosophy'', ''Listening to experimental jazz'', ''Cooking
    Salvadoran dishes with modern twists'', ''Collecting vintage hand tools'', ''Attending indie film screenings'', ''Meditation for stress management'', ''Playing strategy board games with friends'']'
  career_goals: Ricardo aims to obtain a California contractor's license within the next two years, allowing him to launch his own eco‑focused handyman service that blends practical repairs with artistic
    refurbishments for homes in East Los Angeles. He envisions a niche that offers sustainable, custom‑crafted solutions—such as upcycled furniture and small‑scale set pieces for community theaters—leveraging
    his creative instincts. Additionally, he wants to mentor younger Salvadoran immigrants interested in trades, providing them with hands‑on training and career guidance. Achieving steady, higher‑earning
    contracts will also help reduce his financial worries and provide more stability for his family.
