personas:
  professional: An inventive maintenance professional, Ricardo combines their HVAC, plumbing, electrical, and carpentry expertise with an imaginative flair for upcycling, crafting bespoke repair solutions
    while juggling a flexible schedule, and is on track to earn a California contractor's license to launch an eco‑focused handyman service that merges sustainable fixes with artistic refurbishments for
    East Los Angeles homes.
  sports: A community‑oriented yet selectively competitive sports enthusiast, Ricardo enjoys occasional pickup basketball games at the East LA community center, follows the Los Angeles Lakers and Los Angeles
    FC for inspiration, and hikes the Angeles National Forest on weekends as a low‑key way to stay fit while avoiding large‑scale team commitments.
  arts: A street‑art aficionado, Ricardo spends evenings sketching large‑scale murals and experimenting with graffiti, draws inspiration from the works of Banksy and Basquiat, listens to Sun Ra and Ornette
    Coleman while painting, and attends intimate indie film screenings at the Aero Theater featuring directors like Jim Jarmusch and Chantal Akerman.
  travel: A spontaneous explorer, Ricardo prefers flexible, low‑budget trips that blend art and technology, having recently visited Berlin’s urban art districts, Tokyo’s Akihabara electronics market, and
    New Orleans for jazz, while dreaming of a road‑trip along the Pacific Coast to capture mural inspiration, all while balancing limited savings and family responsibilities.
  culinary: A home‑cooking experimenter, Ricardo delights in reinventing classic stuffed corn cakes (pupusas) with smoked pork and avocado crema, perfects yucca frita with a citrus‑herb dip, and sources
    fresh herbs from the local farmer’s market, while occasionally pairing meals with craft beers brewed by nearby microbreweries.
  core: A 35‑year‑old maintenance wizard turned eco‑handyman, Ricardo fuses technical know‑how with street‑art flair, worries about financial stability, yet thrives on creative problem‑solving, meditation,
    and spontaneous art‑driven adventures.
background:
  cultural: Ricardo grew up in a Salvadoran immigrant family in Los Angeles, speaking both Spanish and English at home. He maintains strong ties to the local Salvadoran community, participating in cultural
    festivals, sharing traditional foods like pupusas, and preserving customs such as Día de los Muertos observances with a Salvadoran flair. His heritage influences his aesthetic sense, inspiring the vibrant
    colors and motifs he incorporates into his artistic repairs and street art. While raised in a Catholic environment, he approaches spirituality with a personal, pragmatic outlook, valuing family loyalty,
    community solidarity, and the blend of Central American and Californian cultural experiences.
attributes:
  skills: '[''HVAC maintenance'', ''Residential plumbing repairs'', ''Basic electrical wiring'', ''Carpentry and furniture restoration'', ''Creative improvisational repair techniques'', ''DIY electronics
