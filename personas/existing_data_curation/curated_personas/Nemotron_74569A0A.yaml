personas:
  professional: Beatriz Campos, an aspiring marine explorer and LEGO architect at nine, blends a fierce curiosity about tide pools with practical problem‑solving skills to design intricate brick structures,
    yet her relaxed, often disorganized approach to school projects leads to last‑minute scrambles while her reserved, competitive nature drives her to perfect her creations in solitude.
  sports: Beatriz Campos spends weekend afternoons at the local community pool as a member of the Junior Dolphins swim club, cheers on the LA Galaxy soccer matches on TV, and occasionally joins a beach‑side
    sand volleyball game while quietly rooting for the Los Angeles Dodgers during baseball season.
  arts: Beatriz Campos channels her love of drawing comic strips by emulating Jeff Smith’s dynamic panels, flips through manga such as 'My Hero Academia', grooves to Celia Cruz’s salsa rhythms and Bad Bunny’s
    reggaeton beats, and binge‑watches Pixar’s 'Coco' and 'Inside Out', which fuel her vivid imagination and quiet artistic pursuits.
  travel: Beatriz Campos often day‑trips to the rocky shores of Monterey Bay to explore tide pools and collect shells, dreams of snorkeling the Great Barrier Reef someday, and prefers casually sketching
    her travel ideas in her journal rather than following strict itineraries, making spontaneous family beach outings her favorite getaway.
  culinary: Beatriz Campos helps her grandmother roll out flaky pastelitos de guayaba and whisk a sweet coconut flan, while experimenting at home with chocolate chip cookies dotted with sea‑salt and sprinkling
    fresh mango salsa over grilled fish, reflecting a budding culinary curiosity that blends classic sweets with bold flavors.
  core: Beatriz Campos is a curious nine‑year‑old who builds epic LEGO fortresses, journals her worries, hoards shells, yet often forgets to tidy her workspace, worries about imagined slights, and can be
    fiercely competitive in solitary games.
background:
  cultural: Beatriz comes from a proud Puerto Rican family living in Largo, Florida. At home she speaks Spanish and celebrates cultural traditions such as cooking arroz con gandules, pastelón, and flan,
    and dancing to salsa and reggaeton. Family storytelling evenings have fostered her love for narratives, while frequent trips to the nearby Gulf Coast have deepened her fascination with marine life.
    Her bilingual upbringing and close-knit family ties shape her identity and influence her interests in both art and science.
