  career_goals: She dreams of becoming a marine biologist or wildlife veterinarian, driven by her curiosity about ocean ecosystems and her desire to protect animals. Beatriz aims to excel academically,
    win science fairs, and earn scholarships that will allow her to attend a specialized STEM high school. Ultimately, she hopes to work on marine conservation projects that safeguard Florida's coastal
    habitats.
