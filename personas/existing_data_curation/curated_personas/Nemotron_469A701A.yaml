  hobbies: '[''Reading'', ''Gardening'', ''Knitting'', ''Crocheting'', ''Quilting'', ''Birdwatching'', ''Crossword puzzles'', ''Jigsaw puzzles'', ''Cooking'', ''Baking'', ''Listening to classic jazz'',
