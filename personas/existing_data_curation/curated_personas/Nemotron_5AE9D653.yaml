personas:
  professional: Darcy Ortega is a budding junior naturalist who channels curiosity and methodical planning into backyard experiments and Girl Scouts badge projects, balancing new ideas with tried‑and‑true
    procedures while reliably completing each task on schedule.
  sports: Darcy Ortega enjoys family weekend hikes where they map trail routes, plays defensive midfielder for the Riverdale Rovers youth soccer club, and cheers on the Chicago Cubs on game nights, balancing
    structured practice with relaxed backyard basketball with friends.
  arts: Darcy Ortega spends afternoons painting tiny watercolor scenes inspired by Mary Blair, folding origami swans after studying Akira Yoshizawa tutorials, and constructing LEGO dioramas that echo Frank
    Lloyd Wright's imagination, while swapping board games with friends after school.
  travel: Darcy Ortega loves family road trips to destinations like Yosemite National Park, the Smithsonian National Air and Space Museum, and a weekend getaway to the Grand Canyon, plans each outing with
    a color‑coded itinerary, prefers nature hikes over amusement parks, and dreams of someday exploring the museums of Paris with the Girl Scouts.
  culinary: Darcy Ortega enjoys assembling peanut‑butter–banana sandwiches, whipping up quick fruit‑salad bowls with strawberries, blueberries, and honey, and occasionally experimenting with simple LEGO‑inspired
    cookie decorations, though they sometimes forget to clean the kitchen afterward.
  core: Darcy Ortega is a meticulously organized ten‑year‑old explorer whose love for rocks, LEGO, and Girl Scouts balances boundless curiosity with a lingering worry about getting everything just right.
background:
  cultural: Darcy grows up in Buffalo, Minnesota, a close‑knit rural community where Midwestern values of hard work, politeness, and community involvement are emphasized. Her family participates in local
    events such as county fairs, church potlucks, and school fundraisers. While her surname reflects a Hispanic heritage, her household primarily follows traditional white Midwestern customs, with occasional
    Spanish greetings and dishes that highlight her diverse family background. The seasonal rhythms of the region—snowy winters and warm summers spent outdoors—shape her love for nature and community service.
