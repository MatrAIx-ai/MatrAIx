  career_goals: Darcy dreams of becoming a veterinarian one day because she loves caring for animals and enjoys learning about biology through hands‑on experiments. She also envisions herself as a teacher,
    sharing her organized approach and kindness with younger students. Though she sometimes worries about keeping up with schoolwork, she channels her practicality and methodical nature into setting clear
    goals to prepare for these future careers.
