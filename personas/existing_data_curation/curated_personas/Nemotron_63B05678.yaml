  hobbies: '["Reading contemporary fiction", "Baking and cooking", "Gardening", "Crocheting", "Book club participation", "Volunteering at animal shelter", "Attending community fairs", "Journaling", "Listening
    to DIY podcasts"]'
  career_goals: Rachel aims to earn her GED within the next year and pursue a certification as a Certified Nursing Assistant (CNA) so she can work part‑time in home health care, supporting families in her
    community while also having the flexibility to manage her personal responsibilities. In the longer term, she hopes to combine her culinary interests and caregiving experience by offering homemade nutritious
    meals to clients, possibly starting a small home‑based catering or meal‑prep service tailored to seniors and individuals with special dietary needs. She also envisions taking a community college course
    in horticulture to deepen her gardening skills, which could lead to part‑time work at the local nursery.
