  hobbies: '[''Playing at the park (running, climbing)'', ''Building block towers and competing with peers'', ''Pretend play with fire trucks and rescue scenarios'', ''Storytime and picture books at the
    library'', ''Dancing to music (gospel, pop)'', ''Simple puzzles and shape sorting'']'
  career_goals: Although still a toddler, Dezmond already imagines future roles that mix his curiosity with a desire to help and organize. He loves watching fire trucks and says he wants to be a firefighter,
    attracted by the excitement and the chance to protect others. He also shows fascination with rockets, sometimes calling himself an astronaut during pretend play. As he grows, his methodical nature leads
    him to envision a career where structure and teamwork are key, such as a community coach, a school teacher, or eventually a city planner who can design safe, organized neighborhoods for families like
    his.
