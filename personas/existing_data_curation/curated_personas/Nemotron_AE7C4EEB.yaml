  career_goals: Even though she is no longer employed full‑time, Sarah’s ambitions revolve around enriching her community and preserving her legacy. She hopes to expand the community garden she helped start,
    mentor younger volunteers in sustainable gardening practices, and document her family’s history in a memoir that can be shared with grandchildren. Additionally, she aims to complete a series of online
    workshops on digital storytelling, allowing her to capture and share local oral histories. Maintaining her health and staying socially engaged remain central to her personal goals.
