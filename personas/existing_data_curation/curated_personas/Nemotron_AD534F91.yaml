  career_goals: Mario aims to secure a full‑time role in office administration or project coordination within the next year, leveraging his reliability and structured approach. He plans to obtain a Certified
    Associate in Project Management (CAPM) credential to deepen his project‑management expertise and eventually transition into a project manager position. Over the longer term, he hopes to pursue a bachelor’s
    degree in Business Management while maintaining a stable routine that helps him manage stress and anxiety. Financial independence and building a career that offers clear expectations and predictable
    workflows are central to his ambition.
