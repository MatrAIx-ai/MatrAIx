personas:
  professional: Kil Yang, a budding young builder, loves constructing intricate LEGO models and dreams of becoming an architect who designs harmonious, nature-inspired spaces, blending methodical planning
    with a curiosity for the cosmos.
  sports: Kil Yang, a quiet explorer of the outdoors, enjoys occasional participation in the Skokie Youth Soccer Club, cheers for the Chicago Cubs during family outings, and prefers calm activities like
    nature walks in Lincoln Park over loud, crowded games.
  arts: Kil Yang, a creative sketcher, spends afternoons drawing futuristic vehicles inspired by the works of Hayao Miyazaki and listening to Pinkfong’s children’s songs, while practicing beginner origami
    and collecting limited‑edition Pokémon cards.
  travel: Kil Yang, an inquisitive traveler, loves weekend trips to the Museum of Science and Industry in Chicago, dreams of visiting Seoul during Lunar New Year to see lantern festivals, and hopes to explore
    the geysers of Yellowstone on a school field trip.
  culinary: Kil Yang, an eager junior chef, enjoys helping make kimchi fried rice and hotteok with family, can fold simple origami-shaped sushi rolls, and delights in the sweet crunch of apple slices dipped
    in peanut butter.
  core: Kil Yang blends meticulous organization with boundless curiosity, navigating the world through LEGO constructions, cautious financial choices, and a tender heart that seeks harmony while wrestling
    with intense anxiety.
background:
  cultural: Kil comes from an East Asian heritage, likely Korean, raised in a bilingual household in Skokie, Illinois, a city with a vibrant Korean community. His family celebrates Lunar New Year, Chuseok,
    and other traditional holidays, sharing foods like kimchi and rice cakes. He grows up with values of respect for elders, harmony, and collective well‑being, which shape his considerate and cooperative
    nature. While fully integrated into American school life, Kil maintains ties to his cultural roots through language lessons, traditional music, and occasional participation in community cultural events.
