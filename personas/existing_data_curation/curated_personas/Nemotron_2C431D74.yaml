  hobbies: '[''Abstract painting'', ''Poetry composition'', ''Speculative fiction reading'', ''Chess'', ''Local African‑American history research'', ''Abstract photography'', ''Mindfulness meditation'',
    ''Cooking Southern comfort food'', ''Jazz and blues listening'', ''Small art gallery visits'']'
  career_goals: Roshon aims to transition into a senior financial controller role within a nonprofit organization focused on arts and cultural heritage, where he can merge his accounting skills with his
    passion for creativity. He is pursuing CPA certification to formalize his expertise and plans to mentor junior clerks, fostering a culture of precision and innovative thinking. Over the next five years,
    he hopes to develop a consulting boutique that offers financial management and visual storytelling services for small Black-owned artistic ventures, reinforcing community economic empowerment while
    continuing his own artistic pursuits.
