  career_goals: Samuel aims to become one of the top agents in Harris County within the next five years, building a boutique brokerage that emphasizes data‑backed decision making and client education. He
    plans to earn the Certified Residential Specialist (CRS) and Accredited Buyer’s Representative (ABR) designations, expand into commercial and multifamily sales, and develop a personal investment portfolio
    of rental properties that generate passive income. Additionally, he hopes to mentor newer agents, launch a quarterly workshop series on modern real‑estate marketing, and cultivate an online presence
    through a YouTube channel that shares buyer‑seller tips.
