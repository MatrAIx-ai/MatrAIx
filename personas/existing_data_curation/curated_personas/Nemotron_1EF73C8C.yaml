personas:
  professional: A seasoned SaaS sales specialist, Kerry Jennings leverages eight years of solution‑selling experience and a graduate STEM background to translate complex cloud (AWS, Azure) and cybersecurity
    concepts into visually compelling, art‑inspired proposals, while they manage a robust Salesforce pipeline, mentor junior reps, and strategically position themselves for a future sales‑leadership role.
  sports: An avid adventure seeker, Kerry Jennings hikes the Cascades on weekends, cycles regularly with the Bellingham Mountain Bike Club, kayaks on Bellingham Bay, and follows Seattle’s Seahawks, Sounders
    FC, and Kraken, balancing disciplined training sessions with spontaneous outdoor excursions.
  arts: A culturally‑curious patron of the arts, Kerry Jennings regularly attends Whatcom Museum exhibitions and Whatcom Playhouse productions, admires the photography of Ansel Adams and the paintings of
    Kehinde Wiley, and spends evenings playing acoustic renditions of Fleet Foxes while drawing inspiration from those artists for their client presentations.
  travel: A curious globetrotter, Kerry Jennings blends meticulous itinerary planning with spontaneous detours, having explored the art‑rich streets of Florence, the volcanic landscapes of Iceland, the
    tea houses of Kyoto, and the coastal trails of the Scottish Highlands, while budgeting carefully to balance travel with their commitment to community projects back home.
  culinary: An experimental home chef, Kerry Jennings skillfully crafts Thai green curry with fresh lemongrass, Japanese ramen with miso broth, and homemade gnocchi tossed in sage butter, often pairing
    meals with Pacific Northwest wines like a Yakima Valley Riesling, and occasionally over‑seasoning dishes in the pursuit of bold flavor.
  core: Kerry Jennings is a curiosity‑driven SaaS sales professional who melds art and technology, balances disciplined planning with spontaneous creativity, occasionally over‑commits to social events,
    and pursues perfect coffee while juggling an active outdoor lifestyle.
background:
  cultural: Kerry is a white American raised in the Pacific Northwest, where a blend of progressive values, environmental stewardship, and a strong DIY ethic shaped her worldview. Growing up in a middle‑class
    family that emphasized education and curiosity, she was encouraged to pursue STEM studies while also engaging with the region’s rich arts community. Bellingham’s eclectic culture—characterized by coffee‑house
    discussions, indie music, and a deep connection to the surrounding forests and waterways—has reinforced her appreciation for both analytical thinking and creative expression. This regional influence
    manifests in her collaborative work style, her commitment to sustainability, and her integration of artistic aesthetics into professional presentations. Her cultural roots provide a foundation of openness,
    independence, and a balanced respect for tradition and innovation.
attributes:
  skills: '[''Technical sales'', ''Solution consulting'', ''Data analysis'', ''CRM management (Salesforce)'', ''Pipeline forecasting'', ''Negotiation'', ''Presentation design'', ''Visual storytelling'',
