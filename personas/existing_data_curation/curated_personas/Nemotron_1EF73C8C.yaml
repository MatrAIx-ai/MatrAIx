  hobbies: '[''Photography'', ''Visiting art galleries and museums'', ''Hiking in the Cascades'', ''Kayaking on Bellingam Bay'', ''Cooking experimental recipes'', ''Wine tasting'', ''Reading science fiction
    and technology non-fiction'', ''Participating in local maker fairs'', ''Volunteering at community garden projects'', ''Playing acoustic guitar'']'
  career_goals: Kerry aspires to move into sales leadership within the next three to five years, targeting a Sales Manager role that allows her to mentor junior representatives and shape regional go‑to‑market
    strategies. She aims to drive revenue growth by expanding the company's footprint into emerging technology sectors, forging strategic partnerships, and integrating innovative, art‑inspired storytelling
    into the sales process. In the longer term, she envisions becoming a Director of Sales or VP of Business Development, where she can influence corporate vision and culture. To support these ambitions,
    she plans to pursue an executive MBA, attend industry conferences as a speaker, and publish thought‑leadership pieces on the intersection of technology, creativity, and customer experience. Throughout
    her career progression, maintaining work‑life balance with her spouse and staying connected to her local community remain top priorities.
