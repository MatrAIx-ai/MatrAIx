persona_description: A researcher at the University of Nevada, Reno, who specializes in algae-to-biofuel research and has successfully completed the initial stage of a demonstration-scale project for turning
  algae into biofuel. The researcher is passionate about developing a hardy variety of salt-loving algae as alternative biofuel feedstock and has a focus on developing a practical process to grow, concentrate
  and harvest the algae. The researcher has a background in biochemistry and molecular biology and has overseen the venture along with fellow faculty members and graduate students. The researcher is interested
  in the potential economic and environmental benefits of the project and is committed to advancing the technology for commercial use.
