personas:
  professional: Katerine Duque, a 23-year-old construction crew member, leverages OSHA-10 certification, concrete-finishing expertise, and a talent for reading blueprints to troubleshoot site issues independently,
    while channeling a competitive drive and a laid-back attitude that favors flexibility over rigid schedules.
  sports: Katerine Duque enjoys solitary rides on a road bike along the Passaic River trail, occasionally joins the Passaic Cyclists Club for group rides, roots for the New York Yankees during baseball
    season, and occasionally plays pick-up basketball at the community gym to keep active.
  arts: Katerine Duque spends quiet evenings listening to ambient compositions by Brian Eno, follows the eco-centric installations of Olafur Eliasson, collects prints of Banksy's street art, and dives into
    the poetry of Maya Angelou to fuel their creative imagination.
  travel: Katerine Duque favors low-key travel, having explored the green-building scene in Portland, Oregon and the vibrant art districts of Medellin, Colombia, while dreaming of a study trip to Copenhagen's
    sustainable architecture labs, and often plans weekend getaways to the nearby Jersey Shore for a brief coastal reset.
  culinary: Katerine Duque's culinary routine blends tradition and practicality, expertly hand-pressing pupusas stuffed with loroco and cheese, simmering tamales with fresh corn husks, while daily cooking
    with home-grown cilantro and basil fuels a love for vibrant salsas and fresh avocado-lime guacamole.
  core: Katerine Duque is a solitary, curiosity-driven builder who balances a fierce competitive streak with a laid-back, flexible lifestyle, occasionally stumbling into disorganization, yet consistently
    pursuing sustainable home remodels and quiet solo pursuits.
background:
  cultural: Katerine grew up in a Salvadoran immigrant household that values family, hard work, and community rituals. Bilingual in Spanish and English, she celebrates traditional holidays such as Día de
    la Madre and the Feast of San Juan, often preparing pupusas with her mother. While she lives and works in Port Reading, she remains closely connected to the vibrant Salvadoran community in Newark and
    surrounding towns, attending occasional cultural festivals and church gatherings. Her heritage instills a respectful attitude toward elders and a pragmatic outlook, reinforcing her practical curiosity
    on the job. At the same time, the cultural emphasis on collective support contrasts with her personal preference for solitude, creating a balanced identity that honors her roots while allowing her to
    thrive in less‑social work environments.
attributes:
  skills: '[''Concrete finishing'', ''Basic framing and carpentry'', ''Power tool operation'', ''Blueprint reading'', ''OSHA 10 safety certification'', ''Material handling and logistics'', ''Site measurement
    and layout'', ''Problem solving under pressure'']'
  hobbies: '[''Reading construction and DIY manuals'', ''Home repair projects'', ''Listening to sustainability podcasts'', ''Indoor herb gardening'', ''Cooking Salvadoran dishes'', ''Solo cycling'', ''Meditation'']'
  career_goals: Katerine aims to translate her practical curiosity into formal credentials and greater responsibility. In the next few years she plans to obtain a certification in construction management
    and a forklift operator license, positioning herself for a foreman or crew‑lead role where she can influence scheduling and workflow. Her competitive drive pushes her to become the top performer on
    site, and she hopes to eventually start her own small contracting business focused on residential remodels that incorporate sustainable, low‑cost materials. While she values flexibility and prefers
    a loose structure, she also seeks a stable income that allows her to support her family back in El Salvador and invest in homeownership in Port Reading.
