personas:
  professional: Brian Stclair, an aspiring junior engineer, translates their curiosity and practical mindset into building intricate LEGO machines with moving parts while using Scratch to code simple animations,
    and their competitive streak pushes them to constantly iterate and outdo their previous creations.
  sports: Brian Stclair plays forward for the St. Mary's United Soccer Club in the fall and enjoys practicing drills after school, cheers for the Washington Capitals during hockey season and the Baltimore
    Orioles in summer baseball, displaying a competitive drive on the field balanced by a team‑first mindset cultivated by their coach.
  arts: 'Brian Stclair spends evenings sketching characters from the ''Avatar: The Last Airbender'' graphic novels, building stop‑motion LEGO scenes set to the music of Imagine Dragons, and eagerly watches
    Pixar’s ''Toy Story'' and ''Finding Nemo'', letting these artistic influences shape their own storytelling in Scratch.'
  travel: Brian Stclair prefers weekend family road trips that blend outdoor adventure with historic stops, having explored the National Mall in Washington, D.C., the historic waterfront of Annapolis, and
    the tide‑pools of Assateague Island, while dreaming of a summer camp trip to the Great Smoky Mountains and a future visit to the beaches of the Outer Banks.
  culinary: Brian Stclair loves crunchy soft‑shell crab sandwiches with a dab of lemon, homemade mac and cheese, and blueberry muffins baked with fresh berries from the neighbor’s farm, yet they are notorious
    for sneaking extra chocolate chips into the batter and occasionally skipping vegetables when a pizza night calls.
  core: Brian Stclair is a curiosity‑driven, competition‑sparked eight‑year‑old who builds LEGO marvels, saves every penny for the next set, and channels their love of nature into crab‑watching, all while
    juggling a secret stash of chocolate chips and a habit of double‑checking the school locker for lost LEGO pieces.
background:
  cultural: Brian was born and raised in Mechanicsville, a small community in St. Mary's County, Maryland. The area’s maritime and agricultural heritage shapes his upbringing; family weekends often include
    crabbing trips on the Chesapeake Bay, visits to local farms, and attendance at county fairs that celebrate regional traditions. The community is predominantly white, with many families tracing roots
    back to early English and Irish settlers of the Eastern Shore. He attends a public elementary school where events revolve around local customs such as Fourth of July fireworks and "Bob‑the‑Fish" festivals.
    His family observes Christian values, attending weekly church services, and upholds a blend of self‑reliance, respect for nature, and modest competition in sports and school activities.
attributes:
  skills: '[''reading comprehension'', ''basic arithmetic'', ''LEGO construction'', ''K-NEX building'', ''Scratch programming'', ''following step-by-step instructions'', ''organized workspace maintenance'',
    ''responsible household chores'']'
  hobbies: '[''LEGO building'', ''exploring nature'', ''crabbing'', ''Minecraft'', ''Super Mario'', ''youth soccer'', ''adventure reading'', ''Scratch coding'', ''science fair projects'']'
  career_goals: Brian dreams of one day designing and piloting a spacecraft, inspired by his love of building models and fascination with space exploration. At the same time, his practical side imagines
    becoming a civil engineer who helps construct bridges and roads in his community. He also considers a career as a firefighter because he likes helping others and enjoys the competitive training aspect.
    In the short term, he aims to win his school's science fair, earn a leadership badge in the Boy Scouts, and make the varsity soccer team when he reaches middle school.
