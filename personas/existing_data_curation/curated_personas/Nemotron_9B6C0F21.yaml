    graphic novels"]'
  career_goals: Efrain dreams of a future where he can combine creativity, problem-solving, and helping others. He is fascinated by architecture and hopes to design buildings that blend art, functionality,
    and sustainable practices. He also imagines becoming an environmental scientist who studies local ecosystems and works on conservation projects. Additionally, he is drawn to teaching or mentoring younger
    kids, sharing his love for art and science in after-school clubs. Overall, his ambition is to stay curious, keep learning, and eventually create interactive installations that inspire his community.
