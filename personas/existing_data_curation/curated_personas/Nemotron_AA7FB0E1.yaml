personas:
  professional: Lindsay Ford, a 17‑year‑old aspiring health‑care support specialist and budding e‑commerce entrepreneur, leverages strong interpersonal, organizational, and practical problem‑solving skills
    to balance GED studies, community‑college prep, and a DIY accessory shop, while a competitive, curious mindset pushes them to constantly refine workflows and adopt efficient digital tools.
  sports: Lindsay Ford, a member of the Brookside High intramural soccer league and a fervent fan of the Portland Timbers, Portland Thorns FC, and the Portland Trail Blazers, blends competitive team play
    with a disciplined yoga routine to maintain stamina, yet occasionally sacrifices a training session for late‑night gaming tournaments.
  arts: Lindsay Ford channels creative energy by producing short, witty videos inspired by Bo Burnham and TikTok star Khaby Lame, while drawing artistic motivation from indie musician Clairo, digital painter
    Loish, and actor Timothée Chalamet, and their competitive nature drives them to perfect each clip for maximum viewer engagement.
  travel: Lindsay Ford prefers budget‑friendly, experience‑rich trips, having road‑tripped to the Grand Canyon, attended a summer music festival in Austin, explored the historic streets of Asheville, and
    now dreams of visiting Tokyo to dive into its video‑game culture, all while juggling family schedules and saving from their part‑time work.
  culinary: Lindsay Ford enjoys crafting avocado toast with chili flakes, sweet‑potato black‑bean tacos, and matcha‑infused brownies, rates themselves as an intermediate home cook who sources fresh produce
    at the farmers’ market, occasionally overcooks pasta when multitasking between gaming sessions, and loves experimenting with essential‑oil‑scented candles as part of their DIY hobby.
  core: Lindsay Ford is a competitively driven teen who blends curiosity with pragmatism, juggling gaming, DIY entrepreneurship, and yoga to channel stress, while constantly balancing ambition with an undercurrent
    of worry.
background:
  cultural: Raised in Saint Paul, Minnesota, Lindsay grew up in a middle-class, predominantly white neighborhood with roots in Northern European immigrant families; the Midwestern values of community involvement,
    modesty, self-reliance, and an appreciation for outdoor activities in all seasons have shaped her outlook, while the city's diverse cultural scene has exposed her to a variety of perspectives.
