persona_description: A healthcare professional who has experience with the COVID-19 pandemic and its impact on people with serious autoimmune diseases. They are familiar with the shift in culture towards
  wearing face masks and the benefits it provides for individuals with cystic fibrosis and other autoimmune conditions. They are also knowledgeable about the potential long-term effects of the pandemic
  on society and the importance of hygiene practices. They are interested in the potential for face masks to become the new normal for preventing the spread of disease and are actively seeking ways to educate
  and advocate for this shift.
