persona_description: A forester or wildfire expert who is knowledgeable about the impact of wildfires and the management of national forests. This person has experience working in the Jemez River Basin,
  where the Las Conchas fire occurred, and is familiar with the region's geography, ecology, and natural resources. They have a strong understanding of fire behavior, the effects of wind on wildfires, and
  the management strategies used to combat wildfires in the national forests. This person is likely to have a deep interest in the environmental impact of wildfires and the challenges faced by forest managers
  in managing these natural disasters.
