  career_goals: Neida aims to advance to a senior software engineering role within the next two years, focusing on building highly reliable, cloud‑native applications. She plans to earn the AWS Certified
    Solutions Architect – Associate credential to deepen her expertise in scalable infrastructure. In the longer term, she aspires to become a technical lead or software architect where she can shape architectural
    decisions and mentor junior developers, especially women and Latinx colleagues entering tech. Because she is sensitive to stress, she seeks opportunities that offer clear expectations, supportive team
    dynamics, and flexible remote‑work options that allow her to maintain a healthy work‑life balance while pursuing meaningful projects that benefit her community, such as health‑tech solutions for underserved
    populations in Houston.
