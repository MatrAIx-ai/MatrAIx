  hobbies: '[''Cooking Mexican dishes'', ''Yoga and mindfulness meditation'', ''Journaling'', ''Reading magical realism and poetry'', ''Listening to cumbia and folk music'', ''Hiking local nature trails'',
    ''Community gardening'', ''Analog photography'', ''Participating in Spanish-language book club'', ''Volunteering at local library'']'
  career_goals: Zoila aims to transition back into the education field in a part-time or consultancy capacity that offers flexibility and aligns with her passion for bilingual and culturally responsive
    learning. She plans to obtain a trauma-informed teaching credential so she can better support students coping with anxiety and emotional distress. Her long-term ambition is to launch a community-based
    nonprofit that provides free tutoring and literacy workshops for Spanish-speaking families in Stockton, while also producing a guidebook that blends Mexican folklore with modern teaching strategies.
    She hopes these efforts will empower Mexican-American youth and strengthen community ties, all while allowing her to maintain a balanced schedule that accommodates her own mental-health needs.
