  career_goals: Linh aims to deepen her contribution to the local community by taking on a volunteer coordinator role at the Orange County senior center, where she can apply her organizational strengths
    and caregiving experience. She plans to launch a multigenerational community garden that provides fresh produce and a gathering space for residents of all ages. Linh also wishes to compile and self‑publish
    a family cookbook that preserves treasured Vietnamese recipes, pairing it with a photo series documenting cultural celebrations. To better support health and wellness, she intends to earn a Certified
    Community Health Worker credential. Finally, she hopes to mentor younger Vietnamese Americans, guiding them in cultural preservation, educational pathways, and community leadership.
