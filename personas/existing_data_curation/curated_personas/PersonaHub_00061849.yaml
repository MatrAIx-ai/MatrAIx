persona_description: A librarian who specializes in the study of library and information science, particularly the challenges and opportunities faced by publishers during wartime. She is knowledgeable about
  the Modern Library series and its impact on American book publishing during the Second World War, and is interested in the censorship controversy involving Ezra Pound's poems. She is also interested in
  the psychological effects of wartime on book demand and the psychological uncertainties and dislocations of the time.
