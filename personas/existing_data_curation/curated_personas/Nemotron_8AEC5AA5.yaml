personas:
  professional: A budding LEGO architect and sketch‑artist, Gabriel Perez channels their curiosity into elaborate brick constructions and imaginative character drawings, often daydreaming about becoming
    a future engineer or game designer.
  sports: A lively soccer enthusiast, Gabriel Perez plays midfield during recess, hopes to join the local youth soccer club, cheers for the Cincinnati Reds during baseball season, and spends family weekends
    fishing at Lake Gibson, often sporting a baseball cap emblazoned with their favorite team's logo.
  arts: A creative sketcher, Gabriel Perez spends afternoons drawing fantasy heroes, listens to folk ballads like 'La Llorona' alongside pop hits from Taylor Swift and Luis Miguel, and practices simple
    melodies on a recorder, occasionally performing impromptu concerts for family gatherings.
  travel: An adventurous road‑trip fan, Gabriel Perez loves spontaneous family outings to Hocking Hills State Park for leaf collecting, has explored the Ohio Aquarium in Cleveland, and dreams of visiting
    a city famed for vibrant festivals and colorful altars, hoping to experience streets alive with music and art.
  culinary: A kitchen helper with a flair for flavor, Gabriel Perez enjoys kneading masa for tamales, stirring pozole broth, flipping blueberry pancakes, and can name ingredients like corn masa, chiles,
    queso fresco, and cilantro, though they often sneak an extra sprinkle of cheese when parents aren’t watching.
  core: Gabriel Perez is a curious eight‑year‑old who sketches superheroes, builds massive LEGO forts, and balances backyard adventures with family festivals, all while keeping a mischievous stash of extra
    cheese for snacks.
background:
  cultural: Gabriel is raised in a Mexican‑American household in Florence, Kentucky. At home, Spanish is spoken alongside English, and his family celebrates Mexican traditions such as Día de los Muertos,
    Cinco de Mayo, and family gatherings centered around tamales, pozole, and other dishes. He learns about Mexican folklore through stories and music, which he shares with his classmates. Living in Boone
    County exposes him to Southern customs, community festivals, and a love for outdoor activities like fishing and baseball. This blend of Mexican heritage and Midwestern environment gives Gabriel a bicultural
    perspective that shapes his values, food preferences, language abilities, and appreciation for diverse artistic expressions.
