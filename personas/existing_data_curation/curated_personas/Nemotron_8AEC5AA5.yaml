  career_goals: Gabriel dreams of a future where he can blend his love for art, nature, and discovery. He often talks about becoming an artist who paints stories that make people feel, or an explorer‑scientist
    who discovers new plants and shares them through illustrations. He also imagines designing video games that teach kids about cultures, including his Mexican heritage. He aspires to keep learning, travel,
    and use his creativity to bring joy and understanding to others.
