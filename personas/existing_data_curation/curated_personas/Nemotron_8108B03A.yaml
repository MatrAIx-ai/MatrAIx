  hobbies: '[''Visiting Art Galleries'', ''Street Photography'', ''Cooking Mexican Cuisine'', ''Hiking'', ''Listening to Music (Regional Mexican and Indie)'', ''Reading Business & Psychology Books'', ''Mindfulness
