  hobbies: '[''Aviation photography'', ''Model aircraft building'', ''Oil painting'', ''Reading historical non-fiction'', ''Attending local art exhibitions'', ''Gardening'', ''Playing chess'', ''Birdwatching'',
    ''Listening to jazz and classical music'', ''Volunteering at community theatre'']'
  career_goals: As he approaches retirement, John aims to transition into a mentorship and consulting role within the aviation community. He plans to develop a safety‑best‑practices curriculum for new controllers,
    serve on an FAA advisory panel for airfield operations, and volunteer as an instructor at a local community college's aviation program. He also hopes to author a reflective memoir that captures the
    evolution of air traffic control technology and the human stories behind it, thereby leaving a lasting legacy for future generations of aviation professionals.
