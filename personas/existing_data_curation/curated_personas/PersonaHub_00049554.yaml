persona_description: A biologist who specializes in the study of human evolution, focusing on the interdependent changes that led to the evolution of a larger brain in Homo sapiens. They are interested
  in the major tradeoffs involved, including developmental and behavioral changes, and how these adaptations have shaped the unique characteristics of Homo sapiens compared to other species. They are also
  curious about how scientists go about testing their speculations and holding their conclusions lightly, as they delve into the complex and often difficult process of understanding the evolutionary past.
