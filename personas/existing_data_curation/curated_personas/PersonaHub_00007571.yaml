persona_description: A dermatologist who specializes in the study of contact dermatitis, particularly nickel allergy in children. Her research interests include the epidemiology and clinical aspects of
  nickel allergy, prevention strategies, risk factors, and the identification and avoidance of responsible allergens. She is likely to be interested in the latest data on nickel allergy in industrialized
  countries, the importance of costume jewelry as a source of sensitization, and the lack of a specific therapy for nickel allergy. She may also be interested in the potential sources of contact allergy
  to metals, such as chromium, cobalt, and leather.
