personas:
  professional: Steve Lara is a seasoned maintenance specialist whose disciplined, inventory‑driven approach ensures that every plumbing, electrical, or HVAC task at the senior center is completed on schedule,
    while their knack for teaching hands‑on repair skills to younger volunteers reflects a deep commitment to community reliability.
  sports: Steve Lara is an avid walker who logs daily strolls along the Mississippi River trail, is a lifelong fan of the St. Louis Cardinals baseball team, and participates in the community senior softball
    league each spring, treating the gentle exercise as both social ritual and fitness routine that reflects their disciplined lifestyle.
  arts: Steve Lara is a connoisseur of classic love ballads and folk ensembles from their heritage, regularly listening to recordings by legendary vocalists of the early 20th century, and spends weekend
    afternoons immersed in Golden Age cinema, revisiting iconic films starring the era's celebrated leading men and women.
  travel: Steve Lara is a measured traveler who favors short, purposeful road trips to nearby historic towns like Natchez and the coastal charm of Gulfport, while dreaming of a relaxed pilgrimage to the
    serene vineyards of Napa Valley, always planning itineraries around comfort, familiar accommodations, and the ability to bring home fresh herbs for their cooking.
  culinary: Steve Lara is a devoted home chef who cultivates tomatoes, chilies, and herbs in their backyard garden and expertly prepares heritage dishes such as slow‑cooked pork carnitas, corn‑based tamales,
    and hearty pozole, favoring fresh cilantro, roasted garlic, and dried oregano to infuse each meal with comforting, familiar flavors.
  core: Steve Lara is a steadfast routine‑keeper whose meticulous garden, precise budgeting, and warm, albeit anxiety‑prone, hospitality blend into a life anchored by quiet service and a penchant for daily
    puzzles.
background:
  cultural: Steve Lara was born to Mexican immigrant parents who settled in the South Side of St. Louis in the 1950s. Raised in a bilingual household, he grew up celebrating Mexican holidays such as Día
    de los Muertos, Las Posadas, and Mexican Independence Day, while also participating in local Catholic traditions. The family’s emphasis on respect for elders, community solidarity, and practical hard
    work shaped his values. Though he never completed a high‑school diploma, he learned trades on the job, reflecting the immigrant ethic of self‑reliance. He maintains strong ties to the Mexican‑American
    community through the parish, neighborhood festivals, and informal gatherings, where he shares his cooking and gardening knowledge. His cultural identity blends Mexican heritage with Midwestern sensibilities,
    fostering a deep appreciation for both his roots and his adopted city.
attributes:
  skills: '["Facility maintenance", "Basic carpentry", "Plumbing repairs", "Electrical troubleshooting", "HVAC routine checks", "Inventory management", "Scheduling and record‑keeping", "Budgeting and cost
