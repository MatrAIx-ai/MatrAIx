persona_description: A historian or archaeologist who is particularly interested in the history and archaeology of the Anglo-Saxon period in England. They are knowledgeable about the iconography and symbolism
  of Anglo-Saxon crosses, and are skilled in interpreting the historical and cultural context of these monuments. They are also familiar with the history of the Sandbach Crosses and its moving history,
  and are interested in learning more about the ancient workshop of skilled sculptors that could have produced these crosses.
