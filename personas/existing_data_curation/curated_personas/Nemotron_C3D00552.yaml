personas:
  professional: Benton Forsberg, an aspiring junior robotics engineer, channels their love for clear rules and measurable goals into building LEGO Mindstorms bots and scripting Scratch games, meticulously
    planning each step and treating every challenge like a friendly competition.
  sports: Benton Forsberg scores goals for the Midtown Soccer Club and blocks shots for the North Ridge Ice Hockey league, idolizes the Chicago Blackhawks while cheering for the local high-school teams,
    follows a disciplined after-school conditioning routine, and treats each practice like a strategic battle.
  arts: Benton Forsberg draws comic-strip characters inspired by Stan Lee's dynamic heroes, loses themself in mystery novels like the Hardy Boys, and relaxes to the tunes of The Beatles and modern game
    soundtracks, using these artistic outlets to process their intense emotions.
  travel: Benton Forsberg enjoys Boy Scout camping trips to places like Yellowstone National Park, keeps a detailed packing checklist, dreams of visiting Tokyo's robot museums and Orlando's theme parks,
    and always plans their routes on a map before setting out, balancing adventure with the comfort of organized itineraries.
  culinary: Benton Forsberg prefers easy-to-assemble meals such as pepperoni pizza, chicken nuggets with honey-glazed carrots, and spaghetti carbonara, can follow a recipe step-by-step but often forgets
    to clean up, and occasionally experiments with building edible LEGO-inspired snack towers for fun.
  core: Benton Forsberg is a methodical yet high-energy 11-year-old who thrives on competition, structures their world with detailed plans, combats anxiety through journaling and breathing, and occasionally
    lets procrastination and messy habits slip through their otherwise disciplined routine.
background:
  cultural: Benton grows up in Lake Elmo, Minnesota, a suburban community with a strong Midwestern ethos of punctuality, work ethic, and community involvement. His family reflects a blend of Hungarian and
    Swedish heritage—evident in occasional dishes like goulash and Swedish meatballs served at family gatherings and in the celebration of traditions such as St. Lucia's Day and Hungarian National Day.
    This mixed cultural background nurtures an appreciation for both organized, seasonal celebrations and the value of outdoor pursuits common in the region, like fishing and winter sports. While the neighborhood
    is predominantly white, Benton benefits from school and community programs that emphasize inclusivity, teamwork, and civic responsibility, shaping a worldview that balances personal achievement with
    a sense of belonging.
