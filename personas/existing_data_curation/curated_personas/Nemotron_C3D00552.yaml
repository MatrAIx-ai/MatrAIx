  career_goals: Benton dreams of turning his love for structure and building into a future career as a robotics or aerospace engineer, envisioning himself designing precise machines that solve real‑world
    problems. He also harbors a competitive ambition to play hockey at the collegiate level, hoping his disciplined training could someday lead to a scholarship. In the longer term, he imagines combining
    his organized mindset with a helping profession—perhaps as a science teacher or youth mentor—where he can share reliable study habits and project‑planning skills with younger students while learning
    to manage his own anxiety more effectively.
