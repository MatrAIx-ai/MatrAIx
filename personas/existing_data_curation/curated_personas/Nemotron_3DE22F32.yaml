personas:
  professional: Gabrielle Blue is a meticulous high‑school senior who leverages her spreadsheet wizardry, HTML basics, and Lightroom editing to coordinate community events and aspires to become a data‑driven
    office manager in health‑care information management, channeling a calm, competitive spirit into every task.
  sports: Gabrielle Blue runs sunrise laps on the McDonough community track with the local youth track club, follows the Georgia Bulldogs football team, and cheers on the McDonough High Tigers during basketball
    season, preferring solitary endurance workouts over team sports.
  arts: Gabrielle Blue expresses creativity through digital photography—capturing quiet street scenes and editing them in Lightroom—while reading biographies of leaders like Michelle Obama and listening
    to gospel choir performances at their church for inspiration.
  travel: Gabrielle Blue plans trips with meticulous itineraries, enjoys day trips to Savannah’s historic squares and Charleston’s waterfront, and dreams of a weekend in New Orleans to experience jazz and
    Southern cuisine, balancing structured planning with occasional spontaneous detours.
  culinary: Gabrielle Blue bakes banana bread and sweet potato pies, meal‑preps quinoa bowls with black beans and collard greens flavored with thyme and rosemary, and occasionally overcooks a batch of cookies
    as a calming ritual after long study sessions.
  core: Gabrielle Blue is a goal‑driven teen who balances a love of puzzles, precision budgeting, and sunrise runs with a quiet competitive edge and a habit of over‑organizing every aspect of life.
background:
  cultural: Gabrielle is a Black teenager raised in McDonough, GA, immersed in the Southern African‑American community's emphasis on family, church, and mutual support. Her upbringing reflects a blend of
    historic Black church traditions—where resilience and communal responsibility are prized—and the Southern culture of hospitality and close‑knit neighborhoods. These influences have reinforced her calm
    demeanor, competitive spirit, and practical mindset, motivating her to achieve personal stability while contributing quietly to her community.
attributes:
  skills: '["Microsoft Excel spreadsheet creation and analysis", "budget planning and personal finance tracking", "online research and fact‑checking", "basic HTML/CSS web design", "digital photo editing
    with Lightroom", "computer troubleshooting and hardware basics", "event coordination for small community gatherings", "time management and scheduling"]'
  hobbies: '["solo puzzle solving (Sudoku, crosswords)", "reading non‑fiction biographies and self‑help books", "personal journaling and goal tracking", "digital photography and Lightroom editing", "coding
    simple websites with HTML/CSS", "baking and meal prepping for small groups", "track running for personal fitness"]'
  career_goals: Gabrielle plans to earn her GED within the next year and then enroll in a community college program focused on business administration or health‑care information management. She aims to
    secure an entry‑level administrative position where she can apply her organizational strengths, and later advance to a supervisory role such as office manager or medical coder. Long‑term, she hopes
    to combine her technical skills and competitive drive to become a project coordinator overseeing structured initiatives in a stable, data‑focused environment.
