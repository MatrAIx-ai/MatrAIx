persona_description: Nathalie Cabrol is a SETI Institute scientist who specializes in studying the extreme environments of the Andean mountains and Mars. She has a unique perspective on the search for life
  beyond Earth, having been involved in scientific research on both Earth and Mars. Cabrol's research interests include the study of mountain ecosystems in the face of climate change, the design of interplanetary
  experiments for Mars missions, and the development of new technologies for future space exploration. She is known for her expertise in diving and her dedication to studying the threats faced by mountain
  ecosystems in the face of climate change. Cabrol's presentation at TED2015 focused on her work in the Andean mountains and her efforts to determine how life might persist on Mars.
