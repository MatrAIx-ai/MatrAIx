personas:
  professional: Maria Tejeda, a veteran carpenter turned aspiring consultant, blends decades of hands‑on framing and traditional Spanish joinery with a methodical curiosity for sustainable design, channeling
    their organized yet adaptable nature into mentoring apprentices and drafting boutique‑workshop proposals.
  sports: Maria Tejeda follows the Denver Broncos and Colorado Avalanche with quiet enthusiasm, participates in a senior hiking club that tackles the Rockies in summer, and practices daily gentle yoga to
    maintain flexibility, preferring low‑impact exercise over high‑intensity sports.
  arts: Maria Tejeda immerses themselves in the works of poet Antonio Machado, painter Joan Miró, and photographer Ansel Adams, while channeling that appreciation into handcrafted wooden boxes and nature
    photography captured on Colorado trails, finding solace in both literary and visual arts.
  travel: Maria Tejeda favors thoughtfully planned trips that balance relaxation with cultural immersion, such as a slow‑paced pilgrimage to Santiago de Compostela and a weekend retreat in Taos, New Mexico,
    where they can garden, read, and sketch, always budgeting within their modest savings.
  culinary: Maria Tejeda excels at cooking fragrant paella, golden empanadas, and silky flan, seasoning dishes with fresh rosemary, sage, and lavender from their herb garden, and while they meticulously
    follow recipes, they occasionally over‑salts when distracted by a new woodworking project.
  core: Maria Tejeda is a meticulous, quietly curious carpenter‑turned‑mentor who channels their heritage through herb‑infused cuisine, woodworking artistry, and reflective birdwatching, all while juggling
    a cautious financial streak and occasional stress‑driven forgetfulness.
background:
  cultural: Maria’s cultural background is rooted in Andalusian Spain, where her grandparents emigrated from before settling in the United States. Raised in a bilingual household, she grew up speaking both
    Spanish and English, celebrating traditional festivals such as Semana Santa and Día de los Muertos with her family. The Spanish emphasis on craftsmanship, hospitality, and communal meals has shaped
    her approach to woodworking, favoring warm, natural wood tones and ornamental joinery reminiscent of Mediterranean homes. In Colorado, she maintains these ties by cooking authentic Spanish dishes, participating
    in local Hispanic cultural events, and passing stories and language to her grandchildren. Her heritage also informs her collaborative spirit, placing a high value on harmony and consideration for others.
attributes:
  skills: '["Framing and structural carpentry", "Custom cabinetry and furniture making", "Furniture restoration and finish work", "Blueprint reading and building code compliance", "Tool maintenance and
    safety procedures", "Project planning and cost estimating", "Mentoring apprentices", "Sustainable wood sourcing", "Basic structural engineering concepts", "Small‑business management"]'
  hobbies: '["Herb and native‑plant gardening", "Reading historical fiction and poetry", "Baking traditional Spanish dishes (paella, empanadas, flan)", "Personal woodworking projects (small furniture, decorative
    carving)", "Birdwatching and nature photography", "Small book club participation", "Volunteer carpentry teaching at community center", "Gentle yoga and mindfulness meditation"]'
  career_goals: Maria’s career goal is to transition from physically demanding on‑site carpentry to a mentorship and consulting role that leverages her extensive expertise while allowing a more predictable
    schedule. She aspires to open a small boutique workshop that produces handcrafted, sustainably sourced furniture, incorporating Spanish design motifs. Over the next few years she plans to develop a
    series of hands‑on workshops for local apprentices and hobbyists, publish a bilingual guide on traditional Spanish woodworking techniques, and secure consulting contracts with local builders focused
    on sustainable practices. These ambitions reflect her desire for continued contribution, balanced with a need for reduced stress and more personal time.
