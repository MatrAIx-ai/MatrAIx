  career_goals: David aims to translate his curiosity and practicality into a stable career path. In the short term, he plans to earn a CompTIA A+ certification and secure an entry‑level IT support position
    that leverages his technical troubleshooting skills while offering room for growth. Simultaneously, he nurtures an entrepreneurial ambition to open a modest food stall or pop‑up that showcases a fusion
    of Nicaraguan flavors with Californian street food, reflecting his culinary passion. Over the next five years, he envisions combining these interests by developing an online platform that offers tech‑related
    tutorials and cooking videos, ultimately creating a modest income stream that supports both his professional development and his desire to give back to the local Nicaraguan community.
