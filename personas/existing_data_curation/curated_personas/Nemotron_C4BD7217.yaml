  hobbies: '["Running", "Hiking", "Acoustic guitar", "Strategic board games", "Reading business non-fiction", "Volunteering at community center", "College football fan", "Bullet journaling"]'
  career_goals: William aims to launch his career in a structured corporate environment, targeting an entry-level business analyst or operations associate role within a mid-sized manufacturing or logistics
    firm in Middle Tennessee. He plans to obtain professional credentials such as a Certified Business Analyst Professional (CBAP) or a Certified Management Accountant (CMA) within the next two years. Over
    the next five years, he aspires to progress into a supervisory operations manager position, where he can apply his organizational strengths to improve processes and drive efficiency. Ultimately, his
    long-term ambition is to start a consultancy that helps small businesses streamline operations while maintaining a balanced work‑life schedule.
