  hobbies: '[''community gardening'', ''quilting'', ''knitting'', ''cooking traditional Southern dishes'', ''listening to gospel and jazz music'', ''attending church services and choir participation'',
    ''walking in Fairmount Park'', ''reading biographies of African American leaders'', ''volunteering at senior center'', ''participating in cultural festivals'']'
  career_goals: Although retired from formal employment, Patricia aims to preserve her independence, maintain good health, and deepen her impact on the local community. She hopes to lead a neighborhood
    garden plot, mentor younger women in her church on budgeting and home‑management, and complete a personal memoir that documents her family’s migration story. Financially, she strives to keep her savings
    secure and her expenses predictable, reinforcing the routine she values. Patricia also seeks formal recognition for her volunteer efforts, aiming for an “Outstanding Volunteer” award from the senior
    center, which would validate her competitive drive.
