    ''Motorcycle riding'']'
  career_goals: Spencer aims to move from a line operator role to a supervisory position within the next three years, eventually becoming a Production Lead or Maintenance Manager. He plans to earn a certified
    maintenance technician credential and complete an associate’s degree in Industrial Technology at the local community college. His long‑term ambition is to lead a safety and continuous‑improvement committee
    that introduces new packaging technologies, such as smart sensors and robotics, while keeping operations practical and cost‑effective. He also envisions mentoring younger workers and possibly opening
    a small consultancy that helps regional manufacturers enhance equipment reliability and lean processes.
