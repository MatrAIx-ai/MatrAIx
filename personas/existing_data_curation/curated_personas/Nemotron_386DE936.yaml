personas:
  professional: Maria Figuereo, a methodical teen programmer in a high‑school equivalency track, fuses their bilingual fluency and strategic mindset from competitive soccer into early Python and web projects
    aimed at bilingual education, and pursues coding competitions with a fierce, results‑oriented drive.
  sports: Maria Figuereo, a midfield captain for the Dallas United FC youth league, relishes the tactical challenges of 11‑vs‑11 matches, studies game footage of FC Dallas and the Mexico national team to
    sharpen their play, and balances team drills with solo conditioning runs at the local park.
  arts: Maria Figuereo, a budding digital artist who experiments with Canva and Photoshop, draws visual inspiration from Studio Ghibli’s animation and the moody beats of Bad Bunny and Billie Eilish, and
    fuels their sci‑fi imagination with novels by Isaac Asimov and mystery thrillers by Gillian Flynn.
  travel: Maria Figuereo, a budget‑savvy explorer who has road‑tripped to San Antonio’s River Walk and Santa Fe’s art scene, now plans a future immersion in Tokyo’s tech expos and Barcelona’s architecture,
    using TripIt and a detailed spreadsheet to stretch their limited travel funds while squeezing in family visits.
  culinary: Maria Figuereo, an enthusiastic home cook who masterfully prepares tacos al pastor, chilaquiles verdes, and fresh pico de gallo using corn masa, ancho chilies, and cilantro, often experimenting
    with slight twists like pineapple salsa while proudly sharing the dishes with their soccer teammates after matches.
  core: Maria Figuereo blends competitive drive, meticulous planning, and bilingual curiosity to turn everyday challenges into strategic opportunities, even if occasional impulse buys and late‑night coding
    sprints test their disciplined routine.
background:
  cultural: Maria is a second‑generation Mexican‑American raised in San Antonio's vibrant Latino community. She grew up in a bilingual household where Spanish is spoken at home and English at school, giving
    her fluency in both languages. Family gatherings often feature traditional celebrations such as Día de los Muertos and local festivals like Fiesta, reinforcing strong ties to cultural heritage. She
    appreciates Tex‑Mex cuisine and participates in community events hosted by local churches and cultural centers. Maria is aware of the educational challenges faced by many Hispanic youth, which fuels
    her commitment to community service and her ambition to develop tech solutions that benefit her community.
attributes:
  skills: '[''time management'', ''bilingual communication (English/Spanish)'', ''basic programming (Python, HTML/CSS)'', ''digital content creation (Canva, Photoshop)'', ''research and analytical evaluation'',
