  hobbies: '[''soccer (competitive league)'', ''digital art and graphic design'', ''coding personal projects (websites, games)'', ''reading sci‑fi and mystery novels'', ''cooking traditional Mexican cuisine'',
    ''listening to Tex‑Mex and Latin music'', ''volunteering as a tutor at community center'', ''photography of San Antonio cityscape'']'
  career_goals: Maria aims to complete a high‑school equivalency program within the next year, then enroll in a community‑college associate degree in Computer Science. She plans to transfer to a four‑year
    university to earn a bachelor's in Software Engineering, focusing on creating bilingual educational technology for Latino youth. In the longer term, she aspires to launch her own startup that develops
    user‑friendly apps that bridge language gaps in school curricula, combining her curiosity for new tech with a practical desire to support her community. Her competitive drive pushes her to seek internships
    and coding competitions to become a top performer in her field.
