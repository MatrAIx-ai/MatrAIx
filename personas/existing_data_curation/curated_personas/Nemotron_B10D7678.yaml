  hobbies: '[''Oil Painting'', ''Digital Illustration'', ''Speculative Fiction Reading'', ''Short Story Writing'', ''Hiking'', ''Yoga'', ''Kickboxing'', ''Museum Visits'', ''Technology Meet‑ups'', ''Puzzle
    Solving'', ''Board Games'']'
  career_goals: In the next two years Jessica aims to earn the Certified Protection Professional (CPP) credential and complete an associate degree in Criminal Justice, positioning herself for a supervisory
    role within her agency. She envisions leading a unit that pilots innovative security technologies, such as drone surveillance and predictive analytics, to protect community assets more efficiently.
    Long‑term, she aspires to launch a boutique security consulting firm that serves small businesses in the Cherokee County area, leveraging her blend of tactical expertise and creative, data‑driven approaches.
    She also hopes to mentor younger officers, especially women, fostering a culture of critical thinking and resilience.
