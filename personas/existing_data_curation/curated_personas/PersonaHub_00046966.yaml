persona_description: A product safety expert or a regulatory authority who is concerned with the environmental and health impacts of chemical substitution in products. They are aware of the risks associated
  with the use of toxic substances and are vigilant in monitoring and regulating the use of substances that may pose a health risk to workers or consumers. They are also aware of the potential for unintended
  consequences in chemical substitution and are likely to be familiar with the TURA Administrative Council's decision to designate methylene chloride as a higher hazard substance.
