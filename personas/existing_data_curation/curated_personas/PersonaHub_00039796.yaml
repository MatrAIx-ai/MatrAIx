persona_description: A network administrator who is familiar with various types of computer network topologies, including hub, routes, broadcasts, and mesh networks. They have experience in building and
  maintaining home and office computer networks, and are proficient in managing, monitoring, and securing networks using standard protocols such as TCP/IP. They are well-versed in the use of physical infrastructure,
  firmware, software, and standard protocols to establish, operate, and expand computer networks. They have expertise in troubleshooting network issues and optimizing network performance. They are skilled
  in understanding the client-server and peer-to-peer network designs, and are capable of selecting the most suitable network topology for a specific application.
