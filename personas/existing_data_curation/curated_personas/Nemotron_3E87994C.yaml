personas:
  professional: Aida Garcia, a 69-year-old licensed journeyman electrician, leverages four decades of wiring expertise and solar photovoltaic design to run a boutique consulting firm that delivers systematic,
    code-compliant retrofits for desert homes, and they blend meticulous project management with an artist’s eye for creative problem-solving while mentoring the next generation of women apprentices.
  sports: Aida Garcia enjoys low-impact fitness, regularly hiking the Sonoran Desert’s Saguaro National Park trails with the Arizona Desert Hiking Club, practices gentle yoga twice a week for flexibility,
    and they follow the Arizona Diamondbacks and Phoenix Suns, cheering them from their backyard patio during the summer.
  arts: Aida Garcia immerses themselves in the arts by painting desert sunsets in watercolor, drawing inspiration from Georgia O'Keeffe and the Tucson Museum of Art’s rotating exhibitions, while they curate
    a personal collection of vintage electrical tools as functional art and listen to the folk ballads of Lila Downs during their studio sessions.
  travel: Aida Garcia prefers purposeful travel, planning meticulously for solo trips that blend desert exploration with cultural immersion—they have trekked the Sahara dunes, toured the solar farms of
    Iceland, and cherished weekend getaways to Sedona’s red rocks, all while budgeting carefully to keep their consulting practice funded.
  culinary: Aida Garcia delights in cooking traditional Mexican fare such as pozole, mole poblano, and nopal tacos, meticulously seasoning with dried chilies, epazote, and fresh cilantro, while they also
    experiment with solar-cooked quinoa salads, and they take pride in hosting holiday feasts for their apprentices and family.
  core: Aida Garcia is a serene, methodical electrician‑turned‑sustainability consultant whose solitary watercolor practice, vintage tool hobby, and relentless mentorship of women apprentices reflect a
    calm yet competitive spirit, and they balance artistic curiosity with precise craftsmanship.
background:
  cultural: Aida is a first‑generation Mexican‑American whose parents emigrated from Jalisco, Mexico, in the 1950s. Raised in a bilingual household in Arizona, she grew up celebrating Día de los Muertos,
    Las Posadas, and other Mexican traditions while also embracing the desert culture of Pinal County. Her family’s emphasis on hard work and community service shaped her resilient outlook and dedication
    to mentorship. Although she has assimilated many aspects of American life, she maintains strong ties to her heritage through language, cuisine, and participation in local cultural festivals, which continue
    to inform her artistic sensibilities and collaborative spirit.
attributes:
  skills: '[''Residential wiring'', ''Commercial electrical systems'', ''Solar photovoltaic installation and maintenance'', ''Blueprint and schematic interpretation'', ''Electrical code compliance (NEC)'',
    ''Project planning and scheduling'', ''Safety inspection and hazard mitigation'', ''Mentoring apprentices'', ''Troubleshooting high‑voltage systems'', ''Basic carpentry and custom fixture fabrication'']'
  hobbies: '[''Watercolor painting'', ''Visiting art galleries'', ''Reading about technology and science'', ''Gardening (native cacti and herbs)'', ''Hiking desert trails'', ''Cooking Mexican cuisine'',
    ''Collecting and restoring vintage electrical tools'']'
  career_goals: Aida aims to solidify her legacy by expanding her small contracting firm into a consultancy that specializes in sustainable retrofits for older homes in the Sonoran desert region. She plans
    to mentor more women and minority apprentices, develop a concise handbook on resilient electrical design for extreme climates, and volunteer her expertise for community solar projects in Pinal County.
    While she intends to gradually reduce her hands‑on workload, she hopes to remain active as a strategic advisor and occasional trainer until retirement.
