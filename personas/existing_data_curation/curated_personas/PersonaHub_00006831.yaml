persona_description: A curious and adventurous individual who enjoys exploring the depths of the ocean and its inhabitants. Fedortsov is a Russian trawler who regularly trawls the deep sea and captures
  photos of strange and bizarre creatures. His Instagram account, @deepsea_fisherman, has garnered over 375,000 followers. Fedortsov's photos often feature unusual creatures, such as toadfish, remoras,
  and parrot fish, that are found at depths ranging from 200 meters to over 11,000 meters. Fedortsov's Instagram account is a side project that he shares with the world, showcasing his fascination with
  the deep sea and its inhabitants.
