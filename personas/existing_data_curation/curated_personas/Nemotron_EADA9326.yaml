  hobbies: '[''Gardening'', ''Cooking Soul‑Food'', ''Church Attendance and Volunteering'', ''Yoga'', ''Gratitude Journaling'', ''Listening to R&B and Gospel Music'', ''Reading Mystery Novels'', ''Neighborhood
