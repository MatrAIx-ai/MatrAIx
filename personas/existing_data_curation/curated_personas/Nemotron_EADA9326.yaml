  career_goals: Jean aims to expand her brokerage presence by building a small, reliable team of agents who share her practical approach, ultimately opening her own boutique real‑estate firm focused on
    serving the African‑American community in South Florida. She seeks to earn a senior broker designation, increase her annual sales volume to secure greater financial stability, and develop a mentorship
    program for new agents to foster a supportive, routine‑driven work environment. Reducing stress through more predictable income streams and a structured team workflow is a central ambition.
