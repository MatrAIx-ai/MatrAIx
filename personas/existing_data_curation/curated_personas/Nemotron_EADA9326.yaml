personas:
  professional: Jean Cheatum, a seasoned real‑estate broker in Lake Worth, combines meticulous market analysis and a people‑first negotiating style with a routine‑driven yet flexibly responsive workflow,
    leveraging their detail‑oriented contract skills and community knowledge to match buyers with homes while navigating occasional disorganization through assertive follow‑up.
  sports: Jean Cheatum, an avid supporter of the Miami Dolphins and Miami Heat, jogs with the Lake Worth Community Running Club each Saturday morning, plays casual tennis at the Palm Beach County Parks,
    and joins seasonal beach volleyball meet‑ups while preferring low‑impact fitness activities that fit their garden‑centric routine.
  arts: Jean Cheatum, a devoted listener of classic R&B legends like Aretha Franklin, Marvin Gaye, and Sam Cooke, attends gospel services featuring the uplifting choir of their Baptist church, devours mystery
    novels by Agatha Christie and Tana French, and enjoys occasional trips to the Miami City Ballet performances.
  travel: Jean Cheatum, who prefers well‑planned yet relaxed getaways, frequently visits nearby historic towns such as Savannah and New Orleans for culinary tours, dreams of a family vacation to the Bahamas’
    Bahamian islands, and schedules a yearly road trip along Florida’s Gulf Coast to balance adventure with familiar comforts, illustrating their blend of curiosity and love for routine.
  culinary: Jean Cheatum, an accomplished home cook, excels at soul‑food staples like fried chicken, collard greens seasoned with smoked turkey, and sweet‑potato pie, expertly blends traditional spices
    such as paprika and cayenne, and relishes sharing these dishes at family gatherings while occasionally over‑indulging in rich desserts, reflecting their comfort‑seeking palate.
  core: Jean Cheatum blends a routine‑loving, community‑centric real‑estate career with a love for soulful cooking, classic R&B, and yoga, all while juggling occasional disorganization and a penchant for
    worry that fuels their meticulous planning.
background:
  cultural: Jean is a Black woman raised in South Florida, deeply connected to the African‑American cultural fabric of Lake Worth and Palm Beach County. Her upbringing was shaped by the traditions of the
    Black church, community solidarity, and celebrations like Juneteenth and Kwanzaa. She draws strength from her heritage's emphasis on resilience, family, and mutual support, which informs her dedication
    to serving the local Black community through her real‑estate practice and community involvement.
