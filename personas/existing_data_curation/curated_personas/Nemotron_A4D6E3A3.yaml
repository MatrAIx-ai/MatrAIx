  career_goals: Daniel aims to move from a frontline representative to a supervisory or training role within the customer service department of his company. He plans to earn a certification in Call-Center
    Management and a short course in User Experience (UX) design, leveraging his love of novelty and abstract thinking. In the next five years, he hopes to become a Team Lead or Quality Assurance Analyst
    where he can shape service workflows, mentor new agents, and incorporate creative problem-solving techniques. Long-term, he envisions transitioning into a hybrid role that blends customer insight with
    content creation, such as developing knowledge-base articles, instructional videos, or visual guides that make complex information accessible and engaging.
