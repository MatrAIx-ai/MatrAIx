  career_goals: Mary aims to pursue a bachelor’s degree in computer science or engineering, with a long‑term ambition to work in software development that supports sustainable agriculture and environmental
    stewardship. She envisions designing data‑driven tools for precision farming, allowing her to combine her technical curiosity with practical problem‑solving. While she values independent work, she also
    hopes to occasionally collaborate on open‑source projects. In the short term, she plans to complete advanced coding courses, join a robotics club, and secure a summer internship or mentorship in a tech‑focused
    company. Ultimately, she seeks a career that offers flexibility, remote work possibilities, and the ability to make tangible contributions to her rural community.
