  career_goals: Michael aims to progress into senior leadership where he can shape the strategic direction of health, safety, and sustainability across a manufacturing organization. Over the next five years
    he plans to earn a Master’s degree in Occupational Safety Management, obtain Certified Safety Professional (CSP) accreditation, and complete an executive MBA. He aspires to become Director of Environmental,
    Health & Safety, spearhead zero‑incident and green‑manufacturing initiatives, and mentor the next generation of engineers while sharing best practices through industry conferences and publications.
