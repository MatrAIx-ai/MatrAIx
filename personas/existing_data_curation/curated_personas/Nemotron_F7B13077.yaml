  hobbies: '[''Gardening'', ''Bridge (card game)'', ''Historical Society volunteering'', ''Walking/Hiking'', ''Woodworking'', ''Community theater'', ''Reading historical nonfiction'', ''Organizing seniors’
    bingo nights'']'
  career_goals: Evin aims to shepherd his department through a successful accreditation renewal within the next two years, launch a faculty mentorship program for early‑career instructors, and publish a
    practical guide on blended learning for community colleges. As he approaches retirement, he intends to transition to part‑time consulting, continue mentoring emerging educators, develop community‑based
    adult‑education workshops, and secure a leadership role as director of a teaching and learning center where he can institutionalize systematic improvements and promote evidence‑based teaching practices.
