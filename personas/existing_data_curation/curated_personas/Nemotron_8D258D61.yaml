  hobbies: '[''Cooking traditional Mexican recipes'', ''Herb gardening'', ''Attending cultural festivals'', ''Listening to regional Mexican music and southern blues'', ''Reading historical fiction'', ''Volunteering
    at community center (English/Spanish tutoring)'', ''Quilting'', ''Hiking in the Ozarks'']'
  career_goals: Elizabeth aims to move into a supervisory or assistant manager role within the next two years, where she can lead a team to consistently top sales performance and develop a mentorship program
    for younger employees. She also dreams of eventually opening a small boutique that highlights authentic Mexican foods and crafts, blending her retail expertise with her cultural heritage. In the interim,
    she seeks opportunities to train on leadership skills and contribute to store‑wide initiatives that improve customer experience and operational efficiency.
