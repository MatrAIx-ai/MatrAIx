persona_description: A scientist at Washington University School of Medicine in St. Louis who specializes in the study of human genetics, particularly the analysis of unique human genes and their cellular
  functions. They are particularly interested in the role of TBC1D3 gene in cancer and the potential of human-specific genes to offer unique insights into human physiology and the parasite cycle. They are
  also interested in the use of laboratory animals and human cell lines to study gene functions and the potential of altering gene functions in these models to understand the effects on human health.
