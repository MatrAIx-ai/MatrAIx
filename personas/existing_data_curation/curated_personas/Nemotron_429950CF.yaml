personas:
  professional: Taly Arteiro is an aspiring young programmer who creates playful Scratch games, balancing curiosity with practical problem‑solving while also organizing soccer drills for friends, showcasing
    their sociable, organized yet flexible nature.
  sports: Taly Arteiro is a passionate soccer enthusiast who plays for the San Jose Soccer Academy, cheers on the San Jose Earthquakes and San Jose Sharks, and approaches fitness with energetic group games
    and regular park runs, reflecting their outgoing, cooperative spirit.
  arts: Taly Arteiro delights in drawing vivid murals inspired by Diego Rivera, crafting colorful papel picado for family celebrations, dancing to lively folk tunes by Lila Downs, and enjoying animated
    films by Pixar, which together shape their creative, compassionate identity.
  travel: Taly Arteiro loves weekend family trips to the Guadalupe River Trail, Santa Cruz Beach Boardwalk, and occasional visits to Yosemite, while dreaming of exploring Mexico City’s historic plazas and
    vibrant festivals, favoring hands‑on planning and group adventures within a modest budget.
  culinary: Taly Arteiro enjoys helping prepare tacos al pastor, tamales, and fresh guacamole using corn tortillas, chilies, and cilantro, honing basic cooking skills in the family kitchen and proudly sharing
    these dishes with friends, reflecting their love of cultural flavors and generosity.
  core: Taly Arteiro is a vibrant, socially‑savvy 10‑year‑old who blends coding curiosity, soccer energy, and festive creativity with a generous heart and a habit of forgetting to finish homework.
background:
  cultural: Taly is a Mexican-American raised in a bilingual household in San Jose. Her family maintains strong ties to Mexican traditions, celebrating Día de los Muertos, Cinco de Mayo, and family gatherings
    centered around homemade Mexican cuisine. She speaks Spanish fluently alongside English, and she participates in community events at the local Mexican cultural center, such as folkloric dance workshops
    and cultural festivals. Her upbringing blends the warmth of Mexican family values with the diverse, tech-savvy environment of Silicon Valley, shaping a balanced cultural identity.
