persona_description: A scientist who specializes in the study of the Milky Way galaxy, particularly in the field of astrophysics. She uses advanced techniques and tools to create detailed maps of the galaxy,
  using individual objects to trace its shape in three dimensions. Her research interests include the warping of the Milky Way disc and its causes, as well as the use of cepheids as cosmic yardsticks. She
  is also interested in the potential impact of the warping on the structure and evolution of the galaxy.
