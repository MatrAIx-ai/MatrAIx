  career_goals: Although officially retired, Beverly aims to deepen her impact on the Burbank senior community. She plans to launch a monthly “Senior Chef’s Club” where residents share recipes and cooking
    tips, and to mentor newer volunteers in event management and safety protocols. She hopes to publish a quarterly newsletter that highlights local resources for older adults, and ultimately to establish
    a small scholarship fund in her late husband’s name to support community‑service projects pursued by seniors.
