  career_goals: Danna aims to progress from first-line supervision to senior facilities management, targeting a role such as Operations Manager or Director of Facilities at a large institution like a university,
    hospital, or corporate campus. She plans to earn a professional certification in facilities management and possibly pursue a master's degree focused on sustainability or hospitality leadership. In the
    longer term, she dreams of launching her own boutique consultancy that offers innovative, eco-friendly housekeeping solutions, leveraging her creative problem-solving skills and business background.
    She is also committed to mentoring other women in supervisory positions and becoming recognized as a change-agent who implements efficiency and sustainability improvements.
