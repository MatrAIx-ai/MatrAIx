    educational TV'']'
  career_goals: Damien dreams of becoming an engineer or architect who designs safe, fun spaces for kids like himself. He is fascinated by how bridges, playgrounds, and buildings are built and wants to
    contribute to projects that improve his Chicago neighborhood. He also expresses a desire to help protect Lake Michigan by learning about environmental science. Although he is still young, his practical
    curiosity drives him to set short‑term goals such as winning his school’s science fair, mastering more advanced Scratch projects, and eventually participating in a youth robotics program.
