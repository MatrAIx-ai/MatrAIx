  career_goals: He dreams of turning his passion for visual storytelling into a professional path, aiming to become a concept artist or digital media designer for video games, animation, or film. In the
    short term, he hopes to enroll in a specialized high-school art program and build a strong portfolio. He plans to study visual arts and interactive design at a university such as Virginia Commonwealth
    University or the Rhode Island School of Design. Beyond personal success, he wants to leverage his art to raise awareness about teen mental-health challenges, eventually leading community workshops
    that combine creative expression with emotional resilience.
