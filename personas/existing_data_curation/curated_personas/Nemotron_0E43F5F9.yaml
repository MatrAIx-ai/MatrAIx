personas:
  professional: Sheyla Leon is a seasoned municipal maintenance technician who blends a practical, code‑compliant approach to plumbing, electrical, HVAC and carpentry repairs with a curious eye for smart‑home
    upgrades, and their assertive yet cooperative demeanor shines when they lead small crews on preventive‑maintenance projects.
  sports: Sheyla Leon hits the local park for early‑morning jogs during spring and autumn, follows the New England Patriots and Boston Red Sox closely, and participates in a community recreational soccer
    league that meets on summer weekends, all while preferring low‑impact exercises that fit their busy schedule.
  arts: Sheyla Leon immerses themselves in the rhythmic sounds of salsa and bomba, regularly streaming classics by Celia Cruz and Marc Anthony, while also singing in their church choir and attending local
    theater productions of works by Lin‑Manuel Miranda, which fuel both their cultural pride and creative energy.
  travel: Sheyla Leon prefers short, purpose‑driven road trips to New England coastal towns such as Portsmouth and Cape Cod, and when budgeting allows, dreams of a cultural immersion vacation to Old San
    Juan and the coastal villages of the Dominican Republic, planning each itinerary with a mix of culinary stops and historic tours.
  culinary: Sheyla Leon takes pride in mastering traditional island dishes like arroz con gandules and pernil, seasoning them with fresh recao, cilantro, and ripe tomatoes from their garden, while balancing
    their cooking skill of just‑right flavor with occasional over‑salted attempts that prompt friendly ribbing from family.
  core: Sheyla Leon blends a pragmatic, tool‑savvy mind with a lively love for island cuisine and church choir, constantly juggling career ambition, meticulous budgeting, and intense anxiety that fuels
    both meticulous work and occasional over‑cooking.
background:
  cultural: Sheyla grew up in a Puerto Rican household where Spanish was spoken alongside English, preserving traditions such as holiday feasts, music, and Catholic celebrations. After moving to Portsmouth,
    Virginia, she remains connected to the island’s culture through community festivals, church gatherings, and cooking. Her bilingual ability enables her to bridge cultural gaps at work and in the community,
    and she often shares Puerto Rican culinary and musical heritage with neighbors. Family ties, religious values, and a strong sense of pride in her heritage shape her worldview and daily interactions.
attributes:
  skills: '[''plumbing repairs'', ''electrical troubleshooting'', ''HVAC maintenance'', ''basic carpentry'', ''preventive maintenance scheduling'', ''OSHA safety compliance'', ''inventory management'',
