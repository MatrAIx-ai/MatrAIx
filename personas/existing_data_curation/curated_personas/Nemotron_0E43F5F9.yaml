  hobbies: '[''cooking Puerto Rican cuisine'', ''gardening (herbs and vegetables)'', ''listening to salsa and bomba music'', ''salsa dancing'', ''reading home-improvement magazines'', ''DIY home projects'',
    ''volunteering at community clean-up events'', ''mindfulness breathing exercises'', ''church choir participation'']'
  career_goals: She aims to advance to a supervisory or foreman role within the municipal maintenance department, overseeing a team and coordinating larger building projects. She plans to obtain certifications
    in HVAC technology, EPA lead-safe practices, and OSHA 30-hour safety training to broaden her expertise. Long-term, she envisions starting her own small contracting business focused on energy-efficient
    repairs and culturally sensitive services for the Puerto Rican community in Portsmouth, while securing a predictable schedule that reduces anxiety and supports her family.
