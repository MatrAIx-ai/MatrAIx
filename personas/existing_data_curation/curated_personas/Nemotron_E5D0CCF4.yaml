  hobbies: '[''Watercolor and acrylic painting'', ''Gardening (flowers, herbs, seasonal beds)'', ''Baking and exploring new recipes'', ''Reading contemporary fiction, art books, and philosophy'', ''Attending
    community theater and live music events'', ''Participating in senior book clubs and craft circles'', ''Volunteering at local community centers'', ''Traveling to museums and historic sites'', ''Bird‑watching'',
    ''Scrapbooking and digital photo editing'']'
  career_goals: Although retired from formal employment, Amanda is driven to deepen her involvement in the cultural life of St. Charles County. She aims to launch an intergenerational art program that pairs
    senior artists with elementary‑school students, fostering creative exchange and mutual mentorship. She hopes to curate a traveling exhibition of works created by local seniors, thereby giving visibility
    to often‑overlooked creators. Additionally, Amanda plans to compile a community‑wise oral‑history book that documents personal stories from longtime residents, a project she believes will preserve the
    area’s heritage for future generations. On a personal level, she seeks to maintain her mental and physical health through regular social engagement, occasional travel to major art museums, and continued
    learning in digital photography and contemporary art trends.
