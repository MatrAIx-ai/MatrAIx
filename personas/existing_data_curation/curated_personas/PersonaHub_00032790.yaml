persona_description: A scientist or researcher working in the field of plant pathology, specifically focused on the study of pecan scab disease. This person has expertise in plant physiology, specifically
  in the development and control of fungal diseases. They are conducting research to develop new control methods for pecan scab, using phosphite-based fungicides as a systemic control method. This person
  is likely to be interested in the economic impact of pecan scab on the Louisiana pecan industry, as well as the potential for phosphite-based fungicides to be a cost-effective and sustainable control
  method for the disease. They may also be interested in the potential for phosphite-based fungicides to be used in other specialty crops, and in the broader implications of phosphite-based fungicides for
  the development of new control methods for fungal diseases.
