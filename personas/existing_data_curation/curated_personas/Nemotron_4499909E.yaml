  hobbies: '[''Drawing fantasy maps'', ''Digital painting'', ''Reading sci‑fi and mythological novels'', ''Creative writing (short stories, poetry)'', ''Coding interactive stories in Scratch'', ''Solving
    puzzles (Sudoku, logic games)'', ''Playing chess'', ''Participating in school drama'', ''Organizing group activities'', ''Astronomy observation'', ''Practicing Indian classical dance'', ''Cooking festive
    dishes'']'
  career_goals: Meena aims to combine her artistic talent and tech-savvy mindset into a career as a concept artist and interactive storyteller for video games or animated films. In the near term, she plans
    to win the regional middle‑school art contest, secure a place in her high school’s specialized visual arts program, and earn recognition at the school science fair with a project that visualizes space
    phenomena. She also wants to build a comprehensive digital portfolio that showcases her illustrations and interactive works to attract mentorship from professional artists. Long term, Meena envisions
    studying visual arts and computer science at a university known for interdisciplinary media, working with leading game studios to design immersive worlds, and eventually mentoring young creators while
    advocating for mental‑health resources for creative teens.
