personas:
  professional: An aspiring digital illustrator and narrative designer, Meena Rana combines meticulous planning with boundless imagination to craft fantasy maps and interactive Scratch stories, often leading
    club brainstorming sessions while feeling nervous about meeting project deadlines.
  sports: A competitive member of the local youth soccer league who trains with the Portland Timbers junior academy, Meena Rana also joins weekend hikes along the Columbia River Gorge, setting personal
    distance goals while drawing energy from team camaraderie.
  arts: A dynamic performer and creator, Meena Rana lights up school drama productions, choreographs Indian classical dance routines for cultural festivals, and spends evenings listening to A. R. Rahman's
    Bollywood soundtracks while painting digital scenes inspired by mythic folktales and sci‑fi novels.
  travel: An adventurous explorer, Meena Rana loves planning weekend trips to the Oregon coast and camping in the Cascade Mountains, dreams of visiting the historic river city of Varanasi to experience
    its festivals, and balances these aspirations with family budget constraints.
  culinary: A budding home chef, Meena Rana delights in preparing fragrant saffron biryani, whipping up mushroom‑and‑herb risotto with local Pacific Northwest ingredients, and experimenting with vegan samosa
    fillings seasoned with cumin and coriander, though they often neglect to clean the kitchen afterward.
  core: Meena Rana is a meticulous, imagination‑driven 12‑year‑old whose competitive spark fuels artistic projects, cautious saving, and a love of hiking, while a lingering worry about perfection adds a
    self‑critical edge.
background:
  cultural: Meena is a second‑generation South Asian American whose family roots trace back to Gujarat, India. Growing up in Portland’s diverse Washington County, she experiences a blend of American and
    South Asian cultural values. Her household places strong emphasis on education, respect for elders, and community connections, which is reflected in the celebration of Diwali, Holi, and Navratri, where
    Meena helps with decorations, traditional dances, and cooking. She speaks English fluently and understands Gujarati, practicing the language at home and during cultural school events. Meena enjoys Bollywood
    music, Indian cuisine, and reading Indian folktales, often incorporating these motifs into her artwork. At the same time, she embraces the Pacific Northwest love for nature, joining local hiking clubs
    and exploring the region’s forests and coastline. This bicultural upbringing fuels her imagination, giving her a unique perspective that merges Eastern storytelling traditions with Western visual aesthetics.
