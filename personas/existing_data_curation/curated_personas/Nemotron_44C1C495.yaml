  career_goals: Sharon hopes to transform her practical and community‑building abilities into a modest, flexible source of income. She envisions starting a small home‑based venture selling garden produce,
    homemade preserves, and handcrafted quilts at local farmers’ markets. To support this, she plans to take a short horticulture workshop and an online course in small‑business basics. A secondary goal
    is to earn her GED, giving her the option for part‑time administrative or clerical work that respects her family schedule. Ultimately, she aims for financial independence while remaining available for
    her family and community commitments.
