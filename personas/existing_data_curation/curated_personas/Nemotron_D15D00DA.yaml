personas:
  professional: Jasen Ford is a seasoned mechanical engineer and data analyst who channels their boundless curiosity, hands‑on prototyping knack, and relaxed, people‑centric demeanor into mentoring high‑school
    STEM students, designing low‑cost sustainable solutions for small Appalachian businesses, and spearheading the creation of a community makerspace, and they relish watching concepts evolve from sketches
    to functional prototypes.
  sports: Jasen Ford enjoys weekend hikes on the Blue Ridge and is an active member of the Appalachian Hiking Club, casually follows the West Virginia Mountaineers and the Charlotte Hornets, and they often
    join community pick‑up basketball games where their easygoing attitude keeps the mood light.
  arts: Jasen Ford immerses themselves in the arts by painting Appalachian watercolor landscapes inspired by Winslow Homer, photographing local festivals with a vintage Leica, performing in the community
    theater troupe The Mountain Players, and jamming to folk legends like Doc Watson and Bob Dylan, and they find inspiration in the region's storytelling tradition, all of which shape their creative identity.
  travel: Jasen Ford prefers spontaneous road trips that blend scenic hikes in Shenandoah National Park with cultural stops at Asheville’s craft fairs, has already trekked the Appalachian Trail, dreams
    of exploring the Bavarian Alps and Kyoto’s artisan districts, and they usually plan travel around flexible schedules and modest budgets.
  culinary: Jasen Ford delights in cooking hearty Appalachian fare such as smoked trout with dill, corn‑maize mash, and wild mushroom risotto, skillfully wields a cast‑iron skillet, and they often pair
    meals with locally brewed craft beer while occasionally trying Mediterranean dishes like shakshuka for a culinary adventure.
  core: Jasen Ford is a curious, community‑oriented 53‑year‑old tinkerer who blends engineering precision with artistic spontaneity, favors flexible plans, and they can’t resist a weekend of watercolor
    painting, woodworking, and folk music jam sessions, even if it means occasional disorganization.
background:
  cultural: Jasen grew up in a multigenerational family rooted in the Appalachian foothills of western North Carolina. The region’s traditions of storytelling, folk music, and mountain crafts have shaped
    his values of community, harmony, and self‑reliance. He identifies with Southern hospitality, active participation in his local church, and a deep respect for the natural environment of the Blue Ridge
    Mountains. While his heritage is primarily white Appalachian, he embraces the cultural diversity of the area, often collaborating with local artists and Indigenous groups to celebrate shared histories.
