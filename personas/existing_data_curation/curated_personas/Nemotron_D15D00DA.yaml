  hobbies: '[''Watercolor painting'', ''Landscape photography'', ''Community theater'', ''Woodworking'', ''Instrument making'', ''Hiking'', ''Folk music jam sessions'', ''Attending art galleries and craft
    fairs'', ''Reading about emerging tech and art'']'
  career_goals: Although currently not employed, Jasen aims to leverage his technical knowledge and social strengths to give back to his community. He plans to volunteer as a STEM mentor for local high‑school
    students, help establish a makerspace in Murphy, and occasionally take on part‑time consulting projects that allow him to design sustainable solutions for small businesses. He also dreams of publishing
    a guide on integrating art and technology for community workshops, and eventually curating an annual art‑tech festival that celebrates Appalachian creativity.
