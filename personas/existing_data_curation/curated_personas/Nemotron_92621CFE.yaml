  career_goals: David aims to transition from a first‑line supervisor to a regional sales manager within the next three years, eventually stepping into a director‑level role where he can shape company‑wide
    sales strategy. He is interested in earning an MBA part‑time to deepen his business acumen and to prepare for executive leadership. Long‑term, David envisions launching a consulting practice that helps
    midsize manufacturers streamline their sales processes and integrate innovative technology solutions. Throughout his career trajectory, he remains committed to fostering a collaborative, high‑performing
    team culture that values work‑life balance and community involvement.
