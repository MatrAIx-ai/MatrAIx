persona_description: A research scientist who specializes in the development and validation of tools for assessing health behaviors and their correlates. This individual has expertise in psychosocial, intergenerational,
  and environmental factors that influence health behaviors, and has experience in survey development and data analysis. This researcher is interested in studying the direct and indirect associations between
  neighborhood/community environments, home, psychosocial, intrapersonal factors, and other behaviors (e.g., sleep, sun-safety, tobacco) on obesogenic behaviors, as well as the role of relationships in
  the home (e.g. parent-adolescent) on obesogenic behaviors. This individual is also interested in the potential of FASST to collect useful data addressing research gaps not currently captured in national
  data that will help answer key obesity research questions and inform the development of interventions.
