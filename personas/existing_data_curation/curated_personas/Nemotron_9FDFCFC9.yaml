personas:
  professional: Rodrigo Perez, a one‑year‑old aspiring problem‑solver, channels a relentless curiosity into building towers of soft blocks and sorting colorful shape puzzles, balancing meticulous organization
    with spontaneous play, and they display a competitive edge by racing to grab the newest toy and reacting intensely when routines are disrupted.
  sports: Rodrigo Perez, a one‑year‑old with a budding love for movement, delights in weekly parent‑and‑toddler gymnastics classes at the community center and giggles at televised New York Yankees games,
    and they often try to be the first to climb the foam obstacle course, showing an early competitive spark in physical play.
  arts: Rodrigo Perez, an inquisitive infant, revels in the soothing strings of Yo‑Yo Ma, the playful melodies of Mozart, and the bright illustrations of Eric Carle’s picture books, often babbling along
    to the Toy Story theme and reacting with wide‑eyed wonder to Pixar’s animated scenes, which they eagerly absorb as a form of early artistic appreciation.
  travel: Rodrigo Perez, a year‑old explorer in the eyes of their parents, enjoys short family trips to Central Park’s playground, weekend visits to the city zoo, and sunny days at Santa Monica beach, while
    their caregivers are already saving for a future family vacation to Barcelona, which they eagerly anticipate as a chance to broaden their horizons.
  culinary: Rodrigo Perez, a budding food explorer, prefers smooth sweet‑potato puree with a pinch of cinnamon, creamy avocado mash, and soft mango chunks, delights in occasional soft scrambled eggs and
    tiny bites of well‑cooked carrots, and they often reach for bright red tomato pieces on the high‑chair tray, showcasing an early curiosity for flavors and textures.
  core: Rodrigo Perez, a highly curious one‑year‑old with a competitive streak, balances meticulous play with spontaneous bursts of emotion, and they react intensely to routine changes while delighting
    in music, art, and family adventures.
background:
  cultural: Rodrigo's family maintains strong ties to Mexican cultural traditions while integrating into the diverse community of Salem, Oregon. At home, he hears Spanish spoken alongside English, and celebrates
    Mexican holidays such as Dia de los Muertos and Las Posadas with traditional foods, music, and decorations. His parents incorporate Mexican art motifs, like bright folk patterns and papel picado, into
    his bedroom, fostering an early visual appreciation for his heritage. In the broader Salem context, he participates in community events at local parks and libraries, exposing him to a blend of American
    and Mexican cultural influences that shape his developing identity.
