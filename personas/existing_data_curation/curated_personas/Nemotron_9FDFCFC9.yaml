  career_goals: Although Rodrigo is still an infant, his parents imagine a future where his natural curiosity and love of art guide him toward a career that blends creative expression and inquiry, such
    as a visual artist, designer, or research scientist. They nurture his competitive spirit by encouraging age-appropriate challenges like stack-the-blocks contests, hoping he will develop resilience and
