persona_description: A policy analyst who specializes in the field of poverty reduction and asset building. They are knowledgeable about the distribution of assets in the United States and the barriers
  to ending chronic poverty, particularly for the working poor. They are interested in the use of incentives, such as tax deductions and savings matching, to help people build assets and improve their financial
  situation. They are also familiar with the concept of individual development accounts (IDAs) and have experience with their implementation in the United States. They are interested in the effectiveness
  of IDAs in helping people save for education and retirement, and the role of state and local governments in supporting these programs.
