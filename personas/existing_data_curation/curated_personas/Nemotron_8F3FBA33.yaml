    and Scheduling'']'
  hobbies: '[''Playing acoustic guitar and singing traditional Mexican folk songs'', ''Cooking family recipes and experimenting with fusion dishes'', ''Gardening vegetables and herbs'', ''Hiking Yakima
    River Canyon trails'', ''Watching soccer (Liga MX, MLS)'', ''Volunteering at local church food pantry'', ''Reading self‑help and personal development books'', ''Practicing mindfulness meditation'',
    ''Photography of local landscapes'', ''Attending community cultural festivals'']'
  career_goals: Andres aims to advance from a front‑line counter role to a shift supervisor position within the next two years, leveraging his organizational reliability and cooperative nature. He plans
    to enroll in a part‑time hospitality management certificate program at a nearby community college to gain formal leadership training. Long‑term, he hopes to become a store manager and eventually open
    a small family‑run taquería that blends traditional Mexican flavors with Pacific Northwest produce, providing stable employment for his wife and contributing to the local community. He also prioritizes
    improving his emotional resilience, so he intends to incorporate stress‑management training and mentorship opportunities into his career development.
