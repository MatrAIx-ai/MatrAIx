personas:
  professional: Philip Worrell is an aspiring mechanical engineer, channeling his love for aircraft and car model kits, tech‑focused nonfiction, and a structured problem‑solving mindset into school robotics
    projects where his competitive drive pushes him to perfect every gear.
  sports: Philip Worrell plays midfield for the Orleans County Middle School soccer team, rides with the Trailblazers Bike Club on local forest trails, and fervently cheers for the Buffalo Bills and New
    York Knicks each season.
  arts: Philip Worrell spends evenings painting P‑51 Mustang and Ford Mustang model kits, swears by the guitar riffs of Imagine Dragons while digging into engineering magazines, and occasionally drafts
    short sci‑fi stories inspired by his hobbyist creations.
  travel: Philip Worrell has camped at Letchworth State Park, visited the Finger Lakes wine region on a family weekend, and dreams of exploring the historic landmarks of Washington, D.C., preferring structured
    itineraries mapped out with his parents.
  culinary: Philip Worrell prefers straightforward fare like pepperoni pizza, homemade mac and cheese with sharp cheddar, and grilled trout caught on family fishing trips, and while his cooking is limited
    to reheating basics, he enjoys experimenting with a simple spice rub for the trout.
  core: Philip Worrell is a structured, competitive 13‑year‑old who balances school soccer, model‑kit engineering, and routine chores, yet secretly binge‑plays strategy games and occasionally forgets to
    stretch after practice.
background:
  cultural: Philip was raised in a predominantly white, middle‑class family in Medina, a small town in Orleans County, New York, near the Finger Lakes. The local culture emphasizes hard work, self‑reliance,
    and community involvement, with strong support for school activities, especially sports. Family traditions include regular chores, participation in community events, and occasional church gatherings.
    This rural Northeastern upbringing instills practical values and a preference for routine, while the close‑knit community encourages responsibility and modest ambition.
attributes:
  skills: '[''time management'', ''organized note-taking'', ''basic computer troubleshooting'', ''bike and small-engine maintenance'', ''strategic thinking in team sports'', ''clear communication'']'
  hobbies: '[''soccer'', ''strategy video games'', ''model kit building'', ''bike riding'', ''fishing'', ''reading non-fiction about technology'']'
  career_goals: Philip aims to graduate high school with solid grades and pursue a technical pathway that aligns with his hands‑on interests. He is drawn to automotive technology and hopes to become a certified
    automotive technician or eventually study mechanical engineering at a community college. He also plans to deepen his computer skills, aspiring to a future role in IT support or tech repair. In the short
    term, he intends to earn a part‑time certification in basic auto repair and maybe start a small lawn‑care or bike‑maintenance side business to gain experience and earnings.
