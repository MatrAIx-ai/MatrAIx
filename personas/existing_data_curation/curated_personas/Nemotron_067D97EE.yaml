personas:
  professional: Vanessa Penabad, a budding data analyst with a STEM background, leverages Python, R, and Tableau to turn raw health and environmental data into clear visual stories, thriving in small collaborative
    teams while balancing a love for structured workflows with a relaxed, flexible approach to deadlines.
  sports: Vanessa Penabad drifts along coastal trails near El Segundo on weekend hikes, joins beach volleyball matches at Manhattan Beach, tracks the Los Angeles Dodgers and LA Galaxy seasons religiously,
    and trains with a local running club for the annual Santa Monica Marathon, blending relaxed outdoor activity with a touch of competitive spirit.
  arts: Vanessa Penabad channels creativity into digital illustrations that echo the whimsical style of Studio Ghibli, strums acoustic renditions of John Mayer and Bon Iver during intimate gatherings, and
    captures street and nature moments with a DSLR, often citing the candid eye of Vivian Maier as a guiding influence.
  travel: Vanessa Penabad favors low‑key road trips, having already explored the rugged cliffs of Big Sur and the historic neighborhoods of San Diego, while daydreaming about a spring pilgrimage to Oaxaca’s
    Day of the Dead celebrations and a winter adventure in the Canadian Rockies, balancing spontaneous detours with budget‑friendly planning.
  culinary: Vanessa Penabad experiments in the kitchen with homemade chilaquiles topped with queso fresco, slowly simmered mole poblano infused with dried chilies and cacao, and fresh guacamole brightened
    by ripe avocado, lime, and cilantro, while also mastering the art of hand‑pressed corn tortillas.
  core: Vanessa Penabad merges a data‑driven analytical mind with a quiet creative flair, habitually juggling self‑coded budget‑tracking, sketching sessions, and occasional late‑night hikes, all while battling
    mild procrastination and an irrepressible love for cilantro.
background:
  cultural: Vanessa grew up in a tight‑knit Mexican‑American family in Carson, California. Her parents immigrated from Jalisco and preserve many traditions, such as celebrating Día de los Muertos, preparing
    tamales during holidays, and maintaining a bilingual household where Spanish and English flow interchangeably. The concept of familismo—placing family welfare above individual concerns—shapes her values,
    and she often helps care for younger relatives. She participates in local community events at the Casa de Esperanza cultural center and volunteers at Mexican literacy programs. While she is proud of
    her heritage, she also embraces the multicultural fabric of Los Angeles County, blending Mexican customs with contemporary Californian lifestyle.
attributes:
  skills: '[''Python programming'', ''R for statistical analysis'', ''MATLAB for numerical simulations'', ''SQL database queries'', ''PCR and spectroscopy lab techniques'', ''Data visualization with Tableau'',
