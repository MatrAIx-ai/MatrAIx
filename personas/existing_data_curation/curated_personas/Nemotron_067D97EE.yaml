  hobbies: '[''digital illustration'', ''cooking Mexican cuisine'', ''hiking local trails'', ''reading scientific journals and sci‑fi novels'', ''playing acoustic guitar'', ''personal coding projects'',
    ''volunteer math tutoring'', ''photography (street and nature)'']'
  career_goals: Vanessa aims to convert her academic training into a data‑driven role within healthcare or environmental technology. Over the next two years she plans to secure an entry‑level data analyst
    or research assistant position at a Los Angeles‑based organization that serves the Mexican‑American community. She intends to deepen her machine‑learning skills, earn a professional certification in
    data science, and later pursue a master’s degree in Health Informatics. Her long‑term ambition is to lead projects that leverage real‑time data to improve health outcomes for underserved populations,
    while maintaining a work environment that offers structured tasks yet allows flexible scheduling to accommodate her personal rhythm.
