persona_description: A person who is concerned with public health and is interested in the incidence and causes of Legionnaires disease in the Simcoe Muskoka region. This person may be a health officer,
  epidemiologist, or a person with a background in public health who is monitoring the health data in their community. They are likely to be aware of the risks associated with Legionella bacteria and the
  importance of timely and accurate reporting of cases. They may also be familiar with the testing protocols and weather patterns that can affect the incidence of Legionnaires disease in the region.
