personas:
  professional: Courtney Taylor, a teen visual artist from the Sierra Blanca region, blends watercolor landscapes of the surrounding mountains with emerging digital illustration skills in Krita, capitalizes
    on their strong communication and event‑organizing abilities by leading a small art club, and channels their curiosity and disciplined yet flexible work habits toward a GED and a future community‑college
    graphic design program aimed at freelance illustration for environmental NGOs.
  sports: Courtney Taylor enjoys hiking the Lincoln National Forest trails and joins weekend snowboarding outings at nearby Ski Apache, while cheering for the New Mexico Lobos basketball team and the Colorado
    Avalanche NHL team, and participates in a local youth ski club that meets after school for conditioning and safety drills.
  arts: Courtney Taylor finds inspiration in the works of Georgia O'Keeffe and Bob Ross, spends evenings strumming acoustic covers of Bon Iver and Joni Mitchell while sketching, immerses in indie films
    by Wes Anderson and watches art documentaries on the life of Frida Kahlo, and regularly attends local gallery openings featuring emerging Southwest painters.
  travel: Courtney Taylor prefers low‑key road trips that combine nature and culture, having explored the peaks of Sierra Blanca, taken a weekend to Santa Fe's art districts, trekked the Grand Canyon's
    South Rim, and dreaming of a spring hike through Japan's Kyoto bamboo forest and a summer photography stint in Banff National Park, all while planning trips around school break schedules and a limited
    budget.
  culinary: Courtney Taylor enjoys cooking simple yet hearty dishes like green chile enchiladas with roasted poblano peppers, a quinoa and wild mushroom salad dressed with lemon‑thyme vinaigrette, and a
    cinnamon‑spiced apple crumble featuring locally sourced apples and sage, while their modest cooking skill level reflects a preference for experimenting with fresh herbs and seasonal produce over elaborate
    gourmet techniques.
  core: Courtney Taylor is a nature‑infused teen artist who balances quiet sketching sessions with occasional ski adventures, saves diligently for future art school, manages mild allergies with practical
    care, and occasionally forgets to floss, all while nurturing a gentle, curious, and community‑focused spirit.
background:
  cultural: Courtney is a white Anglo‑American raised in the mountain town of Ruidoso, New Mexico. Her upbringing blends the frontier spirit of the Southwest—valuing self‑reliance, outdoor recreation, and
    community festivals—with exposure to the region’s Hispanic cultural influences, such as local music, food, and bilingual events. Her family emphasizes modesty, hard work, and an appreciation for the
    natural environment, often participating in church‑based youth groups and local volunteer initiatives. This cultural mix has fostered her respect for tradition while encouraging curiosity about new
    ideas and artistic expression.
