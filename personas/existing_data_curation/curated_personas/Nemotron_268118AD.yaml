  hobbies: '[''sketching'', ''watercolor painting'', ''nature photography'', ''reading sci‑fi/fantasy'', ''poetry writing'', ''hiking'', ''skiing'', ''acoustic guitar'', ''indie film watching'', ''knitting
    and crocheting'', ''animal shelter volunteering'', ''art club participation'']'
  career_goals: Courtney aims to complete her secondary education through a GED program while building a robust portfolio of artwork that showcases the natural beauty of New Mexico. She plans to enroll
    in a community college art program, focusing on graphic design and illustration, with the long‑term ambition of becoming a freelance illustrator for outdoor magazines and environmental NGOs. She also
    envisions using her artistic talents to teach workshops in her hometown, combining her love for art and community service. Ultimately, she hopes to merge her creative passions with environmental advocacy,
    possibly working as an art‑based educator for youth programs that promote stewardship of the local wilderness.
