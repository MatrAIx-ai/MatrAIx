  hobbies: '[''Art gallery visits'', ''Digital music production'', ''Basketball pick‑up games'', ''Stepping club'', ''Southern cooking with a modern twist'', ''Reading sci‑fi and philosophy'', ''Mindfulness
    meditation'', ''Community volunteer work'', ''Youth mentorship at church'']'
  career_goals: Tonka aims to complete his associate degree in Business Management within the next two years and earn a Six Sigma Green Belt certification. His short‑term goal is to become a shift manager,
    overseeing multiple production lines and spearheading continuous‑improvement projects that boost efficiency while maintaining a safe, supportive work environment. In the longer term, he envisions advancing
    to plant manager and eventually launching his own small‑scale sustainable manufacturing venture that blends technical excellence with artistic design sensibility. He also hopes to establish a mentorship
    program at his facility to help new workers navigate stress and build resilience.
