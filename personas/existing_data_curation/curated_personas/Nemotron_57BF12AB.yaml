personas:
  professional: Tonka Wilson, a 20-year-old production supervisor in a manufacturing plant, blends rigorous lean-manufacturing scheduling and safety enforcement with a creative mindset drawn from gallery
    visits, mentoring junior crew while systematically improving throughput and fostering a supportive work culture.
  sports: Tonka Wilson energizes their evenings with community basketball pick-up games at the local YMCA, participates in a regional stepping club, passionately supports the nearby college team the Crimson
    Tide, and follows the NBA's Miami Heat, using sport as a social outlet and a healthy stress-reliever.
  arts: Tonka Wilson frequents downtown galleries spotlighting Black visual artists, draws inspiration from jazz greats like John Coltrane and hip-hop producers such as J Dilla, and crafts original digital
    beats on his laptop, merging soulful melodies with experimental sound design.
  travel: Tonka Wilson dreams of exploring culturally rich destinations, from the historic streets of Savannah to the avant-garde museums of Berlin, while presently balancing budget-friendly weekend road
    trips to nearby heritage sites like Selma with student-friendly accommodations, favoring immersive experiences over luxury.
  culinary: Tonka Wilson delights in reinventing Southern comfort foods, preparing shrimp-and-grits risotto with smoked paprika and collard green tacos topped with kimchi slaw, sourcing fresh ingredients
    at local farmer's markets and experimenting with spices like smoked cajun seasoning and harissa to create modern flavor fusions.
  core: Tonka Wilson is a disciplined yet creatively curious 20-year-old who channels Southern hospitality and community spirit into lean manufacturing, soulful music production, and experimental cooking,
    while wrestling with a tendency toward worry.
background:
  cultural: Tonka grew up in a close‑knit African‑American family in Parrish, Alabama, where traditions of Southern hospitality, gospel music, and community solidarity shaped his worldview. He has a deep
    respect for the African diaspora’s artistic legacy, often drawing inspiration from Black visual artists and musicians for his creative pursuits. Family gatherings feature soulful cooking, storytelling,
    and church involvement, reinforcing values of cooperation, resilience, and collective uplift. While embracing his Southern roots, Tonka also explores broader cultural ideas through travel, literature,
    and the diverse artistic scenes he encounters, blending them into a personal identity that honors his heritage while staying open to new influences.
attributes:
  skills: '[''Production supervision'', ''Process optimization'', ''Lean manufacturing'', ''Quality assurance'', ''Safety compliance'', ''Team leadership'', ''Inventory management'', ''Data analysis'',
