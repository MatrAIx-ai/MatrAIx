  hobbies: '[''Hiking'', ''Snowboarding'', ''Yoga'', ''Cooking and baking'', ''Reading contemporary fiction'', ''Knitting and scrapbooking'', ''Board game nights'', ''Journaling'', ''Attending local open‑mic
    events'']'
  career_goals: Tiffany aims to earn a professional certification in Office Administration within the next two years and advance to an Office Manager or Executive Assistant role where she can supervise
    a small team and mentor junior staff. She plans to develop and implement more efficient workflow systems, expand her expertise in project coordination, and gain introductory knowledge of human resources.
    Ultimately, she hopes to leverage her administrative strengths to support a mission‑driven nonprofit or a growing tech firm in the Salt Lake City area, achieving a balance between career growth and
    family life.
