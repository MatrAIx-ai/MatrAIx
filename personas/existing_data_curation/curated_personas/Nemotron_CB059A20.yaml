personas:
  professional: Katrina Brock, a veteran nurse with over forty years of bedside experience, harnesses her health informatics expertise and systematic problem‑solving to streamline EMR workflows, mentor
    nursing students, and lead geriatric outreach initiatives, embodying a practical, organized, and resilient professional ethos.
  sports: Katrina Brock stays fit through daily bird‑watching walks and weekly low‑impact yoga at the local community center, supports the Carolina Panthers, the Charlotte Hornets, and the Raleigh Flyers,
    and participates as a member of the Bertie County Strollers walking club, favoring consistent, low‑intensity activity over competitive sports.
  arts: Katrina Brock expresses her creativity through intricate quilting inspired by the geometric patterns of artist Georgia O'Keeffe, finds solace in the folk melodies of Joan Baez, and enjoys the nuanced
    performances of actress Meryl Streep, allowing these artistic influences to enrich her leisure time and inform her meticulous design mindset.
  travel: Katrina Brock prefers thoughtfully planned trips that blend historical exploration with gentle relaxation, having toured the colonial streets of Charleston, the scenic Blue Ridge Parkway, and
    the serene gardens of Kyoto, while dreaming of a future pilgrimage to the historic castles of Scotland, always budgeting and arranging travel well in advance to accommodate her modest retirement income.
  culinary: Katrina Brock delights in cooking with garden harvests, expertly preparing dishes such as herb‑roasted chicken with fresh thyme, collard greens simmered with smoked ham hocks, and sweet corn
    cornbread, and while her cooking skill is intermediate, she frequently experiments with new recipes, especially those featuring tomatoes, basil, and seasonal greens.
  core: Katrina Brock blends a lifelong dedication to structured caregiving with a quietly rebellious love for quilting marathons, seed‑hoarding for her garden, and a habit of postponing annual health check‑ups
    until the last minute, yet always delivers reliable, compassionate support to those around her.
background:
  cultural: Born and raised in rural North Carolina, Katrina grew up in a close‑knit African‑American community where the church served as the cultural hub. Her family’s heritage includes generations of
    sharecroppers and civil‑rights activists who instilled values of resilience, mutual aid, and respect for education. These traditions shape her commitment to health equity and community service. She
    embraces Southern culinary customs, gospel music, and oral storytelling, while honoring the legacy of Black nurses who paved the way in a historically segregated healthcare system. Her identity is rooted
    in both the challenges and the rich cultural tapestry of the African‑American South.
attributes:
  skills: '[''Clinical assessment'', ''IV therapy'', ''Wound care'', ''Infection control'', ''Patient education'', ''Electronic medical record management'', ''Health data analysis'', ''Quality improvement
    initiatives'', ''Staff mentorship'', ''Community health program development'']'
  hobbies: '[''Gardening'', ''Quilting'', ''Reading historical fiction'', ''Genealogy research'', ''Cooking Southern soul food'', ''Church choir participation'', ''Bird watching'', ''Crossword puzzles'']'
  career_goals: Looking ahead, Katrina aims to transition into a senior mentorship and education role, becoming a preceptor for nursing students at the local community college and leading a geriatric care
    outreach program for seniors in Bertie County. She plans to obtain a Certified Gerontological Nurse (CGN) credential, spearhead a health‑literacy workshop series for underserved African‑American families,
    and contribute to policy development that addresses health disparities. While preparing for a phased retirement, she hopes to establish a scholarship for Black students pursuing STEM‑related health
    careers, ensuring her legacy of structured, compassionate care endures.
