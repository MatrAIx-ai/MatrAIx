  hobbies: '[''watercolor painting'', ''poetry composition'', ''reading literature'', ''listening to plena and jazz music'', ''cooking traditional Puerto Rican dishes'', ''balcony herb gardening'', ''walking
    along the Hudson River waterfront'', ''volunteering at senior centers'', ''participating in cultural festivals'', ''playing chess'']'
  career_goals: Alexander aims to document his life experiences and Puerto Rican heritage in a memoir that intertwines personal narratives with cultural reflections. He aspires to organize a community mural
    in Jersey City that celebrates the island’s artistic legacy and to mentor emerging artists through free workshops at the local community center. He also hopes to deepen his understanding of art therapy
    by completing a certificate program, allowing him to support seniors and recent immigrants through creative expression. Ultimately, his ambition is to leave enduring cultural artifacts that foster intergenerational
    harmony and preserve Puerto Rican identity within the diaspora.
