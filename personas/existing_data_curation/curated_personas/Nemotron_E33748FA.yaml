  career_goals: Although Kelvin is only five, he frequently talks about wanting to become a scientist or engineer who creates safe, helpful things for his community. He loves learning how objects work—whether
    constructing a tower of blocks or exploring nature—and imagines designing a playground where every child feels safe and included. Kelvin’s practical side notes that he wants a job where he can see the
    results of his work, so he often draws rockets, bridges, and simple machines. He also expresses a desire to help his family and friends by solving everyday problems, reflecting his compassionate yet
    self‑assured outlook.
