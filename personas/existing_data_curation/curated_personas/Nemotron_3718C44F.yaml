  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Knitting and crochet'', ''Gardening (native plants)'', ''Beach walks and bird-watching'', ''Volunteer community clean-ups'',
    ''Cooking Southern and Mediterranean cuisine'', ''Listening to folk and jazz music'']'
  career_goals: Kathleen aspires to move into a supervisory position, such as lead housekeeper or facilities coordinator, ideally within a boutique hotel, senior‑living community, or a small gallery where
    she can blend her love of art with her profession. She plans to obtain certification in green cleaning and housekeeping management, and to develop training programs for new staff. Long‑term, she envisions
    launching her own cleaning service that offers personalized, art‑aware care for private collectors and local museums, emphasizing sustainable practices and meticulous attention to detail.
