persona_description: A bilingual Kindergarten teacher who has created and implemented a comprehensive curriculum that incorporates vocabulary, content, and ESL instruction to enhance literacy development
  in her bilingual Kindergarten classroom. She has included activities such as vocabulary cards, guided reading, and writing to make a clear link between emerging literacy, content, and ESL. Her students
  have participated in activities such as reading/writing about winter, going on an outdoor walk to look for spring signs, planting seeds, and composing LEAs about spring experiences. She has used suggested
  activities, games, and worksheets to enhance vocabulary and language skills.
