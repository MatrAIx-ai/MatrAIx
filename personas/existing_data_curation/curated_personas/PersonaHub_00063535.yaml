persona_description: A high school biology teacher who is passionate about teaching biology to high school students in a relevant and engaging way. They are interested in teaching students about metabolic
  diseases and how their choices about what to eat can affect their health. They are looking for ways to make the subject matter more relatable and practical, and they are eager to use a framework that
  focuses on the body's response to food and how choices can impact health. They are interested in using the Metabolic Disease Module to engage students with understanding what food is and how it affects
  the body. They are also interested in exploring the processes by which nutrients in food become available and how the body uses them.
