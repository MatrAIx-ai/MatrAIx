  career_goals: Her next career milestone is to move into a regional retail management position where she can shape strategy across multiple stores, champion innovative visual merchandising concepts, and
    design a mentorship program for emerging supervisors. Simultaneously, she is exploring the possibility of launching a boutique art‑inspired home décor shop that melds her love for design with her retail
    expertise. She also aims to contribute to community education by offering workshops on customer service excellence and creative problem solving.
