personas:
  professional: Kathlyn Franklin, a veteran retail supervisor with more than three decades of frontline experience, they fuse their vivid imagination with analytical acumen to design eye‑catching visual
    displays, coach staff through creative problem‑solving, and drive sales performance, all while laying the groundwork for a future regional management role and a boutique home‑decor venture.
  sports: Kathlyn Franklin, they maintain their energy through weekly salsa dancing classes, a Saturday pickleball league at the local community recreation center, and attending Dallas Mavericks games with
    friends, blending social sport with light cardio and camaraderie.
  arts: Kathlyn Franklin, they frequent Dallas art exhibitions spotlighting creators such as Yayoi Kusama and Jackson Pollock, pour their imagination into abstract acrylic paintings, design theatrical sets
    that echo storytelling traditions, and nurture community ties through quilting circles, pottery workshops, and a choir that often interprets folk ballads by Joan Baez.
  travel: Kathlyn Franklin, they enjoy thoughtfully curated cultural trips, having explored the studios of Santa Fe and the frescoes of Florence, while also indulging in spontaneous weekend drives to Austin's
    live‑music venues, always carrying a sketchbook to capture fleeting inspirations.
  culinary: Kathlyn Franklin, they love experimenting with Mediterranean flavors, preparing dishes like roasted eggplant drizzled with tahini and a zesty salsa verde, while their pantry is stocked with
    fresh herbs, olives, and a well‑used copy of Julia Child's cookbook, though they sometimes overindulge in peach cobbler after long quilting sessions.
  core: Kathlyn Franklin, they blend retail leadership with an artist’s imagination, turning store floors into galleries, while juggling salsa dancing, gardening, and a habit of buying one too many paint
    tubes at every sale.
background:
  cultural: Kathlyn grew up in a middle‑class, predominantly white suburb of the Midwest before relocating to Plano, Texas, where she has lived for the past two decades. Her upbringing emphasized education,
    self‑reliance, and community involvement, values that align with mainstream American middle‑class culture. In Plano, she has embraced the collaborative, hospitality‑focused Texan ethos while maintaining
    her Midwestern pragmatism. This blend informs her respectful, cooperative demeanor, her love of communal activities, and her appreciation for both traditional and contemporary cultural expressions.
