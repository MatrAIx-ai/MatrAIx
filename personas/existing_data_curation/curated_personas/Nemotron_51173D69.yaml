  career_goals: Insuk aims to progress into a charge‑nurse role and eventually into nursing management, where she can shape policies that improve patient safety and staff well‑being. She plans to pursue
    a Master of Science in Nursing with a focus on health informatics, enabling her to integrate AI‑driven decision support tools into everyday practice. Long‑term, she envisions leading community health
    initiatives in Cuyahoga County that address the needs of older adults and multilingual patients, while maintaining the flexibility that allows her to balance professional growth with family life.
