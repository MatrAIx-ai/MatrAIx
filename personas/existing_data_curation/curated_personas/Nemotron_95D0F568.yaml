  hobbies: '[''Cooking experimental recipes'', ''Gardening (heirloom vegetables, herbs)'', ''Birdwatching'', ''Reading historical fiction'', ''Small‑group book club'', ''Knitting and crocheting'', ''Volunteering
    at community center craft events'']'
  career_goals: Although not currently employed, Sarah aims to deepen her contribution to her community. She plans to enroll in a certified volunteer caregiver program to support elderly neighbors, and
    she hopes to expand her garden into a small CSA (community‑supported agriculture) that supplies fresh produce to local families. Sarah also wants to refine her handcraft skills through online workshops
    and eventually sell handcrafted goods at the county fair. Improving her organizational habits and completing a short course in nutrition are personal milestones she hopes to achieve within the next
    two years, all while maintaining a harmonious home life.
