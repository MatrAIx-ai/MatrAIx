personas:
  professional: Sarah Stanley, a dedicated community volunteer with a knack for practical DIY solutions, blends their seasoned gardening know‑how and first‑aid certification to plan a small CSA while preparing
    to enroll in a certified caregiver program, all while juggling a relaxed, sometimes disorganized approach to scheduling.
  sports: Sarah Stanley enjoys low‑impact fitness like community‑center pick‑up pickleball games in the spring and leisurely hikes through the Ozark trails in the summer, they cheerfully support the St.
    Louis Cardinals and Kansas City Chiefs on game days, and they occasionally join a local gardening club’s volunteer clean‑up walks as informal exercise.
  arts: Sarah Stanley spends evenings crocheting while listening to folk legends like the Avett Brothers and Dolly Parton, they attend the annual county fair’s craft exhibition featuring local potters,
    and they find inspiration from the paintings of American realist Andrew Wyeth displayed in the regional art gallery.
  travel: Sarah Stanley prefers road‑trip itineraries that combine scenic nature stops, such as a weekend drive to the Ozark National Scenic Riverways, with visits to historic small towns like Hermann,
    Missouri, they dream of a springtime culinary tour of Provence, France, and they regularly schedule short visits to nearby Branson for live music shows.
  culinary: Sarah Stanley delights in cooking herb‑infused dishes like basil‑pesto grilled chicken and heirloom tomato bruschetta, they experiment with seasonal greens in a warm kale‑apple soup, and they
    often incorporate locally sourced honey and fresh rosemary from their garden into rustic homemade breads.
  core: Sarah Stanley is a quietly curious, community‑focused gardener and crafter who balances meticulous garden stewardship with a blissfully disorganized calendar, they occasionally splurge on vintage
    yarn while rigorously clipping coupons for everyday needs.
background:
  cultural: Sarah was born and raised in Barry County, Missouri, in a family of German‑American and Appalachian ancestry. Her upbringing was steeped in Midwestern rural traditions, with a strong emphasis
    on community, modesty, and self‑reliance. She attended a local Methodist congregation where she learned the value of service and hospitality. While she cherishes longstanding customs—such as seasonal
    harvest celebrations and church potlucks—her natural curiosity drives her to explore new ideas, from modern gardening techniques to contemporary craft trends. This blend of traditional roots and openness
    to innovation shapes her worldview and daily life.
