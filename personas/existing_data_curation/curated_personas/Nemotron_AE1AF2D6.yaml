  hobbies: '[''Vegetable gardening'', ''Rose horticulture'', ''Woodworking and furniture building'', ''Listening to classic country and jazz'', ''Playing bridge at the senior center'', ''Barbecue cooking
    and recipe development'', ''Attending local live music events'', ''Genealogical research'']'
  career_goals: Although retired, Nelson aims to complete the bachelor's degree he began in business administration, viewing it as a personal milestone and a way to formalize his experience in project management.
    He plans to volunteer as a mentor at the local community college's vocational program, sharing his practical knowledge with apprentices in trades like welding and mechanics. Nelson also hopes to author
    a memoir that chronicles his life in the oil industry and the evolving cultural landscape of Wichita County, preserving stories for future generations. Finally, he aspires to serve on the board of the
    Wichita Falls Historical Society, helping to protect and promote regional heritage.
