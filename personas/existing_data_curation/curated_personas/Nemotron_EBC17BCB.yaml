personas:
  professional: Hugh Burnette, a 22‑year‑old hospitality associate who currently leads small teams at a beachfront restaurant, leverages their on‑the‑job expertise in shift scheduling, inventory control,
    point‑of‑sale operations, and guest relations while pursuing a GED and eyeing a future general‑manager role and the Certified Manager credential; they thrive on structuring daily tasks yet allow enough
    flexibility to adapt to the fast‑paced service environment.
  sports: Hugh Burnette, an avid early‑morning Gulf sport‑fisher who also joins a local beach‑volleyball club on weekends, follows the Tampa Bay Buccaneers and Miami Heat, participates in a casual sand‑soccer
    league, and maintains a simple home workout routine of push‑ups and stretching to stay fit; they balance competitive spirit with a preference for solitary, rhythm‑driven activities like fishing.
  arts: Hugh Burnette, a quiet history enthusiast who spends evenings immersed in biographies of World War II leaders, listening to classic rock icons such as Bruce Springsteen and The Rolling Stones, and
    watching war‑film epics like Saving Private Ryan, finds these artistic outlets essential for unwinding after long shifts; they occasionally collect vintage military posters, a quirky habit that reflects
    their fascination with aviation and heritage.
  travel: Hugh Burnette, a young traveler who dreams of swapping his local Gulf fishing spots for a charter expedition to the Bahamas and a historic pilgrimage to Normandy's D-Day beaches, generally plans
    trips on a shoestring budget focusing on natural and military heritage sites, but often backs out of longer vacations due to unpredictable work schedules; they prefer concise, purposeful getaways over
    extended leisure periods, aligning with their practical yet spontaneous disposition.
  culinary: Hugh Burnette, a confident home grill master who loves searing fresh Gulf snapper with lemon‑garlic butter, blackening Cajun shrimp for tacos, and pairing the meals with grilled corn and a cold
    craft beer, enjoys experimenting with rubs and marinades yet occasionally forgets to marinate adequately, resulting in uneven flavor on some nights; they often cook the seafood for their spouse while
    multitasking over video‑games, showcasing a blend of culinary passion and relaxed multitasking.
  core: Hugh Burnette, a methodical yet easy‑going 22‑year‑old hospitality associate who balances early‑morning fishing, meticulous grilling, relaxed finances, and a quiet love for history while quietly
    charting a path toward restaurant management.
background:
  cultural: Hugh grew up in the Gulf Coast region of Florida within a white, working‑class family that values community, self‑reliance, and a relaxed coastal lifestyle. The area's strong ties to the military,
    love of the sea, and Southern hospitality have shaped his worldview. He identifies with modest Protestant cultural traditions, maintains close connections to his local neighborhood and extended family,
    and embraces the informal, outdoor‑oriented culture of Fort Walton Beach.
attributes:
  skills: '[''Team leadership'', ''Staff training'', ''Shift scheduling'', ''Inventory management'', ''POS system operation'', ''Basic bookkeeping'', ''Customer service'', ''Conflict resolution'', ''Facility
    maintenance coordination'', ''Local tourism knowledge'']'
  hobbies: '[''Fishing'', ''Beach walks'', ''Reading (historical biographies)'', ''DIY woodworking'', ''Grilling seafood'', ''Video gaming'', ''Board‑game nights'', ''Aircraft spotting'']'
  career_goals: Hugh aims to obtain his GED within the next year and enroll in a community college program focused on business or hospitality management. He aspires to become a general manager of a beachfront
    restaurant or café and eventually launch his own small‑scale hospitality venture. In the longer term, he plans to earn a Certified Manager (CM) credential and develop expertise in employee development,
    operational efficiency, and strategic planning.
