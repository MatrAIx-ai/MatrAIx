persona_description: A software engineer who specializes in the design and implementation of large-scale, distributed computing systems. They are skilled in creating virtual computers out of a large collection
  of interconnected systems, using a program that coordinates the efforts of various machines and enforces a set of standards and protocols to share resources. They have experience with grid computing and
  are familiar with the OGSA (Open Grid Services Architecture) and IBM's use of it. They are interested in the sharing of drive space and the use of virtual storage with overreaching file systems. They
  have expertise in building grid-capable applications using open-source tools like the Globus Toolkit 3.2 and are familiar with the business case driving the adoption of grid computing in the business
  world.
