  career_goals: Brent aims to re‑enter the workforce in a role that leverages both his analytical strengths and his passion for collaborative, high‑impact projects. He is pursuing a certification in project
    management (PMP) and plans to target senior analyst or product manager positions within technology firms that value interdisciplinary thinking. Long‑term, he envisions launching a community‑focused
    consultancy that bridges STEM education with artistic expression, creating workshops and maker‑space programs for underserved youth in Augusta. His goal is to build a reputation as a reliable leader
    who consistently delivers results while fostering creative, inclusive environments.
