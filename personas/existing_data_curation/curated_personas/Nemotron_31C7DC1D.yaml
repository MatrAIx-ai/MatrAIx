personas:
  professional: Brent Audette, a 39-year-old data analyst transitioning to senior product manager roles, leverages their Python and MATLAB expertise, meticulous project-planning skills, and outgoing mentorship
    style to steer cross-functional tech teams toward data-driven innovations while maintaining high-quality standards.
  sports: Brent Audette, an avid hiker of the Savannah River floodplain trails and weekend participant in the local Augusta Soccer Club, follows the Atlanta Braves, Atlanta Hawks, and Atlanta United FC,
    balancing structured cardio sessions with occasional pickup basketball games at the community center.
  arts: Brent Audette, a regular patron of Augusta's art galleries and community theater where they recently performed in a modern adaptation of Our Town, captures urban and natural photographs inspired
    by Ansel Adams and Nan Goldin, and unwinds to the sounds of David Bowie and Ramin Djawadi's sci-fi scores.
  travel: Brent Audette, who meticulously plans trips with a blend of itinerary apps and spontaneous street-food detours, has explored the historic districts of Savannah, the blue-ridge scenery of Asheville,
    and dreams of photographing Iceland's glaciers and Tokyo's neon alleys on their next adventure.
  culinary: Brent Audette, an experimental home cook comfortable with sous-vide salmon, kimchi fried rice, and crafting a signature roasted beet and goat-cheese salad using locally sourced heirloom produce,
    seeks out pop-up farm-to-table events and balances their love of bold flavors with a habit of forgetting to clean the kitchen promptly.
  core: Brent Audette, a curiosity-driven, hyper-organized 39-year-old who blends analytical rigor with artistic flair, navigates life with meticulous planning, lively social gatherings, and a habit of
    juggling multiple projects while occasionally neglecting routine chores.
background:
  cultural: Brent grew up in a middle‑class, white family in the American South, absorbing the region’s emphasis on community, hospitality, and resilience. Living in Augusta, Georgia, he has been shaped
    by the city’s blend of historic Southern traditions and a growing, diverse cultural scene—especially the arts, high‑school sports, and the annual Masters golf tournament. His upbringing includes exposure
    to Southern values of modesty and hard work, balanced by a broader, curiosity‑driven outlook fostered through his university education and frequent travel. This combination informs his appreciation
    for both local heritage and global ideas, and fuels his commitment to fostering inclusive, interdisciplinary initiatives within his community.
