  hobbies: '[''Personal coding projects'',''Online programming competitions'',''Chess'',''Go'',''Sudoku and logic puzzles'',''Model kit building'',''Morning jogging'',''Cooking traditional East Asian dishes'',''Goal‑tracking
    journal'']'
  career_goals: Chau aims to attend a university with a strong STEM focus, pursuing a degree in computer engineering or software development. He plans to secure an apprenticeship or internship in a local
    tech firm to gain practical experience in system reliability and embedded programming. In the long term, he aspires to become a software engineer specializing in automation or robotics, valuing a stable,
    structured career path where he can apply his analytical skills. He also intends to obtain industry certifications (e.g., CompTIA A+, Cisco Net‑Acad) to bolster his technical credentials.
