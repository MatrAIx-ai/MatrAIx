persona_description: A virologist at Montana State University who specializes in the study of viruses, particularly the life cycle of the Sulfolobus turreted icosahedral virus (STIV) and its effects on
  host cells. The virologist has conducted research on the use of viruses for beneficial purposes and has demonstrated the potential for viruses to be used in smart drug delivery and imaging systems. The
  virologist has also demonstrated the use of viruses in making high performance magnetic materials for the computer industry.
