persona_description: A former collaborator of the Nazi regime in Theresienstadt/Terezin, Benjamin Murmelstein, who was tried and acquitted in a Czech People's Court in 1948, but faced a smear campaign and
  was unable to publish his book due to lack of German publishers. He was a member of the Jewish community in Prague during the Nazi occupation and was involved in the resistance against the German occupiers.
  The persona is likely to be interested in the history of the Holocaust, the role of the Jewish community in resistance, and the impact of the Nazi occupation on Czechoslovakia.
