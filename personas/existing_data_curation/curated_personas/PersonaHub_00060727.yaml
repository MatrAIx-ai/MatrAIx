persona_description: A designer or architect who is interested in the study of entrances in architecture, and wants to learn how to evaluate and analyze entrances for particular designs. They want to understand
  how entrances can serve as a combination of aspects of history, architecture, and psychology, and how they can be categorized under different cultures and backgrounds. They want to know how the appreciation
  of the value of entries is important, and how the design of entrances can be organized to make people aware of the values in functional and aesthetic domains, and how the sense of place can be created
  and supported. They want to improve their understanding of the meaning that users will assign or comprehend when entering an entrance, and how to design entrances that will satisfy the people who use
  them.
