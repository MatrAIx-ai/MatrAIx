personas:
  professional: Jesse Lepin, a seasoned painter and paperhanger with 25 years of interior finishing expertise, blends vibrant cultural palettes with low‑VOC, eco‑friendly techniques while leading small
    bilingual crews in a relaxed yet charismatic style that occasionally edges into organized chaos as they pursue a boutique studio focused on decorative murals and historic restoration.
  sports: Jesse Lepin spends weekends fishing off the Gulf, joins a local beachcombing club, roots for the Tampa Bay Rays and Miami Heat, and they occasionally squeeze in a pickup soccer game with friends,
    even though their loosely organized schedule sometimes means they forget to bring proper gear.
  arts: Jesse Lepin channels an avid love for acrylic and watercolor painting into murals inspired by Diego Rivera, captures Florida sunrise coastlines with a Nikon DSLR, dances to Celia Cruz’s salsa rhythms
    at community events, and they balance structured art practice with spontaneous creative bursts that they gladly share with friends.
  travel: Jesse Lepin prefers relaxed road trips along the Gulf Coast, spontaneous weekend visits to St. Augustine’s historic district, and dreams of joining a mural workshop in Barcelona, and they carefully
    time these getaways around family responsibilities, which keeps longer trips on hold.
  culinary: Jesse Lepin delights in cooking ropa vieja and hand‑rolled empanadas seasoned with fresh cilantro, pairs them with grilled grouper tacos laced with lime and cumin, often hosts lively dinner
    parties where the kitchen becomes an extension of their artistic studio, and they view each meal as a communal canvas for cultural storytelling.
  core: Jesse Lepin fuses a hands‑on painter’s meticulous eye with a carefree, sometimes disorganized, lifestyle, juggling late‑night salsa, occasional financial over‑enthusiasm, and a persistent health‑related
    anxiety that fuels daily fishing rituals, and they continuously seek balance between creative spontaneity and the demands of their growing business.
background:
  cultural: Jesse grew up in a bilingual Cuban‑American household in Fort Myers, where Spanish was spoken at home and English at school. His parents emigrated from Cuba in the 1970s, bringing with them
    a deep appreciation for vibrant colors, music, and family gatherings. These traditions shaped Jesse's worldview, fostering a strong sense of community, hospitality, and pride in his heritage. He celebrates
    Cuban holidays with music, dance, and food, and often incorporates tropical hues and cultural motifs into his professional work. The blend of Cuban cultural values—emphasis on family, resilience, and
    artistic expression—with the laid‑back Florida lifestyle informs his flexible approach to work, his sociable nature, and his desire to give back to the community through art.
attributes:
  skills: '[''Residential interior painting'', ''Commercial wallpaper installation'', ''Faux finishing techniques'', ''Surface preparation and drywall repair'', ''Color consultation and palette selection'',
    ''Mural design and execution'', ''Eco‑friendly paint application'', ''Team leadership on job sites'', ''Client communication and negotiation'', ''Safety compliance and hazardous material handling'',
    ''Bilingual communication (English/Spanish)'', ''Basic carpentry and trim work'']'
  hobbies: '[''Hobby painting (acrylics, watercolors)'', ''Photography (coastal and urban scenes)'', ''Cuban cooking and culinary experiments'', ''Salsa dancing'', ''Fishing in the Gulf of Mexico'', ''Beachcombing
    and nature walks'', ''Attending local art festivals'', ''Volunteering for community mural projects'', ''Watching baseball games'', ''Hosting game nights with friends'']'
  career_goals: Jesse aims to transition from a contractor for hire to the owner of a boutique painting and decorative‑finishes studio that highlights Cuban cultural motifs in Florida homes and public spaces.
    He plans to earn a state contractor’s license, expand his services to historic restoration projects, and develop a line of sustainable, low‑VOC paints. Over the next five years he hopes to lead community
    mural workshops that teach both technique and cultural storytelling, while establishing a work‑life rhythm that reduces stress and allows more quality time with his family.
