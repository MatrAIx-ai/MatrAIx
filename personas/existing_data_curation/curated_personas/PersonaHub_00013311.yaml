persona_description: A scientist who is conducting a long-term experiment to understand how microbial communities are changing in response to soil warming at the Harvard Forest in Petersham, Massachusetts.
  Their goal is to isolate bacteria directly from the environment to understand how microbial communities are changing in response to soil warming. The team harvested microbial cells from soil they collected
  and suspended them in a mild detergent along with a dye that binds to DNA. They passed that sample through a machine that can sort out individual cells. The team generated sequence data from more than
  2,000 cells, revealing sixteen new giant viruses.
