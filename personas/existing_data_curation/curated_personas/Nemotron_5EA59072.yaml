  hobbies: '[''building blocks (e.g., Duplo)'', ''drawing and coloring'', ''listening to Mexican folk music'', ''dancing to cumbia'', ''helping in the kitchen with simple tasks'', ''exploring nature and
    collecting leaves'', ''quiet storytime with picture books'', ''playing with a small group of friends at the park'']'
  career_goals: Even at four, Mariana imagines a future where she can help others and create things. She often says she wants to be a teacher so she can share stories, a veterinarian because she loves animals,
    or an engineer to build bigger structures with her blocks. She also enjoys helping in the kitchen and sometimes dreams of being a chef who mixes flavors from her family's Mexican recipes. Her goal is
    to keep learning, stay curious, and use her practical side to solve real‑world problems.
