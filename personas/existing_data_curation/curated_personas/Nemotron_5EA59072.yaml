personas:
  professional: Mariana Campos, a four‑year‑old preschooler who loves building elaborate tower structures with wooden blocks, balances curiosity and practicality by following simple stacking rules while
    improvising when a piece doesn’t fit; they prefer solitary play or partnering with one friend, and often push back against the teacher’s rigid activity timetable.
  sports: Mariana Campos, a four‑year‑old who delights in the Little Cubs Soccer Club’s Saturday dribbling drills, prefers the company of just two teammates on the field, and balances spontaneous bursts
    of sprinting with a practical awareness of when to rest; they often opt for the playground’s mini climbing wall over organized team drills.
  arts: Mariana Campos, a four‑year‑old who loves doodling whimsical animals while listening to The Wiggles’ upbeat tunes, often mimics scenes from Disney’s Frozen and delights in the colorful illustrations
    of Dr. Seuss, letting these artistic influences shape their imaginative playtime.
  travel: Mariana Campos, a four‑year‑old adventure enthusiast who enjoys family road trips to the nearby aquarium where they press their face against the glass to watch clownfish, dreams of a future visit
    to Disneyland, and prefers meticulously planned days that balance the excitement of a new playground with the comfort of their beloved stuffed bunny.
  culinary: Mariana Campos, a four‑year‑old with a pronounced love for creamy macaroni and cheese sprinkled with cheddar, eagerly helps stir batter for banana pancakes on weekend mornings, yet they often
    reject broccoli and prefer sweet fruit like sliced strawberries, reflecting a spontaneous palate that occasionally surprises their parents with a brave bite of hummus.
  core: Mariana Campos, a curious yet practical four‑year‑old who balances spontaneous creativity with a love for solitary play, often forgets to tidy their toys but never misses a chance to explore a new
    puzzle.
background:
  cultural: Mariana grows up in a Mexican‑American household in Lees Summit, Missouri. Spanish is spoken at home, and she participates in traditions such as Día de los Muertos altars, celebrating Mexican
    holidays, and enjoying family meals with tacos, tamales, and pozole. Her parents encourage bilingualism and introduce her to Mexican folklore, music, and dance, while she also engages with the Midwestern
    community through school and neighborhood activities, blending both cultural influences in her daily life.
attributes:
  skills: '[''recognizing letters and simple words'', ''counting from 1 to 10'', ''fine motor coordination for drawing and using safety scissors'', ''gross motor skills for running and climbing'', ''basic
