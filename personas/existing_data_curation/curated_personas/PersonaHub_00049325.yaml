persona_description: A concerned individual who is deeply concerned about the growing wealth inequality in the United States and the concentration of wealth in the hands of a few. They are aware of the
  poverty that has grown in the country and the concentration of wealth in the nonprofit sector and the wealthiest 10%. They are also aware of the recent wealth survey data through 2013 and the decline
  in the net worth of the typical household. They are interested in the distribution of wealth and its impact on economic well-being. They are likely to be a member of the middle class or the upper class
  who is concerned about the growing wealth inequality in the country. They are also likely to be aware of the wealth distribution map of the USA and the chart comparing wealth distribution.
