  career_goals: Richard aims to transition from his current non‑working status into a sustainable, locally‑focused home‑repair business. He plans to obtain certifications in HVAC and residential electrical
    work to boost credibility and expand service offerings. His long‑term ambition is to build a modest but reliable income stream that alleviates his financial worries, provides stability for his family,
    and positions him as a trusted go‑to specialist in the El Paso community. He also hopes to eventually mentor younger neighbors interested in trade skills, channeling his competitive drive into community
    uplift.
