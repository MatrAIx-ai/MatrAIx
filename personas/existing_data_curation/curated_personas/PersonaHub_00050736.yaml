persona_description: A geographer and land-use planner who is concerned with the depopulation of the Plains states west of the 98th meridian and the ecological impacts of human activity upon the land. They
  have presented their case for the Buffalo Commons, a private activity, a local activity, a state activity and a nonprofit activity, and have been successful in increasing the numbers of bison in the commons
  area from 100,000 to over 300,000. They are also involved in the InterTribal Bison Cooperative and the Great Plains Restoration Council.
