  hobbies: '[''sketching'', ''reading fantasy novels'', ''nature hikes'', ''rock and leaf collecting'', ''ukulele playing'', ''stop‑motion video making'', ''photography'', ''art club activities'', ''community
    gardening'']'
  career_goals: Laura dreams of becoming a visual artist or animator who can blend traditional drawing with digital media to tell compelling stories. She also envisions a future where she combines her love
    of nature and art by creating educational content about the environment for kids. In the short term, she hopes to attend an art‑focused middle school program and eventually study graphic design or illustration
    at a university, while keeping the option open to work in environmental education or a community art initiative.
