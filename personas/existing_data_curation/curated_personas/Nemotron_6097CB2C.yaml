personas:
  professional: An aspiring nature illustrator and junior visual storyteller, Laura Wright translates sketches of Ozark woods, stop‑motion clay scenes, and phone photography into vibrant projects for her
    school art club, where their curiosity fuels experimental techniques while their relaxed approach often leads to missed deadlines and a pile of unfinished drafts.
  sports: An outdoor‑oriented cyclist, Laura Wright rides her mountain bike on the Ozark trails most weekends with the local “Trailblazers” junior biking club, and they cheer on the St. Louis Cardinals
    during spring training, while occasionally joining friends for informal soccer games at the community park, balancing a laid‑back fitness routine with an occasional competitive spark.
  arts: An imaginative creative, Laura Wright sketches forest scenes inspired by Emily Carr’s brushwork, strums gentle chords on a ukulele while humming Beatles melodies, and crafts whimsical clay characters
    for stop‑motion videos, often drawing inspiration from Hayao Miyazaki’s animated worlds and the vibrant colors of Tame Impala’s album art, weaving these influences into their art club projects.
  travel: A curious wanderer, Laura Wright has explored nearby Holly Creek State Park and taken spontaneous weekend bike trips to Eureka Springs, and they dream of backpacking through Yellowstone and catching
    the sunrise at the Grand Canyon, preferring small family outings that blend hiking, sketching, and occasional camping, while budget constraints limit longer trips to occasional school field trips.
  culinary: A budding garden chef, Laura Wright harvests carrots, zucchini, and cherry tomatoes from the community garden to whip up a bright veggie stir‑fry with ginger and soy sauce, and they delight
    in baking strawberry shortcake using fresh berries, while occasionally treating themselves to cheesy pizza topped with basil, showcasing a love for fresh ingredients and modest cooking experiments.
  core: Laura Wright is a curious, art‑obsessed twelve‑year‑old who blends sketching, stop‑motion, and ukulele tunes into a whimsical world, while their laid‑back attitude often leads to missed deadlines
    and impulse buys.
background:
  cultural: Laura was raised in a close‑knit white Midwestern family in Ozark, Missouri, where community, church, and the outdoors are central to daily life. Her family attends a local Baptist church and
    participates in seasonal events such as county fairs, pumpkin patches, and community picnics, reinforcing values of modesty, self‑reliance, and neighborly support. The rural agricultural heritage and
    the natural landscape foster her appreciation for nature and hands‑on activities, while the small‑town culture encourages a relaxed attitude toward rigid schedules and a preference for intimate gatherings
    over large crowds.
