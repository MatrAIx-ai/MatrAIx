personas:
  professional: Gabriela Murcia is a budding Lego architect who channels their love for structure and discipline into meticulously following step‑by‑step manuals, turning every build into a precise, competition‑ready
    showcase at school while preferring solitary workstations.
  sports: Gabriela Murcia participates in weekly swim lessons with the Little Dolphins Swim Club, follows the structured schedule of the junior swim team, roots for the Los Angeles Dodgers during family
    game nights, and approaches each lap with a competitive mindset, preferring organized training over unstructured playground play.
  arts: Gabriela Murcia enjoys practicing simple piano scales on a small keyboard, listening to The Wiggles and Raffi for melodic structure, drawing mandalas with perfect symmetry, and collecting animal
    stickers featuring characters from Disney's Frozen, all of which satisfy their craving for order, quiet creative expression, and a touch of imaginative storytelling.
  travel: Gabriela Murcia loves short, meticulously planned family road trips to destinations such as Santa Monica Beach, the San Diego Zoo, and the ancient pyramids of Teotihuacan, where they appreciate
    the geometric layout of the ruins, while preferring the predictability of a set itinerary over spontaneous adventures.
  culinary: Gabriela Murcia delights in helping roll tamales dough and seasoning elote with cotija cheese, lime, and mayo during family celebrations, prefers the predictable flavors of these dishes, and
    often snacks on neatly sliced apple wedges while assembling Lego creations, reflecting their love of routine and tidy dining experiences.
  core: Gabriela Murcia is a quiet, highly organized 6‑year‑old who thrives on structure in puzzles, music, and family traditions, balancing a disciplined routine with a competitive streak and occasional
    forgetfulness.
background:
  cultural: Gabriela comes from a Mexican family that celebrates traditional holidays such as Día de los Muertos and Cinco de Mayo, often preparing dishes like tamales and elote at home. She speaks both
    Spanish and English, using Spanish during family meals and cultural events, which reinforces her bilingual skill set. Her parents emphasize respect for family and personal responsibility, values that
    align with her preference for order and self‑discipline. She enjoys listening to Mexican children’s songs and occasionally joins family dance circles, though she prefers quiet activities.
attributes:
  skills: '[''organized personal space'', ''early reading fluency'', ''counting to 100'', ''basic Spanish vocabulary'', ''piano key identification'', ''quick puzzle solving'', ''fine‑motor craft skills'']'
  hobbies: '[''Lego building'', ''jigsaw puzzle solving'', ''reading structured picture books'', ''basic piano practice'', ''drawing geometric patterns'', ''sticker collecting and organizing'', ''organizing
    kitchen utensils with family'']'
  career_goals: Gabriela dreams of becoming a scientist or engineer who can design and build things with clear rules and structures. She often says she wants to be an astronaut who follows precise procedures,
    or an architect who creates orderly buildings. She aspires to be the top student in math and science, aiming for high grades and recognition for her achievements. Although she is only six, she already
    talks about earning a "gold star" for every project she completes and eventually hopes to lead a team of inventors.
