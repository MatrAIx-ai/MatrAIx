personas:
  professional: Georgina Soto, a budding animator and sketch artist, channels their curiosity and love for Detroit’s murals into digital shorts, leveraging their knack for quick character sketches and basic
    editing tools, while their easygoing, talk‑friendly style sometimes leads to scattered project timelines but their competitive spark pushes them to outdo their peers.
  sports: Georgina Soto, a lively participant in their school’s basketball league and weekend skate‑boarding sessions at the nearby Corktown skate park, cheers for the Detroit Tigers and Red Wings, occasionally
    joins a youth soccer club named Detroit Copper Cup, and approaches fitness with a competitive edge that drives them to out‑score peers while still savoring the social fun of team play.
  arts: Georgina Soto, an avid sketcher of characters from Studio Ghibli and Marvel comics, draws inspiration from the colorful murals of Detroit’s Eastern Market and the vibrant works of Frida Kahlo, while
    they idolize musicians like J Balvin and Lin‑Manuel Miranda, regularly performing short theatrical scenes in community workshops, merging their love for visual and performing arts into a uniquely eclectic
    creative identity.
  travel: Georgina Soto, who has explored Detroit’s vibrant street art districts and taken family road trips to the Great Lakes and Washington, D.C., dreams of visiting the colorful alleys of Barcelona
    and the futuristic districts of Tokyo, favoring spontaneous, loosely planned adventures that let them capture inspiration for their sketches on the fly.
  culinary: Georgina Soto, a budding home chef who loves helping whisk saffron into family paella, tossing in peas and chorizo, experimenting with tacos al pastor topped with pineapple, and occasionally
    mastering a perfect mac and cheese, enjoys the tactile fun of mixing spices like smoked paprika and cilantro, though they often forget to clean up the kitchen after cooking marathons.
  core: Georgina Soto, a curious, talk‑filled 11‑year‑old who blends Detroit’s urban art vibe with their Spanish‑infused family traditions, constantly sketches, competes, and occasionally misplaces their
    allowance, embodying a blend of spontaneity and competitive spark.
background:
  cultural: Georgina is raised in a Spanish‑heritage family within Detroit's multicultural environment. At home, Spanish is spoken and traditions such as Día de los Reyes and family gatherings with paella
    are celebrated, giving her a bilingual perspective. Living in Detroit exposes her to a vibrant urban arts scene, diverse music, and community murals, which blend with her Spanish roots to create a unique
    cultural identity that values both heritage and the city’s dynamic creativity.
