  career_goals: Georgina dreams of turning her love for visual storytelling into a creative career. In the short term, she aims to join an after‑school art program, build a personal portfolio, and compete
    in local youth art contests. Long‑term, she aspires to become a multimedia illustrator or animator, leading projects that blend art, technology, and cultural narratives. She also envisions hosting a
    community art showcase or a digital channel where she can share ideas and inspire others.
