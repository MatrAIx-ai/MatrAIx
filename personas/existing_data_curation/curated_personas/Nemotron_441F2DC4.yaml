  hobbies: '[''Gardening'', ''Birdwatching'', ''Reading historical non‑fiction'', ''Book club'', ''Crossword puzzles'', ''Sudoku'', ''Bridge'', ''Volunteer computer workshops'', ''Historic road trips'',
