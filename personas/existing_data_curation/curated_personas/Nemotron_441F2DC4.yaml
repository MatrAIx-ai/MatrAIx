  career_goals: Although retired from full‑time employment, Beverly aims to stay intellectually active and give back to her community. Her primary goals include volunteering as a STEM mentor for local middle‑school
    programs, consulting for nonprofit environmental initiatives, and contributing guest articles on science topics to the community newsletter. She also wishes to complete a short certification in climate
    data analysis to support citizen‑science projects, and to write a memoir that highlights the evolution of women in science during her lifetime.
