personas:
  professional: Odalis Ferreras is a senior management analyst who transforms raw operational data into clear, actionable dashboards using Excel, Power Query, and Power BI, leverages basic SQL to extract
    insights, and, thanks to bilingual fluency, bridges communication between senior executives and frontline staff while constantly questioning assumptions and pushing efficiency benchmarks beyond the
    competition.
  sports: Odalis Ferreras enjoys a low‑key fitness routine centered on weekly gentle yoga and occasional weekend hikes at the Laguna Atascosa National Wildlife Refuge, follows the Texas Rangers (MLB) and
    the San Antonio Spurs (NBA) as their preferred professional teams, is a member of the local Birdwatchers of the Rio Grande club that organizes early‑morning nature walks, and prefers solitary activities
    over team sports, using a simple step‑counter app to track their activity rather than joining a gym.
  arts: Odalis Ferreras spends quiet evenings immersed in classic mystery novels by Agatha Christie and historical nonfiction by David McCullough, listens to the soothing piano compositions of Ludovico
    Einaudi and the folk storytelling of Joni Mitchell, and occasionally attends virtual talks by novelist Jorge Luis Borges, finding that these artistic experiences inform their analytical mindset and
    provide a solitary creative outlet.
  travel: Odalis Ferreras prefers meticulously planned solo trips that balance cultural immersion with quiet retreat, has explored the bird‑rich wetlands of the Everglades, the historic streets of San Antonio,
    and the vibrant markets of Barcelona, dreams of a contemplative pilgrimage to Kyoto’s temples, and, constrained by a modest budget, books budget‑friendly accommodations through Airbnb while using a
    spreadsheet to compare flight options and travel insurance.
  culinary: Odalis Ferreras enjoys cooking at a competent home‑chef level, often adapting treasured family recipes to healthier versions by swapping lard for olive oil, featuring heirloom tomatoes, roasted
    chilies, black beans, quinoa, and fresh cilantro in dishes like smoky tomato‑chili salsa, roasted vegetable enchilada casserole, and citrus‑marinated grilled chicken, and delights in tasting locally
    sourced farm‑to‑table meals at weekend farmers’ markets.
  core: Odalis Ferreras is a solitary, data‑focused professional who blends a competitive drive for operational efficiency with disciplined budgeting, health‑conscious routines, and a quiet passion for
    heirloom gardening and experimental cooking, even if occasional disorganization nudges them off their well‑planned path.
background:
  cultural: Odalis grew up in Brownsville, Texas, within a Mexican‑American community that blends border‑region traditions with Southern Texas culture. She is bilingual and deeply connected to Mexican heritage
    through language, cuisine, and music, while also embracing the local Texan ethos of self‑reliance. Her family emphasized practicality and hard work, values that shaped her hands‑on approach to problem‑solving.
    Although divorced, she maintains strong ties to extended family and community events, which reinforce a sense of identity rooted in both Mexican customs and the cross‑border daily experience.
attributes:
  skills: '[''Data analysis'', ''Process improvement'', ''Excel (advanced)'', ''Power Query'', ''Power BI dashboarding'', ''SQL basics'', ''Cost‑benefit analysis'', ''Performance metric development'', ''Bilingual
    communication (Spanish/English)'', ''Critical thinking'', ''Competitive benchmarking'']'
  hobbies: '[''Gardening'', ''Reading mystery novels'', ''Reading historical nonfiction (English/Spanish)'', ''Birdwatching'', ''Yoga'', ''Traditional Mexican cooking'']'
  career_goals: Odalis aims to move from a senior management analyst position to a lead analyst or operations manager role within a regional corporation or municipal agency, overseeing cross‑functional
    teams that drive efficiency initiatives. She plans to earn a GED and pursue a professional certification such as Certified Management Analyst (CMA) to formalize her expertise. Long‑term, she envisions
    establishing a boutique consultancy focused on helping small businesses near the border streamline their supply‑chain and compliance processes, leveraging her local knowledge and analytical skill set.
