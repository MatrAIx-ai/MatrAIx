  hobbies: '[''Reading Historical Fiction'', ''Poetry'', ''Gardening'', ''Volunteer Tutoring'', ''Yoga'', ''Mindfulness Meditation'', ''Hiking'', ''Journaling'', ''Creative Writing'']'
  career_goals: Jerriann aims to progress into a supervisory role such as Shift Supervisor or Unit Manager, where she can influence policy and implement evidence‑based rehabilitation initiatives that reduce
    recidivism and support inmate mental health. She intends to pursue certification in corrections counseling or social work to blend security duties with therapeutic support. Over the long term, she envisions
    leading a regional inmate wellness program, collaborating with community organizations, and advocating for more humane practices within Pennsylvania's correctional system.
