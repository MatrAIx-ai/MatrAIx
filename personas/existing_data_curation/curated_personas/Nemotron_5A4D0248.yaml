personas:
  professional: Jerriann Kordish, a 44‑year‑old correctional facility manager, leverages meticulous incident documentation, crisis de‑escalation expertise, and a humanities‑informed empathy to design evidence‑based
    rehabilitative programs while mentoring new staff and championing humane policy changes.
  sports: Jerriann Kordish regularly hikes the Pocono trails, participates in the local Pocono Trail Runners club, enjoys casual softball on weekends, and roots for the Philadelphia Eagles and Phillies,
    using sport as a grounding counterbalance to the intensity of her correctional work.
  arts: Jerriann Kordish immerses herself in historical novels by Hilary Mantel, recites Mary Oliver poetry, attends the nearby community theater’s productions of classic plays, and finds solace in listening
    to Bach’s cello suites while journaling her reflections.
  travel: Jerriann Kordish plans trips with the same methodical care she applies at work, favoring off‑season literary pilgrimages to Oxford and Prague, weekend road‑trips to the Hudson Valley, and dreaming
    of a spring visit to Kyoto’s ancient temples, balancing adventure with budget constraints.
  culinary: Jerriann Kordish cultivates a modest vegetable garden and enjoys preparing seasonal dishes like ratatouille, kale‑and‑goat‑cheese salad, and basil pesto, yet admits to a guilty pleasure of ordering
    artisanal cheese boards online when the garden’s yield falls short.
  core: Jerriann Kordish blends organized precision with compassionate curiosity, managing a demanding correctional career while nurturing a garden, a love of literature, and a persistent battle with anxiety.
background:
  cultural: Jerriann grew up in the working‑class suburbs of northeastern Pennsylvania, an area shaped by a coal‑mining legacy and a tapestry of Irish, Italian, and Eastern European immigrant influences.
    The community places high value on hard work, self‑reliance, and strong family bonds, often rooted in Catholic or Protestant traditions. Her white heritage and small‑town upbringing fostered a pragmatic,
    grounded outlook, while her university education in the liberal arts expanded her appreciation for diverse cultural narratives and critical thinking. This blend of regional resilience and academic curiosity
    informs her compassionate yet methodical approach to both her correctional career and personal life.
