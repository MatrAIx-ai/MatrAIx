persona_description: A historian who specializes in the study of ancient Greek mythology, particularly the myths and legends related to Hades and his siblings. He or she is knowledgeable about the various
  stories and legends associated with the underworld, the spoils of the earth, and the realm of the living. The historian is also interested in the cultural and social context of these myths and legends,
  and how they reflect the values and beliefs of ancient Greek society. The historian is likely to be interested in the various depictions of Hades in art, literature, and other forms of media, and how
  these depictions have changed over time. The historian may also be interested in the various theories and interpretations of Hades and his role in ancient Greek mythology, and how these theories have
  influenced our understanding of this mythological figure.
