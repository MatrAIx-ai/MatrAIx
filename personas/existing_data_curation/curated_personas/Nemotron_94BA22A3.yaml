  hobbies: '[''Visiting art galleries and museums'', ''Sketching and drawing'', ''Reading books and articles on contemporary art'', ''Listening to podcasts on technology, logistics, and cultural topics'',
    ''Solo nature walks and hiking'', ''Journaling'', ''Experimenting with cooking and exploring new recipes'', ''DIY home improvement projects'', ''Gardening'', ''Puzzle solving (crosswords, Sudoku)'']'
  career_goals: Patricia aims to transition from hands‑on driving to a leadership role in transportation logistics. Her short‑term goal is to earn a logistics coordinator certification and lead a small
    team of drivers, improving route efficiency and safety metrics. Long‑term, she aspires to become a regional operations manager or start her own boutique trucking firm that integrates sales and delivery
    services, allowing her to leverage her competitive nature and high standards while providing financial stability for her family.
