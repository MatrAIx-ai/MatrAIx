  hobbies: '[''Custom motorcycle restoration'', ''Woodworking'', ''Metal sculpture'', ''Hiking in the central mountains'', ''Fishing at Lake Dos Bocas'', ''Reading technical manuals and engineering documentaries'',
    ''Cooking traditional Puerto Rican cuisine'', ''Playing soccer in local leagues'', ''Volunteering at community festivals'']'
  career_goals: Enrique aims to obtain his AWS Certified Welding Inspector (CWI) credential and eventually become a lead welding supervisor at a major aerospace or shipbuilding facility. He also envisions
    launching his own mobile welding and fabrication business that serves construction sites throughout central Puerto Rico. Long‑term, he hopes to mentor younger tradespeople and develop standardized welding
    procedures that boost productivity and safety in his community's industries.
