personas:
  professional: Enrique Seraballs is a seasoned welder specializing in MIG, TIG, and stick welding, who couples their meticulous blueprint reading and CNC plasma cutting expertise with a pragmatic curiosity
    that drives them toward AWS Certified Welding Inspector certification and a future leadership role in aerospace or shipbuilding, while also planning a mobile fabrication venture that blends field flexibility
    with precise metalwork.
  sports: Enrique Seraballs enjoys weekend hikes through the rolling hills near their hometown, regular fishing trips on the nearby lake, and casual evening soccer matches with their neighborhood club,
    the Ironbacks, while they cheer for the regional baseball team, the Hurricanes, and follow the local professional basketball squad, the Titans.
  arts: Enrique Seraballs channels their hands‑on creativity into restoring vintage motorcycles and crafting custom metal sculptures for the annual local art fair, often drawing inspiration from the kinetic
    works of artist John W. Jones and the folk melodies of songwriter José Ortiz, while they spend their evenings woodworking to the rhythm of classic blues records by B.B. King.
  travel: Enrique Seraballs prefers purposeful trips that blend adventure with cultural immersion, planning road‑trip itineraries to historic colonial towns like Granada and coastal escapes such as Cartagena,
    while they also savor weekend getaways to mountain retreats in the Andes, balancing their travel ambitions with the financial realities of funding their future mobile welding enterprise.
  culinary: Enrique Seraballs loves cooking traditional island dishes such as arroz con gandules, tostones, and pernil, skillfully seasoning them with sofrito, adobo, and achiote, and they often experiment
    with smoked pork shoulder on their backyard grill, pairing meals with locally sourced plantains and fresh cilantro.
  core: Enrique Seraballs blends a calm, competitive spirit with a hands‑on love for metalwork, vintage bikes, and island cooking, all while they methodically save for certification and battle a stubborn
    back ache.
background:
  cultural: Enrique was raised in Cidra, a tight‑knit town in the heart of Puerto Rico, where family, Catholic traditions, and the lively spirit of "boricua" culture shape daily life. He grew up listening
    to bomba and plena music, celebrating the town's patron saint festivals, and savoring meals of arroz con gandules and lechón. His Puerto Rican identity blends Caribbean warmth with a strong work ethic
    inherited from generations of artisans and laborers. bilingualism in Spanish and English, an appreciation for the island's natural beauty, and a sense of pride in his Taino roots inform his outlook
    and community involvement.
