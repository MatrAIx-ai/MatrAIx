personas:
  professional: Chelsea Perry, a retired accountant now serving as treasurer of the Georgetown Historical Society, channels their exceptional budget management, event planning, and meticulous record-keeping
    into keeping community projects on schedule, while their structured, disciplined personality ensures every meeting follows a precise agenda and their assertive yet compassionate leadership inspires
    volunteers to uphold high standards.
  sports: Chelsea Perry enjoys morning walks along the Georgetown shoreline with the Senior Beach Walkers club, follows the Clemson Tigers football season faithfully, and occasionally attends Charleston
    Battery soccer matches, seeing light cardio as a way to manage their arthritis while staying connected to community spirit.
  arts: Chelsea Perry, a devoted church choir member and avid quilter, finds inspiration in Mahalia Jackson's gospel hymns and the folk stylings of The Carolina Chocolate Drops, and frequently reads works
    by Eudora Welty, letting these artistic influences shape the intricate motifs of their quilts.
  travel: Chelsea Perry plans their trips with a detailed scrapbook itinerary, has visited historic Savannah and the Beaufort Gullah heritage sites, dreams of a genealogy pilgrimage to England's West Country,
    and enjoys occasional river cruises to the Bahamas, always budgeting carefully to keep travel within their modest retirement allowance.
  culinary: Chelsea Perry, a seasoned Southern cook, perfects shrimp and grits with fresh Gulf shrimp and stone-ground grits, brews sweet tea with a pinch of real sugar and lemon, and bakes pecan pie using
    locally sourced pecans, though they sometimes resort to a store-bought pie crust to save time.
  core: Chelsea Perry blends lifelong community service with a rigorously organized mind, balancing meticulous garden management, quilt crafting, and volunteer leadership, while occasionally indulging in
    impulsive fabric purchases and sometimes forgetting their medication.
background:
  cultural: Chelsea was raised in a traditional Southern, Protestant family in Georgetown, South Carolina. Her upbringing emphasized hospitality, community service, and strong family ties. She grew up attending
    church regularly, celebrating regional holidays, and participating in local festivals that honor the coastal heritage. While identifying as white, she respects the multicultural tapestry of the Lowcountry,
    including the Gullah and African-American traditions that shape the area’s music, cuisine, and storytelling. Her cultural values are reflected in her commitment to stewardship, reciprocity, and preserving
    the history of her hometown.
