  hobbies: '[''Coastal gardening'', ''Quilting'', ''Historical fiction reading'', ''Local history research'', ''Church choir participation'', ''Southern cooking'', ''Birdwatching'', ''Family genealogy'',
    ''Volunteer work at the public library'']'
  career_goals: Although retired, Chelsea is committed to continuing her impact in Georgetown. She aims to serve as the treasurer of the local historical society, mentor younger volunteers in organizational
    best practices, and compile a family memoir that documents her ancestors’ stories. She also aspires to maintain her health through regular walks on the beach, learn to use digital photography and social
    media to share community events, and ensure her legacy of service and structure endures for future generations.
