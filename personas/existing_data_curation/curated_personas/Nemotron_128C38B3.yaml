  career_goals: Jimmye aims to formalize her expertise by obtaining a Certified Home Health Aide (CHHA) credential and pursuing a Certified Nursing Assistant (CNA) program. She aspires to move into a supervisory
    or trainer role within her agency, where she can mentor junior aides and help shape best‑practice caregiving standards. Additionally, she plans to launch a local caregiver support group that offers
    peer counseling and health‑literacy workshops for seniors and their families. In the longer term, she hopes to contribute to community health outreach initiatives focused on fall prevention and chronic‑disease
    management, leaving a lasting legacy of compassionate, practical care in her hometown.
