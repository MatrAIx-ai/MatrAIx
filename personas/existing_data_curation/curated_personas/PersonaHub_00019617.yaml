persona_description: A business leader who is concerned about the impact of tariffs on their company's supply chain and input costs. They are aware of the economic and emotional arguments on both sides
  of the debate and are aware that tariffs have been close to their lowest levels. They are aware that tariffs can be pulled if governments realize they're causing actual harm to the industry they're trying
  to protect. They are aware that the current round of tariffs is expected to result in a modest drag on U.S. growth and that tariffs are supposed to help their trade deficit. They are aware that not all
  think that such aid is a solution, believing that targeted exclusion of certain key raw materials might be a better solution.
