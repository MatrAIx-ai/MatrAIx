  skills: '[''reading comprehension'', ''basic arithmetic'', ''LEGO construction'', ''puzzle solving'', ''group game organization'', ''basic household chores'']'
  hobbies: '[''soccer'', ''LEGO building'', ''rock collecting'', ''reading adventure books'', ''gardening'', ''playing the recorder'', ''watching science shows'']'
  career_goals: Martin dreams of exploring the world and helping others. He often says he wants to become an astronaut to discover new places, a firefighter to protect his community, or a wildlife veterinarian
    to care for animals. He imagines a future where he can combine his curiosity about science with practical service, and he sets small goals like learning more about space, practicing safety drills at
    school, and reading about animal care.
