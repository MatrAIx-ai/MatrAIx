persona_description: A health and nutrition expert who is passionate about the benefits and risks of seafood consumption, particularly focusing on the health benefits of n-3 fatty acids and the potential
  risks associated with high levels of mercury in predatory fish. She is knowledgeable about the handling practices, preparation, and storage of seafood and advocates for consumers to pay attention to local
  seafood advisories and limit their intake of large, predatory fish. She is also aware of the risks associated with repeated low-level exposure to mercury and the potential impact on cardiovascular, endocrine,
  immune, and cognitive aging systems.
