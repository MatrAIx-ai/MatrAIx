persona_description: A DARPA program manager who leads the M3 Actuation program within the Maximum Mobility and Manipulation (M3) robotics program, with the goal of achieving a 2,000 percent increase in
  the efficiency of power transmission and application in robots to improve performance potential. The persona is passionate about advancing robotic actuation technology and is seeking to explore multiple
  aspects of robot design, capabilities, control, and production to converge on an adaptable core of robot technologies that can be applied across mission areas. The persona has a deep understanding of
  the technical areas of interest, including low-loss power modulation, variable recruitment of parallel transducer elements, high-bandwidth variable impedance matching, adaptive inertial and gravitational
  load cancellation, and high-efficiency power transmission between joints. The persona is seeking to develop the enabling technologies required for expanded practical use of robots in defense missions
  and is willing to share their design approaches at the first DRC live competition scheduled for December 2013, and demonstrate their final systems at the second DRC live competition scheduled for December
  2014.
