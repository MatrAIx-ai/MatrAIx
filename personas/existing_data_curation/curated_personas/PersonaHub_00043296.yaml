persona_description: A paleontologist who specializes in the study of nugs, a non-confrontational omnivorous species that prefers to hide and delve in the dark underground systems below the world of Thedas.
  The person is interested in the evolutionary history of nugs and how they have adapted to their low-light, subterranean environment. They are also interested in the potential impacts of habitat loss and
  isolation on nugs, and the importance of habitat corridors and population genetics analysis in conserving the species.
