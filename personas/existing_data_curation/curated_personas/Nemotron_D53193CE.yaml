  career_goals: Damaris aims to attain CPA certification within the next two years and leverage it to advance into a senior audit manager role at a regional firm, where she can mentor younger accountants
    and champion inclusive workplace practices. She is also interested in specializing in compliance and financial reporting for cultural and nonprofit organizations, aligning her professional expertise
    with her humanities background. Long‑term, she envisions launching a boutique consultancy that helps small Puerto Rican businesses navigate tax incentives and sustainable financial strategies while
    maintaining a balanced work schedule that mitigates stress.
