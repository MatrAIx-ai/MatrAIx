personas:
  professional: Maria Lamphear is an aspiring young author and storyteller who weaves adventure narratives for her school’s story club, using her love of fantasy books, structured plot outlines, and natural
    flair for leading group performances to hone collaborative creativity.
  sports: Maria Lamphear kicks the ball for the Summit Soccer Club’s U‑11 girls team, cheers for the New York Knicks and New York Giants on game nights, and balances a love of fast‑paced soccer drills with
    a habit of skipping stretch sessions after practice.
  arts: Maria Lamphear sings lead in the school choir, rehearses for drama club productions of "Annie" and "Harry Potter and the Sorcerer's Stone," and spends free time idolizing performers like Lin‑Manuel
    Miranda, Taylor Swift, and Disney’s animated classics, often mimicking their vocal styles during impromptu karaoke.
  travel: Maria Lamphear dreams of hopping on a train to New York City’s American Museum of Natural History, has already visited the historic Liberty Bell in Philadelphia, and hopes to explore the castles
    of Germany during a future family vacation, preferring day‑trip adventures over long‑term stays due to school commitments.
  culinary: Maria Lamphear loves helping in the kitchen, especially preparing pepperoni pizza with extra mozzarella, tossing fresh garden carrots into a rainbow salad, and baking cookie dough shaped like
    friendship bracelets, though they sometimes over‑salt the dish when excited.
  core: Maria Lamphear is a chatter‑filled, compassion‑driven ten‑year‑old who balances a love for storytelling and soccer with a tendency to misplace homework and a habit of turning every gathering into
    a mini‑party.
background:
  cultural: Maria grows up in a middle‑class white family in Summit, New Jersey, a suburban community with easy access to the cultural richness of nearby New York City. Her family traces its roots to German
    and Irish ancestors, celebrating holidays such as Thanksgiving, Christmas, and St. Patrick’s Day with a mix of traditional foods and stories. The local environment values education, community service,
    and inclusivity, giving Maria exposure to diverse cultural events, museums, and public performances, while her home life emphasizes compassion, teamwork, and respect for others.
