  hobbies: '[''Reading adventure/fantasy books'', ''Creative writing'', ''School choir'', ''Drama club'', ''Soccer'', ''Dancing'', ''Crafting friendship bracelets'', ''Gardening with family'', ''Educational
    tablet games'', ''Organizing neighborhood get-togethers'']'
  career_goals: Even though she is only ten, Maria already imagines a future where she can help people daily. She hopes to become a teacher or a pediatric nurse, combining her love for caring with her enjoyment
    of explaining things to younger kids. She also dreams of using her singing and storytelling abilities as a school counselor or community youth mentor, creating safe spaces for peers to express themselves.
    In the short term, she aims to volunteer with the local library’s reading program and join a youth leadership group to build teamwork and leadership skills.
