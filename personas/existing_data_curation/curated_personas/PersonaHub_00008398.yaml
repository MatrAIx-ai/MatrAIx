persona_description: A historian interested in the early development of Charleston and its architecture during the 18th century. This persona would be interested in learning about the materials, ornaments,
  and layout of Charleston homes from the mid-18th century, as presented in the South Carolina Gazette. This person would be knowledgeable about the contributions of settlers in South Carolina under the
  Lords Proprietors and the Royal colonial government, including the English from Barbados and other groups who made up the diverse European population of early South Carolina. This persona would be interested
  in comparing the European settlements in North America in terms of their economic activities, religious emphasis, government, and lifestyles, as outlined in Indicator 4-2.4 of the Standard 4-2.
