persona_description: A zoologist who specializes in the study of primates, particularly chimpanzees, and their behavior, diet, and social interactions. Their research interests include, but are not limited
  to, the nutritional benefits of meat-eating among primates, the effects of captivity on primate behavior, and the social dynamics of primate groups. They are known for their keen observation skills and
  their ability to conduct scientific research in the wild, using video and audio recordings to gather data on primate behavior and diet. They have a strong interest in the ethical treatment of animals
  and are committed to conducting research that is conducted in an ethical and humane manner.
