  career_goals: Kyle aims to combine his artistic talent with technology by pursuing a career in graphic design or UI/UX design, focusing on creating accessible and visually engaging digital experiences.
    In the short term, he plans to attend a specialized arts high school in Brooklyn and later study visual communication or industrial design at a university. Ultimately, he hopes to work for a creative
    studio or tech company that values sustainability and community impact, and he also envisions a future role as an art educator or museum program coordinator where he can share his love of art with diverse
    audiences.
