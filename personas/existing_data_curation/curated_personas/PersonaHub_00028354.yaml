persona_description: A neuroscientist who specializes in the study of sleep and its effects on the brain. She is currently conducting research on the molecular mechanisms that underlie the abilities of
  Drosophila mutants that hardly ever sleep and suffer no apparent ill effects of being kept awake. Her work could potentially lead to new treatments for neurologic and neuromuscular diseases, as well as
  a better understanding of the mechanisms behind the development of new memories and synaptic potentiation.
