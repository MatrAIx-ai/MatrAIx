personas:
  professional: Joseph Basson leverages decades of long‑haul trucking expertise and route‑optimization savvy to mentor new drivers, and they also consult on DOT compliance while sharing their love of art
    through occasional photography workshops.
  sports: Joseph Basson enjoys low‑impact fitness through weekend hikes on the Wasatch Trail, occasional pickleball matches at the senior community center, and cheering for the Utah Jazz and Real Salt Lake,
    while they belong to the Wasatch Peak Outdoor Club that organizes autumn treks for fellow retirees.
  arts: Joseph Basson frequently canvasses the Utah Museum of Fine Arts and local galleries, curates digital photo essays of Utah’s dramatic canyons, and finds inspiration in the brushwork of Georgia O'Keeffe,
    the improvisations of Miles Davis, and the storytelling of Bob Dylan, often sharing these passions during community‑theater set‑building evenings.
  travel: Joseph Basson prefers meticulously planned road trips that weave through America’s national parks—he’s already explored Yellowstone, Zion, and Grand Teton, and he dreams of photographing the sunrise
    over Antelope Canyon while balancing travel costs with his retirement budget.
  culinary: Joseph Basson enjoys farm‑to‑table meals, often roasting locally sourced beet greens, preparing huckleberry pie using garden‑grown berries, and grilling elk steaks seasoned with rosemary and
    juniper, and they consider themselves a confident backyard chef with an enthusiastic experimental streak.
  core: Joseph Basson, a seasoned trucker turned artistic mentor, balances meticulous route planning with a restless curiosity for photography and fine art, yet habitually over‑worries about health checks
    and can’t resist a late‑night jazz session that keeps him up past his bedtime.
background:
  cultural: Joseph comes from a multi‑generational white American family with roots in the Midwest—his grandparents were of German and Irish descent, and they moved west during the post‑war migration to
    seek opportunities in the burgeoning transport sector. Raised in a small town in Idaho before settling in West Jordan, Utah, he absorbed a blend of Midwestern work ethic and the community‑oriented values
    prevalent in the Intermountain West. While not actively affiliated with any particular religious institution, he respects the region’s cultural emphasis on family, self‑reliance, and civic engagement,
    which shape his modest, service‑focused outlook.
attributes:
  skills: '["Long‑haul truck driving", "Route planning and logistics", "DOT safety compliance", "Electronic logging device (ELD) operation", "Customer service and sales negotiation", "Basic vehicle maintenance
    and troubleshooting", "Invoicing and expense bookkeeping", "Digital photography and photo editing"]'
  hobbies: '["Visiting museums and art galleries", "Digital photography of landscapes and road scenes", "Hiking in Utah’s mountains and canyons", "Gardening with native plants", "Listening to classic rock
    and jazz", "Reading historical nonfiction", "Woodworking and small‑scale carpentry", "Community theater set design and volunteering"]'
  career_goals: As a seasoned driver approaching retirement, Joseph aims to transition from full‑time hauling to a mentorship role, offering training workshops for new drivers on safety, route efficiency,
    and customer relations. He hopes to start a small consultancy that assists local trucking firms with compliance audits and driver onboarding. Joseph also wishes to allocate more time for personal enrichment—traveling
    to national parks, attending art exhibitions, and completing a community college certificate in automotive restoration—while ensuring stable financial security for his family.
