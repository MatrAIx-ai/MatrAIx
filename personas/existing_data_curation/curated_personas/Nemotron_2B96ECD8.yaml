  career_goals: Although retired, Alice’s ambition is to keep nurturing her community and leave a lasting legacy of compassion. She hopes to mentor younger volunteers, launch a yearly intergenerational
    memory‑sharing program at the senior center, and ensure that her family and friends feel supported during challenging times. She also plans to complete a memoir that captures her life experiences for
    future generations. Managing her own anxiety is a personal goal, so she is committed to regular counseling, mindfulness practice, and using her hobbies as emotional regulation tools.
