  career_goals: Natalie's primary career goal is to secure a Certified Administrative Professional (CAP) credential to formalize her expertise before transitioning toward semi‑retirement. She aims to implement
    automated workflow tools that reduce manual entry and lower staff stress, while establishing a mentorship program that pairs experienced staff with newer hires. Over the next two years, she plans to
    lead a workplace wellness initiative focused on stress reduction and emotional support, and to gradually shift into a consulting role for small non‑profit organizations, leveraging her supervisory experience
    to improve their administrative processes.
