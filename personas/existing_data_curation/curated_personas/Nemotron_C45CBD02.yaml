  career_goals: Approaching retirement, Desiree aims to transition into a senior training instructor role within the fire department, where she can design and lead advanced fire safety workshops, mentor
    younger firefighters, and expand community emergency‑preparedness programs. She also hopes to document the history of the Guaynabo fire service through a memoir, collaborate with local artists on public
    art installations that promote fire safety awareness, and serve as a consultant on disaster‑risk reduction for municipal authorities.
