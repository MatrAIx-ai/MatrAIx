personas:
  professional: An experienced electrician with a flair for sustainable design, Yamilka Zuniga blends deep wiring expertise, solar panel integration, and home automation to deliver eco‑friendly residential
    projects, mentoring apprentices while meticulously managing budgets and timelines.
  sports: An avid hiker and weekend runner, Yamilka Zuniga trails the Fox River Preserve, participates in a local 5K club, and follows the Chicago Cubs and Chicago Bulls with fervor, while swapping occasional
    softball games with neighbors in the summer.
  arts: Yamilka Zuniga channels curiosity into oil paintings that echo the bold colors of Frida Kahlo and the sweeping vistas of Georgia O'Keeffe, captures intimate moments with a Canon DSLR, and finds
    inspiration in the folk narratives of Los Lobos and the storytelling of Guillermo del Toro, often attending local gallery openings on quiet weekday evenings.
  travel: Yamilka Zuniga prefers meticulously planned weekend escapes to nearby Chicago's art districts, seasonal trips to St. Louis for riverfront hikes, and dreams of a sustainable‑design study tour in
    Oaxaca and a sunrise trek in the Japanese Alps, balancing limited vacation days with a modest travel budget.
  culinary: Yamilka Zuniga masters traditional dishes like mole poblano, tamales de masa, and chiles en nogada, infusing them with locally sourced Midwest produce such as heirloom tomatoes and sweet corn,
    while experimenting with sous‑vide techniques for perfect pork shoulder and occasionally indulging in a well‑earned slice of deep‑dish pizza after a long job site.
  core: Yamilka Zuniga fuses electric precision with artistic spontaneity, juggling solar projects and oil canvases, yet habitually leaves tool drawers half‑open and forgets to water houseplants until they
    wilt.
background:
  cultural: Yamilka grew up in a Mexican‑American household where Spanish was spoken alongside English, fostering bilingual fluency that she often uses when reading technical manuals or communicating with
    diverse clients. Her family maintains strong ties to Mexican traditions, celebrating Día de los Muertos, quinceañeras, and festive culinary gatherings that keep her connected to her heritage. In Joliet
    and Kendall County, she participates in the local Mexican community through cultural festivals, church events, and volunteer work at bilingual outreach programs, blending her cultural pride with her
    professional commitment to service.
attributes:
  skills: '["Electrical wiring and installation", "Circuit troubleshooting and repair", "Blueprint and schematic interpretation", "Safety code compliance (NEC)", "Renewable energy system integration", "Home
    automation and smart‑home installation", "Project planning and time management", "Mentoring and apprenticeship training"]'
  hobbies: '["Oil painting (folk and contemporary styles)", "Photography (portrait and landscape)", "Traditional Mexican cooking with modern adaptations", "DIY woodworking and home‑improvement projects",
    "Reading design theory and sustainable architecture", "Hiking in nearby nature preserves", "Participating in small community art fairs and workshops"]'
  career_goals: Yamilka aims to earn her journeyman electrician license and obtain certifications in solar energy and smart‑home technologies. She hopes to eventually launch her own small contracting business
    focused on sustainable residential solutions, allowing her to combine technical prowess with her appreciation for innovative design. Additionally, she plans to complete a GED program to formalize her
    education and enroll in night courses on sustainable construction, positioning herself as a leader in green building within the Joliet and Kendall County community.
