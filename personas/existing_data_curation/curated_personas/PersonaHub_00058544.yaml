persona_description: A researcher or policy maker interested in the economic impacts of transgenic crops on developing agriculture, particularly in the context of developing economies and non-industrialized
  agriculture. They are looking for objective, relevant analysis of emerging crop biotechnologies and how they can be used by national policymakers in developing countries. They are interested in studying
  the impact of transgenic crop varieties on farmers, the size and distribution of the economic benefits from adopting them, consumer attitudes toward products made with transgenic ingredients, and implications
  of the use of transgenic crops for international trade.
