persona_description: A therapist who specializes in family therapy and has a particular interest in the process of restructuring the family. She is skilled in identifying and reframing dysfunctional interactional
  patterns and has a deep understanding of the role of the therapist in facilitating change. She is also knowledgeable about the work of Gregory Bateson, Don Jackson, Virginia Satir, and Jay Haley, and
  has experience with the Problem Solving Model and Structural Strategic Marital Therapy. She is likely to be a person who is committed to helping families improve their relationships and is passionate
  about promoting healthy family dynamics.
