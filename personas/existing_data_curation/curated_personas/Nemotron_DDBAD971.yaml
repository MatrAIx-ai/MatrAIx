  hobbies: '[''Trail hiking and nature exploration'', ''Birdwatching and wildlife observation'', ''Collecting natural items for crafts'', ''Reading mystery and adventure books'', ''Nature journaling and
    creative writing'', ''Scratch coding projects'', ''Friendship bracelet and knitting crafts'', ''Baking and cooking simple recipes'', ''Playing board games with a small group of friends'']'
  career_goals: Valerie dreams of turning her love for the Alaskan wilderness into a career as a wildlife biologist or park ranger, where she can protect native species and educate visitors about the environment.
    She also feels a pull toward teaching, imagining herself as a science teacher who can create structured, supportive classrooms for younger students. In the short term, she hopes to earn a summer research
    scholarship through her middle school, volunteer with the local wildlife rescue, and develop a more advanced coding portfolio. Ultimately she aspires to combine scientific knowledge with community outreach,
    perhaps leading school‑based environmental clubs or community nature workshops.
