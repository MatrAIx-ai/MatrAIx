personas:
  professional: A budding young programmer, Valerie Belanger channels her love for wildlife and structure into designing Scratch games that feature Alaskan animals, balancing meticulous planning with creative
    freedom; they often test their games with friends during after‑school coding clubs.
  sports: An enthusiastic winter sports fan, Valerie Belanger follows the Anchorage Aces hockey team, participates in after‑school snowshoeing clubs, practices basic cross‑country skiing on local trails,
    and they keep a scrapbook of favorite bird sightings from their hikes.
  arts: A creative craftsperson, Valerie Belanger knits scarves inspired by traditional patterns learned at community gatherings, weaves friendship bracelets while listening to indie folk band The Lumineers,
    and they write short mystery stories that echo the suspense of classic Nancy Drew novels.
  travel: A curious explorer, Valerie Belanger has trekked the Chugach State Park loop, visited the Alaska Native Heritage Center, and they dream of a summer camp trip to Banff National Park, planning each
    outing with a hand‑drawn map and checklist.
  culinary: A budding baker, Valerie Belanger enjoys whisking chocolate chip cookies with her mother, relishes fresh grilled salmon with dill sauce, experiments with berry pie fillings using wild blueberries
    and lingonberries gathered during fall hikes, and they love sharing these treats with friends at neighborhood gatherings.
  core: Valerie Belanger is a detail‑oriented 12‑year‑old whose love for Alaskan nature fuels disciplined coding projects, careful allowance tracking, and quiet creativity, even as they battle occasional
    allergy sneezes and a habit of hoarding extra craft supplies.
background:
  cultural: Valerie is a White American raised in Eagle River, a suburb of Anchorage, Alaska. Her family’s roots trace back to French‑Canadian settlers who moved to the Pacific Northwest in the early 20th
    century, which gives her a heritage of frontier resilience and close‑knit community values. Growing up in a northern environment, she experiences long winters, frequent snow, and the spectacular aurora
    borealis, all of which shape her appreciation for nature and self‑reliance. The local community emphasizes cooperative projects, such as neighborhood clean‑ups and seasonal festivals celebrating Alaskan
    heritage, where she learns to respect the land and the traditions of the Indigenous peoples of the region, even though she does not identify as Indigenous herself. These cultural influences blend modern
    American school life with the unique outdoor‑oriented lifestyle of Alaska.
attributes:
  skills: '[''Organizational abilities for school projects'', ''Basic computer and Scratch coding'', ''Reading comprehension'', ''Short essay writing'', ''Simple cooking and household chores'', ''Basic
