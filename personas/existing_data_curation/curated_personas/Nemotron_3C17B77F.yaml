  career_goals: Ming Jose often imagines becoming a firefighter because he loves the bright trucks and helping people, or an astronaut because he enjoys looking at stars and asking "why" about the sky.
    He also dreams of cooking like his mother, visualizing himself preparing pho and spring rolls. These aspirations blend his curiosity about new ideas with a practical desire to make a tangible difference.
