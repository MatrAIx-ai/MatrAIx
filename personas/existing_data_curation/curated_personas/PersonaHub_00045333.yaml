persona_description: A historian who specializes in the study of ancient Greek and Mycenaean history, particularly the development and evolution of the tholos tomb structure. She is interested in the architectural
  and cultural significance of these tombs and their relationship to the broader Mycenaean civilization. Her research focuses on the structural and functional differences between Mycenaean and Mesara tholoi,
  as well as the social and economic contexts in which they were used. She is also interested in the role of these tombs in the development of Greek and Mycenaean society and culture.
