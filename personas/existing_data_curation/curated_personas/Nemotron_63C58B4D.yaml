  career_goals: Raul aims to advance to a shift‑supervisor or assistant manager position within the next two years, leveraging his extensive service experience to mentor younger wait staff. He plans to
    enroll in a hospitality‑management certification program offered by a local community college to broaden his operational knowledge. In the longer term, Raul hopes to open a modest family‑run café in
    Gurabo that highlights traditional Puerto Rican dishes such as mofongo and pastelón, creating a welcoming space for his community while securing a stable retirement income for his family.
