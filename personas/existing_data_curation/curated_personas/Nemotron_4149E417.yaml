  hobbies: '[''dress‑up and role‑play'', ''storytime reading'', ''building with blocks'', ''drawing and coloring'', ''singing and dancing'', ''group games (Simon Says, Duck Duck Goose)'', ''nature walks'',
    ''helping in the kitchen'', ''caring for class hamster'']'
  career_goals: Even at five, Latrice imagines herself in caring professions that combine structure with helping others. She often says she wants to be a teacher because she loves guiding friends through
    learning activities and keeping the classroom organized. She also dreams of becoming a pediatric nurse or doctor, fascinated by the idea of caring for sick children and making them feel safe. In the
    future she hopes to volunteer in community events like food drives and neighborhood clean‑ups, using her compassion to support those around her.
