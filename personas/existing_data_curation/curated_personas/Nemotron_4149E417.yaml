personas:
  professional: Latrice Robinson is a budding classroom helper who loves arranging crayons, worksheets, and play stations with meticulous care, turning each preschool activity into a predictable routine
    while still staying flexible enough to join spontaneous sing‑alongs.
  sports: Latrice Robinson dashes around on the Little Rockets Soccer Club’s Tuesday and Thursday practices, idolizes the Chicago Bears for their teamwork, and balances structured drills with free‑play
    tag sessions that satisfy her energetic, sociable nature.
  arts: Latrice Robinson spends afternoons drawing vibrant Crayola pictures inspired by illustrator Oliver Jeffers, dancing to The Wiggles’ catchy tunes, and reenacting favorite scenes from Disney’s Frozen
    starring Idina Menzel, letting her compassion and outgoing spirit shine through artistic play.
  travel: Latrice Robinson has visited her grandparents’ farm in the countryside, the local Children’s Museum, and a family trip to Disneyland in California, and now dreams of exploring the Great Barrier
    Reef aquarium exhibit in Sydney during her next vacation.
  culinary: Latrice Robinson delights in buttery mac and cheese, loves crunchy apple slices with peanut butter, and proudly attempts to stir chocolate chip cookie dough, though she can be picky, refusing
    broccoli and insisting on perfectly cut sandwich squares.
  core: Latrice Robinson is an organised, sociable 5‑year‑old whose love for routine, caring nature, and boundless energy is tempered by a habit of worrying over small details.
background:
  cultural: Latrice is raised in a Black family rooted in the traditions and values of African‑American culture, while living in Shingle Springs, a small community in El Dorado County, California. Her parents
    celebrate cultural holidays such as Juneteenth and Kwanzaa with food, storytelling, and music, and they regularly attend a local church where gospel singing and community service are emphasized. The
    family participates in neighborhood events and library programs that highlight diverse cultures, giving Latrice exposure to both her heritage and the broader community. Growing up in a predominantly
    white rural area, she experiences a strong sense of belonging through a close‑knit extended family and supportive neighbors, which nurtures her compassion, cooperation, and love for rhythm and group
    activities.
attributes:
  skills: '[''letter recognition'', ''counting to twenty'', ''following daily routines'', ''organizing toys and backpack'', ''cooperative play'', ''empathy and comforting peers'', ''basic music rhythm'',
