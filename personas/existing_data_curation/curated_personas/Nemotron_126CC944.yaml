  hobbies: '[''Woodworking'', ''Gardening'', ''Cleveland Cavaliers fandom'', ''Reading African-American history'', ''Chess'', ''Bridge'', ''Church choir participation'', ''Youth mentorship volunteering'',
    ''Jazz and soul music listening'', ''Cooking soul food'']'
  career_goals: Approaching retirement, Calvin aims to leave a measurable legacy at his store by surpassing annual sales targets and reducing shrinkage by 15% before stepping down. He hopes to mentor at
    least two junior supervisors, documenting his best-practice playbook for future managers. Post-retirement, he envisions a part-time advisory role for neighboring stores in the district, or launching
    a small consulting service focused on retail efficiency for family-owned shops. He also wants to secure financial stability for his family and contribute time to a local youth mentorship program.
