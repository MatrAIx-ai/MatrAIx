  career_goals: Carmen aims to become the lead sonographer for her clinic, overseeing a small team and expanding services to include advanced fetal cardiology imaging. She plans to earn additional RDMS
    certifications in obstetric and vascular specialties, publish a practice‑based study on low‑resource prenatal ultrasound protocols, and eventually transition into a clinical educator role for a regional
    sonography program. Long‑term, she envisions partnering with local health providers to establish a community imaging center that offers affordable diagnostic services throughout Cedar County.
