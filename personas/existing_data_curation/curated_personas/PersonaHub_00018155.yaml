persona_description: A historian who is interested in the history of African American missionaries, particularly the work of Alonzo and Althea Brown Edmiston in the Belgian Congo during the early twentieth
  century. They are particularly interested in the transnational implications of black education in the South and the role of black foreign missionaries in the early civil rights movement. They are looking
  for a well-written and comprehensive study of the Edmistons' work and the impact of their missionary careers on the development of Christian missions in central Africa.
