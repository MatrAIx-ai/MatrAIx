  hobbies: '["Museum and gallery visits","Reading Argentine literature","Listening to and dancing tango","Traditional cooking with modern twists","Balcony herb gardening","Knitting for charity","Gentle
    yoga practice","Volunteering for oral‑history sessions"]'
  career_goals: Carmen aims to complete a memoir that weaves together her Argentine roots, her immigrant journey, and the rich tapestry of New York life she has observed. She hopes to mentor younger immigrants
    and seniors by sharing stories of cultural preservation and by offering informal workshops on Argentine cooking and mate etiquette. A cherished ambition is to curate a small exhibit of Argentine art
    and photographs at her local senior center, creating a space where residents can experience and discuss their heritage. She also wishes to maintain her health through regular walks in Central Park and
    gentle yoga, and she dreams of taking a short, well‑planned trip back to Argentina to visit family and revisit the places of her youth within the next two years.
