  career_goals: Looking ahead, Debbie aims to transition into a senior advisory role within the regional arts community, where she can shape cultural policy and mentor emerging arts administrators. She
    envisions establishing an interdisciplinary arts center in Helena that connects seniors, youth, and Native American artists to foster intergenerational dialogue. While she plans to scale back full‑time
    managerial duties, she seeks to serve on nonprofit boards, consult on grant proposals, and lead community workshops that celebrate local heritage and innovative artistic expression.
