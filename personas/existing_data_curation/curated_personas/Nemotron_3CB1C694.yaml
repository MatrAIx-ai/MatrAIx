personas:
  professional: Debbie Rosado, a seasoned arts administrator in Helena, leverages her strategic planning, grant‑writing acumen, and meticulous budgeting to design community‑focused exhibitions, while her
    curiosity and sociable nature drive collaborative programming and mentorship of emerging cultural leaders.
  sports: Debbie Rosado tackles the trail networks of the Gallatin and Helena National Forests as an active member of the Helena Trails Club, pairs her hikes with seasonal mountain‑bike rides in summer
    and indoor yoga in winter, and follows the Helena Brewers baseball team while cheering on the Montana Grizzlies football squad each fall.
  arts: Debbie Rosado spends weekends sketching watercolors of Yellowstone vistas, volunteers as a stage manager for the Helena Community Theatre where they help produce productions like "Our Town" and
    "The Glass Menagerie," and enjoys the works of Ansel Adams, Georgia O'Keeffe, and contemporary Montana painter Kaia Kopp, often discussing these with the local historical fiction book club.
  travel: Debbie Rosado prefers meticulously planned road trips that blend cultural stops and outdoor adventure, having already toured Yellowstone, Zion, and Grand Teton National Parks while dreaming of
    a future visit to Banff and the historic streets of Savannah, Georgia, always budgeting a modest fund for lodging and local cuisine.
  culinary: Debbie Rosado enjoys a modestly seasoned palate, often cooking grilled trout with rosemary and lemon, simmering huckleberry jam for homemade scones, and experimenting with bison chili, yet they
    admit a sweet tooth for chocolate chip cookies baked during the winter months, while occasionally splurging on a fine‑dining farm‑to‑table experience in Bozeman.
  core: Debbie Rosado, a curiosity‑driven 62‑year‑old arts administrator who balances meticulous budgeting with a penchant for spontaneous watercolor trips and a gentle forgetfulness about dentist appointments,
    embodies the bridge between structured planning and creative spontaneity.
background:
  cultural: Debbie was raised in a middle‑class household in the American Midwest, where her family’s European roots—primarily Italian and Spanish ancestry—infused their home with traditional cooking and
    holiday celebrations. Relocating to Helena, Montana in her thirties, she embraced the region’s blend of frontier spirit and rich Native American heritage. Her cultural outlook merges a deep appreciation
    for European classical art and literature with a respect for local Indigenous traditions, which informs her community work and artistic interests. This cross‑cultural perspective has shaped her inclusive,
    collaborative approach to both professional and personal endeavors.
