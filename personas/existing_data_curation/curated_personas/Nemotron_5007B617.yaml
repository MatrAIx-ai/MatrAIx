  hobbies: '["Sketching", "Watercolor painting", "Digital illustration", "Photography of nature", "Reading graphic novels", "Reading YA fiction", "Playing acoustic guitar", "School theater", "Volunteer
    at library story‑time", "Baking cupcakes", "Hiking in Mark Twain State Park", "Organizing community events"]'
  career_goals: Victoria dreams of turning her love of art into a professional career while staying connected to her community. She plans to apply to a specialized high‑school program with a strong visual‑arts
    curriculum, then pursue a Bachelor of Fine Arts in illustration or graphic design. Her long‑term ambition is to work as a freelance illustrator for books and games, and eventually open a community art
    studio in Cairo where she can teach workshops, mentor younger students, and organize local art festivals. She also hopes to earn scholarships that will allow her to travel and study different artistic
    traditions, broadening her creative perspective. In the meantime, she aims to build a robust online portfolio, win regional art competitions, and secure mentorship from a local artist.
