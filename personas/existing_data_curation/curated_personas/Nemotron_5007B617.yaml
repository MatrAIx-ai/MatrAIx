personas:
  professional: Victoria Reaves, a budding visual storyteller, blends her sketching, digital comic creation, and stage experience to craft immersive narratives while coordinating school events with methodical
    precision, reflecting her curious, organized, and sociable nature.
  sports: Victoria Reaves stays active by playing midfield for the Mark Twain State Park Youth Soccer League in spring, running cross‑country for the high school team in fall, and cheering on the professional
    basketball franchise the Springfield Cyclones, while logging workouts in a colorful notebook to keep her organized schedule balanced with art projects.
  arts: Victoria Reaves immerses herself in graphic storytelling, drawing inspiration from creators like Neil Gaiman, Marjane Satrapi, and watercolorist Josephine Wall, while strumming acoustic chords to
    the folk‑rock sounds of John Mayer and The Paper Kites, and attending local open‑mic nights that nurture her sociable and adventurous spirit.
  travel: Victoria Reaves plans each weekend getaway with the meticulousness of a storyboard, favoring short trips to nearby natural gems such as the Red River Gorge and annual family road trips to the
    Grand Canyon, while pinning future wanderlust dreams of wandering Kyoto’s bamboo forests and hiking Scotland’s Isle of Skye on her travel board.
  culinary: Victoria Reaves whips up crowd‑pleasing vanilla cupcakes topped with fresh raspberry glaze for community fundraisers, experiments with buttery croissant dough after watching pastry tutorials,
    and savors the bright tang of lime‑infused guacamole with tortilla chips during movie nights, reflecting her organized kitchen habits and occasional over‑seasoning quirk.
  core: Victoria Reaves is a curiosity‑driven teen who channels organized creativity into sketchbooks, stage lights, and backyard barbecues, all while juggling a tendency to over‑schedule and a habit of
    humming off‑beat tunes during art class.
background:
  cultural: 'Victoria was raised in a white, Midwestern American family in the small rural community of Cairo, Missouri. Her upbringing reflects the close‑knit, neighborly values typical of the region:
    a strong emphasis on family, church participation (she attends a local Methodist congregation), community service, and seasonal events like county fairs and harvest festivals. While the town’s pace
    is slow and grounded in agricultural life, Victoria’s curiosity exposes her to a wider cultural world through the internet, social media, and school art programs. This blend of traditional Midwestern
    hospitality and contemporary artistic influences shapes her worldview, giving her a respect for local heritage while fostering an openness to new ideas and diverse artistic expressions.'
attributes:
  skills: '["Sketching", "Watercolor painting", "Digital illustration (Procreate)", "Basic graphic design (Canva)", "Photography", "Event planning", "Leadership", "Public speaking", "Microsoft Office (Word,
