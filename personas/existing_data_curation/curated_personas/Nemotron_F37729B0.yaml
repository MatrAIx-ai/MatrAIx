personas:
  professional: Jacy Morris, a 23‑year‑old residential real‑estate specialist in Houston, leverages precise market analysis, contract negotiation, and digital marketing tools to provide low‑pressure, organized
    services for first‑time homebuyers while maintaining a compassionate, routine‑driven workflow.
  sports: Jacy Morris enjoys tranquil morning walks in Memorial Park, follows the Houston Astros for baseball and the Houston Rockets for basketball on TV, participates in a community yoga class twice a
    month, and occasionally joins a local adult softball league for a low‑key social sport experience.
  arts: Jacy Morris immerses themselves in mystery novels by Agatha Christie and Gillian Flynn, devours personal‑development titles from the self‑help aisle, enjoys listening to classic Southern crooner
    Emmylou Harris while cooking, and appreciates independent film festivals in Austin for their low‑key, thoughtful narratives.
  travel: Jacy Morris prefers carefully planned weekend road trips to nearby destinations like Austin’s music scene, Galveston’s beachfront, and New Orleans for its historic architecture, using a curated
    travel checklist and budgeting each trip, while dreaming of a future solo visit to Savannah’s historic districts.
  culinary: Jacy Morris delights in preparing Southern comfort dishes such as shrimp and grits, collard greens seasoned with garden‑grown thyme, and pecan pie, boasting an intermediate cooking skill level
    augmented by weekly garden harvests that inspire fresh, herb‑infused meals shared with close friends.
  core: Jacy Morris blends meticulous real‑estate expertise with quiet garden‑inspired creativity, thriving on routine, compassion, and occasional indulgences, while habitually declining spontaneous social
    outings.
background:
  cultural: Jacy was raised in a modest, middle-class white family in the greater Houston area, where Southern hospitality and Texas pragmatism shaped her values. Her upbringing emphasized hard work, community
    responsibility, and respectful neighborly relations. Though she left formal education before ninth grade, she values practical knowledge and often participates in local church gatherings and community
    events. The cultural mosaic of Houston’s neighborhoods has taught her to appreciate diverse perspectives, while her own Southern‑Texan roots reinforce traditional values, modest living, and a strong
    dedication to helping others within her community.
attributes:
  skills: '[''Property Valuation'', ''Market Analysis'', ''Contract Negotiation'', ''Transaction Coordination'', ''Client Relationship Management'', ''Digital Marketing'', ''Virtual Tour Creation'', ''Texas
