  hobbies: '[''Gardening'', ''Cooking/Baking'', ''Reading mystery novels'', ''Listening to real estate podcasts'', ''Walking in parks'', ''Volunteering at a food bank'', ''Home staging'', ''DIY home decor'']'
  career_goals: Jacy aims to secure her Texas broker's license within the next 12 to 18 months and to build a stable pipeline of clients focused on first-time homebuyers and families seeking reliable housing.
    She plans to open a small boutique brokerage that offers personalized, low-pressure service, allowing her to maintain a consistent routine while helping clients feel supported. In the long term, she
    hopes to become a trusted community resource by offering free workshops on homeownership, mentoring new agents, and expanding her business to include property management services. Achieving financial
    independence and the ability to support her family are central motivations behind her career ambitions.
