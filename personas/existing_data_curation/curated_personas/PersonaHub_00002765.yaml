persona_description: A fluid dynamics engineer who specializes in the study of fluid flow patterns and heat transfer in fluidized bed combustors. Their research interests include the effects of particle
  size, air velocity, bed temperature, and radial position of the tube on the heat transfer coefficient, as well as the thickness of the gas film on the tube. They are also interested in the effects of
  radiation on the heat transfer coefficient and the development of models to predict the heat transfer coefficient.
