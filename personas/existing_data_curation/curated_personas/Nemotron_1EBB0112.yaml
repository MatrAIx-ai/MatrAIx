  hobbies: '[''Visiting art galleries and museums'', ''Salsa dancing'', ''Cooking traditional Mexican dishes'', ''Participating in community cultural festivals'', ''Gardening herbs and chilies'', ''Knitting
    and crocheting'', ''Reading historical fiction and contemporary novels'', ''Volunteering at a local community center'', ''Organizing potluck gatherings with friends and family'', ''Learning new craft
    techniques like pottery'']'
  career_goals: Even though she is currently not employed, Jessica aspires to translate her love of community and culture into a part‑time role that supports her neighborhood. She hopes to volunteer as
    a cultural liaison for a local community center, helping to organize Mexican heritage workshops and art classes. Over the next few years she plans to pursue a certification in senior caregiving so she
    can formally assist elderly relatives and neighbors. Additionally, she dreams of launching a home‑based cooking series where she teaches traditional Mexican recipes to children and adults, preserving
    culinary heritage while earning supplemental income.
