personas:
  professional: Jessica Santiago, a community-focused cultural liaison in training, channels her fluent bilingual communication and spontaneous event-organizing talent into part-time workshops that teach
    traditional crafts and heritage cooking at the local community center, while juggling a certification program in senior caregiving.
  sports: Jessica Santiago fuels her fitness through weekly Salsa dance nights at the neighborhood hall, supports the local baseball team, the River City Sharks, and participates in a Saturday morning walking
    club that meets at the community park.
  arts: Jessica Santiago immerses herself in the arts by frequenting the downtown modern art gallery, studying pottery techniques inspired by the works of Frida Kahlo and Diego Rivera, and curating a monthly
    book club that explores historical fiction ranging from Ken Follett to Isabel Allende.
  travel: Jessica Santiago dreams of a culinary pilgrimage to Oaxaca to sample authentic mole while also reminiscing about a road trip to Savannah's historic squares, and they usually plan trips months
    in advance to juggle limited vacation time and family obligations.
  culinary: Jessica Santiago delights in cooking traditional dishes such as mole poblano, tamales de dulce, and pozole, meticulously cultivating cilantro, epazote, and chilies in their backyard garden to
    ensure fresh flavor, and they often livestream the cooking process for friends and neighbors.
  core: Jessica Santiago blends spontaneous community leadership with a love for traditional heritage cooking, endless curiosity for art, and a habit of juggling too many projects at once, all while keeping
    a lively salsa rhythm in their daily life.
background:
  cultural: Jessica was raised in a Mexican‑American household in Southern California, where both Spanish and English were spoken daily. Family traditions such as Día de los Muertos, Las Posadas, and Sunday
    tamal breakfasts remain central to her identity, and she often blends these customs with the broader Californian cultural scene. Her Catholic upbringing instilled a strong sense of community service,
    which she expresses through volunteering and helping neighbors. Growing up in Santa Fe Springs exposed her to a diverse blend of Latino, Asian, and Anglo cultures, fostering an open‑minded outlook and
    appreciation for multicultural art and cuisine. She values close inter‑generational ties, respects elders, and believes that sharing food and stories is the cornerstone of cultural continuity.
attributes:
  skills: '[''Interpersonal communication'', ''Bilingual Spanish-English'', ''Informal event coordination'', ''Mexican culinary arts'', ''Traditional crafts (sewing, weaving)'', ''Art appreciation and basic
