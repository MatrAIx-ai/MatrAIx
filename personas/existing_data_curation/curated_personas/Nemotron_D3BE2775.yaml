  career_goals: Although still a toddler, Emily’s caregivers encourage her budding curiosity and social nature, envisioning a future in which she becomes a caring community member—perhaps an early‑child
    educator or a pediatric caregiver—where she can blend her love for interaction with her practical problem‑solving skills. She is also gently guided toward developing emotional regulation strategies
    to channel her intense feelings into constructive creativity.
