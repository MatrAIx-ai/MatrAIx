persona_description: A geologist who specializes in the study of lake sediments, particularly the cycling of carbon and the impact of hydrology and biogeochemical processes on the biogeochemical dynamics
  of lakes. Their research interests include, but are not limited to, the study of the carbon pump, the cycling of organic matter and inorganic carbon, and the effects of hydrology and biogeochemical processes
  on the biogeochemical dynamics of lakes. They are interested in understanding the complex interactions between hydrology and biogeochemical processes and how they affect the biogeochemical cycles of other
  elements. They are also interested in the impact of hydrology and biogeochemical processes on the biogeochemical dynamics of lakes and the potential for these processes to affect the biogeochemical cycles
  of other elements.
