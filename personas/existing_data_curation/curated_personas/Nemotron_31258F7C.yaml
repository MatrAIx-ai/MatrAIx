personas:
  professional: Shirley Bellamy, a 21‑year‑old cashier known for patient conflict mediation and a self‑taught knack for Adobe Photoshop, is leveraging their organized work ethic to transition into a gallery
    assistant role while pursuing a community‑college graphic‑design certificate.
  sports: Shirley Bellamy enjoys solitary hikes on Sandhills trails with their DSLR, is a member of the local Sandhills Trailwalkers club, and roots for the Columbia Fireflies while occasionally watching
    the Carolina Panthers on weekends.
  arts: Shirley Bellamy channels their love for African‑American folk motifs into digital illustrations, draws inspiration from the works of Kara Walker and the improvisational sounds of Nina Simone, and
    regularly contributes flyers for community art events at the local art center.
  travel: Shirley Bellamy prefers low‑key road trips that blend nature and cultural heritage, has explored Savannah’s historic squares and the coastal marshes of Charleston, and hopes to photograph the
    vibrant street art of New Orleans next summer.
  culinary: Shirley Bellamy enjoys cooking soul‑food classics like collard greens with smoked turkey, shrimp‑and‑grits, and sweet potato pie, experiments with seasoning blends such as Cajun spice and smoked
    paprika, and often shares homemade dishes at Sunday potlucks despite occasionally over‑salting their recipes.
  core: Shirley Bellamy balances quiet creativity with razor‑sharp organization, habitually journals their ideas on napkins, can spend hours perfecting a single illustration, and occasionally forgets to
    reply to texts because they’re lost in a sketch.
background:
  cultural: Shirley's cultural background is rooted in the African‑American community of Aiken County, South Carolina. Growing up in Jackson, she was immersed in a close‑knit family where church life, gospel
    music, and Sunday potlucks were central to daily routine. Her grandparents taught her traditional quilting patterns and Southern cooking techniques, passing down stories of the Civil Rights era that
    fostered her sense of resilience and community responsibility. Shirley participates in local celebrations such as Juneteenth and Freedom Day, often helping organize art displays that highlight black
    artists from the Lowcountry. She draws creative inspiration from regional folk art traditions, including the legacy of the Gee's Bend quilters, and she values the intergenerational bonds that shape
    her identity.
