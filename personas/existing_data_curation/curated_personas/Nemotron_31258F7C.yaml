  career_goals: Shirley aims to transition from retail to a career that blends her love of art with her organizational strengths. She plans to enroll in a community‑college program in graphic design or
    visual arts, gaining formal credentials while continuing to work part‑time. In the near term, she hopes to secure an entry‑level position as a gallery assistant or art‑center coordinator in the Columbia
    area, where she can apply her customer‑service experience and newly learned design skills. Long‑term, Shirley envisions becoming an arts program director who creates outreach initiatives showcasing
    African‑American artists in the Upstate, or launching her own boutique that sells curated artworks and handcrafted items, using her calm resilience to lead projects and manage a small team.
