  career_goals: Naureen dreams of a future where she can combine her love of routine, helping others, and practical work. She expresses a strong interest in becoming a teacher because she enjoys guiding
    classmates and values a structured classroom environment. She also imagines working in her family's bakery, where she could apply her love of cooking Mexican recipes and maintain consistent daily tasks.
    Occasionally, she mentions a desire to care for animals as a veterinarian, reflecting her compassion and curiosity.
