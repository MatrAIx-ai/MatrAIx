personas:
  professional: Naureen Hurtado is a budding junior soccer captain and apprentice baker who applies their love of routine and organization to both leading practice drills and meticulously measuring ingredients.
  sports: Naureen Hurtado loves playing forward for the Desert Foxes Youth Soccer Club, practices three times weekly, follows a structured warm‑up routine, cheers on the Phoenix Suns and Arizona Diamondbacks,
    and enjoys joining the community's fall track events for extra cardio.
  arts: Naureen Hurtado expresses creativity through drawing vibrant scenes inspired by Diego Rivera’s murals and Frida Kahlo’s self‑portraits, crafts colorful papel picado for holiday celebrations, and
    collects stickers featuring characters from classic adventure books and pop‑culture icons.
  travel: Naureen Hurtado enjoys family road trips that blend adventure with cultural immersion, having explored the Grand Canyon’s vistas, the historic streets of San Antonio’s River Walk, and a summer
    visit to a sister city across the border to join a Día de los Muertos parade, while dreaming of seeing the pyramids of Teotihuacan next.
  culinary: Naureen Hurtado loves helping bake sweet pan dulce and savory tamales with abuela, delights in sprinkling cinnamon sugar on churros, enjoys mixing fresh cilantro and lime into pico de gallo,
    and proudly serves their family’s favorite enchiladas artfully plated on special occasions.
  core: Naureen Hurtado is a routine‑loving, soccer‑savvy eight‑year‑old who balances disciplined practice, meticulous saving, creative art, and heartfelt family traditions, all while never missing a sticker
    for their ever‑growing collection.
background:
  cultural: Naureen grew up in a vibrant Mexican‑American household in Phoenix. Spanish is spoken at home, and she fluently switches between English and Spanish. Her family celebrates traditional holidays
    such as Día de los Muertos and Las Posadas, prepares home‑cooked Mexican dishes, and participates in local cultural festivals. The community’s strong emphasis on family bonds, respect for elders, and
    practical values influences her daily life, reinforcing her preference for routine, responsibility, and a balanced mix of social and solitary activities.
