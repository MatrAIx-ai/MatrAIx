personas:
  professional: Yaimelys Feliciano is a bilingual medical assistant in Chicago whose deft handling of patient intake, EHR navigation, and ICD‑10 coding is flavored by a curiosity‑driven, artistic mindset,
    allowing them to improvise amid occasional schedule chaos while assertively championing workflow improvements.
  sports: Yaimelys Feliciano enjoys leisurely jogs along Lake Michigan in the spring, participates in a co‑ed adult softball league during summer, follows the Chicago Cubs and Chicago Blackhawks avidly,
    and attends weekly yoga sessions at a downtown studio, balancing a calm, solo fitness routine with occasional team sport camaraderie.
  arts: Yaimelys Feliciano spends quiet evenings sketching watercolors influenced by the surrealism of Frida Kahlo and the bold stenciling of Banksy, frequently visits the Art Institute of Chicago to view
    works by Monet and Georgia O'Keeffe, and curates a personal playlist that includes Rosalía, Leonard Cohen, and Kendrick Lamar, letting artistic appreciation shape their reflective leisure time.
  travel: Yaimelys Feliciano prefers low‑key solo trips that blend cultural immersion with quiet relaxation, having explored Barcelona’s Gothic Quarter, the historic plazas of Cartagena, and the tranquil
    lakeside towns of the Italian Garda region, while dreaming of a slow‑paced autumn retreat in Kyoto's gardens, all planned within a modest travel budget that accommodates occasional family obligations.
  culinary: Yaimelys Feliciano cooks at an intermediate level, regularly preparing family‑traditional dishes such as mofongo and arroz con gandules with homemade sofrito and plantains, while also experimenting
    with Mediterranean risotto and crafting adobo‑marinated chicken paired with locally sourced chilies and fresh herbs, reflecting a culinary curiosity balanced by occasional over‑spicing missteps.
  core: Yaimelys Feliciano blends a curious, artistic soul with pragmatic medical expertise, navigating life’s organized chaos through solitary creativity, modest financial optimism, and a quietly resilient
    yet occasionally disorganized approach.
background:
  cultural: Yaimelys was born to Puerto Rican parents who settled in Chicago, growing up in a bilingual household where Spanish and English were spoken interchangeably. Her upbringing combined the island’s
    strong family ties, reverence for music and storytelling, and culinary traditions with the urban, multicultural fabric of Chicago’s neighborhoods. She maintains close connections with the local Puerto
    Rican community through cultural festivals, church gatherings, and a neighborhood association that celebrates isla heritage. This dual cultural lens informs her professional focus on health equity,
    as she is attuned to the unique challenges faced by Latino immigrants, such as language barriers and access to culturally competent care. While she appreciates her island roots, she also embraces the
    diversity of Chicago, integrating varied perspectives into both her personal life and her approach to patient care.
attributes:
  skills: '[''Patient intake'', ''Vital signs measurement'', ''Phlebotomy'', ''Specimen handling'', ''ICD‑10 medical coding'', ''Electronic health record documentation (Epic, Allscripts)'', ''Appointment
