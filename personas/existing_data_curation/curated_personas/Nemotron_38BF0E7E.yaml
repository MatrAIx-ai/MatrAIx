    of new medical technologies'']'
  hobbies: '[''Reading contemporary Puerto Rican poetry'', ''Sketching and watercolor painting'', ''Visiting art museums and galleries'', ''Cooking traditional Puerto Rican cuisine'', ''Hosting small dinner
    gatherings'', ''Journaling and mindfulness walks by Lake Michigan'', ''Participating in a bilingual book club'', ''Volunteering at community health fairs'']'
  career_goals: Yaimelys aims to expand her impact beyond the exam room. In the short term, she plans to obtain the Certified Medical Assistant (CMA) credential and lead a quality‑improvement project that
    streamlines patient flow in her clinic. Over the next five years, she hopes to transition into a medical office manager role, earning a certificate in health administration while mentoring new assistants.
    Long‑term, she envisions directing community‑health initiatives that address disparities faced by Chicago’s Puerto Rican population, designing culturally tailored outreach programs, and influencing
    local health policy. Throughout, she seeks positions that balance practical responsibilities with opportunities to explore innovative health‑service models, such as tele‑health coordination and patient
    navigation services.
