personas:
  professional: Jeanne Oliver, a retired art‑historical researcher and literary critic, channels their meticulous archival expertise, curatorial planning acumen, and strategic bridge mindset into authoring
    a richly illustrated local history of Pike County while mentoring emerging scholars, consistently balancing curiosity with a methodical, skeptical approach to every exhibition project.
  sports: Jeanne Oliver enjoys low‑impact morning walks with the Milford Bird‑Watchers Club, participates in a weekly senior‑softball league with the Pike County Lady Spikers, and follows the Philadelphia
    Eagles and Philadelphia Phillies on television, preferring gentle cardio over strenuous workouts.
  arts: Jeanne Oliver spends afternoons painting watercolor landscapes of the Delaware River valley, drawing inspiration from Winslow Homer and Claude Monet, while attending local performances of folk singer
    Sarah Jarosz and classical cello concerts by Yo‑Yo Ma, and they regularly discuss literary works by James Joyce and Mary Oliver at their book club.
  travel: Jeanne Oliver prefers thoughtfully planned, low‑tempo trips, having visited Shenandoah National Park, the historic streets of Gettysburg, and the coastal town of St. Augustine, while dreaming
    of a guided cultural tour of Dublin and a leisurely river cruise on the Danube, all balanced against limited mobility and a modest travel budget.
  culinary: Jeanne Oliver delights in cooking hearty chicken pot pie with garden‑grown thyme and rosemary, pan‑searing fresh trout with lemon‑butter sauce, and baking shoofly pie with a dash of molasses,
    showcasing a seasoned hobbyist skill set that blends Pennsylvania Dutch comfort food with Mediterranean herb flavors.
  core: Jeanne Oliver is a curiosity‑driven, methodical scholar who clings to daily crossword puzzles, hoards first‑edition books, and occasionally forgets where they placed their glasses, embodying a blend
    of disciplined routine and whimsical nostalgia.
background:
  cultural: Jeanne comes from a white, Mid‑Atlantic American heritage with deep roots in Pennsylvania, tracing family lineage to German and Irish immigrants who settled in the Pocono region in the late
    19th century. Raised in a modest, close‑knit community, she was exposed to both the Appalachian folk traditions of the area and the broader European cultural canon through her university education in
    the arts and humanities. Her upbringing emphasized self‑reliance, a respect for nature, and a strong sense of community involvement, all of which continue to shape her appreciation for local history,
    small‑group interaction, and the preservation of cultural heritage.
