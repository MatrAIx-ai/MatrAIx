personas:
  professional: Zenaida Pieras is an aspiring junior coder who blends watercolor sketches of the local shoreline with Scratch games that teach recycling, reflecting a curious mind, organized work ethic,
    and a compassionate drive to help the environment, and they occasionally fret over perfect outcomes.
  sports: Zenaida Pieras plays midfield for the Coastal Kids Soccer Club, practices twice a week, and cheers for the city’s Harbor FC during matches, balancing a competitive spirit with a collaborative,
    compassionate approach to teamwork, though they sometimes feel anxious before big games.
  arts: Zenaida Pieras spends afternoons painting watercolor scenes of the shoreline and listening to traditional folk songs by the River Note Ensemble, while devouring adventure novels like 'The Secret
    of the Tide' by L. Rivers, and they channel their curiosity and emotional sensitivity into creative expression.
  travel: Zenaida Pieras loves weekend trips to Sunset Bay and the nearby Green Ridge National Park, dreams of visiting the archipelago of Galápagos, and plans journeys with family that blend nature hikes
    with sketching sessions, though they often worry about missing school assignments.
  culinary: Zenaida Pieras helps prepare empanadas filled with cheese and spices, crisp plantain fritters, and experiments with pineapple salsa, showcasing a growing cooking skill set, while they occasionally
    over‑salt dishes in their enthusiasm to personalize flavors.
  core: Zenaida Pieras is a curious, art‑loving 11‑year‑old who balances meticulous coding and environmental projects with a compassionate heart, yet they often get caught in a cycle of worrying over small
    details and occasional impulsive splurges on glitter pens.
background:
  cultural: Zenaida is a first‑generation Ecuadorian‑American raised in a bilingual household in Bayville, New York. At home, Spanish is spoken daily, and she celebrates Ecuadorian traditions such as Carnaval,
    Día de los Difuntos, and family gatherings centered around dishes like empanadas de verde, arroz con camarones, and fresh fruit smoothies. She participates in a local cultural club that teaches Andean
    music and dance, keeping her connection to her heritage alive. Her Catholic upbringing includes attending church festivals that blend Ecuadorian and American customs. While fully integrated into her
    American school community, Zenaida balances these influences, proudly sharing her cultural stories and cuisine with friends, and drawing inspiration from both her Ecuadorian roots and the diverse environment
    of Long Island.
