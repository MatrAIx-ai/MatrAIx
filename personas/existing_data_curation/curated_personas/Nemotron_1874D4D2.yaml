  hobbies: '[''drawing and watercolor painting'', ''reading adventure and mystery novels'', ''exploring local parks and beaches'', ''listening to Ecuadorian folk music'', ''playing soccer with friends'',
    ''volunteering at the community animal shelter'', ''coding simple games in Scratch'', ''baking traditional Ecuadorian dishes with family'']'
  career_goals: Zenaida dreams of becoming a marine biologist who protects ocean ecosystems, inspired by stories of Ecuador's Pacific coast and her own beach walks on Long Island. She also hopes to merge
    her love of art and science by illustrating educational materials about marine life, eventually sharing her work with schools and community programs. Her strong desire to help others fuels a long‑term
    ambition to mentor younger students, using her empathy and organizational skills to create supportive learning environments.
