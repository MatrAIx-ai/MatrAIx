persona_description: A speech-language pathologist who specializes in treating individuals with communication and swallowing disorders. They have a master's degree in speech-language pathology and are licensed
  or certified in their state. They work in medical facilities, schools, and the client's home. They provide direct clinical services to individuals with communication or swallowing disorders, conduct research
  on communication disorders, and design and develop equipment or techniques for diagnosing and treating speech problems. They also keep records on the initial evaluation, progress, and discharge of clients,
  counsel individuals and their families concerning communication disorders, and work with family members to recognize and change behavior patterns that impede communication and treatment.
