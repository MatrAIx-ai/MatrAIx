persona_description: A person who is involved in the Hopi Tribe's Water Resources Program, responsible for ensuring the Tribe has a safe, dependable, and long-term water supply. They are a policy recommending
  body and technical support program member who works to develop and implement responsible water management plans, water quality standards, and a management code. They are also involved in updating GIS
  databases of Hopi water resources, identifying contaminated sources of water, and promoting water conservation in wastewater treatment facilities. Additionally, they assist the Hopi Villages in developing
  and upgrading water and wastewater systems and plans.
