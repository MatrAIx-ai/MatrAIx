persona_description: A historian specializing in the study of cultural property, particularly the restitution of German cultural property taken during the Second World War. The individual is interested
  in the history of cultural property, the restitution process, and the legal and political aspects of cultural property restitution. They are likely to be familiar with the topics of Nazi looting, Soviet
  trophy brigades, and the restitution of cultural property after the war. They may have a background in cultural history, art history, or international relations.
