personas:
  professional: Luis Irizarry, an aspiring marine conservationist, combines a budding knowledge of marine biology with hands‑on DIY electronics and basic Python scripting, approaching field projects with
    a curious yet practical mindset while often juggling deadlines due to a spontaneous, flexible attitude.
  sports: Luis Irizarry fuels their love of the ocean by surfing at Fort Walton Beach and joining the Gulf Coast Youth Soccer Club for weekend matches, while cheering on the Miami Dolphins in the NFL and
    the Florida Atlantic Owls during college baseball season, balancing a laid‑back fitness routine with occasional missed workouts due to procrastination.
  arts: Luis Irizarry finds creative release in strumming acoustic renditions of Jack Johnson and Ben Harper while sketching seaside vistas inspired by Winslow Homer, devouring science‑fiction novels by
    Andy Weir and Octavia Butler, and dancing to the rhythmic beats of Celia Cruz at local Latin dance nights, which together shape a relaxed yet introspective artistic identity.
  travel: Luis Irizarry prefers spontaneous weekend getaways, having explored the Florida Keys and the Bahamas on surf trips while dreaming of backpacking through Costa Rica’s rainforests and snorkeling
    the Galápagos Islands, often balancing limited teen budget constraints with a desire for immersive, environmentally‑focused adventures.
  culinary: Luis Irizarry, a modest home‑chef, whips up grilled shrimp tacos with fresh lime, cilantro, and mango salsa, perfects simple fish ceviche with lime juice and jalapeños, and occasionally experiments
    with avocado‑toast variations, yet they often resort to quick pizza rolls when surf sessions run late.
  core: Luis Irizarry is a sun‑kissed, tech‑savvy teen whose restless curiosity drives them to surf, code, and sketch, even as they wrestle with chronic over‑thinking and a procrastinator’s tendency to
    let deadlines slip.
background:
  cultural: Luis was raised in a bilingual Costa Rican‑American household in Saint Peterburg, Florida. His parents emigrated from San José, bringing traditions such as cooking gallo pinto, celebrating Día
    de la Independencia on September 15, and embracing the "pura vida" outlook that emphasizes gratitude and community. At home, Spanish is spoken daily, and he maintains close ties with extended family
    in Costa Rica through regular video calls. While attending an English‑language school, Luis participates in local Latin dance events and community soccer leagues, which keep his cultural roots alive.
    He also enjoys American beach culture, blending his heritage with the coastal lifestyle of Pinellas County.
attributes:
  skills: '["Bilingual (Spanish & English)", "Basic computer literacy (Microsoft Office, Google Workspace)", "Introductory Python programming", "DIY electronics and hardware tinkering", "Acoustic guitar
    playing", "Team collaboration and peer mediation", "Basic marine biology knowledge", "Environmental stewardship basics"]'
  hobbies: '["Surfing and beachcombing", "Acoustic guitar playing and songwriting", "DIY electronics projects", "Coding simple Python scripts", "Strategy video gaming", "Reading sci‑fi and environmental
    literature", "Sketching coastal scenes", "Volunteer beach clean‑ups", "Community soccer games", "Latin dance gatherings"]'
  career_goals: Luis aims to pursue a college degree in environmental science or marine biology, hoping to work on coastal conservation projects that protect Florida's beaches and estuaries. He wants to
    combine his technical curiosity with hands‑on field work, developing sustainable solutions for marine ecosystems. As a backup, he is interested in a career in information technology, where his coding
    skills could be applied to environmental data analysis. Ultimately, Luis seeks a profession that offers both personal stability and the chance to make a positive impact on his community and the natural
    world.
