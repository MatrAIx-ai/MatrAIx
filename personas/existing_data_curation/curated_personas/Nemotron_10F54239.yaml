personas:
  professional: Sterling Weikle, an aspiring visual storyteller, blends sketching, watercolor painting, and tablet animation to craft short narratives while also coding simple games in Scratch, showcasing
    an early interdisciplinary talent and a natural flair for captivating audiences.
  sports: Sterling Weikle, an enthusiastic youth athlete, plays on the Bayou Rangers U12 soccer team, swims with the local pool club, cheers for the New Orleans Saints and the New Orleans Pelicans, and
    enjoys weekend hikes along bayou trails to stay fit, preferring group games where they can be the center of attention.
  arts: Sterling Weikle, a budding artist-performer, spends afternoons sketching Marvel superheroes, painting vibrant watercolors of swamp scenes, animating short clips inspired by Disney animator Glen
    Keane, playing piano for the church choir, and acting in drama club productions of A Midsummer Night's Dream, drawing creative energy from the music of John Williams and the pop beats of Beyoncé.
  travel: Sterling Weikle, a curious junior explorer, loves weekend road trips to the Louisiana bayou, annual visits to New Orleans for Mardi Gras parades, family vacations to Washington, D.C.’s Smithsonian
    museums, and dreams of seeing Disneyland, preferring itineraries packed with photo-ops and interactive exhibits while balancing school schedules and family constraints.
  culinary: Sterling Weikle, a budding foodie, favors spicy Cajun dishes like gumbo and jambalaya, enjoys sweet beignets dusted with powdered sugar, and can whip up a simple strawberry-banana smoothie,
    helping their grandma bake cupcakes on occasion, though they tend to overindulge on candy after Mardi Gras celebrations.
  core: Sterling Weikle, a lively twelve-year-old who fuses art, performance, and tech with boundless curiosity, balances a stash of candy and occasional missed hydration on bayou adventures, while often
    staying up late sketching and delighting friends with animated stories.
background:
  cultural: Sterling is a white youth growing up in Maringouin, a small town in Iberville Parish, Louisiana. His family’s roots are tied to the deep‑South traditions of the region, blending Anglo‑American
    heritage with the broader cultural tapestry of southern Louisiana. He is raised in a close‑knit community where church gatherings, family barbecues, and local festivals such as Mardi Gras and Zydeco
    music events are central to social life. The local environment—wetlands, bayous, and riverfronts—shapes his appreciation for nature and outdoor activities. While his schooling reflects the public‑school
    system of the area, his upbringing also emphasizes hospitality, respect for elders, and a strong sense of community responsibility.
