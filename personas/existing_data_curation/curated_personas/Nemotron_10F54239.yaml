  career_goals: Sterling dreams of turning his love for art and storytelling into a career as a visual artist, animator, or children’s book illustrator. He also imagines hosting a community radio show or
    podcast to share local stories, reflecting his talkative nature. He is intrigued by technology and hopes to develop interactive games that blend education and art. Long‑term, he aspires to become a
    teacher or community program organizer, using his sociable skills to inspire other kids and preserve the cultural heritage of his hometown.
