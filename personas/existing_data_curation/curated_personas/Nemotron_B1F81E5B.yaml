    with smile'', ''following one‑step routines'']'
  hobbies: '[''sensory play with soft toys'', ''listening to nursery rhymes and lullabies'', ''exploring picture books'', ''water play during bath time'', ''brief group circle time with peers'']'
  career_goals: At one year old, Luke does not yet hold concrete career aspirations. His immediate ambitions are centered around mastering physical milestones, expanding his language repertoire, and exploring
    his environment safely within the structured daily routine his family provides. His caregivers nurture his innate kindness and cooperative disposition, gently encouraging a future desire to be helpful
    and considerate—potentially guiding him toward roles that support others, such as caregiving, teaching, or community service, as he matures.
