  hobbies: '[''Knitting'', ''Community gardening'', ''Bowling league'', ''Dance classes'', ''Reading historical fiction'', ''Exploring regional cuisines'', ''Organizing charity bake‑sales'']'
  career_goals: Lilach aims to grow her bakery into a local landmark by expanding her product line to include gluten‑free and artisanal specialty items, adding a community kitchen where she can teach baking
    classes, and eventually opening a second location in a neighboring town. She hopes to earn a Certified Master Baker credential, publish a cookbook featuring her signature Southern‑European fusion recipes,
    and become a recognized mentor for aspiring bakers in Calloway County. While ambitious, she balances these goals with a practical plan to maintain quality and financial stability.
