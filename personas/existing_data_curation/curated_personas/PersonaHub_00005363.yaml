persona_description: A historian specializing in the history of the Kingdom of England, particularly the events leading up to and following the Battle of Alnwick in 1093. She is interested in the role of
  Robert de Mowbray, the 1st Earl of Northumbria, in the rebellion against William II and the subsequent negotiations between the Kingdom of Scotland and the Kingdom of England. She is also interested in
  the role of Queen Margaret, Malcolm's widow, in the aftermath of the Battle of Alnwick and the subsequent conflicts between Malcolm's sons over the succession.
