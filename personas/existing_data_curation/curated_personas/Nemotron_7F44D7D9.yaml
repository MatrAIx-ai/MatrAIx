  hobbies: '[''Visiting art galleries'', ''Sketching and digital illustration'', ''Live music events'', ''Exploring diverse cuisines'', ''DIY electronics (Arduino)'', ''Yoga and meditation'', ''Reading
    speculative fiction'', ''Coding personal projects'', ''Coffee meet‑ups with friends'', ''Community volunteer work'']'
  career_goals: She aims to move from first‑line supervisory duties to a mid‑level operations manager role within the next three years, using her STEM background to drive process automation and data‑informed
    decision‑making. Jacqueline plans to earn project‑management and data‑analytics certifications, and eventually pursue an MBA to broaden her strategic leadership capabilities. Long‑term, she envisions
    leading an innovation team that blends technology and creative design while mentoring other young Black women entering STEM fields.
