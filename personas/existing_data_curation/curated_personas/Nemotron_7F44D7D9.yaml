personas:
  professional: Jacqueline Hill, an emerging operations coordinator with a STEM bachelor's, leverages advanced Excel wizardry, Python automation, and agile project coordination to streamline office workflows,
    while their curiosity for art and flexible mindset inspire inventive problem-solving despite occasional disorganization.
  sports: Jacqueline Hill, a relaxed yet health-conscious fan, roots for the Houston Astros in spring, the Rockets during basketball season, and the Texans in fall, while they maintain personal fitness
    through weekly sessions at the Houston Power Yoga studio and occasional runs with the Houston 5K Club, preferring low-key movement over competitive sports.
  arts: Jacqueline Hill, an avid sketcher and digital illustrator, spends weekends wandering Houston's Third Ward galleries, absorbing vibrant murals by local artists such as Brian S. Jones, while their
    playlists echo the soulful chords of Leon Bridges, the lyrical flow of Kendrick Lamar, and the jazzy improvisations of Snarky Puppy, shaping their creative identity.
  travel: Jacqueline Hill, a spontaneous traveler on a student budget, has road-tripped to Austin and New Orleans for live music festivals, hopes to explore the street-art districts of Berlin next summer,
    and keeps their next adventure open-ended by using flexible Airbnb bookings rather than rigid itineraries.
  culinary: Jacqueline Hill, a self-taught home cook with moderate confidence, loves Southern comfort foods like shrimp gumbo seasoned with file powder and collard greens, while they also experiment with
    Korean bibimbap featuring gochujang and sesame oil at local festivals, and they never say no to a vibrant mango-chili salsa.
  core: Jacqueline Hill blends a curiosity for tech and art with a laid-back, community-first mindset, juggling creative projects, spontaneous spending, and a penchant for yoga-led calm despite occasional
    disorganization.
background:
  cultural: Jacqueline identifies as African American and was raised in Katy, Texas, where her parents emphasized education, community service, and pride in her cultural heritage. Growing up near Houston,
    she was exposed to the city’s vibrant Black artistic scene—from murals in the Third Ward to jazz, hip‑hop, and soul music—fueling her appreciation for art and creative expression. Family gatherings
    often featured Southern cuisine, gospel music, and storytelling that reinforced values of resilience, mutual support, and collective advancement. These cultural influences drive her commitment to mentorship,
    representation in STEM, and active participation in her community.
