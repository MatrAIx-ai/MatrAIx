persona_description: A scientist at Cancer Research UK's Manchester Institute, part of the Manchester Cancer Research Centre, who specializes in the study of circulating tumour cells (CTCs) and their potential
  to monitor and predict lung cancer treatment response. She has published research on the relationship between CTCs and survival in small cell lung cancer patients and the use of CTC-derived explants to
  study resistance to chemotherapy and potential new targeted treatments. Her work is focused on improving understanding of lung cancer biology and translating basic and clinical research into new diagnostic
  tests and treatments for patients.
