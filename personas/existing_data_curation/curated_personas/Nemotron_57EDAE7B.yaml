  hobbies: '[''Woodworking'', ''Classic car restoration (1965 Mustang)'', ''Reading non-fiction (technology, history, science)'', ''Podcast listening (innovation, philosophy, education)'', ''Chess'', ''Barbecue
    grilling'', ''Gardening'', ''Journaling'', ''Hiking'']'
  career_goals: Marshall aims to complete a bachelor’s degree in education and pursue a master’s to deepen his scholarly foundation. He seeks promotion to a senior faculty or department‑chair position where
    he can steer the creation of interdisciplinary technology programs that bridge industry demands with academic rigor. He also plans to author at least two peer‑reviewed articles on evidence‑based curriculum
    design and earn a state‑level teaching excellence award. Recognizing his propensity for stress, he intends to adopt a more structured workflow that preserves flexibility while safeguarding his well‑being
    and financial security for retirement.
