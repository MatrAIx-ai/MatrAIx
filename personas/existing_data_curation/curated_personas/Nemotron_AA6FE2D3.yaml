  career_goals: Marina aims to advance into a supervisory role within home-health services, eventually leading a small team of personal care aides who share her commitment to consistency and practicality.
    She plans to obtain a Certified Nursing Assistant (CNA) credential and pursue a health-services administration certificate to strengthen her leadership capabilities. Long-term, she envisions starting
    her own boutique home-care agency that specializes in routine-oriented care for seniors with memory-related conditions, allowing her to apply her STEM background to evidence-based care protocols while
    maintaining a predictable schedule that supports her family life and reduces stress.
