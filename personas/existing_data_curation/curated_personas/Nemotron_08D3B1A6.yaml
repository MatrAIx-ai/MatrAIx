  career_goals: William aims to move into a senior quality‑assurance advisory role where he can mentor younger inspectors and champion the integration of new testing technologies at his plant. He plans
    to earn a Certified Quality Inspector (CQI) credential and lead a cross‑functional quality‑improvement team to cut defect rates by at least 15 % within two years. As he approaches retirement, he hopes
    to launch a part‑time consulting practice helping small manufacturers in the Marietta area implement lean inspection and sampling processes, allowing him to stay active in the field while enjoying a
    more flexible schedule.
