  career_goals: Eddy aims to expand his company's market reach while embedding arts-driven innovation into its core operations, positioning the firm as a leader in socially responsible entrepreneurship.
    He aspires to launch a regional arts incubator that supports local creators and provides employee enrichment programs. Long‑term, he envisions taking on a board‑level role in a larger, values‑focused
    corporation, where he can influence industry standards for compassionate leadership and sustainable growth. Additionally, Eddy is committed to building a mentorship pipeline for emerging leaders from
    diverse backgrounds, reflecting his dedication to community empowerment and harmony.
