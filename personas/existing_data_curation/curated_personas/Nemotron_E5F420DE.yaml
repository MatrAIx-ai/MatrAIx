    Planning'', ''Sustainable Design (LEED)'', ''Cost Estimation'', ''Risk Management'', ''Construction Inspection'', ''Professional Engineer (PE) License'', ''LEED AP Credential'', ''PMP Certification'']'
  hobbies: '[''Model Railroading'', ''Woodworking'', ''Fly Fishing'', ''Hiking'', ''Nature Photography'', ''Astrophotography'', ''Engineering History Reading'', ''Puzzle Solving'', ''Habitat for Humanity
    Volunteering'']'
  career_goals: Zachary aims to transition from senior project manager to a strategic leadership role - such as Director of Infrastructure or Chief Engineer - for the City of Columbus or a regional consulting
    firm. He wants to spearhead resilient water-resource and transportation initiatives that incorporate climate-adaptive design. Over the next five years, he plans to publish two peer-reviewed papers on
    sustainable stormwater systems, attain a senior leadership position within the Ohio Section of the ASCE, and mentor a cohort of junior engineers through a structured apprenticeship program. Ultimately,
    he envisions launching his own boutique consultancy focused on data-driven, cost-effective infrastructure solutions, allowing greater control over project selection and a healthier work-life balance
    post-divorce.
