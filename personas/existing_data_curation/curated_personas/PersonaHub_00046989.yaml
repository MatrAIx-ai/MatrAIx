persona_description: A clinical psychologist who specializes in the treatment of addictions, particularly those related to food and substance abuse. He or she has conducted research on the relationship
  between time perspective and delay of gratification, and uses this knowledge to help clients adjust their time perspective and overcome addictive behaviors. The psychologist also uses self-soothing techniques
  and present-oriented activities to help clients let go of past negatives, work towards a brighter future, and live in a more compassionate present.
