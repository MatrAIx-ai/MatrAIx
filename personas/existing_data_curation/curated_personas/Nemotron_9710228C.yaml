  career_goals: Mark aims to move into a supervisory role, such as unit coordinator or health services manager, within the next five years. He plans to earn certified nursing assistant (CNA) and medical
    assistant (MA) credentials, then pursue a bachelor's degree in health administration. His ambition includes leading quality‑improvement projects that streamline patient flow, adopting data‑driven decision‑making,
    and mentoring newer staff. By combining his natural preference for structure with a measured flexibility, Mark wants to become a reliable leader who can maintain operational efficiency while supporting
    a supportive, low‑stress work environment.
