personas:
  professional: Mark Stephens is a healthcare support worker at a busy clinic who turns meticulous EMR navigation, infection‑control expertise, and precise inventory management into daily operational smoothness,
    while channeling a competitive edge into quality‑improvement projects that become friendly contests for faster patient flow; their structured mindset fuels a habit of drafting checklists and data dashboards,
    and the ambition to earn CNA and MA credentials drives them toward a supervisory role within five years.
  sports: Mark Stephens finds balance by hiking the Sandia Mountains on a weekly schedule with the local Sandia Peaks Hiking Club, where they log elevation gains in a spreadsheet, and they follow New Mexico
    United soccer matches and the Denver Nuggets for a dose of competitive sport; occasional weekend bike rides on the Rio Grande Trail satisfy their need for structured exercise without overwhelming their
    schedule.
  arts: Mark Stephens expresses creativity through model railroads that mimic historic train routes, desert‑landscape photography inspired by Ansel Adams and Richard Avedon, and strategic chess games at
    the city library club; they also attend regional art fairs featuring pottery and textile work, and unwind listening to the band Queens of the Stone Age while editing photos on their laptop.
  travel: Mark Stephens prefers carefully planned getaways, often mapping out itineraries that combine hiking in Carlsbad Caverns, sunrise photography in Sedona, and a culinary stop for green‑chile enchiladas
    in Santa Fe; their travel journal lists a future goal of photographing sunrise over the Grand Canyon, and they budget each trip in the same spreadsheet that tracks their hobby expenses.
  culinary: Mark Stephens enjoys cooking New Mexican comfort food, especially green‑chile enchiladas, carne adovada, and homemade salsa verde made with fresh Hatch green chiles, often experimenting with
    different roasting techniques; they pride themselves on mastering corn masa dough while occasionally over‑seasoning dishes and leaving a lingering stack of dishes in the sink after late‑night cooking
    sessions.
  core: Mark Stephens, 42, channels a competitive, meticulously organized mind into healthcare efficiency, structured hobbies, and a constant quest to keep anxiety at bay while occasionally splurging on
    model‑train kits and over‑seasoning dinner.
background:
  cultural: Mark grew up in a middle‑class Anglo‑American family in the Midwest, where traditional holidays and community involvement were emphasized. After moving to Albuquerque a decade ago, he has embraced
    the Southwest’s blend of Hispanic and Native American cultures. He enjoys local traditions such as the Balloon Fiesta, sampling authentic New Mexican food, and collecting Southwestern pottery. While
    his ethnic background is white, his cultural identity reflects a mix of his Midwestern roots and the vibrant, multicultural environment of Bernalillo County.
