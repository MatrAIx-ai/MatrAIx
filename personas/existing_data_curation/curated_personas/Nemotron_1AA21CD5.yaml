  hobbies: '[''Woodworking'', ''Vintage motorcycle restoration'', ''Bass fishing'', ''Gospel choir singing'', ''Community mentorship'', ''Reading personal-development books'', ''Gardening'', ''Georgia Bulldogs
    football fandom'']'
  career_goals: Joseph aims to advance from an individual sales agent to a regional sales manager within the next five years, overseeing a team of agents across multiple counties. He plans to earn professional
    designations such as the Chartered Life Underwriter (CLU) and Certified Insurance Counselor (CIC) to deepen his expertise. Long-term, he aspires to open his own boutique insurance brokerage that offers
    personalized services to underserved communities in rural Georgia, while also mentoring new agents from similar backgrounds to foster economic empowerment.
