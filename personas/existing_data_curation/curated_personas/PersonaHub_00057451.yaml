persona_description: An electrophysiologist is a medical professional who specializes in the diagnosis and treatment of arrhythmias, irregular heartbeats. They use diagnostic tools such as electrocardiograms
  (ECGs) and other tests to identify the cause of the arrhythmia and recommend appropriate treatment options. The electrophysiologist may also perform procedures such as radiofrequency catheter ablation
  to treat arrhythmias. They have advanced degrees in medicine and have spent several years in college and medical school. They are responsible for ensuring the safety and well-being of patients during
  surgical procedures.
