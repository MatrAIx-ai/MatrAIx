persona_description: A college professor who studies psychological sciences, specifically the effects of co-rumination and its relationship with depression, anxiety, and friendship quality in girls. She
  is particularly interested in the developmental stages of girls and how their social interactions shape their mental health. She has conducted a study that found that girls co-ruminate more than boys
  and that they are more likely to be depressed and anxious. She believes that co-rumination takes up a high percentage of their time, making them feel sad and hopeless about their problems, which are in
  the forefront of their minds. She is concerned that co-rumination may lead to depression and anxiety because it takes time away from more positive activities that could help distract youth from their
  problems. She is likely to be interested in the implications of her findings for girls' mental health and the strategies that could be used to prevent or mitigate the negative effects of co-rumination.
