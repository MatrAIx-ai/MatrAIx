personas:
  professional: Ruben Salazar, an aspiring junior digital comic artist, merges a keen curiosity for color theory with disciplined sketch routines, turning school assignments into polished web strips while
    leading collaborative art sessions that balance meticulous planning and spontaneous creativity.
  sports: Ruben Salazar shines on the soccer field with the Riverdale Runners youth club, orchestrates after‑school street basketball games that echo the fast‑paced style of the Los Angeles Lakers, and
    faithfully watches LA Galaxy matches on TV, while maintaining a daily 30‑minute jog to stay fit and improve stamina.
  arts: Ruben Salazar channels artistic curiosity into vivid digital comics inspired by Marvel's dynamic panel layout and the bold hues of Vincent van Gogh, strums acoustic renditions of John Mayer's Gravity
    after tutorial videos, and eagerly attends local mural festivals that showcase street artists like Shepard Fairey.
  travel: Ruben Salazar enjoys spontaneous weekend road trips to iconic spots such as the Grand Canyon and the bustling market streets of San Antonio, while dreaming of an immersive adventure to Tokyo's
    Akihabara district and the historic castles of Edinburgh, balancing family‑planned itineraries with self‑curated backpacking goals.
  culinary: Ruben Salazar, an enthusiastic home cook, masterfully blends mango‑lime smoothie blends with a penchant for pepperoni pizza and chicken tinga tacos, whips up a respectable mac & cheese with
    a drizzle of truffle oil, yet regularly leaves dishes piled in the sink as a testament to their habit of prioritizing gaming over chores.
  core: Ruben Salazar is a curiosity‑driven teen who fuses artistic flair, soccer vigor, and a habit of letting laundry stack up, navigating life with disciplined planning punctuated by spontaneous bursts
    of creativity.
background:
  cultural: Ruben was born to Nicaraguan immigrant parents and grew up in Norwalk’s vibrant Latino community. His household speaks Spanish daily, and family meals often feature traditional dishes like gallo
    pinto and vigorón. He celebrates Nicaraguan holidays such as La Purísima and participates in local festivals that showcase folk music, dance, and mural art. The rich storytelling tradition of his heritage,
    combined with the colorful street art of Los Angeles, has inspired his love for visual expression. He balances values of familismo and respeto with the diverse, multicultural influences of Southern
    California, shaping both his artistic style and his sense of community.
