  career_goals: Ruben aspires to become a multimedia artist who blends traditional Nicaraguan motifs with modern digital design. He dreams of studying visual communication or graphic design in a specialized
    high school and later at a university with a strong arts program. He hopes to create murals and interactive media projects that celebrate his cultural heritage while inspiring other young people in
    his community. Over the long term, Ruben envisions working as a creative director for socially‑focused campaigns or running an art‑education nonprofit that offers workshops for kids from immigrant families.
