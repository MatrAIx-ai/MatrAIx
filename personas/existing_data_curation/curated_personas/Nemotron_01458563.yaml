  hobbies: '[''Soccer (team sports)'', ''Acoustic guitar and traditional Mexican music'', ''Cooking Mexican dishes'', ''Creating TikTok videos'', ''Volunteering at community centers'', ''Organizing language‑exchange
    meet‑ups'', ''Mindfulness and stress‑relief workshops'', ''Hiking local trails'', ''Astronomy hobby (telescope)'', ''Reading fiction and psychology'']'
  career_goals: Driven by his personal experience with anxiety, Raul aims to transform his empathy into a professional mission. In the short term he plans to complete an associate degree in Social Work
    or Community Health at a local community college and pursue a bachelor's in Social Work, securing internships with nonprofits that provide culturally sensitive mental‑health services to agricultural
    families in the Central Valley. Long‑term, he envisions becoming a certified mental‑health peer counselor and eventually a licensed clinical social worker who designs bilingual outreach programs that
    blend Mexican cultural traditions with modern wellness practices. He also hopes to lead youth‑focused events that promote resilience, community cohesion, and mental‑health education for Latinx youth.
