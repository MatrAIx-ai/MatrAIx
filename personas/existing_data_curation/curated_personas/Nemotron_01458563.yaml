personas:
  professional: Raul Delgado, an emerging community health coordinator, blends their strong interpersonal finesse, bilingual communication, and self‑taught digital storytelling to design and run culturally
    responsive mental‑health workshops for local youth, balancing meticulous planning with the flexibility to improvise when participants need emotional support.
  sports: Raul Delgado, a midfielder for Riverside Youth Soccer Club, charges up the field in Saturday league matches, follows the Los Angeles Galaxy and the Sacramento Kings loyally, and spends weekend
    afternoons hiking the nearby riparian trail to boost stamina and clear their mind.
  arts: Raul Delgado, a budding acoustic guitarist, shares upbeat covers of Los Lobos, Juanes, and folk classics on TikTok, and they craft catchy 15‑second video edits using Adobe Premiere Rush, drawing
    creative inspiration from indie film director Greta Gerwig’s storytelling.
  travel: Raul Delgado, an adventure‑curious teen, plans low‑budget trips with friends to nearby Yosemite National Park and a weekend getaway to San Diego’s beach boardwalk, and they dream of an immersive
    cultural tour of Oaxaca’s markets once they have saved enough for an international flight.
  culinary: Raul Delgado, a home‑cooking enthusiast, masters mole, tamales, and fresh salsa using roasted chilies, toasted pepitas, and masa harina, experiments with adding avocado‑lime crema to tacos,
    yet they often forget to clean the kitchen promptly after a cooking burst.
  core: Raul Delgado blends a restless curiosity, community‑focused empathy, and a flair for music and cooking into a vibrant, anxiety‑driven quest to help peers while chasing creative outlets.
background:
  cultural: Raul was raised in Atwater, CA, by Mexican immigrant parents who work in the surrounding agricultural sector. Growing up in a bilingual household, he speaks Spanish at home and English at school,
    allowing him to navigate both cultures fluently. Family gatherings feature Mexican culinary traditions, Catholic celebrations, and observances such as Día de los Muertos and Cinco de Mayo, which foster
    a strong sense of heritage. The close-knit Mexican–American community in Merced County emphasizes collective responsibility, respect for elders, and mutual support, values that shape Raul's cooperative
    and considerate nature. At the same time, his Californian upbringing exposes him to diverse perspectives and a forward‑looking outlook, encouraging him to blend tradition with modern ideas—especially
    in his interest in mental‑health advocacy for Latinx youth.
attributes:
  skills: '[''Bilingual English‑Spanish communication'', ''Community event planning and coordination'', ''Social media content creation'', ''Video editing (Adobe Premiere Rush)'', ''Basic graphic design
