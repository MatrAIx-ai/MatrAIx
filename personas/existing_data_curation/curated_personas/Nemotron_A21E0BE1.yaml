  hobbies: '["Painting","Visiting art museums/galleries","Salsa dancing","Photography","Reading contemporary fiction","Attending community theater","Hiking in Hill Country","Cooking Mexican cuisine","Volunteering
    at after-school programs","Practicing yoga and meditation"]'
  career_goals: She aims to become a lead teacher and curriculum specialist who champions arts-infused and culturally responsive education in bilingual classrooms. Angel plans to pursue a master's in educational
    leadership within the next three years, with the long‑term goal of becoming a school administrator who implements mental‑health supportive practices and creates after‑school programs that celebrate
    Mexican heritage and foster student well‑being.
