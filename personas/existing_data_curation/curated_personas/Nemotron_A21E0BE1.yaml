personas:
  professional: Angel Ochoa blends expertise in bilingual classroom management with a passion for integrating visual arts and culturally resonant curricula, and they leverage educational technology and
    collaborative community outreach to craft engaging lessons while channeling intense emotional reactivity into empathetic teaching.
  sports: Angel Ochoa hikes the Texas Hill Country with the Austin Trail Runners Club in summer, practices weekly yoga at a local studio, and cheers on the Dallas Cowboys and Houston Astros, while they
    also join a co‑ed recreational soccer league for a dose of friendly competition.
  arts: Angel Ochoa spends weekends painting vivid cityscapes inspired by the works of Keith Haring and Yayoi Kusama, curates photo series of downtown life, frequents the Contemporary Art Museum to see
    exhibitions by Banksy and Jean‑Michel Basquiat, and they read contemporary fiction by Sally Rooney to fuel their creative narratives.
  travel: Angel Ochoa prefers carefully planned road trips that blend outdoor adventure and cultural immersion, having explored the Hill Country vineyards, wandered the mural‑rich streets of Santa Fe, and
    dreaming of hiking the Andes in Peru to photograph high‑altitude villages, while they balance a modest travel budget.
  culinary: Angel Ochoa enjoys cooking heritage dishes such as mole, chilaquiles, and pozole, mastering the use of dried chilies, corn masa, and epazote, and they balance a moderate skill level in the kitchen
    with a penchant for experimenting with fusion flavors like quinoa‑based tacos.
  core: Angel Ochoa is a vibrant, art‑driven educator whose relentless curiosity, fierce community spirit, and occasional anxiety shape a life filled with colorful lessons, spontaneous salsa dancing, and
    late‑night sketching sessions, and they constantly seek new ways to fuse creativity with teaching.
background:
  cultural: Angel grew up in a Mexican‑American household in San Antonio, speaking both Spanish and English at home. Her family maintains Mexican traditions such as Día de los Muertos celebrations, mariachi
    music, and weekend cooking of regional dishes. The vibrant bicultural environment of Bexar County instilled in her a deep respect for community, family, and the importance of education as a pathway
    to upward mobility. This heritage informs her teaching style, emphasizing bilingual support, cultural pride, and inclusive practices that honor the diverse backgrounds of her students.
attributes:
  skills: '["Classroom management","Curriculum development","Bilingual instruction (English/Spanish)","Arts integration","Educational technology","Student assessment","Collaborative learning facilitation","Cultural
