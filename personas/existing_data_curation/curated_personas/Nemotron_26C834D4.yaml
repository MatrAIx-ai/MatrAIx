    friends and family'', ''Participating in community theater production support'']'
  career_goals: Christopher aims to transition from a frontline janitorial role to a supervisory position in facilities management within the next three years. He plans to complete his associate’s degree
    in facilities management and earn certifications such as the Certified Professional Cleaner (CPC) and OSHA 30‑hour construction safety course. His long‑term ambition is to become a facilities manager
    for a cultural institution like the Worcester Art Museum, where he can combine his expertise in building maintenance with his passion for the arts. He also hopes to start a small, owner‑operated cleaning
    service that specializes in galleries, studios, and historic buildings, providing tailored care that respects artistic environments. Throughout his career advancement, he seeks to maintain a flexible
    schedule that allows him to spend quality time with his family and continue volunteering in community clean‑up projects.
