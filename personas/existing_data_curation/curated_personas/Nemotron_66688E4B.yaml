personas:
  professional: Allison Mubarak, a 32-year-old retail professional, leverages eight years of front-line experience, strong customer-service instincts, and a STEM-inspired analytical skill set to optimize
    store layouts and sales reporting, while using Python scripts to forecast trends and positioning themselves for a store-manager role within three years.
  sports: Allison Mubarak enjoys low-impact fitness, attending weekly yoga sessions at a boutique studio, hiking the Watchung Mountains each spring, and cheering on the New Jersey Devils and New York Knicks,
    while they occasionally join a local adult recreational volleyball league at a community center.
  arts: Allison Mubarak immerses themselves in contemporary art, regularly visiting the Newark Museum and galleries showcasing works by Olaf Eliasson, Marina Abramovic, and emerging local creators, while
    also curating personal photography series of New Jersey's rural textures and experimenting with pottery inspired by the tactile aesthetics of Agnes Martin.
  travel: Allison Mubarak prefers thoughtfully planned solo escapes, such as a weekend photography trek in the Catskills, a cultural immersion trip to Marrakech to explore spice markets, and a short city
    break in Washington, D.C., balancing a modest travel budget with a desire for authentic artistic experiences, and they often sketch travel notes in a battered journal.
  culinary: Allison Mubarak is an experimental home cook who blends family-inspired flavors—like zaatar-spiced lamb kebabs and pistachio baklava—with contemporary techniques, frequently whipping up dishes
    such as roasted cauliflower with sumac and honey glaze, and they enjoy sourcing fresh herbs at the local farmers' market while occasionally over-indulging in elaborate plating for Instagram.
  core: Allison Mubarak is a curiosity-driven, art-obsessed retail analyst who balances meticulous organization with spontaneous creativity, and they channel that blend into a disciplined yet adventurous
    lifestyle.
background:
  cultural: Allison identifies as White American, raised in a suburban community near Newton, NJ. Her surname reflects a family lineage with Middle Eastern roots, and family gatherings often feature traditional
    dishes like kibbeh and lentil soup, enriching her cultural palate. Growing up in a predominantly White neighborhood, she was exposed to mainstream American customs, while her family's occasional cultural
    celebrations introduced her to a broader worldview. This blended heritage informs her open‑mindedness toward unconventional ideas and fuels her appreciation for diverse artistic expressions.
attributes:
