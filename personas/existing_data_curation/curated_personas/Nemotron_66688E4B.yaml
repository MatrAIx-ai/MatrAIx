  hobbies: '[''Visiting art galleries and museums'', ''Photography'', ''Hiking in New Jersey nature trails'', ''Reading science and technology articles'', ''DIY crafting and pottery'', ''Cooking experimental
    dishes'', ''Small‑group yoga sessions'', ''Board‑game nights with close friends'', ''Learning Spanish'']'
  career_goals: Allison aims to transition from front‑line retail to a managerial role within the next three years, pursuing a store manager position that will allow her to lead a small, cohesive team.
    She plans to earn a retail management certification and eventually explore district‑level oversight, leveraging her analytical skills to improve regional performance metrics. Long‑term, she dreams of
    launching an online boutique that curates art‑inspired home goods, merging her love of visual art with her business acumen, and possibly pursuing an MBA to solidify her strategic leadership capabilities.
