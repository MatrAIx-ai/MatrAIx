    asset valuation'']'
  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Reading speculative fiction and design-thinking books'', ''Hiking the Kankakee River Trail'', ''Yoga and mindfulness practice'',
    ''Volunteer work at a community food pantry'', ''Mentoring high-school students in personal finance'']'
  career_goals: Emelia aims to earn her Certified Public Accountant (CPA) designation within the next two years and transition into a senior auditor role at a mid‑size public accounting firm. She aspires
    to lead audit engagements that incorporate data‑analytics and emerging technologies, positioning herself as a subject‑matter expert in sustainable finance. Over the longer term, she envisions managing
    a small, collaborative audit team where she can mentor junior colleagues and champion process innovations that improve efficiency and client value. Parallel to her professional trajectory, Emelia hopes
    to leverage her financial expertise to support nonprofit arts organizations in Danville, helping them achieve fiscal sustainability.
