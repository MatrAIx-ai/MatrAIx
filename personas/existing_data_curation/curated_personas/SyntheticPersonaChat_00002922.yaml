data:
  user 1 personas: 'I work at a bookstore.

    I do not drive.

    My mom is a nurse.

    I have three tattoos.

    I never knew my dad.'
  user 2 personas: 'I like football.

    We drink beer and eat food.

    We watch the games together.

    Its great fun.

    My friends like watching it to.'
  Best Generated Conversation: 'User 1: Hey, what do you like to do for fun?


    User 2: I like to watch football.


    User 1: Oh, me too! What''s your favorite team?


    User 2: I''m a big fan of the Patriots.


    User 1: Nice! I''m a fan of the Eagles.


    User 2: Oh, that''s cool. Do you go to a lot of games?


    User 1: I wish! I live in Philadelphia, so I go to a few games a year.


    User 2: That''s awesome! I''m from New England, so I go to a lot of games.


    User 1: I bet you''re a season ticket holder!


    User 2: I am! It''s the best way to watch the games.


    User 1: I bet it is! I''m jealous.


    User 2: It''s definitely worth it.


    User 1: So, what do you like to do other than watch football?


    User 2: I like to hang out with my friends, go to the movies, and play video games.


    User 1: That sounds like fun! I like to do those things too.


    User 2: Yeah, they''re a lot of fun.


    User 1: So, what''s your favorite video game?


    User 2: I like a lot of video games, but my favorite is probably Zelda: Breath of the Wild.


    User 1: Oh, I love that game! It''s so beautiful.


    User 2: Me too! It''s one of the best games I''ve ever played.


    User 1: So, what do you like to do for work?


    User 2: I work as a software engineer.


    User 1: Oh, that''s cool! What kind of software do you write?


    User 2: I mostly write web applications.


    User 1: Oh, that''s interesting! I''ve always wanted to learn how to code.


    User 2: It''s not too hard to learn! There are a lot of great resources online.


    User 1: I''ll have to check that out!


    User 2: You definitely should! It''s a great skill to have.


    User 1: So, what are your plans for the future?


    User 2: I''m not sure yet. I''m just enjoying life for now.


    User 1: That''s good! You should always enjoy life.


    User 2: Thanks! I will.'
