personas:
  professional: Domingo Lopez, a 31‑year‑old aspiring handyman‑maintenance specialist, merges their business administration foundation, hands‑on carpentry and electrical troubleshooting skills, and a love
    for solitary, predictable work schedules to deliver independent repair services for vacation‑rental owners in the Great Smoky Mountains, while balancing a modest home‑based catering side‑venture that
    showcases island‑inspired cuisine.
  sports: Domingo Lopez, a 31‑year‑old hiking enthusiast, spends weekends traversing the Great Smoky Mountains’ trails, birdwatching and capturing scenery with a DSLR, keeps fit through solitary trail runs
    and occasional yoga sessions, follows the Tennessee Titans and Nashville Predators on game nights, and is a member of the local Sevierville Cycling Club’s weekend rides.
  arts: Domingo Lopez finds cultural resonance in the rhythms of salsa and reggaetón, dancing to live bands like Son del Caribe at local Latin nights, listening to legends such as Marc Antonio and contemporary
    stars like Bad Bunny while cooking, and losing themselves in historical fiction by Mary Patricia Schwartz and Caribbean‑themed novels that deepen their appreciation for island heritage.
  travel: Domingo Lopez prefers low‑key, self‑planned excursions that blend nature and cultural immersion, having hiked the Great Smoky Mountains, explored the historic streets of Old San Juan during a
    family holiday, and dreaming of trekking coffee farms in Costa Rica and wandering the volcanic landscapes of Iceland while balancing a modest travel budget.
  culinary: Domingo Lopez is a confident home cook who fuses island staples such as mofongo, arroz con gandules, and pernil with locally sourced mountain herbs, smoked trout, and fresh produce, often experimenting
    with adobo‑marinated pork alongside sweet plantains, and savors guava paste with queso fresco as a nostalgic dessert.
  core: Domingo Lopez, a practical yet slightly disorganized 31‑year‑old, balances solitary handyman work with late‑night kitchen experiments, habitually leaves tools scattered in the garage, and finds
    comfort in structured budgets and family‑centered holiday feasts.
background:
  cultural: Domingo was born to Puerto Rican parents and raised in a bilingual household where Spanish was spoken daily and family gatherings revolved around food, music, and shared stories. He carries
    forward the island’s traditions through his cooking, celebrating holidays like Nochebuena and the Festival de San Juan with his spouse. While living in Sevierville, he remains connected to his heritage
    by attending local Latin dance nights, listening to salsa and reggaetón, and mentoring younger Puerto Rican community members in language skills. His cultural identity informs his values of kindness,
    cooperation, and the importance of family cohesion.
attributes:
  skills: '[''Bilingual Spanish‑English communication'', ''Basic carpentry and home repairs'', ''Electrical troubleshooting'', ''Gardening and landscape care'', ''Budgeting and personal finance'', ''Traditional
