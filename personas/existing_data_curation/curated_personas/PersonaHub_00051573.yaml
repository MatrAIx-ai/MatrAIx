persona_description: A researcher or scientist who specializes in the field of membrane potential measurements, particularly in the use of potentiometric probes for studying physiological processes such
  as nerve impulse propagation, muscle contraction, cell signaling, ion-channel gating, cell viability assessment, and drug screening. They are interested in the optical responses, phototoxicity, and interactions
  of different potentiometric probes with different molecules, and are familiar with the techniques and applications of membrane potential probes. They are also interested in the development of new potentiometric
  probes and their applications in various fields such as neuroscience, pharmacology, and biotechnology.
