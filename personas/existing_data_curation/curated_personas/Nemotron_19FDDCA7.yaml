personas:
  professional: Justine Wilson is a seasoned electrical and electronics engineer who leverages meticulous analog and digital circuit design, PLC programming, and strict NEC compliance to lead complex power‑grid
    upgrades, while channeling their competitive drive into establishing a mentorship program that pushes junior colleagues to match their high standards.
  sports: Justine Wilson enjoys solo hikes on Wasatch‑range trails and loyal viewership of the Utah Jazz during the NBA season, balancing a low‑impact fitness routine centered on steady walks with a modest
    weekly membership in the Utah Outdoor Fitness Club, and they prefer routine over high‑intensity competition.
  arts: Justine Wilson expresses creativity through meticulous quilting—often inspired by the patterns of Ansel Adams' black‑and‑white photographs—and by photographing Utah's sunrise vistas with a vintage
    Canon, while they occasionally slip into the literary worlds of Jane Austen and Ralph Waldo Emerson during quiet evenings.
  travel: Justine Wilson plans low‑key road trips that blend scenic drives through Yellowstone, a spring visit to the historic Mesa Verde, and a weekend stay at a family cabin near Bear Lake, and they favor
    modest accommodations and meticulously scheduled itineraries over spontaneous wanderings.
  culinary: Justine Wilson delights in preparing hearty family‑style meals such as sage‑infused turkey pot roast, fresh garden‑grown tomato salad with basil, and classic apple crumble, showcasing a competent
    but practical cooking skill set that they favor reliable recipes over experimental gastronomy.
  core: Justine Wilson navigates life with a blend of circuit precision, quilt patience, and early‑morning birdwatching, and they are guided by a meticulous calendar, a skeptical eye, and a penchant for
    solitary routines.
background:
  cultural: Justine comes from a white, predominantly Latter-day Saint community in Smithfield, Utah. Her upbringing emphasized self‑reliance, practicality, and strong family and community ties. While she
    respects the modest, service‑oriented values of her local culture, she also embraces a pragmatic, conservative outlook shaped by the rural Western American setting. This background influences her preference
    for routine, her dedication to reliable engineering practices, and her commitment to volunteerism within her close‑knit community.
attributes:
  skills: '[''Analog circuit design'', ''Digital signal processing'', ''Power systems analysis'', ''Programmable logic controller (PLC) programming'', ''Electrical safety compliance (NEC)'', ''Project management'',
    ''Technical documentation'', ''MATLAB'', ''LabVIEW'', ''AutoCAD Electrical'', ''Reliability testing'', ''Mentoring junior engineers'']'
  hobbies: '[''Knitting'', ''Quilt making'', ''Vegetable gardening'', ''Birdwatching'', ''Solo hiking'', ''DIY home electronics'', ''Reading classic literature'', ''Cooking traditional dishes'', ''Volunteer
    work at local church'', ''Photography of Utah landscapes'']'
  career_goals: Approaching the latter stage of her career, Justine aims to obtain her Professional Engineer (PE) license and lead a major infrastructure upgrade project for the regional power grid. She
    is keen on establishing a mentorship program within her organization to guide younger engineers, and she envisions transitioning to a consulting role focused on reliability engineering and compliance
    after retirement. Additionally, she hopes to present her work at industry conferences and contribute to technical standards committees.
