personas:
  professional: Charles Fuller, a two‑year‑old budding problem‑solver who spends hours arranging his shape‑sorting toys in perfect order, already demonstrating an early knack for systematic thinking and
    a drive to master every new challenge.
  sports: Charles Fuller, a two‑year‑old with a budding love for running in the park, eagerly participates in his community’s toddler gymnastics class at the YMCA, chants along to the New York Yankees'
    games on TV, and proudly displays a little New York Knicks cap, reflecting an early enthusiasm for team sports and physical activity.
  arts: Charles Fuller, a two‑year‑old who delights in the bright colors of Pixar’s "Toy Story", sings along to the child‑friendly version of The Beatles' "Yellow Submarine", and imitates the dance moves
    of dancer Misty Copeland from his favorite nursery‑rhythm DVD, showing how early exposure to visual and musical arts shapes his play.
  travel: Charles Fuller, a two‑year‑old who treasures family road trips to San Diego's Zoo and weekend getaways to the beach at Myrtle Beach, prefers the predictable routine of staying in a familiar hotel
    room with his beloved night‑light, but also shows excitement when the car takes him to the whimsical world of Disneyland, illustrating a mix of adventure and comfort.
  culinary: Charles Fuller, a two‑year‑old who adores cheesy macaroni, crispy chicken nuggets, and banana slices dipped in peanut butter, often insists on helping stir the pot with his tiny wooden spoon
    and proudly declares "more cheese!" while tolerating only mild spices such as a pinch of cinnamon in his oatmeal.
  core: Charles Fuller, a two‑year‑old perfectionist who lines up his toy cars in flawless rows, frets over any misplaced block, and sneaks extra bedtime stories when the lights are dim, perfectly blends
    meticulous discipline with a sprinkle of toddler‑level anxiety.
background:
  cultural: Charles is raised in a small‑town Southern setting in Angier, North Carolina. His family participates in the local Methodist church, attends community events like the Johnston County fair, and
    observes Southern traditions such as Sunday family meals and early‑November Thanksgiving dinners featuring ham and sweet potatoes. He grows up hearing polite, courteous conversation, values hospitality
    and respect for elders, and is surrounded by a close‑knit extended family that emphasizes stability and routine.
attributes:
