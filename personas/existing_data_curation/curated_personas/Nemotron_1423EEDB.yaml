  career_goals: Even at his young age, Charles often talks about becoming a firefighter or police officer, drawn to roles that embody safety, order, and clear rules. He imagines wearing a uniform that signals
    responsibility and enjoys the idea of being a "big helper" who protects his family and community. He also expresses a desire to be a "teacher" for his stuffed animals, always ensuring everything is
    neat and in its proper place.
