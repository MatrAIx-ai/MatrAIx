personas:
  professional: Tanya Snyder, a licensed architect renowned for weaving sustainable, technology‑driven design with contemporary artistic flair, leverages advanced BIM tools like Revit and Grasshopper while
    channeling her curiosity and competitive edge into meticulous project management, client negotiations, and a clear trajectory toward senior partnership and award‑winning public projects.
  sports: Tanya Snyder pursues trail hiking and summer trail‑running with the San Francisco Trail Runners club while maintaining a steady yoga practice, roots for the Golden State Warriors and San Francisco
    Giants, and treats fitness as a balance of disciplined training and spontaneous outdoor exploration.
  arts: Tanya Snyder fuels her design sensibility by frequenting SFMOMA to study works by Anish Kapoor, Yayoi Kusama, and fellow Bay Area artist Mark Bradford, while sketching en plein air to Philip Glass
    soundtracks and curating a modest vinyl collection ranging from The War on Drugs to contemporary jazz pianist Kamasi Washington.
  travel: Tanya Snyder meticulously plans weekend escapes to Big Sur and the Santa Cruz Mountains and, after a recent sustainable‑design study tour of Copenhagen, now dreams of a geothermal‑focused trip
    to Reykjavik, balancing her limited vacation days with a preference for low‑carbon train and flight options.
  culinary: Tanya Snyder, a competent home cook with a penchant for Mediterranean flavors, often prepares grilled sea bass with olives, capers, and rosemary alongside saffron‑infused risotto, while she
    occasionally indulges in a spicy chorizo ramen bowl at pop‑up eateries, always seeking fresh, high‑quality ingredients.
  core: Tanya Snyder blends relentless curiosity with a competitive edge, obsessively sketching urban vistas until dusk, channeling that drive into sustainable design, yet often postpones dentist visits
    in favor of late‑night 3D‑printing experiments.
background:
  cultural: Tanya grew up in a suburban middle‑class family in the Midwest before moving to the Bay Area for her engineering degree. Her white American upbringing emphasized self‑reliance, a pragmatic work
    ethic, and a respect for individuality, all of which align with her critical and competitive disposition. Living in Sunnyvale, she is immersed in a culturally diverse, tech‑forward environment that
    values innovation and interdisciplinary collaboration. Her married life and long‑term partnership reinforce a balance between professional ambition and personal stability, while her education in a STEM
    field and exposure to both classical architecture and contemporary art shape a hybrid cultural outlook that blends traditional American values with forward‑thinking Silicon Valley sensibilities.
