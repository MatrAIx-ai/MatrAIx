    fiction)'', ''Yoga'', ''Journaling'']'
  career_goals: Tanya aims to advance to senior partner at her firm, leading a multidisciplinary studio that integrates sustainable architecture with cutting‑edge technology. She aspires to win national
    design awards for innovative public projects that fuse art and environmental performance, and to publish thought‑leadership pieces on generative design in industry journals. Over the next five years
    she plans to earn her LEED AP credential, mentor emerging women architects, and spearhead a regional initiative to retrofit existing commercial buildings with net‑zero energy strategies.
