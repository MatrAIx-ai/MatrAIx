  hobbies: '[''Watercolor painting'', ''Reading historical novels'', ''Gardening'', ''Listening to classical Indian music'', ''Volunteering at senior center'', ''Attending local art exhibitions'', ''Walking
    in city parks'', ''Cooking traditional South Asian dishes'', ''Knitting'', ''Writing memoirs'']'
  career_goals: Although retired from formal employment, Madhuri aims to leave a lasting legacy by documenting her life story and the cultural history of her community for future generations. She aspires
    to establish a modest scholarship fund for South Asian women pursuing STEM degrees, serve as an honorary board member of the local arts council, and continue mentoring volunteers at the senior center.
    Her long‑term ambition is to act as a cultural bridge, fostering mutual understanding between older immigrants and younger, more diverse residents of Richmond Hill.
