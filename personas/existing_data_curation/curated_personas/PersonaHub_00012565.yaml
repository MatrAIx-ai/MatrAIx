persona_description: A fisheries biologist with expertise in reservoir management, specifically in the survey and monitoring of fish populations in Coleto Creek Reservoir. They have conducted surveys using
  trap nets and electrofishing and have experience with creel surveys. They have a management plan based on the findings of the surveys and have a keen interest in conducting creel surveys to collect quantitative
  data on angler use. They are also knowledgeable about the management of sport fish populations under existing harvest regulations and have a goal of determining if poor catches and low relative abundance
  of catfishes and crappies are accurate. They have experience with monitoring and controlling non-native vegetation and are working with the Guadalupe-Blanco River Authority on all vegetation control activities.
