persona_description: A former associate deputy administrator of the Environmental Protection Agency (EPA) who resigned in June 2008 due to frustration over the Bush administration's inaction on climate
  change. This person has unique knowledge and expertise in the field of environmental regulation, particularly in the context of greenhouse gas emissions and global warming. They were involved in the development
  of the 2007 EPA draft report on the endangerment finding, which was suppressed by the Bush administration due to opposition from the White House. This person is knowledgeable about the science behind
  climate change and the potential risks it poses to the country. They have experience in public policy and are aware of the current political climate regarding climate change legislation.
