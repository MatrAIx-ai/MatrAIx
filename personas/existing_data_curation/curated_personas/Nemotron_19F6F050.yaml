personas:
  professional: Corey Jamison, a veteran custodial specialist with 15 years of experience in floor care, chemical safety, and inventory management, translates their methodical, low‑key work style into meticulous
    cleaning schedules, precise equipment logs, and consistent mentorship of new staff, positioning them for a supervisory leap.
  sports: Corey Jamison, an avid angler who spends early mornings casting on the Scioto River, also follows the Cleveland Browns in the fall, the Cincinnati Reds during baseball season, and the Columbus
    Blue Jackets in winter, is a member of the Chillicothe Bass Club, and they keep fit through weekend runs and occasional gym sessions at the local community center.
  arts: Corey Jamison unwinds after a long shift by watching classic film noir masterpieces such as Billy Wilder’s Double Indemnity, listening to the storytelling folk tunes of John Prine and the smooth
    sax tones of Stan Getz, and admiring the handcrafted furniture designs of Sam Maloof, which they incorporate into their own woodworking projects.
  travel: Corey Jamison plans trips with the same meticulous checklists used at work, favoring low‑key nature getaways such as Hocking Hills State Park and Shenandoah National Park, while dreaming of a
    quiet weekend in Cape Cod’s coastal towns and a cultural tour of Bavarian villages to explore traditional woodworking fairs, and they usually travel solo or with one close friend to avoid crowded itineraries.
  culinary: Corey Jamison prefers wholesome, home‑cooked meals such as pan‑seared trout with lemon‑butter sauce, hearty chicken pot pie packed with garden carrots and potatoes, and a tangy German‑style
    potato salad made with fresh dill and vinegar, and they enjoy experimenting with seasonal herbs like rosemary and thyme while keeping the kitchen tidy and organized.
  core: Corey Jamison is a methodical, solitary custodian who turns routine cleaning into an art, balances a strict budget with occasional splurges on model trains, quietly stalks the Scioto River for trout,
    and habitually forgets to floss while always keeping a spare set of keys on a nail in the garage.
background:
  cultural: Corey grew up in the small, predominantly white, working‑class town of Chillicothe in Ross County, Ohio. His family roots trace back to German and Irish immigrants who settled in the region
    in the late 19th century. The community’s Midwestern values—self‑reliance, modesty, and a strong work ethic—shaped his outlook. He was raised in a Protestant (Methodist) household that emphasized responsibility,
    honesty, and service to the community. The local culture places high regard on steady, honest jobs and practical skills, which reinforced Corey’s preference for routine, practicality, and quiet diligence.
    While he does not regularly attend religious services, the cultural emphasis on modest living, respect for tradition, and close‑knit neighborhood ties remain a backdrop to his everyday life.
attributes:
  skills: '[''commercial floor care (stripping, waxing, polishing)'', ''carpet cleaning (hot water extraction)'', ''restroom sanitation and fixture upkeep'', ''chemical safety and proper dilution'', ''inventory
    management of cleaning supplies'', ''minor plumbing and electrical repairs'', ''equipment maintenance and troubleshooting'', ''development and adherence to cleaning schedules'', ''training and mentorship
    of new custodial staff'', ''compliance with OSHA and EPA regulations'']'
  hobbies: '[''reading practical handbooks (home repair, woodworking, history)'', ''woodworking (birdhouses, small furniture)'', ''fishing'', ''vegetable gardening'', ''model train building and layout maintenance'',
    ''watching classic film noir'', ''listening to podcasts on cleaning technology and sustainable living'']'
  career_goals: Corey aims to advance from a frontline custodial role to a supervisory position within the next three years. He plans to obtain a Certified Professional Cleaner (CPC) credential and complete
    a GED program to broaden his employment options. His long‑term ambition is to become a facilities manager for a municipal building or a regional school district, overseeing a team of custodians, scheduling
    large‑scale maintenance projects, and implementing sustainable cleaning practices. If he achieves financial stability, he also envisions launching his own small residential cleaning service, leveraging
    his reputation for reliability and meticulous work. Throughout, he values a predictable routine, steady income, and the ability to work in environments where he can maintain focus without excessive
    social demands.
