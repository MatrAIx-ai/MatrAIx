personas:
  professional: Kianna Jones is an aspiring multidisciplinary illustrator who blends hand‑drawn sketches, mixed‑media collages, and digital painting to craft socially‑conscious narratives, and they let
    their compassionate streak and penchant for flexibility guide collaborative projects at the community youth center despite occasional disorganization.
  sports: Kianna Jones enjoys casual skateboarding in summer, plays point guard for the Eastside Youth Basketball Club during winter, and they follow the Los Angeles Lakers, Seattle Sounders FC, and New
    York Yankees with enthusiastic weekend viewing parties.
  arts: Kianna Jones immerses herself in sketching characters inspired by the narrative depth of Alison Bechdel, the visual provocations of Banksy, and the rhythmic storytelling of Kendrick Lamar, while
    attending local museum exhibits featuring Jean‑Michel Basquiat and curating playlists that blend Erykah Badu’s neo‑soul with Miles Davis’s cool jazz, and they find that these influences shape their
    artistic voice.
  travel: Kianna Jones prefers spur‑of‑the‑moment weekend road trips with friends to nearby state parks and has already visited New York City’s Museum of Modern Art, but they dream of exploring Tokyo’s
    anime districts and Barcelona’s street‑art alleys on a future family vacation, balancing a limited teen budget with a love for cultural immersion.
  culinary: Kianna Jones savors an eclectic palate that delights in slurping miso‑rich ramen, biting into tacos al pastor topped with fresh cilantro, and whipping up avocado toast sprinkled with feta and
    chili flakes, while their modest kitchen skills shine in crafting brownies studded with hazelnuts and dark chocolate for after‑school study sessions, and they often pair these meals with a curated playlist
    of lo‑fi beats.
  core: Kianna Jones is a fiercely imaginative teen who channels their intense emotional tides into kaleidoscopic art, thrives on spontaneous creative bursts, yet often forgets homework and over‑indulges
    in late‑night gaming to calm their anxiety, and they constantly seek new outlets for self‑expression.
background:
  cultural: Kianna is a Black teenager raised in St. Louis County, a city with a rich African‑American heritage and a strong tradition of jazz, blues, and community activism. Her family celebrates cultural
    milestones such as Juneteenth and honors the legacy of local civil‑rights leaders. She attends a church that emphasizes service, which reinforces her cooperative and compassionate nature. The neighborhood's
    murals, local festivals, and stories of resilience shape her artistic sensibility, while conversations about social equity at home and school inspire her to use creativity as a tool for community empowerment.
