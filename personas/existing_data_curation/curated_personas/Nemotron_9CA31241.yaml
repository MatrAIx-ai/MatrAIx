  hobbies: '[''Sketching'', ''Mixed media art'', ''Listening to music (hip hop, jazz, neo‑soul)'', ''Reading graphic novels'', ''Journaling'', ''Attending community art workshops'', ''Nature walks'', ''Volunteer
    work at local youth center'', ''Playing narrative-driven video games'', ''Watching documentaries'']'
  career_goals: Kianna envisions a future where her love for art merges with her desire to help others. She aims to study visual arts and graphic design, hoping to become a muralist or illustrator who creates
    community‑focused artwork. Simultaneously, she is interested in psychology or counseling to support teenagers dealing with anxiety and emotional distress. Her long‑term ambition is to establish a local
    youth hub in St. Louis that offers creative workshops, safe spaces for self‑expression, and peer‑led mental‑health resources.
