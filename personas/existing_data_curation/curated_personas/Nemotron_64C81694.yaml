  career_goals: Elisabeth aims to progress from her current waiting position to a supervisory role and eventually become a restaurant manager. She plans to obtain her GED and pursue a culinary or hospitality
    management certificate offered at a community college nearby. Long‑term, she dreams of opening a modest café in Rockingham that highlights both classic Southern fare and dishes inspired by her American
    Indian heritage, providing a gathering space for her community while preserving cultural recipes. She also hopes to mentor other young people in the area, especially those from tribal backgrounds, to
    help them navigate stable career paths in the service industry.
