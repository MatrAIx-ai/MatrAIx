personas:
  professional: Elisabeth Ballay, a 33‑year‑old front‑of‑house specialist, excels at precise order taking, memory of regulars’ preferences, and streamlining dining floor operations, using their methodical,
    routine‑driven mindset to train teammates and maintain food safety while quietly eyeing a future supervisory role.
  sports: Elisabeth Ballay enjoys hiking the Blue Ridge Trail on weekends, participates in a local running club that meets for 5‑k runs, and they avidly follow the Carolina Hurricanes and the Rockingham
    High School football team, cheering at games whenever possible.
  arts: Elisabeth Ballay weaves baskets and creates beadwork inspired by stories told by their grandmother, collects folk music from artists like Buffy Sainte‑Marie and Brandi Carlile, and reads historical
    novels such as Dee Brown’s *Bury My Heart at Wounded Knee* that deepen their appreciation for narrative art.
  travel: Elisabeth Ballay prefers road trips that blend nature with cultural immersion, having explored the Great Smoky Mountains, attended a pow‑wow in Asheville, and they are planning a future visit
    to Taos to study traditional pottery while balancing their budget and family commitments.
  culinary: Elisabeth Ballay delights in cooking dishes that marry Southern comfort with their heritage, often preparing succotash with heirloom corn, black‑eyed peas, and fresh sage, while experimenting
    with wild herbs like oregano and ramps harvested from their garden.
  core: Elisabeth Ballay is a routine‑loving, organized hospitality professional who balances meticulous work habits with creative gardening, basket‑weaving, and a steadfast commitment to community mentorship,
    even if they sometimes over‑plan their weekend adventures.
background:
  cultural: Elisabeth identifies with her American Indian roots, tracing her ancestry to a tribe native to North Carolina, where community and respect for the natural world are core values. She grew up
    hearing oral histories and participating in cultural celebrations that emphasized harmony, storytelling, and shared responsibility. This heritage influences her culinary preferences, prompting her to
    incorporate traditional ingredients like heirloom corn and wild herbs into everyday meals. While she lives in a predominantly non‑tribal town, she remains actively engaged with tribal elders and local
    Indigenous groups, attending cultural workshops and supporting efforts to preserve language and artistic traditions.
attributes:
  skills: '["Customer service","Order taking and memory of regulars","Food safety compliance","Cash handling","POS system operation","Inventory tracking","Opening/closing procedures","Team training and
