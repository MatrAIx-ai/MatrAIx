persona_description: A historian and scholar of religious studies, particularly interested in the history of pilgrimage and its impact on the development of Christianity in the Middle East. They are familiar
  with the physical and archaeological remains of the churches and other Frankish buildings of the period, and have a detailed knowledge of the topography of the region. They have a keen interest in the
  study of Holy Land pilgrimage in the 13th century and have a unique understanding of the context, dating, and composition of the texts they translate. They are highly skilled in the use of footnotes and
  have a keen eye for detail, making their translations and commentary both informative and illuminating.
