personas:
  professional: An ambitious digital marketing enthusiast, Sandra Crespo leverages their market research acumen, social media savvy, and competitive spirit from gaming to craft data‑driven campaigns for
    small Ohio businesses, all while navigating deadlines with a flexible, sometimes chaotic, planning style that they balance with meticulous Excel analysis and Canva designs.
  sports: An outdoor enthusiast, Sandra Crespo joins a local hiking club that explores the trails of Hocking Hills during the fall, follows the Cleveland Browns and the Cincinnati Bengals for NFL action,
    and supports the Cleveland Cavaliers during basketball season, while occasionally playing casual soccer with friends at a community field, balancing their competitive gaming mindset with seasonal fitness
    routines.
  arts: Creative at heart, Sandra Crespo curates indie playlists featuring Tame Impala, Mitsuki, and Phoebe Bridgers, attends intimate gigs at the Funny Farm in Columbus, paints abstract acrylics inspired
    by Ohio’s rural sunsets, captures street scenes and cornfield vistas with a DSLR, and finds inspiration in the works of contemporary photographer Vivian Maier and painter Mark Rothko.
  travel: An adventurous yet budget‑conscious traveler, Sandra Crespo has road‑tripped the Appalachian Trail in West Virginia, spent a weekend in New York City for a music showcase, dreams of backpacking
    through Iceland’s volcanic landscapes and the Japanese cherry blossom season, and prefers planning trips via spontaneous itineraries using discount travel apps while saving in a dedicated travel fund.
  culinary: In the kitchen, Sandra Crespo enjoys experimenting with Korean bibimbap, whipping up avocado toast with smoked salmon, and perfecting a spicy ramen broth, while their cooking skill hovers at
    confident home‑cook level; they love sourcing fresh basil, kimchi, and artisanal cheese from local farmers’ markets, and often pair meals with lo‑fi playlists they created themselves.
  core: Balancing a competitive gaming mindset with a compassionate love for animals, Sandra Crespo channels curiosity into data‑driven marketing, navigates anxiety through creative outlets, and lives flexibly,
    albeit sometimes chaotically, while chasing indie music, scenic hikes, and future travel adventures.
background:
  cultural: Sandra grew up in Lima, Ohio, a small Midwestern town in Allen County. Her family is white, working‑class, with roots in the region’s manufacturing and agricultural sectors. The community emphasizes
    self‑reliance, modesty, and a pragmatic work ethic, values that have shaped Sandra’s practical mindset. She was raised with a blend of traditional Midwestern cultural norms—such as valuing independence,
    community involvement, and modest social gatherings—and contemporary influences from online media and popular culture. While her family maintains occasional ties to Protestant traditions, religious
    practice is not a central part of her daily life. The local culture’s emphasis on straightforward communication and a “hands‑on” approach to problem solving informs her critical and skeptical outlook,
    and the relaxed small‑town atmosphere reinforces her preference for flexibility over rigid scheduling.
attributes:
  skills: '[''Market research'', ''Social media content creation'', ''Basic graphic design (Canva, Adobe Photoshop)'', ''Data analysis with Excel and Google Analytics'', ''Copywriting for marketing'', ''Ad‑hoc
    project coordination'', ''Critical thinking and information evaluation'', ''Problem‑solving'', ''Introductory Python for data handling'', ''Competitive online gaming strategy'']'
  hobbies: '[''Curating indie music playlists'', ''Attending local live music shows'', ''Competitive online gaming (League of Legends, Valorant)'', ''Mindfulness meditation'', ''Daily journaling and creative
    writing'', ''Abstract painting'', ''Photography of rural and urban scenes'', ''Hiking local trails'', ''Volunteering at animal shelter'', ''DIY home‑decor crafting'']'
  career_goals: She aims to complete her associate degree in Business Administration with a focus on Marketing within the next year, then transfer to a four‑year university to earn a BBA. Her short‑term
    goal is to secure a remote internship in digital marketing where she can apply her research and content creation skills while maintaining a flexible schedule that accommodates her mental‑health needs.
    Long‑term, Sandra envisions becoming a brand strategist for a consumer‑goods company, eventually launching her own boutique marketing consultancy that helps local Ohio businesses grow their online presence.
    She is driven by a competitive desire to outperform peers and build a reputable client base, while also seeking a work environment that offers autonomy and supportive mental‑health resources.
