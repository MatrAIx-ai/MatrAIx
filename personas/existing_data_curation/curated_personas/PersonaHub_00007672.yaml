persona_description: A historian who specializes in studying the history and culture of the Yao people, particularly their migration patterns, language evolution, and the impact of Chinese rule on their
  society. They are interested in the complex mixture of Yao and Han Chinese speakers, the preservation of their common psychological quality, and the impact of Chinese rule on their society. They are also
  interested in the Yao's legend of a great flood and their belief in a Creator god. They have a deep understanding of the Yao's language and the Iu Mien language, and are knowledgeable about the Yao's
  New Testament available in their language.
