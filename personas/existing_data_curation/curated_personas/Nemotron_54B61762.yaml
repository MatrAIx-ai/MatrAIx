personas:
  professional: Mehdi Powell, a one‑year‑old who delights in arranging building blocks in tidy rows and adheres strictly to nap and feeding schedules, they already exhibit methodical planning and reliability—traits
    that foreshadow a future career in logistics, engineering, or any field demanding precision and structure.
  sports: Mehdi Powell, a one‑year‑old who thrives in toddler gymnastics classes at the Little Movers Play Center and enthusiastically waves a miniature flag for the nearby Major League Baseball team, the
    River City Titans, while also clapping along to the hometown National Football League squad, the Valley Vipers, during family game evenings, they show early enthusiasm for movement and team spirit.
  arts: Mehdi Powell, a one‑year‑old who lights up to the soothing croon of Stevie Wonder’s ‘Isn’t She Lovely’ and eagerly points at the bold illustrations in Eric Carle’s ‘The Very Hungry Caterpillar,’
    they often join in simple rhythm claps inspired by baby music videos starring the animated duo, the Wiggles.
  travel: Mehdi Powell, a one‑year‑old who has already enjoyed a breezy family road trip to the Oregon Coast and a short flight to San Diego’s world‑class zoo, they favor short, predictable outings with
    familiar caregivers, yet display wide‑eyed curiosity when exploring new sensory environments like the towering redwoods of Redwood National Park.
  culinary: Mehdi Powell, a one‑year‑old who prefers silky sweet‑potato purée lightly dusted with cinnamon and soft banana slices, enjoys tender chicken strips and steamed broccoli at family meals, yet
    stubbornly rejects peas and squashes, and they often hide a favorite teething biscuit behind a pillow.
  core: Mehdi Powell, a one‑year‑old whose love for order drives them to line up stuffed animals by size, whose competitive streak emerges when racing siblings to the high chair, and who habitually tucks
    their pacifier into mismatched socks, they embody a tiny but determined explorer of structure and social fun.
