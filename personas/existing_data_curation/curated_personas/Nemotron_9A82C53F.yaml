personas:
  professional: Krystal Thomas, though still a newborn, already runs a meticulously timed schedule of feeding, sleeping, and diaper changes that foreshadows a future as a detail‑oriented logistics coordinator
    who values routine and practicality above all else.
  sports: Krystal Thomas enjoys daily tummy‑time sessions that serve as a mini‑bootcamp, watches the Chattanooga Lookouts at family outings, and is enrolled in a parent‑baby swim class at the local community
    center, showing early exposure to both fitness and fan culture.
  arts: Krystal Thomas's days are punctuated by gospel lullabies sung by her grandmother and the soft melodies of Sam Cooke's "A Change Is Gonna Come" from a baby music mobile, while she often smiles at
    the colorful murals in the Tennessee Aquarium's discovery gallery, hinting at a budding appreciation for music and visual art.
  travel: Krystal Thomas has already embarked on stroller‑friendly road trips along the Blue Ridge Parkway, weekend visits to the historic Biltmore Estate in Asheville, and a family cruise to the Caribbean,
    with parents meticulously planning each itinerary to preserve her comforting routine.
  culinary: Krystal Thomas thrives on warm, nutrient‑rich breastmilk and lights up at the aroma of her mother's sweet‑potato purée seasoned with a pinch of cinnamon, while occasional soft bites of carrots
    and peas introduce her to the textures of Southern comfort dishes like cornbread.
  core: Krystal Thomas insists on a strict feeding schedule, gets unsettled by sudden changes, and habitually wiggles her toes in the high chair, revealing an early blend of routine‑loving precision and
    endearing quirks.
background:
  cultural: Krystal is born into a Black family in Chattanooga, Tennessee, where Southern African‑American traditions shape daily life. Her family places a strong emphasis on church participation, community
    gatherings, extended family support, home‑cooked soul food, and preserving oral histories. These cultural roots influence the rhythms of her early life, from gospel lullabies to family‑centered routines.
