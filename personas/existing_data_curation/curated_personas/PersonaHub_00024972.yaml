persona_description: A scientist who specializes in the study of natural ecosystems, particularly in tropical forests in El Salvador. Her research focuses on measuring land-use change and using remote sensing
  to assess the ecosystem service of flood mitigation provided by tropical forests. She is passionate about conservation and wants to help places like El Salvador, where the resilience of healthy nature
  can mean the difference between prosperity and poverty for tens of thousands of people.
