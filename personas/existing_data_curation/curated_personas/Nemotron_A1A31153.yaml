  career_goals: Although still very young, Katie frequently talks about caring for animals and helping friends, reflecting an early interest in becoming a veterinarian or a teacher. She also enjoys storytime
    and often pretends to be a ‘big helper’, suggesting a future ambition to work in a role that combines curiosity, practical problem‑solving, and caring for others, such as a scientist, educator, or caregiver.
