personas:
  professional: Katie Hendrix is a tiny architect of play, who meticulously lines up LEGO bricks into neat rows, schedules snack and nap times like a miniature project manager, and they balance boisterous
    block‑building with quiet puzzle‑solving, showcasing an early blend of curiosity, practicality, and methodical organization.
  sports: Katie Hendrix loves the community “Play‑Fit” toddler gymnastics class, proudly attempts the mini‑tumble, waves a miniature Syracuse Crunch jersey during weekend Little League tee‑ball games, and
    they eagerly cheer for the New York Yankees on Family Night at the local park.
  arts: Katie Hendrix is an exuberant fan of the Toy Piano’s clatter, fills scribbled notebooks with bright crayon suns and dinosaur doodles, and they can’t get enough of The Wiggles’ sing‑along tunes and
    Sesame Street’s playful characters during storytime.
  travel: Katie Hendrix enjoys weekend outings to the Central Library story hour, a sunny splash at the shallow shores of the Finger Lakes, and they daydream about a snowy adventure at a Vermont ski hill,
    all while their trips are carefully timed around nap schedules and snack breaks.
  culinary: Katie Hendrix loves cheesy macaroni, sweet banana pancakes drizzled with maple syrup, and crunchy carrot sticks dipped in hummus, but they stubbornly refuse broccoli, often bargaining for extra
    grapes with a giggle‑filled plea.
  core: Katie Hendrix blends childlike curiosity with a tiny but fierce love for order, secretly hoarding stickers in a secret stash, and they insist on punctual nap times and a nightly bedtime story.
background:
  cultural: Katie is raised in a middle‑class white family in Syracuse, New York, where she experiences typical Northeastern American cultural traditions. Her household celebrates holidays such as Thanksgiving,
    Christmas, and the Fourth of July, and she attends a local preschool that emphasizes community values, early literacy, and inclusive play. The multicultural environment of Syracuse provides exposure
    to diverse community events and public library programs, which influence her growing sense of curiosity and social awareness.
