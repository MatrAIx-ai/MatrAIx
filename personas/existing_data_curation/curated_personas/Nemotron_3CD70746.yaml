  hobbies: '[''wood carving'', ''wood‑burning art'', ''photography'', ''hiking Oahu trails'', ''surfing'', ''visiting local art galleries'', ''collecting vintage hand tools'', ''reading design and architecture
    books'', ''playing ukulele'', ''experimenting with Hawaiian‑inspired cooking'']'
  career_goals: Charles aims to transition from a skilled tradesperson to a licensed general contractor within the next three years, securing the credentials needed to lead larger residential and boutique
    commercial projects. He dreams of opening a small studio‑showroom that showcases his own line of Hawaiian‑inspired furniture, blending contemporary design with traditional motifs. A long‑term ambition
    is to earn LEED‑Green Associate certification, allowing him to market his services as environmentally conscious. He also hopes to mentor a handful of apprentices from the local community, passing on
    both technical skills and an ethos of craftsmanship. Ultimately, Charles envisions his work being featured in regional design magazines and contributing to preservation projects that celebrate Hawaii’s
    architectural heritage.
