personas:
  professional: A tiny LEGO architect, Jose Batin carefully plans intricate structures while still improvising when a piece doesn't fit, they blend curiosity with practicality, keep their bricks neatly
    organized yet stay flexible, and always share pieces with peers.
  sports: A budding soccer enthusiast, Jose Batin dashes around the community's Sunnyville Strikers mini‑league, they proudly wear a miniature Los Angeles Dodgers cap during backyard games and idolize Lionel
    Messi’s dribbles, while also joining a weekly toddler gymnastics class for balance.
  arts: A vivid little art lover, Jose Batin spends afternoons drawing cartoon heroes like Mickey Mouse and Elsa from Frozen, they adore the songs of Idina Menzel and the playful storytelling of Pixar’s
    Toy Story, often singing along while coloring with Crayola markers.
  travel: A family‑guided explorer, Jose Batin’s travel highlights include a sunny day at the nearby zoo, a splashy weekend at the beach in Myrtle Beach, and a magical visit to Disneyland, they dream of
    one‑day seeing the Eiffel Tower, though their itineraries stay brief and stroller‑friendly.
  culinary: A picky yet curious eater, Jose Batin adores creamy mac & cheese, chicken nuggets with honey mustard, strawberry yogurt, and occasionally experiments with a tiny avocado toast, they insist on
    sprinkling grated cheddar on everything while secretly sneaking a bite of broccoli when no one watches.
  core: Energetic and empathetic, Jose Batin blends a boundless curiosity with a keen sense of order, often worrying over missing a favorite crayon but delighting in sharing toys with friends.
background:
  cultural: Jose is a Salvadoran‑American growing up in Omaha, Nebraska. His household speaks Spanish and celebrates Salvadoran traditions, such as preparing pupusas for family meals, dancing to cumbia
    and marimba music, and observing holidays like Día de la Madre and the Feast of San Salvador. He participates in local community festivals that blend Midwestern customs with Latinx culture, and he attends
    a preschool where he practices both English and Spanish. The family’s immigrant experience nurtures a strong sense of pride in his heritage while also fostering an appreciation for the diverse community
    around him.
