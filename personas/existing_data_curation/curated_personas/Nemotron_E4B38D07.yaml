  career_goals: Although only four, Jose often talks about wanting to be a firefighter because he loves the bright trucks and the idea of helping people. His curiosity about how things work and his practical
    side also lead him to imagine building tall structures, so he dreams of becoming a builder or engineer one day. He expresses a desire to make his family proud, to speak both Spanish and English well,
    and to one day help his community, reflecting his kind, cooperative nature and his wish for harmony.
