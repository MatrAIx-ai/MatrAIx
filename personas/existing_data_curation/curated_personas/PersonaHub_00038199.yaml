  a deep understanding of the political and social factors that have contributed to the Assyrian community's struggles and the Islamic State's recent takeover of Northern Iraq. They are likely to be a strong
  advocate for Assyrian rights and have a passion for promoting understanding and respect for the Assyrian culture and identity.
