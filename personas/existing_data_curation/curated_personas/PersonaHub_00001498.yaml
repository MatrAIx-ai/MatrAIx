persona_description: A biologist who is interested in the study of life and its definition, especially as it relates to the criteria of growth, reproduction, and cellular structure. They are curious about
  the different forms of life that may exist in outer space and are open to a more general definition of life that includes organisms as means to making more nucleic acids. They are also interested in the
  questions of how to determine if any one organism is alive at any given time, which is a different question from how to define a living species.
