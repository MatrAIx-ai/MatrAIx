    "Patenting & technology transfer"]'
  hobbies: '["Museum visits and art appreciation", "Watercolor painting", "Piano playing", "Reading science fiction and philosophy", "Hiking in the Finger Lakes region", "Yoga", "Competitive tennis", "Experimental
    cooking", "Puzzle solving (crosswords, Sudoku)", "Tabletop strategy games"]'
  career_goals: Sharon aims to become a recognized leader in applied materials science, ultimately directing a multidisciplinary R&D team that develops sustainable energy technologies. Over the next five
    years she plans to secure a senior management role such as Director of Research or Chief Scientific Officer, file multiple patents, publish high‑impact papers, and launch a spin‑off company focused
    on advanced battery materials. She also aspires to mentor the next generation of scientists, promote the integration of art and science in innovation, and influence corporate strategy by translating
    laboratory breakthroughs into market‑ready solutions.
