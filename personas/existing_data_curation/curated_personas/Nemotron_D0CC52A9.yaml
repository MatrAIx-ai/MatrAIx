personas:
  professional: Sharon Graham is a materials science strategist who fuses experimental spectroscopy with business forecasting, leading interdisciplinary R&D teams while they apply their skeptical, competitive
    edge to drive patentable innovations and mentor junior researchers.
  sports: Sharon Graham competes in the Finger Lakes Community Tennis League, follows the New York Knicks and Buffalo Bills avidly, hikes the Watkins Glen State Park trails each weekend, and they blend
    a yoga routine with strength‑training to stay agile for the seasonal tennis circuit.
  arts: Sharon Graham spends Saturday mornings at the Memorial Art Gallery, sketches watercolor studies inspired by quantum tunneling, plays improvised piano pieces featuring Debussy and jazz standards
    by Miles Davis, and they cite inspiration from artists like Yayoi Kusama and the improvisational choreography of Merce Currie.
  travel: Sharon Graham plans trips with the same precision as a research protocol, favoring boutique eco‑lodges in Iceland’s geothermal regions, art‑focused itineraries through Kyoto’s temples, and short
    weekend getaways to the Finger Lakes where they blend hiking, winery tours, and sketch‑in‑nature sessions, all while budgeting trips through a spreadsheet and occasionally splurging on a first‑class
    rail ticket to Berlin for a materials‑science conference.
  culinary: Sharon Graham applies laboratory rigor to the kitchen, perfecting sous‑vide salmon with dill, crafting mole poblano with dark chocolate and dried chilies, and experimenting with truffle‑infused
    risotto, all while they source seasonal Finger Lakes apples, heirloom carrots, and ethically sourced sashimi‑grade fish.
  core: Sharon Graham is a fiercely curious scientist‑entrepreneur who balances meticulous data‑driven work with a vibrant love for watercolor, jazz piano, and weekend tennis, yet they often forget to turn
    off their work email at night.
background:
  cultural: Sharon hails from a middle‑class Anglo‑American family that has lived in upstate New York for several generations. Raised in the West Henrietta suburb of Rochester, she was shaped by the region’s
    blend of industrial heritage and a thriving cultural scene, fostering both pragmatic self‑reliance and a deep appreciation for the arts. Her family emphasized education, supporting her pursuit of a
    graduate business degree alongside her passion for science. While identifying as white, she embraces the broader American values of individualism and meritocracy, and she often draws on the diverse
    intellectual community of the Greater Rochester area—including its universities, museums, and tech incubators—in her personal and professional life.
attributes:
  skills: '["Experimental design", "Materials characterization (spectroscopy, X‑ray diffraction, electron microscopy)", "Computational modeling (Python, MATLAB)", "Statistical data analysis", "Scientific
