  hobbies: '[''Pick‑up basketball'', ''Classic truck restoration'', ''DIY home improvement'', ''Listening to hip‑hop, jazz, and neo‑soul'', ''Cooking family meals with Southern and Caribbean influences'',
    ''Mentoring high‑school students in trade skills'', ''Hiking along the Mohawk River trail'']'
  career_goals: Robert’s short‑term goal is to earn a Master Technician certification and become the lead maintenance specialist for the Schenectady County fleet, overseeing both heavy‑duty trucks and municipal
    equipment. Over the next five years, he aims to move into a supervisory role, where he can design maintenance workflows, implement data‑driven reliability programs, and mentor a team of technicians.
    Long‑term, he dreams of launching his own mobile heavy‑equipment repair shop that serves regional contractors while offering apprenticeship opportunities for youths from his community. Throughout his
    career progression, he wants to ensure financial stability for his wife and future children and eventually give back by teaching at a local vocational college.
