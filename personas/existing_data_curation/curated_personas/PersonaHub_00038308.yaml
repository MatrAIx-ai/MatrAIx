persona_description: A social scientist or development economist who is interested in the effectiveness and efficiency of conditional cash or in-kind transfers programs like the Food-for-School Program
  in the Philippines. This persona is likely to have a background in economics, statistics, or social sciences, and is familiar with the principles of social safety nets and conditional transfers. They
  are interested in understanding the distribution of benefits and other issues arising from the FSP, and how these relate to the effectiveness and efficiency of the program. They are also likely to have
  a keen interest in targeting strategies and the importance of understanding the characteristics of the population being targeted.
