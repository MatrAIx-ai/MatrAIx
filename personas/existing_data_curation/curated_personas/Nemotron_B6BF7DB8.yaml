  hobbies: '[''Beach volleyball'', ''Surfing'', ''Hiking'', ''Salsa dancing'', ''Cooking Puerto Rican dishes'', ''Community volunteering'', ''Photography'', ''Cycling'', ''Listening to engineering podcasts'',
