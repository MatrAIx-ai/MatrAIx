  career_goals: Fabian aims to become a senior project manager or director of infrastructure for a regional public agency, overseeing large‑scale, climate‑resilient projects that protect San Diego’s coastal
    neighborhoods. He plans to obtain his Professional Engineer (PE) license if not already, and pursue certifications in sustainable design such as LEED. He aspires to lead a multidisciplinary team that
    integrates community input, ensuring projects meet both technical standards and local cultural values. Long‑term, he envisions founding his own consultancy focused on sustainable, socially inclusive
    infrastructure, mentoring junior engineers, and promoting diversity within the engineering profession.
