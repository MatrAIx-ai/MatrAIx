personas:
  professional: Fabian Chi is a licensed civil engineer specializing in structural design and construction management, who blends meticulous load analysis with a pragmatic, cost‑effective mindset and leverages
    bilingual communication to harmonize multidisciplinary teams and community stakeholders.
  sports: Fabian Chi is an avid beach volleyball player who competes in the Torrey Pines Beach Volleyball League, a weekend surfer regular at La Jolla Shores, a member of the San Diego Cycling Club’s weekly
    coastal rides, and a dedicated fan of the San Diego Padres, often cheering them on at Petco Park while also following the San Diego Wave FC’s matches.
  arts: Fabian Chi expresses creativity through sunrise photography along the Pacific cliffs, often posting images of golden horizons on Instagram, while cutting a rug at local salsa nights to the rhythms
    of Celia Cruz and Marc Anthony, and unwinds after work listening to engineering podcasts and the smooth jazz of Arturo Sandoval.
  travel: Fabian Chi favors spontaneous, adventure‑oriented road trips along the Pacific Coast, with memorable stops at Big Sur, a recent surf‑focused getaway to Puerto Escondido, and a tightly planned
    vacation to Reykjavik to explore sustainable urban design, while budgeting for future family trips to the Caribbean, balancing the desire for new experiences with a practical eye on savings.
  culinary: Fabian Chi enjoys cooking for friends, effortlessly preparing classic Puerto Rican dishes like arroz con gandules and lechón alongside fresh grilled fish tacos, and while they boast a solid
    intermediate skill level with a well‑worn cast‑iron skillet, they sometimes over‑salt dishes in their enthusiasm, quickly balancing flavors with a squeeze of lime and a dash of cilantro.
  core: Fabian Chi blends a structured, cost‑conscious engineering mindset with a free‑spirited love for surf, salsa, and sunrise photography, juggling meticulous project plans by day and spontaneous beach
    volleyball matches by night, all while habitually forgetting to water houseplants until the last minute.
background:
  cultural: Fabian’s cultural identity is rooted in his Puerto Rican heritage, passed down by his parents who migrated to California. He grew up speaking both Spanish and English, celebrating traditions
    such as Three Kings Day, bomba and plena music, and family gatherings centered around rice and beans dishes. The value of “familismo”—prioritizing family and community—shapes his cooperative outlook
    and his commitment to community‑focused projects. Living in San Diego, he blends this heritage with the city’s coastal, multicultural vibe, participating in local Puerto Rican festivals and integrating
    the laid‑back Californian lifestyle. He feels a strong sense of pride in representing Puerto Rican engineers in the region and often mentors younger Latino students interested in STEM.
