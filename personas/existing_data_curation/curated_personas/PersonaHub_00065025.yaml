persona_description: A researcher and engineer who specializes in the study of structural mechanics and the design of reconfigurable structures. She is particularly interested in the mechanics of elastic
  rods and their networks, and how to create new products and technologies that can change shape to improve performance under variable conditions. Her research has led to the creation of a new type of reconfigurable
  structure called a bigon ring, which exhibits multistable behavior and can be applied to other studies of general interlaced elastic networks.
