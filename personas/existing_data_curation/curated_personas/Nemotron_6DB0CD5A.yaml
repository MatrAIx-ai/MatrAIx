  career_goals: Susan loves imagining future roles that involve caring for others and exploring the world. She often says she wants to become a teacher to help friends learn, a veterinarian to take care
    of animals, or an astronaut to travel among the stars. Her kindness and curiosity drive these aspirations, even as she enjoys the present moments of play and discovery.
