personas:
  professional: Susan Gilmore, an aspiring mini-architect who loves arranging colorful Lego bricks into perfectly aligned towers, showcases a practical focus on immediate realities while also enjoying the
    flexibility of spontaneous block improvisation, hinting at a future career in design.
  sports: Susan Gilmore, a member of the Sunny Sprouts Soccer Club who rushes onto the field each spring for T-ball practice and splashes around in a community swimming pool during summer, cheers loudly
    for the Seattle Mariners at family game nights, and balances structured drills with the joy of spontaneous water games.
  arts: Susan Gilmore, a budding fan of Disney Princess movies and The Wiggles, spends afternoons drawing vibrant watercolor scenes of their favorite characters while humming 'Let It Go' and eagerly participates
    in preschool dance circles to the tunes of Bluey.
  travel: Susan Gilmore, a curious explorer who has delighted in family road trips to Disney World in Orlando, a beach day at Santa Monica, and a weekend camp in the Great Smoky Mountains, loves sing‑along
    car rides, and dreams of visiting the Eiffel Tower in Paris someday.
  culinary: Susan Gilmore, a picky‑but‑adventurous eater who adores creamy mac and cheese with cheddar, peanut butter and jelly sandwiches, and chicken nuggets with honey mustard, proudly helps stir batter
    for banana pancakes and delights in the bright orange crunch of carrot sticks.
  core: Susan Gilmore is a structured yet flexible five‑year‑old who balances tidy Lego constructions with spontaneous play, saves coins diligently while occasionally splurging on stickers, calmly manages
    mild asthma, loves soccer and swimming, revels in Disney music, dreams of Paris, and delights in mac and cheese.
background:
  cultural: Susan is raised in a middle‑class white Anglo‑American family in Colchester, Connecticut. Her household celebrates typical American holidays such as Thanksgiving and Christmas, and participates
    in community activities like library storytime and neighborhood park events. Family traditions include bedtime storytelling and weekend outings to local farms or museums, fostering an appreciation for
    both structure and creative exploration within a New England cultural setting.
