persona_description: A scientist who is interested in the study of bird taxonomy and its evolution. They are particularly interested in the molecular and morphological evidence that suggests the traditional
  Ciconiiformes should be split between two lineages, rather than expanded, although some non-traditional Ciconiiformes may be included in these two lineages. They are also interested in the placement of
  New World vultures, which are currently under debate and have been removed from Ciconiiformes by some official bodies, but are still included in the order Accipitriformes by others. They are also interested
  in the classification of birds in general, and are familiar with the work of Sibley and Ahlquist, who have proposed a new taxonomy that has been adopted by some official bodies, but is still being modified
  as more evidence becomes available.
