personas:
  professional: Julius Cashman, a seasoned secondary‑school English and visual arts teacher, designs interdisciplinary, project‑based curricula that fuse literary criticism with watercolor landscapes, applies
    differentiated instruction through smartboard‑enabled assessments, and they use their calm, competitive drive to secure arts‑integration grants and mentor peers toward departmental leadership.
  sports: Julius Cashman, a lifelong fan of the Mississippi State Bulldogs and the New Orleans Saints, anchors their fitness regimen with weekly hikes on the Natchez Trace through the Lamar County Trailblazers
    walking club, they supplement with casual tennis at the local community center, and follows the Memphis Grizzlies during the NBA season for a dose of competitive excitement.
  arts: Julius Cashman channels their appreciation for contemporary abstraction into oil and watercolor landscapes inspired by Mark Rothko’s color fields and James Turrell’s light installations, they curate
    a personal photography series echoing the documentary style of Diane Arbus, they unwind to Beethoven’s symphonies and Maria Callas arias, and they regularly revisit literary fiction by Toni Morrison
    and art criticism by Lucy Lippard for creative fuel.
  travel: Julius Cashman plans purposeful road trips that blend photography and art pilgrimage, having already documented the French Quarter of New Orleans and the historic streets of Florence, while they
    target the light of Ouarzazate’s desert in Morocco for landscape painting inspiration, and they arrange each itinerary through detailed planning and modest budgeting to balance work commitments.
  culinary: Julius Cashman, an amateur chef proficient with a cast‑iron skillet, favors Southern comfort dishes like shrimp étouffée seasoned with smoked paprika and fresh thyme, relishes a well‑made catfish
    po’ boy with hushpuppies, and they often pair their meals with a glass of Mississippi‑grown Muscadine wine while sketching menu ideas for community art‑themed potlucks.
  core: Julius Cashman is a quietly competitive, art‑obsessed educator who balances disciplined budgeting with a penchant for late‑night watercolor sessions, occasional dental neglect, and an inexhaustible
    curiosity that fuels both classroom innovation and endless landscape photography, and they never miss a chance to mentor a colleague.
background:
  cultural: 'Julius is a white Southern native of Mississippi, raised in a modest small‑town environment that values community, church involvement, and Southern hospitality. His upbringing blended traditional
    Southern values with an education‑driven curiosity, encouraging respect for local traditions like blues music and regional cuisine while fostering an openness to global artistic ideas. This cultural
    duality informs his teaching philosophy: honoring local heritage in the classroom while introducing students to broader, unconventional artistic perspectives.'
attributes:
  skills: '["Curriculum Development","Project‑Based Learning","Art Integration","Differentiated Instruction","Assessment Design","Educational Technology Integration","Classroom Management","Mentoring and
