  hobbies: '["Oil and Watercolor Painting","Landscape Photography","Reading Contemporary Art Criticism","Literary Fiction","Chess","Hiking on the Natchez Trace","Classical Music Listening","Volunteer Tutoring"]'
  career_goals: Julius aims to become an instructional coach or department chair within his district, leading a regional arts integration initiative that secures sustainable funding for student‑led art
    projects. He plans to pursue a master's in Educational Leadership to influence state policy on arts education, publish a guide on project‑based learning in rural schools, and mentor a cohort of teachers
    to expand innovative teaching practices across Lamar County.
