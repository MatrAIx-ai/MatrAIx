  hobbies: '[''Reading historical biographies'', ''Reading science and HR journals'', ''Vegetable gardening'', ''Cooking Colombian cuisine'', ''Walking along Indian River Lagoon'', ''Nature photography'',
    ''Playing chess'', ''Listening to salsa and vallenato music'', ''Small-group dancing with spouse'']'
  career_goals: Javier aims to progress to a senior HR leadership role—such as HR Director or Senior HR Business Partner—where he can integrate advanced analytics into strategic workforce planning. He seeks
    to champion diversity, equity, and inclusion initiatives that highlight the contributions of Hispanic and immigrant employees. Achieving professional certifications like SHRM‑SCP or HRCI’s SPHR is a
    near‑term target. In the longer term, he envisions establishing a boutique HR consultancy that assists midsize tech and engineering firms with data‑centric talent strategies while mentoring the next
    generation of HR professionals.
