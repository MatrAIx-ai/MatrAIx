persona_description: A climate scientist who is responsible for researching and analyzing climate change effects on highways and transportation systems. This persona has expertise in climate modeling, climate
  impact assessments, and the application of climate change information to transportation planning. They are familiar with the methodologies used by the Federal Highway Administration (FHWA) to identify,
  categorize, review, and present climate change effects in their reports. This persona is particularly interested in studying the effects of extreme precipitation, sea-level rise, and changes in temperature
  and precipitation on highways, as these effects are crucial for the U.S. transportation system.
