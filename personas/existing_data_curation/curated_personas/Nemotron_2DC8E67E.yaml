personas:
  professional: Myrtle Forehand is a finance executive whose blend of meticulous budgeting, risk modeling, regulatory compliance, and vivid data visualization energizes cross‑functional teams while championing
    arts‑focused community investments.
  sports: Myrtle Forehand stays active through sunrise yoga at the Midtown studio, joins a co‑ed softball league each summer, runs cross‑country races in spring, and cheerfully supports the Atlanta Hawks,
    Braves, and Falcons while tracking her steps with a smartwatch.
  arts: Myrtle Forehand curates a rotating collection of contemporary works by artists such as Kerry James Marshall, Theaster Gates, and emerging Southern painters, attends monthly performances at the Alliance
    Theatre, and draws creative inspiration from the music of Nina Simone, Beyoncé, and Kamasi Washington's jazz improvisations.
  travel: Myrtle Forehand prefers curated cultural getaways, often planning week‑long itineraries to historic Southern towns like Savannah and Charleston before jetting to art‑rich cities such as Barcelona
    and Kyoto, balancing boutique hotel stays with budget‑friendly Airbnb options and keeping an eye on flight‑deal alerts.
  culinary: Myrtle Forehand enjoys cooking Southern comfort dishes like shrimp and grits, collard greens, and pecan pie, often adding global twists such as miso‑marinated fish or chai‑spiced brown sugar
    glazes, and showcases a confident palate for heirloom tomatoes, smoked paprika, fresh basil, and sweet tea infused with hibiscus.
  core: Myrtle Forehand is a financially savvy, art‑loving catalyst who blends strategic rigor with boundless curiosity, turning every board meeting, gallery opening, and yoga session into an opportunity
    to connect, create, and lead.
background:
  cultural: Myrtle grew up in the coastal region of Baldwin County, Alabama, immersed in the traditions of the Deep South. Her family emphasized hospitality, community involvement, and a strong work ethic,
    often gathering around church events, local festivals, and family meals featuring Southern cuisine. The region’s rich musical heritage, coastal lifestyle, and close‑knit community shaped her values,
    while her graduate business education broadened her perspective and fostered openness to new ideas. This blend of traditional Southern culture and contemporary professional experience informs her balanced
    approach to both work and personal life.
