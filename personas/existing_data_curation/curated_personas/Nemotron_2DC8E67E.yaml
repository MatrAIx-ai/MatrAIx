  hobbies: '[''Visiting art galleries and museums'', ''Attending live theater and concerts'', ''Collecting contemporary artwork'', ''Traveling to culturally significant destinations'', ''Hosting dinner
    parties and networking events'', ''Cooking Southern cuisine with creative twists'', ''Gardening and landscaping'', ''Yoga and wellness practices'', ''Reading business and self‑improvement literature'',
    ''Listening to finance and innovation podcasts'', ''Photography'', ''Volunteering for community arts programs'', ''Mentoring young professionals'', ''Participating in book clubs'']'
  career_goals: Myrtle aspires to advance to a senior executive role such as Chief Financial Officer within a mid‑size corporation or a nonprofit arts organization, where she can lead financial transformation
    through technology adoption and sustainable practices. She aims to expand community investment programs that fuse finance with cultural enrichment, obtain a CFA certification, mentor emerging women
    leaders in finance, and become a recognized speaker on the intersection of finance, innovation, and the arts.
