  career_goals: He aims to finish his high school equivalency, enroll in a vocational program for automotive technology or HVAC, and eventually secure a stable, well‑paid trade job that blends his curiosity
    for how things work with his desire for practical, reliable work. He is also open to a future in the U.S. Navy’s technical fields if that aligns with his interest in disciplined environments and technical
    training. Ultimately he wants to become a respected skilled tradesperson who can support his family and give back to his community.
