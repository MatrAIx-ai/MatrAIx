personas:
  professional: Amor Arriaga, a bilingual community event organizer with a flair for curating modest art exhibitions and managing modest budgets, leverages their curious eye for aesthetics and assertive
    yet compassionate leadership to turn grassroots festivals into vibrant cultural experiences.
  sports: Amor Arriaga, a regular participant in Saturday morning Zumba classes at the community center and an avid supporter of the New Mexico United soccer team and the Lovington High School Eagles football
    squad, blends their sociable energy with a pragmatic fitness routine that includes daily walks among succulents and occasional weekend hikes in the Guadalupe Mountains.
  arts: Amor Arriaga, who spends evenings painting desert‑inspired watercolors and attending live música ranchera shows featuring artists like Vicente Fernández, draws creative nourishment from the works
    of Frida Kahlo and contemporary theorist Hito Steyerl, while also curating community exhibitions that showcase local artisans' traditional patterns.
  travel: Amor Arriaga, whose travel style alternates between carefully planned weekend road trips to Carlsbad Caverns and spontaneous solo journeys to Oaxaca for culinary festivals, balances a modest budget
    with a desire to explore both southwestern desert landscapes and vibrant cultural hubs.
  culinary: Amor Arriaga, a skilled home cook who perfects mole poblano, tender tamales, and fiery chilies using ancho chilies, epazote, and toasted pumpkin seeds, often hosts communal meals where they
    experiment with fusion dishes like cactus‑infused salsa while occasionally over‑seasoning with extra salt.
  core: Amor Arriaga bridges a love for community art, gardening, and flavorful cooking with a habit of juggling too many projects at once, a tendency to lose track of time while painting, and an unstoppable
    talker who brightens any gathering.
background:
  cultural: Amor is a first‑generation Mexican‑American whose parents emigrated from Jalisco in the early 1970s; she grew up in a bilingual household in a small town near Lovington, where Mexican customs
    intertwined with the Southwest’s ranching culture; family gatherings centered around shared meals, Día de los Muertos altars, and the celebration of Catholic holidays, instilling in her a deep respect
    for tradition and community; at the same time, the vast plains and the ranching lifestyle of Lea County shaped a pragmatic and resilient outlook; Amor seamlessly blends Mexican culinary arts, folk music,
    and storytelling with New Mexican influences, often acting as a bridge between her heritage community and the broader town population; her cultural identity informs her volunteer work, her artistic
    interests, and her vision to preserve and promote Mexican heritage in the region.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Event planning and coordination'', ''Community outreach and volunteer management'', ''Art appreciation and basic curatorial work'', ''Basic graphic
    design (Canva, Photoshop)'', ''Public speaking and workshop facilitation'', ''Traditional Mexican cooking'', ''Gardening and horticulture'', ''Basic bookkeeping and budgeting'', ''Mentoring and conflict
    resolution'']'
  hobbies: '[''Painting (watercolors and acrylics)'', ''Pottery and ceramics'', ''Attending local art exhibitions and fairs'', ''Reading Mexican literature and contemporary art books'', ''Cooking traditional
    Mexican dishes'', ''Gardening (herbs, chilies, succulents)'', ''Folklorico dancing'', ''Listening to música ranchera and mariachi'', ''Volunteering at community events'', ''Documenting oral histories
    of local elders'']'
  career_goals: Amor aspires to transform her passion for art and community into a sustainable venture; her immediate goal is to complete the associate degree she began in community development and obtain
    a certification in cultural programming; she envisions opening a small community arts center in Lovington that offers free workshops, rotating exhibitions, and a marketplace for local artisans, especially
    those preserving Mexican heritage crafts; in parallel, she plans to launch an online boutique selling handcrafted home décor inspired by Mexican and Southwest motifs, leveraging her graphic design skills
    for branding; long‑term, Amor hopes to become a cultural liaison for Lea County, advocating for bilingual education initiatives and ensuring that Mexican traditions are represented in regional public
    events; her emotionally stable disposition and assertive yet compassionate nature drive her to seek leadership roles within local nonprofit boards.
