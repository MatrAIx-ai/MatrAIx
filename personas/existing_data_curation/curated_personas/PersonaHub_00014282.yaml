persona_description: A Montana Tech associate professor, Michael Masters, who is conducting groundbreaking research on the etiology of juvenile-onset myopia through the analysis of modern human variation
  in the neurocranium, frontal cortex, and eye in myopes and emmetropes. His research is supported by a grant from Montana INBRE (IDeA Network for Biomedical Research Excellence) and is being carried out
  in collaboration with the Laboratory of Neuro Imaging at the UCLA Medical School. His work focuses on the holistic approach rooted in evolutionary and ontogenetic principles to investigate the anatomic
  relationship among hard and soft tissue components of the visual, craniofacial, and cerebral systems, offering a unique perspective on the etiology of myopia and the potential to advance ophthalmological
  research.
