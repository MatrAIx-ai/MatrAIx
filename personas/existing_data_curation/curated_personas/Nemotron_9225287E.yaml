personas:
  professional: Dianna Roberts, a seasoned management analyst at a New York City municipal agency, blends rigorous data‑analysis expertise in Excel, Power BI, Tableau, SQL, Python, and R with design‑thinking
    to craft community‑focused strategies; they deliver precise forecasts and process optimizations while championing inclusive mentorship for women from underrepresented groups in analytics.
  sports: Dianna Roberts runs weekly with the Brooklyn Road Runners, attends sunrise yoga sessions at a local studio, and supports the Brooklyn Nets and New York Yankees as their favorite professional sports
    teams, while they also participate in a seasonal indoor rock‑climbing league during winter.
  arts: Dianna Roberts frequents the Brooklyn Museum and the Bushwick Art Gallery, sketches Manhattan skylines in a leather‑bound notebook, and fills their playlists with Miles Davis, Kendrick Lamar, and
    Lin‑Manuel Miranda, while devouring novels by Ta‑Nehisi Coates and Roxane Gay, and they often attend open‑mic nights to discuss the intersection of visual art and poetry.
  travel: Dianna Roberts prefers thoughtfully planned urban getaways, having explored the street art of Berlin, the jazz clubs of New Orleans, and the culinary markets of Tokyo, while they chart a future
    trip to the historic canals of Amsterdam and the natural beauty of the Adirondacks.
  culinary: Dianna Roberts delights in farmer’s‑market finds, seasoning roasted beet salad with goat cheese and walnuts, mastering miso‑glazed salmon, and occasionally whipping up plant‑based tacos with
    jackfruit, all while they savor a perfectly brewed pour‑over using Ethiopian Yirgacheffe beans.
  core: Dianna Roberts balances a data‑driven career with a vibrant artistic life, habitually juggling spreadsheets and sketchbooks, and they can’t resist the late‑night temptation of a fresh paint set
    or a new Excel formula.
background:
  cultural: Born and raised in Brooklyn’s vibrant Black community, Dianna grew up amidst a blend of Southern family traditions, Caribbean influences, and the cultural dynamism of New York City. She maintains
    strong ties to her church and local community centers, where cultural events like Caribbean Carnival and Afro‑centric art festivals are celebrated. Her upbringing instilled a deep appreciation for African
    diaspora arts, music, and storytelling, which she continues to explore through museum visits and literary pursuits. Dianna values education, resilience, and collective uplift, often supporting Black‑owned
    businesses and advocating for socio‑economic equity within her neighborhood.
attributes:
  skills: '[''Data Analysis (Excel, Power BI, Tableau, SQL)'', ''Statistical Modeling (Python, R)'', ''Business Process Optimization'', ''Strategic Planning'', ''Financial Forecasting'', ''Project Management
    (Agile, Waterfall)'', ''Stakeholder Communication'', ''Report Writing'', ''Presentation Design'', ''Change Management'', ''Design Thinking'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching urban landscapes'', ''Attending jazz and hip‑hop concerts'', ''Practicing yoga'', ''Exploring farmers’ markets and cooking'', ''Reading African
    American literature and non‑fiction'', ''Mentoring high‑school students in data analytics'', ''Participating in community garden projects'']'
  career_goals: Dianna aims to advance into senior leadership, ideally as a Director of Strategy or a senior manager overseeing data‑driven decision making for community‑focused initiatives in New York
    City. She plans to pursue an MBA to deepen her strategic expertise and broaden her network. A core ambition is to champion inclusive management practices, creating mentorship programs for women of color
    in analytics and business. She also hopes to lead cross‑functional projects that improve economic opportunities for small Black‑owned businesses in Brooklyn, leveraging her analytical skills to drive
    measurable impact.
