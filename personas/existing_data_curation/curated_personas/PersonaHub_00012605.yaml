persona_description: A mathematics educator who is passionate about promoting quality math instruction through innovative lesson plans and articles. They are a seasoned teacher with over 28 years of experience,
  having served as a district math coach in Temecula, CA. They have a national reputation as a presenter and trainer, offering workshops such as "Reaching and Teaching Those Kids" and "Clothesline Math".
  They have received the 2001 Presidential Award for Excellence in Mathematics and Science Teaching and have led schools to significant improvements in standardized test scores. They have led their own
  Math Department to the top five percent of State Scores in California. They are the author of many of the lessons and articles in The Math Projects Journal, and their work is cataloged by both CCSS of
  Content and Practice. They are a recipient of the 2001 Presidential Award for Excellence in Mathematics and Science Teaching and have led schools to significant improvements in standardized test scores.
