personas:
  professional: Fredrick Mcghee, a retired auto mechanic and part‑time carpenter in Greenville, channels their methodical troubleshooting and precise woodworking expertise into mentoring apprentices and
    rigorously documenting local oral histories with a data‑driven eye.
  sports: Fredrick Mcghee, an avid fisherman on the Tar River, spends weekends angling for catfish and bass, while they cheer for the Greenville Drive minor‑league baseball team and the Carolina Panthers,
    and occasionally join a senior walking club to stay active.
  arts: Fredrick Mcghee, a devoted listener of gospel and blues, fills evenings with Mahalia Jackson hymns and B.B. King guitar solos, and they often attend local church choir performances and sometimes
    play a harmonica during community gatherings.
  travel: Fredrick Mcghee, who enjoys leisurely road trips, has driven the historic Blue Ridge Parkway, explored Charleston’s waterfront, and hopes to visit New Orleans’ music districts and the Civil Rights
    Trail in Montgomery, balancing travel plans around health check‑ups and family visits.
  culinary: Fredrick Mcghee, a seasoned gardener, loves cooking roasted root vegetables, tomato‑basil soup, and honey‑glazed carrots harvested from their own plot, and they frequently serve meals with cracked
    corn mush and a dash of hot sauce, though they occasionally over‑salt dishes in pursuit of flavor.
  core: Fredrick Mcghee blends lifelong curiosity for mechanics and woodworking with a competitive chess mind, steadfast routines, a love of gospel, and diligent health and financial habits, while they
    preserve independence through a touch of skeptical pragmatism.
background:
  cultural: Born in 1939 in the Jim Crow South, Fredrick grew up in a close‑knit African‑American community in Greenville, where family, church, and mutual aid were central. He experienced the civil‑rights
    movement firsthand, which fostered a strong sense of resilience and independence. Family gatherings feature traditional Southern cooking, storytelling, and gospel singing, all of which have shaped his
    values of self‑reliance, community service, and respect for heritage. His cultural identity is reflected in his love for blues music, commitment to mentoring younger generations, and dedication to preserving
    the collective memory of his community.
attributes:
