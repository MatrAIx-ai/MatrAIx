  career_goals: Although retired, Fredrick aims to stay actively engaged by mentoring apprentices in auto repair and woodworking through local community programs. He hopes to compile a memoir of his experiences
    during the civil‑rights era, preserving the stories of Greenville's black community for future generations. Maintaining his independence and health is a priority, so he sets personal goals for daily
    walking and regular health check‑ups. Additionally, he aspires to become proficient with a tablet to digitize his oral‑history recordings.
