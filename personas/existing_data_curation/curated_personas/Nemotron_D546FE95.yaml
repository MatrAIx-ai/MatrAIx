  hobbies: '[''Sketching'', ''Digital painting'', ''Landscape photography'', ''Reading fiction and poetry'', ''Hiking'', ''Birdwatching'', ''Journaling'', ''Knitting'', ''DIY woodworking'', ''Listening
    to art and science podcasts'']'
  career_goals: Jayne aspires to complete her high school education through a GED program and then enroll in a post‑secondary visual arts program, focusing on illustration and environmental design. She
    dreams of combining her love for art with Alaska's natural beauty by becoming a freelance illustrator who creates artwork for wildlife publications, tourism brochures, and educational materials. In
    the longer term she hopes to work with a state park service or a local museum, curating exhibits that highlight the cultural and ecological stories of the Matanuska‑Susitna region. She also wants to
    develop a small online platform where she can sell handcrafted prints and offer art‑therapy workshops for youth in her community.
