personas:
  professional: Jackeline Sola is a meticulous real‑estate appraiser in Los Angeles County, leveraging her strong analytical abilities, advanced Excel and GIS expertise, and bilingual communication skills
    to produce precise property valuations while maintaining the structured, reliable workflow they thrive on.
  sports: Jackeline Sola enjoys low‑impact fitness, attending sunrise yoga classes at a studio near Griffith Park and cheering on the Los Angeles Lakers during the basketball season, while they also participate
    in a community hiking group that explores the trails of the Santa Monica Mountains on weekends.
  arts: Jackeline Sola finds solace in reading contemporary fiction like 'The Vanishing Half' and personal‑development books by Brené Brown, while their artistic palate includes listening to the soulful
    guitar of Andrés Segovia, watching indie films by Greta Gerwig, and attending local gallery openings featuring muralist works that echo their heritage.
  travel: Jackeline Sola prefers thoughtfully planned trips that balance cultural immersion and relaxation, having explored the historic streets of Oaxaca and the coastal cliffs of Big Sur, and they dream
    of a solo retreat to the Japanese gardens of Kyoto, though they budget carefully to keep travel within their modest savings.
  culinary: Jackeline Sola delights in crafting traditional corn‑based dishes such as pupusas and tamales, expertly layering masa, refried beans, and queso fresco, while they also experiment with quinoa
    salads, avocado toast, and fresh herbs from their balcony garden, showcasing an intermediate cooking skill that blends comfort food with health‑focused creations.
  core: Jackeline Sola is a detail‑oriented real‑estate analyst who channels their worry into structured routines, lives with a touch of anxiety, finds calm in yoga and cooking, and occasionally over‑spends
    on specialty ingredients for their beloved pupusas.
background:
  cultural: Jackeline is a first‑generation American of Salvadoran descent. Raised in a close‑knit Salvadoran community in Los Angeles, she grew up bilingual, celebrating traditions such as Día de los Faroles
    and family gatherings featuring pupusas. Her cultural heritage informs her values of cooperation, harmony, and familial responsibility. She often participates in local cultural festivals, maintains
    connections with relatives in El Salvador, and incorporates Salvadoran perspectives into her professional work, especially when serving clients from similar backgrounds.
attributes:
  skills: '["Real Estate Valuation", "Market Data Analysis", "GIS Mapping", "Advanced Excel & Data Modeling", "Regulatory Compliance", "Bilingual Communication (English/Spanish)", "Project Coordination",
    "Time Management"]'
  hobbies: '["Yoga and Mindfulness Meditation", "Cooking Salvadoran Cuisine", "Balcony Gardening", "Nature Walks in Griffith Park", "Reading Contemporary Fiction and Self‑Help Books", "Volunteering with
    Salvadoran Community Organizations"]'
  career_goals: Jackeline aims to become a senior property assessor within Los Angeles County, ultimately leading a team of appraisers. She plans to obtain the Certified General Appraiser designation and
    pursue continuing education in urban planning to broaden her expertise. While she values a stable, predictable career path, she also hopes to develop a specialty in assessing properties within Salvadoran
    immigrant communities, bridging cultural understanding with professional service. In the longer term, she envisions contributing to policy development that improves equitable property assessment practices.
