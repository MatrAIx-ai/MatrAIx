  career_goals: He aims to secure a role as a data analyst or research associate within a Chicago‑based organization that values structured processes and community impact. Seeking stability and clear career
    progression, he plans to obtain professional certifications in data science and project management within the next two years. He envisions leveraging his analytical skills to contribute to projects
    that improve public health outcomes or urban infrastructure, aligning his practical mindset with a desire to give back to his neighborhood. While ambitious, he remains mindful of his tendency toward
    worry, so he prioritizes workplaces with supportive team cultures and predictable workflows.
