  hobbies: '[''Fishing'', ''Grilling'', ''Collecting vintage kitchen tools'', ''Watching western movies'', ''Reading mystery novels'', ''Journaling'', ''Guided meditation'', ''Pool tournaments'', ''Attending
    Texas Tech football games'', ''Community rodeos'']'
  career_goals: Walter aims to transition from line‑cook duties to a supervisory role where he can shape and standardize kitchen routines. Over the next few years he plans to earn a formal culinary certification,
    complete a management course, and become a shift manager at his current restaurant. Ultimately, he hopes to open a modest, family‑run diner that serves familiar comfort food to the Lubbock community,
    providing a stable schedule and a predictable workflow that aligns with his preference for routine. He also wants to develop a small catering side‑business focused on low‑stress events like local church
    gatherings and family celebrations.
