  career_goals: Although officially retired, Francisco aims to formalize his long‑standing side business of selling homemade Salvadoran dishes at local farmer’s markets, eventually opening a modest neighborhood
    eatery that highlights traditional recipes. He plans to obtain his GED to qualify for volunteer coordinator positions at the local community center, where he hopes to lead after‑school programs and
    sports leagues for at‑risk teens. Additionally, he aspires to become a certified small‑business mentor through a city‑run entrepreneurship program, helping other Salvadoran immigrants launch and grow
    their own enterprises.
