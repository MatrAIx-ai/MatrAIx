personas:
  professional: A meticulous digital archivist‑in‑training, Janice Jones leverages her research expertise, Zotero mastery, and project‑management rigor to remotely curate scholarly collections, edit academic
    manuscripts, and design digital exhibitions, all while channeling her solitary love of classic literature and neighborhood bird‑watching into a career that balances curiosity with practicality, and
    they thrive in structured, low‑stress environments.
  sports: Janice Jones enjoys low‑intensity fitness, joining the Ruffner Mountain Nature Preserve walking group for weekly hikes, following the Birmingham Barons baseball season, practicing gentle yoga
    at home, avoiding high‑impact team sports that would disrupt her need for solitude, and they schedule these activities in a Trello board to keep their routines orderly.
  arts: Janice Jones expresses her artistic side through analog photography of Birmingham’s Art Deco buildings, poetry inspired by Emily Dickinson, intricate Fair Isle knitting, and digital curation of
    visual essays using Adobe InDesign, drawing creative influence from Ansel Adams and the southern photographic legacy of William Eggleston, and they often weave reflections on history into each piece.
  travel: Janice Jones plans solo, introspective trips to historic literary cities like Oxford, the colonial charm of Charleston, and the tranquil gardens of Kyoto, meticulously organizing itineraries in
    Trello, favoring train travel over flights when possible, reserving mornings for bird‑watching wherever she stays, and they relish the quiet moments of discovery in each destination.
  culinary: Janice Jones tends a balcony herb garden of rosemary, thyme, and basil, flavors her simple lemon‑herb salmon and herb‑infused olive oil with these greens, experiments with Korean bibimbap on
    occasional weekends, treats herself to a monthly Southern barbecue brunch featuring smoked brisket and pickled collards, and they savor the ritual of cooking as a meditative extension of their garden
    care.
  core: Janice Jones is a solitary, hyper‑organized scholar who channels her curiosity into digital archives and quiet hobbies, yet wrestles constantly with anxiety that shadows even her most disciplined
    routines, and they find solace in structured solitude.
background:
  cultural: Janice grew up in a middle-class white family in Birmingham, Alabama, where Southern cultural traditions shaped her worldview. Her upbringing emphasized hospitality, community responsibility,
    and a strong sense of courtesy, reflected in regular attendance at her family’s United Methodist church. These values cultivated her kindness and cooperative nature, while the region’s rich historical
    backdrop, especially the civil‑rights movement, sparked her interest in history and archival work. Family gatherings often revolve around Southern comfort foods such as fried chicken and collard greens,
    and community events like high-school football games reinforced a sense of belonging, even as Janice prefers quieter personal spaces. The blend of traditional Southern etiquette and exposure to Birmingham’s
    complex past continues to influence her appreciation for preserving local stories and cultural heritage.
attributes:
  skills: '[''Research and literary analysis'', ''Academic writing and editing'', ''Bibliographic management (Zotero, EndNote)'', ''Digital archiving and metadata tagging'', ''Advanced organization and
    project planning'', ''Microsoft Office Suite and Google Workspace proficiency'', ''Basic graphic design (Adobe InDesign, Canva)'', ''Self-directed learning via online courses'']'
  hobbies: '[''Reading classic literature'', ''Creative writing (poetry and essays)'', ''Balcony herb gardening'', ''Bird-watching at local nature preserve'', ''Knitting intricate patterns'', ''Crossword
    and puzzle solving'', ''Analog photography of historic architecture'', ''Online courses in digital humanities and archival theory'']'
  career_goals: Janice aims to transform her disciplined work ethic and love for independent scholarship into a sustainable remote career. Over the next two years, she plans to enroll in a Master’s program
    in Library and Information Science or Museum Studies, focusing on digital curation and community heritage initiatives. Her long-term ambition is to become a digital archivist or freelance academic editor,
    providing archival services for scholars and nonprofit organizations while maintaining a structured, low-stress work environment that aligns with her preference for solitude. Concurrently, she hopes
    to develop a personal digital oral-history archive documenting the stories of Birmingham residents, merging her curiosity for local history with her practical organizational skills.
