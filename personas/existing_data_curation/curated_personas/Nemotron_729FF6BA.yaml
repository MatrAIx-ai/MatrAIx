personas:
  professional: Alberto Morel, a seasoned handyman and aspiring community mentor, leverages their carpentry, plumbing, and electrical troubleshooting expertise to lead low‑stress DIY workshops for local
    teens and seniors, balancing a meticulous, organized approach with a flexible, curiosity‑driven mindset and never leaving home without their trusted pocket‑sized notepad for quick sketches.
  sports: Alberto Morel embraces low‑impact fitness, spending mornings tending the garden and weekends fishing on the St. Johns River—often in their weathered fishing hat—while cheering the Jacksonville
    Jaguars and joining a casual adult softball league that meets after work on summer evenings.
  arts: Alberto Morel finds artistic fulfillment in crafting hand‑carved wooden stools and tables while unwinding to classic ranchera melodies from Vicente Fernández and mariachi recordings by José Alfredo
    Jiménez, recording ideas in a battered notebook that travels to every library book club meeting where they discuss historical documentaries and biographies.
  travel: Alberto Morel prefers relaxed, self‑planned road trips, having explored the historic streets of St. Augustine and the farm‑fresh markets of Asheville, often navigating with a paper map and dreaming
    of a culinary pilgrimage to a renowned cooking hub in the Southwest and a nature immersion along the Pacific Northwest’s Cascade trails.
  culinary: Alberto Morel, an adept home chef, lovingly prepares mole, tamales, and pozole using garden‑grown chilies, tomatillos, and oregano, while experimenting with smoked trout from the St. Johns River
    and occasionally indulgently layering extra chilies for a fiery twist, reflecting their passion for blending tradition with personal culinary experiments.
  core: Alberto Morel, a quietly curious handyman who finds solace in gardening and woodworking, often worries about minute details yet brightens community gatherings with homemade mole and patient DIY
    lessons, always keeping a trusty pocket‑sized notepad on hand.
background:
  cultural: Alberto was born to parents who emigrated from the state of Jalisco, Mexico, and grew up in a bilingual household where Spanish was spoken daily and Catholic traditions were central. He celebrates
    Día de los Muertos, Navidad, and Mexican Independence Day with his family, preparing traditional foods and sharing stories. After moving to Jacksonville in his early adulthood, he blended his Mexican
    customs with Floridian lifestyle, maintaining close ties to the local Mexican‑American community, attending cultural events, and passing his heritage on to his children and grandchildren. His values
    of familismo, respeto, and community service reflect both his Mexican upbringing and his adopted Southern environment.
attributes:
  skills: '["Carpentry", "Basic plumbing", "Electrical troubleshooting", "Home maintenance", "Gardening and landscaping", "Bilingual Spanish-English communication", "Basic computer literacy (email, budgeting,
    online research)", "Volunteer coordination"]'
  hobbies: '["Vegetable gardening", "Fishing", "Woodworking", "Cooking traditional Mexican cuisine", "Listening to ranchera and mariachi music", "Reading historical non-fiction", "Watching documentaries",
    "Participating in a small book club"]'
  career_goals: Alberto aims to channel his practical knowledge into low‑stress, community‑focused activities. He hopes to mentor his grandchildren and local teens in basic home‑repair skills, and to volunteer
    part‑time at the senior center, teaching simple DIY projects. He also intends to complete a community‑college certificate in horticulture to enhance his gardening hobby, and to compile a family cookbook
    that blends traditional Mexican recipes with his own culinary twists. These goals reflect his curiosity, desire for harmony, and need for manageable, stress‑aware pursuits.
