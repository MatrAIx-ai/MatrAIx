persona_description: A researcher from the Istituto Auxologico Italiano, Milan, Italy, who specializes in the evaluation and treatment of eating disorders through the use of virtual reality (VR) environments.
  Her research has focused on comparing the effects of exposure to real food, virtual food, and photographs of food in patients affected by eating disorders. Her findings suggest that virtual stimuli are
  as effective as real ones and more effective than static pictures in generating emotional responses in eating disorder patients.
