  hobbies: '[''Sketching in journal'', ''Watercolor painting'', ''Nature photography'', ''Acoustic guitar practice'', ''Reading experimental poetry'', ''Solving jigsaw puzzles'', ''Hiking Sierra Nevada
    trails'', ''Collecting vintage postcards'', ''Participating in online art challenges'', ''Creating short vlogs about art process'']'
  career_goals: Celia aims to complete her GED within the next year so she can pursue a certificate in graphic design at a community college. In the meantime she plans to grow her Instagram and TikTok presence,
    sell prints and handmade jewellery through an Etsy shop, and take on small illustration commissions for local businesses. Her long‑term ambition is to work as a freelance illustrator for children’s
    books or independent video games, blending her love of storytelling with her visual style while maintaining the flexible, solitary work environment she thrives in.
