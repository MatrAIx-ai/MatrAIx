personas:
  professional: Celia Cowan, a 17-year-old self-taught visual artist and budding illustrator, leverages Procreate, watercolor, and an eye for natural light to secure small commissions from local cafés while
    building an Instagram feed that showcases their experimental poetry-illustration hybrids, even though they often postpone deadlines in favor of spontaneous creative bursts.
  sports: Celia Cowan spends weekends trekking Sierra Nevada trails with the local Reno Trailblazers club, occasionally joining community yoga sessions to stretch after hikes, and passionately follows the
    Reno Aces baseball team and the Nevada Wolf Pack basketball squad, even though they prefer solitary exercise over competitive team sports.
  arts: Celia Cowan immerses themselves in contemporary art circles, drawing inspiration from the luminous landscapes of Ansel Adams, the vibrant palettes of Georgia O'Keeffe, and the lyrical storytelling
    of poet Ocean Vuong, while regularly attending Reno's First Friday Gallery Walks and streaming indie folk musicians like Sufjan Stevens and Phoebe Bridgers for creative fuel.
  travel: Celia Cowan prefers low-key road trips that balance solitary contemplation with scenic variety, often driving the 150-mile stretch from Reno to the awe-inspiring cliffs of Red Rock Canyon, dreaming
    of a future backpacking adventure through Kyoto’s bamboo forests, and occasionally joining the Burning Man art festival to absorb experimental installations, though they usually travel on a shoestring
    budget.
  culinary: Celia Cowan enjoys simple, hearty meals that echo the high-desert vibe, frequently cooking quinoa-black bean bowls with roasted sweet potatoes, tangy lime-coriander dressing, and sliced avocado,
    while treating themselves to a steaming bowl of spicy pho on rainy evenings and experimenting with homemade granola infused with local honey and toasted pepitas, even though they sometimes order pizza
    late at night during a creative sprint.
  core: Celia Cowan is a solitary, curiosity-driven teen who transforms frontier solitude into vibrant artwork, obsessively collects vintage postcards, procrastinates on deadlines, and fiercely guards their
    independence.
background:
  cultural: Celia grew up in a predominantly white, middle‑class neighborhood on the outskirts of Reno, Nevada. The high desert environment and nearby Sierra Nevada mountains nurtured her love of solitude
    and self‑reliance. While her family emphasizes practical work and modest living, Reno’s small but vibrant arts community—annual art fairs, local galleries, and the creative energy spilling from the
    University of Nevada’s art programs—exposed her to a variety of contemporary and experimental artistic expressions. These regional influences, combined with the independent frontier spirit of western
    Nevada, have shaped her eclectic tastes and her preference for forging a personal creative path outside conventional structures.
