  career_goals: Josefa aims to leverage her organizational strengths and culinary passion to launch a home-based catering or baked-goods business that serves local events and cultural festivals. She plans
    to complete an online certification in culinary arts and small-business management while also pursuing a GED if needed. In the longer term, she envisions becoming a certified home health aide, combining
    her first-aid training with a desire to support families in her neighborhood. Financial independence and contributing to her family's stability are central to her ambitions.
