personas:
  professional: Josefa Ortega, a meticulous home‑based catering aspirant, channels their bilingual fluency, rigorous budgeting skills, and competitive drive into creating flawless Tex‑Mex fusion menus for
    local festivals, while methodically planning each order to meet tight deadlines.
  sports: Josefa Ortega, a casual jogger who frequents the city park’s morning trail, avidly supports the local soccer club City FC and cheers for the regional baseball team the River Hawks, while also
    participating in the Green Thumb Gardening Club’s weekend community clean‑up runs to stay active.
  arts: Josefa Ortega, an enthusiastic crocheter and sewing hobbyist, draws artistic inspiration from the melodic storytelling of Los Tigres del Norte, the vibrant paintings of Frida Kahlo, and the imaginative
    cinema of Guillermo del Toro, often weaving these cultural motifs into their DIY home décor projects.
  travel: Josefa Ortega, who plans weekend getaways using detailed spreadsheets, prefers immersive culinary trips like their recent visit to Oaxaca’s street‑food markets and dreams of exploring Chiang Mai’s
    night markets, balancing adventure with budget constraints.
  culinary: Josefa Ortega, a self‑taught chef who perfects traditional mole poblano, enchiladas rojas, and experimental chipotle‑infused pulled pork tacos, seasons each dish with home‑grown cilantro, oregano,
    and roasted chilies from their garden, and routinely bakes conchas and churros to share with friends, showcasing a blend of tradition and innovation.
  core: Josefa Ortega, a methodical 26‑year‑old who balances a competitive entrepreneurial spirit with solitary crochet sessions, often bursts into spontaneous salsa dancing when a favorite song plays,
    yet can’t resist binge‑watching reality cooking shows late into the night.
background:
  cultural: Josefa is a first-generation Mexican-American raised in the Hispanic community of Pasadena, Texas. She grew up in a bilingual household where Spanish language, Catholic traditions, and Mexican
    holidays such as Día de los Muertos and Las Posadas were integral to family life. Her cultural identity blends Mexican heritage with Texan influences, evident in her food preferences, music, and strong
    emphasis on family cohesion and community involvement.
