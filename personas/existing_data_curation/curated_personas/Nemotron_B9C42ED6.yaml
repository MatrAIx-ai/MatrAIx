  career_goals: Victoria aims to advance to a district‑level leadership role, such as Assistant Superintendent of Instruction, where she can shape systemic educational policies that honor both evidence‑based
    innovation and the practical realities of rural schools. She is passionate about building sustainable professional‑development programs that empower teachers to experiment with new pedagogies while
    retaining classroom stability. Long‑term, she envisions establishing her own consultancy focused on helping small‑town districts integrate technology and data analytics without compromising teacher
    autonomy or community values. Throughout her career progression, she seeks to maintain a balanced workload that preserves her need for quiet, reflective time.
