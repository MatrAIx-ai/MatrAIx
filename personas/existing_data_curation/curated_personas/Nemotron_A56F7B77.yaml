  hobbies: '[''Acoustic guitar'', ''Community theater'', ''Landscape painting'', ''Woodworking'', ''Motorcycle restoration'', ''Hiking'', ''Bluegrass festivals'', ''Barbecue cooking'', ''Volunteer arts
    tutoring'', ''Documentary watching'']'
  career_goals: Jonathan aims to advance to a shift‑supervisor role within the next two years, followed by obtaining an OSHA certification and leading the plant’s safety committee. He envisions eventually
    moving into plant‑manager responsibilities, leveraging his experience in operations and people leadership. Parallel to his manufacturing career, he aspires to open a small community workshop where he
    can blend his production skills with his passion for art—offering woodworking classes, furniture restoration, and hosting local art events. He also hopes to earn a certification in CNC programming to
    stay at the forefront of manufacturing technology.
