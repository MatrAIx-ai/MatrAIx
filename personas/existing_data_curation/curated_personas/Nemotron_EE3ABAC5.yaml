personas:
  professional: Jose Llanos is a self‑taught full‑stack software developer who blends deep expertise in JavaScript, React, Node.js, Python, Django, and AWS with a natural flair for UI/UX design, and they
    steer collaborative hackathon teams through rapid prototyping while thriving in a relaxed, occasionally disorganized workflow that fuels their creative problem‑solving.
  sports: Jose Llanos fuels their fitness by joining the Austin Trailblazers hiking club for weekend Hill Country treks, dancing salsa at community centers to keep their heart rate up, and cheering for
    Austin FC soccer matches while occasionally catching Texas Rangers baseball games in the spring, reflecting a love for group activities and spontaneous outdoor fun.
  arts: Jose Llanos immerses themselves in Austin’s creative pulse, photographing vibrant murals by local street‑artist Rafael Esparza, grooving to live sets by indie band Okkervil River and salsa legend
    Eddie Santiago on Sixth Street, and sketching UI concepts inspired by the bold graphic style of Barbara Kruger, which together shape their interdisciplinary aesthetic.
  travel: Jose Llanos favors spur‑of‑the‑moment road trips, often detouring to New Mexico’s White Sands after a weekend hackathon, while also planning dream trips to Kyoto’s temples and Barcelona’s street
    festivals, and they balance their craving for cultural immersion with a modest travel budget and a flexible itinerary.
  culinary: Jose Llanos channels their culinary curiosity by mastering mole poblano—slow‑cooking chocolate, chilies, and spices—reinventing tamales with a quinoa‑corn mash, and creating fusion tacos that
    blend Korean bulgogi with avocado salsa, all seasoned with fresh cilantro, lime, and a pinch of smoked paprika.
  core: Jose Llanos is a 35‑year‑old full‑stack dev whose curiosity, love for salsa nights, and occasional disorganized schedule turn chaotic moments into creative breakthroughs across code, canvas, and
    cuisine, and they continuously seek fresh inspiration in every project.
background:
  cultural: Jose was raised in a bilingual Mexican‑American household in Texas, where Spanish and English flowed interchangeably at home. His parents instilled a deep respect for family, community, and
    Catholic traditions, celebrating holidays such as Día de los Muertos and Las Posadas with vibrant food, music, and storytelling. Growing up in a tight‑knit Latino neighborhood, he participated in local
    cultural festivals, learned to play the guitarrón, and helped organize neighborhood clean‑up events. The loss of his spouse has strengthened his connection to extended family and community support groups,
    where he often volunteers to mentor youth interested in technology. Living in Austin, he blends his heritage with the city’s progressive vibe, attending Latinx art exhibitions, supporting Hispanic‑owned
    businesses, and contributing to open‑source projects that amplify underrepresented voices in tech.
