  career_goals: Jose aims to transition from a project‑based developer to a technical leader who can steer multidisciplinary teams toward innovative products. He aspires to obtain AWS and Google Cloud certifications
    to deepen his cloud architecture expertise, and eventually enroll in a bachelor's program in Computer Science to formalize his knowledge. Long‑term, he dreams of launching a startup that blends technology
    with Latin American cultural storytelling—using AR/VR and interactive web platforms to preserve and share community art, music, and oral histories. He also seeks mentorship opportunities to guide aspiring
    Latino developers, believing that his own unconventional path can inspire others to pursue tech careers despite traditional educational barriers.
