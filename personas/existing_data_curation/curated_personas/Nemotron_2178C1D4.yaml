  career_goals: Driven by her strong achievement orientation, Koraima seeks to become the highest-producing insurance agent in the Quebradillas region within the next two years and earn the regional Agent
    of the Year award. She aims to mentor a new cohort of junior agents, sharing her disciplined sales process and community-focused approach. In the longer term she envisions moving into agency management,
    potentially establishing her own boutique firm that specializes in retirement and health insurance for seniors, a growing market in Puerto Rico. Additionally, she hopes to launch a community-wide financial-literacy
    workshop series to help neighbors make informed insurance decisions and reduce the stress she often feels about financial uncertainty.
