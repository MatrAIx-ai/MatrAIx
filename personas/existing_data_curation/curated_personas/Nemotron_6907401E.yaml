  career_goals: Even at five, Malcolm dreams of a future where he can create and build things that help people. He often talks about becoming an inventor or a hands‑on engineer who designs fun playground
    equipment or simple machines. Influenced by his love of nature, he also imagines being a scientist who explores the forests and streams of the Pacific Northwest. His career aspirations blend his curiosity
    about how things work with a practical desire to see his ideas become real, tangible objects.
