personas:
  professional: Malcolm David, a budding builder in the sandbox, uses their curiosity about how things fit together with a practical eye for stability, constructing towers of sand and blocks that sometimes
    tumble when a sudden burst of spontaneity takes over.
  sports: Malcolm David, an enthusiastic member of the Little Tigers soccer club and a regular at the community swimming pool, loves the thrill of chasing a ball and splashing in water, but resists overly
    rigid drills, preferring free‑play games that let their imagination run wild.
  arts: Malcolm David, a devoted fan of 'Sesame Street' and 'The Cat in the Hat', spends afternoons drawing dinosaurs, humming the 'Rubber Duckie' song, and dabbling in finger painting with bright primary
    colors, often ending up with paint smudges on their hands and clothes.
  travel: Malcolm David, a tiny explorer who has visited the nearby zoo, the sandy shoreline of Seaside Beach, and a family road‑trip to the Grand Canyon, prefers spontaneous stops at quirky roadside attractions
    over strict itineraries, turning each journey into an adventure of discovery.
  culinary: Malcolm David, a selective eater who loves cheese pizza, chicken nuggets, and mac‑and‑cheese, yet shows curiosity for sweet mango slices and strawberry yogurt, enjoys spreading peanut butter
    on toast, and often sneaks an extra sip of juice from the fridge.
  core: Malcolm David blends a love of discovery with a practical touch, impulsively builds and explores while juggling moments of cooperation and assertiveness, turning everyday play into a lively, mess‑filled
    adventure.
background:
  cultural: Malcolm comes from a white American family rooted in the Pacific Northwest. His parents, who trace their ancestry to British and German heritage, have raised him in Kirkland, Washington, where
    outdoor activities and community gatherings are a regular part of life. He celebrates typical American holidays such as Thanksgiving, Christmas, and the Fourth of July, often with neighborhood barbecues
    and festive decorations. The family also embraces local traditions like weekend trips to nearby state parks, berry picking, and attending the annual Kirkland Summer Festival, which expose him to the
    region’s emphasis on nature, sustainability, and community involvement. These cultural experiences shape his appreciation for both the practical aspects of everyday life and the curiosity‑driven exploration
    of the world around him.
