  hobbies: '[''Home vegetable gardening'', ''Cooking traditional soul food recipes'', ''Quilting and needlework'', ''Singing in church choir'', ''Reading historical biographies and African‑American literature'',
    ''Volunteering at community garden projects'', ''Walking and bird watching in local parks'', ''Listening to blues and jazz music'', ''Participating in local farmers market'', ''DIY home organization
    projects'']'
  career_goals: Irma aims to transition into a supervisory role within a larger agricultural operation, leveraging her methodical approach to improve efficiency and sustainability. She plans to obtain a
    Certified Crop Advisor credential and explore certification in organic farming. Long‑term, she envisions establishing a small urban farm or greenhouse in Saint Paul that supplies fresh produce to local
    schools and food banks, while also mentoring youth interested in agriculture through workshops and community garden programs.
