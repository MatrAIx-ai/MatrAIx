    chess, crosswords)"]'
  hobbies: '["Rose and heirloom tomato gardening", "Reading historical fiction and nonfiction", "Genealogical research", "Knitting and quilting", "Volunteering at the local food bank", "Attending historical
    society lectures", "Church choir participation", "Birdwatching in the Arkansas River wetlands", "Playing bridge at the senior center", "Listening to classic country music concerts", "Exploring the Tulsa
    Arts District"]'
  career_goals: Mikaela aims to deepen her community impact by volunteering as a senior mentor at the Tulsa Public Library, guiding younger volunteers in research and event organization. She aspires to
    curate an oral‑history project for Wagoner County, preserving stories of longtime residents. Completing a GED or adult‑education course in computer applications is a personal milestone she hopes to
    achieve this year. She plans to author a memoir that weaves personal history with the broader narrative of mid‑century Oklahoma. Additionally, she seeks leadership in a local senior advocacy group to
    improve transportation and health services for older adults. On a personal health front, she intends to maintain a daily walking routine of at least 5 miles and to compete in the regional bridge tournament.
