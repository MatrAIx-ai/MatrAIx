personas:
  professional: Mikaela Mulligan, a meticulous community organizer and senior mentor, channels their curiosity and practical expertise into coordinating oral‑history projects for Wagoner County, leading
    volunteer events at the Tulsa Public Library, and orchestrating senior‑center activities with a critical, results‑focused approach.
  sports: Mikaela Mulligan keeps fit through daily five‑mile walks along the Arkansas River and weekly birdwatching outings, follows the Tulsa Roughnecks soccer team and the Oklahoma City Thunder with a
    competitive spirit, and channels strategic energy into bridge tournaments at the senior center, balancing low‑impact exercise with community sports enthusiasm.
  arts: Mikaela Mulligan enjoys classic country concerts featuring Willie Nelson and Dolly Parton, regularly visits the Tulsa Arts District to view regional folk art exhibitions, and draws inspiration from
    these performances for their quilting and knitting projects, often humming the melodies while stitching.
  travel: Mikaela Mulligan prefers meticulously planned trips, having journeyed by train to historic Savannah, flown to coastal villages in Ireland to trace family roots, and now dreams of a leisurely road‑trip
    through the Great Smoky Mountains with grandchildren, balancing budget awareness with a love for cultural discovery.
  culinary: Mikaela Mulligan excels at Midwestern comfort cooking, frequently preparing chicken and dumplings, cornbread, and beef stew with reduced sodium, while relishing fresh heirloom tomato salads
    tossed with basil, mozzarella, and balsamic vinegar, and baking apple pie using Granny Smith apples from their garden.
  core: Mikaela Mulligan blends methodical pragmatism with a curious love for gardening, genealogy, and community service, balancing disciplined budgeting and daily walks with occasional indulgences in
    classic country music and crafty quilting.
background:
  cultural: Mikaela grew up as a white American in post‑World War II Oklahoma, shaped by the resilience of families who endured the Great Depression and the oil‑boom era. Her surname reflects Irish ancestry;
    family stories speak of relatives who migrated from Ireland to the Midwest in the early 1900s before settling in Tulsa. The values of self‑reliance, community service, and modest hospitality—hallmarks
    of Midwestern and Southern Plains culture—are central to her worldview. She was raised in a modest, faith‑oriented household, attending a local Protestant church that emphasized charity and fellowship.
    Regional traditions such as family gatherings around hearty meals, participation in county fairs, and respect for the land have informed her practical approach to life. While embracing contemporary
    ideas, she remains rooted in the cultural tapestry of Oklahoma's small‑town and urban blend.
attributes:
  skills: '["Home budgeting and finance management", "Event planning and coordination", "Vegetable gardening and sustainable composting", "Basic home repair (plumbing, carpentry)", "Traditional Midwestern
