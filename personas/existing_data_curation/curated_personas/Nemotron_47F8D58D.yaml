personas:
  professional: Jason Duncan, a retired manufacturing mechanic turned community handyman, leverages his decades of mechanical troubleshooting, carpentry, and home‑repair expertise to mentor neighbors, lead
    senior‑center workshops, and channel his love of structure and competitive edge into winning local bridge tournaments and authoring a concise handbook on home maintenance, and they often volunteer to
    teach basic woodworking at the community center.
  sports: Jason Duncan follows the Indianapolis Colts and the Chicago White Sox, participates in a senior walking club that meets at the local park for low‑impact cardio, and treats his early‑morning fishing
    trips on the Wabash River as both recreation and gentle arm‑strength exercise, and they enjoy discussing game stats over coffee after each walk.
  arts: 'Jason Duncan’s artistic side shines through his admiration for the woodworking designs of Sam Maloof, his fondness for Johnny Cash’s classic album "American IV: The Man Comes Around," and his appreciation
    of Grant Wood’s regional paintings, often playing his vintage record player while assembling model‑train scenery, and they occasionally attend local gallery openings to stay inspired.'
  travel: Jason Duncan plans leisurely road trips with his wife, preferring well‑organized itineraries that include visits to Yellowstone and the Great Smoky Mountains National Parks, while budgeting each
    outing to ensure his modest pension covers fuel, modest lodging, and occasional guided historic tours, and they love mapping out each stop on a paper atlas before departure.
  culinary: Jason Duncan, a competent home cook, favors farm‑to‑table meals like roasted chicken with rosemary potatoes, garden‑fresh vegetable stir‑fry featuring heirloom tomatoes and bell peppers, and
    a Sunday tradition of homemade apple crumble topped with crunchy oats and a drizzle of caramel, and they take pride in using produce harvested from their own garden whenever possible.
  core: Jason Duncan blends a meticulous, competitive spirit with a love for hands‑on craftsmanship, yet he sometimes misplaces his favorite wrench while daydreaming about winning the next bridge tournament,
    and they laugh it off as a reminder to slow down.
background:
  cultural: Jason grew up in a Midwestern, small‑town environment typical of Indiana, where family, church, and self‑reliance are core values. His cultural upbringing reflects Anglo‑American traditions,
    including celebrating holidays with community potlucks, participating in local fairs, and a strong work ethic shaped by the region’s manufacturing and agricultural heritage. These influences inform
    his practical outlook, structured daily routines, and commitment to community service.
