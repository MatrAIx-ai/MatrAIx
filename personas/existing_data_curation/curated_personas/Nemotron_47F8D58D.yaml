  career_goals: Although retired, Jason aims to stay active and independent by keeping his home and garden in peak condition, mentoring younger neighbors in practical trades, and completing a woodworking
    series of custom pieces for each grandchild. He hopes to travel with his wife to a few national parks, learn to use digital tools to stay connected with family, and ensure his financial affairs remain
    orderly for the next decade. A competitive streak motivates him to win the local senior bridge tournament and to achieve recognition for a small community handbook on home maintenance.
