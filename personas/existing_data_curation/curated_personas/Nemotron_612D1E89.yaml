  career_goals: Lakeshia aims to grow from day‑to‑day taxi driving into a leadership or entrepreneurial role within the local transportation sector. She plans to obtain a commercial driver’s license so
    she can manage larger vehicles or a small fleet, and she hopes to enroll in a community‑college associate program focused on logistics or small‑business management. Her long‑term ambition is to launch
    a community‑oriented rideshare service that emphasizes safety, flexible scheduling, and employment opportunities for other drivers in her neighborhood, while also securing a stable home for herself.
