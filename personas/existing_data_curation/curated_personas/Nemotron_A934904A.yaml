  hobbies: '["Drawing cartoons", "LEGO building", "Soccer", "Reading comic books", "Simple science experiments", "Scratch programming", "Listening to music", "Dancing", "Visiting museums and art galleries",
    "Helping in the kitchen"]'
  career_goals: Haseeb dreams of becoming a creator who can blend art and science. He imagines working as an inventor or engineer designing gadgets that help the environment, and also hopes to be a comic‑book
    artist who tells stories that inspire kindness. He is fascinated by space and looks forward to studying astronomy, perhaps one day becoming an astronaut or aerospace engineer. Above all, he wants to
    use his talents to help his community, maybe by teaching younger kids about art and science.
