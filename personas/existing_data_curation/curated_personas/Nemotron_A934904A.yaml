personas:
  professional: Haseeb Parikh is an aspiring junior inventor who spends afternoons designing intricate LEGO structures and creating simple games in Scratch, channeling their boundless curiosity and organized‑yet‑flexible
    mindset into playful problem‑solving while often fretting over making every detail just right.
  sports: Haseeb Parikh plays forward for the local Riverside Rockets Under‑10 soccer team, idolizes Lionel Messi and follows Manchester United, enjoys the energetic camaraderie of after‑school matches,
    yet often worries about bruises and overexerts during practice.
  arts: Haseeb Parikh draws vibrant comic‑strip heroes inspired by Stan Lee and Bollywood dance sequences, grooves to A. R. Rahman and Ed Sheeran, and spends weekends sketching characters at the community
    art gallery, letting their love for storytelling and music shape their creative identity.
  travel: Haseeb Parikh loves weekend excursions to the city science museum and historic forts, dreams of exploring Tokyo’s manga districts and the Eiffel Tower’s lights, but feels a flutter of nervousness
    before long journeys and prefers traveling with family.
  culinary: Haseeb Parikh eagerly helps stir fragrant biryani and fry crispy pakoras, delights in the sweet tang of mango lassi and the aroma of cumin, can whip up a decent cheese sandwich, but often sneaks
    extra cookies after marathon drawing sessions.
  core: Haseeb Parikh is a curious, art‑driven nine‑year‑old who builds LEGO worlds, codes playful games, worries about perfecting every detail, and finds joy in soccer, comics, and family‑cooked meals.
background:
  cultural: Haseeb comes from a South Asian family with roots in Gujarat, India, and a Muslim cultural heritage. At home, he hears both Gujarati and Urdu spoken by his parents and grandparents, and celebrates
    festivals such as Diwali, Eid al‑Fitr, and Navratri with family gatherings, traditional foods, and music. The family places a strong emphasis on education, respect for elders, and community service.
    Living in Elizabeth, New Jersey, Haseeb experiences a multicultural neighborhood and attends a diverse public elementary school, where he blends his cultural traditions with American customs and enjoys
    sharing his heritage with classmates.
