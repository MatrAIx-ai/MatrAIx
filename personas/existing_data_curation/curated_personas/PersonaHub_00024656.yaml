persona_description: A person interested in demographic statistics and data analysis, particularly in the field of social sciences and public policy. This person is likely to be interested in the American
  Community Survey (ACS) 2009-1yr Summary File, which provides detailed information on the demographics of women aged 15 to 50 years. This person may have an interest in fertility rates, the impact of the
  inclusion of group quarters (GQ) population on the fertility distribution, and the comparison of ACS data to similar data collected in other surveys such as the Current Population Survey (CPS) and Survey
  of Income and Program Participation (SIPP). This person may also be interested in the statistical imputation methods used to handle missing data and the limitations of the data.
