  hobbies: '[''Digital illustration'', ''Tango dancing'', ''Hiking in the Sonoran Desert'', ''Astrophotography'', ''Reading science fiction'', ''Exploring virtual reality experiences'', ''Cooking Argentine
    cuisine'', ''Playing the acoustic guitar'']'
  career_goals: Luz aims to pursue a PhD in physics or interdisciplinary science education within the next two years, with the long‑term goal of becoming a university professor who bridges STEM and the
    arts. She envisions leading research on innovative teaching methods that use visual and digital media to convey abstract concepts, and eventually shaping curriculum policies that expand access to high‑quality
    STEM education for underrepresented Latino students. Additionally, she aspires to develop educational technology tools—particularly immersive AR/VR platforms—that foster curiosity and creativity in
    the classroom.
