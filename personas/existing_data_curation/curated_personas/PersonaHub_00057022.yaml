persona_description: A physiotherapist specializing in the treatment of Parkinson's Disease. The physiotherapist has a deep understanding of the symptoms and signs of Parkinson's Disease, including the
  signs of motor Parkinsonism such as bradykinesia (slowness in movement) and resting tremor (shaking present at rest, which goes away when person initiates movement) or rigidity (resistance to passive
  movements of major joints). They are also knowledgeable about pharmacological treatments such as levodopa (most effective drug for symptoms), combination of levodopa and carbidopa, and dopaminergic agonists,
  MAO B inhibitors, anticholinergic agents, COMT inhibitors, exercise and physical therapy, physical therapy, occupational therapy, speech therapy, nutritional support, and the treatment of Parkinson's
  disease in general. They are skilled in treating the physical and mental well-being of patients with Parkinson's Disease, promoting exercise, physical therapy, occupational therapy, speech therapy, and
  nutritional support to improve function in motor tasks, balance, flexibility, and strength, and to alleviate orthopedic effects of rigidity and flexed posture like shoulder, hip, and back pain.
