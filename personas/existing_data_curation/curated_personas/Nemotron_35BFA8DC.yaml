personas:
  professional: Maritza Gomez, an 18‑year‑old fast‑food counter attendant, blends her bilingual fluency, swift POS mastery, and natural charisma to keep rush‑hour lines moving while casually spotlighting
    new menu items on TikTok, a strategy that fuels her ambition to become a shift supervisor and eventually run her own restaurant.
  sports: Maritza Gomez channels her energy into salsa dancing at a community dance club that meets every Thursday, joins friends for pick‑up basketball at the local park, and cheers for her hometown minor‑league
    baseball team, the Springfield Isotopes, while occasionally streaming the NBA's Los Angeles Lakers.
  arts: Maritza Gomez finds her creative spark during karaoke nights where they belt out hits by Shakira, Marc Antonio, and Los Cuatros, and they regularly watch performances by the Broadway‑inspired musical
    'In the Heights' and binge‑watch classic telenovelas starring Thalía for inspiration.
  travel: Maritza Gomez prefers spontaneous, budget‑friendly road trips to nearby towns like Austin and San Antonio for their vibrant food‑truck scenes, dreams of a future backpacking adventure through
    Oaxaca’s street‑food markets, and typically books last‑minute rides using rideshare apps rather than planning far‑ahead itineraries.
  culinary: Maritza Gomez loves experimenting with DIY twists on tacos al pastor, homemade elote with cotija cheese, and churro‑crusted chicken, often filming quick recipe hacks for TikTok while relying
    on staple ingredients like chipotle peppers, lime, and fresh cilantro to add bold flavor to their weeknight meals.
  core: Maritza Gomez is a sociable 18‑year‑old who turns everyday fast‑food hustle into a personal brand, constantly juggling spontaneous cravings, lingering anxiety, and a dream of one day serving her
    community from a quirky food‑truck.
background:
  cultural: Maritza was raised in a Mexican‑American household where Spanish was spoken alongside English. Family gatherings were centered around traditional dishes such as tamales, pozole, and homemade
    salsa, and holidays like Día de los Muertos and Cinco de Mayo were celebrated with music, colorful altars, and community feasts. She grew up attending a Catholic church in Mineral Springs, where she
    participated in church picnics and cultural outreach programs. Although she lives in rural Arkansas, she retains strong ties to her heritage through frequent visits to relatives in Texas and Mexico,
    and by incorporating Mexican flavors into her cooking experiments. Her bicultural experience blends the warmth and communal spirit of Mexican family life with the close‑knit community values of small‑town
    Arkansas.
attributes:
  skills: '[''Bilingual communication (English and Spanish)'', ''Customer service'', ''Cash handling'', ''POS system operation'', ''Food safety compliance'', ''Fast food preparation'', ''Multitasking under
    pressure'', ''Team collaboration'', ''Conflict de‑escalation'', ''Social media content creation'']'
  hobbies: '[''Salsa and cumbia dancing'', ''Karaoke'', ''Food vlog/TikTok content creation'', ''Exploring local food trucks'', ''Spontaneous road trips with friends'', ''Journaling'', ''Basic meditation/breathing
    exercises'', ''Volunteering at church youth group and cultural events'']'
  career_goals: Maritza aims to move from crew member to shift supervisor within the next year, using her leadership potential and people‑skills to manage a team. In the longer term she plans to enroll
    in a community college hospitality program to earn a degree in restaurant management. Ultimately she dreams of opening a small Mexican‑inspired fast‑casual eatery or food‑truck that blends traditional
    family recipes with contemporary twists, offering a welcoming space for her hometown community. She also hopes to develop a side‑hustle creating short video reviews of local eateries, leveraging her
    sociable personality and curiosity about food trends.
