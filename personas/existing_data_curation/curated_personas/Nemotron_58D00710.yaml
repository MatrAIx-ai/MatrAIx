  hobbies: '[''Watercolor Painting'', ''Acrylic Painting'', ''Pottery'', ''Photography'', ''Hiking'', ''Gardening'', ''Hosting Dinner Parties'', ''Leading Book Club'', ''Mentoring Girls in Tech'', ''Attending
    Live Music Events'', ''Cooking Southern Cuisine'']'
  career_goals: Gabriella envisions leveraging her STEM expertise and artistic flair to launch a community-focused STEAM initiative in the Anderson County area. Over the next several years she aims to create
    a nonprofit that offers hands-on science and art workshops for children and teens, operate a small studio for scientific illustration, and serve as a part-time consultant for local schools seeking curriculum
    enrichment. She also aspires to complete a master’s program in Education or Human-Centered Design to deepen her instructional skills, and to become a recognized speaker at regional conferences on integrating
    art and science. Ultimately, she wants to balance her family life with a purposeful career that blends mentorship, creativity, and civic engagement.
