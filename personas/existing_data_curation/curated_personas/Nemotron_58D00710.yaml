personas:
  professional: Gabriella Long is a 32‑year‑old STEAM initiative leader who leverages data analysis, experimental design, and intermediate Python visualization skills alongside graphic illustration talent,
    while her methodical organization and charismatic public speaking make her the driving force behind community science‑art workshops.
  sports: Gabriella Long hikes weekly with the Smoky Mountain Hiking Club, is a dedicated fan of the Nashville Predators and the Tennessee Titans, and plays in a co‑ed community soccer league each spring,
    using these activities to stay active and socially engaged.
  arts: Gabriella Long paints watercolors and acrylics inspired by Georgia O'Keeffe, attends bluegrass jam sessions featuring the Del McCoury Band, and draws creative energy from the cinematic worlds of
    Hayao Miyazaki and the folk‑indie sounds of Sufjan Stevens, weaving these influences into her visual storytelling.
  travel: Gabriella Long favors a blend of spontaneous weekend road trips to Asheville and Shenandoah National Park and meticulously planned annual trips to the Santa Fe art festivals, budgeting travel
    around their nonprofit’s grant cycle while seeking both adventure and cultural immersion.
  culinary: Gabriella Long, an intermediate home chef, experiments with Southern dishes like shrimp‑and‑grits, smoked brisket, and peach cobbler, often incorporating fresh heirloom tomatoes and garden herbs,
    yet they habitually over‑season with hot sauce during late‑night cooking sessions.
  core: Gabriella Long is an organized, curiosity‑driven community catalyst who merges STEM precision with artistic flair, thrives on social interaction, and occasionally forgets to water their garden while
    juggling a bustling volunteer schedule.
background:
  cultural: Gabriella was raised in a middle-class white family in the foothills of the Great Smoky Mountains, where community and family bonds were emphasized. Her parents valued education, encouraging
    her to pursue a STEM degree at the University of Tennessee. Growing up she participated in church-based service projects, local festivals, and family gatherings that highlighted Southern hospitality
    and a deep respect for regional music, storytelling, and crafts. At the same time, exposure to the university’s research environment and a vibrant arts scene in nearby Knoxville nurtured her curiosity
    and openness to unconventional ideas. This blend of traditional Southern cultural values and a forward-looking academic environment shapes her worldview, giving her a strong sense of community responsibility
    while embracing diversity of thought.
attributes:
  skills: '[''Data Analysis'', ''Experimental Design'', ''Python Programming'', ''Laboratory Techniques'', ''Project Management'', ''Community Event Planning'', ''Public Speaking'', ''Workshop Facilitation'',
