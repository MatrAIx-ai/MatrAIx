  career_goals: Even at his young age, Nicolas dreams of becoming an engineer or architect, fascinated by how things are built and how problems are solved. He aims to master reading and mathematics, hopes
    to achieve top grades in school, and envisions one day designing structures that help his community. His ambition is driven by a desire for achievement, meticulous work, and a practical contribution
    to the world around him.
