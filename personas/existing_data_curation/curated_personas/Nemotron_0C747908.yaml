personas:
  professional: Jacob Hall, a seasoned janitor with over three decades of commercial cleaning expertise, merges their meticulous floor‑stripping, carpet extraction, and minor repair abilities with a pragmatic
    curiosity for eco‑friendly products, and they now aggressively pursue facility‑manager certification to outpace local competitors.
  sports: Jacob Hall, a loyal fan of the LSU Tigers and the New Orleans Saints, participates in weekly pickup basketball at the West Monroe recreation center, joins a local hunting and fishing club for
    weekend outings, and they keep fit by tossing a football with friends at high‑school games and by maintaining a simple home‑gym routine.
  arts: Jacob Hall, an avid listener of country star Luke Combs and zydeco legend Clifton Chenier, spends evenings at The Wash Bar enjoying live music, occasionally plays harmonica at church fellowship
    gatherings, and they integrate the rhythmic storytelling of Southern music into their cooking and community work.
  travel: Jacob Hall, who prefers road‑trip adventures over long‑haul flights, frequently drives to New Orleans for music festivals, has road‑traveled the Texas Hill Country for hunting, dreams of camping
    in Big Bend National Park, and they plan trips around family gatherings while balancing a modest travel budget.
  culinary: Jacob Hall, a proficient home chef, loves crafting gumbo with Andouille sausage and cayenne, perfecting smoked ribs using a backyard smoker, and they experiment with Cajun‑spiced crawfish étouffée
    while swapping recipes at church potlucks.
  core: Jacob Hall, a pragmatic green‑cleaning enthusiast who never misplaces a fishing lure but often misplaces their calendar, juggles vintage‑truck restoration with competitive pickup basketball, and
    they blend Southern hospitality with a skeptical, competitive streak in every facet of life.
background:
  cultural: Jacob grew up in a working‑class family in West Monroe, Louisiana, where a blend of Southern hospitality, community traditions, and regional flavors shaped his outlook. He identifies with the
    cultural mosaic of the area, which includes elements of Cajun and country music, local cuisine such as gumbo and crawfish, and a strong emphasis on family, church, and neighborhood gatherings. While
    he is white American, his upbringing reflects the pragmatic, self‑reliant values common to the rural‑suburban South, balanced with an openness to practical innovations that can improve daily life.
attributes:
  skills: '["Commercial cleaning", "Floor stripping and waxing", "Carpet extraction", "Chemical safety and handling", "Inventory control of cleaning supplies", "Minor plumbing and electrical repairs", "HVAC
    filter replacement", "Facility safety inspections", "Team coordination and informal leadership", "Knowledge of eco-friendly cleaning practices"]'
  hobbies: '["Pickup basketball", "Fishing", "Hunting", "High school football games", "Church fellowship gatherings", "Cajun cooking and barbecue", "Live music (country, zydeco)", "Watching LSU Tigers football",
    "Restoring vintage pickup truck", "Community clean-up volunteer events", "Reading about eco-friendly cleaning technologies", "Card games (poker)"]'
  career_goals: Jacob aims to move into a supervisory or facility‑manager role within the next few years, pursuing certification such as the Certified Facility Management Professional (CFMP) to formalize
    his expertise. He is also interested in starting a small, locally‑focused cleaning business that emphasizes green, low‑toxicity products, allowing him to combine his curiosity about new methods with
    his competitive drive to be the top service provider in Ouachita Parish. Long‑term, he wants to secure a stable retirement for his family while mentoring younger janitorial staff and contributing to
    community‑service clean‑up projects.
