persona_description: A healthcare professional who is dedicated to improving breast cancer screening and detection through the use of mammography registries and research. Tracy Onega, PhD, is an assistant
  professor of community and family medicine at The Geisel School of Medicine at Dartmouth and a member of the Cancer Control Research Program at Norris Cotton Cancer Center. She has directed the NHMN registry,
  which is one of just five mammography registries in the United States funded by the National Cancer Institute. Onega's research focuses on improving breast cancer screening and detection through the use
  of mammography registries and research, and she is also researching ways to improve the interpretation of mammograms.
