  career_goals: Though approaching the typical retirement age, John plans to remain an active contributor to the Douglas County revenue office. His short‑term goal is to lead a pilot program that integrates
    predictive analytics into the audit selection process, improving efficiency and fairness. He also wants to formalize a mentorship track for new revenue agents, sharing his practical knowledge while
    encouraging innovative thinking. Long‑term, John envisions transitioning to a consultancy role, advising state tax policymakers on simplifying compliance procedures, and serving on the board of a local
    nonprofit that focuses on financial literacy for seniors. He hopes to balance his professional legacy with continued community involvement.
