personas:
  professional: John Anschuetz, a 63‑year‑old tax examiner for Douglas County, they combine three decades of audit expertise, Excel/VBA automation, and a pragmatic curiosity to lead a predictive‑analytics
    pilot and mentor junior agents, all while maintaining an easy‑going, sociable style.
  sports: John Anschuetz, a 63‑year‑old community staple, anchors third base for the Elkhorn Softball Club, they cheer on the Nebraska Cornhuskers football team and the Kansas City Royals baseball squad,
    and unwind with weekend fishing excursions on the Platte River, balancing competitive play with relaxed outdoor recreation.
  arts: John Anschuetz, at 63, crafts handcrafted furniture in a woodworking club and designs sets for the Elkhorn community theater, they regularly attend local plays and science museum talks, and unwind
    to folk‑rock artists like Bob Dylan and Mumford & Sons while appreciating the performances of actors such as Helen Mirren.
  travel: John Anschuetz, a 63‑year‑old avid explorer, prefers spontaneous weekend getaways to the Badlands and Yellowstone and cherishes larger trips to the Grand Canyon and Glacier National Park, they
    favor affordable lodging and modest itineraries that blend bird‑watching, fishing, and local culture while balancing travel costs with their fixed retirement income.
  culinary: John Anschuetz, now 63, transforms home‑grown tomatoes and squash into tomato‑basil pasta, roasted vegetable medleys, and summer corn on the cob, they possess solid intermediate cooking skills,
    enjoy swapping homemade preserves with neighbors, and relish the occasional smoked trout from their fishing hauls.
  core: John Anschuetz, a 63‑year‑old tax veteran and community‑oriented hobbyist, blends pragmatic curiosity with easy‑going sociability, constantly juggling data‑driven work, gardening, woodworking, and
    casual sports, all while occasionally succumbing to forgetful disorganization.
background:
  cultural: John’s upbringing reflects the Midwestern cultural fabric of Nebraska. His family traces its roots to German immigrants who settled on the prairies in the early 1900s, instilling values of hard
    work, frugality, and community responsibility. He grew up attending a Baptist church, where fellowship and service were emphasized, and he remains active in church‑based charity drives. The traditions
    of county fairs, local high‑school football games, and Saturday potlucks are central to his social life. Living in Elkhorn, a close‑knit suburb of Omaha, he embodies the regional hospitality, civic
    pride, and love of open space that define the Nebraskan white middle‑class experience.
