  hobbies: '[''Abstract painting'', ''Digital illustration'', ''Nature photography'', ''Hiking'', ''Gardening'', ''Reading philosophy and literature'', ''Piano playing'', ''Volunteer mentorship for seniors'',
    ''STEM tutoring for high school students'', ''Creative writing'']'
  career_goals: Although officially retired, Phillip aims to continue contributing to his community and personal growth. He plans to curate a neighborhood art exhibition showcasing works by senior artists,
    establish a scholarship fund for underrepresented STEM students, and develop an intergenerational mentorship program that pairs seniors with high‑school students interested in engineering and the arts.
    He also aspires to author a memoir that weaves together his engineering career and artistic journey, publish a series of essays on the intersection of science and creativity, and master new digital
    art tools to expand his creative repertoire.
