  career_goals: Although retired, Mandy aims to deepen her involvement in local community life. She plans to take a leadership role in the senior center’s activity committee, launch a weekly knitting circle,
    and mentor new volunteers at the food bank. She also hopes to preserve Spokane’s local history by contributing oral histories to the regional historical society and perhaps compile a small cookbook
    of family recipes for future generations. Her overarching ambition is to stay active, maintain her routine of group engagement, and leave a tangible, caring impact on her neighbors.
