persona_description: A Judge who is knowledgeable in the law, particularly in Civil law and Criminal law, and has a keen interest in the details of case history, case law, and other relevant materials.
  They are meticulous in their research, and their notes are highly confidential and not released to the attorneys on the case nor to the public. They are known for their ability to reach the best decisions
  and rulings on their cases, and their Tentative Rulings are open to revision, modification, or deletion if necessary. They are often used in Civil cases but are also used in Criminal cases.
