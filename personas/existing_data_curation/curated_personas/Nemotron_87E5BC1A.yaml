personas:
  professional: Sherri Enos, a seasoned applied physicist and data scientist, leverages her mastery of spectroscopy, electron microscopy, and statistical programming in R, Python, and SAS to design rigorous
    experiments and translate complex findings into actionable reports for nonprofit and small-business clients, while also crafting STEM curricula and leading grant-writing initiatives.
  sports: Sherri Enos, an avid hiker of the Worcester County hills and a seasonal participant in the local senior cross-country skiing group, follows the Boston Red Sox with devotion, occasionally joining
    a neighborhood walking club that meets on Saturday mornings for brisk 6-mile treks through nearby apple orchards.
  arts: Sherri Enos, who stitches intricate geometric quilts inspired by the abstract works of Piet Mondrian and finds solace in playing Chopin nocturnes on her upright piano, regularly attends Boston Symphony
    Orchestra performances and draws creative energy from the folk storytelling of Joan Baez.
  travel: Sherri Enos, who prefers meticulously planned weekend getaways over spontaneous trips, has already explored the rugged beauty of Acadia National Park and the vineyards of Tuscany, and is now saving
    for a summer immersion in Kyoto's garden temples to study traditional Japanese horticulture.
  culinary: Sherri Enos, a confident home chef who transforms her backyard harvest into dishes like heirloom tomato bruschetta, roasted beet and goat-cheese salad, and slow-cooked ratatouille flavored with
    fresh thyme and basil, often pairs meals with a glass of local Massachusetts cider and enjoys occasional fine-dining outings at farm-to-table restaurants such as The Farmhouse.
  core: Sherri Enos blends a data-driven mind with a green thumb, sprinkling meticulous spreadsheets into garden rows while secretly hoarding heirloom seed packets like prized data points, and occasionally
    losing track of time weaving geometric quilt patterns.
background:
  cultural: Sherri was raised in a traditional New England family of Irish-English descent, deeply rooted in the values of self-reliance, hard work, and community service that characterize much of central
    Massachusetts. Growing up in the Gardner area, she participated in town events like the Fourth of July parade and the annual harvest festival, reinforcing a sense of local identity. Her upbringing emphasized
    the importance of education, with both parents encouraging academic achievement, which guided her toward a STEM graduate degree. Although she identifies with the largely white cultural fabric of the
    region, Sherri respects and engages with the diverse communities around her, often collaborating with local cultural organizations to promote inclusive science outreach.
attributes:
  skills: '["Experimental Design","Statistical Modeling (R, Python, SAS)","Data Analysis","Laboratory Instrumentation (Spectroscopy, Electron Microscopy)","Safety and Compliance","Grant Writing","Technical
