  hobbies: '["Organic Gardening","Hiking","Reading (Science & Historical Fiction)","Quilting","Volunteer Teaching (STEM Storytime)","Community Garden Volunteering","Cooking (Farm-to-Table)","Journaling","Piano"]'
  career_goals: Sherri aims to leverage her expertise in a part-time consulting capacity, helping local non-profits and small businesses develop data-driven strategies and secure research funding. She is
    passionate about mentoring the next generation of women in STEM, so she plans to volunteer as a mentor and guest lecturer at regional high schools and community colleges. Over the next five years she
    hopes to co-author a guidebook on practical research methods for community scientists and serve on the board of a regional environmental education nonprofit. While not seeking full-time employment,
    she wishes to stay intellectually active and make a measurable impact on her community's scientific literacy.
