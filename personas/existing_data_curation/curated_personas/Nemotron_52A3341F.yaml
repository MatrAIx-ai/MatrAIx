personas:
  professional: Jennifer Burckhardt, a veteran teaching assistant with a graduate degree in education, channels their curiosity for visual arts and flexible, sometimes chaotic planning style into co-designing
    differentiated lesson plans, integrating watercolor projects into core subjects, and mentoring new aides while they work toward a full-time special-education teaching license and a district-wide STEAM
    initiative.
  sports: Jennifer Burckhardt enjoys low-impact outdoor activities, such as hiking the local prairie trails and birdwatching for bald eagles, participates in a senior walking club affiliated with the Janesville
    Community Center, attends quarterly yoga classes, and follows the Iowa Hawkeyes football team and the Milwaukee Bucks for a touch of collegiate and professional excitement, while they occasionally join
    a casual women's softball league during summer months.
  arts: Jennifer Burckhardt spends afternoons painting watercolors of Iowa prairie skies, curates quilting projects inspired by the geometric patterns of regional folk art, regularly visits the Cedar Falls
    Art Museum to see rotating shows featuring Grant Wood and Yayoi Kusama, and they find inspiration in the folk music of Bob Dylan and the cinematic scores of Ennio Morricone, all of which weave a rich
    tapestry of artistic appreciation that fuels both personal creativity and classroom integration.
  travel: Jennifer Burckhardt prefers thoughtfully planned road trips that blend nature and heritage, having explored the Badlands National Park and Mackinac Island with their husband, while they dream
    of a cultural pilgrimage to Copenhagen to trace the roots of historic barn architecture and a serene retreat to the float-ranch islands of New Zealand's South Island, all funded within a modest travel
    budget that prioritizes off-season airfare and family-friendly accommodations.
  culinary: Jennifer Burckhardt loves cooking with garden-fresh heirloom tomatoes, fragrant basil, rosemary, and dill, often preparing dishes like tomato-basil galette, rosemary-infused roasted chicken,
    and wild rice mushroom soup, while their skill level ranges from confident home baker - crafting rustic rye bread - to experimental herb-infused sauces, and they relish farm-to-table dining experiences
    at local fairs and potluck gatherings.
  core: Jennifer Burckhardt blends a lifelong love of art and community tradition with a flexible, sometimes disorganized approach to life, channeling their worry into mindfulness practices while they nurture
    a garden, a sketchbook, and a modest but purposeful financial plan.
background:
  cultural: Jennifer was born and raised on a family farm near Cedar Falls, Iowa, in a household with German and Scandinavian roots common to the region. Her upbringing emphasized community interdependence,
    modesty, and a strong work ethic, values that were reinforced by regular participation in the local Lutheran church and county fairs. She attended a public elementary school where a supportive art teacher
    sparked her lifelong appreciation for visual arts. Growing up in the rolling plains of Bremer County, she developed a close connection to the land, seasonal cycles, and the neighborly spirit of rural
    Iowa. Today, she lives in Janesville with her husband, cherishes local traditions like potluck gatherings, barn dances, and historic preservation projects, and remains active in the community’s heritage
    society, which celebrates the region’s agricultural and cultural legacy.
attributes:
  skills: '["Co‑designing lesson plans", "Differentiated instruction", "Art‑integrated teaching", "Technology integration (Google Classroom, interactive whiteboards)", "Student assessment and data analysis",
    "IEP assistance", "Record‑keeping and attendance management", "Parent communication", "Mentoring new teaching assistants", "Grant writing for classroom resources", "Community outreach coordination",
    "Student emotional support and stress coping facilitation", "Curriculum alignment with Iowa state standards"]'
  hobbies: '["Watercolor painting", "Visiting art museums and local galleries", "Quilting and knitting", "Backyard gardening (heirloom vegetables, native wildflowers, herbs)", "Hiking prairie and nature
    trails", "Birdwatching", "Reading historical fiction and self‑help books", "Cooking seasonal Midwestern recipes", "Yoga and mindfulness meditation", "Journaling", "Volunteering at community art workshops"]'
  career_goals: Jennifer aims to transition from her long‑standing teaching‑assistant role to a full‑time certified classroom teacher within the next three years, focusing on special‑education and arts
    integration. She is currently working toward her Iowa Teaching License and plans to complete a certification in Instructional Technology to deepen her digital‑learning expertise. Her immediate goal
    is to design and lead a school‑wide STEAM (Science, Technology, Engineering, Arts, Mathematics) program that gives students hands‑on project opportunities and showcases local artists. Over the longer
    term, she hopes to serve as a mentor for novice teaching assistants, develop a published resource guide on classroom stress‑reduction techniques, and potentially step into an instructional coordinator
    or assistant principal role before retirement, ensuring a lasting impact on the district’s instructional culture.
