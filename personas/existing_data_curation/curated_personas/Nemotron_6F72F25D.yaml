  hobbies: '[''Sketching'', ''Digital Illustration'', ''Street Photography'', ''Reading (fiction, art theory, philosophy)'', ''Museum and gallery visits'', ''Yoga'', ''Meditation'', ''Journaling'', ''Volunteer
    art workshops'']'
  career_goals: Ernestine aims to fuse her business acumen with her passion for the arts by launching a social‑enterprise that provides marketing and financial mentorship to emerging Black artists in the
    Bronx. She envisions a future where she leads a nonprofit cultural organization that amplifies underrepresented voices, and she plans to pursue a master’s degree in social entrepreneurship to deepen
    her impact. In the long term, she aspires to hold an executive role in a community development firm that prioritizes equitable economic growth and artistic expression.
