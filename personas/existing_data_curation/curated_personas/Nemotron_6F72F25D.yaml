personas:
  professional: Ernestine Williams is an ambitious 18‑year‑old business graduate who leverages her knack for digital illustration and social‑media storytelling to design marketing campaigns for emerging
    artists in the Bronx, blending strategic analysis with a freestyle, often spontaneous, creative process.
  sports: Ernestine Williams supports the New York Knicks and the Westchester Knicks, plays pick‑up basketball at a local Bronx park on weekends, follows the New York City Marathon’s distance training blogs
    for personal fitness, and attends yoga classes at a community studio to balance high‑energy street sports with mindful movement.
  arts: Ernestine Williams spends her afternoons sketching digital portraits inspired by the bold colors of Kerry James Marshall and the street‑level narratives of Gordon Parks, curates Instagram galleries
    of her Bronx street photography, and frequently visits the Museum of the City of New York, the Bronx Museum of the Arts, and MoMA to absorb contemporary theory and experimental installations.
  travel: Ernestine Williams prefers low‑key, spontaneous trips, having already backpacked through the historic districts of New Orleans for its jazz heritage, visited Kingston, Jamaica to taste family‑rooted
    jerk chicken and explore the island’s art scene, and planned a future weekend getaway to the Hudson Valley to sketch the fall foliage and visit local farmer’s markets.
  culinary: Ernestine Williams loves cooking soul‑inspired dishes such as collard greens seasoned with smoked paprika, cornmeal pancakes with maple syrup, and peppery jerk chicken made with scotch bonnet
    peppers, while also experimenting with vegan quinoa bowls that incorporate sweet potato and black beans, though she occasionally orders a slice of New York pizza when time‑pressed.
  core: Ernestine Williams blends a quiet, reflective nature with an entrepreneurial spark, channeling restless curiosity into a socially‑driven art venture while navigating a habit of leaving her sketchbooks
    scattered across her room and forgetting to stretch before coffee‑fuelled study marathons.
background:
  cultural: Ernestine is an African American woman raised in the Bronx, with familial ties that stretch to both the Southern United States and the Caribbean. Growing up near the vibrant cultural corridors
    of the South Bronx and spending time in suburban Westchester County, she has absorbed a blend of urban grit and suburban calm. Her upbringing exposed her to the legacy of Black community activism, hip‑hop
    culture, and the rich traditions of African American visual arts. She celebrates cultural milestones such as Juneteenth and Black History Month, and she actively seeks to honor the resilience and creativity
    of her heritage through her artistic pursuits and community involvement.
