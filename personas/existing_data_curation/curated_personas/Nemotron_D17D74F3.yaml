  hobbies: '[''Herb gardening'', ''Homebrewing craft beer'', ''Reading culinary biographies'', ''Exploring farmers markets'', ''Hiking in Ridley Creek State Park'', ''Listening to classic jazz'', ''Volunteering
    at a community soup kitchen'', ''Collecting vintage kitchen tools'', ''Watching culinary documentary series'']'
  career_goals: Arthur aims to advance to a sous‑chef position within the next two years, using his knack for organization to streamline kitchen operations. He ultimately aspires to become head chef at
    a farm‑to‑table restaurant that highlights seasonal Pennsylvania produce and sustainable sourcing. In the longer term, he dreams of opening a modest bistro in the Delaware County suburbs where he can
    design a menu that blends classic Pennsylvania Dutch flavors with contemporary techniques. He also plans to earn the Certified Chef de Cuisine credential and develop a signature dish that reflects his
    commitment to harmony, quality, and predictability in the dining experience.
