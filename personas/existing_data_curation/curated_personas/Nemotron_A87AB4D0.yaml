  career_goals: Rosanna aims to transition from managing a single administrative department to a senior director‑level role overseeing multiple support functions across the organization. She is motivated
    to lead a larger team, champion data‑driven efficiency initiatives, and shape strategic planning processes that balance cost control with employee well‑being. A personal ambition is to develop a mentorship
    program for junior administrative staff, providing them with clear career pathways while also reducing her own stress through delegated leadership. She also hopes to achieve a healthier work‑life balance
    by implementing flexible policies that benefit the whole office.
