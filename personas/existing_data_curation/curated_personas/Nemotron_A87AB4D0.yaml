personas:
  professional: Rosanna Kerr, a seasoned office administrator of twenty years, blends pragmatic curiosity with a relaxed, sometimes disorganized approach to manage corporate support functions, negotiating
    vendor contracts, streamlining workflows with new productivity tools, and championing a mentorship program for junior staff, all while they maintain a competitive edge and a healthy dose of skepticism
    toward untested ideas.
  sports: Rosanna Kerr enjoys low‑impact fitness through weekly birdwatching hikes and Saturday morning walks with the local senior walking club, cheers on the Charlotte Hornets on game nights, and, despite
    their competitive streak, prefers solitary exercise over team sports.
  arts: Rosanna Kerr unwinds with historic novels by Hilary Mantel and memoirs by Doris Kearns Goodwin, listens to Ella Fitzgerald’s jazz crooning while crocheting intricate blankets, and they occasionally
    attend the Charlotte Repertory Theatre’s productions of classic plays.
  travel: Rosanna Kerr prefers leisurely road trips to the Blue Ridge Mountains and weekend getaways to Charleston’s historic district, while dreaming of a slow‑paced tour of England’s Tudor castles, and
    they plan trips with a flexible itinerary that allows spontaneous garden stops.
  culinary: Rosanna Kerr savors Southern comfort foods such as shrimp‑and‑grits and collard greens, often enhancing them with fresh rosemary and thyme from their garden, while occasionally preparing herb‑infused
    lemon tea and locally sourced peach cobbler for guests.
  core: Rosanna Kerr is a pragmatic, curiosity‑driven administrator who balances meticulous work with relaxed spontaneity, and they find solace in gardening, puzzles, and quiet competition.
background:
  cultural: 'Rosanna was born and raised in the Piedmont region of North Carolina to a middle‑class, white family with deep roots in the area. Her upbringing emphasized Southern hospitality, strong work
    ethic, and self‑reliance. She attended local public schools, completed a high‑school diploma, and entered the workforce directly after graduation. The culture of Charlotte, with its blend of traditional
    Southern values and rapid urban growth, has shaped her pragmatic worldview: she respects long‑standing community customs while staying open to new ideas that can improve everyday life.'
