  career_goals: Although retired from formal employment, Alex aims to deepen his involvement in community mentorship, organizing regular workshops that teach traditional Mexican cooking and basic home‑maintenance
    skills to younger residents. He plans to formalize a weekly schedule for his volunteer activities, ensuring a predictable yet flexible routine that balances his need for structure with his love of spontaneous
    community assistance. Alex also aspires to learn basic digital tools to help seniors navigate online services, reinforcing his commitment to compassionate support while staying current with modern communication
    methods.
