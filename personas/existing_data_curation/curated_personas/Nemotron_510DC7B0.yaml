personas:
  professional: Alex Maldonadosantiago, a retired hands‑on mentor, channels decades of home‑repair and carpentry experience into structured weekly workshops that teach traditional cooking and basic maintenance
    to younger neighbors, and they bring a compassionate, cooperative spirit to each session.
  sports: Alex Maldonadosantiago enjoys gentle hikes along the Wasatch foothills, plays weekly pétanque at the senior center, follows the Utah Jazz and Real Salt Lake, and they occasionally join a local
    walking club that meets on Saturdays, balancing low‑impact exercise with social camaraderie.
  arts: Alex Maldonadosantiago immerses themselves in mariachi classics by Vicente Fernández and norteño hits from Los Tigres del Norte while also devouring biographies of figures like Abraham Lincoln and
    Mahatma Gandhi, and they find that this blend fuels both cultural pride and a pragmatic worldview.
  travel: Alex Maldonadosantiago prefers road trips that combine scenic drives through Colorado’s Rocky Mountains with visits to family in nearby New Mexico towns like Santa Fe, and they plan trips around
    holidays to accommodate grandchildren, dreaming of a pilgrimage to Oaxaca to explore culinary roots when health permits.
  culinary: Alex Maldonadosantiago cultivates tomatoes, jalapeños, and cilantro in a backyard garden and transforms the harvest into family staples such as salsa verde, posole, and homemade tamales, and
    they occasionally over‑spice dishes when they forget to temper the chilies, showcasing a solid cooking skill set that blends tradition with improvisation.
  core: Alex Maldonadosantiago balances a structured, hands‑on approach to community service with a spontaneous love for garden herbs and family recipes, all while they navigate occasional forgetfulness
    that comes with a relaxed attitude toward obligations.
background:
  cultural: Alex grew up in a Mexican immigrant family that settled in Utah, preserving strong ties to Mexican traditions while adapting to the local culture. Family gatherings centered around homemade
    tortillas, tamales, and shared stories of Mexico, fostering a deep appreciation for his heritage. Bilingual, he navigates both Spanish and English worlds, often serving as a cultural bridge for newer
    immigrants and long‑time residents alike. His Catholic upbringing informs his participation in church and community celebrations such as Día de los Muertos and Cinco de Mayo, where he proudly shares
    traditional foods and music. The blend of Mexican familial values—respect for elders, community solidarity, and hospitality—with the structured, community‑oriented environment of Salt Lake City shapes
    his identity as a compassionate, cooperative elder who values harmony and cultural continuity.
