  hobbies: '[''Gardening and vegetable cultivation'', ''Hiking and nature walks'', ''Bird‑watching'', ''Photography (architecture and landscape)'', ''Reading historical fiction and architectural nonfiction'',
    ''Small‑group pottery or woodworking workshops'', ''Home cooking with locally sourced ingredients'']'
  career_goals: Summer aims to transition from a high‑volume sales focus to a mentorship and advisory role within the next five years, sharing her market insights with newer agents in a boutique brokerage
    setting. She plans to obtain a designation in sustainable real‑estate practices, positioning herself as a go‑to advisor for eco‑friendly home buyers and sellers. Alongside this, she wishes to gradually
    build a modest portfolio of rental properties that reflect Seattle’s green‑building standards, securing a steady passive income stream for her retirement while maintaining a relaxed, flexible schedule.
