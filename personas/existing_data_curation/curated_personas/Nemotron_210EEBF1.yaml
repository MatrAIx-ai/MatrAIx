personas:
  professional: Stradford Fraiberg leverages his humanities degree, security guard experience, and sharp analytical eye to monitor casino surveillance feeds, draft precise incident reports, and develop
    AI-augmented fraud detection protocols, balancing curiosity with pragmatic risk management.
  sports: Stradford Fraiberg enjoys early-morning jogs on the local Pine Trail, supports the Detroit Lions and the Michigan State Spartans football teams on Saturdays, and plays in a community pickleball
    league at the Perry recreation center, combining low-key fitness with regional sports enthusiasm.
  arts: Stradford Fraiberg devotes his evenings to classic film noir marathons—revisiting works by Billy Wilder and watching Humphrey Bogart’s performances—while also solving intricate chess puzzles, cataloguing
    rare books at the public library, and engaging in strategy board-game nights with a tight-knit circle of friends.
  travel: Stradford Fraiberg prefers meticulously planned road trips that balance historical exploration and budget consciousness, having already driven to Mackinac Island for its Victorian charm, trekked
    the Adirondacks, and dreaming of a future week-long pilgrimage to Edinburgh’s medieval castles.
  culinary: Stradford Fraiberg’s palate leans toward hearty Midwestern comfort foods, favoring a well-seasoned chicken pot pie, homemade pierogi stuffed with potatoes and cheese, and a weekend ritual of
    brewing a robust black coffee while perfecting a simple sourdough starter.
  core: Stradford Fraiberg is a methodical, curiosity-driven security analyst who quietly obsesses over probability, balances disciplined finances with occasional gambling, and finds solace in puzzles and
    classic noir.
background:
  cultural: Stradford was raised in Perry, Michigan, a modest Midwestern town with a strong sense of community. His family traces German‑Irish roots and instilled values of hard work, reliability, and modesty.
    Local traditions such as high‑school football Saturdays, the annual Perry Summer Fair, and volunteer fire‑department activities shaped his practical outlook. While identifying as White American, his
    humanities education broadened his cultural awareness, helping him relate respectfully to the diverse patrons he encounters in the casino environment. He enjoys the seasonal rhythms of central Michigan
    life and remains active in town events and local volunteer initiatives.
