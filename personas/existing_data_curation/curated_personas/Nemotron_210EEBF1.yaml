  career_goals: He aims to move from front‑line surveillance to a senior analyst or shift supervisor position within the casino, eventually becoming a regional security manager overseeing multiple gaming
    venues. To support this trajectory, he plans to earn professional credentials such as the Certified Protection Professional (CPP) and to pursue a master’s degree in criminology or security management.
    He is especially interested in mastering AI‑driven fraud detection tools, positioning himself as a technology‑focused security specialist. In the longer term, he envisions consulting for gaming operators
    or joining a law‑enforcement agency’s cyber‑crime unit to investigate financial fraud.
