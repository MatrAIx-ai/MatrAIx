personas:
  professional: Wayne Slaughter, an aspiring journeyman welder and kinetic metal artist, blends meticulous MIG/TIG welding, blueprint interpretation, and precision measurement with improvisational problem‑solving,
    channeling their vivid imagination and emotionally reactive nature into detailed solo projects while still thriving in small, collaborative art workshops.
  sports: Wayne Slaughter, a casual runner who jogs the industrial streets of Redford at sunrise to capture light for photography, regularly attends Detroit Lions and Pistons games with friends, and participates
    in a weekend skate‑boarding club at the community skate park to stay active.
  arts: Wayne Slaughter, an avid listener of Miles Davis, Erykah Badu, and Kendrick Lamar, channels these sonic influences into kinetic sculptures reminiscent of Alexander Calder, while drawing inspiration
    from David Smith’s welded art and photographing urban decay in the style of Andreas Gursky during after‑hours jam sessions with fellow creators.
  travel: Wayne Slaughter, who has road‑tripped to Detroit’s revitalized riverfront, explored the shipyards of Cleveland, and toured the industrial heritage sites of Chicago, now dreams of a study tour
    to Berlin’s Bauhaus museums and a solo backpacking journey through Japan’s Takayama metal‑craft festivals.
  culinary: Wayne Slaughter, a self‑taught home cook, frequently prepares Detroit‑style pizza with thick crust and pepperoni, experiments with spicy chicken tikka masala using garam masala, cumin, and yogurt,
    and occasionally crafts kimchi‑laden ramen bowls to satisfy a palate as experimental as their metal art.
  core: Wayne Slaughter is an 18‑year‑old metal‑welding enthusiast who sketches futuristic kinetic pieces, battles intense anxiety, splurges on coffee and art supplies, and finds solace in jazz and urban
    photography.
background:
  cultural: 'Wayne grew up in Redford, a suburb of Detroit with a strong working‑class Black community. His family has a legacy of trade work—his father and older cousins were mechanics and welders—instilling
    in him a respect for hands‑on craftsmanship and the dignity of labor. Cultural traditions from the African‑American diaspora shape his daily life: family gatherings feature soul food, gospel music,
    and storytelling that celebrate resilience and collective identity. He participates in local community programs at the Redford Youth Center, where he mentors younger teens and contributes to neighborhood
    mural projects that highlight Black history. The industrial heritage of Detroit fuels his fascination with metal, while the surrounding cultural vibrancy inspires his artistic aspirations.'
attributes:
  skills: '[''MIG welding'', ''TIG welding'', ''Oxy‑acetylene brazing'', ''Electronic soldering'', ''Blueprint reading'', ''Metal fabrication'', ''Metal sculpture creation'', ''Tool maintenance'', ''Workshop
    safety compliance'', ''Basic electrical wiring'', ''Creative problem solving'']'
  hobbies: '[''Sketching futuristic designs'', ''Building miniature metal models'', ''Kinetic art experimentation'', ''Jazz and hip‑hop listening'', ''Reading science‑fiction and philosophy'', ''Urban photography'',
    ''Strategic video gaming'', ''Arduino and electronics tinkering'', ''Community art workshops'']'
  career_goals: Wayne aims to complete an apprenticeship and earn a Journeyman Welder certification within the next three years, positioning himself for higher‑pay roles in automotive manufacturing or marine
    fabrication in the Detroit area. Parallel to his technical training, he dreams of establishing a boutique metal‑art studio where he can create custom sculptures, decorative furniture, and community
    murals that reflect his cultural heritage. He also hopes to earn a GED and attend a community college program in industrial arts, eventually mentoring other young workers from his neighborhood and possibly
    expanding his studio into a collaborative makerspace.
