persona_description: A scientist who is interested in biofuel production and engineering, particularly in the use of genetically engineered microorganisms to produce hydrocarbon molecules that mimic petroleum.
  They are familiar with the challenges of scaling up these technologies and are exploring ways to harness existing cellular transport mechanisms to produce biofuels. They have a background in pharmacy
  and have applied their knowledge of pharmaceutical molecule transport systems to biofuel research. They are interested in the potential cost-effectiveness of these approaches and the potential for these
  engineered bacteria to be used as a viable alternative to producing ethanol from food crops.
