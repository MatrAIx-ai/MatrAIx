persona_description: A navigator or cartographer who specializes in the study of the Earth's surface, particularly the declination of a wall. Their knowledge and skills are focused on determining the angle
  of declination of a wall, which is the angle between the wall and the meridian. They are likely to have a strong understanding of the principles of trigonometry and astronomy, as well as a deep knowledge
  of the Earth's shape and movement. They may also be familiar with the techniques and instruments used to measure the declination of a wall, such as a plumb line and a straight edge.
