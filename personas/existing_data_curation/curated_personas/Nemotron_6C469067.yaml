personas:
  professional: Brittany Sarkisian, a licensed journeyman electrician with over ten years mastering residential and light‑commercial wiring, blends meticulous NEC code compliance with a photographer’s eye
    for light, mentors apprentices while mapping out a three‑year plan to earn Master Electrician status and launch a boutique contracting firm that fuses sustainable solar installations with artistic lighting
    design.
  sports: Brittany Sarkisian channels competitive energy into weekend hikes on the Indiana Trail System, logging 10 to 12 miles with the Indiana Hiking Club, complements the cardio with a weekly yoga class
    at a downtown studio, and they root for the Indianapolis Colts and Pacers while cheering from the gym’s TV during spin sessions.
  arts: Brittany Sarkisian’s artistic pulse beats at local galleries showcasing emerging painters like Maya Hayuk, while their playlist constantly cycles through Bon Iver, The War on Drugs, and ambient
    installations by James Turrell, and they spend Saturday evenings photographing the interplay of natural light at the Indianapolis Museum of Art’s sculpture garden.
  travel: Brittany Sarkisian prefers DIY road trips that combine design inspiration with outdoor adventure, having driven the Pacific Coast Highway to study coastal lighting, planning a future visit to
    Copenhagen’s Nordic Design Week, and they budget each travel stint via a dedicated spreadsheet while balancing family obligations that limit extended overseas stays.
  culinary: Brittany Sarkisian is a self‑taught home chef who regularly whips up roasted beet and goat‑cheese salads, hand‑made thin‑crust pizza topped with smoked salmon and fresh dill, and experiments
    with seasonal heirloom tomatoes and heirloom corn in a vintage cast‑iron skillet, yet they often skip breakfast in favor of a late coffee and a quick granola bar before heading to a job site.
  core: Brittany Sarkisian blends an electrician’s precision with a photographer’s fascination for light, competitively pursues sustainable design while they habitually forget to water houseplants and juggle
    impulse buys of vintage lighting gear.
background:
  cultural: Brittany grew up in a modest Midwestern town in Indiana, raised in a white, middle‑class family with German and Irish ancestry. The region’s emphasis on hard work, self‑reliance, and community
    involvement shaped her practical and dependable outlook. Early exposure to local craft fairs, folk art, and regional music nurtured her appreciation for aesthetics and unconventional creativity. While
    she identifies with mainstream American culture, she maintains strong ties to the Midwest’s values of modesty, reliability, and a collaborative spirit, often participating in neighborhood initiatives
    and regional festivals that celebrate both heritage and contemporary arts.
attributes:
  skills: '["Residential wiring", "Light commercial wiring", "NEC code compliance", "Blueprint reading", "Conduit bending", "Circuit troubleshooting", "Smart home automation", "Solar PV installation", "Safety
