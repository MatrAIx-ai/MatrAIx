  hobbies: '["Photography", "DIY furniture and lighting projects", "Attending art galleries and maker fairs", "Indie music concerts", "Hiking in state parks", "Arduino and Raspberry Pi home automation tinkering",
    "Volunteering for community theater lighting"]'
  career_goals: Brittany aims to achieve Master Electrician certification within the next three years and transition into supervisory roles on larger commercial projects. She aspires to specialize in energy‑efficient
    and renewable energy systems, positioning herself as a go‑to expert for sustainable electrical solutions in the Indiana market. Long‑term, she envisions launching her own contracting firm that blends
    technical excellence with artistic lighting design, targeting boutique residential clients and small businesses. Continuous professional development through trade courses, industry conferences, and
    certification in lighting design remains a priority, as does building a reputation for reliability and innovative problem‑solving.
