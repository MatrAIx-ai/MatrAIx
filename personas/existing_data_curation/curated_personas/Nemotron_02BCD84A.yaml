personas:
  professional: Cody Malone, an experienced retail specialist, leverages their love for prairie art to craft eye‑catching store displays while obsessively tracking sales metrics and competitively out‑selling
    neighboring shops; they often prefer a flexible, low‑structure work rhythm.
  sports: Cody Malone, a regular participant in the local Prairie Trails walking club, enjoys daily hikes across the North Dakota plains and follows the Bismarck State College Bison football team, keeping
    his fitness routine low‑key with morning walks and occasional light weight training at the community center; they often view these activities as a quiet counterbalance to their competitive retail mindset.
  arts: Cody Malone, a watercolor painter of prairie horizons, a collector of vintage folk‑art postcards, and an occasional harmonica player at gatherings, frequents the Mandan Regional Art Gallery, draws
    inspiration from Grant Wood and Andrew Wyeth, and shares his love for classic folk songs by Bob Dylan with friends; they often use these creative outlets to soothe the worry that accompanies their competitive
    nature.
  travel: Cody Malone prefers solo, low‑budget road trips that let him soak in wide‑open landscapes, having explored Badlands National Park and Glacier National Park, and dreams of chasing the northern
    lights in Iceland while balancing his retirement savings; they often plan trips around off‑season rates and the chance to photograph migratory birds.
  culinary: Cody Malone, an enthusiastic home‑cook, experiments with bison chili seasoned with juniper berries, wild‑rice pilaf tossed with sage and local mushrooms, and a signature huckleberry jam, while
    relying on fresh prairie honey and homegrown herbs to flavor his dishes; they often refine recipes late at night after a day of sketching.
  core: Cody Malone, a competitive yet solitary art‑loving retailer, they balance data‑driven store ambitions with a habit of over‑thinking, a touch of disorganization, and nightly harmonica sessions that
    soothe lingering worries.
background:
  cultural: Cody was raised in the rural Midwest of North Dakota, a region shaped by German and Scandinavian immigrant roots and a strong Protestant (largely Lutheran) tradition. The community’s values
    of self‑reliance, modesty, and close‑knit neighborly support have informed his outlook. Local customs such as Thanksgiving potlucks, Fourth of July picnics, and seasonal harvest festivals remain central
    to family life. While his heritage is predominantly white Midwestern, Cody respects the presence of local Indigenous cultures and occasionally participates in community events that honor that history.
    He has a deep appreciation for the folk‑art traditions of the area—such as quilting and wooden carvings—which he incorporates into both his personal art interests and his retail selections.
