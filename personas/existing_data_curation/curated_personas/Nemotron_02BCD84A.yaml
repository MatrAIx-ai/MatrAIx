  career_goals: Cody's primary career ambition is to evolve his current role into a position that merges his retail expertise with his passion for art. Over the next few years he hopes to open a boutique
    store that showcases regional folk art and handcrafted goods, turning the shop into a cultural gathering point for Pingree and surrounding communities. He also aims to build a modest e‑commerce platform
    to reach a broader audience, leveraging his business analytics skills to ensure profitability. Simultaneously, he wants to secure a comfortable retirement for his family, so he is focused on increasing
    the store’s bottom line and establishing a succession plan. In the longer term he sees himself as a consultant for other small‑town retailers, sharing his competitive, data‑driven approach while advocating
    for flexibility and low‑stress work environments.
