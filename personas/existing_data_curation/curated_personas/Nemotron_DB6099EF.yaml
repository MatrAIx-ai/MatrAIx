personas:
  professional: Diane Mcgill, a retired mechanical engineer turned community STEM mentor, leverages three decades of automotive CAD and troubleshooting expertise to design hands-on garden-automation workshops,
    while her spontaneous, low-bureaucracy style sometimes leads her to improvise lesson plans on the fly rather than follow rigid curricula.
  sports: Diane Mcgill, an avid hiker of the Cedar Creek Lake and Trinity River trails, supplements her foot-focused fitness with a casual membership in the Lewisville Senior Cyclists Club and cheers on
    the Dallas Cowboys and Dallas Mavericks on game days.
  arts: Diane Mcgill, a devoted quilter and crocheter, finds artistic inspiration in the intricate melodies of folk singer Emmylou Harris and the suspenseful prose of Agatha Christie, often weaving these
    influences into embroidered motifs for her garden-themed quilts.
  travel: Diane Mcgill, who favors spur-of-the-moment road trips over rigid itineraries, regularly explores Texas state parks like Big Bend and Guadalupe Mountains and dreams of a weekend pilgrimage to
    the historic castles of Scotland once her garden-project budget permits.
  culinary: Diane Mcgill, an enthusiastic home chef, blends Tex-Mex staples such as chicken enchiladas with global flavors like Thai green curry, frequently seasoning dishes with smoked paprika, roselle
    leaves, and fresh cilantro, and showcases her culinary experiments during intimate dinner gatherings.
  core: Diane Mcgill is a curiosity-driven engineer-turned-gardener who habitually loses track of appointments while constantly tinkering with solar gadgets and stitching garden-inspired quilts.
background:
  cultural: Diane was raised in a middle‑class Anglo‑American family in the Dallas‑Fort Worth metroplex, where Southern hospitality and a strong sense of community were core values. Her upbringing included
    regular church attendance at a Baptist congregation, family gatherings centered around Texas BBQ and county fairs, and an emphasis on self‑reliance and practical problem‑solving. Living in Lewisville,
    she identifies with the blend of suburban Texan culture and Midwestern sensibilities, appreciating both the state's pioneering spirit and the close‑knit neighborhood networks that foster cooperation
    and harmony.
attributes:
  skills: '["Mechanical engineering", "Computer-aided design (CAD)", "Data analysis", "Technical troubleshooting", "Project documentation", "DIY home repair", "Gardening", "Mentoring"]'
  hobbies: '["Gardening", "Birdwatching", "Cooking (Tex-Mex and international cuisine)", "Quilting and crocheting", "Hiking (Cedar Creek Lake, Trinity River Trail)", "Volunteer science workshop facilitation
    at local library", "Reading mystery novels", "DIY technology projects (e.g., solar water pump)", "Traveling to Texas state parks and historic sites"]'
  career_goals: Although retired from full‑time employment, Diane is eager to parlay her technical background into community service. She aims to establish a regular STEM‑mentorship program for middle‑school
    girls at the local library, develop a makerspace curriculum that blends engineering concepts with sustainable gardening, and learn Python to create simple automation tools for her garden. Additionally,
    she hopes to author a guidebook on low‑maintenance native Texas landscaping and to travel spontaneously to explore state parks and historic sites, blending her curiosity with her practical love of the
    outdoors.
