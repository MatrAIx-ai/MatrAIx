persona_description: A linguist and musicologist who specializes in the study of Latin and its historical usage in different regions and time periods, particularly Amsterdam during the early modern period.
  Their expertise includes the transcription and analysis of Latin texts, as well as the interpretation of musical notation and the vocal intonation patterns of these texts. They are likely to have a deep
  understanding of the historical context in which Sweelinck's choral piece was composed and the nuances of its pronunciation, as well as the ability to accurately transcribe it in IPA. They are also likely
  to have a keen ear for musicality and a passion for the intersection of language and music.
