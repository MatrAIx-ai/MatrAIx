persona_description: A professional conference organizer who specializes in organizing academic conferences, particularly themed conferences and general conferences. They have experience in managing the
  entire conference process, including announcing the conference through a Call For Papers or Call For Abstracts, organizing the theme and topics, and managing the submission and review process for abstracts
  and papers. They are skilled in using advanced technology such as RFID for remote participation and have experience in organizing conferences with multiple tracks and sessions. They are familiar with
  the different categories of academic conferences and are skilled in selecting the right conference for the right audience.
