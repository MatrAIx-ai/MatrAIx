  including the Supreme Court's decision in Engel v. Vitale and the Ninth Circuit's ruling in the case of Bolling v. Sharpe. This person is interested in exploring the intersection of religion, government,
  and the First Amendment, and is likely to have a deep understanding of the issues surrounding the Pledge of Allegiance and its impact on religious freedom and government endorsement.
