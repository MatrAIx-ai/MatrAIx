personas:
  professional: Tim Frederickson, a 15-year-old aspiring illustrator, blends traditional sketching with Python-driven interactive art, leveraging his disciplined bullet-journal planning to meet self-imposed
    deadlines for personal projects and community art workshops.
  sports: Tim Frederickson, a devoted fan of the Chicago Cubs and Chicago Blackhawks, spends weekends hiking with the Northside Trail Hikers club, occasionally competes on his middle-school cross-country
    team, and tracks mileage with Strava, balancing outdoor adventure with a love for team sport fandom.
  arts: Tim Frederickson, an avid consumer of indie and alternative music, routinely streams Tame Impala, Phoebe Bridgers, and The Strokes while drawing inspiration from illustrators James Gurney and Hayao
    Miyazaki, and regularly attends community art workshops led by muralist Dana Lawson.
  travel: Tim Frederickson prefers well-planned, low-budget trips that blend nature and culture, having camped in Shenandoah National Park, dreaming of hiking the Grand Canyon, and saving toward a future
    visit to Kyoto to study traditional Japanese woodblock printing.
  culinary: Tim Frederickson loves crafting simple yet flavorful meals such as spicy miso ramen, avocado toast, and homemade pepperoni pizza, often experimenting with fresh cilantro and lime to add bright
    notes, while occasionally treating themselves to craft soda from a local micro-brewery.
  core: Tim Frederickson is a meticulous, art-obsessed teen who fans out via bullet-journaling, balances disciplined creative output with occasional procrastination on homework, and can’t resist a midnight
    slice of pizza while doodling in margins.
background:
  cultural: Tim was raised in Lawrenceville, a suburban community in Gwinnett County, Georgia, within a middle‑class, white Southern family. His upbringing reflects the region’s emphasis on hospitality,
    community involvement, and respect for tradition, often expressed through participation in church activities and local events. While rooted in Southern culture—such as appreciation for comfort food,
    regional music, and family gatherings—he also experiences the county’s growing ethnic diversity, exposing him to a broader range of perspectives that feed his curiosity. This blend of familiar Southern
    values and a multicultural environment shapes his open‑minded yet respectful worldview.
