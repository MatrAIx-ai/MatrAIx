  career_goals: Tim aspires to earn a scholarship to a competitive university where he can study architecture or user‑experience design. He envisions a career that merges his precise organizational abilities
    with his love for art, ultimately becoming a design professional who creates functional, aesthetically compelling spaces or digital products. In the short term, he plans to build a strong portfolio,
    participate in summer art camps, and take advanced courses in math, physics, and visual arts to prepare for a rigorous college admissions process.
