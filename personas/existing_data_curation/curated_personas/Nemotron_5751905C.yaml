personas:
  professional: Bobbie Whack is a budding junior architect who spends afternoons arranging and redesigning LEGO structures, channeling a blend of boundless curiosity and practical blueprint thinking while
    demanding tidy builds that meet their high standards.
  sports: Bobbie Whack plays forward on the neighborhood’s Sunshine Kids Soccer Club, practices drills with disciplined precision, and cheers for the Seattle Sounders FC during televised matches, often
    mimicking the team’s chants while balancing solo practice sessions with friendly games.
  arts: Bobbie Whack delights in watching Disney’s Frozen, dancing to The Wiggles, and chanting Sesame Street’s alphabet song, while their nightstand holds a stack of picture books by Dr. Seuss, and their
    crayon drawings often feature characters like Mickey Mouse and Elsa.
  travel: Bobbie Whack loves family road trips that start with a colorful checklist of snacks and stickers, has already visited Disneyland in Anaheim and the Grand Canyon, dreams of standing beneath the
    Eiffel Tower, and prefers vacation days that mix a day of structured museum tours with unstructured beach sandcastle building.
  culinary: Bobbie Whack prefers creamy macaroni and cheese, chicken nuggets with honey‑mustard dip, and strawberry‑banana smoothies, often helps stir pancake batter using a wooden spoon, and occasionally
    insists on adding extra cheese to mini pepperoni pizza, showing a budding yet messy kitchen enthusiasm.
  core: Bobbie Whack is an organized five‑year‑old explorer who balances disciplined routines with bursts of curiosity, a love for tidy LEGO projects, and a secret stash of gummy bears.
background:
  cultural: Bobbie grows up in a close‑knit African‑American family in Atlanta’s vibrant Fulton County. His parents and grandparents celebrate cultural traditions such as Juneteenth, Soul Food cook‑outs,
    and Sunday church services where he participates in children’s choir rehearsals. He is surrounded by a community that values storytelling, music, and collective achievement, which nurtures his curiosity
    and discipline. Local neighborhood events, like community garden projects and library story hours, reinforce his sense of belonging and provide role models from diverse professional backgrounds, shaping
    his aspirations and worldview.
attributes:
  skills: '[''Letter recognition and basic phonics'', ''Counting and simple addition'', ''Organizing toys and personal space'', ''Building with blocks and basic puzzle solving'', ''Following structured
