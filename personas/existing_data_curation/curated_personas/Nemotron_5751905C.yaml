  career_goals: Even at five, Bobbie fantasizes about future roles that let him help others and solve problems. He loves hearing stories about firefighters, engineers, and teachers, and often declares he
    wants to become a firefighter who rescues people, an engineer who builds cool machines, or a teacher who shares knowledge. His organized, high‑standard mindset fuels a desire to earn gold stars in school
    and later, scholarships that will let him pursue a career where he can combine creativity with practical impact.
