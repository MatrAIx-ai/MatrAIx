personas:
  professional: Taniyah Oglesby, a 27-year-old appliance service technician, combines meticulous schematic reading and electrical troubleshooting with a customer-centric, empathetic style, while they infuse
    each repaired unit with artistic customizations that reflect their curiosity and community-focused values.
  sports: Taniyah Oglesby enjoys weekend runs with the DC Road Runners Club, rides the Capital Bikeshare in spring, follows the Washington Capitals hockey and the Washington Commanders football teams, and
    they balance their active routine with occasional weekend basketball pick-up games at the community center.
  arts: Taniyah Oglesby spends evenings at contemporary galleries featuring artists like Kehinde Wiley and Amy Sherald, sketches urban vistas after listening to Miles Davis and Erykah Badu, attends poetry
    slams at Busboys and Poets, and they find inspiration in the rhythm of modern jazz and R&B for their appliance custom designs.
  travel: Taniyah Oglesby plans trips that blend cultural immersion and relaxation, having explored New Orleans for its jazz heritage and Savannah’s historic districts, and they budget for a future solo
    retreat to Jamaica’s beaches and a tech-focused itinerary in Tokyo, often using point-accumulating credit cards to offset airfare.
  culinary: Taniyah Oglesby, an adept home cook, whips up Southern comfort foods like collard greens seasoned with smoked paprika and Caribbean jerk chicken marinated in allspice and scotch bonnet, while
    experimenting with homemade roti and sweet potato gnocchi, and they favor fresh herbs, okra, and citrus zest to elevate each dish.
  core: Taniyah Oglesby blends technical precision with an artist’s curiosity, and they mentor peers, but habitually lose track of time when sketching, leading to occasional late-night work sessions.
background:
  cultural: Taniyah is an African‑American woman raised in Suitland, Maryland, a community steeped in the rich cultural heritage of Prince George’s County. Her family traditions blend church‑based values
    of service and togetherness with a celebration of Black art, music, and cuisine. Growing up near Washington, D.C., she was exposed to a vibrant Black cultural scene—from historic institutions like the
    National Museum of African American History and Culture to local festivals showcasing contemporary Black artists and musicians. These experiences fostered a strong sense of community responsibility
    and a deep appreciation for artistic expression, which she carries into both her professional work and personal life. She often draws on this cultural foundation to connect with clients, mentor younger
    professionals, and engage in community initiatives that promote sustainability and empowerment.
attributes:
  skills: '["Appliance diagnostics", "Electrical circuit troubleshooting", "Mechanical repair and maintenance", "Soldering and wiring", "Equipment testing and calibration", "Customer communication and service",
    "Technical documentation and record-keeping", "Safety compliance", "Problem solving", "Time management"]'
  hobbies: '["Visiting art galleries and museums", "Sketching and urban photography", "DIY home improvement and appliance customization", "Listening to jazz and R&B music", "Reading science fiction and
    technology non-fiction", "Cooking Southern and Caribbean cuisine", "Volunteering at community tech workshops", "Attending local poetry slams", "Gardening"]'
  career_goals: Taniyah aims to obtain Certified Appliance Service Technician (CAST) certification and advance to a senior field technician role within the next few years. Long‑term, she envisions launching
    her own eco‑friendly appliance restoration studio that blends high‑quality repairs with artistic customization, offering clients unique, sustainable solutions. She is passionate about mentoring aspiring
    technicians, especially those from underrepresented backgrounds, and plans to develop community workshops that teach basic appliance maintenance and promote sustainable repair practices.
