  career_goals: He aims to remain an active contributor to the Channahon community by volunteering on local infrastructure planning boards, offering pro bono mentorship to young engineers, and championing
    sustainable, flood-resilient designs for the nearby river corridors. Michael also hopes to author a series of practical guidebooks on cost-effective civil engineering practices and to lead workshops
    that introduce seniors to basic digital tools. Though formally retired, his ambition is to leave a lasting legacy of safer, greener public spaces and to foster intergenerational collaboration within
    the engineering profession.
