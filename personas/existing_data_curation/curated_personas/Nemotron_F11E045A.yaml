  hobbies: '[''Basketball (pickup games at local park)'', ''Salsa dancing'', ''Cooking Puerto Rican meals (mofongo, arroz con gandules)'', ''Listening to reggaeton and Latin music'', ''Volunteering at community
    festivals'', ''Exploring new health-tech gadgets'', ''Reading health and wellness articles'', ''Watching NBA games with friends'', ''Socializing at neighborhood gatherings'']'
  career_goals: He aims to earn a Certified Nursing Assistant (CNA) credential within the next year, then pursue an associate’s degree in nursing to become a Registered Nurse specializing in geriatric home
    care. Edher hopes to leverage his curiosity about new health technologies to become a lead caregiver who introduces smart‑home health solutions to his agency. Long‑term, he envisions founding a small,
    culturally‑sensitive home‑care business that serves the Puerto Rican and broader Latinx community in Queens, providing jobs for other bilingual aides while ensuring financial stability for his own family.
