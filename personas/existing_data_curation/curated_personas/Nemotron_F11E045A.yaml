personas:
  professional: Edher Roman is an in‑home caregiver in Queens who blends bilingual fluency with a curiosity for health‑tech wearables to monitor vital signs and coordinate care, yet their laid‑back approach
    to paperwork often results in frantic end‑of‑day logging, and their competitive drive fuels a pursuit of CNA certification and a future RN role specializing in geriatric home care.
  sports: Edher Roman hits the local park for pickup basketball games on weekends, follows the New York Knicks and Miami Heat for NBA action, and joins a community salsa‑dance class that doubles as a cardio
    workout, while cheering for a Caribbean national baseball team during World Baseball Classic broadcasts.
  arts: Edher Roman streams reggaeton hits from Bad Bunny and classic Latin rock anthems by Carlos Vives, attends live salsa performances at a neighborhood cultural center, and occasionally watches Oscar‑winning
    Spanish‑language films starring Penélope Cruz, using music as a backdrop for cooking and evening wind‑down.
  travel: Edher Roman prefers short getaways to coastal cities, having spent a weekend in San Juan sampling street food and a week in Barcelona exploring Gaudí architecture, while dreaming of a road trip
    across the U.S. East Coast with friends to visit historic music venues and relax on beachfront cottages.
  culinary: Edher Roman loves to whip up mofongo with a crispy plantain base and arroz con gandules seasoned with sofrito, often pairing meals with a side of tostones and a glass of passion‑fruit juice,
    but admits the kitchen gets messy because they multitask cooking while scrolling through wellness blogs.
  core: Edher Roman is a sociable, tech‑curious caregiver who balances late‑night fiesta‑style cooking and basketball with a perpetual battle against disorganization and stress‑induced worry, constantly
    juggling aspirations to become a nurse entrepreneur.
background:
  cultural: Born to Puerto Rican parents and raised in Queens Village, Edher grew up bilingual, celebrating traditions such as Nochebuena, three‑hour family meals, and the annual Puerto Rican Day Parade
    in New York. His faith background is Catholic, and he participates in the local parish’s community outreach. The vibrant Caribbean‑Latin neighborhood provided him with a strong sense of pride in his
    heritage, shaping his commitment to serve fellow Spanish‑speaking seniors. He balances the island’s warm, family‑centric values with the fast‑paced, multicultural energy of Queens, using this blend
    to connect with clients from diverse backgrounds while preserving his own cultural identity.
attributes:
  skills: '[''Patient vital sign monitoring'', ''Assistance with activities of daily living (ADLs)'', ''Medication reminder and compliance'', ''Bilingual communication (Spanish-English)'', ''Home safety
