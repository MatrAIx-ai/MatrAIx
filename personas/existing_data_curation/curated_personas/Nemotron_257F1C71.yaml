  hobbies: '[''Watercolor painting'', ''Visiting museums and galleries'', ''Gardening'', ''Crocheting'', ''Reading historical fiction'', ''Cooking Mexican dishes'', ''Walking on the beach'', ''Attending
    Día de los Muertos celebrations'', ''Singing in a community choir'', ''Practicing gentle yoga'']'
  career_goals: Chastity aims to stay mentally active and make meaningful contributions to her community. She hopes to develop and lead a weekly senior art workshop at the Long Beach Senior Center, sharing
    her knowledge of painting techniques and art appreciation. She wants to mentor younger members of the local Mexican‑American community in preserving cultural heritage, including teaching Spanish conversation
    classes and helping families document their histories. She also aspires to complete a certificate in digital photography to capture local festivals and to write a memoir that blends personal stories
    with reflections on the evolution of Mexican culture in Southern California. Maintaining her health through gentle yoga and mindfulness practice is another personal objective.
