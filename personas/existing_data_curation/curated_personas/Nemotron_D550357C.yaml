personas:
  professional: Min Lin is a retired data analyst and computer science veteran who leverages Python, R, and statistical visualization to mentor seniors and community college students, and they weave their
    imaginative curiosity and compassionate nature into low-key workshops that blend abstract art and scientific inquiry.
  sports: Min Lin enjoys leisurely morning walks with the Seattle Senior Walking Club, follows the Seattle Mariners baseball season closely, and they practice gentle yoga twice a week to stay limber, preferring
    low-impact activities that complement their love for birdwatching from the balcony.
  arts: Min Lin spends afternoons painting abstract landscapes inspired by the ethereal light of James Turrell, practices traditional calligraphy echoing the strokes of Wang Xizhi, writes generative art
    code reminiscent of Refik Anadol, and they find solace in the speculative worlds of Octavia Butler and Ted Chiang, while curating a collection of minimalist Philip Glass compositions.
  travel: Min Lin prefers low-key travel that blends art and nature, such as a contemplative solo trip to Kyoto's Zen gardens, a weekend retreat to the Sonoran Desert near Tucson to photograph succulents,
    and occasional visits to the Scottish Highlands to capture mist-shrouded lochs, and they plan each journey with meticulous itineraries that balance curiosity with a modest retirement budget.
  culinary: Min Lin enjoys crafting simple yet aromatic meals such as mushroom miso ramen, stir-fried bok choy with fermented black bean, and a succulent-themed salad with figs and goat cheese, pairing
    them with jasmine or chrysanthemum tea, and while their cooking skill is modest, they delight in plating dishes as miniature canvases reflecting their artistic sensibility.
  core: Min Lin, a 72-year-old retired data analyst turned intergenerational art-science mentor, balances an imaginative wanderlust with a gentle disorganization that sometimes leads to missed bill payments,
    yet they remain compassionate and love quiet creative solitude, constantly exploring new horizons on canvas, code, and balcony perches.
background:
  cultural: Min Hee Lin is a second‑generation East Asian American whose family originates from Taiwan. Raised in a bilingual household that emphasized education, respect for elders, and community harmony,
    she continues to observe traditional festivals such as Lunar New Year and the Mid‑Autumn Festival while living in Columbus, Ohio. Her cultural upbringing informs her compassionate, cooperative outlook
    and her dedication to sharing knowledge across generations.
