  hobbies: '[''Abstract painting'', ''Calligraphy'', ''Speculative fiction reading'', ''Philosophy'', ''Jigsaw puzzle solving'', ''Indoor gardening'', ''Birdwatching'', ''Generative art coding'']'
  career_goals: Although she is no longer in the formal workforce, Min Hee Lin aims to continue learning and sharing her knowledge. She plans to launch a low‑key community workshop series that blends art
    and science for local seniors and youth, author a bilingual guide to digital literacy for older adults, and eventually compile a reflective memoir that interweaves her scientific insights with personal
    stories and cultural memories. Her overarching ambition is to foster intergenerational harmony and inspire curiosity about the world.
