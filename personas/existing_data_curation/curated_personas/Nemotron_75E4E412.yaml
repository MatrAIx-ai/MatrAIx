  hobbies: '[''Gardening'', ''Quilting'', ''Reading historical fiction and biographies'', ''Listening to jazz and R&B music'', ''Volunteering as a STEM mentor'', ''Church outreach activities'']'
  career_goals: Leslie aims to transition into a supervisory role within the next two years, focusing on establishing a structured apprenticeship program that blends hands‑on skill building with safety
    and sustainability principles. She plans to earn a Certified Welding Inspector (CWI) credential and a Six Sigma Yellow Belt to enhance process efficiency. Long‑term, she hopes to influence company policies
    that promote diversity, inclusion, and workforce development, ensuring a smooth retirement while leaving a lasting mentorship legacy for younger workers.
