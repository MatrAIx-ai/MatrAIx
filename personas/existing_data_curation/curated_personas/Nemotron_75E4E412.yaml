personas:
  professional: Leslie Gaines, a seasoned metal and plastic fabricator with three decades of CNC machining, MIG/TIG welding, injection molding, and quality‑assurance expertise, leverages their education
    background and nurturing personality to design and lead apprenticeship programs that blend hands‑on skill building, safety, and sustainability while mentoring apprentices with a collaborative, story‑telling
    approach.
  sports: Leslie Gaines supports the Rochester Red Wings baseball team and the Buffalo Bills, participates in a local senior walking club that meets on Saturday mornings, enjoys occasional pick‑up basketball
    games at the community center, but generally prefers the steady rhythm of garden work to high‑intensity sports.
  arts: Leslie Gaines finds creative release in quilting with patterns inspired by traditional motifs, attends live jazz performances at the Rochester Jazz Festival featuring Miles Davis tributes, regularly
    listens to classic R&B icons such as Aretha Franklin while reading biographies of pioneering women like Ida B. Wells.
  travel: Leslie Gaines enjoys curated travel that balances cultural immersion and relaxation, having toured historic Harlem, attended the New Orleans Jazz & Heritage Festival, taken a scenic road trip
    through the Finger Lakes, and dreaming of a future pilgrimage to Ghana’s coastal towns to connect with ancestral roots.
  culinary: Leslie Gaines delights in soulful cooking, often preparing collard greens seasoned with smoked turkey, sweet potato pie, and heirloom tomato gazpacho, while skillfully tending a kitchen garden
    that yields fresh basil and kale for weekly family meals.
  core: Leslie Gaines blends a hands‑on fabrication expertise with a nurturing, community‑focused spirit, shepherding apprentices through practical skill, soulful food, and stories, all while humming classic
    R&B in the shop and occasionally forgetting to water the garden.
background:
  cultural: Leslie grew up in a close‑knit African‑American community in upstate New York, shaped by the civil‑rights movements of the 1960s and 1970s. Her family emphasized education, church involvement,
    and mutual support, instilling values of cooperation, resilience, and community service. She carries forward traditions of soulful cooking, gospel music, and storytelling, which inform her collaborative
    approach at work and her dedication to mentoring younger generations. The multicultural environment of Rochester enriches her perspective, allowing her to engage with a diverse mix of cultures through
    local festivals, community programs, and interfaith activities while maintaining a strong sense of Black heritage.
attributes:
  skills: '[''CNC machining'', ''Injection molding operation'', ''MIG/TIG welding'', ''Blueprint reading'', ''Quality assurance'', ''Safety compliance and training'', ''Process optimization'', ''Adult education
