  career_goals: Dawn aims to attain partnership within her firm’s technology and environmental practice, positioning herself as a leader in cutting‑edge legal services that integrate tech solutions. She
    aspires to launch a boutique consultancy that develops AI‑driven legal‑tech tools for data‑privacy and climate‑law compliance. Long‑term, she seeks appointment as a circuit court judge in Oregon to
    influence policy on emerging technology and environmental regulation. Throughout her career she is committed to mentoring women and underrepresented professionals at the intersection of STEM and law,
    and to contributing scholarly articles on the practical application of legal analytics.
