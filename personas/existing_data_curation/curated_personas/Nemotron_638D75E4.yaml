personas:
  professional: Alexis Haydel, a seasoned special‑education teacher in Texas, leverages their data‑driven, routine‑focused mindset to craft meticulously monitored IEPs, lead evidence‑based workshops, and
    mentor peers, all while competitively eyeing a future as a district‑wide Special Education Coordinator and pursuing a master’s and doctorate to back their systematic vision.
  sports: Alexis Haydel fuels their fitness through Saturday hikes in the Texas Hill Country, regular yoga sessions, and cheering on the Dallas Cowboys and Houston Astros, while also belonging to a community
    trail‑running group that satisfies their competitive spirit.
  arts: Alexis Haydel weaves creativity into their life via a weekly knitting circle, intense board‑game nights where they channel a Sherlock Holmes‑like deduction style, devouring Agatha Christie mysteries,
    and attending live shows by the regional blues‑rock group The Lone Star Rollers, all of which shape their appreciation for narrative and rhythm.
  travel: Alexis Haydel balances a love for meticulously planned weekend getaways to the Texas Hill Country with spontaneous road trips to Santa Fe and a bucket‑list longing to explore Oaxaca’s culinary
    markets and Japan’s cherry‑blossom festivals, all while navigating a work schedule that demands careful budgeting and occasional family commitments.
  culinary: Alexis Haydel channels their experimental streak into Tex‑Mex cuisine, perfecting carnitas tacos with charcoal‑grilled corn tortillas, crafting smoky queso fundido with poblano peppers, and
    obsessively layering fresh cilantro and lime, though they often indulge in an extra generous cheese drizzle that even their knitting circle guests find hard to resist.
  core: Alexis Haydel blends a love for routine‑driven special‑education leadership with a competitive, slightly disorganized zest for puzzles, knitting, and Tex‑Mex flavor, navigating life with a pragmatic
    yet flexible outlook that never shies away from a good mystery.
background:
  cultural: Alexis comes from a middle‑class, white family that has lived in the Austin‑Travis County area for generations. Her upbringing emphasized practicality, self‑reliance, and a strong work ethic—values
    typical of Texas suburbs—while her adult life in Austin exposed her to the city’s eclectic, progressive culture. She celebrates mainstream American holidays, enjoys regional traditions like the Texas
    State Fair and local barbecue gatherings, and appreciates the city’s diversity, which informs her inclusive approach in the classroom.
attributes:
  skills: '[''IEP Development'', ''Behavior Intervention Planning'', ''Data‑Driven Instruction'', ''Assistive Technology Integration'', ''Differentiated Instruction'', ''Classroom Routine Design'', ''Family
    Communication and Collaboration'', ''Professional Development Coaching'', ''Special Education Law Compliance (IDEA)'', ''Crisis Intervention'']'
  hobbies: '[''Knitting'', ''Hiking'', ''Board Games'', ''Reading Mystery Novels'', ''Cooking Tex‑Mex'', ''Yoga'', ''Puzzles (crosswords, Sudoku)'', ''Live Music (local venues)'', ''Gardening'']'
  career_goals: Alexis aims to transition into a district‑wide Special Education Coordinator role where she can shape systemic, routine‑based inclusive practices. She plans to earn a master’s in Special
    Education Administration and eventually pursue a doctorate in Educational Leadership. Long‑term, she envisions publishing case studies on practical interventions, mentoring new teachers, and consulting
    with schools to implement evidence‑based, sustainable programs while maintaining a healthy work‑life balance.
