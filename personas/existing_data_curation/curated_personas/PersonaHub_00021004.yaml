persona_description: A historian or a specialist in the history of the Islamic world, particularly focusing on the period from the 700's to the 900's. This individual is interested in the political, social,
  and religious aspects of the Rustamid state, its leaders, and its impact on North Africa during that time. They are knowledgeable about the Persian origins of the Rustamid rulers and the region's geography,
  particularly the Jabal Nafusa in Libya. They are interested in the details of the Rustamid state's governance, its military strategies, and its cultural and religious practices. They are also interested
  in the political and social changes that occurred during this period, and the impact of the Rustamid state on the surrounding regions.
