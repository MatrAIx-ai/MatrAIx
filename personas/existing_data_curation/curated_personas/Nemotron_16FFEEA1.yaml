  career_goals: Faith dreams of a future where she can blend art and science, envisioning herself as an astronaut‑artist or a storyteller who creates illustrated books about space and imagined worlds. She
    hopes to study astronomy or environmental science while continuing to draw, paint, and write stories that inspire others. She also imagines leading school clubs that combine creativity with discovery,
    such as a 'Space Art' or 'Science Storytelling' group.
