personas:
  professional: Faith Ma is a budding junior illustrator and storyteller who channels relentless imagination into vivid sketches of celestial beings and dramatic monologues; they thrive on collaborative
    school productions while leaving crayons and half‑finished LEGO creations sprawled across the floor, a testament to their flexible, relaxed approach to creativity.
  sports: Faith Ma dabbles in after‑school soccer with the Princeton Tigers Youth Soccer Club in the fall, cheers on the New York Yankees and New Jersey Devils from the sidelines, and they often forget
    their cleats, relying instead on spontaneous games of tag and weekend family bike rides through the woods to stay active.
  arts: Faith Ma immerses themselves in imaginative art by drawing dragons inspired by Studio Ghibli’s Totoro, painting moonlit scenes echoing Alex Grey’s cosmic motifs, performing Shakespeare‑style monologues
    for the school drama club, and they practice beginner piano pieces like Mozart’s 'Twinkle, Twinkle' variation, all while humming the Harry Potter soundtrack.
  travel: Faith Ma prefers spontaneous weekend trips—like a family day at the Smithsonian’s National Air and Space Museum in Washington, a quick ride to Philadelphia’s Magic Gardens, or an evening stargazing
    at the Princeton University Observatory—and they dream of camping under the Milky Way in Arizona’s Grand Canyon and exploring ancient castles in Scotland, though their travel plans are usually left
    to parents’ calendars rather than detailed itineraries.
  culinary: Faith Ma loves buttery macaroni‑and‑cheese and pepperoni pizza, can flawlessly whisk together chocolate chip cookies using cocoa powder and rainbow sprinkles, enjoys mixing simple science‑puzzle
    recipes like homemade ice‑cream in a bag, and they often forget to wash the dishes after a snack, turning clean‑up into a nightly adventure.
  core: Faith Ma is a sky‑gazing, LEGO‑building dreamer who bursts with creative energy, delights in sharing stories with friends, yet they habitually leave art supplies scattered and forget bedtime, making
    organized chores an occasional nightmare.
background:
  cultural: Faith comes from a white Midwestern family in Princeton, Illinois, a small agricultural community in Bureau County. Her upbringing reflects typical Midwestern values of friendliness, community
    involvement, and appreciation for local traditions such as county fairs, church gatherings, and holiday celebrations. Her family's heritage includes German and Irish roots common in the region, and
    she often participates in local events like the summer fair, Thanksgiving potlucks, and Fourth of July parades. While she enjoys modern media and technology, she also values time spent outdoors on family
    farms and learning about the natural environment around her.
