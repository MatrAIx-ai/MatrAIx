personas:
  professional: Harry Garcia, a seasoned art historian and community curator in St. Louis County, they blend their Renaissance-to-contemporary expertise, meticulous event planning, and natural charisma
    to design inclusive exhibitions, lead educational tours, and coordinate volunteer programs that reflect their curiosity and commitment to harmonious collaboration.
  sports: Harry Garcia, an enthusiastic member of the St. Louis Outdoor Club, they spend weekends hiking the Ozark foothills, attend Saturday morning yoga sessions, and proudly hold season tickets for the
    St. Louis Cardinals and St. Louis Blues, balancing active pursuits with a sociable love for team camaraderie.
  arts: Harry Garcia, a dedicated patron of the arts, they frequent the Saint Louis Art Museum and the Contemporary Art Museum St. Louis, cherish openings featuring artists like Kehinde Wiley and local
    painter Sarah Jensen, participate in the community theater’s St. Louis Community Players productions, and read poetry by Mary Oliver and Sylvia Plath while drafting essays for regional arts publications.
  travel: Harry Garcia, a methodical traveler who blends careful itinerary planning with spontaneous day trips, they have explored New Orleans for its jazz and Creole cuisine, trekked the historic streets
    of Santa Fe’s art districts, dream of a pilgrimage to Florence’s Uffizi Gallery and Kyoto’s Zen gardens, and often return to nearby Cahokia Mounds for local history immersion.
  culinary: Harry Garcia, a home‑cooking enthusiast, they draw fresh rosemary, thyme, and basil from their garden to craft herb‑infused olive oil, slow‑cook coq au vin on Sundays, prepare garden rosemary
    focaccia for friends, and occasionally over‑season dishes while delightfully sharing stories over the dinner table.
  core: Harry Garcia, a sociable, organized art lover, they channel curiosity into community programs while wrestling with chronic worry and a penchant for occasional over‑commitment.
background:
  cultural: Harry is a white American raised in the Midwestern suburbs of St. Louis County, Missouri. His family background reflects the region’s blend of German and Irish ancestry, with a surname hinting
    at a distant Hispanic lineage, giving him an appreciation for diverse cultural narratives. Growing up in Fenton, he was immersed in Midwestern values of hospitality, community involvement, and a strong
    work ethic, while also benefiting from the city’s vibrant arts scene and historic heritage. These influences shape his appreciation for both traditional American folk art and contemporary global movements,
    and inform his commitment to fostering cultural exchange within his local community.
