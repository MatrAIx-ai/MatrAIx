    Events)'']'
  career_goals: Harry aims to channel his lifelong passion for the arts into a community-focused career. He plans to obtain a museum studies certification and secure a part-time role as a curator or education
    coordinator at a local museum or historical society. Concurrently, he aspires to launch a neighborhood art-hub that offers workshops, exhibitions, and mentorship for emerging artists. He also hopes
    to contribute regularly as a freelance writer for regional arts publications, sharing reviews and essays that highlight under-represented creators. Ultimately, Harry seeks to blend his organizational
    talent with his sociable nature to foster inclusive cultural programming that enriches the St. Louis County community.
