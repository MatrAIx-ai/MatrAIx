  hobbies: '[''Art Gallery Visits'', ''Watercolor Painting'', ''Community Theater'', ''Pick‑up Basketball'', ''Board‑Game Nights'', ''Trivia Contests'', ''Vietnamese Cooking'', ''Cultural Festival Participation'',
    ''Mindfulness Meditation'', ''Hiking'']'
  career_goals: Van aims to progress from a packager to a shift supervisor or logistics coordinator within the next three years, leveraging his hands‑on experience to lead a team and improve operational
    efficiency. He plans to earn certifications such as APICS CPIM and pursue a bachelor's degree in supply chain management, with a long‑term ambition to specialize in eco‑friendly packaging design and
    possibly launch a consultancy that helps local businesses adopt sustainable packaging solutions. Alongside professional growth, he is committed to building personal resilience and mastering stress‑management
    techniques to better handle his emotional reactivity.
