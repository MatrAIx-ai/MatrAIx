  hobbies: '[''Gardening'', ''Hiking local trails'', ''Reading contemporary fiction'', ''Cooking Vietnamese dishes'', ''Watching Asian dramas'', ''Listening to pop and indie music'', ''Journaling'', ''Photography'',
    ''Volunteering at community events'']'
  career_goals: Anh plans to enroll at a local community college to pursue an associate degree in Culinary Arts or Public Health, with a long‑term aim of becoming a community health worker who focuses on
    the nutritional and wellness needs of Asian‑American families. She hopes to combine her cooking skills and health knowledge by eventually opening a small, community‑oriented Vietnamese café that offers
    healthy, affordable meals and serves as a gathering space for cultural events. Alongside this, she intends to earn a certification as a Certified Nursing Assistant to gain practical healthcare experience
    and deepen her understanding of patient care.
