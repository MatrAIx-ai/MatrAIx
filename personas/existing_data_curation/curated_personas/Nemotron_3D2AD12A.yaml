personas:
  professional: Juan Lopez is an aspiring office administrator who leverages their meticulous budgeting, time‑management, and carpentry know‑how to streamline office logistics, while their reliable, methodical
    nature ensures every project follows a clear, predictable workflow.
  sports: Juan Lopez enjoys weekend pickup soccer with the Arlington Kickers, is a loyal fan of DC United and the Washington Capitals, and they maintain a disciplined fitness routine that balances light
    gym sessions with casual bike rides on Sundays.
  arts: Juan Lopez finds inspiration in the rhythmic guitars of Juanes, the classic rock anthems of The Rolling Stones, and the vibrant murals of local street artists, attending community theater shows
    whenever possible and collecting vintage concert posters for their home office.
  travel: Juan Lopez prefers well‑planned short trips, often weekending in historic Philly or the vineyards of Virginia, while dreaming of a culinary pilgrimage to Oaxaca and budgeting carefully to ensure
    family visits to nearby relatives don’t disrupt their schedule.
  culinary: Juan Lopez excels at crafting pupusas, yuca frita, and tamales with fresh masa, cheese, and achiote, often experimenting with novel fillings like spinach‑feta while also mastering quick week‑night
    spaghetti for a balanced menu.
  core: Juan Lopez navigates life with a precise to‑do list, a deep commitment to community, occasional over‑thinking fueled by anxiety, and an insatiable love for solving crowded jigsaw puzzles.
background:
  cultural: Juan’s cultural identity is rooted in his Salvadoran heritage. His parents immigrated from El Salvador in the 1990s, bringing traditions such as Semana Santa observances, family‑centered gatherings,
    and a deep appreciation for Salvadoran cuisine. Growing up in the Washington, D.C. metropolitan area, he remained closely connected to the local Salvadoran community, attending the annual Feria Salvadoreña,
    participating in church celebrations, and speaking Spanish at home. These experiences instilled values of family solidarity, community service, respect for elders, and bilingual communication, which
    continue to influence his daily life, hobbies, and aspirations.
