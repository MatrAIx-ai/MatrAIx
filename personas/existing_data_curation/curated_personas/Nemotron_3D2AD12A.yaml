  career_goals: Juan aims to complete his associate degree in Business Administration and secure a stable full‑time position in office administration, logistics, or a similar role that values his organized
    and dependable nature. He also aspires to start a small side business offering homemade Salvadoran dishes for local catering, blending his culinary passion with entrepreneurship. In the long term, he
    hopes to become a key liaison in a community organization that assists immigrants, while maintaining a work schedule that minimizes stress and supports his mental well‑being.
