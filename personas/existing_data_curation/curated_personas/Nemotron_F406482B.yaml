  career_goals: Although retired, Charlene focuses on staying mentally and socially active. She aims to complete a memoir that weaves together her family history and the stories she has collected for the
    local historical society. She hopes to curate a small traveling exhibition of photographs and artifacts from Plainfield’s early 20th‑century residents for senior centers and libraries. In the bridge
    community, she aspires to attain a senior Life Master title. She also plans to mentor at least two younger volunteers each year in archival work and gardening, ensuring continuity of community knowledge.
    In the short term, she wants to visit the Indianapolis Museum of Art’s special exhibition on contemporary abstract art, reflecting her curiosity about new artistic ideas.
