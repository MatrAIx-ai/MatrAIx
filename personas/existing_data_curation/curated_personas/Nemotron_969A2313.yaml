  hobbies: '[''hiking in the Sonoran Desert'', ''photography of desert flora and wildlife'', ''volunteering with Habitat for Humanity'', ''classic car restoration'', ''reading engineering and history non‑fiction'',
    ''target shooting'', ''community barbecues'']'
  career_goals: Harvey aims to advance into a supervisory or lead role within the warehouse, obtaining additional certifications such as Certified Warehouse Manager and an OSHA 30‑hour construction safety
    course. He intends to oversee a logistics team, implement process‑improvement initiatives that reduce errors and improve turnaround times, and eventually launch a small freight‑consulting business that
    advises regional warehouses on efficiency and safety.
