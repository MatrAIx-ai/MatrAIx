  career_goals: Dana envisions a future where she can shape visual culture and community dialogue. She aspires to become a multimedia storyteller or creative director, merging her love for art with social
    impact. Long‑term, she hopes to launch a youth‑focused community art studio in Cape May County that offers workshops, mural projects, and digital media training. Alongside this, she is interested in
    exploring careers in digital marketing or UX design, where her curiosity for new ideas and competitive edge can thrive.
