personas:
  professional: Dana Jonestaylor, a 16‑year‑old digital illustrator and aspiring creative director, blends strong public‑speaking, collaborative video editing, and a skeptical yet curious mindset to lead
    school art projects and plan community murals with a meticulous yet adaptable workflow.
  sports: Dana Jonestaylor spikes for the Cape May Middle School Sharks volleyball squad, shreds the board with the Boardwalk Shredders skate club on weekends, and roots for the New Jersey Wildcats while
    regularly hitting the community center courts to stay fit.
  arts: Dana Jonestaylor thrives in local art workshops, co‑creates vibrant street murals inspired by Banksy and Basquiat, captures the seaside’s pastel hues in photography reminiscent of William Eggleston,
    and curates personal playlists that swing from Kendrick Lamar’s hip‑hop beats to Kamasi Washington’s jazz improvisations.
  travel: Dana Jonestaylor favors spontaneous, budget‑friendly road trips along the Jersey Shore—revisiting Atlantic City’s boardwalk and exploring historic Philadelphia—while dreaming of a spring backpacking
    adventure to Berlin’s urban art scene, balancing school deadlines with a modest travel fund.
  culinary: Dana Jonestaylor enjoys whipping up casual seafood feasts like crab cakes seasoned with Old Bay and fish tacos garnished with avocado, pairs them with a reliable pepperoni pizza recipe, and
    experiments with fresh herbs while maintaining a beginner‑to‑intermediate cooking skill level.
  core: Dana Jonestaylor is a curious, competitively spirited teen who channels calm resilience into bold artistic projects, relentless skate sessions, and meticulous budgeting, all while juggling a skeptical
    eye toward peer influences.
background:
  cultural: Dana grew up in a tight‑knit African‑American family in Cape May Court House, where church gatherings, family reunions, and community festivals are central to her identity. Her grandparents'
    Southern heritage and the maritime culture of southern New Jersey intertwine in her worldview. She draws inspiration from Black artists such as Jean‑Michel Basquiat and Kehinde Wiley, and participates
    in the local African‑American youth program that emphasizes cultural pride, mentorship, and artistic expression. This blend of regional coastal life and rich Black cultural traditions informs her artistic
    perspective and community‑focused ambitions.
