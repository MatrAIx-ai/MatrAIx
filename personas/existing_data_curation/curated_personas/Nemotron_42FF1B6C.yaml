personas:
  professional: Jamela Nguyen, a seasoned facilities supervisor in Los Angeles, leverages a STEM-driven analytical mindset and meticulous organizational skills to optimize large housekeeping teams, integrate
    eco‑friendly cleaning automation, and champion data‑backed safety compliance while fostering a collaborative, high‑morale workplace that reflects their love for community art.
  sports: Jamela Nguyen, an avid participant in weekend hikes with the Griffith Park Trail Crew and a regular at sunrise yoga sessions at Runyon Canyon, also roots for the Los Angeles Lakers and LA Galaxy,
    occasionally joining a community softball league for extra camaraderie.
  arts: Jamela Nguyen immerses themselves in LA’s vibrant arts scene, from strolling through the Broad and LACMA to snapping street mural photos of artists like Shepard Fairey and KiNK, while curating rotating
    art installations in their facilities to weave cultural resonance into everyday spaces.
  travel: Jamela Nguyen prefers thoughtfully planned getaways that blend adventure and cultural immersion, such as road‑tripping the Pacific Coast Highway to Big Sur, exploring the historic Old Quarter
    of Hanoi, and attending a weekend art retreat on Bali’s Gili islands, all scheduled around family commitments and limited vacation days.
  culinary: Jamela Nguyen, an enthusiastic home chef, perfects Vietnamese pho, bun cha, and lemongrass‑infused tofu while experimenting with sustainable sourcing at local farmer’s markets, often hosting
    cooking workshops that double as community bonding events.
  core: Jamela Nguyen, a data‑savvy facilities leader with a green‑cleaning vision, channels their curiosity into art‑filled workplaces, balances disciplined budgeting with occasional gallery splurges,
    and thrives on group yoga and hikes, though they sometimes forget to floss after late‑night project marathons.
background:
  cultural: Jamela is a first‑generation Vietnamese‑American. Raised in a close‑knit immigrant household in Los Angeles, she grew up bilingual, celebrating Tet and other Vietnamese traditions while also
    embracing the multicultural vibrancy of her city. Her family values of harmony, respect for elders, and community service influence her collaborative leadership style. She blends her heritage with contemporary
    American life, often sharing her culture through food, art, and community outreach.
