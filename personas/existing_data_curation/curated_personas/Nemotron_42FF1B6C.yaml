  career_goals: Jamela aims to advance to a senior facilities management role where she can shape sustainability policies for large commercial properties in Los Angeles. She aspires to obtain LEED certification
    expertise, lead campus‑wide green‑cleaning programs, and create partnerships with local artists to incorporate culturally resonant art installations in public spaces. Long‑term, she envisions mentoring
    emerging women supervisors and possibly launching a consultancy that merges operational excellence with community‑focused design.
