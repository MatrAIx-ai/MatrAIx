  hobbies: '[''Hiking local parks and nature trails'', ''Community gardening'', ''Storytime volunteering at the library'', ''Board game nights'', ''Adult dance classes'', ''Knitting and crafting baby blankets'',
    ''Listening to child‑development podcasts'', ''Cooking and baking for family events'', ''Participating in community theater'', ''Exploring local history museums'']'
  career_goals: Deanna aims to advance from frontline childcare work to a licensed center director, where she can design a nature‑focused early learning program that reflects both her curiosity and practical
    sensibility. She plans to obtain a Child Development Associate credential and eventually pursue a bachelor’s degree in early childhood education. Her long‑term ambition includes establishing a community‑based
    childcare hub that offers affordable services, partners with local schools, and provides professional development for caregivers. She also hopes to become a mentor and advocate for improved child‑care
    policies within Erie County.
