persona_description: A biologist studying the unique movement mechanisms of spiders, particularly those related to their internal pressure-driven limb extension mechanism. She is interested in how this
  mechanism affects their speed and the efficiency of their locomotion, and is eager to discover whether this unique limb extension mechanism limits the speed of spiders as they get larger. She is also
  interested in the impact of increasing size on an invertebrate's speed and how it varies across different families of spiders.
