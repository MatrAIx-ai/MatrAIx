personas:
  professional: Marcela Chavez is a seasoned correctional officer with 15 years of experience in inmate classification, crisis management, and bilingual communication, who brings her organized, reliable
    nature and empathetic, community‑focused mindset to mentor peers while pursuing a supervisory role and championing staff‑wellness initiatives.
  sports: Marcela Chavez stays active through early‑morning yoga at Sunrise Yoga studio and weekend jogs along the San Bernardino River, while cheering on the LA Dodgers in baseball and the LA Rams in football,
    and joins a co‑ed community soccer league with Fontana FC during the fall season.
  arts: Marcela Chavez immerses herself in artistic pursuits by attending banda and norteña dance nights, listening to Luis Miguel and Lila Downs, devouring mystery novels by Gillian Flynn and Tana French,
    and appreciating the cinematic work of Guillermo del Toro alongside the vibrant paintings of Frida Kahlo.
  travel: Marcela Chavez prefers thoughtfully planned road trips that blend cultural immersion and relaxation, having explored Ojai’s vineyards and Santa Barbara’s coast, spent a week in Oaxaca sampling
    local cuisine, and dreaming of a future pilgrimage to Kyoto’s tea gardens while balancing weekend getaway budgets with family commitments.
  culinary: Marcela Chavez showcases her intermediate cooking skills by preparing authentic mole poblano and hand‑made tamales using home‑grown chilies, epazote, and roasted spices, while also savoring
    upscale dining at Los Cinco Puntos for its signature chiles en nogada and enjoying casual street‑taco evenings with fresh cilantro and lime.
  core: Marcela Chavez balances disciplined professionalism with a love for cultural traditions, a restless curiosity, and a tendency to over‑worry, channeling stress into yoga, community service, and meticulous
    planning.
background:
  cultural: Marcela is a first‑generation Mexican‑American whose parents immigrated from Jalisco. She grew up bilingual, celebrating Día de los Muertos, Mexican Independence Day, and family fiestas with
    music, mezcal, and homemade foods. Her Catholic upbringing instilled a sense of community service, which she now expresses through volunteer work. Living in Fontana, a city with a vibrant Latino community,
    she blends Mexican traditions with Southern California culture—attending local street fairs, supporting LA‑based Latin artists, and participating in community outreach programs that serve both Mexican
    and broader Hispanic neighborhoods. Her cultural identity informs her respect for family, collectivism, and a strong work ethic.
attributes:
  skills: '[''Inmate classification'', ''Conflict de‑escalation'', ''Crisis management'', ''Incident reporting'', ''Inventory control'', ''Surveillance system operation'', ''Firearms safety certification'',
