  hobbies: '[''Cooking Mexican cuisine'', ''Gardening'', ''Reading mystery and true‑crime novels'', ''Yoga and mindfulness meditation'', ''Dancing to banda and norteña music'', ''Volunteering at a youth
    center'', ''Mentoring teens'', ''Hiking local trails'']'
  career_goals: Marcela aims to rise to a supervisory position within the San Bernardino County Sheriff's Department, such as shift sergeant or training officer. She plans to earn an associate degree in
    criminal justice within the next two years, followed by a bachelor's degree to strengthen her qualifications. Her long‑term ambition is to help redesign staff‑wellness programs that address stress and
    burnout, drawing on her own experiences with anxiety. She also hopes to spearhead inmate‑rehabilitation initiatives that incorporate educational and cultural activities, believing that a supportive
    environment reduces recidivism.
