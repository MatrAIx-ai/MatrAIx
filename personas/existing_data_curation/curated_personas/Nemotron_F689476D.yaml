  hobbies: '[''acrylic painting'', ''sketching'', ''digital illustration'', ''landscape photography'', ''hiking in Ocala National Forest'', ''DIY decorative drywall projects'', ''science‑fiction reading'',
    ''jigsaw puzzles'', ''volunteering with Habitat for Humanity'']'
  career_goals: Jill aims to become a certified drywall finisher and eventually move into a supervisory role, leading small crews on residential and boutique commercial projects. She plans to complete a
    certification in construction management within the next two years and later pursue her associate’s degree in Construction Technology to deepen her technical knowledge. Long‑term, Jill envisions starting
    her own niche contracting business that blends high‑quality finishes with artistic wall treatments, offering custom decorative plaster and textured drywall for clients who value both function and aesthetic
    innovation.
