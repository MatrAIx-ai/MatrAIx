personas:
  professional: Jill Linn, a meticulous drywall installer with expertise in ceiling tile installation and blueprint interpretation, blends their methodical precision and vivid imagination, and they propose
    decorative plaster finishes that delight clients while maintaining code compliance.
  sports: Jill Linn, an avid hiker who joins the Lake City Trail Club for weekend treks through the Okeechobee wildlife area, also roots for the Miami Heat and follows the Tampa Bay Buccaneers, while they
    squeeze in evening basketball pick‑ups at the community center to stay fit.
  arts: Jill Linn, a devoted sketcher and digital illustrator, draws inspiration from Frida Kahlo’s bold colors, the surreal light installations of James Turrell, and the synth‑rich soundscapes of Tame Impala,
    and they often spend evenings recreating scenes from Neal Stephenson’s novels in vivid acrylics.
  travel: Jill Linn, a cautious but curious traveler, prefers meticulously planned road trips to nearby gems like the Florida Keys and Savannah, Georgia, while they dream of a solo sojourn to Kyoto for
    its temple gardens, balancing a limited student budget with a love for off‑the‑beaten‑path photography.
  culinary: Jill Linn, a competent home cook who favors fresh seafood, frequently prepares shrimp and grits seasoned with lemon zest, diced bell peppers, and smoked paprika, while they also experiment with
    tropical fruit smoothies blending mango, pineapple, and coconut water.
  core: Jill Linn, a methodical yet wildly imaginative 21‑year‑old, fuses drywall precision with artistic flair, and they trade late‑night painting sessions for occasional bouts of misplaced toolboxes and
    an endless quest for the perfect shade of teal.
background:
  cultural: Jill grew up in a small-town, Southern‑Florida environment where community gatherings, church activities, and county fairs were central to social life. Her family values emphasize hospitality,
    modesty, and cooperation, shaping her kind and considerate nature. While her heritage is broadly White American, she carries the subtle influences of the regional culture—appreciation for outdoor recreation,
    an informal but respectful communication style, and a strong sense of responsibility to family and neighbors. These cultural touchstones inform her preference for close‑knit social circles, her involvement
    in community service, and her practical yet creative outlook on work and leisure.
attributes:
  skills: '[''drywall installation'', ''ceiling tile installation'', ''joint taping and mudding'', ''blueprint reading'', ''material estimation'', ''tool maintenance'', ''safety compliance'', ''time management'',
