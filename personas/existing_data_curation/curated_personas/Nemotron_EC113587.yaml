  hobbies: '[''playing pickup soccer'', ''watching Liga MX matches'', ''dancing to norteño and banda music'', ''cooking traditional Mexican dishes'', ''volunteering at community health fairs'', ''attending
    church gatherings'', ''socializing at neighborhood barbecues'', ''fishing along the Rio Grande'']'
  career_goals: Luis aims to formalize his nursing credentials by obtaining a Certified Nursing Assistant (CNA) certification, followed by a high‑school equivalency (GED). He plans to enroll in an LVN program
    within the next three years, with the long‑term ambition of becoming a licensed vocational nurse and eventually supervising a nursing team. Alongside professional advancement, he wishes to achieve greater
    financial stability to support his child(ren) and create a secure home environment.
