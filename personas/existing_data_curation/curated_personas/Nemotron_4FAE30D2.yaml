personas:
  professional: Lino Bazil, a 4-year-old aspiring junior builder, delights in arranging Lego bricks into orderly towers, showcasing early spatial reasoning and fine-motor precision while their love for
    predictable patterns ensures each creation follows a set plan, yet they relax strict schedules to freely remix designs during play.
  sports: Lino Bazil, a 4-year-old, enjoys weekly preschool soccer with the Tiny Tigers club, loves splashing in the Little Leapers swim program during summer, cheers for the local Major League Baseball
    team the City Sox on game days, and they approach each activity with energetic bursts of play rather than formal training.
  arts: Lino Bazil, a 4-year-old, spends afternoons drawing bright animals, sings loudly along to The Wiggles and Sesame Street songs, and proudly recites lines from Dr. Seuss books, letting their vivid
    imagination shape both playtime and bedtime routines.
  travel: Lino Bazil, a 4-year-old, loves short family road trips to the Monterey Bay Aquarium, eagerly awaits a future visit to Disneyland Resort in Anaheim, and prefers itineraries that include frequent
    snack breaks and a familiar bedtime routine, which they find reassuring.
  culinary: Lino Bazil, a 4-year-old, adores creamy macaroni and cheese, reaches for crunchy apple slices as a snack, proudly spreads peanut butter and jelly on toast with a plastic spoon, but vehemently
    refuses peas, and they often help stir pancake batter with a wooden spoon.
  core: Lino Bazil, a 4-year-old, balances a love for tidy Lego constructions with spontaneous bursts of imagination, insists on bedtime routines yet they secretly sneak an extra cookie when no one watches.
background:
  cultural: Lino grows up in a Mexican household in Stone Mountain, Georgia. He is exposed to both English and Spanish at home, and his family celebrates Mexican traditions such as Día de los Muertos, Christmas
    posada, and taco nights. Mexican cuisine, music, and stories are a regular part of his life, and he occasionally participates in community events organized by the local Mexican cultural association.
    This bilingual, bicultural upbringing shapes his language development, food preferences, and festive celebrations, while also blending with the broader Southern U.S. environment of DeKalb County.
