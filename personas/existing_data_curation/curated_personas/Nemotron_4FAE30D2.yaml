  career_goals: Lino often talks about wanting to be a firefighter because he likes the clear uniform, the predictable drills, and the chance to help people. He also imagines becoming a chef like his grandmother,
    enjoying the idea of cooking familiar Mexican dishes and sharing meals with family. Occasionally, he says he wants to be a soccer player, inspired by watching games on TV and playing in the park. These
    ambitions reflect his love for structure, hands‑on activity, and creative expression.
