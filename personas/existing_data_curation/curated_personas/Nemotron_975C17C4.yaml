personas:
  professional: Kori Waters, a meticulous audit veteran with over forty years of accounting experience, channels her love for structure and strategic thinking into part‑time consulting for small businesses
    and non‑profits, where she designs bullet‑proof internal controls, mentors junior accountants, and balances assertive client communication with a cooperative, community‑focused mindset.
  sports: Kori Waters roots for the Chicago Cubs, participates in the Riverwalk Strollers senior walking club and a local YMCA pickleball league, and never misses the Midwest State Fair’s annual horse‑drawn
    carriage races, all while maintaining a gentle fitness routine that blends low‑impact cardio with weekly group Tai Chi sessions.
  arts: Kori Waters enjoys auditioning for community theater productions of classics like "Our Town," regularly attends the local symphony's performances of Beethoven, delights in listening to folk legends
    such as Bob Dylan and Joan Baez, and collects prints of Monet’s Water Lilies for her living room, balancing her structured rehearsal schedule with spontaneous artistic inspiration.
  travel: Kori Waters thrills at the Iowa State Fair’s corn‑cob eating contests, has explored the Tulip Festival in Holland, Michigan, savors the historic charm of Amish Country in Lancaster, Pennsylvania,
    and plans a future road trip to the Missouri State Fair, balancing careful itinerary planning with spontaneous local food discoveries.
  culinary: Kori Waters, an enthusiastic home chef, regularly transforms garden‑fresh tomatoes, basil, and zucchini into vibrant ratatouille and Mediterranean quinoa bowls, while mastering classic comfort
    recipes such as chicken pot pie and apple crumble, although they sometimes forget to label leftovers, leading to occasional fridge scavenger hunts.
  core: Kori Waters blends a lifelong love of meticulous numbers with a gregarious spirit, juggling spreadsheets, theater scripts, and garden rows, yet habitually misplaces their glasses and can't resist
    one extra slice of chocolate cake at every community event.
background:
  cultural: Kori grew up in suburban Michigan during the post‑war boom, rooted in a Midwestern white American heritage often traced to Northern European (German and Irish) ancestry. Her upbringing emphasized
    hard work, community involvement, and modest, family‑centered values. She attended local public schools, earned a business degree at a state university, and built her career in the Detroit metropolitan
    area. The cultural landscape of Southfield, a diverse yet traditionally middle‑class community, has shaped her appreciation for inclusive civic events, the Michigan State Fair, and the region’s reputation
    for hospitality. While she identifies with mainstream American customs, she also respects the growing multicultural fabric of Oakland County, participating in intergenerational volunteer programs and
    community outreach that reflect both her compassionate side and her desire for personal achievement.
attributes:
  skills: '["Financial Reporting", "GAAP Compliance", "Audit Planning and Execution", "Risk Assessment", "Internal Controls Design", "Tax Preparation", "Budgeting and Forecasting", "Data Analysis", "Microsoft
    Excel", "ERP Systems (SAP, Microsoft Dynamics)", "Team Leadership", "Client Communication", "Mentoring Juniors", "Process Optimization"]'
  hobbies: '["Book Club", "Bridge", "Gardening", "Cooking Classes", "Community Theater", "Volunteer Auditing for Non-Profits", "Walking Groups", "Senior Fitness/Yoga", "Travel", "Local Cultural Festivals"]'
  career_goals: As she approaches retirement, Kori aims to transition into a part‑time consulting role where she can leverage her structured, detail‑oriented expertise to help small businesses and non‑profit
    organizations achieve financial compliance and operational stability. She aspires to serve on advisory boards of local charities, mentor the next generation of accountants, and eventually author a practical
    guide on audit best practices for community organizations. Maintaining financial independence, staying engaged with professional networks, and giving back through volunteer audit projects are central
    to her long‑term ambitions.
