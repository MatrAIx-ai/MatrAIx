  career_goals: Latoya aims to turn her love for storytelling, art, and community into a career that amplifies the voices of young people. She envisions attending a college with a strong visual communications
    or journalism program, studying multimedia journalism or graphic design. After college, she hopes to work as a content creator for a local news outlet or media studio, producing documentaries and digital
    series that highlight cultural diversity and social issues in Riverside County. In the long term, she wants to launch a youth‑focused arts mentorship program in her hometown, giving other teens the
    tools to express themselves through visual media. She also dreams of one day becoming a speaker at school assemblies, inspiring peers to pursue their creative passions.
