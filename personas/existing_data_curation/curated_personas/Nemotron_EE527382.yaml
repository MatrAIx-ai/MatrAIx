personas:
  professional: Latoya Stanley is an aspiring multimedia storyteller who combines cartoon drawing, digital art, and short TikTok videos to craft vibrant narratives, channeling their sociable energy into
    leading school drama club set design while staying organized enough to meet deadlines.
  sports: Latoya Stanley hikes the Santa Rosa Plateau trails with the Murrieta Trail Explorers club, cheers for the Los Angeles Dodgers and Lakers, plays recreational soccer on Saturday afternoons, and
    incorporates TikTok dance challenges into cardio workouts, where they blend rhythm and fitness.
  arts: Latoya Stanley draws inspiration from Rebecca Sugar, Studio Ghibli’s Hayao Miyazaki, and Noelle Stevenson, spends after‑school hours sketching murals for a community art project and designing set
    pieces for the drama club, and shares fan art of favorite graphic novels on Instagram, where they receive encouraging comments that fuel further creativity.
  travel: Latoya Stanley enjoys weekend road trips to Joshua Tree, annual family vacations at Disneyland, and dreams of a future study‑abroad semester in Tokyo to explore anime districts and street art,
    planning trips with friends via group chats and TikTok inspiration boards.
  culinary: Latoya Stanley loves crafting avocado toast topped with chili flakes, eating sushi rolls with extra wasabi, grabbing Mexican street tacos drenched in cilantro and lime, and experimenting with
    vibrant tie‑dye cupcake frosting during school bake sales, where they showcase their bold color choices.
  core: Latoya Stanley is a hyper‑creative teen who blends art, music, and social energy into vibrant digital storytelling while juggling school, community volunteering, and a love for spontaneous TikTok
    bursts, often staying up late perfecting edits.
background:
  cultural: Latoya identifies as African‑American and grew up in Murrieta, a suburban city in Riverside County, California. Her family maintains a strong connection to Black cultural traditions, celebrating
    holidays such as Juneteenth and participating in Black History Month events at school and the local community center. Music, storytelling, and church gatherings have shaped her upbringing, with her
    parents emphasizing pride in African‑American history and the importance of community service. Living in a diverse region, she is also exposed to Latino, Asian, and other cultures, which expands her
    worldview while she stays rooted in her own heritage. These blended influences foster her curiosity about art, new ideas, and varied experiences.
