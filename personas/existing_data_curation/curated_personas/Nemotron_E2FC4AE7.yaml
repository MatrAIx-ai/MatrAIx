  hobbies: '[''Fishing'', ''Woodworking'', ''Community Volunteering'', ''Cycling'', ''Reading Historical Non-Fiction'', ''Gardening'']'
  career_goals: David aims to advance to a senior project manager role where he can lead larger, community‑focused infrastructure projects that improve safety and accessibility for residents of Oakland
    County. He intends to integrate sustainable design practices and mentor junior engineers, leveraging his compassionate nature to enhance project outcomes. In the long term, he aspires to become the
    chief engineer for the county’s public works department, shaping policies that balance practicality with environmental stewardship and fostering a collaborative, supportive workplace culture.
