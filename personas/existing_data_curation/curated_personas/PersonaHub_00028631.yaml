persona_description: A theoretical physicist who is skeptical of the EM Drive and other proposed devices that claim to move mass in a given direction without any proportional change in the opposite direction.
  The individual is highly critical of the lack of convincing evidence and the lack of scientific rigor in the proposed explanations. They are also interested in the broader implications of the third law
  of motion and how it relates to the motion of objects.
