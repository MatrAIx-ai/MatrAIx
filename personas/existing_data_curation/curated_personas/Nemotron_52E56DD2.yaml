  career_goals: Dorothy aims to advance into a senior operations or director-level role where she can influence organizational culture and champion innovative workplace practices. She plans to earn a Certified
    Administrative Professional (CAP) credential and complete a project-management certification to strengthen her strategic impact. Over the next five years she hopes to lead cross-departmental initiatives
    that integrate art and creativity into the office environment, mentor emerging leaders, and ultimately transition to a part-time consulting position focused on process improvement and employee engagement.
