personas:
  professional: Niurka Ronda leverages fifteen years of front‑of‑house mastery in Orlando’s high‑tempo restaurants to craft seamless guest experiences, translating menus bilingually, curating visual table
    settings, and constantly pushing beyond rigid SOPs despite a spontaneous aversion to strict structures, and they thrive on the pressure of busy service nights.
  sports: Niurka Ronda enjoys solitary early‑morning jogs along Orlando’s Lake Eola Trail and follows Orlando City SC passionately, but they avoid team sports and crowded gyms, preferring low‑key fitness
    activities that align with their quiet temperament.
  arts: Niurka Ronda immerses herself in the avant‑garde scene, frequenting the CityArts Factory gallery, curating abstract canvases inspired by Colombian landscapes and Orlando street murals, and they
    constantly draw inspiration from musicians like Bomba Estéreo, Carlos Vives, and the indie duo Monsieur Periné.
  travel: Niurka Ronda favors spontaneous, low‑key travel itineraries that blend art‑centric city stops—such as Valparaíso’s graffiti alleys or Mexico City’s Frida Kahlo museum—with solitary nature retreats
    like the Smoky Mountains, yet they keep international trips limited by budget constraints.
  culinary: Niurka Ronda experiments with traditional Colombian dishes like arepas and bandeja paisa, adding modern twists such as smoked paprika or yuzu glaze, while perfecting pour‑over coffee with beans
    she sources from boutique farms, though they often forget to clean their espresso machine promptly after use.
  core: Niurka Ronda is a solitary, art‑driven hospitality veteran who fuses coffee, color, and competition into a quietly intense pursuit of personal expression, and they relish moments of quiet creation
    more than crowded social scenes.
background:
  cultural: 'Niurka was raised in a Colombian immigrant household that settled in South Florida before moving to Orlando. Her family maintains strong ties to Colombian traditions: celebrating Carnaval,
    preparing arepas, empanadas, and sancocho, and listening to vallenato and cumbia at family gatherings. Bilingual and Catholic by upbringing, she also embraces the multicultural tapestry of Central Florida,
    integrating influences from Caribbean, Latino, and American cultures into her daily life. Her Colombian heritage fuels her hospitality ethos—hospitality as a form of familial care—while her curiosity
    about diverse artistic expressions reflects an openness to blending her roots with new, unconventional ideas.'
attributes:
  skills: '["Bilingual communication (Spanish & English)", "Intuitive order management", "Customer service with a personal touch", "Knowledge of Colombian and Latin American cuisine", "Menu design and visual
    presentation", "Rapid problem solving in fast-paced environments", "Adaptability and spontaneous decision-making", "Stress resilience and emotional stability"]'
  hobbies: '["Abstract painting", "Art gallery visits", "Photography of urban solitude", "Experimental Colombian cooking", "Solo nature walks", "Specialty coffee brewing", "Reading art history and contemporary
    theory", "Listening to traditional and modern Colombian music"]'
  career_goals: Niurka aims to transition from pure service work to a role that blends her hospitality expertise with her love for art and culinary creativity. She plans to pursue a managerial position
    at a boutique café or specialty restaurant where she can curate menus that experiment with Colombian‑inspired fusion dishes and showcase local artwork. Long‑term, she envisions opening her own small
    coffee‑gallery space that offers a quiet refuge for solitary patrons, where she can serve thoughtfully designed dishes, host occasional art exhibitions, and curate intimate tasting events. To realize
    this, she intends to enroll in a part‑time culinary program focusing on modern techniques and continue building a network of local artists and food suppliers.
