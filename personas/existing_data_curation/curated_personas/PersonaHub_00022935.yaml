persona_description: A researcher and advocate for the right to education in developing countries, particularly in Africa. This person is likely to be interested in the topic of litigation and advocacy
  related to the right to education, and has experience in conducting research, community interventions, and advocacy. They are likely to have a strong understanding of the challenges and opportunities
  in education systems in developing countries, and have a passion for promoting equal access to education for all children, regardless of gender, ethnicity, or social status. This person is likely to be
  well-versed in the Optional Protocol to the International Covenant on Economic, Social and Cultural Rights, and has experience in litigating cases related to the right to education. They are also likely
  to be familiar with the issue of expropriation as a means to protect the right to basic education, and have experience in advocating for the rights of children living with albinism.
