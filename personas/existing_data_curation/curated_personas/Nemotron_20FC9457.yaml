personas:
  professional: Supriya Kumar is an aspiring roboticist who channels the teamwork learned on the soccer field and the rhythmic coordination from dance into building and programming mini machines, balancing
    curiosity with a practical approach to problem‑solving.
  sports: Supriya Kumar anchors the midfield for Metro United FC's U‑13 squad, idolizes Alex Morgan, trains thrice a week, joins weekend pick‑up matches, and follows the national women's soccer league,
    using the strategic thinking honed in video games to anticipate opponents' moves.
  arts: Supriya Kumar dances with a local troupe that blends contemporary choreography with traditional rhythmic patterns, sketches cartoons inspired by Adventure Time and Sailor Moon, and regularly listens
    to the music of Taylor Swift and the film scores of Hayao Miyazaki, letting artistic expression shape their identity.
  travel: Supriya Kumar enjoys weekend trips to the state science museum, has explored the Grand Canyon on a family vacation, dreams of visiting the cherry blossom festival in Washington D.C., and plans
    a future exchange program at a robotics camp in Japan, balancing adventure with budget constraints.
  culinary: Supriya Kumar helps craft celebratory feasts featuring spiced rice pilaf, flatbread, and tangy yogurt dip while also mastering chocolate‑chip cookies and homemade margherita pizza, favoring
    ingredients like cinnamon, fresh mozzarella, and fragrant cilantro.
  core: Supriya Kumar is a competitive, socially vibrant 12‑year‑old who juggles soccer, robotics, and dance while wrestling with anxiety‑driven perfectionism and a savvy eye for budgeting.
background:
  cultural: Supriya’s family originates from the Indian subcontinent and maintains a blend of cultural traditions and Texas lifestyle. At home, Hindi is spoken alongside English, and the family celebrates
    festivals such as Diwali and Holi with community gatherings, while also joining local celebrations like Fourth of July fireworks. The household values education, communal support, and respect for elders,
    which influences Supriya’s disciplined approach to school and her desire to give back to both her South Asian community and her broader Texan neighborhood.
