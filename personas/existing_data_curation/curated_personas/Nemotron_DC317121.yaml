personas:
  professional: Jonathan Jackson, a 17‑year‑old aspiring diesel mechanic, they combine their hands‑on experience repairing small engines and building wooden birdhouses with a methodical, calm temperament,
    thriving on structured certification pathways while valuing the flexible autonomy of rural service work.
  sports: Jonathan Jackson, a 17‑year‑old who keeps fit by early‑morning jogs across the prairie and weekly manual chores, they root for the Kansas City Chiefs and the Kansas City Royals while holding a
    membership in the local 4‑H outdoor club, preferring low‑key, functional exercise over organized team sports.
  arts: Jonathan Jackson, a 17‑year‑old who finds a creative outlet in crafting model airplanes and wooden birdhouses, they listen to classic Americana storytellers such as Johnny Cash and folk guitarist
    John Denver, and occasionally watch the low‑key, rural‑themed film "The Straight Story", allowing the arts to echo their appreciation for straightforward, grounded narratives.
  travel: Jonathan Jackson, a 17‑year‑old who favors low‑key, self‑planned road trips to nearby natural sites such as Flint Hills State Park and the Badlands, they also enjoy occasional family outings to
    the county fair and dream of exploring the Canadian Rockies on a future summer adventure, balancing a modest travel budget with a love for open‑air solitude.
  culinary: Jonathan Jackson, a 17‑year‑old who cooks simple, hearty fare like pan‑fried catfish with a cornmeal crust, homemade chicken stew seasoned with thyme and bay leaf, and fresh‑baked cornbread,
    they relish the tactile process of kneading dough and seasoning, preferring dishes that feature straightforward ingredients such as potatoes, pork, and local honey.
  core: Jonathan Jackson, a 17‑year‑old blend of quiet pragmatism and gentle curiosity, they balance a love for methodical hands‑on work with a relaxed, sometimes disorganized approach to obligations, finding
    comfort in solitude, simple routines, and the steady hum of a well‑tuned engine.
background:
  cultural: Jonathan grew up in a white, Midwestern family in Syracuse, Kansas, a small town with deep agricultural roots. The local culture emphasizes self‑reliance, practical skills, and modesty, reinforced
    by community events like county fairs, church gatherings, and school activities. His family maintains a modest Christian faith that values humility, service, and neighborly support. These influences
    have instilled in him a strong work ethic, respect for the land, and an appreciation for straightforward, reliable routines, while also encouraging the flexibility to adapt to changing circumstances.
