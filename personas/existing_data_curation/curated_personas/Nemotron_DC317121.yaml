  hobbies: '[''Reading historical nonfiction and survival guides'', ''Strategy and simulation video gaming'', ''Fishing'', ''Model airplane building'', ''Woodworking small projects'', ''Birdwatching'']'
  career_goals: Jonathan aims to first earn his GED within the next two years, then enroll in a vocational program that offers certification in diesel mechanics or sustainable agriculture. He seeks a career
    path that provides clear structure—defined training milestones and certification—while still allowing the flexibility to work independently, such as running his own equipment‑repair service or managing
    a small, organic farm. Long‑term, he hopes to become a trusted resource in his community, offering affordable repair services to local farmers and sharing knowledge about environmentally responsible
    farming practices.
