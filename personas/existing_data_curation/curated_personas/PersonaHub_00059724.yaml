persona_description: A pilot who served in the Royal Flying Corps during World War I, particularly known for his bravery and skill as a pilot. He was killed in a tragic accident while testing a new French-built
  Spad VII fighter at Beaulieu Aerodrome in Hampshire. His death was a great loss to his family and fellow pilots, and his name was later commemorated on a memorial at St Mary's Church in Wedmore, Devon.
