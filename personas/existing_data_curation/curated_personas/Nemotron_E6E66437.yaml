  hobbies: '["Improv comedy", "Open‑mic performances", "Intramural basketball", "Hiking in the Finger Lakes region", "Gadget tinkering", "Entrepreneurship podcasts", "Cooking and hosting dinner parties",
    "Following Cornell athletics", "Attending local farmers markets"]'
  career_goals: Stephen aims to become a licensed multi‑line insurance professional within the next two years, earning his Life, Health, and Property & Casualty licenses. He plans to pursue the Chartered
    Property Casualty Underwriter (CPCU) designation and eventually move into a senior sales leadership role, such as Sales Team Lead or Regional Manager. In the long term, Stephen envisions opening his
    own independent brokerage, leveraging his network in Ithaca and surrounding colleges while integrating technology‑driven services to simplify client experiences. He also intends to complete his bachelor’s
    degree in Business Administration or Finance, combining his practical work experience with formal academic credentials.
