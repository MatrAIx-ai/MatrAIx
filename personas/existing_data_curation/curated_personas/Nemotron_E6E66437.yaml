personas:
  professional: Stephen Edds, a 19‑year‑old insurance sales associate in Ithaca, leverages their natural sociability and methodical mastery of Salesforce and Excel to build data‑driven client relationships,
    while they channel their curiosity about underwriting into rapid progress toward Life, Health, and Property & Casualty licensing.
  sports: Stephen Edds dominates the fall intramural basketball league at Cornell, rallies with fellow fans for the Cornell Big Red men’s basketball and football games, and occasionally joins a weekend
    pickup soccer match at the Ithaca Commons, all while they stay active and channel their school spirit into every play.
  arts: Stephen Edds lights up Ithaca’s improv nights with the Mo’ Groovy Comedy Collective, channels John Mulaney’s punch‑line timing at open‑mic sessions, and curates a vinyl collection that includes
    The Beatles, using these creative outlets to fuel the quick wit they bring to both social gatherings and sales pitches.
  travel: Stephen Edds prefers spontaneous weekend road trips, often driving the scenic gorge routes of the Finger Lakes or hopping a budget flight to Boston for a weekend of seafood and historic tours,
    while they keep a growing bucket list that includes Iceland’s Blue Lagoon and Kyoto’s cherry‑blossom festivals.
  culinary: Stephen Edds’s kitchen doubles as a gathering hub where they expertly prepare mushroom risotto with fresh Arborio rice, seared miso‑glazed salmon, and a signature espresso‑soaked tiramisu, sourcing
    herbs, heirloom tomatoes, and locally milled cheese from the Ithaca farmers market to impress friends.
  core: Stephen Edds is a charismatic, curiosity‑driven insurance enthusiast who blends meticulous planning with lively social gatherings, turning every client interaction into a performance, and they never
    miss a chance to make a room laugh.
background:
  cultural: Stephen grew up in a middle‑class white family in the northeastern United States, spending his teenage years in the small college town of Ithaca, New York. The region’s blend of academic culture,
    progressive community values, and a strong emphasis on self‑reliance shaped his worldview. His mother works as a teacher and his father as an electrician, instilling respect for both education and practical,
    hands‑on problem solving. Stephen identifies with mainstream American cultural norms, celebrating holidays such as Thanksgiving and the Fourth of July, while also embracing the local ethos of community
    involvement, environmental consciousness, and support for the arts that characterize upstate New York.
attributes:
  skills: '["Customer relationship management", "Negotiation", "Public speaking", "Sales prospecting", "Risk assessment basics", "Regulatory compliance knowledge", "Data analysis (Excel)", "Organizational
