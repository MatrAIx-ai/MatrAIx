personas:
  professional: Annie Jett, a seasoned cashier with expert cash handling and customer service skills, leverages their meticulous organization and friendly demeanor to keep the checkout line flowing smoothly
    while eyeing a supervisory or assistant manager promotion within the retail chain.
  sports: Annie Jett, a devoted fan of the Atlanta Braves and a regular participant in the local community garden’s weekend walking group, enjoys occasional recreational softball leagues at the county park
    and attends line‑dance nights that double as low‑impact cardio.
  arts: Annie Jett, an active member of her church choir who sings harmonies to the likes of Mahalia Jackson and enjoys romance novels by Nora Roberts, also finds inspiration in the storytelling songs of
    Dolly Parton and the classic films of Audrey Hepburn, shaping a warm, community‑centered artistic identity.
  travel: Annie Jett, who prefers short, well‑planned road trips, has explored historic Charleston and Savannah for their Southern charm, dreams of a culinary pilgrimage to New Orleans, and occasionally
    joins group tours to the Great Smoky Mountains for a blend of nature and fellowship.
  culinary: Annie Jett, an avid gardener of basil, thyme, and rosemary, delights in cooking Southern staples such as shrimp and grits, buttermilk biscuits, and collard greens, often pairing them with fresh
    garden herbs and a dash of hot sauce for extra flavor.
  core: Annie Jett, a 45‑year‑old community‑oriented organizer with a love for choir, line‑dance, and herb gardens, balances meticulous budgeting with occasional worry‑driven over‑planning, finding calm
    in structured routines and Southern flavors.
background:
  cultural: Annie’s cultural identity is rooted in the African‑American heritage of rural Virginia. Growing up in Bedford County, she was immersed in the traditions of Southern black communities—church
    fellowship, gospel music, and storytelling. Her family places high value on resilience, mutual support, and preserving culinary traditions like fried chicken, collard greens, and sweet potato pie. The
    close‑knit black neighborhood in Evington fosters a strong sense of solidarity, which shapes her cooperative and caring nature. Historical awareness of civil‑rights struggles in Virginia informs her
    commitment to community empowerment and mentorship of younger generations.
