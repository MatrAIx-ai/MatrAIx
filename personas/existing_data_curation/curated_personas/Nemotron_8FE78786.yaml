  career_goals: Annie aims to move beyond her current cashier role into a supervisory or assistant store manager position, where she can apply her organizational strengths and lead a team. She plans to
    complete a bachelor's degree in Business Management over the next few years, leveraging community college courses and online learning. Long‑term, she envisions either advancing to a regional management
    role within a retail chain or opening a small, community‑focused boutique that highlights local artisans and Southern‑style goods, providing stable income and a platform to mentor younger employees.
