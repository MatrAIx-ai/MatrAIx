personas:
  professional: AV engineer John Rodriguez merges deep expertise in Crestron and AMX system integration with methodical planning and an intrinsic curiosity for artistic expression, making them the reliable
    go‑to specialist for turning creative visions into flawless immersive experiences.
  sports: Active on Orlando’s Tuesday night pickup basketball league, John Rodriguez also follows the Orlando Magic and holds season tickets for Orlando City SC, while fitting high‑intensity interval training
    at the local YMCA into their weekly routine to keep stamina on point.
  arts: Fan of immersive installations, John Rodriguez routinely attends gallery openings featuring artists like Refik Anadol, experimental theater productions at the Orlando Fringe Festival, and music
    festivals such as Electric Daisy Carnival, while live shows by The Strokes keep their creative spark alight.
  travel: A planner at heart, John Rodriguez favors meticulously mapped weekend road trips—like a sunrise hike at Ocala National Forest and a nightlife swirl through New Orleans—while dreaming of curating
    an immersive art tour of Barcelona and Kyoto in the future.
  culinary: With a home‑studio kitchen that boasts a sous‑vide setup, John Rodriguez enjoys crafting spice‑forward dishes like chipotle‑marinated pork tacos and Thai basil chicken, though their culinary
    confidence peaks at semi‑advanced recipes and they remain reluctant to bake beyond a basic banana bread.
  core: John Rodriguez blends a tech‑savvy, methodical mind with an insatiable appetite for art and social energy, channeling that mix into precise AV solutions, calculated finances, and a calendar that
    never stops buzzing.
background:
  cultural: John grew up in a middle-class suburb of Orlando, where the cultural fabric is a blend of mainstream American and vibrant Hispanic influences. Although he identifies as white, his family carries
    a Spanish surname and celebrates traditions such as Día de los Muertos and family gatherings with Latin-style cuisine alongside typical Floridian barbecues. Exposure to the city’s multicultural festivals,
    the thriving theme-park entertainment scene, and a diverse friend group has nurtured his appreciation for varied artistic expressions. He was raised Catholic, attending church holidays that emphasize
    community service, which reinforced his reliable and organized demeanor. This multicultural upbringing fuels his curiosity for new ideas and his comfort navigating both technical and creative environments.
attributes:
  skills: '[''AV system design'', ''installation and wiring'', ''audio calibration'', ''video signal routing'', ''Crestron and AMX control programming'', ''networked AV over IP'', ''high-voltage safety
