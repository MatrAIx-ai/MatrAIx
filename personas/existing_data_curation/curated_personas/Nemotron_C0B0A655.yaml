  hobbies: '[''photography'', ''drone videography'', ''live music and festival attendance'', ''gallery and museum visits'', ''community theater tech volunteering'', ''pickup basketball'', ''Arduino and
    Raspberry Pi tinkering'', ''custom lighting projects'', ''virtual reality gaming'', ''salsa dancing'']'
  career_goals: John aims to transition from field installation to senior AV engineering, seeking certification as a Certified Technology Specialist (CTS) and advanced Crestron training. Within five years
    he hopes to lead multi-disciplinary AV projects for large entertainment venues in Orlando, such as theme parks and convention centers. He also aspires to start his own boutique AV consultancy that focuses
    on immersive art installations and experiential events, where his creative curiosity and technical rigor can merge. Mentoring junior technicians and teaching part-time at a local community college are
    long-term ambitions that align with his organized and reliable nature.
