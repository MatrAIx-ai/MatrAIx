personas:
  professional: Seth Harris, a master-level pipefitter with over a dozen years of experience in steamfitting and commercial plumbing, blends meticulous code compliance with a curiosity for low‑temperature
    steam systems and smart‑monitoring tools while mentoring apprentices and serving as the trusted liaison between clients and union leadership.
  sports: Seth Harris, an avid fan of the Cleveland Browns, Guardians, and Cavaliers, spends Saturdays cheering in the stadium, participates in the Cuyahoga Valley Trail Club’s weekend mountain‑bike rides,
    and maintains fitness through seasonal fishing trips on Lake Erie, while occasionally joining a local recreational softball league.
  arts: Seth Harris, a classic‑rock enthusiast who strings an acoustic guitar on quiet evenings, enjoys the raw energy of Led Zeppelin, The Rolling Stones, and Pink Floyd, attends House of Blues concerts
    and Cleveland Orchestra performances, and collects vintage vinyl records that echo the industrious spirit of his community.
  travel: Seth Harris, a weekend explorer, frequently drives to Kelleys Island for kayaking and to the Ohio Wine Trail for tastings, dreams of a geothermal‑tour in Iceland to study sustainable heating,
    and balances his travel ambitions with a family‑friendly budget that favors road trips over costly flights.
  culinary: Seth Harris, a competent home cook with a love for smoked lake trout, hearty steel‑cut oats, and classic Midwestern comfort dishes like a well‑seasoned Polish Boy topped with homemade coleslaw,
    often seasons dishes with fresh rosemary, thyme, and a splash of local bourbon for a smoky finish.
  core: Seth Harris, a hands‑on plumber with a soft spot for classic rock, community service, and weekend fishing, balances a disciplined work ethic with a penchant for DIY projects, occasional back‑pain,
    and a habit of hoarding an ever‑growing collection of power tools.
background:
  cultural: Seth grew up in a working‑class, Midwestern neighborhood of Cleveland, where his family’s roots trace back to German and Irish immigrants who settled in the area in the early 20th century. The
    community’s strong union traditions, close‑knit family values, and emphasis on hard work have shaped his practical outlook and his commitment to helping others. He maintains ties to local cultural institutions
    such as the Cleveland Museum of Natural History and participates in neighborhood events that celebrate the city’s industrial heritage.
