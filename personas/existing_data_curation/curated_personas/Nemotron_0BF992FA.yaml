  hobbies: '[''Fishing on Lake Erie'', ''Mountain biking in Cuyahoga Valley'', ''Cleveland sports fandom (Browns, Guardians, Cavaliers)'', ''DIY home improvement'', ''Woodworking'', ''Volunteer work at
    local food bank'', ''Community clean‑up events'', ''Listening to classic rock'', ''Playing acoustic guitar'']'
  career_goals: Seth aims to achieve master plumber certification and become a foreman within his union, eventually overseeing large‑scale retrofits of historic buildings in Cleveland. He also aspires to
    launch his own small‑scale contracting firm focused on sustainable, energy‑efficient plumbing solutions, providing apprenticeship opportunities for local youth.
