persona_description: A maritime historian and archaeologist who specializes in the study of shipwrecks and their causes, particularly those involving convict ships. Their research interests include the
  reconstruction of the wreck sites, the analysis of the ship's structural damage, and the investigation of the survival of the crew and passengers. They are particularly interested in the cause of the
  Neva's disaster and the impact of the event on the local community. They are also interested in the historical context of the shipwreck and its relevance to the broader narrative of penal transportation
  in Australia.
