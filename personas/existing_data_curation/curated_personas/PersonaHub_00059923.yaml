persona_description: A healthcare professional interested in public health and the impact of socioeconomic factors on health outcomes. This persona is likely to be interested in the Scottish Burden of Disease
  study, which highlights the disparities in health outcomes between the most and least affluent areas of England. This individual is interested in exploring the strategies and interventions that can be
  implemented to improve the life circumstances of people in the most deprived areas and prevent their early death or avoidable ill health. They may also be interested in the broader implications of these
  findings for the creation of a fairer, healthier Scotland.
