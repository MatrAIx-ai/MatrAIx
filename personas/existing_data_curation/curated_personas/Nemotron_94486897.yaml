  hobbies: '[''drawing'', ''watercolor painting'', ''LEGO building'', ''reading adventure books'', ''nature exploration'', ''collecting leaves and rocks'', ''listening to music'', ''playing recorder'',
    ''library storytime'', ''community art fair visits'']'
  career_goals: Michael dreams of becoming an artist who paints bright murals that bring joy to his town, a scientist who explores nature and invents new gadgets, and a teacher who helps younger kids discover
    the magic of reading and creating. He also imagines one day traveling to space as an astronaut, driven by his curiosity for new ideas and unconventional thinking.
