personas:
  professional: Donald Long is a budding teen inventor who merges his fascination with model airplanes and Arduino tinkering with a practical, community‑oriented mindset, often creating simple gadgets for
    the local animal shelter and school projects.
  sports: Donald Long is a teenage outdoor enthusiast who spends weekends fishing at local ponds, participates in the community’s youth fishing club, cheers for the Kentucky Wildcats basketball team and
    the Cincinnati Bengals, and occasionally plays intramural baseball with the school’s junior varsity squad.
  arts: Donald Long is a quiet teen who unwinds by listening to country stars like Luke Bryan and Chris Stapleton, binge‑reading classic sci‑fi such as Dune, and sketching aerodynamic designs inspired by
    the silhouettes of model airplanes, while occasionally attending a local bluegrass jam session featuring the Carter Family repertoire.
  travel: Donald Long’s travel style is a modest, family‑oriented road‑trip routine, having explored the caverns of Mammoth Cave and the waterfalls of Shenandoah National Park, and dreaming of a future
    hike along the Appalachian Trail in Virginia while keeping expenses low.
  culinary: Donald Long enjoys helping his dad grill smoky pork ribs, corn on the cob brushed with butter, and a side of coleslaw at weekend barbecues, while also experimenting with pan‑seared trout seasoned
    with lemon, dill, and black pepper, though he has a guilty habit of raiding the pantry for chips and soda after a long tinkering session.
  core: Donald Long is a solitary, hands‑on teen who balances curiosity and practicality, quietly building gadgets for his community, saving diligently, managing mild allergies, and occasionally staying
    up late to program Arduino boards while snacking on chips.
background:
  cultural: Donald was raised in Garfield, a tight‑knit rural community in Hardin County, Kentucky. His family’s white Southern heritage emphasizes self‑reliance, strong work ethic, and community cooperation.
    He grew up attending a local Baptist church where youth activities fostered a sense of service and humility. Regional traditions such as family barbecues, country music, and a love of the outdoors have
    shaped his values and worldview, reinforcing his compassionate and practical nature.
