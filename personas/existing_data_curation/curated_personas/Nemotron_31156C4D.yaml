  career_goals: Donald aims to finish high school and enroll in a vocational program that will allow him to serve his community as an emergency medical technician or a skilled tradesperson such as an electrician.
    He envisions using his practical abilities and caring nature to provide reliable assistance during emergencies and to contribute to the safety and well‑being of Garfield and its surrounding areas. Long‑term,
    he hopes to become a respected EMT supervisor who trains younger volunteers.
