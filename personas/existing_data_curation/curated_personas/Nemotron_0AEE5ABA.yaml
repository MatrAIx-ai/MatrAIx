personas:
  professional: Kimberly Etheridge, a methodical environmental studies senior, leverages their strong research and spreadsheet analytics to coordinate community sustainability projects for a nonprofit,
    blending data‑driven insights with pragmatic solutions while keeping detailed documentation and timelines on track.
  sports: Kimberly Etheridge enjoys weekend hikes through the Appalachian foothills, follows the Washington Nationals baseball team and the Carolina Panthers football team, and they participate in a local
    trail‑running club that meets every Saturday morning for 5‑kilometer runs.
  arts: Kimberly Etheridge finds solace in contemporary fiction by Sally Rooney, attends occasional concerts featuring indie folk singer Sufjan Stevens, and decorates their living space with prints from
    minimalist painter Agnes Martin, all of which nurture their reflective mood.
  travel: Kimberly Etheridge favors low‑key, nature‑focused trips, having backpacked through Shenandoah National Park and visited Iceland’s geothermal lagoons, while earmarking a future journey to Kyoto
    to study its sustainable garden practices.
  culinary: Kimberly Etheridge loves experimenting with seasonal dishes like roasted beet and goat‑cheese salad with toasted walnuts, homemade kimchi, and lemon‑thyme quinoa bowls, and they're skilled at
    hand‑kneading sourdough bread using wild‑crafted herbs from their garden.
  core: Kimberly Etheridge blends curiosity with a practical streak, meticulously planning projects, budgets, and meals while quietly curating a life of sustainable simplicity, though they sometimes forget
    to water their indoor succulents.
background:
  cultural: Kimberly was raised in a middle‑class, white, Midwestern family in Ohio. Her upbringing emphasized community involvement, self‑reliance, and modest, practical values. She grew up attending a
    Protestant church, celebrating traditional holidays, and taking part in local events such as county fairs and community service projects. This background, combined with the close‑knit atmosphere of
    Athens, has fostered her organized, reserved, and emotionally stable disposition.
attributes:
  skills: '[''Research'', ''Data Analysis'', ''Spreadsheet Proficiency'', ''Basic Statistics (SPSS, R)'', ''Project Planning'', ''Time Management'', ''Technical Writing'', ''Budgeting'', ''Gardening'',
    ''Home Maintenance'']'
  hobbies: '[''Reading'', ''Hiking'', ''Gardening'', ''Cooking'', ''Knitting'', ''Journaling'', ''Book Club'']'
  career_goals: Kimberly aims to complete her bachelor's degree in environmental studies or public administration within the next two years. She aspires to secure a role as a project coordinator for a nonprofit
    focused on community sustainability, where she can blend her analytical skills with her passion for practical environmental solutions. Long‑term, she envisions leading larger sustainability initiatives,
    influencing policy at the regional level, and possibly pursuing a master's degree to deepen her expertise.
