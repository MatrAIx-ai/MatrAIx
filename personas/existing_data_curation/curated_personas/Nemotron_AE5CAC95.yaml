  career_goals: In the short term, Nga aims to earn a PMP certification and a Six Sigma Green Belt while completing an MBA to deepen her strategic expertise. She plans to transition from her current managerial
    role to a senior operations manager position within the next three years, overseeing multiple store locations or a regional division. Long‑term, she aspires to become a regional director for a major
    retailer and eventually launch her own consulting firm that helps small Southeast Asian‑owned businesses scale efficiently. Her competitive drive fuels a desire to be recognized as a top performer in
    operational excellence and business growth.
