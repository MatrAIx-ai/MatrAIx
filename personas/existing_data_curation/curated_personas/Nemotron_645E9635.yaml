personas:
  professional: Amanda Peterson, a five‑year‑old kindergartner who calls herself an aspiring architect, meticulously builds Lego structures, applies her love of order and high standards to every creation,
    and often critiques the finished designs with a critical eye.
  sports: Amanda Peterson, a five‑year‑old gymnast who trains at the local Junior Athletics Club, eagerly tracks milestone ribbons, enjoys watching the Chicago Cubs on television for inspiration, and prefers
    the structured routine of twice‑weekly classes over chaotic playground games.
  arts: Amanda Peterson, a five‑year‑old with a vivid imagination, spends afternoons drawing detailed scenes inspired by Pixar’s Inside Out, rehearses karaoke renditions of Let It Go from Frozen originally
    performed by Idina Menzel, and proudly displays a poster of the beloved child actress Millie Bobby Brown in her room.
  travel: Amanda Peterson, a five‑year‑old who hugs a well‑worn map while planning trips, loves revisiting the nearby Great Lakes State Park with her family, dreams of seeing the Eiffel Tower in Paris,
    and always prefers itineraries that include a scheduled nap and a familiar stuffed animal for comfort.
  culinary: Amanda Peterson, a five‑year‑old picky eater who adores creamy mac & cheese made with sharp cheddar, prefers chicken nuggets seasoned with paprika, delights in strawberry‑banana smoothies blended
    with yogurt, and can stubbornly refuse any dish that contains broccoli.
  core: Amanda Peterson, a five‑year‑old master of order who turns playtime into precise projects, clutches a piggy bank for financial control, worries about every detail, but secretly delights in imaginative
    drawing and dreaming of far‑away adventures.
background:
  cultural: Amanda comes from a white, Midwestern American family in West Bend, Wisconsin. Her upbringing reflects typical small‑town Midwestern values, emphasizing punctuality, community involvement, and
