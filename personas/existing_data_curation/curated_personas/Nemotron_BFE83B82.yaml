  hobbies: '[''Reading non‑fiction (technology, business, history)'', ''Model train building and customization'', ''Woodworking'', ''Landscape gardening'', ''Morning running'', ''Photography (urban and
    nature)'', ''Cooking family meals'', ''Small‑group community volunteering'']'
  career_goals: Samuel aims to secure PMP certification and a Lean Six Sigma Black Belt within the next two years, positioning himself for a senior operations manager role that oversees multiple administrative
    departments. He intends to lead a digital transformation initiative to automate and integrate the office support functions of his organization, boosting efficiency and data-driven decision‑making. To
    broaden his strategic perspective, Samuel plans to enroll in a part‑time MBA program focused on strategic management. He also aspires to develop a formal mentorship and onboarding program for emerging
    supervisors, fostering a culture of continuous improvement while maintaining a healthy work‑life balance for his family.
