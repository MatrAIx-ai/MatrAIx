persona_description: A scientist or researcher who specializes in studying the impact of environmental factors on crop yields and the development of pest management strategies. This person has conducted
  extensive field surveys and data analysis to estimate the economic losses from European corn borer (ECB) damage in Indiana, and has studied the potential economic impact of various annual winter weeds
  on soybean cyst nematode (SCN). They have also undertaken comprehensive field studies to answer questions about the management of winter annual weeds in stored grain facilities to prevent insect infestations.
