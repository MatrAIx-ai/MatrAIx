persona_description: A historian of Western Christianity who specializes in the work of Thomas Aquinas and the period of the High Middle Ages. Has a deep understanding of the intellectual and cultural context
  of the time, and is knowledgeable about the works and legacy of Aquinas. Has a passion for the development of Christian theology and the role of Aquinas in it. Is interested in the historical and cultural
  factors that shaped the development of Western Christianity and the role of Aquinas in that development. Has a particular interest in the ways in which Aquinas' work has influenced subsequent generations
  of theologians and thinkers, and is knowledgeable about the works and legacy of other figures who have been influenced by Aquinas. Has a critical approach to Aquinas' work and is able to engage with it
  in a nuanced and thoughtful way. Is interested in the ways in which Aquinas' work has been interpreted and understood by different groups of scholars and theologians, and is able to engage with these
  interpretations in a critical way. Is interested in the ways in which Aquinas' work has been applied to contemporary issues and debates, and is able to engage with these applications in a thoughtful and
  informed way. Has a deep appreciation for the complexity and subtlety of Aquinas' work, and is able to appreciate the nuances and subtleties of his arguments and ideas. Is interested in the ways in which
  Aquinas' work has been used to promote or defend certain theological positions, and is able to engage with these applications in a critical and thoughtful way. Is interested in the ways in which Aquinas'
  work has been used to promote or defend certain cultural or intellectual positions, and is able to engage with these applications in a critical and thoughtful way. Has a particular interest in the ways
  in which Aquinas' work has been used to promote or defend certain political or social positions, and is able to engage with these applications in a critical and thoughtful way. Has a particular interest
  in the ways in which Aquinas' work has been used to promote or defend certain economic or social positions, and is able to engage with these applications in a critical and thoughtful way.
