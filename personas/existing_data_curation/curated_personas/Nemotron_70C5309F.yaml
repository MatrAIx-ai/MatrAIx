  career_goals: 'Gale aims to translate her analytical skill set into a data‑focused role within a tech‑focused health‑care or analytics firm in the Tampa Bay area. In the short term, she plans to earn
    a professional certification in data science (e.g., Microsoft Certified: Data Analyst Associate) and secure an entry‑level data analyst position that offers flexibility and autonomy. Over the next five
    years, she aspires to become a senior data scientist, leading cross‑functional teams on competitive analytics projects while maintaining the freedom to take on freelance consulting gigs. Her long‑term
    ambition includes launching a data‑driven startup that helps small businesses optimize operations through predictive analytics, reflecting her competitive drive and desire for personal impact.'
