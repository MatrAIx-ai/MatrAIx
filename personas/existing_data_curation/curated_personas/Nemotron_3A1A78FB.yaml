    mechanical troubleshooting'', ''Knowledge of Utah’s mountainous terrain driving'']'
  hobbies: '[''Listening to transportation podcasts'', ''Reading non-fiction (history, engineering)'', ''Solo hiking in Wasatch foothills'', ''Fishing at Great Salt Lake'', ''Assembling model kit trucks'',
    ''Landscape photography'', ''Solving Sudoku puzzles'', ''Playing chess (puzzle practice)'', ''Tinkering with truck telematics'', ''Camping in remote wilderness'']'
  career_goals: Galen aims to transition from driver-sales positions into a logistics management role within the next five years, possibly overseeing a fleet of trucks for a regional carrier. He is pursuing
    additional certifications in supply-chain management and is exploring the emerging electric-truck market to position himself as an early adopter. In the medium term, he aspires to acquire his own truck
    and build a small, owner-operator business that emphasizes safety, on-time delivery, and competitive pricing. He also hopes to become a mentor and trainer for new drivers, sharing his knowledge of route
    optimization, compliance, and customer negotiation while maintaining a balance that allows him to spend quality time with his family.
