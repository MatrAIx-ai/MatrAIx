personas:
  professional: Galen Small is a veteran long‑haul truck driver and freight sales specialist who applies fifteen years of CDL‑qualified experience, hazardous‑materials endorsement, and data‑driven route‑optimization
    expertise to slash mileage and fuel costs, while their competitive, solitary nature fuels a relentless pursuit of efficiency and strict compliance, and they consistently exceed performance targets.
  sports: Galen Small avidly follows the Utah Jazz in basketball and Real Salt Lake in soccer, participates in the Wasatch Trail Club’s monthly solo hikes, maintains a personal fitness regimen of early‑morning
    trail runs and winter cross‑country skiing, and they favor solitary endurance workouts over team sports while keeping fit to meet the physical demands of long‑haul trucking.
  arts: Galen Small cultivates a quiet artistic side by photographing Utah’s sunrise‑lit canyons in the style of Ansel Adams, listening to Bob Dylan’s storytelling folk music during downtime, and meticulously
    painting model‑kit trucks with a craftsmanship that mirrors a hobbyist’s dedication, and they occasionally attend local artisan fairs to admire handcrafted woodwork.
  travel: Galen Small prefers meticulously planned solo road trips that weave together remote wilderness and introspective stops, and they have mapped journeys to Yellowstone, Moab’s red‑rock arches, and
    the Icelandic highlands, while future itineraries target a low‑key fishing lodge in Patagonia and a secluded cabin retreat in the Catskills for balanced adventure and relaxation.
  culinary: Galen Small enjoys cooking hearty, protein‑rich meals such as pan‑seared trout with rosemary, bison chili spiked with jalapeños, and homemade sourdough bread, and they showcase an intermediate
    kitchen skill set that balances bold flavors while reserving weekends for sampling local Utah diners famed for fry sauce and Rocky Mountain oysters.
  core: Galen Small is a solitary, puzzle‑loving truck veteran whose relentless drive for logistical efficiency and quiet mastery of routes is matched only by a stubborn competitive streak, and they keep
    both social circles and financial indulgences at arm’s length.
background:
  cultural: Galen comes from a middle-class Euro-American family that grew up in the inter-mountain West. Raised in a community that values self-reliance, hard work, and a practical approach to problem-solving,
    he internalized the do-it-yourself ethic that is common in Utah's suburban neighborhoods. Although he does not identify with any particular religious tradition, the region's outdoor culture—including
    hiking, fishing, and an appreciation for the rugged landscape—has shaped his free-spending leisure pursuits. His marriage and stable family life reflect the traditional American emphasis on responsibility
    and partnership. Overall, his cultural background blends a pragmatic work ethic with a quiet respect for the natural environment that surrounds Salt Lake City.
attributes:
  skills: '[''Long-haul freight driving'', ''Route planning and optimization'', ''Vehicle inspection and basic maintenance'', ''DOT compliance and safety certification'', ''Customer service and sales negotiation'',
