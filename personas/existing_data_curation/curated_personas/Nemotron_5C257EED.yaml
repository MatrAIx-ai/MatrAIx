  career_goals: She aims to progress into a lead or architect role where she can shape technical direction while fostering inclusive, supportive teams. Gioconda plans to obtain an AWS Solutions Architect
    certification, deepen her expertise in serverless architectures, and eventually launch a community‑focused tech initiative that offers coding workshops for underrepresented youth in rural Arizona. She
    values flexibility and hopes to transition to remote or hybrid work that preserves her work‑life balance while allowing continued professional growth.
