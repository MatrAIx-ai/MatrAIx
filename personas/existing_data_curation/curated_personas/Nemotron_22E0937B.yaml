  hobbies: '[''Watercolor painting of landscapes'', ''Reading historical fiction'', ''Cooking traditional Mexican dishes'', ''Gardening vegetables and herbs'', ''Birdwatching at local parks'', ''Listening
    to mariachi and folk music'', ''Attending small art workshops'', ''Mindfulness walking and meditation'', ''Knitting blankets for charity'']'
  career_goals: Jazmin aims to remain actively involved in her community by expanding her volunteer work at the Yakima senior center and local cultural organizations. She wishes to master a new art medium,
    such as watercolor painting, and to compile a memoir documenting her family's migration story and Mexican heritage. Teaching Spanish language and cooking to neighborhood youth, advocating for senior
    accessibility in public spaces, and supporting her grandchildren’s education financially are also key ambitions. Additionally, she plans to attend mindfulness and stress‑management workshops to improve
    her emotional well‑being.
