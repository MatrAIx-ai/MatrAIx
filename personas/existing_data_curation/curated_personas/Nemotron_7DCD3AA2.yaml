  hobbies: '["Building LEGO sets", "Reading picture books about animals and space", "Solving jigsaw puzzles", "Playing strategic board games", "Collecting rocks and leaves on nature walks", "Drawing detailed
    pictures of animals and rockets", "Practicing spelling with flashcards", "Participating in preschool counting and sorting activities"]'
  career_goals: Kaitlin hopes to become a veterinarian because she loves caring for animals and wants to protect their health. She also dreams of being a scientist or astronaut, inspired by picture books
    about space and inventions, and she looks forward to winning a school science fair to prove her methodical problem‑solving abilities. Her competitive side drives her to aim for first place in a spelling
    bee and a math contest. In the longer term, she imagines herself as a teacher or child‑care provider who can organize lessons, guide classmates, and create a supportive learning environment.
