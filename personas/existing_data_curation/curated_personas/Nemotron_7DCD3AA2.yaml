personas:
  professional: Kaitlin Brickhouse is a budding builder who treats LEGO constructions like miniature engineering projects, applying methodical planning and a competitive edge to out‑design peers while balancing
    curiosity for new ideas with a reliance on step‑by‑step instructions.
  sports: Kaitlin Brickhouse shines on the Little St. Louis Soccer Club's U‑6 team, cheers for the St. Louis Cardinals and the Kansas City Chiefs on TV, and channels their competitive spirit into weekend
    track‑and‑field meets where they time their sprints against friends.
  arts: Kaitlin Brickhouse fills their imagination with Disney animated classics, especially the songs from Moana, devours picture books illustrated by Eric Carle, and recreates favorite scenes in Lego,
    often pretending to direct a mini‑film starring Mickey Mouse and the Octonauts.
  travel: Kaitlin Brickhouse loves family road trips that blend nature hikes in the Ozark foothills with visits to St. Louis's Science Center, dreams of exploring the Grand Canyon’s rims and Disney World’s
    Magic Kingdom, and prefers itineraries that balance structured activities with spontaneous leaf‑collecting expeditions.
  culinary: Kaitlin Brickhouse favors mac and cheese, peanut‑butter‑and‑jelly sandwiches, and fruit salads with blueberries and strawberries, enjoys measuring flour for chocolate chip cookies with a plastic
    cup, and delights in building edible Lego‑shaped snacks whenever they can.
  core: Kaitlin Brickhouse is a meticulous six‑year‑old builder whose competitive streak fuels a love for LEGO, nature sketches, and systematic snack preparation, but their tendency to worry and occasional
    forgetfulness about bedtime add a touch of endearing imperfection.
background:
  cultural: Kaitlin grows up in Greenwood, a small, close‑knit community in Sebastian County, Arkansas. Her family embraces a Southern, middle‑class lifestyle that emphasizes community, frequent church
    attendance, and participation in local traditions such as county fairs, school potlucks, and seasonal celebrations. The surrounding Ozark foothills provide regular outdoor activities like hiking, fishing,
    and nature collecting, fostering a love of the natural world. Her upbringing reflects the values of politeness, respect for elders, self‑reliance, and a fondness for simple home‑cooked meals common
    in rural Arkansas.
attributes:
  skills: '["Reading simple sentences", "Counting and basic addition", "Handwriting her name", "Following step‑by‑step instructions", "Organizing personal items", "Planning daily routine with visual schedule",
