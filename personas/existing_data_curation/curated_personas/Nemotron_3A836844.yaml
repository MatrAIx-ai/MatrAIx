  career_goals: Although retired, Nida aims to continue contributing to her community and preserving her cultural heritage. She plans to document family recipes in a handwritten cookbook, mentor younger
    Vietnamese-Americans in cooking and tradition, and expand her digital skills to use video conferencing for virtual storytelling. She also hopes to travel to Vietnam for a cultural pilgrimage, maintain
    her health through regular walking and gardening, and remain an active volunteer at the local senior center.
