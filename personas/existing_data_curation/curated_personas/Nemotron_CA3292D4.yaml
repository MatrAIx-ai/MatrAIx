  career_goals: Joshua aims to transition into a senior strategic technology leadership role—such as Director of IT or CIO—within a midsize manufacturing firm or cultural institution in Lancaster County.
    He wants to spearhead digital transformation initiatives that integrate AI, IoT, and interactive art installations, leveraging his curiosity for new ideas. Over the next five years he plans to earn
    advanced cloud and cybersecurity certifications, publish a book on marrying analytical rigor with creative problem‑solving, and mentor emerging talent through local community college courses and regional
    hackathons. He also envisions serving on the board of a local arts council as a technology advisor, blending his appreciation for art with his professional expertise while gradually moving into consultancy
    as he approaches retirement.
