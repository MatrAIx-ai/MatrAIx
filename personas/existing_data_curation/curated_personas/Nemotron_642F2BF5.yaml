  career_goals: Omar aims to advance his clinical career by completing a bachelor’s degree in nursing or health sciences within the next three years, with the long‑term ambition of becoming a registered
    nurse or physician assistant. He is particularly interested in serving the underserved Hispanic population of rural Texas, and hopes to lead a community health outreach program that integrates preventive
    care with culturally resonant health education. Inspired by his love of art, Omar also envisions developing a therapeutic art‑based initiative for patients coping with chronic illness, blending his
    clinical expertise with creative expression. He seeks leadership opportunities within his clinic to improve patient workflow, mentor new medical assistants, and advocate for patient‑centered care.
