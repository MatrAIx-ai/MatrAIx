persona_description: A pilot who is familiar with the operation and maintenance of aircraft engines, particularly those with carburetor systems. This person has experience with the detection and prevention
  of carburetor icing, as well as the use of alternate induction air systems. They are also aware of the potential for ice to form over the intake air scoop or air filter, which can cause engine stoppages.
  This individual is likely to be a professional pilot with a background in aviation maintenance or engineering.
