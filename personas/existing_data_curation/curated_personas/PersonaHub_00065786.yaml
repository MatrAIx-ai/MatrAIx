persona_description: A biochemist and researcher who specializes in the design and synthesis of proteins for sensing and detecting chemical and biological threats. His work focuses on the development of
  highly selective and sensitive sensors for nerve agents and other chemical weapons. He is part of a research team at Duke University that has designed and fabricated proteins that can detect and respond
  to the presence and concentration of nerve agents. His research is sponsored by the Defense Advanced Research Projects Agency and is focused on developing automated laboratory processes for the rapid
  development of sensors for new chemical threats.
