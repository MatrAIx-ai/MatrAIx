persona_description: A researcher studying the movement patterns and locomotion strategies of desert rodents, particularly those that are bipedal and occupy different niches from their quadrupedal counterparts.
  The researcher is interested in understanding how the different forms of locomotion used by these rodents create differing predator evasion abilities and how this allows for the coexistence of these species
  in Old World deserts. The researcher is likely to have a background in experimental biology, ecology, and evolutionary biology, and is likely to have experience with fieldwork and data analysis. They
  may have a strong interest in understanding how natural selection and other factors have shaped the movement patterns of these rodents over time.
