persona_description: A conservationist and environmental advocate who is passionate about protecting sensitive salmon and steelhead stocks through listing under the Endangered Species Act (ESA). They are
  dedicated to ensuring that these sensitive species retain essential ESA protections and that these protections are not reduced on the basis of abundant hatchery fish. They are successful in achieving
  their goal when the Ninth Circuit upheld the ESA listing status for 16 salmon stocks on March 16, 2009.
