personas:
  professional: Dorothy Jones, a pragmatic community‑center administrator‑in‑training, leverages their hands‑on budgeting expertise, carpentry know‑how, and calm yet assertive mediation style to keep volunteer
    schedules and program logistics running smoothly, and they blend a love of structure with the occasional spontaneous adaptation when unexpected challenges arise.
  sports: Dorothy Jones enjoys weekend hikes along the Appalachian Trail with her husband, participates in the local “Blue Ridge Hiking Club,” follows the Carolina Panthers and Charlotte Hornets on game
    days, and they incorporate gentle yoga sessions at the senior center to maintain flexibility and balance.
  arts: Dorothy Jones finds solace in classic mysteries by Agatha Christie, delights in folk ballads by Joan Baez and Emmylou Harris, and channels their creative energy into quilting inspired by the vintage
    designs of Martha Stewart, and they occasionally attend community theater productions starring local actors like Sarah Mitchell.
  travel: Dorothy Jones prefers low‑key, nature‑focused getaways, spending summer weekends exploring the Blue Ridge Parkway and Shenandoah National Park, while dreaming of a cultural immersion trip to the
    historic towns of the Scottish Highlands and the vineyards of Tuscany, and they plan each journey with a detailed itinerary but leave room for spontaneous detours.
  culinary: Dorothy Jones, an enthusiastic home‑cook, crafts farm‑to‑table meals such as roasted tomato‑basil soup, herb‑crusted grilled zucchini, and honey‑glazed carrot cake using produce from their garden,
    experimenting with flavors while maintaining a moderate skill level that balances confident improvisation with occasional over‑salting.
  core: Dorothy Jones blends meticulous budgeting, garden‑grown cuisine, and community service into a grounded, quietly resilient lifestyle, punctuated by a habit of over‑preparing lists that they sometimes
    ignore at the last minute.
background:
  cultural: Dorothy comes from a white, mid‑Atlantic American background rooted in the Appalachian‑influenced culture of western Maryland. Her upbringing emphasized self‑reliance, modesty, and strong family
    ties, with a mix of Protestant church traditions and community‑center involvement. The region’s close‑knit neighborhoods and appreciation for practical skills have shaped her values of hard work, modest
    ambition, and a deep sense of responsibility toward family and neighbors.
attributes:
  skills: '[''household management'', ''budgeting'', ''meal planning'', ''gardening'', ''basic carpentry'', ''computer literacy (Microsoft Office)'', ''conflict resolution'', ''community volunteer coordination'',
