  hobbies: '[''gardening'', ''cooking'', ''reading historical fiction'', ''knitting'', ''quilting'', ''hiking'', ''volunteering at senior center'', ''small book club'', ''church charity outreach'', ''birdwatching'']'
  career_goals: Dorothy hopes to translate her practical expertise into a part‑time role that offers both structure and flexibility—ideally as an administrative assistant at the local community center or
    health department, where she can use her budgeting and coordination skills. She is also exploring the possibility of launching a modest home‑based catering service focused on small gatherings and farm‑to‑table
    meals, allowing her to blend her love of cooking with her entrepreneurial spirit. Completing a bachelor's degree in business administration, building on her associate's degree, is another long‑term
    goal that would broaden her career options and provide personal fulfillment.
