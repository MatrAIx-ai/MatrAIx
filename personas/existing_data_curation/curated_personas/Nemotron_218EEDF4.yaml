  hobbies: '[''Watercolor painting'', ''Art exhibition visits'', ''Community theater set design'', ''Reading speculative fiction'', ''Genealogy research'', ''Southern soul‑food cooking'', ''Church choir
    participation'', ''STEM outreach workshops'']'
  career_goals: Approaching retirement, Shanea aims to transition into a senior advisory role where she can mentor the next generation of engineers, especially women and minorities, and lead community STEM
    outreach programs. She hopes to secure a consulting contract with local manufacturing firms to apply her expertise in sustainable design and to co‑author a technical guide on integrating artistic design
    principles into functional engineering. Long‑term, she envisions establishing a small boutique consultancy that offers innovative, user‑centered engineering solutions while championing diversity in
    the technical workforce.
