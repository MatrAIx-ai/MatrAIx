personas:
  professional: Shanea Hambrick, a veteran engineering technologist with deep expertise in mechanical design, CAD, and lean process optimization for agricultural-processing facilities, they use their imaginative
    curiosity and disciplined organization to mentor emerging engineers, develop sustainable consulting projects, and co-author a technical guide that weaves artistic design principles into functional engineering
    solutions.
  sports: Shanea Hambrick follows the New Orleans Saints and Mississippi State Bulldogs with fervor, and they participate in a local walking club that meets after Sunday church services, and enjoy occasional
    recreational fishing trips to the delta, using these activities to balance their disciplined routine with relaxed outdoor leisure.
  arts: Shanea Hambrick paints watercolor landscapes inspired by the rolling fields of the South, and they contribute set designs to community theater productions, sing in the church choir performing gospel
    classics by Mahalia Jackson, and find creative spark in speculative fiction authors like Octavia Butler and N.K. Jemisin.
  travel: Shanea Hambrick prefers road trips to historic Southern towns such as Savannah and Natchez, where they explore antebellum architecture and local museums, while also dreaming of a cultural pilgrimage
    to the Musée d’Orsay in Paris and a serene retreat at the Great Smoky Mountains National Park, balancing travel plans with a modest budget and family obligations.
  culinary: Shanea Hambrick delights in cooking soul‑food staples like collard greens, smoked turkey, sweet potato pie, and gumbo seasoned with smoked paprika and okra, skillfully blending traditional recipes
    with healthier twists, yet they often overindulge during festive church potlucks.
  core: Shanea Hambrick blends disciplined engineering mastery with vibrant artistic expression, and they navigate retirement with a passion for mentorship, community service, soulful cooking, and a vigilant
    eye on health amid occasional anxiety.
background:
  cultural: Shanea hails from an African‑American family with deep roots in the Deep South. Her grandparents participated in the Great Migration, establishing a legacy of resilience and community involvement
    in Mississippi. She grew up immersed in church traditions, gospel music, and Southern culinary heritage, which she continues to celebrate through communal meals and cultural festivals. Her identity
    is shaped by a strong sense of family solidarity, respect for elders, and a commitment to uplifting underrepresented voices in both her professional sphere and local community.
attributes:
  skills: '[''Mechanical design'', ''CAD modeling (SolidWorks, AutoCAD)'', ''Process improvement (Lean, Six Sigma)'', ''Statistical quality control'', ''Equipment troubleshooting'', ''Data analysis (MATLAB,
