personas:
  professional: Lili Nieves, a veteran food‑service supervisor with over thirty years of front‑line and managerial experience, leverages their preference for structure and their keen eye for cost‑control
    to meticulously schedule shifts, enforce HACCP and ServSafe compliance, and slash waste through disciplined inventory audits, while their competitive streak drives them to consistently exceed health‑inspection
    scores.
  sports: Lili Nieves, an active senior who enjoys daily neighborhood walks, participates in a low‑impact senior fitness class at the community center, follows the Dallas Cowboys for football and the Houston
    Astros for baseball, and plays casual pickleball at the local senior club during the spring, all while they value the predictable schedule of these activities.
  arts: Lili Nieves, a quilting enthusiast who tunes into Dolly Parton and John Prine while stitching, indulges in historical fiction by Philippa Gregory, and occasionally attends performances by the Texas
    Shakespeare Festival, and they find that the blend of music, literature, and textile art nurtures their detail‑oriented spirit.
  travel: Lili Nieves, who prefers well‑planned, low‑stress trips, has road‑tripped through the Texas Hill Country tasting local barbecue, cherished a weekend getaway to Santa Fe for its art markets, and
    dreams of a culinary tour of Oaxaca, Mexico, and they schedule all travel around their church calendar and volunteer commitments.
  culinary: Lili Nieves, a proficient home cook, delights in perfecting classic Texan comfort dishes like chicken fried steak, jalapeño cheddar biscuits, and pecan pie, often incorporating fresh tomatoes,
    green beans, and herbs from their garden, and enjoys hosting potluck gatherings where they test new seasoning blends.
  core: Lili Nieves, a structure‑loving, slightly skeptical senior with a competitive edge, channels their daily worries into meticulous garden care, precise shift scheduling, and the occasional splurge
    on quilting yarn, while they never miss a chance to share a home‑cooked meal with neighbors.
background:
  cultural: Lili grew up in a modest, predominantly white, middle‑class family in central Texas, with ancestral roots in German and Irish immigrant communities. Her upbringing was shaped by the values of
    Texas hospitality, self‑reliance, and a strong sense of community service. Regular church gatherings, family potlucks, and local festivals reinforced the importance of shared meals and collective responsibility.
    Living in Moody, a small town in Bell County, she has witnessed the blending of traditional Southern customs with the diverse cultural influences of the Hill Country region. These experiences have cultivated
    a practical, organized mindset and a deep appreciation for communal traditions, which continue to guide both her professional and personal life.
