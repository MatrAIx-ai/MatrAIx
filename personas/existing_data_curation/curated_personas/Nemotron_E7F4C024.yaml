  career_goals: Looking ahead, Lili aims to secure a senior supervisory or assistant manager role within her current organization, positioning herself for greater operational influence. She plans to obtain
    the Certified Food Safety Manager credential to formalize her expertise and enhance the restaurant’s safety record. Lili also wishes to mentor junior staff, establishing a structured training program
    that elevates service quality across local eateries. In the longer term, she envisions opening a modest, family‑style café that offers wholesome, home‑cooked meals, allowing her to blend her culinary
    skills with a stable, predictable work schedule. Ultimately, she seeks a gradual transition toward semi‑retirement that preserves her financial security while leaving a lasting legacy of high‑standards
    in food service.
