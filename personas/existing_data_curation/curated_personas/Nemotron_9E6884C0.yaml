personas:
  professional: Antonio Fernandez is a meticulous janitorial specialist who leverages their bilingual communication skills and OSHA expertise to design data‑driven cleaning schedules, while constantly testing
    eco‑friendly products and mentoring new hires, all with an eye toward advancing into facilities supervision within three years.
  sports: Antonio Fernandez is an avid supporter of the Philadelphia Phillies, regularly watches Dominican baseball stars on ESPN, joins a neighborhood adult softball league at the local church, and maintains
    personal fitness by pacing the Delaware River Trail three times a week, preferring morning jogs over gym sessions.
  arts: Antonio Fernandez finds cultural resonance in the rhythmic cadences of bachata icons Romeo Santos and Aventura, occasionally attends live merengue nights at the community center, immerses themselves
    in historical biographies by David McCullough, and softens routine with visits to the Philadelphia Museum of Art to admire American Impressionist works.
  travel: Antonio Fernandez balances a modest travel budget with a yearning for cultural immersion, having trekked the historic streets of Santo Domingo, taken a family road trip along the Blue Ridge Parkway,
    and dreaming of exploring the plazas of Granada, Spain, while preferring meticulously planned itineraries over spontaneous getaways.
  culinary: Antonio Fernandez enjoys cooking at a proficient level, frequently preparing mangú with ripe plantains, sancocho simmered with yucca and beef broth, and revamping classics with a touch of cilantro
    and cumin, while they occasionally over‑season in a quest to perfect the perfect balance of flavors.
  core: Antonio Fernandez blends disciplined precision with a nostalgic love for Dominican rhythms, managing a meticulous cleaning operation while juggling occasional worry‑driven insomnia and a secret
    habit of collecting vintage domino sets.
background:
  cultural: 'Antonio grew up in a close‑knit Dominican family that emphasized respect for elders, strong faith, and communal support. His parents migrated to New Jersey before he was born, and Spanish was
    spoken at home, preserving a deep connection to Dominican customs. He celebrates traditional holidays such as Carnaval and Día de la Independencia with music, food, and family gatherings. The blend
    of Dominican exuberance and the practical demands of life in Trenton has shaped his identity: he values hard work, reliability, and the ability to adapt. While fully integrated into his local community—participating
    in church activities, volunteering, and engaging with fellow Dominicans—he also embraces American cultural norms, balancing both worlds to provide stability for his wife and children.'
attributes:
  skills: '[''Commercial floor care'', ''Safety and OSHA compliance'', ''Inventory control'', ''Schedule optimization'', ''Bilingual communication (Spanish/English)'', ''Basic plumbing and minor repairs'',
