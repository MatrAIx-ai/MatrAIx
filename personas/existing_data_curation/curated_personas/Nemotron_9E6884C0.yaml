  hobbies: '[''Dominican cooking'', ''Bachata and merengue music'', ''Dominoes with community friends'', ''Church volunteer work'', ''River trail walking'', ''Reading historical biographies'', ''Woodworking
    projects'', ''Following MLB baseball'']'
  career_goals: Antonio aims to advance from his current janitorial role to a facilities supervisor position within the next three years, pursuing certifications such as Certified Facility Manager (CFM)
    and OSHA 30‑hour safety training. He is interested in integrating sustainable cleaning technologies that balance environmental responsibility with budget constraints. Long‑term, he dreams of launching
    his own community‑focused cleaning service that offers fair‑wage jobs and mentorship for younger immigrants. Parallel to these professional objectives, Antonio plans to enroll in GED courses to broaden
    his educational foundation and adopt stress‑management practices to improve his overall well‑being for the benefit of his family.
