  hobbies: '[''Gardening'', ''Woodworking'', ''Model train building'', ''Reading local history'', ''Crossword puzzles'', ''Watching classic movies'', ''Fishing'', ''Attending church services'', ''Small
    group card games'', ''Volunteer office work at community center'']'
  career_goals: Approaching retirement, Peter aims to ensure a seamless transition for the office by documenting his processes and mentoring younger staff. He wishes to be recognized as the go‑to resource
    for complex administrative queries and to preserve the integrity of the town’s records. Ultimately, he hopes to shift into a part‑time consultant or volunteer role supporting community organizations,
    allowing him to continue contributing his expertise while maintaining the routine he values.
