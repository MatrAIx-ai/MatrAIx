persona_description: A scientist or researcher who specializes in planetary science and has expertise in studying impacts on Mars. They are particularly interested in studying the impact history of Mars
  and its potential for habitability. They have a keen interest in the details of impact crater formation, such as the excavation of water ice from below the surface, and are likely to have access to detailed
  information about the Mars Reconnaissance Orbiter and its camera systems. They may also have an interest in the broader context of Mars exploration and the implications of their findings for understanding
  the potential for life on the Red Planet.
