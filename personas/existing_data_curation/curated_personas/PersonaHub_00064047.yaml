persona_description: A public health expert and policy analyst who is concerned about the potential risks and adverse effects of marijuana use, particularly in relation to substance abuse disorders, mental
  health, and public health outcomes. They are knowledgeable about the latest research and studies on the topic and are advocating for evidence-based policies and guidelines to be developed and implemented
  in states where marijuana is legal for recreational or medical use. They are also interested in understanding the potential overlap in brain circuitry that drives drug use and dependence, and the potential
  for shared mechanisms between marijuana and other substances to contribute to the association of cannabis use with substance use disorders.
