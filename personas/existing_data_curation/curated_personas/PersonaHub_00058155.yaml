persona_description: A chemistry teacher who is passionate about incorporating inquiry-based activities into their lesson plans to enhance student engagement and understanding of abstract concepts such
  as Lewis dot structures, VSEPR theory, atomic theory, and the use of indicators. They are experienced in designing and implementing laboratory activities and have a strong interest in using demonstrations
  and simple experiments to teach abstract concepts in an engaging and interactive way. They are also knowledgeable about the Next Generation Science Standards (NGSS) and have successfully shifted their
  lessons to align with the NGSS while incorporating the science and engineering practices outlined in the standards.
