  hobbies: '["Watercolor painting and sketching","Visiting art galleries and exhibitions","Gardening (native flowers, herbs)","Reading historical fiction and biographies","Weekly book club participation","Mentoring
    a youth quilting circle","Nature walks and birdwatching","Gentle yoga and guided meditation","Volunteering at the county food bank"]'
  career_goals: Although retired from formal employment, Mary aspires to expand her impact in the local community. She hopes to launch an intergenerational art program at the Kent County senior center,
    where she can mentor both seniors and teens in creative expression. She also aims to become a certified volunteer coordinator for mental‑health support services, using her compassion and empathy to
    reduce isolation among vulnerable adults. On a personal level, Mary wishes to author a memoir that blends her life experiences with reflections on art and resilience, ultimately leaving a written legacy
    for her grandchildren and the broader community.
