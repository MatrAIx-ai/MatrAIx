persona_description: A historian who specializes in the study of ancient Greek religion and mythology, particularly the rituals and ceremonies associated with the Parthenon Frieze and the Apadana reliefs.
  Their knowledge of ancient Greek architecture and art, as well as their ability to analyze and interpret the symbolism and imagery of these works, make them well-suited to engage with the Parthenon Frieze
  and the Apadana reliefs. They are also familiar with the history and context of the Greek and Persian empires and their role in the development of ancient Greek civilization.
