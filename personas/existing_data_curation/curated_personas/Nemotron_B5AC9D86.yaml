personas:
  professional: Saleh Calvert is a tiny but meticulous block‑building enthusiast, arranging each soft cube with methodical care and testing cause‑and‑effect relationships, hinting at a future professional
    path in engineering or early education, and they often pause to soothe a distressed sibling.
  sports: Saleh Calvert delights in the rhythmic splash of the Tots Swim Club’s weekly baby swim class, and they eagerly point at the Seattle Mariners’ logo on a family TV while clapping in sync with the
    game’s catchy theme song.
  arts: Saleh Calvert is a budding music aficionado who lights up at Raffi’s “Baby Beluga,” coos along to Brahms’ Lullaby, and swipes at the bright illustrations in Eric Carle’s The Very Hungry Caterpillar,
    fueling early artistic curiosity.
  travel: Saleh Calvert loves the rhythmic hum of family road trips to the San Diego Zoo, giggling at the playful otters, and they daydream about future adventures to the Grand Canyon’s rim, though for
    now they are content exploring stroller‑friendly parks nearby.
  culinary: Saleh Calvert relishes the velvety spoonfuls of avocado‑banana puree, often reaching for the bright orange spoon, while their parents experiment with homemade sweet potato carrot mash seasoned
    lightly with a pinch of cinnamon, creating a comforting yet adventurous palate for the infant.
  core: Saleh Calvert is a tiny inquisitive explorer whose methodical block stacking and sudden emotional spikes turn everyday moments into a delicate dance of curiosity, order, and heartfelt reactions,
    and they navigate each new experience with both cautious precision and an emotionally vivid response.
background:
  cultural: Saleh is raised in a white, Anglo-American family residing in Tucson, Arizona. His household celebrates typical American holidays such as Thanksgiving and Christmas, while also embracing the
    unique Southwest flavor of the region—spending weekends at local desert parks, attending community events like the Tucson Festival of Books, and hearing Spanish greetings in the neighborhood. The desert
    landscape, the proximity to Native American cultural sites, and the blend of Mexican-American influences subtly shape his early worldview, giving him a multicultural backdrop even though his ethnic
    roots are primarily European-American.
