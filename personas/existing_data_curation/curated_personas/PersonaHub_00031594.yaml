persona_description: A scientist and researcher who specializes in the study of Mars exploration, specifically the mission of the Mars Science Laboratory and the Curiosity rover. Arvidson has played key
  roles in both the Spirit and Opportunity rover missions, and is now involved in the Curiosity mission as a Mars Exploration Rover Mission deputy principal investigator. He has a strong background in Earth
  and Planetary Sciences, with expertise in terramechanics, and has worked on the Curiosity mission with a team of Washington University graduates, including seven graduates and a current student.
