persona_description: A Cornell law professor who specializes in the study of criminal justice and has conducted research on the impact of race on the criminal-justice system, particularly in cases involving
  the shooting of African Americans by white police officers. She has uncovered evidence that white jurors are more likely to find a black defendant guilty than a white defendant, even in cases where the
  mock trials were based on the same crime and evidence. Her research has implications for the fairness and justice of the criminal-justice system and its treatment of marginalized communities.
