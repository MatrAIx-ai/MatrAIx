  hobbies: '[''Reading poetry and self‑help books'', ''Playing acoustic guitar'', ''Cooking Guatemalan dishes'', ''Hiking Ozark trails'', ''Gardening'', ''Playing strategy video games'', ''Volunteering
    at animal shelter'']'
  career_goals: Jorge aims to earn his GED within the next year and then enroll in a community college program focused on social work or mental health counseling. He hopes to secure a position as a community
    outreach coordinator or peer support specialist, working with immigrant families and youth in the Springdale area. His long‑term ambition is to build a stable, compassionate career that allows him to
    advocate for vulnerable populations while also providing the structure and predictability he values for his own well‑being.
