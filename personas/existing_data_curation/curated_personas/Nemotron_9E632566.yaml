personas:
  professional: A budding block‑building engineer, Pablo Garcia at two years old already treats every pile of wooden cubes as a mini construction site, applying a curious yet practical mindset to test stability,
    keeping an organized layout while flexibly reshaping structures, eagerly inviting fellow toddlers to collaborate, and dramatically expressing frustration—often with a sudden cry—when a tower collapses,
    as they often do when things don't go as planned.
  sports: A lively participant in the Little Sprouts toddler soccer club, Pablo Garcia mirrors the excitement of the nearby Redbirds baseball team and the city’s Lightning basketball squad, chasing after
    balls in the park with boundless energy, as they love to sprint and shout with peers, while also showing a penchant for organized games like peek‑a‑boo during rainy days.
  arts: Delighted by the melodic simplicity of Raffi’s 'Baby Beluga' and the playful choreography of The Wiggles, Pablo Garcia often imitates their songs while sculpting bright Play‑Doh figures, dabbling
    in finger‑painting with bold primary colors, and eagerly joining group sing‑alongs that satisfy his sociable nature, as they relish sharing music with friends.
  travel: Having joyfully explored the nearby city zoo and splashed at the regional beach, Pablo Garcia now dreams of a family trip to the magical world of Disneyland, where curiosity meets the practical
    desire to ride gentle carousel ponies, while his sensitivity sometimes makes him cling to a familiar stuffed animal during new trips, as they often seek comfort when faced with novel environments.
  culinary: Pablo Garcia prefers soft, colorful foods such as mashed sweet potatoes, banana‑studded pancakes, and cheesy macaroni, proudly assisting in the kitchen by sprinkling shredded cheese onto plates,
    yet sometimes throws a fit when asked to taste new veggies like broccoli, reflecting his emotional reactivity to unfamiliar flavors, as they often protest against unfamiliar tastes.
  core: Pablo Garcia, a two‑year‑old whirlwind of curiosity, sociability, and occasional dramatic tantrums, navigates the world with a blend of practical experimentation and heartfelt emotional swings,
    as they constantly shift between excitement and distress.
background:
  cultural: Pablo grows up in a bilingual Mexican‑American household in Phoenix, Arizona. Spanish is spoken at home alongside English, and he hears traditional Mexican lullabies and modern children's songs.
    Family gatherings often feature tacos, tamales, and fresh guacamole, and he participates in cultural celebrations such as Día de los Muertos, where he helps decorate altars with colorful papel picado,
    and Mexican Independence Day festivities with music and dances like the jarabe tapatío. The vibrant Mexican community in Maricopa County provides opportunities for Pablo to attend community festivals,
    learn basic Spanish phrases, and experience a blend of Mexican heritage and Southwestern American culture. These influences shape his identity, language development, and values of family closeness and
    communal celebration.
