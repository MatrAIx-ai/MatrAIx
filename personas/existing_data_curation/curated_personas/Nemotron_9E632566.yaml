  career_goals: Although still a toddler, Pablo's career aspirations surface through imaginative play and spoken wishes. He frequently pretends to be a firefighter rescuing friends, a builder constructing
    tall towers, or a teacher sharing stories, reflecting his desire to help, create, and lead. His curiosity drives him to explore how things work, while his practical side seeks activities with clear
    outcomes. Pablo often says he wants "to make big houses" or "to keep people safe," indicating early ambitions toward roles that combine problem‑solving, community service, and tangible results. While
    these goals are in nascent form, his long‑term ambition is to become someone who can both invent practical solutions and nurture a collaborative environment.
