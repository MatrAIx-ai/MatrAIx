  career_goals: She aims to advance into a supervisory role within the packaging department, eventually becoming a shift manager or continuous‑improvement specialist. She also aspires to integrate her artistic
    side by leading a packaging‑design innovation team that creates aesthetically compelling, sustainable packaging solutions. Long term, she may pursue an associate degree in industrial technology to deepen
    her technical knowledge, and perhaps launch a freelance graphic design side business focused on brand packaging.
