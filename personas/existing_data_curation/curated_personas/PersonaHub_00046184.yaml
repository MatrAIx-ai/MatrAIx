persona_description: A scientist who specializes in the study of kidney diseases, particularly nephrotic syndrome. They have a deep understanding of the mechanisms underlying the development of this condition,
  and are interested in the cellular and molecular aspects of kidney damage and disease. They are particularly interested in the role of the epithelial sodium channel (ENaC) and its activation by plasminogen,
  and are looking for new ways to treat edema and high blood pressure in patients with nephrotic syndrome.
