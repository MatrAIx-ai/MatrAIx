  career_goals: Christopher dreams of one day creating his own comic books or animated short films, combining his love for drawing and storytelling. He imagines working in a creative field where he can
    collaborate with a team, perhaps as a video game developer, multimedia artist, or children's book illustrator. He is also fascinated by science and space, so he occasionally thinks about becoming an
    inventor or explorer. Above all, he wants a career that lets him stay flexible, keep learning, and stay connected with friends and community projects.
