personas:
  professional: Patrick Wey, a 33‑year‑old interdisciplinary humanities educator at Cornell’s School of Human Ecology, blends their deep expertise in critical theory and digital media with a flair for imaginative
    curriculum design, using storytelling and immersive VR projects to engage students while maintaining a reliable, organized workflow balanced by spontaneous collaborative workshops.
  sports: Patrick Wey, an avid hiker and member of the Ithaca Ultimate Frisbee league, fuels their fitness with weekend treks through the gorges, occasional yoga sessions at a local studio, and they cheer
    on the Cornell Big Red, the Buffalo Bills, and the New York Knicks while occasionally joining a casual soccer match with the Ithaca Soccer Club.
  arts: Patrick Wey immerses themselves in Ithaca’s creative pulse, regularly attending experimental theater by the Binghamton Theatre Lab, gallery openings featuring works by Kehinde Wiley and local surrealist
    painter Sam Lee, and live performances by Sufjan Sullivan and the avant‑garde trio The Atlas Sound, while they pen poetry inspired by Borges and Dalí in the evenings.
  travel: Patrick Wey favors a mix of contemplative road trips through the Finger Lakes, a well‑planned weekend in Portland, Oregon for its food scene, and spontaneous wanderings in European cities like
    Prague and Kyoto, yet they dream of trekking the Inca Trail to Machu Picchu and a summer retreat in Iceland’s volcanic landscapes.
  culinary: Patrick Wey, an enthusiastic home chef, experiments with seasonal farm‑to‑table dishes such as heirloom carrot and goat‑cheese risotto, wild mushroom and beet tart, and they love crafting a
    rosemary‑infused short‑rib ramen using locally sourced pork and fresh herbs, though they often binge on late‑night espresso while editing manuscripts.
  core: Patrick Wey is a 33‑year‑old scholarly dreamer who channels boundless imagination into teaching, art, and cooking, balances meticulous planning with spontaneous creativity, and occasionally lets
    caffeine and poetry drafts dictate their sleep schedule.
background:
  cultural: Patrick grew up in a middle‑class, white family in the Upper Midwest, where he was exposed to a blend of traditional American values and an appreciation for the region’s natural landscapes.
    His upbringing emphasized education, community responsibility, and a DIY ethic. Moving to Ithaca for graduate studies immersed him in a progressive, liberal academic environment that celebrates cultural
    diversity, social justice, and interdisciplinary inquiry. This melding of Midwestern pragmatism with the intellectually curious, arts‑focused ethos of the Cornell community shapes his worldview, fostering
    a strong commitment to inclusive pedagogy, collaborative creativity, and civic engagement.
attributes:
  skills: '[''Literary Analysis'', ''Visual Culture Studies'', ''Digital Media Production'', ''Curriculum Development'', ''Critical Theory Research'', ''Grant Writing'', ''Academic Mentorship'', ''Inclusive
    Pedagogy'', ''Learning Management System Administration'', ''Public Speaking'', ''Community Outreach'', ''Conflict Resolution'']'
  hobbies: '[''Gallery and Museum Visits'', ''Experimental Theater'', ''Live Music'', ''Poetry Writing'', ''Short Fiction'', ''Speculative Literature Reading'', ''Hiking'', ''Landscape Photography'', ''Improv
    Comedy'', ''Creative Writing Workshops'', ''Farm‑to‑Table Cooking'']'
  career_goals: Patrick aims to secure tenure at Cornell University’s School of Human Ecology within the next five years and to eventually become a full professor renowned for bridging humanities scholarship
    with digital innovation. He seeks to obtain a Mellon or NEH grant to launch an interdisciplinary program that blends critical theory, visual arts, and new media. He aspires to publish a monograph on
    the impact of virtual reality on contemporary narrative forms, while also expanding his role as a mentor by establishing a fellowship for underrepresented students in the humanities. Long‑term, he envisions
    taking on departmental leadership to shape inclusive curricula and champion community‑engaged research initiatives that connect academia with the cultural life of Ithaca and the Finger Lakes region.
