  career_goals: Ann aims to turn her artistic talents into a sustainable freelance career in illustration and graphic design, building an online portfolio to attract local businesses and digital clients.
    She plans to enroll in a community‑college certificate program in graphic design to solidify her technical skills, then seek a part‑time role as an arts program coordinator at the Circleville public
    library or a nonprofit arts organization. Long‑term, she hopes to publish a collection of speculative short stories and eventually run her own small studio offering workshops and custom artwork.
