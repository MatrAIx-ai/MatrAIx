personas:
  professional: Ang Gifford is a budding freelance illustrator and graphic designer who leverages meticulous project planning and a vivid imagination to craft custom artwork for local businesses while balancing
    an ambitious schedule of community workshops and a part‑time arts coordinator role at the Circleville public library.
  sports: Ang Gifford enjoys weekend hikes across the rolling Ohio countryside, plays forward on a local co‑ed soccer league, attends monthly yoga sessions at the Circleville community center, and roots
    for the Cleveland Browns during football season, though their busy art project calendar occasionally leads them to skip a workout.
  arts: Ang Gifford immerses themselves in the visual arts by painting in the style of Monet’s impressionistic landscapes and O'Keeffe’s bold abstractions, curating a vintage DSLR photo series inspired
    by Olivia Bee, drawing narrative inspiration from Ocean Vuong’s poetry and Margaret Atwood’s speculative fiction, and finding creative fuel listening to Sufjan Stevens and watching Wes Anderson’s movies
    during quiet evenings.
  travel: Ang Gifford combines methodical trip planning with spontaneous sketching stops, favoring weekend getaways to nearby Asheville and New York’s art districts while dreaming of a spring pilgrimage
    to Kyoto’s temple gardens and a summer art tour of Barcelona’s Gaudí sites, all financed through careful budgeting and a dedicated travel‑savings envelope.
  culinary: Ang Gifford’s culinary adventures revolve around crafting vegetarian mushroom risotto, fragrant Thai green curry, and handcrafted herb‑infused teas like lemongrass‑chamomile, pairing each dish
    with a splash of basil‑infused olive oil, and they often curate playlists of lo‑fi beats while whisking sauces in their modest Ohio kitchen.
  core: Ang Gifford is a methodical dream‑weaver who balances a disciplined freelance art hustle with spontaneous tea‑blending, weekend hikes, and a penchant for meticulously tracking every color palette
    and expense.
background:
  cultural: Ann was raised in a middle‑class white family in Circleville, Ohio, a small Midwestern community where neighborly ties, modesty, and a strong work ethic are highly valued. Her upbringing reflects
    typical Midwestern cultural influences—friendly politeness, practical problem‑solving, and a love for local traditions such as county fairs, church gatherings, and community service. Exposure to regional
    folk arts, American popular culture, and a supportive community has shaped her artistic interests and balanced her independent imagination with a cooperative spirit.
