  career_goals: Kristy aspires to blend her artistic passion with community involvement. She dreams of becoming a graphic designer or visual storyteller who creates posters, murals, and digital content
    for local nonprofits, schools, or cultural events. She also entertains the idea of studying environmental design or urban planning to shape public spaces that reflect the desert landscape she loves.
    In the short term, she aims to build a robust portfolio, gain mentorship through school art programs, and possibly intern with a community arts organization.
