persona_description: A military strategist who is familiar with the Joint Chiefs of Staff Committee, the Permanent Joint Board, and the Joint Canadian-United States Basic Defense Plan of 1940. He has a
  deep understanding of the role of naval, military, and air forces in defending Canada, Newfoundland, and the United States against direct attack by European and/or Asiatic Powers, and the importance of
  British forces being either destroyed or neutralized. He is also knowledgeable about the situation assumed in the plan, including the potential for German and Italian offensive operations in the western
  Atlantic, and the possibility of Japan initiating hostilities in the Pacific. He is interested in the plan's design for providing for the most effective use of Canadian and U.S. forces, the allocation
  of responsibilities connected with each task, and the logistic, garrison, and defense facilities to be provided by each country.
