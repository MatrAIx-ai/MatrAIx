  hobbies: '[''Soccer'', ''Cooking Mexican Cuisine'', ''Hiking'', ''Guitar Playing'', ''Automotive Tech Podcasts'', ''Personal Development Podcasts'', ''Meditation'', ''Journaling'', ''Video Gaming (Racing
    Simulators)'']'
  career_goals: Hernan aims to become a certified logistics coordinator within the next three years, leveraging his on‑the‑road experience to transition into fleet management. He plans to complete a degree
    in Supply Chain Management and obtain a CDL Class A endorsement, positioning himself for a future role as a fleet manager who implements sustainable routing and supports local businesses. Long‑term,
    he dreams of owning a small transportation company that prioritizes environmentally friendly practices and provides employment opportunities for the Mexican‑American community in Ventura County. He
    also hopes to develop stress‑management workshops for fellow drivers, reflecting his own journey with anxiety and worry.
