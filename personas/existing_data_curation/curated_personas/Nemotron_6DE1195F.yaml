personas:
  professional: Hernan Santiago applies their bilingual fluency, defensive driving expertise, and emerging sales acumen to excel as a junior logistics coordinator for a regional freight company, where they
    balance meticulous route planning with an eagerness to test new fleet‑optimization software, all while maintaining organized yet adaptable workflows that reflect their practical curiosity.
  sports: Hernan Santiago plays forward for the Ventura County Strikers Sunday league, roots for the LA Galaxy and LA Dodgers, and they spend weekday afternoons hiking the Los Padres National Forest trails,
    blending team camaraderie with solitary endurance training.
  arts: Hernan Santiago is teaching themselves guitar by emulating Carlos Santana’s phrasing and John Mayer’s fingerstyle, and they listen avidly to The Everyday Driver and The Tim Ferriss Show podcasts
    while attending occasional live mural tours in downtown Los Angeles for creative inspiration.
  travel: Hernan Santiago prefers weekend road trips along California’s Pacific Coast Highway, has explored the coastal cliffs of Santa Barbara and the redwoods of Mendocino, and they budget travel expenses
    carefully to align with their student loan repayments while dreaming of visiting Oaxaca’s bustling markets.
  culinary: Hernan Santiago regularly prepares al pastor tacos, chicken tamales, and mole negro using fresh corn masa, chipotle peppers, and Mexican chocolate, and they consider themselves a competent home
    chef who enjoys sharing hearty, traditional meals with family and friends.
  core: Hernan Santiago is a diligent, curiosity‑driven logistics enthusiast who balances a love of soccer, guitar, and family cooking with a persistent undercurrent of anxiety that fuels both meticulous
    planning, and they occasionally indulge in impulsive purchases.
background:
  cultural: Hernan is the son of Mexican immigrants from Jalisco, raised in a bilingual household that blends Mexican traditions with Californian life. He grew up celebrating Día de los Muertos, Las Posadas,
    and Mexican Independence Day with family gatherings centered around food, music, and storytelling. His Catholic upbringing and close‑knit extended family foster a strong sense of responsibility, cooperation,
    and hospitality. Living in Santa Paula—a town known for its agricultural roots—he feels a deep connection to the local farming community, often volunteering at harvest festivals and community clean‑up
    events. This cultural tapestry shapes his work ethic, his desire to support others, and his commitment to giving back to the Mexican‑American community.
attributes:
  skills: '[''Heavy Truck Operation'', ''Defensive Driving'', ''Route Planning'', ''Load Securement'', ''Vehicle Maintenance'', ''Bilingual Communication (English/Spanish)'', ''Customer Service'', ''Sales
