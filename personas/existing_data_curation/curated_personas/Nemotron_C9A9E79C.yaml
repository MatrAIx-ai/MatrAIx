  hobbies: '[''Playing soccer in local leagues'', ''Listening to music (regional Mexican, reggaeton, hip‑hop)'', ''Attending community festivals and cultural events'', ''Exploring street food markets'',
    ''Tinkering with vehicle engines and customizing truck'', ''Hiking in the Angeles National Forest'', ''Video gaming (console and mobile)'', ''Cooking family recipes'', ''Volunteering at local community
    center'']'
  career_goals: Mateo aims to obtain his Class A Commercial Driver’s License within the next year and secure a position with a reputable freight or delivery company. He plans to save enough to eventually
    purchase his own truck and launch a small, locally-focused courier service that blends driving with sales of auto accessories. Long-term, he hopes to pursue a GED or high‑school diploma and possibly
    study logistics management to transition into route planning or fleet supervision.
