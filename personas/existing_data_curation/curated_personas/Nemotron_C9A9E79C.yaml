personas:
  professional: Mateo Reyes is a 19-year-old aspiring commercial driver who leverages hands-on mechanical troubleshooting, bilingual customer service, and a relaxed, adaptable attitude to efficiently handle
    truck maintenance on the road while they build rapport with clients and negotiate auto-parts sales.
  sports: Mateo Reyes plays midfielder for the East LA Strikers in a community soccer league, cheers on Los Angeles FC in MLS and the Lakers during NBA season, and stays fit by hiking the trails of Angeles
    National Forest on weekends, while they occasionally join a local ultimate frisbee pick-up group in the summer.
  arts: Mateo Reyes immerses themselves in a mix of regional Mexican tunes, reggaeton beats from Bad Bunny and J Balvin, and hip-hop tracks by Kendrick Lamar, often attending street-food fairs where live
    bands perform and collecting vintage cassette tapes of 90s norteño, using the music as inspiration while they customise their truck's interior and freestyle verses with friends.
  travel: Mateo Reyes prefers spontaneous road trips in their truck, taking weekend drives to the hiking trails of Angeles National Forest or the surf-lined beaches of Santa Monica, dreams of a cross-border
    cargo tour to Tijuana and a backpacking adventure through the Yucatán Peninsula, yet they meticulously budget each outing due to limited savings.
  culinary: Mateo Reyes enjoys cooking family recipes like carnitas tacos and tamales using fresh corn masa, chipotle, and cilantro, boasts an intermediate skill level that lets them experiment with mole
    sauces and homemade salsa, and often pairs their meals with a cold cerveza while they join friends at local taquerías to sample al pastor tacos and street-style elote.
  core: Mateo Reyes blends a love for trucks, soccer, and spontaneous road trips with a relaxed, slightly disorganized streak that sees them juggling big dreams of owning a courier fleet while they constantly
    upgrade their ride's interior and forget to pay a few bills on time.
background:
  cultural: Mateo grew up in a Mexican‑American household in Sylmar, where Spanish was spoken at home and family gatherings centered around traditional foods and celebrations such as Día de los Muertos
    and Cinco de Mayo. He maintains close ties to his extended family and the local Latino community, balancing Mexican cultural values of respect, solidarity, and fiesta with the diverse influences of
    Los Angeles life.
