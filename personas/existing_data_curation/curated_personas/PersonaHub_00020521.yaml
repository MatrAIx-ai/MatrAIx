persona_description: A Radiographer who is dedicated to the art and science of producing diagnostic images of the human body, using radiography as a tool for accurate and precise diagnosis. They are responsible
  for positioning the body part of the patient accurately and only applying the necessary amount of radiation to produce high-quality diagnostic images. The radiographer works in many areas outside of the
  radiology department, including surgery, the emergency room, cardiac care, intensive care, and patient rooms, and contributes a special talent to assist in the diagnosis of injury and disease.
