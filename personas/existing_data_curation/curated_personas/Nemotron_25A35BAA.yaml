  hobbies: '[''Cooking Asian-fusion cuisine'', ''Yoga and meditation'', ''Hiking in Texas parks'', ''Participating in CTF meetups'', ''Reading cyber security blogs and sci-fi novels'', ''Gardening and herb
    cultivation'', ''Calligraphy practice'', ''DIY electronics projects'']'
  career_goals: Kiu aims to progress from senior analyst to security architect within the next three to five years, leading the design of proactive threat‑intelligence programs and enterprise‑wide security
    maturity initiatives. She plans to earn CISSP and CCSP certifications to deepen her strategic expertise. Additionally, she wants to mentor junior security staff, drive a culture of continuous improvement
    in her Dallas‑based organization, and eventually explore consulting roles that let her shape security strategies for multiple clients across the region.
