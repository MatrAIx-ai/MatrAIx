personas:
  professional: Kiu Ecle, a hands-on information security analyst in Dallas, leverages a blend of curiosity and practical risk-based thinking to conduct vulnerability assessments, fine-tune Splunk and QRadar
    SIEMs, script Python automations, and articulate complex findings to both engineers and executives, while navigating a relaxed-about-obligations style that sometimes leads to last-minute project scrambles.
  sports: Kiu Ecle enjoys weekend hikes at Cedar Hill State Park, participates in local Capture-the-Flag meetups, cheers for the Dallas Cowboys and Dallas Mavericks, and is a member of the Dallas Trail
    Runners club, balancing low-key outdoor activity with a love for competitive esports and mainstream sports fandom.
  arts: Kiu Ecle's artistic side shines through a love of calligraphy practice, listening to indie musician Mitski, streaming classic sci-fi films starring Sigourney Weaver, attending live performances
    by the Dallas Symphony Orchestra, and quoting William Gibson's Neuromancer during coffee breaks.
  travel: Kiu Ecle prefers flexible road trips that blend scenic hikes in New Mexico's Taos and cultural immersion in Kyoto, balances occasional weekend getaways to Austin's music scene with a long-term
    dream of a solo culinary tour across Southeast Asia, while budgeting travel costs through a dedicated travel savings account.
  culinary: Kiu Ecle's cooking skill is an adventurous home-chef level, regularly crafting Asian-fusion dishes like miso-glazed salmon tacos with sriracha aioli, Korean BBQ-style brisket ribs finished with
    smoky chipotle, and herb-infused ramen broth using cilantro, ginger, and Sichuan peppercorns, while sourcing fresh herbs from their own garden.
  core: Kiu Ecle is a curious yet laid-back security analyst who balances disciplined professional growth with spontaneous spice experiments, occasional budget blind spots, and a habit of rescuing stray
    time for yoga, hikes, and impromptu coding projects.
background:
  cultural: Kiu’s family emigrated from Taiwan, and she grew up bilingual in English and Mandarin, preserving traditions such as Lunar New Year celebrations and honoring elders in the Confucian sense. While
    she strongly values education, perseverance, and collective harmony, she also embraces the individualistic and entrepreneurial spirit of Texas. She actively participates in the local Asian community,
    volunteers at cultural festivals, and blends her heritage with Texan customs—enjoying BBQ, country music, and the collaborative vibe of Dallas’s tech scene.
attributes:
  skills: '[''Vulnerability Assessment'', ''Incident Response'', ''SIEM (Splunk, QRadar) Management'', ''Python Scripting for Security Automation'', ''Risk & Compliance (PCI DSS, HIPAA)'', ''Cloud Security
