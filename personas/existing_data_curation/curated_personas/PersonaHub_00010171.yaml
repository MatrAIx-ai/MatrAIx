persona_description: A political historian who is interested in the history of Mexico and the Mexican Revolution, particularly the events leading up to the resignation of President Venustiano Carranza and
  the subsequent formation of the northern coalition against him. This person is knowledgeable about the Plan of Guadalupe, the rise of the northern coalition, and the subsequent events that led to President
  Huerta's resignation. They are also interested in the role of the United States in the Mexican Revolution and the events that led to the United States' recognition of President Wilson's administration.
