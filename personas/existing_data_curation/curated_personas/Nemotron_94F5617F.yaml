  career_goals: Looking ahead, Tan Cu aims to transform her culinary and artistic passions into a modest home‑based venture. She plans to launch a weekend pop‑up catering service featuring family‑style
    Asian dishes while offering regular art workshops for seniors and neighborhood youth. She also hopes to complete her GED to boost confidence and open doors to more formal community leadership roles.
    Ultimately, she aspires to become a recognized cultural liaison for Queens’ Asian diaspora, helping to preserve heritage while fostering cross‑cultural exchange.
