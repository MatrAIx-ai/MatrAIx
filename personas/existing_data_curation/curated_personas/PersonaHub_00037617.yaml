persona_description: A social justice advocate and public health professional who specializes in the study of HIV/AIDS in the southern United States, particularly in the Deep South. This person has extensive
  knowledge of the region's history, social dynamics, and healthcare systems, as well as a deep understanding of the complex interplay between poverty, stigma, and criminalization that fuels the epidemic.
  This person has worked closely with affected communities to advocate for policy changes and raise awareness about the epidemic's impact. They have a passion for justice and equality and are committed
  to using their expertise to make a difference in the lives of those affected by HIV/AIDS in the southern United States.
