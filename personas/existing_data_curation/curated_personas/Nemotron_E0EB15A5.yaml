personas:
  professional: James Wiggins is a paramedic-in-training EMT who leverages his BLS/ACLS certification, data-driven mindset, and competitive drive to streamline emergency response protocols while fostering
    clear communication within his crew's operations.
  sports: James Wiggins pumps energy into weekly intramural basketball games, jogs with the Des Moines Running Club through the spring and fall, roots for the Iowa Hawkeyes football team in the fall, and
    follows the Chicago Bulls during the NBA season, balancing competitive play with community fitness events at the county fair.
  arts: James Wiggins unwinds at town-hall folk-music jam sessions, strumming along to Bob Dylan and Gillian Welch, while his love of science-fiction fuels evenings with novels by Isaac Asimov and N.K.
    Jemisin, shaping his creative side beyond the emergency calls.
  travel: James Wiggins prefers DIY road trips, charting routes on a trusty paper map to Yellowstone and the Badlands in his old pickup, reserving occasional weekend getaways to Chicago for concerts, while
    dreaming of a future cross-country RV adventure through the Midwest's historic small towns.
  culinary: James Wiggins showcases his culinary chops by grilling corn-on-the-cob, slow-cooking pork tenderloin with a homemade apple-cider glaze, and whipping up a hearty corn chowder using fresh Iowa
    sweet corn, all while swapping recipes at community potlucks with friends.
  core: James Wiggins blends a farmer-grown work ethic, a data-driven EMT skill set, and a love for classic cars and folk tunes into a fiercely practical yet community-centered life.
background:
  cultural: James grew up in a small farming community in central Iowa, steeped in Midwestern values of hard work, self‑reliance, and community solidarity. His family includes several generations of agricultural
    and small‑business owners, and he was raised in a close‑knit Protestant congregation that emphasized service to neighbors. The rural environment fostered a practical, problem‑solving mindset, while
    the tight community network reinforced his sociable, outgoing nature. These cultural influences shape his commitment to public service and his pragmatic approach to challenges.
attributes:
  skills: '[''Basic Life Support (BLS)'', ''Advanced Cardiac Life Support (ACLS)'', ''Trauma assessment'', ''Patient triage'', ''EMR documentation'', ''Ambulance equipment operation'', ''Crisis communication'',
    ''Team leadership'', ''Data analysis'', ''Community health education'']'
  hobbies: '[''Intramural basketball'', ''Running club'', ''Volunteer health fairs'', ''DIY electronics projects'', ''Classic car restoration'', ''Cooking for friends'', ''Folk‑music jam sessions'', ''Reading
    science‑fiction'', ''County‑fair events'', ''Demolition derbies'']'
  career_goals: James aims to obtain paramedic certification within the next year, followed by advanced training in critical‑care transport and flight medicine. In the medium term, he plans to pursue a
    Master’s degree in Emergency Management or Public Health to qualify for a supervisory role within Fayette County EMS. His long‑term ambition is to become the director of emergency services for the county,
    implementing data‑driven response strategies and a low‑cost tele‑triage platform for rural communities. He is motivated by a competitive desire to lead the region’s EMS program and improve outcomes
    for residents.
