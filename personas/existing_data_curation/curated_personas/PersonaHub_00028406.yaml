persona_description: A climate scientist who specializes in the study of the effects of climate change on species and ecosystems, particularly in the Southwest region of the United States. They are focused
  on understanding the potential impacts of rising temperatures and changing precipitation patterns on species such as the desert tortoise and the pinyon jay, and are interested in providing land managers
  with information to make informed decisions about how to adapt to these changes. They are likely to have a deep understanding of the biodiversity of the region, as well as the specific species and ecosystems
  that are most vulnerable to climate change.
