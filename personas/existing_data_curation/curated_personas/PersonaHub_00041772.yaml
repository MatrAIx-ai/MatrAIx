persona_description: A child psychologist who specializes in understanding the mental health issues of children and teenagers, and making recommendations on appropriate mental health treatment. They need
  a master's or doctoral degree with emphasis and additional training in children's mental health, and are required to be licensed in their state. They work closely with parents and family to develop a
  comprehensive treatment plan that encompasses all aspects of the child's life. They also deal with situations where children are abused, making recommendations to local child services agencies or psychiatrists,
  inpatient or outpatient facilities, or other community resources. They offer recommendations in custody situations, interviewing parents, close family members, and the child themselves, and may recommend
  sole custody to one parent or split time with parents.
