personas:
  professional: Jane Moye, a budding chess strategist and 4‑H horticulture enthusiast who leverages their love for structure, competition, and practical problem‑solving to meticulously schedule tournament
    prep, garden experiments, and school projects, all while balancing a detailed notebook of strategies with quiet focus.
  sports: Jane Moye, a dedicated cross‑country runner for the Riverside Middle School Team who follows a strict training regimen, idolizes the Boston Marathon’s endurance ethos, sponsors the local Kids
    on Trails club, and channels their competitive nature into precise pacing strategies while cheering for the Seattle Seahawks during off‑season downtime.
  arts: Jane Moye, an avid reader of contemporary mystery novels by Tana French and Gillian Flynn, a journal keeper who crafts poetic reflections after each chess game, and a novice knitter who hums along
    to Sufjan Stevens while stitching simple scarves, blending creativity with quiet focus and often reflecting on their day through the written word.
  travel: Jane Moye, a cautious traveler who prefers family‑organized road trips to nearby state fairs and the Biltmore Gardens, dreams of experiencing the cherry blossom festivals in Kyoto and the historic
    castles of Scotland, but balances wanderlust with their parents’ budget constraints and their own tendency to over‑plan itineraries down to the hour.
  culinary: Jane Moye, a budding home chef who loves harvesting carrots, tomatoes, and basil from their garden to whip up fresh ratatouille and spicy stir‑fry noodles, enjoys the simplicity of grilled cheese
    with a hint of rosemary, and occasionally experiments with knitting‑themed cookie cutters for snack time.
  core: Jane Moye, a structured yet competitive 13‑year‑old who blends chess tactics, garden experiments, and meticulous journaling into a life marked by careful budgeting, anxious self‑monitoring, and
    a habit of double‑checking every detail.
background:
  cultural: She grew up in a predominantly white, Midwestern community in Columbus, Nebraska, where agricultural heritage, self‑reliance, and close‑knit community values shape daily life; local traditions
    such as county fairs, school events, and church gatherings reinforce a practical, modest outlook and a strong sense of belonging.
