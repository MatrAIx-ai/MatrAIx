personas:
  professional: Donald Watson, a budding programmer who merges his love for LEGO engineering with Scratch game creation, applies methodical planning and competitive curiosity to turn imaginative concepts
    into functional prototypes, positioning himself as an aspiring software developer and future robotics engineer.
  sports: Donald Watson, a 12‑year‑old midfielder for the local youth club Riverdale Rovers who avidly follows the MLS team Seattle Sounders FC, balances competitive play on the soccer field with weekend
    bike rides on the nearby Pine Trail, using strategic positioning and a disciplined training schedule to improve stamina, while tracking his performance stats in a handwritten log.
  arts: Donald Watson nurtures his creative side by constructing intricate LEGO models inspired by the sci‑fi worlds of Isaac Asimov and Andy Weir, listening to the orchestral scores of Hans Zimmer while
    coding Scratch games, and attending weekend comic‑book club meetings where he discusses the artwork of manga illustrator Akira Toriyama, weaving these influences into his own imaginative storytelling.
  travel: Donald Watson, who prefers meticulously planned trips, enjoys family road‑circuit trips to Yellowstone National Park and a summer visit to the Kennedy Space Center, while dreaming of attending
    the International Science Fiction Convention in Osaka, balancing his love for exploration with school schedules and a modest travel budget.
  culinary: Donald Watson, an enthusiastic home‑chef in the making, frequently prepares simple yet structured meals like spaghetti Bolognese with fresh basil, chicken quesadillas with cheddar and jalapeños,
    and homemade banana pancakes, cataloguing each recipe in a notebook that mirrors his LEGO build instructions, while also savoring pizza with pepperoni and occasional sushi rolls whenever a family outing
    permits.
  core: Donald Watson, a 12‑year‑old strategic thinker, merges a love for LEGO engineering, competitive soccer, and methodical budgeting into a uniquely organized, curiosity‑driven worldview peppered with
    occasional forgetfulness and a healthy dose of healthy skepticism.
background:
  cultural: Donald comes from a typical Midwestern white family in Green Bay, Wisconsin, with roots in the region's German‑Polish heritage. His upbringing emphasizes community values, modesty, and a strong
    work ethic, reflected in local traditions such as Packers football gatherings, summer barbecues, Fourth of July fireworks, and seasonal activities like ice‑fishing and snowshoeing. He attends a public
    school where civic responsibility and practical learning are prized, and his family often participates in church celebrations during holidays.
