persona_description: A space enthusiast and astronomy enthusiast who is fascinated by the possibility of detecting the footprints of Apollo 11 on the moon using a telescope. They are particularly interested
  in the math involved in resolving the lunar modules and the potential costs and challenges of building such a telescope. They also appreciate the accuracy of JAXA's KAGUYA spacecraft in mapping the topography
  of the Apollo landing sites and believe that the pictures taken by the Lunar Reconnaissance Orbiter are the best we can get for a while.
