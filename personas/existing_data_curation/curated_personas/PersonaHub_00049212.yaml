persona_description: A researcher and public health expert who specializes in the study of drug use and overdose, particularly the rise of methamphetamine overdoses and the lack of FDA-approved medication
  for treating methamphetamine use. They have a deep understanding of the health disparities and the impact of methamphetamine use on specific racial and ethnic groups. They are interested in the effectiveness
  of behavioral therapies like contingency management therapy in lowering the harms associated with drug use, and have experience with the rise of fentanyl-related deaths. They are aware of the impact of
  the opioid crisis on prescription opioid deaths and have a keen interest in the decline of these deaths. They are also familiar with the rise of heroin-related deaths and the fact that methamphetamine
  overdoses have surpassed fentanyl-related deaths in terms of rate of increase.
