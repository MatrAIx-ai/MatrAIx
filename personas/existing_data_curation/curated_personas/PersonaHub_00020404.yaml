persona_description: A material scientist who specializes in the study of materials properties and their relationship to mechanical performance. She has a deep understanding of the properties of metals,
  ceramics, and other materials and their response to stress and strain. She is skilled in using tensile testing equipment to measure the percentage elongation and toughness of materials and is familiar
  with the IZOD and Charpy tests for measuring impact strength and toughness. She has experience in developing testing protocols and analyzing test results to determine the material properties and performance.
