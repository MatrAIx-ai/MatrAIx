personas:
  professional: Jason Colyer, a 44‑year‑old master carpenter, blends classic joinery with modern design tools, leads his workshop with meticulous organization yet embraces creative flexibility, and uses
    his calm, assertive demeanor to navigate client negotiations while mentoring apprentices.
  sports: Jason Colyer plays pickup basketball with the Harlem Hoops collective at Manhattan’s Rucker Park, runs the Hudson River Greenway with the Hudson River Runners club whenever the weather permits,
    and cheers for the New York Knicks and Yankees while keeping a modest home gym for strength training.
  arts: Jason Colyer wanders the Met and MoMA for inspiration, studies street‑art by Banksy and Shepard Fairey on Brooklyn walls, listens to contemporary composer John Adams while sketching furniture designs,
    and attends off‑Broadway productions starring Lin‑Manuel Miranda, all of which inform his art‑infused interiors.
  travel: Jason Colyer prefers curated architecture tours, having explored the historic palazzos of Florence, the Art Nouveau districts of Brussels, and the modernist landmarks of Barcelona, while planning
    future trips to the UNESCO‑listed towns of Český Krumlov and the serene coastal villages of Cinque Terre, balancing travel costs with his entrepreneurial budget.
  culinary: Jason Colyer experiments in the kitchen with dishes like saffron‑infused risotto, shish kebab with pomegranate glaze, and a beet‑and goat‑cheese tart, favoring fresh herbs, heirloom tomatoes,
    and locally sourced honey, while their cooking skill hovers between enthusiastic home chef and occasional over‑salting mishap.
  core: Jason Colyer is a calm, curiosity‑driven carpenter‑designer who blends art and architecture, mentors apprentices, runs on the Hudson, and obsessively perfects both a custom cabinet and a spicy risotto,
    all while juggling a disciplined yet sometimes indulgent financial life.
background:
  cultural: Jason was born in a small town near the Adirondack foothills of upstate New York to a family of mixed English-Scottish descent. His father's generations-long tradition of woodcraft and his mother's
    emphasis on education gave him a solid Anglo-American work ethic and a curiosity for learning. Moving to Manhattan for community-college courses in architectural drafting exposed him to the city's rich
    mosaic of cultures. Over the years, he absorbed influences from Italian-American neighborhood artisans, Caribbean-style floor designs, and the avant-garde art scenes of Brooklyn, which now inform his
    aesthetic choices. While he identifies with the broader white American cultural mainstream, he actively engages with New York's multicultural community through his work and personal interests.
attributes:
  skills: '["Custom cabinetry", "Fine woodworking and joinery", "Furniture design (CAD & SketchUp)", "Historic brownstone restoration", "Project scheduling and cost estimation", "Team leadership and client
    communication", "OSHA safety compliance", "Sustainable building practices", "Tool maintenance and shop organization", "Material sourcing (sustainable woods)", "Surface finishing (staining, lacquering)",
    "Installation of acoustic panels"]'
  hobbies: '["Visiting art museums and galleries", "Street-art and urban architecture walks", "Playing acoustic guitar", "Cooking experimental dishes", "Community gardening in Brooklyn", "Building small
    decorative woodworking projects", "Participating in maker fairs and craft workshops", "Reading books on modern architecture and design", "Playing pickup basketball at local parks", "Running along the
    Hudson River Greenway"]'
  career_goals: Jason's primary ambition is to transition from being a subcontractor to owning a boutique design-build firm that produces bespoke, art-infused interiors for historic New York homes. He plans
    to attain the Certified Graduate Carpenter credential, expand his portfolio to include full-scale restoration projects, and launch a weekend workshop series that teaches urban dwellers the basics of
    fine woodworking. Over the next five years, he envisions collaborating with local artists to create site-specific installations, mentoring a new generation of craftsmen, and positioning his business
    as a go-to partner for sustainable, heritage-conscious renovations in the city.
