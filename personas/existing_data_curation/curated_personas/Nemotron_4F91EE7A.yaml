  career_goals: Caroline aims to complete a bachelor’s degree in Business Administration with a concentration in Marketing, leveraging internships to gain real‑world experience in brand strategy and digital
    campaigns. She intends to combine her organizational talent and cultural insight to launch a marketing consultancy that helps Latinx small businesses expand their online presence. In the long term,
    she aspires to become a senior project manager or marketing director, using her competitive drive to lead high‑impact campaigns while staying rooted in her Mexican heritage.
