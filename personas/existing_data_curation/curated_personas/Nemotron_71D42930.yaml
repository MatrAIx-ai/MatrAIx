personas:
  professional: Nikesha Jackson, a two‑year‑old budding explorer, demonstrates early problem‑solving skills through building towering block structures and incessantly asking 'why', and they readily embrace
    unconventional ideas in everyday play.
  sports: Nikesha Jackson, a two‑year‑old who eagerly participates in their preschool’s mini‑soccer program and proudly waves a small flag for the local minor league baseball team the Rapids, balances energetic
    playtime with periods of quiet rest, reflecting their competitive yet flexible nature.
  arts: Nikesha Jackson, a two‑year‑old who delights in finger‑painting vivid abstract shapes and singing along to Disney’s 'Frozen' soundtrack while naming favorite animators like Hayao Miyazaki, uses
    art as a soothing outlet for curiosity and occasional stress.
  travel: Nikesha Jackson, a two‑year‑old who loves family road trips to the nearby aquarium and dreams of seeing the Eiffel Tower in Paris, prefers short, well‑planned outings yet enjoys spontaneous detours
    to local parks, reflecting their need for flexibility and new experiences.
  culinary: Nikesha Jackson, a two‑year‑old who prefers soft avocado mash, honey‑drizzled banana slices, and occasional mac‑and‑cheese, eagerly helps stir batter with a wooden spoon, yet can be picky about
    vegetables, illustrating a blend of adventurous palate and childlike fussiness.
  core: Nikesha Jackson, a two‑year‑old whose boundless curiosity, competitive spark, and occasional worry weave a charming yet sometimes disorganized tapestry of toddler life.
background:
  cultural: Nikesha is raised in a Black family in Norfolk, Virginia, where community and family traditions shape her early life. Her household celebrates African‑American cultural heritage through music,
    food, and stories. She often hears gospel and soul songs that her parents play, and family gatherings include shared meals of Southern comfort foods like collard greens and cornbread. Local community
    events such as the Norfolk African‑American Festival and church activities provide her early exposure to cultural arts, dance, and storytelling. These influences nurture her appreciation for rhythm,
    color, and oral traditions.
