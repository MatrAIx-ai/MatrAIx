  career_goals: Approaching retirement, Whitney aims to transition into a mentorship and training role, designing a curriculum that blends traditional investigative techniques with creative problem‑solving
    inspired by her love of art. She hopes to establish a specialized unit focused on art theft, cultural‑property crimes, and other white‑collar offenses that intersect with her artistic interests. Additionally,
    she plans to author a memoir that reflects on her career, the human stories behind each case, and the importance of empathy in law enforcement. Whitney also wishes to serve as a consultant for community‑safety
    initiatives, helping build trust between police and Los Angeles’ diverse neighborhoods, and to obtain a certification in forensic psychology to deepen her support for victims.
