    "Hiking", "Vintage car restoration", "Outdoor grilling"]'
  career_goals: Adam aims to transition from laborer to foreman within the next three years by completing an OSHA 30‑hour certification and a community‑college associate’s degree in construction management.
    He aspires to earn a commercial driver’s license so he can manage his own crew and transport equipment. In the longer term, he dreams of launching a small, locally‑owned contracting firm that specializes
    in energy‑efficient residential remodels and community‑focused projects, such as Habitat for Humanity builds. Mentoring younger workers and contributing to affordable‑housing initiatives in Tomah are
    central to his ambition, while ensuring a stable income for his retirement.
