persona_description: A conservation biologist who specializes in the study of forest management, particularly in the southeastern United States. This person is actively involved in implementing adaptive
  silviculture experiments to understand the effects of climate change on forest ecosystems. They have a particular interest in wildlife response to management and restoration activities, including the
  use of disturbance legacies and the impact of natural disturbances on wildlife communities. They have conducted research on the effects of Hurricane Michael on forest ecosystems and are currently examining
  the use of disturbance legacies and the response of bark beetles and root-feeding insects to these patterns of disturbance.
