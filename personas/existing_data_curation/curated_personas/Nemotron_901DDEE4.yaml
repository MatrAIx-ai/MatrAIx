  hobbies: '[''Reading Mexican literature'', ''Painting and crafts'', ''Cooking traditional Mexican dishes'', ''Folklorico dance'', ''Community volunteering'', ''Hiking in the San Bernardino mountains'',
    ''Attending cultural festivals'', ''Gardening'']'
  career_goals: Belkis aims to transition into a supervisory role, such as assistant store manager or district trainer, where she can leverage her people‑focused approach and cultural insights to improve
    customer experience across multiple locations. In the longer term, she dreams of opening a boutique that showcases Mexican‑inspired crafts and foods, creating a gathering place for the Hesperia community
    while mentoring emerging entrepreneurs. She also seeks to lead workshops on bilingual customer service and inclusive visual merchandising within her company.
