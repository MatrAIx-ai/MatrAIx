persona_description: A prominent pediatric infectious diseases and AIDS expert, Professor Danny Engelhard, who has dedicated his career to improving the treatment and management of children infected with
  HIV/AIDS in Ethiopia. He has been instrumental in launching anti-retroviral therapy for children in Ethiopia, and has seen the number of children dying from AIDS decrease significantly. His work has been
  supported by the International Training and Education Center on HIV (ITECH) and the American Center of Disease Control (CDC), and he has led a delegation of Israeli doctors and volunteers on a return
  visit to the orphanage in Ethiopia to continue providing anti-retroviral treatment to the children.
