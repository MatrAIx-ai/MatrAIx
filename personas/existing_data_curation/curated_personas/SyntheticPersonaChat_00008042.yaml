    User 1: What do you like about horror movies?

    User 2: I love the suspense and the thrill. I also like the way they can make me feel like I''m in the movie.

    User 1: I can understand that. I love the way horror movies can make me feel scared and anxious.

    User 2: Me too! It''s a great way to get a rush of adrenaline.

    User 1: What''s your favorite horror movie?

    User 2: I''m not sure if I have a favorite. I love a lot of different horror movies.

    User 1: What''s one of your favorites?

    User 2: I really liked "The Conjuring". It was so creepy and suspenseful.

    User 1: I''ve heard good things about that movie. I''ll have to check it out.

    User 2: You should! It''s a great movie.

    User 1: So, you said your grandma raised you. What was that like?

    User 2: It was great! My grandma is the best. She''s always been there for me, and she''s taught me so much.

    User 1: I''m glad you had a good experience with your grandma. I think it''s really important to have a strong relationship with your grandparents.

    User 2: I agree. My grandma is my best friend.

    User 1: That''s really sweet.

    User 2: Thanks.'
