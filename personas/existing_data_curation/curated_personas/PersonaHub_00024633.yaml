persona_description: A structural engineer or civil engineer who specializes in the design and analysis of steel or concrete structures. They are familiar with the principles of strength of materials, including
  the concept of uniform strength girders and the formula for determining the weight of a member. They are likely to have experience working with handbooks and tables related to strength of materials, and
  are knowledgeable about the principles of stress and deflection in beams. They are also likely to be familiar with the concept of uniform stress and the importance of uniform strength girders in light
  structures.
