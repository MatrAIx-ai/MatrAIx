    and workflow optimization'', ''Regulatory compliance (FDA, cosmetics)'', ''Quality control and product testing'']'
  hobbies: '[''Group yoga and spin classes'', ''Science‑focused book club'', ''Volunteering at community health fairs'', ''Cooking classes exploring seasonal Midwestern cuisine'', ''Seasonal gardening'',
