  hobbies: '["Stamp collecting", "Woodworking", "Gardening", "Walking/Hiking", "Reading Minnesota history", "Bridge (card game)", "Bowling league", "Volunteer work at food bank", "Organizing neighborhood
    block parties", "Playing harmonica"]'
  career_goals: Although approaching the conventional retirement age, William intends to continue serving the Lakeville community with the same high standards that have defined his career. His primary goal
    is to secure a senior route supervisor position where he can apply his expertise to improve overall route efficiency and integrate new delivery technologies across the district. He also aspires to formalize
    a mentorship program for younger carriers, sharing his disciplined workflow and customer‑service techniques. William hopes to receive recognition for his flawless delivery record, such as the USPS Silver
    Service Award. Looking beyond full‑time work, he envisions transitioning to a part‑time consulting role that advises local businesses on logistics and parcel handling, thereby extending his impact while
    maintaining a balanced, active lifestyle.
