  hobbies: '[''Hiking'', ''Fishing'', ''Home‑brewing'', ''Acoustic guitar'', ''Collecting vintage knives'', ''Mystery novels'', ''Woodworking'', ''Bluegrass festivals'']'
  career_goals: Dylan aims to open his own farm‑to‑table restaurant in Sevierville that showcases the bounty of the Great Smoky Mountains and becomes a go‑to destination for both locals and tourists. He
    dreams of earning regional culinary awards and eventually a James Beard nomination, while also developing a signature line of sauces and spice rubs. Over the next five years, he plans to complete a
    professional culinary certification, mentor emerging cooks in the community, and expand his brand through pop‑up events and cooking classes.
