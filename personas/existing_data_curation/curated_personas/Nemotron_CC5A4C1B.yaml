personas:
  professional: Dylan Richie, a 36‑year‑old executive chef specializing in Southern Appalachian cuisine, leverages their strong organizational instincts and high‑volume kitchen management expertise to run
    a disciplined service line, yet their relaxed approach to paperwork and competitive edge often leads them to improvise under pressure while meticulously controlling food costs.
  sports: Dylan Richie enjoys high‑altitude hiking on the Great Smoky Mountains trails, casts lines in the Little River stream, and follows the Tennessee Smokies minor‑league baseball team, while regularly
    attending Nashville Predators games with friends, balancing a love for outdoor endurance with a competitive urge to improve personal bests on the local rock‑climbing wall.
  arts: Dylan Richie is an avid acoustic‑guitar player who frequents bluegrass festivals featuring Bill Monroe and modern acts like Mumford & Sons, collects vintage kitchen knives as functional art, and
    devours mystery novels by Agatha Christie and Tana French during downtime, letting the rhythmic cadences of music shape their flavor pairings.
  travel: Dylan Richie prefers weekend road trips along the Blue Ridge Parkway, savoring pit‑stop meals in Asheville and exploring the culinary scene of New Orleans, yet their penchant for spontaneity sometimes
    leaves travel plans half‑baked as work obligations intervene, and they dream of a culinary study tour of Italy’s Piedmont region to refine their sauce line.
  culinary: Dylan Richie crafts seasonal menus centered on smoked pork belly, fried green tomatoes, and hand‑crafted cornbread, pairing each dish with home‑brewed IPAs that echo Appalachian wildflower notes,
    while their skillful use of a vintage mezzaluna and a repertoire of artisanal bread‑baking techniques reflect a deep respect for regional flavors.
  core: Dylan Richie blends a disciplined kitchen mindset with a free‑spirited love for hiking, brewing, and bluegrass, all while wrestling with chronic worry, occasional disorganization, and a competitive
    drive that fuels both their culinary ambition and personal quirks.
background:
  cultural: Dylan is a white American raised in a multi‑generational Appalachian family in East Tennessee. His upbringing immersed him in Southern hospitality, mountain traditions, and the close‑knit community
    of Sevier County. He grew up attending local church potlucks, learning family recipes handed down through generations, and participating in seasonal celebrations tied to the region’s tourism and outdoor
    culture. These experiences shape his practical, community‑focused outlook and his deep appreciation for regional cuisine and outdoor recreation.
attributes:
  skills: '[''Southern and Appalachian cuisine'', ''Menu development'', ''Kitchen staff management'', ''Inventory control'', ''Cost management'', ''Food safety compliance'', ''Farm‑to‑table sourcing'',
