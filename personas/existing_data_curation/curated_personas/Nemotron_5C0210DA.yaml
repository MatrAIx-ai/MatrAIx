  hobbies: '[''Sketching and drawing'', ''Nature photography'', ''Hiking local trails'', ''Listening to jazz, soul, and hip‑hop'', ''Playing acoustic guitar and songwriting'', ''Reading graphic novels and
    indie comics'', ''Writing poetry and journaling'', ''Creating short video essays'', ''Volunteering at the community youth center'', ''Organizing small art workshops and open‑mic events'']'
  career_goals: Stephen aims to earn his GED and enroll in a community college where he can study visual arts and multimedia storytelling. He envisions building a portfolio that merges his graphic art,
    photography, and short documentary work to highlight under‑represented voices in his Midwest community. Long‑term, he hopes to work as a multimedia content creator or documentary filmmaker for a nonprofit
    focused on youth empowerment, while also developing peer‑support programs that use creative expression to address mental‑health challenges among teens.
