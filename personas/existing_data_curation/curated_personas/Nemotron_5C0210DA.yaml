personas:
  professional: Stephen Onen, a budding multimedia storyteller, blends self‑taught digital illustration, DSLR photography, and basic HTML/CSS web design to craft community‑focused visual narratives, while
    their curious yet loosely organized nature fuels spontaneous projects and their empathetic listening shapes collaborative art workshops.
  sports: Stephen Onen enjoys trail‑running through the rolling hills of Madison County in the spring, plays pickup basketball with friends at the local YMCA, follows the Chicago Bulls and Milwaukee Brewers
    for their underdog narratives, and casually bikes with a community cycling club on weekends, viewing fitness as a low‑key backdrop to creative inspiration rather than a competitive pursuit.
  arts: Stephen Onen curates a personal collage of influences ranging from the graphic storytelling of Alan Moore and the watercolor sketches of Mary Blair to the soulful grooves of Erykah Badu and the
    lo‑fi beats of J Dilla, often rehearses acoustic guitar riffs beside their sketchbook while they listen to classic jazz like Miles Davis, and channel that mix into short video essays that blend visual
    art and indie comics commentary.
  travel: Stephen Onen prefers spontaneous weekend getaways, having taken a modest road trip to the Great Smoky Mountains to capture sunrise mist over the forest, while dreaming of a DIY train journey through
    the Pacific Northwest to Portland’s vibrant art districts, all on a shoestring budget that limits trips to places within a few hours’ drive from Madison County.
  culinary: Stephen Onen favors simple, flavor‑forward meals like avocado toast with smoked paprika, homemade chickpea tikka masala, and seasonal apple‑cinnamon crumble, cooks at a beginner‑intermediate
    level using a trusted cast‑iron skillet and a well‑worn rosemary plant from the garden, and often pairs meals with lo‑fi playlists or classic vinyl jazz records.
  core: Stephen Onen, a quietly observant dreamer, channels restless curiosity and occasional disorganization into heartfelt sketches, indie playlists, and community art projects, all while battling a knot
    of anxiety that fuels both their empathy and endless worry.
background:
  cultural: Stephen’s family roots trace back to the Great Migration, with his grandparents originally from the Mississippi Delta and his parents relocating to Chicago before settling in Worden, Illinois.
    Growing up in a predominantly white rural town, he navigated a dual cultural identity shaped by African‑American church traditions, gospel music, and storytelling passed down through his family, alongside
    the Midwestern values of self‑reliance and community solidarity. These influences fostered his appreciation for black artistic heritage—such as jazz, blues, and mural art—while also encouraging him
    to engage with the broader local culture through volunteering, neighborhood gatherings, and shared meals that feature Southern-inspired cooking. His experience of being one of the few black teens in
    his area heightened his sensitivity to social dynamics, prompting a deep empathy for marginalized voices and a desire to amplify them through art.
attributes:
  skills: '[''Digital illustration (Procreate, Photoshop)'', ''Photography (portrait and street)'', ''Video editing (Adobe Premiere)'', ''Basic HTML/CSS web design'', ''Acoustic guitar and songwriting'',
