  hobbies: '["Visiting art museums and galleries", "Sketching and watercolor painting", "Photography (street and nature)", "Reading non-fiction (philosophy, psychology, science)", "Practicing yoga and meditation",
    "Hiking the Blue Ridge Mountains", "Exploring specialty coffee shops", "Playing acoustic guitar", "Attending live music and experimental theater", "Journaling for self‑reflection"]'
  career_goals: David aspires to open his own boutique wellness studio in Fairfax where massage, art therapy, and guided meditation intersect. Over the next two years he plans to earn certification in Clinical
    Myofascial Release and a certificate in Integrative Health Coaching. He hopes to develop workshops that blend tactile therapy with creative expression, and eventually teach part‑time at a community
    college. While building a steady client base that values his flexible scheduling, he also aims to improve his organizational habits to reduce personal stress and enhance professional reliability.
