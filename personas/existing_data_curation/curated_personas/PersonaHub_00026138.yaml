persona_description: A public health professional dedicated to improving the well-being of children and families through the prevention and treatment of childhood trauma. They are passionate about integrating
  medical, behavioral health, and social services to create a more holistic system of care that addresses the root causes of childhood adversity. They are skilled in screening for Adverse Childhood Experiences
  (ACEs), offering interventions to support parents' efforts to improve their own resilience, and educating medical and FRC staff about ACEs science. They are part of the Resilient Santa Barbara County
  movement and are backed by First 5, Cottage Health, and the Bower Foundation.
