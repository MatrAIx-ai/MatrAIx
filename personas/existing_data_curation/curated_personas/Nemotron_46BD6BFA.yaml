  hobbies: '[''gardening (seasonal perennials)'', ''traditional Japanese cooking'', ''historical fiction reading'', ''crossword puzzles'', ''quilting and knitting'', ''calligraphy'', ''small book club participation'',
    ''volunteering for library storytime'', ''cultural association activities'']'
  career_goals: Although retired, Takako aims to stay actively engaged by mentoring younger volunteers at the Green Bay senior center, documenting her family's migration story in a memoir to preserve cultural
    heritage, and expanding the community garden to foster intergenerational exchange. She also plans to deepen her digital skills through a local senior‑focused computer class, enabling her to create an
    online archive of family recipes and photographs that can be shared with relatives in Japan and beyond.
