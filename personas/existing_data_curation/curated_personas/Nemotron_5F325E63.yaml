personas:
  professional: Sarah Angel is a seasoned construction laborer with expertise in concrete pouring, formwork, heavy equipment operation and blueprint interpretation, who leverages their curiosity and artistic
    eye to craft decorative concrete finishes while using Procore and PlanGrid to keep projects on schedule and on budget, all while pursuing a foreman role, a Certified Construction Manager credential,
    and a future eco‑focused renovation business.
  sports: Sarah Angel hits the nearby Kiener Trails for weekend hikes, cycles year‑round with the St. Louis Cycling Club, plays pickup basketball at the St. Peters community center in summer, and avidly
    follows the St. Louis Cardinals and St. Louis Blues, balancing an intense love of outdoor endurance with a competitive spirit on the court.
  arts: Sarah Angel spends Saturday mornings watercoloring scenes from the St. Louis Art Museum’s modern wing, captures urban murals in the Loop with a Leica M camera, draws inspiration from artists like
    Claude Monet, Edward Hopper, and contemporary street artist Banksy, and winds down listening to ambient composer Ólafur Arnalds while planning decorative concrete motifs for upcoming remodels.
  travel: Sarah Angel prefers short, meticulously planned road trips that blend design excursions and nature, having explored the sustainable housing district of Portland, Oregon, the historic architecture
    of Savannah, Georgia, and the hiking trails of Sedona, Arizona, while dreaming of a future study tour of Copenhagen’s eco‑friendly neighborhoods, all balanced by limited time and a modest travel budget.
  culinary: Sarah Angel, an intermediate home chef, delights in cooking multicultural dishes like Thai green curry, Moroccan chickpea tagine, and Korean bibimbap, often using garden‑fresh herbs such as
    lemongrass, cilantro, and rosemary, and they routinely host dinner parties where they experiment with fusion plating while pairing meals with locally sourced craft beer.
  core: Sarah Angel blends hard‑hat practicality with a watercolor‑colored imagination, treating each construction site as a canvas, fiercely competitive yet flexibly creative, and never shies away from
    a midnight paint session after a day's labor.
background:
  cultural: Sarah grew up in Saint Peters, Missouri, a suburban Midwestern community that values hard work, family, and neighborly involvement. While she identifies as white, her middle name Suyapa reflects
    her family’s Central American (Honduran) heritage, and she was raised bilingual in English and Spanish. She celebrates both traditional American holidays and Hispanic festivals, often attending local
    Cinco de Mayo events and church gatherings. The blend of Midwestern pragmatism and Latin warmth informs her practical outlook, community spirit, and appreciation for diverse artistic expressions.
attributes:
  skills: '["Concrete pouring and finishing", "Formwork construction and removal", "Blueprint reading and layout planning", "Heavy equipment operation (forklift, backhoe)", "Site safety inspections and
    OSHA compliance", "Quality control and material testing", "Basic carpentry and framing", "Soil compaction and grading", "Construction project coordination software (Procore, PlanGrid)", "First‑aid and
    CPR certification", "Cost estimation basics", "Problem solving and improvisation"]'
  hobbies: '["Watercolor painting", "Urban photography", "DIY home‑renovation projects", "Woodworking", "Hiking and cycling", "Gardening", "Visiting local art galleries and museums", "Reading architecture
    and sustainable design literature", "Volunteer work with Habitat for Humanity", "Playing board games with friends", "Cooking multicultural dishes"]'
  career_goals: Sarah aims to advance from laborer to foreman within the next three years, pursuing a Certified Construction Manager (CCM) credential and a crane‑operator license to broaden her technical
    qualifications. She plans to complete a bachelor’s degree in Construction Management part‑time, positioning herself for a site‑supervisor role. Ultimately, she envisions launching a small, eco‑focused
    renovation business that blends her construction expertise with artistic concrete and custom finish work, allowing her to bring creative design concepts to residential projects in the St. Peters area.
