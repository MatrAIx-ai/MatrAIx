  career_goals: Pedro aims to pursue a post‑secondary program in digital media, graphic design, or communications, with the goal of becoming a multimedia content creator or marketing specialist. He wants
    to build a personal brand that showcases Mexican‑American culture, using video and photography to tell stories. In the longer term, he hopes to work for a creative agency in Las Vegas or launch his
    own freelance studio, where he can lead projects and gain industry recognition.
