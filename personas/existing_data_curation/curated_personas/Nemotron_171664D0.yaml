  hobbies: '[''Yoga'', ''Reading contemporary African-American literature'', ''Listening to R&B and soul music'', ''Cooking Southern-inspired dishes'', ''Volunteering at community center'', ''Journaling'',
    ''Attending local book club'', ''DIY hair accessory crafting'', ''Exploring local art festivals'']'
  career_goals: Her career ambition is to transition from working in a busy salon to owning a boutique salon that specializes in natural and textured hair care. Over the next three years, she plans to obtain
    advanced certification in color and texture, develop a line of curated hair care products, and build a loyal client base through dependable service and community outreach. She also aims to mentor junior
    stylists, offering workshops that combine practical technique with her humanities background to foster storytelling through personal style. Ultimately, she hopes to create a space that reflects her
    values of routine, reliability, and empowerment while establishing a sustainable business model.
