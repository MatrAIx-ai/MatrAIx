personas:
  professional: Naja Thomas is a meticulous hairdresser who combines precision cutting, advanced coloring, and curly‑hair management with an almost ritualistic appointment workflow, ensuring every client
    receives a thorough scalp assessment, a documented consultation, and a spotless workstation; they leverage strong product knowledge and inventory control to run the salon efficiently while planning
    to transition into a boutique space that celebrates natural textures and storytelling through style.
  sports: Naja Thomas follows the Atlanta Hawks and Atlanta Falcons, plays pickup basketball at the community center on weekends, and is a regular member of the Morning Flow Yoga Collective where they practice
    twice‑weekly Vinyasa sessions to keep flexibility and counteract the physical strain of styling; they also run in the local ‘Run for Rhythm’ 5K club every spring.
  arts: Naja Thomas immerses in creative expression through listening to classic R&B, soul, and neo‑soul artists such as Erykah Badu, D'Angelo, and Leon Bridges while styling, and they frequently discuss
    contemporary literature and poetry—ranging from Colson Whitehead to Roxane Gay—in their book club, which fuels their storytelling approach to hair design.
  travel: Naja Thomas favors weekend road trips to Southern cities like Savannah and New Orleans for culinary inspiration, but dreams of a wellness retreat in Bali’s rice‑field villas and a cultural immersion
    in Marrakech’s souks; they plan each journey with a detailed itinerary, balancing budget constraints with a desire for authentic experiences.
  culinary: Naja Thomas loves cooking Southern‑inspired dishes, regularly preparing shrimp and grits with a dash of Cajun seasoning, collard greens sautéed with smoked turkey, and sweet‑potato biscuits
    topped with honey butter; their kitchen skill is intermediate, and they source fresh okra, buttermilk, and locally roasted coffee to elevate every meal.
  core: Naja Thomas is a routine‑driven stylist who balances meticulous business habits with creative flair, invests wisely for a boutique future, vigilantly manages mild health issues, and channels storytelling
    through music, literature, and Southern cooking.
background:
  cultural: Naja identifies as African‑American, raised in Fort Pierce where the coastal community blends Southern Florida culture with a vibrant African‑Diaspora presence. Her family traditions are rooted
    in church gatherings, gospel music, and communal celebrations that emphasize togetherness and respect for elders. Growing up, she was influenced by the rich hair care heritage of Black women in her
    neighborhood, witnessing the artistry of natural hair styling at family events. She embraces the cultural values of resilience, storytelling, and community support, which shape both her personal life
    and professional ethos.
attributes:
  skills: '[''Precision hair cutting'', ''Balayage and ombre coloring'', ''Curly hair management'', ''Protective styling'', ''Scalp health assessment'', ''Client consultation'', ''Sanitation and hygiene
