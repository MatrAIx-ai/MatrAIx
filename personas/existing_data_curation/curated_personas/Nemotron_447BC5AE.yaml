personas:
  professional: Patrick Hunter, a 36‑year‑old methodical kitchen specialist, leverages meticulous HACCP record‑keeping, precise knife work, and systematic inventory control to ensure safety and consistency
    while mentoring staff, aiming to ascend to a Kitchen Manager role where they can institutionalize structured processes.
  sports: Patrick Hunter participates in early‑morning river runs with the Mississippi River Runners club, competes in local bayou fishing tournaments, follows the New Orleans Saints and Pelicans, and incorporates
    weekly strength‑training at a small gym to support their competitive edge.
  arts: Patrick Hunter enjoys intimate jazz evenings at venues like the Snug Corner, collects recordings of Miles Davis and John Coltrane, devours classic mystery novels by Agatha Christie, and finds solace
    in the structured improvisation of music as a counterbalance to their methodical daily routine.
  travel: Patrick Hunter prefers meticulously planned short getaways to riverine destinations—such as a weekend fly‑fishing trip to the Ozarks, a culinary history tour of New Orleans’ French Quarter, or
    a quiet retreat in Asheville—balancing their limited free time with budget constraints and a desire for controlled environments.
  culinary: Patrick Hunter’s culinary passion centers on precise Cajun and Creole dishes—like gumbo, jambalaya, and crawfish étouffée—where they scale recipes to the gram, employ exact knife cuts, and source
    local ingredients such as andouille sausage, okra, and filé powder, treating each plate as a carefully timed experiment.
  core: Patrick Hunter, a 36‑year‑old detail‑driven food professional, channels anxiety into regimented runs, fishing contests, and exacting kitchen rituals, while obsessively tracking budgets, health metrics,
    and crossword puzzles, all of which they pursue in pursuit of predictable mastery.
background:
  cultural: Patrick is a white Southern American who grew up in New Orleans, absorbing the city's unique blend of Southern hospitality, Creole and Cajun culinary traditions, and a vibrant music scene. His
    family background is rooted in the broader American Midwest, but his formative years in the French Quarter exposed him to the multilingual, multicultural atmosphere of the city. While he maintains a
    pragmatic, working‑class outlook shaped by his high‑school education and kitchen work, he also respects the local customs—seasonal festivals, regional dishes, and community gatherings—though he prefers
    them in smaller, more manageable settings.
attributes:
  skills: '[''Food safety compliance (HACCP)'', ''Knife handling and precision cuts'', ''Portion control and recipe scaling'', ''Inventory management and ordering'', ''Shift scheduling and staff coordination'',
    ''Sanitation documentation and record keeping'', ''Equipment maintenance and troubleshooting'', "Knowledge of Cajun and Creole ingredients", ''Kitchen POS system operation'', ''Training new kitchen
    staff'']'
  hobbies: '[''Morning river runs'', ''Bayou fishing and angling contests'', ''Woodworking small projects'', ''Reading culinary history and self‑help'', ''Daily journaling'', ''Crossword puzzles'', ''Intimate
    jazz sessions'']'
  career_goals: Patrick aims to move into a supervisory role such as Kitchen Manager or Head Chef at a reputable New Orleans restaurant where he can institutionalize systematic processes and maintain a
    predictable schedule. He plans to earn a ServSafe Manager certification and eventually complete a short culinary management course to bolster his credentials. Long‑term, he dreams of launching a small,
    highly organized catering service that offers structured, pre‑planned menus for corporate clients, allowing him to apply his love of detail while providing a stable, predictable income. He also seeks
    to develop coping strategies for his intense anxiety, hoping to become a calm, resilient leader in the kitchen.
