personas:
  professional: Kenny Moore, a seasoned handyman and community volunteer in Kona, combines his practical carpentry, plumbing, and boat‑maintenance expertise with a natural flair for organizing senior‑center
    events, using his calm, routine‑loving nature to keep projects on track while fostering a welcoming, collaborative atmosphere.
  sports: Kenny Moore enjoys the rhythmic pull of early‑morning surf fishing off Kailua‑Kona harbor, joins the local senior softball league, roots for the Hawaii Rainbow Warriors football team, and tends
    his garden as a gentle form of exercise, balancing active outings with relaxed beach clean‑up duties.
  arts: Kenny Moore participates in the Kona Senior Social Club’s weekly ukulele jam sessions, delights in storytelling evenings where he shares island anecdotes, regularly attends performances by the local
    hula troupe “Hula ‘Ohana,” and counts Israel Kamakawiwoʻole and Jack Johnson among his favorite artists.
  travel: Kenny Moore favors low‑key island getaways, planning occasional trips to Maui’s Hana Road and the Big Island’s Hilo side, prefers driving his modest car over flying, and often combines travel
    with family visits, appreciating relaxed itineraries over packed schedules.
  culinary: Kenny Moore loves cooking kalua pork and poi for potluck feasts, tend to his garden’s hibiscus and papaya for fresh garnish, is a modest home chef who enjoys brewing dark Kona coffee, and occasionally
    indulges in shave‑ice topped with li hing mui for a sweet treat.
  core: Kenny Moore is a calm, routine‑driven elder who blends practical handyman skills with a love for community music, gardening, and storytelling, all while occasionally misplacing bills and skipping
    check‑ups.
background:
  cultural: Kenny was raised in a white, mainland American family and moved to Hawaii in the early 1960s, drawn by the islands' natural beauty and slower pace of life. Over the decades, he has integrated
    deeply into the local community, embracing the aloha spirit and participating in Hawaiian traditions such as communal feasts, local festivals, and respect for the land. While his cultural roots remain
    rooted in his mainland upbringing, his daily life reflects a blended identity that honors both his heritage and the rich, multicultural tapestry of Kailua‑Kona.
