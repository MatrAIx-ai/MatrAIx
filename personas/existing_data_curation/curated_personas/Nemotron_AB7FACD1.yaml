personas:
  professional: Olinda Lopez, an aspiring robotics engineer in middle school, blends her love for building intricate LEGO creations with coding simple Scratch games, and they apply methodical planning and
    a skeptical eye to troubleshoot robot challenges before school competitions.
  sports: Olinda Lopez, a member of their school’s soccer team in the fall and a beginner swimmer during summer months, mixes their competitive streak with disciplined practice routines, cheers for the
    Phoenix Suns and Arizona Diamondbacks, and they also participate in the local chess club’s strategic tournaments as a mental sport.
  arts: Olinda Lopez, inspired by sci‑fi illustrations and the fluid strokes of calligraphy, spends evenings perfecting brush lettering and devouring works by Isaac Asimov and manga artist Naoko Takeuchi,
    regularly watches animated films by Hayao Miyazaki, listens to the music of Imagine Dragons, and they let those creative influences shape their own story‑telling sketches.
  travel: Olinda Lopez, after a road‑trip to their grandparents’ house in Tucson for a Día de los Muertos celebration and a school field trip to the Grand Canyon, dreams of exploring the historic streets
    of Oaxaca and the bustling markets of Mexico City, while also planning a future summer visit to Disneyland in Anaheim for a blend of adventure and cultural immersion, and they feel the pull of both
    new horizons and familiar traditions.
  culinary: Olinda Lopez, who proudly assists in preparing tamales and pozole during holiday gatherings, has mastered the art of grinding fresh corn masa by hand, loves experimenting with salsa verde using
    roasted tomatillos, occasionally bakes chocolate chip cookies after school, though they often forget to set a timer and burn the edges, and they relish the sense of community that comes from sharing
    these dishes with family.
  core: Olinda Lopez is a methodical, curiosity‑driven 11‑year‑old who balances a love for robotics and traditional cooking with a competitive edge, steady composure, and they have a penchant for solitary
    puzzle‑solving.
background:
  cultural: Olinda grew up in a bilingual Mexican‑American household in Phoenix, where Spanish is spoken alongside English. Her family celebrates Mexican traditions such as Día de los Muertos, quinceañera
    preparations, and holiday cooking of tamales and pozole. Community ties to the vibrant Mexican diaspora in Arizona provide her with a strong sense of cultural identity, while also exposing her to the
    diverse urban environment of Phoenix.
