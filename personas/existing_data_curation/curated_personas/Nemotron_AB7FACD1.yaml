  career_goals: Olinda aspires to become a biomedical engineer, aiming to design medical devices that integrate engineering principles with healthcare needs. She also envisions studying computer science
    to create educational technology that makes learning STEM accessible to peers. Her long‑term ambition is to contribute practical, innovative solutions that improve community health.
