    safety & handling compliance"]'
  hobbies: '["painting (Mexican folk motifs)", "cooking traditional Mexican meals & recipe experimentation", "salsa and folkloric dancing", "hiking & nature photography", "community theatre acting", "pottery
    & ceramic crafting", "embroidery & DIY decorative crafts", "balcony herb gardening", "reading on permaculture and sustainable food systems", "online art and craft workshops"]'
  career_goals: Maria’s ambition is to turn her hands‑on farming background into a sustainable, community‑focused enterprise. She plans to earn a certification in organic horticulture within the next two
    years and expand her current plot into a small‑scale Community Supported Agriculture (CSA) program that supplies fresh produce to neighborhoods in Colorado Springs. Maria also envisions creating a cooperative
    marketplace where fellow Latino farmers can sell their goods and host monthly cultural food and art events that celebrate Mexican heritage. In the longer term, she hopes to launch a farm‑to‑table pop‑up
    restaurant or catering service that showcases traditional Mexican dishes made from ingredients she grows herself. Alongside these goals, Maria wants to continue learning innovative farming techniques,
    improve her business management skills, and mentor other young women interested in agriculture.
