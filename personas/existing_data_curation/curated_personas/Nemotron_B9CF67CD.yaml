personas:
  professional: Carla Jordan, a seasoned construction laborer with an associate's degree in construction technology, excels at concrete forming, framing, and heavy equipment operation, and leverages their
    methodical, organized nature and OSHA‑30 safety expertise to mentor new crew members and foster a low‑conflict, safety‑first work environment, and they are positioning themselves for a foreperson role
    within five years.
  sports: Carla Jordan enjoys low‑impact fitness through weekly nature walks in Rock Creek Park, participates in a local adult recreational softball league called the DC Lady Packers, follows the Washington
    Capitals and DC United for a dose of professional sports excitement, and they prefer cheering from home over attending games.
  arts: Carla Jordan finds creative release in a weekly quilting circle inspired by the intricate patterns of Maria Martinez and listens to classic rock icons like Led Zeppelin and The Eagles while baking,
    weaving a blend of tactile and auditory art that enriches their weekend routine, and they often hum the melodies while trimming garden herbs.
  travel: Carla Jordan prefers meticulously planned road trips, having driven the Blue Ridge Parkway in autumn to explore Asheville’s crafts market, and dreams of a summer visit to Quebec City’s historic
    district, but they balance wanderlust with budget constraints by opting for budget‑friendly bed‑and‑breakfast stays and packing garden produce for meals.
  culinary: Carla Jordan, an avid home baker, regularly prepares her family’s signature apple pie and rosemary‑infused focaccia using garden‑fresh tomatoes and herbs, boasts an intermediate skill level
    that shines in weekend baking marathons, yet they occasionally over‑salt the vegetable stew when distracted by the podcast playing in the background.
  core: Carla Jordan blends a methodical work ethic with a compassionate heart, obsessively tracks budgets and blueprints alike, worries about the smallest setbacks, and can be found humming classic rock
    while tending a garden or perfecting a quilt.
background:
  cultural: Carla comes from a white, middle‑class American background with European ancestry. Raised in suburban Montgomery County, she grew up in a family that valued hard work, practicality, and community
    involvement. Her cultural upbringing emphasizes loyalty to family, participation in local church traditions, and a respect for routine and reliability in both personal and professional life.
attributes:
  skills: '[''Concrete forming and finishing'', ''Framing and carpentry'', ''Drywall installation'', ''Heavy equipment operation (forklift, backhoe)'', ''OSHA 30‑hour certified'', ''First aid/CPR certified'',
    ''Blueprint reading'', ''Material inventory management'', ''Site safety coordination'', ''Mentoring and conflict resolution'']'
  hobbies: '[''Gardening'', ''DIY home improvement'', ''Baking'', ''Volunteer work (Habitat for Humanity, food bank)'', ''Nature walks/hiking'', ''Quilting'', ''Attending church community events'', ''Listening
    to classic rock music'']'
  career_goals: Carla aims to advance to a foreperson or site supervisor role within the next five years, leveraging her reliability and safety expertise. She plans to obtain a Project Management Professional
    (PMP) certification to transition into residential project management. Long‑term, she dreams of starting a small subcontracting business focused on high‑quality home renovations, while continuing to
    mentor younger workers and lead community‑based construction volunteer projects.
