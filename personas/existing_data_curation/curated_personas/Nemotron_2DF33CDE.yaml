    for restaurant ambience'']'
  career_goals: Felicita aims to advance from managing a single location to overseeing multiple venues as a regional operations manager within the next five years, while simultaneously pursuing a certificate
    in culinary arts to deepen her technical cooking skills. Her long‑term ambition is to open her own boutique restaurant in Los Angeles that fuses contemporary Mexican flavors with an immersive artistic
    environment—pop‑up installations, rotating gallery evenings, and collaborative menus with local artists. She also hopes to mentor emerging hospitality professionals, particularly women from the Mexican‑American
    community, and to develop a community outreach program that teaches cooking and nutrition through culturally relevant workshops.
