personas:
  professional: Felicita Rodriguez, a 32‑year‑old restaurant operations manager who blends data‑driven cost control with a vivid artistic vision, using bilingual storytelling and seasonal menu design to
    turn each service shift into a curated cultural experience while mentoring a high‑performing team.
  sports: Felicita Rodriguez, an energetic 32‑year‑old who channels competitive spirit into weekend intramural futsal with the Los Angeles Cardenales, follows LAFC passionately, practices salsa and cumbia
    for cardio, and unrolls a yoga mat each morning to balance high‑energy dancing with mindfulness.
  arts: Felicita Rodriguez, an avid visitor of contemporary galleries who collects watercolors inspired by artists like Kerry James Marshall and Frida Kahlo, curates eclectic playlists featuring Los Lobos,
    Café Tacvba, and indie‑rock band Phoebe Bridgers for her restaurant ambience, and captures every new dish on Instagram with a keen eye for composition.
  travel: Felicita Rodriguez, a travel‑enthusiast who blends structured research trips to Oaxaca’s mezcal distilleries and Veracruz’s coastal cooking schools with spontaneous weekend getaways to Big Bear
    for hiking, and dreams of a design‑focused escape to Barcelona’s modernist architecture for menu inspiration.
  culinary: Felicita Rodriguez, a culinary experimentalist who fuses mole‑infused ramen, tamale‑filled carbonara, and chilaquiles with avocado‑lime crema, enjoys sourcing huitlacoche, epazote, and fresh
    nopales at local farmers’ markets, and takes pride in plating dishes that look like miniature paintings while documenting each creation through food photography.
  core: Felicita Rodriguez, a talkative, art‑driven restaurateur who balances competitive ambition with community storytelling, often juggling spreadsheets, sketchpads, and salsa steps in the same day.
background:
  cultural: Felicita was born and raised in La Mirada, a suburb of Los Angeles with a vibrant Mexican‑American community. Her parents immigrated from Michoacán and Veracruz, bringing with them traditions
    such as Día de los Muertos, tamales, and the art of storytelling through food. Growing up bilingual, she spoke Spanish with her grandparents while attending English‑medium schools. Her cultural identity
    blends the rich regional flavors of Mexico with the eclectic, multicultural tapestry of Southern California, shaping both her personal aesthetic and professional approach to hospitality.
