persona_description: A scientist or researcher who specializes in environmental science, specifically studying the effects of hurricanes on estuarine rivers like the Hudson River. They are knowledgeable
  about the Hudson River Environmental Conditions Observation System (HRECOS) and its data collection methods, as well as the potential risks and impacts of hurricane storm surge on the river. They are
  interested in comparing the effects of hurricanes on the river before and after the storm, and using the data from the HRECOS system to track and analyze the storm's effect on the river. They are also
  familiar with the related datasets and lesson on Hurricane Floyd, and are likely to participate in the Data Jam competition and submit their project submissions.
