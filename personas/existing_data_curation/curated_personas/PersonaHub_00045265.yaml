persona_description: A historian or archaeologist who specializes in the study of prehistoric and early medieval settlements, with a particular focus on the social and chronological relationships between
  complex Atlantic roundhouses and wheelhouses, dating and role of promontory forts, and the diversity of prehistoric building and settlement form in various regions such as East Lothian, Argyll, and South-west
  Scotland. The person is interested in understanding the complexities of prehistoric settlement development and the potential for extracting information on overall settlement sequences at a broad-brush
  level in areas where the sites are being abraded year on year. They are likely to be cautious in interpreting diversity of the scale and design of settlement as an indicator of social structure and settlement
  hierarchy and would appreciate a nuanced research framework based upon a range of recent programmes of investigation. They are also interested in the potential for using sampling and dating large numbers
  of sites to characterise sequences in regions that sit between better understood areas.
