personas:
  professional: Santiago Gonzalez is a meticulous interior painter and paperhanger whose expertise in low‑VOC finishes, precise wallpaper installation, and color theory, combined with a curious eye for
    unconventional techniques, enables them to deliver high‑end historic‑home restorations while preserving a solitary, focused work rhythm that satisfies their preference for quiet productivity.
  sports: Santiago Gonzalez favors solitary hikes in the Angeles National Forest with the local Angeles Hiking Collective, while cheering the Los Angeles Lakers, Dodgers, and Rams, and supplements their
    rugged trekking with beginner yoga sessions that provide gentle stretching for their back.
  arts: Santiago Gonzalez immerses themselves in sketching and watercolor studies inspired by Baroque masters like Velázquez and Goya, attends contemporary gallery openings to track emerging trends, and
    finds solace in listening to classical guitar and flamenco recordings by Paco de Lucía, weaving these influences into their own artistic practice.
  travel: Santiago Gonzalez prefers meticulously planned solo trips that blend art‑focused itineraries—such as past visits to Barcelona’s Picasso Museum and a yearning to explore Seville’s Alcázar—while
    balancing a modest travel budget that prioritizes affordable boutique hotels and occasional cultural workshops, making relaxation and creative inspiration the core of their voyages.
  culinary: Santiago Gonzalez enjoys crafting paella with saffron‑infused bomba rice, shrimp, chorizo, and peas, and simmering a chilled gazpacho featuring ripe tomatoes, cucumber, and sherry vinegar, showcasing
    intermediate culinary skill that blends meticulous recipe adherence with occasional improvisational flair in the kitchen.
  core: Santiago Gonzalez balances a quiet, detail‑driven craftsmanship with a restless artistic curiosity, yet their chronic worry and penchant for over‑tracking expenses often shadow their pursuit of
    creative autonomy.
background:
  cultural: Santiago is a first-generation American of Spanish descent; his parents emigrated from Andalusia and raised him bilingual in Spanish and English. Family gatherings feature traditional dishes
    like tapas and paella, and he observes holidays such as Día de los Reyes and Semana Santa, which keep him connected to his heritage. The vibrant Latino community of Los Angeles County, combined with
    his exposure to Mediterranean art and architecture, has shaped his aesthetic sensibilities and his appreciation for color and texture. While he respects the Catholic traditions of his upbringing, he
    identifies primarily as culturally Spanish rather than religious. This blend of Spanish cultural values and Californian multicultural influences informs both his personal life and his professional design
    choices.
