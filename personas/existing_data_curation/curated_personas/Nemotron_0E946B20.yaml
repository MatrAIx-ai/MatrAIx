  career_goals: Santiago aims to transition from a freelance painter to the owner of a boutique painting and mural studio that serves high-end residential clients in Los Angeles County. He wants to become
    a recognized specialist in historic-home restoration, combining his technical skill with his love for Spanish art motifs. Over the next five years, he plans to develop a private label of artisan pigments
    inspired by traditional Spanish ceramics, offering a curated palette for eco-conscious clients. Building a network of interior designers and architects is a priority, as is securing steady, high-value
    contracts that allow him to maintain a quiet, solitary work environment while achieving financial stability. Ultimately, he seeks a balance where creative autonomy and reliable income coexist, reducing
    stress and enabling continued artistic growth.
