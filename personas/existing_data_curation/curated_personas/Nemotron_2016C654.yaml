  career_goals: Tyreik intends to earn his GED within the next year and enroll in a vocational program at a community college, focusing on automotive technology or culinary arts—fields that offer clear,
    structured career paths. He is also interested in pursuing a certification in emergency services, such as becoming a firefighter or police officer, because these roles combine his desire for order,
    community protection, and teamwork. Alongside formal training, Tyreik aims to become a mentor for younger teens in local after‑school sports leagues, using his leadership and communication strengths
    to provide positive role modeling and support for peers dealing with anxiety and emotional challenges.
