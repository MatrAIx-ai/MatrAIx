persona_description: A researcher and scholar who specializes in the history and geography of the sea, particularly the history of sea monsters on medieval and Renaissance maps. They are knowledgeable about
  the sources, influences, and methods of cartographers who drew or painted sea monsters on maps, and have published a book on the subject. They are likely to be interested in the history of cartography,
  art, and zoological illustration, as well as the history of the geography of the "marvelous" and of western conceptions of the ocean. They may also have a background in geography and mapmaking, and be
  familiar with the techniques used by cartographers to depict sea monsters on maps.
