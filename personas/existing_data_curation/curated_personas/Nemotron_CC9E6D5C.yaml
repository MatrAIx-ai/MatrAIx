  hobbies: '["Woodworking", "Vintage Radio Restoration", "Gardening", "Birdwatching", "Reading Historical Non-Fiction", "Chess", "Fishing", "Genealogy Research", "Volunteering at the Local Library"]'
  career_goals: Alexander aims to preserve and share the cultural heritage of his region by recording oral histories of longtime residents, compiling a detailed family genealogy, and creating a modest exhibition
    for the local historical society. He also aspires to mentor his grandchildren and interested youths in woodworking, home repair, and practical self‑reliance skills, while continuing to maintain his
    homestead as an exemplar of sustainable, independent living. Volunteering at the community library to help others navigate historical records is another long‑term ambition.
