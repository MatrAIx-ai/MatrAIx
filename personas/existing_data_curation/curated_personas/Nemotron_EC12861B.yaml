  career_goals: Donya plans to complete her bachelor’s degree in visual arts or graphic design within the next two years, building a professional portfolio that showcases her experimental style. In the
    short term she hopes to secure a junior graphic designer position at an innovative agency in Austin or begin freelancing for local businesses, allowing her to apply her creative concepts in real‑world
    projects. Long‑term she aspires to launch her own creative studio that offers design services and community art workshops, specifically targeting and empowering young Black artists in Central Texas.
    She is also open to pursuing further studies in UX design or media arts and using her artistic voice to raise awareness for social‑justice issues.
