personas:
  professional: Donya Black, an emerging graphic designer in Austin, fuses a vivid abstract aesthetic with meticulous project coordination, leveraging their analytical curiosity and competitive edge to
    deliver bold visual concepts for local startups while constantly questioning client briefs to ensure authenticity and social relevance.
  sports: Donya Black, a fervent supporter of Austin FC and the Texas Longhorns, channels their competitive energy into weekly hip‑hop dance classes and spontaneous pick‑up basketball games at local courts,
    prioritizing dynamic movement over regimented training while staying socially connected through team fan gatherings.
  arts: Donya Black, a vibrant muralist and digital illustrator, draws inspiration from street‑art innovators like Shepard Fairey and the surreal palettes of Yayoi Kusama, regularly curating installations
    at Austin’s contemporary galleries and performing live painting sessions at indie music venues, blending experimental techniques with community‑focused narratives.
  travel: Donya Black, an adventure‑seeking art aficionado, has backpacked through New Orleans to absorb its jazz‑laden streets, explored Berlin’s avant‑garde galleries on a student‑exchange budget, and
    dreams of a Southwest road‑trip tracing desert murals, always planning trips around affordable hostels, local art events, and spontaneous detours.
  culinary: Donya Black, an experimental home cook, reimagines classic soul‑food staples like collard greens and cornbread by infusing miso‑glazed tofu, smoked paprika, and unexpected herbs, pairing each
    dish with curated playlists that blend jazz, R&B, and Afro‑futurist soundscapes, though they sometimes over‑season in their enthusiasm for bold flavors.
  core: Donya Black channels boundless curiosity, competitive drive, and sociable energy into a kaleidoscopic lifestyle that merges daring art, strategic financial risks, and community‑focused activism
    while navigating occasional anxiety and a penchant for spontaneous culinary experiments.
background:
  cultural: Donya is a second‑generation African‑American raised in Seguin, Texas. Her family maintains strong ties to Black cultural traditions, celebrating Juneteenth, Black History Month, and keeping
    alive oral storytelling and soulful cooking. She was raised attending a historically Black church that emphasized community service and gospel music, which continues to shape her artistic sensibility.
    Donya draws inspiration from African‑American visual artists, hip‑hop culture, and contemporary Afro‑futurist literature, while also embracing her Texas roots and the multicultural community around
    her. Her perspective is shaped by a desire to highlight Black experiences in her creative work and to contribute to cultural dialogue within her local community.
