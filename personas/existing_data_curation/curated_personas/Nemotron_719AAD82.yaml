personas:
  professional: Miriam Carey, an analytical finance professional, leverages advanced Excel, financial modeling, and data visualization to produce precise forecasts while championing collaborative stakeholder
    communication, and uses their detail-oriented mindset to embed streamlined processes that reduce team stress.
  sports: Miriam Carey enjoys cheering on the Washington Commanders and the Washington Capitals, participates in a local community center's co-ed softball league, and incorporates weekly yoga sessions as
    their primary fitness routine.
  arts: Miriam Carey finds solace in jazz and R&B, regularly streaming Miles Davis, Anita Baker, and newer soulful artists like H.E.R., while attending live performances at The Kennedy Center and supporting
    local spoken-word poetry nights that echo the storytelling traditions of their family gatherings.
  travel: Miriam Carey plans trips with a spreadsheet, favoring budget-friendly weekend getaways to Asheville's Blue Ridge trails and historical sites like Selma, while dreaming of a culturally immersive
    tour of Ghana's coastal villages once their financial literacy workshops secure enough funding.
  culinary: Miriam Carey excels at preparing Southern comfort dishes such as collard greens with smoked turkey, shrimp and grits, and sweet potato pie, often seasoning with smoked paprika and using fresh
    okra, and delights friends with potluck evenings that blend heritage flavors with modern twists.
  core: Miriam Carey balances precise financial analysis with a community-centric heart, managing anxiety through yoga, indulging in jazz, and meticulously planning budget-friendly adventures while occasionally
    over-committing to volunteer work.
background:
  cultural: Miriam identifies as African American and was raised in a close‑knit family in Virginia steeped in Southern Black cultural traditions. Her upbringing emphasized community, church involvement,
    and storytelling about the civil‑rights movement, fostering a strong sense of resilience and social responsibility. She celebrates cultural milestones such as Juneteenth and cherishes family gatherings
    that feature soul food, gospel, and R&B music. These experiences have shaped her commitment to financial empowerment and equity, motivating her to address systemic barriers in the finance sector. Miriam’s
    cultural heritage informs her courteous, hospitable demeanor and her dedication to supporting her community through education and mentorship.
attributes:
  skills: '[''Financial analysis'', ''Budget preparation'', ''Forecasting'', ''Advanced Excel'', ''Financial modeling'', ''Data visualization'', ''Regulatory compliance'', ''Risk assessment'', ''Variance
    analysis'', ''Process improvement'', ''Stakeholder communication'', ''Team collaboration'', ''Conflict resolution'', ''Attention to detail'']'
  hobbies: '[''Yoga'', ''Meditation'', ''Puzzle solving (Sudoku, crosswords)'', ''Cooking (Southern and African‑American cuisine)'', ''Reading (personal finance & self‑help)'', ''Volunteer financial literacy
    workshops'', ''Listening to jazz and R&B music'', ''Walking in nature trails'', ''Knitting'']'
  career_goals: Miriam aims to solidify her professional foundation by completing her bachelor's degree in finance and earning CPA certification within the next two years. She envisions progressing to a
    senior financial manager role, eventually becoming a director of finance or CFO for a regional organization. Parallel to her corporate aspirations, she is passionate about advancing financial literacy
    in the Black community of Spotsylvania, planning to launch a series of workshops and partner with a local CDFI. Miriam also intends to pursue an MBA to broaden her strategic leadership skills, while
    continuously improving workplace processes to reduce stress for herself and her team.
