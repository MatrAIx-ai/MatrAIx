personas:
  professional: Matthew Baker, a budding preschool participant, skillfully arranges puzzles and follows the daily schedule with calm precision, while also embracing spontaneous play when structure loosens,
    reflecting their preference for predictability balanced with a relaxed approach to obligations, and they readily adapt when a favorite activity changes unexpectedly.
  sports: Matthew Baker loves the weekly toddler soccer session with the Tiny Tacklers club, proudly wears a miniature City Cubs jersey, and eagerly chases after the ball during warm‑up drills, even though
    their attention drifts after a few minutes, showing a playful but brief commitment to fitness, and they giggle when the referee’s whistle blows.
  arts: Matthew Baker immerses themselves in bright picture books by Dr. Seuss, sings along to The Wiggles' upbeat tunes, and delights in drawing simple shapes with Crayola crayons, often mimicking the
    playful stylings of Mickey Mouse across the bedroom wall, and they occasionally pretend to perform a tiny concert for stuffed animal audiences.
  travel: Matthew Baker enjoys short family road trips to the nearby zoo where they can feed giraffes, loves the splashy wonders of a coastal beach day, and dreams of a future visit to Disneyland Paris,
    always craving the comforting routine of a familiar car seat and frequent diaper breaks, and they often request a window seat to watch the passing scenery.
  culinary: Matthew Baker favors golden chicken nuggets, buttery macaroni‑and‑cheese, and sweet banana slices, expertly scoops peas with small hands (though they often leave them untouched), and eagerly
    anticipates the occasional cheese‑laden pizza topped with pepperoni, reflecting a simple yet discerning toddler palate, and they sometimes negotiate for extra ketchup packets at the table.
  core: Matthew Baker is a predictably structured three‑year‑old who secretly delights in spontaneous stick‑coloring rebellions and refuses bedtime without a fierce, yet adorable, negotiation, and they
    often charm adults with a stubborn but endearing persistence.
background:
  cultural: Matthew is raised in a white, middle‑class family in Colorado Springs, Colorado. His family celebrates typical American holidays such as Thanksgiving, Christmas, and the Fourth of July, and
    they often take advantage of the region’s outdoor lifestyle, including hiking, skiing, and visiting local parks. He is exposed to a blend of suburban community values and Western U.S. cultural traditions.
