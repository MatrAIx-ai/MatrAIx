  career_goals: Although retired from formal employment, Dawn aims to deepen her digital photography skills and compile a photo‑journal of her community’s historic landmarks. She hopes to finish writing
    a memoir that weaves together family anecdotes, local history, and the lessons she’s learned about resilience. Dawn also plans to expand her mentorship role, offering informal tech workshops for senior
    neighbors and leading a small genealogy club at the library. Maintaining her health, staying active, and traveling to her ancestral hometown in Ireland for a heritage pilgrimage are long‑term personal
    ambitions.
