  career_goals: Approaching retirement, Satar aims to cement a legacy of intergenerational religious education by creating a robust mentorship program for emerging faith leaders and developing digital resources
    that broaden access to his church's outreach. He hopes to author a reflective memoir that captures his 40‑plus years of service, expand inclusive services for seniors and marginalized groups in Boston,
    and secure sustainable funding to ensure his programs continue after he steps down. Additionally, he aspires to receive an honorary doctorate in recognition of his contributions to faith-based community
    building.
