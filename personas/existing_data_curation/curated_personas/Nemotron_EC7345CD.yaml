personas:
  professional: Marisol Valdes, a seasoned civil engineer specializing in structural analysis, BIM, and sustainable design, channels their curiosity‑practical blend into code‑compliant infrastructure solutions
    while leading multidisciplinary teams with calm empathy and a relaxed, flexible project style.
  sports: Marisol Valdes enjoys hiking the Blue Ridge trails on Saturday mornings and cycling with the Rowan County Cyclists club, follows the Carolina Panthers (NFL) and Charlotte Hornets (NBA) avidly,
    and they occasionally join a community recreation league for women's soccer, balancing seasonal outdoor activity with a relaxed commitment to team sports.
  arts: Marisol Valdes expresses creativity through salsa dancing classes, a love for the vibrant murals of Diego Rivera, the soulful blues of B.B. King, and the contemporary choreography of Misty Copeland,
    allowing artistic appreciation to weave into both personal downtime and community events, where they often share newfound inspirations with friends.
  travel: Marisol Valdes prefers flexible road trips that blend adventure and relaxation, relishes exploring Asheville’s art galleries and mountain vistas, has trekked the Azores for volcanic hikes, and
    dreams of visiting Oaxaca to study regional food markets, all while they balance travel budgets with their automatic savings plan.
  culinary: Marisol Valdes delights in cooking tamales and mole, experimenting by infusing Southern smoked pork and a hint of molasses, skillfully handling masa dough, dried chilies, and cacao nibs, and
    they often host potluck gatherings where they showcase a fusion of corn‑based staples and low‑country collard greens.
  core: Marisol Valdes merges a hands‑on curiosity for sustainable engineering with a laid‑back, community‑centered lifestyle, juggling DIY projects, salsa steps, and a habit of misplacing their planner,
    while they always manage to meet project deadlines.
background:
  cultural: Marisol’s Mexican heritage is a central thread in her identity. Raised in a bilingual household, she blends Mexican family traditions—celebrating Día de los Muertos, Día de los Santos, and sharing
    homemade mole—with the Southern hospitality of North Carolina. She regularly participates in local Latinx community events, contributes to cultural festivals, and maintains close ties with extended
    family across the United States. Her cultural upbringing instills a strong work ethic, a love for communal gatherings, and an appreciation for sharing food and stories, which she brings into both her
    professional collaborations and personal life.
