  career_goals: Marisol aims to progress to a senior project manager role where she can lead large‑scale, sustainable infrastructure projects across the Carolinas. She plans to obtain her Professional Engineer
    (PE) license and eventually launch her own consultancy focused on resilient, community‑oriented designs for underserved areas. Mentoring women and Latinx engineers is a personal priority, and she envisions
    establishing a regional mentorship network to support diversity in the engineering field.
