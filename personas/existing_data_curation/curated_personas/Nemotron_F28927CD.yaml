  career_goals: Andrea aims to progress into a senior leadership role where she can steer product innovation at the intersection of technology and art. Within the next five years, she envisions becoming
    a Technical Director or Chief Technology Officer at a creative‑tech startup, spearheading projects that use AI and interactive media to transform artistic experiences. She also plans to launch a mentorship
    program for women in software development within her community, leveraging her network in Gwinnett County and Atlanta’s tech scene. Long‑term, Andrea hopes to co‑found a company that offers AI‑powered
    tools for independent creators, merging her business savvy with her passion for abstract concepts and novelty.
