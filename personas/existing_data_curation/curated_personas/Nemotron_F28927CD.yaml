personas:
  professional: Andrea Alicea, a 44-year-old full‑stack software developer, blends JavaScript, React, and AWS expertise with an artist’s eye for UX to craft scalable, aesthetically‑rich web experiences
    while steering cross‑functional teams toward product visions that fuse technology and art.
  sports: Andrea Alicea is an avid member of the Gwinnett Trail Runners club, roots for the Atlanta Hawks, Braves, and Falcons, participates in seasonal intramural soccer leagues, and treats every hike
    in the Georgia foothills as both cardio and creative inspiration.
  arts: Andrea Alicea channels creative energy through digital illustration, oil painting, and photography exhibited at the Peachtree Arts Gallery, finds solace in piano renditions of Ludovico Einaudi,
    and fuels improvisational theater with the Atlanta Improv Collective, regularly citing Frida Kahlo and Beeple as artistic muses.
  travel: Andrea Alicea, at 44, balances family responsibilities with a wanderlust that leads them to weekend road trips to Asheville’s Blue Ridge Mountains, annual trips to Kyoto for its tech‑art scene,
    and a dream pilgrimage to Barcelona’s architecture and street art, planning meticulously with travel‑point apps while negotiating budget constraints with their spouse.
  culinary: Andrea Alicea embraces Mediterranean flavors, frequently cooking homemade paella with saffron and shrimp, mastering bibimbap with gochujang and crisp vegetables, and experimenting with smoked
    paprika‑spiced roasted cauliflower, while preferring farmer’s market finds and occasional fine‑dining experiences at Atlanta’s Canoe restaurant.
  core: Andrea Alicea blends tech leadership with artistic fervor, navigating code, canvas, and community with methodical precision, calm resilience, and a habit of turning every brainstorming session into
    an impromptu improv game.
background:
  cultural: Andrea grew up in a suburban white family in the southeastern United States, absorbing the Southern values of hospitality, community involvement, and a strong work ethic. Her upbringing in Georgia
    blended traditional Southern cuisine and celebrations with a progressive outlook shaped by her graduate business studies and exposure to Atlanta’s diverse tech ecosystem. She embraces a blend of southern
    hospitality and modern professional culture, which influences her collaborative, outgoing nature and her commitment to mentorship. Her family’s emphasis on education and civic engagement encouraged
    her active participation in local volunteering and community events, while her professional journey reflects a forward‑looking, innovation‑driven mindset.
