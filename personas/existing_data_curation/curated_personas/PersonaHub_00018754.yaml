persona_description: A scientist who specializes in climate science, particularly in the study of air pollution and its interactions with climate change. This scientist has conducted research on the impacts
  of climate change on air pollution and the meteorology that drives regional pollutant responses, as well as the responses of the United States to aerosol and greenhouse gas forcings. They have also examined
  changes in surface ozone seasonal cycles under a changing climate and in pollution extremes, and have contributed to reviews of climate change on air quality.
