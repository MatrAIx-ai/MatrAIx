persona_description: A tech-savvy individual who is diligent about keeping their computer systems safe from viruses and other malware. They are aware of the common ways in which people let their machines
  get infected and take steps to actively reduce their risk. They are tech-savvy and have a strong understanding of how to keep their operating system up to date, install anti-virus software, and install
  updates to their web browser and other software. They are also aware of the importance of keeping their firewall activated, and have a strong understanding of how to change their operating system or software
  if they are no longer supported. They are also aware of the importance of backing up their data and locking their screen when they leave their desk. They are also aware of the importance of encrypting
  their laptop so that if it's stolen or lost, no one can get at their personal data.
