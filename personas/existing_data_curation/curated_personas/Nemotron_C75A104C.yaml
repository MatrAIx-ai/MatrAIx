  hobbies: '[''Hiking & Desert Exploration'', ''Ultimate Frisbee'', ''Basketball League'', ''Barbecue Cookouts'', ''DIY Electronics Projects'', ''Homebrewing Craft Beer'', ''Karaoke Sessions'', ''Live Music
    Shows'', ''Gaming (PC/Console)'', ''Stargazing'']'
  career_goals: Thaddeus aims to finish his bachelor's degree in marketing or communications within the next two years and transition into a full‑time marketing coordinator role with a regional retailer
    or non‑profit in the Phoenix‑Mesa area. He envisions leveraging his sociable nature and practical skill set to develop community‑focused campaigns, eventually moving into a brand‑manager or community‑outreach
    director position that balances creative autonomy with a stable income. He also hopes to keep the flexibility to run occasional side projects, such as a small DIY‑electronics workshop or local event‑planning
    service.
