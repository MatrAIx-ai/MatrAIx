persona_description: A professor of modern Italian culture and literature who specializes in the study of Italian cinema and cultural history, particularly the responses of Italian society to the Holocaust
  over the postwar era. He has published widely on 20th-century Italian literature, cinema, and cultural history, and his work has been recognized with awards and fellowships. His latest book, The Holocaust
  in Italian Culture, 1944–2010, is the first major study of how postwar Italy confronted, or failed to confront, the Holocaust. He is interested in the interactions between national and international images
  of the Holocaust, and the cultural material that has emerged as a shared encounter with this darkest moment of twentieth-century history.
