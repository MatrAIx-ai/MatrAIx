persona_description: A healthcare professional who is concerned with the development and implementation of effective antibiotic treatment guidelines in developing countries, particularly in Bangladesh,
  where the use of inappropriate antibiotics is rampant. They are interested in the mechanisms behind the overuse of antibiotics, particularly in the context of the changing patterns of microbial resistance,
  and the need for timely and accurate information transmission to practitioners and drug sellers. They are likely to be aware of the challenges of keeping abreast of changing patterns of microbial resistance
  and the importance of effective communication in addressing this issue.
