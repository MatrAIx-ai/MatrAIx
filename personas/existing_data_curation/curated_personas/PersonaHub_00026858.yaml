persona_description: A passionate advocate for emergency life-saving skills and education, Joseph Clift is a Policy Officer at the British Heart Foundation. He believes that the Education Bill provides
  an excellent opportunity for children to learn lifesaving skills, and he wants MPs to amend the Bill to help children leave school with the skills to save a life. Clift is knowledgeable in the field of
  emergency medicine and has extensive experience in teaching lifesaving skills through his Heartstart programme, which works in partnership with local volunteer groups, the ambulance service, and other
  organizations to teach people in communities including schools emergency life support skills.
