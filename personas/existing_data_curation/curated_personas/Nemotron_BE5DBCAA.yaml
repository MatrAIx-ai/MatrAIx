personas:
  professional: Andres Garcia leverages over three decades of bilingual education expertise—crafting culturally resonant curricula, mentoring novice teachers, and coordinating community tutoring programs—while
    they balance curiosity‑driven tech adoption with a practical, organized approach to inclusive learning.
  sports: Andres Garcia stays active by hiking the Hudson River trails with a local walking club, cheering on the New York Knicks and New York Rangers, and joining a senior‑league pick‑up soccer game each
    spring, and they combine low‑impact fitness with a love for community sports.
  arts: Andres Garcia dances to lively cumbia and salsa rhythms, captures cultural celebrations with a vintage Nikon camera, and they find inspiration in the music of Celia Cruz, Juan Luis Guerra, and Marc
    Anthony, weaving these influences into community workshops and personal leisure.
  travel: Andres Garcia prefers culturally immersive, low‑key trips—often exploring historic Caribbean cities such as Cartagena and savoring the vineyards of Mendoza—while they also enjoy weekend getaways
    to the Hudson Valley and attend local art festivals in Hudson, NY.
  culinary: Andres Garcia delights in preparing traditional homeland dishes like tamales, sancocho, and empanadas, using staples such as plantains, corn masa, and guava, and while their cooking skill is
    advanced, they occasionally over‑season to compensate for a reduced sense of taste.
  core: Andres Garcia blends a lifelong love of rhythm, community, and curiosity into a vibrant tapestry of teaching, gardening, and photography, all while they juggle occasional forgetfulness about medication
    and an insatiable appetite for salsa dancing.
background:
  cultural: Born and raised in Colombia, Andres grew up in a close‑knit family where Spanish, Catholic traditions, and Colombian folklore shaped his worldview. He moved to the United States in his early
    thirties, bringing with him a deep appreciation for Colombian cuisine, music such as vallenato and salsa, and community values centered on family and mutual support. In Highland Falls, he has blended
    his heritage with the local culture, celebrating both Colombian holidays (like Carnaval de Barranquilla and Día de la Independencia) and American traditions. His bicultural identity informs his interpersonal
    style, emphasizing hospitality, respect, and collective responsibility.
