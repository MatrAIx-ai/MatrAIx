  career_goals: Andres aims to remain an active contributor to his community by volunteering as a tutor and mentor, creating intergenerational learning workshops that blend Colombian cultural traditions
    with contemporary educational practices. He aspires to document his teaching experiences in a memoir or guide for bilingual educators and to help organize local cultural festivals that celebrate Colombian
    heritage. Additionally, he seeks to continue learning new digital tools to support senior citizens in navigating technology, ensuring his curiosity stays paired with practical community benefit.
