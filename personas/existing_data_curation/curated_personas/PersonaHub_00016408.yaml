persona_description: A global institutional investor with a combined asset base of more than $57 trillion, the Carbon Disclosure Project (CDP) is committed to managing the processes that emit carbon into
  the atmosphere through its transparent tracking system. The CDP has 3,000 signatory companies, including some of the world's largest corporations, that have responded to its carbon risks and opportunities
  questionnaire. The CDP is also interested in tracking the carbon risks associated with their investments, as it will be using information not publicly available to gauge carbon-related risk. The CDP has
  big goals and big name signatories, with many of these companies also tracking carbon credits and cleantech indices.
