  hobbies: '[''Reading (science articles, mystery novels)'', ''Journaling'', ''Nature walks and birdwatching'', ''Digital photography'', ''Knitting and crocheting'', ''Cooking and baking simple recipes'',
    ''Playing acoustic guitar'', ''Puzzle games (Sudoku, crosswords)'', ''Volunteering at the local animal shelter'']'
  career_goals: Megan plans to earn her GED within the next year and then enroll in a community‑college program focused on healthcare, aiming to become a licensed practical nurse or a certified nursing
    assistant. She is also interested in library science and envisions a role that blends caring for people with organizing information. In parallel, she hopes to develop a small online shop for her handmade
    crafts, allowing her to combine creativity with practical entrepreneurship while contributing to her community.
