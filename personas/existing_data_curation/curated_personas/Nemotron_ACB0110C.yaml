personas:
  professional: Dinh Duong is a diligent police officer who couples meticulous report writing and GIS‑based crime mapping with bilingual communication to deliver methodical investigations, and their competitive
    streak drives them to consistently top performance metrics and seek advanced investigative certifications.
  sports: Dinh Duong is a disciplined athlete who follows a weight‑training program, practices Brazilian Jiu‑Jitsu at Lakeview Jiu‑Jitsu Academy, cycles the lake‑trail with the Rowan County Cyclists Club,
    joins modest basketball pickup games at the community center, and roots for the Charlotte Hornets and Carolina Panthers as their seasonal professional teams.
  arts: Dinh Duong is an avid consumer of true‑crime literature, regularly reading Michael Connelly and listening to the Serial podcast, while also enjoying classic rock from AC DC, indie film classics
    like Parasite, and attending occasional community theater productions for a balanced cultural palate.
  travel: Dinh Duong prefers low‑cost road trips that blend adventure with relaxation, having explored Washington D.C., the culinary scene of New Orleans, the Great Smoky Mountains, and planning a future
    expedition to Iceland to chase the northern lights.
  culinary: Dinh Duong enjoys cooking traditional aromatic rice‑noodle broth with star anise, fish sauce, fresh herbs, and grilled lemongrass‑marinated proteins, showcasing moderate culinary skill while
    often sharing these recipes at local community‑outreach events.
  core: Dinh Duong is a structured police officer with a competitive edge, balancing disciplined fitness, puzzle‑solving, and community service, while occasionally sacrificing sleep for late‑night crosswords
    and coffee‑fuelled study sessions.
background:
  cultural: Dinh is a second‑generation Vietnamese‑American. His parents immigrated to the United States from Vietnam in the early 1990s and settled in North Carolina, where Dinh grew up speaking both Vietnamese
    at home and English in school. He was raised with strong family values, respect for elders, and an appreciation for communal celebrations such as Tet (Lunar New Year) and the Mid‑Autumn Festival. While
    fully integrated into Southern culture—enjoying local cuisine and community events—he remains active in the regional Vietnamese association, helping bridge cultural gaps between the immigrant community
    and broader Salisbury residents.
