  career_goals: In the short term, Dinh aims to earn advanced investigative certifications and complete a bachelor’s degree in criminal justice while securing a role in the department’s detective trainee
    program. His competitive drive pushes him to achieve top performance scores and earn commendations for successful case resolutions. Over the next five years, he envisions promotion to detective and,
    subsequently, to sergeant, with a long‑term ambition of becoming a lieutenant overseeing a specialized unit such as narcotics or community‑relations. He also hopes to formalize his role as a cultural
    liaison for the Vietnamese community within Rowan County.
