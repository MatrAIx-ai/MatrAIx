personas:
  professional: Wilford Uzzo, a four‑year‑old aspiring builder, treats every tower of wooden blocks like a tiny construction site, demanding straight edges and predictable stability while delighting in
    the satisfaction of completing a tidy, organized masterpiece.
  sports: Wilford Uzzo, a four‑year‑old on the neighborhood preschool soccer team, fiercely tracks the scores of the New York Yankees and the Seattle Seahawks, preferring quick sprints over long rides and
    insisting on a clean‑cut uniform for every practice.
  arts: Wilford Uzzo, a four‑year‑old mini‑artist, spends afternoons scribbling bold dinosaur scenes inspired by Dr. Seuss’s whimsical style, humming the soundtrack from Disney’s Frozen while proudly displaying
    their crayon‑filled masterpieces on the fridge.
  travel: Wilford Uzzo, a four‑year‑old who has already visited the San Diego Zoo and the bright lights of Times Square, now dreams of a family road trip to the Grand Canyon and a magical vacation at Disneyland
    Paris, always packing their favorite stuffed giraffe for comfort.
  culinary: Wilford Uzzo, a four‑year‑old picky eater with a secret love for macaroni and cheese made with elbow pasta and sharp cheddar, devours peanut‑butter‑and‑jelly sandwiches on whole‑grain bread
    and insists on crunchy carrot sticks as the perfect side to their favorite honey‑glazed chicken nuggets.
  core: Wilford Uzzo is a four‑year‑old who craves order, thrives on competition, and blends a disciplined routine with bursts of imaginative play, all while proudly guarding a tiny piggy bank and a collection
    of crayon‑covered trophies.
background:
  cultural: Wilford is a White boy raised in the small, rural community of Simpsonville, Kentucky. His family participates in Southern traditions and attends a local Protestant church, engaging in community
    events such as county fairs, church picnics, and school activities. The Uzzo surname reflects an Italian‑American heritage that appears in family meals (e.g., spaghetti night) and occasional cultural
    celebrations. The community emphasizes self‑reliance, order, and practicality, shaping Wilford's structured and pragmatic outlook.
