  hobbies: '[''Gardening'', ''Cooking Southern Cuisine'', ''Quilting'', ''Volunteering at Church Food Pantry'', ''Hiking'', ''Reading Historical Fiction'', ''Community Theater'']'
  career_goals: Rosa aims to move into a regional manager position within the next five years, using her expertise to streamline operations across multiple locations while championing employee development
    and diversity initiatives. She also seeks to mentor emerging Black female leaders in her industry and, eventually, transition into a senior role with a nonprofit focused on workforce development and
    community empowerment in Bartow County.
