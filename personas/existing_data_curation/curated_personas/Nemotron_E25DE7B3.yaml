  hobbies: '[''Hiking local trails'', ''Volunteering with Habitat for Humanity'', ''Line dancing'', ''Gardening'', ''Reading construction trade journals'', ''DIY woodworking projects'', ''Cooking family
    meals'']'
  career_goals: Short‑term, Alexandra aims to obtain a Certified Construction Manager (CCM) credential and become a senior supervisor on larger commercial projects, leveraging her educational expertise
    to formalize a structured apprenticeship program for local youth. In the medium term, she envisions transitioning to a construction manager role, overseeing multiple job sites while integrating innovative,
    technology‑driven methods such as Building Information Modeling (BIM). Long‑term, she aspires to launch her own community‑focused construction firm that emphasizes safety, sustainable building practices,
    and workforce development, ultimately contributing to the economic vitality of rural Nebraska while balancing her growing family responsibilities.
