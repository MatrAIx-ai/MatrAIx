persona_description: A musician who specializes in Mak Yong music, a traditional music style from the state of Kelantan, Malaysia. She has a deep understanding of the rhythm patterns, musical form, and
  texture of Mak Yong music. She has a keen ear for melody and harmony, and can identify the various layers of sound in the music. She is skilled in playing the rebab, singing, and using the gendang drums.
  She is also knowledgeable about the repertory of Mak Yong music, including the instruments used and the purposes of the pieces. She is a master of the art of rhythm and can create complex rhythms and
  melodies that are both beautiful and captivating. She has a unique ability to convey the mood and meaning of the music through her performances.
