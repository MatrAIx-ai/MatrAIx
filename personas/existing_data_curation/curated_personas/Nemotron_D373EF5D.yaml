personas:
  professional: Omar Schaap, a seasoned janitor with over twenty years of hands‑on expertise in commercial floor care, basic plumbing, and electrical troubleshooting, channels his practical skill set and
    competitive streak toward a supervisory facilities‑management role where he can mentor crew members and champion green‑cleaning innovations.
  sports: Omar Schaap, an avid supporter of the Dallas Cowboys and Dallas Stars, plays weekend recreational softball with a local community league, follows the Texas Rangers closely, and frequents a neighborhood
    darts club where his competitive nature shines.
  arts: Omar Schaap, a devoted street‑photographer who captures the quiet moments of East Texas woods, enjoys true‑crime podcasts like "Serial," and finds solace in the music of Johnny Cash and Willie Nelson
    while flipping through Scientific American for a dose of popular science, occasionally attending the local art gallery’s rotating exhibit of regional painters.
  travel: Omar Schaap, a solo road‑tripper who has ventured to Austin for live music, explored the historic streets of New Orleans, taken a scenic drive through Santa Fe, and dreams of hiking Glacier National
    Park's rugged trails while planning future trips around modest budgets and flexible itineraries.
  culinary: Omar Schaap, a modest home cook with a penchant for Texas barbecue brisket, smoky chili con carne, and homemade biscuits topped with pecan butter, enjoys experimenting with cumin‑infused roasted
    vegetables and treats himself to occasional takeout from a nearby Mexican taqueria for authentic al pastor tacos.
  core: Omar Schaap, a pragmatic, emotionally intense 50‑year‑old janitor with a competitive edge, blends hands‑on curiosity with a drive for green‑cleaning mastery while juggling anxiety, frugal finances,
    and a hobbyist’s love for model trains and solitary walks.
background:
  cultural: Omar grew up in a working‑class white family in the suburban outskirts of Dallas County, where the prevailing Texan values of self‑reliance, modesty, and a strong work ethic were instilled from
    a young age. The multicultural environment of Garland exposed him to a blend of Hispanic, African‑American, and Asian communities, fostering a practical respect for diversity even as he maintains his
    own cultural identity rooted in Southern Protestant traditions. His limited formal education—having left school before the ninth grade to support his family—has reinforced a pragmatic outlook that prizes
    hands‑on learning over academic credentials. This background shapes his everyday interactions, his preference for straightforward, results‑oriented communication, and his desire to achieve personal
    success through practical skill rather than formal status.
attributes:
  skills: '["Commercial floor care (scrubbing, burnishing)", "Carpet extraction", "Restroom sanitation", "Basic plumbing repairs (leaky faucets, drain clearing)", "Minor electrical work (fixture replacement,
    light troubleshooting)", "OSHA safety compliance and hazardous material handling", "Green cleaning techniques and eco‑friendly product selection", "Maintenance of cleaning equipment (vacuum, floor buffers)",
    "Inventory management of cleaning supplies", "Rapid problem‑solving under time pressure"]'
  hobbies: '["DIY home repair projects", "Model train building and painting", "Collecting vintage cleaning tools", "True‑crime podcast listening", "Reading popular science magazines", "Darts and pool at
    the local bar", "Hiking in East Texas forests", "Street photography", "Journaling for emotional processing", "Occasional watching of Dallas Cowboys games"]'
  career_goals: Omar’s primary career ambition is to move from a front‑line janitor to a supervisory role within facilities management, where he can mentor newer staff and implement efficiency improvements.
    He plans to earn a Certified Professional Cleaner (CPC) credential and an OSHA 30‑hour safety certification within the next two years to bolster his qualifications. In the longer term, Omar hopes to
    launch a small, locally owned cleaning service that specializes in green, low‑chemical cleaning for residential and small‑business clients, giving him greater autonomy and financial security for retirement.
    While his anxiety sometimes makes planning difficult, his competitive streak fuels a desire to be recognized as the most reliable and innovative cleaning professional in his community.
