  hobbies: '[''Dominoes'', ''Salsa Dancing'', ''Cooking Dominican Cuisine'', ''Baseball'', ''Hiking'', ''Woodworking'', ''Youth Mentorship'']'
  career_goals: Salvador aims to earn a Project Management Professional (PMP) certification and transition into senior construction consulting, where he can oversee larger commercial developments in Fairfield
    County. He plans to mentor emerging foremen, introduce green building standards to his projects, and eventually launch a family‑owned construction firm that prioritizes community hiring and culturally
    inclusive workplaces.
