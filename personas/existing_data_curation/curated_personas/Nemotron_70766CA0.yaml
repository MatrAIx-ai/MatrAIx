personas:
  professional: A seasoned construction veteran, Salvador Castro leverages three decades of hands‑on experience in residential and commercial projects, excelling at project scheduling, cost estimating,
    and OSHA compliance, and they blend methodical reliability with a curiosity about modular, energy‑efficient building methods, making them a bridge between traditional craftsmanship and innovative green
    practices.
  sports: A lifelong baseball enthusiast, Salvador Castro roots for the Dominican Republic national squad and follows the New York Yankees, while they stay fit by hiking the Connecticut shoreline trails
    each weekend and participate in a local amateur softball league after domino nights.
  arts: A vibrant participant in community arts, Salvador Castro thrives on salsa dancing to the rhythms of Tito Puente and Celia Cruz at local gatherings, enjoys the strategic banter of dominoes, and they
    occasionally attend performances by the Connecticut Ballet, finding that these creative outlets reinforce their sense of belonging and cultural pride.
  travel: An inquisitive traveler, Salvador Castro prefers road trips to New England's coastal towns and yearly pilgrimages to the Caribbean islands where family roots lie, while they also dream of exploring
    Spain's historic plazas and the sustainable eco‑lodges of Costa Rica, always planning itineraries that blend heritage sites with opportunities to sample regional cuisine.
  culinary: A passionate home chef, Salvador Castro masters the art of cooking plantain‑based dishes like mofongo and arroz con habichuelas, seasoning with sofrito, garlic, and achiote, and they take pride
    in grilling fresh catch of the day with lime and cilantro, often hosting weekend meals that double as community gatherings.
  core: Salvador Castro blends their disciplined construction mindset with a love for salsa, dominoes, and island flavors, juggling meticulous project planning, modest financial habits, and occasional indulgences
    in woodworking tools, all while they navigate mild health challenges with pragmatic optimism.
background:
  cultural: Salvador was raised in a Dominican household, preserving Caribbean customs, music, and cuisine while adapting to life in Bridgeport, Connecticut. He remains fluent in Spanish, participates in
    local Dominican festivals, supports Spanish‑language media, and celebrates cultural holidays such as Día de la Madre. His bilingual abilities and cultural awareness inform his collaborative leadership
    style and his dedication to community service within the Hispanic population of Fairfield County.
attributes:
  skills: '[''Project Scheduling'', ''Cost Estimating'', ''Blueprint Interpretation'', ''OSHA Safety Compliance'', ''Quality Control'', ''Subcontractor Coordination'', ''Bilingual Communication (English/Spanish)'',
