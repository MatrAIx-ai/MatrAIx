personas:
  professional: Mikaela Hudson, a 29‑year‑old engineering technologist, leverages expert CAD, PLC programming, and data‑acquisition skills along with a methodical yet curious mindset to devise reliable
    IoT‑enabled smart manufacturing solutions, while they quietly champion sustainability and mentor emerging women engineers.
  sports: Mikaela Hudson enjoys solitary weekend hikes along Colorado’s Front Range, joins a local trail‑running club for occasional distance runs, follows the Colorado Avalanche in the NHL and the Denver
    Broncos in the NFL, and they practice winter snowshoeing to stay fit.
  arts: Mikaela Hudson channels a love for quiet creativity through analog photography inspired by Ansel Adams, hand‑crafted woodworking pieces, soft piano renditions of Debussy, and devouring sci‑fi novels
    by Isaac Asimov, while they regularly attend the Denver Art Museum’s experimental exhibitions.
  travel: Mikaela Hudson prefers meticulously planned solo trips that blend nature and tech, having trekked the Pacific Northwest’s rainforest, explored the geothermal landscapes of Iceland, and they dream
    of a future visit to Japan’s Tsukuba science city to attend robotics expos.
  culinary: Mikaela Hudson’s culinary style centers on fresh, herb‑infused meals from their hydroponic garden—think basil pesto pasta, kale quinoa bowls, and ginger‑lime grilled salmon—paired with occasional
    espresso and a secret stash of dark chocolate, though they sometimes skimp on prep time after a long workday.
  core: Mikaela Hudson is a solitary, detail‑driven engineering technologist who transforms curiosity into sustainable smart‑manufacturing solutions, while they nurture a quiet world of photography, woodworking,
    and herb‑filled cooking.
background:
  cultural: Mikaela grew up in a suburban home near Denver in a middle‑class, White American family with German and Irish ancestry. Her upbringing emphasized independence, a strong work ethic, and respect
    for the outdoors—a value reinforced by Colorado’s mountain culture. Family traditions include celebrating holidays such as Thanksgiving and the Fourth of July, and a reverence for community service
    and environmental stewardship. This blend of broader American cultural norms and the local Colorado appreciation for nature and sustainability informs her pragmatic yet curious outlook on life and work.
attributes:
  skills: '[''SolidWorks'', ''AutoCAD'', ''PLC programming'', ''Electrical circuit design'', ''Data acquisition'', ''Statistical process control (SPC)'', ''Finite element analysis'', ''MATLAB'', ''ANSYS'',
    ''Technical documentation'', ''Problem solving'']'
  hobbies: '[''Hiking'', ''Analog photography'', ''Indoor hydroponic gardening'', ''Woodworking'', ''DIY electronics projects'', ''Reading science-fiction novels'', ''Playing piano'', ''Puzzle solving'',
    ''Journaling'']'
  career_goals: Mikaela aims to transition from a hands‑on technologist to a senior engineering specialist focused on smart manufacturing and sustainable design. Over the next five years she plans to earn
    a professional engineering (PE) license and a certification in Manufacturing Engineering (CMfg), lead cross‑functional projects that implement IoT‑enabled automation, and mentor junior technicians,
    especially women entering STEM. In the longer term she aspires to shape company‑wide processes that reduce energy consumption and waste, positioning herself as a thought leader in environmentally responsible
    engineering.
