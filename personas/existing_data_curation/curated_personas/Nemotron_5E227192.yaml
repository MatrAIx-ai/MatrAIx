personas:
  professional: Justino Perez, a 76‑year‑old retired business administrator, channels his methodical planning, bilingual fluency, and charismatic storytelling into coordinating senior‑center programs, organizing
    neighborhood festivals, and guiding visitors at a border museum, where his curiosity for new ideas meets his practical knack for budgets and timelines.
  sports: Justino Perez, an avid walker who streaks the Rio Grande Riverwalk each morning and participates in the senior center’s weekly shuffleboard league, passionately follows El Paso Locomotive FC in
    the spring, roots for the Dallas Cowboys during football season, and never misses a home game of the El Paso Chihuahuas in summer, blending local pride with seasonal sports enthusiasm.
  arts: Justino Perez, a lifelong aficionado of mariachi and ranchera, fills his evenings with the timeless voice of Vicente Fernández, sways to the modern rhythms of Alejandro Fernández, attends local
    folk‑dance festivals featuring the vibrant performances of the Border Folk Ensemble, and treasures the murals of legendary artist Diego Rivera displayed in the city’s cultural center, weaving music
    and visual art into his daily life.
  travel: Justino Perez, who has toured his ancestral hometown of Guadalajara, explored the historic plazas of Mexico City during Día de los Muertos, enjoys annual trips to San Antonio’s River Walk and
    the artful streets of Santa Fe, and now dreams of a relaxed cruise along the Baja California coast, balancing nostalgic pilgrimages with gentle, leisurely getaways suited to his senior rhythm.
  culinary: Justino Perez, a seasoned home cook, cultivates tomatoes, jalapeños, and cilantro in his garden to craft steaming bowls of pozole, hand‑rolled tamales filled with pork and masa, and vibrant
    salsa verde seasoned with roasted tomatillos and a pinch of epazote, while occasionally treating neighbors to churros dusted with cinnamon sugar during community gatherings.
  core: Justino Perez, the 76‑year‑old community storyteller who balances meticulous event planning with bouts of anxiety, can be found orchestrating festive altars, chasing garden weeds, and never missing
    a chance to regale anyone with a lively anecdote about border history.
background:
  cultural: Justino grew up in a devout Catholic Mexican family in the border region, with roots tracing back to the state of Jalisco. His upbringing combined the warmth of Mexican familial traditions—such
    as large Sunday meals, Cinco de Mayo celebrations, and Día de los Muertos— with the practicalities of life in an American city. He is fluent in both Spanish and English, which reflects the bilingual
    milieu of El Paso. The close‑knit community structure, respect for elders, and a strong sense of hospitality have shaped his worldview. He maintains cultural practices like making altars for the departed,
    sharing folklore, and participating in local parades. At the same time, he has embraced aspects of American culture, including volunteering in local civic organizations and adapting to the suburban
    lifestyle. This bicultural identity empowers him to act as a bridge between the Mexican heritage of his ancestors and the diverse, multicultural environment of present‑day El Paso.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Community event planning'', ''Budgeting and bookkeeping'', ''Record keeping and data organization'', ''Woodworking and home repair'', ''Traditional
    Mexican cooking'', ''Public speaking and storytelling'', ''Mentorship and volunteer coordination'']'
  hobbies: '[''Vegetable and herb gardening'', ''Cooking traditional Mexican dishes'', ''Listening to mariachi and ranchera music'', ''Dancing at cultural festivals'', ''Playing dominoes and trivia games
    at the senior center'', ''Participating in a book club on Mexican history'', ''Volunteering as a museum docent'', ''Walking along the Riverwalk'', ''Attending weekly mass'']'
  career_goals: Despite being retired, Justino remains driven to leave a lasting imprint on his community and family. He aims to compile and publish a family history and a small cookbook featuring his signature
    dishes, ensuring that cultural recipes and stories are preserved for future generations. He seeks to serve as a volunteer coordinator for the El Paso senior center, creating weekly social programs that
    reduce isolation among older adults. He also plans to lead a bilingual storytelling workshop at the local library, fostering intergenerational dialogue. On a personal health front, he aspires to maintain
    his mobility through regular walking and manage his anxiety by attending a senior mindfulness group. Ultimately, he hopes to be recognized as a cultural ambassador in the border community, bridging
    Mexican traditions with American life.
