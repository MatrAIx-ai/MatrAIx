  career_goals: Although retired, Antonio aims to leave a lasting imprint on his community and family. He plans to compile a memoir of his life and the town’s history, organize a small traveling exhibit
    of local artwork for the senior center, and mentor younger volunteers at the Maquoketa Historical Society. He also hopes to learn watercolor painting well enough to create a series of pieces that capture
    the changing Iowa landscape.
