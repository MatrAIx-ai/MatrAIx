  hobbies: '[''Reading adventure books'', ''Building LEGO sets'', ''Drawing cartoons'', ''Playing soccer'', ''Listening to music (including Puerto Rican salsa and contemporary pop)'', ''Bilingual story
    time with family'', ''Exploring desert trails with parents'', ''Playing educational tablet games'']'
  career_goals: Edicta’s career aspirations are shaped by her love of structure, her competitive streak, and her desire for a predictable environment. She often says she wants to become a teacher because
    she enjoys creating clear lesson plans and helping classmates understand step‑by‑step instructions, which would let her bring order to a classroom. At the same time, she is fascinated by building things,
    so she imagines growing up to be an architect who designs safe, well‑organized playgrounds where kids can play and compete fairly. She also dreams of joining a soccer team that wins local tournaments,
    reflecting her competitive nature. In the short term, she aims to earn top grades in reading and math, participate actively in class projects, and improve her soccer skills, believing that early successes
    will reduce her worries about the future.
