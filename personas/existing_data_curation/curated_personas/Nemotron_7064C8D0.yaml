personas:
  professional: Edicta Espinosa, a 7‑year‑old budding LEGO architect, follows step‑by‑step instruction booklets with precision yet sneaks in spontaneous design twists, showcasing a love for structure balanced
    by a playful urge for improvisation.
  sports: Edicta Espinosa, a 7‑year‑old soccer enthusiast, drills set plays with the local under‑10 Desert Rangers club and cheers for the youth stars of FC Barcelona, demonstrating a competitive edge while
    occasionally opting for quiet sunset watching over continuous matches.
  arts: Edicta Espinosa, a 7‑year‑old aspiring cartoonist, sketches beloved characters like Mickey Mouse and SpongeBob SquarePants while dancing to contemporary pop tracks by Billie Eilish and upbeat salsa
    beats, turning living‑room dance sessions into spontaneous bursts of creativity that blend order with expressive freedom.
  travel: Edicta Espinosa, a 7‑year‑old desert‑trail explorer, spends weekends trekking the nearby Red Rock Canyon, has taken a family trip to the Grand Canyon, and daydreams about future visits to Disneyland
    and a school field trip to the Smithsonian, reflecting a love for organized outings mixed with a yearning for whimsical adventure.
  culinary: Edicta Espinosa, a 7‑year‑old food lover, enjoys cheesy pizza, crunchy apple slices, and mildly spiced tacos, can assemble simple cheese quesadillas with minimal supervision, and often seeks
    comfort in chicken nuggets after a stressful day, yet occasionally argues for extra dessert when saving allowance feels tight.
  core: Edicta Espinosa, a vigilant 7‑year‑old who balances meticulous LEGO building, set‑play soccer drills, and cautious allowance saving with an anxious streak and occasional impulsive snack splurges,
    navigates life with structured curiosity and spontaneous flair.
background:
  cultural: 'Edicta grows up in a bicultural home that weaves Puerto Rican traditions with the desert lifestyle of Kearny, Arizona. Her mother, who grew up in San Juan, teaches her simple Spanish phrases,
    shares family recipes such as arroz con gandules and pastelitos during holidays, and plays bomba and plena music at family gatherings, giving Edicta a tangible connection to her island heritage. Celebrations
    like Three Kings Day and Noche Buena are observed with decorations, storytelling, and festive foods, fostering a sense of cultural continuity. At the same time, her family embraces the local Southwest
    culture: they enjoy outdoor activities like hiking in the Sonoran desert, attend the town’s summer fair, and savor regional foods such as grilled steaks and salsas made with local chilies. This blend
    of Caribbean warmth and desert openness shapes her identity, making her comfortable navigating bilingual conversations, participating in both church and community events, and appreciating a wide range
    of cultural expressions.'
attributes:
