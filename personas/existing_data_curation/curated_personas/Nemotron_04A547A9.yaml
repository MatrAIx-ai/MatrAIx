personas:
  professional: Ryan Wallace is a budding junior engineer in the making, turning LEGO constructions into basic mechanical prototypes, using their methodical planning and skeptical eye to test each design
    while quietly competing with peers for the most efficient build.
  sports: Ryan Wallace participates in the neighborhood youth soccer club, the River Rapids, prefers the disciplined routine of after‑school practices, follows the USA under‑12 national soccer team and
    occasionally watches the Los Angeles Lakers, yet they often sit out group games unless they feel confident they can out‑score opponents.
  arts: Ryan Wallace draws inspiration from graphic novel illustrator Jim Lee, watches Studio Ghibli films by Hayao Miyazaki, and experiments with watercolors and collage in art club, channeling their competitive
    streak into perfecting each piece while often keeping their finished works hidden in a secret drawer.
  travel: Ryan Wallace loves meticulously planning short trips to nearby museums like the Natural History Museum and occasional weekend camping at state parks, dreaming of future visits to Tokyo's Akihabara
    for anime culture and to the Grand Canyon for its vast vistas, yet they feel anxious about flying and prefer road trips with parents.
  culinary: Ryan Wallace enjoys crafting simple snacks such as homemade peanut butter and banana sandwiches, savoring the combination of crunchy granola and sweet honey, and has recently tried assembling
    a child‑friendly sushi roll with rice, avocado, and cucumber, though they often forget to brush their teeth after sugary treats.
  core: Ryan Wallace is a quietly competitive nine‑year‑old who blends methodical LEGO engineering with a love for sketching, careful budgeting, and a cautious approach to new experiences, all while navigating
    a constant undercurrent of anxiety.
background:
  cultural: Ryan grew up in a suburban New England community in Mansfield Center, Connecticut. His family values education, community involvement, and modest self‑reliance, typical of the region. He participates
    in local library programs, occasional town fairs, and school art exhibitions, reflecting the town’s support for youth arts and STEM activities. While his household is predominantly of white American
    heritage, they also embrace a broad appreciation for diverse cultural expressions through the books and media Ryan consumes, fostering his openness to unconventional ideas.
