  hobbies: '[''sketching'', ''LEGO building'', ''reading graphic novels'', ''using Scratch for simple games'', ''participating in after‑school art club'', ''solving puzzles'']'
  career_goals: Ryan dreams of a career that blends creativity and structure. He often talks about designing buildings or video game worlds where he can control every detail. He aspires to become an architect
    or a game developer, hoping to win awards or competitions for his designs. His competitive streak drives him to enter school science fairs and art contests, while his worry about making mistakes pushes
    him to plan extensively before starting a project.
