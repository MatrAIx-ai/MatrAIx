  hobbies: '[''Gardening (herbs, vegetables)'', ''Cooking Mexican and Tex‑Mex dishes'', ''Folkloric dance'', ''Reading mystery novels'', ''Listening to bolero and mariachi music'', ''DIY woodworking and
    hand‑sewing'', ''Volunteering at community STEM programs'', ''Walking along the San Antonio River Walk'']'
  career_goals: Yaritza aims to re‑enter the workforce in a way that respects her family commitments and desire for flexibility. She is pursuing part‑time freelance STEM tutoring, offering math, science,
    and introductory coding lessons to middle‑school and high‑school students in her neighborhood. Simultaneously, she plans to develop and lead community workshops that combine sustainable gardening with
    basic engineering concepts, leveraging her technical background to benefit local families. In the longer term, Yaritza hopes to launch a small home‑based business creating custom digital accessories—such
    as 3D‑printed organizers and garden tools—while becoming a recognized mentor within San Antonio’s Hispanic STEM outreach network.
