personas:
  professional: Yaritza Moreno, a budding freelance STEM tutor and community workshop facilitator, blends strong analytical skills in Excel, Power BI, and Python with bilingual technical communication to
    craft data‑rich lesson plans, while their pragmatic love of structure and relaxed approach to obligations allow them to adapt lesson schedules around family life and occasional spontaneous DIY projects,
    and they often pivot between teaching and hands‑on prototypes.
  sports: Yaritza Moreno, a regular participant in the San Antonio River Walk Walking Club and occasional player in the local women’s softball league, stays active through daily strolls, weekend dance rehearsals,
    and follows the San Antonio Spurs and San Antonio FC for a mix of basketball and soccer excitement, preferring low‑impact cardio that fits around their flexible schedule, and they enjoy the camaraderie
    of team practices.
  arts: Yaritza Moreno, an avid reader of Agatha Christie mysteries and a devoted fan of classic boleros by Lucho Gatica and José José, channels their creative energy into folkloric dance performances and
    hand‑sewing projects, and they often draw inspiration from the cinematic storytelling of Pedro Almodóvar and the melodies of mariachi ensembles.
  travel: Yaritza Moreno, who prefers low‑key weekend getaways planning itineraries on a loose spreadsheet, enjoys strolling through Austin’s music district, exploring the Hill Country vineyards, and dreaming
    of a road‑trip to the Grand Canyon, balancing occasional adventure with family‑friendly relaxation within a modest travel budget, and they often pack a reusable water bottle and a notebook for spontaneous
    sketching.
  culinary: Yaritza Moreno, a seasoned home cook who blends fresh cilantro, jalapeños, and ripe tomatoes into signature dishes like chili‑infused salsa verde, carne asada tacos with roasted corn tortillas,
    and herb‑roasted chicken topped with poblano sauce, they relish sharing these flavorful meals at neighborhood potlucks and Sunday family brunches.
  core: Yaritza Moreno navigates life with a practical love of structure tempered by spontaneous DIY projects, balancing freelance STEM tutoring, garden‑to‑table cooking, and lively dance rehearsals while
    occasionally misplacing their keys after a flour‑filled baking session, and they typically find humor in those small setbacks.
background:
  cultural: Yaritza was raised in a bicultural Mexican‑American household in San Antonio. Her parents immigrated from Veracruz, Mexico, and Spanish was the language of the home, while the vibrant local
    Tejano culture shaped her upbringing. Family traditions such as Día de los Muertos, posadas, and Sunday communal meals remain central to her identity, as do the celebrations of local festivals, church
    ceremonies, and neighborhood fiestas that blend Mexican and Texan influences. She maintains close ties to her extended family in Mexico, traveling regularly and sending remittances. This cultural heritage
    informs her cooking, crafts, and community involvement, prompting her to volunteer in schools and community centers to teach traditional recipes, folkloric dance, and cultural arts, thereby fostering
    solidarity and pride within the Hispanic community of Bexar County.
attributes:
  skills: '[''Data analysis with Excel/Power BI'', ''Basic Python scripting'', ''Technical troubleshooting of electronics and appliances'', ''Bilingual technical communication (Spanish/English)'', ''DIY
