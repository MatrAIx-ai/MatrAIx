  hobbies: '[''Hiking'', ''Bird‑watching'', ''Science club experiments'', ''Arduino projects'', ''Math puzzle solving'', ''Middle‑distance track running'', ''Chess'', ''Reading mystery novels'', ''Journaling'']'
  career_goals: Angela aims to pursue a career in engineering or biomedical research, drawn by her love for practical problem‑solving and curiosity about how things work. She plans to attend a university
    with strong STEM programs, earn a degree in mechanical or biomedical engineering, and eventually develop medical devices that improve patient care. Her competitive nature pushes her to seek scholarships
    that recognize her disciplined academic record, while her skeptical outlook makes her consider fields like forensic science or law enforcement where uncovering truth is central. She values a structured
    career path that offers clear milestones and high standards of achievement.
