personas:
  professional: Angela Romeo, a meticulous budding inventor in her high school's science club, merges curiosity about Arduino circuits with disciplined project planning, turning experimental tinkering into
    structured problem‑solving that earns her top marks in math contests.
  sports: Angela Romeo, a middle‑distance runner on the Eagle Point High School track team, trains five days a week for the 800‑meter event, tracks workouts in a color‑coded planner, roots for the Oregon
    Ducks during football season, and follows the Portland Timbers with a season ticket for motivation.
  arts: Angela Romeo, an avid fan of classic whodunits, devours Agatha Christie and Gillian Flynn novels, curates a playlist of Taylor Swift’s storytelling ballads and the indie folk sounds of The Lumineers,
    and occasionally sketches birds she spots on hikes, letting the arts sharpen her analytical mind.
  travel: Angela Romeo, a careful planner, spends weekends exploring Oregon’s Crater Lake and the Columbia River Gorge, maps future trips to the Grand Canyon and Kyoto with spreadsheet itineraries, and
    dreams of a backpacking adventure in Japan once she saves enough from her part‑time tutoring gigs.
  culinary: Angela Romeo, a budding home chef who favors Pacific Northwest flavors, often cooks grilled salmon with lemon‑dill sauce, tosses huckleberry‑infused quinoa salads, and perfects trail‑mix snacks
    of almonds, dried cranberries, and dark chocolate, though they sometimes leave dishes in the sink while they jump back into a board game.
  core: Angela Romeo, a hyper‑organized teen with a competitive edge, balances relentless curiosity in science and nature against a chronic worry habit that fuels meticulous planning and occasional over‑analysis.
background:
  cultural: Angela was raised in Eagle Point, a small, predominantly white community in Jackson County, Oregon. The town’s culture blends a love for the outdoors—forests, rivers, and hiking trails—with
    a close‑knit, family‑oriented lifestyle. Local values emphasize self‑reliance, respect for nature, and community participation through school events, volunteer fire department activities, and seasonal
    festivals. Her family reflects typical Pacific Northwest middle‑class backgrounds, with an emphasis on education, practical skill‑building, and modest religious traditions. This environment shapes her
    pragmatic curiosity, disciplined work ethic, and competitive drive, while providing a supportive network that encourages both academic achievement and outdoor recreation.
