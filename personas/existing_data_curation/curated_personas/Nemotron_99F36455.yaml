personas:
  professional: Amy Crosby is an aspiring junior photographer on the Glendale High School yearbook staff, channeling her practical, organized mindset and love of quiet reflection into meticulous composition,
    timed shots, and careful editing, while they reliably meet deadlines and enjoy collaborating with a small, trusted team.
  sports: Amy Crosby cheers for the Phoenix Suns and Arizona Diamondbacks, participates in a local youth soccer league with the Glendale Gators, and enjoys regular evening dog walks at Hamilton Park where
    they jog lightly to stay active.
  arts: Amy Crosby expresses creativity through capturing desert sunsets in the style of Ansel Adams and digital sketching inspired by Hayao Miyazaki, while they also collect vinyl records from Billie Eilish
    and listen to Taylor Swift while editing photos.
  travel: Amy Crosby prefers family road trips that balance scenic desert hikes with relaxing stays, having visited Sedona’s red rocks and the Grand Canyon, dreaming of a future adventure to New Zealand’s
    fjords and a cultural tour of Mexico City’s historic centers, and they often sketch travel ideas in a notebook.
  culinary: Amy Crosby loves baking chocolate chip cookies with a pinch of sea salt and cupcakes topped with prickly‑pear frosting, often experimenting with Sonoran‑style green‑chile caramel drizzle while
    they enjoy occasional family barbecues featuring grilled corn and lime.
  core: Amy Crosby is a structured, reflective teen who blends a love of desert photography, careful budgeting, and thoughtful baking into a quiet, kind‑hearted daily rhythm, and they quietly nurture aspirations
    for a creative career.
background:
  cultural: Amy was raised in a middle‑class suburban family in Glendale, Arizona. Her family’s roots trace back to the American Midwest, and they maintain traditions such as celebrating Thanksgiving, Christmas,
    and the Fourth of July with gatherings and homemade meals. The predominantly Anglo‑American cultural setting of her household emphasizes community involvement, church attendance, and a strong work ethic.
    Living near the Sonoran Desert and the Phoenix metropolitan area has fostered an appreciation for outdoor activities and introduced her to a blend of Southwestern influences, from local cuisine to cultural
    festivals, though her daily life largely reflects mainstream American customs.
