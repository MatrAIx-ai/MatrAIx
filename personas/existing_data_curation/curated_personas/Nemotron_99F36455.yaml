  career_goals: Amy aspires to become a pediatric nurse, combining her love for helping children with her preference for structured, predictable work environments. She plans to excel in her science and
    biology classes, seek volunteer opportunities at the local hospital, and earn a scholarship to study nursing at a university. In the long term she aims to obtain a certified pediatric nursing specialization
    and work in a child‑focused healthcare setting, while also remaining open to a possible future role in health education or community health outreach.
