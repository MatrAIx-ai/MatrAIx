personas:
  professional: Tony Jones, a 55‑year‑old master locksmith, blends his methodical mechanical aptitude with a compassionate, community‑focused mindset, delivering reliable security solutions, training apprentices,
    and providing pro‑bono services for seniors while planning a storefront expansion.
  sports: Tony Jones is a dedicated supporter of the University of Tennessee Volunteers football, attends Knoxville Smokies minor‑league baseball games, spends winter weekends hunting in the Great Smoky
    Mountains, and practices target shooting with a local archery club.
  arts: Tony Jones contributes to the community theater’s stage crew, enjoys the visual artistry of classic‑car shows, and unwinds to the music of Johnny Cash, Dolly Parton, and John Denver while grilling
    for friends and family.
  travel: Tony Jones prefers road‑trip adventures in his restored 1965 Ford Mustang, having fished the Little River, hiked the Appalachian Trail in the Great Smoky Mountains, and dreaming of a future salmon‑fishing
    expedition on Alaska’s Kenai River.
  culinary: Tony Jones excels at grilling smoked brisket and pork ribs with a homemade bourbon‑infused barbecue sauce, sides of corn‑on‑the‑cob and herb‑seasoned garden tomatoes, often pairing meals with
    a cold sweet tea and occasionally indulging in rich desserts.
  core: Tony Jones, a 55‑year‑old locksmith with hands‑on curiosity, balances meticulous security work with an unending appetite for outdoor camaraderie, classic‑car tinkering, and community generosity,
    even if they sometimes let a project linger over a perfect grill.
background:
  cultural: Tony grew up in a small town near Maryville, in the foothills of the Great Smoky Mountains, within a multigenerational working‑class white family that has deep roots in East Tennessee. The community
    emphasized self‑reliance, hospitality, and strong church involvement, shaping his compassionate and cooperative character. Raised by a father who worked in skilled trades, Tony learned hands‑on craftsmanship
    early on, fostering a practical, methodical work ethic. While he values Southern traditions and community bonds, his curiosity drives him to explore new security technologies and ideas, balancing respect
    for heritage with a willingness to adopt innovation.
attributes:
  skills: '[''Lock installation'', ''Safe repair'', ''Key duplication'', ''Master‑key system design'', ''Electronic access control setup'', ''Security audits'', ''Emergency lockout response'', ''Mechanical
    troubleshooting'', ''Metalworking'', ''Basic electrical wiring'', ''Customer service'', ''Apprentice training'']'
  hobbies: '[''Fishing'', ''Hunting'', ''Classic car restoration'', ''Woodworking'', ''Community theater stage crew'', ''Volunteer work'', ''Attending lock trade shows'', ''Lockpicking puzzles'', ''Gardening'',
    ''Grilling'', ''College football fandom'']'
  career_goals: Tony aims to expand his locksmith business into the premier security solutions provider for Blount County and the surrounding region. He plans to add digital access‑control services, obtain
    advanced certifications such as Certified Master Locksmith, and open a modest storefront to increase visibility. He hopes to develop a formal apprenticeship program to pass on his skills to younger
    workers, and to provide pro‑bono services for seniors and local nonprofits. Long‑term, he envisions opening a second location in nearby Knoxville and eventually transitioning to a mentorship role while
    maintaining a hands‑on presence in select projects.
