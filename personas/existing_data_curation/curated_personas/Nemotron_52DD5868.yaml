personas:
  professional: Ana Sanderlin is a retired community volunteer who leverages her bilingual fluency, meticulous event planning skills, and hands-on home-maintenance know-how to coordinate church potlucks,
    mentor younger volunteers, and keep the senior center's bridge and canasta nights running smoothly.
  sports: Ana Sanderlin channels her love of gentle exercise into leisurely walks along the Hudson Valley trails, participates in the senior center's weekly bridge and canasta meet-ups (which she treats
    as mental sport), and follows the Hudson Valley Renegades baseball team and the New York Giants football team, cheering them on during summer and fall seasons.
  arts: Ana Sanderlin immerses herself in classic island rhythms by listening to son and salsa legends like Celia Cruz and Benny Moré, enjoys the occasional community theater performance, and finds inspiration
    for her scrapbooks in the vivid storytelling of historical fiction authors such as Ken Follett and Isabel Allende.
  travel: Ana Sanderlin prefers short, well-planned trips that blend family visits with cultural immersion, having revisited Havana for its familiar flavors, exploring Cartagena's coastal charm, and embarking
    on leisurely drives to the Vermont leaf-peeping routes, all while budgeting her travel expenses through a dedicated savings account.
  culinary: Ana Sanderlin excels at preparing classic island dishes such as ropa vieja, arroz con pollo, and sweet plantain fritters, often seasoning with cumin, oregano, and fresh cilantro harvested from
    her garden, and enjoys crafting homemade black bean soup with locally grown tomatoes and peppers for neighborhood potlucks.
  core: Ana Sanderlin blends disciplined routine with warm community spirit, tending garden beds, knitting blankets, and preserving family stories while navigating the occasional health hiccup and fiscal
    caution of a seasoned septuagenarian.
background:
  cultural: Ana is a first‑generation Cuban‑American whose parents left Cuba in the early 1960s and settled in New York. She grew up in a bilingual household where Spanish was spoken daily and Catholic
    traditions were central to family life. Her upbringing emphasized close family bonds, respect for elders, and the celebration of Cuban holidays such as Nochebuena and Carnaval. Living now in Hopewell
    Junction, NY, Ana blends her Cuban heritage with the rhythms of suburban American life, preserving traditional recipes, music, and customs while participating in local community activities and embracing
    the natural beauty of the Hudson Valley.
