personas:
  professional: Eddie Duncan, a budding engineering hobbyist, leverages their love of LEGO Technic and model kits to design intricate mechanical prototypes, and they apply a methodical, step‑by‑step mindset
    that mirrors their preference for routine and reliability.
  sports: Eddie Duncan, who values solitude and structure, channels athletic energy into regimented activities like twice‑weekly youth swimming practices and weekly chess club matches, while maintaining
    a low‑key fandom for the Metro Raptors (NBA) and the River City Lions (NFL), watching games only when the schedule aligns with their routine, and they enjoy the predictability of scheduled practice
    sessions.
  arts: Eddie Duncan, an avid creator, spends free time sketching precise technical diagrams on a digital tablet while listening to instrumental jazz legends such as Miles Davis and lo‑fi beats from Nujabes,
    and they occasionally craft short stop‑motion videos of their LEGO builds inspired by the meticulous craftsmanship of animator Hayao Miyazaki.
  travel: Eddie Duncan, whose curiosity is channeled through meticulous planning, prefers short, structured weekend trips to nearby science museums like the National Aviation Hall of Fame and historic sites,
    while dreaming of a future expedition to the Swiss Alps to study precision engineering, yet they avoid spontaneous travel that would disrupt their routine.
  culinary: Eddie Duncan, with a practical palate, favors repeatable meals such as homemade grilled cheese with tomato soup, enjoys precisely measuring ingredients for a perfect batch of chocolate chip
    cookies, and they occasionally reward themselves with a slice of pepperoni pizza after completing a LEGO set, while generally steering clear of messy, improvisational cooking.
  core: Eddie Duncan is a methodical, solitary 12‑year‑old who transforms structured hobbies—LEGO, chess, coding—into a disciplined routine, rarely swayed by emotion, thriving on predictability, and they
    occasionally neglect social spontaneity.
background:
  cultural: Eddie is an African‑American boy growing up in Roseville, Michigan, a suburban community within the greater Detroit metropolitan area. His family places strong emphasis on education, self‑reliance,
    and community involvement, values that stem from generations who navigated the challenges of the civil‑rights era and the region’s industrial history. He participates in local youth programs at the
    community center, where he has attended workshops on robotics and coding, and he attends a historically Black church that celebrates cultural traditions such as Juneteenth and honors African‑American
    leaders. Stories from grandparents about the fight for civil rights and achievements of Black inventors inspire his interest in STEM fields. Musical heritage is present in the household through classic
    soul and jazz records, which shape his taste for instrumental background music while studying. Eddie’s cultural identity is reinforced by friendships within a diverse school environment and by community
    events that highlight the contributions of Black Michiganders to the automotive and artistic landscapes.
attributes:
  skills: '[''Organizational planning and time management'', ''Methodical task execution'', ''Note‑taking and documentation'', ''Basic programming (Scratch, Python)'', ''Analytical problem solving (chess,
    puzzles)'', ''Mechanical assembly (LEGO Technic, model kits)'', ''Digital illustration'', ''Independent study in math and science'']'
  hobbies: '[''Building LEGO Technic and model kits'', ''Playing chess'', ''Coding small projects (Python, Scratch)'', ''Reading non‑fiction (biographies, science)'', ''Digital illustration/technical sketching'',
    ''Listening to instrumental music (jazz, lo‑fi)'']'
  career_goals: In the short term Eddie aims to finish middle school with a strong GPA, earn a basic coding certification, and take an active role in his school's robotics club and chess team. Over the
    longer term he plans to attend a university with a strong engineering program, majoring in mechanical engineering or computer science with a focus on robotics or automotive technology. He envisions
    a career designing reliable, efficient systems for Michigan’s automotive or robotics industry, eventually becoming a lead engineer who mentors younger students in STEM. His analytical and skeptical
    nature also fuels an interest in cybersecurity, where attention to detail and methodical problem solving are prized. Throughout his career path, Eddie values clear progression, measurable outcomes,
    and the ability to apply his methodical approach to real‑world challenges.
