  career_goals: Shiloe aims to channel her professional knowledge into volunteer leadership roles, such as serving on the board of a local nonprofit focused on small‑business development and senior financial
    literacy. She plans to design and deliver workshops for retirees interested in entrepreneurship, write a memoir that blends business insights with personal history, and mentor a small cohort of start‑up
    founders in Dallas through quarterly advisory sessions.
