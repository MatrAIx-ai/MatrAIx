personas:
  professional: Fernando Yanez is an aspiring graphic designer and visual communicator who blends beginner‑level digital illustration and photography skills with a collaborative spirit, channeling curiosity
    into community‑focused projects while juggling a relaxed, sometimes disorganized approach to deadlines.
  sports: Fernando Yanez enjoys weekend hikes along the Putnam Valley trails, occasionally joins a local running club for 5K runs, roots for the New York Knicks and the New York Giants, and prefers low‑key,
    social fitness activities over regimented gym schedules.
  arts: Fernando Yanez immerses themselves in contemporary art, frequenting the Hudson Valley Art Center, referencing the vibrant street works of Banksy and the bold colors of Yayoi Kusama, while their
    soundtrack ranges from Arctic Monkeys indie rock to traditional folk tunes by Lila Downs and modern Latin pop by Carla Morrison.
  travel: Fernando Yanez favors spontaneous road trips to nearby natural escapes like the Hudson Highlands and occasional cultural outings to New York City museums, yet dreams of a future backpacking adventure
    through Oaxaca’s valleys, balancing limited student budget constraints with a love for authentic local experiences.
  culinary: Fernando Yanez delights in cooking family recipes such as tamales and mole, expertly handling corn masa and dried chiles, while also experimenting with quick dishes like chilaquiles for friends,
    and enjoys savoring fresh guacamole and artesanal coffee during relaxed evenings.
  core: Fernando Yanez is a curious, art‑driven 21‑year‑old who blends creative pursuits with community kindness, often worrying about details yet thriving on spontaneous nature walks, kitchen experiments,
    and modest financial adventures.
background:
  cultural: Fernando is the son of Mexican immigrants who settled in the Hudson Valley region. He was raised in a bilingual household, speaking Spanish at home and English in school, which has given him
    fluency in both languages and a deep appreciation for Mexican customs. Family gatherings often feature traditional celebrations such as Día de los Muertos and Mexican holidays, accompanied by home-cooked
    meals and music. These cultural experiences have shaped his artistic sensibilities, especially his love for vibrant colors and storytelling through visual art. Living in Putnam Valley, New York, has
    also exposed him to the region's natural landscapes and a multicultural, suburban community, blending his Mexican heritage with broader American influences.
attributes:
  skills: '["Bilingual Spanish-English", "Basic digital illustration (Procreate, Canva)", "Photography (portrait and nature)", "Beginner guitar playing", "Community event coordination", "Graphic design
