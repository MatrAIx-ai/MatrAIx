  hobbies: '["Sketching and watercolor painting", "Hiking local trails", "Listening to indie and Latin music", "Playing guitar", "Visiting museums and art galleries", "Watching art-house films", "Reading
    philosophy and psychology", "Cooking Mexican dishes", "Writing poetry and short stories", "Volunteering at community events"]'
  career_goals: Fernando aims to translate his creative passions into a sustainable career. He plans to enroll in a community college program in graphic design or visual arts to refine his digital illustration
    and photography skills. His long-term ambition is to work as a graphic designer or visual communications specialist for a non-profit organization that serves multicultural communities, allowing him
    to merge his artistic talent with his desire to support others. He also dreams of eventually opening a small boutique or online shop where he can sell handcrafted items and artwork inspired by his Mexican
    heritage and the natural scenery of Putnam County. Alongside his professional goals, Fernando is committed to developing stronger organizational habits and stress-management techniques to better navigate
    his tendency toward worry.
