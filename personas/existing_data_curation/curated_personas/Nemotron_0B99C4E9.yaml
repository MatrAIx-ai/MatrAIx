personas:
  professional: Maria Sooknanan is a community‑focused health and cultural liaison in rural Robeson County, blending basic first‑aid knowledge, garden‑based nutrition education, and event coordination for
    local celebrations while using simple digital tools to market handcrafted beadwork and quilts, a role that satisfies their love of structure yet tolerates the occasional disorganization of a busy schedule.
  sports: Maria Sooknanan enjoys leisurely walks through the nearby woods, birdwatching with the Robeson County Walking Club, follows the Carolina Panthers for football and the Charlotte Hornets for basketball,
    and joins a community softball league each summer to stay active without the pressure of intense competition.
  arts: Maria Sooknanan immerses themselves in beadwork, quilting, and storytelling circles, draws inspiration from folk singers like Bob Dylan and Joni Mitchell, reads historical fiction by Ken Follett
    and Philippa Gregory, and finds creative fuel at the annual regional folk festival where they showcase decorative cultural items.
  travel: Maria Sooknanan favors road‑trip adventures that balance cultural immersion and nature, having explored the Great Smoky Mountains, Savannah’s historic district, and New Orleans’ jazz scene, while
    dreaming of a future pilgrimage to Sedona’s red‑rock trails and the historic pueblos of the Southwest.
  culinary: Maria Sooknanan’s culinary repertoire centers on garden‑fresh and foraged flavors, regularly preparing dishes such as wild herb pesto over roasted sweet potatoes, sautéed lamb’s quarters with
    dandelion greens, ramp‑infused corn chowder, and herb‑infused cornbread topped with honey, showcasing their skillful blend of tradition and experimentation.
  core: Maria Sooknanan is a structured yet flexible community health advocate who balances garden‑to‑table cooking, handcrafted art, occasional financial forgetfulness, and a resilient, quietly assertive
    spirit, and they approach each day with quiet determination.
background:
  cultural: Maria is a member of the Lumbee Tribe, an American Indian community with deep roots in southeastern North Carolina. Raised in Saint Pauls, she grew up immersed in tribal customs such as seasonal
    celebrations, oral storytelling, and the practice of communal cooking and crafts. Her family emphasizes the preservation of Lumbee language fragments, traditional recipes, and beadwork patterns passed
    down through generations. The blend of indigenous traditions with the rural Southern environment shapes her worldview, fostering a strong sense of community responsibility, cultural pride, and a commitment
    to maintaining the tribe’s heritage while navigating contemporary life.
attributes:
  skills: '["Traditional Lumbee cooking", "Herbal and seasonal gardening", "Beadwork and quilting with tribal designs", "Community event coordination", "Interpersonal mediation and caregiving", "Basic digital
    literacy (email, social media)", "First aid and health monitoring", "Household management and budgeting"]'
  hobbies: '["Garden tending and herb foraging", "Traditional cooking and recipe sharing", "Beadwork and quilting", "Nature walks and birdwatching", "Attending powwows and cultural festivals", "Reading
    historical fiction and local history", "Volunteering at tribal community center", "Storytelling and oral history sessions"]'
  career_goals: Maria aims to formalize her informal expertise by completing a GED and pursuing a certification in community health work or cultural education. She envisions establishing a home‑based business
    selling her beadwork, quilts, and specialty foods at local markets and online, thereby creating a modest but reliable income stream. Long‑term, she hopes to serve as a cultural liaison for the Lumbee
    Tribe, helping to organize educational programs for youth and preserving tribal traditions. She also aspires to mentor younger community members in crafts and practical life skills, fostering resilience
    and cultural pride within her neighborhood.
