  career_goals: Karmon aims to deepen her expertise in retail operations while preserving the steady routine she values. In the next three to five years she hopes to obtain a certified Retail Management
    credential and move into a supervisory position where she can oversee inventory control, staff scheduling, and store layout planning. She is focused on achieving a stable, predictable career path that
    allows her to contribute to a well‑organized workplace without frequent disruptions. Eventually she would like to become a store manager for a single location, ensuring consistent service standards
    and a calm work atmosphere for her team.
