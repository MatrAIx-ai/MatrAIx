  hobbies: '[''Playing pickup soccer'', ''Cooking Mexican cuisine'', ''Attending cultural festivals'', ''Fishing at local reservoirs'', ''Hiking in the Ruby Mountains'', ''Barbecuing with friends and crew'',
    ''Watching action movies'', ''Listening to ranchera and norteña music'']'
  career_goals: Omar aims to move from a skilled installer to a crew lead within the next two years, gaining supervisory experience while maintaining the hands‑on work he enjoys. He plans to obtain a Nevada
    contractor’s license so he can eventually start his own small drywall and ceiling‑tile business, focusing on reliable, routine-driven projects for residential and light commercial clients in Elko County.
    While he values stability, he also wants to build a reputation for friendly, trustworthy service that draws repeat business, especially from fellow Mexican‑American families and community organizations.
    He hopes to mentor younger workers, sharing practical trade knowledge and fostering a supportive crew environment.
