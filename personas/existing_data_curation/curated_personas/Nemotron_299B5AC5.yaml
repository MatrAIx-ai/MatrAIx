personas:
  professional: Camille Davis is a budding freelance graphic designer and TikTok art-tutorial creator who blends Procreate and Canva expertise with a curious, flexible mindset, turning spontaneous creative
    bursts into client work, though occasional disorganization sometimes leads to missed deadlines.
  sports: Camille Davis enjoys playing intramural volleyball with the Lakeland Lions club, attends energetic Zumba and hip-hop classes at a local studio, and cheers on the Tampa Bay Lightning in hockey
    and the Florida Gators during football season, preferring spontaneous, fun-focused workouts over rigid training regimens.
  arts: Camille Davis draws inspiration from Monet's impressionist watercolors, Banksy's provocative street murals, and the lo-fi beats of Clairo, spending weekends sketching downtown Lakeland's colorful
    alleys, curating art-themed TikTok tutorials, and filling their journal with vivid diary entries and graphic memoir sketches.
  travel: Camille Davis prefers budget-friendly road trips along Florida's Gulf Coast, frequenting Siesta Key's tranquil beaches and Orlando's lively art festivals, while dreaming of an immersive study-abroad
    semester in Barcelona to explore its vibrant graffiti scene, balancing spontaneous wanderlust with their parents' limited travel budget.
  culinary: Camille Davis loves crafting colorful Buddha bowls with quinoa, roasted chickpeas, and avocado, often improvising with pantry staples like hummus and pickled radishes, while treating themselves
    to late-night taco al pastor runs with friends after art gallery openings.
  core: Camille Davis is a curiosity-driven 18-year-old art enthusiast whose vibrant creativity and sociable energy coexist with fluctuating anxiety that fuels both their empathetic nature and occasional
    chaotic scheduling.
background:
  cultural: Camille grew up in suburban Lakeland, Florida, within a predominantly white, middle‑class community that reflects the laid‑back Southern‑Florida lifestyle. Her family celebrates traditional
    American holidays and values community connections. Living in Central Florida has exposed her to a vibrant multicultural art scene, from Latinx murals to Afro‑Caribbean music festivals, which she embraces
    in her creative work. The region’s natural environment—lakes, wetlands, and warm weather—shapes her love for outdoor photography and nature‑inspired art. These cultural influences blend to give her
    a broad, inclusive perspective while maintaining the close‑knit, friendly atmosphere of her hometown.
attributes:
  skills: '["Digital illustration (Procreate)", "Watercolor painting", "Photography composition", "Social media content creation", "Empathetic listening and peer support", "Event planning (school art club)",
    "Public speaking", "Group project coordination", "Creative writing", "Graphic design (Canva)", "Mental‑health resource awareness"]'
  hobbies: '["Painting and sketching", "Visiting art galleries and street murals", "Photography (nature and urban)", "Live music concerts", "Dancing (Zumba/hip‑hop)", "Intramural volleyball", "Journaling",
    "Reading fantasy novels and graphic memoirs", "Creating TikTok art tutorials", "Volunteering at animal shelter", "Yoga and mindfulness meditation"]'
  career_goals: Camille aims to attend a liberal‑arts college where she can major in Fine Arts with a minor in Psychology, ultimately working toward a career as an art therapist helping adolescents manage
    anxiety and emotional distress. She is also interested in community outreach, envisioning a role that organizes accessible art programs for underserved youth in Central Florida. To sustain her creative
    practice, she plans to freelance as a graphic designer and content creator, leveraging her social‑media skills for flexible income while she builds her therapeutic credentials.
