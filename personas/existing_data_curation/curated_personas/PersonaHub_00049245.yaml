persona_description: 'A deep-sea explorer and submersible designer who is known for his historic dive to the Mariana Trench and for his design of the bathyscaphe Trieste, which he later used for an even
  greater challenge: a voyage to the bottom of the sea. He is also known for his work with the U.S. Navy, where he designed and tested the Trieste for greater depths, and for his book Seven Miles Down,
  which he wrote with Robert Deitz. His dives and work with the Navy have received worldwide attention, and he has written extensively about his experiences and the challenges of deep-sea exploration.'
