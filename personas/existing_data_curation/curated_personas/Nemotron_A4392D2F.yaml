personas:
  professional: Gloria Restar, a retired community volunteer, blends their knack for meticulous budgeting and calm leadership to coordinate library fundraising drives, mentor emerging volunteers, and record
    oral histories for a new Baton Rouge archive while weaving storytelling into every project.
  sports: Gloria Restar follows the LSU Tigers football team and the New Orleans Saints with avid enthusiasm, participates in a senior walking club that meets along the River Parishes Trail, and joins a
    weekly low-impact yoga session at the Baton Rouge community center to stay fit.
  arts: Gloria Restar leads arts-and-craft workshops at the local senior center, enjoys performances by the Baton Rouge Symphony and the folk music of zydeco legend Clifton Chenier, and finds inspiration
    in the works of regional painter George Rodrigue.
  travel: Gloria Restar prefers short road trips that blend cultural immersion and relaxation, regularly visits New Orleans for Mardi Gras festivities, has explored Charleston’s historic districts, dreams
    of a summer getaway to the Canadian Maritime provinces to witness the ice-formed bouquets, and always plans trips around a modest travel fund.
  culinary: Gloria Restar delights in perfecting classic dishes such as gumbo with okra, jambalaya with Andouille sausage, and pecan pie, while experimenting with modern twists like avocado-topped shrimp
    etouffee, and favors fresh tomatoes, thyme, and bay leaves from their own garden.
  core: Gloria Restar combines Southern hospitality, meticulous organization, and a calm, resilient spirit to nurture their community, savor tradition-rooted cuisine, and stay actively engaged well into
    their golden years.
background:
  cultural: Gloria was raised in a traditional Southern household in Baton Rouge, steeped in the customs of Louisiana’s white Creole and Cajun-influenced heritage. Her family places a strong emphasis on
    hospitality, community involvement, and church participation, which have shaped her values of generosity and resilience. She grew up with the flavors of gumbo, jambalaya, and pecan pie, and she celebrates
    local festivals such as Mardi Gras and the Bayou Classic, while also honoring the region’s emphasis on family gatherings and storytelling.
