  hobbies: '[''reading historical fiction'', ''gardening'', ''cooking Creole cuisine'', ''book club participation'', ''church activities'', ''volunteering at senior center'', ''knitting'', ''walking'',
    ''attending local history tours'']'
  career_goals: Although retired from formal employment, Gloria aims to expand her impact within the Baton Rouge community by leading fundraising initiatives for the local library, mentoring younger volunteers,
    and documenting oral histories of long‑time residents for a community archive. She hopes to publish a collection of her favorite family recipes alongside stories of local traditions, and she aspires
    to maintain her health through regular walking and low‑impact yoga so she can continue serving as a reliable partner to her husband and a steady presence in her circle of friends.
