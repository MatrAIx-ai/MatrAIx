    to hip‑hop, R&B, and gospel music'']'
  career_goals: Fred aims to build a stable, routine‑focused career that leverages his organizational strengths. He plans to enroll in a community college to earn an associate degree in logistics or supply
    chain management, with the long‑term goal of becoming a warehouse supervisor or logistics coordinator. He is also exploring certification as a commercial driver to work in freight transportation. Additionally,
    Fred is interested in public‑service roles such as joining the local police force or fire department, where his reliability, disciplined approach, and community ties would be valuable assets.
