  hobbies: '["Vegetable gardening","Woodworking crafts","Reading historical biographies and African American literature","Family genealogy research","Cooking soul‑food recipes","Church choir participation","Bridge
    (card game)","Volunteer work with the Bucks County Historical Society","Nature walking on local trails","Jazz and gospel music listening"]'
  career_goals: Although retired from formal employment, Eddie aims to leave a lasting legacy within his community. He plans to compile a memoir that intertwines his family’s migration story with the broader
    African American experience in Pennsylvania, and to create a digital archive of local Black history for the Bucks County Historical Society. He is also committed to mentoring high‑school students interested
    in trades and civic service, expanding the community garden he helped start, and eventually traveling to his grandparents’ hometown in North Carolina to honor his roots.
