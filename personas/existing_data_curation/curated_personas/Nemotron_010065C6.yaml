  career_goals: Gladys dreams of a future where she can combine her love for helping others with her knack for organization. She envisions becoming a teacher or a community center coordinator, roles that
    let her support classmates and neighbors while maintaining a structured, nurturing environment. She also expresses curiosity about the natural world and hopes to explore a career in environmental education
    or wildlife care, where she can protect animals and share her enthusiasm for the desert landscape.
