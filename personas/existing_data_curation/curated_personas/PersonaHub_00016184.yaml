persona_description: A researcher and scientist who specializes in space physics, particularly in the study of the ionosphere and magnetosphere of planets and moons. The individual is responsible for building
  a plasma spectrometer instrument for the TRIDENT mission, which aims to study the state and composition of the ionosphere of Triton as well as the Neptunian magnetosphere. The researcher is excited about
  the opportunity to explore Neptune and its active moons, and has a unique connection to the Swedish Institute of Space Physics (IRF) through their involvement in the TRIDENT mission.
