  hobbies: '[''Abstract painting'', ''Mixed-media art'', ''Urban sketching'', ''Reading speculative fiction and philosophy'', ''Visiting art galleries and open‑mic events'', ''Weightlifting and jogging'',
    ''Playing rhythm guitar'', ''Songwriting'', ''Volunteer community clean‑ups'', ''STEM tutoring for youth'']'
  career_goals: Kimberly aims to earn an associate’s degree in construction management while completing OSHA 30‑hour certification and a NCCER apprenticeship. She plans to become a certified construction
    manager and eventually obtain a Project Management Professional (PMP) credential. Her long‑term ambition is to lead sustainable, community‑focused building projects in Prince George’s County and to
    launch her own design‑build firm that blends artistic concepts with functional construction. She also hopes to leverage her graphic design abilities to contribute to architectural visualization and
    to participate in interdisciplinary projects that revitalize underserved neighborhoods through art and infrastructure.
