personas:
  professional: Kimberly Francis is a methodical construction laborer with a strong grasp of concrete finishing, framing, and power‑tool operation who leverages newly honed Adobe Photoshop and Illustrator
    skills to produce on‑site visualizations, while channeling an imaginative flair into detailed project planning and aiming to earn an associate’s degree in construction management, an OSHA 30‑hour certification,
    and eventually a PMP credential.
  sports: Kimberly Francis blends weightlifting at the local YMCA with early‑morning jogs through Prince George’s County parks, follows the Washington Capitals, Washington Wizards and DC United, and belongs
    to the “Park Runners of PG County” club, using strength training to boost endurance for the annual half‑marathon while still finding time for occasional pickup basketball games.
  arts: Kimberly Francis immerses themselves in abstract painting inspired by Mark Rothko’s color fields and Yayoi Kusama’s immersive installations, attends spoken‑word open‑mic nights featuring poets like
    Sarah Kay, curates a modest Instagram feed showcasing their mixed‑media pieces alongside digital collages by Beeple, and plays rhythm guitar, writing lyrics reminiscent of Leonard Cohen’s poetic storytelling.
  travel: Kimberly Francis prefers weekend getaways that combine nature and culture, frequently hiking Shenandoah National Park’s trails, exploring New York City’s Chelsea galleries, dreaming of studying
    Gaudí’s architecture in Barcelona, and planning a future solo backpacking trip across the Pacific Northwest’s national parks, all while budgeting travel costs in a dedicated savings jar.
  culinary: Kimberly Francis enjoys cooking bold, vibrant dishes such as creamy mushroom risotto with parmesan, spicy ramen with miso broth, and avocado‑lime tacos, boasts a moderate kitchen skill level
    that includes mastering a stand‑mixer's dough for homemade flatbread, and relishes visiting farmer’s markets for heirloom tomatoes, fresh cilantro, and exotic spices, though they often order takeout
    pizza after late‑night design sessions.
  core: Kimberly Francis blends an artistic imagination with a disciplined construction mindset, balancing paint‑splattered canvases with concrete forms, budgeting meticulously while occasional impulse‑buying
    art supplies, channeling competitive energy into both the jobsite and the gym, though they often forget to water their succulents.
background:
  cultural: As a Black woman raised in Laurel, Maryland, within Prince George’s County’s vibrant African‑American community, Kimberly’s cultural identity is shaped by a blend of Southern and mid‑Atlantic
    Black traditions. Family gatherings often feature soulful music—gospel, R&B, and hip‑hop—and a storytelling tradition that emphasizes resilience and communal support. She participates in local celebrations
    such as Juneteenth festivals and National Museum of African American History events in nearby Washington, D.C., which reinforce her connection to Black history and artistic expression. The county’s
    strong public‑school system and community centers have provided her with opportunities to explore both technical trades and the arts, fostering a dual appreciation for hands‑on craftsmanship and creative
    innovation. Her upbringing ingrains a deep respect for hard work, self‑reliance, and the collective uplift of her community, influencing both her career aspirations in construction and her artistic
    pursuits.
