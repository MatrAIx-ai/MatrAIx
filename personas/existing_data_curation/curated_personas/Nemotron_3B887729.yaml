personas:
  professional: Jesus Rojas is an aspiring robotics tinkerer who blends his curiosity for new mechanisms with a practical knack for building functional LEGO Technic bots, and his competitive spirit pushes
    him to fine‑tune code while his occasional skepticism keeps him questioning every design choice.
  sports: Jesus Rojas is a spirited soccer player in the Alamo City Youth Soccer League, often emulating San Antonio FC’s forward play while cheering for the Dallas Cowboys and the Dallas Mavericks during
    the winter months, merging their competitive drive with regular park drills and weekend matches.
  arts: Jesus Rojas devotes afternoons to sketching comic strips inspired by Stan Lee’s superhero narratives, loses himself in graphic novels such as Amulet and Bone, and bursts into impromptu karaoke to
    the songs of Selena and Los Tigres del Norte, reflecting their vibrant cultural rhythm and expressive flair.
  travel: Jesus Rojas prefers short, adventure‑filled trips, planning weekend hikes along the San Antonio River Walk and Hill Country trails with friends, while dreaming of a future family vacation to the
    colonial charm of San Miguel de Allende and the bustling streets of Mexico City, balancing spontaneous exploration with careful budgeting.
  culinary: Jesus Rojas loves the bold flavors of chicken tinga tacos, tamales wrapped in corn masa, and warm atole, often honing his cooking skills by chopping fresh cilantro, grinding chilies, and mastering
    the art of perfect salsa under his family’s watchful eye.
  core: Jesus Rojas is a curious, competitive 11‑year‑old who channels restless energy into soccer and robotics, yet battles occasional worry, a habit of impulse video‑game purchases, and a skeptical eye
    toward peers.
background:
  cultural: Jesus is a second‑generation Mexican‑American growing up in San Antonio, Texas, a city steeped in Hispanic heritage. At home, Spanish is spoken alongside English, giving him a bilingual advantage.
    Family gatherings often revolve around Mexican traditions such as Día de los Muertos altars, celebrations of Mexican holidays, and the preparation of staple foods like tamales, enchiladas, and atole.
    The Tex‑Mex blend of his environment influences his taste, music preferences, and community involvement. He participates in local cultural festivals, attends church services with his family, and values
    the strong sense of family cohesion and respect for elders that are central to Mexican culture. This rich cultural tapestry shapes his identity, fostering pride in his roots while navigating the diverse
    urban backdrop of Bexar County.
attributes:
  skills: '[''Scratch programming'', ''team soccer play'', ''bilingual Spanish-English communication'', ''problem solving (science projects)'', ''LEGO robotics building'']'
  hobbies: '[''soccer'', ''LEGO robotics'', ''competitive video gaming'', ''exploring local parks'', ''reading graphic novels'', ''helping with cooking Mexican dishes'']'
  career_goals: Jesus aspires to become a robotics or civil engineer who can develop practical, community‑focused solutions. He dreams of leading projects that build safe play areas or environmentally friendly
    structures for neighborhoods in San Antonio. His competitive nature fuels a desire to win regional science competitions and earn a scholarship to study engineering. He also imagines playing soccer at
    the collegiate level, using the discipline and teamwork from sports to complement his technical ambitions. Ultimately, he wants a career that blends his love for building, his problem‑solving skills,
    and a stable, reliable future for his family.
