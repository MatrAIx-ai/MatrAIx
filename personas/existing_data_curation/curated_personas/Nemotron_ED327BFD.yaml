personas:
  professional: Miriam Marcum, a seasoned procurement leader with three decades of retail and manufacturing experience, leverages strategic sourcing, AI‑enhanced spend analytics, and meticulous contract
    management while balancing their curiosity for emerging technology with a methodical, reliable approach that earns supplier trust.
  sports: Miriam Marcum enjoys low‑impact fitness through weekly walks with the Cross County Senior Hiking Club, follows the St. Louis Cardinals baseball team, and attends local high school football games,
    preferring community activity over competitive sports.
  arts: Miriam Marcum spends evenings crocheting while listening to folk legends like Gillian Welch and reading historical fiction by Hilary Mantel, and they regularly attend performances at the nearby
    community theater featuring productions such as "Our Town."
  travel: Miriam Marcum's travel style blends relaxed road trips to historic towns like Savannah and Charleston with occasional pilgrimages to British heritage sites such as Bath, all planned meticulously
    around their garden schedule and modest budget.
  culinary: Miriam Marcum delights in cooking farm‑to‑table meals, often preparing heirloom tomato gazpacho and rosemary‑roasted root vegetables, while their modest culinary skill shines in perfecting buttery
    buttermilk biscuits and sourdough with walnuts.
  core: Miriam Marcum balances a data‑driven career with a love of gardening, quilting, and quiet community service, all while keeping a watchful eye on health metrics and a hidden stash of heirloom seed
    packets.
background:
  cultural: Miriam was raised in the rural communities of eastern Arkansas, where Southern hospitality, church involvement, and a strong sense of self‑reliance shape daily life. Her white, Midwestern heritage
    blends traditional Southern customs—family meals, community service, and respect for local traditions—with an openness to new ideas fostered by her college experiences and lifelong curiosity. She identifies
    closely with the modest, pragmatic outlook of the Cross County region, yet she values education, professional development, and the integration of broader industry innovations into local business practices.
attributes:
  skills: '[''Strategic sourcing'', ''Vendor negotiation'', ''Contract management'', ''Cost analysis'', ''Inventory optimization'', ''E‑procurement system implementation'', ''ERP software (SAP, Oracle NetSuite)'',
    ''Data analysis (Excel, Power BI)'', ''Project management'', ''Sustainable sourcing'', ''Supply chain risk mitigation'']'
  hobbies: '[''Gardening (vegetables & heirloom varieties)'', ''Reading historical fiction and Southern memoirs'', ''Crocheting and quilting'', ''Small book club participation'', ''Volunteer food drive
    organization'', ''Genealogy research'']'
  career_goals: Miriam aims to lead her organization’s transition to a fully integrated digital purchasing platform that reduces total cost of ownership by at least 10 % within the next three years. She
    is pursuing the Certified Professional in Supply Management (CPSM) credential to formalize her expertise and plans to mentor junior procurement staff, preparing them for future leadership roles. In
    the longer term, she envisions stepping into a regional supply‑chain director position or providing consulting services to small businesses in Cross County, helping them adopt best‑practice purchasing
    methods while maintaining a balanced work‑life schedule that supports her family and community involvement.
