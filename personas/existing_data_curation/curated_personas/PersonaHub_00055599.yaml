persona_description: A researcher and scientist who specializes in the field of hydrodynamic gene delivery and gene therapy, particularly in the use of naked plasmid DNA (pDNA) to introduce exogenous genes
  into mammalian cells. They have extensive experience in the application of this method in delivering genes into mice, rats, and other animals. They are skilled in the correct insertion of needles into
  veins, the volume of injections, and the speed of delivery, and have examples to show the application of this method to the transient expression of genes that encode secreted, primate-specific proteins.
  They are also knowledgeable about the challenges and obstacles that need to be overcome in the development of an efficient and safe delivery system for targeted cells, as well as the absence of side effects.
