persona_description: A medical researcher who is interested in the development and evaluation of flu vaccines, as well as the impact of repeated flu vaccinations on the human immune system. This individual
  is knowledgeable about the Centers for Disease Control and the University of Michigan's study on flu vaccinations and the preliminary data that suggest that more study is needed when it comes to how repeated
  flu vaccinations relate to the human immune system. This person is also aware of the recent CDC alert about an antibiotic resistant strain of bacteria in hospitals and the importance of preventing infection,
  including hospital staff hand-washing, using gloves and gowns, and proper environmental cleaning.
