persona_description: A forest resource manager and conservationist who is concerned with the impact of natural disasters on forest ecosystems and the maple sugar industry in northern New England and New
  York. They are knowledgeable about the effects of the ice storm on the forest and maple sugar industry, and are actively involved in recovery efforts. They are also aware of the threat posed by exotic
  pests, such as the Asian longhorn beetle and the hemlock woolly adelgid, and are working to control their spread. They are also interested in the European gypsy moth and the pine false webworm, and are
  involved in research to find management techniques to protect trees.
