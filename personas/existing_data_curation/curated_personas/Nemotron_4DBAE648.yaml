personas:
  professional: Stephen Simonson, a budding junior aerospace enthusiast, applies his love of detailed LEGO aircraft, model airplane construction, and sketching to develop early engineering problem‑solving
    skills, while his preference for structure and practical realism guides his methodical approach to school science projects.
  sports: Stephen Simonson enjoys shooting hoops in his neighborhood league while cheering for the Wichita State Shockers and the Kansas City Chiefs, and in the summer he practices basketball drills with
    his small scout troop, occasionally emulating the moves of NBA star Stephen Curry.
  arts: Stephen Simonson sparks his imagination by reading Jules Verne and Isaac Asimov novels, sketching aircraft inspired by the sleek lines of designer Syd Mead, and listening to the orchestral scores
    of Hans Zimmer while building LEGO sets, which together shape his creative outlook.
  travel: Stephen Simonson prefers planned weekend trips to the Wichita Mid‑Continent Airport to watch takeoffs, dreams of visiting the Smithsonian National Air and Space Museum in Washington, D.C., and
    hopes to explore the futuristic cityscape of Tokyo during a family vacation, balancing his love of structured itineraries with spontaneous curiosity.
  culinary: Stephen Simonson favors simple yet satisfying meals like chicken nuggets with cheddar cheese, mac and cheese made from whole‑grain pasta, and fresh carrot sticks dipped in hummus, often helping
    his family harvest tomatoes from the garden to top his homemade pizza.
  core: Stephen Simonson is a methodical young explorer who channels his solitary love of structure into building detailed models, saving allowance with meticulous precision, and dreaming of soaring aircraft
    while occasionally forgetting to clean his room.
background:
  cultural: Stephen grows up in a typical Midwestern white family in Wichita, Kansas, where community, modesty, and a strong work ethic are valued. His cultural environment emphasizes routine, respect for
    local traditions such as Saturday farmer's markets, high school sports, and the city’s proud aviation heritage. He celebrates mainstream American holidays like Thanksgiving and the Fourth of July, participates
    in school and community events, and shares in the regional pride of Wichita’s role in aerospace, which shapes his interests and sense of identity.
attributes:
  skills: '["Reading comprehension", "Basic arithmetic", "Following multi‑step instructions", "Organizing personal belongings", "Elementary computer literacy", "LEGO building", "Puzzle solving", "Pet care
