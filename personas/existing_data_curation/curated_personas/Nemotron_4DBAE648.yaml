  hobbies: '["Reading adventure books", "LEGO building", "Model airplane construction", "Sketching aircraft designs", "Educational video games (e.g., Minecraft Education Edition)", "Scouting (Boy Scouts)",
    "Casual basketball with friends", "Helping with gardening", "Airport visits and aircraft spotting", "Attending the county fair"]'
  career_goals: Stephen is fascinated by the airplanes he sees at the local Wichita airport and dreams of one day becoming an aerospace engineer or pilot. He aspires to design and build model aircraft and
    hopes to join a school robotics or STEM club to deepen his understanding of mechanics and engineering. While his primary ambition is centered on a structured, technically driven career, he also imagines
    helping his community as a future firefighter, valuing a role that blends practicality, teamwork, and clear responsibilities.
