  hobbies: '[''Abstract painting'', ''Architectural sketching'', ''Adult softball league'', ''Improv theater'', ''Historical district photography'', ''Woodworking'', ''Design theory reading'', ''DIY home
    renovation'', ''Art gallery visits'', ''Hiking'']'
  career_goals: Andrew aims to transition from hands-on installation to a supervisory and business-ownership role within the next five years. He plans to earn a certification as a Certified Drywall Taper
    and pursue a bachelor's degree in construction management, positioning himself to lead large-scale interior finish projects for boutique hotels and upscale residential developments. Ultimately, he hopes
    to launch his own contracting firm that blends technical precision with artistic interior design, offering clients bespoke decorative finishes and sustainable building solutions.
