personas:
  professional: Andrew Bonner is a seasoned drywall specialist who transforms raw interiors into seamless canvases, leveraging his construction technology degree, meticulous blueprint reading, and an artist’s
    eye for decorative plaster accents while leading crews with disciplined organization and a collaborative, yet assertive, management style.
  sports: Andrew Bonner is a dedicated member of the Bloomington adult softball league, a regular at the local YMCA weight‑training club, and a fervent supporter of the Indiana Pacers and Indianapolis Colts,
    balancing seasonal team viewership with weekend pickup basketball games that keep his competitive edge sharp.
  arts: Andrew Bonner immerses himself in the arts through weekly abstract mixed‑media painting workshops, sketching Indiana’s historic storefronts in the style of Edward Hopper, and performing improv with
    a community troupe, drawing inspiration from Jackson Pollock’s drip techniques and the theatrical timing of Tina Fey’s comedy.
  travel: Andrew Bonner prefers short, meticulously planned road trips that let him photograph the murals of Indianapolis, the oak‑lined streets of Nashville, and the limestone architecture of Bloomington,
    while dreaming of an extended summer stay in Barcelona to study Catalan modernism and sample its street cafés.
  culinary: Andrew Bonner relishes hearty Midwestern fare, often preparing pork tenderloin with rosemary‑infused apple glaze, hand‑crafting wood‑fired pizzas topped with heirloom tomatoes, local honey,
    and smoked gouda, and he frequently experiments with rustic, spice‑laden grain bowls featuring farro, roasted root vegetables, and a dash of smoked paprika.
  core: Andrew Bonner blends a craftsman’s precision with an artist’s imagination, juggling drywall mastery, improv humor, and an ever‑growing collection of woodworking projects, all while balancing disciplined
    budgeting with occasional impulsive splurges on vintage tools.
background:
  cultural: Andrew grew up in a middle-class, working-class family in Indianapolis, embodying Midwestern values of hard work, self-reliance, and community involvement. His family's heritage includes German
    and Irish roots, which fostered a respect for craftsmanship and a pragmatic outlook. He was raised in a modest Protestant household where participation in church and neighborhood events was common,
    reinforcing a sense of collective responsibility while encouraging personal ambition. This cultural mix informs his blend of disciplined professionalism with an appreciation for artistic expression.
