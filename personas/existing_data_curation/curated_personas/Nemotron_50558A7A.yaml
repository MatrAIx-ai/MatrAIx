personas:
  professional: Justice Cylar, a veteran accountant with over 25 years in public and private sectors, leverages advanced Excel modeling, SAP ERP, and emerging data‑analytics tools like Power BI to craft
    detailed audit reports that blend methodical rigor with artistic flair, positioning them for a future as Audit Director of a nonprofit arts organization while mentoring junior staff and championing
    financial literacy.
  sports: Justice Cylar follows the New Orleans Saints for NFL excitement, cheers on the LSU Tigers during college football season, participates in a local senior tennis league at the Shreveport YMCA, and
    supplements these fandoms with regular morning jogs in City Hall Park, reflecting a moderate yet health‑conscious athletic lifestyle.
  arts: Justice Cylar immerses themselves in visual culture by curating a small collection featuring works by Jacob Lawrence, Kara Walker, and contemporary sculptor Ugo Rondinone, attends exhibitions at
    the Red River Art Center and Shreveport Museum of Art, attends occasional workshops on watercolor techniques inspired by Winslow Homer, and finds solace in listening to Nina Simone's jazz vocals while
    reviewing audit spreadsheets.
  travel: Justice Cylar prefers purposeful travel that combines artistic immersion with relaxed pacing, having explored the Renaissance galleries of Florence, the mural‑rich streets of Guanajuato, Mexico,
    and the historic music scene of New Orleans’ French Quarter, while planning future trips to the Smithsonian American Art Museum in Washington, D.C., and the coastal town of Savannah for its historic
    charm.
  culinary: Justice Cylar enjoys cooking hearty Louisiana‑style gumbo and jambalaya with Andouille sausage and okra, experiments with slow‑roasted vegetable ratatouille for a healthful twist, relishes fresh
    sushi rolls featuring tuna and avocado on weekends, and regularly shares a slice of blackberry cobbler with the church choir after rehearsals.
  core: Justice Cylar merges analytical precision with an artist’s eye, navigating numbers and canvases alike while quietly championing community finance, battling mild hypertension with yoga, and occasionally
    splurging on a striking sculpture that reminds them of the balance they seek in life.
background:
  cultural: Justice is a Black woman raised in Shreveport, Louisiana, where the deep roots of African American culture, Southern hospitality, and Creole influences have shaped her worldview. She grew up
    attending community churches, celebrating Juneteenth and local festivals that blend blues, jazz, and Zydeco music. Her family emphasizes education, resilience, and service, leading her to value community
    uplift and solidarity. The historical significance of the civil‑rights movement in the region inspires her commitment to mentorship and advocacy for under‑represented professionals. Her cultural identity
    is reflected in her love for Southern cooking, particularly dishes like gumbo and jambalaya, and her appreciation for storytelling traditions that preserve African American heritage.
attributes:
  skills: '["Financial Reporting", "Audit Planning", "Internal Controls", "Risk Assessment", "Tax Preparation", "GAAP/IFRS Compliance", "Advanced Excel (including VBA)", "QuickBooks", "Sage 50", "SAP ERP",
    "Data Visualization (Power BI, Tableau)", "Financial Analysis", "Mentoring and Staff Development", "Financial Literacy Teaching", "Project Management"]'
  hobbies: '["Visiting Art Galleries and Museums", "Watercolor Painting", "Art History Workshops", "Reading Historical Fiction and Biographies", "Yoga", "Morning Walks in Local Parks", "Volunteer Financial
    Literacy Teaching", "Book Club Participation", "Church Choir Singing"]'
  career_goals: Justice aims to transition into senior leadership, such as Audit Director or Chief Financial Officer, within a nonprofit arts organization where she can blend her accounting expertise with
    her passion for the arts. She plans to attain or renew her CPA certification and pursue continuing education in forensic accounting and advanced data analytics to lead a digital transformation of audit
    processes. Long‑term, she hopes to mentor a new generation of accountants from underrepresented backgrounds, develop community financial‑literacy workshops, and eventually launch a consulting practice
    that supports small cultural institutions in achieving fiscal sustainability.
