personas:
  professional: Oscar Yount is a high‑voltage power lineman whose hands‑on expertise with climbing rigs, code‑compliant installations, and on‑the‑fly troubleshooting blends a safety‑first mindset with a
    spontaneous flair for problem solving, positioning him for an upcoming crew‑supervisor role while he pursues evening electrical‑engineering coursework.
  sports: Oscar Yount tackles Gulf sport‑fishing outings, rides his ATV with the Corpus Christi Off‑Road Club, hits the local gym for weight‑training, and roots for the Houston Texans and Houston Astros,
    embodying his competitive yet community‑oriented spirit.
  arts: Oscar Yount immerses himself in classic rock legends like Lynyrd Skynyrd and country icons such as Willie Nelson, frequents Corpus Christi Bayfest, and spends evenings crafting bespoke furniture,
    allowing his hands‑on hobby to echo the rhythm of his technical work.
  travel: Oscar Yount prefers spontaneous road‑trips that combine his love of fishing—such as weekend charters to the Florida Keys—and rugged off‑road adventures in Texas’ Big Bend, often planning just
    enough to secure a campsite before letting the open road dictate the rest.
  culinary: Eating is a hobby for Oscar Yount, who experiments with Texas‑style brisket rubs featuring paprika, brown sugar, and cumin, grills smoked ribs with hickory chips, and perfects shrimp tacos using
    fresh Gulf shrimp, lime, and cilantro, reflecting his medium‑level grilling mastery and delight in bold flavors.
  core: Oscar Yount is a rugged, competition‑driven lineman who balances meticulous safety standards with a spontaneous love for outdoor thrills, flavorful BBQ, and a future entrepreneurial vision.
background:
  cultural: Oscar was raised in a middle‑class, white Texan family with deep roots in the Gulf Coast region. His upbringing blended traditional Southern Baptist values of self‑reliance, hard work, and community
    service with the relaxed, maritime culture of Corpus Christi. He grew up on seafood and Texas BBQ, enjoys high school football and local festivals, and speaks with a mild Texas drawl. While his heritage
    is primarily Anglo‑American, the multicultural flavor of the area—particularly the influence of nearby Hispanic communities—has shaped his palate and social interactions. Oscar values family, patriotism,
    and the strong work ethic common among utility workers, yet he remains open to modern technological trends in the energy sector.
attributes:
  skills: '[''High‑voltage line installation'', ''Electrical troubleshooting'', ''Safety compliance (OSHA)'', ''Climbing and rigging'', ''Blueprint reading'', ''Power tool operation'', ''Coastal environment
