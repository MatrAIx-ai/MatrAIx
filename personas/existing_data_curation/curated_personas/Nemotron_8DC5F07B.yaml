  hobbies: '[''Gulf fishing'', ''ATV off‑road riding'', ''Barbecuing'', ''Classic car restoration'', ''Woodworking'', ''Texas Hold’em poker'', ''Listening to classic rock and country music'', ''Volunteer
    disaster preparedness'', ''Gym workouts'']'
  career_goals: Oscar aims to move into a crew supervisor role within the next two years, leveraging advanced NCCER certifications and a journeyman license to oversee larger projects. He plans to complete
    a part‑time bachelor's degree in electrical engineering to broaden his technical expertise and position himself for future opportunities in renewable energy integration, such as solar and battery storage
    projects for the Gulf Coast grid. Long‑term, Oscar envisions launching his own contracting business that emphasizes safety, reliability, and modern grid solutions, while also providing a more predictable
    schedule that supports his family life.
