persona_description: A teacher who believes in the power of collaboration and the importance of community in the learning process. This person is dedicated to creating a safe and supportive environment
  for students to share their writing and learn from one another. They understand the importance of time in the writing process and use a college Writers' Workshop model to provide instruction on literary
  devices and grammar. This teacher values feedback and critiques both professional and personal writing, using it as a tool to help students improve their writing skills. They are skilled at creating a
  sense of community and engagement among their students, ensuring that each student is invested in the writing process and is excited to see their own work improve.
