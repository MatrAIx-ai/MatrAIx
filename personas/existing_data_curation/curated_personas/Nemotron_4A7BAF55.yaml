personas:
  professional: Isabel Mora, a budding toddler engineer, demonstrates a balance of curiosity and practicality by pulling apart plastic blocks and reassembling them into makeshift towers, they thrive in
    spontaneous, unstructured play while occasionally asserting a determined squeal when a piece refuses to fit.
  sports: Isabel Mora, a tiny enthusiast of the Seattle Mariners and Seattle Sounders FC, often claps along during game broadcasts while attending a local Little Sprouts Gym where they energetically tumble
    on soft mats, balancing a carefree love of movement with occasional assertive stubbornness when a favorite ball rolls out of reach.
  arts: Isabel Mora delights in the gentle melodies of Brahms’ Lullaby and the vibrant rhythms of the Moana soundtrack, often humming along while watching Sesame Street, and they occasionally insist on
    holding the remote to pause their favorite cartoon, showcasing a blend of cooperative play and assertive preferences.
  travel: Isabel Mora’s travel persona is that of a happy stroller‑rider who has already explored the San Diego Zoo, giggled through the fireworks at Disneyland, and dreamed of a family trip to Tokyo’s
    cherry blossoms, they favor spontaneous car‑seat naps over rigid itineraries while their parents handle logistics with easygoing flexibility.
  culinary: Isabel Mora’s culinary persona revolves around a love for bright, soft foods like mashed sweet potatoes, avocado puree, banana oat pancakes, and occasional bite‑size carrot sticks, yet they
    can be stubbornly picky, turning their nose up at broccoli while eagerly demanding a second spoonful of applesauce.
  core: Isabel Mora, a one‑year‑old balance of curious tinkering and mellow patience, constantly explores the world with unstructured play, occasional assertive squeals, and a surprisingly calm temperament
    that makes diaper changes feel like gentle experiments for them.
background:
  cultural: 'Isabel was born in Toa Alta and lives in the Toa Baja municipality of Puerto Rico. Her daily life is steeped in Puerto Rican culture: she hears Spanish spoken at home, enjoys traditional foods
    like arroz con gandules and empanaditas, participates in community festivals such as the Fiesta de la Candelaria, and is exposed to the island’s rich musical heritage of bomba, plena, and salsa, all
    of which shape her early sense of identity.'
