  career_goals: At this stage, Isabel’s “career” goals are centered on learning and exploration. She looks forward to joining a preschool where she can socialize with peers, develop foundational literacy
    and numeracy skills, and nurture a love for storytelling and art, with a long‑term dream of becoming a teacher or community storyteller one day.
