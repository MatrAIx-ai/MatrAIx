persona_description: A researcher and policy analyst working on global health and nutrition, particularly focusing on the underinvestment in health and nutrition after the first 1,000 days of life, and
  the need for a global scale-up of investment in school health. They are interested in the financial requirements and potential impacts of COVID-19 on food commodity prices and nutrition security in Nepal,
  and the pathways to promote agricultural production and dietary diversity for a local market intervention called Home-Grown School Feeding (HGSF). They have a strong interest in the intersection of nutrition,
  health, and economic development, and are looking for insights and strategies to address the global challenges of food security and nutrition.
