  career_goals: Jonah aspires to become a senior partner in a boutique corporate law firm focusing on cross‑border M&A and venture‑stage financing, while simultaneously building a consultancy that offers
    integrated legal and business strategy services to high‑growth startups in the Hartford region. He seeks to mentor junior attorneys, champion workplace mental‑health initiatives, and eventually take
    on an adjunct professorship teaching corporate law and business ethics. Balancing his ambition with his desire for flexible, less‑structured work, he envisions a career that leverages his curiosity
    for emerging legal technologies and his pragmatic approach to client solutions.
