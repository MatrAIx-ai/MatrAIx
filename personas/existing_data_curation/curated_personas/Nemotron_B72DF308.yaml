  career_goals: Although she is only eight, Heather already imagines future careers that blend her love of discovery with her practical side. She is fascinated by space and dreams of becoming an astronaut
    or a scientist who studies the stars, often watching documentaries about NASA with her family. At the same time, she enjoys helping her classmates understand new concepts and can see herself as a teacher
    one day. Her competitive streak leads her to envision leading a soccer team as captain, and she aspires to develop leadership skills through school clubs like the STEM or robotics team. Heather’s ambition
    is to excel academically, participate in extracurricular activities, and gradually translate her curiosity into concrete achievements.
