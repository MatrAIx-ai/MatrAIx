personas:
  professional: Heather Goldstein, a budding LEGO architect and junior storyteller, combines her love for step‑by‑step building instructions with a fierce curiosity for creating original comic characters,
    turning every playroom project into a miniature engineering challenge they proudly share with friends.
  sports: Heather Goldstein, a forward on the Lakeview Community Soccer League team, loves cheering for the Chicago Fire and mimics their tactics on the field, while also joining weekend swimming lessons
    at the local pool and practicing drills with their teammates, and they often celebrate after a win.
  arts: Heather Goldstein, an avid comic‑book fan, draws her own superhero sketches inspired by Stan Lee and enjoys listening to the animated songs of 'Moana,' often visiting the Lurie Children’s Museum
    to explore interactive art installations they find inspiring.
  travel: Heather Goldstein, who relishes family trips to the Field Museum and the Navy Pier, dreams of exploring the historic streets of Jerusalem during a future school exchange and plans a summer outing
    to the Great Lakes’ sandy beaches, balancing careful itinerary planning with spontaneous playground discoveries they cherish.
  culinary: Heather Goldstein, a budding chef in the kitchen, loves making homemade pepperoni pizza with extra cheese, baking latkes with her grandparents for Hanukkah, and experimenting with colorful fruit
    kebabs, though they often forget to clean up the doughy mess afterward.
  core: Heather Goldstein mixes fierce curiosity with practical LEGO building, a competitive soccer spirit, and a habit of guarding their allowance while occasionally neglecting chores they consider boring.
background:
  cultural: Heather grows up in a white, middle‑class family in Chicago’s vibrant Lakeview neighborhood. Her surname, Goldstein, points to a Jewish heritage, and her family observes cultural traditions
    such as lighting the menorah for Hanukkah and attending a Sunday school program that celebrates Jewish holidays and stories. At the same time, living in a diverse city exposes her to a wide range of
    cultures, foods, and community events, from multicultural festivals in Grant Park to the annual Chicago Air and Water Show. Her parents value education, practical skills, and community involvement,
    encouraging her to take part in local library storytimes, public school activities, and neighborhood sports leagues. This blend of cultural roots and urban diversity shapes Heather’s worldview, fostering
    both a sense of belonging to her family’s traditions and an appreciation for the broader mosaic of Chicago life.
