persona_description: A physician who specializes in the field of pathology, particularly digital pathology. They are part of a team at Mass General Hospital that is leading the development of digital screening
  technology and is responsible for creating digital pathology images. They are passionate about improving the accuracy and speed of diagnosis and treatment for all patients, regardless of location. They
  believe that the most powerful advancement in digital pathology will happen when all tissue samples are converted to digital images that can be easily examined by a doctor in coordination with a patient's
  lab tests and genetic information. They are committed to sharing their knowledge and expertise with the global medical community through conferences and educational programs.
