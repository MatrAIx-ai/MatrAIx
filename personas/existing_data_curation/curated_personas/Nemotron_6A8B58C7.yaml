  hobbies: '[''Fishing'', ''Woodworking'', ''Reading business and strategy books'', ''Weight‑lifting'', ''Darts'', ''Attending LSU football games'', ''DIY home improvement projects'', ''Strategic board
    games (e.g., Risk)'', ''Cooking Cajun/Creole dishes'']'
  career_goals: Mark aims to advance from his current supervisory role to a regional operations manager within the next five years, overseeing multiple locations in the Gulf Coast area. To support this
    move, he plans to earn a GED if not already completed, followed by an associate degree in business administration, and obtain a Certified Manager credential. He also seeks mentorship in strategic planning
    and hopes to eventually launch his own small‑scale logistics firm that leverages his expertise in supply‑chain efficiency.
