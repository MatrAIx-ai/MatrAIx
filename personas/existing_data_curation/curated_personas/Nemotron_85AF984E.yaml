personas:
  professional: Eliud Perezruiz, a retired quantitative analyst and research scientist, leverages his expertise in Python, MATLAB, and machine learning to craft an illustrated book that translates complex
    scientific concepts into fractal-inspired art while mentoring youth in STEM, channeling his critical, competitive nature into meticulous project management and solitary creative work.
  sports: Eliud Perezruiz enjoys solitary early-morning walks along the San Joaquin River, follows the Fresno Grizzlies baseball team, and participates in a senior hiking club for occasional weekend treks,
    preferring low-impact activities that fit his reflective, solitary temperament.
  arts: Eliud Perezruiz creates large-scale abstract canvases that blend fractal patterns, particle-track imagery, and traditional alebrije motifs, while listening to experimental electronic pioneers like
    Aphex Twin and Autechre, and regularly exhibits his work at the local spring cultural festival alongside folk dance performances.
  travel: Eliud Perezruiz prefers meticulously planned road trips that combine stargazing and cultural immersion, having driven to Yosemite and the Atacama Desert for astrophotography, while dreaming of
    a pilgrimage to Kyoto's historic temples and a small town celebrated for its vibrant day-of-the-dead festivities.
  culinary: Eliud Perezruiz reimagines classic mole and tamales by incorporating miso paste, orange zest, and quinoa, plating the dishes on slate with avant-garde presentation, though he often leaves a
    chaotic array of spices on his counter and delays cleanup.
  core: Eliud Perezruiz is a solitary, curiosity-driven polymath whose relentless pursuit of novelty fuels a blend of scientific rigor, abstract art, and experimental cuisine, even as chronic worry drives
    late-night spreadsheet tinkering and occasional neglect of self-care.
background:
  cultural: Eliud is a second‑generation Mexican‑American who grew up in the Fresno‑Clovis area, speaking both Spanish and English at home. His family maintains strong ties to Mexican traditions, celebrating
    Día de los Muertos, Las Posadas, and cooking regional dishes such as mole and tamales, which he now reinterprets in his experimental kitchen. He participates in the local Hispanic cultural festival
    each spring, where he occasionally displays his abstract artwork that fuses traditional Mexican motifs like alebrijes with contemporary scientific imagery. Though raised Catholic, Eliud also explores
    philosophical ideas beyond organized religion, reflecting his critical and skeptical nature. His cultural identity is a blend of collective family values—support, respect for elders, and community solidarity—and
    an American emphasis on individual achievement and self‑directed learning. This bicultural perspective informs his mentorship activities, where he strives to inspire Mexican‑American youth to pursue
    STEM fields while honoring their heritage.
