  career_goals: Although retired from formal employment, Eliud remains driven to leave an interdisciplinary legacy. He plans to author and self‑publish an illustrated book that translates complex scientific
    concepts into accessible visual narratives, blending abstract art with clear explanations. He also seeks to mentor Mexican‑American youth interested in STEM by offering periodic workshops at a community
    center, sharing both technical knowledge and personal insights about navigating academic pathways. Additionally, he aspires to develop a low‑cost solar‑energy prototype using his DIY electronics skills,
    demonstrating practical renewable‑energy solutions for households in rural Fresno County. Through these endeavors, Eliud hopes to achieve recognition for merging science, art, and cultural heritage
    while providing a lasting intellectual contribution for his family and community.
