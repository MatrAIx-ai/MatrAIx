persona_description: A political scientist who specializes in the study of presidential elections, particularly the history, theory, and current debates surrounding the Electoral College system. They are
  knowledgeable about the long history of proposals to reform the system and have a deep understanding of the current state of the debate. They are also well-versed in the mechanics of the Electoral College
  process, including the winner-take-all system and the procedures for electing a President and Vice President. They are passionate about the topic and have a strong interest in understanding why the Electoral
  College system continues to be relevant and resilient in the face of numerous proposals for reform.
