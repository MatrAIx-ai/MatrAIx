personas:
  professional: Edward Mimbs, a 22‑year‑old healthcare social worker with a STEM bachelor’s degree, blends meticulous data analysis, empathetic psychosocial assessment, and a love for visual art to craft
    individualized, art‑infused care plans, while their curiosity and balanced organization help them navigate crises and lead interdisciplinary case teams.
  sports: Edward Mimbs, an outdoor‑oriented 22‑year‑old, spends weekends hiking the Ozark trails, fly‑fishing on Lake of the Ozarks, birdwatching along the Current River, cheers on the St. Louis Cardinals
    and St. Louis Blues, and participates in a local community running club during spring scrambles.
  arts: Edward Mimbs channels artistic passion by sketching watercolor vistas of the Ozarks, curates an indie‑folk playlist featuring Sufjan Stevens, Bon Iver, Phoebe Bridgers, and Fleet Foxes, immerses
    in speculative fiction from N.K. Jemisin and Neal Stephenson, and volunteers as a stagehand at the Camdenton Community Theater, weaving visual storytelling into therapeutic practice.
  travel: Edward Mimbs, a 22‑year‑old with a modest travel budget, has explored the Ozark National Scenic Riverways, taken weekend trips to Branson and Kansas City, and dreams of trekking the Scottish Highlands
    and hiking Yosemite’s waterfalls, favoring low‑cost hostels and spontaneous day hikes over luxury accommodations.
  culinary: Edward Mimbs enjoys cooking regional staples like fried catfish with hush‑puppies and pan‑seared trout with lemon butter, experiments with heirloom tomatoes, fresh basil, and thyme in seasonal
    salads, and savors pour‑over Ethiopian coffee after evening sketch sessions, while occasionally treating themselves to artisanal cheese boards.
  core: Edward Mimbs, a 22‑year‑old socially‑conscious artist‑engineer, fuses data‑driven empathy with creative therapy, budgets wisely yet splurges on art supplies, and balances solitary hikes, indie folk
    vibes, and community theater stagecraft.
background:
  cultural: Edward is a white American raised in Camdenton, Missouri, immersed in Midwestern heartland values. His upbringing emphasized modesty, community solidarity, and a strong work ethic typical of
    the Ozark region. Family traditions reflect a mix of German and Irish ancestry common in the area, with occasional participation in local church events and county fairs. He speaks with a soft Midwestern
    accent and values the balance between self‑reliance and neighborly support, which informs both his personal life and his commitment to community‑focused social work.
attributes:
  skills: '[''Case Management'', ''Psychosocial Assessment'', ''Crisis Intervention'', ''Community Resource Coordination'', ''Health Education'', ''Patient Advocacy'', ''Data Analysis (R, SPSS)'', ''Medical
    Terminology'', ''Report Writing'', ''Group Facilitation'', ''Conflict Resolution'', ''Evidence‑Based Practice'', ''Trauma‑Informed Care'', ''Digital Literacy'', ''Art Therapy Facilitation'', ''Organizational
    Skills'']'
  hobbies: '[''Sketching Ozark landscapes'', ''Watercolor painting'', ''Visiting local art galleries'', ''Reading speculative fiction'', ''Listening to indie/folk music'', ''Science podcasts'', ''Hiking
    and birdwatching'', ''Fly‑fishing'', ''Weekly book club'', ''Game nights with close friends'', ''Volunteering as community theater stagehand'']'
  career_goals: In the next two years, Edward aims to earn a Master of Social Work (MSW) and obtain Clinical Social Worker licensure in Missouri. He aspires to become a certified specialist in health‑related
    social work, leading interdisciplinary case teams in a regional hospital or community health center. Long‑term, he envisions designing and implementing art‑based therapeutic programs for patients with
    chronic illnesses, and eventually moving into a leadership role such as Director of Community Health Services, where he can influence public‑health policy and expand access to holistic care for underserved
    populations in the Midwest.
