  hobbies: '[''woodworking'', ''watercolor painting'', ''sketching'', ''reading science fiction'', ''visiting art galleries'', ''makers club'', ''fishing'', ''gardening'', ''teaching construction basics'',
    ''listening to folk music'']'
  career_goals: At 64, Giuseppe aims to shift from full‑time labor to a mentorship and consulting role, serving as a part‑time foreman who guides younger crews and integrates artistic elements into everyday
    construction projects. He plans to launch a small side business offering custom woodworking art pieces and to design a sustainable tiny home that showcases his love for novelty and innovative space
    planning. Ultimately, he hopes to leave a legacy of craftsmanship that combines practicality with creative expression.
