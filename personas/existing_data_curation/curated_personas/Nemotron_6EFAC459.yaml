personas:
  professional: A budding explorer of everyday routines, Mina Schenck turns the living room into a structured playground where she practices building block towers with precise alignment, follows simple
    daily schedules, and occasionally asserts herself when reaching for the limited snack stash; they relish the comfort of predictable play while savoring brief bursts of independent curiosity.
  sports: Mina Schenck delights in toddler gymnastics classes at the community center, eagerly waves a mini foam basketball toward the hoop during Saturday playdates, cheers for the Chicago Cubs while clutching
    a plush mascot, and they love darting around the backyard for impromptu races with her older sibling.
  arts: Mina Schenck loves to sing along with Raffi's Bananaphone, color in the crayon set while mimicking the style of children's book illustrator Eric Carle, collect stickers of Disney characters like
    Mickey Mouse, and they often stage impromptu performances for an audience of stuffed animals.
  travel: Mina Schenck's travel style is kid‑centric scheduled trips, preferring short car rides to familiar places such as Grandma's farm in the countryside, a weekend stay at a beach resort in Florida,
    and eagerly anticipating a future visit to Disneyland; they find comfort in predictable itineraries while still delighting in new sensory experiences.
  culinary: Mina Schenck favors tiny bites of mac and cheese, loves the crunch of sweet potato fries, enjoys dipping apple slices in peanut butter, and uses a child‑size plastic fork to feed herself, often
    insisting on a sprinkle of cinnamon on her oatmeal; they delight in the tactile joy of cooking with a play kitchen set alongside her parents.
  core: Mina Schenck, a two‑year‑old who balances a love for routine with spontaneous bursts of curiosity, navigates the world with a mix of structured play, tiny financial independence, and a heart set
    on simple joys; they approach each new experience with tentative confidence.
background:
  cultural: Mina comes from a white, American family rooted in the Pacific Northwest. Growing up in Gig Harbor, Washington, she is surrounded by a maritime culture that values outdoor recreation such as
    boating, fishing, and tide‑pool exploration. Her household celebrates typical American holidays like Thanksgiving and Christmas and incorporates local traditions like seasonal berry picking and community
    fairs. The family emphasizes practical independence—teaching self‑help skills early—while fostering a nurturing, cooperative environment reflective of the region's values.
