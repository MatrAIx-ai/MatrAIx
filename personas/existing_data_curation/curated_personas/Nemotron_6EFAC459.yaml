  hobbies: '[''Building wooden block towers'', ''Reading picture books'', ''Singing nursery rhymes'', ''Collecting stones from the shoreline'', ''Playing with toy boats'', ''Imitative cooking play'', ''Short
    guided playdates with a peer'']'
  career_goals: At this stage Mina's aspirations are focused on daily milestones that lay the groundwork for future independence. She expresses curiosity about adult roles through pretend play, often acting
    as a caregiver or a computer user. Her immediate ambitions include mastering potty use, expanding her vocabulary so she can name more objects, and learning to dress herself, all of which support a longer‑term
    desire to explore and help others.
