persona_description: A leading brain protection technology specialist in the field of industrial safety helmets, with a focus on improving the effectiveness of hard hats in reducing the risk of head injuries.
  Max Strandwitz, CEO of MIPS, is advocating for updating the current testing standard for industrial safety helmets based on more recent biomechanical understanding, and has already demonstrated the MIPS
  technology to construction companies at the firm's laboratory near Stockholm. He is working with Construction Manager to explain the technology to construction health and safety professionals over the
  coming weeks.
