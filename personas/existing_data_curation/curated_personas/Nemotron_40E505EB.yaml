personas:
  professional: Shannon Dennis is a 22-year-old business graduate who translates market-research insights into vibrant brand stories for creative agencies, leveraging their knack for event coordination,
    basic graphic design, and a natural ability to harmonize diverse stakeholder perspectives, which they showcase in every pitch.
  sports: Shannon Dennis enjoys playing beach volleyball with the Fort Lauderdale Beach Volleyball League, follows the Miami Heat and Miami Dolphins for their high-energy play, and supplements the summer
    routine with sunrise yoga sessions at the beach, which they treat as a meditative reset after each match.
  arts: Shannon Dennis, a frequent visitor to the NSU Art Museum and the Culture Room for live-music nights, channels the eclectic energy of artists like Banksy and Kehinde Wiley into their own acrylic
    paintings and street photography, finding that the vibrant cultural tapestry of South Florida fuels both their personal aesthetic and creative problem-solving at work, and they often curate pop-up galleries
    for community events.
  travel: Shannon Dennis prefers impulsive, budget-friendly weekend road trips along the Florida coast to spots like Key West and Naples, while dreaming of a spring backpacking adventure through Barcelona’s
    art districts and New Orleans’ music scene, planning itineraries on a shared Google doc and booking hostels or Airbnb stays that balance comfort with photogenic backdrops, which they chronicle in a
    travel journal.
  culinary: Shannon Dennis enjoys experimenting in a modest kitchen, often whipping up fresh ceviche with local shrimp, mango-salsa-topped tacos, and a occasional spicy pad thai, favoring ingredients like
    avocados, citrus, and chilies while occasionally treating friends to a homemade pizza night featuring gourmet toppings like prosciutto and figs, and they love to share their recipes on Instagram.
  core: Shannon Dennis, a 22-year-old arts-savvy entrepreneur-in-training, balances a sun-kissed beach lifestyle with a restless creative mind, a propensity for anxiety-driven impulse buys, and a habit
    of turning every group outing into a spontaneous collage of ideas and connections, which they cherish as fuel for personal growth.
background:
  cultural: Shannon identifies as a white American raised in suburban Fort Lauderdale. Her family background is rooted in European‑American traditions, emphasizing education, community service, and a relaxed
    coastal lifestyle. Growing up in a city known for its cultural diversity, she’s been exposed to Caribbean, Latin American, and international influences, which have shaped her appreciation for multicultural
    art, music, and food. She values the region’s blend of beach‑side leisure and urban creativity, and she often incorporates this eclectic cultural tapestry into her personal and professional outlook.
attributes:
  skills: '[''Market research'', ''Strategic planning'', ''Project coordination'', ''Event planning'', ''Social media management'', ''Graphic design basics'', ''Public speaking'', ''Team collaboration'',
