  hobbies: '[''Visiting art galleries'', ''Photography'', ''Painting (acrylic)'', ''Live music concerts'', ''Traveling to new cities'', ''Yoga and meditation'', ''Reading psychology and creative nonfiction'',
    ''Volunteer at community art workshops'', ''Beach volleyball'', ''Journaling'']'
  career_goals: Shannon aims to launch a career that merges her business training with her passion for art and culture. In the next 12‑18 months she plans to secure an entry‑level marketing or brand‑communication
    role at a creative agency, museum, or nonprofit arts organization, where she can apply her market‑research and event‑planning skills. She wants to become proficient in digital marketing strategy, content
    creation, and brand storytelling, and to eventually lead campaigns that promote community‑focused arts initiatives. Long‑term, she envisions pursuing a part‑time MBA with a focus on sustainable entrepreneurship
    to open a boutique consultancy that helps cultural institutions develop financially viable programs while preserving artistic integrity.
