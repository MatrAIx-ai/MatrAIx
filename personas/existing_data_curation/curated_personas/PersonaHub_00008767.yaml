persona_description: 'A historian or archaeologist who specializes in the study of pre-Christian and early Christian burial practices in the Bristol Channel region of England, particularly on Lundy Island.
  They have a deep understanding of the island''s history, architecture, and cultural heritage. They are knowledgeable about the island''s pre-Christian and early Christian burial practices, including the
  development of the modern dry-stone wall and the discovery of the ancient cemetery. They are also familiar with the island''s historical context, including its role in the development of the Church of
  England and its subsequent abandonment as a religious center. They have conducted extensive research on the island''s history and have published extensively on the topic, including the book "Lundy: A
  Study in Early Christian Burial Practices" by A. C. Thomas.'
