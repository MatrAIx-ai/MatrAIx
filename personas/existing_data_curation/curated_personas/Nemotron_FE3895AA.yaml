  career_goals: Joseph aims to advance into a senior supervisory role, overseeing multiple shifts and driving continuous‑improvement initiatives across the plant. He plans to obtain a Certified Process
    Safety Professional (CPSP) credential and to lead a Lean Six Sigma project that reduces unplanned downtime by at least 15%. Long‑term, he envisions transitioning to a reliability engineering position
    where he can mentor the next generation of operators and eventually serve as a safety consultant for regional chemical facilities, allowing a more flexible schedule for family time.
