personas:
  professional: Grace Peters is a budding software storyteller, using Scratch and Python to create interactive sci‑fi narratives that blend their love of fantasy worlds with a meticulous, competitive drive
    to top the leaderboards of online coding challenges, all while instrumental music plays softly in the background.
  sports: Grace Peters is a member of the local youth swimming club, favoring early‑morning laps that provide quiet focus, while cheering for the New York Knicks and following the Los Angeles Dodgers, and
    they regularly compete in online chess tournaments that satisfy their competitive edge without demanding in‑person interaction.
  arts: Grace Peters is a self‑taught illustrator who fills sketchbooks with swirling nebulae and medieval citadels, drawing inspiration from Hayao Miyazaki, H. R. Giger, and the ambient compositions of
    Brian Eno, while entering weekly art challenges on ArtStation and writing flash fiction inspired by Brandon Sanderson and Ursula K. Le Guin.
  travel: Grace Peters dreams of stargazing from the Atacama Desert and plans a school field trip to the Griffith Observatory, while they already enjoy weekend hikes in nearby state parks like Yosemite
    to map constellations on a handheld star chart, balancing a saver’s budget with a thirst for cosmic experiences.
  culinary: Grace Peters prefers quick, creative meals such as avocado toast topped with star‑shaped cucumber slices and a side of miso ramen, enjoys mixing dried mango, dark chocolate, and pumpkin seeds
    into homemade trail mix, and spends Saturday afternoons attempting to bake thin‑crust pizza using a simple kitchen mixer.
  core: Grace Peters is a quiet, fiercely curious twelve‑year‑old whose imagination spins entire universes while they meticulously save allowances, dodge social fatigue, and keep a steady, almost indifferent
    calm through most daily challenges.
background:
  cultural: Grace is a White American growing up in Castle Hayne, a small community on the coast of New Hanover County, North Carolina. She attends a local public middle school and is part of the broader
    Southern cultural milieu, which includes a mix of traditional community values, an appreciation for storytelling, and exposure to the coastal environment. Her family background reflects typical Anglo‑American
    roots, with influences from English and German ancestry. The proximity to Wilmington provides occasional access to regional art festivals, maritime museums, and a growing indie arts scene, which she
    explores through online platforms. Her upbringing emphasizes self‑reliance, modesty, and a quiet respect for personal space, mirroring both Southern hospitality and her own preference for solitude.
