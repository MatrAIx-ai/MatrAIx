  career_goals: Grace aspires to turn her love of abstract concepts and storytelling into a career that blends art and technology. She envisions becoming a speculative fiction author or a visual storyteller
    for video games, eventually earning a degree in interdisciplinary studies that combines computer science, creative writing, and digital media. Her competitive drive pushes her to aim for national writing
    contests, coding competitions, and to build a portfolio that could lead to a scholarship at a top arts‑tech university. In the long term, she hopes to create immersive narratives that challenge readers
    and players to think beyond the visible world.
