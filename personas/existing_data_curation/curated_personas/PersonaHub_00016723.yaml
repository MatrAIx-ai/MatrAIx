persona_description: A scientist at Cincinnati Children's Hospital Medical Center who is conducting research on the development of the immune system in newborn infants and the role of CD71+ cells in preventing
  an overreactive immune response. The scientist is exploring the possibility of modulation or control of CD71+ immune suppression to protect newborns from systemic infections while still allowing the cells
  to do their job in developing healthy intestines. The scientist is conducting laboratory tests and experiments to determine the extent of compromised immunity in infant mice and to develop new strategies
  for protecting newborns from infections.
