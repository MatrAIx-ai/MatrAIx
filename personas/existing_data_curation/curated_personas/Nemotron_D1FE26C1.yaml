  hobbies: '[''Watercolor painting'', ''Pottery'', ''Visiting art galleries and museums'', ''Community theater participation'', ''Traveling to historic towns'', ''Hiking in the Allegheny region'', ''Reading
    contemporary fiction and art history'', ''Gardening'', ''Book club'', ''Volunteer craft workshops at senior center'', ''Swing dancing'']'
  career_goals: Christina aims to leverage her decades of project management experience into a mentorship and consulting role that focuses on community development and arts initiatives in South Park and
    the broader Washington County area. She hopes to lead or advise non‑profit projects that revitalize local cultural spaces, mentor younger project managers, and eventually transition to a part‑time flexible
    schedule that allows her to dedicate more time to her artistic pursuits while still contributing her expertise to meaningful local ventures.
