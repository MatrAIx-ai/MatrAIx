personas:
  professional: Christina Lyles, a veteran project management specialist in Washington County, blends agile frameworks with a keen artistic eye to lead cross‑functional teams that revitalize community spaces,
    and they now channel that expertise into mentorship and consulting for local arts initiatives.
  sports: Christina Lyles, an avid fan of the Pittsburgh Steelers and a regular participant in the Allegheny Trailblazers walking club, spends Saturday mornings hiking the foothills and joins community
    softball games, though they occasionally skip workouts when craft projects demand extra time.
  arts: Christina Lyles, a watercolor enthusiast who also potters at the South Park studio and designs sets for the community theater, draws inspiration from Andrew Wyeth and local folk musicians, and they
    swing dance every Thursday night to keep the creative energy flowing.
  travel: Christina Lyles favors weekend getaways to historic towns like Gettysburg and Williamsburg, dreams of strolling through charming European villages with cobblestone streets, plans trips with a
    flexible itinerary that leaves room for spontaneous art festivals, and they often travel using senior discounts and a trusty RV.
  culinary: Christina Lyles delights in Pennsylvania Dutch staples such as pierogies, apple butter, and smoked trout, enjoys preparing comfort dishes like chicken and dumplings for family gatherings, and
    they frequent the local farmers market to source fresh herbs and seasonal vegetables for their watercolor‑inspired plating.
  core: Christina Lyles is a community‑focused project manager turned arts mentor who balances disciplined expertise with a spontaneous, creative spirit and a dash of delightful disorganization.
background:
  cultural: Christina is a second‑generation resident of South Park, Pennsylvania, with deep roots in the region’s Anglo‑American heritage. Her family history traces back to English and German ancestors
    who settled in the Allegheny Valley in the early 1900s. Growing up during the social changes of the 1960s and 1970s, she absorbed a blend of traditional Mid‑Atlantic community values—such as neighborly
    cooperation, participation in county fairs, and a strong work ethic—while also embracing the era’s openness to new cultural experiences. Her upbringing in a small‑town, church‑centered environment fostered
    an appreciation for local folk music, regional cuisine, and community volunteerism, all of which continue to shape her worldview and engagement with the arts.
