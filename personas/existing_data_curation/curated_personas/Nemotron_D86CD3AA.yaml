  hobbies: '[''Church choir participation'', ''Bible study leadership'', ''Gardening'', ''Southern cooking'', ''Bridge and chess'', ''Community theater attendance'', ''Family road trips'', ''Youth entrepreneurship
    mentorship'', ''Local business roundtable speaking'', ''Reading biographies of Black business pioneers'']'
  career_goals: Terry aims to transition into a department chair role where he can shape the strategic direction of the business school and embed a robust entrepreneurship incubator program that links classroom
    learning with local economic development. He plans to author a textbook on practical business fundamentals for adult learners, secure a multi‑year federal grant to support community‑based business start‑ups,
    and publish research on the impact of experiential learning in underserved populations. While looking toward a phased retirement, he intends to remain active as a consultant for regional small‑business
    initiatives and to mentor emerging faculty members, fostering a collaborative and supportive academic culture.
