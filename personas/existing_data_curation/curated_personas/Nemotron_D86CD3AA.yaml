personas:
  professional: Terry Williams, a veteran business professor with three decades of teaching, blends expertise in strategic management, entrepreneurship education, and curriculum design with a disciplined,
    organized work style and a naturally talkative, community‑oriented presence that makes them a sought‑after mentor and public speaker at local business roundtables.
  sports: Terry Williams enjoys low‑impact morning walks in the local park, participates in senior center yoga classes, follows the Atlanta Braves and New Orleans Saints on television, and plays weekly
    bridge and chess tournaments that keep their mind sharp while providing a structured social outlet.
  arts: Terry Williams regularly attends community theater productions such as the local rendition of "To Kill a Mockingbird" and delights in the melodic folk tunes of Alison Krauss, while also appreciating
    classic film scores by John Williams.
  travel: Terry Williams prefers meticulously planned road trips that combine visits to family gatherings in Savannah, Charleston, and New Orleans with stops at historic Southern plantations and botanical
    gardens, balancing their love of heritage with the anxiety‑reducing comfort of a familiar itinerary.
  culinary: Terry Williams excels at preparing Southern comfort dishes, skillfully frying buttermilk chicken, slow‑cooking collard greens with smoked turkey, and baking buttery cornbread, yet often finds
    themselves repeatedly tasting the gravy to alleviate nervous energy, a habit that sometimes leads to over‑seasoning.
  core: Terry Williams, a structured yet sociable 64‑year‑old scholar, channels disciplined academic rigor into community mentorship while managing anxiety through gardening, choir singing, and the ritual
    of Southern cooking.
background:
  cultural: Terry was born and raised in rural Tennessee within a close‑knit Black community that prized faith, family, and mutual support. His grandparents were part of the Great Migration narrative, and
    his parents emphasized education as a pathway to empowerment, encouraging him to attend a historically Black college before earning his graduate degree in business. The cultural rhythms of Southern
    Gospel music, church fellowship, and shared stories of civil‑rights activism have shaped his values of cooperation, resilience, and community uplift. While he embraces the broader Southern cultural
    tapestry—its cuisine, hospitality, and storytelling traditions—he also carries a conscious awareness of the challenges faced by Black professionals in academia, motivating his commitment to mentorship
    and inclusive educational practices.
attributes:
  skills: '[''Strategic Management'', ''Financial Analysis'', ''Entrepreneurship Education'', ''Curriculum Design'', ''Adult Learning Theory'', ''Grant Writing'', ''Community Partnership Development'',
