personas:
  professional: Donna Lewis, a meticulous computer systems analyst, leverages their expertise in SQL optimization, Python automation, and PowerBI visualizations to translate complex business needs into
    streamlined technical solutions, and they champion structured stress‑management practices that keep cross‑functional teams on track.
  sports: Donna Lewis, an avid yoga practitioner and member of the Columbia River Gorge Hiking Club, follows the Portland Timbers with enthusiasm and incorporates weekend hikes in the gorge to balance structured
    workouts with the restorative calm of nature.
  arts: Donna Lewis, a mystery‑novel enthusiast who devours Agatha Christie and Gillian Flynn, regularly visits the Portland Art Museum to view contemporary installations and unwinds to the soulful rhythms
    of Nina Simone and modern jazz playlists while sketching ideas for future culinary experiments.
  travel: Donna Lewis, a methodical planner who maps out weekend getaways to nearby spots like the Columbia River Gorge and longer escapes to Kyoto’s cherry‑blossom season or the Amalfi Coast, balances
    adventure with a modest travel budget by booking affordable Airbnbs and using reward points for flights.
  culinary: Donna Lewis, an intermediate home cook who cultivates basil, mint, and rosemary on their balcony, delights in crafting nutritious dishes such as shakshuka, Mediterranean quinoa bowls, and hand‑rolled
    soba noodles, and often experiments with spice blends inspired by their global culinary curiosities.
  core: Donna Lewis blends analytical precision with a restless creative spirit, turning anxiety into structured self‑care rituals, occasional kitchen gadget splurges, and a steadfast commitment to mentoring
    underrepresented women in tech, and they constantly seek balance between order and exploration.
background:
  cultural: Donna identifies as an African American woman raised in the Mid‑Atlantic region. Her family’s roots trace back to the Great Migration, and she grew up hearing stories of resilience and community
    support. Church and extended family gatherings instilled a strong sense of collective responsibility and cultural pride. In Harrisburg, she participates in local Juneteenth celebrations, supports Black-owned
    businesses, and stays connected to African American literary and musical traditions, particularly R&B, gospel, and spoken‑word poetry. Her cultural background shapes her commitment to mentorship and
    representation in STEM, motivating her to create pathways for other Black youths to enter the tech field while honoring the values of perseverance and community she inherited.
attributes:
