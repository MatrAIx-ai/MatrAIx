  hobbies: '["Yoga and guided meditation","Reflective journaling","Cooking nutritious meals (with cultural influences)","Balcony herb gardening","Volunteer STEM tutoring for middle‑school students","Reading
    mystery and historical fiction","Sudoku and puzzle solving","Short nature hikes"]'
  career_goals: Donna aims to progress to a senior systems analyst role within the next three years, eventually moving into IT project management or a specialized cloud architecture position. She plans
    to earn certifications such as PMP, ITIL Expert, and possibly a cloud credential (AWS or Azure) to broaden her expertise. Recognizing her heightened emotional reactivity, she also seeks workplaces that
    prioritize mental‑health support and team cohesion, hoping to lead initiatives that embed structured stress‑management practices into project workflows. Long‑term, she envisions a leadership role where
    she can mentor emerging black women in tech and champion inclusive, structured processes that improve both system reliability and employee wellbeing.
