personas:
  professional: Leng Yu, a 21‑year‑old apprentice cabinetmaker, blends meticulous hand‑tool joinery with a spontaneous, art‑driven design process, skillfully turning reclaimed timber into functional art
    while they often sidestep strict deadlines in favor of experimental sketches and collaborative workshop dynamics.
  sports: Leng Yu, on weekends, hits the Riverside County trails for hikes and mountain biking, plays intramural soccer with the Riverside FC club, and follows the LA Dodgers for baseball, and they use
    the seasonal rhythm of outdoor activity to balance the sedentary nature of workshop work.
  arts: Leng Yu, between sketching furniture and browsing contemporary galleries, draws inspiration from artists like Olafur Eliasson, Banks Banks, and the kinetic installations of Tatsuo Miyajima, while
    they relax with ukulele renditions of indie folk songs by Sufjan Stevens and The Tallest Man on Earth.
  travel: Leng Yu, preferring a blend of adventure and design research, has trekked to Joshua Tree and the redwoods, dreams of exploring sustainable furniture studios in Copenhagen and the marble quarries
    of Carrara, and they plan trips around flexible itineraries that allow spontaneous photo sessions of natural textures.
  culinary: Leng Yu, in the kitchen, experiments with traditional family recipes—spicy soy‑based stir‑fries, fragrant lemongrass soups, and hand‑rolled dumplings—while they master the art of grilling cedar‑plank
    salmon and pairing dishes with locally sourced heirloom tomatoes and shiitake mushrooms.
  core: Leng Yu, a 21‑year‑old aspiring master cabinetmaker, balances a restless creative curiosity with a habit of procrastinating deadlines, and they are often found sketching furniture late into the
    night while humming ukulele chords.
background:
  cultural: Leng was raised in a bilingual household by Chinese immigrant parents in Southern California. He grew up speaking Mandarin (or Cantonese) at home while attending English‑medium schools, giving
    him a blended cultural perspective. He celebrates Lunar New Year, the Mid‑Autumn Festival, and other traditional customs, and he draws inspiration from Chinese craftsmanship—such as the emphasis on
    natural wood beauty and minimalist elegance. This heritage merges with the laid‑back, innovation‑driven vibe of California, shaping his appreciation for both traditional aesthetics and modern, sustainable
    design.
attributes:
  skills: '["Cabinetmaking", "Bench carpentry", "Fine wood joinery (dovetail, mortise‑and‑tenon)", "Hand‑tool operation", "Power‑tool safety and maintenance", "Furniture design & sketching", "Material selection
    & finishing", "Creative problem solving", "Basic CNC routing", "Team collaboration & workshop communication"]'
  hobbies: '["Sketching and concept drawing", "Visiting art galleries and museums", "Nature photography (textures, wood grain)", "Hiking and outdoor exploration", "Cooking Asian cuisine", "Playing the ukulele",
    "Tai chi practice", "DIY small‑scale woodworking projects"]'
  career_goals: Leng aims to become a master artisan and eventually open his own sustainable custom‑furniture studio in Riverside County, where he can blend East Asian aesthetic principles with contemporary
    Californian design. He plans to earn a journeyman certification, develop a signature line of eco‑friendly pieces that incorporate reclaimed wood and artistic detailing, and mentor younger apprentices.
    His long‑term ambition is to be recognized for innovative, art‑infused furniture that balances functionality, cultural heritage, and environmental responsibility.
