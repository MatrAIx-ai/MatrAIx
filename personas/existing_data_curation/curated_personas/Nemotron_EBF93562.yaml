  career_goals: Randy aspires to blend his love for art and technology by pursuing a career in video game design or interactive media production. He hopes to study computer science and visual arts at a
    university with a strong interdisciplinary program, eventually working as a game developer, creative technologist, or multimedia artist. In the shorter term, he aims to win regional coding competitions,
    create a portfolio of digital artwork, and take on leadership roles in his school's media club. He also envisions mentoring younger students in both tech and the arts, reflecting his cooperative yet
    assertive personality.
