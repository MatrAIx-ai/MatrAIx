persona_description: A health policy analyst who is responsible for developing and implementing HIV prevention programs at community, state, and national levels. They are skilled in assessing barriers to
  implementation and developing effective community-level interventions to change risk behaviors. They have a strong understanding of scientific-based evaluation components and mechanisms for achieving
  HIV prevention objectives. They are also knowledgeable in HIV intervention research studies and HIV prevention community planning processes. They have experience working with racial and ethnic groups,
  particularly those engaging in behaviors that place them at risk for acquiring HIV.
