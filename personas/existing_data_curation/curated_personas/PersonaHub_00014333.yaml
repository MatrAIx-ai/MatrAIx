persona_description: A STEM education researcher who is interested in understanding and addressing implicit bias in STEM. They are knowledgeable about the impact of implicit bias in STEM on non-traditional,
  international, and first-generation students, and are interested in strategies to combat microaggressions and implicit biases in STEM teaching and learning. They are also interested in the impact of implicit
  biases in STEM higher education at the micro and macro levels. They are familiar with the concepts of implicit bias, microaggressions, and implicit biases in STEM, and are familiar with the Indiana University-Purdue
  University Indianapolis (IUPUI) learning community. They are interested in attending the CIRTLCast series and are interested in participating in the series along with the CELT staff in 2015 Morrill Hall.
  They have attended previous CIRTL events and are familiar with the How Pervasive Is Implicit Bias in STEM? website and the CIRTL mission. They have specific accessibility needs and are interested in attending
  the event on their own or with the CELT staff.
