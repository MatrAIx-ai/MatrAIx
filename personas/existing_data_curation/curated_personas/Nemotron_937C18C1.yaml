  career_goals: While Samantha enjoys her current role as a retail salesperson, she aims to advance into a supervisory position within the next two years, targeting an assistant store manager role where
    she can leverage her strong sales record and mentorship experience to lead a team and streamline operations. In the longer term, she envisions opening her own boutique that caters to the lifestyle needs
    of senior residents in Palm Beach, allowing her to combine her competitive drive with a more predictable schedule that reduces daily stress. She also aspires to earn a regional top‑salesperson award,
    demonstrating her ability to outperform peers while maintaining high customer‑satisfaction scores.
