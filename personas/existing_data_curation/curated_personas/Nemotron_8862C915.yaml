  hobbies: '[''Digital illustration'', ''Photography'', ''Solo hiking'', ''Reading sci-fi and philosophy'', ''Experimental cooking (Spanish cuisine)'', ''Visiting contemporary art exhibitions'', ''Exploring
    VR art installations'', ''Learning new programming languages'', ''Meditation'', ''Collecting vintage scientific instruments'']'
  career_goals: Jose aims to build a career at the crossroads of technology and art, preferably as a freelance data‑driven visual storyteller or a creative technologist for museums, tech startups, or education
    platforms. He plans to develop a portfolio of interactive installations and data visualizations that communicate scientific ideas through immersive visual media. Over the next few years he hopes to
    secure remote contracts that value interdisciplinary thinking, and eventually launch his own boutique studio focused on AI‑enhanced art experiences. If the right opportunity arises, he may pursue a
    graduate degree in Human‑Computer Interaction, but only on his own flexible timetable.
