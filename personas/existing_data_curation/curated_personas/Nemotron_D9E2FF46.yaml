  hobbies: '[''Playing basketball'', ''Listening to merengue, bachata, and reggaeton'', ''Dancing'', ''Competitive video gaming (multiplayer)'', ''Creating mixtapes/rap verses'', ''Skateboarding'', ''Cooking
