  career_goals: Juan aims to finish high school and enroll in a community college program that leads to a career in community outreach or social services, where he can use his multilingual abilities and
    people‑skills to help other youth. He also hopes to obtain a certification in electrical work or IT support as a stable backup option. Long‑term, he envisions becoming a youth mentor or a program coordinator
    for a nonprofit that serves the Dominican diaspora in Brooklyn, while also keeping the possibility of playing basketball at a collegiate level.
