personas:
  professional: Juan Lazo, an aspiring community‑outreach junior who blends their bilingual fluency and natural knack for rallying peers into leading school study groups and neighborhood basketball pick‑ups,
    aims to translate that hands‑on experience into a future role coordinating youth programs while keeping a practical eye on earning an IT support certification as a fallback.
  sports: Juan Lazo, a high‑school junior who spends afternoons shooting hoops at the local Brooklyn court and skateboarding at the nearby skate park, cheers loudly for the Brooklyn Nets and follows the
    New York Knicks, and they channel their energy into a competitive pickup league while occasionally skipping workouts when stress piles up.
  arts: Juan Lazo, an avid mixtape maker who blends reggaeton beats from Bad Bunny and classic bachata rhythms of Romeo Santos into rap verses inspired by Kendrick Lamar, spends weekends dancing to merengue
    and binge‑watching comedy series like Brooklyn Nine‑Nine and The Office, and they often cite the humor of Ali Wong as a creative spark.
  travel: Juan Lazo, a spontaneous traveler who has visited the family’s island home and explored New York’s cultural districts with friends, dreams of backpacking through Spain’s coastal towns but prefers
    low‑cost group trips over meticulous itineraries, and they often rely on last‑minute flight deals to stretch their modest savings.
  culinary: Juan Lazo, an energetic home cook who skillfully prepares mangú with sautéed onions and crispy empanadas stuffed with spiced beef and cheese, loves experimenting with plantain‑based dishes and
    occasionally blends in pizza night with friends, and they consider their kitchen a stage for family gatherings.
  core: Juan Lazo, a socially‑charged teen who balances a love for basketball, beats, and community service with a tendency to worry and a habit of juggling structure and spontaneity, makes every day feel
    like a mixtape of organized hustle and last‑minute improvisation for them.
background:
  cultural: Juan is a second‑generation Dominican American raised in Brooklyn’s vibrant Dominican community. At home, Spanish is spoken alongside English, and family gatherings often feature Dominican foods,
    music, and celebrations such as Independence Day on February 27th. He attends a local Catholic church with his family and participates in cultural events like the Annual Dominican Heritage Festival.
    These experiences have given him a strong sense of pride in his heritage, while also navigating the multicultural environment of New York City.
