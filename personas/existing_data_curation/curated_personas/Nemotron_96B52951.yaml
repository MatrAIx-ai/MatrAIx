personas:
  professional: Maria Delia, a budding Python coder and data‑visualization hobbyist, blends curiosity with practicality by creating school project dashboards with methodical precision, while they channel
    their competitive edge into leadership roles in debate and chess clubs.
  sports: Maria Delia enjoys playing pickup basketball at the local Staten Island high school gym, follows the New York Knicks and the Staten Island Vipers youth basketball league, and maintains fitness
    through weekend runs in Clove Lakes Park, though they often prefer solo sketching over team sports.
  arts: Maria Delia immerses themselves in watercolor scenes of the Staten Island shoreline, draws inspiration from artist Yuko Shimizu and musician Sufjan Stevens, and attends community theater productions
    of Our Town, letting indie folk and lo‑fi beats soundtrack their creative sessions.
  travel: Maria Delia dreams of a weekend road trip to the Finger Lakes for lake‑side kayaking, has already visited the historic streets of Boston during a school field trip, and hopes to someday explore
    Kyoto’s bamboo forest, as they prefer meticulously planned itineraries over spontaneous wanderings.
  culinary: Maria Delia prefers simple yet vibrant meals, often whipping up avocado toast topped with cherry tomatoes and feta while listening to lo‑fi playlists, and relishes the occasional sushi roll
    with salmon, cucumber, and a dash of wasabi, though they still struggle to perfect their own ramen broth.
  core: Maria Delia balances a methodical, competitive mind with artistic sensitivity, turning anxiety into structured journaling while they chase creative projects and modest financial independence.
background:
  cultural: Maria’s family is primarily of Irish and Italian descent, reflecting the common heritage of many Staten Island residents, but she identifies strongly as an American. Growing up in a diverse
    New York City borough, she has been exposed to a mix of suburban and urban cultural influences, celebrating mainstream holidays like Thanksgiving and Independence Day while also partaking in family
    traditions such as St. Patrick’s Day gatherings and Italian holiday meals. Her community’s multicultural environment has fostered an appreciation for different perspectives, which she integrates into
    her school projects and civic engagements.
