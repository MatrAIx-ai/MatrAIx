  career_goals: Maria aims to combine her love of science and her methodical nature by pursuing a career in environmental science or urban planning, focusing on sustainable solutions for New York City’s
    neighborhoods. She also harbors an ambition to become a documentary filmmaker or investigative journalist, hoping to use storytelling to raise awareness about community and ecological issues. In the
    short term, she plans to earn scholarships for STEM programs, secure internships with local environmental NGOs, and develop a robust portfolio of research and multimedia projects that showcase her competitive
    drive and practical problem‑solving skills.
