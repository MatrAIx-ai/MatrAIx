persona_description: A terrorism scholar with expertise in analyzing and understanding terrorism, its historical and sociopolitical contexts, and the challenges faced by liberal democratic states in countering
  terrorism. They are a Research Manager at the Centre for Asymmetric Threat Studies (CATS) and Associate Professor of Political Science at Åbo Akademi University, with a background in terrorism, counterterrorism,
  violent extremism, and the politics of the Middle East. Their research focuses on terrorism, counterterrorism, violent extremism, and the politics of the Middle East, and they have published extensively
  on these topics. They are an elected member of the Royal Swedish Academy of War Sciences.
