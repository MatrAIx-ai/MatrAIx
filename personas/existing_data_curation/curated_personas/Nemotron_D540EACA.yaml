  hobbies: '[''Recreational soccer'', ''Salsa dancing and instruction'', ''Cooking traditional Mexican cuisine'', ''Gardening (chilies, tomatoes, cactus)'', ''Volunteer English tutoring'', ''DIY home improvement
    projects'']'
  career_goals: Looking ahead, Mauricio aims to obtain the APICS Certified Production and Inventory Management (CPIM) credential within the next two years, positioning himself for a senior planner or operations
    analyst role. He is motivated to lead small cross-functional improvement teams, mentor younger staff, and eventually launch a part-time consulting practice that helps local manufacturers adopt more
    flexible, cost-effective scheduling methods. He also hopes to secure a stable retirement that allows him to spend more time on his family's ranch in the Mexican countryside while still contributing
    his expertise to community-based workforce training programs.
