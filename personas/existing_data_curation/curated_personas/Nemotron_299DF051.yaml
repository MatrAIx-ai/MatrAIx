  career_goals: Although retired, Anh Nikki aims to remain an active cultural conduit. She plans to mentor younger teachers and volunteers at the local community center, ensuring her pedagogical experience
    benefits new generations. She aspires to launch a recorded oral‑history series that preserves the narratives of Southeast Asian elders in Hawai‘i, and to curate a small exhibition showcasing Vietnamese
    diaspora art. Publishing a memoir that weaves together her family’s immigration story with her personal reflections is another long‑term goal. Additionally, she seeks to strengthen senior‑friendly services
    by advocating for improved accessibility at the Bishop Museum and local senior centers.
