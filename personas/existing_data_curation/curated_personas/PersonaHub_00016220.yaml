persona_description: A historian or a researcher who is interested in the history of the Jewish community in Liepāja during World War II and the Soviet occupation. They are knowledgeable about the economic,
  social, and cultural changes that occurred during this time period, including the rise of antisemitism among the Latvian Christian population. They are also familiar with the activities of political parties
  and youth groups, as well as the adaptation of the Yiddish school to the Soviet educational syllabus. They have a keen interest in the experiences of the Jewish community in Liepāja and are eager to learn
  more about the events that took place during this period.
