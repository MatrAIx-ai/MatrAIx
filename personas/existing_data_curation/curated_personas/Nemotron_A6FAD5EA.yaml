personas:
  professional: Ashraf Pulling, a budding robotics enthusiast, leverages their meticulous nature and love for schematics to design and program autonomous bots for the school’s robotics club, a discipline
    honed by the structured routine of weekly Mass at the local Catholic parish, and they approach each challenge with the disciplined routine of a seasoned engineer.
  sports: Ashraf Pulling swims three times a week with the Mckeesport YMCA swim team, follows a strict lap schedule, cheers on the Pittsburgh Steelers and Penguins while also supporting the local McKeesport
    Tigers high‑school basketball squad, and they volunteer as a water safety monitor during the town’s annual Fourth of July swim event, treating their training regimen with the same systematic precision
    they apply to their LEGO builds.
  arts: Ashraf Pulling channels their creative impulse into intricate LEGO architecture and model train layouts while also enjoying classic rock icons like The Beatles and Pink Floyd, and they often listen
    to folk music performed during Polish Heritage Day celebrations and occasionally attend the community theater’s productions of classic plays, finding inspiration for their next engineering project.
  travel: Ashraf Pulling prefers well‑planned, family‑guided trips that blend educational stops with familiar routines, having explored the historic steel museums of Pittsburgh, taken a weekend to Washington,
    D.C.’s National Air and Space Museum, and they dream of a future pilgrimage to the historic castles of Eastern Europe during a school exchange program, all while staying within a modest budget.
  culinary: Ashraf Pulling enjoys helping their family prepare pierogi stuffed with potatoes and cheese, also loves a perfectly crisp mac and cheese made with sharp cheddar, and they, though still at a
    middle‑school skill level, pride themselves on mastering the precise timing required for baking their favorite LEGO‑themed cake.
  core: Ashraf Pulling is a disciplined, routine‑loving teen who turns their passion for order into robotics, LEGO, and swimming, yet they occasionally derail their schedule by staying up late scrolling
    through strategy forums.
background:
  cultural: Ashraf was raised in Mckeesport, Pennsylvania, a town historically shaped by the steel industry and a close‑knit working‑class community. His family’s ancestry includes Eastern European roots—primarily
    Polish and Slovak—reflecting the wave of immigrants who settled in western Pennsylvania in the early 20th century. Though the town’s industrial base has declined, the values of hard work, reliability,
    and community support remain strong. Ashraf’s household celebrates traditional holidays such as Polish Heritage Day and attends a local Catholic parish, where the emphasis on education and service is
    reinforced. The community’s strong high‑school sports culture, local volunteer initiatives, and a shared pride in rebuilding the area’s infrastructure subtly influence his outlook and aspirations.
attributes:
  skills: '[''Mathematics (algebra & geometry)'', ''Basic Python programming'', ''Microsoft Office proficiency'', ''Time management'', ''Organizational planning'', ''Basic carpentry'', ''Team coordination'']'
  hobbies: '[''LEGO building'', ''Model train assembly'', ''Robotics club'', ''Chess'', ''Swimming'', ''Reading non-fiction (engineering & history)'', ''Community clean‑up volunteering'']'
  career_goals: Ashraf aspires to attend a STEM‑focused high school and later earn a degree in mechanical engineering. He envisions himself working on the design and production of sustainable energy technologies,
    with a long‑term goal of becoming a project manager who oversees complex engineering projects. He is also attracted to the structured environment of the U.S. Navy, where he could serve as a logistics
    officer, combining his love of organization with a sense of service. Ultimately, Ashraf wants to contribute to revitalizing his hometown’s infrastructure while continuing to set high personal standards
    for achievement.
