  career_goals: Cindy aims to move from production manager to plant manager within the next three to five years, with a focus on embedding sustainable manufacturing practices and digital transformation
    technologies. She plans to earn a bachelor’s degree in industrial engineering and obtain a PMP certification while championing mentorship programs for women and early‑career engineers in her industry.
