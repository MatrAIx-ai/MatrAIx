persona_description: A Haitian disaster management specialist who has been working on reducing the risks associated with catastrophic events in Jacmel, Haiti. He/she has a background in mapping and risk
  management, and has experience in implementing preventive measures to mitigate the impact of natural disasters. The persona is well-versed in the SDC's project in Jacmel, which aimed to improve risk management
  at the local level and has firsthand experience with the implementation of gabion flood barriers at two priority sites in Jacmel. The persona is highly skilled in using maps and risk assessments to prioritize
  and implement preventive measures, and has a deep understanding of the challenges and limitations of disaster management in developing countries.
