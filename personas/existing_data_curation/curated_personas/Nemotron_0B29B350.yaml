  career_goals: Michael aims to complete his associate's degree in Business Administration within the next year, then secure a position as a logistics coordinator for a regional distribution firm, where
    he can blend his organizational skills with his interest in transportation. In the longer term, he plans to launch his own mobile auto‑repair service, leveraging his mechanical know‑how and customer‑service
    background. He also hopes to develop a small team of technicians, positioning the venture as a reliable, community‑focused business. Alongside his professional aspirations, Michael wants to earn a Project
    Management Professional (PMP) certification to formalize his project‑management expertise.
