  career_goals: In her imaginative play, Lisa frequently declares she wants to become a teacher so she can share storybooks, an artist to create big, bright paintings, and a veterinarian to care for the
    farm animals she sees around Atwater. Her competitive streak surfaces when she says she will be the "best" at these jobs, and her natural curiosity drives her to explore many possibilities, from caring
    for animals to making art that surprises others.
