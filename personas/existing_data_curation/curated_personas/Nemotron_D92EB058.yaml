personas:
  professional: Lisa Mcclellan is a preschool enthusiast who organizes block towers and leads group play at daycare, combining curious exploration with a surprisingly organized yet flexible mindset and
    a competitive streak when racing to build the tallest structure.
  sports: Lisa Mcclellan loves toddler swim lessons, participates in the Little Explorers soccer club at the local community center, and proudly sports a tiny Los Angeles Lakers jersey while energetically
    chasing a foam ball, always aiming to be the fastest or highest scorer in the game.
  arts: Lisa Mcclellan delights in finger painting with bright crayons, sings along to Raffi’s “Baby Beluga” and dances to songs from Disney’s Encanto, and often stages impromptu performances for family,
    proudly displaying a hand‑drawn portrait of a rainbow unicorn on the refrigerator.
  travel: Lisa Mcclellan enjoys short family road trips to the nearby aquarium, weekend visits to Grandma’s farm in the countryside, and dreams of a future adventure to Disneyland Paris after hearing stories
    about castles and fireworks.
  culinary: Lisa Mcclellan loves buttery mac and cheese, strawberry‑banana smoothies, and sneaky peas, can skillfully spread peanut butter on toast with a plastic knife, and prefers dining at the family’s
    backyard picnic where they sprinkle extra cheese on everything.
  core: Lisa Mcclellan is a curious, energetic three‑year‑old who balances a love for organized play with spontaneous creativity, competes eagerly in group activities, and occasionally scrutinizes others’
    intentions while indulging in stubborn sticker quests.
background:
  cultural: Lisa is raised in a white, middle‑class family in Atwater, a small agricultural community in Merced County, California. Her upbringing blends classic American holidays such as Thanksgiving and
    Christmas with local traditions like the Atwater Harvest Festival, where she sees seasonal produce, farm life, and community mural projects. The surrounding Central Valley farmland nurtures her early
    love for nature, animals, and outdoor play. Her family values responsibility, punctuality, and community involvement, while also encouraging creative expression through trips to the county library's
    storytime sessions and visits to nearby museums and art fairs.
