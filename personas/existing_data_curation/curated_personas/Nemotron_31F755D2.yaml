personas:
  professional: Theresa Rofe is a retired civil engineer turned community‑education champion who leverages her analytical and project‑management expertise to run senior‑center STEM workshops, mentor high‑school
    girls in math, and spearhead an oral‑history archive for Zionsville, all while infusing her methodical style into grant writing and event planning.
  sports: Theresa Rofe follows the Indiana Pacers and Indianapolis Colts with devotion, attends a sunrise senior yoga class, participates in a weekly walking club that explores historic town trails, and
    treats bridge tournaments as a mental sport that sharpens strategic thinking.
  arts: Theresa Rofe delights in community‑theater productions of classics like 'Our Town', sings along to folk songs by Pete Seeger during book club meetings, collects quilts featuring designs by Gee’s
    Bend artists, and frequently cites Maya Angelou’s poetry while presenting genealogical findings.
  travel: Theresa Rofe enjoys day‑trip pilgrimages to historic sites such as Colonial Williamsburg and the National Museum of American History in Washington, D.C., often travels with her book club to literary
    festivals in Savannah, and dreams of a leisurely cruise along the Scottish coast to trace her ancestors’ migration path.
  culinary: Theresa Rofe favors baking her signature rosemary‑infused focaccia and classic apple‑cinnamon pie using heirloom apples from a neighbor’s orchard, excels at preparing a shared potluck of chicken
    noodle soup seasoned with fresh thyme from her garden, yet occasionally forgets to treat herself to a chocolate indulgence.
  core: Theresa Rofe is a methodical, sociable octogenarian who blends a love of structured projects with lively community storytelling, never misses a bridge game, and can’t resist buying extra rose seedlings
    even when her budget whispers otherwise.
background:
  cultural: Theresa grew up in a Midwestern white family with German and Irish ancestry, steeped in the values of hard work, neighborly responsibility, and modest self‑reliance that characterize Indiana’s
    small‑town culture. Her upbringing emphasized church involvement, community festivals, and a strong emphasis on education, especially in the sciences. These cultural threads have shaped her practical
    outlook, her commitment to service, and her comfort as a familiar, energetic presence in local gatherings.
