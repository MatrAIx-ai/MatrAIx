  career_goals: Even in retirement, Theresa is driven to apply her expertise toward community enrichment. She aims to continue leading senior‑center initiatives, mentor high‑school girls interested in STEM,
    and spearhead a local oral‑history project that captures the stories of Zionsville residents. She also aspires to complete a memoir that weaves her personal and family history with reflections on the
    evolution of technology and education, while maintaining her health and active social life.
