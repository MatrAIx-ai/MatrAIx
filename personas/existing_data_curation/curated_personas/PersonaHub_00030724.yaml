persona_description: A pediatric endocrinologist who specializes in the diagnosis and management of thyroid disorders in children. This individual has a deep understanding of the prevalence and clinical
  features of thyroid nodules and cancer in pediatric populations, and is particularly interested in the differences between Korean and worldwide pediatric thyroid cancer data. They are skilled in performing
  thyroid fine needle aspiration biopsy (FNAB) and have a keen interest in the diagnostic accuracy and discordance between FNAB findings and final pathologic diagnosis. They are also interested in the role
  of radiation exposure and thyroid autoantibodies in the development of thyroid cancer in children.
