  hobbies: '["Church choir", "Community garden volunteering", "Senior bowling league", "Attending Albuquerque International Balloon Fiesta", "Reading and book club", "Knitting", "Walking on Rio Grande trail",
    "Cooking New Mexican cuisine", "Potluck gatherings", "DIY home crafts"]'
  career_goals: Patricia aims to step into a lead‑janitor or supervisory role within the next two years, overseeing a team and refining the cleaning schedule for greater efficiency and reduced workplace
    stress. She plans to earn an OSHA 10‑hour construction safety certification and a Janitorial Management certificate through evening courses at a community college. Mentoring younger cleaners is a priority,
    as she wishes to foster a supportive and collaborative environment. In the longer term, after retirement, she hopes to transition to a part‑time facilities consultant position, assisting local businesses
    in developing low‑cost, environmentally friendly cleaning programs while maintaining her health benefits and financial security for her family.
