personas:
  professional: Patricia Galiyas, a 59‑year‑old veteran of commercial cleaning and building maintenance, they leverage their three decades of expertise in scheduled deep‑sanitisation, inventory control,
    and OSHA‑compliant safety while channeling their love for structure and people‑oriented spirit into mentoring junior staff and meticulously planning shift rosters, even as they worry about meeting every
    deadline.
  sports: Patricia Galiyas, a dedicated member of a seniors’ bowling league at Albuquerque Family Bowling Center, they root for the Albuquerque Isotopes during spring baseball, enjoy cheering on the New
    Mexico Lobos basketball team each winter, and maintain a steady low‑impact fitness routine by walking the Rio Grande trail with their friends, even though they sometimes doubt keeping up with the league’s
    competitive standards.
  arts: Patricia Galiyas, an enthusiastic alto in her church choir, they find artistic inspiration in the folk melodies of Al Hurricane and the vibrant performances by Los Lobos at the Southwest Folk Festival,
    regularly read Cormac McCarthy’s novels and watch classic films starring Rita Moreno, and despite their busy schedule, they occasionally worry about falling behind on their book‑club reading list.
  travel: Patricia Galiyas prefers well‑planned, group‑focused trips that blend relaxation with cultural immersion, they enjoy annual weekend escapes to Santa Fe’s historic plaza and summer visits to the
    Grand Canyon, they have a long‑standing dream of touring Spain’s Andalusian villages in spring, and they carefully budget their travel to safeguard their retirement fund, though they sometimes overpack
    their suitcase with souvenirs.
  culinary: Patricia Galiyas, a skilled home cook, they regularly prepare New Mexican green chile stew using Hatch chiles, roasted pork, and homemade corn masa, delight in sharing the dish at potluck gatherings,
    occasionally treat themselves with fresh sopapillas drizzled in honey, and while they enjoy experimenting with spice levels, they sometimes double‑check the seasoning to the point of over‑salting.
  core: Patricia Galiyas, a 59‑year‑old facilities veteran, they blend meticulous planning with a love for community choir, knitting, and gardening, all while battling a chronic worry habit that makes them
    double‑check every detail, even when the day’s chores are already behind schedule.
background:
  cultural: Patricia is a lifelong resident of Albuquerque, embodying the rich cultural tapestry of the American Southwest. Raised in a middle‑class, Anglo‑American family with strong Catholic roots, she
    values community service and harmonious relationships. Living in New Mexico has immersed her in a blend of Hispanic and Native American traditions; she enjoys celebrating local holidays such as Cinco
    de Mayo, the feast of Saint James, and the annual Balloon Fiesta. Her daily interactions with Spanish‑speaking neighbours and tenants have given her basic conversational Spanish skills. She appreciates
    regional cuisine, especially dishes featuring roasted green chile, and respects the Pueblo peoples' deep connection to the land. Her cultural identity weaves together traditional Midwestern family values
    with the relaxed, multicultural vibe of Albuquerque.
