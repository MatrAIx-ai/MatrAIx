  career_goals: Juan aims to attend a specialized high-school program that blends visual arts and technology, eventually studying computer science or visual arts at a top university. His long-term ambition
    is to become a concept artist and interactive media developer for video games or animated films, creating immersive worlds that reflect his love of abstract ideas. He also envisions contributing to
    innovative projects that merge storytelling with AI, allowing him to stay intellectually curious while maintaining a structured work schedule that helps manage his stress.
