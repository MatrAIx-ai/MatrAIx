personas:
  professional: Juan Torres is an aspiring junior game developer who combines a methodical approach to coding challenges on Scratch with a vivid imagination for designing fantastical creature assets, channeling
    his love of chess puzzles into strategic game mechanics.
  sports: Juan Torres participates in his middle school soccer league each fall and attends a local community center’s after‑school basketball clinic, cheering for the Los Angeles Lakers while using a smartwatch
    to log daily steps and occasional jogs that help him unwind from screen time.
  arts: Juan Torres immerses himself in digital illustration, drawing inspiration from artists like H.R. Giger and the surreal worlds of Studio Ghibli, while listening to the ambient compositions of Brian
    Eno and the minimalist piano of Nils Frahm during his creative sessions.
  travel: Juan Torres dreams of exploring the neon‑lit streets of Tokyo and the ancient ruins of Machu Picchu, yet his current travel history is limited to annual visits to nearby state parks and a family
    road trip to the Grand Canyon, where he sketched the landscape in his journal.
  culinary: Juan Torres prefers simple yet flavorful meals, often cooking spaghetti carbonara with pancetta and Parmesan, topping his creations with a dash of smoked paprika, and indulging in occasional
    sushi rolls featuring avocado and tempura shrimp.
  core: Juan Torres is a hyper‑imaginative, meticulously organized teen whose solitary creative pursuits are balanced by a competitive edge and a restless mind that worries over the smallest details.
background:
  cultural: Juan was raised in a Spanish-heritage household where both Castilian Spanish and American customs blend. Family gatherings often feature traditional dishes such as paella, gazpacho, and churros,
    and they celebrate holidays like Día de los Reyes and Semana Santa with a Catholic reverence. Growing up in Aliso Viejo, he is also influenced by Southern Californian culture—beaches, multicultural
    festivals, and a strong emphasis on bilingual education. This mix of Mediterranean roots and West-Coast openness shapes his worldview, fuels his artistic sensibilities, and reinforces the value he places
    on discipline and family.
