  hobbies: '["building block towers", "drawing/coloring", "singing Mexican lullabies", "dancing to music", "playing at the park", "sandbox play", "helping in the kitchen", "listening to storybooks"]'
  career_goals: Luis dreams of becoming a firefighter who helps people, an astronaut who explores space, and a teacher who shares stories. He enjoys hearing about big jobs from his parents and often pretends
    to rescue toys or explore "planets" in the backyard. His ambition is to grow up caring for others and learning new things.
