personas:
  professional: Luis Boyd, a three‑year‑old budding builder of block towers at preschool, blends curiosity with practicality by experimenting with different configurations while happily tolerating the mess
    of scattered pieces, and they willingly share their creations with classmates, reflecting their sociable and cooperative nature.
  sports: Luis Boyd, a three‑year‑old who dabbles in preschool soccer with the Little Sprouts Soccer Club and cheers for the hometown baseball team the Chicago Cubs during family outings, prefers spontaneous
    tag games over rigid drills, and they radiate boundless energy while constantly seeking group play, echoing their outgoing and flexible disposition.
  arts: Luis Boyd, a three‑year‑old who spends afternoons drawing bright dinosaurs, dancing to the lively tunes of The Wiggles and Sesame Street, and reenacting favorite characters like Elmo, often splashes
    finger‑paints across the kitchen table, and they channel their creative curiosity into colorful messes that delight peers.
  travel: Luis Boyd, a three‑year‑old who loves family road trips to the sunny shores of Myrtle Beach and weekend visits to Grandma’s farmhouse, eagerly packs a tiny backpack of crayons and a plush dinosaur,
    favors short, adventure‑filled drives over long flights, and they daydream about a future visit to Disneyland.
  culinary: Luis Boyd, a three‑year‑old with a picky palate, adores crispy chicken nuggets with honey‑mustard, creamy mac and cheese, and sweet strawberry slices, proudly stirs batter in a plastic bowl
    but often refuses broccoli, and they relish occasional frozen yogurt topped with rainbow sprinkles as a special treat.
  core: Luis Boyd, a three‑year‑old bundle of curiosity and spontaneity, builds block towers, hoards coins for stickers, battles occasional colds with honey, paints with crayons, and they dream of beach
    adventures, all while keeping a friendly smile for anyone who joins the fun.
background:
  cultural: Luis is raised in a Mexican‑American household in Talking Rock, GA. At home, Spanish is spoken alongside English, and family gatherings feature traditional Mexican dishes like tacos, guacamole,
    and tamales, as well as Southern favorites such as biscuits and sweet tea. He celebrates Mexican holidays such as Día de los Muertos and Navidad, while also participating in local community events like
    the county fair and church picnics. This blend of Mexican heritage and Southern small‑town culture shapes his early worldview, music preferences, and sense of community.
attributes:
  skills: '["simple sentence formation", "basic bilingual vocabulary (English & Spanish)", "block stacking & building", "counting 1‑10", "color and shape recognition", "sharing and cooperative play", "basic
