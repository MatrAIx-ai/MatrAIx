  career_goals: Calvin aims to transition from a technician role into a full‑time product‑development engineer within the next three years, focusing on smart‑hardware and IoT solutions that blend functional
    engineering with sleek aesthetic design. He plans to obtain his Professional Engineer (PE) license and pursue a master’s in robotics or human‑computer interaction to deepen his expertise in AI‑enabled
    devices. Long‑term, he envisions leading an interdisciplinary innovation team at a tech company, securing patents for novel sensor‑fusion architectures, and eventually launching his own startup that
    creates customizable, art‑inspired wearable technology. Mentoring junior engineers and contributing to open‑source hardware projects are also key components of his professional ambition.
