    ''safety compliance'']'
  hobbies: '[''vintage electronics restoration'', ''classic motorcycle rebuilding'', ''home automation projects'', ''woodworking'', ''fishing'', ''hiking'', ''reading engineering non‑fiction'', ''maker’s
    club participation'', ''listening to classic rock and blues'', ''casual chess'']'
  career_goals: Jeremy aims to transition from a senior assembler to a production supervisory role within the next three years, leveraging his extensive hands‑on expertise to lead a team of technicians.
    He plans to obtain a Journeyman Electrician license and formal certification in PLC programming (e.g., Siemens S7 or Rockwell Automation) to qualify for a maintenance‑manager position. Long‑term, Jeremy
    aspires to launch a boutique contract shop focused on custom electromechanical assemblies for regional manufacturers, integrating Industry 4.0 technologies such as IoT sensors and predictive‑maintenance
    analytics. He also seeks to mentor younger workers, sharing his methodical problem‑solving approach and fostering a culture of continuous improvement.
