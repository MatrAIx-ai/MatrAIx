personas:
  professional: Jeremy Vazquez, a veteran electromechanical assembler with over twenty years of experience, leverages his methodical precision and competitive drive to lead complex wiring projects while
    meticulously documenting every step in line with ISO‑9001 standards.
  sports: Jeremy Vazquez enjoys early‑morning fishing on Lake Orion, hikes the trails of Lone Elk County Park, and follows the San Francisco 49ers and Golden State Warriors, while training with the Lone
    Elk Trail Running Club and fitting in weekly strength circuits to maintain the stamina needed for his mechanical work.
  arts: Jeremy Vazquez unwinds by listening to classic rock legends like Led Zeppelin and blues masters such as B.B. King, occasionally tinkering with vintage guitar pedals, and attends the local community
    theater where they appreciate performances by actors like Ian McKellen, blending technical curiosity with artistic appreciation.
  travel: Jeremy Vazquez prefers meticulously planned trips that balance adventure and practicality, having mapped out a road‑trip itinerary through the Pacific Northwest, a fishing expedition to Patagonia’s
    Lake Nahuel Huapi, and a weekend workshop in Tokyo’s Akihabara district to source rare electronic components.
  culinary: Jeremy Vazquez is a competent home chef who favors smoky brisket, rosemary‑infused roasted potatoes, and craft beers, often experimenting with sous‑vide techniques for precision cooking while
    occasionally indulging in a quick, greasy cheeseburger after a long night in the workshop.
  core: Jeremy Vazquez is a calm, methodical maker whose competitive edge fuels a disciplined work ethic, a precise financial ledger, and a penchant for vintage tech, all balanced by solitary hobbies and
    a love for classic rock.
background:
  cultural: Jeremy grew up in Saint Peters, Missouri, a Midwestern suburb with strong manufacturing roots. His family background includes German and Irish ancestry, reflecting the broader ethnic tapestry
    of the region. The local culture, characterized by a solid work ethic, self‑reliance, and modesty, has shaped his practical and organized outlook. Community events such as the St. Peters Riverfest and
    support for the St. Louis Cardinals reflect his connection to regional traditions. While raised in a largely Protestant environment, Jeremy respects diverse religious practices and values the town’s
    emphasis on community service and neighborly interaction. His Midwestern upbringing emphasizes calm resilience, punctuality, and a balanced respect for both individual achievement and collaborative
    effort.
attributes:
  skills: '[''circuit board assembly'', ''electrical harness fabrication'', ''schematic interpretation'', ''PLC programming (Ladder, Structured Text)'', ''multimeter and oscilloscope troubleshooting'',
