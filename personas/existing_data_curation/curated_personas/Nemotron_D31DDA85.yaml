personas:
  professional: An aspiring concept artist, Koni Armstrong blends traditional oil painting techniques with digital illustration tools like Photoshop and Procreate, leveraging their methodical project planning
    and beginner Python skills to prototype generative art concepts while charting a path toward a BFA and a future independent studio.
  sports: On weekends Koni Armstrong joins the Lincoln Trail Runners club for 5‑kilometer jogs across the Nebraska plains, follows the Nebraska Cornhuskers football team with enthusiastic game‑day gatherings,
    and enjoys occasional skateboarding at the local skate park, balancing competition with a relaxed appreciation for outdoor fitness.
  arts: Koni Armstrong immerses themselves in surreal visual expression, drawing inspiration from artists like Salvador Dalí and contemporary illustrators such as Sachin Teng, attends virtual workshops
    featuring guest speakers like James Gurney, and curates a personal playlist featuring Björk and Vangelis while experimenting with oil on canvas and digital sketching in Procreate.
  travel: An avid photographer of expansive horizons, Koni Armstrong has documented sunrise over Chimney Rock, plans a solo trip to Iceland's black sand beaches for its unique light, and prefers budget‑friendly
    road trips across the Midwest, using a meticulously crafted spreadsheet to map out stops, accommodations, and art‑inspired photography locations.
  culinary: Koni Armstrong enjoys cooking simple yet flavorful dishes like mushroom risotto with parmesan and herb‑infused olive oil, frequently snacking on roasted chickpeas while sketching, and indulges
    in specialty coffee drinks from the campus café, often experimenting with latte art that mirrors their abstract painting style.
  core: Koni Armstrong is a fiercely imaginative yet ultra‑organized 19‑year‑old who channels competitive curiosity into surreal art, strategic puzzles, and disciplined budgeting, while occasionally neglecting
    sleep in favor of late‑night creative bursts and obsessively perfecting coffee latte art.
background:
  cultural: Koni grew up in Wayne, a tight‑knit community in Dixon County, Nebraska. Her family’s heritage traces back to German and Scandinavian immigrants who settled the Midwest, fostering a cultural
    blend of practicality, self‑reliance, and appreciation for the open prairie landscape. The modest, values‑driven atmosphere of a small Midwestern town instilled in her a strong work ethic and a respect
    for independent thought. While she was raised with exposure to Lutheran traditions, Koni’s personal identity is shaped more by the region’s emphasis on community support, outdoor activities, and a pragmatic
    approach to life.
