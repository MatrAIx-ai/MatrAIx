  career_goals: Koni aims to pursue a Bachelor of Fine Arts in Illustration or a related interdisciplinary program that blends art and technology. She aspires to become a concept artist for video games
    or animated films, leveraging her unique blend of imagination and technical skill. Long‑term, she hopes to launch her own independent studio where she can lead collaborative art projects and mentor
    other emerging artists. She also considers a parallel path in UI/UX design, using her analytical mindset to create intuitive, aesthetically striking digital experiences.
