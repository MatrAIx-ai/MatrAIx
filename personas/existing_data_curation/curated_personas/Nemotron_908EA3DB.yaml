  hobbies: '[''Historical nonfiction reading'', ''Gardening'', ''Coastal hiking'', ''Kayaking'', ''Woodworking'', ''Amateur photography'', ''Podcast listening (education & history)'']'
  career_goals: Kristopher aims to move into a leadership role within his district, such as department chair or curriculum specialist, where he can shape school‑wide instructional practices. Over the next
    five years, he plans to complete a master's degree in education administration, launch a district literacy initiative, and serve as a mentor for novice teachers. His long‑term ambition is to become
    an assistant principal, using his organized, methodical approach to enhance school climate, support teacher collaboration, and drive measurable academic improvement.
