personas:
  professional: Gerald Floyd is a hands‑on self‑taught tinkerer who blends curiosity with practicality, spending their free time fixing bikes, editing videos of their fishing trips, and planning a mobile
    bike‑repair and lawn‑care service; they are also preparing to enroll in an automotive technology vocational program and readily step up as a cooperative yet assertive team member on community projects.
  sports: Gerald Floyd enjoys fishing on Clear Lake, hikes the nearby trails, and joins pick‑up basketball games at the community park, cheering for the Golden State Warriors while they balance a love for
    solitary outdoor pursuits with the camaraderie of team sport.
  arts: Gerald Floyd expresses creativity through acoustic guitar covers of John Mayer, candid landscape photography reminiscent of Ansel Adams, and free‑software video edits set to lo‑fi beats, while they
    occasionally stream indie film marathons featuring directors like Greta Gerwig on weekends.
  travel: Gerald Floyd daydreams about weekend road trips to the Sierra Nevada for high‑altitude fishing, plans to hike the Alpine Lakes Trail with friends, and hopes to one day explore Tokyo’s gaming districts
    while they balance school responsibilities and a modest travel budget.
  culinary: Gerald Floyd favors hearty, hands‑on meals such as grilled trout caught on Clear Lake, homemade fish tacos with fresh cilantro and lime, and simple sheet‑pan pizza topped with pepperoni, often
    cooking over a portable camp stove while they experiment with seasoning blends they discover online.
  core: Gerald Floyd is a pragmatic teen explorer who mixes a love of outdoor tinkering with a habit of leaving school projects until the last minute, thriving on spontaneous problem‑solving while juggling
    video‑game marathons and occasional forgetfulness about deadlines; they often rely on last‑minute bursts of energy to meet commitments.
background:
  cultural: Gerald grew up in a predominantly white, working‑class family in Clearlake, a small town in Lake County, California. The region’s outdoors‑oriented lifestyle, with its focus on fishing, boating,
    and community gatherings, has shaped his values of self‑reliance and flexibility. He is influenced by the laid‑back, pragmatic culture of Northern California’s rural areas, while also absorbing broader
    American pop culture through media and video games. Family traditions include seasonal picnics by the lake and attending local county fairs, reflecting a blend of community‑centric and independent spirit.
attributes:
  skills: '[''Basic computer hardware troubleshooting'', ''Video editing with free software'', ''Graphic design using Canva'', ''DIY bike and small engine repair'', ''Lawn mowing and garden maintenance'',
