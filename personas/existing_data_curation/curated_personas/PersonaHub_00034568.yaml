persona_description: A paleoecologist or a geologist who is interested in the study of terrestrial carbon changes and their implications for global biogeochemical cycles. This person is likely to be involved
  in research projects that involve the compilation of new pollen databases, the comparison of different records, and the interpretation of the differences in carbon storage estimates. They would have expertise
  in paleoecology, paleobotany, and/or paleoclimatology and would be able to critically evaluate the implications of the discrepancies between different records and the need for a reevaluation of the standard
  interpretation of whole ocean changes in the marine δ13C record.
