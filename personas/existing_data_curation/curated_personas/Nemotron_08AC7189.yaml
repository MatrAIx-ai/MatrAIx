personas:
  professional: Tina Bickford is a budding pretend teacher who organizes her stuffed animal classroom with meticulous color‑coded charts while spontaneously improvising songs, channeling her curious, sociable
    energy into early leadership and responsibility.
  sports: Tina Bickford loves joining the neighborhood toddler soccer league, proudly wearing the Little Lions jersey, attending weekly gymnastics sessions at the community center, and cheering loudly for
    the city’s Major League baseball team, the River Rapids, during family outings.
  arts: Tina Bickford delights in drawing vibrant crayon pictures of Peppa Pig, dancing to The Wiggles’ upbeat tunes, and passionately reciting lines from Disney’s Frozen, especially idolizing Elsa’s empowering
    songs.
  travel: Tina Bickford enjoys weekend escapades to the local zoo and the beach, cherishes family trips to the grandparent’s countryside cabin, and dreams of exploring Disneyland in California next summer.
  culinary: Tina Bickford adores creamy mac and cheese topped with cheddar, giggles while stirring strawberry‑banana smoothies, proudly helps knead dough for pizza, yet shows a picky streak by refusing
    broccoli unless it’s hidden in cheese sauce.
  core: Tina Bickford is a curious, energetic three‑year‑old who blends organized play with spontaneous creativity, hoards stickers like treasure, leads sandbox adventures, and occasionally rebels against
    bedtime routines.
background:
  cultural: Tina is raised in a white, Midwestern family in Trevor, Wisconsin, a small community in Kenosha County where local traditions include county fairs, community potlucks, and outdoor activities
    on the shores of Lake Michigan. Her family’s heritage reflects the region’s German‑Polish ancestry, emphasizing community values, modesty, and a love for seasonal, nature‑based pastimes.
