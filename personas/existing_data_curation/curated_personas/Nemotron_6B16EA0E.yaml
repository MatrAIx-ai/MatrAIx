personas:
  professional: John Maldonado is a curious three-year-old who spends hours assembling colorful building blocks, showing an early knack for spatial reasoning and nascent architectural design, balancing
    meticulous organization with playful experimentation while reliably following simple instructions.
  sports: John Maldonado loves indoor soccer at the Maple Grove Mini Strikers club, proudly wearing the team's jersey, participates in toddler gymnastics at the Bright Steps studio, and balances energetic
    bursts of play with a routine of stretching that helps manage their occasional stress.
  arts: John Maldonado delights in finger painting and animated classics like 'Moana' and 'Coco', often humming the songs and attempting to recreate the vivid scenes with crayons, showcasing a deep appreciation
    for art and a curiosity for new storytelling styles.
  travel: John Maldonado enjoys family outings to the nearby beach town of Oceanview, where they build sandcastles, and dreams of exploring the towering redwood forests of California, preferring trips that
    mix familiar routines with a splash of adventurous discovery.
  culinary: John Maldonado prefers soft peanut butter and banana sandwiches, adores mac and cheese, helps stir batter for blueberry muffins, yet displays a picky habit of turning away new foods unless they
    are presented with a colorful plate.
  core: John Maldonado is a three-year-old whirlwind of curiosity, balancing meticulous play with occasional worry, thriving on art, structure, and spontaneous discovery while sometimes succumbing to selective
    stubbornness.
background:
  cultural: John is raised in a middle‑class, white New England family in Plantsville, Connecticut, with roots that blend Irish and Italian heritage. His household celebrates traditional holidays such as
    Thanksgiving and Christmas with family recipes like roast turkey, homemade stuffing, and classic New Haven‑style pizza for festive gatherings. The family attends a local Catholic parish, where he participates
    in early childhood religious education classes and occasional community festivals like the Plantsville Harvest Fair. He goes to a nearby preschool that emphasizes arts and crafts, giving him frequent
    opportunities to explore drawing, music, and storytelling. The community’s proximity to New Haven’s museums and galleries provides regular field trips that nurture his appreciation for visual art, while
    the regional emphasis on education and routine helps him develop the balance between organization and flexibility described in his personality.
