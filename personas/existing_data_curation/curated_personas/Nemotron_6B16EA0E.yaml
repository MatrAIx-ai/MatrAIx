  career_goals: John often talks about becoming an artist like the painter he saw in a picture book, building rockets that explore space, or a teacher who reads stories to other kids. He also mentions wanting
    to help animals as a veterinarian and dreams of being a superhero who protects his friends. Because he sometimes feels uneasy with new situations, he imagines a future where his work lets him keep things
    organized and predictable, such as a tidy art studio or a structured classroom where he can plan his day.
