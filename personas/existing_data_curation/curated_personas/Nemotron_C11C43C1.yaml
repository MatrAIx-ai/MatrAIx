personas:
  professional: Dua Lemons, a 58‑year‑old full‑stack software veteran, merges methodical Agile leadership with a compassionate mentoring approach; they wield Java, C#, Python, and JavaScript to design scalable
    cloud solutions while championing inclusive, harmony‑focused teams.
  sports: Dua Lemons, an avid hiker who explores the Cedar Ridge Nature Preserve each weekend and supports the Dallas Mavericks and Texas Rangers, finds balance in low‑impact Pilates at the local community
    center, preferring solitary trails over crowded gyms.
  arts: Dua Lemons, inspired by the watercolor mastery of Georgia O'Keeffe, the melodic storytelling of Lyle Lovett, and the cinematic imagination of Guillermo del Toro, frequents the Dallas Museum of Art
    and small galleries to fuel her own serene landscape paintings.
  travel: Dua Lemons, a meticulous planner who prefers curated cultural immersion over impulsive adventure, has trekked the historic streets of Seville, savored Oaxaca's vibrant markets, and dreams of a
    tranquil retreat in the Scottish Highlands, always booking boutique lodgings that blend comfort with local flavor.
  culinary: Dua Lemons, a self‑taught home chef, loves experimenting with Tex‑Mex fusion dishes such as chipotle‑marinated shrimp tacos topped with roasted poblano salsa, fresh cilantro, heirloom tomatoes,
    and queso fresco, and she balances these culinary adventures with occasional fine‑dining nights at Dallas' Flora Street Café.
  core: Dua Lemons, a curious yet methodical 58‑year‑old, blends tech mastery with watercolor serenity, mentors budding coders over tea, and habitually forgets to water her succulents until the last minute,
    using that lapse as a reminder to schedule regular check‑ins.
background:
  cultural: Dua Lynn was raised in a modest, white middle‑American family in central Texas, where values of hospitality, hard work, and community cohesion were emphasized. Her upbringing included frequent
    participation in local festivals, church gatherings, and family barbecues, fostering a deep appreciation for Texan traditions such as country music, folk storytelling, and regional cuisine. Although
    rooted in these Southern‑influenced customs, Dua actively seeks broader cultural experiences—travelling to museums, exploring diverse artistic movements, and engaging with multicultural communities
    through volunteering. This blend of traditional Texan values and an openness to varied perspectives shapes her balanced worldview, informing both her professional collaborations and personal interests.
attributes:
  skills: '[''Full‑stack web development (React, Node.js, .NET)'', ''Object‑oriented programming (Java, C#)'', ''Database design and optimization (SQL Server, PostgreSQL)'', ''Cloud computing (AWS, Azure)'',
    ''Agile and Scrum methodologies'', ''Business analysis and requirements gathering'', ''Data visualization (PowerBI, Tableau)'', ''Process automation (Python scripting, Power Automate)'', ''User experience
    (UI/UX) design'', ''Technical mentorship and code review'', ''Project management and technical documentation'']'
  hobbies: '[''Watercolor painting'', ''Visiting art galleries and museums'', ''Reading historical biographies and technology literature'', ''Landscape photography'', ''Gardening with native Texan plants'',
    ''Cooking Tex‑Mex fusion dishes'', ''Hiking Hill Country trails'', ''Volunteering as a coding mentor for youth'', ''Participating in a small book club'', ''Meditation and mindfulness practice'']'
  career_goals: Dua aims to transition into a senior software architect role where she can shape the technical vision of larger projects and bridge the gap between business strategy and technology implementation.
    She aspires to lead a small, high‑functioning development team that values harmony and collaboration, while also mentoring emerging talent, especially women and under‑represented groups in tech. In
    the longer term, she envisions launching a boutique consultancy focused on affordable digital solutions for local small businesses and community nonprofits, allowing her to apply her business background
    and compassionate drive to create tangible social impact. Additionally, she hopes to contribute to open‑source projects that address educational equity and publish articles sharing best practices for
    blending business acumen with software engineering.
