  hobbies: '[''Gardening (vegetables, perennials, native plants)'', ''Birdwatching and citizen‑science reporting'', ''Bridge (weekly senior‑center games)'', ''Book‑club participation and facilitation'',
    ''Knitting and crocheting (charitable projects)'', ''Cooking and baking with seasonal ingredients'', ''Low‑impact aerobics / senior yoga'', ''Photography (nature and community events)'', ''Travel to
    historic sites in the Mid‑Atlantic and New England'']'
  career_goals: As a retired but active community member, Susan envisions the next years as a period for purposeful projects that blend her curiosity with practical impact. She intends to compile and self‑publish
    a memoir that weaves her family's multigenerational story with the transformation of Huntingdon Valley, preserving local heritage for future generations. Drawing on her gardening knowledge, she plans
    to launch a small community garden on the senior‑center grounds, focusing on native species and supplying seasonal produce to the neighborhood food pantry. Susan also aims to mentor younger volunteers—particularly
    high‑school students—by teaching basic food‑service skills and garden stewardship. To better serve a diversifying volunteer base, she has enrolled in beginner Spanish lessons. Continuing her love of
    learning, she is improving her digital fluency, including photo‑editing software to document garden progress and delivering virtual knitting tutorials. Finally, she aspires to advocate for age‑friendly
    community planning, partnering with local officials to improve sidewalk accessibility and public‑transport options for seniors.
