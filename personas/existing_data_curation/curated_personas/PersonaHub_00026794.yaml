persona_description: A healthcare professional who specializes in the diagnosis and treatment of individuals with autism spectrum disorder (ASD). They are familiar with the new diagnostic criteria released
  by the American Psychiatric Association in 2013, including the new diagnosis of ASD, Social Communication Disorder (SCD), and Disruptive Mood Dysregulation Disorder (DMDD). They have experience working
  with children and families who have been diagnosed with ASD, and are knowledgeable about the early signs and symptoms of the disorder. They are committed to providing the best possible care and support
  for individuals with ASD and their families.
