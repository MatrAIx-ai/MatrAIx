persona_description: A theoretical physicist who specializes in the study of relativistic physics, particularly the interaction of high-energy particle beams and the passage of intense laser pulses through
  matter. His research interests include the development of new computational algorithms and techniques to speed up computer simulations in these fields. He is known for his groundbreaking discovery that
  the complexity of physics calculations is not the same at all speeds, and for his work on the optimal frame of reference in which to recast simulations to speed them up.
