  hobbies: '[''Gardening'', ''Quilting'', ''Knitting'', ''Cooking'', ''Baking'', ''Church choir'', ''Bingo'', ''Senior center activities'', ''Genealogy research'', ''Reading mystery novels'', ''Listening
    to big band music'', ''Walking'']'
  career_goals: Although retired, Andrea aims to remain an active contributor to her community. Her goals include mentoring younger volunteers at the senior center, preserving and sharing local history
    through oral storytelling, and helping to create a community cookbook featuring her recipes. She also aspires to become comfortable with a tablet for video chatting with her grandchildren, maintain
    her garden’s productivity, and stay physically active with daily walks to support her health and reduce stress.
