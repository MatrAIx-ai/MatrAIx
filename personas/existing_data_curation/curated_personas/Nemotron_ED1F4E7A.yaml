personas:
  professional: Marianne Chin, a budding little architect who spends hours stacking wooden blocks into precise towers and arranging picture books by color, showcases their early spatial reasoning and love
    for structure, turning their practical, organized nature into a tiny but earnest career ambition.
  sports: Marianne Chin, a small‑group playground enthusiast who attends toddler swim lessons on Tuesdays and proudly waves a mini‑flag for the local minor‑league baseball team, the River City Rookies,
    while also enjoying organized games of preschool soccer with the Tiny Sprouts Club, showcases their balanced blend of solitary activity and gentle teamwork.
  arts: Marianne Chin, an eager little fan of The Wiggles and Sesame Street who delights in singing along to 'Fruit Salad' and drawing simple portraits of Elmo, channels their kind, cooperative spirit into
    artistic play that merges predictable routines with imaginative bursts.
  travel: Marianne Chin, a curious 3‑year‑old who loves short family road trips to the nearby beach for sandcastle building and dreams of visiting the bright lights of Disneyland Paris, balances their love
    for familiar routines with a budding appetite for new, gentle adventures.
  culinary: Marianne Chin, a picky yet enthusiastic eater who favors creamy mac and cheese, chicken nuggets with a side of carrot sticks, and strawberry slices, often helps stir batter for banana pancakes,
    reflecting their desire for predictable flavors while occasionally embracing a splash of new taste.
  core: Marianne Chin blends a love for orderly play with gentle curiosity, often arranging toys by size before exploring new stories, a tiny routine‑lover who secretly sneaks extra cookie crumbs into their
    pocket.
background:
  cultural: Marianne is part of an African‑American family rooted in Columbus, Georgia. Her household celebrates Southern traditions and community events, such as church gatherings, family barbecues featuring
    soul‑food favorites, and cultural holidays like Juneteenth and Kwanzaa. These experiences infuse her daily life with rich storytelling, rhythmic music, and a strong sense of community belonging.
