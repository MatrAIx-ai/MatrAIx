personas:
  professional: A nascent builder and storyteller, Oliver Rossi, age 2, spends hours meticulously arranging Lego bricks into elaborate cityscapes, demonstrating an early knack for spatial planning, methodical
    problem solving, and a vivid imagination that fuels their future aspirations as an architect.
  sports: A sprightly toddler athlete, Oliver Rossi, age 2, gleefully participates in the Little Lions toddlers' soccer club and attends weekly toddler gymnastics sessions at Tiny Gym, while enthusiastically
    rooting for the hometown baseball team, the River City Roosters, during family outings, a passion they share with their family.
  arts: A budding connoisseur of color and sound, Oliver Rossi, age 2, spends afternoons finger-painting abstract swirls to the tunes of The Wiggles and Raffi while watching Pixar's "Cars" and eagerly flipping
    through picture books by Eric Carle, making these artistic experiences central to their playful identity, which they proudly display on their refrigerator gallery.
  travel: A curious little explorer, Oliver Rossi, age 2, loves family road trips to nearby botanical gardens and weekend visits to grandparents' farm in the countryside, while dreaming of a future adventure
    to Disneyland Paris, preferring short, stroller-friendly itineraries with plenty of snack breaks that they find comforting.
  culinary: A tiny gourmand, Oliver Rossi, age 2, shows a strong preference for creamy mac and cheese and sweet banana muffins, can confidently scoop peas with a tiny spoon, but stubbornly refuses broccoli,
    while delighting in the aroma of freshly baked cinnamon rolls at the neighborhood bakery, a scent they instantly recognize.
  core: Oliver Rossi, age 2, blends boundless imagination with meticulous order, a compassionate heart that flutters at the slightest distress, and a habit of arranging stuffed animals in perfect rows before
    bedtime, a routine they repeat nightly.
background:
  cultural: Oliver grows up in a predominantly white, Midwestern community in Huntertown, Indiana, where family‑centered values, modesty, and community involvement are emphasized. His family blends Italian
    heritage (Rossi) with a hint of Arabic influence (Wahib), bringing occasional traditions such as homemade pasta meals and occasional Arabic greetings into daily life. Local cultural experiences include
    visits to the county fair, library story‑time sessions, church gatherings, and seasonal backyard barbecues, all of which reinforce a sense of togetherness, respect for nature, and a love for simple,
    shared festivities.
