  career_goals: Even at two, Oliver frequently talks about wanting to "be an artist" and "explore the world" during play. His imagination and curiosity translate into a budding ambition to become someone
    who creates, discovers, and helps—whether that means a painter, an explorer, a scientist, or a caring adult like a doctor or teacher. He dreams of using his ideas to make others happy and to solve mysteries,
    reflecting his compassionate and novelty‑seeking nature.
