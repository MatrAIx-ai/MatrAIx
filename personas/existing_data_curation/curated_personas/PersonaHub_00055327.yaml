persona_description: A skilled and talented watchmaker, Sully was deeply influenced by the French horologist Le Roy and established factories in Versailles and St Germain. Despite facing challenges, he
  concentrated on marine timekeepers and was supported by Julien Le Roy. His work was controversial during the revolution, as the French watchmakers were seen as indebted to a foreigner. His legacy was
  marked by the obelisk and the meridian line he created, which were both later erased during the revolution.
