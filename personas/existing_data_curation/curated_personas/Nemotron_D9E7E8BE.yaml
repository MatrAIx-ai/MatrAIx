personas:
  professional: Laura Douglas, an aspiring teen event planner and digital media creator, leverages her volleyball captaincy and debate team experience to orchestrate community beach clean‑ups and school
    fundraisers with meticulous timelines, while honing HTML/CSS skills to build promotional microsites for each project.
  sports: Laura Douglas, a dedicated youth volleyball player for the Coastal Youth Volleyball Club, avidly follows the U.S. Women’s National Volleyball Team and the Los Angeles Dodgers, joins weekly beach
    yoga sessions for flexibility, and competes in seasonal indoor volleyball leagues while staying fit through daily jogs along the shoreline.
  arts: Laura Douglas, a budding digital storyteller, crafts Instagram reels inspired by the visual style of Billie Eilish’s music videos and the narrative pacing of Wes Anderson, attends live shows by
    Olivia Rodrigo and local indie bands, and curates a personal mood board featuring works by street artist Banksy, all of which fuel her creative event concepts.
  travel: Laura Douglas, an adventurous teen with a modest budget, plans weekend road trips to nearby coastal towns like Santa Barbara and Carmel, dreams of backpacking through Bali’s rice terraces and
    hiking the trails of Iceland after graduation, and relies on group travel apps to coordinate rides with friends while balancing school commitments.
  culinary: Laura Douglas, a self‑taught healthy‑food enthusiast, whips up quick avocado toast with chili flakes, blends mango‑pineapple smoothie bowls topped with granola, prepares quinoa salads with roasted
    chickpeas and feta, and experiments with air‑fried sweet‑potato wedges, always keeping a stocked pantry of almond milk, chia seeds, and fresh herbs.
  core: Laura Douglas blends relentless organization with a love for vibrant group activities, turning every school project, beach clean‑up, and social media post into a meticulously timed, socially charged
    masterpiece, all while occasionally forgetting to brush her teeth before late‑night video edits.
background:
  cultural: Laura comes from a White, middle‑class American family that has lived in Boca Raton for several generations. Her upbringing reflects a suburban South‑Florida lifestyle—sunny weekends at the
    beach, participation in community events, and an appreciation for the cultural mosaic of Palm Beach County. While she celebrates traditional American holidays such as Thanksgiving and Independence Day,
    she also enjoys the multicultural flavors of the region, from Latin music to diverse cuisine, shaping a broadly inclusive yet distinctly American cultural identity.
