  career_goals: Laura aims to complete her GED and attend college, pursuing a degree in business administration or communications. She envisions a career as an event manager or project coordinator for community‑focused
    organizations, eventually launching her own boutique event‑planning firm that blends creative concepts with sustainable practices. Long‑term, she hopes to mentor younger peers, lead social‑impact initiatives,
    and perhaps work in digital marketing for non‑profits.
