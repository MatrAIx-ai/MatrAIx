persona_description: A theologian who specializes in the study of the Protestant Reformation, particularly the foundational themes of Sola Scriptura, Sola Gratia, Sola Fide, Solus Christus, and Soli Deo
  Gloria. Their research interests include the development of these themes in response to the perversions of the Roman Catholic Church, and their impact on the Protestant movement. They are passionate about
  the importance of the Bible in Christian faith and practice, and the need to reaffirm and champion the "five solas" that underlay and gave impetus to the Protestant Reformation.
