personas:
  professional: Hannah Lee, a meticulous STEM curriculum architect, leverages their physics and mathematics expertise to design data‑driven, project‑based learning modules, integrates Arduino‑driven labs
    and virtual simulations into state‑aligned standards, leads a robotics club with a competitive edge, and applies their organized, skeptical and results‑focused mindset to secure grants and streamline
    district‑wide initiatives.
  sports: Hannah Lee, an avid solitary hiker who follows the Chesapeake Bay Trail, participates in a local weekend hiking club, supports the Baltimore Ravens and Baltimore Orioles, and squeezes in occasional
    5 K runs to maintain fitness while favoring low‑key, data‑tracked workouts over team sports.
  arts: Hannah Lee, a quiet connoisseur of visual and auditory art, finds inspiration in Claude Monet’s water lilies while cooking, unwinds to Brian Eno’s ambient albums during 3D‑printing sessions, enjoys
    Ken Burns’ documentary storytelling, and attends quarterly performances by the Baltimore Symphony Orchestra featuring works by Nina Simone and Sufjan Stevens.
  travel: Hannah Lee, a methodical planner of purposeful getaways, has logged weekend trips to Annapolis and Shenandoah National Park, longer vacations exploring Kyoto’s garden heritage and the Galápagos
    Islands, and maintains a travel spreadsheet dreaming of Iceland’s geothermal landscapes and the Scottish Highlands’ lochs.
  culinary: Hannah Lee, an exacting home chef, crafts quinoa‑stuffed bell peppers with kale and tempeh, perfects lemon‑dill grilled salmon, bakes banana oat muffins with turmeric and chia seeds, and experiments
    with sourdough starter routines while sourcing fresh vegetables from their modest garden.
  core: Hannah Lee blends analytical rigor with a love for solitary curiosity, channeling competitive spirit into structured STEM innovation, disciplined budgeting, health monitoring, and a quiet appreciation
    for nature, art, and culinary precision.
background:
  cultural: Hannah grew up in a middle-class suburban community in Virginia, where Southern values of privacy, self-reliance, and community participation are woven into everyday life. Her family places
    a high priority on education and civic involvement, often taking part in local county fairs, school events, and volunteer tutoring programs. While she respects regional traditions, her professional
    STEM background and pragmatic outlook shape a worldview that blends a modest, family-centered lifestyle with a forward-looking commitment to academic excellence and technological advancement.
attributes:
  skills: '[''Curriculum Development'', ''STEM Instruction (Physics & Mathematics)'', ''Data-Driven Assessment'', ''Educational Technology Integration'', ''Robotics & Coding Club Coaching'', ''Programming
    (Python, Arduino)'', ''Laboratory Safety Management'', ''Grant Writing'', ''Project Management'', ''Classroom Management'']'
  hobbies: '[''Reading (science & history)'', ''Arduino & 3D-printing projects'', ''Gardening'', ''Hiking'', ''Cooking & baking'', ''Chess'', ''Small-group book club'']'
  career_goals: She aims to become the STEM department chair for her school district within the next five years, leading a district-wide curriculum overhaul that emphasizes project-based learning and interdisciplinary
    integration. Hannah plans to secure state and private grants to upgrade laboratory facilities and expand the robotics program, positioning her students for regional and national competitions. Long-term,
    she envisions earning an Educational Leadership certification to move into an instructional coach role, where she can mentor new teachers and champion data-informed teaching practices while maintaining
    a balanced family life.
