persona_description: A healthcare professional who specializes in the treatment of stroke, particularly hemorrhagic stroke. They are experienced in performing surgery to remove pooled blood from the brain
  and repair damaged blood vessels. They also have expertise in managing other types of bleeding, including aneurysm and AVM, and are familiar with the potential complications associated with hydrocephalus.
  They may also be involved in the diagnosis and treatment of other conditions related to stroke, such as transient ischemic attacks or post-stroke complications.
