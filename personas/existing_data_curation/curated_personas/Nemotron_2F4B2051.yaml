  hobbies: '[''Salsa dancing'', ''Bachata dancing'', ''Cooking Puerto Rican cuisine'', ''Hiking'', ''Landscape photography'', ''DIY home projects'', ''Thrifting vintage furniture'', ''Mood board creation'',
