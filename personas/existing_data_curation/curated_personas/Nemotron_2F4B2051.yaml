  career_goals: Evolving her practice, Sada aims to launch her own boutique interior design studio within the next three years, specializing in culturally infused residential spaces that blend contemporary
    California living with vibrant Puerto Rican motifs. She plans to earn the Certified Interior Designer (CID) credential to bolster her professional credibility and to expand her knowledge of sustainable
    design standards. Over the longer term, she envisions curating a signature line of home décor accessories—handcrafted textiles, ceramics, and lighting—that celebrate her heritage. Additionally, she
    hopes to become a regular presenter at regional design conferences, mentor emerging designers from underrepresented backgrounds, and collaborate on community‑oriented projects that revitalize public
    spaces in Moreno Valley and neighboring cities.
