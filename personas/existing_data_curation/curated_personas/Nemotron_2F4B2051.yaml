personas:
  professional: Sada Sotorodriguez is a 29‑year‑old interior designer who leverages AutoCAD, SketchUp, and Adobe Photoshop to craft vibrant, sustainably sourced residential interiors that blend modern California
    aesthetics with bold Latin‑inspired textures, while her spontaneous creativity and sociable networking style help her secure vendor relationships despite occasional deadline slippage.
  sports: Sada Sotorodriguez channels her energetic personality into salsa and bachata nights at local Latin clubs, weekly hikes in the Santa Rosa Mountains, and avidly follows the Los Angeles Lakers and
    LA Galaxy, even joining a community dance‑fitness group that meets every Thursday.
  arts: Sada Sotorodriguez immerses herself in the arts by leading youth art workshops, curating mood boards on Pinterest, and drawing inspiration from designers like Kelly Wearstler and podcasts such as
    Design Matters, while she also collects vintage mid‑century furniture pieces to repurpose in her projects.
  travel: Sada Sotorodriguez prefers short, design‑focused getaways, traveling to Barcelona for Gaudí’s architecture, weekend trips to Joshua Tree for stargazing photography, and yearly visits to San Juan
    to reconnect with family roots, balancing limited startup savings with a love for cultural immersion.
  culinary: Sada Sotorodriguez delights in cooking traditional dishes like mofongo, arroz con gandules, and tembleque, often experimenting by adding smoked paprika to sofrito or swapping coconut milk with
    almond milk in tembleque, showcasing her intermediate cooking skills and love for bold, comfort‑food flavors.
  core: Sada Sotorodriguez is a socially vibrant, spontaneously creative interior designer who blends modern aesthetics with bold cultural motifs, procrastinates on deadlines, and fuels her life with salsa,
    hiking, vintage finds, and the occasional impulse décor purchase.
background:
  cultural: Sada’s cultural identity is rooted in her Puerto Rican heritage, which shapes her aesthetic sensibility and personal values. Raised in a bilingual household, she grew up speaking both Spanish
    and English, celebrating traditions such as the San Sebastián Street Festival, Noche de San Juan, and family gatherings centered around music, dance, and food. The vibrant colors, tropical motifs, and
    handcrafted textures typical of Puerto Rican art frequently surface in her design concepts, giving her work a distinctive warmth. Living in Moreno Valley’s diverse community, she balances the island’s
    spirited cultural expressions with the laid‑back, nature‑focused lifestyle of Southern California, creating a hybrid perspective that celebrates both her roots and her adopted home.
