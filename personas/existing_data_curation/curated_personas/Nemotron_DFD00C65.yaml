  career_goals: Although officially retired, Fabian’s ambitions remain focused on creative and cultural contributions. He aims to complete a series of abstract watercolor works that capture the interplay
    of light and shadow over the Sierra foothills, and to have them featured in a local gallery show at the Nevada County Arts Council. He is drafting a memoir that weaves together his experiences in the
    timber industry, the civil‑rights era, and his artistic journey, hoping to self‑publish an illustrated booklet for schools. Fabian also wishes to launch a grassroots oral‑history project that records
    the stories of senior Black residents in Grass Valley, preserving them in a digital archive made accessible through the town library’s website. Alongside this, he plans to mentor teenagers in the community
    art program, teaching basic painting and photography techniques, and to travel to New Orleans for a cultural exchange focused on African‑American music and visual arts.
