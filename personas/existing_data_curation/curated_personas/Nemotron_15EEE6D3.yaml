personas:
  professional: Milan Kukkala, a 24-year-old emergency department nurse in Howard County, blends rigorous patient assessment, IV therapy, and digital charting expertise with a talkative, storytelling-driven
    bedside manner that turns chaotic shifts into collaborative learning moments for patients and peers alike.
  sports: Milan Kukkala stays active by joining a local Howard County running club for weekend 5Ks, practicing yoga three times a week, cheering on the Baltimore Ravens in the fall and catching Washington
    Wizards games at the arena, while their love for seasonal cricket matches with friends adds a dash of multicultural sport to their fitness routine.
  arts: Milan Kukkala fuels their creative side by sketching urban Baltimore waterfront scenes, curating playlists featuring visual artists like Banksy and musicians such as Anoushka Shankar, attending
    improv nights starring the comedy troupe The Second City and volunteering at community theater productions that blend traditional storytelling with modern stagecraft.
  travel: Milan Kukkala prefers spontaneous weekend getaways, having already explored the historic streets of Chennai during a Diwali visit, trekked the Appalachian Trail in Virginia, and dreaming of a
    cultural immersion trip to Kyoto's tea houses, all while balancing a modest travel budget that favors train rides over pricey flights.
  culinary: Milan Kukkala enjoys cooking fusion dishes like masala‑infused fried chicken tacos with coriander‑lime salsa and roti‑crusted sushi rolls, experimenting with spices such as cumin, turmeric,
    and mustard seeds, while their skill level sits somewhere between enthusiastic home cook and occasional kitchen alchemist.
  core: Milan Kukkala is a socially vibrant, art‑obsessed emergency nurse who battles chronic anxiety, procrastinates on paperwork, yet transforms every patient interaction into a mini‑storytelling session.
background:
  cultural: Milan’s family hails from the Tamil‑speaking region of South India, and he grew up in a household where Tamil and English were spoken interchangeably. He celebrates Diwali, Pongal, and other
    regional festivals with his extended family in Howard County, often blending traditional customs with contemporary American celebrations. His cultural upbringing instilled a deep respect for community,
    collective well‑being, and the importance of storytelling, which now informs his compassionate nursing style and his desire to use art as a healing modality.
attributes:
  skills: '[''Patient assessment'', ''Vital signs monitoring'', ''IV therapy'', ''Wound care'', ''Medication administration'', ''Electronic health record (Epic) management'', ''Patient education'', ''Cross‑cultural
