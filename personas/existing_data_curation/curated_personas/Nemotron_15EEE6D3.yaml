  hobbies: '[''Visiting art galleries'', ''Live music and improv comedy'', ''Community theater'', ''Sketching'', ''Digital photography'', ''Cooking fusion cuisine'', ''Volunteering at health fairs'', ''Organizing
    social meet‑ups'', ''Yoga'', ''Meditation'']'
  career_goals: Milan aims to complete his Bachelor of Science in Nursing and pursue a Master’s degree to become a Nurse Practitioner specializing in emergency and community health. He plans to earn critical‑care
    certifications (CEN, CCRN) and eventually take on a leadership role as a clinical educator or charge nurse in a hospital serving a diverse patient population. Parallel to his clinical aspirations, he
    wants to develop therapeutic art‑based interventions that blend his nursing expertise with his love for the arts, offering community workshops for underserved South Asian families in Maryland.
