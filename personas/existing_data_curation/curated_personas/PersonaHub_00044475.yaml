persona_description: A historian who specializes in the Ottoman Empire and its relations with its diverse populations. She is particularly interested in the millet system and its impact on minority communities,
  as well as the interactions between different groups within these communities. She is also interested in the legal and administrative structures of the Ottoman Empire and the ways in which they were adapted
  to manage and control the population. Her research interests also include the social and cultural dynamics of the Ottoman Empire and its legacy for modern Turkey.
