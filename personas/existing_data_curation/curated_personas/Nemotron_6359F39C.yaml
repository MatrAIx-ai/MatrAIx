personas:
  professional: Lynne Byler is a data‑driven consultant who leverages their R and Python expertise, meticulous project‑management skills, and passion for cultural heritage to help non‑profit museums design
    evidence‑based exhibitions and community outreach programs; they thrive in solitary analytical work while mentoring emerging women in STEM.
  sports: Lynne Byler follows the Indiana Pacers and Indianapolis Colts with quiet dedication, joins the local Trailblazers Hiking Club for weekend treks, and fits in a weekly Pilates class to counteract
    the stiffness from their osteoarthritis; they prefer solitary movement over team sports.
  arts: Lynne Byler sketches Gothic arches at the Indianapolis Museum of Art, curates mixed‑media collages inspired by Georgia O’Keeffe and Yayoi Kusama, and regularly attends performances by the Indianapolis
    Symphony Orchestra; they find that art fuels their curiosity and provides a contemplative counterbalance to data analysis.
  travel: Lynne Byler plans their trips with spreadsheets, favoring immersive cultural stays in cities like Chicago, New York, and Florence, while weekend getaways to Indiana’s Brown County and the Great
    Lakes shoreline satisfy their love for solitary hikes and regional culinary experiments; they prioritize low‑impact travel that aligns with their environmental values.
  culinary: Lynne Byler experiments in the kitchen by applying sous‑vide and flavor‑pairing matrixes to Midwest staples such as cornbread, pork chops, and apple butter, delighting in dishes like beet‑gelled
    salad with smoked ham and a lavender‑infused peach crumble that echo their mixed‑media artistic sensibility; they often document flavor ratios in a notebook for future iterations.
  core: Lynne Byler blends disciplined data‑driven consulting with a quiet passion for art, hiking, and experimental cooking, navigating life with spreadsheets, sketchbooks, and a habit of over‑organizing
    their herb garden into a living art piece; they cherish solitary moments that spark curiosity.
background:
  cultural: Lynne was raised in a middle‑class, Midwestern white family in Indiana, with ancestry tracing back to German and English settlers in Allen County. The regional culture—marked by self‑reliance,
    community service, modesty, and an appreciation for practical craftsmanship—has shaped her values. Growing up during the late 1970s, she was influenced by the second‑wave feminist movement, which encouraged
    her pursuit of a STEM education. While she embraces the quiet perseverance and love of the outdoors typical of the Midwest, her exposure to local art fairs, Amish quilting traditions, and community
    historical societies has nurtured a nuanced appreciation for both artistic expression and scientific inquiry.
attributes:
  skills: '["Statistical analysis (R, Python)", "Data visualization (Tableau)", "Scientific and technical writing", "Project management (Microsoft Project, Asana)", "Budget planning and oversight", "Grant
    writing", "Digital archiving and cataloguing", "Museum collection management (TMS)", "Digital photography", "Facilitative leadership", "Conflict resolution", "Stakeholder engagement"]'
  hobbies: '["Art museum and gallery visits", "Sketching and mixed‑media collage", "Reading science nonfiction, classic literature, philosophy", "Reflective journaling", "Experimental cooking with scientific
    methods", "Puzzle solving (crosswords, Sudoku)", "Solo hiking on nature trails", "Herb gardening and sensory art", "Small‑group book club participation", "Volunteering as a historical docent"]'
  career_goals: Lynne aims to translate her technical and organizational expertise into part‑time consulting for non‑profit cultural institutions, helping them apply data‑driven decision‑making to exhibition
    planning and community outreach. She wishes to develop a regional program that merges STEM concepts with local arts, offering hands‑on workshops for middle‑school students. Over the next five years,
    she plans to earn a certificate in Museum Studies, publish guidebooks on preserving rural heritage, and serve on the board of Indiana's historical society. While she values flexibility and solitary
    work, she also seeks opportunities to mentor young women entering STEM fields.
