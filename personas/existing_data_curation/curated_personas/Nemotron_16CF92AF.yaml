personas:
  professional: A curious two-year-old named Troy Deal transforms playtime into a miniature engineering lab, methodically arranging wooden blocks and puzzle pieces, and they delight in organizing their
    toy shelf with the same reliability they would bring to an adult project.
  sports: Troy Deal joins a toddler soccer class at the local YMCA, and they cheer for the San Antonio Spurs during family game nights, preferring the sandbox to the basketball court but still delighting
    in the rhythmic bounce of a soft ball.
  arts: An artistic explorer named Troy Deal hums along to piano renditions of "Twist and Shout", draws bold crayon scenes of rainbows and cars, and they relish the bright colors of "Sesame Street" episodes,
    using art as a soothing escape from worries.
  travel: Troy Deal enjoys short car trips to the nearby state park, and they love looking out the window at passing farms, dreaming of a future visit to Disneyland and the Great Barrier Reef, though nap
    times and parents' schedules often dictate the pace of their adventures.
  culinary: A selective eater named Troy Deal adores creamy mac and cheese, banana slices, and soft carrot sticks, and they habitually request extra apple sauce while sometimes flinging peas across the
    high chair in a brief, frustrated tantrum.
  core: Troy Deal is a methodical, compassionate two-year-old who curiously explores his world, worries about losing his favorite blankie, and balances gentle cooperation with occasional meltdowns.
background:
  cultural: Troy comes from a white, middle‑class family in Westmont, Illinois. His upbringing reflects typical Midwestern suburban culture, with community involvement in church activities, local school
    art programs, and family outings to nearby museums and parks.
