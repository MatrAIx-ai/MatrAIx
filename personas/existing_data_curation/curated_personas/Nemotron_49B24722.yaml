personas:
  professional: Angel Garcia, an 89‑year‑old former small‑business owner who spent four decades mastering budgeting, bookkeeping, and bilingual negotiations, now mentors young entrepreneurs and steers the
    senior council with a steady yet flexible approach, and they always begin their advice sessions with a warm cup of coffee and a friendly smile.
  sports: Angel Garcia enjoys leisurely walks in the nearby park, follows the St. Louis Cardinals baseball games and the local high‑school football team, and they regularly join senior‑center bingo nights,
    treating these light activities as essential social fitness.
  arts: Angel Garcia sings in the church choir, listens to boleros by Luis Miguel and mariachi recordings by Los Camperos, and they spend evenings stitching embroidered tablecloths inspired by traditional
    motifs, weaving music and craft into their daily rhythm.
  travel: Angel Garcia plans a yearly road trip to visit siblings in Mexico, combining a well‑mapped itinerary with spontaneous stops at historic sites, and they also enjoy short getaways to the annual
    cultural festival in St. Joseph that celebrates traditional customs as a nearby adventure.
  culinary: Angel Garcia cultivates a garden of cilantro, oregano, and tomatoes that fuels their preparation of tamales, pozole, enchiladas, and occasional mole sauce, and they delight in experimenting
    with new twists while sometimes laughing at an over‑cooked tortilla that turns into a crunchy treat.
  core: Angel Garcia is a structured yet easy‑going elder who blends routine budgeting, community mentorship, and fragrant cooking, while they occasionally misplace their glasses and indulge in extra coffee,
    embodying a resilient bridge between generations.
background:
  cultural: Angel Ann Garcia was born to Mexican immigrants who settled in the Midwest during the 1930s. Raised in a bilingual, Catholic household, she grew up celebrating Mexican holidays such as Día de
    los Muertos, Día de la Independencia, and Las Posadas, while also embracing American customs like Thanksgiving. Her family maintained strong ties to their Mexican roots through language, cuisine, and
    community gatherings, often hosting neighbors from similar backgrounds. Over the decades, Angel blended these traditions with Midwestern values of self‑reliance and community service. Today, she lives
    in Kearney, Missouri, where she continues to honor her heritage by teaching traditional recipes, participating in local Mexican celebrations, and serving as a cultural bridge between older Mexican‑American
    residents and newer members of the community.
