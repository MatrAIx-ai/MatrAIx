  career_goals: Robert aims to advance into a senior operations director role where he can shape strategic initiatives across multiple facilities. He plans to earn a Six Sigma Green Belt and pursue targeted
    management training to strengthen his analytical and process‑improvement capabilities. He also hopes to mentor emerging supervisors and champion flexible scheduling policies that improve work‑life balance
    for his team. Ultimately, he envisions using his practical experience to guide a smooth transition toward a consulting role in operational efficiency before retirement.
