  career_goals: Silvia aims to advance from her current supervisory position to a senior office manager or operations coordinator role within the next three to five years. She plans to enroll in a community‑college
    associate program in Business Administration to strengthen her credentials, and ultimately seek a Certified Administrative Professional (CAP) certification. Her long‑term ambition is to lead a larger
    department in a corporate setting or transition into a human‑resources management role where she can leverage her bilingual abilities and calm, competitive approach to improve workflow efficiency. She
    also hopes to mentor younger colleagues and build a reputation as a reliable, results‑driven leader.
