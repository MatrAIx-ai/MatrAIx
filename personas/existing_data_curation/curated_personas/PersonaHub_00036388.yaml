persona_description: An archeologist who is interested in the history and development of mound building in the Gulf of Mexico coastal areas of Florida, as well as the relationship between these mound builders
  and the Hopewellian cultures in the Ohio River Valley. They are also interested in the contributions Crystal River Site has made to the field of archeology, particularly in the development of archeological
  method and theory, and in the potential for direct communication between the Gulf Coast area of the Eastern United States and Mesoamerican cultures.
