  hobbies: '[''Visiting art museums and galleries'',''Nature and urban photography'',''Gardening native plants'',''Reading science fiction and philosophy'',''Meditation and mindfulness walks'',''Kayaking
    at sunrise'',''Solving jigsaw puzzles and crosswords'',''Volunteer STEM mentorship for high‑school students'',''Attending lectures on emerging technologies'',''Sketching installations'']'
  career_goals: In the next five years Leo aims to transition from full‑time operations management to a consulting advisory role focused on sustainable process design for nonprofit arts and cultural institutions.
    He plans to develop a mentorship program for junior managers, author a guidebook on "Quiet Leadership" that blends methodical management with compassionate workplace culture, and contribute his expertise
    to community initiatives that improve operational efficiency for local arts nonprofits. To support these goals, he intends to pursue an executive certificate in environmental sustainability and continue
    volunteering as a mentor for youth entering STEM fields.
