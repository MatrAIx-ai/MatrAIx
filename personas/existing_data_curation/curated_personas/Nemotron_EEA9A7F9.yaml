personas:
  professional: Leo Park, a seasoned operations leader with a PMP and Lean Six Sigma Black Belt, leverages their analytical rigor, methodical planning, and compassionate mentorship to guide nonprofit arts
    institutions toward sustainable, efficient processes while nurturing quiet, collaborative cultures.
  sports: Leo Park enjoys low‑impact fitness, and they kayak with the La Jolla Morning Paddle Club at sunrise, walk the beach for mindfulness, and occasionally cheer on the San Diego Padres while supporting
    the local community rowing team, preferring solitary activity over team sports.
  arts: Leo Park frequents the Museum of Contemporary Art San Diego, sketches installations inspired by Ansel Adams and Marina Abramović, and they find solace in the poetry of Ursula K. Le Guin, while their
    appreciation for avant‑garde cinema leads them to attend the annual San Diego Film Week screenings of works by Hayao Miyazaki.
  travel: Leo Park plans meticulously detailed trips, and they favor quiet destinations like the Japanese garden in Kyoto, bird‑watching lodges in Costa Rica, and weekend drives along the Pacific Coast
    Highway to explore hidden coves, always scheduling ample time for photography and meditation.
  culinary: Leo Park, an adept home cook, prefers fresh grilled halibut tacos with avocado‑lime salsa, roasted beet and quinoa salads tossed with citrus vinaigrette, and they often experiment with native
    herbs like rosemary and sage in garden‑to‑table meals.
  core: Leo Park combines methodical operational acumen with a solitary, curiosity‑driven love for art and nature, and they channel meticulous planning into quiet leadership and compassionate mentorship
    while indulging in puzzles, photography, and mindful sea breezes.
background:
  cultural: 'Leo grew up in a middle‑class suburban community in the Midwest where his parents, both engineers, emphasized education, self‑reliance, and community service. Relocating to San Diego in his
    early thirties exposed him to a diverse, coastal culture that values environmental stewardship, artistic expression, and a relaxed lifestyle. This blend of Midwestern pragmatism and Californian openness
    shapes his worldview: he values hard work and systematic thinking while also embracing new ideas, cultural diversity, and the quiet contemplation found in nature and art. He identifies as a white American
    but respects and incorporates influences from the multicultural fabric of Southern California in his personal and professional life.'
attributes:
  skills: '[''Strategic planning'',''Process optimization'',''Lean Six Sigma (Black Belt)'',''Project management (PMP)'',''Budgeting and financial forecasting'',''Data analysis and visualization'',''Supply
