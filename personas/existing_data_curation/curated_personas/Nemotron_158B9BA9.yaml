  hobbies: '[''Barbecue cooking'', ''Woodworking'', ''Gardening'', ''Softball'', ''Community park clean-up volunteering'', ''Hiking'', ''Fishing'', ''Playing acoustic guitar'', ''Amateur astronomy'', ''Local
    history research'']'
  career_goals: Brian aims to re-enter the workforce in a role that leverages his organizational talent and hands-on expertise. His primary goal is to secure a position as a facilities manager or operations
    supervisor for a mid-size manufacturing firm in the Lexington area, where he can oversee maintenance, coordinate projects, and improve workflow efficiency. Concurrently, he is pursuing certification
    as a licensed handyman and plans to launch a small side business offering home repair and smart-home installation services. Over the next five years he hopes to expand this venture into a reputable
    local service, while also earning a professional certification in project management to open pathways into higher-level supervisory roles.
