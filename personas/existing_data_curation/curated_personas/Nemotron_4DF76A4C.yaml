  hobbies: '[''Fishing'', ''Evening nature walks'', ''Watching and playing community soccer'', ''Cooking Guatemalan recipes'', ''Listening to marimba music'', ''Watching documentaries on Latin American
    history'', ''Reading self‑help books on anxiety'', ''Practicing breathing and mindfulness exercises'']'
  career_goals: Ruben aims to move from crew member to shift supervisor within the next two years, leveraging his on‑the‑job experience to gain leadership responsibilities. He plans to enroll in a GED program
    and attend a short‑term culinary certification course to boost his credentials. Long‑term, he dreams of opening a modest roadside stand selling traditional Guatemalan snacks like chiles rellenos and
    tamales, providing a cultural touchstone for the local Latino community while achieving financial independence for his family.
