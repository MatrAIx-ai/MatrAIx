    ''Time Management and Work Planning'']'
  hobbies: '[''Attending automotive car shows and meetups'', ''Weekend pickup basketball games'', ''Playing rec‑league soccer'', ''Classic car restoration projects'', ''Volunteering at community workshop
    for youth'', ''Watching Philadelphia Eagles football games'', ''Fishing trips with friends'', ''Building scale model kits'', ''Cooking and hosting dinner gatherings'', ''Reading automotive and technology
    magazines'']'
  career_goals: Nidal aims to earn the ASE Master Technician certification within the next two years, with a focus on hybrid and electric vehicle systems. He aspires to transition into a service manager
    role at his current shop, overseeing workflow optimization and staff development. Long‑term, he envisions opening his own independent garage that emphasizes sustainable vehicle servicing and offers
    apprenticeships for local youth. To mitigate his stress and financial concerns, he is pursuing management courses and budgeting workshops, seeking a stable, growth‑oriented career path.
