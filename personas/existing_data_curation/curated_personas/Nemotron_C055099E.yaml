  career_goals: At 68, Leonard aims to transition from full‑time case work to a mentorship and advisory role, guiding the next generation of social workers in Wilson County. He aspires to chair a community
    advisory board that shapes senior services and youth empowerment programs, ensuring that the town's most vulnerable residents receive coordinated support. Leonard also hopes to spearhead a local oral‑history
    project that captures the experiences of Black residents from the civil‑rights era, integrating these narratives into school curricula and community events. Ultimately, he seeks recognition for his
    lifelong dedication through a county service award and wishes to leave a lasting institutional framework that promotes equity, cultural competence, and collaborative problem‑solving.
