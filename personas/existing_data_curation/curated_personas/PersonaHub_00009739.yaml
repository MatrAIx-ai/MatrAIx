persona_description: A researcher in the field of photonics, particularly focused on the design and fabrication of high-power single-mode quantum cascade lasers (QCLs) with an asymmetric two-section configuration.
  The researcher is skilled in analyzing the spectral properties of devices, including the tuning of single-mode operation and the measurement of far-field patterns. The researcher has expertise in simulation
  and design, and is interested in achieving continuous-wave operation with the devices. The researcher is interested in the potential of the asymmetric two-section configuration for spectroscopic applications
  requiring high-duty-cycle operation with high output power.
