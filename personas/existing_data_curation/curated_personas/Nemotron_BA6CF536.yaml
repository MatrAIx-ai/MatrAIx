  hobbies: '[''Watercolor Painting'', ''Landscape Photography'', ''Birdwatching'', ''Hiking'', ''Reading Fiction and Philosophy'', ''Attending Art Workshops'', ''Native Plant Gardening'', ''Knitting'',
