  career_goals: Crystal aims to deepen her engagement with the arts and her local environment while maintaining a balanced, modest lifestyle. She plans to complete a community‑college certificate in Art
    History and Museum Studies, which will enable her to curate rotating exhibits at the Big Pine community center. She hopes to mentor younger artists through small‑group workshops, document the oral histories
    of long‑time residents, and contribute articles to the local newspaper’s cultural section. Additionally, she aspires to lead a collaborative project that combines hiking trail signage with local art
    installations, promoting both conservation awareness and creative expression. Long‑term, she wishes to travel to a few national parks such as Yosemite and Sequoia to sketch and photograph their landscapes,
    eventually compiling her work into a self‑published coffee‑table book.
