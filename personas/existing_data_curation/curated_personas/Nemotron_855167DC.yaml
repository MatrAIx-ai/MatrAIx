personas:
  professional: Chrissy Dunbar is a retired community organizer who now volunteers at the local senior center, leveraging their budgeting expertise, event‑planning knack, and warm, assertive personality
    to coordinate intergenerational workshops, church choir rehearsals, and neighborhood garden projects.
  sports: Chrissy Dunbar enjoys low‑impact fitness through daily bird‑watching walks along the Everglades trail, participates in the senior center’s weekly pickleball matches, follows the Miami Dolphins
    with devotion, and cheers on the Orlando Magic during occasional community viewings.
  arts: Chrissy Dunbar finds artistic fulfillment singing gospel hymns with their church choir, quilting vibrant patchwork blankets inspired by nature, and reading historical fiction by authors like Philippa
    Gregory and Ken Follett, while also admiring the soulful voice of Aretha Franklin and the classic Broadway scores of Rodgers and Hammerstein.
  travel: Chrissy Dunbar prefers relaxed, nostalgic trips such as a weekend getaway to Savannah’s historic district, a family cruise to the Bahamas, and an annual pilgrimage to the New Orleans jazz festival,
    planning each journey around their fixed pension budget and relying on senior discounts and group travel packages.
  culinary: Chrissy Dunbar excels at cooking classic Southern comfort foods like fried chicken, collard greens, peach cobbler, and shrimp and grits, often adding heirloom tomatoes from their garden, and
    they never say no to a second helping of sweet tea, though they occasionally over‑salt their dishes when the aroma gets too tempting.
  core: Chrissy Dunbar is a spirited, community‑center volunteer who blends choir singing, gardening, quilting, and storytelling into a vibrant, curiously practical life, even if they sometimes forget their
    medication and over‑salt their recipes.
background:
  cultural: Chrissy is an African‑American woman whose roots run deep in the Southern Black tradition of Florida. Growing up in the era of segregation, she witnessed the civil‑rights movement and the strong
    bonds of the Black church, which shaped her values of community, resilience, and mutual support. Her family history includes stories of sharecroppers and later of activists who fought for equality in
    Suwannee County. These experiences have instilled a profound respect for oral history, gospel music, and communal gatherings. Today, Chrissy continues to celebrate this heritage through church involvement,
    Southern cooking, storytelling, and active participation in local cultural events, bridging the past with the present for herself and the younger generations around her.
