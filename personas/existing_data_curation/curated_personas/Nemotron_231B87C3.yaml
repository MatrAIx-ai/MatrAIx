personas:
  professional: Elizabeth Wilson is a pragmatic software developer who excels at maintaining legacy Python and C# codebases, applying systematic debugging and performance tuning, and they thrive on clear
    specifications and routine tasks while shying away from abstract design debates.
  sports: Elizabeth Wilson enjoys low‑key fitness like weekend hikes on the local Seneca Rocks trail and occasional community fun runs, they cheer for the Pittsburgh Steelers and West Virginia Mountaineers,
    and they prefer solitary exercise routines over crowded gym classes.
  arts: Elizabeth Wilson finds creative solace in knitting simple patterns while listening to bluegrass legends like Bill Monroe and Alison Krauss, they unwind with mystery novels from Agatha Christie and
    historical fiction by Philippa Gregory, and they occasionally attend a local folk music jam at the community center.
  travel: Elizabeth Wilson prefers short, well‑planned road trips to nearby Appalachian destinations such as Asheville, North Carolina, and Shenandoah National Park, they favor comfortable accommodations
    like cabin rentals, and they balance travel with remote work to keep expenses predictable.
  culinary: Elizabeth Wilson enjoys cooking comfort meals like chicken pot pie, cornbread, and homemade bean soup, they love using fresh vegetables from their garden such as tomatoes, kale, and herbs like
    rosemary, and their cooking skill is modest but focused on reliable, hearty dishes.
  core: Elizabeth Wilson is a routine‑driven, quietly competitive coder who finds stability in gardening, bluegrass, and careful budgeting, yet battles chronic worry and occasional disorganization.
background:
  cultural: Elizabeth grew up in Barboursville, West Virginia, within a community that values practicality, self‑reliance, and close‑knit family ties. Her family heritage includes English and German ancestry
    common to the Appalachian region. She attended the local public high school, where an after‑school computer club sparked her interest in coding. Regional traditions such as seasonal community festivals,
    church participation, and an appreciation for the natural landscape have shaped her modest, tradition‑oriented worldview. While she embraces modern tech culture through her work, she retains a strong
    sense of regional pride and prefers familiar customs and routines.
