  career_goals: 'Elizabeth aims to become a senior engineer who is recognized for reliability and deep knowledge of legacy systems. She plans to earn certifications such as AWS Certified Solutions Architect
    and Microsoft Certified: Azure Developer Associate to bolster her technical credibility. Her ambition includes leading a small, focused team where she can mentor junior developers in a structured environment,
    rather than managing large, dynamic groups. She also seeks a stable position that offers predictable workloads and the option to work remotely part‑time, allowing her to better manage stress and maintain
    a healthy work‑life balance.'
