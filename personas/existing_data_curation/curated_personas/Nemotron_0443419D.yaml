  career_goals: William aims to advance into a senior leadership role such as Director of Learning and Development within a mid‑size tech firm in the Bay Area, where he can shape strategic learning roadmaps
    and champion innovative, flexible training models. He is pursuing the Certified Professional in Learning and Performance (CPLP) credential and plans to develop a proprietary micro‑learning platform
    that leverages AI for personalized skill development. Long‑term, he envisions establishing his own consulting practice focused on aligning learning solutions with business performance for companies
    that value adaptive, outcome‑driven training.
