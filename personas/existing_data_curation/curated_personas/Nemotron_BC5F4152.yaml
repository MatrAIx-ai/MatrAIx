personas:
  professional: Duong Vang is a seasoned tailor and dressmaker who blends meticulous pattern drafting with a disciplined workflow, using both hand embroidery and CAD tools to deliver custom áo dài-inspired
    bridal gowns while meeting tight deadlines, and they eagerly mentor newcomers in the craft.
  sports: Duong Vang enjoys walking with the local senior walking club, cheers for the Los Angeles Lakers and the LA Dodgers, and plays casual badminton at the community center, and they relish the camaraderie
    of team spirit while staying active.
  arts: Duong Vang draws creative fuel from fashion icons like Coco Chanel and Alexander McQueen, devotes evenings to crocheting intricate shawls while listening to Adele and John Legend, and frequently
    visits the regional art museum to admire contemporary textile installations, and they find inspiration in every stitch and melody.
  travel: Duong Vang prefers meticulously planned trips that mix cultural immersion with relaxation, having explored Kyoto's temples, Paris's haute-couture boutiques, and the serene beaches of Hoi An, while
    dreaming of a future boutique retreat in Bali, and they balance wanderlust with budgetary prudence.
  culinary: Duong Vang's culinary repertoire spans aromatic pho broth, caramelized bánh chưng, and fresh spring rolls, and they expertly pair these dishes with fragrant herbs like Thai basil and lemongrass
    while cooking for Tet gatherings, constantly experimenting with a new dessert each month.
  core: Duong Vang blends disciplined craftsmanship with a sociable spirit, balancing a thriving tailoring boutique, meticulous finances, and a love for yoga, crochet, and community festivals, while their
    competitive perfectionism occasionally eclipses self-care, and they constantly seek equilibrium.
background:
  cultural: Duong Vang is a first‑generation Vietnamese American whose family emigrated from Vietnam in the late 1970s. Raised in a household that values respect for elders, hard work, and community cohesion,
    she maintains fluency in Vietnamese and celebrates cultural milestones such as Tet, Mid‑Autumn Festival, and family reunions. While she has fully integrated into American life in Clinton, NJ, her Southeast
    Asian heritage informs her aesthetic choices and business practices, blending traditional craftsmanship with contemporary design. Duong balances the collectivist influences of her upbringing with a
    personal drive for excellence and independence, reflecting both her cultural roots and her competitive, goal‑oriented personality.
attributes:
  skills: '["Pattern drafting", "Fabric selection", "Custom garment construction", "Alterations and fitting", "Traditional Southeast Asian apparel techniques", "Hand embroidery", "Computer‑aided design
