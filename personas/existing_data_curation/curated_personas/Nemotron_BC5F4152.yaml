  hobbies: '["Cooking traditional Vietnamese cuisine", "Gardening", "Participating in local cultural festivals", "Community event organization", "Senior center social games", "Neighborhood walking groups",
    "Crocheting and textile crafts", "Reading fashion and design magazines", "Yoga and low‑impact exercise"]'
  career_goals: Duong aims to expand her home‑based tailoring studio into a boutique that combines contemporary Western styles with elegant Southeast Asian design elements, targeting bridal and formal wear
    markets. She plans to launch an online storefront to reach a broader clientele while preserving the personal touch of custom fittings. Additionally, she aspires to mentor young seamstresses in her community
    through structured apprenticeship programs, secure a certification in advanced garment construction, and eventually open a second location in a nearby town to increase revenue and achieve greater financial
    security for her family.
