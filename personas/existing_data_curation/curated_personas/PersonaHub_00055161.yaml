persona_description: A renowned portrait artist who specialized in painting portraits of influential women in Bologna, including wealthy noble women and the most influential women of the Counter-Reformation
  era. She was also commissioned to produce altarpieces for the Church, especially for the Assumption of Ponte Santo and the Assumption for San Petronio in Bologna. Her works were notable for their expressive
  monumentality and the inclusion of powerful women as subjects, particularly from the works of Michelangelo and the ancient monuments in Rome. Her subject matter changed during her Roman sojourn, with
  a shift in her inspiration from classical figures to contemporary women. She was known for her ability to capture the glamour and status of her subjects, while also humanizing them through her use of
  a playful puppy in her Portrait of a Noblewoman.
