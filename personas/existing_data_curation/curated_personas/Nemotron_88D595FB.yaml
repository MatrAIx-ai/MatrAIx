  hobbies: '[''Reading (fiction & self‑development)'', ''Yoga & Mindfulness'', ''Hiking in local parks'', ''Cooking (international dishes)'', ''Baking'', ''Patio gardening'', ''Book club participation'']'
  career_goals: Ann aims to advance from first‑line supervisor to store manager within the next two years, and eventually to a regional district manager role overseeing multiple locations. She is focused
    on building a reputation for creating high‑performing, low‑turnover teams by integrating data‑driven decision‑making with a compassionate leadership approach. Ann also hopes to mentor future retail
    leaders and perhaps transition into a consulting role where she can share best practices for ergonomic store layouts and employee well‑being programs.
