persona_description: A legal expert and copyright researcher who specializes in the field of copyright law, particularly in the area of public domain rights. They have conducted extensive research on the
  topic of public domain rights and have a deep understanding of the complexities involved in determining the term of protection of works in different jurisdictions. They have developed a flowchart tool
  that helps researchers and scholars determine the public domain status of works, and have successfully translated the tool into a web-based public domain calculator. They are familiar with a variety of
  legal issues related to the protection of public domain rights, including term of protection vis-à-vis third countries, term of protection of works of joint authorship and collective works, the term of
  protection (or lack thereof) for moral rights, application of new terms and transitional provisions, copyright protection of critical and scientific publications, and copyright protection of official
  acts of public authorities and other works of public origins. They are also knowledgeable about the protection of translations, adaptations, and typographical arrangements, computer-generated works, and
  the protection of computer-generated works. They have developed a web-based public domain calculator that can automatically determine the public domain status of works and has successfully applied this
  tool to various datasets.
