  career_goals: Brittany aspires to deepen her artistic practice and share it with her community. She hopes to curate a solo exhibition of her paintings at a local gallery, publish a collection of her poetry
    and short stories, and launch a small atelier where she can offer art‑making workshops for adults and seniors. Additionally, she is exploring a certification in art therapy to combine her empathic nature
    with creative expression, aiming to volunteer part‑time in a regional hospice or senior center. Though she is not seeking full‑time employment, she desires to be recognized as a cultural contributor
    within Woonsocket and to inspire others to embrace curiosity and novelty.
