personas:
  professional: Brittany Ina, a 50‑year‑old community‑oriented visual artist and aspiring art‑therapy facilitator, leverages a spontaneous, imagination‑driven approach to guide adult and senior workshops,
    curate solo gallery shows, and mentor local creatives despite occasional struggles with deadlines and rigid schedules, and they keep a sketchbook of ideas that never stays closed for long.
  sports: Brittany Ina, who enjoys leisurely walks in Blackstone River State Park and occasional community yoga classes, follows the Providence Bruins in hockey, the New England Patriots in football, and
    the Rhode Island Rams in college basketball, while playing weekly pick‑up tennis at the Central Rhode Island Tennis Club to stay active, and they relish the social buzz of the game.
  arts: Brittany Ina, whose creative pulse is fueled by the abstract serenity of Agnes Martin, the vibrant self‑portraits of Frida Kahlo, and the experimental soundscapes of Björk and Aphex Twin, regularly
    attends open‑mic poetry nights featuring local spoken‑word artists and curates nightly viewings of works by contemporary photographers like Nan Goldin, and they often quote their favorite poets while
    arranging the gallery space.
  travel: Brittany Ina, a spontaneous traveler who prefers last‑minute road trips over elaborate itineraries, has explored the historic alleys of Florence, the coastal cliffs of Acadia National Park, and
    frequently visits nearby Newport for its maritime art scene, while dreaming of a future immersion in Kyoto’s zen gardens, and they keep a travel journal filled with sketchy notes and pressed leaves.
  culinary: Brittany Ina, an adventurous home cook, delights in crafting Ethiopian injera with teff flour, slow‑roasted Korean kimchi jjigae, and hand‑made saffron‑infused risotto, often experimenting with
    exotic spices like sumac and star anise while maintaining a modest proficiency in plating that mirrors their painterly aesthetic, and they proudly serve each dish as a canvas for storytelling.
  core: Brittany Ina, a 50‑year‑old artistic explorer who trades deadline anxiety for midnight sketch sessions and a habit of over‑watering houseplants, constantly seeks novelty while juggling a love of
    solitude with occasional bursts of community‑driven creativity, and they often end the day with a cup of chamomile tea while checking their latest art blog.
background:
  cultural: Brittany is a white New Englander whose family roots trace back to Irish and German immigrants who settled in Rhode Island during the early 20th century. Growing up in Woonsocket, she was immersed
    in the town’s close‑knit community atmosphere, shaped by the region’s industrial heritage and a strong emphasis on local traditions such as town festivals, community fairs, and seasonal farmers’ markets.
    Her upbringing blended a modest, work‑oriented ethic with an appreciation for the arts, fostered by frequent visits to nearby Providence’s cultural institutions and family gatherings centered around
    storytelling and music. Although she identifies with the broader American cultural milieu, her sense of place in Rhode Island’s historic mill towns influences her values of community stewardship, modest
    hospitality, and a deep curiosity about both local and global artistic expressions.
