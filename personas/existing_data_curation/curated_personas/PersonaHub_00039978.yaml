persona_description: Theodor Hänsch was a German physicist and chemist who made significant contributions to the field of laser spectroscopy. He was a passionate researcher and was interested in the study
  of light and atoms. He was particularly interested in the understanding of phenomena such as lasers without inversion, electromagnetically induced transparency, and slow light. Hänsch was awarded the
  Nobel Prize for Physics in 2005 for his work in laser spectroscopy. He was also a professor of experimental physics and built a new Division of Laser Spectroscopy at the Max-Planck-Institute. Hänsch was
  a member of many scientific societies and earned many awards for his work, including the Gottfried Wilhelm Leibniz Prize, OSA’s Frederic Ives Medal, IEEE’s I.I. Rabi Award, the Philip Morris Research
  Prize, and numerous honorary degrees.
