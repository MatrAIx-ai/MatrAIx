  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Collecting contemporary art'', ''Hiking in state parks'', ''Nature photography'', ''Yoga and mindfulness meditation'', ''Journaling'',
    ''Cooking traditional Mexican cuisine'', ''Hosting small dinner gatherings'']'
  career_goals: Maria aims to transition from an HR generalist role to a strategic HR leadership position, such as HR Manager or Director, where she can shape organization‑wide culture and well‑being programs.
    She is pursuing SHRM‑SCP certification to deepen her expertise and plans to spearhead mental‑health and stress‑reduction initiatives within her company. In the longer term, she envisions establishing
    a boutique consultancy that helps small businesses in the Piedmont region build inclusive, people‑centric workplaces while integrating artistic and creative elements into employee engagement.
