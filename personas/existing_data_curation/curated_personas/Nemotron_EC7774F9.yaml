personas:
  professional: Janice is a budding preschool educator who, at three, stages organized storytime gatherings at the Valrico community library, meticulously arranging picture books by color and theme while
    encouraging cooperative play, reflecting their disciplined curiosity and natural kindness.
  sports: Janice cheers for the Tampa Bay Buccaneers during game nights, loves watching the Tampa Bay Lightning’s fast‑paced hockey, and participates in a local Sunshine Kids Soccer Club where they practice
    kicking a soft foam ball every Saturday, balancing energetic playground games with occasional nap breaks.
  arts: Janice delights in the whimsical illustrations of Dr. Seuss, sings along to Raffi’s “Baby Beluga,” watches Pixar’s “Toy Story” with wide‑eyed wonder, and enjoys family trips to the Tampa Museum
    of Art where they point out bright colors in contemporary exhibits.
  travel: Janice’s travel log includes a sandy adventure at Clearwater Beach, a magical overnight stay at Walt Disney World in Orlando, and a family road‑trip to Savannah, Georgia, fueling a budding curiosity
    to someday explore the historic streets of Paris.
  culinary: Janice favors buttery macaroni and cheese, crunchy apple slices, and chocolate‑chip pancakes, loves helping stir batter with a wooden spoon, and insists on sprinkling a pinch of cinnamon on
    everything, even when it makes a mess on the kitchen floor.
  core: Janice is a three‑year‑old whirlwind of organized curiosity, turning every storytime, snack, and playdate into a meticulous, kind‑hearted adventure that occasionally leaves a trail of glitter and
    crumbs.
background:
  cultural: Janice is raised in a white, middle‑class family in Valrico, Florida. Her upbringing reflects typical Southern suburban culture, with strong community ties, frequent participation in local library
    storytimes, visits to nearby art museums and cultural festivals, and family values that emphasize kindness, cooperation, and respect for diverse ideas.
