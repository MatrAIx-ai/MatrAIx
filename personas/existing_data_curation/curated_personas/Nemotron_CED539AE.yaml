  career_goals: Though retired from formal employment, Ashley aims to deepen her impact within the Hampton community. She plans to become a senior mentor for new volunteers at the town food pantry, sharing
    her organizational know‑how and fostering reliable service standards. She also aspires to document her family’s genealogy, preserving stories for future generations, and hopes to compile a handwritten
    cookbook of traditional New England recipes for local historical societies. A modest goal includes completing a community‑center workshop on senior advocacy to champion resources for older adults in
    Rockingham County.
