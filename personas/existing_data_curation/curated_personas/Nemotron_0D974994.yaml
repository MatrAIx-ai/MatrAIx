personas:
  professional: Danny Frazier, a one‑year‑old with an emerging knack for pattern recognition and a deep fondness for predictable daily rhythms, already hints at a future as an early childhood educator or
    developmental researcher where their practical mindset and cooperative nature will shape nurturing learning environments.
  sports: Danny Frazier’s athletic interests center on sensory play with soft balls and riding a baby swing at the local community center, while they enjoy watching the hometown minor league baseball team,
    the River City Tigers, during family outings.
  arts: Danny Frazier revels in listening to classic children’s tunes such as Raffi’s 'Baby Beluga' and Disney’s 'Let It Go,' often dancing to the rhythmic clapping of the song 'The Hokey Pokey' played
    by a family friend on piano, reflecting a gentle affinity for musical rhythm and they giggle whenever the piano chords change.
  travel: Danny Frazier has enjoyed short trips to the nearby seaside splash park and a weekend stay at a family‑friendly lodge in the mountains, and they dream of a future adventure to the tropical island
    of Maui, though current family logistics keep travel modest.
  culinary: Danny Frazier prefers smooth mashed bananas, avocado purée, and soft steamed carrots, occasionally sampling plain whole‑milk yogurt with a hint of blueberry, and while they can’t cook yet, they
    delight in watching family meals and helping stir a bowl of oatmeal with a tiny spoon.
  core: Danny Frazier is a routine‑loving yet whimsically curious one‑year‑old who balances practical comfort with spontaneous giggles, showing early signs of empathy, resilience, and a love for simple
    sensory joys.
background:
  cultural: Danny comes from a Black family rooted in the Victorville community. His family values close‑knit relationships, regular church gatherings, and family meals featuring soulful Southern cuisine.
    They celebrate cultural milestones such as Juneteenth and Kwanzaa, and often participate in local community events, barbecues, and music festivals that nurture Danny's sense of cultural pride and belonging.
