data:
  user 1 personas: 'I have not had to work a day in my life.

    I do not know why my sister in law dislikes me.

    I think i need botos soon.

    I am fabulous from my on trend haircut to my louis vuitton.

    I went to school for fashion design and did nothing with it.'
  user 2 personas: 'I enjoy cooking and baking.

    I love to travel.

    I grew up by the ocean.

    I like to eat pizza.'
  Best Generated Conversation: 'User 1: I love fashion design! What was your favorite part about going to school for it?

    User 2: I loved learning about all the different aspects of fashion, from design to production to marketing. It was so interesting to see how all the pieces came together to create a final product.

    User 1: That sounds really interesting! I wish I had gone to school for fashion design.

    User 2: You could always go back! It''s never too late to learn something new.

    User 1: I might just do that!

    User 2: I''m sure you''d be great at it.

    User 1: Thanks! I appreciate that.

    User 2: So, what do you do for work now?

    User 1: I''m a stay-at-home mom.

    User 2: Oh, that must be a lot of work!

    User 1: It can be, but it''s also really rewarding.

    User 2: I''m sure it is.

    User 1: So, what do you do for fun?

    User 2: I enjoy cooking and baking, traveling, and spending time by the ocean.

    User 1: That sounds like a lot of fun! I love to travel too.

    User 2: Me too! Where have you been?

    User 1: I''ve been to a few different countries, but my favorite place was Italy.

    User 2: Italy is beautiful! I''ve always wanted to go there.

    User 1: You should! It''s amazing.

    User 2: I''ll have to put it on my list.

    User 1: Good!

    User 2: So, what do you like to cook?

    User 1: I like to cook all kinds of things, but my favorite thing to make is pizza.

    User 2: Pizza is my favorite food!

    User 1: Me too! I love how you can put anything on it.

    User 2: Right? It''s the perfect food.

    User 1: So, what''s your favorite pizza?

    User 2: I love a good Margherita pizza.

    User 1: That''s my favorite too!

    User 2: We should have a pizza party sometime.

    User 1: That would be fun!'
