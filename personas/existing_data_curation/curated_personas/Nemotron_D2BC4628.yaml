personas:
  professional: Michelle Baker, a 29‑year‑old community program coordinator‑in‑training, blends meticulous project‑management skills with a love for the arts, using tools like Trello and Canva to design
    and run nonprofit events that foster local creativity while ensuring budgets stay on track.
  sports: Michelle Baker enjoys solo trail runs on the Boise foothills, participates in the Caldwell Trail Runners club for weekend hikes, proudly follows the Boise State Broncos football team, and roots
    for the Idaho Vandals basketball squad, balancing structured exercise with relaxed outdoor exploration.
  arts: Michelle Baker immerses herself in the Boise art scene, regularly attending openings featuring works by local muralist Jeff Ran and national figures like Frida Kahlo, sketches in a personal journal
    while listening to Fleet Foxes and Phoebe Bridgers, and curates visual content on social media using Canva.
  travel: Michelle Baker prefers low‑key road trips that blend nature and culture, has driven the Snake River Canyon loop, visited Yellowstone and Portland, and dreams of a spring retreat in Kyoto's Arashiyama
    district, planning each itinerary with a detailed bullet‑journal spread.
  culinary: Michelle Baker is a confident home cook who loves farm‑to‑table dishes, frequently prepares roasted fingerling potatoes with rosemary, quinoa salads tossed with feta and cherry tomatoes, and
    occasionally bakes almond‑flour crust pies, savoring the bright flavor of locally sourced huckleberries.
  core: Michelle Baker is a highly organized art lover who balances community service with solo hikes, budget‑savvy investing, and the occasional indulgence in craft supplies, all while navigating mild
    allergies and a penchant for meticulous bullet‑journaling.
background:
  cultural: Michelle grew up in a white, middle‑class family in Caldwell, Idaho, shaped by the region's small‑town values of self‑reliance, neighborly cooperation, and a deep appreciation for the outdoors.
    Her upbringing blended traditional community customs—such as church gatherings and local fairs—with exposure to progressive ideas through nearby Boise's cultural offerings. This mix fosters a respectful,
    harmony‑seeking temperament while encouraging openness to new artistic experiences and unconventional thinking.
attributes:
  skills: '["Event planning","Project coordination","Time management","Digital organization tools (Google Suite, Trello)","Basic graphic design (Canva)","Art curation basics","Budgeting and finance tracking
