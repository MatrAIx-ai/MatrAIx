    art club"]'
  career_goals: Michelle aims to secure a full‑time position in nonprofit administration or community program coordination, where she can apply her disciplined planning skills to support arts‑focused outreach
    initiatives. She plans to complete an associate degree in business administration at a nearby community college and earn a Certified Administrative Professional credential within the next two years.
    Simultaneously, she hopes to grow a modest online boutique featuring her handcrafted items, building a brand that marries her love of art with her organized business approach.
