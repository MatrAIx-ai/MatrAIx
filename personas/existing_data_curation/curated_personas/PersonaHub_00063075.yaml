persona_description: A doctor who specializes in the diagnosis and treatment of hereditary genetic diseases, particularly haemochromatosis. The doctor has a background in medical research and has worked
  at research institutions to quantify the amount of iron present in the liver, reducing the need for liver biopsies. The doctor is aware of the risks associated with liver biopsies, including bruising,
  bleeding, and infection, and has a preference for non-invasive measures of iron accumulation, such as serum transferrin saturation and serum ferritin. The doctor is aware of the potential benefits of
  genetic testing for hereditary hemochromatosis, but also recognizes the potential risks and limitations of this approach. The doctor is knowledgeable about other causes of excess iron accumulation and
  is aware of the importance of considering them before diagnosing haemochromatosis.
