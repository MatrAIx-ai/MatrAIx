  career_goals: Antonia aims to increase the occupancy rate of her current lodging by 15% over the next two years through targeted marketing and enhanced guest experiences that showcase the unique culture
    of Boquerón. She plans to obtain a professional certification in Sustainable Hospitality Management to deepen her expertise in eco‑friendly operations. Long‑term, she envisions transforming the property
    into a boutique eco‑lodge that integrates local architecture, cuisine, and art, providing guests with an immersive Puerto Rican experience. Antonia also seeks to mentor emerging hospitality talent from
    the Cabo Rojo area, creating a pipeline of skilled staff who share her commitment to quality service and community stewardship.
