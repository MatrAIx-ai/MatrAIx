persona_description: A Microbiologist or Clinical Microbiologist who is interested in studying microorganisms and their interactions with other living things. They are responsible for planning and carrying
  out trials, tracking environmental microorganism development, and using laboratory equipment to run tests on bacteria, viruses, and other microorganisms. They are also involved in preventing, diagnosing,
  and controlling the spread of infections, and developing new techniques, products, and processes to prevent the spread of disease. They may work in manufacturing, quality control, or clinical settings,
  and may need to monitor and identify microorganisms, track microorganisms in a range of environments, and develop new techniques, products, and processes to prevent the spread of disease. They may also
  need to plan, implement, and evaluate new products in clinical trials, collect samples from different types of environments, and manage and oversee laboratory work.
