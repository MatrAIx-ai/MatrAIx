  hobbies: '[''Basketball'', ''Surfing'', ''Photography'', ''Vlogging'', ''Volunteering at mental health hotlines'', ''Cooking'', ''Hiking'']'
  career_goals: Kevin plans to complete a bachelor’s degree in marketing or communications, with the short‑term goal of securing an internship at a tech‑focused marketing agency. He hopes to become a community
    manager or brand strategist, where he can blend his creative curiosity with data‑driven decision‑making. Long‑term, he aspires to launch a social‑entrepreneurial platform that provides mental‑health
    resources and peer‑support networks for college students.
