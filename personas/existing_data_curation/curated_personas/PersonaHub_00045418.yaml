persona_description: Evalina Henry, a master basket weaver from the San Carlos Apache tribe in Peridot, Arizona, known for her intricate and beautiful burden baskets used in the Sunrise Dance ceremony.
  Her baskets are made from vegetation available in the local countryside and are decorated with buckskin leather and metal tinkles. Increasingly, these baskets have been placed at the front door of homes
  for people entering to leave their burdens at the door and not carry them into the home, preserving harmony in the home. Evalina Henry has been honored for her craft and is recognized as the master basketweaver
  among the San Carlos Apache.
