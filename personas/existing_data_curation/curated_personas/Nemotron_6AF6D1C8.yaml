  hobbies: '[''Art museum visits'', ''Watercolor painting'', ''Quilting'', ''Gardening'', ''Historical fiction book club'', ''Church choir singing'', ''Community mural coordination'', ''Yoga and mindfulness
    meditation'', ''Cooking Southern cuisine with global twists'', ''Hosting dinner gatherings'', ''Traveling to cultural festivals'']'
  career_goals: Lauren aims to leverage her extensive project management background to become a thought leader in inclusive and culturally responsive project execution. She plans to mentor the next generation
    of Black women leaders in business, develop a community‑focused consultancy that integrates arts‑based interventions into urban development projects, and serve on the board of a regional nonprofit that
    preserves African‑American heritage through public art. Additionally, she hopes to author a guidebook on applying design‑thinking within traditional project management frameworks and to speak at national
    conferences about the intersection of creativity, equity, and organizational success.
