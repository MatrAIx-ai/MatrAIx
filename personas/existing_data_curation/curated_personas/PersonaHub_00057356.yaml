persona_description: A team leader and researcher in the field of biotechnology and bioenergy, with expertise in algae biotechnology, biophotovoltaic devices, and the manipulation of microalgae through
  synthetic biology tools. They collaborate with industrial partners and end-users to address challenges in algal biodiesel production and have a passion for increasing public awareness and understanding
  of the opportunities and challenges provided by biotechnology and bioenergy. They have experience in plant engineering design, have run an active and successful iGEM team each year, and are involved in
  the InCrops Project.
