    Historical Novels'', ''DIY Home Improvement'']'
  career_goals: He aims to become a senior project manager for a regional construction firm, overseeing multi-site projects, and to complete a construction management certificate program. He also dreams
    of eventually starting his own small contracting company focused on sustainable residential renovations. In the short term, he wants to improve his knowledge of green building practices and gain a LEED
    Green Associate credential. Additionally, he hopes to be recognized for safety leadership with a company award.
