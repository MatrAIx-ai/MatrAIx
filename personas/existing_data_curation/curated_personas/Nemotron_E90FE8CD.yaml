  hobbies: '["Watercolor painting","Gardening (native flora and herbs)","Birdwatching","Reading historical fiction","Knitting","Attending small coffee‑house gatherings","Playing harmonica (folk music)"]'
  career_goals: Looking ahead, Gisele aims to transition into a mentorship role where she can share her decades of experience with younger social workers and volunteers, while also spearheading a community
    arts‑therapy initiative for seniors in Tuscaloosa County. She hopes to secure a certification in trauma‑informed care and to collaborate with the local senior center to create a weekly “Creative Healing”
    program that blends storytelling, painting, and music. Over the next five years, she envisions establishing a small nonprofit that sustains these low‑cost, flexible art‑based services and eventually
    stepping back into a part‑time advisory capacity as she approaches retirement.
