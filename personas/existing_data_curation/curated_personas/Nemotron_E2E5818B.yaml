  hobbies: '[''Playing soccer'', ''Dancing to Mexican folk and Tejano music'', ''Cooking traditional Mexican dishes'', ''Gardening native plants'', ''Volunteering at church food bank'', ''Attending community
    festivals'', ''Learning digital marketing'']'
  career_goals: Approaching retirement, Disney aims to leave a lasting legacy by mentoring younger managers, introducing a digital inventory system that streamlines operations, and spearheading a community
    health fair that showcases local vendors and promotes wellness. He aspires to be elected to the board of the Starr County Small Business Association, gain recognition as a trusted advisor in the region,
    and eventually transition to a part‑time consultancy role that lets him share his practical experience while staying connected to his community.
