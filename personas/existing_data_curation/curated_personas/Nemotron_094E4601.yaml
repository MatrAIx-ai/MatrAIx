  career_goals: Mike dreams of turning his love for art and abstract ideas into a career that blends creativity with technology. He aims to attend a specialized high school focused on visual arts and computer
    science, and eventually pursue a university degree in architecture, multimedia design, or video game development. His long‑term ambition is to design immersive experiences—whether buildings, digital
    games, or interactive installations—that inspire curiosity and evoke emotion.
