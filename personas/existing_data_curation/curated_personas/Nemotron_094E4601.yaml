personas:
  professional: Mike Hodinka, an aspiring teen creator, merges a passion for comic strip storytelling, digital landscape painting, and basic Arduino programming into a growing portfolio of interactive narratives,
    using the strategic foresight honed by chess and a methodical planning habit to meet self‑set milestones for each project.
  sports: Mike Hodinka hikes local nature trails with the youth outdoor club on Saturdays, plays pickup basketball after school while rooting for the Chicago Bulls and following the Colorado Rockies, yet
    often postpones planned gym sessions in favor of late‑night comic drawing.
  arts: Mike Hodinka infuses their graphic storytelling with influences from comic legends Alan Moore and manga artist Ei Aida, channels the whimsical visual language of Hayao Miyazaki, and fuels sketch
    marathons with indie sounds from Tame Impala, Mitski, and Phoebe Bridgers.
  travel: Mike Hodinka plans meticulous weekend road trips to national parks like Yellowstone and Shenandoah, dreaming of a future backpack trek across New Zealand’s South Island to photograph dramatic
    fjords for their digital art, yet school exams and club commitments often delay longer expeditions.
  culinary: Mike Hodinka’s culinary adventures feature a go‑to homemade ramen bowl spiked with miso, soft‑boiled egg, and sriracha, an occasional pepperoni pizza perfected after watching YouTube tutorials,
    and experimental avocado‑lime smoothie bowls that double as a post‑study energy boost.
  core: Mike Hodinka is a disciplined dreamer who juggles vivid comic worlds with rigorously scheduled sketch sessions, hoarding spare change for art supplies while occasionally losing sleep over unfinished
    storyboards.
background:
  cultural: Mike grew up in Phenix City, Alabama, a small town at the Alabama‑Georgia border with a close‑knit community vibe. His family values education and community involvement, and they often attend
    local events like the Phenix City Arts Festival and church gatherings, giving him exposure to Southern hospitality and a modest, supportive environment. The region’s blend of traditional Southern culture
    and nearby urban influences, such as the art scene in Columbus, Georgia, provides Mike with both conventional community roots and access to broader creative opportunities.
