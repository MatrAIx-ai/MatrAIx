personas:
  professional: Amanda Tokanel, a veteran operations manager with over 35 years in hospitality and retail, blends curiosity and practicality; they leverage their Lean Six Sigma Green Belt expertise, advanced
    Excel modeling, and ERP mastery to streamline workflows and mentor emerging leaders, while maintaining a competitive, data‑driven mindset that balances curiosity about new technologies with a practical,
    results‑oriented approach.
  sports: Amanda Tokanel keeps active by strolling Lake Louisa State Park trails five mornings a week, they participate in the senior fitness class at Kissimmee Community Center, cheer on the Orlando Magic
    during the NBA season and Orlando City SC in the MLS, and they channel their competitive spirit into weekly bridge tournaments with the local Bridge Club.
  arts: Amanda Tokanel nurtures their artistic side through a weekly slot at the Downtown Kissimmee Jazz Club, where they soak up classics by Ella Fitzgerald and Miles Davis, volunteer at the local heritage
    museum, and unwind with historical fiction by Ken Follett and mystery novels by Agatha Christie, which together shape their evenings.
  travel: Amanda Tokanel favors well‑planned, leisurely trips that blend cultural immersion with comfort; they spend summers exploring St. Augustine’s historic district, indulge in Orlando’s theme‑park
    thrills, and dream of a Mediterranean cruise to the Greek Islands while budgeting for a future road‑trip across the Southwestern national parks.
  culinary: Amanda Tokanel delights in Mediterranean cooking, expertly preparing grilled branzino with lemon‑oregano glaze, rosemary‑roasted chicken, and tabbouleh made from fresh parsley, bulgur, and tomatoes
    sourced at the Kissimmee farmers’ market, while they occasionally treat themselves to a seared scallop risotto at a local seafood restaurant.
  core: Amanda Tokanel is a pragmatic, curiosity‑driven senior operations veteran whose competitive edge fuels meticulous planning—from morning hikes and garden roses to data‑rich spreadsheets—while a tendency
    to over‑schedule and occasional dental neglect reveal their imperfect, perfectly balanced approach to life, and they continue to seek new challenges.
background:
  cultural: Amanda’s cultural background reflects a classic White American upbringing typical of the post‑World War II generation. Raised in a middle‑class, suburban community, she was exposed to mainstream
    American customs—Thanksgiving, Christmas, and community church gatherings. Moving to Central Florida in her 30s placed her in a region where tourism and a growing Hispanic population have infused everyday
    life with Spanish language, Latin cuisine, and multicultural festivals. While she continues to identify with the values of her early environment—self‑reliance, practicality, and a strong work ethic—she
    has adopted local customs such as participating in the annual Kissimmee Heritage Festival and enjoying Florida’s outdoor lifestyle.
