  career_goals: As she approaches retirement, Amanda aims to transition her deep operational knowledge into a part‑time consulting role, helping small‑to‑mid‑size businesses in the Orlando area improve
    efficiency and implement sustainable practices. She hopes to mentor a successor within her current organization, formalizing a training program for emerging managers. Additionally, she plans to earn
    a formal Six Sigma Black Belt certification within the next two years, and to serve on the local Chamber of Commerce’s business‑development committee to influence regional economic growth. Ultimately,
    she wishes to secure financial stability for her retirement while leaving a legacy of operational excellence and community involvement.
