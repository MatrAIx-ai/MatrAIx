persona_description: A professor who specializes in the development of artificial intelligence, biomedical engineering, and robotics. He has a unique ability to link the human nervous system into the internet
  and has successfully carried out experiments that extend the nervous system over the internet to control a robotic hand, a loudspeaker, and an amplifier. He is also known for his work in the field of
  cyborg technology, which involves the creation of cyborgs with 30 million brain cells and the embedding of a more elaborate chip directly into the brain. He is optimistic about the potential breakthroughs
  that his research will bring and fears that his cyborgs could become a new type of threat to mankind.
