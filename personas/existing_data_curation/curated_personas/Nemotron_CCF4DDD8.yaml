  hobbies: '[''Sailing'', ''Reading historical theology and leadership books'', ''Gardening'', ''Playing piano/organ'', ''Volunteering at food banks'', ''Exploring historic sites'', ''Mindfulness meditation'',
    ''Writing reflective essays'']'
  career_goals: Tony aspires to become a senior pastor or diocesan leader, expanding his congregation’s social‑service initiatives and establishing a network of faith‑based community programs across Rhode
    Island. He aims to author a book that bridges business principles with spiritual leadership, integrate digital platforms for remote worship, and mentor emerging clergy. Ultimately, he envisions a church
    that balances tradition with innovative outreach, reaching diverse populations while maintaining fiscal responsibility.
