  career_goals: Alvin aims to transition from a senior management analyst role to a director-level position overseeing enterprise-wide transformation initiatives within the manufacturing sector of the Midwest.
    He is pursuing a PMP certification and plans to enroll in an executive MBA program to broaden his strategic leadership capabilities. Long-term, he envisions launching a boutique consulting firm that
    helps mid-size manufacturers adopt agile, data-driven processes while championing flexible work environments. Additionally, he hopes to mentor emerging analysts, build a robust internal training program,
    and become an advocate for community-focused economic development projects in Oakland County.
