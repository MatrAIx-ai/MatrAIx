persona_description: A scientist who specializes in the study of marine sharks, particularly the Pacific common thresher shark. They are working with NOAA Fisheries and the Pacific and Western Pacific Fishery
  Management Councils to assess the stock status of the species and share information with international and national fisheries conservation and management bodies. They are also involved in research on
  the stomach contents of shortfin mako, blue, and common thresher sharks in the California Current and have developed an index of abundance for the species using catch data.
