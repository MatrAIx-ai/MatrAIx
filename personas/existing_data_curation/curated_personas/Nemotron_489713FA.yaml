personas:
  professional: A budding kindergarten explorer, Shatia Lewis, blends a boundless curiosity with an early knack for problem‑solving, often turning building blocks into simple experiments and chatting excitedly
    with classmates about how things work, while they relish the freedom of a flexible, unstructured play schedule.
  sports: A high‑energy participant in the Sunshine Park preschool soccer program, Shatia Lewis darts after the ball with the Little Lions team, proudly waving the team’s flag, and also loves splash‑time
    at the nearby kiddie pool where they practice free‑style swimming and cheer on the local junior baseball team during family outings.
  arts: An enthusiastic fan of animated music, Shatia Lewis sings loudly to Disney hits like "Let It Go" and "Under the Sea", draws vibrant characters from "Frozen" and "Moana", and eagerly attends the
    library’s puppet story hour, often imitating the performers and demanding a encore.
  travel: A curious mini‑traveler, Shatia Lewis has already journeyed to Grandma’s countryside cottage, taken a road trip to the sunny beach where they built sandcastles, and daydreams about Disney World’s
    bright lights, preferring trips that mix planned play dates with free‑roaming exploration, always packing their favorite stuffed bunny.
  culinary: A picky yet adventurous eater, Shatia Lewis delights in chicken nuggets with honey‑mustard, cheesy macaroni, and strawberry‑topped yogurt, proudly assembles a peanut‑butter‑jelly sandwich with
    an extra dollop of jam, and helps stir pancake batter on Sunday mornings, though they staunchly refuse broccoli.
  core: Shatia Lewis is a chatty, curiosity‑driven five‑year‑old who mixes spontaneous play with a love for sharing stories, happily hopping from one interest to the next while occasionally leaving toys
    strewn about.
background:
  cultural: Shatia is raised in a Black family in Waterbury, Connecticut, where African‑American cultural traditions blend with New England community life. Her family celebrates holidays such as Juneteenth
    and Kwanzaa, enjoys gospel and R&B music at home and church, and participates in local cultural festivals. The neighborhood’s diverse community and frequent visits to the city’s cultural centers expose
    her to a wide range of artistic expressions, reinforcing her love for music, storytelling, and communal gatherings.
