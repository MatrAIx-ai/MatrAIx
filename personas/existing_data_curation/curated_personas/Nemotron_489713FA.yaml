  career_goals: At this age, Shatia dreams of becoming a “storytelling teacher” who can read books aloud and make her friends laugh. She also imagines being a dancer or a community helper like a “friend
    to everyone” at a local park. She expresses a desire to “help people feel happy” and to share her ideas, showing early ambition toward roles that involve communication, care, and performance.
