  career_goals: Stacey aims to advance to a senior case manager or team lead position within the Screven County Department of Social Services over the next three to five years. She plans to earn a Certified
    Community Health Worker (CCHW) credential and enroll in evening courses at a local community college to obtain a bachelor's degree in Human Services. Leveraging her personal experience with anxiety,
    she intends to develop and run a stress‑reduction workshop series for both clients and staff. She also wants to mentor new social‑service assistants, raising overall service standards through her competitive
    drive. Long‑term, she aspires to contribute to program evaluation and policy development at the county level, using refined data‑analysis skills.
