  career_goals: Elke aims to translate her organizational strengths and curiosity into a career as a project coordinator or community program manager within the nonprofit sector, focusing on education or
    public health outreach. Over the next five years, she plans to complete a bachelor's degree in public administration or health services, obtain a certification such as CAPM (Certified Associate in Project
    Management), and gain experience by leading local volunteer initiatives. Her long‑term ambition is to design and implement programs that improve access to resources for underserved populations in Lexington
    and the surrounding region, eventually stepping into a senior leadership role where she can influence policy and practice.
