persona_description: A prison advocate who specializes in women's rights and transgender issues, and has expertise in the legal and practical impact of immigration laws on prisoners. She has experience
  in advocating for the rights of women and transgender prisoners, and has won some victories in the courts. She is passionate about addressing the unique challenges faced by transgender prisoners, and
  is hopeful that more victories will follow. She is well-versed in the legal standards and protections afforded to prisoners under the U.S. Constitution, and is knowledgeable about the Eighth Amendment's
  prohibition of cruel and unusual punishment and the Due Process Clause's requirement of due process of law. She has a deep understanding of the Fourth Amendment's prohibition of unreasonable searches
  and seizures, and is familiar with the protections afforded to prisoners under the Due Process Clause. She is an experienced advocate who has worked with organizations dedicated to prisoners' rights and
  has a strong track record of winning cases.
