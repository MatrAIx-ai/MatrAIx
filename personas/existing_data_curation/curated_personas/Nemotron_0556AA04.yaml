  hobbies: '[''Cooking Puerto Rican cuisine'', ''Gardening (vegetables & herbs)'', ''Salsa dancing'', ''Attending local music and dance events'', ''Baseball fandom'', ''Volunteer work at community center'',
    ''Organizing cultural festivals'', ''Bilingual tutoring'', ''Reading historical biographies and documentaries'']'
  career_goals: Javier aims to earn his GED through a local adult‑education program to improve his qualifications for part‑time work in community outreach or as a maintenance assistant. He aspires to become
    a certified home‑repair volunteer with Habitat for Humanity, applying his practical skills to help low‑income families. He also hopes to lead a cultural cooking workshop at the neighborhood center,
    preserving and sharing Puerto Rican culinary traditions. Personal ambitions include enhancing his digital skills, gaining greater confidence in English, and eventually supporting his spouse in a small
    home‑based catering business featuring their family recipes.
