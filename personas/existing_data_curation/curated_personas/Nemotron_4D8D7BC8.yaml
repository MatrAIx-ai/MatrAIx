  career_goals: Mirurgia aims to expand her company's footprint into the Southwest and Latin American markets, positioning the firm as a leader in sustainable logistics while championing diversity and inclusion.
    She plans to launch a corporate social responsibility initiative that supports Mexican‑American artists and mental‑health programs, reflecting both her cultural roots and personal experience with anxiety.
    Over the next five years, she seeks to mentor a pipeline of women executives, cultivate a culture of innovative thinking, and possibly transition to a board‑level role that influences industry‑wide
    standards for ethical leadership.
