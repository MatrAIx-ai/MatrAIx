persona_description: A healthcare professional or researcher who is interested in the connection between obesity, weight gain, and the risk of developing dementia in older adults. They are likely to be
  a physician, epidemiologist, or public health specialist who has conducted research on the relationship between body mass index (BMI) and the risk of developing dementia in older adults. They are also
  likely to be familiar with the use of waist size as an indicator of excess fat, and the potential benefits and limitations of using waist size as an indicator of excess fat compared to BMI. They may have
  conducted research on the relationship between waist size and the risk of developing dementia in older adults, and may be interested in further research on this topic.
