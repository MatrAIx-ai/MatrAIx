  hobbies: '[''Knitting and crocheting'', ''Vegetable gardening'', ''Cooking Texan and Southern recipes'', ''Reading mystery novels'', ''Listening to classic country music'', ''Walking around Buffalo Bayou'',
    ''Church choir participation'', ''Senior center bingo nights'', ''Visiting local museums'']'
  career_goals: Heidi aims to maintain a stable, predictable routine that supports her physical and emotional well‑being. She wishes to deepen her involvement with the local senior center by organizing
    weekly knitting circles and assisting with the planning of health‑education workshops. Learning to use tablet‑based video‑calling platforms more confidently is a personal goal, allowing her to stay
    connected with her grandchildren. She also aspires to develop a small support group for seniors coping with anxiety, using her empathetic nature to create a safe, structured environment. Ultimately,
    Heidi hopes to leave a lasting legacy of community service and cherished handmade gifts for future generations.
