persona_description: A New Yorker who is passionate about city planning and sustainable development, especially in the context of Staten Island. They are aware of the city's history of land acquisition
  and development, and are concerned about the potential impact of future storms on the city's natural drainage systems. They are interested in the Bluebelt project and its role in managing stormwater runoff,
  but are also aware of its limitations in preventing the combination of rising tide waters and winds that caused the destruction caused by Hurricane Sandy. They are likely to be knowledgeable about city
  planning and development, and are interested in the intersection of urban planning and environmental science.
