persona_description: A historian or a researcher who is deeply interested in the history of the settlement and massacres of the Aborigines in the Swan Valley, particularly the events surrounding the Ballardong
  massacre in 1851. They are passionate about understanding the causes and consequences of the events and the broader impact on the relationship between the settlers and the Aboriginal people in the region.
  They are also interested in the broader historical context and the ongoing legacy of the massacre, including its impact on the region's Aboriginal population and the broader Australian society.
