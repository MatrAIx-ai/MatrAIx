personas:
  professional: Yuri Troutman, a one‑year‑old with a surprisingly balanced curiosity and practicality, methodically arranges building blocks while testing new gadgets, and they display early signs of a
    future engineer who values efficient solutions and reliable routines.
  sports: Yuri Troutman, who delights in toddler swim lessons at the local community pool and energetically mimics the cheering of the New York Yankees Jumbotron, balances organized play with spontaneous
    crawling races against a sibling, and they reflect a competitive yet flexible approach to early physical activity.
  arts: Yuri Troutman, enthralled by the soothing melodies of Raffi's 'Baby Beluga' and the rhythmic storytelling of Sesame Street, often requests repeat performances, and they show a budding appreciation
    for music and visual arts that blends curiosity with a practical preference for familiar, calming tunes.
  travel: Yuri Troutman, who has already explored the sandy shores of Clearwater Beach with family and enjoys the gentle rhythm of car trips to grandparents' home, eagerly anticipates a future visit to
    Disneyland, and they balance adventurous curiosity with a preference for familiar routines and calm environments.
  culinary: Yuri Troutman, whose palate favors smooth sweet‑potato puree, avocado mash, and occasional soft pear slices, displays a practical approach to meals by insisting on non‑messy, easy‑to‑swallow
    foods, and they occasionally reject overly sweet or brightly colored purees.
  core: Yuri Troutman, a one‑year‑old prodigy of calm competitiveness, blends inquisitive exploration with pragmatic routines, is skeptical of novelty yet reliably organized, and they forge a uniquely balanced
    outlook on life's earliest challenges.
background:
  cultural: Yuri is an African‑American child raised on the East Side of Cleveland, Ohio. His family embraces Black cultural traditions, celebrating Juneteenth and Kwanzaa, sharing soul‑food dishes such
    as collard greens and cornbread, and filling the home with gospel, R&B, and jazz music. Regular attendance at a local church offers a communal space for call‑and‑response singing and storytelling. The
    neighborhood’s strong sense of community, intergenerational support, and rich African‑American history shape his worldview, reinforcing values of resilience, stewardship, and collective pride.
