  hobbies: '[''Volunteering at a local animal shelter'', ''Hiking in state parks'', ''Cooking Mediterranean dishes'', ''Reading contemporary fiction'', ''Yoga for mindfulness'', ''Attending community theater
    productions'', ''Gardening'']'
  career_goals: Jennifer aims to transition from a production worker to a supervisory role within the next three to five years, leveraging her hands‑on experience and coursework to lead a small team on
    the shop floor. She hopes to earn an associate degree in industrial engineering or supply chain management, which will position her for a future as a production manager or process improvement specialist.
    Long‑term, she envisions mentoring new hires and championing initiatives that enhance workplace safety and employee well‑being.
