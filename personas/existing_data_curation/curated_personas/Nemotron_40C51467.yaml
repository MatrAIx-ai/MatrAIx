personas:
  professional: David Wells is a seasoned community mentor who blends hands‑on woodworking, small‑engine repair, and garden stewardship with his curiosity for modern tools, leading informal workshops on
    home repair and gardening while juggling a GED pursuit and a desire to archive local oral histories, often improvising lesson plans on the fly because strict schedules feel restrictive.
  sports: David Wells enjoys seasonal hunting for whitetail deer and turkey, weekend fishing on Elkhorn Creek, and follows the local high‑school basketball team, the Knox County Cougars, cheering from the
    bleachers while also participating in a community “senior walkers” club that meets every Saturday morning.
  arts: David Wells spends evenings listening to bluegrass legends like Bill Monroe and contemporary folk duo The Milk Carton Kids, playing a battered but beloved harmonica, and attending the annual regional
    folk‑storytelling festival where they later share a tale about the old mill, while also crafting wooden birdhouses that feature hand‑painted Appalachian motifs.
  travel: David Wells prefers short, purposeful trips that combine family visits and nature, such as a yearly weekend drive to Shenandoah National Park for hiking and a recent road‑trip to Asheville, NC
    to explore the River Arts District and sample local craft brews; they rely on printed maps, avoid large crowds, and budget modestly, keeping travel plans flexible to accommodate community commitments.
  culinary: David Wells delights in preserving the harvest, making cherry jam, pickled cucumbers, and a hearty bean and ham stew seasoned with fresh thyme from his garden, while also mastering a perfect
    fried cornbread; they often cook for the church soup kitchen, using heirloom tomato vines and a cast‑iron skillet that’s seen generations of meals.
  core: David Wells is a pragmatic storyteller‑mentor who trades a steady hand for a wandering mind, balancing community service, handcrafted hobbies, and a love of bluegrass, all while occasionally forgetting
    appointments but never missing a fishing sunrise.
background:
  cultural: David grew up in an Appalachian community in Eastern Kentucky, where self-reliance, close family ties, and church life are central. The region's folk traditions of storytelling, music, and practical
    craftsmanship have shaped his values. Though rooted in these heritage customs, he embraces new ideas through curiosity about technology and modern farming methods. The economic changes in Knox County
    over his lifetime have reinforced his appreciation for community support and perseverance.
attributes:
  skills: '["woodworking", "small engine repair", "home gardening", "traditional Appalachian cooking", "first aid", "basic computer literacy", "community mediation", "storytelling and oral history", "budgeting
