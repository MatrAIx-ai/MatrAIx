  hobbies: '["fishing", "hunting", "gardening", "woodworking", "listening to bluegrass music", "playing harmonica", "reading local history", "genealogy research", "cooking and preserving foods", "volunteering
    at church soup kitchen"]'
  career_goals: David hopes to formalize his role as a community elder by volunteering as a local history archivist, leading workshops on basic home repair and gardening for younger neighbors, and completing
    his GED to qualify as a certified first-aid instructor. He also aspires to author a memoir capturing the stories of Woodbine's families, and to stay physically active through regular fishing trips and
    volunteer work.
