personas:
  professional: Jonathan Wright, a budding junior naturalist with an early fascination for marine life, uses their vivid curiosity, sketching skill, and love of quiet observation to explore tide pools,
    while their spontaneous nature makes structured learning plans feel restrictive.
  sports: Jonathan Wright, a pint‑sized beach enthusiast who spends summer mornings in the Clearwater Kids Swim Club and joins the St. Petersburg Pelicans' tee‑ball practice, prefers solitary sandcastle
    building to organized games, though they occasionally cheer for the Miami Dolphins when the TV is on.
  arts: Jonathan Wright, an avid attendee of the Pinellas County Art Fair, delights in drawing seashell collages inspired by local artist Savannah Gilchrist, enjoys listening to The Wiggles and watching
    Disney's Moana for its vibrant colors, and often spends quiet evenings coloring in a sketchbook, channeling their curiosity into creative expression.
  travel: Jonathan Wright, who loves family trips to Clearwater Beach and the Everglades airboat tours, dreams of exploring the coral reefs of the Bahamas and the ancient ruins of St. Augustine, prefers
    unplanned sand‑filled days over strict itineraries, and often packs a tiny backpack with a favorite seashell for good luck.
  culinary: Jonathan Wright, a picky yet adventurous eater, favors chicken nuggets, mac‑and‑cheese, and fresh strawberry slices, but also delights in occasional kid‑friendly key lime pie and grilled fish
    tacos at local beach shacks, often insisting on helping whisk the batter despite a tendency to spill the flour.
  core: Jonathan Wright is a curious, solitary four‑year‑old who balances a love for quiet nature exploration with occasional bursts of worry, impulsive spending, and a vivid imagination that fuels their
    art and play.
background:
  cultural: Jonathan is raised in a middle‑class white American family in Saint Petersburg, Florida. His parents encourage exposure to the arts, frequent trips to the nearby beaches, and visits to community
    museums and cultural festivals. The family’s routine includes reading bedtime stories, attending local art fairs, and exploring the Gulf coast’s natural habitats. Growing up in Pinellas County provides
    him with a blend of suburban comforts and a diverse, multicultural environment, though his immediate cultural upbringing is rooted in typical Southern‑Florida middle‑class values, emphasizing independence,
    curiosity, and appreciation for nature.
attributes:
  skills: '[''Letter recognition and early phonics'', ''Counting to twenty and simple number matching'', ''Drawing simple shapes and coloring within lines'', ''Manipulating child‑safe scissors'', ''Imaginative
    storytelling with toys'', ''Observational drawing from pictures'', ''Self‑directed use of educational apps'']'
  hobbies: '[''Drawing and coloring marine scenes'', ''Building with Lego bricks'', ''Listening to instrumental/classical music'', ''Reading picture books about animals and space'', ''Visiting the local
    art museum'', ''Beach walks and nature exploration'', ''Playing educational apps on a tablet'']'
  career_goals: Although still very young, Jonathan often talks about becoming an artist who can paint the sea and the creatures he sees at the beach. He also dreams of exploring the ocean as a marine biologist,
    fascinated by the colorful fish of Florida’s Gulf waters. Occasionally he mentions wanting to be an astronaut, drawn by the idea of discovering new worlds. Most of his aspirations center on quiet, creative
    work where he can experiment with ideas and express his imagination without needing large groups.
