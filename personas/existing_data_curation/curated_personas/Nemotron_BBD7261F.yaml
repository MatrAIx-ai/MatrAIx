  career_goals: Though not yet in the workforce, Jonathan’s curiosity about how things work and his practical mindset have already sparked ambitions for a future in engineering or space exploration. He
    often talks about building rockets, fixing toys, and designing new games, and he enjoys imagining a role where he can create and test his own inventions. His competitive streak drives him to aim for
    being the ‘best builder’ in his preschool class, while his steady temperament suggests he will pursue these goals with persistence.
