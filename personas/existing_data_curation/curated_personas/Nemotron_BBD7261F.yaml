personas:
  professional: Jonathan Naquin, a three‑year‑old who turns his playroom into a miniature lab, spends hours building precise towers from interlocking blocks, demonstrating nascent engineering curiosity
    balanced by a practical sense of structural stability, and channels his competitive streak by quietly measuring his creations against those of his few playmates while maintaining a reserved, methodical
    approach to problem‑solving.
  sports: Jonathan Naquin, a regular attendee of the Tiny Tigers Soccer Club’s preschool program, idolizes the Los Angeles Dodgers and mimics their celebratory gestures, spends afternoons balancing on low
    gymnastics beams and swimming in the Little Dolphins Swim Class, and approaches fitness with a blend of structured drills and solitary free‑play, always aiming to out‑perform his small group of peers.
  arts: Jonathan Naquin, a three‑year‑old who eagerly sings along to Raffi’s “Baby Beluga,” repeats Disney’s “Let It Go” from Frozen on loop, draws bold dinosaur sketches inspired by Pixar’s “The Good Dinosaur,”
    and critically evaluates the colors he uses, favoring bright primary hues while gently rejecting muted tones.
  travel: Jonathan Naquin, an adventurous three‑year‑old who has explored the sandy shores of Gulf Coast beaches on family road trips, visited the towering cliffs of Grand Canyon on a short vacation, and
    dreams of seeing the fireworks over Sydney Harbour, prefers itineraries that include scheduled nap times and quiet play zones, and insists on a window seat for optimal viewing.
  culinary: Jonathan Naquin, a three‑year‑old with a developing palate, favors creamy mac and cheese, honey‑drizzled carrots, and bite‑size mango chunks, can stir batter with a plastic spoon under supervision,
    and stubbornly refuses peas, while keeping a critical eye on any dish that isn’t vividly colored.
  core: Jonathan Naquin, a precociously analytical three‑year‑old, balances fierce curiosity with practical play, saves every coin in a piggy bank, judges snack choices like a tiny accountant, and insists
    on flawless block towers before bedtime.
background:
  cultural: Jonathan is a white child of Northern European ancestry raised in Nashua, New Hampshire. His family participates in typical New England traditions, including Thanksgiving gatherings, summer
    community picnics, and seasonal activities like leaf‑collecting in the fall. He attends a local preschool that emphasizes early literacy, hands‑on science, and communal respect, providing a cultural
    environment that blends mainstream American values with a modest suburban New England lifestyle.
