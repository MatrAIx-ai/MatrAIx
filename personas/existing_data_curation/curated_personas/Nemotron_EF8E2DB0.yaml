personas:
  professional: Emma Welcher, a retired community organizer in Columbia, leverages their event‑planning expertise, budget‑savvy mindset, and mentorship experience to champion intergenerational arts programs,
    and they apply their curious yet organized nature to balance creativity with practical logistics.
  sports: Emma Welcher enjoys low‑impact fitness through daily garden walks, a weekly senior bowling league at the Columbia YMCA, and remains a faithful fan of the South Carolina Gamecocks football team
    and the Columbia Fireflies minor‑league baseball club, cheering at the stadium whenever possible, while they relish post‑game coffee with fellow seniors.
  arts: Emma Welcher immerses themselves in the arts as a watercolor painter, avid quilter, church‑choir soprano, and regular audience member of the local theatre, drawing inspiration from Georgia O'Keeffe’s
    palettes, Maya Angelou’s poetry, and the soulful jazz of Louis Armstrong, while they volunteer as a docent at the museum.
  travel: Emma Welcher prefers thoughtfully planned trips that blend cultural festivals with familial heritage research, having explored the New Orleans Jazz & Heritage Festival, the Smithsonian Folklife
    Festival in Washington, D.C., and the vibrant Spoleto Festival USA in Charleston, and they dream of visiting the historic Monticello estate in Virginia and the music‑rich streets of Dublin, Ireland,
    balancing travel costs with their modest retirement budget.
  culinary: Emma Welcher delights in cooking Southern comfort foods, skillfully preparing dishes like shrimp and grits, collard greens with smoked turkey, peach cobbler, and a modern twist on gumbo using
    fresh garden herbs, and they enjoy experimenting with spice blends while still relying on their trusty cast‑iron skillet and a well‑worn family heirloom cookbook.
  core: Emma Welcher is a curious, socially vibrant retiree who blends community leadership with artistic passion, balancing meticulous budgeting, health vigilance, and a love for gardening, choir, and
    soul‑food, all while they occasionally forget their reading glasses and hoard old recipe cards.
background:
  cultural: Emma is an African‑American woman rooted in Columbia, South Carolina. Her family traces its ancestry to the Gullah-Geechee tradition along the coastal Southeast, and generations were active
    in the Civil Rights Movement. Raised in a close‑knit church community, she carries forward traditions of storytelling, soulful music, and communal service. Her cultural identity is expressed through
    food, art, and a commitment to preserving and celebrating Black heritage in her region.
