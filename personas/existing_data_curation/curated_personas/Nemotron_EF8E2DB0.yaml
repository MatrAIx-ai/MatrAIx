  hobbies: '[''painting'', ''quilting'', ''cooking'', ''gardening'', ''church choir singing'', ''traveling to cultural festivals'', ''reading historical novels'', ''genealogy research'']'
  career_goals: Although retired, Emma is dedicated to expanding her impact on the cultural life of Columbia. She aims to serve on the board of the local museum, launch a youth arts mentorship program,
    and compile a memoir that blends family genealogy with the story of the African‑American community in Richland County. She also hopes to travel to national African‑American heritage festivals to broaden
    her cultural perspective and bring new ideas back to her hometown.
