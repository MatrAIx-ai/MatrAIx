personas:
  professional: Lanh Bui, a biomedical engineer with a graduate degree, leverages her expertise in Python, R, and MATLAB to design data‑driven health‑analytics solutions while her methodical nature and
    project‑management experience ensure multidisciplinary teams deliver precise, reproducible results on schedule.
  sports: Lanh Bui enjoys weekend hikes with the Finger Lakes Hiking Club, tracks her progress on a Garmin watch, supports regional teams such as the Buffalo Bills and the Rochester Red Wings, and occasionally
    joins a local yoga league for gentle cross‑training.
  arts: Lanh Bui finds creative solace in a small book club that discusses Ken Burns documentaries, Margaret Atwood novels, and Stephen Hawking’s science nonfiction, regularly attends performances by the
    Rochester Philharmonic Orchestra, draws inspiration from Monet’s water lilies, and relaxes listening to David Bowie and Tori Amos.
  travel: Lanh Bui favors thoughtfully planned trips that blend nature and culture, such as solo treks through the Adirondack High Peaks, culinary tours of Tuscany’s farmer markets, and a short stay in
    Kyoto to explore traditional tea ceremonies, always leaving room in her itinerary for spontaneous garden‑related detours.
  culinary: Lanh Bui refines family recipes in her kitchen, meticulously balancing flavors with fresh basil, cilantro, lemongrass, and citrus zest, while her thriving garden supplies vegetables for a signature
    herb‑infused broth that she demonstrates at small cooking workshops for friends and local food producers.
  core: Lanh Bui blends analytical rigor with a love for solitary garden‑to‑table cooking, turning data into community health insights while juggling a structured budget and a quiet, nature‑driven lifestyle.
background:
  cultural: Born to Vietnamese immigrant parents, Lanh grew up in a bilingual household where Tet celebrations, family meals centered on pho and bánh mì, and reverence for elders were integral. Her upbringing
    combined the collectivist values of Southeast Asian culture - emphasis on community responsibility and harmony - with the independent, practical mindset of upstate New York life. She remains active
    in the local Vietnamese community association, participating in cultural festivals and language preservation workshops, while also embracing the regional customs of the Finger Lakes area. This dual
    heritage influences her disciplined work ethic, love of cooking, and commitment to mentoring younger generations.
attributes:
  skills: '["Data Analysis", "Statistical Modeling", "Python Programming", "R Programming", "MATLAB", "Laboratory Techniques (PCR, spectrophotometry, imaging)", "Technical Writing", "Project Management",
