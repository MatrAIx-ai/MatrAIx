  hobbies: '["Gardening (herbs and vegetables)", "Vietnamese cooking and recipe experimentation", "Reading (historical fiction, science nonfiction)", "Hiking in Finger Lakes region", "Small-group book club",
    "Yoga and mindfulness practice", "Knitting/crocheting", "Volunteer STEM tutoring"]'
  career_goals: Lanh aims to translate her technical background into a part-time data-analytics role that supports local health initiatives. Over the next year she plans to earn a certified data-analytics
    credential and volunteer as a STEM mentor for middle-school girls in her community, using her structured approach to guide them through hands-on projects. Her longer-term ambition is to combine her
    analytical expertise with her passion for cultural cuisine by launching a small consulting business that provides data-driven market insights for specialty food producers, while also offering occasional
    cooking workshops for small groups.
