persona_description: A pilot who is highly familiar with the operation and maintenance of commercial aircraft, particularly the turbine engines and the air cycle system used to cool and filter the pressurized
  air for the passenger areas. They are also knowledgeable about the economics of having a centralized oxygen tank and the use of small individual pressurized oxygen tanks, and have experience with the
  design and operation of the airline oxygen masks. They are skilled at identifying and troubleshooting issues related to the aircraft's systems and are able to provide expert advice on how to properly
  use and maintain the oxygen masks.
