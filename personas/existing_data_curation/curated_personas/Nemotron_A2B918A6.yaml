personas:
  professional: Betty Powell, a high‑school junior with a flair for visual storytelling, blends hand‑drawn sketching, digital illustration on her iPad, and narrative writing to lead collaborative art projects
    and prototype interactive story games, while navigating the tension between meticulous planning and spontaneous creativity.
  sports: Betty Powell enjoys beachside jogging at Pensacola Bay, occasional surf lessons with the local Pensacola Surf Club, and cheering on the Pensacola Blue Wahoos while rarely participating in organized
    school sports, preferring low‑impact fitness that fits her creative schedule.
  arts: Betty Powell immerses herself in the arts by sketching street murals inspired by local artists like Shepard Fairey, listening to Miles Davis, Kendrick Lamar, and H.E.R., and performing original
    poetry at open‑mic nights, while drawing inspiration from graphic novelists such as Marjane Satrapi and Hayao Miyazaki.
  travel: Betty Powell dreams of a spontaneous road trip to New York City’s museum corridor and a future pilgrimage to Kyoto’s art districts, while her recent weekend visits to New Orleans and the Florida
    Keys have nourished her love of coastal photography and laid‑back planning.
  culinary: Betty Powell favors fresh shrimp po’boy sandwiches, creamy avocado toast with chili flakes, homemade ramen bowls with miso broth, and occasional midnight pizza slices, often experimenting with
    charcoal‑grilled vegetables in her family kitchen and swapping recipes with friends on her cooking Discord server.
  core: Betty Powell is a hyper‑creative teen who doodles in every margin, worries about school deadlines, and can binge‑watch anime until sunrise while forgetting to water her houseplants.
background:
  cultural: Betty is a Black teenager raised in the vibrant African‑American community of Pensacola, Florida. Her family retains strong ties to Southern church traditions, gospel music, and community gatherings
    that celebrate Black heritage, such as Juneteenth festivals and local art fairs. She grew up hearing stories of the civil‑rights movement from her grandparents and feels a deep connection to the Gulf
    Coast’s coastal culture—fishing, soul food, and the rhythm of the sea. These experiences inform her artistic sensibilities, prompting her to weave themes of resilience, identity, and community into
    her creative work while staying proud of her Southern Black roots.
