  career_goals: Betty dreams of earning a scholarship to attend an art-focused college where she can study concept art and graphic novel creation. She aspires to become a multidisciplinary creator who blends
    illustration, writing, and animation to produce culturally resonant stories that celebrate Black experiences. Long‑term, she hopes to work as a concept artist for video games or film, launch her own
    indie graphic‑novel series, and eventually mentor younger artists through community workshops in Pensacola. She also wants to use her platform to advocate for mental‑health awareness among her peers.
