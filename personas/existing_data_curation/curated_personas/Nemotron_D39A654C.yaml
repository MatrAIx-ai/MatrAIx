  hobbies: '["Woodworking", "Gardening", "Salsa Dancing", "Cooking Puerto Rican cuisine", "Hiking", "Puzzle solving (crosswords, Sudoku)", "STEM mentorship volunteering", "Reading technical journals"]'
  career_goals: London aims to attain Professional Engineer (PE) licensure in Connecticut within the next two years, leveraging her expertise to lead large-scale infrastructure projects that integrate sustainability
    and resilience. She aspires to become a senior engineering manager, overseeing multidisciplinary teams and mentoring emerging engineers, particularly women and minorities in STEM. Over the long term,
    she envisions establishing her own consultancy focused on optimizing building performance for municipal clients in Fairfield County, while publishing thought-leadership articles and presenting at industry
    conferences.
