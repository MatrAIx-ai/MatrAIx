personas:
  professional: Lazara Milan, a 23‑year‑old aspiring Master Electrician, merges a rigorous grasp of residential and commercial wiring standards with a curiosity for solar PV and smart‑home technology, delivering
    client projects with meticulous documentation while staying flexible enough to adapt on‑site and mentor junior teammates; they balance curiosity with practicality in every circuit they touch.
  sports: Lazara Milan enjoys weekend hikes on the Caguas mountain trails, participates in a local trail‑running club that meets at the Río Grande, roots for the Cangrejeros de Santurce basketball team,
    and keeps a flexible fitness routine that blends cardio hikes with occasional beach volleyball with friends; they balance social interaction with the need for solitary trail time to recharge.
  arts: Lazara Milan immerses themselves in salsa and bomba classes inspired by legends like Celia Cruz and Willie Colón, attends performances at the local cultural center, curates a small crochet collection
    featuring traditional motifs, and finds inspiration in the street art of Santurce while listening to contemporary artists such as Bad Bunny; they channel their emotional intensity into creative expression,
    often crocheting late into the night when anxiety rises.
  travel: Lazara Milan prefers adventure trips that combine hiking and cultural immersion, having explored El Yunque and the volcanic landscapes of Costa Rica, while dreaming of a future visit to Germany’s
    Bavarian Alps solar farms and a weekend getaway to the historic streets of Old San Juan; they plan each journey with a detailed itinerary to ease anxiety but leave room for spontaneous detours.
  culinary: Lazara Milan loves cooking mofongo stuffed with shrimp and asopao de pollo, expertly blends fresh plantains, sofrito, and cilantro, experiments with homemade guava jam, and often hosts friends
    for casual dinner nights where they serve tostones and arroz con gandules with a side of locally brewed coffee; they find the rhythmic chopping and simmering processes soothing, especially when anxiety
    peaks after a long workday.
  core: Lazara Milan balances a relentless curiosity for sustainable electricity with a habit of over‑thinking every decision, turning anxiety into meticulous project plans, while sneaking in dance breaks
    and crochet sessions to stay grounded; they are known for their kindness, yet their emotional intensity sometimes leads to sleepless nights.
background:
  cultural: Lazara identifies strongly with her Puerto Rican heritage, growing up in a bilingual household that celebrates both Spanish and English. Family gatherings centered around music, food, and the
    island’s festivals have instilled a deep appreciation for bomba, plena, and reggaetón rhythms. She participates in local community events in Cidra and Caguas, such as the annual patron saint festivals,
    which reinforce communal bonds and a sense of responsibility to give back. Her cultural values—respect for elders, emphasis on collective well‑being, and pride in the island’s natural beauty—inform
    both her personal life and professional ethos.
attributes:
  skills: '[''Electrical wiring and conduit installation'', ''Circuit troubleshooting and diagnostics'', ''Interpretation of electrical blueprints and local codes'', ''Solar photovoltaic system installation'',
