  hobbies: '[''Hiking in Puerto Rican mountains'', ''Salsa and bomba dancing'', ''Cooking traditional Puerto Rican cuisine'', ''Crocheting'', ''Building DIY electronic kits'', ''Volunteering to teach electrical
    safety to youth'']'
  career_goals: Lazara aims to become a licensed Master Electrician within the next three years, focusing on renewable energy installations and smart-grid technologies. She plans to complete an associate
    degree in electrical engineering technology and obtain certifications in solar PV and energy management. Long-term, she envisions opening her own crew-based electrical contracting firm that prioritizes
    sustainable practices and community outreach, serving Cidra and neighboring municipalities while mentoring younger women interested in the trades. She also hopes to develop partnerships with local schools
    to promote STEM education.
