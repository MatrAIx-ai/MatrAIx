  career_goals: Kathy aims to transition from a dedicated administrative assistant to a senior office manager or project coordination role within a technology-focused organization. Over the next five years
    she plans to earn a Certified Administrative Professional (CAP) credential and complete a project management certification such as PMP, allowing her to oversee larger operational initiatives. She also
    hopes to blend her passion for science with her administrative expertise by moving into research administration, supporting grant management and laboratory operations. Ultimately, she aspires to lead
    a high-performing support team, mentor junior staff, and contribute to the strategic growth of a STEM-driven company while maintaining a healthy work-life balance for her family.
