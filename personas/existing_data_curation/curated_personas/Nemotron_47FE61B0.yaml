  hobbies: '[''Reading storybooks'', ''Drawing and painting'', ''Playing with pets'', ''Baking simple recipes with family'', ''Participating in school group activities'', ''Collecting rocks and leaves'',
    ''Building with LEGO or blocks'']'
  career_goals: Samantha dreams of becoming a teacher or a veterinarian because she loves helping both people and animals feel safe and cared for. She imagines leading a classroom where every child learns
    in a calm, supportive environment, or working at an animal clinic to heal rescued pets. Her strong sense of harmony and compassion drives her ambition to pursue a career that makes a positive difference
    in her community.
