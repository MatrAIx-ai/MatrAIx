  career_goals: Miguel wants to earn his high school equivalency (GED) within the next year, then enroll in a vocational program for electrical work or HVAC. His long‑term ambition is to start his own handyman
    service that can serve the Hackensack and broader Bergen County area, providing reliable, affordable repairs while employing other young adults from his community. He also hopes to become a certified
    community organizer, helping to run local cultural festivals and youth programs, which would combine his organizational skills and his desire for stable, structured employment.
