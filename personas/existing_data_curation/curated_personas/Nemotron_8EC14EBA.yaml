personas:
  professional: Miguel Gonzalez works as an aspiring handyman entrepreneur, applying their hands‑on carpentry, plumbing, and vehicle maintenance expertise while leveraging a structured, competitive mindset
    to organize community repair projects and lead informal sports teams.
  sports: Miguel Gonzalez enjoys pickup basketball at the local Hackensack park, avidly follows the New York Mets in baseball and the New York Red Bulls in soccer, and they are a member of a neighborhood
    adult basketball league that meets every Thursday.
  arts: Miguel Gonzalez immerses in reggaeton and salsa, frequently dancing to tracks by Daddy Daddy Yankee, Bad Bunny, and Víctor Manuelle at community gatherings, and they also enjoy watching classic
    films starring Jennifer Lopez and attending live performances by local Latin jazz ensembles.
  travel: Miguel Gonzalez prefers short, budget‑friendly trips, having explored nearby New York City’s museums and the Jersey Shore, while dreaming of a cultural immersion vacation to San Juan, Puerto Rico,
    and they usually plan travel spontaneously using last‑minute flight deals.
  culinary: Miguel Gonzalez is a confident home cook of Puerto Rican cuisine, regularly preparing arroz con gandules, alcapurrias, and pastelón with sofrito, plantains, and adobo seasoning, and they love
    hosting potluck dinners where friends sample their signature mofongo‑style mashed plantains.
  core: Miguel Gonzalez blends a competitive spirit with community‑centered generosity, juggling a DIY hustle, basketball rivalries, and occasional over‑indulgence in late‑night taco runs while always keeping
    a detailed budget spreadsheet on their phone.
background:
  cultural: Miguel grew up in a close‑knit Puerto Rican family that preserved many island traditions despite living in Hackensack. He speaks Spanish at home and celebrates cultural holidays such as Three
    Kings Day and the Puerto Rican Day Parade in New York City. Family meals centered around rice, beans, plantains, and pork, and music was always present, from classic salsa to contemporary reggaeton.
    The diaspora community in Bergen County provided a network of relatives and friends who help each other with childcare, job leads, and mutual support. Miguel’s identity is shaped by a blend of island
    heritage, the resilience of immigrant families, and a strong sense of community responsibility.
