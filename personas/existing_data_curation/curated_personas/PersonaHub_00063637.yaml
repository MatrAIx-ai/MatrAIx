persona_description: A researcher involved in studying the movements and fate of dead fish in rivers, particularly in the context of assessing mortality in hydropower stations. The researcher is interested
  in using telemetry data and information on the movements and fate of dead fish to design studies and analyze telemetry data. The researcher is likely to have expertise in the study of fish behavior, movement
  patterns, and their interactions with the environment. They may have experience working with electronic tags and telemetry systems, and may be familiar with the use of statistical methods to analyze data.
  The researcher may also be interested in the effects of human activities, such as hydropower development, on fish populations.
