personas:
  professional: Jose Ruiz, a 17‑year‑old aspiring automotive technician, blends hands‑on mechanical skill with a methodical approach to PC hardware, using their competitive, structured mindset to excel
    in engine diagnostics, custom‑build projects, and strategic gaming, while demonstrating calm resilience and a habit of meticulous time‑management.
  sports: Jose Ruiz hits the iron at the Iron Forge weight‑lifting club three times a week, follows a disciplined routine, and tracks their performance like a stat‑driven gamer, while cheering for the Los
    Angeles Lakers in the NBA and the San Jose Sharks in the NHL, and they join the school’s varsity basketball team during the winter season.
  arts: Jose Ruiz unwinds to the intricate guitar solos of Steve Vai, the atmospheric scores of Hans Zimmer, and the high‑energy beats of electronic duo Daft Punk while streaming strategic match replays,
    and they occasionally catch the latest sci‑fi thriller starring Michael Fassbender, letting these artistic influences sharpen their focus and creative problem‑solving.
  travel: Jose Ruiz plans their trips with the same precision they apply to PC builds, favoring short, well‑organized road trips to nearby national parks like Yellowstone and Yosemite, while dreaming of
    an immersive summer in Tokyo to explore its cutting‑edge tech districts and car culture scene.
  culinary: Jose Ruiz enjoys high‑protein meals like a spicy chicken stir‑fry with broccoli, soy sauce, and sriracha, occasionally crafts a perfect cheeseburger topped with aged cheddar and caramelized
    onions, and, though only a modest home‑cook, they follow online tutorials to perfect a ramen bowl featuring pork belly, soft‑boiled egg, and miso broth.
  core: Jose Ruiz blends a relentless competitive streak with methodical calm, obsessively fine‑tuning PC builds and car engines while sometimes neglecting social outings in favor of marathon gaming sessions,
    and they view every challenge as a puzzle to solve.
background:
  cultural: Jose Ricardo grew up in a Mexican‑American household in San Bernardino, where Spanish was spoken at home and English at school. His family places a strong emphasis on hard work, respect, and
    resilience, values rooted in both Mexican cultural traditions and the immigrant experience. He participates in community celebrations such as Día de los Muertos and enjoys cooking family recipes like
    tacos al pastor and tamales with his grandparents. The local Latino community’s emphasis on solidarity and perseverance has shaped his calm, resilient outlook. At the same time, his upbringing exposed
    him to the practical, hands‑on trade culture of the Inland Empire, where many relatives work in automotive shops, reinforcing his interest in mechanics and structured career pathways.
attributes:
  skills: '["basic automotive repair", "computer hardware troubleshooting", "strategic video gaming", "time management", "basic Python programming", "weight training"]'
  hobbies: '["strategic video gaming", "PC building and customization", "car restoration projects", "weightlifting", "reading non-fiction (mechanics, engineering)", "chess"]'
  career_goals: Jose Ricardo aims to earn his ASE certification and become a certified automotive technician, pursuing a structured career path that blends his mechanical aptitude with his love for technology.
    He plans to obtain a GED, enroll in a community‑college automotive program, and secure an apprenticeship at a reputable dealership. Long‑term, he envisions opening his own garage that offers specialized
    performance upgrades and custom builds, leveraging his technical skills and competitive drive. He also aspires to maintain a side presence in the esports scene, using his strategic gaming expertise
    to compete at a semi‑professional level while keeping his primary focus on a stable, hands‑on trade.
