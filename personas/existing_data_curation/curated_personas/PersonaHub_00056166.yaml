persona_description: A scientist who specializes in the study of infectious diseases, particularly the effects of COVID-19 on the spread of the virus. This scientist has a background in epidemiology, virology,
  biotechnology, and medical research. They have published a document refuting claims that reusable containers and bags at grocery stores and cafes could enhance the spread of the virus. This scientist
  is likely to be interested in the implications of the coronavirus pandemic on public health and the environment, and is advocating for the continued use of reusable containers as long as public health
  requirements are observed.
