  hobbies: '[''abstract painting'', ''photography'', ''reading science fiction'', ''solving puzzles'', ''playing piano'', ''writing poetry'', ''gardening'', ''yoga'', ''visiting art galleries'', ''volunteering
    for community STEM workshops'']'
  career_goals: Approaching retirement, Cecilia aims to transition from full-time research to part-time mentorship and community outreach. She hopes to lead a regional STEM-arts initiative that brings together
    local schools, senior centers, and artists to explore mathematical concepts through creative media. Publishing a popular-science book that demystifies abstract mathematics for a general audience is
    a long-standing ambition. She also seeks to secure a modest research grant that allows her to explore a novel algorithm for visualizing high-dimensional data, balancing her intellectual curiosity with
    a desire for low-stress, purpose-driven work.
