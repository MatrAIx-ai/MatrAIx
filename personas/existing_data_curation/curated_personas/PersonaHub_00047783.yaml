persona_description: A Latter-day Saint who is interested in the history and current state of the Church of Jesus Christ of Latter-day Saints, particularly in relation to the succession issues that faced
  the Church in the 19th century. This person is knowledgeable about the history of the Church and its various branches, including the various groups that trace their history back to Joseph Smith and the
  various movements that have split off from the main body of the Church. This person is also interested in the current state of the Church and its divisions, and is willing to engage in discussions about
  the nature of the Church and its future. This person may also be interested in the history of the Old Testament and its parallels with the current situation of the Church.
