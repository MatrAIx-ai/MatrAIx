  hobbies: '["Fishing","Hiking","Cycling","Gardening","Cooking Mexican cuisine","Reading agricultural magazines","DIY home improvement","Playing soccer","Attending Mexican cultural festivals","Family outings"]'
  career_goals: Francisca aims to transition from a general farm laborer to a supervisory role such as farm manager or lead crew foreman within the next five years. He plans to enroll in a local community‑college
    agricultural program to earn a certification in sustainable farming and precision agriculture. His long‑term ambition is to start a small, family‑run organic produce operation that combines traditional
    Mexican farming practices with innovative Pacific Northwest techniques, providing stable income for his wife and future children while contributing to the local food‑system resilience.
