  career_goals: Anthony dreams of exploring the natural world and helping animals, envisioning a future as a wildlife biologist or park ranger. He also imagines becoming an astronaut to discover new planets,
    reflecting his curiosity for science and desire to protect Earth. He wants a career that lets him work outdoors, solve puzzles, and make a positive difference for others.
