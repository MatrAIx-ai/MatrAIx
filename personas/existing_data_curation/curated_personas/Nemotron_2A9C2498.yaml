    ''Certified Public Accountant (CPA)'', ''Certified Internal Auditor (CIA)'', ''Mentoring and staff development'', ''Technical report writing'', ''Problem solving and critical thinking'']'
  hobbies: '[''Museum and gallery visits'', ''Photography (landscape and architecture)'', ''Reading (biographies, history, non-fiction)'', ''Small-group book club'', ''Fishing on Lake Michigan'', ''Kayaking'',
