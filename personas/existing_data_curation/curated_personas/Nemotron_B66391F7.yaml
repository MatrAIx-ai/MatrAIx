  hobbies: '[''Reading fantasy and science books'', ''Sketching animals and nature'', ''LEGO building'', ''Scratch programming'', ''Playing piano'', ''Gardening'', ''Nature journaling'', ''Small book club'']'
  career_goals: Kylie dreams of turning her love of animals and science into a career. In the near future she wants to win her school’s science fair with a project about local wildlife habitats and to join
    a summer STEM camp focused on biology. She imagines herself as a veterinarian or wildlife researcher who not only cares for individual animals but also studies ecosystems to protect them. Kylie is determined
    to excel in school, especially in biology and math, and she hopes to one day attend a university where she can combine research with hands‑on animal care, perhaps contributing to conservation projects
    in New Jersey’s wetlands.
