  professional: Nikolas Elliott, a one‑year‑old with an unusually methodical curiosity, meticulously arranges building blocks by size and colour, hinting at a future as a systematic data analyst or architect
    whose reliable nature will drive precise, detail‑oriented work as they explore the world of order.
  sports: Nikolas Elliott, a one‑year‑old who loves energetic play at a local parent‑child gymnastics class and giggles when the family watches the New York Yankees on TV, prefers small‑group activities
    and quietly cheers for the Yankees, while they occasionally toddle around the backyard with a mini soccer ball.
  arts: Nikolas Elliott, a one‑year‑old who is entranced by the gentle strains of Mozart’s Symphony No. 40 and the bright swirls of Van Gogh’s Starry Night in picture books, spends solitary moments finger‑painting
    with non‑toxic water‑colours, reflecting their curious appreciation for classic music and visual art as they explore colour and sound.
  travel: Nikolas Elliott, a one‑year‑old who recently explored the sensory wonder of the nearby botanical garden and enjoyed a short family road trip to the Grand Canyon’s visitor centre, favours calm
    stroller walks over crowded airports, and hopes to someday visit Kyoto’s cherry‑blossom parks as they dream of new horizons.
  culinary: Nikolas Elliott, a one‑year‑old who favours smooth mashed sweet potatoes, ripe avocado, and occasional cinnamon‑spiced oatmeal, enjoys experimenting with new textures while their caregiver introduces
    mild herbs, and takes delight in the occasional bite of a soft banana slice as they develop a discerning palate.
  core: Nikolas Elliott is a curious, methodical infant who meticulously organizes toys, saves tiny coins, and prefers tranquil solo play to bustling crowds, often displaying a skeptical eye toward strangers
    and a quiet, competitive streak as they observe the world.
