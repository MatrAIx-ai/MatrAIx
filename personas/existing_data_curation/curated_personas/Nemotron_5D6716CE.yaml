  hobbies: '[''Watercolor landscapes'', ''Live music listening'', ''Reading contemporary fiction and philosophy'', ''Yoga'', ''Nature walks'', ''Mexican cultural festivals (Día de los Muertos, Las Posadas)'',
    ''Native‑plant gardening'', ''Cooking Mexican and Tex‑Mex dishes'', ''Genealogy research'', ''Volunteer art program'']'
  career_goals: Although retired from formal employment, Jennifer’s personal ambitions are focused on lifelong learning and cultural stewardship. She plans to complete her undergraduate degree in Art History,
    a field that aligns with her curiosity about artistic ideas. She hopes to transform a spare room in her home into a community art studio where local seniors and youth can collaborate on projects, and
    to mentor emerging Mexican‑American artists. Jennifer also dreams of traveling to Oaxaca to study traditional craft techniques and to document her family’s culinary heritage in a cookbook‑memoir that
    blends recipes, stories, and reflections on Mexican‑American identity. Ultimately, she aspires to leave a lasting imprint on Buda’s cultural landscape by preserving and sharing her heritage.
