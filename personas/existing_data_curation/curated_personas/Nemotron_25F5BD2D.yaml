personas:
  professional: Delvis Duenas is a budding robotics enthusiast who serves as the junior strategist of his middle school robotics club, channeling their love for clear rules and measurable progress into
    designing, programming, and troubleshooting Lego‑based robots for regional competitions.
  sports: Delvis Duenas is the midfield engine of the Eagle Knights middle school soccer team, devotes evenings to structured drills that blend stamina and tactical play, follows the professional tactics
    of the LA Galaxy, and joins a local youth futsal club to sharpen quick‑decision skills.
  arts: Delvis Duenas immerses themselves in science‑fiction worlds, devouring novels by Isaac Asimov and Orson Scott Card, leafing through cutting‑edge tech magazines, while also participating in community
    Dia de los Muertos altar displays and drawing inspiration from the cinematic scores of Hans Zimmer.
  travel: Delvis Duenas prefers meticulously planned trips, saving up for a spring visit to the Chicago Robot Challenge expo, dreams of exploring the historic streets of Kyoto for its tech museums, and
    balances this wanderlust with weekend family outings to the nearby state park for hiking.
  culinary: Delvis Duenas loves cooking family‑traditional tacos and chicken tamales, expertly seasoning the pork with dried chilies and cilantro, and experiments by adding a pinch of smoked paprika to
    the salsa, though they often forget to clean the kitchen until the next robotics session.
  core: Delvis Duenas blends a love for structured problem‑solving with a creative spark, juggling robotics, soccer, and family cooking while occasionally letting a sci‑fi binge derail their schedule.
background:
  cultural: Delvis is a first‑generation Mexican‑American raised in Jenkintown, PA. His family maintains strong ties to Mexican traditions, speaking Spanish at home and celebrating holidays such as Día
    de los Muertos, Cinco de Mayo, and Navidad with food, music, and community gatherings. This bicultural upbringing gives him a deep appreciation for both his Mexican heritage and the diverse culture
    of his suburban community. He values family solidarity, respect for elders, and hospitality, while also embracing the American emphasis on individual achievement and education. His cultural background
    influences his bilingual communication, his love for cooking traditional dishes, and his participation in local cultural festivals.
