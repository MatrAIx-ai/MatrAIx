  career_goals: Delvis envisions a future where he can blend his love for structured problem‑solving with technology. He aims to pursue a career in software engineering or robotics, hoping to design practical
    solutions that improve daily life. In the short term, he plans to deepen his coding knowledge, participate in advanced STEM camps, and earn certifications in robotics and computer science. He also dreams
    of one day attending a university with a strong engineering program, where he can continue to develop his technical expertise while contributing to diverse, collaborative projects.
