personas:
  professional: Amit Muthiah, a veteran Bay Area network and systems administrator with three decades of hands‑on experience, blends meticulous LAN/WAN design and Cisco expertise with a relaxed, improvisational
    style that lets him adapt to shifting client needs while mentoring junior engineers and steering his emerging part‑time consulting boutique toward nonprofit clients.
  sports: Amit Muthiah, a dedicated member of the Santa Cruz Mountain Hiking Club who conquers weekend treks on the Skyline Ridge, supports the San Francisco Giants and Golden State Warriors, and incorporates
    weekly sunrise yoga sessions as his preferred low‑impact fitness routine.
  arts: Amit Muthiah, an avid reader of classic Tamil literature such as the Thirukkural and contemporary science‑fiction works by Isaac Asimov, enjoys listening to Carnatic vocalist M. Balamuralikrishna,
    and regularly attends local cultural festivals where he watches performances by Indian classical dance troupe Kala Saraswati.
  travel: Amit Muthiah, who has trekked the Inca Trail to Machu Picchu, explored the historic streets of Kyoto, and plans a future road trip along the Pacific Coast Highway to experience coastal cliffside
    villages, prefers flexible itineraries that allow spontaneous detours for local festivals.
  culinary: Amit Muthiah, a home chef who perfects dosa batters with fermented rice‑lentil mixtures, simmers sambar with garden‑grown coriander and curry leaves, brews strong filter coffee each morning,
    and experiments with global flavors by adding smoked paprika to traditional rasam.
  core: Amit Muthiah blends a lifetime of structured tech expertise with a spontaneous love for gardening, hiking, and cultural festivals, navigating retirement by balancing disciplined consulting work
    with relaxed, reflective moments of yoga and culinary creativity.
background:
  cultural: Amit was born to a Tamil‑speaking family from Chennai, India, and immigrated to the United States in his early twenties. He grew up in a household that emphasized education, respect for elders,
    and close-knit family ties, values that continue to shape his worldview. While he embraces the tech‑forward culture of Silicon Valley, he remains deeply connected to his South Asian roots through language,
    cuisine, and religious practices, celebrating festivals such as Diwali and Pongal with his extended family and local community. His divorce introduced a period of personal reflection, prompting him
    to balance independent pursuits with community involvement. Amit routinely visits a nearby Hindu temple, participates in cultural events hosted by the Indian diaspora, and maintains relationships with
    friends from diverse backgrounds, integrating his South Asian heritage with his American professional life.
attributes:
  skills: '["Network Architecture Design", "LAN/WAN Configuration", "Cisco Routing and Switching", "VMware & Hyper-V Virtualization", "Cloud Integration (AWS, Azure)", "ITIL Service Management", "Vendor
    Management", "Budgeting & Cost Optimization", "Scripting (PowerShell, Bash)", "Troubleshooting & Incident Resolution", "Team Mentoring & Training", "Business‑IT Alignment"]'
  hobbies: '["Backyard Gardening", "Reading (Technology, Sci‑Fi, Tamil Literature)", "Raspberry Pi & Vintage Computer Projects", "Cooking South Indian Cuisine", "Attending Cultural Festivals", "Hiking in
    Santa Cruz Mountains", "Participating in Linux User Group", "Yoga & Meditation"]'
  career_goals: Approaching retirement, Amit aims to transition into a flexible, part‑time consulting role where he can help small and mid‑size businesses modernize their network security and migrate to
    the cloud. He wishes to establish a boutique consulting practice that offers tailored IT solutions to local nonprofits and community organizations, allowing him to give back while maintaining a steady
    schedule. Mentorship remains a priority; he plans to formalize a mentorship program for emerging network engineers within his network. To stay current, Amit is pursuing advanced cybersecurity certifications
    such as CISSP, and he hopes to author a guide on practical network management for senior IT professionals.
