personas:
  professional: Joel Marshall, a 91‑year‑old former municipal utilities engineer turned community volunteer, leverages his civil and mechanical engineering expertise, blueprint‑reading skill, and meticulous
    technical writing to mentor engineering apprentices and conduct safety inspections, all while balancing his preference for predictable standards with a surprisingly relaxed, low‑pressure approach to
    project planning and DIY woodworking.
  sports: Joel Marshall follows the Seattle Seahawks and Seattle Mariners with dedicated enthusiasm, participates in the senior walking club that meets each Saturday for a brisk trek around Discovery Park,
    and enjoys gentle low‑impact exercise like birdwatching walks that blend fitness with his love of nature.
  arts: Joel Marshall immerses himself in live jazz at Seattle’s historic Jazz Alley, often humming along to Miles D Davis and John Coltrane, while also savoring classic science‑fiction novels by Isaac
    Asimov and Arthur C. Clarke, and they occasionally attend community theater productions of Thornton Williams’ ‘Our Town’.
  travel: Joel Marshall prefers low‑stress, well‑planned road trips to nearby natural wonders such as the Hoh Rainforest on the Olympic Peninsula and Mount Rainier, while holding a lifelong dream of a leisurely
    cruise through Alaska’s Inside Passage to Glacier Bay and a nostalgic visit to England’s Lake District to capture autumn foliage.
  culinary: Joel Marshall delights in seasonal cooking, often preparing a roasted beet and goat‑cheese salad with locally sourced kale, honey‑glazed salmon with dill and lemon alongside corn succotash,
    and a hearty autumn pork stew seasoned with rosemary, usually finishing with a slice of homemade apple‑cinnamon crumble.
  core: Joel Marshall is a pragmatic, community‑oriented centenarian who balances precise engineering standards with a laid‑back, craft‑loving lifestyle, methodically recording garden yields while occasionally
    misplacing his glasses and forgetting appointments.
background:
  cultural: Joel is a third‑generation American of Northern European ancestry, raised in a Midwestern town in the post‑World War II era. His upbringing emphasized modesty, hard work, and community service,
    values that carried into his later life in Seattle. He grew up during the space race and the rise of the American tech industry, which sparked his interest in STEM. In Seattle he adopted the Pacific
    Northwest’s appreciation for nature and sustainability while maintaining his family’s Protestant traditions, attending church services and participating in local heritage societies.
