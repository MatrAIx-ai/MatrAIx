  career_goals: Although officially retired, Joel aims to stay active in his community by mentoring apprentices at the local community college’s engineering program, volunteering as a safety inspector for
    the neighborhood association, and completing a personal goal of documenting the history of Seattle’s early infrastructure for a local museum. He also aspires to maintain his health through regular walking
    and to complete a small wooden boat he has been designing.
