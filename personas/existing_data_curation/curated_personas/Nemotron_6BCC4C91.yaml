personas:
  professional: James Tompkins, a 26-year-old applied mathematician and quantitative researcher, leverages his rigorous expertise in mathematical modeling, machine learning, and data visualization alongside
    his artistic curiosity and competitive drive to produce visually striking analytics that bridge abstract theory with creative expression.
  sports: James Tompkins, a 26-year-old hiking enthusiast, spends weekends traversing the Appalachian foothills with the Johnson City Trailblazers hiking club, maintains a modest cardio routine at the local
    university gym while cheering on the Tennessee Volunteers football team and the Nashville Predators, and occasionally joins a casual indoor rock-climbing group to stay agile.
  arts: James Tompkins, a 26-year-old whose artistic side flourishes through charcoal sketches of Appalachian landscapes and generative code art inspired by M C Escher, strums acoustic renditions of Bill
    Monroe and Joni Mitchell at local bluegrass sessions, and regularly attends gallery openings featuring contemporary painters such as Kehinde Wiley, weaving these influences into a personal aesthetic
    that informs his data visualizations.
  travel: James Tompkins, a 26-year-old travel buff, prefers meticulously planned weekend getaways to nearby nature spots such as the Great Smoky Mountains and Asheville’s art district while dreaming of
    a solo trek through Iceland’s volcanic landscapes and a cultural immersion in Kyoto’s historic temples, balancing his modest research stipend with occasional splurges on flights that promise both photographic
    opportunities and meditative solitude.
  culinary: James Tompkins, a 26-year-old self-taught home cook, gravitates toward hearty Appalachian fare like smoked brisket tacos with pickled red onions and quinoa-black bean salad, enjoys experimenting
    with fresh herbs such as rosemary and thyme in a rustic mushroom risotto, and indulges in occasional fine-dining experiences at Johnson City’s farm-to-table bistro for dishes like pan-seared trout with
    lemon-butter sauce.
  core: James Tompkins, a 26‑year‑old mathematically driven yet art‑obsessed thinker, channels intense anxiety into a relentless pursuit of precise visual code while habitually over‑caffeinating, over‑scheduling
    his days, and secretly hoarding a drawer of unfinished charcoal sketches.
background:
  cultural: James grew up in a middle‑class family in the foothills of the Appalachian region of East Tennessee, steeped in the traditions of Southern hospitality, folk storytelling, and community church
    gatherings, though he now identifies as culturally secular. His family’s heritage includes long‑standing ties to the region’s lumber and farming history, and he was exposed early to bluegrass music
    and regional crafts. He earned his undergraduate degree in mathematics at a local state university before moving to a larger research institution for his graduate studies in STEM, which broadened his
    worldview and introduced him to diverse academic cultures. Returning to Johnson City after his studies, he blends his Appalachian roots—valuing hard work, self‑reliance, and a close‑knit community—with
    the curiosity and openness cultivated by his advanced education, leading him to appreciate both traditional Southern arts and cutting‑edge scientific innovation.
