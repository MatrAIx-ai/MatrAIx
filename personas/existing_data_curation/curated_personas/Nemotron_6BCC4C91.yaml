  career_goals: James aims to secure a tenure‑track faculty position at a research university where he can lead a multidisciplinary lab at the intersection of mathematics, data science, and visual arts.
    He aspires to publish influential papers in top journals, obtain major external funding such as NSF or NIH grants, and develop open‑source computational tools that make advanced analytics accessible
    to artists and community organizations. His competitive drive pushes him toward prestigious awards and conference keynotes, while his awareness of his emotional reactivity motivates him to maintain
    a balanced workload, mentor graduate students, and promote mental‑health awareness within academic circles. Ultimately, he hopes to become a recognized thought leader who fuses mathematical rigor with
    aesthetic expression and uses his platform to mentor underrepresented students in STEM.
