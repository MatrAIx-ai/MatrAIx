  career_goals: As a senior supervisor, Craig aims to move into a plant‑manager role within the next five years. He plans to deepen his expertise in advanced automation and earn a Six Sigma Green Belt to
    lead company‑wide continuous‑improvement initiatives. Craig is also driven to develop a mentor program that pairs experienced operators with new hires, improving retention and morale on the shop floor.
    He envisions introducing a data‑analytic dashboard that monitors real‑time production efficiency, safety incidents, and equipment health, positioning the facility as a benchmark for best practices in
    Lancaster County. Additionally, because of his appreciation for art and unconventional thinking, Craig hopes to champion a cross‑departmental “innovation lab” where workers can prototype creative solutions
    to recurring bottlenecks.
