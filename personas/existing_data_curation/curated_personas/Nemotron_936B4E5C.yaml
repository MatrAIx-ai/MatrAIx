  hobbies: '[''Abstract painting'', ''Jazz listening and live performances'', ''Science-fiction reading'', ''Poetry writing'', ''Street photography'', ''Rooftop gardening'', ''Community tutoring'', ''Neighborhood
    art walks'', ''Philosophy podcast listening'']'
  career_goals: Neville aims to complete a Bachelor of Science in Nursing to formalize his extensive experience and then pursue a Master’s in Nursing Education. He aspires to become a faculty member at
    a local nursing school, where he can mentor the next generation of nurses and embed creative, art-based learning modules into the curriculum. Long-term, he envisions establishing a community wellness
    hub in Philadelphia that merges clinical care with artistic workshops, offering trauma-informed art therapy and health education for underserved residents. He also seeks leadership roles within hospital
    patient-experience committees to champion empathetic, innovative care models.
