    to New Technologies"]'
  hobbies: '["Reading historical fiction and non‑fiction", "Creative writing and journaling", "Knitting and quilting", "Gardening (vegetables and flowers)", "Birdwatching around Lake Menahga", "Photography
    of Minnesota’s seasonal scenery", "Volunteering at the local library and community events", "Participating in a town book club", "Baking and sharing Midwestern comfort foods", "Genealogy research and
    local history projects"]'
  career_goals: Monica aims to transition from a general clerk role to a supervisory office manager position within the next two to three years, capitalizing on her growing proficiency with advanced spreadsheet
    functions and project coordination. She is interested in obtaining a Certificate in Office Administration to formalize her skills and increase her confidence when negotiating responsibilities. Because
    she values flexibility and a lower‑stress environment, she also envisions part‑time remote work that allows her to continue contributing to local nonprofit initiatives, such as the Menahga Historical
    Society, while maintaining a steady income. Ultimately, she hopes to blend her administrative expertise with her passion for community storytelling, perhaps by managing a small museum archive or a town‑wide
    newsletter.
