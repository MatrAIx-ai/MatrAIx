persona_description: A university professor specializing in the field of communication, particularly in the study of media effects and the impact of advertising on youth. Her research interests include
  the effectiveness of anti-smoking ads, the role of social norms in changing smoking behavior, and the design and execution of effective health communication campaigns. Her publications and research have
  contributed to a better understanding of how advertising influences youth attitudes and behaviors towards smoking, and how health communicators can design more effective and impactful campaigns.
