  career_goals: Although currently not in the paid workforce, Carolyn aspires to translate her life experience into formal community service. She plans to obtain a Certified Nursing Assistant (CNA) credential
    to support seniors in her neighborhood on a part‑time basis. Simultaneously, she hopes to launch a small home‑cooked meal service for church events and low‑income families, allowing her to share her
    culinary talents while generating modest income. Long‑term, she envisions serving on the board of a local nonprofit focused on food security and senior wellness, and she is considering enrolling in
    GED courses to broaden her educational foundation.
