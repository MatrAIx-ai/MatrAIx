  hobbies: '[''Art Gallery Visits'', ''Sketching and Photography'', ''Reading (Art History, Folklore, True Crime)'', ''Hiking'', ''Fishing'', ''Gardening'', ''Community Book Club'', ''Youth Mentoring through
    Sports'', ''Coordinating County Fair Art Exhibit'']'
  career_goals: William aims to rise to a supervisory rank within the Pulaski County Sheriff's Office, such as Sergeant or Lieutenant, where he can shape policy and mentor officers. He is passionate about
    establishing a permanent community‑outreach unit that integrates art, education, and mental‑health resources to build stronger ties with residents. Long‑term, he hopes to transition into a training
    instructor role at the state police academy, sharing his investigative and pedagogical expertise. If the opportunity arises, he would consider a secondary career as a part‑time civic‑education teacher
    at a local community college, bringing real‑world policing experience into the classroom.
