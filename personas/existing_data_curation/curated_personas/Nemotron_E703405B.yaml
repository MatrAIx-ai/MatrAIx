  hobbies: '[''Basketball'', ''Beach Volleyball'', ''Fishing'', ''Listening to Hip‑hop, R&B, Reggae'', ''Dancing at Block Parties'', ''Cooking Southern and Caribbean Cuisine'', ''Youth Mentorship Volunteering'',
