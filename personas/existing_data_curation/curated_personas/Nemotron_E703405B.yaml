  career_goals: Anthony aims to transition from a stocker to a shift supervisor within the next two years, seeking to lead a team and improve store efficiency. He plans to obtain a certified forklift operator
    license and an OSHA safety certification to broaden his qualifications. Long‑term, he envisions moving into inventory management or logistics coordination for a regional retail chain, providing greater
    financial stability and the ability to support his extended family. He also hopes to mentor newer employees, fostering a collaborative work environment.
