personas:
  professional: Ricky Franklin is an aspiring aerospace engineer who, with disciplined precision, designs complex LEGO Technic rockets, writes Scratch games, and tackles chess problems, constantly applying
    their curiosity and methodical mindset to turn ideas into tangible prototypes.
  sports: Ricky Franklin, though preferring solitary study, occasionally joins the local after‑school swim club and the elementary cross‑country team, while cheering for the Chicago Cubs, Chicago White
    Sox, Chicago Bulls, and Chicago Blackhawks on game days, balancing their disciplined workout routine of weekend bike rides with a competitive mindset that treats each lap like a chess problem.
  arts: Ricky Franklin immerses in creative expression through building LEGO sculptures inspired by the works of Leonardo da Vinci, listening to classical compositions by Mozart and jazz piano by Bill Evans
    while watching the animated film ‘The LEGO Movie’ and reading graphic biographies of engineers like Elon Musk, shaping a uniquely analytical yet imaginative artistic palate that reflects their love
    of precision.
  travel: Ricky Franklin prefers carefully planned, low‑key trips that blend scientific curiosity with adventure, having visited the Kennedy Space Center, the Grand Canyon, and the Museum of Science and
    Industry in Chicago, while dreaming of a future excursion to CERN in Switzerland and a virtual tour of the International Space Station, reflecting their methodical approach to travel.
  culinary: Ricky Franklin enjoys simple yet satisfying meals such as spaghetti bolognese and homemade turkey sandwiches, often topping them with grated Parmesan and fresh basil, while occasionally experimenting
    with building LEGO‑shaped fruit kebabs using grapes, strawberries, and cheese cubes, reflecting their moderate cooking skill level and a playful, methodical approach to the kitchen.
  core: Ricky Franklin blends relentless curiosity with disciplined solitude, turning every LEGO set, chess puzzle, and nature observation into a mini‑research project, yet occasionally hoards spare change
    in a secret drawer and neglects bedtime in favor of night‑time coding marathons, reflecting their love of structure.
background:
  cultural: Ricky is a ten‑year‑old Black boy growing up in Edgewood, a small town in Van Zandt County, Texas. His family is part of a close‑knit African‑American community where church gatherings, storytelling,
    and inter‑generational support are central. Celebrations such as Juneteenth and seasonal picnics foster a sense of cultural pride and continuity. His parents emphasize education, self‑discipline, and
    perseverance—values that echo the historic resilience of Black Texans navigating both rural and urban contexts. While Ricky prefers quiet, solitary pursuits, the community’s focus on collective achievement
    fuels his competitive nature and high personal standards. Regional influences, including exposure to Southern cuisine, gospel music, and the natural landscape of East Texas—pine forests, creeks, and
    open fields—shape his interests in nature observation and technical hobbies.
attributes:
  skills: '["Organizational planning", "Logical reasoning", "Chess strategy", "Scratch programming", "Advanced LEGO assembly", "Data recording & spreadsheet basics", "Scientific reading comprehension"]'
  hobbies: '["Reading science books", "Building LEGO Technic sets", "Solving Sudoku puzzles", "Playing chess", "Scratch programming", "Documentary watching", "Nature journaling"]'
  career_goals: Ricky aspires to become a software engineer with a focus on robotics and artificial intelligence. He envisions joining a STEM‑focused high‑school program, winning a regional science fair
    with a programmable robot, and later studying computer science at a top university. His long‑term ambition is to design autonomous systems—such as drones for environmental monitoring—that combine his
    love for methodical, solitary work with real‑world problem solving, and he hopes one day to contribute to space‑technology projects at agencies like NASA.
