persona_description: A medical professional specializing in the diagnosis and treatment of gallbladder disorders. They are knowledgeable in the etiology, pathophysiology, and management of acute and chronic
  cholecystitis, as well as the various complications associated with these conditions. They are skilled in performing ultrasonography and computed tomography to diagnose gallbladder disorders, and are
  familiar with the use of blood tests and imaging studies to assess for bile duct blockage and inflammation. They are also aware of the rare condition of xanthogranulomatous cholecystitis, and its symptoms
  and treatment.
