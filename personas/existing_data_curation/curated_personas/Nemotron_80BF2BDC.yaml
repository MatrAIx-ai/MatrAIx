  hobbies: '[''Sketching'', ''Street‑Art Exploration'', ''Gallery Visits'', ''Experimental Music Curation'', ''Philosophy Reading'', ''Cooking Venezuelan Cuisine'', ''Acoustic Guitar'', ''Independent Film
    Watching'', ''Book Club Participation'']'
  career_goals: Victor aims to build a career as a multimedia visual storyteller, merging his love for art, culture, and technology. He plans to complete a bachelor's degree in Fine Arts or Visual Communication,
    secure an internship at a progressive design agency, and eventually work as a freelance creative director specializing in projects that highlight Latin American narratives. Long‑term, he hopes to establish
    a community art space in Miami that mentors young Venezuelan‑American artists and fosters cross‑cultural dialogue.
