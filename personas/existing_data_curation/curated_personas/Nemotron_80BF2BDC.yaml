personas:
  professional: Victor Collado, a budding multimedia visual storyteller, leverages graphic design, photography, and bilingual communication to craft socially conscious digital narratives, balancing meticulous
    project planning with a spontaneous, experimental aesthetic that they constantly refine.
  sports: Victor Collado follows the Miami Heat and Inter Miami CF with fervor, joins a weekend street‑soccer squad at Kendall Park, and fits brief evening jogs along the Miami River into their schedule,
    preferring low‑impact cardio over gym workouts that they find repetitive.
  arts: Victor Collado immerses themselves in the works of street‑artist Banksy, curates playlists featuring Aphex Twin and Oneohtrix Point Never, regularly watches Jim Jarmusch’s films at the Coral Gables
    cinema, and discusses Octavia Butler’s novels in a social‑justice book club, letting each medium inform the visual storytelling they pursue.
  travel: Victor Collado prefers spontaneous, budget‑conscious trips, having backpacked through Cartagena and Havana on a student’s break, and now dreams of wandering the murals of Berlin and the tango
    halls of Buenos Aires, planning each journey through online forums rather than elaborate itineraries that they would otherwise find overwhelming.
  culinary: Victor Collado, a self‑taught home chef, perfects arepas stuffed with shredded beef, black beans, and queso fresco, while also experimenting with plant‑based empanadas flavored with cumin and
    cilantro, and frequents Miami’s food‑truck scene for pupusas and ceviche, relishing the bright notes of lime and ají that they love to pair with fresh herbs.
  core: Victor Collado blends quiet curiosity with a restless creative spark, habitually sketching strangers on the subway while juggling a habit of late‑night binge‑listening to avant‑garde tracks and
    an occasional procrastination of school assignments that they easily rationalize.
background:
  cultural: Victor was raised in a Venezuelan household that values family, music, and vibrant visual expression. He grew up speaking Spanish at home while learning English through school and community
    interactions, giving him a bicultural perspective. Traditions such as celebrating Día de los Muertos with a Venezuelan twist, preparing arepas for gatherings, and listening to salsa and joropo rhythms
    remain central to his identity. Living in Miami, he experiences a dynamic blend of Caribbean, Latin American, and U.S. cultures, which informs his artistic sensibility and desire to bridge cultural
    narratives through his work.
