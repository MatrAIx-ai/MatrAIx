    science'']'
  career_goals: Edward dreams of becoming someone who creates and explores—he hopes to be an aerospace engineer or astronaut who designs rockets, and he imagines winning science fairs by building clever
    models. He also envisions himself as a community helper, perhaps a firefighter, because he admires the practical, hands‑on problem solving they do. His competitive streak leads him to set goals like
    earning the 'Scientist of the Year' badge at his preschool and mastering new skills quickly. He balances these aspirations with a practical desire to understand how everyday things work, such as how
    his bicycle moves or how gadgets are built.
