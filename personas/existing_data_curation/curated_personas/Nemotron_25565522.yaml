personas:
  professional: Edward Pittman is a budding junior naturalist who spends afternoons cataloguing insects in his backyard, combining a pragmatic love for order with a bright curiosity that drives him to create
    simple field guides, while their competitive streak pushes them to outdo classmates in nature quizzes.
  sports: Edward Pittman eagerly joins the Little Hoosier Tots Soccer Club in the fall, chases baseballs with the Dearborn County Miners' youth league in the spring, and proudly wears a miniature Indianapolis
    Colts jersey while shouting encouragement for the team during Sunday games, reflecting a seasonal enthusiasm for team sports and a love for local athletic pride.
  arts: Edward Pittman spends rainy afternoons drawing cartoon characters from Paw Patrol and painting landscapes inspired by Dr. Seuss books, while humming the catchy tune of 'Let It Go' from Frozen (sung
    by Idina Menzel) and occasionally dancing to upbeat tracks by the kid-friendly pop group Kidz Bop, making the arts a vivid, if sometimes noisy, part of their daily routine.
  travel: Edward Pittman loves family road trips that pit the excitement of a spontaneous detour to the Indiana Dunes for sandcastle building against the careful planning of a week-long stay at Walt Disney
    World in Florida, a contrast that fuels their curiosity for both familiar nature trails and magical theme-park adventures.
  culinary: Edward Pittman eagerly helps stir pancake batter on Saturday mornings, delights in biting into crispy chicken nuggets paired with honey mustard, and declares a fondness for cheesy mac and cheese
    and buttery corn on the cob, though they often sneak extra strawberry jam onto their toast despite a parental warning to keep portions modest.
  core: Edward Pittman is a quietly competitive five-year-old who balances a love for cataloguing backyard critters with a sweet tooth that leads to secret jam raids, preferring small-group adventures over
    crowds while constantly questioning the world around them.
background:
  cultural: Edward is raised in Lawrenceburg, Indiana, a small Midwestern town in Dearborn County. His family has deep regional roots, reflecting the German and Irish ancestry common in the area. The local
    culture emphasizes community gatherings such as county fairs, church services, and school events. Values of practical work ethic, respect for nature, and modest, down‑to‑earth activities like fishing,
    gardening, and outdoor exploration are woven into his daily life. This upbringing blends mainstream American traditions with the modest, neighborly spirit of the Midwest, shaping his reserved yet curious
    personality.
