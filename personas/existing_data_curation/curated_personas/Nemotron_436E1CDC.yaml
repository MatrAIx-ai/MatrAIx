  hobbies: '[''Cooking and recipe development'', ''Gardening'', ''Reading historical fiction and spiritual literature'', ''Knitting and quilting for charity'', ''DIY home improvement'', ''Church choir and
    book club'', ''Walking on coastal trails'']'
  career_goals: Carolyn hopes to translate her practical talents into a small home‑based venture that respects her need for routine while allowing occasional creative spontaneity. She dreams of opening
    a weekend catering service featuring her signature soul‑food recipes and selling handmade quilts at local craft fairs. Additionally, she plans to earn a certification as a home health aide, enabling
    her to provide compassionate care to seniors in her community. All of these goals are guided by her desire to contribute to family harmony, support her local church, and maintain a steady, low‑stress
    schedule that accommodates her anxiety sensitivities.
