persona_description: A Network Engineer who specializes in the management and operation of networks, specifically in the use of Management Information Base (MIB) and Object Identifiers (OID) to monitor
  and control network devices. They are familiar with the LTE network architecture and the MIB structure, and are capable of organizing and accessing information in a MIB file using OIDs. They have experience
  with SNMP and its MIB resource, and are skilled in using MIB to enforce motor insurance laws through the DVLA. They are also knowledgeable about the OSI/ISO Network management model and the collection
  of objects in a MIB database.
