  hobbies: '[''Visiting art galleries and museums'', ''Collecting Indian folk and contemporary art'', ''Reading art history and photography books'', ''Listening to and playing Indian classical music (tabla)'',
    ''Gardening (vegetables and herbs)'', ''Volunteering at community cultural events'', ''Attending pottery and painting workshops'', ''Hiking local trails and bike rides for solitude'', ''Cooking Gujarati
    cuisine and fusion recipes'']'
  career_goals: Adler aims to translate his extensive retail knowledge into a supervisory role within the next two years, seeking a position as a shift manager or assistant manager where he can lead a small
    team and shape store layout. He also wants to deepen his expertise in visual merchandising by completing an online certification in retail design, and eventually to consult part‑time for local boutique
    owners looking to blend South Asian aesthetic elements with contemporary Western trends. On the personal side, he hopes to achieve a stable, part‑time schedule that allows more time for family, artistic
    pursuits, and community service, while building a modest side venture selling handcrafted Indian décor through an online platform.
