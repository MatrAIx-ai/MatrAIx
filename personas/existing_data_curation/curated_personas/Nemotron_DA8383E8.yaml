  skills: '[''Customer Service'', ''Sales & Upselling'', ''Visual Merchandising'', ''Inventory Management'', ''Cash Handling & Basic Bookkeeping'', ''Conflict Resolution'', ''Team Mentoring'', ''Bilingual
