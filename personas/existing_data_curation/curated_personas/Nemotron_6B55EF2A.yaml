personas:
  professional: Susan Moreno, a seasoned health information manager, harnesses their mastery of Epic and Cerner, meticulous coding expertise, and data audit skills to drive compliance and efficiency, while
    their competitive drive fuels pursuit of RHIA certification and a supervisory role overseeing data governance at the hospital.
  sports: Susan Moreno, a devoted participant in the local Genesee Riverway Trail walking club, embraces a structured weekly regimen of moderate‑intensity hikes, supports the Buffalo Bills in football season
    and the Buffalo Sabres in hockey, and occasionally joins a seasonal senior softball league, balancing their competitive spirit with low‑impact activity.
  arts: Susan Moreno channels their love of history into artistic pursuits by building intricately detailed model railway layouts they treat as miniature architectural art, attending Ken Burns documentary
    screenings, savoring Beethoven symphonies and Bob Dylan folk songs, and regularly visiting the Albright‑Knox Art Gallery to study modernist works that inspire their hobbyist craftsmanship.
  travel: Susan Moreno prefers meticulously planned trips, often opting for weekend escapes to the Finger Lakes wine region and annual heritage pilgrimages to historic European archives such as the National
    Archives in London and the Bibliothèque nationale de France in Paris, while balancing a modest travel budget by using reward points and staying in quiet B&Bs that offer reflective solitude.
  culinary: Susan Moreno enjoys cooking with fresh herbs from their garden, expertly preparing rosemary‑infused roasted chicken, basil pesto pasta, and seasonal minestrone soup seasoned with thyme and oregano,
    while they favor quiet meals at home over crowded restaurants, occasionally treating themselves to a fine‑dining tasting menu featuring truffle risotto as a rare indulgence.
  core: Susan Moreno blends a competitive, detail‑oriented mindset with a love for solitary puzzles and model railways, turning routine into rigor while they occasionally hoard extra crossword books and
    sidestep small talk.
background:
  cultural: Susan was born and raised in a working‑class neighborhood of Rochester, New York, in the early 1960s. Her family’s ancestry is a blend of Irish and Italian heritage, though she identifies primarily
    with the broader American cultural milieu of the Northeast. Raised in a Catholic household, she attended public schools where she completed up to the 12th grade but did not obtain a formal diploma,
    entering the workforce directly after high school. The region’s emphasis on practicality, self‑reliance, and community responsibility shaped her pragmatic outlook. Over the decades she witnessed the
    transformation of healthcare documentation from paper charts to digital records, which reinforced her appreciation for structured systems and data integrity. As a lifelong single woman, she values independence
    and has cultivated a personal identity rooted in professional competence and modest community involvement.
attributes:
  skills: '["Electronic Health Record (EHR) system administration (Epic, Cerner)", "Medical coding (ICD-10, CPT, HCPCS)", "HIPAA compliance and privacy/security procedures", "Health Information Management
    (HIM) policies and workflow design", "Data quality assurance and audit", "Patient record retrieval and release management", "Report generation and data analysis (Excel, Access, basic SQL)", "Process
    improvement and workflow optimization", "Staff training and mentorship in record handling", "Healthcare billing coordination and coding validation"]'
  hobbies: '["Crossword puzzles and Sudoku", "Model railway building and landscaping", "Herb and vegetable gardening", "Reading historical nonfiction and biographies", "Small-group book club participation",
    "Walking the Genesee Riverway Trail", "Genealogy research"]'
  career_goals: Susan aims to obtain the Registered Health Information Administrator (RHIA) certification within the next two years and leverage it to move into a supervisory role overseeing the HIM department
    at her hospital. She aspires to lead a hospital‑wide data governance initiative that standardizes record‑keeping practices and improves compliance metrics. In the longer term, she envisions becoming
    a consultant who helps smaller clinics transition from paper to digital records, sharing her expertise in workflow redesign and regulatory adherence. Her competitive nature drives her to achieve top
    performance scores in department audits and to publish an article on best practices for EHR data integrity in a professional HIM journal.
