    ''Team Leadership & Mentoring'', ''Data-Driven Process Optimization'', ''Technical Problem Solving'']'
  hobbies: '[''Hiking the Torrey Pines and coastal trails'', ''Yoga and mindfulness meditation'', ''Woodworking and furniture making'', ''Cooking Mexican cuisine and exploring fusion recipes'', ''Reading
    technical journals and historical non-fiction'', ''Volunteer work with Habitat for Humanity'', ''Sustainable gardening'', ''Attending construction technology meetups (e.g., 3D printing, drones)'', ''Visiting
    architecture museums and exhibitions'', ''Salsa dancing (occasionally)'']'
  career_goals: Rocio aims to ascend to a senior executive role—such as Director of Construction—or to launch her own consultancy focused on lean, green building solutions for mid‑size developers in Southern
    California. She is pursuing LEED AP and PMP certifications to solidify her credibility in sustainable project delivery. A long‑term ambition is to become a visible advocate for Hispanic women in the
    built environment, shaping industry policy through board service on local building committees and speaking at national conferences. Rocio also hopes to lead a landmark, climate‑resilient infrastructure
    project that showcases innovative technology while delivering tangible community benefits.
