personas:
  professional: Rocio Dongo, a senior construction manager with three decades of experience, blends rigorous STEM expertise with hands‑on craftsmanship, leveraging BIM, LEED, and advanced scheduling tools
    while mentoring diverse teams and championing sustainable, community‑focused projects; they balance curiosity with practicality and a competitive drive to deliver on‑time, on‑budget results.
  sports: Rocio Dongo, an avid hiker of Torrey Pines’ coastal trails and a regular at CorePower Yoga, follows the Los Angeles Dodgers and LA Galaxy, and participates in a local women’s soccer league, using
    fitness as both stress relief and a competitive outlet; they balance social game nights with solitary trail runs to recharge.
  arts: Rocio Dongo, a passionate salsa dancer and lover of Latin‑influenced music, regularly enjoys playlists featuring Buena Vista Social Club and Maná, attends performances by the Los Angeles Philharmonic,
    and draws inspiration from vernacular architecture for her custom furniture designs; they often critique artistic details with a skeptical eye while embracing creative expression.
  travel: Rocio Dongo, a meticulous planner who balances family commitments with a love for cultural immersion, has trekked the ruins of Oaxaca, explored the historic neighborhoods of Barcelona, and dreams
    of hiking Patagonia’s Torres del Paine, always seeking sustainable travel options; they alternate between detailed itineraries and spontaneous detours, but worry about time away from work.
  culinary: Rocio Dongo, a skilled home chef, perfects traditional mole poblano, tamales, and carnitas while experimenting with quinoa‑lime salads and chipotle‑infused avocado toast, favoring fresh cilantro,
    cacao, and local heirloom tomatoes in her kitchen; they sometimes over‑season dishes in a quest for bold flavors, and occasionally skip meal prep when overwhelmed by deadlines.
  core: Rocio Dongo, a competitive, detail‑driven construction leader who channels chronic worry into disciplined health habits, sustainable design, and a relentless pursuit of community‑rooted projects.
background:
  cultural: Rocio grew up in a bicultural Mexican‑American household in Southern California, speaking both Spanish and English fluently. Her family emphasized hard work, communal responsibility, and pride
    in craftsmanship—values that translate directly into her dedication to quality construction and mentorship. She participates in local Mexican cultural festivals and is an active member of regional Hispanic
    professional networks, where she advocates for greater representation of Latinx women in the construction sector. Rocio’s culinary traditions, love of music, and respect for vernacular architecture
    inform her aesthetic sensibilities and her commitment to using locally sourced, sustainable materials in projects. Her cultural roots provide a resilient support system that balances her competitive
    drive with a deep sense of community belonging.
attributes:
  skills: '[''Construction Project Management'', ''Budget Development & Cost Control'', ''Scheduling & Critical Path Analysis'', ''Risk Assessment & Mitigation'', ''Regulatory Compliance (OSHA, Local Building
