  career_goals: Even at two, Lindy imagines being a 'helper' when she grows up. She loves watching her mother in the kitchen and says she wants to 'make food for everyone,' hinting at a future as a caring
    caregiver or chef. She also talks about wanting to be a 'dog doctor' after seeing a veterinarian, reflecting her love of animals and curiosity about how things work. Her ambitions blend a desire to
    explore, create, and support others, showing a balance of practical helping and imaginative exploration.
