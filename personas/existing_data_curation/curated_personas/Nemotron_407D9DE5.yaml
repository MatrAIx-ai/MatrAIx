  career_goals: Luella hopes to transition from routine production to a more creative role where she can design custom aesthetic dental and ocular prosthetics that blend function with artistic expression.
    She aims to lead a small research-and-development team at her lab to trial biocompatible 3D-printed materials and develop personalized prosthetic designs inspired by natural forms. Over the next five
    years, she would like to obtain certification in advanced dental CAD/CAM technology, present her innovations at regional conferences, and mentor women of color entering the medical-device field. Eventually,
    she envisions opening a community-based studio that offers affordable, artistically-styled dental appliances while providing workshops on health literacy.
