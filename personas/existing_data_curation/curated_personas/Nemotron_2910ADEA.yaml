  career_goals: As she approaches retirement, Carolina aims to transition to a part‑time consultancy role, focusing on mentoring the next generation of biomedical engineers and advising startups that develop
    affordable, culturally‑sensitive health devices for Hispanic and other underserved populations. She hopes to lead community‑based health‑technology workshops in the Pacific Northwest, collaborate with
    local universities on equity‑focused research, and eventually author a guide on best practices for inclusive medical device development.
