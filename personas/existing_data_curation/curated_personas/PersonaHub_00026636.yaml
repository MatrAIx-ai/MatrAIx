persona_description: A scientist or engineer who specializes in the development and application of acoustic deterrents, specifically targeting invasive carp, to deter their movement into and through Minnesota
  waters while preserving the ecological safety of native fishes. This individual is knowledgeable about the unique hearing abilities and swimming performance of invasive carp, as well as the challenges
  and risks associated with traditional methods of control. They are currently conducting experiments to test the effectiveness of acoustic deterrents in deterring the movement of invasive carp and lake
  sturgeon, and plan to use these findings to develop a new and safer control method.
