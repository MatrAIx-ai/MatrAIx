personas:
  professional: Jacob Sawyer is a skilled landscaper with 15 years of hands‑on experience who combines solid plant knowledge and heavy‑equipment operation with a curiosity for sustainable, low‑water designs,
    and, despite a love for spontaneity that sometimes derails deadlines, they are planning to launch a family‑run native‑plant business while pursuing a certified arborist credential.
  sports: Jacob Sawyer is a regular on the Mount Dora Softball League, a devoted fan of the Tampa Bay Rays and Orlando Magic, and they treat each softball game as a chance to mingle with neighbors while
    also squeezing in sunrise hikes on the Lake Dora trail and weekend fishing trips that double as informal cardio sessions.
  arts: Jacob Sawyer enjoys playing acoustic guitar at community barbecues, attends the Mount Dora Art & Music Festival every spring, and they find inspiration in folk artists like Mumford & Sons and classic
    singer‑songwriters such as Bob Dylan, while also curating a small collection of local landscape paintings.
  travel: Jacob Sawyer prefers spontaneous, low‑key getaways on his small boat to the Gulf Coast islands, has already explored St. Augustine’s historic district and the Blue Springs of Georgia, and they
    dream of a fishing expedition in the Pacific Northwest’s salmon rivers, balancing travel with family commitments and a moderate budget.
  culinary: Jacob Sawyer loves experimenting with seafood, often pairing fresh‑caught grouper with lemon‑basil risotto, shrimp tacos with mango salsa, and garden‑grown roasted beets, using ingredients like
    smoked paprika, dill, and citrus zest to create vibrant flavors in their moderately practiced home kitchen, and they relish sharing these dishes at community potlucks.
  core: Jacob Sawyer blends a love for outdoor adventure, community‑focused landscaping, and spontaneous creativity into a practical yet flexible 40‑year‑old who keeps their garden thriving, and they never
    quite manage to keep a tidy toolbox.
background:
  cultural: Jacob was raised in Central Florida in a middle‑class, white American family with deep roots in the region’s post‑World‑II suburban growth. He grew up attending local public schools, participating
    in community sports, and experiencing the outdoor‑focused lifestyle that defines Central Florida—frequent picnics by the lakes, weekend trips to the Gulf coast, and a strong appreciation for the state’s
    native flora. His family celebrates traditional American holidays like Thanksgiving and the Fourth of July, and they are active members of a local Baptist church that emphasizes service and community
    involvement. Living in Mount Dora, Jacob absorbs the town’s eclectic mix of longtime residents and seasonal tourists, which has broadened his cultural outlook while keeping his values grounded in hard
    work, friendliness, and a love for nature.
attributes:
  skills: '[''Plant identification'', ''Irrigation system design and maintenance'', ''Heavy equipment operation (ride‑on mowers, tractors, aerators)'', ''Basic landscape design'', ''Organic pest control'',
    ''Soil health assessment and amendment selection'', ''Team coordination and crew management'', ''Client communication and service'', ''Safety and environmental compliance'', ''Basic carpentry for garden
    structures'']'
  hobbies: '[''Fishing'', ''Boating'', ''Hiking'', ''Community gardening'', ''Nature photography'', ''Softball'', ''DIY home projects'', ''Seafood cooking'', ''Attending local art and music festivals'',
    ''Playing acoustic guitar'']'
  career_goals: Jacob dreams of turning his hands‑on experience into a small, family‑run landscaping firm that specializes in native‑plant installations and low‑water designs. He plans to earn a certified
    arborist credential, develop a portfolio of community‑garden projects in Mount Dora, and eventually move into a supervisory role with the city’s parks department where he can mentor apprentices and
    promote environmentally‑friendly practices. He also hopes to expand his knowledge of smart‑irrigation technology and incorporate it into his future business.
