  career_goals: Gauge dreams of a future where he can help his community in a structured, dependable role. He is drawn to careers such as firefighting, civil engineering, or a community safety officer,
    because they combine clear procedures with opportunities to work closely with people. In the short term, he aims to earn the Boy Scout rank of Eagle and to excel in science and math classes, laying
    a solid foundation for those ambitions.
