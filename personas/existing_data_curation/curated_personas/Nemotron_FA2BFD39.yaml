personas:
  professional: Gauge Jamieson, an aspiring junior robotics engineer, channels their methodical planning and energetic teamwork, and they lead the school’s robotics club while balancing soccer practice
    and intricate LEGO builds.
  sports: Gauge Jamieson plays forward for the Riverside United U12 soccer team, follows Manchester United’s Premier League matches, dedicates weekend practice to improve stamina, and they eagerly join
    schoolyard games to channel their energetic social nature.
  arts: Gauge Jamieson dives into adventure series like "Percy Jackson" and sci‑fi sagas such as "Artemis Fowl", spends evenings crafting elaborate Minecraft worlds and LEGO masterpieces, jams to Imagine
    Dragons and the K‑pop group Twice, and they regularly watch the Star Wars films, all of which fuel their vivid imagination and collaborative storytelling.
  travel: Gauge Jamieson loves meticulously planned family road trips to places like Yosemite National Park and Disney World, maintains a handmade checklist of must‑see sights, dreams of exploring Tokyo’s
    Akihabara district to experience video‑game culture, and they often pack LEGO kits for creative downtime during travel.
  culinary: Gauge Jamieson favors pepperoni pizza, chicken nuggets, and the occasional California roll, enjoys assembling LEGO‑shaped fruit kebabs with strawberry and banana chunks, can whip up a simple
    scrambled‑egg breakfast, yet they stubbornly refuse broccoli because of its texture.
  core: Gauge Jamieson, an 11‑year‑old who blends meticulous organization with a bubbling social spirit, solves puzzles, scores goals, and builds LEGO worlds while habitually worrying about unfinished tasks.
background:
  cultural: Gauge grew up in Canton, Georgia, a small city in Cherokee County known for its close‑knit Southern community. His family celebrates regional traditions such as weekend barbecues, community
    festivals, and church gatherings, and they place a strong emphasis on politeness, responsibility, and helping neighbors. This cultural setting has reinforced his cooperative nature and his desire for
    orderly, predictable environments while still encouraging him to be active and sociable with peers.
