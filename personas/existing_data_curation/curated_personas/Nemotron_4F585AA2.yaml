personas:
  professional: Rajdei Singh is a methodical junior science enthusiast who leads their school’s science club, designs simple coding projects, and approaches each experiment with the same disciplined routine
    they apply to their Bharatanatyam practice.
  sports: Rajdei Singh enjoys playing weekend cricket matches with friends, follows the Mumbai Indians in the IPL, and balances the sport with disciplined yoga practice to maintain flexibility and focus.
  arts: Rajdei Singh immerses themselves in classic literature such as Agatha Christie mysteries, sketches detailed line drawings of temple architecture, and performs Bharatanatyam narratives during community
    festivals, drawing inspiration from celebrated dancer Alarmel Valli and artist Raja Ravi Varma.
  travel: Rajdei Singh prefers well‑planned trips to culturally rich destinations, having visited the historic forts of Jaipur and the serene hills of Shimla, and dreams of a future family vacation to Kyoto
    to explore its temples and gardens.
  culinary: Rajdei Singh enjoys cooking family recipes like butter chicken, aloo paratha, and mango lassi with their mother, skillfully measuring spices, yet occasionally forgets to set the timer, resulting
    in slightly over‑cooked rice.
  core: Rajdei Singh balances methodical discipline with a love for mystery stories, cricket, and Bharatanatyam, all while navigating teen life with a practical, routine‑oriented mindset and a few end‑of‑meal
    timing mishaps.
background:
  cultural: Rajdei is a second‑generation South Asian American of Indian heritage, raised in a close‑knit family in Houston’s vibrant multicultural neighborhood. At home, Hindi is spoken alongside English,
    and the family observes traditional customs such as daily prayers, respect for elders, and a strong emphasis on education. They celebrate major festivals like Diwali, Holi, and occasionally Eid, inviting
    neighbors from diverse backgrounds, which fosters a sense of community harmony. The cultural values of collectivism, practicality, and service inform her daily routines, from helping with household
    chores to volunteering at the local South Asian cultural center. This blend of Indian traditions and American life shapes her identity and aspirations.
