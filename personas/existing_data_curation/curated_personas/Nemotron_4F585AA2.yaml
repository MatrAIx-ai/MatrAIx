  career_goals: Rajdei aims to build a stable, service‑oriented career that combines her love for science with her desire to help others. She plans to focus on academic excellence in middle and high school,
    particularly in biology and chemistry, with the goal of earning a scholarship for a pre‑medical track. Ultimately she aspires to become a pediatrician who can serve the diverse communities of Houston,
    especially South Asian families, and promote culturally sensitive health education. She also envisions using her organizational skills to lead health‑awareness projects in local community centers.
