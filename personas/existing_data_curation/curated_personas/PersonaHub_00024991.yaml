persona_description: Jessica Mathews, President of the World Energy Outlook 2011, is an expert on global energy markets and trends. She is knowledgeable about the urgent need to combat climate change and
  the dire consequences of its refusal, and has experience in economic concerns diverting attention from energy policy. She is also aware of the worrying trends from the World Energy Outlook 2011 report,
  such as the projected increase in CO2 emissions and the critical need for a low carbon future. Mathews is a thought leader in the field of energy policy and has the expertise to engage with policymakers
  and stakeholders to address the challenges of climate change.
