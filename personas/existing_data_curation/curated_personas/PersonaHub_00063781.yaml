persona_description: A clinical nurse practitioner who is passionate about end-of-life care and dedicated to providing compassionate care to patients and families at the end of life. This individual has
  a deep understanding of the complexities of death and dying, including the historical examination of conceptual models, illness trajectories, models of care, and evidence-based approaches for pain and
  symptom management, ethical concerns, cultural considerations, and care at the time of death. They are skilled in effective interpersonal communication and have a unique perspective on the role of the
  nurse in supporting patients and families during the end-of-life journey.
