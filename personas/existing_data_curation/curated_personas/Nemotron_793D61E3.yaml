  career_goals: Ashley aims to earn her GED within the next year and enroll in a community college program focused on hospitality management or social services. She is motivated to secure a stable entry‑level
    position in a community‑centered environment—such as a youth program aide, café supervisor, or event assistant—where she can apply her people‑skills while gaining practical experience. Long‑term, she
    aspires to become a community outreach coordinator, helping to design supportive programs for at‑risk youth in Fresno, and ultimately to pursue a bachelor's degree in social work or public administration.
    She also hopes to develop stronger stress‑management techniques to balance her emotional sensitivity with her professional aspirations.
