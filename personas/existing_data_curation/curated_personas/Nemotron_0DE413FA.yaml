  career_goals: Nelson aims to progress into senior credit risk management within the next five years, leading a dedicated analyst team and shaping the institution’s credit‑policy framework. He plans to
    obtain professional designations such as the CFA and FRM to deepen his financial expertise, and is considering a part‑time master’s program in Financial Technology to stay at the forefront of fintech
    innovations. His long‑term ambition is to drive the adoption of AI‑powered credit solutions that enhance financial inclusion for small‑business owners in Puerto Rico, ultimately positioning himself
    as a thought leader in the island’s evolving financial ecosystem and eventually becoming a chief credit officer.
