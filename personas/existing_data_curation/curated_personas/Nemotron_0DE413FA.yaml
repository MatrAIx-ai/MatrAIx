personas:
  professional: Nelson Medinavega, a credit analyst at a major San Juan bank, uses advanced Excel, VBA, Tableau, Python, and R to build predictive risk models, merging rigorous data analysis with unconventional
    alternative data sources, and leverages their outgoing, collaborative style to present insights to senior leadership while balancing meticulous organization with flexible problem‑solving.
  sports: Nelson Medinavega enjoys weekend beach volleyball with friends at Isla Verde, hikes the trails of El Yunque to stay fit, follows the local basketball team Capitanes de Puerto Rico and the baseball
    club Cangrejeros de Santurce, and belongs to a community running club that meets twice weekly for 5K routes along the coast.
  arts: Nelson Medinavega immerses themselves in Puerto Rican contemporary art, regularly visiting galleries in Santurce to view works by artists like Nestor León and Ligia Hernández, captures the island’s
    vibrant street life with a DSLR, and channels their love for rhythm by dancing salsa and bachata to live performances by musicians such as Marc Anthony and local bands at Casa de la Cultura.
  travel: Nelson Medinavega blends meticulous planning with spontaneous detours, having explored the historic streets of Old San Juan, the colonial charm of Cartagena, and the art scene of Miami’s Wynwood,
    while dreaming of a future trip to Barcelona's Picasso Museum and seeking travel deals that fit their goal of saving for a professional certification.
  culinary: Nelson Medinavega cooks traditional mofongo and arroz con gandules using plantains, sofrito, and chicharrón, while experimenting with fusion dishes like mango‑glazed pork tenderloin with a hint
    of chipotle, and enjoys sourcing fresh cilantro, lime, and garlic at the local farmer’s market to elevate weekend meals for friends.
  core: Nelson Medinavega is a data‑savvy, art‑loving credit analyst who balances meticulous risk work with spontaneous salsa dancing, yet constantly battles worry and seeks calm through meditation and
    creative pursuits.
background:
  cultural: Nelson’s cultural identity is rooted in the rich tapestry of Puerto Rican heritage. Born and raised in the San Juan metropolitan area, he grew up immersed in a bilingual environment where Spanish
    and English interweave in daily life, education, and professional settings. His family traditions reflect a blend of Spanish colonial influences, African‑descendant rhythms, and indigenous Taíno symbolism—manifested
    in the island’s music, dance, and culinary customs that he celebrates through salsa, bomba, and plena. Community ties are strong; festivals like the San Sebastián Street Festival and the patron saint
    celebrations in Trujillo Alto have shaped his sense of belonging and collective joy. The island’s emphasis on family solidarity, hospitality, and resilience in the face of economic challenges informs
    Nelson’s cooperative and caring disposition. He draws inspiration from Puerto Rico’s vibrant artistic scene and its ongoing dialogue between tradition and innovation, which fuels both his personal interests
    and professional aspirations.
