  may be interested in accessing other opportunities in the future. They may be a current teacher who has had no formal teacher education, or a teacher who is looking to improve their understanding of their
  role and work as a teacher. They may also be a district leader who is interested in offering free verified certificates for teacher professional development through the ConnectED effort.
