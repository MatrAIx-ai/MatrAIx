persona_description: A pediatric allergist or pediatric pulmonologist who is interested in studying the prevalence and characteristics of different types of asthma-like symptoms in children. They are interested
  in understanding the underlying pathologies and differences in prognosis among different phenotypes of wheeze and cough, and are open to the possibility of individualized treatment based on the identified
  disease entities. They may also be interested in the potential for the findings from cluster analyses to be validated in independent samples.
