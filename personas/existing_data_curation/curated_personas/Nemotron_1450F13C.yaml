personas:
  professional: Christie Lor, an 18‑year‑old aspiring automotive technician, combines meticulous engine diagnostics, hybrid‑battery expertise, and hands‑on problem solving with a competitive drive to out‑perform
    peers at the Memphis Motorsports Club, yet their relaxed attitude toward scheduling often results in spontaneous, last‑minute garage projects.
  sports: Christie Lor follows the Memphis Grizzlies in winter, the Redbirds in spring, attends local drag‑racing events at the Memphis Motorsports Club, and occasionally trains at Powerhouse Gym, preferring
    competitive solo workouts over team sports and channeling their competitive edge into both virtual racing simulators and real‑world car performance challenges.
  arts: Christie Lor’s artistic side surfaces in nightly vinyl sessions featuring B.B. King, Stevie Ray Vaughan, and Led Zeppelin, while sketching custom car designs inspired by classic muscle cars, reflecting
    a quiet appreciation for classic rock and blues culture that fuels their creative problem‑solving in the garage.
  travel: Christie Lor prefers spontaneous road trips along the Mississippi River and planned visits to automotive hotspots like Detroit’s Henry Ford Museum and Tokyo’s EV expos, balancing a love for adventure
    with limited budget constraints that prioritize fuel‑efficient travel and occasional weekend stays at nearby Memphis historic districts.
  culinary: Christie Lor enjoys cooking steaming pho with star‑anise, ginger, and fish sauce, assembling fresh spring rolls with rice noodles and cilantro, and indulging in Memphis barbecue ribs slathered
    in sweet‑spicy sauce, showcasing a blend of Vietnamese flavors and Southern comfort food that they expertly combine in their modest home kitchen.
  core: Christie Lor is an 18‑year‑old automotive enthusiast with a competitive edge, balancing disciplined garage work, spontaneous spending on performance parts, and a love for vinyl blues, all while
    wrestling with a laid‑back approach to planning that often leads to last‑minute projects.
background:
  cultural: Christie is the daughter of Vietnamese immigrants who settled in Memphis, Tennessee. Her family maintains cultural traditions such as celebrating Tet, preparing Vietnamese cuisine, and speaking
    Vietnamese at home, which gives her a strong sense of heritage and bilingual fluency. Growing up in the South, she also embraced Memphis’s music scene, community festivals, and Southern hospitality.
    This blend of Southeast Asian family values—emphasis on hard work, respect for elders, and communal support—with the pragmatic, low‑key vibe of Memphis has shaped her practical outlook, her love for
    hands‑on problem solving, and her appreciation for both quiet solitude and tight‑knit social circles.
attributes:
  skills: '[''Automotive diagnostics (OBD‑II)'', ''Engine repair and rebuild'', ''Hybrid/electric vehicle battery troubleshooting'', ''Brake and suspension service'', ''Transmission service'', ''Technical
    manual interpretation'', ''Hand‑tool proficiency'', ''Safety compliance (OSHA standards)'', ''Bilingual communication (English, Vietnamese)'', ''Customer service fundamentals'']'
  hobbies: '[''Project car restoration (Honda Civic)'', ''Custom automotive lighting and performance upgrades'', ''Attending local car meets and drag races'', ''Racing simulation video games'', ''Cooking
    traditional Southeast Asian dishes (pho, spring rolls)'', ''Listening to Memphis blues and classic rock'', ''Exploring historic Memphis neighborhoods'', ''Sketching automotive designs'']'
  career_goals: Christie aims to earn ASE Master Technician certification within the next three years and later specialize in electric‑vehicle technology as the industry shifts toward greener transportation.
    She plans to complete her associate’s degree in automotive technology, then pursue a bachelor’s in automotive engineering to deepen her theoretical knowledge. Long‑term, she envisions opening her own
    independent garage in Memphis that offers high‑quality service and mentorship for young technicians, especially women and minorities entering the trade. She also hopes to become a certified trainer,
    sharing her hands‑on expertise with apprentices and contributing to regional industry standards.
