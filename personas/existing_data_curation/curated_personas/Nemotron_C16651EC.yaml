  career_goals: Trang aims to advance from cashier to a supervisory role within the next two years, seeking formal certification in retail management to strengthen her leadership credentials. She envisions
    overseeing an entire store shift, mentoring new hires, and implementing efficiency initiatives that blend her curiosity for new retail technologies with the pragmatic needs of the workplace. Long-term,
    she aspires to leverage her cultural heritage and culinary interest by opening a neighborhood specialty food stall that offers traditional South Indian delicacies, creating a bridge between her community
    and the broader Jacksonville market. Alongside professional growth, she is committed to building resilience against anxiety through workplace wellness programs and by advocating for supportive employee
    resources.
