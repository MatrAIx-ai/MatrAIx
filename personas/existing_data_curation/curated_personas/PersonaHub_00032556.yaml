persona_description: A historian or genealogist who is interested in the history and development of English surnames, particularly those related to the county of Cheshire, the village of Cheadle, and the
  name Dewi. They are also interested in the personal history and genealogy of the Dewsnap family, tracing their origins and migrations to Mottram in Cheshire, and their subsequent development in London.
  They are also interested in the history of the Poll Tax and its impact on the development of surnames.
