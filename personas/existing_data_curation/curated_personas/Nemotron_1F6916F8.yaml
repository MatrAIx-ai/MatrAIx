  hobbies: '[''Reading adventure/science books'', ''LEGO building'', ''Nature sketching and hiking'', ''Birdwatching and wildlife logging'', ''Playing piano'', ''Scratch coding'', ''Small-group board games
    (e.g., Catan Junior)'']'
  career_goals: Thomas envisions a future where he can combine his love for nature, his compassion for living beings, and his desire to help others. He aspires to become a wildlife biologist or a veterinary
    technician, aiming to protect animals and preserve New Hampshire’s forests. He also imagines working as an environmental educator or park ranger, sharing his curiosity about the natural world with students
    and visitors. Over the long term, he hopes to contribute to community projects that promote sustainability and harmony.
