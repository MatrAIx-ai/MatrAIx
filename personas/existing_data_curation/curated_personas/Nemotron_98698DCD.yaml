  hobbies: '[''Hiking and nature photography'', ''Digital illustration and sketching'', ''DIY upcycling crafts'', ''Creating TikTok videos'', ''Cooking simple seasonal meals'', ''Volunteering at an animal
    shelter'', ''Reading sci-fi/fantasy novels'', ''Playing acoustic guitar'', ''Participating in a local book club'']'
  career_goals: Vesta’s career vision reflects her mix of curiosity and practicality. In the short term, she plans to obtain her high-school equivalency (GED) and enroll in a community-college program that
    offers graphic design and environmental studies. She hopes to combine her creative talents with a solid understanding of sustainable design principles, ultimately working as an eco-focused product designer
    or visual communication specialist. Long-term, Vesta envisions a role where she can develop environmentally responsible packaging and branding for local businesses, bridging innovative ideas with proven
    production methods. She also considers a parallel path as a veterinary assistant, drawn by her compassion for animals and her desire for a hands-on, stable profession. Regardless of the specific field,
    Vesta aims to secure a career that allows continual learning, practical impact, and the flexibility to balance independent work with collaborative projects.
