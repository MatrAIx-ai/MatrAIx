  hobbies: '["Hiking", "Landscape photography", "Reading literary fiction and non-fiction", "Creative writing", "Blogging", "Acoustic guitar", "Cooking", "Volunteer work at local library", "Board games
    with close friends", "Exploring local folklore", "Meditation"]'
  career_goals: Glenn aims to transition from his current hiatus into a flexible, remote role that leverages his research and writing strengths—such as content creation, editorial assistance, or digital
    storytelling for a cultural or environmental organization. He plans to build a freelance portfolio focused on travel, nature, and New England heritage, eventually publishing a collection of essays or
    a nonfiction book on the region’s literary and natural history. In the longer term, he hopes to complement his writing with technical skills (HTML/CSS, basic UI/UX) to produce immersive digital narratives,
    while maintaining a lifestyle that allows ample time for outdoor pursuits and personal growth.
