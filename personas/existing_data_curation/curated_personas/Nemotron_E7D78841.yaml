personas:
  professional: Federico Sosa is a budding bilingual tech enthusiast who leverages a knack for troubleshooting smartphones, RC hobby repairs, and basic networking to envision a future as an IT support specialist
    for local schools, balancing meticulous organization with the flexibility to improvise during hands‑on projects.
  sports: Federico Sosa plays midfield for the Eastside Youth Soccer Club, roots for the LAFC in the MLS, and spends weekends hiking the nearby state parks, blending team camaraderie with solo exploration
    while maintaining a disciplined yet flexible fitness routine.
  arts: Federico Sosa mixes reggaeton hits by Bad Bunny with classic rock anthems from the Rolling Stones while crafting TikTok‑style short videos on InShot that showcase game highlights and RC builds,
    turning a love of rhythm and nostalgia into a creative outlet.
  travel: Federico Sosa dreams of weekend road trips to the Sierra Nevada trails, short visits to cultural festivals in neighboring cities, and long‑term plans to explore the ancient ruins of Machu Picchu
    and attend CES in Las Vegas, planning each adventure around school breaks and a modest savings pool.
  culinary: Federico Sosa delights in preparing family heritage stews of slow‑cooked pork and chiles alongside hand‑rolled corn tortillas, experimenting with fresh cilantro and lime to brighten flavors,
    and uses weekends to hone basic culinary skills while sharing meals with friends.
  core: Federico Sosa is a bilingual teenage tech tinkerer who juggles RC hobbies, soccer, and family cooking, balancing practical organization with bursts of spontaneous creativity and an occasional gaming
    binge.
background:
  cultural: Federico's family emigrated from Guatemala to Pennsylvania when he was five years old. At home, Spanish is the primary language, and his parents preserve Guatemalan customs, including cooking
    traditional dishes such as tamales, chirmol, and atole, and celebrating holidays like Semana Santa and Día de los Muertos. In Thompson, he participates in a small Latinx community group that organizes
    cultural events, Spanish‑language tutoring, and shared meals. This dual cultural setting blends his Guatemalan heritage with the rural Pennsylvanian lifestyle, influencing his language skills, food
    preferences, and community orientation while fostering a strong sense of identity rooted in both cultures.
