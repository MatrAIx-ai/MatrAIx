  hobbies: '[''Model kit building'', ''Video gaming'', ''DIY electronics (Arduino projects)'', ''Soccer'', ''Cooking Guatemalan family recipes'', ''Hiking'', ''Listening to music (reggaeton, classic rock)'',
    ''Reading tech blogs'', ''Attending cultural festivals'']'
  career_goals: Federico aims to obtain his GED within the next two years and then pursue a vocational certification in information technology support or network troubleshooting. He is interested in a career
    that merges technical expertise with community service, such as working as a bilingual IT support specialist for a local school district or community center. Long‑term, he hopes to open a small tech
    repair shop that serves the Latinx community in his area while offering digital‑literacy workshops. He also keeps a backup plan of entering an apprenticeship in carpentry or automotive mechanics, valuing
    practical, hands‑on work that aligns with his curiosity and practicality.
