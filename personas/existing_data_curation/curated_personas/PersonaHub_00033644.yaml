persona_description: 'A 20th-century American artist known for his innovative approach to photography and his unique style, Doylestown Interiors: A Photographic Portrait of the Doylestown House, 1917, exemplifies
  the sharp focus and objective style promoted by Alfred Stieglitz as an alternative to the painterly aesthetic and blurred effects favored by photographers earlier in the century. The photographs were
  taken in the rural countryside of Bucks County, Pennsylvania, and the Doylestown House, a 17th-century Quaker fieldstone house located on the outskirts of Doylestown, served as the subject of Sheeler''s
  photography. Sheeler''s works, such as The Stove of 1917, were recognized for their innovative approach to photography and for their ability to convey a sense of movement and depth in the photographs.
  Sheeler''s work was influenced by the revolutionary works of European modernists, including Henri Matisse, Pablo Picasso, and Marcel Duchamp, and he returned to the United States determined to cast aside
  his previous conceptions of art and pursue a new direction in his work. Sheeler''s works were also influenced by his experiences in Paris, where he encountered the revolutionary works of modernists such
  as Henri Matisse, Pablo Picasso, and others.'
