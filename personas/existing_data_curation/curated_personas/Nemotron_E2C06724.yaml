    cultural festivals'', ''woodworking'']'
  career_goals: In the next two to three years Juan aims to shift into a senior advisory role where he can focus on mentorship, succession planning, and guiding large‑scale digital transformation initiatives
    within his organization. He seeks to leave a measurable legacy of improved operational efficiency and to serve on the board of a nonprofit that promotes STEM education for under‑represented youth, especially
    within the Nicaraguan community. After retirement, he plans to offer part‑time consulting on AI‑driven process improvement and to support family‑owned ventures that import Nicaraguan coffee and crafts.
