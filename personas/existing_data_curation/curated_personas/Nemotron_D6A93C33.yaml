personas:
  professional: Edward Strong is a retired business veteran who spent three decades steering a family‑run agricultural supply store through seasonal cycles, leveraging meticulous budgeting, Excel‑driven
    inventory models, and a collaborative, hands‑on leadership style to mentor local entrepreneurs and shape community events.
  sports: Edward Strong enjoys bowling on Thursday nights with his Chenoa league, cheers on the Chicago Cubs and Chicago Bears, and participates in the local senior softball league, while also attending
    the Springfield high‑school football games each fall.
  arts: Edward Strong sings baritone parts in his church choir, delighting in renditions of Handel's Messiah and classic car show theme music, while also attending the Springfield Symphony's performances
    of Beethoven's Ninth and reading historical non‑fiction books about the American Midwest, often quoting Grant Wood's 'American Gothic' in conversations.
  travel: Edward Strong prefers short road trips, planning weekend getaways to Galena, Illinois for historic tours, attending the annual Detroit Classic Car Expo, and flying to Florida during the holidays
    to visit his grandchildren, all while budgeting travel expenses through his meticulous spreadsheet.
  culinary: Edward Strong loves cooking garden‑fresh vegetable stew with heirloom tomatoes, corn, and basil, perfecting his homemade apple pie crust, grilling marinated pork chops with a side of pickled
    cucumbers, and occasionally treating himself to a classic Midwest deep‑dish pizza at his favorite downtown diner.
  core: Edward Strong is a routine‑loving, community‑focused retiree who blends practical business savvy with a love for group hobbies, classic cars, and homegrown food, while maintaining disciplined finances
    and a diligent health regimen.
background:
  cultural: Edward was raised in a traditional Midwestern white family on a farm near Chenoa, Illinois. His upbringing emphasized hard work, self-reliance, and community service, values that are reflected
    in his practical outlook and commitment to local institutions such as the church, the volunteer fire department, and the agricultural fair. He identifies with the cultural norms of central Illinois—respect
    for routine, modesty, and the importance of close‑knit social networks—while maintaining an open, outgoing demeanor that allows him to bridge generational gaps in his community.
