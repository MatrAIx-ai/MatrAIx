persona_description: A Professor in the University's College of Engineering at Swansea University who specializes in the design and construction of active buildings, which generate, store, and release their
  own power. He is also a co-director of SPECIFIC, a Swansea-led project that designs and constructs active buildings. His research interests include the use of steel in sustainable building technologies
  and the development of energy-efficient buildings. He has been honored with the prestigious Bessemer Gold Medal by the Institute of Materials, Minerals and Mining for outstanding services to the steel
  industry.
