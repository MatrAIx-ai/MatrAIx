  hobbies: '[''hiking'', ''mountain biking'', ''landscape photography'', ''DIY electronics (Arduino, Raspberry Pi)'', ''science fiction reading'', ''volunteering at community food pantry'', ''home automation
    projects'', ''attending transportation technology meetups'']'
  career_goals: James aims to spearhead a regional transition toward greener, technology‑enabled logistics, integrating electric trucks and telematics for a reduced carbon footprint. He plans to earn the
    Certified Transportation Professional (CTP) designation and eventually move into a senior regional operations director role, where he can mentor emerging supervisors and influence industry best practices.
    Additionally, he hopes to share his knowledge through part‑time teaching in logistics courses at a local community college.
