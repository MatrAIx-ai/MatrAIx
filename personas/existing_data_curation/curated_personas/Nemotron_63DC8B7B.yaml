  hobbies: '[''Reading (non-fiction, business strategy, African‑American history)'', ''Chess'', ''Morning jogging'', ''Herb gardening'', ''Cooking Caribbean‑inspired meals'', ''Jazz and blues listening'',
    ''Urban photography'', ''Mentoring youth (one‑on‑one)'', ''Meditation'', ''Podcast listening (technology, entrepreneurship)'']'
  career_goals: Clifton aims to advance from his current supervisory role to a district manager position within the next five years, overseeing multiple stores across South Florida. He plans to pursue a
    part‑time MBA to deepen his strategic and financial acumen, with a particular interest in e‑commerce integration and data‑analytics applications for retail. While he values practical, measurable outcomes,
    his curiosity drives him to explore innovative technologies such as AI‑based inventory forecasting and omnichannel customer engagement. Long‑term, Clifton aspires to launch his own boutique concept
    that highlights African‑American art and culturally inspired apparel, leveraging his retail expertise and community ties while maintaining a business model that allows for a balanced, low‑stress work
    environment.
