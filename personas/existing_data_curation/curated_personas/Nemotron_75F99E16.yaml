  career_goals: Approaching retirement, Aaron aims to transition into a part‑time advisory role where he can mentor younger production workers and provide safety‑compliance consulting. He dreams of documenting
    the personal histories of longtime factory employees in a memoir or oral‑history project, and hopes to volunteer at local art centers as a guide, sharing his unique perspective on the intersection of
    labor and creativity.
