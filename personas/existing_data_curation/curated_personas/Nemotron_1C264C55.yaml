personas:
  professional: Belquis Ornelas is an aspiring cultural manager who leverages bilingual communication, agile event planning, and a knack for spontaneous problem‑solving to curate community pop‑up art shows,
    even while their relaxed, sometimes disorganized, style means they frequently rely on last‑minute collaborations and flexible timelines.
  sports: Belquis Ornelas enjoys weekend pick‑up basketball at the Caguas community center, follows the Caguas Creoles baseball team and the Puerto Rico national soccer squad, and mixes salsa dancing classes
    with occasional runs along the Rio Grande de Loíza to stay fit, preferring spontaneous activity over structured gym routines.
  arts: Belquis Ornelas curates Instagram feeds featuring murals by local street‑artist Sofía Cruz, collects limited‑edition prints from photographer Jorge Otero, and draws inspiration from the rhythms
    of Bad Bunny, Celia Cruz, and the choreography of Alvin Ailey, turning every gallery visit into a personal storytelling session.
  travel: Belquis Ornelas prefers spontaneous weekend getaways, often hopping on a bus to Old San Juan’s historic plazas or catching a flight to Cartagena’s colorful streets, while dreaming of a month‑long
    creative retreat in Lisbon’s Alfama district, balancing a limited travel budget with occasional splurges on boutique hostels.
  culinary: Belquis Ornelas is an intermediate home cook who reimagines classic island rice and pigeon peas (arroz con gandules) with quinoa and smoked paprika, whips up mofongo stuffed with plantain chips
    and gochujang, and delights in pairing tropical fruits like guava and passion‑fruit with dark chocolate in both desserts and cocktails.
  core: Belquis Ornelas is a culturally curious social butterfly who thrives on last‑minute art projects, forgets to file receipts, and can turn any street mural into a spontaneous photo collage.
background:
  cultural: Belquis grew up in Caguas, a municipality known for its rich artistic traditions and close‑knit community life. Her Puerto Rican heritage infuses her daily rhythms with a love for music, dance,
    and colorful visual expression, and she was raised in a bilingual household that values storytelling and familial bonds. The island’s blend of Caribbean, Spanish, and African influences—evident in local
    festivals, cuisine, and oral traditions—shapes her appreciation for cultural diversity and her desire to celebrate and preserve these traditions through community‑focused art initiatives.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Community engagement and networking'', ''Informal event coordination'', ''Art appreciation and basic art history knowledge'', ''Social media content
    creation'', ''Creative problem solving'', ''Adaptability and flexible planning'']'
  hobbies: '[''Visiting galleries and street art sites'', ''Attending live music and dance events'', ''Participating in salsa and reggaetón dance workshops'', ''Photography and digital collage'', ''Reading
    contemporary fiction and nonfiction'', ''Cooking traditional Puerto Rican cuisine with modern variations'', ''Volunteering at community festivals'', ''Organizing group outings and social gatherings'']'
  career_goals: Belquis intends to turn her passion for art and community into a career by completing a degree in arts administration or cultural management within the next two years. She aspires to launch
    a community‑run cultural hub in Caguas that offers workshops, pop‑up exhibitions, and collaborative art projects, and to eventually secure a role as a cultural program coordinator for the municipal
    government, where she can shape public arts initiatives and foster inclusive cultural experiences.
