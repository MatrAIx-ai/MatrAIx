  hobbies: '[''Surfing'', ''Coastal hiking'', ''Nature photography'', ''Reading (science nonfiction, dental journals, history)'', ''Home brewing'', ''Gardening (vegetables and herbs)'', ''Grilling and cooking'',
    ''Volunteer dental clinics'']'
  career_goals: Joel aims to transform his modest Oceanside clinic into a technology‑forward family practice that offers comprehensive restorative, preventive, and cosmetic services. Over the next five
    years, he plans to obtain a fellowship in prosthodontics to deepen his expertise in smile design and implant restorations, and to become a board‑certified specialist. He also wants to establish a community
    oral‑health outreach program that provides free screenings and education at local schools and senior centers. In the longer term, Joel envisions opening a second satellite office in a nearby coastal
    town, allowing him to maintain a flexible schedule that accommodates his spontaneous nature while still delivering high‑quality care.
