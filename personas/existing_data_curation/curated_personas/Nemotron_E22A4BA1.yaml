personas:
  professional: Joel Powers, a board‑eligible general dentist, blends curiosity with practicality to master CAD/CAM crown design, composite restorations, and patient communication while navigating the spontaneous,
    low‑key rhythm of their Oceanside clinic, and they mentor dental students with the same hands‑on enthusiasm.
  sports: Joel Powers fuels their fitness with early‑morning surf sessions at Oceanside Pier, weekend hikes with the San Diego Coastal Hikers club, and they follow the San Diego Padres, San Diego Wave FC,
    and LA Galaxy, while maintaining a casual membership in the local Surf Club Oceanside.
  arts: Joel Powers expresses their creative side through DSLR photography inspired by David Doubilet, they curate a small collection of Jack Johnson vinyl records, and unwind with classic surf documentaries
    starring Gregory Peck, all of which color their appreciation for visual storytelling and mellow acoustic vibes.
  travel: Joel Powers favors spontaneous coastal getaways, planning last‑minute road trips to nearby La Jolla or weekend fly‑outs to Maui and Bali, yet they balance adventure with a modest budget that prioritizes
    surf‑friendly destinations and occasional family visits to their hometown.
  culinary: Joel Powers enjoys grilling marinated Pacific snapper with fresh rosemary and lemon, they brew small‑batch American pale ales flavored with citrus zest, and they cook zucchini‑and‑basil pesto
    pasta harvested from their own garden, showcasing a home‑cooking skill level that mingles competence with a love for experimentation.
  core: Joel Powers is a low‑key dentist who rides the waves at dawn, they brew craft ales at night, tend a modest garden, and balances meticulous clinic work with a spontaneous, occasionally disorganized
    lifestyle.
background:
  cultural: Joel was raised in a middle‑class family in the Greater San Diego area, with deep roots in the American Midwest that his parents brought to California. Growing up, he absorbed a blend of traditional
    Midwestern work ethic and the laid‑back, ocean‑centered culture of Southern California. He identifies with the mainstream American cultural calendar—celebrating holidays such as Thanksgiving, Fourth
    of July, and Christmas—while also participating in local coastal traditions like beach clean‑ups and community farmers’ markets. His white ethnic background places him within the broader Caucasian demographic
    of the region, and he is conscious of the diverse community around him, often seeking ways to respect and engage with the multicultural fabric of Oceanside through his professional outreach and personal
    interactions.
attributes:
  skills: '[''Restorative dentistry (composite, crowns)'', ''Preventive care and oral hygiene counseling'', ''Oral surgery (extractions, soft‑tissue procedures)'', ''Digital dentistry (CAD/CAM, intraoral
