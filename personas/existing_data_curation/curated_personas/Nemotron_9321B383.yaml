personas:
  professional: Brian Jones is a budding junior builder who transforms his love of LEGO and weekend DIY projects into early engineering concepts, excelling in structured group tasks with his school team
    and Boy Scouts, where they apply a practical mindset and reliability that make them a natural collaborator.
  sports: Brian Jones is a lively member of the Garrett County Youth Soccer Club, idolizing the Maryland Terrapins and DC United, and balances rigorous after‑school drills with weekend hikes, demonstrating
    they thrive on disciplined teamwork and fun‑loving dedication to staying active.
  arts: Brian Jones is a creative storyteller who blends his love of adventure novels like The Hardy Boys with the whimsical soundtracks of The LEGO Movie and The Wiggles, often reenacting scenes with his
    elaborate LEGO builds, illustrating they channel imagination into shared experiences.
  travel: Brian Jones enjoys road‑trip adventures with his family, favoring planned camping excursions to Shenandoah National Park and weekend museum visits in Washington D.C., while dreaming of a future
    family hike along the Appalachian Trail, showing they value structured exploration balanced with spontaneous wonder.
  culinary: Brian Jones loves helping in the garden and celebrates fresh harvests by crafting macaroni‑and‑cheese with garden‑grown tomatoes, savoring homemade apple pie at county fairs, and occasionally
    indulging in peanut‑butter‑banana sandwiches for after‑practice snacks, reflecting they find comfort in simple, home‑grown flavors.
  core: Brian Jones is a practical, sociable 10‑year‑old who builds intricate LEGO worlds, saves a portion of his allowance, battles seasonal allergies, and sometimes forgets to stretch after soccer, all
    while dreaming of hiking the Appalachian Trail, showing they balance discipline with curiosity.
background:
  cultural: Brian comes from a white, rural Mid‑Atlantic family with English and Irish ancestry. Growing up in Oakland, Garrett County, Maryland, he is part of a close‑knit community that values family
    gatherings, church participation, and local traditions such as county fairs and seasonal outdoor activities. His upbringing emphasizes respect for authority, community service, teamwork, and a strong
    connection to nature and the Appalachian landscape.
