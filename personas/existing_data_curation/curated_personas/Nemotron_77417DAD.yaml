  career_goals: Carol hopes to pursue a stable, community‑focused career. In the long term, she envisions becoming a high school teacher, preferably in English or social studies, so she can help students
    build solid foundations. She also contemplates a career in nursing, attracted by the practical, caring nature of the work. Short‑term, she aims to graduate high school with strong grades, earn a scholarship,
    and gain experience by volunteering at the local community health clinic or church youth programs.
