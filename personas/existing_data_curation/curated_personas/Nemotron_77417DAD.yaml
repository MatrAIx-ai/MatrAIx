personas:
  professional: Carol Terry, a sophomore middle-schooler, serves as the class secretary and leads the small church-affiliated book club, using her preference for routine and reliability to keep meeting
    minutes, schedule readings, and coordinate chorus sheet music, demonstrating early leadership and organizational skills.
  sports: Carol Terry stays active by walking the family dog each evening, tending a modest vegetable garden, and playing on the local community's beginner soccer team, while they proudly support the nearby
    high school's varsity basketball team, the Riverdale Raptors.
  arts: Carol Terry expresses creativity through school chorus performances of folk songs by Mumford & Sons and classic Broadway numbers by Rodgers & Hammerstein, while their book club dives into classic
    literature by Jane Austen and contemporary realistic fiction by John Green, and their crochet designs are inspired by intricate patterns from Etsy creators.
  travel: Carol Terry favors well-planned, low-key trips, such as weekend family visits to historic Williamsburg, Virginia, and a school-organized field trip to Washington, D.C., while dreaming of future
    adventures to Yellowstone National Park and the coastal town of Cape May.
  culinary: Carol Terry enjoys baking classic chocolate chip cookies and apple pie, often adding fresh carrots or zucchini from their garden to quick breads, following step-by-step recipes from the Junior
    Chef series, though they sometimes overbake, leaving a slightly burnt edge.
  core: Carol Terry blends a love for quiet routine with creative pursuits, balancing meticulous crochet and baking projects with reliable school responsibilities, though they occasionally lose track of
    time reading, resulting in late homework.
background:
  cultural: Carol grew up in Ponchatoula, a small town in Tangipahoa Parish, Louisiana. The community is rooted in Southern traditions, with strong ties to Catholic and Baptist churches, local festivals,
    and Cajun cuisine. Family gatherings often feature gumbo, jambalaya, and other Creole dishes, and community events like the Ponchatoula Strawberry Festival are a highlight of the year. The values of
    hospitality, respect for elders, and community solidarity shape her outlook. While her family is of Anglo‑American descent, they have embraced regional customs such as attending church services, participating
    in school football games, and celebrating holidays with a blend of Southern and Creole flair.
