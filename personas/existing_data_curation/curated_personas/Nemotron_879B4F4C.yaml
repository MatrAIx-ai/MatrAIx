  hobbies: '[''Fly fishing'', ''Woodworking'', ''Home brewing'', ''Reading local Wisconsin history'', ''Cycling on Kettle Moraine trails'', ''Community theater set construction'']'
  career_goals: Charles wants to grow his practice by opening a second office in the neighboring town of Elkhart Lake within the next five years, integrating digital dentistry workflows to reduce chair
    time and improve patient experience. He seeks certification in advanced cosmetic dentistry to expand his service offerings, such as veneers and smile design. To address his occasional disorganization
    and desire for more flexibility, he plans to hire a dedicated practice manager and adopt a more structured appointment scheduling system, allowing more time for family and personal pursuits. He also
    aims to increase his community involvement by leading quarterly free dental‑screening events, partnering with local schools for sealant programs, and eventually serving as a part‑time clinical instructor
    at the University of Wisconsin–Madison School of Dentistry.
