  career_goals: Angela hopes to advance within the restaurant industry by first becoming a shift supervisor and eventually a manager, leveraging her reliability and organizational talent. She plans to obtain
    a ServSafe certification and enroll in a community‑college hospitality program to broaden her knowledge of food‑service operations. In the longer term, she dreams of opening a small home‑based bakery
    or catering service that can serve her local community and provide a more predictable schedule. She also aims to secure a stable retirement fund, reduce financial stress, and maintain a balance that
    allows her to support her family while staying engaged in her church and community.
