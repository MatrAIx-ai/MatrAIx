personas:
  professional: Angela Ivey, a seasoned fast‑food crew member with expert cash‑handling and POS skills, leverages their methodical, reliable nature to keep shifts running smoothly, mentors new teammates
    with calm conflict‑de‑escalation, and meticulously tracks inventory and schedules as they pursue a shift‑supervisor role.
  sports: Angela Ivey enjoys leisurely walks on nearby nature trails with the Grace Fellowship Walking Club, follows the Nashville Predators and the Tennessee Titans on TV, and joins a seasonal community
    softball league with the Oak Grove Ladies, keeping themselves active while preferring low‑impact, predictable exercise that they find soothing.
  arts: Angela Ivey spends quiet evenings crocheting while listening to Dolly Parton and gospel legend Kirk Franklin, flips through Jane Austen romance novels, and occasionally attends a local community
    theater’s productions of classic plays, finding comfort in familiar melodies and timeless stories that they cherish.
  travel: Angela Ivey prefers short, well‑planned trips to nearby destinations like the Great Smoky Mountains and Charleston’s historic district, dreams of a modest weekend getaway to New Orleans for its
    cuisine, and hopes to someday explore Edinburgh, Scotland’s literary festivals, balancing travel with family responsibilities and a modest retirement budget that they carefully manage.
  culinary: Angela Ivey loves baking sourdough bread and apple‑cinnamon crumble pies using fresh vegetables from their garden, pairs their meals with homemade cornbread and collard greens, and is comfortable
    preparing classic Southern comfort dishes like chicken pot pie, while they also experiment with seasonal herbs like rosemary and thyme.
  core: Angela Ivey is a detail‑oriented, community‑focused baker‑in‑training who balances a love for orderly routine with a lingering worry that fuels both meticulous planning and occasional over‑cooking,
    a quirk they attribute to their need for predictability.
background:
  cultural: 'Angela is a white Southern American who was raised in a rural community in North Georgia’s Appalachian foothills. Her upbringing was steeped in traditional Southern values: close family ties,
    church involvement, and Southern hospitality. She grew up attending Baptist services, helping with potluck meals, and learning Appalachian crafts such as quilting. The local culture emphasizes modesty,
    hard work, and community support, all of which shape her cooperative and considerate nature. Her culinary preferences reflect Southern comfort food, and she values the quiet rhythms of small‑town life
    while maintaining a respect for the region’s heritage.'
