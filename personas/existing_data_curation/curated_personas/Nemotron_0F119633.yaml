personas:
  professional: Kirby Govoni is an aspiring cartoonist and LEGO city planner, turning backyard adventures into detailed sketchbooks and block constructions, thriving on the curiosity sparked by art fairs
    and museum workshops while often leaving pieces scattered across the living room because of a relaxed approach to organization.
  sports: Kirby Govoni dashes across the neighborhood park for impromptu soccer matches with friends, idolizes the Arkansas Razorbacks football team in the fall and cheers for the Arkansas Travelers baseball
    club in the summer, while also attending Fayetteville United youth soccer practices to improve dribbling, even though their soccer cleats are often mismatched from a habit of leaving them scattered
    after games.
  arts: Kirby Govoni fills sketchbooks with whimsical cartoons inspired by Mo Willems and Dr. Seuss, hums along to Raffi’s song Baby Beluga and folk tunes played at local community concerts, and eagerly
    participates in Saturday workshops at the Fayetteville Art Museum where they attempt to emulate the bright brushstrokes of Georgia O’Keeffe’s floral paintings.
  travel: Kirby Govoni loves spontaneous weekend trips to nearby Hot Springs for fishing and picnics, dreams of exploring Disneyland in Orlando, and enjoys the family’s annual spring camping adventure in
    the Ozark National Forest, preferring the freedom of open-air exploration over rigid itineraries.
  culinary: Kirby Govoni delights in the smoky flavor of barbecued chicken at community picnics, sips sweet tea from a tall glass, proudly helps mom whip up simple tuna melt sandwiches and fruit kebabs,
    yet often sneaks extra chocolate chips into cookie dough when they think no one is watching.
  core: Kirby Govoni is a curious, art-obsessed 7-year-old who builds sprawling LEGO metropolises while leaving a trail of scattered rocks, half-finished sketches, and occasional sweet-tea-stained mugs
    behind them, a testament to their boundless imagination and lovable disorganization.
background:
  cultural: Kirby grows up in Fayetteville, Arkansas, a community that blends Southern hospitality with a vibrant college‑town atmosphere due to the nearby University of Arkansas. His family celebrates
    familiar American holidays like Thanksgiving, Halloween, and the Fourth of July, often enjoying local traditions such as community picnics, neighborhood block parties, and occasional church gatherings.
    He is exposed to regional foods like barbecued chicken and sweet tea, and he experiences a mix of rural outdoor activities—like fishing in nearby ponds and exploring wooded trails—and cultural events
    like art fairs and museum workshops that foster his curiosity and appreciation for creativity.
