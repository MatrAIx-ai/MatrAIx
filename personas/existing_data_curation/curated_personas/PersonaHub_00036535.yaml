persona_description: A scientist specializing in environmental epidemiology, particularly in the study of heat-related mortality and its effects on vulnerable populations such as infants. He/she has conducted
  research on the association between extremely hot days and mortality, and has identified specific causes of death that are increased during heat waves. The scientist is based in Spain and is affiliated
  with institutions such as the Centre for Research in Environmental Epidemiology (CREAL), the Municipal Institute of Medical Research (IMIM-Hospital del Mar), the CIBER Epidemiología y Salud Pública (CIBERESP),
  and the Servei Meteorològic de Catalunya. He/she has published several studies on the topic and is likely to be involved in developing preventive policies to mitigate the effects of heat on mortality.
