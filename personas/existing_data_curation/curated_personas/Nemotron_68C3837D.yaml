    tight production conditions'']'
  hobbies: '[''Photography'', ''Sketching and drawing'', ''Visiting art galleries and street murals'', ''Cooking Southeast Asian dishes'', ''Listening to world and indie music'', ''Collecting vintage printing
    equipment'', ''Playing guitar'', ''Reading science-fiction novels'', ''Participating in community cultural festivals'', ''Practicing calligraphy'']'
  career_goals: Phu aims to advance from operator to pressroom supervisor and eventually to a production manager role, overseeing larger print projects and mentoring junior staff. He plans to earn certifications
    in advanced print technologies such as HP Indigo and EFI, and to deepen his knowledge of graphic design through part‑time coursework. Long‑term, he envisions opening a boutique print studio that blends
    modern printing techniques with Southeast Asian artistic motifs, offering custom art prints, posters, and culturally inspired merchandise. He also hopes to contribute to Omaha's growing creative community
    by collaborating with local artists and cultural organizations.
