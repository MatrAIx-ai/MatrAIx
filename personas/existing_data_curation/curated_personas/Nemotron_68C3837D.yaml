personas:
  professional: Phu Phan is a seasoned printing press operator who couples meticulous color‑calibration and pre‑press expertise with an artist’s eye for typography, often improvising workflow solutions
    on the fly despite a tendency to resist rigid scheduling and occasionally missing production deadlines.
  sports: Phu Phan joins the Omaha Striders running club for early‑morning jogs, plays pickup basketball at the community center on weekends, and roots for the Storm Chasers minor‑league baseball team and
    the Kansas City Chiefs football squad.
  arts: Phu Phan spends evenings wandering Omaha’s Riverfront District galleries, photographing urban textures in the style of Henri Cartier‑Bresson, practicing calligraphy inspired by traditional scripts,
    and listening to indie‑electronic mixes from Tame Impala while strumming a self‑taught guitar.
  travel: Phu Phan’s travel style blends spontaneous weekend road trips to the rolling plains of Kansas with carefully planned pilgrimages to Kyoto’s spring lantern festivals, a bucket‑list that also includes
    exploring the lantern‑lit alleys of Ho Chi Minh City and hunting street‑art murals in Berlin.
  culinary: Phu Phan’s culinary palate favors aromatic broth‑based pho, lemongrass‑marinated chicken, and crispy banh mi sandwiches, and they regularly experiment by infusing desserts with star‑anise caramel
    while crafting sauces with fish sauce, ginger, and fresh cilantro.
  core: Phu Phan is a 32‑year‑old print‑shop wizard who fuses a love for vintage presses, spontaneous creativity, and a disciplined work ethic, even if their desk sometimes looks like a controlled chaos
    of sketchbooks, coffee cups, and spare printer parts.
background:
  cultural: Phu is a first‑generation American of Southeast Asian (Vietnamese) heritage. Raised in a bilingual household in Omaha, he grew up celebrating Tet and other cultural festivals while also embracing
    Midwestern community values. His parents instilled a strong work ethic, respect for elders, and an appreciation for craftsmanship. The vibrant local Vietnamese community provides a network for cultural
    events, traditional cuisine, and language practice, all of which shape his identity. This blend of Southeast Asian traditions and Nebraskan influences fuels his love for art, community collaboration,
    and the desire to fuse cultural motifs into his professional work.
attributes:
  skills: '[''Offset press operation'', ''Digital printing workflow'', ''Color calibration and proofing'', ''Prepress file preparation (PDF, Adobe Illustrator, InDesign)'', ''Mechanical troubleshooting
