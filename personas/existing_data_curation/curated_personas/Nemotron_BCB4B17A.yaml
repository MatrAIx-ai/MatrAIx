personas:
  professional: Mercedes Jackson is a budding storyteller who spends afternoons crafting fantasy short stories in a journal and sketching comic‑style panels, channeling her curiosity and spontaneous nature
    into vivid world‑building that hints at a future career in creative writing or illustration.
  sports: Mercedes Jackson enjoys weekend games of youth soccer with the local Humble Rangers club and cheers for the Houston Astros and Houston Rockets, balancing her love for team spirit with a preference
    for small‑group play over crowded stadiums.
  arts: Mercedes Jackson is a comic‑inspired illustrator who fills sketchbooks with superhero mashups while listening to R&B legends like Beyoncé and gospel greats such as Kirk Franklin, and she showcases
    her talents in the school art club and the church’s youth choir.
  travel: Mercedes Jackson loves exploring local gems like Hermann Park, the Buffalo Bayou, and weekend trips to Galveston Beach, while daydreaming about future adventures to Orlando’s theme parks and the
    historic streets of New Orleans.
  culinary: Mercedes Jackson helps whip up collard greens and cornbread in the family kitchen, often seasoning with smoked paprika and butter, and she also enjoys crafting peanut butter‑banana sandwiches
    and experimenting with chocolate chip cookies.
  core: Mercedes Jackson is a curious, quiet creator who balances imaginative storytelling and sketching with spontaneous bursts of community kindness, all while juggling the occasional messy desk and a
    sweet tooth.
background:
  cultural: Mercedes comes from an African‑American family rooted in Houston’s vibrant Westside community. Her household blends Southern Texas traditions—such as enjoying barbecue, soul food, and seasonal
    festivals like Juneteenth—with the close‑knit support of the local Black church, which emphasizes service, music, and storytelling. Family gatherings often feature shared meals, oral histories, and
    conversations about the importance of education and community involvement. Growing up in a multicultural city, Mercedes is also exposed to the rich tapestry of cuisines, languages, and arts that characterize
    Houston, while her parents encourage pride in her Black heritage through celebrations, books by African‑American authors, and involvement in community outreach programs.
