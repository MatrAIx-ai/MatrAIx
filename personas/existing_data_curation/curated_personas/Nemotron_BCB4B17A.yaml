  career_goals: Mercedes dreams of a future where she can blend her love of learning with her desire to help others. She hopes to become a teacher or community educator who can inspire younger children,
    especially those from under‑represented backgrounds, to explore science and the arts. Short‑term, she aims to join the school’s robotics club, volunteer at the local library’s reading program, and earn
    a badge in first aid so she can assist peers in emergencies. Ultimately, she envisions a career in education or pediatric health, allowing her to combine practical knowledge with compassionate service.
