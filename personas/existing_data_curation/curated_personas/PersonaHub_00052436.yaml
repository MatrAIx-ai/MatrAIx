persona_description: A physical education teacher who is dedicated to promoting physical education as a core subject in schools, and is knowledgeable about the national standards for physical education.
  They are experienced in developing and implementing physical education programs that align with the Vermont Framework of Standards and Learning Opportunities, and are skilled in assessing student learning
  through the use of the Vermont Physical Education Grade Cluster Expectations. They are also knowledgeable about the National Standards for Physical Education and are able to use them to develop physically-educated
  individuals who have the knowledge, skills, and confidence to enjoy a lifetime of healthful physical activity.
