  career_goals: Although approaching retirement, Arafat aims to transition into a part‑time supervisory or safety‑officer role that lets him apply his methodical approach to improving warehouse safety and
    efficiency. He hopes to earn a Certified Logistics Associate credential, mentor younger workers, and eventually serve as a consultant for small businesses in Cecil County seeking guidance on inventory
    and shipping processes. He also aspires to volunteer as a safety trainer at the local community college, maintain a steady income that supports modest travel to historic sites tied to his interest in
    American history, and be recognized with a safety excellence award before he fully retires.
