  hobbies: '[''Hunting (deer, turkey)'', ''Fishing'', ''ATV trail riding'', ''DIY woodworking and home improvement'', ''Motorcycle rebuilding'', ''Playing tactical shooter video games'', ''Watching engineering
    and history documentaries'', ''Listening to classic rock and country music'', ''Participating in local basketball league'', ''Building custom PCs or streaming repair projects'']'
  career_goals: He aims to secure an apprenticeship or entry‑level position as an automotive technician at a local shop within the next year, enroll in a certified automotive service program at a community
    college to earn ASE certification, and eventually open his own garage specializing in off‑road vehicles and vintage trucks. In the longer term he plans to obtain a diesel‑mechanic certification to expand
    into fleet‑maintenance services for regional construction firms.
