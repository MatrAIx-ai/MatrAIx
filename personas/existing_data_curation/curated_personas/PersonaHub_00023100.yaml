persona_description: A United Nations official responsible for overseeing the implementation of the Education for All (EFA) global goals and ensuring that all children have access to quality education.
  They are a member of the United Nations Educational, Scientific and Cultural Organization (UNESCO) and have experience working on education policies, resource allocation, and teacher training programs.
  The persona is knowledgeable about the global teacher shortage, the importance of education in achieving development goals, and the need for continuous improvement in education systems. They are dedicated
  to ensuring that all children have access to education and are committed to promoting quality education for all.
