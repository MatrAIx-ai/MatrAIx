  hobbies: '[''Photography'', ''Visiting art galleries and street art tours'', ''Hiking in Allegheny County'', ''DIY home improvement experiments'', ''Reading science‑fiction'', ''Community gardening and
    sustainable landscaping'']'
  career_goals: Abigail aims to advance from a hands‑on maintenance role to a supervisory position in facilities management within the next five years. She plans to obtain certifications such as the Certified
    Maintenance & Reliability Professional (CMRP) and HVAC‑R licensing, and to deepen her knowledge of smart‑building technologies and sustainability practices. Long‑term, she hopes to lead a team that
    implements green retrofits for older Pittsburgh buildings, blending her technical expertise with her interest in innovative, environmentally conscious solutions. She also envisions eventually starting
    her own small contracting business that offers boutique repair services with a focus on artistic restoration projects for historic homes, satisfying both her competitive drive and her appreciation for
    aesthetics.
