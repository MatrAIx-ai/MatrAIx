personas:
  professional: Abigail Mohr, a facilities maintenance specialist who diagnoses HVAC failures with the same precision she applies to composing urban photographs, they leverage a methodical, detail‑oriented
    approach and competitive drive to pursue CMRP certification and aim for a supervisory role overseeing green retrofits in Pittsburgh’s historic buildings.
  sports: Abigail Mohr, an avid hiker who joins the Allegheny Trailblazers for weekend treks in the National Forest, they proudly support the Pittsburgh Steelers and Penguins, and squeeze in pickup basketball
    at the local community center to blend endurance with strength training.
  arts: Abigail Mohr, a dedicated patron of Pittsburgh’s Mattress Factory and Andy Warhol Museum, they capture street art by Shepard Fairey in their photography, draw inspiration from contemporary artists
    like Yayoi Kusama, and experiment with DIY home‑improvement projects that double as artistic installations.
  travel: Abigail Mohr, an adventurous yet budget‑conscious traveler who has explored Detroit’s industrial districts and Iceland’s coastal cliffs, they prefer planning trips around off‑season hikes in the
    Allegheny National Forest and dream of a creative retreat in the Basque Country to study vernacular architecture.
  culinary: Abigail Mohr, a moderately skilled home‑cook, they delight in preparing smoked salmon bagels with dill and capers, whipping up buckwheat pancakes for Sunday brunch, and experimenting with heirloom
    tomato gazpacho while pairing dishes with local craft IPA.
  core: Abigail Mohr blends a methodical maintenance mindset with a competitive eye for sustainable design, channeling curiosity into photography, green retrofits, and a disciplined yet occasional splurge
    on artistic passions.
background:
  cultural: Abigail was raised in a middle‑class family in the suburbs of Pittsburgh. Her paternal grandparents emigrated from Germany, and her maternal lineage traces back to Irish immigrants who settled
    in western Pennsylvania in the early 20th century. Growing up, she absorbed a blend of Germanic values of precision and craftsmanship with the Irish emphasis on community and storytelling. The region’s
    industrial heritage and strong labor‑union culture shaped her work ethic, while the city’s thriving arts scene—highlighted by museums, murals, and local music venues—nurtured her appreciation for creative
    expression. This mix of cultural influences informs her pragmatic yet inventive approach to both her profession and personal interests.
attributes:
  skills: '[''Plumbing repair and installation'', ''Electrical wiring and troubleshooting'', ''HVAC maintenance and diagnostics'', ''Carpentry and fixture installation'', ''Preventive maintenance planning'',
