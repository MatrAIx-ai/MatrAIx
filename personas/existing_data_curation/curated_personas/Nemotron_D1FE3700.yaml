  career_goals: He dreams of turning his love for video games and storytelling into a career as a game developer or interactive media creator, hoping to build games that blend fun with educational content.
    Paul also thinks about studying marine science later, attracted by Florida’s coastal ecosystems, but he wants a path that lets him keep flexibility to explore different interests. Over the next few
    years he aims to build a portfolio of small games and digital projects that could open doors to a tech‑focused high school program or an apprenticeship.
