personas:
  professional: Tamera Chumley drives the shop’s precision as a master diesel technician, leveraging their expertise in hydraulic systems, computer‑aided diagnostics, and welding while imposing rigorous
    safety checklists and lean workflow practices that reflect their disciplined, competitive nature.
  sports: Tamera Chumley dominates the co‑ed Eastpointe Softball League as a reliable shortstop, supplements the competitive edge with spin classes at Midtown Fitness and HIIT sessions at the local YMCA,
    and follows the Detroit Tigers and Detroit Lions fervently, while weekend hikes on Macomb County trails keep their stamina on point.
  arts: Tamera Chumley fuels their creative side by curating a rotating playlist of classic rock icons like AC DC and Stevie Ray Vaughan for the shop, attending the annual Michigan Automotive Museum’s art
    showcase, and volunteering at the Eastpointe Summer Festival where they help stage local folk bands such as The Harvest Echoes.
  travel: Tamera Chumley plans trips with the precision of a service schedule, favoring road trips that combine automotive pilgrimages—such as the 2022 Detroit Auto Show and a test‑drive tour of the Ford
    Plant in Dearborn—with outdoor escapes to places like Mackinac Island and the Great Smoky Mountains, while budgeting each journey to preserve capital for the upcoming mobile business launch.
  culinary: Tamera Chumley wields a smoker like a precision tool, perfecting a Kansas City‑style brisket rub that blends smoked paprika, coffee grounds, brown sugar, and mustard powder, while also mastering
    classic pierogi stuffed with potato and cheese for family gatherings, and they never miss a chance to pair the meat with a cold Bud Light after a long day in the garage.
  core: Tamera Chumley is a methodical diesel ace who balances shop leadership with a lively social streak, channeling competitive precision into every bolt, budget, and BBQ session.
background:
  cultural: Tamera grew up in Eastpointe, a working‑class suburb bordering Detroit, where the automotive industry shaped the community’s identity. Her family, with roots in German and Polish immigrant families
    that settled in the region after World War II, emphasized punctuality, practical problem‑solving, and a strong work ethic. The Midwest’s reputation for reliability and straightforward communication
    is reflected in her disciplined approach to mechanics and her preference for clear, structured processes. She is an active participant in local traditions such as the Eastpointe Summer Festival and
    proudly supports the Detroit Tigers, reflecting her connection to the broader cultural fabric of southeastern Michigan.
attributes:
  skills: '[''diesel engine repair'', ''hydraulic system maintenance'', ''electrical system diagnostics'', ''computer‑aided diagnostic software'', ''preventive maintenance planning'', ''equipment installation'',
    ''welding and fabricating'', ''brake and transmission service'', ''inventory and parts management'', ''apprentice training and team leadership'']'
  hobbies: '[''co‑ed softball league'', ''group fitness/spin classes'', ''classic car restoration'', ''automotive meet‑ups and motor shows'', ''hiking in Macomb County parks'', ''volunteering at charity
    bike rides'', ''DIY home improvement projects'', ''BBQ cooking and food experimentation'', ''community social events'']'
  career_goals: Tamera aims to become a certified Master Diesel Technician through ASE and obtain advanced certifications in heavy equipment hydraulics. Within the next five years she plans to advance to
    shop supervisor, overseeing a team of mechanics and implementing lean workflow practices. Ultimately she envisions opening her own mobile equipment repair business that specializes in custom performance
    upgrades for trucks and offers a mentorship program to attract more women into the trade. She also hopes to qualify as a field service specialist for a major fleet operator, allowing her to travel regionally
    while applying her problem‑solving skills to complex fleet maintenance challenges.
