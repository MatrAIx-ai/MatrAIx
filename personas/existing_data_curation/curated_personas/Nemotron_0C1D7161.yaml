  career_goals: Travis enjoys imagining future roles and often says he wants to be a firefighter who helps people, an astronaut who explores space, or an artist who paints big pictures. His current ambition
    is to keep learning new things, make friends, and explore the world around him so he can grow into the career he dreams of when he is older.
