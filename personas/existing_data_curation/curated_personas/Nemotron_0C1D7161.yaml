personas:
  professional: Travis Morant, an aspiring architect of the living room, transforms couch cushions into towering forts with a spontaneous, unstructured creativity that rallies their playmates into collaborative
    building projects, and they delight in the chaos of a planless construction despite their resistance to any preset schedule.
  sports: Travis Morant, an energetic three‑year‑old who loves the local Sunnybrook Tots Soccer Club’s mini‑field, frequently darts after a bright orange ball, cheers for the Chicago Cubs on TV, delights
    in spontaneous tag games at the neighborhood playground, and they proudly wear a tiny Cubs cap during practice.
  arts: Travis Morant, a budding little artist, spends evenings wielding Crayola crayons to create vivid abstract doodles, sings along to The Wiggles, regularly visits the children’s museum to explore interactive
    light installations, and they eagerly share their drawings with anyone who stops by.
  travel: Travis Morant, an inquisitive wanderer, relishes family road trips to the seaside and the nearby botanical garden, prefers the spontaneity of stroller‑led discoveries over rigid itineraries, dreams
    of one day seeing the Eiffel Tower’s sparkling lights, and they love pointing out passing clouds that look like animals.
  culinary: Travis Morant, a selective but curious eater, delights in cheesy macaroni, strawberry slices, occasionally experiments with hummus and pita, staunchly refuses green beans unless they’re presented
    as ‘dinosaur trees’, and they proudly declare their love for the cheesy sauce.
  core: Travis Morant, a remarkably calm and curious three‑year‑old, blends spontaneous leadership with a love for art, play, and simple culinary adventures, yet sometimes stubbornly resists structured
    routines, and they always greet new friends with a bright smile.
background:
  cultural: Travis is raised in a Black American family that blends Southern cultural traditions with Midwestern Ohio life. His household celebrates milestones with gospel music, soul food, and community
    gatherings at a local church that emphasizes resilience and togetherness. Growing up in Lebanon, Ohio, he experiences a quiet suburban environment, participates in community events like park festivals,
    and benefits from the inclusive atmosphere of his neighborhood, which nurtures his sociable and calm personality.
