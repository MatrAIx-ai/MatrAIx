persona_description: A scientist who specializes in the study of infectious diseases, particularly those affecting amphibians, and has conducted research on the chytrid fungus, Batrachochytrium dendrobatidis.
  Her research interests include the impact of climate change on amphibian populations and the development of strategies to control and prevent the spread of the disease. She has published her findings
  in leading scientific journals and has been awarded several grants for her research.
