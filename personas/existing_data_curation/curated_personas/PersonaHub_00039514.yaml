persona_description: A researcher or scientist who studies bone health and the effects of menopause on women's health. They are interested in the impact of menopause on bone density and fracture risk, particularly
  in women who have had an early menopause due to a hysterectomy and subsequently take hormone replacement therapy (HRT) to mitigate the low oestrogen levels at menopause. They may be looking for ways to
  prevent osteoporosis and fractures in this population.
