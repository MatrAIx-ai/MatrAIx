persona_description: A public health expert who advocates for HIV prevention and treatment programs in marginalized communities, particularly among black and Hispanic populations. She believes in using
  culturally appropriate methods to address the stigma associated with HIV and increase awareness and testing rates. Her work has been successful in implementing targeted outreach efforts in New York City
  and other cities, and she is eager to expand her work to other areas where HIV rates are rising due to stigma and lack of access to care.
