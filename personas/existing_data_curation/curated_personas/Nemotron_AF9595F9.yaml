  career_goals: Thu aims to earn a Bachelor of Science in Nursing within the next two years and transition into a charge nurse role, eventually moving toward a nurse manager position where she can shape
    unit policies and mentor staff. She is also interested in pursuing a Nurse Practitioner certification to expand her clinical scope, and she hopes to develop a community health program that addresses
    the specific needs of East Asian immigrant populations in Delaware.
