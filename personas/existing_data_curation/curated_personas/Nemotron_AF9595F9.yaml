personas:
  professional: Thu Xiong, a 32-year-old registered nurse in Delaware, leverages razor-sharp clinical assessment and rapid decision-making in emergency rooms while channeling her competitive drive and love
    of structure into leading quality-improvement projects and mentoring junior staff, even as her spontaneous side sometimes clashes with rigid protocols.
  sports: Thu Xiong fuels her fitness routine with high-energy Zumba classes, weekly K-pop dance workshops, and weekend hikes in Delaware's state parks, while cheering on the Philadelphia Eagles, supporting
    the Philadelphia 76ers, and playing recreational volleyball at a local community center.
  arts: Thu Xiong's artistic side shines during karaoke nights where she belts out BTS and BLACKPINK hits, indulges in contemporary fiction by authors like Sally Rooney and Haruki Murakami, and attends
    local theater productions featuring works by Lin-Manuel Miranda.
  travel: Thu Xiong prefers spontaneous weekend getaways to scenic spots like Shenandoah National Park and occasionally plans longer trips to cultural hubs such as Seoul for K-pop festivals and San Francisco's
    Chinatown Lunar New Year celebrations, using credit-card travel points to stretch her budget.
  culinary: Thu Xiong delights friends with homemade kimchi, bibimbap, and steamed dumplings seasoned with gochujang, soy sauce, and sesame oil, yet often forgets to clean the kitchen promptly after cooking
    marathons.
  core: Thu Xiong is a dynamic, detail-oriented nurse who balances a love for structured leadership with spontaneous social energy, constantly juggling professional ambition, lively group activities, and
    a kitchen full of aromatic Asian flavors.
background:
  cultural: Thu is a second‑generation East Asian American, raised in a bilingual household where Mandarin and English were spoken. Her family places a high value on education, hard work, and respect for
    elders, traditions that have shaped her disciplined yet adaptable approach to nursing. She actively participates in Wilmington's Asian community events, celebrates Lunar New Year with family gatherings,
    and maintains ties to her cultural heritage through cooking, language practice, and volunteering with local cultural organizations.
