  career_goals: Although retired, Luis aims to stay physically active, maintain his independence, and continue contributing to his community by mentoring younger volunteers, preserving Colombian cultural
    traditions through storytelling and cooking classes, and possibly compiling a memoir of his life experiences. He also hopes to travel back to Colombia for a family reunion if his health permits.
