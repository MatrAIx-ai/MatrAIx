personas:
  professional: Tyrone Bastidas, a seasoned mechanical and facilities engineer with four decades of experience, utilizes AutoCAD drafting, OSHA safety expertise, and meticulous budgeting to lead small multidisciplinary
    teams on HVAC upgrades for schools and municipal buildings, and they bring a calm, organized, and methodical mindset that makes them a trusted troubleshooter and mentor to junior technicians.
  sports: Tyrone Bastidas stays active by walking his vegetable garden, playing 9‑hole rounds of golf at the Sun Valley Senior Golf Club with friends, cheering on the New York Yankees during baseball season
    and the Dallas Cowboys in the fall, and they reserve Saturdays for quiet fishing excursions that serve as low‑impact cardio and mental refresh.
  arts: Tyrone Bastidas nurtures his artistic side through a love of classic rock—especially the Beatles and Bruce Springsteen—listening to John Williams film scores while sanding wood, attending community
    theater productions of Arthur Miller’s Death of a Salesman, and they regularly read biographies of engineers and architects like Nikola Tesla and Frank Lloyd Wright, blending creative appreciation with
    professional inspiration.
  travel: Tyrone Bastidas prefers meticulously planned road trips that blend scenic drives with fishing stops—such as his annual July getaway to Lake Tahoe’s shore, a spring visit to Napa Valley’s vineyards,
    and a recent detour through the Great Smoky Mountains—and they dream of a future pilgrimage to the Scottish Highlands to explore historic woodworking traditions.
  culinary: Tyrone Bastidas enjoys farm‑to‑table cooking, often preparing roasted chicken with rosemary, fresh garden tomatoes, and sweet corn succotash, while their woodworking bench doubles as a prep
    station for homemade sourdough and a hearty beef stew seasoned with bay leaves, and they occasionally treat themselves to fried catfish tacos after a long day of mentoring.
  core: Tyrone Bastidas is a meticulous engineer‑mentor who balances precise model‑train layouts and quiet fishing with a habit of over‑booking volunteer commitments, and they often forget to water their
    own garden until the last minute.
background:
  cultural: Born in the 1950s in central Florida, Tyrone grew up in a close‑knit African‑American neighborhood where the church, gospel music, and family gatherings were central to daily life. His family’s
    roots include Afro‑Caribbean ancestors, giving him a familiar appreciation for Spanish family names and occasional Caribbean culinary traditions. He carries the values of resilience, respect, and community
    service shaped by the civil‑rights era, and he honors his heritage through participation in local Juneteenth celebrations, church potlucks, and by sharing soul‑food recipes that blend Southern and Caribbean
    flavors.
