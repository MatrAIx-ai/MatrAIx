  hobbies: '[''Drawing and coloring'', ''Duplo block building'', ''Storytime books'', ''Backyard nature exploration'', ''Pretend superhero/scientist play'', ''Simple puzzles'', ''Cartoon shows'']'
  career_goals: Ernest often talks about becoming an artist who can create beautiful pictures, an inventor who builds cool gadgets, or an astronaut who explores space. He imagines designing his own drawings
    that come to life and dreams of one day helping people understand how things work.
