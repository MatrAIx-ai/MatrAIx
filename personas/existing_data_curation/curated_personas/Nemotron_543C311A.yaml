personas:
  professional: Alexis Hoover, a 43-year-old educator, harnesses a structured, goal‑focused approach and an outgoing demeanor to lead curriculum design, run teacher workshops, and coordinate community education
    events, turning their competitive streak into measurable student‑performance gains while keeping a healthy skepticism about untested reforms.
  sports: Alexis Hoover stays active by hiking the Texas Hill Country with the Hill Country Trailblazers Hiking Club, joining a weekly line‑dancing class, competing in local 5K charity runs, and cheering
    for the San Antonio Spurs and the Texas Rangers, all while maintaining a pragmatic training routine that mixes endurance walks with occasional strength‑training sessions.
  arts: Alexis Hoover enriches their sociable spirit by leading a book club that discusses works from Margaret Atwood to Hermann Hesse, attending performances at the New Braunfels Musical Theatre, and listening
    to a blend of German folk music and classic rock artists like Bob Dylan and Norah Jones, weaving cultural appreciation into their personal and community life.
  travel: Alexis Hoover plans trips with spreadsheet precision, favoring weekend escapes to Austin, San Antonio, and the German‑influenced town of Fredericksburg, dreaming of a future hiking adventure in
    the Bavarian Alps while balancing travel costs against their master’s program tuition and family commitments.
  culinary: Alexis Hoover enjoys experimenting with traditional German dishes such as schnitzel, sauerbraten, and pretzel‑crusted chicken, complemented by Texan flavors like smoked brisket and pecan‑infused
    desserts, cooking at an intermediate skill level while sourcing fresh rosemary and thyme from their garden and occasionally overindulging in late‑night pretzel bites.
  core: Alexis Hoover, a structured yet sociable 43‑year‑old educator, blends competitive drive with community spirit, thriving on organized chaos, German‑Texan traditions, and a pragmatic approach to life.
background:
  cultural: Alexis is a white American raised in New Braunfels, a city steeped in German heritage. Her family has celebrated traditions such as Oktoberfest and Wurstfest for generations, often speaking
    a few phrases of German at home and maintaining recipes passed down from ancestors. This blend of Southern hospitality and German precision informs her structured yet personable approach to life. She
    identifies with the community's emphasis on family, church involvement, and civic participation, and she frequently attends local festivals, church gatherings, and neighborhood potlucks that reinforce
    her sense of belonging.
attributes:
  skills: '["Lesson Planning", "Curriculum Development", "Classroom Management", "Public Speaking", "Event Coordination", "Community Outreach", "Project Management", "Conflict Resolution", "Technology Integration
