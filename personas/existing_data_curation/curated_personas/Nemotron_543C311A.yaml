  hobbies: '["Book Club Leadership", "Community Event Volunteering", "Hiking in Hill Country", "Gardening", "Cooking (German cuisine)", "Yoga", "Line Dancing", "Trivia Competitions", "Charity Runs"]'
  career_goals: Alexis aims to re‑enter the education sector in a leadership capacity, such as a curriculum specialist for the Comal County school district or director of a community education program.
    She is considering launching a part‑time tutoring and educational consulting business that offers structured academic support and parent workshops. To solidify her expertise, she plans to pursue a master's
    degree in Educational Leadership within the next two years. Ultimately, she hopes to serve on the local school board, using her organizational acumen and competitive spirit to influence policy, improve
    instructional quality, and expand lifelong‑learning opportunities for residents of New Braunfels.
