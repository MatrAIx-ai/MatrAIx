personas:
  professional: David Stophel is a data‑driven farm technologist who blends hands‑on mechanical skill with precision‑ag analytics to extract maximum yields, and their competitive, solitary nature pushes
    them to out‑perform neighboring farms while meticulously documenting every variable.
  sports: David Stophel’s athletic interests revolve around low‑key activities such as target shooting at the local range, seasonal hunting trips, and early‑morning runs along the fields, while they root
    for the Iowa State Cyclones football team, follow the Des Moines Men’s Basketball, and occasionally watch the Chicago Cubs for a communal outlet.
  arts: David Stophel finds creative respite in the folk storytelling of John Denver and Bob Dylan, the historical nonfiction of Laura Hillenbrand, and classic western films starring John Wayne, they often
    listen to these artists while woodworking in their workshop, letting the narratives shape their approach to both craft and farming.
  travel: David Stophel’s travel style is purposeful yet modest, favoring agricultural‑themed trips such as a vineyard tour in Tuscany, a farm‑exchange program on New Zealand’s South Island, and a planned
    road trip to historic grain silos in the United Kingdom, they balance these adventures against a tight budget and a desire to stay close to family.
  culinary: David Stophel’s culinary preferences center on hearty Midwestern fare like corn chowder, smoked venison stew, and butter‑rich cornbread made with heirloom sweet corn, they possess intermediate
    cooking skills and enjoy experimenting with farm‑fresh ingredients while occasionally treating themselves to a steakhouse meal after a successful harvest.
  core: David Stophel is a solitary, data‑obsessed farm technician whose relentless quest for yield perfection is balanced by a coffee‑fueled habit of late‑night woodworking and an unshakable aversion to
    small talk.
background:
  cultural: David comes from a multi‑generational farming family in central Missouri, with roots tracing back to German and Irish immigrants who settled the region in the late 1800s. He grew up in Holden,
    a small town where community events like county fairs, church gatherings, and Fourth of July celebrations are central. The cultural fabric of his upbringing emphasizes self‑reliance, hard work, respect
    for the land, and modesty. Although he values privacy and solitude, he still upholds the Midwestern ethic of dependability and neighborly assistance, especially during planting and harvest seasons.
    He celebrates traditional holidays such as Thanksgiving and Christmas and maintains a connection to the local Lutheran church, reflecting the region’s Protestant heritage.
