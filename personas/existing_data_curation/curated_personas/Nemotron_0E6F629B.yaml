  hobbies: '[''Golf'', ''Sailing'', ''Community theater volunteering'', ''Genealogy research'', ''Gardening'', ''Barbecue cooking'', ''Rotary Club activities'']'
  career_goals: Randy aims to become senior partner at his firm, using the position to expand the firm’s pro bono program for low‑income residents of Berrien County. He envisions establishing a community
    legal aid clinic that blends his practical skills with his curiosity about new service models. Over the next five years, he plans to publish a book on legal ethics that bridges theory and real‑world
    practice, while continuing to mentor the next generation of lawyers and eventually transitioning to a part‑time counsel role to devote more time to civic engagement.
