  hobbies: '["Cooking traditional dishes", "Gardening", "Attending church and cultural events", "Listening to merengue and bachata", "Walking with her dog", "Crossword puzzles", "Reading historical novels",
    "Senior book club"]'
  career_goals: Maribel’s primary ambition is to stay active and independent while giving back to her community. She hopes to volunteer regularly at the local senior center, lead a cooking class that shares
    Dominican culinary traditions, and mentor younger Dominican-American families about navigating life in New Jersey. She also wishes to travel back to the Dominican Republic to visit her grandchildren
    and document family recipes in a small cookbook she plans to self-publish.
