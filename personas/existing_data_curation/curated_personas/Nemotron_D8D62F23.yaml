personas:
  professional: Maribel Nevarez is a seasoned community volunteer and part‑time caregiver who leverages bilingual translation skills, strong household management, and a passion for sharing heritage culinary
    traditions to lead cooking workshops and mentor younger families in New Jersey, balancing a structured approach to program planning with a relaxed, adaptable style.
  sports: Maribel Nevarez enjoys strolling her golden retriever through the neighborhood park and participates in a senior walking club that meets after Sunday mass, occasionally cheering for the New York
    Giants and the New Jersey Devils while attending community softball games at the local recreation center during spring.
  arts: Maribel Nevarez immerses herself in the rhythms of merengue and bachata, often dancing to Juan Luis Guerra and Romeo Santos at parish celebrations, while also savoring historical novels by Hilary
    Mantel and attending occasional performances by the New Jersey Repertory Theatre, a blend that enriches her cultural identity.
  travel: Maribel Nevarez favors well‑planned yet flexible trips, preferring short flights to family in the Dominican Republic for weekend reunions and leisurely tours of historic Old San Juan, while dreaming
    of a relaxed cultural cruise through the Caribbean islands, balancing budget constraints with a desire for meaningful family connections.
  culinary: Maribel Nevarez expertly prepares traditional dishes such as sancocho, mangú, and pastelitos, adapting recipes with locally sourced plantains, yuca, and sofrito, and delights in hosting dinner
    gatherings where she showcases her skillful blend of heritage flavors and modern twists on classic meals.
  core: Maribel Nevarez is a practical yet easy‑going senior who balances a love of cooking, community service, and crossword puzzles with occasional bouts of forgetfulness and a soft spot for spontaneous
    music dancing.
background:
  cultural: Maribel was born in the Dominican Republic and moved to the United States in her early thirties. She retains a strong Dominican identity, speaking Spanish at home, celebrating holidays such
    as Día de la Independencia (February 27) and Semana Santa, and preserving culinary traditions. In Caldwell, New Jersey, she participates in the local Dominican diaspora community, attending church services,
    community festivals, and sharing food and stories with neighbors. Her Catholic faith, close-knit family values, and love of music and dance are central to her cultural expression.
attributes:
  skills: '["Traditional Dominican cooking", "Bilingual Spanish-English communication", "Household budgeting and organization", "Basic first aid and caregiving", "Smartphone and video-call technology usage",
