personas:
  professional: Reinaldo Gonzalez, a budding junior LEGO architect, channels boundless curiosity and practical problem‑solving to design elaborate brick creations while balancing the need for order with
    the joy of spontaneous building.
  sports: Reinaldo Gonzalez, an energetic member of the local Little Rockets youth soccer club, idolizes the city’s professional team River City FC and spends weekend afternoons sprinting across the park,
    supplementing soccer with karate classes at the neighborhood dojo to stay agile.
  arts: Reinaldo Gonzalez, an enthusiastic drawer of bright rockets and dinosaurs, spends afternoons flipping through picture books by Dr. Seuss, mimicking the playful melodies of The Wiggles, and watching
    kid‑friendly science shows hosted by Bill Nye.
  travel: Reinaldo Gonzalez, a curious explorer who loves backyard bug hunts, has visited a nearby state park and the family’s beachside resort, and dreams of a future trip to the Kennedy Space Center to
    see real rockets up close.
  culinary: Reinaldo Gonzalez, a kitchen assistant who skillfully rolls tortillas and helps pack tamale fillings, delights in tacos topped with salsa, cheese, and avocado, and can proudly name their favorite
    dish, a cheesy quesadilla with jalapeño bits.
  core: Reinaldo Gonzalez, a lively six‑year‑old whose boundless curiosity fuels LEGO masterpieces, soccer sprees, and taco‑making, yet whose intense emotions can turn a missed LEGO piece into a dramatic
    crisis.
background:
  cultural: Reinaldo is raised in a Mexican‑American household in Santa Rosa, California. Spanish is spoken at home, and he participates in family celebrations such as Día de los Muertos, Cinco de Mayo,
    and traditional Christmas posadas. He enjoys Mexican foods like tacos, tamales, and churros, listens to mariachi and regional music, and learns about Mexican history and folklore from his grandparents.
    At school he blends his Mexican heritage with the multicultural environment of the Bay Area, navigating both cultures with ease.
