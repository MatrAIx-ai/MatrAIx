  hobbies: '[''soccer'', ''LEGO building'', ''drawing'', ''storytime books'', ''nature walks and bug hunting'', ''cooking with family'', ''rock collecting'', ''watching science videos'']'
  career_goals: Reinaldo dreams of becoming an astronaut because he loves exploring space and learning how things function, but he also talks about wanting to be a firefighter to help and protect his community.
    He aspires to excel in science at school, lead group projects, and one day combine his love of discovery with a career that lets him serve others.
