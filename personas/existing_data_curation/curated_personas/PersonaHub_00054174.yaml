persona_description: A scientist or researcher who is interested in the genetic architecture underlying developmental stability and has expertise in quantitative genetics and evolutionary biology. They
  are likely to be familiar with the concepts of developmental noise and the use of fluctuating asymmetry as a measure of developmental stability. They may also have experience with deficiency mapping and
  the use of genome-wide association studies to identify genetic regions associated with developmental traits. They are interested in understanding the mechanisms that control fluctuating asymmetry and
  the potential existence of trait-specific and trait-nonspecific mechanisms for stabilizing developmental processes.
