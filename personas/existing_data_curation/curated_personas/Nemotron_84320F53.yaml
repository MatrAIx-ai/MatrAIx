  hobbies: '[''Reading science-fiction novels'', ''Solo hiking in Pine Barrens'', ''Nature photography'', ''Scratch and Python coding projects'', ''LEGO Technic and scale model building'', ''Creative writing
    and journaling'', ''Watching documentaries on technology and wildlife'', ''Quiet piano practice'']'
  career_goals: John aims to combine his love for technology and the natural world in a future career. He envisions becoming a software engineer or data analyst who designs tools for environmental monitoring,
    such as apps that let users log wildlife sightings and help conservationists track ecosystem changes. He is also intrigued by the idea of working as a wildlife biologist who uses drones, sensors, and
    data analytics to study habitats. In the short term, he plans to win his school's science fair with a project that uses a simple Arduino temperature sensor to record microclimate data in the Pine Barrens,
    and he hopes to secure a mentorship with the local community college's robotics program to deepen his programming and hardware skills.
