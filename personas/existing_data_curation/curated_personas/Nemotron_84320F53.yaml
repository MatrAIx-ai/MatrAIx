personas:
  professional: John Shaw is a budding programmer who builds Scratch games and tinkers with Python scripts, channeling their curiosity and practicality into functional projects while thriving in solitary,
    quiet environments, and their assertive yet cooperative nature shines when troubleshooting code with peers online.
  sports: John Shaw is a solo hiker who explores the Pine Barrens each weekend, a member of the local youth hiking club, and while they cheer for the New York Mets and follow the New Jersey Devils on television,
    they prefer the quiet of the trail over organized team sports, using a wearable fitness tracker to log steps and elevation gains.
  arts: John Shaw is an avid reader of sci‑fi authors like Liu Cixin and a budding writer of short stories, a piano enthusiast who practices Debussy’s 'Clair de Lune', and a fan of documentary filmmakers
    such as David Attenborough, often drawing inspiration from their favorite artists—like the LEGO Technic design of the Ferrari 488—to fuel their creative projects.
  travel: John Shaw dreams of trekking in Iceland’s volcanic landscapes after exploring the local Pine Barrens, has visited Washington D.C.’s National Museum of Natural History on a school trip, and they
    prefer low‑key, spontaneous getaways with a packed backpack over meticulously planned vacations, balancing a limited allowance with a love for nature photography.
  culinary: John Shaw enjoys cooking simple meals like spaghetti carbonara with pancetta and parmesan, experiments with making homemade trail mix using almonds, dried cranberries, and dark chocolate, and
    indulges in classic teenage favorites like pepperoni pizza, yet they often skip breakfast, relying on a quick banana before school.
  core: John Shaw is a curious, solitary teen who merges a love for code, nature, and building into quiet, hands‑on projects, while they occasionally battle a disorganized schedule and late‑night snack
    cravings.
background:
  cultural: John is a white American growing up in the suburban community of Jackson, New Jersey, in Monmouth County. His family reflects typical middle-class values of the Mid-Atlantic region, emphasizing
    education, community involvement, and a balanced lifestyle. The area's proximity to the forested Pine Barrens and the cultural hub of New York City gives him access to outdoor recreation and occasional
    exposure to broader cultural events. He participates in his public middle school's robotics club and attends local community activities such as summer fairs and library reading programs. Local traditions
    such as seasonal festivals, backyard barbecues, and school sports culture shape his social environment, though John's introverted nature leads him to seek quieter, solitary pursuits within this setting.
attributes:
  skills: '[''Python programming (basic)'', ''Scratch visual coding'', ''Digital video editing (iMovie)'', ''Online research and information synthesis'', ''Logic puzzle solving'', ''Model building (LEGO
