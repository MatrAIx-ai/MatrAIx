  career_goals: Rut aims to advance within the call‑center hierarchy by obtaining a team lead position within the next two years, where she can mentor new agents and help refine call scripts. She plans
    to enroll in a part‑time associate’s program in Business Administration to deepen her understanding of sales strategy and marketing. Long‑term, Rut envisions transitioning into a client success or account
    management role that offers greater autonomy and the ability to build deeper relationships with key customers, while still allowing the flexible schedule she values for her family responsibilities.
