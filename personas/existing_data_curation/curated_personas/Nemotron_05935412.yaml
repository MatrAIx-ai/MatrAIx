  hobbies: '[''Hiking in Cleveland National Forest'', ''Cooking Mexican cuisine'', ''Salsa dancing'', ''Reading leadership and psychology non‑fiction'', ''Volunteering at bilingual community programs'',
    ''Watching Los Angeles Dodgers games'', ''DIY home improvement projects'']'
  career_goals: Juan aims to advance to a senior HR specialist role within the next three years, focusing on talent acquisition and employee engagement strategy. He plans to obtain the SHRM‑CP certification
    and deepen his expertise in HR analytics to influence strategic decisions. Long‑term, he envisions stepping into an HR manager position where he can lead diversity and inclusion initiatives that reflect
    his Mexican heritage and foster a supportive workplace culture for a multicultural workforce.
