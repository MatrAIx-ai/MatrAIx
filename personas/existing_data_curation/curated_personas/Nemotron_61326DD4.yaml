  career_goals: Angela dreams of becoming a veterinarian or marine biologist, hoping to care for animals and study ocean life. She also envisions herself as a teacher who can share her love of science and
    language. Her goals include maintaining high grades, developing practical skills like coding and teamwork, and staying involved in community projects, reflecting her blend of curiosity and practicality.
