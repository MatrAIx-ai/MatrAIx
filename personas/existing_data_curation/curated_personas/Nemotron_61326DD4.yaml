personas:
  professional: Angela Sarmiento is a budding young engineer who channels curiosity and practicality into science fair projects, LEGO constructions, and Scratch coding, while balancing organization with
    the spontaneous energy of after-school soccer and dance.
  sports: Angela Sarmiento thrills on the soccer field with her local youth league team, proudly sports the jersey of Orlando City SC, balances athleticism with rhythmic salsa and merengue classes at the
    community center, and cheers for the Tampa Bay Rays during baseball season.
  arts: Angela Sarmiento channels her energetic personality into drawing comic strips inspired by adventure heroes like Tintin, reading graphic novels by Alex Ross, listening to the lively beats of salsa
    legends such as Celia Cruz, and practicing dance steps to traditional bomba and plena rhythms at family gatherings.
  travel: Angela Sarmiento loves weekend adventures exploring the nearby Hillsborough River trail, dreams of wandering the historic streets of San Juan, and hopes to experience the magic of Orlando's theme
    parks, planning trips with a mix of family guidance and her own vivid imagination.
  culinary: Angela Sarmiento enjoys helping prepare classic dishes like arroz con gandules and flan, proudly mixes ingredients such as sofrito, plantains, and coconut milk, experiments with mango-lime smoothies
    after school, and often forgets to clean the kitchen before rushing back to homework.
  core: Angela Sarmiento is a bright, socially charged 10-year-old who blends curiosity, organized creativity, and a love for soccer, dance, comics, and family traditions into a lively, sometimes messy,
    but always enthusiastic outlook on life.
background:
  cultural: Angela is raised in a bilingual Puerto Rican household in Valrico, Florida. Her parents, who immigrated from Puerto Rico, keep cultural traditions alive through music, dance, food, and speaking
    Spanish at home. She celebrates holidays such as Three Kings Day and Noche Buena, enjoys bomba, plena, and salsa music, and learns to cook classic dishes like arroz con gandules and flan. The blend
    of her Puerto Rican heritage and the diverse community of Hillsborough County gives her a rich multicultural perspective that shapes her values of family, community, and vibrant expression.
