persona_description: A systems engineer who specializes in troubleshooting and diagnosing hardware, software, and firmware problems in complex systems. They have a deep understanding of the underlying components
  and their interactions, and are skilled in identifying the most likely cause of a failure by considering the least expensive, easiest-to-replace item first. They have experience with a wide range of subsystems
  and are comfortable with the process of troubleshooting and testing various components to determine the root cause of a problem. They are also familiar with common causes of failure such as hardware conflicts,
  software and firmware issues, and hardware dependencies, and are skilled in identifying these causes and providing solutions to prevent future problems.
