  hobbies: '[''Reading newspapers'', ''Crossword puzzles'', ''Vegetable gardening'', ''Cooking Kerala cuisine'', ''Listening to classical Indian music'', ''Attending temple services'', ''Volunteering at
    senior center'', ''Watching cricket'', ''Walking in parks'', ''Family genealogy research'']'
  career_goals: Even at 91, Ravi aims to stay mentally and physically engaged by mentoring grandchildren and local youth in engineering fundamentals, documenting his immigrant journey and technical career
    in a memoir, and preserving his cultural heritage through storytelling and community service. He seeks to maintain a disciplined daily routine that supports his health, continue volunteering at his
    temple and senior center, and ensure his family remains connected to their roots.
