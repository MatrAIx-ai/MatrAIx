personas:
  professional: Ravi Nair, a retired electrical engineer renowned for analog circuit design and early computer systems, now channels their methodical mindset into mentoring young engineers, authoring a
    meticulous memoir of their technical journey, and volunteering their project‑management expertise at the local senior center.
  sports: Ravi Nair follows the national cricket league avidly, cheering for the Eastfield Eagles, and participates in a senior walking club that meets at the nearby park, where they complete a gentle 2‑mile
    circuit each morning before catching the evening match broadcast.
  arts: Ravi Nair immerses themselves in Carnatic and Hindustani classical music, regularly listening to recordings by legendary vocalists and instrumentalists, and attends monthly temple concerts featuring
    ragas that echo their coastal childhood, which deepens their sense of cultural continuity.
  travel: Ravi Nair prefers short, well‑planned excursions, often revisiting the historic hill station where they spent school holidays as a youth, and dreams of traveling to the sun‑kissed backwater villages
    of their ancestral homeland, though family responsibilities keep such trips modest.
  culinary: Ravi Nair excels at preparing coconut‑laden dishes like appam with fish stew, spiced vegetable thoran, and tangy tamarind sambar, drawing fresh herbs from their own garden, and delights in sourcing
    ingredients such as curry leaves, mustard seeds, and ripe mangoes for seasonal desserts.
  core: Ravi Nair is a 91‑year‑old retired engineer who blends disciplined routines, a love for puzzles, gardening, and classical Indian music with a gentle worry about health and a penchant for meticulous
    budgeting, all while mentoring the next generation.
background:
  cultural: Born in Kerala, India, Ravi grew up in a Nair Hindu family where Malayalam was spoken and festivals such as Onam, Vishu, and Diwali were celebrated with traditional rituals. He migrated to the
    United States in the 1970s, bringing with him a strong sense of duty, respect for elders, and love for South Indian cultural practices. In Raleigh, he remains active in the local Indian cultural association
    and the Hindu temple, preserving his language, cuisine, music, and community ties while integrating into American life.
