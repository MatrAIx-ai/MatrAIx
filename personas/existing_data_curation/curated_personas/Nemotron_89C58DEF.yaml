  career_goals: Mercedes aims to translate her disciplined work ethic into managerial leadership within the next two years, targeting a shift‑supervisor role, followed by store manager within five years.
    She plans to complete a bachelor’s degree in Hospitality Management while enrolling in advanced culinary courses. Long‑term, she aspires to open a boutique café that doubles as a community art space,
    showcasing local Black artists and offering a menu inspired by Southern culinary traditions. She also seeks to mentor entry‑level employees, fostering a culture of high performance and creative thinking.
