personas:
  professional: Mercedes Jackson is a fast‑food operations specialist who leverages meticulous inventory management and conflict‑resolution skills to keep high‑volume restaurant floors humming, while channeling
    a curiosity for digital illustration to design eye‑catching promotional menus as they work toward a shift‑supervisor role and a future boutique café that doubles as a community art hub.
  sports: Mercedes Jackson stays fit by combining early‑morning jogs with the Pearl Community Running Club, a regular spot in a local basketball pickup league, and weekend yoga sessions, while cheering
    on the New Orleans Saints in football season and the Memphis Grizzlies during the NBA playoffs.
  arts: Mercedes Jackson immerses themselves in the local art scene, sketching digital portraits and co‑creating murals at the Pearl Community Art Center while drawing inspiration from jazz legends like
    Nina Simone and Miles Davis, soulful singers such as Gregory Porter, and contemporary visual artists including Kara Walker and Basquiat, which fuels their own experimental culinary creations.
  travel: Mercedes Jackson favors short, well‑planned city escapes that blend food‑culture immersion and artistic discovery, having already explored Savannah’s historic squares, New Orleans’ jazz districts,
    and Asheville’s craft‑brew scene, while dreaming of a future culinary pilgrimage to Kyoto for its kaiseki finesse and Barcelona for its avant‑garde tapas.
  culinary: Mercedes Jackson approaches cooking as a creative laboratory, combining classic Southern staples like fried chicken and collard greens with modern twists such as miso‑glazed shrimp and grits
    or sous‑vide hot‑honey chicken, favoring ingredients like smoked paprika, fresh thyme, and miso paste, and regularly experiments in a modest home kitchen while occasionally over‑seasoning recipes in
    the pursuit of bold flavor.
  core: Mercedes Jackson fuses a disciplined, competitive drive in hospitality with a vibrant love for community art and experimental cuisine, even as late‑night coffee binges and a tendency to over‑season
    dishes reveal a playful, imperfect side to their pursuit of excellence.
background:
  cultural: Mercedes grew up in Pearl, Mississippi, within a tight‑knit African‑American community steeped in Southern traditions. Her upbringing was shaped by church gatherings, gospel music, family‑cooked
    soul food, and storytelling that honored the civil‑rights legacy of the region. She celebrates Juneteenth and local heritage festivals, where food, music, and art intersect. The rich tapestry of Black
    Southern culture informs her values of resilience, communal support, and creative expression. Mercedes draws inspiration from historic Black artists and contemporary creators, integrating that cultural
    pride into her personal and professional pursuits.
