  career_goals: Eric aims to become a senior mechanical engineer within the next five years, leading multidisciplinary projects that integrate sustainable design with cutting‑edge manufacturing techniques.
    He aspires to spearhead the development of energy‑efficient products, such as electric‑vehicle powertrain components or low‑cost renewable energy hardware, balancing his curiosity for new ideas with
    his pragmatic approach to deliver reliable solutions. Long‑term, Eric envisions taking on a principal engineer or technical manager role where he can mentor a diverse team, foster a collaborative culture,
    and shape company strategy while maintaining a flexible work schedule that supports his wellbeing. He also considers launching a boutique consulting firm focused on green mechanical design, allowing
    him to blend engineering expertise with entrepreneurial freedom.
