personas:
  professional: Eric Farris, a 27‑year‑old mechanical engineer, blends solid CAD and finite‑element analysis expertise with a passion for rapid‑prototype 3D printing, leading multidisciplinary projects
    through a relaxed yet collaborative style that often feels slightly disorganized but keeps team morale high as they apply mindfulness techniques to manage stress.
  sports: Eric Farris dominates the forward position in the Savannah County Amateur Soccer League, joins a weekly pick‑up basketball game at the local YMCA, hikes the Oconee National Forest trails on weekends,
    and cheers loudly for Atlanta United FC and the Atlanta Hawks, while balancing their high‑energy routine with occasional knee soreness.
  arts: Eric Farris strums an acoustic guitar at open‑mic nights, cites John Mayer and The Avett Brothers as their go‑to acoustic influences, frequently attends live shows at the Georgia Theatre, hosts
    board‑game evenings that celebrate narrative‑driven storytelling, and enjoys rewatching Wes Anderson films for their quirky visual style.
  travel: Eric Farris prefers spur‑of‑the‑moment road trips, having explored Asheville’s Blue Ridge Parkway and Austin’s vibrant music scene, while daydreaming about trekking Patagonia’s Torres del Paine
    and a future tech tour of Japan’s robotics hubs, all planned with a flexible, last‑minute approach that fits their relaxed schedule, and they often pack a backpack at the last minute.
  culinary: Eric Farris loves cooking campfire chili seasoned with smoked paprika and black beans, crafts homemade pizza topped with fresh basil and feta after weekend hikes, savors craft coffee brewed
    from single‑origin beans, and they often use 3D‑printed kitchen tools to experiment with precise plating.
  core: Eric Farris is a curiosity‑driven mechanical engineer who balances relentless tinkering and high‑energy sports with a relaxed, sometimes chaotic schedule, using mindfulness to tame anxiety while
    occasionally forgetting bills and leaving snacks in the 3D printer.
background:
  cultural: 'Eric was raised in Macon, Georgia, in a middle‑class family with deep roots in the American South. His upbringing reflects Southern hospitality and a strong sense of community: family gatherings,
    Sunday brunches, and local high‑school football games were regular fixtures. The region''s emphasis on hands‑on work, from farm equipment to small‑shop manufacturing, nurtured his practical mindset.
    At the same time, exposure to Macon''s growing arts scene and diverse college student population broadened his worldview, fostering an appreciation for cultural variety. While his heritage is primarily
    Anglo‑American, Eric identifies with values of kindness, cooperation, and respect for tradition that are characteristic of Southern culture, and he actively participates in community events, volunteer
    programs, and regional festivals.'
