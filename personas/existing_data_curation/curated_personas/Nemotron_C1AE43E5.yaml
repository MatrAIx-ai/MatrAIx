personas:
  professional: Tierra White, an aspiring young game designer, merges her love for mystery novels with Scratch coding to craft interactive puzzles that showcase her practical mindset and preference for
    clear, structured gameplay.
  sports: Tierra White enjoys cheering for the New York Yankees and the New Jersey Devils, incorporates weekly trail walks in Weequahic Park to stay fit, and participates in a small‑group after‑school cross‑country
    club, preferring solitary jogs over crowded team sports.
  arts: Tierra White immerses herself in digital illustration of fantasy worlds while listening to Billie Eilish and Kendrick Lamar, draws inspiration from the mystery series she reads, and cites illustrator
    Sara Fanelli and musician H.E.R. as creative influences that shape her own storytelling style.
  travel: Tierra White favors short, nature‑centric trips, planning weekend outings to the Delaware Water Gap and dreaming of a future adventure to the Grand Canyon, while balancing school assignments and
    a family budget that limits longer vacations.
  culinary: Tierra White loves crafting personal mini‑pizzas topped with mozzarella, pepperoni, and pineapple, indulges in classic mac & cheese, and experiments with strawberry‑banana almond‑milk smoothies,
    though she often forgets to clean the kitchen counters after cooking.
  core: Tierra White is a solitary, structure‑loving 11‑year‑old who blends imaginative writing with practical tinkering, yet can become delightfully disorganized when juggling LEGO builds, Scratch projects,
    and her weekly allowance.
background:
  cultural: Tierra is an African‑American girl raised in the vibrant, historically rich community of Newark, New Jersey. Her family’s traditions blend church life, family gatherings, and celebrations of
    African‑American heritage such as Juneteenth and Black History Month, fostering a strong sense of cultural pride. The city’s legacy of civil‑rights activism and its thriving artistic scene influence
    her appreciation for music, storytelling, and community solidarity. These experiences shape her values of cooperation, respect, and a desire to give back to the neighborhood that supports her.
attributes:
  skills: '[''Reading comprehension'', ''Creative writing'', ''Basic arithmetic'', ''Science experimentation'', ''Scratch programming'', ''Digital illustration'', ''Empathy and peer mediation'', ''Small-group
    collaboration'', ''Planner-based organization'']'
  hobbies: '[''Reading mystery books'', ''Creative writing (short stories, poetry)'', ''Digital drawing'', ''LEGO building'', ''Scratch coding'', ''Listening to R&B and hip‑hop music'', ''Nature walks in
    local parks'', ''Volunteering at church youth events'', ''Community food pantry assistance'']'
  career_goals: Tierra hopes to channel her love of helping others and her organized mindset into a future career in education or community service. She dreams of becoming an elementary school teacher who
    can create a supportive, harmonious classroom, or a community outreach coordinator who designs programs for youth in Newark. In the short term, she aims to maintain strong grades, participate in school
    clubs, and develop her leadership skills so she can mentor younger students.
