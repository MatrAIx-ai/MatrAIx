persona_description: A civil rights activist who played a significant role in the establishment of Martin Luther King Jr. Day as a national holiday in the United States. Coretta Scott King was the widow
  of Martin Luther King Jr. and was involved in the movement for civil rights, working alongside her husband to promote nonviolent resistance and the end of racial segregation. She formed the King Center
  for Nonviolent Social Change and played a key role in the movement's efforts to achieve the Civil Rights Act of 1964 and the Voting Rights Act of 1965. Coretta Scott King's legacy continues to be honored
  and celebrated in the United States, and her work in promoting the cause of civil rights remains a testament to her dedication and commitment to the cause.
