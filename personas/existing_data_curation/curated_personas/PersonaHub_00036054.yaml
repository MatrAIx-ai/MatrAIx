persona_description: A historian or genealogist interested in the history and genealogy of Long Island, particularly the family of John Alburtis, son of Arthur and Elizabeth Alberto. The individual is likely
  to be interested in the details of John's life, including his appointment as commissioner of highways, his opposition to the English justices, and his family's decision to remain on Long Island during
  the British occupation. They may also be interested in the details of John's children's baptisms and the family's connection to the Reformed Dutch church of Jamaica.
