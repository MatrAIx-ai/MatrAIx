personas:
  professional: Lourdes Gonzalez is a bilingual commercial cleaning specialist with strong OSHA knowledge, adept at floor‑scrubbing machines and detail‑oriented restroom sanitation, who channels her curiosity
    and spontaneous problem‑solving into quickly mastering new maintenance techniques while juggling fluid work schedules.
  sports: Lourdes Gonzalez follows the Miami Heat and Miami Dolphins, participates in weekend yoga sessions at Coral Gables Wellness Studio and joins the Everglades Trail Runners club for spontaneous morning
    jogs, while occasionally playing pick‑up soccer with friends at a local park.
  arts: Lourdes Gonzalez immerses herself in regional Mexican music by listening to Los Tigres del Norte and Natalia Lafourcade, enjoys mystery novels from Agatha Christie to Gillian Flynn, and watches
    environmental documentaries featuring David Attenborough and Leonardo DiCaprio to blend storytelling with sustainability.
  travel: Lourdes Gonzalez prefers spur‑of‑the‑moment nature escapes, having explored the Everglades and Key West on budget-friendly road trips, and dreams of hiking Patagonia’s Torres del Paine and snorkeling
    in Costa Rica’s Cahuita National Park when finances allow.
  culinary: Lourdes Gonzalez excels at preparing tamales and fresh salsa with roasted tomatillos, blends heritage flavors by adding chipotle to a traditional mole, and experiments with local shrimp and
    mango in coconut‑lime tacos, while still relying on quick‑fix ramen during study nights.
  core: Lourdes Gonzalez balances a restless curiosity and a love for eco‑friendly cleaning with occasional anxiety‑driven overthinking, spontaneous cooking experiments, and a habit of procrastinating deadlines
    while meticulously journaling nightly reflections.
background:
  cultural: Lourdes is a first‑generation Mexican‑American who grew up in a close‑knit Mexican household in Florida. She is bilingual, speaking Spanish at home and English in school and work. Family traditions
    such as Día de los Muertos, celebrating quinceañeras, and preparing homemade tamales remain central to her identity. Catholic holidays and the reverence for elders shape her values of respect and community.
    Living in Naples, she also participates in local Hispanic community gatherings, blending Mexican heritage with the broader cultural influences of South Florida.
attributes:
  skills: '["Commercial cleaning", "Floor care (buffing, scrubbing)", "Chemical safety handling", "Basic maintenance (light‑bulb replacement, minor repairs)", "Bilingual communication (Spanish‑English)",
    "Equipment operation (floor scrubbers, industrial vacuums)", "Problem solving", "Customer service", "Safety compliance (OSHA)"]'
  hobbies: '["Reading mystery novels", "Cooking Mexican recipes", "Exploring Everglades nature trails", "Yoga and meditation", "Journaling", "Crocheting", "Listening to regional Mexican music", "Watching
    environmental documentaries", "Volunteering at local community events"]'
  career_goals: Lourdes aims to earn a certification in facility maintenance and enroll in a community‑college program focused on environmental services. She hopes to move into a shift‑supervisor role within
    a larger facilities‑management company, eventually advancing to a facilities‑manager position. Long‑term, she dreams of starting her own cleaning business that emphasizes eco‑friendly practices. She
    also wants to improve her organization and deadline‑management skills to reduce work‑related stress and provide a stable income to support her family.
