    coordination'', ''EMR system proficiency'']'
  hobbies: '[''Watercolor painting'', ''Visiting art museums and galleries'', ''Reading contemporary fiction and scientific literature'', ''Fusion cooking experiments'', ''Solo hiking in local parks'',
    ''Yoga and meditation'', ''Following health technology advancements'', ''Volunteering at community health fairs'', ''Listening to world music'', ''Journaling'']'
  career_goals: Roopa aims to transition into a Clinical Nurse Specialist role with a focus on Nursing Informatics within the next three years, pursuing a Master’s degree in Health Informatics to deepen
    her expertise. She aspires to lead hospital‑wide quality improvement projects that reduce readmission rates and to publish research on the impact of art‑based interventions on patient recovery. Her
    competitive drive motivates her to earn national certification as a Nursing Informatics Specialist and to be recognized as a thought leader at regional conferences. She prefers leading focused, high‑performing
    teams rather than large bureaucratic structures, leveraging her critical eye and organized approach. Long‑term, she envisions taking on an executive nursing administration position where she can shape
    policy, mentor the next generation of nurses, and champion culturally responsive, technology‑enabled care across the Prince George’s County health system.
