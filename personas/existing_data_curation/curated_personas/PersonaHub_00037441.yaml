persona_description: A researcher at the Waterford Institute of Technology who specializes in the study of macular pigment and its potential role in preventing age-related macular degeneration (AMD) and
  enhancing visual performance. The research of the Macular Pigment Research Group at WIT has received both national and international recognition, reflected in research prizes, scholarships, grant support,
  and peer-reviewed publications. The MPRG currently consists of ten members, covering a wide variety of disciplines including ophthalmology, vision science, optometry, chemical and biological sciences,
  statistics, and nutrition. The researchers at the MPRG are experts in macular pigment research and their work has implications for the development of new treatments for AMD.
