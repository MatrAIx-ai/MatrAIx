  hobbies: '[''drawing'', ''watercolor painting'', ''singing'', ''dancing'', ''building block towers'', ''exploring nature'', ''reading picture books'', ''group games'', ''craft projects'']'
  career_goals: Mara dreams of becoming a teacher who can share stories and art with other children, or a veterinarian who cares for animals. She also imagines herself as a painter creating bright pictures
    that bring joy. Her ambition is to help others learn, stay happy, and feel cared for.
