personas:
  professional: Mara Dunaway, a 5‑year‑old preschool explorer, shows remarkable curiosity by organizing block‑building projects, leading group art activities, and methodically planning playtime adventures;
    they delight in sharing their creations with classmates.
  sports: Mara Dunaway dashes around the local preschool soccer field on Tuesdays, loves the energetic cheers of the nearby minor league baseball team the River Rats, and practices tumble jumps at a weekly
    gymnastics class; they thrive on the camaraderie of team play.
  arts: Mara Dunaway delights in drawing bright pictures inspired by the whimsical worlds of Pixar’s 'Toy Story', humming the catchy tunes of 'Let It Go' from Disney’s Frozen, and proudly displaying a crayon
    masterpiece of Van Gogh’s Sunflowers on the fridge; they often share the artwork with family and friends.
  travel: Mara Dunaway has already visited the city zoo’s dinosaur exhibit, taken a family road trip to the beach town of Santa Cruz, and dreams of exploring the magical castles of Disney World in Florida;
    they imagine packing a small backpack filled with crayons for the adventure.
  culinary: Mara Dunaway prefers creamy mac and cheese, loves the sweet crunch of apple slices dipped in peanut butter, and insists on adding a sprinkle of cheddar on their strawberry banana smoothie; they
    eagerly help stir the pot and taste‑test the sauce.
  core: Mara Dunaway is a bright, organized five‑year‑old who balances endless curiosity with a love for group play, tiny savings, and a tendency to forget bedtime in pursuit of art and adventure; they
    cherish each new discovery with a giggle.
background:
  cultural: Mara was raised in a white family in Winston‑Salem, North Carolina. Her family celebrates Southern traditions such as church gatherings, pumpkin patches in the fall, and community festivals
    like the American Tobacco Festival. She attends a local preschool that emphasizes multicultural storytime and art activities. Frequent visits to the Reynolda House Museum of American Art and local park
    events expose her to folk art and music, reinforcing her love for drawing, singing, and group creativity.
attributes:
  skills: '[''letter recognition'', ''color naming'', ''counting to 20'', ''fine‑motor drawing'', ''puzzle solving'', ''organizing toys'', ''following routines'', ''empathetic communication'', ''cooperative
