  career_goals: Alice aims to obtain her GED within the next year, followed by enrollment in a community college program focused on health‑care administration or business office support. She aspires to
    acquire certifications as a medical office assistant or a certified nursing aide, allowing her to combine her caring nature with her talent for organization. In the long term, she hopes to work as an
    administrative coordinator in a clinic or a nonprofit health‑services organization, where she can help streamline operations and support patient care. Alice also wants to maintain a side pursuit of
    creating and selling hand‑knit accessories, providing a creative outlet and modest supplemental income. Her career plan is driven by a desire for stability, the ability to help others, and a systematic
    path that reduces uncertainty.
