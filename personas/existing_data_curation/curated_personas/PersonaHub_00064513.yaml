persona_description: A scientist from the International Advanced Research Center for Powder Metallurgy and New Materials (ARCI) and Indian Institute of Technology Hyderabad (IIT Hyderabad), who specializes
  in the development of low-cost, high-capacity supercapacitors. They have synthesized a novel electrode material that may lead to the formulation of next-generation high-power/high-energy storage devices.
  Their research focuses on addressing challenges in the design of pseudo-capacitor devices with high porosity and high capacitance, and they have successfully synthesized a NiCo2O4 (NCO) nanosheet with
  oxygen vacancies induced by an environmentally benign electrodeposition assisted chemical reduction process. The research team includes Katchala Nanaji, Sreekanth Mandati, Tata N. Rao, B V Sarada, and
  Samhita Pappu from ACRI and Surendra K. Martha from IIT Hyderabad.
