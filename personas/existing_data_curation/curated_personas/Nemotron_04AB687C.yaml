  career_goals: Deidre is driven to advance within municipal public service. She plans to earn her GED within the next year and enroll in a community‑college certificate program in public administration
    or urban planning. Her short‑term goal is to be promoted to a senior parking enforcement supervisor, where she can mentor new officers and improve shift coordination. Long‑term, she aspires to become
    a community safety educator or a city planner, using her blend of practical enforcement experience and passion for art to design outreach programs that combine traffic safety messages with local street‑art
    projects. Additionally, she hopes to champion policies that address racial equity in parking enforcement and to create a support network for coworkers dealing with stress.
