    video gaming'', ''Volunteering at youth center'', ''Yoga and mindfulness meditation'', ''Cooking Caribbean cuisine'']'
  career_goals: Donna aims to enroll in a community college program for criminal justice and eventually earn a bachelor’s degree in security management or forensic studies. She envisions rising to a senior
    security supervisor role within a major casino, overseeing a team and developing proactive risk‑assessment protocols. Long‑term, she hopes to specialize in art‑event security, merging her love for visual
    culture with her professional expertise. Additionally, she wants to launch a mentorship initiative for at‑risk youth in Miami, teaching basic safety skills and providing mental‑health support resources.
