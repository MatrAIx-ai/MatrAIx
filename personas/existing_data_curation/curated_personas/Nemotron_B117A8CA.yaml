personas:
  professional: Donna Jones is a night‑shift casino surveillance officer in Miami who expertly monitors multiple CCTV feeds, flags suspicious behavior, writes meticulous incident reports, and uses her curiosity
    about emerging security tech to propose proactive risk‑assessment protocols while balancing the demanding pace with her love for art and community.
  sports: Donna Jones follows the Miami Heat and Miami Dolphins, plays hip‑hop dance classes twice weekly, practices beach volleyball at South Beach on weekends, and participates in a local self‑defense
    club at the youth center, using movement to channel her high emotional reactivity.
  arts: Donna Jones sketches Wynwood murals, photographs graffiti, devours graphic novels like “Saga” and “Watchmen,” and listens to neo‑soul icons Erykah Badu, jazz pianist Robert Glasper, and Kamasi Washington
    while acting in experimental theater pieces inspired by Marina Abramović, weaving visual and auditory art into her everyday identity.
  travel: Donna Jones has already taken weekend trips to Key West and the Bahamas, dreams of wandering the street‑art districts of Berlin and Lisbon, and plans future art‑focused pilgrimages to New York’s
    MoMA and Los Angeles’ Getty, balancing her limited student budget with a love for spontaneous, low‑cost adventures.
  culinary: Donna Jones often cooks Caribbean‑inspired dishes such as jerk chicken, rice and peas, plantain fritters, and curried goat for family gatherings, enjoys experimenting with fresh thyme and scotch
    bonnet pepper, but sometimes orders late‑night pizza after long shifts when fatigue overtakes her cooking enthusiasm.
  core: Donna Jones is a vibrant, art‑obsessed security guard whose high emotional reactivity fuels both impulsive spending and a fierce drive to protect and inspire at‑risk youth.
background:
  cultural: Donna is an African‑American woman raised in Miami’s multicultural neighborhoods, where Afro‑Caribbean rhythms, Southern soul traditions, and Latin influences blend. Her family maintains strong
    ties to the black church, celebrating events like Juneteenth and Kwanzaa alongside Caribbean holidays. Growing up she absorbed gospel music, hip‑hop, and the oral storytelling of her relatives, while
    also learning about Haitian and Jamaican cuisines that feature prominently in the local food scene. This rich cultural mosaic informs her identity, her appreciation for visual art, and her community‑oriented
    outlook.
