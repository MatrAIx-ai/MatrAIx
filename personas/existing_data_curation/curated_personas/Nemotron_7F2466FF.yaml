personas:
  professional: March Mctier, an aspiring junior astronomer who marshals a cardboard telescope and star‑chart stickers, leverages curiosity and practicality to explore constellations with friends, thriving
    on spontaneous night‑sky adventures while tolerating the inevitable away‑schedule messes, and they often forget to label their observations.
  sports: March Mctier dashes through Saturday soccer drills with the Sunflower Sprouts Club, erupts in cheers for the Los Angeles Dodgers during family TV nights, and joyfully tackles the playground jungle
    gym, preferring group games over solitary workouts, and they always find a new friend to tag along.
  arts: March Mctier sings along to The Wiggles, draws colorful dragons after watching Pixar’s ‘Inside Out’, attends weekly puppet shows at the local children’s theater, letting these creative bursts shape
    a vibrant, outgoing identity, and they often request encores during performances.
  travel: March Mctier buzzes with excitement about family road trips to the coastal boardwalk, daydreams of exploring Disneyland and ancient Scottish castles, balances spontaneous park picnics with occasional
    museum visits, all while navigating school‑day constraints, and they love packing their own tiny backpack for adventures.
  culinary: March Mctier savors cheesy mac and cheese, crunchy chicken nuggets, and strawberry‑banana smoothies, proudly helps stir pancake batter, loves dusting apple slices with cinnamon, yet often leaves
    a trail of crumbs in pursuit of that next bite, and they claim the mess is part of the fun.
  core: March Mctier is a curious, flexible five‑year‑old who blends high social energy with occasional disorganization, a love for spontaneous play, an unrelenting sweet tooth, and they frequently giggle
    at their own antics.
background:
  cultural: March grows up in a Southern small-town setting in Kingsport, Tennessee, where family gatherings, church events, and community festivals are common. Her family celebrates holidays such as Thanksgiving,
    Christmas, and Fourth of July with traditional meals and activities, and she often participates in local community events like parades and library storytime. The cultural environment blends Appalachian
    influences with contemporary American childhood experiences, fostering a warm, supportive, and community‑oriented upbringing.
