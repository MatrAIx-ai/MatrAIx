  career_goals: She dreams of becoming someone who helps others and discovers new things, such as a veterinarian who cares for animals, a teacher who shares knowledge, or an explorer who learns about the
    natural world. Her curiosity drives her to seek answers, while her practical side wants a career that lets her stay flexible and make a positive impact in her community.
