persona_description: Nigel Purvis, executive director of the bipartisan Commission on Climate and Tropical Forests and president of Climate Advisers, is a highly respected expert on the role of forests
  in mitigating climate change. He has a unique perspective on the importance of halving emissions from deforestation within a decade, and his recommendations will likely be considered by the Obama administration
  and Congress in their efforts to address greenhouse gas emissions. Purvis's expertise in group theory, particularly in the areas of subgroups and isomorphisms, will be valuable in the context of the commission's
  recommendations. He is also known for his research interests in the structure of finite groups, representation theory of groups, isomorphism problems, and the theory of group automorphisms.
