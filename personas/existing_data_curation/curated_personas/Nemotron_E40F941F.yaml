  hobbies: '[''Reading classic literature'', ''Quilting'', ''Knitting'', ''Gardening'', ''Birdwatching'', ''Crossword puzzles'', ''Genealogy research'', ''Listening to classical music'', ''Cooking family
    recipes'', ''Attending small community gatherings'']'
  career_goals: Although retired, Donna’s primary ambition is to preserve and share the history of her community and family. She aims to complete a written memoir that intertwines personal memories with
    the genealogical story of her ancestors, and to donate a curated collection of local photographs and oral histories to the Ottawa Historical Society. She also wishes to mentor younger relatives and
    volunteers in practical skills such as budgeting, cooking, and quilting, ensuring her knowledge endures. Maintaining her health and independence so she can continue to participate in small‑group gatherings
    and community projects remains a central goal.
