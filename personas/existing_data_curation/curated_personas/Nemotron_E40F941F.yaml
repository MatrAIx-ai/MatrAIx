personas:
  professional: Donna Arostegui, a retired high school English teacher who spent 35 years mastering curriculum design, literary analysis, and public speaking, now channels their meticulous organizational
    talent and community‑focused mindset into preserving local history through archiving, mentoring, and orchestrating senior‑center events, and they relish the structured rhythm of these projects.
  sports: Donna Arostegui enjoys gentle morning walks in the community garden, they follow the Chicago Cubs and Chicago Blackhawks on television, they participate in a local senior walking club that meets
    thrice weekly, and they volunteer as a scorekeeper at the nearby high‑school baseball games, balancing low‑impact activity with a quiet love of team spirit.
  arts: Donna Arostegui spends afternoons listening to Beethoven and Mozart on an antique record player, they stitch quilts while humming verses from Robert Frost, they immerse themselves in classic novels
    by Jane Austen, and they attend the local church’s choir concerts featuring televised performances by the Chicago Symphony Orchestra, showcasing a deep appreciation for timeless art forms.
  travel: Donna Arostegui prefers short, well‑planned trips—like a weekend visit to the historic downtown of Madison, Wisconsin, a day trip to the state archives in Springfield, and a sunrise outing to
    the nearby prairie nature reserve—while they dream of a guided tour of the ancient stone villages along the northern coast of Spain that they hope their grandchildren will arrange before they are too
    frail for travel.
  culinary: Donna Arostegui delights in preparing their family’s heirloom chicken pot pie, they simmer a vegetable stew with carrots, zucchini, and potatoes from their garden, they bake apple‑cinnamon crumble
    using fresh orchard apples, while they skillfully knit a kitchen towel for each guest as a charming, if slightly eccentric, side dish.
  core: Donna Arostegui epitomizes a disciplined, community‑rooted centenarian who balances meticulous record‑keeping, gentle perseverance through health challenges, and a quiet passion for preserving stories,
    they also indulge in modest quirks like hoarding coupons and whisper‑quiet quilting.
background:
  cultural: Donna is a white Midwestern American with ancestral roots in European immigrant families, including a Basque lineage reflected in her surname Arostegui. Raised in post‑war Illinois, she internalized
    the region’s values of self‑reliance, modesty, community service, and faith. Her upbringing emphasized practical skills, family cohesion, and participation in church and local civic groups. These cultural
    influences shape her organized, cooperative yet assertive personality and her commitment to preserving local heritage.
