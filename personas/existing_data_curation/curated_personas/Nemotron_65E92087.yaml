  career_goals: Although retired, Maria aims to preserve her family's culinary legacy by compiling a handwritten cookbook of cherished recipes that blend classic flavors with occasional modern twists. She
    wants to become more organized in managing health appointments and medication schedules, perhaps by adopting a simple digital planner to lessen her stress. Maria aspires to mentor younger community
    members—especially teenagers interested in cultural arts—by teaching cooking and crochet classes at the local senior center. She also hopes to document oral histories of Sabana Grande elders for the
    municipal archives. Driven by her competitive streak, she seeks a top spot in the local senior bingo tournament and aims to improve her bridge scores, while maintaining regular walks through town trails
    to stay physically active.
