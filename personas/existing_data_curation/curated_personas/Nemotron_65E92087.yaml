personas:
  professional: Maria Bernabe, a retired home cook turned community culinary mentor, harnesses their practical curiosity and critical, skeptical eye to teach cooking classes at the senior center—infusing
    classic dishes like arroz con gandules and alcapurrias with modern twists—while they juggle a relaxed, occasionally disorganized schedule and a competitive streak that fuels their drive to preserve
    cultural heritage.
  sports: Maria Bernabe, an avid walker who strolls daily through Sabana Grande’s historic plaza and follows the local baseball team Cangrejeros de Santurfe, also channels their competitive side into senior
    bridge tournaments and weekend bingo sessions, and they use fitness as a way to offset age‑related joint aches.
  arts: Maria Bernabe, a passionate follower of salsa legend Celia Cruz and bolero crooner Roberto Roena, enriches their creative life through a weekly crochet circle, digital photography of colonial architecture,
    and regular attendance at the Sabana Grande patron‑saint festival where they capture vibrant street performances and traditional folk dances.
  travel: Maria Bernabe, an adventurous yet budget‑conscious traveler, plans day trips to Old San Juan’s historic forts and weekend getaways to Vieques’s beaches, while dreaming of a cultural tour of Cartagena,
    Colombia, balancing their love for photography with occasional family‑oriented travel constraints, and they often rely on online deals to stretch their modest pension.
  culinary: Maria Bernabe, a culinary enthusiast, masterfully prepares classic arroz con gandules and alcapurrias while daringly infusing them with smoked paprika, guava glaze, and fresh cilantro, turning
    their modest garden’s papaya and oregano into vibrant, modern twists on beloved local flavors, and they delight in sharing these experiments with friends at community gatherings.
  core: Maria Bernabe, a skeptical yet curious lifelong learner, blends tradition with modernity in cooking, gardening, and community mentorship, all while juggling a competitive edge, occasional disorganization,
    persistent worry about health, and they never miss a chance to challenge fellow seniors at bingo.
background:
  cultural: Maria was born and raised in Sabana Grande, a small municipality in southwestern Puerto Rico known for its close‑knit community and rich agricultural traditions. Her family’s roots trace back
    to Spanish settlers, Taíno ancestors, and African slaves, giving her a blended cultural heritage reflected in the island’s music, food, and religious practices. She grew up in a predominantly Catholic
    household, celebrating events such as Semana Santa and the town’s patron‑saint festival, "Fiestas de la Parroquia." The rhythms of bomba, plena, and salsa were part of everyday life, and she learned
    to prepare traditional dishes that combine Spanish, Indigenous, and African influences. Although she speaks primarily Spanish, she learned conversational English in school and through interactions with
    tourists. The values of self‑reliance, familial loyalty, and community solidarity are central to her worldview, as is a pragmatic approach shaped by the island’s economic challenges. Her long‑standing
    connection to the land and local customs informs her daily routines and community involvement.
