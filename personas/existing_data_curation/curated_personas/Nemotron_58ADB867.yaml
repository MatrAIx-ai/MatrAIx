  hobbies: '[''gardening'', ''knitting'', ''quilting'', ''reading historical fiction'', ''genealogy research'', ''visiting art galleries'', ''book club participation'', ''birdwatching'']'
  career_goals: Although retired from formal employment, Ann aims to continue contributing to her community by leading volunteer projects at the local senior center and the historic society. She hopes to
    mentor younger volunteers, document and preserve Elizabethtown’s cultural heritage, and perhaps compile a memoir of her life experiences. She also wishes to travel to regional art museums and attend
    workshops that expand her creative skills.
