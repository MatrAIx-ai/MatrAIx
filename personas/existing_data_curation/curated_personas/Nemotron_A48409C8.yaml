  hobbies: '[''Jazz Concert Attendance'', ''Watercolor Painting'', ''Visiting Art Galleries'', ''Collecting Vintage Chemistry Books'', ''Providing Custom Polymer Resins for Artists'', ''Bridge Club'', ''Science
    Museum Demonstrations'', ''Experimental Cooking'', ''Mentoring Community Science Workshops'']'
  career_goals: At 60, Michael aims to transition his expertise into a consulting role focusing on small‑to‑mid‑size manufacturers in the Dallas‑Fort Worth area, helping them improve material performance
    while meeting environmental standards. He also aspires to complete an Associate of Applied Science in Chemistry through a local community college to formalize his knowledge. Michael hopes to author
    a practical guide on “Artistic Applications of Polymer Materials” that merges his love for art with his technical background, and to establish a monthly “Science & Art” outreach program at the Fort
    Worth Museum of Science, where he can mentor younger enthusiasts. He envisions a gradual phased‑retirement that still allows him to give back through mentorship, guest lecturing, and community projects.
