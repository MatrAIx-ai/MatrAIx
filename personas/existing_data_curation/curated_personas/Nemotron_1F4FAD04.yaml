  hobbies: '[''Fishing'', ''Gardening'', ''Vintage truck restoration'', ''Church attendance'', ''Volunteer fire department safety talks'', ''Bridge and poker'', ''Listening to classic country music'', ''Watching
    western movies'', ''Reading how‑to manuals'']'
  career_goals: Approaching retirement, Luis aims to transition to part‑time work that still lets him apply his practical expertise while giving him more flexibility for family and hobbies. He hopes to
    formalize a mentorship program for younger electricians in Polk County, passing on the hands‑on knowledge he acquired through apprenticeship. Financially, his goal is to secure a stable retirement income
    through modest consulting jobs and occasional contract work, ensuring he can support his wife and cover healthcare costs. He also dreams of leaving a small legacy—perhaps a well‑organized toolbox or
    a set of written notes on common wiring challenges—that future generations in his community can rely on.
