personas:
  professional: Luis Harrison, a seasoned residential and small‑commercial electrician in rural East Tennessee, leverages four decades of hands‑on wiring expertise and a reputation for reliable, routine
    work to mentor apprentices part‑time while offering modest consulting gigs that let them balance mentorship with fishing trips and truck restoration.
  sports: Luis Harrison enjoys watching the Tennessee Volunteers football and the Nashville Predators hockey teams while participating in local high‑school basketball games, and spends weekends fishing
    at Dale Hollow Lake, occasionally joining the county’s community baseball league as a pitcher.
  arts: Luis Harrison listens to classic country legends like Johnny Cash, Dolly Parton, and Merle Haggard, watches old westerns such as 'The Good, the Bad and the Ugly' and 'High Noon,' and attends monthly
    bluegrass jam sessions at the county fairgrounds, which they consider a key source of personal joy.
  travel: Luis Harrison favors relaxed road trips in his vintage pickup, preferring spontaneous stops at small towns like Huntsville, Alabama, and the Great Smoky Mountains for fishing, while dreaming of
    a future pilgrimage to Nashville’s Country Music Hall of Fame, which they keep in a folded brochure on the dashboard.
  culinary: Luis Harrison delights in home‑cooked meals featuring garden tomatoes, corn, and beans, often preparing fried catfish, cornbread, and peach cobbler, and they occasionally over‑spice their famous
    chili and rely on a well‑worn cast‑iron skillet.
  core: Luis Harrison is a practical, community‑oriented veteran electrician who savors routine, fishing, and vintage truck restoration, yet they tend to procrastinate on paperwork and forget to water their
    garden in the heat.
background:
  cultural: Luis was born and raised in the Appalachian region of Tennessee, growing up in a close‑knit white working‑class family that valued self‑reliance, church involvement, and community solidarity.
    His upbringing reflects traditional Southern values—respect for elders, modesty, and a practical outlook on life. The cultural rhythm of Calhoun, with its annual county fairs, church potlucks, and neighborly
    assistance, has shaped his cooperative and considerate nature. He identifies with the region’s heritage of craftsmanship, a love of the outdoors, and a modest, down‑to‑earth lifestyle.
attributes:
  skills: '[''Residential electrical wiring'', ''Commercial lighting installation'', ''Circuit troubleshooting'', ''Conduit bending'', ''Low‑voltage landscape lighting'', ''Basic HVAC electrical connections'',
