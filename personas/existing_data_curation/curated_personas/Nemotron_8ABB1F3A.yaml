personas:
  professional: Latasia Mcfadden, an analytical chemist turned STEM outreach strategist, leverages their methodical experimental design expertise, statistical mastery in R and Python, and organized project‑management
    skills to build data‑driven mentorship pipelines for under‑represented girls while confidently navigating grant writing and community partnerships.
  sports: Latasia Mcfadden stays active by hiking the Olentangy Trail most weekends, participating in a Columbus adult walking club, following the Columbus Crew soccer team and the Cleveland Guardians baseball
    team, and attending a weekly yoga class to balance cardio with flexibility.
  arts: Latasia Mcfadden channels creativity through leading their church choir with a repertoire ranging from Handel’s Messiah to contemporary folk songs by Brandi Carlile, enjoys quilting circles where
    they stitch patterns inspired by Georgia O’Keeffe’s floral motifs, and unwinds with the piano compositions of Ludovico Einaudi and the films of Steven Spielberg.
  travel: Latasia Mcfadden prefers thoughtfully planned trips that blend cultural immersion with relaxation, having explored the historic streets of Savannah, the vineyards of Napa Valley, and the coastal
    trails of Maine, while eyeing a solo adventure to Barcelona to practice Spanish and explore Mediterranean markets.
  culinary: Latasia Mcfadden, an intermediate home chef, delights in reinventing classic comfort dishes—such as baked sweet‑potato mac and cheese with reduced‑fat cheddar, a quinoa‑kale collard‑greens sauté
    with smoked paprika, and a spiced lentil stew with black‑eyed peas—pairing them with seasonal produce like heirloom tomatoes and fresh basil.
  core: Latasia Mcfadden blends scientific rigor with community heart, meticulously organizing mentorship pipelines while nurturing a garden of curiosity, all while refusing to let a spreadsheet dictate
    the rhythm of their choir.
background:
  cultural: Latasia is an African‑American woman whose roots trace back to a close‑knit Southern family that emphasized faith, education, and community service. Raised in a multigenerational household in
    Ohio, she grew up celebrating Juneteenth, Black History Month, and family reunions with soulful music, storytelling, and home‑cooked meals. Her church has been a central pillar, shaping her values of
    compassion, resilience, and collective uplift. She remains actively involved in Columbus’s Black cultural scene, contributing to local heritage events, supporting Black‑owned businesses, and mentoring
    youth through organizations that promote STEM access for underrepresented groups.
attributes:
  skills: '[''analytical chemistry'', ''statistical analysis (R, Python)'', ''data visualization'', ''technical writing'', ''grant proposal writing'', ''laboratory safety and compliance'', ''project management'',
