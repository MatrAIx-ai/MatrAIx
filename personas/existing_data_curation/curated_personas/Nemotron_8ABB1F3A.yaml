  hobbies: '[''gardening'', ''cooking soul food with healthy twists'', ''reading historical fiction'', ''reading biographies of African‑American scientists'', ''hiking'', ''volunteering at science fairs'',
    ''church choir participation'', ''quilting'', ''knitting'', ''learning Spanish'', ''DIY home improvement projects'', ''board‑game evenings'']'
  career_goals: Latasia aims to channel her scientific expertise and organizational talent into empowering the next generation of Black women in STEM. She plans to establish a mentorship program that links
    college students and professionals with middle‑school girls in Columbus, secure funding through grant writing, and serve on the advisory board of local education‑equity nonprofits. She also hopes to
    offer part‑time consulting on data analysis for community organizations, author a memoir reflecting on her journey as a Black scientist, and continue her lifelong learning by pursuing advanced courses
    in machine learning and public health.
