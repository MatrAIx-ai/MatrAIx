personas:
  professional: Brian Bove is a data-savvy wholesale buyer who blends market analytics with a folk-inspired aesthetic, using their keen negotiation skills and organized yet flexible workflow to source and
    merchandize art-centric product lines for regional retailers while eyeing a senior category manager role within five years.
  sports: Brian Bove is a regular starter in the Auburn Community Basketball League, a passionate fan of the Alabama Crimson Tide men's basketball and the Atlanta Hawks, and spends free weekends hiking
    Talladega National Forest trails, fishing at Lake Martin, and joining occasional deer-hunting outings, balancing a competitive edge on the court with a love for the great outdoors.
  arts: Brian Bove immerses themselves in the local art scene by attending weekly shows at the Opelika Art Center and the Auburn Fine Arts Center, performing acoustic renditions of Southern blues legends
    like B.B. King and R.L. Burns at open-mic nights, curating a personal photography collection of historic courthouses inspired by Ansel Adams, and drawing design theory concepts from authors such as
    Don Norman to inform their visual merchandising.
  travel: Brian Bove prefers low-key road trips that blend cultural discovery with budget-friendly adventure, having explored historic Savannah, the music-rich streets of Nashville, and the culinary scene
    of New Orleans, while dreaming of a solo photography pilgrimage to Santa Fe's art markets and a future camping trek through the Blue Ridge Parkway.
  culinary: Brian Bove loves Southern comfort food, often cooking shrimp and grits with fresh Gulf shrimp, collard greens seasoned with smoked turkey, and an occasional experimental dish like cedar-plank
    grilled salmon topped with heirloom tomato salsa, while their modest kitchen skills hover around confident sautéing and occasional pastry attempts for weekend farmers-market pastry stalls.
  core: Brian Bove is a curiosity-driven, art-obsessed buyer who balances meticulous organization with spontaneous guitar jams, competitive video-gaming marathons, and a habit of splurging on vintage record
    finds despite a tight student-loan budget.
background:
  cultural: Brian grew up in Opelika, Alabama, immersed in Southern culture characterized by hospitality, community events, and a strong emphasis on family and local traditions. He attended a public high
    school where he participated in the marching band and football games, fostering a sense of teamwork and regional pride. His upbringing includes regular church attendance and involvement in community
    service, typical of many white families in the area. The local culinary traditions, such as Southern comfort food and farm-to-table practices, influence his appreciation for regional flavors. While
    rooted in the Southern American experience, Brian also embraces broader artistic influences, reflecting a blend of traditional values and an open, curious outlook toward new ideas.
attributes:
  skills: '[''Market trend analysis'', ''Vendor negotiation'', ''Inventory forecasting'', ''Category management'', ''Data-driven decision making'', ''Creative product sourcing'', ''Purchase order management'',
    ''Supply chain documentation'', ''Interpersonal communication'', ''Visual merchandising'']'
  hobbies: '[''Visiting art galleries'', ''Attending community theater'', ''Playing acoustic guitar'', ''Landscape photography'', ''Hiking'', ''Fishing'', ''Hunting'', ''Competitive video gaming'', ''Basketball'',
    ''Reading design and retail tech books'']'
  career_goals: Brian aims to advance from his current buyer role to a senior category manager position within the next three to five years, eventually targeting a director of merchandising role at a regional
    retail chain. He plans to pursue a part-time associate degree in business administration to deepen his strategic management skills. Brian is also interested in specializing in sustainable and art-inspired
    product lines, hoping to lead initiatives that blend ethical sourcing with innovative design. Long-term, he envisions launching his own boutique wholesale firm that curates unique, culturally resonant
    goods for independent retailers across the Southeast.
