    and dancing'',''reading picture books about animals and science'']'
  career_goals: Vanessa loves exploring how things work and imagines a future where she can help living things. She dreams of becoming a veterinarian who cares for animals, a teacher who shares knowledge
    with curious kids, or an astronaut who discovers new worlds. She also talks about growing up to be a park ranger who protects the local lakes and forests she enjoys visiting. While she enjoys dreaming
    big, she prefers flexible, hands‑on paths that let her keep learning and trying new things.
