  career_goals: Although retired, Joel’s primary ambition is to stay engaged and useful to his community while cherishing his marriage. He aims to maintain his health through regular walks and senior exercise
    classes so he can continue volunteering at the Roxbury Senior Society, help organize food‑pantry drives, and pass on his practical knowledge to younger volunteers. He also hopes to preserve his family’s
    stories for future generations, ensure his spouse’s wellbeing, and leave a legacy of compassion, reliability, and collaborative spirit for his grandchildren and the neighborhood.
