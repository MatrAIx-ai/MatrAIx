personas:
  professional: Joel Hare, a retired high‑school maintenance supervisor with three decades of hands‑on experience as a tank mechanic and school facilities manager, now channels their practical curiosity
    into keeping the Roxbury Senior Society building in top shape, mentoring young volunteers in carpentry, plumbing, and safety while weaving stories of post‑war Boston into every repair.
  sports: Joel Hare is a lifelong fan of the Boston Red Sox, Boston Celtics, and Boston Bruins, attends weekly senior walking groups at the Arnold Arboretum, and joins the local senior center’s casual bowling
    league, cheering every home run as if it were played at Fenway.
  arts: Joel Hare sings in the senior center’s jazz‑and‑big‑band choir, delighting in the swing of Ella Fitzgerald and the croon of Frank Sinatra, listens to classic radio dramas like "The Shadow," and
    spends Sundays reading the Boston Globe’s arts section for reviews of local theater productions.
  travel: Joel Hare prefers short road trips to New England gems such as Cape Cod’s lighthouse towns, the historic streets of St. Augustine, and the serene gardens of Niagara Falls, planning each journey
    with a detailed itinerary and a modest travel fund, while dreaming of one day revisiting the lush countryside of their ancestors' youth.
  culinary: Joel Hare enjoys hearty comfort food, spending afternoons simmering a pot of corned‑beef and cabbage with potatoes, serving fresh garden peas from their community plot, and savoring New England
    clam chowder seasoned with thyme and bay leaf, though they often forget to turn the oven off until the kitchen timer yells.
  core: Joel Hare is a 92‑year‑old Bostonian who blends wartime practicality with a curious love of stories, always ready to fix a leaky faucet or share a baseball anecdote, but sometimes gets tangled in
    their own anxiety and occasional forgetfulness.
background:
  cultural: Joel is a second‑generation Irish‑American raised in a working‑class Catholic family in Boston’s historic neighborhoods. His grandparents immigrated from County Cork in the early 1900s, and
    he grew up on the values of hard work, community solidarity, and respect for tradition. The post‑World War II boom shaped his pragmatic outlook, while the vibrant cultural mix of Roxbury taught him
    to appreciate diverse perspectives. He maintains strong ties to his parish, the local Irish societies, and the neighborhood’s multigenerational fabric, blending a deep sense of heritage with an openness
    to new ideas.
