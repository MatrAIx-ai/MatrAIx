  hobbies: '[''Fishing'', ''Hiking'', ''Model building (model trains)'', ''Reading technical non‑fiction'', ''Puzzle solving (sudoku, crosswords)'', ''Woodworking'', ''Nature photography'', ''Coding small
    automation scripts'', ''Watching documentaries'', ''Solo strategy video gaming'']'
  career_goals: Brian aims to leverage his technical background and methodical work style to advance into a supervisory or specialist role within customer support. Over the next three to five years, he
    plans to obtain certifications such as ITIL and Six Sigma Green Belt to qualify for a team lead position or a process‑improvement analyst role. He also aspires to transition into a technical support
    or quality assurance position where he can apply his analytical skills while maintaining a structured work environment. Ultimately, he seeks a stable career path with clear advancement milestones and
    the opportunity to mentor newer employees.
