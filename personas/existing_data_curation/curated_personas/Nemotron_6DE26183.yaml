personas:
  professional: Fara Lobaina, an aspiring multimedia designer, leverages Adobe Photoshop, Illustrator, and Premiere alongside bilingual storytelling to craft culturally resonant campaigns for nonprofit
    and boutique agencies, channeling their curiosity and competitive drive into polished, deadline‑driven work.
  sports: Fara Lobaina enjoys weekend hikes across the Nebraska Sandhills, plays pickup soccer with the Grand Island Gunners club in the fall, follows the Nebraska Cornhuskers football team fervently, and
    they join a seasonal indoor climbing group during winter, balancing a love for outdoor activity with community sport participation.
  arts: Fara Lobaina immerses themselves in acrylic painting, street scene sketching, and analog photography, draws inspiration from contemporary artists like Kehinde Wiley, Jean‑Michel Basquiat, and the
    dynamic mural work of Os Gêmeos, and they regularly attend local gallery openings and virtual exhibitions featuring Afro‑Caribbean modernists, channeling their open curiosity into a personal visual
    language that blends bold color palettes with narrative storytelling.
  travel: Fara Lobaina prefers meticulously planned cultural trips that combine art, music, and cuisine, has explored the historic districts of New Orleans and the vibrant street art corridors of Medellín,
    dreams of a week‑long immersion in Havana’s colonial architecture and jazz clubs, and they balance their travel budget by using student discounts and off‑season airfare deals.
  culinary: Fara Lobaina loves cooking hearty dishes such as ropa vieja and empanadas, experiments with spices like cumin, oregano, and plantain leaves, perfects a side of black beans seasoned with garlic
    and bay leaf, and they indulge in sipping café con leche while listening to Afro‑Cuban jazz, showcasing a blend of traditional flavors and modern culinary curiosity.
  core: Fara Lobaina is a fiercely curious, competitively driven young creator who blends bilingual storytelling with vibrant visual art, lives on a shoestring budget punctuated by occasional splurges on
    art supplies, and they balance late‑night creative bursts with a habit of forgetting to schedule routine health check‑ups.
background:
  cultural: Fara is a first‑generation Cuban‑American whose family emigrated from Havana in the early 2000s. Growing up in the Midwest, she blends Cuban traditions—such as family gatherings with music,
    dance, and the vibrant flavors of Caribbean cooking—with the values of independence and community service common in Nebraska. Fluent in both Spanish and English, she navigates two cultural worlds, celebrating
    events like Carnaval and Cinco de Mayo while also participating in local Midwestern festivals. Her heritage instills a strong sense of resilience, a love for storytelling, and an appreciation for art
    as a bridge between cultures.
attributes:
  skills: '[''Adobe Photoshop'', ''Adobe Illustrator'', ''Adobe Premiere Pro (basic)'', ''Social Media Content Creation'', ''Graphic Design'', ''Bilingual Communication (Spanish/English)'', ''Research and
    Trend Analysis'', ''Project Planning'', ''Creative Writing'', ''Cultural Storytelling'']'
  hobbies: '[''Acrylic Painting'', ''Sketching'', ''Photography'', ''Visiting Art Galleries'', ''Salsa Dancing'', ''Cooking Cuban Cuisine'', ''Listening to Afro‑Cuban Jazz'', ''Reading Contemporary Fiction'',
    ''Poetry Writing'', ''Hiking in the Sandhills'']'
  career_goals: She aims to secure an entry‑level position as a multimedia designer or marketing coordinator for a cultural nonprofit or a boutique agency that celebrates Latinx heritage. In the next three
    years, she plans to complete a bachelor’s degree in Visual Communication while building a robust portfolio that blends her Cuban roots with contemporary design trends. Ultimately, she aspires to lead
    creative campaigns that promote cross‑cultural understanding and to mentor other young artists from underrepresented backgrounds.
