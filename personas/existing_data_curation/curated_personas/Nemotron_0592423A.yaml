  career_goals: Hazel often talks about wanting to become a wildlife caretaker or a veterinarian because she loves animals and enjoys learning how things work. She also expresses interest in becoming a
    teacher one day, imagining herself sharing stories with small groups of children. Her practical side leads her to imagine helping her family’s garden by learning about plants, hinting at a future in
    horticulture or environmental science.
