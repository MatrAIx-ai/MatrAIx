personas:
  professional: Hazel Champlain, a curious kindergartner who loves building LEGO structures, demonstrates early problem‑solving skills by balancing imaginative ideas with the practical guidance from instruction
    booklets, and they prefer to explore projects at their own pace rather than follow strict classroom schedules.
  sports: Hazel Champlain, who attends the Little Leaguers soccer program at Oak Grove Community Center, adores kicking the ball during recess, and they cheer for the nearby professional football team,
    the Cleveland Browns, while also enjoying watching the Chicago Cubs on television during summer evenings.
  arts: Hazel Champlain, an enthusiastic fan of the animated classic Frozen and the musical stylings of Raffi, spends afternoons drawing characters with crayon and dancing to the "Let It Go" soundtrack,
    and they love to mimic the expressive movements of the Muppets during playtime.
  travel: Hazel Champlain, who dreams of revisiting Disneyland in California after a memorable family vacation to the Grand Canyon, prefers short car trips to the local aquarium where they can safely explore
    marine life, and they enjoy planning imaginary trips with picture books of Paris and Tokyo.
  culinary: Hazel Champlain, who delights in scooping cheesy macaroni into a bowl and adding a sprinkle of cheddar, proudly makes peanut‑butter‑and‑jelly sandwiches with strawberry jam, and they eagerly
    snack on apple slices drizzled with honey, though they sometimes forget to finish their vegetables.
  core: Hazel Champlain, a five‑year‑old explorer who balances boundless curiosity with a knack for practical play, is a relaxed yet occasionally disorganized little thinker who prefers quiet corners, shows
    steady emotional composure, but can be surprisingly assertive when defending a treasured sticker collection.
background:
  cultural: Hazel’s family identifies as white American with roots in the Pacific Northwest and a modest rural heritage. Growing up in Kuna, Idaho, she experiences a close‑knit community that values outdoor
    activities, seasonal celebrations like the county fair, and community gatherings at the local church and library. Family traditions include Saturday hikes, backyard gardening, and attending local school
    events, which shape her connection to the land and the region’s emphasis on self‑reliance and neighborly support.
