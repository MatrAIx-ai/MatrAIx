    tools (Strong Interest Inventory, MBTI)'', ''Knowledge of Arkansas state education policies'', ''Digital counseling platforms (Zoom, telehealth)'', ''Stress management techniques'']'
  hobbies: '[''Gardening (raised‑bed vegetables)'', ''Quilting'', ''Reading (Southern literature and self‑help)'', ''Book club participation'', ''Community theater acting'', ''Volunteering at senior center'',
    ''Church choir singing'', ''Hiking in the Ozarks'', ''Yoga and meditation'', ''Genealogy research'', ''Cooking Southern cuisine'', ''Attending Pope County Fair'', ''Hosting community events'']'
  career_goals: Doris aims to assume a senior advisory role within the Pope County School District where she can shape district‑wide career guidance curricula and embed mental‑health support into the counseling
    framework. She envisions launching a community resource hub that offers free career workshops, mentorship for widowed adults re‑entering the workforce, and anxiety‑reduction seminars. Over the next
    few years, she plans to earn a licensed professional counselor certification, mentor emerging counselors through a formal apprenticeship program, and author a practical guidebook on navigating career
    transitions after loss. Ultimately, she hopes to leave a lasting legacy of structured, compassionate support that empowers individuals across all ages in Russellville.
