personas:
  professional: Kyle Trahan works as a computer support specialist who leverages their knack for clear communication and meticulous organization to troubleshoot hardware and software issues, while they
    channel their vivid imagination and artistic flair into unconventional, user‑friendly solutions in ticket resolution.
  sports: Kyle Trahan channels restless energy into weekly hikes with the Pocatello Hiking Club, seasonal snowshoeing in the nearby Sawtooth Mountains, and avidly follows the Idaho State Bengals football
    team and the Utah Jazz, but they often skip scheduled gym workouts in favor of spontaneous trail runs.
  arts: Kyle Trahan immerses themselves in digital illustration inspired by the luminous worlds of Studio Ghibli, the narrative depth of Hideo Kojima’s video games, and the surreal pop‑art of Bee Beeple,
    while they fuel late‑night sketching sessions with playlists of Radiohead, Nils Frahm, and lo‑fi beats.
  travel: Kyle Trahan prefers spontaneous, budget‑friendly road trips that blend adventure and reflection, they have already trekked the craters of Craters of the Moon, camped near Yellowstone’s geysers,
    explored Portland’s indie art scene, and dream of a solo backpacking stint through Kyoto’s neon districts to fuel future sci‑fi narratives.
  culinary: Kyle Trahan’s palate swings between hearty Idaho baked potatoes topped with smoked cheddar, the delicate precision of homemade sushi rolls with avocado and tuna, and the comforting spice of
    a quick ramen bowl, yet they hover at a confident intermediate cooking skill, often relying on meal‑prep containers for a week’s worth of energy‑dense snacks.
  core: Kyle Trahan is a high‑strung 20‑year‑old tech support whiz who converts anxiety into vivid digital art, fuels ambition with nightly hikes, and balances disciplined study with spontaneous creative
    bursts, while they constantly juggle the tension between meticulous planning and impulsive inspiration.
background:
  cultural: Kyle grew up in a predominantly white, middle‑class family in Pocatello, Idaho, where the community blends rural self‑reliance with a modest urban cultural scene. His parents valued hard work,
    practicality, and a strong sense of personal responsibility, while encouraging involvement in school clubs—including a computer club and a visual arts program—that nurtured his dual interests in technology
    and creativity. The region's outdoor lifestyle, with easy access to mountains, rivers, and state parks, reinforced his appreciation for solitude and nature as a source of emotional balance. Local cultural
    touches, such as the Basque restaurant scene and annual Pioneer Days celebration, exposed him to diverse traditions, shaping an openness to novelty without abandoning the modest, community‑oriented
    values typical of Idaho's small‑town upbringing.
attributes:
  skills: '["Technical support troubleshooting", "Hardware diagnostics", "Software troubleshooting", "Ticketing system management", "Basic networking concepts", "Introductory Python scripting", "Digital
    illustration", "Creative problem solving", "Customer communication", "Organizational workflow management"]'
  hobbies: '["Digital illustration", "Reading sci‑fi/fantasy novels", "Playing indie video games", "Arduino and DIY electronics projects", "Attending local art walks and tech meetups", "Hiking in Idaho
    foothills", "Personal journaling", "Guided meditation for anxiety management"]'
  career_goals: Kyle aims to deepen his technical expertise by earning CompTIA A+, Network+, and Security+ certifications within the next two years, then enroll in a bachelor's program in Computer Science
    or Information Technology. His long‑term ambition is to transition from front‑line support into a hybrid role that blends security analysis with user‑experience design, allowing him to apply both his
    analytical rigor and artistic imagination. He envisions eventually leading a small support or UX team at a tech‑forward company in the Pacific Northwest, where he can mentor newcomers and champion innovative,
    user‑centric solutions.
