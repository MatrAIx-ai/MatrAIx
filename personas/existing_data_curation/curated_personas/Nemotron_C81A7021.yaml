  hobbies: '[''Reading non-fiction (history, technology)'', ''Woodworking'', ''Fishing'', ''Genealogy research'', ''Trivia nights'', ''Competitive chess'', ''Puzzle solving (Sudoku, crosswords)'', ''Jogging'',
    ''Gardening'']'
  career_goals: Neil aims to advance to a senior supervisory role overseeing correspondence and records management, where he can apply his process‑improvement mindset on a larger scale. He plans to complete
    his associate degree and obtain the Certified Administrative Professional (CAP) credential within the next two years. Over the next five years, he hopes to lead a small team, implement streamlined digital
    archiving procedures for his organization, and eventually transition into a consulting role helping mid‑size companies optimize their office workflows. He also aspires to mentor younger clerks, earn
    recognition as the top performer in his department, and contribute his expertise to local volunteer initiatives after retirement.
