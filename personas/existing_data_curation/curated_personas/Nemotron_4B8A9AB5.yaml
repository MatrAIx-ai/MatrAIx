personas:
  professional: Kelley Ours is a veteran passenger attendant with over four decades of airline service, renowned for calm de‑escalation, meticulous safety briefings, and a mentorship style that blends Southern
    hospitality with modern aviation standards, now transitioning to part‑time coaching and memoir writing.
  sports: Kelley Ours is a devoted fan of the Atlanta Falcons and Nashville Predators, participates in the Lincoln County Strollers senior walking club, and enjoys low‑impact shuffleboard at the community
    center during the winter months.
  arts: Kelley Ours delights in blue‑grass concerts featuring Bill Monroe and Ricky Skaggs, knits quilts inspired by traditional Log Cabin patterns while listening to classic country crooners like Dolly
    Parton, and attends regional theater productions of historical dramas.
  travel: Kelley Ours prefers flexible itineraries that blend cherished Southern destinations such as Savannah, Charleston, and the Great Smoky Mountains with occasional overseas adventures like a nostalgic
    tour of Scotland’s Highlands, always leveraging airline loyalty miles and budget‑friendly lodging.
  culinary: Kelley Ours enjoys cooking Southern comfort dishes like buttermilk biscuits, fried green tomatoes, and peach cobbler, seasoning meals with fresh rosemary and thyme from their herb garden, and
    is moderately skilled at preparing shrimp and grits for family potlucks.
  core: Kelley Ours blends Southern warmth, a lifelong love of aviation, and a relaxed, slightly disorganized approach to life, often humming gospel hymns while knitting quilts and juggling garden chores
    with mentorship duties.
background:
  cultural: Kelley grew up in the American South, steeped in the traditions of Southern hospitality, church community, and a close‑knit small‑town upbringing. Her white, rural heritage influences her warm,
    cooperative demeanor and love for home‑cooked meals, gospel music, and storytelling. Working in the travel industry exposed her to diverse cultures, shaping a broadened but respectfully grounded worldview
    that balances Southern values with an appreciation of global perspectives.
attributes:
  skills: '[''Customer service'', ''Safety and emergency procedures'', ''First aid and CPR'', ''Conflict resolution'', ''Multilingual communication (basic Spanish)'', ''Boarding coordination'', ''Problem
