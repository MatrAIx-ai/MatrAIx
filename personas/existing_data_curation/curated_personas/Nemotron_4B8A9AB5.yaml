  hobbies: '[''Herb gardening'', ''Quilting'', ''Genealogy research'', ''Volunteer work at church'', ''Community potluck participation'', ''Attending blue‑grass concerts'', ''Reading historical fiction'',
    ''Listening to classic country music'', ''Walking nature trails'']'
  career_goals: Even at 80, Kelley aims to transition from full‑time flight duties to a part‑time mentorship role, guiding new flight attendants and sharing her wealth of stories in a memoir that highlights
    the evolution of passenger service. She also hopes to complete a certification in geriatric first‑aid to support community seniors, and to lead a local workshop on travel safety for residents of Lincoln
    County.
