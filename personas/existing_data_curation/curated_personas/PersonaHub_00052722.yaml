persona_description: A genealogist or researcher who is interested in the history and religious records of the Canadian province of Alberta and its neighboring territories, particularly focusing on the
  Catholic and Protestant sects. They may have a particular interest in the Mennonite, Hudderite, Mormon, and Ukrainian Orthodox communities. They are likely to have access to FamilySearch's wiki on Alberta
  church records and the Mennonite Historical Society of Alberta's website for information on specific records and communities. They may also use Memory BC and the Vancouver Public Library's genealogical
  resources to find records and information.
