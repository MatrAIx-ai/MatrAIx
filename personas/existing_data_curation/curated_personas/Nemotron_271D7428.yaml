  career_goals: Approaching retirement, Alvin’s primary ambition is to transition from full‑time auditing to a part‑time advisory role where he can share his wealth of experience with small‑business owners
    and nonprofit organizations in the Lancaster community. He hopes to obtain his CPA license before stepping back, solidifying his professional credibility. Additionally, Alvin aims to lead a mentorship
    program within his firm to improve the representation of African‑American accountants, fostering a pipeline for younger talent. He also wants to ensure his family’s financial security by finalizing
    a comprehensive retirement plan and establishing a modest endowment for his grandchildren’s education.
