persona_description: A scientist and researcher who specializes in the field of nanotechnology and plasmonics, particularly in the development of linear rulers based on the electronic surface waves known
  as "plasmons". They have expertise in creating sharp spectral features in the otherwise broad resonance profile of plasmon-coupled nanostructures using interactions between quadrupolar and dipolar modes.
  They have developed plasmon rulers that can be used to measure nanoscale distances in biological cells, and have envisioned a future in which 3D plasmon rulers would be attached to a sample macromolecule
  for various purposes. They have a unique understanding of the challenges and opportunities in creating 3D plasmon rulers using nanoparticles and biochemical linkers.
