  career_goals: Even at age four, Harold likes to imagine his future. He often says he wants to become an artist to create pictures that make people happy, and he also dreams of being a teacher who helps
    other kids learn. His methodical nature leads him to enjoy planning pretend "classrooms" where he organizes books and art supplies.
