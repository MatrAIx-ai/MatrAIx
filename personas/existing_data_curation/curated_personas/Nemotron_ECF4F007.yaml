personas:
  professional: Harold Chapman is a budding mini‑engineer who spends afternoons meticulously arranging LEGO structures, channeling a methodical curiosity into building towering creations while they quietly
    narrate step‑by‑step plans.
  sports: Harold Chapman is a regular at the community’s toddler swim class, delighting in the splash of water while they practice the butterfly kick, and they cheer for the local minor‑league baseball
    team, the Durham Bulls, whenever a game is televised.
  arts: Harold Chapman enjoys exploring picture books by Dr. Seuss and listening to the whimsical melodies of Yo Yo Ma’s cello suites, often attempting to recreate the rhythms on a toy xylophone, reflecting
    their appreciation for varied artistic experiences.
  travel: Harold Chapman loves family road trips to the nearby beach where they collect seashells, dreams of visiting the giant redwoods of California, and prefers the calm of small, familiar stops over
    bustling airports, often holding a stuffed giraffe as a travel companion.
  culinary: Harold Chapman prefers simple flavors, savoring creamy mac and cheese with a sprinkle of sharp cheddar and crunchy carrot sticks, yet they stubbornly reject peas, showing a typical picky‑eater
    habit while occasionally helping stir pancake batter.
  core: Harold Chapman is a quietly curious four‑year‑old who methodically builds LEGO worlds, saves pennies for dinosaur toys, manages mild eczema with routine care, enjoys gentle swim classes, delights
    in Dr. Seuss and Yo Yo Ma, explores seashell‑filled beaches, and navigates meals with selective enthusiasm, all while nurturing a kind, cooperative spirit.
background:
  cultural: Harold grows up in a Black family in Moody, Alabama, where community, church, and family gatherings shape his world. Sunday mornings are spent at a local Baptist church with gospel singing and
    storytelling. Family meals feature soul‑food dishes like collard greens, cornbread, and fried catfish, reinforcing his connection to African‑American culinary traditions. He is influenced by his grandparents'
    oral histories, the rhythms of Southern blues, and the close‑knit neighborhood culture of St. Clair County.
attributes:
  skills: '[''puzzle solving'', ''block building'', ''basic drawing'', ''color identification'', ''routine scheduling'', ''toy sharing'', ''empathy'']'
