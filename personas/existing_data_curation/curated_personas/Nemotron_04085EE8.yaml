personas:
  professional: Scott Pridgen, a senior UI/UX designer who blends meticulous data‑driven design with a laid‑back, collaborative workshop style, uses React, Vue, and Figma to craft accessible interfaces,
    and aims to become a design lead within three years while juggling a love of structure and a tendency to let meeting notes drift into disarray.
  sports: Scott Pridgen, an avid hiker of the Cascades and member of the Salem Cyclists Club who pedals the Willamette River loop on weekends, supports the Portland Timbers and follows the Oregon Ducks
    basketball season, yet often forgets to schedule recovery days after intense trail runs.
  arts: Scott Pridgen, a community‑focused guitarist who jams with the Willamette River Jam Circle, devotes Friday nights to board‑game meet‑ups at local cafés, and draws inspiration from indie folk artists
    like The Decemberists and graphic novels such as "Saga" while volunteering at a makerspace to teach teens web design.
  travel: Scott Pridgen, a spontaneous weekend explorer who prefers short, eco‑friendly trips to the Oregon Coast, Oregon Wine Country, and occasional ski outings in the Sierras, while dreaming of a cultural
    immersion tour of Kyoto’s tea houses and New Zealand’s South Island, all planned on the fly to fit his unpredictable work schedule.
  culinary: Scott Pridgen, a craft‑beer aficionado and home‑brew coffee experimenter who relishes a perfectly pulled pour‑over, loves cedar‑plank salmon with roasted root vegetables, and frequently orders
    a mushroom risotto at farm‑to‑table spots, though he often leaves his kitchen a mess after a late‑night brewing session.
  core: Scott Pridgen, a 42‑year‑old design strategist who balances a love of structured design systems with a love‑of‑the‑outdoors, anxiety‑driven caffeine rituals, and a habit of misplacing meeting notes.
background:
  cultural: Scott was raised in a middle‑class, predominantly white family in the Willamette Valley, where a blend of modest Midwestern values and Pacific Northwest environmental consciousness shaped his
    outlook. Growing up near Salem, he absorbed the region’s appreciation for outdoor recreation, sustainability, and community involvement. His education at a state university’s STEM program reinforced
    a pragmatic, data‑driven mindset, while his ongoing participation in local arts and tech collectives reflects the inclusive, collaborative spirit characteristic of Oregon’s progressive culture.
attributes:
  skills: '[''User Interface Design'', ''User Experience Research'', ''Responsive Web Design'', ''Accessibility Compliance'', ''Prototyping (Figma, Sketch, Adobe XD)'', ''Front-End Development (HTML5, CSS3,
