  hobbies: '[''Cascades Hiking'', ''Willamette River Cycling'', ''Acoustic Guitar Jam Sessions'', ''Board Game Meet‑ups'', ''Makerspace Volunteering'', ''Mindfulness Yoga'', ''Craft Beer Exploration'',
    ''Home Coffee Brewing'', ''Photography of Nature'', ''Local Music Festival Attendance'']'
  career_goals: Scott aims to transition from senior UI/UX designer to design lead within the next three years, positioning himself to shape product strategy and champion inclusive, accessible digital services
    for both private and public sector clients in the Pacific Northwest. He aspires to build a design system that streamlines workflow across multidisciplinary teams, while also mentoring junior designers
    to foster a supportive, collaborative culture. Long‑term, he envisions launching a boutique consultancy that offers flexible, people‑centric design solutions for community organizations, allowing him
    to balance creative autonomy with a lifestyle that accommodates his need for emotional self‑care.
