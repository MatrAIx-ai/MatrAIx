personas:
  professional: Kevin Borrello is a mid‑career librarian and digital curator who merges rigorous MARC and metadata expertise with his practical, hands‑on approach to building digitization pipelines, using
    his competitive drive to secure multi‑year grants while his relaxed attitude toward day‑to‑day scheduling often leads him to improvise efficient solutions at the last minute.
  sports: Kevin Borrello spends early mornings on the Gulf with the Ocean Springs Anglers Association, cheers for the New Orleans Saints in football and the Memphis Grizzlies in basketball, and joins a
    seasonal community tennis league at the local park when the heat eases.
  arts: Kevin Borrello curates a cherished vinyl trove featuring Miles Davis, Aretha Franklin, The Allman Brothers, and early Italian jazz, regularly attends the Peter Anderson Arts & Crafts Festival to
    support local artisans, and volunteers his cataloging skills to digitize the archives of regional folk musicians, satisfying both his competitive urge to discover rare recordings and his love for Southern
    storytelling.
  travel: Kevin Borrello favours spontaneous road trips along the Gulf Coast—such as weekend drives to the Gulf Islands National Seashore or culinary detours to New Orleans—while occasionally allocating
    saved funds for longer getaways to the French Riviera and Malta’s historic fishing villages, balancing his modest travel budget with a longing for coastal vistas and cultural immersion.
  culinary: Kevin Borrello enjoys cooking Gulf seafood staples like shrimp étouffée seasoned with filé powder, jambalaya with smoked Andouille sausage, and classic crawfish boils, and though his cooking
    skill sits between competent home‑chef and enthusiastic experimenter, he often treats spice blending with the same precision he applies to his Raspberry Pi projects.
  core: Kevin Borrello blends methodical library science expertise with a laid‑back, competitively spirited approach, channeling his love of history, vintage vinyl, and Gulf fishing into pragmatic yet improvisational
    solutions both at work and in his personal life.
background:
  cultural: Kevin was raised in a middle‑class family on the Gulf Coast of Mississippi. Though his paternal ancestry includes Hungarian (Horvath) and Italian (Borrello) roots, his cultural identity closely
    aligns with Southern coastal traditions. He grew up attending a Methodist congregation, celebrating local events such as Mardi Gras and the Peter Anderson Arts & Crafts Festival, and developing a palate
    for Gulf seafood and Creole cooking. The close‑knit nature of Ocean Springs, with its emphasis on community resilience after hurricanes, has instilled in him a pragmatic, self‑reliant outlook that blends
    his European heritage with the hospitality and storytelling traditions of the Mississippi Delta.
attributes:
  skills: '["Cataloging (MARC, RDA)", "Digital preservation", "Metadata management (Dublin Core, METS)", "Information retrieval & reference services", "Data analysis (Python, R)", "Database management (SQL)",
    "Digitization workflow design", "Collection development", "Grant writing", "Project coordination", "Instructional design for information literacy", "Technical troubleshooting", "Community outreach"]'
  hobbies: '["Fishing", "Birdwatching", "Reading historical fiction", "Reading science‑fiction", "Collecting vintage vinyl records", "DIY electronics (Raspberry Pi, Arduino)", "Playing chess", "Volunteer
    oral‑history work", "Cooking Gulf Coast seafood"]'
  career_goals: Kevin aims to step into a senior leadership role within the next five years, such as Director of Special Collections and Digital Services for the Jackson County Public Library system. He
    plans to secure a multi‑year grant to digitize coastal environmental archives and community oral histories, establishing a regional repository that supports researchers, educators, and local residents.
    He also seeks to publish articles on metadata best practices, mentor early‑career librarians, and become a recognized thought leader in digital curation across the Gulf Coast library network.
