personas:
  professional: Adam Martin is a budding middle-school robotics enthusiast who blends their curiosity about how things work with a practical mindset, often leading their school's robotics club to prototype
    functional mechanisms while staying organized yet flexible enough to pivot when a design fails.
  sports: Adam Martin plays forward on the Saginaw United Youth Soccer team in the spring, joins after‑school pickup basketball at the local community center, and they cheer for the Detroit Tigers, Detroit
    Lions, and Michigan State Spartans, often wearing a Michigan State cap during games.
  arts: Adam Martin enjoys sketching comic‑style characters in a worn notebook, streams indie game soundtracks featuring artists like Joe Hisaishi and Imagine Dragons, and they attend occasional school
    theatre productions of classics such as 'A Midsummer Night’s Dream'.
  travel: Adam Martin loves weekend road trips to Mackinac Island for bike trails and to the Upper Peninsula for fishing in Lake Superior, while they dream of a summer backpacking adventure through Utah’s
    national parks, balancing careful budgeting with a desire to explore new horizons.
  culinary: Adam Martin favors homemade pepperoni pizza and chicken nuggets, enjoys building elaborate LEGO‑inspired sushi rolls with cucumber, avocado, and smoked salmon, and they can whip up a decent
    batch of chocolate chip cookies, though they often neglect to clean the kitchen afterward.
  core: Adam Martin is an energetic, curiosity‑driven teen who juggles LEGO constructions, soccer drills, and anxious thoughts, often over‑packing their backpack with snacks and spare parts while forgetting
    to finish homework on time.
background:
  cultural: Adam grew up in Caro, a small town in Tuscola County, Michigan, where Midwestern values of hard work, community ties, and modesty are prominent. His family’s background is rooted in the region’s
    agricultural and manufacturing history, and he often experiences local traditions such as county fairs, high school sports rallies, and church gatherings. The close‑knit community fosters a sense of
    neighborliness and mutual support, influencing Adam’s cooperative nature and his desire to help others. While his exposure to cultural diversity is limited, he gains broader perspectives through school,
    media, and online interactions.
