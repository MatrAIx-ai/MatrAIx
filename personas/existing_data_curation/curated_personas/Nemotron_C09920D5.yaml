  career_goals: Adam aspires to a career that blends his love for animals, hands‑on problem solving, and desire to serve his community. He hopes to become a veterinarian or an agricultural science specialist,
    working on farm animal health or wildlife conservation in Michigan. In the meantime, he wants to develop technical skills in robotics and environmental science, aiming for a college degree in a STEM
    field that allows him to apply practical solutions to real‑world challenges while helping others.
