  career_goals: Soon aims to advance to a senior or regional management role within the next five years, leveraging his track record of dependable operations to oversee multiple locations. He plans to obtain
    a professional certification such as the Certified Manager (CM) credential to formalize his expertise. In the long term, he hopes to launch his own family‑run convenience‑store chain that provides financial
    stability for his wife and future children while allowing a healthier work‑life balance to reduce his current stress levels.
