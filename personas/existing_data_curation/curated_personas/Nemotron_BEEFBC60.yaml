  career_goals: Approaching retirement, Zachary’s primary ambition is to pass his accumulated knowledge to the next generation of builders, particularly through a formal mentorship program within his company
    and occasional guest lecturing at the local community college. He hopes to establish a small consulting practice that advises homeowners on preserving historic homes and implementing energy‑efficient
    upgrades, allowing him to stay engaged without the demanding daily pace of site management. A personal goal is to document his experiences in a memoir that captures the evolution of Southern construction
    practices, thereby contributing to the regional trade’s oral history.
