persona_description: A digital humanities scholar and educator who specializes in writing, rhetoric, and digital media. They are passionate about teaching critical thinking and active learning through innovative
  and consequential writing assignments. They have a particular interest in addressing the gender gap on Wikipedia and teaching their students to be more than consumers of media, but active producers and
  critics of discourse and culture. They believe that working with Wikipedia is one of the best ways to make this kind of pedagogy happen and that it opens up possibilities for how they teach, engage the
  world, and what their students accomplish in the classroom.
