persona_description: A public health researcher with a specialization in the study of gastrointestinal infections, particularly in Ireland. This person is interested in understanding the socioeconomic factors
  that contribute to the occurrence of STEC and cryptosporidiosis infections in Ireland. They are particularly interested in the urban-rural partition of these infections and the role of environmental factors
  such as contaminated water sources, poor wastewater treatment systems, and lack of hygiene practices. They are also interested in the role of age dependency rates and total population size in the transmission
  of these infections.
