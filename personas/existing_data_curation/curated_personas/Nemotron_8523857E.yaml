  career_goals: Antonio aspires to become a multimedia artist, combining visual art, storytelling, and interactive technology. He aims to study visual arts or game design at a university with strong creative
    programs, and eventually work as an animator, concept artist, or indie game developer. He also hopes to use his skills to create community art projects that celebrate African American heritage in his
    hometown, and mentor younger students in creative technology.
