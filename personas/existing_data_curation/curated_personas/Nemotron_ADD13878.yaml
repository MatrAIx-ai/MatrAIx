  hobbies: '[''Crayon drawing and coloring'', ''Building with wooden blocks'', ''Listening to children’s music'', ''Reading picture books'', ''Nature walks and collecting natural objects'', ''Pretend play
    (firefighter, astronaut, detective)'']'
  career_goals: Although only three, Charles often talks about future roles that satisfy his curiosity and love of art. He expresses a strong desire to become an astronaut to explore space, a firefighter
    to help others, and an artist to create pictures. He enjoys pretending to solve problems and appears motivated by the idea of discovering new things, indicating early ambitions toward scientific or
    creative careers.
