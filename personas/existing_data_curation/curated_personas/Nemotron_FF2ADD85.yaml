  career_goals: Angela aims to earn her Certified Welding Inspector (CWI) credential and become a journeyman‑qualified welder within the next two years. She aspires to move into a supervisory foreman role
    where she can lead a diverse crew, implement innovative welding processes, and champion mentorship programs for young Black women entering the trades. Long‑term, Angela envisions opening a boutique
    metal‑art studio that blends industrial welding techniques with custom sculpture commissions for public art installations across Chicago, while also offering apprenticeships that bridge practical trade
    skills with creative expression.
