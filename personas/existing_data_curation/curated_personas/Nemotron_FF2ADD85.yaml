personas:
  professional: Angela Henderson, a 39‑year‑old welding specialist, combines mastery of MIG, TIG, and plasma techniques with a practical curiosity that fuels rapid on‑site problem solving, while her competitive
    drive and love of mentorship push her toward a Certified Welding Inspector credential and a future foreman role leading a diverse crew.
  sports: Angela Henderson fuels their competitive streak by cheering the Chicago Bulls at United Center, joining a local indoor rock‑climbing club three times a week, and playing pick‑up basketball on
    summer evenings at the community center, all while staying grounded with a casual membership in the Chicago Yacht Club’s rowing league during the warm months.
  arts: Angela Henderson channels their love of soulful storytelling into nightly visits to blues and jazz venues like Kingston Mines, where they riff on stage alongside tributes to Buddy Guy and Miles
    Davis, and crafts intricate metal sculptures inspired by the colossal steel works of Richard Serra, displaying them at monthly open‑mic art nights at the Chicago Cultural Center.
  travel: Angela Henderson prefers spur‑of‑the‑moment road trips to lake‑side cabins—whether a weekend retreat at Lake Geneva or a sunrise paddle on Lake Michigan—while also dreaming of a cultural pilgrimage
    to New Orleans for its Mardi Gras music and cuisine, balancing tight budgets with a willingness to splurge on a night at a boutique B&B when a break from the shop floor feels overdue.
  culinary: Angela Henderson is a seasoned home chef who whips up soul‑food feasts of smoked pork ribs, collard greens seasoned with smoked paprika, sweet‑potato cornbread, and homemade hot sauce, proudly
    showcasing their ability to blend industrial precision with culinary flair during weekend BBQs that draw the whole block together.
  core: Angela Henderson is a charismatic, competitive welding maestro who balances spontaneous creativity—both in metal art and community BBQs—with a pragmatic drive to mentor the next generation, all
    while occasionally letting impulsive spending and loose organization keep life intriguingly unpredictable.
background:
  cultural: Angela grew up in Chicago’s South Side, a neighborhood steeped in African‑American history and culture. Her family traces its roots to the Great Migration, bringing Southern traditions, gospel
    music, and a strong sense of community to the city. She was raised with the values of resilience, mutual support, and celebration of Black heritage, participating in church events, Juneteenth parades,
    and neighborhood block parties. These experiences fostered her love for soulful music, communal cooking, and collective storytelling. As a Black woman in a male‑dominant trade, Angela draws pride from
    representing her cultural legacy in the welding field, often mentoring other underrepresented youth and advocating for diversity within industrial workplaces.
