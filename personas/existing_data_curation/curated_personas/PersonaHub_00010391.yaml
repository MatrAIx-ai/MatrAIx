persona_description: A researcher who specializes in the field of biomaterials and has expertise in the development and application of hydrogel systems for cell preservation. Her work focuses on the exploration
  and optimization of different hydrogel systems and crosslinking strategies to induce hydrogelation in cellular cytosol. Her research has led to the successful preparation of intracellularly gelated cells
  using a UV-activated crosslinking system, and the observation of a life-like interaction between T cells and gelated dendritic cells. Her work has potential applications in enhancing immunotherapies that
  can benefit from antigen-specific T cell expansion.
