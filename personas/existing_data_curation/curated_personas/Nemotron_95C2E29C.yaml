  career_goals: Although Alexis is no longer part of the formal workforce, she is driven to remain a pillar of her community. She aims to lead a local historical preservation committee, mentor younger volunteers
    in event planning, and publish a small family genealogy booklet that ties her heritage to the broader story of Lancaster County. She also aspires to master a new culinary technique each year—such as
    fermentation or pastry arts—to keep her curiosity alive while sharing the results with neighbors.
