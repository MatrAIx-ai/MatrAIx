personas:
  professional: Adelaida Polania, an 18‑year‑old Business Administration associate student, leverages her bilingual fluency, Canva design skills, and customer‑service experience to craft community‑focused
    marketing projects, balancing a love for structured planning with a flexible, last‑minute creative spark.
  sports: Adelaida Polania follows Liga MX passionately—cheering for Club América—while also supporting Chicago Fire FC, plays in a local recreational soccer league on weekends, and stays active by hiking
    the Palos Trail System and biking the Great Western Trail.
  arts: Adelaida Polania immerses herself in regional music, spinning cumbia tracks by La Sonora Dinamita, norteña hits from Los Tigres del Norte, and reggaeton beats by Bad Bunny, dances salsa with friends,
    captures her culinary creations for Instagram, and devours YA novels such as 'The Hate U Give,' all of which shape her vibrant artistic outlook.
  travel: Adelaida Polania prefers spontaneous, budget‑friendly road trips that combine family visits to home‑state towns with weekend hikes in Illinois forest preserves, dreaming of future journeys to
    Oaxaca’s bustling markets and the colorful streets of Guanajuato, while her planning often leans on last‑minute deals rather than rigid itineraries.
  culinary: Adelaida Polania, an aspiring home chef, regularly perfects tacos al pastor, handmade mole negro, and steaming bowls of pozole, experimenting with ancho chilies, roasted tomatillos, and fresh
    cilantro, while balancing her skillful flair for family recipes with occasional kitchen mishaps like over‑spicing her salsa.
  core: Adelaida Polania blends disciplined ambition with a laid‑back love for late‑night salsa sessions, chronic procrastination on school paperwork, and an unrelenting quest to preserve her family’s culinary
    legacy on a future heritage‑inspired food truck.
background:
  cultural: Adelaida grew up in a Mexican‑American household that blends traditional Mexican customs with Midwestern American life. Raised bilingual, she celebrates holidays such as Día de los Muertos,
    Navidad, and Cinco de Mayo, often preparing family recipes like tamales and pozole. Family gatherings are central to her identity, emphasizing respect for elders and communal sharing. She maintains
    close ties with extended relatives in Mexico and the local Latino community, regularly attending church services and community festivals in Oak Forest. This cultural duality shapes her values of hard
    work, hospitality, and community support, and influences her interest in preserving Mexican culinary heritage while adapting to her Chicago‑area environment.
attributes:
  skills: '["Bilingual (Spanish/English)", "Microsoft Office Suite", "Google Workspace", "Basic graphic design (Canva)", "Social media content creation", "Customer service", "Conflict resolution and assertive
    communication", "Cooking Mexican cuisine", "Personal budgeting and finance basics", "Event planning and coordination", "Research and academic writing"]'
  hobbies: '["Cooking Mexican recipes", "Food photography", "Listening to regional Mexican music", "Salsa/Reggaeton dancing", "Watching Liga MX soccer", "Hiking and biking in local parks", "Reading young‑adult
    fiction", "Journaling", "Streaming Netflix series", "Volunteering as a tutor", "Participating in cultural club events (e.g., Día de los Muertos)"]'
  career_goals: Adelaida plans to complete her associate degree in Business Administration at a community college and then transfer to a four‑year university to earn a bachelor's in Marketing. She aims
    to secure internships in marketing or community outreach to gain real‑world experience while working part‑time in customer‑focused roles. Her long‑term ambition is to launch a Mexican‑inspired food‑truck
    or catering business that showcases her family's authentic recipes and serves the growing Latino community in the Chicago suburbs. She also envisions using her bilingual abilities to act as a community
    liaison for nonprofit organizations, helping bridge cultural gaps. While she values a clear career trajectory, she seeks enough flexibility to balance her entrepreneurial goals with personal time for
    family and creative pursuits.
