  career_goals: Richard aims to transition from a frontline representative to a Customer Service Manager within the next two years, leading a cross‑functional support team and driving an omnichannel strategy
    that incorporates AI‑powered chatbots and self‑service portals. He plans to earn a Six Sigma Green Belt and a Certified Customer Service Professional (CCSP) credential to strengthen his operational
    expertise. In the longer term, he envisions moving into an Operations Director role where he can shape company‑wide service standards, mentor emerging leaders, and spearhead corporate social‑responsibility
    initiatives that partner the business with local arts and cultural organizations. Eventually, he hopes to leverage his experience to launch a consultancy that helps mid‑size firms improve customer experience
    while integrating creative thinking into service design.
