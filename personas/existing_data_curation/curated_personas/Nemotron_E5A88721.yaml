  career_goals: Unhwa aims to obtain senior project manager status within the next five years, focusing on resilient coastal and transportation projects that address sea‑level rise in Hawaii. She plans
    to deepen her expertise in climate‑adaptive design, earn additional certifications in green building (LEED AP), and mentor junior engineers, especially those from underrepresented backgrounds. Long‑term,
    she aspires to a chief engineer role where she can shape firm‑wide sustainability policies and lead community‑focused infrastructure initiatives that combine technical rigor with cultural sensitivity.
