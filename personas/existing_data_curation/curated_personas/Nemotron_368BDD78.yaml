  hobbies: '[''Robotics club participation'', ''Mexican folk dancing'', ''Traditional cooking with family'', ''Reading science‑fiction novels'', ''Journaling and project planning'', ''Volunteering at community
    garden'', ''Hiking and nature observation'', ''Playing strategy video games'']'
  career_goals: She aims to pursue a bachelor’s degree in civil engineering with a focus on sustainable and resilient infrastructure. Angel wants to combine her love for practical problem‑solving with her
    curiosity about how communities function, eventually designing safe, environmentally friendly public spaces in Tulsa and other growing cities. She also hopes to mentor younger students, especially those
    from Hispanic backgrounds, encouraging them to explore STEM fields.
