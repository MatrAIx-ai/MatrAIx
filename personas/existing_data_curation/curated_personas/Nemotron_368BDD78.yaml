personas:
  professional: Angel Villa, a budding robotics enthusiast who leads their middle school robotics club, combines methodical planning with creative coding to design autonomous bots for local competitions.
  sports: Angel Villa, a junior member of the local youth soccer league who also hikes the nearby state park trails, cheers for the regional baseball team the San Diego Padres and the professional basketball
    franchise the Los Angeles Lakers, and treats physical activity as both social play and personal recharge.
  arts: Angel Villa, who dances traditional folk steps with a family troupe, reads sci-fi novels by authors such as Liu Cixin and Ann Leckie, and streams indie electronic music from artists like Grimes,
    finds creative inspiration in the rhythmic patterns of both dance and code.
  travel: Angel Villa, who loves weekend camping trips to the Blue Ridge Mountains and dreamily plans a future visit to Tokyo's robotics museums and Kyoto's historic shrines, prefers itineraries that blend
    nature hikes with hands-on tech workshops while staying within a modest family budget.
  culinary: Angel Villa, who enjoys mastering the art of making tamales and pozole with their grandmother, experiments with corn masa, roasted chilies, and hominy, and also prepares teen-friendly meals
    like quesadillas and smoothie bowls, often documenting recipes in their project journal.
  core: Angel Villa, a 13-year-old who fuses meticulous robotics projects with vibrant folk dancing, saves every spare dollar for tech parts, and never lets a broken robot or a missed hike dampen their
    calm, methodical optimism.
background:
  cultural: Angel is a second‑generation Mexican‑American raised in Tulsa, Oklahoma. She grows up in a bilingual household where Spanish is spoken daily alongside English, and she celebrates both Mexican
    holidays—such as Día de los Muertos and Mexican Independence Day—and American traditions. Her family places a strong emphasis on community, respect, and preserving cultural heritage, which she experiences
    through family gatherings, folk dancing, and cooking. While attending a diverse middle school, Angel is part of a vibrant Hispanic community that blends Mexican customs with the local Midwestern culture,
    giving her a unique perspective on multicultural identity.
attributes:
  skills: '[''Advanced mathematics problem solving'', ''Application of scientific method in experiments'', ''Basic Python programming'', ''Robotics construction and programming'', ''Project planning and
