personas:
  professional: Anita Stitch is a senior digital innovation strategist who fuses their graduate business expertise with technical fluency to craft art‑inspired digital experiences, leading cross‑functional
    agile teams with a collaborative, spontaneous flair that often delights stakeholders but occasionally runs afoul of tight deadlines.
  sports: Anita Stitch fuels their active lifestyle by surfing with the Pacific Coast Surfers club on summer weekends, hiking every Saturday with the Ridgewalkers Trail Group, and sprinting in local 5K
    races while passionately rooting for the Aurora City Thunder basketball team and the Bayside Mariners baseball club.
  arts: Anita Stitch immerses themselves in the arts by curating weekly visits to contemporary galleries featuring Banksy, Yayoi Kusama, and Ai Weiwei, participating in improv workshops with The Second
    City troupe, and drawing inspiration from musicians Tame Impala, actress Lupita Nyong'o, and filmmaker Christopher Nolan.
  travel: Anita Stitch travels with a spontaneous, festival‑centric mindset, having trekked to Burning Man in Nevada, explored the Venice Biennale in Italy, danced at Glastonbury in the UK, and now eyeing
    the Kyoto International Manga & Anime Fair in Japan, often booking flights on a whim while balancing a modest family budget.
  culinary: Anita Stitch is an enthusiastic home chef who routinely concocts Korean bibimbap with gochujang, Thai green curry infused with lemongrass and kaffir lime, and Italian saffron risotto, treating
    each weekend cooking session as a collaborative experiment where they invite friends to taste‑test fusion dishes featuring ingredients like miso, turmeric, and smoked paprika.
  core: Anita Stitch blends a restless curiosity for art with a spontaneous leadership style, constantly juggling murals and meetings while often forgetting to file their expense reports on time.
background:
  cultural: Anita grew up in a suburban, middle‑class family in the Northeastern United States with German and Irish ancestry, embodying a classic White American upbringing. Relocating to Ponte Vedra, Florida,
    she adopted a blend of Northern work ethic and Southern hospitality, embracing the coastal lifestyle of outdoor recreation and laid‑back social gatherings. Her cultural experience is shaped by participation
    in the vibrant local art scene, community volunteerism, and an openness to diverse cultural expressions while maintaining mainstream American values of individualism, collaboration, and continuous learning.
attributes:
  skills: '[''Strategic Business Analysis'', ''Agile Scrum Facilitation'', ''Data Visualization (Tableau, PowerBI)'', ''User Experience (UX) Design Principles'', ''Stakeholder Relationship Management'',
