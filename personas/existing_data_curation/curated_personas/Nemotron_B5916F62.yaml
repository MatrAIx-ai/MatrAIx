  hobbies: '[''Contemporary Art Gallery Hopping'', ''Improv Comedy Workshops'', ''Community Mural Painting'', ''Surfing'', ''Group Hiking'', ''Volunteer Art Education Programs'', ''Experimental Cooking
    for Friends'', ''Live Music Concerts'', ''Travel to Arts Festivals'']'
  career_goals: Anita aims to become a senior digital innovation leader—such as Chief Innovation Officer or Head of Digital Strategy—where she can champion unconventional, art‑inspired technology projects
    that reshape customer experiences. She aspires to mentor emerging women technologists, build a culture that values spontaneity and collaborative harmony, and eventually launch her own consultancy that
    helps midsize businesses integrate creative digital solutions while maintaining adaptable, people‑first processes.
