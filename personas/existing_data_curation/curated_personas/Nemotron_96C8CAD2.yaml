personas:
  professional: Maria Silwany, a veteran secondary humanities teacher with over twenty years of bilingual (English‑Spanish) classroom experience, weaves Adobe Photoshop and Illustrator into immersive, project‑based
    art curricula while methodically pursuing a department‑chair position, where their competitive edge fuels successful grant applications for district‑wide arts integration and student‑led mural initiatives,
    and they consistently mentor junior teachers.
  sports: Maria Silwany, a dedicated participant in a local Ballet Folklórico troupe and member of a community walking club, cheers for the Texas Tech Red Raiders and enjoys weekend soccer matches with
    close friends, preferring small‑group, culturally expressive fitness activities, yet they sometimes skip gym sessions when anxiety spikes.
  arts: Maria Silwany, an avid creator of surreal acrylic and watercolor works inspired by artists like Remedios Varo and Frida Kahlo, writes poetry echoing folkloric narratives, weaves intricate textiles,
    and frequently attends intimate gallery openings featuring emerging artists such as Ana Hernández, while volunteering to lead youth art workshops, they channel their competitive yet nurturing drive.
  travel: Maria Silwany, a methodical planner who favors small‑group cultural trips, has explored Oaxaca’s bustling markets and Mexico City’s vibrant mural districts, dreams of strolling the historic canals
    of Venice and absorbing Valparaíso’s street art, yet balances these ambitions with a modest travel budget and family commitments that limit spontaneous excursions, and they often plan trips months in
    advance.
  culinary: Maria Silwany, a devoted home cook who tends a herb garden of cilantro, oregano, and epazote, crafts traditional mole with ancho, pasilla, and guajillo chilies, hand‑makes tamales and pozole,
    and occasionally experiments with fusion creations like mole‑marinated salmon, though they tend to over‑season dishes when stress peaks, resulting in occasional kitchen missteps.
  core: Maria Silwany, a 46‑year‑old humanities educator, channels boundless imagination into vivid art while they grapple with anxiety‑driven perfectionism, a fiercely competitive streak for grant success,
    and an occasional habit of splurging on premium art supplies.
background:
  cultural: Maria Silwany is a first‑generation Mexican‑American whose parents arrived from Jalisco, Mexico, and raised her in a bilingual household in Texas. She grew up celebrating Día de los Muertos,
    Semana Santa, and other Mexican traditions, which she weaves into her teaching through literature, art, and history lessons that highlight Mexican and broader Latinx contributions. Fluent in Spanish,
    she maintains close ties with relatives in Mexico and participates in the local Mexican community in Lubbock, often collaborating with cultural centers for school events. Her bicultural identity informs
    her values of family, resilience, and community service, and she frequently incorporates Mexican folk motifs and storytelling techniques into her classroom projects and personal artwork.
attributes:
  skills: '["Secondary Education Pedagogy", "Bilingual Instruction (English‑Spanish)", "Curriculum Development", "Project‑Based Learning Design", "Visual Arts Techniques", "Digital Art Tools (Adobe Suite)",
    "Assessment & Grading Strategies", "Classroom Management", "Mentoring & Coaching", "Grant Writing for Arts Programs", "Professional Development Facilitation", "Educational Research"]'
  hobbies: '["Acrylic and watercolor painting", "Poetry writing", "Traditional Mexican cooking", "Ballet Folklórico dancing", "Textile weaving and embroidery", "Reading philosophical literature", "Herb
    gardening", "Attending local art exhibitions", "Hiking in Lubbock parks", "Volunteering for youth art workshops"]'
  career_goals: Maria aims to become the Humanities Department Chair at her school, where she can champion a district‑wide arts integration initiative that embeds Mexican and broader Latinx cultural perspectives
    into the curriculum. She plans to publish research on the impact of culturally responsive art education on student engagement and to secure state grants for student‑led mural projects that celebrate
    community heritage. Long‑term, she envisions transitioning to an adjunct faculty role at a regional university, teaching courses on art education theory while continuing to mentor at‑risk youth through
    an after‑school art studio she hopes to establish in Lubbock.
