personas:
  professional: Maritza Acosta blends a practical knack for digital design with a budding enthusiasm for hospitality, leveraging bilingual fluency and a curiosity for cultural events to assist in community
    college projects and envision a future as a bilingual liaison for a tourism board, while maintaining a relaxed, flexible work style that values kindness over rigid scheduling.
  sports: Maritza Acosta regularly hikes the Hill Country's wildflower-lined trails, joins a local weekend soccer pick-up league, cheers for Austin FC in the MLS and the Texas Longhorns during football
    season, and prefers low-key outdoor workouts over gym routines, treating fitness as a flexible social outlet rather than a strict regimen.
  arts: Maritza Acosta spends evenings dancing to salsa rhythms by Carlos Vives and cumbia beats from Juan Luis Guerra, fills their sketchbook with doodles inspired by Frida Kahlo's bold lines, voraciously
    reads contemporary fiction by Sally Rooney, and curates Instagram feeds that spotlight local street art, weaving these creative passions into a vibrant personal aesthetic.
  travel: Maritza Acosta prefers spontaneous weekend getaways to nearby Hill Country gems like Marble Falls and Enchanted Rock, plans trips with a mix of Instagram inspiration and budget-friendly travel
    apps, dreams of exploring Santa Fe's art scene and the historic streets of Seville, yet often balances adventure with the financial reality of a student budget and family commitments.
  culinary: Maritza Acosta enthusiastically experiments with corn-masa arepas stuffed with cheese and pineapple, hand-folded empanadas flavored with beef, olives, and cumin, and a hearty ajiaco soup brimming
    with chicken, three varieties of potatoes, corn, and the aromatic herb guasca, showcasing a moderate cooking skill level that blends traditional flavors with inventive twists while constantly sharing
    the results on Instagram.
  core: Maritza Acosta is a curious, kindly explorer who balances a love for dancing, cooking, and digital design with a laid-back, occasionally disorganized lifestyle that fuels both community projects
    and personal creative bursts.
background:
  cultural: Maritza grows up in a Colombian-American household; her parents immigrated from Medellín and maintain strong ties to Colombian customs, music, and cuisine. Family gatherings often feature traditional
    foods like bandeja paisa and celebrate holidays such as Día de la Independencia with a mix of Colombian and Texan flair. Living in Boerne, Texas, she navigates a bicultural identity, blending Colombian
    warmth and community focus with the smaller‑town values of her Texas surroundings. She participates in local Hispanic festivals, cherishes stories about her grandparents’ hometown, and speaks Spanish
    at home while attending an English‑dominant school, fostering a dual cultural fluency that shapes her worldview.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Social media content creation'', ''Basic graphic design (Canva)'', ''Event planning assistance'', ''Traditional Colombian cooking'', ''Digital
    literacy (Microsoft Office, Google Suite)'', ''Customer service basics'', ''First aid awareness'', ''Adaptability and improvisation'']'
  hobbies: '[''Cumbia and salsa dancing'', ''Hiking and nature photography'', ''Cooking traditional and fusion Colombian dishes'', ''Reading contemporary fiction'', ''Sketching and doodling'', ''Volunteering
    at the local library (bilingual reading program)'']'
  career_goals: Maritza aims to enroll in a community college program focused on hospitality and tourism management, with the long‑term goal of becoming a bilingual liaison for the Texas Hill Country tourism
    board. She dreams of combining her Colombian heritage and love for food by eventually opening a small café that serves authentic Colombian pastries alongside Texas‑style coffee. Alongside a career in
    hospitality, she is interested in pursuing certification in event coordination so she can help organize cultural festivals that highlight both Colombian and Texan traditions.
