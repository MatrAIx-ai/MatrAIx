personas:
  professional: Thresiamma Kabir, a budding junior architect in the making, assembles intricate Lego skyscrapers with uncanny precision, reveling in the clear rules of building while frequently shifting
    mid‑project to a whimsical castle when friends gather, a playful dance of their love for structure and spontaneous imagination.
  sports: Thresiamma Kabir, a lively participant in the Little Sprouts Soccer Club, sprints after the ball at the community field with boundless energy, proudly sports a cap emblazoned with the San Antonio
    Spurs logo, and eagerly watches Spurs games on family movie nights, exemplifying their enthusiasm for both grassroots team play and professional basketball.
  arts: Thresiamma Kabir, who dances to A.R. Rahman’s ‘Jai Ho’ during Diwali celebrations and belts out Taylor Swift’s ‘Shake It Off’ while twirling in bright festival saris, delights in drawing cartoon
    heroes on school notebooks, and eagerly mimics the hand gestures of classical dance classes, weaving a vibrant tapestry of multicultural musical and visual creativity.
  travel: Thresiamma Kabir, who cherishes family road trips to the San Antonio River Walk and adventurous hikes to the Grand Canyon, dreams of soaring to Delhi’s bustling markets and Chiang Mai’s lantern
    festivals, balancing their love for familiar playgrounds with a budding curiosity for far‑off cultural wonders.
  culinary: Thresiamma Kabir, who savors cheesy pizza slices on birthdays, enthusiastically stirs fragrant turmeric rice and mild chicken biryani alongside their mother, and can’t resist the sweet melt
    of gulab jamun after festivals, showcasing a palate that delights in both comforting American fare and aromatic South‑Asian flavors.
  core: Thresiamma Kabir, a four‑year‑old dynamo of meticulous block building and spontaneous sticker swaps, channels their love of structure and playful unpredictability into every corner of their day,
    turning routine chores into miniature adventures.
background:
  cultural: Thresiamma is a second‑generation South Asian child born to Indian parents who immigrated to San Antonio, Texas. At home she hears a blend of English and Tamil (or Hindi/Urdu) and celebrates
    major festivals such as Diwali, Holi, and Eid with family gatherings, sweets, and traditional music. Her parents maintain cultural ties through weekly visits to a local Hindu temple and participation
    in a South Asian community group that holds cultural dance and language classes for children. While she enjoys typical American activities—playing at the park, eating pizza, and celebrating Thanksgiving—her
    upbringing also includes Indian cuisine, vibrant clothing during festivals, and stories from Indian mythology, all of which shape her worldview and daily routines.
attributes:
  skills: '[''basic English communication'', ''basic Tamil comprehension'', ''color and shape identification'', ''counting to ten'', ''fine motor coordination (cutting, drawing, building blocks)'', ''singing
