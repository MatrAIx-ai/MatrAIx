  hobbies: '[''drawing and coloring'', ''building with LEGO Duplo'', ''singing nursery rhymes'', ''dancing to music (including Indian folk and pop)'', ''pretend play (doctor, teacher)'', ''reading picture
    books'', ''group games like tag and hide-and-seek'', ''helping in the kitchen with simple tasks'', ''learning basic Indian dance steps'']'
  career_goals: Although still young, Thresiamma often talks about what she wants to be when she grows up. She expresses a desire to help other children, dreaming of becoming a preschool teacher who can
    read stories and sing songs. She also admires doctors in her family and sometimes says she wants to be a pediatrician, echoing the value her South‑Asian community places on caring professions. A more
    playful ambition is to become a dancer, especially learning Bharatanatyam or Bollywood style, reflecting her love of music and movement. Her long‑term ambition is to combine caring for others with creativity,
    perhaps as a teacher‑artist who designs engaging learning experiences.
