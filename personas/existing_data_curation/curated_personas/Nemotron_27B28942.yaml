personas:
  professional: Yany Plazola, a curious toddler who explores new textures and toys while firmly sticking to beloved bedtime routines, already shows an emerging blend of organization—sorting blocks by color—and
    flexibility—willingly reshaping play scenarios to keep peers smiling, and they eagerly offer shared toys in a cooperative manner.
  sports: Yany Plazola joins parent‑toddler swim lessons at the DeLand Aquatic Center, plays with the DeLand Little Tykes Soccer Club, and they cheer on the Orlando Magic during family movie nights, showing
    a budding love for water play and community team spirit.
  arts: Yany Plazola frequently bounces to the lively rhythms of artists like Juan Luis Guerra and Beyoncé during family Carnaval celebrations, and they also enjoy the colorful animated musical numbers
    of Disney films during nightly storytime, weaving music and movement into daily joy.
  travel: Yany Plazola’s travel adventures so far include family road trips to Orlando’s theme parks, a sunny beach day in Clearwater, and a short flight to visit relatives in the Caribbean, and they dream
    of one day riding an airboat through the Everglades’ mangrove waterways.
  culinary: Yany Plazola favors the creamy texture of mashed plantains (mangú), avocado puree, and sweet potato mash, skillfully grips a soft spoon to self‑feed, and they are fascinated by the bright colors
    of diced mango and pineapple that accompany family meals.
  core: Yany Plazola is a bright‑eyed, one‑year‑old explorer who blends the joyous rhythms of family festivals with a tender, cooperative spirit, often seen clutching a stuffed mango while giggling at the
    sparkle of dropped pennies.
background:
  cultural: Yany is raised in a bilingual Dominican household in DeLand, Florida. At home, Spanish is spoken alongside English, and daily meals feature staples like mangú, arroz con habichuelas, and fried
    plantains. Family gatherings celebrate Dominican traditions such as Carnaval, Dominican Independence Day, and religious observances like Semana Santa, with music, dance, and storytelling that surround
    her childhood. Her parents instill pride in her heritage through language, food, and cultural celebrations, while also encouraging integration into the broader Floridian community. This blend of Dominican
    customs and Southern Florida influences fosters a strong sense of identity, belonging, and appreciation for both cultures.
