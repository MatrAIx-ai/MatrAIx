  hobbies: '["Listening to merengue and bachata", "Dancing with parents", "Stacking soft blocks", "Exploring sand and water play", "Being read to", "Color matching games", "Simple kitchen helper activities"]'
  career_goals: Yany looks forward to starting preschool next year, where she hopes to learn to read, sing, and dance. She enjoys watching her older cousins and imagines herself becoming a teacher or a
    dancer—roles that blend her love for caring for others with her cultural love of music and rhythm. In the short term, her goal is to become a confident preschooler who can follow daily routines, interact
    positively with peers, and express herself through music and storytelling, laying the foundation for future aspirations of helping others and celebrating her Dominican heritage.
