personas:
  professional: Usha Saji is an emerging teenage visual artist who blends sketching, watercolor, and digital photography, using school projects and local gallery visits to develop a portfolio that reflects
    their curiosity about unconventional perspectives while staying organized through a meticulously kept art journal.
  sports: Usha Saji enjoys casual swimming during summer months and practices yoga at school, follows the city’s professional football (soccer) club and the national women’s cricket team on TV, and participates
    in a small after‑school badminton club where they value teamwork over competition.
  arts: Usha Saji immerses themselves in world music, regularly listening to sitar virtuoso Ravi Shankar and indie folk group Bon Iver, while drawing inspiration from painters like Frida Kahlo, contemporary
    illustrator Shaun Tan, and the cinematography of director Hayao Miyazaki, and they frequently attend local museum exhibitions featuring modern abstract and traditional folk art.
  travel: Usha Saji has visited a historic hill‑top fort on a family weekend trip, explored the bustling art districts of a nearby metropolis, and dreams of traveling to Kyoto’s cherry‑blossom gardens and
    the coastal streets of Barcelona to sketch street scenes and capture sunrise photos, and they often plan these trips through careful online research and sketching itineraries.
  culinary: Usha Saji loves cooking family recipes such as spiced lentil dal, fragrant turmeric rice, and flatbread made with whole wheat flour, relishing the aroma of cumin and mustard seeds while experimenting
    with plating techniques inspired by their watercolor studies, and they often record the flavors in their kitchen journal.
  core: Usha Saji balances a quiet, art‑driven curiosity with a kind‑hearted, organized approach to school and family life, occasionally slipping into procrastination over chores when a new sketchbook beckons,
    and they try to keep a tidy workspace despite the occasional mess.
background:
  cultural: Usha is a second‑generation South Asian American; her parents immigrated from the southern Indian state of Tamil Nadu and maintain a bilingual household where English and Tamil (with occasional
    Hindi) are spoken. Growing up in Austin, Texas, she balances American school life with cultural traditions such as celebrating Diwali, Holi, and attending community events at the local South Asian cultural
    center. Her family places high value on education, respect for elders, and communal harmony, while also encouraging her individual artistic expression. She often integrates South Asian motifs and stories
    into her artwork, reflecting a hybrid identity that honors both her heritage and her Texan environment.
