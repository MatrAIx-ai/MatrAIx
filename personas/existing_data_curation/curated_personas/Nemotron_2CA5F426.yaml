  career_goals: Usha hopes to merge her love of visual storytelling with her South Asian heritage by pursuing a career in graphic design, illustration, or cultural curation. She envisions studying visual
    communication or fine arts in college, eventually creating artwork—such as children’s books, murals, or museum exhibits—that celebrates and bridges South Asian and American narratives. She also dreams
    of using design to promote inclusive community projects and may explore UI/UX design as a way to blend technology with artistic expression.
