personas:
  professional: Eric Santos, a veteran Louisville police officer with 25+ years in criminal investigations and forensic evidence collection, applies their meticulous eye for detail honed by watercolor sketching
    to produce pristine crime scene documentation; they mentor junior detectives in de-escalation and are fiercely pursuing a senior detective promotion to lead a cold-case unit that integrates cutting-edge
    digital forensics and a community art outreach for at-risk youth.
  sports: Eric Santos follows the Louisville Cardinals basketball team and Kentucky Wildcats football with fervor, regularly attends Louisville City FC soccer matches, belongs to the Ohio River Anglers
    Association where they fish for catfish and trout, and hikes with the Louisville Outdoor Club during spring and fall, preferring low-impact activities over team sports.
  arts: Eric Santos immerses himself in the Louisville art scene by frequenting the Speed Art Museum and the Kentucky Museum of Art and History, sketches historic courthouses in watercolor after studying
    the works of Monet, Hopper, and Georgia O'Keeffe, and they find inspiration in classic jazz legends like Miles Davis, John Coltrane, and Billie Holiday while curating a small personal collection of
    regional paintings.
  travel: Eric Santos enjoys weekend escapades to the Appalachian foothills of Shenandoah National Park and cultural jaunts to New Orleans for its jazz heritage, has explored the historic streets of Savannah,
    Georgia, and dreams of a summer art-focused tour of Florence, Italy, and they favor meticulously planned itineraries that balance solitude in nature with vibrant city experiences.
  culinary: Eric Santos favors hearty Kentucky cuisine such as bourbon-glazed pork chops and the classic Hot Brown sandwich, relishes cooking freshly caught Ohio River trout with lemon-dill butter and a
    dash of smoked paprika, and often pairs their meals with a glass of locally distilled bourbon, while they occasionally indulge in ordering sushi rolls with avocado and ginger from a downtown sushi bar.
  core: Eric Santos blends a detective's analytical precision with an artist's quiet devotion, and they channel their love for solitary sketching, jazz, and fishing into a career focused on solving cold
    cases and mentoring others, while navigating a disciplined yet occasionally lax financial routine and a modest health regimen.
background:
  cultural: Eric was born and raised in a working‑class, white family in the suburbs of Louisville, Kentucky. His ancestors include German and Irish immigrants who settled in the region in the early 20th
    century, instilling values of hard work, modesty, and community service. Growing up, he absorbed Southern hospitality, a strong sense of civic duty, and a deep respect for law and order. While his surname
    hints at Hispanic heritage, his upbringing was rooted in the cultural traditions of Southern Kentucky, featuring local folk art, music, and a family background that emphasized compassion, self‑reliance,
    and public stewardship.
attributes:
  skills: '["Criminal investigations", "Forensic evidence collection", "Firearms proficiency", "Crisis negotiation", "Community policing", "Digital forensics", "Advanced defensive tactics", "Mentorship
    and training", "Observational analysis", "Report writing"]'
  hobbies: '["Visiting art galleries and museums", "Sketching and watercolor painting", "Reading mystery and historical nonfiction", "Fishing on the Ohio River", "Hiking in state parks", "Urban photography",
    "Model ship building", "Listening to classic jazz"]'
  career_goals: Eric aims to earn a promotion to senior detective within the Louisville Metro Police Department, focusing on cold‑case investigations and integrating cutting‑edge forensic methods. Over
    the next five years, he hopes to lead a specialized investigative unit, develop a police‑partnered community art outreach program for at‑risk youth, and, later in his career, transition into a consultancy
    role that allows him to train officers on crisis de‑escalation while pursuing his personal interest in curating local art collections.
