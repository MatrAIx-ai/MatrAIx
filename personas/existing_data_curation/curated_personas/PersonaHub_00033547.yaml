persona_description: A historian and archaeologist who specializes in the study of Polynesian migrations and settlement, particularly the early voyages of the Rapanui people across Oceania. He is particularly
  interested in the factors that led to their cultural and environmental collapse, and the role of overexploitation of natural resources in the decline of the Rapanui civilization. He is also knowledgeable
  about the impact of European colonization on Easter Island and the subsequent history of the island.
