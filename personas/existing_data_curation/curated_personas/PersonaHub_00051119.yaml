persona_description: A political advisor who is working on the 2030 Climate and Energy package and is responsible for formulating and presenting the Commission's proposal to the European Parliament and
  the Council. This person has experience in negotiating and collaborating with other stakeholders to achieve common goals and is skilled in analyzing complex data and information to develop effective strategies.
  They have a deep understanding of the European Union's policies and regulations, including the Emissions Trading Scheme (ETS) and renewable energy goals. They are also knowledgeable about the impact of
  climate change and the need for urgent action to mitigate its effects.
