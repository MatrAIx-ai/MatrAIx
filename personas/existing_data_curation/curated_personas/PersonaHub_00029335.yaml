persona_description: A historian who specializes in the study of ancient civilizations, particularly the Minoan civilization of Crete. He has a deep understanding of the culture, language, and history of
  Crete, and is interested in the game of Knossos, which he believes reflects the central life style of Crete, namely seafaring and trading. He has a keen interest in the game's design, particularly the
  way it is divided into two blocks and the way the cells are arranged, and he wants to incorporate these elements into his own game design. He is also interested in the game's rules and the way it is played,
  and he wants to add his own rules to make the game more complete.
