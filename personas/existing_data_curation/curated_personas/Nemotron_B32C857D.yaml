personas:
  professional: Ernestine Felton is a seasoned endurance athlete and emerging sports coach who designs periodized triathlon training programs, integrates art‑based visualization and music‑driven workouts,
    and leverages public speaking to mentor underserved youth while they pursue certification in sports management.
  sports: Ernestine Felton trains with the Niagara Falls Triathlon Club, cheers for the Buffalo Bills and Buffalo Sabres, participates in summer triathlon circuits and winter cross‑country skiing, and they
    organize community sports clinics that blend endurance training with creative visual cues.
  arts: Ernestine Felton frequents the Burchfield Penney Art Center to study abstract works by Jackson Pollock, attends Kamasi Washington jazz concerts and Kendrick Lamar hip‑hop shows, and they capture
    urban landscapes inspired by photographer Gordon Parks while sketching in a pocket sketchbook.
  travel: Ernestine Felton prefers spontaneous, culturally immersive trips, having explored the Montreal Jazz Festival, the historic streets of Kyoto, and the vineyards of Tuscany, while they plan future
    visits to the Rio de Janeiro Carnival and the Icelandic Aurora tours whenever their training calendar eases.
  culinary: Ernestine Felton experiments with Thai green curry, Ethiopian injera, and Japanese ramen, enjoys cooking with ingredients like tamarind, gochujang, and saffron, and they rate themselves an intermediate
    home chef who often hosts post‑race dinner parties to share eclectic flavors.
  core: Ernestine Felton blends high‑performance triathlon ambition with a love for abstract art, improvisational travel, and flexible budgeting, all while they juggle occasional disorganization and a habit
    of talking to themselves during workouts.
background:
  cultural: Ernestine is a Black American whose family traces its roots to the Great Migration, with grandparents who relocated from the South to upstate New York. Growing up in the diverse communities
    of Niagara Falls, she was immersed in African‑American church traditions, block parties, and cultural celebrations such as Juneteenth and Kwanzaa. This upbringing fostered a strong pride in Black heritage
    and a commitment to community uplift, influencing her mentorship initiatives, artistic pursuits, and appreciation for Black artistic expressions like jazz, hip‑hop, and Afro‑centric visual motifs.
attributes:
  skills: '[''Endurance swimming'', ''Road cycling'', ''Marathon running'', ''Periodized training design'', ''Sports nutrition planning'', ''Mental resilience coaching'', ''Race logistics coordination'',
