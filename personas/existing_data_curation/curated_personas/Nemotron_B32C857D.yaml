  hobbies: '[''Abstract painting'', ''Photography'', ''Visiting art galleries'', ''Live jazz and hip‑hop concerts'', ''Cooking international cuisine'', ''Yoga'', ''Meditation'', ''Traveling to cultural
    festivals'', ''Reading contemporary fiction'', ''Volunteering at youth sports programs'']'
  career_goals: Ernestine aims to qualify for the U.S. National Triathlon Championships within the next two years and earn a spot on the national team. Long‑term, she plans to transition into coaching by
    establishing a community‑based sports academy for underserved youth in Niagara County, with a special focus on empowering Black girls in athletics. She also aspires to develop a personal brand centered
    on holistic athlete wellness, launching a podcast and a line of sustainable activewear. To support these ambitions, she intends to earn a certification in sports management and pursue mentorship opportunities
    that broaden her impact on the next generation of athletes.
