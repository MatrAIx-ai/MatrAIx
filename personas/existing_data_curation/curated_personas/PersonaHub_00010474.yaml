persona_description: A researcher and scientist who specializes in the evaluation and use of alternative sealants to reduce seepage losses in canals. They are interested in understanding the effectiveness
  of bio-based sealants in reducing seepage rates and the potential cost savings for irrigation districts. They are also interested in learning about the two different types of sealants being tested, Innovium
  Corp.'s CanalSentry and Seepage Control, Inc.'s ESS-13, and the benefits and drawbacks of each.
