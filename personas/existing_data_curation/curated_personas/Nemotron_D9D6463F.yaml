personas:
  professional: Stacey Nystrom, a budding biotech research assistant and junior data scientist, leverages Python, R, SQL, and hands‑on lab techniques to build rapid prototypes, thrives in hackathon pressure
    with a competitive edge, yet often wrestles with deadlines due to their spontaneous and flexible work style.
  sports: Stacey Nystrom fuels their fitness regime with spontaneous bike rides on the Blue Ridge trails, regular hikes with the Asheville Adventure Club, follows the Charlotte Hornets for a steady stream
    of competitive inspiration, and occasionally joins a local cycling group called BikeRiders Collective for weekend rides, balancing active recreation with a love for nature.
  arts: Stacey Nystrom channeled their improvisational flair into a local improv theater troupe, sketches futuristic sci‑fi concepts inspired by Beeple and Isaac Asimov, crafts glitchy electronica on vintage
    synthesizers reminiscent of Aphex Twin, and streams indie game soundtracks like Celeste while admiring performances by Tilda Swinton, weaving these artistic threads into their identity.
  travel: Stacey Nystrom prefers spontaneous road trips, having driven to Shenandoah National Park for a weekend hike and flown to New York City for a hackathon, while dreaming of a tech‑focused excursion
    to Tokyo’s Akihabara district and an adventure‑filled trek to Iceland’s volcanic landscapes, balancing budget constraints with a craving for both cultural immersion and natural wonder.
  culinary: Stacey Nystrom enjoys a palate tuned to Korean‑BBQ tacos, ramen with miso‑enhanced broth, and the occasional poutine, cooks at a competent home‑chef level using sriracha and matcha in experimental
    dishes, and frequently experiments with sourdough starters for weekend baking sessions.
  core: Stacey Nystrom is a competitive, spontaneous biotech tinkerer who battles intense anxiety with yoga, jumps into hackathons and hiking trails alike, and occasionally splurges on vintage synth gear
    while forgetting to file paperwork on time.
background:
  cultural: Stacey was raised in a middle‑class family in the suburban neighborhoods surrounding Winston‑Salem, North Carolina. The area combines a traditional Southern hospitality with a rising tide of
    research and technology, influenced by the nearby Research Triangle. Her parents placed a strong emphasis on education and curiosity, encouraging early participation in STEM clubs, science fairs, and
    community coding workshops. While attending public schools she also engaged with local community centers and youth groups, fostering a sense of communal responsibility. This blend of Southern values—friendliness,
    modesty, and a strong work ethic—and exposure to a progressive, innovation‑driven academic environment has shaped Stacey’s pragmatic yet open‑minded outlook, informing both her personal pursuits and
    professional aspirations.
attributes:
  skills: '[''Python programming'', ''R for statistical analysis'', ''SQL database querying'', ''Machine learning basics'', ''PCR and gel electrophoresis'', ''Cell culture techniques'', ''Microscopy'',
