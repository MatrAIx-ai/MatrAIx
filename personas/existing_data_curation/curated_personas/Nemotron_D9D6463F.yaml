  hobbies: '[''Hiking in the Blue Ridge Mountains'', ''Spontaneous bike rides'', ''Indie video gaming'', ''Escape room puzzles'', ''Improvisational theater'', ''Sci‑fi sketching and digital illustration'',
    ''Yoga and mindfulness meditation'', ''Science‑fiction and tech blogging'', ''DIY electronics projects'', ''Vintage synthesizer tinkering'']'
  career_goals: Stacey intends to leverage her blend of computational and laboratory skills in a biotech or health‑tech startup, ideally as a research assistant or junior data scientist. Over the next two
    years she plans to pursue a master’s degree in bioinformatics while taking on short‑term consulting projects that let her experiment with AI‑driven tools for personalized medicine. Her long‑term ambition
    is to lead a multidisciplinary team that creates accessible, data‑focused health solutions, and she hopes to contribute open‑source software that bridges the gap between wet‑lab research and computational
    analysis. She seeks environments that value flexibility and innovative thinking, allowing her to balance her spontaneous nature with her desire for impactful work.
