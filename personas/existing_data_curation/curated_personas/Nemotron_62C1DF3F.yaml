  hobbies: '[''building blocks'', ''drawing'', ''singing Mexican folk songs'', ''dancing'', ''pretend firefighting'', ''watching cartoons'', ''playing soccer'', ''helping in the kitchen'', ''storytelling'']'
  career_goals: Jorge dreams of becoming a firefighter because he loves the idea of helping people and being in the middle of exciting action. He also imagines himself as a teacher who can tell stories
    and guide younger children, reflecting his talkative and sociable nature. He aspires to read fluently in both English and Spanish, perform in a school play, and one day play on a youth soccer team,
    combining his love of attention, practicality, and teamwork.
