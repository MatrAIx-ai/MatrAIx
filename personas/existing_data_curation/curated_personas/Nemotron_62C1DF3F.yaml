personas:
  professional: Jorge Marquez, a 4‑year‑old future architect in the making, constructs elaborate block cities, balancing curiosity about new designs with practical stacking methods, while their sociable,
    talkative nature turns playdates into collaborative building workshops where they naturally take the spotlight.
  sports: Jorge Marquez, a 4‑year‑old who dashes through the playground with boundless energy, attends a preschool soccer club named Tiny Kickers, proudly waves a miniature cap of the hometown baseball
    team the Tigers, and enjoys occasional free‑play gymnastics sessions to stay active.
  arts: Jorge Marquez, a 4‑year‑old who bursts into spontaneous sing‑alongs of The Wiggles' 'Fruit Salad' and mimics Elmo's squeaky laugh from Sesame Street, spends afternoons doodling bright dinosaurs,
    and eagerly watches Pixar's 'Toy Story' starring Tom Hanks.
  travel: Jorge Marquez, a 4‑year‑old whose family adventures have taken him to the nearby city zoo and a sun‑kissed beach where he built sandcastles, dreams of next summer's trip to Disneyland in California
    and, someday, a far‑off voyage to see the Eiffel Tower in Paris.
  culinary: Jorge Marquez, a 4‑year‑old who can proudly spread peanut butter on toast with a plastic knife, revels in cheesy macaroni, crunchy carrot sticks, and strawberry‑topped pancakes, and insists
    on dipping every bite of chicken nuggets in ketchup, showing a delightfully messy but adventurous palate.
  core: Jorge Marquez, a curious and chatty 4‑year‑old, constantly builds towering block castles, trades shiny stickers with friends, and can’t resist a nightly snack of gummy bears before bedtime.
background:
  cultural: Jorge is raised in a Mexican‑American household in Converse, Texas, where Spanish and English are spoken at home, giving him early bilingual exposure. Family gatherings feature traditional dishes
    like tacos, tamales, and pozole, and celebrations such as Día de los Muertos, Cinco de Mayo, and Christmas with posadas. He participates in community events at the local church, enjoys listening to
    mariachi and norteña music, and often learns simple cultural dances from his grandparents. The strong emphasis on family, respect for elders, and communal festivities shapes his sociable personality
    and his love for music, storytelling, and shared activities.
attributes:
  skills: '[''verbal communication'', ''storytelling'', ''basic counting'', ''number recognition'', ''color recognition'', ''fine motor coordination'', ''block building'', ''simple problem solving'', ''social
