    Team Collaboration'', ''Problem Solving under Pressure'']'
  hobbies: '[''Basketball (pickup games)'', ''Beach volleyball'', ''Hiking (Lake Louisa State Park)'', ''Scuba diving'', ''Science outreach volunteering'', ''Acoustic guitar playing'', ''Experimental cooking'',
    ''Board‑game nights'', ''Yoga and meditation'', ''Reflective journaling'']'
  career_goals: In the near term, Donald aims to become a senior research chemist leading a small, high‑impact team within a materials‑focused company, adding two peer‑reviewed publications and a patent
    to his portfolio. Over the next five years, he plans to pursue a master's degree (or a PhD if opportunity arises) specializing in sustainable polymers, with the ambition to develop a commercially viable
    biodegradable material that reduces reliance on petrochemicals. Ultimately, he envisions heading an R&D division where he can shape corporate sustainability strategies, mentor emerging scientists, and
    champion inclusive outreach programs that introduce STEM to under‑represented youth. Throughout his career progression, he seeks roles that promote work‑life balance and provide resources for mental‑health
    resilience.
