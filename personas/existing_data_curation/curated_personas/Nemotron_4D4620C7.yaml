personas:
  professional: Donald Angell, a 27‑year‑old analytical chemist specializing in polymer materials, blends rigorous DOE‑driven experimentation with a collaborative, high‑energy communication style—honed
    through weekly farmers‑market volunteer demos and community outreach—to lead small research projects while mentoring junior staff, and constantly balances his curiosity for sustainable breakthroughs
    with a practical, deadline‑driven mindset.
  sports: Donald Angell fuels his competitive spirit by playing pickup basketball at a downtown Orlando gym, joining a beach‑volleyball club at Cocoa Beach during summer, hiking Lake Louisa State Park trails
    on weekends, cheering on the Orlando Magic and streaming Tampa Bay Lightning games, and logging his workouts in a fitness app to track progress while supporting neighborhood leagues that embody his
    community’s hospitality‑driven spirit.
  arts: Donald Angell unwinds by strumming acoustic guitar to the mellow riffs of John Mayer and the breezy chords of Jack Johnson, hosts board‑game evenings featuring Settlers of Catan and Azul, regularly
    attends Orlando Fringe Festival shows to see emerging folk acts like The Blue Jays, and finds visual and lyrical inspiration in Wes Anderson’s films and Lin‑Manuel Miranda’s Broadway scores.
  travel: Donald Angell prefers meticulously planned weekend getaways that blend adventure and relaxation, having already explored the coral reefs of Key West, hiked the Appalachian Trail in North Carolina,
    and sampled street food in Bangkok, while dreaming of a road trip along the Pacific Coast Highway and a future trek through Patagonia’s Torres del Paine National Park, all budgeted with the frugal planning
    values of his suburban upbringing.
  culinary: Donald Angell, a self‑taught home chef, delights in crafting fusion dishes such as mango‑ponzu grilled mahi‑mahi tacos with pickled red cabbage, black‑bean and sweet‑potato burgers topped with
    avocado‑lime aioli, and incorporating exotic ingredients like miso paste, chipotle adobo, and fresh cilantro to blend Florida’s seafood bounty with Asian and Latin flavors, often sourcing the freshest
    produce at local farmers markets.
  core: Donald Angell balances a high‑octane social life and relentless scientific curiosity with daily mindfulness practices, channeling anxiety into productivity while occasionally splurging on guitar
    gear and impulsive travel plans.
background:
  cultural: Donald grew up in a middle‑class, white family in Seminole County, Central Florida. His parents emphasized practical education and a strong work ethic, values that dovetail with the region’s
    blend of suburban reliability and entrepreneurial spirit. The multicultural mosaic of Greater Orlando exposed him to diverse cuisines, music, and community events, fostering an open and sociable outlook
    while retaining a core of traditional American individualism. He participates in local traditions such as farmers‑market visits, supports the Orlando Magic, and enjoys the Southern‑style hospitality
    that characterizes personal interactions in the area. This cultural backdrop, combined with his STEM education, shapes his balanced appreciation for both innovative ideas and established methods.
attributes:
  skills: '[''Analytical Chemistry (GC‑MS, HPLC)'', ''Materials Synthesis (sol‑gel, polymerization)'', ''Materials Characterization (SEM, TEM, XRD, FTIR)'', ''Data Analysis (Python, MATLAB)'', ''Design
