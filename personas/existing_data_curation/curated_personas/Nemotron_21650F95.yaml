personas:
  professional: Ann Lau, a veteran locksmith and safe-repair specialist with three decades of hands-on experience, blends meticulous mechanical expertise with emerging electronic lock technologies, leveraging
    their methodical problem-solving and community-focused mindset to expand their Oconee County business, certify apprentices, and they position themselves as a trusted consultant.
  sports: Ann Lau cheers on the Clemson Tigers football team and the Atlanta Braves in the spring, walks the winding trails of Oconee County with the local senior walking club each weekend, and joins a
    gentle yoga class at the community center to keep flexible, balancing a love of low-impact exercise with a friendly competitive spirit, and they enjoy occasional shuffleboard games at the senior center.
  arts: Ann Lau weaves a love for heritage into their creative life, crafting intricate quilts inspired by the patterns of traditional Appalachian folk art while listening to the harmonies of Gillian Welch
    and the timeless gospel of The Blind Boys of Alabama, and they regularly attend the local community theater's productions of classic Southern plays like The Glass Menagerie.
  travel: Ann Lau plans their trips with a careful checklist, favoring weekend road-escapes to historic towns such as Savannah, Georgia, Charleston, South Carolina, and Asheville, North Carolina, and dreams
    of a leisurely spring pilgrimage to St. Andrews by the sea in Scotland, balancing their love of heritage tourism with a modest budget and family commitments, and they often map out routes on paper before
    hitting the road.
  culinary: Ann Lau, an adept home cook, harvests tomatoes, basil, and sweet peppers from their garden to flavor classic Southern staples like chicken and dumplings, collard greens seasoned with smoked
    ham hocks, and peach cobbler topped with fresh whipped cream, while they occasionally over-salt the gravy in their quest for bold taste.
  core: Ann Lau blends meticulous lock-craftsmanship with Southern hospitality, juggling a love for quilting, a penchant for over-salting sauces, and an unwavering commitment to community service that keeps
    them both grounded, while they remain constantly on the go.
background:
  cultural: Ann Jean was raised in a traditional Southern white family in upstate South Carolina. Her upbringing emphasized hospitality, church involvement (Baptist), and community service, reflecting Anglo‑American
    and German ancestry that values craftsmanship and self‑reliance. She maintains strong ties to extended family, participates actively in local church and civic organizations, and embraces regional customs
    such as shared meals, storytelling, and preserving local traditions.
