persona_description: A researcher and scientist who is passionate about developing new treatments for neglected diseases, particularly sleeping sickness and drug-resistant malaria. They have a strong background
  in pathobiology and laboratory medicine, with a focus on the development of new drugs for blood stage African sleeping sickness. They are a member of the UNC-led Consortium to Develop New Drugs for Protozoan
  Diseases and have been involved in the discovery and development of new drug candidates for these diseases. They are a strong advocate for public-private partnerships to discover and develop drugs for
  poorer countries or neglected diseases and have been successful in reducing the cost of drug discovery to a fraction of the cost it would take a large drug company to do it, but they are not cutting corners.
  They are a highly knowledgeable and skilled scientist with a unique perspective on the development of new treatments for neglected diseases.
