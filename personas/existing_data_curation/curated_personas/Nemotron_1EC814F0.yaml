personas:
  professional: Leodegario Correa is a budding young illustrator who blends vibrant Colombian-inspired landscapes with meticulous, Lego-inspired geometric precision, channeling their disciplined, detail‑oriented
    mindset into every sketch.
  sports: Leodegario Correa thrills at weekend soccer matches with friends at San Antonio’s Brackenridge Park, proudly cheering for San Antonio FC and keeping a meticulous record of goals scored in a hand‑drawn
    notebook.
  arts: Leodegario Correa immerses themselves in vibrant drawings inspired by Fernando Botero’s exaggerated figures and the rhythmic beats of cumbia and vallenato, regularly attending San Antonio Museum
    of Art workshops and practicing dance steps after each art session.
  travel: Leodegario Correa delights in family road trips to the historic streets of Cartagena and local explorations of the San Antonio River Walk, always packing a sketchbook to capture new scenes while
    insisting on a structured itinerary that leaves room for spontaneous nature hikes.
  culinary: Leodegario Correa loves the sweet, cheesy taste of arepas de queso and the spicy crunch of empanadas, often helping to stir the batter with a wooden spoon despite making a mess, and they eagerly
    request a side of mango salsa with every meal.
  core: Leodegario Correa is a meticulously organized seven‑year‑old with a boundless curiosity for art, science, and soccer, whose disciplined perfectionism sometimes turns playful creativity into a quest
    for flawless results.
background:
  cultural: Leodegario grows up in a Colombian‑American household where Spanish is spoken alongside English, and Colombian traditions like celebrating Carnaval, enjoying traditional foods such as arepas,
    and listening to folk music are woven into daily life. Living in San Antonio, he also participates in the local Hispanic community's festivals, parades, and cultural gatherings, enriching his sense
    of identity with a blend of Colombian heritage and Texan influences.
