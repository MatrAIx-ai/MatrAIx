    ''Experimental cooking'', ''Watching indie film festivals'', ''Karaoke nights with friends'']'
  career_goals: Brandi dreams of opening her own boutique salon that doubles as a creative studio where clients can experience bespoke nail art alongside mini art workshops. She plans to develop a line
    of vegan, cruelty‑free nail polishes featuring unique, artist‑inspired pigments and to distribute them locally and online. Over the next few years she aims to become a recognized Midwest authority on
    nail design, contributing a regular column to a regional lifestyle magazine and speaking at industry conferences. Brandi also wants to give back by offering free nail‑care days at senior centers and
    by mentoring a small cohort of apprentices through quarterly workshops. Ultimately, she hopes to teach part‑time at a community college, blending hands‑on cosmetology training with lessons on color
    theory and artistic expression, while maintaining the flexible schedule that lets her indulge in personal creative projects.
