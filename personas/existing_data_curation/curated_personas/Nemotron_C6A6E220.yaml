personas:
  professional: A seasoned nail artist, Brandi Matheis transforms each client’s manicure into an abstract canvas, leveraging their expertise in gel, acrylic, and airbrush techniques while also handling
    salon bookkeeping, inventory management, and community workshop facilitation with a delightfully relaxed, occasionally chaotic, schedule.
  sports: An outdoor‑enthusiast, Brandi Matheis spends weekends hiking the Hoosier National Forest trails, participates in the Evansville Trail‑Blazers walking club, practices gentle yoga to relieve salon‑related
    muscle tension, and avidly roots for the Evansville Purple Aces basketball team during the season.
  arts: A devoted aficionado of visual and performing arts, Brandi Matheis frequents the Evansville Art Fair, draws inspiration from abstract masters such as Wassily Kandinsky and contemporary painter Julie
    Mehretu, enjoys indie film festivals featuring directors like Wes Anderson and Jia‑Yuanyuan, and occasionally belts out karaoke classics like Bohemian Rhapsody with friends.
  travel: A spontaneous traveler, Brandi Matheis favors short road trips to art‑rich locales—such as a weekend in Asheville, North Carolina for its vibrant gallery scene, a planned pilgrimage to Florence,
    Italy to study Renaissance palettes, and a coveted future visit to Kyoto’s historic gardens—while balancing a modest travel budget that reflects the financial commitments of launching their boutique
    salon.
  culinary: An experimental home chef, Brandi Matheis loves crafting vibrant vegan dishes like beet‑infused risotto, matcha‑glazed tofu, and rosemary‑scented mushroom tart, often sourcing fresh herbs from
    their garden and pairing meals with artisanal kombucha, while occasionally indulging in late‑night pizza deliveries after marathon karaoke sessions.
  core: Brandi Matheis, a 49‑year‑old nail‑art virtuoso, blends abstract painting with manicure mastery, fuels creativity through garden hues, vintage postcards, and karaoke, and balances a relaxed, socially
    vibrant lifestyle while plotting a boutique art‑studio salon.
background:
  cultural: Brandi grew up in a modest, middle‑class family in southwestern Indiana, absorbing the Midwestern values of hospitality, community involvement, and a pragmatic work ethic. Although she is of
    European descent and identifies as white, her upbringing was shaped by the small‑town culture of Evansville and Gibson County, where close‑knit neighborly ties coexist with a growing appreciation for
    local arts and festivals. The region’s blend of traditional values and a slowly expanding creative scene encouraged her to pursue a cosmetology career while nurturing a love for abstract art and novelty.
    Her divorce in her early forties reinforced a sense of independence common among many women in the area, and her continued participation in community events, volunteer projects, and local artistic gatherings
    reflects a deep commitment to her regional heritage.
