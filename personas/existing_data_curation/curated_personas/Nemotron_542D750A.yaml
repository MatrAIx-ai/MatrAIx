  hobbies: '[''painting'', ''community theater improv'', ''gardening'', ''folk music and dancing'', ''trivia nights'', ''DIY home improvement'', ''reading sci-fi'', ''experimental cooking'', ''volunteering
    at library'', ''hiking'']'
  career_goals: Katherine aims to earn an OSHA safety certification and move into a supervisory role on the warehouse floor, where she can mentor younger workers and shape safer, more efficient processes.
    She also dreams of turning her knack for upcycling and illustration into a modest side business that sells handcrafted items made from reclaimed materials. By blending her logistical expertise with
    her creative passions, she hopes to leave a lasting impact on both her workplace and her local community, perhaps by organizing workshops that teach practical crafts to fellow residents.
