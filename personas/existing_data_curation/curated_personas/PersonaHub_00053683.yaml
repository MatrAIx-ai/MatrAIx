persona_description: A person who is interested in environmental management and pollution control, particularly in the certification of pollution control managers and the improvement of pollution prevention
  systems in specific factories. They are likely to be a professional in the field of environmental science or engineering, with a background in water pollution control, air pollution control, and the establishment
  of infrastructure for pollution control. They may also have expertise in the Measurement Law and the certification of water quality measurement, as well as the registration of certified analysts for the
  public measure system. They are likely to be familiar with the roles and responsibilities of pollution control managers, supervisor for pollution control, and chief pollution control manager, and may
  have experience in the establishment and management of infrastructure for pollution control. They are also likely to have knowledge of the Environmental sector on the qualification system, as it relates
  to the technological category related to environmental problem.
