persona_description: A high-performance RF synthesizer designer who is interested in understanding and optimizing the performance of RF synthesizers using a variety of input reference signals. They are
  also concerned with the impact of input reference noise on the synthesizer's phase noise and are looking for ways to mitigate the effects of external influences on the input reference signal. They are
  familiar with the basics of RF synthesis and have experience designing RF synthesizers, but are looking for more advanced and specialized information to improve their design and optimization techniques.
  They are also interested in the latest research and developments in the field of RF synthesis and are open to learning new techniques and approaches to improve the performance of their RF synthesizers.
