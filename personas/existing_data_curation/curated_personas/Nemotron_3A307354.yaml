  hobbies: '["Hiking", "Photography", "Museum and gallery visits", "Acoustic guitar", "Open‑mic performances", "Improv theater", "Reading philosophy", "Cooking international cuisine", "Volunteer work at
    youth art programs", "Conversational Spanish"]'
  career_goals: Youssef aspires to turn his passion for art and community into a sustainable career. He aims to secure a position as a community arts coordinator or program manager at a nonprofit organization,
    where he can design workshops, curate local exhibitions, and foster inclusive cultural events. To strengthen his prospects, he plans to complete a GED and enroll in an arts‑administration certificate
    program at a nearby community college, eventually building a freelance consultancy that helps small towns like Evansville develop vibrant public art initiatives.
