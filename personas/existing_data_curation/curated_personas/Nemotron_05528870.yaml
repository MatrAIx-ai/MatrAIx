  career_goals: Anthony aims to move into a supervisory role, such as shift manager or catering coordinator, within the next two years. He plans to earn a ServSafe Manager certification and enroll in a
    bachelor's program in hospitality management to broaden his leadership skills. Long‑term, he envisions opening a small community‑focused eatery or food‑truck that showcases Southern comfort food and
    provides mentorship opportunities for local youth.
