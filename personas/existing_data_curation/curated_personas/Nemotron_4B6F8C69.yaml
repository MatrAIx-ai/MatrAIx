  career_goals: Trishna aims to transition from an individual sales agent to the owner of a boutique brokerage that specializes in residential and luxury homes in Loudoun County. She plans to earn advanced
    certifications such as the Certified Residential Specialist (CRS) and the Accredited Buyer’s Representative (ABR) within the next three years. Leveraging her curiosity for technology, she intends to
    integrate AI‑driven pricing tools and immersive virtual‑reality showings to differentiate her listings. Long‑term, she hopes to build a diversified real‑estate investment portfolio that includes affordable
    housing projects for the South‑Asian community, and to mentor more women from immigrant backgrounds seeking careers in real estate.
