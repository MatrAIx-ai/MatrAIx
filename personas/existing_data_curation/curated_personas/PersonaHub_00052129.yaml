persona_description: A business leader with a focus on global trade, particularly in the areas of technology and innovation. They are interested in the integration of technology into the global economy
  and the potential for transformative technologies to drive economic growth and job creation. They are also aware of the challenges faced by businesses in an integrated global economy, including the absence
  or inadequacy of global rules in crucial areas and the importance of tracking the changing nature of trade. They are committed to working with governments and the international private sector to define
  a World Trade Agenda that promotes inclusive and multilateral trade, with a focus on economic growth and job creation.
