personas:
  professional: Angel Guzman, a seasoned community service manager with a graduate background in education, blends bilingual grant writing and arts‑based therapeutic programming to design flexible, culturally
    responsive senior initiatives, yet often battles with tight deadlines due to a spontaneous work style.
  sports: Angel Guzman, a regular walker along Lake Michigan, enjoys senior fitness classes at the local community center, follows the Milwaukee Bucks and Green Bay Packers passionately, and participates
    in a weekend walking club that meets at the Milwaukee Botanical Garden.
  arts: Angel Guzman spends quiet afternoons at the Milwaukee Art Museum absorbing contemporary installations, practices watercolor inspired by island memories, reads poetry by Octavio Paz and Maya Angelou,
    and shares the rhythmic beats of bomba and plena at intimate storytelling circles.
  travel: Angel Guzman delights in weekend escapes to Door County’s lighthouses, cherishes past visits to historic colonial streets of Old San Juan, and dreams of exploring Cartagena’s colorful plazas,
    always traveling with a notebook to sketch scenes and collect local recipes.
  culinary: Angel Guzman, an avid collector of vintage island cookbooks, skillfully crafts mofongo with plantains and sofrito, prepares aromatic arroz con gandules with adobo‑spiced beans, and enjoys experimenting
    with fresh cilantro, garlic, and lime in small gatherings.
  core: Angel Guzman, a 74‑year‑old art‑loving community mentor, weaves cultural heritage into senior services while battling spontaneous habits, deadline anxiety, and a tender heart for healing through
    creativity.
background:
  cultural: Angel's cultural roots are firmly planted in Puerto Rico, where her parents grew up before emigrating to the mainland United States. Raised in a bilingual household, she learned Spanish at home
    and English at school, preserving the island's traditions through family celebrations of Dia de la Constitucion, Noche de San Juan, and the annual parade of la Calle San Sebastian. In Milwaukee she
    has become a bridge between the city's growing Puerto Rican diaspora and the broader community, volunteering with local cultural organizations, promoting Spanish-language services, and championing Puerto
    Rican folk music and dance. Her identity blends the warmth and resilience of island culture with Midwestern values of community service and modesty.
attributes:
  skills: '[''Community Outreach'', ''Program Development'', ''Grant Writing'', ''Bilingual Communication (English/Spanish)'', ''Crisis Intervention'', ''Conflict Resolution'', ''Mentorship for Older Adults'',
    ''Arts-Based Therapeutic Programming'', ''Cultural Competency'', ''Advocacy for Senior Services'']'
  hobbies: '[''Watercolor painting'', ''Visiting art museums'', ''Reading poetry and nonfiction'', ''Cooking Puerto Rican cuisine'', ''Gardening'', ''Lake Michigan walks'', ''Attending intimate cultural
    storytelling circles'', ''Listening to bomba and plena'', ''Collecting vintage cookbooks'', ''Exploring new ideas through lectures and workshops'']'
  career_goals: She aspires to mentor emerging social workers, launch an intergenerational arts and heritage program that shares Puerto Rican traditions with Milwaukee seniors, secure sustainable grant
    funding for community mental-health counseling, and document her journey in a memoir that highlights the intersection of education, social service, and cultural identity. Her ambition is to ensure that
    the initiatives she creates remain adaptable, people-centered, and capable of supporting emotionally vulnerable elders long after she steps down, while also promoting artistic expression as a pathway
    to healing.
