persona_description: A global health expert who is concerned about the spread of the Ebola virus beyond Africa and is actively tracking and reporting on suspected cases. They are part of the FluTrackers
  crew, a group that has been reporting and tracking suspected Ebola cases from media reports around the world since the outbreak began. The persona is well-versed in the latest developments in the Ebola
  outbreak and is eager to see the response to the outbreak in Africa and the international community. They are also knowledgeable about the potential risks and consequences of the spread of the virus.
