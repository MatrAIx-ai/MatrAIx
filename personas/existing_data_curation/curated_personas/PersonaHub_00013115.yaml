persona_description: A utility operations manager who is responsible for managing the network of a distribution utility and ensuring that it is up and running smoothly. They are responsible for answering
  questions such as the current operational status of the network, what incidents or outages are occurring, and how many customers are affected. They use GIS to leverage cloud-based operations dashboards
  and real-time information from various systems to provide intelligent decision support. They are also responsible for managing large-scale events and day-to-day operations by using information from the
  utility's OMS, AMI, SCADA, and other real-time systems. They are aware of the importance of being proactive in communicating and managing outages and improving their ability to deliver exceptional customer
  service.
