persona_description: A geologist who specializes in the study of the Upper Cambrian Basal Deadwood Formation in the Black Hills of South Dakota. He or she is likely to be interested in the formation of
  borings in quartzite surf boulders and their geological significance. The geologist may have a background in sedimentary rock formation and the study of trace fossils, and may be interested in the broader
  context of rock formations and their impact on the history of life on Earth. The geologist may also be interested in the study of paleontology and the identification of similar rock formations in other
  regions.
