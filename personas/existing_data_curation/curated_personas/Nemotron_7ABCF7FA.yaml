  career_goals: Although retired, Amyjo remains focused on meaningful contributions and personal legacy. She aims to expand the Bloomfield Hills Historical Society’s digital archives, author a memoir and
    a comprehensive family genealogy book, and mentor her grandchildren and local youth in research and writing. She also seeks to maintain her health and independence through a disciplined daily routine
    and, on a competitive note, hopes to win senior bridge tournaments at her local club. Additionally, she plans to continue organizing community events that reinforce neighborhood connections.
