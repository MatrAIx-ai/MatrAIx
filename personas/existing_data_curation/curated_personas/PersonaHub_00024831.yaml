persona_description: A mental health professional who specializes in treating individuals with post-traumatic stress disorder (PTSD) and has extensive experience in assessing and diagnosing the condition
  through the use of the Diagnostic and Statistical Manual of Mental Disorders (DSM-5). This professional has a deep understanding of the diagnostic criteria for PTSD and is able to accurately identify
  and classify individuals who meet the criteria for the condition. They have a keen interest in understanding the nature of the traumatic event that led to the development of PTSD and how it has affected
  the individual's life. They are skilled in providing support and treatment for individuals with PTSD, including the use of cognitive-behavioral therapy and other evidence-based interventions.
