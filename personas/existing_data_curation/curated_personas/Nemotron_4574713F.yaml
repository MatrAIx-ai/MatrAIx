  hobbies: '[''gardening (heirloom vegetables)'', ''watercolor painting'', ''bird-watching'', ''digital photography'', ''reading poetry and philosophy'', ''listening to jazz and blues'', ''harmonica playing'',
    ''writing journal entries'', ''volunteering at the library'']'
  career_goals: Jarquez hopes to compile a community oral-history archive of older African American residents in Dillon County and publish a modest book that preserves their stories. He also wants to develop
    a small local exhibition of his wood-carved and watercolor works at the town community center, giving the neighborhood a quiet space to appreciate art. In addition, he aims to mentor a teenager in basic
    carpentry and storytelling, while continuing his own learning in digital archiving and photography, creating a lasting personal legacy rather than seeking formal employment.
