  career_goals: In the next three to five years, Ran aims to advance to a senior sales engineer role, taking ownership of high‑value accounts and leading cross‑functional project teams. He also seeks to
    mentor junior colleagues and develop expertise in emerging sustainable technologies. Long‑term, he aspires to transition into product management or regional sales leadership, where he can shape product
    strategy, expand market presence, and drive innovation while maintaining his commitment to helping clients succeed.
