personas:
  professional: Ran Atwood is a 23‑year‑old sales engineer who translates complex technical specs into clear client benefits, leveraging strong CAD and data‑analysis skills while balancing curiosity for
    new sustainable tech with a practical, result‑oriented sales approach, and they maintain a personable demeanor that wins over diverse audiences.
  sports: Ran Atwood plays in the Lansdale United adult soccer league, hikes the Appalachian Trail ridges each spring, cheers the Philadelphia Eagles and Phillies, and they combine weekly group workouts
    with occasional pickup basketball, preferring team‑oriented activity over solo training.
  arts: Ran Atwood curates board‑game nights featuring scores from Hans Zimmer, enjoys live folk shows by The Avett Brothers, watches contemporary theater productions at the Walnut Street Theatre, and they
    dabble in building custom LED displays that double as art installations, reflecting a blend of technical flair and creative appreciation.
  travel: Ran Atwood favors short, spontaneous weekend road trips to nearby historic towns like Gettysburg and the Poconos, while dreaming of backpacking the Scottish Highlands and exploring Tokyo’s tech
    districts, and they plan each adventure on a spreadsheet to balance cost, time off work, and group availability.
  culinary: Ran Atwood loves cooking hearty family meals such as spaghetti carbonara, shepherd’s pie with rosemary potatoes, and grilled sausages seasoned with smoked paprika, showing solid kitchen skills
    but they sometimes over‑season dishes while sharing homemade nachos with jalapeño slices at game nights.
  core: Ran Atwood blends a social, community‑driven spirit with a practical tech‑sales mindset, often juggling too many commitments, forgetting to floss, and hoarding spare wires for the next DIY project.
background:
  cultural: Raised in Lansdale, Pennsylvania, Ran grew up in a middle‑class white family that emphasized community involvement, education, and practical work ethic. His cultural upbringing reflects typical
    Mid‑Atlantic American values—reliability, neighborly support, and participation in local traditions such as Fourth of July parades, community fairs, and church activities. Family roots include German‑American
    and Irish‑American heritage, which have contributed to a blend of cultural customs ranging from holiday celebrations to a strong sense of cooperation and service.
