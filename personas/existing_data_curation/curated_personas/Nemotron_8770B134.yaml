personas:
  professional: Lariza Colon, a curious 4‑year‑old who loves sorting Lego bricks by color and shape, imagines themselves as a future architect and already organizes playtime projects with methodical precision,
    and they demonstrate an early knack for planning and reliability.
  sports: Lariza Colon participates in the Little Strikers preschool soccer program, cheers for the local professional baseball team the Chicago Cubs during family outings, and they enjoy swimming lessons
    at the community pool, balancing active play with a thoughtful, organized routine.
  arts: Lariza Colon delights in drawing whimsical animals with Crayola crayons, sings along to Raffi’s "Baby Beluga" and Disney’s "Let It Go," and they frequently visit the children’s museum to explore
    interactive art installations, showing their appreciative and curious artistic spirit.
  travel: Lariza Colon has explored the nearby city zoo, spent a weekend at Grandma’s countryside cottage, and dreams of visiting the Eiffel Tower in Paris, preferring family‑planned itineraries that include
    time for quiet reading corners in hotel rooms.
  culinary: Lariza Colon loves mac and cheese with a sprinkle of cheddar, enjoys nibbling on sliced strawberries and carrot sticks, and they help their parent stir batter for pancakes, displaying a simple
    yet enthusiastic approach to food and a methodical habit of arranging their plate.
  core: Lariza Colon is a calm, curious 4‑year‑old who methodically organizes play, saves pennies for future toys, and embraces art and adventure with a gentle, cooperative spirit.
background:
  cultural: Lariza’s family traces its roots to the highlands of Guatemala, where Spanish and indigenous Maya traditions intertwine. At home she hears both Spanish and English, celebrates Semana Santa with
    handmade decorations, and enjoys foods such as tamales and fresh corn tortillas. The Guatemalan emphasis on community, respect for elders, and celebration of vibrant colors influences her love for art
    and her cooperative, kind nature.
