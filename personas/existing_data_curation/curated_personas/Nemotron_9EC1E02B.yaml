personas:
  professional: Peter Friesen is an aspiring civil engineer who channels his love for detailed LEGO cityscapes into meticulous spatial planning, and they leverage their methodical thinking and cooperative
    nature to organize community projects with peers.
  sports: Peter Friesen plays forward on the Pell City Pumas youth soccer team, avidly follows the Alabama Crimson Tide football season and the Birmingham Barons minor‑league baseball games, maintains a
    disciplined training routine, but they occasionally skip warm‑ups when rushing home from a scouting meeting.
  arts: Peter Friesen immerses themselves in classic rock and folk by listening to The Rolling Stones, Bob Dylan, and Joan Baez, translates creativity into intricate LEGO builds, reads science‑fiction novels
    by Isaac Asimov and Anne McCaffrey, and they enjoy community theater productions of Peter Pan starring local talent.
  travel: Peter Friesen prefers family road‑trip adventures that explore nearby natural wonders like the Great Smoky Mountains and the Gulf Coast beaches, has visited Washington, D.C. to tour the Smithsonian,
    and they dream of attending the annual pretzel festival in a Bavarian town abroad while balancing school activities and a modest family budget.
  culinary: Peter Friesen enjoys classic Southern fare such as fried chicken with collard greens, buttery biscuits with honey, homemade pretzels seasoned with coarse salt and caraway, and they often help
    his mom craft creamy mac and cheese using sharp cheddar and elbow pasta, though they sometimes overindulge in sugary cereal for breakfast.
  core: Peter Friesen is a methodical yet compassionate 11‑year‑old who meticulously sorts LEGO bricks by color, rescues stray cats, volunteers at the library, and they occasionally sneak an extra slice
    of chocolate cake despite a self‑imposed snack limit.
background:
  cultural: Peter is a white American raised in Pell City, Alabama. His family blends Southern cultural traditions—such as church attendance, community events, and hospitality—with a lineage that traces
    back to German ancestors, reflected in occasional family recipes like homemade pretzels and stories about his forebears. Growing up in a close-knit small town, he has been shaped by the values of neighborliness,
    respect for elders, and a strong sense of community responsibility.
