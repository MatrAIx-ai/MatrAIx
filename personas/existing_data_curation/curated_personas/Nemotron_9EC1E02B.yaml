  career_goals: Guided by his desire to help others and work within structured environments, Peter hopes to become a medical professional—such as a pediatric doctor—or a firefighter, where he can combine
    his compassion with the disciplined routines he enjoys. He also expresses interest in engineering, imagining building safe community spaces, and dreams of eventually contributing to projects that improve
    his hometown.
