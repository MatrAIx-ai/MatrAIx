personas:
  professional: Adam Shvartsman is a budding tech hobbyist who devotes his free time to assembling LEGO Technic models and writing Python scripts, leveraging their strong organizational abilities and love
    for clear, structured problem‑solving to lead school group projects and envision a future as a junior software developer or network technician.
  sports: Adam Shvartsman plays midfield for the Auburn Hawks youth soccer club, avidly follows the Seattle Sounders FC, and complements their team practices with weekend hikes in the Cascades, balancing
    structured training sessions with the freedom of exploring Pacific Northwest trails that they relish.
  arts: Adam Shvartsman finds creative respite in indie folk music, drifting between Phoebe Bridgers and Iron & Wine, while also enjoying classic mystery films and the imaginative worlds of sci‑fi novels
    by Isaac Asimov and Agatha Christie, which together inspire their model‑building designs and storytelling scripts, and they often share these influences with friends during study sessions.
  travel: Adam Shvartsman prefers short road trips to nearby natural destinations such as the San Juan Islands and Olympic National Park, meticulously planning itineraries with checklists on his phone,
    and they harbor a long‑term dream of backpacking the historic Pacific Crest Trail after graduating from community college.
  culinary: Adam Shvartsman enjoys cooking simple comfort dishes like homemade mac and cheese with sharp cheddar and grilled salmon seasoned with dill and lemon, has perfected the family’s traditional latke
    recipe using potatoes, onions, and eggs, and they frequently pair meals with craft soda or a cold craft beer when spending time with older siblings.
  core: Adam Shvartsman is a pragmatic teen who merges precise LEGO engineering, organized coding projects, and a love for indie folk into a disciplined yet quietly adventurous life, though they occasionally
    procrastinate on school assignments until the deadline’s final hour.
background:
  cultural: Adam grew up in Auburn, Washington, a suburban community within King County, in a culturally diverse but predominantly white environment. His family maintains Eastern‑European Jewish heritage,
    celebrating holidays such as Hanukkah and Passover, while also embracing broader American customs. The Pacific Northwest setting has instilled in him an appreciation for outdoor activities, environmental
    stewardship, and a community‑oriented outlook that values education, cooperation, and practical contributions.
