  career_goals: Adam aims to complete his high school education and enroll in a community‑college program focused on information technology or engineering technology. He is drawn to career paths that blend
    structured problem solving with tangible results, such as a computer systems analyst, network technician, or junior software developer. Over the long term, he hopes to secure a stable, predictable role
    where he can apply his practical skills while contributing to a collaborative team environment and possibly mentor younger students in tech clubs.
