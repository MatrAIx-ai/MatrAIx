    history lectures"]'
  career_goals: Although retired from formal teaching, Tiffany aims to remain an active educator within her community. She plans to launch a series of intergenerational art workshops that pair seniors with
    local youth, fostering mutual learning and cultural exchange. She also hopes to secure a small grant to document and archive oral histories of African‑American elders in Independence, preserving their
    stories for future generations. Additionally, Tiffany aspires to serve on the advisory board of a neighborhood nonprofit, mentor emerging teachers through a local mentorship program, and author a memoir
    that weaves together her experiences in education, art, and community activism.
