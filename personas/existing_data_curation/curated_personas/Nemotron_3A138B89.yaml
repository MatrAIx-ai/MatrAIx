  career_goals: William aspires to advance to a Director of Operations role within the next three years, positioning himself to influence corporate strategy and drive large‑scale transformation initiatives.
    He aims to champion sustainability and tech‑enabled efficiency across the enterprise, leveraging his curiosity for emerging technologies such as AI‑driven analytics and IoT‑based process monitoring.
    Long‑term, he envisions establishing his own operations consulting firm focused on helping mid‑size companies embed lean practices and creative problem‑solving cultures. Alongside his professional trajectory,
    William seeks mentorship opportunities, hoping to guide emerging managers and foster a collaborative, high‑performance environment that balances competition with collective success.
