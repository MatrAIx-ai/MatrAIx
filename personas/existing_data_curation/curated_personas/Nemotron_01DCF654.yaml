  hobbies: '["Sketching and drawing", "Digital illustration", "Museum and gallery visits", "Reading (fiction, philosophy, psychology)", "Creative writing (journaling, poetry)", "Yoga and meditation", "Hiking",
    "Volunteering at animal shelter", "Book club participation", "Community art workshops"]'
  career_goals: Miranda aims to combine her passion for mental health and the arts by pursuing a graduate degree in art therapy or clinical psychology. She envisions working as an art therapist in a community
    setting, designing programs that help adolescents and adults in rural areas manage anxiety and trauma through creative expression. In the longer term, she hopes to establish a non‑profit organization
    that integrates artistic workshops with mental‑health counseling, and to become an advocate for accessible mental‑health services in underserved regions of upstate New York.
