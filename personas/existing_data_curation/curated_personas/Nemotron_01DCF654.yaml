personas:
  professional: Miranda Machado, a budding art therapist in training, merges rigorous research skills in psychology with a disciplined creative practice, channeling their curiosity and high emotional intelligence
    into designing evidence‑based therapeutic workshops for underserved youth in upstate New York.
  sports: Miranda Machado, an avid hiker of the Finger Lakes trails, participates in a local weekend hiking club and follows the Buffalo Bills and Syracuse Orange, occasionally joining a community soccer
    pick‑up game to stay fit while preferring solo nature walks over crowded gyms.
  arts: Miranda Machado, a dedicated sketcher and digital illustrator, draws inspiration from the surrealism of Frida Kahlo, the vibrant installations of Yayoi Kusama, and the poetic photography of Gregory
    Crewdson, regularly attending exhibitions at the Albright‑Knox Art Gallery and sharing their own visual critiques in intimate community art workshops.
  travel: Miranda Machado, who prefers meticulously planned trips over spontaneous getaways, has explored the historic streets of Philadelphia, the art museums of Boston, and the natural beauty of the Adirondacks,
    and dreams of a future study‑abroad semester in Florence to immerse themselves in Renaissance art while staying within a modest budget.
  culinary: Miranda Machado, an enthusiastic home cook with a knack for vegetarian cuisine, often prepares quinoa‑based Buddha bowls, roasted beet salads with goat cheese, and occasional homemade ramen,
    experimenting with fresh herbs from the local farmer’s market and occasionally over‑indulging in artisanal matcha lattes.
  core: Miranda Machado blends disciplined research with creative empathy, obsessively organizing their life while periodically succumbing to anxiety‑driven coffee binges and late‑night sketch marathons.
background:
  cultural: Miranda comes from a multicultural American family with Portuguese roots; her surname Machado reflects that heritage. While she was raised primarily in the small‑town culture of Bath, NY, her
    family kept certain Portuguese traditions alive, such as celebrating Festas de São João, cooking dishes like bacalhau and caldo verde, and speaking occasional Portuguese phrases at home. The Catholic
    background of her family also contributed to a sense of community service and moral responsibility. Growing up in upstate New York exposed her to values of self‑reliance, appreciation of nature, and
    a close‑knit community, which shape her worldview and her commitment to helping others in her region.
attributes:
  skills: '["Research methods", "Data analysis (SPSS, Excel)", "Academic writing", "Project planning", "Time management", "Community outreach coordination", "Active listening", "Empathy and counseling",
