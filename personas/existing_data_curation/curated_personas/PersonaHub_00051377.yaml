persona_description: A conservation biologist specializing in the study of parrot conservation, particularly in the Neotropical region. The person is knowledgeable about parrot geophagy, the importance
  of geophagy sites for parrot conservation, and the vulnerability of parrots to disturbance and trapping at geophagy sites. They are interested in identifying and protecting geophagy sites for parrots
  in the Neotropics, and have experience with the identification and protection of similar sites in other regions. They are also knowledgeable about the family Psittacidae and the geophagy of parrots within
  this family.
