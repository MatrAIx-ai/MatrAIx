personas:
  professional: Ana Irizarry is a bilingual event‑management specialist who blends meticulous budgeting and logistics expertise with a flair for immersive, culturally resonant festival concepts, driving
    teams to deliver high‑impact experiences while constantly questioning conventional norms.
  sports: Ana Irizarry joins a local beach volleyball league in San Diego, follows the San Diego Padres, and hikes the Torrey Pines trails on weekends, using these activities as a competitive outlet that
    balances their event‑planning stamina.
  arts: Ana Irizarry curates personal sketchbooks, visits the Museum of Contemporary Art San Diego, draws inspiration from muralist Shepard Fairey and musician Lila Downs, and volunteers to teach youth
    mural techniques at community festivals, channeling this artistic immersion into their event themes.
  travel: Ana Irizarry prefers short, curated road trips along the Pacific Coast Highway, with a bucket‑list stop at the historic Mission San Juan Capistrano, but also dreams of a summer immersion program
    in Oaxaca to study traditional festive rituals before returning to host a cross‑cultural festival back home.
  culinary: Ana Irizarry experiments with modern twists on classic tacos al pastor, incorporating pineapple‑infused adobo, mezcal‑marinated tofu, and locally sourced heirloom tomatoes, while often hosting
    themed dinner parties where they showcase seasonal, farm‑to‑table dishes alongside handcrafted salsa playlists.
  core: Ana Irizarry is a hyper‑curious, competitive event architect who blends artistic flair with strategic budgeting, fuels creativity with salsa dancing and beach hikes, yet sometimes over‑commits to
    projects, leading to occasional burnout.
background:
  cultural: Ana is a first‑generation Mexican‑American raised in a bilingual household where Spanish and English were spoken daily. Her family celebrates Mexican traditions such as Día de los Muertos, Las
    Posadas and quinceañeras, nurturing her appreciation for ritual, storytelling, and communal celebration. Growing up in El Cajon, a city with a strong Mexican community, she internalized values of family
    solidarity, hospitality, and pride in cultural heritage. These influences shape her professional lens, prompting her to infuse Mexican artistic motifs, food, and music into events and to advocate for
    inclusive programming that honors diverse cultural narratives.
attributes:
  skills: '[''Event Logistics Management'', ''Vendor Negotiation'', ''Budget Development and Financial Oversight'', ''Creative Concept Development'', ''Bilingual Communication (English/Spanish)'', ''Digital
    Event Platforms (Cvent, Eventbrite, Zoom)'', ''Crisis Management and Real‑time Problem Solving'', ''Cultural Programming and Artistic Curation'', ''Stakeholder Relationship Building'', ''Project Timeline
    Coordination'']'
  hobbies: '[''Watercolor painting'', ''Sketching and visual brainstorming'', ''Cooking Mexican cuisine with modern twists'', ''Salsa and contemporary dance classes'', ''Hiking coastal trails in San Diego
    County'', ''Beach and urban photography'', ''Attending gallery openings and museum exhibitions'', ''Curating personal music playlists (Latin jazz, indie folk)'', ''Volunteering at community cultural
    festivals'', ''Hosting themed dinner parties for friends'']'
  career_goals: Ana aims to become a senior director of events at a leading cultural institution and eventually launch her own boutique event consultancy that specializes in cross‑cultural festivals highlighting
    Mexican‑American art and heritage. She envisions shaping industry standards for inclusive, sustainable event design, integrating emerging technologies such as augmented reality to enrich attendee experiences.
    Additionally, Ana aspires to mentor emerging event planners—particularly women and individuals from underrepresented backgrounds—and to champion community‑focused programming that celebrates diversity.
