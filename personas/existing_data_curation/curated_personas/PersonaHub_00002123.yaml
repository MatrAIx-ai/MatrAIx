persona_description: A researcher and urban planner who is interested in understanding the spatial and spatio-temporal effects of urban growth in the Golden Horseshoe region of southern Ontario, Canada.
  They are looking for ways to collaborate with stakeholders and investors to share information on urban land use and land cover, and to develop a regional spatial-retrofitting model to assess urban and
  regional change. They are interested in using Landsat imagery to refine urban land use change and to support decision-making through a web-based environment.
