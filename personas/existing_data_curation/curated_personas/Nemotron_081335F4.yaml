  hobbies: '["Reading historical biographies and classic literature","Hiking in local state parks and the Pine Barrens","Yoga and mindfulness meditation","Playing acoustic guitar","Cooking Mediterranean
    dishes","Volunteering at the Holbrook Public Library","Attending community theater productions","Participating in board‑game nights","Exploring local breweries and craft beer tastings"]'
  career_goals: He aims to become a regional sales manager within the next three years, earn the Chartered Property Casualty Underwriter (CPCU) designation, and eventually launch his own boutique insurance
    consultancy focused on personalized risk solutions for small businesses. Robert also wants to develop expertise in insurtech tools, mentor junior agents, and cultivate a healthier work‑life balance
    by integrating stress‑management practices into his routine.
