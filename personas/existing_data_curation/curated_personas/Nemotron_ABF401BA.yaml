personas:
  professional: Young White is a retired community organizer and mentor whose hands‑on expertise in carpentry, sustainable gardening, and small‑engine repair, combined with sociological insight and a balance
    of curiosity and practicality, fuels the expansion of a neighborhood mentorship program and the preservation of local oral histories.
  sports: Young White enjoys low‑impact fitness through early‑morning fishing on the St. Johns River and weekend walks through historic Jacksonville neighborhoods, follows the Jacksonville Jaguars and the
    Jacksonville Jumbo Shrimp, and volunteers as a scorekeeper for the local senior softball league.
  arts: Young White immerses themselves in classic jazz legends like Miles Davis and gospel great Mahalia Jackson, whittles wooden projects while listening to records, sings in the church choir, and attends
    the annual Jacksonville Jazz Festival and productions at the Florida Theatre.
  travel: Young White prefers carefully planned road trips to culturally rich sites such as Washington, D.C.’s civil‑rights monuments and New Orleans’ music scene, balances a modest travel budget with occasional
    visits to St. Augustine’s historic district and the serene beaches of Amelia Island, always using a printed itinerary and a trusted GPS.
  culinary: Young White cultivates heirloom tomatoes, collard greens, and sweet potatoes in their garden, then prepares simple yet flavorful dishes like grilled river trout with lemon‑herb butter, collard
    greens seasoned with smoked turkey, and banana‑bread made with home‑canned berries.
  core: Young White is a pragmatic, solitary‑yet‑community‑driven elder who balances curiosity with tradition, finds peace in hands‑on crafts, occasionally forgets medication doses, and never misses a chance
    to mentor the next generation.
background:
  cultural: As a Black Floridian who grew up in Jacksonville during the 1960s, Mason’s cultural identity is steeped in the legacy of the Southern civil‑rights movement, the traditions of the local Black
    church, and the vibrant community life of historically Black neighborhoods such as La Villa and San Marco. Family gatherings centered around soul food, storytelling, and gospel music have shaped his
    sense of belonging. He maintains a strong connection to African‑American heritage through participation in community festivals, support of local Black‑owned businesses, and an appreciation for jazz,
    blues, and the oral histories passed down by elders.
attributes:
