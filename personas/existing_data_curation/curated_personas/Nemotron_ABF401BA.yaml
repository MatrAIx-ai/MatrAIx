  career_goals: He aims to deepen his impact on the local community by expanding the neighborhood mentorship program he helped launch, offering weekly tutoring for middle‑school students and life‑skills
    workshops for seniors. He also plans to compile oral histories from longtime Jacksonville Black residents, preserving their stories for future generations. Another personal ambition is to author a memoir
    that stitches together his life experiences—from Civil‑Rights era activism to his recent volunteer work—so that his grandchildren and the wider community can learn from his journey.
