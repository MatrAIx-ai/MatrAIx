  hobbies: '["vegetable gardening","seasonal cooking","canning and preserving","quilting","knitting","reading mystery novels","reading historical biographies","church attendance","choir singing","bridge","walking
    nature trails","watching classic films","book club participation"]'
  career_goals: Maintain an active role in the Georgetown community through volunteer service at the local church and senior center, continue organizing family gatherings, preserve and share family recipes
    by publishing a small cookbook, mentor younger women on practical home‑management skills, stay physically healthy to enjoy gardening and walking, and support her husband’s interests while ensuring financial
    stability for herself and her grandchildren.
