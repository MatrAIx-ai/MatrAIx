  career_goals: Patsy aims to transition from a senior statistician role to a director‑level position where she can shape data‑driven strategies for cultural and environmental nonprofit organizations in
    the Bay Area. She is driven to publish methodological articles that bridge statistical rigor with humanities research, and she envisions launching a boutique analytics consultancy that helps museums,
    wineries, and community arts groups make evidence‑based decisions. Her competitive streak pushes her to seek recognition as a thought leader through keynote talks at national statistics conferences,
    while her preference for flexibility means she plans to structure her work around collaborative, project‑based schedules rather than rigid corporate hierarchies.
