  hobbies: '[''Wine Tasting'', ''Organic Gardening'', ''Hiking'', ''Improv Comedy'', ''Hosting Dinner Parties'', ''Trivia Nights'', ''Community Theater Volunteering'', ''Historical Nonfiction Reading'',
