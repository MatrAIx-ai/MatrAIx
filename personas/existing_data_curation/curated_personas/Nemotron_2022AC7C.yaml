  career_goals: Dania aims to secure a stable part‑time position, ideally in a local market, restaurant, or community food service, to gain formal work experience while she works toward obtaining her GED.
    She aspires to later launch a home‑based catering or bakery business that highlights authentic Mexican recipes, leveraging her cooking expertise and competitive drive to build a reputation in Lancaster.
    Long‑term, she hopes to establish financial independence, acquire a certified culinary credential, and eventually own a modest storefront that serves as a cultural hub for her community.
