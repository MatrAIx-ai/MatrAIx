personas:
  professional: Holly Edwards is a veteran pharmacy technician with over twenty years of hands‑on experience in prescription verification, sterile compounding, and pharmacy software such as PioneerRx and
    Cerner, who leverages their organized yet adaptable workflow to mentor new staff, pursue CPhT certification and advanced sterile‑compounding credentials, and blend health‑literacy outreach with community
    watercolor workshops, all while maintaining compassionate, concise patient counseling.
  sports: Holly Edwards regularly hikes the winding trails of Missouri state parks, joins a weekend walking club that captures nature photography, plays casual tennis at the neighborhood community center,
    and cheers on the Kansas City Chiefs and Royals from a modest home viewing area, preferring low‑key, small‑group fitness activities over large stadium crowds.
  arts: Holly Edwards devotes evenings to watercolor painting riverfront scenes inspired by the Kansas City skyline, hones calligraphy for personalized notes, attends intimate jazz sessions at the Blue
    Room featuring local musicians echoing Count Basie's legacy, frequents the Nelson‑Atkins Museum for contemporary exhibitions, and leads a book club that reads literary fiction by authors such as Zadie
    Smith, all reflecting a curious and open‑minded artistic spirit.
  travel: Holly Edwards enjoys weekend road trips to the Ozark National Forest for sketching and photography, an annual cultural retreat to Santa Fe's art fairs, dreams of a summer painting in Provence's
    lavender fields, plans itineraries with detailed maps but leaves room for spontaneous detours, and favors traveling with one or two close friends rather than large groups.
  culinary: Holly Edwards experiments with seasonal garden harvests, whipping up roasted beet and goat cheese salads, herb‑infused olive oil drizzles, and occasional sourdough breads while occasionally
    over‑cooking quinoa when multitasking between painting and photo editing, and delights in exploring new recipes from the latest farm‑to‑table cookbooks.
  core: Holly Edwards balances meticulous pharmacy precision with spontaneous watercolor creativity, thriving on quiet nature walks, thoughtful community engagement, and a disciplined yet flexible approach
    to life.
background:
  cultural: Holly is a White American raised in the Kansas City, KS, area, likely with German and Irish ancestry common among Midwestern families. Growing up in a modest, working‑class household, she internalized
    Midwestern values of hard work, modesty, and community responsibility. The region's blend of urban cultural assets—such as its historic jazz scene, vibrant art community, and celebrated barbecue tradition—combined
    with the surrounding prairie landscape has shaped her appreciation for both artistic expression and the outdoors. Holly participates in local festivals like Riverfest and values the neighborly spirit
    of Wyandotte County, balancing a pragmatic, self‑reliant mindset with genuine compassion for her community.
attributes:
  skills: '[''Prescription verification'', ''Medication dispensing'', ''Sterile and non‑sterile compounding'', ''Inventory management'', ''Pharmacy software operation (PioneerRx, Cerner)'', ''Insurance
    claims processing'', ''Regulatory compliance (DEA, USP)'', ''Patient counseling and education'', ''Accurate data entry and record‑keeping'', ''Team training and mentorship'', ''Basic digital photography'',
    ''Watercolor painting techniques'', ''Medical literature research'', ''Adaptable problem solving'']'
  hobbies: '[''Watercolor painting'', ''Visiting local art galleries and museums'', ''Listening to Kansas City jazz at intimate venues'', ''Reading contemporary fiction and art history'', ''Gardening'',
    ''Cooking experimental recipes'', ''Hiking in state parks'', ''Nature and portrait photography'', ''Calligraphy'', ''Small book club participation'', ''Volunteering art workshops for youth'']'
  career_goals: Holly aims to obtain the Certified Pharmacy Technician (CPhT) credential and pursue advanced sterile‑compounding certification to qualify for a lead technician role. Over the next five years
    she plans to enroll in an associate‑degree program in health sciences, positioning herself for a pharmacy supervisor or manager position within her community pharmacy. She also wants to deepen her expertise
    in medication therapy management (CMTM) and health informatics, attending APhA conferences and completing related continuing‑education modules. Beyond her pharmacy career, Holly envisions opening a
    modest studio where she can host watercolor workshops and combine her health knowledge with community art education, potentially collaborating with local health clinics to create visual health‑literacy
    materials.
