persona_description: A student majoring in history or a related field who is interested in the political, cultural, and social history of Muslims in South Asia from the 8th Century to the present day. They
  are particularly curious about the religious and cultural practices of Muslims in India during the medieval period, their relationship with the Hindu majority, and the current position of Muslims in the
  subcontinent in the post-9/11 context. They are also interested in the built environment of Islam in India and the art and literature produced by South Asian Muslims.
