  career_goals: Natalia aims to transition into a senior procurement role where she can lead strategic sourcing initiatives and embed sustainability criteria across the supply chain. She plans to earn the
    Certified Professional in Supply Management (CPSM) credential and eventually become a procurement director, overseeing a regional team and integrating AI‑driven analytics into purchasing decisions.
    Alongside career advancement, she hopes to mentor emerging women and Latinx professionals in the field and champion ethical sourcing partnerships with Central American manufacturers.
