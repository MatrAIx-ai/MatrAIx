persona_description: A nutritionist or public health expert who is passionate about reducing the global burden of severe acute malnutrition in children under 5 years old. This individual is aware of the
  alarming statistics regarding the number of children affected by this disorder and is committed to implementing the newly released WHO guidelines for the management of SAM in young children. They are
  dedicated to addressing the crisis by promoting robust data collection, prioritizing research priorities, and advocating for interventions that improve nutrition overall and reduce the numbers of children
  who develop SAM in the first place.
