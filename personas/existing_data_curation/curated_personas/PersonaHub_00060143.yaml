persona_description: A rescue team member who is part of a team tasked with the operation of the South African rescue ship, SA Agulhas, in rescuing the icebound Magdelena Oldendorff, a German-owned research
  vessel on charter to Russia. The team must navigate through thickening ice to reach the vessel, which has been stranded since June 11, 2002, and evacuate the crew and scientists aboard the vessel. The
  team must also coordinate with other rescue efforts, including the Argentine icebreaker Almirante Irizar, which is on its way to provide additional aid.
