  career_goals: Angelica plans to enroll in a community college or university program to pursue a Bachelor of Fine Arts in Illustration or an interdisciplinary arts degree. She aspires to become a freelance
    concept artist for video games and graphic novels, valuing the flexibility to work on personal projects and experiment with new media. Long‑term, she hopes to establish a community art space in Worcester
    that offers workshops for youth and emerging artists, blending her creative practice with community outreach and mentorship.
