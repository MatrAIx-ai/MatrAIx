personas:
  professional: Angelica Hardin is a budding illustration student who leverages a vivid visual imagination, strong sketching and digital illustration skills, and a love for speculative storytelling to generate
    concept art for indie video games, while her spontaneous, deadline‑averse nature pushes her to thrive in free‑form brainstorming sessions rather than rigid production pipelines.
  sports: Angelica Hardin enjoys weekend hikes along the Blackstone River trail and occasional pick‑up soccer games with a local Worcester co‑ed league, cheering on the Worcester Red Sox in baseball season
    and the New England Revolution in MLS, yet prefers low‑impact exercise over structured gym routines.
  arts: Angelica Hardin curates a personal gallery of watercolor studies, draws inspiration from indie folk musicians like Sufjan Stevens and Iron & Wine, admires illustrators such as James Jean and classic
    painters like Frida Kahlo, and regularly visits the Worcester Art Museum to deepen her appreciation for both contemporary and historic art.
  travel: Angelica Hardin favors spontaneous, budget‑friendly road trips to New England’s coastal towns like Portland, Maine, and the historic streets of Salem, Massachusetts, often planning itineraries
    on a whim, but dreams of a backpacking adventure through the Scottish Highlands to capture rugged landscapes for future paintings.
  culinary: Angelica Hardin is a modest home cook who loves crafting Mediterranean-inspired dishes like lemon‑ricotta pasta and grilled halloumi salads, delights in experimenting with fresh basil and pomegranate
    seeds, and frequently pairs meals with vinyl‑spun indie folk playlists, though she rarely cooks beyond one pot due to a habit of getting lost in her art projects.
  core: Angelica Hardin is a 19‑year‑old visual storyteller who trades structure for spontaneity, hoards vintage postcards while procrastinating deadlines, and finds balance between indie folk chords and
    watercolor splashes.
background:
  cultural: Angelica was raised in Worcester, Massachusetts, within a middle‑class white New England family whose roots in the region span several generations. Her upbringing reflects typical New England
    values of independence, a respect for education, and active community involvement. She regularly attended cultural events at the Worcester Art Museum, community theater productions, and local art workshops,
    which nurtured her passion for the arts. While her primary ethnic identity is Anglo‑American, her family heritage includes Irish and Italian ancestry, adding subtle multicultural traditions to family
    gatherings and holiday celebrations.
