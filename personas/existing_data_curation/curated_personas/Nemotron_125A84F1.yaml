  hobbies: '[''Playing soccer with local youth league'', ''Reading adventure books (e.g., Magic Tree House)'', ''Crafting bead jewelry and paper art'', ''Baking cookies with family'', ''Attending church
    services and Sunday school'', ''Girl Scouts badge projects (community service, camping skills)'']'
  career_goals: Selena loves helping people and enjoys environments where things run smoothly, so she often talks about wanting to be a teacher when she grows up. She imagines a classroom where she can
    share the stories she reads, help classmates understand new lessons, and keep the day organized. She also admires doctors who care for children and sometimes says she might become a pediatric nurse
    because she likes taking care of others. Her long‑term ambition is to have a career that combines her love for routine, caring for people, and working together with a team.
