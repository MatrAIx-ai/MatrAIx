personas:
  professional: Selena Perkins, an aspiring youth soccer captain, combines her love for structured practice drills and team camaraderie with a methodical, organized approach, using her natural reliability
    to lead her teammates and earn Girl Scout badges for leadership, while dreaming of one day coaching kids herself.
  sports: Selena Perkins, a dedicated midfielder for the Maple Grove Hurricanes youth soccer club, trains twice weekly on the fall field, idolizes the U.S. Women’s National Soccer Team and the Chicago Fire
    FC, and maintains a disciplined fitness routine by logging drills in a bright orange notebook and stretching before each match.
  arts: Selena Perkins immerses herself in whimsical storytelling through the Magic Tree House series, delights in creating bead bracelets inspired by the vibrant designs of Disney’s “Moana” soundtrack
    and Dr. Seuss illustrations, and often follows the YouTube channel “Art for Kids Hub” to master paper collages.
  travel: Selena Perkins, who loves the predictability of family road trips, spends summer vacations visiting relatives in the countryside and has eagerly saved for a future trip to Disney World and the
    Grand Canyon, preferring itineraries with kid‑friendly tours and scheduled break times.
  culinary: Selena Perkins, an enthusiastic junior baker, routinely whips up chocolate chip cookies using butter, brown sugar, and vanilla alongside her mother, loves crafting easy noodles with marinara
    sauce, and concocts banana‑strawberry smoothies with Greek yogurt for after‑practice snacks.
  core: Selena Perkins flourishes in the orderly world of soccer practices, Girl Scout badges, and bead‑making, but she often forgets to finish her reading before bedtime and leaves a trail of loose beads
    across the living room.
background:
  cultural: Selena’s family roots are deeply embedded in the African‑American community of Raleigh. She grows up hearing stories from her grandparents about the civil‑rights movement and celebrations like
    Juneteenth, which instill pride in her heritage. Family gatherings often feature traditional Southern soul food such as collard greens, cornbread, and sweet potato pie, along with gospel and R&B music
    that she enjoys dancing to. Her parents emphasize the importance of education, community service, and church involvement, encouraging her to participate in local events at the historic Hayti Heritage
    Center. These cultural influences shape her values of cooperation, respect for tradition, and a strong sense of community belonging.
attributes:
  skills: '[''Reading fluency'', ''Basic addition and subtraction'', ''Following multi‑step instructions'', ''Organizing classroom projects'', ''Cooperative teamwork in soccer'', ''Time management for homework
