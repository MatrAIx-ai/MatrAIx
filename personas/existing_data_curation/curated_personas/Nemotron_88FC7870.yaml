  hobbies: '[''Book club participation'', ''Cooking and hosting dinner parties'', ''Gardening'', ''Yoga and mindfulness'', ''Volunteering at community center'', ''Hiking and nature photography'', ''Social
    media content creation for local events'']'
  career_goals: Carolina aims to translate her interpersonal strengths into a part‑time role as a community organizer or freelance event planner, allowing her to maintain flexibility for family responsibilities
    while pursuing professional growth. She is considering certification in counseling or stress‑management coaching to formalize her informal support work. Long‑term, she hopes to lead a neighborhood association
    or start a small consulting business that helps local nonprofits design and execute outreach events. Achieving a balance between personal well‑being and contributing to her community is central to her
    ambition.
