personas:
  professional: Carolina Schwade is a part‑time community organizer and freelance event planner who leverages her natural sociability, talkative charm, and empathy to motivate volunteers, while balancing
    a love of structure with the flexibility needed to adapt quickly to changing event demands.
  sports: Carolina Schwade follows the Detroit Lions and the Detroit Red Wings, participates in a local Saturday morning walking club that explores the Huron River trail, and joins a community softball
    league where she balances friendly competition with the social camaraderie she values.
  arts: Carolina Schwade immerses herself in contemporary literature, often debating the works of Chimamanda Ngozi Adichie and Margaret Atwood at her book club, while enjoying indie folk music from The
    Lumineers and attending seasonal performances at the Auburn Hills Playhouse, where she admires the storytelling of local playwrights.
  travel: Carolina Schwade prefers short, well‑planned getaways—she’s trekked the dunes of Sleeping Bear Bay, taken a weekend road trip to Mackinac Island, and dreams of exploring Kyoto’s cherry‑blossom
    festivals once she secures enough freelance income for an overseas adventure.
  culinary: Carolina Schwade delights in farm‑to‑table cooking, often whipping up roasted beet and apple salad with locally sourced honey‑dressed arugula, pan‑seared Lake Erie trout topped with fresh dill,
    and seasonal potluck dishes like corn‑and‑cherry crumble, showcasing her love for Michigan harvests and willingness to experiment with new flavors.
  core: Carolina Schwade blends an extroverted, detail‑oriented mindset with a habit of over‑committing to community events, using yoga to offset a tendency toward worry and occasional disorganization that
    shows up in missed appointments.
background:
  cultural: Carolina was raised in a Midwestern white American family in suburban Michigan, with ancestry tracing back to German and Irish roots. The community values of Auburn Hills—neighborliness, hard
    work, and a strong sense of civic involvement—have shaped her outlook. She grew up experiencing the seasonal rhythms of the Great Lakes region, which fostered an appreciation for outdoor recreation
    and seasonal cooking. While she identifies with mainstream American cultural practices, she also maintains family traditions such as celebrating Thanksgiving with extended relatives, and she enjoys
    local festivals that highlight Michigan's agricultural heritage.
attributes:
  skills: '[''Event planning and coordination'', ''Interpersonal communication'', ''Community outreach'', ''Basic budgeting and financial organization'', ''Conflict resolution'', ''Social media content
