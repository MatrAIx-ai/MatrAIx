  career_goals: Willie dreams of attending a top high school and earning a scholarship to study architecture or urban design, where he can create community‑focused spaces that are both functional and inspiring.
    He is also fascinated by museums and hopes to become a curator or education specialist who uses art to engage young people. In the long term, he sees himself leading projects that blend creativity,
    organization, and social impact, such as designing interactive exhibits or community art programs that bring diverse groups together.
