personas:
  professional: Demetrius Smith is a pipefitter/steamfitter whose meticulous blueprint reading, precise MIG/TIG welding, and rigorous OSHA compliance reflect his methodical, solitary nature and drive for
    predictable, high‑quality outcomes on military and commercial installations.
  sports: Demetrius Smith is a low‑key fitness enthusiast who maintains a regular early‑morning jog along the shoreline of Lake of the Ozarks, follows the St. Louis Cardinals and Kansas City Chiefs loyally,
    and belongs to the local anglers' association where they refine casting techniques during off‑season winter fishing tournaments.
  arts: Demetrius Smith finds artistic respite in the meticulous world of model‑train exhibitions, while humming along to classic rock legends like The Rolling Stones and occasionally watching Christopher
    Nolan’s sci‑fi films to unwind from the regimented pace of their pipefitting work.
  travel: Demetrius Smith prefers solitary, well‑planned road trips that start before sunrise, having explored the secluded trails of the Ozark National Forest and the historic steam railways of Alaska,
    they now hope to charter a fishing lodge in Iceland’s fjords to combine quiet reflection with rugged scenery.
  culinary: Demetrius Smith, an adept home cook, often whips up skillet‑seared steak with a rosemary‑garlic rub and fresh herb‑infused fish tacos using basil and cilantro harvested from their balcony garden,
    favoring hearty, protein‑rich meals that fuel long workdays and early‑morning fishing trips.
  core: Demetrius Smith is a disciplined pipefitter who channels a love for quiet mornings, precise model‑train craftsmanship, and methodical financial planning into a life built on structure, solitary
    reflection, and occasional bursts of hobby‑driven spontaneity.
background:
  cultural: Demetrius is an African‑American raised in a close‑knit family that emphasized perseverance, community support, and education despite limited resources. Growing up in the St. Louis area, he
    was immersed in the rich musical heritage of jazz and classic soul, which still influences his taste in music. He regularly participates in local community events, such as youth mentorship programs
    that introduce high school students to trades, reflecting a cultural emphasis on giving back. His experiences navigating both predominantly Black neighborhoods and the more diverse environment of Fort
    Leonard Wood have shaped a resilient identity that balances pride in his heritage with a pragmatic approach to personal and professional growth.
attributes:
  skills: '[''Pipefitting'', ''Welding (MIG/TIG)'', ''Blueprint Reading'', ''Hydraulic and Steam System Maintenance'', ''Safety and OSHA Compliance'', ''Troubleshooting'', ''Rigging and Hoisting'', ''Physical
    Stamina & Endurance'', ''Basic Electrical Wiring'', ''Team Coordination'']'
  hobbies: '[''Solo fishing'', ''Model train building'', ''Strategic video games'', ''Reading technical manuals'', ''Urban gardening'']'
  career_goals: Demetrius aims to become a certified journeyman pipefitter within the next year and eventually attain a master plumber/steamfitter license. He plans to complete NCCER Level III certification
    and an OSHA HAZWOPER course to broaden his qualifications for specialized fire‑protection and high‑pressure steam projects. Long‑term, he envisions moving into a foreman or lead specialist role at Fort
    Leonard Wood, where he can mentor newer apprentices while maintaining the structured, reliable work environment he values. Ultimately, he hopes to leverage his expertise to start a modest, locally‑focused
    contracting business that offers high‑quality pipe and steam services to both military and civilian customers.
