personas:
  professional: Alfredo Chong, a bilingual education specialist with a knack for designing flexible, art‑infused curriculum modules, leverages their calm under pressure and love for unconventional ideas
    to create engaging community workshops while they maintain a relaxed attitude toward strict deadlines.
  sports: Alfredo Chong, a casual runner who joins the Gulf Coast Hiking Group for weekend treks and follows the New Orleans Pelicans in basketball while cheering for the New Orleans Saints during football
    season, prefers low‑intensity, flexible workouts over regimented gym routines, and occasionally plays pickup bocce with friends at the local community center, where they enjoy the laid‑back vibe.
  arts: Alfredo Chong, a devout patron of contemporary art who sketches in the Contemporary Arts Center, curates mini‑exhibits inspired by artists like Kehinde Wiley and Yinka Shonibare, and immerses themselves
    in the sounds of Wynton Marsalis, Nina Simone, and the world‑music duo Buena Vista Social Club, allowing these influences to guide the way they articulate artistic critiques.
  travel: Alfredo Chong, who favors spontaneous, low‑budget road trips over meticulously scheduled tours, often escapes to Gulfport and the historic French Quarter for weekend getaways, dreams of exploring
    the Honduran Bay Islands and the vibrant streets of Cartagena, Colombia, yet balances travel with limited budget constraints and family obligations, opting to plan only the essentials they need before
    hitting the road.
  culinary: Alfredo Chong, an enthusiastic home cook who prepares authentic Honduran baleadas and tamales for friends using fresh masa, queso fresco, and ripe plantains, enjoys experimenting with spice
    blends like achiote and cilantro, and balances these culinary pursuits with occasional indulgence in New Orleans gumbo and beignets during night outings, often sharing the meals with neighbors they
    have invited over.
  core: Alfredo Chong, a relaxed yet inquisitive educator‑artist who juggles spontaneous vinyl hunting, half‑finished lesson plans, and a habit of losing keys in art studios, embodies a life lived at the
    intersection of curiosity and comfortable chaos, a duality they openly embrace.
background:
  cultural: Alfredo was raised in a Honduran immigrant family in Metairie, Louisiana. He grew up bilingual, speaking Spanish at home and English in school, which gave him a deep understanding of both Central
    American and Southern U.S. cultures. Family traditions such as celebrating Honduran Independence Day, preparing dishes like pupusas and plantains, and participating in local Catholic festivities are
    integral to his identity. Living in the vibrant, multicultural environment of Jefferson Parish, he has also absorbed influences from Creole, Cajun, and Caribbean communities, fostering a rich, hybrid
    cultural outlook that he brings to his personal and professional life.
attributes:
  skills: '[''Curriculum design'', ''Bilingual education'', ''Lesson planning'', ''Community workshop facilitation'', ''Art critique and appreciation'', ''Cross‑cultural communication'', ''Creative problem
    solving'', ''Adaptability'', ''Mentoring'', ''Spanish‑English translation'']'
  hobbies: '[''Visiting art galleries'', ''Sketching'', ''Reading contemporary literature'', ''Collecting vinyl records'', ''Cooking Honduran dishes'', ''Small‑group book clubs'', ''Attending live jazz
    sessions'', ''Hiking local parks'', ''Language‑exchange meetups'', ''Urban photography'']'
  career_goals: Alfredo aims to re‑enter the workforce by leveraging his education background and passion for the arts. In the near term, he plans to secure a part‑time adjunct teaching position at a local
    community college or adult education center, where he can develop and teach interdisciplinary courses that blend art appreciation with multicultural education. Over the next five years, he hopes to
    launch a community‑based nonprofit that offers bilingual art‑education workshops for youth and adults, fostering cultural exchange between the Honduran diaspora and the broader Metairie community. He
    also aspires to obtain certification in adult learning and instructional design, enabling him to freelance as a curriculum developer for cultural institutions.
