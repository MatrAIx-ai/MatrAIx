persona_description: A mental health professional who has chosen to specialize in working with individuals with serious mental health problems, such as schizophrenia and severe depression. This person has
  completed a rigorous training program in psychiatry, including specialized training in the use of biomedical approaches such as medications and physical examinations. They are licensed to provide hospital
  admissions and carry out investigative procedures such as electroencephalographs (EEGs) and brain imaging scans (e.g. computer assisted tomography (CAT)). This person is highly skilled in understanding
  and treating mental health problems and disorders, and is able to carry out research studies of the effectiveness of various mental health treatments. They are likely to be employed at government-run
  and subsidized community centers, where they can provide mental health services at a low cost to all members of the community.
