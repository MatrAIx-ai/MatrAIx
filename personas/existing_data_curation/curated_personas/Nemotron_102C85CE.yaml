personas:
  professional: Armando Moreno is a 17‑year‑old aspiring graphic designer who blends bilingual communication with a street‑art sensibility, using Canva and Photoshop basics to create vibrant branding for
    local cafés while juggling GED studies and a growing freelance client list; their curiosity drives them to experiment with visual storytelling, yet they keep a loose schedule that allows spontaneous
    sketch‑sessions at the park.
  sports: Armando Moreno is a regular at the Hialeah neighborhood park, where they shoot hoops with friends and cheer for the Miami Heat and Orlando Magic, participating in a weekend pick‑up league that
    keeps their stamina for school and art projects, though they sometimes skip practice to finish a mural commission.
  arts: Armando Moreno immerses themselves in the Miami street‑art scene, sketching cityscapes inspired by Banksy and Basquiat while listening to classic salsa rhythms and indie rock bands like Arctic Monkeys,
    editing photos with Clipchamp into narrative series, and drawing graphic novels such as 'Saga' and 'Sandman' for personal study.
  travel: Armando Moreno prefers short trips that fuel creative inspiration, having explored the colorful streets of New Orleans during Mardi Gras, backpacked to Key West for sunset photography, and dreamed
    of a future visit to Mexico City’s mural districts, all while budgeting travel expenses through part‑time gigs and family support.
  culinary: Armando Moreno enjoys cooking family‑heritage dishes like ropa vieja and empanadas, mastering the slow‑cook of shredded beef and the crisp fried dough, while experimenting with fresh cilantro,
    lime, and smoky paprika to add a personal twist, often sharing meals at home with friends after a day of sketching.
  core: Armando Moreno is a bilingual teen artist who balances street‑art passion, modest finances, and a drive to turn cultural roots into a future design studio, all while juggling late‑night creativity,
    occasional health slip‑ups, and the love of basketball.
background:
  cultural: Armando grew up in Hialeah, a vibrant enclave of Cuban-American life. His household speaks Spanish, celebrates Cuban holidays such as Los Tres Reyes Magos and Carnaval, and maintains deep ties
    to Cuban cuisine, music, and dance. The community around him values family cohesion, cultural pride, and mutual support, which has shaped his identity and artistic sensibilities. While he embraces American
    influences—like tech trends and contemporary art—he remains rooted in the immigrant experience, often navigating the balance between preserving his Cuban heritage and integrating into broader U.S. culture.
