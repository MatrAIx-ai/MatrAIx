  career_goals: Armando plans to earn his GED within the next year and then enroll in a community college program focused on graphic design or multimedia arts. He dreams of building a personal brand that
    highlights Cuban-American culture through visual storytelling—whether that’s a YouTube channel, an Instagram portfolio, or a collaborative community art space. In the short term, he hopes to secure
    freelance graphic design gigs with local businesses, helping them develop culturally resonant branding. Long‑term, he envisions opening a small café that doubles as a gallery for emerging artists, creating
    a hub where food, music, and art intersect to celebrate his heritage and foster community connection.
