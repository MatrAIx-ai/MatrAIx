personas:
  professional: Domaneka Cromwell, a retired community archivist and art workshop facilitator, blends meticulous archival research with vibrant mixed‑media storytelling, using their skeptical eye to curate
    intergenerational exhibitions while their relaxed approach to deadlines lets spontaneity guide the creative process.
  sports: Domaneka Cromwell enjoys weekend senior dance nights at the local community center, follows the Richmond Kickers soccer team on TV, and tends to join the springtime walking club that meets at
    Maymont Park, approaching fitness with an energetic sociability that often outweighs structured training.
  arts: Domaneka Cromwell immerses themselves in abstract watercolor and collage, draws inspiration from the improvisational rhythms of John Coltrane, the poetic cadence of Maya Angelou, and the theatrical
    flair of August Wilson, while regularly attending live jazz at the Jefferson Hotel and poetry slams at the Virginia Museum of Contemporary Art.
  travel: Domaneka Cromwell favors spontaneous road trips along the historic Blue Ridge Parkway, relishes visits to Charleston’s Gullah cultural districts and New Orleans’ jazz heritage sites, yet plans
    international pilgrimages to Paris’s Musée d’Orsay with meticulous care, balancing wanderlust with a modest travel budget and a love for sharing stories with fellow seniors on the journey.
  culinary: Domaneka Cromwell, an adept home cook, delights in simmering collard greens with smoked turkey, braising sweet‑potato pie with a hint of nutmeg, and perfecting shrimp and grits, often swapping
    recipes at potluck gatherings while occasionally forgetting to refrigerate leftovers, a quirk rooted in their relaxed kitchen routine.
  core: Domaneka Cromwell’s life is a vibrant tapestry of abstract art, community storytelling, and soulful cooking, threaded together by a curious mind, an energetic sociability, and a habit of misplacing
    brushes just before a deadline.
background:
  cultural: Born in Richmond, Virginia, in the early 1950s, Domaneka grew up amid the city's vibrant African‑American community and witnessed the civil‑rights era firsthand. Her family’s Sunday church gatherings,
    gospel choirs, and annual Juneteenth celebrations shaped a deep appreciation for music, storytelling, and collective memory. Throughout her life, she has remained connected to the legacy of Richmond’s
    Black neighborhoods, volunteering at local cultural festivals and supporting Black-owned theaters. This heritage informs her artistic sensibilities, community involvement, and commitment to preserving
    the narratives of elders who have sustained the city’s rich cultural tapestry.
