  career_goals: Although retired from formal employment, Domaneka aims to leave a lasting cultural imprint on Richmond. She aspires to curate a traveling intergenerational art exhibition that showcases
    works by senior artists alongside emerging Black creators. She plans to compile and publish a memoir‑style anthology of poems and oral histories from longtime residents of the city’s historic Black
    neighborhoods. Domaneka also hopes to establish a mentorship program at the local community center, guiding young artists in both technique and critical inquiry. Finally, she wishes to deepen her digital
    skills to create an online archive of her collected stories, ensuring they remain accessible to future generations.
