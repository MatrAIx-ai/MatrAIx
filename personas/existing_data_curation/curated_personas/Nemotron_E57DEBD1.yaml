  hobbies: '["Soccer", "LEGO building", "Reading adventure/science-fiction books", "Drawing and painting", "Minecraft (creative mode)", "Helping cook Mexican dishes", "Science club activities", "Nature
    walks", "Listening to mariachi music"]'
  career_goals: Doroteo dreams of becoming someone who combines curiosity with practical help for others. He often talks about wanting to be a veterinarian so he can care for animals, a firefighter who
    protects his community, or an astronaut who explores space. In the near term, he aims to improve his reading level, win the school science fair, and lead a group project in his class. He also aspires
    to learn more Spanish to help his grandparents and to be the kid who can reliably organize events like his family’s birthday parties. These ambitions reflect his desire to solve problems, be dependable,
    and explore new ideas.
