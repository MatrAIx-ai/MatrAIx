    at senior center'', ''Museum tour guiding'']'
  career_goals: Looking ahead, Michael aims to transition into a senior administrative or office manager role where he can lead a team, design streamlined processes, and mentor newer staff. He plans to
    obtain a Certified Administrative Professional (CAP) certification to formalize his expertise. Additionally, he is interested in offering part‑time consultancy to small businesses and non‑profits, helping
    them set up efficient office systems. On a personal level, Michael hopes to remain actively involved in community initiatives, leading volunteer event planning committees and serving on a local advisory
    board.
