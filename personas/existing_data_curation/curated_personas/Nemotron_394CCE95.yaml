  career_goals: Even at 76, Torie aims to stay active and socially engaged through her work. Her primary goal is to maintain a part‑time schedule that allows her to earn a modest income while preserving
    flexibility for personal pursuits. She hopes to transition into a mentor‑type role, formally training new hires and sharing her practical retail wisdom. Torie also wishes to contribute to the store’s
    community outreach—organizing occasional senior‑day discounts or local charity drives—so she can blend her compassionate side with a sense of purpose. Ultimately, she seeks a balance where work supports
    her independence without overwhelming her, and where her experience is valued by both colleagues and customers.
