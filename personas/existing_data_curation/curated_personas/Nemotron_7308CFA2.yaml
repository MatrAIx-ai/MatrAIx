personas:
  professional: Maria Theriault, a veteran municipal auditor with deep expertise in GAAP compliance, internal control design, and data‑analytics‑driven risk assessments, leverages her methodical curiosity
    and practical mindset to integrate RPA and Power BI into audit workflows while mentoring junior staff and plotting her path toward a senior advisory role and CPA certification.
  sports: Maria Theriault, an enthusiastic member of the Wright‑Patterson Senior Walking Club who logs daily three‑mile dog walks with Buddy, enjoys seasonal pickleball at the Dayton Recreation Center,
    and roots for the Dayton Dragons baseball team and the Ohio State Buckeyes football squad while occasionally cheering on the Cleveland Cavaliers during NBA playoffs.
  arts: Maria Theriault, a devoted knitter and crocheter who draws inspiration from the delicate brushwork of Claude Monet, devours historical fiction by Hilary Mantel and Ken Follett at her book club,
    and attends community theatre productions starring local talent like Sarah Mitchell while humming the timeless jazz of Ella Fitzgerald during garden breaks.
  travel: Maria Theriault, a methodical planner who prefers leisurely road trips to nearby historic sites such as Old Worthington and the Amish farms of Holmes County, has already explored the cobblestone
    streets of Bruges and now dreams of a guided tour of the Scottish Highlands to trace clan histories and sample local whiskies.
  culinary: Maria Theriault, a confident home cook who harvests heirloom tomatoes, zucchini, and kale from her garden to craft rustic ratatouille and beet‑goat‑cheese salads, delights in baking sourdough
    loaves with rosemary and sea salt, and reserves Friday evenings for a modestly upscale dinner at Dayton’s historic The Oakwood restaurant, where she always orders the pan‑seared trout with lemon‑butter
    glaze.
  core: Maria Theriault, a detail‑driven CPA‑hopeful who meticulously plans both municipal audits and vegetable rotations, occasionally over‑schedules herself to the point of sacrificing bedtime, and finds
    calm humming Ella Fitzgerald tunes while untangling yarn during community theatre intermissions.
background:
  cultural: Maria’s cultural background is rooted in the Midwestern United States, specifically Dayton, Ohio, where she was raised and continues to reside. Her family traces part of its ancestry to French‑Canadian
    (Acadian) immigrants who settled in Ohio in the early 20th century, infusing a modest Catholic heritage into her upbringing. The Midwestern environment emphasized reliability, practicality, and community
    involvement—values that resonate strongly with Maria’s personality. She grew up in a household that valued education, hard work, and service to neighbors, shaping her organized, methodical approach
    to both her professional life and personal interests. While identifying as White and American, she also embraces the blend of European and regional traditions that have informed her sense of identity.
