    in local history lectures'', ''Cooking'', ''Listening to jazz music'']'
  career_goals: Looking ahead, Maria aims to transition into a senior advisory role within her firm, where she can lead complex municipal audit engagements and mentor junior staff. She plans to obtain her
    CPA designation and explore certification as a Certified Fraud Examiner to deepen her expertise in forensic auditing. While maintaining a reliable presence in the office, she also hopes to establish
    a part‑time consulting practice focused on financial literacy and budgeting for local nonprofits and community groups. As retirement approaches, Maria intends to balance continued professional contribution
    with personal well‑being, ensuring her work remains intellectually stimulating yet aligned with her practical values.
