personas:
  professional: Samir Surratt, an aspiring junior architect who spends hour after hour arranging LEGO bricks into meticulously planned cityscapes, demonstrates a balanced curiosity for new building techniques
    while relying on time‑tested modular designs, and always documents each creation in a color‑coded notebook.
  sports: Samir Surratt, a member of the Little Strikers soccer club who loves Friday night games, cheers for the local Major League Baseball team the River City Royals, monitors personal progress with
    a colorful activity tracker, and balances energetic play with structured breaks to avoid overtiredness.
  arts: Samir Surratt, an enthusiastic fan of the animated series “Adventure Time,” frequently draws characters like Finn and Princess Bubblegum in a dedicated sketchbook, sings along to The Wiggles, and
    practices beginner piano lessons from a YouTube tutorial starring “Piano Playtime with Emma,” mirroring a curiosity for new artistic methods while appreciating familiar melodies.
  travel: Samir Surratt, after a family road trip to the Grand Canyon and a summer stay at a seaside resort in Florida, now dreams of visiting the interactive children’s museum in London and a safari park
    in South Africa, preferring meticulously planned itineraries that include timed play breaks and snack stops.
  culinary: Samir Surratt, who can flawlessly butter toast, loves macaroni‑and‑cheese with a sprinkle of cheddar, requests extra avocado slices on their pizza, and enjoys making fruit smoothies with banana,
    mango, and a splash of orange juice, while insisting on being the one to set the table with a precise place‑setting routine.
  core: Samir Surratt blends a preschool‑age curiosity with a methodical, organized mind, managing LEGO skyscrapers, piggy‑bank finances, and daily skin‑care charts while favoring small‑group adventures
    and resisting chaos.
background:
  cultural: Samir is raised in an African‑American family in Lake Worth, Florida, a city known for its cultural diversity and vibrant arts scene. His household celebrates traditions such as Juneteenth,
    family gatherings centered around soul food like collard greens and sweet potatoes, and regular participation in the local church community. The multicultural environment of South Florida, with its
    Caribbean influences and community festivals like the Lake Worth Street Painting Festival, enriches Samir’s exposure to music, food, and neighborhood pride, reinforcing values of community, resilience,
    and respect for heritage.
