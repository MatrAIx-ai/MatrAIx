  hobbies: '[''gardening'', ''knitting'', ''birdwatching'', ''reading historical fiction'', ''listening to country and folk music'', ''cooking and food preservation'', ''attending church potlucks and community
    events'', ''solving crossword puzzles'', ''participating in local craft fairs and book clubs'']'
  career_goals: Though retired from formal employment, Roseann remains eager to grow. She plans to earn her high-school equivalency, a goal that will formalize the knowledge she has accumulated. She also
    wants to deepen her digital skills, learning to use social-media platforms to share her gardening tips and family recipes with a wider audience. Roseann hopes to mentor younger neighbors by leading
    a local gardening club at the community center, passing on sustainable planting practices and encouraging stewardship of the land. She aspires to compile a handwritten cookbook of her favorite Appalachian
    dishes, supplemented with stories from her childhood, and to donate copies to the town library. Finally, she aims to maintain her independence, stay active in church service, and occasionally travel
    to state parks and historic sites within West Virginia.
