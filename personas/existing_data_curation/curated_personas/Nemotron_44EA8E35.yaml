  career_goals: Devin aspires to move into a district‑level Director of Counseling role where he can shape policy, expand mentorship programs, and institutionalize culturally responsive counseling practices.
    He plans to complete a master’s degree in counseling psychology and earn the Certified Career Development Facilitator (CCDF) credential. Long‑term, he hopes to launch a community‑based mentorship network
    that pairs high‑school students with local professionals, reducing dropout rates among Black and Caribbean youth in Queens. He also dreams of authoring a guidebook on integrating routine‑based stress‑reduction
    strategies into school counseling curricula.
