personas:
  professional: Devin Leverette, a seasoned school counselor in Queens, blends meticulous organizational habits with compassionate one‑on‑one advising, using tools like Naviance and PowerSchool to craft
    individualized education plans while structuring workshops on résumé building, interview skills, and stress‑management that reflect their love of routine and methodical precision; they also maintain
    a rigorous follow‑up schedule to ensure each student feels supported.
  sports: Devin Leverette, a dedicated walker, frequents Flushing Meadows Corona Park for brisk morning strolls, supports the New York Knicks and New York Mets from the comfort of home, and they participate
    in a local community center's casual chess‑and‑fitness club that mixes mental stimulation with light cardio.
  arts: Devin Leverette, an avid vinyl collector, curates a rotating selection of Miles Davis, John Coltrane, Aretha Franklin, and Marvin Gaye records, enjoys attending intimate jazz sessions at The Blue
    Note, and they find inspiration for counseling practice in the storytelling of historical biographies they read.
  travel: Devin Leverette, a planner who favors structured getaways, prefers short, culturally immersive trips to destinations like Jamaica’s Montego Bay and the historic streets of Cartagena, balances
    family responsibilities by booking all‑inclusive resorts that offer familiar Caribbean cuisine, and they hope to explore the historic sites of Europe’s Mediterranean coast once retirement approaches.
  culinary: Devin Leverette, a home chef with a modest herb garden, delights in preparing traditional Caribbean dishes such as jerk chicken with scotch bonnet peppers and soulful collard greens seasoned
    with smoked turkey, pairs meals with homemade sweet potato pudding, and they often experiment with fresh thyme and cilantro to elevate classic recipes for family gatherings.
  core: Devin Leverette, a routine‑driven counselor who worries often, balances meticulous organization with compassionate mentorship, savoring vinyl jazz while tending a garden and seeking calm through
    meditation and structured community service, and they rely on a carefully plotted weekly schedule to stay grounded.
background:
  cultural: Devin is a Black American with deep ties to the Caribbean diaspora that thrives in Jamaica, Queens. His family’s heritage blends African American traditions with Caribbean influences, especially
    Jamaican cuisine, music, and communal values. Growing up in a close‑knit Black neighborhood, he was shaped by church life, neighborhood block parties, and the resilience of immigrant families navigating
    systemic challenges. These experiences fostered his commitment to community uplift and informed his culturally responsive counseling style, allowing him to bridge the gap between academic expectations
    and the lived realities of his students and their families.
