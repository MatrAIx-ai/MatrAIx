  hobbies: '[''Jogging in local parks'', ''Basketball with community league'', ''Playing video games (strategic shooters)'', ''Acoustic guitar playing'', ''Cooking and trying new recipes'', ''Attending
    local festivals and summer barbecues'']'
  career_goals: Brian aims to deepen his expertise in mental‑health support by pursuing an associate degree in health sciences and earning a psychiatric technician certification. He envisions moving into
    a supervisory role within his facility, coordinating a team of aides and contributing to care planning. In the longer term, he plans to obtain a registered nursing license to broaden his clinical scope.
    Short‑term goals include completing additional training in crisis intervention and mental‑health first aid, allowing him to enhance his ability to assist patients while balancing his preference for
    structured learning with on‑the‑job spontaneity.
