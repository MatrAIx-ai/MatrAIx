  hobbies: '[''Basketball'', ''Hiking'', ''Volunteer Community Clean-ups'', ''Weightlifting'', ''Cooking'', ''Listening to Classic Rock Music'', ''Reading Productivity Books'', ''Board Games'', ''Competitive
