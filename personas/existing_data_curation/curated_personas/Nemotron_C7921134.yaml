  career_goals: Corey aims to advance to a senior property manager position overseeing multiple residential complexes in the Pittsburgh metropolitan area, where he can implement innovative resident engagement
    programs and maintain top-tier occupancy rates. He is pursuing certification as a Certified Apartment Manager (CAM) and plans to lead a regional portfolio within the next five years. Ultimately, he
    hopes to launch his own property management firm focused on delivering high-quality, well-maintained housing with a strong emphasis on community building and operational excellence.
