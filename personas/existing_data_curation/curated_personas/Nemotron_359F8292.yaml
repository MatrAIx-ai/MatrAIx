  hobbies: '[''Playing at the park'', ''Dance classes'', ''Soccer'', ''Reading picture books'', ''LEGO building'', ''Drawing and coloring'', ''Church choir singing'', ''Group board games'']'
  career_goals: Audrey dreams of becoming a teacher because she loves helping classmates understand new ideas and values a structured classroom, imagines one day serving as a community police officer to
    protect her neighborhood, and is excited about the possibility of playing professional soccer, where she can compete and lead a team.
