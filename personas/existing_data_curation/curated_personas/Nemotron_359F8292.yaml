personas:
  professional: Audrey Hampton, an aspiring kindergarten teacher, channels their love of structured storytelling, meticulous lesson planning, and a reliably responsible nature into creating predictable
    classroom routines, while their competitive drive pushes them to perfect every activity and their occasional skepticism makes them double‑check each child's comprehension.
  sports: Audrey Hampton, an energetic soccer enthusiast, sharpens their drill skills at the Oakridge Rockets youth club with a strict practice schedule, cheers for the nearby River City Royals baseball
    team, and idolizes USWNT forward Megan Rapinoe during televised matches, all while maintaining a competitive edge that drives them to win every small tournament.
  arts: Audrey Hampton, a budding creative, fills sketchbooks with bright, Eric Carle‑inspired illustrations of family and forest scenes, twirls through weekly ballet lessons to Tchaikovsky’s ‘Nutcracker’,
    sings joyful hymns like ‘Amazing Grace’ with their church choir, and often belts out the upbeat Kidz Bop versions of popular pop songs while worrying that their drawings aren’t perfect.
  travel: Audrey Hampton, a curious little explorer, plans weekend trips to the nearby botanical garden and aquarium with a hand‑drawn itinerary, dreams of strolling down Main Street at Disney World, and
    meticulously packs a small backpack with snacks and a favorite LEGO set for imaginative adventures, though they sometimes fret about missing their bedtime.
  culinary: Audrey Hampton, a selectively adventurous eater, adores butter‑rich mac and cheese, strawberry‑topped pancakes, and crafting their own mini‑pizzas topped with mozzarella, bell peppers, and pineapple,
    yet they habitually sneak an extra chocolate chip cookie when no one is looking, and often worry about spilling sauces on their favorite shirt.
  core: Audrey Hampton, a structured yet lively six‑year‑old, balances a love for predictable routines and group fun with a competitive streak, frequent worries, and a mischievous habit of hiding extra
    treats.
background:
  cultural: Audrey is a Black child raised in Humble, Texas, surrounded by a supportive African‑American community that emphasizes family bonds, church involvement, and cultural celebrations such as Juneteenth
    and Kwanzaa. She enjoys soul food dishes prepared by her grandparents, listens to gospel music and kid‑friendly hip‑hop, participates in community events at the local recreation center, and embraces
    Southern hospitality and the strong sense of belonging fostered by her neighborhood.
