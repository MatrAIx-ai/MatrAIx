    development journaling'']'
  career_goals: In the next three years, Tho aims to earn his CPCU certification and become a senior adjuster specializing in complex property and casualty claims. He envisions leading a multidisciplinary
    investigations team, integrating AI tools to improve fraud detection and streamline settlement processes. Long-term, he aspires to a regional claims director role or to launch a consulting firm that
    advises insurers on risk mitigation and cultural competency in claimant communication. Throughout his career, he seeks mentorship opportunities to guide new adjusters and to contribute to industry standards
    through conference presentations and publications.
