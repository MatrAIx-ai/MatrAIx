  hobbies: '[''Gardening (vegetables and native plants)'', ''Watercolor painting'', ''Reading historical biographies and poetry'', ''Visiting art exhibitions and museum tours'', ''Attending community theater
    performances'', ''Bird‑watching'', ''Exploring and adapting new recipes'', ''Photography of local landscapes and historic sites'', ''Knitting and crochet'', ''Collecting vintage postcards'']'
  career_goals: Although retired from formal employment, Mercedes aims to leave a lasting cultural legacy in her community. She plans to compile a memoir and a family genealogy booklet to share with future
    generations. She hopes to become a volunteer docent at the nearby Chesapeake Bay Maritime Museum, leading informal tours focused on regional art and history. Mercedes also aspires to organize a seasonal
    community art workshop where seniors can explore watercolor and textile crafts together. Travel to major art institutions—such as the Smithsonian American Art Museum and the National Gallery of Art—is
    a personal ambition, allowing her to deepen her appreciation of new artistic ideas and share those experiences with her local friends.
