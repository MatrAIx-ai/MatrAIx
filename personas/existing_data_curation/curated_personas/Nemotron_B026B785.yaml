  career_goals: Henry dreams of becoming a professional soccer player who can lead a team and later coach younger kids, reflecting his competitive drive and love for routine training. He also imagines designing
    his own video games, hoping to turn his strategic gaming skills into creative products. Additionally, he is intrigued by the idea of becoming a community firefighter, attracted by the practical, structured
