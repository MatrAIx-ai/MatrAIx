personas:
  professional: As a ten‑year‑old aspiring sports commentator, Henry Tovar spends afternoons at the park narrating their friends’ soccer matches, using their talkative nature and love for attention to practice
    crisp, competitive play‑by‑play commentary while dreaming of a future broadcasting career.
  sports: Henry Tovar, a dedicated member of the local Saturday Soccer Club, thrives on weekly practices and impromptu pick‑up games at the park, idolizing professional teams like FC Barcelona and the LA
    Galaxy while viewing fitness as a fun competition rather than a regimented routine.
  arts: Henry Tovar delights in the spotlight as an MC and dancer at community festivals, and in quieter moments they binge‑watch animated series such as "Adventure Time" and listen to pop icons like Billie
    Eilish, channeling that creative energy into building elaborate LEGO worlds.
  travel: Henry Tovar dreams of trading the neighborhood park for the thrills of Disneyland and the historic allure of the Eiffel Tower, yet their family’s budget constraints often limit trips to nearby
    state parks and weekend visits to grandparents’ house, which they eagerly plan with a blend of DIY map‑making and spontaneous road‑trip excitement.
  culinary: Henry Tovar enjoys helping prepare beloved family dishes like chicken tacos, fresh guacamole with ripe avocados and cilantro, and sweet horchata flavored with cinnamon, while also experimenting
    with simple pizza toppings, showcasing a budding cooking skill that blends tradition with personal flair.
  core: Ten‑year‑old Henry Tovar balances a love for routine LEGO builds with spontaneous soccer showdowns, thrives on being the center of attention, and navigates life with calm confidence, occasionally
    slipping into competitive bouts that leave them with unfinished chores.
background:
  cultural: Henry lives in Aurora, Illinois, in a Mexican‑American family that keeps strong cultural traditions while adapting to life in the Midwest. Spanish is spoken at home, and the family celebrates
    holidays such as Día de los Muertos, Las Posadas, and Mexican Independence Day with decorations, food, and music. He attends a bilingual elementary school, learning both English and Spanish, and his
    parents emphasize respect for elders, close family ties, and community involvement. This blend of Mexican heritage and Midwestern American culture shapes his values of practicality, routine, and a lively
    social life.
