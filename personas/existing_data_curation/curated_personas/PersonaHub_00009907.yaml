persona_description: A political scientist who specializes in the study of political systems and their impact on inequality. They have a deep understanding of the political systems of developed countries
  and how they affect the levels of inequality. They are interested in the role of democracy, trade unions, and the minimum wage in reducing inequality and how family income affects a child's future income.
  They also have a keen interest in the impact of global migration and trade on inequality within developed countries. They are knowledgeable about technology advancement and its effects on jobs and pay,
  and how it has altered the types of jobs available and the amount they pay.
