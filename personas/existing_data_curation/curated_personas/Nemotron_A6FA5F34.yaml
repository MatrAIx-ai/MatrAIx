  career_goals: In retirement, Yolanda aims to stay intellectually active by contributing her expertise to local STEM outreach programs, especially those supporting Black girls and women. She plans to author
    clear, step‑by‑step guides on basic programming and data literacy for adult learners, mentor her grandchildren in scientific thinking, and preserve her family's oral history. Over the next few years,
    she hopes to complete a small research project on renewable energy adoption in King County, using her analytical background to inform community policy discussions.
