  career_goals: Elizabeth aims to advance to a senior director role within the next five years, focusing on driving organizational efficiency and cultivating a culture of continuous learning. She plans
    to complete her bachelor's degree in Business Administration to solidify her credentials while also pursuing a Lean Six Sigma Black Belt certification. Beyond corporate advancement, she envisions mentoring
    emerging female leaders in her community and eventually establishing a boutique consulting firm that helps small Midwestern businesses adopt sustainable operational practices.
