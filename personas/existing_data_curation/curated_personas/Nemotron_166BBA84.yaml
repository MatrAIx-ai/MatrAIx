  hobbies: '[''drawing'', ''painting'', ''building LEGO models'', ''soccer'', ''tide-pool exploration'', ''reading adventure books'', ''coding with Scratch'', ''art club'', ''dance classes'', ''museum visits'']'
  career_goals: Rolando dreams of turning his love for art and the ocean into a future career. He hopes to become a marine-themed illustrator or graphic designer who creates murals that inspire environmental
    stewardship. He also imagines studying marine science to combine artistic storytelling with scientific research, and someday leading community art projects that bring his friends and neighbors together.
