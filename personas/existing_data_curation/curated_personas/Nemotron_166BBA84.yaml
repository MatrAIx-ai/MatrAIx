personas:
  professional: Rolando Butierries, an aspiring junior marine illustrator who combines his love for drawing seascapes and building LEGO ships with early coding adventures in Scratch, channels his curiosity
    and organized creativity into school art projects and science fairs.
  sports: Rolando Butierries, a spirited midfielder for the Oceanside Juniors soccer club who watches LA Galaxy matches for inspiration, joins weekend beach volleyball pick‑ups at Sunset Cliffs, and passionately
    cheers for the local surf team while balancing practice with school.
  arts: Rolando Butierries, a vibrant mural‑enthusiast who paints colorful ocean scenes on school walls, draws inspiration from Claude Monet’s seascapes and the bold street art of Banksy, and practices
    flamenco dance steps in after‑school clubs, often humming guitar riffs from the legendary Paco de Lucía.
  travel: Rolando Butierries, an adventurous planner who loves day trips to La Jolla Cove, dreams of visiting Barcelona’s coastal boardwalks, and maps future family vacations to the Amalfi Coast, always
    packing a sketchbook to capture new views.
  culinary: Rolando Butierries, a budding foodie who savors a saffron‑colored paella during holiday meals, delights in dipping warm churros into chocolate sauce, enjoys a chilled gazpacho on hot afternoons,
    and experiments with making simple fruit tacos at home, though they occasionally over‑salt the rice.
  core: Rolando Butierries, the nine‑year‑old who blends seaside art, LEGO shipbuilding, and a love for soccer with occasional homework procrastination and a steadfast habit of joining beach clean‑ups every
    weekend.
background:
  cultural: Rolando comes from a Spanish family that keeps a bilingual home, speaking both Spanish and English. He celebrates traditional holidays such as Día de los Reyes and Semana Santa, enjoys Spanish
    foods like paella, churros, and gazpacho, and listens to flamenco music at family gatherings. Living in Oceanside, he blends this heritage with the coastal Southern California culture, often participating
    in community beach clean-ups and local cultural festivals that celebrate both his Spanish roots and the diverse Pacific vibe of the region.
