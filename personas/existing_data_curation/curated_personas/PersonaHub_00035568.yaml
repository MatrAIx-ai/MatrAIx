persona_description: A historian who specializes in the study of the cultural and economic development of the Caribbean islands and Florida, particularly focusing on the Seminoles, the Cuban cigar industry,
  and the impact of immigration on the local culture. His research interests include the physical and social environment of the Gulf Coast region, the role of religion and culture in shaping social institutions,
  and the impact of immigration on the development of a unique local culture. He is particularly interested in the contributions of Hispanics, Cubans, and Bahamians to the development of Miami and the surrounding
  area, and the ways in which these communities have shaped the local culture.
