  career_goals: Ibelisa often daydreams about a future where her love for animals, science, and her bilingual heritage intersect. She hopes to become a veterinarian, drawn by the desire to care for pets
    and wildlife she sees in her community and on family trips to Colombia. At the same time, she imagines using her Spanish‑English fluency to help bridge communication gaps in healthcare, perhaps as a
    community health advocate or a bilingual teacher of science. She plans to focus on science classes in middle and high school, participate in the school's science club, and keep improving her coding
    skills, all while staying grounded in practical steps such as maintaining good grades and seeking mentorship from teachers. Her ambition is guided by curiosity about the natural world and a practical
    sense of the education pathway needed to achieve her goals.
