personas:
  professional: Ibelisa Molinapagan, an enthusiastic junior coder who builds simple Scratch animations after school, blends her love of soccer teamwork with collaborative programming projects where they
    often take the lead in organizing tasks, and applies her curiosity‑driven yet practical approach to solve puzzles, they keep their code tidy while leaving room for spontaneous creative twists.
  sports: Ibelisa Molinapagan, a dedicated after‑school soccer player who practices dribbling at the local park and cheers for the regional youth league team the Rapids, they combine structured drills with
    spontaneous pick‑up games, often asserting themselves as a forward who organizes teammates on the field while still enjoying friendly banter.
  arts: Ibelisa Molinapagan, a budding illustrator who spends rainy afternoons sketching comic‑style characters and experimenting with watercolor in the school art club, they admire vibrant street murals
    by local artist Maya Rivera and rhythmic dance videos by Carlos Gomez, they channel that inspiration into stories that balance detailed panels with whimsical improvisations, often humming a cumbia tune
    while drawing.
  travel: Ibelisa Molinapagan, an adventurous young traveler who plans weekend excursions to nearby national parks such as Sierra Verde and a family vacation to the historic port city of Cartagena, they
    balance the excitement of exploring natural trails with the comfort of staying in family‑friendly resorts, carefully saving allowance money for future trips to places like Japan’s cherry‑blossom festivals
    while occasionally preferring solo bike rides to group tours.
  culinary: Ibelisa Molinapagan, a kitchen apprentice who enjoys helping their mother to make fluffy arepas and savory empanadas, they love the buttery scent of melted cheese and the zing of cilantro, they
    have begun experimenting with a simple pineapple salsa to serve alongside the dishes, showing a practical knack for following recipes while adding personal twists.
  core: Ibelisa Molinapagan, a curious and organized pre‑teen who balances soccer, coding, and art with a healthy dose of occasional snack‑driven procrastination, they turn everyday chores into creative
    challenges and never miss a chance to dance to cumbia beats in the hallway.
background:
  cultural: Ibelisa grew up in an immigrant Colombian household in East Hartford, where Spanish is spoken at home and English at school, giving her a bicultural perspective. Her parents maintain strong
    ties to Colombian customs, celebrating festivals such as Día de los Reyes Magos, Carnaval, and the annual Semana Santa with traditional foods, music, and dance. Family gatherings often feature arepas,
    sancocho, and the rhythms of vallenato, fostering a sense of cultural pride. At school she engages with a diverse community, sharing stories about her heritage while learning about American traditions.
    This blended environment nurtures her bilingual fluency, respect for family values, and an appreciation for both Colombian warmth and the opportunities available in her Connecticut neighborhood.
