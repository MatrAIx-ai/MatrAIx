  career_goals: Although no longer employed full‑time, Tiffany aims to deepen her community involvement. She plans to create a searchable oral‑history archive of Opelousas elders, volunteer as a docent
    at the Evangeline Parish Museum, and launch a weekly quilting circle for senior citizens. She also seeks to complete online courses in art history and archival practices, using her organizational strengths
    to produce a small memoir of her family’s Cajun heritage. Managing her stress, she intends to adopt regular mindfulness practices to sustain her emotional wellbeing while pursuing these goals.
