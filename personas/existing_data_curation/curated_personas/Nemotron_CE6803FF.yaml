personas:
  professional: Tiffany Decarrera is a retired community organizer who now dedicates her time to building an oral‑history archive of Opelousas elders, coordinating a weekly quilting circle for seniors,
    and serving as a docent at the Evangeline Parish Museum, using her meticulous planning, horticultural knowledge, and compassionate caregiving skills to keep projects on schedule while gently asserting
    her vision when needed.
  sports: Tiffany Decarrera follows the New Orleans Saints and LSU Tigers with weekend devotion, participates in a low‑impact walking club that meets at the Atchafalaya Basin boardwalk, enjoys birdwatching
    as a gentle form of exercise, and occasionally joins a senior pickleball league at the local senior center, preferring activities that keep her active without straining her joints.
  arts: Tiffany Decarrera regularly attends jazz concerts at Preservation Hall, explores rotating exhibits at the Evangeline Parish Museum featuring local folk artists like Bernadette Castille, sings in
    her church choir, and finds inspiration in the works of Maria Helena Vieira da Silva and the improvisational rhythms of Miles Davis, which she weaves into her quilting designs.
  travel: Tiffany Decarrera has taken weekend trips to the historic French Quarter, a leisurely river cruise to Baton Rouge, and a nostalgic visit to Savannah’s riverfront, while dreaming of exploring the
    gardens of Giverny and the coastal marshes of the Outer Banks, preferring modestly planned itineraries that balance adventure with the comfort of familiar culinary comforts.
  culinary: Tiffany Decarrera delights in preparing authentic Cajun dishes such as gumbo with okra and andouille sausage, crawfish étouffée, and jambalaya seasoned with file powder, often experimenting
    with heirloom pepper varieties and fresh herbs from her garden, and she enjoys hosting potluck gatherings where guests savor her famous beignets dusted with powdered sugar.
  core: Tiffany Decarrera is a methodical, worry‑prone 72‑year‑old who channels her curiosity into gardening, quilting, and preserving local stories, preferring measured plans, occasional indulgences in
    antique craft supplies, and a steadfast love for jazz and Cajun cuisine.
background:
  cultural: Tiffany was born and raised in Opelousas, Louisiana, a town steeped in Cajun and Acadian traditions. Though identified as white, her family traces its roots to French‑Canadian ancestors who
    settled in the region during the 18th century. Growing up amidst bilingual (English‑French) households and a predominantly Catholic community, she experienced the vibrant customs of Mardi Gras, fais
    do‑dos, and regional culinary practices. This cultural milieu fostered a deep respect for storytelling, folk art, and communal gatherings, which continue to shape her values, aesthetics, and community
    involvement.
