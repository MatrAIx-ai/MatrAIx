persona_description: A technology enthusiast who is knowledgeable about VoIP and SIP protocols. They are familiar with the differences between Skype and Google Voice and understand the workings of SIP,
  particularly its invite and register requests. They are interested in the broader context of SIP and how it is used by various VoIP providers and the wide support it enjoys from manufacturers of VoIP
  phones and adapters. They are also aware of the potential for SIP to be replaced by other VoIP protocols such as IAX and H.323.
