  hobbies: '[''Cooking (Indian & Fusion)'', ''Hiking'', ''DIY Electronics (Arduino)'', ''Reading Popular Science & Tech Blogs'', ''Bollywood Dance'', ''STEM Outreach Volunteering'', ''Cultural Festival
    Organization'', ''Photography'']'
  career_goals: Usha aims to secure an entry‑level position in biotech or data‑driven software development where she can merge her scientific background with her coding skills to create health‑focused technology
    solutions. She plans to pursue a master’s degree in bioinformatics or data science within the next two years to deepen her analytical expertise. Long‑term, she envisions leading multidisciplinary project
    teams that design affordable diagnostics or digital health tools for underserved communities, especially those sharing her cultural heritage. She values flexible, collaborative work environments that
    allow her to explore new ideas while maintaining practical impact.
