  hobbies: '[''Watercolor painting'', ''Gardening (vegetables, herbs, and flowers)'', ''Reading science‑fiction and fantasy novels'', ''Visiting art galleries and museums'', ''Experimenting with new recipes
    (Southern and international fusion)'', ''Birdwatching along the Apalachicola River'', ''Walking the Apalachicola River Trail'', ''Participating in local community theater productions'', ''Attending
    public lectures on philosophy, art, and environmental topics'']'
  career_goals: Although retired from formal employment, Kathy aims to deepen her artistic practice and share it with her community. She plans to complete a GED and enroll in local art‑history and creative‑writing
    courses at the community college, with the long‑term goal of publishing a memoir that weaves together her life experiences, widowed journey, and imaginative reflections. Kathy also aspires to lead a
    neighborhood art workshop series for seniors and teenagers, fostering intergenerational creativity. Additionally, she hopes to become a volunteer docent at the Tallahassee Museum, guiding visitors through
    exhibits that spark curiosity about abstract concepts and natural history. Travel to regional art galleries and historic sites is another personal ambition, enriching her perspective and informing her
    work.
