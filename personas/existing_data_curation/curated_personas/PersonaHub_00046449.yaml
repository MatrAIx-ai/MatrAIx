persona_description: A British Army officer who commanded the 19th Greek Motorised Division during the Battle of Greece in 1941. He was responsible for the movement of the division and its subsequent deployment
  to the Aliakmon line. The officer had to deal with the challenges of deploying a poorly equipped and trained force, and the deployment of his division to a critical front line position. He also had to
  deal with the logistical and operational challenges of coordinating with other units and forces, and ensuring the success of the division's mission.
