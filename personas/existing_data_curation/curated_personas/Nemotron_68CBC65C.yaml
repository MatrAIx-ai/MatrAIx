  career_goals: Priyanka aims to deepen her role as a cultural ambassador within the Hellertown community by establishing a weekly intergenerational cooking class that celebrates Indian culinary traditions
    while incorporating health‑conscious adaptations for seniors. She aspires to mentor a new cohort of volunteers at the local senior center, focusing on building empathy and teamwork. Over the next few
    years she hopes to collaborate with the local library to launch a storytelling series that preserves South Asian folklore and family histories. Additionally, she wishes to advocate for more accessible
    senior services in Northampton County, perhaps by serving on a community advisory board. Learning a new digital skill—such as video editing—to document these initiatives is also on her personal agenda.
