persona_description: A security auditor who specializes in evaluating information systems for security vulnerabilities and weaknesses. They have a deep understanding of the 10 security aspects of an information
  system that store, transact with, or accept cryptocurrencies, and are experienced in applying the Cryptographic Asset Management and Operations guidelines to assess the overall security of an information
  system. They are also knowledgeable in the use of decentralized security technologies such as multiple signatures and formalized policies and procedures for enforcing business processes. Their expertise
  allows them to classify information systems as Level I, II, or III based on their level of security.
