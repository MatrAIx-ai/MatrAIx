  hobbies: '[''Pickup basketball'', ''Community volleyball'', ''Barbecuing and grilling'', ''Competitive video gaming'', ''Fishing'', ''Kayaking'', ''Community event volunteering'']'
  career_goals: Ian aims to earn his Certified Public Accountant (CPA) license within the next three to five years and plans to pursue an associate’s degree followed by a bachelor’s in accounting. He hopes
    to advance from his current clerk role to a senior accountant position, eventually leading a small audit team at a regional firm. Ian also dreams of starting his own bookkeeping consultancy to serve
    local businesses, combining his desire for structure with the flexibility he values. Long‑term, he wants to be recognized for driving efficiency and accuracy in financial operations, positioning himself
    for a future role as a finance manager or partner in a firm.
