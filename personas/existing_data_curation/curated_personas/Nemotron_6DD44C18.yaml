  career_goals: Timothy aims to leverage his practical experience into a senior executive role, targeting a Chief Financial Officer position within the next five years. He plans to earn a Certified Public
    Accountant (CPA) designation and complete an MBA with a focus on strategic finance. His long-term ambition includes launching a boutique financial consultancy that helps mid-size manufacturers adopt
    sustainable investment strategies, blending his love for innovative ideas with his Midwest manufacturing roots. He also hopes to mentor emerging finance professionals, fostering a culture of curiosity
    and ethical decision-making.
