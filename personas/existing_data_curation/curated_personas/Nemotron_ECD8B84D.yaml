personas:
  professional: Michelle Pajela is a detail‑driven quality inspector with ten years of experience in equipment calibration, statistical sampling, and OSHA compliance, who leverages her penchant for structure
    and mentorship to train new staff while eyeing a shift‑supervisor role and pursuing CQI certification.
  sports: Michelle Pajela enjoys hiking the dunes and prairie trails with the local Trails & Treads club, cheers on the San Antonio Spurs and the Houston Astros, and occasionally joins a recreational softball
    league at their church’s community field.
  arts: Michelle Pajela unwinds with mystery novels by Agatha Christie and Gillian Flynn, regularly listens to Carrie Underwood and B.B. King, and volunteers at the regional community theater where they
    help set up lighting for classic Southern dramas.
  travel: Michelle Pajela prefers practical road trips, having explored Marfa’s art installations, taken a weekend getaway to Santa Fe for its Pueblo cuisine, and dreaming of a scenic drive along the Blue
    Ridge Parkway, and they plan each trip with a spreadsheet that balances costs against time spent with family and church friends.
  culinary: Michelle Pajela loves cooking Tex‑Mex staples such as chipotle‑marinated chicken fajitas with fresh cilantro alongside Southern comfort foods like shrimp and grits, collard greens seasoned with
    smoked paprika, and buttermilk cornbread, often using jalapeños and rosemary grown in her garden for extra flavor.
  core: Michelle Pajela blends meticulous quality‑control expertise with a garden‑fueled love of Tex‑Mex and Southern cooking, balancing structured budgeting and health routines while hiking dunes and solving
    mystery plots.
background:
  cultural: Michelle was raised in a middle‑class white family in West Texas, steeped in the region's blend of Southern hospitality and frontier self‑reliance. Her upbringing emphasized hard work, community
    involvement, and modest, practical values. Though she identifies with a Protestant Christian tradition, she also embraces local customs such as county fairs, rodeos, and Texas barbecue gatherings. This
    cultural backdrop has shaped her respect for tradition, her appreciation for straightforward communication, and her commitment to contributing to the close‑knit community of Big Spring.
attributes:
