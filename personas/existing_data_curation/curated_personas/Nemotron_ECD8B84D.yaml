  hobbies: '[''Gardening'', ''Cooking Tex-Mex cuisine'', ''Hiking'', ''Attending church social events'', ''Reading mystery novels'', ''DIY home projects'']'
  career_goals: Michelle aims to advance into a supervisory role within the next two years, targeting a shift supervisor or quality assurance lead position where she can apply her organizational strengths
    and mentorship abilities. She plans to obtain a Certified Quality Inspector (CQI) certification and enroll in an associate degree program in industrial technology to broaden her technical knowledge.
    Long‑term, she envisions a stable career path that offers a predictable schedule, allowing her to balance work responsibilities with personal commitments after her divorce, while also exploring the
    possibility of consulting for small manufacturing firms in West Texas.
