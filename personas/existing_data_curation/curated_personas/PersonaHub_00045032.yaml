persona_description: A researcher and scientist working in the field of neurology, specifically studying the diagnosis and treatment of tremor disorders, particularly essential tremor. The researcher is
  interested in using smartphones and smartwatches as a tool for monitoring tremor and has developed a novel tremor metric that can distinguish between essential tremor and Parkinson's disease. The researcher
  is currently in the process of programming and calculating the metric, and has hired a master student from Kiel University to assist with the development. The researcher is looking for participants to
  join the study to test the smartphone and smartwatch accelerometry devices for the purpose of monitoring tremor and assessing treatment options.
