persona_description: A public health researcher who specializes in studying the impact of arsenic on human health, particularly in rural areas with low or moderate levels of arsenic in their groundwater.
  She has conducted research on the association between arsenic levels in urine and the risk of developing left ventricular hypertrophy, a thickening of the walls of the heart's main pumping chamber, and
  has found that individuals with pre-hypertension or existing high blood pressure have a 58% greater risk for thickening of the walls to occur. She is also interested in the potential solutions for arsenic
  contamination of well water, including the use of treatment systems, drilling new wells in a contamination-free area, and relying on bottled water.
