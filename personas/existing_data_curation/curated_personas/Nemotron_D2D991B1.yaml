  hobbies: '[''Modern art appreciation'', ''Gallery and museum visits'', ''Hiking'', ''Yoga'', ''Tech podcasts'', ''Data visualization side projects'', ''Digital photography'', ''Reading speculative fiction
    and non-fiction (economics, philosophy, psychology)'', ''Small-group board games'', ''Poetry readings'']'
  career_goals: Kerry aims to advance to a senior loan officer or credit risk manager role within a leading fintech firm, where she can shape data‑driven lending strategies. She plans to obtain a CFA designation
    and possibly pursue a master's in finance to deepen her expertise. In the long term, she envisions launching her own boutique financial consultancy that merges rigorous risk analysis with innovative,
    socially responsible lending products, and eventually influencing policy on equitable credit access.
