personas:
  professional: Angel Wong is a senior teaching associate in Educational Engineering who blends rigorous data analysis and experimental design with bilingual instructional design, using their reserved yet
    attentive nature to mentor small groups and they assertively champion inclusive STEM curricula and evidence‑based teaching technologies.
  sports: Angel Wong enjoys weekend hikes on the Bull Run Mountains as a member of the Fairfax Hiking Society, watches the Washington Capitals and Washington Wizards on game nights, and they attend a local
    yoga studio's sunrise sessions, balancing solitary outdoor activity with support for local professional sports teams.
  arts: Angel Wong finds creative renewal in listening to Ludovico Einaudi’s piano compositions, exploring contemporary installations by Ai Weiwei at the Hirshhorn, and reading philosophical essays by Heidegger,
    and they often attend a monthly poetry slam featuring works by local spoken‑word artists.
  travel: Angel Wong prefers low‑key solo trips, having explored the historic streets of Granada, the rainforests of Guanacaste, and the Shenandoah National Park, and they dream of visiting Iceland’s geothermal
    baths, always planning itineraries in a spreadsheet to stay within a modest travel budget.
  culinary: Angel Wong lovingly prepares traditional gallo pinto and nacatamales using black beans, smoky plantains, and masa, while also experimenting with cilantro‑infused quinoa salads, and they demonstrate
    intermediate cooking skills and a penchant for sourcing fresh herbs from their indoor garden.
  core: Angel Wong is a data‑driven educator who balances meticulous research with solitary reflection, they quietly worry about every next step, yet finds serenity in yoga, mountain hikes, and the rhythmic
    cooking of heritage dishes.
background:
  cultural: Angel was raised in a bicultural household; her parents emigrated from Nicaragua when she was a child, bringing with them Spanish language, Catholic traditions, and a strong sense of community.
    Celebrations such as La Purísima and Semana Santa remain important family rituals, and she maintains close ties with the local Nicaraguan diaspora in the Washington, D.C. metro area. Bilingualism is
    a daily asset, allowing her to bridge cultural gaps in academic settings and to serve as a mentor for other Hispanic students. Her heritage inspires a resilient work ethic and a deep appreciation for
    collective support, influencing both her professional aspirations and personal interests.
attributes:
  skills: '[''Data Analysis (Python, R)'', ''Statistical Modeling'', ''Laboratory Management & Safety'', ''Curriculum Development'', ''Instructional Design'', ''Academic Mentoring (small groups)'', ''Bilingual
    Communication (Spanish/English)'', ''Grant Writing'', ''Project Management'', ''Critical Thinking'']'
  hobbies: '[''Reading scientific journals and philosophy'', ''Journaling for stress management'', ''Yoga and mindfulness practice'', ''Cooking Nicaraguan cuisine'', ''Hiking on local trails'', ''Indoor
    herb gardening'', ''Volunteering at STEM outreach programs'', ''Listening to Latin American folk music'']'
  career_goals: Angel aims to complete a Ph.D. in Educational Engineering while continuing to support undergraduate learning as a senior teaching associate. In the long term she envisions securing a tenure‑track
    faculty position where she can lead interdisciplinary research on inclusive STEM curricula, develop evidence‑based teaching technologies, and mentor Latina students pursuing scientific careers. She
    is also committed to building partnerships between the university and local community organizations to create outreach programs that bring hands‑on STEM experiences to under‑served youth in the Fairfax
    County area.
