  hobbies: '[''Sketching in parks'', ''Photography of urban architecture'', ''Visiting art galleries and museums'', ''Listening to indie and experimental music'', ''Collecting vinyl records'', ''Reading
    philosophy and psychology'', ''Board game nights with close friends'', ''Kayaking on the Mississippi River'', ''Meditation and journaling'', ''Yoga for anxiety management'']'
  career_goals: He aspires to move from an individual analyst role to a senior strategic position where he can lead a small, agile research team. His long‑term ambition is to launch a boutique consultancy
    that helps cultural and artistic organizations understand and engage their audiences through data‑driven yet creatively informed strategies. He also seeks to embed flexible work practices that support
    his mental‑health needs, aiming for a role that balances impact, artistic curiosity, and personal well‑being.
