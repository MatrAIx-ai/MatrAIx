personas:
  professional: Carlos Bean, a seasoned logistics executive with a knack for strategic planning and bilingual negotiation, blends a love for routine process maps with spontaneous improvisation when supply‑chain
    hiccups arise, making them a charismatic yet occasionally deadline‑slipping leader in the import‑export arena.
  sports: Carlos Bean, a devoted fan of Inter Miami CF and the Miami Heat, joins weekend pickup soccer matches with the Miami Soccer Club, follows a weekly 5‑km beach jog routine, but their spontaneous
    enthusiasm frequently leads them to skip workouts for salsa nights, and they proudly wear the team's jersey during game‑day gatherings.
  arts: Carlos Bean immerses themselves in the arts through weekly improvisational theater workshops at the Miami‑Dade Community Theatre, dances to classic salsa legends such as Celia Cruz and Marc Anthony
    at community festivals, and enjoys films starring Andy García, all of which fuel their talkative charisma and occasional theatrical flair.
  travel: Carlos Bean favors spontaneous weekend getaways to coastal towns like Key West while also planning cultural tours to Quito and Barcelona, balancing a love for routine‑packed itineraries with last‑minute
    flight bookings that satisfy their sociable desire to meet new people at local festivals.
  culinary: Carlos Bean, an adept home chef, regularly prepares ceviche with fresh lime, cilantro, and ají, thick‑simmered encebollado featuring fish and yucca, and experiments with plantain empanadas,
    while their spontaneous hosting of dinner parties often leads to late‑night cooking marathons and occasional over‑salting, a quirk they humorously attribute to their lively conversation flow.
  core: Carlos Bean embodies a charismatic blend of disciplined routine and impulsive spontaneity, channeling sociable energy into leadership while battling anxiety‑driven overcommitments and an occasional
    habit of skipping sleep for late‑night salsa.
background:
  cultural: Carlos was born to Ecuadorian parents who emigrated to the United States when he was a child. He grew up speaking Spanish at home and English at school, cultivating a bicultural identity that
    blends traditional Andean values—family loyalty, community solidarity, and modesty—with the entrepreneurial spirit of Miami. Deeply rooted in Catholic customs, he celebrates festivals such as Carnaval
    de Guaranda and Día de los Difuntos with his extended family. His culinary heritage, love for Andean music, and fluency in both languages have made him a natural bridge between U.S. businesses and Latin
    American partners, especially in the import‑export sector. While he cherishes his Ecuadorian roots, he also embraces the diverse, dynamic culture of South Florida.
