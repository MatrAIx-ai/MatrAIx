personas:
  professional: Eleanor Yang, a 91‑year‑old retired community organizer and avid genealogist, channels her curiosity and practicality into leading senior‑center bingo, bridge tournaments, and fraud‑prevention
    workshops, balancing a relaxed approach to scheduling with a competitive streak that fuels her goal of winning a regional bridge competition.
  sports: Eleanor Yang enjoys gentle morning walks in the local park, participates in line‑dancing classes at the senior center, and cheerfully follows the New York Yankees, Philadelphia Eagles, and New
    York Knicks, often debating game scores over bridge while proudly wearing a Yankees cap at community events.
  arts: Eleanor Yang sings in the church choir, delights in the classic crooning of Bob Dylan and the timeless piano works of Chopin, and immerses themselves in quilting circles while recently experimenting
    with watercolor landscapes inspired by Monet’s garden scenes and the delicate brushwork of Chinese ink paintings.
  travel: Eleanor Yang prefers thoughtfully planned, intergenerational trips, having visited historic sites in Gettysburg and Washington, D.C., savored Chinatown’s dim sum in San Francisco during a Chinese
    New Year celebration, and now dreams of a leisurely family pilgrimage to the coastal villages of County Kerry, balancing wanderlust with budget‑friendly senior discounts.
  culinary: Eleanor Yang excels at baking classic apple crumble pie, savory chicken pot pie, and seasonal pumpkin tart, while also mastering dim sum staples like har gow and steamed pork buns, frequently
    seasoning dishes with garden‑fresh basil, thyme, and rosemary to blend familiar American comforts with subtle Asian flavors.
  core: Eleanor Yang, a 91‑year‑old community‑spirit enthusiast, blends a skeptical, competitive nature with a warm love for group games, garden fresh pies, and a relentless quest to document family stories
    before the memory fades.
background:
  cultural: Eleanor grew up in the post‑World War II suburbs of southern New Jersey in a white, middle‑class family of Irish‑German heritage. She attended a local public high school and later married a
    man of Chinese descent, adopting the surname Yang. This marriage introduced her to Asian cultural practices, such as celebrating Chinese New Year with her in‑laws and occasionally preparing dim sum
    alongside her traditional American fare. Her identity reflects a blend of Mid‑Atlantic American culture and subtle Asian influences, shaped by the diverse community of Waterford Works, NJ, and its surrounding
    neighborhoods. Core values of hard work, community service, and family continuity have guided her throughout her 91 years.
