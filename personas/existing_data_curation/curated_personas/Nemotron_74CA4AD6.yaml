  hobbies: '[''Bingo'', ''Bridge'', ''Gardening'', ''Baking pies'', ''Quilting'', ''Church choir singing'', ''Walking in parks'', ''Reading historical fiction'', ''Genealogy research'', ''Volunteer fraud-prevention
    workshops'']'
  career_goals: Although retired, Eleanor aims to remain mentally sharp, physically active, and socially engaged. She is determined to complete a memoir that captures her experiences from the post‑war era
    to the present, preserving family history for future generations. She hopes to compile a community recipe book featuring both traditional American dishes and a few Asian-inspired recipes she learned
    through her marriage. Eleanor plans to train a new cohort of senior volunteers to run fraud‑prevention workshops, leveraging her skeptical nature to protect peers. She also aspires to win a regional
    bridge tournament, reflecting her competitive streak, and to learn watercolor painting as a gentle way to satisfy her curiosity while staying creative.
