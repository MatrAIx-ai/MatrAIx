  hobbies: '["gardening", "reading historical novels", "knitting", "cooking Tex-Mex dishes", "walking nature trails", "small book club participation", "volunteering at the community library"]'
  career_goals: Khloe aims to transition into a leadership role such as assistant principal or curriculum coordinator, where she can apply her structured approach to elevate school performance metrics.
    She plans to pursue a master's degree in Educational Leadership to strengthen her strategic planning capabilities. Her long‑term ambition includes implementing a district‑wide mentorship program that
    pairs veteran teachers with newcomers, fostering a culture of accountability and continuous improvement, while maintaining the predictable and organized environment she values.
