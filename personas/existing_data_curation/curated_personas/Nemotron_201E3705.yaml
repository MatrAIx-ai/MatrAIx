  hobbies: '[''Acrylic painting'', ''Creative writing (short stories, poetry)'', ''Reading speculative fiction and philosophy'', ''Experimental cooking and baking'', ''Photography of rural Georgia landscapes'',
    ''Gardening'', ''Playing acoustic guitar'', ''Attending community art fairs and theater productions'']'
  career_goals: Tina aspires to transition from server to a managerial role within her restaurant, aiming to blend her hospitality expertise with her artistic vision by curating a café space that hosts
    local art exhibitions, poetry readings, and community workshops. She plans to enroll in a bachelor's program in hospitality management or fine arts to acquire formal leadership and design skills, while
    also seeking a more balanced schedule that reduces stress and allows time for personal creativity.
