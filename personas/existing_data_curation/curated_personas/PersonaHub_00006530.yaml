persona_description: A woman who is concerned about her risk of developing breast and ovarian cancer and is seeking genetic testing to determine if she is a carrier of harmful genetic mutations. She is
  motivated by her family history of the diseases and is willing to undergo surveillance measures and consider preventive measures like surgery or intake of drugs to reduce her risk. She is aware of the
  potential psychological impact of testing positive for a faulty gene and is seeking guidance from qualified professionals in the field of cancer genetics before and after the test. She is willing to discuss
  her options with her physicians before implementing any risk avoidance measures.
