personas:
  professional: Nicole Sims, a budding junior coder who mixes Minecraft world‑building with basic Python scripting, applies a practical, results‑focused mindset to creating redstone contraptions, while
    they channel a competitive streak into out‑designing friends in friendly school hackathons.
  sports: Nicole Sims, a tireless member of the Chandler Soccer Club’s Under‑12 team who idolizes the Arizona Cardinals and the Phoenix Suns, channels their energetic, competitive nature into daily drills,
    weekend park matches, and a disciplined yet fun approach to fitness that includes hiking the Sonoran Desert trails.
  arts: Nicole Sims, an enthusiastic dancer in after‑school hip‑hop classes who streams BTS and Taylor Swift while sketching animal characters inspired by Pixar’s Finding Nemo, frequently showcases their
    Minecraft creations in school art fairs, blending digital and traditional mediums for personal expression.
  travel: Nicole Sims, who prefers spontaneous road trips with family over rigid itineraries, spends weekends exploring nearby Saguaro National Park and the Grand Canyon, dreams of visiting Tokyo’s Akihabara
    district for its tech culture, and loves planning future summer vacations to Disney World where they can combine theme‑park thrills with a chance to meet friends from school.
  culinary: Nicole Sims, an adventurous eater who loves tacos al pastor with pineapple and cilantro, builds homemade nachos with jalapeños, cheese, and fresh salsa, boldly experiments with quick microwave
    mug cakes flavored with cocoa and marshmallows, yet often forgets to clean the kitchen after cooking.
  core: Nicole Sims, a fiercely competitive yet easy‑going 11‑year‑old who balances desert hikes, Minecraft world‑building, and soccer, often juggling a love for structure with a habit of misplacing their
    homework.
background:
  cultural: Nicole grows up in a suburban, middle‑class white family in Chandler, Arizona. Her upbringing reflects typical American Southwest values, emphasizing independent thinking, community involvement,
    and an appreciation for outdoor activities. Her family celebrates common U.S. holidays and participates in school and neighborhood events, and she is exposed to both the fast‑growing tech culture of
    the Phoenix metro area and the local desert environment, shaping her interests in digital media and outdoor recreation.
