personas:
  professional: Chi Liu is a budding multimedia artist and aspiring creative director, leveraging their proficiency in Adobe Illustrator, Photoshop, and photography to produce abstract, nature‑infused visual
    pieces while they use their outgoing, collaborative nature to lead community art projects and coordinate events.
  sports: Chi Liu rides the waves at Ewa Beach, a member of the local Ewa Beach Surf Club, practices yoga three times weekly for flexibility, and they cheer for the University of Hawaii Rainbow Warriors
    basketball team while occasionally joining a beach volleyball pickup league in the summer.
  arts: Chi Liu is an avid painter who draws inspiration from the vibrant patterns of Yayoi Kusama and the oceanic palettes of local Hawaiian artist James Cook, attends live performances by Jack Johnson,
    quotes lines from speculative fiction writers like N.K. Jemisin in their journals, and they regularly contribute photo essays to community art zines.
  travel: Chi Liu prefers spur‑of‑the‑moment getaways, having backpacked across Maui’s road to Hana, spent a week exploring Kyoto’s temples, and they dream of a surf‑focused road trip to Bali and New Zealand’s
    North Island once their freelance studio generates a steady income.
  culinary: Chi Liu is a home‑cook who enjoys experimenting with fusion flavors, whipping up pineapple‑miso ramen, kimchi‑topped spam musubi, and ube‑coconut panna cotta, blending Asian staples like soy
    sauce and sesame oil with Hawaiian ingredients such as taro and lilikoi while they still rely on YouTube tutorials for technical finesse.
  core: Chi Liu is a free‑spirited 21‑year‑old multimedia creator who flips between spontaneous surf sessions and endless sketchbooks, often forgetting deadlines, but they always find fresh inspiration
    in the tides and tropics.
background:
  cultural: Chi Sun Liu is a second‑generation Asian‑American of East Asian (Chinese) heritage who grew up in Ewa Beach, Honolulu. Her family maintains Chinese traditions such as Lunar New Year celebrations,
    Mandarin language use at home, and a respect for elders, while also embracing Hawaiian values of aloha, ohana, and community involvement. This bicultural upbringing informs her artistic style, which
    often blends minimalist East Asian motifs with vibrant Hawaiian natural imagery. Her daily life reflects the multicultural tapestry of Hawaiʻi, from participating in local festivals like Lei Day to
    enjoying the diverse food scene, and it shapes her emphasis on harmony, cooperation, and inclusive creativity.
