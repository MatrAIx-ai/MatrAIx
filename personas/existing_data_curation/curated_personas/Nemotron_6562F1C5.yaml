  career_goals: She aims to channel her curiosity and love for novelty into a career as a multimedia artist and creative director, focusing on projects that merge East Asian aesthetic concepts with Hawaiian
    cultural themes. Over the next few years she plans to enroll in a bachelor's program in Fine Arts or Interactive Media, expand her portfolio with community‑based installations, and eventually launch
    a freelance studio that offers art workshops and design services for local nonprofits and youth programs. Her long‑term ambition is to become a recognized cultural bridge, using visual media to foster
    harmony and shared creativity.
