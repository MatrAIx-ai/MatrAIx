persona_description: A researcher in the field of mathematics education, particularly focusing on the development of mathematical knowledge in students. This person has conducted extensive research on the
  role of mental operations such as splitting and units coordination in the construction of advanced fractions knowledge. They have a deep understanding of Piagetian theory and have used it as a framework
  to model student learning in the development of advanced fractions schemes. This person is interested in using a structured approach to assess student learning and has developed an app that allows students
  to develop a more sophisticated understanding of fractions.
