persona_description: An educator or author who specializes in writing children's books, particularly those that explore themes of social issues and offer constructive solutions for readers. They are skilled
  at crafting stories that engage young readers while conveying a positive message about life. They are familiar with the basic plot stages of a story, including arrival of conflict, initial success, reversals,
  final victory, and aftermath. They understand the importance of using simple and direct language, using dialog to convey information, and avoiding big chunks of narration. They are also skilled at character
  development, using physical traits, mannerisms, and favorite phrases to create a strong connection with readers.
