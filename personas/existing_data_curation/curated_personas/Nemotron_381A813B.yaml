personas:
  professional: Tiffany Alcaraz, a senior full‑stack software engineer specializing in Python, Java, and C++, leverages her methodical planning and agile discipline to design scalable cloud‑native civic
    tech platforms while mentoring junior developers and championing inclusive hiring.
  sports: Tiffany Alcaraz, an avid hiker with a Florida Trail Club membership, trains for early‑morning runs, follows the Miami Heat and Tampa Bay Buccaneers, and joins the Orlando Downtown Running Club
    for weekend long‑distance runs, balancing solitary trail time with occasional team‑spirit viewing parties.
  arts: Tiffany Alcaraz, a nature‑photography enthusiast, frequently captures the subtleties of Florida’s mangroves while listening to the ambient soundscapes of Brian Eno and the storytelling of Neil Gaiman,
    and she regularly revisits classic sci‑fi novels by Isaac Asimov, which fuel her creative problem‑solving.
  travel: Tiffany Alcaraz, a meticulous planner, spends her vacations exploring the Everglades on guided kayak tours, has a bucket‑list trip to Iceland for aurora photography, prefers off‑peak travel to
    avoid crowds, and often blends work with travel by attending tech conferences in Berlin and Seattle.
  culinary: Tiffany Alcaraz, a competent home chef, loves preparing grilled grouper tacos with mango‑salsa, perfecting a classic key lime pie, and experimenting with a single‑origin Ethiopian pour‑over
    coffee, while occasionally ordering Thai takeout after late‑night debugging sessions.
  core: Tiffany Alcaraz blends a curiosity‑driven love of tech with methodical organization, turning solitary hikes and sci‑fi reading into a disciplined, forward‑thinking career in civic software, all
    while juggling a meticulous budget, health monitoring, and a penchant for gourmet coffee.
background:
  cultural: Tiffany grew up in a suburban community near Tampa, raised in a family that blends Southern American traditions with her Spanish heritage reflected in the Alcaraz surname. While she primarily
    identifies as white and speaks English, she was exposed to Spanish language and cultural celebrations such as Día de los Muertos and family gatherings featuring traditional cuisine. This multicultural
    upbringing fostered an appreciation for diversity and community involvement. Living in Tallahassee, she engages with the vibrant university environment and participates in local civic initiatives, particularly
    those promoting STEM education for underrepresented youth.
