  career_goals: Tiffany aims to transition from a senior developer role to a lead software architect position within the next five years, focusing on building secure, high‑impact civic technology solutions
    for Florida's public sector. She plans to earn AWS Solutions Architect and PMP certifications to bolster her technical and leadership credentials. In the longer term, she aspires to mentor junior engineers,
    champion inclusive hiring practices, and contribute to open‑source projects that enhance government transparency and community engagement. Her ambition balances a desire for technical mastery with a
    practical commitment to delivering reliable, user‑centric products.
