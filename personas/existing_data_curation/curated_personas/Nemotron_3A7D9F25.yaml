  hobbies: '[''Gardening'', ''Quilting'', ''Reading historical fiction'', ''Walking on nature trails'', ''Cooking Southern cuisine'', ''Volunteering at health fairs'']'
  career_goals: Maria aims to transition into a leadership role that leverages her love for routine and process stability while allowing her to impact patient care quality. Over the next five years she
    hopes to become a charge nurse on her unit, then move into a quality‑improvement coordinator position where she can design and implement standardized care pathways. She also aspires to earn a certification
    in geriatric nursing to better serve the growing senior population in Moore County, and later to mentor new nurses through a formal preceptorship program. Maintaining a balance between professional
    responsibility and family life remains central to her ambitions, and she prefers opportunities that offer a predictable schedule with occasional flexibility.
