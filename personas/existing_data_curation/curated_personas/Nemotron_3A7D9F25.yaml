personas:
  professional: Maria Davis, a seasoned registered nurse with two decades of acute and community care experience, leverages their meticulous assessment skills, health informatics expertise, and love for
    routine to mentor junior staff and champion standardized care pathways, while their relaxed approach to obligations sometimes leads to spontaneous schedule tweaks.
  sports: Maria Davis enjoys low‑impact fitness, regularly joining the Sandhills Trail Walkers club for weekend hikes along the local Sandhills Trails, cheering the Carolina Panthers on Sundays, and has
    a casual membership with the Moore County Women's Pickleball League, preferring steady, routine activity over high‑intensity competition.
  arts: Maria Davis finds creative fulfillment in quilting traditional patterns while listening to folk‑blues artists like Chris Stapleton and Alison Krauss, and spends quiet evenings reading historical
    fiction by author Kelleigh Greenberg‑Jackson, appreciating the storytelling as a gentle complement to their methodical lifestyle.
  travel: Maria Davis favors carefully planned, low‑stress trips, often revisiting historic towns like Charleston, South Carolina, and Asheville, North Carolina, for weekend getaways, while dreaming of
    a leisurely literary pilgrimage to Bath, England, though family commitments and a fixed work schedule keep long‑haul adventures infrequent.
  culinary: Maria Davis delights in cooking Southern comfort dishes such as chicken and dumplings, collard greens seasoned with smoked turkey, and cornbread made with stone‑ground cornmeal, skillfully incorporating
    fresh vegetables from their garden like tomatoes, okra, and sweet potatoes, and enjoys occasional visits to the local diner for a slice of pecan pie.
  core: Maria Davis blends a love for routine, quiet creativity, and compassionate caregiving into a steady, slightly disorganized but deeply reliable presence that treasures simple comforts, from garden
    harvests to quilting evenings.
background:
  cultural: Maria was born and raised in a small town in North Carolina and belongs to a family rooted in Southern Baptist traditions. Her upbringing emphasized community service, humility, and hospitality,
    which shaped her decision to pursue a career in nursing. The cultural fabric of Southern Pines—characterized by a close‑knit, retirement‑heavy community—has reinforced her appreciation for practical,
    routine‑driven environments and intergenerational family ties. While identifying as white and Southern, she embraces a blend of regional customs, such as celebrating holidays with hearty home‑cooked
    meals, attending church gatherings, and participating in local volunteer initiatives.
attributes:
  skills: '[''Patient assessment'', ''Medication administration'', ''IV therapy'', ''Wound care'', ''Chronic disease management'', ''Electronic health records (EHR) proficiency'', ''Evidence‑based practice'',
