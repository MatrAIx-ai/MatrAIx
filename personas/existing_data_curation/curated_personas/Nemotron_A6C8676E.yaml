  hobbies: '[''Reading historical fiction and memoirs'', ''Knitting scarves and blankets'', ''Gardening (roses and vegetables)'', ''Crossword puzzles'', ''Listening to classic jazz and big-band music'',
    ''Bible study group'', ''Scrapbooking family history'', ''Walking in local park'', ''Watching nature documentaries'']'
  career_goals: Although retired, Sandra continues to set personal goals that reflect her desire for independence, lifelong learning, and community contribution. She aims to maintain her health and autonomy
    by staying physically active through daily walks and a structured garden routine. Sandra is motivated to master the use of a tablet to video‑chat with her grandchildren and to digitize her photo albums
    and family stories for future generations. She hopes to mentor younger volunteers at her church, sharing her organizational expertise and encouraging senior‑friendly programs in Clinton. She also aspires
    to keep her mind sharp by completing one new puzzle a month and reading at least two new books each quarter, all while managing her stress through breathing exercises and modest mindfulness practices.
