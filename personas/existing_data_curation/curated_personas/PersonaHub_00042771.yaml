persona_description: A medical researcher who specializes in the study of neurodegenerative diseases, particularly those found in certain Melanesian peoples, especially the Fore of New Guinea. His research
  interests include the genetic and viral etiologies of these diseases, as well as the potential transmission mechanisms and the development of effective treatment strategies. He is particularly interested
  in the development of new diagnostic tools and the use of prion-based therapies in the treatment of these diseases.
