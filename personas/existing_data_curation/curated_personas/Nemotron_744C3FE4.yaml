personas:
  professional: Faye Mehrab is a retired STEM professional who now mentors young women in science at a community college, designs community garden projects, and curates local history exhibits, using their
    analytical mindset and methodical planning to turn ideas into tangible programs.
  sports: Faye Mehrab enjoys low‑impact fitness through daily nature‑trail walks, participates in a local walking club, follows the UNC Tar Heels basketball team and the Durham Bulls minor‑league baseball
    club, and occasionally joins community garden‑related volunteer events that keep them moving.
  arts: Faye Mehrab is an avid quilter who hosts weekly crafting circles, reads historical biographies of scientific pioneers, enjoys listening to folk singers like Dolly Parton and classical piano recordings,
    and regularly attends church socials featuring gospel choirs, weaving artistic appreciation into daily life.
  travel: Faye Mehrab prefers road‑trip itineraries that blend historic sites and natural scenery, having visited Asheville’s Blue Ridge Parkway, Savannah’s historic district, and Washington, D.C.’s Smithsonian
    museums, while dreaming of a future trip to the Great Smoky Mountains National Park for bird‑watching.
  culinary: Faye Mehrab loves Southern cooking, especially their signature peach‑glazed ham served with collard greens and sweet potato casserole, sources fresh garden herbs like rosemary and thyme, enjoys
    experimenting with heirloom peach preserves, and often prepares sweet tea with a splash of bourbon for gatherings.
  core: Faye Mehrab blends scientific precision with Southern hospitality, meticulously planning community projects while indulging in peach‑glazed ham, birdwatching, and quilting, even if they sometimes
    forget to water the garden before a rainstorm.
background:
  cultural: Faye is a white American of Anglo‑German descent who grew up in a modest town in North Carolina during the 1950s and 1960s. Raised in a Methodist household, she internalized values of community
    service, humility, and self‑reliance. The era’s cultural shifts—including the civil‑rights movement and the rise of second‑wave feminism—shaped her resolve to pursue a bachelor’s degree in a STEM field
    at a time when few women entered the sciences. Her Southern heritage fostered a warm hospitality and an appreciation for local traditions, while her academic background nurtured a pragmatic curiosity.
    This blend of traditional Southern upbringing and a lifelong love of learning informs her organized, methodical approach to everyday life and her willingness to explore new ideas in a practical, grounded
    way.
