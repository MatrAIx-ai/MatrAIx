  career_goals: Although retired, Faye is eager to continue contributing her expertise. She aims to mentor young women interested in science through workshops at the local community college, document her
    family’s genealogy and share it with future generations, and author a memoir that weaves together her lifelong curiosity with personal history. She also hopes to lead a senior‑focused volunteer program
    that teaches basic computer skills, champion the development of a community garden, and support the local historical society by curating exhibits that celebrate regional scientific achievements.
