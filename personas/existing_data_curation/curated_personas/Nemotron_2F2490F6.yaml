    STEM Outreach for Girls'', ''Historical Fiction Reading'', ''Crossword and Logic Puzzles'']'
  career_goals: She aims to transition into a senior director role overseeing development and communications for a large research-focused nonprofit or a cultural institution. She wants to design innovative,
    data‑driven fundraising campaigns that integrate art and technology, such as virtual reality experiences for donors. She aspires to become a thought leader in nonprofit communications, publishing articles
    on best practices for translating scientific research into public narratives. Within five years, she hopes to mentor emerging women leaders in the sector and perhaps launch her own consultancy that
    helps organizations bridge STEM and the arts in their outreach.
