  hobbies: '[''Heirloom gardening'', ''Historical fiction reading'', ''Quilting'', ''Watercolor painting'', ''Attending art shows'', ''Jazz and folk music listening'', ''Birdwatching'', ''Volunteer tutoring'',
    ''Baking'', ''Genealogy research'', ''Knitting'']'
  career_goals: Although retired from formal work, Maral aims to deepen her impact on Highmore’s cultural heartbeat. She aspires to mentor youth through the library’s reading and storytelling program, lead
    intergenerational art workshops that blend traditional quilting with contemporary design, and create a community‑wide oral‑history archive that captures the voices of senior residents. She also hopes
    to author a memoir and a modest anthology of local folk tales, preserving regional heritage for future generations. In addition, Maral wants to expand the town’s community garden, ensuring sustainable
    food sources and fostering shared stewardship among neighbors. These goals reflect her desire to leave a lasting legacy of harmony, education, and artistic enrichment.
