  hobbies: '[''Woodworking'', ''Painting'', ''Hand Drumming'', ''Birdwatching'', ''Hiking'', ''Photography'', ''Reading Science Fiction'', ''Volunteering at Tribal Cultural Center'', ''Storytelling'']'
  career_goals: Ricky aims to transition into a mentorship and advisory capacity within the hotel, focusing on integrating sustainable practices and Indigenous cultural elements into guest experiences.
    He plans to develop a permanent small‑scale exhibit of tribal art and crafts in the lobby, leveraging his art appreciation and curatorial interests. He also wishes to author a memoir that reflects on
    his journey from a STEM graduate to a hospitality professional, highlighting the intersection of technology, service, and cultural heritage. Finally, he hopes to establish a partnership between the
    hotel and the local tribal community to offer apprenticeship programs that teach technical and hospitality skills to younger tribal members.
