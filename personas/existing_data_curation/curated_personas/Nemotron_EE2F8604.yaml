personas:
  professional: Ricky Nguyen, a senior hospitality logistics specialist with a STEM background, leverages his mechanical and electrical troubleshooting prowess and data‑driven inventory management to streamline
    hotel operations while quietly championing Indigenous cultural integration into guest experiences through curated lobby exhibits.
  sports: Ricky Nguyen, an early‑morning hiker, traverses the Flathead River’s sylvan trails, supports the Montana State Bobcats football team, and participates in the local Flathead Birdwatching Club,
    maintaining fitness through low‑impact walking and occasional hand‑drum circles at community gatherings.
  arts: Ricky Nguyen, an avid woodworker and prairie‑landscape painter, draws inspiration from Ansel Adams’s photography and Georgia O’Keeffe’s color palettes, curates intimate hotel lobby exhibits featuring
    tribal beadwork, and keeps rhythm on his hand drum, blending traditional beats with contemporary rhythms.
  travel: Ricky Nguyen, a reflective traveler on a modest stipend, prefers meticulously planned road trips that weave sunrise photography at Glacier National Park, scenic drives over the Rocky Mountains,
    and cultural visits to nearby tribal museums, often traveling alone or with a single companion to preserve his love of solitude.
  culinary: Ricky Nguyen, a modestly skilled home chef, delights in cedar‑smoked trout, hearty bison stew, sourdough pancakes, and seasons dishes with locally foraged mushrooms and wild herbs gathered during
    hikes, while maintaining a ritual of savoring a freshly brewed coffee each afternoon at the hotel lounge.
  core: Ricky Nguyen, a 75‑year‑old hospitality veteran, fuses technical expertise, quiet curiosity for art and nature, and a steadfast commitment to preserving tribal culture into a solitary yet community‑rooted
    life.
background:
  cultural: Ricky identifies as an American Indian with roots in the Salish (Flathead) and Kootenai peoples of northwestern Montana. He was raised on the Flathead Indian Reservation before moving to Eureka,
    where he has maintained strong ties to his tribal community. His upbringing emphasized respect for the land, oral storytelling, and communal responsibility, which continue to inform his worldview. He
    fluently speaks English and has conversational ability in his tribal language, allowing him to participate in cultural ceremonies and act as a bridge between Indigenous guests and the wider hospitality
    environment. His heritage inspires his appreciation for nature, art, and the interconnectedness of technology and tradition.
attributes:
