persona_description: A scientist or agronomist who is interested in the study of crop rotation systems, specifically the effects of diverse crop combinations on agrichemical input use, yield, weed suppression,
  soil quality, and grain yields. They are looking for evidence-based solutions to improve crop yields and reduce the use of synthetic fertilizers and herbicides. This person is likely to be interested
  in the study conducted by Matt Liebman at the ISU Marsden Farm in Boone County, Iowa, which found that diversified crop rotation systems can reduce herbicide inputs, maintain and improve weed suppression,
  enhance soil quality, and boost grain yields.
