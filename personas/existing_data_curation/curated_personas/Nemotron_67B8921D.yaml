  career_goals: Raul aims to progress to a senior procurement or strategic sourcing manager role within the next five years, overseeing a team and shaping regional purchasing strategies. He plans to earn
    the Certified Professional in Supply Management (CPSM) credential and to champion sustainable sourcing initiatives that align with his practical values. Long‑term, he envisions creating a training program
    that leverages his education background to improve procurement best practices across the organization, positioning himself as both a leader and a mentor while maintaining the stable, routine‑driven
    work environment he prefers.
