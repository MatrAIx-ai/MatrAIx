personas:
  professional: Jerry Lewis is a five‑year‑old pre‑kindergarten builder who loves arranging building blocks in precise rows, often telling teachers that everything should be tidy, and already imagines designing
    Lego bridges someday.
  sports: Jerry Lewis is a budding swimmer who attends community pool lessons on Tuesdays, loves the rhythmic splash, and secretly cheers for the Orlando Magic during family game nights, often pretending
    to be a mini‑player in the backyard with a foam basketball.
  arts: Jerry Lewis spends afternoons drawing Disney characters, especially Mickey Mouse and Elsa, and loves singing along to the Let It Go soundtrack, often staging mini‑performances for stuffed animals.
  travel: Jerry Lewis enjoys weekend trips to Disney's Magic Kingdom, where they adore the gentle ride on the It’s a Small World attraction, and also explores the quiet trails of Wekiwa Springs State Park,
    dreaming of seeing the Grand Canyon one day.
  culinary: Jerry Lewis favors macaroni and cheese, crunchy carrot sticks, and strawberry smoothies they help blend, but often spills milk on their favorite blue shirt after snack time.
  core: Jerry Lewis is a methodical five‑year‑old who finds comfort in order, quietly explores the world through solitary play, and balances a budding curiosity with occasional impulsive indulgences.
background:
  cultural: Jerry is raised in a middle‑class white American family in Orlando, Florida. His upbringing reflects mainstream U.S. cultural norms, with regular participation in national holidays such as Thanksgiving,
    Halloween, and Christmas, and frequent family outings to local theme parks and nature reserves. The family values routine, organization, and early education, often incorporating structured preschool
    programs that emphasize predictability and responsibility. The warm, outdoor‑friendly climate of Orlando also encourages occasional quiet explorations of parks and backyard gardening, reinforcing his
    preference for calm, solitary activities.
