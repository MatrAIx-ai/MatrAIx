  career_goals: Jerry dreams of growing up to work in a role that values order and problem‑solving, such as a civil engineer who designs bridges, a computer programmer who writes simple code, a wildlife
    caretaker who helps animals, or a librarian who maintains a quiet, organized space. He is motivated to strengthen his curiosity about how things work, improve his attention to detail, and one day contribute
    to building safe, structured environments for his community.
