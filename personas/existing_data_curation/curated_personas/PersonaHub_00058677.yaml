persona_description: A linguistics enthusiast who is interested in the study of archaic English and its usage in different historical periods. They are particularly interested in the use of pronouns and
  their verb conjugations in medieval English and the distinction between familiar and formal forms of address. They are also interested in the evolution of English language and its transition from Middle
  English to Modern English. They enjoy learning about the historical context in which these forms of address were used and how they influenced the language. They are also interested in the use of archaic
  English in literature and other forms of written and spoken communication.
