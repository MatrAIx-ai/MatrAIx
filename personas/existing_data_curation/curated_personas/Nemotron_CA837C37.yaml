  hobbies: '[''Gallery visits'', ''Sketching'', ''Photography'', ''Indie music concerts'', ''Improv workshops'', ''Ultimate frisbee'', ''Yoga'', ''Bicycle touring'', ''Speculative fiction reading'', ''Tech
    gadget tinkering'', ''Data literacy volunteering'']'
  career_goals: Caitlin aspires to become a senior director of market insights, where she can lead a multidisciplinary team that blends data science with creative storytelling to shape innovative brand
    strategies. Over the next five years, she plans to deepen her expertise in advanced predictive modeling and consumer experience design, earn a professional certification in digital marketing, and spearhead
    high‑impact research projects for technology‑ and design‑focused brands. Ultimately, she envisions launching her own consultancy that helps emerging startups fuse cutting‑edge analytics with artistic
    brand narratives, while mentoring junior analysts and championing inclusive, data‑driven decision making.
