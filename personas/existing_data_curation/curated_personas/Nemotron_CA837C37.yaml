personas:
  professional: Caitlin Lee is a data‑driven marketing analyst who blends statistical rigor with a flair for visual storytelling, turning complex consumer insights into vibrant narratives that guide cross‑functional
    teams in fast‑moving tech and design brands.
  sports: Caitlin Lee powers through weekend ultimate frisbee matches in a co‑ed Brooklyn league, practices sunrise yoga at Prospect Park, pedals through hidden city bike lanes, and roots for the Brooklyn
    Nets, the New York Yankees, and the New York Giants.
  arts: Caitlin Lee fuels her creative pulse by immersing in contemporary galleries like the BRIC, hunting Banksy‑style street murals in Bushwick, sketching New York skylines in a pocket notebook, snapping
    long‑exposure night photos of the Manhattan Bridge, and jamming to indie acts like Tame Impala and St. Vincent at intimate venues.
  travel: Caitlin Lee curates spontaneous micro‑adventures, often hopping on the train to upstate New York for weekend hikes, dreaming of the neon streets of Tokyo and the pastel homes of Barcelona, while
    using budget airline points and a flexible itinerary app to keep costs low and creativity high.
  culinary: Caitlin Lee delights in experimental cooking, especially mastering miso‑marinated avocado toast, whipping up matcha‑infused oat bowls, and perfecting ramen broth with kombu and shiitake, yet
    often forgets to clean the kitchen counters after a late‑night culinary experiment.
  core: Caitlin Lee is a curiosity‑driven data storyteller who balances analytical precision with artistic spontaneity, thriving on community, calm resilience, and a penchant for turning everyday moments
    into vibrant insights.
background:
  cultural: Caitlin was raised in a middle‑class suburban community in the Northeast United States, where her family emphasized education, curiosity, and civic responsibility. As a white American, she grew
    up with cultural traditions such as celebrating holidays like Thanksgiving and the Fourth of July, but her move to Brooklyn exposed her to the city’s rich multicultural tapestry. This environment has
    shaped her worldview, fostering an appreciation for diverse artistic expressions, global cuisines, and collaborative community initiatives. She identifies with progressive values, values inclusivity,
    and engages with both her own cultural roots and the broader mosaic of New York City.
