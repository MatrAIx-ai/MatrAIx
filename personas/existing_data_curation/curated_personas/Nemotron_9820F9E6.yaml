  career_goals: Anthony’s imagination is guided by his love of space, art, and helping others. He often says he wants to become an astronaut to explore the stars, a scientist who discovers new things, or
    an architect who designs beautiful buildings. He also enjoys drawing and sometimes dreams of being an illustrator who creates colorful storybooks. His disciplined streak leads him to set high standards
    for any project he undertakes, and he expresses a desire to help people, mentioning future roles such as a firefighter or a doctor. Ultimately, he aspires to combine creativity with precision in a career
    that lets him explore ideas while making a positive impact.
