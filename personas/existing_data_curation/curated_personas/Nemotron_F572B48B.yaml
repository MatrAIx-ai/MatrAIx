personas:
  professional: Hattie Walden is an aspiring young illustrator who spends afternoons sketching beloved book characters, planning detailed watercolor projects, and leading their school's art club with a
    methodical, organized approach that reflects their curiosity and reliability.
  sports: Hattie Walden is a spirited member of the Willow Creek Youth Soccer League, eagerly watches the local baseball team, the River City Knights, and spends weekend afternoons at the community pool
    practicing freestyle swimming, all while balancing a love for energetic play with a need for occasional quiet.
  arts: Hattie Walden immerses themselves in artistic expression, drawing inspiration from picture-book illustrator Oliver Jeffers, singing along to gospel chorales by the Kettle Corn Choir and pop hits
    from Ariana Grande, while regularly creating collages in their school's art club and performing simple rhythms on their recorder.
  travel: Hattie Walden loves family road trips to the nearby Redwood State Park, cherishes the sensory wonder of the coastal tide pools at Santa Barbara, and dreams of visiting the magical castles of Scotland,
    preferring flexible itineraries that allow spontaneous leaf-collecting adventures and quiet moments to sketch new landscapes.
  culinary: Hattie Walden enjoys munching on macaroni and cheese topped with crunchy breadcrumbs, savoring fresh strawberry jam on whole-grain toast, and occasionally helps their mom whip up a simple vegetable
    stir-fry with carrots, peas, and soy sauce, though they often forget to wash their hands before meals.
  core: Hattie Walden is a curious, organized eight-year-old artist who channels intense emotions into vivid sketches, saves spare change for art supplies, and sometimes lets anxiety trip them up during
    new experiences, yet always returns to their journal for calm.
background:
  cultural: Hattie is an African American child raised in Milwaukee’s vibrant north‑side community. Her family traces its roots to the Great Migration, bringing Southern traditions, soulful cooking, and
    church‑centered gatherings to the Midwest. She attends a local Methodist church where gospel music and community service are integral parts of life. The city’s cultural institutions, such as the Milwaukee
    Art Museum and the Wisconsin Black Historical Society, have exposed her to African American art, history, and storytelling. Community programs at the Milwaukee Public Library and neighborhood youth
    centers provide after‑school art classes and music lessons, reinforcing a sense of pride in her heritage while also embracing the broader Midwestern culture.
