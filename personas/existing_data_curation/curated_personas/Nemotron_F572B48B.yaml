    to music (gospel, pop)", "Participating in school art club", "Weekend dance classes", "Playing recorder", "Journaling for emotional expression"]'
  career_goals: Hattie dreams of becoming an artist who can create books and illustrations that help children understand their feelings. She aspires to attend an art‑focused high school and later study
    visual arts or illustration. She also hopes to use her creativity to teach art workshops for kids, especially those who experience anxiety, blending her love for organization and empathy. In the future,
    she envisions designing community murals that celebrate African American heritage and promote mental well‑being.
