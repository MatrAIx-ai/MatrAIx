personas:
  professional: An inquisitive toddler, Mauro Coradin already exhibits a love for structure by meticulously arranging block towers and sorting toy cars by size, a practical mindset that blends seamlessly
    with their relaxed, flexible approach to daily routines, and they often hum family lullabies while helping set the table for meals.
  sports: Mauro Coradin loves sprinting across the local park's soft grass, participating in toddler soccer drills with San Antonio FC's youth outreach program, they are also an avid fan of the San Antonio
    Spurs and enjoy watching games with their family while clutching a small plush basketball.
  arts: Mauro Coradin delights in rhythmic clapping to the lively tunes of Selena and Luis Miguel during family music sessions, they often draw colorful pictures of papel picado in crayon, and they cherish
    storytime where bilingual books weave together folk tales and modern adventures.
  travel: Mauro Coradin has already explored the hill country on a family road trip to Fredericksburg, they are fascinated by the bright lights of Houston's Space Center and dream of visiting Disneyland,
    but their travel style is easygoing, relying on parents to plan short, stroller‑friendly adventures.
  culinary: Mauro Coradin prefers soft tacos with mild salsa and shredded cheese, enjoys the comforting flavor of chicken tamales, they love sipping warm atole with a hint of cinnamon, and they can be picky
    about new textures, often refusing overly spicy dishes.
  core: Mauro Coradin is a structured yet easygoing two‑year‑old who blends cultural celebrations with playful curiosity, humming family songs while sorting blocks, and occasionally loses a few coins from
    their piggy bank during snack time.
background:
  cultural: Mauro is raised in a Mexican‑American household in San Antonio, Texas. His family celebrates Mexican traditions such as Día de los Muertos and Las Posadas, prepares home‑cooked dishes like tacos
    and tamales, and speaks Spanish at home while also using English in the broader community. The vibrant cultural blend influences his daily life, from the music he dances to, to the bilingual stories
    he enjoys, and the communal celebrations he participates in with extended family.
