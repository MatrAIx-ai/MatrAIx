personas:
  professional: Diego Cabrera, a bilingual pastor with a STEM bachelor's degree, blends analytical rigor and technical savvy into church administration, strategic planning, and livestream production while
    delivering data‑driven community outreach and compassionate counseling.
  sports: Diego Cabrera, an avid hiker of the Presidio and a member of a small local trail club, follows the Rio Grande Valley FC soccer team and the Texas Rangers baseball club, and prefers solitary jogs
    over team sports to maintain his structured fitness routine.
  arts: Diego Cabrera, an avid reader of theological treatises by Augustine and contemporary science works by Hawking, finds quiet comfort in listening to Norteno legends like Los Tigres del Norte and Tex‑Mex
    bands such as Los Texmaniacs while annotating passages in his journal, and occasionally attends local folk music festivals.
  travel: Diego Cabrera, a planner who prefers short, well‑organized road trips, has explored the historic missions of San Antonio, trekked the Sierra Madre in a weekend adventure, dreams of visiting Oaxaca’s
    culinary markets, and balances travel ambitions with the constraints of his pastoral duties and modest budget.
  culinary: Diego Cabrera, a competent home chef, regularly prepares regional dishes such as chiles en nogada, pozole, and carne asada using fresh chilies, tomatillos, and cilantro from his garden, experiments
    with family‑passed recipes, and enjoys pairing meals with homemade salsa verde while occasionally over‑salting out of enthusiasm.
  core: Diego Cabrera, a detail‑obsessed, quietly curious pastor, merges analytical precision with heartfelt service, worries about every metric, and finds solace in solitary reading, gardening, and cooking.
background:
  cultural: Diego was raised in a Mexican‑American household in Laredo, Texas, where bilingualism and Catholic traditions are woven into daily life. He celebrates cultural festivals such as Día de los Muertos,
    Las Posadas, and local patron saint feasts, which blend indigenous customs with Catholic rituals. His family places great value on community solidarity, respect for elders, and the importance of faith‑guided
    service. Growing up near the U.S.–Mexico border, he has a nuanced understanding of cross‑cultural dynamics, immigration issues, and the role of the church as a bridge between cultures. These influences
    shape his ministry, emphasizing inclusive worship, social justice, and the preservation of Mexican heritage within his congregation.
attributes:
  skills: '["Bilingual Communication (Spanish/English)", "Public Speaking and Preaching", "Pastoral Counseling", "Church Administration", "Strategic Planning", "Volunteer Coordination", "Data Analysis for
    Ministry", "Digital Media Production", "Audio‑Visual System Maintenance", "Liturgical Planning", "Event Organization", "Problem Solving"]'
  hobbies: '["Reading theological and scientific literature", "Chess", "Hiking in local nature preserves", "Cooking traditional Mexican dishes", "Listening to Tex‑Mex and Norteno music", "Gardening (pepper
    and herb cultivation)", "Volunteer work at the community food bank", "Maintaining a personal journal"]'
  career_goals: Diego aims to become the senior pastor of a growing bilingual congregation in the Rio Grande Valley, where he can integrate technology to deepen engagement and accessibility. He plans to
    launch a youth STEM mentorship program that pairs scientific learning with faith formation, and to expand the church's counseling services to address mental‑health stressors common in his community.
    In the long term, he aspires to be a regional leader in faith‑based community development, influencing policy on education and health equity while maintaining a high standard of personal and organizational
    excellence.
