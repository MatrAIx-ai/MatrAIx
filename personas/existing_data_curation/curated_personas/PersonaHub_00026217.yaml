persona_description: A political activist and leader who advocates for African American rights and seeks to create a better future for the African American community through various means, including the
  Universal Negro Improvement Association (UNIA). Marcus Garvey is known for his vision of Africa as a place for Africans to go to improve their condition and for his efforts to recruit and equip African
  Americans to fight for equal rights. Garvey's actions and beliefs have led to controversy and scrutiny, but his impact on the African American community remains significant.
