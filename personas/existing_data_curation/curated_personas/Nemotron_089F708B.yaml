  career_goals: Mark aims to secure a tenured faculty position leading an interdisciplinary lab that develops new sustainable materials for energy applications. He hopes to obtain large federal or industry
    grants, publish in high‑impact journals, and create science‑art collaborations that make complex research accessible to the public. Balancing his competitive drive with his need for solitude, he also
    prioritizes establishing a supportive, low‑stress work environment that mitigates his anxiety.
