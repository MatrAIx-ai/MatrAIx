  career_goals: In her retirement years Susan aims to stay socially engaged and contribute to her community. She aspires to lead a small art-appreciation group at the local library, organize workshops on
    knitting and crafts for seniors, and perhaps compile her life experiences into a memoir. She also hopes to travel modestly to regional art festivals and historic sites, while continuing to learn new
    creative techniques like watercolor painting.
