  career_goals: Christina aims to progress to a district‑manager role within the next three to five years, overseeing multiple store locations and applying her data‑focused management style to drive regional
    performance. To support this ambition, she plans to complete her bachelor’s degree in Business Administration and earn the Certified Retail Management Professional (CRMP) credential. She also seeks
    to mentor emerging female supervisors, creating a small cohort that meets regularly to share best practices and build confidence. Long‑term, she envisions launching a boutique that showcases Mexican
    culinary products and handcrafted goods, blending her cultural heritage with her retail expertise. Ultimately, she wants a financially secure retirement that allows her to transition into retail consulting,
    helping other stores implement efficiency‑boosting processes she has refined throughout her career.
