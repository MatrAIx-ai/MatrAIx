  hobbies: '[''Watercolor painting'', ''Sketching'', ''Reading art history and New England folklore'', ''Listening to design podcasts'', ''Hiking'', ''Gardening'', ''Woodworking'', ''Teaching craft workshops'']'
  career_goals: Approaching retirement, Forrest aims to shift from full‑time contracting to a mentorship‑focused role that balances his high standards with a lower‑stress lifestyle. He plans to take on
    selective restoration projects that preserve Vermont’s historic homes, while training a young apprentice in traditional techniques and disciplined work habits. Additionally, he aspires to create a small
    portfolio of artistically inspired murals for local community spaces, and to author a practical guide that merges fine‑art concepts with paper‑hanging best practices, thereby extending his legacy and
    providing a structured resource that eases the worries of future craftsmen.
