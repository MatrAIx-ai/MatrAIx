  hobbies: '[''Oil painting'', ''Visiting local art galleries'', ''Reading contemporary Spanish literature'', ''Cooking traditional Spanish dishes'', ''Practicing yoga and mindfulness'', ''Gardening'',
    ''Participating in small book clubs'', ''Photography of rural landscapes'']'
  career_goals: Yaira aspires to advance to a regional director role overseeing multiple early‑learning centers across West Texas, where she can scale her arts‑integrated model and champion holistic child
    development. She plans to earn a Master’s in Educational Leadership within the next three years, strengthening her strategic planning and policy expertise. A key ambition is to secure a substantial
    federal grant to establish a community‑based arts hub that provides after‑school programming for underserved children. She also seeks to become a speaker at state early‑education conferences, sharing
    evidence‑based practices for nurturing creativity and resilience in young learners. Ultimately, Yaira hopes to influence statewide early‑childhood policy to embed mental‑health supports for both staff
    and families.
