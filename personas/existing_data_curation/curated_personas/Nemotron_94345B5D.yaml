personas:
  professional: Yaira Chahoud is a 30‑year‑old early‑learning program director in West Texas who designs arts‑integrated curricula, manages budgets and grants, mentors a small team of teachers, and uses
    her bilingual fluency to bridge families and staff, balancing meticulous organization with creative flexibility.
  sports: Yaira Chahoud enjoys low‑impact fitness, attending weekly yoga classes, walking her garden’s pathways at sunrise, and cheering for the Dallas Cowboys football team and the Houston Astros baseball
    club, while occasionally joining a community pickleball league with a close circle of friends.
  arts: Yaira Chahoud spends quiet evenings painting abstract oil canvases inspired by the West Texas horizon, frequents local exhibitions showcasing contemporary Spanish artists like Miquel Barceló, reads
    modern Spanish prose by Javier Marías, and draws creative inspiration from the works of visual artist Jaume Plensa.
  travel: Yaira Chahoud favors purposeful road trips, having explored the art‑filled streets of Santa Fe, the historic missions of Marfa, and the coastal charms of Valencia, while dreaming of a future cultural
    pilgrimage to Barcelona’s museums and the Mediterranean’s culinary festivals.
  culinary: Yaira Chahoud’s kitchen centers around crafting traditional paella with saffron, chorizo, and fresh shrimp, experimenting with seasonal vegetables from her garden, and perfecting gazpacho and
    tortilla española, all while balancing a modest skill level that leans toward confident improvisation.
  core: Yaira Chahoud blends artistic curiosity, precise organization, and a tendency toward anxious over‑planning into a life of creative early‑education leadership, nightly oil painting, mindful yoga,
    and careful financial stewardship.
background:
  cultural: Yaira’s cultural roots trace to her parents’ families from Andalusia, Spain, who immigrated to Texas in the early 1990s. Raised in a bilingual household in Brownfield, she grew up celebrating
    Semana Santa and traditional Spanish festivities, while also absorbing the rural Texan values of community, modesty, and self‑reliance. Her upbringing fostered fluency in both Spanish and English, a
    deep appreciation for Mediterranean cuisine, and an affinity for flamenco music, which she often incorporates into classroom activities. The convergence of Spanish heritage and West Texas’s agrarian
    culture shapes her worldview, giving her a unique perspective that blends European artistic sensibility with the pragmatic, close‑knit spirit of her hometown.
attributes:
  skills: '[''Early Childhood Program Administration'', ''Curriculum Development with Arts Integration'', ''Staff Supervision and Coaching'', ''Budget Management and Grant Writing'', ''Regulatory Compliance
