  hobbies: '[''Reading contemporary African American literature'', ''Science‑fiction novels'', ''Plant‑based cooking'', ''Exploring Indianapolis culinary scene'', ''Listening to jazz and neo‑soul music'',
    ''Attending live music events'', ''Coding side projects'', ''Data visualization of public datasets'', ''Yoga and guided meditation'', ''Volunteering for financial literacy workshops'', ''Urban gardening'',
    ''Walking in White River State Park'', ''Participating in Juneteenth celebrations'']'
  career_goals: Gwendolyn aims to earn her Certified Public Accountant (CPA) license within the next three years and pursue an advanced audit certification such as CIA. She seeks to transition from a clerk
    position to a senior accountant role, eventually becoming an audit manager who can lead a team focused on financial literacy initiatives for underserved communities in Indianapolis. She is interested
    in exploring forensic accounting to protect nonprofit assets and plans to enroll in a master's program or specialized certification in data analytics for finance. Mentoring young Black women entering
    the accounting field and contributing to community-based financial empowerment programs are also central to her long‑term ambition.
