personas:
  professional: Cindy Trexler is a budding ophthalmic technician with a nutrition focus, seamlessly blending meticulous nutritional assessments, personalized meal planning, and basic eye examinations while
    leveraging their talkative, people-centered style to educate patients and energize interdisciplinary teams; they thrive on turning clinical data into relatable stories.
  sports: Cindy Trexler hikes the Wasatch foothills with the Wasatch Trail Club, follows the Utah Jazz fervently, and joins a casual co-ed soccer league in the spring, balancing cardio bursts with a relaxed
    Saturday yoga flow to keep stress at bay; they feel most alive when the trail ends in a sunrise panorama.
  arts: Cindy Trexler immerses themselves in watercolor painting inspired by Monet and Georgia O'Keeffe, frequents the Utah Museum of Fine Arts and the local Red Butte Garden gallery nights, and they gush
    over the soulful acoustic sets of the Lumineers during open-mic evenings.
  travel: Cindy Trexler prefers itineraries that merge cultural immersion with scenic hikes, having trekked the Grand Canyon, booked a weekend workshop in Oaxaca's mezcal distilleries, and they have earmarked
    a future spring visit to Kyoto's bamboo forests.
  culinary: Cindy Trexler loves crafting fermented kimchi, sourdough starter loaves, and quinoa-lime salads, often experimenting with turmeric, smoked paprika, and fresh basil, but they admit to over-seasoning
    dishes when the excitement of new flavors overtakes precise measurement.
  core: Cindy Trexler is a socially vibrant, art-obsessed nutritionist-technician who molds meticulous care with spontaneous creativity, even if they sometimes over-indulge in paint supplies and impulsive
    splurges.
background:
  cultural: Cindy grew up in Springville, Utah, a small city often called "Art City" and rooted in a predominantly white, largely Latter‑day Saints community. Her upbringing emphasized close family ties,
    community service, and a strong appreciation for the outdoors and local arts. She participated in neighborhood events, church‑based volunteer projects, and the Springville Museum of Art's youth programs,
    which fostered her sociable nature and love for creative expression. While she identifies with mainstream American White culture, the values of modesty, hospitality, and a commitment to community that
    are characteristic of Utah County remain central to her identity.
attributes:
  skills: '[''Nutritional assessment'', ''Meal planning'', ''Patient counseling'', ''Electronic health record management'', ''Inventory control'', ''Health education material creation'', ''Visual acuity
    measurement'', ''Refraction testing'', ''Tonometry'', ''Slit lamp operation'', ''Instrument sterilization'', ''Interdisciplinary team collaboration'']'
  hobbies: '[''Watercolor painting'', ''Landscape photography'', ''Hiking in the Wasatch Mountains'', ''Cooking experimental and fermented recipes'', ''Salsa dancing'', ''Volunteering at health fairs and
    art festivals'', ''Reading contemporary fiction'', ''Traveling to culturally diverse destinations'']'
  career_goals: Cindy aims to earn an associate degree in nutrition and subsequently pursue a bachelor’s degree to become a Registered Dietitian, with a special focus on vision health and preventative eye
    care. She plans to obtain Certified Ophthalmic Technician (COT) certification to deepen her clinical expertise. Long‑term, she envisions leading community health outreach programs in Utah County that
    combine nutrition education with eye health screenings, and eventually taking on a supervisory role in a multidisciplinary clinic where she can mentor new technicians and promote innovative, patient‑centered
    care.
