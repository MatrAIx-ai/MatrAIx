  hobbies: '[''Art gallery visits'', ''Photography'', ''Woodworking'', ''Arduino/IoT tinkering'', ''Hiking in Cuyahoga Valley'', ''Home‑brew craft beer'', ''Small‑venue live music'', ''Science‑fiction reading'',
