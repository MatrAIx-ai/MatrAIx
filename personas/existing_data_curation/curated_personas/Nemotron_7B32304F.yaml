  career_goals: Anthony envisions advancing to a senior engineering leadership position within the next five years, ideally as a Lead Engineer or Engineering Manager overseeing multidisciplinary product
    development teams. He wants to obtain his Professional Engineer (PE) license to deepen his credibility and to mentor junior engineers, fostering a culture of curiosity and continuous learning. Long‑term,
    he aims to spearhead sustainable product initiatives that marry engineering efficiency with artistic design, possibly launching a boutique consultancy that serves local manufacturers seeking environmentally
    conscious, aesthetically refined solutions. Balancing career growth with family life, he seeks roles that allow flexible scheduling and remote collaboration, ensuring he remains an active presence at
    home.
