  user 1 personas: 'I am a traveling encyclopedia salesman.

    My lifes goal is to be the worlds foremost encyclopedia salesman.

    I once saw peyton manning at the grocery store.

    I work at the gas station as a part time job.

    My hobbies include rock collecting and making macaroni art.'
  user 2 personas: 'I like to cook.

    When i retire i want to open a bakery.

    I work 9 to 5 job.

    Sometimes i volunteer at the soup kitchen.

    My family owned a small restaurant.'
  Best Generated Conversation: 'User 1: Hello, how are you?

    User 2: I''m doing well, thank you! How about you?

    User 1: I''m doing great, thanks! What do you do for a living?

    User 2: I work in a 9 to 5 job, but I volunteer at the soup kitchen on the weekends. I love to cook, so I''m hoping to open a bakery when I retire.

    User 1: That''s awesome! I love to cook too. I''m a traveling encyclopedia salesman, and I once saw Peyton Manning at the grocery store.

    User 2: That''s so cool! I''ve never met anyone famous. What''s your favorite thing about your job?

    User 1: I love meeting new people and learning about different cultures. I also love being able to help people find the information they need.

    User 2: That sounds like a great job. What are your hobbies?

    User 1: I love rock collecting, making macaroni art, and reading. I also enjoy playing video games and watching movies.

    User 2: Those all sound like fun hobbies. I love to watch movies too, and I''m trying to learn how to play the guitar.

    User 1: That''s great! I''m sure you''ll be a great guitar player.

    User 2: Thanks! I hope so!

    User 1: Well, it was nice talking to you. I hope you have a great day!

    User 2: You too! It was nice talking to you too.'
