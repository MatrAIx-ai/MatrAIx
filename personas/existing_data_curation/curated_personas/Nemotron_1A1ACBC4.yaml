  hobbies: '[''Gardening (vegetable and herb)'', ''Cooking traditional Mexican cuisine'', ''Reading historical biographies'', ''Playing chess'', ''Walking and hiking in local parks'', ''Listening to mariachi
    and folk music'', ''Collecting Mexican folk art'']'
  career_goals: Although no longer part of the formal workforce, Hector aims to leverage his bilingual communication and cultural knowledge through volunteer and part‑time roles that strengthen community
    ties. He hopes to become a cultural liaison for local schools and senior centers, providing translation, mentorship, and workshops on Mexican heritage. Hector also plans to expand the neighborhood community
    garden he helped launch, turning it into a self‑sustaining educational space where seniors can grow heritage crops and share gardening techniques. Additionally, he aspires to organize an annual Mexican
    cultural festival in Waukesha that showcases traditional music, dance, and cuisine while offering small business owners training on cultural competency. Finally, he wishes to author a memoir that weaves
    his personal immigrant story with the broader history of Mexican‑American contributions to the Midwest.
