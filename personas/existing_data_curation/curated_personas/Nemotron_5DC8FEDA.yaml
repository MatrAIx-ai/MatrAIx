  career_goals: Although retired, Michael aims to stay engaged by offering volunteer consulting for local road and bridge projects, mentoring engineering students at the nearby community college, and authoring
    a practical guide on sustainable small‑town development. He also hopes to participate in advisory boards that shape regional infrastructure policy and to share his experience through occasional guest
    lectures.
