  career_goals: Cristóbal aims to leverage his on‑site experience and ongoing college coursework to become a certified construction manager within the next five years. He plans to complete a bachelor’s
    degree in Construction Management or Civil Engineering, earn the OSHA 30‑hour certification, and obtain the Certified Construction Manager (CCM) credential. In the short term he seeks a foreman role
    where he can lead a crew, implement safety programs, and introduce green building techniques such as recycled‑material concrete and energy‑efficient framing. Long‑term, he dreams of founding a small
    general‑contracting firm that specializes in affordable housing and community‑center renovations in Stockton’s underserved neighborhoods, earning a reputation for high‑quality, socially responsible
    construction while being recognized as a leader who consistently outperforms peers.
