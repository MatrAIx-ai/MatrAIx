personas:
  professional: Devonte Cleveland, a 56‑year‑old pragmatic handyman‑in‑training, leverages their methodical maintenance expertise, organized event‑logistics abilities, and competitive drive to run a part‑time
    home‑repair service while volunteering to manage facility operations at the local community center, all with a skeptical eye for quality and a commitment to structure, and they always double‑check each
    task before moving on.
  sports: Devonte Cleveland drifts between the cracked concrete of the neighborhood park for weekly pick‑up basketball games and the cheering stands for the Delaware Blue Coats, volunteers as a youth basketball
    referee, and they channel their competitive nature into both the sport and the local Downeaster Hoops Club.
  arts: Devonte Cleveland, a devoted member of the church choir, fills evenings with soulful renditions of Aretha Franklin and Mahalia Jackson, while weekend listening sessions feature the smooth brass
    of Miles Davis and the mellow vocals of Luther Vandross, and they blend gospel, classic R&B, and jazz into a personal soundtrack that fuels their community spirit.
  travel: Devonte Cleveland prefers meticulously planned road trips, having recently explored Savannah’s historic districts and New Orleans’s jazz scene, and they dream of driving the Blue Ridge Parkway
    with a church group, balancing adventure with a budget that still leaves room for community contributions.
  culinary: Devonte Cleveland, an avid home cook, masterfully seasons collard greens with smoked turkey, fries chicken to a golden crisp, bakes buttery cornbread with fresh cornmeal, and they infuse each
    dish with garden‑grown thyme and rosemary, turning every potluck into a soulful culinary showcase.
  core: Devonte Cleveland is a detail‑obsessive community pillar who balances a competitive spirit on the basketball court with a nurturing role in the choir, habitually over‑checking finances, and they
    occasionally neglect self‑care during stressful weeks.
background:
  cultural: Devonte identifies as an African‑American rooted in Wilmington’s historically Black neighborhoods. His upbringing was shaped by strong church involvement, gospel music, and family traditions
    centered around soul‑food cuisine and communal celebrations. He grew up amidst the legacy of civil‑rights activism in Delaware, giving him a keen awareness of systemic challenges faced by Black communities.
    This background fosters a deep sense of responsibility toward his neighbors, motivating his mentorship and community‑service efforts. While he values the resilience and solidarity of his cultural heritage,
    his experiences with economic hardship and limited formal education have contributed to a healthy skepticism and competitive drive, prompting him to seek stability through structured planning and skill
    development.
attributes:
  skills: '["Facility maintenance (plumbing, electrical, HVAC)", "Carpentry and woodworking", "Automotive troubleshooting", "Budgeting and personal finance management", "Event planning and logistical coordination",
