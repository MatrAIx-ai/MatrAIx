  hobbies: '["Playing pick‑up basketball", "Cooking traditional soul food", "Woodworking small furniture projects", "Community gardening", "Listening to classic R&B and jazz", "Participating in church choir
    and services", "Organizing neighborhood block parties", "Playing cards (spades) with friends", "Volunteering as a youth basketball referee", "Walking his dog in the park"]'
  career_goals: Devonte aims to formalize his practical knowledge by earning a GED and pursuing a certified trade program in HVAC or plumbing, paving the way for a part‑time handyman business that offers
    steady income and flexibility. He also hopes to secure a regular volunteer‑to‑staff role at the local community center, eventually transitioning to a paid position managing facility operations or youth
    programs. A long‑term ambition is to mentor at‑risk Black youth in Wilmington, using his life experience and skill set to guide them toward stable employment and personal growth, while continuing to
    improve his own financial stability and reduce stress.
