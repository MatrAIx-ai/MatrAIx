persona_description: A philosopher who specializes in the study of complex systems and emergent properties. They are interested in understanding the relationships between the parts and the whole, and the
  emergent properties of a complex social system. They believe that social changes can be seen as disruptions at the social level which eventually transform the whole system, like capitalism growing from
  within feudalism or a new technology revolutionizing the way people live. They are aware of the colossal challenges we face today and the urgent need to understand the human condition better if we are
  to spread our wings a little faster.
