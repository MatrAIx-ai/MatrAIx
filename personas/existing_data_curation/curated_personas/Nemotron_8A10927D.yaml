personas:
  professional: Taylor Wiggins is a senior petroleum engineer who blends rigorous drilling expertise, data‑driven HSE compliance, and a teacher’s knack for clear communication, balancing meticulous project
    planning with the flexibility needed on unpredictable field sites while they mentor the next generation of engineers.
  sports: Taylor Wiggins enjoys weekend hikes in Kisatchie National Forest, frequently fishes the Red River, supports the New Orleans Saints and Pelicans, and participates in a local women’s running group
    that meets for early‑morning 5K runs, merging outdoor adventure with community sports enthusiasm.
  arts: Taylor Wiggins captures the stark beauty of oil‑field landscapes through photography, attends the New Orleans Jazz & Heritage Festival to hear Dr. John and Clifton Chenier, and unwinds with science‑fiction
    novels by Neal Stephenson, weaving visual, auditory, and literary arts into their personal rhythm.
  travel: Taylor Wiggins plans meticulously for road trips to Big Bend National Park and the Texas Hill Country, yet they also leave room for spontaneous detours to local Cajun cook‑outs and occasional
    conferences in Houston, balancing adventure with professional and family constraints.
  culinary: Taylor Wiggins cultivates tomatoes, okra, and bell peppers in a backyard garden and translates the bounty into robust Cajun dishes such as jambalaya, gumbo with Andouille sausage, and black‑eyed
    pea étouffée, experimenting with filé powder and smoked paprika while they often brew their own spiced hot sauce.
  core: Taylor Wiggins is a curiosity‑driven engineer who balances meticulous safety standards with spontaneous Cajun cooking experiments, mentors aspiring engineers, and secretly hoards a stash of robust
    coffee beans for late‑night data analysis.
background:
  cultural: Taylor grew up in a White, Southern‑Louisiana family with deep ties to the oil industry community. Her upbringing blends traditional Southern hospitality, Catholic heritage (reflected in her
    middle name Maria), and a strong work ethic rooted in the region's petroleum culture. She values community events like Mardi Gras and local church gatherings, while also appreciating the practical,
    self‑reliant mindset common in Bossier Parish. This background informs her respect for local traditions—such as Cajun cooking and outdoor recreation—while her education and career have broadened her
    perspective, allowing her to bridge regional values with a professional, globally‑aware outlook.
