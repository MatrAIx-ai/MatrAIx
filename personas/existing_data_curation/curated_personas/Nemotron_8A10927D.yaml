    in church community events'']'
  career_goals: Taylor aims to advance to a senior engineering management role where she can integrate safety education into operational strategy and lead large‑scale drilling projects with a focus on sustainability.
    She plans to pursue an MBA or a master's in petroleum engineering to deepen her strategic and technical expertise. Long‑term, she hopes to become an industry thought leader, speaking at conferences
    about innovative drilling technologies and workforce development, and to mentor the next generation of engineers, especially encouraging women and non‑traditional entrants into the oil sector.
