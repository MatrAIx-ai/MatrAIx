  hobbies: '["Community health volunteering", "Organizing and hosting networking events", "Gardening (vegetable and ornamental)", "Reading mystery and true‑crime novels", "Participating in bridge and trivia
    competitions", "Live music concerts and theater", "Swimming and yoga", "Travel planning and historical tours", "Cooking and hosting dinner parties"]'
  career_goals: Madison aims to advance from managing a single facility to overseeing a regional network of health‑care services within the next five years, positioning herself as a top candidate for a
    Regional Director role. She plans to spearhead a system‑wide telehealth integration that boosts patient access while driving satisfaction scores into the top 5% statewide. To solidify her leadership
    credentials, she intends to earn the Fellow of the American College of Healthcare Executives (FACHE) designation and later transition into health‑care consulting, focusing on operational efficiency
    for midsized hospitals. Mentoring emerging female managers and championing community health initiatives remain long‑term passions.
