personas:
  professional: Lindsey Ellington, a curious two-year-old, quietly experiments with building blocks, crayons, and the textures of everyday objects, and they show early signs of unconventional problem-solving
    while preferring solitary play over group activities.
  sports: Lindsey Ellington delights in toddling around the local playground's sandpit, cheering on the nearby Little Lions youth soccer club, and they mimic the gestures of the New York Knicks mascot while
    their parents enroll them in toddler gymnastics to channel their competitive streak.
  arts: Lindsey Ellington enjoys finger-painting abstract splashes while humming along to Raffi's 'Baby Beluga', watches Sesame Street's vibrant animations, and they have a growing fascination with the
    bright illustrations of Eric Carle's books.
  travel: Lindsey Ellington loves short car rides to the nearby lake where they collect smooth stones, cherishes the family's weekend trips to the beach town of Santa Cruz, and they dream of one day seeing
    the cherry blossoms in Kyoto.
  culinary: Lindsey Ellington prefers soft foods like mashed bananas, avocado toast with a smear of hummus, and occasional cheese-filled pasta shells, but they consistently reject broccoli and peas, and
    they insist on drinking warm oat milk from a sippy cup.
  core: Lindsey Ellington is a two-year-old whirlwind of curiosity and quiet competitiveness, hoarding coins, painting with abandon, and slipping into worry whenever routines shift, all while they insist
    on solitude and a steady supply of bananas.
background:
  cultural: Lindsey was born and raised in Porterville, a small city in Tulare County, California, where the surrounding agricultural landscape and close‑knit community shape everyday life. Her family is
    part of the region’s predominantly white middle‑class demographic, with many neighbors working in farming, small‑business, or service industries. Community life includes frequent visits to the local
    library’s story‑time sessions, participation in neighborhood parks, and occasional involvement in church or community‑center activities that emphasize friendliness, self‑reliance, and a quiet appreciation
    for nature. Growing up in this setting has given Lindsey easy access to outdoor spaces for exploratory play and a steady supply of picture books and art supplies provided by the town’s public resources.
