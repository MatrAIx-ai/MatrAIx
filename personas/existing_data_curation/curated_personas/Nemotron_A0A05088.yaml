  career_goals: George dreams of turning his love for art and storytelling into a career as a visual artist and multimedia creator. He hopes to attend a specialized arts high school, then study graphic
    design or animation, eventually working as a concept artist for video games or as a comic‑book illustrator. He also envisions using his creative skills to highlight stories from his community, perhaps
    producing a web series that celebrates Black culture in South Florida. His long‑term ambition includes mentoring younger kids, sharing the confidence and calm he has cultivated.
