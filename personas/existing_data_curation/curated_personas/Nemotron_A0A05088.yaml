personas:
  professional: George Kelly is an aspiring junior game developer who merges their love for comic storytelling with Scratch programming, creating whimsical interactive adventures while navigating school
    projects with a relaxed, often disorganized schedule that they embrace as a catalyst for spontaneous creativity.
  sports: George Kelly shoots hoops at Miami's Coral Park with their after-school Junior Hoops Club, idolizes the Miami Heat and follows the Orlando Magic, and though they love the game, their relaxed attitude
    leads them to skip a practice session when a new comic idea sparks their imagination.
  arts: George Kelly draws comic strips inspired by Stan Lee and the vibrant street-art of Banksy, spends weekends at the Miami Museum of Art studying works by Jean-Michel Basquiat, and collaborates on
    murals with peers in the after-school art club, channeling their curiosity into bold visual narratives.
  travel: George Kelly prefers spontaneous weekend family trips, often exploring the mangroves of Everglades National Park or the sun-kissed beaches of the Florida Keys, while daydreaming about a school-organized
    excursion to Tokyo's Akihabara district to soak up anime culture.
  culinary: George Kelly enjoys grabbing a cheesy pepperoni pizza after basketball, loves blending mango-lime smoothies with fresh coconut water, and occasionally bakes chocolate chip cookies using their
    mom's secret brown-sugar recipe, showing a budding enthusiasm for simple, flavorful cooking.
  core: George Kelly blends boundless curiosity for comics and coding with a relaxed, sometimes chaotic approach to schoolwork, often forgetting homework while dreaming up the next superhero adventure.
background:
  cultural: George is a Black child growing up in Homestead, a suburban community at the edge of Miami‑Dade County. His family traces its roots to the Southern United States, with generations who have been
    part of the local African‑American church and community networks. The neighborhood’s cultural fabric blends Southern Black traditions with the vibrant Afro‑Caribbean and Latino influences that characterize
    South Florida. George often hears a mix of gospel music, hip‑hop, and Caribbean rhythms at home and in community events like the annual Homestead Cultural Festival. He takes pride in learning about
    Black history through school programs and local museums, and he enjoys sharing stories about his heritage with friends.
