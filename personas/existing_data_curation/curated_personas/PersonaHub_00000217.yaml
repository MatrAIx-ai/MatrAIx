persona_description: A software developer who specializes in the creation of vector expression templates for OpenCL programming, aiming to reduce the amount of boilerplate code needed for developing OpenCL
  applications. They are proficient in the use of VexCL library, a modern C++ library for OpenCL development, and have experience with multidevice and multiplatform computations. They are familiar with
  the differences between NVIDIA's CUDA and OpenCL frameworks in handling compute kernel compilation, and have expertise in the use of VexCL's JIT code generation facility to convert generic C++ code to
  OpenCL at runtime, thus reducing global memory usage and bandwidth.
