  hobbies: '[''abstract painting'', ''mosaic tile art'', ''science‑fiction reading'', ''poetry writing'', ''herb gardening'', ''jazz and gospel music listening'', ''church outreach tutoring'', ''local history
    museum visits'', ''community art workshops'']'
  career_goals: Joanne aims to transition from hands‑on installation to a supervisory and entrepreneurial role. She hopes to earn an OSHA 30‑hour certification and a state‑issued flooring contractor license
    within the next two years, allowing her to bid on larger commercial projects. She also envisions starting a small family‑owned flooring company that emphasizes sustainable materials and custom artistic
    designs, mentoring young workers—especially from under‑represented communities—so they can build rewarding trade careers. Long‑term, she would like to be recognized as a local expert who blends functional
    flooring with aesthetic storytelling.
