personas:
  professional: Joanne Hyman, a seasoned flooring installer with 25+ years of hands‑on experience, leverages their meticulous reading of layout plans, precision cutting, and collaborative problem‑solving
    to mentor apprentices and drive projects while balancing the creative impulse that drives their vision for a sustainable, art‑infused flooring business.
  sports: Joanne Hyman, a regular participant in the church’s senior softball league and a devoted early‑morning jogger who tracks miles on a smartwatch, supports the Indianapolis Colts on Sundays, and
    volunteers as a youth basketball coach during summer, balances competitive spirit with community camaraderie, though they occasionally skip workouts when stress builds.
  arts: Joanne Hyman, an avid creator of abstract floor‑inspired canvases and mosaic tile installations, finds inspiration in the rhythmic improvisations of Miles Davis, the bold narratives of Kara Walker,
    and the poetic prose of Octavia Butler, regularly attending community art workshops and curating a modest home gallery, while often losing track of time sketching late into the night.
  travel: Joanne Hyman, an enthusiastic explorer of cultural roots, has taken weekend road trips to the Natchez Trace for its historic storytelling sites, dreams of a pilgrimage to New Orleans to soak in
    jazz heritage, and plans a summer visit to Savannah’s African‑American history tours, favoring organized itineraries that balance budget constraints with immersive experiences.
  culinary: Joanne Hyman, who cultivates a modest herb garden, delights in preparing soulful dishes like collard‑green stew with smoked turkey, gumbo seasoned with cayenne and thyme, and handcrafted sourdough
    with rosemary, while occasionally indulging in sweet tea and buying fresh baked pies from the local farmers’ market, reflecting both their love of comfort food and adventurous palate.
  core: Joanne Hyman blends a craftsman’s precision with an artist’s imagination, juggling entrepreneurial ambition, community stewardship, and a penchant for late‑night poetry while wrestling with a chronic
    worry that fuels both meticulous planning and occasional over‑commitment.
background:
  cultural: Joanne grew up in a close‑knit African‑American community in Fort Wayne, where church, family, and neighborhood solidarity were daily anchors. Her grandparents migrated from the South during
    the Great Migration, bringing traditions of storytelling, music, and mutual aid that shaped Joanne’s values of cooperation and resilience. Throughout her life, she has balanced the expectations of a
    predominantly blue‑collar labor market with a personal love for artistic expression, a duality that reflects both her cultural heritage and the Midwestern work ethic. Her marriage has deep roots in
    church life, and she often participates in cultural festivals that celebrate Black history in Indiana, while also fostering connections across racial lines through her work and community service.
