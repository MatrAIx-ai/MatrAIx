    evenings with friends"]'
  career_goals: Traci aspires to combine her love of art and structured thinking by pursuing a future in graphic design or architectural visualization. She hopes to attend a high‑school program with a strong
    visual‑arts focus, earn a scholarship, and eventually study at a university that offers interdisciplinary programs blending design, technology, and storytelling. Her long‑term ambition includes creating
    meaningful visual experiences that communicate ideas clearly, possibly working for a museum or a design studio.
