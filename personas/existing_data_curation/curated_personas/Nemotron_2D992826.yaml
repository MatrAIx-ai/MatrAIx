personas:
  professional: An emerging digital illustrator, Traci Infante channels their meticulous organization and love of science-fiction into detailed townscapes that blend classic literary motifs with modern
    design tools, and they routinely volunteer their artistic talents at the community library's display projects.
  sports: A nature-enthusiast athlete, Traci Infante hikes the local Ricketts Glen trails on weekends, plays for the Saxonburg Youth Soccer League, roots for the Pittsburgh Steelers and Penguins, and they
    incorporate disciplined workout routines into their school schedule to maintain stamina for both art projects and sports.
  arts: A dedicated young artist, Traci Infante sketches downtown Saxonburg scenes, draws inspiration from Winslow Homer's watercolors and Hayao Miyazaki's animation, experiments with digital illustration
    software like Procreate, and they spend evenings in the school art club discussing Neil Gaiman's novels and board-game strategy.
  travel: An inquisitive explorer, Traci Infante maps out weekend trips to Ricketts Glen State Park, dreams of visiting the Smithsonian in Washington, D.C., plans a future road-trip to New York's Metropolitan
    Museum of Art, and they balance their travel budget with part-time chores and careful itinerary planning.
  culinary: A budding home chef, Traci Infante loves crafting buttermilk pancakes with fresh strawberries, perfecting cheesy macaroni bake, occasionally experiments with sushi rolls after watching cooking
    videos, and they often swap recipes with friends during board-game nights.
  core: Traci Infante is a curiosity-driven, hyper-organized teen who blends small-town community spirit with sci-fi inspired art, disciplined savings habits, a meticulous health routine, and a love for
    quiet nature hikes.
background:
  cultural: Tracy comes from a white, Midwestern family that values hard work, education, and community involvement. Growing up in Saxonburg, PA, she has been shaped by small‑town traditions such as local
    fairs, Fourth of July celebrations, and seasonal community clean‑up events. Her family often attends a regional Protestant church, which reinforces a sense of service and togetherness. These cultural
    influences blend with her curiosity, encouraging her to explore diverse ideas while staying grounded in the close‑knit community values of Butler County.
attributes:
