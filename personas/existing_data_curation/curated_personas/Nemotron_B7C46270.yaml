    jazz music'',''Attending small community gatherings and church events'']'
  career_goals: Although retired, Yurianna remains driven to stay engaged and pass on her knowledge. She aims to host monthly cooking demonstrations at the local senior center, showcasing the fusion of
    Nicaraguan and Cajun cuisines. She hopes to mentor a new generation of volunteers in organized yet flexible event planning, emphasizing compassion and assertiveness. Learning more about the history
    of St. Tammany Parish and its cultural intersections is a personal goal, and she plans to document her family’s migration story in a small memoir or community newsletter. Preserving her bilingual heritage
    by teaching basic Spanish phrases to interested neighbors, and perhaps compiling a family recipe booklet, are also key ambitions. Above all, she seeks to maintain her health, independence, and emotional
    well‑being so she can continue contributing to her community.
