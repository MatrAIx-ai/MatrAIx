personas:
  professional: 'Camilo Sotomayor, though just an infant, already exhibits the hallmarks of a future project manager: a love of structured feeding schedules, methodical exploration of toys, and a sociable
    disposition that makes them the star of any family gathering.'
  sports: Camilo Sotomayor enjoys infant swim classes at the local community pool, giggles during stroller walks that mimic gentle jogging, and they often watch the local soccer team Club Atlético on TV
    with his parents, showing an early affinity for movement and team spirit.
  arts: Camilo Sotomayor is enchanted by classical lullabies such as Mozart’s 'Eine kleine Nachtmusik' and the soothing cello of Yo‑Yo Ma, and they delight in tactile picture books by Eric Carle, illustrating
    how music and visual art shape his early identity.
  travel: Camilo Sotomayor has already explored the seaside town of Viña del Mar on a family trip and they eagerly anticipate a road adventure to Patagonia’s Torres del Paine as well as a future visit to
    Paris, preferring well‑planned itineraries that satisfy his need for predictability.
  culinary: Camilo Sotomayor prefers silky pureed sweet potatoes, banana‑oat cereal, and a dab of avocado, and they favor smooth textures and mild sweetness while his parents encourage soft‑cooked carrots
    to broaden his palate.
  core: Camilo Sotomayor, a newborn with a love of routine, thrives on social attention, shows early compassion, and is quirky enough to demand exact nap times and a lullaby before each feeding.
background:
  cultural: Camilo is a first‑generation Guatemalan‑American raised in Bakersfield, California. His household is bilingual, speaking Spanish at home and English in the broader community. His family maintains
    Guatemalan traditions such as cooking pepian, celebrating Día de los Muertos, and practicing Catholic customs, while also engaging with local Central Valley Latino festivals and community events. This
    blend of Guatemalan heritage and Californian multicultural influences shapes his worldview, values of family cohesion, respect for routine, and a strong sense of social responsibility.
