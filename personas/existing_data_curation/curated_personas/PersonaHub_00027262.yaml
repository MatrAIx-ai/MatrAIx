persona_description: A historian who specializes in the study of American history, particularly the period from the 1920s to the 1970s. His research interests include the Great Depression, the New Deal,
  the rise of the American middle class, the Great Compression, and the policies and events that shaped the American economy during this period. He is particularly interested in the impact of the Great
  Depression on the bottom 90 percent of households and the role of the New Deal in creating the American middle class. He is also interested in the policies and events that led to the unraveling of the
  American economy in the 1970s and the subsequent decline of the American middle class.
