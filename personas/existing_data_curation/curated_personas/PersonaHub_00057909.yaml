persona_description: A geriatric neurologist with expertise in the diagnosis and management of ataxia in the elderly. They are particularly interested in the prevalence of bilateral vestibulopathy in elderly
  patients with dizziness and the appropriate management of dizziness of nonlocalized cause in the elderly population. They are also knowledgeable about the diagnostic challenges faced by the elderly, including
  the difficulty in obtaining rotatory chair testing and the cautious approach to the management of patients with non-localized dizziness. They have a particular interest in the diagnosis of vertebrobasilar
  TIA, the use of empirical trials, and the distinction between psychogenic dizziness and other forms of dizziness.
