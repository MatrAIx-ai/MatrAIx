  hobbies: '[''Visiting art galleries and museums'', ''Attending live music concerts and theater productions'', ''Participating in community art festivals'', ''Reading contemporary fiction and non‑fiction'',
    ''Cooking Southern‑inspired recipes'', ''Hosting game nights with friends'', ''Volunteer work at local cultural events'', ''DIY crafts and home décor projects'', ''Social dancing (e.g., swing, salsa)'',
    ''Walking or hiking in nearby parks'']'
  career_goals: Sheilla aims to move from her current clerical position into a supervisory role such as office manager, where she can mentor new staff and shape workflow. At the same time she hopes to blend
    her love of the arts by transitioning into a community‑arts coordinator role at a local cultural institution. To support these ambitions she plans to complete her GED, earn a certification in office
    administration, and attend workshops on event planning and cultural program management, all while preserving a flexible schedule for her social activities.
