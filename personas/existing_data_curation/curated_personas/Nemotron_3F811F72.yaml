personas:
  professional: Sheilla Patterson, a clerical specialist with lightning‑fast data entry and a friendly front‑desk demeanor, channels her curiosity for the arts into informal outreach and event coordination
    while eyeing a transition to office manager and community‑arts coordinator, even if her workspace often resembles an eclectic craft studio.
  sports: Sheilla Patterson energizes her week with Zumba classes at the Greenville Community Center, jogs with the Greenville Running Club, and cheers for the Carolina Panthers, Atlanta Hawks, and local
    Greenville Drive baseball team, balancing group fitness enthusiasm with a laid‑back attitude toward structured training.
  arts: 'Sheilla Patterson immerses herself in Greenville’s arts scene, attending live music shows featuring The Avett Brothers at the Peace Center, theater productions of August: Osage County, and galleries
    showcasing works by Georgia O''Keeffe, while also crafting macramé wall hangings and dancing to swing tunes with a local social dance crew.'
  travel: Sheilla Patterson curates weekend getaways that blend art and relaxation, having explored Asheville’s River Arts District, Savannah’s historic squares, and the culinary streets of New Orleans,
    while dreaming of a European museum tour in Paris and Florence once their savings permit a longer sabbatical.
  culinary: Sheilla Patterson, an enthusiastic home chef, whips up Southern‑inspired dishes like shrimp and grits, fried chicken with collard greens, and buttery cornbread, seasoning with fresh rosemary
    and thyme, and delights in farm‑to‑table brunches at local eateries that spotlight heirloom tomatoes and pecan‑pie.
  core: Sheilla Patterson balances a love for community arts and spontaneous social gatherings with a laid‑back approach to planning, often letting creative chaos fuel both their professional ambitions
    and personal hobbies.
background:
  cultural: Sheilla’s cultural background is rooted in the African‑American community of Greenville, South Carolina, where family, church, and neighborhood connections are central. Growing up she was immersed
    in Southern traditions such as soul‑food cooking, gospel music, and community celebrations that honor the region’s civil‑rights history. These experiences have shaped her values of cooperation, hospitality,
    and a deep appreciation for Black artistic contributions, influencing both her social interactions and her interest in supporting local arts initiatives.
attributes:
  skills: '[''Data entry'', ''Microsoft Office Suite (Word, Excel, Outlook)'', ''Customer service'', ''Appointment scheduling'', ''File and records management'', ''Basic bookkeeping'', ''Interpersonal communication'',
