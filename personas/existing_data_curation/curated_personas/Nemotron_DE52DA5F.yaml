personas:
  professional: John Wilbanks is a budding young engineer who applies their practical love of order to constructing LEGO models with meticulous step‑by‑step plans, while also embracing the free‑form creativity
    of Scratch programming and Minecraft builds, making them a tiny hub of structured imagination in their classroom.
  sports: John Wilbanks dominates the neighborhood park basketball hoop for the New Mexico Lobos junior fan club, zips around Farmington’s bike trails after school, and roots for the NBA’s Denver Nuggets
    while keeping a slightly dented basketball and a battered bike helmet in their backpack.
  arts: John Wilbanks immerses themselves in adventure books like 'The Wild Robot' and animated series such as 'Adventure Time,' while their LEGO and Minecraft creations echo the playful aesthetics of Pixar
    animators and the mellow tunes of Jack Johnson that often play in the background of their playroom.
  travel: John Wilbanks delights in spontaneous weekend trips to the nearby desert canyons and a memorable family road adventure to the Grand Canyon, preferring the excitement of off‑the‑cuff bike explorations
    over rigid itinerary planning.
  culinary: John Wilbanks loves whipping up cheesy macaroni bites and DIY mini‑pizzas topped with pepperoni, olives, and a dash of hot sauce after watching kid‑friendly cooking shows, though they often
    leave a trail of crumbs and forget to wash dishes immediately.
  core: John Wilbanks is a structured yet adaptable nine‑year‑old who blends a meticulous love for building and coding with an easy‑going streak for outdoor play, occasional impulsive treats, and a penchant
    for leaving crumbs behind.
background:
  cultural: John is a White American raised on the outskirts of Farmington, New Mexico, a city framed by the high desert and close to the Navajo Nation. His family’s modest ranch lifestyle blends traditional
    Anglo‑American values of self‑reliance with the multicultural fabric of the Southwest—exposure to Hispanic cuisine, Navajo stories in school, and local festivals celebrating Pueblo art. He celebrates
    typical American holidays while also enjoying regional specialties like green chile stew. The open landscape and tight‑knit community foster a practical, grounded outlook, while the cultural mosaic
    encourages curiosity about different traditions.
