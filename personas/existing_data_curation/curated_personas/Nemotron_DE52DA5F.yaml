  career_goals: John dreams of a future where he works closely with animals, hoping to become a veterinarian or a wildlife rehabilitator after high school. He also admires community helpers and imagines
    joining the local fire department one day, seeing it as a way to protect his town and stay active. His love for building things fuels a secondary ambition of learning more about mechanics or engineering,
    perhaps as a hobbyist tinkerer.
