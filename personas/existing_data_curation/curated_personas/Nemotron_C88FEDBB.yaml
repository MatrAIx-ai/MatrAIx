personas:
  professional: A veteran RF field technician with three decades of hands‑on experience, Kathleen Harmon blends meticulous signal troubleshooting with a laid‑back, improvisational style, and now pursues
    a senior technical trainer role where their curiosity and competitive edge drive mentorship and the launch of a rural broadband consultancy.
  sports: An avid hiker and seasonal jogger, Kathleen Harmon supports the St. Louis Cardinals and the Kansas City Chiefs, belongs to a local mountain‑bike club that meets on weekend trails, and they treat
    fitness as a flexible, improvisational hobby rather than a strict regimen.
  arts: A watercolor enthusiast and community‑radio volunteer, Kathleen Harmon paints rolling Missouri landscapes inspired by Georgia O’Keeffe, curates eclectic music shows that weave Miles Davis jazz with
    Arcade Fire indie tracks, and they restore antique radios as both a craft and a conduit to historic broadcasts.
  travel: A spontaneous explorer with a love for mid‑west road trips, Kathleen Harmon has driven the Ozark National Forest loop, dreams of kayaking the Boundary Waters, prefers loosely planned itineraries
    that allow detours to local art fairs, and they balance travel costs with their modest budget.
  culinary: A garden‑to‑table cook who delights in hearty chicken‑and‑dumplings, herb‑infused roasted vegetables featuring basil and rosemary from their backyard, and experimental dishes like quinoa‑crusted
    trout, Kathleen Harmon enjoys both home‑cooked family meals and occasional visits to the downtown farmer’s market for fresh produce, and they savor the creative process as a daily ritual.
  core: Kathleen Harmon, a curious, arts‑loving RF veteran, balances a laid‑back, slightly disorganized life with a competitive drive to mentor the next generation and preserve rural communication heritage,
    and they often juggle projects with methodical precision mixed with spontaneous creativity.
background:
  cultural: Kathleen grew up in a small Midwestern town in Missouri, where community ties, self‑reliance, and a pragmatic work ethic are deeply valued. Her white, working‑class background reflects the modest,
    family‑oriented lifestyle of the post‑industrial era, emphasizing hands‑on trades and modest living. While she identifies with broader American culture, her outlook is shaped by the Midwest's simplicity,
    directness, and appreciation for local traditions. Her divorce and independent living have reinforced a strong sense of personal autonomy, and her involvement in community radio and local art scenes
    demonstrates a commitment to regional cultural enrichment.
