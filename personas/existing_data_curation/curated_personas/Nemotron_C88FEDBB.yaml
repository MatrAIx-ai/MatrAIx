    pressure'', ''Inventory management'', ''Manual dexterity'']'
  hobbies: '[''Listening to vintage radio broadcasts'', ''Collecting antique radios'', ''Attending local art exhibitions'', ''Watercolor painting'', ''Hiking in nearby parks'', ''Gardening'', ''Experimenting
    with new recipes'', ''Reading mystery novels'', ''Volunteering at community radio'', ''DIY electronics tinkering'', ''Exploring technology magazines'']'
  career_goals: Kathleen aims to move into a senior technical trainer role where she can mentor emerging installers and share her practical knowledge. She is also considering launching a small consultancy
    that focuses on upgrading rural broadband and community‑radio infrastructure throughout the Midwest. Staying abreast of 5G, IoT, and satellite‑based communications is a personal priority, and she plans
    to earn certifications in advanced RF engineering. Ultimately, she hopes to leave a legacy of reliable, locally managed communications networks while preserving flexibility for her artistic and personal
    pursuits.
