personas:
  professional: Lanhuong Oneil is a veteran civil engineer with over three decades of experience in structural design, site development, and sustainable infrastructure, leveraging AutoCAD, Revit, and GIS
    to craft community‑focused projects while championing artistic integration and mentoring emerging engineers.
  sports: Lanhuong Oneil is an avid hiker who tackles the Cascades and Puget Sound shoreline each spring and fall, participates in the Seattle Hiking Club’s bird‑watching outings, follows the Seattle Seahawks,
    Seattle Kraken, and Seattle Sounders with seasonal enthusiasm, and joins a winter community yoga class to maintain flexibility and balance.
  arts: Lanhuong Oneil paints impressionistic watercolors of Washington landscapes, experiments with pottery at the Capitol Hill Community Studio, frequents the Seattle Art Museum, the Frye Art Museum,
    and the Henry Art Gallery for fresh inspiration, draws artistic influence from Georgia O'Keeffe, James Turrell, and Ai Weiwei, and volunteers to coordinate performances at the annual Vietnamese Tet
    Festival, blending cultural heritage with contemporary expression.
  travel: Lanhuong Oneil prefers meticulously planned weekend road trips that combine hiking in national parks like Yellowstone and Olympic with cultural immersion in cities such as Kyoto, Vancouver, and
    Portland, often leveraging travel‑reward points to offset costs while balancing family obligations that limit extended overseas stays, and dreams of a future sabbatical to explore the historic temples
    of Angkor Wat.
  culinary: Lanhuong Oneil delights in preparing traditional Vietnamese phở, bánh mì, and gỏi cuốn alongside modern fusion dishes like miso‑glazed salmon with lemongrass, draws fresh herbs such as basil
    and mint from a native‑plant garden, and frequently hosts family gatherings where they experiment with seasonal Seattle produce, though they sometimes over‑sauce a dish when multitasking between cooking
    and answering work emails.
  core: Lanhuong Oneil is a 52‑year‑old civil engineer who merges sustainable design with a love for watercolor landscapes, pottery, hiking, Vietnamese cooking, and mentorship, balancing meticulous planning
    with spontaneous creativity and occasional indulgent splurges.
background:
  cultural: Born in Ho Chi Minh City, Vietnam, Lanhuong immigrated to the United States with her parents at age eight and grew up in the Seattle-area Vietnamese community. Her upbringing emphasized family
    solidarity, respect for elders, and the celebration of cultural traditions such as Tet, moon-cake festivals, and communal cooking. Maintaining strong ties to her heritage, she often joins local Vietnamese
    cultural associations, shares traditional dishes, and participates in language tutoring for younger generations. Living in Kent, WA, she blends her Southeast Asian roots with the diverse multicultural
    fabric of the Pacific Northwest, drawing inspiration from both Vietnamese folk art and the region's vibrant contemporary art scene. This dual cultural perspective informs her professional ethos, encouraging
    inclusive community engagement and design solutions that honor cultural identity.
