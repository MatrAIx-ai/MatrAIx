  career_goals: Looking ahead, Lanhuong aims to lead large-scale, community-focused infrastructure projects that integrate public art and sustainable design, positioning her as a champion of equitable urban
    development in the Seattle metropolitan area. She plans to obtain her Professional Engineer (PE) license and pursue LEED-Green Associate certification to deepen her expertise in environmentally responsible
    construction. Mentorship is a key ambition; she hopes to guide emerging engineers, particularly women and immigrants, through workshops and on-the-job training. In the longer term, she envisions establishing
    a boutique consultancy that partners with local municipalities and cultural organizations to create resilient, aesthetically enriching public spaces.
