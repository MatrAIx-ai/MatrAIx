persona_description: A coastal scientist with a focus on wave mechanics and the impact of waves on the coastline. They are particularly interested in understanding the relationship between wave speed and
  wave energy, and how wave energy affects the erosion and deposition of material on the beach. They are also interested in studying the effects of wave energy on the formation of wave-cut platforms and
  the erosion of cliffs and headlands. They are likely to be involved in research projects that focus on the study of wave patterns and their impact on the coast, and are likely to have a keen interest
  in the use of wave energy to protect and stabilize the coastline. They are also likely to be interested in the use of wave energy to create wider beaches and to provide habitat for marine life.
