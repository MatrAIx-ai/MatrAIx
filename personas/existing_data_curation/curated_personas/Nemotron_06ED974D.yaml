personas:
  professional: Elizabeth Etienne, a veteran insurance claims adjuster with decades of experience in appraisal, fraud investigation, and risk assessment, is transitioning toward a senior advisory consulting
    role, pursuing the Chartered Property Casualty Underwriter (CPCU) designation while mentoring diverse talent and spearheading ethical claim‑handling workshops.
  sports: Elizabeth Etienne is an avid supporter of the Chicago Bulls, Bears, and White Sox, joins a local walking club for gentle hikes in forest preserves each weekend, and reluctantly participates in
    the community’s summer softball league, preferring the relaxed pace of senior‑focused recreational sports.
  arts: Elizabeth Etienne spends her free time exploring the Art Institute of Chicago, curating a personal collection of vintage prints, painting watercolors inspired by the improvisational spirit of Miles
    Davis and the pastel palettes of Henri Matisse, and teaching basic art techniques to fellow seniors at a community center.
  travel: Elizabeth Etienne favors thoughtfully planned journeys that combine heritage and leisure, such as a guided historic tour of Savannah, a weekend retreat to Lake Geneva’s boutique inns, and annual
    pilgrimages to New Orleans to experience its renowned jazz scene.
  culinary: Elizabeth Etienne is a skilled home chef who blends Southern soul food traditions—like smoked collard greens and fried chicken—with Midwestern twists such as honey‑glazed pork chops and apple‑cider‑infused
    cornbread, always seasoning with smoked paprika, fresh thyme, and a dash of hot sauce for depth.
  core: Elizabeth Etienne balances a methodical, deadline‑driven professional life with a quiet love for watercolor painting, a quirk of hoarding vintage postcards, and an occasional tendency to indulge
    in extra slices of deep‑dish pizza after a long day.
background:
  cultural: Elizabeth was raised in the Chicago metropolitan area as a Black woman, surrounded by a close‑knit family and a vibrant African‑American community. Church gatherings, storytelling, and a strong
    emphasis on education shaped her values. She actively participates in local Juneteenth celebrations and supports Black‑owned businesses in Cook County. Her cultural heritage informs her appreciation
    for soulful music, culinary traditions, and social history, which she integrates into both her professional ethos and personal interests. Elizabeth’s background also inspires her commitment to mentoring
    diverse talent within the insurance field.
