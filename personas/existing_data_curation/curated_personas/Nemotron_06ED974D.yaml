  career_goals: In the next few years, Elizabeth aims to transition into a senior advisory or consulting role within the insurance industry, where she can shape policy and train the next generation of adjusters.
    She plans to earn the Chartered Property Casualty Underwriter (CPCU) designation to deepen her expertise. Elizabeth also hopes to develop a series of workshops on ethical claim handling and to serve
    as a guest lecturer at a local community college. While she values career advancement, she is equally focused on achieving a balanced workload that allows time for her artistic and cultural pursuits.
