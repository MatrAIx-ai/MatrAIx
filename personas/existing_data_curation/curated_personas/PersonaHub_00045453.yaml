persona_description: A microbiologist who specializes in the study of underground life, particularly in the deep sea and gold mines. He is conducting a census to catalog the life buried beneath the earth's
  surface and understand the origins of life on earth or reveal life that could survive on other planets. His research interests include the diversity of life at such depths, the reproduction and metabolism
  of these organisms, and the potential for life to survive in environments with limited resources and energy sources.
