personas:
  professional: Jason Schexnider, a retired carpenter and seasoned woodworker, channels their disciplined organization and imaginative curiosity into designing custom furniture, orchestrating community
    events, and mentoring young artisans, all while infusing their sociable, cooperative spirit into every collaborative project.
  sports: Jason Schexnider, an enthusiastic supporter of the Cleveland Browns and Ohio State Buckeyes, enjoys watching Saturday football, and they participate in a senior bowling league at the local community
    center while joining a seasonal walking club that meets at the Walnut Creek Trail during spring.
  arts: Jason Schexnider, an abstract watercolor painter, draws inspiration from the Ohio countryside while admiring the works of Wassily Kandinsky and Georgia O'Keeffe, and they regularly attend performances
    by the Upper Sandusky Community Players featuring classics by Arthur Miller.
  travel: Jason Schexnider prefers low‑key road trips that blend history and nature, such as a leisurely drive to the historic Mansfield Museum, a weekend in Mackinac Island for its Victorian charm, and
    an upcoming pilgrimage to the Smithsonian museums in Washington, D.C., all planned around their limited mobility and fixed budget.
  culinary: Jason Schexnider, a competent home cook, delights in preparing heirloom tomato bruschetta, roasted beet and kale salad with goat cheese, and slow‑cooked chicken pot pie, often seasoning dishes
    with fresh rosemary and thyme harvested from their garden.
  core: Jason Schexnider blends their disciplined, imaginative mind with a community‑centered kindness, crafting furniture by day, painting by night, and constantly juggling garden projects, neighborhood
    mentorship, and a lingering tendency to postpone bills.
background:
  cultural: Jason was raised in the Midwest, growing up in Upper Sandusky, Ohio, within a family of German and Irish ancestry common to the area. His upbringing emphasized self‑reliance, community service,
    and participation in church and local traditions such as county fairs and potluck gatherings. The region’s agricultural and small‑town manufacturing heritage shaped his practical skills and strong work
    ethic. He values the close‑knit social fabric of his community, maintains connections with long‑standing family roots, and actively contributes to preserving the local cultural legacy.
