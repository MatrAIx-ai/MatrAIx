  career_goals: Although retired, Jason aims to leave a lasting legacy in Upper Sandusky by compiling a community‑based oral history book that captures stories of longtime residents. He aspires to launch
    a mentorship program pairing senior craftsmen with local youth interested in woodworking and gardening. He also wishes to develop a neighborhood garden that provides fresh produce for the senior center,
    and to learn advanced digital photography to document the town's changing landscape. His long‑term ambition is to be recognized as a cultural steward who bridges generations through shared creative
    projects.
