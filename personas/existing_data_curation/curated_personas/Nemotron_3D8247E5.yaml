  career_goals: Although retired, Davis aims to stay actively engaged and give back to his community. He plans to lead a project documenting Burlington’s textile‑industry heritage, mentor senior‑center
    members in basic computer and tablet use, complete a memoir that captures his life story for future generations, and maintain his health to enjoy regular fishing trips and nature walks with his grandchildren.
