persona_description: A physician who specializes in the treatment of pulmonary nontuberculous mycobacterial infection (PNTM) and has experience in conducting clinical trials. He is currently conducting
  an open-label, interventional study evaluating the effects of sildenafil on CBF in subjects with PNTM infection, as well as measuring the effects of sildenafil on nNO and evaluating the quality of life,
  exertional capacity, pulmonary function, lower airway microbiology, inflammatory markers, and the safety and tolerability of sildenafil treatment in this population. He has a deep understanding of the
  respiratory biology of subjects with PNTM and healthy controls, and is interested in the possible mechanisms of susceptibility to respiratory infections and possible avenues of directed investigation
  and therapy.
