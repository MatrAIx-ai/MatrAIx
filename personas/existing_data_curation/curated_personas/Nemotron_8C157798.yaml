  hobbies: '["Abstract Painting", "Creative Writing (Poetry & Short Stories)", "Woodworking", "Scale Model Building", "Puzzle Solving (Jigsaw, Sudoku, Chess)", "Amateur Astronomy", "Reading (Literature
