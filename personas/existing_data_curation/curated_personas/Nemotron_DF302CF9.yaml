personas:
  professional: An energetic small‑business strategist, Sarah Watts blends a business degree with hands‑on sales, negotiation, and market‑analysis expertise, devising nimble social‑media marketing campaigns
    and community‑event plans that turn spontaneous ideas into actionable realities, while they constantly benchmark performance through their competitive edge and skeptical mindset.
  sports: A community‑oriented sports enthusiast, Sarah Watts powers through recreational volleyball matches with the Natchitoches Viper Club, hikes the rugged trails of Kisatchie National Forest each weekend,
    and twirls at line‑dancing nights, while they passionately root for the New Orleans Saints and LSU Tigers, channeling their competitive streak into every pickup game.
  arts: An avid arts patron, Sarah Watts spends weekends at live‑music shows featuring Cajun accordionist Zachary Richard and blues legend Buddy Guy, snaps vintage‑style photos of Natchitoches' French‑Period
    architecture, and curates inspiration from contemporary Southern artists like The Magnolia Project, while they envision their future coffee‑shop gallery as a showcase for local creators.
  travel: An adventurous weekend road‑tripper, Sarah Watts prefers spur‑of‑the‑moment itineraries that blend historic exploration with culinary thrills, having recently driven the Natchez Trace to sample
    Southern delicacies and photographed the antebellum homes of Savannah, while they dream of a weekend soak in New Orleans' French Quarter and keep a flexible budget to accommodate spontaneous detours.
  culinary: A spirited home chef, Sarah Watts cooks authentic Cajun jambalaya brimming with Andouille sausage and fresh shrimp, simmered gumbo thickened with file powder and okra, and velvety étouffée,
    showcasing solid mid‑level culinary skill that shines at dinner parties, yet they sometimes over‑season dishes in their enthusiasm, prompting lingering debates over the perfect spice balance.
  core: Sarah Watts is a socially‑driven, spontaneous entrepreneur whose competitive drive fuels community‑focused ventures, though they often let organization slip into chance due to an aversion to rigid
    schedules.
background:
  cultural: Sarah grew up in the historic, French‑colonial town of Natchitoches, Louisiana, where Southern hospitality blends with Cajun and Creole influences. Her white Southern upbringing is marked by
    community‑centric values, a love for local festivals such as Mardi Gras and the WinterVille celebration, and an appreciation for regional cuisine, zydeco music, and historic preservation. She participates
    in local church gatherings and cherishes the close‑knit, small‑town atmosphere that encourages both personal connections and entrepreneurial spirit.
attributes:
  skills: '[''Strategic planning'', ''Market analysis'', ''Sales & negotiation'', ''Social media marketing'', ''Event coordination'', ''Community outreach'', ''Stakeholder management'', ''Basic accounting'',
