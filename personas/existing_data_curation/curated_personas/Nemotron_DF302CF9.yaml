  hobbies: '[''Live music concerts'', ''Line dancing'', ''Cooking Cajun/Creole cuisine'', ''Hiking'', ''Volunteering'', ''Volleyball'', ''Antique shopping'', ''Reading business books'', ''Podcast listening'',
    ''Photography'', ''DIY crafts'', ''Road trips'']'
  career_goals: Sarah aims to channel her business education and social fluency into launching her own boutique coffee shop that doubles as a rotating art gallery and community event space in Natchitoches.
    She envisions the venue as a hub for local creators, live music, and small‑scale workshops, ultimately positioning herself as a catalyst for regional economic development. Long‑term, she hopes to expand
    into a consulting practice that helps other small Southern businesses harness digital marketing and experiential events to grow sustainably, while cultivating a personal brand as a socially‑driven entrepreneur.
