persona_description: A primatologist who specializes in the study of chimpanzees and their behavior, particularly in relation to tool use and the factors that influence their tool-making abilities. Gruber
  and his team conducted extensive observations and experiments to understand the factors that drive chimpanzee tool use and how they adapt their behavior to ensure their survival. They are interested in
  the social and ecological factors that influence chimpanzee behavior and how they use tools to gather resources.
