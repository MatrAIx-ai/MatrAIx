persona_description: A member of the Kirby Institute UNSW, a leading research institute in Australia, responsible for surveillance, education, and research programs related to infectious diseases such as
  hepatitis B and C. They are an expert in epidemiology and have experience tracking progress towards the WHO targets for the elimination of these diseases in Australia. They are also knowledgeable about
  the collection and feedback of health service delivery data, and the use of data linkage to facilitate research analysis. They have a strong interest in measuring new cases of HCV infection using HCV
  RNA testing and improving the completeness of Indigenous data. They are committed to collecting and providing this data to various local, state, and national organizations for future Hepatitis Elimination
  management in Australia.
