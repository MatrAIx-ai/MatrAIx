persona_description: A software developer and AI researcher who specializes in developing software tools for detecting and analyzing non-verbal behaviors and emotions, particularly in the context of security
  and public safety. They have a strong background in computer science, machine learning, and data analysis, and have developed a software package called Sigard that can accurately detect verbal aggression
  by analyzing one's voice. They have also collaborated with Sigard Sound Intelligence to create a system that can quickly notify security personnel about loud, angry people in outdoor public spaces, public
  transportation, nightclubs, and bars, by detecting aggressive speech through analyzing the frequency and energy of the voice.
