  hobbies: '[''Gardening'', ''Quilting'', ''Woodworking'', ''Listening to classic rock'', ''Reading mystery novels'', ''Attending church services'', ''Volunteering at the community garden'', ''Cooking Southern
    comfort food'', ''Hiking in the nearby mountains'']'
  career_goals: Shan Ann aims to advance to a lead fabricator or shift supervisor position at her plant, obtain a Certified Welder credential, and complete a CNC programming course at a local community
    college. Long‑term, she hopes to launch a small home‑based woodworking studio that creates custom furniture, allowing her to blend her curiosity for new fabrication methods with the practical stability
    of her current career.
