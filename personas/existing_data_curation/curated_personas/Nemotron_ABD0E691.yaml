personas:
  professional: Shan Broussard, a 44‑year‑old fabricator, blends hands‑on mechanical assembly, CNC routing, and MIG welding with a curiosity for emerging fabrication techniques while pursuing lead‑fabricator
    or shift‑supervisor roles and hoping to launch a home‑based custom‑furniture studio.
  sports: Shan Broussard roots for the Atlanta Braves in baseball and the Nashville Predators in hockey, belongs to the local Appalachian Trail hikers’ club for weekend treks, jogs lightly on forest trails
    in the spring, and supplements these activities with weight‑training at the community gym three times a week to counteract the physical toll of welding.
  arts: Shan Broussard syncs classic‑rock tracks from Led Zeppelin and The Rolling Stones with their woodworking, switches to country staples like Dolly Parton and Johnny Cash while cooking, creates quilts
    patterned after Gee’s Bend textiles, reads Agatha Christie mysteries for quiet enjoyment, and occasionally attends performances by the regional Appalachian theater troupe.
  travel: Shan Broussard favors spontaneous road‑trip getaways, recalling past weekend drives to the Great Smoky Mountains and an immersive music‑filled night in New Orleans, while day‑dreaming about a
    future Patagonia trek and often plots camp‑site stops along the Blue Ridge Parkway using a simple spreadsheet.
  culinary: Shan Broussard’s kitchen revolves around Southern comfort cuisine, perfecting fried chicken marinated in buttermilk, collard greens simmered with smoked turkey and hot sauce, and shrimp‑and‑grits
    spiced with Cajun paprika, a skill set sharpened during community potlucks while classic rock rolls in the background.
  core: Shan Broussard, a 44‑year‑old fabricator with a budding woodworking passion, balances practical hands‑on expertise with a relaxed, sometimes disorganized approach, finding solace in music, quilting,
    and community gatherings while quietly pursuing a future independent studio.
background:
  cultural: Shan Ann grew up in a small town in eastern Tennessee, part of the Appalachian cultural region. Her white Southern heritage emphasizes close‑knit family ties, hospitality, church involvement,
    and community solidarity. She values traditional Southern cooking, country and bluegrass music, and local festivals, while maintaining an openness to practical innovations, reflecting a blend of tradition
    and curiosity typical of her community.
attributes:
  skills: '[''Mechanical assembly'', ''Fabrication'', ''Blueprint reading'', ''Basic MIG welding'', ''CNC operation'', ''Quality inspection'', ''Safety compliance'', ''Troubleshooting'', ''Team coordination'',
