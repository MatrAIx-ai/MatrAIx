persona_description: A historian or a local historian who is passionate about the history and folklore of Mayfield, particularly the events surrounding the 1745 executions and the Hanging Bridge. They are
  knowledgeable about the local architecture, the history of Mayfield, and the social and cultural context of the time. They are interested in the social and economic history of Mayfield and the impact
  of the executions on the community. They have a keen interest in the history of the church and its tower, and the role of the church in the community. They are also interested in the role of the Hanging
  Bridge in the community and its significance in the local folklore.
