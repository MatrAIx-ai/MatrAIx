  career_goals: James aims to become a Certified Wound Care Nurse (CWC) within the next two years, deepening his expertise in chronic wound management and geriatric care. He plans to complete a GED and
    enroll in an LPN‑to‑RN bridge program to broaden his clinical scope and open pathways to advanced nursing roles. Long‑term, he envisions establishing a community health outreach program in Lexington
    that offers affordable wound‑care services and mental‑health support for underserved residents, while maintaining a flexible, per‑diem or tele‑health schedule that respects his need for solitude and
    autonomy.
