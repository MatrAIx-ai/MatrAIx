  hobbies: '[''Hiking in the Sonoma County trails'', ''Cycling along the Russian River'', ''Wine tasting and vineyard tours'', ''Cooking Spanish and Mediterranean dishes'', ''Participating in local tech
    meetups and hackathons'', ''Mentoring underrepresented youth in coding'', ''Reading science‑fiction literature'', ''Playing acoustic guitar'', ''Landscape photography'']'
  career_goals: In the next five years, Ileana aims to transition into a senior technical leadership role, such as principal engineer or engineering manager, where she can shape product strategy and drive
    innovation. She plans to earn the AWS Certified Solutions Architect – Professional credential and deepen her expertise in AI‑powered applications for sustainable agriculture, aligning her tech skills
    with the viticulture sector prevalent in Sonoma County. Ileana aspires to lead cross‑functional teams delivering data‑driven, environmentally conscious solutions, while championing diversity and inclusion
    in tech. She also intends to increase her presence in the regional tech community by speaking at conferences, organizing meetups, and expanding a mentorship program that supports women and underrepresented
    groups, with a long‑term goal of launching a nonprofit coding bootcamp for Bay Area youth.
