personas:
  professional: Ileana Cabanas, a seasoned full‑stack software engineer with deep expertise in Python, React, AWS, and CI/CD pipelines, leverages their methodical planning, outgoing nature, and balance
    of curiosity and practicality to mentor junior developers while architecting scalable, cost‑effective solutions for sustainable agriculture tech.
  sports: Ileana Cabanas, an avid outdoor enthusiast, spends weekends hiking Annadel State Park, cycling the Russian River with the Sonoma County Cycling Club, and cheering for the San Francisco Giants
    and Golden State Warriors, while maintaining a disciplined yet flexible home workout routine that includes yoga and strength training.
  arts: Ileana Cabanas blends technology and creativity by playing acoustic guitar inspired by Paco de Lucía and Iron & Wine, curating a collection of sci‑fi novels from authors like N.K. Jemisin, and capturing
    the misty Sonoma vineyards through photography in the style of Ansel Adams, while regularly attending local art openings featuring contemporary muralists.
  travel: Ileana Cabanas plans trips with a mix of structured itineraries and spontaneous detours, favoring wine‑rich regions like Bordeaux and cultural excursions to Barcelona’s Gothic Quarter, while also
    dreaming of a sustainable agro‑tourism adventure in the Mendoza wine valleys of Argentina.
  culinary: Ileana Cabanas, an advanced home cook, delights in crafting paella with saffron, chorizo, and locally sourced seafood, perfecting Mediterranean mezze like hummus and roasted eggplant, and often
    pairs meals with Sonoma pinot noirs, while occasionally over‑seasoning dishes in the zeal of experimentation.
  core: Ileana Cabanas is a pragmatic yet curious tech leader who balances high‑impact engineering with weekend hikes, wine tastings, and spirited guitar sessions, while occasionally neglecting sleep and
    indulging in spontaneous culinary experiments.
background:
  cultural: Ileana was born to Spanish parents who immigrated from Madrid and grew up in a bilingual household, fluent in both Castilian Spanish and English. She maintains strong ties to her heritage through
    regular participation in cultural events such as the annual Spanish Fiesta in the Bay Area, celebrating traditions like Día de los Reyes and enjoying flamenco music and dance. Her family’s emphasis
    on hospitality, communal meals, and lifelong learning influences her social and collaborative nature. Living in Santa Rosa, she blends this Mediterranean cultural foundation with the progressive, environmentally
    conscious ethos of Sonoma County, often integrating Spanish culinary techniques into her cooking and volunteering with local Hispanic community organizations.
attributes:
  skills: '[''Full‑stack web development (Python, JavaScript, React, Node.js)'', ''Cloud architecture (AWS, GCP)'', ''Data analytics and visualization (SQL, Tableau, PowerBI)'', ''Machine learning model
