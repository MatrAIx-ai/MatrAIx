  career_goals: Jennifer aims to advance to a senior marketing manager or director role within a regional firm, leveraging her practical experience while earning a bachelor's degree in marketing through
    an online program. She plans to acquire certifications such as Google Ads and HubSpot Inbound Marketing to deepen her digital expertise. Her ambition includes leading high‑impact, integrated campaigns
    that deliver measurable ROI for Midwestern brands, mentoring junior staff—especially women entering the field—and eventually founding a boutique agency focused on community‑based and cause‑related marketing.
    She also seeks to implement innovative yet reliable marketing automation tools to streamline operations.
