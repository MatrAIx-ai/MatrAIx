personas:
  professional: Thomas Frazier, a practical community organizer with a talent for fixing things and coordinating group activities, is pivoting toward a part‑time landscaping service or weekend catering
    venture while pursuing a GED and vocational trade training, and they view this as the best path to secure a stable income for their family.
  sports: Thomas Frazier, an avid basketball player at the neighborhood park and enthusiastic hiker on the hills surrounding Memphis, cheers on the Memphis Grizzlies, coaches a youth basketball team with
    the Beale Street Hoopers, and they join seasonal pick‑up games at the local community center.
  arts: Thomas Frazier, a soulful music lover, fills their free time with R&B classics from Al Green and modern hip‑hop from Andre 3000, attends gospel choir gatherings at church, and they occasionally
    visit the Memphis Rock ’n’ Soul Museum for artistic inspiration.
  travel: Thomas Frazier, a weekend road‑tripper, enjoys short drives to the Great Smoky Mountains for hikes, has explored New Orleans for its jazz and cuisine, frequently visits Nashville’s music scene,
    and they hope to one day trek the Appalachian Trail with their family.
  culinary: Thomas Frazier, a self‑taught chef, experiments with soul‑food and BBQ staples such as smoked pork ribs, collard greens, and sweet‑potato pie, perfects their homemade hickory‑infused barbecue
    sauce, and they often host neighborhood potlucks to showcase their dishes.
  core: Thomas Frazier is a structured yet sociable hands‑on problem‑solver who balances car restoration, community mentorship, and culinary experiments while dreaming of a small business that blends their
    practical skills with a love for people.
background:
  cultural: Thomas is an African‑American who grew up in Southern California’s vibrant Black community, where church, family, and neighborhood networks played central roles. His cultural identity blends
    the traditions of African‑American music, food, and communal support with the multicultural influences of the San Diego region, shaping his values of resilience, cooperation, and community pride.
attributes:
