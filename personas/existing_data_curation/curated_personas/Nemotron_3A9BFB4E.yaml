  hobbies: '[''Basketball'', ''Hiking in nearby trails'', ''Grilling and soul‑food cooking'', ''Listening to R&B and hip‑hop'', ''Participating in church community events'', ''Car restoration and maintenance'',
    ''Volunteering with youth mentorship programs'', ''Watching NFL games'']'
  career_goals: Thomas hopes to transition into a stable part‑time role or launch a modest small business—such as a neighborhood landscaping service or a weekend catering venture—that leverages his hands‑on
    skills and sociable nature. He also plans to earn his GED, attend vocational training in job‑ready trades, and eventually provide a more secure financial foundation for his family while staying involved
    in his community.
