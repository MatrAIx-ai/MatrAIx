personas:
  professional: A budding engineer‑in‑the‑making, Justin Saymeh channels a love of LEGO construction and rocket sketches into early STEM activities, applying meticulous organization and curiosity to model
    building while they assertively yet cooperatively contribute during classroom robotics projects.
  sports: Justin Saymeh is an enthusiastic member of the Hagerstown Hurricanes youth soccer league, eagerly attending Saturday practices and weekend matches, while cheering for the Baltimore Orioles during
    baseball season, the Washington Capitals for hockey, and the Maryland Terrapins for college football, and they stay fit with after‑school bike rides and occasional swim lessons at the community pool.
  arts: Justin Saymeh immerses themselves in drawing animal sketches and rocket designs inspired by Dr Seuss’s whimsical characters and Eric Carle’s vibrant collages, enjoys watching Pixar animated movies
    such as Toy Story for storytelling cues, and they frequently copy NASA illustrated space graphics in their art notebooks.
  travel: Justin Saymeh prefers family‑guided trips that blend adventure with learning, having eagerly explored the National Air and Space Museum in Washington, DC, taken weekend hikes in Shenandoah National
    Park to collect rock samples, and delighted in a week‑long stay at Walt Disney World in Orlando, all while they save allowance‑earned coins for future outings.
  culinary: Justin Saymeh enjoys chunky pepperoni pizza, cheesy macaroni, and chicken nuggets, often pairing them with carrot sticks and apple slices, and they proudly assemble their own peanut‑butter‑and‑jelly
    sandwiches and simple grilled cheese at the kitchen counter, favoring ingredients like cheddar cheese, wheat bread, and fresh strawberries for snack time.
  core: Justin Saymeh is a meticulously curious six‑year‑old who balances disciplined LEGO engineering with vivid artistic imagination, always organizing their world while dreaming of rockets and animals,
    yet they often postpone bedtime to finish a new model.
background:
  cultural: Justin is raised in a white, middle-class family in Hagerstown, Maryland. His upbringing reflects typical suburban American culture, with a focus on school routines, community events such as
    county fairs and local sports games, and family traditions like holiday meals and backyard barbecues. The public elementary school emphasizes core academics while offering extracurricular arts and robotics
    programs that nurture his curiosity. Community values of independence, organization, and involvement shape his disciplined yet imaginative personality.
