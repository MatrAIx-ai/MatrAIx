  career_goals: Even at six, Justin dreams of a future where he can explore space as an astronaut, design imaginative worlds as an artist, or create functional structures as an architect. He is eager to
    learn more about science, especially astronomy, and to develop his drawing skills so he can illustrate his own stories.
