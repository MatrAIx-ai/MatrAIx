persona_description: A scientist who specializes in the study of bee colony disorders and the impact of climate change on pollinators, particularly in the context of food production and biodiversity. She
  is concerned with the use of chemicals in agriculture and the need for incentives to restore pollinator-friendly habitats. She is aware of the importance of investing in the world's nature-based services,
  particularly in the form of pollination from insects such as bees. She is dedicated to the transition to a low carbon, resource-efficient Green Economy and the need for wider and more inclusive efforts
  to achieve sustainable development.
