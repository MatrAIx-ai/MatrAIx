  career_goals: Jennifer aims to progress within her current organization by becoming a Customer Service Team Lead within the next two years, focusing on mentoring new representatives and improving service
    protocols. She plans to complete a bachelor’s degree in Business Administration to qualify for a Customer Experience Analyst role, where she can apply her practical problem‑solving skills to broader
    operational improvements. Balancing career advancement with her mental well‑being, she also seeks certifications in conflict resolution and stress management to better support both customers and colleagues.
