personas:
  professional: A budding junior programmer and nature enthusiast, Diana Rowe blends their love of bird‑watching with Scratch game design, creating interactive wildlife simulations that they share with
    their school’s science club, reflecting their curious yet practical mindset.
  sports: A weekend hiker on the foothills near Brigham City and a member of the Brigham City Juniors Soccer Club, Diana Rowe also follows the Utah Jazz while cheering on the local high‑school cross‑country
    team, and they balance low‑key outdoor adventure with team sport camaraderie.
  arts: An evening pianist mastering Debussy’s Clair de Lune, a landscape sketcher inspired by Ansel Adams, and a digital photographer who borrows visual storytelling cues from Studio Ghibli and the indie
    game Celeste, Diana Rowe weaves artistic threads into their daily routine.
  travel: A methodical planner who maps out weekend hikes to Bear Lake and the Wasatch Mountains and enjoys day trips to Salt Lake City’s Natural History Museum, Diana Rowe also daydreams about backpacking
    the Canadian Rockies and witnessing the cherry blossoms in Kyoto, and they balance adventure with careful budgeting.
  culinary: A budding home chef who whips up veggie pizza topped with fresh basil and mozzarella, tangy mango salsa, and strawberry‑kale smoothies sweetened with honey, Diana Rowe often forgets to fully
    defrost frozen berries, leaving a few lumpy bites in their blends.
  core: Diana Rowe is a quietly curious 13‑year‑old who balances scientific wonder with artistic flair, turning bird‑watching adventures into Scratch games while meticulously budgeting their allowance and
    occasionally over‑organizing their weekend hikes.
background:
  cultural: Diana was raised in a predominantly white, middle‑class community in Brigham City, Utah. Her upbringing emphasizes modesty, community involvement, and respect for tradition, while also encouraging
    curiosity, practical skill‑building, and self‑reliance. Family gatherings, local events, and outdoor activities such as hiking and volunteer service are common, shaping her values of harmony, cooperation,
    and a balanced blend of organization and flexibility.
