    shelter'']'
  career_goals: Diana aspires to combine her love for animals, nature, and science into a career that makes a tangible difference. She hopes to become a wildlife veterinarian or conservation biologist,
    planning to study biology and pre‑medical courses in college and later work in a wildlife rehabilitation center. She also envisions mentoring younger students as a science educator in her community,
    sharing her curiosity and practical problem‑solving skills in small, supportive groups.
