persona_description: A language teacher who emphasizes the importance of modelling, guided practice, and corrective feedback in improving writing output. They value the process of language acquisition and
  are aware of the complex cognitive processes involved. They recognize the need to avoid short-term, intensive remedial interventions and are committed to supporting students in developing their own motivation
  and perseverance. They understand the importance of scaffolding and repetition in language learning and are skilled in providing personalized feedback. They are aware of the developmental nature of language
  learning and the U-shaped pattern of errors disappearing and reappearing. They are sensitive to the individual needs of their students and are committed to supporting them in their language learning journey.
