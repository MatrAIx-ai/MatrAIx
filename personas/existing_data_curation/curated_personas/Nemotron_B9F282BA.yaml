  hobbies: '[''Gardening'', ''Knitting/Crocheting'', ''Reading classic literature'', ''Baking pies and breads'', ''Walking local trails'', ''Bird watching'', ''Church volunteer activities'', ''Book club
    participation'']'
  career_goals: Approaching retirement, Holly aims to transition from full‑time teaching to a mentorship role, guiding new teachers in classroom organization and practical instructional techniques. She
    hopes to lead a school‑wide literacy initiative that builds on her love of routine and consistency, and to partner with local libraries to establish a community reading program for elementary students.
    Holly also aspires to develop a concise guidebook on effective classroom routines, drawing on her decades of experience, and to volunteer as a tutor for adult learners in her town, ensuring her practical
    expertise continues to benefit the community.
