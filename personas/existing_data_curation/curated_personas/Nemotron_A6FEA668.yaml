personas:
  professional: Vicki Yarber, a retired English teacher turned volunteer community historian, draws on their strong communication, conflict‑mediating, and event‑planning abilities to lead intergenerational
    storytelling workshops at the Salisbury Senior Center while blending practical budgeting with a curiosity for new archival tools that they eagerly explore.
  sports: Vicki Yarber follows the Boston Red Sox with enthusiasm, participates in a senior walking club along the nearby coastal trail each morning, and engages in seasonal community garden work that keeps
    them active, while cheering on the New England Patriots during football season from their porch, they often recount the game's highlights to neighbors.
  arts: Vicki Yarber sings in their church choir, enjoys the folk melodies of Joan Baez, creates quilts inspired by William Morris patterns, and regularly visits the Salisbury Historical Museum to admire
    Winslow Homer paintings, finding artistic inspiration that fuels their storytelling, and they often share these inspirations during community gatherings.
  travel: Vicki Yarber favors culturally immersive, low‑key trips, savoring day trips to historic Boston, weekend stays in Cape Cod’s lighthouse towns, and dreaming of a gentle cruise to the Azores with
    their grandchildren to explore maritime heritage, a journey they meticulously plan using a scrapbook of travel postcards.
  culinary: Vicki Yarber skillfully prepares classic New England clam chowder, herb‑seasoned seared scallops, and a warm spiced apple pie, relying on fresh herbs like thyme and rosemary from the community
    garden and savoring the comfort of hearty, seasonal meals, which they proudly share at local potlucks.
  core: Vicki Yarber blends lifelong curiosity with practical flexibility, never missing a quilting circle despite occasional missed appointments, and hoards vintage postcards for spontaneous nostalgic
    moments, a habit that reflects their love of tangible memories, and they proudly display the collection on their mantle.
background:
  cultural: Vicki was born and raised in mid‑20th‑century New England, into a family of English and Irish descent that valued community, self‑reliance, and a deep respect for the region’s colonial heritage.
    Growing up in the post‑war era, she experienced the tight‑knit social fabric of small‑town Massachusetts, where church gatherings, town fairs, and seasonal celebrations were central to communal life.
    Her upbringing emphasized modesty, practicality, and a strong work ethic, while also encouraging curiosity about the world beyond the local environment. Over the decades, she has maintained a connection
    to the traditions of her ancestry—such as holiday customs, folk music, and regional cuisine—while also embracing the progressive spirit of contemporary Massachusetts, including participation in volunteerism,
    lifelong learning, and intergenerational exchange.
