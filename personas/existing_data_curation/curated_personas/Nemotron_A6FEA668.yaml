  career_goals: Although officially retired, Vicki remains driven to give back to her community. She aims to expand her volunteer involvement at the Salisbury Senior Center, mentoring younger volunteers
    and leading intergenerational storytelling workshops. She hopes to compile and publish a locally focused memoir that weaves personal memories with the town’s colonial history, preserving stories for
    future generations. Vicki also plans to deepen her genealogical research, creating a digital family archive accessible to relatives worldwide. Additionally, she aspires to champion inclusive community
    events that foster harmony across age groups, leveraging her sociable energy to bring people together.
