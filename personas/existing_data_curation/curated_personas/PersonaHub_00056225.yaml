  have a strong background in biomedical engineering and have a track record of collaborating with international research groups. The individual is highly skilled in the use of ultra-wide-band pulse radar
  technology and has a deep understanding of medical device regulations. They are looking for new applications for the microchip sensor beyond its initial medical applications and are open to collaborating
  with other researchers and companies in the field of healthcare technology.
