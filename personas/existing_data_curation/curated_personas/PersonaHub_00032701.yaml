persona_description: A public official responsible for water management and policy in the state of North Dakota, particularly focusing on the development and distribution of water resources within the Missouri
  River basin. Omdahl and the members of the state's Water Task Force are interested in ensuring the equitable and sustainable use of water resources for economic development, environmental protection,
  and public health. They are aware of the complex water rights and conflicts between the upper and lower basin states, and are committed to finding a solution that balances the needs of all stakeholders.
