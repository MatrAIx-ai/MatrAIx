  hobbies: '[''Soccer (youth league)'', ''Dance class (contemporary and Vietnamese folk)'', ''School choir'', ''Reading adventure/mystery books'', ''Drawing comic strips'', ''Scratch game creation'', ''Cooking
    Vietnamese dishes with family'', ''Participating in community festivals'', ''Journaling for stress relief'']'
  career_goals: Maria dreams of becoming a teacher or a pediatric nurse because both careers combine structure with caring for others. She imagines herself leading a classroom where she can create organized
    learning environments and help each student succeed. In the near future, she aims to earn the school’s "Student of the Year" award and to be elected captain of her soccer team, seeing these achievements
    as stepping stones toward future leadership and service roles.
