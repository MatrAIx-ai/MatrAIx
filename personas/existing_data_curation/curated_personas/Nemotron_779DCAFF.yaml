personas:
  professional: Maria Nguyen is an aspiring junior game developer who channels their practical mind into creating simple Scratch games while meticulously planning group play sessions for school projects,
    reflecting their love for structure and teamwork.
  sports: Maria Nguyen is a dedicated midfielder for the Riverdale Youth Soccer Club, cheers for the city’s professional team the City Strikers, and supplements their training with weekly contemporary‑folk
    dance sessions that keep them agile and socially engaged.
  arts: Maria Nguyen is a vibrant member of the school choir who also sketches lively comic strips inspired by the whimsical world of Hayao Miyazaki, enjoys contemporary pop singers like Ariana Grande,
    and finds rhythm in the traditional folk dance lessons they attend each week.
  travel: Maria Nguyen prefers short, well‑planned weekend outings, such as family trips to the nearby botanical garden and visits to the historic downtown museum, while day‑dreaming about a future adventure
    to a coastal city like San Diego where they could explore tide pools and street festivals.
  culinary: Maria Nguyen enjoys helping in the kitchen, mastering the simmering of aromatic pho broth with star anise, ginger, and beef bones, and learning to assemble crisp bánh mì with pickled carrots,
    cilantro, and pâté, often experimenting with extra chili for a spicier kick.
  core: Maria Nguyen balances a love for structured teamwork with creative bursts, manages worries through journaling and deep breathing, and lives a bustling life of soccer, dance, and cooking, all while
    occasionally overindulging in stickers and snack cravings.
background:
  cultural: Maria’s family is of Vietnamese descent, having settled in Chesapeake, Virginia, where a growing Vietnamese community offers cultural events, a Buddhist temple, and Vietnamese language schools.
    She celebrates Tet (Lunar New Year) with family gatherings, traditional foods, and red envelopes, and she attends community workshops that teach Vietnamese calligraphy and folk dances. At home, both
    English and Vietnamese are spoken, fostering bilingual fluency. The family places a strong emphasis on education, respect for elders, and collective harmony, values that shape Maria’s polite demeanor,
    cooperative nature, and desire to help others while balancing her personal organization and the expectations of her multicultural environment.
attributes:
