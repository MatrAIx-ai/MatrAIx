personas:
  professional: Matthew Parsons, an 18‑year‑old aspiring brand strategist, blends disciplined project‑management expertise with a flair for visual storytelling, coordinating school club campaigns, freelance
    design projects, and community events to fuse small‑town values with forward‑thinking marketing concepts.
  sports: Matthew Parsons enjoys basketball pickup games at the local gym, hikes the Ouachita foothills on weekends, and follows the Oklahoma City Thunder and Dallas Cowboys, approaching fitness with a
    structured weekly schedule that balances cardio, strength training, and recovery.
  arts: Matthew Parsons immerses themselves in acoustic songwriting inspired by John Prine and Sufjan Stevens, sketches characters reminiscent of Studio Ghibli, curates indie film nights featuring works
    like 'Moonlight' and 'The Florida Project', and collaborates on community theater productions as a set designer.
  travel: Matthew Parsons prefers low‑key, budget‑friendly itineraries, often planning trips with a detailed day‑by‑day agenda; they have explored Tulsa and Albuquerque and dream of a summer exchange in
    Barcelona to collaborate on multilingual advertising campaigns while sampling paella and tapas.
  culinary: Matthew Parsons loves cooking comfort food with a twist, frequently preparing chicken‑fried steak with jalapeño‑infused gravy, homemade churro‑style doughnuts, and experimenting with avocado‑lime
    salsa, while gradually sharpening culinary skills through YouTube tutorials and weekly potluck gatherings.
  core: Matthew Parsons lives life like a well‑timed project, juggling guitar riffs, design deadlines, and basketball drills while secretly hoarding midnight snack wrappers as a quirky reminder of their
    ever‑growing to‑do list.
background:
  cultural: Matthew grew up in Hitchita, a small, close‑knit community in McIntosh County, Oklahoma. His family roots trace back to Midwestern settlers of German and Irish ancestry, and he was raised in
    a Southern Baptist environment that values hospitality, self‑reliance, and community service. The town’s rural character, agricultural heritage, and annual county fair shape his appreciation for simplicity
    and hard work, while the regional emphasis on country music, high‑school sports, and local festivals fostered his sociable nature. Exposure to online art forums and streaming platforms broadened his
    cultural palate, encouraging him to blend his small‑town values with a curiosity for diverse artistic expressions and unconventional ideas.
