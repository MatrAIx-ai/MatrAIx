  hobbies: '[''Acoustic guitar playing and songwriting'', ''Sketching and digital illustration'', ''Photography (landscape and portrait)'', ''Hiking in the Ouachita Mountains'', ''Community theater acting'',
    ''Basketball (pickup games)'', ''Volunteer tutoring at the local library'', ''Watching independent films'', ''Cooking experimental recipes'', ''Conversational Spanish learning'']'
  career_goals: Matthew aims to complete a bachelor's degree in Marketing or Communications, leveraging his organizational strengths and creative talents to become a brand strategist or creative director.
    In the short term, he plans to secure an internship at a regional advertising agency while continuing to build a freelance portfolio of graphic design and video projects. His long‑term ambition is to
    launch his own boutique agency that partners with small businesses and cultural organizations, allowing him to blend his love for art, innovative ideas, and community impact. He also envisions traveling
    abroad to collaborate on multicultural campaigns, expanding his perspective and skill set.
