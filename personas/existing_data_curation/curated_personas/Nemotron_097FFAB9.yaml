  career_goals: Jerry aims to advance to a regional sales manager role within the next three years, leading a team of representatives across the Southeast and expanding market share in the manufacturing
    sector. He plans to secure strategic partnerships, implement a data‑driven sales process, and obtain a professional sales certification such as Certified Professional Sales Leader. Ultimately, he envisions
    moving into senior leadership where he can shape company strategy while maintaining a balanced work‑life schedule to reduce stress and support his family.
