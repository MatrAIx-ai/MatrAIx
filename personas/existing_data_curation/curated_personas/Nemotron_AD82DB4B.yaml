personas:
  professional: Manjeet Patel, a 17‑year‑old visual art enthusiast, blends hand‑drawing finesse with digital tools like Procreate and Photoshop while leading school art club projects, applying their organized
    yet imaginative mindset to turn speculative sci‑fi concepts into polished concept sketches for game design competitions.
  sports: Manjeet Patel channels kinetic energy from Bhangra rehearsals into weekly badminton matches at the community center, follows the NBA's Golden State Warriors for inspiration, and maintains a balanced
    fitness routine that combines yoga sessions and occasional soccer practice with the local youth league while they use a smartwatch to track steps and heart rate.
  arts: Manjeet Patel finds artistic fuel in the cinematic worlds of Studio Ghibli, the graphic novel stylings of Jim Lee, the melodic riffs of Led Zeppelin, and the Bollywood soundtracks of A.R. Rahman,
    weaving these influences into their sketchbooks and digital canvases while they regularly attend local gallery openings and collaborate with peers on mural projects.
  travel: Manjeet Patel prefers meticulously planned weekend getaways that blend cultural immersion and artistic inspiration, having explored the historic forts of Jaipur and the bustling street art scene
    of Berlin, and they now dream of attending the Tokyo Anime Expo to experience cutting‑edge animation and Japanese pop culture firsthand.
  culinary: Manjeet Patel, an eager home‑chef, enjoys whipping up aromatic butter chicken and spicy chana masala seasoned with cumin, coriander, and fresh ginger, while they also experiment with fusion
    fare like avocado‑topped naan and relish the bold flavors of mango chutney paired with roasted cauliflower.
  core: Manjeet Patel, a 17‑year‑old art‑obsessed dreamer, balances a relentless swirl of sci‑fi imagination with a surprisingly disciplined habit of cataloguing every sketch in a color‑coded digital archive,
    even if that means sacrificing late‑night gaming sessions.
background:
  cultural: Manjeet is a first‑generation American of Gujarati Indian descent. His family maintains traditional customs—celebrating Diwali, Holi, and Navratri, preparing Gujarati cuisine, and speaking Gujarati
    at home—while also embracing the diverse cultural landscape of Hackettstown, New Jersey. This blend of South Asian heritage and American upbringing informs his worldview, giving him a strong sense of
    community, respect for family values, and an appreciation for multicultural creativity.
