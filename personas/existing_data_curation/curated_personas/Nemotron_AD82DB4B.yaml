  hobbies: '[''Sketching and digital painting'', ''Playing acoustic guitar'', ''Writing short sci‑fi/fantasy stories'', ''School art club participation'', ''Bhangra dance practice'', ''Volunteering at cultural
    festivals'', ''Puzzle and board game sessions'', ''Coding interactive art prototypes'']'
  career_goals: Manjeet aspires to attend a specialized high‑school program in visual arts or a college where he can study graphic design, animation, or concept art. He dreams of working in the entertainment
    industry as a concept artist for video games or animated films, creating worlds that blend futuristic ideas with cultural stories from his South Asian heritage. In the longer term, he hopes to launch
    a community‑driven art workshop that gives other teens a platform to explore creativity and technology.
