persona_description: A school administrator who is responsible for overseeing the implementation of the Healthy Schools Act in the District of Columbia Public Schools. They are committed to ensuring that
  the school meals meet the federal school nutrition requirements and are accessible to all students, regardless of their family income. They are also responsible for promoting healthy eating habits among
  students, faculty, staff, and parents, and soliciting input from them to come up with nutritious and appealing meals. They are also responsible for improving the nutrition of competitive foods and serving
  locally-grown fruits and vegetables in school meals whenever possible.
