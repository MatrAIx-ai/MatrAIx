  career_goals: Although currently not in the formal workforce, Dai aspires to launch a modest home‑based catering venture that showcases her culinary heritage, lead a neighborhood cultural‑preservation
    initiative that documents and shares Vietnamese traditions, and serve as a mentor for new immigrant families, helping them acquire practical life‑skills while celebrating their cultural roots.
