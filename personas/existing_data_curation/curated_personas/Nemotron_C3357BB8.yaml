  career_goals: Although still young, Yunjung frequently talks about what she wants to be when she grows up. She dreams of becoming a scientist who helps protect the environment, inspired by her love of
    exploring nature. She also imagines being a teacher because she enjoys organizing activities and helping classmates understand new ideas. Occasionally, she mentions wanting to be a veterinarian to care
    for animals, reflecting her kindness and practical desire to make a tangible difference.
