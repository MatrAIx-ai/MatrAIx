personas:
  professional: Yunjung Morishita is a budding designer who channels a meticulous, method‑driven mindset into constructing LEGO creations, sketching story scenes from picture books, and planning backyard
    expeditions, reflecting her blend of curiosity and practical organization.
  sports: Yunjung Morishita bursts with energy for tag and catch during recess, plays forward for the after‑school soccer club Maple Leaf Kids, cheers on the City Cubs baseball team on Saturday mornings,
    and favors informal backyard races over regimented drills, reflecting her love of fun movement and team spirit.
  arts: Yunjung Morishita spends afternoons sketching whimsical Dr. Seuss‑inspired scenes, folding intricate origami cranes after watching tutorials by Akira Yoshizawa, and belts out BTS and Hikaru Utada
    songs with gusto, weaving a vibrant tapestry of visual and musical influences into her creative identity.
  travel: Yunjung Morishita dreams of family adventures to the Seoul Children’s Museum and the Ghibli Museum in Tokyo, favors meticulously planned itineraries with checklists for each day, but also enjoys
    spontaneous nature walks in nearby national parks, balancing her love of cultural discovery with her budget‑conscious parents’ constraints.
  culinary: Yunjung Morishita is a budding baker who enthusiastically measures flour for chocolate chip cookies, delights in shaping rice‑cake bites with honey glazing during weekend kitchen sessions, and
    proudly adds sliced strawberries and a pinch of cinnamon to her oatmeal, showcasing a mix of sweet comfort foods and adventurous flavor experiments.
  core: Yunjung Morishita is a methodical seven‑year‑old who blends curiosity with organized play, a love of creative crafts and music, and a habit of saving pennies for future LEGO builds, occasionally
    forgetting to tidy up her art supplies.
background:
  cultural: Yunjung is an American child of mixed Korean and Japanese heritage, raised in Dallas, Texas. Her parents speak Korean at home and celebrate Korean holidays such as Chuseok and Seollal, while
    also observing Japanese traditions like Oshogatsu and participating in local cultural festivals. This bilingual, bicultural upbringing gives her exposure to traditional foods, music, and customs from
    both cultures, while she also engages fully in typical American childhood experiences—school, sports, and community events. The diverse East Asian background shapes her values of respect, harmony, and
    diligence, which complement the practical, organized traits encouraged by her family.
