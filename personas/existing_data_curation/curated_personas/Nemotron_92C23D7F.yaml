    PowerPoint)"]'
  hobbies: '["Watercolor painting", "Sketching and drawing outdoors", "Reading contemporary fiction and poetry", "Creative writing (poetry, journaling)", "Hiking and nature walks", "Gardening (flowers and
    herbs)", "Baking and experimenting with recipes", "DIY home décor and upcycling projects", "Volunteering at community art workshops", "Attending local art fairs and gallery openings"]'
  career_goals: Martha aims to transform her passion for art and her desire to help others into a fulfilling career. She plans to enroll in a community college art program to earn an associate degree in
    Fine Arts or Graphic Design, while also exploring certifications in art therapy. She hopes to develop a small freelance business selling her paintings and handmade crafts online, gradually building
    a client base that includes local galleries and community centers. In the longer term, she aspires to work part‑time as an art workshop facilitator at a regional community center or library, and eventually
    qualify as a certified art therapist to support individuals coping with stress and anxiety. Throughout these pursuits, she intends to maintain a stable home life, continue her role as a supportive partner,
    and further improve her financial literacy.
