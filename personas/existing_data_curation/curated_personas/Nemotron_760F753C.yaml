personas:
  professional: Maha Swindle is an aspiring project manager in logistics who leverages their meticulous event‑planning experience from school clubs, spreadsheet budgeting skills, and competitive drive to
    design efficient supply‑chain processes, while their skeptical eye filters unrealistic proposals and their natural charisma mediates cross‑functional teams.
  sports: Maha Swindle anchors the midfield for the Bentonville High School varsity soccer team, idolizes Megan Rapinoe’s tenacity, spends weekends hiking the Ozark Trail Club’s rugged routes, and passionately
    roots for the Arkansas Razorbacks men’s basketball team, balancing competitive play with disciplined fitness routines.
  arts: Maha Swindle thrives in the drama club where they have starred as Ophelia in a modern adaptation of Hamlet, draws design inspiration from Wes Anderson’s symmetrical color palettes, devours Agatha
    Christie mystery novels, and follows graphic design influencer Jenna Kutcher for fresh DIY home organization aesthetics.
  travel: Maha Swindle’s travel style blends budget‑savvy road trips to nearby hotspots like Hot Springs, Arkansas and weekend hikes in the Ozark National Forest with a dream of backpacking Costa Rica’s
    rainforests, preferring meticulously planned itineraries over spontaneous getaways, yet occasionally impulsively books a last‑minute concert ticket in Nashville.
  culinary: Maha Swindle enjoys crafting quick, flavor‑packed meals such as avocado‑lime chicken quesadillas and homemade granola bars, experiments with Instagram‑inspired matcha latte art, favors fresh
    cilantro and jalapeños in their dishes, and often orders a double‑cheese pizza after late‑night Arduino projects.
  core: Maha Swindle is a hyper‑organized, competition‑driven teen who blends curiosity with practicality, and channels a healthy dose of skepticism into every project, sport, and social venture.
background:
  cultural: Maha was raised in a predominantly white, middle-class family in Bentonville, Arkansas, where Southern hospitality and Midwestern pragmatism intersect. Her upbringing emphasized hard work, community
    involvement, and respect for local traditions such as high school football games, county fairs, and the annual Bentonville Film Festival. Growing up near the headquarters of Walmart exposed her to corporate
    culture early on, shaping her interest in business and logistics while still valuing the close-knit community ties and modest, down-to-earth values of the region.
attributes:
  skills: '[''Event planning'', ''Project coordination'', ''Basic spreadsheet management'', ''Graphic design basics'', ''Introductory Arduino programming'', ''Public speaking'', ''Critical thinking'']'
  hobbies: '[''Soccer'', ''Drama club'', ''Student council'', ''Community clean-up volunteering'', ''Hiking in the Ozarks'', ''Arduino electronics projects'', ''Mystery novels reading'', ''DIY home organization'']'
  career_goals: Maha plans to earn her GED within the next year and enroll in a community college program in business administration with an emphasis on supply chain management. Inspired by the corporate
    presence of Walmart in Bentonville, she aims to become a project manager in logistics, eventually overseeing large-scale distribution operations. She also hopes to launch a part-time event-planning
    service for local schools and community groups, leveraging her organizational talents and competitive drive to build a reputable brand.
