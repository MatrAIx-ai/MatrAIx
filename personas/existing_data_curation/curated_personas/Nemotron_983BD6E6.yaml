personas:
  professional: Mary Santulli, a seasoned administrative professional with two decades of experience supporting educational programs in Orlando, leverages expert-level Microsoft Office and Google Workspace
    skills to orchestrate seamless event logistics while applying their natural people-focused, conflict-resolution talent, and is actively pursuing a Certified Administrative Professional credential to
    transition into a senior office manager role.
  sports: Mary Santulli, an enthusiastic participant in Zumba and line-dancing at the local community center, follows the Orlando Magic and Tampa Bay Buccaneers fervently, regularly joins a neighborhood
    walking club on weekends, and volunteers as a scorekeeper for the community youth soccer league, balancing active participation with supportive spectating, and they love cheering on the home teams from
    the stands.
  arts: Mary Santulli immerses themselves in the arts through a lively book club that discusses contemporary fiction and personal-growth titles, attends performances by the Orlando Shakespeare Company,
    delights in the folk-rock sounds of artists like John Mayer and Norah Jones at local venues, and hones their creative eye in a weekly online photography class.
  travel: Mary Santulli prefers spontaneous road trips to historic Florida towns such as St. Augustine, Fernandina Beach, and the quaint streets of Apalachicola, uses a flexible travel credit card that
    earns points for occasional flights to Puerto Rico, and plans itineraries loosely, allowing room for unexpected cultural festivals they discover along the way.
  culinary: Mary Santulli enjoys cooking Italian-inspired dishes like spaghetti carbonara and homemade bruschetta using fresh basil from their garden, relishes Southern staples such as shrimp and grits,
    regularly samples key lime pie at local bakeries, and often experiments with fresh heirloom tomatoes in salads, though they sometimes over-season with garlic and forget to set a timer for baked casseroles.
  core: Mary Santulli, 52, blends practical administrative expertise with a vibrant community spirit, fuels their days with Zumba, books, and gardening, pursues flexible career growth while occasionally
    misplacing receipts, and consistently chooses harmony and curiosity over rigid schedules.
background:
  cultural: Mary is a white American whose family heritage traces back to German and Italian immigrants who settled in the Midwest. She grew up in a middle‑class suburban community in Ohio, where Catholic
    traditions and community involvement shaped her values. After moving to Orlando in her thirties, she embraced the diverse, hospitality‑rich culture of Central Florida while retaining the practical,
    down‑to‑earth sensibilities of her upbringing. Her cultural background emphasizes family cohesion, respect for education, volunteerism, and an appreciation for the multicultural tapestry of her current
    city, which she reflects in both her professional demeanor and personal interests.
attributes:
  skills: '["Office Administration", "Calendar Management", "Travel Coordination", "Event Planning", "Customer Service", "Interpersonal Communication", "Conflict Resolution", "Microsoft Office Suite (Word,
    Excel, PowerPoint, Outlook)", "Google Workspace", "Data Entry & Records Management", "Basic Bookkeeping", "Educational Program Support"]'
  hobbies: '["Zumba and line dancing", "Book club participation", "Community gardening", "Volunteer literacy tutoring at the Orlando Public Library", "Attending local cultural festivals and food markets",
    "Photography (online courses)", "Creative writing (workshops)", "Weekend road trips to historic Florida towns"]'
  career_goals: She aspires to advance from a secretary/administrative assistant to a senior office manager or executive assistant within a school district or nonprofit educational organization in Orlando.
    Over the next five years, she plans to earn a Certified Administrative Professional (CAP) credential, deepen her expertise in project management, and lead a mentorship program for new administrative
    staff. She hopes to combine her administrative skill set with her education background to coordinate community outreach initiatives, eventually overseeing a small team that organizes adult‑education
    workshops and volunteer events. She values a flexible schedule that allows her to maintain family time while contributing meaningfully to her community’s educational mission.
