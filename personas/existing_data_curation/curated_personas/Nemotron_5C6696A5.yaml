  career_goals: Saramma aims to leverage her decades of managerial experience to mentor emerging leaders within her organization and the wider Bay Area community. She seeks to design and implement a comprehensive
    succession plan that preserves operational excellence while promoting diversity and inclusion. Over the next few years, she plans to transition into a part‑time consultancy role, advising small businesses
    and nonprofit groups on efficient operations and inclusive workplace culture. Additionally, she aspires to serve on the board of a local cultural museum, contributing strategic insight and championing
    programs that celebrate South Asian heritage and foster cross‑cultural dialogue.
