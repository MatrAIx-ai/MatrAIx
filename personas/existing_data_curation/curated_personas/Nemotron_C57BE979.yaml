personas:
  professional: Kelli Fassilis, a 31‑year‑old operations leader at a boutique lifestyle brand, channels their curiosity and cooperative nature into meticulous process optimization and flexible project planning,
    using Excel, Google Analytics, Asana and Trello to drive sustainable growth while fostering harmonious, inclusive teams, and they regularly mentor junior staff to cultivate a shared artistic vision.
  sports: Kelli Fassilis enjoys weekend hikes along the Palisades, practices yoga and Pilates daily, follows the New York Knicks, Yankees, and NYCFC, and they play in a co‑ed recreational volleyball league
    at a local community center.
  arts: Kelli Fassilis immerses themselves in contemporary art by frequenting MoMA and the Whitney, curating pop‑up shows inspired by artists like Yayoi Kusama and Kerry James Marshall, while finding solace
    in live performances by indie folk musician Bon Iver and Broadway’s Hamilton, and they regularly experiment with watercolor landscapes and experimental photography.
  travel: Kelli Fassilis plans culturally rich trips with a blend of structured itineraries and spontaneous discovery, favoring boutique stays in Florence, Santorini, and Kyoto, and they often align travel
    dates with local art festivals, though budget constraints sometimes limit extended stays.
  culinary: Kelli Fassilis explores Mediterranean cuisine at home, mastering dishes like moussaka, spanakopita, and grilled octopus with fragrant oregano, lemon, and extra‑virgin olive oil, while occasionally
    attending Greek cooking workshops and pairing meals with a crisp Assyrtiko, and they admit to occasionally over‑seasoning in a quest for bold flavors.
  core: Kelli Fassilis is a curious, organized operations leader who blends artistic pursuits with data‑driven decision‑making, balancing disciplined budgets, health‑conscious habits, and a love for global
    culture, and they occasionally indulge in spontaneous culinary experiments and art‑filled weekend adventures.
background:
  cultural: Kelli grew up in Westwood, New Jersey, in a close‑knit family of Greek descent. Her parents, who immigrated to the United States in the 1970s, preserved Greek traditions such as celebrating
    Easter and the Feast of Saint Basil, cooking classic dishes like spanakopita and moussaka, and sharing stories of their homeland. Raised in the diverse suburban environment of Bergen County, she was
    exposed to a mosaic of cultures and artistic influences from the nearby New York metropolitan area. This blend of Greek heritage and American upbringing has shaped her values of community, hospitality,
    and an appreciation for both classic and contemporary artistic expressions.
