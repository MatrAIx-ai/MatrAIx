  career_goals: Kelli aims to advance to a senior leadership role—such as Director of Operations—within a lifestyle or design‑focused company that values sustainability and artistic expression. She envisions
    leading cross‑functional teams to implement innovative, customer‑centric initiatives while fostering a collaborative, inclusive culture. To broaden her impact, she plans to obtain a PMP certification
    and complete a bachelor's degree in Business Administration, eventually channeling her managerial expertise into an arts administration role or launching her own boutique space that marries retail with
    community art programming.
