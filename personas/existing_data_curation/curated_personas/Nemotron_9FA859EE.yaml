    sector'']'
  hobbies: '[''Chess (senior club)'', ''Crossword puzzles'', ''Sudoku'', ''Walking in Central Park and Hudson River waterfront'', ''Attending science lectures at museums'', ''Math tutoring for adult learners'',
    ''Participating in Irish cultural events'']'
  career_goals: 'As he nears retirement, James aims to codify his decades of practical knowledge into resources that will outlive his own career. He plans to write a concise guide titled ''Numbers in the
    City: Applied Statistics for Community Decision‑Making'' intended for city employees and civic volunteers. He also wishes to launch a mentorship program within the Department of City Planning to pair
    seasoned analysts with emerging talent, ensuring the transfer of his hands‑on expertise. Additionally, James hopes to volunteer his analytical skills to support local non‑profits focused on education
    and public‑health research. A personal ambition is to receive a formal commendation from the city for his contributions to data‑driven governance, providing a tangible acknowledgment of his lifelong
    dedication.'
