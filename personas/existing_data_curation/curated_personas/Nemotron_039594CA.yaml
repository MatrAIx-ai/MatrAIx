    IoT integration'', ''Project budgeting and cost estimation'', ''Technical training and mentorship'', ''Metalworking and custom duct fabrication'', ''Lean process improvement'', ''EPA Section 608 certification'']'
  hobbies: '[''Hiking and backpacking in the Medicine Bow Mountains'', ''Rock climbing with local climbing group'', ''Playing guitar in a weekly jam session'', ''Attending gallery openings and art exhibitions'',
    ''Landscape and architectural photography'', ''Woodworking and custom furniture making'', ''DIY smart‑home and home‑automation projects'', ''Volunteering backstage at community theater'', ''Participating
    in local food‑co‑op cooking clubs'', ''Drone piloting for aerial photography'']'
  career_goals: Thomas aims to become a recognized master HVAC‑R technician in the Rocky Mountain region and eventually launch his own independent contracting firm focused on high‑performance, energy‑efficient
    installations. He plans to obtain additional certifications in geothermal and solar‑assisted heating systems, positioning his business at the forefront of sustainable climate‑control solutions. Over
    the next five years, he intends to mentor apprentices, develop a niche in aesthetically integrated ductwork for boutique homes, and win regional awards for innovation and customer satisfaction. His
    long‑term ambition includes contributing to industry standards through participation in state‑level HVAC associations.
