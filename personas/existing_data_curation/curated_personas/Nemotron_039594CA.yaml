personas:
  professional: Thomas Sly, a 43‑year‑old HVAC‑R master mechanic, blends two decades of hands‑on expertise in complex system installation with a calm, competitive drive that pushes him to pioneer energy‑efficient
    retrofits, mentor apprentices, and constantly refine troubleshooting methods across the Rocky Mountain region.
  sports: Thomas Sly spends his summers backpacking the Medicine Bow Mountains, enjoys snow‑mobile outings in winter, cheers on the Wyoming Cowboys football team and the Cheyenne Frontier Days rodeo, and
    participates in the local climbing club, all while maintaining a skeptical eye on team statistics but a passionate commitment to personal fitness.
  arts: Thomas Sly strums a vintage Fender at weekly jam sessions, attends live shows by The Avett Brothers at The Fly, curates a personal photography series inspired by Ansel Adams that captures industrial
    architecture against expansive skies, and frequents the University of Wyoming Art Museum to explore contemporary Western painters such as Raymond Rice, reflecting his open, unconventional appreciation
    for the arts.
  travel: Thomas Sly prefers self‑driven road trips that mix scouting for sustainable HVAC installations with wilderness adventures, having recently explored Yellowstone’s geysers, driven the historic Route 66
    to Santa Fe, and planning a future trek through Patagonia’s steppe, all while balancing a modest travel budget with a competitive desire to see cutting‑edge green‑technology sites abroad.
  culinary: Thomas Sly enjoys cooking over a wood‑fired grill, mastering a smoky bison burger glazed with local huckleberry BBQ sauce and served alongside roasted root vegetables, while also savoring cowboy
    beans, occasional elk jerky, and experimenting with a spicy cowboy chili that he proudly shares at county fair potlucks.
  core: Thomas Sly is a fiercely curious, ruggedly self‑reliant HVAC specialist who balances a love of frontier outdoors with a deep appreciation for art and technology, often juggling a competitive edge
    with an easygoing calm and a healthy dose of skeptical discernment.
background:
  cultural: Thomas grew up in a middle‑class, white family in the high plains of Wyoming, where the values of self‑reliance, rugged individualism, and close community ties are deeply ingrained. His upbringing
    blended the frontier heritage of cattle ranching and outdoor recreation with the cultural influence of the University of Wyoming, which exposed him to a vibrant arts scene and a spirit of intellectual
    curiosity. Seasonal traditions such as county fairs, snow‑mobile outings, and local music festivals shaped his social life. While his cultural identity is rooted in the Western Wyoming ethos of respecting
    nature and hard work, his openness to new ideas and the arts reflects the university’s diverse cultural offerings.
attributes:
  skills: '[''HVAC system installation and commissioning'', ''Refrigeration cycle diagnostics'', ''Electrical wiring and control circuitry'', ''Blueprint and schematic interpretation'', ''Energy‑efficiency
