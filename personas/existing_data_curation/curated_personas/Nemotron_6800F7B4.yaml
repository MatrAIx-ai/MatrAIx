personas:
  professional: Guadalupe Nesbit is a data‑driven business operations specialist who leverages Lean Six Sigma, SAP and NetSuite expertise to streamline processes while using their natural charisma and talkative
    flair to rally cross‑functional teams around ambitious efficiency targets.
  sports: Guadalupe Nesbit stays fit by dancing salsa three times a week, hikes the Cape Fear River Trail on weekends, supports the Carolina Hurricanes in the NHL and the Carolina Panthers in the NFL, and
    belongs to the Wilmington Coastal Runners club, where they train for occasional 5K races during the spring.
  arts: Guadalupe Nesbit lights up the stage in community theater productions, idolizes Lin‑Manuel Miranda’s lyrical storytelling, grooves to the salsa rhythms of Celia Cruz while also humming country classics
    by Dolly Parton, and regularly attends local art walks featuring works by emerging Southern painters, blending their love for performance and visual arts into vibrant social gatherings.
  travel: Guadalupe Nesbit prefers meticulously planned weekend getaways along the Atlantic coast—like the historic streets of Charleston and the breezy dunes of the Outer Banks—while also dreaming of immersive
    trips to Oaxaca’s food markets and Barcelona’s Gaudí architecture, balancing budget‑friendly road trips with occasional splurges on international flights when their work schedule allows.
  culinary: Guadalupe Nesbit enjoys crafting fusion dishes such as chipotle‑infused shrimp and grits, collard green empanadas, and BBQ‑marinated pork tacos, frequently experimenting with ingredients like
    poblano peppers, smoked paprika, and sweet plantains, and often hosts themed dinner nights where friends rave over their signature mango‑coconut ceviche.
  core: Guadalupe Nesbit blends Southern hospitality with a curiosity for Latin flavors, turning data into operational gold by day and salsa‑spiced social gatherings into nightly rituals, all while juggling
    a penchant for late‑night crossword puzzles and an occasional caffeine overload.
background:
  cultural: Guadalupe grew up in a middle‑class white family in the Wilmington, North Carolina area, where Southern hospitality, community involvement, and a strong connection to the Atlantic coast shaped
    her outlook. Raised in a Catholic tradition, she celebrates holidays such as Christmas, Easter, and Thanksgiving, and the distinctive first name 'Guadalupe' reflects her family's appreciation for multicultural
    influences, subtly informing her interest in Latin American cuisine and occasional participation in cultural festivals. Her upbringing merges the practical, down‑to‑earth values of coastal North Carolina
    with an openness to diverse cultural experiences, fostering a balanced perspective that informs both her professional and personal life.
attributes:
  skills: '[''Project Management'', ''Data Analysis'', ''Process Optimization'', ''Lean Six Sigma'', ''ERP Systems (SAP, NetSuite)'', ''Statistical Modeling'', ''Performance Metrics Design'', ''Budgeting
    and Forecasting'', ''Stakeholder Communication'', ''Change Management'', ''Cross‑Functional Team Leadership'', ''Workshop Facilitation'']'
  hobbies: '[''Toastmasters public speaking'', ''Community theater'', ''Salsa dancing'', ''Experimental cooking (fusion recipes)'', ''Coastal hiking'', ''Tech podcasts and meetups'', ''Crossword and Sudoku
    puzzles'', ''Volunteer work with youth education nonprofits'', ''Environmental stewardship activities'']'
  career_goals: Guadalupe aims to advance to an Operations Manager role within the next three years, eventually stepping into a Director of Operations position where she can lead large, data‑driven teams
    and spearhead digital transformation initiatives. She plans to augment her credentials with an MBA and certification as a PMP and Lean Six Sigma Black Belt. Long‑term, she envisions establishing her
    own operations consulting firm focused on sustainable process improvement for mid‑size enterprises, while continuing to mentor younger professionals and maintain a healthy work‑life balance with her
    spouse and community.
