  career_goals: Although retired from formal employment, Tommy aims to channel his experience into community leadership. He plans to volunteer as a coordinator for the local senior center, mentor younger
    volunteers on practical skills, and serve on the homeowner’s association board to improve neighborhood safety and maintenance. He also hopes to develop a small consulting service offering DIY home‑repair
    workshops for retirees. Maintaining his health, staying active, and traveling to historic sites in the Southeast are personal ambitions that complement these community goals.
