persona_description: A construction worker who is responsible for overseeing the earthwork process during the construction of a building's foundation. This person needs to ensure that all necessary services
  are properly marked and that the building's foundation is properly set in its desired level. They must also ensure that the sub-base level of the footing is checked and that the base soil is checked for
  strength and suitability for further work execution. The construction worker should also pay attention to the slope of the excavation and the quality of the backfilling material, as well as the backfilling
  process and the compaction of the soil. Additionally, the construction worker should check that the foundation bed is cleaned and that the backfilling is done properly.
