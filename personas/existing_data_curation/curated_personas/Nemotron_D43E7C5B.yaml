  hobbies: '[''Reading historical fiction'', ''Exploring education research'', ''Gardening (heirloom vegetables)'', ''Quilting and crocheting'', ''Walking along Congaree River'', ''Visiting Riverbanks Zoo
    & Garden'', ''Small book club'', ''Volunteering for children’s storytelling sessions'']'
  career_goals: Marsha aims to transition into a leadership role such as Center Director or Early Childhood Program Coordinator within the next five years, leveraging her practical experience and graduate
    education to improve program quality and staff development. She plans to earn the state-mandated Early Childhood Leadership certification and eventually pursue a doctorate in Educational Leadership
    focused on early childhood policy. Additionally, she hopes to mentor new childcare workers and contribute to community advocacy for affordable, high-quality preschool programs in Columbia and the broader
    Richland County area.
