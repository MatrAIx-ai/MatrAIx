persona_description: A non-profit organization that provides financial, academic, personal, and professional support to community college students to increase their enrollment, full-time enrollment, persistence,
  and full-time persistence. The organization's unique approach involves a small, annual performance-based stipend to cover financial needs and monthly meetings with a program coordinator. The results of
  the study, which found significant effects for high school applicants, led the organization to rethink its active ingredients and target limited resources to lead to the largest impact on student outcomes.
  The organization's effectiveness has raised questions about which program component or components are most critical to success, but the growing body of evidence of comprehensive program effectiveness
  suggests that early evidence of the OMD program's effectiveness has led to questions about which program component or components are most critical to success.
