  hobbies: '[''Building block play'', ''Crayon drawing'', ''Dancing to music'', ''Listening to mariachi'', ''Watching animated videos'', ''Collecting leaves'', ''Helping in kitchen'']'
  career_goals: Although Alfredo is only two, his parents notice a strong curiosity for art and a gentle desire to help others. He often points to pictures and says "I draw" and shows excitement when listening
