  hobbies: '["Karaoke nights", "Community theater", "Hiking in the Blue Ridge Mountains", "Cooking Southern comfort food", "DIY home decor projects", "Photography", "Volunteering at the local animal shelter",
    "Yoga and pilates", "Fashion blogging on Instagram", "Attending local music festivals"]'
  career_goals: Lily’s next professional step is to become an assistant manager at her current retail location within the next twelve months, using her organizational strengths and people‑centric approach
    to improve team performance. Over the next three to five years she aims to earn a full store manager position, then progress to a district manager role where she can shape regional sales strategies
    and mentor multiple teams. Parallel to her career climb, Lily plans to finish her associate’s degree in Business Management, allowing her to incorporate advanced operational analytics and strategic
    planning into her retail leadership. Long‑term, she dreams of opening a boutique that blends locally sourced Southern fashion with sustainable practices, reflecting her curiosity for new trends and
    commitment to community values.
