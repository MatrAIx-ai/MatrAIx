  hobbies: '[''sketching'', ''comic strip creation'', ''reading fantasy novels'', ''acoustic guitar playing'', ''nature photography'', ''stop‑motion animation'', ''short story writing'', ''board‑game nights'',
    ''attending county fairs'', ''library art workshops'']'
  career_goals: Michael hopes to turn his love of drawing and storytelling into a career as a concept artist or illustrator for video games, film, or graphic novels. In the near term, he aims to graduate
    high school, build a strong art portfolio, and earn a scholarship to an art‑focused college or vocational program. He also dreams of one day teaching art workshops at community centers to help other
    kids explore creativity. While he is aware of his current academic challenges, he is motivated to improve his grades to keep his options open and eventually work in a collaborative studio that values
    innovative ideas and a supportive atmosphere.
