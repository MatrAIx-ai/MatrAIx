personas:
  professional: Michael Currin, a budding visual storyteller, blends sketching, stop‑motion animation, and short‑story writing into a fledgling comic‑creation workflow, letting their curiosity drive experiments
    while they often postpone tasks due to a laid‑back attitude toward planning.
  sports: Michael Currin, a casual hiker and member of the County Trail Runners club, enjoys weekend trail runs, occasional pickup soccer with friends, and cheering on the nearby professional baseball team,
    the Chicago Cubs, while they prefer low‑key group activities over large crowds.
  arts: Michael Currin, an avid fan of indie graphic novels like *Saga* and animated masterpieces by Hayao Miyazaki, draws inspiration from the whimsical style of Shaun Tan while strumming acoustic folk
    tunes from the Indigo Girls, and they often blend these influences into their own sketch characters and stop‑motion stories.
  travel: Michael Currin, a weekend explorer who favors low‑key road trips to Shenandoah National Park and dreams of photographing Iceland’s volcanic landscapes, plans itineraries on a hand‑drawn map but
    they sometimes forget essential gear like chargers or spare batteries.
  culinary: Michael Currin, a budding home‑cook, loves crafting rustic tomato‑basil bruschetta and caramelized sweet‑potato fries using herbs from the family garden, and they often cap meals with grilled
    cheese and hot chocolate after a long hike.
  core: Michael Currin is a curious, sketch‑obsessed teen who balances farm chores with vivid imagination, often loses track of deadlines due to a relaxed attitude, and they worry about the smallest details.
background:
  cultural: Michael was raised in Stamping Ground, a small community in Owen County, Kentucky. The town’s culture blends a rural, agricultural heritage with close‑knit neighborly ties, where church gatherings,
    local school events, and county fairs play a central role. Family values emphasize humility, hospitality, and cooperation, and there is a strong appreciation for nature and the outdoors, reflected in
    activities like fishing, hiking, and barn‑yard work. Although the community is predominantly white and maintains many Southern traditions, Michael is exposed to a variety of artistic influences through
    online media, the public library’s art resources, and occasional visits to nearby towns for music festivals. This mix of local customs and broader cultural curiosity shapes his worldview, encouraging
    both respect for community norms and openness to new ideas.
