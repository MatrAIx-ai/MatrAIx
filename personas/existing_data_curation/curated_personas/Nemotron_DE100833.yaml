  career_goals: At 70, Elisabeth aims to leverage her decades of experience to mentor emerging developers, especially women and senior‑citizen coders, through workshops and one‑on‑one tutoring. She aspires
    to contribute to open‑source projects that explore generative art and AI‑driven creativity, and to launch a boutique consultancy that helps small businesses in rural Kentucky adopt affordable, custom
    software solutions. Ultimately, she seeks to leave a lasting legacy of innovative, user‑centric code that blends artistic expression with functional design.
