personas:
  professional: Ketan Cordon, a veteran Gulf‑coast fisherman with three decades of vessel operation, GPS navigation, and gear maintenance expertise, blends a practical, safety‑first mindset with a curiosity
    for emerging sustainable technologies, making them a reliable mentor who thoughtfully integrates new eco‑friendly practices while honoring time‑tested methods.
  sports: Ketan Cordon follows the Houston Astros and New Orleans Saints avidly, participates in a weekend senior softball league through the Gulf Coast Anglers Club, practices casual cricket matches with
    expatriate friends, and maintains fitness with early morning shoreline jogs, though they sometimes skip workouts after a long day at sea.
  arts: Ketan Cordon cultivates artistic passions through tabla sessions inspired by Ravi Shankar, wildlife photography echoing the style of Art Wolfe, and woodworking projects that reference the rustic
    forms of mid‑century Scandinavian design, often sharing their creations at local community fairs.
  travel: Ketan Cordon prefers low‑key eco‑tourism, planning trips with meticulous GPS mapping to remote Gulf islands, has already fished the mangroves of Belize and the kelp forests of Nova Scotia, and
    dreams of a guided sail to the Maldives while balancing family responsibilities and a modest travel budget.
  culinary: Ketan Cordon skillfully fuses Gulf catches with South Asian spices, regularly preparing tandoori kingfish marinated in cumin, coriander, and garden‑grown cilantro, alongside a beloved coconut‑lime
    shrimp curry, and they relish the occasional indulgence of homemade naan paired with fresh mango salsa.
  core: Ketan Cordon merges a lifelong love of the sea with a meticulous, curiosity‑driven work ethic, balancing community mentorship, occasional spice‑laden culinary experiments, and a habit of worrying
    over every detail, from weather forecasts to stock market fluctuations.
background:
  cultural: Ketan comes from a South Asian (likely Indian) family that settled in Houston. He grew up celebrating Diwali, Holi, and other festivals, while also embracing Texas traditions such as barbecue
    and fishing culture. Fluent in English and Hindi, he blends the communal values of his heritage—respect for elders, hospitality, and collective harmony—with the multicultural, pragmatic vibe of Houston.
    This dual cultural lens shapes his outlook on work, family, and community involvement.
attributes:
  skills: '[''Commercial fishing operations'', ''Coastal navigation (GPS & sonar)'', ''Boat maintenance and repair'', ''Sustainable fishing practices'', ''Aquatic species identification'', ''Wildlife tracking
    and hunting techniques'', ''Gear maintenance and repair'', ''First aid and emergency response'', ''Weather monitoring and forecasting'', ''Team coordination and communication'']'
  hobbies: '[''Cooking fish with South Asian recipes'', ''Wildlife photography'', ''Playing the tabla'', ''Herb gardening'', ''Watching cricket'', ''Reading marine biology'', ''Volunteering at youth fishing
    programs'', ''Woodworking'']'
  career_goals: Ketan aims to transition from full‑time fishing to a mentorship and advisory role, helping younger anglers adopt sustainable practices and safety protocols. He hopes to obtain certification
    as a fisheries manager and eventually launch a community‑owned, eco‑friendly fishery that supplies local markets while preserving Gulf ecosystems. Reducing workplace stress and achieving a balanced
    lifestyle for himself and his family are central to his long‑term plans, as is preserving his cultural legacy by teaching traditional cooking and storytelling to the next generation.
