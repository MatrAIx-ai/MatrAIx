persona_description: A teacher who is interested in teaching the Northern Ireland Curriculum, particularly in the area of history. They are looking for resources that can help them integrate the 1916 centenary
  into their curriculum, while also promoting positive, inclusive, and constructive learning environments. They are interested in using the resources provided by the Nerve Centre and Creative Centenaries
  to explore the causes and consequences of the 1916 events, as well as their ongoing legacy for us today. They are also interested in using the resources to address key questions across a number of subject
  areas and to develop learning in a positive, inclusive, and constructive environment.
