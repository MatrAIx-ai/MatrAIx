  hobbies: '[''Watercolor painting'', ''Aerial photography'', ''Visiting art galleries'', ''Mexican folk music and dance'', ''Cooking traditional Mexican cuisine'', ''Hiking in Kern County desert'', ''Gardening
    succulents'', ''Volunteering with youth aviation programs'', ''Reading aviation history'', ''Attending community festivals'']'
  career_goals: As she approaches retirement, Zoila aims to transition her passion for aviation into mentorship and community service. She plans to obtain a Certified Flight Instructor rating with flexible
    scheduling, allowing her to share her wealth of knowledge with aspiring pilots, especially women and Latinx students. She also hopes to volunteer at local aviation museums, help preserve the legacy
    of Mexican‑American aviators, and organize a community art‑aviation exhibition in Wasco. On a personal level, she aspires to document her life's journey in a memoir that intertwines her love for flight,
    art, and Mexican cultural heritage, while maintaining the flexibility to pursue her artistic hobbies and family time.
