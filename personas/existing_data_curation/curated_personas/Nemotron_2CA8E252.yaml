  career_goals: Carol aims to deepen the impact of technology on her hometown by developing user‑friendly applications that support seniors, small businesses, and local cultural preservation. She plans
    to launch a collaborative platform that archives oral histories and folk art from Bladen County, combining her coding skills with her love of storytelling. Over the next few years, she hopes to transition
    into a mentorship role, guiding emerging developers through inclusive coding practices and empathetic design. While she is considering a gradual shift toward part‑time consulting, she remains committed
    to volunteer work that bridges the digital divide, ensuring that technology serves as a tool for community harmony and personal empowerment.
