  career_goals: Esperanza dreams of a future where she can blend her love for the outdoors with her desire to help others. In the short term, she plans to graduate high school with a focus on environmental
    science and join the school’s ecology club. Her long‑term ambition is to become a wildlife conservationist or park ranger in Southern California, where she can lead youth outreach programs that teach
    kids about local ecosystems while sharing her Puerto Rican cultural heritage through storytelling and cooking demonstrations. She also entertains the idea of creating a flexible side‑hustle as a content
    creator, producing short videos that highlight sustainable living tips, mountain adventures, and traditional Puerto Rican recipes, allowing her to stay spontaneous and avoid overly rigid work structures.
