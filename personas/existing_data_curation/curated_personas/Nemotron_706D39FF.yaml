  career_goals: Although officially retired, Elizabeth aims to stay active and influential in her community. She hopes to take on a leadership role on the board of the local senior center, expand volunteer
    programs for underserved neighborhoods, and mentor new volunteers. She also plans to document her family history in a memoir, learn digital photography to capture family moments, and travel to visit
    her grandchildren across the Midwest. Her broader ambition is to ensure seniors have a stronger voice in local decision‑making and to foster intergenerational connections within Dayton.
