  hobbies: '[''Gardening'', ''Knitting'', ''Reading historical fiction'', ''Book club'', ''Bridge'', ''Line dancing'', ''Church choir'', ''Genealogy research'', ''Cooking family recipes'', ''Visiting farmers\''
