persona_description: A professor at Pontificia Universidad Católica de Chile who works on macro- and meso-scale patterns of biological diversity, physical processes determining diversity, human activities
  affecting diversity, and conservation planning. Her research focuses on the distribution of species, the mechanisms to protect marine environments, and the incorporation of management strategies to add
  marine conservation in regions where extensive fishing activities preclude large fractions of the coast to be assigned to marine conservation. Her methods have been widely adopted by other regions, including
  oceanic islands and southern Chile, resulting in the creation of several marine protected areas.
