persona_description: A naval officer who specializes in the design and development of large surface combatants, particularly the Invincible class of carriers. He has extensive experience with the design
  and engineering of ships, including the integration of power generation machinery, and has worked on several projects involving the design and construction of large naval vessels. He is knowledgeable
  about the advantages and disadvantages of different ship configurations, and has experience with the deployment and operation of aircraft on large carriers. He has a deep understanding of the operational
  requirements of carrier groups and has worked on the design of aircraft carriers for the Royal Navy and the United States Navy. He is a specialist in the use of large carriers in deep strike operations
  and has experience with the deployment of aircraft on these vessels.
