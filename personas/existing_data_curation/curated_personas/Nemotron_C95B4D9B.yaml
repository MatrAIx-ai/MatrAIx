  hobbies: '[''Digital drawing and illustration'', ''Acoustic guitar playing'', ''Soccer'', ''School debate club'', ''Video game design (Scratch, Python)'', ''Reading graphic novels and manga'', ''Bilingual
    language exchange'', ''Community volunteer activities'']'
  career_goals: Hector aspires to pursue a degree in graphic design or visual communications, aiming to become a multimedia artist who creates culturally resonant content. He dreams of working for a studio
    that blends storytelling with visual art, eventually stepping into a creative director role. Leveraging his bilingual background, he hopes to produce media that highlights Puerto Rican heritage for
    broader audiences. In the long term, Hector envisions establishing a youth arts program in Piedmont that offers workshops in digital art, music, and cultural expression, fostering creativity and community
    pride among his peers.
