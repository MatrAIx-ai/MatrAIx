personas:
  professional: Hector Campins, an aspiring digital illustrator and junior game developer, channels disciplined curiosity into daily sketch sessions, Python coding experiments, and leading school hackathon
    teams while always meeting high standards for his creative projects.
  sports: Hector Campins, a forward on his middle‑school soccer team and a member of the Oklahoma City FC youth academy, trains after school, idolizes MLS star Diego Valeri, and never misses a weekend match
    of the Portland Timbers, balancing team drills with video‑game fitness challenges.
  arts: Hector Campins, a passionate illustrator, draws inspiration from tropical colors and Caribbean rhythms while recreating the vibrant panels of manga series like One Piece, the whimsical style of
    Kanahei, and the street‑art edge of Banksy, often pairing his visual work with acoustic guitar renditions of both pop hits and traditional folk tunes.
  travel: Hector Campins plans weekend trips to Tulsa’s modern art museum, enjoys family outings to the coastal town of San Juan for its colorful plazas, and dreams of backpacking through Mexico City’s
    historic center, balancing school commitments with a modest travel budget funded by his disciplined savings plan.
  culinary: Hector Campins, an enthusiastic home chef, regularly helps prepare arroz con gandules and pastelón during family gatherings, has a secret talent for perfecting spicy salsa verde, and loves experimenting
    by adding tropical flavors like plantain chips to his favorite pizza toppings of pineapple and jalapeño.
  core: Hector Campins is a meticulously organized teen who fuses curiosity for art and tech with a love for soccer, balancing disciplined practice schedules with a playful penchant for late‑night game‑design
    marathons.
background:
  cultural: Hector’s Puerto Rican heritage is a central part of his identity, celebrated through family traditions, music, and language. At home, he speaks Spanish with his parents and grandparents, preserving
    cultural nuances and stories passed down through generations. The family enjoys cooking traditional dishes like arroz con gandules and pastelón, which Hector helps prepare during weekend gatherings.
    He participates in local cultural events, such as the annual Hispanic Heritage Festival in nearby Oklahoma City, where he shares his artwork and performs on a small stage. These experiences reinforce
    his appreciation for the vibrant Puerto Rican diaspora and inspire him to incorporate Caribbean motifs and rhythms into his creative projects.
