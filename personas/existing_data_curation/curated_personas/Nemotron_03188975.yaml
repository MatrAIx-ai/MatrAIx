  career_goals: Guided by his innate curiosity and high personal standards, Isaac aspires to a career that blends practical problem‑solving with rigorous research. He envisions becoming a civil engineer
    specializing in sustainable coastal infrastructure for Maine, or a marine biologist devoted to protecting the Gulf of Maine’s ecosystems. In either path he aims to achieve leadership positions where
    he can set high performance benchmarks, drive innovative projects, and eventually mentor younger professionals.
