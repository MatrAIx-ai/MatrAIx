personas:
  professional: Fernando Saravia is a retail operations supervisor who merges data‑driven inventory forecasting with hands‑on bilingual coaching of sales teams, applying Lean and Six Sigma principles to
    streamline store performance while they meticulously track visual‑merchandising budgets.
  sports: Fernando Saravia embraces solo hikes along the Eagle Rock Loop, follows the Los Angeles Dodgers and the Los Angeles Lakers, cheering each game from home while they occasionally join a local running
    club’s weekend 5K meets to stay active.
  arts: Fernando Saravia curates a personal soundtrack of Max Richter, Brian Eno, and Hammock during meditation and model‑building sessions, and they regularly assemble detailed scale models of classic
    automobiles while attending gallery openings that showcase contemporary abstract painters.
  travel: Fernando Saravia favors meticulously planned solo trips to nature‑rich destinations like Yosemite and the Canadian Rockies, and they dream of a tech‑focused visit to Tokyo’s Akihabara district,
    balancing a modest travel budget with a desire for quiet exploration.
  culinary: Fernando Saravia experiments with traditional mole sauces, layering roasted chilies, chocolate, and spices to perfect the balance of heat and sweetness, and they enjoy pairing these dishes with
    hand‑made corn tortillas and a splash of artisanal mezcal, though they often over‑season while chasing flavor perfection.
  core: Fernando Saravia blends a data‑driven retail mind with a solitary, reflective lifestyle, channeling curiosity into strategic planning while they wrestle with a persistent undercurrent of worry that
    fuels meticulous habits and occasional over‑cooking.
background:
  cultural: Fernando grew up in a Mexican immigrant family in Southern California, becoming fluent in both Spanish and English. Family gatherings and community celebrations such as Día de los Muertos and
    Mexican Independence Day remain important cultural touchstones. He was educated in a Catholic school where respect for elders and community service were emphasized. While he values these traditions—particularly
    the culinary art of Mexican cuisine—he often seeks quiet, solitary spaces to recharge, reflecting his introverted temperament. He maintains ties to his cultural heritage through cooking, occasional
    participation in local Latino festivals, and mentoring youth from his neighborhood who are interested in retail careers.
attributes:
  skills: '[''Retail operations management'', ''Team leadership and coaching'', ''Bilingual communication (Spanish/English)'', ''Inventory control and demand forecasting'', ''Data analysis with Excel and
