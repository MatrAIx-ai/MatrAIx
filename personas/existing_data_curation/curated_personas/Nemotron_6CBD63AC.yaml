  hobbies: '[''Reading non-fiction (business, psychology, tech)'', ''Journaling and meditation'', ''Solo hiking in local nature preserves'', ''Cooking Mexican cuisine (mole, tamales)'', ''Building scale
    model kits'', ''Solo video gaming (strategy titles)'', ''Listening to instrumental music'']'
  career_goals: Fernando aims to advance from first‑line supervisor to district manager within the next three to five years, leveraging his operational expertise to oversee multiple stores. He plans to
    pursue an MBA part‑time to deepen his strategic and financial skill set, and to specialize in omni‑channel retail integration. Long‑term, he envisions launching a consulting boutique that helps small‑to‑medium
    retailers optimize floor operations and adopt data‑driven decision making, allowing him to work more autonomously and reduce the day‑to‑day stress of front‑line management while achieving financial
    independence.
