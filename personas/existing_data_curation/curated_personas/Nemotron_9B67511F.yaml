personas:
  professional: Elizabeth Rowell, a healthcare operations manager at a multi‑site hospital network in the Southwest, leverages rigorous compliance expertise, data‑driven process redesign, and a humanities‑rooted
    communicative flair to run structured yet adaptable teams, while their competitive edge pushes them to exceed performance metrics and mentor rising female leaders.
  sports: Elizabeth Rowell channels their competitive spirit into weekly 5K runs with the Red Rock Trail Runners club, dominates trivia‑night fitness challenges at the local gym, and avidly follows the
    Vegas Golden Knights and the Las Vegas Aces, while reserving summer weekends for hiking the sandstone cliffs of Red Rock Canyon.
  arts: Elizabeth Rowell immerses themselves in the Nevada arts scene by attending nightly jazz sessions featuring Wynton Marsalis at the Smith Center, catching Broadway‑style productions starring Hugh
    Jackman, and devouring biographies by Doris Kearns Goodwin alongside contemporary novels by Sally Rooney, allowing these cultural flavors to inform both their leadership style and dinner‑party conversations.
  travel: Elizabeth Rowell prefers meticulously planned getaways that balance adventure and relaxation, often weekend‑hopping from Vegas to Zion National Park for canyoneering, taking a yearly cultural
    tour to Kyoto’s historic temples, and keeping an eye on budget‑friendly flights to Barcelona for a weekend of art and tapas.
  culinary: Elizabeth Rowell, an enthusiastic home chef, delights in crafting elaborate meals like rosemary‑infused lamb shank, hand‑rolled sushi with toro and avocado, and a decadent dark‑chocolate molten
    cake, while they frequently experiment with smoked paprika‑spiced roasted vegetables for friends’ dinner parties, though they sometimes forget to set the timer.
  core: Elizabeth Rowell is a data‑driven healthcare strategist who blends competitive ambition with a love for community trivia, marathon training, and late‑night jazz, yet they can’t resist ordering extra
    dessert after a long run.
background:
  cultural: Elizabeth identifies as a White American with a middle‑class upbringing in the Pacific Northwest, where values of self‑reliance, practicality, and community involvement were emphasized. Relocating
    to Las Vegas introduced her to the city's hospitality‑driven, fast‑paced, and entertainment‑rich culture, shaping a blend of traditional American work ethic with a dynamic, socially oriented lifestyle.
    Her humanities education deepens her appreciation for cultural diversity and the arts, informing both her professional approach to inclusive patient care and her personal enthusiasm for the vibrant
    cultural scene of Nevada.
attributes:
  skills: '[''Healthcare Operations Management'', ''Regulatory Compliance (HIPAA, OSHA)'', ''Financial Planning & Budgeting'', ''Team Leadership and Development'', ''Quality Improvement & Performance Metrics'',
