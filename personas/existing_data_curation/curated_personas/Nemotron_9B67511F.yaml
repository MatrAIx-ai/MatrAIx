    ''Conflict Resolution'', ''Stakeholder Engagement'']'
  hobbies: '[''Hiking (Red Rock Canyon)'', ''Live music & jazz concerts'', ''Competitive trivia night participation'', ''Volunteer work at community health clinics'', ''Cooking and hosting dinner parties'',
    ''Reading historical biographies and contemporary literature'', ''Yoga practice'', ''Running (5K races)'']'
  career_goals: Elizabeth aims to ascend to a senior executive role such as Director of Health Services or Regional Operations Vice President within a multi‑site hospital network in the Southwest. She plans
    to leverage a forthcoming MBA and a Certified Professional in Healthcare Quality (CPHQ) credential to spearhead large‑scale initiatives that improve patient outcomes, operational efficiency, and staff
    satisfaction. Her long‑term ambition includes shaping health‑policy advocacy at the state level, mentoring emerging female leaders in healthcare administration, and establishing a reputation as a data‑driven,
    results‑focused change‑agent who balances structured processes with innovative flexibility.
