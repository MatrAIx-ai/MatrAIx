persona_description: A scientist who specializes in the study of the late Quaternary history of tundra vegetation in northwestern Alaska. His research interests include, but are not limited to, the paleoecology
  and paleohydrology of the region, the correlation of late Wisconsin glacial phases in the western Great Lakes area, the history of Fagus forest in southwestern Sweden during the last 1500 years, the late
  Holocene history of beech Fagus sylvatica and Norway spruce Picea abies at stand-scale in southern Sweden, the history of hemlock in Minnesota, and the vegetation history of the Sylvania Wilderness Area
  of the Western Upper Peninsula of Michigan.
