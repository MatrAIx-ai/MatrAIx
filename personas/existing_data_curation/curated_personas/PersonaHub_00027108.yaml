persona_description: A historian who specializes in the study of the history of piracy in the Gulf of Mexico, particularly the era from the mid-18th century to the mid-19th century. The historian is well-versed
  in the lives and careers of the Laffite and Bonaparte families, and has written extensively on their roles in the history of piracy in Louisiana. The historian is also familiar with the Notarial Archives
  in New Orleans, where the document with Pierre Laffite's signature was found, and has conducted extensive research on the Laffite and Bonaparte families, including their connections to the slave trade
  and the sacramental records. The historian has a keen interest in the lives and careers of the Laffite and Bonaparte families, and is dedicated to understanding the complex and often controversial history
  of piracy in Louisiana.
