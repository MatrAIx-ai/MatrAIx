personas:
  professional: Alishan Mathurin, a retired community volunteer and church choir member, channels decades of event‑coordination, gardening, and culinary expertise into mentoring youth through storytelling
    workshops and intergenerational cooking classes, all while staying adaptable and occasionally misplacing notebooks due to a relaxed approach to planning.
  sports: Alishan Mathurin enjoys dancing to classic Motown hits at church socials, participates in gentle garden‑walks with fellow seniors, and follows the Detroit Pistons and Red Wings on game nights,
    preferring community‑oriented, low‑impact activity over competitive sports.
  arts: Alishan Mathurin immerses herself in the soulful sounds of Stevie Wonder, the blues of B.B. King, and the jazz crooning of Ella Fitzgerald, sings in her church choir, and finds inspiration in historical
    biographies like those of Eleanor Roosevelt, shaping her leisure time with a blend of music, storytelling, and literary curiosity.
  travel: Alishan Mathurin prefers short road trips to nearby historic towns such as Ann Arbor and weekend excursions to the Smithsonian museums in Washington, D.C., while dreaming of a leisurely cruise
    to the Caribbean with her grandchildren, balancing her love of genealogy research with the practicalities of a fixed retirement budget.
  culinary: Alishan Mathurin crafts beloved family dishes such as baked chicken with a crisp herb crust, seasoned collard greens cooked with smoked turkey, and sweet potato casserole topped with toasted
    pecans, adapting classic recipes with reduced sodium and substituting whole‑grain cornbread for a healthier twist, and often invites friends to share her culinary creations.
  core: Alishan Mathurin is a vivacious 85‑year‑old community pillar who blends her love of music, gardening, and cooking with a relaxed, curiosity‑driven outlook, mentoring younger generations while occasionally
    misplacing her glasses and forgetting a bill.
background:
  cultural: Alishan was born in Detroit during the tail end of the Great Migration, growing up in a vibrant African American neighborhood shaped by the civil‑rights era and the rise of Motown. Her family
    traces its roots to the South, and the traditions of soul‑food cooking, church fellowship, and oral storytelling are central to her identity. The music of the 1960s and 70s—especially Motown, jazz,
    and blues—has been a lifelong soundtrack, influencing her love for dancing and communal singing. Throughout her life, Alishan has been a pillar of her community, participating in church events, neighborhood
    block parties, and senior‑center programs, while also preserving the stories and histories of older residents for future generations.
