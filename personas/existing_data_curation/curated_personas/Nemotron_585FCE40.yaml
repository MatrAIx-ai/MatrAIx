    podcasts'']'
  career_goals: Although retired from formal employment, Alishan remains driven to leave a lasting legacy. She aims to mentor younger members of her community, especially through storytelling workshops
    and intergenerational cooking classes. She hopes to document her life story in a memoir that captures the African American experience in Detroit across the decades. Alishan also aspires to deepen her
    digital literacy by learning to use tablets and social media to keep her family connected. Finally, she wishes to continue supporting local senior‑center programs and to help preserve the cultural heritage
    of her neighborhood by organizing heritage‑focused events.
