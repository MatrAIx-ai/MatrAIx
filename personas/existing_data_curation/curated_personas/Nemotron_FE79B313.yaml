  hobbies: '[''Gardening'', ''Hiking'', ''DIY Home Improvement'', ''Cooking Southern Comfort Food'', ''Reading Mystery and Historical Fiction'', ''Volunteering at Community Events'', ''Attending Local Music
    Festivals'', ''Photography'', ''Genealogy Research'', ''Knitting'']'
  career_goals: Maria aims to advance to a regional director role overseeing multiple community associations and multifamily properties in Kentucky and neighboring states. She plans to earn the Certified
    Property Manager (CPM) and Certified Community Association Manager (CCAM) designations to solidify her professional credibility. Long‑term, she envisions launching her own boutique property management
    firm that emphasizes sustainable practices and strong community engagement. Maria also hopes to mentor emerging managers, fostering a supportive network within the local real estate industry while maintaining
    a stable work‑life balance for her family.
