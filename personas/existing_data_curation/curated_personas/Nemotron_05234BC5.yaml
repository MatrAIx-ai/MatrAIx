  career_goals: She aims to turn her communication and digital media skills into a career as a community influencer or event coordinator. Irene plans to earn a certificate in digital media production or
    hospitality after high school, and eventually work for a local nonprofit or media outlet where she can organize youth events, produce promotional content, and mentor other teens. She also hopes to open
    a small catering or food‑truck business that blends her love of cooking with her entrepreneurial spirit, providing financial stability for herself and her family.
