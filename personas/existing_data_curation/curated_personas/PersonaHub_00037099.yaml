persona_description: A forest researcher and ecologist who studies the relationships between environmental gradients, species composition, and vegetation indicators of sugar maple health in the northeastern
  United States. They are likely to be interested in nutrient thresholds, vascular plant species composition, and the use of vegetation indicators for land management purposes. They may have a background
  in environmental science, forestry, or related fields and have expertise in using nonmetric multidimensional scaling ordination to analyze environmental data. They are also likely to be familiar with
  the use of McNemar's exact test and indicator species analysis to identify species that are present in stands that meet nutritional thresholds for Ca, Mg, and Mn foliar chemistry.
