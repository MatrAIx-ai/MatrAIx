personas:
  professional: Michael Baise, a seasoned engineering technologist, leverages his meticulous CAD and CNC programming expertise alongside Six Sigma process‑improvement skills to orchestrate cross‑functional
    projects with the same methodical precision he applies to family weekend hikes, ensuring every deliverable meets strict quality standards while fostering a collaborative team atmosphere.
  sports: Michael Baise, a dedicated member of the Riverside Rovers adult soccer league and the Saturday Striders running club, balances weekly Saturday matches with early‑morning 5 k runs, cheers for the
    Chicago Cubs and the Los Angeles Lakers during off‑season, and approaches fitness with a data‑driven mindset, logging mileage and performance metrics in a custom MATLAB script.
  arts: Michael Baise finds creative release in listening to Bruce Springsteen’s storytelling folk‑rock, admiring the kinetic sculptures of Alexander Calder, and attending local theater productions of contemporary
    playwrights, often quoting favorite lines while explaining engineering concepts to students.
  travel: Michael Baise prefers structured itineraries that blend active adventure with family time, having logged road trips to Yellowstone and the Grand Canyon, a cultural immersion week in Barcelona,
    and now eyeing a spring sailing excursion along the Croatian Dalmatian coast for the next family vacation.
  culinary: Michael Baise enjoys mastering backyard BBQs, frequently seasoning ribs with smoked paprika and rosemary, while also whipping up homemade lasagna layered with béchamel, and they take pride in
    their growing skill with a sous‑vide cooker for perfectly cooked steaks.
  core: Michael Baise is a methodical technologist who channels his love for structure into both meticulous project leadership and weekend grill‑sessions, balancing a disciplined work ethic with a penchant
    for spontaneous dad jokes.
background:
  cultural: Michael comes from a multi‑generational white American family rooted in the suburban communities of Pennsylvania. Raised in a middle‑class environment that emphasized reliability, hard work,
    and community involvement, he celebrates traditional American holidays such as Thanksgiving, Fourth of July, and Christmas with family gatherings and local festivities. His cultural influences foster
    a strong sense of civic responsibility, respect for scheduled routines, and an appreciation for teamwork—values that permeate both his professional life and personal engagements.
attributes:
  skills: '[''Technical drawing (AutoCAD, SolidWorks)'', ''CNC programming and operation'', ''Preventive maintenance and troubleshooting'', ''Quality assurance and compliance audits'', ''Lean Six Sigma
