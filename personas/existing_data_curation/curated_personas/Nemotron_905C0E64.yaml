  hobbies: '[''Adult soccer league'', ''Running club'', ''Woodworking projects'', ''Home automation (IoT) tinkering'', ''Community garden volunteering'', ''Youth STEM workshop mentorship'', ''Family hiking
    and biking trips'', ''Backyard BBQs'']'
  career_goals: Michael aims to advance to a senior technologist role where he can lead large‑scale process‑optimization projects and mentor junior staff. He plans to obtain Lean Six Sigma Black Belt certification
    and become a Certified Manufacturing Technologist (CMfgT) within the next three years. Long‑term, he envisions moving into an engineering management position overseeing a multidisciplinary team or launching
    a consultancy focused on sustainable manufacturing practices, allowing him to leverage his technical expertise while providing stability for his family.
