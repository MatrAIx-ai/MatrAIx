persona_description: A music theorist who specializes in the study of musical composition and theory, particularly the works of Nicolas Gombert and his contemporaries. His research interests include the
  style and techniques of Gombert's music, the influence of Gombert on later composers, and the transmission of Gombert's style across Europe. He is also interested in the political and social context of
  Gombert's service to Charles V's court and the impact of Gombert's music on later composers.
