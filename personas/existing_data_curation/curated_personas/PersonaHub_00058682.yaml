persona_description: A researcher or scientist who specializes in the study of avian influenza viruses, particularly those that have been detected in live bird markets. They are likely to be familiar with
  the detection methods used to identify the virus, such as reverse transcription-polymerase chain reaction (RT-PCR), and have experience with the analysis of viral RNA and other samples. They may also
  have knowledge of the transmission and spread of avian influenza, and be interested in the potential implications of live bird markets as a source of the virus.
