personas:
  professional: Jorge Oterogarcia, a 27‑year‑old customer‑service specialist, they leverage bilingual fluency, CRM expertise in Zendesk and Salesforce, and a keen eye for visual storytelling to resolve
    high‑volume inquiries while channeling their competitive drive into designing art‑infused training modules for a future supervisory role.
  sports: Jorge Oterogarcia, a 27‑year‑old, they follow the New York Knicks and Brooklyn Nets during basketball season, cheer for the New York Yankees in the summer, regularly join the NYC Hiking Collective
    for weekend treks in the Catskills, but they admit to irregular gym visits because work shifts often disrupt their routine.
  arts: Jorge Oterogarcia, a 27‑year‑old urban sketcher and street photographer, they frequent independent spaces like MoMA PS1, the Queens Museum, and the Brooklyn Art Library, draw inspiration from alternative
    Latin acts such as Bomba Estéreo and indie artists like Phoebe Bridgers, and they are currently teaching themselves digital illustration on a Procreate‑enabled iPad.
  travel: Jorge Oterogarcia, a 27‑year‑old, they relish spontaneous, low‑budget escapes, have hiked the Shawangunk Ridge, explored the vibrant street art of Medellín, and dream of a culinary pilgrimage
    to Oaxaca, often booking last‑minute flights to maximize adventure over comfort.
  culinary: Jorge Oterogarcia, a 27‑year‑old home chef, they perfect pupusas stuffed with queso fresco and loroco, fry yuca until golden crisp, experiment with chipotle‑infused sauces, and routinely combine
    plantains, cilantro, and lime in quick stir‑fry dishes for friends.
  core: Jorge Oterogarcia, a 27‑year‑old blend of artistic wanderer and competitive problem‑solver, they thrive on spontaneous creativity yet wrestle with deadlines and occasional night‑time snack binges.
background:
  cultural: Jorge was raised in a Salvadoran household where Spanish was spoken at home and Salvadoran customs were celebrated, such as Día de la Madre and festive gatherings featuring tamales and pupusas.
    His family’s migration story instilled a strong sense of perseverance and community responsibility. While fully integrated into the multicultural fabric of West Hempstead and Greater New York, he preserves
    his roots through bilingual communication, participation in local Latin American cultural events, and by sharing his heritage through food and storytelling. This bicultural experience enriches his worldview,
    informs his empathetic customer approach, and fuels his creative pursuits.
attributes:
  skills: '[''Customer relationship management (CRM) software (Zendesk, Salesforce)'', ''Bilingual communication (Spanish-English)'', ''Active listening'', ''Conflict de‑escalation'', ''Upselling and cross‑selling
    techniques'', ''Data entry and reporting'', ''Basic Excel and data analysis'', ''Problem solving in unstructured environments'', ''Adaptability and flexibility'', ''Cultural competency'']'
  hobbies: '[''Sketching and drawing'', ''Urban street photography'', ''Visiting independent art galleries'', ''Cooking traditional Salvadoran dishes (e.g., pupusas, yuca frita)'', ''Listening to alternative
    Latin and indie music'', ''Reading speculative fiction'', ''Playing strategy board games'', ''Hiking local trails'', ''Attending cultural festivals in NYC'', ''Learning digital illustration'']'
  career_goals: Jorge aims to move from frontline customer service into a supervisory role where he can lead a small, tight‑knit team and design training programs that incorporate creative problem‑solving
    and art‑inspired communication techniques. He is motivated to become a top performer in customer experience metrics, eventually transitioning to a client‑experience strategist position that balances
    structure with the flexibility he values. Parallel to his corporate aspirations, he dreams of launching a weekend pop‑up offering Salvadoran cooking workshops, merging his cultural heritage with his
    entrepreneurial spirit.
