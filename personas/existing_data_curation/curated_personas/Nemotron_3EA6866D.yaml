personas:
  professional: Karl Rodriguez is a budding cartoonist and LEGO architect who channels their curiosity into detailed drawings and intricate brick builds, balancing meticulous planning with spontaneous creativity
    in classroom projects and weekend art workshops.
  sports: Karl Rodriguez dashes across the local park field playing forward for the Little Strikers Youth Soccer Club, idolizes FC Barcelona’s Lionel Messi, and cheers for the Los Angeles Dodgers on game
    nights, treating each practice as a chance to hone their sprinting and teamwork.
  arts: Karl Rodriguez immerses themselves in the worlds of Mo Willems and Stan Lee, sketches characters with bold lines while humming upbeat tunes by BTS, and draws inspiration from the vibrant animation
    of The Lego Movie to fuel their own creations.
  travel: Karl Rodriguez loves spontaneous weekend trips to the lakefront for kite flying, has delighted in a family adventure at Disneyland, and dreams of exploring the Jurassic World attraction in Orlando
    to see real‑life dinosaurs.
  culinary: Karl Rodriguez enjoys munching on cheese pizza with pepperoni circles, slurping spaghetti with meatballs, and sipping strawberry‑banana smoothies, proudly assembling peanut‑butter‑and‑jelly
    sandwiches all by themselves after watching cooking demos on Kids' Kitchen.
  core: Karl Rodriguez blends boundless curiosity with a tidy yet playful spirit, sketching dinosaurs while worrying about missing a soccer goal, and habitually leaves Lego bricks scattered around their
    room.
background:
  cultural: Karl grows up in a middle‑class white family in Evanston, Illinois, a city known for its strong public schools, proximity to Northwestern University, and a lively cultural scene. The community
    emphasizes education, artistic exposure, and community involvement. While embodying Midwestern values of politeness, independence, and a love for nature, Karl also experiences the multicultural influences
    of the Chicago metropolitan area through diverse music, museum visits, and community festivals, giving him a broad yet locally rooted cultural perspective.
