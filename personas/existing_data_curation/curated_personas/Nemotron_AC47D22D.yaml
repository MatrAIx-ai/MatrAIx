  hobbies: '["hiking in the Rocky Mountains", "watercolor and abstract painting", "photography of festivals and nature", "Mexican folk dance (ballet folklórico)", "experimental cooking (Mexican fusion)",
    "reading speculative fiction and fantasy novels", "attending live theater and improv shows", "volunteering as art workshop facilitator", "crafting handmade jewelry", "gardening native herbs"]'
  career_goals: Looking ahead, Nataly aims to move into a senior quality assurance or supervisory role where she can mentor a larger team and shape standard‑operating procedures. She is also driven to merge
    her technical background with her artistic passions by creating interactive training programs and community workshops that demystify scientific concepts through storytelling and visual art. Over the
    next five years she hopes to lead a cross‑functional quality improvement project, and eventually launch a boutique studio offering art‑infused educational kits that celebrate Mexican cultural motifs
    and scientific curiosity.
