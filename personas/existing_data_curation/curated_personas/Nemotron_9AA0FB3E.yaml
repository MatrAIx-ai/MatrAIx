  hobbies: '[''Cooking traditional Mexican cuisine'', ''Gardening'', ''Hiking in the Smoky Mountains'', ''Yoga'', ''Crocheting'', ''Volunteering at church family outreach'', ''Listening to mariachi music'',
    ''Attending cultural festivals'', ''Reading historical fiction'']'
  career_goals: Gianna aims to earn a bachelor's degree in Early Childhood Education within the next two years, move into a lead teacher or center director role at a licensed daycare, and ultimately open
    a bilingual preschool that weaves Mexican cultural heritage into the Tennessee community setting. She also seeks to mentor new childcare workers, develop culturally inclusive curricula, and become an
    advocate for early‑learning policies in Anderson County.
