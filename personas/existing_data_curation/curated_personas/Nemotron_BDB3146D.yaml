personas:
  professional: Estela Oporto, a 24‑year‑old field technician specializing in RF and telecommunications infrastructure, leverages their meticulous schematics reading and diagnostic expertise while applying
    a love of structure to consistently meet project deadlines and mentor junior staff.
  sports: Estela Oporto enjoys kayaking on the Gulf waters during summer, attends weekly yoga sessions for core strength, follows the Tampa Bay Buccaneers and Miami Heat, and occasionally plays recreational
    volleyball at the local community center.
  arts: Estela Oporto finds quiet inspiration in classic acoustic folk music, especially listening to Joan Baez and contemporary singer‑songwriter Hozier, and relishes board‑game evenings that blend strategic
    thinking with social connection.
  travel: Estela Oporto favors meticulously planned short getaways, such as a weekend road trip to the Florida Keys for snorkeling and a spring visit to Asheville’s mountain trails, balancing adventure
    with a predictable schedule.
  culinary: Estela Oporto enjoys cooking simple, fresh seafood dishes like grilled shrimp with garlic, lemon, and oregano, often prepares garden‑grown herb pesto, yet admits to over‑relying on quick microwave
    meals during busy work weeks.
  core: Estela Oporto blends a methodical mind with hands‑on curiosity, juggling RF troubleshooting, amateur radio projects, and a love for structured outdoor pursuits while occasionally succumbing to the
    convenience of fast food during late shifts.
background:
  cultural: Estela is a non-Hispanic White American who grew up in the southeastern United States before relocating to Panama City, Florida. Her cultural upbringing blends Southern coastal traditions such
    as a strong emphasis on family gatherings, community church involvement, and appreciation for Gulf-side cuisine with an awareness of the area's multicultural environment. She values reliability, modesty,
    and community service, and she respects the linguistic and cultural diversity of Bay County, often engaging with neighbors who speak Spanish and participating in local festivals that celebrate the region's
    maritime heritage.
attributes:
  skills: '[''Radio frequency equipment installation'', ''Telecommunications system troubleshooting'', ''Blueprint and schematic interpretation'', ''Spectrum analysis and measurement'', ''Cable splicing
    and termination'', ''Fiber optic basics'', ''Electrical safety compliance (OSHA, FCC)'', ''Technical documentation and reporting'', ''Project scheduling and deadline management'', ''Team mentorship
    and training'']'
  hobbies: '[''Amateur (ham) radio operation'', ''Model radio/electronics kit building'', ''Vegetable and herb gardening'', ''Kayaking on the Gulf'', ''Yoga and Pilates'', ''STEM volunteer tutoring'', ''Board
    game evenings with close friends'', ''Coastal seafood cook-outs'']'
  career_goals: Estela aims to earn advanced certifications such as BICSI Installer Installer, Certified RF Engineer, and an FCC General Radiotelephone Operator License within the next two years. She aspires
    to become a senior field technician and eventually a field operations supervisor, overseeing 5G small-cell deployments in the Gulf Coast region. She also hopes to develop a mentorship program for women
    entering technical trades, blending her passion for teamwork with her desire to contribute to a more inclusive industry. Balancing her professional growth with her family life, Estela seeks a stable
    career path that offers predictable schedules and opportunities for continuous learning.
