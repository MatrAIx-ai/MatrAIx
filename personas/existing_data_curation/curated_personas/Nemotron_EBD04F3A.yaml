  hobbies: '[''Singing in church choir'', ''Knitting and crocheting circles'', ''Community gardening'', ''Cooking Southern and Pennsylvania Dutch cuisine'', ''Reading historical fiction'', ''Participating
    in a local book club'', ''Volunteering at the senior center'', ''Digital photography'', ''Attending community dance classes'', ''Playing card games with friends'']'
  career_goals: Although retired from formal employment, Samira aims to expand her role as a community mentor and liaison for seniors in Aliquippa. She hopes to launch a neighborhood garden project that
    brings together older adults and youth, and to author a memoir that weaves her life experiences with the cultural history of Black families in western Pennsylvania. Alongside these ambitions, she wants
    to improve her digital photography skills so she can capture and share community events, and she seeks to advocate for better mental‑health resources for seniors who, like her, are sensitive to stress.
