persona_description: A researcher and inventor in the food processing industry who specializes in the development of intelligent cutting and deboning systems for the poultry industry. He is currently working
  on the Intelligent Cutting and Deboning System, a robot that can automate the entire chicken deboning process, using a 3D vision system to adapt to the individual bird's unique size and shape, and a forced-feedback
  system to detect and avoid hard resistances such as bones and tendons during the cutting process. He is funded by the state of Georgia through the Agricultural Technology Research Program to further develop
  and test the robot.
