  hobbies: '[''Bass Fishing'', ''Vegetable Gardening'', ''Woodworking'', ''Classic Car Restoration'', ''Historical Biography Reading'', ''Genealogy Research'', ''Church Small‑Group Study'', ''Community
    Festival Volunteering'']'
  career_goals: Kenneth aims to advance to a regional sales operations manager role within the next five years, where he can apply his process‑driven expertise across multiple sites. He plans to earn the
    Certified Professional Sales Leader (CPSL) credential and to design a formal mentorship program that reduces turnover on his team. While he values stability, he also wants to ensure a smooth transition
    to retirement by building a succession pipeline and securing a modest pension. Ultimately, he hopes to leave a legacy of reliable, high‑performing teams and perhaps one day open a small hardware‑store
    franchise in Pleasant Hill.
