persona_description: A scientist who studies the evolution of plant tolerance and the impact of insect herbivores on their hosts, focusing on the Solidago system. This scientist is interested in understanding
  the evolutionary history of novel herbivore-host associations and the mechanisms behind host shifts between alternative native hosts. They are particularly interested in the impact of gallmaking on the
  allocation of tissues in galled ramets and the ability of the herbivore to tolerate its novel host.
