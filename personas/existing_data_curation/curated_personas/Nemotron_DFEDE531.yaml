  career_goals: Gary’s primary goal is to secure a stable, full‑time position in logistics, warehousing, or a related field where he can benefit from a predictable schedule and clear expectations. Over
    the next two years he plans to obtain a commercial driver’s license (CDL) and a supply‑chain management certificate from a community college to broaden his qualifications. He aspires to advance into
    a supervisory role, leading a team of warehouse staff or drivers, and eventually launch his own small moving or landscaping business that serves his local community. Continuous personal development
    through online leadership and bookkeeping courses is also part of his long‑term ambition.
