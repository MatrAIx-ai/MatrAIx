persona_description: A dedicated education professional who is passionate about the preservation and promotion of Indigenous cultures and histories. This individual has extensive experience in working with
  First Nations, Métis, and Inuit communities and has a deep understanding of the legacy of the residential school system, treaties, legislation, and policies that impact these communities. They have collaborated
  with a diverse range of stakeholders, including teachers, Elders, Knowledge Keepers, Senators, community representatives, and residential school survivors, to ensure that the revised courses accurately
  reflect the perspectives and worldviews of these communities.
