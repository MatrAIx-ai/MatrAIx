personas:
  professional: Jared Barker, a full-stack software developer with a knack for blending clean code and striking UI design, builds responsive React and Vue front-ends and robust Node.js back-ends while injecting
    artistic sensibilities into interactive visualizations, and aims to ascend to a senior engineering role within three years, leading AR/VR projects and fostering psychologically safe teams, all while
    managing a propensity for worry through structured agile workflows.
  sports: Jared Barker, an avid hiker and trail runner, follows the Seattle Seahawks and Seattle Sounders FC, trains with the Washington Trails Association's weekend hikes, and hits the local Earth Treks
    climbing gym during winter while eagerly awaiting ski trips to Mt. Baker.
  arts: Jared Barker, a watercolor painter and acoustic-guitar composer, finds inspiration in the surrealist works of Yayoi Kusama, the digital installations of Beeple, and the folk-rock melodies of Sufjan
    Stevens and The Shins, regularly attending gallery openings at the Frye Art Museum and local open-mic nights.
  travel: Jared Barker, a 25-year-old explorer who blends meticulous itinerary planning with spur-of-the-moment detours, favors weekend escapes to the Olympic Peninsula, dreams of hiking Iceland's Laugavegur
    trail, and already visited Kyoto’s temples, Seattle’s coffee culture, and hopes to road-trip down California’s Pacific Coast Highway next summer.
  culinary: Jared Barker, an intermediate home chef, enjoys mastering miso-glazed black cod, crafting spinach-ricotta gnocchi with sage butter, and rolling avocado-lime sushi, often sourcing fresh herbs
    and Pacific salmon from Seattle’s Pike Place Market while experimenting with spice blends inspired by Thai street food.
  core: Jared Barker transforms code into interactive art while juggling persistent worry and a habit of forgetting to water houseplants.
background:
  cultural: Jared comes from a White, European‑American background, with familial roots tracing back to English and German ancestry. Raised in the suburbs of the Seattle metropolitan area, he was shaped
    by the Pacific Northwest's cultural emphasis on environmental stewardship, technology innovation, and a vibrant independent arts scene. This regional mix of outdoorsmanship and tech‑centric lifestyle
    fostered his love for both nature and software development. His upbringing reinforced values of self‑reliance, community involvement, and a balanced appreciation for both pragmatic work ethic and creative
    pursuits, aligning with his current identity as a married professional navigating career growth and personal well‑being.
attributes:
  skills: '["Python", "JavaScript", "TypeScript", "React", "Vue", "Node.js", "Express", "SQL", "PostgreSQL", "AWS", "Docker", "Git", "CI/CD", "Agile Scrum", "UI/UX Design", "TensorFlow", "PyTorch"]'
  hobbies: '["Watercolor painting", "Digital illustration", "Acoustic guitar", "Hiking", "Science‑fiction reading", "Board‑game nights", "Cooking experimental dishes", "Exploring VR art installations"]'
  career_goals: Jared aims to advance to a senior engineering role within the next three years, focusing on projects that fuse technology with artistic experiences, such as immersive AR/VR applications.
    He aspires to become a tech lead who mentors junior developers, championing a collaborative and psychologically safe environment. Long‑term, he envisions founding a startup that creates interactive
    digital art platforms, leveraging his software expertise and deep appreciation for creative expression. Alongside career growth, he prioritizes work‑life balance to manage his propensity for worry and
    stress, seeking roles that support flexible schedules and mental‑health resources.
