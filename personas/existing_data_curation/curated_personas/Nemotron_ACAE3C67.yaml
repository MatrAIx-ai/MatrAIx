  hobbies: '[''Hiking'', ''Kayaking on Puget Sound'', ''Community theater (acting and directing)'', ''Book club (contemporary fiction and non-fiction)'', ''Vegetable gardening'', ''Farm-to-table cooking'',
    ''STEM outreach mentorship'', ''Yoga'', ''Sketching'', ''Reflective journaling'']'
  career_goals: Roseanne’s next career milestone is to step into a leadership role where she can shape systemic career‑development services for the region. She aims to become the Director of Career Services
    at a community college or a public‑agency program, overseeing the design and rollout of a comprehensive STEM pipeline that links secondary schools, post‑secondary institutions, and local employers.
    She also plans to launch her own consultancy that offers data‑driven career‑planning workshops and coach emerging counselors. Publishing a practical guidebook on navigating mid‑career transitions into
    STEM fields and establishing a statewide mentorship network for underrepresented students are long‑term ambitions. By leveraging her organizational strengths and public‑speaking flair, Roseanne envisions
    influencing policy, securing sustainable funding, and expanding access to high‑quality career guidance across Thurston County and beyond.
