personas:
  professional: Kevin Leite, a 3‑year‑old budding junior scientist, channels a relentless curiosity and love for new ideas into daily sandbox experiments, shows early problem‑solving skills by building
    precarious towers of blocks, yet they often resist the structure of adult‑set routines, making the occasional tantrum when deadlines for tidy‑up time loom.
  sports: Kevin Leite, an energetic 3‑year‑old, dabbles in toddler soccer at the Little Tigers club during spring, cheers enthusiastically for the local Major League Baseball team the Springfield Sluggers,
    and uses backyard sprints as a spontaneous fitness routine, though they dislike rigid practice schedules and prefer free‑play tag with neighborhood friends.
  arts: Kevin Leite, an imaginative 3‑year‑old, spends afternoons finger‑painting to the tunes of Sesame Street and dancing to the rhythm of Raffi’s 'Baby Beluga', often critiquing the colors on the canvas
    with a surprisingly skeptical eye, and delights in re‑playing scenes from the animated film 'Moana' while secretly aspiring to draw their own heroic characters.
  travel: Kevin Leite, a curious 3‑year‑old, loves short family road trips to the nearby lake where they splash in shallow waters, has visited the bustling zoo in downtown Metro City, dreams of a future
    adventure to Disneyland in California, and prefers spontaneous picnics over meticulously planned vacations, even if that means a sudden detour for an ice‑cream stop.
  culinary: Kevin Leite, a 3‑year‑old with a selective palate, devours cheesy mac and cheese and crispy chicken nuggets, but fiercely rejects broccoli, delights in strawberry‑yogurt parfaits with granola,
    often insists on sprinkling a dash of cinnamon on pancakes, and occasionally gobbles down a whole banana in a single bite, showcasing a whimsical yet stubborn approach to meals.
  core: Kevin Leite is a fiercely curious 3‑year‑old whose love for exploration, spontaneous play, and critical eye adds a unique, sometimes competitive spark to every sandbox experiment and snack time.
background:
  cultural: Kevin was born and raised in Mannford, Oklahoma, a small community in Pawnee County. His family’s cultural life reflects typical Mid‑Midwestern values such as friendliness, respect for family,
    and a strong connection to the outdoors. Local traditions—county fairs, community picnics, church gatherings, and an appreciation for American folk art—shape his exposure to music, storytelling, and
    simple crafts. As a white child in this setting, Kevin experiences a cultural environment that emphasizes modesty, community participation, and a love for nature and regional artistic expression.
