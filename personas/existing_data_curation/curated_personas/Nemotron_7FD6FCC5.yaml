  career_goals: At this age Kevin expresses his ambitions through imaginative play. He frequently pretends to be a firefighter, an astronaut, or an artist, indicating a budding desire to combine creative
    expression with hands‑on action and helping others. These pretend roles hint at future interests in fields that reward creativity, exploration, and a sense of adventure.
