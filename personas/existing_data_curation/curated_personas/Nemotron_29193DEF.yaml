  hobbies: '["Painting and mixed-media art", "Creative writing and storytelling", "Gardening", "Yoga and mindfulness meditation", "Hiking in the Blue Ridge foothills", "Attending live music and theater
    in Greer", "Cooking Southern comfort cuisine", "Reading contemporary fiction", "Book club participation", "Volunteering at the community library", "Experimenting with new educational technology gadgets",
    "Developing illustrated children''s books"]'
  career_goals: Anita aims to expand her impact beyond her classroom by becoming a district-wide early‑childhood STEM curriculum coordinator. She plans to earn a master's in educational leadership within
    the next two years, positioning herself for an administrative role where she can champion innovative, arts‑integrated STEM programs for all kindergarteners in Greenville County. She also dreams of publishing
    a series of illustrated children's books that fuse science concepts with imaginative narratives, and to secure grants for a community makerspace that offers after‑school STEM workshops for underserved
    families.
