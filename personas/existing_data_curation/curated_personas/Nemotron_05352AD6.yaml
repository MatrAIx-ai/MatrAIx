  career_goals: She aspires to advance to a regional director role overseeing multiple childcare centers, influencing policy on inclusive early education, and developing culturally responsive curricula
    that reflect the diverse families in Orange County. In the next five years, she plans to pursue a master’s degree in educational leadership, earn certification in early childhood special needs, and
    launch a consultancy that helps schools implement flexible, evidence‑based programs while maintaining fiscal responsibility. She also hopes to mentor emerging administrators and champion professional
    development that emphasizes work–life balance.
