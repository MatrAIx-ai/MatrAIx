personas:
  professional: An experienced early‑childhood administrator, Lien Kim leverages two decades of strategic program planning, data‑driven curriculum design, and multilingual communication to modernize community
    centers, and they blend their curiosity for evidence‑based practices with a relaxed, flexible approach that tolerates occasional disorganization.
  sports: A dedicated yoga and light‑hiking enthusiast, Lien Kim attends weekly Vinyasa classes at a downtown studio, hikes the Laguna Coast Wilderness Park each spring, and they cheer for the Los Angeles
    Dodgers and the Anaheim Ducks while occasionally forgetting to hydrate on long treks.
  arts: An avid reader and calligrapher, Lien Kim devotes evenings to practicing Hangul and Vietnamese brushwork while devouring contemporary novels by Ocean Vuong and Haruki Murakami, and they regularly
    attend Los Angeles Philharmonic concerts and intimate folk shows featuring Sufjan Stevens, even if they sometimes skip a gallery opening due to a busy schedule.
  travel: A contemplative traveler, Lien Kim prefers short, self‑planned retreats such as weekend hikes in Big Bear, meditation workshops in Sedona, and occasional cultural immersion trips to Jeju Island
    and Kyoto, and they balance limited vacation time with a desire for low‑key discovery, though they occasionally overpack for spontaneous day trips.
  culinary: An experimental home chef, Lien Kim blends Korean‑Vietnamese flavors to craft kimchi‑infused pho, gochujang‑marinated pork banh mi tacos, and herb‑rich spring rolls, and they draw fresh mint,
    cilantro, and lemongrass from their herb garden while occasionally burning the edge of a stir‑fry when juggling a conference call.
  core: Lien Kim balances relentless curiosity with a practical, easy‑going mindset, they thrive on solitary, flexible pursuits while gently battling a habit of missed deadlines and a deep‑seated passion
    for nurturing inclusive early‑education communities.
background:
  cultural: Lien comes from a mixed Korean‑Vietnamese heritage. Raised in a bicultural household that emphasized respect for elders, academic excellence, and community service, she celebrates lunar new
    year, Chuseok, and Tết with family gatherings and traditional foods. Fluent in English, Korean, and conversational Vietnamese, she bridges cultural perspectives in her work, incorporating Asian educational
    values such as collective responsibility and harmony into her programs. Living in Irvine’s vibrant Asian community, she remains connected to cultural associations and uses her background to foster inclusive
    environments for children and families of diverse backgrounds.
