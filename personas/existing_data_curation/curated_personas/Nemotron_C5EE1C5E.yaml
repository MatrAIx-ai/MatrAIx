personas:
  professional: Kristina Soto, a retired home manager turned community senior liaison, leverages their meticulous budgeting, gardening, and caregiving expertise to coordinate volunteer activities, organize
    craft sessions, and mentor fellow seniors at the local senior center, while they maintain a structured, compassionate approach.
  sports: Kristina Soto enjoys low-impact fitness, walking the shaded trails of Gordon County Park each morning, playing weekly shuffleboard at the senior center, and they cheer on the Atlanta Braves while
    occasionally joining a gentle water‑aerobics class.
  arts: Kristina Soto weaves cultural thread into their life through quilting intricate blankets, knitting scarves to match their favorite ranchera melodies by Vicente Fernández, and they solve the daily
    New Yorker crossword, and they read classics such as Pride and Prejudice and Don Quixote.
  travel: Kristina Soto prefers thoughtfully planned trips, having revisited the ancestral village where their family once lived, explored the historic streets of Savannah, Georgia, and they dream of attending
    a celebrated culinary festival abroad, all while traveling during off‑peak seasons to manage costs.
  culinary: Kristina Soto delights in preparing tamales with masa harina, slow‑cooked pozole seasoned with dried chilies, and fresh‑baked bolillo rolls, and they skillfully substitute local herbs like cilantro
    and epazote to preserve authentic flavors while sharing these dishes at family gatherings.
  core: Kristina Soto is a detail‑oriented, garden‑loving, cookbook‑clutching septuagenarian who channels their worries into the steady rhythm of knitting and cooking, yet they secretly hoard extra packets
    of corn masa for late‑night cravings.
background:
  cultural: Kristina was born to Mexican immigrant parents who settled in the rural South. She grew up bilingual, speaking Spanish at home while attending school in English. Her upbringing blended Mexican
    customs—such as celebrating Día de los Muertos, preparing tamales, and observing Catholic traditions—with Southern hospitality and community values. Living in Calhoun, Georgia, she maintains strong
    ties to the local Mexican‑American community, often sharing recipes and cultural stories during neighborhood festivals. Her faith, rooted in Catholicism, informs her compassionate outlook and participation
    in church activities. Kristina’s cultural identity is a mosaic of Mexican heritage, family devotion, and the modest, close‑knit spirit of Gordon County.
