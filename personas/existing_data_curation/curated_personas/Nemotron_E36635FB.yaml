  career_goals: Gildardo aims to open his own boutique barbershop that serves as both a grooming destination and a community hub in the Los Angeles area. He envisions a space where he can host cultural
    events, offer free haircuts to underserved seniors, and run an apprenticeship program for aspiring barbers from his neighborhood. To stay ahead, he plans to earn advanced certification in hair coloring
    and trichology, develop a small line of natural grooming products reflecting his Mexican heritage, and integrate a robust digital booking platform to streamline operations while preserving the personal
    touch his clients value.
