  hobbies: '[''vegetable gardening'', ''knitting'', ''quilting'', ''church choir singing'', ''reading historical fiction'', ''bingo'', ''potluck gatherings'', ''birdwatching'', ''walking trails'', ''listening
    to classic radio dramas'']'
  career_goals: Although retired, Tracy aims to remain an active contributor to her community by leading a weekly craft circle at the senior center and mentoring younger volunteers. She hopes to complete
    a memoir capturing the history of her family and the local farming community, and to learn more about digital storytelling to share it online. Maintaining her health and independence, she also aspires
    to travel to see her grandchildren across the country and to attend annual family reunions in Italy.
