personas:
  professional: Tracy Civitello, a retired home‑economics teacher who now spearheads a weekly senior craft circle, blends their meticulous budgeting and garden‑to‑table expertise with a spontaneous, energetic
    flair that keeps the group organized yet lively, even though they sometimes forget deadlines for supply orders.
  sports: Tracy Civitello walks daily with the Riverside Senior Walking Club, cheers on the River Rapids minor‑league baseball team and the Valley State Mountaineers college basketball squad, and they occasionally
    join the community center’s senior pickleball league for a playful cardio boost.
  arts: Tracy Civitello sings in their church choir performing Handel hymns and contemporary gospel, enjoys classic radio dramas like The Shadow, reads historical romances by Georgette Heyer, and delights
    in the paintings of Claude Monet and the swing‑era sounds of Ella Fitzgerald as they knit scarves.
  travel: Tracy Civitello plans trips with a blend of careful budgeting and spontaneous outreach, having visited grandchildren in Seattle and New York City, dreaming of touring Tuscany’s countryside in
    Italy for the family reunion, and they cherish short weekend drives to the nearby state park for nature walks.
  culinary: Tracy Civitello cooks garden‑fresh meals, turning sun‑ripened tomatoes into rustic bruschetta, simmering beans into smoky chili, layering squash in a creamy gratin, and perfecting a Sunday roast
    with rosemary, garlic, and olive oil, while they also bake sourdough bread for community potlucks.
  core: Tracy Civitello, an 83‑year‑old garden‑loving, choir‑singing craft enthusiast, balances meticulous budgeting with spontaneous community spirit, never missing an opportunity to share their harvest,
    stories, and knitted warmth, even if they occasionally forget a deadline or misplace their glasses.
background:
  cultural: Tracy is a third‑generation Italian‑American raised in the Midwestern town of Marengo, Illinois. Her family’s heritage is reflected in traditional Italian holiday meals, Catholic faith, and
    a strong emphasis on family and community. Growing up on a small farm, she internalized Midwestern values of hard work, neighborliness, and self‑reliance. These cultural roots shape her culinary tastes,
    love of gardening, and dedication to volunteering at the local church and senior center.
