personas:
  professional: Karon Chambers, a seasoned residential and light‑commercial interior finishing specialist, blends meticulous surface preparation, low‑VOC paint expertise, and precise faux‑finish artistry
    with a structured project management style, while her natural sociability makes her the clear point‑person on job sites, easily rallying crews and delighting clients with collaborative design consultations.
  sports: Karon Chambers fuels her love of the outdoors by hiking the Illinois River Valley trails with the River Valley Explorers club, joins a seasonal community softball league (the Mahomet Lady Skippers),
    and roots for Chicago sports teams—including the Cubs, Bears, and Bulls—while occasionally catching a University of Illinois Fighting Illini football game with friends.
  arts: Karon Chambers, an avid book‑club facilitator, finds artistic inspiration in folk storyteller John Prine, the vibrant murals of the Urbana ArtSpace, and the tactile charm of vintage furniture restoration,
    often integrating decorative faux finishes inspired by classic American regional painters into her own home décor projects.
  travel: Karon Chambers favors purposeful road trips that blend scenic drives through the Illinois River Valley with stops at local farm markets, relishes weekend getaways to Chicago’s lakefront and the
    Amish country in Lancaster County, and dreams of a summer pilgrimage to New Orleans for Mardi Gras after saving enough through her disciplined budgeting.
  culinary: Karon Chambers delights in baking artisan sourdough and rye breads infused with rosemary, honey, and locally sourced whole‑grain flours, complements her meals with farm‑fresh vegetables and
    seasonal apple crisp, yet sometimes overindulges in buttery biscuits when hosting neighborhood potlucks.
  core: Karon Chambers is a pragmatic, community‑driven finishing contractor whose structured work ethic, relentless optimism, talkative charm, and occasional penchant for over‑committing to projects shape
    a resilient, hands‑on approach to life.
background:
  cultural: Karon grew up in a Midwestern white family with deep roots in central Illinois farming communities. Her grandparents were of German and Irish descent, and she was raised with values of modesty,
    hard work, and neighborly generosity typical of the region. The culture emphasizes practical problem‑solving, reliability, and a strong sense of community, which is reflected in her preference for structure,
    her collaborative nature, and her active involvement in Mahomet’s local events and churches.
attributes:
  skills: '[''surface preparation'', ''drywall finishing'', ''interior painting'', ''spray painting'', ''wallpaper hanging'', ''color consulting'', ''low‑VOC paint application'', ''project estimation'',
