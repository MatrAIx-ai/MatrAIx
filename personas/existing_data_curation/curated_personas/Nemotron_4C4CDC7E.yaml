  hobbies: '[''volunteering at church'', ''leading a book club'', ''hosting potluck dinners'', ''gardening'', ''vintage furniture restoration'', ''DIY home décor'', ''hiking'', ''baking'', ''attending local
    festivals'']'
  career_goals: Karon aims to expand her freelance painting and paperhanging business into a full‑service finishing contractor serving the central Illinois region. She plans to earn a professional certification
    from the National Association of the Painting Professionals, specialize in decorative faux finishes, and become a go‑to resource for sustainable, low‑VOC interior solutions. Over the next five years
    she hopes to hire and mentor two apprentices, build a reputation for reliability and high‑quality work, and eventually open a small storefront studio where she can showcase custom finishes and host
    community workshops.
