  hobbies: '[''Beach Volleyball'', ''Surfing'', ''Hiking'', ''Yoga'', ''Live Music Festivals'', ''Improv Comedy'', ''Karaoke'', ''Cooking'', ''Photography'', ''Animal Shelter Volunteering'', ''Reading Contemporary
    Fiction'', ''Instagram Content Creation'']'
  career_goals: Leah aims to turn her sociable, people‑centric strengths into a career in community outreach or marketing communications. She plans to complete a bachelor’s degree in Communications or Marketing
    while building a portfolio of event‑planning and social‑media projects. In the short term she seeks an entry‑level role as a public‑relations assistant or community‑program coordinator with a local
    nonprofit or tourism board, where she can blend her love for the coastal community with sustainable event practices. Long‑term, she dreams of leading a communications team or launching her own boutique
    event‑planning business focused on eco‑friendly, community‑driven experiences.
