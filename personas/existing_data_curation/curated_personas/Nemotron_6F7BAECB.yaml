personas:
  professional: Leah Small, a 22‑year‑old aspiring community‑outreach coordinator, blends her natural flair for energizing crowds with a knack for quick problem‑solving, turning spontaneous event ideas
    into polished social‑media campaigns while still wrestling with occasional deadline slip‑ups.
  sports: Leah Small rides the waves at Santa Barbara’s Surfer’s Point, captains a beach‑volleyball squad that meets every Thursday, and stretches through sunrise yoga sessions, while cheering on the Los
    Angeles Lakers and following the local surf club’s competition schedule.
  arts: Leah Small thrives at live‑music festivals headlined by Tame Impala and indie‑folk bands, sharpens her improv skills at a local comedy workshop, regularly belts out karaoke classics like ‘Living
    on a Prayer,’ and curates sunrise photography that captures the golden hues of the Pacific coastline.
  travel: Leah Small plans spontaneous weekend getaways to the Santa Ynez trails, dreams of surfing in Bali’s Kuta Beach, and enjoys carefully curated road trips along the Pacific Coast Highway, balancing
    a love for adventure with a modest travel budget.
  culinary: Leah Small experiments with plant‑based cooking, mastering dishes like spicy jackfruit tacos, creamy avocado‑lime quinoa bowls, and turmeric‑infused roasted cauliflower, while proudly showcasing
    her creations on Instagram alongside fresh basil and cashew cheese.
  core: Leah Small is a vivacious, beach‑loving communicator who juggles eco‑friendly dreams, impulsive surf sessions, and a relentless drive to turn social buzz into meaningful community impact—often forgetting
    where she left her keys.
background:
  cultural: Leah was raised in a middle‑class white family with European (German/Irish) roots in coastal Southern California. Growing up near Goleta and the University of California, Santa Barbara, she
    absorbed a blend of laid‑back beach culture and the progressive, academically‑driven atmosphere of the area. Family traditions centre on classic American holidays—Thanksgiving, Christmas, and Fourth
    of July barbecues—combined with an emphasis on education, community involvement, and environmental stewardship. The multicultural tourism and university environment fostered an appreciation for diversity,
    while her upbringing encouraged independence, social engagement, and a practical yet flexible outlook on life.
attributes:
  skills: '[''Interpersonal Communication'', ''Event Planning'', ''Social Media Management'', ''Basic Graphic Design'', ''Microsoft Office Suite'', ''Google Workspace'', ''Customer Service'', ''Public Speaking'',
