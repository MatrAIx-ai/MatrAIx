personas:
  professional: Michael Perdue is a veteran truck driver turned logistics strategist who leverages decades of route optimization, vehicle maintenance, and safety compliance expertise to mentor younger drivers
    and consult on fleet efficiency, balancing curiosity for emerging GPS technology with a steadfast respect for proven industry practices.
  sports: Michael Perdue is a loyal fan of the Atlanta Falcons and Atlanta Braves, cheers on the Greenville Swamp Rabbits ECHL team, and regularly joins the Greenville Senior Walking Club for low‑impact
    exercise on weekend mornings, while occasionally participating in local fishing tournaments that satisfy their competitive spirit.
  arts: Michael Perdue finds solace in classic‑rock legends like The Rolling Stones, Led Zeppelin, and Creedence Clearwater Revival, often pairing their vinyl records with evenings spent reading biographies
    of Winston Churchill and Abraham Lincoln, and they support local cultural life by attending performances at the Upward Stairs Playhouse and visiting heritage museums that celebrate regional history.
  travel: Michael Perdue prefers meticulously planned road trips, using mapping software to chart scenic drives along the Blue Ridge Parkway and historic routes to Charleston, Savannah, and Gettysburg,
    staying at charming bed‑and‑breakfasts while balancing travel aspirations with a modest budget and familial responsibilities.
  culinary: Michael Perdue enjoys cooking hearty fare such as fried catfish with cornmeal crust, collard greens seasoned with smoked ham hocks, and fresh garden tomato salsa, often incorporating home‑grown
    zucchini and sweet potatoes into stir‑fries, and they relish pairing meals with a cold glass of sweet tea.
  core: Michael Perdue blends a methodical, worry‑prone mindset with a love for classic rock, fishing, and woodworking, channeling curiosity into meticulous route‑planning while quietly fretting over safety
    and financial security for future generations.
background:
  cultural: Michael grew up in a working‑class family in the Upstate of South Carolina, where Southern hospitality, church community, and a strong sense of self‑reliance shaped his values. He attended a
    local public high school in Greenville before taking some courses at a community college, focusing on business and automotive studies. The region’s emphasis on personal responsibility, respect for tradition,
    and close‑knit neighborhood ties remain central to his identity, even as he embraces modern logistics tools. His widowed status and lifelong ties to the community foster a deep commitment to helping
    neighbors, especially seniors, and preserving the cultural heritage of the area.
attributes:
  skills: '[''Route Planning and Optimization'', ''Long-Haul Truck Driving'', ''Vehicle Maintenance and Basic Repairs'', ''Safety Regulations Compliance'', ''Customer Service and Sales'', ''Time Management'',
