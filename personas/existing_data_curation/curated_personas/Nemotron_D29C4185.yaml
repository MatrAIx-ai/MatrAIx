  hobbies: '[''Fishing on Lake Hartwell'', ''Woodworking and furniture crafting'', ''Gardening vegetables'', ''Reading historical biographies'', ''Exploring local heritage sites'', ''Attending church services'',
    ''Volunteering at the senior center'', ''Listening to classic rock and blues music'', ''Learning GPS and mapping software'']'
  career_goals: Looking ahead, Michael aims to transition from full‑time driving to a part‑time safety trainer and consultant for local trucking firms, leveraging his organized approach to improve fleet
    safety and efficiency. He hopes to launch a modest owner‑operator venture that can provide reliable deliveries for small businesses in Greenville County, while also setting aside time to volunteer as
    a driver for community programs that serve seniors and veterans. Financial security for his grandchildren and creating a small scholarship in his late wife’s memory are also central to his long‑term
    goals.
