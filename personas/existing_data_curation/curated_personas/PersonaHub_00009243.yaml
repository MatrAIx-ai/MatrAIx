persona_description: A historian who specializes in the study of African American and Southern history, particularly focusing on the journey to literacy and full equality during the Civil War. This historian
  is likely to have a deep understanding of the complex and troubling topic of black education and is interested in uncovering new evidence and perspectives that challenge traditional interpretations of
  the past. They are likely to have a keen interest in border crossing and the ways in which education and society interacted during this period. They are also likely to be knowledgeable about the history
  of education in the United States and have a strong interest in understanding how it has evolved over time.
