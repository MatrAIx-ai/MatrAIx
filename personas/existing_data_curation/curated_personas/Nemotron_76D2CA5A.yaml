personas:
  professional: Chester Burton is a seasoned automotive parts specialist who leverages his associate’s degree in Business Administration, a calm empathetic communication style, and a creative flair for
    merchandising displays to drive sales while aiming to become a senior parts manager within three years.
  sports: Chester Burton follows the Houston Astros and Houston Rockets avidly, participates in the Galveston Anglers Association for weekend fishing trips, hikes the Galveston shoreline in early spring,
    and occasionally joins a local semi‑professional climbing gym during the winter months.
  arts: Chester Burton paints oil landscapes of the Texas coast inspired by exhibits at the Art League of Houston, admires the work of local realist painter James J. Whitley, and finds balance in listening
    to Willie Nelson’s country ballads while curating his own modest collection of vintage automotive posters.
  travel: Chester Burton prefers meticulously planned road trips, having explored the San Antonio River Walk, the Carlsbad Caverns in New Mexico, a weekend getaway to Napa Valley’s vineyards, and a cultural
    immersion tour of Kyoto, Japan, while dreaming of a future visit to the Monterey Classic Car Museum.
  culinary: Chester Burton experiments with Tex‑Mex cuisine at home, frequently cooking shrimp tacos with chipotle adobo, spicy chili con carne with fresh cilantro, and honey‑glazed pork tenderloin, showcasing
    a moderate cooking skill level but often over‑seasoning dishes in his zeal for bold flavors.
  core: Chester Burton blends meticulous parts‑selling precision with a solitary love for oil‑painted coastlines, yet they sometimes forget to water their garden while obsessively polishing model car kits
    and over‑salting their Tex‑Mex creations.
background:
  cultural: Chester grew up in a middle‑class Anglo‑American family in suburban Houston, absorbing the blend of Southern hospitality and the diverse cultural fabric of Texas. His upbringing emphasized community
    involvement, respect for tradition, and a strong work ethic, while also exposing him to the region's rich multicultural influences, from Mexican cuisine to the vibrant arts scene in nearby Houston.
    This background nurtured his appreciation for both the straightforward, pragmatic values of his Southern roots and the openness to new ideas and artistic expression that defines his current lifestyle.
attributes:
  skills: '[''Automotive parts knowledge'', ''Customer service'', ''Inventory management'', ''Sales negotiation'', ''CRM and ERP software proficiency'', ''Technical troubleshooting'', ''Visual merchandising'',
