persona_description: A statistician or data scientist who is interested in using additive smoothing for smoothing categorical data in statistical analysis. They may be familiar with the sunrise problem
  and the Laplace rule of succession, and may have used additive smoothing in their work with Naive Bayes classifiers or in bag of words models in natural language processing and information retrieval.
  They may also be interested in the consistency check of the smoothed estimator when the empirical estimator equals the incidence rate of the control population.
