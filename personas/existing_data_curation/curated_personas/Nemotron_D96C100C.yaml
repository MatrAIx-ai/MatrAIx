personas:
  professional: Stephanie Trudeau, a 39‑year‑old biochemist turned data analyst, leverages Python, R, and GIS to build machine‑learning pipelines for environmental health data while using Agile tools to
    keep projects structured yet flexible, and channels a calm, collaborative demeanor into mentoring junior scientists and crafting grant‑winning technical documents for local non‑profits.
  sports: Stephanie Trudeau frequently hikes the Ozark Trail, joins the Jackson County Trail Runners club for weekend runs, enjoys birdwatching at Big Creek Conservation Area, plays casual pickleball at
    the community center, and cheers for the St. Louis Cardinals and the Kansas City Chiefs during the baseball and football seasons.
  arts: Stephanie Trudeau spends evenings immersed in historical fiction by Ken Follett, biographies of pioneering scientists like Rosalind Franklin, listens to folk singer Gillian Welch while cooking,
    and attends Missouri Repertory Theatre productions, finding creative resonance that informs both their garden designs and data visualizations.
  travel: Stephanie Trudeau prefers self‑planned road trips that combine nature hikes with stargazing, having explored Yellowstone, the Great Smoky Mountains, and a recent culinary weekend in Asheville’s
    Blue Ridge Parkway, while dreaming of a future expedition to the Atacama Desert for its crystal‑clear night skies.
  culinary: Stephanie Trudeau crafts farm‑to‑table meals featuring roasted beet and carrot salad with goat cheese, herb‑crusted grilled trout seasoned with smoked paprika and fresh basil from their garden,
    and homemade sourdough bread, often pairing dishes with locally sourced Missouri wines.
  core: Stephanie Trudeau is a calm, analytically rigorous biochemist who balances structured data work with spontaneous garden experiments, disciplined budgeting with occasional seed‑shop splurges, and
    a nurturing community spirit with a love for quiet solitude.
background:
  cultural: Stephanie is a white Midwesterner of French‑Canadian descent, reflected in her surname Trudeau. Raised in suburban Lees Summit, Missouri, she grew up in a community that values modesty, self‑reliance,
    and civic engagement—hallmarks of Midwestern culture. Her family maintained a blend of Catholic traditions and secular values, emphasizing education, public service, and cultural heritage. She regularly
    participates in local customs such as county fairs, farmers‑market gatherings, and community volunteer initiatives. This upbringing fostered a practical, down‑to‑earth outlook combined with a curiosity
    for scientific inquiry, shaping her collaborative, harmony‑focused personality and her dedication to community‑oriented STEM outreach.
attributes:
  skills: '["Python data analysis (pandas, NumPy)", "R statistical modeling", "Machine‑learning pipeline development", "PCR and spectrophotometry techniques", "Technical writing and scientific communication",
    "Project management (Agile, Gantt charts)", "Problem solving and code debugging", "GIS spatial data mapping", "Excel macro automation", "Conflict mediation and workshop facilitation", "Mentorship and
    tutoring"]'
  hobbies: '["Gardening (native plants, vegetable garden)", "Birdwatching at local preserves", "Hiking the Ozark Trail", "Reading historical fiction and science biographies", "Crossword and Sudoku puzzles",
    "Jigsaw puzzle assembly", "Yoga and mindfulness meditation", "Volunteering at community library STEM events", "Amateur astronomy (telescope observations)", "Cooking and hosting dinner gatherings"]'
  career_goals: Stephanie aims to re‑enter the STEM workforce on a flexible, part‑time basis, targeting roles such as data analyst or technical consultant for local non‑profits focused on environmental
    health and community resilience. She plans to obtain a professional certification in technical writing within the next year to enhance her credibility as a freelance scientific communicator. Long‑term,
    she envisions launching a community‑based STEM mentorship program for high‑school girls in Jackson County, leveraging her expertise to bridge the gap between academic research and everyday life. Ultimately,
    she seeks a career path that balances structured, impactful work with the flexibility to pursue personal interests and maintain her calm, resilient lifestyle.
