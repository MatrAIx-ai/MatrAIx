  career_goals: Inspired by her love of art and orderly spaces, Ana Nicole dreams of becoming an architect who designs quiet, harmonious buildings that blend functionality with beauty. She also envisions
    a future as a museum curator, where she could organize exhibitions that invite visitors to explore creative ideas in a serene environment. In the short term, she aims to join an after‑school art program,
    win a local youth illustration contest, and later attend a high‑school design academy. Her long‑term ambition is to earn a scholarship to study architecture or museum studies at a university, eventually
    contributing to Chicago’s cultural institutions and helping others discover the joy of art in well‑curated spaces.
