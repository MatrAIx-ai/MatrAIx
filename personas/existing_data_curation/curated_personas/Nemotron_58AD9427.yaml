personas:
  professional: Ana Graham, a budding visual artist and junior coder, channels their hyper‑organized nature and love of detail into watercolor cityscapes and Scratch interactive stories, consistently setting
    high standards for each project and quietly surpassing expectations despite a preference for solitary work.
  sports: Ana Graham follows the Chicago Cubs and Chicago Blackhawks from the comfort of their living room, attends occasional Lincoln Park Kids Soccer Club practices to fulfill a requirement for physical
    activity, and enjoys the rhythmic routine of a local junior swim class, preferring low‑pressure, individually focused movement over competitive team sports.
  arts: Ana Graham immerses themselves in the works of Claude Monet, Vincent van Gogh, and Georgia O'Keeffe, frequently humming the piano compositions of Ludwig van Beethoven and the cello sonatas of Yo‑Yo
    Ma while sketching, and attends Saturday workshops at the Art Institute of Chicago where they study the techniques of contemporary muralist Shepard Fairey.
  travel: Ana Graham loves day trips to Millennium Park and the Museum of Science and Industry, dreams of strolling through the Louvre in Paris after seeing a child‑friendly virtual tour, and hopes to camp
    under the stars at the Grand Canyon on a family vacation next summer, often planning each outing with a detailed map and checklist.
  culinary: Ana Graham favors homemade macaroni and cheese with a sprinkle of cheddar, delights in fresh strawberry shortcake topped with whipped cream, enjoys experimenting with the bright green of basil
    in a simple pesto pasta, and occasionally treats themselves to rock candy collected from a local fair, always tasting each bite with a thoughtful pause.
  core: Ana Graham is a meticulous seven‑year‑old artist‑coder who balances disciplined solo creation with quiet curiosity, a cautious approach to money, and a gentle struggle against anxiety, all while
    dreaming of big‑city museums and far‑away adventures.
background:
  cultural: Ana Nicole was raised in a middle‑class white family on Chicago's North Side, with parents of Irish and German ancestry who value Midwestern politeness, hard work, and community involvement.
    Her upbringing reflects mainstream American culture blended with the city’s vibrant arts scene. She attends a public elementary school that partners with local museums, giving her frequent access to
    the Art Institute, the Museum of Science and Industry, and community art festivals. Family traditions emphasize structured routines, quiet evenings reading together, and volunteering at neighborhood
    events. While Chicago’s diverse neighborhoods provide a backdrop of cultural richness, Ana Nicole’s personal cultural identity is shaped by her family’s European roots, the city’s love of public art,
    and a strong emphasis on organized, disciplined pursuit of creative interests.
