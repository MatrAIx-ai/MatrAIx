personas:
  professional: Denny Engle is an aspiring game developer who channels their methodical planning and vivid imagination into designing intricate Minecraft and Terraria worlds, leading weekend design meetups,
    and drafting detailed concept sketches that blend coastal motifs with sci‑fi aesthetics.
  sports: Denny Engle spends weekends riding waves with the San Pedro Surf Club and carving concrete bowls at a neighborhood skate crew while cheering on the Los Angeles Dodgers and Lakers, balancing a
    love for coastal endurance sports with occasional beach volleyball matches.
  arts: Denny Engle channels their love for sci‑fi and fantasy into sketching sprawling cityscapes reminiscent of Alan Lee’s illustrations, captures motion with a vintage Canon DSLR, strings together lo‑fi
    guitar riffs inspired by Tame Impala, and meticulously assembles model ships akin to the historic vessels depicted in H.R. Giger’s art.
  travel: Denny Engle dreams of exploring the anime‑laden streets of Tokyo and the surf‑friendly cliffs of Portugal’s Algarve, while their travel log already notes summer trips to Catalina Island, a family
    road‑trip through Santa Barbara, and a weekend camping adventure at the nearby Point Mugu State Park.
  culinary: Denny Engle favors fresh seafood, frequently cooking crispy fish tacos with cilantro, lime, and a drizzle of chipotle mayo, experiments with homemade sushi rolls featuring avocado and cucumber,
    and relies on convenience staples like instant ramen during late‑night game‑design sessions.
  core: Denny Engle is a methodical teen who fuses coastal surf culture with sci‑fi imagination, balancing creative bursts with meticulous planning, yet often burns the midnight oil on video games and forgets
    to water houseplants.
background:
  cultural: Denny is a white American growing up in the waterfront community of San Pedro, Los Angeles County. The area's maritime heritage—its port, fishing culture, and beach lifestyle—shapes his daily
    life, from weekend surf sessions to school field trips to tide pools. While his family celebrates traditional American holidays such as Thanksgiving and the Fourth of July, the neighborhood’s cultural
    mosaic, including nearby Hispanic and Filipino communities, provides him with a broader appreciation for diverse cuisines, music, and community events. This blend of coastal Southern‑Californian vibes
    and multicultural exposure informs his artistic sensibilities and worldview.
