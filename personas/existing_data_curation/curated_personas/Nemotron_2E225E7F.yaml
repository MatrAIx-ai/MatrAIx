  career_goals: Denny dreams of turning his love for visual storytelling into a career as a concept artist for video games or animated films. He hopes to attend a specialized high‑school program in the
    arts, earn a scholarship, and later study graphic design or interactive media at a university. Long‑term, he envisions working in a creative studio where he can blend coding and art to develop immersive
    experiences, while also keeping the door open to a role in creative direction or art direction.
