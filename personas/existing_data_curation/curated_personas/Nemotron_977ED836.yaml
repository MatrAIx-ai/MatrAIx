personas:
  professional: Abner Puello, a seasoned administrative support specialist with three decades of experience, leverages advanced Excel modeling, bilingual communication, and a flair for graphic design to
    streamline office workflows while dreaming of moving into a managerial role and guiding nonprofit arts groups.
  sports: Abner Puello follows the Louisville Cardinals basketball team and the Louisville Bats baseball club, participates in weekly morning walks around his neighborhood, and attends a senior cycling
    group in the spring, balancing his love for low‑impact activity with a competitive spirit for chess tournaments.
  arts: Abner Puello immerses himself in watercolor painting of abstract landscapes inspired by Central American vistas, frequents the Speed Art Museum and local galleries, devours surrealist literature
    from authors like André Breton, and draws creative inspiration from musicians such as Brian Eno and painter J.M.W. Turner.
  travel: Abner Puello enjoys meticulously planned trips to art‑centric cities like Santa Fe and Oaxaca, mingles adventure with relaxation by hiking volcanic trails in Guatemala and savoring weekend stays
    at historic bed‑and‑breakfasts, while budgeting travel around his retirement savings.
  culinary: Abner Puello excels at preparing traditional dishes like baleadas, tamales, and plantain‑based platters, often using fresh cilantro, cheese, and masa harina, and he balances his culinary experiments
    with a penchant for ordering takeout when anxiety spikes.
  core: Abner Puello is a methodical yet imaginative 61‑year‑old who blends disciplined administrative expertise with a vivid artistic soul, managing anxiety through structured routines, creative pursuits,
    and a careful eye on financial and health responsibilities.
background:
  cultural: Abner was born to Honduran immigrants who settled in the United States before his childhood, and he grew up in a bilingual household that celebrated Honduran traditions, music, and cuisine.
    His family placed a high value on hard work, education, and close-knit community ties, which shaped his disciplined approach to life and his dedication to family. While he has integrated into Louisville's
    diverse cultural landscape—participating in local festivals, supporting the Hispanic community, and maintaining connections with other Central American families—he retains a strong sense of Honduran
    identity. He regularly observes cultural holidays such as Día de la Independencia de Honduras, shares traditional foods with neighbors, and speaks Spanish fluently, which enriches his interpersonal
    interactions both at work and in community settings.
attributes:
  skills: '[''Advanced Microsoft Office (Word, Excel, Outlook)'', ''Data entry and records management'', ''Workflow optimization and process documentation'', ''Budget tracking and financial reporting'',
    ''Event planning and coordination'', ''Bilingual communication (Spanish‑English)'', ''Customer service and conflict resolution'', ''Creative problem solving and abstract thinking'', ''Basic graphic
    design (Canva, Photoshop)'', ''Training and mentorship of staff'']'
  hobbies: '[''Watercolor painting'', ''Visiting art galleries and attending art workshops'', ''Reading philosophy and abstract literature'', ''Playing chess and solving puzzles'', ''Cooking traditional
    Honduran cuisine'', ''Volunteering at Hispanic cultural festivals'', ''Gardening'']'
  career_goals: Abner aims to progress from his current support role into a supervisory or administrative manager position within the next two to three years, where he can lead a team and implement organization-wide
    efficiency initiatives. He aspires to obtain a Project Management Professional (PMP) certification and complete his bachelor's degree in Business Administration, using his disciplined work ethic to
    balance study with his job. Long‑term, he envisions establishing a side consultancy that advises small nonprofits and community arts organizations on streamlined administrative processes, merging his
    love for structure with his passion for the arts. He also hopes to mentor younger, especially Hispanic, staff members, helping them navigate career advancement while preserving his cultural legacy.
