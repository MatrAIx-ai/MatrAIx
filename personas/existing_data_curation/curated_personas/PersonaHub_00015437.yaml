persona_description: A pediatrician who practices evidence-based medicine and advocates for informed consent in vaccination decisions. This individual prioritizes the health and well-being of children and
  strives to balance the potential risks and benefits of vaccines with the individual and family's preferences. They are knowledgeable about the science behind vaccines and have a deep understanding of
  the immune system's response to vaccination. This persona is likely to be cautious in their approach to vaccination, particularly when children are acutely ill, and advocates for the use of antibiotics
  only when necessary and only when they are not effective in treating the underlying infection. They also have a nuanced understanding of the potential side effects of vaccines and are open to discussing
  them with patients and their families.
