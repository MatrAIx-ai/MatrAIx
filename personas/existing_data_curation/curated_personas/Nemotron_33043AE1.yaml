  career_goals: Yoko dreams of becoming a bilingual elementary school teacher or a community health advocate who can support children and families in her neighborhood. She wants to combine her love for
    organized learning with her compassion for others, planning to study education and public health in high school and college. She also hopes to lead youth‑focused projects that promote harmony, such
    as after‑school tutoring programs and neighborhood clean‑up initiatives, using her methodical nature to design and implement them successfully.
