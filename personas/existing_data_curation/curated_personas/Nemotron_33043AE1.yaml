personas:
  professional: Yoko Mendezalvarez is a budding young scientist who channels their methodical curiosity into designing mini experiments at home, meticulously documenting results in a journal while dreaming
    of one day becoming a research engineer.
  sports: Yoko Mendezalvarez is a member of the Riverdale Youth Soccer Club, enjoys swimming laps at the community pool, and cheers for the Seattle Seahawks during weekend games, balancing a structured
    practice schedule with their preference for small-group activities.
  arts: Yoko Mendezalvarez immerses themselves in creative worlds by sketching scenes from J.K. Rowling's Harry Potter series, building LEGO dioramas inspired by Hayao Miyazaki's Studio Ghibli films, and
    listening to piano compositions by Ludovico Einaudi while reading fantasy novels by Brandon Sanderson.
  travel: Yoko Mendezalvarez loves organized family road trips, having recently explored the red rocks of Sedona on a carefully planned itinerary, and dreams of visiting the ancient ruins of Machu Picchu,
    balancing a desire for adventure with the practical constraints of school schedules and a limited travel budget.
  culinary: Yoko Mendezalvarez delights in helping their grandparents roll corn husks for tamales, hand-crafting salsa verde with fresh tomatillos, and occasionally mastering the perfect chocolate chip
    cookie, showcasing a moderate cooking skill set and a fondness for bold, aromatic flavors.
  core: Yoko Mendezalvarez is a quietly ambitious ten-year-old who blends meticulous curiosity with a compassionate heart, often juggling detailed LEGO constructions, science experiments, and heartfelt
    journaling while worrying about the little things that matter most.
background:
  cultural: Yoko comes from a Mexican‑American family in Santa Ana, where Spanish is spoken alongside English at home. Her household celebrates traditions such as Día de los Muertos, Las Posadas, and cooking
    family recipes passed down from her grandparents. She frequently attends local community festivals that feature mariachi music, folkloric dance, and multicultural food fairs, which strengthen her connection
    to Mexican heritage while also integrating into the diverse fabric of Orange County. This bicultural environment nurtures her bilingual abilities, deep sense of family loyalty, and commitment to community
    service.
