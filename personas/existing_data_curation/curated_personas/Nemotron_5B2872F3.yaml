  hobbies: '[''Visiting art galleries'', ''Sketching and drawing'', ''Photography'', ''Hiking coastal trails'', ''Reading contemporary fiction and non-fiction'', ''Cooking experimental meals'', ''Attending
    live music events'', ''Exploring new coffee shops'']'
  career_goals: Natalie aims to advance within the retail sector by first becoming a store manager, then a district manager, where she can lead larger teams and shape broader merchandising strategies. Her
    competitive drive pushes her to exceed sales targets and earn recognition as a top performer. Long‑term, she aspires to combine her retail experience with her love of art by opening a boutique that
    showcases locally‑made artwork, handcrafted accessories, and curated fashion pieces. To support this vision, she plans to enroll in part‑time business courses focused on entrepreneurship and e‑commerce,
    and to develop a personal brand through an online shop and social‑media content creation.
