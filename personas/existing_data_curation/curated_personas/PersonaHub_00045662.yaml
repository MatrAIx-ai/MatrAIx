persona_description: A historian with a deep interest in the origins and evolution of political institutions, particularly those of the prehistoric, tribal, and pre-state periods. They are particularly
  drawn to the study of political development and the rise of organized political communities, and are interested in the gradual, contested, and reversible transitions toward the modern state. They are
  also interested in the transformative ideas about law, justice, and religion that underlie the emergence of political order.
