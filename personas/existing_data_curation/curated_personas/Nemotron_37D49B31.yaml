personas:
  professional: Terri Bowen, a 57‑year‑old aspiring certified volunteer coordinator, blends hands‑on home‑maintenance expertise with meticulous budgeting and a competitive drive to launch a home‑based garden
    décor and preserved‑food line, while they mentor younger women in practical life skills.
  sports: Terri Bowen stays fit by tending her garden, early‑morning birdwatch walks at the nearby wetlands, and cheering on the Tampa Bay Buccaneers during football season, while they occasionally join
    a Sunday‑league softball team at the community center.
  arts: Terri Bowen expresses her artistic side through crocheting quilts patterned after traditional folk designs, attending local theater productions of classic dramas, and listening to folk legend Emmylou
    Harris while they immerse themselves in historical fiction by Ken Follett and true‑crime novels.
  travel: Terri Bowen prefers low‑key road trips, often spending weekend days exploring Florida’s natural gems such as the Everglades and Sanibel Island, while dreaming of a spring pilgrimage to Savannah’s
    historic squares and a culinary tour of New Orleans.
  culinary: Terri Bowen cooks with a garden‑to‑table philosophy, expertly preserving heirloom tomatoes into sun‑dried salsa, baking classic shrimp and grits, and whipping up buttery pecan pies infused with
    fresh rosemary, while they relish swapping recipes at community bake‑offs.
  core: Terri Bowen is a pragmatic garden‑enthusiast who balances a skeptical, competitive streak with warm community service, often humming while crocheting blankets for charity and fiercely guarding the
    last coupon in the grocery aisle.
background:
  cultural: Terri grew up in a middle‑class, white Southern family in Central Florida, where values of self‑reliance, hospitality, and community involvement were emphasized. Her upbringing blended traditional
    Southern customs—regular church attendance, family gatherings, and respect for local traditions—with a practical outlook shaped by modest means. Living in Arcadia, a close‑knit town, she maintains strong
    ties to local heritage while being open to new ideas, balancing curiosity with a pragmatic approach to life. Her divorce and later years have reinforced an independent, resilient mindset, but she still
    cherishes the cultural importance of neighborly support and shared community events.
attributes:
  skills: '["DIY home repairs", "Gardening and organic pest control", "Budgeting and meal planning", "Community volunteer coordination", "Conflict mediation", "Basic computer literacy"]'
  hobbies: '["Gardening", "Reading historical fiction", "Crocheting", "Birdwatching", "Community quilting circles", "Bake‑off competitions", "Exploring local nature parks"]'
  career_goals: While not currently part of the formal workforce, Terri aims to formalize her community involvement by becoming a certified volunteer coordinator for senior services in Sarasota County.
    She is considering completing a GED program to broaden her options and hopes to launch a small home‑based business selling handcrafted garden décor and preserved foods, leveraging her practical skills
    and curiosity for new product ideas. Terri also wishes to mentor younger women in her town, helping them develop practical life skills and financial independence.
