personas:
  professional: Sabrina Preacher, an aspiring young builder and soccer captain in her elementary school who channels her organized, methodical nature into constructing intricate LEGO structures and coordinating
    team play, demonstrating early leadership, reliability, and a keen focus on immediate realities.
  sports: Sabrina Preacher, a spirited forward for the Little Lions Soccer Club who idolizes Manchester United’s Marcus Rashford and cheers for the hometown professional team the City Hawks during halftime,
    embodying her love for team play, routine training, and energetic competition.
  arts: Sabrina Preacher, an enthusiastic choir singer who delights in gospel hymns and hip‑hop dance moves emulating Beyoncé’s choreography, while devouring Dr. Seuss picture books and crafting friendship
    bracelets during recess, showcases her creative expression and love for communal art.
  travel: Sabrina Preacher, a family‑focused weekend explorer who loves planning trips to the nearby wildlife sanctuary and the state’s coastal beach while dreaming of a future adventure to Disney World
    and the Eiffel Tower, balances excitement with familiar routines and a well‑packed checklist.
  culinary: Sabrina Preacher, a budding kitchen helper who enjoys whisking cocoa powder into brownie batter, sprinkling chocolate chips onto cookies, and tasting the buttery crust of homemade mac‑and‑cheese
    bites, demonstrates a sweet‑tooth enthusiasm and developing cooking confidence.
  core: Sabrina Preacher, a seven‑year‑old bundle of organized energy who balances LEGO building, soccer drills, and choir singing with a fierce, sometimes overwhelming anxiety that colors her sunny routines.
background:
  cultural: Sabrina grows up in a close‑knit African‑American family in Roswell, Georgia, where Southern traditions and church life play central roles. Weekly worship services, gospel music, and family
    gatherings are sources of cultural pride. She participates in community events like Juneteenth celebrations, enjoys soulful cooking such as collard greens and sweet tea with relatives, and values storytelling
    and oral histories shared by grandparents. This heritage shapes her values of kindness, cooperation, and a strong sense of community.
attributes:
  skills: '[''Reading comprehension (2nd‑grade level)'', ''Basic addition and subtraction'', ''Following multi‑step instructions'', ''Organizing personal space and school supplies'', ''Team collaboration
