  hobbies: '[''Soccer'', ''Church choir singing'', ''LEGO building'', ''Reading books'', ''Crafting friendship bracelets'', ''Hip‑hop and gospel dancing'', ''Baking with family'']'
  career_goals: Sabrina dreams of becoming a teacher who can create a caring, well‑structured classroom where every child feels safe, and she also imagines helping others as a pediatric nurse one day. Her
    love of space and excitement about missions sometimes leads her to picture herself as an astronaut, while the supportive church community inspires a future role as a youth mentor or community leader
    who brings people together.
