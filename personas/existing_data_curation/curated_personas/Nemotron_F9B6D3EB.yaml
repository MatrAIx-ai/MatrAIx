  hobbies: '["soccer", "LEGO building", "drawing and coloring", "reading picture books", "group games (tag, hide-and-seek)", "listening to music and dancing", "helping with family cooking"]'
  career_goals: Samy dreams of becoming a firefighter because he admires the clear structure, teamwork, and the chance to help his community. He also loves building things, so he imagines growing up to
    be a civil engineer or architect, designing bridges and playgrounds. Occasionally, he says he wants to be a soccer coach, leading a team and organizing practices, reflecting his love for sports and
    group leadership.
