  career_goals: Stephen aims to advance to an editorial director role within the next five years, overseeing a larger editorial department and shaping the strategic content vision for a major publishing
    house or media company. He aspires to launch a boutique editorial consultancy that offers structured, quality‑focused services to independent authors and startups. Long‑term, he envisions authoring
    a book on effective editing practices, positioning himself as a thought leader in the industry while mentoring emerging editors. He also hopes to contribute to Austin’s vibrant literary community by
    curating a quarterly literary magazine that balances local voices with national relevance.
