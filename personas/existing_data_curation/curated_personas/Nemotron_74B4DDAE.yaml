personas:
  professional: Patrick Dodge, a retired handyman turned community volunteer, blends his seasoned carpentry and garden landscaping skills with a curiosity for new DIY methods, coordinating local historical
    reenactments and digitizing archival photos while mentoring younger residents through steady, organized yet flexible leadership.
  sports: Patrick Dodge enjoys early‑morning walks on the Lake Norman trail, weekend fishing outings for bass and catfish, and avidly follows the Charlotte Hornets and Carolina Panthers, while occasionally
    joining a senior softball league at the local community center.
  arts: Patrick Dodge frequently attends productions at the Carolina Repertory Theatre, volunteers backstage for community theater, admires performances by Angela Bassett, enjoys listening to Gregory Porter’s
    jazz vocals, and reads biographies by David McCullough, all of which enrich his love for storytelling and historical preservation.
  travel: Patrick Dodge prefers road trips to nearby historic sites such as the Biltmore Estate, Colonial Williamsburg, and Monticello, often planning visits with his spouse after church gatherings, while
    dreaming of a guided tour of the Normandy beaches to connect with world‑war history.
  culinary: Patrick Dodge delights in cooking garden‑fresh tomato basil soup, roasted vegetable medleys with rosemary and thyme, homemade cornbread, and pan‑seared catfish caught from Lake Norman, showcasing
    a moderate cooking skill that balances comfort food with occasional experimentation.
  core: Patrick Dodge is a sociable, curious 77‑year‑old who blends meticulous DIY craftsmanship with a flair for oral history, occasionally neglects medication but never misses a bridge game, and finds
    joy in gardening, theater, and modest financial caution.
background:
  cultural: 'Patrick grew up in a middle‑class white family in the Piedmont region of North Carolina, raised within a Southern Baptist tradition that emphasized community, hospitality, and respect for tradition.
    His heritage traces back to English and Irish ancestors, and he carries the cultural influences of the American South: a love of barbecue, support for local college football teams, regular church participation,
    and a strong sense of neighborliness. Living in Concord, NC, he blends these roots with the more diverse, modern environment of Cabarrus County while maintaining a deep connection to local history and
    community life.'
