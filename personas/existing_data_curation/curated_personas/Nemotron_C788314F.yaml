personas:
  professional: Chi Yang is an aspiring junior game designer who creates small Python-based games, channeling their curiosity for new ideas and disciplined, high‑standard mindset into meticulous coding
    and iterative playtesting.
  sports: Chi Yang is a forward on the Lakeside United Jr. Soccer Club, thriving on after‑school matches and weekend hikes along the nearby coastal trail, using the physical exertion to channel competitive
    energy and calm anxious thoughts.
  arts: Chi Yang is a budding visual artist who spends afternoons sketching in a sketchbook and evenings experimenting with digital illustration on a tablet, regularly visits the City Modern Art Museum,
    and draws inspiration from indie band Arctic Monkeys and K‑pop group BTS.
  travel: Chi Yang loves weekend trips to the rocky coastal cliffs for hiking, dreams of backpacking through the Swiss Alps, and hopes to explore the neon‑lit streets of Tokyo's Akihabara district to experience
    both natural and urban creativity.
  culinary: Chi Yang enjoys helping their family prepare spicy ramen, sushi rolls, and kimchi fried rice, boasts a decent skill level with a tablet‑based recipe app, and often experiments by adding unconventional
    ingredients like miso caramel to desserts.
  core: Chi Yang blends relentless curiosity with disciplined ambition, turning anxiety into artistic fuel, competitive soccer drive, and a penchant for meticulously planning everything from finances to
    weekend hikes.
background:
  cultural: Chi Tan is a second‑generation East Asian American raised in a bilingual household where Mandarin is spoken alongside English. Her family celebrates Lunar New Year and other cultural traditions,
    often sharing traditional dishes and stories from their heritage. She participates in a cultural club at school, where she explores East Asian art forms such as calligraphy and contemporary media. Living
    in Corona Del Mar, Orange County, she blends the coastal California lifestyle with a strong emphasis on education and community values, creating a multicultural identity that influences her artistic
    perspective, disciplined work ethic, and appreciation for diverse experiences.
