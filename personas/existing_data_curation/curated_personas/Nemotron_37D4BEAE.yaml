  hobbies: '[''Reading historical fiction'', ''Gardening'', ''Knitting and crochet'', ''Hiking local trails'', ''Baking pies'', ''Volunteering at community center'']'
  career_goals: Lissa aims to advance to a store manager position within the next two years, leveraging her strong organizational skills and dedication to routine. She plans to complete her bachelor’s degree
    in Business Administration part‑time, which will prepare her for a regional supervisory role. Long‑term, she envisions opening a family‑owned boutique that blends her retail expertise with a curated
    selection of local crafts, allowing her to maintain a stable schedule for her family while staying rooted in the community.
