personas:
  professional: An organized retail supervisor, Lissa Benoit excels at staff scheduling, meticulous inventory control, and visual merchandising, using their practical, routine‑oriented mindset and calm
    conflict‑resolution skills to keep store operations humming efficiently.
  sports: An avid weekend hiker, Lissa Benoit explores the Wasatch foothills with their husband, follows the Utah Jazz and Real Salt Lake seasonally, and participates in a small, low‑impact community walking
    group to maintain steady fitness without the pressure of competitive sports.
  arts: Passionate about literary escapism, Lissa Benoit devours historical fiction by Hilary Mantel and classic novels by Jane Austen, knits and crochets while listening to folk legends like John Denver
    and The Avett Brothers, and occasionally attends local theater productions of Shakespearean plays, finding comfort in the quiet creativity that aligns with their reserved nature.
  travel: Preferring well‑planned, low‑key escapes, Lissa Benoit enjoys weekend road trips to places like Moab’s Arches National Park and Napa Valley’s vineyards, cherishes the predictability of itineraries
    that combine nature hikes with quaint boutique shopping, and dreams of a future family getaway to a historic town in New England, where they can savor both routine and novelty.
  culinary: An enthusiastic home baker, Lissa Benoit delights in crafting seasonal pies—apple with cinnamon, peach with ginger, and pumpkin spiced with nutmeg—while frequently incorporating fresh vegetables
    from their garden into rustic salads and hearty stews, and they proudly showcase their limited but growing repertoire of sourdough bread baking.
  core: Balancing a love for routine with gentle curiosity, Lissa Benoit is a detail‑driven retail leader who stitches community bonds through gardening, knitting, and weekend hikes, all while they secretly
    hoard extra inventory tags for later tinkering.
background:
  cultural: Lissa grew up in a middle‑class white family in the Salt Lake Valley and later settled in Tooele, Utah. The region’s emphasis on self‑reliance, family cohesion, and community involvement shaped
    her practical outlook and love for routine. Though not overtly religious, she participates in local traditions such as county fairs, volunteer initiatives, and seasonal festivals, reflecting the broadly
    western and modest cultural values of the area.
attributes:
  skills: '[''Retail Operations Management'', ''Team Leadership'', ''Scheduling'', ''Inventory Control'', ''Customer Service Training'', ''Conflict Resolution'', ''POS System Proficiency'', ''Visual Merchandising'',
