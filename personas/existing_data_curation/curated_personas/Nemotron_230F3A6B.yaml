personas:
  professional: Debra Mcmullan, a meticulous 33‑year‑old pipefitter and aspiring Master Pipefitter, combines razor‑sharp blueprint reading, MIG/TIG welding precision, and a penchant for eco‑friendly piping
    designs into a solitary yet highly reliable consultancy that blends industrial functionality with artistic aesthetics, and they thrive on the quiet precision of each project.
  sports: Debra Mcmullan, a lone‑wolf fitness enthusiast, hikes the quiet backcountry trails of Louisiana’s Atchafalaya Basin, follows the New Orleans Saints and the LSU Tigers for inspiration, and they
    occasionally join a weekend cycling club that rides the historic levee routes.
  arts: Debra Mcmullan, whose creative outlet is oil painting industrial ruins, draws inspiration from photographers like Edward Burtynsky, painters such as Andrew Wyeth, and contemporary sculptor Tara
    Donovan, and they spend evenings sketching along the lines of the Bauhaus aesthetic while listening to the ambient soundscapes of Brian Eno.
  travel: Debra Mcmullan, preferring solitary, off‑the‑beaten‑path experiences, plans low‑key road trips to abandoned grain silos in the Great Plains, has already documented the ghost towns of Marfa, Texas,
    and dreams of wandering the industrial waterfronts of Rotterdam, and they budget travel through a flexible \"points‑first\" airline program.
  culinary: Debra Mcmullan, an amateur cook with a flair for hearty Southern comfort but a refined palate, often prepares smoked gumbo with roux, ages their own cheddar, and experiments with DIY sous‑vide‑infused
    beef brisket, yet they struggle to resist ordering indulgent beignets from cafés that remind them of their childhood weekend trips.
  core: Debra Mcmullan, a 33‑year‑old pipefitter‑artist, navigates life with a meticulous eye for industrial beauty, bouts of anxious intensity, and a steadfast commitment to solitary, eco‑conscious craftsmanship,
    and they constantly seek balance between precision and creative freedom.
background:
  cultural: Debra was raised in a modest, white, Irish‑Scottish family in Sterlington, Union Parish, Louisiana. The rural Southern environment emphasized self‑reliance, hands‑on apprenticeship, and a strong
    work ethic, values that are evident in her dedication to the plumbing trade. Local traditions, such as community church gatherings, Cajun and Creole cuisine, and a respect for folk art, subtly inform
    her appreciation for varied artistic expressions. As a woman in a traditionally male‑dominated field, she carries both a competitive drive to prove herself and a healthy skepticism toward others' intentions,
    shaped by the close‑knit yet sometimes insular community she grew up in.
attributes:
  skills: '[''Pipe Installation'', ''Steam System Maintenance'', ''MIG/TIG Welding'', ''Blueprint Reading'', ''Code Compliance (Louisiana)'', ''Hydraulic System Troubleshooting'', ''Material Selection (copper,
    steel, PEX)'', ''Pipe Threading and Rigging'', ''Independent Project Management'', ''Basic AutoCAD Drafting'', ''Sustainable Plumbing Solutions'', ''Problem Solving Under Pressure'', ''Self‑reliant
    Work Ethic'']'
  hobbies: '[''Oil Painting'', ''Industrial Photography'', ''Reading Art History'', ''Model Steam Locomotive Building'', ''Hiking in Rural Louisiana'', ''Solo Sketching'', ''Listening to Ambient Music'',
    ''DIY Home Renovation Projects'', ''Journaling'', ''Online Courses in Contemporary Art'']'
  career_goals: Debra aims to achieve Master Pipefitter certification within the next three years and eventually secure an ICC Certified Steamfitter credential. She aspires to specialize in eco‑friendly
    piping solutions for commercial and artistic installations, positioning herself as a niche consultant who blends technical precision with aesthetic considerations. While she prefers solitary work, she
    hopes to establish her own small‑scale plumbing business focused on sustainable designs, allowing her to control her work environment and reduce the social pressures that trigger anxiety.
