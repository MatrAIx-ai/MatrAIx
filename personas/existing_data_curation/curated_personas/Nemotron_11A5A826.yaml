  hobbies: '[''Photography'', ''Digital Art'', ''Hiking'', ''Piano'', ''Arduino/Raspberry Pi Projects'', ''Science Fiction Reading'', ''Museum Volunteering'', ''Woodworking'', ''Traveling'', ''Attending
    Art Exhibitions'']'
  career_goals: Mark aims to channel his curiosity and competitive drive into interdisciplinary projects that fuse technology with art. He plans to complete a certification in User Experience (UX) design
    and pursue part‑time lecturing or workshop facilitation at a local community college, mentoring younger students in STEM. Concurrently, he hopes to launch a freelance consultancy focused on interactive
    exhibit design for museums and cultural institutions, and to author a series of articles or a book on the creative application of data visualization in public installations.
