personas:
  professional: Kelly Helme is an aspiring junior engineer who builds intricate LEGO structures and conducts simple home science experiments, blending their curiosity with practical problem‑solving and
    a disciplined, organized approach to each project.
  sports: Kelly Helme enjoys playing forward on the local youth soccer team, practices swimming at the community pool after school, and eagerly follows the Minnesota Twins and the Minnesota Wild, while
    also spending winter afternoons ice skating on the frozen lake near home.
  arts: Kelly Helme immerses themselves in fantasy novels like *Harry Potter* and *Percy Jackson*, draws detailed wildlife sketches, practices piano pieces by Beethoven and Yiruma, and listens to a mix
    of Taylor Swift and the classic soundtrack of Disney’s *The Lion King*.
  travel: Kelly Helme loves weekend family trips to the nearby lake for kayaking, annual visits to the Minnesota State Fair, and dreams of exploring Yellowstone National Park and Disney World, preferring
    a mix of adventure and familiar comforts.
  culinary: Kelly Helme favors homemade mac and cheese with broccoli, pancakes topped with fresh blueberries, and the occasional fish‑fry catch from the lake; they can confidently whisk batter and assemble
    simple snack plates, yet often forget to clean up the kitchen afterward.
  core: Kelly Helme is a curiosity‑driven eight‑year‑old who balances imaginative LEGO builds with practical responsibility, delights in lake adventures, and occasionally neglects chores in favor of a new
    comic book.
background:
  cultural: Kelly comes from a white, Midwestern American family living in Stillwater, Minnesota. Her community emphasizes close family ties, outdoor recreation, and participation in seasonal events such
    as lake activities in summer and ice skating or sledding in winter. She grows up attending local celebrations like the Stillwater Lift Bridge festivities and the Minnesota State Fair, fostering an appreciation
    for regional history, nature, and community values of cooperation, practicality, and courteous behavior. Her upbringing encourages both curiosity through school projects and a grounded, practical approach
    to everyday responsibilities.
