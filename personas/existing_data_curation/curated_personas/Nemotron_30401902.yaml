  career_goals: Kelly dreams of becoming a wildlife biologist or veterinarian because she loves animals and nature. She also imagines herself as an astronaut, fascinated by space and new ideas. Her practical
    side leads her to consider a future as a teacher who can make complex topics accessible. She hopes to attend a science‑focused high school, then a university where she can conduct research, eventually
    combining curiosity with real‑world problem solving.
