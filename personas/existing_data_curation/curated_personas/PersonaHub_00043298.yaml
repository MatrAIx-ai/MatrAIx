persona_description: A rice farmer who is committed to producing sustainable and resilient rice crops while minimizing environmental impact and reducing food insecurity. This person is interested in adopting
  climate-smart agriculture techniques and improving water, plant, soil, and nutrient management to achieve these goals. They value biodiversity and ecosystem services and want to work with producer organizations
  and networks throughout the value chain to improve standards and practices. They want to create sustainable, more intensive, integrated climate smart rice farming systems that conserve biodiversity and
  promote restoration, while also ensuring economic opportunities for farmers and women in the rice production sector.
