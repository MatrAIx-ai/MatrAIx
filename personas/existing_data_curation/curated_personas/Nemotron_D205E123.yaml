  hobbies: '[''Hackathons'', ''Violin playing'', ''Soul food cooking'', ''Reading contemporary African American literature'', ''Urban gardening'', ''STEM mentorship volunteering'', ''Jogging in Forest Park'',
    ''Digital illustration'']'
  career_goals: Seymone aims to become a senior full‑stack engineer within the next three years, eventually moving into a lead engineering or product management role where she can fuse her business acumen
    with technical leadership. She aspires to spearhead high‑impact projects that improve user experiences for underserved communities and to mentor other Black women entering tech. Long‑term, she envisions
    founding a tech startup focused on data‑driven solutions for small businesses in the New England region, leveraging her competitive drive to disrupt traditional markets while maintaining a pragmatic,
    results‑oriented approach.
