personas:
  professional: Edna Thompson is a 28‑year‑old retail visual merchandiser in Atlanta who blends data‑driven inventory forecasting with a curator’s eye for contemporary art, using empathic customer service
    and mindful breathing techniques to lead store teams toward higher loyalty while they plan a transition to assistant manager and eventually their own boutique showcasing emerging artists.
  sports: Edna Thompson follows the Atlanta Falcons and the Atlanta Hawks, rides with the BeltLine Bike Club on weekend cycling outings, and hikes the Stone Mountain trails with a group of friends, and
    they treat fitness as a social ritual rather than a solitary regimen.
  arts: Edna Thompson regularly attends the High Museum’s Kehinde Wiley exhibition, enjoys live jazz sets by the soulful John Coltrane tribute trio at the Porter’s Lounge, and they volunteer at a community
    center where they help organize after‑school mural projects inspired by the works of local street artist "Briiott."
  travel: Edna Thompson loves weekend getaways to Savannah’s historic squares and has a bucket list that includes exploring the colorful markets of Oaxaca, Mexico, the frescoed villages of Cinque Terre,
    Italy, and attending the lantern festival in Chiang Mai, Thailand, and they balance travel costs with their modest savings plan.
  culinary: Edna Thompson enjoys experimenting in her kitchen by marrying Southern comfort foods like shrimp and grits with Mexican mole poblano and Italian basil‑pesto pasta, often seasoning dishes with
    smoked paprika, chipotle, and pine nuts, and they consider themselves a competent home cook who hosts potluck dinners featuring their signature bourbon‑maple glazed chicken wings.
  core: Edna Thompson, a curious 28‑year‑old retail professional, balances a love for art, community, and mindful self‑care with a habit of over‑planning events and occasional worry‑driven splurges, and
    they often find themselves juggling work and personal creative projects.
background:
  cultural: 'Edna grew up in a middle‑class Anglo‑American family in suburban Georgia, where the values of Southern hospitality, community involvement, and respect for tradition were emphasized. Her parents
    encouraged appreciation for the arts, taking her to theater productions and museum trips, which sparked her lifelong curiosity about visual culture. Living in Atlanta, she is immersed in a vibrant,
    multicultural city that celebrates a mix of Southern heritage and diverse global influences—from food festivals to music scenes—broadening her perspective beyond her white, Southern upbringing. This
    blend of a conventional Southern cultural foundation with the eclectic urban environment of DeKalb County informs her interpersonal style: polite yet open‑minded, cooperative while eager to explore
    unconventional ideas. Her marriage further introduces her to her spouse’s cultural practices, adding layers of shared holiday traditions and culinary experiments that enrich her personal and social
    identity.'
