  career_goals: Edna aims to translate her on‑floor expertise into leadership. In the short term, she seeks promotion to assistant manager within her current store, where she can formalize her training
    programs and spearhead community‑engagement events. Over the next three to five years, she envisions stepping into a store manager role, overseeing multiple departments, and implementing data‑driven
    merchandising strategies that blend artful presentation with sales performance. She is also interested in completing a part‑time MBA or a retail management certification to deepen her strategic knowledge.
    Long‑term, Edna dreams of opening a boutique that showcases emerging artists and ethically sourced fashion, marrying her love of art with her business acumen. Throughout her career progression, she
    prioritizes cultivating a supportive, harmonious workplace that acknowledges team members' well‑being, reflecting her own need for balanced stress management.
