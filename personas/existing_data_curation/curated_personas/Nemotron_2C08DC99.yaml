personas:
  professional: Michelle Mcghee is a seasoned facility maintenance technician with over a decade of expertise in mechanical, electrical, and plumbing systems, who leverages her organized, methodical approach
    and curiosity for emerging repair tools to design efficient preventive‑maintenance schedules while mentoring junior staff, despite a competitive edge that sometimes makes her skeptical of new ideas
    from peers.
  sports: Michelle Mcghee carves out early morning jogs through Rowlett’s Ruff‑Corral Park, follows the Dallas Cowboys and Dallas Mavericks avidly, and participates in the Dallas Running Club’s weekly half‑marathon
    training group, approaching fitness with a pragmatic routine that balances competitive personal records with the community spirit of her church’s youth sports outreach program.
  arts: Michelle Mcghee’s downtime often includes listening to gospel legends like Mavis Staples, classic soul icons such as Aretha Franklin, and contemporary R&B artists like H.E.R., while occasionally
    attending local theater productions at the Dallas Children’s Theatre, reflecting how music and performance art intertwine with her cultural gatherings.
  travel: Michelle Mcghee prefers a mix of purposeful road trips and occasional weekend getaways, having explored the vibrant food scene of New Orleans, the historic streets of Savannah, and the Hill Country
    vineyards near Austin, while planning a future solo adventure to the historic sites of Mexico City to combine cultural immersion with personal growth.
  culinary: Michelle Mcghee enjoys cooking Southern comfort dishes such as gumbo, collard greens seasoned with smoked paprika, and sweet‑potato pie, often incorporating fresh heirloom tomatoes, basil, and
    cucumber from her own garden, while experimenting with smart‑home appliances to perfect timing and temperature for each recipe.
  core: Michelle Mcghee balances a relentless curiosity for new repair tech with a pragmatic, checklist‑driven routine, but occasionally procrastinates on filing tax documents until the last moment, and
    can’t resist a late‑night slice of pepperoni pizza after a long day of troubleshooting.
background:
  cultural: Michelle grew up in a close‑knit African‑American community in the Dallas metropolitan area, where family ties, church involvement, and communal support were central to daily life. Her upbringing
    blended Southern traditions—such as weekend soul‑food gatherings and celebrations like Juneteenth—with a modern appreciation for education and self‑improvement. The values of resilience, mutual aid,
    and perseverance she inherited from her parents and community elders inform both her professional work ethic and her commitment to mentoring younger neighbors in trades. While she embraces the cultural
    rhythms of her heritage, she also navigates the broader multicultural fabric of Rowlett, making her perspective both rooted and adaptable.
attributes:
  skills: '["Preventive maintenance planning", "Electrical system troubleshooting", "Plumbing repair and pipe replacement", "HVAC system servicing", "Basic carpentry and finish work", "Welding and metal
    fabrication", "Equipment inventory management", "OSHA safety compliance", "Service call documentation", "Technical schematics reading", "Team coordination and mentorship"]'
  hobbies: '["DIY home improvement projects", "Gardening", "Listening to gospel and soul music", "Cooking Southern comfort food", "Jogging in local parks", "Reading tech and repair blogs", "Church community
    volunteering", "Exploring smart‑home technology"]'
  career_goals: Michelle aims to transition from a general maintenance technician to a lead supervisor or facility manager within the next three years, leveraging her organizational strengths and practical
    curiosity. She plans to earn the Certified Maintenance & Reliability Technician (CMRT) credential and later pursue the Certified Maintenance & Reliability Professional (CMRP) designation. Long‑term,
    she dreams of launching a community‑focused handyman service that emphasizes sustainable repairs and offers apprenticeships to local youth, giving back to the Rowlett and greater Dallas area.
