personas:
  professional: Linda Ellis is a retired humanities graduate who channels her analytical research talents and polished storytelling into leading community historical preservation projects, mentoring senior
    writers, and drafting grant proposals, all while balancing meticulous planning with the flexibility to adapt to volunteer schedules.
  sports: Linda Ellis is an avid walker who logs regular miles along the Mississippi River Trail, participates in a local senior walking club, and proudly cheers for the St. Louis Cardinals while occasionally
    joining a community bridge‑ball league in the spring.
  arts: Linda Ellis expresses her love of the arts through watercolor river landscapes inspired by Winslow Homer, attends productions at the Quad City Playhouse featuring classics like "Our Town," and finds
    inspiration in folk singer Joan Baez's storytelling, which informs her own memoir writing.
  travel: Linda Ellis prefers purposeful travel that blends historical research with leisurely exploration, having toured Colonial Williamsburg, taken a river cruise to St. Louis, and planning a future
    pilgrimage to the Hallstatt region of Austria to study medieval genealogy archives.
  culinary: Linda Ellis delights in cooking hearty Midwestern fare such as pork tenderloin with apple chutney, homemade corn casserole, and fresh garden salads featuring heirloom tomatoes, basil, and dill,
    though she occasionally over‑salts her stews when distracted by new knitting patterns.
  core: Linda Ellis is a curiosity‑driven, garden‑tending historian who balances meticulous organization with spontaneous creativity, confronts age‑related aches with discipline, and weaves community service
    into every facet of her golden years.
background:
  cultural: Linda was raised in a middle‑class family in the Midwest, where a strong sense of community, modesty, and self‑reliance were emphasized. Her upbringing blended American cultural traditions with
    the heritage of her German and Irish ancestors, reflected in family gatherings, church participation, and seasonal festivals in Rock Island County. She values the region's emphasis on neighborly support,
    lifelong learning, and stewardship of local history, which continue to shape her perspectives and activities.
