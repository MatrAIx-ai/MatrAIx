  hobbies: '[''reading historical fiction'', ''gardening'', ''watercolor painting'', ''knitting'', ''attending local theater'', ''genealogy research'', ''participating in community lectures'', ''walking
    the Mississippi River trail'', ''cooking Midwestern recipes'']'
  career_goals: Although retired from formal employment, Linda aims to channel her expertise into community service. She aspires to lead a local historical preservation initiative that documents the Quad
    Cities' cultural heritage, mentor emerging writers through a senior-led workshop series, and curate traveling exhibitions that showcase Midwestern art and history. Completing her memoir and publishing
    a collection of historical essays are also personal milestones she hopes to achieve in the coming years.
