personas:
  professional: Brian Boyer is a 39‑year‑old construction laborer with over 15 years of hands‑on experience in framing, concrete finishing, and small‑equipment operation, and they leverage their routine‑driven,
    detail‑oriented work style to train crew members on standardized procedures while quietly battling anxiety about stepping into a foreman role.
  sports: Brian Boyer follows Arkansas Razorbacks football with fervor and keeps an eye on the St. Louis Cardinals for baseball, while they belong to the Greers Ferry Bass Club, partake in seasonal deer
    hunting trips with their wife, and maintain a modest fitness regimen of weight‑lifting at the community gym twice a week to stay strong for the physically demanding work.
  arts: Brian Boyer finds solace in classic rock, routinely blasting Led Zeppelin, The Rolling Stones, and Bruce Springsteen while woodworking, and they unwind by meticulously assembling scale‑model car
    kits, often drawing inspiration from master woodworker Paul Sellers and the cinematic storytelling of the film 'A River Runs Through It'.
  travel: Brian Boyer prefers low‑stress, road‑trip style travel, planning spontaneous weekend getaways to fishing spots on Greers Ferry Lake or hunting lodges in the Ozarks, while they dream of a future
    fishing expedition to Montana’s Madison River and keep vacation planning to a short checklist to avoid overwhelm.
  culinary: Brian Boyer enjoys hearty, home‑cooked meals such as smoked brisket, corn‑bread, and pan‑fried catfish seasoned with paprika and garlic, and they possess an intermediate skill level in grilling
    and woodworking‑inspired kitchen projects, often pairing a cold brew with a side of baked beans while occasionally treating themselves to a quick greasy burger after a long day on the job.
  core: Brian Boyer is a routine‑loving yet subtly disorganized construction veteran whose steady work ethic masks a restless anxiety that drives them to seek predictability through woodworking, fishing,
    and a cautious financial strategy, while occasionally succumbing to impulsive truck‑part purchases and late‑night classic‑rock marathons.
background:
  cultural: Brian grew up in a working‑class, white family in the small town of Searcy, Arkansas. The community’s values—self‑reliance, modesty, and a strong sense of duty to family—shaped his practical
    outlook. He was raised in a Protestant household that emphasized regular church attendance in a small congregation, Southern hospitality, and traditional Southern cuisine. The rural Ozark setting fostered
    a love for the outdoors, hunting, and fishing, while the regional emphasis on steady, manual labor reinforced his respect for routine jobs and hands‑on expertise.
attributes:
  skills: '["Framing and structural carpentry", "Concrete mixing and finishing", "Drywall installation and taping", "Roof shingle and metal roofing installation", "Power tool operation (circular saw, nail
    gun, jackhammer)", "Blueprint reading and plan interpretation", "On‑site safety inspections and OSHA compliance", "Team coordination for small crews", "Basic plumbing and electrical rough‑ins"]'
  hobbies: '["Fishing at local lakes", "Deer hunting", "Woodworking (handcrafted furniture)", "Home improvement projects", "Classic rock music listening", "College football (Arkansas Razorbacks) fan", "Model
    building (scale car kits)", "Truck maintenance and off‑roading"]'
  career_goals: Brian wants to translate his reliability and deep practical knowledge into a supervisory role. He is working toward an OSHA 30‑hour certification and a journeyman badge in carpentry, aiming
    to become a crew foreman within the next three years. Long‑term, he hopes to start a modest, family‑run renovation business that focuses on straightforward, high‑volume home repair jobs, allowing him
    to maintain a predictable schedule and steady income that eases his anxiety about financial security.
