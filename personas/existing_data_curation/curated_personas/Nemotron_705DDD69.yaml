  career_goals: Although retired from formal employment, Carolyn aims to remain intellectually active and socially engaged. Her primary ambitions include leading a senior‑focused technology workshop series
    at the local library, mentoring high‑school students interested in STEM through a community outreach program, and documenting the oral history of Sutherlin’s early settlers. She also aspires to advocate
    for mental‑health awareness among older adults, drawing on her own experiences with anxiety and sadness, and to collaborate with local environmental groups on native‑plant restoration projects.
