personas:
  professional: Lakita Goldsmith, a 23‑year‑old maintenance technician specializing in residential electrical and mechanical systems, leverages a methodical, step‑by‑step approach and a calm demeanor to
    diagnose faults and ensure safety, while using their strong interpersonal skills to coordinate small crews and deliver courteous service.
  sports: Lakita Goldsmith enjoys weekend pick‑up basketball at the community center, follows the local NBA franchise—the Atlanta Hawks—with enthusiastic loyalty, and supports the regional soccer club,
    Atlanta United, while they keep fit through daily walks in the neighborhood park.
  arts: Lakita Goldsmith unwinds to the smooth tones of Anita Baker, classic hip‑hop tracks by A Tribe Called Quest, and soul classics from Marvin Gaye, while diving into mystery novels by Gillian Flynn,
    and they occasionally volunteer at the community center’s after‑school drama club, where they help set up lighting for student productions.
  travel: Lakita Goldsmith favors short road trips to nearby cultural gems like Asheville’s folk art markets and the historic streets of New Orleans, dreams of exploring Kyoto’s serene gardens to deepen
    their horticultural hobby, and they prefer low‑cost planning that balances their limited budget with occasional spontaneous weekend getaways.
  culinary: Lakita Goldsmith’s culinary repertoire centers on Southern comfort food—spicy gumbo, crispy fried catfish, collard greens seasoned with smoked turkey, and buttery cornbread—enhanced by fresh
    basil, thyme, and cilantro harvested from their balcony garden, and they often experiment with new spice blends to keep meals exciting.
  core: Lakita Goldsmith blends a practical hands‑on skill set with a love for soulful music and garden herbs, yet they often let tools scatter across the apartment and occasionally miss deadlines due to
    their laid‑back approach to planning.
background:
  cultural: Lakita is a Black woman raised in Worcester, Massachusetts, deeply rooted in the local African‑American community. Her upbringing emphasized church participation, family gatherings centered
    around soul food, and celebrations of cultural milestones like Juneteenth. She values the resilience and support networks cultivated within her community, drawing inspiration from the rich musical heritage
    of gospel, R&B, and hip‑hop. These cultural influences shape her practical outlook, collaborative spirit, and dedication to helping others in her neighborhood.
