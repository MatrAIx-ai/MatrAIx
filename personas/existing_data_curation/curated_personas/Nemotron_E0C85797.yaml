  hobbies: '[''DIY home improvement projects'', ''Urban gardening'', ''Cooking comfort food'', ''Listening to R&B and soul music'', ''Reading mystery novels'', ''Volunteering at community center'', ''Walking
    local parks'', ''Watching classic movies'']'
  career_goals: Lakita aims to earn certifications such as the Certified Maintenance & Reliability Technician (CMRT) and broaden her expertise in HVAC and commercial refrigeration. She envisions advancing
    to a senior maintenance technician role where she can mentor newer workers and help develop efficient maintenance schedules. Long‑term, she hopes to launch a small, community‑focused repair service
    that provides reliable, affordable maintenance for local households and small businesses, emphasizing routine care and personal trust.
