personas:
  professional: Richard Vital is a master‑level carpenter in Tampa who leverages his precise blueprint reading, disciplined scheduling, and competitive drive to deliver high‑end sustainable residential
    projects, often mentoring apprentices while insisting on flawless joinery and code compliance.
  sports: Richard Vital is a dedicated Tampa Bay Rays season ticket holder who also joins a local fishing charter crew for early‑morning Gulf Coast trips, follows the Tampa Bay Lightning hockey schedule,
    and plays recreational softball on a community carpenters’ league team.
  arts: Richard Vital frequents classic rock concerts, citing The Rolling Stones and Led Zeppelin as his go‑to live acts, enjoys salsa dancing at Puerto Rican cultural festivals, and collects vintage woodworking
    manuals that double as artistic coffee‑table books.
  travel: Richard Vital plans his travel with a blend of structure and spontaneity, favoring weekend getaways to the Florida Keys for fishing, annual trips to Puerto Rico to experience its festive culture,
    and a long‑awaited road trip along the Pacific Coast to study sustainable architecture.
  culinary: Richard Vital’s palate leans toward fresh Gulf seafood—grilled grouper with lemon‑butter, shrimp étouffée, and hand‑made crab cakes—while his woodworking hobby inspires him to craft his own
    wooden cutting boards and spice racks, and he enjoys occasional backyard BBQs featuring smoked brisket seasoned with smoked paprika.
  core: Richard Vital blends disciplined craftsmanship with a competitive edge, balancing meticulous project management, structured finances, and a love for solo fishing trips, all while indulging in classic
    rock and occasional salsa rhythms.
background:
  cultural: Richard’s Puerto Rican heritage is a central part of his identity, shaping his values of resilience, family loyalty, and community celebration. Bilingual in Spanish and English, he often incorporates
    Caribbean rhythms and flavors into his life, cooking traditional dishes like mofongo and arroz con gandules for friends and family. Growing up in a close‑knit Puerto Rican community in Florida, he participates
    in annual festivals that feature plena and bomba music, and he maintains strong ties with relatives in Puerto Rico through regular video calls. While he embraces the laid‑back coastal lifestyle of Tampa,
    he also upholds the disciplined work ethic and pride in craftsmanship that are hallmarks of his cultural background.
