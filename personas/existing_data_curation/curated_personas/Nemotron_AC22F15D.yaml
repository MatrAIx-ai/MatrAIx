  hobbies: '[''Custom furniture building'', ''Vintage furniture restoration'', ''Gulf Coast fishing'', ''Salsa dancing'', ''Habitat for Humanity volunteering'', ''Tampa Bay Rays fandom'', ''Attending rock
    concerts'', ''Reading craftsmanship literature'']'
  career_goals: Richard aims to become a certified master carpenter within the next three years and eventually launch his own design‑build firm that specializes in high‑end, sustainable residential projects
    in the Tampa area. He plans to obtain a journeyman certification, complete a professional course in green building practices, and build a portfolio of custom furniture pieces that showcase his meticulous
    attention to detail. Long‑term, he envisions expanding his business to include a small crew of skilled tradespeople, positioning himself as a go‑to contractor for clients who value structured project
    management and uncompromising quality.
