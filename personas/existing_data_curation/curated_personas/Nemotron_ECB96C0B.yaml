  career_goals: Russell aims to secure an internship at a local tech firm to gain hands‑on experience, then complete a bachelor’s degree in Computer Science. His long‑term ambition is to become a full‑stack
    developer who builds scalable applications that serve small businesses in the Columbia area. He also envisions launching a community‑focused mentorship program that introduces high‑school students to
    coding and entrepreneurship, merging his practical career goals with a desire to give back to his community.
