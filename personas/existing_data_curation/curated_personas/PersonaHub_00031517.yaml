persona_description: A researcher in the field of particle transport, deposition, and structuring on boundary surfaces, particularly interested in studying complex systems of polydisperse and non-spherical
  particles, bio-particles, and their transformations under surface forces. This person is likely to have expertise in electrostatics, hydrodynamics, and transport, and is well-versed in the use of traditional
  theories, new approaches, and phenomenological methods to derive concrete expressions for basic effects. They are also likely to be familiar with relevant formulae and equations, as well as the math and
  physics involved in their studies, and are primarily interested in disseminating their findings to students and young scientists.
