personas:
  professional: Pedro West, a retired mechanical repair specialist, channels his lifelong hands‑on expertise into mentoring young relatives and volunteers at the community garden, where they apply practical
    know‑how to equipment upkeep, composting, and heirloom seed preservation while balancing a relaxed attitude toward strict planning with a competitive drive in senior chess matches.
  sports: Pedro West enjoys regular walks along the Salinas River coastal trail, follows the San Francisco Giants baseball team, and participates in the local senior walking club while occasionally joining
    a community senior basketball pick‑up game.
  arts: Pedro West spends evenings listening to classic boleros by Luis Miguel and José José and to mariachi performances by Mariachi Vargas de Tecalitlán, dives into historical novels such as Ken Follett’s
    'The Pillars of the Earth' and reads biographies of notable figures, and watches classic films by directors like Luis Buñuel, allowing these cultural experiences to inform their reflective worldview.
  travel: Pedro West has explored the Monterey Peninsula, the vineyards of Napa Valley, and the historic missions of Santa Barbara, and they dream of a road trip along the Pacific Coast Highway to experience
    the rugged cliffs of Big Sur and the desert heritage sites of New Mexico.
  culinary: Pedro West delights in preparing pozole with hominy, pork shoulder, and dried chilies, crafting tamales using masa, pork fillings, and fresh cilantro, and they regularly experiment with homemade
    salsa verde featuring tomatillos and jalapeños, showcasing a solid intermediate cooking skill set.
  core: Pedro West blends a practical, hands‑on mind with a nostalgic love for heirloom gardening, woodworking, and traditional cooking, while their competitive streak and occasional worry color both their
    social games and daily routines.
background:
  cultural: Pedro’s cultural background is a blend of Mexican heritage and California agricultural life. His parents emigrated from the state of Jalisco in the 1950s, bringing a strong family ethic, Catholic
    traditions, and a love for home‑cooked Mexican cuisine. Growing up in Salinas, a city known for its farms and a vibrant Latino community, he was immersed in bilingual environments—switching effortlessly
    between Spanish at family gatherings and English at school and work. The rhythms of the Central Valley’s farming cycles shaped his appreciation for hard work, seasonal foods, and community solidarity.
    He celebrates Día de los Muertos and Las Posadas with his extended family, maintains a small altar at home, and passes down recipes and folk stories. While fully integrated into American society, his
    Mexican roots continue to inform his values of family loyalty, respect for tradition, and a pragmatic approach to life.
