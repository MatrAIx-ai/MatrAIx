  hobbies: '[''Playing basketball at the local park'', ''Attending church services and choir'', ''Cooking soul‑food inspired meals'', ''Volunteering for community clean‑up projects'', ''Listening to jazz
    and hip‑hop music'', ''DIY home improvement projects'', ''Participating in local cultural festivals'', ''Watching documentaries on African American history'']'
  career_goals: Jerome aims to complete his GED within the next year and enroll in a vocational training program, ideally in HVAC or automotive technology, to secure stable, well‑paid employment. He envisions
    leveraging his organizational strengths to become a certified technician who can also lead community workshops on home safety and maintenance. Long‑term, he hopes to start a small, locally‑focused repair
    service that employs other community members and provides mentorship opportunities for at‑risk youth.
