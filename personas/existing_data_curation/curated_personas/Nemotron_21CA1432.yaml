personas:
  professional: Chauvin Andrews, a 35-year-old community-focused aspiring HVAC/automotive technician, leverages their hands-on repair expertise, event-planning experience, and natural knack for mediating
    disputes to coordinate neighborhood workshops and eventually launch a small, locally-run repair service that mentors at-risk youth.
  sports: Chauvin Andrews is a regular at the North Avenue Park basketball court, cheering for the Milwaukee Bucks during the NBA season and joining the community recreation league's summer softball team,
    while also following the Green Bay Packers for fall football and taking occasional ice-skating laps at the downtown rink.
  arts: Chauvin Andrews immerses themselves in the city's music scene, singing in the church choir, attending live jazz sets at the Jazz Cafe featuring artists like Miles Davis tributes, vibing to Kendrick
    Lamar tracks, and catching performances at the Milwaukee Repertory Theater.
  travel: Chauvin Andrews prefers short road trips that fit a modest budget, having explored the historic streets of Chicago, the lakeside charm of Door County, and dreaming of a pilgrimage to New Orleans
    for its rich musical heritage, always planning itineraries with friends and using a reliable family car for the journey.
  culinary: Chauvin Andrews excels at cooking soulful comfort food, regularly preparing collard greens seasoned with smoked turkey, buttery cornbread, and sweet potato pie, while also experimenting with
    hot sauce blends and hosting Sunday potlucks where friends savor their seasoned fried chicken and mac and cheese.
  core: Chauvin Andrews blends practical DIY savvy, community-first ambition, and a love for music and food into a resilient yet occasionally impulsive lifestyle that fuels their goal of building a neighborhood
    repair hub.
background:
  cultural: Jerome grew up in Milwaukee’s historic Black neighborhoods, where church, family ties, and community centers played central roles in daily life. He was raised with stories of the Great Migration
    and the city’s civil‑rights legacy, fostering a strong sense of pride in African‑American heritage. Local traditions—such as Sunday potlucks, block parties, and neighborhood mentorship programs—have
    shaped his values of cooperation, resilience, and collective uplift. While navigating the challenges of limited formal schooling, he draws strength from the cultural emphasis on community solidarity,
    music, and shared histories that permeate his city’s Black cultural institutions.
attributes:
  skills: '[''Event coordination'', ''Basic automotive repair'', ''Carpentry basics'', ''Home maintenance'', ''Community outreach'', ''Conflict mediation'', ''Basic computer literacy'', ''Cooking and meal
