  career_goals: Although retired from regular employment, Leonila aspires to complete a handwritten memoir that weaves together her family’s immigration story, recipes, and reflections on art. She hopes
    to curate a community exhibition of Mexican folk art at the local library, showcasing works by senior artists and preserving cultural heritage. Leonila also dreams of publishing a small booklet of family
    recipes accompanied by illustrations from her own paintings. She plans to mentor a few younger Mexican‑American artists through occasional one‑on‑one workshops, sharing technical skills and cultural
    insights. In line with her competitive streak, Leonila intends to enter the annual Chicago Seniors Art Competition and win a recognition for her mixed‑media series that blends traditional motifs with
    contemporary ideas. Maintaining her independence and mental acuity is a personal ambition, prompting her to keep learning new artistic techniques such as collage and digital illustration.
