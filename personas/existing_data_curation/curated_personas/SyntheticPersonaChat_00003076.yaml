    User 2: That''s great. I love spending time with my kids too.

    User 1: I''m glad.

    User 2: So, what do you do for fun?

    User 1: I like to go fishing, go for walks in the woods, and read.

    User 2: That sounds like a lot of fun. I like to go scuba diving with my wife.

    User 1: That sounds like a lot of fun too. I''ve never been scuba diving before.

    User 2: You should try it sometime. It''s a lot of fun.

