  career_goals: Jun aims to obtain NICET Level III certification and become a master installer recognized throughout Los Angeles County. He plans to launch his own boutique firm that specializes in high-end
    residential and boutique commercial security solutions, emphasizing seamless aesthetic integration and advanced smart-home connectivity. Over the next five years, he hopes to develop a proprietary alarm
    platform that blends traditional safety standards with contemporary design, mentor a new generation of installers, and earn a reputation as a community resource for fire safety education.
