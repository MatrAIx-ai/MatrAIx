personas:
  professional: Jun Wei is a seasoned fire alarm and security system designer in Los Angeles County, whose meticulous code mastery (NFPA 72), bilingual client consulting, and competitive drive ensure that
    they deliver every high‑end residential installation with seamless safety and sleek, contemporary aesthetics.
  sports: Jun Wei is an avid hiker on the Angeles National Forest trails, a regular member of the Los Angeles Hiking Club, and a steadfast supporter of the Los Angeles Dodgers and LA Galaxy, while they
    also engage in weekly Go matches at a local cultural club that satisfy their strategic competitive streak.
  arts: Jun Wei frequently visits the Broad and LACMA to study contemporary installations by artists such as James Turrell and Ai Weiwei, and they capture urban architecture through street‑level photography
    inspired by the compositions of Julie Mehretu, sharing their curated images on an Instagram feed.
  travel: Jun Wei meticulously plans weekend escapes to Santa Barbara’s vineyards and annual trips to Kyoto for cherry‑blossom lantern festivals, while they budget for a future immersive road‑trip along
    the Pacific Coast Highway to document coastal fire‑safety installations.
  culinary: Jun Wei enjoys crafting Chinese‑California fusion dishes such as Sichuan‑peppercorn tofu tacos and mooncake‑inspired avocado tartlets, using ingredients like smoked salmon, matcha powder, and
    fresh cilantro, and they often experiment in the kitchen after attending Mid‑Autumn Festival gatherings.
  core: Jun Wei blends an engineer’s precision with an artist’s curiosity, turning fire‑safety projects into sleek smart‑home experiences while they balance disciplined financial planning, health vigilance,
    and a love for solitary hikes and creative cooking.
background:
  cultural: Jun Wei is a second-generation East Asian American, born to parents who emigrated from Guangdong Province, China, in the 1970s. Raised in the multicultural enclave of La Puente, he grew up bilingual
    in Mandarin and English, absorbing traditional Chinese values of discipline, respect for elders, and collective responsibility. Family celebrations such as Chinese New Year and the Mid-Autumn Festival
    remain central to his household. These cultural roots influence his meticulous approach to work, his appreciation for craftsmanship, and his calm resilience. At the same time, his long-standing residence
    in Southern California has blended these traditions with a pragmatic, entrepreneurial spirit characteristic of the local Asian-American community.
