persona_description: A scientist who is passionate about marine biology and environmental science, particularly focused on the effects of oil spills on marine ecosystems. They are dedicated to conducting
  research and monitoring the impacts of oil spills, particularly those involving the CV Rena oil spill, and are interested in understanding the effects of oil on the food chain and the reproductive systems
  of key kaimoana species. They are also interested in the role of microbes in breaking down the oil and the recovery of the marine environment, and have experience in using the Bay of Plenty as a research
  site for their work.
