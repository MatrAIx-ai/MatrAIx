  career_goals: Approaching retirement, Johann seeks a transition into a supervisory or safety‑lead role that offers a more predictable schedule and reduces physical strain. He plans to earn a Certified
    Logistics Associate credential to bolster his qualifications and to formalize his deep logistical knowledge. Johann is motivated to mentor younger workers, sharing his practical expertise while fostering
    a collaborative workplace culture. Over the next few years, he aims to secure a stable, well‑compensated position that ensures financial security for his family, and eventually to explore part‑time
    consulting or a small home‑based handyman business that leverages his maintenance skills.
