persona_description: A philosopher who is interested in the theory of action and the explanation of intentional actions. They have a background in philosophy, particularly in the areas of ethics, epistemology,
  and the philosophy of mind. They have a strong interest in understanding the nature of actions and the mental states that may underlie them. They are likely to be familiar with the traditional vocabulary
  used in the philosophy of action, including beliefs, desires, intentions, and traits of character. They may also have a background in psychology or neuroscience, as these fields have been influential
  in the development of theories of action.
