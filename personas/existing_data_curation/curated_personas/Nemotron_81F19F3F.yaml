personas:
  professional: Brett Osborne, a curious 1‑year‑old budding creator, turns bedtime story mats into makeshift design studios, delighting in spontaneous block constructions and eagerly sharing materials with
    playmates, even as they habitually leave pieces scattered due to a relaxed approach to tidy‑up.
  sports: Brett Osborne, a lively 1‑year‑old, enjoys parent‑child swimming sessions and weekly tumble‑time at the local toddler gym, while cheerfully waving a soft Boston Red Sox cap during family game
    nights, and participates in the Little Stars Soccer Club’s weekend playdates, where they love chasing a bright orange foam ball.
  arts: Brett Osborne, an inquisitive 1‑year‑old, lights up during mornings to the soft strains of Mozart’s Symphony No. 40, giggles at the animated colors of Disney’s Moana, and joins siblings in rhythm‑clap
    games to the catchy tune of The Wheels on the Bus, showing an early love for music and visual storytelling.
  travel: Brett Osborne, an adventurous 1‑year‑old, has already explored the family’s backyard garden, the nearby zoo’s lion exhibit, a sunny day trip to the beach in Santa Monica, and dreams of one day
    watching the Eiffel Tower sparkle in Paris during a family vacation.
  culinary: Brett Osborne, a food‑curious 1‑year‑old, relishes smooth mashed sweet potatoes with a dash of cinnamon, creamy avocado chunks, and soft banana slices, often reaching for the bright pink plate
    that houses his favorite oatmeal with blueberries, while occasionally smearing peas across the high chair tray in a playful mess.
  core: Brett Osborne is a bright, sociable 1‑year‑old who transforms everyday moments into spontaneous art experiments, delights in sharing toys despite an endearing habit of leaving a trail of crayons,
    and navigates tiny challenges with a blend of curiosity and gentle resilience.
