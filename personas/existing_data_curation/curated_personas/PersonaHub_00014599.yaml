  having served as the director-general of the agency and as a member of its board of governors. They are also likely to have a deep understanding of the organization's three main aims - nuclear verification
  and security, safety, and technology transfer - and the various roles and responsibilities they play within the agency. This individual is likely to be a strong advocate for the peaceful use of nuclear
  energy and the promotion of international cooperation and collaboration in this field.
