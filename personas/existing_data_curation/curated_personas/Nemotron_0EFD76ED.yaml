  career_goals: Wilfredo aims to advance from a front‑line specialist to a supervisory role, such as Quality Control Shift Lead or Operations Supervisor, where he can shape process‑improvement projects
    and mentor a larger team. He plans to obtain his GED, followed by certifications like Certified Quality Technician (CQT) and a Six Sigma Green Belt, to solidify his technical credibility. Long‑term,
    he envisions moving into a process‑optimization analyst position or launching a consultancy that helps small manufacturers implement efficient measurement and recordkeeping systems. These goals reflect
    his desire for stable career growth, financial security for his family, and the ability to apply his curiosity for new quality‑control technologies.
