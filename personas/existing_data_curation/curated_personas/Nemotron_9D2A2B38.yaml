  career_goals: Taryn dreams of becoming an artist who can bring her imagination to life, a scientist who explores the mysteries of the ocean, or a teacher who shares stories and art with other kids. She
    is fascinated by the idea of using her creativity to solve real‑world problems, perhaps as an environmental designer or a museum curator. In the short term, she wants to improve her drawing skills,
    learn more advanced Scratch techniques, and practice piano so she can create her own interactive art projects when she grows up.
