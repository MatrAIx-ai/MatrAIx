personas:
  professional: Taryn Robinson, an eight-year-old aspiring illustrator and junior LEGO architect, channels their curiosity and love for organization into detailed sketches, vibrant watercolour scenes, and
    intricate brick builds, while using Scratch to prototype animated stories that blend sci-fi adventure with everyday observations.
  sports: Taryn Robinson, a spirited member of the Little LA Galaxy U8 soccer team, dashes through the neighborhood park with the same energy that fuels their tag games, keeps a scrapbook of LA Dodgers
    baseball scores and Lakers highlight reels, and treats every practice as a mini-workout, balancing structured drills with spontaneous beach sprints.
  arts: Taryn Robinson, a budding artist who fills sketchbooks with whimsical watercolour scenes inspired by Monet and the playful characters of Studio Ghibli, dazzles drama club peers with impromptu renditions
    of Lin-Manuel Miranda songs, and assembles tiny LEGO dioramas while humming Taylor Swift's latest chorus, weaving their love for music, theater, and visual art into daily play.
  travel: Taryn Robinson, who prefers spontaneous weekend outings over long-term itineraries, has explored the tide pools of Pacific Palisades, trekked the Santa Monica Mountains with family, dreams of
    a summer visit to Disneyland's Magic Kingdom, and keeps a doodled map of imagined trips to the Great Barrier Reef pinned above their desk.
  culinary: Taryn Robinson, a self-declared 'chef-in-training', savors crunchy fish tacos with lime, whips up quick strawberry-banana smoothies after soccer practice, proudly assembles peanut-butter-jelly
    sandwiches in perfect squares, yet habitually leaves their vegetables untouched, turning broccoli into an unintentional art canvas.
  core: Taryn Robinson, an eight-year-old whirlwind of curiosity, blends sketch-book stories, LEGO engineering, and impromptu stage performances into a vibrant, organized-yet-playful worldview, occasionally
    misplacing socks and snack wrappers in the creative chaos.
background:
  cultural: Taryn comes from a White, middle‑to‑upper‑class American family living in Pacific Palisades, an affluent coastal community in Los Angeles County. Her upbringing blends a relaxed beach lifestyle
    with a strong emphasis on education and the arts. She celebrates typical U.S. holidays such as Thanksgiving and Independence Day, while also taking part in local community events like beach clean‑ups
    and cultural festivals at nearby venues. Exposure to the diverse neighborhoods of Los Angeles, frequent museum trips, and family vacations has broadened her worldview, fostering an appreciation for
    both her own cultural heritage and the multicultural environment around her.
