personas:
  professional: An aspiring automotive technician, 16‑year‑old Kenneth Boucher combines his hands‑on garage experience with the strategic mindset honed from competitive gaming, preferring practical, short‑term
    projects but often pushing back against rigid schedules as they work toward a community‑college certification and eventually a performance‑tuning shop.
  sports: A sports‑savvy adolescent, 16‑year‑old Kenneth Boucher splits his weekly routine between pickup basketball at the Barry County Community Center (cheering on the Detroit Pistons on TV), grinding
    tricks at the local skate park, and casting lines for largemouth bass on nearby lakes, where they treat each catch as a personal high‑score and maintain a modest home‑gym routine of body‑weight exercises
    to stay agile for both skateboarding and drag‑racing dreams.
  arts: A creative tinkerer, 16‑year‑old Kenneth Boucher spends rainy weekends assembling scale model rockets and die‑cast car kits while blasting Foo Fighters and Linkin Park, and they regularly binge‑watch
    the Fast & Furious franchise for inspiration on custom exhaust designs.
  travel: An adventurous traveler at heart, 16‑year‑old Kenneth Boucher prefers weekend camping trips to state parks and impromptu fishing getaways, yet dreams of a cross‑country road trip to attend the
    annual PAX West gaming expo in Seattle, balancing limited family funds with a meticulously saved travel fund and a DIY itinerary that includes stops at historic auto museums.
  culinary: A budding home chef, 16‑year‑old Kenneth Boucher enjoys grilling freshly caught bass with lemon‑pepper rub, tossing pepperoni pizza on the family oven, and whipping up quick spaghetti Bolognese,
    though they often indulge in late‑night snack runs for chicken‑nuggets and energy drinks after marathon gaming sessions.
  core: Kenneth Boucher, a 16‑year‑old gear‑head and competitive gamer, balances a love for hands‑on mechanics with impulsive spending, occasional procrastination, and a relentless drive to turn their teenage
    hobbies into a future performance‑tuning business.
background:
  cultural: Kenneth was raised in a predominantly white Midwestern community in Hastings, Michigan, with family roots tracing back to German and Irish ancestry. The local culture emphasizes practicality,
    self‑reliance, and a strong work ethic, values reinforced by frequent community events such as county fairs, church gatherings, and Fourth of July barbecues. Growing up in Barry County, he has been
    exposed to a blend of rural traditions—like family fishing trips on the Muskegon River and seasonal hunting—and modern influences through internet gaming and social media. This mix of old‑world family
    values and contemporary digital culture shapes his pragmatic outlook, competitive nature, and occasional skepticism toward others' motives while maintaining a stable emotional baseline.
attributes:
  skills: '["Automotive maintenance", "Basic carpentry", "Computer hardware troubleshooting", "Strategic video gaming", "Short‑term project organization", "Outdoor survival basics", "Lawn care and landscaping"]'
  hobbies: '["Competitive video gaming", "Fishing", "Car tinkering", "Skateboarding", "Model kit building", "Basketball", "Camping"]'
  career_goals: Kenneth aims to earn a certification as an automotive technician at a community college after obtaining his GED. He envisions working in a local garage to deepen his mechanical expertise
    and eventually opening a small performance‑tuning shop that caters to fellow car enthusiasts in Barry County. He also dreams of turning his knack for quick, competitive thinking into a side hustle managing
    a local e‑sports tournament or offering private tutoring in gaming strategy. Long‑term, he hopes to achieve financial independence, run his own business, and possibly compete in amateur drag racing,
    blending his love for competition with practical trade skills.
