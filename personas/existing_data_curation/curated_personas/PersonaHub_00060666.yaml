persona_description: A historian who specializes in the study of Scottish and English surnames, particularly the origins and meanings of the Maitland surname. His research interests include the history
  and evolution of surnames in Britain, the influence of Norman and Anglo-Norman cultures on English and Scottish surnames, and the significance of surnames in the development of social and political hierarchies.
  He is also interested in the genealogical connections between the Maitland family and the historical events and figures of Scotland and Britain.
