persona_description: A neuroscientist who studies the development and maturation of the human brain, specifically focusing on the impact of genetics on brain structure and function during childhood and
  adolescence. She is particularly interested in the heritability of brain thickness in specific areas such as the frontal, temporal, and parietal lobes, which are known to be associated with mental disorders.
  Her research has been published in leading scientific journals and has contributed to a better understanding of the genetic underpinnings of mental illness.
