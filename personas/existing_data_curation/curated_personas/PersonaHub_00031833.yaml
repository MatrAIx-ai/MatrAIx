persona_description: Lynda Johnson Robb, eldest daughter of Lyndon Baines Johnson, is a historian and civil rights advocate who is interested in the legacy and impact of the Civil Rights Act of 1964 and
  its role in changing American society and race relations. She is knowledgeable about her father's political career and the strategies and actions that led to its passage. Robb's interest is further fueled
  by her personal experience of growing up in the shadow of her father's presidency and her role as a panelist on a panel discussing the act's 50th anniversary.
