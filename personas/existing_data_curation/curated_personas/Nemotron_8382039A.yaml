  career_goals: Although retired from full‑time employment, Allyson aims to channel her expertise into meaningful community impact. She plans to mentor emerging STEM talent through local workshops, serve
    on the board of an environmental non‑profit in Marin County, and launch a collaborative community garden project that integrates sustainable practices with educational programs. She also aspires to
    write a guidebook on organic gardening and pursue a certification in peer‑support counseling to help others navigate anxiety and emotional distress. Managing her finances prudently while ensuring a
    secure and fulfilling retirement remains a core ambition.
