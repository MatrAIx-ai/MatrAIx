  hobbies: '[''Organic Gardening'', ''Hiking'', ''Birdwatching'', ''Historical Biography Reading'', ''Puzzle Solving'', ''Cooking Mediterranean Cuisine'', ''Yoga and Meditation'', ''Knitting'', ''Community
