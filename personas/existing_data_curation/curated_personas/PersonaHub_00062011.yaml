  and the preservation of organic matter in these conditions. They are also knowledgeable about the impacts of global anoxia on marine ecosystems and the preservation of organic matter in sedimentary rocks.
  This person is likely to have a deep understanding of the processes involved in the formation of sedimentary rocks and their importance in the preservation of organic matter.
