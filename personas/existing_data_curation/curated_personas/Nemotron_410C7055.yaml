  career_goals: Although retired, Lan aspires to continue contributing her expertise to the San Mateo community. She aims to volunteer as a financial advisor for the local senior center, helping fellow
    retirees manage their budgets and plan for future expenses. Lan also hopes to establish a modest community garden project, where she can apply her garden design skills while fostering intergenerational
    interaction. Additionally, she dreams of preserving her family's culinary heritage by compiling a handwritten cookbook of traditional recipes for her grandchildren, ensuring cultural continuity and
    practical life lessons.
