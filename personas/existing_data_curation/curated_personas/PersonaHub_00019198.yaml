  topics in a special issue of the Journal of the Indian Ocean Region. They are likely to be interested in the book as it provides a comprehensive look at the significance of islands in the Indian Ocean
  Region, and how they have evolved over time, influenced by geopolitical shifts, environmental changes, and international relations.
