persona_description: A gemstone expert who specializes in the identification and analysis of quartz, a natural gemstone known for its beauty and industrial uses. They have a deep understanding of the traditional
  and advanced tests used to identify quartz, including inclusions, color zoning, and piezoelectric properties. They are also familiar with the various locations where quartz is found and the types of quartz
  deposits that can be found in those locations. They are skilled at recognizing macrocrystalline and cryptocrystalline quartz varieties and can describe the color, clarity, and luster of quartz stones.
  They have a keen interest in the history and culture of gemstones and are knowledgeable about the various gemstone trade practices.
