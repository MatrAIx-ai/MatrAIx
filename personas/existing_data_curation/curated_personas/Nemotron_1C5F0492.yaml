  career_goals: In the short term, Jeric aims to earn his GED within the next year and secure a part‑time apprenticeship in either computer repair or a skilled trade such as electrical or HVAC work. He
    plans to continue building a modest online presence by creating gaming tutorial videos, hoping to generate some supplemental income. Over the longer horizon, Jeric aspires to become a certified IT support
    specialist or a licensed tradesperson, combining his love for technology with hands‑on practical work. Ultimately, he envisions launching a small business that offers tech support, custom PC builds,
    and basic handyman services for his community, leveraging his organized approach and practical expertise.
