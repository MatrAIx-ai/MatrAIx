personas:
  professional: Jeric Ramkissoon, a 16‑year‑old aspiring IT support specialist, combines their self‑taught PC building expertise, meticulous project planning, and cooperative problem‑solving to volunteer
    at the local library’s computer stations while producing concise gaming tutorial videos that showcase their organized, assertive style.
  sports: Jeric Ramkissoon shoots hoops with the Westside Youth Hoops Club, follows the NBA’s Golden State Warriors, skates at the neighborhood skate park, and spends weekends fishing at Lake Riverside,
    blending competitive play with relaxed outdoor pursuits.
  arts: Jeric Ramkissoon channels their creativity through LEGO builds and model kits while listening to soundtrack composer Hans Zimmer, streaming game commentary inspired by YouTuber Game Theory, and
    occasionally binge‑watching the sci‑fi series 'The Expanse.'
  travel: Jeric Ramkissoon has explored the nearby lakes for fishing trips, dreams of backpacking through Japan's countryside to experience its tech culture and sushi, and hopes to trek Iceland's volcanic
    landscapes when their savings and GED are completed.
  culinary: Jeric Ramkissoon enjoys whipping up quick chicken teriyaki with soy sauce and ginger, devouring spicy ramen with chili oil, and treating friends to homemade fish tacos seasoned with lime and
    cilantro, though they often rely on instant noodles during late‑night gaming marathons.
  core: Jeric Ramkissoon is a methodical teen who balances tech‑savvy gaming, hands‑on DIY projects, and community service, all while juggling a disciplined yet occasionally impulsive approach to money
    and self‑care.
background:
  cultural: Jeric grew up in Ocala, Florida, a small city known for its blend of suburban life and rural traditions. His family reflects a middle‑class, predominantly White community where values such as
    self‑reliance, practicality, and community involvement are emphasized. The local culture appreciates outdoor activities like fishing and skateboarding, while also embracing the growing digital interests
    of younger generations. Jeric's upbringing combines traditional Southern hospitality and a supportive neighborhood network with exposure to modern technology, shaping his pragmatic curiosity, organized
    mindset, and balanced social‑alone dynamic.
