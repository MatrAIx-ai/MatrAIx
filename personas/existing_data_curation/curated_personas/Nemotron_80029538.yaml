personas:
  professional: A project management professional with a strong engineering and data analysis background, Guillermo Marizan uses Python, MATLAB, and Tableau to streamline processes for community-focused
    tech initiatives, while their methodical planning and bilingual communication skills make them the go‑to organizer for STEM workshops and local nonprofits.
  sports: An avid participant in local adult soccer, Guillermo Marizan plays forward for the Orlando County Strikers, cheers on the Orlando Magic and Orlando City SC during the NBA and MLS seasons, and
    dedicates weekend mornings to hiking the Wekiwa Springs trails, balancing competitive team dynamics with personal endurance goals.
  arts: A devoted lover of visual and musical arts, Guillermo Marizan frequently visits the Orlando Museum of Art to study works by Frida Kahlo and Diego Rivera, enjoys listening to classic rancheras by
    Juan Gabriel and the soulful guitar of Carlos Santana, and volunteers as a bilingual storyteller, blending narrative tradition with community theatre.
  travel: A purposeful traveler with a family‑first mindset, Guillermo Marizan has explored the historic streets of San Miguel de Allende, taken a road trip to the Grand Canyon for adventure photography,
    and plans a future cultural pilgrimage to Oaxaca to attend Día de los Muertos celebrations, always balancing travel costs with a carefully allocated vacation fund.
  culinary: A passionate home chef, Guillermo Marizan perfects tacos al pastor with pineapple‑marinated pork, crafts mole poblano infused with chocolate and toasted sesame seeds, and experiments with chiles
    en nogada, showcasing a skillful blend of traditional flavors and modern plating techniques, yet occasionally forgets to defrost the next day’s ingredients.
  core: Guillermo Marizan blends meticulous engineering expertise with community‑centric enthusiasm, juggling project deadlines, family gatherings, and a love for puzzles while habitually over‑planning
    and worrying about every detail.
background:
  cultural: Guillermo was raised in a close‑knit Mexican immigrant family that values hard work, education, and strong family ties. He grew up speaking Spanish at home and celebrates Mexican traditions
    such as Día de los Muertos, Las Posadas, and quinceañeras, often taking a leading role in organizing community celebrations in Orlando’s Orange County. His Catholic upbringing influences his participation
    in local parish events, while his bilingual fluency enables him to bridge cultural gaps between the Mexican community and the broader Orlando population. He draws inspiration from the resilience of
    his parents, who migrated to the United States seeking better opportunities, and he remains deeply connected to his heritage through music, food, and community service.
