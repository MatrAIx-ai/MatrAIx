  career_goals: Guillermo aims to re‑enter the professional workforce in a role that blends his technical expertise with his natural aptitude for organization and community engagement. His short‑term goal
    is to obtain a Project Management Professional (PMP) certification and secure a project manager position within a regional technology firm or a nonprofit focused on STEM education. In the medium term,
    he envisions launching a small consulting venture that offers process‑improvement services to local Hispanic‑owned businesses, allowing him to apply his structured problem‑solving skills while maintaining
    a predictable schedule that supports his family. Ultimately, he hopes to become a mentor for aspiring engineers in the Mexican‑American community, encouraging youth to pursue STEM careers.
