personas:
  professional: Stephanie Hogan, a 28‑year‑old systems administrator with a graduate business degree, merges deep technical mastery of LAN/WAN, Cisco/Juniper, and cloud automation with pragmatic, cost‑focused
    problem solving, communicating complex concepts to non‑technical staff while navigating a relaxed, sometimes disorganized workflow that fuels her curiosity‑driven adoption of new technologies, and they
    are praised for clear communication under pressure.
  sports: Stephanie Hogan, an avid jogger along the Big Sioux River and weekend hiker of the Great Plains, trains with the Sioux Falls Running Club, roots for the Sioux Falls Skyforce in the NBA G‑League,
    and trades her hiking boots for cross‑country skis each winter, balancing her fitness routine with a love for spontaneous outdoor challenges, and they never miss a chance to join a local pickup basketball
    game when the weather allows.
  arts: Stephanie Hogan, a sunrise‑obsessed photographer who captures the early light over the prairie and attends intimate shows by Bon Iver, The Lumineers, and local folk duo The Rustic, regularly hosts
    board‑game nights featuring Pandemic and Catan, and finds inspiration in the works of Ansel Adams and contemporary Midwestern painters, and they often experiment with long‑exposure techniques to blend
    music and light.
  travel: Stephanie Hogan, who prefers loosely planned road trips over rigid itineraries, has explored Badlands National Park, driven the scenic byways of Colorado’s Rocky Mountain National Park, and dreams
    of a sunrise yoga retreat in Bali and a tech‑focused conference tour through Tokyo and Berlin, balancing her travel budget with a modest savings plan, and they tend to book flights last minute to keep
    the adventure feeling fresh.
  culinary: Stephanie Hogan, an experimental home chef, frequently whips up Korean bibimbap with gochujang, Indian chicken tikka masala spiced with garam masala, and Ethiopian injera topped with berbere‑seasoned
    lentils, while mastering the art of sous‑vide salmon and occasionally burning toast when a late‑night network issue pulls them away from the kitchen, and they love pairing each dish with a curated playlist
    of indie folk.
  core: Stephanie Hogan, a 28‑year‑old tech‑savvy network specialist who balances curiosity‑driven tinkering with a laid‑back, sometimes disorganized lifestyle, uses yoga and mindfulness to temper their
    anxiety, and dreams of leading a low‑stress, people‑first IT consultancy, and they strive to mentor other women in the field.
background:
  cultural: Stephanie grew up in a middle‑class, predominantly white community in the Midwest, where values of self‑reliance, modesty, and community involvement are emphasized. Her family attended a Lutheran
    church, which instilled a sense of collective responsibility and service. The small‑town environment of Sioux Falls fostered her appreciation for close‑knit social networks, local sports traditions,
    and the region’s seasonal outdoor lifestyle. Her business degree reflects a pragmatic, goal‑oriented mindset common in Midwestern culture, while her career in IT showcases the area's growing embrace
    of technology and innovation. She also respects the regional diversity, acknowledging the historical presence of Indigenous peoples and the evolving demographic fabric of her hometown.
attributes:
  skills: '[''Network design and implementation'', ''Cisco and Juniper routing/switching'', ''Windows Server administration'', ''Linux system management'', ''Virtualization (VMware, Hyper‑V)'', ''Cloud
    services (AWS, Azure)'', ''PowerShell and Bash scripting'', ''IT budgeting and cost‑benefit analysis'', ''Vendor relationship management'', ''Technical troubleshooting and incident response'', ''Security
    best practices and hardening'', ''Cross‑functional communication'', ''Project coordination and documentation'']'
  hobbies: '[''Hiking and nature walks'', ''Jogging along the Big Sioux River'', ''Yoga and mindfulness meditation'', ''Raspberry Pi hobby projects'', ''Listening to cybersecurity podcasts'', ''Landscape
    photography'', ''Experimenting with global cuisine recipes'', ''Board‑gaming with friends'', ''Volunteering for tech‑education outreach'', ''Attending live music events'']'
  career_goals: Stephanie aims to progress from a hands‑on systems administrator to a senior network engineer and ultimately an IT manager who can bridge technology and business strategy. She plans to earn
    CCNP and CISSP certifications within the next two years and lead initiatives that improve network reliability and security for midsize enterprises in the Midwest. Long‑term, she envisions starting a
    boutique consulting firm that helps small businesses adopt scalable cloud and networking solutions while fostering a supportive, low‑stress work culture that promotes employee well‑being. Mentoring
    other women entering IT is also a core ambition.
