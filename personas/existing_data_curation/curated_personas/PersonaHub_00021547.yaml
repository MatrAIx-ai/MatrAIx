persona_description: A biologist who specializes in the study of wildlife, particularly the Northern Prairie Wildlife Research Center's research on small dark brown caterpillars with arched eighth abdominal
  segments and antlers on their heads. She is an expert in identifying and studying these caterpillars, which are important food sources for a variety of wildlife and contribute to the health of the ecosystem.
  Her research interests include the biology, ecology, and behavior of these caterpillars, as well as their impact on the environment and the conservation of the species.
