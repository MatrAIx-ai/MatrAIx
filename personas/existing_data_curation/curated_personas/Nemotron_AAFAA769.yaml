  hobbies: '[''Karaoke'', ''Cooking traditional Chinese cuisine'', ''Hosting dinner parties'', ''Tai chi'', ''Gardening'', ''DIY electronics projects'', ''Smart home technology exploration'', ''Reading
    mystery novels'', ''Volunteering at STEM outreach programs'', ''Attending cultural festivals'']'
  career_goals: Inja aims to attain a Master Electrician license within the next two years and eventually launch her own boutique electrical contracting firm that specializes in sustainable residential
    projects. She is passionate about increasing the visibility of women in the trades, so she plans to develop a mentorship program for female apprentices and partner with local unions to offer workshops
    on green‑energy installations. Long‑term, she envisions taking a leadership role in her community’s safety outreach efforts, conducting free electrical safety seminars for homeowners and advocating
    for greener building practices.
