personas:
  professional: Inja Liu is a seasoned journeyman electrician with over 25 years of residential and light‑commercial wiring expertise, renowned for meticulous project scheduling, a safety‑first mindset,
    and a talkative, client‑centric demeanor that turns complex load calculations into clear conversations while they mentor apprentices on sustainable installations.
  sports: Inja Liu stays fit through senior‑citizen tai chi classes at the community center, roots for the Los Angeles Lakers and the San Francisco 49ers, and they join a local gardening club that organizes
    weekend hikes to the Santa Monica Mountains, mixing low‑impact exercise with seasonal outdoor activity.
  arts: Inja Liu enjoys karaoke nights belting out classics from ABBA, Whitney Houston, and Celine Dion, attends local theater productions of mystery thrillers, and they collect mystery novels by Agatha
    Christie and Tana French, finding inspiration for their DIY electronics projects.
  travel: Inja Liu prefers meticulously planned trips that blend relaxation and discovery, such as weekend stays at the coastal town of Carmel, a week‑long road trip through the Pacific Northwest's national
    parks, and a dream visit to Iceland's geothermal spas, and they allocate time for spontaneous local tours within each destination, all budgeted through a dedicated travel fund.
  culinary: Inja Liu is a confident home chef who expertly balances traditional family recipes like braised pork belly with inventive fusion dishes such as miso‑glazed salmon tacos, favoring fresh herbs,
    ginger, and a splash of lime, and they love hosting friends for multi‑course dinner parties in their garden.
  core: Inja Liu blends structured, safety‑obsessed professionalism with a gregarious love for community gatherings, often worrying about details while repeatedly perfecting their karaoke performances and
    smart‑home experiments.
background:
  cultural: Inja is of East Asian (Chinese) descent and was raised in a bilingual household that valued both Confucian principles of diligence and respect for elders and the American spirit of independence.
    She maintains strong ties to the Orange County Chinese community, regularly celebrating Lunar New Year, the Mid‑Autumn Festival, and other cultural traditions with family and friends. Fluent in Mandarin,
    she often bridges cultural gaps by translating for neighbors and participating in local cultural association events. Her heritage influences her cooking, festive celebrations, and a deep appreciation
    for community cohesion, while her American upbringing informs her pragmatic outlook and entrepreneurial aspirations.
