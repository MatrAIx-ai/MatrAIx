persona_description: A scientist who specializes in mental health research, particularly in the areas of racial and ethnic disparities in mental health care. She is a Harvard Medical School graduate with
  a PhD in psychology and has conducted extensive research on the topic of mental health care inequality among different racial and ethnic groups in the United States. Her work has revealed shocking data
  on the lack of mental health care for non-white students and the disparities in care between different racial and ethnic groups. She is a vocal advocate for the need for policymakers to take notice of
  this issue and address it in order to ensure that all students, regardless of race or ethnicity, receive equal access to mental health care.
