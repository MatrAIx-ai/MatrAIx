personas:
  professional: Margaret Hughes, a veteran call‑center specialist with eight years mastering Zendesk and Salesforce, they leverage their competitive drive, meticulous data‑driven approach, and deep curiosity
    to de‑escalate angry callers, streamline workflows, and mentor new agents, all while eyeing a supervisory role and a future as a Customer Experience Manager.
  sports: Margaret Hughes is an early‑morning hiker on the Wasatch foothills, they belong to the Salt Lake City Hiking Club and are a devoted fan of the Utah Jazz, using weekly trail runs and occasional
    yoga classes to satisfy their competitive streak while maintaining mental balance.
  arts: Margaret Hughes immerses themselves in the mystery‑novel scene, they devour works by Agatha Christie, Tana French, and Gillian Flynn in a book club, while the mellow melodies of Norah Jones and
    the indie folk vibes of The Head and the Heart soundtrack their weekend artisan‑bread sessions.
  travel: Margaret Hughes favors self‑guided adventure trips, they have trekked the Grand Canyon’s South Rim, weekended in Shenandoah National Park, and dream of conquering the Inca Trail, always planning
    routes that blend challenging hikes with quiet moments to reflect.
  culinary: Margaret Hughes bakes artisan sourdough and rosemary focaccia, they experiment with seasonal ingredients like summer zucchini blossoms and winter root vegetables, and skillfully balance flavors
    even as they sometimes over‑proof dough when anxiety peaks.
  core: Margaret Hughes is a competitive, curiosity‑driven call‑center veteran, they channel intense anxiety into early hikes, yoga, and artisan baking, meticulously track every metric at work and in their
    budget, yet occasionally overspend on flour after a stressful shift.
background:
  cultural: Margaret grew up in a middle‑class family in the greater Salt Lake Valley, where the predominant culture blends a strong sense of community, an appreciation for the outdoors, and a pragmatic
    work ethic. Although not actively religious, she respects the values of her largely LDS neighborhood, which emphasize family cohesion, self‑reliance, and service to others. The multicultural atmosphere
    of Spanish Fork—shaped by a growing Hispanic population—has exposed her to Spanish language and food, broadening her cultural palate. Her white American heritage, combined with these local influences,
    informs her practical outlook, love of community events, and commitment to personal growth.
attributes:
  skills: '[''Active Listening'', ''De‑escalation'', ''Problem Diagnosis'', ''CRM Software (Zendesk, Salesforce)'', ''Data Entry'', ''Performance Metrics Analysis'', ''Process Improvement'', ''Team Training
