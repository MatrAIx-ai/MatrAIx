  hobbies: '[''Hiking'', ''Yoga'', ''Baking'', ''Reading mystery novels'', ''Gardening'', ''DIY home projects'', ''Volunteer tutoring'']'
  career_goals: Margaret aspires to move into a supervisory role within the next two years, leveraging her curiosity to implement evidence‑based service enhancements. She plans to earn a bachelor's degree
    in Business Administration while completing a certification in Quality Assurance. Her long‑term ambition is to become a Customer Experience Manager, where she can blend her competitive drive with her
    desire to create supportive environments for both customers and staff. She also hopes to develop a mentorship program for new hires to help them manage workplace stress.
