persona_description: A microbiologist and infectious disease researcher who specializes in the study of C. difficile and its interactions with the gut microbiome. They are interested in understanding the
  mechanisms by which certain bacteria resist the infection and how to use these findings to develop new treatments for C. difficile. They are also interested in the potential clinical applications of these
  findings and are eager to move beyond the use of fecal transplants and feces-filled capsules as the primary treatment for C. difficile.
