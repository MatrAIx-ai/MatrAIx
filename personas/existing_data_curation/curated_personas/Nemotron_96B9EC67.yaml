personas:
  professional: Sashira Borders is an emerging sustainable agriculture liaison who leverages bilingual communication, tech-savvy data analysis, and event-planning flair to bridge local farmers with cutting-edge
    ag-tech solutions, while they balance meticulous organization with flexible adaptation of proposals.
  sports: Sashira Borders hits the trails around Lake Itasca for weekend hikes, joins the Morris Cross-Country Ski Club in winter, and follows the Minnesota Vikings (NFL) and Timberwolves (NBA) with fervor,
    balancing competitive personal goals with a laid-back appreciation for the outdoors.
  arts: Sashira Borders captures the vibrant hues of community Día de los Muertos celebrations through photography, finds inspiration in Frida Kahlo’s self-portraits and Lila Downs’ fusion of traditional
    melodies with modern beats, and spends evenings streaming classics like 'Coco' and the films of Guillermo del Toro, letting these cultural touchstones color their creative outlook.
  travel: Sashira Borders prefers thoughtfully planned road trips that blend cultural immersion and sustainable tourism, having explored Oaxaca’s culinary markets and the Sierra Nevada’s agri-eco farms,
    while dreaming of a summer stint in the Netherlands’ organic cheese regions and weekend escapes to Minnesota’s Lake Superior shoreline.
  culinary: Sashira Borders wields a seasoned skillet to perfect hometown staples like chicken tinga, homemade corn tamales, and mole poblano, infusing each dish with fresh local greens from the Minnesota
    farms they love, while they delight in pairing their meals with avocado-lime salsa and a splash of mezcal on special nights.
  core: Sashira Borders is a fiercely curious yet pragmatically competitive 22-year-old who juggles bilingual event-planning, a relentless habit of checking financial rates before coffee, and a secret love
    for late-night binge-watching tech documentaries while occasionally neglecting sleep.
background:
  cultural: Sashira comes from a Mexican heritage that she actively preserves while adapting to life in rural Minnesota. Her household regularly celebrates Día de los Muertos, Cinco de Mayo, and other Mexican
    festivities, integrating bright colors, music, and food into local community events. She maintains a strong family orientation, valuing respect, hospitality, and collective responsibility—principles
    that influence her interactions and community involvement. Bilingualism is a core part of her identity, enabling her to serve as a cultural bridge between her Mexican roots and the predominantly English‑speaking
    environment of Stevens County. This dual cultural lens informs her worldview, fostering both curiosity about new ideas and practicality in applying them to everyday life.
attributes:
  skills: '[''Bilingual Spanish-English'', ''Basic computer troubleshooting'', ''Data entry and analysis in Microsoft Excel'', ''Community event planning'', ''Time management'', ''Food preparation and Mexican
    culinary techniques'', ''Research and information synthesis'']'
  hobbies: '[''Cooking traditional Mexican dishes'', ''Hiking local trails and lakes'', ''Photography of nature and cultural events'', ''Reading about technology and sustainable agriculture'', ''Volunteering
    as a Spanish tutor'', ''Participating in community festivals and cultural celebrations'']'
  career_goals: Sashira aims to complete a bachelor's degree in Sustainable Agriculture or Agribusiness, merging her curiosity for innovative practices with practical, community‑focused solutions. She envisions
    a career that positions her as a liaison between local farmers and emerging ag‑tech initiatives, leveraging her bilingual skills to foster inclusive, competitive markets. Long‑term, she aspires to lead
    a regional agribusiness program or launch a culturally inspired food venture that highlights Mexican heritage while promoting healthy, locally sourced produce. Her competitive drive pushes her toward
    leadership roles where she can influence policy and drive measurable improvements for her community.
