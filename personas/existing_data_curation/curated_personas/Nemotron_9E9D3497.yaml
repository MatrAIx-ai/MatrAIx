personas:
  professional: Faye Wood, a retired aerospace engineer with decades of aerodynamic and structural analysis expertise, now channels her spontaneous, hands‑on problem‑solving style into community workshops,
    mentorship of underrepresented students, and collaborative museum exhibits while dazzling audiences with her talkative, story‑rich presentations.
  sports: Faye Wood stays active with weekly salsa sessions set to Celia Cruz, a springtime walking club at the local botanical garden, and avidly follows the Boston Red Sox in baseball and the Seattle
    Seahawks in football, cheering loudly at televised games while avoiding high‑impact sports due to her joint concerns.
  arts: Faye Wood immerses herself in the arts through starring in community theater productions of Stephen Sondheim’s \"Into the Woods\", discussing Maya Angelou’s poetry in her book club, dancing to Celia
    Cruz’s salsa classics, and revisiting Carl Sagan’s \"Cosmos\" and the film \"Apollo 13\" as sources of both inspiration and entertainment.
  travel: Faye Wood plans her travels around weekend outings to the Kennedy Space Center, the National Air and Space Museum in Washington, D.C., and the Space Flight Museum in Utah, while occasionally sprinkling
    in spontaneous road trips to the desert skies of New Mexico for stargazing or a leisurely cruise to Tenerife’s Teide Observatory, always coordinating with her grandchildren’s school schedules and her
    modest travel budget.
  culinary: Faye Wood delights in cooking with her garden’s bounty, preparing heirloom tomato bruschetta, blossom‑infused pesto pasta, and ratatouille seasoned with fresh basil and oregano, while she also
    enjoys making homemade salsa for dance nights, often sprinkling edible marigold petals for a splash of color.
  core: Faye Wood is an 84‑year‑old former aerospace engineer who blends spontaneous curiosity, talkative charm, and a love for stargazing, salsa, and heirloom gardening into a lively, community‑focused
    life despite occasional anxiety and a tendency to forget appointments.
background:
  cultural: Born in 1941 into a middle‑class white family on Long Island, Faye grew up amid post‑World War II optimism and the fervor of the Space Race, which sparked her fascination with flight and engineering.
    Her generation valued hard work, civic duty, and community involvement, shaping her strong sense of responsibility toward her neighbors in Patchogue, NY. Navigating a male‑dominated field, she experienced
    gender barriers early on, fueling a lifelong commitment to gender equity in STEM. Her cultural identity blends traditional Northeastern American customs—such as holiday family gatherings and local volunteerism—with
    a progressive, curiosity‑driven outlook that blends respect for established methods and openness to new ideas.
attributes:
  skills: '[''Aerodynamic analysis'', ''Structural dynamics'', ''Finite element modeling'', ''CAD (SolidWorks, CATIA)'', ''Systems engineering'', ''Project management'', ''Technical writing'', ''Public
    speaking'', ''Mentoring and coaching'', ''STEM outreach program development'', ''Data analysis (MATLAB, Python)'']'
  hobbies: '[''Astronomy club'', ''Model rocketry with grandchildren'', ''Book club (historical fiction & science)'', ''Community theater'', ''Gardening (heirloom tomatoes, native flowers)'', ''Salsa dancing'',
    ''Volunteering at senior center'', ''Visiting aerospace museums'']'
  career_goals: Now retired, Faye aims to amplify her lifelong passion for aerospace by mentoring aspiring engineers—particularly women and underrepresented minorities—through community workshops and university
    advisory boards. She hopes to author a memoir recounting her experiences as one of the early female engineers during the space race, preserving that history for future generations. Faye also aspires
    to collaborate with local museums on exhibits that celebrate aerospace heritage, while continuing her own learning through courses on emerging technologies and participating in interdisciplinary think‑tanks
    that blend curiosity with practical impact.
