  hobbies: '["Hiking", "Landscape photography", "Cooking Mexican dishes (mole, tamales)", "Reading non‑fiction (business, personal growth)", "DIY home‑improvement projects", "Volunteering teaching Spanish",
    "Listening to classic rock and regional Mexican music", "Urban gardening"]'
  career_goals: Luis aims to expand his individual brokerage office into a boutique firm specializing in sustainable housing within the Denver metro area. He plans to obtain a broker's license and pursue
    certifications such as the Certified Residential Specialist and the Green Designation. Over the next five years, he wants to mentor emerging agents, develop a monthly market‑insights newsletter for
    the Hispanic community, and increase his closed‑sale volume by 30%. Additionally, he intends to complete a bachelor’s degree in business administration to deepen his strategic and financial acumen.
