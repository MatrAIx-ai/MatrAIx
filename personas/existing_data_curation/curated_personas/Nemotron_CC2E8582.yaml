  career_goals: Douglas aims to follow a career path that provides clear structure, reliability, and community service. He plans to graduate high school, obtain a vocational certification in electrical
    work or computer networking, and eventually join the Baltimore County Police Department or Fire Service. He also hopes to continue playing basketball competitively, potentially earning a scholarship,
    while developing coping strategies for his anxiety to maintain emotional stability in his future profession.
