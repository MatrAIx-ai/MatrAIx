personas:
  professional: Douglas Cortez, a 15‑year‑old high school sophomore, channels their love of competition and structure into building simple robots in the school’s robotics club, where they meticulously document
    each project while eagerly leading team challenges and critiquing opponents' designs.
  sports: Douglas Cortez dominates the Saturday evening basketball games at Riverside Park, cheering for the local high school team the Riverside Raiders while also skating at the downtown skatepark where
    they belong to the “Kickflip Crew,” and they regularly follow the NBA’s Los Angeles Lakers and the NHL’s Toronto Maple Leafs for inspiration.
  arts: Douglas Cortez fuels their creative downtime by blasting the high‑energy riffs of Foo Fighters and the pop hooks of Imagine Dragons, binge‑watching action franchises like the Marvel Cinematic Universe
    and the Fast & Furious series, and occasionally sketching comic‑book characters during robotics club breaks.
  travel: Douglas Cortez dreams of spending summer vacations at the sunny beaches of Cancun after saving up from their part‑time gigs, has already taken a family road trip to San Diego’s Balboa Park, and
    hopes to experience Tokyo’s Akihabara district to explore gaming culture in person.
  culinary: Douglas Cortez prefers quick, indulgent meals such as pepperoni pizza, cheesy nachos, and chicken teriyaki bowls, can whip up a decent grilled cheese with confidence, but often orders delivery
    after marathon gaming sessions, and they’re particular about crunchy bacon bits and extra hot sauce.
  core: Douglas Cortez is a competitively spirited, structure‑loving teen who channels anxiety into high‑energy sports and robotics, occasionally over‑spends on gaming gear, and balances a love for rock
    music with a craving for fast food.
background:
  cultural: Douglas was raised in Pikesville, a suburban community in Baltimore County, Maryland. His family identifies as white, reflecting a typical middle‑class American upbringing. The area’s cultural
    mix—historically a blend of Jewish, Italian, and other European immigrant traditions—exposes him to a variety of holidays, foods, and community events. He grew up celebrating mainstream American holidays
    such as Thanksgiving, Independence Day, and Christmas, while also attending local cultural festivals that showcase Baltimore’s broader ethnic diversity. This environment, combined with the suburban
    emphasis on school, sports, and community service, shapes his worldview and values.
attributes:
  skills: '[''Team collaboration'', ''Time management'', ''Basic computer troubleshooting'', ''Strategic gaming'', ''Leadership in school projects'', ''Organizational planning'', ''Basketball fundamentals'']'
