  career_goals: Even at age seven, Ronnie imagines a future where he can blend his love for discovery with helping others. He dreams of becoming a scientist or engineer—perhaps a wildlife biologist who
    studies animals in upstate New York forests or an inventor who designs gadgets that make everyday life easier. He wants a career that lets him explore new ideas, work with small teams, and stay flexible
    enough to follow his curiosities without being confined by rigid schedules.
