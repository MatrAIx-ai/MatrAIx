personas:
  professional: Kiep Park is a budding robotics enthusiast who builds custom LEGO obstacle courses and programs simple autonomous bots, applying a methodical yet flexible approach that balances the structure
    of engineering with the spontaneity of play.
  sports: Kiep Park enjoys pickup basketball at the neighborhood park, roots for the NBA’s Golden State Warriors and the MLB’s Los Angeles Dodgers, and has joined the local youth club ‘Eastside Hoops’ to
    hone spontaneous play.
  arts: Kiep Park sketches manga‑style characters inspired by Osamu Tezuka and Hiroshi Sasagawa, listens to Koji Kondo’s video game soundtracks, and admires contemporary pop artist Billie Eilish for her
    expressive lyrics.
  travel: Kiep Park has visited Disneyland and the local science museum, dreams of exploring Tokyo’s Akihabara district and the Lego House in Billund, and prefers short, well‑planned trips that leave room
    for spontaneous arcade adventures.
  culinary: Kiep Park favors pepperoni pizza with extra mozzarella, munches on sushi rolls with avocado and cucumber, enjoys a bowl of chicken ramen topped with soft‑boiled egg, and experiments with simple
    stir‑fry using soy sauce and ginger.
  core: Kiep Park blends a love for structured LEGO engineering with a penchant for spontaneous basketball, obsessively solves puzzles while occasionally losing track of homework, and refuses to miss a
    chance to tweak video game strategies.
background:
  cultural: Kiep is a second‑generation Korean‑American raised in La Crescenta, California. At home, his family speaks Korean and observes cultural holidays such as Seollal (Lunar New Year) and Chuseok,
    sharing traditional dishes like kimchi and tteokguk. He attends a public middle school where English dominates, but he takes optional Korean language classes after school to stay connected to his heritage.
    The multicultural environment of Los Angeles County exposes him to a blend of Asian pop culture (K‑pop, anime) and mainstream American media, shaping a hybrid identity that values both his East Asian
    roots and his local community.
attributes:
  skills: '[''LEGO robotics building and programming'', ''Scratch and introductory Python coding'', ''Strategic video game play'', ''Puzzle solving (Rubiks Cube, logic games)'', ''Basic basketball dribbling'']'
  hobbies: '[''LEGO robotics building'', ''Competitive video gaming'', ''Puzzle solving (Rubiks Cube, Sudoku)'', ''Sketching manga characters'', ''Calligraphy practice'', ''Pick-up basketball'']'
  career_goals: Kiep aspires to turn his love for building and programming into a future career as a robotics engineer or video game developer. He aims to lead a middle‑school robotics team to win a regional
    FIRST LEGO League competition, later studying mechanical or computer engineering in college. He also dreams of designing his own indie games and perhaps competing in e‑sports tournaments. Ultimately,
    he wants to create technology that blends real‑world engineering with interactive entertainment.
