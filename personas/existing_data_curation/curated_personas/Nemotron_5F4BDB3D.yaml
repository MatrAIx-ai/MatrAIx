personas:
  professional: Eric Major, an aspiring multimedia designer, channels their curiosity and meticulous organization into crafting cohesive brand identities, album covers, and motion graphics with Photoshop,
    Illustrator, and HTML/CSS, while their collaborative yet assertive nature shines when coordinating student design projects.
  sports: Eric Major hikes regularly with the Fort Wayne Hiking Club through McCormick's Creek State Park, kayaks the St. Marys River on warm weekends, follows the Fort Wayne Mastodons basketball season,
    and casually joins pick-up soccer games at the local park to stay fit.
  arts: Eric Major sketches daily in a weathered notebook while drawing inspiration from Shepard Fairey's bold colors, Marjane Satrapi's graphic storytelling, and The Avett Brothers' folk-rock melodies,
    and they spend weekend afternoons at the Fort Wayne Museum of Art absorbing contemporary exhibitions.
  travel: Eric Major prefers spontaneous weekend road trips, having explored Indianapolis and the Great Lakes shoreline, while dreaming of a future backpacking adventure through New Zealand's fjords and
    a cultural immersion in Tokyo's anime districts, balancing modest student finances with a love for on-the-fly explorations.
  culinary: Eric Major, an enthusiastic home cook, blends Midwestern comfort with global flavors by tossing kimchi into cornbread-crusted mac & cheese, crafting sriracha-glazed salmon tacos, and perfecting
    a rosemary-infused apple crumble, while still treating themselves to artisanal coffee lattes after late-night study sessions.
  core: Eric Major is a curious, organized dreamer who juggles sketchbooks and code, fuels creative bursts with late-night caffeine, and sometimes forgets to water their plants in the pursuit of the next
    artistic project.
background:
  cultural: 'Eric grew up in a middle‑class white family in Fort Wayne, Indiana, with roots tracing back to German and Irish immigrants. His upbringing reflected typical Midwestern values: a strong work
    ethic, modesty, and an emphasis on community involvement. Family gatherings often centered around hearty home‑cooked meals and stories of his grandparents’ farm heritage. He participated in local traditions
    such as the Allen County Fair, high‑school football games, and Fourth‑of‑July parades. While attending a public high school, he was introduced to the regional art scene through school art clubs and
    the Fort Wayne Museum of Art, which nurtured his appreciation for visual creativity. The town’s blend of industrial history and a growing cultural district has given Eric a balanced sense of tradition
    and openness to new ideas.'
attributes:
  skills: '[''Digital illustration'', ''Graphic design (Adobe Photoshop, Illustrator)'', ''Photo editing'', ''Basic web development (HTML/CSS)'', ''Traditional drawing and sketching'', ''Project coordination'',
    ''Public speaking'', ''Critical thinking'', ''DIY woodworking'', ''Audio recording and basic mixing'']'
  hobbies: '[''Sketching and drawing'', ''Digital illustration'', ''Visiting art museums'', ''Photography (urban and nature)'', ''Playing acoustic guitar'', ''Reading science‑fiction and graphic novels'',
    ''Hiking and kayaking'', ''Board‑game strategy sessions'', ''Cooking experimental fusion meals'']'
  career_goals: Eric intends to pursue a Bachelor of Fine Arts in Graphic Design or Visual Communication at a nearby college, such as IUPUI or Indiana University–Purdue University Fort Wayne. He aims to
    combine his love for art with technology to become a freelance multimedia designer, creating brand identities, album covers, and community murals. In the longer term he hopes to open a collaborative
    studio in Fort Wayne that offers workshops for teens and produces socially‑focused public art projects. He also wants to develop a personal website that showcases his portfolio and eventually monetize
    his work through commissions and online courses.
