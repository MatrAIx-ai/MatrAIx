persona_description: Dr. Paul Howard-Jones, a sleep researcher and professor at the University of Bristol, is an expert in the effects of digital technology on human sleep patterns. He has published several
  papers on the topic and has conducted studies that suggest that night-time texting can disrupt sleep more than watching television, and that teenagers who text at night are more likely to be sleepy during
  the day. Dr. Howard-Jones is concerned about the negative impact of technology on children's sleep and has made it a priority to focus on regulating his own children's use of video games and smart phones.
