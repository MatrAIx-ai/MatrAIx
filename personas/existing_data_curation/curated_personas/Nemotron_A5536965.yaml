personas:
  professional: Genevieve Bost is a seasoned elementary and middle‑school STEM educator who blends rigorous content expertise with hands‑on project‑based learning, designing standards‑aligned curricula,
    leading a high‑performing robotics club, and mentoring peers through data‑driven assessment workshops, all while channeling a competitive edge and a pragmatic curiosity toward her goal of becoming a
    district STEM coordinator and future assistant principal.
  sports: Genevieve Bost hikes Sonoran Desert trails year‑round, competes in a co‑ed recreational soccer league that keeps a close rivalry with the neighboring team, roots for the Phoenix Suns during basketball
    season, and tracks progress with a smartwatch, approaching fitness with both competitive intensity and organized flexibility.
  arts: Genevieve Bost fuels her creative side by devouring sci‑fi novels from Isaac Asimov and N. K. Jemisin, performing in weekly improv workshops with The Improv AZ, quoting favorite lines from the film
    “Blade Runner,” and winding down to the electro‑ambient sounds of Tycho and the indie rock energy of The Strokes, which together shape her vibrant, socially charged artistic outlook.
  travel: Genevieve Bost prefers meticulously planned desert escapes to Sedona’s red rocks and spontaneous weekend trips to Austin’s music scene, balancing a love for outdoor adventure with a moderate budget
    that still allows occasional splurges on boutique hotels, all while negotiating family commitments with a flexible itinerary mindset.
  culinary: Genevieve Bost delights in crafting Southwestern dishes like enchiladas verdes, chile rellenos, and carne asada tacos using poblano peppers, fresh cilantro, and masa harina, a hobby that showcases
    her solid cooking skills, occasional tendency to oversalt, and a habit of inviting friends over for communal meals that blend flavors with lively conversation.
  core: Genevieve Bost blends a scientist’s curiosity with a competitor’s drive, thriving on collaborative adventures while secretly hoarding extra board‑game pieces and occasionally sacrificing sleep for
    last‑minute lesson plans.
background:
  cultural: Genevieve grew up in a middle‑class, white American family in the Midwest before moving to the Southwest for her teaching career. Her upbringing emphasized self‑reliance, education, and community
    involvement, values that blend with the multicultural fabric of Mesa, Arizona, where she embraces local traditions, such as regional cuisine and outdoor recreation. She identifies with mainstream American
    cultural norms while appreciating the Hispanic and desert‑influenced lifestyle of her adopted community.
attributes:
  skills: '[''STEM curriculum development'', ''Project‑based learning facilitation'', ''Classroom technology integration'', ''Data‑driven assessment'', ''Differentiated instruction'', ''Classroom management'',
    ''Mentoring student clubs'', ''Parent‑teacher communication'', ''Public speaking and workshop delivery'', ''Collaborative learning design'']'
  hobbies: '[''Hiking in the Sonoran Desert'', ''Playing recreational soccer'', ''Volunteering at the local science museum'', ''Reading science‑fiction novels'', ''Cooking Southwestern and Mexican dishes'',
    ''Participating in improv theater workshops'', ''Gardening in a community plot'', ''Competing in escape‑room challenges'', ''Playing strategy board games'']'
  career_goals: Genevieve aims to transition into a district STEM coordinator role, where she can shape curriculum across schools and secure grants for innovative programs. She plans to pursue a master's
    degree in educational leadership to qualify for an assistant principal position, while continuing to lead her school’s robotics team to state‑level competitions. Ultimately, she seeks to be recognized
    as a teacher‑leader who raises student achievement in STEM and mentors the next generation of educators.
