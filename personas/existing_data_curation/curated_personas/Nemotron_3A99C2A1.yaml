  career_goals: While still early in his education, Mitchell envisions a future where he works with his hands and technology. He aspires to become an automotive technician or a mechanical engineer, aiming
    to combine his love for practical problem-solving with his mechanical aptitude. He also dreams of one day designing his own video games or becoming a professional eSports player, seeing these paths
    as ways to channel his competitive drive and routine-focused training.
