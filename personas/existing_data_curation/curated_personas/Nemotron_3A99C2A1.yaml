personas:
  professional: Mitchell Lester is a budding tech enthusiast who excels at building LEGO structures and tinkering with electronic kits, applying their love of routine and competitive spirit to methodically
    solve problems and develop early programming skills.
  sports: Mitchell Lester plays shortstop for the Holliston Little League baseball team, cheers on the Boston Red Sox and New England Patriots, and spends weekends fishing at Hopkinton Reservoir and snowshoeing
    on nearby trails, maintaining a low‑key fitness routine that blends competitive play with solitary outdoor activities.
  arts: 'Mitchell Lester channels their creativity into assembling intricate LEGO sets, listening to Imagine Dragons and Ed Sheeran while reading adventure novels like Percy Jackson, and they enjoy the
    storytelling of Avatar: The Last Airbender, which shapes their imaginative yet structured artistic outlook.'
  travel: Mitchell Lester prefers family road trips to New England destinations such as Acadia National Park and Boston, dreams of visiting Universal Studios in Orlando, and they plan itineraries around
    scheduled gaming conventions, balancing a love of routine with occasional bursts of adventure.
  culinary: Mitchell Lester favors classic New England clam chowder, maple‑glazed pancakes, and homemade mac and cheese, and they enjoy crafting DIY snack mixes with peanuts, dried cranberries, and chocolate
    chips, though they often forget to include vegetables despite parental encouragement.
  core: Mitchell Lester is a routine‑driven, competitive 12‑year‑old who blends solitary tech tinkering with modest outdoor pursuits, and they navigate money, health, and hobbies with a pragmatic yet slightly
    disorganized approach.
background:
  cultural: Mitchell grew up in a middle-class, suburban New England family in Holliston, Massachusetts. His household reflects typical Northeastern American values, emphasizing hard work, self-reliance,
    and practical skills. Cultural influences include community participation in local sports leagues, seasonal outdoor activities like leaf-peeping and winter snowshoeing, and a family tradition of hands-on
    trades passed down through generations. He celebrates mainstream American holidays and enjoys regional foods such as clam chowder and maple-glazed treats, while his family’s European ancestry (primarily
    English and Irish) informs a modest, pragmatic outlook.
