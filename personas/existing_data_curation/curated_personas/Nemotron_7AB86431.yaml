  career_goals: Jessica is motivated to re‑enter the workforce in a part‑time role that leverages her caregiving instincts and organizational strengths. She is exploring a certification program in geriatric
    home care to become a certified caregiver, hoping to combine her empathy and practical skills to support elderly neighbors. Simultaneously, she dreams of launching a modest home‑based bakery that features
    her signature fusion recipes, using her garden’s fresh herbs and produce. Her broader ambition is to achieve financial stability that eases her stress, while building a supportive community network
    that values her contributions and nurtures her personal growth.
