  career_goals: Although she is only five, Mary frequently imagines future roles that let her explore, help others, and stay connected with friends. She often says she wants to be a teacher because she
    loves telling stories, guiding classmates through games, and keeping the classroom organized. Her fascination with animals sometimes leads her to picture herself as a veterinarian who cares for pets
    and farm animals. She also dreams of being a community helper such as a park ranger or a librarian, where she could maintain playgrounds or organize books while working alongside other kids. These aspirations
    reflect her curiosity about the world, her desire for cooperative environments, and her appreciation for clear, established routines.
