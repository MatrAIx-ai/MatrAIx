persona_description: A public health researcher who specializes in the study of geographic accessibility and disparities in healthcare access. They are particularly interested in the impact of travel time
  on the availability of COVID-19 testing sites and the potential for these sites to underestimate the true disease burden in rural and underserved areas. They are dedicated to using data-driven methods
  to identify areas of inequity and to develop strategies to address these disparities.
