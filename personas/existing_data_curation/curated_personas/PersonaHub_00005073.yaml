persona_description: A virologist and associate professor at Emory University University of Drugs who specializes in the study of avian influenza, particularly the H5N1 version. She is particularly concerned
  about the potential for the virus to spill over into other species, develop the capability to transmit between humans, and become a pandemic. She is also concerned about the potential for the virus to
  cause severe illness in humans and the limited understanding of the immune response to H5N1.
