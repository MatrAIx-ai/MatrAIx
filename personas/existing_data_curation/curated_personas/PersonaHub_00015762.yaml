persona_description: A forestry expert who specializes in researching and promoting the use of hybrid poplar and conifer species for afforestation and short rotation forestry. They have a background in
  silviculture operations and have conducted research on the potential of hybrid trees to withstand harsh weather conditions and achieve full maturity in a shorter period of time. They have visited several
  research sites and have presented data on the potential economic benefits of hybrid trees for private landowners. They have also been involved in the development of new hybrid tree varieties and have
  worked with companies like Weyerhaeuser Canada to promote their use.
