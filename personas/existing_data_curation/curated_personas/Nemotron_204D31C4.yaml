personas:
  professional: Stephanie Rosales is a high school senior who leverages their strong organizational skills, Python scripting, and love for environmental stewardship to lead library event planning and conduct
    data‑driven research projects, positioning themselves for a future as a sustainable community project manager.
  sports: Stephanie Rosales enjoys hiking the Finger Lakes Trail and competing in their school's cross‑country team, follows the Buffalo Bills and Rochester Red Wings avidly, and participates in a local
    recreational soccer league, and they balance competitive drive with a calm, resilient approach to fitness.
  arts: Stephanie Rosales captures seasonal changes through nature photography inspired by Ansel Adams, devours science‑fiction novels by Octavia Butler and listens to indie folk artist Sufjan Stevens,
    while volunteering at the library to curate community art displays featuring local painters like David Magee, and they find inspiration in the intersection of technology and nature.
  travel: Stephanie Rosales prefers meticulously planned, eco‑conscious trips, having explored Letchworth State Park and Niagara Falls, and dreaming of trekking Iceland's glaciers and Patagonia's Torres
    del Paine, all booked using spreadsheets that maximize budget efficiency while honoring their love for rugged landscapes, and they schedule each itinerary with precision.
  culinary: Stephanie Rosales favors farm‑to‑table dishes such as apple‑cider‑glazed pork tenderloin and fresh lake‑caught trout with lemon‑dill sauce, enjoys crafting homemade pesto with locally sourced
    basil, and indulges in occasional Thai green curry for its complex flavors, and they often experiment with fusion recipes during weekend cooking sessions.
  core: Stephanie Rosales blends an ultra‑organized, data‑driven mindset with a serene love for nature, obsessively cataloguing hikes and spreadsheets while occasionally hoarding trail‑photo prints, and
    they view every project as a puzzle waiting to be solved.
background:
  cultural: Stephanie comes from a middle‑class, third‑generation American family with English and German ancestry. Raised in the small, close‑knit community of Newfield, NY, she grew up with a strong sense
    of self‑reliance, appreciation for the outdoors, and participation in local traditions such as seasonal fairs and community clean‑up days. Her family emphasizes education, practical problem‑solving,
    and community service, shaping her pragmatic outlook while still encouraging curiosity and independent learning.
attributes:
  skills: '[''Organizational planning'', ''Research and information synthesis'', ''Digital literacy (Word, Excel, basic Python)'', ''Strategic thinking (chess, debate)'', ''Conflict resolution'']'
  hobbies: '[''Hiking'', ''Nature photography'', ''Reading (science fiction & non‑fiction)'', ''Chess'', ''Journaling'', ''Volunteer library work'', ''Yoga'']'
  career_goals: Stephanie aspires to attend a four-year college where she can study environmental engineering or business administration, aiming to merge her curiosity for scientific inquiry with practical
    problem‑solving. She hopes to become a project manager for sustainable community initiatives in the Finger Lakes region, leading efforts such as renewable energy installations or conservation programs.
    In the longer term, she envisions working in a research or policy think‑tank where she can translate data‑driven insights into actionable strategies that benefit her hometown and similar rural communities.
