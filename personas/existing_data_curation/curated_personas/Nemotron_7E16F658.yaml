  hobbies: '["Vegetable and herb gardening", "Birdwatching", "Reading historical fiction and local history", "Quilting", "Knitting", "Genealogy research", "Crossword puzzles", "Nature walks", "Attending
    community theater", "Participating in church potlucks"]'
  career_goals: Although retired from formal employment, Jenny is driven to deepen her contribution to the Royal Center community. Her primary goal is to become the volunteer coordinator for the senior
    outreach program at the local community center, where she plans to develop intergenerational workshops that combine gardening, basic computer literacy, and family history storytelling. She also intends
    to complete a certified first‑aid and CPR refresher course and to publish a well‑documented family genealogy booklet with the Pulaski County Historical Society. Long‑term, she hopes to mentor younger
    neighbors in practical life skills while maintaining her own health and independence.
