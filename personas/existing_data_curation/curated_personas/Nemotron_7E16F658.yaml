personas:
  professional: Jenny Parks is a retired homemaker turned community volunteer who leverages their meticulous budgeting, event‑planning and first‑aid expertise to coordinate senior outreach programs, designing
    intergenerational workshops that fuse gardening, basic computer literacy, and family‑history storytelling.
  sports: Jenny Parks follows the Indianapolis Colts and Indiana Pacers, participates in a local senior bowling league, and they keep fit through daily strolls along the nearby wetlands, often spotting
    sandhill cranes while cheering on the Royal Center high‑school basketball team during weekend games.
  arts: Jenny Parks enjoys evenings at the nearby community theater – recently enthralled by a production of "Our Town" – and they curl up with historical fiction by Hilary Mantel and Ken Follett, while
    their quilting circle draws inspiration from folk artist Grandma Moses and classic ballads by Emmylou Harris.
  travel: Jenny Parks favors relaxed road trips to historic sites like Washington, D.C., and nature escapes to Brown County State Park, but they also dream of a modest river cruise along the Mississippi
    to explore antebellum towns, balancing travel planning with their fixed pension budget.
  culinary: Jenny Parks delights in cooking garden‑fresh heirloom tomatoes into a rustic bruschetta, simmering chicken pot pie with rosemary and thyme, and preserving summer berries into jam, though they
    admit to over‑seasoning dishes with salt during their weekly potluck preparations.
  core: Jenny Parks blends meticulous organization with a curious, garden‑rooted eye, juggling volunteer leadership, careful finances, and modest health worries, while they nurture community ties through
    quilting, genealogy and occasional indulgent cooking.
background:
  cultural: 'Jenny grew up on a family farm outside of Crawfordsville, Indiana, in a household rooted in German and English ancestry. The midwestern small‑town culture of Pulaski County shaped her values:
    a strong work ethic, self‑reliance, and a deep sense of neighborly responsibility. She has been an active member of the local Presbyterian church since her teen years, participating in community service,
    potlucks, and seasonal festivals. This cultural fabric emphasizes modesty, hospitality, and a respect for tradition, while also encouraging continuous learning—reflected in her interest in genealogy
    and local history. Her upbringing balances the simplicity of rural life with an openness to new ideas, fostering the pragmatic curiosity that defines her today.'
attributes:
  skills: '["Household budgeting", "Meal planning", "Event coordination", "Organic gardening", "Computer troubleshooting", "Genealogy research", "Crafting (quilting & knitting)", "First-aid certification",
