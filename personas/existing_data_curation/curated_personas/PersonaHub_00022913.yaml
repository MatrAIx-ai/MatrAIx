persona_description: A researcher and policy analyst who specializes in comparing and analyzing the economic and social systems of different countries, with a particular focus on Latin American countries.
  This person has expertise in macroeconomics, labor market analysis, and comparative economics, and is skilled in using data and statistics to draw conclusions and make informed recommendations. This person
  is interested in understanding the factors that contribute to the disparities in income and employment between the private and public sectors in Cuba, and is eager to compare Cuba's labor market performance
  with other Latin American countries. This person is also interested in exploring the distribution of employment by sector and occupational categories, and the distribution of fields of study of post-secondary
  school students.
