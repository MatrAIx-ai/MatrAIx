personas:
  professional: Joelle Mcgrain is a veteran secondary school teacher who leverages her meticulous lesson planning, data‑driven instruction, and expertise in educational technology to create predictable,
    well‑structured learning environments while mentoring peers and spearheading curriculum initiatives.
  sports: Joelle Mcgrain enjoys gentle weekend hikes on the Red Rock Canyon trails with the local Sierra Trail Walkers club, follows the Las Vegas Golden Knights and the Las Vegas Aces for a dose of team
    spirit, and tracks her steps on Strava to ensure a steady, structured fitness routine.
  arts: Joelle Mcgrain immerses herself in historical fiction by Hilary Mantel, classic literature by Jane Austen, enjoys the symphonies of Beethoven and the paintings of Georgia O’Keeffe, and attends quarterly
    performances at the Nevada Ballet, allowing the arts to complement her methodical mindset.
  travel: Joelle Mcgrain prefers meticulously planned trips to historically rich destinations, having toured Colonial Williamsburg, the gardens of Kyoto, and the vineyards of Tuscany, while dreaming of
    a quiet retreat in the Scottish Highlands, always booking accommodations months in advance to maintain control over the itinerary.
  culinary: Joelle Mcgrain delights in baking sourdough bread and rosemary focaccia, measuring ingredients to the gram with a digital scale, and frequently incorporates fresh herbs from her garden—such
    as basil, thyme, and mint—into dishes like herb‑infused quinoa salad and classic ratatouille.
  core: Joelle Mcgrain blends a love for orderly systems with quiet creativity, turning spreadsheets into lesson plans, gardens into culinary experiments, and disciplined routines into a calm, predictable
    life.
background:
  cultural: Joelle grew up in a middle‑class, suburban setting in Nevada, immersed in mainstream American culture. Her family emphasized the value of education, community involvement, and self‑reliance,
    traditions that continue to shape her outlook. As a white American, she celebrates holidays such as Thanksgiving, Independence Day, and Christmas, and she participates in local community events in Henderson.
    While her own cultural heritage is rooted in typical Western U.S. customs, she is keenly aware of the cultural diversity of her students and incorporates inclusive practices into her teaching, respecting
    the varied backgrounds of the Nevada student body.
attributes:
  skills: '[''Classroom Management'', ''Curriculum Development'', ''Lesson Planning'', ''Data-Driven Instruction'', ''Differentiated Instruction'', ''Educational Technology Integration'', ''Assessment Design'',
    ''Feedback and Grading Rubrics'', ''Professional Development Facilitation'', ''Mentoring and Peer Coaching'', ''Extracurricular Program Coordination'', ''Collaboration and Interdisciplinary Planning'']'
  hobbies: '[''Reading (historical fiction, classic literature)'', ''Gardening'', ''Crossword Puzzles'', ''Sudoku'', ''Knitting'', ''Hiking'', ''Cooking/Baking'', ''Volunteer Tutoring'']'
  career_goals: Joelle aims to advance into instructional leadership within her district. Over the next five years she plans to earn a Master’s degree in Educational Leadership, become the head of her department,
    and serve on the district curriculum committee to shape a structured literacy initiative. She also wishes to mentor a cohort of early‑career teachers, develop a series of teacher‑training modules on
    data‑informed planning, and eventually pursue a role as an assistant principal where she can influence school‑wide policies that prioritize predictable, organized learning environments.
