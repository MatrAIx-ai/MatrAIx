  hobbies: '[''Community choir'', ''Cooking club'', ''Gardening cooperative'', ''Cultural festival participation'', ''Traditional dance'', ''Senior center volunteering'', ''Guided meditation'', ''Journaling'']'
  career_goals: She aims to translate her routine‑driven organizational talent into a part‑time role as a volunteer coordinator or community liaison at a local cultural center or senior services organization
    in San Jose. She hopes to develop and run regular cultural workshops—cooking classes, language sessions, and traditional dance—so she can share her heritage while maintaining a predictable schedule.
    Additionally, she plans to start a modest home‑based catering venture focused on family recipes, providing steady supplemental income without the pressure of a full‑time job. Over the next few years,
    she intends to complete a short certification in caregiver support to deepen her ability to assist elderly neighbors.
