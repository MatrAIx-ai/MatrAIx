persona_description: A scientist and inventor who is passionate about developing wearable technology for healthcare applications, particularly in the field of electronic tattoos. They have a background
  in materials science and have successfully developed a prototype that can be printed onto human skin using a rubber stamp, sealed with a protective spray-on plaster, and is now working on improving its
  wireless data transmission and energy storage capabilities. They have previously developed a similar prototype in the past but it rubbed off after a few days, and they are currently working on a more
  sophisticated system that can be used for clinical use and mass production.
