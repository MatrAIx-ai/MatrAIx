  career_goals: Margarita dreams of turning her love for art and new ideas into a future career where she can blend creativity with technology. She hopes to attend a specialized high school focusing on
    STEAM (Science, Technology, Engineering, Arts, Mathematics) and eventually become a concept artist or graphic designer for video games or animated films. She also envisions contributing to cultural
    preservation by working with museums to create interactive exhibits that showcase Mexican heritage. Her competitive streak pushes her to aim for scholarships and recognition in local art competitions,
    while her reliable nature keeps her focused on long‑term academic goals.
