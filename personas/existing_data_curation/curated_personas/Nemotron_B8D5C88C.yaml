personas:
  professional: Jackie Fudge is a veteran office supervisor with over twenty years of frontline experience, skilled at coordinating workflows, managing staff schedules, and ensuring policy compliance, who
    balances pragmatic curiosity with a relaxed, flexible approach, adopting reliable tech tools while preserving proven processes, and they use an assertive yet compassionate style to mentor junior staff
    and resolve conflicts.
  sports: Jackie Fudge enjoys weekend hikes in the San Bernardino foothills, follows the Los Angeles Lakers and the LA Dodgers for basketball and baseball, and joins a local recreational softball league,
    and they prefer low-impact cardio over high-intensity gym workouts.
  arts: Jackie Fudge is a frequent attendee of local jazz venues, where they relish performances by Gregory Porter and Esperanza Spalding, pursues digital photography of urban street scenes, and volunteers
    to organize community art fairs showcasing emerging muralists like Shepard Fairey.
  travel: Jackie Fudge favors scenic road trips along the Pacific Coast Highway, often escapes to Santa Barbara or Joshua Tree for weekend getaways, dreams of immersing themselves in New Orleans' music
    culture, and they balance travel budgets through careful DIY planning supplemented by occasional guided tours.
  culinary: Jackie Fudge spices up Southern-California soul-food classics with contemporary twists such as jalapeño-infused collard greens and pineapple-glazed salmon, delights in simmering heirloom tomato
    sauces with fresh basil and oregano, and they occasionally treat themselves at farm-to-table spots like The Little Door.
  core: Jackie Fudge blends practical curiosity with a laid-back flexibility, mentoring staff by day, tending their heirloom tomato garden by night, and they constantly juggle a love for jazz, hiking, and
    spontaneous kitchen experiments while occasionally letting paperwork pile up.
background:
  cultural: As a Black woman raised in Southern California, Jackie’s cultural identity is shaped by a mix of African‑American traditions, church community values, and the diverse multicultural environment
    of Redlands. Her family’s narratives trace back to the Great Migration, and she remains connected to the legacy of resilience, storytelling, and community service. She actively participates in local
    Black heritage celebrations, enjoys gospel and jazz music, and values intergenerational ties that influence her perspective on leadership, family, and social responsibility.
