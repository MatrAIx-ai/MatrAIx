  hobbies: '[''Historical fiction reading'', ''Soul‑food cooking'', ''Backyard gardening'', ''Community volunteer work'', ''Hiking in San Bernardino foothills'', ''Digital photography'', ''Live jazz and
    R&B concerts'', ''Board games with friends'', ''Genealogy research'', ''Attending local art festivals'']'
  career_goals: Looking ahead, Jackie aims to secure a mid‑level management position such as Operations Manager within the county government or a regional nonprofit, where she can expand her strategic planning
    and cross‑departmental leadership responsibilities. She plans to complete a CAP (Certified Administrative Professional) certification and enroll in a part‑time bachelor's program in Business Administration
    to solidify her credentials. Over the next five years, she hopes to mentor emerging Black female professionals in office management, launch a consulting side‑business focused on streamlining small‑business
    office processes, and eventually transition into a senior operations or human‑resources role that balances her leadership ambitions with a healthier work‑life rhythm.
