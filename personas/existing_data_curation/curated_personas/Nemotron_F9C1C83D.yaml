personas:
  professional: Ayano Le, a 25‑year‑old STEM career development advisor in Orange County, blends data‑driven counseling with routine‑based workshop templates and bilingual Japanese‑English support, while
    flexibly reshaping sessions to meet students' evolving anxieties and career goals.
  sports: Ayano Le energizes weekends by hiking Laguna Wood and Irvine trails with friends, joins Zumba and spin classes for cardio, and cheers for the LA Dodgers and LA Lakers while also running with the
    Irvine Striders club during the spring season.
  arts: Ayano Le frequently attends K‑pop dance workshops where they perfect BTS choreography, curate board‑game nights featuring titles like Catan and Ticket to Ride, and relax by listening to Utada Hikaru’s
    ‘First Love’ while preparing communal meals.
  travel: Ayano Le prefers short, well‑planned getaways that balance adventure and relaxation, has explored Big Sur’s rugged coastline, enjoys weekend trips to San Diego’s beaches, dreams of a cherry‑blossom
    season visit to Kyoto and the lantern‑lit streets of Hoi An, and often coordinates travel with friends to share costs.
  culinary: Ayano Le delights in cooking traditional dishes such as miso‑glazed salmon, homemade ramen broth, pho with star anise, and fresh spring rolls, using ingredients like kombu, miso paste, lemongrass,
    and fish sauce, and they love hosting communal meals that blend flavors from their family’s culinary heritage.
  core: Ayano Le merges a routine‑driven career‑coaching ethos with spontaneous group dance breaks, a penchant for communal cooking, occasional planner misplacements, and a steadfast commitment to managing
    anxiety through mindfulness.
background:
  cultural: Ayano was raised in Irvine by a Japanese mother and a Vietnamese father, giving her a blended East Asian heritage that influences many aspects of her life. She speaks fluent Japanese and English,
    and understands basic Vietnamese, allowing her to bridge cultural gaps in her counseling practice. Family traditions such as celebrating Japanese New Year (Oshogatsu) and Vietnamese Tet are important
    to her, and she often incorporates these values of respect, hard work, and community service into her professional ethos. Growing up in a multicultural suburb, she participated in local Asian cultural
    festivals and community organizations, fostering a strong sense of cultural pride while also adapting to the broader American context. This dual cultural perspective enriches her empathy for students
    from diverse backgrounds and informs her commitment to inclusive, culturally responsive career guidance.
attributes:
  skills: '["Career assessment and counseling","Resume and cover letter writing","Interview preparation and mock interviews","Group workshop facilitation","STEM curriculum alignment","Labor market analysis
