    and mentorship coordination"]'
  hobbies: '["Hiking in Orange County parks","K-pop dance classes","Cooking traditional Japanese and Vietnamese dishes","Yoga and meditation for stress relief","Volunteering at local STEM outreach events","Playing
    board games with friends","Group fitness classes (Zumba, spin)"]'
  career_goals: Ayano’s primary ambition is to become a senior career development advisor at a regional university or community college, where she can influence large-scale curriculum-to-career pathways
    for STEM majors. She plans to obtain the Global Career Development Facilitator (GCDF) certification within the next two years and ultimately pursue a master’s degree in counseling psychology to deepen
    her theoretical expertise. Ayano also hopes to design and launch a mentorship network that pairs undergraduate STEM students with industry professionals in the tech and engineering sectors of Orange
    County, providing structured, routine-based support while allowing for flexible mentorship formats. A long-term goal is to integrate mindfulness and stress-management modules into her career workshops,
    reflecting her personal experience with anxiety and her desire to help students navigate the emotional challenges of career planning.
