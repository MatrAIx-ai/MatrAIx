personas:
  professional: Allan Mitchell, a veteran construction supervisor with over twenty years of experience turning blueprints into sturdy structures, adeptly coordinates crews, operates backhoes and excavators,
    enforces OSHA safety protocols, and mentors apprentices, weaving his innate curiosity for new building methods with a down-to-earth practicality, all while relying on a flexible, sometimes loosely organized
    schedule that lets him adapt quickly to on-site challenges.
  sports: Allan Mitchell follows the Mississippi State Bulldogs football team with fervor, keeps an eye on the New Orleans Pelicans in basketball, participates in the local Winston County hunting and fishing
    club, and stays physically active through weekend hikes while tracking deer, early-morning casts on Black Creek, and occasional pick-up games of disc-golf at the county park.
  arts: Allan Mitchell lends his voice to his Baptist church choir, plays harmonica on gospel standards by Mahalia Jackson and Rev. James Cleveland, relaxes with classic blues tracks from B.B. King and
    Muddy Waters and jazz masterpieces by Miles Davis and John Coltrane, and immerses himself in the stories of Southern civil-rights leaders through the works of local historians, allowing music and history
    to shape his creative spirit.
  travel: Allan Mitchell prefers low-key road-trip adventures that mix his love for fishing, hunting, and Southern music heritage, having cast lines on the Sabine River in Texas, danced at the Memphis Blues
    Festival, explored the Delta Blues Trail, and dreaming of a relaxed family weekend on Alabama's Gulf Shores while occasionally eyeing a cabin getaway in the Great Smoky Mountains.
  culinary: Allan Mitchell is a self-taught pitmaster who perfects smoked pork ribs with a mustard-based rub of brown sugar, chipotle, and smoked paprika, simmers collard greens with smoked ham hocks and
    diced onions, and stirs a hearty gumbo featuring Andouille sausage, catfish, okra, and fresh thyme harvested from his garden, often pairing the meals with homemade cornbread.
  core: Allan Mitchell blends seasoned construction expertise, a laid-back Southern charm, gospel harmonica riffs, backyard BBQ mastery, and a habit of occasionally misplacing paperwork, creating a uniquely
    grounded yet adaptable life outlook.
background:
  cultural: Allan is an African‑American who grew up in Kosciusko, Mississippi, a town with deep roots in Southern Black culture and history. His upbringing was shaped by strong family ties, regular church
    attendance, and community gatherings that celebrated gospel music, soul food, and storytelling. The legacy of the civil‑rights era in Mississippi informs his resilient outlook and his commitment to
    uplifting his neighborhood. He maintains close relationships with extended family and participates in church‑centered events such as choir rehearsals, potlucks, and charitable outreach. Allan’s cultural
    identity is reflected in his love of blues and jazz, his appreciation for traditional Southern cuisine, and his dedication to preserving local traditions for his children.
attributes:
  skills: '[''Concrete Formwork'', ''Carpentry'', ''Blueprint Reading'', ''Safety Management (OSHA)'', ''Team Leadership'', ''Heavy Equipment Operation'', ''Site Scheduling'', ''Budget Management'', ''Conflict
    Resolution'', ''Mentoring & Training'', ''Extraction Work Basics'', ''Environmental Compliance'', ''Problem Solving'']'
  hobbies: '[''Fishing'', ''Hunting'', ''Woodworking'', ''Barbecue Cooking'', ''Gospel Choir'', ''Harmonica Playing'', ''Reading Local History'', ''Community Volunteering'', ''College Football Watching'',
    ''Gardening'', ''DIY Home Projects'', ''Attending Local Festivals'']'
  career_goals: Allan aims to advance from his current first‑line supervisory position to a full site manager or project manager within the next three to five years. He plans to earn a Construction Management
    certification and become an OSHA‑authorized trainer, expanding his expertise and enabling him to teach safety best practices. Ultimately, he envisions launching a small, family‑owned contracting firm
    focused on affordable, energy‑efficient homes for families in Winston County. Along the way, he wants to adopt digital scheduling tools to improve his organizational habits and to mentor local youth
    interested in the trades, ensuring a lasting skilled‑craftsman legacy.
