  hobbies: '[''Fly fishing'', ''Snowmobiling'', ''Hiking'', ''Skeet shooting league'', ''Community theater acting'', ''Reading historical non-fiction'', ''Toastmasters public speaking'', ''Meditation for
    stress relief'', ''Barbecue cooking and hosting'', ''Local trivia night participation'']'
  career_goals: Louis aims to advance to a senior or lead estimator role within a regional construction firm, eventually transitioning to a cost‑management director position that oversees multiple projects
    and sets organization‑wide estimating standards. He plans to earn the Certified Professional Estimator (CPE) credential and a PMP certification within the next two years. His ambition includes creating
    a measurable KPI framework for cost accuracy, mentoring junior estimators, and becoming the go‑to cost expert in Lake County. In the longer term, Louis envisions launching his own boutique cost‑consulting
    practice serving small contractors in Bigfork, blending his desire for routine, stability, and competitive recognition.
