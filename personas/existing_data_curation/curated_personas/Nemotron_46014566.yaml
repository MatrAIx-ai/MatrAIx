personas:
  professional: Louis Dwyer, a veteran construction cost estimator based in Bigfork, combines two decades of precision with ProEst, CostX, and VBA‑enhanced Excel to produce rock‑solid bid packages, while
    their talkative, competitive disposition turns every stakeholder meeting into a persuasive performance and their routine‑oriented mindset ensures every estimate follows a strict, repeatable checklist.
  sports: Louis Dwyer, an avid outdoorsman, spends weekends fly‑fishing on Flathead Lake with the Flathead Lake Fly Fishing Club, snowmobiling with the Bigfork Snowmobile Association, sharpening his aim
    in a local skeet‑shooting league, and passionately supports the Montana Grizzlies and Denver Broncos during football season.
  arts: Louis Dwyer, a community‑theater enthusiast, lights up the stage delivering monologues from Arthur Miller and Tennessee Williams, devours historical nonfiction by David McCullough and classics by
    Mark Twain, and unwinds listening to folk‑rock icons John Denver and Neil Young while quoting lines from Clint Eastwood and James Stewart films.
  travel: Louis Dwyer, a meticulous planner, prefers organized road trips that blend adventure with comfort, having explored Yellowstone and Banff on detailed itineraries, and now dreams of a well‑crafted
    journey to Scotland’s Highlands and Patagonia’s remote glaciers once his consulting practice stabilizes.
  culinary: Louis Dwyer, an enthusiastic home‑cook, perfects bison stew, cedar‑plank grilled trout, and smoky pork ribs seasoned with locally harvested huckleberries, showcasing a solid intermediate skill
    set that shines most during weekend barbecues for friends and neighbors.
  core: Louis Dwyer is a routine‑obsessed, talkative competitor who balances meticulous cost spreadsheets with lively barbecues, constantly worries about every detail, and occasionally splurges on snowmobile
    upgrades to impress their peers.
background:
  cultural: Louis is a second‑generation Irish‑American; his grandparents emigrated from County Cork and settled in the Midwest before his family moved west in the 1990s. Raised in a small Wisconsin town,
    he grew up with Midwestern pragmatism and an Irish storytelling tradition that fostered both practicality and narrative flair. After earning a BA in humanities, he relocated to Bigfork, Montana, where
    he embraced the local Western ranching and outdoors culture that prizes self‑reliance, community involvement, and respect for the land. His marriage and active participation in civic groups reflect
    his commitment to family‑oriented, close‑knit values common to his heritage and his rural Montana setting. He celebrates St. Patrick’s Day with his family while also taking part in Bigfork’s "Summer
    on the Lake" festival, embodying a blended cultural identity that merges Irish roots, Midwestern upbringing, and Rocky Mountain lifestyle.
attributes:
  skills: '[''Construction cost estimation'', ''Blueprint and specification analysis'', ''Advanced Excel modeling'', ''ProEst/CostX software proficiency'', ''Bid preparation and analysis'', ''Contract negotiation'',
