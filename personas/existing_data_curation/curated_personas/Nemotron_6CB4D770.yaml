  career_goals: Ladda’s immediate goal is to earn his GED within the next year, after which he plans to enroll in a community‑college program focused on information technology or computer science. He intends
    to obtain industry‑recognized certifications such as CompTIA A+ and Security+, and to build a portfolio of open‑source contributions that showcase his web development and cybersecurity projects. In
    the long term, he aspires to secure a remote position as a full‑stack developer or a cybersecurity analyst, roles that blend structured problem‑solving with the autonomy he values. Ultimately, he hopes
    to combine his technical expertise with his passion for creating secure, user‑friendly software solutions.
