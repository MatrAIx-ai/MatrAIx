  career_goals: Although only three, Douglas often talks about future roles that involve helping others and exploring his curiosity. He dreams of becoming a firefighter or a teacher because he enjoys rescuing
    toys and sharing stories during pretend play. In the near term, his goal is to master reading simple picture books, write his name, and take on small responsibilities at home like setting the table
    or feeding a pet. These ambitions blend his desire for predictable progress with his spontaneous imagination, and his calm resilience keeps him motivated even when challenges arise.
