personas:
  professional: Kirsten Beene, a methodical industrial engineer specializing in health and safety, blends lean manufacturing, data‑driven ergonomic assessments, and rigorous risk analysis to drive measurable
    safety improvements while leveraging their organized, assertive yet collaborative style to mentor teams and champion structured process optimization, and they consistently align safety metrics with
    operational goals.
  sports: Kirsten Beene, an enthusiastic participant in Zumba, HIIT, and salsa dancing, also rows with the Jacksonville Kayak Club, supports the Jacksonville Jaguars (NFL) and the Jacksonville Jumbo Shrimp
    (MiLB), and they maintain a weekly schedule that balances high‑intensity group workouts with weekend kayaking on the St. Johns River.
  arts: Kirsten Beene, a lover of rhythm and performance, regularly listens to salsa legends like Celia Cruz and Marc Anthony, attends local theater productions such as "The Glass Menagerie" at the Riverside
    Players, and they find that music and visual art fuel both their creative expression and stress‑relief strategies.
  travel: Kirsten Beene, a structured yet adventure‑seeking traveler, meticulously plans weekend road trips to Gulf Coast beaches for community clean‑up events and long‑duration vacations to Barcelona,
    Spain, to dive into salsa culture, balancing travel costs with a dedicated travel fund, and they ensure each itinerary aligns with their professional development goals.
  culinary: Kirsten Beene, an enthusiastic home‑cook, often prepares grilled mahi‑mahi tacos with mango salsa, enjoys hearty jambalaya seasoned with cayenne, cultivates basil and cilantro in their garden
    for fresh flavor, and they indulge in sushi from a local Japanese spot, though they habitually avoid overly salty dishes.
  core: Kirsten Beene, a 44‑year‑old safety‑focused engineer, blends disciplined planning with vibrant social energy, juggling spreadsheets and salsa shoes while they constantly battle a worry‑prone mind.
background:
  cultural: Kirsten was raised in a middle‑class white family in the Northeast, where a strong work ethic and community involvement were emphasized. After completing her STEM degree, she relocated to Orange
    Park, FL, where she embraced the laid‑back, outdoor‑oriented lifestyle of the Southeast while maintaining her structured, methodical approach to life. Her cultural identity blends the pragmatic, goal‑oriented
    mindset of her upbringing with the warm, community‑focused values of the Florida region, reflecting a balance of independence and collaborative spirit.
