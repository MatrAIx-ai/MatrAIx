  career_goals: Kirsten aims to advance into a senior leadership role where she can shape enterprise‑wide safety culture and drive systematic improvements across multiple facilities. She plans to obtain
    her Professional Engineer (PE) license and a Certified Safety Professional (CSP) certification within the next two years. Long‑term, she envisions establishing a mentorship program for women in engineering,
    championing mental‑health‑aware workplace policies, and eventually transitioning into a consultancy role that helps smaller manufacturers implement robust health‑safety systems while maintaining operational
    efficiency.
