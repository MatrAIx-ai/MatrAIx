  career_goals: Tamara aims to complete her high school equivalency (GED) within the next year, followed by enrollment in community college courses that focus on psychology and counseling. She aspires to
    become a mental health counselor or a community outreach worker, where she can use her compassion and cooperative nature to support individuals experiencing anxiety and depression. In the short term,
    she plans to volunteer at the local youth counseling center and the animal shelter, gaining practical experience while managing her own emotional wellbeing. She also hopes to develop a personal self-care
    routine, learning mindfulness techniques, to sustain a healthy work-life balance as she pursues higher education.
