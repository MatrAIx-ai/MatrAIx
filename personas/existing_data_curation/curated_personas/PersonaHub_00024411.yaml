persona_description: A paleontologist who specializes in the study of fossil silicoflagellates, particularly those from the Miocene period. His research interests include the identification, description,
  and classification of these organisms, as well as the application of paleontological nomenclature to their taxonomic status. He is particularly interested in the development of new genera and families
  based on living silicoflagellates, and in the replacement of existing names based on fossil material. He is also interested in the application of paleontological nomenclature to the study of other phycological
  taxa, and in the development of new names for these taxa based on living material.
