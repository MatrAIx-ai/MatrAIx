    threat detection'', ''IoT security'', ''Security policy development'']'
  hobbies: '[''Hiking in Sonoma County'', ''Landscape photography'', ''Cooking Mexican cuisine with modern twists'', ''Reading science fiction and classic literature'', ''Arduino and Raspberry Pi tinkering'',
    ''Digital safety workshops for seniors'', ''Playing chess at local club'', ''Wine tasting and vineyard tours'']'
  career_goals: Looking ahead, Hiram aims to step into a strategic leadership role, such as Chief Information Security Officer, where he can shape enterprise‑wide security programs for midsize businesses—particularly
    those in Sonoma County’s wine and agriculture sectors. He is passionate about mentoring the next generation of analysts, planning to teach part‑time at a community college and to run a bilingual cybersecurity
    bootcamp for Spanish‑speaking students. Hiram also wishes to author a practical guide on affordable security measures for small businesses and to contribute to open‑source security tools. While he envisions
    a gradual transition toward consulting and mentorship, he intends to remain actively engaged in the field for as long as his curiosity and health allow.
