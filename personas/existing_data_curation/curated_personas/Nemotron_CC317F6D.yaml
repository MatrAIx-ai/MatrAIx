personas:
  professional: Hiram Negronperez, a 66‑year‑old veteran information security analyst, leverages their deep expertise in network design, penetration testing, and AI‑driven threat detection to build robust
    defenses while their spontaneous, curiosity‑driven nature often leads them to prototype unconventional security solutions before formalizing them, even as they occasionally battle disorganization and
    tight deadlines.
  sports: Hiram Negronperez stays fit by tackling the rolling hills of Sonoma County with the Sonoma Trail Runners, cheerfully follows the San Francisco Giants and Golden State Warriors, and they occasionally
    join local pick‑up basketball games in the summer, reflecting a seasonal blend of endurance hiking and team‑spirit recreation.
  arts: Hiram Negronperez immerses themselves in the visual world through landscape photography reminiscent of Ansel Adams, devours the speculative works of Isaac Asimov and Ursula K. Le Guin, and unwinds
    to the folk‑rock tones of Fleet Foxes and the jazz stylings of Nina Simone, letting these artistic influences shape both their creative projects and their culinary experiments.
  travel: Hiram Negronperez prefers low‑key road trips that combine photography and culinary discovery, having captured sunrise over Napa Valley’s wineries and explored the historic vineyards of Bordeaux,
    while their bucket list includes a culinary pilgrimage to Oaxaca’s markets and a serene sunrise shoot at Kyoto’s Arashiyama bamboo grove.
  culinary: Hiram Negronperez, an accomplished home chef, breathes new life into classic Mexican dishes—crafting smoky mole with locally sourced cacao, hand‑rolled tamales infused with rosemary, and citrus‑bright
    ceviche topped with jalapeño‑pickled radish—while frequently pairing meals with a carefully curated selection of boutique wines from Sonoma’s vineyards.
  core: Hiram Negronperez merges a keen security mind with a roaming photographer’s eye, balancing meticulous risk assessments with spontaneous hobby‑sprees that often leave their inbox cluttered and their
    schedule delightfully chaotic.
background:
  cultural: Raised in a Mexican immigrant family in California, Hiram grew up bilingual in Spanish and English, deeply rooted in traditions such as Día de los Muertos, quinceañeras, and weekend family gatherings
    featuring tamales, pozole, and homemade salsa. The values of familismo and community solidarity shape his collaborative approach at work. He actively participates in Santa Rosa’s Latino cultural events,
    enjoys Mexican music and dance, and supports community initiatives that bridge the digital divide for Spanish‑speaking residents. His heritage informs both his personal passions—like cooking and cultural
    celebrations—and his professional drive to make cybersecurity accessible and relevant to diverse communities.
