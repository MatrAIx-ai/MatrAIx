  career_goals: Yen aims to transition from individual housekeeping work to a supervisory or managerial role within a reputable cleaning company, leveraging her reliability and organizational strengths.
    She hopes to obtain a professional cleaning certification and eventually launch a small, locally‑owned cleaning service that employs a few trusted workers, providing stable income for her retirement.
    She also aspires to mentor younger employees, especially Spanish‑speaking newcomers, helping them develop the same disciplined work ethic she values. Financially, she seeks to build a modest savings
    cushion to support her health needs and maintain independence in her later years.
