personas:
  professional: Yen Rodriguez, a veteran residential and commercial housekeeping professional known for meticulous deep‑cleaning, bilingual communication, and safe chemical handling, applies their structured,
    detail‑oriented mindset to deliver consistent service while they pursue a supervisory position that will allow them to mentor Spanish‑speaking staff and lay the groundwork for a modest retirement‑focused
    cleaning enterprise.
  sports: Yen Rodriguez enjoys low‑impact fitness through regular walks in the Apopka nature trails, occasional pickleball matches at the senior center, and they follow the Orlando Magic and Orlando City
    SC with quiet loyalty, balancing activity with a preference for modest, structured exercise routines.
  arts: Yen Rodriguez finds cultural resonance in classic cumbia and vallenato, regularly streaming beloved songs by Diomedes Díaz and Carlos Vives, while they unwind with historical novelas such as 'Los
    Ríos Profundos,' and occasionally attend church choir rehearsals or local folkloric dance shows that reinforce their sense of community and heritage.
  travel: Yen Rodriguez favors relaxed, well‑planned journeys, often exploring the Gulf Coast’s Clearwater Beach and the historic streets of Savannah, while they dream of a cultural pilgrimage to a Caribbean
    walled city renowned for its vibrant festivals, and occasionally join group tours to Spain’s Seville to experience its spring feria, balancing wanderlust with budget mindfulness.
  culinary: Yen Rodriguez delights in preparing hearty arepas, bandeja paisa, and arroz con pollo, skillfully blending corn masa, chicharrón, sautéed plantains, fresh cilantro, and cumin, while they tend
    a modest herb garden for fragrant garnishes, and often share these comforting meals at church gatherings and neighborhood potlucks.
  core: Yen Rodriguez is a methodical, warm‑hearted caretaker who balances meticulous household mastery with a love for traditional cooking, quiet gardening, and steady, low‑risk financial planning, all
    while they nurture community ties through humble, harmonious living.
background:
  cultural: Yen was born in Colombia and grew up in a Catholic, family‑centric environment where respect for elders and community harmony were emphasized. She carries the warmth of Colombian hospitality,
    often preparing sharing meals and celebrating traditional holidays like Día de los Reyes and Carnaval. Fluent in Spanish, she maintains close ties with the Colombian diaspora in Florida, attending cultural
    events and local festivals that feature bambuco and salsa. While adapting to life in Apopka, Florida, she blends Colombian customs with Floridian influences, such as enjoying the outdoors and integrating
    into the diverse, multilingual community. Her cultural identity informs her work ethic, love for order, and prioritization of harmonious relationships.
