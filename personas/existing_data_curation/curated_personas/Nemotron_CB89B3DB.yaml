  hobbies: '[''Reading speculative fiction and philosophy'', ''Charcoal sketching'', ''Digital collage using tablet'', ''Photography of historic architecture'', ''Attending community art shows'', ''Monthly
    book‑exchange club'', ''Mindfulness journaling'', ''Creative short‑story writing'']'
  career_goals: Her long‑term ambition is to translate her office experience and creative instincts into a role that blends administration with marketing or visual communication. She plans to earn an associate
    degree in graphic design or digital marketing within the next two years, followed by a certification in project management. Ultimately, she hopes to become a marketing coordinator or content strategist
    for a small‑to‑mid‑size firm where she can shape brand narratives, oversee campaign logistics, and continue to innovate workplace processes. She also entertains the idea of launching a freelance side‑business
    creating custom illustrations and branding packages for local businesses.
