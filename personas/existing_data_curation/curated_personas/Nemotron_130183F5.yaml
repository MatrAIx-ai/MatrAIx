    & Graphic Design'', ''Coaching & Mentoring'']'
  hobbies: '[''Visiting contemporary art galleries'', ''Sketching and visual brainstorming'', ''Landscape and street photography'', ''Chess (weekly club)'', ''Hiking prairie trails'', ''Reading non‑fiction
    (psychology, technology, philosophy)'', ''DIY woodworking'', ''Home‑brewing craft beer'', ''Volunteering at community center (digital literacy workshops)'']'
  career_goals: Cody aspires to become a Director of Learning and Development within a forward‑looking manufacturing or agribusiness firm in the Midwest, where he can shape a strategic talent pipeline that
    blends rigorous performance metrics with innovative, art‑inspired learning experiences. Over the next five years he aims to earn the Certified Professional in Learning and Performance (CPLP) credential,
    spearhead the implementation of immersive technologies such as AR‑enhanced safety training, and publish a guide on integrating design thinking into corporate development programs. Ultimately, he envisions
    launching his own boutique consultancy that partners with small‑to‑medium enterprises to create customized, high‑impact learning solutions while maintaining a balanced lifestyle that supports his family
    and community involvement.
