personas:
  professional: Cody Spark is a senior instructional designer and learning strategist who leverages a decade of experience in adult learning theory, Articulate 360, and data‑driven evaluation to craft immersive
    e‑learning modules, bringing a disciplined, process‑oriented mindset and an artist’s eye for visual storytelling to every corporate training rollout, and their calm, resilient demeanor makes them the
    go‑to mediator during high‑pressure launches.
  sports: Cody Spark is an avid hiker of the Flint Hills, a member of the local Cross‑Country Club running group, and a dedicated fan of the Kansas City Chiefs and Kansas Jayhawks, balancing weekly trail
    runs with seasonal basketball viewings and occasional participation in community five‑k races.
  arts: Cody Spark regularly visits contemporary art galleries in Wichita and Kansas City, sketches concepts for training modules inspired by the bold color palettes of Mark Rothko, captures Kansas skies
    in the style of Ansel Adams, and enjoys listening to the ambient post‑rock of Explosions in the Sky while experimenting with visual storytelling.
  travel: Cody Spark prefers purposeful road trips that blend scenic prairie drives with cultural stops, having explored the historic streets of St. Louis, the art districts of Austin, and the rugged coast
    of Maine, while dreaming of a future cycling tour through the vineyards of Tuscany that fits within a modest family budget.
  culinary: Cody Spark enjoys cooking a slow‑smoked brisket with a Kansas‑grown heirloom corn rub, experimenting with seasonal recipes like beet and goat cheese salad, and brewing their own German‑style
    lagers, displaying an intermediate kitchen skill set that balances tradition with the occasional indulgent gastropub outing.
  core: Cody Spark is a calm, organized learning architect who merges Midwestern pragmatism with artistic curiosity, crafting high‑impact training while savoring craft beer, hikes, and community service.
background:
  cultural: Cody was born and raised in the small‑town environment surrounding Greensburg, Kansas, a region shaped by agricultural roots and a strong sense of community. His family traces its ancestry to
    German and English settlers who arrived in the Midwest in the late 19th century, giving him a cultural heritage of practicality, self‑reliance, and modesty. The 2007 EF5 tornado that devastated Greensburg
    left a lasting imprint on his outlook, reinforcing his calm resilience and commitment to rebuilding and helping others. Growing up in a predominantly white, Midwestern setting, Cody internalized values
    such as hard work, punctuality, and neighborliness, while his curiosity drove him to seek artistic and intellectual experiences beyond his hometown. This blend of traditional Midwestern values with
    an openness to new ideas informs both his professional ethos and his personal life.
