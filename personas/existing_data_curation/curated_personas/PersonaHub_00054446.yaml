persona_description: A scientist who specializes in the study of infectious wildlife diseases, particularly white-nose syndrome (WNS) and its effects on bat populations. They have conducted extensive research
  on the spread of the fungus associated with WNS, including its source and the species affected. They are also interested in the economic impact of WNS on bat populations and the potential for recovery
  of infected bats. They have worked with infected bats to determine what conditions might mitigate the disease, rehabilitated bats in labs to learn whether they can recover, and used electron microscopy
  to study the lesions associated with the disease. They are part of the Southeastern Cooperative Wildlife Disease Study and have published their findings in scientific journals.
