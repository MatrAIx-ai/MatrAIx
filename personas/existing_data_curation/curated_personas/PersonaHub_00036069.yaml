persona_description: This study assessed the word stress competence and literacy in Dutch children with a family risk of dyslexia and normally developing children. The research aimed to investigate the
  relationship between word stress production and literacy abilities. The study found that children with a family risk of dyslexia had more difficulties in producing stress patterns and were related to
  their phonological abilities, but not to their literacy abilities at age eight. The study also found that there is a bidirectional relationship between segmental representations and word stress abilities.
  The findings are interpreted within the phonological deficit hypothesis of dyslexia.
