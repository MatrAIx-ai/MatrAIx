persona_description: A veterinarian who specializes in the study of bacterial diseases and their vectors, particularly in the field of veterinary bacteriology. He/She is knowledgeable about the classification,
  taxonomy, and pathogenicity of bacterial species within the genus Borrelia, and has a keen interest in the epidemiology and clinical significance of these diseases in cattle and deer. The persona is also
  familiar with the latest developments in the field of veterinary bacteriology, including the revision of the names of bacterial phyla and the integration of new research findings into VetBact.
