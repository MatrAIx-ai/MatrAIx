personas:
  professional: Iris Gonzalez is a seasoned protective‑service specialist with a teaching background who blends rigorous risk assessment, emergency response, and conflict de‑escalation expertise with a
    creative, art‑infused training method to safeguard both people and Saint Augustine’s historic sites.
  sports: Iris Gonzalez enjoys low‑intensity fitness, such as sunrise bird‑watching walks with the Saint Augustine Ornithologists Club and occasional paddleboarding on Matanzas Bay, while cheering on the
    Miami Dolphins in the fall, the Tampa Bay Rays in summer, and the Orlando Magic during basketball season.
  arts: Iris Gonzalez spends solitary afternoons painting watercolors of the city’s pastel‑hued Spanish‑colonial facades, sketching abstract compositions inspired by Kandinsky, photographing historic landmarks,
    and listening to Beethoven’s late piano sonatas while admiring the work of local muralist Carlos Herrera.
  travel: Iris Gonzalez prefers flexible, solo itineraries that blend historic exploration with quiet reflection, having trekked the cobblestone streets of Cartagena, wandered the Alcázar in Seville, studied
    early American colonial towns like Williamsburg, and dreams of a slow‑paced pilgrimage to the ancient ruins of Machu Picchu.
  culinary: Iris Gonzalez delights in savoring Cuban coffee with a splash of milk, cooking key‑lime‑marinated grilled snapper topped with fresh cilantro, and occasionally preparing a hearty black‑bean soup
    flavored with cumin and plantain chips, though their disorganized pantry sometimes leads to last‑minute takeout.
  core: Iris Gonzalez is a solitary, imagination‑driven security veteran who balances a love for historic preservation with a habit of misplacing watercolor brushes while rigorously protecting heritage
    sites.
background:
  cultural: Iris is a white American with a Hispanic surname, reflecting a mix of Anglo‑American and Spanish ancestry. Raised in the South and now residing in Saint Augustine, she grew up surrounded by
    the city’s layered Spanish‑colonial, maritime, and African‑American heritage. This environment fostered an appreciation for historic preservation and multicultural traditions, such as the annual Spanish
    Colonial Festival and local Cuban coffee culture. Her family emphasized education and community service, values she carries into her protective‑service career. Iris’s cultural identity blends the relaxed,
    solitary temperament of a lifelong learner with a deep respect for the diverse history that defines her hometown.
attributes:
