  hobbies: '[''Watercolor painting'', ''Sketching'', ''Reading speculative fiction'', ''Exploring historic sites'', ''Photography'', ''Birdwatching'', ''Gardening'', ''Mindfulness meditation'', ''Classical
    music listening'', ''Playing piano'']'
  career_goals: Iris aims to progress into a senior security coordinator role for a historic or cultural institution in Saint Augustine, where she can integrate protective measures with educational outreach.
    She envisions creating a training curriculum that uses storytelling, art, and abstract concepts to teach situational awareness to staff and volunteers. Long‑term, she hopes to become a consultant for
    heritage‑site security, staying ahead of emerging technologies while preserving the city’s historic character. Mentoring younger protective‑service personnel and possibly teaching part‑time at a community
    college are also important to her, as is earning advanced certifications in risk management and public safety.
