  hobbies: '[''Painting'', ''Sketching'', ''DIY Upcycling'', ''Listening to Jazz and R&B'', ''Cooking Southern Soul Food'', ''Gardening'', ''Hiking'', ''Community Volunteering'', ''Attending Art Fairs'']'
  career_goals: Denise aims to advance from a packer to a supervisory or lead role within the distribution center, where she can mentor new staff and influence workflow improvements. She plans to earn a
    GED and pursue a certificate in supply‑chain logistics or a Certified Production and Inventory Management (CPIM) credential to broaden her technical knowledge. Long‑term, Denise is interested in bridging
    her packaging expertise with her artistic inclination by moving into product packaging design, creating visually engaging and environmentally friendly packaging solutions. She also hopes to secure a
    more stable income that supports her independent living situation after separation, while finding a workplace culture that acknowledges stress‑management and offers growth opportunities.
