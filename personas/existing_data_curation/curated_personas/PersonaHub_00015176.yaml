persona_description: A conservation biologist with expertise in aquatic invasive species, particularly in the study of the spread and impact of Eurasian water milfoil in Wisconsin rivers and streams. She
  is leading a project to conduct a comprehensive survey of the milfoil in the St. Croix River and its tributaries, with the goal of identifying areas where it is present and determining its impact on local
  ecosystems. She is also partnering with the River Alliance of Wisconsin and Douglas County AIS Coordinator Amy Eliot on the project, and plans to conduct a similar survey in the Lake Superior region.
  She is knowledgeable about the importance of monitoring aquatic invasive species in order to prevent their spread and protect local ecosystems, and is working to raise awareness about the issue through
  her research and outreach efforts.
