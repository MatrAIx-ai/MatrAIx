personas:
  professional: Carolyn Powell is a seasoned guidance counselor who blends their curiosity for emerging STEM fields with a pragmatic, data‑driven approach to crafting district‑wide career pathways, while
    their outgoing personality fuels collaborative workshops and community mentorship.
  sports: Carolyn Powell is a devoted fan of the Orlando Magic (NBA) and Orlando Pride (NWSL), regularly joins the Lake Eola Running Club for early‑morning 5K runs in cooler months, attends Orlando Solar
    Bears hockey games in winter, and sometimes skips workouts due to their flexible, leisurely planning style.
  arts: Carolyn Powell immerses themselves in contemporary literature, regularly discussing novels by Chimamanda Ngozi Adichie and Haruki Murakami at their book club, while evenings often feature live performances
    by the local indie folk group The Guitars of Orlando and jazz saxophonist Chris Bostic.
  travel: Carolyn Powell prefers impromptu road trips that whisk them from Orlando to the mangrove trails of Everglades National Park or the pine‑flatwoods of Myakka River State Park, and they dream of
    a future sailing vacation through the Greek islands of Santorini and Mykonos.
  culinary: Carolyn Powell delights in crafting Mediterranean meals such as shakshuka with preserved lemon, herb‑marinated grilled branzino, and creamy hummus topped with smoked paprika, often hosting potluck
    evenings where friends share homemade tzatziki and feta‑stuffed grape leaves.
  core: Carolyn Powell is a curiosity‑driven guidance leader whose love for spontaneous road trips, aromatherapy experiments, and community mentoring is tempered by a habit of procrastinating paperwork
    and an undercurrent of anxiety that fuels their relentless quest for balanced well‑being.
background:
  cultural: Carolyn was raised in a suburban Midwestern family that valued education, community service, and self‑reliance. Relocating to Orlando in her early thirties exposed her to the city’s multicultural
    tapestry and the hospitality-driven economy, shaping her inclusive outlook and appreciation for diverse perspectives. Her upbringing combines classic American middle‑class ideals—such as the belief
    that hard work expands opportunity—with Southern hospitality’s emphasis on warmth and personal connection. These cultural threads inform her collaborative counseling style, her commitment to fostering
    equitable access to STEM careers, and her love for communal gatherings that blend tradition with the vibrant, eclectic spirit of Central Florida.
attributes:
  skills: '[''Career Counseling'', ''Student Assessment'', ''STEM Subject Knowledge'', ''Group Workshop Facilitation'', ''Data Analysis and Reporting'', ''Crisis Intervention'', ''Active Listening'', ''Assertive
