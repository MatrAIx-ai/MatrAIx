    Techniques'']'
  hobbies: '[''STEM Outreach Volunteering'', ''Robotics Mentoring'', ''Weekend Road Trips'', ''Nature Photography'', ''Birdwatching'', ''Yoga'', ''Aromatherapy'', ''Community Book Club'', ''Mediterranean
    Cooking'', ''Potluck Gatherings'', ''Attending Local Festivals and Live Music'']'
  career_goals: Carolyn aims to become the Director of Guidance Services for the Orange County Public Schools, where she can design district‑wide career pathways that integrate emerging STEM fields with
    local industry partnerships. She envisions launching a statewide mentorship network linking high‑school students to professionals at Orlando’s tech, aerospace, and tourism sectors. To support student
    well‑being, she plans to incorporate evidence‑based stress‑reduction workshops into the counseling curriculum and to obtain certification in Cognitive‑Behavioral Coaching. Long‑term, she hopes to author
    a guidebook on navigating STEM careers while maintaining mental health, and to mentor emerging counselors through a professional development fellowship.
