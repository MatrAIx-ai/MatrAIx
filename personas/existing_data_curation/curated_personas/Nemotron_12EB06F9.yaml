  hobbies: '[''Gardening'', ''Reading (non-fiction, finance, history)'', ''Bridge'', ''Book Club'', ''Walking/Hiking'', ''Bird‑watching'', ''Volunteer Workshop Coordination'', ''Knitting'', ''Quilting'']'
  career_goals: Looking ahead, Blondine aims to transition into a supervisory role such as Office Manager or Administrative Services Manager within the next two years, leveraging her experience to oversee
    a small team and streamline office operations. She plans to earn the Certified Administrative Professional (CAP) credential to formalize her expertise. Additionally, she is exploring part‑time consulting
    opportunities to provide administrative and bookkeeping support to local small businesses and retirees, allowing her to generate supplemental income for her upcoming retirement while maintaining a flexible
    schedule. She also hopes to mentor younger staff and contribute to community programs that teach basic computer and budgeting skills.
