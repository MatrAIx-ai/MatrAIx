  career_goals: Although retired, Logan aims to stay active and mentally engaged. He hopes to volunteer regularly at the local senior center and the Milford historical society, mentor younger volunteers,
    and complete a written memoir of his life and the town’s history. Maintaining his health through regular walks and staying socially connected are also high priorities.
