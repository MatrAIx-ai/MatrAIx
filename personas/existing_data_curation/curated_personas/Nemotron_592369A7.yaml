personas:
  professional: William Carswell, a 17‑year‑old aspiring concept artist, blends pen‑and‑charcoal drawing, digital illustration in Procreate and Photoshop, and basic Python automations to prototype game
    assets, while their curiosity and competitive streak drive relentless refinement of their portfolio and punctual delivery on freelance commissions.
  sports: William Carswell enjoys weekend hikes in the Cheyenne plains, is a member of the Cheyenne Outdoor Club’s trail‑running group, follows the Denver Broncos, Colorado Avalanche, and Colorado Rockies
    with avid enthusiasm, and occasionally plays pick‑up basketball at the high‑school gym to keep fit, preferring solo endurance activities over team sports.
  arts: William Carswell immerses themselves in speculative fiction and philosophy, curates a blog showcasing digital paintings inspired by Hayao Miyazaki, atmospheric soundscapes by Aphex Twin, and charcoal
    studies echoing the texture of Ansel Adams, while they regularly attend indie concerts by Tame Impala and local experimental music nights to fuel creative cross‑pollination.
  travel: William Carswell dreams of photographing the aurora borealis in Iceland after mastering the light of Yellowstone’s geysers, has already captured sunrise over Grand Teton, and plans a solo backpacking
    trip to the Japanese Alps to document remote landscapes, favoring meticulously planned itineraries that balance adventure with affordable travel budgets.
  culinary: William Carswell, a self‑taught home cook, favors rustic dishes like bison chili, pan‑seared Colorado trout with lemon‑dill sauce, and quinoa salads topped with wild berries, often experimenting
    with smoked paprika and fresh herbs while relying on a modest kitchen setup and occasional campfire cooking during hikes.
  core: William Carswell is a fiercely curious teen artist whose disciplined sketchbook habit coexists with an impulsive love for new tech gadgets, a competitive edge that fuels both art and finance quirks,
    and a solitary yet resilient spirit that thrives on mountain solitude and occasional creative chaos.
background:
  cultural: William grew up in Cheyenne, Wyoming, a small city on the High Plains with a strong frontier heritage. His family roots trace back to European (primarily Anglo‑Saxon and Scandinavian) ancestors,
    and his upbringing reflects the region’s emphasis on self‑reliance, appreciation of the outdoors, and community values typical of a Mid‑western/Western American setting. Although his formal schooling
    ended before ninth grade, he has been influenced by local museums that highlight Native American history and the natural environment of the Rockies and plains. The blend of western individualism, exposure
    to internet art subcultures, and the modest, close‑knit community of Cheyenne shapes his cultural identity.
