  career_goals: William aims to turn his artistic talents into a professional career. He plans to build a portfolio that will enable him to work as a freelance concept artist for indie video games or animated
    films. He also aspires to launch a personal brand on platforms like Instagram and Patreon, offering commissions and digital prints. In the longer term, he hopes to publish a photography book showcasing
    the Wyoming landscape and to earn recognition in outdoor magazines. To achieve these goals, he intends to complete a GED, pursue an apprenticeship in graphic design, and participate in art competitions.
