  career_goals: Nancy dreams of becoming a teacher because she loves sharing stories and helping friends learn new things. She is also fascinated by animals and imagines herself as a veterinarian who cares
    for farm animals she often sees around Bowersville. Occasionally, she pretends she will be a kid‑focused TV host, where she can talk, entertain, and make people smile. Her ambitions reflect a desire
    to keep exploring, learning, and bringing joy to others.
