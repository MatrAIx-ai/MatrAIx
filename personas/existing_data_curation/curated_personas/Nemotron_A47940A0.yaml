personas:
  professional: Nancy Seo, an eager preschool class helper, blends curiosity with practicality by suggesting new games during playtime while they keep the snack table organized, enjoying the spotlight of
    guiding peers.
  sports: Nancy Seo, a lively fan of the local youth soccer league, loves to dribble a bright orange ball in the backyard, cheers loudly for the Springfield Tigers during weekend games, and they enjoy spontaneous
    races with friends at the park.
  arts: Nancy Seo, an avid fan of Disney’s Frozen and the children’s singer Raffi, spends afternoons drawing colorful pictures of Elsa and performing Baby Beluga on a toy piano, letting their imagination
    shape their creative world and they often invite friends to join the mini‑concerts.
  travel: Nancy Seo, who has visited the nearby beach with a family sandcastle building expedition and dreamed of a future trip to Tokyo Disneyland, loves planning trips with crayons on a map, preferring
    adventure over quiet vacations and they eagerly share travel stories with classmates.
  culinary: Nancy Seo, a picky yet enthusiastic eater, adores peanut butter and banana sandwiches, chicken nuggets with honey mustard, and insists on adding extra shredded cheese to mac and cheese, and
    they often help stir batter with a tiny wooden spoon.
  core: Nancy Seo, a sociable five‑year‑old who thrives on attention, mixes boundless curiosity with a laid‑back approach, and they navigate the world with playful energy, occasional disorganization, and
    a heart full of kindness.
background:
  cultural: 'Nancy lives in Bowersville, a small rural community in Hart County, Georgia. Her family embraces Southern traditions: weekly attendance at a local Baptist church, participation in community
    events like the county fair, and sharing meals that feature classic Southern foods such as fried chicken, cornbread, and sweet tea. The close‑knit neighborhood encourages neighborly help and frequent
    family gatherings. While her surname reflects a Korean ancestry, her upbringing is rooted in the predominantly white Southern culture of the region, emphasizing hospitality, community connection, and
    a love for outdoor activities.'
attributes:
  skills: '[''Counting to 20'', ''Letter recognition'', ''Puzzle solving'', ''Block building'', ''Basic water experiments'', ''Storytelling'', ''Social interaction'', ''Empathy and sharing'', ''Basic tablet
