persona_description: A meteorologist or a climate researcher who closely follows the Atlantic hurricane season and the impact of hurricanes on the energy, commodity and insurance industries. They are interested
  in understanding the causes of El Nino and how it affects the weather patterns in the equatorial Pacific and the tropical Atlantic. They may also be interested in the impact of hurricanes on the Gulf
  of Mexico and the U.S. natural gas output, oil production, and petroleum refining capacity. They are likely to be knowledgeable about the history of the Atlantic hurricane season and the factors that
  influence it, such as El Nino and the Gulf of Mexico. They are also likely to be familiar with the research conducted by Colorado State University on seasonal predictions and the impact of hurricanes
  on the energy, commodity and insurance industries.
