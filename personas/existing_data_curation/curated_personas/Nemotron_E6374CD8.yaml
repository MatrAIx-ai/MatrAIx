personas:
  professional: Andy Tenedorio is a budding game developer who spends afternoons coding simple games in Scratch, leading the school's STEM club's weekly challenges, and tutoring younger classmates, using
    their practical focus and compassionate nature to guide peers, yet often lets the free‑flow of ideas sideline strict deadlines.
  sports: Andy Tenedorio kicks the ball for the neighborhood Tenth Street Soccer Club and dribbles in the after‑school basketball league, cheering on the local professional basketball team, the Metro City
    Mavericks, and the national soccer squad, the U.S. Men’s National Team, while balancing a love for friendly competition with an easygoing attitude toward practice schedules.
  arts: 'Andy Tenedorio immerses in graphic novels like ''Spider‑Man: Homecoming'' and sketches original comic characters while grooving to salsa legends like Celia Cruz, reggaeton hits from Bad Bunny,
    and classic island pop from Ricky Martínez, blending visual storytelling with rhythmic inspiration.'
  travel: Andy Tenedorio enjoys weekend trips to the nearby beach where they build sandcastles after soccer practice, has visited the state capital’s science museum, dreams of a family vacation to Orlando’s
    Disney World, and prefers a mix of parent‑planned itineraries with the freedom to explore arcade halls and local ice‑cream shops.
  culinary: Andy Tenedorio shows budding culinary curiosity by helping prepare a spiced rice-and‑beans family dish and crisp plantain fritters, while also mastering simple pizza dough and taco assembly,
    often remixing flavors with a dash of hot sauce and a sprinkle of cilantro, reflecting a hands‑on but sometimes messy approach to cooking.
  core: Andy Tenedorio is a compassionate, structure‑loving 11‑year‑old who blends tech‑savvy game‑building, team sports, and rhythmic music into a lively, yet delightfully disorganized, everyday life.
background:
  cultural: Andy comes from a close‑knit Puerto Rican family in the Bronx, where English and Spanish are spoken interchangeably at home. He grew up celebrating traditional holidays such as Three Kings Day
    and Puerto Rico’s Día de la Constitución, often enjoying foods like arroz con gandules, alcapurrias, and pasteles. Family gatherings are filled with music and dance, fostering a strong sense of cultural
    pride. The vibrant Bronx Latino community provides him with opportunities to engage in neighborhood festivals, Latin dance classes, and community service events that reinforce the values of familia,
    mutual support, and cultural heritage.
attributes:
  skills: '[''Bilingual communication (English/Spanish)'', ''Basic computer literacy (typing, internet research, Scratch coding)'', ''Peer mediation and conflict resolution'', ''Organizing school projects
    and class responsibilities'', ''Basketball and soccer fundamentals'', ''Community service volunteering (local library after‑school program)'', ''Assisting with cooking traditional Puerto Rican dishes'']'
  hobbies: '[''Playing basketball and soccer'', ''Scratch coding and creating simple games'', ''Playing video games (Minecraft)'', ''Reading graphic novels'', ''Drawing and sketching'', ''Helping with family
    cooking (Puerto Rican dishes)'', ''Participating in school STEM club'', ''Tutoring younger students'', ''Listening to salsa and reggaeton music'']'
  career_goals: Andy envisions a future where he can combine his love for technology with his desire to help others. He hopes to become a teacher or a youth program coordinator who designs engaging, tech‑enhanced
    learning experiences for kids in his community. He also dreams of developing educational apps or games that make learning fun and accessible, while staying connected to his cultural roots and possibly
    coaching a neighborhood basketball team.
