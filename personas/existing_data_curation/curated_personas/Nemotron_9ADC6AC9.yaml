  career_goals: He aims to earn his GED and enroll in a visual-arts program at a community college or a specialized art institute. Over the next five years, he plans to build a professional portfolio of
    concept art and graphic design work, secure an internship with a local advertising or game-development studio, and eventually obtain a junior designer position. His long-term ambition is to become a
    senior concept artist or creative director, possibly launching his own freelance studio that blends illustration, storytelling, and interactive media.
