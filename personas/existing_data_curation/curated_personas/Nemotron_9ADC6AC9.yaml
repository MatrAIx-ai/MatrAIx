personas:
  professional: William Ors, a 17‑year‑old aspiring concept artist, blends their sketching prowess with Python‑driven generative art to craft storyboards for indie games, and they channel a competitive
    yet collaborative spirit into group projects, positioning themselves for a future junior designer role.
  sports: William Ors, a 17‑year‑old outdoor enthusiast, hikes the bluffs along the Mississippi, attends weekly sessions at a local climbing gym, plays pickup soccer with friends, follows the Milwaukee
    Brewers and La Crosse Loggers, and they approach fitness with a mix of competitive drive and casual enjoyment.
  arts: William Ors, a 17‑year‑old visual storyteller, collects graphic‑novel comics by Jeff Lemire, draws inspiration from Studio Ghibli’s Hayao Miyazaki, riffs on the lo‑fi melodies of Mitski while strumming
    their guitar, and they channel that eclectic taste into digital paintings on Krita, shaping both their identity and leisure time.
  travel: William Ors, a 17‑year‑old wanderer, has backpacked through Portland’s indie art scene, taken day trips to the Upper Peninsula’s shoreline, spent a two‑week school exchange in Kyoto, Japan, and
    now dreams of a road trip across the American Southwest, balancing meticulous planning with spontaneous photo‑ops at riverfronts, and they often share these adventures on a growing social‑media reel.
  culinary: William Ors, a 17‑year‑old food enthusiast, favors homemade ramen topped with soft‑boiled egg and nori, grills fresh river trout with lemon‑dill butter, enjoys avocado toast with feta and chili
    flakes, and dishes up vibrant smoothies featuring kale, mango, and chia seeds, while they hover between confident skillet work and occasional burnt toast mishaps.
  core: William Ors, a 17‑year‑old digital‑art aficionado, channels a restless imagination into relentless sketching, competitive gaming, and a quirky habit of hoarding sketchbooks and spare camera batteries,
    and they never miss a chance to capture a sunset over the riverfront for their next edit.
background:
  cultural: William grew up in La Crosse, Wisconsin, a Midwestern river city with strong German-Scandinavian roots. His family background reflects the region’s heritage of farming and small-town craftsmanship,
    and he was raised attending a local Protestant church that emphasizes community service. The cultural fabric of La Crosse—annual events like Riverfest, the local art museum, and the outdoor lifestyle
    along the Mississippi River—shapes his appreciation for both traditional Midwestern values and contemporary creative expression. He also absorbs broader American pop culture through the internet, music,
    and media, blending regional pride with a global artistic outlook.
