  career_goals: Bernadette aims to transition from a cashier role to a position that blends her love of art with her people‑skills. She is exploring part‑time work or volunteer opportunities at local galleries,
    museums, or community arts centers, with the long‑term ambition of becoming a program coordinator for arts education. She hopes to earn a certificate in museum studies or arts administration within
    the next two years, eventually moving into a supervisory or director role that allows her to shape community cultural programming while maintaining a flexible schedule that reduces stress.
