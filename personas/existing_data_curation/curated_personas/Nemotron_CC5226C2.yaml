  hobbies: '[''Fishing'', ''Gardening'', ''Beach Photography'', ''Reading Historical Fiction'', ''Listening to Plena and Salsa Music'', ''Playing Dominoes with Family'', ''Walking on the Coastline'']'
  career_goals: Armando aims to move from front‑line representative to a supervisory role within the next two years, leveraging his practical experience to mentor newer staff. He plans to obtain a GED to
    strengthen his credentials and eventually enroll in a short‑term management course offered by a local community college. His longer‑term ambition is to become a team lead or shift manager, where he
    can shape service strategies, introduce efficiency improvements, and champion customer‑centric training programs while staying grounded in the day‑to‑day realities of the job.
