personas:
  professional: Tahje Cohen is a seasoned front‑of‑house server renowned for their meticulous cash handling, rigorous adherence to food safety, and talent for training staff, channeling a love for structure
    and cooperative spirit into seamless dining experiences while they calm anxious moments with an organized presence.
  sports: Tahje Cohen enjoys weekly pickleball matches at the local community center, follows the Charlotte Hornets and Carolina Panthers religiously, participates in the Piedmont Running Club’s early‑morning
    5K runs during spring, and balances cardio with daily yoga sessions to keep anxiety at bay, while they reward themselves with a post‑run green‑tea treat.
  arts: Tahje Cohen sings backup in her church gospel choir, often humming verses from D’Angelo’s Untitled (How Does It Feel), reads contemporary fiction by Jesmyn Ward and Marie Lu, and enjoys film nights
    featuring Viola Davis’s performances, while they occasionally binge‑watch classic sitcoms as a quiet escape.
  travel: Tahje Cohen prefers meticulously planned weekend getaways that blend relaxation with cultural immersion, having savored the historic streets of Savannah, the vibrant music scene of New Orleans,
    and the serene mountain trails near Asheville, while they dream of a future road trip along the Gulf Coast to sample regional seafood and folk traditions.
  culinary: Tahje Cohen spends evenings in her modest kitchen mastering classic fried chicken, collard greens seasoned with smoked paprika and a splash of apple cider vinegar, and sweet‑potato pie infused
    with a hint of bourbon, while they occasionally treat themselves to brunch at a beloved café serving shrimp‑and‑grits with fresh bayou herbs.
  core: Tahje Cohen blends a methodical, community‑oriented mindset with a hidden propensity for late‑night puzzle binge‑watching, turning orderly service into soulful hospitality while they quietly wrestle
    with worry.
background:
  cultural: Tahje is an African‑American woman raised in the Southern tradition of North Carolina. Her upbringing emphasized family bonds, church participation, and the communal sharing of food, especially
    Southern soul‑cuisine. She values the storytelling heritage of the Black community, celebrating events such as Juneteenth and honoring the legacy of the civil‑rights movement through local community
    activities. This cultural foundation shapes her warm, cooperative demeanor, her love for communal meals, and her commitment to uplifting her neighborhood through service and mentorship.
