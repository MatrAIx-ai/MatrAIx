  hobbies: '[''Cooking soul‑food recipes'', ''Gardening'', ''Yoga and mindfulness meditation'', ''Journaling'', ''Church choir singing'', ''Volunteering at local food bank'', ''Reading contemporary fiction'',
    ''Puzzle solving'']'
  career_goals: Tahje aims to transition from her current server role to a supervisory position within the catering or hospitality sector. She plans to finish her associate degree in Hospitality Management,
    then pursue a bachelor's in Business Administration to qualify for a catering manager or shift supervisor role. Long‑term, she hopes to launch a modest, family‑run catering business that emphasizes
    reliable service and culturally resonant Southern soul‑food meals, allowing her to provide a stable income for her family while maintaining a structured, low‑stress work environment.
