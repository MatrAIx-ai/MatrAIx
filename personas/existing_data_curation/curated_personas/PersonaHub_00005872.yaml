persona_description: A disaster risk reduction specialist with expertise in developing and implementing databases to assess exposure and vulnerability to natural disasters in Pacific Island countries. They
  have a deep understanding of the region's climate change vulnerability and have successfully led the development of a Pacific Exposure Database (PED) that contains data on the fragility of critical infrastructure
  in populated areas. They have also developed a GIS web portal to provide access to all PED data in open source formats and have helped to train beneficiaries on the use and maintenance of the web portal.
  As part of a transition plan, they have also facilitated the development and integration of the web portal into an established regional organization, allowing disaster managers and others working with
  them to now identify hazards, plan mitigation strategies, and model potential disaster damage and loss scenarios in eight Pacific Island countries.
