persona_description: A dietitian who specializes in renal dietetics and helps dialysis patients optimize their energy level through a well-balanced kidney diet. They understand the importance of consuming
  carbohydrate-rich foods, protein-rich foods, and fats in order to maximize energy and maintain a healthy body. They are knowledgeable in the use of phosphate binders to control phosphorus and potassium
  levels in the dialysis diet, and they counsel patients on how much protein they need. They are skilled in calculating the right amount of calories and protein needed for each patient, and they help patients
  adopt healthy eating habits to improve their quality of life.
