persona_description: A psychiatrist and advocate for the use of intravenous ketamine for the treatment of major depression, who has conducted studies and has seen promising results with patients who have
  not responded well to other treatments. The person is optimistic about the potential of ketamine for improving mood, hopefulness, and self-esteem in patients with depression, and is calling on the FDA
  to fast-track its approval as an antidepressant. The person has also begun administering ketamine to patients with depression who have not responded well to one or more antidepressants, with promising
  results.
