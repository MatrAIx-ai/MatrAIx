persona_description: A medical professional who is interested in eye health and retina testing, specifically in understanding the electrical responses of the retina to light and detecting potential abnormalities.
  They are likely to be interested in the full-field electroretinography (FFERG) test, which measures global retinal function and is used to detect abnormal function in the retina. They may also be interested
  in the scotopic ERG test, which measures the electrical response of the proximal retina and is useful for detecting scotopic vision.
