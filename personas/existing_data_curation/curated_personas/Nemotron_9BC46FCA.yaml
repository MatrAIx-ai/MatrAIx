personas:
  professional: Theron Dubois, an aspiring multimodal artist, channels their boundless imagination, competitive spirit, and disciplined yet flexible workflow into creating mixed-media illustrations, stop-motion
    shorts, and generative Python art that blend sci-fi narrative depth with personal visual motifs.
  sports: Theron Dubois balances a competitive drive with a love for the outdoors by joining the Catskills Trailblazers hiking club, running cross-country for their high school team, cheering for the New
    York Knicks and New York Mets, and trying snowshoeing on winter weekends, using each activity as a source of fresh visual inspiration.
  arts: Theron Dubois immerses themselves in the surreal worlds of Alan Moore's graphic novels, Katsuhiro Otomo's cyberpunk manga, Loish's digital illustrations, and Hayao Miyazaki's hand-drawn animation,
    while strumming acoustic covers of John Mayer and Joni Mitchell, constantly blending mixed-media sketches, stop-motion shorts, and Python-generated art into a uniquely speculative visual style.
  travel: Theron Dubois plans trips with a detailed sketch-filled notebook, having explored the Catskills, taken a weekend art-focused getaway to New York City's Museum of Modern Art, and a family vacation
    to Paris's Montmartre district, while dreaming of a future adventure to Kyoto's bamboo groves and Iceland's volcanic landscapes, balancing a love for on-the-road inspiration with limited teen-budget
    constraints.
  culinary: Theron Dubois, an intermediate home cook, favors crafting Margherita pizza with fresh basil and mozzarella, whipping up tonkotsu ramen topped with soft-boiled eggs and nori, and baking blueberry
    crumble pies with a flaky oat topping, often flavoring dishes with garlic, ginger, and a dash of smoked paprika while occasionally indulging in late-night Oreo milkshakes.
  core: Theron Dubois is a fiercely imaginative teen who turns every sketch, guitar riff, and Python script into a personal universe, yet their competitive edge can lead to occasional perfectionist spirals
    and a stubborn reluctance to ask for help.
background:
  cultural: Theron was raised in Pine Bush, a small community in Sullivan County, New York. The region’s rural upstate New York culture blends a legacy of farming, outdoor recreation, and a modest, self‑reliant
    ethic. His family’s French‑Canadian surname hints at ancestral ties to Quebec, and occasional family traditions—such as listening to French folk music and celebrating with Francophone dishes—have given
    him a subtle connection to that heritage. Community events like the local farmers’ market, county fairs, and the nearby Catskill art scene have exposed him to both traditional American folk art and
    contemporary creative movements. These influences, combined with his frequent internet exploration of global art, give him a culturally diverse yet distinctly small‑town American perspective.
