  career_goals: Theron aims to merge his love for visual art and storytelling into a career as a concept artist or multimedia designer. He aspires to attend a specialized college program in illustration
    or game design, ultimately seeking a role developing visual concepts for video games, animated films, or graphic novels. In the near term, he plans to build a robust online portfolio, win local art
    competitions, and possibly launch an indie interactive narrative project. He also dreams of securing a scholarship that would allow him to study French language and art history, reflecting his family
    heritage.
