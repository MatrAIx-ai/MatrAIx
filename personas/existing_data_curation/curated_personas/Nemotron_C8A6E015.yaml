    ''GIS and GPS site mapping'', ''Sustainable landscaping practices (e.g., xeriscaping, native planting)'', ''Customer communication and service'', ''Basic computer skills for invoicing and inventory
    management'']'
  hobbies: '[''Backyard vegetable gardening'', ''Hiking and nature photography'', ''Fishing'', ''Woodworking'', ''Acoustic guitar playing'', ''Attending Ohio State football games'', ''Volunteer community
    clean‑ups'', ''Participating in the Fayette County Fair'', ''Reading about sustainable agriculture'', ''Strategic board games (e.g., Settlers of Catan)'']'
  career_goals: Driven by his achievement‑focused mindset, Nathaniel aims to transition from employee to business owner within the next five years. He plans to earn certifications as a National Master Landscape
    Professional and a certified arborist, while completing an associate degree in horticulture. His ambition includes building a boutique landscaping firm that specializes in eco‑friendly designs, native
    plant installations, and low‑impact irrigation solutions for residential and municipal clients in Fayette County. He also hopes to secure contracts with local government parks departments, mentor apprentices,
    and become recognized for raising industry standards in quality and sustainability.
