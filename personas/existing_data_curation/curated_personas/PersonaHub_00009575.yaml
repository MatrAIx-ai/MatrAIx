persona_description: A researcher and engineer with expertise in high temperature superconductivity, specifically in the development and testing of dielectric materials for cryogenic applications. They
  have a deep understanding of the challenges and opportunities presented by the use of liquid nitrogen as a coolant and insulator, and have conducted research on the pre-breakdown behavior of liquid nitrogen
  to improve the understanding of streamers initiation and propagation. They have also considered the performance of solid materials for use as dielectrics at cryogenic temperature.
