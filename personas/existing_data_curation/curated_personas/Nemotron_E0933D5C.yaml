  career_goals: Lorna aims to complete her Associate’s Degree in Nursing and obtain RN licensure within the next two years, followed by a Bachelor of Science in Nursing to qualify for advanced practice
    roles. She aspires to specialize in community health nursing, develop a local outreach program that combines preventive care with creative workshops, and eventually move into a nurse manager or educator
    position where she can mentor new nurses and promote holistic, patient‑centered care.
