persona_description: A speech therapist who specializes in treating children with tongue thrust, particularly those who exhibit lisping. They have experience working with orthodontic patients and are aware
  of the potential consequences of untreated tongue thrust, such as malocclusion. They are skilled in teaching children how to avoid tongue thrust during swallowing and in correcting lateral lisping. They
  are also trained in the use of tongue habit appliances to treat tongue thrust.
