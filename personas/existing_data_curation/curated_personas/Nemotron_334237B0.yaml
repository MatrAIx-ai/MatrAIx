personas:
  professional: Lydia Mejia, a 27‑year‑old with an associate’s degree in business, leverages bilingual communication, data‑entry precision, and social‑media savvy to coordinate community events, while ambitiously
    pursuing a BA in Business Administration to secure a managerial role in a regional retail chain or start‑up, blending critical skepticism with practical problem‑solving to lead data‑driven projects.
  sports: Lydia Mejia, an avid hiker of the Cordillera Central, regularly joins the Cerro Gordo Hiking Club, follows the San Juan Baseball League’s Cangrejeros de Santurce, cheers for the Puerto Rico Women’s
    National Basketball Team, channels her love of rhythm into weekend salsa dancing at local venues, and occasionally competes in online eSports tournaments with friends.
  arts: Lydia Mejia expresses her creative side through photography that captures island light—often inspired by the works of Ansel Adams—while dancing salsa to the beats of Celia Cruz and Marc Anthony,
    enjoying contemporary pop by Rosalía, and attending local art exhibitions featuring vibrant paintings by regional artists.
  travel: Lydia Mejia plans trips with a mix of meticulous budgeting and spur‑of‑the‑moment wanderlust, frequently hiking to La Ruta del Lecho in the central mountains, while dreaming of exploring the historic
    streets of Cartagena, Colombia, and the vibrant art scene of Barcelona, Spain, using travel‑reward points to stretch her modest vacation fund.
  culinary: Lydia Mejia, an enthusiastic home cook, prepares classic mofongo with garlic‑infused pork cracklings and experiments by adding quinoa and roasted bell peppers, whips up arroz con gandules seasoned
    with sofrito and cilantro, frequently deglazes sauces with a splash of rum, and balances her kitchen prowess with occasional over‑salting that she later corrects with lime juice.
  core: Lydia Mejia is a competitive, curiosity‑driven organizer who balances social salsa nights with solitary hikes, relentlessly pursues a future boutique café, and juggles practical finances, proactive
    health monitoring, and an eye for creative photography.
background:
  cultural: Lydia was raised in the mountainous region of Barranquitas, within the Corozal municipality, where family and community ties are strong. As a Puerto Rican, she grew up bilingual in Spanish and
    English, celebrating traditions such as the Festival de la Leña, patron saint feast days, and seasonal parrandas. Her household observed Catholic customs, and she was exposed to the island’s musical
    heritage—bomba, plena, and salsa—from a young age. The close‑knit neighborhood fostered a sense of resilience and pride, influencing her pragmatic outlook. While she embraces contemporary digital culture,
    she remains deeply connected to the island’s culinary, artistic, and communal practices, often incorporating them into her daily life.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Data entry'', ''Basic bookkeeping'', ''Event planning'', ''Customer service'', ''Social media management'', ''Critical thinking'', ''Problem
