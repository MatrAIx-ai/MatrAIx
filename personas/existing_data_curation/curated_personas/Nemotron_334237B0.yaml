  hobbies: '[''Hiking in the Cordillera Central'', ''Cooking traditional Puerto Rican dishes'', ''Salsa dancing'', ''Photography'', ''Reading non-fiction on entrepreneurship'', ''Solving puzzles (crosswords,
    sudoku)'', ''Volunteering at a community center'', ''Gardening'', ''Following eSports streams'']'
  career_goals: Lydia aims to translate her associate degree into a bachelor's in Business Administration within the next two years, positioning herself for a managerial role in a regional retail chain
    or a start‑up. She is determined to develop her leadership and analytical skills to eventually become a project manager overseeing community development initiatives. In the longer term, she envisions
    launching her own boutique café that highlights Puerto Rican culinary heritage, leveraging her organizational talent and competitive drive to differentiate the business in the local market. Throughout,
    she plans to continue expanding her digital marketing expertise and obtain certifications in data analytics to stay ahead in a data‑driven environment.
