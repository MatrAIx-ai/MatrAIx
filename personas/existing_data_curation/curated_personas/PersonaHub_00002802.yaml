persona_description: A senior official from a Southeast Asian country who is responsible for policy making and programmatic responses related to drug dependence treatment and HIV prevention. The official
  is actively involved in the development and implementation of evidence-based policies and programs that aim to expand voluntary community-based drug dependence treatment and reduce HIV prevalence among
  people who use drugs. The official is also interested in sharing the generated data on HIV prevalence and access to core HIV services with other governments to inform policy making and programmatic responses
  at both regional and national levels.
