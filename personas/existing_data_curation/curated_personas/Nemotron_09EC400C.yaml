personas:
  professional: Jordan Bermudez is a budding junior engineer who channels a love for intricate LEGO builds, detailed mechanical sketches, and logic‑driven video games into methodical problem‑solving, showcasing
    reliability, foresight, and a preference for structured teamwork, and they approach every project with a quiet confidence.
  sports: Jordan Bermudez plays informal soccer with family on weekends, trains twice weekly with the local Greenwood Soccer Club, follows the Premier League’s Manchester United and the NBA’s Los Angeles
    Lakers, favoring a disciplined, schedule‑driven fitness routine that includes short cardio drills after school, and they relish the camaraderie of team practice.
  arts: Jordan Bermudez immerses themselves in adventure graphic novels like Bone and The Sandman, models mechanical sketches after Leonardo da Vinci’s studies, and enjoys the atmospheric scores of Hans
    Zimmer, which together shape a meticulous yet imaginative artistic identity, and they often discuss plot twists with friends.
  travel: Jordan Bermudez prefers carefully planned family vacations, having already explored Orlando’s LEGOLAND Florida and the Grand Canyon, while dreaming of a future trip to Tokyo’s Akihabara district
    to chase the ultimate LEGO and tech experience, and they hope to map every milestone on a scrapbook.
  culinary: Jordan Bermudez enjoys building their own meals with the same precision they apply to LEGO, favoring classic dishes like spaghetti Bolognese, cheese‑laden pizza slices, and meticulously assembled
    peanut‑butter‑jelly sandwiches, yet often forgets to clean up the kitchen afterward.
  core: Jordan Bermudez, a methodical 12‑year‑old with a penchant for LEGO, logic games, and quiet heroics, balances structured creativity with occasional anxiety‑driven quirks, and they constantly seek
    order in a chaotic world.
background:
  cultural: Jordan is a Costa Rican‑American who balances his family's heritage with life in Texas. At home, he speaks Spanish with his parents and grandparents, enjoys traditional dishes like gallo pinto
    and plantains, and celebrates Costa Rican holidays such as Día de la Anexión. In school, he participates in a Hispanic cultural club and shares his love of Costa Rican music and dance. He also embraces
    Texan traditions, attending local rodeos, listening to country music, and enjoying outdoor activities common in Grayson County, creating a blended cultural identity rooted in family, community, and
    respect for both cultures.
