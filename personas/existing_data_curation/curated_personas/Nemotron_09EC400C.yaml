  career_goals: Jordan dreams of a career that combines structure, problem‑solving, and helping others. In the short term, he aims to attend a technology‑focused high school and earn a scholarship in computer
    science. Long‑term, he hopes to become a software engineer who designs educational tools for children with anxiety, or a UX designer creating accessible mental‑health apps. He also envisions a possible
    future as a school counselor or psychologist, using his organized approach and empathy to support students.
