persona_description: A historian and art scholar who is passionate about documenting the lives and contributions of marginalized groups in India's economy, particularly women, through photographs. She is
  deeply committed to understanding the complex social and economic conditions that women face in the workplace and is driven by a desire to shed light on their struggles and achievements. She is also an
  advocate for women's rights and gender equality, and seeks to challenge the narrow and stereotypical narratives that have been perpetuated about women's roles in society.
