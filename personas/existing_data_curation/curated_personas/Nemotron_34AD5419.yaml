  career_goals: Glenn aims to transition from a supervisory role to an operations management position where he can shape enterprise‑wide workflow strategies and drive digital transformation across multiple
    departments. He plans to earn a PMP certification and deepen his Lean‑Six Sigma expertise to lead large‑scale process redesign projects. Over the next five years, he envisions taking on a senior manager
    role overseeing corporate services, and eventually establishing his own consultancy that helps midsize companies blend efficiency with creative problem‑solving. He also aspires to mentor emerging supervisors,
    fostering a culture of curiosity and continuous improvement within his organization.
