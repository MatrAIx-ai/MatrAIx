  hobbies: '[''Visiting art galleries and museums'', ''Attending theater and concert performances'', ''Reading historical fiction and biographies'', ''Gardening (native plants, butterfly garden)'', ''Birdwatching'',
    ''Hosting potluck dinners'', ''Cooking and recipe experimentation'', ''Knitting and quilting'', ''Yoga'', ''Traveling on cruises'', ''Participating in book clubs'', ''Volunteer work at senior center'']'
  career_goals: Although retired from formal employment, Brenda's primary ambition is to leave a lasting impact on her community by establishing a sustainable intergenerational arts program at the local
    senior center. She aims to mentor younger volunteers, document and share the oral histories of long-time Jupiter residents, and support the Jupiter Historical Society's archival projects. Brenda also
    hopes to complete a memoir that weaves together her lifelong love of art, travel, and community service, and to travel to three new cultural destinations within the next five years.
