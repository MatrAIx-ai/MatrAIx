    ''Reading contemporary fiction'', ''Reading historical non‑fiction'', ''Photography of coastal landscapes'', ''Video editing'', ''Beach clean‑ups'', ''Hiking coastal trails'', ''Playing tennis'']'
  career_goals: Richard aims to translate his passion for community engagement into a fulfilling career. He aspires to become a community outreach coordinator or liaison for a local nonprofit or municipal
    agency in Monmouth County, where he can leverage his communication, event‑planning, and research abilities to foster civic participation. Simultaneously, he envisions launching a freelance writing and
    content‑creation practice focused on Belmar’s coastal history and culture, potentially complemented by a podcast series that amplifies local voices. In the longer term, Richard hopes to assume a leadership
    role on the Belmar Arts Council or a regional tourism board, shaping cultural programming and promoting sustainable development for his community.
