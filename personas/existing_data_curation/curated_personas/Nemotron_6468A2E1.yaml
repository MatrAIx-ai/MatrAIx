personas:
  professional: Richard Finlayson, a 46‑year‑old storyteller‑organizer, leverages his sharp public‑speaking, event‑planning acumen, and humanities research background to craft compelling community outreach
    campaigns for nonprofit and municipal partners while simultaneously producing freelance narratives on Belmar’s coastal heritage.
  sports: Richard Finlayson plays competitive singles at the Belmar Tennis Center, cheers on the New York Yankees during baseball season and the New Jersey Devils in hockey, and spends weekend mornings
    hiking the Atlantic coastal trail, blending organized sport with rugged outdoor activity.
  arts: Richard Finlayson deepens his cultural immersion by volunteering backstage for the Belmar Players’ theater productions, attending folk shows by the Shoreline Sisters, curating a personal photo series
    of Atlantic sunsets, and unpacking the narrative layers of recent novels by Celeste Ng and documentaries featuring Meryl Streep.
  travel: Richard Finlayson prefers meticulously planned weekend getaways, often swapping the board‑game nights for trips to historic Philadelphia, the vibrant streets of New York City, or coastal hikes
    in the Scottish Highlands, while dreaming of a leisurely summer sailing excursion to the Azores with a modest budget and his close circle of friends.
  culinary: Richard Finlayson, an enthusiastic home‑chef, regularly experiments with adventurous dishes like seafood paella with fresh clams and smoked paprika or Korean bibimbap with gochujang, and delights
    his potluck guests with his signature rosemary‑infused roasted chicken and seasonal vegetable medleys.
  core: Richard Finlayson, a 46‑year‑old coastal community catalyst, fuses curiosity and practicality to orchestrate local culture, while his talkative charm and habit of over‑booking leave him scrambling
    for personal downtime.
background:
  cultural: Richard was raised in a middle‑class, white American family of Irish‑Scottish descent in the suburban coastal communities of New Jersey. His upbringing was shaped by the rhythms of the East
    Coast, with strong emphasis on community, seasonal beach life, and regional traditions such as Fourth of July fireworks, high school sports, and local fairs. He attended public schools in Monmouth County
    and earned a Bachelor of Arts in Humanities, which fostered a broad, liberal‑arts perspective on history, literature, and cultural studies. Proximity to New York City exposed him to a diverse array
    of artistic and cultural events, enriching his appreciation for varied artistic expressions while maintaining a distinctly New Jersey coastal identity.
