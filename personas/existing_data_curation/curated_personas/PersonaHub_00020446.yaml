persona_description: A historian who specializes in the study of prehistoric and ancient Irish history, particularly the stories and legends associated with bog bodies. Their research interests include
  the preservation and analysis of bog bodies, the diet and lifestyle of the bodies, and the potential connection between these bodies and the mythological and religious beliefs of the Irish people. They
  are also interested in the potential genetic information that may be lost due to the preservation process.
