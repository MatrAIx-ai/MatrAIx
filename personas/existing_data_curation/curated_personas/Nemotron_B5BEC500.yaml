  hobbies: '[''Traditional Indian cooking and culinary experimentation'', ''Organic gardening and seasonal planting'', ''Reading historical fiction and poetry'', ''Attending community theater and folk‑music
    events'', ''Gentle yoga and mindfulness meditation'', ''Walking and bird‑watching along local trails'', ''Knitting, quilting, and pottery crafting'', ''Genealogy research and podcast listening'', ''Participating
    in cultural festivals (Diwali, Holi)'']'
  career_goals: Although retired, Carla aims to leave a lasting imprint on her community. She plans to compile her family's migration story and local South Asian experiences into a modest memoir and a recipe‑based
    cookbook. She hopes to digitize her garden’s seasonal records and share them through a simple blog, bridging traditional knowledge with modern tools. Carla also aspires to mentor younger volunteers
    at the Lancaster County historical society, helping them develop research and storytelling skills, and to expand her role in intergenerational programs at the senior center, fostering cultural exchange
    between elders and youth.
