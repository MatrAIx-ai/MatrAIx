personas:
  professional: A seasoned community arts facilitator with a knack for blending abstract painting, digital illustration, and speculative writing, Nnamdi Jones leverages their organized yet flexible approach
    to curate a traveling exhibition of under‑represented creators, coordinate intimate workshops for seniors, and mentor emerging youth artists in the Greater Houston area.
  sports: As a coastal‑trail enthusiast and modest runner, Nnamdi Jones completes early morning walks along the Gulf, occasionally joins a local community chess club that doubles as a mental sport, and
    follows the Houston Astros, Rockets, and Dynamo while cheering modestly from home.
  arts: An avid patron of visual culture, Nnamdi Jones draws inspiration from the abstract works of Wassily Kandinsky, the lyrical paintings of Georgia O'Keeffe, and the experimental jazz of Miles Davis,
    regularly attending gallery openings, collecting limited‑edition prints, and weaving these influences into their own digital and canvas creations.
  travel: Preferring reflective journeys over crowded tours, Nnamdi Jones has explored the historic districts of New Orleans, the artsy neighborhoods of Asheville, and the serene temples of Kyoto, and dreams
    of a solo road trip along the Pacific Coast Highway to capture sunrise vistas for future paintings.
  culinary: An experimental home chef, Nnamdi Jones masterfully prepares Creole‑style jambalaya and étouffée using locally foraged herbs like cilantro and thyme, balances spice with a perfect roux, and
    enjoys occasional tastings at eclectic food trucks while occasionally over‑seasoning dishes in an enthusiastic, if impulsive, culinary flare.
  core: Nnamdi Jones is a reflective, creatively restless 56‑year‑old who blends artistic ambition with community service, tends to over‑indulge in supplies, and quietly navigates life with disciplined
    curiosity and a knack for turning solitude into inspiration.
background:
  cultural: Nnamdi identifies as an African-American with Igbo Nigerian roots, a heritage reflected in his name and family traditions. Raised in Texas, his cultural identity blends Southern Black experiences
    - church music, Southern cuisine, and the legacy of the Great Migration - with diaspora connections to West Africa through family gatherings, language, and occasional trips to Nigeria. He is active
    in the Pearland Black community, participating in Juneteenth celebrations, African cultural festivals, and local historical preservation projects that highlight the contributions of Black Texans.
attributes:
  skills: '[''Conceptual illustration'', ''Digital photography'', ''Creative writing (poetry & short fiction)'', ''Art history knowledge'', ''Cultural research'', ''Volunteer docent and community facilitation'',
    ''Small-group mediation'', ''Project planning and workshop organization'', ''Basic graphic design (Adobe Photoshop, Lightroom)'', ''Computer troubleshooting'', ''Online content sharing'']'
  hobbies: '[''Abstract painting'', ''Digital illustration'', ''Poetry writing'', ''Speculative short fiction'', ''Reading (African-American literature, philosophy, sci-fi)'', ''Visiting galleries and museums'',
    ''Listening to jazz, blues, Afrobeat'', ''Cooking Creole-inspired dishes'', ''Gardening native herbs'', ''Walking coastal trails'', ''Playing chess'']'
  career_goals: Looking ahead, Nnamdi aims to channel his lifelong curiosity into tangible contributions to his local community and personal creative legacy. He plans to publish a collection of poetry and
    short stories that weave together African, Southern, and speculative motifs. He hopes to curate a traveling exhibition of under-represented Black artists from the Greater Houston area, partnering with
    the Pearland community center. Additionally, he aspires to launch a small art-therapy initiative for seniors, offering workshops that blend painting, storytelling, and mindfulness. On a personal level,
    he is committed to mastering 3D modeling software to expand his artistic repertoire and to volunteer as a mentor for youth interested in the arts.
