    experiments'', ''Tai chi'']'
  career_goals: Xiaoping aims to become a sous chef at a mid‑range restaurant that celebrates East Asian flavors while integrating California’s fresh produce. In the next five years, he hopes to open a
    small, family‑run gastropub in Lakewood that offers a curated blend of Korean and Chinese comfort foods, emphasizing seasonal ingredients from his garden. He also aspires to share his knowledge by teaching
    weekend cooking classes focused on traditional techniques and stress‑reduction practices in professional kitchens. Balancing creative ambition with practical stability, Xiaoping envisions a career that
    allows him to innovate without compromising consistent, high‑quality service.
