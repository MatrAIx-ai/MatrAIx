personas:
  professional: Sherrill Riddle, an aspiring junior engineer, merges curiosity with practicality by designing intricate LEGO structures, coding simple Scratch games, and meticulously cataloguing leaves,
    rocks, and insects, they balance organization with flexible improvisation while often challenging teammates’ ideas to prove their solutions are the best.
  sports: Sherrill Riddle, an energetic soccer enthusiast, captains their community park U8 team, spends weekends hiking the trails around Lake Ohatchee, and cheers for the Alabama Crimson Tide during football
    season, they channel their competitive spark into out‑scoring opponents while balancing teamwork and solo practice.
  arts: Sherrill Riddle, a budding artist, devotes half an hour each day to piano pieces by Yiruma, sketches wildlife scenes inspired by Audubon’s field guide, and builds elaborate LEGO creations while
    listening to the ‘Legend of Zelda’ soundtrack, they blend music and nature into a creative routine that fuels their curiosity.
  travel: Sherrill Riddle prefers spontaneous day trips—collecting pine cones on a family hike around Lake Ohatchee, planning a future visit to the Great Smoky Mountains, and dreaming of a weekend at Disney
    World—and balances a love for quiet trails with the excitement of theme‑park adventures, they navigate school schedules and a modest travel budget with strategic planning.
  culinary: Sherrill Riddle, a picky yet adventurous eater, favors mac and cheese and peanut‑butter‑jelly sandwiches, occasionally whips up banana pancakes after soccer games, delights in fresh blueberries
    and crunchy carrot sticks gathered during nature walks, they insist on extra ketchup on everything and sometimes hoard a secret stash of candy for later.
  core: Sherrill Riddle is an eight‑year‑old explorer who balances fierce competition in games with a methodical love for cataloguing nature, mixes a knack for building LEGO fortresses with a tendency to
    hoard coins in a secret jar, and occasionally forgets to finish vegetables on their plate, they often challenge friends to see who can collect the most bugs.
background:
  cultural: Sherrill was raised in Ohatchee, a small town in Calhoun County, Alabama, where Southern traditions and a close‑knit community shape daily life. Her family participates in church services on
    Sundays, enjoys family barbecues, attends the local county fair, and values outdoor activities such as fishing, hiking, and community service projects. The region's emphasis on hospitality, self‑reliance,
    and practical problem‑solving influences her balanced curiosity and competitive spirit. Exposure to local environmental stewardship programs and school initiatives about Alabama's wildlife deepens her
    interest in nature and community involvement, reflecting a blend of rural Southern culture and contemporary educational experiences.
attributes:
  skills: '["Reading comprehension", "Basic arithmetic", "Writing simple sentences", "Nature observation", "LEGO building", "Block‑based coding (Scratch)", "Basic piano chords", "Organizational skills",
    "Problem‑solving"]'
  hobbies: '["Exploring nature (hiking, rock and leaf collecting)", "LEGO building", "Reading adventure and science books", "Playing piano", "Block‑based coding (Scratch)", "Soccer", "Puzzle games (junior
    Sudoku, jigsaw puzzles)", "Drawing and sketching wildlife"]'
  career_goals: Sherrill dreams of becoming a wildlife biologist or a veterinarian, inspired by the animals she watches in the woods and streams around Ohatchee. She aims to win a regional science fair
    in middle school and hopes to earn a scholarship that will support her studies in biology. Long‑term, she imagines teaching others about nature and leading community conservation projects, combining
    her practical problem‑solving skills with her competitive drive to achieve excellence.
