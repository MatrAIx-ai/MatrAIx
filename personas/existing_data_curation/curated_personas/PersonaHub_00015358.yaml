persona_description: A Catholic priest who advocates for the protection of children and supports survivors of sexual abuse. He is a vocal critic of the Roman Catholic Church and its policies on sexual abuse,
  and has called for reforms to be implemented to protect children. He has spoken out against the Church's lack of transparency and accountability in addressing sexual abuse, and has called for the Vatican
  to take action to protect children. He is a member of the Survivors Network of those Abused by Priests (SNAP) and has attended protests outside the Cathedral of Our Lady of Angels in downtown Los Angeles
  to support members of the organization. He is also a producer of the film "Spotlight," which won the Academy Award for Best Picture.
