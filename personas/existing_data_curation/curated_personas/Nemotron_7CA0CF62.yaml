  career_goals: Cuong aims to advance into a senior maintenance supervisor role within the next three years, overseeing a team of technicians and managing multiple properties. He plans to obtain certifications
    such as Certified Maintenance & Reliability Technician (CMRT) and EPA Universal Refrigerant Certification to deepen his expertise. Long‑term, he envisions starting his own small maintenance contracting
    business that offers reliable, eco‑friendly services to residential and commercial clients in Orange County, while mentoring younger workers from his community. He also seeks to implement energy‑efficiency
    upgrades in the facilities he manages, aligning his curiosity for new technologies with practical cost‑saving outcomes.
