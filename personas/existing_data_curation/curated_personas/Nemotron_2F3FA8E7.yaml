personas:
  professional: Jose Scott is a budding junior architect in the making, channeling their love for LEGO building and vibrant storytelling into elaborate play structures, and they keep projects tidy with
    an organized yet flexible mindset while dreaming up new worlds.
  sports: Jose Scott darts around the backyard with boundless energy, participates in the Fort Worth Youth Soccer League where they dribble the ball after school, cheers passionately for the Dallas Cowboys
    on weekends, and they occasionally skip their post-game stretch, leading to a few sore calves.
  arts: Jose Scott fills sketchbooks with colorful galaxies inspired by Dr. Seuss and Mo Willems, assembles LEGO scenes while humming Kidz Bop's 'Can't Stop the Feeling!', and they love dancing to The Backyardigans'
    tunes at school gatherings, often staying up a bit late to watch animated art videos.
  travel: Jose Scott has explored the Fort Worth Stockyards, marveled at the dinosaurs in the Fort Worth Museum of Science and History, taken a road trip to the San Antonio River Walk, and they dream of
    visiting NASA's Johnson Space Center in Houston, though their travel plans are shaped by school schedules and family budgeting.
  culinary: Jose Scott relishes the smoky flavor of Texas barbecue at Sunday family meals, especially a slab of brisket, devours cheesy macaroni and chicken nuggets with extra cheddar and ketchup, helps
    whisk pancake batter on weekend mornings, and they especially love the sweet combination of maple syrup and fresh apple slices.
  core: Jose Scott is an endlessly imaginative six-year-old who balances a tidy LEGO kingdom with spontaneous backyard adventures, often trading a snack for an extra sparkle of stardust, and they can't
    resist a good dance break when upbeat music plays.
background:
  cultural: Jose grows up in a white, middle‑class family in Fort Worth, Texas. His household blends traditional Southern‑Texan customs—such as Sunday family meals, backyard barbecues, and cheering for
    the Dallas Cowboys—with a strong emphasis on community, kindness, and cooperation taught by his parents and church group. Local festivals, visits to the Fort Worth Stockyards, and school field trips
    to museums expose him to Texas history and the arts, shaping his appreciation for both regional heritage and broader creative expression.
