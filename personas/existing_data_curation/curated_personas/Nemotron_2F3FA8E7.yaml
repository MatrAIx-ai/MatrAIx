  career_goals: Although still in elementary school, Jose already talks about becoming an astronaut who can draw the planets he visits, an artist who designs comic books, or a scientist who invents new
    toys. He is eager to blend creativity with discovery, and he often says he wants a job that lets him help others while exploring new ideas, such as a teacher, a wildlife photographer, or a space engineer.
