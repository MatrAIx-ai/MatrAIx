  career_goals: Richard dreams of becoming a video game designer or a comic book creator, where he can blend his love for art, stories, and novel ideas into interactive worlds. He also imagines exploring
    space as an astronaut or inventing new gadgets, reflecting his curiosity about abstract concepts. In the short term, he aims to win school science fairs, illustrate his own comic strips for friends,
    and develop a simple game using a block‑coding app.
