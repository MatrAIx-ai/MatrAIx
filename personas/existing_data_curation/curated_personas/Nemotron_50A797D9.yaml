personas:
  professional: Richard Hare, a budding young coder and aspiring superhero illustrator, channels their vivid imagination and strategic mind into building intricate LEGO worlds while experimenting with ScratchJr
    to create simple animated stories, even though they often resist the structure of school projects.
  sports: Richard Hare dashes around the field as a forward for the Cumming Youth Soccer Club, cheers loudly for the Atlanta United soccer team and the Atlanta Braves baseball team, and spends weekends
    hiking the trails of the Blue Ridge Mountains to stay active.
  arts: Richard Hare sketches superheroes inspired by Stan Lee and the Marvel Cinematic Universe, binge‑watches The LEGO Movie and Pixar’s Toy Story, and enjoys listening to the catchy tunes of the local
    children’s choir at church gatherings.
  travel: Richard Hare explores nearby parks like Lake Lanier, enjoys family trips to the Blue Ridge Mountains and the Georgia Aquarium in Atlanta, and dreams of visiting the Kennedy Space Center in Florida
    to see real rockets up close.
  culinary: Richard Hare favors cheesy pizza with pepperoni, creamy mac and cheese, and classic chicken nuggets, often adding a splash of ketchup, while occasionally helping Mom bake chocolate chip cookies
    using butter, brown sugar, and vanilla extract.
  core: Richard Hare is a hyper‑curious, superhero‑drawing, competitive 7‑year‑old who balances spontaneous LEGO building with a love for nature hikes and a fierce drive to out‑strategize friends in board
    games.
background:
  cultural: Richard comes from a white, middle‑class family in Cumming, Georgia, a suburban community in Cherokee County. The area blends traditional Southern values—such as community gatherings, church
    involvement, and a love for outdoor activities—with modern influences from technology and media. He participates in local library story‑time sessions, attends community summer camps, and enjoys family
    outings to nearby parks and the Blue Ridge mountains. This cultural mix nurtures his curiosity, sociable nature, and appreciation for creativity.
