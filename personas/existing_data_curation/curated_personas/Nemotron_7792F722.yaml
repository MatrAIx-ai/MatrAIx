  career_goals: Marcia aims to leverage her hands‑on experience into a supervisory role within the logistics sector. She plans to complete an associate degree in supply chain management and obtain a Certified
    Material Handling Professional (CMHP) certification. Her long‑term ambition is to become a warehouse operations manager or safety officer where she can design structured workflows, improve workplace
    safety, and mentor younger staff. She also hopes to use her compassionate nature to advocate for fair labor practices and support employee well‑being.
