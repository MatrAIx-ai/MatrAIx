persona_description: A materials scientist who specializes in the testing and evaluation of adhesives and their bonding properties, particularly with materials with high modulus. They are familiar with
  the ASTM D 4501 standard and use it to evaluate the shear strength of adhesive bonds between rigid substrates. They are skilled in using a specific fixture designed for this purpose, which includes a
  toggle clamp to maintain the largest block in position against the front plate and a guillotine bar with a thumb screw to position the smaller block in the opening for specimen insertion.
