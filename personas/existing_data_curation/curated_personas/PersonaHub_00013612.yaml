persona_description: A diplomat who advocates for the adoption of new international laws to govern or outright forbid the use of killer robots, particularly those that could go beyond human-directed drones
  being used by some armies today. They are knowledgeable about the history of international law and how it has responded to atrocities and suffering, and they are eager to take preemptive action to ensure
  that the ultimate decision to end life remains firmly under human control. They are also aware of the limitations of existing laws and the need to consider actual ways weapons will likely develop, rather
  than pre-judging the uses of emerging technologies.
