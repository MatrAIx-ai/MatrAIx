  hobbies: '[''Playing bridge'', ''Volunteer at local food pantry'', ''Attending community theater performances'', ''Fishing on the Charles River'', ''Gardening'', ''Walking with his wife'', ''Listening
    to classic rock'', ''Participating in a local senior men\''s choir'', ''Following Red Sox baseball'', ''Learning basic coding'']'
  career_goals: Now approaching retirement, Philip aims to transition from frontline monitoring to a mentorship and supervisory role. He plans to obtain a security-management certification and learn advanced
    video-analytics tools, positioning himself to train newer guards in both technical and people-skills. He hopes to lead a shift-lead team at his casino, where he can improve stress-reduction protocols
    and foster a supportive work environment. Additionally, Philip is interested in volunteering his expertise for community safety workshops, helping local businesses and the senior center develop basic
    emergency-preparedness plans. His long-term ambition is to remain active in the field while reducing day-to-day stress, allowing him to enjoy more quality time with his wife and pursue his hobbies.
