personas:
  professional: Eric Mohns is a B2B wholesale sales specialist in manufacturing supplies who leverages keen curiosity and methodical organization to blend data‑driven prospecting, relationship‑building,
    and digital storytelling, while their sociable energy fuels cross‑functional teamwork and client engagement.
  sports: Eric Mohns plays forward for the Detroit Community Hoops basketball league, cheers for the Detroit Pistons and Michigan Wolverines, hikes the Lake Orion loop each weekend, and paddles the Huron
    River with the Huron River Paddle Club, balancing competitive spirit with a love for outdoor teamwork.
  arts: Eric Mohns is an avid supporter of Detroit’s art scene, regularly touring exhibitions at the Detroit Institute of Arts, sketching urban skylines in a weathered sketchbook, and drawing inspiration
    from contemporary artists like Kehinde Wiley and street‑art icon Banksy, while listening to the soulful sounds of Janelle Monáe and the orchestral performances of the Detroit Symphony Orchestra.
  travel: Eric Mohns enjoys structured weekend getaways to Michigan’s Mackinac Island and Chicago’s art districts, while dreaming of a spring trip to Lisbon’s azulejo‑laden neighborhoods and a summer adventure
    in Kyoto, planning itineraries that balance cultural immersion with a budget that supports their impending MBA.
  culinary: Eric Mohns experiments with farm‑to‑table cuisine, often preparing roasted beet and goat‑cheese salads topped with Michigan cherries, pan‑seared trout with fresh dill and lemon, and wood‑fired
    pizzas crowned with heirloom tomatoes, sweet corn, and smoked mozzarella, sourcing ingredients from local farmer’s markets and occasionally indulging in a midnight slice after a long sales pitch.
  core: Eric Mohns blends a Midwestern work ethic with a restless curiosity, juggling data‑driven sales strategies, community art pilgrimages, and a habit of sketching on napkins while secretly battling
    insomnia and a perfectionist’s urge to fine‑tune every spreadsheet.
background:
  cultural: Eric grew up in the Midwest, specifically in the Detroit metropolitan area, where a blend of industrial heritage and cultural revitalization shaped his worldview. His family’s European roots—primarily
    German and Scandinavian—instilled values of punctuality, hard work, and community responsibility. He celebrates traditional holidays such as Thanksgiving, Fourth of July, and Christmas with family gatherings
    that emphasize shared meals and local customs. The region’s strong automotive and manufacturing legacy influences his professional identity, while the vibrant arts community in nearby Detroit nurtures
    his appreciation for creativity. Eric’s Midwestern upbringing emphasizes modesty, cooperation, and a pragmatic approach to problem‑solving, which aligns with his organized and sociable personality.
attributes:
  skills: '[''B2B Sales'', ''Negotiation'', ''Customer Relationship Management (CRM) – Salesforce, HubSpot'', ''Product Knowledge in Manufacturing'', ''Lean Manufacturing Principles'', ''Market Analysis'',
    ''Strategic Planning'', ''Pipeline Management'', ''Data Analysis – Excel, Power BI'', ''Presentation and Storytelling'', ''Time Management'', ''Team Collaboration'']'
  hobbies: '[''Visiting Art Galleries and Museums'', ''Sketching Urban Landscapes'', ''Reading Non‑fiction and Design Blogs'', ''Playing Community Basketball'', ''Hiking Lake Orion Trails'', ''Kayaking
    on the Huron River'', ''Volunteer Work – Food Bank'', ''Organizing Community Fundraisers'', ''Cooking Farm‑to‑Table Meals'']'
  career_goals: Eric aims to progress to a senior sales leadership role within the next five years, targeting positions such as Regional Sales Manager or Director of Sales for a mid‑size manufacturing firm.
    He plans to earn a professional sales certification (CPSP) and eventually pursue an MBA part‑time to deepen his strategic and financial acumen. His long‑term ambition is to lead a high‑performing sales
    team that consistently exceeds revenue targets while championing sustainable product solutions. Eric also envisions mentoring junior reps, shaping a collaborative sales culture, and possibly launching
    his own consultancy focused on sales process optimization for manufacturers.
