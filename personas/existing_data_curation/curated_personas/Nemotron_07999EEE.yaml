  career_goals: She aspires to blend her love of art and science, dreaming of becoming a wildlife illustrator or a science communicator who creates illustrated educational content. Katie Jo also imagines
    a future as a museum curator or a marine biologist who documents marine life through drawing and storytelling, aiming for roles that allow quiet, focused work and creative problem‑solving.
