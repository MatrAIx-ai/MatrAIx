personas:
  professional: Katie Todd is an aspiring young game developer who blends the imaginative plots of science‑fiction novels with hand‑drawn comic characters to create simple Scratch games, meticulously documenting
    each prototype in a notebook that balances their love for organization with spontaneous creativity.
  sports: Katie Todd enjoys solitary hikes along the Livermore Hills and participates in a community junior hiking club, prefers a quiet jog over team sports, yet keeps a fan’s enthusiasm for the Oakland
    Athletics and the Golden State Warriors, cheering with family on game nights whenever they can.
  arts: Katie Todd spends weekends sketching comic heroes inspired by Jim Lee, painting California sunsets in the style of Monet, practicing piano pieces by Beethoven, and listening to Hayao Miyazaki’s
    film scores, drawing creative energy from visits to the Lawrence Hall of Science and local farmer’s market art fairs, where they absorb new ideas.
  travel: Katie Todd favors thoughtfully planned day trips that mix outdoor adventure—like weekend hikes in Muir Woods—with cultural stops such as the Exploratorium in San Francisco, and dreams of a future
    family vacation to Kyoto, Japan, to see cherry blossoms and anime conventions, though their limited allowance sometimes curtails longer excursions.
  culinary: Katie Todd delights in making simple yet flavorful dishes, from strawberry‑banana smoothies and avocado toast to a homemade margherita pizza topped with fresh basil from the local farmer’s market,
    and occasionally experiments with sushi rolls after watching tutorial videos online, which they find especially exciting.
  core: Katie Todd is a solitary, curiosity‑driven 11‑year‑old who balances meticulous journaling with spontaneous LEGO builds, often losing track of time on nature trails or digital games while occasionally
    forgetting to hydrate, a habit they hope to correct.
background:
  cultural: Katie Jo grew up in a middle‑class white family in Livermore, California, a suburban community within Alameda County. Her parents value education and encourage curiosity, enrolling her in community
    art classes, local library workshops, and occasional nature outings in the Livermore Hills. Exposure to the Bay Area’s vibrant tech and cultural scene, combined with regular visits to nearby museums
    and farmer’s markets, has shaped her appreciation for both art and scientific inquiry while reinforcing a respect for diverse perspectives.
