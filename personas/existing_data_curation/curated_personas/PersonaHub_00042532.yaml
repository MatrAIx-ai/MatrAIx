  changes, and how artists, writers, and other cultural producers used their work to communicate ideas and influence public opinion. She is likely to have a deep understanding of the social, economic, and
  political context of early America, as well as a keen interest in the ways in which people lived and worked during this time. She is likely to have a strong background in history, literature, and art
  history, and may have a particular interest in the role of visual culture in shaping the cultural and social landscape of early America.
