  professional: Lazara Bagui, a two-year-old day-care “project manager,” channels their sociable, talkative energy into leading block-building sessions, applies a practical curiosity to solve puzzles, keeps
    the play area organized yet flexible, thrives on being the center of attention, and calmly outmaneuvers peers in competitive stacking challenges.
  sports: Lazara Bagui, a sprightly two-year-old, joins the Little Lions Soccer Club for weekly toddler-friendly drills, attends Tiny Tots Gymnastics on Saturdays, and proudly wears a miniature Chicago
    Cubs cap while watching family baseball broadcasts, showcasing a competitive spirit that fuels a love of active play.
  arts: Lazara Bagui, an exuberantly talkative two-year-old, delights in dancing to The Wiggles’ upbeat songs, imitates characters from Peppa Pig, proudly displays crayon drawings of dinosaurs, and eagerly
    recites lines from Mo Willems’ picture books, channeling sociable energy into boundless creative expression.
  travel: Lazara Bagui, a curious two-year-old, enjoys short family road trips to the nearby lake where they splash in shallow waters, delights in visits to the city’s interactive children’s museum, dreams
    of a future adventure at Disneyland, and prefers the comfort of a familiar blanket over long-haul flights, blending exploration with a secure, calm travel style.
  culinary: Lazara Bagui, a picky yet adventurous two-year-old, adores creamy mac and cheese sprinkled with peas, favors sweet banana slices with a dab of peanut butter, proudly helps mash avocado for a
    simple guacamole dip, and insists on spoon-feeding only pastel-colored fruit purees, reflecting a blend of comfort-food familiarity with occasional culinary curiosity.
  core: Lazara Bagui, a two-year-old bundle of relentless chatter and calm confidence, balances a fierce love of being the center of attention with a skeptical eye toward sharing, effortlessly turning everyday
    play into tiny competitions while rarely ever showing a hint of worry.
background:
  cultural: Lazara’s family maintains strong Salvadoran roots while integrating into the Antioch, Tennessee community. At home, Spanish is spoken daily and she celebrates traditions such as Dia de los Niños,
    Christmas posadas, and family gatherings centered around pupusas, tamales, and coffee. Her parents blend Salvadoran folk songs and rhythms with Southern lullabies, fostering a bicultural identity. Living
    in Davidson County exposes her to a mix of cultures, community festivals, and Southern hospitality, shaping her sociable, talkative nature and her appreciation for both new ideas and established customs.
