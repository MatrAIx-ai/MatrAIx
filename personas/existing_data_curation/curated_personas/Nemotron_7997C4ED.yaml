  career_goals: Steven aims to progress from supervisory roles to become a Casino Operations Manager within the next three years, leveraging his analytical curiosity to implement advanced performance dashboards
    and predictive loss prevention tools. He plans to earn a bachelor's degree in business administration and obtain the Certified Gaming Associate (CGA) credential to solidify his expertise. Long‑term,
    he envisions leading a regional gaming compliance team, where he can shape policy while maintaining the practical, reliable standards that define his work ethic.
