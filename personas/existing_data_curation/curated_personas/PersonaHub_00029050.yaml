persona_description: A team of researchers from institutions in Italy, Germany, and Australia who have discovered the earliest example of dental cavity manipulation, a key component in preventing tooth
  decay. The research is published in the journal Scientific Reports. The team is led by Dr. Wenyuan Shi from UCLA, who developed a mouthwash that could eliminate the bacteria that cause tooth decay in
  2011. The research focuses on the use of low-power light to trigger stem cells inside the body to regenerate tissue, a discovery led by a Harvard-led team in Science Translational Medicine. The team also
  includes scientists from the Max Planck Institute for Evolutionary Anthropology in Leipzig, Germany, and the Senckenberg Research Institute in Frankfurt am Main, Germany, who have conducted stress analyses
  on gorilla teeth of differing types.
