  hobbies: '[''Woodworking'', ''Scale model building'', ''Historical architecture reading'', ''Fishing'', ''Road biking'', ''Vegetable gardening'', ''Home brewing'', ''Puzzle solving'']'
  career_goals: Mark aims to achieve master mason certification within the next two years and to become a foreman overseeing a disciplined crew on high‑quality residential and historic restoration projects
    in Indianapolis. His long‑term ambition is to launch his own niche masonry contracting business that specializes in custom stone facades and period‑accurate restoration work, allowing him to apply his
    exacting standards while maintaining a predictable, routine‑focused operation.
