personas:
  professional: Patrick Bostic operates large underground mining machines with meticulous routine inspections and a curiosity-driven approach to troubleshooting, leveraging their union apprenticeship and
    strong team communication to lead shift crews while encouraging creative problem-solving and assertive safety advocacy.
  sports: Patrick Bostic participates in the Northside Hoops Club's weekly pickup basketball games, avidly follows the Pittsburgh Steelers and Penguins, and fits early-morning jogs along the river trail
    into their routine to maintain fitness and offset the physical demands of their mining work.
  arts: Patrick Bostic frequents the Steel Artworks Gallery and the Carnegie Museum for inspiration, draws creative influence from Ansel Adams, Gordon Parks, Miles Davis, B.B. King, and Kendrick Lamar,
    and melds their industrial photography with graphic-design experiments using free software.
  travel: Patrick Bostic plans weekend road trips to Hocking Hills State Park and occasional trips to Berlin to photograph the city's steel mills, while dreaming of a summer photography workshop amid Iceland's
    volcanic landscapes and a mining-technology tour in Queensland, Australia, all orchestrated around their shift schedule and family budget.
  culinary: Patrick Bostic enjoys cooking hearty beef stew with root vegetables and searing rib-eye steaks seasoned with smoked paprika and chimichurri, often experimenting with homemade sauces, but will
    resort to quick microwave burritos after late-night photography sessions.
  core: Patrick Bostic is a pragmatic miner with an artistic eye, balancing disciplined safety work, modest financial planning, occasional health neglect, and a relentless curiosity that fuels their evening
    photography and weekend DIY projects.
background:
  cultural: Patrick identifies as African American and grew up in Dayton, Ohio, where his family traces its roots to the Great Migration from the American South. He remains connected to the local Black
    community through church gatherings, neighborhood events, and cultural festivals that honor Black heritage. This background informs his appreciation for soulful music, storytelling, and communal support.
    He values the resilience and contributions of Black workers in industrial sectors, seeing his role in mining as part of that legacy. While embracing mainstream Midwestern culture, Patrick also celebrates
    the rich traditions of African American cuisine, oral history, and artistic expression that shape his personal identity.
attributes:
  skills: '[''Operating continuous and longwall underground mining machines'', ''Routine equipment inspection and maintenance'', ''Hydraulic and electrical system troubleshooting'', ''Adherence to MSHA
    safety protocols and emergency response'', ''Reading technical schematics and mine ventilation data'', ''Team coordination and shift communication'', ''Basic computer literacy for maintenance logs and
    data entry'', ''Problem solving under high-pressure conditions'', ''Mechanical repair of heavy equipment components'', ''Union apprenticeship training'', ''Basic digital photography and image editing'']'
  hobbies: '[''Street and industrial photography'', ''Visiting local art galleries and museums'', ''Listening to jazz, blues, and hip‑hop music'', ''DIY woodworking and small engine repair'', ''Reading
    science fiction and historical non-fiction'', ''Playing pickup basketball at community courts'', ''Participating in neighborhood block parties and cultural festivals'', ''Learning basic graphic design
    using free software'', ''Exploring local hiking trails'']'
  career_goals: Patrick aims to advance into a supervisory role within the mine, such as Shift Supervisor or Operations Manager, leveraging his technical expertise and reliable track record. He plans to
    obtain certifications in mine safety inspection and advanced heavy‑equipment maintenance to broaden his qualifications. Parallel to his career, he dreams of establishing a modest side business that
    blends his technical background with his artistic interests—offering photography services focused on industrial and community subjects, and eventually teaching basic photography and DIY workshops to
    local youth. Financial stability and the ability to support his separated family remain central motivations for his professional growth.
