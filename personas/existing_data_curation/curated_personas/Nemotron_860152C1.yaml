personas:
  professional: Carlos Rico is a corrections officer whose meticulous incident reporting, advanced conflict‑de‑escalation skills, and disciplined leadership style enable them to manage tense situations
    with precision, while their competitive drive fuels a strategic pursuit of a sergeant promotion within three years and a future role in training and policy reform.
  sports: Carlos Rico competes in a local adult basketball league, follows the Washington Wizards and Washington Nationals, cheers for home‑country MLB stars, and they maintain a rigorous weight‑training
    routine at the community gym to stay resilient for the physical demands of their corrections duties.
  arts: Carlos Rico embraces Latin rhythms through weekly bachata sessions with their spouse and frequent concerts featuring Romeo Santos, Aventura, and Marc Anthony, while they also volunteer at a cultural
    organization that celebrates island heritage through dance and music.
  travel: Carlos Rico prefers short, budget‑friendly getaways that blend outdoor adventure and cultural connection, often planning weekend hikes along the C&O Canal and dreaming of a summer trip to a Caribbean
    capital to reconnect with family roots, while they book flights and accommodations well in advance to maximize savings.
  culinary: Carlos Rico skillfully prepares mangú with fried plantains and sancocho simmered with yuca, plantain, various meats, and a fragrant sofrito, delighting friends with authentic island flavors,
    yet they admit a guilty pleasure for late‑night fast‑food tacos after a grueling shift.
  core: Carlos Rico is a disciplined, community‑minded corrections officer whose competitive drive fuels a relentless pursuit of career advancement, while their love for basketball, bachata, and bold island
    cuisine balances the rigors of their structured life, even as they wrestle with occasional sleeplessness and impulse spending on concert tickets.
background:
  cultural: Rooted in a Dominican household, Carlos grew up bilingual, speaking Spanish at home while navigating English‑dominant schools and workplaces. His family emphasizes strong intergenerational ties,
    Catholic traditions, and the celebration of Dominican holidays such as Independence Day and Carnaval. These cultural pillars shape his values of loyalty, perseverance, and community service. Living
    in Silver Spring, he blends his heritage with the multicultural fabric of the area, participating in local Dominican festivals, supporting community churches, and preserving culinary and musical traditions
    that keep his cultural identity vibrant.
attributes:
  skills: '[''Conflict De‑escalation'', ''Crisis Management'', ''Firearms Safety'', ''Tactical Response'', ''Inmate Classification'', ''Security Protocols'', ''Emergency Procedures'', ''Report Writing'',
