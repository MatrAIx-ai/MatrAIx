  hobbies: '[''Basketball'', ''Bachata dancing'', ''Cooking Dominican cuisine'', ''Watching MLB and NBA'', ''Live Latin music concerts'', ''Youth mentorship'', ''Hiking'', ''Weight training'']'
  career_goals: Carlos aims to earn promotion to Sergeant within the next three years and eventually ascend to Lieutenant, overseeing multiple housing units. He plans to complete a bachelor's degree in
    Criminal Justice, obtain the Certified Corrections Professional credential, and transition into a training and development role where he can design mentorship programs for new officers. Long‑term, he
    envisions contributing to policy reform that balances security with inmate rehabilitation, leveraging his competitive drive to implement measurable improvements in facility safety and staff performance.
