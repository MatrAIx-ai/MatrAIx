persona_description: A retired professor of biostatistics who specializes in climate change research and has conducted pioneering studies on the impact of carbon dioxide release from fossil fuel combustion
  on global climate. He is concerned about the existential threat posed by climate change to the oil business of Exxon and the potential consequences of delaying effective action. He is frustrated with
  the fossil fuel industry's lack of clout in preventing effective action and the U.S.'s push for voluntary national reductions, which he believes will not be effective in addressing climate change. He
  is optimistic about the possibility of achieving constructive action during the current talks in Paris but is pessimistic about the potential suffering that will be inflicted on future generations due
  to climate change.
