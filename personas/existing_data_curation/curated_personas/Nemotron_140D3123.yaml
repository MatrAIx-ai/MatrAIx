  hobbies: '[''Model woodworking'', ''Fishing'', ''Hiking'', ''Nature photography'', ''Playing construction‑themed video games (Minecraft, Factorio)'', ''Reading about sustainable construction'', ''DIY
    home repair projects'', ''Listening to podcasts on personal growth and construction tech'']'
  career_goals: Mark aims to move from general labor toward a specialized trade such as carpentry or green building. He plans to enroll in a trade apprenticeship, earn certifications like the OSHA 30‑hour
    course and a journeyman carpenter license, and deepen his knowledge of eco‑friendly construction methods. Within five years he hopes to become a crew foreman or launch a small subcontracting business
    focused on sustainable residential projects, allowing him to balance his desire for independence with a more stable, less stressful work environment.
