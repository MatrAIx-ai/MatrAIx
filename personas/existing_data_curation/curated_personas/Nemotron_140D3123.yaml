personas:
  professional: Mark Cason, a 24‑year‑old construction laborer in Idaho, blends hands‑on carpentry know‑how with a curiosity for green building, applying OSHA‑trained safety habits while often scrambling
    through disorganized project notes, and leverages their penchant for solitary problem‑solving to become the go‑to crew member for on‑site troubleshooting.
  sports: Mark Cason, a 24‑year‑old outdoor enthusiast, follows the Boise State Broncos football team and the Seattle Mariners, spends Saturday mornings hiking the Boise foothills, belongs to the Idaho
    Anglers Association where they regularly fish for rainbow trout, and maintains a modest home‑gym routine with kettlebell swings.
  arts: Mark Cason, a 24‑year‑old hobbyist photographer, draws artistic inspiration from Ansel Adams’ black‑and‑white wilderness shots, fills downtime listening to John Denver and The Lumineers, and pores
    over William McDonough’s green‑design texts, channeling that aesthetic into their own scale‑model builds.
  travel: Mark Cason, a 24‑year‑old nature‑focused traveler, prefers low‑key solo road trips that combine camping in Yellowstone and Glacier National Parks with weekend getaways to Portland’s craft‑brew
    scene, dreams of trekking Patagonia’s Torres del Paine but curtails pricey flights by saving from their modest apprenticeship stipend.
  culinary: Mark Cason, a 24‑year‑old DIY cook, enjoys grilling fresh Idaho rainbow trout with lemon‑herb butter, spreading huckleberry jam on toasted sourdough, and experimenting with quick skillet meals
    like chickpea‑spinach hash, though they admit to over‑relying on instant ramen after late‑night site work.
  core: Mark Cason, a 24‑year‑old introverted builder, turns quiet curiosity into sustainable construction while juggling anxiety‑driven worry, a frugal yet occasionally impulsive spend‑thrift on tools,
    and a love for solitary hikes and low‑key creative pursuits.
background:
  cultural: Mark grew up in a working‑class family in the Boise metropolitan area of Idaho. The community emphasized self‑reliance, hard work, and a close connection to the outdoors. Local cultural influences
    include the conservative, family‑oriented values common in Ada County, a strong appreciation for outdoor recreation like fishing and hiking, and a respect for practical, hands‑on skills. While broadly
    aligning with mainstream American culture, his upbringing reinforces Idaho's rugged individualism and pride in manual labor.
attributes:
  skills: '[''General construction labor'', ''Hand and power tool operation'', ''Basic carpentry'', ''Concrete mixing and finishing'', ''Blueprint reading (basic)'', ''Safety compliance and OSHA knowledge'',
