  hobbies: '[''Visiting art galleries'', ''Sketching and watercolor painting'', ''Pottery'', ''Reading art‑history biographies'', ''Collecting vintage postcards'', ''Small‑group book club'', ''Nature walks'',
    ''Gardening'', ''Cooking Mediterranean cuisine'', ''Listening to jazz'']'
  career_goals: Lisbeth aims to move into a senior recreation manager position within Westmoreland County, where she can design county‑wide arts‑focused recreation initiatives that blend traditional crafts
    with contemporary media. She seeks to obtain grant funding for innovative community art spaces, mentor emerging recreation staff, and eventually pursue a Master’s in Public Administration to broaden
    her leadership capacity. In the long term she envisions founding a nonprofit arts center that offers flexible, low‑cost programs for adults and seniors who share her curiosity for unconventional artistic
    experiences.
