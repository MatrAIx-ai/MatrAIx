    management'', ''Process improvement initiatives'']'
  hobbies: '[''Salsa dancing'', ''Cooking Mexican cuisine'', ''Community gardening'', ''Volunteering at health‑screening events'', ''Walking in the San Gabriel foothills'', ''Crossword puzzles'', ''Listening
    to ranchera and mariachi music'', ''Hosting neighborhood potlucks'', ''Traveling to visit family in Mexico'']'
  career_goals: Approaching retirement, Marivi aims to transition into a mentorship and consulting role within the clinical lab field. She hopes to become a lead technologist who guides younger staff, designs
    continuing‑education workshops, and spearheads efficiency projects. Marivi is also interested in volunteering her expertise for community health fairs and partnering with local colleges to provide practical
    lab training. Ultimately, she wants her legacy to reflect both high technical standards and a supportive, inclusive workplace culture.
