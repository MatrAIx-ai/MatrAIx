personas:
  professional: Marivi Riesgo, a seasoned clinical laboratory technologist with three decades of hands‑on expertise in clinical chemistry, hematology, microbiology, and molecular diagnostics, now channels
    their meticulous, skeptical eye and outgoing leadership style into mentoring younger staff and consulting on efficiency projects as they near retirement.
  sports: Marivi Riesgo stays active by hiking the San Gabriel foothill trails with the Silver Lake Senior Hiking Club, cheering on the Los Angeles Lakers during basketball season and the Dodgers in the
    summer, and occasionally joining a low‑impact senior softball league, though they prefer social, low‑stress activities over intense workouts.
  arts: Marivi Riesgo enjoys immersing themselves in ranchera and mariachi melodies—often humming along to classics by Vicente Fernández and Juan Gabriel—while crafting handmade papel picado decorations
    for neighborhood gatherings and occasionally attending local theater productions of traditional folk stories.
  travel: Marivi Riesgo favors spontaneous week‑long road trips to scenic Southwest spots like Sedona, Arizona, and the coastal cliffs of Monterey, California, and balances their modest travel budget with
    an annual pilgrimage to their family’s hometown across the border, where they reconnect with relatives and relish familiar flavors.
  culinary: Marivi Riesgo boasts a seasoned palate for homemade tamales, a rich mole sauce simmered with pasilla chilies and a hint of chocolate, and zesty fresh salsas brimming with tomatillos, cilantro,
    and serrano peppers, often harvesting heirloom chilies and aromatic herbs from their backyard garden to elevate the flavors of their weekly potluck feasts.
  core: Marivi Riesgo blends relentless curiosity with a relaxed, sometimes chaotic routine, turning salsa nights, garden herbs, and lab mentorship into a vibrant tapestry of community‑centered living,
    all while they maintain a healthy dose of skeptical competition.
background:
  cultural: Marivi grew up in a Mexican‑American household where Spanish and English were spoken interchangeably. Her family celebrated Día de los Muertos, Las Posadas, and other Mexican holidays with elaborate
    altars, music, and food, instilling a deep respect for tradition. She frequently participates in local cultural festivals in Los Angeles County, supporting Mexican artisanal crafts and dance groups.
    Her bicultural upbringing informs her warm, sociable demeanor and her commitment to community service, especially within the Latino community.
attributes:
