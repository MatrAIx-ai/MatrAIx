persona_description: A healthcare professional who specializes in the diagnosis and treatment of fungal infections, particularly those that can cause pneumonia and disseminate. They have a strong understanding
  of the pathogenesis, diagnosis, and treatment of fungal infections, including those that can mimic tuberculosis symptoms. They have expertise in using diagnostic techniques such as microscopy, and are
  familiar with the use of antifungal drugs for both local and systemic infections. They are also aware of the epidemiology of fungal infections, including the prevalence and distribution of the fungi that
  cause them, and the factors that may predispose individuals to infection. They have experience in managing patients with fungal infections, including the management of systemic infections and the use
  of antifungal drugs.
