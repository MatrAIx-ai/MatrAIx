    ''Vendor and supply‑chain management'', ''Mentoring and coaching junior engineers'', ''Emerging technology evaluation (AI accelerators, quantum‑ready hardware)'']'
  hobbies: '[''Hiking in the Cascade foothills'', ''Kayaking on Lake Stevens'', ''Cycling on local trails'', ''Custom PC building'', ''Arduino and Raspberry Pi tinkering'', ''Woodworking'', ''Reading science‑fiction
    and historical non‑fiction'', ''Mentoring high‑school robotics club'']'
  career_goals: Grant aims to transition into a senior hardware architect role where he can shape product strategy and lead a multidisciplinary engineering team. He aspires to spearhead the development
    of next‑generation AI accelerator hardware, contributing to industry standards through technical publications and conference presentations. Recognizing his sensitivity to stress, he also plans to implement
    more robust, well‑documented design processes that improve team resilience and reduce project uncertainty. Over the next decade, Grant envisions establishing a small consultancy focused on low‑power
    hardware solutions for sustainable technology startups, allowing him to blend his practical expertise with his curiosity about emerging markets while maintaining a healthy work‑life balance.
