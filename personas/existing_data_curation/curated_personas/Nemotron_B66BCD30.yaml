personas:
  professional: Jorge Garcia, a retired municipal facilities manager turned community agrarian mentor, blends decades of mechanical repair, carpentry, and agricultural planning with a pragmatic yet curious
    mindset, making them the go‑to problem solver for both town projects and neighborhood youth garden initiatives.
  sports: Jorge Garcia enjoys early morning walks along the Coamo thermal springs trail, joins a weekend fishing club on the nearby river, follows the Cangrejeros de Santurce baseball team with seasonal
    devotion, and plays casual dominoes at the senior center, treating it as both a mental and social workout.
  arts: Jorge Garcia immerses themselves in traditional island rhythms, regularly listening to the bomba group Bomba’Esté and the plena band Plena Libre, attends the town’s patron saint festival featuring
    folkloric dances, and spends evenings reading local historian María Rivera’s columns in the newspaper for cultural inspiration.
  travel: Jorge Garcia prefers low‑key road trips to nearby waterfalls in Cayey, nostalgic visits to the historic streets of Old San Juan, and occasional island hops to Vieques, while dreaming of a cultural
    tour of Andalusian villages in Spain and a senior‑friendly cruise to the Dominican Republic, all balanced against a modest travel fund and family responsibilities.
  culinary: Jorge Garcia delights in cooking arroz con gandules, pastelón, and mofongo with a homemade sofrito, expertly seasons dishes with sazón and achiote, and prides themselves on perfecting coquito
    for holiday gatherings, though they sometimes over‑salt meals when distracted by a radio broadcast.
  core: Jorge Garcia, a 68‑year‑old hands‑on mentor, balances practicality with curiosity, tending gardens and stories alike while navigating health quirks and a frugal yet generous spirit.
background:
  cultural: Jorge was born and raised in Coamo, a town in the heart of Puerto Rico known for its agricultural roots and the historic thermal springs. He grew up in a Spanish‑speaking, Catholic family where
    community gatherings, music, and food were central. He carries the blended heritage of Taino, Spanish, and African influences that characterize Puerto Rican culture—celebrating fiestas patronales, preparing
    arroz con gandules, pernil, and pasteles, and participating in bomba and plena rhythms. His upbringing emphasized family loyalty, respect for elders, and a strong work ethic, values that continue to
    shape his interactions and community involvement.
