  career_goals: Although retired, Jorge aims to preserve his family’s agricultural legacy, establish a community garden for local youth, document oral histories of Coamo’s older residents, and continue
    supporting his grandchildren’s education. He also hopes to learn basic digital tools to stay connected with relatives abroad and perhaps write a memoir of his life in rural Puerto Rico.
