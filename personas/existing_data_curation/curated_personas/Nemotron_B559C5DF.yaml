  career_goals: Shaheim dreams of turning his artistic passion into a career as a visual storyteller—whether as a graphic‑novel illustrator, animator, or independent game designer. He hopes to attend a
    specialized arts high school or a college program that blends art and technology, allowing him to create media that reflects his community’s experiences. Long‑term, he envisions working in a role that
    merges creativity with education, such as a museum curator or youth art‑program coordinator, where he can inspire other young people while maintaining a stable, fulfilling livelihood.
