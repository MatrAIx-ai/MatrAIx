personas:
  professional: Shaheim Bullock, an aspiring comic book illustrator, blends meticulous line work with experimental storytelling, leveraging their curious mind and methodical planning to produce weekly sketch
    series while balancing school commitments.
  sports: Shaheim Bullock enjoys playing midfield for the Riverdale Strikers U‑13 soccer club and practices with the local community basketball team, preferring low‑pressure games that complement their
    strategic mindset from chess; they also cheer for the City Hawks baseball team and spend weekends hiking nature trails for inspiration.
  arts: Shaheim Bullock channels a love of graphic storytelling into weekly comic panels, drawing inspiration from creators like Alan Moore, Shigeru Miyazaki, and Fiona Staples while listening to Miles
    Davis, B.B. King, and soulful hip‑hop artists such as Kendrick Lamar; they regularly attend church choir rehearsals, community art workshops, and sketch the scenery during nature walks.
  travel: Shaheim Bullock’s travel style blends family road trips to natural wonders like the Grand Canyon with occasional city excursions to museums such as the Museum of Modern Art in New York, and they
    dream of attending the Tokyo Manga Expo when they turn eighteen, balancing limited budget constraints with school holiday schedules.
  culinary: Shaheim Bullock enjoys cooking traditional family dishes like chicken and dumplings, collard greens seasoned with smoked paprika, and sweet potato pie, demonstrating a moderate skill level that
    allows them to follow recipes while adding personal twists, and they love savoring the aromatic blend of garlic, thyme, and hot sauce in their weekend meals.
  core: Shaheim Bullock is a curious, methodical teen who pours creative energy into comics while quietly wrestling with anxiety and a penchant for meticulously budgeting every allowance.
background:
  cultural: Shaheim is an African‑American teenager growing up in Durant, Mississippi, a rural town in Holmes County with a deep legacy of Southern Black culture. His family places a strong emphasis on
    church involvement, gospel music, storytelling, and intergenerational respect, fostering his sense of community and cooperation. The region’s historic blues and jazz traditions inform his musical tastes
    and artistic sensibilities. Growing up amidst the enduring narratives of civil‑rights activism in the Delta, he is aware of both the resilience of his community and the challenges of limited educational
    and economic resources. These cultural influences shape his values of harmony, empathy, and a desire to represent his heritage through art.
