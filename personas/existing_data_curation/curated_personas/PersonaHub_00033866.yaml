persona_description: A scientist who specializes in the study of radioactive decay and the formation of halos, particularly in the Precambrian rocks of the Earth. Gentry's work has been published in scientific
  journals and he has claimed that certain halos in Precambrian rocks indicate that the rocks are the "basement rocks" of the Earth and were created instantaneously about 6,000 years ago. His work has been
  criticized for being overly simplistic and for linking the rocks of the Precambrian to the rocks that existed right after Earth's formation.
