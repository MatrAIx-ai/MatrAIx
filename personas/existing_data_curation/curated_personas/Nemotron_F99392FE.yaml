personas:
  professional: Lenora Trice, a data‑driven marketing strategist, blends a skeptical eye for untested ideas with a magnetic presence at networking events to craft inclusive brand narratives that balance
    fresh concepts with proven ROI.
  sports: Lenora Trice cycles through Charlotte’s greenways five days a week, rallies with the Carolina Panthers and Charlotte Hornets, and competes in a local women's 5K club where their competitive streak
    pushes them to chase personal bests.
  arts: Lenora Trice frequently attends live jazz at the Mint, concerts headlined by Kamasi Washington, and theater productions starring Audra McDonald, while drawing creative inspiration from the paintings
    of Kerry James Marshall and the poetry of Maya Angelou.
  travel: Lenora Trice prefers curated cultural tours, often traveling in small groups to historic Southern towns like Savannah and New Orleans, with a dream itinerary that includes tracing the African
    diaspora to Ghana’s Cape Coast and exploring the art districts of Barcelona.
  culinary: Lenora Trice loves experimenting with Southern‑African fusion, whipping up collard greens seasoned with harissa, smoked turkey gumbo infused with berbere spice, and perfecting stone‑ground cornbread
    topped with honey‑glazed sweet potatoes.
  core: Lenora Trice is a charismatic, data‑savvy marketer who balances a skeptical, competitive edge with a love for community storytelling, all while juggling a busy social calendar, a penchant for late‑night
    coffee, and a relentless curiosity for cultural flavors.
background:
  cultural: Lenora was raised in Charlotte's historic Biddleville neighborhood within a close‑knit African American family that valued community, resilience, and education. Her upbringing was shaped by
    church traditions, Southern hospitality, and annual celebrations of Juneteenth and emancipation milestones. Family stories of civil‑rights activism instilled a strong sense of pride and responsibility
    to uplift her community. She navigates both African American Vernacular English and formal professional communication with ease, drawing on this cultural fluency to craft inclusive marketing messages.
    The richness of Black arts, music, and culinary traditions informs her aesthetic sensibilities and fuels her commitment to represent diverse narratives in her work.
attributes:
  skills: '[''Strategic brand positioning'', ''Digital advertising and media planning'', ''SEO and content optimization'', ''Social media campaign management'', ''Data analytics (Google Analytics, Tableau)'',
    ''Marketing automation (HubSpot, Marketo)'', ''Copywriting and storytelling'', ''Project management (Agile, Scrum)'', ''Public speaking and presentation'', ''Team leadership and mentorship'', ''Budget
    forecasting and ROI analysis'', ''Cross‑cultural market research'']'
  hobbies: '[''Attending industry networking events'', ''Cooking and experimenting with fusion cuisine'', ''Yoga and Pilates'', ''Urban cycling'', ''Reading contemporary fiction and African American literature'',
    ''Podcasting about marketing and culture'', ''Mentoring young professionals'', ''Traveling to historic cultural sites'', ''Live music and theater performances'', ''Running short‑distance races'']'
  career_goals: Lenora aims to progress to a senior director role where she can shape integrated brand strategies on a regional or national scale, eventually targeting a CMO position. She is driven to champion
    diversity and inclusion within the marketing industry, leading initiatives that amplify underrepresented voices. Long‑term, she envisions launching her own boutique agency focused on culturally resonant
    campaigns that blend data insights with authentic storytelling, while also becoming a sought‑after speaker at industry conferences and a mentor for emerging Black marketers.
