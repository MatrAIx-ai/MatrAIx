    yoga sessions'']'
  career_goals: Jose aims to earn his GED within the next year and enroll in a community‑college associate program in digital media or communications. He envisions a career as a digital content strategist
    for a nonprofit focused on Latino youth empowerment, where he can blend his artistic talents with his commitment to community outreach. Long‑term, he hopes to obtain a bachelor’s degree in communications
    and potentially a master’s in community development, positioning himself to lead cultural preservation projects that document and share Mexican heritage stories through interactive media. He also aspires
    to develop workshops that teach stress‑reduction and creative expression to peers facing similar emotional challenges.
