personas:
  professional: Jose Angulo, a 19‑year‑old aspiring digital content strategist, blends bilingual fluency, self‑taught photo and video editing, and a knack for community event coordination into a creative
    workflow that balances meticulous deadlines with spontaneous artistic experimentation, while their natural curiosity and occasional worry drive them to constantly refine their storytelling craft for
    nonprofit youth empowerment.
  sports: Jose Angulo, a 19‑year‑old soccer enthusiast, plays forward for the local youth league team in San Jose, avidly follows the San Jose Earthquakes and the LA Lakers, and balances their energetic
    social nature with a flexible fitness routine that sometimes falters when academic deadlines loom, reflecting their blend of teamwork spirit and occasional stress‑induced inertia.
  arts: Jose Angulo, a 19‑year‑old visual art aficionado, spends weekends sketching in sketchbooks, exploring street murals by artists like JR and Shepard Fairey, curating digital illustrations on Instagram,
    and listening to indie rock bands such as Arctic Monkeys alongside regional norteña tunes, using this creative immersion as both a social connector and a personal antidote to worry.
  travel: Jose Angulo, a 19‑year‑old cultural explorer, favors budget‑friendly road trips to nearby California gems like the Redwood Forest and the historic city of Oaxaca for its vibrant market festivals,
    plans a future backpacking journey to a southern city famed for its mural heritage, and balances travel ambitions with the constraints of community college tuition and family responsibilities.
  culinary: Jose Angulo, a 19‑year‑old home‑cook, enjoys mastering dishes such as tacos al pastor with pineapple‑marinated pork, chipotle‑spiced pozole with hominy, and homemade salsa verde, showcasing
    a moderate cooking skill that blends family‑passed recipes with experimental twists, while often inviting friends over to share meals as a way to strengthen communal bonds.
  core: Jose Angulo is a 19‑year‑old bilingual creator whose curiosity, strong community ties, and habit of turning stress into art fuel a relentless pursuit of meaningful digital storytelling and cultural
    preservation.
background:
  cultural: Jose was born and raised in San Jose to Mexican immigrant parents who originated from the state of Jalisco. Spanish is the dominant language at home, while English is used at school and in the
    broader community, giving him a bicultural perspective. He grew up immersed in Mexican traditions—celebrating Día de los Muertos, participating in local Mexican heritage festivals, and helping prepare
    family meals rooted in Mexican cuisine. His family places high value on close‑knit relationships, respect for elders, and mutual support, which informs his cooperative yet assertive interpersonal style.
    Living in Santa Clara County, he is part of a growing Latino youth community, often volunteering at after‑school programs that assist fellow Mexican‑American teens with tutoring and cultural activities.
