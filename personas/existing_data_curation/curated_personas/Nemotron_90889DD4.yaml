personas:
  professional: Maria Solerperez, a 42‑year‑old UI/UX designer and interaction specialist in Salt Lake City, channels a methodical, research‑driven mindset and bilingual fluency into crafting accessible,
    data‑rich digital health tools while plotting a path toward a design director role that prioritizes mental‑wellbeing solutions.
  sports: Maria Solerperez finds solace on the Wasatch trails with weekend hikes, belongs to a local climbing club, practices yoga at a community studio, and roots for the Utah Jazz and Real Salt Lake while
    occasionally joining a friendly softball league for retirees.
  arts: Maria Solerperez frequently visits the Utah Museum of Contemporary Art, captures gallery installations with a DSLR, creates pottery inspired by the intricate motifs of family celebrations, and draws
    artistic inspiration from musicians like Lila Downs, the ambient sounds of Bon Iver, and the vibrant street murals of local muralists.
  travel: Maria Solerperez enjoys planned getaways that blend cultural immersion and nature, such as a spring road trip to Santa Fe for its art markets and a summer hike in the Grand Canyon, while dreaming
    of a future pilgrimage to Oaxaca to study traditional food practices.
  culinary: Maria Solerperez loves experimenting in the kitchen, merging the smoky heat of chilies and corn masa with Utah’s farm‑fresh beet and elk, famously serving mole‑laden elk tacos and quinoa‑filled
    enchiladas at community cooking workshops.
  core: Maria Solerperez is a curiosity‑driven, organized designer who combats anxiety with art, hiking, and purposeful community work, balancing meticulous career ambition with a love for vivid culinary
    experiments and cultural storytelling.
background:
  cultural: Maria was raised in a Mexican-American household where Spanish was spoken at home and family gatherings celebrated traditions such as Dia de los Muertos and quinceaneras. Her parents, first-generation
    immigrants, emphasized education, hard work, and cultural pride. This bicultural upbringing instilled in Maria a strong sense of community and an appreciation for Mexican visual aesthetics - vibrant
    colors, storytelling motifs, and symbolic patterns - which she weaves into her design projects. Living in Salt Lake City, she balances her cultural heritage with the broader American context, actively
    participating in both Mexican community events and the local arts scene, and she often serves as a cultural bridge in collaborative design settings.
attributes:
  skills: '[''User Interface (UI) Design'', ''User Experience (UX) Research'', ''Interaction Design'', ''Graphic Design'', ''3D Modeling (SolidWorks)'', ''Prototyping (Sketch, Figma, Adobe XD)'', ''Design
    Thinking Facilitation'', ''Project Management'', ''Data Visualization'', ''HTML/CSS/JavaScript'', ''Accessibility Compliance'', ''Agile Scrum Methodology'', ''Statistical Analysis (R, Python)'', ''Bilingual
    Communication (Spanish/English)'']'
  hobbies: '[''Contemporary Art Gallery Visits'', ''Photography (Street & Landscape)'', ''Hiking in the Wasatch Mountains'', ''Pottery and Ceramic Workshops'', ''Reading (Philosophy, Psychology, Science
    Fiction)'', ''Cooking Mexican and Fusion Cuisine'', ''Live Music & Jazz Nights'', ''Yoga and Mindfulness Practice'', ''Journaling'', ''Volunteering for Community Arts Programs'']'
  career_goals: Maria aims to transition into a senior design leadership role within the next five years, ideally as a Design Director or Head of User Experience at a technology firm that prioritizes mental-health
    and inclusive products. She plans to deepen her expertise by completing a master's program in Human-Computer Interaction while building a portfolio of data-driven design solutions that alleviate anxiety
    and improve emotional well-being. Maria also aspires to mentor emerging designers, especially women and Latinx professionals, and eventually launch a boutique consultancy that integrates culturally
    informed design practices into digital health platforms.
