  career_goals: Though still young, Bertoldo frequently talks about becoming someone who makes others smile—he mentions wanting to be an artist who paints bright pictures, a storyteller who shares adventures,
    or a performer who sings and dances on stage. He also dreams of helping people, hinting at future roles like a teacher or community helper who can use his natural sociability to encourage and guide
    others.
