persona_description: A school-based gang and violence prevention program director who is passionate about providing life skills to students to prevent delinquency, youth violence, and gang membership. They
  have developed partnerships with nationally recognized organizations such as the Boys and Girls Clubs of America and the National Association of Police Athletic Leagues to encourage positive relationships
  among the community, parents, schools, and law enforcement officers. They have successfully implemented the G.R.E.A.T. program in all the City middle schools and are currently presenting the curriculum
  to elementary school students, with over 3,000 Frederick County Public School students receiving G.R.E.A.T. instruction.
