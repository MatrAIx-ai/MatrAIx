personas:
  professional: Asha Milton, a 57‑year‑old surveillance specialist with two decades of frontline security in high‑stakes gambling venues, blends an educational theory background with a methodical, data‑driven
    approach to threat assessment, design and deliver curriculum‑based training for officers, and leverages their competitive, organized nature to streamline operational policy as they pursue a Surveillance
    Supervisor role and relevant CPP and CSP certifications.
  sports: Asha Milton enjoys senior bowling at the Bushwick Bowling Center league, competes in a local chess club, and roots for the Brooklyn Nets (NBA) and New York Yankees (MLB), while also joining a
    community running group that meets after salsa classes, blending competitive drive with social fitness.
  arts: Asha Milton immerses themselves in Brooklyn’s art scene by photographing murals by the Bushwick Collective, attending exhibitions at the Brooklyn Museum featuring artists like Kehinde Wiley and
    Ai Weiwei, and participating in community theatre workshops and weekly salsa dancing, which together satisfy their curiosity and sociable spirit.
  travel: Asha Milton favors short, culturally rich getaways—such as a weekend farm‑to‑table retreat in Hudson Valley, a historic tour of Charleston, SC, and an annual family trip to Jamaica’s coastal towns—planning
    itineraries with a mix of spontaneity and detailed spreadsheets, balancing a modest travel budget with the desire to explore new culinary and artistic experiences.
  culinary: Asha Milton cultivates a rooftop garden of thyme, scotch bonnet peppers and kale, using the fresh herbs to craft soulful Caribbean‑inspired dishes like jerk chicken, callaloo stew, and plantain
    fritters for family gatherings, while also savoring Brooklyn’s food markets and occasionally over‑seasoning recipes in pursuit of bold flavors.
  core: Asha Milton is a methodical security veteran with a thriving curiosity for art, salsa, and garden‑grown Caribbean cuisine, who balances a competitive edge with sociable charm, meticulous budgeting,
    and a proactive yet sometimes inconsistent health routine.
background:
  cultural: Born and raised in the vibrant neighborhoods of Brooklyn, Asha identifies as African-American with deep roots in the Caribbean diaspora, tracing her family lineage to Jamaica and Trinidad. Her
    upbringing was shaped by church gatherings, gospel music, and community festivals such as West Indian Carnival, which fostered a strong sense of cultural pride and solidarity. She speaks fluent Patois
    with older relatives and is active in local cultural organizations that celebrate Black heritage through art, music, and culinary traditions. The multicultural tapestry of Queens and Brooklyn has also
    exposed her to a mosaic of languages and cuisines, reinforcing her appreciation for diversity while staying grounded in her Black cultural identity.
attributes:
