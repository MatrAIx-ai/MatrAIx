    ''Emergency response planning'', ''Risk management and mitigation'', ''Community liaison and outreach'']'
  hobbies: '[''Visiting art galleries and museums'', ''Street-art photography'', ''Salsa dancing'', ''Community theatre'', ''Chess club participation'', ''Senior bowling league'', ''Reading (criminal justice,
    technology, African-American history)'', ''Urban gardening'', ''Cooking Caribbean and soul food'']'
  career_goals: Asha aims to advance to a Surveillance Supervisor or Security Operations Manager position within a major casino, where she can oversee a team of officers and shape operational policy. She
    plans to earn the Certified Protection Professional (CPP) and Certified Surveillance Professional (CSP) certifications to formalize her expertise. Leveraging her education background, she intends to
    develop a comprehensive security training curriculum that integrates pedagogical best practices for surveillance officers. Asha also aspires to lead a cross‑functional task force that implements AI‑driven
    video analytics across the venue’s surveillance infrastructure. Beyond her workplace, she wishes to establish a mentorship program for at‑risk youth in Brooklyn, blending her security knowledge with
    her passion for teaching. Ultimately, she envisions transitioning into a consultancy role advising multiple gaming establishments on security best practices, regulatory compliance, and staff development.
