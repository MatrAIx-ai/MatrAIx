personas:
  professional: John Tolentino, a 3-year-old who runs a make-believe tiny office in their playroom, organizing crayons by color and assigning tasks to stuffed animals, showcases early curiosity tempered
    by a practical sense of order while delighting in being the center of attention.
  sports: John Tolentino, a 3-year-old who eagerly joins the preschool soccer circle and cheers on the local minor league baseball team, the River Valley Cubs, yet prefers spontaneous tag games in the backyard,
    embodying their love for flexible play and sociable competition.
  arts: John Tolentino, a 3-year-old who sings loudly along to Disney's 'Let It Go', watches Pixar short films, and creates finger paintings inspired by Henri Matisse's cutouts, using bright crayons and
    finger smears to express their vivid imagination.
  travel: John Tolentino, a 3-year-old who has visited the city zoo and a sunny beach resort in Florida, daydreams about a future trip to Disney World in Orlando and the snowy Alpine slopes of Switzerland,
    yet tends to cling to familiar routines and the comfort of their parents' car rides.
  culinary: John Tolentino, a 3-year-old who loves slurping spaghetti with marinara sauce and pepperoni, munching crunchy apple slices with peanut butter, often creating a colorful mess with ketchup while
    enthusiastically experimenting with a strawberry-banana smoothie.
  core: John Tolentino, a 3-year-old bundle of chatter who balances a voracious curiosity with orderly block building, thrives as the life of any playgroup, yet frets over small setbacks and occasionally
    forgets to clean up their toys.
background:
  cultural: John grew up in Calera, Alabama, in a white, middle-class Southern family that attends church, enjoys community gatherings, and shares traditional meals like fried chicken, biscuits, and peach
    cobbler. The family also celebrates local holidays and occasionally incorporates Spanish words and music from his grandfather’s heritage, giving him a modest blend of Southern and Hispanic cultural
    influences.
