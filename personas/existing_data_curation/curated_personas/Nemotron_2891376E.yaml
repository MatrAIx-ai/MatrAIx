personas:
  professional: Theresa Santana, a 64‑year‑old veteran forklift operator and warehouse logistics specialist, channels three decades of hands‑on safety expertise and inventive problem‑solving into efficient
    solitary loading operations, often improvising practical workarounds while resisting rigid procedures, and they thrive in quiet, independent shifts.
  sports: Theresa Santana enjoys leisurely early‑morning walks along the Outer Banks and participates in the local senior walking club, while quietly supporting the Carolina Hurricanes hockey team, and
    they attend occasional Durham Bulls baseball games.
  arts: Theresa Santana finds inspiration in Winslow Homer's watercolor seascapes and Doc Watson's folk ballads, often listening to Debussy's Nocturnes while sketching marshland birds, and they volunteer
    at the Craven County museum to help install exhibitions.
  travel: Theresa Santana prefers solo, low‑key road trips that blend coastal scenery with art history, having explored Charleston’s historic district and Savannah’s riverfront, and they dream of a quiet
    pilgrimage to Giverny to wander Monet’s gardens.
  culinary: Theresa Santana enjoys cooking modest seafood dishes such as shrimp‑and‑grits seasoned with lemon and Old Bay, preparing fresh baked oysters with a dash of parsley, and savoring occasional evenings
    at the local clam shack for a steaming bowl of New England clam chowder.
  core: Theresa Santana is a quietly inventive 64‑year‑old who balances a lifelong love of solitary coastal art with a spontaneous streak that occasionally leaves safety manuals scattered on the garage
    floor, and they often hum folk tunes while painting.
background:
  cultural: Theresa was born and raised in a small town on the eastern coast of North Carolina, within a white Southern family that traces its roots to the agricultural and maritime heritage of the region.
    Her upbringing emphasized self‑reliance, modesty, and a deep respect for the natural coastal environment. She attended a local public high school and participated in church‑based community events, which
    fostered a quiet devotion and an appreciation for solitary reflection. The local culture celebrated folk art, storytelling, and seasonal festivals centered around seafood and Southern cuisine, shaping
    her creative curiosity and love for art. This blend of practical Southern values and exposure to coastal folk traditions informs her present worldview and daily habits.
attributes:
  skills: '["forklift operation", "material loading and unloading", "inventory tracking and reconciliation", "warehouse safety compliance", "basic equipment maintenance", "creative logistics problem‑solving",
