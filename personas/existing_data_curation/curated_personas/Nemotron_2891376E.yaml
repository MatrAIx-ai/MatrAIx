  hobbies: '["watercolor painting", "sketching coastal landscapes", "visiting local art galleries", "reading art history", "gardening with native flowers", "birdwatching", "walking on the Outer Banks",
    "woodworking small projects", "crossword puzzles", "listening to podcasts on science and philosophy"]'
  career_goals: Approaching retirement, Theresa aims to shift from full‑time labor to a part‑time mentorship role where she can share her safety knowledge and inventive problem‑solving techniques with younger
    workers. She also hopes to start a modest community art‑supply hub that doubles as a storage space for local artists, merging her logistical expertise with her love of art. Volunteering at the Craven
    County museum to help with exhibit installation and curation is another ambition, allowing her to stay engaged with art in a low‑stress, meaningful way. Ultimately, she seeks a balanced, flexible position
    that lets her remain active, continue learning, and leave a practical legacy.
