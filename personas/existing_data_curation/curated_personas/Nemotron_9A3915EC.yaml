personas:
  professional: Fernando Borja, a high school junior turning his bilingual fluency, soccer tactics knowledge, and budding video editing skills into a personal brand on TikTok, creates short, engaging clips
    that blend strategic gaming highlights with quick cooking tutorials, while they channel their empathy and organized planning into community-oriented storytelling.
  sports: Fernando Borja, an avid soccer player who organizes weekly pick‑up matches at Pineapple Park and follows the Miami Dolphins and Orlando City SC, balances competitive drills with friendly camaraderie,
    and they supplement their routine with beach volleyball in the summer and occasional jogs along the Boca Raton shoreline.
  arts: Fernando Borja, a budding multimedia creator, spends spare time editing TikTok videos set to reggaeton beats, choreographing dance snippets, snapping sunrise shots of the Boca Raton boardwalk with
    a DSLR, and devouring graphic novels like "Saga" and "Watchmen", drawing inspiration from visual artists such as Annie Leibovitz and Alex Ross, while they experiment with sketching to unwind.
  travel: Fernando Borja, an adventure‑seeking teen who mixes spontaneous weekend trips with meticulous Google Maps planning, enjoys beach outings to Key West, music festivals in New Orleans, and dreams
    of exploring Barcelona’s architecture and Tokyo’s neon districts once they can fund longer journeys, and they often share travel vlogs on social media.
  culinary: Fernando Borja, a home‑cooking enthusiast, can whip up quick arepas using corn masa and cheese, fried empanadas stuffed with seasoned beef, and a hearty bandeja paisa featuring beans, chorizo,
    fried plantains, and avocado, and they love posting step‑by‑step tutorials on TikTok while sometimes over‑spicing dishes with extra hot sauce.
  core: Fernando Borja, a 16‑year‑old bilingual creator, channels restless curiosity and anxiety into viral TikToks, soccer drills, and midnight cooking experiments, while battling a habit of late‑night
    gaming marathons that sometimes disrupts sleep.
background:
  cultural: Fernando was born to Colombian parents who emigrated to the United States before his birth. He grew up in a bilingual household in Boca Raton, Florida, where Spanish is spoken at home and English
    at school and in the community. His family maintains Colombian traditions such as celebrating Carnaval de Barranquilla, Día de la Independencia, and cooking regional dishes from the Caribbean and Andean
    regions. He participates in local Colombian cultural festivals and attends a Spanish-language church service, fostering a strong sense of identity. While he embraces American customs—like going to the
    beach and following the school system—he remains deeply connected to his heritage through music, language, food, and close family ties.
