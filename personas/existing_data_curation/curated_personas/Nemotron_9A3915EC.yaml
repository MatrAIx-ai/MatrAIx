  career_goals: Fernando aims to finish high school or obtain his GED within the next two years, then pursue post-secondary studies in communications or computer science at a community college. He dreams
    of turning his bilingual ability and social media savvy into a career as a digital content creator or community outreach specialist, focusing on highlighting Colombian culture for a broader audience.
    He also hopes to develop his photography and video editing skills to produce engaging cultural stories. In the longer term, Fernando would like to work as a youth mentor or mental health advocate within
    the Latino community, using his empathy and personal experience with anxiety to support peers facing similar challenges.
