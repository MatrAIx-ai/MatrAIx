  hobbies: '[''drawing'', ''watercolor painting'', ''digital illustration'', ''creative writing'', ''reading sci‑fi/fantasy'', ''listening to hip‑hop/jazz/R&B music'', ''hip‑hop dance'', ''acting in school
    plays'', ''debate club'', ''coding with Scratch'', ''volunteering at community center'', ''visiting museums'', ''attending cultural festivals'']'
  career_goals: Jasmine dreams of turning her passion for art and storytelling into a career that amplifies Black voices. She aspires to study visual arts and media production in college, eventually becoming
    a multimedia artist or creative director for a cultural institution such as a museum or a community arts nonprofit. She also hopes to use her communication skills to produce documentaries that explore
    social justice issues and to mentor younger students through after‑school art programs. In the long term, she envisions a role where she can blend artistic creation with advocacy, perhaps leading a
    youth‑led media platform that highlights under‑represented stories.
