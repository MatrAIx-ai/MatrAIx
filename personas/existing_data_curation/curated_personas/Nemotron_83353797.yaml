personas:
  professional: An aspiring interdisciplinary storyteller and visual creator, Jasmine Michel leverages their curiosity, organized planning, and love for performance to produce polished digital comics, lead
    debate arguments, and star in school productions, often turning every project into a collaborative showcase.
  sports: An enthusiastic participant in hip‑hop dance crews and a weekend member of the local youth swim club, Jasmine Michel cheers for the Washington Capitals and the Washington Wizards, regularly practices
    cardio routines at school gym, and channels competitive energy into debate tournaments, treating each activity as a performance.
  arts: A passionate creator and appreciator of the arts, Jasmine Michel draws inspiration from the street art of Banksy, the lyrical storytelling of Kendrick Lamar, the improvisational genius of Miles
    Davis, and the poetic voice of Maya Angelou, weaving these influences into her sketchbooks, digital illustrations, and original short stories shared in the school literary magazine.
  travel: A curious explorer with a flair for planning, Jasmine Michel has visited the Smithsonian National Air and Space Museum and the National Gallery of Art, spent a weekend in historic Annapolis, dreams
    of a student exchange program in Paris to study at the Louvre, and meticulously crafts itineraries on a colorful corkboard, balancing school deadlines with travel aspirations.
  culinary: A budding foodie who balances school lunches with creative cooking, Jasmine Michel loves whipping up avocado toast topped with feta, experimenting with homemade ramen broth, baking chocolate
    chip cookies for drama rehearsals, and they can't resist a Saturday pizza night with friends, often adding extra hot sauce for an adrenaline kick.
  core: Jasmine Michel is a socially vibrant, over‑curious teen who channels their organized mind and artistic flair into every project, yet sometimes lets stress drive impulsive spending and late‑night
    work marathons.
background:
  cultural: Jasmine is a Black teenager growing up in Silver Spring, a vibrant suburb of Washington, D.C., where her family maintains strong ties to African‑American traditions. Her parents, originally
    from the Mid‑Atlantic region, celebrate cultural holidays such as Juneteenth and Kwanzaa, and they often share stories of their own upbringing in Baltimore. The diverse community around her introduced
    Jasmine early to a blend of music, art, and activism—from local jazz concerts to neighborhood murals that honor civil‑rights legacies. She attends a historically integrated middle school where she participates
    in multicultural clubs and learns about the broader Black diaspora. These experiences shape her artistic sensibility, prompting her to incorporate Afro‑centric motifs and social‑justice themes into
    her drawings and stories. Jasmine also values the communal support of her church’s youth group, which offers mentorship and opportunities to showcase her talents at community events.
attributes:
  skills: '[''public speaking'', ''project planning'', ''time management'', ''watercolor painting'', ''digital illustration'', ''Sketchpad drawing'', ''basic coding (Scratch, Python)'', ''research and note‑taking'',
