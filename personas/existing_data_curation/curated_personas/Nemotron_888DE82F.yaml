personas:
  professional: Hazel Stanley is an organized, art‑enthused accountant who leverages double‑entry bookkeeping, QuickBooks, Sage 50, and advanced Excel to keep nonprofit arts organizations financially transparent,
    translating complex data into clear narratives for volunteers and board members while balancing meticulous detail with a flexible, creative problem‑solving style that they apply daily.
  sports: Hazel Stanley jogs with a local Central Park running group in spring, practices recreational salsa on weekends, and follows the New York Knicks and Yankees avidly—cheering at Madison Square Garden
    during basketball season and attending summer baseball games at Yankee Stadium—while also joining a community volleyball league during warm months, and they relish the camaraderie of the team.
  arts: Hazel Stanley curates an Instagram feed of urban photography at Brooklyn street murals, attends gallery openings featuring contemporary artists such as Kehinde Wiley and Mickalene Thomas, volunteers
    as a stagehand for community theater productions of August Wilson plays, and enjoys performances by Broadway stars like Lin‑Manuel Miranda, all of which deepen their appreciation for modern visual and
    performing arts, and they often discuss the cultural impact of each piece with fellow volunteers.
  travel: Hazel Stanley prefers culturally immersive weekend trips, planning budget‑friendly stays in New Orleans during Mardi Gras, exploring Savannah’s historic districts, attending the Chicago Blues
    Festival each summer, and dreaming of a longer European art pilgrimage to Paris’s Musée d’Orsay and Berlin’s contemporary art scene, balancing work obligations with spontaneous photo walks, and they
    often sketch cityscapes to capture the fleeting moments.
  culinary: Hazel Stanley experiments with modern soul‑food at home, whipping up collard‑greens quinoa salad drizzled with smoked paprika vinaigrette, sweet‑potato gnocchi tossed in a sage‑brown butter
    sauce, BBQ jackfruit tacos topped with pickled okra, and a creamy cauliflower mac & cheese that fuses traditional comfort with contemporary health twists, and they love to share these dishes with friends
    during board‑game nights.
  core: Hazel Stanley is a detail‑driven accountant who balances spreadsheets with street‑art tours, fuels late‑night CPA prep with too much espresso, never misses a salsa lesson, and sometimes overcommits
    to community workshops despite a packed calendar, a quirk they humorously attribute to their love of multitasking.
background:
  cultural: Hazel is an African‑American woman whose family roots trace back to the Southern United States, with a strong sense of connection to Black cultural traditions and community activism. Raised
    in a multicultural Brooklyn neighborhood, she grew up immersed in gospel music, storytelling, and the legacy of the Harlem Renaissance, which fuels her appreciation for visual and performing arts. Her
    cultural identity shapes her commitment to uplifting Black‑owned businesses, celebrating holidays such as Juneteenth and Kwanzaa, and fostering community solidarity through mentorship and volunteer
    work.
attributes:
  skills: '["Double‑entry bookkeeping", "Accounts payable/receivable", "QuickBooks", "Sage 50", "Microsoft Excel (advanced)", "Financial statement preparation", "Basic tax filing", "Internal auditing assistance",
    "Data entry accuracy", "Customer service", "Financial literacy tutoring", "Event budgeting", "Time management", "Team collaboration"]'
  hobbies: '["Urban photography", "Gallery and museum visits", "Salsa dancing", "Community theater", "Soul‑food cooking with fusion twists", "Yoga and mindfulness", "Trivia nights", "Board‑game gatherings",
    "Financial‑literacy volunteering", "Reading contemporary fiction and African‑American literature"]'
  career_goals: Hazel aims to earn her Certified Public Accountant (CPA) credential within the next three years, positioning herself for a senior accountant or finance manager role in a nonprofit arts organization
    that aligns with her love of culture. She also envisions eventually launching her own boutique bookkeeping firm that serves Black‑owned small businesses and community groups in New York. To achieve
    these goals, she plans to enroll in evening accounting courses, obtain a bookkeeping certification, and develop leadership skills through mentorship programs, while balancing her family responsibilities
    and continuing her community‑outreach work.
