personas:
  professional: An aspiring digital storyteller, Terence Humphrey (10) channels their curiosity, meticulous organization, and compassionate spirit into crafting interactive Scratch adventures that weave
    hand‑drawn desert landscapes with simple code, delighting classmates and church youth groups alike.
  sports: An energetic member of the Snowflake Youth Soccer League, Terence Humphrey (10) spends weekend afternoons sprinting on the field, cheers for the Arizona Cardinals and Phoenix Suns on game nights,
    and joins family hikes through pine forests to stay fit, while also enjoying occasional basketball drills at the community center during the cooler months.
  arts: 'A budding visual and musical artist, Terence Humphrey (10) sketches sweeping desert vistas inspired by Georgia O''Keeffe, experiments with digital painting software to recreate the vibrant colors
    of the nearby red rock formations, practices piano scales to the rhythm of Ludovico Einaudi, and eagerly watches Pixar''s "Inside Out" and the animated series "Avatar: The Last Airbender" for creative
    inspiration.'
  travel: A curious explorer, Terence Humphrey (10) has already trekked the rim of the Grand Canyon, hiked the red rock trails of Sedona, and camped near the pine forests of Flagstaff, while dreaming of
    a future road trip to Yellowstone National Park and a summer adventure in the coastal cliffs of Big Sur, always planning trips with a detailed checklist and a scrapbook of Polaroid snaps.
  culinary: A budding junior chef, Terence Humphrey (10) enjoys whipping up cheesy macaroni, assembling fresh tacos with cilantro, lime, and shredded chicken, experimenting with prickly pear smoothies for
    a desert‑sweet twist, and mastering the perfect s'more over the campfire, though they sometimes over‑salt the salsa and leave a breadcrumb trail of LEGO pieces in the kitchen.
  core: Terence Humphrey, a ten‑year‑old desert‑inspired digital creator, blends meticulous organization, boundless curiosity, and a heartfelt drive to help others into every sketch, code, soccer game,
    and snack experiment.
background:
  cultural: Terence was raised in Snowflake, a small, close‑knit town in Navajo County, Arizona, where community and family ties are strong. His family participates in local traditions, such as town festivals
    and volunteer clean‑up days, and attends a congregation that emphasizes service and fellowship. Growing up in the high desert, he is familiar with the surrounding pine forests, red rock formations,
    and the cultural heritage of nearby Navajo and Hopi peoples, which fuels his appreciation for nature and respect for diverse cultures.
