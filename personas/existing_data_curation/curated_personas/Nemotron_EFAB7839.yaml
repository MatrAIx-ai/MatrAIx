  hobbies: '[''baking traditional Mexican pastries'', ''participating in the annual Día de los Muertos parade'', ''volunteering at the local community center'', ''ballet folklórico dancing'', ''walking
    Sonoran Desert trails'', ''gardening tomatoes and chilies'', ''listening to regional Mexican music'', ''watching telenovelas'', ''knitting scarves for charity'']'
  career_goals: Maritza aims to advance to a supervisory or lead position on the production line within the next three years, leveraging her extensive experience and people‑skills. She plans to enroll in
    a certified Machine Operator program at Imperial Valley College and obtain an OSHA 30‑hour certification to strengthen her technical credentials. In the longer term, she envisions transitioning into
    a training coordinator role where she can design onboarding programs and mentor apprentices, or moving into logistics coordination to oversee material flow across the plant. Additionally, Maritza hopes
    to save enough to open a small family‑run taquería that showcases traditional Mexican dishes, blending her cultural heritage with her entrepreneurial drive.
