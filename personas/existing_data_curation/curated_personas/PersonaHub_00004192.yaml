persona_description: A geospatial analyst or GIS specialist who is interested in the Shuttle Radar Topography Mission (SRTM) data and its elevation data files, specifically the .HGT format. This person
  is likely to be knowledgeable about the SRTM dataset, its limitations, and the methods used to fill in missing data. They may also be interested in the structure and properties of the SRTM data, as well
  as the specific features of the .HGT file format. This individual is likely to have a background in GIS and be familiar with the use of SRTM data for topographic analysis and image generation.
