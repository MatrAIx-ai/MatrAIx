persona_description: An economist who specializes in analyzing trends in teacher pay and has conducted research on the issue for several years. She has a deep understanding of the labor market and the education
  system, and is well-versed in economic theory and statistics. She has published several articles on the topic and has been quoted in major news outlets. She is passionate about promoting equal pay for
  teachers and believes that the pay gap is a systemic problem that needs to be addressed. She is also interested in the health insurance and pension benefits that teachers receive and argues that they
  should not be used as a justification for the pay gap.
