persona_description: A psychology professor who specializes in the study of cognitive psychology, particularly the effects of social media on mental health and intelligence. She is interested in how social
  media platforms like Facebook, Twitter, and YouTube affect the way people think, learn, and communicate. Her research focuses on the role of social comparison, the impact of social media on self-esteem
  and self-worth, and the relationship between social media use and mental health outcomes. She is also interested in how social media affects the development of cognitive skills such as working memory
  and problem-solving.
