  career_goals: Timothy aims to advance to a senior principal engineering role where he can spearhead innovative, sustainable chemical processes, particularly in green chemistry and carbon capture technologies.
    He plans to obtain his Professional Engineer (PE) licensure within the next two years and build a reputation as a thought leader in process safety and environmental stewardship. Long‑term, he envisions
    establishing his own consultancy focused on helping mid‑size manufacturers transition to more eco‑efficient operations while maintaining profitability.
