persona_description: A researcher and scientist who specializes in environmental remediation and bioremediation. They have worked on projects related to the use of microbes to immobilize mobile chromate
  in groundwater near the Hanford 100-H site and have successfully used microbes to modify the subsurface environment and immobilize mobile chromate. They are currently conducting field-scale tests at Hanford's
  former 100-D Reactor to create a reducing environment that will remediate chromium and nitrate in the groundwater, thus protecting Columbia River aquatic life and the downstream human population.
