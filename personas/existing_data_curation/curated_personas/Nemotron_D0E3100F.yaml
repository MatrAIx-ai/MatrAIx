  hobbies: '[''Reading historical fiction'', ''Gardening (native Texas plants)'', ''Knitting and crocheting'', ''Crossword and Sudoku puzzles'', ''Volunteer work at community food bank'', ''Walking at Dallas
    Arboretum'', ''Cooking Tex‑Mex meals'', ''Attending small art workshops'', ''Listening to acoustic music performances'']'
  career_goals: Jessica aims to transition into a supervisory role within a nonprofit organization, leading a team of case managers and developing streamlined intake processes that balance structure with
    client‑centered flexibility. She plans to earn a Certified Case Manager credential and, in the longer term, complete a Master’s in Social Work to become a licensed clinical social worker. Her ambition
    includes designing a community‑based program that supports elderly residents in Dallas by linking them to health, housing, and social activities, and she hopes to mentor newer staff, fostering a collaborative
    and compassionate workplace culture.
