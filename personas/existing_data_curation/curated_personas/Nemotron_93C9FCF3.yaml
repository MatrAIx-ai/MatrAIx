  career_goals: Silvio aims to move from a frontline operator to a supervisory role within the next three years, targeting a shift‑lead position where he can mentor newer technicians and drive productivity
    improvements. He plans to obtain OSHA 30‑hour certification and a Certified Production Technician (CPT) credential to formalize his expertise. Leveraging his curiosity for new methods, he hopes to spearhead
    efficiency projects that reduce waste and cycle time, while also establishing a safer, less stressful work environment for his crew. Long‑term, he envisions opening a small, family‑run metal‑finishing
    shop that combines his technical skills with his desire for financial stability and legacy for his children.
