    reporting under tight deadlines'', ''Podcast production'', ''Photojournalism basics'', ''Collaborative newsroom workflow'', ''Flexible time management'']'
  hobbies: '[''Visiting contemporary art galleries and museum exhibitions'', ''Street and urban photography'', ''Playing acoustic guitar and songwriting'', ''Writing poetry and short personal essays'',
    ''Hiking coastal trails in Orange County'', ''Attending indie film screenings and film festivals'', ''Exploring new coffee shops and specialty brews'', ''Cooking experimental Asian‑fusion dishes'',
    ''Practicing yoga and guided meditation'', ''Listening to podcasts on technology, philosophy, and culture'', ''Traveling to culturally rich cities'']'
  career_goals: Otto aims to become a senior investigative reporter known for in‑depth exposés on social justice and environmental issues, eventually moving into a newsroom leadership role such as senior
    editor or editorial director where he can mentor younger journalists and shape the outlet’s cultural coverage. He intends to launch a multimedia series that blends investigative journalism with art
    criticism, producing a weekly podcast and short documentary videos that highlight under‑reported stories in Southern California. Winning a major journalism award, such as a Pulitzer, is a long‑term
    ambition, as is publishing a book that weaves together his reporting experiences with personal reflections on art and society. He also plans to develop expertise in data journalism and AI‑assisted reporting
    tools to stay at the forefront of the evolving media landscape while preserving his mental wellbeing.
