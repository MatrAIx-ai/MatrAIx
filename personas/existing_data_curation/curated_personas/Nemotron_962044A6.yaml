  career_goals: Noeline dreams of turning her love of technology and the natural world into a career. She aspires to become a robotics engineer who designs educational robots that teach kids coding and
    problem‑solving skills, while also hoping to study desert wildlife as a biologist and share those findings through community outreach. In parallel, she envisions advancing her soccer abilities to compete
    at the state level and perhaps pursue a future as a professional athlete. Ultimately, she wants to lead projects that blend STEM education, environmental stewardship, and teamwork, allowing her to inspire
    peers and help them overcome challenges like anxiety.
