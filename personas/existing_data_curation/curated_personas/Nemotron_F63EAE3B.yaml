personas:
  professional: Yasmin Rodriguezaguilar is a seasoned learning and development strategist with over twenty years of designing bilingual training programs, whose spontaneous, flexible style fuels creative
    workshop delivery while their strong empathy keeps teams harmonious, even though they sometimes wrestle with tight deadlines.
  sports: Yasmin Rodriguezaguilar enjoys jogging along the Mahoning River and playing casual soccer with the Youngstown Women's Soccer League in spring, while cheering on the Cleveland Browns in football
    season and the Cleveland Cavaliers for basketball, and they attend a weekly yoga class to balance their high emotional reactivity.
  arts: Yasmin Rodriguezaguilar finds inspiration in the vibrant rhythms of Carlos Santana and the storytelling of Isabel Allende, regularly attending salsa nights at the local cultural center, volunteering
    in community folk‑dance performances, and binge‑watching classic films starring Salma Hayek to unwind.
  travel: Yasmin Rodriguezaguilar prefers purposeful trips that blend cultural immersion with family time, having explored the historic streets of Oaxaca during a DIY itinerary while saving for a future
    pilgrimage to the Day of the Dead celebrations in Guatemala, yet they often rely on last‑minute deals for weekend getaways to nearby Chicago.
  culinary: Yasmin Rodriguezaguilar is a confident home cook who transforms fresh herbs and tomatoes from the farmers’ market into authentic mole, pozole, and enchiladas, enjoys pairing them with mezcal‑infused
    marinades, and occasionally indulges in late‑night tacos with friends, though they sometimes over‑salt dishes when stressed.
  core: Yasmin Rodriguezaguilar blends a spontaneous, empathetic coaching style with a love for community festivals, a penchant for late‑night taco experiments, and a recurring battle with anxiety that
    fuels both their drive and occasional procrastination.
background:
  cultural: As a 53‑year‑old Mexican‑American, Yasmin grew up in a bilingual household where Spanish and English intertwined, shaping her identity with strong ties to Mexican traditions and community values.
    Family celebrations such as Día de los Muertos, Las Posadas, and festive gatherings featuring music, dance, and home‑cooked meals have ingrained a deep sense of familismo and hospitality. Living in
    Youngstown, Ohio, she blends these cultural roots with Midwestern sensibilities, participating in local Hispanic festivals and contributing to cultural exchange initiatives at her workplace. Her Catholic
    upbringing, respect for elders, and appreciation for both collective harmony and personal expression influence her approach to relationships, learning, and community service.
attributes:
  skills: '[''Instructional Design'', ''Curriculum Development'', ''Training Facilitation'', ''E-learning Development'', ''Learning Management System Administration'', ''Needs Assessment'', ''Performance
    Coaching'', ''Bilingual Communication (Spanish/English)'', ''Conflict Resolution'', ''Stakeholder Collaboration'', ''Adaptive Learning Strategies'', ''Emotional Intelligence'']'
  hobbies: '[''Cooking traditional Mexican cuisine'', ''Salsa dancing'', ''Participating in folk-dance groups'', ''Gardening'', ''Reading historical fiction'', ''Reading self-help books'', ''Volunteering
    at community centers'', ''Mentoring youth'', ''Attending local music concerts'', ''Exploring nature hikes in nearby parks'']'
  career_goals: Yasmin aims to shape organizational culture by leading a strategic Learning & Development department that champions inclusive, culturally responsive training. She plans to obtain a Certified
    Professional in Learning and Performance (CPLP) credential, deepen her expertise in digital learning technologies, and eventually transition into a senior director role where she can influence company‑wide
    talent development. In parallel, she hopes to launch a community outreach program in Youngstown that offers free career‑building workshops for local Hispanic youth, merging her professional skills with
    her commitment to family and community. She also seeks to strengthen her time‑management and stress‑reduction practices to support her ambitious goals while maintaining personal well‑being.
