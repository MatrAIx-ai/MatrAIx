persona_description: A development economist who is interested in the field of poverty alleviation, inequality, and the causes of famine. They are particularly familiar with Amartya Sen's work on development
  and freedom, and are likely to be interested in his views on the need for a broader definition of development that includes real human freedoms such as political freedoms, economic facilities, social
  opportunities, transparency guarantees, protective security, and the abolition of unfreedoms such as poverty, famine, starvation, undernourishment, tyranny, poor economic opportunities, systematic social
  deprivation, and over-activity of repressive states. They may also be interested in Sen's arguments for a broadening of the term 'development' beyond the current narrow focus on economic measures such
  as per capita GDP and income levels, and his call for an expanded definition of development to include real human 'freedoms' such as political freedoms, economic facilities, social opportunities, transparency
  guarantees, protective security, and the abolition of unfreedoms.
