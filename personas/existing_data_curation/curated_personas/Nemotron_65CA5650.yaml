personas:
  professional: Lina Rodriguez, a budding preschool architect who spends hours stacking wooden blocks into intricate structures, demonstrates emerging spatial reasoning and meticulous attention to detail
    while her relaxed approach to schedules lets her playfully experiment with both new and familiar building methods.
  sports: Lina Rodriguez delights in toddling at the local park, cheering for the Los Angeles Dodgers and Los Angeles Lakers while she participates in the Little Sprouts Soccer Club, where her spontaneous
    bursts of energy are balanced by a preference for quiet solo swings.
  arts: Lina Rodriguez loves humming Shakira’s upbeat songs and Disney’s “Let It Go,” while she draws colorful calaveras with crayons inspired by Día de los Muertos festivities and watches Pixar’s “Coco”
    for its vibrant storytelling.
  travel: Lina Rodriguez prefers relaxed, sensory‑rich family outings, such as weekend trips to Disneyland and visits to grandparents in Pasadena, yet she daydreams about seeing the sunrise over the Grand
    Canyon and the bright lights of Times Square.
  culinary: Lina Rodriguez enjoys soft chicken tacos with fresh cilantro and lime, proudly helps mash avocados for guacamole, and delights in sweet churros dusted with cinnamon, showing a budding palate
    for both savory and sugary treats.
  core: Lina Rodriguez balances a boundless curiosity and fierce independence with a quirky habit of collecting stray socks, turning every quiet corner into a sanctuary for solitary play.
background:
  cultural: Lina is raised in a Mexican‑American household in Arcadia, California. Her family celebrates Mexican traditions such as Día de los Muertos, Las Posadas, and family gatherings centered around
    tacos, tamales, and pozole. Spanish is spoken regularly at home, and she participates in community festivals and cultural events across Los Angeles County, blending her heritage with the multicultural
    atmosphere of Southern California.
