personas:
  professional: Bridget Riley, a budding preschool educator in training, combines her curiosity about how things work with a practical, methodical approach to arranging storybooks and building block towers,
    meticulously planning play sessions that foster cooperation among peers while also carving out quiet moments for focused reflection.
  sports: Bridget Riley, a playful four-year-old who joins the neighborhood t-ball league each spring, cheers enthusiastically for the Rochester Red Wings during family outings, and balances high-energy
    playground sessions with quiet moments of drawing in the sand, reflects her blend of social enthusiasm and need for alone time.
  arts: Bridget Riley, a vibrant four-year-old who loves to color storybooks, dance to gospel music at church festivals, sing along to Raffi's Baby Beluga and the Frozen soundtrack, and watch Disney animated
    classics, channels her kindness and curiosity into creative play.
  travel: Bridget Riley, a curious four-year-old who enjoys car trips to Niagara Falls with her family, dreams of exploring the Smithsonian museums in Washington, D.C., and prefers relaxed beach days at
    Lake Ontario's shoreline where she can build sandcastles and snack on fruit, illustrates her love for both adventure and familiar comforts.
  culinary: Bridget Riley, a spirited four-year-old who delights in scooping mac and cheese, munches on sweet potato fries sprinkled with a dash of cinnamon, helps her mother stir batter for banana pancakes,
    and proudly requests collard greens and cornbread at family meals, showcases her enthusiastic palate and budding kitchen curiosity.
  core: Bridget Riley, a bright-eyed four-year-old who balances boundless curiosity with a love for order, yet wrestles with intense emotions that flare up at the drop of a hat, makes her both a caring
    friend and a little storm of feelings.
background:
  cultural: Bridget is an African‑American child growing up in Rochester, New York. Her family celebrates cultural traditions such as Juneteenth, Black History Month, and local church festivals that blend
    music, food, and community storytelling. She attends a neighborhood preschool that incorporates multicultural books and activities, reinforcing her identity and giving her pride in her heritage while
    fostering connections with peers from diverse backgrounds.
attributes:
  skills: '[''color and shape identification'', ''basic counting up to ten'', ''story retelling'', ''fine motor coordination (drawing, bead threading, shoe tying)'', ''following multi‑step routines'', ''sharing
    and turn‑taking'', ''emotional self‑soothing techniques'']'
  hobbies: '[''building block towers'', ''color‑sorted block arranging'', ''pretend storytelling'', ''singing nursery rhymes'', ''circle time participation'', ''leaf and bug collecting'', ''plant watering'',
    ''coloring books with patterns'']'
  career_goals: Though only four, Bridget already toys with imaginative ambitions. She often says she wants to become a teacher who helps younger kids learn to read, a veterinarian who cares for animals,
    and a community helper who makes sure everyone feels safe and happy. In the short term, she is eager to master reading simple sentences, write her name clearly, and learn to ride a tricycle without
    assistance, seeing each as a stepping stone toward her larger dream of helping others.
