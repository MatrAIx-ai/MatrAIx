personas:
  professional: Stephen Bhandari, a seasoned home‑health aide with over three decades of hands‑on care experience, blends meticulous documentation, empathetic communication, and a curiosity for emerging
    assistive technologies to mentor junior aides while pursuing a CNA credential and eyeing future policy advocacy in elder‑care.
  sports: Stephen Bhandari enjoys low‑impact fitness through daily walks around the National Mall, participates in a senior walking club, plays casual tennis at the Capitol Hill community courts in summer,
    and follows the Washington Capitals and Washington Nationals, occasionally attending games with a close friend.
  arts: Stephen Bhandari indulges in classic jazz recordings by Miles Davis and John Coltrane, plays piano pieces ranging from Beethoven’s Moonlight Sonata to simple blues improvisations, reads historical
    nonfiction by Doris Kearns Goodwin, and attends occasional performances at the Kennedy Center.
  travel: Stephen Bhandari’s travel style blends purposeful planning with quiet adventure, favoring historic sites like Colonial Williamsburg, the Gettysburg battlefield, and weekend hikes in Shenandoah
    National Park, while dreaming of a spring visit to Japan’s cherry‑blossom gardens and a literary pilgrimage to the United Kingdom’s historic castles.
  culinary: Stephen Bhandari enjoys cooking fresh garden produce into roasted vegetable medleys, herb‑infused soups, and simple grilled salmon, favors Earl Grey and chamomile tea, and showcases a modest
    cooking skill that shines when pairing home‑grown rosemary and thyme with seasonal dishes.
  core: Stephen Bhandari, a pragmatic yet curious 60‑year‑old home‑health veteran, blends his love for quiet garden retreats, low‑key jazz, disciplined caregiving, meticulous budgeting, and a habit of over‑preparing
    for tomorrow’s tasks.
background:
  cultural: Stephen is a white American whose family has deep roots in the United States, with grandparents who emigrated from Europe in the early 1900s. He grew up in a middle‑class suburb of the Mid‑Atlantic
    region, absorbing values of self‑reliance, community service, and respect for tradition. Living and working in Washington, D.C. has exposed him to a rich tapestry of cultures, fostering an appreciation
    for diversity while maintaining his own cultural heritage.
