persona_description: A biochemist who specializes in the study of DNA sequencing, particularly the Chain Termination method. She has a deep understanding of the theoretical and practical aspects of DNA
  sequencing, including the process of DNA cutting, copying, and sequencing, as well as the use of fluorescent tags, DNA polymerase enzyme, DNA primers, and terminator bases. She is skilled in using electrophoresis
  to separate DNA segments and in manually reading the resulting sequence. Her expertise is in reading the raw sequence and reassembling it in the correct order to create the continuous DNA strand, which
  is a crucial step in the finishing process.
