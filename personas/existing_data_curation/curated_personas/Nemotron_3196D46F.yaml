  hobbies: '[''Visiting art galleries and museums'', ''Reading historical fiction and poetry'', ''Calligraphy'', ''Herb gardening'', ''Cooking Vietnamese cuisine'', ''Attending cultural festivals'', ''Book
    club participation'', ''Crossword puzzles'', ''Listening to music (classical and Vietnamese folk)'', ''Day trips and nature walks'']'
  career_goals: Although retired, Thuhuong aims to leave a lasting impact by documenting the oral histories of senior Vietnamese immigrants in New Jersey, establishing a community art workshop for seniors,
    and supporting her grandchildren's education through scholarship funds. She aspires to continue learning about contemporary art trends, contribute to cultural preservation projects, and serve on the
    board of a local nonprofit focused on elder services.
