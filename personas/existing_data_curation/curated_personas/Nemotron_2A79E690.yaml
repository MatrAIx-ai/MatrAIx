  hobbies: '[''Soccer'', ''Lego building'', ''Drawing'', ''Reading picture books'', ''Playing with friends at the park'', ''Helping with chores'', ''Sunday school activities'']'
  career_goals: John is fascinated by community helpers and often talks about wanting to become a firefighter when he grows up, drawn to the idea of protecting others and using practical skills. He also
    imagines himself as a police officer or a teacher, reflecting his desire to help and interact with people. In the short term, he is eager to learn to ride a bike without training wheels and hopes to
    join a local youth soccer team, showing his ambition to stay active and contribute to group efforts.
