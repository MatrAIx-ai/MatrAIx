personas:
  professional: John Bennett, a budding junior organizer, thrives on arranging crayons in neat rows and directing sandbox building projects, balancing their love of routine with the flexibility to incorporate
    friends’ ideas, while they eagerly join group games and occasionally assert their own vision.
  sports: John Bennett enjoys playing Little League baseball in the spring, kickball with classmates in the fall, and they proudly wear a cap of the New York Yankees while cheering for the New York Knicks
    on TV, balancing energetic playground activity with the disciplined practice of their local soccer club.
  arts: John Bennett delights in drawing Spider‑Man and Mickey Mouse, sings along to Disney’s Frozen soundtrack, and they watch Pixar’s Toy Story movies, often staging impromptu performances for family
    members while proudly displaying a homemade poster of their favorite superhero.
  travel: John Bennett loves family road trips to the beach where they build elaborate sandcastles at Myrtle Beach, cherishes visits to Grandma’s house in the countryside, and they dream of a future adventure
    to Disneyland and the Great Wall of China, preferring itineraries that include familiar routines and plenty of playtime.
  culinary: John Bennett favors creamy mac and cheese with extra cheddar, crispy chicken nuggets, and peanut‑butter‑and‑jelly sandwiches, they enjoy stirring pancake batter (though they often leave a flour
    trail), and they relish sweet strawberries and crunchy carrot sticks at snack time.
  core: John Bennett is a routine‑loving, high‑energy five‑year‑old who thrives on group play, meticulously organizes toys, asserts their ideas when needed, yet they can be stubborn about bedtime and secretly
    hoard goldfish crackers.
background:
  cultural: John was raised in Jasper, Alabama, a close‑knit community in Walker County where Southern traditions and practical values shape daily life. His family participates in typical regional customs
    such as church gatherings, community picnics, and high‑school football events. The local culture emphasizes routine—Sunday worship, school schedules, and family meals—aligned with his preference for
    familiar patterns. Growing up in a predominantly white, working‑middle‑class environment, John has been exposed to Southern hospitality, country music, and a strong sense of neighborly support, all
    of which influence his respectful, cooperative, yet assertive personality.
