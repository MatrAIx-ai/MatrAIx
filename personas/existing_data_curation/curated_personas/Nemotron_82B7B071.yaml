  career_goals: Tommy aspires to advance to a plant manager position where he can shape the overall operational strategy of the facility while championing a culture of safety, continuous improvement, and
    inclusive leadership. He seeks to earn a Six Sigma Black Belt, deepen his expertise in automation, and mentor the next generation of supervisors, particularly those from underrepresented backgrounds.
    Ultimately, he wants to balance career growth with time for his family and community commitments, ensuring his legacy is both professional and cultural.
