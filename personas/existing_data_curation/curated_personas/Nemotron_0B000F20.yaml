personas:
  professional: Architect Kendall Bryant blends parametric modeling in Rhino and Grasshopper with LEED‑accredited sustainable strategies, turning speculative concepts into adaptive‑reuse projects for Baltimore’s
    historic row houses, while their fiercely imaginative mindset fuels competitive design proposals but their relaxed attitude toward deadlines sometimes leads to disorganized schedules.
  sports: Kendall Bryant enjoys low‑impact fitness, regularly attending sunrise yoga sessions at the Inner Harbor, rowing with a local club that supports the Baltimore Ravens, and cheering for the Baltimore
    Orioles during baseball season, while their competitive streak pushes them to set personal performance targets despite occasional schedule inconsistency.
  arts: Kendall Bryant’s artistic life revolves around abstract painting inspired by Yayoi Kusama, experimental photography echoing the work of Diane Arbus, and nightly visits to jazz clubs featuring Miles Davis
    and Kamasi Washington, all of which fuel their speculative fiction reading habit and inform their design narratives.
  travel: Kendall Bryant prefers eclectic, purpose‑driven travel, having explored the vibrant street art of Marrakech, the minimalist design museums of Copenhagen, and the jazz heritage of New Orleans,
    while planning future trips to the sustainable architecture showcase in Reykjavik and a creative residency in Osaka, balancing spontaneity with a modest travel budget.
  culinary: Kendall Bryant experiments with culinary fusion, regularly crafting kimchi‑infused shrimp and grits, harissa‑spiced elk tacos, and homemade miso‑marinated beet salads, showcasing a moderately
    advanced cooking skill set that blends Southern comfort with global flavors.
  core: Kendall Bryant is a 32‑year‑old visionary architect whose boundless imagination, competitive drive, and emotional intensity shape a life of artistic experimentation, flexible work rhythms, and occasional
    budgeting slip‑ups.
background:
  cultural: Kendall was raised in a Black middle‑class family in Baltimore County, where church, community programs, and local art initiatives shaped her worldview. She draws deeply from African‑diasporic
    aesthetics and the rich heritage of historic Black neighborhoods such as Upton and Harlem Park, weaving Afro‑centric patterns, storytelling, and social justice narratives into her architectural work.
    An active member of the Maryland Association of Black Architects, she mentors Black high‑school students in STEM and architecture, participates in cultural festivals, and celebrates her heritage through
    food, music, and community gatherings. This cultural lens informs her design philosophy, emphasizing equity, representation, and a celebration of Black creativity.
attributes:
