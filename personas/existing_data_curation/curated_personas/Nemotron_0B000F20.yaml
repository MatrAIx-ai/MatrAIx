  hobbies: '[''Abstract painting'', ''Experimental photography'', ''Speculative fiction reading'', ''Contemporary art gallery visits'', ''Jazz club outings'', ''Urban sketching'', ''Yoga and mindfulness
    meditation'', ''Journaling for emotional regulation'', ''Community garden volunteering'', ''Culinary experimentation'', ''Improv theater'']'
  career_goals: Kendall aims to launch her own boutique studio within the next three years, dedicated to culturally resonant, sustainable architecture that revitalizes underserved Baltimore neighborhoods.
    She aspires to become a recognized thought leader in Afro‑futurist design, publish a monograph of speculative projects, and win multiple AIA Design Awards for innovative use of technology and social
    equity. Kendall also plans to influence city zoning policy toward community‑led development, integrate generative design and digital fabrication into mainstream practice, and mentor emerging Black architects
    through mentorship programs and university outreach.
