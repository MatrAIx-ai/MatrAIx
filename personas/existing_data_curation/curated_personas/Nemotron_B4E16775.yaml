personas:
  professional: Luis Marcelo, a veteran MRI technologist with mastery of 1.5 T and 3 T scanners, deep anatomical knowledge, and fluency in RIS/PACS, leverages their love of structure and sociable, talkative
    personality to lead training sessions, mentor junior staff, and drive workflow efficiency as they pursue a supervisory role and AI‑assisted imaging initiatives.
  sports: Luis Marcelo fuels their fitness through weekly hikes in the Skylands, occasional pick‑up basketball games, and enthusiastic support of the New York Mets in the spring and New Jersey Devils during
    hockey season, while maintaining a relaxed approach to scheduled gym sessions that sometimes leads to missed workouts.
  arts: Luis Marcelo finds artistic fulfillment dancing salsa to the beats of Celia Cruz and Tito Puente, playing conga drums at community jam nights, and escaping into sci‑fi mysteries by Isaac Asimov
    and Neil Gaiman, all of which shape a vibrant, socially‑driven creative identity.
  travel: Luis Marcelo prefers flexible adventure trips that blend mountain trekking, such as a recent trek through Patagonia’s Torres del Paine, with cultural immersion, like a weekend in Kyoto, while
    planning most journeys on a modest retirement budget and often leaving itineraries open for spontaneous detours.
  culinary: Luis Marcelo, a confident home chef, delights in preparing ropa vieja with slow‑cooked shredded beef, crisp tostones tossed in garlic‑lime mojo, and black‑bean rice seasoned with cumin and cilantro,
    often pairing the meals with a glass of crisp Sauvignon Blanc.
  core: Luis Marcelo merges meticulous MRI expertise with a lively, sociable spirit that fuels salsa nights, impromptu storytelling at Toastmasters, and a tendency to misplace a few tools in the break room.
background:
  cultural: Luis was raised in a Cuban‑American household, where Spanish was spoken daily and Cuban music, food, and family celebrations were central. He continues to honor his heritage by speaking Spanish
    fluently, celebrating festivals like Carnaval de la Habana, and maintaining close ties with the local Cuban community in New Jersey. These cultural roots shape his warm, personable bedside manner and
    his commitment to improving health access for Hispanic patients.
attributes:
  skills: '[''MRI operation (1.5 T & 3 T)'', ''Patient positioning and preparation'', ''Magnetic safety protocols'', ''Contrast agent administration'', ''Anatomical knowledge'', ''Radiology Information
    Systems (RIS) management'', ''PACS workflow optimization'', ''Troubleshooting hardware/software'', ''Quality‑assurance testing and calibration'', ''DICOM networking'', ''Regulatory compliance (HIPAA,
    OSHA, ACR)'', ''Bilingual communication (Spanish/English)'', ''Team training and mentorship'', ''Clinical documentation'', ''Imaging protocol development'']'
  hobbies: '[''Salsa dancing'', ''Cooking Cuban cuisine'', ''Playing conga drums'', ''Participating in Toastmasters'', ''Hiking in the Skylands region'', ''Landscape photography'', ''Mentoring youth in
    STEM'', ''Attending community health fairs'', ''Watching baseball (New York Mets)'', ''Reading sci‑fi and mystery novels'']'
  career_goals: Luis aims to transition into a senior leadership role within the imaging department, such as MRI supervisor or manager, where he can shape workflow efficiency and safety culture. He plans
    to earn an advanced MRI physics certification and pursue the ARRT MRI specialty credential to deepen his technical expertise. Leveraging his sociable nature, Luis wants to become a regular instructor
    for continuing‑education workshops, present at regional radiology conferences, and spearhead the integration of AI‑assisted image analysis tools. Long‑term, he envisions establishing a community outreach
    program that offers free MRI screening information and health education to underserved Hispanic populations in New Jersey.
