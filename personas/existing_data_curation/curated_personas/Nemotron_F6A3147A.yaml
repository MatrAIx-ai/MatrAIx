  hobbies: '["Landscape painting", "Playing mandolin (folk music)", "Literary fiction reading", "Photography", "Gardening", "Hiking", "Community theater volunteering (set design, costumes)", "Visiting museums
    and galleries", "Trivia nights", "Strategic board games"]'
  career_goals: John aspires to become the district curriculum coordinator with a focus on STEAM integration, expanding arts opportunities for students across Seward County. He plans to pursue a master’s
    in Educational Leadership to qualify for a future assistant‑principal role, where he can shape school culture and promote innovative teaching practices. He also aims to secure ongoing grant funding
    for an after‑school arts collective, author a practical guide on integrating visual arts into middle‑school science curricula, and earn district‑wide recognition for his contributions to student engagement
    and achievement.
