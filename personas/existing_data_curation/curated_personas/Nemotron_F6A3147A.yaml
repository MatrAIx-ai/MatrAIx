personas:
  professional: John Johnson, a veteran elementary and middle-school teacher with a graduate degree in education, leverages their expertise in classroom management, data-driven assessment, and STEAM curriculum
    design to champion arts integration and mentor peers, while their natural curiosity and competitive edge fuel a relentless pursuit of grants and a goal to become district curriculum coordinator.
  sports: John Johnson, a casual hiker and avid supporter of the Nebraska Cornhuskers football team, participates in the Seward County Trail Club for seasonal hikes, joins a local recreational softball
    league on weekends, and prefers low-impact cardio such as walking and biking over gym-based workouts, balancing a love of nature with community sports camaraderie.
  arts: John Johnson, a painter of Nebraska plains inspired by Grant Wood and the lyrical folk of Bob Dylan, plays mandolin to traditional tunes, volunteers on set and costume design for community theater
    productions of Shakespeare, regularly visits regional galleries featuring contemporary artists like Kehinde Wiley, and reads literary fiction by authors such as Marilynne Robinson to fuel their creative
    imagination.
  travel: John Johnson prefers road-trip adventures that blend art and nature, often planning weekend getaways to Badlands National Park or the historic town of Deadwood, Montana, while dreaming of a long-term
    cultural immersion at the Uffizi Gallery in Florence, balancing modest retirement savings with a desire for enriching travel experiences.
  culinary: John Johnson favors farm-to-table meals, frequently preparing roasted root-vegetable medleys with heirloom carrots, beets, and rosemary, enjoys baking cornbread with buttermilk and honey, and
    occasionally indulges in a slice of chocolate lava cake from a local bakery, reflecting a moderate cooking skill level and a love for fresh garden produce.
  core: John Johnson is a curiosity-driven educator-artist who balances meticulous planning with spontaneous creativity, yet battles a competitive streak and frequent worry that fuels both their grant-writing
    zeal and occasional over-thinking.
background:
  cultural: John was raised in a close‑knit Great Plains community where agriculture, church life, and school events formed the heart of daily life. His family’s roots trace back to Northern European (German
    and Scandinavian) settlers, fostering an appreciation for folk art, music, and modest, hard‑working values. Midwestern ideals of reliability, community service, and self‑reliance have shaped his worldview,
    while his exposure to local cultural institutions has nurtured a lifelong curiosity about the arts and new ideas. This blend of tradition and openness informs both his teaching philosophy and his personal
    pursuits.
attributes:
  skills: '["Classroom management", "Differentiated instruction", "Curriculum development", "STEAM integration", "Educational technology", "Assessment and data analysis", "Parent‑teacher communication",
