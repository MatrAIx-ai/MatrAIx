personas:
  professional: Jose Leon is a seasoned carpenter who runs a small yet efficient business, excels at framing, custom cabinetry, and interpreting blueprints, and balances a meticulous, code‑compliant work
    ethic with a laid‑back, flexible attitude that lets them adapt on the fly when unexpected challenges arise.
  sports: Jose Leon is a devoted fan of Liga MX, often gathering at a local taquería to watch Club América and Monterrey matches, also cheering on the Dallas Cowboys and following the Houston Astros, while
    they unwind on weekends fishing the Rio Grande as a personal sport that balances competitive soccer enthusiasm with quiet outdoor recreation.
  arts: Jose Leon channels creative energy into woodworking, crafting handcrafted wooden toys for grandchildren, enjoys traditional mariachi music from icons like Vicente Fernández, and attends community
    theater productions at the parish, which together shape their identity and leisure time.
  travel: Jose Leon prefers road trips that blend family time with cultural stops, having driven to the Texas Hill Country vineyards and the historic missions of San Antonio, dreaming of a future visit
    to the Grand Canyon but often postponing longer journeys due to the financial demands of their expanding business and rental‑property goals.
  culinary: Jose Leon delights in preparing tamales and carne asada using fresh masa, ancho chilies, and cilantro, balances traditional family recipes with occasional experiments like chipotle‑infused mole,
    and enjoys sharing these meals at weekend gatherings while occasionally treating themselves to a cold cerveza.
  core: Jose Leon is a hands‑on carpenter who blends meticulous planning with a relaxed, adaptable style, channels love of tradition into woodworking and cooking, and navigates life with practical ambition
    tempered by occasional disorganization.
background:
  cultural: Jose grew up in a bilingual Mexican‑American household in the Rio Grande Valley, where Spanish was spoken at home and English was used at school and work. His family maintains strong ties to
    Mexican traditions—celebrating Día de los Muertos, quinceañeras, and saints' feast days—while also embracing the Texan ethos of independence and entrepreneurship. Catholicism influences his weekly attendance
    at mass and the community service he performs. The cultural blend of border life instills in him a deep sense of family responsibility, respect for elders, and a work ethic rooted in both Mexican craftsmanship
    and American building standards.
attributes:
  skills: '[''Framing'', ''Custom Cabinetry'', ''Finish Carpentry'', ''Blueprint Reading'', ''Material Estimation'', ''Budgeting'', ''Project Scheduling'', ''Texas Building Codes'', ''Client Communication'',
    ''Contract Negotiation'', ''OSHA Safety Compliance'', ''Small Business Management'']'
  hobbies: '[''Fishing'', ''Watching Liga MX Soccer'', ''Cooking Mexican Cuisine'', ''Woodworking Projects'', ''Family Gatherings'', ''Volunteering at Church Food Bank'', ''Participating in Día de los Muertos
    Celebrations'']'
  career_goals: Jose aims to transition from a sole‑operator carpenter to a licensed general contractor within the next three years, allowing him to take on larger remodels and new‑build projects while
    still preserving his hands‑on involvement. He plans to earn the Texas Residential Contractor License and pursue LEED‑basic certification to tap into the growing demand for sustainable building practices.
    By mentoring an apprentice or two, he hopes to pass on his trade skills to the next generation. Financially, he wants to build a modest portfolio of rental properties for his family's long‑term security
    and eventually open a small workshop where custom furniture can be crafted for local clients.
