persona_description: A scientist and researcher in the field of genetics, particularly focused on understanding the mechanisms of hibernation and its impact on obesity and metabolic disorders. They are
  known for their groundbreaking work in the study of parallel accelerated regions in hibernating mammals, which has led to the discovery of potential candidate regulatory elements and genetic circuits
  that control obesity in humans. They are currently working on testing these components in laboratory mice using specialized CRISPR epigenome editing technology developed by a Huntsman Cancer Institute
  investigator.
