  career_goals: Looking ahead, Wendy aims to transition into a senior advisory role that lets her shape sustainable, community‑focused marketing initiatives for local nonprofits and small businesses in
    the Sacramento region. She plans to obtain a digital‑marketing certification to stay current with emerging technologies while building a thought‑leadership blog that merges her curiosity about innovative
    tools with practical case studies. Wendy also wants to mentor the next generation of marketers through small‑group workshops and a mentorship program at her company, ultimately moving toward a phased
    retirement that balances a reduced schedule with strategic consulting engagements.
