  hobbies: '[''Mahjong'', ''Tai Chi'', ''Community gardening'', ''Traditional Chinese cooking'', ''Cultural festival participation'', ''Senior‑center workshops'', ''Listening to Chinese opera and world
    music'', ''Exploring basic digital tools'']'
  career_goals: Although retired from formal employment, Jianping aims to keep contributing to his community by leading volunteer projects that bridge cultural gaps, learning basic digital skills to stay
    connected with family abroad, and documenting his family’s oral history for future generations. He also hopes to travel to his hometown in Guangdong for a reunion and to support his wife in maintaining
    a healthy, active lifestyle together.
