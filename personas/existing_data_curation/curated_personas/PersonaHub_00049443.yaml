persona_description: A researcher and expert on the effects of artificial light at night, with a focus on the dangers and harm it causes to the circadian rhythms of humans, animals, and plants. Prof. Abraham
  Haim coordinates the 21st International Congress of Zoology (ICZ) that was held at the University of Haifa, Israel. He presented studies showing the adverse effects of exposure to light at night, particularly
  short wavelength blue LED, in blind mole rats and seeing rats. He believes that exposure to LED lighting can cause various illnesses and adverse symptoms, and expects to find similar results in human
  exposure. He also pointed out that western youngsters are typically surrounded by this sort of lighting in their own bedroom, from smartphones, computers, and televisions.
