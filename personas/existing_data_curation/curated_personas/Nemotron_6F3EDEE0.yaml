personas:
  professional: Oliver Charlebois, a 35‑year‑old building‑systems professional, blends a methodical, safety‑first approach with a curiosity for smart‑building technologies, and they diagnose and retrofit
    HVAC, electrical, and plumbing systems while strategically pursuing NATE and CMRP certifications and a supervisory role in a Research Triangle facilities‑management firm.
  sports: Oliver Charlebois cheers on the UNC Tar Heels men’s basketball team, follows ACC coverage on ESPN, plays recreational softball with the Durham Green Thumbs league, and they maintain fitness by
    hiking the Eno River Trail and occasional weekend cycling rides with the local bike club.
  arts: Oliver Charlebois channels creativity into acoustic‑guitar performances at local open‑mic nights, they regularly playlist folk‑rock artists such as The Avett Brothers, Mumford & Sons, and Jason
    Mraz, and they attend occasional community theater productions by the North Carolina Shakespeare Company, letting music and stagecraft enrich their evenings after work.
  travel: Oliver Charlebois plans trips with a spreadsheet itinerary, they have explored Asheville’s art districts and the Blue Ridge Parkway, dream of trekking Patagonia’s Torres del Paine, and favor road‑trip
    camping adventures to the Outer Banks and Charleston, SC, balancing budget constraints with a love for nature‑focused getaways.
  culinary: Oliver Charlebois enjoys cooking over a cedar‑plank grill, they often pair fresh‑caught trout with lemon‑dill sauce, love simmering slow‑cooked pulled pork with a Carolina mustard glaze, and
    frequently experiment with basil‑infused homemade pizzas topped with locally sourced mozzarella and heirloom tomatoes.
  core: Oliver Charlebois harmonizes a methodical, eco‑driven career in building systems with solitary hikes, woodcraft, and acoustic‑guitar sessions, and they meticulously budget, wrestle occasional back
    strain, and nurture a vision of a green‑focused maintenance enterprise.
background:
  cultural: Oliver descends from French‑Canadian ancestors, a heritage reflected in family traditions such as holiday gatherings centered around classic French cuisine and a Catholic upbringing. Having
    grown up in the Northeast before moving to Durham, he blends his northern European roots with the warm hospitality and community spirit of the South. He participates in local church events, enjoys Southern
    comfort foods like barbecue and collard greens, and celebrates regional festivals such as the Durham Folklore Society's summer fair. This cultural mosaic informs his values of hard work, family cohesion,
    and community service.
attributes:
  skills: '[''HVAC system installation and maintenance'', ''Electrical wiring and troubleshooting'', ''Plumbing repair and pipe fitting'', ''Building automation and IoT sensor integration'', ''Preventive
    maintenance scheduling'', ''Interpretation of technical blueprints and schematics'', ''Safety compliance (OSHA, EPA) and documentation'', ''Team coordination and mentorship of apprentices'', ''Energy‑efficiency
    retrofits'', ''Use of hand and power tools with precision'']'
  hobbies: '[''Fishing at local lakes and rivers'', ''Hiking in Eno River State Park'', ''Woodworking and furniture making'', ''Playing acoustic guitar'', ''Attending open‑mic nights'', ''Watching ACC basketball
    (Duke, UNC)'', ''Community gardening'', ''Volunteering with Habitat for Humanity'', ''Reading non‑fiction on sustainable engineering'', ''Listening to tech and smart‑building podcasts'']'
  career_goals: Oliver aims to advance to a maintenance supervisor role within the next three years, overseeing a multidisciplinary team at a large facilities‑management firm in the Research Triangle. He
    plans to obtain certifications such as NATE (North American Technician Excellence) and CMRP (Certified Maintenance & Reliability Professional) and to deepen his expertise in smart‑building solutions.
    Long‑term, Oliver envisions launching his own eco‑focused maintenance contracting business that offers green retrofitting and energy‑optimization services to commercial clients throughout North Carolina.
