personas:
  professional: Raymunda Estopinan, a veteran custodial specialist with over twenty years of expertise in building maintenance and OSHA‑compliant cleaning protocols, they leverage their methodical inventory
    management, bilingual communication, and relentless curiosity for sustainable practices to lead teams efficiently while quietly competing for the next supervisory role.
  sports: Raymunda Estopinan enjoys low‑impact fitness through early‑morning jogs along the Mississippi River levee and weekly pickleball matches at the Baton Rouge Community Center, they cheer on the New Orleans
    Saints in the fall and the Pelicans during the NBA season as part of a disciplined yet solitary exercise routine.
  arts: Raymunda Estopinan channels curiosity into watercolor sketches that blend Frida Kahlo’s vibrant folk motifs with the pastel hues of Louisiana marshes, they capture candid street scenes at the Louisiana
    Art & Science Museum, and they curate a personal playlist of boleros by Lucho Gatica alongside zydeco classics from Buckwheat Zydeco while meticulously arranging their home gallery.
  travel: Raymunda Estopinan prefers purposeful solo travel itineraries that balance cultural immersion and artistic inspiration, they embark on weekend trips to Oaxaca’s historic markets, plan a yearly
    pilgrimage to the Musée d’Orsay in Paris, and make frequent drives to New Orleans’ French Quarter to study its vibrant street art.
  culinary: Raymunda Estopinan, an adept home chef, fuses traditional Mexican mole with a Cajun spice blend to create a signature "Mole Étouffée" dish, they hand‑pick basil, oregano, and epazote from their
    herb garden, and they enjoy occasional fine‑dining outings for oyster po’boys while maintaining a meticulous recipe notebook.
  core: Raymunda Estopinan blends a meticulous custodial mindset with a quiet artistic soul, they obsessively catalogue cleaning supplies like a puzzle enthusiast while habitually humming boleros under
    the hum of a vacuum.
background:
  cultural: Raymunda was born in a small town in the state of Jalisco, Mexico, and moved to the United States in her early twenties, first settling in Houston before relocating to Baton Rouge. She retains
    a strong connection to her Mexican heritage, celebrating Día de los Muertos, quinceañeras, and cooking family recipes passed down through generations. Her Catholic faith plays a role in her community
    involvement, often attending services at a local parish with a sizable Latino congregation. Living in Louisiana, she has embraced aspects of Southern culture, such as the friendly neighborhood spirit
    and the region’s rich culinary traditions, which she blends with her Mexican roots. Bilingual and bicultural, Raymunda frequently serves as an informal bridge between Spanish‑speaking residents and
    the broader community, helping neighbors navigate public services and local events.
attributes:
  skills: '[''Commercial cleaning protocols'', ''Floor care and polishing'', ''Restroom sanitation'', ''Chemical safety and OSHA compliance'', ''Inventory management'', ''Scheduling and time‑management'',
    ''Minor repairs (light plumbing, fixture replacement)'', ''Bilingual communication (Spanish/English)'', ''Detailed reporting and documentation'', ''Training and team coordination'']'
  hobbies: '[''Visiting art museums and galleries'', ''Sketching and watercolor painting'', ''Photography of everyday scenes'', ''Reading art history and biographies'', ''Cooking Mexican dishes with Cajun
    influences'', ''Gardening (herbs and flowers)'', ''Solving jigsaw puzzles and crosswords'', ''Listening to Mexican folk music and Cajun zydeco'']'
  career_goals: Raymunda aims to advance from a custodial role to a supervisory position within the next three years, targeting a lead custodian or facilities manager role at a mid‑size institution. She
    plans to earn the ISSA Cleaning Management Institute (CMI) certification and a Green Cleaning Specialist credential to deepen her expertise in sustainable practices. Long‑term, she envisions opening
    a boutique cleaning service that specializes in schools, community centers, and culturally sensitive venues such as museums, where her appreciation for art could translate into meticulous care of exhibition
    spaces. She also hopes to mentor younger custodial staff, particularly those from Spanish‑speaking backgrounds, fostering professional growth within her community.
