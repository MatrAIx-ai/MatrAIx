personas:
  professional: Lynnette Huddleston is a budding organizer who channels their love for structured board games into leading class projects, using their methodical planning, reliability, and natural flair
    for being the center of attention, they coordinate group activities and ensure everyone feels included.
  sports: Lynnette Huddleston is an enthusiastic member of the San Antonio Youth Soccer League's U‑8 Red Dragons, they cheer for the San Antonio Spurs during weekend games, and they participate in school's
    cheerleading practice, balancing organized play with a love for team spirit.
  arts: Lynnette Huddleston thrives on crafting friendship bracelets inspired by the vivid colors of Disney's Moana, sings the school choir's renditions of Let It Go, and practices beginner piano pieces
    from The Nutcracker; they channel their sociable energy into scrapbook pages that celebrate family festivals.
  travel: Lynnette Huddleston prefers family-guided outings, delights in weekend trips to the San Antonio River Walk's festive parades, and they dream of a future adventure to Disney World's Magic Kingdom,
    balancing a love for familiar routines with a budding curiosity for themed destinations.
  culinary: Lynnette Huddleston eagerly assists in preparing Tex‑Mex favorites like chicken tacos, guacamole, and cheese quesadillas, favoring fresh cilantro, black beans, and corn tortillas, while they
    master the art of spreading peanut butter on apple slices for snack time.
  core: Lynnette Huddleston is a socially vibrant, routine‑loving seven‑year‑old who orchestrates play, saves carefully for beloved crafts, manages mild allergies with diligence, and they balance a flair
    for performance with occasional worry‑driven indecision.
background:
  cultural: Lynnette comes from a white, middle‑class family living in San Antonio, Texas. Her upbringing reflects traditional American values with a strong emphasis on routine, practicality, and respect
    for community norms. The family celebrates major holidays such as Thanksgiving, Christmas, and the Fourth of July with familiar customs, and she is exposed to the local Texan culture, including Mexican‑influenced
    cuisine and occasional Spanish words heard in the neighborhood. She attends a public elementary school where diverse cultures intersect, and she participates in community events like the San Antonio
    River Walk festivals. Her family’s background includes Christian Sunday school attendance, reinforcing a sense of kindness, cooperation, and harmony.
