  career_goals: Willie envisions a future where he can blend his love for art with his drive to help others. He aims to pursue a degree in Visual Arts or Community Arts Therapy, hoping to become an art
    therapist or a community program director who uses creative projects to promote mental health and social cohesion. In the short term, he plans to build a portfolio of artwork, secure an internship at
    a local youth arts nonprofit, and develop a small online platform that shares tutorials and inspirational content for his peers.
