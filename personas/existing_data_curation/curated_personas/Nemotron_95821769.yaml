    science'', ''Landscape aesthetic design and artistic pruning'']'
  hobbies: '[''Tree sketching and watercolor painting'', ''Nature photography'', ''Woodworking and small‑scale furniture making'', ''Backyard gardening'', ''Reading books on botany, natural history, and
    Appalachian folklore'', ''Listening to folk and bluegrass music'', ''Volunteer tree‑planting and conservation events'', ''Fishing in local lakes'', ''Exploring Tennessee state and national parks'',
    ''Attending local art and craft fairs'']'
  career_goals: Approaching retirement, William aims to transition from full‑time tree trimming to a part‑time consulting role where he can share his decades of experience with emerging arborists and local
    landowners. He plans to obtain a certified arborist credential to formalize his expertise, develop and lead community workshops on tree health and sustainable pruning, and compile a modest guidebook
    that blends practical tips with his sketch illustrations of local tree species. William also hopes to mentor more apprentices, help preserve the historic trees of the Johnson County landscape, and eventually
    volunteer his time with a regional conservation nonprofit, all while maintaining a flexible schedule that supports his health and reduces stress.
