  hobbies: '[''Reading scientific non-fiction'', ''Model rocketry'', ''DIY electronics'', ''Woodworking'', ''Hiking'', ''Birdwatching'', ''Playing piano'', ''Chess'', ''Puzzle solving'']'
  career_goals: He aims to transition into a leadership role within his school’s STEM department, such as department chair or curriculum coordinator, where he can shape district-wide instructional strategies
    and promote structured, evidence-based learning environments. Over the next five years, he plans to earn a graduate certification in educational leadership, develop a published STEM curriculum guide,
    and expand his impact by leading professional development workshops. His long-term ambition includes influencing state policy on STEM education and potentially consulting for schools seeking to implement
    quiet, focused learning spaces.
