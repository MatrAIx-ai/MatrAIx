personas:
  professional: Michael Bennett, a supply chain analyst specializing in route optimization and inventory analytics, leverages their Lean Six Sigma expertise and methodical, data‑driven mindset to streamline
    distribution networks while competitively benchmarking performance against industry standards.
  sports: Michael Bennett, a regular member of the ‘Midway Cyclists’ club, hikes the Appalachian Trail in the fall, follows the Boston Red Sox and New England Patriots religiously, and follows a disciplined
    weekly routine of interval training on the town’s rail‑trail, treating each workout as another data point to optimize performance.
  arts: Michael Bennett finds creative balance building scale model railroads, listening to folk‑rock artist Sufjan Stevens and the indie band The National while admiring Winslow Homer’s marine paintings,
    and spends Sunday evenings dissecting board‑game strategies as a form of artistic expression.
  travel: Michael Bennett, who plans trips with the precision of a supply‑chain Gantt chart, has trekked to Acadia National Park, spent a weekend in Montreal’s food markets, and dreams of exploring Kyoto’s
    temples, preferring a mix of structured itineraries and spontaneous detours while staying within a modest travel budget.
  culinary: Michael Bennett enjoys cooking New England staples like clam chowder, lobster rolls, and apple pie, while also experimenting with ramen broth and quinoa salads, boasting a solid intermediate
    skill set and a penchant for sourcing fresh, locally‑caught seafood from the weekly farmer’s market.
  core: Michael Bennett is a data‑driven logistics nerd who balances competitive puzzle‑solving with a pragmatic, community‑oriented lifestyle, and they sometimes neglect dental check‑ups for a new board
    game while never skipping a town‑meeting.
background:
  cultural: Michael grew up in a small New England town in Massachusetts, a region with historic ties to early American settlement and a strong emphasis on education and community involvement. His family,
    primarily of English and Irish ancestry, valued self‑reliance, practical problem‑solving, and civic duty, influencing his methodical and reliable nature. Local traditions such as town meetings, seasonal
    fairs, and volunteerism shaped his balanced view of social engagement and personal solitude. While he identifies as white American, his cultural identity is rooted in the New England work ethic, appreciation
    for the natural environment, and a pragmatic outlook fostered by his upbringing.
