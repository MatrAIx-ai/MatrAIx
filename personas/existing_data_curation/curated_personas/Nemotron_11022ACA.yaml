    Nonfiction (Technology, Science)'', ''Woodworking'']'
  career_goals: Michael aims to move from a logistician to a senior supply chain manager within five years, overseeing regional distribution for a mid‑size manufacturing firm. He plans to earn a Master's
    in Supply Chain Management and obtain APICS Certified Supply Chain Professional (CSCP) certification. His long‑term ambition is to lead the integration of AI‑driven forecasting and green logistics practices
    to reduce carbon emissions. He also hopes to mentor junior analysts, build high‑performance teams, and eventually launch a consultancy that helps small businesses optimize their logistics operations.
