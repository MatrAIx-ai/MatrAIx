personas:
  professional: Regina Samson is an aspiring junior scientist who channels their curiosity into LEGO engineering projects and simple science kit experiments, blending practical building skills with imaginative
    problem‑solving while often forgetting to clean up their work area.
  sports: Regina Samson plays forward on the Greenfield United U7 soccer team, attends the Groove Kids Hip‑Hop Dance class twice a week, practices Lionel Messi’s dribbling drills on the backyard field,
    and rallies with family fans cheering for their hometown professional team, the City FC, every weekend.
  arts: Regina Samson loves watching Adventure Time and Pixar’s Toy Story, sketches bright characters in a spiral‑bound sketchbook, creates friendship bracelets inspired by the colors of their favorite
    pop artist Billie Eilish’s music videos, and collects Mo Willems’ picture books for bedtime reading.
  travel: Regina Samson prefers family road trips to nearby state parks where they can collect rocks and explore nature trails, but they dream of a magical vacation to Disneyland and a summer visit to the
    Grand Canyon’s rim, always packing a small backpack with snacks, a sketchpad, and their lucky LEGO minifigure.
  culinary: Regina Samson enjoys cheesy pepperoni pizza, mac and cheese with extra cheddar, and strawberry‑banana smoothies, proudly assists in the kitchen by spreading peanut butter on toast and sprinkling
    cinnamon on oatmeal, while their favorite dish to help bake is chocolate chip cookies with soft centers.
  core: Regina Samson is a boundlessly curious seven‑year‑old who toggles between meticulous LEGO constructions and spontaneous rock collecting, yet frequently loses track of their belongings and worries
    about school assignments, turning stress into energetic dance moves in the living room.
background:
  cultural: Regina grows up in a predominantly white, middle‑class neighborhood of Reading, Pennsylvania, where family and community gatherings are central. Her household celebrates American holidays such
    as Thanksgiving and Fourth of July with traditional meals and local fair outings. She participates in school and church events, which emphasize cooperation, community service, and the value of outdoor
    recreation. The region's blend of suburban life and nearby farmland influences her appreciation for nature, local fairs, and seasonal activities.
