personas:
  professional: Rossana Luna, a business administration graduate targeting entry‑level analyst roles, leverages their bilingual fluency and Excel expertise to turn data into actionable insights while navigating
    office dynamics with a structured yet adaptable mindset that balances their competitive drive with occasional disorganization.
  sports: Rossana Luna enjoys hiking the rolling hills of the East Bay on weekends, follows the Golden State Warriors and Oakland Athletics for their underdog narratives, and participates in a casual community
    soccer league that satisfies their competitive streak while keeping their routine flexible.
  arts: Rossana Luna captures quiet moments on the streets of Hayward and the wildflowers of nearby nature trails with a compact mirrorless camera, curates playlists that bounce between Los Tigres del Norte,
    J Balvin, and traditional Banda, and finds inspiration in the theatrical storytelling of director Guillermo del Toro and the vibrant color palettes of Frida Kahlo.
  travel: Rossana Luna plans trips with a spreadsheet template that lists budget, itinerary, and backup activities, prefers short road trips like a weekend in Big Sur and cultural immersion in Oaxaca, dreams
    of exploring the historic plazas of Granada, Nicaragua, and balances their desire for adventure with their modest student budget.
  culinary: Rossana Luna is an intermediate home cook who repeatedly perfects mole poblano using guajillo and pasilla chiles, masa harina, and dark chocolate, crafts tamales for family gatherings, experiments
    with corn‑based pozole broth, and they enjoy pairing these dishes with fresh cilantro, lime, and a splash of mezcal for depth.
  core: Rossana Luna blends structured ambition with a love for spontaneous creativity, tackling spreadsheets by day, simmering complex sauces by night, and occasionally misplacing their planner while juggling
    competitive gaming and quiet hikes.
background:
  cultural: Rossana grew up in a Mexican‑American household in Hayward, where Spanish was spoken alongside English. Her family maintains strong ties to Mexican traditions, celebrating Día de los Muertos,
    quinceañeras, and holiday meals centered around corn‑based dishes. The blend of her heritage with the diverse Bay Area culture has shaped her identity; she frequently participates in local Mexican cultural
    festivals, volunteers at community centers that offer Spanish‑language tutoring, and incorporates Mexican flavors into her cooking. Her bilingual fluency and cultural pride influence her communication
    style, allowing her to serve as a bridge between her community and broader American society.
attributes:
  skills: '["Bilingual (Spanish/English)", "Microsoft Excel (intermediate)", "Basic bookkeeping", "Financial reporting (entry-level)", "Social media content creation", "Canva graphic design", "HTML/CSS
