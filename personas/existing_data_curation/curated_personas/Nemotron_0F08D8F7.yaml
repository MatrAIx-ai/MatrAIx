  hobbies: '["Traditional Mexican cooking", "Strategy video gaming", "Regional Mexican music listening", "Yoga", "Hiking (Bay Area trails)", "Urban and nature photography", "Reading contemporary fiction",
    "Personal development books", "Volunteer at community cultural events"]'
  career_goals: Rossana aims to transfer her associate’s degree into a Bachelor of Science in Business Administration within the next two years, focusing on finance or marketing. She plans to secure an
    entry‑level analyst or project‑coordinator position at a midsize firm where she can apply her analytical and bilingual skills while learning corporate processes. Concurrently, she is drafting a business
    plan for a small online boutique that sells handcrafted Mexican‑inspired accessories, leveraging her graphic‑design and social‑media experience. Her ambition is to become a recognized contributor in
    both corporate and entrepreneurial settings, earning certifications such as QuickBooks and Google Analytics to strengthen her competitive edge.
