  hobbies: '[''Gardening'', ''Bird watching'', ''Reading historical biographies and classic novels'', ''Crossword puzzles'', ''Playing bridge'', ''Fishing'', ''Woodworking'', ''Genealogy research'', ''Attending
    church and community potlucks'']'
  career_goals: Although retired, Herbert aims to stay engaged and purposeful. He plans to compile a written memoir and a digital archive of his family’s genealogy for future generations. He hopes to mentor
    grandchildren and local teens in practical skills such as woodworking and simple home repairs. He wants to continue volunteering at the senior center, perhaps leading a weekly garden‑care or storytelling
    group. He is also eager to learn more about modern digital tools, like video editing, so he can create short family videos. Maintaining his health through regular walks, gardening, and community activities
    remains a core ambition, as does preserving and sharing the history of his hometown and the surrounding Wabaunsee County.
