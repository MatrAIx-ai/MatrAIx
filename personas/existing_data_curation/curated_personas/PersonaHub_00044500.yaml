persona_description: Tat'yana P. Krivetskaya, an Associate Professor at the Department of Analysis and Audit at Plekhanov Russian University of Economics, and Anna A. Butakova, a Russia-based expert in
  the field of internal control at Ernst and Ypung (CIS)B.V., and Alina R. Ishaeva, an expert in small business management at JSC "Mazar". The article discusses the importance of internal control in the
  management of organizations and the different concepts and examples of internal control in small retail organizations. The authors analyze the current procedures of internal control and the potential
  of internal control in small business management.
