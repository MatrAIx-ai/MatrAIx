    ''Puzzle solving'', ''Attending local history talks'', ''Listening to jazz'']'
  career_goals: Even in retirement, Wesley aims to document his life and the local history of Allegany County in a memoir that he hopes to self‑publish, preserving the stories of the region’s working‑class
    heritage. He plans to organize a series of informal workshops at the community center, teaching basics of woodworking and watercolor painting to seniors and teens, fostering creative exploration. Wesley
    also seeks to experiment with new artistic media, such as digital illustration, and to curate a small exhibit of his work at the local historical society, while continuing to challenge himself through
    senior chess tournaments and puzzle competitions.
