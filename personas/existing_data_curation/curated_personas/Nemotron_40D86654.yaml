personas:
  professional: Wesley Schillage, a 78-year-old retired steel‑mill and railroad worker, now channels his lifelong hands‑on expertise in carpentry, mechanical repair and self‑taught watercolor into leading
    community workshops that blend meticulous, skeptical research with an imaginative, flexible teaching style, even as their relaxed approach to planning sometimes leaves class schedules a bit chaotic.
  sports: Wesley Schillage follows the Baltimore Ravens (NFL) and the Washington Capitals (NHL) with a mix of loyal enthusiasm and critical analysis, participates in the Cumberland Senior Walking Club’s
    weekly three‑mile strolls, competes in the community center’s senior bowling league during winter, and has recently taken up low‑impact pickleball at the local recreation center, preferring activities
    that keep them active without jeopardizing their arthritic knees.
  arts: Wesley Schillage translates the rolling Appalachian ridges into watercolor landscapes inspired by Monet’s pastel hues and the daring spontaneity of Jackson Pollock, while evenings are filled with
    the smooth improvisations of Miles Davis, John Coltrane and contemporary pianist Brad Mehldau, and their occasional community‑newsletter poems echo the concise lyricism of Emily Dickinson.
  travel: Wesley Schillage, who prefers loosely planned road trips that balance scenic drives with quiet afternoons of sketching, has explored the Blue Ridge Parkway, trekked portions of the Great Smoky
    Mountains, visited historic Charleston, South Carolina, and took a memorable cultural tour of Edinburgh, Scotland, while their modest retirement budget fuels a future wish to wander the gardens of Kyoto
    and the coastal cliffs of the Amalfi Coast.
  culinary: Wesley Schillage, an adept yet unpretentious home cook, delights in preparing wildflower honey‑glazed trout, smoked pork shoulder with apple‑infused barbecue sauce, and cornbread topped with
    ramp butter, while their pantry is stocked with local ingredients like ramps, blackberries, sweetgrass and tobacco‑infused pepper, and they occasionally treat themselves to a night of jazz‑accompanied
    dining at the downtown grill.
  core: Wesley Schillage, a 78‑year‑old retired craftsman and restless skeptic, merges a love of abstract watercolor, vintage tools and endless crossword puzzles into a life that balances quiet contemplation
    with a competitive streak that refuses to let retirement dull the mind.
background:
  cultural: Wesley grew up in a post‑World‑War II white, working‑class family in western Maryland, surrounded by the steel‑plant and railroad culture of Cumberland. His upbringing blended the self‑reliant,
    pragmatic ethos of the Appalachian region with a deep appreciation for folk music, storytelling, and local history passed down through his Irish and German immigrant grandparents. Raised in a Methodist
    household, he participated in community services that emphasized personal responsibility and modest skepticism toward authority. The rugged Allegheny landscape, the rise and decline of the coal and
    steel industries, and the tight‑knit neighborhood bonds have shaped his values of independence, resilience, and an enduring curiosity about the wider world.
