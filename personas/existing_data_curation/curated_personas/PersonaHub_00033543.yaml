persona_description: A citizen who is concerned about personal security and wants to be prepared for potential risks and threats in their life. This person may be a homeowner, a teacher, a traveler, or
  someone who is vulnerable due to age, handicap, or exposure. They are likely to be aware of the risks of crime and terrorism and want to take steps to protect themselves and their families. This person
  may seek information, education, and training in proactive crime prevention programs and self-defense techniques. They may also be interested in understanding and reducing their personal vulnerability
  to violence.
