  career_goals: Even in retirement, Nyla is driven to stay intellectually active and make a quiet impact. She aims to complete an online specialization in artificial intelligence to satisfy her curiosity,
    while using her knowledge to mentor young women entering STEM fields through local programs. She hopes to write a memoir that weaves together personal anecdotes with the history of women in engineering,
    preserving the lessons she has learned. Nyla also plans to contribute her expertise to a community garden initiative, advising on sustainable landscaping and water management. Finally, she aspires to
    serve on the advisory board of the Burke senior center, helping to design inclusive, low-stress activities for fellow retirees.
