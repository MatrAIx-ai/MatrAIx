  hobbies: '[''Visiting art museums and galleries'', ''Sketching and watercolor painting'', ''Improv comedy and theater'', ''Hosting game nights and themed parties'', ''Volunteering at animal shelters and
    food banks'', ''Exploring diverse neighborhoods in NYC'', ''Yoga and mindfulness practice'', ''Traveling to cultural festivals'']'
  career_goals: She aspires to turn her love of art, community, and people into a career that bridges creative expression and social impact. In the short term, she plans to complete her associate’s degree,
    volunteer as a program assistant at a local arts nonprofit, and develop a portfolio of community‑driven events. Long‑term, she envisions earning a bachelor’s in arts administration or social work and
    becoming a community arts coordinator or outreach manager, designing inclusive programs that bring diverse neighbors together and foster well‑being. She dreams of leading a nonprofit that offers free
    workshops, pop‑up galleries, and mental‑health‑focused art therapy sessions for under‑served youth in Essex County.
