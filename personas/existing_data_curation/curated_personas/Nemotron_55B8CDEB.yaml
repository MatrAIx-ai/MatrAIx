  career_goals: Skyler aims to transition into a regional managerial role that allows him to mentor emerging leaders and integrate arts‑based initiatives into the corporate culture. He is pursuing professional
    development courses in organizational psychology and strategic management to augment his high‑school education. Ultimately, he hopes to launch a community arts hub in Linn County, providing a collaborative
    space where local businesses and artists can intersect, while maintaining a healthier work‑life balance to mitigate his stress‑prone tendencies.
