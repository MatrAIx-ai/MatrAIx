  hobbies: '["Sketching/drawing", "LEGO building", "Minecraft creative mode", "Reading fantasy/science‑fiction books", "Playing Scratch programming", "Listening to music (reggaeton, salsa)", "Attending
    cultural festivals", "Participating in school art club", "Competitive board games/puzzles"]'
  career_goals: Mario dreams of becoming a multimedia creator who merges his love for art and technology. In the future, he sees himself designing video games, illustrating comic books, or producing interactive
    digital stories that capture imaginative worlds. He aims to win local art contests, showcase his Scratch projects at school fairs, and eventually participate in youth robotics or game‑development competitions.
    Short‑term, he plans to finish his first self‑made animated short, publish a comic strip in the school newspaper, and collaborate with friends on a cooperative Minecraft build that tells a narrative.
