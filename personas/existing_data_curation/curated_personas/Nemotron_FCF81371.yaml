personas:
  professional: Mario Mitchell is an aspiring digital creator who blends hand‑drawn sketches, LEGO architecture, and Scratch programming to craft whimsical virtual worlds, thriving on spontaneous ideas
    while often shying away from rigid project timelines.
  sports: Mario Mitchell is a member of the Eastside Strikers youth soccer club, a keen fan of the local Harbor Hawks baseball team, and enjoys spontaneous pick‑up basketball games after school, preferring
    fast‑paced play over structured drills.
  arts: Mario Mitchell is a dedicated member of the school art club who admires the vibrant colors of Studio Ghibli films, the rhythmic energy of Bad Bunny’s reggaeton beats, the soulful voice of Celia
    Cruz’s salsa classics, and frequently sketches scenes inspired by these influences during weekend cultural festivals.
  travel: Mario Mitchell dreams of exploring the fantasy realms of Disneyland in California and the futuristic streets of Tokyo, preferring spontaneous weekend road trips with family that blend theme‑park
    thrills with opportunities to collect LEGO souvenirs, while keeping a scrapbook of ticket stubs from local beach outings.
  culinary: Mario Mitchell enjoys indulging in cheesy pepperoni pizza slices, mango‑sweet smoothies, and building their own taco bowls with seasoned beef, shredded lettuce, and salsa, but their cooking
    skill is limited to assembling ready‑made meals and occasional microwaved popcorn.
  core: Mario Mitchell is an endlessly imaginative 10‑year‑old who builds elaborate LEGO kingdoms, sketches fantastical characters, competes fiercely in board‑game tournaments, yet often battles disorganization
    and forgets to hydrate.
background:
  cultural: Mario’s cultural identity blends his Puerto Rican heritage with life in Old Saybrook, Connecticut. At home, Spanish and English flow interchangeably, and family gatherings celebrate traditions
    such as Navidad, Día de los Reyes, and Puerto Rican festivals with foods like arroz con gandules and alcapurrias. He frequently attends local Latin music and dance events, and his parents keep ties
    to Puerto Rico through video calls and visits. The coastal scenery of Old Saybrook inspires his artwork, intertwining island colors and rhythms with New England tides. This bicultural environment fuels
    his creative expression, giving his drawings vivid palettes and narratives that reflect both island community spirit and coastal New England life.
