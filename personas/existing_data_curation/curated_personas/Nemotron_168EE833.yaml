  hobbies: '[''community center volunteering'', ''organizing group activities'', ''classic rock concerts'', ''fishing'', ''woodworking'', ''cooking Italian cuisine'', ''walking historic neighborhoods'']'
  career_goals: John aims to transition into a supervisory role within the next two years, seeking a shift supervisor position where he can apply his organizational strengths and hands‑on expertise to lead
    a team. He also hopes to become a mentor for younger workers, sharing his practical knowledge while maintaining the familiar routines he values. Long‑term, he envisions contributing to continuous‑improvement
    projects that streamline production processes at his plant, and eventually retiring with a reputation as a reliable, respected mentor in the manufacturing community.
