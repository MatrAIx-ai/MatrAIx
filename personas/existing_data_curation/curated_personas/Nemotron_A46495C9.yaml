  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting and calligraphy'', ''Reading fiction and philosophy'', ''Journaling'', ''Classical piano listening'', ''Herb gardening'', ''Culinary
    experimentation with Asian-Western fusion'', ''Meditation'']'
  career_goals: She aims to transition from her current managerial role into a senior executive position, such as Vice President of Operations or Chief Operating Officer, where she can drive organization-wide
    transformation and embed sustainability initiatives. Over the next five years, she plans to spearhead a company-wide digital transformation program, mentor the next generation of women leaders, and
    eventually launch a boutique consulting firm that helps mid-size firms improve efficiency and incorporate creative, art-inspired thinking into corporate strategy. She also aspires to earn a certification
    in executive coaching to broaden her impact.
