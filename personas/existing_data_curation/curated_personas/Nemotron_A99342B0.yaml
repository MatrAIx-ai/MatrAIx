  hobbies: '[''Beach photography'', ''Sketchbook drawing'', ''Visiting art galleries'', ''Reading design theory books'', ''Yoga and meditation'', ''Baking and experimenting with recipes'', ''Kayaking'',
    ''Volunteering at community art workshops'', ''Exploring vintage stores for inspiration'', ''Listening to indie music and podcasts'']'
  career_goals: Jane aims to transition from a staff designer to a senior art director within the next three years, focusing on projects that blend commercial impact with socially responsible messaging.
    She envisions launching her own boutique design studio that serves local small businesses and nonprofit arts initiatives in Cape May County, allowing her to exercise creative autonomy while maintaining
    a stable income to ease her natural worry about financial security. Long‑term, she hopes to mentor emerging designers through workshops and community programs, fostering a collaborative environment
    where unconventional ideas are welcomed.
