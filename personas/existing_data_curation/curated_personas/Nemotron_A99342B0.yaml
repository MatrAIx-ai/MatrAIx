personas:
  professional: Jane Cornejo is a self‑taught graphic designer who blends meticulous project management with a restless curiosity, leveraging Adobe Creative Cloud, Sketch and Figma to craft brand identities
    that feel both polished and experimental, and they assertively champion socially responsible visuals while quietly wrestling with the stress of tight deadlines.
  sports: Jane Cornejo enjoys paddle‑boarding at sunrise during the summer, joins a local adult kayaking club that meets on the bay, and cheers for the Philadelphia Eagles football team and the Philadelphia
    76ers basketball team, balancing a laid‑back fitness routine with the occasional high‑energy beach volleyball league.
  arts: Jane Cornejo spends weekends sketching boardwalk murals, curating playlists that feature indie folk artists like Fleet Foxes and local acoustic guitarist Sam Corbett, and attends experimental theater
    productions starring Meryl Streep and Beyoncé, letting these creative encounters fuel their design work and community workshops.
  travel: Jane Cornejo plans trips with a mix of meticulous itineraries and spontaneous detours, having already explored the historic streets of Savannah, the artisan markets of Cartagena, and dreaming
    of a sunrise kayak adventure in the Azores, all while budgeting carefully to maintain a financial safety net.
  culinary: Jane Cornejo loves baking sourdough bread and lemon‑blueberry muffins, often adding locally sourced honey and sea salt for texture, and they relish a dinner of grilled shrimp tacos with cilantro‑lime
    salsa, avocado, and a splash of house‑made tartar sauce, while their cooking skill hovers between enthusiastic amateur and meticulous perfectionist.
  core: Jane Cornejo is a creatively driven, anxiety‑prone designer who balances meticulous project planning with spontaneous art‑making, often overindulging in vintage record hunts and late‑night coffee
    to fuel their restless curiosity.
background:
  cultural: Jane grew up in a predominantly white, middle‑class family in the Mid‑Atlantic coastal region. Her ancestry includes Irish and Italian roots, reflected in family gatherings that feature traditional
    holiday meals and storytelling. Living in Ocean City, she has been shaped by the town’s seasonal rhythm—boardwalk festivities, Fourth of July fireworks, and a close‑knit arts community that celebrates
    local painters, musicians, and craftspeople. While her surname hints at Hispanic heritage, the family identifies culturally with broader American coastal traditions, and Jane often participates in community
    events such as beach clean‑ups, summer art fairs, and local theater productions, which reinforce her appreciation for diverse creative expression.
