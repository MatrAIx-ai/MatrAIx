personas:
  professional: Saleh Churaman is an aspiring robotics enthusiast, applying methodical problem‑solving and organized project planning to build competition‑ready robots for his middle school club, while
    their sociable nature makes them a natural team coordinator.
  sports: Saleh Churaman plays midfield for the Riverside Middle School Tigers, trains twice weekly with the community youth club Eagles FC, follows professional soccer passionately—especially Manchester
    United and the local MLS side Seattle Sounders—and maintains a disciplined fitness routine that blends sprint drills and yoga for flexibility.
  arts: Saleh Churaman practices acoustic guitar, often covering songs by Ed Sheeran and The Beatles at community festivals, devours sci‑fi novels from Isaac Asimov and N.K. Jemisin, and watches indie films
    starring Timothée Chalamet, which together fuel their creative expression.
  travel: Saleh Churaman prefers structured weekend getaways, having explored the Grand Canyon on a school field trip and the historic streets of Kyoto during a family vacation, and dreams of attending
    the International Youth Robotics Expo in Berlin, balancing a modest travel budget with a desire for cultural immersion.
  culinary: Saleh Churaman enjoys cooking family biryani and masala chicken at home, experimenting with spices like cumin and cardamom, while also mastering homemade pizza dough and ramen broth, showcasing
    an intermediate cooking skill that blends heritage flavors with global cuisines.
  core: Saleh Churaman is a methodical, sociable teen who balances robotics tinkering, soccer energy, and kitchen experiments with a calm, structured outlook and occasional video‑game splurges.
background:
  cultural: Saleh comes from a South Asian family that immigrated to the United States from India. At home, he speaks both English and Hindi, and his household celebrates festivals such as Diwali, Holi,
    and Eid al‑Fitr, blending these traditions with typical American holidays like Thanksgiving and the Fourth of July. His parents emphasize education, respect, and community involvement—values that manifest
    in his organized approach to schoolwork and his participation in local cultural events. Growing up in Frisco, Texas—a diverse suburban environment—has given him exposure to a multicultural community
    while maintaining strong ties to his ancestral heritage.
