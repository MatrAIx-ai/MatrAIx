personas:
  professional: Stephanie Rosenboom is a meticulous life and physical science technician who designs and runs complex experiments, guarantees rigorous data quality, and channels their curiosity into adopting
    emerging analytical techniques while maintaining the methodical planning and reliability instilled by their community-oriented upbringing.
  sports: Stephanie Rosenboom is an avid member of the Chicago Trailblazers Hiking Club; they tackle the Illinois Prairie Path on weekends, follow the Chicago Cubs and Chicago Bears with unwavering loyalty,
    join a co-ed softball league every summer, and practice yoga twice a week to maintain flexibility, all while balancing a moderate competitive streak with a supportive team spirit.
  arts: Stephanie Rosenboom channels creative energy into pottery, nature photography, and devouring science-fiction; they often cite the visual mastery of Ansel Adams, the narrative depth of Margaret Atwood,
    and the melodic subtlety of Sufjan Stevens as inspirations, while regularly attending exhibitions at the Museum of Contemporary Art Chicago to spark fresh ideas.
  travel: Stephanie Rosenboom prefers meticulously planned road trips that weave together Saturday hikes in the Shawnee National Forest, a culinary weekend in Portland's food cart pods, and a nostalgic
    family visit to a historic Pennsylvania town; they day-dream about a future research expedition to the Galapagos Islands to study endemic wildlife.
  culinary: Stephanie Rosenboom enjoys seasonal Midwestern cooking; they frequently prepare roasted beet and goat-cheese salad, braised short ribs flavored with juniper berries, and a wild-mushroom risotto
    that showcases locally foraged chanterelles, using heirloom tomatoes, fresh thyme, and a splash of apple cider vinegar to highlight flavors, while occasionally indulging in a midnight slice of deep-dish
    pizza as a guilty pleasure.
  core: Stephanie Rosenboom blends lab precision with a love for hiking and pottery, meticulously schedules every project and garden task, yet they often forget to water their potted succulents while obsessively
    checking data trends on a coffee-break timer.
background:
  cultural: Stephanie grew up in a middle‑class, predominantly white suburban community in the Chicago metropolitan area. Her family’s roots trace back to German and Irish immigrants who settled in the
    Midwest, instilling values of hard work, education, and community involvement. While not deeply religious, she was raised attending a non‑denominational Christian church on holidays, reflecting a modest,
    values‑oriented upbringing. Her cultural environment emphasized practical problem‑solving, respect for order, and a curiosity about the natural world, shaping her balanced approach to both personal
    and professional life.
attributes:
  skills: '["Laboratory Techniques (PCR, chromatography, microscopy)", "Data Collection and Statistical Analysis (R, Python)", "Quality Control and Compliance (GLP, OSHA)", "Instrument Calibration and Maintenance
    (spectrometers, flow cytometers)", "Field Sampling (water, soil, air)", "Scientific Documentation and Reporting", "Project Coordination and Budget Management", "Training and Mentorship"]'
  hobbies: '["Hiking", "Gardening (native plants)", "Cooking (seasonal recipes)", "Reading (science‑fiction, popular science)", "Volunteering at science museum", "Pottery", "Nature photography"]'
  career_goals: Stephanie aims to advance to a senior laboratory manager role within the next five years, overseeing interdisciplinary research projects that address environmental health challenges. She
    plans to obtain certification as a Clinical Laboratory Scientist and pursue a master’s degree in public health to broaden her impact. Long‑term, she hopes to lead a community‑focused research program
    that integrates scientific discovery with public outreach, balancing innovative inquiry with practical implementation.
