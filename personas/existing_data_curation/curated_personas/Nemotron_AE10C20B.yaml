  career_goals: Mateo aims to finish high school with strong academic performance, especially in math, science, and computer science, and to earn a place in a competitive engineering program at a Texas
    university. He plans to study civil engineering or computer science, with a long‑term ambition to become a project manager who designs infrastructure or technology solutions that improve the lives of
    his Puerto‑Rican and broader Latino community. He also hopes to continue playing soccer at the varsity level in college and perhaps earn a coaching certificate to mentor younger players. In the meantime,
    he intends to deepen his coding skills, participate in robotics competitions, and develop leadership experience through student government or community service.
