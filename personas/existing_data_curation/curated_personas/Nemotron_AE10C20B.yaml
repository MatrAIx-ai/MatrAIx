personas:
  professional: Mateo Sandoval, a 14‑year‑old aspiring robotics programmer, merges his love for structured problem‑solving with his knack for teamwork, leading his school's robotics club while teaching
    basic Python to peers and organizing cultural tech‑workshops at the community center, and they thrive on the predictable rhythm of code and collaboration.
  sports: Mateo Sandoval plays midfield for the Burleson Youth Soccer Club, idolizes FC Dallas and studies the tactical play of Manchester City, cheers on the Dallas Cowboys on Sundays and the Dallas Mavericks
    during basketball season, and they follow a disciplined weekly fitness routine that blends sprint drills with community‑run yoga sessions.
  arts: Mateo Sandoval strums acoustic renditions of Juan Luis Guerra’s Bachata en Fukuoka and Bad Bunny’s Mía, dances salsa to Celia Cruz at family festas, and they spend evenings devouring adventure novels
    by Veronica Roth and sci‑fi classics by Isaac Asimov while watching the documentary series Cosmos and Engineering Marvels, letting these artistic influences shape their creative outlook.
  travel: Mateo Sandoval dreams of returning to the coastal hometown that hosts the vibrant Three Kings Day celebrations, has already explored the historic streets of Mexico City during a school field trip,
    loves weekend road trips to Big Bend National Park and the bustling music scene of New Orleans, and they plan each journey on a meticulously crafted spreadsheet that balances adventure with limited
    teen travel funds.
  culinary: Mateo Sandoval enjoys cooking arroz con gandules with homemade sofrito, hand‑folded empanadillas stuffed with seasoned ground pork, silky tembleque topped with cinnamon, also masters Tex‑Mex
    staples like carne asada tacos with fresh cilantro and lime, and they rate themselves as an intermediate chef who sometimes over‑salts the rice but loves the aroma of simmering beans on weekend mornings.
  core: Mateo Sandoval blends a meticulous, schedule‑driven mindset with an outgoing love for soccer, robotics, and family cooking, yet secretly battles a habit of sneaking extra game time after homework,
    and they insist on a perfect spreadsheet before any indulgence.
background:
  cultural: Mateo’s cultural identity is rooted in his Puerto Rican heritage, passed down by his parents who immigrated to Texas. He is fluent in both Spanish and English and grows up listening to reggaetón,
    salsa, and traditional Puerto Rican folk music. Family gatherings often feature traditional dishes such as arroz con gandules, pernil, and tembleque, and celebrations like Día de los Reyes (Three Kings
    Day) and Puerto Rico’s Festival de la Calle San Sebastián are observed when possible. Living in Burleson, Texas, he also embraces Southern and Hispanic influences of the region, attending local festivals,
    enjoying Tex‑Mex cuisine, and participating in community events that blend his island roots with the cultural mosaic of the Dallas‑Fort Worth metroplex. He values community solidarity, respects elders,
    and seeks to share his heritage by teaching Spanish phrases to classmates and volunteering at Latino cultural centers.
