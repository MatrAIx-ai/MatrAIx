  hobbies: '[''Soccer (midfield)'', ''Acoustic guitar'', ''Salsa and merengue dancing'', ''Cooking Puerto Rican dishes'', ''LEGO robotics building'', ''Python coding projects'', ''Cooperative video gaming'',
