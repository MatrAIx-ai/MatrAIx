  career_goals: Approaching retirement, Alton aims to transition into a part‑time mentorship role where he can pass his practical knowledge to emerging production staff. He hopes to become a safety trainer
    for his plant and to consult on process‑improvement projects for small manufacturers in the Ogden area. On the personal side, he plans to start a modest woodworking side business, using his hands‑on
    skills to create custom furniture for neighbors, while continuing his volunteer work at the local food bank.
