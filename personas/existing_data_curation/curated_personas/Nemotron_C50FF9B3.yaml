personas:
  professional: Alton Keegan, a veteran manufacturing specialist with decades of CNC lathe and lean‑process expertise, blends practical problem‑solving with a curious openness to new methods as they transition
    to a part‑time mentorship and safety training role while launching a modest woodworking side business.
  sports: Alton Keegan follows the Utah Jazz and Real Salt Lake with avid enthusiasm, enjoys lightweight fishing tournaments on the nearby reservoir, hikes the Wasatch foothills for cardio, and participates
    in the local senior bowling league, balancing occasional spectator loyalty with low‑impact personal activity.
  arts: Alton Keegan nurtures a love for hands‑on creativity, spending evenings restoring vintage tools, building model‑train layouts for the museum exhibit, and indulging in the folk music of Johnny Cash
    and the landscapes of Andy Goldsworthy, while they attend community theater productions of classic plays and swap stories at senior storytelling sessions.
  travel: Alton Keegan prefers thoughtfully planned road trips to natural wonders like Arches and Yellowstone, cherishes weekend getaways to small mountain towns in Colorado, dreams of exploring Banff's
    turquoise lakes, and balances travel aspirations with a modest budget and a desire for quiet, solitary hikes.
  culinary: Alton Keegan delights in farm‑to‑table meals, often cooking grilled trout caught from the reservoir, simmering a hearty vegetable chili with garden tomatoes, rosemary, and cumin, baking crusty
    sourdough bread in a cast‑iron Dutch oven, and savoring a slice of apple pie made with orchard apples.
  core: Alton Keegan mixes disciplined craftsmanship with a curious heart, habitually juggling precise CNC work and spontaneous woodworking projects, while they occasionally neglect to file tax paperwork
    until the last minute.
background:
  cultural: Alton grew up in the Intermountain West, a region shaped by pioneer heritage, a strong ethic of self‑reliance, and a close‑knit community spirit. As a white American from Utah, his upbringing
    was influenced by the values of hard work, modesty, and respect for nature that are common in many Mormon‑and‑non‑Mormon families alike. Although he is currently separated, he maintains ties to local
    civic organizations, church‑based outreach programs, and neighborhood gatherings, which reinforce his commitment to cooperation and helping others.
