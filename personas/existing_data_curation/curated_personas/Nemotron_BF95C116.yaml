personas:
  professional: Donel Leon is a versatile metal fabricator and budding industrial designer who merges hands‑on welding expertise with digital illustration, leveraging bilingual communication and empathy
    to mediate teams and deliver custom prototypes.
  sports: Donel Leon enjoys weekend hikes in the Cascades, plays casual basketball at the local community league, follows the Seattle Seahawks, and blends a laid‑back approach to fitness with occasional
    strength‑training at a makerspace gym.
  arts: Donel Leon spends evenings painting watercolor vistas of vineyards, snapping black‑and‑white photos of rolling hills, strumming acoustic renditions of classic rock staples like Led Zeppelin and
    folk ballads from their heritage, while finding inspiration in the works of Frida Kahlo and the digital surrealism of Beeple.
  travel: Donel Leon prefers spontaneous road trips that blend nature and culture, having journeyed through the vineyards of Napa Valley, the historic streets of Oaxaca, and the misty forests of the Pacific
    Northwest, while dreaming of a future solo trek across the deserts of Arizona to photograph the night sky.
  culinary: Donel Leon delights in cooking homemade tamales and mole with a smoky chipotle twist, frequently experimenting with fresh corn masa, roasted poblano peppers, and cilantro, while mastering the
    perfect crema for guacamole and occasionally fusing these flavors with classic Italian pasta.
  core: Donel Leon channels boundless imagination into hands‑on metal art, yet their relaxed approach to deadlines and occasional over‑worry can leave projects in a creative whirlwind of unfinished sketches
    and half‑filled coffee mugs.
background:
  cultural: Donel is a first‑generation Mexican‑American whose family migrated to the Pacific Northwest before his birth. He grew up in a bilingual household where Spanish was spoken at home and English
    at school, giving him a deep appreciation for both cultures. Family gatherings feature traditional foods like tamales and pozole, and he participates in community celebrations of Día de los Muertos
    and Mexican Independence Day in the nearby Hispanic community. These cultural roots influence his love for rich flavors, vibrant music, and a communal spirit, while also shaping his emphasis on harmony
    and consideration for others.
attributes:
  skills: '[''Metal welding'', ''CNC machining'', ''Blueprint reading'', ''Mechanical troubleshooting'', ''Digital illustration'', ''Basic electronics prototyping'', ''Bilingual communication (Spanish/English)'',
    ''Team collaboration'', ''Empathy and conflict resolution'', ''Creative problem solving'']'
  hobbies: '[''Sketching and watercolor painting'', ''Digital art and illustration'', ''Nature photography'', ''Cooking Mexican cuisine'', ''Acoustic guitar playing'', ''Hiking in Yakima County'', ''Building
    scale model kits'', ''Arduino and microcontroller tinkering'', ''Reading science‑fiction novels'', ''Attending local art fairs and maker events'']'
  career_goals: Donel aspires to channel his imaginative drive into a role that merges fabrication with design. He plans to earn a certification in industrial design or product development, and eventually
    launch a small studio that creates custom metal art and functional prototypes for local makers and small businesses. While he values creative freedom, he also seeks a more predictable schedule and supportive
    environment that can help reduce his stress and provide a healthier work‑life balance.
