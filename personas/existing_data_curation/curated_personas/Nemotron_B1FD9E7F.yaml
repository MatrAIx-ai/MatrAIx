personas:
  professional: Tina Larson, a retired community arts facilitator, merges her extensive experience in watercolor, mixed‑media, quilting, and photography with an organized yet flexible approach, using their
    calm resilience and competitive drive to secure grants and build a sustainable art hub for Bowerston.
  sports: Tina Larson enjoys low‑impact fitness through weekly walks with the Bowerston Senior Walking Club, follows the Cleveland Guardians and the Ohio State Buckeyes passionately, and occasionally participates
    in local pickleball matches where their competitive spirit adds a lively edge to otherwise leisurely activity.
  arts: Tina Larson channels their curiosity into watercolor landscapes echoing Monet, mixed‑media pieces inspired by Georgia O'Keeffe, and quilts that weave Bob Dylan’s folk storytelling, while also volunteering
    backstage for community theater productions of Arthur Miller, blending visual art with performance.
  travel: Tina Larson prefers thoughtfully planned cultural trips such as a weekend at the Mississippi folk art festival and a summer study of Renaissance frescoes in Tuscany, yet most journeys stay within
    the Mid‑Atlantic and Midwest—including visits to Amish country and the Hocking Hills—balancing adventure with budget constraints.
  culinary: Tina Larson delights in preparing heirloom tomato caprese salads, slow‑roasted root‑vegetable stews, and lavender‑infused shortbread, displaying a proficient home‑cooking skill set while occasionally
    treating their volunteer team to extra pastries from the local bakery as a sweet indulgence.
  core: Tina Larson is a calm, curious 67‑year‑old community arts leader who blends meticulous organization with a competitive spark, enjoys low‑impact fitness, savors garden‑fresh cuisine, and navigates
    finances with cautious optimism.
background:
  cultural: Tina grew up in a small Midwestern town in Ohio, shaped by the region’s emphasis on community, self‑reliance, and modest hospitality. Her family’s heritage includes German and Irish ancestry,
    which she honors through traditional crafts and recipes passed down through generations. A lifelong member of a local Protestant congregation, she has been involved in church‑based outreach and seasonal
    fairs that celebrate regional agriculture and folk art. The cultural fabric of Carroll County—its county fairs, high school productions, and close‑knit neighborly networks—has fostered Tina’s appreciation
    for collective creativity while also nurturing her independent, curious spirit.
