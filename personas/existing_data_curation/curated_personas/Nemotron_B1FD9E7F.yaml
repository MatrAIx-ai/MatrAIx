  hobbies: '["Watercolor painting", "Mixed‑media art", "Crocheting", "Quilting", "Gardening (heirloom tomatoes, native wildflowers)", "Digital photography", "Book club participation", "Senior center art
    therapy volunteering", "Community theater attendance and backstage work", "Visiting museums and folk art festivals", "Genealogical research"]'
  career_goals: Although retired from formal employment, Tina aims to create a sustainable community art hub in Bowerston that offers regular workshops, exhibition space, and mentorship for emerging local
    artists. She plans to serve on the board of the county historical society to integrate arts into heritage preservation projects. Tina also aspires to obtain a small grant to fund a traveling senior‑arts
    program that brings art classes to neighboring rural towns. On a personal level, she intends to complete a series of digital photography courses at the regional community college and eventually compile
    a memoir that intertwines her family’s genealogical discoveries with the cultural evolution of Carroll County.
