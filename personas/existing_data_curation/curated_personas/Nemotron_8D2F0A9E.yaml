  career_goals: Elaine aims to transition into a supervisory role where she can design and implement efficient cleaning workflows for a property‑management firm that services vacation rentals in the Santa
    Cruz area. She plans to earn a Green Cleaning certification and eventually launch her own boutique cleaning service focused on sustainable practices and reliable, structured service delivery. Long‑term,
    she hopes to mentor a team of cleaners, establishing a reputation for dependable, high‑quality housekeeping while maintaining a stable work‑life balance for her family.
