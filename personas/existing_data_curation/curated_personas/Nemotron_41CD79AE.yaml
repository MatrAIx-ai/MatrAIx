personas:
  professional: An experienced acute‑care nurse with over twenty years at the bedside, Carolina Reyes blends bilingual communication and advanced wound‑care expertise with a curiosity for art‑based interventions;
    they mentor new staff, lead interdisciplinary rounds, design culturally responsive health education, and aim to transition into a nurse‑manager role to launch community health programs in the Texas
    Hill Country.
  sports: An avid hiker who explores the rolling trails of the Texas Hill Country, Carolina Reyes follows the San Antonio Spurs and Austin FC, participates in the Hill Country Trail Riders club, and they
    supplement outdoor walks with weekend yoga sessions to maintain flexibility.
  arts: A dedicated visual artist, Carolina Reyes spends evenings painting acrylic canvases inspired by folk art’s vivid palettes, attends a weekly pottery circle, captures candid moments with a vintage
    Nikon camera, and they find creative resonance in the works of Georgia O’Keeffe, Ansel Adams, and bold contemporary muralists, while sharing art‑therapy techniques at community health fairs.
  travel: Preferring relaxed, long‑weekend road trips over rigid itineraries, Carolina Reyes explores nearby hill‑country towns like Fredericksburg and Wimberley, dreams of wandering Kyoto’s ceramics districts
    and strolling Barcelona’s La Rambla, and they have already visited New Mexico’s desert towns for artistic inspiration.
  culinary: An adventurous home chef, Carolina Reyes experiments with Mexican‑fusion flavors by combining chipotle‑marinated brisket with heirloom tomatoes and cactus paddles in tacos, enriches dishes with
    fresh cilantro, lime, and smoked paprika, and they balance their intermediate culinary skill with occasional indulgent take‑out nights featuring gourmet pizza.
  core: Carolina Reyes is a curious, art‑infused nurse‑leader who balances a passion for painting, hiking, and community health with a laid‑back budgeting style, occasional health‑check lapses, and a penchant
    for spontaneous culinary experiments, and they constantly seek ways to blend creativity with care.
background:
  cultural: Carolina was raised in a bicultural Mexican‑American household in central Texas, where family gatherings, Día de los Muertos celebrations, and the aromas of mole and tamales shaped her identity.
    Fluent in Spanish, she maintains close ties with extended relatives and often incorporates Mexican folk motifs into her artistic projects. The values of 'familismo' and community service guide her compassionate
    nursing style, driving her commitment to improve health outcomes for underserved Hispanic populations. Living in Spring Branch, she navigates a blend of Mexican heritage and Texan culture, which informs
    her approach to patient care, community outreach, and her reverence for both traditional and contemporary artistic expressions.
attributes:
  skills: '["Bilingual patient communication (English/Spanish)", "Acute care nursing", "Wound care management", "Community health outreach", "Patient education and counseling", "Electronic health record
    (EHR) proficiency", "Evidence‑based practice implementation", "Holistic care integration (including art therapy)", "Interdisciplinary teamwork", "Mentoring nursing students", "Crisis triaging", "Cultural
    competency in healthcare"]'
  hobbies: '["Painting (acrylic)", "Pottery", "Cooking (Mexican‑fusion recipes)", "Herb gardening", "Hiking in Texas Hill Country", "Reading historical fiction", "Photography", "Journaling", "Small book
    club meetings", "Volunteering at community health fairs", "Exploring art‑therapy techniques", "Listening to Latin jazz"]'
  career_goals: Carolina aims to transition into a nurse‑manager or care‑coordinator role within the next three years, with a focus on building community health programs that address the unique needs of
    Mexican‑American families in the Texas Hill Country. She plans to enroll in a Master’s program in Nursing Administration or Healthcare Leadership to deepen her leadership skills. Parallel to her professional
    advancement, Carolina hopes to launch a pilot art‑therapy workshop for patients dealing with chronic pain, merging her nursing expertise with her love of visual arts. She values a flexible schedule
    that allows her to continue personal growth, maintain her creative pursuits, and support her family responsibilities after her separation.
