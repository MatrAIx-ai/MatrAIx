  career_goals: Kiera aims to shift from a frontline sales role to a mentorship and advisory position within the next two years. She hopes to lead a small team of sales representatives, develop training
    workshops on ethical negotiation and customer service, and serve as a consultant for local manufacturing startups to help them establish effective distribution channels. On a personal level, she seeks
    to secure a comfortable retirement for herself and her grandchildren by building a modest investment portfolio and contributing to community scholarship programs.
