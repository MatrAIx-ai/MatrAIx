  hobbies: '[''Sketching and painting'', ''Visiting art galleries and street murals'', ''Hip‑hop and salsa dancing'', ''Attending live music concerts'', ''Beach volleyball'', ''Fitness boot camps'', ''Yoga
    and journaling'', ''Reading about technology and sustainable packaging'', ''Volunteering at youth arts programs'', ''Exploring diverse cuisines'', ''Participating in community cultural festivals'']'
  career_goals: Rosel aims to advance to a lead operator or production supervisor position within the next three to five years, overseeing a team and driving efficiency improvements on the line. She plans
    to earn certifications in industrial maintenance and packaging technology, and eventually complete an associate degree in manufacturing technology or supply chain management. Long‑term, she envisions
    a role in sustainable packaging design or research & development, where she can combine her technical expertise with her passion for creative, eco‑friendly solutions. She also hopes to champion mental‑health
    awareness and stress‑reduction programs for her coworkers.
