persona_description: An organist who is aware of the benefits of using toes only technique for early music and is still using heel technique despite knowing that it is outdated. They are also familiar with
  finger substitution for Baroque music and are aware of its historical context. They have a personal experience of learning the right way and the difficulties of adapting to the new technique. They are
  open to learning powerful techniques and are interested in improving their organ playing. They appreciate the importance of having a higher chair and the convenience of having paper manuals and pedals
  at home.
