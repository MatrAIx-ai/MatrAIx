  career_goals: Although only five, Lisa dreams of growing up to become an artist who can fill the world with color, a teacher who shares stories and helps others learn, or a caregiver who makes friends
    feel safe and happy. She is fascinated by space and sometimes imagines herself as an astronaut exploring new worlds. Underlying her ambitions is a strong desire to bring joy to others and use her creativity
    to make a positive impact.
