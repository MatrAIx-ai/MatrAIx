personas:
  professional: A budding marine ecologist, Lisa Cruz spends afternoons at the backyard pool turning it into a miniature research lab, their endless curiosity sparking dozens of why questions about fish
    while they sometimes worry about getting everything just right, and their sociable nature shines as they enthusiastically share findings with peers during playdates, though they tend to leave toy marine
    creatures scattered due to a relaxed approach to organization.
  sports: A junior swimmer and soccer enthusiast, Lisa Cruz splashes through community pool swim lessons each summer, cheers loudly for the Miami Heat during family game nights, and proudly wears the Delonia
    Dolphins Mini Soccer Club jersey during weekend matches, though their spontaneous energy often leads to forgotten water bottles and they sometimes fret over missing a goal.
  arts: A creative little artist, Lisa Cruz attends the library’s weekly art workshop where they experiment with finger paints, adore the vibrant illustrations of Dr. Seuss and the catchy songs of Disney’s
    Frozen (Idina Menzel), and often display their colorful drawings on the fridge, though their love for spontaneous creation sometimes results in a chaotic mess of crayons they worry about cleaning up.
  travel: A curious tiny traveler, Lisa Cruz has explored nearby Crystal Beach building sandcastles, splashed in Lake Okeechobee during school field trips, and marveled at the lights of Disney World in
    Orlando, dreaming of one day visiting the tropical islands of the Caribbean, though they sometimes get anxious about long car rides and rely on parents’ soothing stories to feel comfortable.
  culinary: For a budding foodie, Lisa Cruz loves finger foods like chicken nuggets dipped in honey mustard, delights in colorful mac‑and‑cheese topped with peas, enjoys building fruit kebabs with strawberries,
    bananas, and blueberries, yet their messy eating style often leaves sauce on their face, and they sometimes worry about finishing their veggies before dessert.
  core: Lisa Cruz is a curious, sociable five‑year‑old who mixes artistic wonder with a touch of worry, turning everyday play into spontaneous adventures while they occasionally leave a trail of crayons
    and unfinished tasks behind.
background:
  cultural: Lisa grows up in a suburban neighborhood of Delonia, Florida, a region with warm weather, nearby lakes, and easy access to the Atlantic coast. Her family celebrates typical American holidays
    such as Thanksgiving, Christmas, and the Fourth of July with community gatherings, fireworks, and potlucks that foster a sense of shared belonging. She attends a local preschool that incorporates a
    mix of Southern and coastal Floridian cultural elements, and she participates in community programs like the library’s weekly art workshop and the city’s Parks & Recreation summer camp. While her ethnic
    background is White, Lisa is regularly exposed to the multicultural tapestry of Florida through classmates of diverse origins and community festivals, nurturing an open‑minded perspective. Family traditions
    include church gatherings that emphasize kindness and cooperation, reinforcing her caring and considerate nature.
