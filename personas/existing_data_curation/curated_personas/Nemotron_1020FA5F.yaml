  hobbies: '[''hiking'', ''nature photography'', ''reading mystery & speculative fiction'', ''DIY pallet woodworking'', ''indoor herb gardening'', ''listening to indie folk music'', ''cooking healthy meals'',
    ''puzzle video games'', ''crossword puzzles'']'
  career_goals: Gloria aims to transition from front‑line material moving to a supervisory or coordination role within the logistics field. She plans to earn a Certified Forklift Operator credential and
    an OSHA 30‑Hour General Industry certification over the next year. Concurrently, she intends to complete her associate degree in Business Administration with a focus on supply‑chain management, and
    eventually enroll in a bachelor’s program in Logistics. Her long‑term ambition is to become a warehouse manager or supply‑chain analyst, where she can blend her practical knowledge of material handling
    with data‑driven process optimization, and mentor new employees in safety and teamwork.
