  career_goals: With his practical curiosity, Anthony is focused on formalizing his management expertise by completing a GED and taking short courses in supply‑chain analytics and digital inventory tools.
    His ambition is to progress from a site manager to a regional operations supervisor within the next five years, taking on larger cross‑facility responsibilities. He also hopes to mentor younger employees
    in Porterville, creating a structured onboarding program that leverages his people‑first approach while integrating modern efficiency practices.
