  career_goals: Shailesh hopes to finish his high‑school education through a GED and then pursue a career that blends his curiosity for technology with his practical mindset. He is aiming for an entry‑level
    position as a web developer or a junior tech support specialist, where he can continue learning on the job. At the same time, he dreams of eventually starting a small side business—perhaps a food‑truck
    or catering service that offers modern twists on traditional Indian street food—so he can contribute financially to his family and have creative control over his work. He is motivated by the desire
    for financial stability, self‑reliance, and the ability to manage his own schedule, which helps mitigate his worries about the future.
