personas:
  professional: Shailesh Patel is an aspiring junior web developer who leverages self‑taught Python, HTML/CSS, and everyday tech troubleshooting to build simple sites for friends, blending a curiosity‑driven
    appetite for new tools with a practical, flexible work style that tolerates occasional lapses in organization and lets them assert ideas when needed.
  sports: Shailesh Patel stays fit by riding their bike around Bellwood and playing pickup basketball at the local park, while cheering for the Chicago Bulls, Chicago Cubs, and Chicago Fire, preferring
    low‑commitment, flexible workouts that fit around their gaming schedule.
  arts: Shailesh Patel immerses themselves in Bollywood blockbusters, Punjabi pop hits from Diljit Dosanjh, and hip‑hop tracks by Kendrick Lamar, while sketching manga‑style characters inspired by Studio
    Ghibli’s “Spirited Away,” blending global pop culture with a personal artistic outlet that balances their analytical mindset.
  travel: Shailesh Patel enjoys spontaneous weekend trips to Chicago’s museums and lakefront and dreams of a future backpacking adventure through Japan’s anime districts and Delhi’s bustling markets, favoring
    affordable, culturally rich experiences that fit within a limited teenage budget.
  culinary: Shailesh Patel cooks Indian street‑food classics such as pav bhaji, chicken tikka, and masala dosa, often experimenting with fusion twists like maple‑glazed samosas or quinoa‑based biryani,
    though their habit of multitasking while gaming sometimes leads to over‑cooked noodles.
  core: Shailesh Patel is a tech‑savvy 17‑year‑old who balances gaming marathons, DIY electronics, and culinary experiments with a constant undercurrent of worry and a habit of leaving school assignments
    to the last minute.
background:
  cultural: Shailesh comes from a South Asian (Indian) family that immigrated to the United States before he was born. At home, Hindi and occasional Gujarati are spoken, and the household celebrates Hindu
    festivals such as Diwali and Holi while also partaking in community events at the local Indian cultural center in Cook County. His parents emphasize the importance of education, respect for elders,
    and close family ties, which often clash with his desire for independence and flexibility. Living in Bellwood, Illinois, he navigates a multicultural environment, balancing Indian traditions—like cooking
    staple foods and attending temple celebrations—with typical American teenage life, such as school sports, social media, and the local skate park. This blend of cultures shapes his worldview, giving
    him a strong sense of identity rooted in his heritage while encouraging openness to new ideas.
