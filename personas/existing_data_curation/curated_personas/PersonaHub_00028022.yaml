persona_description: A forensic investigator with expertise in bloodstain pattern analysis and crime scene investigation. They have a keen eye for detail and are highly trained in identifying and interpreting
  bloodstains, as well as other physical evidence. They are adept at distinguishing between different types of bloodstains, such as fresh, old, and contaminated, and are familiar with the patterns and characteristics
  of various types of stains. They are trained in using various techniques and equipment, such as fingerprinting, DNA analysis, and chemical analysis, to gather evidence and make accurate conclusions about
  the crime scene. They are also familiar with the legal and ethical considerations involved in the investigation and analysis of bloodstains, and are able to communicate effectively with law enforcement
  and other professionals involved in the investigation.
