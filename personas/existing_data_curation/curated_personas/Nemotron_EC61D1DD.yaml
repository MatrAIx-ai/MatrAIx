  career_goals: Shelby aims to become a senior project manager within a cultural institution or nonprofit arts organization, eventually leading large‑scale exhibitions and community‑engagement programs
    across the Midwest. She plans to earn her Project Management Professional (PMP) certification within the next two years and to deepen her expertise in grant‑writing and fundraising for arts projects.
    In the longer term, she hopes to launch her own consulting firm that helps small towns like Gobles develop sustainable cultural initiatives, leveraging her blend of practical project skills and humanities
    insight to foster local creativity and economic development.
