personas:
  professional: Shelby Eggleston, a 22‑year‑old aspiring project manager in the Midwest arts nonprofit sector, leverages their expertise with Microsoft Project, Asana, Trello, and G Suite to translate community‑driven
    ideas into well‑budgeted programs, while their balanced curiosity and practical reliability let them navigate creative risk with calm flexibility.
  sports: Shelby Eggleston stays active by hiking the Kalamazoo River trails with the Gobles Outdoor Enthusiasts Club each spring, cheering for the Michigan State Spartans during college basketball season,
    following the Detroit Tigers in baseball, and occasionally joining a local adult softball league on summer weekends.
  arts: Shelby Eggleston channels their love for the arts through volunteering on set design for the Gobles Community Theater’s productions of "Our Town" and "Little Shop of Horrors," strumming acoustic
    renditions of Bob Dylan and Bon Iver on guitar, and drawing inspiration from classic novels by Jane Austen and contemporary essays by Malcolm Gladwell.
  travel: Shelby Eggleston prefers low‑key, self‑planned road trips that blend outdoor adventure with cultural stops, having recently driven up the Upper Peninsula to kayak at Pictured Rocks and hoping
    to later explore the art districts of Portland, Oregon, while budgeting each journey through a detailed spreadsheet to keep costs compatible with their modest student‑job income.
  culinary: Shelby Eggleston enjoys farm‑to‑table cooking, confidently whipping up seasonal ratatouille with garden‑grown zucchini, heirloom tomatoes, and fresh basil, perfecting a Sunday apple‑cinnamon
    crisp, and occasionally treating themselves to a locally sourced beet and goat‑cheese salad at the Gobles Harvest Café.
  core: Shelby Eggleston is a 22‑year‑old project‑savvy nature lover who balances meticulous budgeting with spontaneous "just‑one‑more‑song" guitar sessions, often forgetting to water their garden when
    a deadline looms.
background:
  cultural: Shelby was raised in the small Midwestern town of Gobles, Michigan, in a family of German‑Irish descent that emphasized community involvement, modesty, and practical problem‑solving. Her upbringing
    combined traditional Midwestern values—politeness, hard work, and a strong sense of local identity—with exposure to the region’s rich cultural heritage, including local museums, seasonal festivals,
    and a vibrant community theater scene. This blend of a white, middle‑class, rural American background and a humanities education informs her appreciation for both historical continuity and innovative
    cultural expression.
