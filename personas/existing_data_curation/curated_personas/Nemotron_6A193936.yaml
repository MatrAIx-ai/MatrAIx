personas:
  professional: Isabella Smith, a budding marine photographer and aspiring environmental storyteller, blends curiosity with practicality; they document coastal life using their smartphone, sketchbook, and
    beginner coding projects for school science fairs and a future blog.
  sports: Isabella Smith enjoys casual beach volleyball with the local youth club, swims at Fort Lauderdale Beach in summer, follows the Miami Dolphins and Inter Miami CF on TV, and participates in her
    middle school’s indoor basketball league during the cooler months; they relish the mix of team play and solo surf sessions.
  arts: Isabella Smith spends afternoons sketching seascapes after listening to indie folk artists like The Paper Kites and playing ukulele to the tunes of Jack Johnson; they also draw inspiration from
    fantasy authors such as Neil Gaiman and the vibrant colors of Claude Monet’s marine paintings.
  travel: Isabella Smith loves spontaneous weekend trips to the Florida Keys for snorkeling, dreams of exploring the coral reefs of the Bahamas, and savors day‑long family outings to the Everglades; they
    balance wanderlust with the budget limits of a middle‑schooler’s allowance.
  culinary: Isabella Smith favors fresh shrimp tacos with mango salsa, enjoys making simple avocado toast for breakfast, and occasionally experiments with shell‑shaped sugar cookies; they still rely on
    pizza and mac‑and‑cheese as go‑to comfort foods.
  core: Isabella Smith is a nature‑obsessed teen who mixes curiosity with a laid‑back, slightly disorganized vibe; they worry over school stress while chasing shells, ukulele chords, and the next great
    photo.
background:
  cultural: Isabella comes from a white, middle‑class family that has lived in Fort Lauderdale for several generations. The city’s coastal lifestyle, multicultural community events, and emphasis on outdoor
    recreation have shaped her appreciation for nature and community involvement. While her household values traditional American holidays and school activities, she also experiences the diverse cultural
    fabric of Broward County through school programs, local festivals, and a neighborly mix of cuisines and traditions that foster an inclusive outlook.
