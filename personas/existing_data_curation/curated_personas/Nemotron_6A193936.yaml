  career_goals: Isabella dreams of a future where she can blend her love for the ocean with her creative talents. She aspires to become a marine conservation communicator—someone who uses storytelling,
    digital media, and photography to raise awareness about coastal ecosystems. She also entertains the idea of developing simple educational apps that help peers manage stress and organize schoolwork,
    reflecting her practical side and desire to support others.
