  hobbies: '[''Reading science fiction and nonfiction biographies'', ''Building and programming LEGO robotics kits'', ''Coding in Scratch and Python'', ''Solving puzzles (Sudoku, crosswords, logic games)'',
    ''Astronomy (telescope observations)'', ''Digital illustration'', ''Writing short stories'', ''Participating in school science fairs'']'
  career_goals: Fred aims to become a software engineer who designs educational technology that serves underrepresented communities. In the short term, he wants to master Python, win the regional coding
    competition, and secure a place in a prestigious STEM high school. Over the next decade, he hopes to attend a university such as Stanford or UC Berkeley, major in computer science, and later work on
    AI‑driven tools that make learning more accessible. He also dreams of participating in science fairs, earning scholarships, and eventually leading a team that creates robotics solutions for local environmental
    challenges while mentoring younger students from his community.
