personas:
  professional: Fred Howard, an 11‑year‑old budding technophile, channels their disciplined curiosity into building and programming LEGO robotics kits and crafting Python scripts, and they approach each
    project with meticulous organization and a high personal standard.
  sports: Fred Howard, a quiet 11‑year‑old who prefers solitary activity, spends after‑school hours swimming at the community pool and occasionally cycling alone, while cheering for the local Dayton Dragons
    baseball team and the international soccer club FC Barcelona, and they maintain a disciplined routine of three laps per swim session.
  arts: Fred Howard, an imaginative digital illustrator, creates sci‑fi‑inspired characters on a tablet influenced by Hayao Miyazaki’s animation and Jeff Smith’s graphic novels, they listen to Hans Zimmer’s
    soundtracks while coding, and they post short stories on their blog that echo Isaac Asimov’s narrative style.
  travel: Fred Howard, an avid stargazer, has visited the nearby Black Hills Observatory and the Grand Canyon National Park, they dream of traveling to Chile’s Atacama Desert for pristine night‑sky viewing,
    and they favor meticulously planned trips that balance quiet observation with structured itineraries.
  culinary: Fred Howard, a picky yet curious eater, favors pepperoni pizza, homemade spaghetti carbonara with pancetta and pecorino, and makes blueberry smoothies with frozen berries and almond milk, but
    they often neglect vegetables unless they’re finely diced and blended into their meals.
  core: Fred Howard is a disciplined, solitary tech enthusiast who pairs meticulous organization with boundless curiosity, they channel high standards into robotics, coding, and night‑sky explorations while
    occasionally forgetting to balance screen time and snack choices.
background:
  cultural: Fred belongs to a Black family rooted in the San Francisco Bay Area. His grandparents migrated from the Southern United States during the Great Migration, and his mother works as a public‑school
    teacher. Growing up, Fred has been immersed in the rich history of African American activism and culture in the Bay Area, attending community events at the African American Art & Culture Complex and
    participating in Black History Month workshops. His parents emphasize the achievements of Black scientists and engineers—such as Katherine Johnson, George Washington Carver, and Dr. Mae Jemison—instilling
    pride and a drive to excel academically. The multicultural environment of San Francisco, combined with his family's emphasis on education, community service, and resilience, shapes his worldview and
    fuels his interest in using technology to uplift underrepresented groups.
attributes:
  skills: '[''Advanced math problem solving'', ''Basic programming (Scratch, Python)'', ''Organizational planning and time management'', ''Independent research and report writing'', ''LEGO Mindstorms robotics
