  career_goals: Joseph aspires to complete his high school education—either by earning his diploma or a GED—and then pursue a college degree in social work or education. He envisions a career where he can
    combine his love for helping others with his knack for organizing community programs, such as becoming a youth counselor, community outreach coordinator, or educational technologist who designs tools
    to support students. In the longer term, he hopes to establish a local nonprofit that offers after‑school mentorship and mental‑health resources for teens in Putnam County. He also aims to continue
    developing his digital media skills to amplify his community initiatives.
