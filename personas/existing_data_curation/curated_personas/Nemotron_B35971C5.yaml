personas:
  professional: 'Joanna Thompson, a retired home‑economics enthusiast, blends her bilingual fluency, love of garden produce, and curiosity about family history into a community‑focused project: a lovingly
    illustrated family cookbook that she also teaches as simple cooking classes for seniors at the local center, though her relaxed approach sometimes means she schedules lessons at the last minute.'
  sports: Joanna Thompson prefers solitary movement, taking daily walks among her vegetable beds and attending a gentle senior Tai Chi class at the community center, while cheering on the local minor‑league
    baseball team, the River City Raptors, and occasionally following the Chicago Cubs broadcasts for a nostalgic connection to baseball.
  arts: Joanna Thompson enjoys quiet creative expression, painting watercolors of nearby wildflower fields at community art workshops, listening to traditional Son Jarocho tunes while cooking, and admiring
    the works of Frida Kahlo and Georgia O'Keeffe, often sharing her modest art with close friends but rarely seeking large‑scale exposure.
  travel: Joanna Thompson’s travel style is purpose‑driven yet leisurely, favoring carefully planned trips to cultural sites like the historic town of Guanajuato and the colonial splendor of Puebla, while
    dreaming of a heartfelt pilgrimage to her ancestral hometown in Oaxaca to record oral histories, though she often books flights at the last minute due to her flexible planning habit.
  culinary: Joanna Thompson excels at regional Veracruz cuisine, mastering dishes such as huachinango a la Veracruzana, chiles rellenos, and tamales de hoja, seasoning them with fresh cilantro, epazote,
    and heirloom tomatoes from her garden, and she balances her cooking with occasional indulgence in classic comfort foods like chicken noodle soup when time runs short.
  core: Joanna Thompson blends quiet curiosity with practical hands‑on skills, creating a life of gentle community contribution, modest frugality, and a love for solitary crafts despite occasional disorganization.
background:
  cultural: Joanna was raised in a Mexican-American household where Spanish was spoken alongside English, and family gatherings centered around shared meals and festive celebrations such as Día de los Muertos
    and Cinco de Mayo. Her parents immigrated from Veracruz, and she retains strong ties to Mexican culinary traditions, folk music, and communal values. Living in San Ramon, she blends these cultural roots
    with the local Californian lifestyle, participating in neighborhood events while preserving her family's heritage through language, food, and storytelling.
attributes:
  skills: '[''Traditional Mexican cooking'', ''Bilingual Spanish-English communication'', ''Basic digital literacy'', ''Gardening and horticulture'', ''Home budgeting'', ''Basic home repair'']'
  hobbies: '[''Reading historical and cultural books'', ''Gardening (vegetables and herbs)'', ''Cooking and recipe experimentation'', ''Listening to traditional Mexican music'', ''Solving jigsaw puzzles'',
    ''Knitting'', ''Watercolor painting'']'
  career_goals: Although retired from formal employment, Joanna aims to blend her curiosity and practicality by completing a family cookbook that documents recipes and stories handed down through generations.
    She hopes to volunteer as a cultural liaison at the local senior center, teaching simple cooking classes and Spanish language basics to fellow seniors. Additionally, she plans to travel to her ancestral
    hometown in Oaxaca to deepen her connection to her Mexican heritage and to gather oral histories for a personal memoir.
