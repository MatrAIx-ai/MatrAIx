  hobbies: '[''Hiking in the Chugach Mountains'', ''Cross‑country skiing'', ''Kayaking in Prince William Sound'', ''Landscape photography'', ''Oil painting'', ''Attending Anchorage art festivals'', ''Reading
    about art history and contemporary design'', ''DIY home improvement projects'', ''Volunteering at the Anchorage Art Center'', ''Cooking Alaskan cuisine'']'
  career_goals: Ina aims to advance from equipment operator to site foreman and eventually equipment manager, overseeing a fleet of heavy machinery on major Alaskan infrastructure projects. She plans to
    obtain advanced certifications such as the Certified Crane Operator and OSHA 30‑hour Construction Safety credential. Passionate about integrating new technology, she hopes to lead initiatives that incorporate
    autonomous equipment and data‑driven maintenance programs. Ina also wants to mentor new operators—especially women—promoting diversity in the trades, and eventually launch a small consulting firm that
    advises on efficient, environmentally sensitive construction practices.
