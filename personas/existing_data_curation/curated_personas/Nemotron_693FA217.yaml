personas:
  professional: Joan Farmer, a budding junior robotics enthusiast and LEGO architect, channels their curiosity and practicality into designing and programming simple robots while applying the structured
    yet flexible mindset they bring to school projects.
  sports: Joan Farmer plays forward on the town's youth soccer league, the Tigers, and point guard for the middle‑school basketball team, idolizes the Chicago Bulls and Los Angeles Lakers, and channels
    their competitive nature into high‑energy drills and weekend hikes on local nature trails with family.
  arts: Joan Farmer draws weekly comic strips inspired by Stan Lee’s Spider‑Man and the whimsical humor of Calvin and Hobbes, enjoys listening to Imagine Dragons and watching Pixar’s Inside Out, and spends
    free evenings sketching characters while humming movie themes, reflecting how the arts fuel their imaginative problem‑solving.
  travel: Joan Farmer prefers action‑packed day trips, having hiked the trails of Yellowstone National Park and explored the interactive exhibits at the Smithsonian, they dream of visiting the Space Center
    Houston and Japan’s Ghibli Museum, balancing school schedule constraints with family‑planned weekend getaways.
  culinary: Joan Farmer loves helping bake chocolate chip cookies, prepping simple spaghetti carbonara with parmesan and pepper, and experimenting with homemade sushi rolls topped with avocado and cucumber,
    but often forgets to wash hands before cooking, showcasing a blend of enthusiasm and occasional messiness.
  core: Joan Farmer is a curious, competitive ten‑year‑old who builds robots, draws comics, and negotiates allowance money with a blend of practicality and a healthy dose of skepticism, all while sprinting
    between soccer fields and kitchen counters.
background:
  cultural: Joan was raised in Morton Grove, a suburban community in Cook County, Illinois, where her family follows typical Midwestern values of hard work, community involvement, and appreciation for public
    education. Her white heritage includes roots in German and Irish ancestry, reflected in family traditions like holiday baking, annual Thanksgiving gatherings, and occasional trips to local cultural
    festivals in nearby Chicago. Growing up near the city, she has access to the Chicago Public Library system, the Museum of Science and Industry, and diverse community programs that broaden her perspective
    while reinforcing a comfortable, middle‑class American upbringing.
