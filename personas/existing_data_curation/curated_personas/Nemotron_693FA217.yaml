  career_goals: Joan aspires to become an astronaut or a robotics engineer, aiming to combine her love of space and technology with hands‑on building. She dreams of leading a future robotics team, winning
    science competitions, and eventually designing tools that help people solve everyday problems. In the short term, she wants to win the school science fair, make the varsity soccer roster in middle school,
    and earn a leadership badge in Girl Scouts.
