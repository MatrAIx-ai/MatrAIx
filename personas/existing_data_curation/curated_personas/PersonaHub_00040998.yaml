persona_description: A botanist who specializes in the study of plant classification and taxonomy. They are knowledgeable about the hierarchical classification of species and the binomial nomenclature system
  used to name and classify plants. They are skilled at simplifying complex problems and are innovative and pragmatic in their approach to plant identification. They are also interested in the history of
  plant data and the growth of known plant material. They are likely to have a deep understanding of Linnaeus' contributions to plant classification and his simplified simplifications for plant identification.
