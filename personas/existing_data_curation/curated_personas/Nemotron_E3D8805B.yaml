  hobbies: '[''Gardening (perennial and native plants)'', ''Birdwatching'', ''Historical Reading and Research'', ''Genealogy'', ''Knitting and Textile Crafts'', ''Cooking (healthy soul food)'', ''Volunteer
    Work at the Snoqualmie Library'', ''Walking and Light Hiking on Local Trails'', ''Nature Photography'']'
  career_goals: Although retired from formal employment, Vandi remains goal‑oriented. She aims to expand her volunteer leadership at the Snoqualmie senior center, establishing a mentorship program that
    pairs seniors with local high‑school students for community‑garden projects and oral‑history recording. She also aspires to complete a digital photography course to document the stories of Black families
    in the Pacific Northwest, ultimately publishing a modest photo‑essay collection. Additionally, Vandi wishes to deepen her knowledge of regional Native American history, integrating that understanding
    into her genealogical research and community workshops.
