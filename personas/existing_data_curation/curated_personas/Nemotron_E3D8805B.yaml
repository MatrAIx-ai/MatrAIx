personas:
  professional: Vandi Lewis, a retired community organizer in Snoqualmie, applies decades of event coordination, budget management, and intergenerational mentorship to lead volunteer programs at the senior
    center, and they channel their curiosity by integrating digital photography into storytelling initiatives.
  sports: Vandi Lewis enjoys gentle morning walks along the Snoqualmie River and seasonal bird‑watching hikes, follows the Seattle Seahawks in football and the Seattle Sounders FC in soccer, and they occasionally
    join a local seniors’ softball league that practices at the community park.
  arts: Vandi Lewis finds inspiration in the soulful blues of B.B. King, the gospel harmonies of Mahalia Jackson, and the vibrant quilts exhibited at the Tacoma Art Museum, and they integrate these artistic
    influences into their own knitting and quilting projects.
  travel: Vandi Lewis favors low‑key, nature‑focused trips, having explored the Hoh Rainforest in Olympic National Park and the historic streets of New Orleans for culinary research, and they dream of a
    future visit to the Cape Cod lighthouse trail in the fall.
  culinary: Vandi Lewis blends Southern cooking traditions with health‑conscious twists, regularly preparing baked sweet potato with cinnamon, collard greens sautéed with smoked turkey, herb‑roasted salmon
    drizzled with lemon, and a quinoa salad featuring kale, black‑eyed peas, and fresh cilantro, and they often share these meals with neighbors during community potlucks.
  core: Vandi Lewis, a quietly determined 68‑year‑old gardener, historian, and community mentor, balances disciplined organization with a love for spontaneous creativity, often swapping quilting needles
    for a camera lens while they remind themselves not to over‑schedule their cherished mornings.
background:
  cultural: Vandi’s cultural background is rooted in a multi‑generational African‑American family that migrated from the Southern United States during the Great Migration, eventually settling in the Pacific
    Northwest. Growing up, she balanced the traditions of Southern cuisine, church community, and storytelling with the progressive, nature‑oriented lifestyle of Washington state. As a Black woman in Snoqualmie,
    she values both preserving her heritage and fostering inclusive community connections. She actively participates in local cultural events, supports initiatives that highlight Black histories in the
    region, and draws on her cultural legacy to mentor younger members of her community.
attributes:
  skills: '[''Organizational Management'', ''Community Volunteer Coordination'', ''Event Planning for Small Gatherings'', ''Basic Computer and Internet Skills'', ''Gardening and Sustainable Horticulture'',
