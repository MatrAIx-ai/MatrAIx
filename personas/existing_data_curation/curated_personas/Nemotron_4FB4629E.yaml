  career_goals: Although retired, Johnny aims to stay mentally engaged and give back to his community. He plans to mentor aspiring engineers at the local community college, lead workshops that blend science
    and art for senior citizens, assist the Des Moines Art Center in curating interdisciplinary exhibits, write a memoir that reflects on the technological changes he has witnessed, and continue expanding
    his artistic repertoire through digital media.
