personas:
  professional: Johnny Riley, a retired mechanical engineer known for their meticulous CAD designs and Python‑driven simulations, applies their lifelong curiosity and methodical planning to mentor aspiring
    engineers and lead interdisciplinary workshops that blend scientific rigor with artistic expression.
  sports: Johnny Riley, a devoted fan of the Iowa Hawkeyes football program and the Iowa Cubs Triple‑A baseball team, stays active by walking a 2‑mile loop in Gray’s Lake Park each morning, participates
    in a senior bowling league at the Des Moines Community Center, and they practice gentle tai chi with the Mid‑Iowa Seniors Club during the winter months.
  arts: Johnny Riley, an avid watercolorist and photographer inspired by Claude Monet’s impressionist palettes and Ansel Adams’s black‑and‑white landscapes, regularly attends live performances by folk legend
    Joan Baez and local jazz saxophonist Mark Apte, and they volunteer at the Des Moines Art Center where they help curate interdisciplinary exhibits that fuse engineering concepts with visual art.
  travel: Johnny Riley, who relishes meticulously planned road trips, has photographed the grand vistas of Yellowstone and the serene canals of Holland’s Lisse tulip fields, enjoys weekend getaways to Lake
    Okoboji for boating, and they dream of a leisurely cultural tour of Italy’s Tuscany region, always coordinating travel with their adult children to balance independence and companionship.
  culinary: Johnny Riley, a competent home cook who favors Midwestern comfort foods like creamy corn chowder and a roasted vegetable medley featuring heirloom carrots, sweet corn, and fresh thyme, enjoys
    preparing pan‑seared trout with lemon‑dill sauce, and they occasionally forget to turn off the oven, prompting their grandchildren to remind them of safety.
  core: Johnny Riley blends seasoned engineering precision with vibrant artistic curiosity, mentors with patient diligence, tends their garden while solving puzzles, and they habitually misplace their reading
    glasses on their head.
background:
  cultural: Johnny grew up in a traditional Midwestern white family in Iowa during the post‑World War II era, inheriting the region’s values of modesty, self‑reliance, community service, and a strong work
    ethic. His childhood was marked by farm‑adjacent life, participation in church and community events such as the Iowa State Fair, and an early exposure to the expanding world of science and technology.
    These experiences fostered a pragmatic yet curious worldview that blends respect for tradition with an appreciation for artistic and intellectual exploration.
