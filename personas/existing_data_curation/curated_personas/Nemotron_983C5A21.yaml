personas:
  professional: Lori Hilton is an aspiring Certified Nursing Assistant who leverages their meticulous organizational skills, basic first‑aid training, and calm, detail‑oriented mindset to excel in volunteer
    shifts at the local hospital, while their natural empathy and assertiveness help them balance patient care with clear communication.
  sports: Lori Hilton stays active through a blend of yoga classes at the Westchester Yoga Studio, weekend hikes in Harriman State Park, and cheering for the New York Knicks, New York Yankees, and New York
    Giants, while also participating in their high school’s cross‑country team during the fall season.
  arts: Lori Hilton channels creativity by sketching detailed botanical illustrations of herbs from their garden, playing piano pieces by Yiruma and Ludovico Einaudi, and devouring thriller novels by Gillian
    Flynn, while they also find inspiration in the paintings of Claude Monet and the atmospheric scores of Hans Zimmer.
  travel: Lori Hilton prefers structured itineraries that balance adventure and relaxation, often planning weekend trips to the Hudson Valley and day hikes in the Catskills, dreaming of a future cultural
    immersion in Kyoto, Japan, and occasionally joining school-organized field trips to Washington, D.C., all while navigating limited teen budgets and parental approval.
  culinary: Lori Hilton enjoys cooking simple yet flavorful dishes like basil pesto pasta using fresh herbs from their garden, whipping up avocado toast topped with cherry tomatoes, and experimenting with
    homemade ramen broth, though they admit to occasionally over‑seasoning when nervous.
  core: Lori Hilton blends a hyper‑organized, routine‑driven lifestyle with a quiet creative spark, yet constantly battles a habit of over‑thinking and occasional impulsive splurges on art supplies.
background:
  cultural: Lori is a White American raised in Valley Cottage, a suburban community in Rockland County, New York. Her family’s cultural roots trace back to European ancestors, primarily Irish and Italian,
    which influence family traditions, holiday celebrations, and a strong emphasis on community involvement. Growing up near the Hudson River and close to New York City, she has been exposed to a mix of
    suburban tranquility and urban cultural offerings, such as museum trips and diverse culinary experiences. This environment fosters a blend of practical, middle‑class American values—such as self‑reliance,
    education, and civic responsibility—while also providing access to broader cultural resources that shape her interests and aspirations.
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Basic computer proficiency (Microsoft Office, Google Suite)'', ''Effective written communication'', ''Active listening'', ''Empathy with assertiveness'',
