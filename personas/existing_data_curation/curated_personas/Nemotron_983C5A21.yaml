  hobbies: '[''Journaling'', ''Reading mystery and thriller novels'', ''Sketching and drawing'', ''Playing piano'', ''Herb gardening'', ''Yoga and mindfulness exercises'', ''Hiking in Harriman State Park'',
    ''Volunteering at the community library'', ''Strategy video games (e.g., Civilization)'', ''Participating in school debate club'']'
  career_goals: Lori aims to pursue a stable, structured career in the healthcare field, beginning with a Certified Nursing Assistant (CNA) certification and later working toward a Registered Nurse license.
    She values a predictable work environment where she can help others while applying her meticulous organizational skills. In the short term, she plans to complete her high school equivalency, improve
    her science grades, and volunteer at the local hospital to gain hands‑on experience. Long‑term, she envisions attending a community college for a nursing program, eventually specializing in pediatric
    or community health nursing, where her compassion and reliability will be assets.
