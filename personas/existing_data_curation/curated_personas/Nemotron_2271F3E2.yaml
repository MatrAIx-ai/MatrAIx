personas:
  professional: Jonathan Barnes is a hands‑on aspiring automotive technician who spends afternoons swapping out brake pads on his family’s sedan, channels his competitive edge from basketball and gaming
    into meticulous troubleshooting, and balances his love of structure with a laid‑back attitude toward school as he works toward a GED and an apprenticeship.
  sports: Jonathan Barnes dominates the local pickup basketball scene at the Oak Grove Community Center, cheers on the Oklahoma City Thunder and the Oklahoma State Cowboys while spending weekends at Lake
    Hefner Skate Park with the OC Skate Club, and stays tuned to NASCAR races and Formula 1 for extra adrenaline.
  arts: Jonathan Barnes jams on a battered electric guitar in a garage band that covers The White Stripes and John Mayer, streams his improvised sessions on YouTube while swapping playlists that feature
    Lil Nas X and classic rock, and occasionally catches a live show at the Bricktown Music Hall to soak up local performance energy.
  travel: Jonathan Barnes prefers short, low‑budget road trips with friends—like a weekend drive to the Oklahoma State Fair, a spontaneous detour to Dallas for a Thunder game, and a dream of attending a
    Formula 1 Grand Prix in Barcelona—planning on a whim but always keeping an eye on his modest travel fund.
  culinary: Jonathan Barnes loves whipping up buttery BBQ ribs and spicy chili cheese fries at home, experimenting with smoked paprika, jalapeños, and a splash of bourbon in his sauces, while also ordering
    fast‑food burgers topped with extra bacon after a long gaming session.
  core: Jonathan Barnes blends a restless competitive streak with a community‑rooted work ethic, juggling car‑mod obsessions, basketball rivalries, and anxiety‑driven journaling while dreaming of a custom‑car
    shop and youth coaching.
background:
  cultural: 'Jonathan grew up in a middle‑class, white family in suburban Oklahoma City, where community ties and practicality are valued. His neighborhood reflects typical Midwestern sensibilities: friendly
    neighbors, a strong high‑school sports culture, and a respect for self‑reliance. While his household is not overtly religious, the underlying cultural norms emphasize hard work, modesty, and a love
    of local traditions such as high‑school football games and state fairs. Exposure to the region’s automotive and oil industries has sparked his interest in cars, and the city’s growing youth scene offers
    ample opportunities for group sports and music. These regional influences, combined with his personal drive for competition and structure, shape his worldview and aspirations.'
attributes:
  skills: '[''Basic automotive repair'', ''Bike and skateboard maintenance'', ''Woodworking basics'', ''Video editing (Premiere Pro)'', ''Social media content creation'', ''Organizing and leading group
    sports'', ''Strategic gameplay (e‑sports)'', ''Basic first aid'', ''Stress‑management peer support'']'
  hobbies: '[''Basketball (pickup games)'', ''Skateboarding at local parks'', ''Competitive video gaming (Fortnite, Call of Duty)'', ''Car tinkering and minor modifications'', ''Watching motorsports (NASCAR,
    Formula 1)'', ''Playing guitar in a garage band'', ''Journaling for stress relief'', ''Hiking near the Oklahoma River'']'
  career_goals: Jonathan aspires to turn his practical talents into a stable career. He plans to earn his GED within the next year and then enroll in an apprenticeship program for automotive technology
    at a local garage, aiming to become a certified technician. Long‑term, he dreams of opening his own small custom‑car shop where he can combine his love of mechanics with his entrepreneurial spirit.
    He also hopes to give back to his community by coaching a youth basketball team, using his leadership and competitive drive to mentor younger players. Securing a reliable income and a sense of purpose
    are key motivations, as they would help him manage his tendency toward worry and stress.
