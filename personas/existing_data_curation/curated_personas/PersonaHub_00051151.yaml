persona_description: A scientist or ecologist who is interested in comparing the niche breadth of models built using native and introduced occurrence points in a study area, and who is also interested in
  comparing the suitability of environments across different ranges. This person is likely to be familiar with Maxent modeling software and the ENMTools package for estimating niche breadth. They may have
  experience in conducting randomization tests to compare the differences in niche breadth between models built using native and introduced occurrence points. This person may also have a background in geography,
  bioclimatology, or environmental science, and may have a strong interest in the conservation and management of biodiversity.
