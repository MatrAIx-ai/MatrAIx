    and mentorship of junior technologists'', ''Process improvement and workflow optimization'']'
  hobbies: '[''Softball (adult league)'', ''Hiking in Umpqua National Forest'', ''Trout fishing'', ''Craft‑brewery tastings'', ''Board games and chess'', ''Volunteer work at food bank'', ''Woodworking'']'
  career_goals: Kevin aims to step into a supervisory or managerial role within his laboratory, overseeing a team while implementing process‑improvement initiatives that boost efficiency and reduce turnaround
    time. He plans to obtain the ASCP MLS credential and lead his department to achieve top performance ratings in state audits. Over the next five years, he also hopes to develop a mentorship program for
    new technicians and explore part‑time teaching opportunities at Douglas Community College, sharing his practical expertise with the next generation. Ultimately, he envisions transitioning to a consulting
    role that helps smaller labs in rural Oregon adopt automation and quality‑management systems, allowing him to stay active in the field while enjoying a more flexible schedule.
