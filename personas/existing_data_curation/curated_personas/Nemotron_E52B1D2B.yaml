  career_goals: David aims to transition from his current hiatus into a role that blends his organizational talent and hands‑on technical know‑how. He plans to obtain a Project Management Professional (PMP)
    certification within the next year and is exploring opportunities in logistics or inventory management at a local manufacturing firm. Simultaneously, he is developing a side business offering handyman
    and home‑improvement services, hoping to grow it into a modest contractor enterprise. In the longer term, David aspires to become a community leader, possibly serving on the Noblesville town council,
    where he can apply his practical problem‑solving skills to benefit local residents.
