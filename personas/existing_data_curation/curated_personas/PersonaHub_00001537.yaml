persona_description: A neuroscientist who specializes in the study of the retina, specifically the processing of light-sensitive tissue and the functioning of retinal microcircuits. Her work focuses on
  unraveling the function and organization of retinal microcircuits, studying the mechanisms that implement these microcircuits during development and how microcircuits change in retinal degeneration. She
  uses a combination of electrical and optical recording techniques to study retinal processing and has published several articles in reputable journals such as Current Biology, Nature Reviews Neuroscience,
  and Annual Review of Neuroscience.
