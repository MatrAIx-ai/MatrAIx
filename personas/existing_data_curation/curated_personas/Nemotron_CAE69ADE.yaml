personas:
  professional: Donald Nunez, a budding digital illustrator who blends hand‑drawn character sketches with Photoshop flair, channels his curiosity and love of solitude into late‑night art marathons while
    his relaxed attitude toward deadlines often leaves sketchbooks scattered across his room.
  sports: Donald Nunez, an avid solo hiker who frequents Red Rock Canyon and occasionally joins the Henderson Junior Hiking Club, also shoots hoops at the local YMCA basketball court, proudly roots for
    the Vegas Golden Knights and the Las Vegas Raiders, and prefers low‑key fitness routines like weekend trail runs over organized team sports.
  arts: Donald Nunez, a fervent fan of fantasy illustration, spends afternoons recreating the luminous world‑building of Hayao Miyazaki’s Spirited Away and the vibrant character designs of digital artist
    Ross Tran, while listening to Hans Zimmer’s sweeping scores and drawing inspiration from the surreal paintings of Frida Kahlo at community art fairs.
  travel: Donald Nunez, who favors spontaneous weekend getaways over rigid itineraries, regularly explores the desert cliffs of Red Rock Canyon and has taken a family road trip to the Grand Canyon, while
    day‑dreaming about future adventures to Japan’s anime districts and the ancient ruins of Machu Picchu.
  culinary: Donald Nunez, an emerging home chef who confidently rolls tamales with his grandparents and whips up pepperoni pizza slices, loves the smoky heat of chipotle in adobo sauce paired with fresh
    cilantro and lime in tacos, and eagerly experiments with gooey mac and cheese while still mastering the perfect scrambled egg.
  core: Donald Nunez, a 13‑year‑old desert‑wanderer and digital‑art prodigy, balances solitary sketch marathons with a quietly compassionate habit of rescuing shelter dogs, even as his backpack forever
    overflows with sketchbooks, LEGO bricks, and half‑finished snack wrappers.
background:
  cultural: Donald grew up in suburban Henderson, Nevada, within a middle‑class family that blends Anglo‑American roots with Spanish‑American influences reflected in his surname Nunez. The household celebrates
    typical American holidays such as Thanksgiving and the Fourth of July while also honoring family traditions like cooking tamales during special occasions. Living in the culturally diverse Las Vegas
    Valley has exposed him to a variety of cuisines, music, and artistic expressions, fostering his curiosity and openness to unconventional ideas. Community events, visits to Red Rock Canyon, and participation
    in local art fairs have shaped his appreciation for both the natural landscape and creative pursuits.
