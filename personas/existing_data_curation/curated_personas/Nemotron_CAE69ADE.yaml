  career_goals: Donald aspires to become a concept artist for video games or animated films, hoping to blend his imagination with storytelling that promotes empathy and social harmony. He also dreams of
    studying environmental science or wildlife conservation, combining his love for nature with advocacy, and envisions organizing community art workshops that empower youth to express themselves creatively.
