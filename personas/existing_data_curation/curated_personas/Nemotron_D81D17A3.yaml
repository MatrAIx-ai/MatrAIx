  career_goals: Emad aims to move from his current supervisory position to a full‑time food service manager role overseeing multiple dining locations in the Aurora area, where he can apply his operational
    expertise on a larger scale. He also dreams of eventually opening a family‑run Indian restaurant that highlights Gujarati cuisine, blending his cultural heritage with his professional skills. To reach
    these goals, he plans to enroll in a part‑time hospitality management program, obtain a certified food‑service manager credential, and deepen his knowledge of business finance. Additionally, he seeks
    to develop stronger delegation strategies to reduce personal stress and create a healthier work‑life balance for his family.
