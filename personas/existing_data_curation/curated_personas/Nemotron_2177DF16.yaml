personas:
  professional: Kathryn Obrien, a 21‑year‑old Florida real‑estate associate, blends meticulous market analysis and digital lead‑management tools with a considerate, low‑pressure client communication style
    that compensates for her spontaneous, sometimes disorganized approach to scheduling.
  sports: Kathryn Obrien enjoys early‑morning beach yoga, weekend paddle‑boarding with the Broward Paddle Club, follows the Miami Heat and Tampa Bay Buccaneers avidly, and prefers solo, low‑impact fitness
    activities over competitive team sports.
  arts: Kathryn Obrien expresses creativity through watercolor interior‑design sketches inspired by Agnes Martin’s minimalism and Ansel Adams’s coastal photography, unwinds listening to Bon Iver and watching
    Florence Pugh’s indie films, and occasionally visits local galleries showcasing sustainable architecture.
  travel: Kathryn Obrien favors low‑key, eco‑friendly travel, planning quiet weekend getaways to the Florida Keys and annual sunrise hikes in Kyoto’s Arashiyama bamboo forest, balancing a modest travel
    budget with a desire for immersive, off‑peak experiences.
  culinary: Kathryn Obrien prefers simple, health‑focused dishes like quinoa‑avocado bowls with lemon‑herb grilled salmon, sources fresh vegetables and herbs from local farmers’ markets, cooks at a confident
    beginner level, and delights in occasional experiments with kale, chickpeas, and ginger.
  core: Kathryn Obrien, a solitary yet curious 21‑year‑old real‑estate agent, blends quiet sunrise rituals with data‑driven market strategies, though her spontaneous streak sometimes leaves her schedule
    tangled.
background:
  cultural: Kathryn’s family traces its roots to Irish immigrants who settled in the southeastern United States in the early 20th century. Raised in a middle‑class household in Fort Lauderdale, she grew
    up immersed in the relaxed, multicultural vibe of South Florida, where a blend of Caribbean, Latin American, and beach‑oriented lifestyles is the norm. Her upbringing emphasized hospitality, modesty,
    and a strong work ethic, values that her parents passed down through family gatherings featuring traditional Irish dishes alongside fresh local seafood. While she identifies as white and maintains a
    secular worldview, she occasionally celebrates Irish cultural holidays such as St. Patrick’s Day, and she feels a deep connection to the coastal environment that shapes both her personal life and professional
    interests in real‑estate.
