  career_goals: Kathryn aims to become one of Broward County’s top‑producing agents within the next five years, focusing on residential and waterfront properties that align with sustainable living trends.
    She plans to earn the Certified Residential Specialist (CRS) designation and later the Certified Real Estate Negotiator (CREN) credential. Leveraging her love for independent work, she intends to transition
    into a boutique brokerage that operates primarily online, allowing her to serve clients through virtual showings and digital negotiations while maintaining a low‑key, quiet office environment. Long‑term,
    she dreams of building a portfolio of investment properties that generate passive income, eventually giving her the flexibility to mentor younger agents who value a balanced, client‑centric approach.
