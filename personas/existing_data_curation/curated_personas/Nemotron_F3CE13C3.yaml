  hobbies: '[''Reading (business books, self‑help, sci‑fi)'', ''Bicycle riding and hiking'', ''Cooking traditional Mexican dishes'', ''Playing guitar'', ''Strategy video gaming'', ''Journaling'', ''Attending
    small cultural gatherings'']'
  career_goals: Israel plans to earn his GED within the next year and enroll in a community college program in business administration to deepen his understanding of marketing and management. In the short
    term, he aims for a promotion to senior sales representative or team lead, where he can mentor newer reps and refine his coaching abilities. Long‑term, he aspires to become a regional sales manager
    overseeing a portfolio of service contracts, and ultimately to launch his own consulting firm that helps small businesses improve customer service operations. He is motivated to combine his curiosity
    for new sales technologies with his practical experience, while also developing resilience to manage stress and negative emotions in high‑pressure environments.
