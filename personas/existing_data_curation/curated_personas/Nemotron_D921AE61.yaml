  career_goals: Coy aspires to earn a scholarship to a top‑tier university where she can double‑major in Fine Arts and Computer Science. She aims to become a digital artist and UI/UX designer who integrates
    technology with visual storytelling, eventually curating innovative museum exhibitions that blend interactive media with traditional art. Her long‑term ambition is to lead a creative studio that pushes
    the boundaries of artistic expression while maintaining the high standards she sets for herself.
