personas:
  professional: Coy Hisle is an aspiring interactive storyteller who melds digital painting, Python scripting, and narrative design into mini‑graphic novels, applying their meticulous organization and competitive
    drive to meet self‑imposed deadlines and out‑shine peers in online creator showcases.
  sports: Coy Hisle fuels their competitive edge by training alone at the neighborhood park and participating in the Rising Star Running Club for weekly five‑kilometer sessions, while passionately supporting
    the Seattle Sounders FC and tracking their matches for tactical inspiration.
  arts: Coy Hisle channels their love of speculative fiction into intricate digital murals inspired by the surreal works of H.R. Giger and the street art of Banksy, listens to experimental musicians like
    Aphex Twin and Oneohtrix Point Never while sketching, and curates a personal playlist that fuels late‑night creative marathons.
  travel: Coy Hisle plans meticulous solo trips, favoring quiet urban explorations of city murals in Berlin and the neon‑lit districts of Tokyo, while day‑dreaming about a future pilgrimage to Iceland’s
    volcanic landscapes for aurora photography, all scheduled through detailed spreadsheet itineraries.
  culinary: Coy Hisle enjoys crafting minimalist yet flavor‑intense dishes such as miso ramen with homemade chashu, avocado toast topped with smoked salmon, and experimental avocado‑lime sorbet, often cooking
    late at night while sipping matcha‑flavored energy drinks and occasionally neglecting regular meals.
  core: Coy Hisle is a solitary, fiercely organized teen who transforms curiosity into digital art and code, competes relentlessly in chess, and balances disciplined budgeting with occasional impulsive
    splurges on creative tools.
background:
  cultural: Coy was raised in a white, middle‑class family in East Saint Louis, Illinois, a city known for its industrial heritage and vibrant artistic community. Her family holds Midwestern values of hard
    work, self‑reliance, and community involvement, celebrating traditional holidays with extended family gatherings and modest church attendance. Exposure to the local art scene—such as murals, community
    art workshops, and the East St. Louis Museum of Art—has nurtured her appreciation for both classic and avant‑garde art forms. While she often feels like an outsider in a predominantly African‑American
    community, she respects the city’s rich musical history (blues, jazz, and soul) and incorporates that cultural awareness into her creative pursuits.
