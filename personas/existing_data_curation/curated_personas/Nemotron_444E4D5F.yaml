personas:
  professional: David Thurman, a 20‑year‑old line cook at a high‑volume Flagstaff kitchen, leverages his methodical, routine‑driven mindset and reliable team coordination to keep service smooth while obsessively
    tracking inventory and upholding strict food‑safety standards, ensuring they never miss a step.
  sports: David Thurman, an avid hiker of the San Francisco Peaks and intramural basketball player, trains with the Flagstaff Community Run Club each spring, follows the Arizona Cardinals and Phoenix Suns
    with a competitive fervor, and structures their workouts like a weekly menu to balance cardio hikes with pick‑up games, ensuring they remain predictable yet challenging.
  arts: David Thurman, a classic‑rock aficionado who fuels their mornings to Led Zeppelin and The Rolling Stones, devotes Saturday evenings to binge‑watching Chopped and MasterChef while strategizing over
    Settlers of Catan, and they admire the game‑design artistry of Klaus Teuber as a creative outlet that satisfies their love for structured competition.
  travel: David Thurman prefers meticulously planned weekend trips, having already toured Portland’s craft‑brew scene and the vibrant food markets of Santa Fe, and now dreams of exploring Asheville’s farm‑to‑table
    restaurants and the historic streets of Oaxaca while adhering to a tight budget that guarantees their itineraries remain predictable and stress‑free.
  culinary: David Thurman, a self‑taught line cook, delights in mastering southwestern comfort dishes such as mesquite‑smoked brisket, Hatch‑chile roasted corn, and flaming green‑chile queso, regularly
    experimenting with cumin, chipotle, and masa harina, and they take pride in achieving the perfect balance of heat and heartiness.
  core: David Thurman is a routine‑obsessed, competitively spirited line cook who channels anxiety into meticulous kitchen precision, yet secretly splurges on spontaneous craft‑beer tastings and marathon
    board‑game nights, revealing how they balance order and indulgence.
background:
  cultural: David grew up in a middle‑class white family in the Flagstaff area, where practical values, routine, and community involvement were emphasized. His upbringing combined Midwestern family traditions
    with the unique cultural tapestry of northern Arizona, exposing him to Native American and Mexican culinary influences that sparked his interest in cooking. He attended a local community college where
    he took courses in hospitality and culinary arts, while also participating in regional festivals that celebrate the Southwest’s heritage. This blend of practical, routine‑oriented upbringing and appreciation
    for the local cultural diversity shapes his worldview and professional aspirations.
attributes:
  skills: '[''line cooking'', ''food preparation'', ''food safety compliance'', ''inventory management'', ''menu planning'', ''knowledge of Southwestern cuisine'', ''team coordination'', ''kitchen equipment
