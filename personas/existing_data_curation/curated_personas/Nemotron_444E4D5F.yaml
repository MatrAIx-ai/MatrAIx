  hobbies: '[''hiking'', ''intramural basketball'', ''brewery tours'', ''home cooking experiments'', ''volunteering at community food drives'', ''watching cooking competitions'', ''board games'', ''listening
    to classic rock'', ''journaling'']'
  career_goals: David aims to progress to a sous‑chef role within the next two years and eventually become head chef of a family‑friendly restaurant in Flagstaff that offers reliable, high‑quality comfort
    food with a regional twist. He plans to earn professional culinary certifications such as Certified Culinarian and Certified Chef de Cuisine, and he hopes to open his own modest eatery that provides
    a predictable schedule for staff while maintaining the traditional, practical values he cherishes. Mentoring junior cooks and establishing a reputation for consistent excellence are also central to
    his long‑term ambitions.
