  career_goals: Roberto aims to transition from a general office clerk role into a hybrid business‑creative position, such as a product development coordinator or marketing strategist for a cultural or
    design‑focused organization. He plans to deepen his strategic skill set with a certificate in design thinking and eventually pursue an MBA with an entrepreneurship focus. In the medium term, he hopes
    to build a portfolio of branding and visual projects for local artists, positioning himself to launch a boutique consultancy that blends Mexican cultural motifs with modern brand strategy. Throughout
    his career progression, he seeks roles that offer flexibility, autonomy, and opportunities to explore novel concepts, reflecting his preference for fluid, innovative work environments.
