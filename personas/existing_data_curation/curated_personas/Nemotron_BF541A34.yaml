    International Recipes", "Volunteering at Public Library Art Programs", "Hiking in Wharton State Forest", "Wine and Craft Beer Tasting", "Reading Art History and Science Fiction"]'
  career_goals: Randall aims to advance from sales associate to store manager within the next two years, leveraging his visual‑merchandising talent to shape the store’s aesthetic and drive sales. He plans
    to earn his GED and complete a certificate in retail management or visual merchandising from a community college. Long‑term, he hopes to open a niche boutique that showcases work by local New Jersey
    artists and offers curated artisanal products, merging his retail expertise with his passion for art. He also aspires to mentor younger employees and lead community‑based art‑related retail events.
