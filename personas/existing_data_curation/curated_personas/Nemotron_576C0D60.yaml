  hobbies: '[''Socializing at coffee shop'', ''Dancing to country/bluegrass music'', ''Volunteering at bourbon festival'', ''DIY crafts (knitting, quilting)'', ''Listening to entrepreneurship podcasts'',
    ''Hiking and biking in state parks'', ''Playing card games (spades)'', ''Watching competitive reality TV'']'
  career_goals: Carole is determined to turn her practical experience into a path for advancement. She plans to earn her GED within the next year and enroll in a retail‑management certificate program offered
    at the nearest community college. Her short‑term goal is to be promoted to shift supervisor or assistant manager at her current store, where she can apply her competitive drive to improve sales performance
    and team productivity. In the longer view, Carole dreams of opening a small boutique in Paris that showcases locally crafted items and bourbon‑related souvenirs, leveraging her curiosity about entrepreneurship
    and digital marketing to sell both in‑store and online. She hopes the venture will create a modest number of jobs for other young people in Bourbon County and give her the independence to design a work‑life
    balance that eases her stress.
