personas:
  professional: Carole Crum, a 21‑year‑old front‑line retail specialist, leverages her razor‑sharp cash‑handling, POS proficiency, and knack for training new cashiers to keep the checkout line humming while
    her competitive drive pushes her to streamline sales and pursue a shift‑supervisor promotion.
  sports: Carole Crum, an energetic 21‑year‑old, hits local state parks on foot and bike, belongs to the Bourbon County Trail Riders cycling club, and roots for the Kentucky Wildcats basketball team while
    cheering on the Cincinnati Reds during baseball season.
  arts: Carole Crum, a 21‑year‑old social butterfly, spends evenings dancing to Dolly Parton and Alison Krauss at community gatherings, knits intricate scarves inspired by Art Deco patterns, and unwinds
    with the competitive drama of Survivor and The Great British Bake Off.
  travel: Carole Crum, a twenty‑one‑year‑old adventure‑seeker, prefers spontaneous weekend road trips to nearby Red River Gorge and Shenandoah National Park, but dreams of a passport‑stamp in Paris to scout
    locations for her future bourbon‑souvenir boutique and a taste of New Orleans’ music scene.
  culinary: Carole Crum, a 21‑year‑old food enthusiast, favours bourbon‑glazed chicken wings, crispy fried catfish with hush‑puppy batter, and buttery pecan pie, often pairing them with homemade cornbread
    and fresh herbs like thyme and rosemary in her modest yet enthusiastic kitchen experiments.
  core: Carole Crum, a 21‑year‑old retail whiz with a competitive streak, balances a love for community hustle with a chronic worry habit that drives them to over‑organize, over‑caffeinate, and occasionally
    over‑commit to extra shifts.
background:
  cultural: Carole grew up in a white, working‑class family in Paris, a small town in Bourbon County, Kentucky. The community’s rhythm is shaped by Southern hospitality, close‑knit church ties, and a deep
    appreciation for the region’s bourbon heritage and rural landscape. Family gatherings often feature home‑cooked Southern meals and folk music, while local events like county fairs and horse‑show meets
    reinforce a sense of place. This environment has taught Carole the value of hard work, neighborly support, and preserving local traditions, while also exposing her to the modest economic opportunities
    that drive her ambition to create her own business within the community.
attributes:
  skills: '[''Cash handling'', ''POS system operation'', ''Customer service'', ''Basic accounting'', ''Inventory tracking'', ''Time management'', ''Multitasking'', ''Quick mental math'', ''Interpersonal
