personas:
  professional: Allison Schales is a budding young scientist‑engineer who treats every LEGO set and chemistry kit as a project plan, demanding step‑by‑step instructions before building, and they channel
    a competitive, skeptical mindset into winning puzzle races, though they sometimes throw a temper tantrum when the rules aren’t clear.
  sports: Allison Schales is a dedicated member of the Little Kickers FC community soccer team, where they relish structured drills and the chance to outscore opponents, they cheer for Manchester United
    youth academy videos on TV, and their competitive streak makes them practice extra laps after practice, though they may get sulky when a teammate scores more.
  arts: Allison Schales enjoys weekly piano lessons where they polish scales from Beethoven’s Für Elise and adore singing along to Disney’s Let It Go, they devour adventure novels by Roald Dahl and solve
    jigsaw puzzles featuring Van Gogh’s Starry Night, and they often sketch their LEGO creations, though they sometimes skip chores to stay up late watching animated movies.
  travel: Allison Schales prefers meticulously planned trips, keeping a hand‑drawn itinerary for each destination; they have explored the Grand Canyon’s rim on a family hike, visited the Smithsonian National
    Air and Space Museum in Washington, D.C., and they dream of trekking through Scandinavia’s fjords, but they can become nervous on spontaneous flights without a schedule.
  culinary: Allison Schales loves assembling cheese‑filled quesadillas, tasting the sweet crunch of strawberry‑topped pancakes, and they proudly measure out ingredients for chocolate chip cookies using
    a mini‑scale, yet they sometimes forget to brush their teeth after sugary snacks, leading to occasional dentist warnings.
  core: Allison Schales, a meticulously organized seven‑year‑old with a competitive edge, balances LEGO engineering, piano practice, and soccer drills while wrestling with worry‑driven perfectionism and
    occasional impulsive spending.
background:
  cultural: Allison was born and raised in Long Beach, a small unincorporated community in Harrison County, Mississippi. Her family belongs to a predominantly white, Southern‑influenced community where
    church gatherings, family picnics, and the county fair are regular social anchors. She learns the values of hospitality, modesty, and respect for tradition, while also being encouraged to pursue academic
    achievement at her local elementary school. The slower‑paced rural setting, with its emphasis on close‑knit neighborly ties and outdoor activities like fishing and hiking, reinforces her preference
    for predictable routines and structured environments.
attributes:
  skills: '[''Reading comprehension'', ''Basic addition and subtraction'', ''Organizing school supplies'', ''LEGO construction'', ''Puzzle solving'', ''Block‑based coding (ScratchJr)'']'
  hobbies: '[''LEGO building'', ''Jigsaw and logic puzzles'', ''Reading adventure/mystery books'', ''Chess'', ''Piano lessons'', ''Soccer practice'', ''Nature walks'', ''Science experiment kits'']'
  career_goals: Weaving her love for order, problem‑solving, and competition, Allison aspires to become a scientist or engineer who designs practical solutions. She dreams of winning her school's upcoming
    science fair and envisions a future career in environmental engineering or veterinary science where she can apply systematic thinking to help living things. In the short term, she hopes to master more
    coding projects and earn a black belt in her local karate class, building the confidence and expertise she feels will serve her long‑term ambitions.
