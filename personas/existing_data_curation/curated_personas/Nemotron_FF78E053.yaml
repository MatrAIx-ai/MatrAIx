    music festivals'', ''DIY woodworking'', ''Volunteering at community events'', ''Reading self‑help books'']'
  career_goals: Hoping to leverage his hands‑on experience into a supervisory role within the next three years, Jason aims to become a team lead at the call centre, then transition to an operations manager
    responsible for training and workflow optimization. He also dreams of completing an online associate’s degree in business administration to broaden his strategic perspective. Long‑term, he envisions
    opening a small café or community space in Wimberley that blends his love for local culture with his service background, giving him both creative freedom and a stable income.
