personas:
  professional: Glade Robinson, a budding digital storyteller, channels their curiosity and methodical nature into crafting interactive graphic novel prototypes on Scratch, often leading a small coding
    club and meticulously planning each narrative arc.
  sports: Glade Robinson, a member of the Long Island Youth Soccer Club U12 team, enjoys weekend practices, follows the New York Mets and New York Knicks religiously, participates in after‑school swim sessions
    at the local pool, but sometimes skips cardio on rainy days.
  arts: Glade Robinson, an avid sketcher and frequent visitor of the Nassau County Museum of Art, draws inspiration from illustrators like Hayao Miyazaki, Jim Lee and the graphic novel series Saga, attends
    community theater productions such as A Midsummer Night's Dream starring local students, and collects vinyl records of Stevie Wonder and Taylor Swift, blending classic and contemporary influences into
    personal art.
  travel: Glade Robinson, who plans trips on a shared family spreadsheet, has explored Manhattan's museum district, visited the historic Freedom Trail in Boston, dreams of traveling to Kyoto to experience
    traditional tea ceremonies and anime culture, and prefers short, budget‑friendly stays that allow time for sketching new surroundings.
  culinary: Glade Robinson, a budding home chef who loves to experiment with homemade sushi rolls using nori, avocado and smoked salmon, whips up quick mac‑and‑cheese with a dash of cheddar and hot sauce
    for comfort, and enjoys indulging in strawberry shortcake from local bakeries, while occasionally over‑seasoning dishes due to youthful enthusiasm.
  core: Glade Robinson, a curious yet methodical 12‑year‑old, blends art, code and quiet reflection into a uniquely organized creative world, balancing solitary sketching with small‑group chess battles,
    while occasionally succumbing to procrastination and snack‑induced distraction.
background:
  cultural: Glade grew up in Great Neck, a suburban community on Long Island known for its diverse, middle-class environment and strong emphasis on education. Her family observes typical American cultural
    traditions, celebrating holidays such as Thanksgiving, Christmas, and the Fourth of July, while also participating in community events like the Great Neck Summer Festival and local library programs.
    Exposure to nearby cultural institutions, including the Nassau County Museum of Art and the Queens Museum, has nurtured her appreciation for visual arts. The multicultural atmosphere of the area, with
    many neighboring families of varied backgrounds, has broadened her perspective and encouraged openness to unconventional ideas.
attributes:
  skills: '[''Research and information synthesis'', ''Basic graphic design'', ''Digital literacy (typing, internet research)'', ''Scratch programming'', ''Introductory Python'', ''Drawing and watercolor
    painting'', ''Art history knowledge'', ''Chess strategy'', ''Creative writing'', ''Organizational planning'']'
  hobbies: '[''Sketching'', ''Visiting art museums'', ''Reading graphic novels and fantasy books'', ''Playing chess'', ''Coding with Scratch'', ''Creative writing'', ''Science experiment kits'', ''Attending
    community theater'', ''Volunteer reading program'', ''Collecting postcards of artworks'']'
  career_goals: Glade aspires to combine her love for art and systematic thinking into a future career that shapes cultural experiences. She dreams of becoming a museum curator or art historian, envisioning
    herself designing exhibitions that tell compelling stories. She is also fascinated by architecture and urban design, considering the possibility of studying architectural engineering to create aesthetic,
    functional spaces. In the short term, she aims to win school art competitions, attend summer art workshops, and develop a portfolio that could support admission to a specialized high school art program.
