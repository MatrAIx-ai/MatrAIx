  career_goals: Jessica dreams of turning her curiosity into a career that blends creativity and problem‑solving. She imagines herself one day working as a museum curator or art‑focused scientist, designing
    interactive exhibits that teach visitors about nature and technology. In the short term, she aims to deepen her skills in graphic design and coding, win a school art competition, and attend a summer
    art‑technology camp. Ultimately, she hopes to pursue a career that lets her explore new ideas, travel to cultural sites, and share her love of art and innovation with others.
