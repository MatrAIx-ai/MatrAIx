personas:
  professional: Jessica Lefkowitz is an aspiring game creator in their coding club, blending their love for storytelling with Scratch programming while applying meticulous organization and calm resilience
    to debug whimsical adventure games.
  sports: Jessica Lefkowitz enjoys weekend bike rides on the Gulf Coast trail with their family, participates in their school’s swim team that practices at the local community pool, and cheers for the Tampa
    Bay Rays, balancing playful activity with a laid‑back approach to fitness.
  arts: Jessica Lefkowitz creates comic‑style characters inspired by Kazu Kibuishi, paints seascapes echoing Winslow Homer’s palette, and finds rhythm in playing the ukulele to songs by Jason Mraz, weaving
    these artistic influences into their school theater productions.
  travel: Jessica Lefkowitz loves spontaneous day trips to nearby Gulf Coast beaches, has explored the historic French Quarter on a school field trip, and dreams of snorkeling the Great Barrier Reef, favoring
    hands‑on experiences over meticulously planned itineraries.
  culinary: Jessica Lefkowitz enjoys baking vanilla cupcakes topped with rainbow sprinkles and experimenting with simple recipes like taco‑style nachos with shredded cheddar, avocado, and lime, yet they
    often forget to clean the kitchen until after dinner.
  core: Jessica Lefkowitz merges a boundless curiosity for art and code with a calm, organized demeanor, occasionally hoarding spare change for future LEGO projects while forgetting to tidy up their sketchbooks.
background:
  cultural: Jessica comes from a white, Southern‑American family rooted in Daphne, Alabama. Her upbringing reflects the region’s emphasis on community, hospitality, and a love for the Gulf Coast’s natural
    environment. Family traditions include Sunday gatherings, church involvement, and celebrations of local festivals such as the Baldwin County Fair and Mardi Gras parades. The local culture—marked by
    Southern cuisine, coastal beach outings, and exposure to regional history through museums—has nurtured her appreciation for art, storytelling, and environmental stewardship. While her heritage includes
    ancestors of English and German descent, Jessica’s identity is shaped more by the contemporary Southern community values of kindness, resilience, and curiosity.
