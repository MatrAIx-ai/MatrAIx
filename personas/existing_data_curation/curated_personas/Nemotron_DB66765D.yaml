  hobbies: '[''Acrylic painting'', ''Abstract sketching'', ''Digital illustration'', ''Reading speculative fiction'', ''Poetry'', ''Book clubs'', ''Yoga'', ''Mindfulness meditation'', ''Coastal hiking'',
    ''Volunteering at community art center'', ''Mentoring young artists'']'
  career_goals: Dara aims to leverage her retail background and creative talents to transition into a role that merges artistic expression with community impact. She plans to complete her Bachelor’s degree
    in Art or Art Therapy within the next three years, with the goal of becoming a visual merchandiser for a forward‑thinking brand or an art‑based community outreach coordinator at a nonprofit. Long‑term,
    she aspires to open a small studio space in Orange County where she can host workshops, sell original artwork and crafts, and provide therapeutic art programs for youth and seniors.
