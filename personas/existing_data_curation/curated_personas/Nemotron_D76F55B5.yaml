  career_goals: John’s primary ambition is to stay active and useful in his community while preserving his health and independence. He hopes to mentor high‑school students through the local robotics club,
    share his gardening expertise at the senior center, and compile a memoir of his 40‑year engineering career. He also looks forward to traveling with his wife across historic New England sites and continuing
    his involvement with the town’s historical society.
