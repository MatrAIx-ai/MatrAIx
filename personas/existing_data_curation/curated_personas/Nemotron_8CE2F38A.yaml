    scheduling'', ''Bilingual communication (English and Mandarin)'']'
  hobbies: '[''Sketching and digital illustration'', ''Calligraphy'', ''Landscape photography'', ''Model building and robotics kits'', ''Reading speculative fiction and philosophy'', ''Maker space collaboration
    on small projects'', ''Volunteering at cultural festivals'', ''Hiking in the Sonoran Desert'']'
  career_goals: Hsing Geun aspires to become a master die maker within the next five years, earning advanced certifications in CNC programming and precision engineering. He aims to lead a small R&D team
    that develops innovative, high‑precision tooling for aerospace and medical device manufacturers. Ultimately, he envisions launching his own boutique workshop where he can integrate artistic aesthetics
    into functional tool design, bridging his technical expertise with his appreciation for creative expression. Continuing his education toward a bachelor's degree in mechanical engineering is also a long‑term
    goal to broaden his design capabilities.
