personas:
  professional: Paulo Castillo is a reliable part‑time handyman in Hartsville, leveraging their carpentry, plumbing, electrical, and automotive repair skills while adhering to a strict routine and a competitive
    edge to become the go‑to local repair specialist, and is working toward an OSHA certification to bolster credibility.
  sports: Paulo Castillo enjoys early‑morning fishing on Duck River, competes in local angling tournaments, and avidly follows the Carolina Panthers and the South Carolina Gamecocks while occasionally joining
    community basketball pick‑up games to stay active.
  arts: Paulo Castillo immerses themselves in classic cinema from their heritage, frequently watching the films of Luis Buñuel and Pedro Armendáriz, reads historical non‑fiction about the American South
    and beyond, and finds creative fulfillment in woodworking while listening to folk singers like Lila Downs.
  travel: Paulo Castillo favors well‑planned road trips that balance relaxation with cultural discovery, having explored historic Charleston, Savannah, and Santa Fe, and dreams of visiting the Azores and
    the ancient ruins of Tulum while keeping travel expenses modest due to budget constraints.
  culinary: Paulo Castillo proudly prepares traditional dishes such as mole poblano, tamales de puerco, and salsa verde, meticulously grinding dried chilies, cacao, and almonds for mole and using fresh
    cilantro and epazote from their garden to enrich each recipe.
  core: Paulo Castillo is a routine‑driven, competitive handyman who worries about finances and health, finds solace in solitary fishing and woodworking, and nurtures their heritage through cooking and
    classic films.
background:
  cultural: Paulo is a first-generation Mexican American whose family immigrated to the United States in the 1970s. He grew up speaking Spanish at home and maintains strong ties to Mexican customs, celebrating
    Dia de los Muertos, quinceaneras, and seasonal holidays with traditional foods and music. While living in rural Tennessee, he has blended his heritage with local Southern culture, attending a bilingual
    Catholic parish and participating in community events that emphasize family and neighborly support. His cultural identity influences his cooking, language use, and the value he places on practical,
    family-centered routines.
