  career_goals: Although currently not employed, Paulo hopes to translate his hands-on abilities into a part-time handyman service for neighbors in Hartsville, allowing him to earn supplemental income while
    maintaining a predictable schedule. He plans to obtain a basic OSHA safety certification to boost credibility and to volunteer occasionally at the local community center, where he can offer maintenance
    assistance. His long-term ambition is to achieve financial stability that reduces his stress and to be recognized locally as the go-to person for reliable, practical repairs.
