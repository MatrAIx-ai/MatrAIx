  career_goals: Lucinda aspires to become a Certified Public Accountant within the next three years, seeing the credential as a pathway to greater responsibility and professional credibility. In the medium
    term, she aims to advance to a senior auditor position, leading audit engagements for mid‑size regional clients while maintaining the structured, routine‑oriented work environment she values. She envisions
    eventually moving into a supervisory or managerial role where she can mentor newer staff, promote consistent best practices, and contribute to the firm’s reputation for reliability and client satisfaction.
    Throughout her career progression, Lucinda prioritizes stability, work‑life balance, and opportunities to apply her practical problem‑solving skills to improve financial processes.
