  career_goals: Reginald envisions a future where he merges his love of art and technology, aiming to become an interactive media designer or game developer who creates educational experiences for children.
    He also hopes to study graphic illustration at a university and later work as a community art coordinator, designing programs that combine creativity and STEM for young learners. A long‑term ambition
    is to curate an exhibit that highlights African‑American artists and innovators, sharing cultural heritage with a wider audience.
