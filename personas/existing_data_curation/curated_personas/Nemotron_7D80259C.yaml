personas:
  professional: Reginald Glover, an aspiring young digital illustrator and Scratch programmer, blends his meticulous planning and boundless curiosity to craft animated stories that honor his family's migration
    narratives, often working in small, focused groups.
  sports: Reginald Glover, a dedicated member of Fairfax Youth Soccer Academy and a fervent fan of the Washington Wizards and Washington Capitals, enjoys weekend basketball games with friends and tackles
    summer baseball drills, approaching fitness with a disciplined schedule that mirrors their organized nature.
  arts: Reginald Glover, a budding visual artist, spends afternoons sketching comic heroes while listening to Miles Davis, Kendrick Lamar, and spoken‑word performances from local poets, drawing inspiration
    from community‑center exhibitions that celebrate the artistry of the diaspora.
  travel: Reginald Glover, a curious traveler, has explored Washington, D.C.’s national museums and Virginia Beach’s shoreline, eagerly plans a future trip to New Orleans for its jazz scene, and dreams
    of wandering the vibrant streets of Tokyo, preferring a mix of guided tours and spontaneous neighborhood discoveries.
  culinary: Reginald Glover, an enthusiastic home chef, loves crafting macaroni‑and‑cheese topped with crunchy breadcrumbs, experimenting with collard‑green stir‑fry, and blending mango‑spinach smoothies,
    though they often forget to clean the kitchen after cooking.
  core: Reginald Glover, a disciplined ten‑year‑old with a sketchbook always at hand, channels their love for LEGO architecture and jazz beats into creative projects, yet habitually misplaces their glasses
    and procrastinates on chores.
background:
  cultural: Reginald is an African‑American boy raised in Fairfax, Virginia, within a close‑knit multigenerational family. His grandparents migrated from the rural South in the 1970s, bringing stories of
    resilience and cultural traditions that shape his sense of identity. At home, he learns about African‑American history through family anecdotes, visits to the African American Museum of Virginia, and
    participation in community events such as Juneteenth celebrations and local cultural festivals. His parents encourage reading works by Black authors and support his involvement in a community‑center
    program that highlights Black artists and musicians. This background informs his appreciation for jazz, spoken‑word poetry, and visual arts of the Black diaspora, and it motivates his aspiration to
    showcase this heritage in future creative projects.
