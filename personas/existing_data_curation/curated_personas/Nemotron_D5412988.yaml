  hobbies: '[''Morning desert hikes'', ''Golf'', ''Community volunteer work (senior center workshops)'', ''Cooking Mediterranean meals with spouse'', ''Landscape gardening'', ''Live music and cultural festivals
    in Palm Springs'', ''Board game nights with friends'', ''Reading leadership and psychology non‑fiction'', ''Traveling to national parks with family'']'
  career_goals: Ian aims to advance into a senior learning architect role where he can shape organization‑wide talent development strategies and mentor emerging trainers. He envisions leading a cross‑functional
    learning center of excellence, expanding the use of data analytics to personalize training pathways, and publishing thought‑leadership articles on practical adult education. In the longer term, Ian
    hopes to launch his own consulting practice that helps mid‑size firms build sustainable, routine‑driven learning cultures while preserving flexibility for innovation.
