persona_description: A network systems administrator who is responsible for overseeing the day-to-day operations of complex computer networks, ensuring the proper functioning of local area networks (LANs),
  wide area networks (WANs), intranets, ethernets, and other network segments. This professional is typically found installing network software, making necessary upgrades, maintaining computer system security,
  collecting data on the network’s performance, adding users to the network, training employees on proper system use, and brainstorming solutions to any network problems. This person may find job opportunities
  in computer systems design firms, educational services, manufacturing companies, financial institutions, information technology (IT) departments, insurance corporations, healthcare organizations, and
  more. They work closely with network architects, computer systems managers, and other information technology staff members during their workday.
