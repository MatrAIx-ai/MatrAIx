persona_description: A school principal who is passionate about integrating hands-on learning into the curriculum and believes that making can be an integral part of how young people figure out who they
  are in the world. They are dedicated to providing a hand-mind approach to academics and are committed to creating a supportive environment for students to engage with their hands and minds. They understand
  the importance of providing opportunities for students to explore, fail, and learn from their mistakes, and they are willing to challenge traditional time structures to promote exploration and smart failures.
  They are also aware of the need to bring traditional academic disciplines into the making process and to prepare a whole generation of young people to succeed in the challenging careers out there now.
