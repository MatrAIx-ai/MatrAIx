personas:
  professional: Altagracia Nunez, an aspiring data analyst in business analytics, leverages their meticulous Excel pivot‑table expertise, burgeoning Python data‑cleaning skills, and bilingual technical
    translation ability to produce precise forecasts, while their competitive drive and methodical planning push them to consistently outshine peers in demanding internship tasks.
  sports: Altagracia Nunez enjoys solitary fitness routines like hiking the quiet trails of Bosque del Apache and occasional weekend sessions with a local pickleball club, while they keep an eye on the
    New Mexico United soccer team and the New Mexico State Aggies football for seasonal motivation.
  arts: Altagracia Nunez refines their beginner watercolor technique by painting detailed botanical studies inspired by the delicate precision of Georgia O’Keeffe and the luminous palettes of Claude Monet,
    and they unwind listening to the minimalist piano compositions of Ludovico Einaudi and the folk narratives of Joan Baez.
  travel: Altagracia Nunez prefers meticulously planned solo trips that blend quiet nature retreats with research opportunities, having trekked the Grand Canyon, explored the lavender fields of Provence,
    and dreaming of an agritech immersion in the greenhouse farms of Almería, Spain.
  culinary: Altagracia Nunez treats cooking as a precise experiment, perfecting paella with saffron, rabbit, and a medley of shellfish, and simmering gazpacho that balances ripe tomatoes, cucumber, and
    sherry vinegar, while they constantly tweak ratios to achieve textbook flavor symmetry.
  core: Altagracia Nunez blends analytical rigor with a restless curiosity, channeling their love of orderly puzzles into data‑driven ambitions, yet nightly worry spirals drive a compulsive journaling habit
    that both calms and fuels their competitive edge.
background:
  cultural: Altagracia’s family originates from Spain, and she was raised bilingual, speaking both Spanish and English at home. Family gatherings often feature Spanish customs such as tapas‑style meals,
    flamenco music, and celebrations of holidays like Día de los Reyes. Living in Clovis, New Mexico, she has also absorbed elements of the local Hispanic and Native American culture, enjoying regional
    foods such as posole and participating in community fiestas. Her cultural identity blends European Spanish traditions with the multicultural influences of the Southwest, shaping her values, language
    use, and appreciation for both her ancestral roots and her adopted community.
attributes:
  skills: '[''Data analysis (Excel, Python)'', ''Project planning and coordination'', ''Financial forecasting'', ''Market research'', ''Bilingual communication (Spanish/English)'', ''Time management'',
