  hobbies: '[''Reading nonfiction (psychology, sustainability, business)'', ''Journaling'', ''Sudoku and crossword puzzles'', ''Watercolor painting (botanical subjects)'', ''Hiking in Bosque del Apache'',
    ''Cooking traditional Spanish dishes'']'
  career_goals: Altagracia aims to finish a bachelor’s degree in Business Analytics within the next two years and secure an internship in data analytics to gain hands‑on experience. Her long‑term ambition
    is to become a data analyst or project manager for an agritech company focused on sustainable farming practices in the Southwest, using her analytical abilities to optimise water use and crop yields.
    She plans to obtain a CAPM certification to validate her project‑management competence and to build a reputation as a reliable, results‑driven professional who can outperform peers in a competitive
    environment. Recognising her sensitivity to stress, she also intends to attend mindfulness and stress‑management workshops to maintain her mental well‑being while pursuing these goals.
