  hobbies: '[''Visiting art galleries and museums'', ''Reading poetry and classic literature'', ''Gardening native Texas plants'', ''Photography of natural landscapes'', ''Participating in small book-club
    meetings'', ''Exploring historic towns and local heritage sites'', ''Volunteer work with the local historical society'', ''Cooking seasonal Texan dishes'', ''Knitting'', ''Listening to classical and
    folk music'']'
  career_goals: Janice plans to continue her personal enrichment and community contributions. She aims to complete an online certificate in museum studies to deepen her curatorial knowledge, to write and
    self‑publish a memoir of her family’s Texas heritage, and to launch a mentorship series pairing high school students with senior volunteers for art projects. She also hopes to travel to three major
    art museums outside the U.S. over the next five years and to expand the local historical society’s oral‑history archive.
