personas:
  professional: An experienced community art volunteer and aspiring curator, Janice Perry blends their lifelong art history expertise and literary analysis acumen with a natural talent for mediating small
    group discussions, coordinating hands‑on workshops at the Georgetown Art Center, and they are currently pursuing an online museum studies certificate despite their spontaneous resistance to rigid deadlines.
  sports: An avid lover of gentle fitness, Janice Perry spends mornings strolling the Lady Bird Lake trail with the Georgetown Walking Club, joins the Hill Country Pickleball League each winter, and they
    faithfully cheer for the Dallas Cowboys and Texas Rangers during football and baseball seasons.
  arts: A devoted patron of the arts, Janice Perry frequents the Georgetown Art Center and local galleries, immerses themselves in the works of Georgia O'Keeffe, Monet, and contemporary folk troubadour
    Townes Van Zandt, curates monthly poetry discussions featuring Walt Whitman and Maya Angelou, and often ends their evenings listening to Yo‑Yo Ma’s cello recordings alongside regional fiddle tunes.
  travel: With a love for road‑trip spontaneity, Janice Perry plans to visit three world‑renowned museums—the Louvre in Paris, the Uffizi in Florence, and the Tate Modern in London—while regularly exploring
    Texas gems like Fredericksburg’s historic Main Street and Enchanted Rock, preferring to drive their modest sedan, pack a picnic of peach cobbler, and let the open road dictate their itinerary.
  culinary: In the kitchen Janice Perry, an enthusiastic home cook with a solid grasp of Southern‑Texan cuisine, often prepares slow‑smoked brisket seasoned with mesquite wood, rosemary, and oregano from
    their garden, whips up fresh peach cobbler with a flaky crust, and experiments with seasonal herb‑infused enchilada sauces, though they occasionally burn the garlic when lost in thought.
  core: Janice Perry, a curious yet delightfully disorganized septuagenarian, spends their days photographing wildflowers for friends, weaving poetry into community art projects, and pausing mid‑sentence
    to chase a wayward squirrel into their garden.
background:
  cultural: Janice is a white Texan whose upbringing in the central Hill Country has blended Southern hospitality with a strong sense of community independence. Raised in a family that valued education,
    church involvement, and outdoor recreation, she absorbed a respect for tradition alongside an openness to new ideas. The cultural milieu of Georgetown — with its historic preservation ethos, vibrant
    local arts scene, and proximity to Austin’s eclectic culture — has shaped her appreciation for both regional heritage and broader artistic expression. Her heritage includes European‑American ancestry,
    and she identifies with the modest, cooperative values that characterize many long‑time residents of Williamson County.
