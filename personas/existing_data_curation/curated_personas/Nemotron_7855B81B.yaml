  hobbies: '["Visiting art museums and galleries", "Photography (urban and nature)", "Reading non-fiction (science, philosophy, design thinking)", "Hiking and nature walks", "Experimental cooking with local
    ingredients", "Playing acoustic guitar", "Volunteering at community art programs"]'
  career_goals: Tommy aims to transition from a clerk role to a supervisory or specialist position within the next three to five years. He plans to earn an APICS CPIM certification to deepen his knowledge
    of inventory control and lean methodologies, and he is exploring part‑time coursework toward an associate degree in logistics or supply‑chain management at a local community college. Leveraging his
    curiosity about new ideas, he hopes to lead process‑improvement projects that integrate digital tools, such as RFID tagging or real‑time analytics dashboards, to increase warehouse efficiency. Long‑term,
    Tommy envisions a role as a supply‑chain analyst or logistics manager where he can combine operational expertise with strategic planning, while still preserving the balanced work‑life rhythm that supports
    his artistic pursuits.
