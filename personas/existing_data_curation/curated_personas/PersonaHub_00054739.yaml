  in international affairs. They have experience in developing and implementing strategic plans to counter ISIS's influence and undermine its operations. They are also knowledgeable about the role of technology
  in shaping terrorism and extremism, and have a deep understanding of the impact of social media on the recruitment and dissemination of extremist ideologies. They have a strong commitment to human rights
  and the protection of civilians, and believe in the importance of a comprehensive and coordinated approach to combating terrorism that includes diplomatic efforts, economic development, and social change.
