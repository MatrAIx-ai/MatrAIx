  hobbies: '[''Kayaking and paddling'', ''Bird watching'', ''Fishing'', ''Watercolor painting and sketching'', ''Visiting art galleries'', ''Reading non‑fiction (medicine, philosophy, history)'', ''Online
    learning (anatomy, photography)'', ''Volunteering as an art docent'']'
  career_goals: Matt plans to earn his GED within the next year and enroll in a Licensed Practical Nurse (LPN) program, with the long‑term ambition of becoming a Registered Nurse (RN) specializing in geriatric
    care. He aims to move into a shift‑supervisor role, where he can champion an art‑therapy initiative for patients at his facility. Additionally, he seeks certification in healthcare quality improvement
    and hopes to develop community‑health outreach programs for seniors in Sarasota County, combining his competitive drive with his desire for evidence‑based, innovative care.
