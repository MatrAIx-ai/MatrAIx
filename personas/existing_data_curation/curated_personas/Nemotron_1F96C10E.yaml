  career_goals: Carmencita aims to advance into a lead journeyman and supervisory role within the next few years, securing certifications such as Certified Welder and CNC Operator. She intends to become
    a designated safety officer, championing a zero‑incident workplace, and to earn a Lean Six Sigma Green Belt to drive continuous improvement. Long‑term, she envisions launching a small, family‑run contract
    metal‑workshop that serves local manufacturers, while also mentoring the next generation of skilled tradespeople and building a comfortable retirement fund.
