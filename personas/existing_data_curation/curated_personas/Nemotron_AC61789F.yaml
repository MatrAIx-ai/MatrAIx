  hobbies: '["Abstract Painting", "Digital Illustration", "Reading (Literary Fiction & Philosophy)", "Visiting Art Galleries", "Cooking Mexican Cuisine", "Volunteer Tax Assistance", "Yoga and Meditation",
    "Hiking", "Playing Acoustic Guitar", "Participating in Community Cultural Festivals"]'
  career_goals: Maria aims to transition from a dedicated clerk to a senior accounting professional within the next five years. She plans to earn the Certified Bookkeeper credential and eventually pursue
    a CPA designation, leveraging her high school foundation with targeted associate and bachelor's courses in accounting. Her long‑term ambition is to launch a boutique bookkeeping consultancy that serves
    small, family‑run businesses—particularly those in the Hispanic community—where she can blend her technical expertise with creative financial reporting and data visualization. Maria also hopes to mentor
    other women entering the finance field, fostering a supportive network that aligns with her compassionate personality. Throughout her career progression, she prioritizes work‑life balance and stress‑management
    strategies to maintain her well‑being.
