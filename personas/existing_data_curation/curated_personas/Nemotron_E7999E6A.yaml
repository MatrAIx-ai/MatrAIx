  hobbies: '[''Vegetable gardening'', ''Cooking Chinese recipes'', ''Hiking the Rocky Mountains'', ''Tai Chi practice'', ''Chinese calligraphy'', ''Reading historical biographies'', ''Volunteering at the
    local senior center'', ''Attending Lunar New Year celebrations'', ''Listening to classical Chinese music'', ''Watching documentary films'']'
  career_goals: Although retired from formal employment, Jun aims to stay purposeful by mentoring younger neighbors in practical DIY skills, preserving his family's cultural heritage through cooking workshops
    and calligraphy classes, and maintaining his health through regular Tai Chi and walking routines. He also hopes to travel with his wife to visit relatives in China, document their family history for
    future generations, and take on a more active role in senior‑center programming in Denver to foster intergenerational connections.
