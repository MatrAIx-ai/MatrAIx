personas:
  professional: Jun Duan, a retired handyman‑turned‑community mentor, leverages their hands‑on expertise in home repair, gardening, and bilingual communication to guide younger neighbors and coordinate
    senior‑center programs, blending a practical, structured approach with a relaxed, flexible style.
  sports: Jun Duan enjoys low‑impact fitness through daily Tai Chi in Washington Park and weekend hikes on the Rocky Mountain foothills, cheerfully follows the Denver Broncos and Colorado Rockies, and occasionally
    joins a local senior walking club, balancing structured exercise routines with a flexible, relaxed attitude.
  arts: Jun Duan finds solace in Chinese calligraphy and enjoys listening to Yo‑Yo Ma’s cello suites, attending local theater productions of classic plays, and collecting prints by Vincent van Gogh, allowing
    artistic pursuits to punctuate their otherwise pragmatic daily schedule.
  travel: Jun Duan prefers carefully planned yet leisurely trips, having explored Yellowstone and the Grand Canyon with their spouse, and now hopes to journey to Guangzhou and the ancestral hometown in
    southern China, balancing budget‑conscious travel with occasional splurges on authentic culinary experiences.
  culinary: Jun Duan blends traditional Sichuan‑style mapo tofu with Western comfort foods like beef stroganoff, experimenting with ingredients such as fermented bean paste, fresh rosemary, and locally
    grown heirloom tomatoes from their year‑round vegetable garden, while their cooking skill ranges from precise wok stir‑fry to rustic, improvisational soups.
  core: Jun Duan is a practical yet whimsically disorganized 68‑year‑old who steadies their days with garden routines, Tai Chi, and community mentorship, all while battling a chronic worry about the future
    and a habit of misplacing their gardening gloves.
background:
  cultural: Jun is a second‑generation Chinese‑American whose parents immigrated from mainland China in the 1960s. Growing up bilingual, he internalized Confucian values of family respect and communal responsibility
    while also embracing the individualism and outdoor lifestyle of the American West. He celebrates Lunar New Year and Mid‑Autumn Festival with his extended family, prepares traditional dishes, and maintains
    a small shrine honoring ancestors. Living in Denver, he blends these cultural roots with local customs, participating in community events and integrating his heritage into everyday life.
attributes:
