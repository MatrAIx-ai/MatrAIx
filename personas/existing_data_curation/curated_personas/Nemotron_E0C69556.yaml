  career_goals: Lawrence aims to advance to a senior leadership role such as Director of Strategy or Chief Management Analyst within a regional government agency or consulting firm. He wants to lead cross‑functional
    teams that blend data‑driven decision making with cultural and artistic insights, developing innovative frameworks for public policy and organizational improvement. Over the next five years, he plans
    to complete an executive MBA, publish articles on integrating humanities perspectives into analytics, and mentor emerging analysts while positioning himself as a thought leader in strategic innovation.
