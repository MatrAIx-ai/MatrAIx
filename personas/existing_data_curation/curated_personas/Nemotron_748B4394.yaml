  hobbies: '[''Zumba & Yoga'', ''Mexican Cooking'', ''Community Volunteering'', ''Salsa Dancing'', ''Hiking'', ''Reading self-help/psychology'', ''Co-ed Soccer league'']'
  career_goals: Blanca aspires to advance into a senior analytics leadership role, eventually overseeing a cross‑functional team that drives strategic decisions for a multinational logistics firm operating
    along the U.S.–Mexico border. She plans to earn an advanced data‑science certification and pursue an MBA to deepen her strategic acumen. Long‑term, she hopes to launch a consulting practice that helps
    small border‑region businesses improve operational efficiency while also creating a mentorship program to support Latina professionals in the corporate world. Throughout her career, Blanca is committed
    to integrating employee well‑being initiatives and fostering an inclusive, collaborative workplace culture.
