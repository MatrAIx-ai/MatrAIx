personas:
  professional: Blanca Montequin, a 31‑year‑old management analyst specializing in logistics performance metrics, merges her strong Excel, SQL, and Power BI expertise with a methodical, structured approach
    and a compassionate, team‑oriented mindset, ensuring data‑driven decisions are both precise and inclusive.
  sports: Blanca Montequin energizes her weekly routine with Zumba and yoga classes, competes in a co‑ed soccer league called the Border City Strikers, hikes the Guadalupe Mountains on weekends, and avidly
    supports the Dallas Cowboys and Houston Astros, cheering them on while tracking her own performance metrics in a personal fitness app.
  arts: Blanca Montequin channels her outgoing spirit into salsa dancing at community festivals, regularly listens to the rhythms of Celia Cruz and Marc Antonio, visits local art galleries to admire Frida Kahlo’s
    vivid portraits, and unwinds with self‑help podcasts featuring Brené Brown, weaving artistic inspiration into both her personal and professional life.
  travel: Blanca Montequin prefers meticulously planned weekend getaways that balance adventure and relaxation, has already trekked the Guadalupe Mountains and explored the historic streets of Santa Fe,
    and dreams of trekking Patagonia’s Torres del Paine while budgeting her travel fund to ensure she can maintain her savings goals.
  culinary: Blanca Montequin, an avid home chef, perfects mole with toasted chilies and cacao, rolls tamales using fresh masa and pork, whips up vibrant salsas with jalapeño, cilantro, and lime, and often
    hosts dinner parties where she pairs her dishes with handcrafted margaritas, though she sometimes loses track of time in the kitchen, sacrificing sleep.
  core: Blanca Montequin blends analytical rigor with a love for lively salsa, relentless budgeting, and a habit of staying up late perfecting mole, all while balancing a chronic worry that drives her to
    over‑plan both spreadsheets and weekend hikes.
background:
  cultural: Blanca was born and raised in El Paso, Texas, to Mexican immigrant parents. She grew up bilingual, speaking Spanish at home and English at school, which gave her a deep appreciation for both
    Mexican and American cultures. Family gatherings are centered around traditional Mexican celebrations such as Día de los Muertos and Mexican Independence Day, reflecting her strong Catholic roots and
    love for community rituals. She maintains close ties with relatives in Mexico, visiting frequently and staying connected through family events and cultural traditions. Living on the border, Blanca embodies
    a bicultural identity that values family solidarity, community support, and the warm, collaborative spirit typical of Latino culture, all of which shape her compassionate and cooperative approach in
    both personal and professional settings.
attributes:
  skills: '[''Data Analysis'', ''Business Intelligence (Power BI, Tableau)'', ''Financial Modeling'', ''Process Improvement (Lean Six Sigma basics)'', ''Project Management'', ''Bilingual Spanish-English
