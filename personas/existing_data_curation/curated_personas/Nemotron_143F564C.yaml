  career_goals: Tony aspires to transition into a lead engineering role where he can shape product strategy while maintaining hands‑on coding involvement. He aims to obtain advanced cloud certifications
    (AWS Solutions Architect, Kubernetes Administrator) and eventually move into a technology manager position overseeing multiple squads. He is also interested in launching a side venture that leverages
    AI to streamline workflow automation, balancing his curiosity for emerging tech with his practical focus on delivering reliable solutions. Managing stress and work‑life balance remain central to his
    long‑term career planning.
