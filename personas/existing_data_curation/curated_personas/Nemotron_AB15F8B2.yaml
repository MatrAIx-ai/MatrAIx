  career_goals: Looking ahead, Deborah aims to move into a leadership role within IT service management, such as Help‑Desk Supervisor or IT Service Manager, where she can shape team culture and drive process
    improvements. She plans to earn ITIL Expert certification and pursue a Master's degree in Information Systems to deepen her strategic perspective. Her long‑term ambition includes bridging her technical
    expertise with her love for the arts by overseeing support for creative‑software products or leading user‑experience research for digital art tools. Additionally, she hopes to expand her community impact
    by establishing a nonprofit program that teaches digital literacy to senior citizens and underserved neighborhoods in Houston.
