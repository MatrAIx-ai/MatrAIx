personas:
  professional: Deborah Aguero, a 44‑year‑old IT service specialist, they blend Midwestern diligence with Southern hospitality while diagnosing Windows, macOS, and Linux issues, scripting routine tasks
    in PowerShell and Python, and mentoring colleagues, turning their curiosity and relaxed approach into innovative, people‑first service solutions.
  sports: Deborah Aguero, a 44‑year‑old outdoor lover, they spend Saturdays trekking the Sam Houston National Forest, cheer loudly for the Houston Astros and Rockets at the local bar, and join a mixed‑gender
    recreational soccer league called the Houston Lone Star Strikers, using their energetic, sociable nature to stay fit while bonding with teammates.
  arts: Deborah Aguero, a 44‑year‑old creative explorer, they channel curiosity into watercolor studies inspired by Georgia O'Keeffe, capture candid street moments reminiscent of Vivian Maier, and sharpen
    improv skills at the Houston Improv Collective, while regular visits to the Museum of Fine Arts fuel their admiration for contemporary artist Chris Bostwick.
  travel: Deborah Aguero, a 44‑year‑old adventure seeker, they prefer loosely planned road trips that blend cultural festivals with natural scenery, often cruising to Austin for live music, driving north
    to the Hill Country for wine tasting, and dreaming of a future overseas adventure to Barcelona’s street‑art districts after a recent weekend getaway to New Orleans.
  culinary: Deborah Aguero, a 44‑year‑old culinary experimenter, they delight in whipping up chipotle‑kimchi tacos and honey‑glazed barbecue short ribs spiced with Moroccan harissa, frequently layering
    fresh cilantro, lime‑marinated corn tortillas, and smoky black‑bean salsa, while swapping recipes at potluck gatherings with friends.
  core: Deborah Aguero, a 44‑year‑old tech‑savvy empath, they balance a passion for spontaneous creativity with a habit of misplacing their to‑do list, turning curiosity into community‑focused IT leadership.
background:
  cultural: Deborah is a White American who grew up in a suburban community on the outskirts of Houston. Her family's roots trace back to German and Irish ancestors who settled in the Midwest before moving
    to Texas in the 1970s, bringing a blend of Midwestern work ethic and Southern hospitality. Raised in a multicultural city, she was exposed early to the vibrant diversity of Houston's food, music, and
    art scenes, which cultivated her appreciation for varied cultural perspectives. While she celebrates traditional American holidays like Thanksgiving and Fourth of July, she also embraces local festivals
    such as the Houston Livestock Show & Rodeo and the multicultural Art Car Parade, reflecting an inclusive worldview shaped by the city's rich tapestry.
