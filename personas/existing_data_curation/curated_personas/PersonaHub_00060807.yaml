persona_description: A pilot who specialized in the Ju 88 series, particularly in its role as a night fighter. He was known for his toughness and speed, and was one of the early adopters of the jet engine
  on the Ju 88. He was involved in the development of the Ju 88A-1, and was part of the team that tested the early jet engines. He was also involved in the use of the Ju 88As in the Firth of Forth, and
  later in the Battle of Britain and the invasion of Poland. He was a skilled night fighter pilot who was able to destroy more Allied bombers than any other night fighter combined. He continued to fly the
  Ju 88Gs until 1945, and was the last German plane shot down over Britain.
