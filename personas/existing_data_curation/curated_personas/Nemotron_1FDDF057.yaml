  hobbies: '[''drawing'', ''visiting art museums'', ''reading picture books'', ''building LEGO structures'', ''using ScratchJr'', ''listening to music'', ''riding his bike'', ''exploring nature'']'
  career_goals: Marcus dreams of one day becoming an artist who creates murals that tell community stories, an astronaut who explores new worlds, or a scientist who invents inventions that help people.
    He is motivated by his curiosity and wants a future where he can combine creativity with problem‑solving to make a positive impact.
