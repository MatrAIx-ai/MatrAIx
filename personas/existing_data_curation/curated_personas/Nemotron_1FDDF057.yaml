personas:
  professional: Marcus Similien, a budding visual storyteller, channels their curiosity and love for reading into richly detailed sketches of book characters, keeping art supplies meticulously organized
    while allowing spontaneous creative bursts, and sometimes frets over perfection in their drawings, though they eagerly show their work to friends during playdates.
  sports: Marcus Similien, a bike‑enthusiast who pedals around the neighborhood after school, belongs to the local youth cycling club, fervently roots for the hometown baseball team the River City Raptors,
    dabbles in soccer practice on weekends, yet they occasionally over‑exert and worry about bruises after a tumble.
  arts: Marcus Similien, an eager museum‑goer, spends weekends at the city art museum absorbing works by Van Gogh and Yayoi Kusama, sketches scenes inspired by those masterpieces while listening to a blend
    of gospel choirs, hip‑hop beats, and Beethoven’s symphonies, and sometimes feels overwhelmed by crowded galleries, prompting them to retreat to quiet corners, yet they return with renewed curiosity
    after a short break.
  travel: Marcus Similien, a curious explorer, delights in family road trips to Washington DC's Smithsonian museums and dreams of a future adventure to Paris to stand before the Louvre’s Mona Lisa, often
    mapping imaginary itineraries with crayons, yet they sometimes feel anxious about unfamiliar foods and new environments.
  culinary: Marcus Similien, a budding foodie, loves the sweet tang of strawberry‑banana smoothies, the cheesy comfort of pepperoni pizza, and occasionally helps their parent whisk together homemade spaghetti
    sauce with fresh basil and garlic, but they often negotiate extra snack time with a stubborn “just one more” bite and forget to eat their broccoli.
  core: Marcus Similien, a 7‑year‑old art‑obsessed explorer, balances meticulous sketching and LEGO engineering with a vivid imagination, occasional worry, and a love for music spanning gospel, hip‑hop,
    and classical, and they often turn the backyard into a quiet studio when overwhelmed.
background:
  cultural: Marcus is raised in a Black family in Saint Paul, Minnesota, where family traditions, community gatherings, and local cultural events shape his identity. He participates in Kwanzaa celebrations
    at his church, enjoys Afrocentric storytime sessions at the public library, and is exposed to a blend of gospel, jazz, and contemporary hip‑hop music. Growing up in a multicultural neighborhood, he
    values both his African American heritage and the diverse cultural expressions of his city, which influence his love for art, music, and storytelling.
