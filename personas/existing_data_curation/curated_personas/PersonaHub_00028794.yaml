persona_description: Mike Myatt, a contributor who writes about leadership myths and advocates for courage as a trait possessed by all great leaders. He believes that courage is the first virtue and that
  a lack thereof can be overcome through teaching and learning. Myatt believes that courage is about making difficult decisions and that leaders who consistently demonstrate courage will stand apart from
  the masses and earn the trust and loyalty of those whom they lead. He encourages readers to pursue courage and not just check off boxes, and to remember that courage is about accepting courage in others
  rather than stunting it. Myatt's writing style is informative and fine-grained, reflecting his expertise in leadership and courage.
