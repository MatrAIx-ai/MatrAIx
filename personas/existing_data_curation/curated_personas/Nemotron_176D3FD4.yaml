  hobbies: '[''Journaling and planning'', ''Reading mystery and non-fiction books'', ''Solving puzzles (Sudoku, crosswords)'', ''Sketching and drawing'', ''Playing piano'', ''Cooking family recipes'', ''Digital
    photography of desert landscapes'', ''Succulent gardening'', ''Coding simple games in Scratch'', ''Tutoring younger peers in math'']'
  career_goals: Luz aims to maintain top academic performance through high school, especially in STEM subjects, and to join her school's robotics and math clubs. She plans to attend a summer engineering
    program to deepen her interest in civil and environmental engineering. Her long‑term goal is to earn a bachelor's degree in civil/environmental engineering, obtain professional licensure, and work on
    sustainable water‑management and infrastructure projects that serve the desert communities of New Mexico. She hopes to secure a scholarship that acknowledges her academic discipline and community involvement,
    ultimately contributing to the resilience of her hometown.
