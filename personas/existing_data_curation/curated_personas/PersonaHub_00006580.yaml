persona_description: A transportation planner or engineer who is concerned about the needs of older people in their work and is actively seeking ways to improve the safety and accessibility of roads, sidewalks,
  and intersections for older drivers and pedestrians. They are aware of the challenges that older road users face and are committed to finding solutions that address these issues. This person is likely
  to be familiar with the concept of complete streets and the benefits of incorporating these principles into transportation planning and design. They may also be involved in advocacy efforts to promote
  the adoption of complete streets policies in their community or region.
