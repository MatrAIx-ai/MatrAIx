  RNA phylogenies. This person may also be involved in the field of systems biology, which involves using high-throughput bioanalytical methods, information technology, and computational modeling to shift
  approaches to biological research from reductionist strategies to pathway- and system-level strategies. This person is likely to have a background in evolutionary biology, genetics, and bioinformatics,
  and may have expertise in phylogenetic analysis, genome sequencing, and bioinformatics.
