  career_goals: Kevin aspires to advance from senior auditor to audit manager within the next two years, ultimately targeting a director‑of‑finance role or partnership in his CPA firm. He aims to lead a
    digital‑transformation initiative that integrates AI‑assisted data sampling and blockchain verification into audit workflows, boosting efficiency and accuracy. Concurrently, he plans to obtain his Certified
    Management Accountant (CMA) designation and to mentor emerging accountants, fostering ethical stewardship and collaborative problem solving. Long‑term, Kevin envisions establishing a boutique consultancy
    that offers forensic accounting and technology‑driven audit services to midsize enterprises across the Midwest, while also expanding community financial‑literacy programs for underserved residents.
