  hobbies: '[''Basketball'', ''Hiking in West Texas'', ''Live music (rock and country)'', ''PC building'', ''Introductory coding'', ''Reading science‑fiction'', ''Watching Texas Tech football'']'
  career_goals: Antonios aims to earn a bachelor's degree in Business Administration within the next three years, leveraging his sales experience to transition from a junior sales manager to a regional
    sales director. He intends to master data‑driven sales methodologies, integrate AI‑based lead scoring into his workflow, and eventually launch his own boutique sales consultancy that helps small Texas
    businesses expand online. Balancing his practical side with curiosity, he seeks mentorship opportunities to refine his leadership style while developing stress‑management techniques to sustain high
    performance.
