personas:
  professional: Grace Maldonado, an 82‑year‑old community organizer in Cheyenne, blends bilingual fluency and meticulous budgeting talent with a curiosity for new teaching tools, and they coordinate multicultural
    workshops at the senior center that honor family stories while ensuring every detail—from venue rental to volunteer schedules)—is flawlessly executed.
  sports: Grace Maldonado follows the Wyoming Cowboys football team and the Denver Broncos, attends the annual Cheyenne Frontier Days rodeo, and they keep fit through daily morning walks with their Labrador,
    a gentle water‑aerobics class at the senior center, and occasional volunteer work setting up tennis courts for senior leagues.
  arts: Grace Maldonado finds solace in the acoustic guitar works of Andrés Segovia, the folk ballads of Pete Seeger, and the regional theater productions of the Cheyenne Actors Guild, and they often crochet
    shawls inspired by the intricate patterns they see in the stage set designs.
  travel: Grace Maldonado prefers thoughtfully planned road trips to historic Southwestern towns such as Santa Fe and Taos, relishes visits to family homesteads in the high desert, and they dream of a gentle
    cruise along the Pacific coast, all while balancing a modest travel budget and occasional health‑related travel constraints.
  culinary: Grace Maldonado expertly prepares masa‑based tamales, hearty pozole soup, and richly spiced mole, adapting recipes to the fresh vegetables from their Wyoming garden and the locally available
    meats, and they savor sharing these dishes at community potlucks, though they sometimes over‑salt the broth in their enthusiasm.
  core: Grace Maldonado is an organized, bilingual elder who weaves heritage, garden freshness, and community spirit into every aspect of her life, even if they occasionally forget medication refills or
    over‑season their cooking.
background:
  cultural: Grace was born in a small town in Jalisco, Mexico, and moved to the United States with her family when she was ten. She grew up in a close‑knit Mexican household where Spanish was spoken at
    home, and cultural traditions such as Día de los Muertos, Las Posadas, and family gatherings were central to life. After marrying and eventually settling in Cheyenne, Wyoming, Grace blended her Mexican
    roots with the local western culture, often sharing her culinary and festive traditions with neighbors. Her identity remains grounded in Mexican family values, collectivism, and a respect for elders,
    while also embracing the independence and rugged spirit of the Wyoming community.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Event planning and coordination'', ''Traditional Mexican cooking'', ''Vegetable gardening'', ''Basic computer skills (email, video calls, word
