  career_goals: In the next two years, Simon aims to exceed his quarterly sales targets consistently, earn the company’s top‑performer award, and obtain a Certified Professional Sales Leader (CPSL) credential.
    He plans to transition from an entry‑level sales representative to a senior account manager, taking responsibility for larger, strategic accounts in the manufacturing sector. Over the longer term—five
    to seven years—he envisions advancing to a regional sales manager role, leading a team of representatives across Southern California, and eventually moving into a director‑of‑sales position where he
    can shape market‑entry strategies for new product lines. To support these ambitions, Simon intends to complete a bachelor’s degree in Business Administration, deepen his expertise in supply‑chain economics,
    and build a robust professional network through industry conferences. He also seeks to develop stronger stress‑management techniques so that his ambition remains sustainable and balanced.
