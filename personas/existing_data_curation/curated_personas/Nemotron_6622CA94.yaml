personas:
  professional: Simon Soriano, a 20‑year‑old wholesale and manufacturing sales representative, combines bilingual fluency, meticulous CRM management, and a data‑driven, methodical sales process with a quiet
    assertiveness that allows them to turn detailed prospect analysis into trusted client relationships.
  sports: Simon Soriano enjoys small‑group soccer matches with teammates from the Temple City Soccer Club, roots for the LA Galaxy and LAFC during the MLS season, and finds balance by hiking the San Gabriel
    Mountains on weekends, preferring steady cardio over intense gym routines that they schedule when time permits.
  arts: Simon Soriano unwinds by listening to the guitar work of Carlos Santana, admiring Frida Kahlo’s vibrant paintings, attending occasional local art exhibitions, and streaming classic films by Alejandro
    González Iñárritu, which shape their appreciation for storytelling and visual culture, and they often discuss these works with close friends.
  travel: Simon Soriano prefers meticulously planned weekend getaways, balancing relaxed beach time in San Diego with adventurous hikes in Joshua Tree, while dreaming of a cultural immersion trip to Oaxaca’s
    markets and a future solo exploration of Tokyo’s tech districts, all within a modest travel budget that they manage through careful savings.
  culinary: Simon Soriano is a proficient home cook who regularly prepares tamales, pozole, and mole, experiments with gochujang‑infused mole for a Korean‑Mexican fusion twist, and delights intimate gatherings
    by pairing these dishes with fresh salsa verde and homemade aguas frescas, which they serve to family and friends during holiday celebrations.
  core: Simon Soriano blends meticulous planning, quiet curiosity, and a habit of over‑analyzing every decision, which fuels a steady rise in sales while also feeding a persistent undercurrent of worry
    that they soothe with journaling, strategic gaming, and the occasional late‑night taco.
background:
  cultural: Simon was raised in a Mexican‑American household in the Greater Los Angeles area, where his parents, first‑generation immigrants, emphasized hard work, family cohesion, and respect for cultural
    traditions. He grew up bilingual, speaking Spanish at home and English at school, which has given him a fluid cultural identity that he leverages in his sales career to connect with diverse clients.
    Celebrations such as Día de los Muertos and Mexican Independence Day are integral to his family life, and the aromas of his mother’s cooking—tamales, enchiladas, and mole—remain a strong link to his
    heritage. Living in Temple City, a community with a rich mix of cultures, Simon has also been exposed to Asian influences, fostering an appreciation for cross‑cultural collaboration. His Mexican roots
    shape his values of loyalty, modesty, and community service, while his pragmatic upbringing instills a practical approach to problem‑solving and career advancement.
