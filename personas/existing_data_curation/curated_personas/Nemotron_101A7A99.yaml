  career_goals: Melissa dreams of becoming a teacher or a veterinarian, hoping to combine her love of caring for animals with her desire to help other children learn. She also expresses excitement about
    being a scientist who discovers new things, reflecting her balance of curiosity and practical problem-solving. In the long term, she hopes to lead community projects that make school and neighborhood
    life more inclusive and organized.
