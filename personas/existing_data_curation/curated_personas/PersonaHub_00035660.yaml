persona_description: A researcher and expert in the field of pain management, particularly in the use of cognitive behavioral therapy (CBT) to reduce pain sensitivity and control secondary hyperalgesia.
  The individual has conducted research at the University of Reading and the Toronto Western Research Institute, and has published their findings in the journal Pain. They have a unique understanding of
  the body's physical responses to pain, and have developed techniques to alter these responses through CBT. They are interested in the accessibility of their training and how it can be adapted to individuals
  with chronic pain.
