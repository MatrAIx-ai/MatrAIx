personas:
  professional: Riddick Murguia, a senior information security analyst turned security architect in the Midwest, leverages rigorous network security architecture, SOC monitoring, and Python‑driven automation
    to build airtight compliance frameworks, while their exacting, disciplined mindset and competitive drive ensure every vulnerability is documented and remediated with precision.
  sports: Riddick Murguia, a dedicated long‑distance runner and weekend hiker in the Nebraska sandhills, logs weekly mileage with the Nebraska Trail Runners club, follows a regimented training plan, and
    roots for the Nebraska Cornhuskers football team and the Omaha Storm hockey squad during the season.
  arts: Riddick Murguia channels a precise aesthetic into woodworking and LEGO Technic builds while also immersing in the works of Frank Lloyd Wright, listening to Beethoven’s Ninth Symphony and the jazz
    stylings of Nina Simone, and attending occasional performances at the Omaha Community Playhouse.
  travel: Riddick Murguia prefers meticulously planned road trips across the Midwest, has already explored the historic battlegrounds of Gettysburg and the tech hubs of Berlin, and aims to schedule a focused,
    itinerary‑driven visit to Kyoto’s temples next spring, balancing travel costs with a modest family budget.
  culinary: Riddick Murguia, an intermediate home chef, favors grilling a perfectly seared ribeye with rosemary‑infused garlic butter, crafting homemade cornbread with buttermilk, and occasionally tackling
    a Thai green curry using lemongrass, coconut milk, and galangal, while they relish the occasional Runza from a local deli.
  core: Riddick Murguia is a disciplined, structure‑driven cyber‑defender who balances precision hobbies, rigorous fitness, and meticulous financial and health habits with a competitive edge and occasional
    indulgent quirks.
background:
  cultural: 'Riddick was raised in Omaha, Nebraska, within a middle‑class white family with roots tracing back to German and Irish immigrants who settled in the Midwest. His upbringing reflects typical
    Midwestern values: a strong work ethic, pragmatic problem‑solving, and a respect for community traditions. He celebrates American holidays such as Independence Day and Thanksgiving with family gatherings,
    often attending local events like the Nebraska State Fair. His cultural identity includes a modest, private demeanor, a sense of civic responsibility, and participation in a mainline Protestant congregation.
    The growing "Silicon Prairie" tech scene in Omaha has also shaped his professional outlook, fostering a blend of traditional Midwestern reliability with innovative, forward‑thinking attitudes toward
    technology and security.'
