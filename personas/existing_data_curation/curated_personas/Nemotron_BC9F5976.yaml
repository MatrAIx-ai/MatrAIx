  career_goals: Riddick aims to progress from senior information security analyst to security architect, eventually assuming a leadership role such as Chief Information Security Officer within a mid‑size
    organization in the Midwest. He seeks to deepen his expertise through advanced certifications (CISSP, CISM, OSCP) and to spearhead proactive threat‑hunting programs that set industry benchmarks. Riddick
    also aspires to become a recognized speaker at security conferences, contribute whitepapers to professional journals, and mentor the next generation of analysts, thereby shaping a culture of disciplined
    excellence in cyber defense.
