persona_description: A Mars rover engineer who is responsible for designing and developing the local unpressurized rover for the Mars Design Reference Mission. The engineer is highly skilled in understanding
  the requirements of the rover, analyzing the available system characteristics, and selecting the most appropriate power system for the mission. The engineer is also responsible for ensuring the safety
  and reliability of the rover, conducting rigorous testing and simulations to ensure that the rover meets the required standards. The engineer is a member of a team that works closely with other engineers,
  scientists, and astronauts to develop the rover and ensure that it is capable of transporting the crew to Mars.
