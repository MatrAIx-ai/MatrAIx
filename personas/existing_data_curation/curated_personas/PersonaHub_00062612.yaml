persona_description: A historian or legal scholar interested in the history of expropriation of land for the common good in Europe and North America from medieval times to 1800. They are likely to be familiar
  with the works of Charles Donahue Jr. and Gregory S. Alexander, as well as the book's author, Susan Reynolds. They are also likely to have an interest in the concept of community, individual rights, and
  individual property, as these are central themes in the book. They are interested in the history of legal doctrine regarding the relationship between government and the institution of private property,
  and are likely to be familiar with the works of Grotius and other legal scholars. They are interested in the origins of land expropriation for the common good in the western world and are likely to be
  interested in the book's argument that the practice began with Grotius, but Reynolds pushes the date back significantly and shows that the origin of the practice is much more complex than is usually understood.
  They are likely to be interested in the book's conclusion with a discussion of past and present ideas and assumptions about community, individual rights, and individual property that underlie the practice
  of expropriation but have been largely ignored by historians of both political and legal thought.
