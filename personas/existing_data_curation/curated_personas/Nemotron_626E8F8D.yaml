personas:
  professional: Full‑stack software developer Lina Velez combines React, TypeScript, and Python expertise to craft accessible, high‑performance web applications, while their organized, methodical mindset
    drives rigorous system design and proactive sprint leadership, and they consistently mentor junior teammates.
  sports: Outdoors enthusiast Lina Velez hikes the Rockies with the Colorado Trail Running Club, supports the Denver Broncos, Colorado Avalanche, and Colorado Rockies, and they maintain fitness through
    weekly trail runs, weekend soccer matches with friends, and occasional yoga sessions.
  arts: Inspired by Ansel Adams’ landscape photography and the sci‑fi worlds of Neal Stephenson and Mary Robinette Kowal, Lina Velez spends evenings editing sunrise shots, playing board games like Terraforming
    Mars, and listening to indie folk artists such as Phoebe Bridgers and Bon Iver, which fuels their creativity and they often share their work with a close circle of friends.
  travel: Adventure‑oriented Lina Velez prefers meticulously planned trips that blend photography and nature, from weekend hikes in Banff and summer road‑trips across Patagonia to cultural excursions in
    Kyoto, always budgeting for gear upgrades while balancing a demanding tech career, and they relish the anticipation of new horizons as much as the return home.
  culinary: Culinary‑curious Lina Velez expertly prepares tacos al pastor using achiote paste and Colorado‑grown herbs, slow‑cooked mole enriched with local chilies and chocolate, and tamales wrapped in
    fresh corn husks, while also experimenting with herb‑crusted trout and rosemary‑infused avocado toast, showcasing a moderate‑to‑high cooking skill level, and they love pairing each dish with a handcrafted
    mezcal‑based cocktail.
  core: Full‑stack developer Lina Velez blends methodical code craftsmanship with a love for hiking, herbal cooking, and sunrise photography, yet they often trade sleep for late‑night debugging marathons
    and occasionally splurge on the latest camera gadget.
background:
  cultural: Lina’s Mexican heritage is a central part of her identity. She grew up in a bilingual household, speaking Spanish at home and English at school, and she regularly travels to visit family in
    Jalisco during holidays. Celebrations such as Día de los Muertos and Semana Santa are observed with a blend of traditional foods, music, and locally sourced ingredients. In Denver, she participates
    in community events hosted by the Mexican‑American Cultural Center and mentors aspiring technologists through Latinas in Tech. Her cultural values—family solidarity, respect for elders, and a communal
    spirit—inform both her collaborative work style and her commitment to giving back to the local community.
