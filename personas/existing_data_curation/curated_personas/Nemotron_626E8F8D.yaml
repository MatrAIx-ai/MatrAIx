  hobbies: '[''Hiking'', ''Urban Gardening'', ''Photography'', ''Reading Science Fiction'', ''Cooking Mexican Cuisine'', ''Board Games'', ''Mentoring Youth in STEM'']'
  career_goals: Over the next five years Lina aims to transition into a technical lead role where she can guide a small, high‑performing team in building user‑centric products. She plans to earn an AWS
    Solutions Architect certification and deepen her expertise in cloud‑native architectures. Lina also wants to mentor junior developers, champion inclusive engineering practices, and contribute to open‑source
    projects that advance accessibility. Ultimately, she envisions a future where she can influence product strategy while staying grounded in practical, data‑driven decision‑making.
