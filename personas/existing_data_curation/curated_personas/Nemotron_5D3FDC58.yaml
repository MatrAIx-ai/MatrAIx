personas:
  professional: Candice Mcsorley, a seasoned acute‑care and community nurse with over twenty years of bedside experience, blends meticulous clinical skills in wound management, IV therapy, and health informatics
    with a curiosity for art‑based therapies, anchored in values of hard work, neighborly support, and modesty, using their strong communication and empathetic listening to mentor colleagues, advocate for
    patients, and champion holistic, patient‑centered care while pursuing a BSN and eyeing a future nurse‑manager role.
  sports: Candice Mcsorley follows Chicago’s sports scene passionately, cheering for the Bulls during basketball season, supporting the Cubs in summer, rallying with friends for Bears football Sundays,
    and their sociable nature turns these gatherings into regular game‑day potlucks while they stay personally active by walking with a local senior fitness group and practicing gentle yoga twice weekly.
  arts: Candice Mcsorley regularly attends art exhibitions featuring Georgia O'Keeffe at the local museum, enjoys live jazz nights with a Miles Davis tribute band, volunteers in community theater productions
    of classic plays, and explores mixed‑media painting at home inspired by the diverse cultural events of the Chicago metropolitan area.
  travel: Candice Mcsorley plans weekend getaways that blend cultural immersion and relaxation, such as attending Milwaukee’s Summerfest, touring the historic wineries of Traverse City, Michigan, and driving
    to the Grand Canyon during the off‑peak season, using detailed itineraries yet leaving room for spontaneous detours.
  culinary: Candice Mcsorley delights in cooking herb‑infused dishes like rosemary‑garlic roasted chicken and fresh minestrone soup, often incorporating garden‑grown basil, thyme, and lavender into their
    meals, and they love hosting potluck dinners featuring homemade rose petal jam and artisanal cheese platters.
  core: Candice Mcsorley is a curious, community‑driven nurse who balances meticulous clinical expertise with a love for art, gardening, and vibrant social gatherings, all while navigating mid‑life health
    and financial goals with a pragmatic yet generous spirit.
background:
  cultural: Candice is a white Midwestern American who grew up in a close‑knit suburban community near Chicago. Her upbringing reflected traditional Midwestern values of hard work, neighborly support, and
    modesty, combined with a Catholic/Protestant family tradition that emphasized service and community involvement. Living in Oak Lawn, she has been shaped by the cultural diversity of the Chicago metropolitan
    area, fostering an appreciation for varied perspectives and encouraging her inclusive approach to patient care. She participates in local church activities, community health fairs, and neighborhood
    volunteer initiatives, reflecting a strong sense of civic responsibility and cultural openness.
attributes:
  skills: '[''Patient Assessment'', ''Wound Management'', ''IV Therapy'', ''Medication Administration'', ''Chronic Disease Education'', ''Therapeutic Art Integration'', ''Mindfulness Techniques'', ''Interdisciplinary
