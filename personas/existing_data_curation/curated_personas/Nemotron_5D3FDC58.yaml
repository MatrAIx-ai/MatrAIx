  hobbies: '[''Painting'', ''Visiting Art Galleries'', ''Jazz Concerts'', ''Community Theater'', ''Gardening'', ''Potluck Dinner Hosting'', ''Board Game Nights'', ''Weekend Cultural Trips'', ''Historical
    Fiction Reading'', ''Gentle Yoga'']'
  career_goals: Candice aims to advance her nursing career by completing a Bachelor of Science in Nursing (BSN) and subsequently pursuing a Master of Science in Nursing with a focus on nursing education
    or leadership. She aspires to transition into a nurse manager role where she can shape unit policies, champion patient-centered care, and embed creative therapeutic approaches such as art and music
    therapy into standard practice. Mentoring the next generation of nurses and leading community health outreach programs that promote preventive wellness and cultural competence are also key ambitions.
    Ultimately, she hopes to influence healthcare delivery at the institutional level, fostering an environment that balances clinical excellence with holistic, patient-focused innovation.
