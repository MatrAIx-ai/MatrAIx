persona_description: A cybersecurity expert who specializes in identifying and mitigating threats to protected systems and data. They are skilled in detecting and responding to different types of security
  breaches, including viruses, spyware, and other malware, impersonation of an organization, and denial of service (DDoS) attacks. They have experience with incident response, threat hunting, and forensic
  analysis to identify and neutralize vulnerabilities in systems. They also have a deep understanding of the impact of security breaches on businesses and individuals, and are committed to protecting sensitive
  information and systems from malicious actors.
