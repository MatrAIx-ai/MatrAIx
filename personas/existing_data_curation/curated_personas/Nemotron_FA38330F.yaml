  career_goals: Ivette aims to advance from a front‑line childcare worker to a leadership position where she can shape early‑learning environments that honor Puerto Rican culture. In the next five years
    she plans to earn a Master’s degree in Early Childhood Education, obtain a licensed preschool director credential, and launch a bilingual preschool program in Raleigh that integrates Caribbean stories,
    music, and food. She also hopes to develop a series of professional workshops for childcare providers on culturally responsive practices and to mentor new educators within her community. Balancing her
    ambition with practicality, she seeks a role that offers both creative autonomy and stable scheduling to support her family.
