persona_description: A GIS Analyst who is interested in renewable energy mapping and planning. This persona is likely to have experience with GIS software and tools, as well as knowledge of renewable energy
  resources and potential. They are interested in using the RE–Powering Mapper GIS shapefile to determine the renewable energy potential of specific sites, and are looking for ways to customize their view
  and create custom reports with specific characteristics. They are also interested in learning more about the decision trees for solar and wind energy development, and how to use filtering and reporting
  features to target sites with specific characteristics.
