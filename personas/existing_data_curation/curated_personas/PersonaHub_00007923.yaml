persona_description: A microbiologist or bacteriologist who is interested in the study of lactococcal bacteriophages, particularly in the development and application of indirect assay methods for their
  detection. They are familiar with the methods described in the text, including modified starter activity tests, failure of infected cultures to coagulate milk, and methods that use redox indicators. They
  are also aware of the limitations and potential errors associated with these methods, and are interested in finding alternative methods for detecting lactococcal bacteriophages. They are likely to be
  interested in further research into the development of more accurate and reliable methods for the detection and identification of lactococcal bacteriophages.
