personas:
  professional: A budding young scientist named Keyla Ramos dazzles classmates with meticulously organized LEGO experiments that mimic real-world engineering, channeling curiosity and practical discipline
    into building functional bridges and simple circuits at the school science club, and they proudly demonstrate each creation with quiet confidence.
  sports: A budding athlete named Keyla Ramos participates in the Queens Youth Soccer League with the "Queens Knights" team, attends weekly practice where they follow disciplined drills, roots for the New
    York Yankees during weekend games, and they enjoy occasional family outings to watch the New York Knicks, balancing competitive spirit with a preference for small-group play.
  arts: An imaginative creator named Keyla Ramos spends afternoons sketching hyper-realistic animal illustrations inspired by wildlife artist Charley Harper and the animated adventures of Disney's "The
    Lion King", and they occasionally act out stories from library storytime with dramatic flair reminiscent of actor Lin-Manuel Miranda's energetic performances.
  travel: A curious traveler named Keyla Ramos loves family road trips to the Bronx Zoo and school field excursions to the American Museum of Natural History, dreams of exploring the Grand Canyon's layered
    cliffs, and they plan future visits to seaside resorts in New Jersey, balancing a love for adventure with the comfort of familiar neighborhood parks.
  culinary: A kitchen assistant named Keyla Ramos skillfully measures masa harina, cumin, and cilantro while helping prepare homemade tamales and fresh guacamole during festive gatherings, showcases a budding
    knack for balancing flavors, yet they occasionally sneak a taste of the sweetened dough before it's baked, revealing a mischievous sweet tooth.
  core: Keyla Ramos, a seven-year-old with a quiet, detail-oriented mind, channels boundless curiosity into organized LEGO builds, meticulous kitchen tasks, and solo sketching, while they occasionally get
    lost in a crumb-filled snack stash when concentration wanes.
background:
  cultural: Keyla is raised in a Mexican‑American household in Middle Village, Queens. Her parents speak Spanish at home, and the family celebrates cultural traditions such as Día de los Muertos, Las Posadas,
    and Cinco de Mayo. Exposure to the vibrant, multicultural community of Queens blends Mexican customs with diverse urban influences, fostering her bilingual abilities and a strong sense of family and
    cultural pride.
