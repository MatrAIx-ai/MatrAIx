  career_goals: Keyla dreams of becoming a veterinarian because she loves caring for animals and wants to protect their health. She also imagines being a scientist who discovers new ways to keep the environment
    safe. Her disciplined nature drives her to set small milestones, such as earning a science badge, learning more about animal care, and sharing her knowledge with friends at school.
