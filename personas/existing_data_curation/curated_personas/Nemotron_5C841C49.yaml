  career_goals: Although retired from formal employment, Mildred remains driven to deepen her impact on the Memphis community. She aspires to lead the local neighborhood watch and expand a senior support
    network that offers companionship and resources. She hopes to launch a community garden that provides fresh produce and a gathering space for intergenerational exchange. Mentoring remains central to
    her ambitions; she plans to formalize a mentorship program at her church to guide young adults in career and life skills. Additionally, Mildred dreams of documenting her life story and the rich oral
    history of African-American families in Shelby County, preserving it for future generations. Her overarching goal is to foster harmony, resilience, and cultural pride within her neighborhood while maintaining
    her own independence and well‑being.
