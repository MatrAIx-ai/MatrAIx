  hobbies: '[''Reading fantasy novels'', ''Biographies of African American leaders'', ''Creative writing/journaling'', ''Sketching and watercolor painting'', ''Playing piano (beginner)'', ''Coding games
    in Scratch'', ''LEGO building'', ''Bird‑watching and nature walks'', ''Watching science documentaries'']'
  career_goals: Ashli dreams of a future where she can combine her love for science and storytelling. She hopes to become a marine biologist or environmental researcher who studies ocean ecosystems, and
    she also envisions herself writing children’s books that celebrate Black history and encourage curiosity. In the short term, she aims to earn a scholarship to attend a specialized STEM magnet program
    in New Jersey, develop more advanced coding abilities, and become a mentor for younger students in after‑school clubs.
