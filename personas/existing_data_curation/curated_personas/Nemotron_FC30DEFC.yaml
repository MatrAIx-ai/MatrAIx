personas:
  professional: Ashli Hall, an 11‑year‑old budding coder and aspiring storyteller, channels their curiosity and practical mindset into creating Scratch games and writing illustrated journal entries, and
    they approach each project with meticulous organization yet flexible creativity.
  sports: Ashli Hall enjoys the quiet rhythm of swimming at the community pool and practices archery with the local youth club, cheers for the Boston Red Sox during baseball season, and they participate
    in the city’s after‑school soccer league, preferring low‑key exercise over loud team sports.
  arts: Ashli Hall spends afternoons watercolor painting landscapes inspired by Claude Monet, sketches scenes from their favorite fantasy novels, and they listen to the piano compositions of Ludovico Einaudi
    while occasionally watching Studio Ghibli films for artistic inspiration.
  travel: Ashli Hall loves nature‑focused trips, having explored the hiking trails of Yosemite National Park and dreaming of a future visit to the historic museums of Washington, D.C., they favor carefully
    planned itineraries that balance quiet observation with occasional adventure.
  culinary: Ashli Hall enjoys preparing simple comfort foods like mac and cheese with added broccoli florets, experimenting with fruit smoothies blending strawberries, bananas, and almond milk, and they
    occasionally attempt to bake mini watercolor‑themed cupcakes, though they often forget to clean the kitchen afterward.
  core: Ashli Hall is a quietly ambitious 11‑year‑old who turns solitary curiosity into creative coding, vivid journaling, and steady savings, while they wrestle with a streak of worry that fuels their
    drive for meticulous self‑improvement.
background:
  cultural: Ashli is a Black American growing up in Trenton, New Jersey, a city with a rich African‑American heritage and a vibrant community life. Her family celebrates cultural milestones such as Juneteenth
    and Black History Month, and she often participates in school and community programs that highlight Black history, music, and art. Exposure to the local church choir and community center activities
    has introduced her to gospel and jazz, while her parents share stories of their ancestors, fostering a sense of pride in her heritage. At the same time, the urban environment of Trenton and its multicultural
    neighborhoods give her a broad perspective on diverse cultures and social issues.
attributes:
  skills: '[''Reading comprehension'', ''Critical analysis'', ''Organizational skills'', ''Basic coding (Scratch)'', ''Creative writing'', ''Digital literacy (Microsoft Office, Google Classroom)'', ''Beginner
