personas:
  professional: A meticulous special education teacher, Daniel Johnson designs and implements individualized education programs with data‑driven precision, applying his organized, methodical approach to
    behavior management and assistive technology while competitively pursuing district‑wide policy influence.
  sports: An avid outdoorsman, Daniel Johnson spends summers fishing on Lake Superior, participates in a local hunting club during the fall, enjoys senior chess tournaments year‑round, and follows the Green
    Bay Packers and Detroit Red Wings with a loyal, data‑driven fandom.
  arts: A dedicated craftsperson, Daniel Johnson channels his artistic sensibility into woodworking custom furniture and model train layouts while appreciating the realism of Andrew Wyeth, the folk storytelling
    of Bob Dylan, and community theater productions of 'Our Town.'
  travel: A meticulous planner, Daniel Johnson prefers purposeful trips, such as genealogical research visits to the Upper Peninsula's copper mining towns, weekend retreats to the nearby Porcupine Mountains,
    and occasional cultural excursions to Boston’s historic Freedom Trail, balancing adventure with routine.
  culinary: A competent home cook, Daniel Johnson enjoys pan‑searing walleye with lemon butter, simmering hearty fish chowder with root vegetables, and occasionally indulging in pasties, while his woodworking
    patience translates into meticulous recipe preparation, though he admits to over‑salting dishes when distracted.
  core: A structured, solitary craftsman, Daniel Johnson channels his competitive drive into meticulous work across education, hobbies, and finances, punctuated by occasional indulgences and a skeptical
    eye toward others.
background:
  cultural: Daniel was raised in Ontonagon, Michigan, a community in the Upper Peninsula with strong Scandinavian and German immigrant heritage. The region’s culture emphasizes self‑reliance, modesty, respect
    for nature, and close‑knit communal ties. Family traditions include annual hunting trips, participation in church gatherings, and a deep appreciation for local history and the outdoors. These values
    shape his pragmatic outlook and dedication to service.
attributes:
  skills: '[''Individualized instruction'', ''IEP development and compliance'', ''Behavior management'', ''Assistive technology integration'', ''Collaboration with parents and multidisciplinary teams'',
    ''Classroom organization and data-driven assessment'', ''Differentiated curriculum design'', ''Transition planning'', ''Professional development facilitation'', ''Conflict resolution'']'
  hobbies: '[''Fishing'', ''Woodworking'', ''Model train building'', ''Crossword puzzles'', ''Historical nonfiction reading'', ''Genealogy research'', ''Local hunting club'', ''Chess club'', ''Community
    gardening'', ''Volunteer tutoring'']'
  career_goals: Daniel aims to transition into the role of District Special Education Coordinator within the next three years, where he can shape policy, mentor new teachers, and implement a district‑wide
    inclusive curriculum. He seeks to achieve measurable improvements in student outcomes, earn a state‑level Special Education Teacher of the Year award, and establish a legacy of systematic, evidence‑based
    practices before his planned retirement at age 65.
