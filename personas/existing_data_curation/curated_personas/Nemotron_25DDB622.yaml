  career_goals: Ethan aims to build a strong art portfolio that will allow him to enroll in a specialized high‑school program for the visual arts and later pursue a degree in visual communications or fine
    arts at the University of Wisconsin‑Madison. He envisions a career where he can combine his artistic talent with his methodical problem‑solving mindset, such as working as a UX/UI designer, a multidisciplinary
    visual artist, or a creative technologist creating educational content. In the short term, he plans to secure internships or mentorships with local design studios and participate in community art projects
    that address mental‑health awareness. Long‑term, he hopes to run a freelance design studio, develop his own line of illustrated merchandise, and contribute to museum exhibition design that engages younger
    audiences.
