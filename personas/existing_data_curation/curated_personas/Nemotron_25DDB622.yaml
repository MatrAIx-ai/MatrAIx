personas:
  professional: Ethan Castleberry, a 15‑year‑old aspiring concept artist, combines hand‑drawn landscapes with digital illustration, volunteers at the Madison Museum of Contemporary Art to learn curatorial
    practice, and approaches each project with meticulous planning and a willingness to experiment with unconventional visual storytelling.
  sports: Ethan Castleberry jogs along the Madison lakeshore three times a week, participates in the high‑school cross‑country team, follows the Wisconsin Badgers football and Milwaukee Bucks basketball,
    and attends a weekend community yoga class to counterbalance sedentary studio time.
  arts: Ethan Castleberry draws inspiration from James Gurney’s plein‑air paintings, Loish’s digital style, Ansel Adams’ monochrome photography, curates playlists featuring Bon Iver, Phoebe Bridgers, and
    The National, reads graphic memoirs like 'Persepolis' and sci‑fi novels such as 'Neuromancer', and spends weekends sketching characters while listening to Studio Ghibli soundtracks.
  travel: Ethan Castleberry prefers carefully planned road trips, has explored Door County’s lighthouse coast and Chicago’s Art Institute, dreams of photographing sunrise at the Grand Canyon and attending
    New York’s International Photography Festival, and balances travel aspirations with a modest budget and school commitments.
  culinary: Ethan Castleberry enjoys cooking simple yet flavorful dishes such as spaghetti carbonara with pancetta, garlic‑roasted Brussels sprouts, and mango‑lime smoothies, experiments with fresh basil
    and chili flakes from the Dane County Farmers’ Market, but often resorts to pizza slices and sugary cereal during late‑night editing marathons.
  core: Ethan Castleberry is a meticulous teenage artist who channels curiosity and anxiety into detailed visual creations, disciplined budgeting, and a quiet love for indie music, all while juggling all‑night
    art marathons and carefully planned adventures.
background:
  cultural: Ethan was raised in a middle‑class, suburban family in Madison, Wisconsin, with mixed Northern‑European ancestry—primarily German and Scandinavian roots. His household reflects typical Midwestern
    values of modesty, punctuality, and self‑reliance, while also embracing the progressive, arts‑focused atmosphere of the university town. His parents placed a strong emphasis on education, community
    involvement, and appreciation for the outdoors, which is evident in their frequent trips to local farms, state parks, and lakefront activities. Growing up near the University of Wisconsin campus exposed
    Ethan to a vibrant cultural scene, including museum visits, independent film screenings, and community art projects, shaping his open‑minded outlook and curiosity about diverse ideas.
