  hobbies: '["Fishing at Matagorda Bay", "Competitive video gaming (RTS and FPS)", "Scale model building (ships and trucks)", "Sketching comic characters", "Listening to regional Mexican and classic rock
    music", "Attending local coding meet‑ups", "Skateboarding with a close friend", "Reading sci‑fi novels"]'
  career_goals: Esteban plans to complete his GED within the next two years and then enroll in a vocational program for automotive technology at a community college. He aims to become a certified automotive
    technician, eventually opening his own garage that serves the Corpus Christi community, especially Spanish‑speaking customers. In parallel, he wants to keep advancing his coding skills to develop simple
    inventory‑management software for his future shop. While he views competitive gaming as a possible side‑income, his primary ambition is to establish a stable, hands‑on trade career that blends his love
    of mechanics with his practical mindset.
