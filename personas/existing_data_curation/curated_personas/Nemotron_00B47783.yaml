personas:
  professional: Esteban Lopez, a 16‑year‑old aspiring automotive technician, blends hands‑on experience with gasoline‑engine maintenance, introductory Python scripting, and a competitive strategic mindset
    honed from real‑time strategy games to lead small online repair‑project teams.
  sports: Esteban Lopez enjoys early‑morning fishing at Matagorda Bay, occasionally skateboards along the Corpus Christi waterfront boardwalk, follows the Houston Astros and Corpus Christi FC soccer club,
    but prefers solitary pursuits over organized team sports.
  arts: Esteban Lopez merges a love for classic rock legends like Led Zeppelin with regional folk melodies while sketching comic‑style heroes inspired by local legends, proudly displays a detailed scale
    model of the USS Enterprise, and draws artistic inspiration from comic artist Alex Ross.
  travel: Esteban Lopez favors low‑key Gulf Coast road trips, having explored Galveston and South Padre Island, dreams of fishing in the Florida Keys, yet limited budget and school commitments keep most
    adventures within Texas.
  culinary: Esteban Lopez prefers straightforward, bold flavors such as grilled shrimp tacos with fresh lime, homemade queso dip, and tamarind‑glazed pork ribs cooked on a portable grill while classic rock
    plays, though they sometimes burn the corn tortillas when a game distracts them.
  core: Esteban Lopez is a solitary, curiosity‑driven teen who fuses a love of mechanics, coding, and regional folk art into a competitive, pragmatic worldview, occasionally neglecting sleep and dental
    care in favor of gaming marathons.
background:
  cultural: Esteban is a second‑generation Mexican‑American whose family maintains strong ties to their heritage while navigating life in Corpus Christi’s multicultural setting. Spanish is the primary language
    at home, and traditions such as Día de los Muertos, tamales for holidays, and family gatherings around Mexican cuisine are central to his upbringing. He attends local Catholic services on major feasts,
    though his personal outlook is pragmatic. The coastal city’s blend of Mexican food, Gulf seafood, and Texas hospitality shapes his palate and social interactions. Growing up in a predominantly Hispanic
    neighborhood, he helps with family chores, participates in community bay clean‑ups, and values the work ethic modeled by his parents, who split time between construction jobs and small‑scale fishing.
    This bicultural upbringing gives him a pragmatic perspective, balancing collectivist aspects of his heritage with an individualistic drive fostered by his American environment.
attributes:
  skills: '["Automotive maintenance and repair", "Basic electrical troubleshooting for vehicles", "Python programming (scripts and modding)", "HTML/CSS web basics", "Coastal fishing techniques", "Skiff
