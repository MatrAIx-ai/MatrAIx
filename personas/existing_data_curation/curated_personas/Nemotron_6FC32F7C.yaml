  hobbies: '[''Community gardening'', ''Senior center social events'', ''Quilting'', ''Birdwatching'', ''Mahjong'', ''Reading mystery novels'', ''Classic rock listening'', ''Beach walks'', ''DIY upcycling
    crafts'']'
  career_goals: Sandy aims to deepen her involvement with the local senior center by mentoring new volunteers and leading weekly social events. She hopes to launch a neighborhood "Edible Corner" garden
    that encourages residents to share produce and gardening tips. To broaden her horticultural knowledge, she plans to enroll in a short gardening course at the community college. She also wants to compile
    oral histories of longtime Delmar residents into a small memoir, practice mindfulness and attend therapy groups to better manage her anxiety, and share her cooking expertise by teaching occasional community
    classes. Overall, she seeks to stay socially active, foster community cohesion, and continue personal growth while prioritizing self‑care.
