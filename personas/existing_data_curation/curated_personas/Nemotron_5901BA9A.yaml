  career_goals: Marco dreams of opening a flagship restaurant in Melbourne that offers a narrative‑driven dining experience, where each course tells a story drawn from Mexican folklore and Florida’s maritime
    heritage. He aims to publish a cookbook that captures his experimental fusion recipes, host immersive cooking workshops for aspiring chefs, and become a mentor for youth from immigrant backgrounds.
    In the longer term, he envisions consulting for restaurants seeking sustainable sourcing practices and contributing to local food‑education programs that blend art and cuisine.
