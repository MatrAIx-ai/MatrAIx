  career_goals: Preston aims to transition from laborer to site supervisor within the next two years by completing an NCCER certification and a community college associate program in construction management.
    His long‑term ambition is to become a general contractor who can integrate environmentally responsible construction methods with artistic design elements, ultimately establishing his own firm that focuses
    on affordable, aesthetically distinctive housing in the Greater Boston area. He also hopes to mentor younger workers from underrepresented backgrounds, helping them navigate the trades and pursue professional
    growth.
