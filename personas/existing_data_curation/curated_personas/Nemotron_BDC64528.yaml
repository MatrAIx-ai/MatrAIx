personas:
  professional: Preston Eustache works as a seasoned construction laborer specializing in concrete finishing, framing, and carpentry, and leverages his meticulous organizational habits and creative eye
    for mural‑style finishes to lead crews and keep projects on schedule while dreaming of a future as a site supervisor.
  sports: Preston Eustache plays pickup basketball at the community center, follows the Boston Celtics and Boston Bruins loyally, and maintains a disciplined fitness regimen that includes early‑morning
    runs on the Charles River Trail and seasonal participation in local 5‑k runs organized by the neighborhood recreation league.
  arts: Preston Eustache immerses himself in street art culture, frequently sketching murals inspired by the vivid colors of Basquiat and the rhythmic storytelling of Kendrick Lamar, while also joining
    jam sessions that blend jazz legends like Miles Davis with contemporary R&B, and curates gallery visits featuring emerging Boston artists such as Maya Gillespie.
  travel: Preston Eustache prefers spontaneous road trips that combine hiking in the White Mountains with culinary detours to New Orleans for jazz and Creole cuisine, but he also dreams of a summer vacation
    on a Caribbean island where he could explore his family’s flag‑day celebrations, balancing travel desires with a modest budget and limited vacation days.
  culinary: Preston Eustache enjoys cooking fusion dishes like plantain‑topped lobster rolls and maple‑glazed spiced pork, demonstrating a solid intermediate skill level in the kitchen and favoring bold
    spices such as Scotch bonnet pepper and fresh rosemary while often experimenting with seasonal New England produce.
  core: Preston Eustache is a disciplined construction professional who blends a love for street art and music with a relentless drive to build affordable, aesthetically striking homes, all while juggling
    coffee‑shop splurges, late‑night sketch sessions, and an ever‑growing collection of DIY tools.
background:
  cultural: Preston grew up in a Black family with Haitian roots in the Boston suburbs. His household blended Haitian traditions—such as Creole language, music, and cuisine—with the working‑class culture
    of New England, where community solidarity and a strong work ethic are valued. He celebrates Haitian holidays like Flag Day and participates in local African‑American events such as Juneteenth parades
    and Boston’s annual Black History Month celebrations. The cultural mix has fostered his appreciation for both rhythmic storytelling and visual art, influencing his creative hobbies and his desire to
    bring culturally resonant design to construction projects.
attributes:
