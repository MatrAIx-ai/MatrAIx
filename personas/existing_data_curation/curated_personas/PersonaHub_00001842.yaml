persona_description: A scientist who studies the effects of geological features on the flow of streams and rivers, specifically focusing on the role of till and stratified drift in controlling the flow
  patterns of water. This scientist is likely to have a background in geology, hydrology, and/or environmental science, and has experience analyzing and interpreting data from long-term stream flow records.
  They are interested in understanding how different types of sediment affect the flow of water, and how changes in the distribution of sediment can impact the overall flow of a stream or river.
