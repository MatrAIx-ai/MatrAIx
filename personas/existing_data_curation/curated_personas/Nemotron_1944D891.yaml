  hobbies: '["Reading (literary fiction, philosophy, film theory)", "Yoga", "Hiking in Central Florida parks", "Cooking (experimental cuisines)", "Photography", "Playing guitar", "Improvisational comedy",
    "Attending indie film screenings", "Volunteer acting workshops", "Screenwriting"]'
  career_goals: Ervin aims to secure a recurring character role in a high‑profile television series while building a sustainable income through diverse acting gigs, voice‑over work, and commercial projects.
    He plans to launch a boutique production company that creates independent films exploring socially relevant themes drawn from his humanities background. Additionally, he aspires to develop and lead
    acting workshops that blend rigorous craft training with creative experimentation, ultimately positioning himself as both a respected performer and a mentor within the artistic community.
