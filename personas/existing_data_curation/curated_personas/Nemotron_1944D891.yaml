personas:
  professional: Ervin Broussard, a 31‑year‑old versatile actor and emerging filmmaker, blends Method, Meisner, and Stanislavski techniques with razor‑sharp improvisation, while they strategically manage
    a personal brand, network on social media, and juggle short‑film directing projects as a stepping stone toward a recurring TV character and the launch of a socially conscious boutique production company.
  sports: Ervin Broussard, 31, hikes the natural trails of Central Florida with the Orlando Outdoor Enthusiasts Club, follows the Orlando Magic and Tampa Bay Rays with a loyal fan’s enthusiasm, and they
    balance cardio trail runs with weekly yoga, occasionally joining a co‑ed adult soccer league on Saturday evenings.
  arts: Ervin Broussard, 31, devotes evenings to improv comedy at The Improv Asylum, attends indie film screenings featuring works by Jim Jarmusch and Ava DuVernay, plays guitar in jam sessions covering
    David Bowie and Radiohead, and they capture urban moments through photography inspired by Ansel Adams and Brandon Woelfel.
  travel: Ervin Broussard, 31, prefers spontaneous road trips across the Southeast, has a standing wish to explore Iceland’s waterfalls and Florence’s art museums, but they balance wanderlust with a modest
    travel budget by combining work‑related short‑term stays in Austin and Nashville with weekend hikes in the Great Smoky Mountains.
  culinary: Ervin Broussard, 31, experiments in the kitchen with fusion dishes like miso‑glazed pork belly tacos and shrimp‑and‑grits spiked with smoked paprika, enjoys sourcing fresh basil, cilantro, and
    heirloom tomatoes at the local farmers market, and they are comfortable simmering a rich ramen broth while still mastering the delicate layers of a perfect croissant.
  core: Ervin Broussard, 31, blends a philosopher’s curiosity with a performer’s discipline, juggling yoga mats, a camera, and a guitar, while they secretly hoard half‑finished scripts in a closet and indulge
    in late‑night espresso‑fueled script reads.
background:
  cultural: Ervin was raised in a middle‑class white family in the Midwest, where his parents emphasized education, literature, and community service. This upbringing instilled a strong work ethic and an
    appreciation for diverse perspectives. Moving to Winter Park, Florida, he immersed himself in the city’s vibrant arts scene, blending his Midwestern pragmatism with the multicultural and progressive
    influences of Central Florida. His humanities degree further deepened his understanding of cultural narratives, while the Southern hospitality of his current community shaped his collaborative yet assertive
    demeanor. This cultural mosaic informs both his artistic choices and his balanced approach to personal and professional life.
