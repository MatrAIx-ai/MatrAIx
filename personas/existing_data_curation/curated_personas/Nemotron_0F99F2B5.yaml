  career_goals: Austin dreams of a future where he can blend his curiosity with practical problem solving. He wants to become an engineer—perhaps a civil or robotics engineer—so he can design things that
    help his community, like safer bike lanes or fun technology for schools. He also envisions himself leading community projects, mentoring younger kids, and maybe one day teaching STEM subjects to inspire
    others.
