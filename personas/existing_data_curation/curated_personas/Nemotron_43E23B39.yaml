  career_goals: Although currently not in the formal workforce, Aanya aims to launch a small catering venture that showcases healthy twists on classic African‑American dishes, using her cooking skills and
    community connections. She also plans to spearhead a neighborhood garden project that provides fresh produce to local families and offers gardening workshops for seniors. Aanya hopes to deepen her digital
    proficiency to build an online platform for sharing recipes and community resources, and she aspires to become a lead volunteer coordinator at the local senior center, expanding mentorship programs
    for at‑risk youth.
