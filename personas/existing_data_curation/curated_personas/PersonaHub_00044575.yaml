persona_description: A coastal community planning professional who is interested in developing scenarios for sea level change impacts. This persona is likely to have experience in coastal management, risk
  assessment, and stakeholder engagement. They are familiar with the concept of scenario planning and its application in community planning, and are interested in exploring different possibilities to prepare
  for the future. This persona may have a background in environmental science or geography, and may have worked with government agencies, non-governmental organizations, or private sector entities in developing
  and implementing coastal management plans. They are interested in learning more about the specific steps and tools needed to develop site-appropriate scenarios for sea level change impacts, and are open
  to incorporating feedback and input from other professionals and stakeholders.
