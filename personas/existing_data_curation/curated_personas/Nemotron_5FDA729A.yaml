personas:
  professional: Shanti Dor, a retired community event coordinator and volunteer oral historian, channels their methodical organization, competitive drive, and serene composure into designing intergenerational
    art workshops, preserving local stories, and skillfully mediating group dynamics with unwavering reliability.
  sports: Shanti Dor stays active through weekly walks with the Jones County Senior Walking Club, follows the New Orleans Saints in football and the Mississippi Braves in baseball, and competes in senior
    bridge tournaments with the same competitive vigor they bring to community projects.
  arts: Shanti Dor immerses themselves in the arts by painting watercolor landscapes, attending community theater productions of August Wilson plays, and filling their living room with the sounds of Louis
    Armstrong, Ella Fitzgerald, and Mahalia Jackson, allowing music and performance to color their creative outlook.
  travel: Shanti Dor plans purposeful trips to historic civil‑rights landmarks such as Selma, Montgomery, and Memphis, balancing detailed itineraries with the desire for relaxed afternoons at regional museums,
    all while accommodating the modest budget and health considerations of an active octogenarian.
  culinary: Shanti Dor delights in cooking Southern comfort dishes with inventive twists—simmering collard greens with smoked turkey, braising pork shoulder into a caramelized peach glaze, and perfecting
    fluffy cornmeal biscuits—while often adding fresh herbs from their garden like thyme and sage to elevate each plate.
  core: Shiny‑eyed and competitive, 85‑year‑old Shanti Dor quilts intricate blankets while simultaneously memorizing bridge odds, never starts a new project without a neatly filed ledger, and occasionally
    drinks an extra cup of coffee to stay alert during late‑night oral‑history sessions.
background:
  cultural: Shanti grew up in a close‑knit Black community in the Deep South, where church, family gatherings, and oral storytelling formed the core of her upbringing. Her life reflects the legacy of the
    Civil Rights era, emphasizing resilience, communal support, and a strong sense of identity. She cherishes Southern culinary traditions, gospel and jazz music, and the cultural practice of passing down
    stories through generations, while also embracing broader artistic and educational experiences gained through her college studies and lifelong curiosity.
attributes:
  skills: '["Community Event Planning","Mentorship","Quilting","Gardening","Oral History Documentation","Budget Management","Conflict Resolution"]'
  hobbies: '["Quilting","Historical Reading","Theater Attendance","Gardening","Cooking","Bridge","Genealogy","Volunteering","Jazz and Gospel Music","Painting"]'
  career_goals: Although retired, Shanti aims to compile a comprehensive memoir and oral‑history archive that captures the lived experiences of the Black community in rural Mississippi. She plans to launch
    an intergenerational art and craft workshop at her church, fostering creativity among youth and seniors. Continuing her love of learning, she intends to enroll in local art classes and attend regional
    museums. Travel to historic civil‑rights sites in the South is also a personal ambition, as is supporting her grandchildren's educational pursuits through mentorship and scholarship guidance.
