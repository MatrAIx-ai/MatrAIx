    checks'']'
  hobbies: '[''Morning beach walks'', ''Home gardening (tropical herbs and vegetables)'', ''Cooking experimental, nutrition‑focused dishes'', ''Reading non‑fiction on food science and management'', ''Solving
    crosswords and sudoku'', ''Practicing yoga for stress relief'', ''Mentoring culinary students'', ''Visiting local farmers markets'']'
  career_goals: Cami aims to cement a legacy of operational excellence before retirement. She plans to achieve the highest health‑inspection scores for her restaurant, earn a regional award for kitchen
    management, and develop a formal training program that can be adopted across the restaurant group. In the longer term, she hopes to transition into a consulting role, advising other food‑service establishments
    on efficiency and compliance, and possibly launch a small boutique café that showcases her passion for nutritious, locally sourced cuisine.
