persona_description: A member of the Institute for Historical Research (IHR) Digital team, who is responsible for demonstrating the Institute's new 3D printer and 3D imaging equipment at their History Day
  on 31 October. This persona is skilled in the use of photogrammetry software and hi-spec computer hardware, and is looking to establish the Institute as a centre for historical applications of imaging,
  modelling, and virtual reality. This person is excited about the prospect of rekindling a Pollardian ambition, fostered in the 1920s, of the Institute as a national 'historical laboratory'—a place for
  experimentation and training in new approaches to historical research.
