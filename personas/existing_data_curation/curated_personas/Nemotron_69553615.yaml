  career_goals: Kylei aims to move from floor‑level housekeeping to a supervisory role within a reputable cleaning firm, eventually earning certifications such as Green Cleaning Professional and Certified
    Facility Manager. Her long‑term ambition is to launch her own eco‑friendly residential cleaning business that emphasizes personalized service and community outreach. She plans to supplement her practical
    experience with coursework in business management, leveraging her sociable personality to build a loyal client base. Kylei also hopes to mentor other women entering the cleaning industry, creating a
    supportive network that reflects her competitive drive and commitment to quality.
