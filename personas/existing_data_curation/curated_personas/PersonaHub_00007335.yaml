persona_description: A multidisciplinary team member who specializes in the treatment and rehabilitation of individuals with scoliosis, particularly those who are undergoing orthotic exercises and therapy.
  The team member is a physiotherapist who is responsible for coaching patients and approaching the treatment in a positive and enthusiastic manner. The team member also takes into account the psychological
  and emotional aspects of the patient's life, including their family and role in society. The team member is aware of the importance of a comprehensive approach to therapy, which includes not only the
  physical aspects of the treatment but also the psychological and emotional well-being of the patient. The team member is also aware of the importance of the therapeutic team, and the concept of compliance
  in adolescent spinal deformities brace treatment, and is committed to ensuring that the team is working effectively and efficiently.
