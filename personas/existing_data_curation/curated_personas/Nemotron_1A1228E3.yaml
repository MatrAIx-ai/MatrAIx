  hobbies: '[''Gardening (vegetables & flowers)'', ''Birdwatching'', ''Nature walks and hiking'', ''Quilting and needlework'', ''Historical fiction reading'', ''Community theater (backstage crew)'', ''Bridge
    and card games'', ''Hosting potluck gatherings'', ''Volunteer work at the local senior center'']'
  career_goals: Although retired from formal employment, Isabella aims to deepen her contribution to Terry’s social fabric by leading the annual Custer County Fair planning committee, establishing a mentorship
    program for younger volunteers, and documenting a family and local history memoir to preserve the region’s heritage for future generations.
