personas:
  professional: Isabella Cook, a retired community event coordinator, leverages her decades of budgeting, horticulture, and emergency response expertise to methodically plan the Custer County Fair and mentor
    younger volunteers, balancing practicality with a warm, sociable leadership style and ensuring they always have a clear timeline.
  sports: Isabella Cook, an avid birdwatcher and weekend hiker, participates in the Glacier National Park Senior Hiking Club, cheers on the Montana Grizzlies football team, and enjoys occasional afternoon
    bowling at the Billings Lanes league, preferring low‑impact activity that complements their garden work.
  arts: Isabella Cook, a dedicated backstage crew member for the local theater troupe, spends evenings quilting intricate patterns and devouring historical novels by Philippa Gregory, while also attending
    concerts by the Montana Symphony Orchestra and listening to folk legends like the Carter Family, and they find these creative pursuits vital to their sense of community.
  travel: Isabella Cook, who loves guided nature walks, has explored the Black Hills, taken a road trip to Yellowstone’s geysers, and dreams of visiting the historic towns of Cooperstown and Savannah, all
    while they plan trips that fit their modest pension and include group travel with fellow bridge players.
  culinary: Isabella Cook, a skilled canner and garden‑to‑table cook, frequently prepares hearty beef stew, fresh garden salads with dill and basil, and her famous apple‑cinnamon pie, often swapping recipes
    during potlucks that feature classic dishes like German potato salad and sourdough bread, and they relish the chance to share these meals with neighbors.
  core: Isabella Cook combines frontier‑born practicality with a relentless community spirit, orchestrating events, budgeting meticulously, and nurturing a garden while never missing a bridge game or a
    chance to share a home‑cooked meal, and they always greet each day with calm confidence.
background:
  cultural: Isabella descends from German‑Swiss settlers who homesteaded in Montana in the early 1900s. She was raised in a Protestant, frontier‑spirit household that valued self‑reliance, neighborly cooperation,
    and celebration of seasonal festivals such as the county fair and church potlucks. Her upbringing blends traditional Midwestern values with the rugged, outdoor‑oriented culture of rural Montana.
