    ''Spanish language practice'']'
  career_goals: Lourdes aims to re‑enter the workforce through a part‑time remote administrative or virtual assistant role that offers a structured, low‑stimulus environment. She plans to complete a professional
    bookkeeping certification to bolster her credentials and increase her employability. In the longer term, she hopes to launch a home‑based Mexican bakery or catering service that showcases her culinary
    expertise, allowing her to work on her own schedule. Parallel to her career aspirations, Lourdes is committed to ongoing mental‑health support, attending therapy and anxiety‑management workshops to
    sustain her emotional well‑being and confidence for future professional endeavors.
