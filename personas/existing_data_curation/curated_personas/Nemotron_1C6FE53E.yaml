personas:
  professional: Susan Kennon, an experienced real‑estate broker, they leverage fifteen years of Pierce County market expertise, meticulous client‑relationship management, and a tech‑forward approach using
    AI‑driven forecasts and virtual tours to grow their boutique brokerage into a leading sustainable firm.
  sports: Susan Kennon, an active community member, they belong to the Puyallup Trails Club and the Seattle Marathon training group, enjoy weekend hikes in the foothills, practice yoga twice weekly, and
    root for the Seattle Seahawks, Mariners, and Sounders, embodying a balanced, community‑oriented fitness approach.
  arts: Susan Kennon, an avid art enthusiast, they frequent the Tacoma Art Museum, find inspiration in the misty seascapes of Edward Curtis and the modern abstractions of local artist Karen Dorr, paint
    watercolor landscapes of Pacific Northwest forests, and unwind to the folk melodies of Joni Mitchell and the indie rock of The Lumineers, weaving visual and musical art into daily rhythm.
  travel: Susan Kennon, a meticulous planner, they explore the Oregon Coast’s rugged cliffs, camp in Olympic National Park, savor weekend trips to Seattle’s boutique wineries, and dream of a summer adventure
    in Iceland’s geothermal lagoons and a cultural tour of Copenhagen’s design districts, blending adventure with curated relaxation.
  culinary: Susan Kennon, a competent home cook, they harvest heirloom tomatoes, kale, and herbs from their garden, delight in preparing cedar‑plank salmon with dill, beet‑goat cheese salads topped with
    toasted pine nuts, and experimenting with seasonal mushroom risotto, while frequently dining at Puyallup’s farm‑to‑table bistros for fresh Pacific Northwest flavors.
  core: Susan Kennon blends meticulous real‑estate acumen with a love for misty watercolor landscapes, a habit of over‑organizing their email inbox, and a weekend ritual of early‑morning hikes that leaves
    them perpetually chasing the next sunrise.
background:
  cultural: Susan grew up in a middle‑class white family in the suburbs of Tacoma and Puyallup, with deep roots in the Pacific Northwest that trace back several generations to German and Scandinavian immigrants
    who settled in the region during the early 1900s. Her upbringing was shaped by the region’s strong appreciation for nature, community fairs such as the Washington State Fair, and a modest, self‑reliant
    ethos. She attended a local community college where she earned an associate degree in business administration, and she continues to honor her heritage through participation in regional cultural events,
    support for local artisans, and a commitment to environmental stewardship that reflects the values of her hometown.
