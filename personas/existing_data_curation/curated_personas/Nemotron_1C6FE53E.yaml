  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting'', ''Hiking'', ''Gardening'', ''Yoga'', ''Reading historical fiction'', ''Cooking'', ''Volunteering at community center'']'
  career_goals: Susan aims to expand her boutique brokerage into a leading firm in the South Puget Sound, increasing her team size to include a handful of mentors for new agents. She aspires to achieve
    top‑producer status in Pierce County while integrating sustainable and technology‑driven practices such as virtual tours and AI‑powered market forecasting. Long‑term, Susan hopes to become a recognized
    community advocate for affordable housing, partnering with local government and non‑profits to facilitate inclusive development.
