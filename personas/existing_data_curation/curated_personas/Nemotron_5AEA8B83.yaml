personas:
  professional: Audrey Bagley, a retired arts administrator turned community curator, leverages her business administration background, meticulous budget management, and a critical eye for aesthetics to
    orchestrate Kaycee's annual art exhibition, while her competitive streak and skeptical mindset drive her to constantly refine event logistics and mentor emerging artists to high standards.
  sports: Audrey Bagley, a dedicated amateur hiker and weekend volunteer for the Kaycee Senior Hiking Club, maintains a steady regimen of sunrise walks through native wildflower fields, follows the Wyoming
    Cowboys football team and the Cheyenne Frontier Days rodeo with spirited loyalty, and occasionally joins the local Trail Runners group for low-impact trail runs, while their competitive edge surfaces
    in weekly bridge tournaments at the community center.
  arts: Audrey Bagley, an avid watercolorist who captures Wyoming's sweeping plains in pastel hues, devotes evenings to studying the works of Ansel Adams, contemporary painter Njideka Akunyili Crosby, and
    poet Mary Oliver, curates community theater evenings featuring the Cheyenne Community Players' rendition of Arthur Miller's 'Death of a Salesman', and channels her love of pattern into intricate quilts
    inspired by the geometric designs of Piet Mondrian.
  travel: Audrey Bagley, a methodical planner who prefers mid-range lodgings and scenic road trips to balance her love of sunrise photography with health considerations, has traversed Yellowstone and Grand
    Teton on multiple summer hikes, explored the art museums of New York City and the historic streets of Paris, and now dreams of a cultural pilgrimage to Kyoto's temples and the ancient ruins of Machu
    Picchu, all while budgeting carefully to fund her online art shop and community projects.
  culinary: Audrey Bagley, an enthusiastic home cook with a solid grasp of rustic Wyoming flavors, delights in preparing bison chili seasoned with ancho chilies, beet-and-goat-cheese salads drizzled with
    local wildflower honey, lavender-infused shortbread, and pan-fried trout with lemon and fresh dill, often sourcing ingredients from the farmers' market, though they occasionally over-shade the chili
    when caught up listening to an audiobook.
  core: Audrey Bagley, a curious and competitively spirited retiree who blends artistic passion with meticulous organization, balances independence with community engagement, and nurtures a habit of over-analyzing
    both budgets and brushstrokes while occasionally forgetting to water her garden.
background:
  cultural: Audrey is a white American who grew up in the rural Midwest before relocating to Kaycee, Wyoming, where the frontier spirit and ranching heritage shaped her worldview. Raised in a traditionally
    Protestant, close‑knit community, she internalized values of hard work, self‑reliance, and community service. The social upheavals of the 1960s sparked her lifelong curiosity and openness to unconventional
    ideas, leading her to appreciate diverse artistic expressions. In Kaycee, she integrates the local values of independence and respect for the natural landscape with a passionate engagement in the arts,
    acting as a bridge between her small‑town roots and broader cultural currents.
attributes:
