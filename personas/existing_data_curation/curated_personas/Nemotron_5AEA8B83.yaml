  hobbies: '[''Watercolor painting'', ''Digital photography'', ''Reading modern art and philosophy'', ''Quilting'', ''Genealogy research'', ''Hiking and nature walks'', ''Book club participation'', ''Strategic
    board games (Scrabble, chess)'', ''Gardening'']'
  career_goals: Though retired from formal employment, Audrey aims to enrich Kaycee’s cultural life by curating an annual community art exhibition that highlights local talent, authoring a memoir that weaves
    personal reflections with regional history, and mentoring younger residents in digital storytelling and photography. She also hopes to develop a modest online shop for her handcrafted artworks and volunteer
    as a docent at the Johnson County historical museum, using her research skills to create engaging tours and educational programs.
