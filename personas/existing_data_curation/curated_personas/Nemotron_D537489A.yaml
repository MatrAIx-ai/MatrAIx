  hobbies: '[''Gardening'', ''Southern cooking'', ''Quilting'', ''Crocheting'', ''Church choir'', ''Volunteer work'', ''Dog walking'', ''Country music listening'']'
  career_goals: Amy aims to step into a supervisory role on the production floor within the next few years, leveraging her extensive hands‑on experience and people‑focused approach. She plans to earn an
    OSHA certification and a formal forklift license to strengthen her credentials. Long‑term, she hopes to become a shift manager or logistics coordinator, providing stable income and the opportunity to
    mentor younger workers, while maintaining a schedule that allows time for family and personal interests.
