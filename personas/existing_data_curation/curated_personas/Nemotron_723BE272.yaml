  hobbies: '[''Hiking the Green Mountains'', ''Landscape Photography'', ''Woodworking'', ''Community Theater Acting'', ''Competitive Trivia'', ''Tennis (league)'', ''Volunteering at the Local Food Bank'',
    ''Craft Beer Tasting'']'
  career_goals: Sam aims to step into a senior PMO leadership role within the next three years, where he can shape organizational strategy and embed sustainability considerations into large‑scale projects.
    He plans to earn the Program Management Professional (PgMP) certification and to mentor emerging project managers, leveraging his talkative, people‑focused style to build a high‑performing community
    of practitioners. Long‑term, Sam envisions launching a boutique consulting practice that helps regional firms adopt structured, results‑driven project frameworks while maintaining the flexibility required
    by Vermont’s dynamic business environment.
