personas:
  professional: Sam Segraves, a seasoned project manager with deep expertise in both Agile and Waterfall methodologies, leverages their love of structure and competitive drive to craft meticulously scheduled,
    risk‑aware programs while championing flexible, sustainability‑focused strategies that inspire cross‑functional teams and senior leadership.
  sports: Sam Segraves, an avid tennis league player at Northshire Tennis Club and a regular participant in the Green Mountain Trail Runners group, follows the Boston Red Sox and Boston Celtics religiously,
    cheers the Vermont Lake Monsters during summer, and incorporates weekend hill‑repeat runs into a structured fitness regime balancing cardio and strength.
  arts: Sam Segraves, a charismatic participant in St. Johnsbury Community Theatre productions, regularly dominates trivia nights at the local pub, admires the storytelling of Lin‑Manuel Miranda, collects
    prints of Ansel Adams photography, and finds inspiration in the earthy flavors of Hill Farmstead’s barrel‑aged sour ales.
  travel: Sam Segraves, a methodical planner who maps out multi‑day hikes with elevation charts, has trekked the White Mountains and the Canadian Rockies, cherishes weekend getaways to Burlington’s farmer’s
    markets, and is saving for a meticulously scheduled Inca Trail expedition to Peru, balancing travel enthusiasm with family and budget considerations.
  culinary: Sam Segraves, a competent home cook who fashions his own cedar cutting boards, delights in preparing maple‑glazed pork chops with roasted root vegetables, pairs meals with Vermont craft beers
    such as Heady Topper, and occasionally experiments with spicy Thai curries despite a preference for classic New England fare.
  core: Sam Segraves, a 54‑year‑old project‑management maestro who blends relentless structure with charismatic competitiveness, channels that energy into organized hikes, precise woodworking, and community
    theater, all while juggling a strict budget and a well‑maintained health regime.
background:
  cultural: Sam was raised in a close‑knit, predominantly white community in Rutland County, Vermont, with family roots tracing back to English and Irish immigrants who settled in New England in the early
    1900s. The region’s emphasis on self‑reliance, community service, and appreciation for the outdoors shaped his practical, dependable nature. He grew up attending local fairs, participating in town meetings,
    and embracing traditions such as maple sugaring season and seasonal town potlucks. This background instilled a strong sense of civic responsibility, an affinity for structured community activities,
    and a respect for the modest, industrious values that continue to inform his personal and professional life.
attributes:
  skills: '[''Project Scheduling'', ''Risk Management'', ''Budgeting and Cost Control'', ''Stakeholder Communication'', ''Agile and Waterfall Methodologies'', ''Process Improvement'', ''Team Leadership'',
