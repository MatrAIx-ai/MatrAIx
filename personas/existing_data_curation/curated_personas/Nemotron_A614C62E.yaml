personas:
  professional: Tai Williams is a veteran ATM and office equipment technician who leverages two decades of hands‑on repair experience and a calm, improvisational mindset to diagnose faults, craft ad‑hoc
    solutions when parts are scarce, and translate technical jargon into clear advice for bank staff, while they also mentor at‑risk youth through informal tech workshops.
  sports: Tai Williams enjoys weekend kayaking with the St. Lucie Kayak Club, follows the Tampa Bay Buccaneers and Miami Marlins avidly, and they participate in a local adult softball league, balancing
    a love of water‑based fitness with occasional community‑run 5K runs.
  arts: Tai Williams channels an appreciation for abstract expression into bold‑colored canvases reminiscent of Florida sunsets, draws inspiration from Jackson Pollock and Wynton Marsalis, captures candid
    street scenes à la Henri Cartier‑Bresson with a vintage Nikon, and they regularly contribute murals to neighborhood walls after attending the St. Lucie Art Festival and live performances by B.B. King
    and Kirk Franklin.
  travel: Tai Williams favors spontaneous road trips along Florida’s coast—stop‑overs at Key West for sunset sketches, kayaking through the Everglades, and weekend getaways to New Orleans for jazz immersion—while
    they budget travel via a dedicated savings fund and occasionally dream of a future workshop‑tour in the Pacific Northwest.
  culinary: Tai Williams loves cooking fresh grouper ceviche with lime and cilantro, perfects Key Lime pie crusts using locally sourced eggs, and they experiment with the native dish “gator tail gumbo,”
    yet they often burn the edges of abstract‑themed snack platters during late‑night studio sessions.
  core: Tai Williams blends a calm, improvisational tech repair expertise with an impulsive artistic streak, turning busted machines into canvases while they navigate spontaneous schedules, occasional disorganization,
    and a steadfast commitment to community mentorship.
background:
  cultural: Tai grew up in a close‑knit African‑American community in central Florida, where church, family gatherings, and neighborhood block parties were central to her upbringing. The rhythmic legacy
    of gospel and soul music, storytelling traditions, and a strong emphasis on mutual support shaped her worldview. Her parents instilled a work ethic rooted in self‑reliance and community uplift, encouraging
    her to help others whenever possible. Living in Fort Pierce, she draws on the region’s blend of Southern hospitality and Caribbean influences—reflected in the local cuisine, festivals, and vibrant street‑art
    scene. Tai’s Black heritage informs her artistic sensibilities, her resilience in the face of systemic challenges, and her commitment to mentoring the next generation of Black youth in tech fields.
attributes:
  skills: '[''Electronic diagnostics'', ''Mechanical repair of ATMs'', ''Office equipment maintenance'', ''Preventive maintenance'', ''Improvised troubleshooting'', ''Customer communication'', ''Technical
    documentation'', ''Basic networking'', ''Tool proficiency'', ''Creative customization'']'
  hobbies: '[''Painting'', ''Abstract art'', ''Photography'', ''Kayaking'', ''Gardening native plants'', ''Live jazz/blues/gospel performances'', ''Reading speculative fiction'', ''Leading community tech
    workshops'', ''Attending street art festivals'', ''Collecting vintage electronics'']'
  career_goals: Tai aims to earn certified ATM technician credentials and expand her services to include consulting for small businesses on selecting resilient hardware. She envisions launching a boutique
    repair shop that doubles as a community workshop where she offers tech repair classes, mentorship for at‑risk youth, and artistic customization of machines—integrating her love of art with her technical
    expertise. Over the next five years she hopes to be recognized locally as a go‑to specialist for innovative, aesthetically‑enhanced office tech solutions while fostering a pipeline of Black youth entering
    the technology trades.
