  hobbies: '["Painting","Photography","Reading philosophical and science‑fiction literature","Hosting community book club","Organizing charity fundraisers","Playing board games","Gardening","Mentoring high‑school
    students","Attending local art exhibitions","Enjoying live music and karaoke nights"]'
  career_goals: Cecil aims to advance to a regional management role within his financial institution, overseeing multiple branches and mentoring junior counselors. He plans to obtain Certified Financial
    Planner (CFP) certification to broaden his advisory scope and eventually launch his own community‑focused financial consulting firm that blends traditional counseling with creative, art‑inspired teaching
    methods. Additionally, he aspires to become a recognized speaker at industry conferences and to spearhead financial‑literacy initiatives that empower residents of Des Lacs and surrounding rural communities.
