  hobbies: '[''Watercolor painting'', ''Photography'', ''Visiting art galleries and museums'', ''Sketching meet‑ups'', ''Weekend road trips'', ''Exploring new restaurants'', ''Reading design and business
    books'', ''Competitive tennis'', ''Trivia league'', ''Blogging about sales and art'']'
  career_goals: She aims to transition to a senior regional sales director role within the next three years, overseeing multiple markets across Florida. She wants to lead a transformation initiative that
    integrates artistic storytelling and experiential retail to differentiate her company in the crowded tourist market. Pursuing a bachelor's degree in Business Administration is part of her plan to strengthen
    her strategic management credentials. Long‑term, she envisions founding a consultancy that trains sales teams to fuse creativity with data‑driven tactics, and to mentor emerging female leaders in sales.
