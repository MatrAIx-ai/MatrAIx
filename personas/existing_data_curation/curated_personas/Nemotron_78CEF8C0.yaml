  career_goals: Tyler aims to progress from his current logistician role to a senior logistics manager position within a fast‑growing e‑commerce or sustainable‑goods company in the New York metro area.
    Over the next five years, he plans to earn an MBA with a focus on operations and sustainability, lead a cross‑functional team that implements green logistics initiatives, and eventually become a director
    of supply chain strategy. He also hopes to mentor junior logisticians and contribute thought leadership on integrating ethical considerations into supply chain decisions.
