personas:
  professional: Tyler Lenahan is a logistics analyst in Brooklyn who leverages SAP, Oracle, Tableau, and Python to streamline supply chain operations for a fast‑growing e‑commerce firm, while weaving a
    humanities‑inspired narrative into data reports that persuade stakeholders and drive sustainable process improvements, and they regularly volunteer to coordinate logistics for neighborhood block parties
    and the annual St. Patrick’s Day parade.
  sports: Tyler Lenahan cycles the Brooklyn waterfront with the NYRR club, plays intramural basketball at Prospect Park, follows the Brooklyn Nets and New York Yankees, trains for seasonal half‑marathons
    in the spring, and often rides his bike to the St. Patrick’s Day parade route, applying the same methodical planning they use at work to their fitness goals.
  arts: Tyler Lenahan is a regular at BAM’s independent film screenings, devours contemporary novels by Sally Rooney and Haruki Murakami, writes occasional personal essays for a local literary zine, enjoys
    live sets by indie group Vampire Weekend and jazz trio The Bad Plus, and participates in neighborhood storytelling nights that pop up around block parties and St. Patrick’s Day celebrations, letting
    these creative experiences inform their storytelling mindset.
  travel: Tyler Lenahan prefers meticulously planned weekend getaways to culturally rich cities—having explored Lisbon’s tile‑laden neighborhoods, Tokyo’s sushi alleys, and a road trip through the Catskills—while
    budgeting each trip through a travel spreadsheet, aiming to add Iceland’s geothermal baths and Oaxaca’s street markets to their itineraries within the next two years, and they dream of experiencing
    Dublin’s St. Patrick’s Day festivities abroad.
  culinary: Tyler Lenahan experiments with international cuisines, whipping up shakshuka with fresh bell peppers, pad thai with tamarind paste, and homemade ramen broth seasoned with kombu and miso, yet
    admits to a habit of over‑salting dishes when trying new recipes, often compensating by sprinkling fresh herbs from the local farmers’ market, and they relish preparing a pepper‑spiced corned‑beef stew
    for the annual St. Patrick’s Day gathering.
  core: Tyler Lenahan blends methodical logistics expertise with a restless curiosity for culture, balancing a pragmatic approach to finance and health with a penchant for late‑night indie concerts, community
    block parties, and occasional over‑cooking.
background:
  cultural: Tyler is a white American of mixed Irish and German ancestry, raised in the suburbs of Long Island before moving to Brooklyn for work. His family emphasized education, civic responsibility,
    and a love of storytelling, which aligns with his humanities degree. Living in Brooklyn has immersed him in a multicultural environment, shaping his appreciation for diverse perspectives and community
    engagement. While he celebrates traditional American holidays, he also participates in local cultural events such as St. Patrick's Day parades and neighborhood block parties, reflecting a blend of his
    heritage and the eclectic Brooklyn scene.
