  hobbies: '[''Visiting art museums and galleries'', ''Painting and photography'', ''Community basketball leagues'', ''Cooking traditional and experimental dishes'', ''Volunteer logistics for food drives
    and community events'', ''Gardening'', ''Reading about urban design and sustainable architecture'', ''Attending live jazz, soul, and hip‑hop performances'']'
  career_goals: In the next few years, Marcell plans to complete an OSHA certification and earn a Certified Forklift Operator credential while finishing an associate's degree in logistics or business administration
    at a local community college. He aims to move into a shift‑supervisor role within his current distribution center, leveraging his organized workflow skills and people‑centered leadership. Long‑term,
    he envisions becoming a regional logistics manager or launching his own small consulting firm that helps midsize warehouses improve efficiency and incorporate community art projects. He also hopes to
    establish a mentorship program for Milwaukee youth that pairs logistics training with creative workshops, reflecting his desire to help others and blend his interests in work and art.
