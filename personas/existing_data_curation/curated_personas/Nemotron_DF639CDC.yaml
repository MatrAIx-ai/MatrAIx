personas:
  professional: Marcell Higgins, an organized warehouse specialist certified in forklift operation, leverages his methodical workflow skills and compassionate leadership to streamline inventory processes,
    train new staff, and embed community art projects into the distribution center’s break areas.
  sports: Marcell Higgins, a dedicated Wednesday‑night basketball player for the Riverwest Runners in the Milwaukee Community Center league, cheers for the Milwaukee Bucks and enjoys attending Brewers games,
    while maintaining a personal fitness routine that mixes pick‑up streetball with weekend jogs along the Lakeshore Trail.
  arts: Marcell Higgins, an avid participant in Milwaukee’s art scene, frequents the Milwaukee Art Museum’s Kehinde Wiley exhibition, draws inspiration from photographer Catherine Opie, and regularly attends
    live performances by jazz saxophonist Kamasi Washington and hip‑hop artist Kendrick Lamar, channeling these influences into his own painting and photography projects.
  travel: Marcell Higgins, a weekend‑road‑trip enthusiast, plans meticulously using Google Maps to explore nearby Door County’s wineries, revisits the historic streets of New Orleans for its soul‑food scene,
    and dreams of a spring pilgrimage to Lisbon’s street art districts, while balancing travel costs with a modest savings plan.
  culinary: Marcell Higgins, a passionate home chef, perfects Southern classics like fried catfish and collard greens spiced with smoked paprika, experiments with Japanese ramen broth using kombu and miso,
    and often whips up a weekend batch of cornbread topped with honey butter, sharing these meals with friends around his backyard garden.
  core: Marcell Higgins, a calm yet energetic 30‑year‑old who balances meticulous logistics work with spontaneous art and cooking sessions, can’t resist a late‑night basketball game even if it means skipping
    a stretch, and habitually checks their wristwatch for both inventory counts and cooking timers.
background:
  cultural: Marcell is an African‑American who grew up in Milwaukee’s East Side after his parents migrated from the Deep South during the Great Migration. His family’s roots in Mississippi shaped a deep
    appreciation for gospel music, storytelling, and the traditions of Southern cuisine, while the Midwestern industrial landscape instilled a strong work ethic. He was raised in a Baptist community that
    emphasized service, education, and collective uplift, participating in church‑based youth programs and neighborhood block parties. Milwaukee’s Black cultural institutions—such as the Wisconsin Black
    Historical Society and the annual Juneteenth celebration—are important touchstones for him, reinforcing pride in his heritage and a commitment to community solidarity.
