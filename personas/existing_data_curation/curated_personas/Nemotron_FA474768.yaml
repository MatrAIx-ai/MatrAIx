personas:
  professional: Joe Howerton, a 21‑year‑old aspiring architect immersed in BIM and LEED‑driven design, leverages their methodical planning and talkative confidence to orchestrate sustainable residential
    projects while keeping team schedules tight and client meetings engaging.
  sports: Joe Howerton fuels their love for the outdoors by tackling Boulder’s trail system with the Boulder Mountain Club, hitting the slopes with the Boulder Ski & Snowboard Club for seasonal ski trips,
    and cheering on the Colorado Avalanche, while they also enjoy weekend bike rides with the Boulder Cycling Club.
  arts: Joe Howerton blends architectural sketching with a hobbyist’s eye for photography, channels their sociable energy into improv comedy workshops, strums a battered acoustic guitar at local open‑mic
    nights featuring The Lumineers covers, and frequently cites Ansel Adams and Frank Lloyd Wright as artistic inspirations.
  travel: Joe Howerton maps out detailed itineraries for weekend escapes to Rocky Mountain National Park, Yellowstone, and a dream trek to Patagonia, balancing adventure with eco‑friendly lodging and a
    modest budget that reflects their student‑loan reality.
  culinary: Joe Howerton prefers wholesome meals like quinoa bowls with kale, grilled salmon, and locally sourced avocado toast, but they indulge in cheat‑day pizza and craft beer from Colorado breweries
    after marathon game nights, and they are a frequent patron of farm‑to‑table eateries featuring seasonal produce.
  core: Joe Howerton is a disciplined yet gregarious 21‑year‑old architect‑in‑training who merges sustainable design, mountain adventures, and impromptu comedy, all while juggling a tight budget, occasional
    knee aches, and a habit of late‑night pizza cravings.
background:
  cultural: Joe grew up in a middle‑class family of Irish‑German descent in a suburban community near Denver, where his father worked as a carpenter and his mother taught elementary school. This upbringing
    instilled a respect for craftsmanship, hard work, and community service. The family’s emphasis on practicality and tradition shaped his pragmatic outlook, while frequent weekend trips to the nearby
    mountains fostered a lifelong love of the outdoors. Living now in Boulder, he embraces the city’s progressive emphasis on sustainability and communal engagement, blending his Midwestern‑rooted values
    with the local culture of environmental stewardship and collaborative spirit.
