  hobbies: '[''Hiking'', ''Rock climbing'', ''Mountain biking'', ''Skiing'', ''Photography'', ''Sketching'', ''Improv comedy'', ''Hosting game nights'', ''Volunteer work with Habitat for Humanity'', ''Playing
    guitar'', ''Yoga'', ''Reading about sustainable design'']'
  career_goals: In the next two years Joe aims to complete his Architect Registration Examination and earn NCARB certification, securing a licensure that will allow him to lead design projects. He plans
    to specialize in sustainable residential and community architecture within the Boulder area, taking on increasing responsibilities as a project lead. Over the next five to ten years, Joe aspires to
    establish his own practice focused on affordable, environmentally responsible housing, while mentoring emerging designers and actively participating in local planning committees. His long‑term ambition
    is to be recognized as a reliable, people‑focused architect who integrates community input into every design.
