personas:
  professional: Takeesha Charity, a seasoned automotive service technician with over a decade of hands‑on experience, fuses deep mechanical knowledge of gasoline, hybrid, and electric powertrains with a
    vivid artistic imagination to design custom, story‑driven vehicle modifications, and they are on track to earn ASE Master Technician certification while teaching peers through hand‑drawn sketches and
    3D models.
  sports: Takeesha Charity enjoys solitary fitness routines like early‑morning jogs along the Detroit Riverwalk, weekend cycling through the Pinckney State Recreation Area, and weekly yoga sessions at the
    local studio, while cheering on the Detroit Lions and Detroit Pistons, and they participate in the Motor City Auto Club’s monthly track‑day meetups as their version of a sports community.
  arts: Takeesha Charity immerses themselves in creative expression by sketching futuristic vehicle concepts in a miniature notebook, dabbling in digital illustration with tools like Procreate, and they
    draw inspiration from cyber‑punk visionaries such as William Gibson, visual artist H.R. Giger, and ambient musicians Brian Eno and Aphex Twin, while occasionally attending local gallery openings that
    feature speculative art.
  travel: Takeesha Charity prefers low‑key, self‑guided travel, planning trips around automotive events or scenic nature hikes, having road‑tripped to the Upper Peninsula’s Pictured Rocks, explored the
    design districts of Tokyo during a solo visit to the Tokyo Motor Show, and dreaming of a quiet retreat in Iceland’s volcanic landscapes, and they budget their trips with a modest travel fund and a penchant
    for spontaneous detours.
  culinary: Takeesha Charity finds solace in cooking comforting dishes like braised short ribs, creamy garlic mashed potatoes, and spiced roasted sweet potatoes, confidently seasoning with smoked paprika,
    rosemary, and a dash of hot sauce, and they enjoy experimenting with homemade sauces while admitting that they often leave the kitchen a mess and forget to clean the stovetop until the next day.
  core: Takeesha Charity blends a mechanic’s precision with an artist’s imagination, curating custom car art while living a flexible, solo‑oriented lifestyle that values calm, creativity, and occasional
    disorganized bursts of spontaneity, and they thrive on the balance between order and artistic chaos.
background:
  cultural: Takeesha grew up in the Detroit metropolitan area, where the legacy of the Motor City’s automotive industry is woven into the community fabric. As a Black woman, she navigated a male‑dominated
    trade, drawing strength from a close-knit African‑American network that values resilience, mutual support, and pride in craftsmanship. Her family often gathered around classic cars, and she inherited
    a love for hands‑on work and the cultural significance of automobiles as symbols of empowerment and mobility in the Black community. In Southfield, she participates in local initiatives that promote
    diversity in skilled trades, and she celebrates her heritage through annual visits to cultural festivals, church gatherings, and community volunteer events that blend service with the shared history
    of the region’s Black automotive pioneers.
attributes:
  skills: '[''Engine Repair'', ''Hybrid & Electric Vehicle Maintenance'', ''Automotive Diagnostics (OBD‑II, oscilloscopes)'', ''Custom Fabrication & Welding'', ''Technical Sketching & 3D Modeling'', ''Creative
    Troubleshooting'', ''ASE Certification (pending)'', ''Written Customer Communication'']'
  hobbies: '[''Sketching automotive concepts'', ''Building scale model cars'', ''Digital illustration'', ''Reading speculative fiction'', ''Listening to ambient electronic music'', ''Nature walks'', ''Yoga'',
    ''Cooking soul‑food'', ''Attending car shows (solo)'']'
  career_goals: She aims to solidify her expertise by obtaining full ASE Master Technician certification within the next two years, and to establish a boutique garage in Southfield that specializes in custom,
    art‑inspired vehicle modifications for a niche clientele who value both performance and aesthetic storytelling. Takeesha also hopes to mentor young Black women interested in automotive trades, perhaps
    by partnering with local technical schools or community centers. Long‑term, she envisions creating an online archive of her design sketches and repair guides, fostering a community of independent, creatively
    inclined technicians who can work on flexible schedules that accommodate a balanced, low‑stress lifestyle.
