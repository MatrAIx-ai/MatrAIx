personas:
  professional: Jose Lazo, a veteran sales leader with a knack for data‑driven forecasting and process optimization, they blend pragmatic curiosity with a reserved, thoughtful demeanor to mentor their team
    while assertively steering it toward ambitious targets.
  sports: Jose Lazo stays fit by hiking the San Gabriel trails with the local San Gabriel Hiking Club, they follow the Los Angeles Dodgers and Lakers seasons, and spend Saturday mornings playing casual
    tennis at the community park while avoiding crowded gyms.
  arts: Jose Lazo immerses themselves in classic cinema, they regularly watch Golden Age films from their heritage and old Hollywood dramas starring Humphrey Bogart and Katharine Hepburn, and occasionally
    attend local theater productions of Shakespearean plays.
  travel: Jose Lazo favors low‑key road trips that blend culture and nature, they often plan week‑long visits to historic colonial towns like Oaxaca and the Pacific coast for culinary discovery, while also
    enjoying weekend getaways to Napa Valley vineyards and the Sierra Nevada for gentle hiking.
  culinary: Jose Lazo, a confident home cook, they harvest tomatoes, chilies, and herbs from their garden to craft family recipes such as pozole and tamales, seasoning them with cilantro, cumin, and epazote,
    while savoring the occasional dinner at a quiet neighborhood taquería that serves authentic mole.
  core: Jose Lazo is a data‑driven sales veteran who finds solace in solitary gardening, classic films, and meticulous spreadsheets, yet they often battle stress‑induced worry that fuels both their meticulousness
    and occasional over‑cautiousness.
background:
  cultural: Jose was born to Mexican immigrant parents who settled in Southern California during the 1970s. He grew up bilingual, speaking Spanish at home while attending English‑language schools, which
    gave him a deep appreciation for both Mexican and American cultures. Family celebrations such as Día de los Muertos, Las Posadas, and quinceañeras remain central to his identity, and he maintains strong
    ties to the local Mexican community in Rowland Heights. His Catholic faith, community involvement at the local parish, and devotion to Mexican culinary traditions continue to shape his values, work
    ethic, and social interactions.
