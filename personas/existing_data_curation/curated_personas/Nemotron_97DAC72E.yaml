    ''Adaptability to new tools'', ''Team collaboration in small groups'', ''Stress management techniques'']'
  hobbies: '[''Visiting art museums and galleries'', ''Digital photography'', ''Generative art coding with Python'', ''Reading speculative fiction'', ''Yoga and mindfulness meditation'', ''Journaling'',
    ''Cooking experimental dishes'', ''Hiking local nature trails'', ''Small‑group board‑game evenings'', ''Sketching and creative writing'']'
  career_goals: 'Betty aims to advance from a frontline support role to a senior IT engineer position, eventually moving into IT management or a specialized cybersecurity role. She plans to earn CompTIA
    Network+ and Security+ certifications, followed by a Microsoft Certified: Azure Administrator credential, and is considering a master’s degree in Information Systems. Simultaneously, she hopes to blend
    her technical expertise with her love of art by supporting creative technology projects, such as digital media workflows for local artists or interactive installations. Betty also wants to champion
    mental‑health awareness within her workplace, creating peer‑support programs that help colleagues manage stress and anxiety.'
