personas:
  professional: Betty Booker, a 34‑year‑old Computer Support Specialist in Houston, blends deep technical know‑how in Windows, macOS, and Linux environments with a curiosity‑driven fascination for art,
    delivering responsive IT service through PowerShell automation and clear documentation while positioning themselves for senior engineering and cybersecurity roles.
  sports: Betty Booker fuels their weekend fitness by hiking the Buffalo Bayou trails with the Houston Hiking Club, practicing weekly Vinyasa yoga at a downtown studio, and cheering loyally for the Houston
    Astros, Houston Rockets, and Houston Dynamo while occasionally joining pick‑up soccer games with friends.
  arts: Betty Booker immerses themselves in the Houston Museum of Fine Arts and Katy Arts & Cultural Center, draws inspiration from contemporary creators like Yayoi Kusama, Refik Anadol, and the street‑art
    provocateur Banksy, spends evenings crafting generative art code in Python, and curates a personal collection of speculative‑fiction graphic novels by N.K. Jemisin.
  travel: Betty Booker prefers curated short‑haul trips, relishing weekend drives to the Texas Hill Country vineyards and annual visits to Kyoto’s historic temples for quiet reflection, while dreaming of
    a future adventure trekking Iceland’s volcanic landscapes and attending the Rio de Janeiro Carnival.
  culinary: Betty Booker delights in cooking inventive dishes such as miso‑glazed eggplant with toasted sesame seeds, quinoa‑crusted salmon topped with sumac‑infused salsa, and homemade charred cauliflower
    tacos finished with jalapeño crema, showcasing a skillful blend of Asian and Latin flavors.
  core: Betty Booker is a tech‑savvy art enthusiast whose disciplined work ethic coexists with intense emotional waves, a love of yoga and generative code, and a habit of turning anxiety into creative expression.
background:
  cultural: Betty is a white American raised in the suburban communities of the Greater Houston area. Her upbringing blends traditional Texan values—hospitality, independence, and a strong work ethic—with
    the cultural diversity of Harris County, where exposure to a wide range of ethnic cuisines, music, and artistic expression is commonplace. She grew up in a family that emphasized higher education and
    community involvement, often volunteering at local charity events and church gatherings. While she identifies with Southern hospitality and modesty, her curiosity for art and new ideas has led her to
    embrace the multicultural arts scene of Houston, integrating those influences into her personal and professional life.
attributes:
  skills: '[''Windows troubleshooting'', ''macOS support'', ''Linux command line'', ''Active Directory administration'', ''Office 365 troubleshooting'', ''Network diagnostics'', ''Remote desktop support'',
