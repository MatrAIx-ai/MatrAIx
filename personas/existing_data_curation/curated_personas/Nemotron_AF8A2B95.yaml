personas:
  professional: A budding visual artist and digital storyteller, Arrick Wilson blends abstract illustration, street photography, and socially aware design to craft compelling narratives for community projects,
    and they channel their outgoing nature and disciplined work ethic into collaborative agency internships.
  sports: An energetic athlete, Arrick Wilson plays pickup basketball at the local community center, spends weekends skateboarding at the College Park skate park, cheers for the Washington Wizards and DC
    United, and they belong to a casual varsity-style club that meets for weekend runs and friendly scrimmages.
  arts: A dedicated creator, Arrick Wilson spends evenings sketching surreal digital illustrations, curates street-style photo series of College Park’s urban vibe, produces beat-made tracks inspired by
    Kendrick Lamar and Kamasi Washington, attends live hip‑hop shows at U Street Music Hall, and they regularly quote Basquiat’s statements to fuel their artistic philosophy.
  travel: A curious explorer, Arrick Wilson has taken weekend trips to New York for the annual hip‑hop festival, visited the historic monuments of Washington, D.C., spent a summer at Virginia Beach soaking
    up surf culture, dreams of a culinary pilgrimage to New Orleans, and they plan a future solo journey to Tokyo to study anime-inspired design, balancing budget constraints with a love for immersive experiences.
  culinary: A passionate food lover, Arrick Wilson enjoys cooking Southern-inspired dishes like collard greens, fried chicken, and jambalaya in the dorm kitchen, experiments with spicy ramen bowls using
    gochujang and miso, bites into sweet potato pie for comfort, and they often skip breakfast to stay up editing videos, resulting in occasional reliance on energy drinks.
  core: Arrick Wilson is an 18‑year‑old visual storyteller whose restless imagination, community-driven values, and love for urban rhythm fuse into bold, socially aware creations, even if they sometimes
    sacrifice sleep and skip meals for the next project.
background:
  cultural: Arrick grew up in Prince George's County, a culturally rich suburb of Washington, D.C., where the African‑American heritage is deeply woven into daily life. His family emphasizes education,
    community service, and storytelling rooted in Black traditions. He celebrates Juneteenth, enjoys soul and Southern-inspired cuisine, and draws inspiration from the legacy of Black artists, musicians,
    and activists from the D.C. area. The multicultural environment of College Park exposes him to diverse perspectives, reinforcing his identity as a Black creative who values both his cultural roots and
    the broader tapestry of American urban life.
