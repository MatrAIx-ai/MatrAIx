  career_goals: Arrick aims to complete a BFA in Visual Arts or a related media field and build a compelling portfolio that blends contemporary digital aesthetics with socially conscious themes. He aspires
    to secure an internship at a forward‑thinking creative agency, eventually rising to roles such as senior art director or digital content strategist. Long‑term, he hopes to launch community‑centered
    art projects and a digital platform that amplifies Black creatives, using his skills to spark dialogue around social justice and cultural identity.
