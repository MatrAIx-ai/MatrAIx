personas:
  professional: Ariel Thon, an experienced accountant targeting senior auditor promotion, leverages advanced Excel, QuickBooks, and SAP FICO expertise, and they apply their curious, competitive mindset
    to design innovative audit solutions for arts nonprofits while nurturing meticulously organized yet adaptable team dynamics.
  sports: Ariel Thon fuels their energetic spirit by hiking the Illinois River trail weekly, playing competitive doubles tennis at the Winnebago Country Tennis Club, and cheering on the Chicago Cubs, Bears,
    and Bulls, analyzing each game with the same meticulous focus they apply to audit spreadsheets.
  arts: Ariel Thon immerses themselves in the arts by leading a weekend pottery class, starring in community theater productions of Arthur Miller's 'The Crucible', frequenting galleries showcasing works
    by Kehinde Wiley and Ai Weiwei, and they find inspiration in the music of Yo-Yo Ma and Tori Amos.
  travel: Ariel Thon prefers well‑planned road trips that blend cultural immersion with culinary stops, having explored historic Savannah, the vineyards of Napa Valley, and the vibrant souks of Marrakech,
    and they earmark future visits to Santorini and the National Gallery of Victoria in Melbourne for a mix of art and adventure.
  culinary: Ariel Thon, an adventurous home chef, harvests heirloom tomatoes, carrots, and herbs from their garden to craft dishes like roasted beet quinoa salad, pan‑seared trout with lemon‑dill butter,
    and a spicy mole poblano, and they often pair meals with a glass of Illinois Pinot noir and a dash of curiosity.
  core: Ariel Thon merges razor‑sharp accounting precision with a vibrant love of art, constantly juggling budget spreadsheets and pottery wheels, and they habitually check work emails during dinner while
    never missing a weekly bridge game.
background:
  cultural: Ariel is a third‑generation Midwestern American of German‑Irish ancestry, raised in a small farming community near Savanna, Illinois. Her upbringing reflects the region’s strong work ethic,
    modest Protestant values, and deep ties to local traditions such as county fairs and folk music festivals. While she cherishes these roots, she also embraces diverse cultural experiences through travel,
    art appreciation, and active participation in community events that celebrate both heritage and contemporary creativity.
attributes:
  skills: '[''Financial Reporting'', ''Tax Preparation'', ''Auditing'', ''Data Analysis'', ''Advanced Excel'', ''QuickBooks'', ''SAP FICO'', ''Regulatory Compliance'', ''Risk Assessment'', ''Project Management'',
    ''Public Speaking'', ''Community Outreach'', ''Art Appreciation'', ''Event Coordination'']'
  hobbies: '[''Visiting art galleries'', ''Community theater participation'', ''Photography'', ''Pottery classes'', ''Hiking in local nature preserves'', ''Gardening'', ''Bridge card game'', ''Cooking'',
    ''Traveling to museum exhibitions'', ''Volunteering with local historical society'']'
  career_goals: Ariel aims to attain a senior auditor position within the next two years, positioning herself for a future partnership at the regional accounting firm. She plans to complete her CPA certification
    to solidify her credentials and expand into consulting for arts and cultural nonprofits, where she can merge her financial expertise with her passion for the arts. Long‑term, she envisions serving on
    the board of the local chamber of commerce and mentoring emerging accountants, especially women, in the Midwest.
