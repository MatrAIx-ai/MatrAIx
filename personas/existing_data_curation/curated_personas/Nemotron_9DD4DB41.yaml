  hobbies: '[''Hiking in the Wasatch Mountains'', ''Bowling league'', ''Gardening'', ''Woodworking projects'', ''Volunteer community clean‑up events'', ''Cooking family meals'', ''Listening to classic rock'',
    ''Playing bridge'', ''Attending church fellowship gatherings'']'
  career_goals: Eric aims to transition into a supervisory or facilities manager role within his organization, where he can mentor younger staff and improve operational efficiency. He plans to obtain a
    Certified Professional Cleaner (CPC) credential and lead a green‑cleaning initiative for the building. As he approaches retirement, he hopes to secure a part‑time advisory position that allows him to
    share his expertise while maintaining a stable income and a lasting legacy of workplace safety and reliability.
