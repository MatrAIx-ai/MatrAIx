personas:
  professional: Eric Mccall, a seasoned facilities maintenance veteran with three decades of commercial cleaning expertise, combines meticulous floor care, hazardous-material handling, and green-cleaning
    know-how with a practical, structured approach to mentor younger staff and spearhead a sustainability initiative as they pursue a Certified Professional Cleaner credential and a supervisory role.
  sports: Eric Mccall enjoys leading weekly hikes with the Wasatch Trailblazers, competes in the Valley Strikers bowling league on Friday nights, cheers for the Utah Jazz and follows the BYU Cougars during
    football season, and volunteers as a scorekeeper for a local high-school basketball tournament, reflecting how they blend their love of outdoor recreation with community-oriented sports involvement.
  arts: Eric Mccall spends evenings listening to classic rock staples like The Rolling Stones, Led Zeppelin, and Creedence Clearwater Revival while cooking family meals, attends the local community theatre's
    productions of classic westerns, participates in the church choir's seasonal performances, and occasionally watches retro films such as The Good, the Bad and the Ugly, illustrating how they weave musical
    nostalgia and cultural traditions into their leisure.
  travel: Eric Mccall favors scenic road trips to national gems such as Zion, Bryce Canyon, Yellowstone, and Grand Teton, has already explored Denali National Park in Alaska, dreams of trekking Patagonia's
    Torres del Paine, plans trips months ahead to balance modest budgets with family time, and they typically combine hiking adventures with occasional stays at family-friendly cabins, reflecting a travel
    style rooted in outdoor appreciation and careful financial planning.
  culinary: Eric Mccall enjoys cooking hearty family meals like rosemary-infused roasted chicken, grilled trout seasoned with garden-fresh dill, a robust beef chili topped with cheddar, and a classic apple
    pie, often harvesting basil, sage, and oregano from their modest garden to enhance flavors, and they take pride in their solid, middle-class culinary skills while occasionally over-salting dishes when
    experimenting with new recipes.
  core: Eric Mccall blends a disciplined work ethic, a love for outdoor camaraderie, and a passion for classic-rock nostalgia, yet they occasionally splurge on costly woodworking tools, reflecting a modest
    yet slightly impulsive personality that values community, structure, and personal enjoyment.
background:
  cultural: Eric is a white American who grew up in the Intermountain West, absorbing the region’s emphasis on hard work, self‑reliance, and community service. Living in West Valley City, he is influenced
    by the prevailing Utah culture, which values family cohesion, modesty, and outdoor recreation. His background reflects a blend of traditional middle‑class values, a strong work ethic, and a commitment
    to contributing positively to his local community.
attributes:
  skills: '[''Commercial cleaning'', ''Floor care (hardwood, carpet, tile)'', ''Restroom sanitation'', ''Hazardous material handling'', ''Safety inspections'', ''Basic plumbing and electrical troubleshooting'',
