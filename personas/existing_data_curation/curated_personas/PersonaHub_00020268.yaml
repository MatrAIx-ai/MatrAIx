persona_description: A psychologist who specializes in the study of stress and trauma in adolescent development, particularly in the context of childhood abuse. Her research focuses on the neuroendocrine
  response to stress and its impact on mental health, and her findings have implications for understanding the development of severe psychiatric disorders such as depression. Her work has been funded by
  the Ontario Mental Health Foundation and conducted in collaboration with other researchers.
