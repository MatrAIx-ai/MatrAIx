  career_goals: Amber aims to complete her high school education with honors and secure a scholarship to study environmental science or nursing at a state university. She is drawn to careers that combine
    her curiosity about the natural world with a desire to help her community, such as wildlife rehabilitation, conservation management, or public health nursing. In the long term, she hopes to work on
    protecting Maine's forests and waterways while also providing compassionate care to those in need. Amber also envisions starting a blog or social‑media channel to share educational content about local
    ecology and sustainable living practices.
