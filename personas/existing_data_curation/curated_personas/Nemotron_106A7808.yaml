personas:
  professional: Betty Baker, a three‑year‑old preschooler, exhibits emerging organizational skills by sorting crayons and leading group songs, merging a love for predictable routines with an occasional
    spontaneous mess, and they often remind classmates to tidy up, foreshadowing a future in project coordination.
  sports: Betty Baker, a three‑year‑old residing in the Chicago area, avidly watches the Chicago Cubs on weekends, participates in the Little Stars Tots Soccer Club at the community center, and enjoys energetic
    games of tag in the local park, and they often cheer for their teammates, reflecting a playful yet structured approach to sports.
  arts: Betty Baker, a three‑year‑old who sings along to The Wiggles and watches Sesame Street, delights in drawing simple pictures of dinosaurs and prefers the bright colors of Pixar’s Toy Story, and they
    often display their artwork on the refrigerator, demonstrating a vivid yet organized artistic imagination.
  travel: Betty Baker, a three‑year‑old who loves family road trips to the Great Lakes State Park, short flights to Walt Disney World, and weekend visits to Niagara Falls, prefers meticulously planned itineraries
    with scheduled nap times yet sometimes delights in spontaneous stops at ice‑cream kiosks, and they always request a stuffed animal for comfort on the plane.
  culinary: Betty Baker, a three‑year‑old with a budding palate, adores cheesy mac and cheese, snack‑time Goldfish crackers, and sips warm apple sauce, often helping stir spaghetti sauce despite a tendency
    to spill the spoon, and they eagerly share food with friends, reflecting both enthusiasm and messiness in the kitchen.
  core: Betty Baker, a three‑year‑old who thrives on bedtime story routines yet randomly reorganizes toy shelves, balances a love for structure with spontaneous bursts of creativity, and they occasionally
    forget to brush teeth before sleep.
background:
  cultural: Betty is a white Anglo‑American child raised in Chesapeake, Virginia. Her family's cultural practices blend Southern mid‑Atlantic traditions with broader American customs, including holiday
    celebrations like Thanksgiving and the Fourth of July, occasional church gatherings, community events at local parks, and family outings to nearby coastal sites such as the aquarium and beaches. These
    experiences shape her appreciation for community, nature, and shared activities.
