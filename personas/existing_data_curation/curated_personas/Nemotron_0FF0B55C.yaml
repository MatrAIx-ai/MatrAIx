  career_goals: Even at five, Theodore talks about future jobs that combine clear routines, teamwork, and lots of people. He often says he wants to be a firefighter or a police officer because those roles
    have set schedules, help the community, and let him work with others. He also imagines being a preschool teacher, where he can share stories, be the centre of attention, and guide a group of kids through
    daily activities.
