  career_goals: Bradley aims to transition from a frontline customer service role to a supervisory position within the next three years, seeking to lead a small team and develop training programs that emphasize
    empathy and creative problem solving. He is interested in becoming a Customer Experience Manager, where he can influence service strategy and integrate his passion for arts and culture into brand storytelling.
    Long‑term, he envisions launching a community‑focused arts outreach initiative that combines his customer‑service expertise with his love for local galleries, workshops, and cultural events, providing
    a flexible way to marry his professional skills with his personal interests.
