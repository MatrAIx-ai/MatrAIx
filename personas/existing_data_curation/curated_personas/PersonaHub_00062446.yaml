persona_description: Henry Miller, a recent RPI Masters of Architecture graduate who has devised a way to reuse waste plastic as an aggregate in cement, circumventing the energy-intensive process of plastic
  recycling. Miller's project, the "Plastic Concrete," is a groundbreaking solution that has earned him first place in the "Component Category" of the second annual Concrete Thinking for a Sustainable World
  competition. Miller's project not only uses recycled materials but also creates a more sensible product by using ground-up plastic with cement and soil reclaimed from brownfield sites. Miller's project
  demonstrates that his ideas are viable alternatives to the status quo and that there is no excuse to merely fall in line.
