  career_goals: Oscar aims to advance to a regional operations director role within the next five years, overseeing multiple facilities across the Central Valley. He is driven to implement sustainable,
    lean processes that reduce waste and improve employee well‑being. By earning certifications such as Certified Lean Six Sigma Black Belt and a bachelor's in Business Administration, he plans to strengthen
    his strategic planning abilities. Oscar also aspires to mentor emerging supervisors, creating a supportive pipeline that values clear structure and emotional resilience. Outside the corporate ladder,
    he envisions launching a consultancy that assists small agricultural businesses in adopting efficient operational practices while offering workshops on stress management for frontline workers.
