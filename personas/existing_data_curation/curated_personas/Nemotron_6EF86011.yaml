  hobbies: '[''Playing basketball with friends'', ''Tinkering with computer hardware'', ''DIY woodworking projects'', ''Reading science‑fiction novels'', ''Cooking Caribbean‑inspired dishes'', ''Volunteering
    at the community center'', ''Listening to hip‑hop, jazz, and R&B music'', ''Maintaining a small garden plot'']'
  career_goals: Ahmad aims to enroll in a community college program that offers certifications in HVAC or plumbing, leveraging his practical curiosity to secure a stable skilled‑trade career. He also hopes
    to develop leadership experience by eventually managing a small team of technicians. In the longer term, he envisions contributing to his neighborhood through a community development role that combines
    his organizational strengths with his desire to support local youth and families.
