personas:
  professional: Ahmad Moise is a disciplined aspiring HVAC technician who leverages a meticulous Excel‑based budgeting system, strong project‑planning skills, and hands‑on troubleshooting experience to
    excel in community volunteer coordination while preparing for a trade certification.
  sports: Ahmad Moise plays pickup basketball at the neighborhood park with the Eastside Hoops club, follows the Metro City Monarchs in the NBA and the local high‑school track team during autumn, sticks
    to a disciplined weekly workout routine that includes strength training and stretching, though they often skip cooldowns, leading to the occasional knee flare‑up.
  arts: Ahmad Moise finds inspiration in the beats of Kendrick Lamar, the improvisations of Miles Davis, and the soulful vocals of Erykah Badu, spends weekends listening to R&B while tinkering with gadgets,
    and retreats into science‑fiction novels like Neuromancer and Dune for creative fuel.
  travel: Ahmad Moise prefers meticulously planned short trips, having explored New Orleans for its music scene, spent a weekend in Kingston sampling Caribbean street food, and now dreaming of an adventurous
    hike through Iceland’s ice caves while balancing a modest student budget.
  culinary: Ahmad Moise enjoys experimenting with Caribbean‑inspired dishes such as jerk chicken, plantain‑crusted pork, and coconut rice, often seasoning with fresh thyme, cilantro, and Scotch bonnet peppers,
    and while their cooking skill sits at a confident home‑chef level, they sometimes over‑salt to compensate for bold flavors.
  core: Ahmad Moise is a 21‑year‑old hyper‑organized future tradesperson who blends a love for DIY tech, community mentorship, and sci‑fi storytelling, yet can’t resist a late‑night gadget purchase that
    dents their budget.
background:
  cultural: Ahmad identifies as African American, born and raised in Brockton, Massachusetts, a city with a vibrant Black community and significant Caribbean influences. His family has deep roots in the
    New England region, and he grew up attending a local Baptist church where community service and collective support were emphasized. Exposure to neighborhood gatherings, cultural festivals, and diverse
    musical traditions has shaped his appreciation for both African‑American heritage and the broader multicultural fabric of the area. These experiences inform his values of cooperation, respect for elders,
    and a strong work ethic.
attributes:
  skills: '[''Effective time management'', ''Project planning and organization'', ''Proficiency in Microsoft Office Suite'', ''Basic computer troubleshooting'', ''Research and information synthesis'', ''Community
