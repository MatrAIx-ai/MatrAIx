personas:
  professional: Ivelisse Forrest dreams of becoming a scientist, combining their love for LEGO building with curiosity about how things work, and they often organize experiments with bright sticky notes,
    showing the blend of practical organization and flexible imagination they bring to every project.
  sports: Ivelisse Forrest laces up their cleats for the U7 girls’ team of Grand Rapids United Soccer Association, idolizes the Detroit Tigers and watches games with the family, and they channel their boundless
    energy into weekend park soccer matches and seasonal snowball scrimmages, demonstrating a love for teamwork and active play.
  arts: Ivelisse Forrest spends afternoons drawing scenes from Disney’s Frozen, humming Taylor Swift’s Shake It Off, and attending storytime at the Grand Rapids Public Library where they act out tales by
    Dr. Seuss, weaving these creative influences into their vibrant scrapbook and craft projects.
  travel: Ivelisse Forrest dreams of exploring Mackinac Island’s horse‑drawn carriages after school trips to the nearby Lake Michigan shoreline, and their family’s annual vacation to Disney World fuels
    a love for magical adventures balanced with the careful budgeting of a saved‑up travel fund.
  culinary: Ivelisse Forrest loves the cheesy stretch of homemade macaroni‑and‑cheese topped with crispy breadcrumbs, enjoys helping to toss pizza dough with tomato sauce, mozzarella, and a sprinkle of
    pepperoni, and they proudly claim the title of snack master for crafting perfect fruit‑and‑yogurt parfaits after soccer practice.
  core: Ivelisse Forrest is a bright, sociable seven‑year‑old who balances curiosity and practicality, turning every game, craft, and snack into a lesson in teamwork, organization, and joyful discovery,
    even if they sometimes forget to clean up their LEGO bricks.
background:
  cultural: Ivelisse comes from a white Midwestern family with German and Irish roots living in Grand Rapids, Michigan. Her upbringing reflects typical Midwestern values of friendliness, hard work, and
    community involvement. The family celebrates American holidays—Thanksgiving, Christmas, Fourth of July—with local traditions like fireworks on the river and community potlucks. They attend a United
    Methodist church that emphasizes service and kindness. Grand Rapids' vibrant arts scene, including events like ArtPrize and the Summer Festival, influences her love for creativity, while the city's
    parks and lakes encourage her outdoor adventures. This cultural backdrop blends practical sensibilities with an openness to new ideas.
