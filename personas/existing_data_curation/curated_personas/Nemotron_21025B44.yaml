  career_goals: Ivelisse dreams of a future where she can share knowledge and care for others. She imagines becoming a teacher who leads classroom activities with both structure and the freedom to explore
    new ideas, reflecting her balance of practicality and curiosity. She also loves animals and hopes to combine that passion by working with school pet programs or someday becoming a veterinarian. Her
    ambition is rooted in a desire to help friends, classmates, and later, the community, using the reliable, organized skills she practices today.
