personas:
  professional: Taylor Harp, an aspiring multimedia illustrator who blends watercolor sketches with simple code to animate fantasy scenes, channels their vivid imagination and meticulous organization into
    school art projects and a small online portfolio, while volunteering to create promotional posters for the local animal shelter.
  sports: Taylor Harp, a nature‑loving teen who prefers solitary hikes along the Vinemont trail system and occasional weekend bike rides over team sports, cheers for the nearby Vinemont Wildcats high‑school
    soccer team, and belongs to a local youth hiking club that meets monthly for trail clean‑ups.
  arts: Taylor Harp, a passionate visual storyteller who spends after‑school hours drawing mythic characters, painting misty landscapes inspired by Turner's watercolors, strumming acoustic renditions of
    Sufjan Stevens and Lucy Dacus, and crafting short fantasy stories influenced by Neil Gaiman and contemporary YA authors, while curating a small gallery of pet portraits for the animal shelter.
  travel: Taylor Harp, an inquisitive teen who dreams of wandering the misty cliffs of the Scottish Highlands after a school‑funded literature trip to Boston, regularly explores the Blue Ridge Mountains
    on weekend hikes, and saves part of their allowance for a future visit to the Asheville Folk Festival, balancing family budget constraints with a love for scenic, low‑key adventures.
  culinary: Taylor Harp, a budding home‑cook who favors quick, wholesome meals like avocado toast topped with feta and drizzle of honey, relishes simmering vegetable minestrone with fresh basil from the
    backyard garden, and occasionally experiments with lavender‑infused tea blends while listening to acoustic playlists, though they sometimes forget to clean their paint‑stained kitchen counter.
  core: Taylor Harp, a 15‑year‑old dream‑weaver who translates inner turbulence into vibrant watercolors, code‑enhanced illustrations, and folk‑tuned guitar melodies, yet battles frequent anxiety and impulsive
    art‑supply splurges.
background:
  cultural: Taylor was raised in Vinemont, a close‑knit community in Cullman County, Alabama. Her upbringing reflects Southern values of hospitality, community involvement, and a respect for tradition,
    while also being shaped by the region's subtle German heritage found in local festivals and cuisine. Family gatherings often feature home‑cooked meals and church activities, fostering a strong sense
    of belonging and service. Despite the rural setting, Taylor accesses a wide range of cultural influences through online art communities and literature, allowing her to blend local sensibilities with
    a broader, globally informed artistic perspective.
