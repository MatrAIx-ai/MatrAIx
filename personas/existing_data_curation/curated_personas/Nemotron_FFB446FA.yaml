  career_goals: In the near term, Taylor aims to build a polished portfolio that showcases her illustration and narrative work, with the goal of enrolling in a specialized visual‑arts high‑school program
    or attending summer art workshops. She dreams of pursuing a Bachelor of Fine Arts in Illustration or Graphic Design, and later, obtaining certification in art therapy to combine her artistic talent
    with her passion for supporting mental‑health awareness among teens. Long‑term, Taylor envisions a career as a concept artist for video games or children's books while also leading community workshops
    that use art as a therapeutic outlet for young people dealing with anxiety and sadness.
