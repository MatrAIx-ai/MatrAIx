  hobbies: '["Reading scientific and theological literature","Gardening","Hiking in the Poconos","Woodworking","Chess","Jazz and blues music","Volunteering at community mentorship programs","Writing reflective
    poetry","Cooking family meals","DIY home improvement projects"]'
  career_goals: He aims to become a senior pastor who leads his congregation in both spiritual growth and scientific literacy, develop a curriculum that links environmental stewardship with faith, and publish
    a book exploring the relationship between theology and modern science. Marcellus also seeks to mentor younger clergy, expand mental‑health support within his church, and eventually serve as a district
    superintendent or chaplain specializing in hospice care.
