personas:
  professional: Marcellus Soularie, a senior pastor who blends his STEM expertise with theological insight, uses data‑driven counseling and community‑focused program development to foster scientific literacy
    and spiritual growth, while his meticulous yet flexible approach and quiet, caring demeanor keep his congregation anchored despite his own undercurrent of worry.
  sports: Marcellus Soularie finds his physical renewal on the Pocono trails with the local hiking club, cheers the Philadelphia Eagles and the 76ers on game days, and participates in a weekly casual basketball
    pickup at the community center to stay fit while balancing his busy pastoral schedule.
  arts: Marcellus Soularie winds down by immersing himself in the improvisational brilliance of Miles Davis and the soulful blues of B.B. King, pens reflective poetry inspired by church sermons, and occasionally
    attends community theater productions that blend classic drama with modern gospel motifs.
  travel: Marcellus Soularie prefers modest, purpose‑driven travel, often taking weekend road trips to Asheville’s Blue Ridge Parkway for hiking, planning a future pilgrimage to Jerusalem to explore biblical
    history, and seeking out jazz festivals in New Orleans whenever his budget and congregation duties allow.
  culinary: Marcellus Soularie delights in cultivating homegrown vegetables for hearty stews featuring okra, smoked turkey, and sweet potatoes, enjoys cooking classic Southern‑style barbecue ribs seasoned
    with a blend of thyme and smoked paprika, and experiments with artisanal sourdough bread to complement his garden harvests.
  core: Marcellus Soularie is a thoughtful pastor‑scientist who nurtures his congregation with data‑informed sermons, yet often battles an undercurrent of worry that fuels his meticulous planning and occasional
    late‑night coffee binges.
background:
  cultural: Marcellus identifies as African‑American with family roots in the Southern United States. He grew up in a close‑knit Black church community that emphasized gospel music, oral storytelling, and
    collective responsibility. His STEM education positioned him against stereotypical expectations, and he draws on his heritage to advocate for social justice, inclusion, and empowerment within his predominantly
    white Monroe County congregation. He integrates elements of Black church traditions—such as responsive hymnody and communal fellowship—into his pastoral practice while also honoring his family's legacy
    of resilience and service.
attributes:
  skills: '["Pastoral counseling","Theological writing","Community outreach program development","Science-faith integration","Data analysis","Project management","Conflict resolution","Small-group facilitation","Grief
