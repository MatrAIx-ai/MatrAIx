persona_description: A behavioral scientist who specializes in the study of animal behavior, particularly in the areas of learning, memory, and problem-solving. Their research focuses on comparative approaches
  to understanding how different species, including pigeons, rats, and humans, learn through experience and utilize the predictive value of stimuli surrounding them. Their interests include investigations
  into the role of temporal and spatial relations in determining behavior, evaluating modulatory vs. configural theories of hierarchical control within spatial-search tasks, and investigating the conditions
  for item-specific versus relational learning.
