personas:
  professional: Quy Tran, a two‑year‑old with a budding fascination for building, meticulously arranges wooden blocks into symmetrical towers, and they already display the curiosity for new ideas and disciplined
    precision that hint at a future architect or engineer.
  sports: Quy Tran prefers solitary playground activities such as climbing the small jungle‑gym and balancing on a low beam, but they occasionally watch the local soccer team, the City Strikers, on TV with
    wide‑eyed fascination.
  arts: Quy Tran enjoys drawing simple circles and stick figures while listening to the soothing piano melodies of Ludovico Einaudi, and they love watching Pixar’s animated shorts for their vibrant colors
    and gentle storytelling.
  travel: Quy Tran has taken a family trip to the seaside town of Clearwater, delighting in the sound of waves and collecting shells, and they day‑dream about a future visit to the grand museum in Paris
    while currently exploring local park outings.
  culinary: Quy Tran favors soft banana mash, oat porridge with a drizzle of honey, and occasional bites of diced cheddar cheese, and they consistently choose mild flavors and easy textures, showing a picky
    yet stable palate.
  core: Quy Tran, a two‑year‑old prodigy of order and quiet curiosity, balances disciplined play with gentle kindness, often preferring solitary activities while they maintain an ever‑present calm demeanor.
background:
  cultural: Quy grows up in a Vietnamese‑American household in Dallas, Texas. His family speaks both English and Vietnamese at home, celebrates cultural holidays such as Tet and the Mid‑Autumn Festival,
    and prepares traditional dishes like pho and bánh chưng. The community around them includes a vibrant Asian American network, offering opportunities to engage in cultural events and language classes.
    These cultural practices reinforce values of discipline, respect for elders, and a strong emphasis on education, which shape Quy’s organized and achievement‑oriented personality.
