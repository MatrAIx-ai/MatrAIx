  hobbies: '["Gardening (heirloom vegetables and herbs)", "Cooking traditional Mexican cuisine", "Playing acoustic guitar and singing folk songs", "Hiking and nature walks in the Sierra Nevada", "Participating
    in cultural festivals (Día de los Muertos, Cinco de Mayo)", "Reading historical biographies and Mexican folklore", "Volunteering at the community kitchen", "Birdwatching", "Digital photography (landscapes
    and family events)"]'
  career_goals: Although retired, Luis aims to expand his volunteer leadership by launching a senior‑mentor program at the Oakhurst Senior Center that pairs elders with local youth for mutual learning.
    He plans to develop a community garden that blends practical horticulture with Mexican cultural education, providing fresh produce and a space for intergenerational interaction. Luis is also passionate
    about preserving his culinary heritage; he intends to compile a small cookbook of traditional Mexican recipes and conduct cooking workshops for residents. Long‑term, he wishes to foster bilingual cultural
    exchange events that celebrate Mexican holidays and promote harmony within the diverse Oakhurst community, while maintaining his active, resilient lifestyle.
