personas:
  professional: Claudia Henao, a retired corporate finance strategist with three decades of experience, applies their expertise in budgeting, forecasting, and process optimization to mentor emerging entrepreneurs,
    using a methodical, results‑oriented approach that reflects their competitive, detail‑driven nature.
  sports: Claudia Henao follows the San Diego Padres in baseball, the San Diego State Aztecs for collegiate basketball, and stays active through a weekly senior walking club partnered with the local YMCA,
    preferring light cardio that complements their love of strategic games while maintaining a balanced, structured fitness schedule.
  arts: Claudia Henao finds inspiration in the vivid paintings of Frida Kahlo, the timeless compositions of Beethoven, and the cinematic storytelling of Guillermo del Toro, regularly attending gallery openings
    and theater productions that satisfy their analytical appreciation for both form and narrative.
  travel: Claudia Henao prefers meticulously planned itineraries, using spreadsheets to coordinate trips that blend cultural immersion with family reunions, having visited the historic streets of Antigua
    Guatemala, the colonial charm of Granada, Spain, and the volcanic landscapes of Costa Rica, while dreaming of tasting Bordeaux’s vineyards on a future, budget‑conscious adventure.
  culinary: Claudia Henao cultivates heirloom tomatoes, chilies, and corn in a rigorously organized garden, then transforms those fresh ingredients into traditional dishes like pepian, kak'ik, and tamales,
    seasoning with cilantro, epazote, and roasted sesame seeds, showcasing a seasoned cooking skill that balances precise timing with generous flavor.
  core: Claudia Henao blends a disciplined, competitive mind with a love for heritage gardening, strategic games, and meticulous planning, navigating retirement by mentoring entrepreneurs, mastering traditional
    cuisine, and obsessively tracking every detail of daily life.
background:
  cultural: Claudia was born in Guatemala and raised in a bilingual, Catholic household that emphasized community, hard work, and respect for tradition. She grew up celebrating Día de los Muertos, Semana
    Santa, and local festivals featuring marimba music and traditional foods. After moving to the United States in her early twenties, she blended her Guatemalan heritage with the Floridian lifestyle, maintaining
    fluency in Spanish and serving as a cultural liaison for the growing Guatemalan diaspora in Naples. Her cultural background shapes her values of responsibility, practicality, and a deep commitment to
    preserving family stories.
