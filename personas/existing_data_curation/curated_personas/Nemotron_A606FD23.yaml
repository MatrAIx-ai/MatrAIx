  career_goals: James aims to transition into a senior cost-estimator or cost-management consultant role within the next three years, earning the Certified Cost Professional (CCP) credential from AACE International.
    He wants to design a standardized estimating workflow that reduces manual errors and alleviates his stress around tight deadlines. Mentoring junior estimators and sharing his humanities-infused communication
    approach are also priorities. In the longer term, he envisions launching a boutique cost-consulting firm that serves regional contractors while maintaining a flexible schedule that supports his family
    and community involvement.
