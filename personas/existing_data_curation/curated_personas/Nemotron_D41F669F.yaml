  hobbies: '[''Drawing and digital illustration'', ''Creating short animated videos'', ''Playing soccer'', ''Playing basketball'', ''Guitar practice'', ''Listening to salsa and reggaeton'', ''Reading graphic
    novels and sci‑fi books'', ''Participating in school Art Club'', ''Attending youth robotics workshops'', ''Competing in online video‑game tournaments'']'
  career_goals: Juan aspires to merge his love for art and technology by becoming a multimedia designer or video game developer, envisioning a future where he creates immersive visual experiences that tell
    stories rooted in his cultural heritage. He hopes to attend an arts‑focused high school program, then pursue a degree in graphic design, interactive media, or computer science. While he is excited about
    the creative possibilities, he also seeks a stable career path that allows him to support his family, so he aims to develop a solid portfolio and gain freelance experience during high school. His competitive
    streak drives him to enter art contests and coding hackathons, aiming for scholarships and recognition.
