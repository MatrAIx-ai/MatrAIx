personas:
  professional: Juan Couso, a budding digital illustrator and robotics hobbyist, blends curiosity-driven storytelling with methodical design skills, turning weekend sketch sessions into polished comic panels
    while programming simple robots to animate his characters, a practice that reflects their competitive edge and meticulous planning.
  sports: Juan Couso, a lively participant in the neighborhood soccer league and school basketball team, organizes pick‑up games at the local park, idolizes the New York Knicks and LA Galaxy, and follows
    a disciplined warm‑up routine that mirrors their organized nature.
  arts: Juan Couso, an avid fan of graphic novels by Neil Gaiman and comic art by Jim Lee, draws inspiration from reggaeton star Bad Bunny and salsa legend Marc Anthony, and spends weekend afternoons experimenting
    with digital painting tools like Procreate, a ritual that satisfies their curiosity and competitive urge to improve.
  travel: Juan Couso, who has explored the nearby coastal boardwalk and a weekend hike in the mountains, dreams of attending the Tokyo Comic Con and a future family trip to Barcelona to absorb its street
    art scene, favoring carefully planned itineraries over spontaneous spur‑of‑the‑moment trips.
  culinary: Juan Couso, who enjoys crafting simple avocado‑lime quesadillas and spicy taco bowls peppered with chipotle, shows modest cooking skills—a skill they practice after school and often pair with
    listening to reggaeton, while still preferring pizza nights with extra cheese as a comfort food.
  core: Juan Couso, an energetic teen whose relentless curiosity fuels a competitive drive in art, robotics, and sports, yet who battles frequent worry and a habit of over‑planning every hobby.
background:
  cultural: Juan’s Puerto Rican roots are woven into his everyday life. He grows up bilingual, speaking Spanish at home with his parents and grandparents, which keeps him connected to family traditions
    like celebrating Noche de San Juan and enjoying island cuisine such as arroz con gandules and mofongo. The rhythmic beats of bomba and plena often inspire his music choices and guitar playing. He actively
    participates in the local Puerto Rican cultural association in Saginaw, helping to organize a yearly Latino heritage festival at his school. This cultural pride fuels his artistic expression, prompting
    him to incorporate vibrant colors, tropical motifs, and Spanish-language captions into his artwork. At the same time, living in the Midwestern city of Saginaw exposes him to a diverse peer group, shaping
    his adaptable social style and giving him a blend of Caribbean and Midwestern influences.
