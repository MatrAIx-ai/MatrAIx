personas:
  professional: William Price, a seasoned insurance professional with 35 years in life, health, and property-casualty coverage, channels their curiosity and love of art into data-driven risk assessments
    and creative policy designs, while they mentor a small team with a blend of meticulous organization and flexible problem-solving.
  sports: William Price keeps fit through gentle hikes with the Milwaukee Hiking Club, enjoys Nordic walking to ease their osteoarthritis, and faithfully follows the Milwaukee Brewers, Milwaukee Bucks,
    and Green Bay Packers, while they reserve Saturdays for a community bridge tournament that doubles as mental exercise.
  arts: William Price frequently roams the Milwaukee Art Museum and local galleries, gravitating toward contemporary works by Kerry James Marshall and folk pieces echoing the style of Grandma Moses, and
    they channel this inspiration into their own photography of Lake Michigan sunsets and occasional woodcarving projects.
  travel: William Price prefers modest, well-planned road trips to Midwestern cultural festivals—such as the Iowa State Fair, the Milwaukee Film Festival, and Upper Peninsula heritage sites—while they dream
    of an overseas art pilgrimage to Florence and a leisurely cruise through the Norwegian fjords.
  culinary: William Price, an avid home chef, experiments with recipes like seared trout with fresh dill and lemon, rustic cherry-glazed pork chops inspired by Michigan orchards, and a seasonal ratatouille
    featuring heirloom tomatoes, zucchini, and sage from their garden, while they treat occasional visits to downtown Milwaukee’s farm-to-table bistros as prized culinary outings.
  core: William Price blends a lifelong insurance acumen with an artist’s eye, balancing meticulous risk calculations with a spontaneous love for weekend hikes, bridge bluff-plays, and a guilty habit of
    buying one too many antique woodworking tools, and they often joke that the tools are their secret retirement fund.
background:
  cultural: William grew up in a middle‑class, German‑American family in the Milwaukee suburbs, embodying classic Midwestern values of hard work, community involvement, and modesty. He was raised in a Lutheran
    tradition, celebrating holidays with family gatherings and local festivals. The cultural mix of Wisconsin’s agricultural roots and vibrant arts scene shaped his appreciation for both practical problem‑solving
    and creative expression. His community ties include participation in the local church, the West Bend Chamber of Commerce, and regional art fairs, reflecting a blend of traditional Midwest heritage and
    a curiosity for new ideas.
