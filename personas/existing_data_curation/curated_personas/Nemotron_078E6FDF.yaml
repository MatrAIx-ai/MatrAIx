  career_goals: In the next five years William aims to transition from a full‑time sales role to a senior consultant and trainer position within his agency, leveraging his expertise to coach the next generation
    of agents. He plans to earn the Chartered Life Underwriter (CLU) designation, achieve a regional "Top Producer" award, and develop a niche advisory service for small‑business owners seeking innovative
    insurance solutions like cyber‑risk coverage. Ultimately, he hopes to scale back his hours to enjoy more family time and pursue his artistic interests while leaving a legacy through a scholarship for
    business students at his alma mater.
