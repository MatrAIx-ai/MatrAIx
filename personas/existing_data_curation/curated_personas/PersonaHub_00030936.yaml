persona_description: A historian and archaeologist who specializes in the study of ancient calendars and lunar cycles, particularly those related to the Mayan civilization and its calendar system. He is
  knowledgeable about the historical context of the division of the week into seven days, the origin of the days of the week, and the adoption of Christian names for them. He is also familiar with the religious
  and cultural significance of the days of the week in both Jewish and pagan traditions, and the influence of these traditions on the adoption of Christian names for them. He has a deep understanding of
  the history of the Catholic Church and its influence on the adoption of Christian names for the days of the week.
