personas:
  professional: Kimberlie Roche is a meticulous insurance claims adjuster in Moore County whose disciplined, investigative mindset and knack for negotiating, paired with a friendly yet competitive spirit,
    drive her toward senior leadership and the development of streamlined fraud‑detection protocols.
  sports: Kimberlie Roche hits the sand‑filled trails of the Sandhills for weekend hikes, competes in a co‑ed volleyball league at the local YMCA, and cheers for the Carolina Panthers on Sundays while rooting
    for the Charlotte Hornets during the NBA season.
  arts: Kimberlie Roche immerses herself in Southern‑flavored culture through attending community historical reenactments, listening to folk legends like Alison Krauss, devouring true‑crime podcasts such
    as 'Criminal', and re‑reading historical non‑fiction titles like 'The Warmth of Other Suns'.
  travel: Kimberlie Roche prefers meticulously planned road trips that blend outdoor adventure and culinary discovery – she’s trekked the Blue Ridge Parkway, explored the historic streets of Savannah, and
    dreams of a summer getaway to Asheville’s vibrant arts scene while balancing a modest travel budget.
  culinary: Kimberlie Roche, an avid home‑chef, loves perfecting Southern staples like shrimp and grits, fried green tomatoes, and peach cobbler, often pairing them with craft bourbon sauces, and she experiments
    with global spices during her dinner parties, though she has a habit of over‑salting dishes when racing against time.
  core: Kimberlie Roche blends relentless curiosity with Southern hospitality, turning every claim, puzzle, and dinner party into a structured yet sociable challenge—though she sometimes lets her competitive
    streak sideline self‑care.
background:
  cultural: Kimberlie grew up in Cameron, a small town in Moore County, North Carolina, where Southern hospitality and close-knit community values shaped her upbringing. Her family's roots trace back to
    Anglo-American settlers, and she was raised with an emphasis on practicality, hard work, and active participation in local church and community events. While her early life reflected traditional Southern
    customs - such as family gatherings, church attendance, and an appreciation for regional cuisine - her college education in the humanities broadened her perspective, fostering a blend of progressive
    ideas and a respect for cultural heritage. This combination informs her pragmatic outlook, social warmth, and curiosity about broader societal issues.
