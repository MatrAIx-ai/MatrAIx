  hobbies: '[''Hiking'', ''Co-ed volleyball'', ''Volunteer work at food bank'', ''Book club (historical non-fiction & true-crime)'', ''Puzzle solving & escape rooms'', ''Hosting dinner parties'', ''DIY
    home-improvement'', ''Competitive trivia nights'', ''Attending historical reenactments'', ''Gardening'']'
  career_goals: Kimberlie aims to rise to a senior leadership role within the insurance industry, such as Claims Department Supervisor or Regional Claims Manager, where she can shape investigative protocols
    and drive performance excellence. She plans to obtain professional designations like the CPCU and AIC certifications, and to develop advanced analytics capabilities to streamline claim processing. Over
    the next five years, she also considers pursuing an MBA to broaden her strategic management skills, with a long-term ambition to launch her own consulting firm specializing in complex property claims
    and fraud investigations.
