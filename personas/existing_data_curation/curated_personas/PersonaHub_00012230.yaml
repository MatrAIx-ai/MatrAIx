persona_description: A visitor to the Westray Heritage Centre who is interested in ancient artifacts and the history of the Orkney Islands. This individual is likely to be a history enthusiast, archaeologist,
  or anyone with an interest in the prehistoric era. They are curious about the discovery of the Neolithic and Bronze Age artefacts at the Links of Notland and are eager to see the artifacts in person.
  They may also be interested in learning about the significance and meaning of the artifacts, as well as the culture and society of the prehistoric inhabitants of the site.
