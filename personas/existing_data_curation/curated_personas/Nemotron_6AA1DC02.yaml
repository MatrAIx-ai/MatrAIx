personas:
  professional: Ingrid Barbosanunez, a budding block-building architect, demonstrates they can channel curiosity with practical problem-solving, meticulously arranging colorful cubes while staying flexible
    enough to abandon one structure for another when a new idea sparks.
  sports: Ingrid Barbosanunez delights in weekly parent-baby swimming sessions at the community pool, spontaneously joins the seasonal toddler gymnastics class where they perfect tumble-rolls, and when
    adults watch TV they cheer the New York Yankees and Golden State Warriors, mimicking the excitement with claps and giggles.
  arts: Ingrid Barbosanunez spends afternoons absorbed in Raffi's Baby Beluga, sways to Mozart's gentle piano lullabies such as the Piano Sonata for Babies, and giggles at the colorful episodes of Sesame
    Street, showing they delight in rhythm and color, letting these artistic experiences shape their early sense of wonder.
  travel: Ingrid Barbosanunez has already taken a weekend road trip to the nearby mountain resort of Asheville, a summer stay at the sandy shores of Clearwater Beach, and, with parental planning, looks
    forward to a future stroll through the gardens of Kyoto, balancing a love for vivid scenery with the need for a reliable stroller and flexible itinerary, knowing they thrive on new sights while relying
    on familiar comforts.
  culinary: Ingrid Barbosanunez enjoys smooth mashed sweet potatoes lightly seasoned with a pinch of cinnamon, pureed peas with a dab of olive oil, and soft banana bites, and they prefer textures that melt
    on the tongue while their parents experiment with homemade purees featuring carrots, apple, and quinoa.
  core: Ingrid Barbosanunez balances wide-eyed curiosity with a practical love for routine, often organizing toys into tidy rows before happily disrupting the order with a spontaneous burst of movement
    that they find thrilling.
background:
  cultural: Ingrid comes from a Mexican‑American family that maintains strong cultural ties. She is raised in a bilingual household, hearing both Spanish and English, and participates in Mexican traditions
    such as Día de los Muertos altars, celebrating holidays with family‑cooked meals like tamales and enchiladas. Living in Coalinga, a rural part of Fresno County, she is accustomed to the agricultural
    landscape, which influences her appreciation for fresh produce and farm life.
