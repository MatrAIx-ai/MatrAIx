personas:
  professional: Angeliz Cantero is a methodical food‑service supervisor who leverages a STEM background and bilingual expertise to build data‑driven kitchen operations, imposing rigorous HACCP standards
    and lean scheduling while they quietly steer their team through high‑pressure shifts.
  sports: Angeliz Cantero follows the Orlando Magic and Orlando City SC loyally, participates in a weekly adult recreational volleyball game at Lake Eola, and complements the social play with morning yoga
    sessions and brisk nature walks in Mead Botanical Garden, while they treat fitness as a structured routine that balances their busy schedule.
  arts: Angeliz Cantero finds creative renewal in the flavorful storytelling of chefs on the series Chef’s Table, the rhythmic beats of Celia Cruz and Marc Anthony that echo neighborhood celebrations, the
    suspense of Agatha Christie mystery novels, and the vibrant murals of downtown Orlando, and they integrate these artistic influences into their own culinary experiments and weekend meditation.
  travel: Angeliz Cantero prefers meticulously planned trips that blend cultural immersion with culinary discovery, having recently explored a historic colonial town on the Caribbean coast and the bustling
    food markets of Mexico City, while they dream of future itineraries that include the sushi stalls of Osaka and a heritage tour of Barcelona, always booking accommodations through Airbnb to stay within
    a modest budget and balancing travel time with family responsibilities.
  culinary: Angeliz Cantero is an adept home chef who reimagines classic dishes like arroz con gandules with quinoa, pastelón using baked plantain slices, and mofongo infused with roasted garlic and cilantro
    from their balcony garden, pairing each meal with a carefully selected wine or tropical mocktail, and they savor dining out at farm‑to‑table locales such as The Ravenous Pig for inspiration while maintaining
    a disciplined approach to nutrition.
  core: Angeliz Cantero blends analytical precision with a love for heritage flavors, juggling spreadsheets and Sudoku while they garden herbs on a balcony, practice yoga to counter chronic worry, and dream
    of a tech‑savvy boutique restaurant that honors family storytelling.
background:
  cultural: Angeliz was raised in a close‑knit Puerto Rican family that values community, storytelling, and food as a cultural cornerstone. Bilingual in Spanish and English, she often incorporates Puerto
    Rican culinary traditions—such as arroz con gandules, mofongo, and pastelón—into her meals, preserving heritage while exploring contemporary twists. Her upbringing in the diaspora community of Orlando
    has exposed her to a blend of Caribbean, Latin, and Floridian influences, fostering an appreciation for multicultural festivals and local arts. While she respects the island's Catholic traditions, she
    balances cultural observances with a pragmatic, goal‑oriented outlook shaped by her STEM education and professional experience.
attributes:
  skills: '["Kitchen Operations Management", "Food Safety & HACCP Compliance", "Inventory Control & Cost Management", "Staff Scheduling & Training", "Process Optimization & Lean Techniques", "Menu Development",
    "Data Analysis & Reporting", "Equipment Maintenance", "Conflict Resolution", "Bilingual Communication (Spanish/English)"]'
  hobbies: '["Experimenting with Puerto Rican recipes", "Urban gardening", "Reading scientific and culinary literature", "Puzzle solving (Sudoku, crosswords)", "Yoga and meditation", "Nature walks in local
    parks", "Volunteer cooking workshops for youth"]'
  career_goals: Angeliz aspires to move beyond her supervisory role into a regional food services management position, where she can shape operational policies across multiple sites. She plans to earn a
    Certified Food Safety Manager credential and pursue Lean Six Sigma Green Belt training to deepen her expertise in process improvement. Long‑term, she envisions opening a boutique restaurant that highlights
    modern twists on traditional Puerto Rican cuisine, integrating sustainable sourcing and technology‑enabled kitchen workflows. Alongside her career progression, she is committed to mentoring emerging
    Latina professionals in the hospitality industry and advocating for workplace practices that mitigate stress and promote employee well‑being.
