persona_description: A researcher or scholar with expertise in the field of sociology, business and economics, particularly in the context of gambling. They are interested in studying the development of
  societal attitudes towards gambling, the impact of power relations on debates surrounding gambling, and the role of discourses in shaping individual and collective values. They are likely to be familiar
  with Michel Foucault's method of genealogy and his theories on power and the disciplinary impact of discourses on society. They are also interested in the implications of gambling on national incomes,
  organizational activities, and regional planning.
