personas:
  professional: Chung Yang is a bright elementary student who, through building LEGO cities and simple machines, shows an early knack for engineering, combining meticulous planning with boundless curiosity
    to prototype creative solutions in classroom projects.
  sports: Chung Yang excels at weekend soccer matches with friends at the local park, cheers for the hometown team the River Rapids, and joins a mid‑year tag league, always keeping a water bottle handy
    for post‑play hydration.
  arts: Chung Yang delights in weekly calligraphy classes, drawing cartoons of space rockets, and dancing to upbeat tracks by artists like Kidz Bop, Disney’s soundtrack, and pop star Ariana Grande, often
    mimicking their moves while the music plays.
  travel: Chung Yang loves family camping trips to the nearby pine forest, enjoys day trips to the state aquarium, and dreams of visiting the NASA Space Center in Houston, favoring itineraries that blend
    outdoor adventure with hands‑on science exhibits.
  culinary: Chung Yang prefers the sweet tang of mango smoothies, loves slurping noodle soups flavored with ginger and soy, proudly attempts to roll simple sushi bites at home, though they often request
    extra ketchup on their pizza.
  core: Chung Yang is a high‑energy, organized six‑year‑old who balances curiosity with practical play, hoards LEGO bricks, and sometimes forgets to clean their room before bedtime.
background:
  cultural: Zeke is a first‑generation East Asian American of Chinese heritage. His family celebrates Lunar New Year with traditional foods, red envelopes, and lantern decorations, and they often attend
    a local Chinese language school on weekends. At home he hears Mandarin spoken alongside English, and cultural values such as respect for elders, a strong emphasis on education, and community harmony
    are part of his daily life. Living in Upland, California, he also experiences the multicultural environment of Southern California while maintaining his family's cultural traditions.
attributes:
