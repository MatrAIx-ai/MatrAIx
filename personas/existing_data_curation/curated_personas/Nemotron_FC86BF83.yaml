  hobbies: '[''Soccer'', ''LEGO building'', ''Drawing and coloring'', ''Stargazing'', ''Reading picture books'', ''Chinese calligraphy class'', ''Playing with friends at the park'', ''Bicycle riding'']'
  career_goals: Zeke dreams of becoming a space explorer or engineer, inspired by his love of rockets and stargazing. He wants to build real‑world inventions one day, solving problems that help his community.
    In the short term, he aims to be a leader in his classroom, win a school science fair, and keep improving his reading and math skills. His ambition blends curiosity about the universe with a practical
    desire to make a positive impact.
