personas:
  professional: Paulino Coello is a three-year-old who runs a miniature pretend office with labeled bins for blocks, insisting on a clear daily routine while happily improvising when a new toy appears,
    and they proudly assign manager titles to stuffed animals.
  sports: Paulino Coello loves to sprint around the community park's grass field, proudly wearing a tiny jersey of the local baseball team, the Springfield Cardinals, while also attending a toddlers' gymnastics
    class that builds balance and confidence, and they cheer loudly when the ball rolls his way.
  arts: Paulino Coello delights in drawing vibrant crayon pictures of dinosaurs and singing along to child-friendly tunes by artists like Raffi and Disney's Let It Go, often staging impromptu dance parties
    in the living room, and they burst into giggles when the chorus hits.
  travel: Paulino Coello enjoys family trips to the nearby seaside lighthouse, where they collect smooth shells, and looks forward to a future adventure at the national theme park, eagerly flipping through
    picture books of roller coasters, and they eagerly point at the map whenever the car passes a sign.
  culinary: Paulino Coello prefers mild macaroni-and-cheese with hidden peas, loves banana-flavored smoothies with a splash of oat milk, and enjoys helping parents stir pancake batter, carefully sprinkling
    blueberries on top, and they always ask for extra blueberries.
  core: Paulino Coello blends a love for predictable routines with spontaneous play, stubbornly clings to their pink piggy bank, and quietly orchestrates snack-time symphonies with crayons in hand, and
    they often hum a tune while sorting crayons.
background:
  cultural: Paulino grows up in a bilingual Cuban household in Tampa, Florida, surrounded by family traditions such as sharing meals of ropa vieja and plantains, celebrating Cuban holidays like Noche de
    San Juan, and speaking both Spanish and English at home. The local Cuban community and cultural events in Hillsborough County reinforce his connection to his heritage, influencing his language, music
    preferences, and values of family cohesion and harmony.
