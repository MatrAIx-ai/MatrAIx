  career_goals: Although Mary is currently not in the formal workforce, she aims to deepen her involvement in local volunteer leadership by coordinating senior‑citizen outreach programs and serving on the
    board of the community library. She plans to enroll in a short‑term online course on digital archiving to preserve family histories, which aligns with her competitive drive to complete projects efficiently.
    Financially, she seeks to maintain a stable retirement portfolio through careful budgeting and occasional part‑time consulting on small‑business bookkeeping for friends. On a personal level, Mary aspires
    to complete a memoir of her family's Norwegian heritage and share it with her grandchildren, blending her love of structure with creative expression.
