  hobbies: '[''Gardening'', ''Southern cooking and baking'', ''Reading historical fiction'', ''Hiking and nature walks'', ''Bird‑watching'', ''Fishing'', ''Yoga and mindfulness meditation'', ''Knitting
    and craft circles'', ''Guest lecturing on real‑estate topics'']'
  career_goals: Her primary ambition is to become the leading real‑estate broker in southeastern Oklahoma, expanding her personal sales volume by 30 % within the next three years and opening a boutique
    agency that offers both brokerage services and educational programs for aspiring agents. She aims to acquire a portfolio of rental properties to generate passive income and to provide affordable housing
    options for local families. Holley also hopes to design a community‑based real‑estate literacy course, drawing on her educational background, to help residents make informed property decisions. Balancing
    her competitive drive with her desire for flexibility, she plans to delegate administrative tasks to reduce stress and protect her mental health.
