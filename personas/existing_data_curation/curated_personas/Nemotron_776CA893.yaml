  hobbies: '[''Gardening'', ''Cooking Southern cuisine'', ''Reading mystery novels'', ''Hiking'', ''Yoga'', ''Pilates'', ''Church community service'', ''Quilt making'', ''Youth sports coaching'', ''Community
