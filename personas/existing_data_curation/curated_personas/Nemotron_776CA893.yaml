  career_goals: Karen aims to advance to a regional director of operations or vice‑president of operations within the next five years, focusing on building resilient, sustainable supply chains, integrating
    technology such as IoT and AI for predictive maintenance, and mentoring the next generation of managers. She also intends to obtain a certification in executive leadership and eventually launch a boutique
    consulting practice to help small businesses in Eastern North Carolina improve operational efficiency while maintaining a healthy work‑life balance to manage her sensitivity to stress.
