  career_goals: Jaden aims to move into a senior sales leadership role within the next five years, eventually managing a regional team of agents. He plans to earn his Certified Insurance Counselor (CIC)
    designation to deepen his expertise. Long‑term, he aspires to launch his own boutique insurance brokerage that serves under‑insured members of his tribal community, providing culturally informed financial
    education. He is driven to be recognized as a top performer, leveraging his competitive edge to earn awards and mentorship opportunities while maintaining a supportive partnership with his spouse.
