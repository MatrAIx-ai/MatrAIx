  career_goals: Suzanne aims to formalize her management experience by completing a Bachelor’s degree in Business Administration within the next three years. She envisions moving from her current general‑manager
    role to a senior operations position at a larger retail chain, where she can lead multiple locations and drive supply‑chain optimization initiatives. Long‑term, she hopes to open her own community‑focused
    boutique that emphasizes sustainable sourcing and employee development, while also mentoring younger employees from her hometown.
