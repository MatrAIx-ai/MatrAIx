personas:
  professional: Mavis Potter, a 23‑year‑old transportation security officer at Dodge City airport, blends a practical, detail‑oriented approach with a curious eye for emerging technologies, leveraging strong
    observational skills and conflict‑de‑escalation techniques while sometimes juggling disorganized paperwork due to a relaxed attitude toward strict planning.
  sports: Mavis Potter enjoys hiking prairie trails and occasional horseback riding, supports the Kansas City Chiefs and Kansas City Royals, plays in a local co‑ed volleyball league during summer, and balances
    a casual fitness routine with a competitive streak that shows up in strategy video‑game tournaments, all while preferring the open‑air simplicity of outdoor activities over gym workouts.
  arts: Mavis Potter strums acoustic guitar at open‑mic nights, sings a few verses of classic country hits by Johnny Cash and Dolly Parton, reads thriller novels by Gillian Flynn, watches classic Hitchcock
    films, and finds inspiration for DIY woodworking projects in the folk art displayed at the annual Hodgeman County Fair.
  travel: Mavis Potter prefers road‑trip adventures that combine scenic hikes in the Colorado Rockies, stops at historic Route 66 diners, dreams of visiting Yellowstone’s geysers and the castles of Edinburgh,
    but plans trips on a tight budget, often using discount airlines for short getaways to New York City’s museums and Broadway shows.
  culinary: Mavis Potter loves Kansas‑style barbecue ribs, chicken fried steak, and homemade chili seasoned with cumin and jalapeños, cooks with a modest skill set in a small kitchen while experimenting
    with wood‑smoked flavors from her DIY smoker, and enjoys ordering a slice of pepperoni pizza after late‑night gaming sessions.
  core: Mavis Potter is a curiosity‑driven security officer who balances practical diligence with a laid‑back, occasionally disorganized lifestyle, channeling competitive energy into puzzles, music, and
    DIY projects while constantly battling stress‑induced worry.
background:
  cultural: Mavis grew up in a small, predominantly white community in western Kansas, where the legacy of the historic cattle‑drive towns and a strong sense of self‑reliance shape everyday life. Her family
    has roots in farming and local service occupations, fostering values of hard work, practicality, and modesty. Community events such as county fairs, church gatherings, and high‑school sports remain
    central to her social world. The regional culture’s emphasis on straightforward communication and respect for law‑enforcement institutions influenced her decision to pursue a career in transportation
    security. While she shares many Midwestern cultural touchstones—like an appreciation for open spaces, classic country and rock music, and a down‑to‑earth demeanor—she also embraces the broader national
    conversation about security and technology, reflecting her curiosity about new ideas.
attributes:
  skills: '[''X-ray baggage inspection'', ''Metal detector operation'', ''Explosive detection knowledge'', ''Passenger interview techniques'', ''Conflict de-escalation'', ''Situational awareness'', ''Procedure
