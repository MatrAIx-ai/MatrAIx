    ''Adaptation to new screening technologies'', ''Basic self-defense awareness'']'
  hobbies: '[''Crossword puzzles'', ''Sudoku'', ''Strategy video games'', ''Mystery and thriller novels'', ''Prairie trail hiking'', ''Horseback riding'', ''DIY woodworking'', ''Acoustic guitar playing'',
    ''Attending county fairs'', ''Mindfulness meditation'']'
  career_goals: Mavis aims to leverage her curiosity and practical mindset to advance within the transportation security field. In the next few years she plans to complete her associate degree in criminal
    justice, obtain TSA Advanced Screening Officer certification, and qualify for a supervisory role overseeing a screening team. Long‑term, she envisions moving into a regional security management position
    or a specialized role focusing on technology integration, such as piloting AI‑enhanced threat detection systems. She also entertains the possibility of transitioning to a federal law‑enforcement career,
    such as becoming a Transportation Security Officer with a broader jurisdiction or an Air Marshal, once she gains additional experience and education.
