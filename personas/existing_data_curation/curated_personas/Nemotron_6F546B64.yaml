personas:
  professional: Collin Zeigler, a veteran meat and fish processing specialist with four decades of expertise in carcass fabrication, USDA compliance, and knife craftsmanship, channels their curiosity and
    practical mindset into training apprentices while occasionally letting their relaxed, disorganized side slip into spontaneous workflow tweaks during busy shifts.
  sports: Collin Zeigler, a weekend fly‑fisher on the Russian River and occasional hunter with the Sonoma County Game Club, stays fit by trekking local hills and cheering on the San Francisco Giants and
    Golden State Warriors, while their competitive edge drives them to set personal bests in catch‑and‑release counts each season.
  arts: Collin Zeigler’s cultural palate includes nightly visits to live blues shows featuring Tab Benoit, occasional trips to see the Marin Ballet, and a fondness for the storytelling craft of Mark Twain’s
    readings, all of which inspire their own meat‑pairing narratives and community workshops.
  travel: Collin Zeigler favors spontaneous road trips through California’s wine country and seasonal expeditions to the Oregon coast, yet they also keep a bucket list of European culinary tours in Bologna
    and the Basque Country, planning each venture around volunteer commitments at the local food bank and limited retirement income.
  culinary: Collin Zeigler blends a master butcher’s precision with garden‑fresh herbs to craft house‑made chorizo, dry‑aged ribeye, and herb‑crusted salmon, pairing each with pinot noir from the Dry Creek
    Valley and a splash of locally sourced olive oil, while their modest woodworking skill lets them build cutting boards for every culinary experiment.
  core: Collin Zeigler embodies a seasoned butcher’s pragmatic curiosity, thriving on community gatherings, spontaneous tinkering, and a competitive drive that sometimes borders on disorganization, all
    while balancing a love for fresh flavors with a relaxed approach to life’s schedule.
background:
  cultural: Collin was raised in a mid‑century farming community in California’s Central Valley, the son of a second‑generation butcher whose family traced its roots to German‑Polish immigrants. His upbringing
    emphasized hard work, seasonal rhythms, and a respect for traditional recipes passed down through generations. Growing up near orchards and early vineyards, he learned early on the value of local sourcing
    and the concept of terroir. After moving to Sebastopol in Sonoma County, he embraced the region’s eclectic, environmentally conscious food culture while retaining the practical, self‑reliant ethos of
    his heritage. His long‑term marriage and deep involvement in community festivals, farmer’s markets, and cooperative food networks reflect a blend of classic Midwestern work ethic and the progressive,
    community‑oriented spirit of the Bay Area’s wine country.
attributes:
  skills: '[''Meat cutting and trimming'', ''Butchery and carcass fabrication'', ''Food safety compliance (FSIS, HACCP)'', ''Inventory and supply chain management'', ''Cold‑storage and equipment maintenance'',
    ''Team training and mentorship'', ''Customer service and product presentation'', ''Knowledge of heritage livestock breeds'', ''Adoption of new processing methods (dry‑aging, low‑temp smoking)'', ''Basic
    bookkeeping and cost control'']'
  hobbies: '[''Hosting BBQ‑and‑brew gatherings'', ''Gardening herbs and vegetables'', ''Fly‑fishing on the Russian River'', ''Weekend hunting trips'', ''Knife sharpening and woodworking'', ''Attending live
    music events'', ''Volunteering at the food bank'', ''Participating in historic agricultural tours'']'
  career_goals: Approaching retirement, Collin envisions shifting from full‑time processing to a part‑time consultancy role, helping boutique farms and small‑scale butcher shops adopt sustainable practices
    and improve product consistency. He aims to open a modest community‑focused butcher shop that highlights heritage breeds and pairs expertly cured meats with local Sonoma wines, reflecting his love of
    both practicality and culinary curiosity. Collin also plans to mentor the next generation of butchers through hands‑on workshops and to launch an annual "Craft Meat" competition, satisfying his competitive
    drive and desire to stay at the forefront of new techniques. Ultimately, he hopes to be remembered as a regional authority on traditional and innovative meat preparation while maintaining a flexible,
    balanced work schedule that lets him enjoy family time and community involvement.
