  career_goals: Shirley aims to finish her associate degree in Business Administration while obtaining a certification as a medical administrative assistant. She envisions a steady role in a community health
    clinic where the work environment offers clear procedures and predictable routines. Over the next five years, she hopes to advance to a supervisory position, managing clinic schedules and patient outreach
    programs. Alongside her professional aspirations, Shirley wants to cultivate personal resilience by integrating mental‑health awareness training, with the long‑term ambition of becoming a peer advocate
    for young adults coping with anxiety within her community.
