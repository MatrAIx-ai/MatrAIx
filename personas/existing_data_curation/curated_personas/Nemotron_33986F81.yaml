personas:
  professional: A burgeoning medical administrative professional, Shirley Maye leverages strong organizational skills and empathetic communication to streamline clinic operations while seeking predictable
    routines that soothe their high emotional reactivity.
  sports: Shirley Maye enjoys leisurely jogs along the Trinity River trail, roots for the Dallas Cowboys and Texas Rangers on game nights, and joins the church’s casual volleyball league, favoring low‑impact
    activity that fits their flexible schedule.
  arts: Shirley Maye finds creative release in gospel choir rehearsals, crochets blankets for shelters, and immerses in R&B classics from Beyoncé and Jill Scott while they devour contemporary novels by
    Sally Rooney, weaving artistic appreciation into daily routine.
  travel: Shirley Maye prefers short, budget‑friendly road trips, having explored New Orleans for its music scene and Savannah for historic charm, while dreaming of a serene weekend in Asheville, North
    Carolina, and a culturally rich pilgrimage to Mexico City, planning each journey meticulously to accommodate their structured budgeting style.
  culinary: Shirley Maye delights in cooking Southern soul‑food staples such as buttery cornbread, slow‑cooked collard greens seasoned with smoked turkey, crispy fried chicken marinated in buttermilk, and
    sweet potato pie spiced with nutmeg, showcasing a modest skill level that balances comforting tradition with budget consciousness they maintain.
  core: Shirley Maye channels emotional intensity into structured community routines and creative comforts, balancing predictability with flexible compassion that they nurture daily.
background:
  cultural: Shirley is a 22‑year‑old Black woman raised in Fort Worth, Texas, within a close‑knit African‑American community rooted in Southern Baptist traditions. Her grandparents migrated from the Mississippi
    Delta during the Great Migration, bringing with them rich storytelling, gospel music, and a strong emphasis on resilience and community support. Growing up, family gatherings, church events, and local
    block parties cultivated a deep sense of cultural pride and collective responsibility. Shirley values the historic legacy of Black Texans—celebrating figures like Barbara Jordan and recognizing the
    ongoing struggle for civil rights—while also navigating modern influences like digital media and contemporary social movements. Her marriage at a young age reflects both traditional family expectations
    and her own desire for partnership and mutual support.
