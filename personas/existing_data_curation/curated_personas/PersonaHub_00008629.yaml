persona_description: A historian who specializes in the study of ancient Israelite history and the Bible, particularly the monarchy and the prophetic writings. His research interests include, but are not
  limited to, the historical context of the monarchy, the role of kingship in the formation of Israelite society, the relationship between kingship and divine election, and the political and social implications
  of the Babylonian captivity and the subsequent exile. He is also interested in the eschatological aspects of the Bible, particularly the messianic hopes and the role of the Messiah in transforming the
  conditions of world history.
