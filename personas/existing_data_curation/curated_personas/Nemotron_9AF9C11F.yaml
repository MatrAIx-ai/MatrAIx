personas:
  professional: Juanita Johnson, a data‑savvy STEM education specialist, leverages her methodical project‑coordination chops and outgoing energy to design community‑focused analytics workshops that translate
    Python and R models into hands‑on learning experiences for underrepresented youth.
  sports: Juanita Johnson thrives in the St. Johns River Runners club, logs five‑mile runs three times a week, dances to contemporary‑Afro‑Latin beats at the Salsa Fusion studio, cheers for the Orlando
    Magic during NBA season, and once volunteered as a water‑carrier for the Jacksonville Jaguars' community outreach game.
  arts: Juanita Johnson devours science‑fiction novels by N. K. Jemisin and Liu Cixin, tunes into podcasts like ‘Hardcore History’ and ‘Science Vs’, attends local jazz nights featuring vibraphonist Roy
    Hargrove, and participates in community theater productions of ‘A Raisin in the Sun,’ letting speculative storytelling and live performance fuel her creative spark.
  travel: Juanita Johnson enjoys meticulously planning weekend getaways to New Orleans for its food festivals, spontaneous trips to the Bahamas for Caribbean rhythms, and dreams of hiking Iceland’s volcanic
    landscapes, balancing budget‑friendly road trips with occasional splurges on airfare for cultural immersion.
  culinary: Juanita Johnson experiments with collard greens, jerk chicken, plantain mofongo, and gumbo, often sourcing fresh herbs from her community garden, can whip up a spicy shrimp étouffée in under
    an hour, and proudly labels her spice rack with color‑coded jars, though she sometimes burns the edges of her roasts when juggling tutoring sessions.
  core: Juanita Johnson blends analytical precision with contagious enthusiasm, organizing data pipelines by sunrise, dancing through community events by dusk, and obsessively color‑coding every planner
    page while occasionally forgetting to water her garden.
background:
  cultural: Juanita identifies as Black and draws on a rich tapestry of African American and Caribbean influences that shape her worldview. Growing up in the Southeast, she celebrated traditions such as
    Juneteenth, Kwanzaa, and family gatherings featuring music, storytelling, and cuisine that honor her ancestors. This multicultural heritage fuels her commitment to representation and empowerment, inspiring
    her involvement in local STEM outreach programs that aim to uplift youth from diverse backgrounds.
attributes:
  skills: '[''Data analysis'', ''Statistical modeling'', ''Python programming'', ''R programming'', ''Laboratory techniques'', ''Project coordination'', ''Process improvement'', ''Technical writing'', ''Community
    outreach'', ''Problem solving'']'
  hobbies: '[''Running'', ''Afro-Latin dance'', ''Community gardening'', ''Cooking Southern and Caribbean cuisine'', ''Reading science-fiction'', ''Volunteering as a tutor'', ''Attending cultural festivals'']'
  career_goals: Juanita aims to transition back into the professional sphere by securing a role that leverages her analytical abilities and her passion for STEM education. She plans to earn a data science
    certification within the next year and target positions such as data analyst, research associate, or STEM program coordinator at a nonprofit or community college. Long-term, she aspires to lead a community-focused
    initiative that expands access to STEM learning for underrepresented youth in Volusia County, while also building a stable career that balances personal growth and financial security.
