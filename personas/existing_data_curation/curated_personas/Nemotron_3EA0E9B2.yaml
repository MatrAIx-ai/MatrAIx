  career_goals: She aims to advance to a supervisory role, such as Sergeant or Lieutenant, within the Lincoln County Sheriff’s Office, where she can mentor junior officers and shape departmental policies
    toward community‑focused policing. Michelle is interested in leading a specialized unit that addresses mental‑health related calls and domestic violence, and she hopes to develop a comprehensive training
    program for officers on trauma‑informed response. Long‑term, she envisions establishing a community safety partnership that integrates local schools, nonprofits, and law‑enforcement resources to promote
    preventative initiatives and strengthen public trust.
