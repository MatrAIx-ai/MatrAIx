  hobbies: '[''Hiking and outdoor exploration'', ''Landscape photography and basic photo editing'', ''Cooking and experimenting with recipes'', ''Yoga and mindfulness meditation'', ''Thrifting vintage clothing'',
    ''Attending local music festivals'', ''Volunteering at community garden'', ''DIY crafts and home décor projects'']'
  career_goals: Courtenay aims to translate her practical abilities into a stable, flexible career that lets her continue learning and contribute to her community. In the short term, she plans to enroll
    in a community college program for Business Administration while taking a certificate in Project Management to qualify for entry‑level coordinator roles. She hopes to secure a part‑time position in
    retail or hospitality to gain workplace experience and fund her studies. Long‑term, she aspires to become a community outreach coordinator for a non‑profit organization serving at‑risk youth in the
    San Bernardino area, leveraging her customer service background and organizational skills. Simultaneously, she is exploring the possibility of launching an online boutique selling handmade home décor
    items, blending her DIY crafts and photography skills, which would provide the flexibility she values.
