personas:
  professional: Courtenay Cash, a 22-year-old aspiring community outreach coordinator, leverages hands‑on repair, basic project‑management training and an easy‑going yet assertive style to organize volunteer
    events, and they see this blend as the foundation for a flexible nonprofit career.
  sports: Courtenay Cash stays active by hiking the San Bernardino Mountains with the local ‘Trailblazers’ club, joining seasonal volleyball pick‑up games at the community center, and they cheer on the
    Los Angeles Dodgers, Rams and Clippers while keeping a casual, outdoor‑focused fitness routine.
  arts: Courtenay Cash expresses creativity through landscape photography inspired by Ansel Adams, curates a digital portfolio featuring sunrise shots edited in Lightroom, enjoys listening to indie folk
    artists like Phoebe Bridgers and attending live shows at Sparks Theater, and they occasionally dabble in mural spotting during community festivals.
  travel: Courtenay Cash favors spontaneous road trips across the Southwest, having already explored Joshua Tree, Big Bear and a weekend in Sedona for red‑rock photography, while dreaming of a cultural
    immersion stay in Oaxaca, and they balance budget constraints with a love for outdoor adventure.
  culinary: Courtenay Cash loves crafting comfort dishes with a twist—mac and cheese topped with jalapeños, roasted chicken pot pie infused with fresh rosemary, and Thai green curry featuring cilantro and
    lime—while sourcing avocados and heirloom tomatoes from the local farmer’s market, and they often showcase their plates on Instagram after a quick edit in Canva.
  core: Courtenay Cash combines a free‑spirited love for hiking, vintage thrifting and DIY décor with a laid‑back approach to planning that sometimes leaves bills unchecked, yet they remain reliably optimistic
    and maintain a community‑first attitude that keeps them grounded.
background:
  cultural: Courtenay was raised in a middle‑class, predominantly white neighborhood in San Bernardino, California. Her family’s roots trace back to the Midwest, but they have lived in Southern California
    for two generations. Growing up in a region where agricultural, desert, and mountain cultures intersect, she was exposed to a blend of traditions, from local farmers’ markets to the vibrant Hispanic
    community that characterizes the Inland Empire. This multicultural environment influenced her appreciation for diverse cuisines, the Spanish language, and community‑oriented celebrations such as Cinco
    de Mayo and local county fairs. While identifying as White American, Courtenay embraces the inclusive, outdoors‑focused lifestyle of Southern California and values the regional emphasis on self‑reliance,
    neighborly support, and appreciation for the natural environment.
attributes:
  skills: '[''Basic computer literacy (email, word processing, social media)'', ''Customer service and volunteer coordination'', ''DIY home repair (painting, carpentry)'', ''Automotive basic maintenance
