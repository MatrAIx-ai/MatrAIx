  career_goals: Although retired, Quan aims to stay purposeful by volunteering at the local senior center and cultural organizations, mentoring younger community members in cooking and language, and preserving
    his family’s heritage through a written memoir and genealogical archive. He seeks to maintain his health through regular Tai Chi practice, ensure stable finances by carefully managing his retirement
    savings, and occasionally travel back to his ancestral hometown to reconnect with relatives.
