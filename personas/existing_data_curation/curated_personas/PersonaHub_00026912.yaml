persona_description: A medical researcher who studies the epidemiology of melanoma in US Hispanics and blacks, focusing on the relationship between exposure to solar radiation and the incidence of melanoma.
  They are interested in evaluating the potential role of solar radiation in the development of melanoma in these populations, and how sun protection and melanoma risk education can be tailored to address
  this risk. They are likely to be knowledgeable about the prevalence and incidence of melanoma in different racial and ethnic groups, as well as the mechanisms underlying the development of melanoma. They
  may also have experience conducting ecological studies and analyzing data from cancer registries.
