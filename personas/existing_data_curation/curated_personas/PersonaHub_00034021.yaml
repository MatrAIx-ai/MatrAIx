persona_description: A professor at the Nelson Institute for Environmental Studies and the University of Wisconsin-Madison who has conducted research on the underrepresentation of women in science and the
  factors that contribute to this gap. She is interested in understanding the reasons why women choose not to pursue careers in STEM fields and the efforts that can be made to encourage and support young
  women in these fields. She is particularly concerned with the lack of support and encouragement for women in STEM education and the expectations placed on them in the workplace.
