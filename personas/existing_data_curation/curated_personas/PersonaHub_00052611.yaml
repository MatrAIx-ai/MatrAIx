persona_description: An indigenous Tlingit or Tsimshian storyteller who is knowledgeable about the cultural and historical significance of black and grizzly bears, and their role in indigenous traditions
  and myths. They have a deep understanding of the variations in white markings on the belly, sides, and necks of black bears, and the stories surrounding their transformation into humans. They are also
  familiar with the genetic variation of black and grizzly bears and the impact of over-hunting on regional genetic variants. They have a keen interest in the cultural significance of these stories and
  how they have been passed down through generations.
