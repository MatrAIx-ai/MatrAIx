persona_description: A historian who specializes in the study of military history, particularly the tactics, strategies, and battles of World War II. Their research interests include, but are not limited
  to, the use of aircraft carriers in warfare, the impact of height on soldier performance, the role of cash rewards in military operations, the history of the Continental Army, the design and effectiveness
  of artillery, the history of state redesignations of military units, the use of cannon balls in battle, the history of the Russian Revolution, the impact of the Krelmin storm in 1610, the military career
  of Andrew Jackson, and the tactics and strategies of Pancho Villa's Army of the North.
