personas:
  professional: Caroline Stephens, an aspiring junior game creator, blends her sketchbook doodles, LEGO world‑building, and Scratch coding into whimsical interactive stories; they experiment freely thanks
    to a curious yet relaxed nature, often leaving projects unfinished as they chase the next bright idea.
  sports: Caroline Stephens spends Saturdays at the Woodbine Wolves youth soccer clinic, cheers for the Toronto Raptors and Toronto Blue Jays, and prefers the freedom of forest trail races where they collect
    leaves, while also attending an after‑school swimming class that satisfies their competitive spark and love for game‑like challenges.
  arts: Caroline Stephens immerses themselves in the vibrant worlds of Studio Ghibli films, the graphic novel series 'Amulet,' and the calming piano compositions of Ólafur Arnalds, and they turn each museum
    visit to the local art gallery into a treasure hunt for new techniques to add to their sketchbooks.
  travel: Caroline Stephens enjoys family road trips to the Royal Ontario Museum in Toronto and the misty splendor of Niagara Falls, dreams of exploring Tokyo’s anime districts, and favors spontaneous stops
    at quirky roadside craft stalls over rigid itineraries, though their parents’ budget keeps vacations within a few‑hour drive radius.
  culinary: Caroline Stephens favors cheesy pizza slices, rainbow fruit kebabs, and homemade macaroni‑and‑cheese, often experimenting with a pinch of cinnamon in pancakes, while proudly assembling simple
    lettuce wraps after watching a kid‑focused cooking show; they tend to eat straight from snack bags, leaving a trail of crumbs behind.
  core: Caroline Stephens is a boundlessly curious 8‑year‑old who sketches whole universes while worrying about misplacing a perfect leaf, trades chores for LEGO bricks, and turns everyday moments into
    miniature adventures, though they sometimes leave a mess of crayons and crumbs.
background:
  cultural: Caroline is a White American growing up in the suburban community of Woodbine, Maryland, within Montgomery County. Her family celebrates typical American holidays such as Thanksgiving, Christmas,
    and Halloween, often incorporating family traditions like seasonal baking and summer road trips. The area’s diverse cultural environment, with schools and community events reflecting a mix of ethnic
    backgrounds, provides her with exposure to a variety of languages, foods, and customs, fostering an open‑minded outlook. Her family’s ancestry includes English and Irish roots, which are reflected in
    occasional stories about ancestors and occasional visits to historical sites in the Mid‑Atlantic region. The local emphasis on education and community involvement shapes her values of curiosity, creativity,
    and collaborative learning.
attributes:
  skills: '[''Reading comprehension (grade-level)'', ''Basic arithmetic'', ''Sketching and drawing'', ''Nature observation'', ''Basic coding with Scratch'', ''Collaborative group work'', ''Empathetic listening'']'
  hobbies: '[''Drawing and sketching'', ''Reading picture books and graphic novels'', ''Exploring nature (collecting leaves, rocks, insects)'', ''Building with LEGO'', ''Creating simple games with Scratch'',
    ''Visiting museums and art galleries'', ''Listening to music'', ''Writing short stories'']'
  career_goals: Caroline dreams of a future where she can blend her love of art and curiosity about the world. She imagines becoming a museum curator or an illustrator who helps children discover science
    and creativity through visual stories. Her goal is to develop her drawing skills enough to exhibit in local community art shows and to learn more advanced coding so she can create interactive educational
    games. She also hopes to study environmental science, hoping one day to design exhibits that inspire kids to protect nature. Because she often worries about stress, she aspires to foster supportive,
    flexible learning environments where flexibility and creativity are valued over rigid schedules.
