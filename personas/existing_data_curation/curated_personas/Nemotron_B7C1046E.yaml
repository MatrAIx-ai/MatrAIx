  career_goals: At 84, Michael's primary goal is to preserve his independence and health while remaining an active, supportive member of his community. He aims to mentor younger volunteers at the senior
    center, contribute oral histories to the town historical society, keep his garden productive each season, and maintain a regular, balanced routine that blends his love of structure with occasional spontaneous
    outings.
