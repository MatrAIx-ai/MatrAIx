personas:
  professional: Bahman Holmes is a seasoned avionics technician whose meticulous attention to schematics, disciplined troubleshooting of navigation and flight control systems, and proactive mentorship of
    junior staff reflect a blend of practical rigor and curiosity as they work toward an A&P license and a supervisory role.
  sports: Bahman Holmes maintains a disciplined strength‑training regimen at his local gym, participates in a bi‑weekly intramural basketball league with a handful of colleagues, follows the New York Giants
    for football, and occasionally runs the Hoboken 5 K during the spring, embodying their preference for structured, small‑group fitness activities as they thrive on routine.
  arts: Bahman Holmes channels his creative side through urban photography of Jersey City’s street murals and skyline, curates playlists that blend sitar virtuoso Ravi Shankar with jazz legend John Coltrane,
    and attends occasional screenings of independent films at the Garden State Film Festival, showing how music and visual art deepen his appreciation for cultural nuance as they seek balance between technical
    and creative worlds.
  travel: Bahman Holmes plans trips with the same precision he applies to avionics checks, favoring short technical conferences in Seattle’s aerospace hub, weekend drone‑flight excursions to the Swiss Alps
    for high‑altitude testing, and dreaming of a future visit to the Musée de l’Air et de l’Espace in Paris, while balancing family obligations that limit extended overseas stays as they meticulously schedule
    each itinerary.
  culinary: Bahman Holmes enjoys cooking aromatic dishes like chicken biryani, lentil dal with cumin and coriander, and fresh mango lassi, perfecting spice blends in his home kitchen as a way to stay connected
    to family traditions, yet admits to occasionally over‑seasoning when experimenting with fusion recipes as they explore new flavor frontiers.
  core: Bahman Holmes blends disciplined precision with technical curiosity, thriving on solitary problem‑solving, meticulous planning, and a quiet drive to mentor others while occasionally indulging in
    perfectionist tendencies and a reluctance to delegate as they navigate professional and personal expectations.
background:
  cultural: Bahman is a first‑generation American of South Asian descent, with familial roots in the Indian subcontinent. Raised in Union City, NJ, he grew up in a multicultural environment that blended
    traditional South Asian customs—such as celebrating Diwali, valuing education, and respecting family hierarchy—with the diverse fabric of the Hudson County community. He is fluent in English and conversational
    in Hindi, and his home life incorporated South Asian cuisine, music, and storytelling. These cultural influences fostered a strong work ethic, a respect for collective well‑being, and an appreciation
    for both communal gatherings and personal solitude, which shape his professional discipline and personal pursuits.
attributes:
  skills: '[''Aircraft avionics troubleshooting'', ''Electronic circuit diagnostics'', ''Avionics system installation and maintenance'', ''FAA regulatory compliance'', ''Technical documentation and reporting'',
    ''Software updates for flight management systems'', ''Inventory management and parts logistics'', ''Data analysis for system performance'', ''Training and mentoring junior technicians'']'
  hobbies: '[''Model aircraft building'', ''Radio‑controlled drone piloting'', ''Reading aerospace and technology magazines'', ''Chess'', ''Gym workouts (strength training)'', ''Cooking South Asian cuisine'',
    ''Urban photography'', ''Attending small tech meetups'', ''Mentoring youth in STEM'']'
  career_goals: Bahman aims to become a lead avionics maintenance supervisor within the next five years, overseeing a team of technicians and spearheading reliability improvement initiatives. He plans to
    obtain his Airframe & Powerplant (A&P) license and pursue additional certifications in advanced avionics systems, such as Integrated Modular Avionics (IMA). Long‑term, he aspires to transition into
    a research and development role focusing on next‑generation flight control and navigation technologies, potentially at a commercial airline or defense contractor. He also hopes to mentor underrepresented
    youth in STEM, leveraging his technical expertise and disciplined work ethic.
