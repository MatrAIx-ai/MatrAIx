  hobbies: '[''Landscape Painting'', ''Nature Photography'', ''Birdwatching'', ''Reading Historical Non-Fiction'', ''Art History'', ''Book Club'', ''Chess'', ''Crafts Workshop Volunteering'']'
  career_goals: Although retired from formal employment, Adnan aims to deepen his contribution to the cultural life of Trinidad. He plans to curate a small exhibition of historic photographs at the local
    museum, compile a collection of oral histories from longtime residents, and write a memoir that blends personal narrative with the region's history. He also intends to develop a community garden where
    he can teach sustainable gardening practices, and to enroll in a weekend painting class to refine his landscape painting technique. His overarching ambition is to leave a lasting, collaborative legacy
    that honors the town's heritage while inspiring future generations.
