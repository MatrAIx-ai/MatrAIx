    basics'', ''Cooking traditional Venezuelan dishes'', ''Volunteering at community cultural events'']'
  career_goals: Miguel aspires to pursue a career in engineering, ideally in software development or renewable‑energy technology, where he can apply his curiosity and practical mindset. He aims to attend
    a STEM‑focused high school and later a university engineering program, with a long‑term ambition to design sustainable solutions for his community in Arizona and contribute to technology initiatives
    that support Latin American immigrants. He also hopes to mentor younger students, helping them navigate academic challenges and develop confidence.
