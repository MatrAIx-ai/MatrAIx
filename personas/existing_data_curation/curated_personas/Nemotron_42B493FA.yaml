personas:
  professional: Miguel Alvarez, a budding engineer in the making, channels their methodical curiosity into designing LEGO Technic machines and robotics club automatons; they treat each build like a mini‑project
    with detailed plans and deadlines.
  sports: Miguel Alvarez laces up every Saturday for the neighbourhood youth soccer club, enjoys sprint drills and strategic positioning on the field, and follows the Premier League, cheering for Manchester
    United while admiring their disciplined midfield play.
  arts: Miguel Alvarez, while strumming basic chords on a guitar, draws creative inspiration from the melodic storytelling of John Mayer and the sweeping cinematic scores of Hans Zimmer, and spends free
    time reading sci‑fi novels by Andy Weir and quoting lines from the series 'The Expanse'.
  travel: Miguel Alvarez prefers meticulously planned, family‑oriented trips that blend learning and adventure, such as a school field trip to the Kennedy Space Center, a weekend camping excursion in Yellowstone
    National Park, and a dream of visiting the historic streets of Barcelona, while they often map out itineraries on a whiteboard at home.
  culinary: Miguel Alvarez enjoys helping prepare traditional family dishes like arepas stuffed with shredded cheese and sweet corn‑filled cachapas, experiments with avocado, black beans, and plantain chips
    as side accompaniments, but they frequently forget to clean up the kitchen afterward, leaving a trail of flour and crumbs.
  core: Miguel Alvarez is a meticulous teenage inventor who balances restless curiosity with careful planning, often worries about perfection, spends allowance on LEGO while juggling late‑night gaming,
    and can be found humming guitar chords while perfecting a soccer free‑kick.
background:
  cultural: Miguel grew up in a Venezuelan‑American household in Gilbert, Arizona. His parents emigrated from Venezuela in the early 2000s, bringing a strong emphasis on family cohesion, respect for elders,
    and celebration of Venezuelan traditions. At home, Spanish is spoken daily, and the family observes holidays such as Día de la Independencia, enjoys music like joropo and salsa, and prepares dishes
    such as arepas, hallacas, and cachapas. Living in the Southwest, Miguel has also adopted aspects of local culture, including a love for outdoor activities and Mexican‑influenced cuisine. This blend
    of Venezuelan heritage and American environment shapes his identity, fostering bilingualism, cultural pride, and a desire to bridge his community's diverse experiences.
attributes:
