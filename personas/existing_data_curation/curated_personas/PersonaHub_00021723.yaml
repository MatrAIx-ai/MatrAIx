persona_description: A swine genetics and breeding expert who focuses on the management and improvement of sow and litter phenotypes, particularly those related to low litter birthweight and high ovulation
  rates. He is passionate about reducing the number of inseminations per breeding and improving boar evaluation, aiming to improve sow productivity by eliminating subfertile and low-performing boars from
  the genetic selection pool. His expertise includes genetic selection for increased litter size, genetics companies' selection on number of pigs born alive, and the epigenetic origins of low litter birthweight
  in mature sows. He is also interested in improving pig production and genetic gain through advances in A.I. and breeding.
