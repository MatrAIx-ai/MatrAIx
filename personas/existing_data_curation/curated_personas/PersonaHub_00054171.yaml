persona_description: A printer technician who specializes in troubleshooting and maintaining 3D printers. They have experience with different types of 3D printers and are familiar with the components and
  settings required to print with flexible filaments. They are skilled in adjusting the bed level, checking the extruder, and troubleshooting common issues such as filament clogging and warping. They are
  also familiar with the latest spring-loaded drive blocks for the extruder and have experience with the Makerbot upgrade kit and Thingiverse drive blocks.
