  hobbies: '[''Desert hiking and trail exploration'', ''Birdwatching'', ''Xeriscape gardening'', ''Woodworking and furniture making'', ''Chess'', ''Reading historical non-fiction'', ''Sudoku and puzzle
    solving'', ''Nature photography'', ''Volunteer STEM mentoring (small groups)'']'
  career_goals: Wade aims to transition into academic leadership by becoming department chair or dean, where he can institutionalize data‑driven teaching practices and foster interdisciplinary collaboration.
    He seeks to secure a multi‑year NSF grant to develop a hybrid course series in renewable energy engineering, publish a textbook on applied calculus, and mentor at least ten PhD candidates to successful
    completion. Ultimately, he wants to leave a measurable legacy of improved student outcomes and a sustainable, structured curriculum that can adapt to emerging technologies.
