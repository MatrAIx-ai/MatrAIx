  career_goals: Dayna aims to move from a front‑line representative to a supervisory or quality‑assurance role within the next three years, leveraging her competitive drive to become a top performer and
    mentor. She plans to earn a Customer Experience Management certification and pursue a museum studies certificate, positioning herself to transition into a community‑outreach or cultural‑program coordinator
    role at a local art museum or historical society. Parallel to professional advancement, she seeks to strengthen her emotional resilience through mindfulness training and counseling, enabling her to
    handle high‑stress interactions more effectively while maintaining the quiet work environment she values.
