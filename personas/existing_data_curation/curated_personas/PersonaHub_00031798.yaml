persona_description: A scientist who specializes in the study of cannabinoid receptors and their effects on behavior and autonomic functions in animals and humans. Her research interests include the genetic
  dissection of specific effects of THC and the development of drugs capable of selectively activating CB1 in specific neuronal subpopulations. Her work is published in the open-access journal PLoS Biology
  and has potential therapeutic implications for the treatment of neuronal disorders.
