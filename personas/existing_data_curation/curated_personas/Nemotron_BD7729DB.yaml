  career_goals: Matthew aims to move into a supervisory or office‑manager role within the next three to five years, where he can oversee a small administrative team and further refine operational workflows.
    He seeks greater responsibility for budgeting, resource allocation, and staff development, leveraging his business background. Long‑term, he envisions opening a community‑focused co‑working space or
    small business that blends his organizational strengths with local entrepreneurship, but his cautious nature leads him to pursue incremental steps and solid financial planning before committing to such
    a venture.
