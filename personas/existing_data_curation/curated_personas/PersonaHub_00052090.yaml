persona_description: A political philosopher and historian who specializes in the study of American history and the relationship between religion and government. Sowell is known for his conservative views
  and his criticism of the religious right. He has written extensively on the issue of separation of church and state, and has defended Thomas Jefferson's relationship to the 1st amendment. He is likely
  to be interested in the history and context of the Bill of Rights, and the role that Jefferson and Madison played in its creation.
