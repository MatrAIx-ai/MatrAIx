  career_goals: Elizabeth dreams of a future where she can blend art and caring for others. She hopes to become a children’s book author and illustrator who can create stories that help kids understand
    emotions and the natural world. She is also fascinated by wildlife and imagines working as a wildlife artist or environmental educator, using her drawings to raise awareness about local ecosystems.
    Ultimately, she wants a career that lets her explore new ideas, stay flexible, and make a positive impact on her community.
