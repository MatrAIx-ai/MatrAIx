personas:
  professional: A budding junior game designer, Elizabeth Prince creates whimsical Scratch games that blend fantasy art with interactive storytelling, using their love of imagination and a relaxed, flexible
    work style, and they prototype without strict deadlines.
  sports: A fan of the Orlando Magic and the Tampa Bay Lightning, Elizabeth Prince plays on the Orlando Youth Soccer Club during the spring, enjoys weekend bike rides on local nature trails, and they approach
    fitness with a playful curiosity, preferring spontaneous games of tag over structured workouts.
  arts: Elizabeth Prince immerses themselves in drawing fantastical beasts inspired by James Gurney and Hayao Miyazaki, attends community art workshops to experiment with watercolor, reads Harry Potter
    and The Neverending Story for narrative inspiration, and they practice beginner piano pieces such as a simplified Fur Elise to unwind.
  travel: Elizabeth Prince loves spontaneous family road trips to Clearwater Beach and day visits to the Charles Hosmer Morse Museum, dreams of exploring the Louvre in Paris and the anime districts of Tokyo,
    and they prefer flexible itineraries that allow time for sketching new scenery.
  culinary: Elizabeth Prince enjoys making homemade pizza with fresh mozzarella and basil, decorating cupcakes with rainbow sprinkles, and they help their parents prepare fruit salads featuring strawberries
    and mango, though they occasionally skip vegetables when a new game captures their attention.
  core: Elizabeth Prince is a curious, artistic ten‑year‑old who balances whimsical creativity with frequent worries, channeling their imagination into Scratch games, sketchbooks, and piano while they navigate
    the world with a flexible, sometimes disorganized, approach.
background:
  cultural: Elizabeth comes from a white, middle‑class family that has lived in Winter Park, Florida for several generations. Her upbringing reflects the suburb’s strong emphasis on education, community
    arts, and outdoor recreation. She participates in local cultural events such as the Winter Park Art Festival and school‑sponsored museum trips, which nurture her love of creativity. While her household
    primarily celebrates American holidays, she is also exposed to the multicultural atmosphere of Central Florida, picking up occasional Spanish words from neighbors and enjoying the region’s diverse cuisines.
