  career_goals: Looking ahead, Hung dreams of a career that merges his love for science, technology, and caring for the environment. He hopes to become a marine biologist or an environmental engineer who
    studies and protects the Monterey Bay ecosystem, perhaps developing sustainable solutions for coastal preservation. At the same time, his interest in coding inspires him to create interactive educational
    apps that teach other children about marine life. Hung also envisions a role that allows him to mentor peers—such as a community youth coordinator or a future teacher—where his compassionate, cooperative
    nature can help foster harmony and support among young people.
