personas:
  professional: Hung Bak, a budding junior robotics hobbyist, blends curiosity and practicality by designing LEGO‑powered contraptions and coding simple Scratch games, while their organized yet flexible
    approach keeps projects on track, and their calm demeanor makes them a reliable coordinator for small‑group tech workshops.
  sports: Hung Bak, a member of the Pebble Beach Junior Swim Team and an avid fan of the San Jose Sharks, enjoys casual beach volleyball on weekends, follows the San Jose Earthquakes youth soccer league,
    and balances strategic board gaming like Carcassonne with a calm, resilient attitude toward physical activity.
  arts: Hung Bak, who sketches serene coastal landscapes reminiscent of Monet's seascapes and folds intricate origami cranes while listening to the soothing piano pieces of Ludovico Einaudi and Yiruma,
    often draws inspiration from Studio Ghibli animations such as "Spirited Away" to fuel their Scratch game narratives.
  travel: Hung Bak, who plans trips with a meticulous notebook, has explored the tide‑pools of Monterey Bay, the historic streets of San Francisco's Fisherman's Wharf, and dreams of visiting the Great Barrier
    Reef and Kyoto's bamboo forests, balancing a desire for adventure with family budget constraints.
  culinary: Hung Bak, an intermediate home cook, loves preparing lemon‑butter shrimp pasta with fresh basil, making classic grilled cheese with tomato soup, and experimenting with simple sushi rolls using
    cucumber, avocado, and imitation crab, while often snacking on chocolate‑chip pancakes after late‑night LEGO sessions.
  core: Hung Bak blends quiet curiosity with calm practicality, turning tide‑pool discoveries into LEGO inventions, saving meticulously for the next set, and navigating life with a resilient, compassionate
    heart.
background:
  cultural: Hung comes from a Korean‑American family that values education, respect for elders, and collective harmony. His parents speak Korean at home and celebrate traditional holidays such as Lunar
    New Year and Chuseok, where he participates in cooking, cultural games, and community gatherings. Living in Pebble Beach, he blends these cultural roots with the coastal Californian lifestyle, spending
    weekends at the beach and learning about marine ecosystems. This mix of heritage and local environment has cultivated a respect for nature, a sense of responsibility to his community, and fluency in
    both English and Korean, allowing him to navigate and bridge diverse cultural settings.
