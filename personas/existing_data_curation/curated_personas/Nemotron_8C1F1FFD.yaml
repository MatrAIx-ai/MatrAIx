  career_goals: Salita aims to move into a supervisory position within the dispatch center, where she can mentor new personnel and shape training curricula that incorporate creative thinking and community
    outreach. She plans to complete a bachelor's degree in emergency management or communications and eventually transition into an emergency management coordinator or public information officer role for
    a municipal agency. Parallel to her public safety career, she hopes to launch a community arts initiative that uses visual storytelling, workshops, and interactive media to raise public awareness about
    emergency preparedness, merging her artistic passions with her professional expertise.
