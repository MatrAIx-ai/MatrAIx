    User 2: Great! I''ll see you then.

    User 1: Looking forward to it!


    [On the weekend...]


    User 1: Hi, (name)! I''m here for our D&D game.

    User 2: Great! I''m ready to start.

    User 1: Let''s do it!

    [The two of them start playing D&D.]


    [After an hour or so...]


    User 2: This is so much fun! I can''t believe I''ve never played before.

    User 1: I told you you''d like it!

    User 2: I''m so glad you invited me.

    User 1: Me too! We should play again soon.

    User 2: Definitely!

    User 1: Great! I''ll see you then.

    User 2: See you!'
