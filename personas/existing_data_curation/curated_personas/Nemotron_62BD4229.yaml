  career_goals: She aims to translate her love of routine cooking into a home-based catering business specializing in authentic Puerto Rican pastries and holiday meals. Over the next three years, Anyelin
    plans to obtain a culinary certification and gradually expand the service into a modest storefront in Toa Baja, while keeping the operation flexible enough to maintain her preferred daily routines.
    Concurrently, she hopes to leverage her business administration background to offer part-time bookkeeping services for local small enterprises, providing a steady supplemental income without sacrificing
    her independent schedule. Her long-term ambition is to be recognized locally for preserving and sharing Puerto Rican culinary traditions.
