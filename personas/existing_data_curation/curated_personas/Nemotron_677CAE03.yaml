personas:
  professional: Daniel Zabala is an aspiring project coordinator who leverages their proficiency with Microsoft Office, Trello, Asana, and Python automation to streamline team workflows, while they apply
    their preference for structure and cooperative nature to run meetings like well‑planned games of Pandemic, keeping everyone on track.
  sports: Daniel Zabala follows a routine of early‑morning shoreline jogs, participates in the San Diego Running Club’s weekend group runs and a local CrossFit box, while they cheer on the San Diego Padres
    in baseball and the San Diego Wave FC in soccer, reflecting a balanced enthusiasm for personal fitness and regional team spirit.
  arts: Daniel Zabala unwinds by listening to the indie folk melodies of The Lumineers, revisiting Christopher Nolan’s mind‑bending films, and they attend local art gallery openings showcasing street‑art‑inspired
    works reminiscent of Banksy, all of which feed their analytical yet creative mindset.
  travel: Daniel Zabala prefers meticulously planned weekend getaways to nearby national parks like Joshua Tree, while they dream of a solo backpacking adventure through Iceland’s geothermal landscapes
    and a cultural immersion tour of Kyoto’s historic temples, balancing adventure with the comfort of a detailed itinerary.
  culinary: Daniel Zabala enjoys preparing health‑focused dishes such as quinoa‑and‑chickpea salads with avocado, grilled salmon drizzled with lemon‑dill sauce, and overnight oats topped with chia seeds
    and fresh berries, and they pair each meal with a brief journal entry about the cooking process, reflecting modest culinary skill and a penchant for balanced nutrition.
  core: Daniel Zabala is a methodical planner who juggles spreadsheets for everything—from project tasks to symptom tracking—to the point they often forget to water their houseplants, a quirky reminder
    that even the most organized can overlook the small things.
background:
  cultural: Daniel is a white American raised in the suburbs of Suffolk County on Long Island. His family roots blend Italian and Irish ancestry, reflected in occasional family meals of pasta and corned
    beef during holidays. Growing up in a middle‑class, community‑oriented environment, he was exposed to the regional culture of seasonal beach outings, Fourth of July fireworks, and local high‑school
    sports events. He attended public schools that emphasized academic achievement and civic participation, which nurtured his collaborative mindset. The multicultural mosaic of Long Island—diverse neighborhoods
    and cultural festivals—has given him an appreciation for different perspectives while maintaining core American values centered on hard work, responsibility, and community service.
