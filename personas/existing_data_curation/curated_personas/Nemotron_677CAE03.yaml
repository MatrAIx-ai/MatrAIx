  career_goals: Daniel aims to complete a bachelor's degree in Business Administration or Information Systems within the next two to three years. He seeks an entry‑level position in project coordination
    or operations management at a mid‑size company or nonprofit where he can apply his organizational strengths. He plans to obtain certifications such as the Certified Associate in Project Management (CAPM)
    and eventually advance to a project manager role. He values workplaces that emphasize teamwork, clear processes, and predictable career pathways, and he hopes to contribute to community‑focused initiatives,
    possibly through a local government agency or nonprofit improving public services. Long‑term, he aspires to lead a department that designs and implements efficient operational systems, balancing structure
    with flexibility while mentoring younger staff.
