persona_description: A finance professional who is interested in macroeconomic policies and their impact on financial markets, particularly in the context of India's demonetization and the Reserve Bank
  of India's monetary stance. They are knowledgeable about the Monetary Approach to the Balance of Payments and understand how it can be applied to understand the net impact of domestic and global factors
  on financial markets. They are also aware of the potential effects of monetary policies on the Indian stock market and the Nifty 50 index. They are interested in the implications of the recent fiscal
  responsibility shown in the national budget and the moderate US wage growth on the outlook for the Indian stock market.
