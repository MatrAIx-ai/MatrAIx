  hobbies: '["Watercolor painting", "Urban photography", "Reading speculative fiction and philosophy", "Attending improv theater workshops", "Hiking in the Niagara and Chautauqua regions", "Exploring new
    coffee shops", "Journaling and creative writing", "DIY home‑decor upcycling projects", "Collecting vintage vinyl records", "Visiting art galleries and museums"]'
  career_goals: Bridget aims to advance to a regional management position within the next five years, overseeing multiple stores across Western New York and using her inventive mindset to redesign the in‑store
    experience. She envisions opening a flagship boutique that doubles as an art gallery, showcasing local artists while curating a distinctive product line that reflects Buffalo’s cultural vibrancy. To
    achieve these ambitions, she plans to pursue an MBA focused on innovation and brand storytelling and to launch a mentorship program that lifts emerging women leaders in retail.
