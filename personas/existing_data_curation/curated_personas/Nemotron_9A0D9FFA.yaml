    work discipline'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching and food plating illustration'', ''Experimental home cooking'', ''Food photography'', ''Exploring farmers\'' markets'', ''Reading contemporary
    non‑fiction (food history, design)'', ''Listening to culinary podcasts'', ''Strategic board‑game gatherings'', ''Indoor herb gardening'', ''Traveling to regional food festivals (small group)'', ''Playing
    piano (occasional)'', ''Hiking in local parks (solitary)'']'
  career_goals: Bernice aims to advance from her current food‑preparation role to a sous‑chef position within the next two years, using her hands‑on experience and upcoming coursework toward an associate
    degree in culinary arts. Her longer‑term ambition is to become a head chef who fuses Midwestern seasonal ingredients with artistic plating, eventually opening a boutique pop‑up restaurant or a catering
    service that showcases her experimental recipes. She also aspires to earn industry certifications such as ServSafe and to compete in regional culinary competitions, leveraging her competitive drive
    to refine her skills. In the future, Bernice is interested in mentoring junior kitchen staff and possibly teaching introductory cooking classes at a community college, sharing her love of curiosity‑driven
    food creation with others.
