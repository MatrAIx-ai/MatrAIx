personas:
  professional: Bernice Awad, a 34-year-old kitchen professional, leverages their solid experience in fast‑paced food preparation, precise knife skills, HACCP safety mastery, and a competitive drive to
    lead small teams while designing seasonally inspired, artistically plated dishes, aiming for a sous‑chef role within two years.
  sports: Bernice Awad stays active by joining a Saturday morning 5‑K run club, practicing yoga at the local studio, and cheering on the Chicago Bulls and Chicago Cubs, while also playing in a casual co‑ed
    softball league that satisfies their competitive streak.
  arts: Bernice Awad enriches their creative outlook by frequenting the Art Institute of Chicago's contemporary exhibitions, sketching plated concepts alongside works by Yayoi Kusama and Olafur Eliasson,
    listening to Sufjan Stevens and the avant‑garde jazz of Kamasi Washington, and engaging in a weekly strategic board‑game group that mirrors the tactical thinking they apply to culinary design.
  travel: Bernice Awad prefers meticulously planned culinary pilgrimages, having explored Portland's food trucks, Oaxaca's mole markets, and the farm‑to‑table scene in Tuscany, while budgeting modestly
    for weekend getaways to nearby farmers' markets in the Midwest, balancing their love of discovery with career and financial constraints.
  culinary: Bernice Awad fuses Midwestern seasonal bounty with avant‑garde plating, expertly preparing dishes like beet‑root carpaccio with goat cheese crumble, miso‑glazed carrots, and heirloom tomato
    tartare while experimenting with sous‑vide techniques, using ingredients such as fresh basil, smoked paprika, and locally sourced microgreens, and they habitually photograph each plate for a growing
    Instagram portfolio.
  core: Bernice Awad is a competitively curious chef who blends art and food, meticulously budgets their kitchen experiments, wrestles with carpal tunnel, and finds solace in solitary sketching and strategic
    board games.
background:
  cultural: Bernice grew up in Omaha, Nebraska, within a middle‑class, predominantly white community that combines Midwestern practicality with an understated appreciation for the arts. Her family traces
    its roots to German and Irish immigrants who settled in the Great Plains in the early 20th century, instilling values of hard work, self‑reliance, and community involvement. Although her surname suggests
    a blend of cultural influences, Bernice identifies culturally as American‑white, and she incorporates the region’s seasonal produce and farm‑to‑table ethos into her cooking. Living in Washington County
    has exposed her to a mix of urban and rural lifestyles, shaping a balanced worldview that respects tradition while being open to new ideas.
