  career_goals: Jason aims to advance into a supervisory role within the Cedar Rapids EMS system, such as a field training officer or EMS commander, allowing him to mentor younger paramedics and shape operational
    protocols. He plans to complete a bachelor’s degree in Emergency Management to broaden his expertise in disaster preparedness and public health. Jason also seeks certification as an EMS instructor so
    he can expand community training programs, including integrating art‑therapy workshops for stress relief among first responders. Over the next five years, he hopes to lead a county‑wide emergency response
    initiative that blends medical readiness with cultural outreach, and to advocate for policies that improve mental‑health support for EMS personnel.
