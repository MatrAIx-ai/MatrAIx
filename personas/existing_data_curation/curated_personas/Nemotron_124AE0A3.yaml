  hobbies: '[''Historical fiction reading'', ''Book club (small group)'', ''Rose gardening'', ''Low‑country cooking'', ''Hiking state park trails'', ''Birdwatching'', ''Library volunteering'', ''Genealogical
    research'']'
  career_goals: Skylar aims to achieve partnership at her current firm within the next five years, positioning herself as a leader in both litigation and alternative dispute resolution. She aspires to launch
    a formal pro bono program that supports survivors of domestic violence, drawing on her interest in family law. Additionally, she seeks certification as a mediator and hopes to serve periodically as
    a part‑time magistrate for York County, combining her desire for public service with her structured legal expertise. Mentoring junior attorneys and eventually establishing a boutique practice focused
    on small‑business contracts and community advocacy are long‑term ambitions.
