  career_goals: He aims to secure an apprenticeship in automotive or HVAC repair after obtaining a GED, combining his hands‑on problem‑solving talent with a stable trade. Simultaneously, he dreams of building
    a personal brand on TikTok or YouTube where he can share gaming strategies, DIY hacks, and community challenges, eventually turning his channel into a revenue source. He also hopes to coach a local
    youth basketball team, leveraging his competitive edge and love for group activities.
