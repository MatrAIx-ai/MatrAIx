personas:
  professional: Samy Vickers, a four‑year‑old budding architect who spends afternoons arranging Lego bricks into precisely organized cityscapes, obsessively checking that every street is straight and that
    they meet their exacting standards, while dreaming of designing a playground that everyone can share.
  sports: Samy Vickers, a four‑year‑old who proudly wears the Bumblebee Cubs soccer jersey, practices dribbling in the backyard, cheers for the New York Knicks on game days, and balances weekly toddler
    gymnastics lessons with a disciplined routine.
  arts: Samy Vickers, a four‑year‑old who adorns bedroom walls with self‑made Dr. Seuss‑inspired doodles, sings loudly along to Disney's Frozen soundtrack, especially "Let It Go", and treasures a collection
    of Sesame Street storybooks that fuel a vivid imagination.
  travel: Samy Vickers, a four‑year‑old who loves short, well‑planned family trips to the city zoo and Grandma's farm, dreams of a future adventure at Disneyland in California, and prefers traveling with
    a familiar stuffed bunny for comfort.
  culinary: Samy Vickers, a four‑year‑old who devours cheesy macaroni, crispy chicken nuggets, and strawberry‑yogurt parfaits, proudly spreads butter on toast with a plastic knife, and negotiates extra
    peas at dinner with a persuasive smile.
  core: Samy Vickers, a meticulously curious four‑year‑old who sorts crayons by color, builds flawless Lego cities, and constantly seeks to share their creations with friends while occasionally sulking
    when plans go awry.
background:
  cultural: Samy is a white child raised in San Pablo, California, a suburban community within Contra Costa County known for its diverse population and strong sense of community. His family embraces typical
    middle‑class American values, emphasizing education, kindness, and participation in local events. While his cultural environment is primarily American, he is exposed to the multicultural flavor of the
    region through neighborhood festivals, community art programs, and school activities that celebrate a variety of traditions and artistic expressions.
