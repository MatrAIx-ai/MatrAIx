  career_goals: Martin aims to advance within the logistics field while preserving the stable routine he values. In the next few years he plans to obtain a Commercial Driver’s License (CDL) and pursue a
    certification in supply-chain management, positioning himself for a supervisory role such as route manager or fleet coordinator. He envisions overseeing a team of couriers, optimizing delivery networks
    for the company, and eventually using the experience to launch a small independent delivery service that serves local businesses in Simpson County. Alongside professional growth, he hopes to achieve
    financial stability sufficient to purchase a modest home in the Bowling Green area, allowing him to settle down and eventually support a family.
