personas:
  professional: Martin Capetillo, a 28‑year‑old courier in Bowling Green, leverages their methodical nature and knack for efficient route mapping—combining GPS analytics with paper maps—to consistently
    meet delivery windows, maintain a spotless driving record, and lay the groundwork for a future as a fleet coordinator.
  sports: Martin Capetillo fuels their fitness by pedaling a 10‑mile countryside loop each morning as a member of the Bowling Green Cycling Club, supports the Western Kentucky Hilltoppers during college
    basketball season, and roots for the Bowling Green Hot Rods in summer baseball, while reserving weekends for reservoir fishing at Barren River Lake.
  arts: Martin Capetillo finds creative balance by listening to bluegrass legends like Ricky Skaggs and folk storytellers such as The Avett Brothers while reading Ken Burns’ American History documentaries,
    and occasionally attends a performance at the Actors Theatre of Louisville, allowing their practical mind to unwind with melody and narrative.
  travel: Martin Capetillo plans trips with the same checklist used for deliveries, favoring budget‑friendly road drives that have already taken them to Barren River Lake for fishing and a weekend in Asheville,
    NC, while dreaming of a future itinerary that includes Yellowstone National Park and the historic streets of Edinburgh.
  culinary: Martin Capetillo enjoys cooking straightforward, hearty dishes like spicy tomato‑bean chili, rustic beef stew, and baked ziti, often incorporating fresh tomatoes, peppers, and beans from their
    garden and adding a dash of cayenne and basil, a skill level comfortable enough to feed friends without fuss.
  core: Martin Capetillo is a routine‑driven, reliability‑obsessed courier who channels their practical streak into daily bike rides, weekend fishing, and meticulous route planning, yet occasionally gets
    caught in a loop of over‑organizing even their social gatherings.
background:
  cultural: Martin was raised in a middle‑class, white family on the outskirts of Bowling Green, Kentucky. His upbringing was shaped by the region’s Southern values of hard work, self‑reliance, and community
    responsibility. He attended the local high school where he participated in the football team’s support staff and the Future Farmers of America club, reinforcing a practical, land‑oriented worldview.
    Regular attendance at a Baptist church fostered a sense of modesty and respect for tradition. Local customs such as weekend fishing trips, country‑music gatherings, and regional pride in Kentucky’s
    agricultural heritage have left an imprint on his lifestyle and attitudes. While his surname hints at Hispanic roots, his cultural identity aligns closely with the broader white, rural‑Southern culture
    of central Kentucky.
