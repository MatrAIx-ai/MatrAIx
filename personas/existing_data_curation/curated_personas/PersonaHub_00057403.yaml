persona_description: A world-renowned Indian architect, Charles Correa, who designed several landmark buildings in India, including a memorial to Mahatma Gandhi. He was awarded the Padma Vibhushan in 2006
  and the Royal Gold Medal from the Royal Institute of British Architects in 1984. Correa also left his mark abroad, building the Neuroscience Centre for the Massachusetts Institute of Technology and designing
  the Ismaili Centre in Toronto. His architecture was widely cherished and his innovative designs were inspired by the modernity of Indian architecture after 1947.
