  hobbies: '[''Photography'', ''Visiting art museums and galleries'', ''Hiking in Presque Isle State Park'', ''Board gaming'', ''Reading science-fiction'', ''DIY electronics projects'', ''Experimental cooking'',
    ''Attending live music concerts'', ''Learning graphic design'', ''Volunteer STEM tutoring'']'
  career_goals: Joseph aims to advance from his current supervisory role to a district or regional manager position within the next five years, leveraging data analytics to drive store performance. He plans
    to earn certifications such as Certified Retail Manager and PMP to solidify his operational expertise. Ultimately, he envisions leading a multi‑store operation where he can champion innovative visual
    merchandising strategies and integrate omnichannel retail experiences, and could someday launch his own boutique concept that blends technology with art‑focused retail.
