personas:
  professional: Emiliano Laguer is a full‑stack web developer and digital archivist who leverages a humanities graduate education to apply human‑centered design, leading agile product teams that turn cultural
    research into interactive data visualizations while mentoring underrepresented talent.
  sports: Emiliano Laguer is an avid hiker on the San Bernardino and Santa Ana mountain trails with the Riverside Trail Runners club, follows the Los Angeles Lakers and Los Angeles Dodgers for professional
    sports, and plays weekly chess at the Riverside Community Center, balancing outdoor endurance with strategic competition.
  arts: Emiliano Laguer blends artistic pursuits by playing classical guitar—interpreting traditional folk songs such as “La Llorona” and modern pieces by Mauro Giuliani—while capturing urban festivals
    with street photography inspired by Steve McCurry, and deepening their literary palate with Octavio Paz and Juan Rulfo, often attending live performances by the Los Riveras Folk Ensemble.
  travel: Emiliano Laguer favors culturally immersive trips, having explored Oaxaca’s culinary markets, trekked the cliffs of Yosemite, wandered the historic streets of Mexico City, and planned a future
    pilgrimage to Kyoto’s temples, typically crafting detailed itineraries but leaving room for spontaneous photo walks.
  culinary: Emiliano Laguer enjoys cooking family recipes like mole poblano and tamales de elote, often adding a splash of dark chocolate or roasted pumpkin seeds for a contemporary twist, and delights
    in sourcing chilies, cacao, and fresh corn at local farmers’ markets, demonstrating an intermediate skill level that merges tradition with experimentation.
  core: Emiliano Laguer balances relentless curiosity with pragmatic calm, weaving together code, guitar strings, mountain trails, and community mentorship into a uniquely disciplined yet flexible life
    rhythm.
background:
  cultural: Emiliano grew up in a bilingual Mexican‑American household where his parents instilled deep respect for Mexican traditions alongside a strong emphasis on education. Celebrations like Día de
    los Muertos, quinceañeras, and holiday feasts remain central to his family life. He maintains close ties to the local Mexican community in Riverside, participating in cultural festivals, supporting
    artisans, and attending events at the Mexican Cultural Center. His fluency in Spanish allows him to bridge cultural divides professionally, and his heritage informs his worldview with a communal ethic,
    love for storytelling, and resilience. He blends the family‑centric values of Mexican culture with his American upbringing, creating a hybrid identity that values hospitality, pragmatism, and calm perseverance.
