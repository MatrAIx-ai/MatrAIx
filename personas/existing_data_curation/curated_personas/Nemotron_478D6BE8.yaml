  hobbies: '[''Classical guitar playing (Mexican folk & contemporary)'', ''Cooking traditional Mexican cuisine'', ''Hiking in Southern California'', ''Street photography'', ''Reading Mexican literature
    and tech non-fiction'', ''Volunteer coding instructor for youth'', ''Chess'']'
  career_goals: Emiliano aims to become a director of digital innovation or product lead at an organization that prioritizes cultural inclusivity, ideally within the education or cultural‑heritage tech
    sector. He wants to spearhead projects that harness AI and data visualization to preserve Mexican cultural narratives, while mentoring emerging professionals from underrepresented backgrounds. In the
    long term, he envisions launching his own venture that merges technology with the humanities—such as a digital storytelling platform or community‑based archival tool—and becoming a recognized thought
    leader in digital humanities, contributing articles, speaking at conferences, and shaping inclusive design standards.
