persona_description: A researcher in the field of catalysis and materials science, focusing on the study of the water-gas shift reaction and the oxygen storage capacity of catalysts. This person is interested
  in understanding the effects of sulfur on the WGS activity of Pd/ceria catalysts, and the implications of these measurements for the understanding of oxygen-storage capacity of three-way catalysts. They
  are likely to be familiar with the concepts and methods used in steady-state rate measurements, pulse-reactor studies, and FTIR spectroscopy, and have experience with sulfur and cerium in the context
  of catalysis.
