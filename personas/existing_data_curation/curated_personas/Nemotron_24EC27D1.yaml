  career_goals: Alicemarie aims to move into a supervisory role within a property‑management or hospitality organization, where she can lead a team of housekeepers and design efficient cleaning protocols.
    She plans to obtain the IICRC Certified Professional Cleaner credential and a green‑cleaning certification to deepen her expertise and increase her marketability. In the longer term, she envisions launching
    her own residential cleaning service focused on sustainable practices, leveraging the leadership, scheduling, and client‑relationship skills she has cultivated. She also hopes to take evening courses
    in facilities management to broaden her career options.
