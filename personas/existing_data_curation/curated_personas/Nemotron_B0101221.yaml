  career_goals: Although retired, Kevin aims to leave a lasting personal legacy. He plans to complete a memoir that weaves together his life experiences with reflections on art and Philadelphia’s cultural
    evolution. He hopes to become a regular docent at the Philadelphia Museum of Art, sharing his love of art with small groups of visitors. Additionally, he aspires to curate a modest personal collection
    of local artists’ works and to mentor a few young adults interested in art history and community service.
