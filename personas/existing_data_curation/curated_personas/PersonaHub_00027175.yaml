persona_description: A historian who is interested in the history of pandemics and the role of science in responding to them. They are particularly fascinated by the Great Influenza of 1918, which killed
  over 600,000 Americans during World War I and is often referred to as "Spanish influenza." They are also interested in the impact of pandemics on society and the scientific community during that time,
  and how their work has shaped our understanding of the disease and its effects.
