personas:
  professional: Steven Ghani, a budding visual storyteller, merges a love for comic sketching, digital photo filter experiments, and spontaneous improv flair into a self‑run webcomic project that thrives
    on their talkative, attention‑seeking energy and knack for connecting with peers, and they often recruit friends for live brainstorming sessions.
  sports: Steven Ghani spends afternoons at the local skate park mastering new tricks, joins the school’s basketball team in the winter, follows the NBA’s Los Angeles Lakers, and enjoys cheering on the
    hometown minor‑league baseball club, they balance casual recreation with spontaneous bursts of competitive drive.
  arts: Steven Ghani, an avid sketcher of comic heroes, draws inspiration from Alex Ross’s realistic style, the storytelling of Stan Lee, the indie filmmaking of Noah Baumbach, and the lo‑fi beats of Tame
    Impala, they often channel that creative energy into acoustic guitar jam sessions and improv performances at drama club.
  travel: Steven Ghani loves spontaneous weekend road trips to nearby state parks, dreams of exploring Tokyo’s Akihabara district to hunt for manga and vintage guitar gear, and hopes to visit the historic
    film studios of New Zealand’s Wellington on a future school exchange, they eagerly plan each adventure around school breaks and limited budget.
  culinary: Steven Ghani favors bold flavors, often ordering spicy ramen with extra chashu, tacos al pastor with fresh cilantro, and homemade avocado toast topped with smoked salmon, their cooking skill
    hovers at the experimental level—able to whip up a decent grilled cheese but still relying on microwave meals for most school lunches, they relish trying new toppings whenever possible.
  core: Steven Ghani is a talkative, art‑obsessed teen who flips between sketching comic characters, shredding guitar riffs, and impulsively splurging on the next skate trick, all while juggling a chaotic
    schedule that leaves little room for deadlines, they often rely on friends to keep them on track.
background:
  cultural: Steven grew up in a middle‑class white family in Mansfield, a suburban town in Norfolk County, Massachusetts. His cultural experiences blend classic New England traditions—such as celebrating
    Thanksgiving with a large family gathering and attending town fairs—with the diverse media and artistic influences he encounters online. His family’s roots trace back to Irish and Anglo‑American ancestors,
    and he identifies with local community values of friendliness, academic curiosity, and active participation in communal events like high school sports games and seasonal festivals.
