  hobbies: '[''Watercolor painting'', ''Herb and vegetable gardening'', ''Hiking'', ''Bluegrass and folk music'', ''Collecting vintage kitchenware'', ''Reading culinary history'', ''Volunteering at community
    food drives'', ''Teaching cooking classes'']'
  career_goals: Rachel aspires to open a boutique farm‑to‑table restaurant that showcases Appalachian ingredients with a modern twist, and eventually publish a cookbook that weaves together recipes, local
    folklore, and her love of art. She hopes to mentor emerging chefs from the region, develop a culinary tourism program that highlights local farms and artisans, and earn a certified executive chef credential
    to deepen her professional expertise.
