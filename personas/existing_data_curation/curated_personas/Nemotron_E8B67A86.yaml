  career_goals: Gwendolyn aims to transition into a lead foreman or site supervisor role within the next two years, using her extensive experience to mentor younger workers and ensure smooth project execution.
    She plans to obtain a certification in construction management to broaden her supervisory responsibilities and eventually secure a part‑time consulting position that offers a predictable schedule as
    she approaches retirement.
