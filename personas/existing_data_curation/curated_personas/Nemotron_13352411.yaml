  career_goals: Herma envisions a future where she combines her love of science and art to become a science communicator and visual storyteller. She aims to attend a specialized STEM high school, win national
    science fairs and art competitions, and later earn a degree in biology or visual arts. Her ultimate ambition is to use illustrated research and multimedia projects to raise awareness about environmental
    issues and to inspire other young people, especially from underrepresented communities, to explore scientific inquiry through creative expression. She also hopes to start a community after‑school program
    that integrates art and science for local kids.
