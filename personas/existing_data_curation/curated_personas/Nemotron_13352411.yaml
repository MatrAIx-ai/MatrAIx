personas:
  professional: A budding visual storyteller, Herma Jean channels their curiosity and methodical planning into mixed‑media collages and digital illustrations, crafting sci‑fi comic strips while also prototyping
    simple Scratch games, and they consistently aim for top honors in school art competitions.
  sports: An enthusiastic young athlete, Herma Jean trains with the Riverdale Youth Soccer Club’s U12 Eagles, participates in after‑school basketball drills with the junior hoops squad, and treats chess
    tournaments as mental marathons, approaching each match with the same disciplined preparation they apply to art projects.
  arts: A passionate creator, Herma Jean draws inspiration from the fantastical worlds of Hayao Miyazaki, studies the bold line work of Jim Lee, and lets the smooth improvisations of Miles Davis flow through
    their sketchpad during late‑night illustration sessions.
  travel: A curious explorer, Herma Jean loves weekend leaf‑collecting trips to Redwood State Park, treasures school field trips to the Smithsonian National Air and Space Museum in Washington, D.C., and
    dreams of a future summer adventure in Kyoto to soak in Japanese manga culture and serene temple gardens.
  culinary: A playful palate, Herma Jean favors rainbow fruit skewers of strawberries, blueberries, and kiwi, whips up avocado toast seasoned with lime and chili flakes, and treats weekend pizza nights
    with extra cheese as essential fuel for marathon sketching sessions.
  core: Herma Jean is a methodical, curiosity‑driven 11‑year‑old who balances artistic ambition with competitive spirit, channeling their organized mind into vivid collages, strategic chess moves, and meticulously
    saved allowances, all while dancing between solo reflection and lively community gatherings.
background:
  cultural: Herma comes from a Black family rooted in the small town of Washington, North Carolina, where generations have cultivated a close‑knit community centered around church, family gatherings, and
    shared storytelling. Her grandparents taught her about the rich history of African‑American resilience in the South, celebrating milestones such as Juneteenth and participating in local Kwanzaa events.
    The family’s Sunday church services, gospel choir rehearsals, and soul‑food cooking traditions have instilled in her a strong sense of identity and community responsibility. Growing up, she was exposed
    to African‑American literature, music ranging from classic jazz to contemporary hip‑hop, and the works of artists like Jacob Lawrence, which fuel her appreciation for visual expression. Local community
    programs and the nearby East Carolina University’s outreach initiatives have reinforced the value of education and gave her role models who combine academic achievement with cultural pride. This cultural
    tapestry shapes her worldview, encouraging her to honor her heritage while pursuing her unique passions.
