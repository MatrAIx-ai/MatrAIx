personas:
  professional: Kevin Morales, a seasoned automotive mechanic turned aspiring handyman, leverages meticulous budgeting and project‑coordination skills to plan DIY home renovations while methodically preparing
    for a state handyman license and a modest neighborhood‑focused repair business, and they approach each client interaction with the same reliable, structured mindset.
  sports: Kevin Morales, who enjoys weekend fishing along the Intracoastal Waterway, participates in a local adult soccer league affiliated with the historic Fort Lauderdale Strikers, and they remain a
    loyal fan of the Miami Dolphins and the Miami Heat, balancing low‑impact cardio with occasional backyard workouts that they schedule with the same methodical precision they apply to home repairs.
  arts: Kevin Morales, a weekend chess enthusiast and classic‑film aficionado who curates a modest collection of vintage movie posters, regularly attends performances at the Broward Center for the Performing
    Arts, and they often take the initiative to organize group outings to shows, balancing their moderate talkativeness with a reliable, cooperative demeanor.
  travel: Kevin Morales, who prefers well‑planned, budget‑conscious road trips to nearby coastal gems like the Florida Keys and Savannah, enjoys occasional family cruises to Caribbean destinations such
    as the Cayman Islands, and they dream of exploring European fishing villages in Portugal, always balancing itinerary detail with spontaneous stops for local seafood.
  culinary: Kevin Morales, a self‑taught home cook who favors grilled grouper marinated in lime and garlic, fresh garden tomatoes tossed in basil pesto, and occasional Cuban sandwiches with pickles and
    mustard, often plans weekly menus with spreadsheet precision, and they relish the coastal flavors that reflect their local lifestyle.
  core: Kevin Morales, a methodical handyman‑in‑training who balances a love for fishing, chess, and vintage films with disciplined budgeting, occasionally forgets to floss but never misses a neighborhood
    clean‑up, and they approach life with a steady, self‑reliant optimism.
background:
  cultural: Kevin is a white American of mixed European descent, raised in the southeastern United States. Growing up in a modest, middle-class family, he internalized values of hard work, self-reliance,
    and community service. Living in Fort Lauderdale, he has absorbed the laid-back, coastal lifestyle of South Florida, which blends a love for outdoor activities with a culturally diverse setting. He
    respects the local traditions of neighborhood gatherings, boat culture, and the seasonally vibrant multicultural festivals that characterize Broward County.
