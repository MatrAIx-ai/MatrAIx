  career_goals: Jason dreams of a future that blends his love for nature with his knack for making things work. He envisions becoming an environmental engineer or a wildlife‑conservation technician, designing
    low‑impact infrastructure for the forests surrounding Montague. He is also intrigued by community robotics projects that could help local farms automate irrigation. In the short term, he aims to master
    a new Scratch module, earn a gardening certification through the 4‑H club, and attend a technology‑focused high school, paving the way for a community‑college degree in sustainable engineering. While
    he often worries about his ability to succeed, he sets concrete milestones to build confidence and turn his practical curiosity into a meaningful career.
