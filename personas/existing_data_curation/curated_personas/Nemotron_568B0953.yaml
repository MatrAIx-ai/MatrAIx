personas:
  professional: Jason Sales, a budding middle‑school robotics enthusiast, blends his curiosity for new tech with a practical focus on reliable sensor design, and they consistently organize project plans
    while leaving room for spontaneous tinkering.
  sports: Jason Sales, an outdoor‑oriented teen, hikes Siskiyou County trails each summer, plays forward for the Redwood Valley Youth Soccer Club, follows the San Francisco Giants and Golden State Warriors,
    and treats weekend fishing on the Klamath River as low‑key fitness while they occasionally skip practice when school stress builds.
  arts: 'Jason Sales, a creative sketcher, drafts weekly comic strips inspired by garden chores and robotics mishaps, reads fantasy novels by Brandon Sanderson, practices acoustic guitar with a habit of
    strumming John Mayer tunes after school, and binge‑watches Avatar: The Last Airbender for storytelling inspiration, while they balance imagination with a practical desire to improve skill.'
  travel: Jason Sales, who prefers road‑trip adventures, has camped at Mount Shasta, explored Crater Lake, dreams of rainforest hikes in Costa Rica and the historic streets of Kyoto, and plans each outing
    by mixing spontaneous stops at quirky roadside attractions with careful budgeting to stay within their allowance, though they sometimes over‑pack due to anxiety.
  culinary: Jason Sales, a budding home cook, helps in the family garden and enjoys preparing fresh tomato‑basil pasta, grilled salmon tacos with lime, and perfecting chocolate chip cookies, yet they often
    add too much salt when excited and rely on late‑night snack runs for quick energy.
  core: Jason Sales balances a curious engineering mind, cautious budgeting, occasional anxiety, and a love for outdoor adventure while they juggle school, robotics, and creative comic art.
background:
  cultural: 'Jason grew up in Montague, a small, closely connected community in rural Siskiyou County, Northern California. The town’s culture values a deep appreciation for the surrounding natural landscape—forests,
    rivers, and open fields—paired with a practical, self‑reliant ethos rooted in generations of farming and small‑business families. Family gatherings often feature locally sourced produce, and community
    events such as county fairs, 4‑H projects, and volunteer clean‑up days are regular fixtures. As a 13‑year‑old white American in Generation Z, Jason is also shaped by broader digital culture: social
    media, online gaming, and streaming platforms influence his interests, while his school emphasizes collaborative learning and environmental stewardship. His upbringing underscores cooperation, humility,
    and respect for others’ needs, aligning with his personal disposition toward harmony. The rural setting offers limited but growing exposure to cultural diversity, encouraging curiosity about other perspectives
    while keeping him grounded in his community’s pragmatic way of life.'
