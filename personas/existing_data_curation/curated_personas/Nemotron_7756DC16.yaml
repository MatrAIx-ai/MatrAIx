personas:
  professional: Dong Guo is a retail sales associate with polished, empathetic communication and a sharp visual aesthetic; they transform seasonal merchandise into store displays that subtly echo family
    traditions while driving sales, and they are strategically pursuing a visual merchandising manager role within three years by building a certification and a robust design portfolio.
  sports: Dong Guo follows the Boston Red Sox and Boston Celtics, plays forward for the Lynn United FC community soccer league, hikes the Cape Ann coastal trail each weekend for cardio, and balances their
    routine with occasional strength training at the local YMCA, embodying a flexible but consistent approach to fitness.
  arts: Dong Guo is a watercolor enthusiast who paints New England seascapes in the style of Winslow Homer, creates digital illustrations inspired by contemporary artists like Loish and the dynamic line
    work of Kim Jung Gi, practices calligraphy while listening to Miles Davis and lo‑fi streams from ChilledCow, regularly attends performances at the Boston Playwrights' Theatre, and joins board‑game meetups
    to play Settlers of Catan and Terraforming Mars.
  travel: Dong Guo has explored New England’s coastal towns such as Provincetown, trekked the rugged cliffs of Acadia National Park, spent a week wandering Kyoto’s historic districts, and hiked Iceland’s
    Golden Circle, preferring meticulously planned itineraries that still allow spontaneous sketching stops; they dream of sailing the Mediterranean’s Sicilian coast and sipping coffee in the French Riviera
    while balancing travel costs against a savings plan for their future boutique.
  culinary: Dong Guo is an experimental home cook who blends traditional dumpling fillings of pork, shiitake, and chives with New England lobster, crafts miso‑infused clam chowder, perfects mooncakes flavored
    with matcha and red bean paste, and employs a moderate skill set that includes sous‑vide techniques and artistic plating inspired by calligraphy, regularly sourcing fresh ginger, scallops, and herbs
    from the local farmer’s market.
  core: Dong Guo is a 34‑year‑old visual storytelling enthusiast who balances meticulous retail expertise with a vivid imagination, channeling family traditions into art, food, and community while navigating
    a modest budget, health quirks, and an ever‑curious mind.
background:
  cultural: Dong Guo is a second‑generation Chinese‑American whose family maintains a blend of traditional East Asian customs and contemporary American life. Raised in a multicultural home in the Greater
    Boston area, he celebrates Lunar New Year with family gatherings, enjoys traditional dishes like dumplings and mooncakes, and grew up speaking Mandarin at home while attending English‑language schools.
    Living in Lynn, MA—an ethnically diverse city—has exposed him to a mosaic of cultures, fostering his appreciation for artistic expression and community harmony. He often volunteers at local cultural
    festivals, helping to organize art displays that highlight Asian heritage within the broader New England context.
attributes:
