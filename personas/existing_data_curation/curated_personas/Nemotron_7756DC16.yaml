    problem solving'', ''Event planning for store promotions'']'
  hobbies: '[''Watercolor painting'', ''Digital illustration'', ''Fusion cooking (Chinese‑New England cuisine)'', ''Visiting art galleries and museums'', ''Community theater attendance'', ''Hiking coastal
    trails'', ''Reading speculative fiction'', ''Writing short stories'', ''Calligraphy practice'', ''Jazz and lo‑fi music listening'', ''Journaling'', ''Board game meetups'']'
  career_goals: Dong aims to transition from a frontline retail salesperson to a visual merchandising manager within the next three years, leveraging his artistic sensibility to shape brand experiences
    across multiple locations. He envisions eventually opening a boutique that fuses contemporary fashion with curated Asian-inspired home décor, offering workshops in calligraphy and digital illustration.
    Alongside his professional advancement, he plans to complete a certification in retail visual merchandising and expand his portfolio of design projects to attract collaborations with larger retail chains.
