personas:
  professional: Matilde Romero is an aspiring comic book artist who merges curiosity with practicality by sketching original characters during school breaks, channeling their spontaneous imagination into
    structured storyboards, and dedicates weekends to volunteering at the community center, where they guide younger kids through arts‑and‑crafts projects while balancing a gentle perfectionism with occasional
    deadline anxiety.
  sports: Matilde Romero enjoys casual soccer matches with the Red Rangers youth league, cheers for the Harbor Hawks baseball team on weekends, and spends free afternoons exploring the nearby parks where
    they collect leaves and stones for artistic inspiration, preferring unstructured play over regimented training.
  arts: Matilde Romero draws inspiration from reggaeton star Bad Bunny and salsa legend Marc Anthony, infuses the rhythmic energy into vibrant comic panels influenced by Stan Lee and Alex Ross, and regularly
    leads arts‑and‑crafts workshops for younger children at the community center, showcasing their kind and cooperative nature.
  travel: Matilde Romero dreams of traveling to a lively Caribbean island capital to soak up its music festivals and to the misty Redwood National Park for its towering trees, plans trips spontaneously
    with a sketchbook in hand, yet worries about missing school assignments and budget constraints.
  culinary: Matilde Romero helps their mother simmer arroz con pollo with fragrant sofrito, loves sprinkling fresh cilantro and crispy plantain chips on the dish, experiments with mango salsa for a sweet
    twist, and is still mastering the art of chopping vegetables without cutting themselves.
  core: Matilde Romero is a curious, spontaneous twelve‑year‑old who blends comic‑book storytelling with rhythmic beats, worries over tiny details, and flips between art projects, video games, and the next
    snack.
background:
  cultural: Matilde is a fourth‑generation Puerto Rican American raised in East Orange, New Jersey. She grew up in a bilingual household where Spanish is spoken daily, and she participates in cultural traditions
    such as celebrating Three Kings Day, preparing family recipes like mofongo and arroz con gandules, and attending community festivals that showcase Latin music, dance, and art. The close‑knit extended
    family network, rooted in Catholic values and a strong sense of community, emphasizes mutual support, respect for elders, and pride in heritage. These influences shape her identity, her love for music
    and food, and her desire to give back to her neighborhood.
