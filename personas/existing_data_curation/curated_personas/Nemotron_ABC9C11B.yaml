  career_goals: Matilde aspires to become a veterinarian, combining her love for animals with her practical interest in science and caring for others. She hopes to attend a high school with strong STEM
    programs, followed by a college pre‑veterinary track. In the long term, she dreams of opening a community animal clinic that offers affordable care and education for pet owners in East Orange. She also
    envisions using her artistic skills to create educational materials about animal health.
