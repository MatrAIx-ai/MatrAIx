    User 2: I understand. Well, at least you can watch me surf.

    User 1: That''s true. I''ll enjoy that.

    User 2: Great. So, what do you do for a living?

    User 1: I''m an actor. I''ve been acting since I was 10 years old.

    User 2: That''s awesome! Do you enjoy it?

    User 1: I love it! It''s my passion.

    User 2: That''s great. I''m glad you found something you love to do.

    User 1: Thanks. I''m glad too.

    User 2: So, what''s your favorite thing about acting?

    User 1: I love the challenge of it. It''s always exciting to learn a new role and bring a character to life.

    User 2: That sounds really fun. I can imagine it''s a lot of hard work, but it must be rewarding too.

    User 1: It is. It''s a lot of fun to be able to tell stories and create characters.

    User 2: That''s great. I''m glad you enjoy your job.

    User 1: Thanks. I do.'
