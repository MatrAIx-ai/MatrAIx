personas:
  professional: Mercedes Ritta is an emerging community organizer who blends curiosity with practicality by leading neighborhood clean‑up projects while dreaming of designing eco‑friendly playgrounds, and
    they balance their organized planning with the flexibility of spontaneous LEGO collaborations.
  sports: Mercedes Ritta plays forward for the Riverdale United U12 soccer team, emulating Megan Rapinoe’s assertiveness on the field, and they spend weekends hiking the Pine Ridge Trail with family while
    also participating in organized sprint drills at school, illustrating a blend of team spirit and personal endurance.
  arts: Mercedes Ritta practices piano with a focus on Beethoven’s Moonlight Sonata and pop hits by Billie Eilish, contributes lively insights to the school book club during discussions of "Harry Potter
    and the Sorcerer’s Stone," and builds intricate LEGO replicas of famous artworks such as the Mona Lisa, showcasing a multifaceted creative expression.
  travel: Mercedes Ritta’s travel dreams include annual family hikes in the Great Smoky Mountains, a weekend cultural excursion to Washington, D.C.’s Smithsonian museums, and a future trip to Kyoto, Japan
    to admire cherry blossoms and historic temples, reflecting a love for both nature and cultural enrichment.
  culinary: Mercedes Ritta enjoys cooking spaghetti carbonara with perfectly al dente pasta and fluffy banana pancakes for breakfast, often assisting in the kitchen to perfect the sauce’s creamy texture,
    while they sometimes indulge in sugary cereal straight from the box during late‑night LEGO sessions, highlighting a blend of culinary curiosity and a sweet‑tooth habit.
  core: Mercedes Ritta is a sociable, curiosity‑driven twelve‑year‑old who leads community clean‑ups, excels at soccer and piano, builds detailed LEGO models, and balances disciplined saving with occasional
    sweet indulgences, all while navigating mild allergies and a tendency to forget flossing.
background:
  cultural: Mercedes grew up in Rochester, New Hampshire, a small New England town with a predominantly white, middle‑class demographic. Her family values self‑reliance, community involvement, and appreciation
    of the region’s seasonal changes—from summer fairs to snowy winter sports. Local traditions such as town festivals, school celebrations of national holidays, and a strong emphasis on outdoor recreation
    have shaped her outlook, blending regional New England modesty with an openness to new ideas.
