  career_goals: Mercedes dreams of a future where she can combine her curiosity for how things work with her love for the outdoors. She aspires to become an environmental engineer or wildlife biologist,
    hoping to design sustainable solutions for her community. In the short term she plans to join her middle school’s science club, earn a leadership role on her soccer team, and explore mentorship opportunities
    that will build her technical and teamwork abilities.
