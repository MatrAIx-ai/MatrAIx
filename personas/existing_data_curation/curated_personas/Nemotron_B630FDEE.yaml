    stakeout coordination'', ''pattern analysis and investigative research'', ''handgun proficiency and self-defense'', ''mentor junior officers'']'
  hobbies: '[''playing dominoes'', ''pickup basketball'', ''dancing bachata and merengue'', ''cooking Dominican cuisine'', ''reading crime fiction'', ''street photography'', ''volunteering for community
    safety workshops'', ''listening to Latin music'']'
  career_goals: Jose aims to transition into a senior advisory role within the NYPD where he can mentor junior detectives and shape training programs focused on cultural competency and community policing.
    He plans to earn his GED and pursue a forensic science certification to deepen his technical expertise. Over the next few years he hopes to lead a special unit targeting transnational organized crime
    affecting the Dominican diaspora in the Bronx, and eventually to open a boutique private‑investigative firm that offers culturally sensitive services to local residents.
