personas:
  professional: Constance Cunningham, a veteran elementary and middle school teacher with over four decades of classroom experience, blends meticulous curriculum development and differentiated instruction
    with a love for visual and performing arts, and they mentor new educators while spearheading community arts initiatives, balancing careful planning with spontaneous creativity.
  sports: Constance Cunningham follows the Detroit Lions, Red Wings, and Tigers with fervor, incorporates daily riverside walks and low‑impact aqua‑aerobics at the Grosse Ile community pool into their routine,
    and participates in a senior tennis league at the local recreation center.
  arts: Constance Cunningham immerses themselves in the arts by painting watercolors inspired by Monet and O’Keeffe, attending Detroit Institute of Arts exhibitions featuring Diego Rivera, and humming to
    classic Motown hits of Stevie Wonder and Aretha Franklin while they play the djembe at community gatherings.
  travel: Constance Cunningham prefers leisurely road trips to Michigan’s Mackinac Island and annual train journeys to Kyoto, Japan, while they also plan cultural dives into New Orleans’ jazz scene and
    weekend retreats to Ann Arbor’s art festivals, balancing travel with a modest retirement budget and occasional family commitments.
  culinary: Constance Cunningham experiments in the kitchen by blending Southern collard greens with Detroit‑style smoked paprika, crafting shrimp and grits with fresh basil from their garden, and perfecting
    a soulful gumbo‑inspired pizza, all while they maintain solid basic cooking techniques and a penchant for sourcing locally‑grown produce.
  core: Constance Cunningham is a curiously organized creative who balances meticulous lesson planning with spontaneous watercolor sessions, loves jazz, and occasionally loses a paint brush in their garden.
background:
  cultural: Constance’s cultural identity is rooted in the African‑American experience of the Great Migration. Her parents moved from the Deep South to Detroit in the 1950s, seeking industrial jobs and
    educational opportunities. Growing up in a close‑knit neighborhood, she was immersed in the traditions of the Black church, gospel music, and oral storytelling, which cultivated her love for community
    and narrative arts. The civil‑rights movement of the 1960s shaped her sense of social responsibility and reinforced the value of education as a tool for empowerment. As an adult, she has maintained
    strong ties to Detroit’s rich cultural scene—frequenting jazz clubs, supporting local Black artists, and participating in annual Juneteenth celebrations. Living in Grosse Ile, she blends her Midwestern
    upbringing with her heritage, often sharing African‑American culinary recipes during neighborhood potlucks and advocating for culturally responsive curricula that honor the histories and contributions
    of Black Michiganders. Her marriage to a retired engineer further expands her cultural perspective, combining a shared appreciation for lifelong learning and community service.
attributes:
