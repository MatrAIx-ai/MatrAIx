  hobbies: '[''Watercolor painting'', ''Visiting art museums'', ''Book club (historical fiction & African-American literature)'', ''Cooking and culinary experimentation'', ''Gardening (heirloom vegetables)'',
    ''Storytelling for children'', ''Jazz and Motown music appreciation'', ''Playing djembe'', ''Community volunteer work'']'
  career_goals: Constance envisions extending her impact beyond the classroom as she approaches retirement. She aims to become a mentor teacher and curriculum specialist within her district, guiding younger
    educators in implementing culturally responsive and arts‑rich lesson plans. She hopes to spearhead a community‑wide arts initiative that partners the Grosse Ile public schools with local museums and
    cultural institutions, creating after‑school workshops for students of all ages. Constance also aspires to author a practical guidebook on integrating visual arts into elementary literacy instruction,
    drawing on her decades of classroom experience and research on student creativity. While she plans to reduce her teaching load, she remains committed to occasional substitute teaching and volunteering
    as a reading mentor at the local senior center, believing that lifelong learning should be a shared community value.
