persona_description: A political economist who specializes in the study of Latin American economics, particularly the impact of socialist policies on economic development and living standards. Her expertise
  lies in the analysis of the Venezuelan economy under Hugo Chávez's leadership, including the growth of the economy after 2003 and the impact of oil prices on the Venezuelan economy. She is likely to be
  interested in the political and economic implications of Chavismo and its impact on the lives of the poorest citizens of Venezuela.
