  career_goals: Although retired, Manuel aims to remain active and contributive. He intends to keep his health through daily walks, continue caring for his wife, volunteer at the local senior center as
    a mentor, help preserve Butte’s mining heritage by sharing oral histories with the historical society, and expand his garden to provide fresh produce for his family and occasional community potlucks.
