personas:
  professional: Manuel Salmonson, a retired but still active former mine‑support craftsman, leverages their carpentry, small‑engine repair, and gardening expertise to mentor seniors at the local center
    while preserving Butte’s mining heritage through oral histories for the historical society.
  sports: Manuel Salmonson enjoys early morning walks along the Clark Fork River, regularly fishes for trout with the local angling club, and follows the Montana Grizzlies football team while cheering for
    the Butte Copper Kings minor‑league baseball squad on summer evenings.
  arts: Manuel Salmonson immerses themselves in classic western films starring John Wayne and Clint Eastwood, reads mining‑history books by authors such as James Cohen, and solves crossword puzzles that
    feature clues about folk legends like Woody Guthrie.
  travel: Manuel Salmonson prefers low‑key road trips to scenic destinations such as Yellowstone and Glacier National Parks, often staying in cabin rentals near the Great Divide during summer months while
    limiting travel in winter due to health considerations and budget constraints.
  culinary: Manuel Salmonson delights in preparing garden‑fresh vegetable stew with carrots, potatoes, and beans, grilling self‑caught trout seasoned with rosemary, and baking simple cornbread, though they
    sometimes forget to add enough salt and resort to canned soups for quick meals.
  core: Manuel Salmonson, a routine‑loving 65‑year‑old gardener‑carpenter, blends solitary craftsmanship with gentle community mentorship while faithfully preserving local mining heritage.
background:
  cultural: Manuel is a white American with ancestry that traces back to German and Scandinavian immigrants who settled in the Pacific Northwest in the early 1900s. Raised in Butte, Montana, he grew up
    amid a strong mining and working‑class culture that emphasized practicality, self‑reliance, modesty, and community solidarity. He maintains traditions from his Protestant (Methodist) upbringing, valuing
    modest living, service to neighbors, and a deep respect for the natural landscape of the region.
