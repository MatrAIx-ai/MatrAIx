  career_goals: Nancy aims to maintain an active role in construction by completing an OSHA 10‑hour certification and formally transitioning into a mentorship and safety‑coach position for younger workers
    at her company. She hopes to lead a small team focused on preserving and restoring historic homes in Batavia, blending her practical experience with a curiosity for heritage building techniques. Over
    the next few years, she also wishes to secure a reliable part‑time schedule that allows her to spend more time with her grandchildren while continuing to contribute her expertise to local community
    projects. Ultimately, she aspires to leave a legacy of skilled craftsmanship and a safe, collaborative work culture within the local construction community.
