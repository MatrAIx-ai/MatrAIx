persona_description: A political leader who is known for his strong advocacy of a strong federal government and his efforts to stimulate the economy through protective tariffs, transportation improvements,
  and a national bank. He also spoke against annexing Texas and going to war with Mexico, but he held that no law was needed to prevent the further extension of slavery. He is a leading proponent of the
  Constitution and has been a defender of it against nullification. He is an orator with great eloquence and influenced the development of constitutional law through his arguments in significant cases.
  He was a member of the Whig party and was considered a rival to Henry Clay and John C. Calhoun in the 'great triumvirate' but never obtained the party's presidential nomination. Despite his wealth, he
  remained constantly in debt as a result of high living, unfortunate land speculations, and expenses as a gentleman farmer. He was identified with the Boston aristocracy but came from a plain New Hampshire
  farm background.
