    Agriculture", "Playing Basketball with Friends"]'
  career_goals: Tanika aims to pursue a career that blends her love of science with her drive to help others. In the short term, she plans to complete her high school diploma, secure a scholarship, and
    gain experience through internships at local hospitals or research labs. Her long‑term goal is to become a biomedical researcher or public health professional focused on improving healthcare access
    for underserved communities in the South. She also hopes to mentor younger students in her hometown, promoting STEM education and community involvement.
