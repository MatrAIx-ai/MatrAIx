personas:
  professional: Tanika Bannerman is a budding biomedical researcher‑in‑training, excelling in high‑school math and science while using their methodical planning, reliable organization, and compassionate
    leadership to run science club experiments and mentor peers toward community‑focused health projects.
  sports: Tanika Bannerman plays pickup basketball at the community center, follows the NBA’s Atlanta Hawks and the local high‑school varsity team, enjoys weekend runs in the city park, and maintains a
    disciplined fitness routine that balances cardio with strength training to stay energized for school and volunteer work.
  arts: Tanika Bannerman immerses themselves in gospel music—singing in the church choir, playing keyboard at community events, and listening to Kirk Franklin—while also devouring contemporary YA novels
    like Angie Thomas’s ‘The Hate U Give,’ attending local theater productions, and curating Instagram reels that showcase neighborhood talent.
  travel: Tanika Bannerman prefers short, budget‑friendly road trips, having explored the Great Smoky Mountains and historic Charleston, while dreaming of a summer volunteer program in Ghana to study public
    health challenges, balancing travel excitement with school commitments and family expectations.
  culinary: Tanika Bannerman enjoys cooking comfort dishes such as spicy jambalaya with chicken, shrimp, andouille sausage, sweet potato pie, and collard greens seasoned with smoked paprika and garlic,
    experimenting in the kitchen at an intermediate skill level and often sharing meals at community potlucks.
  core: Tanika Bannerman is a socially‑charged science enthusiast who balances meticulous planning with a love for gospel music, community block parties, and the occasional impulse purchase of the latest
    sneaker release.
background:
  cultural: Tanika was raised in a close‑knit African‑American family in High Point, North Carolina. Her upbringing reflects Southern black cultural traditions, including frequent church attendance, gospel
    music, soul‑food family gatherings, and storytelling. Community service and mentorship are integral parts of her heritage, with involvement in church‑sponsored outreach programs and local festivals
    celebrating African‑American history. These cultural influences shape her compassionate outlook, strong sense of community, and ambition to give back to her neighborhood.
