personas:
  professional: Donya Mills is a seasoned painter‑contractor in Salisbury who excels at surface preparation, drywall repair, estimating, and project scheduling, delivering environmentally friendly finishes
    while blending a curious eye for historic‑home restoration techniques with the practical safety discipline required for lead‑safe certification, all communicated through courteous, reliable interactions
    with clients and crew, and they consistently mentor apprentices with a cooperative spirit.
  sports: Donya Mills stays active by walking her vegetable garden paths, joining the Salisbury Senior Walking Club for weekend cardio, cheering on the Baltimore Orioles in baseball and the Ravens in football,
    and occasionally playing casual basketball at the community center during summer evenings, balancing low‑impact exercise with seasonal outdoor activities, and they enjoy the rhythm of these routines
    as a quiet counterpoint to their workday.
  arts: Donya Mills nurtures her creative side through watercolor landscapes inspired by Monet and Winslow Homer, contributes her soulful voice to the local gospel choir performing classics by Mahalia Jackson
    and Aretha Franklin, and volunteers at the community center where she teaches youth basic painting techniques while referencing the works of Georgia O'Keeffe, and they find these artistic outlets a
    soothing balance to the physical demands of their trade.
  travel: Donya Mills prefers short, purposeful road trips that combine history and nature, such as weekend drives to the Blue Ridge Mountains for hiking, annual visits to Charleston’s historic district,
    and a dream itinerary to Savannah to study its preserved antebellum homes, favoring flexible planning that fits around her contracting schedule and family commitments, and they often pack a sketchbook
    to capture scenes along the way.
  culinary: Donya Mills delights in Southern soul food, expertly preparing collard greens simmered with smoked turkey, fried catfish seasoned with cornmeal and fresh garden herbs like thyme and basil, and
    sweet potato pie, but often leaves dishes on the stove while fielding client calls, showcasing both culinary skill and a tendency to be distracted by work, and they always save leftovers for a quick
    garden‑fresh lunch.
  core: Donya Mills blends a meticulous painter’s professionalism with a quiet love for gardening, watercolor art, and soulful gospel, juggling lead‑safe certification studies and occasional back‑pain flare‑ups,
    while sometimes letting a half‑baked cornbread or a postponed doctor’s visit slip through their otherwise organized routine.
background:
  cultural: Donya grew up in a close‑knit African‑American community in the Piedmont region of North Carolina, where church, family gatherings, and storytelling were central. Her heritage blends Southern
    traditions—such as soulful cooking, gospel music, and a strong sense of communal support—with a modern appreciation for Black art and history. She draws on this cultural foundation for both her work
    ethic and her creative pursuits, honoring the legacy of her ancestors while navigating life in contemporary Salisbury.
attributes:
  skills: '[''Interior painting'', ''Exterior painting'', ''Wallpaper installation'', ''Surface preparation'', ''Drywall repair'', ''Color consulting'', ''Project estimating'', ''Customer communication'',
    ''Safety compliance'', ''Time management'', ''Team collaboration'']'
  hobbies: '[''Gardening'', ''Watercolor painting'', ''Cooking Southern soul food'', ''Gospel choir singing'', ''Reading historical fiction'', ''Volunteer teaching'']'
  career_goals: Donya aims to earn a certified lead‑safe painter credential and to expand her services into historic‑home restoration, a niche in Salisbury’s older neighborhoods. Over the next five years
    she plans to launch her own modest contracting outfit, hire and mentor at least two apprentices—preferably women of color—and build a reputation for environmentally friendly finishes. She also hopes
    to achieve a stable income that supports her family while giving her flexibility to balance work and home life.
