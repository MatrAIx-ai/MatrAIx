  career_goals: Looking ahead, Mary aspires to move into a supervisory role within the casino’s security department, such as Shift Lead or Security Manager, where she can shape standard operating procedures
    and oversee training programs. She plans to obtain the Certified Protection Officer (CPO) credential to formalize her expertise and enhance her credibility. While she values career advancement, she
    also aims to negotiate a more predictable schedule to reduce stress and create space for personal pursuits. In the longer term, Mary envisions transitioning to part‑time consulting for small businesses
    in the Fairfield County area, offering risk‑assessment services and leveraging her surveillance background to help local venues improve safety without requiring a full‑time security staff.
