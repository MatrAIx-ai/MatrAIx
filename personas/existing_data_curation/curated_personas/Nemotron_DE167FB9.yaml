personas:
  professional: Jason Owen, a retired elementary school teacher turned community education advocate, leverages his three decades of curriculum design, charismatic public speaking, and meticulous lesson
    planning to champion hands‑on digital literacy projects on the local school board, while his competitive edge pushes him to out‑shine fellow board members and his skeptical nature drives rigorous scrutiny
    of new initiatives.
  sports: Jason Owen, an avid fisherman who casts at Lake Barron before sunrise and a birdwatcher who logs sightings on a handheld app, stays fit by strolling the historic downtown paths, cheers for the
    Green Bay Packers and Milwaukee Brewers, and joins the Barron County Senior Softball League for a light‑hearted game each summer.
  arts: Jason Owen, a lifelong thespian who both acts in and stage‑manages productions of classics like 'Our Town' and 'The Crucible', draws inspiration from playwrights such as Arthur Miller, enjoys the
    folk‑rock stylings of the Avett Brothers and the storytelling of Bob Dylan, and unwinds watching classic films starring Meryl Streep and Denzel Washington.
  travel: Jason Owen, a meticulous planner who maps weekend road trips on a paper atlas, delights in exploring the Upper Peninsula of Michigan, the historic streets of Boston, and genealogical archives
    in Dublin, while his modest pension limits vacations to scenic drives to Door County, Wisconsin, and occasional discount cruises to Alaska when a promotional deal appears.
  culinary: Jason Owen, a garden‑to‑table enthusiast who whips up beet‑and‑goat‑cheese salads, pan‑seared trout with fresh dill, and a signature apple‑cinnamon pie using heirloom apples from his backyard,
    experiments with home‑brewed lager infused with Wisconsin hops, and occasionally treats himself to a flambéed banana foster at the local diner.
  core: Jason Owen, a talkative 71‑year‑old retired teacher who channels his curiosity into model trains and community theater while competitively guarding his opinions, often overcommits to projects and
    occasionally forgets to take his blood pressure medication.
background:
  cultural: Jason grew up in a small rural town in Wisconsin, raised in a family of German-Scandinavian heritage that valued hard work, modesty and community service. He attended a local public school and
    later earned his degree in education at a state university. The Midwestern emphasis on neighborliness, self-reliance and volunteerism shaped his life, as did the region's strong traditions of outdoor
    recreation, local festivals (especially the county fair), and Lutheran church involvement. These cultural influences are evident in his commitment to local schools, his love of nature, and his enthusiasm
    for community gatherings.
