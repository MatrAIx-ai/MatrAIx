  hobbies: '[''Gardening'', ''Home cooking'', ''Senior center dance classes'', ''Music groups'', ''Book club'', ''Knitting'', ''Waterfront walking'', ''Crossword puzzles'', ''Bridge'', ''Library volunteering'']'
  career_goals: Jessica aims to deepen her involvement in community service by leading a structured volunteer program for senior wellness, expanding the neighborhood garden into a community plot, and establishing
    a peer‑support group that addresses stress and caregiving challenges among older adults. She also wishes to maintain her health through regular walks, continue learning new technologies to stay connected
    with family, and mentor younger volunteers in practical skills and stress‑management techniques.
