  career_goals: Jacqueline aims to leave a lasting legacy through mentorship and community empowerment. She plans to establish an annual scholarship for minority women pursuing business degrees at a local
    university, continue leading the senior center's volunteer committee, and develop a series of free financial literacy workshops for seniors. She also hopes to stay physically active, travel to family
    reunions across the South, and write a memoir documenting her family's history and the African‑American experience in Houston.
