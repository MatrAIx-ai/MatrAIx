personas:
  professional: Lena Young, a 28‑year‑old nail technician with a graduate STEM background, they blend precise chemical safety expertise with artistic digital illustration to deliver meticulously hygienic,
    custom nail designs while running a tightly organized salon operation.
  sports: Lena Young, an avid runner and cyclist, they spend Saturday mornings on Boston’s waterfront trails, support the Boston Red Sox and Boston Celtics, and combine cardio workouts with weekly yoga
    sessions to balance endurance and flexibility.
  arts: Lena Young, a digital illustrator, they draw inspiration from classic sci‑fi covers, create bespoke nail art featuring bold geometric patterns and heritage motifs, and attend live jazz nights at
    the Boston Jazz Club to unwind after a busy workweek.
  travel: Lena Young, a weekend explorer, they plan short getaways using a mix of spontaneous rides on Amtrak to New York City and meticulously scheduled road trips to Cape Cod, favoring destinations that
    offer coastal scenery, sketching opportunities, and occasional jazz scenes, while dreaming of a future trip to Tokyo to soak in manga art culture.
  culinary: Lena Young, a home cook, they perfect classic soul‑food dishes like collard greens, cornbread, and smoked catfish, experiment with spice blends in their kitchen, and enjoy pairing meals with
    a glass of sweet tea or a craft brew after a day at the salon.
  core: Lena Young, a detail‑driven nail artist with a STEM edge, they balance meticulous salon work, eco‑conscious entrepreneurship, and a love for sci‑fi, jazz, and waterfront runs while constantly wrestling
    with a habit of over‑planning and occasional stress‑induced coffee binges.
background:
  cultural: Lena is an African‑American woman whose family traces its roots to the Southern United States, with grandparents who migrated north during the Great Migration. Growing up in the culturally diverse
    South Boston neighborhood, she was exposed to a blend of Black church traditions, community gatherings, and the vibrant arts scene of the city. Her cultural identity is expressed through the colors
    and patterns she incorporates into nail designs, often drawing inspiration from African textiles and Black‑American artistry. She actively participates in local Juneteenth celebrations, Black History
    Month events, and supports Black‑owned businesses, while also valuing the collaborative spirit and resilience that have shaped her community.
attributes:
  skills: '[''Nail art design'', ''Precision cuticle care'', ''Chemical safety knowledge'', ''Sanitation and infection control'', ''Client consultation'', ''Appointment scheduling software'', ''Inventory
    management'', ''Small business bookkeeping'', ''Problem solving'', ''Time management'', ''Customer service'', ''Stress management techniques'']'
  hobbies: '[''Reading science‑fiction'', ''Puzzle solving'', ''Running along the Charles River'', ''Yoga and meditation'', ''Journaling'', ''Digital illustration for nail art'', ''Volunteering at youth
    STEM workshops'', ''Mentoring nail technicians'', ''Cooking soul food'', ''Listening to live jazz'']'
  career_goals: Lena aims to open her own boutique salon in South Boston that combines high‑tech appointment systems with a line of eco‑friendly, scientifically formulated nail products. She hopes to become
    a certified nail‑tech educator, offering workshops that teach safe, sustainable practices to other technicians. Over the next five years she plans to launch a small business brand that highlights African‑American
    cultural motifs in nail art, and eventually expand to an online retail platform for her proprietary nail gels and tools.
