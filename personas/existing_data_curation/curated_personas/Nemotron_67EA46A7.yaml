  career_goals: Anna aims to formalize her education by obtaining a GED within the next year, followed by vocational training in office administration or community health services. Her short‑term goal is
    to secure a stable full‑time position in administrative support or community outreach at a Detroit nonprofit, where she can leverage her organizational and people‑skills. She aspires to progress into
    a supervisory role, perhaps as an office manager or program coordinator, and eventually launch a small home‑based event‑planning business that serves local churches, schools, and community groups. Parallel
    to her professional goals, she is committed to developing coping strategies for her anxiety, possibly through counseling and peer‑support facilitation, aiming for long‑term financial independence and
    the ability to mentor other women facing similar challenges.
