personas:
  professional: Elaine Zelinski, a 94‑year‑old retired homemaker turned community elder, leverages their lifelong organizational skill and curiosity to run weekly knitting circles, lead genealogical workshops,
    and document family histories for the local historical society, balancing meticulous planning with the flexibility to adapt to seniors’ needs.
  sports: Elaine Zelinski, at 94, enjoys leisurely walks along the Patuxent River and participates in low‑impact chair yoga classes at the senior center, while they cheer on the Baltimore Orioles on game
    days and keep a modest collection of Washington Capitals memorabilia.
  arts: Elaine Zelinski, a 94‑year‑old aficionado of 1930‑50s big‑band and jazz, fills her afternoons with Duke Ellington, Benny Goodman, and Count Basie recordings, attends the community‑center book club
    where they discuss historical fiction by Ken Follett and biographies of Amelia Earhart, and occasionally watches classic films starring Cary Grant.
  travel: Elaine Zelinski, at 94, prefers short, well‑planned day trips to historic waterfront towns like Annapolis and St. Mary’s City, enjoys occasional visits to family in the neighboring states, but
    they avoid long flights, opting instead for scenic drives along the Chesapeake Bay with a portable crossword book and a thermos of tea.
  culinary: Elaine Zelinski, a 94‑year‑old home‑cook celebrated for her Chesapeake Bay crab cakes, dill‑infused fish chowder, and family‑passed pierogi‑style dumplings with sauerkraut, expertly knits together
    flavors using fresh herbs from her garden, expertly seasons with Old Bay and marjoram, and modestly shares recipes at the senior center while they occasionally forget to label leftovers.
  core: Elaine Zelinski, a 94‑year‑old garden‑loving, crossword‑solving, jazz‑listening storyteller, balances meticulous routines with spontaneous generosity, often misplacing their glasses but never missing
    a knitting circle.
background:
  cultural: Elaine’s cultural background is rooted in the mid‑Atlantic white American milieu of St. Mary’s County, Maryland, with a strong Polish‑American heritage passed down by her grandparents who emigrated
    from Poland in the early 20th century. Raised in a Catholic, working‑class household during the Great Depression and World War II, she grew up with a blend of traditional Polish customs—such as celebrating
    Wigilia, baking pierogi, and preserving homemade preserves—and the coastal Maryland traditions of crab feasts, church picnics, and community solidarity. The region’s slower‑paced, close‑knit community
    and the values of self‑reliance, practicality, and modest celebration of holidays have shaped her worldview and daily habits.
attributes:
  skills: '[''Home cooking (especially Chesapeake Bay seafood and Polish dishes)'', ''Backyard vegetable gardening'', ''Knitting and crocheting'', ''Household budgeting and financial organization'', ''Community
