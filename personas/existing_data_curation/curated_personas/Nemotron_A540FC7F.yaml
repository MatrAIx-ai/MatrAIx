    "Sketching and basic photography"]'
  hobbies: '["Watercolor painting and sketching", "Photography (urban and landscape)", "Reading speculative fiction and philosophy", "Listening to science and art podcasts", "Solving puzzles (crosswords,
    Sudoku)", "Gardening on a balcony", "Cooking traditional Salvadoran dishes (pupusas, tamales)", "Participating in small community art workshops"]'
  career_goals: Eneida aims to advance within the district’s transportation department, targeting a senior coordinator role where she can lead safety initiatives, mentor new drivers, and implement data‑driven
    route efficiency programs. She plans to obtain a commercial driver’s license with a passenger endorsement and pursue certification as a transportation safety instructor. Ultimately, she hopes to blend
    her organizational strengths with her artistic curiosity by developing an after‑school outreach program that integrates visual arts and storytelling into the daily bus experience for students, positioning
    herself as both a logistics leader and a community mentor.
