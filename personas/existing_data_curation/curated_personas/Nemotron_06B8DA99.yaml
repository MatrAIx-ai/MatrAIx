  hobbies: '["Oil Painting", "Sketching", "Reading Contemporary Fiction and Art History", "Poetry Writing", "Chess", "Puzzle Solving (Crosswords, Sudoku)", "Community Garden Volunteering", "Cooking Traditional
    Dominican Dishes", "Attending Small Art Gallery Openings", "Bilingual Book Club"]'
  career_goals: Luz aims to secure a senior data science or research leadership position within a municipal agency or nonprofit where she can shape evidence‑based policies that address health and economic
    disparities affecting the Dominican community in Paterson. She aspires to mentor emerging women in STEM, publish interdisciplinary work that fuses mathematical analysis with cultural studies, and eventually
    launch a community‑focused analytics platform that empowers local neighborhoods to forecast social‑service needs. Her competitive nature fuels a desire to be recognized as a thought leader who reliably
    delivers rigorous, impactful insights.
