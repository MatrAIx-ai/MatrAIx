personas:
  professional: Luz Martinez is a senior data scientist with deep expertise in statistical modeling, GIS, and data visualization, who leverages bilingual English‑Spanish communication and a lifelong passion
    for art and philosophy to translate complex municipal data into evidence‑based policy recommendations, while driving a competitive yet collaborative research agenda that mentors emerging women in STEM.
  sports: Luz Martinez participates in low‑impact fitness activities such as early‑morning walks along the Passaic River and a weekly senior badminton group, while faithfully cheering for the New York Giants
    in football season, the New York Yankees in baseball, and occasionally attending a New York Knick game for the occasional basketball fix.
  arts: Luz Martinez blends visual art, poetry, and performance culture, painting oil canvases that echo Caribbean coastlines and geometric abstractions, reciting original verses at a bilingual book club,
    and attending intimate live salsa shows featuring artists like Eddie Santiago and merengue classics by Juan Luis Guerra, while also admiring works by Frida Kahlo, Jackson Pollock, and contemporary New
    Jersey muralist Carmen Santamaria.
  travel: Luz Martinez prefers meticulously planned cultural trips that balance exploration with comfort, favoring short‑haul flights to historic European cities such as Lisbon and Barcelona for their art
    museums, and occasional extended stays in Caribbean islands for their beaches and culinary discoveries, all while staying within a modest travel budget that leverages off‑season pricing.
  culinary: Luz Martinez enjoys cooking traditional island dishes like mangú with roasted plantains, beans, and a tangy sofrito, while also experimenting with new ingredients such as chayote and truffle
    oil, maintaining an intermediate skill level that lets them host flavorful dinner gatherings for close friends.
  core: Luz Martinez is a detail‑driven data science leader whose competitive edge fuels rigorous municipal research, who balances analytical rigor with a vibrant artistic life, disciplined finances, and
    a pragmatic yet adventurous approach to health, sport, travel, and cuisine.
background:
  cultural: Luz grew up in a close‑knit Dominican family in Paterson, speaking Spanish at home and English at school. The rhythmic beats of merengue, the vibrant colors of Caribbean festivals, and the communal
    values of solidarity and resilience have shaped her worldview. She maintains strong ties to the Dominican diaspora, celebrating holidays such as Día de la Independencia with family gatherings and sharing
    traditional dishes like sancocho and mangú. Her cultural identity informs her commitment to using data for community advocacy, preserving the artistic heritage of her roots, and fostering connections
    between her scientific work and the lived experiences of her community.
