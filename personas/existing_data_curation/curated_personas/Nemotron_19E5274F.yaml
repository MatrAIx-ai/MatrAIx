  hobbies: '[''playing acoustic guitar'', ''softball league'', ''volunteering with Habitat for Humanity'', ''camping and hiking'', ''DIY woodworking projects'', ''attending local music festivals'', ''board-game
    nights'', ''building reclaimed-wood furniture'']'
  career_goals: Robert aims to become a master carpenter and eventually open his own boutique woodworking shop that focuses on sustainable, custom furniture for local clients. He plans to earn an OSHA certification
    and complete an advanced carpentry apprenticeship to qualify for foreman positions. Over the next five years, he hopes to build a portfolio that blends traditional craftsmanship with modern design,
    develop stronger time‑management habits to reduce stress, and mentor younger apprentices in the Enon area.
