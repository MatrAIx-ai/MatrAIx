personas:
  professional: Darrell Porter, a veteran cashier at a Dothan retailer, leverages two decades of POS expertise, inventory‑management savvy, and empathetic listening to keep checkout lines moving while their
    curious, spontaneous nature drives them to constantly tinker with workflow ideas, even as they wrestle with the anxiety of meeting strict deadlines.
  sports: Darrell Porter stays active by fishing early at Grasshopper Lake and joining a weekly pickup basketball game at the Dothan Community Center, while cheering on the Auburn Tigers in college football
    and the Atlanta Braves during baseball season.
  arts: Darrell Porter channels their love of Southern mystery by devouring novels by James Lee Burke and immerses in live roots music at local festivals, often catching performances by Jason Isbell, The
    Avett Brothers, and classic Southern rock icons like the Allman Brothers Band, letting stories and melodies help steady their restless mind.
  travel: Darrell Porter prefers spur‑of‑the‑moment weekend drives, often heading to historic Montgomery, the river towns of Pensacola, or a quiet cabin retreat in the North Carolina Blue Ridge Mountains,
    balancing a low‑budget approach with a yearning for serene natural settings.
  culinary: Darrell Porter enjoys cooking simple comfort foods such as pan‑fried catfish with a cornmeal crust, shrimp and grits seasoned with smoked paprika, and apple cobbler topped with a buttery crumble,
    and their modest woodworking hobby even extends to crafting a handmade cutting board for kitchen use.
  core: Darrell Porter is a detail‑oriented yet impulsive retail veteran who soothes anxiety with early‑morning fishing, woodworking, and mystery novels, but often battles procrastination and occasional
    overspending on hobby gear.
background:
  cultural: Darrell was born and raised in Dothan, Alabama, in a family that has lived in the Wiregrass region for generations. His upbringing reflects classic Southern values of hospitality, self-reliance,
    and a strong sense of community, reinforced by regular participation in his local Baptist church. He grew up on traditional Southern cuisine—fried catfish, collard greens, and peach cobbler—and takes
    pride in regional celebrations such as the National Peanut Festival and the Dothan Peach Festival. While he respects these long-standing customs, Darrell remains open to new ideas, often blending his
    Southern work ethic and practical mindset with a curiosity for modern retail technology and contemporary cultural trends.
attributes:
  skills: '["POS system operation","Cash handling and transaction processing","Customer service and conflict resolution","Basic bookkeeping and sales reconciliation","Inventory management and shelf stocking","Rapid
