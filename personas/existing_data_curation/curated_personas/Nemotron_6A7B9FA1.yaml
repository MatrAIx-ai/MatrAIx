  hobbies: '["Fishing at local lakes","Woodworking and DIY furniture building","Attending local music festivals and church potlucks","Reading Southern mystery and history books","Journaling for emotional
    regulation","Community gardening","Spontaneous short road trips to nearby nature spots"]'
  career_goals: Darrell hopes to move from frontline cashier to a supervisory position within the next two to three years, aiming to become a shift lead or assistant manager where he can mentor new cashiers
    and help design smoother checkout workflows. To achieve this, he plans to enroll in evening courses at Gulf Coast State College in retail management and small-business operations, and to obtain a basic
    management certification. While he values the stability a leadership role can bring, he also wants to retain enough schedule flexibility to manage his anxiety and preserve time for his hobbies. Long-term,
    Darrell dreams of opening a small, family-run convenience store that blends his practical retail expertise with a low-stress, community-focused atmosphere, allowing him to apply his curiosity for new
    merchandising ideas without the rigid structure of larger corporate settings.
