persona_description: A scientist with expertise in bioengineering and microbiology, specifically focusing on optimizing ALS biofiltration processes in space. This individual is responsible for delineating
  technical barriers associated with using biofiltration in space, identifying and optimizing system design parameters to maximize treatment efficiency, and evaluating new and emerging biofiltration technologies
  for application in ALS. They will conduct experiments using both microscale and mesoscale tests to study microkinetics, mass transfer rates, transient responses, time delays, and microbial growth patterns.
  Continuous monitoring of input and output gas concentrations will allow for the evaluation of gas removal efficiencies and kinetic parameters of the process. This scientist is also responsible for developing
  and testing innovative pollution control methods for swine and poultry buildings.
