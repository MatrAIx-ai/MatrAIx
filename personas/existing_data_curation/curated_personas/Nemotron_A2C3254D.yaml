personas:
  professional: Alexander Wilson is an aspiring junior technologist who blends hands‑on LEGO Technic builds with Scratch programming, applying their practical curiosity to create moving models while their
    relaxed, flexible attitude leads them to bounce between projects without strict schedules.
  sports: Alexander Wilson is an energetic participant in after‑school pickup basketball games and weekend soccer matches with the community park league, a die‑hard fan of the Chicago Bulls in the NBA and
    the Chicago Fire in MLS, and they often switch positions on the field to keep the game fluid.
  arts: Alexander Wilson immerses themselves in sci‑fi literature from authors like Isaac Asimov, watches space documentaries narrated by Neil deGrasse Tyson, and channels that inspiration into LEGO creations
    reminiscent of the futuristic designs of architect Zaha Hadid, while they unwind listening to Imagine Dragons and the soundtrack of Star Wars.
  travel: Alexander Wilson prefers spontaneous family road trips that end in campsite nights under the stars, where they can track nocturnal wildlife, and they dream of hiking the Grand Canyon, exploring
    Yellowstone’s geysers, and touring the Kennedy Space Center, balancing a teen budget with a desire for hands‑on adventure.
  culinary: Alexander Wilson favors simple, hearty meals such as pepperoni pizza and creamy mac and cheese, can whip up basic dishes on a portable camping stove, and delights in making classic s’mores with
    graham crackers, marshmallows, and chocolate during overnight trips, though they often forget to bring a reusable water bottle.
  core: Alexander Wilson is a curiosity‑driven teen who juggles LEGO building, coding, and team sports with a laid‑back attitude that sometimes leads to missed deadlines but fuels a relentless appetite
    for exploration.
background:
  cultural: Alexander grew up in Saint Cloud, a suburban community in Osceola County, Florida. His family’s cultural roots are primarily Anglo‑American, with a modest middle‑class upbringing that values
    community involvement, outdoor recreation, and education. The local environment—near lakes, wetlands, and the Orlando metropolitan area—exposes him to a mix of Southern hospitality and diverse cultural
    events, influencing his friendly, outgoing demeanor and his appreciation for both nature and technology.
