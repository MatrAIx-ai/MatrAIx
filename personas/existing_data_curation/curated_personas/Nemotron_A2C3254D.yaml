  career_goals: Alexander dreams of turning his love for building and technology into a future career. He envisions becoming a mechanical engineer or a video‑game developer who can create interactive experiences.
    He also imagines one day leading community projects that combine his practical skills with his outgoing personality, perhaps as a youth program coordinator or a tech mentor for younger kids. He sees
    these paths as ways to satisfy both his curiosity and his desire for flexible, hands‑on work.
