  hobbies: '[''salsa dancing'', ''plena dancing'', ''traditional cooking'', ''gardening'', ''bingo'', ''historical reading'', ''knitting'', ''computer tutoring'']'
  career_goals: Although retired from formal employment, Margarita aims to stay an active pillar of her community. She plans to earn a high‑school equivalency credential, become a certified senior community
    health volunteer, and launch a weekly cultural‑heritage workshop that teaches younger residents traditional music, dance, and cooking. Additionally, she hopes to organize an annual charity fundraiser
    to support local families in need, preserving her reputation for high‑standard execution and fostering inter‑generational connections.
