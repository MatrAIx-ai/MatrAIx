  hobbies: '[''Gardening'', ''Knitting'', ''Reading mystery novels'', ''Hiking local trails'', ''Cooking and baking'', ''Journaling'', ''Listening to bluegrass music'', ''Volunteering at church'']'
  career_goals: Michelle aims to re‑enter the workforce in a role that blends her caregiving instincts with practical reliability. She plans to earn her GED and pursue a certification as a Certified Nursing
    Assistant (CNA) or Home Health Aide, seeking stable part‑time employment with benefits that can support her family. Simultaneously, she dreams of launching a small home‑based business selling handcrafted
    knitted goods and homemade preserves, allowing her to express her curiosity for new recipes while maintaining financial practicality. Long‑term, she hopes to become a community outreach liaison for
    mental‑health awareness, using her personal experience with stress and her cooperative nature to help others in her Appalachian community.
