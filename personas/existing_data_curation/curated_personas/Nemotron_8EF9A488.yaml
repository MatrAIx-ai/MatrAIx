personas:
  professional: Myung Huang, an aspiring robotics tinkerer, melds a love for building LEGO moving-part models with early Scratch coding to design simple autonomous machines, applying their methodical planning
    and calm focus to each project.
  sports: Myung Huang anchors the midfield on the Salinas United youth soccer squad, practices drills twice a week while also joining a weekend beach-volleyball club, and balances team camaraderie with
    solitary jogs along the Monterey Bay shoreline to stay fit.
  arts: Myung Huang spends Saturday afternoons perfecting piano pieces by Yiruma and Debussy, while also attending a cultural club's calligraphy workshops that teach brush-stroke techniques, and often decorates
    LEGO builds with miniature artwork inspired by classic sci-fi illustrators such as Moebius.
  travel: Myung Huang loves weekend trips to Monterey's tide pools and the nearby Monterey Bay Aquarium, dreams of hiking the redwoods of Muir Woods, and keeps a saved-up allowance for a future family visit
    to the historic lantern festivals in Taiwan, balancing careful budgeting with a thirst for discovery.
  culinary: Myung Huang enjoys assembling homemade dumplings with pork and chive filling, experimenting with soy-ginger glazes on grilled vegetables, and occasionally treats themselves to a slice of cheesy
    pizza while practicing the meticulous art of measuring toppings like a young chef.
  core: Myung Huang is a calm, curiosity-driven middle-schooler who builds robots from LEGO, codes playful stories, and quietly strategizes their allowance, all while keeping a tidy notebook of allergies,
    soccer drills, and piano scales.
background:
  cultural: Myung comes from an East Asian (Chinese) immigrant family that settled in Salinas, California. He grew up speaking Mandarin at home while attending an English‑speaking public school, giving
    him a bilingual perspective. His family celebrates traditional festivals such as Lunar New Year and the Mid‑Autumn Festival, incorporating cultural foods, stories, and customs into their household.
    At the same time, his upbringing in Monterey County has exposed him to the agricultural heritage of the region, and he often helps with small‑scale gardening on the family’s plot. His cultural identity
    blends respect for his grandparents’ values—emphasis on education, humility, and community harmony—with the American values of independence and curiosity. He participates in a local Chinese cultural
    club that organizes language workshops and calligraphy sessions, fostering connections with other Asian‑American youth.
attributes:
  skills: '[''Mathematics (grade‑level advanced)'', ''Science (hands‑on experimentation)'', ''Basic coding (Scratch & Blockly)'', ''Bilingual (Mandarin & English)'', ''Organizational abilities (classroom
