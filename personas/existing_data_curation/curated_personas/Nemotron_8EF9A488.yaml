  hobbies: '[''LEGO building'', ''Scratch coding projects'', ''Reading (science‑fiction & science non‑fiction)'', ''Soccer'', ''Exploring tide pools'', ''Piano practice'']'
  career_goals: Myung hopes to become a robotics engineer who designs tools for sustainable agriculture. He dreams of studying computer science and environmental engineering in high school and college,
    with the ultimate ambition of creating low‑cost automation that can help small farms like his family's increase efficiency while protecting the environment. He also aspires to mentor younger students
    in STEM clubs, sharing his love of coding and problem solving. In the nearer term, he plans to join his middle school’s robotics team, win competitions, and earn a mentorship internship at a local tech
    company.
