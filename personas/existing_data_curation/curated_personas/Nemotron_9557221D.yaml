  career_goals: He dreams of becoming a civil engineer who designs safe, structured buildings and bridges, inspired by his love for building with LEGO. He also imagines working as a librarian, appreciating
    the quiet, organized environment and the opportunity to help others find information. His ambition is guided by his desire for clear procedures and the chance to contribute positively to his community.
