personas:
  professional: Emmanuel Cureton, a budding builder, channels their methodical mindset and love for clear structure into assembling intricate LEGO models, often creating miniature replicas of the local
    church sanctuary after Sunday school, which showcases their early engineering curiosity and dedication to completing projects on schedule.
  sports: Emmanuel Cureton enjoys the disciplined environment of their Little League baseball team, the Fort Smith Tigers, and they also participate in Thursday evening swim lessons at the community center,
    proudly rooting for the Kansas City Chiefs on Sunday night football, preferring organized practice drills over chaotic playground games.
  arts: Emmanuel Cureton expresses their creativity through detailed drawings of superhero adventures, while listening to uplifting gospel hymns by Andraé Crouch and contemporary pop tunes from Ariana Grande,
    and they eagerly watch animated classics like 'The Lion King' to inspire their color palettes.
  travel: Emmanuel Cureton thrives on well-planned family road trips, having explored the historic sites of Little Rock, camped beside the serene streams of Ouachita National Forest, visited Washington,
    D.C.’s National Museum of Natural History, and they dream of a future excursion to the Grand Canyon’s rim to combine their love for nature and curiosity about grand vistas.
  culinary: Emmanuel Cureton delights in helping the family prepare soul-food staples such as collard greens, cornbread, and sweet potato pie during Thanksgiving and Juneteenth gatherings, and they skillfully
    whisk mac and cheese batter while savoring the aromatic blend of garlic, paprika, and cheddar in their favorite dishes.
  core: Emmanuel Cureton is a meticulous, quietly confident seven-year-old who balances their love for structured LEGO builds with a sensitive heart that often worries about the unknown, preferring small-group
    adventures and orderly routines.
background:
  cultural: Emmanuel grows up in an African‑American family rooted in Fort Smith’s close‑knit community. His family celebrates cultural traditions such as Juneteenth and Thanksgiving with soul food, storytelling,
    and gospel music. Regular attendance at a local Baptist church provides him with a sense of belonging and reinforces values of respect, service, and perseverance. He is aware of local civil‑rights history
    through school projects and community events, and he enjoys listening to his grandparents recount stories of resilience and community solidarity in the South.
