persona_description: A scientist and researcher who specializes in the study of immune cells, particularly gamma delta T cells. Adrian is working with GammaDelta Therapeutics, a spin-out company that he
  co-founded, together with the Crick, King’s and Cancer Research UK, to apply the findings clinically. The company has a $100 million collaboration with pharmaceutical giant Takeda to develop new treatments
  using these unique cells, with the aim of starting human trials within two years. Adrian's research focuses on the unique capabilities of gamma delta T cells, including their ability to detect when things
  aren't normal and mount a specific response, and the mechanisms by which they perform these functions. He is also interested in exploring the role of gamma delta T cells in autoimmune conditions such
  as inflammatory bowel disease.
