  hobbies: '[''Reading philosophy and art criticism'', ''Watercolor painting (abstract)'', ''Visiting art galleries and museums'', ''Birdwatching on Willamette River trails'', ''Gardening (native Oregon
    plants)'', ''Playing chess (community club)'', ''Writing short essays and memoir'', ''Volunteer docent work'']'
  career_goals: Jacob aims to transition into a part‑time role as a records consultant for local nonprofit organizations, leveraging his administrative expertise to help them establish efficient filing
    and budgeting systems. He also hopes to volunteer as a docent at the Oregon Historical Society, sharing his love for history and art with small groups. A personal ambition is to complete a collection
    of essays on abstract art and philosophy and possibly publish a memoir reflecting on his career and life in the Pacific Northwest. He seeks to maintain financial stability while reducing stress and
    to mentor younger clerical staff, leaving a legacy of practical knowledge and thoughtful guidance.
