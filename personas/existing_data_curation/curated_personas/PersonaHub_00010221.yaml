persona_description: A person who values networking and collaboration, and is interested in exploring the potential of larger networks connecting the human brains together like a computer on the internet.
  This person is interested in the concept of personal networks that have contacts in common with company, professional, and social branches, and in the idea that we can become as knowledgeable as our network.
  They are also interested in the idea of network sharing, network intelligence, network collaboration, and network collectivism. They are open to exploring other challenges related to networking and are
  willing to ask for help when they need it.
