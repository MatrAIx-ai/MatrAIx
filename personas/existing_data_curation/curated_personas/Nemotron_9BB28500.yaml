personas:
  professional: Sandy Escobar, a 16‑year‑old high‑school senior, channels their love of public speaking and event coordination into leading drama productions, debate tournaments, and community workshops,
    always balancing meticulous planning with the flexibility to improvise on stage and backstage.
  sports: Sandy Escobar, a 16‑year‑old who plays pickup basketball at the local community center and hikes the surrounding prairie trails, supports the Saskatchewan Roughriders and follows the Toronto Raptors,
    blending competitive spirit with a community‑focused fitness routine.
  arts: Sandy Escobar, a 16‑year‑old drama enthusiast, showcases their vocal flair on karaoke nights, creates TikTok skits inspired by Lin‑Manuel Miranda and Beyoncé, and writes a blog that reviews local
    theater performances, all while drawing energy from the spotlight.
  travel: Sandy Escobar, a 16‑year‑old with a love for road trips across the prairie, has visited Calgary's Stampede and dreams of attending Broadway's summer shows in New York, preferring itineraries that
    combine cultural festivals with affordable youth hostels.
  culinary: Sandy Escobar, a 16‑year‑old amateur baker, delights in crafting Saskatoon berry scones, chocolate chip cookie bars, and experimental avocado brownies, often over‑mixing batter in a rush after
    rehearsals but proudly sharing the results with friends at community gatherings.
  core: Sandy Escobar, a 16‑year‑old social butterfly, blends relentless curiosity with practical event‑planning, channels anxiety into creative outlets, and balances disciplined budgeting with occasional
    impulsive splurges.
background:
  cultural: Sandy was raised in Oakes, a small, close‑knit town in LaMoure County, North Dakota. Her family’s roots trace back to German and Scandinavian settlers who arrived in the region in the early
    1900s, and the community retains many Midwestern traditions—annual county fairs, church potlucks, and harvest festivals. The local culture emphasizes self‑reliance, neighborly support, and a respect
    for practical work, especially farming and small‑business entrepreneurship. While attending a public school with a variety of activities, Sandy has been influenced by both the strong communal values
    of her hometown and the broader digital culture she accesses online. These dual influences inform her balanced appreciation for new ideas and established methods.
