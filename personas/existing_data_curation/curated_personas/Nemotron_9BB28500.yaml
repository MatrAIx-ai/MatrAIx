  career_goals: Sandy hopes to turn her love of communication and community involvement into a career that makes a difference locally. She plans to attend a university where she can major in communications
    or public health education. Her long‑term ambition is to become a community health educator or public relations specialist for a nonprofit organization, designing outreach programs that blend practical
    information with engaging storytelling. She also explores the possibility of returning to her hometown to work as a high‑school teacher or youth coordinator, combining her sociable nature with a desire
    to mentor younger students while building leadership skills that help her manage stress and maintain a balanced lifestyle.
