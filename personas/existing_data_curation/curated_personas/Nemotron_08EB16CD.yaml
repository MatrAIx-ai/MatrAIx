personas:
  professional: David Scott is a customer support analyst who leverages Python and Salesforce to automate ticket routing, and they consistently apply a calm, methodical approach and a competitive drive
    to exceed performance metrics while meticulously documenting every workflow improvement.
  sports: David Scott follows a disciplined strength‑training regimen three times a week, is a season ticket holder for the Chicago Bears football team, supports the Chicago Bulls during the NBA season,
    and they occasionally join a local recreational chess club that doubles as a strategic mind‑sport outlet.
  arts: David Scott finds order in the works of Johann Sebastian Bach, enjoys the precise cinematography of Christopher Nolan, listens to the folk‑rock storytelling of Iron & Wine while brewing, and they
    attend quarterly gallery openings featuring abstract geometry that resonates with their love for structure.
  travel: David Scott plans every trip down to the minute, has already visited Kyoto, Japan and Munich, Germany, prefers solo travel to avoid unpredictable group dynamics, and they dream of a meticulously
    organized trekking expedition through Patagonia's Torres del Paine during the Southern summer.
  culinary: David Scott experiments with home‑brewing Belgian‑style ales, cooks protein‑rich meals like grilled chicken with quinoa and roasted Brussels sprouts to fuel strength training, enjoys the spicy
    tang of kimchi fried rice, and they meticulously measure ingredients, treating cooking like a scientific experiment.
  core: David Scott is a detail‑obsessed strategist who channels competitive calm into every facet of life, from work automation to home‑brewing, while they maintain solitary habits and occasional neglect
    of mental health that add a subtle edge to their otherwise orderly existence.
background:
  cultural: David grew up in a middle‑class white family in the Baltimore suburbs, the son of two engineers who emphasized practical problem‑solving and punctuality. His upbringing blended traditional American
    values—celebrating holidays like Independence Day and Thanksgiving—with the diverse cultural tapestry of Baltimore City, exposing him to Chesapeake Bay cuisine, baseball fandom for the Orioles, and
    the city’s historic neighborhoods. He values self‑reliance, community involvement, and an analytical outlook, which are reinforced by his regional ties and his family’s emphasis on education and hard
    work.
attributes:
