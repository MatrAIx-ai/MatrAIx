    tutoring", "Attending Baltimore Orioles games with friends"]'
  career_goals: David aims to leverage his analytical mindset and customer‑service experience to move into a leadership role within operations. In the short term, he is pursuing a team‑lead position where
    he can drive performance metrics, implement workflow automation, and mentor new agents. Over the next five years, he plans to obtain a Six Sigma Green Belt and transition to an Operations Analyst role,
    eventually progressing to an Operations Manager or Director of Customer Experience, where he can shape strategic initiatives and continuous‑improvement programs.
