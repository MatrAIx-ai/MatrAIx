persona_description: A government minister who is committed to evidence-based policy and has responsibility for overseeing education and training policies. They are aware of the importance of maintaining
  a wide vision of worthwhile learning that is practical, vocational, and academic. They recognize the central role that teachers play in any educational and training system and are committed to nurturing
  their pedagogical expertise through rigorous initial training and high-quality continuing professional development. They are aware of the limits to how interventions can change a complex system and are
  committed to being modest about what they can achieve.
