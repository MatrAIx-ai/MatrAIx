personas:
  professional: Alberto Delgado, a three-year-old 'toy librarian' who meticulously arranges his building blocks by color and shape, channels his love for structure and social interaction into leading a
    weekly pretend-play storytime for his stuffed animal friends, and they proudly announce each new 'book' to an enthusiastic audience.
  sports: Alberto Delgado, a three-year-old member of the Tiny Tots Soccer Club at the local community center, eagerly dribbles a soft ball during weekend sessions, idolizes the FC Barcelona junior academy
    players, enjoys watching the Los Angeles Dodgers games with his family, and they cheer loudly when their team scores.
  arts: Alberto Delgado, a three-year-old enthusiast of children's music, sings along to The Wiggles and Sesame Street, dances to Baby Shark, spends afternoons drawing colorful pictures of animals after
    watching Pixar's Finding Nemo, and they proudly display every new masterpiece on the refrigerator.
  travel: Alberto Delgado, a three-year-old who has already visited the San Diego Zoo, enjoyed a magical day at Disneyland, taken his first airplane ride to Tokyo, now dreams of exploring the beaches of
    Costa Rica and the snowy peaks of the Swiss Alps, and they love packing their favorite stuffed bear for every adventure.
  culinary: Alberto Delgado, a three-year-old with a growing palate, prefers chicken nuggets with honey mustard, mac and cheese, fresh strawberry slices, enjoys helping his mom stir pancake batter but insists
    on eating only the golden-browned edges, and they stubbornly refuse to try new vegetables unless cut into dinosaur shapes.
  core: Alberto Delgado, a meticulously organized yet playful three-year-old who turns every block-building session into a structured storytime, hoards shiny coins in a piggy bank, leads his Tiny Tots Soccer
    team, and they occasionally refuse bedtime for one more song, showcasing a blend of predictability, sociability, and delightful stubbornness.
background:
  cultural: Alberto is a third‑generation Puerto Rican raised in Omaha, Nebraska. At home, Spanish is spoken alongside English, and family meals often feature traditional dishes like arroz con gandules,
    pasteles, and tostones. He celebrates Puerto Rican holidays such as Día de la Constitución and enjoys the annual Fiesta Puertorriqueña hosted by the local Latino community center, where he dances to
    bomba and plena rhythms. His Catholic upbringing includes attending mass with his grandparents, and family gatherings emphasize respect for elders, storytelling, and music. Living in Omaha exposes him
    to Midwestern values of community involvement and outdoor recreation, blending Caribbean warmth with Nebraskan friendliness.
attributes:
  skills: '["Running and jumping", "Climbing", "Following daily routines", "Stacking blocks", "Drawing simple shapes", "Reciting nursery rhymes in English and Spanish", "Counting to ten", "Cooperative play",
    "Basic puzzle solving"]'
  hobbies: '["Playing at the park", "Climbing jungle gyms", "Racing with friends", "Building block towers", "Drawing pictures", "Singing and dancing to salsa and merengue", "Listening to bilingual storytime",
    "Pretend play with fire trucks", "Collecting leaves and stones"]'
  career_goals: Alberto is beginning to think about his future with the same curiosity that drives his daily play. In the short term, he aims to master reading his name in both English and Spanish, count
    beyond ten, and become more independent in self‑care tasks like dressing himself. Over the next few years, he dreams of growing up to be a firefighter or a community safety officer, roles that combine
    clear routines, helping others, and teamwork—qualities he already enjoys. He also imagines someday becoming a bilingual teacher who can share Puerto Rican stories with other children.
