  career_goals: John aspires to attain tenure and eventually become department chair, aiming to expand the college’s STEM offerings by creating interdisciplinary courses that blend engineering, computer
    science, and sustainability. He seeks to secure external funding for a modern makerspace, publish research on active learning in large lecture settings, and mentor junior faculty. Additionally, he plans
    to complete a master’s degree in Higher Education Administration to broaden his leadership capabilities. Long‑term, he envisions leading community outreach programs that introduce low‑income high‑school
    students to hands‑on STEM experiences.
