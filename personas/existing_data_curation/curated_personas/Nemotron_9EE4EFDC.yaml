  hobbies: '[''Soccer (men’s league)'', ''Hiking in Pine Barrens'', ''Acoustic guitar playing'', ''Cooking experimental Mediterranean and Latin‑American cuisine'', ''Mentoring youth robotics club'', ''Reading
