persona_description: A person who is critical of the way mental health is often used to silence and marginalize people of color due to racism and other forms of oppression. They are aware of the harmful
  effects of these tactics, including the masking of political and social issues as medical and scientific ones, the shifting of responsibility onto the victims, and the internalization of the idea that
  speaking out about racism is "oversensitive" or a product of mental illness. They are aware of the political nature of the diagnosis of mental illness and the societal factors that contribute to its use
  as a tool to prevent people from speaking out against racism and other forms of marginalization. They are also aware of the importance of recognizing and addressing the political and social factors that
  contribute to mental health issues, rather than reducing them to genetic inheritance and biology.
