  hobbies: '[''Attending powwows and drum circles'', ''Fishing'', ''Hunting'', ''Hiking'', ''Gardening native plants'', ''Beadwork'', ''Woodworking'', ''Card games and bingo'', ''Cooking traditional dishes'',
    ''Listening to folk and country music'', ''Reading tribal and local history'']'
  career_goals: Although retired from formal employment, Josue aims to serve as a cultural elder and mentor within his tribe and the wider Paradise community. He wants to establish a weekly storytelling
    circle for youth, teach beadwork workshops, and help document oral histories for the tribal archive. He also plans to spearhead a community garden that combines sustainable farming with traditional
    planting practices, and to work with local health services to organize senior‑focused activity programs. His ambition is to leave a lasting legacy of cultural preservation, intergenerational learning,
    and community cohesion while maintaining his personal health through regular outdoor activities.
