personas:
  professional: A retired master carpenter and community elder named Josue Challa, they channel decades of hands‑on problem‑solving into maintaining homes, repairing small engines, and coordinating cultural
    events, using their practical mindset, reliable mediation skills, and preference for structure to ensure projects finish on time and strengthen intergenerational bonds.
  sports: An avid outdoorsman named Josue Challa, they spend weekends fishing for trout in the Madison River, hunting elk in the nearby mountains, hiking Glacier National Park trails while tracking wildlife,
    and cheer on the Montana Grizzlies football team at the local bar, balancing active pursuits with community camaraderie.
  arts: A dedicated keeper of traditional arts and folk music named Josue Challa, they lead drum circles, craft intricate beadwork, attend powwows, and enjoy listening to Johnny Cash, The Avett Brothers,
    and local folk storyteller recordings, letting music and visual expression reinforce their sense of identity and community cohesion.
  travel: A curious traveler named Josue Challa, they favor road‑trip adventures to Glacier and Yellowstone National Parks, plan weekend camping trips to the Blackfeet River, dream of visiting the Māori
    cultural sites of New Zealand, and balance wanderlust with a modest travel budget and family responsibilities.
  culinary: A seasoned cook of heritage dishes named Josue Challa, they relish preparing fry bread, buffalo stew, and Three Sisters soup using bison meat, wildberries, and native corn, while skillfully
    seasoning with sage and juniper, though they sometimes over‑salt the stew when reminiscing about stories shared at the kitchen table.
  core: A wise, sociable, and organized elder named Josue Challa, they blend practical handyman skills with a passion for cultural preservation, often juggling community projects, occasional forgetfulness
    about medication, and a habit of humming folk tunes while repairing a porch.
background:
  cultural: 'Josue is an American Indian elder rooted in his tribe’s traditions, likely belonging to one of the Montana nations such as the Blackfeet, Crow, or Salish. He grew up on a reservation where
    his grandparents taught him the language, songs, and stories that shape his identity. Even after moving to Paradise, MT, he maintains daily practices that honor his heritage: participating in tribal
    ceremonies, preparing traditional foods like fry bread and buffalo stew, and preserving the oral history of his community. His worldview emphasizes harmony, collective responsibility, and a deep respect
    for the land, values that inform his everyday interactions and community involvement.'
