  career_goals: Jose aims to advance to a Director of Information Technology role within the next five years, overseeing a larger multi‑site operation and spearheading digital transformation initiatives.
    He plans to earn certifications such as PMP, CISSP, and AWS Solutions Architect to deepen his strategic and security expertise. Additionally, he aspires to mentor emerging tech talent, especially bilingual
    professionals, and eventually launch his own consulting firm that helps small and mid‑size businesses in Southern California modernize their IT ecosystems while maintaining cost efficiency.
