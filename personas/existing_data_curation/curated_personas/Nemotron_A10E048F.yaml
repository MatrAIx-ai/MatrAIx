  hobbies: '["Gardening (vegetables and flowers)", "Knitting and crocheting", "Crossword puzzles and word searches", "Reading historical fiction and classic literature", "Neighborhood walking", "Church
    choir participation", "Volunteering at senior center (craft sessions)", "Family cookbook project"]'
  career_goals: Although Megan is officially retired, she remains goal‑oriented. Her primary ambition is to maintain her health and independence through regular walking, balanced nutrition, and routine
    medical check‑ups. She aims to expand her volunteer work at the local senior center, eventually leading a weekly craft‑and‑cooking class for other seniors. Megan also hopes to compile a family cookbook
    that documents her favorite recipes and the stories behind them, preserving her heritage for future generations. Additionally, she wants to complete a genealogy project that traces her ancestors back
    to the early settlers of the Midwest, and she plans to share her findings with her grandchildren during family gatherings.
