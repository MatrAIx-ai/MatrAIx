personas:
  professional: Ebodio Hing, an aspiring young scientist who loves constructing elaborate LEGO cities and devouring adventure and science books, tackles every experiment with meticulous planning and a quiet
    curiosity, logging observations in a detailed notebook and preferring solitary workspaces.
  sports: Ebodio Hing, a member of Little Rock’s under‑8 youth soccer league, enjoys watching the Arkansas Razorbacks basketball games on weekends and spends Saturday mornings biking around the neighborhood
    park, preferring structured, low‑noise activities that align with their methodical approach to fitness.
  arts: Ebodio Hing, an avid comic‑strip drawer inspired by classic creators like Stan Lee and modern illustrators such as Jim Lee, channels the rhythmic melodies of folk songs played during Día de los
    Muertos celebrations—often featuring Lila Downs and traditional marimba—and watches animated adventure series to spark fresh storytelling ideas.
  travel: Ebodio Hing, who has explored the colorful streets of San Miguel de Allende with family and enjoyed a summer adventure at Orlando’s theme parks, now dreams of strolling among the ancient pyramids
    of Teotihuacan and hiking the tranquil trails of the Great Smoky Mountains, favoring family‑planned trips that blend cultural discovery with relaxed downtime.
  culinary: Ebodio Hing, who delights in the rich flavors of mole poblano and the comforting aroma of homemade tamales, loves helping to grind fresh corn for tortillas and often snacks on churros dusted
    with cinnamon sugar while reading, though they sometimes grow impatient waiting for hot dishes to cool before tasting.
  core: Ebodio Hing, a methodical and quietly curious 8‑year‑old who balances solitary LEGO engineering with a love for adventure books, approaches life with meticulous planning, modest saving habits, and
    a thoughtful eye for nature’s details.
background:
  cultural: Raised in a Mexican‑American household in Little Rock, Arkansas, Ebodio speaks Spanish at home and celebrates cultural traditions like Día de los Muertos, Cinco de Mayo, and family gatherings
    featuring tamales and mole. He participates in local Latino community events, attends a bilingual elementary program, and blends Mexican cultural influences with Southern U.S. customs in his daily life.
