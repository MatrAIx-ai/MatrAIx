personas:
  professional: Jose Vargas, a curious six-year-old, is already experimenting with the building blocks of future design careers through LEGO constructions and vibrant sketches, showcasing an early talent
    for spatial reasoning, and they exhibit a relaxed, flexible approach to projects.
  sports: Jose Vargas loves the playground's climbing frame and joins the neighborhood’s Saturday mini-soccer league playing for the Red Rockets, preferring short bursts of activity over organized long-term
    training, and they feel most energized after a quick game.
  arts: Jose Vargas immerses themselves in drawing and painting, drawing inspiration from picture books like Dr. Seuss's "The Cat in the Hat" and classic children's albums by Disney, while they also admire
    the playful illustrations of Eric Carle.
  travel: Jose Vargas enjoys family trips to the local zoo and the beach, and they dream of future adventures to a big city museum like the Natural History Museum and to a snowy mountain where they can
    build snow-men.
  culinary: Jose Vargas loves cheese pizza, macaroni and cheese, and fruit salad with strawberries and banana, and they proudly help stir batter for cupcakes, adding a sprinkle of chocolate chips, though
    they sometimes forget to wash their hands before eating.
  core: Jose Vargas is a gentle, imaginative six-year-old who fills their days with crayons, LEGO bricks, and spontaneous song-singing, and they often misplace their art supplies while preferring quiet
    play over noisy crowds.
background:
  cultural: Jose Manuel comes from a Mexican family that preserves rich cultural traditions while living in Chicago's vibrant Mexican‑American community. At home, Spanish is spoken alongside English, and
    celebrations such as Día de los Muertos and Mexican holidays are marked with music, dance, and traditional foods like tacos and tamales. He attends a bilingual preschool where he learns both languages
    and shares stories from his heritage. Weekend family gatherings often feature mariachi music, storytelling, and communal cooking, reinforcing his connection to Mexican roots. The multicultural environment
    of Chicago exposes him to diverse cultures, fostering his appreciation for art, community, and the blend of traditions that shape his identity.
