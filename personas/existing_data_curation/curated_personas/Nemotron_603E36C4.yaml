  career_goals: Jose Manuel dreams of becoming an artist who creates vibrant murals that celebrate his Mexican heritage and the diverse community of Chicago. He also imagines growing up to be an illustrator
    or storyteller, sharing imaginative tales through pictures and words. While he occasionally thinks about being an explorer or scientist, his primary ambition is to use art to bring joy, connection,
    and cultural pride to others.
