persona_description: A scientist who is a co-author on a recent article in the journal ACS Nano Letters. The scientist specializes in the creation of embedded devices that can relay information about the
  inner workings of disease-related proteins inside the cell membrane, and eventually lead to new ways to read, and even influence, brain or nerve cells. The scientist uses a nano-sized transistor inside
  a cell-like membrane and powers it using the cell's own fuel. The scientist's research could lead to new types of man-machine interactions where embedded devices could relay information about the inner
  workings of disease-related proteins inside the cell membrane.
