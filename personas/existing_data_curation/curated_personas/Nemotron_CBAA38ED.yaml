  hobbies: '[''Gardening'', ''Listening to Indian music'', ''Playing card and tile games (e.g., Rummikub)'', ''Attending Gujarati cultural events'', ''Reading family photo albums'', ''Practicing breathing
    exercises and devotional recitations'']'
  career_goals: Although retired, Panna is determined to stay engaged and purposeful. She aims to compile a family cookbook that records recipes and stories, mentor younger community members in cooking
    and cultural traditions, and lead a support group for seniors coping with anxiety. She also hopes to launch a small home‑based venture selling homemade pickles and chutneys at local farmers’ markets,
    preserving her culinary heritage while maintaining financial independence. Additionally, she wants to deepen her involvement at the temple by teaching children about Hindu festivals and rituals.
