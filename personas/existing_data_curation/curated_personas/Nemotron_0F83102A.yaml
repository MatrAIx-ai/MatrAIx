  career_goals: Short‑term, Lilawattie aims to take on leadership roles within her middle school—joining the student council, leading the multicultural club, and spearheading community‑service projects
    that blend tech and cultural awareness. She wants to gain experience in event coordination, peer mentoring, and digital content creation. In the longer view, she envisions a career that leverages both
    her organizational strengths and her love for spontaneous creativity, such as becoming a community‑program director for a youth nonprofit, a youth outreach coordinator in a municipal recreation department,
    or a multimedia producer who creates inclusive, culturally‑rich content for teen audiences. She also sees herself potentially studying at a university that offers programs in public administration,
    media studies, or educational technology, where she can further refine her ability to design structured programs that remain adaptable to the needs of diverse youth.
