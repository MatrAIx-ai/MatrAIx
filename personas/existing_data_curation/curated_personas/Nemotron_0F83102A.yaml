personas:
  professional: Lilawattie Babwani is a budding robotics enthusiast who mixes hands‑on building with quick‑fire TikTok tutorials, using their natural knack for improvisation and love of structure to lead
    the middle‑school robotics club’s weekly challenges.
  sports: Lilawattie Babwani dominates the neighborhood park’s pick‑up basketball scene, emulating the play style of the Los Angeles Lakers while organizing weekend tournaments for their friends and cheering
    for the local high school Tigers on game nights.
  arts: Lilawattie Babwani fuses Bollywood dance moves with Ariana Grande pop choreography, curates lively TikTok sketches, and finds inspiration in graphic novels like “Ms. Marvel” and “The Umbrella Academy,”
    while their friendship‑bracelet art echoes the intricate patterns of traditional mehndi designs.
  travel: Lilawattie Babwani prefers spontaneous weekend getaways with friends to nearby lakes for kayaking, yet dreams of a family pilgrimage to the historic Taj Mahal and a future solo adventure exploring
    the neon streets of Tokyo.
  culinary: Lilawattie Babwani loves whisking up crisp samosas and sweet mango lassi with their family, dabbling in spice‑filled paneer tikka and experimenting with fresh cilantro and garam masala, while
    occasionally swapping recipes for sushi rolls after school.
  core: Lilawattie Babwani is a resilient, high‑energy teen who blends structured robotics projects with spontaneous dance‑filled TikTok bursts, balancing a love for team sports, creative crafts, and cultural
    cooking—all while staying calm under pressure.
background:
  cultural: Lilawattie is a second‑generation South Asian American whose parents emigrated from India. At home, she hears Hindi (or another South Asian language) spoken alongside English, and her family
    celebrates cultural festivals such as Diwali, Holi, and Eid with traditional foods, music, and decorations. Growing up in the diverse neighborhoods of Minneapolis, she blends her heritage with the broader
    American culture, often acting as a cultural bridge by sharing South Asian customs with classmates and organizing multicultural events at school. She values the emphasis on education and community found
    in her family's background while also embracing the inclusive, multicultural spirit of her Minnesota community.
