personas:
  professional: Fengying Ouyang, a resourceful elementary and middle school teacher skilled in project‑based learning and digital instruction, blends curiosity with practicality to design inquiry‑driven
    units while assertively navigating classroom challenges and consistently meeting assessment deadlines.
  sports: Fengying Ouyang hikes the Brandywine Trail on weekends, plays midfield for the Chester County United adult soccer league, follows the Philadelphia Eagles and Philadelphia Phillies, and attends
    a community yoga class at the local recreation center for flexibility and stress relief.
  arts: Fengying Ouyang expresses creativity through calligraphy, strums an acoustic guitar to songs by Sufjan Stevens and Tame Impala, devours contemporary fiction from authors like Celeste Ng and Zadie
    Smith, and regularly volunteers at the public library to host storytelling sessions featuring diverse fairy‑tale adaptations.
  travel: Fengying Ouyang prefers spontaneous weekend getaways to places like Longwood Gardens or New York City, plans longer trips to Japan’s Kyoto and the Pacific Northwest using a mix of travel‑planning
    apps and last‑minute deals, balancing a love for adventure with a modest travel budget and occasional family obligations.
  culinary: Fengying Ouyang experiments with fusion dishes such as maple‑glazed pork belly tacos, miso‑marinated chicken stir‑fry with corn salsa, and Sichuan‑pepper‑spiked collard greens, favoring ingredients
    like hoisin sauce, cilantro, and roasted sweet potatoes while embracing a moderately skilled but enthusiastic home‑cooking style.
  core: Fengying Ouyang is a curious yet pragmatic educator who juggles spontaneous creativity and occasional disorganization, turning every classroom into a multicultural lab while chasing yoga zen and
    culinary experiments.
background:
  cultural: Fengying was raised in a Chinese‑American household that values education, family cohesion, and cultural heritage. Her parents immigrated to the United States before she was born, and she grew
    up speaking Mandarin at home while attending American schools. She celebrates traditional festivals such as Chinese New Year and the Mid‑Autumn Festival, often sharing these customs with her students
    to promote multicultural awareness. Fengying actively participates in the local Asian‑American community, attending cultural events, supporting language preservation initiatives, and integrating her
    bicultural experience into her teaching philosophy, which emphasizes respect for diverse perspectives and global citizenship.
attributes:
  skills: '[''Lesson planning'', ''Project‑based learning design'', ''Bilingual instruction (Mandarin & English)'', ''Digital classroom tools (Google Classroom, Kahoot, Seesaw)'', ''Differentiated instruction'',
    ''Classroom management'', ''Parent communication'', ''Student assessment and data analysis'', ''Curriculum alignment with state standards'']'
  hobbies: '[''Hiking in local trails'', ''Nature photography'', ''Cooking fusion recipes'', ''Calligraphy'', ''Playing acoustic guitar'', ''Reading contemporary fiction'', ''Volunteering at the public
    library (story‑time and cultural workshops)'']'
  career_goals: Fengying aims to deepen her impact on education by pursuing a Master's in Curriculum and Instruction within the next two years. She envisions transitioning into a curriculum specialist role
    or instructional coach, where she can mentor fellow teachers in integrating culturally responsive pedagogy and technology. Additionally, she plans to develop a community‑based bilingual after‑school
    program that pairs language learning with creative arts, fostering cross‑cultural understanding among local youth. Long‑term, she hopes to contribute to educational policy discussions on multicultural
    education at the district level.
