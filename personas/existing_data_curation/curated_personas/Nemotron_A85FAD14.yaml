  hobbies: '[''Gardening'', ''Bridge club'', ''Crocheting'', ''Listening to soul and gospel music'', ''Historical society volunteering'', ''Nature walks'', ''Writing memoir excerpts'']'
  career_goals: Although retired from daily shifts, Karen aims to leave a lasting legacy in aviation safety. She hopes to develop a mentorship program for aspiring controllers from underrepresented backgrounds,
    particularly within Virginia’s Black community. Karen also wishes to contribute to a regional safety advisory board, offering her practical insights to improve runway and airfield protocols. On a personal
    level, she plans to author a memoir that chronicles her experiences navigating a male‑dominated field, hoping to inspire future generations and preserve the history of Black professionals in aviation.
