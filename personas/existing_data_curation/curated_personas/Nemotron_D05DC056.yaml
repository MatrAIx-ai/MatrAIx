personas:
  professional: Dominic Thompkins, a 49-year-old self-taught handyman with strong DIY, basic automotive and balcony-gardening expertise, channels their compassionate listening and community-resource navigation
    into a budding career as a community outreach coordinator while preparing to launch a modest, discounted handyman service for seniors.
  sports: Dominic Thompkins stays fit primarily by walking their rescued Labrador through Baltimore's historic neighborhoods and joining the Baltimore Walking Society, enjoys casual pick-up basketball at
    the local YMCA, supports the Baltimore Ravens and Orioles, and occasionally participates in a seasonal community softball league.
  arts: Dominic Thompkins nurtures creative expression by playing acoustic guitar and learning blues classics from B.B. King and Muddy Waters and jazz standards by John Coltrane, listens to Aretha Franklin's
    soul anthems, frequents the Rough Magic jazz club, and draws inspiration from documentaries about Baltimore's urban history.
  travel: Dominic Thompkins prefers road trips with their Labrador to destinations like the Mississippi Delta for a blues pilgrimage, New Orleans for culinary immersion, Shenandoah National Park for quiet
    hikes, and has explored Savannah's historic squares, while avoiding air travel due to anxiety and budgeting trips carefully.
  culinary: Dominic Thompkins delights in cooking soul-food dishes such as collard greens seasoned with smoked turkey, black-eyed peas, sweet potato pie, and gumbo with okra and catfish, incorporates homegrown
    basil, rosemary and cherry tomatoes from their balcony garden, and crafts a signature hot sauce using jalapenos, vinegar, and smoked paprika.
  core: Dominic Thompkins, 49, blends a quiet handyman's practicality with a soulful love for blues guitar and gardening, while their persistent anxiety fuels both compassionate community work and occasional
    overspending on hobby supplies.
background:
  cultural: Dominic’s cultural identity is rooted in the African‑American experience of Baltimore’s historic neighborhoods, such as Upton and the East Side. He was raised with the rhythms of jazz, blues,
    and early hip‑hop playing in local community centers, and family gatherings often centered around church and soul‑food cooking. These traditions instilled a strong sense of communal responsibility and
    storytelling. Growing up during the city’s economic shifts, he witnessed both the challenges of systemic racism and the resilience of Black neighborhoods that organized mutual aid networks. This background
    fuels his compassionate outlook, his commitment to community service, and his desire to preserve and share the cultural heritage of his city while navigating personal hardships.
attributes:
