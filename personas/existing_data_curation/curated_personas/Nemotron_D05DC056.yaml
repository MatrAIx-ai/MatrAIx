  hobbies: '[''Vegetable gardening'', ''Acoustic guitar playing'', ''Reading biographies and self‑help literature'', ''Watching documentaries on urban history'', ''Volunteer work at food pantry'', ''Cooking
    soul‑food for small gatherings'', ''Walking his dog in city parks'']'
  career_goals: Dominic aims to return to the workforce in a role that leverages his empathy and practical know‑how, such as a community outreach coordinator or peer support worker at a Baltimore nonprofit
    serving low‑income families. He plans to obtain his GED within the next year to formalize his education and increase his eligibility for stable employment. Long‑term, he hopes to launch a modest handyman
    service that offers discounted repairs to seniors and residents on fixed incomes, combining his technical skills with his desire to give back to the community.
