personas:
  professional: Yesenia Melendezrodriguez works as a bilingual customer support specialist at a tech firm, leveraging their keen curiosity and practical troubleshooting skills to resolve issues through
    active listening and data-driven solutions, while their spontaneous streak sometimes leads to missed ticket deadlines but fuels innovative process improvements as they aim for a future team‑lead role.
  sports: Yesenia Melendezrodriguez enjoys solo hikes along the Green Mountains and cross‑country skiing in winter, follows the New England Patriots and the Boston Celtics on game nights, and participates
    in a small local running club that meets twice a month, though they often skip scheduled workouts when spontaneous plans arise.
  arts: Yesenia Melendezrodriguez spends weekends capturing Vermont’s autumn hues through a Canon EOS, finds inspiration in Ansel Adams and contemporary novelist Sally Rooney, and unwinds listening to indie
    folk artists like Natalia Lafourcade and Vampire Weekend, weaving these artistic influences into their personal journals.
  travel: Yesenia Melendezrodriguez prefers low‑key weekend getaways, having trekked the White Mountains in New Hampshire, dreamed of strolling the streets of Paris to practice French, and plans a future
    culinary tour of Oaxaca’s markets, all while budgeting trips through careful use of travel‑deal sites.
  culinary: Yesenia Melendezrodriguez experiments with traditional corn masa tamales, pozole rojo with pork and hominy, and homemade salsa verde using tomatillos, cilantro, and serrano peppers, cooking
    at an intermediate skill level while occasionally over‑seasoning dishes in their quest for authentic flavor.
  core: Yesenia Melendezrodriguez is a curious, resilient customer‑service professional who balances spontaneous creativity—seen in their photography, cooking, and travel dreams—with a practical drive toward
    leadership, even as they wrestle with occasional disorganization and impulsive spending.
background:
  cultural: Yesenia is a second‑generation Mexican American. She grew up in a bilingual household where Spanish was spoken at home and English at school, giving her a deep appreciation for Mexican traditions
    such as Día de los Muertos, family gatherings, and regional cuisine. Her family emphasizes respect, hard work, and community, values she carries into her professional life. Living in Burlington, she
    actively participates in local Hispanic cultural events and blends Mexican customs with the New England lifestyle, creating a hybrid identity that influences her perspectives, food preferences, and
    social interactions.
