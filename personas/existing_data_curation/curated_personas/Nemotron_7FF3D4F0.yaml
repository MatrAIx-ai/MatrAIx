  career_goals: Over the next few years, Yesenia aims to move from a front‑line representative to a team lead position, where she can mentor newer agents and shape service processes. She plans to earn a
    Customer Success certification and take community‑college courses in business management to strengthen her supervisory skills. Long‑term, she envisions combining her professional experience with her
    cultural heritage by opening a small Mexican‑style bakery or catering service in Burlington, allowing her to support her community while exercising her entrepreneurial spirit.
