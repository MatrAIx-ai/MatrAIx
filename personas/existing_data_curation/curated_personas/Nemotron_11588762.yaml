personas:
  professional: Ricky Duckett is a veteran cement mason with over three decades mastering concrete mixing, terrazzo finishing, and blueprint interpretation, who blends a pragmatic, safety‑first mindset
    with a curiosity for new admixtures, and they leverage that balance to mentor apprentices while charting a path toward ACI Certified Concrete Finisher status and a boutique decorative‑concrete business
    for local wineries.
  sports: Ricky Duckett is a devoted fan of the San Francisco Giants and the Golden State Warriors, spends weekends playing catch‑up softball with the Paso Robles Senior Softball League, hikes the Santa
    Lucia foothills for cardio, and keeps their fishing skills sharp on coastal trips, balancing low‑impact exercise with seasonal team loyalty.
  arts: Ricky Duckett cultivates their creative side by photographing sunset vineyards, drawing inspiration from Ansel Adams and the tonal landscapes of Peter Lik, while evenings often feature the classic
    rock sounds of The Eagles and the folk storytelling of John Denver, which together shape their appreciation for both visual and musical narratives.
  travel: Ricky Duckett enjoys weekend getaways to nearby wine towns like La Cañada and the coastal charm of Santa Barbara, dreams of a culinary pilgrimage through Tuscany's vineyards, and frequently plans
    detailed itineraries that mix vineyard tours, historic sites, and photography opportunities, all while they balance travel costs with their retirement savings plan.
  culinary: Ricky Duckett prefers hearty, farm‑to‑table meals such as rosemary‑roasted lamb with locally sourced asparagus, freshly grilled Pacific salmon seasoned with lemon and dill, and their own hand‑tossed
    pizza topped with San Marzano tomatoes and mozzarella, cooking at a moderate skill level that blends DIY confidence with occasional reliance on a well‑worn cast‑iron skillet.
  core: Ricky Duckett blends a hands‑on, community‑rooted work ethic with a curious streak for new concrete techniques, a pragmatic approach to money, a disciplined health routine despite occasional neglect,
    and a love for wine, photography, and weekend softball that keeps life balanced at 56, and they navigate each day with quiet confidence.
background:
  cultural: Ricky is a fourth‑generation Californian of European (primarily German and Irish) ancestry. Raised in a working‑class family in the Central Coast region, he internalized values of hard work,
    self‑reliance, and community participation. His upbringing emphasized traditional family life, modest church involvement, and respect for practical craftsmanship. Living in Paso Robles, he blends the
    agricultural and wine‑country culture—appreciating local foods, festivals, and the natural landscape—while maintaining a down‑to‑earth, pragmatic worldview. This cultural backdrop informs his commitment
    to quality workmanship, his interest in sustainable building practices, and his active role in community events.
