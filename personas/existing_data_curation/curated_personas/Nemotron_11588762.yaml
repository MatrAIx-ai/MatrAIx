  career_goals: Ricky aims to transition from daily on‑site work to a supervisory role, eventually becoming a foreman who coordinates multiple crews on larger commercial projects. He plans to earn ACI Certified
    Concrete Finisher credentials and to launch a boutique business specializing in high‑end terrazzo and decorative concrete for local wineries, restaurants, and boutique hotels. His ambitions include
    mentoring the next generation of skilled masons, contributing to local building‑code committees, and achieving financial security that allows a comfortable retirement while still engaging in selective
    project consulting.
