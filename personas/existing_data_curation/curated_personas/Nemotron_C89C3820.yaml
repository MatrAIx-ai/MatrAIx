  hobbies: '["Gardening", "Reading historical fiction and non-fiction", "Knitting", "Quilting", "Birdwatching", "Genealogy", "Volunteer reading program at the library", "Cooking traditional Appalachian
    recipes", "Attending church choir", "Crossword puzzle solving"]'
  career_goals: Although retired from formal employment, Nicole aims to mentor emerging teachers through volunteer tutoring programs at the local high school and to serve as a senior advisor for the school
    district's curriculum committee. She aspires to compile and publish a regional family history volume through the Kanawha County Historical Society, preserving oral histories and pioneering research
    methods. Nicole wishes to author a memoir that blends personal narrative with reflections on educational change over the past six decades. Additionally, she seeks to champion senior accessibility by
    advising the city council on transportation and health services, and to lead a community garden project that promotes intergenerational learning and sustainable practices.
