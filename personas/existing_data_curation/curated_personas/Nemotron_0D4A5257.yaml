  career_goals: Sonya aims to secure a tenure‑track faculty position at a regional university where she can lead an interdisciplinary research group focused on sustainable energy materials and innovative
    measurement techniques. She aspires to obtain independent funding from federal agencies, publish high‑impact papers, and translate her findings into practical solutions for industry partners. Over the
    next five years, she plans to mentor graduate students, develop a community STEM outreach program, and influence state energy policy. Balancing professional ambition with family life, she seeks a stable
    career trajectory that minimizes stress by setting realistic milestones and fostering a supportive lab environment.
