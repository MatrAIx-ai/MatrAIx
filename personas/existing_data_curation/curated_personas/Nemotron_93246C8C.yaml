personas:
  professional: Geoffrey Roberts is a veteran retail specialist who leverages their talkative charm, methodical planning, and data‑driven mindset to deliver personalized service and upsell effectively,
    positioning themselves for a supervisory role and a future consulting practice.
  sports: Geoffrey Roberts is an avid waterside enthusiast who spends mornings fishing on the Intracoastal Waterway, competes in the Boynton Beach Pickleball Club league, and roots for the Miami Dolphins
    and Miami Marlins, balancing competitive play with social camaraderie.
  arts: Geoffrey Roberts is a dedicated concert‑goer who fills their weekends with live music ranging from classic rock legends like Bruce Springsteen to Latin salsa icons such as Marc Antonio, while also
    enjoying community theater productions at the local arts center.
  travel: Geoffrey Roberts is a meticulous planner who favors short cruises to the Bahamas, cultural tours of Cartagena, and weekend road trips to Key West, combining a love of tropical scenery with an
    eye for budget‑friendly itineraries.
  culinary: Geoffrey Roberts is a competent home chef who experiments with seafood dishes like grilled snapper with mojo sauce, ceviche, and jerk shrimp, seasoning them with cilantro, lemongrass, and tropical
    herbs cultivated in their backyard garden.
  core: Geoffrey Roberts is a competitive, talkative retail veteran who balances tech curiosity, community service, and a love of seaside life, even if they occasionally overindulge in gadget upgrades.
background:
  cultural: Geoffrey is a white American with roots in the Midwest, raised in a traditional middle-class household that emphasized self-reliance and community involvement. After moving to Boynton Beach,
    Florida, he has embraced the coastal lifestyle and Southern hospitality of Palm Beach County, integrating the region's diverse cultural influences - particularly Latin and Caribbean culinary flavors
    - into his daily life. He celebrates classic American holidays such as Thanksgiving and the Fourth of July, while also participating in local festivals and church gatherings that reflect the area's
    multicultural spirit.
