persona_description: A policy analyst who specializes in the analysis of national energy policies, particularly those related to gas supply, demand, and efficiency measures. Their research interests include,
  but are not limited to, the economic impacts of gas shortages, the potential for energy efficiency and fuel shifting to reduce gas demand, and the implementation of comprehensive national energy policies
  to address gas supply and demand mismatches. They are interested in the potential for cost-savings and productivity benefits for industry while helping meet Australia's emissions and productivity targets.
