personas:
  professional: Kuo Hah is a 22‑year‑old aspiring arts manager who leverages their strong communication, event‑coordination prowess, and fluency in Mandarin and English to design inclusive community art
    festivals, while their meticulous planning and charismatic stage presence keep volunteers and audiences engaged.
  sports: Kuo Hah is a 22‑year‑old who enjoys weekend hikes in Montana de Oro State Park, runs with the San Luis Obispo Running Club, supports the Cal Poly Mustangs and follows the LA Dodgers, and balances
    a moderate fitness routine with yoga classes that help maintain flexibility for photography outings.
  arts: Kuo Hah is a 22‑year‑old who frequents local galleries, curates pop‑up exhibitions featuring artists such as Takashi Murakami, Ai Weiwei, and local painter Maya Ortiz, and spends open‑mic nights
    performing spoken‑word pieces inspired by speculative fiction authors like N.K. Jemisin.
  travel: Kuo Hah is a 22‑year‑old who prefers carefully planned art‑focused trips, having explored the galleries of Kyoto, the street murals of Berlin, and dreaming of attending the Venice Biennale, while
    budgeting travel funds through a dedicated travel savings jar and using public transit wherever possible.
  culinary: Kuo Hah is a 22‑year‑old who experiments with fusion dishes like miso‑marinated grilled salmon tacos, incorporates Sichuan peppercorns into avocado toast, and enjoys cooking with fresh California
    produce such as figs and heirloom tomatoes, though they sometimes over‑season in excitement.
  core: Kuo Hah is a 22‑year‑old endlessly curious arts enthusiast who blends meticulous organization with a gregarious flair, turning every community event into a vibrant cultural bridge while occasionally
    over‑booking their calendar.
background:
  cultural: Kuo is a second‑generation East Asian American of Chinese descent, raised in a bilingual household where Mandarin was spoken alongside English. His family maintains traditional customs such
    as celebrating Lunar New Year, practicing calligraphy, and preparing homemade dumplings, while also embracing the multicultural environment of Southern California and the artistic community of San Luis
    Obispo. This blend of heritage and local influence shapes his appreciation for both classical Chinese art and contemporary Western creative expressions.
attributes:
  skills: '[''Public speaking'', ''Event coordination'', ''Social media management'', ''Graphic design (Adobe Photoshop, Canva)'', ''Digital photography'', ''Basic video editing'', ''Bilingual communication
    (Mandarin, English)'', ''Research and synthesis'', ''Organizational planning'']'
  hobbies: '[''Visiting art galleries'', ''Live‑music and open‑mic events'', ''Digital photography'', ''Chinese calligraphy'', ''Cooking fusion cuisine'', ''Hiking in Central Coast'', ''Reading speculative
    fiction'', ''Volunteer art workshops'']'
  career_goals: Kuo aims to enroll in a community‑college program in Arts Management or Communications within the next year, with the long‑term goal of becoming an arts and cultural program director for
    a municipal arts council or nonprofit organization. He aspires to curate inclusive exhibitions that highlight East Asian contemporary artists and to develop community outreach initiatives that engage
    diverse audiences in San Luis Obispo. Ultimately, he hopes to leverage his organized, sociable nature to lead large‑scale cultural festivals and become a recognized bridge between Asian and Western
    art communities.
