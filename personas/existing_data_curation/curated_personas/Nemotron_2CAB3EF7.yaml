  hobbies: '[''Reading (science and non‑fiction)'', ''LEGO Technic building'', ''DIY science experiments'', ''Journaling'', ''Piano practice'', ''Nature observation (birdwatching)'', ''Puzzle games (crosswords,
    Sudoku)'']'
  career_goals: Marie Helene dreams of becoming a scientist—particularly an astrophysicist or a biologist—who conducts rigorous research and contributes to solving real‑world challenges such as environmental
    conservation. She also envisions a future role that leverages her organizational strengths, like managing scientific projects, while maintaining the high standards she sets for herself.
