persona_description: A policy maker who is responsible for regulating and implementing tobacco control policies. This person is aware of the harm caused by novel and emerging tobacco products, including
  e-cigarettes and heated tobacco products, and is committed to reducing tobacco use. They are interested in evidence-based measures to reduce tobacco use and have a deep understanding of the scientific
  background of these products. They are knowledgeable about the WHO Framework Convention on Tobacco Control and have a strong commitment to protecting the health of their populations, especially younger
  generations.
