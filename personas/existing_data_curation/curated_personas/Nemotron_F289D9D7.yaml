  hobbies: '[''Street Photography'', ''Contemporary Art Galleries'', ''Spontaneous Road Trips'', ''Hiking in Sierra Foothills'', ''Experimental Cooking'', ''Live Music & Open Mic Nights'', ''Playing Acoustic
    Guitar'', ''Science‑Fiction Reading'', ''DIY Smart‑Home Projects'', ''Community Food Bank Volunteering'']'
  career_goals: Ricky aims to become a regional logistics director within the next five years, overseeing multi‑modal distribution networks across the West Coast. He is passionate about greening the supply
    chain and plans to lead initiatives that reduce carbon emissions through electric‑vehicle fleets and renewable‑energy‑powered warehouses. His curiosity drives him to stay at the forefront of AI‑enabled
    routing and predictive analytics, and he hopes to build a cross‑functional team that blends data science with creative problem‑solving. In the longer term, he envisions launching a boutique consultancy
    that helps midsize firms redesign their distribution models while embedding an artistic, human‑centered culture.
