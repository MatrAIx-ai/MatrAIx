personas:
  professional: A newborn named Gregory Martin currently has no professional role, but his early fascination with sorting colored blocks, methodical grasp of cause and effect, and innate compassion for
    the crying baby next to him suggest a future as an organized, empathetic developmental psychologist who will blend rigorous research with a deep desire to ease others' emotional distress.
  sports: A newborn named Gregory Martin enjoys rhythmic tummy time to the theme song of the local baseball team, the Springfield Cardinals, and his parents plan to enroll him in baby swimming lessons at
    the community YMCA and later introduce him to toddler soccer clubs, hoping his early exposure to team chants and gentle exercise will nurture his balanced need for social activity and solitary play.
  arts: A newborn named Gregory Martin is surrounded by soft classical lullabies by Mozart, gentle jazz ballads from Ella Fitzgerald, and high‑contrast prints of Van Gogh’s Starry Night in his nursery,
    fostering an early appreciation for music and visual art that aligns with his curious, unconventional thinking and compassionate disposition.
  travel: A newborn named Gregory Martin has already experienced a short weekend road trip to the nearby coastal town of Seaside, where he gazed at ocean waves from his car seat, and his parents anticipate
    future family vacations to the cherry blossoms of Kyoto and the national parks of Utah, balancing the desire for new sensory experiences with the comfort of familiar routines.
  culinary: A newborn named Gregory Martin’s diet consists of breastmilk and occasional organic pureed carrots, sweet potato, and avocados, and his parents, who enjoy experimenting with gentle flavors,
    often add a pinch of cinnamon to his purees, reflecting his early exposure to sweet, soothing tastes that suit his sensitive palate and calm temperament.
  core: Gregory Martin, a newborn with a keen eye for tidy surroundings, a tender heart for fellow babies, and an innate tendency to worry, already navigates his world with methodical curiosity, compassionate
    co‑operation, and occasional fussiness over minor discomforts.
