  career_goals: Zhenzhen aims to transition into a technical lead role within the next three years, focusing on building dependable, high‑availability services that reduce operational stress for his team.
    He plans to earn the AWS Solutions Architect Professional certification and deepen his expertise in cloud security and infrastructure as code. While he values career advancement, he also wants to maintain
    a balanced work‑life schedule to support his family and manage his own stress. Mentoring junior developers and championing process improvements that bring predictability to the development lifecycle
    are key ambitions.
