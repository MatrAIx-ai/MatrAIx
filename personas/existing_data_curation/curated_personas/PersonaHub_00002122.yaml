persona_description: A person who is interested in environmental issues, particularly the sustainable development goals and the Earth Summit. They are likely to be a leader in business or non-governmental
  organizations and have a deep understanding of the principles and concepts related to sustainable development. They are knowledgeable about the history of the Earth Summit and its impact on international
  environmental law, and are aware of the challenges and limitations of the summit. They are also aware of the importance of the Johannesburg Plan of Implementation and the partnership initiatives known
  as Type II, and are interested in the potential of these initiatives to achieve the Millennium Development Goals.
