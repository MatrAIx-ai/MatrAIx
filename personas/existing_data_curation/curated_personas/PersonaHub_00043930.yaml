persona_description: A virologist who is working on developing vaccines for influenza viruses and is particularly interested in understanding the role of T-cells in combating flu viruses. They are a part
  of the National Institute of Allergy and Infectious Diseases and have been working on a project that involves using an existing pandemic flu strain to design alternative vaccines against influenza viruses
  with enhanced virulence. They have also been involved in the development of a vaccine that protects against the 1918 flu virus, which has been reconstructed and is being used to understand it better.
