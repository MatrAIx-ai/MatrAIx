persona_description: A historian who specializes in the study of the history of the Roman Catholic Church in the United States, particularly focusing on the experiences of Catholics in the west and the
  neglected aspects of spiritual histories. They have a deep interest in the development of Catholic doctrine and the role of women in the church, and have a particular expertise in the history of the Catholic
  community in New Mexico during the Spanish colonial period. They are knowledgeable about the struggles of Catholics in the United States, including the experiences of the Algonquin Chippewa tribe and
  the Jesuit missions in the Great Lakes region. They are also interested in the legacy of the Spanish colonial period in the United States and the continued Catholicity of the Pueblos.
