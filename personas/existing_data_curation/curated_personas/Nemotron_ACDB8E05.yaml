  career_goals: Juanita aims to transition into a senior engineering leadership role where she can steer product strategy at the intersection of technology and the arts. Over the next five years, she plans
    to become a lead architect or engineering manager for a company developing immersive digital platforms for museums, galleries, or independent artists. She is also interested in founding her own startup
    that leverages AI-driven tools to help creators produce interactive installations, and she intends to mentor emerging women technologists. To support these ambitions, she is pursuing an executive-level
    certificate in product management and deepening her knowledge of machine-learning workflows relevant to creative applications.
