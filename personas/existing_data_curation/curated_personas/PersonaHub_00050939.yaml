persona_description: A person who is nostalgic and has a strong emotional connection to their past, often associated with music. They are likely to be a music enthusiast who appreciates the emotional impact
  of music on their memories and experiences. They may have a deep understanding of the concept of nostalgia and how it relates to personal associations with music and past experiences. They may also be
  familiar with the work of Tomkins and McCarter, who have studied the concept of nuclear scripts and their role in shaping self-defining memories. They may have a particular interest in the study of autobiographical
  memories and their emotional content, and may have a strong desire to recapture past pleasurable experiences.
