  hobbies: '[''Soccer (local league)'', ''Cooking Mexican cuisine'', ''Listening to regional Mexican music'', ''Participating in community festivals'', ''Barbecue gatherings with family'', ''Gardening'',
    ''Photography of coastal landscapes'', ''Volunteering at community centers'', ''Weekend road trips along Southern California'']'
  career_goals: Fernando aims to advance from his current supervisory role to a facility manager position within the next three to five years, overseeing multiple sites and broader operational functions.
    He also dreams of eventually launching his own community‑focused cleaning business that offers flexible work schedules for employees, reflecting his own preference for practicality combined with flexibility.
    Improving his organizational skills to reduce personal stress and achieving a better work‑life balance for his family are central to his professional aspirations.
