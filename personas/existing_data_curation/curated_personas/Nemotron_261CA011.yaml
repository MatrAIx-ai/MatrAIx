personas:
  professional: Ashleigh Manuel, an early‑childhood education program coordinator in Utah County, blends meticulous curriculum design, grant writing, and compliance oversight with a vivid imagination, channeling
    abstract art concepts into lesson plans while rigorously tracking budgets and outcomes to meet state licensing standards.
  sports: Ashleigh Manuel, an enthusiastic hiker and yoga practitioner, spends Saturday mornings tackling the Wasatch foothills with the Wasatch Hiking Club, follows the Utah Jazz and Real Salt Lake avidly,
    and hits the slopes at Park City in winter, though a relentless work ethic sometimes leaves little time for regular gym workouts.
  arts: Ashleigh Manuel, an abstract painter and acoustic guitarist, draws inspiration from artists like Mark Rothko and Yayoi Kusama, listens to Sufjan Stevens and Brandi Carlile while painting, writes
    poetry in a private journal, and regularly attends performances by the Utah Symphony and local indie art shows.
  travel: Ashleigh Manuel, a nature‑loving traveler, frequently weekend‑escapes to Moab’s red canyons and Antelope Island, dreams of exploring Kyoto’s zen gardens and Iceland’s aurora‑lit landscapes, and
    plans trips around grant deadlines and tuition payments, favoring itineraries that blend hiking, cultural museums, and modest budgeting.
  culinary: Ashleigh Manuel, a modestly skilled home cook, favors farm‑to‑table meals like quinoa‑coconut bowls with roasted beets, avocado‑lime toast, and lemon‑dill salmon, delights in experimenting with
    fresh herbs such as basil and cilantro in their kitchen, and indulges in chocolate hazelnut desserts at local cafés after long days of program coordination.
  core: Ashleigh Manuel couples a disciplined, data‑driven career in early‑childhood education with a vivid artistic soul, navigating anxiety through yoga and meticulous budgeting, while constantly seeking
    fresh colors in both curriculum and canvas.
background:
  cultural: Ashleigh was raised in Pleasant Grove, a close-knit suburb of Utah County, where family gatherings, community service, and outdoor recreation are central to daily life. Her family's heritage
    traces back to German and Scandinavian ancestors who settled in the Intermountain West, and she grew up attending local church and school events that emphasized cooperation, modesty, and a strong work
    ethic. While she identifies with the region's values of self-reliance and community involvement, she also actively seeks cultural diversity through attending art workshops, volunteering with multicultural
    youth programs, and traveling beyond the state.
attributes:
