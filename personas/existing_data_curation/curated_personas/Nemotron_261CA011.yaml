  hobbies: '[''Abstract Painting'', ''Reading Contemporary Fiction'', ''Philosophical Essays'', ''Hiking'', ''Yoga'', ''Poetry Writing'', ''Acoustic Guitar'', ''Community Gardening'']'
  career_goals: She aims to earn a Master's degree in Educational Leadership within the next two years, positioning herself for promotion to Director of Early Childhood Services in a regional school district.
    Long-term, Ashleigh hopes to spearhead an innovative, arts-focused preschool model that serves diverse families across Utah County and to influence state policy on early childhood education funding.
    She also intends to develop a mentorship program for new educators, helping them cultivate both instructional excellence and personal well-being.
