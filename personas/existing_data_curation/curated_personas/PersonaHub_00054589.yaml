persona_description: A loyal and dedicated public servant who played a significant role in the administration of Indian affairs in Upper Canada, particularly in the 18th century. Selby was known for his
  thoroughness and diligence in his work, and his contributions were recognized by his peers and superiors. He was appointed to several key positions in the Indian Department, including that of general
  supervisor and auditor general. Despite his health issues, he continued to play an active role in the department and was respected for his expertise and judgment. His contributions were recognized by
  his peers and superiors, and he was appointed to the Executive Council in 1808. His tenure as auditor general lasted until his death, and he was known for his conscientiousness and attention to detail.
  He was also a prominent member of the Loyal and Patriotic Society of Upper Canada, and his proposals for the creation of the society were credited to him. Despite his success, he became ill in the spring
  of 1813 and died later that year.
