personas:
  professional: Orisbel Riverarivera, an aspiring visual storyteller, channels their curiosity and methodical planning into sketching vibrant characters and designing colorful murals, blending a love for
    science experiments with artistic exploration.
  sports: Orisbel Riverarivera, a lively member of the local park’s junior soccer club, loves chasing the ball with friends, follows the hometown professional team City FC, dives into seasonal swimming
    at the community pool during summer, and keeps a notebook of drills and match scores organized with colored stickers.
  arts: Orisbel Riverarivera, a budding artist, spends afternoons sketching comic‑style heroes, paints elaborate Día de los Muertos‑inspired murals on the school hallway, practices piano pieces by Mozart
    and Yiruma, crafts intricate papel picado for family celebrations, and studies the works of Frida Kahlo and Diego Rivera for inspiration.
  travel: Orisbel Riverarivera enjoys planning family trips with a colorful map spread across their bedroom floor, dreams of experiencing the vibrant street festivals of Oaxaca and the towering museums
    of Washington, D.C., and prefers group travel where they can sketch landscapes and share stories with siblings.
  culinary: Orisbel Riverarivera delights in tasting spicy tacos al pastor, sweet churros dusted with cinnamon, and helps stir guacamole with fresh avocados, lime, and cilantro, yet their cooking skill
    remains beginner level, often leaving floury fingerprints on the kitchen counter after a daring attempt at homemade quesadillas.
  core: Orisbel Riverarivera blends boundless curiosity for art and science with disciplined organization, turning each day into a colorful experiment while juggling soccer, piano, and a meticulous allowance
    ledger.
background:
  cultural: Orisbel comes from a Mexican‑American family that speaks Spanish at home and celebrates traditions such as Día de los Muertos, Las Posadas, and cooking tamales together. Living in Louisville,
    she also embraces local customs like Kentucky Derby festivities and community picnics, creating a blend of Mexican heritage and Southern culture that influences her art, language, and social life.
