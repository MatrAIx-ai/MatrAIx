  career_goals: Bruce often talks about jobs that have clear rules and let him help others. He imagines becoming an engineer who designs bridges or a wildlife rehabilitator who cares for injured animals,
    because he likes structured work and the chance to be compassionate. He also enjoys the idea of being a firefighter or a police officer, roles that have predictable procedures and a strong sense of
    community service. These ambitions reflect his wish for a stable, predictable career where he can work in small, cooperative teams.
