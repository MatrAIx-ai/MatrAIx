persona_description: A researcher or anthropologist specializing in the analysis of gender, power, and property in forest and agrarian landscapes. They are interested in understanding how gender intersects
  with resource use and access to trees and forests, and how this intersects with historical, social, and environmental constraints. They use a multidimensional approach to analyze the use of trees and
  forest tenure in Africa, considering factors such as rights to own land, control or management of spaces and places, and differences in use of trees and their products. They also consider season, periodic
  events, kin relationships, and neighbourliness reciprocity, and how these factors vary according to different circumstances and relationships. They are likely to be familiar with fieldwork, case studies,
  and African literature review, and have a deep understanding of the complexities and nuances of gender and power dynamics in social and environmental contexts.
