persona_description: A historian who is interested in the study of political behavior and the importance of the imagination in historical interpretations. They are open to new approaches and are willing
  to question the assumptions and directions for interpretation. They appreciate historians like Stephen Hahn and Mark Smith for their ability to force readers to step back and question the way a given
  subject is interpreted. They are interested in the intersection of history and the study of political behavior, and how it can inform our understanding of the past.
