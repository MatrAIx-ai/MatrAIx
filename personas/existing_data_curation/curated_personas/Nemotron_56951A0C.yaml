personas:
  professional: Donald Choe is a retired community organizer who channels decades of informal sales, event coordination, and persuasive public speaking into a modest consulting side gig, mentoring local
    small‑business owners on customer outreach and sales tactics while leveraging their improvisational style, competitive drive, and flexible approach to deadlines.
  sports: Donald Choe is an avid Chicago Bears supporter who never misses a Sunday game, participates in a local senior bridge league during the off‑season, and joins the Lakefront Trail Gentlemen’s Walk
    for light jogging, balancing their competitive edge with low‑impact exercise and a love for community sports camaraderie.
  arts: Donald Choe is a regular at the Green Mill jazz club, where they revel in live performances by Wynton Marsalis and local bebop ensembles, frequently attend Goodman Theatre productions, and volunteer
    backstage for community theater, using their talkative nature to network with artists and patrons alike.
  travel: Donald Choe is a weekend road‑trip enthusiast who explores national parks such as Badlands and Shenandoah, captures nature photography, shares stories at senior‑center sessions, yet they avoid
    long overseas trips due to budgeting worries and a tendency to stress over unfamiliar settings, preferring well‑planned drives with historic small‑town stops.
  culinary: Donald Choe is a home cook who specializes in Midwestern comfort fare like chicken pot pie, cornbread, and apple crisp seasoned with caraway from their balcony garden, occasionally indulges
    in deep‑dish pepperoni pizza, and admits to over‑seasoning as a quirky habit while they host potluck gatherings for friends.
  core: Donald Choe is a charismatic, competitively spirited retiree who blends Midwestern pragmatism with a love for jazz, community storytelling, and small‑business mentoring, all while they juggle a
    relaxed approach to planning and a habit of worrying about the little things.
background:
  cultural: 'Donald grew up in a white, middle‑class family on the South Side of Chicago, with deep German‑American roots that emphasized hard work, punctuality, and community responsibility. Raised in
    a Catholic household, he was taught the value of service and modesty, while the vibrant multicultural tapestry of Chicago exposed him to a broad range of perspectives. This blend of Midwestern pragmatism
    and urban openness shaped his balanced outlook: he respects tradition yet remains curious about new ideas, and values personal connections as a cornerstone of both his identity and his daily life.'
