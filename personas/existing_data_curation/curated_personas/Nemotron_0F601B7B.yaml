  hobbies: '[''gardening'', ''quilting'', ''reading historical fiction'', ''listening to classic pop and folk music'', ''birdwatching'', ''walking local trails'', ''baking artisan breads'', ''volunteering
    at church soup kitchen'', ''small book club participation'']'
  career_goals: In retirement, Destany aims to deepen her supportive role within her family and community, guided by her practical curiosity. She plans to mentor her grandchildren in cooking and sewing,
    learn new digital tools to stay connected, lead a small neighborhood garden group where she can share both proven and lightly explored growing techniques, and compile her family’s oral histories and
    recipes. Preserving her independence and health to continue these endeavors remains a primary ambition.
