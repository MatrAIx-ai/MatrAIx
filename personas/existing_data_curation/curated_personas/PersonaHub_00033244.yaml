persona_description: A person who is deeply concerned about the impact of human activities on the environment and the potential consequences of climate change. This person is aware of the root causes of
  climate change, including the destructive effects of land management practices, the use of fossil fuels, and the unchecked use of mental factors like craving, aversion, and delusion. This person is committed
  to adopting a path of principles and practices that can help mitigate the effects of climate change and reduce suffering caused by it. They are open to learning and adopting new ways of thinking and acting,
  and they are willing to stand up against vested interests that oppose change. They are also deeply concerned about the well-being of all living beings and the health of the planet, and they are committed
  to taking action to protect the Earth's ecosystems and living organisms.
