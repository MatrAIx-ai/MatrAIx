personas:
  professional: Julio Naranjo is an aspiring robotics enthusiast who translates the strategic planning of Minecraft and League of Legends into designing and programming small robots for his school club,
    where they apply an organized, methodical approach while confidently asserting ideas during collaborative builds.
  sports: Julio Naranjo is a dedicated soccer player in a local youth league who cheers for Manchester United and follows the FIFA World Cup, balancing teamwork on the field with their need for solitary
    strategy sessions, and they regularly attend weekend matches at the community field.
  arts: Julio Naranjo is a comic‑style illustrator who draws vibrant panels inspired by the rhythmic storytelling of regional norteño music and looks up to artists like Jim Lee and Álvaro Orens, spending
    evenings sketching while their headphones play the latest corridos, which helps them unwind from daily stress.
  travel: Julio Naranjo enjoys planning virtual trips through Minecraft worlds and dreams of visiting historic sites like the pyramids of Teotihuacan and urban marvels such as Tokyo, but budget constraints
    mean they often settle for weekend road trips to nearby beaches with family.
  culinary: Julio Naranjo loves helping their family prepare tacos al pastor and mole poblano, skillfully chopping fresh cilantro, pineapple, and ancho chilies, while their penchant for precise recipes
    mirrors the meticulous planning they apply to video games, even if occasional spice mishaps lead to extra tears.
  core: Julio Naranjo blends a strategic gamer’s mind with hands‑on robotics, soccer teamwork, and comic‑style art, navigating life with organized determination, occasional anxiety‑driven worry, and a love
    for family‑cooked flavors.
background:
  cultural: Julio comes from a Mexican‑American family rooted in South Gate, a city with a vibrant Latino community. He grew up speaking both Spanish and English, celebrating cultural traditions such as
    Día de los Muertos, Cinco de Mayo, and family gatherings centered around food and music. The strong emphasis on familia and respeto shapes his cooperative yet assertive interactions. His community blends
    Mexican heritage with the multicultural fabric of Los Angeles County, exposing him to diverse artistic, culinary, and technological influences while keeping a deep connection to his Mexican roots.
