persona_description: A political activist and intellectual, known for their contributions to the anarchist movement and their work in the labor movement. They were active in the US and in Russia during
  the early 20th century, and their ideas and writings continue to influence anarchist and socialist movements around the world. They were expelled from the US for their anti-war activism and were later
  allowed to leave the country to Russia, where they played a key role in the anarchist movement. They were also involved in the founding of the Mexican Liberal Party and the development of the labor movement
  in Mexico. Their work includes articles, books, and speeches on anarchism, communism, and the labor movement, as well as their autobiography and the anthology of their writings, "Exquisite Rebel."
