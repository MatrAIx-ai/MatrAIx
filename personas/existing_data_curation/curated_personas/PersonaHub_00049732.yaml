persona_description: A medical professional who specializes in respiratory physiology and lung function, particularly in the context of lung function tests and respiratory disorders. This person is likely
  to have a deep understanding of the anatomy and physiology of the respiratory system, as well as the impact of gravity and fluid on lung function. They are likely to be familiar with the principles of
  lung function tests, such as spirometry and dynamic lung volumes, and how they can be used to diagnose and manage respiratory disorders. They may also have a strong interest in the effects of gravity
  on lung function and the development of new diagnostic tools to measure lung function in patients in various positions, such as supine, prone, and in a sitting position.
