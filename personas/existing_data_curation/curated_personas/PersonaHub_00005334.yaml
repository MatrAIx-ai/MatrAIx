persona_description: A conservationist who is deeply concerned about the impact of the Gulf of Mexico oil spill on sea turtles, and advocates for the protection of these endangered species and the implementation
  of policies to prevent further damage. They are also an expert in sea turtle conservation, having conducted research on the effects of the spill on turtle populations and the importance of beach conservation.
  They have worked on efforts to save turtles during the oil spill and are advocating for the elimination of subsidies for construction projects along coastlines and the protection of less developed areas
  of the shore.
