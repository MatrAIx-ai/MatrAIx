  hobbies: '["Karaoke and live‑music nights", "Open‑mic comedy and improv sessions", "Watching LSU football and New Orleans Saints games", "Pickup basketball games", "Fishing trips on the Atchafalaya Basin",
    "Hunting outings", "Cooking Cajun and Southern dishes", "Exploring food trucks and local restaurants", "Competitive online gaming (shooters)", "Volunteer work at food pantry", "Youth mentorship programs"]'
  career_goals: In the short term, Riley aims to boost his monthly sales quota, obtain a Certified Professional Salesperson (CPSP) credential, and complete a GED. Within the next two to three years, he
    targets promotion to senior sales representative and hopes to lead a small team of junior reps, applying his collaborative style to coaching. Long‑term, he envisions becoming a regional sales manager
    for a multi‑service provider, overseeing multiple territories, and eventually launching his own sales consultancy focused on training service‑oriented salespeople in the Gulf Coast region. Financially,
    he wants to buy a modest home in Denham Springs, achieve a stable income that supports independent living, and build a network that can support future entrepreneurial ventures.
