personas:
  professional: Riley Jerkins is a 22‑year‑old sales associate at a regional service provider in Denham Springs, where they channel a naturally talkative, relationship‑focused style into building long‑term
    client connections, expertly navigating Salesforce and meeting targets while balancing a preference for structured pipelines with the flexibility needed for the fast‑paced floor, all in pursuit of a
    CPSP certification and a future leadership role.
  sports: Riley Jerkins is an avid fan of the LSU Tigers football team and the New Orleans Saints, regularly organizes pickup basketball games at the Denham Springs Community Center, and spends quiet weekends
    fishing the Atchafalaya Basin, though they sometimes skip the Friday night gym in favor of marathon gaming sessions with friends.
  arts: Riley Jerkins lights up karaoke nights with a repertoire of classics, showcases quick‑witted jokes at open‑mic comedy sessions, and immerses themselves in the zydeco beats of Clifton Chenier and
    the modern storytelling of Zachary Richard while spinning vinyls of The Neville Brothers on relaxed evenings.
  travel: Riley Jerkins prefers spontaneous road trips with friends, having already explored the lively French Quarter of New Orleans, fished the reeds of the Atchafalaya Basin, and taken a weekend getaway
    to Austin’s live‑music scene, while dreaming of a future cross‑country drive to the Pacific Northwest to combine mountain hiking with coastal surfing once their finances solidify.
  culinary: Riley Jerkins loves whipping up a hearty gumbo at home—tossing Andouille sausage, shrimp, okra, and a dark roux into a simmering pot—while also hunting for the best crawfish po’boys from local
    food trucks, and they’re notorious for over‑seasoning dishes in an enthusiastic quest to capture the bold flavors of their hometown cuisine.
  core: Riley Jerkins is a sociable 22‑year‑old sales rep who balances a love for community gatherings, loud karaoke, and spontaneous outdoor adventures with an aspiring plan to lock down a modest home
    and a future leadership role, all while occasionally letting their flexible habits flirt with budget headaches.
background:
  cultural: Riley grew up in a working‑class, white family in Denham Springs, a suburban community in Livingston Parish, Louisiana. The local culture blends Southern hospitality, church‑centered community
    life, and a love for outdoor recreation and regional cuisine. He was raised with values of friendliness, respect, and a strong sense of community, often attending church events and local festivals like
    Mardi Gras parades. Proximity to Cajun and Creole influences exposed him to zydeco music, gumbo, and a relaxed, improvisational social vibe. These Southern cultural threads shape his easy‑going demeanor,
    his appreciation for group activities, and his pride in regional traditions.
attributes:
  skills: '["Customer relationship management", "Persuasive communication", "Negotiation and objection handling", "Active listening", "Networking and community outreach", "Basic CRM software proficiency
