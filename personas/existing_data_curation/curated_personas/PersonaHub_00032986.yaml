persona_description: A historian who specializes in the study of codex creation and preservation, particularly the techniques used in the production of pre-Columbian Mesoamerican codices and the intermediate
  stages of the scroll to codex transition in East Asia. Her/his research interests include the development of the codex format, the preparation of animal skins for writing, and the defects that can appear
  in the final product. She/he is knowledgeable about the different stages of the codex production process, including the experiments of earlier centuries and the intermediate stages of scrolls and books
  that were printed only on one side of the paper. The persona is also interested in the history and culture of the pre-Columbian Mesoamerican civilizations and the New World codices that were written before
  the Spanish conquests.
