personas:
  professional: Adolfo Goenaga is a seasoned electrician who blends deep knowledge of the National Electrical Code with a hands-on curiosity for IoT and solar tech, delivering meticulous wiring solutions
    while thriving in the solitude of his workshop and resisting rigid schedules, and they take pride in troubleshooting complex circuits without needing a team.
  sports: Adolfo Goenaga kicks off his day with solitary beach walks along Miami's shoreline, casts a line with the Miami Anglers' Association on weekends, follows the Miami Heat and Inter Miami CF loyally,
    squeezes in occasional weight-training sessions at a modest home gym to keep his back strong for heavy lifts, and they spend rainy afternoons watching highlights of the Heat on TV to stay connected
    to the sport.
  arts: Adolfo Goenaga fuels his creative side by assembling custom smart-home gizmos while the smooth vocals of Celia Cruz, the mellow tones of Ibrahim Ferrer, and the cinematic scores of Hans Zimmer play
    in the background, occasionally escapes into cyber-punk worlds with William Gibson's Neuromancer, and they keep a sketchpad by the workbench to doodle circuit diagrams that double as abstract art.
  travel: Adolfo Goenaga prefers spur-of-the-moment getaways, often packing a bike for a sunrise ride to Key West, jetting to the Bahamas for a weekend of snorkeling, dreaming of an eco-tour of Costa Rica's
    rainforests, keeps travel budgets lean and books flights last-minute, and they maintain a travel map on the wall where they pin the next destination they aim to explore.
  culinary: Adolfo Goenaga plates a fragrant ropa vieja with slow-cooked flank steak, cumin, and olives, serves arroz con pollo seasoned with sazón and fresh cilantro from his herb garden, finishes meals
    with homemade mojo sauce and crispy tostones, reflects a confident but modest culinary skill set, and they often experiment by adding a dash of smoked paprika to traditional recipes for a personal twist.
  core: Adolfo Goenaga is a solitary problem-solver who marries electrifying precision with a love for tinkering, feeds his curiosity through DIY gadgets, balances disciplined work with spontaneous bursts
    of creative cooking and beach-side reflection, and they occasionally forget to answer emails until the last minute.
background:
  cultural: Adolfo grew up in a Cuban‑American household in Miami‑Dade County, where Spanish was spoken at home and Cuban traditions were celebrated. His family maintains strong ties to the island’s cultural
    heritage, including Catholic observances, community gatherings, and a love for Cuban food, music, and cinema. While he prefers solitude, these cultural influences shape his values of hard work, resilience,
    and respect for community. Bilingual in Spanish and English, he navigates both cultures fluidly, and his identity as a Cuban‑American informs his practical approach to work and his appreciation for
    innovative solutions that improve everyday life.
