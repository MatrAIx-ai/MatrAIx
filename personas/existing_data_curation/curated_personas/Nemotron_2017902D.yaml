  career_goals: Julie aims to leverage her structured yet adaptable approach to ascend to senior producer roles within a major streaming platform while maintaining the creative freedom to helm independent
    projects that explore mental‑health and social‑justice themes. Over the next five years she plans to launch a boutique production company that focuses on short‑form documentaries and narrative series
    highlighting underrepresented voices in the Bay Area. She also seeks mentorship opportunities to refine her directing craft, with the ambition of directing a feature film by her early thirties. Additionally,
    she is committed to instituting well‑being practices on set, advocating for mental‑health resources for crew members, and building a reputation as a reliable, collaborative leader who can deliver projects
    on time and on budget.
