  career_goals: Hoping to earn a scholarship, Alejandro plans to study visual communication or community arts at a college in the Mid‑Atlantic region. His long‑term ambition is to become a community arts
    coordinator or art therapist, designing inclusive workshops that empower immigrant youth and promote mental wellbeing through creative expression. He also dreams of using his design skills to work on
    socially‑focused graphic design projects, producing culturally resonant campaigns for non‑profits. In the near future, he aims to develop a portfolio, secure an internship at a local cultural center,
    and lead a youth mural project that celebrates Salvadoran heritage.
