personas:
  professional: An aspiring community‑arts coordinator in training, Alejandro Davila blends bilingual fluency, hand‑drawing and digital illustration skills, and a natural empathy to design inclusive workshops
    that empower immigrant youth, and they channel their organizational flexibility into every project.
  sports: A passionate soccer enthusiast, Alejandro Davila plays midfield for the Columbia Youth Soccer Club league, cheered on by their love for D.C. United in the MLS and follows the Washington Capitals
    for occasional ice‑hockey thrills, and they maintain fitness through three weekly pickup games, light jogging, and stretch routines to prevent injuries.
  arts: A creatively curious teen, Alejandro Davila fills sketchbooks with original characters, experiments with digital illustration on a tablet using GIMP, helps orchestrate collaborative murals on legal
    walls, draws inspiration from street‑art icons like Shepard Fairey, the emotive colors of Frida Kahlo, and the rhythmic beats of Bad Bunny and Tame Impala, and they unwind by devouring sci‑fi novels
    by Octavia Butler and Liu Cixin.
  travel: An adventurous planner, Alejandro Davila prefers modest, friend‑group road trips and occasional city‑breaks, having already explored Washington DC, New York, and a summer exchange in Mexico City,
    they now dream of strolling through Barcelona’s Gothic Quarter and hiking the volcanic landscapes of Iceland, while balancing a limited allowance and family responsibilities.
  culinary: A budding home chef, Alejandro Davila loves preparing pupusas stuffed with cheese and loroco, yuca frita, and tamales with masa and pork, while also experimenting with homemade salsa verde,
    pizzas topped with fresh basil, and occasional sushi rolls, and they showcase a confident yet playful cooking style that blends tradition with modern flavors.
  core: Alejandro Davila is a socially vibrant, compassion‑driven teen who mixes sketchbooks with street murals, balances meticulous budgeting with sneaker splurges, and navigates the world through bilingual
    lenses, relentless curiosity, and occasional procrastination on school assignments.
background:
  cultural: Born to Salvadoran immigrant parents who arrived in Maryland after the 1990s civil war, Alejandro grew up in a bilingual household in Columbia, Maryland. Spanish is spoken at home, while English
    is used at school and in the wider community. Family gatherings revolve around traditional dishes such as pupusas, yuca frita, and salsa rosada, and are marked by lively music and celebrations of holidays
    like Día de los Santos and Christmas with a blend of Catholic rites and Salvadoran customs. He participates in the local Hispanic community centre’s events, such as the annual Fiesta Salvadoreña, where
    he helps set up cultural booths and performs in dance showcases. These experiences have instilled a strong sense of solidarity, respect for heritage, and an appreciation for cultural diversity, which
    he brings to his social interactions and artistic expression.
