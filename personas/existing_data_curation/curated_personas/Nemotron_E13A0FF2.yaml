personas:
  professional: A seasoned retail professional, Sabrina Williams leverages three decades of customer service, inventory management, and visual merchandising expertise to mentor staff, streamline POS systems
    like Square and Shopify, and drive sales, while channeling curiosity and practicality toward a store‑manager promotion and future corporate training role, and they inspire teamwork through assertive
    guidance.
  sports: An energetic community participant, Sabrina Williams spends Saturday mornings line‑dancing at the local country hall, hikes the Yadkin River Trail with the Yadkin Trail Hiking Club, cheers on
    the Charlotte Hornets and Carolina Panthers, and balances occasional yoga sessions with a weekly pickleball game at the senior recreation center, while they maintain a flexible fitness routine that
    accommodates occasional knee soreness.
  arts: A creative enthusiast, Sabrina Williams weaves storytelling into their quilts inspired by the folk patterns of William Morris, enjoys scrapbooking set to the classics of Dolly Parton and Alabama,
    devours Agatha Christie mysteries and Hilary Mantel’s historical novels in their book club, and finds inspiration in the films of Nora Ephron and the jazz stylings of Miles Davis during quiet evenings.
  travel: A curious traveler, Sabrina Williams prefers weekend road trips to nearby gems like the Blue Ridge Parkway, Asheville’s art districts, and Savannah’s historic squares, planning itineraries with
    a mix of hiking, local food tours, and boutique shopping, while they save for a dream springtime getaway to the historic streets of Charleston and a future cruise to the Caribbean with their book‑club
    friends.
  culinary: A seasoned home chef, Sabrina Williams delights in cooking Southern comfort staples such as fried chicken with buttermilk brine, collard greens simmered with smoked turkey, sweet‑potato biscuits,
    and peach cobbler, using fresh garden herbs from their community plot and experimenting with spice blends like Cajun paprika, while they host potluck nights that showcase their knack for balancing hearty
    flavors with a health‑conscious eye on sodium.
  core: Sabrina Williams blends pragmatic retail savvy with a social spark, channeling line‑dancing energy and garden‑fresh creativity into a lifelong quest for community‑focused leadership, even if they
    occasionally forget to water their succulents.
background:
  cultural: Sabrina was raised in a small Piedmont town near Salisbury, North Carolina, in a family that emphasized Southern hospitality, church involvement, and community service. As a white Southern American,
    she grew up with traditions such as Sunday family dinners, high‑school football games, and local festivals like the Salisbury Food & Wine Festival. Her upbringing blended respect for longstanding customs
    with an openness to new ideas, reflected in her pursuit of an associate’s degree and her continual learning mindset. Although divorced, she maintains strong ties to her community through church groups,
    volunteer activities, and support of local charities, embodying the resilient yet flexible spirit common to her regional culture.
