  hobbies: '[''Line dancing'', ''Gardening'', ''Cooking Southern cuisine'', ''Potluck hosting'', ''Volunteer work at animal shelter'', ''Book club'', ''Hiking'', ''Scrapbooking'', ''Quilting'', ''Online
    learning (digital marketing)'']'
  career_goals: Sabrina aims to move into a store‑manager role within the next two years, leveraging her leadership and training abilities to oversee a larger team. She hopes to later transition to a regional
    supervisory position or a corporate training specialist, where she can design onboarding programs for new sales associates. While pursuing these goals, she plans to complete a bachelor's degree in Business
    Administration part‑time, reinforcing her practical experience with formal credentials. Long‑term, she envisions opening a boutique that blends community‑focused retail with locally sourced products,
    ensuring a sustainable livelihood post‑retirement.
