persona_description: A teacher or leader who is intentional about creating opportunities for students to connect and apply learning in their personal lives. They understand the importance of shared experiences
  and personal connections in the learning process and actively seek to create spaces for students to discuss and connect their learning with their own lives. They are aware of the impact of connectedness
  on student motivation and growth, and are committed to increasing the level of connection among students and with parents. They value reflection and action-oriented questions, and seek to create an environment
  where students feel safe and supported to share their ideas and concerns.
