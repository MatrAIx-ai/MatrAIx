  career_goals: Lucille aims to continue lifelong learning by attending art workshops and museum lectures, mentor local youth through a community art mentorship program, compile and publish a memoir that
    interweaves her personal story with Detroit’s cultural history, curate a traveling exhibition showcasing emerging artists from Plymouth and nearby neighborhoods, establish a modest scholarship for aspiring
    art students in the area, and travel to at least three major European art museums over the next decade to deepen her appreciation of global art traditions.
