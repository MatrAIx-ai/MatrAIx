persona_description: A public health researcher who specializes in the study of infectious diseases, particularly cholera. Their research interests include understanding the dynamics of cholera outbreaks
  and the role of socioeconomic status in controlling the disease. They are interested in using granular data to identify the factors that contribute to the spread of cholera and how these factors can be
  addressed. They are also interested in the long-term impact of cholera control efforts on the health of populations and the role of education in achieving these goals.
