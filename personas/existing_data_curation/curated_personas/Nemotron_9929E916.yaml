  hobbies: '[''Hiking'', ''Nature photography'', ''Strategy video games'', ''PC building'', ''Science‑fiction reading'', ''Acoustic guitar'', ''Yoga'', ''Chess'']'
  career_goals: Devan aims to enroll in a community college program for computer science or mechanical engineering, with the long‑term goal of becoming a field service engineer who can diagnose and repair
    technology on site. He hopes to eventually launch his own small tech‑repair business that blends his love of hands‑on work with his analytical skills. Recognizing his emotional sensitivity, he also
    plans to develop a routine that includes mental‑health resources and stress‑management practices to sustain a stable, fulfilling career.
