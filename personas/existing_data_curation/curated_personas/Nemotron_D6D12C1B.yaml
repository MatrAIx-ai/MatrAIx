  hobbies: '[''Reading nonfiction and mystery novels'', ''Chess and strategic board games'', ''Puzzle solving (Sudoku, crosswords)'', ''DIY crafts (woodworking, model building)'', ''Cooking and baking experimental
    recipes'', ''Nature walks and birdwatching'', ''Photography'', ''Coding small Python projects'']'
  career_goals: Brittany intends to earn her GED within the next year and then enroll in a community‑college program focused on information technology, with an eye toward cybersecurity or network administration
    where her skeptical mindset and analytical skills can protect small businesses from digital threats. Simultaneously, she plans to launch a modest e‑commerce venture selling handcrafted home décor items
    and specialty baked goods, leveraging her DIY, design, and culinary abilities. Her long‑term ambition is to secure a stable, well‑compensated role that offers independent work, continual learning, and
    the opportunity to grow her side business into a reliable source of income.
