personas:
  professional: Brittany Gustin is a self‑taught Python enthusiast and budding web designer who volunteers at her local library, sharpens analytical skills through competitive chess and puzzles, and is
    charting a path toward a community‑college IT program in cybersecurity, while simultaneously sketching business plans for an e‑commerce shop selling handcrafted décor and artisanal baked goods; they
    view independent work as a way to keep learning and grow their side venture.
  sports: Brittany Gustin enjoys solitary fitness routines such as early‑morning jogs along the St. Johns River, occasional paddle‑boarding sessions, and participates in the local birdwatching club’s weekend
    hikes, while cheering for the Jacksonville Jaguars in football and the Florida Gators in college basketball as their primary team affiliations; they prefer low‑impact, nature‑centered activities over
    team sports.
  arts: Brittany Gustin finds artistic inspiration in the black‑and‑white landscapes of Ansel Adams, the nuanced storytelling of indie folk musician Sufjan Stevens, and the delicate craftsmanship of contemporary
    woodworker Rachel Cather, and they spend weekends curating a small photo portfolio of river wildlife and visiting community art shows for local ceramic exhibits.
  travel: Brittany Gustin prefers low‑key, nature‑focused getaways, planning trips with spreadsheets that balance budget and daylight hours, has already explored the Everglades National Park on a school
    field trip, enjoys weekend drives to Savannah’s historic squares, and dreams of a solo backpacking adventure through the Pacific Northwest's coastal trails, though limited parental supervision and a
    modest savings fund steer their travel toward short, domestic excursions; they love mapping routes and snapping photos of each stop.
  culinary: Brittany Gustin loves experimental baking, often perfecting a lemon‑raspberry macaron glaze and a savory rosemary‑infused focaccia topped with wildflower honey, uses precise metric measurements
    drawn from a kitchen scale, frequently incorporates almond flour and citrus zest into recipes, and enjoys sharing her creations at the library’s monthly “Community Tea” event; they treat each dish like
    a puzzle to solve.
  core: Brittany Gustin blends a competitive, methodical mind with a quiet love for puzzles, birds, and baking, turning solitary passions into entrepreneurial plans while they occasionally stay up late
    to perfect a chess opening or a new pastry.
background:
  cultural: Brittany grew up in Palatka, a small city in Putnam County, Florida, where Southern and rural Floridian values shape daily life. Her family’s working‑class background emphasizes self‑reliance,
    modesty, and community involvement. Local traditions such as county fairs, fishing trips on the St. Johns River, and church gatherings contributed to her sense of place. While her immediate circle is
    predominantly white, she has been exposed to the broader multicultural fabric of the region, fostering an awareness of diverse perspectives. This backdrop blends a pragmatic work ethic with a quiet
    appreciation for the surrounding natural environment and a respect for personal independence.
attributes:
  skills: '[''Python programming'', ''Web design'', ''Spreadsheet budgeting'', ''DIY home repair'', ''Project planning'', ''Strategic board games'', ''Research and note‑taking'', ''Cooking and baking'',
