  career_goals: Nathan aims to translate his practicality and desire for predictable progression into a career in logistics or facilities management. He plans to enroll in a community college program in
    Business Administration with a focus on supply chain operations, obtain a Certified Logistics Associate credential, and secure an entry‑level role as a warehouse coordinator. Over the next five years
    he hopes to advance to a supervisory position, eventually overseeing a team and optimizing processes for a regional distribution center. He also values community impact, so he is considering a role
    with a nonprofit that manages food‑bank logistics, combining his cooperative nature with structured operations. As a backup path, he is exploring an apprenticeship in automotive technology, which offers
    a clear skill ladder and certification.
