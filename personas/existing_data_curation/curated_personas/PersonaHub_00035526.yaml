persona_description: A school psychologist who has conducted research on the effects of banding and streaming on pupils' self-esteem, educational performance, and the development of counter cultures within
  school. She is interested in understanding the mechanisms behind the formation of these subcultures and the potential for boys to adapt or even adopt a certain mode of behavior based on preconceptions
  about their own abilities and the expectations of teachers. She is also interested in exploring the possibility for pupils to break out of negative typecasts and generate a more positive image for themselves
  within a school environment.
