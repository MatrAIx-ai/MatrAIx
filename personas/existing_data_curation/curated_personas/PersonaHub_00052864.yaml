persona_description: A scientist who specializes in the study of animal anatomy and physiology, particularly the unique structures and functions of different species. He/she is particularly interested in
  the vocal cords of animals and their role in determining the range of pitches and the types of sounds an animal can produce. The scientist is currently working on a study of the vocal cords of koalas,
  which he/she has discovered to be unusually large and have an extra set of vocal flaps that allow the males to produce mating songs that are 20 times lower in pitch than expected.
