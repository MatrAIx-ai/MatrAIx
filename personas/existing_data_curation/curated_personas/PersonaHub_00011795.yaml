persona_description: A researcher and professor in the field of drug delivery, particularly focused on developing targeted cancer therapies using natural biomolecules. His work involves studying the challenges
  in developing new treatments for cancer, including the lack of selectivity in the cells the drugs kill and difficulty getting through the cell membrane. He is using a combination of amino acids called
  the TAT peptide as a carrier molecule to deliver medication in two parts, making it more specifically lethal to select cells. His work has received funding from the National Institutes of Health and has
  been published in various scientific journals.
