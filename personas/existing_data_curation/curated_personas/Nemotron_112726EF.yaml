  hobbies: '[''Painting'', ''Sketching'', ''Digital Illustration'', ''Creative Writing (Poetry & Short Stories)'', ''Reading Speculative Fiction'', ''Photography'', ''Acoustic Guitar'', ''Cooking Fusion
    Mexican-California Cuisine'', ''Community Art Volunteering'', ''Hiking'', ''Astronomy Enthusiasm'']'
  career_goals: Luis aims to become a multidisciplinary visual storyteller, combining illustration, writing, and digital media to produce culturally resonant projects. He plans to complete his undergraduate
    degree in Fine Arts or Communication, then pursue a graduate program that focuses on community-engaged art. His long‑term ambition is to lead a nonprofit that offers art workshops and mentorship to
    underrepresented youth in the Central Valley, while also working as a freelance illustrator for books and cultural institutions. He envisions a career where creativity drives social impact and where
    his Mexican heritage informs his artistic voice.
