personas:
  professional: Luis Santiagotoledo is a budding multidisciplinary visual storyteller who blends digital illustration, graphic design, and poetic narratives into community‑focused projects, and they leverage
    their bilingual communication skills and a reliable yet flexible work ethic to coordinate youth art workshops while developing concept‑driven artwork for cultural institutions.
  sports: Luis Santiagotoledo is an avid weekend hiker who explores the Sierra foothills trails, plays forward for a local amateur soccer club, and cheers for the Sacramento Kings, and they maintain fitness
    through a mix of trail runs, weekly yoga, and occasional pickup basketball games.
  arts: Luis Santiagotoledo immerses themselves in the arts, painting abstract canvases inspired by the textures of the Sierra, sketching under the influence of Mark Rothko’s color fields, curating playlists
    that blend The Milk Carton Kids, traditional folk ballads, and Sufjan Stevens, crafting poetry reminiscent of Pablo Neruda’s lyrical depth, and they capture nocturnal skyscapes in the style of Ansel
    Adams with their Canon EOS camera.
  travel: Luis Santiagotoledo prefers spontaneous, budget‑friendly travel, often hopping on weekend trains to Yosemite for night‑sky photography, planning low‑cost backpacking trips through Banff’s alpine
    trails, and dreaming of future stargazing adventures in Chile’s Atacama Desert, all while they balance a modest freelance income and occasional family responsibilities.
  culinary: Luis Santiagotoledo enjoys experimenting in the kitchen, merging bold spices of regional Latin cuisines—such as chipotle, cilantro, and lime—with California’s fresh produce, frequently preparing
    dishes like grilled corn‑tortilla tacos with avocado‑lime crema, quinoa‑based enchilada rolls, and herb‑infused ceviche, while they are at an intermediate skill level, comfortable with both stovetop
    sautéing and outdoor grilling.
  core: Luis Santiagotoledo is a 21‑year‑old visual storyteller whose restless imagination fuels nightly sketches and spontaneous poetry, yet they procrastinate on paperwork, hoard an ever‑growing collection
    of sketchbooks, and can’t resist a late‑night espresso before a stargazing session.
background:
  cultural: Luis is a first‑generation Mexican‑American raised in Mendota, a close‑knit agricultural community in Fresno County. He grew up speaking Spanish at home while attending English‑language schools,
    making him fluent in both languages. Family traditions such as Día de los Muertos, Semana Santa, and shared meals featuring regional Mexican cuisine remain central to his identity. The rhythms of farm
    life and the multicultural environment of the Central Valley have nurtured his appreciation for community and collective effort. Influenced by Mexican muralists and contemporary Latinx artists, Luis
    integrates cultural motifs and storytelling techniques from his heritage into his creative work, while also embracing the broader Californian art scene.
