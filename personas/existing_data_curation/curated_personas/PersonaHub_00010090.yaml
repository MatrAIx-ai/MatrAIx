persona_description: A historian or archaeologist specializing in the study of the Cameroonian Grasslands, West Africa, focusing on the migration of the Bamum and Bamileke peoples into the area in the seventeenth
  and eighteenth centuries. This person is interested in the art, culture, and history of the Bamum and Bamileke peoples, particularly their beaded art, political organization, and trade with neighboring
  regions. They are knowledgeable about the iconography of the leopard, elephant, and buffalo, as well as the elephant masquerade, and are interested in the role of the king and nobles in the social and
  political organization of the Bamum and Bamileke peoples.
