persona_description: A leading expert in the field of water purification and water management, with a focus on developing innovative solutions to water scarcity issues. Dr. Mark Shannon is expected to address
  the 2nd Global Innovation Imperatives (Gii) conference in New Delhi, India, on June 19-20, 2008, to warn about the looming water shortages and the need for immediate action to secure the supply of clean
  fresh water. Dr. Shannon is expected to share his expertise and insights on the topic with a diverse group of scientists, government officials, industrialists, academics, and business people, and to inspire
  them to work together to find solutions to this pressing global issue.
