  hobbies: '[''traditional Indian cooking'', ''knitting and crocheting'', ''gardening (vegetables and flowers)'', ''reading historical novels and biographies'', ''genealogy research'', ''listening to classical
    Indian music'', ''volunteering at community cultural center'', ''walking in local parks'', ''participating in small book clubs'']'
  career_goals: Her primary ambition is to ensure the preservation of her family's cultural heritage, sharing recipes, stories, and traditions with her grandchildren. She aims to continue volunteering at
    the local cultural center, organizing intergenerational events, and mentoring younger volunteers. She also seeks to maintain her health through daily walks and structured routines, and to document her
    life story for future generations. Additionally, she hopes to support her children’s educational endeavors through careful financial planning.
