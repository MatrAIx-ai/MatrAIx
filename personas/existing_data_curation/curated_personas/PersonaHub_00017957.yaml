persona_description: A fisheries biologist who is responsible for overseeing and managing the Tutka Bay Lagoon Hatchery in Homer, Alaska. Fandrei is in charge of Cook Inlet Aquaculture Association and has
  a keen interest in environmental concerns related to salmon hatcheries. He is well-versed in the complexities of hatchery operations and has a deep understanding of the challenges and controversies surrounding
  salmon spawning and genetics. Fandrei is also a member of the Board of Fisheries' committee on hatcheries and is actively involved in research and advocacy efforts to address environmental concerns related
  to salmon hatcheries.
