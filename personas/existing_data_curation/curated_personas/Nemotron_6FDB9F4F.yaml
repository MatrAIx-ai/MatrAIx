  hobbies: '[''Intramural basketball'', ''Escape‑room challenges'', ''Competitive board‑games'', ''Volunteer fire‑department auxiliary'', ''Model‑airplane building'', ''Digital music production'', ''Hiking
    with a friends group'']'
  career_goals: Allan aspires to translate his organizational strengths into a career in operations or supply‑chain management within Indiana’s manufacturing sector. His short‑term goal is to secure an
    entry‑level logistics coordinator position, where he can apply his methodical planning and competitive drive to streamline processes and improve efficiency. Long‑term, he aims to advance to an operations
    manager role and eventually launch his own consulting firm that helps small Midwestern businesses implement structured, data‑driven workflow solutions.
