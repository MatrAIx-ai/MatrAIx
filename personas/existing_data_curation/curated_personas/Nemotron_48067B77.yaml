personas:
  professional: Marcos Salgadorodriguez, a veteran broadcast cinematographer with 25 years mastering Sony HDC, Canon EOS C, and RED cameras, channels his structured workflow, practical mindset, and compassionate
    team‑building into leading multi‑camera live productions while mentoring junior crew in visual storytelling.
  sports: Marcos Salgadorodriguez, a regular midfielder for the Belton Riverhawks co‑ed soccer league, balances fitness with social interaction, follows the Kansas City Chiefs and St. Louis Cardinals religiously,
    and uses weekend matches as a structured outlet for energy and community bonding.
  arts: Marcos Salgadorodriguez, an enthusiastic volunteer workshop facilitator at the Belton Arts Center, curates film‑making sessions inspired by Pedro Almodóvar and Alfonso Cuarón, quotes Diego Velázquez
    during critiques, and regularly stages community theater productions that echo themes from Cervantes and contemporary Spanish pop band Maná.
  travel: Marcos Salgadorodriguez, who favors culturally rich trips, has explored Barcelona’s Gothic Quarter, the Andalusian vineyards of Seville, and the American Southwest’s Monument Valley, while cherishing
    day‑trips to nearby Lake of the Ozarks, and he plans a future pilgrimage to Granada’s Alhambra to capture its light for his documentary series.
  culinary: Marcos Salgadorodriguez, a confident home chef, perfects paella with saffron, bomba rice, chorizo, and a splash of dry sherry, crafts tapas like patatas bravas and jamón ibérico, and occasionally
    over‑salts his dishes due to an adventurous palate that mirrors his bold cinematographic style.
  core: Marcos Salgadorodriguez, a disciplined yet sociable 53‑year‑old cinematographer, blends vintage camera collecting with community mentorship, soccer camaraderie, and a relentless quest for perfectly
    seasoned paella.
background:
  cultural: Marcos descends from a family that emigrated from Andalusia, Spain, to the United States in the early 1970s. Raised bilingual, he grew up celebrating Spanish holidays such as Semana Santa and
    La Feria de Abril, and he maintains strong ties to Spanish culinary traditions and music. His cultural identity blends the warmth and communal spirit of Spanish life with Midwestern values of practicality
    and reliability. This dual heritage informs his artistic sensibilities, his commitment to community service, and his desire to tell stories that bridge Spanish and American experiences.
attributes:
  skills: '[''Camera operation (Sony HDC, Canon EOS C, RED)'', ''Video editing (Adobe Premiere Pro, Final Cut Pro X, DaVinci Resolve)'', ''Lighting design and setup'', ''Audio synchronization and post‑production'',
    ''Color grading and visual effects'', ''Broadcast workflow and media asset management'', ''Storyboarding and narrative development'', ''Team coordination and crew mentorship'', ''Bilingual content adaptation
    (Spanish/English)'', ''Equipment maintenance and troubleshooting'']'
  hobbies: '[''Playing soccer in a local league'', ''Cooking traditional Spanish dishes (paella, tapas, gazpacho)'', ''Volunteering as a workshop facilitator at the Belton Arts Center'', ''Collecting and
    shooting with vintage analog cameras'', ''Photography of Ozark landscapes'', ''Reading Spanish literature (Cervantes, García Márquez)'', ''Participating in community theater productions'', ''Mentoring
    high-school students in film clubs'']'
  career_goals: Marcos aims to transition into a senior production role at a regional public television station, leading a team that produces culturally rich documentaries and educational series that highlight
    Spanish heritage and local Midwest stories. He wants to establish a community media lab in Belton to train under‑represented youth in video production, providing structured mentorship programs. Over
    the next five years, he hopes to direct his own documentary series on the Spanish diaspora in the United States and secure stable funding through grants, ensuring predictable project pipelines.
