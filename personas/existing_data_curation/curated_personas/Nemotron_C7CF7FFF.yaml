  hobbies: '[''Fishing'', ''Gardening'', ''Walking'', ''Attending local festivals'', ''Cooking Puerto Rican cuisine'', ''Playing dominoes'', ''Listening to salsa and bomba music'', ''Reading local history'',
    ''Volunteering at community center'', ''Tinkering with classic cars'']'
  career_goals: Before retiring, Salvador hopes to move into a supervisory or mentor role where he can train younger transportation attendants, share his knowledge of safe driving and local routes, and
    help implement updated safety standards. He is interested in learning about electric bus technology and wants to advise his company on a smooth transition. Additionally, he plans to volunteer his expertise
    with community groups to improve transportation options for seniors and people with disabilities in Ponce, ensuring reliable and respectful service for all.
