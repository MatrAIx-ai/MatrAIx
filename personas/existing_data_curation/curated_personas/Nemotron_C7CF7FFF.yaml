personas:
  professional: Salvador Suarez, a 66-year-old veteran bus and shuttle driver in Ponce, blends decades of hands-on route planning, vehicle troubleshooting, and bilingual passenger service with a pragmatic
    curiosity for emerging electric-bus technologies, and they mentor younger attendants while championing safety standards for seniors and people with disabilities.
  sports: Salvador Suarez stays active by strolling historic Ponce streets and joining a weekend walking club that meets at Parque de la Abolicion, follows the Leones de Ponce baseball team avidly, plays
    occasional softball with the Ponce Community Center's senior league, and they maintain a modest fitness routine that combines gentle stretching with occasional fishing trips that serve as both recreation
    and low-impact cardio.
  arts: Salvador Suarez immerses themselves in the rhythmic world of salsa and bomba, regularly dancing to the timeless sounds of Celia Cruz, Hector Lavoe, and Los Pleneros de la 21 at local festivals,
    enjoys listening to contemporary Latin jazz from Eddie Palmieri, and they occasionally attend theater performances featuring actors like Benicio del Toro, all of which enrich their leisure time and
    fuel their love for communal celebration.
  travel: Salvador Suarez prefers low-key, culturally rich trips, having explored historic Old San Juan and the seaside town of Cabo Rojo on weekend getaways, taken a memorable family cruise to the Dominican
    Republic, and dreaming of a relaxed cultural tour of Barcelona's Gothic Quarter and Andalusian towns, they plan travel around modest savings and avoid high-cost tours.
  culinary: Salvador Suarez, an adept home cook, delights in preparing classic mofongo with fried green plantains, pork cracklings, and a garlicky sofrito, nests arroz con gandules seasoned with annatto,
    cilantro, and pigeon peas on the stove, whips up fresh fish ceviche using catch-of-the-day and local lime, and they often garnish meals with garden-grown tomatoes and basil, showcasing a confident yet
    humble culinary style.
  core: Salvador Suarez is a pragmatic yet curious 66-year-old former bus driver who balances disciplined routine with spontaneous salsa dancing, meticulous route memories with occasional classic-car tinkering,
    and community-focused generosity with a habit of never missing the Friday dominoes game, and they approach each day with a steady blend of reliability and spontaneous joy.
background:
  cultural: Salvador was born and raised in Ponce, a city on the southern coast of Puerto Rico known for its colonial architecture, vibrant art scene, and strong traditions. He grew up in a close‑knit family
    where Catholic values, respect for elders, and community solidarity were central. Puerto Rican culture’s blend of Spanish, African, and Taíno influences shaped his love for music, food, and festivals.
    He takes pride in local customs such as the Carnaval Ponceño, traditional 'parranda' music, and communal domino games. The everyday hospitality of Puerto Rico informs his warm, courteous approach to
    passengers, while his practical upbringing in a working‑class neighborhood instilled a strong work ethic, resilience, and a sense of responsibility to his community.
attributes:
  skills: '[''Vehicle operation'', ''Customer service'', ''Route navigation'', ''Basic vehicle maintenance'', ''Safety compliance'', ''Logistics coordination'', ''Bilingual communication (Spanish-English)'',
