personas:
  professional: Benita Ford, a 59‑year‑old community archivist and event coordinator in Stone Mountain, blends meticulous record‑keeping with a warm, assertive presentation style, using her routine‑driven
    nature to manage modest budgets and train docents while championing local African‑American heritage preservation.
  sports: Benita Ford enjoys low‑impact fitness through weekly bird‑watching hikes at Stone Mountain Park and participates in a senior softball league, while cheering on the Atlanta Falcons, Atlanta Braves,
    and the local DeKalb High School basketball team during the season.
  arts: Benita Ford expresses creativity through quilting patterns inspired by African motifs, attends gospel concerts featuring Mahalia Jackson’s recordings, reads historical fiction by authors like Toni
    Morrison, and volunteers at the local theater to support productions of classic Southern dramas.
  travel: Benita Ford prefers structured, historically rich trips, having taken day tours to Savannah’s historic district, a weekend pilgrimage to Washington, D.C.’s Smithsonian museums, and a planned two‑week
    journey to New Orleans to explore its music and cuisine, always returning with a notebook of observations.
  culinary: Benita Ford excels at Southern soul‑food cooking, perfecting collard greens seasoned with smoked ham hocks, golden fried chicken with buttermilk brine, and sweet‑potato pie spiced with nutmeg
    and cinnamon, often pairing dishes with fresh garden herbs like thyme and rosemary.
  core: Benita Ford, 59, balances a love of routine‑driven heritage stewardship with a communal kitchen, never missing a quilting circle even when arthritis flares, and keeps a detailed ledger for every
    community project.
background:
  cultural: Benita’s cultural background is rooted in the African‑American experience of the Deep South. Raised in a close‑knit Black family in DeKalb County, she was immersed in the traditions of Southern
    soul food, gospel music, and oral storytelling. The local church has long been a pillar of her identity, providing both spiritual guidance and a venue for community activism. She carries forward the
    legacy of the civil‑rights era through her dedication to preserving Black history, celebrating family heritage, and fostering intergenerational connections within her neighborhood.
