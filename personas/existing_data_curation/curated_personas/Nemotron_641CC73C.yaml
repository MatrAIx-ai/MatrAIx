  career_goals: Benita aims to become a recognized steward of local African‑American heritage in Stone Mountain. In the next five years she plans to complete a certificate in archival preservation, volunteer
    as a docent trainer at the DeKalb History Center, and publish a collection of oral histories from longtime Black residents. She also hopes to launch a community garden that serves as an intergenerational
    learning space, and to mentor younger women interested in public history and cultural entrepreneurship.
