  hobbies: '[''Digital photography'', ''Urban exploration'', ''Woodworking'', ''Reading contemporary fiction'', ''Visiting art galleries'', ''Listening to jazz and soul'', ''Playing chess'', ''Coaching
    youth art workshops'', ''Watching basketball'']'
  career_goals: Carlos intends to translate his practical expertise and artistic passion into a part-time consultancy, offering home-improvement advice while curating pop-up exhibitions that showcase emerging
    Black artists in the Indianapolis area. He aims to earn a certification in advanced automotive technology within the next two years and eventually launch a small boutique studio where he can combine
    woodworking, custom furniture design, and gallery space. Long-term, he hopes to author a book on the intersection of African-American visual culture and contemporary digital media, positioning himself
    as a thought leader in the regional arts community.
