personas:
  professional: Carlos Davidson is a versatile home‑improvement consultant and emerging exhibition curator who blends hands‑on craftsmanship with a keen eye for visual storytelling, leveraging expertise
    in residential repairs, automotive diagnostics, long‑exposure urban photography, and graphic design to develop pop‑up showcases for local creators while delivering practical DIY guidance to clients.
  sports: Carlos Davidson avidly follows the Indiana Pacers and Indianapolis Colts, plays pickup basketball at the local recreation center, jogs the Monon Trail each morning, participates in the Indy Soccer
    Club’s Sunday leagues, and maintains a home‑gym setup for weight‑training, approaching fitness as a disciplined yet flexible routine that balances competition with personal health.
  arts: Carlos Davidson immerses themselves in the arts by curating pop‑up exhibitions featuring works inspired by blues legends Muddy Waters and Nina Simone, listening to Miles Davis, Erykah Badu, and
    Celia Cruz while restoring vintage turntables, photographing urban nightscapes for the Indianapolis Art Center’s community gallery, and leading youth workshops that explore visual storytelling through
    graphic‑design basics.
  travel: Carlos Davidson prefers meticulously planned road trips that blend cultural immersion with creative inspiration, having explored New Orleans’ jazz districts, Havana’s Afro‑Latin rhythms, and Chicago’s
    historic blues clubs, while often revisiting the tranquil woods of Brown County, Indiana for sketching sessions, and they prioritize off‑season travel to avoid crowds and stretch their modest budget.
  culinary: Carlos Davidson enjoys cooking soul‑food classics such as fried catfish with collard greens, cornbread, and sweet‑potato pie, while also experimenting with Afro‑Latin flavors like jerk chicken
    seasoned with Scotch bonnet peppers and plantain mofongo, often incorporating smoked paprika and okra into their recipes, and they savor occasional visits to local diners for a perfectly seasoned gumbo
    bowl.
  core: Carlos Davidson is a curiosity‑driven handyperson‑artist who balances meticulous DIY projects with a deep love for blues‑rooted visual storytelling, navigating life’s demands through disciplined
    budgeting and a solitary yet competitively sharp mindset.
background:
  cultural: Born and raised in the Midwest, Carlos grew up within a tight‑knit African‑American household that celebrated church, soul food, and storytelling. His family’s roots trace back to the Great
    Migration, bringing a rich legacy of blues, gospel, and community activism to Greenwood, Indiana. He identifies strongly with Black cultural traditions while also embracing the multicultural influences
    of his father’s Caribbean connections, reflected in his appreciation for Afro‑Latin rhythms and a love for exploring diasporic art. These experiences shape his worldview, feeding his curiosity about
    artistic expression and his commitment to uplifting local Black creators.
