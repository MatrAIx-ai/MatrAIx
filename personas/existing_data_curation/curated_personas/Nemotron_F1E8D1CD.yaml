  career_goals: Guided by her desire for structure and measurable outcomes, Lillian aims to pursue a career in wildlife biology or environmental data analysis. She envisions a role that combines field research
    in the Montana wilderness with rigorous data management, allowing her to contribute to conservation efforts within a clear framework. In the long term, she hopes to lead a research team, shaping policies
    that protect local ecosystems while maintaining a predictable, balanced lifestyle.
