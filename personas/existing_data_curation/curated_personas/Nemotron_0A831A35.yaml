  career_goals: Though retired, George’s primary ambition is to preserve his independence and remain physically active. He aims to keep his home and garden in top condition, and to share his practical knowledge
    by leading volunteer workshops at the local senior center, teaching younger neighbors simple repairs and basic woodworking. He also hopes to stay engaged with his community through occasional mentorship
    and to maintain his self‑reliance for as long as possible.
