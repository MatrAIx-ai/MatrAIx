personas:
  professional: George Wagner is a retired automotive service technician turned community workshop mentor, leveraging three decades of car and small‑engine repair expertise and their meticulous hands‑on
    woodworking skills to teach practical repairs at the senior center, where their love of routine blends with occasional spontaneous lesson plans.
  sports: George Wagner enjoys light morning walks, weekend fishing trips on the Meramec River as a member of the local Anglers Association, and follows the St. Louis Cardinals, St. Louis Blues, and Kansas
    City Chiefs, and they occasionally join senior center pickleball sessions in the spring.
  arts: George Wagner’s evenings are often spent listening to classic country legends like Johnny Cash and early rock‑and‑roll icons such as Elvis Presley, while they attend community theater productions
    of "The Music Man" and devour historical biographies of figures like Abraham Lincoln, weaving music and history into their leisure.
  travel: George Wagner prefers short, planned road trips to nearby state fairs, museums in Springfield, and the Ozark National Scenic Riverways, but they occasionally indulge in spontaneous weekend drives
    to the Kansas City International Barbecue Festival, dreaming of a future visit to Savannah’s historic squares.
  culinary: George Wagner enjoys hearty Midwestern fare such as chicken fried steak, pot roast with garden carrots, and corn chowder seasoned with fresh basil from their own garden, and they skillfully
    bake homemade apple pie, though they tend to over‑salt their vegetable stew when experimenting with new recipes.
  core: George Wagner blends a steadfast love for routine with a mischievous penchant for spur‑of‑the‑moment fishing trips, they hoard spare screws for future projects, and they habitually forget to water
    newly planted seedlings until the next weekend.
background:
  cultural: George was born and raised in St. Charles County, Missouri, within a predominantly white, Protestant (Southern Baptist) Midwestern community. The region’s agricultural and industrial heritage
    instilled values of self‑reliance, hard work, and practicality. He grew up attending church potlucks, county fairs, and local community events, fostering a strong sense of regional identity tied to
    country music, small‑town traditions, and a straightforward, practical worldview.
