  career_goals: Han aims to progress to senior management, such as plant manager or regional operations director, overseeing multiple mechanical service teams. He plans to earn the Certified Maintenance
    & Reliability Professional (CMRP) credential and lead the adoption of IoT-enabled predictive maintenance solutions in commercial buildings. He also seeks to deepen his expertise in sustainable HVAC
    and renewable energy integration, positioning himself as a go-to specialist for green building projects in the Austin market. Beyond professional advancement, he aspires to cultivate a low-stress work
    environment, mentor the next generation of technicians, and eventually launch a boutique consultancy that offers tailored mechanical installation and maintenance services for small-to-mid-size enterprises.
