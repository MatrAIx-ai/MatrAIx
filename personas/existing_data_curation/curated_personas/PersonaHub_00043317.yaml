persona_description: A researcher at the John Radcliffe Hospital in Oxford, UK who has made a breakthrough in the treatment of a rare inherited condition called choroideremia, a cause of progressive blindness.
  The researcher is a consultant surgeon at the Oxford Eye Hospital and has led a clinical trial of a gene therapy that has shown improvements in visual acuity in six patients. The research is funded by
  the Health Innovation Challenge Fund and has received additional support from the National Institute for Health Research Oxford Biomedical Research Centre and the charity Fight for Sight.
