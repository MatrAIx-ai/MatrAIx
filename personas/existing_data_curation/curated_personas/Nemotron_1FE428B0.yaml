  career_goals: Although formally retired, Tony wants to stay mentally active and leave a creative legacy. He hopes to compile a photographic and narrative chronicle of Hobe Sound’s history and natural
    scenery, which he plans to self-publish as a modest coffee-table book. He also aims to volunteer as a docent at the local art center, offering informal watercolor workshops to seniors. Learning a new
    digital medium, such as tablet-based illustration, is another goal. He envisions occasional guest talks at community events, sharing his stories and encouraging curiosity in younger residents. His plans
    remain flexible, reflecting his preference for spontaneity over strict schedules.
