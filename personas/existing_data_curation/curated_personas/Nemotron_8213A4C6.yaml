  hobbies: '[''Abstract painting'', ''Digital illustration'', ''Creative coding (Processing, p5.js)'', ''Science-fiction and philosophy reading'', ''Jazz music listening and saxophone'', ''Board games and
    puzzle solving'', ''Urban photography'', ''Community volunteer tutoring'', ''Visiting art galleries and museums'', ''Exploring Chicago\''s culinary scene'']'
  career_goals: Lovely aims to become a lead curriculum developer for the Chicago Public Schools district, spearheading STEAM initiatives that champion creativity, equity, and interdisciplinary learning.
    He plans to earn a master’s degree in educational leadership and eventually pursue a doctorate focused on the impact of artistic integration on STEM achievement among underrepresented students. He also
    hopes to launch an after‑school program that blends coding, digital art, and music to nurture holistic development, while cultivating personal strategies for stress management and emotional well‑being
    to counteract his heightened sensitivity to worry.
