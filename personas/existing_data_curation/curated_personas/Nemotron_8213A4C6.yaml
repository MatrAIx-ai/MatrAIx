personas:
  professional: Lovely Wyatt is a secondary STEM teacher who weaves coding, robotics, and abstract visualizations into project‑based STEAM lessons, using their vivid imagination to spark curiosity while
    their laid‑back approach sometimes results in spontaneously improvised lesson plans.
  sports: Lovely Wyatt enjoys playing pick‑up basketball at the local community center in the summer, follows the Chicago Bulls and Chicago Cubs with fervor, and participates in the Chicago Lakefront Running
    Club’s early‑morning jogs, preferring informal, social exercise over rigid gym schedules.
  arts: Lovely Wyatt is an abstract painter who frequents the Chicago Art Institute’s studio space, draws inspiration from the improvisational saxophone lines of John Coltrane and the bold colors of Jacob
    Lawrence, and showcases digital illustrations at monthly open‑mic nights at the Green Mill.
  travel: Lovely Wyatt loves short trips to New Orleans for its live brass scene and weekend escapes to Door County’s quiet lakes, while dreaming of a solo pilgrimage to Paris’s jazz clubs and the historic
    libraries of Oxford, always planning itineraries that blend cultural immersion with reflective solitude.
  culinary: Lovely Wyatt enjoys cooking simple yet soulful meals, often preparing a personal take on Chicago‑style deep‑dish pizza with smoked mozzarella and caramelized onions, experimenting with Ethiopian
    injera seasoned with berbere, and savoring a perfectly brewed espresso while sketching in the kitchen.
  core: Lovely Wyatt melds boundless imagination, community‑centric values, and a perpetual undercurrent of worry into a life where abstract art, jazz improvisation, and mentorship coexist with occasional
    disorganization.
background:
  cultural: Lovely is an African‑American who grew up in Chicago’s South Side, where church, family gatherings, and community events played a central role in his upbringing. His parents, both educators,
    emphasized the value of knowledge and cultural pride, exposing him early to black literary and musical traditions—from Langston Hughes poetry to Chicago blues and jazz. The city’s vibrant black cultural
    institutions, such as the DuSable Museum of African American History and local festivals, have shaped his appreciation for heritage and social responsibility. As a black STEM teacher, he is acutely
    aware of the underrepresentation of minority students in science and technology fields, which fuels his commitment to create inclusive, creativity‑driven learning environments that honor both his cultural
    roots and the diverse experiences of his students.
attributes:
  skills: '[''Curriculum design'', ''STEAM integration'', ''Project-based learning'', ''Robotics and coding instruction'', ''Educational technology (Google Classroom, simulations)'', ''Creative problem
