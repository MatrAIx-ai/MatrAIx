  hobbies: '["Hiking", "Nature Photography", "Cooking (farm-to-table)", "Reading (fiction and business)", "Yoga", "Board Game Nights", "Local Farmers Market Exploration", "Acoustic Guitar", "DIY Home Projects"]'
  career_goals: Joanna aims to advance from her current sales role to a senior account manager position within the next three years, focusing on sustainable product lines that align with her practical curiosity
    about emerging markets. She plans to earn a Certified Professional Sales Leader (CPSL) credential and eventually transition into a sales training or coaching role where she can share her blend of flexibility
    and results‑orientation. Long‑term, she envisions launching a boutique consultancy that helps small businesses adopt efficient, adaptable sales processes without sacrificing personal work‑life balance.
