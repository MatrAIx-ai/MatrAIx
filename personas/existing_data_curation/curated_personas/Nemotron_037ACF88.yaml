  career_goals: Ricardo aims to turn his curiosity for technology into a career in applied engineering or IT support. He dreams of becoming a junior software developer or a technical specialist at a company
    that values both innovative problem‑solving and reliable, user‑friendly solutions. In the longer term, he hopes to combine his technical skills with his cultural roots by developing software tools that
    help small Hispanic‑owned businesses in New Mexico manage inventory and finances, thereby giving back to his community while achieving personal stability.
