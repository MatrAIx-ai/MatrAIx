personas:
  professional: Ricardo Santiago is an aspiring technologist who blends a strategic‑gaming mindset with hands‑on Arduino tinkering, using their curiosity and practical organization to design small‑scale
    robots and automation projects while balancing school responsibilities and collaborative soccer drills.
  sports: Ricardo Santiago plays midfield for a local youth soccer club at the park, idolizes New Mexico United in the USL Championship and follows the U.S. Men’s National Team, and spends weekends honing
    solo dribbling drills while maintaining a flexible fitness routine that balances team practices with personal conditioning.
  arts: Ricardo Santiago enjoys listening to cumbia and reggaeton artists such as Carlos Vives, J Balvin, and Bad Bunny while working on Arduino projects, and occasionally creates custom game mod soundtracks
    inspired by these rhythms, showcasing how music fuels their creative problem‑solving.
  travel: Ricardo Santiago prefers spontaneous road trips with friends to nearby destinations like Santa Fe, Austin, and the Grand Canyon, dreaming of future adventures to Tokyo and the Galápagos, yet balances
    these travel ambitions with parental constraints and a modest budget.
  culinary: Ricardo Santiago experiments with fusion cooking, pairing traditional corn‑based dishes like arepas with New Mexican green chile relleno, adeptly handling spices such as ancho and chiltepín,
    and hosts weekend dinner parties where friends sample their inventive empanadas and chili‑infused quesadillas.
  core: Ricardo Santiago is a tech‑savvy soccer enthusiast who merges strategic gaming insights with kitchen experiments, often juggling late‑night game marathons against early‑morning practice sessions,
    and habitually procrastinates on homework while dreaming of building a smart‑home robot.
background:
  cultural: Ricardo was born to Colombian immigrants who settled in Albuquerque, and his upbringing blends traditional Colombian customs with the Southwestern American lifestyle. At home, Spanish is spoken
    daily, and family gatherings feature Colombian holidays such as Día de la Independencia and festivals where he helps prepare classic foods. The local New Mexican Hispanic community has also introduced
    him to regional dishes like green chile stew, and he often participates in community events at the local cultural center. This bicultural environment has shaped his identity, giving him fluency in two
    languages, a love for diverse culinary traditions, and a strong sense of belonging to both his Colombian heritage and his New Mexican hometown.
