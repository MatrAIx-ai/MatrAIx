persona_description: A geologist interested in the geologic, geomorphologic, and paleontologic interests of the National Park Cheile Bicazului - Hasmas. This individual is also interested in the landscapes
  and biological diversity generated by the great variety of geoclimactic conditions. They are familiar with the Bicaz Gorges, Red Lake, and the parks' protected area. They may be interested in hiking and
  exploring the park's natural reserves, such as the Bicaz Gorges (1,600 hectares), Lacu Rosu, Cheile Sugaului, Avenul Licas, the Hasmasul Mare-Piatra Singuratica, and Hasmasul Negru. They may also be interested
  in the park's touristic routes, including the National Park Cheile Bicazului - Hasmas.
