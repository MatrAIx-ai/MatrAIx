  hobbies: '[''Reading (Science, History, Speculative Fiction)'', ''Gardening (Heirloom Tomatoes, Herbs)'', ''Trail Hiking'', ''Landscape Photography'', ''Woodworking'', ''Chess'', ''Jazz and Classical
    Music'', ''Mentoring STEM Students (One-on-One)'', ''Stargazing'']'
  career_goals: Dennis aims to position his company as a leader in sustainable tech solutions, expanding into emerging markets while scaling digital services that prioritize both profitability and social
    impact. He intends to champion diversity at the board level, creating mentorship pipelines for Black engineers and executives. Over the next five years, he envisions launching an incubator for startups
    led by underrepresented founders, and eventually transitioning to a board advisory role that allows him to allocate time to community initiatives and lifelong learning. Balancing his drive for growth
    with his desire for personal reflection, he also seeks to maintain a healthy work-life balance that supports his family and his quiet pursuits.
