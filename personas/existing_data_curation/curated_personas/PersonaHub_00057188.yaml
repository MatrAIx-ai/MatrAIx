persona_description: A knowledgeable and experienced medical professional with expertise in multiple sclerosis (MS) therapy and treatments. Dr. Jack Burks, MD, is the Chief Medical Officer of the Multiple
  Sclerosis Association of America and has extensive experience in the development of new MS therapies and the implementation of scientific principles of Evidence Based Medicine (EBM). He has written and
  edited several MS textbooks and has lectured and evaluated patients in over 40 countries. Dr. Burks is interested in the challenges of balancing benefits versus potential treatment risks and is committed
  to providing patients with personalized and informed medical decisions. He is also a member of the Clinical Advisory Board of the NMSS and has contributed to the advancement of MS care and research.
