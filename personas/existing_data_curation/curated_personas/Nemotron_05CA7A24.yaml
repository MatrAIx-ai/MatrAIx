  career_goals: Patricia aims to transition into an operations manager role within the next three to five years, overseeing multiple departments and driving strategic initiatives. She plans to earn a PMP
    certification and a Lean Six Sigma Green Belt to formalize her expertise. She is motivated to lead organization‑wide efficiency projects that integrate emerging technologies, such as AI‑driven scheduling
    and digital filing systems. In the longer term, she envisions establishing a boutique consulting practice that helps mid‑size companies streamline their administrative functions while maintaining a
    balanced work‑life rhythm for herself and her family.
