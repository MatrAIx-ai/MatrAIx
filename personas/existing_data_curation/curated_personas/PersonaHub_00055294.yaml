persona_description: A policy adviser or researcher who specializes in energy efficiency and sustainable building practices, particularly in the context of old or empty buildings. They are interested in
  uncovering the hidden costs of building new homes and the potential benefits of reusing existing ones, and they advocate for changes in tax policies and local government regulations to encourage the reuse
  of buildings. They are also knowledgeable about the impact of construction on the environment and the need to balance the need for new housing with the preservation of existing buildings.
