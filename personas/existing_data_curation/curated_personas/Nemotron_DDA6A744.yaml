  career_goals: Lorne aims to pursue a college degree in visual communication, interaction design, or a related field that bridges art and technology. He envisions a career as a multimedia or UI/UX designer
    for a creative agency or an automotive tech company, where he can apply his illustration, photography, and coding skills to craft engaging user experiences. While building his professional credentials,
    he hopes to develop a freelance portfolio that showcases personal projects ranging from digital murals to interactive installations. Long-term, he aspires to mentor other young creators in his community
    and maybe launch a collaborative studio that nurtures unconventional ideas.
