personas:
  professional: Lorne Vann, an aspiring multimedia designer, combines a strong visual imagination with proficiency in Procreate, Photoshop, and basic Python to craft user‑friendly interfaces for automotive
    tech firms, blending organized project planning with the flexibility to experiment with unconventional visual storytelling, and they thrive on collaborative school murals while maintaining a reliable
    work ethic.
  sports: Lorne Vann, a dedicated skateboarder and weekend hiker, spends Saturdays cruising the Detroit Skate Collective’s concrete bowl and exploring trails in Van Buren State Park, while cheering on the
    Detroit Lions, Pistons, and Red Wings, balancing a laid‑back fitness routine with occasional strength training to counter skate‑related ankle strains.
  arts: Lorne Vann, an avid visual artist and music enthusiast, draws inspiration from the gritty street murals of Banksy, the vibrant color palettes of David Hockney, and the narrative photography of Steve
    McCurry, while their playlists blend Miles Davis, Herbie Hancock, and indie gems like Mac DeMarco, shaping a multidisciplinary identity that fuels both sketchbook experiments and immersive digital collages.
  travel: Lorne Vann, an exploratory teen traveler, prefers spontaneous weekend road trips to nearby art hubs such as Ann Arbor and Chicago, has documented the urban textures of Detroit’s murals, and dreams
    of a summer backpack adventure through Berlin’s street‑art districts and Kyoto’s historic galleries, balancing limited budget constraints with a meticulous itinerary mapped out in a custom Google Sheet.
  culinary: Lorne Vann, a budding home cook, favors the cheesy crust of Detroit‑style pizza, the comforting richness of mac and cheese, and the umami depth of miso ramen, confidently whipping up herb‑buttered
    chicken drumsticks and experimenting with smoked paprika‑infused guacamole, while they occasionally over‑season dishes in the quest for bold flavor.
  core: Lorne Vann blends teenage curiosity with a relentless drive to fuse art and tech, sketching in the margins of physics textbooks while secretly hoarding retro vinyl records for late‑night creative
    bursts.
background:
  cultural: Lorne grew up in Mount Clemens, a suburb of Detroit in Macomb County, Michigan. His family traces its roots to German and Irish ancestors who settled in the region during the early 20th century,
    giving him a Midwestern heritage that blends a blue-collar work ethic with an appreciation for the arts. The area's strong automotive legacy and the vibrant music and visual-art scene of nearby Detroit
    have shaped his interests, encouraging both practical skills like basic car maintenance and creative pursuits such as music and visual art. Community values of independence, modesty, and mutual support
    are evident in his involvement with local youth programs, his desire to give back, and his respect for the multicultural artistic traditions that flourish in the greater Detroit area.
