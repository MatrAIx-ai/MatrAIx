personas:
  professional: Ashley Boyer, a veteran industrial engineer with four decades of occupational health and safety experience, leverages her disciplined, data‑driven mindset and balanced curiosity to design
    lean manufacturing processes, implement IoT‑based real‑time safety monitoring, and lead cross‑functional teams that embed ergonomic principles into both large facilities and small rural enterprises.
  sports: Ashley Boyer, an avid outdoors enthusiast, leads summer hikes with the Teton Hills Trail Club, follows the Boise State Broncos and the Seattle Seahawks with moderate enthusiasm, and participates
    in a weekly community yoga class that doubles as low‑impact fitness, embodying a balanced and seasonal approach to physical activity.
  arts: Ashley Boyer, an enthusiastic wildlife photographer and nonfiction reader, draws creative inspiration from Ansel Adams, captures subtle ecological moments with a 70‑mm lens while listening to John
    Denver’s folk ballads, and shares literary insights at her small book club gatherings, weaving art and engineering curiosity together.
  travel: Ashley Boyer, a meticulous planner of low‑key adventures, maps scenic drives through Idaho’s Sawtooth and Caribou‑Targhee forests, frequently revisits Yellowstone’s geysers, and nurtures a long‑standing
    dream of exploring Iceland’s geothermal lagoons, balancing travel desires with a modest retirement budget.
  culinary: Ashley Boyer, a garden‑to‑table cooking enthusiast, transforms harvests of heirloom tomatoes, zucchini, kale, and fresh basil into a vibrant roasted vegetable quinoa bowl seasoned with garlic,
    lemon zest, and a drizzle of locally sourced honey, reflecting a preference for simple, nutritious meals.
  core: Ashley Boyer blends her exacting engineering precision with a love of hiking, wildlife photography, and garden‑to‑table cooking, yet habitually misplaces her reading glasses while chasing the perfect
    trail viewpoint.
background:
  cultural: Raised in a modest, rural Midwestern family that settled in Idaho, Ashley’s cultural background blends traditional American values of self-reliance, community service, and respect for the outdoors
    with a strong work ethic inherited from her German-American ancestry. Growing up during the environmental awakening of the 1970s, she embraces sustainable practices and values practical innovation.
    Her community ties are anchored in local church involvement and annual celebrations of regional harvest festivals, while she also appreciates broader American cultural traditions.
attributes:
  skills: '[''Lean Manufacturing'', ''Industrial Safety Auditing'', ''Risk Assessment'', ''Ergonomic Design'', ''Statistical Process Control'', ''Project Management'', ''Regulatory Compliance (OSHA, ISO
