  hobbies: '[''Hiking'', ''Wildlife Photography'', ''Vegetable Gardening'', ''Reading Non-Fiction'', ''Woodworking'', ''Book Club'', ''Community Safety Volunteering'', ''Yoga'']'
  career_goals: She aims to transition into a mentorship and advisory role, guiding the next generation of engineers in rural Idaho while championing safer, more sustainable industrial practices. Ashley
    intends to develop a community safety consultancy that provides risk-assessment services to local agricultural processing plants and small manufacturers. She also aspires to publish a practical guide
    on integrating modern safety technologies in low-resource settings and to serve on a state occupational health advisory board.
