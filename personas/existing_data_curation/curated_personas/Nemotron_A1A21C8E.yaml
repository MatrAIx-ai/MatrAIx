personas:
  professional: Sabrina Wade, an innovative hairstylist and salon manager, blends precision balayage, eco‑friendly product expertise, and visual mood‑board consultations to create runway‑ready looks, while
    they keep the fast‑paced salon humming with the laid‑back, collaborative spirit of a South Florida beach community.
  sports: On the active side, Sabrina Wade enjoys sunrise beach volleyball with the Palm Beach Beach Volleyball Club, weekly group yoga sessions, and occasional runs with the South Florida Runners’ Club,
    and they cheer for the Miami Heat and Miami Dolphins while preferring low‑impact, community‑driven workouts over solo gym routines.
  arts: Artistically, Sabrina Wade frequents the River Art Space, paints abstract watercolors inspired by the vibrant color palettes of Yayoi Kusama and Georgia O’Keeffe, and they curate Instagram mood
    boards featuring hair trends set to the ambient sounds of Tame Impala and the cinematography of Florence Pugh’s films, while regularly attending live performances by local jazz ensembles and flamenco
    dancers to fuel their creative salon ambience.
  travel: Travel‑wise, Sabrina Wade blends spur‑of‑the‑moment weekend getaways to Caribbean islands like the Bahamas with carefully planned fashion‑industry trips to Milan, Paris, and New York, and they
    balance budget constraints by using travel points and seeking boutique stays that echo the airy, sun‑lit aesthetic of their Palm Beach roots.
  culinary: Culinary‑wise, Sabrina Wade delights in cooking Mediterranean feasts at home, mastering dishes such as Greek moussaka, Italian seafood risotto, and Spanish paella with a generous drizzle of
    extra‑virgin olive oil, fresh herbs like basil and oregano, and feta cheese, while also experimenting with homemade humus and falafel, and they often pair their meals with a crisp rosé or a glass of
    sauvignon blanc.
  core: At 31, Sabrina Wade is a sun‑kissed hair artist who juggles spontaneous boutique décor splurges, occasional anxiety‑fuelled over‑thinking, a habit of leaving salon lights on, and a relentless drive
    to fuse sustainable beauty with beachfront-inspired art, and they channel that energy into every brushstroke and client consultation.
background:
  cultural: Sabrina grew up in a suburban neighborhood of South Florida, absorbing a blend of traditional white American middle‑class values and the vibrant, multicultural atmosphere of the Sunshine State.
    Her family emphasized hard work and community involvement, shaping her collaborative nature. Living near the Atlantic coast, she embraces a beach‑oriented lifestyle and the laid‑back yet stylish aesthetic
    of Palm Beach County. She identifies with the regional culture of hospitality, an appreciation for outdoor activities, and a growing awareness of environmental sustainability that influences her professional
    choices.
