  hobbies: '[''Watercolor painting'', ''Quilting'', ''Coastal birdwatching'', ''Gardening'', ''Reading historical fiction'', ''Attending local art exhibitions'', ''Volunteer work at the community library'',
    ''Walking on the beach at sunrise'', ''Cooking Southern cuisine'', ''Participating in small book clubs'']'
  career_goals: Marlene aims to transition into a mentorship role where she can share her extensive managerial knowledge with younger employees and emerging community leaders. She hopes to spearhead a local
    arts initiative that blends her love of creativity with her organizational strengths, providing a platform for small‑scale exhibitions and workshops. Additionally, she aspires to serve on the Onslow
    County Chamber of Commerce board to influence regional development while balancing her professional commitments with personal well‑being and stress reduction.
