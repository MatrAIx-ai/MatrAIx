  career_goals: Chanel aims to ascend to a senior executive role—ideally Chief Financial Officer—within the next five years, positioning herself as a strategic partner for corporate growth. She is actively
    pursuing professional certifications such as the CPA and CMA to bolster her credibility and is targeting leadership of a multi‑site operation or a division within a large regional corporation. Her ambition
    includes establishing a mentorship program to cultivate disciplined, high‑performing finance professionals, while also exploring the possibility of launching a boutique financial consultancy that offers
    structured, results‑driven services to small‑to‑mid‑size businesses in the Dallas‑Fort Worth metroplex.
