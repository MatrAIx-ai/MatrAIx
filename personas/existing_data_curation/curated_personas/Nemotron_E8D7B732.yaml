  career_goals: Shaun aims to become a certified sheet metal foreman within the next three years, securing additional credentials such as the AWS Certified Welding Inspector. He envisions transitioning
    into a supervisory role where he can mentor apprentices and implement lean manufacturing practices. Long‑term, he aspires to launch his own custom metal art studio that blends his Colombian cultural
    heritage with contemporary Philadelphia architecture, creating sculptural installations and bespoke metal furniture for high‑end residential and commercial projects.
