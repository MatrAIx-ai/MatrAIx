personas:
  professional: Shaun Mejia, a 26-year-old sheet metal worker, excels at reading blueprints, MIG/TIG welding, CNC plasma cutting, and AutoCAD drafting, and their curiosity and methodical planning translate
    into meticulous project execution and innovative collaborations with architects.
  sports: Shaun Mejia, a 26-year-old weekend basketball enthusiast, plays pickup games at the local YMCA, follows the Philadelphia 76ers and the Philadelphia Flyers, and hikes the Wissahickon Valley trails
    year‑round to keep fit while balancing teamwork and solo endurance.
  arts: Shaun Mejia, a 26-year-old art lover, sketches murals in Philadelphia’s alleys, attends exhibitions featuring artists like Banksy and Kehinde Wiley, mixes acrylics with found metal scraps, and photographs
    urban textures with a vintage Leica, all while strumming acoustic renditions of José González and Tash Sultana.
  travel: Shaun Mejia, a 26-year-old traveler, plans meticulous weekend getaways to nearby historic towns like New Hope, and dreams of a summer road trip through the Andes to explore metalworking workshops,
    balancing budget constraints with a desire for cultural immersion.
  culinary: Shaun Mejia, a 26-year-old home chef, expertly prepares sancocho and arepas using fresh cilantro, plantains, and achiote, experiments with spice blends while occasionally over‑seasoning, and
    enjoys pairing their dishes with craft beers from local Philadelphia breweries.
  core: Shaun Mejia, a 26-year-old methodical metalworker with a paint‑splattered sketchbook, quietly juggles precision welding, acoustic guitar chords, and a stubborn habit of ordering pizza at midnight
    after long CAD sessions.
background:
  cultural: Shaun's Colombian roots are a central part of his identity. He grew up listening to cumbia, vallenato, and salsa, and his family maintains traditions such as Navidad celebrations with extended
    relatives, sharing homemade empanadas, and dancing to folkloric music. Living in Philadelphia, he bridges his heritage with the city's diverse cultural fabric by participating in local Colombian community
    events, volunteering at cultural festivals, and incorporating Latin American motifs into his artistic projects. His bilingual fluency in Spanish and English deepens his connections within both the Colombian
    diaspora and the broader Philadelphia community.
