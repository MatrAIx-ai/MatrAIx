  Emory to lead the way in campus sustainability. They are also likely to have expertise in energy conservation, academic programs, and individual action, as outlined in the individual plans. Additionally,
  they may have experience in developing strategic paths toward reducing the carbon emissions of each academic unit in the areas of sustainable building and construction, energy, transportation, waste management,
  food, procurement, academic programs, and individual action.
