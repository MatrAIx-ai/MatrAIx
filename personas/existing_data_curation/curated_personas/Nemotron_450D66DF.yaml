personas:
  professional: Shamari Young, an aspiring art historian and mental‑health advocate, blends digital illustration, rigorous research, and compassionate counseling to design exhibitions and therapeutic workshops
    that honor local heritage, driven by their methodical organization and unbridged curiosity.
  sports: Shamari Young prefers solitary hikes on the Piedmont trails and occasional early‑morning runs, follows the Charlotte Hornets and UNC Greensboro Spartans basketball teams, and participates in the
    Greensboro Trail Club’s weekend walks, while avoiding crowded gym classes that drain their energy.
  arts: Shamari Young immerses themselves in watercolor sketching, mixed‑media drawing, and street photography, draws inspiration from Jacob Lawrence, Romare Bearden, and contemporary visual artist Tschabalala
    Self, and curates listening sessions of Nina Simone, Miles Davis, and Kamasi Washington to fuel their creative process.
  travel: Shamari Young favors meticulously planned weekend getaways, has explored historic Charleston, Savannah, and New Orleans, dreams of a solo photography retreat in Marrakech, and balances travel
    ambitions with a student budget by using discount bus passes and staying in hostels.
  culinary: Shamari Young enjoys cooking soulful dishes like collard greens with smoked paprika, slow‑cooked sweet‑potato gumbo, and pecan pie, experiments with Asian flavors such as miso‑glazed eggplant,
    and is a competent solo cook who often prepares meals while listening to jazz vinyl records.
  core: Shamari Young is a curiosity‑driven introvert who channels intense emotional tides into solitary art and advocacy, yet sometimes lets perfectionism delay social plans and over‑indulges in late‑night
    sketch sessions.
background:
  cultural: Shamari was raised in a close‑knit Black family in Greensboro, North Carolina, where stories of the city’s civil‑rights heritage, such as the 1960 sit‑ins, shaped her sense of community responsibility.
    Family gatherings often featured gospel music, soul food, and celebrations of Juneteenth and Kwanzaa, grounding her in Southern Black traditions. She draws inspiration from African‑American artists
    and writers, and her cultural identity informs both her artistic voice and her commitment to creating supportive spaces for Black youth facing mental‑health challenges.
