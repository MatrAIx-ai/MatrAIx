    nature hikes'', ''photography'']'
  career_goals: Shamari aims to complete a bachelor’s degree in Art History with a minor in Psychology, then pursue a master’s in Art Therapy or Museum Studies. She envisions a career where she can curate
    exhibitions that highlight African‑American artists while providing therapeutic workshops for young people coping with mental‑health challenges. In the long term she hopes to establish a community art
    space in Greensboro that offers quiet, supportive environments for creative expression and healing, blending her love of art, research, and advocacy.
