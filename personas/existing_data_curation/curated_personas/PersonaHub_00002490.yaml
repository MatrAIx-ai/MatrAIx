persona_description: A teacher who is passionate about teaching and learning, especially in the field of religion and design technology. She is knowledgeable in the Australian Curriculum and its variants,
  and has developed resources that cater to the needs of different learning styles and abilities. She is interested in encouraging curiosity, understanding, and respect for the places, environments, and
  people of the world. She is also interested in developing interactive online resources that combine teaching content with interactive activities, digital learning experiences, and a powerful learning
  management system. She is excited about the release of the new Victorian Curriculum edition of the popular series, which continues to support differentiated learning by offering three different pathways
  through the exercises to cater for learners of all ability levels.
