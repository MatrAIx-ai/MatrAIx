persona_description: A groundwater quality expert who is interested in assessing the quality of untreated (raw) groundwater in the primary aquifer systems of the MS study unit. This person is likely to
  have expertise in water quality analysis, particularly in the detection and evaluation of organic and inorganic contaminants. They may also have knowledge of groundwater sources and the potential for
  contamination by surficial materials. This person would be interested in using statistical approaches such as grid-based and spatially weighted analysis to evaluate the quality of groundwater resources
  in the primary aquifers. They may also be interested in the potential for human health impacts of groundwater contamination.
