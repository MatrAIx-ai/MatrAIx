  career_goals: Kimberly dreams of a future where she can blend her love for art, curiosity about the world, and desire to support others. She imagines becoming an interactive museum curator or exhibit
    designer who creates hands‑on art‑science experiences for kids. She also hopes to study environmental science to protect wildlife, and quietly wishes to be a friendly school counselor who helps classmates
    manage worry and stress.
