personas:
  professional: Kimberly Alvarez is an aspiring young digital storyteller who blends cartoon drawing, watercolor painting, and Scratch animation into vibrant short films; their innate curiosity fuels experimental
    ideas, their organized yet flexible workflow keeps projects on track despite occasional stress‑induced perfectionism, and their sociable nature shines when they share their creations with friends and
    classmates.
  sports: Kimberly Alvarez plays forward for the Silver Oaks Junior Soccer Club, practicing twice weekly and joining weekend nature‑trail hikes that double as cardio, idolizing the US Women’s National Team
    and cheering on the local Metro City Mavericks, while their assertive teamwork and occasional anxiety about performance keep them striving to improve.
  arts: Kimberly Alvarez spends afternoons sketching Calvin‑and‑Hobbes‑style characters, animating them in Scratch, painting Monet‑inspired watercolors, crafting beaded bracelets with colorful glass beads,
    devouring J.K. Rowling’s fantasy novels, and dancing to Taylor Swift’s pop hits and the Latin rhythm of \"Despacito\", all of which fuel their vibrant creative identity.
  travel: Kimberly Alvarez loves family road trips to local gems like Redwood Regional Park and the San Diego Zoo, has visited Disneyland in Anaheim, dreams of exploring Edinburgh’s castles and the Warner
    Bros. Studio Tour in London, and plans each adventure with a sticker‑filled map, balancing their excitement with the comfort of familiar routines despite occasional travel‑related worry.
  culinary: Kimberly Alvarez delights in helping their family roll corn tortillas for chicken tinga tacos and shape sweet corn tamales, mix smoky chipotle salsa, and create glitter‑topped cupcakes that
    echo their jewelry‑making flair, while also enjoying strawberry‑banana smoothies and occasionally indulging in candy as a sweet reward.
  core: Kimberly Alvarez is a curious, organized‑yet‑flexible nine‑year‑old who channels their love of art, soccer, and storytelling into vibrant creations, while juggling a bright imagination with a tendency
    to worry and a sweet spot for sparkly crafts.
background:
  cultural: Kimberly comes from a Mexican‑American family that keeps strong cultural ties while living in Bellevue, Washington. She speaks Spanish at home and English at school, celebrating Día de los Muertos,
    Las Posadas, and other Mexican holidays with traditional foods, music, and crafts. Family gatherings feature homemade tacos, tamales, and mariachi songs, and she has learned folk dances and stories
    from her grandparents. In the Pacific Northwest, she also enjoys the region’s outdoor culture, visiting parks, museums, and community events, blending both Mexican traditions and local American experiences.
