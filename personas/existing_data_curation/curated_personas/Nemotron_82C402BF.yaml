  career_goals: Douglas aims to advance from his current office clerk role to a supervisory or office manager position within the next three to five years. To achieve this, he plans to earn a Certified
    Administrative Professional (CAP) credential and deepen his technical abilities by mastering advanced Excel functions, Access database management, and basic SQL querying. He also hopes to lead a cross‑departmental
    project that streamlines office workflows, reduces errors, and improves staff morale. Ultimately, Douglas envisions a career where he can combine his organizational talents with a mentorship role, fostering
    a supportive environment for newer employees while contributing to the overall efficiency of his organization.
