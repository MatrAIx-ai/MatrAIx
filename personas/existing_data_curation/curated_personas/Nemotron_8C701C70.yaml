personas:
  professional: Sherman Johnson is a seasoned community handyman who blends practical carpentry, landscaping, and automotive repair with strong interpersonal mediation skills, and they aim to formalize
    these abilities through a vocational certification and a part‑time service business.
  sports: Sherman Johnson stays active by playing Saturday night pick‑up basketball with the St. Lucie Community Hoops crew, cheering for the Miami Heat and Tampa Bay Rays, and fishing for snook and redfish
    on the St. Lucie River each weekend with a trusty spinning rod, and they enjoy the quiet moments on the water.
  arts: Sherman Johnson’s artistic soul is fed by classic R&B legends like Al Green and Marvin Gaye, gospel choirs at their church, and live jazz nights at the Black Pearl Tavern, where they often request
    "What a Wonderful World" by Louis Armstrong.
  travel: Sherman Johnson prefers low‑key road trips, having driven the Florida Keys Loop, explored the historic streets of Savannah, and soaked up jazz in New Orleans, while dreaming of a future Caribbean
    cruise that fits their family budget and schedule, and they hope to return with stories to share.
  culinary: Sherman Johnson excels at Southern soul food, regularly preparing fried chicken, collard greens, cornbread, and smoked BBQ ribs seasoned with hickory chips, and they love to incorporate home‑grown
    citrus into key‑lime pie and marinades.
  core: Sherman Johnson is a neighborhood‑centric handyman‑cook who thrives on routine, community gatherings, and the sweet scent of fresh citrus, even if they sometimes misplace their tools and forget
    a floss thread.
background:
  cultural: Sherman identifies as African American and draws deep cultural strength from his family's Southern heritage and the vibrant Black community in Stuart. Growing up, church played a central role,
    instilling values of fellowship, respect for elders, and service to others. He celebrates cultural traditions such as Juneteenth, Black History Month events, and the annual church choir festival, helping
    preserve and pass on stories of civil‑rights activism in his region. His culinary tastes are rooted in soul food recipes passed down through generations, and his music preferences reflect the historical
    sounds of Motown, gospel choirs, and contemporary R&B, all of which shape his identity and community involvement.
attributes:
  skills: '[''Carpentry'', ''Home Repair'', ''Landscaping'', ''Automotive Maintenance'', ''Community Mediation'', ''Event Coordination'', ''Soul Food Cooking'']'
  hobbies: '[''Gardening'', ''Fishing'', ''Community Basketball'', ''Listening to R&B/Gospel/Jazz'', ''Hosting Potluck Dinners'', ''Card Games'', ''Volunteer Work at Food Pantry'']'
  career_goals: Although currently not in the formal workforce, Sherman aims to formalize his handyman expertise by obtaining a vocational certification in home repair and become a reliable part‑time service
    provider for his neighborhood. He also aspires to deepen his role as a community mentor, leading youth workshops at his church and coordinating a local food‑bank volunteer program. Long‑term, Sherman
    hopes to launch a modest home‑based catering venture that blends his cooking talents with his love for communal gatherings, while maintaining a stable family life with his spouse.
