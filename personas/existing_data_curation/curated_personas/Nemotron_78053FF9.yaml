  hobbies: '[''Strategy and puzzle video games'', ''LEGO building'', ''Arduino tinkering'', ''Reading sci‑fi/fantasy novels'', ''Watching anime'', ''Drawing manga/comic art'', ''Cooking Mexican family recipes'',
    ''Listening to Mexican folk and modern pop music'', ''Walking in local parks'', ''Small‑group community service'']'
  career_goals: Gabriel aims to finish high school and earn his GED, then pursue an associate degree in computer science or electronics at a local community college. He dreams of becoming a software developer
    or hardware engineer, roles that let him work independently while applying his curiosity and practical skills. He also hopes to blend his cultural roots with his career by creating tech tools that help
    bilingual communities, such as language‑learning apps. In the longer term, he envisions a flexible job that allows him to balance work with family time and occasional community volunteering.
