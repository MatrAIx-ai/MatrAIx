personas:
  professional: Gabriel, a budding junior technologist who blends his love for strategy video games and hands‑on Arduino projects, spends afternoons building programmable LEGO gadgets for his school’s robotics
    after‑school club, applying his practical curiosity while thriving in low‑pressure, collaborative tasks.
  sports: Gabriel, an avid supporter of Club América and participant in his school's casual basketball club, enjoys watching televised matches on weekend evenings and plays pickup basketball with a few
    friends after school, favoring low‑pressure, small‑group games over competitive leagues.
  arts: Gabriel, who sketches manga‑style characters inspired by the works of Eiichiro Oda and studies the animation of Studio Ghibli, spends weekends re‑watching 'My Hero Academia' and listening to pop
    singer Bad Bunny alongside folk singer Lila Downs, letting these creative influences shape personal art projects.
  travel: Gabriel, who enjoys quiet walks in the local botanical garden and dreams of exploring the ancient ruins of Teotihuacan and the vibrant streets of Kyoto, plans trips with family around school breaks,
    preferring a balanced itinerary of cultural immersion and relaxed downtime, though budget constraints sometimes limit long‑haul adventures.
  culinary: Gabriel, who loves cooking tamales, elote, and homemade guacamole with his family on weekends, experiments by adding a dash of chipotle to classic quesadillas, and often burns the bottom of
    the tortilla in his haste, yet cherishes the shared meals as a bridge to tradition.
  core: Gabriel, a quiet yet curious teen who builds LEGO robots, devours sci‑fi novels, and forgets to tidy their desk, navigates life with a blend of practical ingenuity and a relaxed, cooperative spirit.
background:
  cultural: Gabriel is the son of Mexican immigrants and grew up in a bilingual household in Saint Paul, Minnesota. At home, Spanish is spoken daily, and family gatherings feature traditional Mexican foods,
    music, and celebrations like Día de los Muertos and Cinco de Mayo. His parents emphasize the importance of cultural pride and community, encouraging him to participate in local Mexican festivals and
    volunteer at the cultural center. While adapting to Midwestern life, he balances Mexican customs—such as respect for elders and close family ties—with the diverse, inclusive environment of Ramsey County,
    shaping a multicultural identity that informs his interests and aspirations.
attributes:
  skills: '[''Basic Scratch programming'', ''Arduino tinkering'', ''Conversational Spanish-English translation'', ''Strategic video‑game problem solving'', ''LEGO design and construction'', ''Small‑group
