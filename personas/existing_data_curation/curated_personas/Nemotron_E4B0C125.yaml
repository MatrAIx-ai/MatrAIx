  career_goals: Suhail aims to transition from labor-intensive site work to a more autonomous role as a master carpenter and small-scale custom-furniture workshop owner. He plans to earn the California
    Master Carpenter certification within the next two years, which will allow him to bid on higher-valued projects and secure longer-term contracts with local developers. At the same time, he wants to
    develop a modest side business producing handcrafted wooden furniture for select clients who appreciate his quiet, meticulous style. To manage his anxiety about unpredictable deadlines, he prefers to
    schedule work that follows a predictable rhythm—such as renovation projects with clear, phased milestones—while gradually reducing the number of overnight or rush jobs he accepts.
