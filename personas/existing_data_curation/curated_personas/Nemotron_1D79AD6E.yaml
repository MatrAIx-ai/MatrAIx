  career_goals: Although retired, Deanna aims to remain an active pillar of her Black Creek community. She plans to launch a weekly "Story & Recipe" session at the town library, where elders share culinary
    traditions and personal histories. Writing a memoir that captures post‑war Midwestern life and the evolution of her hometown is a long‑standing ambition. She also wishes to mentor younger volunteers
    at the senior center, passing on her event‑planning know‑how and fostering intergenerational connections. Lastly, Deanna hopes to embark on small road trips across Wisconsin to visit historic sites
    and farm markets, enriching her appreciation for the state's heritage.
