  hobbies: '[''Abstract Painting'', ''Sketching'', ''Poetry Writing'', ''Bridge Club'', ''Book Club'', ''Heirloom Gardening'', ''Museum Volunteering'', ''Birdwatching'', ''Community Theater'', ''Online
    Learning (AI & VR Filmmaking)'']'
  career_goals: In the coming years, Ashley aims to cement her legacy by establishing a community media hub in Wautoma that provides free training, equipment, and mentorship to youth and senior volunteers.
    She plans to produce a multi‑episode documentary series titled "Stories from Small Town America," highlighting the lives, histories, and landscapes of Waushara County. To support this, she is pursuing
    a regional arts grant and intends to partner with the local historical society to digitize and preserve decades of oral histories and home movies. Additionally, Ashley hopes to author a memoir that
    intertwines her personal journey with the evolution of television technology, and to speak at Midwestern film festivals about the value of lifelong creative curiosity and community‑focused storytelling.
