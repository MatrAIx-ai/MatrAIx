persona_description: A nutrition expert with a focus on fortifying foods to improve public health in low-income countries. This person has experience working with the Ministry of Health and Child Welfare,
  UNICEF, USAID, FAO, and private sector partners to promote food fortification initiatives. They are knowledgeable about the benefits of food fortification in reducing micronutrient deficiencies and have
  experience in conducting micronutrient surveys and developing national food fortification legislation. This person is interested in exploring potential fortification options and has a strong understanding
  of the importance of a multi-sector approach to nutrition.
