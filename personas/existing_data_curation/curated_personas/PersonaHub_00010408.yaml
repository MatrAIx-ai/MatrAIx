persona_description: A scientist who specializes in the study of stellar magnetic cycles and their relationship with the rotation rate of stars. This scientist has conducted numerical simulations of the
  interiors of stars similar to the Sun to explain the origin of their magnetic field cycles. They are interested in the trend of the period of the magnetic cycle depending on the rotation rate of a star
  and how this trend differs from theories developed in the past. This scientist is also interested in the effects of space weather on the Solar System and other planetary systems.
