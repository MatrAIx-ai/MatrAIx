personas:
  professional: Mary White is a budding visual communication enthusiast who leverages strong digital illustration skills in Procreate, organized project management, and a competitive drive to dominate school
    art contests while building a portfolio aimed at a future UI/UX design career.
  sports: Mary White enjoys weekend jogs through Meadowbrook Park, follows the New York Knicks and the New Jersey Devils with fervor, and participates in her high school’s seasonal track club, treating
    fitness as a creative release rather than a competitive pursuit.
  arts: Mary White immerses herself in speculative graphic novels like ‘Saga’ and ‘Watchmen’, draws inspiration from Hayao Miyazaki and street artist Banksy, and actively volunteers at the Nutley community
    art space, where she curates pop‑up shows and experiments with watercolor portraits.
  travel: Mary White prefers day trips to New York City’s museum districts and occasional train rides to Philadelphia’s street‑art neighborhoods, while dreaming of a solo backpacking adventure through Tokyo
    and Kyoto to study Japanese illustration, all balanced against her school schedule and modest teen budget.
  culinary: Mary White loves crafting avocado toast topped with chili flakes and soy sauce, devours spicy ramen and matcha boba tea, and, though still a novice cook, experiments with quick, colorful salads
    after late‑night art sessions, while often relying on pizza delivery when deadlines loom.
  core: Mary White, a fiercely curious teen artist, channels competitive energy into meticulous portfolios, balances disciplined organization with spontaneous sketching, and navigates a modest budget while
    occasionally indulging in impulsive art‑related purchases.
background:
  cultural: Mary is a White American raised in the suburban town of Nutley, New Jersey. Growing up near New York City, she has been exposed to a wide range of cultural experiences, from museum visits to
    diverse culinary options, while still maintaining the traditions of a middle‑class Northeastern family. Her household celebrates typical American holidays and occasional heritage customs from her ancestors’
    European roots (e.g., Irish and English). This blend of suburban stability, proximity to a major cultural hub, and a family emphasis on curiosity and self‑expression informs her worldview.
attributes:
  skills: '[''digital illustration'', ''photography'', ''basic graphic design'', ''critical thinking'', ''public speaking'', ''time management'', ''project planning'']'
