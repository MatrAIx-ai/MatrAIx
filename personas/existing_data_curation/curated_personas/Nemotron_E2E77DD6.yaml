    ''volunteering at library art program'']'
  career_goals: Mary aims to pursue a career that merges her love for art and technology. She plans to attend a specialized art high school or a college program in visual communications, with the long‑term
    goal of becoming a graphic designer or UI/UX designer for a creative agency. She also dreams of curating exhibitions that highlight emerging artists and hopes to build an online platform where she can
    showcase her own work while supporting others. Securing a scholarship and assembling a strong portfolio are top priorities, and she is motivated to turn her competitive drive into professional achievement.
