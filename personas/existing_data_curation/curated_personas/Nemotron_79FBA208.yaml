personas:
  professional: An experienced HVACR mechanic named Sacha Dent, 29, leverages deep troubleshooting expertise, EPA 608 certification mastery, and a hands‑on curiosity for emerging heat‑pump tech while thriving
    on the freedom of independent problem‑solving and a tool kit kept meticulously organized despite a relaxed attitude toward paperwork.
  sports: Sacha Dent, an avid hiker of the Blue Ridge and dedicated fly‑fisher on the Shenandoah, trains with the Shenandoah Trail Runners Club, roots for the Washington Commanders and the Washington Nationals,
    and keeps fitness low‑key by tackling weekend treks rather than structured gym routines.
  arts: Sacha Dent nurtures a quiet creative side by woodworking reclaimed pine, restoring vintage radios, crocheting breezy blankets, and soaking in bluegrass legends like Bill Monroe and contemporary
    acts such as Mumford & Sons during intimate gatherings at the local church hall.
  travel: Sacha Dent favors low‑key road trips that blend nature and tradition, often spending long weekends exploring Asheville’s art scene, venturing to Vermont’s leaf‑covered byways, and dreaming of
    a future eco‑retreat in the Appalachian Highlands while balancing a modest budget and the need to stay close to family.
  culinary: Sacha Dent enjoys rustic Southern fare—nothing beats a plate of skillet‑fried catfish with cornmeal, collard greens seasoned with smoked ham hocks, and a side of fresh peach cobbler—while skillfully
    cooking for two with a trusty cast‑iron skillet and a modest pantry stocked with locally sourced honey and heirloom tomatoes.
  core: Sacha Dent is a 29‑year‑old HVAC puzzler who trades county‑fair wit for quiet mountain trails, balances a knack for smart‑tech upgrades with a habit of misplacing paperwork, and fuels life with
    bluegrass, back‑pain stretches, and a competitive streak that keeps both tools and ambitions humming.
background:
  cultural: Sacha grew up in Hardy, Virginia, a close‑knit community in the Appalachian foothills where her family has a tradition of skilled trades. The local culture emphasizes self‑reliance, modesty,
    and a strong work ethic rooted in generations of farm and craft work. She was raised with Southern hospitality and attends a nearby Methodist congregation, participating in community events like county
    fairs and church potlucks. While she values the supportive network of her hometown, she also cherishes personal independence, which informs both her career path as a tradesperson and her preference
    for modest, low‑key social settings.
attributes:
  skills: '[''HVAC system installation'', ''Refrigerant handling and recovery'', ''Diagnostic troubleshooting'', ''Electrical wiring and controls'', ''Blueprint and schematics reading'', ''Energy‑efficiency
    retrofits'', ''Smart thermostat programming'', ''Customer communication'', ''Safety compliance (OSHA, EPA)'', ''Tool maintenance and calibration'']'
  hobbies: '[''Hiking'', ''Fly fishing'', ''Woodworking'', ''Repairing vintage radios'', ''Reading technical journals'', ''Crocheting'', ''Gardening'', ''Listening to bluegrass music'']'
  career_goals: Sacha aims to earn NATE master specialist certification and upgrade her EPA 608 certification to a universal level within the next two years. She aspires to become a lead technician in her
    current company, taking on supervisory responsibilities while still maintaining hands‑on work. Long‑term, she envisions launching a small, family‑run HVAC contracting business that prioritizes flexible
    scheduling for rural clients and offers sustainable, high‑efficiency solutions. She also hopes to mentor apprentices, sharing her blend of curiosity‑driven learning and practical know‑how, and eventually
    become a part‑time instructor at a local trade school.
