  career_goals: Dillon aims to become a senior construction executive who leads large‑scale, mixed‑use projects that blend cutting‑edge design with green building standards. Over the next five years he
    plans to earn the PMP certification, pursue a LEED Green Associate credential, and take on a regional project‑director role where he can mentor junior managers. Ultimately, he hopes to launch his own
    boutique construction firm that focuses on sustainable, artistically expressive buildings for community‑focused developers in Texas. He is driven to be recognized as an industry innovator and to win
    awards for design‑conscious construction.
