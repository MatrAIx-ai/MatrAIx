personas:
  professional: Dillon Naredo is a mid‑size commercial construction manager in the Dallas‑Fort Worth area who leverages BIM expertise, a STEM background, and an artistic eye to translate bold design concepts
    into on‑site reality, while they balance a flexible, sometimes unstructured approach with sharp problem‑solving under pressure and a knack for motivating crews.
  sports: Dillon Naredo is a competitive pick‑up basketball player who guards the paint for a local Dallas league, cheers for the Mavericks on game nights, hikes the trails of Cedar Hill State Park on weekends,
    follows the Texas Rangers, and maintains a casual fitness routine that sometimes falters when work demands surge, while they still prioritize team camaraderie.
  arts: Dillon Naredo is an avid participant in the Dallas contemporary art scene, regularly attending openings at the Nasher Sculpture Center and photographing the city’s sunrise skyline like a visual
    storyteller, while they draw inspiration from artists such as Kerry James Marshall and musicians like St. Vincent, often sharing their own black‑and‑white street‑photography on Instagram.
  travel: Dillon Naredo is a travel‑enthusiast who has toured Barcelona’s Sagrada Família and Chicago’s iconic skyscrapers to study architectural details, dreams of exploring Dubai’s Burj Khalifa and Japan’s
    minimalist museums, prefers flexible itineraries that blend spur‑of‑the‑moment street‑food hunts with scheduled site visits, and while they enjoy spontaneous planning, their budget sometimes limits
    extended overseas trips.
  culinary: Dillon Naredo is a North Texas foodie who alternates between sampling brisket tacos from a beloved food truck, savoring the complex flavors of a smoked duck ramen at a Dallas pop‑up, experimenting
    with mid‑century modern‑inspired cocktails at home, and often splurges on artisanal ingredients for DIY home‑renovation celebrations, even though they sometimes forget to stock basic groceries.
  core: Dillon Naredo is a creatively curious construction manager whose love for art, spontaneous DIY projects, and competitive basketball clash with a laid‑back, occasionally chaotic approach to planning,
    making them a charismatic but sometimes disorganized innovator.
background:
  cultural: Dillon grew up in the diverse suburbs of Euless, Texas, where a blend of traditional Texan hospitality and a growing multicultural community shaped his worldview. His family’s white, middle‑class
    background emphasized practicality, hard work, and a love for hands‑on projects, values that naturally guided him toward construction. The proximity to Dallas’s vibrant arts district and the multicultural
    food scene fostered his curiosity for new ideas and experiences. While he embraces the relaxed, independent spirit typical of the North Texas region, he also values the inclusive, community‑oriented
    atmosphere of Tarrant County, participating in local volunteer build‑days and regional festivals that celebrate the county’s blend of Southern, Hispanic, and urban influences.
