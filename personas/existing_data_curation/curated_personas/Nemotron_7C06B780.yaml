personas:
  professional: Urenna Mcclain, a seasoned volunteer leader in Sacramento, channels her organized, methodical approach and compassionate mentorship into coordinating intergenerational community garden projects
    and preserving oral histories for a regional heritage archive.
  sports: Urenna Mcclain enjoys low‑impact fitness through morning walks along the American River trails, follows the Sacramento Kings for her sporadic basketball excitement, cheers on the Sacramento River
    Cats during summer weekends, and participates in the senior walking club at the local community center.
  arts: Urenna Mcclain immerses herself in the arts by knitting while listening to Miles Davis, attending local jazz nights featuring tributes to Ella Fitzgerald, reading Toni Morrison’s novels, and photographing
    park scenes inspired by the serene compositions of Ansel Adams.
  travel: Urenna Mcclain favors thoughtfully planned, low‑stress journeys, such as a weekend retreat to the historic peach farms of Charleston, a leisurely road trip through California’s wine country, and
    a dream itinerary to explore the literary cafés of Dublin and the jazz heritage of New Orleans, all while budgeting for senior travel discounts.
  culinary: Urenna Mcclain delights in cooking soul‑food classics like shrimp and grits, collard greens simmered with smoked turkey, and sweet potato pie, while also mastering Californian staples such as
    avocado‑sprinkled quinoa bowls, and she meticulously seasons each dish with fresh thyme, rosemary, and a pinch of smoked paprika.
  core: Urenna Mcclain is a quietly diligent garden‑philosopher who balances a love for meticulous record‑keeping with a habit of humming retro gospel tunes while stitching quilts for strangers, even if
    she sometimes forgets where she placed her reading glasses.
background:
  cultural: Urenna is a second-generation African-American whose grandparents migrated from the Deep South during the Great Migration and settled in California. Raised in a close-knit church community,
    she grew up with gospel music, storytelling, and a strong emphasis on mutual aid. The civil-rights movement of the 1960s shaped her worldview, instilling a lasting commitment to social justice and community
    empowerment. In Sacramento, she remains active in a historically Black congregation and the local NAACP chapter, celebrating cultural traditions such as Juneteenth, soul-food cooking, and oral-history
    sharing. Her cultural identity blends Southern culinary heritage, West-Coast progressive activism, and a deep reverence for the collective resilience of her community.
