  hobbies: '[''gardening'', ''birdwatching'', ''reading historical fiction and African-American literature'', ''knitting and quilting'', ''cooking traditional soul-food dishes'', ''genealogy research'',
    ''crossword puzzles'', ''nature photography'', ''attending jazz and gospel concerts'', ''participating in Juneteenth celebrations'']'
  career_goals: Although retired from formal employment, Urenna aims to deepen her impact as a senior volunteer leader within Sacramento's African-American community. She aspires to mentor younger volunteers,
    spearhead an intergenerational community-garden project, and help document oral histories of local elders for a regional heritage archive. Urenna also hopes to serve on the board of a nonprofit serving
    low-income seniors, and eventually compile a memoir that blends her personal story with the broader narrative of the Black experience in California.
