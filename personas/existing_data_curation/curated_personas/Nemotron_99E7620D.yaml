personas:
  professional: Tiffanie Johnson, a veteran housekeeper with over three decades of experience, combines meticulous inventory control, systematic deep‑cleaning protocols, and OSHA‑compliant safety practices
    with their organized, talkative nature to train staff, build client rapport, and drive efficiency in residential and small‑business environments.
  sports: Tiffanie Johnson embraces sunrise beach walks, weekly gentle yoga, occasional community volleyball games in the summer, cheers for the Miami Heat and the Miami Dolphins, and participates in a
    local senior swim club at the Boca Raton Aquatics Center, blending a structured fitness routine with seasonal team loyalty as they stay active and socially engaged.
  arts: Tiffanie Johnson, a lead soprano in her church choir, relishes performing gospel classics by Mahalia Jackson and contemporary hits by Beyoncé, attends the Broward Center for the Performing Arts
    to see productions starring Audra McDonald, and unwinds with mystery novels by Agatha Christie, illustrating how music, theater, and literature enrich their social and creative life.
  travel: Tiffanie Johnson prefers well‑planned weekend getaways to coastal towns like Amelia Island and cultural trips abroad to Jamaica and Barcelona, balancing a love for historic architecture with a
    desire for relaxed beachfront experiences, while budgeting travel expenses within their retirement savings plan to maintain financial stability.
  culinary: Tiffanie Johnson, an avid home cook, blends Southern comfort dishes such as smoked chicken, collard greens, and creamy grits with Caribbean flavors like jerk seasoning, plantains, and coconut
    rice, expertly using fresh herbs from their native Florida garden including rosemary and sage, and often showcases their creations at neighborhood potlucks.
  core: Tiffanie Johnson is a meticulously organized, socially vibrant 55‑year‑old who channels their love of structure and community into a thriving housekeeping career, lively choir performances, and
    a kitchen filled with soulful Southern‑Caribbean flavors, all while wrestling with occasional worry‑driven perfectionism.
background:
  cultural: Tiffanie is a white American who grew up in a middle‑class suburban family in South Florida, with ancestral roots tracing back to Irish and English immigrants. She was raised with traditional
    American values, celebrating holidays such as Thanksgiving, Christmas, and the Fourth of July with family gatherings. Her upbringing emphasized a strong work ethic, community involvement, and respect
    for the multicultural environment of Broward County. She identifies with the local Christian community, attending a Methodist church where she participates in the choir and service projects. Over the
    years, she has embraced the coastal lifestyle and incorporated aspects of Caribbean and Latin cultures—such as food, music, and festivals—into her daily life.
