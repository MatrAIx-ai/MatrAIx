    and SOP creation'']'
  hobbies: '[''Beach walks at sunrise'', ''Gardening native Florida plants'', ''Cooking Southern and Caribbean dishes'', ''Singing in the church choir'', ''Reading mystery novels'', ''Attending community
    dance classes'', ''Volunteering at the local senior center'', ''Practicing gentle yoga'', ''Participating in potluck gatherings'', ''Knitting scarves'']'
  career_goals: Tiffanie aims to move into a supervisory or lead housekeeper role within a property‑management firm, where she can design and enforce standardized cleaning protocols that maximize efficiency
    and predictability. She plans to earn a Certified Professional Cleaner credential and, within the next five years, launch her own boutique cleaning service focused on senior citizens and vacation‑rental
    properties in Broward County. Her ambition includes mentoring younger cleaners, creating a supportive and structured work environment, and establishing a steady income stream that will support a comfortable
    retirement while allowing her to maintain her strong social connections.
