personas:
  professional: Eric Brown, a seasoned shipyard maintenance veteran turned community handyman, leverages his carpentry, plumbing, and small‑engine expertise together with his natural curiosity and people‑skills
    to coordinate neighborhood events and mentor youth, even though his spontaneous nature sometimes clashes with tight deadlines.
  sports: Eric Brown enjoys fishing on the Elizabeth River, plays weekly pick‑up basketball at the community center, and devotes weekends to cheering for the Washington Nationals, while they belong to a
    local walking club that meets for low‑impact cardio and occasionally join a senior‑center softball league in the summer.
  arts: Eric Brown immerses himself in live R&B concerts featuring artists like Leon Bridges and Anita Barker, attends gospel choir performances at the historic St. Mark's church, and participates in the
    local theater's 'Jazz Evening' series, letting the rhythm of music and storytelling fuel his community gatherings.
  travel: Eric Brown prefers road trips that combine heritage sites and fishing spots, having explored Charleston's historic district and New Orleans' French Quarter, while dreaming of a pilgrimage to Savannah's
    riverfront and a future cruise to the Caribbean for a week of sun and sail.
  culinary: Eric Brown's signature dish is smoky pork ribs seasoned with brown sugar, paprika, and cayenne, paired with collard greens simmered with smoked turkey and a side of corn‑bread, and they relish
    grilling freshly caught catfish with a lemon‑pepper glaze while swapping recipe stories at every block party.
  core: Eric Brown, a 58‑year‑old handyman with a knack for improvising solutions and a habit of leaving tools scattered around the garage, blends community service with spontaneous jam sessions and an
    occasional forgetfulness about appointments.
background:
  cultural: Eric's identity is rooted in the African‑American community of Portsmouth, a city with a rich maritime and civil‑rights history. He was raised by parents who emphasized church involvement, respect
    for elders, and the importance of storytelling through music and food. Growing up, he absorbed the traditions of Southern soul food, gospel choirs, and the camaraderie of neighborhood block parties.
    These cultural influences shape his values of perseverance, community service, and a love for rhythm and shared meals. Eric also honors his family's legacy by supporting local Black cultural festivals
    and mentoring younger members of the community.
