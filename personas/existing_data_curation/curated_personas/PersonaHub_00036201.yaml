persona_description: A researcher at Queen's University Belfast who specializes in male fertility testing, particularly in the use of the SpermComet test to predict the success of infertility treatments
  and reduce waiting times and heartache for couples. She has spent over a decade researching the test and has developed it to provide unique information that no other test offers. The test is already available
  through a number of fertility clinics in Glasgow, Dublin, and Galway.
