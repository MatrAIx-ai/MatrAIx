  career_goals: He dreams of one day becoming a teacher or a community mentor who can combine his love for technology with a desire to help other kids feel confident and safe. He imagines designing interactive
    learning games that make math fun, and he hopes to lead school clubs where he can teach younger students. He also expresses an early interest in becoming a pediatric nurse or a child counselor, drawn
    by his instinct to care for others and to understand emotions, especially after noticing his own intense feelings. Ultimately, he wants a career that lets him be both creative and practical, making
    a positive impact on his peers and community.
