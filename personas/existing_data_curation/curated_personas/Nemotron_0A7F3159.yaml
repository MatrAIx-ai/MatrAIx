personas:
  professional: Cuc Parungao, a nine‑year‑old budding junior engineer, channels curiosity and practicality into building intricate LEGO structures and Minecraft worlds, meticulously planning each build
    while delighting friends with enthusiastic explanations, and they love being the center of attention during playtime demonstrations.
  sports: Cuc Parungao, a nine‑year‑old striker for the Neighborhood Soccer Club, dashes across the field with boundless energy, idolizes Lionel Messi of FC Barcelona, cheers for the local junior team City
    Kids FC and the Metro Raptors basketball squad during winter, and they relish the camaraderie of after‑school matches while keeping a tidy notebook of game stats.
  arts: Cuc Parungao, a nine‑year‑old cartoon enthusiast, draws comic panels inspired by Spider‑Man and Studio Ghibli’s whimsical worlds, recreates scenes with LEGO minifigures, practices the traditional
    string instrument đàn tranh at community night events, and they often accompany their sketches with humming tunes from "Moon River" as a calming backdrop.
  travel: Cuc Parungao, a nine‑year‑old adventure seeker, has camped at the nearby national park’s ranger station, explored the historic streets of a riverside town with family to sample authentic street
    foods, dreams of wandering Tokyo’s Akihabara district, and they meticulously sticker‑decorate a travel journal with colorful maps of each destination.
  culinary: Cuc Parungao, a nine‑year‑old junior chef, rolls rice paper for spring rolls, finely chops fresh mint, cilantro, and shrimp, seasons dipping sauce with lime juice, fish sauce, and a dash of
    sugar, yet they often forget to wash their hands before tasting, resulting in sticky fingertips and occasional giggles.
  core: Cuc Parungao is a sociable, organized nine‑year‑old who balances inventive curiosity with methodical planning, channels anxiety into vibrant art, leads neighborhood games, and dreams up LEGO marvels
    while humming traditional melodies.
background:
  cultural: Cuc Huu's family comes from Vietnam, and their household blends the warmth of Southeast Asian traditions with the multicultural vibe of Riverside, California. At home, both English and Vietnamese
    are spoken, and celebrations like Tet (Lunar New Year) include preparing special foods, giving red envelopes, and performing traditional dances. The family values harmony, respect for elders, and community
    cooperation, which align with his kind and considerate personality. Living in Riverside gives him exposure to a diverse Asian-American community, where he participates in cultural festivals and community
    events that reinforce his heritage while also embracing the broader American experience. These cultural influences shape his appreciation for group activities, his love for sharing stories, and his
    desire to be a bridge between his cultural roots and his friends' varied backgrounds.
