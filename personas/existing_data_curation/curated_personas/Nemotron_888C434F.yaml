personas:
  professional: Rita Burgess blends a flair for public performance with a knack for rapid event logistics, leveraging their communications coursework and natural rapport‑building to design and execute immersive
    wine‑tasting festivals for Central Coast brands, all while juggling a relaxed, sometimes chaotic, planning style.
  sports: Rita Burgess follows the Golden State Warriors and the San Jose Earthquakes, and they are an active member of the Ventura Hiking Club, preferring weekend treks in the Santa Lucia range and lively
    salsa‑dance cardio sessions over traditional gym routines.
  arts: Rita Burgess regularly belts out Beyoncé karaoke classics, crafts improv sketches inspired by Tina Fey, and captures candid street scenes with their Canon EOS M50, all while curating playlists that
    feature Rosalía, Hozier, and reflecting on Brené Brown’s pop‑psychology insights during their creative downtime.
  travel: Rita Burgess spontaneously books weekend trips to Napa Valley’s boutique vineyards, checks off Carmel‑by‑the‑Sea and Provence’s lavender fields on their bucket list, and they dream of a long‑haul
    road trip across New Zealand’s South Island, balancing budget hostels with splurges on wine‑tasting tours whenever their savings allow.
  culinary: Rita Burgess prefers fresh avocado toast topped with smoked salmon, cherry tomatoes, and lemon zest, enjoys pairing a silky pinot noir with a charcuterie board of prosciutto and fig jam, and
    they experiment at home making tangy salsa roja, though their cooking skill hovers at eager‑beginner level.
  core: Rita Burgess is a charismatic, slightly chaotic social architect who turns every gathering into a stage, chasing experiences over order while they juggle a competitive edge and an unquenchable curiosity.
background:
  cultural: Rita is a white Californian of mixed European ancestry whose family has lived in the Central Coast region for generations. Growing up in Atascadero, she was immersed in a close‑knit community
    that values outdoor recreation, local agriculture, and seasonal festivals. Her upbringing combined a middle‑class, suburban lifestyle with frequent participation in community events like farmers’ markets,
    high school sports games, and neighborhood block parties. This environment fostered her love for social gatherings, respect for traditional practices, and an appreciation of the region’s wine and farm-to-table
    culture, all of which continue to shape her identity and aspirations.
