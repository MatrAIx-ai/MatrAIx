  hobbies: '[''Karaoke and open‑mic nights'', ''Improv comedy workshops'', ''Salsa dancing'', ''Hiking the Santa Lucia range'', ''Wine tasting at local vineyards'', ''Exploring independent coffee shops'',
    ''Photography (people and landscapes)'', ''DIY home décor projects'', ''Escape rooms'', ''Reading pop‑psychology and self‑improvement books'']'
  career_goals: Rita aims to channel her sociable energy and competitive drive into a career in community relations or experiential marketing, ideally with a Central Coast winery, tourism board, or emerging
    lifestyle brand. She wants to lead the planning and execution of festivals, promotional events, and brand activations, building a reputation as a go‑to organizer who blends innovative ideas with proven
    methods. In the long term, Rita envisions launching her own boutique event‑planning consultancy that highlights sustainable, locally‑sourced experiences while giving her creative freedom. She also considers
    developing a personal lifestyle brand on social media, leveraging her comfort on camera and storytelling talent to inspire a wider audience.
