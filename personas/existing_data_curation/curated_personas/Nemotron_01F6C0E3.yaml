  career_goals: Ileana plans to earn a Doctor of Nursing Practice (DNP) degree within the next three years, focusing on integrative and community‑based health models. She envisions opening a wellness center
    in Bullhead City that blends conventional primary‑care services with creative therapies such as art workshops, mindfulness sessions, and holistic nutrition classes. In the medium term, she aims to become
    a clinical director at her current health clinic, where she can mentor emerging nurse practitioners and shape policies that promote culturally sensitive, patient‑centered care throughout Mohave County.
    Ultimately, she aspires to serve on the county health board, advocating for preventive programs that leverage the local arts scene and outdoor lifestyle.
