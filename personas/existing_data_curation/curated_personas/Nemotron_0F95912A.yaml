  hobbies: '[''Gardening'', ''Crossword Puzzles'', ''Sudoku'', ''Knitting'', ''Reading Historical Fiction'', ''Genealogy Research'', ''Local Book Club (small group)'', ''Volunteer Library Assistance'',
    ''Organizing Community Workshops'']'
  career_goals: Marilyn aims to step into a senior analyst or team‑lead role where she can guide strategic initiatives that improve efficiency for regional manufacturers. She wants to earn a Certified Analytics
    Professional (CAP) credential to formalize her expertise, and she hopes to mentor junior analysts, sharing her structured problem‑solving methods. Long‑term, she envisions consulting part‑time for local
    businesses, helping them adopt data‑driven optimization while maintaining a balanced, low‑stress work life that respects her preference for predictability and harmony.
