personas:
  professional: An aspiring digital illustrator and budding animator, Marta Milor mixes manga‑style sketches with TikTok art tutorials, channeling their curious, competitive spirit into constant experimentation
    even as their relaxed approach to deadlines leaves many projects half‑finished.
  sports: On weekends, Marta Milor laces up for the local youth soccer league in Gilbert, passionately supports Phoenix Rising FC, and joins after‑school track drills, yet their competitive edge sometimes
    overshadows teamwork, prompting them to doubt teammates' motives and causing occasional friction.
  arts: With a fervent love for drawing manga‑style characters and digital painting, Marta Milor draws inspiration from Hayao Miyazaki, Osamu Tezuka, and pop icons like Billie Eilish, while they also practice
    folk‑influenced dance routines and create quick art‑tips on TikTok, reflecting their sociable, curious nature.
  travel: Enthralled by both Sonoran Desert hikes and neon‑lit Japanese streets, Marta Milor spends weekends exploring Sedona’s red rocks, and they dream of backpacking through Kyoto and Edinburgh, favoring
    a spontaneous planning style that balances Instagram‑worthy photo stops with off‑beat local experiences.
  culinary: Marta Milor loves crafting colorful dishes like cheesy quesadillas, sushi rolls, and rainbow smoothie bowls topped with granola, often experimenting with bright sauces and fresh herbs, while
    they jokingly claim that their ultimate snack is a glitter‑sprinkled popcorn mix.
  core: Marta Milor is a vibrant, competitive teen artist who juggles sketchbooks, soccer matches, and late‑night TikTok edits, thriving on curiosity but often stumbling over disorganization.
background:
  cultural: Marta is a first‑generation Mexican‑American who grew up in a bilingual household in Gilbert, Arizona. Her family keeps Mexican traditions alive through celebrations like Día de los Muertos,
    quinceañera preparations, and home‑cooked meals featuring tacos, tamales, and mole. At school and in the community she navigates both Mexican cultural values—respect for family, vibrancy in art and
    music—and broader Southwestern American influences. This dual heritage enriches her artistic perspective, giving her a deep appreciation for colorful murals, folk art, and storytelling that blends Mexican
    motifs with contemporary US styles.
attributes:
  skills: '[''sketching and drawing'', ''digital illustration (Procreate, Photoshop)'', ''basic video editing'', ''bilingual communication (Spanish/English)'', ''group brainstorming and facilitation'',
