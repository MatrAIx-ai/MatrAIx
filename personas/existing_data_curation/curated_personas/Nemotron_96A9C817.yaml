  hobbies: '[''drawing and sketching'', ''digital painting'', ''animation tutorials'', ''listening to music (Mexican folk, pop, K‑pop)'', ''dance practice'', ''soccer'', ''visiting art fairs and museums'',
    ''nature hikes'', ''reading fantasy literature'', ''creating TikTok art videos'']'
  career_goals: Marta dreams of turning her artistic curiosity into a career that lets her explore new ideas and share cultural stories. She hopes to attend a specialized high school for visual arts, then
    study graphic design or animation at a university. Long‑term, she envisions working as a multidisciplinary visual storyteller—creating digital illustrations, short animated films, or interactive media
    that celebrate Mexican-American heritage. She also wants to launch an online platform where young artists can showcase their work and collaborate on community projects, combining her love of social
    interaction with her competitive drive to be recognized for her creativity.
