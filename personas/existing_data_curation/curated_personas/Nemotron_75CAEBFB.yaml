    to cultural festivals'']'
  career_goals: Diana aims to transition into a senior portfolio leadership role where she can shape strategy for large‑scale, sustainability‑focused initiatives in the Los Angeles region. Over the next
    five years she plans to earn a Lean Six Sigma Black Belt, expand her expertise in green building standards, and mentor emerging project managers, particularly women in tech. She also envisions launching
    a consultancy that helps cultural institutions manage exhibitions and community programs, integrating her passion for art with her project management acumen. Ultimately, she hopes to leave a legacy
    of streamlined, innovative project delivery that balances technical rigor with creative expression.
