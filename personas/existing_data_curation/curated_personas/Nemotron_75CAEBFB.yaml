personas:
  professional: Diana Jenkins, a veteran technology and construction project manager with three decades of experience, combines a curious, methodical mindset with Lean Six Sigma precision and a love for
    artistic collaboration to steer sustainable, large‑scale initiatives across Los Angeles, and they mentor emerging women leaders while championing green building standards.
  sports: Diana Jenkins, a regular member of a local hiking club that explores the San Gabriel foothills and a weekly yoga studio for stress balance, follows the Los Angeles Dodgers and Lakers, plays casual
    tennis at the Pasadena club on weeknights, and they tend to skip a run when winter rains soak the trails, preferring the calm of a yoga session instead.
  arts: Diana Jenkins, a frequent patron of the Norton Simon Museum and the Pasadena Art Center who photographs historic Spanish‑style mansions, curates a small home collection featuring James Turrell and
    emerging local painters, and they regularly attend live jazz evenings with performers like Kamasi Washington, letting their curious eye for detail enrich both personal art projects and professional
    problem‑solving.
  travel: Diana Jenkins, a meticulous planner who blends cultural immersion with comfortable pacing, has organized trips to Barcelona for Gaudí architecture, Kyoto’s temples for serene gardens, and weekend
    getaways to Santa Barbara’s wine country, and they favor using a modest travel credit card that earns points toward future museum passes while occasionally dragging their suitcase a day later than intended.
  culinary: Diana Jenkins, an enthusiastic Mediterranean home chef with a methodical approach to flavor, perfects dishes like grilled branzino with capers, slow‑cooked ratatouille, and homemade falafel
    topped with tahini, relies on fresh olives, sun‑dried tomatoes, and extra‑virgin olive oil, and they sometimes over‑salt the hummus in the excitement of hosting friends.
  core: Diana Jenkins blends razor‑sharp project management discipline with a lifelong curiosity for art, gardens, and sustainable living, even if they hoard stray coffee mugs and occasionally postpone
    dentist appointments.
background:
  cultural: Diana was raised in a middle‑class Anglo‑American family in Southern California, with Irish and English ancestry. Growing up in the culturally diverse environment of Los Angeles County, she
    developed an appreciation for the region’s multicultural tapestry, while maintaining the values of her heritage — a strong work ethic, community involvement, and a love for education. Her upbringing
    combined suburban Californian life with regular exposure to Hispanic, Asian, and African‑American cultural influences, which broadened her perspective and fostered her openness to unconventional ideas.
    Today, she identifies as a white American who embraces the artistic and ethnic diversity of her community.
