  hobbies: '[''Watercolor painting'', ''Reading contemporary fiction'', ''Exploring art history'', ''Gardening tomatoes and herbs'', ''Cooking Guatemalan cuisine'', ''Listening to marimba music'', ''Volunteering
    at local literacy program'', ''Bilingual storytelling for children'', ''Puzzle solving (crosswords, sudoku)'', ''Knitting'']'
  career_goals: Monica aims to advance to a store‑manager role where she can shape broader operational strategies and mentor emerging leaders. She is passionate about designing a regional training program
    that integrates cultural competency and creative merchandising techniques. In the longer term, she envisions opening a boutique that showcases Guatemalan crafts and locally sourced artisanal goods,
    blending her retail expertise with her cultural heritage.
