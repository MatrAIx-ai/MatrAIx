  hobbies: '[''Volunteering at Salem Historical Society events'', ''Co‑ed volleyball league'', ''Board‑game nights with friends'', ''Weekend hiking in New England'', ''Seafood cooking and recipe experimentation'',
    ''DIY home‑improvement projects'', ''Genealogy research'', ''Attending local live music shows'']'
  career_goals: Carisa aims to transition from laborer to crew foreman within the next three years, leveraging her reliability and people‑focused leadership style. She plans to complete an NCCER Certified
    Construction Craftsperson program and earn a Construction Management certificate from a community college, positioning herself for a future role as a project manager. Long‑term, she envisions founding
    a small, employee‑owned contracting firm that emphasizes safety, teamwork, and community involvement. She also hopes to mentor new workers, especially women entering the trades, to create a more inclusive
    workforce.
