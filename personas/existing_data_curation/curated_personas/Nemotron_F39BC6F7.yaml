personas:
  professional: Carisa Kruse, a seasoned construction specialist who operates backhoes and reads blueprints with precision, blends her love for structure with her sociable, talkative nature to keep crews
    coordinated and morale high as she works toward a foreman role.
  sports: Carisa Kruse stays fit by playing co‑ed recreational volleyball on weekends, cheering for the New England Patriots and Boston Celtics, and hitting the local hiking trails in the White Mountains
    during the summer, treating exercise as both a social outlet and a way to maintain the physical stamina needed on the job site.
  arts: Carisa Kruse channels her love of community heritage into volunteering at the Salem historical society’s living‑history events, while off‑hours she enjoys the folk storytelling of The Lumineers,
    the classic films of Greta Gerwig, and the symphonies of the Boston Symphony Orchestra, finding inspiration for her DIY home‑improvement projects.
  travel: Carisa Kruse prefers meticulously planned weekend getaways, often driving to Acadia National Park or historic coastal towns like Portland, Maine, while dreaming of a summer tour of the Scottish
    Highlands, balancing her love of structure with spontaneous stops at local seafood shacks.
  culinary: Carisa Kruse, an avid home‑chef, loves experimenting with New England seafood, perfecting lobster rolls, clam chowder with fresh thyme, and grilled cod drizzled with garlic‑butter, though she
    sometimes burns the edges of her garlic while multitasking between cooking and checking work orders.
  core: Carisa Kruse is a talkative, detail‑driven construction pro who blends her love of community history with a habit of over‑planning even her weekend hikes.
background:
  cultural: Carisa grew up in a middle‑class, white family in Salem, Massachusetts, where the town’s deep colonial history and strong sense of community shaped her worldview. Her upbringing was steeped
    in traditional New England values such as self‑reliance, punctuality, and civic participation, which are reflected in her preference for structure and her commitment to local volunteer work. While she
    attended a nearby community college for two years studying business fundamentals, she chose to enter the construction field to support her family and to gain practical, hands‑on experience. The multicultural
    fabric of the Greater Boston area introduced her to a variety of cultural traditions, yet her personal identity remains rooted in the region’s historic heritage and the close‑knit social networks of
    Salem.
attributes:
  skills: '[''Heavy equipment operation'', ''Blueprint reading'', ''Concrete forming and finishing'', ''Basic framing carpentry'', ''Construction safety (OSHA 10)'', ''First aid and CPR'', ''Tool maintenance'',
