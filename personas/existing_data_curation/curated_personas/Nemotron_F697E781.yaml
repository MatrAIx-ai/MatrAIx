  hobbies: '[''Watercolor painting'', ''Sketching landscapes'', ''Visiting art museums'', ''Attending art workshops'', ''Reading historical fiction'', ''Philosophical reading'', ''Hiking in the Wasatch
    mountains'', ''Gardening native plants'', ''Knitting scarves'', ''Volunteering at community art‑therapy programs'']'
  career_goals: Elizabeth is determined to elevate her professional credentials despite lacking a high‑school diploma. She plans to obtain a GED within the next year, then enroll in a part‑time Licensed
    Practical Nurse (LPN) program, with the long‑term aim of becoming a Registered Nurse (RN). In the short term, she seeks a lead nursing‑assistant position where she can mentor colleagues, develop specialized
    training modules for geriatric care, and integrate art‑based therapeutic activities into patient routines. Her competitive nature drives her to be recognized as a top performer in patient safety and
    documentation accuracy, and she hopes to eventually contribute to quality‑improvement initiatives at her facility.
