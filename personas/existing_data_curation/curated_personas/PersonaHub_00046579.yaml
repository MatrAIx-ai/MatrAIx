persona_description: A scientist or engineer who is interested in the field of memory technology, specifically resistive non-volatile memory (R-NV memory) and its switching mechanism. They are particularly
  interested in understanding the variations of switching parameters and the physical origins of the switching behavior. They are also interested in the modeling and simulation of R-NV memory devices and
  the development of new design guidelines for improving the switching uniformity in large memory arrays. They may have expertise in device fabrication and are familiar with the reset-verify technique.
