  hobbies: '[''Reading (business, psychology, fiction)'', ''DIY crafting/upcycling'', ''Urban photography'', ''Cooking'', ''Board games with close friends'', ''Yoga'', ''Exploring local markets'', ''Listening
    to indie music'']'
  career_goals: Kayla aims to complete her Bachelor’s degree in Business Administration within the next two years, leveraging her hands‑on retail experience to move into a store manager role. She aspires
    to become a district manager, overseeing multiple locations, and eventually launch her own boutique that blends curated fashion with sustainable practices. She is also interested in integrating e‑commerce
    tools into traditional retail to stay ahead of industry trends.
