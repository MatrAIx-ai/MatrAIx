  career_goals: Faye aims to obtain her GED within the next year and then enroll in a community college program focused on hospitality management or communications. She aspires to become a professional
    event planner or a social media communications specialist, leveraging her knack for organization, public speaking, and digital content creation. Long‑term, she envisions launching a community‑centered
    boutique coffee shop that doubles as a venue for local performances and youth workshops, allowing her to blend her entrepreneurial spirit with her desire to give back to Jamestown. She also hopes to
    develop stress‑management workshops for peers, drawing on her personal experience with anxiety.
