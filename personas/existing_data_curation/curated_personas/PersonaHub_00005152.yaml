persona_description: A prehistoric archaeologist who specializes in the study of hominid evolution and the development of stone tools, particularly focusing on the use of Olduwan tools and the Levallois
  technique. Their research interests include the dating of artifacts using accelerator mass spectrometry and the use of new techniques such as the Sima de los Huesos project. They are also interested in
  the adaptation of humans to their environment and the development of agriculture, and they have conducted excavations in various locations across the globe, including Mexico, North America, and the Mississippi
  Valley.
