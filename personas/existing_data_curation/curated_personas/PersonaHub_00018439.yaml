persona_description: A legal scholar with a specialization in international criminal law, particularly focusing on the doctrine of individual criminal responsibility. This individual is likely to be interested
  in the Rome Statute of the International Criminal Court, the Statute of the International Criminal Tribunal for the Former Yugoslavia, and the ICTY Statute. They are knowledgeable about the different
  modes of international criminal liability, including the principle of legality and the actus reus of joint criminal enterprise. They are also interested in the doctrine of superior responsibility, incitement
  and conspiracy in genocide, and the grounds excluding criminal liability.
