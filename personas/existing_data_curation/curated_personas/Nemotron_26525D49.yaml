personas:
  professional: A seasoned ATM and office equipment repair specialist named Candace Todd leverages three decades of hands‑on experience and a CompTIA A+ certification to lead troubleshooting teams, design
    preventive‑maintenance schedules, and mentor junior technicians, while their preference for structure blends with a relaxed, sociable approach to guide collaborative problem‑solving and champion inclusive
    mentorship for women in tech.
  sports: Candace Todd stays active by dancing salsa and swing at the Grassroots Dance Society, taking daily walks through Prospect Park, joining seasonal pickleball leagues at the Brooklyn Community Center,
    and cheering on the Brooklyn Nets and New York Knicks, often sporting a vintage Nets jersey during her workouts.
  arts: Candace Todd enriches her life through a vibrant community choir where she sings gospel classics by Kirk Franklin and Andraé Crouch, enjoys listening to R&B legends like Aretha Franklin and Marvin
    Gaye while quilting, collects vinyl records, and attends quarterly exhibits at the Brooklyn Museum, letting music and visual art shape her social gatherings.
  travel: A purposeful wanderer, Candace Todd prefers well‑planned group tours that blend cultural immersion with relaxation, having explored New Orleans' historic French Quarter, Jamaica's spice markets,
    and Shenandoah National Park's scenic trails, while dreaming of a future Caribbean cruise that would combine sun‑bathing with cooking workshops for senior travelers.
  culinary: A seasoned home chef, Candace Todd delights in preparing soul‑food dishes like collard greens seasoned with allspice, jerk‑marinated chicken, and sweet plantain fritters, expertly balancing
    aromatics such as scotch bonnet pepper, thyme, and smoked paprika, though they sometimes over‑spice a pot of gumbo, earning friendly teasing from guests.
  core: Candace Todd blends pragmatic tech mastery with an exuberant social spirit, dancing through life, mentoring community members, and savoring spice‑rich meals while balancing structured plans with
    spontaneous joy.
background:
  cultural: Candace is a second‑generation African‑American Brooklynite whose parents moved north from the Southern United States during the Great Migration. Growing up in Crown Heights, she was immersed
    in a richly diverse community that blended traditional Black church life, Southern family customs, and the vibrant Caribbean influences of her neighbors. She celebrates Juneteenth, participates in church
    fellowship, and honors family traditions through food, music, and storytelling. These cultural experiences have instilled in her a deep sense of cooperation, resilience, and pride, shaping both her
    personal values and her professional determination as a Black woman thriving in a technical trade.
attributes:
  skills: '["ATM and office machine troubleshooting", "Electrical diagnostics", "Firmware updates and firmware flashing", "Networking and LAN configuration for office devices", "Preventive maintenance scheduling",
    "Client training and mentorship", "Technical documentation and SOP creation"]'
  hobbies: '["Salsa and swing dancing", "Community choir singing", "Cooking soul and Caribbean dishes", "Volunteer computer literacy tutoring", "Prospect Park walks", "Board game nights", "Quilting"]'
  career_goals: Candace aims to move into a senior supervisory role where she can oversee a regional fleet of money‑handling and office automation devices, develop a formal mentorship program for aspiring
    technicians—especially women of color—and obtain advanced certification in Internet of Things (IoT) device management. She also envisions gradually transitioning to part‑time consulting while launching
    community‑focused tech workshops that teach basic computer and device maintenance to seniors and local youth, thereby blending her technical expertise with her passion for community uplift.
