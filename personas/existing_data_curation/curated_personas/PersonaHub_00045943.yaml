persona_description: A plant biologist who specializes in studying the mechanisms of growth and development in higher plants, particularly focusing on the role of auxin in setting the gravitropic set-point
  angle of branches. Her research has been instrumental in understanding the counteracting mechanism of anti-gravitropic offset that sustains growth on the other side of a branch from gravity-sensitive
  growth. Her findings have implications for understanding the capacity of plants to capture resources above and below ground, and the potential for the same mechanisms to be observed in larger plants and
  young tree seedlings.
