personas:
  professional: Diane King, a veteran special‑education teacher turned arts integration consultant, leverages four decades of IEP design expertise and a love for watercolor to craft inclusive curricula
    that blend assistive technology with visual‑arts therapy, while their relaxed, slightly disorganized planning style means they often improvise lesson plans on the spot, trusting collaborative team dynamics
    to fill gaps.
  sports: Diane King, an avid early‑morning beach walker and casual member of the Lake Worth senior tennis club, follows the Miami Dolphins and enjoys cheering at local high‑school track meets, yet they
    prefer low‑intensity activity over competitive sports, using birdwatching excursions as their primary form of fitness.
  arts: Diane King, a watercolor enthusiast who regularly volunteers at the Palm Beach County Cultural Council, finds inspiration in the works of Georgia O'Keeffe and local muralist Julio González, attends
    community theatre productions of 'Our Town' and 'A Raisin in the Sun', and often incorporates these artistic influences into their weekly senior‑center art workshops.
  travel: Diane King, who delights in leisurely getaways, plans trips around seasonal festivals like the Caribbean‑influenced Art Basel Miami Beach, frequently visits the Florida Keys for fishing and sunrise
    painting sessions, and dreams of a future cruise to the Bahamas where they can explore coral reefs while still keeping a flexible itinerary that allows for impromptu visits to local art galleries.
  culinary: Diane King, an experimental home cook, blends native Florida herbs such as rosemary, sage, and lemon balm with Caribbean spices like allspice and scotch bonnet pepper to create dishes like citrus‑marinated
    grouper ceviche and herb‑infused sweet‑potato gnocchi, while their cooking skill is intermediate, often improvising recipes after a day of painting.
  core: Diane King, a curious, kind‑hearted former educator who balances a love of art, gardening, and gentle fitness with a tendency to procrastinate on paperwork and worry about health, lives their golden
    years navigating flexibility and occasional disarray.
background:
  cultural: Diane grew up in a middle‑class white family in the Mid‑Atlantic region before moving to South Florida in the 1990s. Her cultural identity blends traditional American values—such as a strong
    emphasis on education, church community, and family holiday traditions—with the relaxed, sun‑infused lifestyle of Lake Worth. She embraces the multicultural tapestry of Palm Beach County, enjoying Caribbean‑influenced
    festivals, the vibrant local art scene, and the region’s emphasis on outdoor leisure. This blend of backgrounds informs her inclusive teaching philosophy and her love for bringing diverse artistic experiences
    into the classroom.
attributes:
  skills: '["Individualized Education Program (IEP) development", "Differentiated instruction for diverse learners", "Assistive technology integration", "Art‑based therapeutic strategies", "Collaborative
    team facilitation", "Behavioral assessment and intervention", "Family and community liaison", "Curriculum design with inclusive practices", "Professional mentorship", "Conflict resolution and mediation"]'
  hobbies: '["Watercolor painting", "Visiting local art galleries and museums", "Gardening native herbs", "Birdwatching", "Reading nonfiction on neuroscience and education", "Attending community theatre
    performances", "Participating in book‑discussion groups", "Exploring beachside art walks", "Cooking experimental recipes", "Volunteering at senior centers"]'
  career_goals: Although retirement is on the horizon, Diane aims to leave a lasting imprint on special‑education practice in South Florida. She plans to develop a community arts residency that pairs local
    artists with students with special needs, author a guidebook on integrating visual arts into IEPs, and serve as a consultant for schools seeking to adopt flexible, student‑centered curricula. She also
    hopes to mentor a cohort of retiring teachers to become peer coaches, and to volunteer her expertise with nonprofit organizations that support aging adults with disabilities.
