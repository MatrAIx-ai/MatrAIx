  hobbies: '[''Gardening (herbs, native plants)'', ''Reading historical fiction and memoirs'', ''Knitting and crocheting'', ''Birdwatching in local parks'', ''Traditional Honduran cooking and recipe experimentation'',
    ''Walking and photography along Seattle waterfront'', ''Listening to folk music'', ''Occasional volunteering at community library events'']'
  career_goals: Although she is not formally employed, Lisbeth hopes to channel her life experience into meaningful community contributions. She aims to establish a small intergenerational garden in her
    neighborhood where elders can share gardening tips with youth, fostering cultural exchange. She wishes to document and publish a collection of family recipes and stories, preserving her Honduran roots
    for future generations. Lisbeth also hopes to lead occasional cooking workshops at the local library, introducing Seattle residents to authentic Honduran flavors while incorporating locally sourced
    ingredients. Additionally, she plans to take an introductory digital photography course to capture the natural beauty of Seattle’s parks and share them in a community exhibition. These goals reflect
    her desire to stay curious, stay practical, and give back in ways that honor both her heritage and her love for solitude.
