personas:
  professional: Lisbeth Colvin, a seasoned community gardener and informal neighborhood mediator, channels her practical curiosity and calm patience into designing intergenerational garden workshops, though
    her relaxed attitude toward deadlines often results in last‑minute adjustments.
  sports: Lisbeth Colvin favors low‑impact fitness such as morning walks around Green Lake and seasonal bird‑watching hikes in the Arboretum, occasionally cheering the Seattle Seahawks on Sundays while
    avoiding high‑intensity gym routines.
  arts: Lisbeth Colvin spends evenings listening to folk legends like Joan Baez and Central American canción folklórica, while her budding interest in photography draws inspiration from Ansel Adams and
    she frequently knits while reading memoirs by Isabel Allende.
  travel: Lisbeth Colvin prefers relaxed, purposeful travel, planning quiet road trips to the San Juan Islands and weekend getaways to Portland’s gardens, while dreaming of a slow‑paced cultural tour of
    Guatemala’s highlands to study traditional textiles.
  culinary: Lisbeth Colvin delights in preparing traditional dishes such as nacatamales, baleadas, and sopa de caracol, often substituting Pacific‑Northwest ingredients like smoked salmon and locally foraged
    mushrooms, and she meticulously hand‑crafts each meal with a blend of heirloom spices and fresh garden herbs.
  core: Lisbeth Colvin is a quietly curious 66‑year‑old who blends solitary gardening and folk music with a love for heirloom recipes, yet habitually misplaces her knitting needles and forgets to water
    plants when engrossed in a good book.
background:
  cultural: Lisbeth was born in a small town near San Pedro Sula in Honduras, where she grew up in a close‑knit Catholic family that celebrated holidays such as Semana Santa and Día de la Independencia
    with music, dance, and communal meals. She moved to the United States in the early 1990s, eventually settling in Seattle’s South Lake Union area. While adapting to life in the Pacific Northwest, she
    retained strong ties to her Honduran roots by speaking Spanish at home, preparing family recipes, and participating in the city’s vibrant Honduran community, including the annual Feria Hondureña. Her
    cultural identity blends the warmth and communal spirit of Honduran traditions with the understated, nature‑focused lifestyle of the Seattle region. This dual heritage informs her values of hospitality,
    resilience, and respect for both people and the environment.
