    & informal mentorship'', ''Community program coordination'', ''Project management for routine tasks'']'
  hobbies: '[''Adult basketball league'', ''Trivia night competitions'', ''Community garden & DIY landscaping'', ''Monthly family BBQs and grilling'', ''Watching Chicago sports (Cubs, Bulls, Bears)'', ''Reading
    mystery novels'', ''Home‑automation tinkering'', ''Leading teen book club'']'
  career_goals: Raymond aims to move into a supervisory role within the Cook County library system, targeting the position of Assistant Branch Manager or Deputy Library Director within the next five years.
    He plans to earn a Master of Library and Information Science to complement his business degree, which will equip him for strategic planning and policy development. His ambition is to lead a branch that
    balances reliable, routine services with selective, cost‑effective digital innovations, positioning the library as a community hub. He also hopes to earn recognition as a top‑performing library technician
    through county‑wide awards and to mentor junior staff, fostering a competitive yet collaborative team culture.
