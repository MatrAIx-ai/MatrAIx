personas:
  professional: Raymond Cooper is a seasoned library technician with fifteen years of cataloging, acquisitions budgeting, and data‑driven reporting experience, who leverages his business‑savvy cost‑benefit
    analysis and outgoing, competitive spirit to lead community programming and mentor staff while eyeing a future as an Assistant Branch Manager in Cook County.
  sports: Raymond Cooper competes weekly in the adult basketball league at Schaumburg Sportsplex, cheers the Chicago Bulls, Bears, and Cubs with a loyalty that fuels his post‑game debates at the local bar,
    and maintains a casual fitness regimen that blends weekend pickup games with occasional jogging to stay competitive.
  arts: Raymond Cooper immerses himself in mystery literature—from Agatha Christie to Tana French—facilitates a teen book club at the library, and relaxes to classic rock staples like the Rolling Stones
    and blues legends such as Muddy Waters, which shape his analytical yet nostalgic creative outlook.
  travel: Raymond Cooper prefers road‑trip adventures to nearby destinations like the Indiana Dunes and Door County, balancing his love of nature with budget‑friendly stays, while dreaming of attending
    the American Library Association conference in Chicago and a future family vacation to New Orleans for its music and cuisine.
  culinary: Raymond Cooper is a competent grill master who regularly serves up Chicago‑style hot dogs, smoked ribs, corn on the cob, and homemade BBQ sauce infused with chipotle, Worcestershire, and brown
    sugar, while experimenting with a smoker for occasional brisket experiments.
  core: Raymond Cooper blends a love of routine library work with competitive basketball, skeptical trivia nights, and a penchant for over‑cooking the perfect BBQ, all while juggling a laid‑back approach
    to planning and a knack for negotiating better deals.
background:
  cultural: Raymond was raised in the Chicago suburbs and identifies with mainstream Midwestern white American culture. His background emphasizes practicality, reliability, and a strong work ethic, reflecting
    the region’s traditional values. He was exposed to a mix of Catholic and Protestant influences, but his cultural identity is primarily rooted in community‑oriented, modest, and family‑focused norms.
    The local suburban environment, with its emphasis on routine activities, community events, and modest leisure pursuits, shapes his outlook and reinforces his preference for familiar, practical solutions.
attributes:
  skills: '[''Cataloging & Classification (Dewey & LCC)'', ''Integrated Library System administration (Polaris/Sierra)'', ''Acquisitions & Vendor negotiation'', ''Budget management & Cost‑benefit analysis'',
