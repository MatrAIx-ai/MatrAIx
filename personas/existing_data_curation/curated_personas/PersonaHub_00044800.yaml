persona_description: A medical professional with a specialization in neurology, particularly focused on the study of neurotropic viruses and their neurologic disorders. They have a deep understanding of
  the mechanisms by which viruses gain entry to the body, the different routes of infection, and the various mechanisms of viral infections. They are familiar with the wide range of neurologic disorders
  caused by neurotropic viruses and the systemic effects of viral infections. They have a keen interest in the development of new treatments and vaccines for these conditions.
