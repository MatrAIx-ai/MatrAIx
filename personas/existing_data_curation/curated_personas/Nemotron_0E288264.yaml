personas:
  professional: Oreste Saenz is a budding little engineer who spends hours constructing intricate LEGO skyscrapers, showcasing early problem‑solving skills and an unexpected balance of meticulous organization
    and imaginative flexibility, they often challenge friends to design who can build the tallest tower.
  sports: Oreste Saenz is an enthusiastic junior soccer player on the Little Dynamo Soccer Club who idolizes the professional team Manchester United, they also cheer for the local baseball team the Seattle
    Mariners, they love the rhythm of swimming lessons in summer, and they practice daily bike rides to stay active despite a tendency to favor solo play over team games.
  arts: Oreste Saenz is an avid young art lover who spends afternoons drawing with watercolor pencils, they are fascinated by the swirling skies of Van Gogh’s Starry Night, adore the animated storytelling
    of Pixar’s Toy Story, and enjoy humming along to the classic tunes of The Beatles, often creating their own tiny gallery on the refrigerator.
  travel: Oreste Saenz is a curious little explorer who loves family road trips to the local zoo and beach, they have already visited the Grand Canyon and Disneyland, they dream of seeing the Eiffel Tower
    and the Great Barrier Reef, their travel style is a mix of planned snack stops and spontaneous pit‑stop treasure hunts, limited only by school days and parental schedules.
  culinary: Oreste Saenz is a picky‑but‑adventurous eater who can whip up a simple mac and cheese with sharp cheddar and elbow noodles, they love pepperoni pizza with extra mozzarella, enjoy building fruit
    smoothies with banana, strawberry, and a splash of almond milk, yet they often refuse broccoli, claiming it looks like tiny trees.
  core: Oreste Saenz is a fiercely curious five‑year‑old who builds LEGO towers, hoards stickers like treasures, questions everything with a skeptical eye, and balances a love for solitary play with occasional
    competitive bursts.
background:
  cultural: Oreste’s family maintains strong Puerto Rican roots while living in Greenwood, Indiana. At home, he hears a blend of English and Spanish, celebrates traditional holidays like Three Kings Day
    and Nochebuena, and enjoys dishes such as arroz con gandules and pastelón during family gatherings. He has been introduced to Puerto Rican musical styles like plena and bomba, which influence his love
    for rhythm and dance. His parents share stories of the island’s vibrant art and folklore, nurturing his appreciation for colorful visuals and imaginative narratives. Though his community is largely
    Midwestern, these cultural practices give Oreste a unique perspective, allowing him to blend Caribbean heritage with the everyday experiences of a small Indiana town.
attributes:
