  career_goals: Oreste dreams of becoming an astronaut who can travel to distant planets, an artist who creates comic‑book heroes, and a scientist who invents new gadgets. He loves watching space documentaries
    and drawing his own rockets, and he often tells his parents he wants to build things that make people happy. While still young, his ambitions are guided by his personal interests in exploration, creativity,
    and competition, and he hopes to pursue a path where he can both imagine new worlds and bring them to life.
