  hobbies: '[''Bollywood Dance Classes'', ''Salsa Dancing'', ''Beach Volleyball'', ''Yoga and Meditation'', ''Cooking Indian Cuisine'', ''Community Volunteering at Indian Cultural Center'', ''Organizing
    Diwali and Cultural Events'', ''Reading Contemporary Fiction'', ''Self‑Help Literature'', ''Weekend Road Trips to Coastal Destinations'', ''Nature Hiking'']'
  career_goals: Deepthi aims to advance from her current inspector role to a senior Quality Assurance Supervisor within the next three years, obtaining her ASQ Certified Quality Engineer credential along
    the way. She wants to lead process‑improvement projects that reduce defects and increase efficiency, while also establishing a supportive, low‑stress work environment for her team. Long‑term, she envisions
    a managerial position where she can shape safety culture, mentor junior inspectors, and design structured, predictable workflows that align with her preference for stability and her desire to balance
    professional achievement with personal well‑being.
