personas:
  professional: Joann Hebert is a seasoned sales manager in the Southwest retail and B2B market who leverages data‑driven forecasting, fluent CRM mastery, and a pragmatic‑curious mindset to coach a tight‑knit
    team of reps while pushing for innovative yet reliable sales strategies.
  sports: Joann Hebert pursues outdoor fitness through regular hikes in Saguaro National Park and river‑bed bike rides, participates in the Tucson Trail Runners club’s weekend 5K events, and supports local
    teams such as the Arizona Diamondbacks, the Arizona Wildcats basketball squad, and FC Tucson, balancing her love of personal endurance with community sports enthusiasm.
  arts: Joann Hebert engages with the Tucson arts scene by frequenting the weekly Fourth Avenue art fairs, attending community theater productions of classics like 'Our Town,' savoring readings at the Tucson
    Festival of Books, and winding down evenings listening to Americana folk artists such as Margo Price, Jason Isbell, and The Avett Brothers, which fuels her creative spark and social connections.
  travel: Joann Hebert travels with a blend of careful planning and spontaneous desert adventures, having explored nearby cultural gems like Santa Fe and Sedona, relaxed on a weekend getaway to Los Cabos,
    and slated future trips to Patagonia’s glaciers and Kyoto’s historic temples, all while balancing a moderate travel budget and occasional family commitments.
  culinary: Joann Hebert is a moderately skilled home chef who experiments with chipotle‑marinated carne asada, green‑chile enchiladas, and prickly‑pear salsa, frequently incorporating fresh herbs from
    her succulent garden such as cilantro and sage, while also savoring traditional southwestern ingredients like mesquite‑smoked salt and roasted corn masa.
  core: Joann Hebert blends desert‑inspired curiosity with pragmatic sales expertise, balances disciplined finances with occasional culinary indulgence, navigates health with proactive yet sometimes neglectful
    habits, and fuels a life of outdoor fitness, arts appreciation, and travel ambition—all while juggling a strong work ethic and a love for solitary recharge.
background:
  cultural: Joann was raised in a middle‑class, predominantly Anglo neighborhood on the outskirts of Tucson, where the desert landscape and a strong sense of community shaped her upbringing. Although her
    family’s heritage is white American, the surrounding Hispanic culture deeply influenced her daily life—through bilingual signage, local festivals, and a neighborhood that celebrated both American holidays
    and regional traditions like Día de los Muertos. She grew up attending a local Methodist church, fostering values of service and responsibility. The desert environment nurtured her appreciation for
    resilience and practicality, while exposure to neighboring cultures cultivated a respectful curiosity about different perspectives. This blend of classic Southwest upbringing and inclusive community
    engagement informs Joann’s balanced worldview and her pragmatic yet open‑minded approach to both work and personal life.
