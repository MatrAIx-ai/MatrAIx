  career_goals: Joann aims to ascend to a regional sales director role within the next five years, overseeing a multi‑state territory and driving a 15% annual revenue increase. She is committed to gaining
    formal academic credentials—completing a GED and enrolling in a community‑college Business Administration program—to complement her experiential expertise. Joann also envisions establishing a boutique
    sales‑consulting practice after her corporate career, where she can mentor emerging sales leaders and help small businesses adopt sustainable, data‑backed selling methods. Additionally, she seeks to
    champion diversity initiatives that bridge cultural gaps between Anglo and Hispanic client segments in the Southwest.
