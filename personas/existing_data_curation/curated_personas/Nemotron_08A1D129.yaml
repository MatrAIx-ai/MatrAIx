personas:
  professional: Breana Dean, an organized community caregiver, leverages their practical home‑maintenance skills and compassionate listening to transition into a certified home‑health aide while quietly
    developing a boutique of hand‑knit blankets and herbal teas.
  sports: Breana Dean enjoys solitary weekend hikes along the rolling hills, occasionally joining a local walking club, and quietly roots for the nearby West Virginia Miners minor‑league baseball team,
    maintaining a modest indoor treadmill for rainy days when they need to stay active.
  arts: Breana Dean finds solace in the lilting strings of bluegrass legends like Doc Watson and Alison Krauss, while weaving narratives into hand‑knit blankets inspired by the poetry of Mary Oliver and
    the historical fiction of Ken Follett, and they often lose themselves in journaling about family genealogy.
  travel: Breana Dean prefers low‑key, nature‑focused travel, meticulously planning weekend escapes to the Blue Ridge Parkway’s scenic overlooks and dreaming of a pilgrimage to the Scottish Highlands to
    trace ancestral roots, while avoiding crowded tourist hotspots whenever possible.
  culinary: Breana Dean delights in simmering rustic buttermilk cornbread, slow‑cooking heritage beans, smoking trout over a cedar fire, and brewing soothing lavender–chamomile tea blends harvested from
    their garden, often adding hand‑picked rosemary to hearty stews.
  core: Breana Dean is a solitary, detail‑oriented caregiver who calms chronic worry with needlework and nature walks, yet they sometimes over‑commit to volunteer projects at the expense of personal rest.
background:
  cultural: Breana comes from a long‑standing white Appalachian family in Gilmer County, West Virginia. Her upbringing was shaped by rural values of self‑reliance, strong family and church ties, and a deep
    connection to the mountains and the land. She grew up immersed in local traditions such as folk music, quilting, and seasonal community festivals, fostering a sense of mutual aid and compassion. While
    modern ideas have broadened her perspective, she maintains respect for the simplicity of country life, the importance of preserving the natural environment, and the cultural heritage of her Appalachian
    roots.
