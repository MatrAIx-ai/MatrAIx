  hobbies: '[''Reading historical fiction'', ''Journaling'', ''Nature walks'', ''Birdwatching'', ''Gardening'', ''Knitting and crochet'', ''Herbal remedy experimentation'', ''Genealogy research'', ''Listening
    to folk music'', ''Mindfulness meditation'']'
  career_goals: Breana hopes to formalize her caregiving experience by obtaining a certification in home health assistance, enabling her to provide paid support to seniors in Gilmer County. She also aims
    to launch a modest home‑based boutique selling hand‑knit blankets and herbal teas, merging her crafting and horticultural talents. Additionally, she aspires to lead small, structured support groups
    focused on anxiety and stress management, blending her compassionate nature with her methodical planning abilities.
