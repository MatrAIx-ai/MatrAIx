  career_goals: Thomson aims to stay mentally active by offering informal consulting to local start‑ups, writing a memoir that captures his professional journey and personal reflections, and serving on
    the board of a nonprofit focused on senior financial literacy. He also intends to deepen his knowledge of sustainable living practices and share these insights through community workshops, while maintaining
    emotional health through regular mindfulness practice.
