  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Industrial and landscape photography'', ''DIY metal upcycling projects'', ''Woodworking and furniture restoration'',
    ''Hiking local Appalachian trails'', ''Listening to folk and bluegrass music'', ''Attending community craft fairs'', ''Reading design and maker blogs'', ''Gardening'']'
  career_goals: She aims to formalize her technical knowledge by earning a GED and completing a welding certification, followed by advanced training in CNC programming. In the next five years, Esmeralda
    hopes to move into a lead fabricator or supervisory position where she can mentor new hires and help refine production workflows. Parallel to her factory career, she plans to launch a side business
    creating custom reclaimed‑metal art and upcycled furniture for local galleries and online buyers, merging her practical skill set with her passion for unconventional artistic expression.
