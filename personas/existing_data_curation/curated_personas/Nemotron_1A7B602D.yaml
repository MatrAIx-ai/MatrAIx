  career_goals: He aims to move into a plant-manager or operations-manager role within the next few years, leveraging his on-the-ground insight to drive broader efficiency initiatives. To support this transition,
    Bhupendra plans to earn a Lean Six Sigma Green Belt and complete a supervisory-leadership certification offered by a regional community college. He is determined to lower his plant’s injury rate by
    20% and increase overall equipment effectiveness (OEE) by 10%, positioning himself as a champion of safety and productivity. As retirement approaches, he envisions mentoring the next generation of supervisors
    or consulting for small manufacturers in the Iowa heartland, sharing his practical expertise while maintaining a hands-on connection to the industry.
