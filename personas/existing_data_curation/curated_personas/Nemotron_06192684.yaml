personas:
  professional: Michael Peterson, a retired handyman turned community mentor, leverages decades of hands‑on carpentry, boat‑maintenance, and basic electronics expertise to teach DIY skills to teens and
    seniors, blending their practical curiosity with a laid‑back, flexible approach that values tangible results over rigid schedules.
  sports: Michael Peterson enjoys low‑impact fitness such as daily beach walks, occasional fishing trips on San Diego Bay, and sailing with the San Diego Yacht Club’s senior crew, while cheering on the
    San Diego Padres and supporting the San Diego State Aztecs during basketball season, reflecting their relaxed yet consistent commitment to staying active.
  arts: Michael Peterson immerses themselves in classic jazz icons like Miles Davis and Billie Holiday, folk legends such as Woody Guthrie and Joan Baez, and follows nature photographer Ansel Adams for
    inspiration, while occasionally attending community theater productions of Arthur Miller's plays, allowing their creative side to flourish amid a quiet lifestyle.
  travel: Michael Peterson prefers relaxed, small‑group road trips along the Pacific Coast Highway and weekend getaways to national parks like Joshua Tree and Yosemite, planning itineraries loosely to allow
    spontaneous stops for wildlife photography, yet often constrained by a modest travel budget and the desire to stay close to their San Diego coastal home.
  culinary: Michael Peterson enjoys cooking fresh garden vegetables into simple dishes such as roasted zucchini with herbs, grilled salmon tacos topped with avocado and pico de gallo, and occasional hearty
    bean chili, cooking at a modest skill level while sometimes letting their mind wander, leading to occasional over‑seasoned plates.
  core: Michael Peterson is a quietly curious retiree who balances a love of hands‑on tinkering and nature photography with a habit of misplacing their tools and a relaxed, almost forgetful approach to
    planning, yet remains steadfastly kind and community‑focused.
background:
  cultural: Michael grew up in a midwestern suburb in the 1950s, raised in a family of German-American and English-American heritage. The post-war emphasis on hard work, self-reliance and community involvement
    shaped his practical outlook. In his twenties he moved to Southern California, drawn by the booming shipyards and later by the relaxed, outdoors-oriented lifestyle of San Diego. Over the decades he
    absorbed the laid-back West Coast beach culture, the multicultural mosaic of the city, and the civic spirit of local volunteerism, while retaining the modest, courteous sensibilities of his Midwestern
    upbringing. His cultural identity blends traditional American values with the coastal, environmentally aware vibe of Southern California.
