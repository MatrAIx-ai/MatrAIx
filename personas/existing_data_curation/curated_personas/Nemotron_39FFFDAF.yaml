  career_goals: Hayley often talks about wanting to help people when she grows up. She imagines herself as a teacher who can make learning fun and organized for kids, combining her love for structure with
    her enthusiasm for group activities. She also expresses interest in becoming a veterinarian because she enjoys caring for animals and believes she can make a positive difference for pets in her community.
    Recently, she mentioned she'd like to organize school events or community festivals, reflecting an early ambition to be a youth event coordinator. Overall, her career aspirations revolve around roles
    that let her interact with others, provide support, and bring order to collaborative settings.
