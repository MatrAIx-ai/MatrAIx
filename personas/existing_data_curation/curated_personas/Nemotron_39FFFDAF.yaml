personas:
  professional: Hayley Ricard is a budding team‑oriented organizer who channels a practical love of structure into leading after‑school soccer drills and coordinating collaborative LEGO build sessions,
    while remaining flexible enough to let friends shape the play.
  sports: Hayley Ricard shines on the Midtown Tigers U‑10 soccer team at the local community centre, eagerly wearing the team’s blue jersey, cheering for the professional Portland Timbers during weekend
    broadcasts, and revels in the camaraderie of mixed‑gender scrimmages and pick‑up games at the park.
  arts: Hayley Ricard channels creativity into friendship‑bracelet weaving, paints whimsical scenes inspired by Mary Blair’s vibrant palette, assembles intricate LEGO cities while humming JoJo Siwa’s 'Kid
    in a Candy Store', and shares favorite adventure reads like Percy Jackson and mystery tales such as The Mysterious Benedict Society with friends.
  travel: Hayley Ricard delights in day trips to Riverbend State Park for nature walks and leaf‑collecting, enjoys the excitement of the annual county fair with its cotton‑candy stalls, and dreams of exploring
    Disneyland and the awe‑inspiring Grand Canyon on future family vacations.
  culinary: Hayley Ricard favors pepperoni pizza with extra cheese, comforting homemade mac and cheese, and loves crafting banana‑strawberry‑spinach smoothie bowls topped with granola, often helping parents
    sauté mini‑meatballs for dinner while experimenting with colorful veggie sticks as snack art.
  core: Hayley Ricard is an energetic, structure‑loving nine‑year‑old who balances soccer, crafts, and friends with a pragmatic allowance mindset, mild allergy care, and a boundless curiosity for adventure.
background:
  cultural: Hayley was born and raised in Johnston, a suburban community in Polk County, Iowa. Her family’s heritage is primarily of German and Irish descent, reflecting the broader European roots common
    in the region. Growing up in the Midwest, she experiences a culture that values community involvement, modesty, and a strong work ethic. She celebrates typical American holidays such as Thanksgiving,
    Independence Day, and Christmas, often with traditions that blend her family’s ethnic customs, like baking German pretzels for holiday gatherings. Hayley attends a public elementary school where diversity
    is modest, and she participates in school‑wide activities, church youth groups, and local community events, fostering a sense of belonging and shared Midwestern values.
