  hobbies: '[''Watercolor painting'', ''Architectural sketching'', ''Industrial photography'', ''Scale model building'', ''Reading speculative fiction'', ''Reading regional history'', ''Woodworking projects'',
    ''Garden design'', ''Craft circles'', ''Local gallery visits'']'
  career_goals: Gretchen aims to leverage her construction expertise and artistic sensibility to move into a senior supervisory role, eventually establishing her own boutique renovation firm that specializes
    in bespoke, art‑infused remodels for historic homes in the Ohio region. She also plans to earn a Certified Safety Trainer credential and mentor the next generation of tradespeople, fostering a culture
    of quality craftsmanship and creative problem‑solving.
