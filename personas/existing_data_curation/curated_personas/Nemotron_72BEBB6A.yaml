personas:
  professional: Gretchen Hea is a seasoned construction supervisor who combines methodical project scheduling, OSHA safety mastery, and a vivid imagination for watercolor-inspired design, delivering on-time,
    budget-conscious remodels while they quietly envision a boutique firm that fuses historic Ohio architecture with artistic flair.
  sports: Gretchen Hea enjoys low-impact fitness through weekend hikes in the Cuyahoga Valley and rides with the Columbus Cycling Club, while they cheer the Cleveland Browns in football season, the Cincinnati
    Reds during spring baseball, and the Ohio State Buckeyes in college rivalry games, preferring steady, routine activity over high-intensity competition.
  arts: Gretchen Hea devotes evenings to watercolor studies of Andrew Wyeth-style light, sketches Gothic revival facades, absorbs speculative fiction from Ursula K. Le Guin and Neal Stephenson, and curates
    their playlist with Sufjan Stevens and Nick Drake while they attend intimate gallery openings at the Dayton Art Institute, allowing the arts to shape both their design aesthetic and solitary leisure.
  travel: Gretchen Hea prefers meticulously planned, small-group heritage tours, having explored the historic districts of Savannah, the Musée d’Orsay in Paris, and the Bauhaus sites in Dessau, while they
    dream of a future road trip along Ohio’s covered bridge trail to document forgotten industrial relics.
  culinary: Gretchen Hea enjoys cooking with a moderate skill level, often preparing pan-seared Lake Erie perch with lemon-thyme butter, rustic rosemary focaccia from a sourdough starter, and heirloom tomato
    salads, while they relish dining at farm-to-table bistros that showcase seasonal Ohio produce and occasionally splurge on a tasting menu featuring truffle-infused risotto.
  core: Gretchen Hea is a methodical, art‑obsessed builder who schedules every renovation down to the brushstroke, yet they habitually hoard vintage drafting tools and procrastinate replying to non‑urgent
    emails.
background:
  cultural: Gretchen grew up in a modest, white, Midwestern family in the agricultural outskirts of Tiffin, Ohio, with ancestors of German and Irish heritage. The community’s emphasis on hard work, self‑reliance,
    and modest living shaped her values. Though rooted in the traditional values of small‑town Ohio—faith, neighborliness, and a strong work ethic—she also embraced the region’s industrial legacy, which
    sparked her interest in construction and repurposing older buildings. Her cultural upbringing balances practical pragmatism with an appreciation for the quieter, reflective aspects of rural life.
attributes:
  skills: '[''Framing'', ''Drywall installation'', ''Carpentry'', ''Blueprint reading'', ''Material estimation'', ''Project scheduling'', ''OSHA safety compliance'', ''Team coordination'', ''Apprentice
