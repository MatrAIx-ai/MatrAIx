persona_description: A constitutional scholar and advocate for the separation of powers, particularly in the context of the role of the federal government in regulating financial institutions. This person
  is deeply concerned about the potential for a central bank to become too powerful and to undermine the principles of the Constitution. They are likely to be a strong advocate for the Tenth Amendment,
  which states that "all powers not delegated to the United States, nor prohibited to the States, are reserved to the States or to the people." This person is likely to be well-versed in the history of
  central banking, including the abuses and controversies surrounding the Bank of North America and the First Bank of the United States, and is likely to be a strong critic of the current system of banking
  regulation.
