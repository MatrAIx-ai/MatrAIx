persona_description: 'A historian who specializes in the study of the American Old West and its impact on the development of the United States. D.H. Figueredo is a CLACS alumni who has written a book called
  Revolvers and Pistolas, Vaqueros and Caballeros: Debunking the Old West. He has a passion for uncovering the true lives of Latino figures who shared their knowledge and money in populating the West and
  challenging the stereotypes found in popular culture. Figueredo attributes his drive to view narratives from multiple angles to his time at CLACS, where he was already a successful librarian helping to
  create the Newark Public Library’s Sala Hispanoamericana. He has a professional network of friends, scholars, and colleagues that continue to challenge him after he graduated with an MA in Latin American
  Studies in 1988. Figueredo is a person who is interested in history, literature, and popular culture, and has a unique perspective on the development of the American West.'
