  career_goals: Danny aspires to pursue a career that combines structure, teamwork, and community service. He is drawn to public‑safety fields such as firefighting or law enforcement, where clear protocols
    and immediate results align with his preference for predictability. He also considers studying civil engineering or project management to help design and build infrastructure in his hometown, reflecting
    his competitive drive to excel and make tangible contributions. Ultimately, Danny wants a role that lets him lead, stay organized, and stay connected with the people around him.
