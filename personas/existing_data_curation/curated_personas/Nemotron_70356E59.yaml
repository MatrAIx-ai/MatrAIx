personas:
  professional: Danny Mejia, a 14-year-old high school sophomore, channels a competitive spirit and methodical planning into debate club leadership and strategic video game streaming, where they craft persuasive
    arguments on stage and meticulously edit live streams to grow an engaged online audience.
  sports: Danny Mejia, a 14-year-old high school athlete, dominates the junior varsity football field and the school basketball court while training with the Midtown Youth Basketball Club, cheering for
    the Dallas Cowboys and the Los Angeles Lakers, and adhering to a regimented fitness plan that blends weight‑training, cardio, and skill drills, reflecting their organized and competitive nature.
  arts: Danny Mejia, a 14-year-old music enthusiast and mystery novel aficionado, alternates between blasting Kendrick Lamar’s hip‑hop tracks and Kacey Musgraves’ country hits, devours Agatha Christie’s
    classic whodunits and Gillian Flynn’s modern thrillers, and draws creative inspiration from Lin‑Manuel Miranda’s lyrical storytelling.
  travel: Danny Mejia, a 14-year-old adventure‑seeker, prefers family road trips to places like the Grand Canyon and New Orleans, meticulously plans itineraries using budget spreadsheets, and dreams of
    backpacking through Tokyo and Barcelona, balancing a desire for cultural immersion with the constraints of a modest family travel budget.
  culinary: Danny Mejia, a 14-year-old culinary experimenter, favors bold meals such as pepperoni pizza crowned with jalapeños, chicken quesadillas loaded with shredded cheddar, and occasional spaghetti
    carbonara with pancetta, cooking with a mix of confidence and occasional burnt edges while using budgeting spreadsheets to compare prices of ground beef, mozzarella, and fresh cilantro.
  core: Danny Mejia, a 14-year-old organized yet sociable competitor, balances a methodical love of structure with a talkative drive to lead debates, dominate video game streams, and rally peers, all while
    occasionally overspending on gaming gear and neglecting sleep during marathon sessions.
background:
  cultural: Danny grew up in Heflin, Alabama, a close‑knit small town where Southern traditions run deep. His daily life has been shaped by community church gatherings, high‑school football culture, and
    seasonal outdoor activities such as fishing and backyard barbecues. Family values like hospitality, respect for elders, and modesty are central to his upbringing. While his surname hints at Hispanic
    ancestry, Danny primarily identifies with the regional white Southern culture of his hometown, embracing local customs, local dialect, and the strong sense of community that defines rural Alabama.
