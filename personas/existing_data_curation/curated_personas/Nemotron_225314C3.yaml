  career_goals: Oscar dreams of becoming a professional soccer player who leads his team as a captain, valuing the clear rules and structure of the sport while still enjoying the dynamic, fast‑paced action.
    He also imagines himself one day working as a community firefighter, attracted by the predictable routine of drills and the opportunity to help others in a hands‑on, competitive environment. These ambitions
    reflect his love of teamwork, his competitive spirit, and his desire for roles that combine structure with immediate, tangible outcomes.
