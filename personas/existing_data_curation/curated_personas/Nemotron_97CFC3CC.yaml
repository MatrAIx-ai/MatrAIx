  hobbies: '[''Watercolor painting'', ''Sketching'', ''Photography'', ''Reading speculative fiction'', ''Creative short‑story writing'', ''Attending local art fairs and craft markets'', ''DIY home‑decor
    projects'', ''Yoga and mindfulness meditation'', ''Hiking nature trails'']'
  career_goals: Brooke aspires to transition from floor sales to a role that blends her commercial experience with her artistic passion, such as visual merchandiser or boutique owner. She dreams of opening
    a small, community‑focused shop that showcases locally made crafts, indie fashion, and rotating art installations. To achieve this, she plans to enroll in a part‑time certificate program in visual merchandising
    or interior styling, while building a portfolio of store‑window designs. Ultimately, she wants to create a flexible, low‑stress work environment that allows her to nurture creativity, maintain harmonious
    team dynamics, and remain deeply connected to her hometown community.
