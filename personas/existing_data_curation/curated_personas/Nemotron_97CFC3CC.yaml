personas:
  professional: Brooke Hendley, a 30‑year‑old retail sales specialist known for empathetic customer service and inventive visual merchandising, channels their love of community gatherings and indie aesthetics
    into eye‑catching store displays while they often scramble against tight deadlines and paperwork.
  sports: Brooke Hendley enjoys low‑impact fitness like weekend hikes through the Huron‑Manistee forests and community yoga classes, plays casual pickup volleyball at the local recreation center, and they
    passionately follow the Detroit Tigers, the Michigan State Spartans basketball team, and the Grand Rapids Griffins, preferring community‑oriented activity over intense gym routines.
  arts: Brooke Hendley immerses themselves in watercolor painting inspired by the shimmering lakes of Michigan, and they draw creative fuel from the magical realism of Haruki Murakami and Neil Gaiman, curate
    indie playlists featuring Sufjan Stevens, The National, and local folk band The Milk Carton Kids, and regularly attend the Ann Arbor MLive Arts Festival and small‑town gallery openings.
  travel: Brooke Hendley favors spontaneous weekend road trips along the Great Lakes shoreline, has explored Door County’s historic lighthouses and the vibrant art scene of Milwaukee, dreams of a summer
    adventure in the Scottish Highlands to sketch rugged coastlines, and they often plan travel around community art fairs while keeping a modest travel budget.
  culinary: Brooke Hendley delights in cooking farm‑to‑table meals such as grilled trout with fresh herbs, creamy mushroom risotto, and apple crisp topped with locally sourced honey, enjoys sampling the
    seasonal farmers’ market produce, and they frequently experiment with vintage postcard recipes to recreate classic Midwestern comfort dishes while occasionally indulging in indie coffee shop pour‑overs.
  core: Brooke Hendley is an imaginative, community‑driven retail pro who channels indie art into visual merchandising, battles deadline anxiety with yoga, and they balance frugal living with spontaneous
    vintage finds.
background:
  cultural: Brooke is a white Midwestern woman whose family has lived in Michigan for several generations, with ancestral ties to German and Irish immigrants who settled in Kent County. Her upbringing emphasized
    modesty, a strong work ethic, and community involvement—values reflected in the local volunteer fire department, church gatherings, and neighborhood potlucks she still cherishes. While she embraces
    these traditional Midwestern roots, she also seeks novelty and artistic expression, often blending the region's practical sensibility with a love for indie music, vintage aesthetics, and small‑town
    artistic collaborations.
attributes:
