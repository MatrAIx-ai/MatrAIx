  career_goals: Although retired, Victor remains driven to leave a lasting record of his hometown. His primary goal is to complete a comprehensive, illustrated history of Geneseo that incorporates oral
    testimonies from longtime residents, and to digitize the town's archival collections for future researchers. He also hopes to mentor a new generation of local historians, ensuring the continuity of
    the community's memory. On a personal level, he seeks to maintain his health through regular gardening and walking, and to spend quality time with his wife during small, meaningful outings.
