personas:
  professional: Linda Warner is a claims analyst in a mid-size insurance firm who uses their strong Excel and policy-interpretation skills to impose order on high-volume workloads, while drawing on a calm,
    structured mindset cultivated through yoga to resolve customer disputes and drive process-improvement initiatives.
  sports: Linda Warner enjoys walking their Labrador along Studio City's tree-lined streets, participates in a local recreational volleyball league on summer weekends, and roots for the Los Angeles Dodgers
    and LA Sparks, balancing low-impact fitness with community camaraderie.
  arts: Linda Warner unwinds by knitting in a weekly circle while devouring mystery novels by Tana French, playlists featuring Ludovico Einaudi, and attending occasional screenings of Christopher Nolan
    films at the local boutique cinema, weaving these artistic tastes into their creative resting moments.
  travel: Linda Warner prefers short, well-planned getaways such as weekend hikes in Joshua Tree, coastal bike rides in Malibu, and a yearly ski trip to Park City, coordinating itineraries on Google Trips
    while budgeting for pet-friendly accommodations and occasional spontaneous detours to nearby vineyards.
  culinary: Linda Warner loves baking classic chocolate-chip cookies and experimenting with health-forward dishes like quinoa-crusted salmon, favoring ingredients such as almond flour, avocados, and fresh
    basil, and enjoys sourcing organic produce at the Studio City farmer’s market for their signature lemon-ricotta pancakes.
  core: Linda Warner balances a meticulous, structure-driven career with a habit of over-thinking, channeling anxieties into yoga, baking, and community volunteering while never missing a deadline or a
    morning walk with their dog.
background:
  cultural: Linda was raised in a middle‑class family in the San Fernando Valley, embodying mainstream American cultural values such as self‑reliance, punctuality, and community involvement. Her upbringing
    emphasized practical education and a strong work ethic, while her adult life in Studio City exposed her to the diverse, creative atmosphere of Los Angeles. She identifies with a pragmatic, culturally
    mainstream white American background, but also appreciates the multicultural influences of her Southern California environment, integrating them into her community activities and personal interests.
