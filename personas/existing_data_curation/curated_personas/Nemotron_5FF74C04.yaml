  career_goals: Vicenta dreams of becoming an artist who paints vibrant murals that celebrate her Mexican heritage, and she often talks about loving animals enough to be a veterinarian. She also imagines
    teaching younger children, sharing stories and crafts, and occasionally mentions becoming an astronaut to explore the unknown. These ambitions reflect her curiosity about the world, love for creative
    expression, and desire to help and inspire others.
