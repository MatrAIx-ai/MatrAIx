personas:
  professional: Vicenta Medina, a budding junior soccer enthusiast and aspiring artist, channels their curiosity into organizing impromptu games at the park, demonstrating early leadership and a knack for
    teamwork.
  sports: Vicenta Medina thrives on the soccer field at Ventura County's community park, cheering for the LA Galaxy, and joins the local youth soccer club's Saturday practices, while also dabbling in beach
    volleyball during summer.
  arts: Vicenta Medina delights in watercolor sketches of cartoon characters, molds clay figurines after watching Pixar's Coco, and dances to pop hits by Taylor Swift and lively mariachi tunes at family
    gatherings.
  travel: Vicenta Medina loves weekend trips to the sandy shores of Ventura County, day trips to Disneyland, and dreaming of a family road trip to the Grand Canyon, where they plan to collect unique rocks
    and shells.
  culinary: Vicenta Medina helps their mother roll tamales, fry churros, and stir guacamole, while also mastering a perfect PB&J sandwich and experimenting with colorful fruit salads featuring strawberries
    and mango.
  core: Vicenta Medina is a curious, energetic 7-year-old who blends soccer, art, and family traditions into a vibrant, slightly messy, and endlessly imaginative daily adventure.
background:
  cultural: Vicenta grows up in a bicultural Mexican‑American household in Oxnard, California. Her parents speak Spanish at home, teaching her traditional customs such as honoring Día de los Muertos with
    homemade altars, celebrating Cinco de Mayo with music and food, and participating in community festivals that highlight Mexican dance and cuisine. Family meals often combine Mexican flavors—tortillas,
    beans, salsa—with fresh produce from Ventura County, reflecting a blend of heritage and local lifestyle. She attends a diverse elementary school where she joins Hispanic Heritage month activities, learns
    about the histories of different Latin American countries, and shares her own family's stories from Jalisco. Frequent visits to her grandparents deepen her connection to oral traditions, folk songs,
    and the Spanish language, while the coastal environment nurtures her love for beach outings and sea‑related exploration.
