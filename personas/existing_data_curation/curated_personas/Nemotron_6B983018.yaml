  career_goals: Although retired, Cynthia aims to expand her impact on the Waterville community by chairing the Allamakee County Historical Society board, launching a sustainable community garden, and mentoring
    younger volunteers in leadership and organizational skills. She also aspires to author a family history book, showcasing her genealogical expertise, and to be recognized as a catalyst for high‑standard
    community projects.
