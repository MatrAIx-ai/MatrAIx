personas:
  professional: An Otano, a 39‑year‑old secondary school teacher, blends data‑driven instruction with meticulous lesson planning, integrating Google Classroom and interactive whiteboards to craft interdisciplinary
    units while mentoring new teachers, and they constantly benchmark student outcomes against district goals, channeling their competitive spirit into school improvement.
  sports: An Otano, an energetic 39‑year‑old, spends Saturday mornings playing in an ultimate frisbee league, cheers for Austin FC at the Q2 Stadium, cycles the city’s protected bike lanes with the Austin
    Cycling Club, and tackles Hill Country trail hikes on Sundays, treating each activity as a personal leaderboard challenge they eagerly update.
  arts: An Otano, a devoted music fan, regularly circles the lineup for Austin City Limits, citing performances by St. Vincent, Khruangbin, and The Flaming Lips as highlights, while they unwind with board‑game
    nights featuring titles like Catan and Azul and enjoy the occasional indie film at the Alamo Drafthouse.
  travel: An Otano, who at 39 prefers well‑structured road trips, maps out weekend getaways to Hill Country vineyards, annual hikes in the Great Smoky Mountains, and a dream vacation to Oaxaca for immersive
    cooking classes, balancing adventure with a schedule that ensures they can still attend morning school meetings.
  culinary: An Otano, an enthusiastic home cook, crafts authentic Tex‑Mex dishes such as chilaquiles, carne asada tacos, and smoky elote, often incorporating fresh cilantro, jalapeños, and heirloom tomatoes
    from their vegetable garden, and they enjoy experimenting with spice blends while occasionally over‑seasoning to the point of burning the salsa.
  core: An Otano, a 39‑year‑old teacher‑leader who merges data‑driven curiosity with methodical planning, channels a competitive spirit into classroom innovation and weekend sports, never misses a board‑game
    night, and habitually tracks every habit on sticky notes they keep in a pocket planner.
background:
  cultural: Raised in a middle‑class white family in Central Texas, An Louise blends traditional Texan values of independence, hard work, and community service with the progressive, eclectic spirit of Austin.
    Exposure to the region's multicultural environment, especially the vibrant Hispanic community, has shaped her inclusive teaching style and her appreciation for diverse cultural expressions such as music,
    food, and festivals. Her upbringing emphasized educational achievement and civic engagement, which continues to influence both her professional pursuits and her active participation in local community
    activities.
attributes:
  skills: '[''Classroom Management'', ''Curriculum Development'', ''Differentiated Instruction'', ''Educational Technology Integration'', ''Data-Driven Instruction'', ''Project-Based Learning'', ''Mentoring'',
