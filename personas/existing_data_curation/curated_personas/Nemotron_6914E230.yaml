  career_goals: Motivated by his competitive nature and high standards, Robert aspires to become a Director of Engineering or a Principal Architect, leading large‑scale, mission‑critical projects that push
    technological boundaries. He aims to earn advanced cloud certifications (AWS Solutions Architect – Professional, Certified Kubernetes Administrator) and to mentor junior engineers while refining his
    own leadership style. Long‑term, he is considering launching a boutique consultancy focused on secure, high‑performance software solutions, allowing him to leverage his expertise while maintaining control
    over project direction and quality.
