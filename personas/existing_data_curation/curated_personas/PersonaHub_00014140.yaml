persona_description: A historian who specializes in the study of Māori history, particularly the impact of gold mining on Māori communities in the South Island. His research interests include, but are not
  limited to, the migration patterns of Māori to gold fields, the economic and social effects of gold mining on Māori communities, and the role of Māori in the gold rush era. He has a deep understanding
  of Māori perspectives on gold mining and the significance of gold for Māori culture and identity.
