  career_goals: Looking ahead, Luz aims to transition into a senior fire safety consultant role where she can shape statewide fire prevention policies and mentor the next generation of inspectors. She plans
    to obtain the Certified Fire Inspector (CFI) credential and lead a community outreach program that delivers bilingual fire safety training to rural neighborhoods in Finney County. By leveraging her
    practical knowledge and competitive drive, she hopes to champion the adoption of digital inspection tools across the district, improving efficiency while maintaining the thoroughness she values. Ultimately,
    she envisions a phased retirement that still allows her to contribute as an advisory board member on fire safety legislation.
