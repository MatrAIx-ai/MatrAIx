personas:
  professional: Krystal Moulton, an aspiring digital illustrator and budding strategy-game designer, blends a preference for structured world-building with spontaneous bursts of color, and they use their
    solitary focus to craft intricate character sketches while flexibly adapting to the rapid decision-making required by strategy games.
  sports: Krystal Moulton participates in a community youth soccer league during spring, enjoys casual jogging after school, and they follow the Memphis Grizzlies and Nashville Predators with enthusiastic
    fanhood, balancing structured team practice with spontaneous solo cardio sessions when mood strikes.
  arts: Krystal Moulton immerses themselves in drawing vibrant fantasy characters on a tablet, drawing color inspiration from Memphis blues legends like B.B. King and blues-rock fusion band The Black Keys,
    and they also binge-watch Studio Ghibli films while listening to synthwave artist Com Truise during creative breaks.
  travel: Krystal Moulton prefers low-key, meticulously planned weekend trips to nearby parks such as the Great Smoky Mountains and occasional family outings to Disney World, yet they dream of an impulsive
    solo adventure to Tokyo's Akihabara district to explore anime culture.
  culinary: Krystal Moulton, a budding home chef, effortlessly whips up quick comfort foods like cheesy quesadillas, spaghetti Aglio e Olio, and banana-pepper tacos, and they experiment with bold ingredients
    such as smoked paprika and caramelized onions when helping their family in the kitchen.
  core: Krystal Moulton is a solitary, structure-loving teen who balances meticulous planning with spontaneous bursts of creativity, and they often dive deep into fantasy worlds, strategic games, and vivid
    sketches while occasionally succumbing to impulsive video-game purchases and screen-time fatigue.
background:
  cultural: Krystal comes from a white, middle-class family rooted in the Southern traditions of Memphis, Tennessee. Her upbringing reflects the blend of Southern hospitality and the city's rich musical
    heritage, especially blues and rock 'n' roll, which she encounters through family playlists and community festivals. She attends a local public middle school where school events often celebrate regional
    history, such as the Memphis in May festivities. Family gatherings feature Southern comfort foods like fried chicken and collard greens, and occasional church services reinforce a sense of community.
    While she lives in a diverse city, her personal circles are small and consist mainly of longtime school friends and neighborhood peers.
attributes:
  skills: '[''organized note-taking'', ''basic Scratch coding'', ''digital illustration (using free apps)'', ''simple cooking (sandwiches, salads)'', ''small-group facilitation'', ''basic first-aid knowledge'',
