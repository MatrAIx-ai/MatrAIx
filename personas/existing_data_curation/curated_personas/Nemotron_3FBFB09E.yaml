  hobbies: '[''reading fantasy & sci-fi novels'', ''digital sketching and illustration'', ''playing strategy video games'', ''listening to Memphis blues and rock'', ''simple cooking (family meals)'', ''volunteering
    at animal shelter'', ''participating in school science club (small-group projects)'']'
  career_goals: Krystal hopes to stay on a clear academic path through high school, aiming for a solid GPA in science and math so she can qualify for a vocational program after graduation. Her long-term
    ambition is to become a veterinary technician, combining her love of animals with a practical, hands-on career. She also dreams of developing her digital-art skills enough to do freelance comic-strip
    work on the side. Short-term, she plans to volunteer at the local animal shelter, earn a junior first-aid certification, and complete a summer coding camp that reinforces her structured learning style
    while allowing creative bursts.
