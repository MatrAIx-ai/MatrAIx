persona_description: A historian and bibliographer specializing in the study of Spanish Golden Age poetry, particularly the works of named poets and anonymous poetic texts. He has a deep understanding of
  the methodology used to analyze and record data for this type of bibliographical scholarship and has extensive experience in digitizing and organizing manuscript and printed sources through the use of
  computer technology. He is also a member of the Cleveland State University, National Endowment for the Humanities, and the Program for Cultural Cooperation Between Spain's Ministry of Culture & United
  States' Universities.
