  hobbies: '["Gardening", "Hiking", "Woodworking", "Reading (historical non-fiction, business biographies)", "Playing bridge", "Volunteering at community food bank", "Traveling within Oregon and Pacific
    Northwest", "Photography"]'
  career_goals: Although officially retired, Ian aims to leave a lasting legacy by sharing his business acumen with local entrepreneurs through the Clackamas Small Business Development Center, continuing
    as a volunteer treasurer and mentor for community groups, and teaching his grandchildren essential financial literacy skills. He also aspires to document his life experiences and lessons learned in
    a memoir that captures the values of perseverance, community service, and curiosity for future generations.
