  hobbies: '[''Reading contemporary literature'', ''Visiting art galleries'', ''Cooking Vietnamese cuisine'', ''Photography'', ''Yoga'', ''Hiking'', ''Participating in writing workshops'', ''Hosting a literary
    podcast'', ''Traveling for cultural immersion'', ''Volunteering at community cultural centers'']'
  career_goals: Nguyet aims to publish a critically acclaimed novel that interweaves Vietnamese diaspora narratives with contemporary American themes, securing a contract with a major literary imprint.
    She aspires to become a recognized voice in multicultural literature, contributing regularly to literary journals and mainstream publications. Building on her sociable nature, she plans to curate anthologies
    featuring underrepresented Southeast Asian writers and to launch a mentorship program for immigrant youth interested in writing. Long‑term, she envisions founding an imprint dedicated to diverse voices
    and hosting an annual literary festival in the Los Angeles area that celebrates cross‑cultural storytelling.
