  career_goals: Although retired from formal employment, Irina is driven to deepen her impact on her local cultural scene. She aims to curate a series of community‑driven exhibitions that showcase emerging
    local artists and celebrate the town’s historical narratives. She plans to mentor younger volunteers at the Wrentham Historical Society and the local library, sharing her knowledge of art history and
    storytelling techniques. Irina also aspires to complete a short graduate certificate in museum studies to formalize her curatorial skills. On a personal creative front, she hopes to publish a collection
    of short stories inspired by her travels and the people she meets at social gatherings. Finally, she wishes to organize an annual interdisciplinary arts festival that brings together visual artists,
    musicians, and writers, fostering a vibrant, inclusive space for creative exchange.
