    and art workshops","Watching social‑justice documentaries"]'
  career_goals: Delia dreams of a career that blends her love for structure, service to others, and talent for communication. She aspires to become a community health educator or youth counselor, working
    in Prince George’s County to design outreach programs that promote wellness and academic success for younger students. She plans to attend a university with a strong public health or social work program,
    earn a degree, and eventually lead a nonprofit organization that provides mentorship and resources in underserved neighborhoods. Delia also sees herself returning to her high school as a mentor, helping
    peers navigate stress and academic challenges while continuing to organize community events.
