persona_description: A small to medium-sized manufacturing company that is seeking to obtain a stormwater pollution prevention plan (SWPPP) for its facilities. The company has fewer resources and is looking
  for a streamlined and user-friendly tool to help them determine whether they need a permit and to implement a pollution prevention program. The company is interested in the software's ability to guide
  them through the process of assembling a pollution prevention team, identifying potential pollutants, selecting appropriate best management practices (BMPs), recordkeeping and reporting, employee training,
  and implementing and updating the plan. The company is also interested in the software's ability to provide contact information about each state's permitting authority and if there are additional state
  requirements that must be met.
