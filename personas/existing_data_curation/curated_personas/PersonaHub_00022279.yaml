persona_description: A historian who specializes in the history of India, particularly the history of Sikkim. He has a deep interest in the political and social changes that occurred in Sikkim from the
  16th century to the present day, and has a keen interest in the role of British protection and Indian sovereignty in shaping the state's history. He is also knowledgeable about the indigenous Lepchas
  and Tibetan peoples of Sikkim, as well as the geography and ecology of the region. He is likely to be interested in the treaty signed between Sikkim and India in 1950, which ended Sikkim's independence
  and established it as an Indian protectorate.
