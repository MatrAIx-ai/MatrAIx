personas:
  professional: Pearlene Carter, a retired home‑economics savant turned community garden coordinator and budding quilting entrepreneur, blends a down‑to‑earth budgeting mindset with a curious drive to experiment
    with heirloom vegetables and hand‑stitched designs, while their reserved nature makes them a quiet but reliable leader of church charity drives.
  sports: Pearlene Carter enjoys leisurely bird‑watching walks along the Etowah River trail, participates in a local pickleball club on Saturdays, roots for the Atlanta Braves and Atlanta Falcons, and approaches
    fitness as a low‑impact, social activity rather than a competitive pursuit.
  arts: Pearlene Carter finds solace in quilting blocks patterned after traditional motifs while spinning classic country and gospel vinyl by Dolly Parton and Mahalia Jackson, curls up with historical fiction
    set in the American South, and occasionally attends community theater productions of classic Southern dramas.
  travel: Pearlene Carter favors spontaneous weekend road trips to nearby gems such as the Blue Ridge Parkway, Savannah’s historic district, and the Cherokee National Forest, balances travel with a modest
    budget and limited family obligations, and uses a simple itinerary notebook to capture must‑see bird‑watching spots.
  culinary: Pearlene Carter cooks comfort meals like shrimp‑and‑grits with a miso‑infused butter and jalapeño‑cornbread, incorporates garden‑fresh heirloom tomatoes into sauces, experiments with sweet‑potato
    pie flavored with rosemary, and enjoys the tactile process of splitting beans for homemade collard‑green stew.
  core: Pearlene Carter’s blend of garden‑rooted curiosity, quilt‑making pragmatism, and gentle community spirit creates a quiet life punctuated by occasional impulsive seed purchases and a steadfast commitment
    to nurturing both plants and people.
background:
  cultural: Pearlene grew up in a modest, middle‑class family in rural Georgia during the 1960s and 70s. Her upbringing was steeped in Southern hospitality, church involvement, and a strong sense of community
    responsibility. The cultural fabric of Rome, GA—marked by close‑knit neighborhoods, seasonal festivals celebrating Appalachian heritage, and an emphasis on family recipes—has shaped her values of modesty,
    generosity, and respect for tradition. While she cherishes these roots, her curiosity encourages her to blend old customs with new ideas, such as incorporating contemporary gardening techniques into
    her longstanding love of heirloom vegetables.
