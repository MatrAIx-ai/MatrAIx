  hobbies: '[''gardening'', ''quilting'', ''birdwatching'', ''reading historical fiction'', ''cooking Southern cuisine'', ''walking nature trails'', ''listening to classic country and gospel music'']'
  career_goals: Although retired from formal employment, Pearlene aspires to remain an active, contributing member of her community. She hopes to expand her gardening knowledge, possibly joining a local
    master‑gardener program, and to turn her quilting hobby into a modest side‑business selling handmade blankets at the weekly farmers’ market. She also aims to become comfortable with video‑calling platforms
    so she can support her adult children and grandchildren from a distance, and to mentor younger volunteers at her church, sharing the practical skills she has honed over a lifetime.
