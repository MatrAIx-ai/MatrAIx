personas:
  professional: Mirelys Ortiz, a senior UX designer and front‑end developer in the Bay Area, blends rigorous user research, interaction design, and a bold visual aesthetic influenced by vibrant textile
    traditions to lead cross‑functional teams, while they bring natural curiosity, calm resilience, and talkative charisma to workshop facilitation and assertive advocacy for inclusive design.
  sports: Mirelys Ortiz stays active by hiking coastal trails with the Bay Area Hiking Collective, follows the San Francisco Giants in spring, the Golden State Warriors in winter, and cheers for the San
    Jose Earthquakes during soccer season, combining casual team fandom with a personal commitment to weekly brisk walks and weekend trail treks.
  arts: Mirelys Ortiz channels their love for vibrant storytelling into murals that echo the bold patterns of folk art and the abstractions of artists like Frida Kahlo and Basquiat, while unwinding listening
    to salsa legends Celia Cruz and Tito Puente and attending local theater productions featuring performances by Lin‑Manuel Miranda.
  travel: Mirelys Ortiz plans immersive cultural trips, meticulously mapping itineraries for weekend escapes to Big Sur and Monterey before jetting off to Oaxaca’s markets, Barcelona’s architecture, and
    Machu Picchu’s ruins, balancing a modest travel budget with a desire for vibrant experiences and occasional last‑minute salsa festivals.
  culinary: Mirelys Ortiz, an adept home chef, regularly prepares heritage dishes like gallo pinto, nacatamales, and tres leches cake using plantains, fresh corn, and cacao, while also experimenting with
    spice‑infused sauces and savoring occasional fine‑dining evenings that feature seared ahi tuna with miso glaze.
  core: Mirelys Ortiz, the calm yet talkative design leader who fuses bold cultural motifs with sleek tech, never misses a salsa night, hoards succulents, and still forgets to floss after coffee.
background:
  cultural: Mirelys grew up in a bicultural household; her parents immigrated from Nicaragua to California in the 1980s. Raised speaking Spanish at home and English at school, she carries forward traditions
    of family solidarity, vibrant celebrations, and a deep appreciation for color and rhythm. The rich visual language of Nicaraguan textiles, ceramics, and festivals informs her design aesthetic, leading
    her to favor bold palettes and storytelling in digital experiences. She remains active in the Nicaraguan diaspora community in the Bay Area, participating in cultural events and serving as a bridge
    between her heritage and her professional world, advocating for culturally responsive design and inclusive tech.
attributes:
  skills: '[''User Research & Persona Development'', ''Information Architecture'', ''Interaction Design'', ''Visual Design & Branding'', ''Responsive Web Design'', ''Prototyping (Figma, Sketch, Adobe XD)'',
