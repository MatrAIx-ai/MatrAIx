    ''Facilitation of Design Workshops'', ''Mentoring & Team Leadership'']'
  hobbies: '[''Painting (folk‑inspired & abstract)'', ''Salsa & Merengue dancing'', ''Cooking traditional Nicaraguan cuisine'', ''Hiking coastal trails in the Bay Area'', ''Succulent gardening'', ''Volunteering
    teaching digital literacy'', ''Mentoring women in tech'', ''Reading sci‑fi and design literature'', ''Street & landscape photography'']'
  career_goals: Mirelys aims to become a Design Director within the next five years, steering the strategic vision of digital products at a leading tech firm in the Bay Area. She is passionate about embedding
    inclusive design practices that reflect diverse cultural perspectives, especially Latin American users. She plans to launch a consultancy focused on integrating cultural aesthetics into user interfaces
    and to serve as a mentor for underrepresented designers in tech. Additionally, she aspires to speak at international UX conferences, publish thought leadership on the intersection of art, culture, and
    technology, and explore emerging interaction modalities such as voice UI and augmented reality.
