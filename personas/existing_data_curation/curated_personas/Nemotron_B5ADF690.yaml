  career_goals: In retirement, Ok Mao aims to create a lasting legacy of cultural fusion through a community art center that showcases both East Asian and Hawaiian artistic traditions. He aspires to curate
    a series of exhibitions, publish a collection of his abstract works accompanied by reflective essays on art and harmony, and develop a mentorship program for local youth interested in the arts. Additionally,
    he hopes to expand the community garden he helped establish, introducing sustainable practices and educational workshops that blend botanical knowledge with cultural storytelling.
