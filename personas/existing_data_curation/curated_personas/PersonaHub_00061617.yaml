persona_description: A scientist or researcher who specializes in the study of biodiversity and ecological systems, particularly in tropical regions. They have experience working in high-altitude environments
  and have conducted fieldwork in Cameroon. They are interested in the dynamics between different species in sympatry and the potential for niche partitioning to occur. They are familiar with the IUCN Chameleon
  Specialist Group and have read the full article on Trioceros species in Cameroon by Christopher V. Anderson and Emmanuel Van Heygen.
