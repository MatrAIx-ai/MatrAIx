personas:
  professional: Brandon Cooley is a seasoned arborist transitioning to a part‑time senior role, applying decades of tree‑trimming mastery, rope‑rigging precision, and an artist’s eye for form to mentor
    apprentices, design safety workshops, and champion the health of historic urban forests in Allegheny County.
  sports: Brandon Cooley follows the Pittsburgh Steelers with a fervent weekly ritual, enjoys occasional outings to watch the Penguins, participates in a senior‑center bowling league and a local walking
    club that tracks the Monongahela River trail, and still joins friends for friendly card games at the community center.
  arts: Brandon Cooley paints seasonal river landscapes, captures tree silhouettes in the style of Ansel Adams, volunteers to teach drawing at the public library, and regularly attends the Three Rivers
    Arts Festival where they admire works by regional artists like Andrew Wyeth and local folk musicians.
  travel: Brandon Cooley prefers weekend road trips to the Laurel Highlands, Ohiopyle State Park, and the historic Fallingwater site, dreams of a summer pilgrimage along the Appalachian Trail, and plans
    modest overseas excursions to European cities with strong Catholic heritage, all while balancing travel costs against a fixed retirement income.
  culinary: Brandon Cooley enjoys cooking Pennsylvania Dutch staples such as shoofly pie, chicken pot pie, and braised sauerkraut with bratwurst, cultivates fresh tomatoes, beans, and squash in their modest
    garden, and mixes a moderate level of culinary skill with a penchant for sharing home‑cooked meals at senior‑center potlucks.
  core: Brandon Cooley is a 71‑year‑old arborist who melds meticulous safety practices, a painter’s curiosity, community‑center camaraderie, and a love of garden‑fresh comfort foods, all while wrestling
    with occasional worries and creaky knees.
background:
  cultural: Brandon is a third‑generation White American from western Pennsylvania, born and raised in McKeesport, a community shaped by the steel and glass industries. His ancestors, primarily of Irish
    and German descent, settled in the region during the early 20th century, bringing a strong work ethic, Catholic traditions, and a deep sense of neighborhood solidarity. He grew up attending public schools,
    supporting local sports teams like the Pittsburgh Steelers, and participating in communal events such as Fourth of July parades and church gatherings. The cultural fabric of the Rust Belt—resilience,
    practicality, and modest appreciation for the arts—has influenced his values, fostering a respect for hard work, community service, and an emerging curiosity for artistic expression and environmental
    stewardship.
attributes:
  skills: '[''Tree pruning'', ''Climbing and rope rigging'', ''Arboriculture knowledge'', ''Tree disease identification'', ''Safety protocol enforcement'', ''First aid and CPR'', ''Equipment maintenance'',
