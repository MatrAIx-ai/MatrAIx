  hobbies: '[''Landscape painting'', ''Nature photography'', ''Trail walking and birdwatching'', ''Vintage tool collecting'', ''Local history and genealogy research'', ''Senior‑center arts & crafts club'',
    ''Community festivals'', ''Cooking Pennsylvania Dutch recipes'', ''Gardening'', ''Card games with friends'', ''Volunteer art instruction'']'
  career_goals: Brandon aims to transition to a part‑time senior arborist role while completing the International Society of Arboriculture (ISA) certification to formalize his expertise. He hopes to develop
    a series of safety‑training workshops for younger workers in the Allegheny County area and volunteer as a consultant for the city’s park system, ensuring the health of historic trees. He also plans
    to compile a photographic archive and memoir of the region’s urban forest, preserving both the ecological and cultural heritage of McKeesport. Ultimately, he wants to leave a legacy of stewardship,
    mentorship, and community service as he eases into a gradual retirement.
