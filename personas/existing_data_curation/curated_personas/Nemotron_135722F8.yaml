  hobbies: '[''Visiting art galleries and museums'', ''Attending community theater and open-mic events'', ''Playing drums in a local drumming circle'', ''Fishing on the Atlantic coast'', ''Coastal hiking
    and nature walks'', ''Backyard gardening and vegetable growing'', ''Volunteering at a soup kitchen'', ''Organizing fundraising events for cultural institutions'', ''Photography (seascapes and historic
    sites)'', ''Reading historical novels'', ''Cooking seafood dishes'', ''Participating in a book club'']'
  career_goals: David aims to formalize his expertise by completing a GED and earning a Certified Legal Assistant (CLA) credential within the next two years. He aspires to progress to a senior administrative
    or office manager role within his law firm, where he can lead a small team, design more efficient case-management workflows, and mentor new hires from non-traditional educational backgrounds. In parallel,
    he hopes to launch a part-time community-legal-aid liaison program that connects low-income residents of New Bedford with pro-bono legal services, leveraging his compassionate nature and local networks.
    Long-term, David envisions establishing a modest consultancy offering administrative support to local non-profits and cultural institutions, allowing him to combine his love of art with his professional
    skill set.
