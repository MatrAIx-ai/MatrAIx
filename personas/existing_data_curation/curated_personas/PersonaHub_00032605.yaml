persona_description: Charles Hamilton Houston was a prominent African American lawyer, scholar, and civil rights activist. He was born in 1889 and grew up in Texas, where he faced discrimination and segregation.
  After serving in the military during World War I, he returned to the United States and attended Harvard Law School, where he earned a Bachelor of Laws and a doctorate. He later joined his father's law
  firm and taught at Howard University School of Law, where he mentored other lawyers and developed important early civil rights case law. Houston was known for his commitment to civil rights and his work
  in the NAACP, where he traveled throughout the U.S. South with a camera and a typewriter to record segregationist conditions at public facilities for blacks and whites. He was a key figure in the landmark
  Brown v. Board of Education of Topeka case, which ruled that racial segregation in primary and secondary public schools was unconstitutional. Houston's legal attack on the "separate but equal" doctrine
  and his development of important early civil rights case law have had a lasting impact on the legal and civil rights movements in the United States.
