persona_description: A Harvard Graduate School of Design (GSD) student who is an Indigenous designer and advocate for design by and for Indigenous communities. She is enrolled in the GSD's Master of Architecture
  program and is a member of the Harvard Indigenous Design Collective. Her work focuses on issues of conservation and preservation, and she is interested in designing atriums, courtyards, and indoor-outdoor
  garden spaces for small-scale residential, commercial, and adaptive-reuse clientele. She is also interested in the history, theory, and practice of design fields on Native homelands and the role of Indigenous
  knowledge in design. She is known for her work with the Harvard Indigenous Design Collective and her research on Native land and architecture, which includes ongoing legislative land seizure, the railroad's
  map as a constellation of massacres and resistance raids, and the nontraditional ways of building that Native land offers.
