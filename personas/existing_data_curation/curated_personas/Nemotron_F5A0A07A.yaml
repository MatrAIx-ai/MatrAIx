  hobbies: '[''listening to music (soul, R&B, hip‑hop)'', ''reading science‑fiction and historical novels'', ''walking nature trails'', ''fishing'', ''DIY electronics projects'', ''video‑gaming'', ''small‑group
    board‑game nights'']'
  career_goals: Ananias aspires to move beyond his current cashier role into a supervisory position, such as shift lead or store manager, where he can apply his practical knowledge and leadership potential.
    He plans to complete an associate degree in business administration to strengthen his managerial credentials. Long‑term, he envisions opening a small, community‑focused convenience store or a boutique
    shop that blends his interest in local culture with entrepreneurial ambition. Throughout this journey, he aims to balance personal growth with a stable lifestyle that allows flexibility for his solitary
    hobbies and community ties.
