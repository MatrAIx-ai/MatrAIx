persona_description: A researcher and scientist who specializes in the study of carbon sequestration in humid tropical forests and the analysis of their biomass stock. They are particularly interested in
  the calibration of models aimed at mapping the biomass in the territorial dense forests of Central Africa, and the influence of climate on the quantities of carbon that the forests store in the region.
  They have published their findings in prestigious scientific journals such as Nature-Scientific Revue, and are known for their contributions to the compilation of data on the large surfaces of dense forests
  in Central Africa.
