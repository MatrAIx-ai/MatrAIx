personas:
  professional: Kelly Price, a budding junior scientist who delights in assembling science kits and constructing LEGO models, applies their organized, methodical nature to meticulously document experiments
    while balancing imaginative curiosity with practical problem‑solving.
  sports: Kelly Price, a member of the town’s under‑10 Saturday soccer league, enjoys kicking the ball with friends after school and cheers for the national women’s soccer team, FC Barcelona Femení, while
    maintaining a balanced fitness routine that includes weekend hikes and occasional backyard obstacle courses, reflecting their organized yet energetic approach to staying active.
  arts: Kelly Price, an avid reader of J.K. Rowling’s Harry Potter series and a budding pianist who practices scales daily, draws whimsical animals inspired by Disney’s The Lion King, and admires the storytelling
    of Pixar’s Inside Out and the music of Taylor Swift, allowing these artistic influences to fuel their imagination and provide a soothing outlet after school.
  travel: Kelly Price, who has explored the Redwood forests of California on family hikes and visited Disney World in Florida, dreams of backpacking through the castles of Europe, particularly wishing to
    see the fairy‑tale towers of Neuschwanstein in Germany, preferring trips that combine adventure, nature, and opportunities to collect new story ideas for their own books.
  culinary: Kelly Price, who loves baking vanilla cupcakes with chocolate swirl frosting topped with rainbow sprinkles alongside their mom, enjoys tasting homemade pizza with fresh basil and mozzarella,
    and is confident stirring batter but still fumbles with measuring flour, often swapping sugar for extra cocoa when they’re feeling extra creative.
  core: Kelly Price, a curious nine‑year‑old who meticulously plans LEGO builds yet sometimes leaves half‑finished science projects on the kitchen table, balances a love for nature hikes with a penchant
    for loud piano practice, and can be fiercely assertive when defending a favorite fantasy character, showing they can switch from quiet focus to bold advocacy in an instant.
background:
  cultural: Kelly grows up in a small Midwestern town in Whitehouse, Ohio, within a middle‑class white family. Her upbringing reflects typical Midwestern values of community involvement, school participation,
    and family gatherings. She attends a local public elementary school, takes part in community events like the county fair, and celebrates holidays with family traditions that emphasize togetherness and
    practicality.
