  career_goals: Mytrang aims to transition into a technology leadership role where she can shape product strategy at the intersection of software engineering and artistic expression. In the next five years
    she plans to become a Director of Engineering or VP of Product Innovation, leading multidisciplinary teams to build immersive AR/VR experiences and generative art platforms. She also aspires to mentor
    more women and under‑represented engineers, champion diversity and inclusion initiatives within the tech community, and eventually launch her own venture that combines interactive digital art with social
    impact, such as a community‑driven platform for cultural storytelling.
