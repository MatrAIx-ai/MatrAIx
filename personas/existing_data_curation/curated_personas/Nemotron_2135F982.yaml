  hobbies: '[''Abstract watercolor painting'', ''Sketching and doodling'', ''Reading magical realism novels'', ''Listening to and playing plena and salsa music'', ''Playing the cuatro'', ''Beachcombing
    and shell collecting'', ''Crafting jewelry from shells and recycled materials'', ''Experimenting with traditional Puerto Rican recipes'', ''Community gardening'', ''Mindfulness meditation'', ''Participating
    in local cultural festivals'']'
  career_goals: Anny hopes to transition from floor‑level cleaning to a supervisory role, overseeing a small team and implementing green cleaning standards across local businesses. She dreams of launching
    a side consultancy that advises property owners on sustainable, low‑toxic cleaning methods while integrating artistic touches—like custom‑painted walls or decorative recycled‑material installations—into
    the spaces she cares for. To support these ambitions, she plans to enroll in evening courses on environmental health and hospitality management, and she aims to volunteer as a mentor for youth interested
    in trades and creative arts. Ultimately, Anny wants to be recognized as a dependable leader who blends practicality with imagination, fostering harmonious work environments and contributing to the cultural
    vibrancy of Isabela.
