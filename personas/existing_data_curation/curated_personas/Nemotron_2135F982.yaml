personas:
  professional: Anny Machado, a seasoned building cleaner renowned for eco‑friendly floor care, channels their vivid imagination into inventive low‑toxicity cleaning protocols and aspires to supervise a
    green‑cleaning crew while sprinkling artistic flair—like custom‑painted walls—into commercial spaces, and they plan to lead the team with calm, empathetic guidance.
  sports: Anny Machado enjoys sunrise beach jogs along Isabela's shoreline, participates in a casual community beach‑volleyball league tied to the local club, roots for the regional soccer team, the Isabela
    Islanders, whenever they play, and they often join friends for impromptu beach soccer matches on weekends.
  arts: Anny Machado immerses themselves in artistic worlds, painting abstract watercolors inspired by the fluidity of the sea, sketching everyday scenes while humming to Celia Cruz and Tito Puente, and
    finding literary magic in contemporary magical realism by authors like Isabel Allende and Juan Gabriel Vásquez, as they occasionally perform the cuatro at local festivals.
  travel: Anny Machado prefers spontaneous weekend getaways to nearby coastal towns such as Rincon and Vieques, occasional cultural excursions to historic Old San Juan, and dreams of a creative retreat
    in Oaxaca's artisan villages to blend travel with artistic inspiration, and they often plan trips around local festivals to soak in the atmosphere.
  culinary: Anny Machado loves cooking, often reinventing classic mofongo with roasted cauliflower and plantain chips, infusing arroz con gandules with tropical mango salsa, savoring fresh coconut in sweet
    desserts, while their modest kitchen skills let them comfortably juggle a wok and a traditional wooden mortar, and they delight in sharing their experimental dishes at community potlucks.
  core: Anny Machado blends meticulous eco‑cleaning expertise with a vivid artistic soul, navigating life with calm resilience, occasional bill‑pay forgetfulness, a habit of turning stray shells into jewelry,
    and they never miss a chance to add a splash of color to a dull hallway.
background:
  cultural: Anny is a proud Puerto Rican who was raised in Isabela, a coastal municipality celebrated for its pristine beaches, surf culture, and rich Taino heritage. The town's blend of Spanish colonial
    architecture, Afro‑Caribbean rhythms, and close‑knit family values shaped her worldview. She grew up immersed in the island's music—plena, bomba, and salsa—and participates in the annual Fiestas Patronales
    and local paranda gatherings. Traditional Puerto Rican cuisine, especially dishes like arroz con gandules and lechón, is central to her family gatherings. While Spanish is her primary language, she
    learned conversational English through school and work, reflecting the bilingual reality of many island residents. Anny's cultural identity emphasizes hospitality, community harmony, resilience in the
    face of hurricanes, and a deep respect for the natural beauty of the island, all of which inform her daily life and aspirations.
attributes:
  skills: '[''Commercial cleaning'', ''Floor care (strip & wax, carpet cleaning)'', ''Minor plumbing and electrical troubleshooting'', ''Safe handling of cleaning chemicals'', ''Eco‑friendly cleaning practices'',
