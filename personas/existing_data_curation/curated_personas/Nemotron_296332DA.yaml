personas:
  professional: Katya Orozco, an aspiring junior robotics developer, channels their love for adventure and science-fiction narratives into methodical weekend projects that merge LEGO Mindstorms with basic
    Python scripts, always drafting a detailed build plan before soldering any wires, and reliably shares their prototypes with classmates during the school's STEM club.
  sports: Katya Orozco, a midfield enthusiast on the school soccer team, trains twice weekly with the local Youth Soccer Club Thunder, idolizes the MLS side Seattle Sounders FC for their disciplined play,
    and balances their love of dance by incorporating fluid footwork from the folklorico troupe into their game strategy.
  arts: Katya Orozco, a dedicated sketch artist, captures the interplay of light on neighborhood oak trees using soft-graphite, practices ukulele chords from Jake Shimabukuro's "Miyako," and brings cultural
    rhythm to life as a member of the school's folklorico dance troupe, often humming the soundtrack of their favorite sci-fi author's audiobooks while drawing.
  travel: Katya Orozco, an inquisitive traveler, spends family weekends exploring Redwood State Park's trails, dreams of visiting Tokyo's Miraikan museum to see cutting-edge robotics, and hopes to tour
    Denmark's wind-farm villages to study sustainable agriculture, all while budgeting their allowance for a future school exchange program.
  culinary: Katya Orozco, a budding home cook, harvests cherry tomatoes and basil from the family garden to stir-fry fresh vegetables with quinoa, loves making avocado toast topped with lime-zest, and treats
    themselves to cheesy quesadillas with homemade salsa after a long coding session, though they sometimes forget to clear the kitchen table before starting a new sketch.
  core: Katya Orozco, a methodical twelve-year-old who merges adventure-filled imagination with disciplined garden chores, often overplans school projects yet forgets to finish their homework until the
    final night before it's due.
background:
  cultural: Katya is raised in a Mexican-American household where Spanish is spoken alongside English, and family traditions such as Día de los Muertos, Cinco de Mayo celebrations, and making tamales are
    integral to her life. Growing up in Madera’s agricultural community, she has been exposed to farm work and community events centered around the local Hispanic population. Her Catholic upbringing and
    close-knit extended family emphasize respect for elders, communal support, and the preservation of Mexican cultural values.
attributes:
