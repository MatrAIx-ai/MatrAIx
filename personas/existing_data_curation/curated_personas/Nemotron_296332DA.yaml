  hobbies: '[''Reading adventure/science fiction'', ''Sketching/drawing'', ''Ukulele practice'', ''Folklorico dance'', ''Soccer'', ''Gardening'', ''Exploring robotics and coding tutorials'']'
  career_goals: Katya dreams of pursuing a career in civil engineering, motivated by her interest in building safe, sustainable structures that can benefit her community in Madera's agricultural region.
    She also considers becoming a bilingual teacher or community organizer to support other Mexican-American youth. Her ambition includes earning a college degree, obtaining a professional engineering license,
    and eventually contributing to projects that improve local infrastructure while preserving cultural heritage.
