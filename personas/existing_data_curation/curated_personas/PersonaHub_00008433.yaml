persona_description: A researcher or engineer who is interested in the development and application of brushless DC (BLDC) motors, particularly in battery-powered applications such as multicopters. They
  are looking for ways to optimize the performance of BLDC motors and are familiar with the trapezoidal voltage waveform used in BLDC motors. They are interested in implementing the Maximum Torque per Amp
  (MTPA) drive algorithm for such engines, which can lead to significant efficiency improvements. They are also interested in the potential benefits of this technology in reducing the size and cost of BLDC
  motors.
