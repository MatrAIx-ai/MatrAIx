  hobbies: '[''woodworking'', ''organic gardening'', ''chess'', ''reading historical biographies'', ''cooking traditional South Asian cuisine'', ''watching cricket'', ''watching American football'', ''volunteering
    at senior center'']'
  career_goals: Although currently not in the formal workforce, Richard aims to turn his woodworking hobby into a modest side business, offering custom pieces to neighbors and local patrons in Stanardsville.
    He also hopes to become a mentor for younger community members, teaching practical skills like basic home repair and gardening. In addition, he is considering obtaining a community college certification
    in horticulture to deepen his expertise and possibly volunteer as a guest instructor at the local community garden. His long‑term ambition is to leave a tangible legacy of useful, well‑crafted items
    and to share his knowledge with the next generation, satisfying both his competitive drive and his desire for purposeful contribution.
