  career_goals: Even at two years old, Samantha's play hints at future aspirations that align with her personality. She often pretends to be a teacher, lining up stuffed animals and giving them simple instructions,
    showing a desire to create organized learning environments. She also enjoys role‑playing as a police officer, emphasizing order and fairness. As she grows, she hopes to become a teacher or community
    organizer where she can establish structured routines for others, or possibly a police officer who helps maintain safety and predictability. Her competitive streak drives her to aim to be the "best"
    in any role she pursues.
