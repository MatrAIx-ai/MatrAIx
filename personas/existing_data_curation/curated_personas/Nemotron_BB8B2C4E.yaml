  hobbies: '[''Visiting art galleries and museums'', ''Sketching and digital illustration'', ''Independent film screenings'', ''Spontaneous hiking in the Sonoran Desert'', ''Weekend road trips'', ''Reading
    psychology and philosophy nonfiction'', ''Journaling'', ''Small‑group board‑games and chess'', ''Puzzle solving'', ''Mindful breathing and occasional yoga'']'
  career_goals: Sharon aims to formalize her HR knowledge by earning the SHRM‑CP certification within the next two years, positioning herself for a promotion to HR generalist and eventually HR manager.
    She is particularly interested in integrating employee‑wellness and creative‑culture programs into the workplace, hoping to design initiatives that blend her love of art with professional development.
    Long‑term, she envisions leading a people‑operations team at a midsize tech startup or a cultural institution where she can champion innovative talent strategies, flexible work policies, and inclusive
    community building. Concurrently, she hopes to complete a part‑time associate degree in business administration to broaden her strategic perspective while maintaining a healthy work‑life balance with
    her spouse.
