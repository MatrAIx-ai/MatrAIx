personas:
  professional: Sharon Gerlach, a 25-year-old HR specialist in Phoenix, leverages their talent‑acquisition expertise and budding HR analytics skills to streamline recruitment while infusing a splash of
    artistic flair into internal communications, and they battle a tendency to procrastinate on deadline‑heavy projects due to a spontaneous nature.
  sports: Sharon Gerlach, a 25-year-old Phoenix resident, enjoys weekend hikes in the Sonoran Desert and occasional rock‑climbing meet‑ups with the Arizona Outdoor Club, while cheering for the Arizona Cardinals,
    Phoenix Suns, and Arizona Diamondbacks, and they keep a relaxed yet competitively spirited outlook on sports fandom.
  arts: Sharon Gerlach, a 25-year-old art enthusiast, spends evenings sketching downtown Phoenix skylines, curating digital illustrations inspired by street‑artist Banksy and local muralist Lora Läll, attending
    indie film screenings featuring directors like Bong Joon‑ho and Greta Gerwig, vibing to the sounds of Tame Impala and The Strokes, and they draw creative energy from this multicultural artistic immersion.
  travel: Sharon Gerlach, a 25-year-old wanderer, prefers spur‑of‑the‑moment road trips to Sedona’s red rocks, weekend escapes to Tucson for its culinary festivals, and occasional international jaunts to
    Barcelona’s modernist architecture, planning only the essentials and leaving the rest to serendipity, and they thrive on the freedom of unstructured travel.
  culinary: Sharon Gerlach, a 25-year-old foodie, mixes a modest home‑cooking skill set with a love for bold flavors, frequently whipping up quinoa‑avocado bowls, grilled salmon with lemon‑dill, and Sonoran‑style
    tacos featuring carne asada and fresh cilantro, while they relish the occasional indulgence of a spicy ramen bowl from a downtown pop‑up.
  core: Sharon Gerlach, a 25-year-old curiosity‑driven HR professional, balances a love for art, spontaneous desert hikes, and a skeptical mind with bouts of anxiety, occasional procrastination, and they
    maintain an unapologetic habit of over‑curating Instagram aesthetics.
background:
  cultural: Sharon comes from a middle‑class, White American family with German‑Ancestral roots, reflected in her surname Gerlach. Raised in the Phoenix suburbs, she was exposed to a blend of traditional
    Midwestern values—emphasis on hard work, self‑reliance, and community involvement—and the multicultural, desert‑influenced lifestyle of Arizona. Family celebrations revolve around classic American holidays
    such as Thanksgiving and Christmas, often featuring a mix of German recipes like pretzels and schnitzel alongside Southwestern dishes. While she was a modest participant in a local Lutheran church during
    her youth, her adult life leans more secular, though she retains an appreciation for the communal aspects of holiday gatherings. The diverse demographics of Maricopa County have broadened her cultural
    awareness, prompting an interest in the art, cuisine, and traditions of neighboring Hispanic and Native American communities.
attributes:
  skills: '[''Talent acquisition'', ''Structured interviewing'', ''Onboarding coordination'', ''Benefits administration'', ''Arizona employment law compliance'', ''HR analytics (Excel, Google Data Studio)'',
