persona_description: A Cisco Systems engineer who specializes in implementing and configuring wireless networks based on the Lightweight EAP (LEAP) protocol. They are familiar with the requirements and
  implementation steps for setting up LEAP in a Cisco wireless environment, and have experience with the Cisco Access Control Server as the RADIUS server. They are skilled in using the Cisco Aironet Client
  utility to configure wireless clients for LEAP and have a deep understanding of the Cisco LEAP algorithm and its capabilities. They are also knowledgeable about the latest vulnerabilities in wireless
  security and how to mitigate them with LEAP.
