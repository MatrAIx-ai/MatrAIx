  hobbies: '[''Cross‑country skiing'', ''Snowboarding'', ''Hiking'', ''Fishing'', ''Drum dancing and cultural storytelling'', ''Beadwork and birch bark carving'', ''Competitive gaming (strategy/team shooters)'',
    ''Robotics club and drone building'', ''Photography (aurora, wildlife)'', ''Reading science‑fiction'']'
  career_goals: Han plans to complete a bachelor’s degree in environmental science or natural resource management, focusing on integrating traditional ecological knowledge with modern conservation practices.
    He aspires to work as a wildlife biologist or park ranger within Alaska State Parks, protecting the lands central to his heritage. Long‑term, he hopes to become a community liaison who bridges Alaska
    Native communities and state agencies, advocating for sustainable subsistence practices and environmental stewardship. Additionally, he nurtures a personal ambition to compete in regional eSports tournaments,
    leveraging his strategic mindset.
