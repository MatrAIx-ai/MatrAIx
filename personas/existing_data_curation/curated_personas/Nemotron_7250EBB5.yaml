personas:
  professional: Han Saddy, a 19‑year‑old environmental science student, merges foundational GIS mapping and data collection with traditional ecological knowledge, and their critical, competitive nature
    pushes them to lead collaborative field projects and community outreach initiatives that bridge modern conservation with Indigenous stewardship.
  sports: Han Saddy embraces winter sports by competing with the university’s Nordic skiing team and snowboarding with the Fairbanks Snow Club, follows the Seattle Kraken and the Seattle Seahawks for professional
    inspiration, spends weekends fishing on local rivers, and balances regular strength‑training sessions to stay fit for both outdoor pursuits and competitive eSports.
  arts: Han Saddy blends creative expression through beadwork and birch bark carving inspired by contemporary Indigenous craft, captures aurora borealis with a camera influenced by Ansel Adams and Jimmy
    Chin, enjoys the folk harmonies of Fleet Foxes and the cinematic scores of Hans Zimmer, and regularly participates in drum dancing circles and storytelling gatherings that keep cultural narratives alive.
  travel: Han Saddy favors nature‑centric, spontaneous travel, having backpacked through Denali National Park, snowboarded in Hokkaido, Japan, and set sights on trekking Patagonia’s Torres del Paine, all
    while juggling a modest student budget and a preference for rugged, off‑the‑beaten‑path experiences over luxury resorts.
  culinary: Han Saddy delights in cooking wild‑caught salmon on cedar planks with dill and lemon, prepares hearty cloudberry‑infused reindeer stew during cold evenings, but frequently defaults to instant
    ramen and sugary energy drinks during marathon gaming sessions, and they love sampling local craft beers at campus gatherings.
  core: Han Saddy is a fiercely competitive, tech‑savvy outdoor enthusiast who fuses traditional craft skills with modern environmental science, while juggling late‑night gaming, a modest budget, and a
    relentless curiosity.
background:
  cultural: Han is a member of the Koyukon Athabaskan people, an Alaska Native group whose traditional territories span the interior of Alaska, including the Fairbanks area. He grew up hearing stories in
    his grandparents' language and learning subsistence practices such as caribou hunting, salmon fishing, and seasonal gathering. He regularly attends gatherings at the Alaska Native Heritage Center and
    participates in community workshops that preserve traditional crafts and knowledge. While pursuing his education, Han balances modern academic pursuits with deep respect for his cultural heritage, often
    integrating Indigenous perspectives into his studies and future career aspirations.
attributes:
  skills: '[''Basic computer literacy (Word, Excel, social media)'', ''Data collection and entry'', ''Introductory GIS mapping'', ''Outdoor survival skills (navigation, shelter building, fishing)'', ''Traditional
