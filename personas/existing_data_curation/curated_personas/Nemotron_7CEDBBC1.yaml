personas:
  professional: A data-driven registered nurse, Sandra Wong leverages their expertise in patient assessment, IV therapy, and wound care while championing health informatics initiatives - optimizing electronic
    health records and integrating medical devices - to develop evidence-based protocols, aspire to a Clinical Nurse Specialist role, and ultimately transition into health-technology consulting, and they
    approach each project with a blend of curiosity and practicality.
  sports: On the fitness front, Sandra Wong practices sunrise yoga on Fort Lauderdale's beach, swims competitively with the Fort Lauderdale Aquatic Club, joins weekend beach-volleyball pick-ups, and roots
    for the Miami Heat in the NBA, the Miami Marlins in MLB, and the Florida Panthers in the NHL, and they view each training session as both a mental reset and a subtle competition with themselves.
  arts: Creatively, Sandra Wong captures the vivid hues of the Atlantic in digital HDR photographs inspired by Trey Ratcliff, discusses contemporary fiction - favoring authors such as Haruki Murakami and
    Sally Rooney - in their intimate book club, and unwinds to the smooth sounds of Sade and the intricate melodies of Radiohead, and they often use these artistic pursuits to recharge after demanding nursing
    shifts.
  travel: When it comes to travel, Sandra Wong meticulously plans solo weekend getaways using credit-card points - having already explored the Everglades, Key West, the Bahamas, Montreal, and New Orleans
    - while dreaming of immersive trips to Iceland's geothermal landscapes and Japan's culinary capitals, and they balance adventure with cost-effectiveness by seeking off-season deals and staying in boutique
    guesthouses.
  culinary: In the kitchen, Sandra Wong experiments with Southern-Asian fusion - crafting dishes like kimchi-infused collard greens, jerk-chicken ramen, and sweet-potato sushi rolls that marry gochujang,
    smoked paprika, and black-eyed peas - though their meticulous plating often gives way to a chaotic countertop and a lingering habit of leaving dishes unwashed for a day, and they view each culinary
    mishap as a data point for future improvement.
  core: Sandra Wong blends clinical precision with data curiosity, navigating life with disciplined ambition, solitary introspection, and a competitive edge that fuels both their nursing career and their
    eclectic hobbies, and they constantly balance curiosity with practicality.
background:
  cultural: Sandra comes from a mixed Afro‑Asian heritage; her mother is African‑American and her father is of Chinese descent. Growing up in Fort Lauderdale, she was immersed in the vibrant Black community
    of Broward County while also celebrating Chinese traditions at home, such as Lunar New Year festivities and Mandarin language lessons. This bicultural upbringing fosters a strong sense of resilience,
    educational ambition, and community service, shaping her culturally sensitive approach to patient care and her inclusive worldview.
