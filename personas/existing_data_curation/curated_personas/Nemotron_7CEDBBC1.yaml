  hobbies: '[''Reading scientific journals'', ''Contemporary fiction'', ''Yoga'', ''Swimming'', ''Cooking fusion cuisine'', ''Small book club participation'', ''Volunteering at community health fairs'',
    ''Digital photography'']'
  career_goals: Sandra aims to combine her clinical expertise with her passion for data‑driven healthcare. Over the next five years she plans to earn a master’s degree in Nursing Informatics and obtain
    certification as a Clinical Nurse Specialist. She aspires to lead a unit as a charge nurse, develop evidence‑based protocols that improve patient outcomes, and eventually transition into a health‑technology
    consulting role where she can design and implement informatics solutions for hospitals in South Florida. Her competitive drive pushes her to seek leadership positions and contribute to research projects
    published in peer‑reviewed journals.
