personas:
  professional: Lorna Glisson, a senior systems engineer who excels at advanced CAD modeling, finite element analysis, and Lean Six Sigma-driven process optimization, channels their preference for structure
    and predictability into orchestrating multidisciplinary teams that consistently deliver complex projects on schedule and within budget.
  sports: Lorna Glisson, an avid hiker of the Eno River Trail and member of the Triangle Hiking Club, supplements her outdoor pursuits with weekly yoga sessions, follows the Carolina Panthers and Durham
    Bulls religiously, and occasionally joins a local running group for 5K races, balancing structured fitness routines with seasonal outdoor adventures.
  arts: Lorna Glisson, a dedicated community choir singer who occasionally practices piano pieces by Chopin and enjoys the folk storytelling of Joni Mitchell, enriches her cultural life by attending performances
    of August Wilson's plays and reading biographies of figures like Margaret Thatcher and contemporary nonfiction by Malcolm Gladwell.
  travel: Lorna Glisson, a methodical planner who maps out each itinerary with detailed checklists, has hiked the Blue Ridge Parkway and ventured to Iceland's geothermal wonders, and now dreams of cycling
    the Swiss Alps and exploring the historic villages of the Cotswolds, balancing structured travel logistics with occasional spontaneous stops at local farms.
  culinary: Lorna Glisson, whose cooking skill is advanced, loves crafting farm‑to‑table meals such as heirloom tomato and basil bruschetta, herb‑crusted salmon with local sorghum glaze, and roasted beet
    and goat cheese salad, and sources ingredients like heirloom corn, wild mushrooms, and locally harvested honey, while occasionally indulging in a splurge on a chef’s tasting menu at the famed ‘The Cowfish’
    in Durham.
  core: Lorna Glisson, a disciplined engineer with a green thumb, balances precise project leadership with spontaneous hikes, community choir harmonies, and a penchant for meticulous budgeting and garden‑to‑table
    cooking, all while occasionally letting a piano riff linger longer than intended.
background:
  cultural: Lorna grew up in a middle‑class White American family in the Midwest, where a strong emphasis on education, self‑reliance, and community service shaped her values. Relocating to Durham for graduate
    school immersed her in the vibrant research and tech culture of the Research Triangle, reinforcing her collaborative and cooperative nature. She identifies with both her Midwestern roots—practicality,
    punctuality, and a love for open spaces—and the progressive, inclusive ethos of her current community, participating in local church activities, neighborhood associations, and regional sustainability
    initiatives.
attributes:
  skills: '[''Systems Engineering'', ''Mechanical Design'', ''CAD (SolidWorks, AutoCAD)'', ''Finite Element Analysis'', ''Data Analysis'', ''Lean Six Sigma'', ''Project Management'', ''Regulatory Compliance'',
    ''Team Leadership'', ''Mentoring'', ''Stakeholder Communication'']'
  hobbies: '[''Hiking'', ''Gardening'', ''Cooking'', ''Reading (Historical Biographies, Non‑fiction)'', ''STEM Volunteering'', ''Community Choir'', ''Piano'']'
  career_goals: Lorna aims to transition into an engineering leadership role where she can shape strategic initiatives for sustainable infrastructure within the Research Triangle Park. Over the next five
    years, she plans to obtain a Professional Engineer (PE) license, lead a cross-disciplinary team on a large-scale renewable energy project, and develop a mentorship program for underrepresented students
    in STEM. She also aspires to influence regional policy on green building standards and eventually establish her own consultancy focused on energy‑efficient design.
