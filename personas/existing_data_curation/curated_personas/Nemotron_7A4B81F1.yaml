  hobbies: '[''Gardening (vegetables and native flowers)'', ''Quilting and crocheting'', ''Attending local theater productions'', ''Church choir singing'', ''Reading African‑American history'', ''Cooking
    soul‑food recipes'', ''Walking with her dog'', ''Community event photography'', ''Volunteer tutoring at the senior center'', ''Participating in community art workshops'']'
  career_goals: Philomina aims to formalize her expertise in workplace safety by completing an OSHA Outreach Trainer certification within the next year, positioning herself as the plant’s safety mentor.
    She also hopes to transition gradually to part‑time work while launching a home‑based quilting studio, selling hand‑crafted blankets and teaching a weekly craft circle at the Apex senior center. Her
    longer‑term ambition is to blend her production knowledge with her love of the arts to develop a community mentorship program that pairs seasoned workers with younger apprentices, fostering both technical
    skill and creative expression.
