  career_goals: Socorro aims to deepen her impact in the local community by leading a senior wellness program at the community center and mentoring younger volunteers. She plans to obtain a volunteer health
    navigator certification to better assist seniors with medical and insurance matters. Additionally, she wishes to expand her digital literacy, master social media tools for community outreach, and organize
    a series of local history workshops that blend her curiosity for new ideas with her love for tradition.
