personas:
  professional: Socorro Swift, a 66‑year‑old community health advocate, harnesses her robust organizational talent and warm mediation style to design senior wellness programs, manage volunteer budgets,
    and launch social‑media outreach, all while methodically testing new health‑tech tools against proven practices because they value both curiosity and reliability.
  sports: Socorro Swift enjoys low‑impact fitness through water aerobics at the local community center, joins seasonal line‑dancing classes, walks her Labrador along the Patapsco River Trail, and cheers
    for the Baltimore Ravens and Orioles, because they blend active routine with community‑spirit fandom.
  arts: Socorro Swift participates in a lively book club that discusses works by Toni Morrison and Margaret Atwood, attends Baltimore Symphony Orchestra performances featuring Beethoven, and volunteers
    at the annual Artscape Festival where they often spot folk singer Rhiannon Giddens, weaving literature, music, and knitting into their creative life.
  travel: Socorro Swift meticulously plans weekend excursions to historic Baltimore County sites such as the Ladew Topiary Garden and the B&O Railroad Museum, has taken day trips to Washington, D.C.’s museums,
    dreams of a heritage tour of ancestral villages in Ireland, and prefers traveling with her dog on pet‑friendly train routes whenever they can fit the budget.
  culinary: Socorro Swift delights in baking double‑crust apple‑cinnamon pie and peach cobbler for neighborhood gatherings, whips up herb‑infused grilled chicken using garden‑fresh rosemary, basil, and
    thyme, and occasionally over‑seasones her dishes when stress creeps in, yet they always share the extra servings with friends.
  core: Socorro Swift is an organized, community‑focused senior who balances meticulous event planning with a gentle worry‑driven habit of double‑checking details, all while knitting scarves, tending herbs,
    and humming line‑dance steps during garden work, because they cherish structure and social connection.
background:
  cultural: Socorro was born and raised in the Mid-Atlantic region, primarily Maryland, within a family of Irish and German ancestry who adopted the Spanish name 'Socorro' as a nod to multicultural heritage.
    Growing up in a post‑war Baby Boomer household, she attended a public high school and has spent most of her adult life in suburban Baltimore County. Her cultural identity blends traditional American
    values—community service, church involvement (active in a local Methodist congregation), and regional traditions like Chesapeake Bay seafood cuisine—with an openness to diverse cultures cultivated through
    her genealogy pursuits and local multicultural festivals.
