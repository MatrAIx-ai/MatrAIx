personas:
  professional: Tammie McCartney, an aspiring young author and budding Scratch programmer, blends vivid imagination with meticulous organization to craft intricate short stories and whimsical interactive
    games, all while they channel their energy into solitary creation.
  sports: Tammie McCartney, a member of the community center swim team, enjoys weekly nature hikes through the local wetlands, cheerfully follows the New Orleans Pelicans during basketball season, and prefers
    gentle, low‑impact activities over competitive team sports, and they find comfort in solo exercise routines.
  arts: Tammie McCartney immerses themselves in watercolor landscapes inspired by Claude Monet, practices piano works by Ludovico Einaudi, and reads fantasy novels by J.K. Rowling, allowing these artistic
    influences to shape they own storytelling and creative expression.
  travel: Tammie McCartney, who prefers tranquil getaways over crowded amusement parks, often explores the nearby bayou and Everglades National Park, and they dream of sailing to the Galápagos Islands to
    study unique wildlife up close.
  culinary: Tammie McCartney, an eager beginner in the kitchen, loves making buttery grilled cheese sandwiches with sharp cheddar and fresh strawberry slices, while experimenting with simple sushi rolls
    filled with avocado and cucumber, and they always add a pinch of sea salt to remind them of collected shells.
  core: Tammie McCartney balances a vivid inner world of magical stories and detailed LEGO constructions with a tendency to lose track of bedtime after a captivating reading session, and they demonstrate
    relentless curiosity and a gentle, solitary spirit.
background:
  cultural: Tammie grew up in Gonzales, a small city in Ascension Parish known for its Cajun heritage and annual Jambalaya Festival. Her family has lived in the region for generations, and she participates
    in community celebrations like Mardi Gras and local parades, where zydeco music and Creole cuisine are common. Attending a local public elementary school, she enjoys the close‑knit atmosphere of her
    neighbourhood and the warm hospitality typical of southern Louisiana. The surrounding bayous and wetlands have fostered her appreciation for nature, while the blend of French‑Acadian and Southern American
    traditions subtly shapes her worldview.
