  career_goals: While still young, Tammie dreams of turning her love for art and storytelling into a career as a children's book illustrator, where she can share gentle, imaginative worlds. She also imagines
    exploring space as an astronaut or studying marine life in the Gulf of Mexico to protect the local environment. Ultimately, she hopes to create works that inspire kindness and curiosity, combining her
    artistic talent with her desire to help others understand the natural world.
