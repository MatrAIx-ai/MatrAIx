  career_goals: Alexandra aims to pursue a graduate degree in bioinformatics or data science, with the long-term goal of leading research projects that develop predictive tools for mental-health outcomes.
    She envisions working in a research institute or biotech company where she can combine her analytical expertise with her personal interest in mental-well-being. In the next five years, she plans to
    publish peer-reviewed papers, secure a research fellowship, and eventually transition into a senior scientist role that balances independent inquiry with collaborative teamwork. Alongside professional
    advancement, she seeks a career path that offers structured support for mental health, allowing her to thrive while contributing to evidence-based interventions.
