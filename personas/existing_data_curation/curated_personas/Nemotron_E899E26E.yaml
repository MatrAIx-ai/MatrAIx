personas:
  professional: Janet Ashworth is a budding visual storyteller who blends charcoal, watercolor, and mixed media to capture the New Hartford woods, applying her natural curiosity and meticulous organization
    to turn school projects into miniature art exhibitions.
  sports: Janet Ashworth rides a mountain bike with the New Hartford Little Cyclists Club on weekend trail rides, cheers for the Buffalo Bills on Sundays, and joins the school’s track team to practice the
    400‑meter dash, balancing a love for endurance with a relaxed approach to competition.
  arts: Janet Ashworth draws inspiration from the ethereal landscapes of Emily Carr and the bold colors of Vincent van Gogh, frequently attending the Oneida County Historical Museum and the local art gallery,
    while humming along to Taylor Swift and reciting Robert Frost poems during her after‑school crafts volunteering.
  travel: Janet Ashworth prefers nature‑focused getaways, having explored the Adirondack High Peaks and family trips to Niagara Falls, and dreams of hiking the Appalachian Trail and visiting the vibrant
    streets of Montreal for its outdoor art festivals.
  culinary: Janet Ashworth enjoys experimenting with simple recipes like blueberry muffins, rainbow pasta salads, and homemade pizza topped with fresh basil, yet often forgets to clean the kitchen counter
    after cooking, leading to a perpetual sticky surface that fuels their creative imagination.
  core: Janet Ashworth is a curious twelve‑year‑old artist who balances sketching, cycling, and a love for nature with a habit of hoarding art supplies and a knack for turning everyday moments into vivid
    stories.
background:
  cultural: Janet grows up in a middle‑class family of European ancestry in the small town of New Hartford, Oneida County, New York. Her household values education, community involvement, and outdoor recreation.
    Family traditions include celebrating Thanksgiving, the Fourth of July fireworks, and the annual town fair, where local crafts and music are featured. Though primarily secular, occasional church attendance
    with extended relatives reflects a gentle religious heritage. The community’s proximity to the Mohawk River and the region’s agricultural roots expose her to a blend of suburban American culture and
    the historical influences of the area, fostering an appreciation for both local history and contemporary creativity.
