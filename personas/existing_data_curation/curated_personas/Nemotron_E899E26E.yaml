  career_goals: Janet hopes to turn her love of art and desire to help others into a career that blends both. She imagines becoming a pediatric art therapist, using creative activities to support children's
    emotional well‑being, or a museum educator who designs inclusive programs for young visitors. She is also drawn to environmental education, dreaming of leading community projects that combine storytelling
    with conservation. In the near future, she plans to deepen her artistic techniques, volunteer more at the local library's reading program, and participate in science fairs focused on ecology.
