  hobbies: '[''Cooking traditional Salvadoran dishes'', ''Gardening herbs and vegetables'', ''Folk dancing (cumbia and salsa)'', ''Quilting'', ''Volunteering at local community center'', ''Reading historical
    fiction'', ''Walking in Hudson County parks'', ''Listening to Latin music'']'
  career_goals: While she values the stability of her current role, Mariana aims to transition into a supervisory or quality‑assurance position within the next two years. She plans to earn a Certified Food
    Safety Professional (CFSP) credential and to lead a small team focused on lean‑manufacturing initiatives. Long‑term, she hopes to mentor younger Salvadoran workers in the industry and later, after retirement,
    to share her expertise through community workshops that teach safe home‑cooking techniques and basic food‑preservation methods.
