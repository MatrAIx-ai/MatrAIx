personas:
  professional: Loretta Mcneill is a seasoned radiologic technologist who leverages deep technical proficiency in X‑ray, fluoroscopy, and CT imaging—alongside emerging MRI knowledge—to mentor staff, champion
    patient safety through meticulous dose optimization, and steer workflow improvements, and they are actively pursuing a supervisory role that blends clinical leadership with community health outreach.
  sports: Loretta Mcneill stays active by walking with the Cherokee Trail Walkers club and playing casual pickleball at the community center, and they passionately support the Atlanta Falcons in football
    season and the Atlanta Braves during summer baseball, reflecting a balanced enthusiasm for both personal fitness and regional sports fandom.
  arts: Loretta Mcneill nurtures her artistic side by singing gospel classics by Mahalia Jackson in her church choir, devouring the prose of Maya Angelou and Toni Morrison, quilting intricate patterns inspired
    by traditional motifs, and they attend local theater productions featuring Viola Davis, all of which enrich her cultural appreciation and creative expression.
  travel: Loretta Mcneill favors relaxed, nature‑focused road trips, having taken weekend escapes to the Great Smoky Mountains and historic Savannah, and they dream of a future journey along California’s
    Pacific Coast Highway to experience its dramatic seaside cliffs.
  culinary: Loretta Mcneill, a confident home cook, delights in preparing soulful Southern dishes such as perfectly fried chicken, collard greens simmered with smoked ham hocks, and peach cobbler—often
    using fresh garden okra, heirloom tomatoes, and locally sourced pecans—while they love sharing these meals at potluck gatherings with friends and neighbors.
  core: Loretta Mcneill blends a meticulous radiology career with a tranquil garden sanctuary, humming gospel hymns while calibrating CT scanners, and despite their disciplined budgeting, they sometimes
    over‑water their tomatoes, embodying a gentle balance of precision and soulful generosity.
background:
  cultural: Loretta identifies as African‑American with deep Southern heritage, growing up in a close‑knit Black community in Georgia where church, family, and collective resilience were central pillars.
    Her upbringing instilled a strong sense of community service, respect for elders, and an appreciation for storytelling traditions that celebrate Black history and culture. Participation in gospel music,
    soul food cooking, and annual cultural festivals reinforced her connection to African‑American artistic expressions. Through her education in the humanities, she explored African‑American literature
    and history, which informed her worldview and commitment to cultural competence in healthcare. Loretta's cultural identity shapes her compassionate patient care, her dedication to mentorship, and her
    active engagement in local initiatives that empower and uplift her community.
attributes:
  skills: '["Radiographic imaging (X‑ray, fluoroscopy)", "Computed Tomography (CT) operation", "Magnetic Resonance Imaging (MRI) basics", "Radiation safety and dose optimization", "Patient education and
    compassionate communication", "Quality control and equipment troubleshooting", "Healthcare documentation and regulatory compliance", "Team collaboration and shift coordination", "Mentoring and staff
    development", "Continuing education and protocol innovation"]'
  hobbies: '["Gardening (vegetable and flower beds)", "Reading African‑American literature and poetry", "Singing in the church gospel choir", "Volunteering at community health fairs", "Quilting and handmade
    crafts", "Cooking Southern soul food", "Walking the Cherokee Trail", "Bird‑watching and nature appreciation"]'
  career_goals: Loretta aims to advance to a supervisory or lead technologist role within her radiology department, leveraging her experience to shape workflow standards and mentor the next generation of
    technologists. She plans to obtain full certification in advanced CT and MRI modalities to broaden her clinical expertise. Over the next few years, she hopes to spearhead community health‑screening
    initiatives that combine her technical knowledge with her passion for health education, particularly addressing radiology awareness in underserved neighborhoods. Long‑term, Loretta is interested in
    pursuing a master's degree in health administration or a related field to transition into a managerial position that influences departmental strategy and patient‑centered care policies, while preparing
    for a graceful phased retirement that leaves a strong legacy of professionalism and compassion.
