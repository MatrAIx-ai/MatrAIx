personas:
  professional: Aracelis Cortez is a 12‑year‑old aspiring wildlife illustrator and comic‑strip creator who converts her curiosity about local insects and fields into detailed watercolors and storyboards,
    while her relaxed attitude toward deadlines and occasional disorganization lead her to juggle school assignments and artistic projects, and they often shift between sketchbooks and Minecraft level design
    using practical drawing techniques learned from family traditions.
  sports: Aracelis Cortez plays midfield for her local Ceres youth soccer team, enjoying the camaraderie and sprinting across the fields while sometimes feeling nervous in competitive matches, and they
    root for the San Jose Earthquakes, regularly watching games with friends after practice.
  arts: Aracelis Cortez immerses herself in drawing vibrant comic strips inspired by Studio Ghibli’s Hayao Miyazaki, Jeff Smith’s 'Bone' series, and the music of Carlos Rivera, blending these influences
    into watercolors of local wildlife and using Minecraft as a canvas for storytelling, while they often lose track of time sketching in a notebook.
  travel: Aracelis Cortez loves weekend road trips to nearby Yosemite National Park and the historic town of Mariposa, where they sketch waterfalls and wildlife, and they dream of exploring Mexico City’s
    bustling markets and the ancient ruins of Teotihuacan, preferring family‑oriented itineraries that balance adventure with familiar comfort.
  culinary: Aracelis Cortez delights in helping her grandparents make tamales de pollo, preparing fresh salsa with jalapeños, cilantro, and lime, and experimenting with mole sauces, while they also enjoy
    snacking on fresh mango slices and corn on the cob, yet they sometimes forget to brush their teeth after sugary treats.
  core: Aracelis Cortez is a creatively curious, slightly disorganized pre‑teen who navigates intense emotions through art, soccer, and family traditions, and they often juggle anxiety with a resilient,
    community‑focused outlook.
background:
  cultural: Aracelis is a Mexican‑American growing up in Ceres, a city in California’s Central Valley with deep agricultural roots. Her family maintains strong ties to Mexican culture, speaking Spanish
    at home, celebrating holidays like Día de los Muertos and Las Posadas, and preserving culinary traditions such as making tamales and mole with her grandparents. The community’s emphasis on familismo
    and respeto influences her sense of responsibility toward family and friends. At school, she navigates a multicultural environment, bridging her heritage with the diverse student body of Stanislaus
    County. These cultural experiences shape her values of community support, resilience, and pride in her bilingual identity.
attributes:
  skills: '["Bilingual communication (English & Spanish)", "Basic Scratch programming and digital storytelling", "Creative drawing and illustration", "Comic‑strip creation and storytelling", "Basic cooking
    of traditional Mexican dishes", "Team collaboration and peer mentoring", "Empathy and active listening", "Journaling for emotional self‑regulation"]'
  hobbies: '["Drawing and watercolor painting", "Comic‑strip creation", "Exploring nature and sketching wildlife", "Playing soccer", "Cooking traditional Mexican dishes", "Listening to music (regional Mexican,
    pop)", "Minecraft level design", "Journaling", "Reading fantasy literature", "Girl Scouts activities (crafts, community service)"]'
  career_goals: In the short term, Aracelis wants to improve her science grades, take on a leadership role in her school's environmental club, and keep expanding her art portfolio. Long‑term, she dreams
    of becoming a wildlife veterinarian or conservation biologist so she can combine her love of animals, nature, and hands‑on problem solving. She also hopes to develop an outreach program that uses art
    and storytelling to help peers manage anxiety and stress, turning her own emotional experiences into supportive community work.
