  hobbies: '[''Reading (historical nonfiction, classic literature)'', ''Journaling'', ''Birdwatching'', ''Nature walks'', ''Knitting'', ''Puzzle solving (crosswords, Sudoku)'', ''Landscape photography'',
    ''Transportation podcasts'', ''Visiting historic train stations'']'
  career_goals: Rebecca aims to progress within the transit authority by becoming a senior driver trainer or a safety officer, where she can mentor new drivers and help improve safety standards. She plans
    to complete her bachelor’s degree in Transportation Management, leveraging her practical experience to contribute to route‑optimization projects. Additionally, she hopes to lead community outreach programs
    that promote safe public transit usage and eventually transition into a supervisory role overseeing a fleet of drivers.
