persona_description: A college instructor who is passionate about helping students develop resilience skills through personalized, engaging resilience education. They are experienced in conducting resilience
  education with students and have a deep understanding of the benefits of teaching resilience skills in college. They are dedicated to ensuring that students develop the skills necessary to handle the
  challenges they encounter at college and ultimately be more prepared for their futures. They are skilled in incorporating a range of instructional elements, including online self-reflection questionnaires,
  practice activities, and personalized reports, to provide students with the tools they need to succeed in college. They are committed to conducting evaluations that show the significant benefits of the
  curriculum to students, including satisfaction with the overall course experience, interest in participating in the curriculum, and use of the skills learned.
