  career_goals: She aims to transition from a cashier to a supervisory or operations analyst role, acquiring certifications such as CompTIA A+ and a certificate in data analytics. Over the next three years
    she plans to lead a store team, improve operational efficiency through data‑driven decisions, and eventually move into an e‑commerce logistics position that blends her analytical training with retail
    experience. Financial stability and a predictable schedule are important to manage stress, while her competitive nature drives her to exceed performance targets.
