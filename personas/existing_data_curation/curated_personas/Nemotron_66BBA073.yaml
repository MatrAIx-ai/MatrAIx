    planning'', ''Team leadership'']'
  hobbies: '[''Gardening'', ''Woodworking'', ''Birdwatching'', ''Nature photography'', ''Guided meditation'', ''Journaling'', ''Reading business and self‑help books'', ''Hiking'', ''Fishing'', ''Cooking
    Southern cuisine'', ''Church community service'']'
  career_goals: Marcus aims to progress from caretaker to senior animal‑care manager, eventually overseeing a regional wildlife sanctuary that integrates rigorous business practices with compassionate animal
    welfare. He plans to develop standardized, data‑driven care protocols that reduce uncertainty and support his need for structure while improving animal outcomes. Leveraging his business acumen, he aspires
    to secure sustainable funding streams, achieve accreditation, and create a mentorship program for new caretakers. Recognizing his own emotional reactivity, he also hopes to champion mental‑health resources
    for staff, establishing routine debriefings and resilience training to foster a stable, supportive workplace.
