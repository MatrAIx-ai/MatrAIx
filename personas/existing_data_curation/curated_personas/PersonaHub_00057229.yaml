persona_description: A researcher who studies the relationship between sleep duration and body weight, specifically focusing on the genetic and environmental factors that contribute to obesity. The individual
  is likely to be a sleep researcher or a sleep scientist, with a background in genetics, behavioral genetics, or related fields. They are interested in understanding the impact of short sleep on the expression
  of genes associated with obesity and how sleep duration affects the heritability of body weight. The researcher may also be interested in the use of behavioral genetic interaction models to analyze the
  relationship between sleep duration and BMI.
