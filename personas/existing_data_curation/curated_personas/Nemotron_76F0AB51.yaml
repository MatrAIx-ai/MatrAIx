  hobbies: '[''Watercolor painting'', ''Reading Latin American literature and poetry'', ''Cooking Venezuelan cuisine'', ''Herb gardening'', ''Walking nature trails'', ''Genealogy research'', ''Attending
    a small book club'', ''Volunteering at community arts programs'']'
  career_goals: Although retired, Mercedes aims to launch a series of community art workshops at the local cultural center, focusing on Venezuelan techniques and contemporary expression. She hopes to author
    a memoir that intertwines her personal journey with the story of Venezuelan diaspora in the American South. Additionally, she plans to volunteer as a docent at the county museum, develop an exhibit
    highlighting Latin American immigrant artists, and pursue a certificate in art therapy to support seniors through creative activities. Her overarching ambition is to serve as a cultural bridge, preserving
    her heritage while enriching the local arts scene.
