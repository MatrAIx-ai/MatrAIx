persona_description: A veterinarian who specializes in diagnosing and treating skin tumors in dogs and cats. They have extensive knowledge and experience in diagnosing lipomas (fatty tumors) and have a
  keen eye for distinguishing between benign and malignant tumors. They are skilled in using needle biopsies and surgical biopsies to diagnose the type of tumor and the stage of the disease. They are also
  knowledgeable in the use of preservatives and electron microscopes to prepare and analyze tissue samples.
