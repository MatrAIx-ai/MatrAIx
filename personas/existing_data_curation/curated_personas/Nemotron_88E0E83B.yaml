  career_goals: John aims to step into a store manager role within the next two years, leveraging his practical experience and leadership skills. After gaining managerial experience, he hopes to advance
    to a district manager position overseeing multiple locations in the Central Florida region. Long‑term, he envisions opening his own boutique that emphasizes sustainable apparel and locally sourced crafts.
    To support these ambitions, he plans to earn a Retail Management Certificate and explore an associate degree in business administration.
