personas:
  professional: Alison Simonds, a budding graphic design hopeful, blends self‑taught illustration skills and empathetic listening to craft visual stories that foster mental‑health awareness, while their
    preference for flexible schedules often leads to last‑minute project crunches.
  sports: Alison Simonds enjoys leisurely runs through Cincinnati’s Eden Park, follows the Cincinnati Bengals for football, and occasionally attends beginner’s yoga classes at the local community center,
    preferring low‑impact activities that allow them time for reflection over competitive sports.
  arts: Alison Simonds spends evenings sketching in a well‑worn notebook, experimenting with watercolor inspired by Agnes Martin’s subtle palettes, listening to Sufjan Stevens’s indie folk, and performing
    at monthly open‑mic poetry nights where they cite Hayao Miyazaki’s visual storytelling as a key influence.
  travel: Alison Simonds favors slow, introspective travel, spending weekends wandering the historic streets of Savannah, Georgia, taking day‑trip hikes in the Indiana Dunes to photograph shoreline textures,
    and dreaming of an art‑focused retreat in the Scottish Highlands, where they always carry a sketchbook for spontaneous drawing.
  culinary: Alison Simonds, an aspiring home cook, gravitates toward comforting vegetarian dishes such as roasted beet and goat‑cheese salads, fresh basil pesto pasta, and experimental matcha lattes, often
    improvising with seasonal produce from the local farmers’ market, yet they habitually forget to refrigerate leftovers, leading to occasional waste.
  core: Alison Simonds, a creatively driven yet chronically disorganized 17‑year‑old, channels deep empathy into art and poetry while they battle persistent worry and a habit of procrastinating on schoolwork.
background:
  cultural: Alison was raised in a middle‑class White family in Cincinnati’s suburban neighborhoods. Her upbringing reflects Midwestern values of modesty, community involvement, and a respect for personal
    space. She has attended local cultural events such as the Cincinnati Art Museum’s family programs and the annual Oktoberfest celebration, which reflect the city’s blend of German heritage and contemporary
    arts. Her family’s cultural background includes Irish and German ancestry, and she grew up with occasional exposure to Protestant traditions, though her personal identity is more shaped by the inclusive,
    arts‑focused community around her.
