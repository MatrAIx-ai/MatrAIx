  career_goals: Alison aims to complete her high‑school equivalency (GED) within the next two years and enroll in a community‑college program focused on graphic design or art therapy. She hopes to combine
    her artistic talent with her compassion by creating visual materials that raise awareness about mental‑health issues. Long‑term, she envisions working for a non‑profit organization that supports youth
    mental health, or running a freelance illustration studio that collaborates with therapists and educators.
