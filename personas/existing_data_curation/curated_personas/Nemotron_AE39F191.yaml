personas:
  professional: Alexander Estrada, a 32‑year‑old retail leader with a STEM background, blends analytical rigor with a flair for visual storytelling, using Tableau to turn sales data into vibrant merchandising
    concepts while coaching bilingual teams to exceed targets, and they plan to leverage an upcoming MBA to launch a flagship store that doubles as a gallery for emerging community artists.
  sports: Alexander Estrada, an avid hiker of the Santa Barbara coastal trails and a regular participant in the local surf club, follows the Los Angeles Dodgers in baseball and the LA Lakers in basketball,
    while they squeeze in weekend pickup soccer games with friends as part of their balanced fitness routine.
  arts: Alexander Estrada, who spends evenings photographing vibrant street murals and creating digital collages inspired by Frida Kahlo and Banksy, also plays acoustic guitar in a small group covering
    John Mayer and Jack Johnson, and they regularly attend gallery openings featuring emerging community artists.
  travel: Alexander Estrada, a meticulous planner who maps out trips with a blend of spreadsheets and wander‑lust podcasts, has hiked the Pacific Coast Trail in Oregon, explored the historic plazas of Oaxaca,
    and dreams of a road‑trip through the wine regions of Chile and a cultural immersion in Kyoto, balancing family visits and solo retreats.
  culinary: Alexander Estrada, a confident home chef who blends tradition with modern flair, frequently prepares mole negro with dark chocolate and chilhuacle peppers, experiments with quinoa‑based tacos
    topped with avocado crema, and they count on fresh cilantro, roasted corn, and artisanal corn tortillas to elevate each dish.
  core: Alexander Estrada, a curious yet methodical 32‑year‑old retail strategist who fuses data‑driven leadership with a passion for art, community, and flavorful cooking, often forgets to prioritize sleep,
    and they occasionally stay up late working on digital collages.
background:
  cultural: Alexander is a second‑generation Mexican‑American. His parents immigrated from Jalisco, and he grew up in a bilingual household where Mexican customs, music, and food were central to family
    life. Living in Santa Barbara, he blends his Mexican heritage with the coastal Californian lifestyle, celebrating Día de los Muertos, sharing traditional dishes during holidays, and maintaining strong
    ties to the local Latino community. His cultural roots influence his appreciation for vibrant colors, storytelling through art, and a collaborative, family‑oriented approach to work and community involvement.
attributes:
  skills: '["Team leadership", "Retail operations management", "Sales data analysis", "Inventory control", "Visual merchandising", "Process improvement", "Bilingual communication (English/Spanish)", "POS
