  hobbies: '["Visiting art galleries and museums", "Street photography", "Digital art creation", "Cooking modern Mexican dishes", "Hiking coastal trails", "Playing acoustic guitar", "Listening to tech and
    design podcasts", "Reading books on design thinking and innovation", "Volunteering at community art workshops"]'
  career_goals: In the short term, Alexander aims to secure a district‑manager role within the next two years, overseeing multiple stores and driving regional sales growth through data‑driven strategies.
    He plans to pursue an MBA or a professional certification in retail analytics to deepen his strategic skill set. Long‑term, he envisions moving into corporate retail operations or leading a flagship
    store that integrates art and design into the shopping experience, potentially launching a concept store that showcases emerging Mexican‑American artists. He also hopes to mentor junior supervisors
    and champion inclusive, bilingual workplace practices across the organization.
