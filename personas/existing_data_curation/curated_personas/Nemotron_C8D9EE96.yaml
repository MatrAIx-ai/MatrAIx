  career_goals: Andred aims to advance from a first‑line supervisor to a district manager role overseeing multiple locations across Michigan, where she can shape regional sales strategies and mentor emerging
    leaders. She plans to pursue a part‑time MBA to deepen her strategic and financial expertise, and she envisions eventually opening her own boutique that focuses on sustainable, locally sourced fashion.
    Additionally, she is passionate about developing a mentorship program for women in retail and championing inclusive workplace practices.
