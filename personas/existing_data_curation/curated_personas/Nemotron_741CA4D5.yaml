personas:
  professional: Joan Lariviere, a licensed substance‑abuse and behavioral‑disorder counselor in the Bay Area, blends evidence‑based modalities like Motivational Interviewing, CBT, and DBT with expressive
    art and music interventions, leveraging their curious, flexible mindset and strong research acumen to design community‑focused programs while navigating a naturally disorganized schedule with creative
    improvisation.
  sports: Joan Lariviere, an enthusiastic hiker of the Bay Area redwood trails and a member of the Berkeley Yoga Collective, follows the San Francisco Giants in baseball, the Golden State Warriors in basketball,
    and joins a weekend recreational soccer league with the Community Garden Strikers, approaching fitness with a sociable, group‑oriented mindset.
  arts: Joan Lariviere, an avid watercolor painter who collaborates on murals and performs acoustic guitar at jam sessions, regularly attends openings featuring artists like Kehinde Wiley and Yayoi Kusama,
    participates in improv theater with The Second City Berkeley troupe, and draws inspiration from musicians such as Janelle Monáe and Bob Dylan, weaving their curious and expressive nature into daily
    life.
  travel: Joan Lariviere, a spontaneous traveler who prefers flexible itineraries, has backpacked through the coastal redwoods, explored the art districts of Kyoto and Barcelona, and dreams of a road‑trip
    along the Pacific Coast Highway to combine hiking, culinary discoveries, and community‑service projects, though limited funding sometimes curtails longer overseas stays.
  culinary: Joan Lariviere, a moderately skilled home chef who delights in experimental cooking classes, frequently prepares kimchi‑taco fusion bowls, miso‑glazed salmon with turmeric‑infused quinoa, and
    vegan tempeh birria, while savoring ingredients like matcha, fermented black beans, and smoked paprika, and occasionally overindulges in artisanal cheese plates at local farmers’ markets.
  core: Joan Lariviere, a curious, socially‑engaged counselor who merges therapy with art, budget‑flexibility, and occasional disorganization, finds balance through yoga, community activism, and a love
    for eclectic food and spontaneous travel.
background:
  cultural: Joan grew up in a middle‑class white family in California, absorbing mainstream American values while later immersing herself in Berkeley’s progressive, multicultural environment. The city’s
    legacy of social activism, environmental stewardship, and artistic expression heavily informs her worldview. She identifies with feminist and social‑justice principles, values diversity and inclusivity,
    and draws on both her Western European heritage and the Bay Area’s emphasis on sustainability, community collaboration, and open inquiry. This blend shapes her holistic approach to counseling and her
    commitment to culturally responsive care.
attributes:
  skills: '[''Substance Abuse Counseling'', ''Motivational Interviewing'', ''Cognitive Behavioral Therapy (CBT)'', ''Dialectical Behavior Therapy (DBT)'', ''Crisis Intervention'', ''Group Therapy Facilitation'',
    ''Case Management'', ''Psychiatric Medication Liaison'', ''Arts‑Based Therapeutic Techniques'', ''Data Analysis & Outcomes Evaluation'', ''Research Methodology'', ''Telehealth Platform Management'']'
  hobbies: '[''Watercolor painting'', ''Visiting art galleries and museums'', ''Participating in improv theater'', ''Cooking experimental dishes'', ''Hiking Bay Area trails'', ''Community gardening'', ''Environmental
    volunteer work'', ''Reading science-fiction and neuroscience literature'', ''Playing acoustic guitar'', ''Yoga and mindfulness meditation'']'
  career_goals: Joan aims to become a program director for a community‑based addiction recovery center that blends evidence‑based counseling with creative arts interventions, especially for underserved
    youth and LGBTQ+ populations. She plans to obtain her Clinical Supervisor license and eventually pursue a Ph.D. in Clinical Psychology to contribute to research on the neurobiology of addiction. Over
    the next five years, she hopes to design and secure funding for a pilot walking‑group therapy program in the Bay Area, publish her findings in peer‑reviewed journals, and serve on a regional behavioral‑health
    policy advisory board.
