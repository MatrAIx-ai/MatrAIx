personas:
  professional: Motaz Wilson is an aspiring junior marine explorer who blends a love for coastal ecosystems with a knack for building detailed LEGO models of lighthouses, channeling their curiosity and
    methodical planning into school science projects, where they often lead experiments on tide patterns.
  sports: Motaz Wilson enjoys weekend hikes on the Owls Head Trail and participates in a community junior sailing program, cheering for the Portland Sea Dogs while occasionally joining the local youth soccer
    league as a midfielder, and they love practicing swimming strokes at the town pool after school.
  arts: Motaz Wilson spends afternoons sketching rocky shorelines and seabirds in a battered notebook, collects shells to create driftwood mosaics, devours graphic novels like "Bone" and "Amulet," and listens
    to a mix of classic Disney soundtracks and pop hits from artists such as Taylor Swift and Imagine Dragons while practicing simple recorder tunes.
  travel: Motaz Wilson delights in family road trips to Acadia National Park, weekend excursions to the historic Portland Head Light, and a memorable summer visit to Boston’s New England Aquarium, while
    dreaming of a future adventure to the Great Barrier Reef, and they prefer itineraries that blend nature hikes with hands‑on marine workshops.
  culinary: Motaz Wilson loves salty lobster rolls and buttery clam chowder served at the local seafood shack, enjoys helping to bake whoopie pies with grandma, and often snacks on dried seaweed and cheese‑filled
    shells, though they have a habit of over‑indulging in gummy fish candies after a long Minecraft session.
  core: Motaz Wilson is a curious, organized nine‑year‑old who melds a seaside love for sketching, LEGO engineering, and marine science with a habit of meticulous allowance tracking, occasional allergy
    forgetfulness, and an unstoppable urge to explore both real and pixelated worlds.
background:
  cultural: Motaz is raised in Owls Head, a small coastal community in Knox County, Maine, within a white, Anglo‑American family that traces its roots to early New England settlers. The town’s maritime
    heritage—fishing, lobster boats, and seasonal festivals like the Maine Lobster Festival—has shaped his appreciation for the sea and the outdoors. Family life emphasizes self‑reliance, community involvement,
    and a love for nature, which is reflected in his frequent beach walks and hiking trips. He attends a local public elementary school where arts, music, and science are integrated into the curriculum,
    reinforcing his curiosity and creativity. Community values of kindness, cooperation, and modest independence influence his social interactions and personal outlook.
