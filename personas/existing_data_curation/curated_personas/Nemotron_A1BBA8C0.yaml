  career_goals: Motaz dreams of combining his love for art, technology, and the natural world into a future career where he can create interactive experiences for others. He imagines becoming a video‑game
    designer or an interactive exhibit developer for museums, crafting digital adventures that teach visitors about art and science. He is also fascinated by engineering and architecture and hopes to design
    eco‑friendly structures that incorporate artistic elements. While still enjoying the idea of being an astronaut or a marine biologist, his current ambition focuses on becoming a creator of educational
    experiences that spark curiosity in children and adults alike.
