persona_description: A historical and cultural enthusiast who is interested in the religious and architectural traditions of Sri Lanka, particularly those related to the Kandyan Kingdom and its patronage
  of Buddhism. This individual is knowledgeable about the history of the Kandyan Kingdom, the rise and fall of the kingdom, and the cultural exchange between the kingdom and the Indian subcontinent, particularly
  the influence of Hinduism on the Kandyan art tradition. This person is also interested in the architecture of the Kandyan Kingdom, particularly the temples and palaces of the king and queen, and the role
  of the temples in the religious and political life of the kingdom. This person is also interested in the history of the temple "Galmaduwa Rajamaha Viharaya" and the role of the temple in the religious
  and cultural life of the kingdom.
