persona_description: A researcher who studies the relationship between work goals, monetary incentives, and workers' performance in the context of a library field experiment. The researcher is interested
  in understanding how different work goals and types of remuneration affect performance and motivation, and how monetary incentives impact employees' estimates of their work performance. The researcher
  is also interested in the potential benefits of allowing employees to formulate their own personal goals and determining the potential financial bonus and degree of difficulty.
