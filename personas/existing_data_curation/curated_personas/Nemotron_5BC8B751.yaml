personas:
  professional: A practical and methodical aspiring HVAC technician, Donovan Thomas blends their hands‑on troubleshooting skills with organized project planning; they deliver reliable service while channeling
    their curiosity into mastering new system technologies.
  sports: An avid outdoor enthusiast, Donovan Thomas follows the Columbus Crew SC in MLS, roots for the Ohio State Buckeyes football team on Saturdays, participates in a local weekend pickup basketball
    league at the community center, and hikes the Hocking Hills trails during the fall to stay fit; they also enjoy occasional camping trips with friends to keep their adventurous spirit alive.
  arts: A lifelong learner who devours non‑fiction works on American history and technology, Donovan Thomas also unwinds with strategy games like Civilization VI, appreciates folk singer Jason Isbell, regularly
    visits the Columbus Museum of Art, and enjoys occasional indie film nights at the Short North's boutique theaters; they find inspiration for their woodworking projects in the museum's contemporary installations.
  travel: A methodical planner, Donovan Thomas prefers short, well‑budgeted road trips that combine hiking in Hocking Hills, a tech‑focused visit to Seattle’s Museum of History & Industry, and a historical
    pilgrimage to Boston’s Freedom Trail, while always keeping a spare fuel reserve for unexpected detours; they also love to document each adventure in a handwritten journal and share highlights with their
    community center friends.
  culinary: An intermediate home‑cook with a knack for woodworking his own smoker, Donovan Thomas delights in preparing smoked brisket seasoned with paprika and rosemary, pan‑seared trout tacos topped with
    fresh cilantro, and classic apple‑cinnamon pie, often pairing meals with a cold craft IPA from local breweries; they also experiment with new rubs and sauces, meticulously noting each recipe's success
    in a well‑used kitchen notebook.
  core: Donovan Thomas balances a curiosity for how things work with a disciplined, detail‑oriented routine, yet tends to hoard spare parts in their garage and can’t resist a late‑night strategy game after
    a day of hands‑on projects; they often forget to take breaks, leading to occasional burnout.
background:
  cultural: Donovan grew up in Columbus, Georgia, immersed in Southern culture that values community, hospitality, and family ties. His upbringing in a predominantly white, middle‑class neighborhood exposed
    him to local traditions such as church gatherings, regional cuisine like barbecue and fried fish, and a strong work ethic rooted in the area’s industrial heritage. These influences shape his cooperative
    nature, his appreciation for reliable, straightforward solutions, and his desire to contribute to the local community.
