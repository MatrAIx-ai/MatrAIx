  hobbies: '[''Woodworking'', ''Fishing'', ''Hiking'', ''Reading non-fiction (history & technology)'', ''Strategy video gaming'', ''Volunteering at community center'', ''Home brewing (craft beer)'']'
  career_goals: Donovan aims to enter the skilled‑trade workforce by completing a vocational certification in HVAC or automotive technology within the next year. He plans to secure an entry‑level maintenance
    or service technician position at a local company in Columbus, where he can apply his methodical approach and reliability. Over the next five years, he aspires to advance to a supervisory role, obtain
    further certifications, and eventually start his own small‑scale repair business, achieving financial independence and the ability to support his family.
