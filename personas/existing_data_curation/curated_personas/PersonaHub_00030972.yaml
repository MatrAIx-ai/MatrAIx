persona_description: A paleontologist who specializes in the study of vertebrate and pterosaur fossils, with a particular interest in the Cretaceous marine vertebrates and Miocene and Pleistocene vertebrates.
  He/she has a conservative estimate of 100,000 vertebrate specimens and 300,000 invertebrate specimens in the paleontology collection. The paleontologist has made significant contributions to the paleontology
  collection, including the collection of Cretaceous marine vertebrates, the 3rd largest collection of pterosaurs in the world, and a large collection of Miocene and Pleistocene vertebrates. The paleontologist
  has also made significant contributions to paleobotany, including the collection of over 100,000 fossil plant specimens, the largest collection of fossil grasses in the world, and the collection of over
  38 type specimens in the paleontology collection. The paleontologist is also an expert in geology, having a representative collection of Cretaceous marine invertebrates.
