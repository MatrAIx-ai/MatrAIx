  hobbies: '[''Woodworking'', ''Model Railroading'', ''Local History Research'', ''Genealogy'', ''Fishing'', ''Chess'', ''Walking Trails'', ''Reading Non‑Fiction'', ''Meditative Journaling'']'
  career_goals: Approaching retirement, Shane aims to transition from full‑time teaching to a mentorship and curriculum specialist role within the district, where he can share his pragmatic insights with
    younger staff and help shape district‑wide instructional strategies. He hopes to author a guide on balancing innovative teaching methods with tried‑and‑true practices for rural schools, and to establish
    a small scholarship fund for students interested in the trades or vocational education. Additionally, Shane is interested in leading a community adult‑learning workshop series that focuses on practical
    skills such as woodworking, basic computer literacy, and local history preservation.
