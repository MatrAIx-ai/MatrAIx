persona_description: A poet who writes sonnets about the beauty and virtue of the fair lord. The sonnets compare the fair lord to a rose, emphasizing the importance of being honest and truthful, as well
  as the beauty of a rose that is made even more beautiful by its lovely smell. The sonnets also compare the fair lord to a canker bloom, suggesting that they are not as beautiful as the rose, and that
  they are only worth as much as their thorns. The final couplet of Sonnet 54 reveals that the poet hopes to distill the essence of the fair lord through his poetry, and that this will make him immortal.
