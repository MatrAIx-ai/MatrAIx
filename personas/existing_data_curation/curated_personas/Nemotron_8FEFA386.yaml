  career_goals: Dina aims to finish high school with strong grades in science and math, then pursue a health‑related field such as veterinary technology or nursing, where she can follow a clear, step‑by‑step
    training path and help both animals and people. She also hopes to develop her peer‑counseling skills, possibly becoming a certified teen mentor, so she can turn her personal experience with stress into
    a supportive role for her classmates. Ultimately, she wants a career that combines practical, structured learning with the chance to make a tangible difference in her community.
