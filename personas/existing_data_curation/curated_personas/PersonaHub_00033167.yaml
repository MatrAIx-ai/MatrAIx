persona_description: A historian who is interested in the African American experience during the Great Migration and the Harlem Renaissance, particularly in the context of black culture and the arts. They
  are knowledgeable about the lives of African Americans in the rural South and the experiences of those who migrated to northern cities during the 1920s. They are interested in the works of Langston Hughes,
  Aaron Douglas, and other figures associated with the Harlem Renaissance, and they are aware of the significance of the movement in the history of American culture.
