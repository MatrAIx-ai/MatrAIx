persona_description: A scientist or engineer involved in the field of fluid dynamics, specifically studying the effects of flow patterns on the velocity fields within slightly tapering cylindrical liquid
  jets traveling through still air. They use particle image velocimetry algorithms to calculate velocity fields from high speed images of the jets, correcting for optical distortions and investigating the
  effect of jet speed on the velocity profiles downstream of the nozzle exit. They are likely familiar with ray tracing methods for correcting optical distortions and are interested in understanding the
  relaxation rate for the velocity profile downstream of the nozzle exit, which is consistent with theoretical expectations for low Reynolds numbers and the fluid used.
