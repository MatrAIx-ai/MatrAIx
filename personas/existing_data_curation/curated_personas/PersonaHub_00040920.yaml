persona_description: A person who is responsible for managing and maintaining the ISO 4217 currency codes standard, ensuring that the codes are updated periodically and that they accurately represent the
  currencies and their relationships. This person must be knowledgeable in ISO standards, currency codes, and the history of currency codes, and must be able to communicate effectively with stakeholders
  from around the world. They must be able to work collaboratively with other ISO committees and maintain a high level of professionalism and attention to detail.
