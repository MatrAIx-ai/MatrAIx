  career_goals: Irma is fascinated by animals and often says she wants to become a veterinarian to help sick pets and wildlife. Her love of building and figuring out how things work also sparks an interest
    in engineering, where she imagines designing structures that are both useful and fun. She enjoys learning from teachers and sharing what she knows, so she dreams of being a classroom teacher one day.
    Additionally, Irma’s competitive spirit drives her to aim for a leadership role on her soccer team, hoping to be a captain who guides teammates with confidence.
