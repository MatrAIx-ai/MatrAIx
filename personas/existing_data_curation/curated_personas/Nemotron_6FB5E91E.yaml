personas:
  professional: Irma Payne, a budding soccer player and Lego city architect, blends curiosity with practicality by leading neighborhood games and turning building instructions into original designs, displaying
    a competitive edge while staying organized.
  sports: Irma Payne plays on the local Under-8 soccer team, cheering for the community’s “Hometown Hurricanes” while practicing drills at the park, approaching each match with fierce competition and a
    love for teamwork, yet remains skeptical of opponents' fair play.
  arts: Irma Payne dazzles in her weekly dance class, twirls to the upbeat tunes of Kidz Bop’s “Shake It Off,” and devours adventure stories by Enid Blyton, channeling imaginative energy into both movement
    and storytelling.
  travel: Irma Payne enjoys weekend adventures to the nearby county park’s wildlife pond and has an excited wish list that includes a family trip to the San Diego Zoo and a future visit to the Great Barrier
    Reef’s marine exhibits.
  culinary: Irma Payne loves munching on carrot sticks and apple slices after helping plant tomatoes in the garden, proudly assists in making spaghetti with fresh basil, and dreams of mastering a perfect
    peanut butter and jelly sandwich.
  core: Irma Payne is a fiercely competitive, curiosity‑driven 7‑year‑old who balances Lego building with soccer, saves her allowance for new sets, occasionally forgets to moisturize her eczema, and thrives
    on busy, social days.
background:
  cultural: Irma was raised in Clarksville, Tennessee, a small‑city community in Montgomery County known for its friendly Southern atmosphere. Her family embraces common regional customs such as celebrating
    Thanksgiving with an extended family dinner, attending local church services, and participating in community events like the Montgomery County Fair and youth sports leagues. The local elementary school
    emphasizes community involvement and teamwork, reinforcing Irma’s sociable and collaborative nature. While her household reflects mainstream white Southern culture, it also encourages openness to diverse
    perspectives through school activities and library programs. Seasonal traditions such as carving pumpkins for Halloween, decorating a Christmas tree, and enjoying summer barbecues give Irma a strong
    sense of belonging and cultural continuity.
