  hobbies: '[''Fishing'', ''Barbecue grilling'', ''Country dancing'', ''Woodworking'', ''Gardening'', ''Reading historical fiction'', ''Volunteering at community events'']'
  career_goals: Although retired from full‑time work, Gregory aims to stay actively engaged in his community by serving as a senior advisor for the Maud Community Center, mentoring younger volunteers in
    maintenance and event planning, and contributing to local historical preservation projects. He also hopes to complete a small‑scale home renovation project for a neighboring family, participate in a
    regional seniors’ health initiative, and travel occasionally to visit his grandchildren in other states, all while maintaining his health and fitness through regular walks and light exercise.
