  hobbies: '["Reading African-American and classic literature","Herb gardening","Soul-food cooking with a healthful twist","Knitting and quilting","Small book clubs and reading circles","Journaling and
    meditation","Hiking local trails","Listening to jazz and classical music"]'
  career_goals: Although officially retired, Jessilyn aims to continue shaping the cultural landscape of Altadena by launching an oral-history project that documents the experiences of older Black residents.
    She hopes to publish a memoir that intertwines her journey in education with reflections on social change, and she seeks a fellowship to study digital humanities tools that can preserve local histories.
    Jessilyn also aspires to secure a small grant to establish a community cultural hub where workshops on storytelling, arts, and wellness can be offered to intergenerational participants. Maintaining
    her health, managing stress, and deepening her spiritual practice are personal goals she prioritizes alongside these professional ambitions.
