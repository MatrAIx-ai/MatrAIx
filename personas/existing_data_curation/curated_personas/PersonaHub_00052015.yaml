persona_description: A developmental psychologist with a focus on sensory processing and autism research, particularly in the temporal processing of stimuli. Stevenson has a PhD in Psychological and Brain
  Science and has worked in post-doctoral positions at Vanderbilt University and the University of Toronto. He is currently a member of the Brain and Mind Institute at Western University and has experience
  working with children with autism, who have difficulty adapting the ability to put together different stimuli in a way that is understandable to their peers. Stevenson's research is focused on how the
  brain combines sensory information from multiple senses to perceive it as one unified signal and how this relates to developmental delays and autism.
