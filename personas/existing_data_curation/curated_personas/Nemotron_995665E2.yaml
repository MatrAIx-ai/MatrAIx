personas:
  professional: Trisha Gilliam, a retired home‑economics teacher turned senior‑center program coordinator, they leverage their lifelong knack for budgeting, event planning, and hands‑on crafts to structure
    intergenerational garden projects while flexibly adapting to volunteers’ spontaneous ideas, embodying their blend of practicality and sociable energy.
  sports: Trisha Gilliam, they enjoy low‑impact fitness through daily garden walks, weekly water‑aerobics at the Salina Senior Fitness Club, root for the Kansas City Royals (MLB) and the Kansas City Chiefs
    (NFL), and occasionally join a local bridge league that doubles as a light mental‑cardio challenge.
  arts: Trisha Gilliam, they blend choir singing with a love for folk‑blues legend Odetta, organize regular quilting circles that emulate the pattern style of Grandma Moses, and spend evenings reading Ken
    Follett’s historical novels while listening to the piano works of George Winston.
  travel: Trisha Gilliam, they prefer leisurely, well‑planned road trips that include weekend stays in historic Dodge City, annual visits to the cherry‑blossom gardens of Washington, D.C.’s Tidal Basin,
    and a longstanding dream of exploring Tuscany’s vineyards, all balanced against their modest travel budget and the need to keep daily medication schedules intact.
  culinary: Trisha Gilliam, they focus their culinary repertoire on wholesome, garden‑fresh dishes such as roast tomato‑basil soup, quinoa‑cranberry salad, and their signature apple‑cinnamon bread, flavored
    with thyme, nutmeg, and a generous pinch of community spirit during potluck gatherings.
  core: Trisha Gilliam, they are a structured yet delightfully flexible senior whose garden‑grown generosity, choir‑filled heart, and occasional habit of misplacing reading glasses create a warm, community‑centered
    whirlwind of kindness.
background:
  cultural: Trisha grew up on a family farm near Saline County, Kansas, within a predominantly white, Midwestern community of German and English ancestry. Her upbringing emphasized self‑reliance, hospitality,
    and a strong sense of communal responsibility—values that were reinforced by regular church attendance and participation in local fairs and volunteer activities. The cultural fabric of her generation
    prized modesty, hard work, and neighborly support, shaping her compassionate and cooperative nature. Although she now lives in Salina, she retains deep connections to the rural traditions of her youth,
    celebrating seasonal harvest festivals, preserving family recipes, and maintaining close ties with extended family and longtime friends.
