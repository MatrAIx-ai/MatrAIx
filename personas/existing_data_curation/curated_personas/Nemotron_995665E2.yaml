  career_goals: Although retired, Trisha aims to deepen her impact within Salina. She hopes to lead the senior center’s intergenerational program, pairing seniors with elementary‑school students for shared
    gardening and storytelling projects. She also wants to develop a small grant to fund a community garden that supplies fresh produce to the local food bank. Learning to use newer digital tools, such
    as family‑photo‑sharing apps and online event platforms, is a personal ambition, allowing her to keep relatives connected across distances. Ultimately, she wishes to leave a documented collection of
    her family recipes and local history recollections for future generations.
