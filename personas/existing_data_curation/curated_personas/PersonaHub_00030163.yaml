persona_description: A biologist who studies the interactions between different species in a particular ecosystem, focusing on the trophic levels and their effects on each other. The individual is particularly
  interested in the ball gall system and its evolution, including the role of natural selection in determining the size of gall flies. They are also knowledgeable about the tri-trophic interactions between
  the goldenrod, gall flies, and Eurytoma wasps, and how they impact the fitness of the gall flies. The individual has a deep understanding of the interplay between genetic recombination, mutation, and
  natural selection, and how they contribute to the evolution of different species. They have a keen interest in the effect of host plants on gall size and the role of downy woodpeckers in shaping the evolution
  of gall flies.
