persona_description: A historian who specializes in the study of famine and its impact on society, particularly the Irish Potato Famine. They are interested in understanding the social, economic, and political
  aspects of Irish peasant life during that time, as well as the causes and consequences of the late blight epidemics. They are also interested in the scientific methods used to study disease and the differences
  between a pathogen and a disease, as well as the disease triangle for late blight.
