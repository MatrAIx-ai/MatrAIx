persona_description: A 20th-century artist who was deeply influenced by the works of Japanese woodcut prints, Henri de Toulouse-Lautrec, and the natural world around him, particularly the irises growing
  in the asylum garden. Despite his early religious beliefs, he found solace in nature and art to express his inner life and fill the gap left by his abandonment of a career as a portrait painter. His paintings
  often depict the irises, which he personalized and imbued with a sense of resilience and power.
