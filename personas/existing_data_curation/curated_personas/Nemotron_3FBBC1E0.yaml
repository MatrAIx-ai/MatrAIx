personas:
  professional: Rita Willis is a seasoned automotive service technician with over twenty years of hands‑on expertise in engine diagnostics, hybrid and electric vehicle repair, and parts inventory management,
    and they channel their curiosity and artistic mindset into creative problem‑solving that makes them a natural mentor and future service manager candidate.
  sports: Rita Willis hits the trails of Kettle Moraine State Forest for weekly hikes, cheers on the Milwaukee Bucks and the Green Bay Packers, participates in a local amateur cycling club, and occasionally
    joins charity 5K runs, channeling their competitive nature into personal fitness goals.
  arts: Rita Willis spends Saturday mornings painting watercolors of forest panoramas, visits the Milwaukee Art Museum and regional craft fairs to study artists like Georgia O'Keeffe and Ansel Adams, and
    they fuse automotive photography with fine‑art composition, allowing their creative side to balance the precision of their trade.
  travel: Rita Willis prefers road‑trip itineraries that combine classic car rallies—such as the Route 66 cruise—with visits to automotive museums in Detroit and Stuttgart, they also enjoy weekend getaways
    to the Finger Lakes wine region, planning trips meticulously to fit a moderate budget and family responsibilities.
  culinary: Rita Willis loves cooking hearty Midwestern staples like bratwurst, corn chowder, and farm‑fresh ratatouille using heirloom tomatoes from their garden, they experiment with seasoning blends
    while grilling, yet sometimes over‑salt dishes when stressed, revealing a pragmatic yet occasional indulgent culinary approach.
  core: Rita Willis balances the torque of a wrench with the fluid brushstroke of a watercolor, their competitive edge tempered by chronic worry and a relentless quest for both mechanical perfection and
    artistic expression.
background:
  cultural: Rita is a white Midwesterner with deep roots in Wisconsin, descending from German and Scandinavian ancestors who settled in Brown County. She grew up in a close-knit small-town environment that
    valued hard work, community involvement, and practical skill. The region’s strong automotive culture, love of nature, and seasonal traditions have shaped her grounded yet curious outlook, blending a
    pragmatic work ethic with an appreciation for art and new ideas.
