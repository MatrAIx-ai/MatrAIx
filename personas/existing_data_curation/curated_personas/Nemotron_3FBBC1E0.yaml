    basic auto maintenance at community center'', ''Board games with friends'', ''Cooking Midwestern cuisine'', ''Reading automotive journals'']'
  career_goals: Rita aims to achieve ASE Master Technician certification, with additional credentials in hybrid and electric vehicle technology. She aspires to move into a service manager role at her current
    shop or eventually open a boutique garage that combines high-quality automotive service with a creative space for car-related art projects. She also wishes to mentor younger technicians, especially
    women, and stay at the forefront of sustainable automotive technology.
