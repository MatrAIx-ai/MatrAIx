personas:
  professional: Jimmy is a CNC machine setter/operator at a local metal‑fabrication shop who leverages his hands‑on technical expertise, knack for reading GD&T drawings, and talkative, team‑leading style
    to train new hires, conduct safety briefings, and streamline production while balancing a flexible approach to job orders and dreaming of becoming a plant supervisor.
  sports: Jimmy's athletic interests revolve around weekend pickup basketball with the Sullivan County Hoops crew, cheering for the New York Knicks and the New York Mets, and competing in online League
    of Legends tournaments under the alias 'StrumBlade', where they bring a competitive edge and sometimes skeptical attitude toward teammates' strategies, while also joining a local 3‑on‑3 league to stay
    fit.
  arts: Jimmy's artistic side shines through sketching in a well‑worn notebook during work breaks, attending exhibitions at the community art center, and drawing inspiration from street artist Banksy, sci‑fi
    illustrator Syd Mead, and musician Joni Mitchell, while they often perform acoustic covers of The Beatles' 'Blackbird' at open‑mic nights, showcasing a curious, talkative personality that craves the
    spotlight.
  travel: Jimmy prefers short, budget‑friendly trips that feed their curiosity, such as a weekend road trip to the Finger Lakes for kayaking, a backpacking stint through Washington, D.C. to explore the
    Smithsonian, and a long‑term dream of visiting Milan's design museums, planning itineraries with a mix of spontaneous spur‑of‑the‑moment decisions and shared schedules with bandmates, all while balancing
    limited student finances.
  culinary: Jimmy enjoys a mix of quick, hearty meals and experimental cooking, favoring pepperoni pizza, ramen with soft‑boiled eggs, and homemade chicken fajitas with cilantro and lime, they have an intermediate
    cooking skill level—able to follow recipes but often improvising with extra hot sauce and ending up a bit messy, reflecting their competitive spirit even in the kitchen.
  core: Jimmy is a curious, talkative 20‑year‑old CNC operator who balances a love for art, competition, and community service with occasional impulsive spending and a skeptical streak toward authority.
background:
  cultural: Jimmy grew up in Sullivan, Indiana, a tight‑knit Midwestern town where family, work ethic, and community gatherings are central to daily life. His family traces its roots to southern Italy,
    and Italian traditions—such as Sunday family meals, festive holidays, and a reverence for craftsmanship—are woven into his upbringing. The blend of Italian heritage with Midwestern values of modesty,
    reliability, and civic involvement shapes his identity. Local customs like high school football games, county fairs, and church picnics reinforce his sociable spirit, while regional trade schools and
    a strong manufacturing presence guided him toward a career in machine operation. This cultural mix fuels his appreciation for both practical skill and artistic expression.
attributes:
  skills: '[''CNC press machine setup'', ''Metal and plastic fabrication'', ''Technical drawing and GD&T interpretation'', ''Basic CNC programming (G-code)'', ''Machine maintenance and troubleshooting'',
    ''Quality control and inspection'', ''Safety compliance and briefings'', ''Time management and scheduling'', ''Team communication and training'', ''Creative problem‑solving'']'
  hobbies: '[''Sketching and watercolor painting'', ''Photography of local landscapes'', ''Acoustic guitar and casual band performances'', ''Weekend basketball games'', ''Competitive video gaming (eSports)'',
    ''Model kit building and 3D printing'', ''Visiting art exhibitions and galleries'', ''Volunteering at community events and county fairs'', ''Reading science‑fiction and design literature'']'
  career_goals: Jimmy aims to move from operator to lead machine setter and eventually plant supervisor, leveraging his hands‑on expertise and design curiosity to oversee production flow. He plans to complete
    his associate degree in industrial technology and pursue a bachelor’s in mechanical engineering, targeting certifications such as NIMS CNC Programmer and Lean Six Sigma Yellow Belt. Long‑term, he envisions
    running a small custom metal‑fabrication shop that blends functional engineering with artistic design, while mentoring apprentices from his hometown and promoting community‑based vocational training
    programs.
