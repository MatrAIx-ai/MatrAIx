  career_goals: Looking ahead, Jesus aims to transition into a Chief Technology Officer role within the next five years, where he can shape product strategy and champion the integration of emerging AI technologies.
    He aspires to build high‑performance engineering cultures that balance rigorous methodology with creative experimentation. Additionally, he plans to publish thought‑leadership articles on ethical AI,
    present at major tech conferences, and later launch a consultancy that helps Texas‑based small businesses adopt cloud‑first, data‑centric solutions. His long‑term ambition includes mentoring underrepresented
    talent to broaden diversity in tech.
