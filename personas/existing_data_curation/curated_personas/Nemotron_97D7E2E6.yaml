personas:
  professional: Jesus Cata is a seasoned full‑stack technologist and certified Agile project manager who leverages Python, Java, and C++ expertise to architect scalable cloud solutions on AWS and Azure,
    while channeling their curiosity and competitive edge into mentoring teams and driving AI‑focused product strategy toward an eventual CTO role.
  sports: Jesus Cata plays forward in a weekly co‑ed soccer league that keeps them connected to community roots, avidly supports Austin FC, and hits the local trailheads on weekends with their family, balancing
    cardio with occasional strength training at a nearby CrossFit box.
  arts: Jesus Cata captures Austin’s evolving street murals and Hill Country sunrise vistas through a vintage Leica, strums acoustic renditions of John Mayer and Los Lobos at neighborhood jam nights, and
    frequents gallery openings featuring artists like Kerry James Marshall and local muralist Selina Escobar, letting the convergence of visual and musical expression fuel their creative problem‑solving.
  travel: Jesus Cata prefers meticulously planned road trips that blend adventure and family time, having explored the rugged canyons of Big Bend, the historic streets of Barcelona, and the culinary scene
    of Oaxaca, while budgeting each journey to ensure early‑retirement savings remain on track.
  culinary: Jesus Cata is a proficient home chef who perfects carne asada tacos with charred corn tortillas, cilantro, and chipotle‑marinated steak, experiments with mole negro using ancho chilies and cacao,
    and occasionally indulges in a Tex‑Mex spin on shrimp po’boy, sourcing fresh avocados, tomatillos, and locally milled masa for every meal.
  core: Jesus Cata blends analytical rigor with artistic curiosity, obsessively optimizing cloud architectures by day while hunting sunrise shots and fretting over the next code review or health metric
    by night.
background:
  cultural: Jesus is a first‑generation Mexican‑American who grew up in the Greater Austin area, navigating both his family's Mexican traditions and the eclectic Texan culture. Bilingual in Spanish and
    English, he celebrates Día de los Muertos, Cinco de Mayo, and local Texas festivals, often blending culinary and musical influences from both worlds. Family ties are strong, with frequent gatherings
    that feature traditional Mexican home‑cooked meals and storytelling. His upbringing instilled a deep respect for community, hard work, and perseverance, which he carries into his professional life while
    also embracing the innovative spirit of Austin’s tech scene.
