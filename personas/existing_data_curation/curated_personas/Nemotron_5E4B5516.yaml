  hobbies: '[''Fishing'', ''Birdwatching'', ''Gardening'', ''Crossword puzzles'', ''Model sailboat building'', ''Historical non-fiction reading'', ''Senior book club'', ''Volunteering for road safety education'',
    ''Beach walking'']'
  career_goals: Approaching the final years of his career, Jordan aims to transition from daily field inspections to a senior advisory role within the Sarasota County transportation department, where he
    can influence policy and mentor the next generation of inspectors. He hopes to design a training program that integrates practical field skills with the latest safety technologies, and to earn a Certified
    Transportation Safety Professional (CTSP) credential before retirement. Additionally, he is driven to spearhead a county-wide initiative that reduces roadway incidents by implementing predictive maintenance
    using data analytics, while also establishing a support system for his own emotional wellbeing to manage his anxiety and stress.
