persona_description: A Nicaraguan military officer who rose to power through the Nicaraguan military establishment and became the third member of the Somoza dynasty to be president of Nicaragua. He was
  also the commander in chief of the armed forces and was known for promoting health and education programs, agricultural and industrial modernization, and improving the country's economic position. He
  was also accused of widespread torture, rape, and murder during the Sandinista insurrection. He was eventually assassinated in exile in September 1980.
