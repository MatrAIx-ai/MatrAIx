persona_description: A teacher who is passionate about promoting the use of languages other than English in the classroom and is interested in the use of dual language books in educational settings. They
  have experience working with children who are new to English and have a keen interest in using dual language books to support their literacy development. They are also interested in the use of multimedia
  resources, including recorded and interactive texts, and the value of games and artifacts associated with texts. They have a background in English education and have a strong understanding of the importance
  of language and culture in promoting literacy and cultural identity. They are open to new ideas and are always looking for ways to improve the use of dual language books in educational settings.
