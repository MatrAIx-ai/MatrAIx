persona_description: A historian who specializes in the study of the history of slavery in the United States, particularly the impact of the institution on the Black community. He has a deep understanding
  of the legal, social, and cultural factors that contributed to the oppression of Black people for four centuries. His research focuses on the historical context of the police killings of Black people
  and how these killings reflect the legacy of slavery and racism in the United States. He is interested in the use of data to address the complex problems of police violence and believes that tracking
  the number of police killings would be a useful approach to realigning police funding towards social service programs.
