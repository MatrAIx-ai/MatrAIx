  hobbies: '["cheerleading", "school drama club", "fashion blogging", "volunteering at community center", "baking", "listening to pop music", "shopping with friends", "co‑op video gaming"]'
  career_goals: Gina aims to finish high school with strong academic standing and become a student‑leadership officer, using her organizational talent to improve school programs. In the longer term she
    dreams of a career that blends structure with daily human interaction—such as a high‑school teacher, school counselor, or community health educator—so she can maintain a predictable routine while helping
    others and staying socially engaged. She also hopes to earn a scholarship that will let her study education or public health at a state university.
