    helpers'', ''DIY home renovation projects'']'
  hobbies: '[''Visiting art galleries and craft fairs'', ''Watercolor painting'', ''Pottery and ceramics'', ''Quilting'', ''Gardening (native plants and vegetables)'', ''Hiking in the Upstate SC trails'',
    ''Listening to DIY and construction podcasts'', ''Reading architecture and design books'', ''Cooking Southern-Vietnamese fusion dishes'', ''Volunteering with Habitat for Humanity'', ''Journaling and
    mindfulness meditation'']'
  career_goals: Paula aims to move into a supervisory role on construction sites, such as foreperson or crew lead, where she can combine her practical experience with her interest in innovative, eco-friendly
    building methods. She hopes to obtain a certification in construction supervision and eventually start a small, community-focused renovation business that incorporates artistic design elements, allowing
    her to blend her love of art with practical trades. While she values flexible hours to maintain a healthy work-life balance, she also wants to reduce the stress she feels on larger projects by focusing
    on smaller, detail-oriented jobs.
