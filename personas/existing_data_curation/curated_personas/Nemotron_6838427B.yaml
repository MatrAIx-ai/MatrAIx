personas:
  professional: Paula Huynh, a seasoned construction helper with three decades of framing, drywall, and rough‑in experience, they combine a meticulous eye for sustainable materials with a love of aesthetic
    details, mentoring new crew members while dreaming of a foreperson role that lets them weave artistic touches into eco‑friendly renovations.
  sports: Paula Huynh, a devoted hiker of the Appalachian foothills and member of the Greenville Trailblazers walking club, enjoys occasional weekend softball with a local co‑ed league, and they cheer on
    the Carolina Panthers while keeping tabs on the Greenville Swamp Rabbits for a touch of indoor hockey excitement.
  arts: Paula Huynh, an avid watercolorist and potter who frequently visits galleries featuring artists like Monet, Georgia O’Keeffe, and Vietnamese lacquer painter Nguyen Sang, they weave this visual inspiration
    into quilting projects while also finding solace in listening to the folk blues of Rhiannon Giddens and the contemporary jazz of Kamasi Washington.
  travel: Paula Huynh, who prefers a flexible itinerary that blends nature hikes with culinary discoveries, has trekked the Blue Ridge Parkway, explored the historic streets of Charleston, and spent a week
    in Da Nang during Tet, and they dream of future trips to Kyoto’s temple gardens and New Zealand’s South Island for deeper artistic and ecological immersion.
  culinary: Paula Huynh, a fusion cook who loves marrying Southern comfort with Vietnamese zest, they frequently prepare shrimp and grits infused with pho broth, banh mi‑style fried chicken with collard
    greens, and pimento cheese spring rolls flavored with lemongrass and star anise, while their garden yields fresh basil, okra, and sweet potatoes that star in their nightly experiments.
  core: Paula Huynh blends three decades of hands‑on construction expertise with a colorful artistic soul, navigating life’s stresses through mindfulness, an ever‑growing garden, and a penchant for spontaneous
    art‑supply splurges.
background:
  cultural: As a lifelong resident of Laurens County in Upstate South Carolina, Paula grew up immersed in traditional white Southern culture—family church gatherings, Southern cuisine, and a strong sense
    of community. Through her marriage to a Vietnamese-American partner, she has embraced Vietnamese customs such as celebrating Tet, enjoying pho, and appreciating Asian art, which broaden her artistic
    perspective. This blend of Southern hospitality and multicultural influences informs her open-minded, curious outlook and her appreciation for varied experiences while maintaining a grounded, modest
    lifestyle.
attributes:
