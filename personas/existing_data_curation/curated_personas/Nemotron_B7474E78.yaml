  hobbies: '[''Gardening'', ''Sketching and watercolor painting'', ''Nature photography'', ''Reading art history'', ''Attending local gallery openings'', ''Quilting'', ''Bird‑watching'', ''Culinary experiments
    with seasonal produce'', ''Journaling'', ''Volunteering at senior arts programs'']'
  career_goals: Su Jane aims to transition from miscellaneous agricultural work to running a small‑scale organic farm that supplies directly to local restaurants and community‑supported agriculture (CSA)
    members. She plans to obtain a Sustainable Agriculture certification and eventually mentor younger farm workers, sharing both practical skills and her love for ethical food production. Long‑term, she
    hopes to establish a community garden space in Carson that integrates art installations and educational workshops, blending her agricultural expertise with her artistic curiosity.
