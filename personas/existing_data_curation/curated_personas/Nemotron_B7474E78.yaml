personas:
  professional: Su Crousillat, a seasoned organic farmer with decades of hands‑on experience operating farm machinery, designing irrigation systems, and orchestrating crop rotations, they blend meticulous
    record‑keeping with a curious, artistic mindset to launch a small CSA that serves local restaurants while mentoring younger workers.
  sports: Su Crousillat, who enjoys low‑impact activities, they walk with the Carson Senior Strollers club and attend LA Dodgers games for a social outing, while practicing gentle yoga at the community
    center to stay flexible through the seasons.
  arts: Su Crousillat, an avid participant in the local arts scene, they collect watercolors of Georgia O’Keeffe’s desert blooms, study Ansel Adams photography, and attend intimate gallery openings featuring
    emerging artists like Maya Lin, finding inspiration for their garden installations.
  travel: Su Crousillat, favoring slow, reflective journeys, they have explored the Japanese Zen gardens of Kyoto for design ideas, trekked the vineyards of Napa Valley in the fall, and plan a future road
    trip to the desert art installations of Joshua Tree, always traveling with a journal and a sketchpad.
  culinary: Su Crousillat, with a seasoned palate for seasonal produce, they relish preparing heirloom tomato gazpacho, sautéed wild mushrooms with thyme, and farm‑fresh salads topped with toasted pumpkin
    seeds, while occasionally indulging in a buttery croissant for a sweet treat.
  core: Su Crousillat, a nurturing yet worry‑prone 59‑year‑old farmer‑artist, they balance meticulous farm management with a love for sketching, tend to health anxieties through routine checks, and occasionally
    splurge on heirloom seeds despite a frugal budget.
background:
  cultural: Su Jane grew up in a Midwestern farming family of European descent, where values of self‑reliance, hard work, and respect for the land were emphasized. After relocating to Southern California,
    she integrated into the agrarian community of Carson, absorbing the region's multicultural influences while maintaining a cultural identity rooted in her Midwestern heritage. Her background blends a
    traditional white American rural upbringing with exposure to the diverse artistic and cultural tapestry of Los Angeles County, shaping her inclusive appreciation for varied experiences and unconventional
    ideas.
attributes:
