personas:
  professional: Dagoberto Restrepo, a retired hands-on problem-solver, leverages decades of home-maintenance expertise and community-service experience to mentor younger neighbors in carpentry, basic electrical
    work, and budgeting, while also coordinating volunteer teams for local festivals, embodying a calm, reliable, and curious approach to civic leadership.
  sports: Dagoberto Restrepo walks regularly with a local walking club, cheers on the Los Angeles Dodgers during televised games, and occasionally joins neighborhood softball matches at the community center,
    balancing low-impact fitness with modest social sport.
  arts: Dagoberto Restrepo enjoys listening to Lila Downs and Carlos Santana while dancing at community folk nights, watches classic films by Guillermo del Toro for storytelling inspiration, and reads biographies
    of figures like Frida Kahlo and Emiliano Zapata, letting those artistic narratives shape their identity.
  travel: Dagoberto Restrepo favors short drives to nearby Santa Ana for community events, cherishes annual trips to visit family in Oaxaca, Mexico, and dreams of exploring the historic streets of Seville,
    Spain, though their travel plans remain modest within a comfortable retirement budget.
  culinary: Dagoberto Restrepo's culinary repertoire includes mastering mole poblano with heirloom chilies, slow-cooked pozole infused with hominy and pork, and handmade tamales wrapped in corn husks, while
    they frequently experiment with garden-fresh heirloom tomatoes in salsas and guacamole, reflecting a confident and nostalgic kitchen style.
  core: Dagoberto Restrepo, a garden-loving, spreadsheet-wielding retiree who blends calm pragmatism with a secret penchant for late-night salsa dancing, never skips a day of watering the tomatoes even
    when a baseball game is on.
background:
  cultural: Dagoberto was born in the state of Jalisco, Mexico, and moved to Texas in his early twenties. He carries the vibrant customs of his hometown—celebrations of Día de los Muertos, festive quinceañeras,
    and a deep respect for family ties. In Cypress, he has woven these traditions into his daily life, maintaining a Spanish‑speaking household while also embracing Texan hospitality. His Catholic faith
    informs his participation in church gatherings and charitable works. The blend of Mexican culinary heritage and Texas’s diverse food scene influences his cooking experiments. Dagoberto’s cultural identity
    is a source of pride, guiding his desire to share Mexican stories, recipes, and celebrations with his neighbors, fostering a sense of community harmony.
