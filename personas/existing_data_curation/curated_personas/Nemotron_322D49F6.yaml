personas:
  professional: Michael Jackson, a two‑year‑old with an unexpected knack for arranging toys, meticulously lines up building blocks by size and color as if orchestrating a tiny supply chain, and they often
    insist on a precise pattern before moving on, hinting at a future in logistics or engineering.
  sports: Michael Jackson rolls around in a toddler soccer class at the local community center, cheers quietly for the Colorado Rockies and Denver Broncos when games play on the family TV, and they tackle
    indoor playground slides with a competitive spark that belies their reserved nature.
  arts: Michael Jackson lights up for the catchy tunes of The Wiggles and Disney's Frozen, fills crayon sketches with bold rainbow swirls, and they can recite Elmo's favorite song from Sesame Street, weaving
    playful artistry into everyday moments.
  travel: Michael Jackson thrives on family excursions to the Garden of the Gods and Rocky Mountain National Park, enjoys picnicking on a Fourth of July hilltop while waving tiny flags, and they daydream
    about a future trip to California's towering redwoods.
  culinary: Michael Jackson favors creamy macaroni and cheese, delightfully dips chicken nuggets in honey mustard, loves crunchy apple slices with a dash of cinnamon, and they love pretending to stir mashed
    potatoes with a wooden spoon, savoring the familiar buttery flavor of corn on the cob.
  core: Michael Jackson is an unusually orderly two‑year‑old who plans block towers, hoards pennies for a tricycle, and they insist on bedtime routines, yet stubbornly refuse broccoli, revealing a blend
    of disciplined curiosity and toddler tenacity.
background:
  cultural: Michael is raised in an Anglo‑American family in Colorado Springs, Colorado. His household values practical schedules, outdoor activities, and community involvement typical of suburban Mountain‑state
    life. The family celebrates common American holidays such as Thanksgiving and the Fourth of July, and frequently takes advantage of the nearby Rocky Mountain environment for family hikes, picnics, and
    occasional ski trips, blending a broader American cultural framework with local Colorado outdoor traditions.
