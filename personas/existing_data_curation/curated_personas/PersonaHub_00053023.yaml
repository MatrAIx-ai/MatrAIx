persona_description: A pediatric orthopedic surgeon specializing in the treatment of fractures of the distal forearm. She is particularly interested in the clinical significance of shortening of one bone
  in the distal radius and ulna, and how this can affect the relationship of the distal radioulnar joint. She has experience with the evaluation of children with fractures of the distal forearm and the
  comparison of their treatment outcomes with patients who did not have shortening of one bone. She is conducting a prospective study to investigate the clinical significance of shortening of one bone in
  the distal forearm fractures.
