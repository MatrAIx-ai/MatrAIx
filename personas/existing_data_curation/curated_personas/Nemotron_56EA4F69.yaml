personas:
  professional: Yesenia Cepero, a budding junior illustrator and LEGO architect, channels a keen eye for bright folk art, methodical planning, and compassionate teamwork into detailed sketches and intricate
    block structures, and they frequently volunteer to help classmates with art projects.
  sports: Yesenia Cepero enjoys organized play on the Sacramento Youth Soccer U8 team, adores swimming laps at the West Sacramento Community Pool, and they cheer enthusiastically for the Sacramento Kings
    and the San Francisco Giants, using rhythmic movement to keep stress at bay.
  arts: Yesenia Cepero spends afternoons painting bright scenes inspired by Frida Kahlo’s folk motifs while listening to Los Lobos and rehearsing traditional dances taught by their abuela, and they foster
    a deep sense of cultural pride and creative expression.
  travel: Yesenia Cepero dreams of exploring the towering redwoods of Muir Woods, has already visited the vibrant Aquarium of the Bay in San Francisco and spent a family weekend at the historic Alamo, and
    they always plan trips with a hand-drawn map and a sprinkle of seashell souvenirs for future art projects.
  culinary: Yesenia Cepero enjoys helping their abuela roll homemade tamales, mixing fresh tomatoes, cilantro, and jalapeños for salsa, and they also love making easy cheese quesadillas and strawberry-banana
    smoothies, proudly claiming their spoon-stirring skills are second to none.
  core: Yesenia Cepero is a curious, organized seven-year-old who turns worries into vibrant art, yet they habitually forget chores because a new LEGO set has captured their imagination.
background:
  cultural: Yesenia grows up in a bilingual Mexican‑American household in West Sacramento, where Spanish and English flow interchangeably. Her family celebrates Día de los Muertos with hand‑made papel picado,
    altars, and traditional foods like tamales and tacos. She learns to make salsa and helps her abuela with hand‑painted tile crafts, absorbing stories of Mexican folklore. The vibrant Mexican community
    in Yolo County and the multicultural atmosphere of the Bay Area enrich her appreciation for art, family traditions, and community values, shaping her compassionate and organized personality.
