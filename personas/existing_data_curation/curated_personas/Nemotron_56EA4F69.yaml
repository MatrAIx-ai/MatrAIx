  career_goals: Yesenia dreams of a future where she can blend her love for art and compassion. She envisions becoming an illustrator who creates colorful books that teach kindness, a teacher who designs
    inclusive, creative lessons, or a pediatric nurse who comforts children. She also imagines caring for animals as a veterinarian, motivated by her deep empathy for all living beings. Ultimately, she
    wants a career that lets her help others and share joy through visual storytelling.
