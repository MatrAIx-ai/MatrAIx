personas:
  professional: Marlis Perez is a production planning clerk at a San Diego aerospace parts manufacturer, fluent in English and Spanish, who leverages SAP and Oracle to keep precise schedules, uses advanced
    Excel pivot tables and basic macros for data analysis, applies Lean 5S principles to maintain an orderly workspace, balances a methodical routine with occasional process‑improvement ideas, and quietly
    aims to earn the APICS CPIM certification and step into a full planner role within two years, which they view as essential for their long‑term growth.
  sports: Marlis Perez maintains a low‑impact fitness routine that includes early‑morning walks along the San Diego shoreline, a weekly beach‑run with a local running club, occasional beginner yoga classes,
    and avidly follows the San Diego Padres baseball team, the San Diego Wave FC women’s soccer squad, and the Los Angeles Lakers during NBA playoffs, a schedule they find balances activity and recovery.
  arts: Marlis Perez indulges in contemporary romance novels by Colleen Hoover and Nicholas Sparks, unwinds with nightly telenovela marathons of 'La Reina del Sur' and 'Rubí' with a close circle of friends,
    practices beginner yoga while listening to soothing playlists featuring Carla Morrison, and channels their organizational flair into DIY home‑storage projects inspired by interior designers like Marie
    Kondo, a pastime they find both calming and creatively satisfying.
  travel: Marlis Perez plans trips with spreadsheet precision, favoring short, well‑structured getaways such as a weekend road trip to Laguna Beach to sample local seafood, a culinary‑focused tour of Oaxaca’s
    markets for authentic mole and mezcal tasting, and a future dream itinerary to Kyoto’s tea gardens, all balanced against a modest student‑loan budget and a desire to return home for family obligations,
    a balance they carefully orchestrate each year.
  culinary: Marlis Perez delights in preparing traditional Mexican dishes for family gatherings, expertly simmering pozole rojo with hominy, chicken, and guajillo chilies, slow‑cooking mole poblano enriched
    with cacao and toasted sesame seeds, hand‑wrapping tender pork tamales with freshly harvested corn husks, and seasoning all creations with garden‑grown cilantro, oregano, and jalapeños, while occasionally
    experimenting with fusion twists like mole‑marinated grilled salmon, a culinary adventure they savor with each bite.
  core: Marlis Perez blends meticulous routine with heartfelt creativity, channeling a detail‑oriented work ethic into a budding production planning career and a home life filled with garden‑grown herbs,
    homemade Mexican feasts, and carefully plotted weekends of quiet walks and low‑key friends, a rhythm they cherish.
background:
  cultural: Marlis is a first‑generation Mexican‑American who grew up in San Diego's vibrant Barrio Logan neighborhood. Her parents, native Spanish speakers, emphasized familismo and the importance of community,
    so Spanish is spoken at home alongside English. She celebrates Día de los Muertos, quinceañeras, and the Christmas posada tradition, often preparing family‑style meals for these events. Her Catholic
    upbringing informs her respect for rituals and holidays, though she now identifies as spiritually flexible. Marlis participates in local cultural festivals, such as the annual Festival of Mexico, where
    she volunteers at food‑stall booths and helps organize community dances, keeping her connection to her heritage active while balancing her practical, routine‑focused lifestyle.
attributes:
  skills: '["Production scheduling","ERP (SAP/Oracle) operation","Inventory tracking and cycle counting","Advanced Excel (pivot tables, VLOOKUP, macros)","Bilingual supplier communication (English/Spanish)","Order
    expediting and on‑time delivery coordination","Lean and 5S process awareness","Documentation and compliance (ISO, safety standards)","Time management and task prioritization","Problem solving within
    routine workflows"]'
  hobbies: '["Traditional Mexican cooking","Herb and chili gardening","Morning beach walks","Journaling","Reading romance novels","Watching telenovelas with close friends","Beginner yoga","DIY home organization
    projects"]'
  career_goals: Marlis aims to move from a clerk position to a full production planner role within the next two years by completing the APICS CPIM certification and taking evening courses toward an associate
    degree in Business Administration. Her medium‑term ambition is to become an Operations Supervisor in a manufacturing or aerospace firm in the San Diego area, where she can lead a small team while still
    maintaining a predictable daily routine. Long‑term, she envisions transitioning into a supply‑chain analyst position that leverages her data‑driven mindset, allowing her to contribute to strategic decisions
    while preserving a work‑life balance that supports her personal responsibilities and family connections.
