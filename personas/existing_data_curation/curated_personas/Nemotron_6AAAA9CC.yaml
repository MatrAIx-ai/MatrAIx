  career_goals: Thomas aims to earn the New York State Master Plumber and Certified Steamfitter licenses within the next three years, positioning himself for a foreman role in his union local. He envisions
    launching a boutique contracting firm that specializes in sustainable heating retrofits for historic buildings in Troy, leveraging his curiosity about green technologies. To strengthen his expertise,
    he plans to become a LEED Green Associate and advise clients on energy‑saving measures. He also seeks to mentor a new generation of apprentices, eventually serving on the union’s apprenticeship committee,
    and hopes to earn recognition through competitive bids and regional awards for innovative, efficient installations while maintaining the flexibility to take on varied projects.
