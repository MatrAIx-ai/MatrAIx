  hobbies: '[''Gardening'', ''Church choir singing'', ''Bingo nights'', ''Bridge club'', ''Community volunteer driver'', ''Dog walking'', ''Cooking family recipes'', ''Local history museum tours'', ''DIY
    home projects'', ''Attending community festivals'']'
  career_goals: Maria aims to transition into a driver trainer role within the next two years, leveraging her years of experience to mentor younger drivers and promote a safety culture. She also hopes to
    obtain a certification in transportation management to qualify for a supervisory position overseeing route scheduling and fleet operations. Long-term, she envisions a phased retirement where she can
    work part-time, focusing on community outreach by providing transportation assistance to seniors and volunteering at local schools to teach road safety. She values job stability, steady income, and
    maintaining her active lifestyle, so her goals are centered around career continuity, skill development, and giving back to her community.
