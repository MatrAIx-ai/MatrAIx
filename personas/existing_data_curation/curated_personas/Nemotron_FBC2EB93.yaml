  career_goals: Anisha aims to advance to a senior management role within the next five years, targeting a Director of Operations position where she can oversee multi‑site operations and drive strategic
    growth. She plans to pursue an MBA part‑time to deepen her analytical expertise and broaden her leadership toolkit. Long‑term, she envisions founding a consultancy that helps mid‑sized companies implement
    inclusive workplace practices and operational efficiencies, while also creating mentorship pathways for Black women entering the business field.
