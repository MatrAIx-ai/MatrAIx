  career_goals: He aims to complete a bachelor's degree in Business Administration within the next two years, obtain a project management certification, and secure an entry‑level program coordinator position
    at a Philadelphia nonprofit focused on youth or community development. His long‑term ambition is to blend his organizational talent with his love for teamwork, progressing to program management and
    eventually leading his own community initiative while maintaining a stable, predictable career path.
