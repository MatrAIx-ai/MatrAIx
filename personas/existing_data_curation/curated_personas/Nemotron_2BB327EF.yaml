  career_goals: Carlos intends to transition from day‑to‑day deliveries to a supervisory role within a regional logistics firm, where he can mentor younger couriers and design efficient routing protocols.
    He plans to enroll in community‑college courses on supply‑chain management to formalize his knowledge. In the longer term, he dreams of launching a micro‑delivery service focused on serving seniors
    and small businesses in the Longwood area, leveraging his intimate knowledge of the neighborhood, bilingual skills, and reputation for reliability. Throughout, he seeks to maintain a work‑life balance
    that preserves his quiet, solitary work style while contributing to his community’s convenience.
