  hobbies: '["Urban sketching", "Digital illustration & collage", "Parametric design experimentation", "Contemporary art gallery visits", "Architecture lecture series attendance", "Yoga and mindfulness
    meditation", "Cooking traditional Korean and Chinese cuisine", "Community cultural festival volunteering", "Hiking in the Hudson Valley", "Reading speculative fiction and design theory"]'
  career_goals: Shoua aims to transition from a senior drafter role to a BIM coordination lead within a progressive architecture firm, where she can mentor junior staff and shape interdisciplinary workflows.
    Long‑term, she aspires to obtain her professional architect license, focusing on sustainable and culturally resonant design that blends East Asian spatial philosophies with contemporary Brooklyn contexts.
    She envisions contributing to landmark public projects that prioritize community engagement, environmental performance, and innovative form‑making through parametric design. Additionally, she hopes
    to author articles on the integration of traditional Asian architectural principles with modern digital design tools.
