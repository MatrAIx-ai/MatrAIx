personas:
  professional: An architectural drafter named Shoua Yun excels at producing meticulous construction documents, 3D visualizations, and BIM models, leveraging their analytical mindset and imaginative curiosity
    to integrate parametric design experimentation with strict building codes, while their organized nature ensures they consistently meet tight project deadlines.
  sports: Shoua Yun enjoys weekend hikes in the Hudson Highlands, belongs to a local NYC hiking club, follows the Brooklyn Nets and New York Rangers as their favorite professional teams, and participates
    in a low‑key recreational basketball league at a community center to stay active.
  arts: Shoua Yun frequently visits contemporary art spaces to study installations by James Turrell, experiential works by Yayoi Kusama, and digital collages by Refik Anadol, while their playlists feature
    ambient composer Brian Eno and experimental musician FKA Twigs, and they draw inspiration from the fluid lines of Zaha Hadid’s architecture in their own sketches.
  travel: Shoua Yun plans trips with a blend of meticulous itineraries and spontaneous detours, having backpacked through Kyoto’s historic temples, explored Seoul’s modern design districts, trekked the
    fjords of Norway, and day‑tripping to nearby Hudson Valley vineyards, they always budget for both airfare and a modest splurge on local artisanal cuisine.
  culinary: Shoua Yun’s kitchen showcases a mix of home‑cooked fermented vegetable pancakes, hand‑rolled dumplings, and aromatic mapo tofu, reflecting the family recipes passed down through generations,
    and they enjoy experimenting with gochujang‑marinated pork belly while keeping their culinary skill at an enthusiastic intermediate level.
  core: Shoua Yun balances a meticulous, anxiety‑prone mind with boundless creative curiosity, channeling disciplined design work into experimental art, diligent finances, and a habit of late‑night sketching
    that often ends with a bowl of homemade stew.
background:
  cultural: Shoua is a second‑generation East Asian American, with her parents having immigrated from South Korea and China to New York City. Raised in a bilingual household, she grew up celebrating both
    Korean and Chinese holidays, and she maintains a strong connection to the values of education, respect for craftsmanship, and communal harmony. These cultural influences inform her design sensibility,
    often inspiring her to incorporate spatial concepts such as fluid transitions and harmony with nature found in traditional East Asian architecture. Living in Brooklyn's vibrant multicultural environment,
    she balances her heritage with contemporary American urban life, actively engaging in local Asian community groups and cross‑cultural artistic collaborations.
attributes:
  skills: '["AutoCAD", "Revit (BIM)", "Rhino + Grasshopper (parametric modeling)", "SketchUp", "Adobe Photoshop & Illustrator", "GIS mapping for site analysis", "Construction drawing production", "Structural
