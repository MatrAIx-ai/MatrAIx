  career_goals: Looking ahead, Aaron aims to pivot his extensive engineering background toward sustainability consulting, helping small-scale developers in Queens incorporate green roofs, storm-water management,
    and energy-efficient materials. He is also committed to mentoring the next generation of engineers through part-time teaching at a community college and by establishing a modest consulting practice
    that offers pro-bono services for community-center renovations. Balancing his high-energy personality with his tendency toward anxiety, Aaron seeks a role that allows for more predictable schedules,
    remote work options, and opportunities to apply his methodical planning skills while maintaining meaningful social interaction.
