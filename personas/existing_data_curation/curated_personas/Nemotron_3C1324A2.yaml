personas:
  professional: Tam­mera Storey is a budding biomedical research assistant and freelance UI/UX designer who leverages Python‑driven data analysis and Procreate illustration skills to transform complex scientific
    findings into intuitive visual narratives, thriving in small flexible teams despite occasional disorganization, and assertively championing interdisciplinary collaboration.
  sports: Tam­mera Storey channels an adventurous spirit into weekend hikes along the Scioto River and Hocking Hills, is an active member of the Chillicothe Trail Club, and follows the Cleveland Browns,
    Cleveland Guardians, and Ohio State Buckeyes with spirited loyalty, while they rarely engage in organized team sports, preferring solo trail runs and occasional pick‑up ultimate frisbee games with friends.
  arts: Tam­mera Storey immerses themselves in a rich tapestry of creative pursuits, from crafting digital paintings of riverine landscapes in Procreate inspired by James Gurney and Hayao Miyazaki, to devouring
    the speculative worlds of N.K. Jemisin and Brandon Sanderson, while they unwind to indie vinyl records by Sufjan Stevens, Tame Impala, and Mitski, and they regularly host intimate board‑game nights
    featuring titles like Terraforming Mars and Catan.
  travel: Tam­mera Storey embraces a wanderlust that balances curated budget trips and spontaneous escapes, having hiked the waterfalls of Hocking Hills and explored the street art of Cincinnati, while
    dreaming of a solo spring pilgrimage to Kyoto’s cherry blossoms and an adventurous Icelandic road trip to the Blue Lagoon, all planned through a mix of student‑discounted flights, hostel stays, and
    meticulously annotated travel journals.
  culinary: Tam­mera Storey delights in experimental home cooking, frequently whipping up miso‑glazed salmon, vegan lentil‑curry with turmeric and coconut milk, and hand‑rolled sushi featuring avocado,
    cucumber, and pickled ginger, while they savor the rustic flavors of Ohio farmer’s market heirloom tomatoes and often sprinkle rosemary or smoked paprika into spontaneous weekday meals.
  core: Tam­mera Storey is a curious, art‑infused science enthusiast who balances meticulous data work with spontaneous creative bursts, prefers quiet solitude peppered with indie vinyl, and navigates life’s
    obligations with a laid‑back, sometimes haphazard, yet passionately collaborative mindset.
background:
  cultural: Tammera grew up in Chillicothe, Ohio, a modest Midwestern town where community ties, modesty, and a strong work ethic are valued. Her family, of mixed Irish and German ancestry, emphasized education
    and self‑reliance while participating in typical local traditions such as county fairs, high‑school sports events, and seasonal festivals. The region’s quiet, close‑knit environment nurtured her comfort
    with solitude and preference for small groups, yet her college experience introduced her to broader cultural currents and unconventional ideas. While she resonates with the friendly, down‑to‑earth demeanor
    of the Midwest, she also embraces diverse artistic influences accessed through online platforms, allowing her to blend her local roots with a global, progressive outlook.
attributes:
  skills: '[''Python programming'', ''R and SPSS statistical analysis'', ''Laboratory techniques (PCR, microscopy, cell culture)'', ''Digital illustration (Procreate, Photoshop)'', ''Creative coding (Processing,
    p5.js)'', ''Scientific writing'', ''Agile project management'', ''Effective communication and presentation'', ''DIY electronics (Arduino, Raspberry Pi)'', ''3D modeling (Blender)'']'
  hobbies: '[''Digital painting'', ''Sketching (traditional media)'', ''Reading science‑fiction and fantasy novels'', ''Hiking and nature walks'', ''Nature photography'', ''Board‑game nights with friends'',
    ''Listening to indie music'', ''Experimental cooking'', ''Volunteering at community STEM workshops'', ''VR gaming'']'
  career_goals: Tammera aims to bridge the gap between scientific insight and visual storytelling. In the short term she plans to secure a research assistantship in a biomedical lab where she can apply
    her analytical skills while contributing to data visualization projects. She also hopes to freelance as a UI/UX designer for educational technology startups, creating engaging interfaces that make complex
    concepts accessible. Long‑term, she envisions pursuing a master’s degree in Human‑Computer Interaction or STEAM education, ultimately leading interdisciplinary teams that develop interactive platforms
    or public installations that blend art, science, and technology. Flexibility, creativity, and small‑team collaboration are core to her professional aspirations.
