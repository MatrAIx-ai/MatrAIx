  hobbies: '[''Reading science-fiction and non-fiction'', ''Coding small Python projects'', ''Building LEGO and model kits'', ''Playing chess'', ''Robotics club'', ''Debate team'', ''Hiking'', ''Photography'',
    ''Library volunteer work'']'
  career_goals: Lafreda aims to pursue a career in engineering—preferably mechanical or civil engineering—with a focus on sustainable infrastructure and practical problem solving. In the near term, she
    plans to enroll in advanced STEM courses, take on leadership roles in her school’s robotics and debate teams, and attend summer STEM camps. Her long‑term ambition is to study at a top university, obtain
    an engineering degree, and develop innovative, community‑focused solutions that blend new ideas with proven methods.
