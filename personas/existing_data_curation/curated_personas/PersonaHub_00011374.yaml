persona_description: A scientist who specializes in visual perception and neuroscience, particularly in the fields of stereoscopic depth perception and motion parallax perception. They have developed a
  visual display system that allows researchers to study these cues separately or in concert in rhesus macaques. Their results suggest that the parasol and midget systems play crucial roles in processing
  these cues, with the parasol system being more effective at processing motion parallax cues and the midget system being more effective at processing stereoscopic depth perception at high spatial frequencies.
