personas:
  professional: Hanh Dao, a retired community volunteer who quietly organizes cultural events, leverages their practical budgeting skills, bilingual translation ability, and expertise in small‑batch Vietnamese
    cooking to support neighbors while maintaining a structured yet flexible daily routine.
  sports: Hanh Dao favors gentle low‑impact exercise, taking solitary strolls along Griffith Park’s quieter trails in the cooler months, follows the Los Angeles Dodgers for a sense of community, and participates
    in a senior yoga class once a week to maintain flexibility without the stress of competitive sport.
  arts: Hanh Dao spends evenings immersed in classic Vietnamese folk songs by Trịnh Công Sơn and timeless American films like ‘Casablanca’, while drawing creative inspiration from the watercolor paintings
    of Nguyễn Phan Chánh and the intricate fiber works of contemporary artist Maureen O’Connor, which informs their crochet designs.
  travel: Hanh Dao prefers low‑key, meticulously planned trips such as weekend visits to the historic Mission San Juan Capistrano and a tranquil tea‑house stay in Kyoto, while dreaming of a brief, health‑conscious
    pilgrimage to their hometown in Vietnam that balances nostalgia with practicality.
  culinary: Hanh Dao expertly crafts small‑batch Vietnamese staples like pho ga with fresh basil and mint from their balcony garden, rolls delicate fresh spring rolls using home‑grown herbs, and occasionally
    enjoys a visit to a local dim sum spot for shrimp har gow, all while preferring home‑cooked meals that allow precise control over portions and flavors.
  core: Hanh Dao is a quietly diligent octogenarian who balances a love of structured routines with a soothing penchant for solitary puzzles, herb‑filled balconies, and careful budgeting, all while quietly
    wrestling with occasional worry.
background:
  cultural: Hanh’s family arrived in Los Angeles as refugees after the Vietnam War, settling in the vibrant Little Saigon community. Raised with Vietnamese customs, she grew up bilingual, speaking Vietnamese
    at home and English at school. Her cultural identity is shaped by traditions such as Tet (Lunar New Year), ancestor worship, and the importance of family gatherings centered around food. She continues
    to celebrate major holidays with authentic dishes, participates in community festivals, and maintains connections with the local Vietnamese church, where she occasionally volunteers in back‑stage food
    preparation. Hanh’s Southeast Asian heritage influences her culinary tastes, her reverence for modest living, and her respect for the elder members of her community.
