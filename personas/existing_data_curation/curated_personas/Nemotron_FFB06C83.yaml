  hobbies: '[''Reading historical fiction'', ''Knitting and crocheting'', ''Herb container gardening'', ''Crossword and Sudoku puzzles'', ''Listening to traditional Vietnamese music'', ''Cooking family
    recipes'', ''Journaling'', ''Nature walks in quiet parks'']'
  career_goals: Although retired, Hanh’s primary ambition is to maintain her health, safety, and independence as she ages. She aims to keep a simple, predictable daily routine that reduces stress while
    allowing enough flexibility to enjoy spontaneous activities like visiting a quiet park or a tea house. She hopes to compile a family recipe booklet that records her culinary heritage for future generations
    and to share it during Tet celebrations. Hanh also aspires to deepen her digital skills enough to stay in touch with distant relatives via video calls and to participate in low‑stress volunteer roles
    that let her contribute without overwhelming social demands. A modest goal is to make a short pilgrimage to her hometown in Vietnam, if her health permits.
