  hobbies: '[''Chess'', ''Poker'', ''Running'', ''DIY Home Improvement'', ''Hiking'', ''Reading Non-fiction (Business, Technology, Psychology)'', ''Podcast Listening'', ''Wine Tasting'', ''Landscape Photography'']'
  career_goals: Josiah aims to progress from his current managerial role to a senior director or vice‑presidential position overseeing operations for a regional or national organization. He plans to earn
    PMP and Six Sigma Black Belt certifications, deepen his expertise in data‑driven decision making, and lead large‑scale transformation projects that deliver measurable cost savings. In the longer term,
    he envisions launching an independent consulting practice focused on operational excellence for government contractors and tech firms in the D.C. area. He also seeks to mentor emerging managers and
    be recognized as an authority in process improvement within his industry.
