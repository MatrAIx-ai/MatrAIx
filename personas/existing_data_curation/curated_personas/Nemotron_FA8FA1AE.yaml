personas:
  professional: Michael Ramirez is an aspiring computer engineer who leverages their proficiency in Python, C++, and hands‑on hardware prototyping to develop energy‑efficient IoT solutions, while their
    meticulous skepticism and organized project‑management style keep their remote‑work ambitions both reliable and innovative.
  sports: Michael Ramirez is a dedicated solo hiker who traverses the Saginaw Bay shoreline each weekend, follows the Detroit Lions for NFL excitement, and holds a seasonal membership with the Great Lakes
    Trail Club, and they prefer low‑impact cardio over team sports.
  arts: Michael Ramirez channels their love of instrumental scores—especially those of Hans Zimmer, Vangelis, and John Williams—into late‑night coding sessions, while their weekend landscape photography
    draws inspiration from Ansel Adams and the tranquil vistas of the Great Lakes.
  travel: Michael Ramirez plans trips with meticulous spreadsheets, favoring budget‑friendly road trips to Ohio’s Hocking Hills, and they dream of a future solo pilgrimage to Tokyo’s Akihabara district
    to explore cutting‑edge robotics.
  culinary: Michael Ramirez prefers quick, protein‑rich meals such as chicken teriyaki bowls with brown rice and steamed broccoli, but their culinary curiosity pushes them to experiment with homemade ramen
    broth flavored by miso and kombu when time permits.
  core: Michael Ramirez is a solitary tech‑enthusiast who obsessively fine‑tunes custom PCs, hoards gadgets, and sometimes procrastinates on social invites, and they thrive on puzzle‑solving marathons.
background:
  cultural: Michael L. Ramirez was raised in Freeland, a small community in Midland County, Michigan. Though his surname reflects Hispanic ancestry, tracing back to a great‑grandfather who immigrated from
    Mexico, he identifies primarily with the Midwestern, white cultural milieu of his family, which includes roots in German and Irish settler families that have lived in the region for generations. He
    grew up attending public schools, participating in local events such as the county fair and community volunteer drives, and celebrating mainstream American holidays like Thanksgiving and the Fourth
    of July. Family gatherings occasionally feature traditional Mexican dishes, reflecting a blended cultural heritage. The values of self‑reliance, modesty, and a strong work ethic common to the Midwest
    have shaped his outlook, while his curiosity about technology and independent learning reflects a more modern, globally connected perspective.
attributes:
  skills: '[''Python programming'', ''C++ programming'', ''Hardware troubleshooting'', ''Custom PC building'', ''Data analysis with Excel and SQL'', ''CAD modeling (SolidWorks)'', ''Technical documentation'',
    ''Project management (Trello, Gantt charts)'', ''Independent research'', ''Strategic planning'']'
  hobbies: '[''Reading science fiction novels'', ''Solo video gaming (strategy and RPG)'', ''Building and modifying custom PCs'', ''Arduino and Raspberry Pi projects'', ''Hiking alone in local nature trails'',
    ''Puzzle solving (Sudoku, logic puzzles)'', ''Watching science and technology documentaries'', ''Technical blogging'', ''Photography of natural landscapes'', ''Listening to instrumental music'']'
  career_goals: Michael aims to complete his associate degree in Computer Engineering and transition to a bachelor's program in Computer Science within the next two years. His short‑term goal is to secure
    an internship or entry‑level software engineering position that allows remote work, so he can maintain the quiet environment he thrives in. He is particularly interested in embedded systems and energy‑efficient
    home automation, hoping to develop a marketable product that merges hardware and software solutions. He also plans to participate in hackathons and coding competitions to benchmark his skills against
    peers, reflecting his competitive drive. Long‑term, Michael aspires to become a lead developer or technical consultant, earning relevant certifications such as CompTIA A+, Network+, and Cisco CCNA,
    and eventually launching his own freelance consultancy focused on IoT solutions for small businesses in the Midwest.
