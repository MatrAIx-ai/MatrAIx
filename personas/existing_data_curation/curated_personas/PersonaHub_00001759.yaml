persona_description: 'A former education secretary who oversaw the controversial plans to replace GCSEs with the English Baccalaureate Certificate (EBC), a decision that was called the biggest overhaul
  in a generation. Gove''s plans were opposed by coalition partners, the Liberal Democrats, in addition to other parties, teachers, and regulators. The decision to drop his plans was a "bridge too far"
  and a "humiliating climb down". Gove''s U-turn was seen as a "tweak" by some, while others referred to it as a "humiliating climb down". The new computer science curriculum will teach children the basics
  of algorithms and programming from as early as Key Stage 1 (KS1), aged 5-7. The curriculum states that from KS1, pupils will: "Understand what algorithms are, how they are implemented as programs on digital
  devices and that programs execute by following a sequence of instructions."'
