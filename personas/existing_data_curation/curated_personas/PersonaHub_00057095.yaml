persona_description: A researcher who is passionate about the decline of amphibian species in Latin America and has expertise in herpetology, specifically in the study of amphibians and reptiles. He is
  also interested in the evolution of the nervous system and sense organs in amphibians and reptiles. He has experience in monitoring and analyzing the decline of amphibian populations through the use of
  standard methods and has published research on the topic. He is a member of the Sixth Sense - Fish and the Lateral-line System group and is interested in the use of brain-based teaching strategies to
  create supportive learning environments.
