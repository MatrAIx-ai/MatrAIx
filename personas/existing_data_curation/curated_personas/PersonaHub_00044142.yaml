persona_description: A researcher and scientist who specializes in the field of medical microbiology and infectious diseases, particularly in the study of antibiotic resistance and the development of early
  warning systems. She has expertise in medical microbiology, genomics, proteomics, molecular typing, bacterial pathogenicity, and computational analysis. She has led projects that have focused on identifying
  and targeting resistant and multi-resistant bacterial strains that pose the greatest health challenges in Europe. She has experience in sequencing bacterial strains and has a background in bioinformatics.
  She is passionate about addressing the public health threat of antibiotic resistance and has a track record of successfully developing early warning systems for antibiotic resistance.
