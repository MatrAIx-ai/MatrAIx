  hobbies: '[''Watercolor Painting'', ''Sketching'', ''Arduino Projects'', ''Raspberry Pi DIY'', ''Reading Science Fiction'', ''Photography'', ''Birdwatching'', ''Gardening'', ''Local Book Club'', ''Volunteer
    Art Discussions'']'
  career_goals: Milton aims to transition into a store‑manager role where he can lead a close‑knit team, implement process improvements, and mentor new associates. He also envisions opening a niche boutique
    that fuses his love of technology and art, offering curated maker kits, 3‑D‑printing supplies, and locally sourced art materials. To support these ambitions, he plans to complete a retail‑management
    certification, attend workshops on small‑business finance, and stay current with emerging tech trends such as IoT and digital fabrication. Additionally, he hopes to volunteer as a guest speaker for
    community STEM‑outreach programs, sharing his blend of technical expertise and artistic appreciation.
