personas:
  professional: Milton Mitten, a 50-year-old retail veteran with a STEM degree, blends deep technical knowledge of electronics and home-improvement products with an eye for visual merchandising, turning
    complex gadget specs into clear customer conversations while steering his store's displays toward functional art, and they now seek a manager role to mentor staff and launch a boutique that fuses maker
    kits with locally sourced art supplies.
  sports: Milton Mitten, a 50-year-old birdwatcher and weekend angler, follows the Indianapolis Colts and Indiana Pacers on television, participates in a local walking club that meets at the Trail of Tears
    State Park, and they enjoy occasional casual softball games with the community center crew.
  arts: Milton Mitten, an avid watercolorist and community art-appreciation facilitator, draws inspiration from Andrew Wyeth and Monet, curates photographs of rustic Indiana barns reminiscent of Ansel Adams,
    and they frequently revisit the Fountain County Art Fair to discover emerging folk artists like Sarah Kline.
  travel: Milton Mitten plans low-key travel adventures, favoring weekend getaways to the Indiana Dunes and annual trips to Asheville, NC for its vibrant craft scene, while dreaming of a spring tour of
    the Dutch tulip fields, and they always pack a sketchbook and a portable Raspberry Pi for on-the-road tinkering.
  culinary: Milton Mitten, a garden-to-table enthusiast, loves crafting fresh beet and goat-cheese salads, slow-cooking hearty chicken pot pie with a flaky crust, and experimenting with homemade kimchi
    and occasional jalapeno-infused cornbread, all while savoring a well-chewed cup of black coffee with a splash of oat milk, and they relish sharing the dishes with friends at the community center potluck.
  core: Milton Mitten fuses technical curiosity with artistic calm, habitually juggling Arduino projects between watercolor sessions, yet often forgets to water the lettuce they just harvested, revealing
    a charming blend of focus and absent-mindedness.
background:
  cultural: Milton was born and raised in Newtown, Indiana, a community rooted in Midwestern values of hard work, modesty, and neighborly cooperation. His family traces its ancestry to German and Irish
    immigrants who settled the region in the late 19th century, bringing traditions of community gatherings, county fairs, and a respect for practical craftsmanship. Growing up on the edge of farmland taught
    him self‑reliance and an appreciation for seasonal cycles, which later informed his interest in gardening and sustainable living. His education at a state university exposed him to broader scientific
    and artistic ideas, yet he remains deeply connected to hometown staples—high‑school basketball, church potlucks, and the annual Fountain County Fall Festival—where he often volunteers. This blend of
    Midwestern modesty, a pragmatic work ethic, and a lifelong curiosity about art and technology shapes his worldview and daily life.
attributes:
  skills: '[''Customer Service'', ''Technical Product Knowledge'', ''Inventory Management'', ''Data‑Driven Sales Analysis'', ''Basic Programming (Python)'', ''DIY Electronics Troubleshooting'', ''Visual
