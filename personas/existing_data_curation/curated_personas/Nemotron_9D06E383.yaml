  hobbies: '[''Genealogy research'', ''Historical fiction reading'', ''Quilting and cross‑stitch'', ''Herb gardening'', ''Book club (small group)'', ''Volunteer at public library'', ''Birdwatching'', ''Crossword
    puzzles'']'
  career_goals: At 72, Tula seeks to transition into a part‑time, advisory role where she can share her organizational expertise with younger colleagues. She aims to become a senior mentor or consultant
    for small nonprofit offices, helping them streamline workflows and adopt digital filing practices. Additionally, she hopes to volunteer as a records‑management trainer at the local community center
    and to complete a short‑term certification in cloud‑based project management to stay current with emerging tools. Maintaining financial independence, fostering intergenerational knowledge transfer,
    and contributing to the civic life of Webster are her primary professional aspirations.
