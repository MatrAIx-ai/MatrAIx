personas:
  professional: Michael Taylor is a budding engineer-in‑training who treats every LEGO Technic set and Minecraft build like a real-world project, blending a love for structured, step‑by‑step instructions
    with occasional spur‑of‑the‑moment redesigns, and uses their natural kindness to help classmates troubleshoot.
  sports: Michael Taylor enjoys weekend hikes on Brushy Creek Trail with a small group of friends, is a member of the local junior hiking club, cheers loudly for the nearby high school Tigers football team
    during Friday night tailgates, and occasionally practices soccer drills at the community park, viewing physical activity as a way to reset after long gaming sessions.
  arts: Michael Taylor draws comic panels inspired by classic artists like Stan Lee, strums acoustic guitar chords reminiscent of John Mayer while writing simple lyrics about adventures, and devours science‑fiction
    novels such as Ender’s Game and Ready Player One, letting those stories fuel both their sketches and song ideas.
  travel: Michael Taylor prefers short, budget‑friendly road trips to nearby state parks like Red Rock Canyon and occasional family visits to the Space Center in Houston, but dreams of a future independent
    adventure to Tokyo’s Akihabara district to explore LEGO exhibitions and anime culture, always planning trips around school breaks and summer vacation.
  culinary: Michael Taylor loves to whip up quick meals like pepperoni pizza with extra cheese, hearty spaghetti Bolognese, and homemade chicken quesadillas, and enjoys experimenting with snack ingredients
    like cheddar cheese, pepperoni slices, and jalapeños for their favorite after‑gaming midnight bites.
  core: Michael Taylor is a methodical yet spontaneously creative 13‑year‑old who balances LEGO precision with gaming improvisation, saving for big projects while occasionally impulsively splurging, and
    channels their kindness into helping friends and animals alike.
background:
  cultural: 'Michael grew up in a middle‑class, suburban Texan family in Round Rock, Williamson County. His household reflects typical Central Texas values: a strong emphasis on community, self‑reliance,
    and respect for local traditions such as high‑school football, BBQ gatherings, and outdoor recreation. He attends a public middle school where multicultural awareness is promoted, but his immediate
    cultural environment is predominantly White American, with occasional participation in church youth groups and community service projects. The mix of Texas pride, an emphasis on practical education,
    and a supportive, cooperative family life shapes his worldview and aspirations.'
