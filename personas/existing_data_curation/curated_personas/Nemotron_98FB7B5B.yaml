  career_goals: Michael hopes to pursue a career that blends his love of building with his desire to help his community. He is attracted to civil engineering or mechanical engineering, especially projects
    that improve local infrastructure, such as parks and bike trails. He also imagines studying environmental science to design sustainable solutions. In the long term, he aims to attend a Texas university,
    earn an engineering degree, and work on projects that make Round Rock a more livable, environmentally friendly city, while also keeping space for creative problem‑solving and occasional hands‑on tinkering.
