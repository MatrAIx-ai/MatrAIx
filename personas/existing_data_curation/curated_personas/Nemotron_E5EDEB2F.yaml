  hobbies: '[''DIY electronics projects'', ''Scale model building'', ''Strategy video games'', ''Chess'', ''Weightlifting'', ''Hiking in the San Bernardino Mountains'', ''Cooking traditional Mexican cuisine'',
    ''Listening to regional Mexican music'', ''Guided meditation'', ''Reflective journaling'']'
  career_goals: Luis aims to become a certified fiber‑optic specialist (CFOT) within the next two years and to lead a crew of line technicians on larger infrastructure projects. He plans to pursue additional
    coursework to earn an associate’s degree in electrical engineering technology and eventually a bachelor’s in telecommunications engineering. His long‑term ambition is to transition into a project‑manager
    role overseeing regional network roll‑outs, and he aspires to eventually start his own contracting business that provides high‑quality, safety‑focused telecom installation services in Southern California.
    Luis’s competitive nature drives him to seek industry certifications and measurable performance metrics, while his desire for personal stability motivates him to secure a career path that offers both
    professional growth and financial security.
