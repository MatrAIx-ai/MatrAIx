    strategy'', ''Real estate law and ethics compliance'', ''Time management and systematic organization'']'
  hobbies: '[''Gardening'', ''Volunteer housing counseling at senior center'', ''Historical preservation society involvement'', ''Riverfront trail walking'', ''Reading historical fiction'', ''Quilting'',
    ''Drone photography'', ''Cooking new recipes'', ''Attending real estate seminars'']'
  career_goals: Mirna aims to solidify her reputation as Topeka’s go‑to senior real‑estate specialist while gradually transitioning to a mentorship role. She plans to earn the Certified Residential Specialist
    (CRS) and Senior Real Estate Specialist (SRES) designations, build a modest portfolio of rental properties to generate passive income, and develop a niche service helping fellow seniors downsize or
    relocate. By leveraging her competitive drive, she seeks to maintain a top‑ranking sales position for the next two years, then shift to part‑time consulting and coaching for younger agents, ensuring
    a comfortable retirement while leaving a lasting professional legacy.
