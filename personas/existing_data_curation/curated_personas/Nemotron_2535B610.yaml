personas:
  professional: Mirna Fuller is a senior real‑estate specialist in Topeka who leverages precise market analyses, competitive negotiation tactics, and cutting‑edge drone photography to guide seniors through
    downsizing, while they also methodically mentor younger agents toward a future part‑time consulting role.
  sports: Mirna Fuller enjoys low‑impact fitness by walking the riverfront trail, playing weekly pickleball at the senior center, and cheering on the Kansas City Chiefs and the Kansas State Wildcats, while
    they balance a competitive streak on the court with a relaxed spectator attitude.
  arts: Mirna Fuller blends creative pursuits by quilting intricate patchwork blankets inspired by Monet’s water lilies, curating drone‑photography portfolios of Topeka’s historic districts, and attending
    local theater productions featuring works by August Wilson, all of which deepen their appreciation for both classic and contemporary art.
  travel: Mirna Fuller prefers purposeful travel, often planning weekend road trips to historic sites like Gettysburg and culinary excursions to New Orleans for Cajun‑Midwest fusion, while they balance
    their desire for adventure with a modest fixed income that limits long‑haul flights.
  culinary: Mirna Fuller experiments in the kitchen by pairing Midwestern comfort staples—such as a buttery corn casserole—with global flavors like Thai basil and Korean gochujang, frequently using fresh
    herbs from their garden to craft dishes like lemongrass‑infused chicken pot pie or kimchi‑topped pork chops.
  core: Mirna Fuller embodies a competitive, curiosity‑driven senior who channels meticulous organization into real‑estate mastery, garden stewardship, and a quirky habit of capturing neighborhood roofs
    with a drone while they occasionally over‑commit to volunteer projects.
background:
  cultural: Mirna identifies as a white Midwestern woman with deep roots in Kansas. Her family heritage traces back to German and Irish ancestors, reflecting the region’s European immigrant history. She
    embraces the practical, community‑oriented values common to the Plains—self‑reliance, modesty, and a strong work ethic—while also appreciating the cultural traditions of local churches and neighborhood
    gatherings. Her upbringing in Topeka instilled a respect for fiscal prudence and a commitment to serving her neighbors, shaping both her professional demeanor and personal pursuits.
attributes:
  skills: '[''Residential property valuation'', ''Comparative market analysis'', ''Complex negotiation'', ''Transaction coordination and contract compliance'', ''Digital marketing (virtual tours, drone
