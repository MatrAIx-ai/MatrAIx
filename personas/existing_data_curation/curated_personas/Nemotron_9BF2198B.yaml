personas:
  professional: Jeremy Porth is a high‑school senior who leads competitive gaming squads, tinkers with automotive mechanics, and aspires to join the Army as a diesel mechanic, leveraging his hands‑on curiosity,
    practical mindset, and natural leadership to blend tech and mechanical expertise.
  sports: Jeremy Porth competes in a local basketball league and a flag‑football club, avidly follows the NBA’s Boston Celtics and the NFL’s Dallas Cowboys, and maintains a regimen of daily calisthenics
    and weekend hikes to keep his endurance high, but his laid‑back approach sometimes leads to missed workouts.
  arts: Jeremy Porth enjoys streaming his gaming highlight reels set to the beats of Imagine Dragons and deadmau5, watches esports documentaries on YouTube, and occasionally sketches custom car designs
    inspired by classic Muscle car aesthetics, though he rarely pursues formal art training.
  travel: Jeremy Porth prefers spontaneous weekend road trips to nearby state parks such as Shenandoah for fishing and camping, dreams of a spring pilgrimage to Japan’s Tokai region to experience its tuning
    scene, yet his budget‑conscious mindset often anchors him to local getaways.
  culinary: Jeremy Porth’s go‑to meals are a greasy pepperoni pizza, homemade burgers topped with cheddar and pickles, and a post‑gaming protein shake blended with whey, banana, and peanut butter, while
    his cooking skill hovers around mastering the perfect grilled cheese.
  core: Jeremy Porth is a competitive, tech‑savvy teen who juggles gaming, gear‑heads, and group sports, thriving on adrenaline while occasionally letting disorganization and impulse spending trip him up.
background:
  cultural: Jeremy grew up in Coryell County, Texas, an area that blends Southern hospitality, Texan independence, and a strong military presence due to the nearby Fort Cavazos. His community emphasizes
    self‑reliance, respect for service members, and a love of outdoor activities typical of the Texas Hill Country. Exposure to both civilian and military cultural norms has fostered a pragmatic outlook,
    patriotism, camaraderie, and a preference for flexible, hands‑on approaches to life.
attributes:
  skills: '[''Automotive maintenance'', ''Basic electronics troubleshooting'', ''Team sports coordination'', ''Strategic gaming'', ''Video editing basics'', ''Social communication'']'
