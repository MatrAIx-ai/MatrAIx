  career_goals: Jeremy aims to enlist in the U.S. Army after completing high school to receive technical training and gain discipline. He hopes to become an automotive or diesel mechanic within the Army,
    earn certifications, and later transition into a civilian career in automotive technology or heavy‑equipment maintenance. His competitive drive pushes him toward leadership roles, such as becoming a
    non‑commissioned officer, where he can motivate peers. If military service does not materialize, he is interested in a vocational apprenticeship in automotive repair to become a certified mechanic.
