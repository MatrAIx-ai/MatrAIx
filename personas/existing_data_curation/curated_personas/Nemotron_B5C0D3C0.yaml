personas:
  professional: Carmen James is an aspiring visual communicator who blends hand-drawn illustration, Procreate digital art, and a burgeoning talent for community leadership, channeling their curiosity and
    occasional worry into meticulously organized yet creatively flexible design projects.
  sports: Carmen James enjoys sprinting during gym class, plays on the Rowesville High Tigers intramural basketball squad, cheers for the Atlanta Falcons on weekends, and follows the US Women's National
    Soccer Team, viewing sports as a brief outlet for stress relief amid a busy creative schedule, and they often use a quick jog to clear their mind after intense art projects.
  arts: Carmen James draws inspiration from the bold street art of Jean-Michel Basquiat, the soulful vocals of Aretha Franklin, the rhythmic energy of gospel choirs, the lyrical depth of Kendrick Lamar,
    and the visual storytelling of graphic novels like Sandman, they weave these influences into experimental sketches that fuse traditional media with digital coloring, which they frequently share on TikTok.
  travel: Carmen James prefers short, purposeful road trips - such as weekend visits to Savannah's historic squares, New Orleans' jazz districts, and a school-organized field trip to Washington, D.C.'s
    Smithsonian - while dreaming of a solo backpacking adventure through Berlin's vibrant mural scene when finances allow, and they hope each journey will spark fresh ideas for their artwork.
  culinary: Carmen James delights in preparing Southern comfort meals like buttermilk fried chicken, collard greens seasoned with smoked paprika, and buttery cornbread, often experimenting by adding a splash
    of hot sauce to mac & cheese and proudly showcasing the dishes on TikTok, which they use as a way to unwind after long creative sessions.
  core: Carmen James is a creatively restless teen who channels chronic worry into midnight sketch sessions, and they balance a love for community service with an occasional over-indulgence in art-supply
    impulse buys, habitually narrating their process in rapid-fire TikTok clips.
background:
  cultural: Carmen grew up in Rowesville, a small town in Orangeburg County, South Carolina, where the African‑American community forms the cultural core. Her upbringing is steeped in church life, family
    gatherings, and the oral storytelling tradition that carries the legacy of the civil‑rights movement in the South. The local culture emphasizes community support, soulful music, and Southern cooking,
    shaping her tastes and values. She celebrates events such as Juneteenth and participates in church services that blend gospel singing with spoken word. While honoring these traditions, Carmen also engages
    with contemporary Black youth culture through social media, modern hip‑hop, and online art communities, creating a hybrid identity that blends historic resilience with present‑day creativity.
attributes:
  skills: '[''Digital illustration (Procreate)'', ''Hand‑drawing and sketching'', ''Creative writing (poetry and journaling)'', ''Basic photography'', ''Social media content creation (Instagram & TikTok)'',
    ''Organizational skills for school projects'', ''Public speaking in class presentations'', ''Peer mediation and conflict resolution'']'
  hobbies: '[''Sketching and painting'', ''Listening to music (gospel, soul, hip‑hop)'', ''Writing poetry and journaling'', ''Reading graphic novels'', ''Creating short TikTok videos'', ''Cooking Southern
    comfort dishes with family'', ''Volunteering at the community library’s youth reading program'', ''Gardening in the school’s plot'']'
  career_goals: Carmen aims to earn a scholarship to an HBCU where she can major in visual communications or art therapy. She envisions a career as a graphic designer who weaves Black cultural motifs into
    modern branding, and later hopes to open a community art space in Rowesville that offers workshops and mental‑health‑focused creative programs for local teens. In the short term she is building a strong
    portfolio, seeking mentorship at local nonprofits, and developing the organizational and leadership skills she values, all while remaining mindful of her own stress and wellbeing.
