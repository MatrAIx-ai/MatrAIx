  career_goals: 'Even at five, Tien Jin dreams big: he wants to become an astronaut‑artist who explores space while painting the wonders he sees, and he also imagines inventing new toys that combine science
    and art. His curiosity about the universe and love of creativity drive him to set goals of learning about planets, building simple prototypes, and sharing his art with others.'
