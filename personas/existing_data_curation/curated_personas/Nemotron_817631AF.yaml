personas:
  professional: An imaginative five‑year‑old builder, Tien Zhang spends hours arranging LEGO structures with careful organization while allowing for spontaneous redesigns, showcasing early problem‑solving
    skills, reliability, and a curiosity for unconventional creations.
  sports: An energetic youngster, Tien Zhang dashes through backyard obstacle courses in summer, attends weekly soccer practice with the Little Kickers youth club, wears a cap supporting the New York Knicks,
    and occasionally watches NBA playoffs, merging a love for movement with a budding fandom for professional basketball.
  arts: A budding art enthusiast, Tien Zhang spends afternoons finger‑painting bright landscapes, giggles at the whimsical antics of ‘Adventure Time’, sings along to Disney’s ‘Moana’ soundtrack, and enjoys
    simple origami inspired by YouTube tutorials, weaving visual and auditory creativity into daily play.
  travel: A curious traveler, Tien Zhang has trekked through the nearby zoo’s monkey enclosure, marveled at the fireworks at Disneyland in California, and daydreams about building sandcastles on the beaches
    of Bali, balancing brief, parent‑guided excursions with big‑picture global curiosity.
  culinary: A food‑loving youngster, Tien Zhang enjoys spooning up cheesy mac & cheese, snacking on crisp apple slices dipped in peanut butter, assembling mini pepperoni pizzas with pre‑shredded mozzarella,
    and occasionally experimenting with rainbow fruit kebabs featuring grapes, strawberries, and banana slices.
  core: Tien Zhang is a curious five‑year‑old who delights in creating colorful art and imaginative games, yet often frets over tiny details, clutches a lucky stuffed rabbit for comfort, and habitually
    lines up toy cars in perfect rows before playtime.
background:
  cultural: Tien Jin comes from a Chinese‑American family in Fairfield, California. At home, Mandarin is spoken alongside English, and family traditions such as celebrating Lunar New Year, eating dumplings,
    and giving red envelopes are observed. His parents emphasize early education, respect for elders, and a blend of Confucian values with the openness of Californian culture. He participates in local community
    events, enjoys multicultural festivals, and is shaped by both his heritage’s emphasis on diligence and the West Coast’s encouragement of curiosity and self‑expression.
