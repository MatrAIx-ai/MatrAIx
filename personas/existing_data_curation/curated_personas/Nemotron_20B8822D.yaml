personas:
  professional: An aircraft maintenance technician at a regional carrier, Traci Beltran blends methodical inspection skills, meticulous documentation, and a naturally talkative, team‑oriented demeanor to
    lead safety briefings, mentor new technicians, and pursue an A&P certification while they eye specialization in composite structures.
  sports: A weekend hiker and casual soccer player, Traci Beltran joins the Laurens County Hiking Club for trips to Congaree National Park, donates time to the local YMCA fitness classes, and passionately
    follows the Carolina Panthers and Charlotte Hornets on game days, while they often wear their jerseys before a pick‑up basketball game.
  arts: An avid watercolorist whose aircraft silhouettes echo the style of Winslow Homer, Traci Beltran spends evenings at local galleries, sings Beyoncé at karaoke nights, performs in community theater
    productions of Grease, and captures high‑contrast plane photographs inspired by Ansel Adams, all while they discuss artistic techniques with anyone willing to listen.
  travel: A meticulous planner with a wanderlust for historic spots, Traci Beltran has driven the Blue Ridge Parkway in autumn, explored Charleston’s historic district, dreams of a spring trip to Kyoto’s
    cherry‑blossom festivals, and balances these ambitions with a modest travel budget, often booking flights through student discounts and they keep a travel journal filled with sketches.
  culinary: An enthusiastic amateur chef, Traci Beltran loves cooking shrimp and grits with fresh Gulf shrimp, collard greens simmered with smoked ham hocks, and a peach cobbler topped with a crumbly oat
    streusel, while they experiment with artisanal cheese pairings and unwind over a perfectly pulled espresso shot.
  core: Traci Beltran is a detail‑obsessed aviation mechanic with a gregarious charm, an unquenchable love for art, and a habit of double‑checking everything—from tool inventories to grocery lists—while
    they sometimes sacrifice sleep over imagined worst‑case scenarios.
background:
  cultural: Traci grew up in the small‑town environment of Alamo, Georgia, within a family rooted in Southern hospitality and community values. Her upbringing reflects typical Laurens County traditions—church
    gatherings, county fairs, and a love for peach and pecan harvests—while also exposing her to a close‑knit network of neighbors who value hard work and reliability. Although her heritage is primarily
    Anglo‑American, she embraces the region’s cultural rhythms, including gospel music and Southern cuisine, and speaks with a gentle Southern drawl. Her curiosity about art and new ideas pushes her beyond
    conventional expectations, allowing her to blend the pragmatic ethos of her hometown with a broader, more eclectic worldview.
attributes:
  skills: '[''Airframe inspection'', ''Propulsion system maintenance'', ''Hydraulic system troubleshooting'', ''Composite material repair'', ''FAA regulations compliance'', ''Preventive maintenance scheduling'',
    ''Diagnostic troubleshooting'', ''Tool calibration and inventory management'', ''Technical documentation and record‑keeping'', ''Team leadership'', ''Effective communication'', ''Training and mentorship'',
    ''Problem solving under pressure'', ''Basic welding'', ''Model aircraft assembly'']'
  hobbies: '[''Watercolor painting'', ''Aircraft photography'', ''Local art gallery tours'', ''Live music and karaoke nights'', ''Hiking in Oconee State Park'', ''Model airplane building'', ''Volunteer
    work at Laurens County Historical Museum'', ''Reading science‑fiction novels'', ''Attending community theater productions'', ''Cooking Southern‑inspired dishes'']'
  career_goals: Traci aims to earn her FAA Airframe and Powerplant (A&P) certification within the next year and specialize in composite aircraft structures. She envisions progressing to a lead mechanic
    role at a regional airline or charter service, where she can oversee complex repairs and mentor a diverse crew. Long‑term, she hopes to become an FAA‑approved instructor, creating a mentorship program
    that encourages more women to enter aviation maintenance. Ultimately, Traci dreams of opening a small, community‑focused maintenance shop that also hosts art‑related events, blending her technical career
    with her love for creative expression.
