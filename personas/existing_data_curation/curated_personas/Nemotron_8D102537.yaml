  career_goals: He aims to rise to the rank of sergeant within the next three years, focusing on leading a community‑relations unit that bridges the police department with the residents of Barranquitas
    and Corozal. Recognizing his own struggles with anxiety, he wants to champion a mental‑health support program for officers and introduce peer‑counseling initiatives. Long‑term, he envisions transitioning
    to a consultant role in public safety, helping municipalities develop trauma‑informed policing strategies and training.
