  hobbies: '[''Visiting art museums and galleries'', ''Listening to Latino music (boleros, salsa, Latin jazz)'', ''Reading poetry, biographies, and historical essays'', ''Knitting and crocheting'', ''Gardening
    herbs and flowers'', ''Cooking traditional Hispanic dishes'', ''Crossword puzzles and Sudoku'', ''Bingo and bridge games'', ''Volunteering at community cultural center'']'
  career_goals: Although retired from formal employment, Adriana continues to set personal goals that reflect her curiosity and desire for meaningful engagement. She aspires to compile her family’s oral
    histories and recipes into a memoir and cookbook that will preserve her cultural legacy for future generations. Adriana seeks to stay mentally sharp by attending art exhibitions, taking occasional online
    courses in art history, and participating in community discussion circles. She aims to mentor her grandchildren and great‑grandchildren in cooking, knitting, and storytelling, passing on the skills
    she values most. Maintaining her health is a priority; she plans to keep up with gentle exercises such as daily walks and chair yoga, and to attend regular medical check‑ups to manage anxiety and stress.
    Finally, she hopes to travel to nearby cultural festivals—such as the Puerto Rican Day Parade in New York City and the Dominican Heritage Festival in neighboring towns—to experience new artistic expressions
    and stay connected to her roots.
