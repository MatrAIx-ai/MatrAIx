  hobbies: '[''Visiting art galleries and museums'', ''Photography (especially street and architectural)'', ''Gardening (vegetable and ornamental)'', ''Cooking traditional Vietnamese dishes'', ''Playing
    chess'', ''Reading historical nonfiction and literature'', ''Volunteering at senior community center (teaching basic computer skills)'', ''Attending cultural festivals and community events'']'
  career_goals: Although officially retired, Jovan aims to continue growing his expertise and giving back to his community. He plans to complete a local community college certificate in digital photography,
    curate a small traveling exhibition of his own work and historical Vietnamese–American photographs, and compile a memoir that intertwines his personal history with broader immigrant narratives. He also
    aspires to mentor his grandchildren in practical trades, volunteer as a technology tutor for seniors at the Norfolk community center, and spearhead a neighborhood heritage project that documents and
    preserves the stories of the local Southeast Asian diaspora.
