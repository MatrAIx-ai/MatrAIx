  career_goals: Stephen is drawn to careers that blend creativity with usefulness. He dreams of attending a STEM‑focused high school and eventually becoming a software or robotics engineer who builds tools
    that help his community. He also imagines playing soccer at a competitive level and hopes to combine his love of technology with sports by designing smart equipment. His competitive nature pushes him
    to set ambitious goals, while his practical side keeps those goals grounded in realistic steps.
