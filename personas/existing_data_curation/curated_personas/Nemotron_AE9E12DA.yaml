  career_goals: Maria dreams of becoming a preschool teacher because she loves creating structured, fun learning environments where children can follow routines and explore together. She also imagines helping
    animals as a veterinarian, and she is fascinated by the idea of being a community helper, such as a firefighter, who works reliably to keep others safe. Her goals reflect her desire to organize, lead,
    and care for others in practical, real‑world roles.
