personas:
  professional: Maria Rodriguez, 6, functions as a junior architect of play, assembling Lego creations with precise step‑by‑step plans, solving picture puzzles by breaking them into logical sequences, and
    they confidently lead group play sessions where their reliable, organized nature keeps everyone on track.
  sports: Maria Rodriguez, 6, sprints forward as a striker for the City Stars Youth Soccer Club, thrives on Saturday morning drills, idolizes the fast‑paced play of Los Angeles FC, and they use their energetic,
    sociable nature to rally teammates, celebrate each goal with a spontaneous salsa‑inspired dance, and keep the team’s spirit high.
  arts: Maria Rodriguez, 6, channels their vibrant energy into salsa dancing to classics by Celia Cruz, fills sketchbooks with bright, cartoon‑style drawings of animals and superheroes, and they devour
    picture books like Where the Wild Things Are while listening to storytime recordings of the beloved children's series Pocoyó, allowing music and art to shape their daily routine.
  travel: Maria Rodriguez, 6, loves family road trips that follow a predictable schedule, enjoys beach days on the sunny island of St. Thomas where relatives stay, dreams of exploring the magic of Disneyland
    in Anaheim and the towering skyscrapers of New York City, and they approach each journey with a checklist of favorite snacks, storybooks, and a small travel journal for drawing new sights.
  culinary: Maria Rodriguez, 6, eagerly assists in the kitchen, mastering the art of stirring simmering arroz con gandules with sofrito, slicing ripe plantains for crispy fritters, and proudly adding shredded
    mozzarella to homemade pizza, and they show a budding culinary curiosity that mixes traditional flavors like cilantro and adobo with kid‑friendly staples.
  core: Maria Rodriguez, 6, blends meticulous routine with boundless energy, and they turn every Lego build, salsa beat, and soccer sprint into a structured yet joyful adventure.
background:
  cultural: Maria comes from a proud Puerto Rican family that maintains strong cultural ties while living in Centreville, Fairfax County. At home, Spanish is spoken alongside English, and the family celebrates
    traditions such as Three Kings Day, Día de la Historia de Puerto Rico, and summer festivals with music, dancing, and classic dishes like pasteles, arroz con gandules, and flan. Maria's grandparents
    share stories of Puerto Rico's island life, instilling a sense of heritage and community. The local multicultural environment provides her with opportunities to blend Puerto Rican customs with broader
    American experiences, shaping a vibrant, bilingual, and culturally aware identity.
