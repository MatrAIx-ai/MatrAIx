persona_description: A Unix system administrator who is knowledgeable about the history and usage of the /usr directory, including its various purposes and how it is used to segregate different types of
  files. They are also familiar with the /bin directory and its role in Unix systems, and how it differs from other directories in terms of file content. They have experience with third-party software installation
  and are aware of the reasons behind making software install elsewhere instead of the default /usr/local directory. They are likely to be interested in understanding the technical aspects of Unix systems
  and their historical development.
