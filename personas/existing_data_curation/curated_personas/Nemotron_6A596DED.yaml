personas:
  professional: Omar Kinnison, a 37‑year‑old audiovisual and venue operations specialist in West Texas, leverages his methodical problem‑solving, self‑reliant work ethic, and cooperative nature to streamline
    backstage workflows, enforce safety protocols, and mentor new staff while pursuing certifications in event safety and AV system integration.
  sports: Omar Kinnison, a moderate fitness devotee, cheers for the Dallas Cowboys and the Texas Rangers, hikes the rolling hills around Abilene with the local Abilene Hiking Society, and joins a weekly
    Saturday softball league with the community’s Rough Riders team.
  arts: In his downtime, Omar Kinnison devotes evenings to exploring classic science documentaries by Carl Sagan, curates playlists featuring Led Zeppelin and Willie Nelson, experiments with night‑sky photography
    inspired by Ansel Adams, and occasionally attends regional theater productions starring local actor Jeremy Keller.
  travel: Omar Kinnison designs his vacations as methodical road trips, having already driven to the dark skies of Big Bend National Park, savored the German‑influenced wine scene of Fredericksburg, and
    plotted a future week‑long itinerary to explore the historic streets of Oaxaca, Mexico.
  culinary: Omar Kinnison, a self‑taught grill master, prides himself on smoking a Texas‑style brisket using a custom rub of brown sugar, smoked paprika, coriander, and black pepper, while also experimenting
    with chipotle‑marinated sweet potatoes and perfecting a cedar‑plank salmon seasoned with dill and lemon zest.
  core: Omar Kinnison is a disciplined DIY technophile who meticulously plans his projects and finances, yet routinely forgets to water his houseplants and can linger a little too long tweaking a new Arduino
    sensor before calling it finished.
background:
  cultural: 'Omar grew up in a tight‑knit community in central Texas, where his family’s Anglo‑American roots emphasized self‑reliance, modesty, and a strong work ethic. The region’s blend of rural traditions
    and a growing appreciation for arts and technology shaped his balanced outlook: he respects established customs while staying curious about new ideas. His upbringing in Abilene exposed him to local
    festivals, rodeo culture, and community volunteerism, fostering his cooperative nature and dedication to contributing positively to his town.'
attributes:
  skills: '["Technical troubleshooting", "Audio-visual equipment operation", "Ticketing system administration", "POS management", "Crowd control and safety compliance", "Staff training and mentorship",
    "Scheduling and logistics", "Inventory management", "Basic electrical wiring", "Documentation of SOPs"]'
  hobbies: '["Arduino projects", "Woodworking", "Restoring vintage radios", "Hiking", "Night-sky photography", "Watching science documentaries", "Strategy board games", "Barbecue cooking", "Reading non-fiction
    science", "Attending small live-music shows"]'
  career_goals: He aims to move from a front‑line attendant role into an operations or technical manager position within the regional entertainment industry. Over the next five years, Omar plans to earn
    certifications in event safety and AV system integration, and to leverage his STEM background to design more efficient backstage workflows. Ultimately, he hopes to lead a team that oversees multiple
    venues in West Texas, and perhaps launch a small consultancy that provides technical support for local theaters and community events.
