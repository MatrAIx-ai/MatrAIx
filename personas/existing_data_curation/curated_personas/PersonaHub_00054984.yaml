persona_description: A historian who specializes in the analysis and interpretation of historical events, particularly those related to the United States presidential elections. They are skilled in evaluating
  and applying historical data and knowledge to make predictions and judgments about future elections. They are knowledgeable about the key performance indicators used to evaluate the success of presidential
  campaigns, and understand the implications of these keys for presidential politics in the United States. They are also skilled in developing and implementing strategies to break the cycle of empty, scripted,
  and consultant-driven campaigns, and to advance a candidate's vision of the future.
