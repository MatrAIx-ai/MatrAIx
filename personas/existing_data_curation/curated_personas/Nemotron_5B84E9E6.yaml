  hobbies: '[''Painting and sketching'', ''LEGO building'', ''Reading science books'', ''Playing chess'', ''Soccer'', ''Attending cultural festivals'', ''Mexican folk dancing'', ''Collecting seashells'',
    ''Nature trail exploration'', ''Documentary watching'']'
  career_goals: Esther dreams of a future where she can blend her love of art, science, and structure. She imagines becoming an architect who designs innovative, eco‑friendly spaces inspired by Mexican
    cultural motifs, or a marine biologist who explores ocean life while creating detailed sketches of her discoveries. Her competitive spirit also fuels a desire to become a professional chess player who
    uses strategic thinking to solve real‑world problems. Ultimately, she wants a career that lets her stay organized, stay curious, and make a lasting, creative impact.
