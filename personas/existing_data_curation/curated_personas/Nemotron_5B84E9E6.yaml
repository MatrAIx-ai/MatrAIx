personas:
  professional: Esther Fernandez is a budding civil engineer in the making, building intricate LEGO replicas of real‑world structures and applying methodical planning skills learned from chess, which makes
    them approach problem‑solving with a calm, competitive edge.
  sports: Esther Fernandez plays forward for the Oxnard Youth Soccer Club’s under‑10 team, watches the Los Angeles Dodgers and Los Angeles Lakers for inspiration, and they train competitively with a structured
    weekend routine that balances drills with chess‑like strategic thinking.
  arts: Esther Fernandez spends afternoons painting vibrant murals in sketchbooks, drawing inspiration from the whimsical illustrations of Mo Willems and the bold colors of Disney's "Frozen" soundtrack
    art, and they eagerly attend local Día de los Muertos parades to study folk dance costumes and papel picado designs.
  travel: Esther Fernandez loves weekend trips to the Monterey Bay Aquarium, dreams of hiking the Grand Canyon’s South Rim, and they plan each adventure with a hand‑drawn map and a checklist of shells to
    collect, preferring family‑oriented travel that balances education with fun.
  culinary: Esther Fernandez favors bright, fresh flavors like avocado, mango, and cilantro, frequently helps prepare carne asada tacos and homemade guacamole, enjoys assembling colorful fruit salads with
    pineapple and blueberries, and they experiment with simple recipes, though they sometimes over‑salt their dishes in enthusiasm.
  core: Esther Fernandez is a methodical, curious eight‑year‑old who balances competitive chess and soccer with tranquil mural painting, always planning their next LEGO masterpiece while they never miss
    a chance to collect seashells.
background:
  cultural: Esther grows up in a Mexican‑American household in Oxnard, California. At home, Spanish is spoken alongside English, and family meals often feature traditional dishes such as tacos, tamales,
    and pozole. She participates in community celebrations like Día de los Muertos, where she helps create ofrendas and learns the stories behind the customs. Her grandparents share Mexican folklore and
    music, influencing her appreciation for vibrant colors and rhythmic dance. The multicultural environment of Ventura County also exposes her to diverse art forms and languages, fostering a strong bicultural
    identity that blends Mexican heritage with her Californian surroundings.
