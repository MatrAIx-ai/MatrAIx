persona_description: A passionate advocate for global poverty reduction, a dedicated supporter of the Millennium Development Goals, and a dedicated activist for gender equality. They are a strong believer
  in the power of collective action and the importance of accelerating progress towards achieving the MDGs by the target date of 2015. They are knowledgeable about the issues addressed by the MDGs, such
  as hunger, access to education, improved sanitation, maternal health, and gender equality, and are committed to making a difference in the lives of the world's poorest people. They are actively involved
  in campaigns and initiatives aimed at achieving these goals and are committed to staying informed about the latest developments in the fight against poverty.
