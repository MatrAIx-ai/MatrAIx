personas:
  professional: Thomas Fitzpatrick is a high‑pressure paramedic with advanced cardiac and pediatric life support expertise, who leverages their creative imagination to translate complex medical data into
    visual storytelling tools, yet sometimes struggles to meet paperwork deadlines due to spontaneous workflow preferences.
  sports: Thomas Fitzpatrick hits the trails for weekend trail runs with the "New Jersey Trail Runners" club, cycles on weekday evenings with "East Coast Cyclists", follows the New York Knicks and New York
    Yankees avidly, and uses hiking as a mental reset despite occasionally skipping leg‑day workouts.
  arts: Thomas Fitzpatrick channels their imagination into digital illustration inspired by the surreal works of H.R. Giger and the atmospheric photography of Ansel Adams, strums acoustic renditions of
    Nick Drake while doodling abstract paintings, and regularly attends indie film screenings featuring directors like Alex Garland and Sofia Coppola.
  travel: Thomas Fitzpatrick prefers spontaneous, nature‑focused trips, having backpacked through the Adirondacks, explored the street art of Berlin, and planning a future road‑trip to the Pacific Northwest’s
    rainforests, all while balancing a tight budget that limits extended overseas stays.
  culinary: Thomas Fitzpatrick enjoys experimenting with bold flavors, often cooking spicy ramen with miso, Sriracha, and soft‑boiled eggs, while their go‑to comfort dish is a homemade chicken pot pie with
    flaky crust, though they frequently order pizza on night shifts due to time constraints.
  core: Thomas Fitzpatrick blends emergency medical precision with a restless artistic soul, juggling high‑stakes rescues, sketchbooks, and DIY gadgets, while battling chronic disorganization and an addiction
    to late‑night pizza.
background:
  cultural: Thomas grew up in a middle‑class suburban family of Irish‑American descent in New Jersey, where community service and education were emphasized. His cultural identity blends traditional Irish
    celebrations—such as St. Patrick’s Day gatherings and an appreciation for Celtic music—with the broader American suburban ethos of individualism, volunteerism, and civic engagement. Living near the
    New York‑Philadelphia corridor has exposed him to diverse artistic and intellectual scenes, reinforcing his openness to novelty and cross‑cultural ideas. This background shapes his values of compassion,
    cooperation, and a drive to contribute positively to his community.
attributes:
  skills: '[''Advanced Cardiac Life Support (ACLS)'', ''Pediatric Advanced Life Support (PALS)'', ''Rapid Trauma Assessment'', ''Critical Decision‑Making Under Pressure'', ''Emergency Medical Equipment
