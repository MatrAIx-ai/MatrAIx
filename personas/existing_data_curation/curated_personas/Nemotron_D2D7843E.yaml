    & Compassion'', ''Team Collaboration'', ''Improvisational Response Strategies'', ''Basic Programming for Medical Devices'']'
  hobbies: '[''Digital Illustration'', ''Abstract Painting'', ''Science‑Fiction & Philosophy Reading'', ''Nature & Urban Photography'', ''Hiking & Trail Running'', ''Cycling'', ''Acoustic Guitar Playing'',
    ''DIY Electronics (Arduino)'', ''Board/Role‑Playing Games'', ''Volunteering at Community Health Fairs'', ''Attending Indie Film & Art Gallery Events'']'
  career_goals: Thomas aims to advance from frontline paramedic work to a leadership role in emergency medical services where he can shape policy, training, and technology integration. In the next five
    years he plans to obtain Critical Care Paramedic and Flight Paramedic certifications, pursue a Master’s in Public Health or EMS Management, and spearhead a community‑based program that uses interactive
    visual media to educate the public about emergency preparedness. Long‑term, he envisions contributing to research on wearable monitoring devices for pre‑hospital care and eventually serving as an EMS
    medical director or public health strategist, blending his love for innovation, art, and compassionate service.
