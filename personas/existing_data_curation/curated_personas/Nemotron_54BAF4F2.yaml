personas:
  professional: Sean Johns, 33, is a self‑taught full‑stack engineer who blends React, Django, and creative‑coding tools to build interactive experiences, improvises around agile constraints, mentors junior
    developers to embed empathy into product strategy, and they thrive on turning anxiety‑informed insights into user‑centered designs.
  sports: Sean Johns hikes the Ozark trails with the local KC Trailblazers club each spring, follows the Kansas City Chiefs, Royals, and St. Louis Blues with devotion, enjoys casual Sunday pickup soccer
    at the community park, and they sustain a modest weekly routine of yoga and body‑weight exercises to counteract desk fatigue.
  arts: Sean Johns channels a love for speculative fiction into digital illustrations of Missouri landscapes while finger‑picking acoustic folk inspired by Sufjan Stevens and Joanna Newsom, curates experimental
    playlists featuring Aphex Twin and Animal Collective, attends weekly shows at the Crossroads Art Center, and they draw creative spark from Kansas City Repertory theater productions.
  travel: Sean Johns embraces spontaneous weekend road trips to the Ozarks and occasional flights to music‑rich cities like Nashville and Portland, dreams of an immersive spring in Kyoto’s art districts
    and a summer trek across Iceland’s volcanic terrain, plans itineraries on a minimalist spreadsheet, and they balance wanderlust with a modest family‑oriented budget.
  culinary: Sean Johns delights in grilling Kansas‑style BBQ ribs with a smoky rub, rolls homemade margherita pizza topped with fresh basil and buffalo mozzarella, experiments with kimchi‑infused tacos
    for a culinary twist, occasionally succumbs to late‑night nacho binges, and they view their cooking skill as a work‑in‑progress fueled by curiosity and occasional recipe‑fail mishaps.
  core: Sean Johns blends a Midwestern work ethic with restless curiosity, crafting code and art in equal measure while wrestling with anxiety that fuels meticulous journaling and occasional procrastination.
background:
  cultural: Sean grew up in a middle‑class, white family in Independence, Missouri, a suburb of Kansas City. His upbringing was shaped by Midwestern values of community, modesty, and a strong work ethic,
    reinforced by weekly interactions at local churches and community events like the state fair and high‑school sports games. He developed an early love for the region’s outdoors—fishing, hiking, and camping
    trips with family—while also being exposed to the city’s growing arts scene through museum visits and local music venues. This blend of suburban stability and a curiosity about broader artistic expressions
    informs his worldview. Sean and his wife maintain close ties with extended family, often gathering for BBQs and celebrating local traditions, yet they also welcome diverse perspectives, reflecting his
    appreciation for unconventional ideas and cultures beyond his immediate environment.
