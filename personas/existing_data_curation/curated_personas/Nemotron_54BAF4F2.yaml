  career_goals: Sean aspires to transition from a mid‑level developer to a lead full‑stack engineer where he can mentor junior developers and shape product strategy. He is motivated to create software that
    blends technology and art—such as interactive installations or mental‑health‑focused mobile apps—leveraging his personal experience with anxiety to build empathetic user experiences. In the next five
    years he plans to earn an AWS Solutions Architect certification, contribute to open‑source creative‑coding libraries, and launch a small indie studio with his spouse that produces narrative‑driven games
    or digital art tools. He also hopes to negotiate a flexible work arrangement that reduces deadline pressure and supports his need for solitude and reflective time.
