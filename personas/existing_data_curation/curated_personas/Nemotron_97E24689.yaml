  career_goals: Lindsey aims to advance to a senior principal engineer role where she can lead large-scale, climate-resilient infrastructure projects across Texas. She wants to embed flexible workplace
    policies at her firm to improve work-life balance and reduce stress for her team. She plans to publish a case study on integrating smart sensor technologies into municipal water systems, blending her
    curiosity for new ideas with practical implementation. Lindsey is pursuing a part-time Master's degree in Sustainable Infrastructure to deepen her expertise in green design. She also seeks to serve
    on the Round Rock City Planning Commission or a local advisory board to influence community development, and she continues mentoring women engineers through the regional Professional Engineers network.
