  hobbies: '[''Gardening (vegetable and butterfly garden)'', ''Cooking and recipe development'', ''Book club participation'', ''Senior dance classes'', ''Volunteer work at animal shelter'', ''Beach walking
    and birdwatching'', ''Yoga and mindfulness journaling'']'
  career_goals: Although officially retired, Marianne is driven to make a lasting impact in her community. She aims to lead the Palm Coast Senior Outreach Center as a volunteer board member, launching a
    weekly wellness and mindfulness program for seniors that blends gentle exercise with coping‑skill workshops. She also plans to expand the neighborhood butterfly garden she started, turning it into an
    intergenerational teaching space. Marianne hopes to earn a certification as a senior fitness instructor and to advocate for better mental‑health resources for older adults at the county level.
