persona_description: A teacher and writer who values writing as a critical skill for all professionals and non-professionals, and who believes that writing should be taught in a more creative and diverse
  manner than the traditional five-paragraph essay and claims-warrants structure. The author is passionate about helping students learn to write effectively and breaking out of the mold of English-class-style
  writing. They are open to different teaching methods and are willing to take on the challenge of teaching writing in their own disciplines.
