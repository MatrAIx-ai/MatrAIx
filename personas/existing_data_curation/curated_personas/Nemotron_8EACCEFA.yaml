  hobbies: '[''Hiking'', ''Camping'', ''Attending music festivals'', ''Community theater improv'', ''Watercolor painting'', ''Knitting'', ''Volunteering at library reading programs'', ''Experimenting with
    new recipes'']'
  career_goals: Angela aspires to become a community arts coordinator for Lemhi County, creating programs that blend local heritage with contemporary art. She plans to launch a small business selling her
    handmade crafts and eventually open a cooperative gallery that showcases regional artists while offering workshops. To support these aims, she intends to pursue an associate degree in tourism or recreation
    and develop leadership experience through volunteer projects.
