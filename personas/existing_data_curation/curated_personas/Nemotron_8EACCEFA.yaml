personas:
  professional: Angela Plakstis, a budding community arts coordinator and event strategist, leverages their strong interpersonal communication, basic graphic‑design savvy, and practical outdoor survival
    know‑how to organize inclusive festivals and library reading programs, balancing meticulous planning with spontaneous improvisation thanks to their curious and outgoing nature.
  sports: Angela Plakstis hits the Salmon River trails with the Lemhi County Trail Runners in spring, tracks the Boise State Broncos football season for community camaraderie, and practices yoga on weekends
    to counterbalance the physical demands of their hiking and camping adventures.
  arts: Angela Plakstis translates the sweeping Idaho vistas into watercolors inspired by Monet, knits scarves while listening to folk singer Megan Corinth, and fuels their improvisational stage confidence
    at the Lemhi Community Theater with the bold energy of actress Frances McDormand, weaving these artistic threads into a vibrant personal aesthetic.
  travel: Angela Plakstis prefers spontaneous overnight backpacking trips in the Salmon River valleys but also budgets for annual getaways to Olympic National Park, the cultural streets of Kyoto, and the
    alpine trails of Banff, balancing limited finances with a craving for both rugged adventure and global culinary inspiration.
  culinary: Angela Plakstis experiments in the kitchen with miso‑glazed salmon, Sichuan mapo tofu, and Idaho finger‑ling potato gnocchi, favoring fresh basil, local honey, and smoked paprika, while their
    habit of over‑salting and forgetting to set timers often leads to deliciously chaotic meals.
  core: Angela Plakstis is a restless community artist who juggles event coordination, mountain hikes, and craft entrepreneurship, all while battling a chronic habit of staying up too late to perfect both
    their watercolor palettes and social‑media posts.
background:
  cultural: Angela grew up in a typical white, middle‑class family in rural Idaho, with ancestral ties to Pacific Northwest logging communities and Midwestern farming farms. Her upbringing emphasized self‑reliance,
    a deep appreciation for the outdoors, and close‑knit community values. While primarily rooted in mainstream rural American culture, she has been exposed to local Native American heritage through regional
    festivals and supports preserving the diverse cultural traditions of Lemhi County.
attributes:
  skills: '[''Interpersonal communication'', ''Event coordination'', ''Community outreach'', ''Graphic design (basic)'', ''Knitting'', ''Quilting'', ''Outdoor survival basics'', ''First aid'', ''Social
