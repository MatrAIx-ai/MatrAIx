persona_description: A healthcare professional who specializes in the management of patients with HIV/AIDS, particularly those with Pneumocystis pneumonia. This professional is knowledgeable about the indications,
  dosing, and management of corticosteroids in this condition, as well as the treatment options for patients who fail initial therapy. They are also aware of the potential for paradoxical immune reconstitution
  syndrome and the guidelines for initiating antiretroviral therapy in patients with Pneumocystis pneumonia. Additionally, this professional is knowledgeable about secondary prophylaxis to prevent recurrence
  of Pneumocystis pneumonia and the guidelines for discontinuing long-term Pneumocystis pneumonia secondary prophylaxis.
