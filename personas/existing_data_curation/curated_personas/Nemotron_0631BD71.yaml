personas:
  professional: Sara Riggs, a 23‑year‑old automotive service technician who blends meticulous engine diagnostics, hybrid‑vehicle maintenance, and metal‑fabrication artistry into a dynamic workshop environment,
    leveraging their curiosity to experiment with unconventional repair methods while communicating complex issues in plain language to customers.
  sports: Sara Riggs, an enthusiastic hiker who frequents the nearby Riverside Trail, a member of a local cycling club that rides the Milford greenway, and a dedicated fan of the New England Patriots and
    Hartford Yard Goats, they treat fitness as both a stress outlet and a social activity.
  arts: Sara Riggs, a landscape painter inspired by the muted tones of early morning mist and a sketch artist who drafts custom vehicle wraps while jamming in community bluegrass sessions featuring Old
    Crow Medicine Show and learning salsa steps to the rhythm of Marc Anthony, they fuse visual art and music to recharge their creative batteries.
  travel: Sara Riggs, a weekend explorer who plans scenic drives through the Blue Ridge Mountains, has photographed the volcanic landscapes of Sedona, and dreams of attending the Geneva International Motor
    Show, they balance a modest travel budget with a love for both adventure and the occasional relaxed lakeside retreat.
  culinary: Sara Riggs, a moderately skilled home cook who favors grilled BBQ ribs, honey‑glazed carrots, and fresh strawberry shortcake, they often whip up spicy chickpea tacos after a late‑night shift
    while pairing meals with a strong cold brew to stay alert.
  core: Sara Riggs, a tech‑savvy garage whiz who paints, plays bluegrass, worries about every detail, and can’t resist a good espresso before tackling the next engine puzzle, they epitomize the blend of
    hands‑on skill and restless curiosity.
background:
  cultural: Sara grew up in King and Queen County, a historically rural part of Virginia with deep Southern roots. Her family background is primarily Anglo‑American, with generations who have lived in the
    region’s farming and trades communities. The local culture emphasizes hard work, close‑knit community ties, and modest, hospitality‑driven values. Regular participation in church gatherings, county
    fairs, and family reunions shaped her sense of responsibility and community service. While she respects these traditions, Sara’s curiosity and openness to new ideas reflect a blend of her Southern upbringing
    with a contemporary, artistic, and technological outlook.
attributes:
  skills: '[''Engine diagnostics'', ''Brake and suspension repair'', ''Electrical system troubleshooting'', ''Hybrid/electric vehicle maintenance'', ''Welding and metal fabrication'', ''Performance part
    customization'', ''Shop management software'', ''Customer communication'', ''Problem solving'', ''Adaptability'']'
  hobbies: '[''Oil painting'', ''Automotive sketching'', ''Attending car shows'', ''Bluegrass jam sessions'', ''Salsa dancing'', ''Hiking'', ''Nature photography'', ''Volunteer work at community festivals'']'
  career_goals: Sara aims to become a certified ASE Master Technician within the next three years, with a specialization in electric‑vehicle service. She aspires to open a boutique garage that blends high‑quality
    automotive repair with custom artistic car wraps and community workshops on basic maintenance. Long‑term, she envisions teaching automotive technology at a local community college, sharing her passion
    for innovative repair techniques while mentoring young enthusiasts. Balancing her career with family life, she hopes her shop will become a hub for local car‑culture events and a source of reliable,
    personable service for the Milford community.
