personas:
  professional: An ambitious CNC operator named Dessica Mwai combines expert G‑code programming with a meticulous, lean‑manufacturing mindset; they use Fusion 360 to embed traditional motifs into precision‑engineered
    parts while mentoring peers with calm compassion.
  sports: A nature‑oriented athlete named Dessica Mwai spends crisp spring mornings trail‑running with the Oneida County Hiking Club, embraces cross‑country skiing on winter weekends, and cheers for the
    Milwaukee Bucks and Green Bay Packers while occasionally joining a local co‑ed softball league that they find a lively outlet for teamwork.
  arts: A creatively driven maker named Dessica Mwai merges traditional beadwork techniques with digital illustration inspired by Emily Carr’s forest landscapes, crafts small 3‑D printed sculptures echoing
    the organic lines of Bon Iver’s album art, and strums a ukulele at community gatherings while citing Joni Mitchell’s storytelling as a guiding muse that they share with local youth.
  travel: An adventurous explorer named Dessica Mwai prefers self‑planned road trips that blend hiking with cultural immersion, having trekked the boreal forests of Ontario’s Algonquin Park, the volcanic
    craters of Iceland, and the red‑rock trails of Sedona, Arizona, while budgeting carefully to fund future visits to the ancient temples of Kyoto, all of which they meticulously document in a field journal
    for personal reflection and community workshops.
  culinary: A culinary enthusiast named Dessica Mwai enjoys moderate‑level cooking that blends contemporary comfort food with harvested ingredients, frequently preparing wild‑rice and smoked trout bowls
    seasoned with fresh cedar, pine‑nut oil, and locally foraged fiddlehead ferns, while treating a well‑seasoned cast‑iron skillet as their most trusted tool and indulging in seasonal blueberry crisp as
    a sweet reward after long CNC shifts, which they share during community potlucks.
  core: Dessica Mwai is a methodical CNC programmer who balances a love for precise engineering with a thriving passion for beadwork, habitually sketching flora in the margins of technical drawings and
    never missing a weekend hike, yet occasionally forgets to water houseplants, which they attribute to losing track of time while immersed in a new design.
background:
  cultural: Dessica is an enrolled member of the Ojibwe (Chippewa) Nation, raised in a family that emphasizes tribal stories, respect for the land, and the practice of seasonal gathering. Growing up in
    rural Wisconsin, she learned traditional crafts such as beadwork and birch bark carving while also navigating contemporary education. Her cultural identity informs her commitment to community, sustainability,
    and the integration of Indigenous aesthetics into modern technology, guiding both her professional aspirations and personal creative expressions.
attributes:
  skills: '[''CNC programming (G-code)'', ''CAD/CAM software (Fusion 360, SolidWorks)'', ''Machining operations (milling, turning, drilling)'', ''Blueprint and technical drawing interpretation'', ''Material
    selection and metallurgy basics'', ''Quality inspection and metrology'', ''Lean manufacturing and process optimization'', ''Equipment maintenance and troubleshooting'', ''Project planning and scheduling'',
    ''Team training and mentorship'', ''Cross-cultural communication'']'
  hobbies: '[''Hand-beading'', ''Woodworking with native motifs'', ''Digital illustration'', ''3-D printing'', ''Hiking and nature sketching'', ''Ukulele playing'', ''Volunteering at youth art programs'',
    ''Reading speculative fiction'']'
  career_goals: She aims to advance from CNC operator to senior CNC programmer and eventually a manufacturing process engineer, securing NIMS certification and completing a bachelor's degree in mechanical
    or industrial engineering. Dessica envisions establishing a community maker space in Woodruff that blends modern digital fabrication with traditional American Indian designs, offering workshops that
    empower Indigenous youth to pursue careers in STEM. Long-term, she hopes to lead sustainable production initiatives that reduce waste, incorporate locally sourced materials, and honor the stewardship
    values of her cultural heritage.
