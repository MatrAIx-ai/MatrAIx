  hobbies: '["Quilting", "Gardening (heirloom tomatoes, roses, herbs)", "Reading classic and contemporary literature", "Attending community theater and choir performances", "Local history research", "Southern
    cooking", "Volunteer work at senior center", "Digital photography", "Birdwatching", "Hosting tea gatherings with neighbors"]'
  career_goals: Teresa aims to compile a memoir that weaves together her family’s genealogy, local history, and personal reflections, preserving it as a community resource. She plans to create a digital
    archive of historic photographs and oral histories for the Alcorn County Historical Society. Continuing her mentorship, she hopes to train younger volunteers in event planning and craft workshops. Teresa
    also wishes to take a short art‑history course at the nearby community college and to visit at least two major art museums, such as the Metropolitan Museum of Art in New York and the Museum of Fine
    Arts in Boston, to broaden her artistic perspective. Maintaining her health and social vitality remains a core ambition, allowing her to continue serving as a beloved hub of conversation and cultural
    exchange in Corinth.
