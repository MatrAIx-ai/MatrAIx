personas:
  professional: Teresa Luckey, a community historian and craft educator in Alcorn County, leverages her storytelling flair, genealogical expertise, and organized yet flexible event‑planning skills to host
    lively book‑club gatherings, historical talks, and quilting workshops, all while confidently taking center stage and encouraging intergenerational dialogue.
  sports: Teresa Luckey, a devoted fan of the Mississippi State Bulldogs football team and the New Orleans Saints, participates in the Corinth Senior Walking Club’s weekly walks along the Tennessee River,
    enjoys seasonal bird‑watching hikes in spring, and, despite her age, refuses to miss the annual "Senior Softball League" games where she cheerfully roots for the local team.
  arts: Teresa Luckey, an avid supporter of community theater and the local choir, regularly attends productions by the Alcorn Community Playhouse, delights in performances of works by August Wilson, and
    draws artistic inspiration from Georgia O'Keeffe’s bold color palettes, which she incorporates into her quilting designs while humming classic folk songs by Bob Dylan.
  travel: Teresa Luckey, who prefers leisurely road trips with a well‑packed picnic basket of fresh garden produce, has already visited the Metropolitan Museum of Art in New York and the Museum of Fine
    Arts in Boston, dreams of strolling through the gardens of Château de Versailles, and plans her next getaway to Savannah’s historic squares, balancing her love of art with the practicalities of limited
    mobility and a fixed travel budget.
  culinary: Teresa Luckey, a master of Southern comfort cuisine, whips up heirloom tomato and basil salad, buttermilk fried chicken, collard greens with smoked ham hocks, and sweet tea sweetened with honey
    from her garden, often experimenting with bold spice blends in her quilting‑inspired kitchen while occasionally over‑salting dishes in her enthusiasm.
  core: Teresa Luckey, an 86‑year‑old quilt‑making, garden‑tending raconteur, blends curiosity, sociability, and a touch of forgetfulness into a vibrant life centered on community, art, and Southern flavors.
background:
  cultural: Teresa grew up as a white Southern woman in mid‑20th‑century Mississippi, shaped by the traditions of Southern hospitality, Protestant church life, and strong family ties. Her upbringing emphasized
    community service, respect for elders, and a love of regional cuisine and music, from gospel hymns to Delta blues. The values of resilience and self‑reliance, forged during the Great Depression and
    the civil‑rights era, inform her confident, independent personality. While rooted in these cultural norms, Teresa’s curiosity has led her to embrace new ideas, contemporary art, and diverse perspectives,
    allowing her to blend classic Southern customs with an open‑minded, modern outlook.
attributes:
  skills: '["Storytelling", "Quilting", "Genealogy research", "Community event organization", "Public speaking", "Southern cooking", "Gardening (heirloom vegetables)", "Volunteer coordination", "Senior
