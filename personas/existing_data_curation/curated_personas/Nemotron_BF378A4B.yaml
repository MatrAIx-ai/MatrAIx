personas:
  professional: Brittany Kastan, a seasoned wood‑cutting and sawmill specialist with over three decades of hands‑on experience, blends meticulous safety oversight with a practical curiosity for new CNC
    technologies as they transition toward a senior safety officer role while mentoring junior staff.
  sports: Brittany Kastan enjoys gentle hikes on the Blue Ridge trails with the local Blue Ridge Hiking Club, follows the Carolina Panthers and Atlanta Braves on television, and participates in weekly bird‑watching
    walks while occasionally joining a senior‑focused low‑impact stretching class at the community center.
  arts: Brittany Kastan finds solace in classic country music, regularly listening to Dolly Parton, Johnny Cash, and Patsy Cline, while immersing themselves in historical fiction by Ken Follett and Philippa Gregory,
    and expressing creativity through quilting heirloom blankets inspired by traditional folk patterns.
  travel: Brittany Kastan prefers nature‑focused getaways, having toured the Great Smoky Mountains and Shenandoah National Park, and dreaming of a tranquil retreat to Acadia National Park in Maine, they
    plan trips with meticulous itineraries but often limit travel to avoid stress and financial strain.
  culinary: Brittany Kastan loves to bake Southern comfort foods like peach cobbler, buttermilk biscuits, and pecan pie, favoring ingredients such as sweet potatoes, fresh herbs from their garden, and locally
    sourced honey, and they consider themselves a competent home baker who occasionally over‑salts their cornbread in pursuit of the perfect flavor.
  core: Brittany Kastan is a detail‑driven wood‑craft veteran who balances cautious financial habits with a love for solitary garden walks, classic country tunes, and the quiet anxiety of always preparing
    for the next safety protocol.
background:
  cultural: Brittany grew up in a multi‑generational, white Appalachian family in western North Carolina. Her upbringing was shaped by the timber and farming traditions of Transylvania County, emphasizing
    self‑reliance, respect for the land, and strong community and church ties. She carries the modesty, practicality, and hospitality characteristic of Southern Appalachian culture, while also preserving
    family customs such as seasonal craftwork, communal meals, and a deep appreciation for the region’s natural heritage.
attributes:
  skills: '[''Wood cutting and sawing'', ''Sawmill machine operation'', ''Routine equipment maintenance'', ''Safety protocol enforcement'', ''Material measurement and quality inspection'', ''Inventory management'',
    ''Basic carpentry'', ''Troubleshooting mechanical issues'', ''Mentoring junior staff'', ''Basic computer literacy for production tracking'']'
  hobbies: '[''Gardening'', ''Bird watching'', ''Hiking on local trails'', ''Reading historical fiction and nature literature'', ''Knitting and crocheting'', ''Quilting'', ''Baking Southern recipes'', ''Small
    group Bible study'', ''Listening to classic country music'', ''Crossword puzzles'']'
  career_goals: Approaching retirement, Brittany aims to transition into a senior safety officer role at her plant, where she can formalize her extensive knowledge of occupational safety and mentor the
    next generation of workers. She also hopes to secure a stable pension and eventually work part‑time as a consultant for small local woodworking shops, sharing best practices and helping them adopt modest,
    cost‑effective technologies. A personal ambition is to learn enough CNC programming to create custom woodworking pieces for family and friends, blending her curiosity for new tools with her practical
    craftsmanship.
