  hobbies: '[''Gardening'', ''Woodworking'', ''Model ship building'', ''Reading historical non-fiction'', ''Chess'', ''Hiking'', ''Photography'', ''Volunteer STEM tutoring'']'
  career_goals: At 69, Belal aims to stay intellectually engaged and give back to his community. He plans to volunteer as a mentor for local high‑school robotics and STEM clubs, offering occasional consulting
    to small businesses on equipment maintenance. He is working on a memoir that chronicles his engineering career and the evolution of technology in his region. Belal also hopes to earn a short certification
    in renewable energy systems to better understand modern sustainability practices, and he looks forward to taking short road trips to historic shipyards along the East Coast to combine his love of history
    with spontaneous travel.
