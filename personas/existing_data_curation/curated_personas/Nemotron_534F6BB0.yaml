  hobbies: '[''LEGO building'', ''Reading adventure/science‑fiction books'', ''Playing soccer'', ''Coding with Scratch'', ''Rock collecting'', ''Map drawing'', ''Jigsaw puzzles'', ''Boy Scouts activities'']'
  career_goals: He dreams of becoming an engineer or architect who designs safe, efficient structures, and he is fascinated by the idea of working on space missions as an astronaut. Artemio also imagines
    helping others as a future teacher or community leader, using his methodical nature to organize projects and support classmates. He is determined to keep learning new skills and to turn his love of
    building and problem‑solving into a career that makes a tangible difference.
