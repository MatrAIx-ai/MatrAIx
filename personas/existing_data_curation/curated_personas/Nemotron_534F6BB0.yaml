personas:
  professional: Artemio Jackson, an 8‑year‑old aspiring engineer, channels their methodical nature into building intricate LEGO sets, creating custom variations, and coding simple Scratch projects, always
    following step‑by‑step instructions and documenting each stage like a junior project manager.
  sports: Artemio Jackson, an avid member of the local ‘Junior Strikers’ soccer team, enjoys Saturday matches at the community park, cheers for FC Barcelona’s attacking play, especially Lionel Messi’s dribbles,
    and participates in occasional youth track‑and‑field events, balancing team competition with personal fitness goals.
  arts: Artemio Jackson, a creative LEGO enthusiast, spends free time sketching maps of imaginary towns, devours adventure novels like Jules Verne’s “Around the World in 80 Days,” watches the “Star Wars”
    saga, and listens to Imagine Dragons, all of which fuel their vivid storytelling and design ideas.
  travel: Artemio Jackson, who loves structured family trips, has explored Yosemite National Park’s granite cliffs, enjoyed a beach vacation in Florida, and dreams of visiting the Grand Canyon and London’s
    natural history museums, always preferring itineraries with clear maps and hands‑on activities like rock collecting.
  culinary: Artemio Jackson, who delights in building “DIY” mini pizzas topped with pepperoni and mozzarella after a LEGO session, also enjoys classic mac and cheese and chicken nuggets, while often negotiating
    extra dessert in exchange for completing a puzzle, but habitually refuses broccoli, calling it “green bricks.”
  core: Artemio Jackson is an organized, curiosity‑driven 8‑year‑old who combines methodical LEGO building, nature‑focused scouting, and structured soccer play into a disciplined yet adventurous outlook,
    occasionally negotiating extra treats in exchange for chores.
background:
  cultural: Artemio is raised in suburban West Springfield, Massachusetts, a town characterized by New England traditions and a close‑knit community. His family’s ancestry includes Anglo‑American roots
    with influences from Irish and English heritage. He celebrates typical American holidays such as Fourth of July parades and Thanksgiving, attends a public elementary school, and participates in local
    community events, sports leagues, and scouting programs that reflect the collaborative spirit of the region.
