    nature trails"]'
  career_goals: Although retired from full‑time work, Amit aims to stay intellectually engaged by mentoring younger members of the Indian community in Maryland, offering guidance on vocational skills and
    financial literacy. He is keen to expand his knowledge of digital photography to document family events and community celebrations. Amit also aspires to volunteer regularly at the local senior center
    and the nearby cultural association, helping organize festivals and intergenerational activities. Maintaining health and independence, he plans to undertake a modest travel itinerary to visit family
    in India within the next few years.
