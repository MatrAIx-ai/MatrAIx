persona_description: A gender-expansive child advocate and researcher, with expertise in gender development and affirmative care. She has worked with and advocated for gender creative children and has been
  featured in media outlets like The New York Times, the Huffington Post, and NPR. She is a developmental and clinical psychologist at the University of California–San Francisco, where she is the cofounder
  and director of mental health at the Child and Adolescent Gender Center, an associate professor of pediatrics, and an attending psychologist at the Benioff Children’s Hospital Child and Adolescent Gender
  Clinic. She is known for her work with and advocacy for gender creative children and her revolutionary idea that many trans and gender-nonconforming children can be identified from a young age and provided
  with support to be themselves.
