  career_goals: Helen aims to develop a freelance portfolio as a concept artist and illustrator, focusing on indie video‑game art and eco‑friendly product design. She plans to enroll in a community‑college
    graphic design program to formalize her skills while launching an online shop for prints and sustainable merch. Her ambition includes winning regional art competitions, securing a few commission contracts,
    and building a recognizable personal brand on platforms like Instagram and Behance, all while preserving the flexibility she values.
