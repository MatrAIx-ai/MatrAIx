personas:
  professional: Helen Holloway is a self‑taught visual creator who leverages Photoshop, Illustrator, Lightroom, and basic HTML/CSS to produce concept art and eco‑friendly product designs for indie video‑games,
    while channeling a competitive, analytically skeptical mindset into leading small‑group critiques and freelance collaborations.
  sports: Helen Holloway is an avid outdoor enthusiast who hikes the Cascade foothills, trail‑runs the Snoqualmie River trail, and belongs to a local climbing gym, while cheering on the Seattle Sounders
    FC and the Seattle Kraken on game nights, and occasionally joins a weekend softball league organized by a neighborhood community center.
  arts: Helen Holloway nurtures a creative life that includes strumming a ukulele at intimate jam sessions, attending indie gallery openings at the Seattle Art Museum's Morning Showcase where works by James
    Jean and local illustrator Maya Hayashi are displayed, and watching experimental theater productions at Seattle's Annex Theatre, while drawing inspiration from sci‑fi illustrators such as Syd Mead and
    the ambient sounds of Björk’s "Biophilia" album.
  travel: Helen Holloway’s travel style blends spur‑of‑the‑moment road trips with a commitment to low‑impact tourism; they’ve camped in Olympic National Park, biked the Burke‑Gilman Trail, and taken a weekend
    ferry to Victoria, BC, and they dream of eco‑lodges in Iceland’s Golden Circle and a cultural immersion in Kyoto’s tea houses, all while budgeting through a travel credit card that rewards sustainable
    purchases.
  culinary: Helen Holloway favors seasonal, locally sourced fare, often cooking wild mushroom risotto with foraged chanterelles, cedar‑plank salmon topped with miso glaze, and a side of quinoa‑kale salad,
    while their coffee ritual revolves around oat‑milk lattes with a dash of cinnamon; they rate themselves as an intermediate home chef who enjoys experimenting with kombucha fermentation and occasional
    vegan baking.
  core: Helen Holloway is a restless, eco‑focused 22‑year‑old visual tinkerer who snaps forests, sketches futures, and trades deadlines for spontaneous art‑fuelled adventures.
background:
  cultural: Helen grew up in Maple Valley, a suburb of Seattle in King County, Washington, within the Pacific Northwest’s blend of outdoor recreation, progressive arts culture, and growing awareness of
    the region’s Indigenous Coast Salish heritage. Her family background is of European descent, and she was raised with an emphasis on environmental stewardship, community volunteerism, and respect for
    local cultural history. These influences shape her appreciation for nature, sustainability, and diverse artistic expression.
