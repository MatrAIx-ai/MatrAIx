personas:
  professional: Jill Williams, a tenacious senior‑center volunteer coordinator who leverages decades of budgeting acumen and hands‑on gardening know‑how to keep community programs running smoothly while
    embracing a flexible, low‑stress approach to leadership.
  sports: Jill Williams delights in the modest cardio of her daily walks along the banks of the Congaree River, cheering quietly from a park bench for the Columbia Fireflies minor‑league baseball team when
    she pauses at the nearby stadium, and occasionally joins a low‑impact senior stretch class at the community center.
  arts: Jill Williams finds solace in the smooth brass of Louis Armstrong’s “What a Wonderful World” and the mellow saxophone of Duke Ellington’s “In a Sentimental Mood,” while her afternoons are punctuated
    by reading Margaret Mitchell’s “Gone with the Wind” and crafting hand‑spun blankets that echo the textile traditions celebrated at local heritage fairs.
  travel: Jill Williams prefers low‑key, organized travel, often joining family on short train excursions to Charleston’s historic district and the Blue Ridge Parkway’s scenic overlooks, while dreaming
    of a relaxed river cruise on the Mississippi that would let her soak in gentle music and leisurely meals without straining her joints.
  culinary: Jill Williams cooks with garden‑fresh herbs, favoring dishes like rosemary‑infused chicken broth, collard greens slow‑cooked with smoked ham hocks, and sweet potato biscuits, and she proudly
    showcases her secret family recipe for pecan praline pie at the senior center’s potluck nights.
  core: Jill Williams is a steadfast, garden‑loving centenarian who balances meticulous budgeting with spontaneous yarn swaps, walks the river for health and nostalgia, and never misses a chance to record
    her family stories before the next sunrise.
background:
  cultural: Jill Anne grew up in the American South and retains many traditions of Southern culture. Raised in a middle‑class white family in Columbia, South Carolina, she was immersed in Methodist church
    life, Southern hospitality, and regional cuisine such as barbecue, biscuits, and peach cobbler. Community values of cooperation and self‑reliance shaped her outlook, and she continues to celebrate local
    holidays like Juneteenth and the state’s historic heritage. Her cultural identity reflects a blend of traditional Southern customs and the evolving diversity of modern Columbia.
attributes:
