persona_description: A highly educated and accomplished American scientist, mathematician, and engineer who made significant contributions to the fields of astronomy, surveying, and mathematics. Rittenhouse
  was born in Germantown, Pennsylvania, and began his career as an astronomer, mathematician, and instrument maker. He later became a leader in the scientific community and served as a member of the American
  Philosophical Society, the American Academy of Arts and Sciences, and the Royal Society of London. Rittenhouse's scientific thinking and experimentation earned him considerable intellectual prestige in
  America and in Europe. He held the post of city surveyor of Philadelphia in 1774, and his scientific skills were used during the American Revolution, particularly in his service on the Committee of Safety
  as an engineer supervising local casting of cannon.
