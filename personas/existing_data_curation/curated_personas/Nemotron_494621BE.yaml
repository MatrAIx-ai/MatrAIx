  career_goals: Terryl aims to advance to a senior engineer or software architect role within the next five years, focusing on designing scalable, secure systems that prioritize reliability. She plans to
    earn certifications such as AWS Solutions Architect and Certified ScrumMaster to broaden her expertise while maintaining a work‑life balance that supports her mental health. Long‑term, she hopes to
    lead a small, autonomous development team where she can mentor junior developers, champion rigorous coding standards, and contribute to open‑source projects that align with her interest in practical,
    community‑driven software. She also dreams of eventually launching a modest SaaS product that solves a niche problem for local businesses in the Detroit metro area, allowing her to combine technical
    leadership with entrepreneurial creativity.
