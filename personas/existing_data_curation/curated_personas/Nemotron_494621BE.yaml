personas:
  professional: Terryl Franklin is a self‑taught full‑stack developer who excels at crafting clean, test‑driven web applications, thriving in solitary, focused environments where their methodical debugging
    and assertive code‑quality advocacy help teammates maintain reliability while they quietly manage anxiety through meticulous documentation and stress‑relief rituals.
  sports: Terryl Franklin enjoys solo hikes in Oakland County parks and weekend trail runs with the Detroit Hiking Club, follows the Detroit Lions for football, the Detroit Pistons for basketball, and schedules
    seasonal cycling trips along the Lake St. Clair shoreline to balance their solitary nature with low‑key cardio.
  arts: Terryl Franklin immerses in contemporary sci‑fi novels by N.K. Jemisin and mystery works by Tana French, curates a personal gallery of landscape photography inspired by Ansel Adams, and unwinds
    to ambient soundtracks from Brian Eno and indie game composer Austin Wintory, shaping a quiet yet richly imaginative aesthetic.
  travel: Terryl Franklin prefers meticulously planned solo trips that blend photography and nature, having hiked the misty trails of Acadia National Park and explored Reykjavik’s street art, while they
    dream of a quiet retreat in Japan’s Kyoto gardens where they can capture autumn foliage with their DSLR.
  culinary: Terryl Franklin, an intermediate home chef, favors comforting dishes like mushroom risotto with fresh thyme, charcoal‑grilled salmon seasoned with miso, and occasionally experiments with Detroit‑style
    pizza topped with pepperoni and caramelized onions, while they often unwind over a meticulously brewed pour‑over coffee with a dash of cinnamon.
  core: Terryl Franklin channels their relentless curiosity into clean code and solitary hikes, yet their anxiety drives them to over‑document every detail and sometimes hoard quirky electronics gadgets
    they rarely use.
background:
  cultural: 'Terryl grew up in Southgate, Michigan, a suburban community within the Detroit metropolitan area. Raised in a middle‑class, white working‑family environment, she was exposed to Midwestern values
    of hard work, modesty, and community responsibility. Her high‑school education at Southgate High School emphasized practical skills and civic involvement, shaping her pragmatic outlook. While her upbringing
    included typical American cultural traditions—such as holiday celebrations, local sports fandom, and a close‑knit neighborhood network—Terryl identifies primarily with the region’s blend of industrial
    heritage and evolving tech culture. This background informs her balanced perspective: she respects established methods but remains curious about innovative technologies, and she values personal reliability
    alongside a desire for quiet, introspective pursuits.'
