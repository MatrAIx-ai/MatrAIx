  hobbies: '[''Weightlifting'', ''Running'', ''Improv Comedy'', ''Toastmasters'', ''Puzzle Solving'', ''Board Games'', ''Volunteering for Community Events'', ''Charity Fundraising'', ''Hiking'']'
  career_goals: Beau aims to secure a full‑time role that leverages his organizational strengths, such as a junior project manager or operations coordinator position within a mid‑size tech or retail firm
    in the Portland metropolitan area. Over the next five years he aspires to advance to a senior management role, lead cross‑functional teams, and eventually launch his own boutique consulting business
    focused on helping small enterprises streamline operations while fostering positive workplace culture. He seeks a career path that offers clear structure, measurable outcomes, and opportunities for
    frequent interaction with colleagues and clients.
