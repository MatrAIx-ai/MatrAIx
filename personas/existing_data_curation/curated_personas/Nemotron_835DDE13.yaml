personas:
  professional: Beau Kobrin, a 24‑year‑old aspiring junior project manager in Portland’s tech sector, leverages meticulous Excel budgeting, basic SQL data pulls, and a natural flair for public speaking
    to drive project execution while constantly seeking structure to keep anxiety in check.
  sports: Beau Kobrin hits the gym three times a week for weightlifting, joins the Portland Marathon training group for weekend runs, avidly follows the Portland Timbers and Trail Blazers, and hikes the
    Columbia River Gorge trails to release nervous energy.
  arts: Beau Kobrin energizes their social side through weekly improv performances with the Portland Laugh Lab, sharpens storytelling at Toastmasters, and relaxes by binge‑watching John Mulaney specials
    and listening to The Strokes, which feed their charismatic stage presence.
  travel: Beau Kobrin favors meticulously planned weekend escapes—such as sunrise hikes in Columbia River Gorge, surf trips to Cannon Beach, and cultural tours of Kyoto—balancing a modest travel budget
    with a craving for new experiences.
  culinary: Beau Kobrin follows a high‑protein meal‑prep regimen featuring grilled salmon, quinoa, and roasted broccoli, enjoys assembling poke bowls with avocado and edamame, yet treats themselves to a
    double‑cheeseburger at a Portland food‑truck festival after hitting project milestones.
  core: Beau Kobrin is a disciplined, socially driven 24‑year‑old who channels anxiety into structured fitness, meticulous career planning, and vibrant community involvement, while occasionally overcommitting
    to social projects and splurging on experiences.
background:
  cultural: Beau was raised in a suburban, middle‑class family in the Pacific Northwest, where cultural values emphasize self‑reliance, hard work, and a close connection to nature. Growing up in Beaverton,
    he was exposed to the region’s progressive social atmosphere, which encouraged community involvement and environmental stewardship. His cultural upbringing blends traditional American holidays and family
    gatherings with local customs such as celebrating the Oregon state fair and participating in neighborhood block parties, fostering a strong sense of community and cooperation.
attributes:
  skills: '[''Project Management'', ''Budgeting & Financial Planning'', ''Data Analysis (Excel, SQL basics)'', ''Process Optimization'', ''Public Speaking'', ''Event Coordination'', ''Team Leadership'',
