  hobbies: '[''Visiting contemporary art galleries'', ''Sketching and painting'', ''Playing the cuatro'', ''Improvisational theater'', ''Cooking Puerto Rican cuisine'', ''Hiking in the Pine Barrens'', ''Yoga'',
    ''Salsa dancing'', ''Reading science‑fiction and philosophy'']'
  career_goals: Cesar aims to ascend to a senior director position where he can shape brand innovation across multiple channels, integrating emerging technologies such as AI‑generated content while preserving
    cultural authenticity. He aspires to launch a boutique agency that specializes in culturally resonant campaigns for Hispanic and Latino audiences, positioning himself as a mentor for emerging marketers.
    Additionally, he wishes to spearhead initiatives that embed inclusive storytelling into mainstream brand narratives and to become a recognized thought leader at industry conferences on the intersection
    of art, culture, and marketing.
