  career_goals: Wallace aims to advance to a department head role for Business and Economics, where he can shape a coherent, skills‑focused program across the district. He seeks to implement a sustainable
    entrepreneurship initiative that blends practical business experience with academic rigor. Long‑term, he aspires to earn a master’s in Educational Leadership and become an assistant principal, using
    his organized, calm leadership style to enhance school operations and foster a collaborative culture. He also hopes to serve on regional education committees to influence policy on career‑ready curricula.
