personas:
  professional: Wallace Garrido is a veteran secondary business education specialist who designs data‑driven curricula, leverages educational technology, and mentors collaborative projects, applying his
    methodical, punctual nature to keep lesson plans, school budgets, and classroom routines precisely on track.
  sports: Wallace Garrido is a devoted fan of the York Revolution baseball team, serves as assistant coach for a local Little League squad, hikes with the York County Trailblazers club in the spring and
    fall, and competes in the York County Fishing League targeting smallmouth bass on the Susquehanna River, balancing structured training with spontaneous weekend matches.
  arts: Wallace Garrido enjoys community theater, regularly performing in productions such as "Our Town" and "The Music Man" with the York County Players, while their downtime includes listening to classic
    folk singer Woody Guthrie, streaming indie folk acts like The Avett Brothers, and collecting vintage posters from the 1970s Broadway revival of "Hair".
  travel: Wallace Garrido prefers well‑planned road trips, having organized a scenic drive through Lancaster’s Amish Country, a hiking vacation to the White Mountains of New Hampshire, and a cultural weekend
    in Savannah, Georgia, and dreams of a guided culinary tour of Italy’s Emilia‑Romagna region, keeping itineraries tight to accommodate family responsibilities.
  culinary: Wallace Garrido is a capable home cook who specializes in Pennsylvania Dutch classics—shooﬂy pie, pork roll, and apple‑butter biscuits—while integrating fresh garden vegetables like heirloom
    tomatoes and sweet corn, seasoning dishes with aged cheddar, smoked paprika, and locally sourced maple syrup, and occasionally experimenting with a sous‑vide for precise temperature control.
  core: Wallace Garrido blends Mid‑Atlantic small‑town work ethic with a love for group activities, using precise planning to lead business classes, coach baseball, and host board‑game nights, yet occasionally
    over‑caffeinates and forgets dental floss.
background:
  cultural: Wallace’s cultural background reflects a Mid‑Atlantic American upbringing in a predominantly white, middle‑class community of York County, Pennsylvania. Raised in a family that values punctuality,
    hard work, and community service, he identifies with the region’s blend of historic small‑town traditions, local sports culture, and appreciation for outdoor recreation. His heritage includes an awareness
    of the area’s agricultural roots and an affinity for the close‑knit social fabric of suburban Pennsylvania.
