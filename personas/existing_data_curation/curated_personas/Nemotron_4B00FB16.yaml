  career_goals: Haley often talks about wanting to be a teacher who helps younger children learn new things, or an artist who can create pictures that make people smile. She also imagines helping people
    like a nurse or community helper, reflecting her caring nature. While her ambitions are playful, they reveal a desire to share knowledge, bring joy, and support others in her community.
