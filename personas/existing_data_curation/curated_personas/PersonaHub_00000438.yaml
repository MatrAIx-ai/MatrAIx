persona_description: A Christian missionary who is deeply concerned with the welfare of the church and the spread of the gospel. He is also interested in the development of a system of worldwide justice,
  human rights, and democracy that exercises authority transnationally. He values the importance of love, knowledge, and insight in the committed Christian life, and believes in the value of right action
  alongside right belief. He is interested in the study of group theory, particularly the concepts and theorems related to subgroups and isomorphisms, and his research interests include the structure of
  finite groups, representation theory of groups, isomorphism problems, and the theory of group automorphisms.
