  hobbies: '[''Visiting art galleries and museums'', ''Attending live theater and music events'', ''Nature photography'', ''Hiking in state parks'', ''Reading non‑fiction (psychology, sociology, art theory)'',
    ''Woodworking'', ''Cooking international cuisine'', ''Exploring new music and podcasts'']'
  career_goals: James aspires to turn his passion for the arts and community service into a full‑time career in nonprofit arts administration. He plans to complete a bachelor’s degree in Arts Management
    within the next three years, while continuing to volunteer at the local museum and cultural center. His long‑term goal is to become a program director, designing and overseeing community art initiatives
    that provide accessible cultural experiences. He also envisions founding a small consulting practice that helps grassroots arts organizations with strategic planning, fundraising, and outreach, allowing
    him to blend his organizational expertise with his love for creative expression.
