  career_goals: Her short‑term goal is to earn advanced certifications such as the Oracle Certified Professional and AWS Solutions Architect within the next two years, positioning herself for senior database
    architect roles. Long‑term, she aspires to lead data‑strategy initiatives for organizations that serve Milwaukee’s underserved neighborhoods, shaping inclusive data governance policies and driving community‑focused
    analytics. She also aims to mentor emerging Black women in technology through workshops and networking groups, eventually moving into a data leadership position like Chief Data Officer while maintaining
    a balanced lifestyle that protects her mental well‑being.
