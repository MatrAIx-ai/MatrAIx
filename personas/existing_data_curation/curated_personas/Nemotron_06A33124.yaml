personas:
  professional: Kissy Mohamed is a data engineer who specializes in relational database design, SQL optimization, and NoSQL solutions such as MongoDB, leveraging her humanities background to translate complex
    technical concepts for non-technical stakeholders, while her preference for structure and collaborative nature drives her to build well-documented, secure data pipelines that support community-focused
    analytics.
  sports: Kissy Mohamed stays active by playing pick-up basketball with fans of the Milwaukee Bucks, hiking Lakefront Park with a camera, and practicing yoga three times a week, while also cheering for
    the Milwaukee Brewers during the baseball season and joining a community softball league in the spring.
  arts: Kissy Mohamed immerses themselves in spoken-word circles at the local coffeehouse, reads works by Toni Morrison and James Baldwin, writes poetry inspired by jazz legends like Nina Simone and Kamasi
    Washington, and regularly attends live jazz performances at venues such as Jazz Salon, shaping a creative identity rooted in storytelling and rhythm.
  travel: Kissy Mohamed enjoys low-cost weekend road trips to Chicago's museums and New Orleans for its music and cuisine, while dreaming of a summer adventure to the Canadian Rockies and a future cultural
    immersion in Morocco's Marrakech, preferring flexible itineraries that leave room for spontaneous photo walks along Milwaukee's lakefront.
  culinary: Kissy Mohamed's cooking skill hovers between confident home chef and experimental enthusiast, mastering soul-food staples like collard greens, fried catfish, sweet-potato pie, and cornbread
    using fresh farmer's-market produce, Cajun spices, and a penchant for sharing hearty meals with friends during Sunday gatherings.
  core: Kissy Mohamed blends analytical rigor with community empathy, juggling detailed data models and spontaneous jazz nights, all while battling chronic worry that fuels late-night code debugging and
    occasional missed appointments.
background:
  cultural: As a Black woman raised in Milwaukee, Kissy’s cultural identity is rooted in the city’s vibrant African American heritage. She grew up attending church services and community gatherings that
    emphasized mutual support, storytelling, and music. Family traditions blend Southern soul‑food cooking with Midwestern influences, and she takes pride in preserving Black literary and artistic contributions.
    She stays connected to the broader Black diaspora through celebrations of Juneteenth, Black History Month events, and participation in local cultural festivals. This background informs her collaborative,
    harmony‑seeking personality and fuels her desire to use data to uplift under‑served communities.
