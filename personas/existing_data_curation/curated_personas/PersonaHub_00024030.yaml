persona_description: 'A researcher and scientist who specializes in the development, use, and applications of game technology for improving health and well-being. This individual is particularly interested
  in understanding the factors that drive adolescent boys and girls'' risk behaviors and designing a video game intervention that is tailored and relevant to this specific at-risk population. They are collaborating
  with Digitalmill and Schell Games to develop a video game called Playforward: Elm City Stories, which is being designed as an interactive world in which the players, using an avatar they have created,
  face challenges and make decisions that bring different risks and benefits. The player will have the ability to see how their choices affect their lives and subsequently be able to move back in time to
  see how different actions might lead to different outcomes. By negotiating challenges in a highly repetitive and meaningful way, the player learns skills that translate to real life, equipping the player
  to avoid situations that increase their risk for HIV.'
