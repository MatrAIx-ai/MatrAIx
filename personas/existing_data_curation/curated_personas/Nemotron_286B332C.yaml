personas:
  professional: Martin Clay, a senior professor of environmental engineering and sustainable design, leverages a methodical, organized mindset and balanced curiosity to lead interdisciplinary research on
    renewable‑energy technologies, design circular‑economy curricula, mentor graduate students, reliably steer department committees, and secure multi‑year NSF grants, and they are celebrated for their
    dependable leadership.
  sports: Martin Clay, an avid cyclist and hiker, they ride the Willamette River trail weekly with the Portland Gravel Club, trek the Columbia River Gorge in summer, cheer for the Portland Timbers and Trail
    Blazers, and they schedule training sessions around conference deadlines, maintaining a steady fitness routine.
  arts: Martin Clay, a nature‑photography enthusiast and indie‑music aficionado, they frequent Portland venues to see The Decemberists, Typhoon and Sufjan Stevens, display their Oregon landscape prints
    inspired by Ansel Adams at community art fairs, and they unwind with documentary films on environmental policy.
  travel: Martin Clay, a meticulous planner, they have trekked Iceland’s geothermal fields, explored Kyoto’s historic gardens, and scheduled a future eco‑tour of New Zealand, always arranging detailed itineraries
    that align with their research calendar and family commitments while budgeting for modest accommodations.
  culinary: Martin Clay, a home‑brewer and backyard chef, they apply laboratory precision to craft a crisp Oregon‑hop IPA, prepare grilled salmon with dill and a mushroom‑vegetable risotto using foraged
    chanterelles, and they enjoy sampling seasonal dishes at Portland’s Pok Pok while occasionally over‑seasoning in experiments.
  core: Martin Clay, a 59‑year‑old environmental engineering professor, they fuse scientific rigor with a love for cycling, woodworking, and craft brewing, navigating life with calm pragmatism, an eye for
    detail, and a habit of meticulously planning every project—and occasionally forgetting to water their indoor succulents.
background:
  cultural: Martin comes from a white, middle‑class family with German and Irish ancestry that settled in the Pacific Northwest in the mid‑20th century. He grew up in a suburban community near Portland,
    where his parents emphasized hard work, education, and civic responsibility. The region’s progressive, environmentally conscious culture shaped his values of sustainability, community service, and social
    equity, while his upbringing instilled a pragmatic, methodical work ethic. As an adult, he has remained in Portland, integrating the city’s culture of outdoor recreation, collaborative problem‑solving,
    and liberal social attitudes with his own balanced, calm disposition.
