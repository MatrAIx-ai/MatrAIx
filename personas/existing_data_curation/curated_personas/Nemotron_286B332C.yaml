  hobbies: '[''Cycling'', ''Hiking'', ''Nature photography'', ''Woodworking'', ''Native plant gardening'', ''Home brewing'', ''Live music attendance'', ''STEM outreach volunteering'', ''Chess'', ''Reading
    nonfiction'']'
  career_goals: Martin aims to establish a cross‑disciplinary research hub at his university focused on renewable‑energy technologies and circular‑economy engineering, securing multi‑year NSF and industry
    partnerships. He aspires to mentor a new generation of graduate researchers, increase his publication record with a seminal textbook on sustainable design, and assume a senior administrative role such
    as department chair or dean to shape academic policies that promote experiential learning and community engagement. Over the next five years he plans to launch a series of community STEM outreach programs
    in Portland, expand the university’s industry‑collaboration portfolio, and, as he nears retirement, transition to an emeritus position that allows him to continue consulting on sustainable engineering
    projects while enjoying a reduced teaching load.
