personas:
  professional: Harriet Bunnell is an advertising sales associate who blends empathetic client listening with data‑driven digital media strategy, leveraging Google Ads and Meta Business Suite while grounding
    her work in the community‑first values of her close‑knit hometown; they balance curiosity for new campaign ideas with practical execution, even if a missed calendar reminder sometimes forces a last‑minute
    scramble.
  sports: Harriet Bunnell is a casual runner who joins the local 'Bluegrass Trails' running club for weekend 5Ks, follows the regional university’s Wildcats basketball team and the city’s Cardinals football
    team, and balances a love of nature walks with occasional yoga at the community center, even though a flexible schedule sometimes results in missed workouts.
  arts: Harriet Bunnell engages with the arts by listening to classic country storytellers like Dolly Parton and modern lyricists such as Sturgill Simpson, reading contemporary novels by Celeste Ng, attending
    productions at the Pioneer Playhouse, and experimenting with pottery after tuning into 'The Great Pottery Throwdown' podcast, all of which satisfy their quiet curiosity while providing a solitary creative
    outlet.
  travel: Harriet Bunnell prefers low‑key, nature‑focused travel, having trekked a segment of the Appalachian Trail through the Great Smoky Mountains, explored the historic streets of Savannah, and planning
    a future road trip to the Texas Hill Country to experience local music festivals and farm‑to‑table cuisine, all while budgeting for short stays at family‑run B&Bs and keeping itineraries flexible enough
    to allow spontaneous detours.
  culinary: Harriet Bunnell enjoys cooking comfort dishes like buttermilk fried chicken, sweet‑potato casserole, and cornbread, often seasoning with garden‑fresh rosemary and thyme, pairing meals with homemade
    lemonade, and occasionally experimenting with bourbon‑infused sauces, though they sometimes forget to defrost ingredients until the last minute.
  core: Harriet Bunnell is a quietly curious 21‑year‑old who balances community‑driven advertising ambitions with solitary reading, pottery experiments, and occasional budgeting slip‑ups, while remaining
    emotionally steady, fiercely compassionate, and delightfully disorganized.
background:
  cultural: Harriet grew up in a close‑knit community in Madison County, Kentucky, where Southern hospitality and a strong sense of neighborhood cohesion are central values. Her upbringing emphasized modesty,
    helpfulness, and respect for tradition, while also exposing her to the region's rich storytelling culture, country music, and local culinary practices such as home‑cooked meals. These cultural influences
    fostered her compassionate nature and cooperative spirit, shaping her desire to contribute positively to her community through her work in advertising.
attributes:
  skills: '["client relationship management", "empathetic communication", "negotiation", "digital advertising platforms (Google Ads, Meta Business Suite)", "market research", "basic copywriting", "presentation
    skills", "CRM software (HubSpot)", "data analysis basics", "creative problem solving"]'
  hobbies: '["reading contemporary fiction and non‑fiction", "jogging and hiking local trails", "gardening", "journaling", "volunteering at an animal shelter", "attending a small book club", "listening
    to marketing and psychology podcasts", "DIY pottery"]'
  career_goals: Harriet aims to progress from her current role into a senior account executive position within the next three years, ultimately leading a small team that focuses on community‑focused advertising
    for local businesses. She plans to obtain certifications in Google Ads and Meta Blueprint to deepen her technical expertise, and she hopes to design campaigns that not only drive sales but also promote
    social responsibility and harmony in her region. In the longer term, she envisions launching her own boutique agency that specializes in ethically‑aligned advertising, helping underserved enterprises
    thrive while maintaining a collaborative, people‑first culture.
