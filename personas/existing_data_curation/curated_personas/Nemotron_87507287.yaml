personas:
  professional: Madelyn Dayton is a teen concept‑artist hopeful, blending bilingual storytelling and digital illustration skills to craft video‑game characters inspired by folklore, while volunteering at
    local cultural festivals and honing their portfolio through weekend workshops at the Denver Art Museum.
  sports: Madelyn Dayton enjoys casual soccer matches with friends, follows the Denver Broncos and Colorado Avalanche with fervor, and channels strategic thinking into chess club tournaments and online
    League of Legends leagues, preferring small‑team play over large‑scale sports events.
  arts: Madelyn Dayton immerses themselves in watercolor painting, digital illustration on Procreate, and street‑art photography, draws inspiration from graphic novels like "Saga" and indie comics, and
    regularly visits the Denver Art Museum and local mural tours to fuel their visual storytelling.
  travel: Madelyn Dayton favors budget‑friendly road trips to the Rocky Mountains and occasional visits to family homelands for cultural festivals, plans trips around school breaks using student discounts,
    and prefers immersive experiences like exploring historic plazas over crowded tourist hotspots.
  culinary: Madelyn Dayton loves cooking vibrant dishes such as tacos al pastor, mole, and tamales with fresh cilantro and chilies, often experimenting with watercolor‑inspired plating while balancing late‑night
    snack runs of pizza during gaming marathons.
  core: Madelyn Dayton is a meticulous yet impulsive teen who channels a love for folklore, strategic gaming, and bilingual storytelling into art, juggling disciplined study habits with occasional late‑night
    creative bursts and a habit of over‑caffeinating before deadlines.
background:
  cultural: Madelyn’s cultural background is rooted in her Mexican family traditions while growing up in the diverse urban environment of Denver. She was raised in a bilingual household, speaking Spanish
    at home and English at school, which has given her a deep appreciation for both cultures. Celebrations like Día de los Muertos, Cinco de Mayo, and family gatherings centered around homemade tamales
    shape her identity and inspire her artistic expression. The vibrant colors, symbolism, and storytelling techniques of Mexican folk art heavily influence her sketches and digital illustrations. At the
    same time, Denver’s thriving Latino community and its blend of modern and historic art scenes provide her with opportunities to engage with contemporary artistic movements. Her upbringing emphasizes
    resilience, family loyalty, and a strong work ethic, values that guide her pursuits in education and art.
attributes:
  skills: '["Bilingual Spanish-English", "Digital illustration (Procreate, Photoshop)", "Basic photography (DSLR)", "Creative writing and poetry", "Independent research and information synthesis", "Organizational
    planning and time management", "Strategic gaming (video games, chess)", "Basic graphic design"]'
  hobbies: '["Sketching and digital illustration", "Watercolor painting", "Visiting museums and street art tours", "Reading graphic novels and indie comics", "Competitive strategy gaming (League of Legends,
    chess)", "Creative writing (poetry, short stories)", "Cooking traditional Mexican dishes", "Volunteering at cultural festivals (Día de los Muertos, Cinco de Mayo)", "Photography"]'
  career_goals: Madelyn aspires to transition from her current middle-school level education to a formal art program. She plans to obtain her GED within the next year and enroll in a community college or
    university that offers a Bachelor of Fine Arts with a focus on illustration and visual storytelling. Her ultimate ambition is to work as a professional concept artist for video games or as a freelance
    illustrator for culturally-focused publications. She hopes to leverage her bilingual background to create artwork that celebrates Mexican heritage and to collaborate with organizations that promote
    Latino arts in Denver. To achieve this, she is building a robust portfolio, attending weekend workshops at the Denver Art Museum, and seeking mentorship opportunities with local artists. She also aims
    to secure a scholarship that recognizes her artistic talent and competitive drive.
