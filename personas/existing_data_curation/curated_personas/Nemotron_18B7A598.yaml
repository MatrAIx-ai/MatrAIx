  career_goals: Approaching the traditional retirement age, Kevin aims to transition from full‑time litigation to establishing a boutique practice focused on property, environmental, and maritime law that
    serves families and small businesses in Cape May County. He seeks to mentor junior attorneys, serve on the local bar association’s ethics committee, and explore part‑time magistrate or arbitrator roles.
    While pursuing these professional milestones, Kevin values a flexible schedule that preserves quality time with his wife and allows him to deepen his community involvement, ensuring his legacy blends
    pragmatic legal service with meaningful mentorship.
