  career_goals: Munir aims to shape the future of local journalism by leading high‑impact investigative projects on coastal environmental and socioeconomic issues. He aspires to become a senior editor or
    newsroom director who can champion data‑driven storytelling and mentor the next generation of reporters. In the longer term, he hopes to launch a community‑focused podcast series and author a book chronicling
    Wilmington’s evolution, all while preserving a flexible schedule that supports his family.
