personas:
  professional: Munir Skaggs is a veteran investigative journalist at a Wilmington daily who blends razor‑sharp public‑records digging with multimedia storytelling, leveraging data visualization and AP‑style
    precision while their laid‑back, sometimes scattered workflow lets them pivot quickly into deep‑dive pieces on coastal environment and social equity.
  sports: Munir Skaggs enjoys low‑key fitness pursuits—early morning jogs along the Cape Fear River, weekend sailing with the Intracoastal Yacht Club, and cheering for the Carolina Hurricanes and the Wilmington
    Sharks while they avoid crowded gyms in favor of solitary bird‑watching hikes.
  arts: Munir Skaggs nurtures a quiet love for the visual and performing arts, photographing marshland scenes inspired by Ansel Adams, savoring blues legends like B.B. King and modern folk singer Brandi
    Carlile, and attending intimate readings of true‑crime author Ann Rule at local book‑club gatherings.
  travel: Munir Skaggs prefers deliberate, historically‑rich travel—spending a weekend wandering the cobblestones of Charleston, a solo road trip to Savannah’s squares, and planning a future pilgrimage
    to Edinburgh’s Old Town—all booked on a flexible schedule that accommodates their family’s intermittent availability.
  culinary: Munir Skaggs relishes cooking Southern comfort food, mastering shrimp‑and‑grits with fresh Gulf shrimp, slow‑cooked collard greens seasoned with smoked turkey, and buttery biscuits, though their
    tendency to lose track of time while editing often results in over‑simmered sauces and a lingering smell of burnt garlic.
  core: Munir Skaggs is a curious, relaxed investigator who trades meticulous data work for spontaneous sailing trips, occasional budget slip‑ups, and a penchant for late‑night shrimp‑and‑grits experiments.
background:
  cultural: Munir is a white American whose family roots trace back to the Mid‑Atlantic and the South. Raised in a middle‑class household that prized self‑reliance and community involvement, he moved to
    Wilmington for college and has made the coastal city his home. His cultural outlook blends traditional Southern modesty with an East‑Coast curiosity, reflected in his appreciation for the region’s maritime
    heritage, historic preservation, and the evolving, progressive media landscape of New Hanover County.
