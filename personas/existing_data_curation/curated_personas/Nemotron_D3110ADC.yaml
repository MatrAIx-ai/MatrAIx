  hobbies: '[''Model railroading'', ''Woodworking'', ''Technical reading'', ''Crossword puzzles'', ''Sudoku'', ''Planned gardening'', ''Amateur astronomy'', ''Collecting vintage engineering manuals'', ''Small-group
    historical technology discussions'']'
  career_goals: Although retired, Carl remains driven to leave a lasting professional legacy. He aims to author a technical memoir that captures his engineering innovations and the lessons he learned, mentor
    a small cohort of promising young engineers from underrepresented backgrounds, and complete a personal project designing a compact, energy‑efficient micro‑hydropower system for his Sacramento home.
    He also seeks to maintain his cognitive sharpness through ongoing learning, stay physically independent, and support his family by sharing his knowledge and experience.
