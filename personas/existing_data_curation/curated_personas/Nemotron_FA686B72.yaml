personas:
  professional: Shawnae Jones is a seasoned marketing manager who blends data‑driven insights with culturally resonant storytelling, leads integrated digital campaigns, negotiates budgets assertively yet
    maintains a collaborative, people‑focused style, and they thrive on flexibility even if their inbox remains a chaotic mosaic of ideas.
  sports: Shawnae Jones kickstarts mornings with Zumba and hip‑hop dance workouts, unwinds through weekly yoga at the Brooklyn Bridge Fitness studio, passionately roots for the New York Knicks and the New
    York Yankees, and they join a community softball league every summer.
  arts: Shawnae Jones captures Brooklyn’s street rhythm on a Leica M10, frequents live jazz at the Blue Note and R&B shows by H.E.R., devours contemporary novels by Sally Rooney and Celeste Ng, and they
    sharpen quick‑wit at improv nights with the Upright Citizens Brigade.
  travel: Shawnae Jones prefers spontaneous, group‑oriented mini‑escapes, often snagging last‑minute Airbnb stays in Williamsburg or road trips to the Hudson Valley, has already explored Austin’s music
    scene, trekked the vineyards of Napa, and they now dream of wandering Kyoto’s temples and a city‑break in Reykjavik while juggling a mid‑level travel budget.
  culinary: Shawnae Jones delights in reimagining classic comfort dishes—like smoked‑turkey collard greens, sweet‑potato mash with a hint of maple, and jalapeño‑cheddar cornbread—while hosting lively brunches,
    and they experiment with spices such as smoked paprika, fresh thyme, and hot sauce to keep the flavors bold.
  core: Shawnae Jones fuses a data‑savvy marketing mind with a love for dance, photography, and soulful cooking, navigating life with a flexible, laid‑back rhythm that’s occasionally punctuated by missed
    appointments, and they remain fiercely committed to championing diverse voices.
background:
  cultural: Shawnae grew up in a vibrant Black community in Brooklyn, shaped by the rhythms of hip‑hop, the flavors of soul food, and the solidarity of neighborhood gatherings. Her family maintains roots
    in African‑American traditions, with influences from Caribbean relatives that add a richer tapestry of music, language, and cuisine. She celebrates cultural milestones such as Juneteenth and community
    parades, and she actively participates in local church events and social justice initiatives. This upbringing instilled a strong sense of pride, resilience, and a commitment to uplifting her community
    through both her professional work and personal passions.
attributes:
  skills: '[''Strategic Marketing'', ''Digital Campaign Management'', ''Brand Development'', ''Social Media Strategy'', ''Market Research & Analytics'', ''Project Coordination'', ''Content Creation'', ''Community
