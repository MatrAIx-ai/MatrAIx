  hobbies: '[''Hip‑hop dance classes'', ''Street photography'', ''Cooking soul food'', ''Live music concerts'', ''Yoga'', ''Reading contemporary African‑American literature'', ''Exploring Brooklyn cultural
    festivals'', ''Volunteer mentoring for youth'', ''Traveling to music festivals'', ''Improvisational comedy workshops'']'
  career_goals: Shawnae aims to rise to a Director of Marketing role where she can shape brand narratives that celebrate diversity and drive social impact. She envisions leading large‑scale, inclusive campaigns
    for a consumer‑focused company while championing equity within the marketing industry. In the longer term, she hopes to launch her own consultancy that helps minority‑owned businesses amplify their
    voices. She also aspires to mentor emerging marketers, speak at industry conferences, and earn an executive MBA to sharpen her leadership acumen.
