personas:
  professional: Jessica Inman is a seasoned bus driver equipped with a Class B CDL and passenger endorsement who excels in precise route planning, punctual schedule adherence, calm conflict resolution,
    and mentorship of new drivers, and is actively pursuing a supervisory or dispatch coordinator position to shape transit operations.
  sports: Jessica Inman enjoys light jogging and brisk walking in local parks, participates seasonally in the South Florida Runners club, roots for the Miami Dolphins and Miami Heat, and volunteers as a
    safety monitor at community sporting events, blending personal fitness with team loyalty.
  arts: Jessica Inman unwinds by devouring classic mystery novels from Agatha Christie to Gillian Flynn, listens to classic rock icons like The Rolling Stones and Southern rock favorites Lynyrd Skynyrd
    during commutes, and attends occasional live country sets by Willie Nelson at nearby venues, shaping a deep appreciation for narrative and music.
  travel: Jessica Inman favors well-planned road trips to nearby state parks such as the Everglades and Ocala National Forest, enjoys family outings to historic towns like Savannah, and dreams of a culinary
    pilgrimage to New Orleans, balancing routine, community connection, and modest adventure within a realistic budget.
  culinary: Jessica Inman boasts an intermediate skill level in the kitchen, often prepares Southern comfort foods like fried chicken, collard greens, and shrimp etouffee alongside Floridian dishes such
    as key lime pie and stone crab, using fresh herbs, garlic, paprika, and vegetables harvested from her own garden.
  core: Jessica Inman is a detail-oriented bus driver who cultivates a vegetable garden, balances structure with occasional spontaneity, and channels her practicality into community service, disciplined
    finances, and a love for mystery novels and classic music.
background:
  cultural: Jessica is a white American who grew up in a middle‑class suburb of the southeastern United States before moving to Apopka, Florida. Her family background reflects a blend of Northern European
    ancestry and traditional Southern values, emphasizing hard work, community involvement, and modesty. Living in Central Florida, she is immersed in a multicultural environment where tourism, Hispanic
    influences, and a strong retiree population shape daily life. Jessica maintains a Protestant Christian affiliation, attending a local church and participating in its outreach activities. Her cultural
    identity combines the practicality and reliability typical of her upbringing with the diverse, service‑oriented spirit of her Floridian community.
