  career_goals: As she looks ahead, Jessica aims to translate her practical experience into leadership within the transit system. Over the next five years she plans to obtain a supervisory or dispatch coordinator
    position, overseeing driver schedules, route adjustments, and safety compliance. She intends to pursue an associate‑to‑bachelor’s pathway in transportation management through online courses, positioning
    herself for an eventual role as a transit operations manager. Additionally, she hopes to become an active union representative to advocate for driver safety and benefits, and to lead driver‑training
    workshops that emphasize customer service and emergency preparedness.
