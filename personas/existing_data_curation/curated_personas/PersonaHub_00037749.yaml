persona_description: A person who is deeply fascinated and knowledgeable about the ancient traditions and practices of Western Europe, specifically the practices associated with the "Fire Festivals" or
  "Cross-quarter days" that occur near the middle of each season. They have a strong understanding of the symbolic meanings and historical context of these festivals, and are skilled in translating these
  meanings into practical applications for contemporary dance practices. They are also skilled in creating and leading workshops that incorporate these practices into a modern dance context.
