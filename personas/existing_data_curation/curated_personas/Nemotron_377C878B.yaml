personas:
  professional: Roxana Jenkins, a 26-year-old animal caretaker whose curiosity for animal behavior meets practical hands-on skill, balances relaxed scheduling with diligent care records, calmly leading
    volunteer teams through busy days as they work toward a senior animal welfare specialist role.
  sports: Roxana Jenkins enjoys weekend beach volleyball at Fort Lauderdale Beach, follows the Miami Heat and Miami Dolphins for a dose of competition, and keeps fit with sunrise yoga sessions that double
    as warm-up for their coastal trail hikes.
  arts: Roxana Jenkins strums acoustic guitar to the smooth sounds of Norah Jones and John Coltrane, reads historical fiction by Philippa Gregory and African-American literature by Toni Morrison in local
    book clubs, and frequently visits the Wynwood Walls to draw inspiration for their animal enrichment designs.
  travel: Roxana Jenkins prefers spontaneous road trips to nearby gems like the Everglades and Key West, while dreaming of a wildlife-focused adventure in Costa Rica's Monteverde cloud forest, balancing
    their love of surf, photography, and a modest travel budget.
  culinary: Roxana Jenkins delights in cooking fresh fish tacos with mango salsa, avocado, and cilantro, perfects a succulent-infused quinoa salad for their indoor garden harvest, and never turns down a
    good cup of cold-brew coffee with a dash of oat milk.
  core: Roxana Jenkins blends a relaxed, curious spirit with deep compassion, juggling their photography, animal care, and spontaneous beach hikes while occasionally misplacing keys and forgetting to pay
    a few bills.
background:
  cultural: Roxana grew up in a vibrant Black community in South Florida, where Caribbean and African‑American traditions interweave with the coastal lifestyle. Family gatherings often featured storytelling,
    music, and shared meals that emphasized communal care and respect for nature. These cultural values shaped her compassionate outlook and her belief in the interconnectedness of humans and animals. She
    draws on her heritage’s emphasis on stewardship and resilience, integrating those principles into her daily work with animals and her community outreach efforts.
attributes:
  skills: '[''Animal handling and safety'', ''Behavioral observation and enrichment design'', ''Basic veterinary first aid'', ''Health monitoring and medication administration'', ''Record keeping and documentation'',
    ''Public education and outreach'', ''Volunteer coordination'', ''Team collaboration and conflict resolution'', ''Flexible schedule management'', ''Basic horticulture for habitat maintenance'']'
  hobbies: '[''Coastal hiking and beachcombing'', ''Wildlife photography'', ''Reading historical fiction and African‑American literature'', ''Acoustic guitar playing'', ''Live jazz attendance'', ''Yoga'',
    ''Indoor succulent gardening'', ''Volunteering at animal shelters'', ''Organizing adoption events and educational workshops'']'
  career_goals: Roxana aims to advance from her current caretaker role to a senior animal welfare specialist, eventually overseeing a team of caretakers and leading a community‑focused animal education
    program. She plans to obtain certification as a Veterinary Technician and pursue a master’s degree in Conservation Humanities, blending her passion for animal care with interdisciplinary research on
    human‑animal relationships. Long‑term, she hopes to help establish a nonprofit sanctuary that provides rehabilitation for rescued wildlife while offering culturally inclusive educational workshops for
    the South Florida community.
