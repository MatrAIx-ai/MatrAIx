  career_goals: Although retired, Randall aims to deepen his involvement with the arts and his community. He plans to volunteer as a docent at the Sheldon Museum of Art, using his art‑history knowledge
    to enrich visitors' experiences. He aspires to complete a memoir about his life in mid‑20th‑century Nebraska and self‑publish it for his family. He also wishes to lead a community workshop on sustainable
    gardening that emphasizes native prairie species. Travel remains a priority; he hopes to explore at least two new cultural destinations each year, such as historic art towns in the Southwest or European
    museum cities, to continue expanding his worldview.
