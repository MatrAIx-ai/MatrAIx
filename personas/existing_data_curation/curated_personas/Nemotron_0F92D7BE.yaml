    game nights with friends", "DIY home projects"]'
  career_goals: Keith aims to complete his bachelor's degree in environmental studies within the next two years, focusing on sustainable community development. He aspires to work as a sustainability analyst
    for a regional non‑profit or local government agency, where he can apply his research skills while promoting environmental initiatives. He also hopes to develop expertise in grant writing to secure
    funding for community projects. Over the long term, he dreams of leading a community‑driven organization that balances ecological stewardship with social equity. In the meantime, he seeks part‑time
    remote work in data entry or content creation to support himself while maintaining flexibility to manage stress and well‑being.
