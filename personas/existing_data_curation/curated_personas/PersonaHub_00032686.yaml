persona_description: A volunteer trainer who specializes in creating and delivering literacy and life skills training programs for Beginning ESL learners. The trainer has experience in developing curriculum
  units and lesson plans that align with the Hamline ABE Teaching and Learning Advancement System (ATLAS) Academic, Career & Employability (ACES) framework. The trainer has a passion for helping Beginning
  ESL learners acquire the necessary language and Transitions skills to build foundations for work and academic pathways. The trainer has expertise in creating curriculum units that present GED-level math
  and science concepts both conceptually and contextually. The trainer has experience in adapting these curricula for use in classrooms.
