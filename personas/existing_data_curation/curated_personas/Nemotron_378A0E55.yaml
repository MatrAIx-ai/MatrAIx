  hobbies: '[''Gardening'', ''Birdwatching'', ''Reading historical fiction'', ''Knitting'', ''Crocheting'', ''Quilting'', ''Cooking'', ''Volunteering at the library'', ''Walking along the Gulf Coast'',
    ''Community theater'']'
  career_goals: Nike hopes to deepen her involvement with the Pinellas Park senior center by leading the Garden Club and eventually serving on its advisory board. She aims to complete a GED program and
    take a short course in nonprofit management at the local community college, which would equip her to mentor younger volunteers. Over the next few years she plans to launch a quarterly neighborhood newsletter
    featuring gardening tips, local history, and health resources, fostering connection among residents. Though retired from formal work, she aspires to remain an active, respected contributor to her community
    while maintaining her personal health and independence.
