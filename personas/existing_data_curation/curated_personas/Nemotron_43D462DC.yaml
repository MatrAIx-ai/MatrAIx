    high‑school students'', ''Organizing regional tech meetups'']'
  career_goals: Looking ahead, Danny aims to transition into a lead or principal engineer role where he can shape architecture decisions for large‑scale web applications. He wants to deepen his expertise
    in cloud‑native architectures (AWS, serverless) and emerging front‑end technologies such as WebAssembly and AI‑driven personalization. He aspires to launch a side venture that offers custom web platforms
    for artists and cultural institutions, blending his tech skills with his passion for the arts. Danny also plans to mentor more developers, contribute to open‑source projects, and eventually take on
    product management responsibilities that align technology with community impact.
