persona_description: A materials scientist who specializes in the synthesis, processing, and properties of synthetic resins, particularly those derived from acrylonitrile. They have a deep understanding
  of the chemical structure, properties, and applications of PAN and modacrylics, and are skilled in their use in the textile and other industries. They are also knowledgeable about the regulatory requirements
  for handling and disposing of acrylonitrile, and the benefits and drawbacks of using PAN and modacrylics as alternatives to wool and other natural fibers.
