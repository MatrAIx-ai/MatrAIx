  hobbies: '[''Sketching and painting'', ''Photography'', ''Acoustic guitar and open‑mic performances'', ''Volunteering at community center'', ''Organizing board‑game nights'', ''Community basketball leagues'',
    ''Hiking and nature walks'', ''Attending local art exhibitions'', ''Reading speculative fiction'', ''Participating in charity events'']'
  career_goals: Daniel aims to translate his disciplined, achievement‑driven mindset and community‑focused compassion into a professional role as a nonprofit program manager or event coordinator. Within
    the next year, he plans to enroll in a community‑college program in nonprofit management or public administration and earn a CAPM (Certified Associate in Project Management) credential. His long‑term
    ambition is to lead a regional arts and youth outreach organization that creates inclusive cultural experiences and fosters harmony in small‑town Arkansas. Ultimately, he envisions launching his own
    social‑enterprise that blends arts education with community service, providing mentorship and creative outlets for underserved youth.
