personas:
  professional: Ken Dupree is a budding architect who builds elaborate block towers with precise color patterns, thriving on the structure of the play set while happily sharing the creations with friends
    during group play.
  sports: Ken Dupree is a spirited member of the Little Kickers soccer club, cheering on the Los Angeles Dodgers during family game nights, and loves the structured routine of practice while occasionally
    feeling stressed if a game ends early.
  arts: Ken Dupree delights in singing along to Raffi’s “Baby Beluga,” dancing to The Wiggles, and drawing characters from Sesame Street, especially Elmo, whose bright colors satisfy their love for predictable
    patterns and friendly themes.
  travel: Ken Dupree enjoys family trips to Disneyland, where they follow the map meticulously, loves beach days at Santa Monica, and dreams of exploring the Grand Canyon’s wide vistas, always packing their
    favorite stuffed koala for comfort.
  culinary: Ken Dupree prefers classic mac and cheese with cheddar, chicken nuggets with ketchup, and crunchy apple slices, often helping stir the pot but occasionally demanding extra carrots when the meal
    feels too familiar.
  core: Ken Dupree, a tiny tornado of orderly play and compassionate sharing, arranges toy cars in perfect rows but succumbs to snack cravings when worries swirl.
background:
  cultural: Ken is raised in a Southern, middle-class family in Smyrna, Georgia, where community values, hospitality, and family gatherings are central. He attends a public kindergarten that reflects the
    diverse fabric of Cobb County, and he participates in church-related activities such as Sunday school, which expose him to gospel music and communal service. Traditional Southern celebrations—like Thanksgiving
    featuring sweet-potato casserole and Christmas neighborhood light displays—are part of his family life. These cultural experiences shape his sociable, cooperative personality and his appreciation for
    routine and shared activities.
