  career_goals: Ken dreams of becoming a firefighter because he admires the teamwork, structure, and the chance to help others. He also imagines being a teacher or a veterinarian one day, showing his caring
    attitude toward people and animals. Right now, his biggest ambition is to read fluently, master writing his name, and help his teacher organize classroom materials, which gives him a sense of purpose
    and confidence.
