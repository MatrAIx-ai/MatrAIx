  hobbies: '[''salsa and cumbia dancing'', ''card games and Lotería'', ''watching Mexican telenovelas'', ''patio herb gardening'', ''cooking family recipes'', ''attending cultural festivals'']'
  career_goals: Although retired from formal work, Juan aims to stay active by offering occasional handyman services to neighbors for supplemental income, while primarily focusing on volunteering at the
    local senior center. He hopes to mentor younger community members in practical skills, learn new digital tools to keep in touch with family, and eventually take a short trip to his hometown in Mexico
    to reconnect with extended family and cultural roots.
