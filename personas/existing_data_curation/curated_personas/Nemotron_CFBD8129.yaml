personas:
  professional: A seasoned handyman-mentor, Juan Sebastiani leverages decades of informal repair, carpentry, and gardening experience to provide occasional handyman services while orchestrating community
    events at the senior center, balancing a practical preference for structure with a relaxed attitude toward scheduling.
  sports: A dance‑enthused fitness fan, Juan Sebastiani participates in weekly salsa and cumbia nights for cardio, joins a local walking club that meets at the park, and loyally roots for the San Antonio
    Spurs (NBA) and the Houston Astros (MLB), preferring low‑impact exercise over rigorous gym routines.
  arts: An arts‑savvy cultural enthusiast, Juan Sebastiani enjoys classic boleros by Luis Miguel, lively cumbia tracks by Los Ángeles Azules, and nightly telenovela marathons like "La Reina del Sur" with
    grandchildren, while regularly attending local mariachi performances at Cinco de Mayo festivals, allowing these rhythms to shape their social gatherings.
  travel: An adventurous yet budget‑conscious traveler, Juan Sebastiani favors spontaneous road trips to nearby state parks such as Big Bend and cultural city stays in San Antonio, while dreaming of a pilgrimage
    to their hometown in Oaxaca, Mexico, planning the journey around family holidays and modest savings.
  culinary: A passionate home cook, Juan Sebastiani excels at preparing traditional dishes like mole poblano, carnitas tacos, and sopa de lima using fresh cilantro, chipotle chilies, and masa harina, enjoys
    sharing these meals during community potlucks, yet often over‑salts recipes out of habit.
  core: Juan Sebastiani blends hands‑on practicality, vibrant community spirit, and a love for rhythm‑filled gatherings, all while juggling modest finances, age‑related health quirks, and a lingering wish
    to revisit the Mexican town of their roots.
background:
  cultural: Juan grew up in a Mexican‑American working‑class family in the Los Angeles area, where Spanish was spoken at home and Catholic traditions shaped daily life. He carries forward the values of
    family solidarity, community reciprocity, and pride in Mexican cuisine. Living in Bellflower, he blends his heritage with Southern California culture, participating in local Latino community events,
    celebrating Día de los Muertos, and maintaining ties to both his Mexican roots and American upbringing.
attributes:
  skills: '[''handyman repairs'', ''basic car maintenance'', ''gardening and lawn care'', ''cooking traditional Mexican cuisine'', ''Spanish-English conversational translation'', ''community event coordination'',
