  hobbies: '[''Visiting art galleries and museums'', ''Sketching historic architecture'', ''Gardening'', ''Woodworking'', ''Wine‑tasting clubs'', ''Reading philosophy and art criticism'', ''Volunteering
    at senior‑center art workshops'']'
  career_goals: Edgar aims to transition from front‑of‑house service to a supervisory role, seeking a position as lead server or assistant manager where he can apply his organizational talents and mentor
    younger teammates. Over the next five years, he hopes to earn a certification in wine service (WSET Level 2) and plan to launch a small, art‑themed café that blends his love for visual art with a curated
    menu. This venture would provide a quiet, intimate setting for community gatherings, aligning with his preference for small groups and his desire to contribute positively to O’Fallon’s cultural scene.
