persona_description: A botanist who specializes in the study of palm trees, particularly those in the Raphia genus. This person is likely to be familiar with the characteristics and distribution of Raphia
  mambillensis, a montane species native to Cameroon. They may have expertise in identifying and studying the unique features of this species, such as the presence of conspicuous filaments of yellowish-reddish
  brown wax along the lower mid rib of the leaflets. They may also be interested in the broader ecological and conservation implications of this species in the Cameroon Range and associated outlying plateau
  along the Nigerian border.
