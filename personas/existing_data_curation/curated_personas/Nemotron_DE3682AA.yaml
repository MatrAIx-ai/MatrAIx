  career_goals: 'Although retired from formal employment, Billy aims to deepen his impact on the Wabash community. He intends to launch a senior‑focused arts program that pairs workshops in painting, music,
    and storytelling with mentorship opportunities for local youth. He also aspires to write and self‑publish a memoir that weaves together his personal history with broader reflections on Midwestern cultural
    change. Volunteering remains central to his ambitions: he plans to expand his role with Meals on Wheels, coordinate intergenerational service projects, and serve as a docent for the county historical
    society. Travel goals include visiting three major art museums in the next five years to fuel his creative curiosity.'
