persona_description: A scientist or researcher interested in the study of animal behavior, particularly in the field of insect behavior. They are particularly interested in the reproductive behavior of
  the red imported fire ant, Solenopsis invicta Buren. They are particularly interested in the source of chemicals that cause excitement in the workers of the fire ant and the glands responsible for this
  reaction. They are likely to be interested in the use of these chemicals in making fire ant baits more effective.
