  hobbies: '[''Cartoon drawing'', ''Watercolor painting'', ''Digital avatar design'', ''Soccer'', ''School art club'', ''STEM YouTube videos'', ''LEGO Mindstorms robotics'', ''Community garden volunteering'',
    ''Mexican folk dance'']'
  career_goals: Indra aspires to combine his love of art and his desire to help others. He envisions pursuing a career as a graphic designer or visual artist who creates culturally resonant murals and community
    art programs for Latino youth in Monterey County. Over the long term, he hopes to study social work or counseling so he can develop art-therapy workshops that support teens dealing with anxiety and
    stress. He also dreams of becoming a mentor in after-school programs, using his artistic talents and empathy to foster a supportive environment for his peers.
