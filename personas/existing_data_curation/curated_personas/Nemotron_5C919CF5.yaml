  hobbies: '[''Hiking'', ''Yoga'', ''Cooking New England cuisine'', ''Reading historical fiction'', ''Journaling'', ''Community theater (set design)'', ''Book club'']'
  career_goals: Melissa aims to transition from a specialist role to an Operations Manager position within the next three to five years, eventually advancing to a Director of Operations role. She plans
    to earn a Lean Six Sigma Green Belt and a Project Management Professional (PMP) certification to bolster her credentials. Her long‑term ambition is to lead enterprise‑wide efficiency initiatives that
    align operational performance with the company’s strategic growth, while also creating mentorship programs for junior staff and preserving a balanced work‑life schedule that supports her creative pursuits.
