personas:
  professional: Sharday Mack, a retired community organizer who now volunteers as a digital‑literacy trainer at the Prince George’s County senior center, blends practical coordination skills with a curious
    embrace of new technology, delivering workshops that are meticulously planned yet adaptable, and they advocate for seniors with a cooperative yet assertive voice.
  sports: Sharday Mack, an avid walker who follows the weekly Washington Nationals baseball schedule and attends select games at Nationals Park, channels their competitive spirit into a local senior bocce
    club and cheerfully supports the Washington Wizards on television while they balance their love for low‑impact exercise with leisurely strolls on the Anacostia River trail.
  arts: Sharday Mack, a devoted member of their church choir who delights in singing Mahalia Jackson’s gospel hymns and Nina Simone classics, frequently attends performances of August Wilson’s plays at
    the nearby theater, enjoys quilting to the rhythm of Aretha Franklin’s soul‑ful tunes, and they draw inspiration from biographies of civil‑rights leaders while curating a modest collection of vintage
    record sleeves.
  travel: Sharday Mack, a careful planner who prefers short, restful trips over long adventures, has already visited the National Museum of African American History and Culture in Washington, D.C., and
    the Baltimore African American Arts Festival, dreams of a weekend pilgrimage to Savannah’s historic district for its riverfront gardens, and they enjoy occasional day trips to the Shenandoah National
    Park’s easy walking trails.
  culinary: Sharday Mack, an intermediate home‑cook who blends garden‑fresh collard greens, smoked turkey, and okra into a soulful gumbo, perfects their sweet potato casserole with a crunchy pecan topping,
    savors a glass of homemade sweet tea with a hint of lemon, and they routinely experiment with heirloom tomato bruschetta while preserving family recipes in a handwritten journal.
  core: Sharday Mack, a lifelong storyteller who balances meticulous budgeting with a secret stash of sweet tea, tends their garden with the same patience they apply to knitting quilts, and they never forget
    to misplace their glasses on the kitchen counter.
background:
  cultural: Sharday grew up in Prince George’s County during a time of profound social change, witnessing the Civil Rights Movement firsthand and experiencing the integration of schools and public spaces.
    Her family’s roots lie in the historic African‑American neighborhoods of Washington, D.C., and the traditions of storytelling, gospel music, and soul‑food cuisine were central to her upbringing. The
    local black church has been a cornerstone of her life, providing spiritual guidance, community service opportunities, and a network of support. She carries forward the values of resilience, collective
    uplift, and reverence for ancestral heritage, which are reflected in her involvement with community events, preservation of oral histories, and celebration of African‑American cultural festivals.
attributes:
  skills: '[''Community event planning'', ''Budgeting and personal finance management'', ''Digital literacy (smartphone, tablet, email)'', ''Gardening and horticulture'', ''Traditional Southern cooking'',
    ''Quilting and textile crafts'', ''Storytelling and oral history preservation'', ''Mentoring and peer support'']'
  hobbies: '[''Gardening'', ''Reading historical fiction and biographies'', ''Quilting'', ''Church choir participation'', ''Genealogy research'', ''Cooking family recipes'', ''Walking in local parks'',
    ''Journaling'']'
  career_goals: Although retired from formal employment, Sharday remains driven to make a lasting impact. Her primary ambition is to document her family's history and the local African‑American experience
    in a memoir that she will share with her grandchildren and community library. She also aims to expand her digital skills by mastering video‑calling platforms to host virtual storytelling sessions for
    youth. Volunteering as a digital‑literacy trainer at the Prince George’s County senior center is a key goal, as is maintaining her health through regular walking and low‑impact exercise to preserve
    independence. Finally, she hopes to travel to the National Museum of African American History and Culture in Washington, D.C., and to attend the annual African American Arts Festival in nearby Baltimore.
