  career_goals: Marvin aims to earn a promotion to Detective Sergeant within the next four years, leading a specialized unit focused on cold-case homicide and art-theft investigations. He plans to complete
    his GED, followed by a part-time Bachelor’s in Criminal Justice, to deepen his theoretical knowledge. By integrating data-analytics and emerging forensic technologies, he hopes to raise the clearance
    rate of complex cases in the Chicago Police Department. Ultimately, Marvin aspires to become a respected mentor for junior investigators and to author a guidebook on unconventional investigative techniques,
    particularly those involving art crimes.
