persona_description: A cartographer who is skilled in manual and computerized drafting instruments, standard mathematical formulas, photogrammetric techniques, and precision stereoplotting apparatuses.
  They work with other mapping scientists to plan and draft maps and charts, interpreting geographic information and transferring that information into a series of symbols that are plotted onto a map. Cartographers
  must also be able to plot the names and exact locations of places onto overlays from which a final map is made. They often work with old maps, using updated information to keep the maps current. Cartographers
  may also have a research interest in updating maps and keeping them accurate.
