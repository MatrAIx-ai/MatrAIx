personas:
  professional: Rhonda Baker, an aspiring teen technologist from the close‑knit community of Gerlaw, merges her love for science‑fiction with hands‑on problem solving in the school’s modest robotics club,
    where their reliable yet flexible nature lets them lead small project teams while they quietly sketch design ideas between build sessions.
  sports: Rhonda Baker stays active through weekend hikes with the Gerlaw Trail Explorers and after‑school soccer matches with the Warren County Wildcats, roots for the Chicago Cubs in summer and the Chicago
    Bulls in winter, and prefers steady, low‑pressure fitness routines over intense competition.
  arts: Rhonda Baker expresses creativity by strumming acoustic renditions of John Denver and Taylor Swift while they sketch Midwest fields inspired by Grant Wood, and they regularly annotate passages from
    Ursula K. Le Guin and Octavia Butler in their journal, weaving together rustic sensibility and speculative imagination.
  travel: Rhonda Baker favors carefully planned weekend trips to nearby nature spots like Starved Rock State Park and family road trips to Chicago’s Museum of Science and Industry, while dreaming of a future
    summer adventure to the Grand Canyon and a spring visit to Kyoto’s cherry‑blossom gardens.
  culinary: Rhonda Baker delights in cooking simple meals with garden‑fresh tomatoes, zucchini, and corn, often preparing a hearty vegetable soup or a rustic pizza topped with basil, cherishes Thanksgiving
    turkey with sage stuffing, and occasionally indulges in a slice of blueberry pie from the local bakery.
  core: Rhonda Baker is a quiet, curiosity‑driven teen who balances journal‑filled introspection with a love for birds, robotics, and late‑night sci‑fi reading, yet habitually forgets to water her garden
    plants.
background:
  cultural: Rhonda is a White teenager from Gerlaw, a small, close‑knit community in Warren County, Illinois. Her family's roots trace back to generations of Midwestern farmers and small‑town entrepreneurs,
    emphasizing self‑reliance, modesty, and community service. She grew up attending a local Protestant church, celebrating traditional holidays such as Thanksgiving, Christmas, and the Fourth of July with
    family gatherings and community events. The rural setting has fostered a strong connection to nature and a practical work ethic, while exposure to school and internet culture has broadened her curiosity
    about the wider world.
