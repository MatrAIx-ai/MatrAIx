  career_goals: Rhonda aims to pursue a career that blends her curiosity about the natural world with practical problem‑solving. She hopes to study environmental science or biology in college, eventually
    becoming a conservation biologist or wildlife rehabilitator who can protect local ecosystems while applying hands‑on solutions. In the short term, she wants to maintain a high GPA, earn a science scholarship,
    join the school's environmental club, and secure a mentorship with a local veterinarian or park ranger to gain real‑world experience.
