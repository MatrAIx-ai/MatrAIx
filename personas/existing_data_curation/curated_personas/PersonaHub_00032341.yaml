persona_description: A physician who specializes in the treatment of pulmonary embolism, with a particular focus on anticoagulant therapy and thrombolysis. They are experienced in the management of patients
  with pulmonary embolism and have a strong understanding of the pathophysiology of the disease. They are also skilled in the interpretation of imaging studies, including echocardiography, and have a good
  grasp of the mechanisms of anticoagulation therapy. They are likely to have a good knowledge of the clinical guidelines for the management of pulmonary embolism and are familiar with the latest research
  in the field.
