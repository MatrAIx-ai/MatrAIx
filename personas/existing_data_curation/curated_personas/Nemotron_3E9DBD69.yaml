personas:
  professional: Aisha Butts, a retired high school Spanish teacher and community organizer, leverages their fluency in Castilian Spanish, curriculum‑development savvy, and sharp, skeptical eye for budgets
    to orchestrate intergenerational programs that blend practical structure with lively, participatory flair.
  sports: Aisha Butts, a bridge tournament regular and avid hiker, proudly wears a Denver Broncos cap while cheering on the team, follows the Colorado Rockies' spring games, and belongs to the Front Range
    Trail Club where they tackle weekly hikes across the plains and foothills.
  arts: Aisha Butts, who swings to the rhythms of Paco de Lucía on their guitar and studies classic flamenco moves inspired by Carmen Amaya, also finds quiet joy crocheting blankets while listening to the
    poetry of Federico García Lorca.
  travel: Aisha Butts, who dreams of tracing her ancestors in Andalusia, Spain, has already explored Santa Fe’s historic plaza and the Great Sand Dunes National Park, prefers meticulously planned itineraries,
    and balances their wanderlust with a modest travel budget that prioritizes cultural immersion over luxury.
  culinary: Aisha Butts, a self‑taught paella maestro, regularly seasons their saffron‑infused rice with fresh rosemary and sun‑ripe tomatoes from their backyard garden, while also perfecting gazpacho and
    tortilla española for their book club gatherings.
  core: Aisha Butts, a fiercely curious 78‑year‑old whose competitive spirit fuels bridge victories and garden harvests, blends meticulous budgeting with a love for spontaneous flamenco twirls, all while
    chronicling family stories in a soon‑to‑be memoir‑cookbook.
background:
  cultural: Aisha was born to Spanish immigrants who settled in the American West during the 1950s. Raised in a bilingual household, she grew up celebrating Semana Santa, Feria de Abril, and other regional
    festivals, while also embracing the rugged, outdoors‑oriented lifestyle of rural Colorado. Her identity blends Mediterranean hospitality, a strong sense of family and community, and the practical, self‑reliant
    values of the High Plains, shaping her active involvement in local cultural events, cuisine, and intergenerational mentorship.
attributes:
  skills: '[''Bilingual communication (English & Spanish)'', ''Event coordination and community outreach'', ''Senior mentorship and basic computer literacy'', ''Curriculum development for adult education'',
