personas:
  professional: Shannika Green, a two‑year‑old with a surprisingly methodical streak, runs a meticulously organized pretend bakery in the playroom, sorting toy pastries by size, adhering to a strict schedule,
    and always keeping their tiny ledger of pretend earnings tidy, and they proudly present each finished cake to the family for inspection.
  sports: Shannika Green, a two‑year‑old fan of the Seattle Seahawks and Seattle Storm, energetically participates in a toddler soccer class at the Emerald City Playhouse, loves splashing in the local park’s
    splash pad, and proudly wears a miniature baseball cap from the Seattle Mariners during weekend outings, and they cheer on the teams with a practiced wave of their tiny hand.
  arts: Shannika Green, an avid admirer of Laurie Berkner’s children’s songs, constantly hums ‘We Are the Dinosaurs’ while crafting crayon drawings influenced by Eric Carle’s bold collages, and delights
    in the animated adventures of Disney’s Mickey Mouse, and they often pause to mimic the rhythm of the melodies with a steady tap of their feet.
  travel: Shannika Green, who prefers structured trips, enjoys the gentle routine of visiting Grandma’s farmhouse in the countryside each summer, has excitedly explored the San Diego Zoo’s petting area,
    and dreams of a sensory‑rich visit to the interactive children’s museum at the Exploratorium in San Francisco, and they keep a tiny scrapbook of stickers from each destination neatly organized by date.
  culinary: Shannika Green, a picky eater with a soft spot for creamy oatmeal topped with banana slices, expertly spreads peanut butter on whole‑grain toast, loves the sweet tang of apple slices with a
    sprinkle of cinnamon, and occasionally cheats on their diet for a bite of chicken nuggets, and they savor each bite with a focused, contented expression.
  core: Shannika Green, the two‑year‑old routine‑obsessed mini‑manager who lines up toy blocks with military precision, saves every coin in a pink piggy bank, and can turn bedtime into a negotiation battlefield,
    all while maintaining a calm, smile‑filled demeanor, and they relish the quiet control of their ordered world.
background:
  cultural: Shannika is a Black child raised in a close‑knit African‑American family in Port Jefferson, New York. Her family honors cultural traditions such as Juneteenth, Kwanzaa, and church holidays,
    sharing gospel and R&B music, communal meals, and stories that emphasize stability, community, and practical life skills. Weekly attendance at a local church offers her a supportive environment that
    values routine, mutual respect, and modest ambition. These cultural influences shape her grounded, organized outlook and her preference for familiar, structured experiences.
attributes:
  skills: '[''Walking'', ''Speaking simple sentences'', ''Self‑feeding with a spoon'', ''Hand‑washing with guidance'', ''Dressing with assistance'', ''Crayon drawing'', ''Block stacking'', ''Sorting objects
