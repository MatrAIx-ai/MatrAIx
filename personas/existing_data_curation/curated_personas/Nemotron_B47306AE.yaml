  hobbies: '[''Building block towers'', ''Shape‑sorting puzzles'', ''Reading picture books'', ''Singing nursery rhymes'', ''Dancing to children’s songs'', ''Helping with simple kitchen tasks'', ''Playing
    with stuffed animals'', ''Sandbox exploration'']'
  career_goals: Even at two, Shannika loves to imitate teachers and caregivers, arranging toys as if in a classroom and narrating her actions. She shows a budding desire to help others within a structured
    environment. In the future she hopes to become a teacher or a pediatric nurse—careers that combine caring for people with clear, predictable routines and practical tasks.
