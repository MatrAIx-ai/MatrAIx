  hobbies: '[''Gardening'', ''Birdwatching'', ''Quilting'', ''Historical Fiction Reading'', ''Local History Research'', ''Genealogy'', ''Cooking and Baking'', ''Volunteer Work (Meals on Wheels, Senior Center)'',
    ''Crossword Puzzles'', ''Digital Photography'', ''Nature Walking/Hiking'']'
  career_goals: Cydney's current ambitions focus on remaining active, knowledgeable, and socially contributing while managing her health worries. She aims to lead a community oral‑history project that records
    the stories of longtime Cheboygan residents, using her research skills and newfound confidence with digital recording tools. She plans to expand her garden into a small demonstration plot that teaches
    sustainable gardening to local youth groups. Cydney also wishes to complete a memoir that weaves family genealogy with personal reflections, and she is taking a short online course in intermediate photography
    to better document her work. Maintaining independence is a priority, so she seeks to establish a weekly wellness routine that includes gentle yoga and mindfulness practices to reduce stress. Finally,
    she hopes to mentor younger volunteers at the senior center, sharing her organizational expertise while continuing her own learning.
