  career_goals: Though still young, Jeffrey often talks about becoming an astronaut who can draw the stars, a comic‑book artist who creates heroic adventures, or a wildlife explorer who discovers new creatures.
    He loves the idea of leading a team in a science project, hoping his ideas will be recognised and celebrated. He also imagines designing his own video games, combining his love for art and competition.
    These aspirations reflect his competitive spirit, curiosity and desire for creative freedom.
