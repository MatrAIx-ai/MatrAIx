personas:
  professional: Jeffrey Graham, an aspiring junior architect and LEGO master, channels his curiosity and competitive streak into designing intricate building sets while juggling a laid‑back attitude toward
    school assignments.
  sports: Jeffrey Graham, a lively member of the Oak Park Little League soccer team, dashes across the field with the same energy he brings to tag games, cheers loudly for the Chicago Cubs and Chicago Bulls,
    and keeps a habit of sneaking extra candy after games despite his parents’ reminders.
  arts: Jeffrey Graham, an enthusiastic sketcher who idolizes Dr. Seuss and Pixar’s animation, spends weekends in community art workshops copying cartoon characters, rebuilds LEGO sculptures inspired by
    the works of Jim Henson, and often informs his friends about the latest space documentary he watched.
  travel: Jeffrey Graham, a curious explorer who plans trips on a crayon‑drawn map, loves day‑long adventures to the Morton Arboretum’s trails and the local library’s story‑time nook, dreams of visiting
    NASA’s Kennedy Space Center, and prefers relaxed, flexible outings over rigid itineraries.
  culinary: Jeffrey Graham, a self‑proclaimed pizza connoisseur, loves topping mini pepperoni circles on homemade dough, blends banana‑strawberry smoothies for snack time, experiments with rock‑candy kits
    that fizz with citric acid, yet frequently forgets to brush his teeth after sticky sweets.
  core: Jeffrey Graham is a curious, competitively spirited seven‑year‑old who blends art, science, and sport into a whirlwind of LEGO constructions, sketch‑filled notebooks, and endless questions, all
    while juggling a tendency to worry and a habit of misplacing his favorite inhaler.
background:
  cultural: Jeffrey is raised in a middle‑class, predominantly white suburban family in Lisle, Illinois, within DuPage County. His family participates in typical Midwestern community activities such as
    neighbourhood sports leagues, church gatherings and seasonal festivals like the Lisle Summer Fest. He frequently visits the local public library and the Morton Arboretum, and his parents encourage exposure
    to mainstream American media, school arts programmes and occasional trips to museums in Chicago. His cultural heritage includes German and Irish ancestry, which is celebrated through occasional family
    traditions and holiday meals.
