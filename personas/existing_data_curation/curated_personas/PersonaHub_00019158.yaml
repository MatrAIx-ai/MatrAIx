persona_description: A healthcare professional with expertise in cornea and external disease care, specializing in adult and pediatric evaluation and consultation for eye conditions. They are familiar with
  advanced diagnostic options and treatment modalities, including corneal transplant, anterior segment reconstruction, intraocular lens implantation, cataract extraction, and excimer laser phototherapeutic
  procedures. They are also involved in the evaluation and treatment of infectious eye diseases, systemic diseases, and contact lens wear, as well as general ophthalmic care. Their knowledge and expertise
  in cornea and external disease care, combined with their advanced diagnostic and treatment options, make them a valuable resource for patients with eye conditions.
