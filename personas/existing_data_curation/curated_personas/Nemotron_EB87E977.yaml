personas:
  professional: Myrna Tarkany, a meticulous three‑year‑old 'toy coordinator' who obsessively sorts blocks by color and size every afternoon, treats each session like a high‑stakes project, and proudly presents
    the perfectly aligned towers to their parents.
  sports: Myrna Tarkany, a three‑year‑old who relishes the routine of weekly toddler gymnastics at the neighborhood YMCA, proudly sports a miniature New York Yankees cap, and insists on a strict warm‑up
    sequence before each tumble, treating every session as a friendly competition they approach with fierce focus.
  arts: Myrna Tarkany, a three‑year‑old who adores the vivid illustrations of Eric Carle’s 'The Very Hungry Caterpillar', sings along to The Wiggles’ upbeat songs, and mimics the graceful movements of Misty Copeland’s
    ballet performances they watch on a preschool DVD, arranging crayons by color before each artistic endeavor.
  travel: Myrna Tarkany, a three‑year‑old who finds comfort in the routine of weekend trips to the nearby aquarium, cherishes the family’s annual stay at a lakeside cabin in Michigan, and dreams of one
    day stepping foot on the Eiffel Tower in Paris, cataloguing each destination with stickers on a travel journal they keep under their pillow.
  culinary: Myrna Tarkany, a three‑year‑old food enthusiast who prefers neatly cut carrot sticks, mild cheddar macaroni, and honey‑drizzled banana mini‑pancakes, insists on arranging each bite in tidy rows
    on their high‑chair tray, and occasionally refuses broccoli because of its texture, prompting a gentle negotiation with their parents.
  core: Myrna Tarkany, a meticulous three‑year‑old who thrives on routine, compulsively lines up stuffed animals, worries over tiny changes, and channels a fierce competitive spark into puzzle races despite
    occasional meltdowns.
background:
  cultural: Myrna was born and raised in Carrollton, Texas, a suburban community in Dallas County. Her family identifies as white American with Midwestern and Southern European ancestry. The household reflects
    typical Texan suburban cultural norms, including regular attendance at a local Christian church, emphasis on family cohesion, practical stewardship, and modest traditional values. Local influences such
    as Texas hospitality, respect for routine and order, and a preference for modest, community‑oriented activities shape her upbringing.
