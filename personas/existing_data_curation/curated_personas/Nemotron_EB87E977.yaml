  career_goals: Even at her young age, Myrna often talks about wanting to work in roles that maintain order and help others. She frequently says she wants to become a teacher or a librarian so she can organize
    books and create calm learning spaces. She also mentions being a nurse, attracted by the practical, caring aspects of the job. Her ambitions gravitate toward careers that value routine, precision, and
    responsibility.
