  hobbies: '["Reading contemporary fiction","Knitting","Cooking and baking","Backyard gardening","Weekend nature walks in Stark County","Journaling","Yoga and mindfulness meditation","Volunteering at community
    center events"]'
  career_goals: Shirley aims to progress from her current sales role to a store manager position within the next two years, focusing on developing leadership and coaching skills while preserving a stable,
    organized work environment. Long‑term, she envisions moving into district management or a corporate retail operations role, where she can apply her business degree to improve store performance across
    multiple locations. She also hopes to eventually open a small, community‑focused boutique that reflects her love for local products and offers a predictable, harmonious workplace for her team.
