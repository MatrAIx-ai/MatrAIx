personas:
  professional: Lisa Karash, a two‑year‑old budding problem‑solver, spends daycare hours mastering block towers and shape‑sorting games, showing early practical reasoning and a love for predictable patterns
    while flexibly adapting to spontaneous play.
  sports: Lisa Karash, a toddler enthusiastic about playground adventures, regularly attends a local parent‑child gymnastics class and cheerfully waves at the hometown baseball team, the Chicago Cubs, during
    family outings, while preferring free‑play swings over structured sports.
  arts: Lisa Karash, a two‑year‑old lover of colors, spends afternoons drawing with Crayola crayons, singing along to Disney’s “Let It Go” and the classic lullaby “Twinkle, Twinkle Little Star,” and enjoys
    watching Pixar’s animated film “Finding Nemo,” which shape their early artistic identity.
  travel: Lisa Karash, a toddler with a penchant for family road trips, has visited the beach town of Myrtle Beach, the San Diego Zoo, and the child‑friendly attractions of Disneyland, preferring short,
    structured itineraries with frequent nap breaks, yet secretly dreams of a future adventure to the snowy slopes of Aspen.
  culinary: Lisa Karash, a two‑year‑old with a developing palate, loves chicken nuggets, mac and cheese, and sweet banana slices, can skillfully stir batter with a wooden spoon, but stubbornly refuses broccoli,
    often negotiating extra dessert if vegetables appear on the plate.
  core: Lisa Karash is a two‑year‑old who thrives on predictable routines while secretly craving spontaneous play, often worries about minor changes, and balances bright curiosity with occasional meltdowns.
background:
  cultural: Lisa comes from a White, mid‑Midwestern American family in Kansas City, Missouri. Her upbringing reflects the region’s emphasis on community, modesty, and seasonal celebrations. She regularly
    participates in local traditions such as community park picnics, Sunday preschool attendance, occasional church gatherings, and Thanksgiving family potluck meals. The city’s cultural mix, including
    nearby jazz heritage and Midwestern values, subtly shapes her exposure to music, art, and communal activities.
