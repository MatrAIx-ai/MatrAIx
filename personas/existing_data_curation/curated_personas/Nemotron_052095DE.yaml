  career_goals: In her imagination, Lisa often pretends to be a caregiver, helping her mother in a toy kitchen or caring for stuffed animals like a teacher. These role‑plays reflect an early wish to contribute
    to a safe and orderly environment and to be valued for practical help. She aspires, within her play, to become someone who provides comfort and stability—such as a ‘helper’ in the household or a future
    teacher—showing an emerging desire for responsibility and structured routine.
