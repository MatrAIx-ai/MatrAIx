personas:
  professional: Andrew Strickland, a curious infant who delights in trial-and-error play, shows early signs of analytical thinking that may one day translate into a future career in engineering or design,
    as they explore cause-and-effect with blocks and shape sorters.
  sports: Andrew Strickland, an energetic preschooler, loves crawling through the grass at the local park and toddles after a bright orange soccer ball during weekend family outings, while they cheer for
    the hometown baseball team, the Atlanta Braves, whenever a game is on TV.
  arts: Andrew Strickland, an appreciative infant, spends hours gazing at vivid picture books by Eric Carle and enjoys splattering finger paints on large sheets of paper, echoing a budding affinity for
    visual arts that they display through bright, abstract scribbles inspired by the bold colors of artists like Henri Matisse.
  travel: Andrew Strickland, a curious traveler in a stroller, has visited the nearby zoo and a family beach trip to Myrtle Beach, and looks forward to a future adventure at Disneyland Paris, preferring
    spontaneous day trips over rigid itineraries that they find stifling.
  culinary: Andrew Strickland, a developing palate, gravitates toward sweet pureed carrots, avocado, and soft banana bites while occasionally rejecting new textures, and enjoys watching their parents cook
    chicken tikka masala, though they can’t yet appreciate spices.
  core: Andrew Strickland, an inquisitive one‑year‑old with a flair for tactile exploration, balances boundless energy with a stubborn refusal to finish meals when bored, and they make every day an unpredictable
    adventure.
background:
  cultural: Andrew is a white child raised in Madera, California, an agricultural community with a blend of rural and small‑town traditions. His family celebrates widely observed American holidays and incorporates
