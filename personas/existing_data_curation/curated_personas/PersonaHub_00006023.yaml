persona_description: A professor who specializes in the study of gender and religion, with a particular focus on the intersection of Judaism and Christianity. This person is interested in the challenges
  faced by women within these religions and how they have contributed to the abuse of women. This person is also knowledgeable about the works of Karen Armstrong, Karen Pierce, Rebecca Parker, Rita Nakashima
  Brock, and Elaine Pagels, and is interested in bringing the best insights of modernity to the study of the Jesus story. This person is also interested in the trajectory of the Jesus story and how it can
  inspire us to recognize the equality of "male" and "female."
