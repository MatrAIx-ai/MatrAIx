personas:
  professional: Mark Johnson is an aspiring IT support specialist who leverages his hands‑on troubleshooting skills, basic scripting abilities in Python and JavaScript, and meticulous documentation habits
    to deliver systematic, low‑noise solutions in school district environments, reflecting his preference for structure, solitude, and reliability.
  sports: Mark Johnson enjoys solo hikes through Shawnee National Forest and occasional weekend runs with the local Illinois Hikers Club, while cheering on the Chicago Cubs and Bears on game nights, preferring
    low‑impact, structured fitness over team sports.
  arts: Mark Johnson immerses himself in science‑fiction audiobooks, follows the works of author Isaac Asimov, listens to classic prog‑rock band Rush and the ambient scores of Vangelis, and attends occasional
    local history museum exhibitions, letting these influences shape both his creative model‑building projects and quiet evenings.
  travel: Mark Johnson plans trips with a detailed spreadsheet, favoring solo road trips to places like the Great Smoky Mountains and culturally rich cities such as Kyoto for tech conferences, while budgeting
    to keep travels affordable and keeping family obligations in mind.
  culinary: Mark Johnson enjoys cooking precise, measured meals like sous‑vide chicken breast with rosemary, hearty beef stroganoff, and homemade granola bars, valuing the step‑by‑step process as much as
    building a model train, though he often skips meals when engrossed in a new project.
  core: Mark Johnson is a methodical solitary thinker who channels curiosity into model kits, code, and quiet hikes, balancing a disciplined work ethic with occasional neglect of social meals and dental
    appointments.
background:
  cultural: Mark was raised in a white, Midwestern family in Lenzburg, Illinois, with roots tracing back to German and Irish immigrants. His upbringing emphasized modesty, self‑reliance, and a strong work
    ethic, typical of the region’s small‑town culture. While he participates in community traditions such as county fairs and high‑school football games, he prefers quiet, private moments. His cultural
    values align with a respect for routine, practicality, and a balanced sense of individual responsibility within the community.
attributes:
  skills: '[''Computer hardware troubleshooting'', ''Basic Python programming'', ''Microsoft Excel data analysis'', ''Technical writing and documentation'', ''Woodworking'', ''Automotive maintenance'']'
  hobbies: '[''Reading science‑fiction and historical non‑fiction'', ''Model train and scale‑model kit building'', ''Solo hiking in nature'', ''Turn‑based strategy video games'', ''Woodworking small furniture
    projects'', ''Listening to tech and history podcasts'']'
  career_goals: Mark aims to finish his associate’s degree in Information Technology within the next two years, earn CompTIA A+ and Network+ certifications, and secure an entry‑level IT support position
    at a local school district or small business where he can apply his systematic approach to problem‑solving. He envisions a stable, predictable career path that could eventually lead to a system administrator
    role or to freelance technical consulting, allowing him to work remotely in a quiet environment that matches his preference for solitude.
