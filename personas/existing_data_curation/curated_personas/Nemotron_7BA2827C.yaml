  career_goals: Eugene aims to advance from a general maintenance technician to a senior facility manager within the next five years. He plans to earn the Certified Facility Manager (CFM) credential and
    obtain specialized certifications such as Building Operator Certification and OSHA 30‑hour training. He hopes to lead a larger team, oversee complex facilities like hospitals or municipal buildings,
    and develop a preventive‑maintenance program that integrates sustainability practices. Long‑term, Eugene envisions launching his own maintenance consulting firm focused on serving community centers,
    churches, and small businesses in underserved neighborhoods, providing mentorship and job‑training opportunities for young Black apprentices.
