personas:
  professional: Eugene Porter, a 32‑year‑old facility maintenance technician, leverages his hands‑on technical expertise in HVAC, electrical, plumbing, and fire‑safety systems, along with his methodical
    organization and natural charisma, to lead preventive‑maintenance crews, train junior staff, and keep complex facilities humming while constantly worrying about staying ahead of compliance deadlines.
  sports: Eugene Porter is a regular at his neighborhood YMCA’s pickup basketball league, where they organize weekly games, cheer for the Atlanta Hawks during the NBA season, and occasionally attend Atlanta
    Falcons games with friends, using the activity as both social outlet and stress reliever.
  arts: Eugene Porter fronts his church choir with soulful renditions inspired by gospel icons Kirk Franklin and Israel Houghton and classic soul legends Sam Cooke, while also enjoying occasional performances
    by the local symphony and keeping a vinyl collection that features John Legend and Marvin Gaye.
  travel: Eugene Porter’s travel style blends deliberate planning and community‑focused trips, having explored New Orleans for its music scene and Savannah’s historic squares, while they dream of immersing
    themselves in Kyoto’s temples and Cartagena’s colonial streets, always budgeting carefully to fund future adventures.
  culinary: Eugene Porter’s culinary passion shines in their slow‑cooked collard greens seasoned with smoked paprika, buttery cornbread, and smoked ribs glazed with honey‑chipotle, a menu they often prepare
    for neighborhood gatherings, while they experiment with a smart‑oven and perfect their sweet tea using fresh‑brewed black tea and organic cane sugar.
  core: Eugene Porter is a charismatic, meticulously organized 32‑year‑old who thrives on community engagement, often overcommits to projects, and quietly battles a persistent undercurrent of worry.
background:
  cultural: Eugene grew up in a close‑knit African‑American family in Trenton’s East Ward, where church, family gatherings, and community events shaped his identity. His parents worked blue‑collar jobs,
    instilling a strong work ethic and pride in self‑reliance. Regular attendance at the local Baptist church exposed him to gospel music, preaching, and a tradition of community service, which nurtured
    his compassionate nature. He celebrates cultural milestones such as Juneteenth and Kwanzaa, and his culinary roots are reflected in the soul‑food recipes passed down through generations. While navigating
    the challenges of being Black in a predominantly white industry, Eugene remains proud of his heritage, actively supports local Black business networks, and mentors younger Black workers to promote representation
    and empowerment.
