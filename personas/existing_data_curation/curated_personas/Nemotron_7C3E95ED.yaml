personas:
  professional: Rodney Butler, a 42‑year‑old mechanical and civil engineer, blends Six Sigma rigor, SolidWorks mastery, and hands‑on welding to deliver cost‑effective infrastructure upgrades for Midwestern
    manufacturers, channeling their competitive, skeptical nature into meticulous risk assessments and their curiosity for renewable retrofits into pragmatic project solutions.
  sports: Rodney Butler, an early‑morning shoreline runner, follows the Detroit Lions and Detroit Red Wings, competes in the Harbor Beach shooting club’s trap‑shooting tournaments each spring, fine‑tunes
    their custom go‑karts for local summer races, and never misses the Harbor Beach high‑school football rivalry game each fall, all while maintaining a disciplined fitness routine to offset the sedentary
    demands of their engineering work.
  arts: Rodney Butler, a board‑game enthusiast who frequents Harborfest’s folk‑music stage, regularly listens to classic rock icons like Neil Young and the storytelling lyricism of Bob Dylan while welding,
    admires the precision of model bridge kits reminiscent of the craftsmanship of Frank Lloyd Wright, and occasionally attends local theater productions featuring actors such as Tracy Letts, finding creative
    inspiration that balances their analytical engineering mindset.
  travel: Rodney Butler, a methodical planner who maps out weekend getaways to the Great Lakes lighthouse trail, has driven the historic Route 66 for a nostalgic road trip, and dreams of touring Germany’s
    engineering museums and Norway’s fjord hydro‑power installations, balancing a modest travel budget with their desire for hands‑on learning and occasional adventure.
  culinary: Rodney Butler, a competent home cook who favors hearty Midwestern fare, often grills Lake Huron perch with fresh dill and lemon, slow‑smokes pork ribs using hickory chips, and occasionally crafts
    hand‑rolled gnocchi tossed in sage‑brown butter, while keeping a well‑stocked pantry of potatoes, corn, and locally sourced cheese for their weekend feasts.
  core: Rodney Butler, a 42‑year‑old engineer with a competitive, skeptical edge, turns weekend fishing trips and go‑kart building into problem‑solving labs, but often sacrifices sleep to perfect CAD models
    and over‑worries about every project detail.
background:
  cultural: Rodney grew up in a three‑generation white Midwestern family with German‑Polish ancestry in Huron County, Michigan. The region’s mix of agriculture, manufacturing, and Great Lakes maritime culture
    fostered a work ethic grounded in self‑reliance, practicality, and straightforward communication. Early exposure to local factories and seasonal lake activities taught him the value of hands‑on craftsmanship
    and community‑oriented projects, while the modest size of Harbor Beach reinforced his independent, competitive nature and his skeptical view of group consensus. He respects local traditions such as
    Harborfest and high‑school football gatherings, yet his personal outlook is driven by individual achievement and a pragmatic assessment of risk, reflecting both his cultural roots and his personality
    profile.
attributes:
  skills: '[''Mechanical engineering'', ''Civil engineering fundamentals'', ''SolidWorks'', ''AutoCAD'', ''Finite element analysis'', ''MATLAB'', ''Python scripting'', ''Advanced Excel'', ''Six Sigma Green
    Belt'', ''Project Management Professional (PMP)'', ''Root cause analysis'', ''FMEA'', ''Quality control'', ''Cost estimation'', ''Welding'', ''CNC machining'', ''Hydraulic and pneumatic troubleshooting'']'
  hobbies: '[''Fishing on Lake Huron'', ''Small‑engine restoration'', ''Custom go‑kart building'', ''Woodworking'', ''Model bridge construction'', ''Engineering podcasts'', ''Reading non‑fiction (renewable
    energy, systems optimization)'', ''Board‑game nights'', ''Shooting competitions'', ''Morning runs'', ''Focused breathing exercises'']'
  career_goals: Rodney’s immediate goal is to obtain a Professional Engineer (PE) license within the next two years and leverage it to advance into a senior project‑lead role overseeing large‑scale infrastructure
    upgrades for Huron County. He is driven to become the company’s go‑to expert on sustainable retrofitting of manufacturing facilities, positioning himself as a competitive advantage in a market that
    values both innovation and cost control. Long‑term, he aspires to launch a boutique engineering consultancy that offers data‑driven, pragmatic solutions to small‑town municipalities and family‑owned
    manufacturers across the Midwest, fulfilling his desire for personal recognition, financial independence, and the ability to set his own performance standards while maintaining a realistic view of market
    demand.
