  hobbies: '[''Gardening'', ''Traditional Mexican cooking'', ''Chess'', ''Card games'', ''Weekly church attendance'', ''Cultural celebrations (Día de los Muertos, Cinco de Mayo)'', ''Listening to corridos'',
    ''Reading Texas history'']'
  career_goals: Although retired from formal employment, Jesus aims to formalize his knowledge by earning a GED and possibly a community‑college certificate in horticulture. He aspires to become a mentor
    at the local senior center, teaching younger generations practical skills such as basic home maintenance and traditional Mexican cooking. He also hopes to compile his life stories and family recipes
    into a handwritten memoir to preserve his cultural heritage for his grandchildren.
