personas:
  professional: Jesus Hernandez, a 72‑year‑old retired handyman, blends decades of woodworking, gardening, and meticulous budgeting into a methodical mentorship role at the senior center while they pursue
    a GED and a horticulture certificate to formalize their practical expertise.
  sports: Jesus Hernandez enjoys early‑morning walks with the local senior walking club, follows the Dallas Cowboys for football, supports the San Antonio Spurs during the NBA season, and occasionally plays
    informal shuffleboard at the senior center.
  arts: Jesus Hernandez immerses themselves in traditional corridos on the radio, especially songs by Los Tigres del Norte, and relishes attending community Día de los Muertos altar exhibitions, where their
    appreciation for folk storytelling shapes their creative expression.
  travel: Jesus Hernandez prefers road trips that combine family visits in neighboring Texas towns with stops at historic mission sites like San Antonio’s Alamo, while dreaming of a pilgrimage to Oaxaca
    to study regional cuisine and craft.
  culinary: Jesus Hernandez excels at preparing classic dishes such as mole poblano, tamales wrapped in corn husks, and tangy salsa verde, often using home‑grown tomatoes, chilies, and cilantro, and they
    regularly preserve harvests through canning and pickling.
  core: Jesus Hernandez, a pragmatic elder with a competitive streak, turns routine into mastery—whether fixing a leaky faucet, budgeting a cent, or perfecting a mole recipe—while quietly challenging the
    world around them.
background:
  cultural: Jesús grew up in a Mexican‑American household steeped in Catholic traditions and Mexican customs. He maintains strong ties to his heritage through language, cuisine, and community rituals. In
    Forney, Texas, he blends his Mexican roots with local Texan culture, celebrating both Mexican holidays and regional Texan festivals. His identity is shaped by a sense of family duty, respect for elders,
    and a commitment to preserving Mexican cultural practices within his adopted community.
attributes:
  skills: '[''Woodworking'', ''Home repair'', ''Gardening'', ''Food preservation (canning, pickling)'', ''Bilingual communication (Spanish-English)'', ''Basic computer literacy'', ''Household budgeting'',
