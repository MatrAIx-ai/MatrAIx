  career_goals: Margarita dreams of growing up to be an artist who paints stories from her imagination, perhaps illustrating children's books. She also imagines becoming a teacher who helps other kids learn
    and feel safe, or a veterinarian who cares for animals. Her biggest ambition is to use her love of art and caring nature to bring joy and harmony to people around her.
