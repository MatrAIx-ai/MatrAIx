personas:
  professional: Margarita Alicea is a budding junior artist who delights in drawing marigolds and sugar skulls, channeling their curiosity and love for harmony into collaborative school art projects where
    they often help peers and embrace flexible, unstructured creative sessions.
  sports: Margarita Alicea enjoys joining the local playground's soccer games with the Los Angeles Youth Soccer Club, cheers enthusiastically for the LA Galaxy and the Los Angeles Dodgers during family
    game nights, and balances their love for running around the park with a tendency to skip structured after‑school ballet practice when a new science experiment beckons.
  arts: Margarita Alicea immerses themselves in creating papel picado for family celebrations while listening to lively cumbia tunes by Celia Cruz and mariachi melodies from Vicente Fernández, often reenacting
    scenes from the animated film 'Coco' and sketching characters from Pixar's 'Inside Out', letting art soothe their worries and express their vibrant imagination.
  travel: Margarita Alicea thrills at weekend trips to nearby Griffith Park and family outings to San Diego's zoo, dreams of visiting the historic streets of Guanajuato with their grandparents, and loves
    spontaneous summer visits to Disneyland, appreciating the blend of familiar community gatherings and new adventures, though their parents' budget sometimes limits longer journeys.
  culinary: Margarita Alicea loves helping in the kitchen to roll tiny tamales with corn masa, sprinkle chili powder on pozole, and drizzle avocado crema on fresh fruit salads, proudly claiming the title
    of 'mini‑chef' despite frequently spilling ingredients and creating colorful messes that their family happily cleans up.
  core: Margarita Alicea is a curious, art‑loving 7‑year‑old whose love for family traditions and bright creativity balances a habit of worrying and a carefree approach to money, health, and play.
background:
  cultural: Margarita comes from a Mexican-American family in La Puente, California. She speaks both English and Spanish at home and celebrates traditions such as Día de los Muertos, Cinco de Mayo, and
    family gatherings with tamales and pozole. Her grandparents teach her folk dances and songs, and she participates in school events that highlight Hispanic heritage. The values of familismo, respeto,
    and comunidad are important in her upbringing, shaping her caring nature and desire to keep harmony within her family and school community.
