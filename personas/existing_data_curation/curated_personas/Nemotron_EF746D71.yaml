  hobbies: '[''Fishing'', ''Barbecue gatherings'', ''Dancing (cumbia, norteño)'', ''Community festivals'', ''Baseball league'', ''Reading true crime'', ''Historical documentaries'', ''Cooking Mexican dishes'']'
  career_goals: Rogelio aims to move into a supervisory or senior records‑management role within the county office, where he can lead a small team, mentor younger clerks, and spearhead digital archiving
    initiatives. He plans to obtain a professional certification such as Certified Records Manager (CRM) to solidify his expertise. Balancing work with his community spirit, he also hopes to coordinate
    volunteer programs or cultural events that leverage his organizational skills and sociable nature.
