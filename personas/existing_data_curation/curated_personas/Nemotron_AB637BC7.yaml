  hobbies: '[''Surfing'', ''Hiking'', ''Coastal Photography'', ''Chess'', ''Strategic Video Gaming'', ''Reading Non-Fiction (Economics, Psychology, Stoicism)'', ''Experimental Cooking'', ''Blogging about
    Financial Resilience'']'
  career_goals: Jamshid aims to become a distinguished boutique wealth advisor in San Diego, focusing on a curated client base that values privacy and personalized service. He plans to earn the Certified
    Financial Planner (CFP) and Chartered Financial Analyst (CFA) designations within the next three years to deepen his analytical credibility. Long‑term, he envisions launching his own independent advisory
    firm that integrates sustainable and impact investing, allowing him to explore emerging ideas while maintaining his pragmatic, results‑oriented approach. He also aspires to author a column on financial
    resilience for a regional business publication, positioning himself as a thought leader who blends calm confidence with competitive insight.
