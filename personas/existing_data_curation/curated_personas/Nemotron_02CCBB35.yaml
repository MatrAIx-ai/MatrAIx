  hobbies: '[''Sketching and drawing'', ''Watercolor painting'', ''Digital illustration on tablet'', ''Reading graphic novels'', ''Writing short stories'', ''Photography of lakes and sunsets'', ''Exploring
    local nature trails and tide‑pools'', ''Playing sandbox video games (Minecraft, Stardew Valley)'', ''Listening to indie and alternative music'', ''Journaling'']'
  career_goals: Dorothy dreams of turning her love for visual storytelling into a professional path. She hopes to attend a high‑school program focused on fine arts, build a portfolio of illustration work,
    and eventually study graphic design or museum studies in college. Her long‑term ambition is to become an illustrator for children’s books or a curator who highlights regional artists in Michigan’s museums.
    She also wants to develop the confidence to lead community art workshops, using her creative skills to inspire younger kids while managing her own anxiety through supportive work environments.
