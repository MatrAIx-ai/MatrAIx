personas:
  professional: Dorothy Carroll, an aspiring teenage illustrator and digital comic creator, merges meticulous watercolor techniques with sandbox game world‑building to produce story‑rich panels that channel
    her curiosity, organized work ethic, and occasional anxiety‑driven creative bursts.
  sports: Dorothy Carroll, a member of the Lake Michigan Swim Club and occasional varsity soccer player, enjoys early‑morning beach runs, hikes along tide‑pool trails, and cheers for the Chicago Cubs while
    sometimes skipping practice to finish a comic panel.
  arts: Dorothy Carroll, an avid sketcher, watercolorist, and digital comic enthusiast, draws inspiration from artists like Hayao Miyazaki, Kazu Kibuishi, and indie musicians such as Phoebe Bridgers, while
    devoting weekends to photographing sunsets over the lake and curating mood‑matching playlists.
  travel: Dorothy Carroll, who loves weekend road trips to Michigan’s Upper Peninsula waterfalls and dreams of a spring pilgrimage to Kyoto’s manga districts, plans her travels around school breaks, prefers
    budget hostels over luxury hotels, and often captures sunrise timelapses at the shore before heading home.
  culinary: Dorothy Carroll, a budding home chef, favors simple yet flavorful dishes like lemon‑garlic salmon, avocado toast with radish, and homemade blueberry pancakes, enjoys experimenting with fresh
    herbs from the farmers market, and occasionally over‑indulges in sugary cereal while binge‑watching graphic novel adaptations.
  core: Dorothy Carroll, a stress‑prone teen artist who transforms worry into watercolor sunsets, indie playlists, and meticulously drawn comics, while juggling a love for nature, tight finances, and occasional
    procrastination.
background:
  cultural: Dorothy grew up in Muskegon, Michigan, a Midwestern city on the western shore of Lake Michigan. Her family’s roots trace back to German and Irish immigrants who settled in the region during
    the early 20th century, bringing with them a strong work ethic, modest values, and a love for community gatherings. The local culture emphasizes seasonal outdoor activities—fishing, beach outings, and
    lake‑front festivals—which have shaped her appreciation for natural landscapes. Muskegon’s small‑town spirit, combined with exposure to the Muskegon Museum of Art and school arts programs, nurtured
    her curiosity about visual expression. While she embraces typical Midwestern hospitality and a sense of practical responsibility, she also feels the pressure of academic expectations and social comparison,
    contributing to her heightened sensitivity to stress.
