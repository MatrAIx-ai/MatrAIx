persona_description: A ferry safety expert and advocate who is concerned about the safety and stability of ferries, particularly in low-income countries where ferry tickets are often sold at a low price
  to attract more passengers. They are knowledgeable about ferry safety standards and regulations, and have experience working with governments to improve ferry safety. They are also familiar with the International
  Maritime Organization's guidelines and have participated in regional safety meetings to encourage governments to commit to better regulation enforcement and improve ferry safety.
