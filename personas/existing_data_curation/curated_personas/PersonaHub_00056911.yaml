persona_description: A teacher and educator who has made significant contributions to the education and cultural preservation of the Inuit people in northern Alaska. Martha Aiken is an educator born in
  Barrow, Alaska, of Inupiat descent, and has authored 17 bilingual books for the North Slope Borough School District, translated 80 hymns for the Presbyterian Church, and been a major contributor to an
  Inupiaq dictionary. Sadie Brower Neakok, an educator, community activist, and magistrate from Barrow, has been instrumental in introducing the American legal system to the Inupiat. Melvin Olanna, an Inupiat
  sculptor and jewelry designer, has devoted his life to Native issues and the revitalization of Alaskan arts. Joseph Senungetuk, an activist as artist, writer, and teacher, has spent many years in San
  Francisco and worked on sculpting. Larry Ahvakana, an Inupiat sculptor and mixed media artist, has used modern sculptural techniques blended with his Native heritage to create lasting pieces in stone
  and wood. Howard Rock, a mathematics professor who specializes in the study of group theory, particularly the concepts and theorems related to subgroups and isomorphisms, has been nominated for a Pulitzer
  Prize.
