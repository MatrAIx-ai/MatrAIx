personas:
  professional: Javon Mckey is a meticulous home‑health aide who excels at mobility assistance, medication reminders, and precise documentation, using their organized mindset and strong communication to
    advocate for seniors while preparing for CNA certification and a future supervisory role.
  sports: Javon Mckey stays active through weekend hikes with the Lake County Trails Club, occasional pick‑up basketball games, and a disciplined routine of 30‑minute walks and light resistance training,
    while cheering on the Orlando Magic and Tampa Bay Rays as their favorite professional teams.
  arts: Javon Mckey is a passionate visual storyteller who photographs Florida’s wetlands, sketches sunrise vistas during hikes, draws inspiration from Ansel Adams and Georgia O’Keeffe, regularly attends
    the Mount Dora Arts Festival, and shares classic jazz records by Miles Davis and Ella Fitzgerald during senior‑center craft sessions, letting art and music shape their creative rhythm.
  travel: Javon Mckey prefers a blend of spontaneous road trips to nearby nature preserves like the Ocala National Forest and carefully planned cultural getaways to New Orleans and Savannah, balancing a
    modest travel budget with a desire to explore sites tied to African‑American history while scheduling trips around caregiving responsibilities.
  culinary: Javon Mckey, an avid home gardener and competent cook, often prepares shrimp‑and‑grits with fresh Gulf shrimp, roasted beet and kale salads tossed with goat cheese and candied pecans, and grilled
    zucchini seasoned with rosemary, while occasionally indulging in a spicy jambalaya from a local Cuban restaurant.
  core: Javon Mckey blends meticulous caregiving with a restless artistic curiosity, juggling weekly garden chores and camera outings while secretly hoarding vintage jazz vinyls and a half‑finished woodworking
    bench in the garage.
background:
  cultural: Javon was raised in a close‑knit Black family in Central Florida, where church, family gatherings, and community events formed the core of his upbringing. Celebrations such as Juneteenth and
    Emancipation Day, along with weekly worship services, reinforced a sense of cultural pride and collective responsibility. The diverse population of Lake County exposed him to a blend of Southern traditions
    and Afro‑Caribbean influences, shaping his appreciation for music, storytelling, and culinary heritage. These experiences fostered a deep respect for community solidarity and a commitment to preserving
    African‑American cultural narratives while engaging with the broader multicultural fabric of Florida.
attributes:
  skills: '["Personal Care Assistance","Mobility Support","Medication Management","Vital Signs Monitoring","Documentation & Record Keeping","Client Advocacy","Emergency Response (CPR)","Care Plan Development","Time
    Management","Cultural Competency"]'
  hobbies: '["Photography","Sketching","Attending Local Art Exhibitions","Reading African American History and Literature","Gardening","Woodworking","Community Volunteering at Senior Center","Jazz Listening"]'
  career_goals: Javon aims to formalize his expertise by obtaining a Certified Nursing Assistant (CNA) credential within the next year, followed by a diploma in health‑care administration from a community
    college. He envisions moving into a lead‑caregiver or supervisory role at a home‑health agency in Lake County, where he can mentor new aides and shape care‑delivery standards. Long‑term, he hopes to
    launch his own boutique personal‑care service that emphasizes culturally sensitive support for senior members of the African‑American community in Central Florida.
