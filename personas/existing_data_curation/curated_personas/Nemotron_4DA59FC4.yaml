    parties'', ''Collecting vintage vinyl records'', ''Crossword and Sudoku solving'', ''Board game strategy sessions'', ''Exploring emerging technology (blockchain, AI)'']'
  career_goals: Ideally, Kurtis wants to move from a clerk‑level position to a senior financial leadership role where he can shape strategy and mentor younger staff. His ambition is to become a controller
    or CFO for a small‑to‑mid‑size nonprofit arts organization in the Asheville area, merging his financial acumen with his passion for creativity. He plans to earn a Certified Management Accountant (CMA)
    credential, deepen his knowledge of emerging fintech tools, and build a reputation as a trusted advisor who can translate abstract financial data into actionable insights. Over the longer term, Kurtis
    envisions launching a boutique consultancy that helps arts‑focused startups manage cash flow and secure funding while preserving their artistic vision.
