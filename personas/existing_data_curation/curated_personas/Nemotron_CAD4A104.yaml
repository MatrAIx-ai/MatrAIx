  career_goals: Romulo aims to advance to a senior logistics leadership role within the next five years, overseeing multi‑modal operations across the Gulf Coast. He plans to spearhead the adoption of AI‑driven
    demand forecasting and sustainable, carbon‑neutral logistics initiatives at his company. Ultimately, he envisions establishing his own consultancy that helps U.S. firms streamline supply chains with
    a focus on Latin American markets, while also serving as a mentor and speaker on competitive logistics strategies at industry conferences.
