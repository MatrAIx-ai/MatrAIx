persona_description: A female designer who is passionate about textiles and has a deep understanding of the Bauhaus movement. She is particularly interested in Gunta Stölzl, the only woman at the Bauhaus
  to achieve the prestigious title of full master, and her contributions to the school's weaving workshop. She is also interested in the use of Jacquard looms and the Jacquard technique, and her interest
  in textiles and design extends to the use of various materials and techniques. She is likely to be a collector of textiles and design objects, and she is interested in learning more about the history
  and development of the Bauhaus movement.
