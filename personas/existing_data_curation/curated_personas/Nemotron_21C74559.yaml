  career_goals: Glenda aims to achieve ASE Master Technician certification and deepen her expertise in advanced hybrid and electric vehicle systems. In the next five years she plans to open an eco‑friendly
    auto repair shop in Sequoyah County that blends cutting‑edge technology with custom artistic design services. She also aspires to become a certified instructor at a local vocational college, mentoring
    the next generation of mechanics, and to lead community outreach programs that promote safe vehicle maintenance and sustainable transportation practices.
