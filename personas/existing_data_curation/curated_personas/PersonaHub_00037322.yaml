persona_description: A researcher or policy analyst who is interested in the study of water resources and their impact on international conflict, particularly in the context of the Jordan River watershed.
  They are skilled in interdisciplinary analysis and have a deep understanding of the physical, legal, economic, and political aspects of water resources. They are also familiar with alternative dispute
  resolution methods and have experience evaluating water-related conflicts through a technical, economic, and political lens. They are likely to be interested in the potential for water to be a subject
  for conflict resolution and have a passion for finding solutions to complex international water disputes.
