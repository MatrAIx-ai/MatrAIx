persona_description: A research team leader in the field of energy efficient computing systems, with a focus on improving the energy efficiency of computing systems across all abstraction layers. The team
  collaborates with both leading companies and universities, at the national and international level, and has been selected as one of seven groups at NTNU to get special support for work with applications
  to EU's Horizon 2020 research program. The team aims to disseminate its research results to the scientific community through scientific publications and collaborates with leading companies to contribute
  to their research activities.
