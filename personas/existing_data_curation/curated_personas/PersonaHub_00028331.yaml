persona_description: A cosmologist who is interested in the study of galaxies and their interactions, particularly the Virgo Cluster and its member galaxies. This person is likely to be knowledgeable about
  the Chandra X-ray Observatory, which is used to observe galaxies in the Virgo Cluster, and the Chandra X-ray Image of NGC 4438 and NGC 4435. They would be interested in the details of the collision between
  the two galaxies and the fate of their hot gas.
