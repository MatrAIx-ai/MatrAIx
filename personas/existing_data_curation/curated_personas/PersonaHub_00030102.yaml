persona_description: A materials scientist who is conducting research on the use of flax fibres in composite materials. The research aims to explore the mechanical properties of flax fibres and their potential
  as an alternative natural fibre source for developing reinforced composites for various industries. The researcher is interested in studying the mechanical properties of the produced samples using three
  point bending and Izod impact tests, and inspecting the fracture surfaces of the reinforced composite samples with the help of SEM. The researcher is also interested in improving the fibre/matrix-interface
  bonding in the composites by de-waxing the flax fibres prior to composite fabrication.
