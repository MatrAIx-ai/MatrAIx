  hobbies: '[''Hiking in the Sangre de Cristo Mountains'', ''Fishing in the Arkansas River'', ''Playing guitar and listening to blues/soul/gospel music'', ''Volunteering with Habitat for Humanity'', ''Southern
    cooking and grilling'', ''Reading HVAC industry publications'', ''Woodworking and furniture making'']'
  career_goals: Linwood aims to achieve master-level certification (NATE Master Technician) and obtain EPA Section 608 certification for advanced refrigerant handling. Over the next five years, he aspires
    to launch his own HVAC contracting business that emphasizes reliable, energy-efficient services for residential and small commercial clients in the Fountain Valley and surrounding areas. He also seeks
    to become a mentor for younger technicians, particularly those from underrepresented backgrounds, and to contribute to community programs that promote sustainable home heating solutions and green energy
    integration. Financial stability and the ability to support his family and community are central motivations behind his career ambitions.
