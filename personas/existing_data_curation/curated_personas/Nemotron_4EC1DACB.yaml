personas:
  professional: Linwood Pettway, a seasoned HVAC technician with more than two decades of experience, leverages meticulous diagnostic expertise, energy‑efficiency optimization, and compassionate client
    communication to mentor apprentices while systematically tackling complex system failures.
  sports: Linwood Pettway, an avid hiker and fly‑fisher on the Arkansas River, participates in the local Boulder Outdoor Club, cheers for the Denver Broncos on Sundays, and supports the Colorado Avalanche,
    while they maintain a modest cardio routine by tackling mountain ascents each weekend.
  arts: Linwood Pettway fills evenings with soulful blues on a well‑worn acoustic guitar, drawing inspiration from B.B. King, Etta James, and gospel legends like Mahalia Jackson, and they regularly attend
    live jam sessions at Denver’s historic Blues Bar.
  travel: Linwood Pettway prefers road‑trip adventures that blend scenic hikes and fishing opportunities, having explored New Mexico’s Sandia Mountains, Utah’s Zion National Park, and dreaming of a future
    trek through Patagonia’s Patagonian Andes, all while keeping travel costs within a modest family budget.
  culinary: Linwood Pettway delights in cooking classic Southern comfort foods—collard greens simmered with smoked turkey, buttery cornbread, and crispy fried chicken—using a cast‑iron skillet, and they
    often pair meals with a cold Arkansas River trout, occasionally experimenting with a smoky BBQ rub.
  core: Linwood Pettway balances a methodical HVAC career and community service with a love for blues guitar, mountain hikes, and Southern cooking, all while wrestling with chronic worry and a habit of
    over‑working.
background:
  cultural: Linwood’s cultural background is rooted in African American traditions that trace back to the Deep South. His grandparents migrated from Mississippi to Colorado during the Great Migration, seeking
    better economic opportunities. Growing up in a close‑knit Black community near Pueblo, he was shaped by the church’s emphasis on fellowship, music, and service. Family gatherings often featured soul
    food, gospel singing, and storytelling that reinforced values of resilience, compassion, and perseverance. As a Black professional in a predominantly white industry in Canon City, Linwood has navigated
    subtle biases and opportunities, deepening his commitment to mentorship and community uplift. He maintains strong ties to his heritage by attending local Black cultural events, supporting Black‑owned
    businesses, and preserving the culinary and musical traditions of his ancestry.
