  hobbies: '[''Watercolor Painting'', ''Reading (fiction & poetry)'', ''Gardening'', ''Hiking'', ''Journaling'', ''Meditation'', ''Attending Art Exhibits'', ''Volunteer at Community Library'']'
  career_goals: Renee aims to transition from classroom teaching to a district-wide curriculum specialist role, focusing on art-infused interdisciplinary programs that foster creativity and critical thinking
    in rural schools. She plans to pursue a master’s degree in Curriculum and Instruction to deepen her research skills and to design evidence-based professional development workshops for her peers. Over
    the next five years, she hopes to lead a pilot project that integrates visual-arts modules into the math and literacy standards across Monona County schools. Ultimately, Renee envisions a leadership
    position—such as assistant principal or director of arts education—where she can influence policy and expand opportunities for quiet, reflective learning spaces while still championing innovative, student-centered
    pedagogy.
