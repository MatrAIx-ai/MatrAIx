personas:
  professional: Renee Rose is an experienced elementary and middle‑school teacher in rural Iowa who blends visual arts with core subjects using differentiated instruction and educational technology, while
    their calm, organized yet flexible approach creates quiet, reflective learning environments that nurture student curiosity.
  sports: Renee Rose enjoys low‑impact fitness, trekking the rolling trails around Mapleton with the Mapleton Hiking Club in spring and autumn, shoveling snow as informal cross‑country skiing in winter,
    and cheering quietly for the Iowa Hawkeyes during football season while rarely participating in organized team sports.
  arts: Renee Rose channels their love of visual storytelling through watercolor studies of the Iowa landscape, drawing inspiration from historic masters like John Singer Sargent and contemporary artists
    such as Agnes Martin, while finding solace in the poetry of Ocean Vuong and regularly visiting the Iowa State University Muse exhibition and the small but vibrant Mapleton Art Gallery.
  travel: Renee Rose prefers low‑key travel that blends quiet contemplation with artistic inspiration, often spending weekend getaways at the Iowa countryside’s Cedar Rapids Art Trail, exploring the Great
    Smoky Mountains, and making yearly pilgrimages to England’s Lake District to sketch misty lakes, all planned meticulously but leaving room for spontaneous sketch sessions.
  culinary: Renee Rose enjoys simple, seasonal cooking that showcases heirloom tomatoes, purple carrots, and basil from their garden, often preparing a rustic ratatouille or a bright quinoa salad with lemon
    zest and goat cheese, while indulging occasionally in a well‑made miso ramen bowl with shiitake mushrooms on rainy evenings.
  core: Renee Rose blends a quiet, solitary temperament with a boundless curiosity, crafting tranquil classroom spaces and personal retreats that nurture both art and introspection, yet they occasionally
    hoard extra watercolor paper in the hopes of a future masterpiece.
background:
  cultural: Renee was raised in a small farming community in western Iowa, the daughter of parents with German and Irish ancestry who instilled values of hard work, modesty, and community service. Growing
    up in Mapleton’s close‑knit environment, she participated in seasonal town festivals, church gatherings, and local volunteer initiatives, which fostered a deep appreciation for rural traditions and
    collective responsibility. Although her family practiced Catholicism, Renee now identifies as spiritually inclined, drawing comfort from the quiet, natural surroundings of the Midwest. This cultural
    backdrop shapes her preference for solitude, her respect for orderly routines, and her commitment to nurturing the next generation through thoughtful, arts‑rich education.
attributes:
