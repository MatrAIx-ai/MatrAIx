personas:
  professional: Jacoba Farris is a seasoned advertising and promotions manager who wields data‑driven creativity to craft integrated brand campaigns, expertly balancing curiosity and ROI‑focused pragmatism
    while navigating high‑pressure negotiations with a calm, competitive edge; they leverage their interpersonal finesse to build lasting client relationships and aim to climb to a senior marketing director
    role before launching a purpose‑driven boutique agency.
  sports: Jacoba Farris leads a co‑ed recreational basketball league in the suburbs, proudly cheering for the Philadelphia 76ers and the Eagles, and spends Saturday mornings trekking the rolling hills of
    the Pennsylvania countryside with a local hiking club; their competitive nature pushes them to log at least three weekly workouts, though they sometimes skip a session when a fundraiser deadline looms.
  arts: Jacoba Farris participates in a community theater troupe that stages classics like Neil Simon’s The Odd Couple, regularly attends live performances at Philadelphia’s World Café featuring artists
    such as Leon Bridges and The War on Drugs, and curates a personal collection of 1950s vintage advertising postcards, drawing creative inspiration from photographers like Henri Cartier‑Bresson and street‑photography
    legend Vivian Maier; they often channel these artistic influences into compelling copy for brand campaigns.
  travel: Jacoba Farris prefers curated weekend escapes that blend outdoor adventure with cultural immersion, often planning spontaneous hikes in the Poconos while booking boutique B&Bs in Bethlehem, and
    they have a bucket list that includes a culinary tour of Barcelona’s tapas bars, a sunrise trek in Bali’s rice terraces, and a nostalgic road trip along historic Pennsylvania Dutch Country; their travel
    planning hinges on flexible itineraries that can be reshaped around a last‑minute fundraiser commitment.
  culinary: Jacoba Farris is an avid home cook who thrives in cooking classes that dissect international dishes like Spanish paella with saffron, Japanese ramen broth, and Ethiopian injera served with berbere‑spiced
    stews, and they often showcase brunch prowess with avocado toast topped with poached eggs, smoked salmon, and drizzled sriracha aioli; their pantry is stocked with fresh herbs, quinoa, and canned chickpeas,
    though they occasionally over‑order exotic spices, leaving them to pile up in the kitchen cabinet.
  core: Jacoba Farris blends a competitive fundraising fire with a laid‑back, data‑driven marketing mind, juggling vintage ad collections, weekend hikes, and spontaneous brunches while they keep a modest
    eye on finances, health, and a relentless drive toward a senior director role and eventually their own purpose‑first agency.
background:
  cultural: Jacoba grew up in a middle‑class, suburban family in the Greater Philadelphia area, reflecting an Anglo‑American cultural heritage common to Bucks County. Her upbringing emphasized independence,
    hard work, and community involvement. She attended local public schools where she experienced a mix of traditional American holidays and the diverse cultural influences of the Mid‑Atlantic region. As
    an adult, she remains engaged with the local community, supporting farmers’ markets, regional arts festivals, and neighborhood events, blending classic Mid‑Atlantic values with a contemporary, entrepreneurial
    mindset.
