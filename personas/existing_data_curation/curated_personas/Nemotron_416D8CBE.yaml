  career_goals: Jacoba aims to move into a senior marketing director role within the next five years, overseeing larger, multi‑channel campaigns and guiding brand strategy for national clients. She plans
    to earn a bachelor’s degree in marketing to complement her associate’s credential, and eventually launch her own boutique agency that focuses on purpose‑driven, community‑focused advertising. Mentoring
    emerging talent, especially women in the industry, and becoming a recognized thought leader at conferences and industry panels are also key ambitions.
