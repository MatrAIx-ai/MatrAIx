personas:
  professional: Grace Cordoves, a diligent 15‑year‑old middle‑school student, channels her love of structure into leading the class science fair project, where their methodical planning, meticulous record‑keeping,
    and competitive drive consistently earn top awards.
  sports: Grace Cordoves, an ambitious midfielder on the middle‑school soccer team and member of the community club Arizona Rush, trains five days a week, idolizes the Phoenix Suns and Arizona Cardinals,
    and applies their competitive spirit to improve stamina and tactical awareness each season.
  arts: Grace Cordoves, who crafts scrapbook pages for family events, enjoys listening to Billie Eilish and Lin‑Manuel Miranda’s Hamilton soundtrack while sketching, and spends weekend evenings binge‑watching
    the Netflix series ‘Stranger Things,’ integrating pop culture references into their DIY projects.
  travel: Grace Cordoves, who prefers structured family trips, has explored the Grand Canyon and Sedona on school field trips, dreams of visiting Mexico City to trace the origins of family recipes, and
    plans future weekend getaways to the Pacific coast town of Santa Barbara, balancing budget constraints with a desire for cultural immersion.
  culinary: Grace Cordoves, an aspiring home cook, follows a weekly schedule to prepare traditional Mexican dishes such as tamales, pozole, and chiles en nogada, delights in ingredients like corn masa,
    chipotle, and fresh cilantro, and meticulously documents each trial in a recipe journal, though they occasionally over‑salt in their enthusiasm.
  core: Grace Cordoves is a routine‑obsessed teen who blends competitive soccer, methodical cooking, and diligent budgeting into a disciplined yet occasionally sleep‑deprived lifestyle, punctuated by a
    penchant for scrapbook perfectionism.
background:
  cultural: Grace comes from a Mexican‑American family that maintains strong ties to their heritage while living in Conroe, Texas. Spanish is spoken at home alongside English, and family gatherings often
    feature traditional foods such as tamales and pozole. She celebrates cultural holidays like Dia de los Muertos and the Feast of Our Lady of Guadalupe, attending a local Catholic parish with her family.
    The community’s blend of Texan and Mexican influences shapes her appreciation for both cultures, and she often helps organize cultural events at school that showcase Mexican music, dance, and cuisine.
attributes:
  skills: '["Time management", "Organizational planning", "Bilingual Spanish-English communication", "Microsoft Office proficiency", "Basic spreadsheet analysis", "Structured cooking (Mexican cuisine)",
    "Class representative leadership"]'
  hobbies: '["Cooking Mexican dishes", "Journaling", "Playing soccer", "Reading non-fiction", "DIY crafts and scrapbooking"]'
  career_goals: Grace aims to pursue a career that offers stability, routine, and opportunities to help others. She plans to attend a community college after high school to earn an associate degree in nursing,
    with the long‑term goal of becoming a registered nurse in a local hospital. She is also exploring accounting as a backup path, attracted by its systematic nature and clear career progression. Grace
    envisions further education through scholarships and eventually giving back to her community by mentoring younger students.
