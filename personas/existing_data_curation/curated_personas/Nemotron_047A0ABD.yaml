  hobbies: '[''Reading historical fiction'', ''Genealogy research'', ''Photography'', ''Hiking in state parks'', ''Birdwatching'', ''Knitting'', ''Volunteering at senior center'', ''Playing bridge'', ''Gardening'',
    ''Listening to classic jazz'', ''Practicing yoga'']'
  career_goals: Sabrina aims to leverage her practical curiosity to stay at the forefront of security technology by completing a certification in advanced video analytics and exploring cybersecurity fundamentals
    applicable to casino operations. She hopes to transition into a mentorship role, training new guards and developing a comprehensive well‑being program for staff that incorporates stress‑management techniques.
    Over the next few years, she aspires to lead a community‑based safety initiative in Pike County, establishing a neighborhood‑watch network and offering workshops on personal safety for seniors. Ultimately,
    she envisions a semi‑retired consultancy where she can advise regional gaming establishments on harmonizing safety protocols with a compassionate workplace culture.
