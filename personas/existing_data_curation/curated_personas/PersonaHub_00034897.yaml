persona_description: A speech language pathologist with a background in augmentative and alternative communication who has adapted children's books for children with special needs. She has used her skills
  to find a variety of ways to make learning more accessible for children with both cognitive and physical disabilities. She is interested in adapting books and using specific strategies to engage children
  in the book reading process. She is creative and open to different ways of adapting books, and she values each book that she adapts as a unique opportunity to make a difference in the lives of children
  with special needs.
