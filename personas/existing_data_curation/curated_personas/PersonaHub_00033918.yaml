persona_description: A financial analyst who tracks economic indicators and market trends related to global trade, current account balances, and trade balances. They are interested in the relative performance
  of different economies in terms of their trade balances, current account deficits, and surpluses, and how these impacts the global economy. They are also interested in the relative economic performances
  of the UK's trading partners, particularly in relation to the EU and non-EU markets, and the extent of overseas demand for UK products. They are also interested in the rise in the share of services in
  UK trade and the impact of this on the UK's relative strength in services activities.
