  career_goals: Lucas aims to progress from his current surveillance officer role to a supervisory position, such as Surveillance Team Lead, and eventually become a Security Operations Manager overseeing
    multiple casino venues in the Dallas‑Fort Worth area. To support this trajectory, he plans to complete a bachelor’s degree in criminal justice or security management and obtain professional certifications
    like Certified Protection Professional (CPP) and Professional Certified Investigator (PCI). He also hopes to design a training curriculum for new security staff that incorporates stress‑management techniques
    and art‑based observation exercises. Long‑term, Lucas envisions establishing a community arts center in Arlington that offers workshops for at‑risk youth, merging his passion for art with his commitment
    to community safety and well‑being.
