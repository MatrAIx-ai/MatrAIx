personas:
  professional: Kyra Otero, a 70‑year‑old mixed‑media installation artist and community arts educator, merges her expertise in acrylic, watercolor, collage, digital photography, bilingual storytelling,
    and genealogical research to produce ambitious installations about diaspora identity, employing a meticulously organized yet flexible workflow driven by a competitive desire for grant success and critical
    recognition.
  sports: Kyra Otero stays active through gentle garden work, a senior yoga class, and weekly walks, while cheering for the Oklahoma City Thunder basketball team and attending Oklahoma State Cowboys football
    games, approaching fitness with a low‑impact, community‑oriented mindset.
  arts: Kyra Otero channels her boundless imagination into abstract acrylics, mixed‑media collages, and poetry, drawing inspiration from Mark Rothko’s color fields, John Cage’s experimental soundscapes,
    Celia Cruz’s vibrant rhythms, and regularly visits the Oklahoma City Museum of Art, the Dayton Art Institute, and avant‑garde music performances to fuel her creative practice.
  travel: Kyra Otero prefers meticulously planned journeys that blend cultural immersion with comfort, having revisited Old San Juan’s historic streets, explored the wine valleys of Napa, and dreaming of
    a summer residency in Marfa, Texas, she balances structured itineraries with spontaneous detours to local galleries.
  culinary: Kyra Otero showcases her culinary skill by crafting traditional arroz con gandules, pasteles wrapped in banana leaves, and herb‑infused sofrito from garden‑grown ingredients, often sharing these
    dishes at intimate gatherings where she pairs them with craft beer and occasionally experiments with decorative edible paints on desserts.
  core: Kyra Otero embodies a fiercely curious, disciplined elder artist who intertwines cultural memory with vibrant mixed‑media creations, mentors emerging talent, and balances meticulous planning with
    spontaneous creativity, all while occasionally forgetting medication and indulging in premium paint splurges.
background:
  cultural: Kyra was born to Puerto Rican parents who emigrated to the United States in the early 1950s. Raised in a bilingual home in Oklahoma City, she grew up steeped in the island’s music, folklore,
    and culinary traditions while navigating the Midwestern landscape. Her family maintained close ties to Puerto Rico, celebrating fiestas, cooking iconic dishes such as arroz con gandules and pasteles,
    and preserving the Spanish language. This bicultural upbringing fostered a hybrid identity that blends the vibrant colors, rhythms, and narratives of Puerto Rico with the quieter plains of Oklahoma.
    Kyra actively participates in the local Puerto Rican community’s cultural events, volunteers for heritage preservation projects, and incorporates island motifs—such as coquí frogs, tropical flora, and
    Caribbean color palettes—into her artistic practice. Her fluency in both Spanish and English enables her to bridge cultural gaps and advocate for diaspora stories within the broader Oklahoma cultural
    scene.
