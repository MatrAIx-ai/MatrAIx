  career_goals: Eager to continue her personal growth, Kyra aims to complete a series of large-scale mixed-media installations that intertwine abstract visual language with narratives of Puerto Rican diaspora
    experiences, and to showcase them in a solo exhibition at the Oklahoma City Museum of Art. She also plans to author and self-publish a memoir that weaves together her life story, family recipes, and
    reflections on cultural identity, preserving her heritage for future generations. Kyra seeks to mentor emerging artists through monthly workshops at the local community arts center, and to collaborate
    with the Oklahoma Historical Society to document and archive oral histories of Puerto Rican families in the state. Additionally, she intends to acquire proficiency in digital illustration tablets to
    expand her artistic toolkit and to apply for a small grant to fund a community mural project celebrating cultural diversity.
