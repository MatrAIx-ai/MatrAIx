  skills: '[''Traditional Gujarati cooking'', ''Home vegetable and herb gardening'', ''Quilting and crochet'', ''Household budgeting'', ''Cultural storytelling'', ''Basic digital communication (video calls)'']'
  hobbies: '[''Cooking family recipes'', ''Vegetable and herb gardening'', ''Reading devotional poetry'', ''Crocheting'', ''Listening to classical Indian music'', ''Watching classic Bollywood movies'',
    ''Playing rummy'', ''Attending small religious gatherings'']'
  career_goals: Although retired from formal employment, Bibi aims to continue fostering intergenerational bonds by mentoring her grandchildren in cooking, gardening, and cultural traditions. She aspires
    to volunteer occasionally at the local community center, helping organize small Indian cultural events that celebrate festivals like Navratri and Diwali. Maintaining her health and independence remains
    a personal priority, as does planning a brief family trip to India to reconnect with relatives and revisit her roots. She also hopes to document her family recipes in a handwritten cookbook to preserve
    them for future generations.
