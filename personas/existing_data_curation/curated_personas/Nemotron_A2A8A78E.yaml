personas:
  professional: Lindsey Chavda, a seasoned structural engineer turned sustainability consultant, draws on twenty years of AutoCAD, Revit, Python, and GIS expertise to offer meticulous low-impact design
    guidance, insisting on scrupulous data-driven reports and solitary, methodical project planning that satisfies their preference for structure and independence.
  sports: Lindsey Chavda, a dedicated early-morning walker and bird-watcher at Croft State Park, follows the local hiking club, roots for the Carolina Panthers and Greenville Drive, and supplements their
    activity with weekly low-impact yoga sessions to maintain flexibility without the strain of competitive sports.
  arts: Lindsey Chavda, who finds quiet inspiration in the detailed landscapes of Andrew Wyeth, the minimalist photography of Ansel Adams, and the folk storytelling of the Avett Brothers, spends evenings
    solving mechanical puzzles while listening to classical piano suites, and cultivates a modest collection of vintage gardening prints.
  travel: Lindsey Chavda, who prefers thoughtfully planned trips over spontaneous getaways, has explored the historic streets of Charleston, the misty mountains of Asheville, and the lavender fields of
    Provence, while dreaming of a solitary retreat to the volcanic landscapes of Iceland to photograph sunrise over lava fields.
  culinary: Lindsey Chavda, an avid herb grower, enjoys cooking low-impact dishes such as sautéed shrimp with garlic, thyme, and lemon over whole-grain couscous, often pairing it with seasonal heirloom
    tomatoes and fresh basil from their garden, though they sometimes forget to defrost protein ahead of time.
  core: Lindsey Chavda, a meticulous, solitary problem-solver, blends structural engineering precision with a love for native-plant gardening, woodworking, and low-impact living, while occasionally battling
    the procrastination that follows long, quiet evenings.
background:
  cultural: Lindsey’s cultural background is rooted in the Southern Appalachian region of the United States. Her family lineage is a blend of English, German, and Irish ancestors who settled in the Carolinas
    in the 18th century. Raised in a small‑town environment in South Carolina, she was immersed in values of self‑reliance, modesty, and a respect for tradition and the natural landscape. The local culture
    in Spartanburg County emphasizes community gatherings, church involvement, and a close connection to the land, which has shaped her pragmatic outlook, love of gardening, and appreciation for quiet,
    orderly spaces. While she identifies as white, she acknowledges the region’s complex history and strives to honor the heritage of her ancestors through participation in local historical societies.
attributes:
  skills: '[''Structural analysis'', ''Computer-aided design (AutoCAD, Revit)'', ''Project management'', ''Data modeling (Python, R)'', ''Technical report writing'', ''Site inspection'', ''Advanced Excel'',
