  hobbies: '[''Gardening (native plants)'', ''Birdwatching'', ''Mechanical puzzles'', ''Crossword puzzles'', ''Woodworking'', ''Reading historical nonfiction'', ''Journaling'', ''Mindfulness meditation'',
    ''Herb cultivation'', ''Landscape photography'']'
  career_goals: Lindsey seeks to channel her engineering background into a small, home‑based consulting practice that assists local builders with sustainable design and code compliance. She aspires to author
    a practical guide on low‑impact construction tailored to the Upstate South Carolina climate. Over the next five years, she hopes to establish a mentorship program that introduces middle‑school girls
    in Spartanburg County to STEM careers, leveraging her competitive spirit and desire for personal impact. While she values independence, she also plans to maintain a flexible schedule that respects her
    preference for solitude and structured routines.
