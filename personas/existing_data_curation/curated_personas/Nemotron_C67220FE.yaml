  career_goals: Although retired from formal employment, Connor aims to solidify his legacy by establishing a modest scholarship fund for local high school students interested in business and the arts.
    He aspires to author a memoir that interweaves his experiences in the corporate world with reflections on art, novelty, and the evolving cultural landscape of Florida. Connor also seeks to serve as
    a trusted advisor on the board of the Stuart Historical Society, helping to preserve the region's heritage while encouraging innovative programming for the community.
