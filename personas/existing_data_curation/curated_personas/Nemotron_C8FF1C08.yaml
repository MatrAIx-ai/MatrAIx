  career_goals: Sarah is focused on leaving a lasting impact before retirement. She aims to fully integrate sustainable, green-cleaning initiatives at her current facility and earn the Certified Executive
    Housekeeper (CEH) credential. She wants to mentor younger team members, creating a structured yet flexible onboarding program that balances procedural rigor with her spontaneous style. Looking ahead,
    Sarah hopes to transition to a part-time consulting role, helping nearby hotels and senior-living communities adopt efficient, low-stress housekeeping systems. On a personal level, she seeks to manage
    her anxiety through regular mindfulness practice while maintaining a supportive work environment.
