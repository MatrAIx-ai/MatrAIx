personas:
  professional: Ulises Mendoza, a disciplined 17‑year‑old visual artist, combines their mastery of traditional sketching, Procreate, and basic Python scripting to create narrative‑driven concept art and
    UI mock‑ups for indie game prototypes, and they meticulously curate a bilingual portfolio that showcases culturally inspired motifs to secure a scholarship for graphic design studies.
  sports: Ulises Mendoza regularly hikes the Sandia Mountains, belongs to a high‑school climbing club, follows New Mexico United soccer matches, and they blend cardio with photography on the trails, while
    occasionally joining casual basketball pick‑up games at the community center to stay active.
  arts: Ulises Mendoza immerses themselves in creative pursuits—drawing daily in a sketchbook, digital painting inspired by the surreal worlds of Hayao Miyazaki, crafting short speculative stories reminiscent
    of Neil Gaiman, and composing acoustic guitar melodies echoing José González—while they volunteer on community murals that celebrate traditional folk motifs.
  travel: Ulises Mendoza prefers meticulously planned road trips, having explored the deserts of New Mexico and the turquoise waters of Lake Powell, and they dream of visiting Kyoto’s historic temples and
    the Atlas Mountains, balancing a modest travel budget with a craving for photographic inspiration.
  culinary: Ulises Mendoza enjoys cooking spicy chilaquiles with fresh salsa verde and avocado‑lime smoothies, and they often indulge in late‑night pizza slices topped with jalapeños, reflecting a palate
    that blends comfort foods with bold, tangy flavors.
  core: Ulises Mendoza is a hyper‑organized teen dreamer who channels relentless curiosity into art and code, battles periodic anxiety, and they balance a disciplined work ethic with impulsive splurges
    on creative tools.
background:
  cultural: He is a Mexican‑American growing up in Albuquerque, New Mexico, a city that blends Southwestern desert culture with vibrant Hispanic traditions. His family maintains strong ties to Mexican customs,
    celebrating Día de los Muertos, Cinco de Mayo, and family gatherings with traditional food and music. He is fluent in both Spanish and English, and his bilingual background informs his artistic style,
    often incorporating folk motifs, bright colors, and symbolism from Mexican art. The desert environment and the multicultural community of Bernalillo County shape his worldview, fostering a respect for
    cultural diversity and a desire to represent his heritage in his creative work.
attributes:
  skills: '["Traditional Sketching", "Digital Illustration (Procreate, Photoshop)", "Bilingual Communication (Spanish/English)", "Basic Web Design (HTML/CSS)", "Simple Python Scripting for Interactive Art",
    "Creative Writing (Speculative Fiction)", "Project Planning and Time Management", "Graphic Design (Adobe Illustrator)"]'
  hobbies: '["Drawing and Sketching", "Digital Painting", "Playing Acoustic Guitar", "Reading Science Fiction & Graphic Novels", "Writing Short Speculative Stories", "Hiking in the Sandia Mountains and
    Desert Photography", "Basic Coding Projects (Python, Processing)", "Volunteering for Community Murals"]'
  career_goals: Ulises aspires to turn his passion for art into a sustainable career. In the short term, he aims to complete his GED and build a strong portfolio that showcases his digital and traditional
    artwork, with a focus on culturally inspired themes. He hopes to earn a scholarship to a community college program in graphic design or visual communication, where he can refine his technical skills
    and study user experience design. Long‑term, he envisions working as a concept artist or UI/UX designer for video game studios or advertising agencies, where his imagination and disciplined work ethic
    can thrive. He also wants to give back to his community by leading youth art workshops that celebrate Mexican heritage and promote creative expression.
