  hobbies: '["Reading mystery and historical fiction novels","Gardening herbs and vegetables","Knitting and crocheting","Cooking Southern and Tex‑Mex dishes","Hiking local nature trails","Volunteering at
    animal shelter","DIY home improvement projects","Listening to folk and country music"]'
  career_goals: Catherine aims to advance from a maid position to a supervisory role in housekeeping, such as a floor supervisor at a local hotel or a facilities manager for a small property management
    company. She plans to enroll in a community‑college program for hospitality management or facilities operations to gain formal credentials. In the longer term, she hopes to launch her own boutique cleaning
    service that emphasizes sustainable practices and personalized client care, leveraging her practical curiosity to continuously improve service quality.
