personas:
  professional: Catherine Flood, a meticulous housekeeping professional, leverages their green‑cleaning expertise, precise scheduling, and beginner handyman skills to exceed expectations in their current
    maid position, while strategically pursuing a hospitality management certificate and planning to ascend to a floor supervisor role before launching a boutique sustainable cleaning service.
  sports: Catherine Flood, a moderately active hiker, joins the local Trailblazers Hiking Club for weekend treks, roots for the County Falcons baseball team, and practices yoga twice a week to maintain
    flexibility, preferring low‑impact exercise that fits their schedule and modest budget.
  arts: Catherine Flood, an avid reader of Agatha Christie mysteries and a fan of folk and contemporary country artists like The Avett Brothers and Sturgill Simpson, channels the storytelling vibe into
    their knitting projects, often recreating vintage patterns inspired by classic cinema.
  travel: Catherine Flood plans trips methodically using spreadsheets, has already trekked the Great Smoky Mountains, dreams of exploring Sedona’s red‑rock canyons, and balances a modest travel budget with
    part‑time housekeeping hours, opting for affordable nature getaways over luxury resorts.
  culinary: Catherine Flood, a self‑taught cook of Southern comfort dishes such as buttermilk fried chicken and collard greens, spices their menu with Tex‑Mex favorites like chipotle‑infused carne asada
    tacos, and routinely seasons meals with fresh cilantro, oregano, and herbs harvested from their rooftop garden.
  core: Catherine Flood blends quiet curiosity with practical thrift, turning solitary hobbies into disciplined habits while occasionally over‑organizing even their own sock drawer.
background:
  cultural: Catherine grew up in Huntsville, Texas, a small‑town community steeped in Southern hospitality and traditional values. Her family emphasizes close‑knit relationships, church involvement, and
    community events like high school football games and local fairs. While rooted in a predominantly white, Southern cultural setting, she is aware of the broader Texan mosaic, including Hispanic influences
    on food and music, which she incorporates into her cooking and social life. This background fosters a blend of respect for tradition and openness to practical innovation, shaping her balanced, reserved
    yet adaptable personality.
attributes:
  skills: '["Residential and commercial cleaning","Deep‑cleaning and stain removal","Eco‑friendly sanitation methods","Space organization and decluttering","Inventory management of cleaning supplies","Scheduling
