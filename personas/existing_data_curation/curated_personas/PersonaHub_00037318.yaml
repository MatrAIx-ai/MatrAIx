persona_description: A historian who specializes in the study of World War II and the Aleutian Pribilof Islands, particularly the events surrounding the evacuation of Aleutians during the war. She has a
  deep understanding of the history and context of the Aleutian Pribilof Islands and the Aleutians themselves, and is knowledgeable about the political and social issues that arose during the war. She has
  a passion for storytelling and has a keen interest in understanding the experiences of the people who lived through these events. She is also an expert in archival research and has a strong background
  in film production.
