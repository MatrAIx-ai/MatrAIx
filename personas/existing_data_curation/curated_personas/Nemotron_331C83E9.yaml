  career_goals: Giovanni aims to turn his love for art and storytelling into a career as a multidisciplinary visual artist, graphic designer, or filmmaker. He plans to attend a specialized art high school,
    pursue a degree in visual communications or animation, and eventually produce culturally resonant media that reflects his Puerto Rican heritage and Brooklyn upbringing. He also hopes to secure scholarships
    that relieve financial pressure and to develop a strong portfolio that can lead to freelance work or a role in a community arts organization.
