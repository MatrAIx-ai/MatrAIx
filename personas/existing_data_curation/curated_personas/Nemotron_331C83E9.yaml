personas:
  professional: Giovanni Cruzblanco is an emerging digital illustrator whose curiosity drives them to experiment with layered tablet techniques, while their reliable, organized side keeps school mural projects
    on schedule and their sociable, assertive nature ensures they rally peers for collaborative art ventures.
  sports: Giovanni Cruzblanco shoots hoops for the middle school basketball team, cheering on the Los Angeles Lakers during off-season games, and they roll with the Parkside Skate Crew at the local skate
    park, practicing ollies and kickflips after art club meetings.
  arts: Giovanni Cruzblanco fuels their artistic identity by sketching street-style murals inspired by Banksy and Kaws, producing digital collages set to beats reminiscent of Bad Bunny and J. Cole, diving
    into graphic novels by Alan Moore, and unwinding with indie films from directors such as Greta Gerwig, all of which shape their eclectic creative voice.
  travel: Giovanni Cruzblanco prefers weekend family road trips to the coastal boardwalk and occasional museum hops in nearby cities, but they daydream about exploring Barcelona's street art districts and
    New York's modern art galleries once they can save enough for a longer adventure.
  culinary: Giovanni Cruzblanco gravitates toward bold flavors like shrimp tacos with mango salsa, pepperoni pizza, and tonkotsu ramen, and they can whisk together a decent homemade stir-fry using soy sauce,
    miso, and fresh cilantro, though they often rely on quick delivery for late-night snack cravings after a long art session.
  core: Giovanni Cruzblanco blends teen-aged curiosity with a disciplined yet spontaneous creative workflow, constantly juggling art, beats, and skate tricks while worrying about deadlines and occasionally
    over-caffeinating during late-night sketch marathons.
background:
  cultural: Giovanni is the son of Puerto Rican immigrants who have lived in Brooklyn for generations. He grew up bilingual, speaking Spanish at home and English at school, and celebrates both Puerto Rican
    traditions—such as Three Kings’ Day, Noche de San Juan, and family meals of arroz con gandules—and typical American holidays. The vibrant street art, Caribbean rhythms, and multicultural environment
    of Brooklyn have shaped his identity, giving him a blended perspective that combines island heritage with urban American culture.
