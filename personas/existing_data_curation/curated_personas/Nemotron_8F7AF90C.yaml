  hobbies: '[''basketball'', ''cooking soul food'', ''listening to jazz and R&B'', ''volunteering at community garden'', ''mentoring youth'', ''fishing'', ''hiking in Shenandoah'', ''church events'', ''car
    restoration'', ''DIY home improvement'']'
  career_goals: Fredrico aims to advance from first‑line supervisor to regional manager within the next five years, overseeing multiple service territories across Maryland and neighboring states. He plans
    to obtain ISA Certified Arborist and Certified Landscape Professional credentials to enhance his technical credibility. Ultimately, he aspires to launch his own eco‑focused landscaping business that
    specializes in native plant restoration and water‑wise design, while also establishing a mentorship program for young people from the local Black community interested in trades.
