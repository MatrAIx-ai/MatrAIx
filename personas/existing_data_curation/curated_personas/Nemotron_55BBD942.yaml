  career_goals: Raul aims to move from a staff janitor position to a supervisory or lead‑custodian role within the next few years, where he can mentor new cleaners and champion eco‑friendly cleaning practices.
    He plans to complete his associate degree in Occupational Safety and Health or Environmental Studies at a local community college, giving him credentials to oversee larger facilities or transition into
    a facility‑management career. Parallel to his professional growth, he hopes to develop a modest portfolio of watercolor paintings that could generate supplemental income and eventually retire with financial
    stability while staying involved in community art workshops for youth.
