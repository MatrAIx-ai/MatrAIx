persona_description: An atmospheric modeller and volcanologist who is studying the effects of volcanic gas emissions on the environment and human health. They are particularly interested in the impact of
  volcanic eruptions on air quality and climate, and are using Iceland as a natural laboratory to understand how magma makes its way from deep in Earth's crust to the surface. They are also using the FUTUREVOLC
  project to measure the events leading up to and after the eruption with unprecedented detail, and are trying to continue making as many gas measurements on the ground as possible, while also comparing
  those to the rough estimates made by satellites.
