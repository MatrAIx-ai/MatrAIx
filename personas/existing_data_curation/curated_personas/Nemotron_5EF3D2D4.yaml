  career_goals: Ivan dreams of growing up to be a teacher or a community helper who can share knowledge and care for others. He loves reading picture books about explorers and scientists, and imagines one
    day becoming an astronaut or a wildlife biologist, exploring nature while helping people learn. He also enjoys performing in school plays, showing his love for being the center of attention. These ambitions
    reflect his curiosity about the world and his wish to make a positive impact on those around him.
