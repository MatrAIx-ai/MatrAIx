  career_goals: Ray aims to become a certified senior installer in fire protection, obtaining NICET Level III certification within the next three years. He plans to complete his GED and pursue certifications
    such as BICSI Installer. Long‑term, he hopes to move into a supervisory role, overseeing a team of installers and coordinating large‑scale commercial projects. Eventually, he would like to start his
    own small‑business specializing in integrated security and fire alarm solutions for residential and small‑business clients in the Dallas‑Fort Worth area, providing reliable, structured service while
    maintaining a low‑stress work environment.
