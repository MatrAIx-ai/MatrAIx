personas:
  professional: Elizabeth Menefee is an experienced facilities manager who leverages meticulous budgeting, vendor negotiation, and preventive‑maintenance expertise to run large institutional buildings,
    and they channel their competitive drive and need for predictability into setting and exceeding rigorous sustainability benchmarks while mentoring emerging talent.
  sports: Elizabeth Menefee leads the Suwannee Trail Walkers, a weekly walking club that explores local nature preserves, they cheer on the Tampa Bay Buccaneers and the Florida Gators, occasionally join
    the Live Oak senior softball league in the spring, and treat each hike as a structured, low‑impact fitness routine.
  arts: Elizabeth Menefee shines both onstage and backstage with the Live Oak Community Theater, they relish performing in productions of 'A Streetcar Named Desire' and directing set designs, while their
    book club devotion includes works by William Faulkner and Eudora Welty, and they unwind listening to folk legends Joan Baez and classic soul artist Aretha Franklin.
  travel: Elizabeth Menefee prefers meticulously planned road trips, they have revisited historic Savannah and Charleston for their charm, dream of a leisurely autumn visit to Asheville’s Blue Ridge Mountains,
    and balance travel ambitions with a modest budget that prioritizes cultural immersion over luxury.
  culinary: Elizabeth Menefee enjoys cooking Southern comfort dishes such as shrimp and grits, collard greens seasoned with smoked turkey, and pecan pie, they have a modest but confident skill level in
    the kitchen, often using fresh rosemary, thyme, and locally sourced heirloom tomatoes, and they frequently share homemade meals with church volunteers.
  core: Elizabeth Menefee blends a relentless need for order with a warm, outgoing spirit, they obsessively schedule every detail of work and leisure, yet their worry‑prone mind can linger on minor setbacks,
    and they habitually over‑organize knitting supplies into color‑coded bins.
background:
  cultural: Elizabeth grew up in the Deep South, raised in a close‑knit white family that valued tradition, community service, and Southern hospitality. Her upbringing in Live Oak, Florida, immersed her
    in a culture that celebrates local history, seasonal festivals, and strong church participation. The region's emphasis on self‑reliance and orderly conduct reinforced her preference for structure and
    predictability. Her liberal arts education deepened her appreciation for the arts, literature, and historical preservation, which she expresses through her involvement in community theater and the Historical
    Society. While she respects the region's customs, Elizabeth also seeks to modernize her surroundings by integrating sustainability practices and fostering inclusive community programs.
attributes:
  skills: '["Facilities Operations Management", "Budget Planning and Financial Oversight", "Vendor Negotiation and Contract Management", "Preventive Maintenance Scheduling", "Safety Compliance and Regulatory
    Knowledge", "Project Management", "Team Leadership and Staff Supervision", "Emergency Response Planning", "Sustainability and Energy Efficiency Initiatives", "Problem Solving and Critical Thinking",
    "Effective Communication", "Event Coordination", "Conflict Resolution", "Risk Assessment", "Strategic Planning"]'
  hobbies: '["Community theater", "Gardening", "Walking club", "Yoga", "Book club (historical fiction and Southern literature)", "Knitting and crocheting", "Cooking and recipe sharing", "Volunteer work
    at local church", "Historical society preservation projects", "Bridge tournaments", "Birdwatching", "Attendance at local high school sports events"]'
  career_goals: Approaching the later stage of her career, Elizabeth aims to earn the Certified Facility Manager (CFM) credential and leverage it to move into a senior director role overseeing multiple
    campuses within a regional healthcare system or educational institution. She is driven to spearhead a comprehensive green retrofit program that reduces energy consumption by at least 30% across all
    facilities she manages. Additionally, she wishes to mentor emerging facilities professionals, establishing a structured apprenticeship program within her department. Ultimately, she hopes to leave a
    legacy of highly efficient, safe, and sustainable buildings that serve the Live Oak community for decades to come.
