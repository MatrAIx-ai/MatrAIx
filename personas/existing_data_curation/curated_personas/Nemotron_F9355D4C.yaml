personas:
  professional: Rafael Bailon is a bilingual tech‑savvy problem‑solver who combines his fluency in English and Spanish, basic web development skills (HTML, CSS, JavaScript), and strong Excel data‑tracking
    abilities to support community‑focused non‑profits as an IT support assistant, delivering organized yet flexible solutions while his innate curiosity keeps him exploring new tools and his worry‑driven
    attention to detail ensures every ticket is double‑checked.
  sports: Rafael Bailon is a regular at the Bronx Recreation Center’s adult basketball league, avidly follows the New York Knicks and Brooklyn Nets during the NBA season, occasionally catches Yankees games
    for a baseball fix, and balances competitive play with mindful stretching and breathing drills to offset the stress that can arise from their perfectionist tendencies.
  arts: Rafael Bailon curates a playlist featuring Bad Bunny, J Cole, and classic salsa icons like Celia Cruz, spends evenings strumming a battered acoustic guitar, and captures the Bronx’s vibrant street
    murals and candid neighborhood moments with a DSLR, drawing creative inspiration from photographer Alex Webb and the cinematic storytelling of director Pedro Almodóvar.
  travel: Rafael Bailon favors budget‑conscious weekend getaways to nearby cities like Washington, D.C., and Philadelphia for museum visits, while dreaming of a summer backpacking adventure through Barcelona’s
    Gothic Quarter and Tokyo’s neon tech districts, planning itineraries with a mix of careful research and spontaneous street‑food detours.
  culinary: Rafael Bailon, an intermediate home chef, frequently prepares arroz con gandules with sofrito, pigeon peas, pork, and cilantro, hand‑rolls pasteles using green plantain masa and seasoned meat,
    and balances these hearty family dishes with late‑night slices of New York‑style pizza topped with pepperoni and fresh basil.
  core: Rafael Bailon is a tech‑curious community advocate whose meticulous nature drives them to double‑check every code snippet and spreadsheet, while a lingering worry fuels nightly gratitude journaling
    and late‑night gaming sessions after a bowl of pasteles.
background:
  cultural: Rafael grew up in the Bronx’s vibrant Latino enclave, surrounded by a tight-knit Puerto Rican community. His family maintains many island traditions, from holiday gatherings with music and food
    to speaking Spanish at home, while also navigating the multicultural dynamics of New York City. Exposure to Nuyorican art, community festivals, and local street markets deepened his appreciation for
    both his heritage and the broader urban culture. Bilingualism is a daily reality; he moves fluidly between English and Spanish in school, work, and social settings. This blend of island roots and city
    life influences his worldview, fostering a strong sense of responsibility toward his family and neighborhood, and shaping his desire to use his skills to uplift others in his community.
attributes:
  skills: '["Bilingual Spanish-English communication", "Microsoft Office Suite (Word, Excel, PowerPoint)", "Basic web development (HTML, CSS, JavaScript)", "Customer service", "Event planning and logistics",
