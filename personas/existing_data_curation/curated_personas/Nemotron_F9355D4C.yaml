  hobbies: '["Basketball", "Playing guitar", "Cooking Puerto Rican cuisine", "Reading speculative fiction", "Street photography", "Video gaming", "Gratitude journaling", "Mindfulness exercises"]'
  career_goals: Rafael aims to secure a role that blends his technical curiosity with his desire to give back to his community. In the short term, he plans to obtain an entry-level position as an IT support
    assistant or community technology liaison for a local non-profit, where his bilingual skills and basic coding knowledge can help bridge the digital divide. He intends to continue his education by pursuing
    a bachelor’s degree in Information Systems or Community Development, with the long-term ambition of becoming a project manager who oversees technology-focused outreach programs for Latino youth in the
    Bronx. He seeks a stable career that provides financial security for his family while allowing him to apply practical solutions to social challenges.
