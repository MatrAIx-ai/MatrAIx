  hobbies: '[''Gallery and museum visits'', ''Collecting contemporary art'', ''Tennis'', ''Sailing'', ''Beachside gardening'', ''Food exploration (farm‑to‑table restaurants)'', ''Reading contemporary literature'',
    ''AI and fintech workshops'', ''Yoga'', ''Community theater attendance'']'
  career_goals: Jade aims to advance to a senior portfolio manager or director of research role where she can lead a high‑performing team and shape the firm’s ESG investment strategy. She is pursuing the
    CFA charter to deepen her technical credibility and plans to launch a boutique advisory service that blends financial analysis with cultural and artistic market insights. Ultimately, she wants a position
    that offers flexibility to balance her professional ambitions with her love for art, travel, and community involvement, while maintaining a competitive edge in the investment industry.
