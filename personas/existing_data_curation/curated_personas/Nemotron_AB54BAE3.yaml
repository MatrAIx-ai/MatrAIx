  hobbies: '[''painting'', ''guitar playing'', ''cooking Mexican dishes'', ''reading speculative fiction'', ''visiting art galleries'', ''gardening'', ''birdwatching'', ''volunteering in community mural
    projects'', ''listening to mariachi music'', ''celebrating cultural festivals'', ''stargazing'']'
  career_goals: Josue aims to transition toward a mentorship role, formally training new personal care aides and sharing his creative care techniques. He plans to earn a Certified Nursing Assistant (CNA)
    credential and finish his GED, strengthening his professional confidence. In parallel, he hopes to launch a weekly community art workshop for seniors at a local senior center, blending his love for
    painting with his caregiving experience. He also wishes to maintain a flexible schedule that allows more time for his own artwork, short trips with his wife across Texas, and possibly writing a memoir
    that reflects his Mexican heritage and lifelong service.
