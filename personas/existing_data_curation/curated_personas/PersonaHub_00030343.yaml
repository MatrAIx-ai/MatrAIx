persona_description: A geologist who specializes in studying the behavior and effects of earthquakes, particularly the role of energy production practices in triggering them. They are knowledgeable about
  the use of wastewater injection methods in oil and gas drilling and their potential impact on the background rate of earthquakes in Oklahoma. They are interested in the implications of increased seismic
  activity in the state and the potential for oil and gas companies to be held responsible for earthquakes triggered by their activities. They may also have expertise in the field of environmental advocacy
  and the potential impacts of wastewater injection on water resources and ecosystems.
