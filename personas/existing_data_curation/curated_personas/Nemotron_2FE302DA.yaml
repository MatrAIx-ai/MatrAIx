personas:
  professional: Vicenta Demiranda, a 74‑year‑old retired community organizer, channels her meticulous budgeting, bilingual fluency, and love for cultural celebrations into coordinating neighborhood Día
    de los Muertos events, recruiting volunteers, and bridging language gaps for senior neighbors.
  sports: Vicenta Demiranda stays active by walking the Strip each morning, occasionally joins a senior softball league at the local community center, proudly supports the Las Vegas Raiders and the Vegas
    Golden Knights, and participates in low‑impact yoga classes designed for seniors.
  arts: Vicenta Demiranda immerses herself in Las Vegas’s vibrant art scene, sketching street murals at the Arts District, frequents the Bellagio Gallery of Fine Art, draws inspiration from Georgia O'Keeffe
    and Banksy, and enjoys classic films starring Meryl Streep and Robert De Niro.
  travel: Vicenta Demiranda balances a love for leisurely road trips to the Grand Canyon and Zion National Park with a heartfelt plan to revisit her hometown in Oaxaca, Mexico, where she hopes to reconnect
    with extended family and explore regional culinary traditions.
  culinary: Vicenta Demiranda delights in fusing bold chipotle and ancho chile flavors with desert herbs like sage and rosemary, creating dishes such as cactus‑topped tacos, mesquite‑grilled chicken mole,
    and prickly‑pear‑infused margaritas, while carefully budgeting for fresh ingredients at the local farmer’s market.
  core: Vicenta Demiranda blends a competitive bridge mindset, a curiosity for art, and a disciplined approach to budgeting into a vibrant senior life, though she often misplaces her glasses and can be
    skeptical of strangers' motives.
background:
  cultural: Vicenta was born to Mexican immigrant parents who settled in Southern California before moving to Las Vegas in the early 1970s. Raised in a tight-knit, bilingual household, she absorbed Mexican
    customs—Catholic celebrations, folk music, and the ritual of cooking large family meals—while also navigating the multicultural landscape of the Southwest. Her identity blends traditional Mexican values
    of family loyalty, respect for elders, and community solidarity with the eclectic, fast-paced life of a desert city. This dual heritage informs her appreciation for art, her dedication to preserving
    cultural traditions, and her adaptive, curious outlook on new ideas.
