  career_goals: Lynda aims to deepen her expertise in large‑scale optimization and become a senior operations‑research analyst within the next three years. She plans to lead cross‑functional projects that
    integrate sustainability metrics into supply‑chain design, positioning herself for a future role as an operations‑research manager or director of analytics. To support this trajectory, she intends to
    earn a professional certification in advanced analytics (e.g., INFORMS Certified Analytics Professional) and publish case studies at industry conferences. Mentoring junior analysts and fostering a collaborative,
    data‑driven culture are also core to her long‑term vision.
