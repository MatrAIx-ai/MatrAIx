personas:
  professional: Ming Cheng, a seasoned insurance claims professional with a decade of experience in adjusting, appraisal, and investigation, blends meticulous risk analysis and report writing with a curiosity
    for AI‑driven analytics, leveraging bilingual communication and storytelling to mentor junior staff while pursuing a CPCU designation and aspiring to a senior leadership role.
  sports: Ming Cheng, an energetic participant in Queens’ local gym scene, joins weekday pickup basketball games, runs with a weekend club through Central Park, cheers on the New York Knicks and the New
    York Mets, and occasionally streams Brooklyn Nets games while maintaining a flexible approach to training due to a laid‑back scheduling style.
  arts: Ming Cheng, a lover of narratives, immerses themselves in historical fiction by Ken Follett and James Clavell, watches Ken Burns documentaries on East Asian history, captures street scenes in the
    neighborhood with a vintage Nikon camera, and attends jazz performances by Wynton Marsalis and classical concerts featuring Yo‑Yo Ma, letting these artistic experiences shape their storytelling flair.
  travel: Ming Cheng, a moderate‑budget explorer, prefers weekend trips to nearby cultural hotspots like Albany’s historic sites and New York’s Hudson Valley vineyards, dreams of visiting the ancient temples
    of Kyoto and the lantern festivals of Taiwan, yet balances travel plans with family obligations and the occasional spontaneous road trip with their dog to the Catskills.
  culinary: Ming Cheng, an avid home chef, crafts Chinese‑style fusion dishes such as mapo tofu tacos, Peking duck spring rolls, and ginger‑garlic scallops, skillfully wielding ingredients like Sichuan
    peppercorns, fermented black bean paste, and fresh lemongrass, while hosting weekly family feasts that blend traditional flavors with modern twists, yet occasionally burns the caramelized sauce when
    juggling cooking with evening basketball games.
  core: Ming Cheng, a 42‑year‑old insurance veteran with a passion for community basketball, street photography, and experimental cooking, balances a pragmatic career drive with a relaxed, sometimes disorganized
    lifestyle, constantly feeding curiosity through AI tools and cultural festivals, yet habitually leaves their keys on the kitchen counter.
background:
  cultural: Ming Cheng is a second‑generation Chinese American who grew up in the multicultural environment of Queens, New York. Raised bilingual in Mandarin and English, he balances traditional East Asian
    values—such as respect for elders, emphasis on education, and filial responsibility—with the individualistic, flexible mindset common in his American upbringing. He actively celebrates Chinese holidays
    like Lunar New Year and the Moon Festival, while also participating in the broader cultural life of his neighborhood. His humanities education deepens his appreciation for literature, history, and the
    arts, giving him a nuanced perspective that informs both his professional work and personal interests.
