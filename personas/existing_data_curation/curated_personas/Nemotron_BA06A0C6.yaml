  hobbies: '[''Sketching and painting (watercolor, acrylic)'', ''Digital illustration on tablet'', ''Reading science-fiction and magical realism'', ''Stargazing and astronomy'', ''Visiting local art galleries
    and museums'', ''Participating in school art club and poetry slams'', ''Playing classical guitar and learning folk songs'', ''Helping prepare traditional Mexican dishes'', ''Volunteering as a youth
    interpreter at community festivals'']'
  career_goals: Camila aims to turn her imagination into a professional practice that merges art, technology, and cultural storytelling. She plans to attend a university where she can major in Graphic Design
    or Architecture, focusing on user experience and inclusive visual narratives. In the long term she envisions herself as a multimedia designer and creative director who produces culturally resonant digital
    content—illustrations, interactive installations, and community‑focused branding—for Latino communities and beyond. She also hopes to integrate sustainable design principles to create spaces and experiences
    that reflect her New Mexican heritage while embracing contemporary aesthetics.
