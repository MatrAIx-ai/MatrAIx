  hobbies: '[''Reading'', ''Gardening'', ''Bird Watching'', ''Solo Hiking'', ''Mindfulness Meditation'', ''Journaling'', ''Tea Brewing'', ''Baking'', ''Knitting'', ''Listening to Indie Folk Music'']'
  career_goals: She aims to progress to a senior HR director role within the next five years, concentrating on building a low‑stress, flexible workplace culture that prioritizes employee mental health and
    resilience. To support this, she plans to earn her SHRM‑CP certification and complete a bachelor’s degree in Human Resources Management. Additionally, she aspires to design and lead a comprehensive
    employee wellness initiative that includes flexible work policies, mental‑health resources, and data‑driven talent development programs.
