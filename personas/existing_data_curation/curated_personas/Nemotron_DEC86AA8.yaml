personas:
  professional: Jonathan Owen, a 32‑year‑old acute‑care nurse with a solid STEM background, uses his calm, organized mindset and sociable energy to lead evidence‑based workflow improvements, mentor new
    staff, and integrate health‑technology solutions into patient care.
  sports: Jonathan Owen spikes intense beach volleyball matches with the local Santa Monica Volley Club, hikes the Santa Monica Mountains on weekends, dances salsa at community studios, and passionately
    roots for the LA Dodgers and the LA Galaxy while staying fit through weekly yoga sessions.
  arts: Jonathan Owen frequently visits live music venues to catch indie acts like Tame Impala, enjoys the recurring performances of the Los Angeles Philharmonic at the Walt Disney Concert Hall, and finds
    creative release in a monthly art‑therapy workshop where they experiment with abstract watercolors inspired by Frida Kahlo and Banksy.
  travel: Jonathan Owen prefers short, adventure‑focused getaways, planning spontaneous road trips to Catalina Island and the Joshua Tree National Park, while saving for a future tech‑health conference
    in Tokyo, balancing limited vacation days with a desire to explore both local wonders and international innovation hubs.
  culinary: Jonathan Owen loves cooking experimental, health‑focused meals such as turmeric‑spiced quinoa bowls, fermented kimchi tacos, and avocado‑lime smoothies, often sourcing kale, chickpeas, and matcha
    from the bustling LA farmers’ market, and they enjoy tasting the city’s celebrated fish tacos and ramen bowls on weekend outings.
  core: Jonathan Owen blends a high‑energy social life with a deeply introspective mind, channeling curiosity into health tech while often battling intense anxiety that they soothe through meditation and
    occasional impulsive splurges on culinary gadgets.
background:
  cultural: Jonathan grew up in a middle-class, white Anglo-American family in Southern California, celebrating typical U.S. holidays and traditions while absorbing the multicultural vibe of Los Angeles.
    His professional experience caring for a richly diverse patient population has deepened his cultural competence, prompting him to learn basic Spanish phrases and respect a wide range of health beliefs.
    He values community service, inclusivity, and the collaborative spirit of the city, integrating these influences into both his personal life and nursing practice.
attributes:
  skills: '[''Patient assessment'', ''IV therapy'', ''Wound care'', ''Medication administration'', ''Electronic health records (EHR) management'', ''Data analysis for quality improvement'', ''Evidence-based
