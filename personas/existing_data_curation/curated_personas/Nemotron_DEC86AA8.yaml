  hobbies: '[''Beach volleyball'', ''Hiking'', ''Community dance classes'', ''Cooking experimental meals'', ''Live music events'', ''Mindfulness meditation'', ''Journaling'', ''Art-therapy workshops'',
    ''Science podcasts'', ''Reading tech non-fiction'', ''Volunteer at free-clinic health fair'']'
  career_goals: Jonathan aims to advance into a clinical leadership role that bridges bedside care with health-technology integration. Over the next five years he plans to earn a Master's in Nursing or
    Health Informatics, become a Certified Nurse Specialist in Acute Care, and lead a hospital-wide initiative to embed mental-health support for staff. He also aspires to develop community outreach programs
    in Los Angeles that address chronic disease prevention and provide culturally competent mental-health resources, leveraging his curiosity for new interventions while staying grounded in practical, evidence-based
    outcomes.
