  hobbies: '["Gardening (roses, vegetables)", "Bridge and bingo", "Listening to classic rock and country music", "Coaching Little League baseball", "Restoring a 1965 Ford Mustang", "Cooking Southern dishes
    (barbecue, biscuits)", "Attending Methodist church services", "Road trips to historic Arkansas sites"]'
  career_goals: Jonathan’s primary ambition at this stage is to stay active, healthy, and socially connected while leaving a lasting legacy for his family and community. He aims to continue volunteering
    as the senior‑center activity coordinator, mentoring younger volunteers, and expanding the center’s intergenerational programs. He wishes to complete a written memoir capturing his life experiences—from
    growing up in post‑war Little Rock to his years of community service—to pass on to his grandchildren. Maintaining physical well‑being through daily walks, gardening, and regular health check‑ups is
    a core goal. He also hopes to travel modestly within Arkansas, visiting historic sites such as the Little Rock Central High School museum and family farms. Finally, he aspires to improve his digital
    photography skills to document family gatherings and community events.
