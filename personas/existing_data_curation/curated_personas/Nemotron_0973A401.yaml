  hobbies: '[''Sketching in cafés'', ''Creating digital collages'', ''Filming short TikTok videos'', ''Exploring Dallas street murals'', ''Skateboarding with friends'', ''Improv theater'', ''Dance battles'',
    ''Watching indie films'', ''Listening to eclectic music playlists'']'
  career_goals: Robin dreams of turning her passion for visual storytelling into a sustainable career. She aims to attend a community art program or a specialized graphic‑design boot‑camp to formalize her
    skills, eventually working as a freelance illustrator or a social‑media content strategist for indie music labels and local art collectives. A long‑term ambition is to launch a youth‑focused creative
    studio in Dallas that offers free workshops for other teens who feel disengaged from formal schooling, merging her competitive drive with a desire to impact her community positively.
