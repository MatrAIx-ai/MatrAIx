personas:
  professional: Robin Kline is an aspiring visual storyteller who blends sketching, digital illustration, and collage into dynamic social‑media content, leveraging quick‑learning skills in Procreate and
    Canva to curate eye‑catching feeds while thriving on spontaneous group art jams and competitive dance battles despite a tendency toward disorganized planning.
  sports: Robin Kline enjoys weekend skate sessions with the Dallas Skate Crew, drops into local skate parks like Dallas Skate Plaza, supports the Dallas Cowboys and Mavericks, and occasionally joins pickup
    basketball games at community centers, using dance battles as a high‑energy fitness outlet.
  arts: Robin Kline immerses themselves in the Dallas art scene, drawing inspiration from street artists like Shepard Fairey and local muralist Pablo Delgado, curating TikTok clips set to Tame Impala and
    St. Vincent, and organizing pop‑up collage workshops in cafés while binge‑watching indie films by directors such as Greta Gerwig for creative fuel.
  travel: Robin Kline prefers spontaneous road trips with friends in a beat‑up sedan, having explored Austin’s live‑music venues, New Orleans’ culinary districts, and dreaming of a summer art‑tour in Barcelona’s
    street‑art neighborhoods, all while budgeting travel expenses through a shared spreadsheet.
  culinary: Robin Kline’s palate oscillates between bristling brisket tacos with cilantro‑lime salsa and experimental ramen carbonara topped with smoked paprika, a skill they hone in a cramped kitchen while
    occasionally indulging in late‑night junk‑food binge sessions as stress relief.
  core: Robin Kline is a fiercely curious teen who channels competitive energy into sketching, dancing, and skateboarding, thrives on spontaneous creativity, yet grapples with chronic disorganization and
    anxiety‑driven spending sprees.
background:
  cultural: Robin grew up in a middle‑class white family in Dallas, Texas, where Southern hospitality meets a vibrant, multicultural urban environment. Her upbringing blended traditional Texas values—like
    community gatherings and a love for outdoor activities—with exposure to the city's dynamic arts districts, live music venues, and diverse culinary scene. This mix has fostered her appreciation for both
    classic American cultural touchstones and contemporary, boundary‑pushing artistic expressions.
attributes:
  skills: '[''Drawing'', ''Digital illustration'', ''Collage art'', ''Social media content creation'', ''Event improvisation'', ''Group activity coordination'', ''Quick self‑learning of creative software'',
