  hobbies: '[''Gardening (vegetables and herbs)'', ''Reading historical fiction and personal development'', ''Knitting and crocheting'', ''Yoga and mindfulness meditation'', ''Nature photography'', ''Hiking
    local trails'', ''Volunteering at animal shelter'', ''Cooking and recipe experimentation'', ''DIY woodworking projects'', ''Blogging about stress management and personal growth'']'
  career_goals: Katharine aims to transition back into the paid workforce within the next year, targeting a part‑time administrative or program‑support role at a local non‑profit, community health center,
    or small business where her organizational strengths and practical mindset are valued. She plans to complete a bachelor's degree in business administration online to broaden her credentials and to obtain
    a Microsoft Office Specialist certification. Long‑term, she aspires to become a community program coordinator, overseeing outreach initiatives that blend her love for community service with her skill
    in event logistics. In parallel, she hopes to launch a modest home‑based Etsy shop featuring handcrafted home‑decor items, allowing her to monetize her crafting hobby while maintaining a low‑stress
    work environment.
