  hobbies: '[''Hiking and Landscape Photography'', ''Visiting Art Galleries and Museums'', ''Watercolor Painting'', ''Reading Literature, Poetry, and Philosophy'', ''Small Book Club'', ''Yoga and Mindfulness'',
    ''Volunteering at Community Art Workshops'']'
  career_goals: Deirdre aims to advance to a supervisory or training role within the Weber County correctional system, where she can mentor new officers and shape policies that emphasize humane treatment
    and rehabilitative opportunities. She is interested in developing an arts‑based therapeutic initiative for inmates, leveraging her humanities education to foster personal growth and reduce recidivism.
    In the long term, she envisions pursuing a master's degree in criminal justice or corrections administration to qualify for a warden or director position, while maintaining a balanced family life.
