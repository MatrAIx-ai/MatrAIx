personas:
  professional: Deirdre Bourgeois, a 35-year-old correctional officer in Weber County, combines meticulous incident reporting and conflict de‑escalation expertise with a humanities‑inspired communication
    style, crafting rehabilitation programs that weave art workshops and reflective writing into inmate life while they mentor new staff with patience and a quiet, methodical presence.
  sports: Deirdre Bourgeois, a 35-year-old outdoor enthusiast, spends her weekends tackling Wasatch Frontier trails with the Wasatch Hiking Club, catches Utah Jazz games for a burst of basketball excitement,
    follows Real Salt Lake’s soccer season, and they attend Vinyasa yoga classes twice a week to maintain flexibility for their climbs.
  arts: Deirdre Bourgeois, a 35-year-old watercolor hobbyist, draws creative fuel from Georgia O’Keeffe’s desert palettes, collects prints by contemporary Indigenous artist Nora Naranjo‑Morse, listens to
    folk musician Sufjan Stevens while they sketch, and they savor thought‑provoking films by director Lynne Ramsay during quiet evenings.
  travel: Deirdre Bourgeois, a 35-year-old planner who prefers structured itineraries, has hiked the Grand Canyon’s Rim‑to‑Rim trail, explored museum districts in Paris, daydreams about photographing the
    tea terraces of Sri Lanka, and they balance wanderlust with a family budget that limits major vacations to two per year.
  culinary: Deirdre Bourgeois, a 35-year-old with moderate cooking confidence, loves preparing quinoa salads tossed with fresh Utah beets and goat cheese, perfects a wild mushroom risotto on rainy evenings,
    and they treat themselves to a glass of Pinot Gris at a downtown farm‑to‑table bistro when dining out.
  core: Deirdre Bourgeois, a 35-year-old correctional officer passionate about art and the outdoors, blends methodical precision with quiet curiosity, channeling it into inmate rehabilitation programs,
    while they hoard sketchbooks and occasionally forget to water houseplants.
background:
  cultural: Deirdre grew up in a predominantly white, middle‑class community in northern Utah, with cultural influences from both the broader Protestant/Mormon traditions of the region and a family heritage
    that includes French ancestry reflected in her surname. Her upbringing emphasized self‑reliance, community service, and an appreciation for the outdoors, while her college education exposed her to diverse
    artistic and cultural perspectives. This blend of regional values and academic exposure informs her balanced worldview, respect for tradition, and openness to unconventional ideas.
attributes:
  skills: '[''Inmate Supervision'', ''Conflict De-escalation'', ''Crisis Management'', ''Incident Reporting'', ''Regulatory Compliance'', ''Procedural Planning'', ''Rehabilitative Programming with Arts
