  hobbies: '["Soccer", "Salsa and Cuban dance", "Building LEGO structures", "Reading fantasy novels", "Participating in school Science Fair", "Coding simple games in Scratch", "Drawing and sketching", "Journaling
    for stress relief"]'
  career_goals: Yaneisy dreams of becoming a pediatric surgeon who combines cutting‑edge research with compassionate care for children. Driven by her competitive spirit, she aims to graduate at the top
    of her class, earn scholarships, and attend a leading university to study biology and medicine. She also hopes to lead health outreach programs within Louisville's Cuban community, using her bilingual
    abilities to improve access to medical information for families like hers.
