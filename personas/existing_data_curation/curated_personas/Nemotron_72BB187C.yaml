personas:
  professional: Yaneisy Quintero, an aspiring young scientist‑engineer, channels their meticulous curiosity into building intricate LEGO mechanisms and leading precise school science fair experiments, while
    they let their competitive streak push them to outshine peers and their skeptical eye filter group ideas for reliability.
  sports: Yaneisy Quintero blitzes the soccer field as a forward for the elementary team, they draw inspiration from Louisville City FC’s attacking play and the Kentucky Wildcats’ tenacity, and they hone
    rhythmic footwork through weekly salsa lessons at a community studio, blending competitive drive with cultural movement.
  arts: Yaneisy Quintero immerses themselves in vibrant salsa and rumba rhythms during weekend dance classes, fuels their imagination by sketching fantasy heroes in a worn sketchbook, builds simple interactive
    games in Scratch, and finds artistic inspiration from legends like Celia Cruz and modern illustrators such as Hayao Miyazaki.
  travel: Yaneisy Quintero has explored the limestone marvels of Mammoth Cave on a school outing, they spent a lively summer visiting Miami’s bustling waterfront with relatives, and they dream of wandering
    the historic streets of a Caribbean capital and soaking up sunshine on San Juan’s beaches, balancing family‑focused trips with personal wanderlust.
  culinary: Yaneisy Quintero loves helping in the kitchen, where they perfect the savory aroma of ropa vieja, the golden crunch of fried plantains, and the comforting swirl of café con leche, often seasoning
    family meals with a pinch of cumin and fresh garlic while practicing their budding sous‑chef skills.
  core: Yaneisy Quintero, they balance a disciplined, competitive spirit with a vivid imagination and a habit of over‑thinking stressful moments, turning every challenge into a meticulously planned quest.
background:
  cultural: Yaneisy grows up in a bilingual Cuban household in Louisville, Kentucky. Her parents emigrated from Cuba in the early 2000s and speak Spanish at home, preserving traditions such as cooking ropa
    vieja, arroz con pollo, and making café con leche with family. She celebrates Cuban holidays with music—son, rumba, and salsa—listening to classic artists like Celia Cruz while dancing with cousins.
    The family attends a local Catholic church and participates in the annual Cuban Festival in Louisville, where she wear vibrant dresses and learns about community history. While she embraces these cultural
    roots, she also integrates into the broader Kentucky community, attending a diverse elementary school where she makes friends from many backgrounds and shares her Cuban culture in group projects and
    classroom presentations.
