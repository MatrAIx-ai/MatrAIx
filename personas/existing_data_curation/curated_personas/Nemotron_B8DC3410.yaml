personas:
  professional: Cayce Mosrie, a 16-year-old student council leader, leverages meticulous bullet-journal planning and a charismatic, people-focused approach, and they orchestrate school dances, charity drives,
    and community events, laying a solid foundation for a future career in hospitality and event management.
  sports: Cayce Mosrie enjoys hiking with the local Youth Outdoor Club, attends weekend practices with the high school track team, fervently supports the River City Tigers baseball club, and they balance
    structured cardio sessions with spontaneous trail runs to stay energized for event planning.
  arts: Cayce Mosrie participates in a community theater troupe, performs in local productions of classic plays, curates a photography blog featuring sunrise vistas from state parks, and they draw artistic
    inspiration from Lin-Manuel Miranda's musical storytelling and Annie Leibovitz's portrait work.
  travel: Cayce Mosrie favors weekend road trips to nearby state parks like Blue Ridge, day-long explorations of the historic downtown museum, meticulously plans itineraries in their bullet journal, and
    they dream of a spring-break backpacking adventure through the Grand Canyon, balancing budget constraints with a craving for scenic photography opportunities.
  culinary: Cayce Mosrie enjoys cooking simple comfort foods such as garlic-butter shrimp pasta, avocado toast, and homemade chicken tacos, experiments with fresh basil and cilantro, and they often bake
    chocolate chip cookies to share at school events, despite a tendency to burn the edges when multitasking between event prep and cooking.
  core: Cayce Mosrie is an ultra-organized, talkative teen who fills bullet-journal pages with event checklists, occasionally forgets to sleep, and they can be found humming theme songs while coordinating
    school dances and snapping photos of sunrise hikes.
background:
  cultural: Cayce’s cultural background is shaped by her upbringing in the small, predominantly White community of Knox, Indiana, a town known for its agricultural roots and strong sense of community. Her
    family has generation‑long ties to the area, valuing hard work, modesty, and neighborly support. Community events such as the county fair, high school football games, and church gatherings have reinforced
    a collective spirit and an appreciation for local traditions. While her heritage reflects classic Midwestern values of hospitality, humility, and practicality, she also embraces modern influences through
    school clubs and online peers, creating a blend of traditional values and contemporary connectivity.
attributes:
  skills: '[''Organizational planning'', ''Event coordination'', ''Public speaking'', ''Conflict mediation'', ''Team collaboration'', ''Detail-oriented note-taking'', ''Digital literacy (Google Suite, social
    media)'', ''Creative writing'', ''Leadership in student clubs'']'
  hobbies: '[''Bullet journaling and weekly planning'', ''Student council and event organization'', ''Volunteer work at the library'', ''Community theater acting'', ''Hiking and nature photography'', ''Puzzles
    and brain teasers'', ''Cooking and baking'', ''Maintaining a local‑events blog'']'
  career_goals: Cayce intends to finish high school with strong grades and then pursue an associate degree in Business Administration at a community college, followed by a bachelor’s degree in Hospitality
    Management or Event Management. In the short term, she aims to secure a part‑time internship at a local community center or event venue to gain hands‑on experience organizing fairs, school functions,
    and charitable activities. Her long‑term ambition is to become a professional event coordinator who designs inclusive community festivals, applying her organized, people‑focused skill set to create
    memorable and well‑run events.
