persona_description: A naval historian and military strategist who is interested in the development of British naval strategy and the strategic encounters between the Royal Navy and the French Navy during
  the French Revolutionary and Napoleonic Wars. He has a keen interest in the life and career of Helmuth von Moltke and has written a biography of the 17th Earl of Derby. He is also an expert in maritime
  history and has written several books on military history, including an acclaimed two-volume history of the Franco-Prussian War of 1870-1871, a history of the Austro-Prussian War of 1866, and the first
  modern history of the Russo-Turkish War of 1877-1878. He is a retired Employment Judge and Secretary General of an international group of law firms.
