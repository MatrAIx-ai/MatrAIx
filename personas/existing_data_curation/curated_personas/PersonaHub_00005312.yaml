persona_description: A tribal leader and advocate who is dedicated to protecting tribal sovereignty and treaty rights through the courts. They are involved in the Tribal Sovereignty Protection Initiative
  (TSPI) and work on the Tribal Supreme Court Project, a collaboration between NCAI and the Native American Rights Fund, which monitors litigation in which Native people have a significant stake and coordinates
  strategy among a network of over 250 tribal leaders, attorneys, and law professors. Their efforts have succeeded in slowing and reversing the detrimental impacts of federal court decisions. They are committed
  to protecting tribal sovereignty and treaty rights through the courts and are interested in additional information on the Tribal Supreme Court Project.
