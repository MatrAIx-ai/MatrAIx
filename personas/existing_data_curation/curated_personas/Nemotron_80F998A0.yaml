  career_goals: Carmencita aims to establish a community‑focused art hub in Miami that showcases emerging Latino talent and integrates Peruvian cultural motifs. She plans to secure sustainable funding through
    grants, corporate partnerships, and a modest print‑sale shop, allowing her to reduce financial uncertainty and focus on creative exploration. Over the next five years she hopes to curate interdisciplinary
    exhibitions that blend visual art with mindfulness practices, publish a guide on art‑driven healing, and mentor young artists from immigrant backgrounds. Her long‑term ambition is to become a recognized
    thought leader at the intersection of art, cultural heritage, and mental‑well‑being, while maintaining a balanced lifestyle that supports her personal resilience.
