  hobbies: '[''Gardening (vegetables, flowers, seasonal planting)'', ''Knitting and quilting'', ''Baking pies and breads'', ''Reading mystery novels'', ''Listening to vintage radio dramas'', ''Playing bridge
    and card games with a small group'', ''Walking on local country roads'', ''Volunteering with the local historical society'']'
  career_goals: Although retired, Marsha’s chief ambition is to preserve her independence and health while leaving a tangible legacy for her family and community. She aims to complete a “memory garden”
    on her property that reflects the seasons she has lived through, and to compile her family’s recipes and quilting patterns into a handwritten cookbook and craft book for her grandchildren. She also
    hopes to become a regular volunteer mentor at the local senior center, offering budgeting advice and simple sewing lessons to peers. Managing her finances prudently, staying socially connected in small,
    trusted groups, and reducing stress through routine are central to her personal goals.
