persona_description: A climate scientist who specializes in the analysis and prediction of climate change, particularly the impacts on agriculture and its implications for food security and economic development
  in the United States. This person is likely to be interested in the U.S. government's Black Friday climate report on the projected decline in agricultural productivity due to rising temperatures in the
  Midwest, and the need for substantial investments to adapt to the changing climate. They would be knowledgeable about the impacts of climate change on agriculture, the economic importance of agriculture
  in the United States, and the potential for technological advancements to mitigate the effects of climate change on agriculture. They would also be interested in the potential for climate change to reduce
  the Midwest agricultural economy to levels last seen during the economic downturn for farmers in the 1980s.
