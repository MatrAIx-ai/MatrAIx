personas:
  professional: Justo Suazo is a teenage visual artist who blends street graffiti with digital illustration, channeling their spontaneous creativity into freelance mural commissions and art contest entries
    while navigating the challenges of school deadlines.
  sports: Justo Suazo enjoys weekend hikes along Everett’s shoreline and forest trails, follows the Seattle Sounders FC for soccer inspiration, and occasionally joins a local skateboarding club that meets
    at the waterfront skate park.
  arts: Justo Suazo immerses themselves in the visual and musical scene, drawing inspiration from graffiti legend Banksy, listening to indie rock icons Arctic Monkeys and hip‑hop poet Kendrick Lamar while
    sketching urban landscapes and crafting acoustic guitar melodies.
  travel: Justo Suazo prefers spontaneous road trips, having already explored Seattle’s art districts, taken a weekend bike ride to Portland’s food markets, and dreaming of a future mural tour across San
    Francisco’s Mission neighborhood.
  culinary: Justo Suazo experiments in the kitchen by reimagining classic family corn‑bean stew with Pacific Northwest smoked salmon and fresh herbs, showcasing a knack for blending familiar spice profiles
    with local ingredients.
  core: Justo Suazo is a restless teenage creator who balances bold street art, competitive gaming, and a love for outdoor hikes, all while wrestling with deadline avoidance and a tendency to burn the midnight
    oil.
background:
  cultural: Justo is a first‑generation Mexican‑American whose family originates from Jalisco. At home, Spanish is the primary language, and family gatherings revolve around traditional foods like tacos
    al pastor, tamales, and fresh salsa. He celebrates Día de los Muertos and Mexican Independence Day with his extended family and the local Latino community in Everett, often participating in cultural
    festivals and community parades. Growing up in Snohomish County, he has absorbed the Pacific Northwest's love for outdoor activities and a multicultural environment, which he blends with his Mexican
    roots. He draws artistic inspiration from Mexican muralists such as Diego Rivera and local Northwest artists, creating a hybrid aesthetic. While he values family loyalty and resilience from his heritage,
    he also navigates the independent, creative spirit of his American surroundings, often questioning stereotypes and asserting his identity in both contexts.
