  career_goals: Justo aims to turn his passion for art into a sustainable career. He plans to earn his GED and then enroll in a community college program or a vocational certificate in graphic design or
    mural arts. In the short term, he wants to build a portfolio that showcases his street art and digital illustrations, win local art competitions, and secure freelance gigs for community murals and album
    covers. Long‑term, he envisions establishing his own creative studio that blends visual art, music, and digital media, collaborating with local businesses and cultural organizations to produce unconventional,
    community‑focused projects. He is also motivated to deepen his technical skills in industry‑standard software and expand his programming knowledge to create interactive art installations.
