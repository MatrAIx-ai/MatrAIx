personas:
  professional: Emerita Nunez, an aspiring comic artist and junior animator, channels her curiosity and competitive edge into weekly sketch sessions, watercolor landscapes for school projects, and creative
    Scratch animations, while they balance a reliable, organized approach to deadlines with the flexibility to experiment freely.
  sports: Emerita Nunez, a forward for the Tulsa Kids Soccer Club and a fan of the Tulsa Roughnecks, brings their competitive spirit to weekend matches, practices dribbling drills after school, and they
    balance aggressive play with calm teamwork, while also cheering for their hometown team at local stadium events.
  arts: Emerita Nunez, a budding comic creator who draws inspiration from Osamu Tezuka, Hayao Miyazaki, and James Gurney, enriches their sketches with the rhythms of Los Ángeles Azules, Ariana Grande, and
    Koji Kondo while they strum guitar covers of 'Wish You Were Here', and they regularly exhibit their watercolor landscapes at the Tulsa Arts District’s youth gallery.
  travel: Emerita Nunez, an adventurous middle‑school explorer, prefers short family road trips to nearby museums like the Philbrook Museum and city art districts, meticulously plans itineraries using colorful
    maps, and they dream of visiting the vibrant murals of Mexico City and the interactive digital art exhibits of Tokyo’s teamLab Borderless, all while they balance school responsibilities and a modest
    travel budget.
  culinary: Emerita Nunez, a junior kitchen enthusiast, delights in hand‑folding masa for tamales, layering cheese and rafita in chicken enchiladas with homemade red sauce, and they experiment with fresh
    cilantro, lime, and jalapeño for guacamole, while they also master simple spaghetti carbonara for after‑school snacks.
  core: Emerita Nunez fuses artistic curiosity, competitive drive, and cultural creativity into a vibrant life, often sketching between soccer drills, meticulously budgeting for supplies, and they hum cumbia
    beats while perfecting their next watercolor scene.
background:
  cultural: Emerita is a first‑generation Mexican‑American raised in Tulsa, Oklahoma. At home, Spanish is spoken alongside English, and she celebrates Mexican holidays such as Día de los Muertos, Cinco
    de Mayo, and Christmas with traditional foods, music, and altar‑building rituals. Her family maintains a strong connection to Mexican culture through storytelling, folk music, and occasional trips to
    visit relatives in Mexico. Living in Tulsa’s growing Latino community, she attends local cultural events at the Tulsa Latino Community Center and participates in school activities that highlight Hispanic
    heritage. This bicultural environment shapes her identity, fostering pride in her roots while encouraging her to share Mexican artistic traditions with a broader audience.
attributes:
  skills: '[''Reading comprehension'', ''Creative writing'', ''Basic mathematics'', ''Drawing (pencil & watercolor)'', ''Digital illustration (tablet & Scratch)'', ''Bilingual Spanish–English communication'',
    ''Project planning and organization'', ''Critical thinking and source verification'', ''Competitive mindset in school contests'', ''Basic guitar playing'']'
  hobbies: '[''Sketching/comic drawing'', ''Watercolor painting'', ''Digital animation (Scratch)'', ''Reading fantasy/science-fiction'', ''Art club participation'', ''Folkloric dance (Mexican)'', ''Soccer'',
    ''Museum visits (Tulsa Arts District)'', ''Cooking Mexican dishes with family'', ''Playing guitar'', ''Listening to music (cumbia, pop, game soundtracks)'']'
  career_goals: Emerita aspires to combine her love of art, technology, and cultural heritage into a career that celebrates creativity and storytelling. She dreams of becoming a multidisciplinary visual
    artist—such as a graphic designer, illustrator, or museum curator—who can create interactive exhibits that showcase Mexican traditions in contemporary contexts. To achieve this, she plans to attend
    a specialized arts high school, develop advanced digital illustration and coding skills, and earn scholarships for national art competitions. She also hopes to one day travel, study abroad, and use
    her bilingual abilities to bridge cultures through visual media, while mentoring younger children in her community.
