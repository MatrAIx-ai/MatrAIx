persona_description: A woman computer specialist who is passionate about bringing more microcomputers into elementary schools and increasing purchases of personal computers for use at home. She believes
  that the more games and computers come into the home, the more likely it is that daughters will have equal access to them, and she is eager to see women get a more equal crack at developing their computer
  skills. She is also aware of the aversion some young women seem to have towards computer courses and suggests pacing courses so that each student masters a point and gains a sense of success before being
  allowed to move on to the next step. She believes that redesigning computer software and trying to get teachers, parents, and students to reexamine their attitudes about girls and computers are key to
  fighting the technical gender gap and increasing the number of women in the computer industry.
