  career_goals: Ermelinda aspires to a career that combines her love for routine, organization, and helping others. She dreams of becoming an elementary school teacher who can create structured, supportive
    classrooms, or a child psychologist who helps peers manage strong emotions. She also imagines herself as a future event coordinator or professional organizer, roles where she can apply her methodical
    approach and sociable energy to plan and execute activities that bring people together.
