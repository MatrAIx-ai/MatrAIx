    screenings'']'
  career_goals: Thoa aims to secure a role that bridges his business background with his passion for the arts, such as arts administration, cultural entrepreneurship, or a marketing position within a creative
    organization. He is exploring opportunities to work with museums, galleries, or nonprofit cultural institutions where he can contribute to program development and community outreach. In the medium term,
    he plans to pursue a certificate in arts management and eventually launch his own consultancy that helps artists and cultural groups develop sustainable business strategies. He also seeks a work environment
    that offers flexibility, low-stress conditions, and room for continual learning, helping him manage his sensitivity to stress.
