  career_goals: Pedro hopes to turn his artistic curiosity into a career. He plans to enroll in a community college art program or a vocational graphic‑design certificate, aiming to become a freelance visual
    designer and content creator for local brands or tourism agencies in Puerto Rico. He also dreams of producing a short‑film or music video that reflects his community’s culture, hoping to showcase his
    work at regional festivals. Long‑term, he wants to build a studio where he can mentor other young creators and use his platform to raise awareness about mental‑health challenges among Puerto Rican youth.
