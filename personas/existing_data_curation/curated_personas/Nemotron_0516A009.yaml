personas:
  professional: Samaria Delbeau, a budding soccer star in the Newark youth league, channels their competitive edge and love for structure into leading drills and keeping the team’s playbook organized while
    occasionally forgetting to bring their water bottle because they prioritize spontaneous fun over strict obligations.
  sports: Samaria Delbeau thrives on weekend matches with the Parkside Soccer Club, cheering for New York City FC and the New York Giants, and insists on a pre‑game warm‑up routine that satisfies their
    need for structure while their competitive spirit drives extra penalty‑kick practice after school.
  arts: Samaria Delbeau spends afternoons drawing bright comic‑style heroes inspired by Beyoncé’s stage outfits and the whimsical worlds of Mo Willems, often dancing to hip‑hop beats while they sketch,
    merging their love for music, storytelling, and vibrant community celebrations like weekly church sing‑alongs.
  travel: Samaria Delbeau dreams of a family road‑trip to the Jersey Shore for salty pretzel snacks, has already visited the Statue of Liberty on a school field trip, and hopes to one day explore Disney
    World’s Magic Kingdom, balancing their structured itinerary planning with the excitement of spontaneous detours.
  culinary: Samaria Delbeau’s favorite meals include creamy mac and cheese, sweet potato pie made during Juneteenth gatherings, and pizza topped with pepperoni and extra cheese, and they enjoy helping their
    mom stir collard greens in the kitchen while humming R&B hits, though they often forget to finish their vegetables.
  core: Samaria Delbeau is an energetic, competitively minded seven‑year‑old who blends a love for structured soccer drills with spontaneous dance parties, saving pennies for cleats while soothing asthma
    with colorful charts, and never lets a missed beat dampen their calm resilience.
background:
  cultural: Samaria is a Black girl raised in Newark, New Jersey, surrounded by a vibrant African‑American community. Her family celebrates cultural traditions such as Juneteenth, soul food gatherings,
    and weekly church services that emphasize music, storytelling, and communal support. She attends a local after‑school program that offers urban youth soccer and arts workshops, connecting her with peers
    who share similar cultural experiences. The rich history of Newark's Black neighborhoods, the influence of nearby museums, and the presence of community mentors nurture her pride in her heritage and
    shape her worldview.
