  career_goals: Samaria dreams of becoming someone who can both lead and inspire others. She talks about wanting to be a teacher one day, helping kids learn to read and play together, while also imagining
    herself on a soccer team where she can compete and score goals. She occasionally mentions becoming a community organizer who plans fun events for neighborhood kids, and she is fascinated by the idea
    of creating her own stories as a children's author or illustrator. These ambitions blend her love for structure, her competitive spirit, and her desire to bring joy to others.
