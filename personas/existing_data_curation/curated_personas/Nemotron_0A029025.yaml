personas:
  professional: Omar Moreno, a retired community volunteer and seasoned amateur artist, blends their meticulous event planning skills with a deep love for abstract watercolor, using their organized nature
    to coordinate senior art workshops and preserve heritage through extensive genealogical archives.
  sports: Omar Moreno, a devoted fan of the Norfolk Tides minor‑league baseball team and the regional soccer club Norfolk United, enjoys walking to the local park for light stretching and participates in
    weekly senior badminton sessions to stay active.
  arts: Omar Moreno, an avid painter of abstract oils and watercolors, draws inspiration from the bold colors of Frida Kahlo and the gestural strokes of Jackson Pollock, while also writing reflective poetry
    that echoes the rhythms of plena and bomba performers such as Willie Colón, and regularly attends exhibitions at the Chrysler Museum.
  travel: Omar Moreno, who treasures both quiet weekend trips to the historic streets of Old San Juan and occasional cross‑country train journeys to visit the art museums of New York, plans travel meticulously,
    balancing limited mobility with a desire to explore sites that connect to their family’s heritage and artistic passions.
  culinary: Omar Moreno, a skilled home cook, delights in preparing mofongo with plantains and chicharrón, arroz con gandules simmered with sofrito, and herb‑infused sauces using cilantro and oregano from
    their garden, though they sometimes forget to let the rice rest properly, leading to slightly uneven texture.
  core: Omar Moreno, an 89‑year‑old artistic soul who blends disciplined community service with spontaneous bursts of color on canvas, balances meticulous genealogy work with a habit of forgetting to take
    their medication on sunny afternoons.
background:
  cultural: Omar grew up in a close-knit Puerto Rican family that immigrated to the mainland United States in the 1950s. He was raised bilingual, speaking Spanish at home and English in school, and he carries
    forward the island’s vibrant traditions—its music, storytelling, and communal eating—into his daily life. The values of respect for elders, hospitality, and collective responsibility shape his interactions
    and his dedication to community service. In Norfolk, he has become a bridge between the island heritage and the local diaspora, participating in Puerto Rican festivals, teaching traditional recipes,
    and preserving family histories for future generations. His Catholic upbringing informs his gratitude and reflective practices, while his long-standing love for the arts reflects the island’s rich cultural
    tapestry.
