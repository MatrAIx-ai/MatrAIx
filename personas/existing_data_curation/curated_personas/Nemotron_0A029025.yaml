  hobbies: '[''Abstract painting'', ''Creative writing (poetry and essays)'', ''Reading philosophy and historical biographies'', ''Herb and native plant gardening'', ''Traditional Puerto Rican cooking'',
    ''Genealogical research'', ''Volunteering at senior center'', ''Playing chess'', ''Listening to plena and bomba music'', ''Attending art exhibitions and cultural festivals'']'
  career_goals: Although retired, Omar aspires to leave a lasting legacy for his family and the Norfolk Puerto Rican community. He plans to complete a memoir and a comprehensive family genealogy that will
    be shared with local libraries and schools. He hopes to launch a weekly art workshop for seniors that emphasizes abstract techniques and encourages intergenerational dialogue. Additionally, he aims
    to serve as a cultural ambassador, organizing annual Puerto Rican heritage events and mentoring younger volunteers in event coordination and grant writing. Finally, he wishes to continue learning new
    artistic mediums, such as digital illustration, to stay intellectually curious.
