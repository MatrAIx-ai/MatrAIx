  hobbies: '[''Pickup basketball'', ''Jogging along the Bronx River'', ''Balcony gardening'', ''Listening to hip-hop, jazz, and R&B'', ''Cooking soul-food meals for friends'', ''Playing strategy video games'',
    ''Reading contemporary fiction'', ''Volunteering at community health fairs'', ''Participating in church outreach events'']'
  career_goals: Anthony aims to become a Certified Nursing Assistant (CNA) within the next year and then enroll in an associate-degree program in nursing to qualify as a Licensed Practical Nurse (LPN).
    He envisions a future where he can lead a community-based home-care team focused on underserved Bronx neighborhoods, and eventually pursue a bachelor's degree in public health to advocate for health
    equity. Long-term, he hopes to launch a small, culturally attuned home-health agency that empowers Black families and offers career pathways for youth in his community.
