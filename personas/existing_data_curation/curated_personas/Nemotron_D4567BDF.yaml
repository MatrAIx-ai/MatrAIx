  career_goals: Gerald aims to earn his GED within the next year and obtain certification from the Pennsylvania Paint Contractors Association to formalize his trade credentials. In the medium term, he aspires
    to become a master painter specializing in historic‑home restoration, blending his technical skills with his artistic curiosity to recreate period‑accurate finishes in the older homes of the Lackawanna
    region. He dreams of launching a small boutique painting and decorative‑finishes business that emphasizes personalized service, sustainable paint products, and mentorship opportunities for local youth
    interested in skilled trades. Long‑term, Gerald hopes to be recognized as a community resource who bridges practical craftsmanship with artistic expression, possibly collaborating with interior designers
    on bespoke mural projects.
