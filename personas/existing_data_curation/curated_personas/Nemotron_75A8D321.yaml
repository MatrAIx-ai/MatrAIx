personas:
  professional: Amanda Prather, a community historian and volunteer docent, blends practical DIY skills and meticulous record-keeping with a calm, organized approach to preserving local stories, coordinating
    neighborhood garden projects, and mentoring seniors, embodying her balanced curiosity and assertive compassion.
  sports: Amanda Prather enjoys early-morning bird-watching walks, participates in weekly senior-center tai chi, passionately follows the St. Louis Cardinals and the Missouri Tigers, and occasionally joins
    a summer pickleball league at the local park, blending low-impact fitness with community spirit.
  arts: Amanda Prather expresses creativity through quilting modern twists on classic Bargello patterns, draws inspiration from John Prine's folk songs and Grant Wood's paintings, and regularly participates
    in the church book club to discuss historical novels by authors such as Marilynne Robinson, weaving artistic appreciation into daily life.
  travel: Amanda Prather prefers low-key, organized trips, often visiting Midwestern gems like Mackinac Island, the Ozark Riverways, and the historic Willow Springs Museum, while dreaming of a relaxed spring
    river cruise along the Mississippi that balances adventure with comfortable pacing.
  culinary: Amanda Prather delights in cooking Midwestern comfort foods such as chicken pot pie, sweet corn casserole, cornbread, and farm-fresh tomato soup, seasoning dishes with basil, thyme, and oregano
    from her garden, and occasionally experiments with spice rubs on fried catfish, showcasing a love for heritage recipes enriched by garden-grown herbs.
  core: Amanda Prather is a quietly assertive, garden-tending historian who blends old-world practicality with a gentle curiosity for new ideas, often spotted with a quilting frame and a camera.
background:
  cultural: Amanda was born and raised on a family farm near Albion, Nebraska, in a community that traces its roots to German and Czech immigrants who settled the region in the late 19th century. The Midwest
    values of self-reliance, modesty, and community service shaped her upbringing, reinforced by regular participation in her United Methodist church and local county fairs. Her cultural identity merges
    a practical, agricultural heritage with a quiet appreciation for heritage preservation, as reflected in her keen interest in genealogy and local history. These influences foster a blend of curiosity
    about the past and present, balanced by a steadfast, pragmatic outlook.
