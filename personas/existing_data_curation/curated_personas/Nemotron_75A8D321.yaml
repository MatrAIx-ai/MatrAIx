  hobbies: '[''reading historical fiction'', ''gardening'', ''birdwatching'', ''quilting'', ''cooking Midwest recipes'', ''small book club'', ''volunteering at historical society'', ''digital photography'']'
  career_goals: Even at 80, Amanda aims to leave a lasting mark on her community. She hopes to compile and publish a memoir that intertwines her family’s farming heritage with local history, and to establish
    a small community garden plot where neighbors can share produce and gardening tips. She plans to mentor younger residents in quilting and textile crafts, as well as teach seniors how to use video-calling
    and email to stay in touch with distant relatives. Amanda also aspires to volunteer as a docent for the Boone County historical society, giving occasional talks about the area’s settlement stories.
    Ultimately, her ambition is to remain active, independent, and valued as a source of practical knowledge and quiet leadership.
