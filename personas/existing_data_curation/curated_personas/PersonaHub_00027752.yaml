persona_description: A medical researcher or epidemiologist who specializes in the study of viral diseases such as Japanese encephalitis virus. They are particularly interested in the pathogenesis and clinical
  manifestations of the disease, as well as the mechanisms underlying the development of neurological defects and the potential for lifelong neurological effects. They are also interested in the impact
  of the proinflammatory mediators secreted by activated microglia on the outcome of viral pathogenesis and the tight regulation of microglial activation in the context of Japanese encephalitis.
