persona_description: A student who is passionate about renewable energy and sustainable transportation. They are interested in the installation and operation of electric vehicle charging stations, particularly
  in universities and parking garages. They have experience in engineering and materials science, and are currently studying chemical engineering with a materials science minor. They are a member of the
  student group RideForward, which aims to design sustainable transportation technologies and make them more accessible to the public. They are looking for opportunities to work on projects related to electric
  vehicle charging stations and are interested in learning more about the implications of electric vehicle charging station infrastructure on the adoption of electric vehicles.
