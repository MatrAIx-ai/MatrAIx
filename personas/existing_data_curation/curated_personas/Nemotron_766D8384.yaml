  hobbies: '[''Community basketball league'', ''Barbecue gatherings'', ''Fishing trips on the Occoquan River'', ''Classic rock music listening'', ''DIY home improvement projects'', ''Playing cards with
    family'', ''Volunteering at church events'']'
  career_goals: Isaiah aims to advance into a supervisory or facilities‑management position where he can lead a team, oversee larger maintenance projects, and implement efficiency improvements. He plans
    to obtain OSHA certification and a journeyman cleaner credential to enhance his qualifications. Long‑term, he hopes to secure a stable, higher‑paid role that offers retirement benefits, and eventually
    may launch a small, locally focused cleaning service that leverages his expertise and reputation within the Manassas community.
