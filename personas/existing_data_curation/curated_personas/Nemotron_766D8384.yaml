personas:
  professional: Isaiah Thornton is a veteran janitor and building cleaner in Manassas who leverages two decades of meticulous floor care, chemical safety, and crew coordination to uphold immaculate facilities,
    while channeling his competitive drive toward a supervisory role and pursuing OSHA and journeyman certifications to cement his path to facilities‑management.
  sports: Isaiah Thornton competes in a community basketball league, roots for the Washington Wizards and the Washington Commanders, joins a local fishing club that meets at the Occoquan River, and maintains
    fitness through weekend pickup games, balancing his competitive edge with the camaraderie of his teammates.
  arts: Isaiah Thornton's evenings are filled with classic rock from Led Zeppelin, The Rolling Stones, and AC/DC, often blasting on a vintage vinyl turntable while he tinkers with DIY home projects, and
    he occasionally attends live shows at the Wolf Trap National Park for the Performing Arts.
  travel: Isaiah Thornton prefers road‑trip adventures that blend nature and history, having explored Shenandoah National Park’s Skyline Drive, the historic streets of Williamsburg, and a nostalgic family
    vacation to the Gulf Coast of Florida, while meticulously planning itineraries to stay within his modest budget and to accommodate his weekend barbecue schedule.
  culinary: Isaiah Thornton loves slow‑cooked barbecue, mastering a sweet‑smoky rub of paprika, brown sugar, and cumin for pork ribs, grilling bratwurst, and pairing meals with homemade coleslaw and baked
    beans, though he occasionally overindulges in extra sauce, leading to a lingering sweet‑tooth habit.
  core: Isaiah Thornton blends a disciplined, detail‑driven work ethic with a lively, competitive social streak, channeling his love for classic rock, community basketball, and backyard barbecues while
    vigilantly planning his career ascent and financial future, even as he wrestles with occasional impulse splurges and neglect of stretching routines.
background:
  cultural: Isaiah was raised in a working‑class, white family on the suburban fringe of Washington, D.C., and has lived most of his adult life in Manassas, Virginia. His upbringing emphasized hard work,
    punctuality, and community loyalty. Family traditions include attending local high‑school sports events, celebrating Independence Day with fireworks and potluck barbecues, and participating in church
    activities. The cultural mix of historic Virginian heritage and modern suburban life in Manassas shapes his values of practicality, neighborly respect, and a modest pride in the region’s history.
attributes:
