  career_goals: Daniel dreams of becoming a mechanical engineer who designs practical, community‑focused solutions, such as affordable robotics for local farms or eco‑friendly tools for small businesses
    in Connersville. He wants his work to blend his love of tinkering with real‑world impact, offering stable, reliable employment while contributing to his hometown’s prosperity. Because he worries about
