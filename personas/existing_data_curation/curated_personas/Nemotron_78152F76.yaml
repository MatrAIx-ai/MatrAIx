  hobbies: '[''Art history reading'', ''Museum visits'', ''Watercolor painting'', ''Folk dancing (solo practice)'', ''Gardening'', ''Quilting'', ''Genealogical research'', ''Cooking Mexican cuisine'', ''Crossword
    and Sudoku puzzles'', ''Listening to classical and traditional music'']'
  career_goals: Even in retirement, Gabriela remains driven by personal achievement. She aims to complete a large, multi-panel "Lifeline" quilt that will be entered in the Texas State Fair competition,
    showcasing her cultural narrative. She plans to compile a bilingual family cookbook that blends traditional Mexican recipes with locally sourced Texas ingredients, intending to self‑publish for her
    grandchildren. Gabriela is determined to finish a comprehensive digital archive of her family's oral histories, photographs, and genealogical records, making them accessible to future generations through
    an online platform. She also aspires to mentor three local teenagers in heritage preservation, guiding them in research and museum volunteering. Finally, she wishes to establish a structured trust that
    ensures her grandchildren's higher‑education expenses are covered, reflecting her disciplined financial mindset.
