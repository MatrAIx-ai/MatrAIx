    ''Time management and adherence to delivery schedules'', ''Small-team communication and mentorship of new drivers'', ''Problem‑solving under pressure and competitive performance tracking'']'
  hobbies: '[''Ice fishing on Upper Peninsula lakes'', ''Snowmobiling on backcountry trails'', ''Restoring vintage truck parts and building scale model trucks'', ''Reading non‑fiction on logistics, automotive
    engineering, and local history'', ''Pond hockey games with friends'', ''Family barbecues and small gatherings at the lake'', ''Weather tracking for road safety'', ''Volunteering to teach vehicle safety
    to high‑school students'', ''Camping and cabin getaways in the forest'']'
  career_goals: Gregory aims to move from a frontline driver to a leadership role within the trucking industry while securing a more balanced home life. In the next five years he plans to obtain a higher‑class
    CDL with hazardous‑materials and double‑trailer endorsements, positioning himself for higher‑pay routes and expanded responsibilities. He is pursuing a supervisory position such as fleet coordinator
    or dispatch manager, where he can apply his route‑optimization and safety expertise to improve overall efficiency. Gregory also envisions launching a small family‑owned transportation service that blends
    his sales acumen with reliable local deliveries, giving him greater control over his schedule. To support these goals, he is enrolling in a community‑college logistics certificate program and targeting
    an exemplary safety record that could earn him recognition and open doors for future entrepreneurship or mentorship opportunities.
