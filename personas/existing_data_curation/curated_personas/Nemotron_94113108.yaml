personas:
  professional: Toni Mcrae is a budding LEGO architect who meticulously follows step‑by‑step building guides, and they translate each structured instruction into tiny triumphs that showcase a natural knack
    for spatial reasoning and a methodical work ethic.
  sports: Toni Mcrae enjoys biking along the Lake Charlevoix shoreline, attends the local youth swimming lessons at the Charlevoix Community Center, and supports the Michigan State Little League Tigers,
    demonstrating a balanced, schedule‑driven approach to fitness.
  arts: Toni Mcrae participates in the school’s art club where they sketch scenes inspired by the works of Claude Monet and watch animated films by Studio Ghibli, while also practicing recorder pieces by
    Mozart, weaving a love of visual and musical arts into their daily routine.
  travel: Toni Mcrae loves family road trips to Mackinac Island, where they collect smooth stones along the shoreline and map each stop in a colorful journal, preferring well‑planned itineraries that blend
    adventure with the comfort of familiar routines.
  culinary: Toni Mcrae helps bake chocolate chip cookies by measuring flour, sugar, and butter with a kid‑size digital scale, delights in tasting homemade mac & cheese, and prefers dishes that feature bright,
    simple flavors like strawberry shortcake, reflecting a budding culinary curiosity and precise cooking style.
  core: Toni Mcrae is a meticulous, curiosity‑driven seven‑year‑old who blends structured play with gentle social charm, thriving on clear routines, tiny triumphs, and the occasional sweet treat.
background:
  cultural: Toni grows up in East Jordan, a close‑knit lakeside community in Charlevoix County, Michigan. Her family’s heritage traces back to German and Irish ancestors who settled in the Midwest generations
    ago, bringing traditions of seasonal celebrations, community potlucks, and a strong work ethic. The region’s Midwestern values—politeness, helpfulness, and a love for the outdoors—shape her daily life.
    She routinely participates in local events such as the Fourth of July fireworks over the lake, community tree‑planting projects, and her church’s holiday programs. Winter brings ice skating on the frozen
    lake and snowshoeing, while summer is marked by swimming, berry picking, and family camping trips. These cultural and environmental influences reinforce her appreciation for routine, cooperation, and
    caring for both people and nature.
