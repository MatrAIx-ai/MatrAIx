personas:
  professional: Chavely Gonzalez is a budding preschool helper who loves organizing story‑time circles, reliably assists with clean‑up duties, and uses their outgoing energy to keep classmates engaged while
    comfortably following the daily routine.
  sports: Chavely Gonzalez loves sprinting in the Charlotte Soccer Club’s U5 practice, eagerly watches the Carolina Panthers on Sundays, and roots for the Charlotte Hornets during NBA games, reflecting
    an energetic yet routine‑oriented approach to sports.
  arts: Chavely Gonzalez enjoys dancing to the 'Let It Go' soundtrack by Idina Menzel, loves the playful storytelling of Sesame Street starring Elmo, and frequently draws crayon pictures of dinosaurs, showing
    a vibrant creative spark fostered by group activities.
  travel: Chavely Gonzalez prefers family road trips that follow a familiar itinerary, relishes visits to Walt Disney World in Orlando and the San Diego Zoo, dreams of seeing the Grand Canyon, and always
    insists on a snack break at the same rest‑area, reflecting a love of routine mixed with curiosity.
  culinary: Chavely Gonzalez delights in scooping peanut butter onto bread for a jelly sandwich, savors cheesy macaroni and cheese, picks crunchy apple slices, and can confidently stir batter for banana
    muffins under Mom’s supervision, demonstrating a practical yet adventurous palate.
  core: Chavely Gonzalez is a routine‑loving, energetic four‑year‑old who balances a love for group play with a practical streak, they occasionally overindulge in stickers, and keeps a tidy pink piggy bank
    while mastering preschool responsibilities.
background:
  cultural: Chavely comes from a Mexican‑American family that speaks both Spanish and English at home. Her parents celebrate Mexican traditions such as Día de los Muertos, Las Posadas, and family gatherings
    with tacos and tamales. She participates in community events at the local Mexican cultural center in Saint Paul, where she learns traditional songs and dances. This bilingual and bicultural upbringing
    gives her a strong sense of pride in her heritage while also embracing the multicultural environment of Minnesota.
