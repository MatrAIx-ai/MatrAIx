  career_goals: Michael aims to progress into a senior procurement leadership role within the next five years, targeting positions such as Procurement Manager or Supply Chain Director. He seeks to lead
    a team that implements data‑driven, sustainable sourcing strategies, integrates emerging technologies like AI‑driven spend analytics, and champions ethical procurement standards. He plans to obtain
    the Certified Professional in Supply Management (CPSM) certification and to mentor junior buyers, while also establishing a better work‑life balance to manage his anxiety. Long‑term, he envisions consulting
    for mid‑size companies to help them optimize procurement processes and drive value creation.
