persona_description: A person who is interested in learning about and understanding the complexities of the educational system, particularly focusing on the challenges faced by students with learning disabilities
  and difficulties. They are likely to have a background in education or psychology and may have encountered students with learning difficulties in their professional or personal life. They are interested
  in learning more about the government's changes to the Special Educational Needs system and are seeking information and resources to help them understand and support students with learning disabilities.
  They are likely to have a particular interest in learning about the different types of learning difficulties and how they can impact a person's life.
