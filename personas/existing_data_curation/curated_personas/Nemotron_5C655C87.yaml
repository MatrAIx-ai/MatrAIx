  hobbies: '[''Reading Circles'', ''Community Theater'', ''Gardening'', ''Baking'', ''Hiking'', ''Yoga'', ''Journaling'', ''Historical Reenactments'', ''Local Music Festivals'', ''Narrative Podcast Listening'']'
  career_goals: Deanna aims to advance into a leadership role within her school district, such as Department Chair or Curriculum Specialist, where she can influence broader instructional practices. She
    plans to pursue a master’s degree in Educational Leadership to deepen her expertise in school administration and policy development. Passionate about student well‑being, she wants to design and implement
    a school‑wide social‑emotional learning program that equips learners with stress‑management tools—mirroring her own experiences with worry. Additionally, she envisions leading professional‑development
    workshops for fellow teachers, publishing articles on interdisciplinary humanities teaching, and eventually authoring a guidebook on blending curiosity‑driven inquiry with practical classroom strategies.
