personas:
  professional: Deanna Self, a 28‑year‑old middle‑school humanities teacher in Cabarrus County, blends classic literature, philosophy, and contemporary media into interdisciplinary units, leveraging learning
    management systems and interactive whiteboards while using her natural flair for public speaking and conflict mediation to foster inclusive, discussion‑rich classrooms; her relaxed approach to planning
    lets spontaneous student interests steer lesson pivots, and her ambition to become a curriculum specialist drives her to design school‑wide social‑emotional learning initiatives.
  sports: Deanna Self, an avid weekend hiker in the North Carolina foothills, laces up for the local women’s recreational soccer team, practices yoga twice a week, and never misses a Charlotte Hornets game,
    while also occasionally joining the community’s annual charity 5 k run.
  arts: Deanna Self volunteers as a stagehand and occasional actor in the Cabarrus County community theatre, delights in folk music from The Avett Brothers and Alison Krauss, attends the MerleFest festival,
    participates in reading circles discussing Toni Morrison and Neil Gaiman, and listens to narrative podcasts such as Lore and The History of Rome.
  travel: Deanna Self prefers short road trips that blend history and nature, having explored Asheville’s arts districts, Savannah’s historic squares, and the Blue Ridge Parkway, and she dreams of a summer
    pilgrimage to Edinburgh’s historic festivals and a spring visit to Colonial Williamsburg reenactments; she generally books last minute and rides in a modest vehicle, balancing budget constraints with
    a love for cultural immersion.
  culinary: Deanna Self enjoys baking peach cobbler, cornbread, and banana bread, spices her garden‑grown basil and rosemary into homemade marinara and Thai green curry, and prefers farm‑to‑table meals
    with fresh carrots and tomatoes she harvests herself; she occasionally experiments with kimchi after a workshop, but forgets to label leftovers, leading to occasional fridge discoveries.
  core: Deanna Self is a sociable, curiosity‑driven educator who mixes Southern hospitality with a love for spontaneous creativity, managing anxiety through yoga while juggling a relaxed approach to planning
    and a penchant for community theatre, garden‑fresh baking, and last‑minute adventures.
background:
  cultural: Deanna grew up in a suburban setting in Central North Carolina, raised in a family that values Southern hospitality, community involvement, and a Protestant heritage. Her ancestry traces back
    to Anglo‑American roots, and she was immersed in regional traditions such as seasonal fairs, folk music, and outdoor recreation. The multicultural environment of Cabarrus County—home to a growing mix
    of cultures—has influenced her inclusive outlook and reinforced her commitment to honoring diverse perspectives within the classroom. This blend of Southern cultural values and exposure to broader cultural
    dynamics shapes her identity, informing both her teaching philosophy and her community‑focused activities.
attributes:
  skills: '[''Curriculum Development'', ''Differentiated Instruction'', ''Educational Technology Integration'', ''Public Speaking'', ''Classroom Discussion Facilitation'', ''Conflict Mediation'', ''Community
