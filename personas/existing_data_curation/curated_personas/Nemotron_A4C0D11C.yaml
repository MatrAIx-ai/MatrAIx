  hobbies: '[''Gardening'', ''Cooking and baking'', ''Reading mystery and self‑help books'', ''Crossword puzzles and Sudoku'', ''Volunteer work at community center'', ''Walking in local parks'', ''Organizing
    potluck gatherings'']'
  career_goals: Amber aims to move into a supervisory or team‑lead role within the customer service department, leveraging her years of front‑line experience to mentor newer agents and improve service quality.
    She also envisions becoming a quality‑assurance specialist, focusing on training, performance metrics, and process improvement. Long‑term, she hopes to balance her professional aspirations with her
    family life, possibly transitioning to a part‑time consulting role that allows her to share her expertise with small businesses in the Park Ridge area.
