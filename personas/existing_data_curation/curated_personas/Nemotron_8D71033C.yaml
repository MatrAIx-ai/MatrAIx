  career_goals: Shabre aims to become a senior interactive designer within the next three years, focusing on inclusive design for socially conscious brands. She aspires to lead multidisciplinary design
    teams, mentor junior designers, and eventually transition into a creative director role where she can shape brand narratives that amplify underrepresented voices. She also envisions launching a freelance
    side studio that offers design consulting for community nonprofits, balancing financial stability with creative freedom while building structured workflows to manage stress.
