personas:
  professional: Shabre Comeaux, a 31‑year‑old interactive designer in Portland, they blend expert visual design, UI/UX craftsmanship, and motion storytelling with a deep commitment to inclusive narratives,
    leading collaborative workshops while often relying on flexible, last‑minute sprints due to a relaxed attitude toward strict planning.
  sports: Shabre Comeaux enjoys weekend hikes through Forest Park and seasonal trail runs, they follow the Portland Trail Blazers and Portland Timbers closely, participate in a local yoga circle at Yoga Pearl,
    and occasionally climb at Planet Granite, balancing a love for outdoor cardio with a relaxed, flexible fitness routine.
  arts: Shabre Comeaux merges illustration and motion graphics into community art workshops, they draw visual cues from designers like Jessica Walsh and abstract storytellers such as Kara Walker, attend
    indie concerts at Mississippi Studios featuring artists like St. Vincent and King Princess, and unwind crocheting textile art while reading contemporary novels such as 'Homegoing' and 'The Water Dancer'
    that explore layered personal narratives.
  travel: Shabre Comeaux favors spontaneous, low‑key getaways—spending weekend nights backpacking the Columbia River Gorge, taking day trips to Oregon’s coast at Cannon Beach, and dreaming of a creative
    immersion retreat in Kyoto, Japan—yet they balance a limited budget with a flexible itinerary that allows room for impromptu art‑inspired detours.
  culinary: Shabre Comeaux, an intermediate home cook, loves incorporating fresh balcony herbs like basil and mint into dishes such as citrus‑infused quinoa salad and homemade pesto pasta, they often pair
    meals with craft cold‑brew coffee, and occasionally experiment with seasonal comfort foods like ramen with soft‑boiled eggs and miso broth.
  core: Shabre Comeaux is a creatively restless, community‑focused designer who balances a love for inclusive storytelling with a habit of last‑minute project sprints, a lingering anxiety that fuels meticulous
    self‑care rituals, and a persistent tendency to misplace sketchbooks on coffee‑shop tables, which often leads them to scramble for replacements.
background:
  cultural: Shabre grew up in a Black family that emphasized storytelling, cultural pride, and community activism. Her upbringing exposed her to African American visual arts, music, and literature, which
    continue to influence her design aesthetic and commitment to representation. Living in Portland, she participates in local Black cultural events such as the Portland Black Art Fair and collaborates
    with community organizations to create inclusive visual campaigns. Her cultural background informs her design choices, encouraging her to prioritize diversity, equity, and authentic narratives in her
    work.
