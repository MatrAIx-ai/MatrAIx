personas:
  professional: Ricky Borden, an aspiring visual artist in preschool, channels curiosity into daily drawing sessions, uses a tidy arrangement of crayons and sketchbooks to stay organized while letting imagination
    roam, often taking on the role of classroom helper to responsibly manage supplies, and quietly asserts creative ideas during group projects.
  sports: Ricky Borden, a five‑year‑old with boundless energy, plays on the Mishawaka Mustangs Little Soccer team, cheers for the Chicago Cubs during family game nights, idolizes the Detroit Tigers for
    their hometown connection, loves splashing in the community pool during summer, attends a Saturday gymnastics class at the local YMCA, but often demands a break when overstimulated, balancing assertiveness
    on the field with a gentle love for teamwork.
  arts: Ricky Borden, a five‑year‑old who devotes after‑school hours to coloring with Crayola crayons, loves to emulate the bold strokes of local muralist Sam Robertson displayed at the Mishawaka Historical
    Museum, gets a thrill from watching Sesame Street performances, and enjoys creating stick‑figure comics inspired by Eric Carle’s vivid illustrations, often sharing them with grandparents during Thanksgiving
    gatherings.
  travel: Ricky Borden, a five‑year-old who loves family road trips to the Indiana Dunes State Park for sandcastle building, eagerly anticipates the annual visit to the Children’s Museum of Indianapolis,
    dreams of seeing the giant dinosaur skeleton at Chicago’s Field Museum, enjoys short planned journeys with a favorite stuffed rabbit as a travel buddy, but gets anxious when trips extend beyond familiar
    routine.
  culinary: Ricky Borden, a five‑year‑old who delights in the gooey stretch of mozzarella on a pepperoni pizza, relishes strawberry‑banana smoothies, helps mom whisk cinnamon‑sugar pancakes on Saturday
    mornings, occasionally sneaks an extra chocolate milk at the kitchen table despite knowing it’s not good for teeth, and proudly mixes peanut butter and jelly sandwiches for lunch.
  core: Ricky Borden, a five‑year‑old curiosity‑driven art lover with a tidy piggy bank, a touch of anxiety, and a boundless imagination that fuels both creative sketches and playful adventures.
background:
  cultural: Ricky is raised in Mishawaka, Indiana, a small Midwestern city with strong community ties. His family celebrates typical American holidays like Thanksgiving and the Fourth of July, and they
    often visit the nearby St. Joseph County museums and the local public library. The cultural environment emphasizes politeness, community involvement, and a blend of traditional values with encouragement
    of curiosity. His parents support his artistic interests by providing art supplies and enrolling him in preschool programs that emphasize play‑based learning and early literacy.
