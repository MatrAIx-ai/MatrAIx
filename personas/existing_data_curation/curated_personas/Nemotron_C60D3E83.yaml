  hobbies: '[''drawing'', ''LEGO building'', ''reading picture books'', ''singing'', ''nature exploration'', ''storytelling with toys'', ''attending library storytime'', ''participating in art workshops'']'
  career_goals: Ricky dreams of becoming an astronaut or an artist when he grows up, inspired by picture books about space and by his love of drawing. He also imagines teaching younger kids how to create
    art. These aspirations reflect his curiosity about new ideas, his appreciation of art, and his desire to explore unconventional thinking. He often talks about wanting to "fly to the moon" and "paint
    the stars".
