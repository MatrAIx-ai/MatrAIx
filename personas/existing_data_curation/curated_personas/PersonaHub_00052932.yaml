persona_description: A military historian who specializes in the study of World War II, particularly the events that took place in Europe during the final days of the war. His research interests include
  the surrender of German forces, the actions of SS units, and the fate of soldiers who attempted to cross the river Enns with their weapons and vehicles. He is particularly interested in the discovery
  of a soft-skinned SS soldier passing through Weyer and the potential connection between the soldier and the pile of army debris in the museum.
