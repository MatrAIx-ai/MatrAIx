  hobbies: '[''Art gallery visits'', ''Community theater'', ''Photography'', ''Sketching'', ''Cooking Puerto Rican cuisine'', ''Bird‑watching'', ''Walking/hiking'', ''Chess'', ''Reading nonfiction (art
    history, psychology, entrepreneurship)'', ''Volunteering as a Spanish‑language guide at cultural events'']'
  career_goals: After years as a customer service representative, Mario aims to transition into a team‑lead or training specialist role where he can mentor new hires, embed creative problem‑solving techniques,
    and design culturally sensitive service scripts that draw on his Puerto Rican background and art knowledge. He is pursuing a GED and a certificate in customer‑experience design, with a long‑term ambition
    to become a community liaison for a local museum or cultural center, bridging his love of art with his service expertise. In the short term, he seeks to become a top‑performing agent with consistently
    high customer‑satisfaction scores, positioning himself for a supervisory promotion within the next 12–18 months.
