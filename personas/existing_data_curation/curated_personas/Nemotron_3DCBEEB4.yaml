personas:
  professional: Mario Hernandez leverages over three decades of frontline customer service experience, mastering bilingual communication, active listening, and conflict de‑escalation, while they channel
    their curiosity and competitive edge into designing service scripts that echo familiar holiday rituals and storytelling, and mentoring peers.
  sports: Mario Hernandez stays fit by walking his Labrador along the Ashtabula County trail network, cheering the Cleveland Guardians in spring and the Cavaliers during winter, while they occasionally
    join a senior bowling league at the community center to add a competitive edge to their routine.
  arts: Mario Hernandez immerses himself in the arts by frequenting the Cleveland Museum of Art, collecting limited‑edition prints inspired by his island roots, attending community‑theater productions like
    "The Glass Menagerie," and listening to the rhythmic storytelling of salsa legends such as Celia Cruz, and they often discuss visual‑arts terminology with curious customers.
  travel: Mario Hernandez prefers low‑key, culturally enriching trips, planning weekend drives to New York City's Latin‑Quarter galleries, a yearly pilgrimage to a coastal town where Nochebuena is celebrated,
    and occasional Midwest road trips to explore historic barns, balancing a tight budget with a love for photography, and they always capture sunrise over the open fields.
  culinary: Mario Hernandez enjoys cooking with a confident, if occasionally experimental, hand, mastering classic dishes such as mofongo, pasteles, and arroz con gandules, while they frequently add a dash
    of smoked paprika or a splash of bourbon to create fusion flavors, and they love sourcing fresh plantains and pork shoulder at the local farmer's market.
  core: Mario Hernandez is a curious, art‑savvy veteran customer‑service professional who channels competitive flair and cultural storytelling into mentoring, cooking, and weekend gallery hops, all while
    battling a slight forgetfulness about dental appointments.
background:
  cultural: Mario grew up in a bilingual Puerto Rican household, where Spanish was spoken alongside English and cultural rituals—such as celebrating Nochebuena, dancing to salsa and plena, and preparing
    family meals—shaped his identity. Though he moved to Ohio as a young adult, he retains strong ties to his island heritage through regular visits to family, participation in local Caribbean festivals,
    and maintaining traditional cooking practices. His cultural lens informs his communication style, giving him an innate sensitivity to multicultural customers and an appreciation for the vibrant storytelling
    found in both art and everyday interactions.
attributes:
  skills: '[''Bilingual communication (English/Spanish)'', ''Active listening'', ''Conflict resolution'', ''Problem solving'', ''CRM software (Salesforce, Zendesk)'', ''Data entry and record‑keeping'',
