persona_description: This research study aimed to measure the impact of web-based silent reading practice using the Reading Plus program on the reading proficiency of ninth-grade English language learners
  (ELLs) who scored at the intermediate level on the 2009 or 2010 Arizona English Language Learning Assessment (AZELLA). The study involved matching and randomly assigning ninth-grade ELL students to either
  the Reading Plus treatment group or a control group that used the reading/language arts component of another web-based program. The study aimed to assess the reading proficiency gains achieved by ELL
  students who used Reading Plus and compare them to those who used the control group. The study also aimed to determine the number of reading practice lessons completed by students in the Reading Plus
  groups at both participating schools and to assess the size of the gains in reading proficiency.
