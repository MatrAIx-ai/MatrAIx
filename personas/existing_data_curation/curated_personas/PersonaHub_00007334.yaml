persona_description: A historian who is interested in the history of Black activism in New York City during the antebellum period, focusing on the growth and development of Black organizations and the struggles
  faced by Black activists for racial advancement and equality. They are particularly interested in the role of Black newspapers, speeches, and organizational records in shaping the Black community's response
  to early Black political strategy and the competing agendas of Black leaders regarding the Black community's American identity and the quest for full equality and citizenship in the United States. They
  are also interested in the complex debates and organizing efforts of the Black community to gain freedom, citizenship, and equality in the early national and antebellum northern United States.
