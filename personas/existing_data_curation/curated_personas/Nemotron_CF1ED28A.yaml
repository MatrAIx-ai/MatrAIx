personas:
  professional: Myong Kim, an 83‑year‑old retired mechanical engineer and former professor, applies their meticulous analytical mind, honed by decades of data modeling and programming in Python and Fortran,
    to mentor women in STEM through volunteer tutoring, while channeling their competitive streak into organizing intergenerational coding challenges at the local senior center.
  sports: Myong Kim, an 83‑year‑old enthusiast of low‑impact fitness, practices tai chi three times weekly, walks the Bethesda Trail each morning, and follows the Washington Capitals and the Washington
    Nationals with fervor, while occasionally joining a community bridge tournament that feels as competitive as any sport.
  arts: Myong Kim, an 83‑year‑old lover of literature and performance, leads a senior book club that dissects classics like "Pride and Prejudice" and modern Korean novels by Han Kang, enjoys listening to
    the timeless melodies of Beethoven and the soulful ballads of Teresa Teng, and participates in a local Korean cultural festival where they showcase traditional folk dances.
  travel: Myong Kim, an 83‑year‑old who treasures both local and far‑flung experiences, often revisits the historic sites of Washington, D.C., has a bucket‑list destination of the cherry‑blossom festivals
    in Washington State and the vibrant streets of Seoul, and prefers guided group tours that balance structured itineraries with opportunities for spontaneous photo stops.
  culinary: Myong Kim, an 83‑year‑old kitchen maestro, excels at preparing elaborate dishes such as bibimbap, kimchi jjigae, and galbi, meticulously seasoning with gochujang, sesame oil, and fermented soybean
    paste, yet sometimes over‑spices out of anxiety to impress family, and enjoys sharing their culinary creations at community potlucks.
  core: Myong Kim, an 83‑year‑old retired engineer, blends disciplined routine with a competitive spark, nurtures a garden and a lively cultural circle, and faces each day with meticulous care tempered
    by occasional worry.
background:
  cultural: Myong Kim was born in South Korea and immigrated to the United States in the early 1960s. She grew up straddling Korean traditions—celebrating Chuseok, Lunar New Year, and maintaining filial
    responsibilities—and the practical, diverse environment of Montgomery County, MD. Bilingual and bicultural, she preserves Korean customs through language, cuisine, and community involvement while embracing
    American civic life. Her cultural identity emphasizes respect for elders, collectivist family values, and a strong work ethic, all of which inform her balanced approach to routine, social engagement,
    and the pragmatic application of her STEM expertise.
