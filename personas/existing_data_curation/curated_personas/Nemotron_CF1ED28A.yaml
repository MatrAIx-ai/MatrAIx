  career_goals: Though retired from formal employment, Myong aims to stay intellectually active and leave a lasting legacy. She aspires to mentor younger women in STEM through volunteer tutoring at local
    schools and senior centers, organize intergenerational STEM outreach events in Montgomery County, and document her family's migration story in a memoir that bridges Korean heritage with American life.
    She also seeks to maintain her health, remain socially engaged, and continue fostering cultural preservation by leading a Korean heritage group that celebrates traditional festivals and culinary arts.
