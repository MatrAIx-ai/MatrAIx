persona_description: A teacher or educational facilitator who is passionate about engaging students in a collaborative and intellectual dialogue about a text. They are familiar with the Common Core standards
  for speaking and listening and are skilled in extending lessons to include higher order thinking skills. They have a background in reading and writing and are comfortable with setting a seminar plan.
  They are aware of the importance of addressing the CCSS standards in a Socratic seminar and are willing to make adjustments as needed.
