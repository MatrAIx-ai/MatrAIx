  hobbies: '[''Hiking in Wasatch Range'', ''Skiing'', ''Photography'', ''Reading mystery novels'', ''Cooking Mediterranean meals'', ''Gardening'', ''Yoga'', ''Playing acoustic guitar'', ''Volunteering for
    financial literacy workshops'', ''Traveling to national parks'']'
  career_goals: Santa aims to deepen her expertise in data‑driven investment strategies and earn the CFA charter within the next two years. Her short‑term goal is to step into a senior analyst role where
    she can lead larger portfolio projects and mentor junior staff. Long‑term, she aspires to become a portfolio manager and eventually a chief investment officer, overseeing a diversified fund that integrates
    sustainable investment criteria. While she is ambitious, she also values a balanced schedule that allows quality time with her family, so she seeks roles that offer flexible work arrangements and opportunities
    for remote analysis.
