personas:
  professional: John Sweat is a retired mechanical and civil engineer who spent three decades designing bridges and highways for West Virginia’s Department of Transportation, honing structural analysis,
    project management, and CAD expertise, and now channels that same curiosity‑driven pragmatism into mentoring middle‑school students, leading community garden projects, and crafting furniture, balancing
    meticulous planning with the flexibility required for volunteer work.
  sports: John Sweat is an avid hiker who leads the Kanawha River Trail Hiking Club, plays pickleball with peers at the senior center each Thursday, cheerfully follows the West Virginia Mountaineers football
    team on Saturdays, and occasionally watches the Charleston Dirty Birds minor‑league baseball games for a late‑summer pastime.
  arts: John Sweat is a baritone singer in the Charleston Community Theater choir, performing in productions like 'Oklahoma' and 'Carousel', while also regularly attending bluegrass festivals headlined
    by Bill Monroe, Rhonda Vincent, and The Del McCoury Band, allowing them to merge choral harmony with Appalachian string traditions.
  travel: John Sweat is a meticulous road‑tripper who has explored historic sites such as Harpers Ferry, the National Archives in Washington, D.C., and the Great Smoky Mountains National Park, and they
    are currently budgeting for a genealogy‑focused tour of the Scottish Highlands later this year, balancing adventure with careful financial planning.
  culinary: John Sweat is a proficient home cook who delights in slow‑cooked pork shoulder barbecue glazed with apple‑cider vinegar, garden‑fresh ratatouille featuring tomatoes, zucchini, and basil, and
    a beloved Appalachian apple crumble, often showcasing these dishes at the potluck gatherings they host for bridge club friends.
  core: John Sweat fuses an engineer’s analytical rigor with a gregarious, community‑oriented spirit, turning bridge designs into garden beds, vintage tools into heirloom furniture, and weekly bridge club
    chats into lifelong friendships.
background:
  cultural: John was raised in an Appalachian family in southern West Virginia, where values of self‑reliance, close family bonds, and mutual support were paramount. His upbringing emphasized storytelling,
    modesty, and a deep appreciation for the region's natural beauty. He grew up listening to bluegrass and old‑time music, participating in community fairs, and learning the importance of neighborly cooperation.
    While his education at West Virginia University expanded his scientific worldview, he continues to honor his heritage through local traditions, community involvement, and a lifelong curiosity that bridges
    his regional roots with his STEM background.
