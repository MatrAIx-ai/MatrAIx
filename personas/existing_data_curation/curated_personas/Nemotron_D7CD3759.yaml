  hobbies: '[''Bridge club'', ''Hiking on local trails'', ''Community theater choir'', ''Gardening'', ''Woodworking'', ''Genealogy research'', ''Volunteer STEM tutoring'', ''Bluegrass music festivals'',
    ''Cooking and potluck gatherings'', ''Oral history documentation'']'
  career_goals: Although retired, John remains driven to give back. He aims to establish a volunteer tutoring program for middle‑school students in math and physics, serve on the board of a local historical
    preservation society, and help design sustainable community garden projects. He also plans to record oral histories of Appalachian families, write a memoir about the evolution of West Virginia's infrastructure,
    and build a small greenhouse for his grandchildren to explore horticulture.
