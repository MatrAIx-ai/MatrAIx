  hobbies: '[''Latin dance (salsa, bachata)'', ''home cooking (Guatemalan and Southern cuisine)'', ''volunteering at food banks'', ''attending live music events (blues, soul)'', ''hiking in Shelby County
    parks'', ''language exchange (Spanish/English)'', ''photography of street food and cultural events'']'
  career_goals: Vivian aims to complete her associate degree in Hospitality Management, building on the curiosity she has for the restaurant industry while keeping her goals realistic and financially attainable.
    In the short term, she wants to become a kitchen assistant or line cook, applying the culinary basics she has already learned. Over the next five years, she aspires to move into a supervisory role such
    as restaurant manager or operations coordinator, where she can use her organizational skills to streamline operations and mentor staff. Long‑term, she dreams of opening a community‑focused coworking
    kitchen that offers affordable cooking classes and job‑training for other young immigrants, blending her compassion for others with her entrepreneurial drive.
