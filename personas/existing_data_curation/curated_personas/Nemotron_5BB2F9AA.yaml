personas:
  professional: Vivian Miranda, a 22‑year‑old dishwasher and associate‑degree student in Hospitality Management, channels her organized, methodical nature and bilingual fluency into keeping kitchen operations
    spotless, training new staff with friendly assertiveness, and mapping out future steps toward a supervisory role and eventually a community‑focused coworking kitchen.
  sports: Vivian Miranda stays active by attending salsa and bachata dance classes twice weekly, plays recreational soccer with a multicultural community league at Shelby Farms, follows the Memphis Grizzlies
    for basketball season, and uses weekend hikes around Shelby Farms Park as a calming counterbalance to her busy schedule.
  arts: Vivian Miranda immerses herself in Memphis’s vibrant music scene, regularly sipping bourbon at B.B. King’s Blues Club while listening to classic blues legends like B.B. King and soul icons such
    as Aretha Franklin, and channels her love of rhythm into expressive Latin dance performances, often inspired by the choreography of Marc Anthony and the choreography videos of popular TikTok dance creators.
  travel: Vivian Miranda has explored the colonial streets of Antigua during a study‑abroad program, savored street tacos and mole in Oaxaca, Mexico, dreams of a weekend road trip to New Orleans to soak
    in jazz and Cajun cuisine, yet balances these aspirations with a student budget, relying on flight deals and car‑pooling with friends to keep travel affordable.
  culinary: Vivian Miranda enjoys cooking pepian, kakʼik, and tamales at home, blending the smoky heat of chipotle with Southern barbecue techniques, experimenting with corn masa dough for fresh tortillas,
    and frequently holds informal cooking workshops at the food bank where she volunteers, showcasing her intermediate culinary skill and love for sharing flavors.
  core: Vivian Miranda is an organized, socially‑driven 22‑year‑old who balances curiosity with practicality, dancing through life with salsa steps, a disciplined budget, and a heartfelt mission to empower
    her community through food and hospitality.
background:
  cultural: Vivian’s family hails from the highlands of Guatemala, where they maintained close-knit traditions centered around family meals, Catholic holidays, and community celebrations. Growing up, she
    learned to speak Spanish at home and helped prepare dishes such as pepian, kakʼik, and tamales, which fostered a strong connection to her heritage. After emigrating to the United States, her family
    settled in Memphis, where they joined a vibrant diaspora network that celebrates Día de los Muertos, Guatemalan Independence Day, and regional festivals. These cultural ties shape Vivian’s worldview,
    influencing her culinary interests, bilingual communication, and desire to give back to both the Guatemalan community and the broader Memphis population.
attributes:
