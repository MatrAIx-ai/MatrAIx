persona_description: A distinguished psychologist who made significant contributions to the field of psychology during the second World War and after, and who continued to influence the field long after
  his retirement. Known for his ability to maintain a spirit of non-competitiveness among graduate students and faculty members, and for his ability to guide the department into a new era with expanded
  research specialities and a new building. His research interests include vision, optics, and the design of controls for field artillery sights, as well as research on radar operators and brain waves.
  After his retirement, he was succeeded by Schlosberg and continued to influence the field through his teaching and mentoring of young faculty members.
