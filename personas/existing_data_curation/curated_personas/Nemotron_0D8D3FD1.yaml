  hobbies: '[''Gardening (vegetable and flower)'', ''Reading historical fiction and biographies'', ''Crossword puzzles and Sudoku'', ''Walking local nature trails'', ''Birdwatching'', ''Bridge (small group)'',
    ''Volunteer tutoring at community college'', ''Cooking comfort meals'']'
  career_goals: Karen aims to secure a senior advisory role within her firm, eventually becoming a partner or establishing her own boutique practice focused on retirees in the Midwest. She plans to earn
    the Certified Financial Planner (CFP) designation, expand her expertise in sustainable investing, and build a reputation as a trusted, results‑driven advisor. At the same time, she seeks to reduce the
    high‑pressure aspects of her work, creating a more balanced schedule that allows her to serve clients while managing her own stress. Mentoring younger advisors, especially women, and contributing to
    community financial‑literacy programs are also important long‑term goals.
