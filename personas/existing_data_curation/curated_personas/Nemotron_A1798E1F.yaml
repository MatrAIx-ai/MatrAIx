  career_goals: Donald’s career ambition is to transition from senior software developer to an engineering leadership role, such as Lead Architect or Engineering Manager, where he can drive technical strategy
    while upholding the high-quality standards he values. He seeks to own the design of large-scale, mission-critical platforms that balance cutting-edge innovation with proven reliability, positioning
    his team as top performers within the company. In the next five years, he aims to earn AWS Solutions Architect Professional and PMP certifications, mentor junior engineers, and contribute to open-source
    projects that align with his pragmatic curiosity. Ultimately, Donald envisions founding a technology consultancy that helps midsize enterprises adopt scalable cloud solutions, allowing him to blend
    his competitive drive with a tangible impact on the broader business community.
