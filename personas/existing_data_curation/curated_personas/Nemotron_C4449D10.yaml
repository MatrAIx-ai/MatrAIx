personas:
  professional: Billy Hawkins is an aspiring young multimedia creator, blending sketching, watercolors, and Scratch animation to explore storytelling, while their curiosity drives them to experiment with
    LEGO mechanisms and fosters an organized yet flexible working style that balances solo projects and collaborative club work.
  sports: Billy Hawkins loves shooting hoops in pickup games at the neighborhood park, cheering for the local Eastwood Raptors youth basketball team while also playing soccer with the Maple Creek Soccer
    Club in the fall and joining a seasonal swimming class at the community pool, balancing competitive spirit with a laid‑back love of the game.
  arts: Billy Hawkins immerses themselves in graphic novels by Neil Gaiman, Studio Ghibli‑inspired artwork, and indie and classic rock by Arctic Monkeys and The Beatles, channeling this passion into watercolors
    of fantasy landscapes, LEGO sculptures, and simple Scratch animations influenced by animators Hayao Miyazaki and comic artist Jim Lee.
  travel: Billy Hawkins enjoys weekend family trips to the nearby state park for birdwatching, annual visits to the National Air and Space Museum in Washington, D.C., and dreams of camping under the stars
    in the Grand Canyon, planning outings with a mix of meticulous map work and spontaneous curiosity.
  culinary: Billy Hawkins favors pepperoni pizza, homemade spaghetti carbonara, and blueberry pancakes, often whipping up simple snacks like cheese quesadillas using their budding kitchen skills, while
    occasionally snacking on chips while working on Scratch projects and forgetting to eat a balanced lunch during extended LEGO sessions.
  core: Billy Hawkins is a curious, art‑driven eleven‑year‑old who balances LEGO engineering, sketching, and basketball with a love of indie rock, occasionally forgetting chores and meals but always chasing
    the next creative spark.
background:
  cultural: Billy comes from a white, Midwestern family with deep roots in Saginaw, Michigan. His community values hard work, modesty, and neighborly support, shaped by the region's manufacturing heritage
    and the Great Lakes environment. He attends a public middle school, participates in local events like the county fair and community art workshops, and occasionally joins church youth activities, reflecting
    the area's blend of secular and faith‑based traditions. Exposure to the Saginaw Art Museum, local library programs, and the diverse cultural tapestry of the city—stemming from waves of immigrant influences—has
    broadened his appreciation for varied artistic expressions and reinforced his curiosity about the world.
