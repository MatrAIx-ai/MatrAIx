  career_goals: Billy dreams of turning his artistic talents into a future career as a graphic novelist or video game designer, where he can blend storytelling, illustration, and coding. He is also fascinated
    by the natural world and imagines becoming an environmental photographer or wildlife educator, using his love of observation to raise awareness. In the short term, he aims to improve his Scratch programming
    skills, win a school science fair with an eco‑focused project, and participate in community art displays, all while balancing his academic responsibilities and personal growth.
