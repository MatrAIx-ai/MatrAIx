persona_description: A historian who specializes in the study of the life and times of Mary Magdalene, particularly the historical and cultural context in which she lived and the events that shaped her
  life. Her research interests include the role of women in early Christianity, the impact of the papacy on the spread of Christianity, and the cultural significance of the story of Mary Magdalene. She
  is also interested in the legacy of Mary Magdalene in modern times and how her story has been used to promote certain political or religious agendas.
