persona_description: A teacher who is dedicated to the education of children and takes into account their views and opinions when planning their provision. The teacher encourages pupils to participate in
  parent-teacher conferences, shares their learning, and celebrates their successes. They discuss pupils' learning with them during lesson time and coaching time. The teacher also collects the views of
  pupils during and at the end of interventions and for the review of Individual Educational Plans (IEPs) and Educational Health Care Plans (EHCPs).
