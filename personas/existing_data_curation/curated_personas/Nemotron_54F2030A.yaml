  hobbies: '[''Backyard gardening (tomatoes, chilies, marigolds)'',''Watercolor painting'',''Collecting Mexican folk pottery and textiles'',''Reading historical biographies and art history'',''Listening
    to classical guitar and Mexican sones'',''Quiet walking in local parks'',''Volunteering as a bilingual story reader for children'']'
  career_goals: Although retired from formal employment, Alejandro aims to deepen his knowledge of contemporary and avant‑garde art through evening courses at a local community college and occasional museum
    workshops. He hopes to become a volunteer docent at the Bowers Museum, offering bilingual tours focused on Mexican and Latin American collections. Another personal ambition is to compile a written memoir
    that weaves together family histories, cultural traditions, and his reflections on art, which he plans to share with his grandchildren and the broader community. Alejandro also dreams of establishing
    a modest community garden where seniors can grow vegetables, fostering quiet social interaction while promoting healthy food habits. Finally, he wishes to preserve and donate a collection of family‑handcrafted
    folk art pieces to a cultural center in Orange County, ensuring his heritage is celebrated for future generations.
