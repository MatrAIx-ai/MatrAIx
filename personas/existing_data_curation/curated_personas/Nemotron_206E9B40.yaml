    (Agile, ITIL foundations)'', ''User training and technical support'', ''Public speaking and technical presentations'', ''Vendor and contract management'']'
  hobbies: '[''Community theater improv'', ''Hiking and nature photography'', ''Teaching basic computer skills to seniors'', ''Board games and puzzles'', ''Gardening (vegetable and herb garden)'', ''Cooking
    and exploring Midwestern cuisine'']'
  career_goals: Looking ahead, Lorna aims to transition into a senior network architect role, where she can shape the strategic direction of an organization’s IT infrastructure while maintaining the disciplined,
    process‑driven environment she values. She plans to earn advanced certifications such as CCNP and AWS Certified Solutions Architect to broaden her expertise in cloud‑enabled networking. Lorna also aspires
    to lead a small IT team at a regional organization, mentoring emerging talent and championing inclusive practices, especially encouraging more women to enter the tech field. In the longer term, she
    envisions establishing a consulting practice that helps rural businesses in northern Wisconsin adopt reliable, secure network solutions.
