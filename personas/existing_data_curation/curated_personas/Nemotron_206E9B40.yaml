personas:
  professional: Lorna Alexander is an experienced network engineer who leverages her Cisco and virtualization expertise to design resilient enterprise infrastructures, while her improv background fuels
    engaging training sessions and collaborative design workshops, positioning her to step into a senior network architect role and lead a diverse IT team.
  sports: Lorna Alexander is an avid hiker who tackles the North Woods trails each weekend, joins a local cross-country skiing club in winter, and cheered the Green Bay Packers throughout the season, while
    also playing strategy board games like Azul with her community group as a low-key fitness outlet.
  arts: Lorna Alexander thrives on stage with the Northwoods Improv Troupe, crafting spontaneous scenes that draw on her quick wit, while offstage she curates a personal photography collection inspired
    by Ansel Adams and enjoys listening to Bon Iver and watching the latest productions at the Milwaukee Repertory Theater.
  travel: Lorna Alexander prefers meticulously planned weekend road trips, often heading to Door County's lighthouse trail or the Apostle Islands for photo expeditions, yet she dreams of hiking the glaciers
    of Patagonia and exploring the historic villages of Scotland, balancing her love for adventure with the budget constraints of a single-income household.
  culinary: Lorna Alexander delights in preparing classic Midwestern fare such as cheese-curd-laden fish fry, pork tenderloin with apple chutney, and a hearty beet and carrot soup harvested from her garden,
    and she experiments with fresh herbs like dill and thyme to elevate family potlucks while still relying on simple, comforting flavors.
  core: Lorna Alexander blends methodical network design with spontaneous improv, turning meticulous documentation into lively workshops while championing women in tech and nurturing a thriving garden and
    hiking habit.
background:
  cultural: Lorna was raised in a small town near Cable, Wisconsin, in a family with German and Finnish roots, reflecting the broader cultural mosaic of Bayfield County. Growing up in a close‑knit Lutheran
    community, she internalized Midwestern values of hard work, modesty, and a strong sense of civic responsibility. She regularly participates in regional traditions such as the Bayfield County Fair, local
    fish‑fry gatherings, and Finnish‑style sauna events. This heritage fosters her appreciation for community involvement, seasonal outdoor activities, and the simple pleasures of regional cuisine and folklore,
    all of which shape her identity and daily life.
attributes:
  skills: '[''Network design and architecture'', ''Cisco routing and switching (CCNA/CCNP)'', ''Firewall configuration and management (Palo Alto, Fortinet)'', ''Server administration (Windows Server, Linux)'',
