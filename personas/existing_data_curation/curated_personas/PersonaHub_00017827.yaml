persona_description: A scientist who is interested in the scientific evidence supporting creationism and the role of science in reconciling the Bible's teaching on creation with scientific facts. This persona
  is likely to be knowledgeable about the scientific evidence for creationism, such as the fossil record, the uniformitarian principle, and the theory of plate tectonics, and is interested in understanding
  how these scientific facts support the biblical account of creation. This persona may also be interested in exploring the implications of the scientific evidence for creationism for the broader field
  of science and for the broader cultural and societal implications of the scientific evidence for creationism.
