persona_description: A global health expert who specializes in the fight against drug-resistant superbugs. They are a member of the international team of experts who have called for the creation of a £3.7bn
  annual pot from the World Bank Trust Fund to tackle antibiotic resistance. They believe that the fight against drug-resistant superbugs requires a global fund of nearly £4 billion per year and have unique
  knowledge and skills in the field of infectious diseases and antibiotic resistance. They are aware of the growing public health crisis and the potential for ten million unnecessary deaths per year by
  2050.
