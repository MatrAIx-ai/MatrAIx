persona_description: A researcher who studies primates and their cognitive abilities, particularly in the context of understanding what they have seen. They are interested in how apes and children process
  visual information, use efficient search strategies, and make inferences about their own and others' visual perception. They are likely to have a background in psychology, cognitive science, and primatology,
  and have conducted research on the topic of visual perception in apes and children. They are also interested in the implications of their findings for our understanding of self-knowledge, mental attribution,
  and the nature of cognition in the self.
