personas:
  professional: Fernando Delgado is an aspiring civil engineer who channels his love for LEGO bridges, Minecraft skyscrapers, and robotics club projects into meticulous, step‑by‑step design work; they leverage
    their organized, methodical nature and preference for structure to plan and execute small‑scale engineering challenges at school and home.
  sports: Fernando Delgado plays pick‑up soccer with the Alamo United Youth Soccer Club, idolizes the San Antonio FC forwards, follows the San Antonio Spurs for NBA inspiration, and they apply their organized,
    collaborative mindset to their small‑sided games, always planning passes ahead while maintaining a calm, stress‑resistant demeanor on the field.
  arts: Fernando Delgado immerses themselves in the rhythmic guitar of Carlos Santana, the classic ballads of Luis Miguel, and the vivid brushstrokes of Frida Kahlo; they often recreate iconic motifs in
    LEGO dioramas and draw sketches inspired by these works, which fuels their sense of cultural pride and artistic curiosity.
  travel: Fernando Delgado prefers carefully planned weekend trips, having explored the San Antonio River Walk, the historic streets of Guanajuato, and the Grand Canyon, and they dream of attending a robotics
    conference in Tokyo, balancing their love for cultural immersion with a modest family budget.
  culinary: Fernando Delgado enjoys helping craft homemade tacos with seasoned carne asada, tangy salsa verde, and fresh guacamole made from ripe avocados, lime, and cilantro, and they proudly prepare simple
    quesadillas and chocolate chip cookies, showcasing a budding kitchen confidence that blends traditional flavors with their own experimental twists.
  core: Fernando Delgado is a methodical 11‑year‑old builder who balances LEGO engineering, soccer teamwork, and disciplined budgeting, and they occasionally forget their inhaler during spontaneous games.
background:
  cultural: Fernando is a Mexican‑American raised in Alamo, Texas, where his family maintains strong ties to Mexican traditions and the vibrant culture of the Rio Grande Valley. He speaks Spanish at home
    and celebrates holidays such as Día de los Muertos and Mexican Independence Day with family gatherings, traditional foods, and music. His upbringing blends Catholic values with community‑centric customs,
    fostering respect for elders and close family bonds. The border region’s mix of Texan and Mexican influences shapes his everyday life, from the food he enjoys to the bilingual environment at school,
    and informs his desire to contribute to the well‑being of his hometown.
