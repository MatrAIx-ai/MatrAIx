  career_goals: Fernando aspires to become a civil engineer who designs safe, sustainable infrastructure for his hometown of Alamo and the broader Rio Grande Valley. He is motivated by the idea of creating
    predictable, well‑planned solutions such as flood‑ mitigation systems and community parks. His goal reflects his love for structure, practical problem‑solving, and a desire to give back to the community
    that supported his family. He also dreams of participating in robotics competitions in high school, which could serve as a stepping stone toward his engineering career.
