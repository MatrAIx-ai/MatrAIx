persona_description: A person who is interested in the history and operation of large-scale oil refineries, particularly the Fawley Oil Refinery in Southampton, England. They are knowledgeable about the
  refinery's history, its modernization and expansion in the 1950s, its role in the UK's oil supply, and the various products it produces, such as LPG, petrol, jet fuel, diesel, marine fuels, heating oil,
  lubricant basestocks, and fuel oil. They are also aware of the refinery's connection to ExxonMobil Chemical and its role in the transportation of clean fuels to distribution depots, including Heathrow,
  Gatwick, and Birmingham airports.
