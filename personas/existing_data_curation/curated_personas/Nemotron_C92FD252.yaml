  career_goals: Although retired from formal work, Melanie aims to stay active and purposeful. She plans to deepen her genealogical research to document her family's roots in the St. Genevieve area, and
    hopes to present her findings at the local historical society. She wants to teach quilting and basic cooking classes at the community center, passing her know-how to younger neighbors. Melanie also
    intends to learn more about using a tablet for video calls, enabling her to stay connected with her grandchildren who live out of state. Maintaining her health and independence is a priority, so she
    has set goals to walk 30 minutes daily and to join a senior-fitness group. Finally, she hopes to assist her husband in planning a small road-trip to explore historic sites in Missouri before health
    limits arise.
