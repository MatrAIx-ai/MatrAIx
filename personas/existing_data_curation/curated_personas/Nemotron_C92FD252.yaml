personas:
  professional: Melanie Hatu, a retired caregiver and community organizer, channels her decades of home‑maintenance know‑how, horticultural expertise, and quilting skill into teaching practical classes
    at the local senior center, where they combine methodical planning with a spontaneous love for sharing new online tips.
  sports: Melanie Hatu, an avid follower of the St. Louis Cardinals, joins the town’s senior walking club for 30‑minute river‑trail strolls and participates in weekly chair‑yoga at the community center,
    blending light cardio with low‑impact strength work.
  arts: Melanie Hatu, a quilter who weaves historic patterns into blankets, enjoys listening to John Prine’s folk storytelling and Erik Satie’s piano pieces, often quoting Margaret Mitchell, and attends
    the local theater’s productions of Tennessee Williams dramas.
  travel: Melanie Hatu, eager for gentle exploration, plans a modest road‑trip through Missouri’s river towns, including a weekend stop at the Jefferson City State Capitol, a guided tour of Meramec Caverns,
    and a visit to Hermann’s wineries, all paced to accommodate their husband’s health limits and their own comfort.
  culinary: Melanie Hatu, a seasoned home‑cook, perfects buttery cornbread and chicken pot pie while experimenting with Cajun‑inspired jambalaya seasoned with a pinch of za’atar and a spicy ginger‑infused
    carrot soup using heirloom carrots from their garden, reflecting a love of blending familiar comfort with discovered flavors.
  core: Melanie Hatu, a 76‑year‑old garden‑loving quilt‑maker, balances practical frugality with curiosity for new flavors and histories, staying active through gentle walks, community teaching, and careful
    health management, while occasionally indulging in exotic seeds.
background:
  cultural: Melanie was born and raised in rural Missouri and identifies with the Midwestern white American cultural tradition. Her family has deep roots in Ste. Genevieve, a town known for its French-colonial
    history; she grew up hearing stories about the early settlers and participating in annual French heritage celebrations. The community's close-knit, church-centered lifestyle shaped her values of self-reliance,
    hospitality, and civic responsibility. While she predominantly speaks English, she has a fond appreciation for the French influence evident in local architecture, cuisine, and festivals, which she incorporates
    into her own cooking and craft projects. Her cultural background blends the modest, practical sensibilities of the American heartland with an affection for preserving the unique heritage of her hometown.
