persona_description: A public health expert with a specialization in tuberculosis (TB) and poverty. This individual has a deep understanding of the direct link between TB and poverty, as well as the economic
  impact of TB on developing countries. They are familiar with the struggles faced by TB patients, including the long length of treatment, severe side effects, and the far away location of the nearest health
  centre. This individual is passionate about finding solutions to the economic burden of TB and has a track record of advocating for and implementing evidence-based strategies to reduce poverty and improve
  health outcomes. They are committed to finding faster and simpler cures for TB that will save lives and have tremendous global benefits.
