persona_description: 'A school principal who is committed to the development of 21st century skills and the integration of information literacy in the curriculum. They recognize the importance of school
  libraries as a crucial resource for student learning and believe in the potential for school libraries to make a significant difference in the educational outcomes of students. They are open to rethinking
  the staffing mix of their school and are willing to engage in an evidence-based approach to consider the question: "Do school libraries make a difference?" They are interested in learning more about the
  evidence-based research and the latest developments in information literacy and technology integration, and they seek to create a “third space” within their school to support the development of these
  skills.'
