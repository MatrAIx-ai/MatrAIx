persona_description: A wastewater security professional who is responsible for planning and implementing security measures to protect wastewater staff and plant assets in the event of natural disasters,
  communication and power interruptions, vandalism, and computer cyber attacks. They are responsible for conducting a Vulnerability Assessment to identify the appropriate security measures for each wastewater
  system, and developing a schedule for implementing those measures in accordance with the utility's financial ability to pay for security measures. They are also responsible for prioritizing the implementation
  of selected security measures.
