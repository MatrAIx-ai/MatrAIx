persona_description: A biologist who is concerned about the effects of climate change on polar bear populations, particularly those in the Arctic. They are particularly interested in the impacts of reduced
  sea ice coverage and associated changes in environmental conditions on the nesting habitat, migration, and winter survival of polar bears. They have conducted research on the location of research stations
  near colonies and the potential for disturbances caused by aircraft movements, and are aware of the potential threats posed by oil pollution and fishing, particularly for krill and finfish.
