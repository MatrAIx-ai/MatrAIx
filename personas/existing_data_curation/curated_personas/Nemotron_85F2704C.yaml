personas:
  professional: Songia Asberry is an aspiring community art facilitator and peer counselor who combines oil painting, watercolor illustration, and handmade jewelry with empathic listening to run low‑pressure
    workshops at the local center, allowing their spontaneous, imaginative spirit to shape curricula while they occasionally wrestle with deadlines due to a relaxed approach to structure.
  sports: Songia Asberry stays active through leisurely park walks, a weekly beginner yoga class at the community center, and occasional pick‑up basketball games where they cheer for the hometown City Hawks,
    preferring low‑stress, community‑oriented activities over rigorous training schedules.
  arts: Songia Asberry releases their boundless imagination onto abstract canvases, crafts silver‑tone jewelry, writes nature‑inspired poetry shared at intimate book clubs, draws literary inspiration from
    Octavia Butler and Ursula K. Le Guin, and unwinds to the timeless sounds of Miles Davis and Bill Evans.
  travel: Songia Asberry favors spontaneous, low‑key travel, taking weekend road trips to nearby historic towns, an annual pilgrimage to the misty Blue Ridge Mountains, and dreaming of an artistic retreat
    in the Provençal villages of southern France, all balanced by a modest budget and limited family obligations.
  culinary: Songia Asberry delights in soulful kitchen experiments, frequently preparing hearty greens braised with smoked turkey, sweet‑potato pie, and fresh garden‑herb‑infused marinades, while they sometimes
    over‑season dishes in the heat of creative flow and indulge in late‑night snack runs after long painting sessions.
  core: Songia Asberry is a quietly inventive soul who weaves art, empathy, and garden‑fresh flavors into a low‑key life, navigating a tendency toward worry with spontaneous bursts of creative joy.
background:
  cultural: Songia is an African‑American woman whose upbringing in a close‑knit Black community in New Jersey infused her with rich cultural traditions. Family gatherings, church activities, and storytelling
    evenings nurtured her love for music, food, and oral history. She draws inspiration from the broader Black diaspora, integrating rhythmic influences from jazz, gospel, and Caribbean sounds into her
    creative work. Her identity is rooted in resilience, communal solidarity, and a reverence for ancestral artistic expressions, all of which shape her outlook and daily life in Browns Mills.
