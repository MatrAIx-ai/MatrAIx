  career_goals: Songia hopes to transform her passions into a modest, low‑pressure venture that benefits her community. She aims to secure a part‑time role as a volunteer art instructor at the local community
    center, develop a small home studio to sell her paintings and jewelry, and pursue a certificate in art‑therapy or counseling to formalize her supportive work. Ultimately, she wants to build a legacy
    of creative expression and healing that nurtures the next generation while maintaining a balanced, stress‑aware lifestyle.
