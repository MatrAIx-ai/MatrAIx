personas:
  professional: Jennifer Beadle is a seasoned audiovisual technician and emerging project manager whose CTS‑certified expertise in networked AV, IP streaming, and immersive media is coupled with a talkative,
    workshop‑leading style that turns technical briefings into lively, collaborative sessions.
  sports: Jennifer Beadle waters down stress with weekend yoga sessions at local studios, participates in a co‑ed intramural softball league, rallies with friends to watch the New York Knicks and New York
    Yankees, and joins the Harlem Run Club for early‑morning runs in Central Park during summer.
  arts: Jennifer Beadle curates a vibrant personal art calendar that mixes underground hip‑hop showcases by local emcees like A$AP Mob, intimate performances by jazz virtuoso Kamasi Washington, and community
    theater productions featuring emerging playwrights, while also documenting neighborhood events in short video blogs inspired by the editing style of Bryan Fuller.
  travel: Jennifer Beadle plans trips with a blend of cultural immersion and audio‑tech curiosity, having explored the street art of Berlin, the vinyl markets of Tokyo, and the jazz districts of New Orleans,
    while dreaming of a weekend retreat to the Catskill Mountains for an off‑grid recording session.
  culinary: Jennifer Beadle enjoys cooking soulful dishes like chicken‑and‑waffles with hot‑sauce drizzle, collard greens sautéed in smoked ham hocks, and homemade mac and cheese, often pairing them with
    craft beers or a curated playlist of vintage funk while hosting game nights that feature homemade nachos and artisanal cheese boards.
  core: Jennifer Beadle is a sociable AV guru who juggles a love for vintage vinyl, community tech mentorship, and yoga, yet sometimes forgets to pay utility bills on time when caught up in a new recording
    project.
background:
  cultural: Jennifer grew up in the Bronx, a borough renowned for its vibrant African‑American and Caribbean heritage, where the rhythms of hip‑hop, gospel, and salsa shaped her upbringing. Her family roots
    trace back to the Southern United States, with deep connections to church, community activism, and family gatherings centered around soulful food and music. The multicultural tapestry of the Bronx exposed
    her to a rich blend of artistic expression—from the iconic murals on Grand Concourse to annual festivals celebrating Black and Latino histories. This environment fostered her appreciation for collaborative
    art, storytelling, and community resilience, influencing both her personal values and professional drive to support local creative initiatives.
attributes:
  skills: '[''AV system installation'', ''Audio‑visual troubleshooting'', ''Signal routing and wiring'', ''Networked AV (Dante, NDI)'', ''Live event production'', ''Lighting control (DMX)'', ''Client communication'',
    ''Project coordination'', ''Technical training and mentorship'', ''Hardware repair and maintenance'', ''Familiarity with industry standards (SMPTE, AES)'']'
  hobbies: '[''Attending live concerts and hip‑hop shows'', ''Exploring street art and museums in NYC'', ''DIY video blogging and short film editing'', ''DJing at community events'', ''Collecting vintage
    vinyl records'', ''Yoga and mindfulness practice'', ''Volunteering with youth STEAM workshops'', ''Participating in local AV tech meetups'', ''Cooking soul food and experimenting with recipes'', ''Hosting
    game nights and social gatherings'']'
  career_goals: Jennifer aims to advance into a senior project management role within the audiovisual industry, overseeing large‑scale installations for cultural venues and corporate campuses. She plans
    to obtain advanced CTS certifications (CTS‑D, CTS‑I) and specialize in network‑based AV and immersive media. Over the next five years, she hopes to launch her own boutique AV consulting firm that partners
    with local artists and community organizations in the Bronx, providing technical support for performances, festivals, and multimedia art installations. She also aspires to become a certified trainer,
    sharing her knowledge with emerging technicians and mentoring young people from underrepresented backgrounds who are interested in STEAM careers.
