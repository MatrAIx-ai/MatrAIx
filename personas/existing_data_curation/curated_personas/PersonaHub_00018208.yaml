persona_description: A researcher or planner who is interested in the implementation and success of Transit-Oriented Development (TOD) in low-density suburbs, and how attitudes and self-selection processes
  can affect the implementation of TODs. They are likely to be familiar with the principles of TOD and the challenges of implementing it in low-density neighbourhoods, and are interested in understanding
  how attitudes and self-selection can influence the success rate of TODs. They may have experience in urban planning, transportation studies, or environmental sustainability, and are looking for insights
  into how attitudes can impact the implementation of TODs in real-world settings.
