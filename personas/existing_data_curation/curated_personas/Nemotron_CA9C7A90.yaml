  hobbies: '[''Sketching manga and comic art'', ''Playing chess (online and club)'', ''Building and programming LEGO Mindstorms robots'', ''Strategic video gaming (puzzle and simulation games)'', ''Cooking
    Vietnamese family recipes'', ''Reading speculative fiction'', ''Listening to synth-wave music while drawing'']'
  career_goals: Thien aspires to merge his passion for art and technology. In the short term, he aims to earn a spot in Gwinnett County’s magnet programs for STEM and visual arts, win a regional robotics
    competition, and build a portfolio of game prototypes. Long term, he envisions studying computer science and interactive media at a top university, then working as a game designer or UI/UX developer
    where he can create immersive experiences that support creative learning and mental well‑being. He also hopes to leverage his bilingual background to incorporate culturally diverse narratives into his
    projects.
