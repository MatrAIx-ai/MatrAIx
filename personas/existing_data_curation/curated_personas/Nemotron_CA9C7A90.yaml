personas:
  professional: Thien Nguyen is a budding robotics hobbyist who fuses strategic chess thinking with creative sketching, building and programming LEGO Mindstorms bots that double as moving comic‑strip characters,
    and dreams of designing interactive educational toys that teach problem‑solving.
  sports: Thien Nguyen follows the school soccer team, plays midfield for a local club, cheers for Manchester City, supports the Los Angeles Lakers, and prefers quick, tactical drills that echo their love
    of chess strategy.
  arts: Thien Nguyen spends afternoons sketching anime heroes, studies the line work of Studio Ghibli’s Hayao Miyazaki, listens to synth‑wave artists like Kavinsky while drawing, and contributes original
    comic strips to the school’s art zine.
  travel: Thien Nguyen dreams of attending the Tokyo Comic Con to meet manga creators, has already visited the coastal hometown of their grandparents for a family reunion, and saves up to explore the interactive
    science exhibits at the Exploratorium in San Francisco.
  culinary: Thien Nguyen helps the family simmer phở broth with star anise and basil, rolls gỏi cuốn using rice paper, shrimp, and fresh mint, and experiments with adding sriracha to noodle bowls, though
    they sometimes over‑season in pursuit of the perfect umami balance.
  core: Thien Nguyen is a curious, competitively‑driven teen who channels strategic chess tactics into robotics, art, and gaming while wrestling with anxiety‑fuelled perfectionism and a relentless quest
    for creative mastery.
background:
  cultural: Thien is a second‑generation Vietnamese‑American. His parents immigrated from Vietnam to the Atlanta metropolitan area and have kept many cultural traditions alive at home, such as speaking
    Vietnamese, celebrating Tết, and cooking traditional dishes. Growing up in Lawrenceville, a diverse suburb of Gwinnett County, he is part of a vibrant Asian‑American community where cultural events,
    language schools, and community gatherings are common. The family places strong emphasis on education and respect for elders, values that shape his disciplined approach to schoolwork. At the same time,
    Thien navigates a bicultural identity, blending his heritage with mainstream American teenage life—participating in school clubs, enjoying local sports, and engaging with friends from various backgrounds.
    This blend of cultures informs his interest in creating art that bridges Eastern and Western storytelling.
