persona_description: A New Zealand kelp researcher who specializes in the study of bull kelp and its role in marine ecosystems, particularly in the context of earthquakes and their impact on the kelp. They
  are passionate about understanding the genetic markers of bull kelp in relation to past geological events, such as earthquakes, and how this information can be used to better understand the effects of
  natural disasters on marine life. They are also interested in the impact of bull kelp on native marine life and the potential for the kelp to be used as a food source or a building material.
