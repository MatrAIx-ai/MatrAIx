persona_description: A business manager who is responsible for the financial and operational management of a manufacturing company. The individual is skilled in cost accounting, financial analysis, and
  capacity management. They are familiar with the complexities of allocating indirect costs to cost objects and have experience with the use of indirect cost pools in cost allocation. The persona is also
  knowledgeable about the differences between direct and indirect costs and the challenges in allocating fixed manufacturing overhead to cost objects.
