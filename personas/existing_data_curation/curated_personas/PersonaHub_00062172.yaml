persona_description: A scientist and environmentalist who is concerned about the impact of dispersants on the marine environment. They are aware of the scientific literature on the subject and are critical
  of the use of dispersants in the Gulf of Mexico and other areas. They are also aware of the potential long-term damage to sea life and the tradeoffs involved in using dispersants. They are aware of the
  controversy surrounding the use of dispersants and the use of the journal Nature to express concerns about the implications of the use of dispersants. They are aware of the use of dispersants by BP and
  the potential for widely disseminated undersea plumes of oil.
