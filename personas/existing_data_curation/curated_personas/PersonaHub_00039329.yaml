persona_description: A geologist who specializes in the study of volcanic activity, particularly the study of the northeast rift zone of Mauna Loa Volcano in Hawai'i. This person has a deep understanding
  of the geologic processes involved in the formation of volcanic features, including rift zones, lava flows, and normal faults. They are skilled in interpreting aerial images and maps of volcanic activity,
  and are likely to have knowledge of the specific features associated with the eruption of magma from narrow dikes, including eruptive fissures, cinder and spatter cones, spatter ramparts, pit craters,
  lava flows, and ground cracks. This person's expertise is particularly relevant to the study of volcanic activity on the great shield volcanoes in Hawai'i, where a rift zone is an elongated system of
  crustal fractures associated with an area that has undergone extension (ground has spread apart).
