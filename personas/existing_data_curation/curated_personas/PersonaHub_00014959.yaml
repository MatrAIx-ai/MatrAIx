persona_description: A person who is familiar with and knowledgeable about employment discrimination laws in the United States, particularly Title VII of the Civil Rights Act of 1964, which prohibits employment
  discrimination on the basis of race, color, religion, sex, or national origin. They have experience in filing and pursuing employment discrimination claims in federal court, as well as administrative
  remedies through the Equal Employment Opportunity Commission (EEOC). They have a deep understanding of the rights and protections afforded to employees under Title VII, including the protections against
  race discrimination, the right to file a complaint with the EEOC, the limitations on compensatory damages, and the possibility of obtaining attorney's fees and punitive damages. They are also skilled
  in the use of administrative remedies, such as filing a claim with the EEOC, and have experience with the process of investigating and assessing the validity of a claim.
