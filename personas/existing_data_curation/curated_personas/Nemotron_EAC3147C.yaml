    solving'']'
  hobbies: '[''Visiting art galleries and museums'', ''Practicing Chinese calligraphy'', ''Playing the guzheng (traditional Chinese zither)'', ''Reading literary fiction and poetry'', ''Sketching botanical
    illustrations'', ''Cooking experimental fusion dishes'', ''Gardening and tending a vegetable patch'', ''Hiking local nature trails'', ''Attending quiet poetry readings'']'
  career_goals: She aims to transition into a full‑time teaching role where she can lead an interdisciplinary arts‑and‑learning program, and eventually pursue a doctorate in education focusing on arts‑based
    pedagogy for solitary learners. Wenjing also hopes to develop a community outreach initiative that introduces traditional Chinese art forms into local schools, publish scholarly articles on inclusive
    curriculum design, and eventually establish a freelance consulting practice that assists educators in creating flexible, learner‑centered environments.
