personas:
  professional: Wenjing Kuang, a 43‑year‑old educator who blends visual arts and technology into curriculum design, uses their fluency in Mandarin and English along with Canvas and Moodle expertise to craft
    low‑stress, learner‑centered modules that empower introverted students while embracing unconventional ideas.
  sports: Wenjing Kuang finds solace in solo hikes along Hammonasset Beach State Park trails, participates in a local walking club that meets on Sundays, follows the New England Patriots and Boston Red
    Sox from their living room, and prefers gentle yoga sessions over competitive sports, valuing low‑key fitness that complements their reflective lifestyle.
  arts: Wenjing Kuang, an avid calligrapher and guzheng player, spends weekends sketching botanical illustrations at the Yale University Art Gallery’s lesser‑known exhibits, draws inspiration from artists
    like Georgia O'Keeffe, musicians such as Liu Fang, and poet Ocean Vuong, and integrates these influences into both personal practice and interdisciplinary teaching.
  travel: Wenjing Kuang enjoys low‑key, contemplative travel, favoring off‑peak visits to places like Kyoto’s quiet temples, the Scottish Isles for coastal walks, and New England lighthouse towns where
    they can sketch and brew tea, planning trips loosely around academic breaks and modest budgets.
  culinary: Wenjing Kuang, a confident home chef, loves blending Sichuan peppercorns with New England lobster to create a fiery lobster stir‑fry, experiments with mapo tofu infused with clams, and often
    finishes meals with a jasmine‑infused tea, though their tendency to forget pre‑heat the oven can lead to uneven cooking.
  core: Wenjing Kuang navigates life with a quiet curiosity, balancing a love for solitary artistic pursuits and flexible teaching, while occasional disorganization sparks missed appointments and spontaneous
    tea‑scented kitchen experiments.
background:
  cultural: Wenjing was born to Chinese immigrant parents who settled in Connecticut in the early 1970s. Growing up in a bilingual household, she celebrated Lunar New Year, practiced tea‑ceremony rituals,
    and learned traditional brush calligraphy from her grandfather. These early experiences instilled a deep respect for education, respect for elders, and an appreciation for subtle artistic expression.
    Living in Woodbridge, she navigates a bicultural identity—maintaining Chinese customs at home while fully engaging in American civic life. This dual perspective informs her teaching philosophy, motivating
    her to integrate multicultural content and to create learning spaces that honor both collective heritage and individual solitude.
