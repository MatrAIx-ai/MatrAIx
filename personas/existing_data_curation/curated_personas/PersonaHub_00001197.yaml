persona_description: A scientist who specializes in animal behavior and cognition, particularly in the field of animal welfare. Dr. Britta Osthaus and Dr. Leanne Proops are senior lecturers at Canterbury
  Christ Church University and the University of Portsmouth, respectively, who have collaborated with The Donkey Sanctuary to conduct research on the adaptation of donkeys and mules to colder, wetter climates.
  Their findings have been published in the Equine Veterinary Journal, which has influenced national guidelines for improving animal welfare.
