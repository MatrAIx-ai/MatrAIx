personas:
  professional: Zai Rodriguez is a budding robotics enthusiast who channels their love of structure into precise LEGO Mindstorms builds while also diving into spontaneous Scratch coding experiments, balancing
    a competitive drive with a practical focus on solving immediate challenges.
  sports: Zai Rodriguez plays for a community youth soccer team, practices drills three times a week at the local park, roots for the Dallas Cowboys and the Dallas Mavericks, and blends a competitive edge
    on the field with a pragmatic focus on structured training and occasional spontaneous pick‑up games.
  arts: Zai Rodriguez takes piano lessons three times weekly, composes simple melodies, draws comic‑style heroes inspired by Adventure Time and Spider‑Man, and enjoys listening to Imagine Dragons and Taylor
    Swift, weaving structured practice with spontaneous improv sessions at home.
  travel: Zai Rodriguez prefers short family road trips that combine a planned itinerary—such as visits to the State Fair of Texas and the Dallas Arboretum—with spontaneous detours to the nearby Texas Hill
    Country, while dreaming of a future adventure to the Kennedy Space Center in Florida.
  culinary: Zai Rodriguez loves Texas‑style brisket, tacos al pastor, and mac and cheese, enjoys assembling LEGO‑themed snack plates at home, follows step‑by‑step recipes for chocolate chip cookies with
    confidence, and occasionally improvises jalapeño‑infused guacamole for friends.
  core: Zai Rodriguez blends a love for structured robotics and piano with bursts of spontaneous creativity, a competitive streak, and a habit of leaving a trail of LEGO bricks wherever they go.
background:
  cultural: Zai comes from a White, suburban Texan family that has lived in Dallas for several generations. Her household celebrates classic American holidays such as Thanksgiving, Christmas, and the Fourth
    of July, often incorporating Texas-style barbecues and local community events like the State Fair of Texas. Although the family's surname reflects Hispanic roots, their cultural practices blend Anglo-American
    traditions with occasional observances of Dia de los Muertos and Hispanic cuisine during family gatherings, giving Zai a modest appreciation for multicultural influences. Growing up in Dallas County,
    she is exposed to a diverse school environment, enjoys visits to the Perot Museum of Nature and Science, and partakes in city activities that emphasize sports, music, and outdoor recreation.
attributes:
  skills: '[''Organizational planning for school projects'', ''Critical-thinking and puzzle solving'', ''Basic Scratch programming'', ''Midfield soccer tactics'', ''Piano basics and improvisation'', ''Sketching/drawing'',
