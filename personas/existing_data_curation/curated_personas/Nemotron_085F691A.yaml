  hobbies: '[''Soccer (team practice and scrimmages)'', ''Robotics club and Scratch coding'', ''Piano lessons and improvisation'', ''Sketching/drawing comic characters'', ''Reading mystery and adventure
    books'', ''Exploring Dallas parks and the Arboretum'', ''Building LEGO sets'']'
  career_goals: Zai dreams of turning her love for building and competition into a career in robotics engineering, hoping to lead a team that wins national STEM contests. She also wants to explore a path
    as a veterinarian because caring for animals appeals to her practical and compassionate side. In the short term, she aims to earn top honors in her school's science fair, make varsity soccer in high
    school, and continue developing her coding skills to create award-winning projects.
