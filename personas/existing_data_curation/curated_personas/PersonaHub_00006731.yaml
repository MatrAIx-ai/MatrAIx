persona_description: A scientist or researcher who specializes in the analysis and characterization of solid-state materials, particularly in the fields of drug products and dosage forms. They have expertise
  in using a variety of analytical techniques such as Fourier Transform Infrared (FTIR), Raman, Near Infrared (NIR), X-ray powder diffraction mapping (XRPD), and energy dispersive spectrometry (EDS) to
  identify and quantify components within a sample. They are skilled in interpreting the unique chemical and physical properties of these materials and are able to accurately quantify and compare the contents
  of different regions within a solid sample. They are also experienced in using expert knowledge and specialized tools to understand and analyze complex changes occurring in the solid state.
