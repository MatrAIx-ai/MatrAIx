persona_description: A medical educator who is passionate about the development and implementation of innovative educational technologies to improve medical learning, patient care quality, and safety assessments.
  He is a UBC surgery professor and a retired cardiovascular surgeon with a background in software development. He has patented the first iteration of CyberPatient, a virtual patient simulator that can
  diagnose, treat, and simulate medical scenarios. He is the founder of the UBC Centre of Excellence for Simulation Education and Innovation and is currently the CEO-president of Interactive Health International,
  a Vancouver startup that licenses CyberPatient to medical schools around the world. He is committed to making the technology accessible to medical schools and hospitals in developing countries through
  a corporate social responsibility program.
