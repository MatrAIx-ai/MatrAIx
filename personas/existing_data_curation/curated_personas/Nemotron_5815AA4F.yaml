  career_goals: Esther aims to secure a stable, routine-oriented position in the healthcare or office administration field. She plans to obtain a Certified Medical Assistant credential within the next two
    years, leveraging her love for organized work and desire for reliable income. In the longer term, she hopes to advance to an office manager role or open a small home‑based catering business that showcases
    Salvadoran meals, combining her culinary talent with her entrepreneurial drive.
