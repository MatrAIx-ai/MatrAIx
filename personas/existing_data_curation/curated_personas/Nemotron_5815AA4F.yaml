personas:
  professional: Esther Francisco, a 22‑year‑old aspiring Certified Medical Assistant, blends her bilingual fluency, meticulous budgeting, and event‑planning expertise with a love for routine and reliability,
    making her a go‑to organizer for patient check‑ins and office logistics in a healthcare setting.
  sports: Esther Francisco, a regular participant in Zumba and salsa classes at a Houston community center, enjoys staying active through weekly dance workouts, roots for the Houston Astros during baseball
    season, and follows the Houston Dynamo’s matches as a casual fan, incorporating a weekend jog in her routine whenever the weather permits.
  arts: Esther Francisco channels her love for music through a church choir and weekend salsa and Zumba sessions, often singing along to classic ballads by Luis Miguel and upbeat tracks by Gloria Estefan,
    while also enjoying telenovelas starring Thalía and marveling at the vibrant paintings of Frida Kahlo that inspire her DIY home‑decor projects.
  travel: Esther Francisco prefers organized short‑haul trips that blend family visits and cultural immersion, carefully planning weekend getaways to San Antonio’s River Walk for family reunions, savoring
    the historic charm of Oaxaca City in Mexico, and dreaming of a future pilgrimage to Granada, Spain, to explore its historic architecture and vibrant food markets, all while balancing a modest travel
    budget.
  culinary: Esther Francisco boasts a precise knack for preparing traditional dishes such as pupusas stuffed with queso fresco and chicharrón, curates herb‑infused salsas using home‑grown cilantro and oregano,
    frequently hosts potluck gatherings featuring tamales and yuca frita, and delights in pairing these meals with fresh lime and avocado slices.
  core: Esther Francisco balances a steadfast love for routine and meticulous budgeting with a contagious enthusiasm for group celebrations, thriving on organized chaos at family potlucks while occasionally
    indulging in last‑minute impulse buys for holiday treats.
background:
  cultural: Esther descends from a Salvadoran immigrant family that settled in Texas decades ago. At home, Spanish is spoken alongside English, and Catholic traditions shape holidays such as Semana Santa
    and Día de los Reyes, which she celebrates with extended family. The Salvadoran community in the Houston area, particularly around Fort Bend County, provides a network of cultural events, festivals,
    and churches that keep her connected to her heritage. Her upbringing emphasizes family loyalty, respect for elders, and a strong work ethic, values that guide her everyday life and aspirations.
