  career_goals: As a 14‑year‑old with big ideas, Yulisa dreams of becoming a bilingual media creator who can amplify Mexican‑American stories. She envisions running a popular YouTube channel or TikTok page
    where she blends lifestyle vlogs, cooking tutorials, and cultural commentary, eventually studying communications or media studies in college. In the longer term, she hopes to host a community‑focused
    TV segment or podcast that celebrates Latino youth, promotes local events, and offers practical advice on school and life. She also imagines opening a pop‑up taco stand during summer festivals, turning
    her love for cooking into a small entrepreneurial venture that brings families together.
