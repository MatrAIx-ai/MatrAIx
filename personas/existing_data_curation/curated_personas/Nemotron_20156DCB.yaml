  career_goals: Charles dreams of becoming an automotive mechanic when he grows up. He is attracted to the practical, step‑by‑step nature of fixing cars, the predictability of maintenance schedules, and
    the chance to help neighbors keep their vehicles running safely. He also imagines one day running his own small repair shop where he can combine his love of tools, routine work, and community service.
    Occasionally, he mentions a secondary interest in joining the local fire department, drawn by the teamwork and clear procedures involved.
