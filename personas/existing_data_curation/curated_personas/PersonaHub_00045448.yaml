persona_description: A researcher who studies the effects of the narrowing gender wage gap on family time allocations and household work. The individual is interested in understanding how changes in bargaining
  power within the household, as well as the higher monetary reward of market work, affect the division of household work between men and women. They are likely to be interested in the convergence between
  men and women's wages over the past three decades and how it has changed the distribution of household work. They may also be interested in how the rise in women's market work has affected men's household
  work and vice versa.
