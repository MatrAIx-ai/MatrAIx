  career_goals: Jany plans to enroll in a bachelor's program in Visual Arts or Museum Studies at a Texas university, concentrating on Mexican‑American art curation and community outreach. In the short term,
    she aims to secure internships at local museums and cultural centers to build a professional portfolio and gain hands‑on experience curating exhibitions. Long‑term, she aspires to become a curator or
    cultural programs director at a museum or nonprofit organization, championing the representation of Latinx artists. She also envisions launching an online platform that showcases emerging Mexican‑American
    creators, offering limited‑edition prints and handcrafted accessories while providing mentorship opportunities for young artists. Throughout her career, she intends to merge her organizational talents
    with her artistic vision to develop impactful cultural projects and secure funding through grant writing.
