personas:
  professional: Jany Pereira, a 20‑year‑old digital illustrator and street photographer fluent in Spanish and English, leverages their organized, analytical mindset to craft compelling visual narratives
    while pursuing museum curatorial internships that blend community outreach with grant‑writing acumen.
  sports: Jany Pereira, a 20‑year‑old art enthusiast, enjoys low‑impact fitness through weekly yoga classes, participates in a local pick‑up soccer league that plays at the San Antonio FC training fields,
    follows the San Antonio Spurs and attends occasional games, and maintains a casual membership at a community recreation center where they experiment with Zumba and Pilates.
  arts: Jany Pereira, a 20‑year‑old lover of visual culture, spends weekends sketching in downtown coffee shops while curating a personal Instagram feed of street murals, attends intimate live shows featuring
    indie artists like Tame Impala and Phoebe Bridgers at The St. Peter’s Café, and regularly joins community workshops at the San Antonio Museum of Art to study modernist art and the works of artists such
    as Diego Rivera.
  travel: Jany Pereira, a 20‑year‑old aspiring curator, prefers meticulously planned road trips that blend art pilgrimage and scenic exploration, having already visited Austin’s street‑art districts, Marfa’s
    minimalist installations, and Mexico City’s historic museum quarter, while dreaming of a future study tour through Florence’s Renaissance galleries and a weekend getaway to Santa Fe’s Pueblo‑style art
    scene.
  culinary: Jany Pereira, a 20‑year‑old culinary hobbyist, enjoys experimenting with traditional dishes such as tamales, pozole, and mole, often adding modern twists like quinoa‑based masa or smoky chipotle‑infused
    chocolate, and regularly hosts small dinner gatherings where they pair their creations with craft sodas and local microbrews.
  core: Jany Pereira, a 20‑year‑old organized dreamer, balances a relentless habit of cataloguing every mural they encounter with a propensity to over‑schedule, turning their curiosity into a disciplined
    yet slightly competitive quest for cultural immersion.
background:
  cultural: Jany was raised in San Antonio’s dynamic Mexican‑American community. Her parents immigrated from Jalisco, and she grew up bilingual, celebrating both Mexican traditions and Texan customs. Family
    gatherings feature homemade tamales, pozole, and beautifully crafted Día de los Muertos altars. She actively participates in local cultural events such as Fiesta San Antonio and is a member of a youth
    organization that promotes Latino heritage and community arts. These experiences have infused her with an appreciation for vivid colors, storytelling, and collective creativity, shaping her artistic
    style and fueling her ambition to highlight Mexican‑American narratives in her future career.
