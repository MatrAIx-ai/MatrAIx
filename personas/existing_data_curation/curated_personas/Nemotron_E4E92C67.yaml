personas:
  professional: Gary Styles, an elementary‑school robotics enthusiast and budding engineer, channels their curiosity‑practical balance into designing LEGO mechanisms and simple robots while their laid‑back
    attitude lets them improvise when a build doesn’t go as planned.
  sports: Gary Styles, a spirited member of the Parker Youth Soccer Club who also loves biking on gravel roads and tree climbing, follows the Denver Broncos, Colorado Rockies, and Colorado Avalanche with
    enthusiasm, and approaches fitness with energetic, spontaneous play rather than regimented training.
  arts: Gary Styles, an avid LEGO builder and video‑game fan who devours adventure series like *Percy Jackson* and watches Pixar hits such as *The Incredibles*, frequently listens to Imagine Dragons and
    Taylor Swift, and lets their imagination spill into sketching robotic designs during free time.
  travel: Gary Styles, who prefers family road trips to nearby national parks like Yellowstone and occasional visits to Disneyland, dreams of a future trip to Tokyo to see a robotics expo, and plans adventures
    loosely, packing snacks at the last minute and embracing spontaneous detours.
  culinary: Gary Styles, a self‑proclaimed pizza and taco connoisseur who can assemble a pepperoni slice and a DIY taco with sliced cheese, lettuce, and salsa, enjoys making microwave mug cakes, and while
    they love trying new flavors, they often get distracted mid‑recipe by a new LEGO set.
  core: Gary Styles is a curiosity‑driven nine‑year‑old who can spend hours building LEGO volcanoes, forgets to put their bike back in the garage, and balances a love for group games with a laid‑back approach
    to responsibilities.
background:
  cultural: Gary comes from a white, rural American family living in Parker, Idaho. The community’s culture emphasizes self‑reliance, outdoor recreation, and close‑knit neighborly ties. Family gatherings
    often include potluck meals featuring local produce, and weekends may involve farm‑related chores or trips to nearby state parks. This setting nurtures Gary’s practical side while giving him ample opportunities
    to explore nature and collaborate with peers.
