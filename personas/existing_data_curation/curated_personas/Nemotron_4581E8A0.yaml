personas:
  professional: Stanley Scott, a 17‑year‑old aspiring tradesperson, blends their practical, hands‑on talents in basic auto repair, home maintenance, and electronics tinkering with a love of clear routines
    by working part‑time at a local garage and coordinating small DIY projects for friends, balancing their preference for predictability with a relaxed attitude toward scheduling.
  sports: Stanley Scott spends weekends exploring Catskill trails, fishing for trout in the Delaware River, cheering on the New York Yankees, New York Knicks, and New York Rangers, and they participate
    in the Catskill Trail Running Club’s seasonal runs, preferring a mix of solitary endurance activities and occasional pickup basketball games with the Hurleyville Youth Sports League.
  arts: Stanley Scott enjoys classic rock bands like Led Zeppelin, Pink Floyd, and The Rolling Stones, reads science‑fiction authors such as Isaac Asimov, Frank Herbert, and Ann Leckie, and they spend board‑game
    nights debating strategy over titles like Terraforming Mars and Gloomhaven, letting music and stories shape their solitary creative time.
  travel: Stanley Scott has camped in the Adirondacks, visited historic Boston, and they dream of backpacking through the Pacific Northwest’s Olympic National Park and road‑tripping to the Grand Canyon,
    preferring self‑planned itineraries that balance low‑cost adventure with occasional splurges on local cuisine.
  culinary: Stanley Scott loves cooking campfire‑grilled trout seasoned with lemon, dill, and garlic, whipping up classic burgers with sharp cheddar, and they perfect a trail‑mix of dried apples, almonds,
    and dark chocolate, while also indulging in homemade apple pie with a flaky crust during family gatherings.
  core: Stanley Scott merges a rugged, hands‑on love of mechanics and the outdoors with a structured yet easygoing mindset, and they balance frugality and occasional splurges, solitary creativity, and a
    tight‑knit circle of friends.
background:
  cultural: Stanley grew up in Hurleyville, a small, close‑knit community in Sullivan County, New York. His family’s roots trace back several generations to the Northeastern United States, and his cultural
    heritage is primarily of Anglo‑American descent. The town’s rural setting, with its emphasis on self‑reliance, outdoor recreation, and community events such as local fairs and church gatherings, has
    shaped his values of practicality, modest cooperation, and appreciation for nature. While his exposure to diverse cultures is limited, he stays connected to broader American culture through music, movies,
    and online gaming communities, which provide a window to a wider world.
