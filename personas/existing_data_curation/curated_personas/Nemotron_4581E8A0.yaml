  career_goals: Stanley’s immediate ambition is to earn his high‑school equivalency (GED) within the next year so he can pursue a trade apprenticeship. He is particularly drawn to automotive technology,
    hoping to secure an apprenticeship at a local garage where he can deepen his mechanical skills. He also considers a carpentry apprenticeship, attracted by the blend of structure and creative problem‑solving
    it offers. Recognizing his desire for a disciplined environment, Stanley is exploring the option of enlisting in the U.S. Navy, which would provide rigorous training, clear career pathways, and the
    structured routine he values. Long‑term, he aims to become a certified mechanic or carpenter who can work independently or run his own small service business serving the Hurleyville community.
