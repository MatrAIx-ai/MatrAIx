  hobbies: '[''Fly fishing'', ''Snowshoeing'', ''Woodworking'', ''Vintage motorcycle restoration'', ''Reading historical non‑fiction'', ''Church book club'', ''Small‑group board games'']'
  career_goals: Looking ahead, Anthony aims to secure a senior supervisory role that allows him to shape the next generation of managers, emphasizing mentorship and knowledge transfer. He plans to implement
    a modest efficiency improvement program that reduces waste by 10 % over the next two years, positioning his plant for a smooth transition when he eventually steps back into a consultant‑advisor capacity.
    Long‑term, he hopes to retire with financial stability while staying involved in community economic development projects, leveraging his managerial experience to support local small businesses.
