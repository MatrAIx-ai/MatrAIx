  hobbies: '[''Reading (non‑fiction)'', ''Fishing'', ''Gardening'', ''Woodworking'', ''Model Railroad Design'', ''Hiking in local parks'']'
  career_goals: Nathan aims to steer his company through a sustainable digital transformation while achieving steady revenue growth of 8‑10% annually. He seeks to expand the business into regional markets
    beyond Tennessee, strengthen its reputation for quality and ethical practices, and eventually establish a family trust that supports local community initiatives. Mentoring the next generation of leaders
    and creating a robust succession plan are also central to his long‑term vision.
