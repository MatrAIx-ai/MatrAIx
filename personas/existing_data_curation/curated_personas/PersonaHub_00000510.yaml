persona_description: A researcher and inventor who specializes in the field of autonomous systems and 3D printing. They are currently working on a project to develop mobile 3D printers that can operate
  in teams, completing a variety of useful construction jobs such as repairing bridges and tunnels. They are using machine learning and AI to enable the robots to function as a unit with the potential for
  future space exploration activities. Their research is supported by a $1.2 million grant from the National Science Foundation (NSF) and is taking place at NYU's Center for Urban Science and Progress (CUSP).
  The researcher is an expert in planning and localization, model predictive control, and autonomous cooperation between 3D printers. They are working on pushing scientific boundaries to make collective
  additive manufacturing viable and ensure optimal deployment of multiple mobile robots that print large structures according to an engineered, virtual design.
