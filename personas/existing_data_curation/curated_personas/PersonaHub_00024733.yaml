persona_description: A local government official or planner in Virginia who is interested in understanding and addressing water-related issues in their community. This person may be responsible for developing
  and implementing local water resources management plans, working with localities to incorporate water resources information into land use and comprehensive planning, and addressing specific water-related
  problems in their area. They may also be interested in learning about the latest research and best practices in water resources management from the Sourcebook for Local Water Resources Management.
