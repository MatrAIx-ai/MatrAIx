  hobbies: '[''Reading (fiction and poetry)'', ''Journaling'', ''Nature walks and birdwatching'', ''Landscape photography'', ''Herb gardening'', ''Baking and cooking'', ''Crossword puzzles'', ''Knitting'',
    ''Listening to classical music'', ''Volunteer tutoring at the local library'']'
  career_goals: Carolyn is committed to advancing her professional capabilities while maintaining a balanced, low-stress work environment. Her short-term goal is to complete a Master's degree in Education
    with a focus on literacy development and curriculum design, which will qualify her to serve as a school literacy coordinator or instructional coach. She plans to spearhead flexible, inquiry-based units
    that allow students to explore topics deeply while meeting Massachusetts state standards. Long-term, she hopes to author resource guides for educators who prefer solitary, reflective teaching styles
    and to lead workshops that promote mindful classroom practices and teacher well-being.
