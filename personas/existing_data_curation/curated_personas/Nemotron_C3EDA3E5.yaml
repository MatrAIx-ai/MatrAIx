personas:
  professional: Daisy Lopez, a 25-year-old civil engineer in San Diego, blends structural analysis, AutoCAD, Revit, and GIS expertise with a curiosity for sustainable design, using their collaborative and
    assertive yet relaxed style to lead interdisciplinary, art-infused infrastructure projects despite occasional desk clutter from their disorganized habit.
  sports: Daisy Lopez energizes their weekends by hiking the cliffs of Torrey Pines, playing beach volleyball with the Mission Beach Volleyball Club, practicing yoga for flexibility, and cheering on the
    San Diego Wave FC, all while maintaining a social circle that often joins in.
  arts: Daisy Lopez curates a personal blog of San Diego’s street-mural scene, spotlighting local artists like Carlos Rivas and international icons such as Shepard Fairey, while they unwind to the salsa
    rhythms of Celia Cruz, the synth-driven sounds of M83, and often reference design legend Dieter Rams in their reading.
  travel: Travel-oriented Daisy Lopez favors spontaneous weekend drives along the Pacific Coast Highway to Big Sur, annual culinary pilgrimages to Oaxaca, and has a bucket-list for a design-centric journey
    through Barcelona, balancing these adventures with a modest travel budget and group outings with friends.
  culinary: Culinary-enthused Daisy Lopez masterfully prepares traditional mole poblano and carnitas tacos alongside inventive chipotle-marinated salmon taco bowls, favoring fresh cilantro, roasted poblano
    peppers, and avocado, and they frequently share these creations at community potlucks.
  core: Daisy Lopez merges engineering precision with artistic spontaneity, navigating projects with an easygoing yet assertive flair, all while juggling a chaotic desk, an ever-growing mural blog, and
    a habit of forgetting to file receipts.
background:
  cultural: 'Raised in a Mexican-American household in San Diego, Daisy grew up bilingual, speaking both Spanish and English at home. Family traditions such as Día de los Muertos, quinceañeras, and weekend
    gatherings over tacos and mole ingrained a strong sense of cultural pride. The city’s vibrant Chicano community and proximity to the U.S.–Mexico border have exposed her to a mix of contemporary Mexican
    art, music, and community activism. This bicultural upbringing informs her worldview: she values collective responsibility, seeks to embed cultural references into public infrastructure, and actively
    participates in local Mexican cultural organizations. Her heritage fuels her passion for creating inclusive urban spaces that honor the stories and aesthetics of the Mexican diaspora in Southern California.'
attributes:
  skills: '[''Structural analysis'', ''AutoCAD'', ''Revit'', ''Civil 3D'', ''GIS mapping'', ''Seismic retrofitting'', ''Sustainable design'', ''Project coordination'', ''Client communication'', ''Team facilitation'',
