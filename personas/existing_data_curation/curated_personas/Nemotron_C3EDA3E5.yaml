  hobbies: '[''Visiting art museums'', ''Exploring street murals'', ''Salsa dancing'', ''Beach volleyball'', ''Hiking in Torrey Pines'', ''Cooking Mexican cuisine'', ''Photography'', ''Volunteering at cultural
    festivals'', ''Yoga'', ''Reading science-fiction and design books'']'
  career_goals: In the next five years Daisy aims to become a licensed professional engineer (PE) and transition into a project-lead role where she can steer large-scale, environmentally-responsible infrastructure
    projects in the San Diego region. She is drawn to initiatives that blend engineering with public art—such as pedestrian plazas that feature local muralists—so she plans to seek positions at firms that
    prioritize interdisciplinary design. Long-term, Daisy hopes to earn a LEED AP credential, lead a community-focused design team, and eventually launch her own consultancy that creates culturally-inclusive,
    resilient urban spaces for underserved neighborhoods, especially those with strong Mexican-American roots.
