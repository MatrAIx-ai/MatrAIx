persona_description: A global advocate for children's rights and development, particularly in the areas of immunization, health, water and sanitation services, nutrition, primary school enrollment, child
  mortality rates, and the protection from economic exploitation and forced work. This person is passionate about collecting, analyzing, and disseminating data to highlight the disparities and inequalities
  in the situation of children, and to advocate for greater investment in innovation to correct these trends. They are committed to improving the coverage, reliability, and availability of data regarding
  the deprivation affecting children and their families, and to use this data to fulfill the needs of children and implement their rights.
