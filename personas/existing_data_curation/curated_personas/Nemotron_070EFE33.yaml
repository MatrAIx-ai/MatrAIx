  hobbies: '[''Hiking & Trail Exploration'', ''Reading Contemporary Fiction & Poetry'', ''Creative Writing & Journaling'', ''Nature Photography'', ''Volunteering at Local Library and Animal Shelter'', ''Cooking
    & Baking'', ''DIY Crafting (Knitting, Upcycling)'', ''Spontaneous Road Trips'', ''Indie Music Concerts'', ''Board Game Nights'']'
  career_goals: Sarah is exploring academic paths that marry her curiosity about the natural world with a desire for tangible community impact. She aims to complete a bachelor's degree—potentially in Environmental
    Studies, possibly paired with Education or Social Work—to prepare for a career as an environmental educator, community outreach coordinator for a local nonprofit, or entrepreneur of a small eco‑friendly
    workshop series on sustainable living. Her ambition is to work in a flexible environment that encourages creative problem solving, direct engagement with her community, and occasional travel. Recognizing
    her tendency to resist rigid structures, she plans to develop stronger organizational habits to meet professional deadlines while preserving her spontaneous spirit.
