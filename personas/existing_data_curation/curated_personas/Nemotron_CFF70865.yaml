  hobbies: '[''Gardening'', ''Cooking Indian cuisine'', ''Watching cricket'', ''Reading business journals'', ''Historical biographies'', ''Dog walking'', ''Volunteer work at temple'', ''Organizing community
    festivals'']'
  career_goals: Though currently not in the workforce, Ravi aims to channel his practical business knowledge into mentoring aspiring entrepreneurs within his community and offering pro‑bono financial advice
    to local non‑profits. He envisions establishing a part‑time consulting practice that helps family‑run businesses streamline operations while preserving traditional values. Ravi also hopes to support
    his adult children’s further education, ensure long‑term financial stability for his family, and play an active role in organizing cultural and charitable events for the South Asian diaspora in Westchester
    County.
