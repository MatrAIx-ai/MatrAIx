  career_goals: Myong aims to transition her career toward a role that blends her humanities background with her passion for the arts. Over the next two to three years she plans to obtain a certification
    in museum studies or arts administration, enabling her to seek a position as a gallery associate or community arts coordinator at a local cultural center in Lexington. She also aspires to develop supervisory
    experience within retail, aiming for a shift‑supervisor or store‑manager role that leverages her organizational strengths and competitive drive. Ultimately, she hopes to curate small art exhibits or
    workshops that provide intimate, supportive spaces for creators, while maintaining a stable income to support her family.
