personas:
  professional: Myong Park, a seasoned retail specialist with sharp cash‑handling and point‑of‑sale expertise, leverages a humanities degree and bilingual fluency to deliver articulate customer service
    while they pursue a museum studies certification, aiming to transition into a gallery associate role where their meticulous inventory skills meet their curiosity for art and competitive drive to meet
    performance metrics.
  sports: Myong Park, a dedicated yoga enthusiast who attends sunrise classes at a Lexington studio and follows the Kentucky Wildcats men’s basketball team, occasionally joins a local running club for 5‑k
    races, treating these low‑impact activities as both a competitive personal challenge and a calming antidote to their anxiety.
  arts: Myong Park, an avid patron of Lexington’s galleries who regularly examines the photographic work of Sze Tsang and the surreal paintings of Anselm Kiefer, spends evenings sketching with watercolor
    inspired by John Singer Sargent and practices Korean calligraphy after reading the literary works of Haruki Murakami and Han Kang, weaving solitary creative practice into a reflective artistic identity
    that they cherish.
  travel: Myong Park, a meticulous planner who prefers intimate, culturally rich trips, has visited the museum districts of Kyoto and Amsterdam and dreams of exploring the art scene in Florence, always
    booking boutique guesthouses and crafting detailed itineraries that balance art‑focused tours with quiet coffee‑house moments for journaling, a balance they maintain despite a busy work schedule.
  culinary: Myong Park, a competent home cook, prepares comforting bowls of kimchi jjigae, layered bibimbap, and hand‑rolled makgeolli while hosting quiet tea ceremonies featuring daechu and roasted barley
    teas, often pairing the meals with soft lo‑fi jazz to create a soothing, meditative dining experience that they find grounding after a stressful day.
  core: Myong Park, a 34‑year‑old arts‑loving retail professional, balances hyper‑organized work habits with an anxious, introspective nature, channeling solitary creativity into curated community experiences
    while they competitively pursue career advancement.
background:
  cultural: Myong is a first‑generation Korean‑American. Raised in a household where Korean language and customs were central, she regularly celebrates holidays such as Seollal and Chuseok, prepares traditional
    foods like kimchi and tteokguk, and practices Korean calligraphy. While deeply rooted in her heritage, she has also embraced the culture of Lexington, participating in local community events, exploring
    Southern cuisine, and attending regional art festivals. This bicultural experience shapes her worldview, giving her a nuanced appreciation for both Eastern and Western artistic traditions and enabling
    her to navigate multicultural settings with sensitivity.
