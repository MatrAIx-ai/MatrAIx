  career_goals: Evelyn aims to transition into a senior administrative role, such as Office Manager or Administrative Coordinator, within a school or community organization where she can leverage her extensive
    experience and maintain a predictable routine. She plans to earn the Certified Administrative Professional (CAP) credential to formalize her expertise. Additionally, she hopes to mentor younger staff
    members, sharing her methodical approach and reliability. In the next five years, she envisions a phased transition to part‑time consulting for local nonprofits, allowing her to stay engaged while reducing
    workplace stress and supporting a stable, low‑anxiety lifestyle as she approaches retirement.
