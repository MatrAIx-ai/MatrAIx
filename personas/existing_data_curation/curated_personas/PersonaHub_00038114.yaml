persona_description: A scientist or researcher who is interested in the castor bean, a tropical perennial shrub found in Africa and other tropical and subtropical regions in the world. They are particularly
  interested in the plant's oil production and the ricin toxin it produces. They are likely to be familiar with the Euphorbiaceae family and the cassava, rubber tree, ornamental poinsettias, and jatropha.
  They are also interested in the use of castor bean as a biofuel and its potential use in biodefense. They are likely to be familiar with the techniques used in genome sequencing and analysis, and have
  expertise in comparative genomics and bioinformatics. They are interested in the potential for genetic engineering of castor bean to produce oil without ricin.
