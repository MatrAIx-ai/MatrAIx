personas:
  professional: Elizabeth Haney, a 27‑year‑old Indianapolis firefighter, blends rigorous fire suppression, hazardous‑materials response, and incident‑command expertise with their love for sketching and
    photography, designing bold visual fire‑safety campaigns while they lead their crew with a competitive drive and a relaxed, flexible attitude toward paperwork.
  sports: Elizabeth Haney fuels their fitness by bouldering at Vertigo Climbing Center, hiking Indiana’s Hoosier National Forest each fall, playing competitive pickup basketball in a local league that rallies
    around the Indianapolis Colts and watches the Pacers for tactical inspiration, and they join a seasonal softball team during summer months.
  arts: Elizabeth Haney immerses themselves in Indianapolis’s arts scene by sketching the fiery glow of the city’s skyline reminiscent of Edward Hopper, photographing street murals in a Banksy‑style, curating
    pop‑up exhibits featuring music by Hozier and The National, and they volunteer backstage at the Indianapolis Theatre Lab for productions of Shakespeare’s Macbeth.
  travel: Elizabeth Haney prefers spontaneous, budget‑friendly trips that blend adventure and art, such as sunrise climbs on Sedona’s red‑rock trails, cultural immersion in Amsterdam’s Van Gogh Museum,
    weekend road‑trips to the Indiana Dunes, and autumn hikes in Brown County State Park, and they often plan on the fly rather than adhering to rigid itineraries.
  culinary: Elizabeth Haney enjoys experimental cooking, frequently preparing sous‑vide pork belly glazed with miso‑maple, charcoal‑grilled corn tossed with smoked paprika and cilantro, and spiced ramen
    broth infused with kombu and turmeric, while they keep a well‑stocked pantry of smoked peppers, charcoal powder, and fresh herbs for their fire‑inspired flavors.
  core: Elizabeth Haney is a fire‑fighter‑artist who channels their competitive edge, artistic curiosity, and love of spontaneous adventure into bold community safety projects, even if they regularly let
    paperwork become an artistic mess.
background:
  cultural: Elizabeth is a white Midwestern American raised in the Indianapolis suburbs. Her family background includes German and Irish ancestry, emphasizing hard work, community service, and a practical
    appreciation for the arts. Growing up, she participated in local church groups, neighborhood block parties, and regional arts festivals, which nurtured both her civic spirit and curiosity about creative
    expression. These cultural influences shape her identity as a community‑oriented firefighter who values both practical service and artistic engagement.
