  career_goals: Elizabeth aims to advance within the Indianapolis Fire Department to the rank of fire captain and eventually fire chief, aiming to integrate innovative, art‑infused fire prevention programs
    throughout the community. She plans to complete a degree in fire science or emergency management, earn paramedic certification, and join a specialized urban search‑and‑rescue team. Her long‑term vision
    includes establishing a mentorship program that blends physical training with creative workshops, encouraging younger firefighters to think outside traditional firefighting methods while fostering community
    engagement through public art installations that promote safety.
