persona_description: A marine biologist who is interested in conducting research and monitoring activities on the Bodega Marine Reserve, a protected marine reserve located in California. They are knowledgeable
  about the diverse habitats found within the reserve, including subtidal, rocky intertidal, mudflat, sandy beach, fresh and saltwater marsh, coastal grassland, and dune communities, and are interested
  in monitoring climate, vegetation, and selected animal populations. They are also interested in the complex geology of the San Andreas fault and the strength of wind-driven coastal upwelling that occurs
  in the reserve. They are committed to supporting field investigations for Laboratory visitors working from San Francisco to Point Arena, and are interested in expanding the invertebrates list and adding
  a marine algae list to assist students in identifying organisms and learning the natural history of the site. They are also interested in providing background information in support of current research
  and developing opportunities for new research.
