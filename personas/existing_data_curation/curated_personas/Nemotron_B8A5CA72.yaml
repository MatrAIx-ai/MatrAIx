  hobbies: '["Woodworking", "Fly Fishing", "Historical Non‑Fiction Reading", "Jigsaw Puzzles", "Chess", "Volunteer Food Pantry Work", "Gardening"]'
  career_goals: Thomas aims to step into a departmental leadership role, such as Department Chair, where he can shape program strategy and champion community‑college collaborations that provide vocational
    pathways for local residents. He is determined to secure additional grant funding to expand adult education and workforce development initiatives. Over the next five years, he hopes to mentor a cohort
    of new faculty, implement a competency‑based curriculum, and eventually transition to an emeritus position that allows him to continue advising while reducing daily stress.
