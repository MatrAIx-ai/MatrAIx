personas:
  professional: Thomas Davis, a veteran postsecondary instructor with three decades of experience, channels their preference for structure and data‑driven decision‑making into meticulous curriculum design,
    mentorship of junior faculty, and strategic grant writing as they pursue a department chair role.
  sports: Thomas Davis keeps active through weekend fly‑fishing outings on the Ohio River, walks the riverfront trail for cardiovascular health, and follows the Cleveland Browns and Cincinnati Reds with
    unwavering loyalty, often sporting team memorabilia while they cheer at local games when their schedule permits.
  arts: Thomas Davis immerses themselves in historical biographies by David McCullough, war memoirs by Tim O'Brien, and finds solace in the folk songs of Woody Guthrie and Bob Dylan, while they occasionally
    attend performances at the local community theatre featuring classic plays such as "Our Town" and appreciate the timeless cinema of Gregory Peck.
  travel: Thomas Davis prefers meticulously planned road trips that blend historical exploration with natural scenery, having already toured Gettysburg, Shenandoah National Park, and the historic river
    towns of Ohio, while they dream of an overseas pilgrimage to Edinburgh's Castle and the D‑Day beaches of Normandy when their retirement budget permits.
  culinary: Thomas Davis, a competent home cook, delights in preparing pan‑seared trout seasoned with fresh dill and lemon from their catches, tossing garden‑grown tomatoes, zucchini, and basil into rustic
    ratatouille, and baking a flaky apple‑cinnamon pie that often becomes the centerpiece of their modest dinner gatherings, while they proudly serve it to family and neighbors.
  core: Thomas Davis, a detail‑obsessive educator and hobbyist woodworker, balances a relentless quest for structured excellence with a habit of over‑checking their budget and a lingering tendency to worry
    about the future, and they often find themselves double‑checking spreadsheets late into the night.
background:
  cultural: Thomas was raised in the steel‑town environment of western Pennsylvania, descending from Irish‑German immigrant families that settled the region in the early 20th century. The area’s strong
    labor heritage, close‑knit community values, and Protestant church traditions fostered his practical, self‑reliant outlook. The economic downturn of the 1970s‑80s heightened his competitive drive and
    cautious skepticism, while his graduate training in education reinforced a belief that structured learning can provide stability and upward mobility for individuals and the community.
attributes:
  skills: '["Curriculum Development", "Instructional Design", "Assessment & Evaluation", "Educational Technology (LMS)", "Program Management", "Grant Writing", "Adult Learner Mentoring", "Data‑Driven Decision
