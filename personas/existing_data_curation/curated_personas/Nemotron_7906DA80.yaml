  hobbies: '["Cajun and Zydeco music", "Attending local festivals and Mardi Gras celebrations", "Fishing on Bayou Teche", "Gardening (vegetables and herbs)", "Cooking Creole cuisine", "Genealogy research",
    "Reading local history", "Church choir participation", "Woodworking", "Crossword puzzles", "Watching classic films", "Volunteering at the senior center"]'
  career_goals: As he approaches retirement, Matthew aims to transition from full‑time receptionist duties to a part‑time community liaison role where he can apply his extensive local knowledge to improve
    information access for seniors and new residents. He plans to obtain an Office Administration certification to formalize his skills and to lead workshops on digital scheduling and record‑keeping for
    parish staff. Mentoring younger clerks remains a priority; he hopes to establish a formal mentorship program within the parish office. Additionally, Matthew wishes to spearhead a small‑scale project
    to digitize historic community newsletters, preserving local heritage while reducing his own workload stress. Ultimately, he seeks a balanced post‑career life that keeps him socially engaged, financially
    secure, and mentally active.
