personas:
  professional: Cindi Burns is a detail‑oriented interior designer who leverages AutoCAD, SketchUp, and Revit to create sustainable, family‑centered residential spaces, balancing precise budgeting with
    a cooperative client approach rooted in community‑first values, and they always ensure project timelines align with client schedules.
  sports: Cindi Burns is a member of the Kansas City Running Club, follows the Kansas City Chiefs and Sporting Kansas City with weekly game viewings, schedules Tuesday evening yoga sessions, and treats
    each workout like a design milestone, and they often log their runs in a digital planner to stay on track.
  arts: Cindi Burns immerses herself in prairie‑style architecture, collects vintage textiles, enjoys the paintings of Grant Wood, and curates playlists featuring Aaron Copland and folk singer John Hartford
    while flipping through Emily Henderson’s design blogs for inspiration, and they frequently attend local art walks to support regional creators.
  travel: Cindi Burns plans meticulous road trips across the Midwest, has visited the Badlands and Denver for hiking, dreams of touring Copenhagen’s sustainable design scene, and balances travel budgets
    with family obligations, often booking family‑friendly cabins well in advance, and they always pack a reusable water bottle and a printed itinerary.
  culinary: Cindi Burns enjoys cooking precise, healthy twists on classic dishes like Kansas City‑style barbecue ribs, roasted root‑vegetable medley, and sourdough bread, favoring ingredients such as heirloom
    tomatoes, locally sourced honey, and fresh dill, and treats each recipe as a structured project, and they keep a digital notebook of measurements to ensure reproducibility.
  core: Cindi Burns, a 34‑year‑old interior designer, turns every home makeover, garden planting schedule, and puzzle night into a well‑organized blueprint, blending reliability with a quiet love for vintage
    charm, and they never miss a chance to add a new plant to their low‑maintenance garden.
background:
  cultural: Cindi’s cultural background reflects a Midwestern white American upbringing in Kansas. Raised in a close‑knit community, she values reliability, modesty, and neighborly cooperation, traits that
    inform both her personal life and professional practice. The region’s prairie‑style architecture and emphasis on natural materials have shaped her aesthetic sensibility. Family traditions such as seasonal
    community gatherings, church involvement, and a strong sense of hospitality have fostered her cooperative nature and her focus on creating welcoming, functional spaces for families.
attributes:
  skills: '[''Space planning'', ''AutoCAD'', ''SketchUp'', ''Revit'', ''Project scheduling'', ''Budgeting'', ''Material sourcing'', ''Color theory'', ''Building code compliance'', ''ADA accessibility'',
    ''Sustainable design'', ''Client communication'', ''Vendor negotiation'', ''Team coordination'']'
  hobbies: '[''Gardening'', ''Cooking'', ''DIY home improvement'', ''Collecting vintage textiles'', ''Attending craft fairs'', ''Solving jigsaw puzzles'', ''Reading interior design magazines'', ''Studying
    historic prairie‑style architecture'']'
  career_goals: Cindi aims to transition from a project‑level interior designer to a senior designer role within the next three years, eventually establishing her own boutique studio that specializes in
    sustainable, family‑focused residential interiors for the Kansas City metro area. She plans to earn the NCIDQ certification, deepen her expertise in passive‑house standards, and lead a small design
    team that emphasizes collaborative, client‑centred processes. Balancing career growth with family life, she seeks flexible project timelines that allow for quality time with her husband and the possibility
    of future children.
