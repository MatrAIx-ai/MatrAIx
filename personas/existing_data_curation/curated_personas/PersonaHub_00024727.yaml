persona_description: A geologist who is interested in the geology of the Animas River, its history, and its impact on the surrounding landscape. This person is knowledgeable about the Precambrian geological
  formations that the river flows through, and the volcanic activity that created the caldera that gathers the snow and rain to give rise to the river. They are also familiar with the history of the river,
  including its role in the development of the Animas Valley and the impact it has had on the surrounding environment. This person is likely to be interested in the river's role in the local economy and
  the cultural significance of the Animas River to the local community.
