personas:
  professional: Mathew Riley is an aspiring game designer who turns sandbox video-game strategies, LEGO constructions, and beginner robotics kits into prototype level designs, while they push themselves
    to iterate fiercely, even though they often leave sketches scattered across the living room.
  sports: Mathew Riley cheers on the Dallas Cowboys on Friday night while playing midfield for the FC Lancaster Strikers youth soccer team, joining after-school games with high energy, and they relish the
    competitive camaraderie even as they sometimes argue over ball possession.
  arts: Mathew Riley is a diligent doodler who spends weekends sketching video-game heroes at the Dallas Museum of Art, drawing inspiration from Studio Ghibli's animation and comic legend Jim Lee, and they
    channel that enthusiasm into creating digital comics on a tablet after school.
  travel: Mathew Riley prefers weekend road trips that combine family barbecues at a Hill Country ranch, a visit to the Dallas Science Place, and a quick stop at Austin's music venues, and they dream of
    camping in the Great Smoky Mountains to experience a blend of nature and live jam sessions.
  culinary: Mathew Riley's favorite meals are Texas-style brisket tacos and chicken tenders with ranch dip, they love experimenting with sushi rolls after watching YouTube tutorials, and they claim that
    a dash of smoked paprika is the secret to their best grilled cheese.
  core: Mathew Riley is a fiercely curious twelve-year-old who mixes endless video-game imagination with a love for soccer, art, and backyard barbecues, all while juggling a habit of scattered sketches
    and occasional impulsive spending.
background:
  cultural: 'Mathew grows up in a middle‑class white family in Lancaster, Texas, a suburb of Dallas known for its blend of small‑town community values and proximity to a larger urban culture. His upbringing
    reflects typical Texan influences: a love for football, backyard barbecues, and country music, balanced with exposure to the diverse artistic scene of the Dallas metro area. Family gatherings often
    revolve around church‑related events, instilling a sense of community and modesty, while his parents encourage curiosity and creativity through after‑school art and STEM programs. This mix of Southern
    hospitality, a competitive sports culture, and access to modern technology shapes Mathew''s outlook, fostering both a collaborative spirit and a drive to stand out.'
