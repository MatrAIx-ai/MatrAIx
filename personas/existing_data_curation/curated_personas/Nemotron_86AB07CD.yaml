  career_goals: Although still early in his education, Mathew dreams of turning his love for art and gaming into a career. He envisions becoming a video game designer or graphic artist, creating immersive
    worlds that blend storytelling with striking visuals. He also entertains the idea of building a YouTube channel where he shares tutorials on drawing and gaming strategies, hoping to inspire peers. The
    competitive side of his personality pushes him toward eSports, with aspirations to compete at higher levels. In the longer term, Mathew is intrigued by robotics and hopes to study engineering, possibly
    developing interactive art installations that merge technology and creativity.
