  hobbies: '[''Basketball'', ''Flag football'', ''Keyboard playing'', ''Church choir'', ''Hip‑hop and R&B music'', ''Volunteer work at food bank'', ''Neighborhood clean‑up events'', ''Automotive tinkering'',
    ''DIY woodworking'', ''Cooking Southern BBQ and soul food'', ''Reading technology blogs and biographies'']'
  career_goals: Edward aims to pursue a degree in community development or social work at a nearby community college while completing a certification in automotive technology. His long‑term ambition is
    to become a community liaison who can bridge technical services and social support, either by working for the city’s public works department in a role that also involves community outreach, or by starting
    his own small business that offers affordable vehicle repair services combined with a mentorship program for at‑risk youth. He also hopes to eventually become a certified youth counselor, helping teenagers
    navigate education and career pathways.
