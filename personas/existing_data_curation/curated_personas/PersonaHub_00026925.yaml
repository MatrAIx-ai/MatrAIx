persona_description: A physicist who specializes in the study of galaxy formation and evolution, particularly the processes that led to the hierarchical build-up of galaxy mass and the assembly of bulges
  and discs in present-day galaxies. His research interests include, but are not limited to, the nature of dark matter, the properties of gas and dust in galaxies, and the detection and interpretation of
  high-redshift star forming galaxies. He has conducted extensive research on the SINFONI integral field spectrograph, which he used to obtain well-resolved, two-dimensional images of gas motions in distant
  star forming galaxies, whose light has traveled more than 11 billion years to the Earth. He has published several papers on the results of his research, including the discovery of large, rotating and
  gas-rich disc galaxies at high redshift.
