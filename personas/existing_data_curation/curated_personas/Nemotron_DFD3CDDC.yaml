  career_goals: Zacheriah aims to stay actively engaged by mentoring local high‑school students in STEM, volunteering as a safety advisor for community events, and learning about renewable‑energy technologies
    such as solar and wind. He also hopes to document his life stories and lessons for his grandchildren, preserving both family heritage and practical knowledge for future generations.
