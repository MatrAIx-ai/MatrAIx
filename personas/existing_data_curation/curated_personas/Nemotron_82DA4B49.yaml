  hobbies: '[''Hackathon participation'', ''Coding meetups'', ''Pickup basketball'', ''Soccer'', ''Toastmasters / public speaking'', ''Stand‑up comedy'', ''DIY electronics tinkering'', ''Live music concerts'',
