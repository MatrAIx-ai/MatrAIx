  career_goals: Cecil aims to translate his curiosity and practical problem‑solving into a career that drives tangible impact in the energy sector. In the next 2‑3 years he plans to secure an entry‑level
    data engineer or systems analyst role at a Houston‑based energy or aerospace company, gaining industry certifications such as AWS Solutions Architect and Six Sigma Green Belt. He aspires to become a
    senior engineer or technical lead, overseeing large‑scale data integration or IoT projects that improve operational efficiency and sustainability. Long‑term, Cecil hopes to launch his own tech consultancy
    that leverages data analytics and embedded systems to help regional firms adopt smarter, greener technologies, positioning himself as a recognized innovator and competitive leader in his field.
