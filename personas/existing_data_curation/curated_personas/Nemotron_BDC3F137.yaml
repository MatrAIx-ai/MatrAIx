  hobbies: '[''Painting'', ''Salsa dancing'', ''Folkloric Ecuadorian dancing'', ''Gardening'', ''Cooking Ecuadorian cuisine'', ''Group hiking'', ''Volunteering at health fairs'', ''Reading mystery novels'',
