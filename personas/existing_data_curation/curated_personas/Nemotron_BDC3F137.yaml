  career_goals: As she approaches retirement, Alessandra intends to pivot from full‑time production to a mentorship and consultancy role. She plans to teach a community‑college course in dental and ocular
    prosthetic technology, passing her hands‑on expertise to a new generation of technicians. Simultaneously, she aims to launch a boutique lab that specializes in personalized, artistically crafted ocular
    prostheses, leveraging the latest digital scanning and 3D printing tools to offer culturally responsive designs. Alessandra also hopes to remain active in professional associations, attend workshops
    on emerging materials, and eventually hand over a modest family‑run operation to her son‑in‑law while continuing to volunteer at local health fairs and outreach programs.
