personas:
  professional: Ivan Diazdiaz is a 26‑year‑old full‑stack software engineer who blends rigorous computer‑science fundamentals with hands‑on tinkering—building custom PCs and IoT prototypes after work—and
    leads cloud‑native AI projects with a pragmatic, well‑documented coding style while they quietly manage the lingering worry of perfectionism that fuels their meticulous sprint meetings.
  sports: Ivan Diazdiaz balances solitary hikes in Congaree National Park with weekly pickup soccer games, holds season tickets for the Columbia Gamecocks, participates in a community cycling club, and
    they rely on yoga to offset back pain from long coding sessions, embodying a fitness routine that favors steady balance over extreme competition.
  arts: Ivan Diazdiaz immerses themselves in sci‑fi novels by N.K. Jemisin, listens to cumbia legends like Celso Piña while cooking, attends local digital‑art gallery openings, dabbles in generative‑art
    scripts in Python, and they dance at community festivals despite occasionally stepping on their own feet, reflecting a creative curiosity tempered by a cautious social streak.
  travel: Ivan Diazdiaz plans trips with spreadsheet precision, having explored Oaxaca’s markets and Teotihuacan, dreaming of a tech‑conference‑plus‑Alps adventure in Japan, while they budget for a future
    Patagonia trek and prefer boutique guesthouses that provide quiet meditation space.
  culinary: Ivan Diazdiaz fuses heritage cooking of mole and tamales with modern techniques like sous‑vide, favoring ingredients such as ancho chilies and cacao nibs, hosts 'code-and-cook' evenings where
    friends debug code while tasting tacos al pastor, yet sometimes burns tortilla edges when multitasking, a quirk they laugh about.
  core: Ivan Diazdiaz is a 26‑year‑old software engineer who balances relentless tech curiosity with mindfulness, worries about perfect code while perfecting mole, and they seek equilibrium between solo
    hikes, community coding workshops, and carefully budgeted startup dreams.
background:
  cultural: Ivan was raised in a Mexican‑American household where Spanish was spoken at home and family gatherings centered around food, music, and Catholic traditions. Celebrations such as Día de los Muertos
    and Las Posadas remain important to him, and he regularly participates in local Mexican cultural events in Columbia, bridging his heritage with the Southern community. His parents immigrated to the
    United States, and their perseverance instilled in him a strong work ethic and respect for education. While he embraces Southern hospitality and enjoys regional BBQ, he also preserves Mexican customs
    by cooking traditional meals, listening to regional Mexican radio, and staying involved with the Hispanic cultural center. This bicultural experience informs his worldview, fostering adaptability, empathy,
    and a desire to create technology that honors and serves diverse communities.
