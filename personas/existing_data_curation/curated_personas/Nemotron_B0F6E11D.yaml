  career_goals: Over the next five years Ivan aims to advance to a senior software engineer role, leading a small team on cloud‑native projects that leverage AI to solve real‑world problems, such as improving
    healthcare data accessibility for underserved communities. He plans to obtain AWS Solutions Architect and Google Cloud Professional Data Engineer certifications, and eventually pursue a master's degree
    in Computer Science focused on artificial intelligence. Ivan also aspires to mentor junior developers, contribute to open‑source projects, and perhaps launch his own startup that blends his Mexican
    cultural heritage with technology, like a platform for local artisans to sell handcrafted goods online. Recognizing his sensitivity to stress, he seeks workplaces that prioritize work‑life balance,
    provide mental‑health resources, and foster collaborative yet flexible environments.
