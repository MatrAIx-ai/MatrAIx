personas:
  professional: Dora Mashburn, a budding teen illustrator, leverages their meticulous organizational skills and skeptical eye to produce detailed digital and traditional artwork, and they aim to blend socially
    conscious themes with commercial illustration by the time they enroll in a BFA program.
  sports: Dora Mashburn, who clocks regular runs on the Sierra trail, follows the Reno Aces baseball team and supports the Nevada Wolf Pack basketball squad, and sometimes joins the local trail running
    club for group workouts, viewing fitness as a disciplined counterbalance to their artistic intensity.
  arts: Dora Mashburn, an avid participant in Reno's weekly Art Walk, draws inspiration from the surreal landscapes of Hayao Miyazaki, the indie melodies of Phoebe Bridgers, and the graphic storytelling
    of Emily Carroll, and they regularly sketch at the Reno Museum of Art while curating a personal collection of science‑fiction novels that fuel their illustrative imagination.
  travel: Dora Mashburn, a teen who prefers meticulously planned road trips over spontaneous getaways, has already captured photos of desert sunsets at the Mojave and dreams of exploring the mural‑rich
    streets of Berlin and the anime districts of Kyoto, often budgeting travel expenses through a side gig tutoring younger kids in drawing.
  culinary: Dora Mashburn, an intermediate home cook, loves whipping up avocado toast with smoked salmon, crafting spicy ramen bowls with homemade broth, and baking banana bread for late‑night study sessions,
    while often snacking on mango smoothies and kale chips to keep energy levels steady during long art projects.
  core: Dora Mashburn blends relentless artistic ambition with a habit of over‑analyzing every brushstroke, a stubborn thriftiness that occasionally fuels impulsive tech splurges, and a tendency to lose
    sleep worrying about future competitions.
background:
  cultural: Dora is a white American of primarily German‑Irish ancestry, raised in Reno, Nevada. Her family’s modest middle‑class upbringing emphasized self‑reliance, punctuality, and a love for the outdoors,
    reflecting the frontier spirit of the Silver State. Reno’s eclectic cultural mix, including its vibrant local art scene, proximity to the Burning Man festival, and exposure to a diverse flow of visitors,
    has nurtured her appreciation for unconventional artistic expression. While she identifies with mainstream American cultural norms, her experiences in the high desert and mountain environment have instilled
    a strong connection to nature, community festivals, and a DIY ethos that shapes her creative outlook.
