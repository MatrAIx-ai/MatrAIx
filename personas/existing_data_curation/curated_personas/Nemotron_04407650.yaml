    teaching art'']'
  career_goals: Dora aims to complete her GED within the next year and enroll in a Bachelor of Fine Arts program, focusing on illustration or graphic design, preferably at the University of Nevada, Reno
    or a specialized art college in California. She aspires to become a professional illustrator for books, video games, or animation, and dreams of showcasing her work in galleries and winning national
    art competitions. Her competitive drive fuels a desire to lead community art initiatives, such as organizing mural projects or curating local exhibits. Long‑term, she hopes to establish a sustainable
    freelance practice that blends commercial illustration with personal, socially conscious art, and eventually open a community art space that mentors emerging artists.
