    "Bicycle commuting and urban exploration"]'
  career_goals: Jin Wei aims to carve a career at the intersection of technology and art, seeking roles that allow him to explore novel, interdisciplinary projects without rigid corporate structures. He
    aspires to work as a creative technologist or interactive media developer in a forward‑thinking studio or startup, where he can design immersive installations, AI‑driven generative art platforms, and
    user‑centric digital experiences. Over the next five years, he hopes to launch his own boutique studio in Brooklyn that collaborates with local artists and technologists to produce culturally resonant,
    technology‑enhanced artworks that draw on his East Asian heritage. He is also interested in pursuing research opportunities in human‑computer interaction that investigate how abstract concepts and cultural
    aesthetics shape user engagement. Flexibility, collaborative environments, and the freedom to experiment are core to his professional ambitions.
