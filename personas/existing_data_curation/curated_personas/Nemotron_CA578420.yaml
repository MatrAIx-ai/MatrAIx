personas:
  professional: Jin Amano, a 25‑year‑old creative technologist based in Brooklyn, merges Python‑powered machine learning, interactive p5.js coding, and Adobe design expertise to build AI‑driven generative
    art installations, thriving on spontaneous brainstorming and collaborative hackathons while often wrestling with the self‑imposed pressure of looming deadlines.
  sports: Jin Amano cycles to work through Brooklyn’s boroughs with the NYC Bike Ride Club, cheers for the Brooklyn Nets and New York Knicks, joins spontaneous pick‑up basketball games at Prospect Park,
    hits the local climbing gym in winter, and takes occasional weekend trips to the Catskills for snowboarding, preferring fluid, community‑driven activity over regimented gym schedules.
  arts: Jin Amano immerses themselves in avant‑garde visual and auditory worlds, drawing inspiration from the immersive data sculptures of Refik Anadol, the glitch‑laden soundscapes of Aphex Twin, and the
    minimalist brushwork of Yayoi Kusama, while regularly attending performance art shows at the Brooklyn Academy of Music and participating in improv comedy nights at The Bell House.
  travel: Jin Amano prefers spontaneous, budget‑flexible trips that blend urban exploration with cultural immersion, having zip‑lined through Tokyo’s Shibuya streets, sampled street food in Shanghai’s Yuyuan
    Bazaar, trekked the misty forests of Kyoto, road‑tripped upstate New York’s Hudson Valley, and now daydreams about the geothermal pools of Iceland and the neon alleys of Seoul.
  culinary: Jin Amano enjoys crafting Japanese‑Chinese fusion dishes such as miso‑marinated char siu bao, ramen carbonara with pork belly, and matcha‑infused tiramisu, often sourcing fresh seafood from
    the Brooklyn Fish Market, experimenting with kombu broth and Sichuan peppercorns, and boasting a moderate home‑cooking skill that balances meticulous plating with occasional over‑spicing.
  core: Jin Amano is a restless 25‑year‑old who codes generative art by day, pedals through Brooklyn’s streets by night, hoards every new graphics tablet within reach, procrastinates deadlines while thriving
    on spontaneous creative chaos, and never leaves home without a sketchbook and a pack of ramen.
background:
  cultural: Jin Wei Amano is a second‑generation East Asian American, born to a Chinese father and Japanese mother who met while studying in New York. Raised in a bilingual household in Brooklyn, he grew
    up speaking Mandarin at home, learning Japanese from his mother, and becoming fluent in English through school and the city's multicultural environment. He celebrated both Chinese New Year and Japanese
    festivals such as Obon and the Cherry Blossom (Sakura) viewing, fostering a deep appreciation for the customs, food, and artistic traditions of both cultures. This mixed heritage informs his aesthetic
    sensibility, often blending minimalist Japanese design principles with the vibrant color palettes of Chinese folk art. His experiences navigating the diverse neighborhoods of Brooklyn have also shaped
    a cosmopolitan outlook, blending Eastern cultural values of community and respect for tradition with the Western emphasis on individual creativity and innovation.
