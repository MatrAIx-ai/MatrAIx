  career_goals: Raul dreams of becoming a future inventor‑engineer who designs fun, useful gadgets—like a portable solar charger for his family's trips back to Guatemala or a robot that can help with household
    chores. He is also fascinated by video game design and hopes to create games that blend learning with adventure. While he enjoys soccer and occasionally imagines playing professionally, his primary
    ambition centers on using his curiosity and practical skills to build things that improve everyday life for his community both in California and in his parents' hometown.
