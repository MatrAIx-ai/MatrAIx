personas:
  professional: Raul Ramirez is an aspiring junior architect who transforms curiosity into practical blueprints by constructing sprawling LEGO cities and intricate Minecraft realms, while their relaxed
    attitude to tidy-up leads to a charmingly chaotic workspace that fuels their competitive drive to out‑build friends.
  sports: Raul Ramirez is a spirited member of the River Valley Rovers youth soccer club, idolizes forward Lionel Messi for his skillful dribbling, competes fiercely in weekend matches while still enjoying
    flexible, unstructured kickabouts at the neighborhood park, and cheers for the City Eagles during televised games.
  arts: Raul Ramirez enjoys sketching dinosaurs inspired by illustrated works of John Long and reads space picture books featuring Neil deGrasse Tyson, while their evenings are filled with lively folk tunes
    by Los Camperos and lively performances by The Wiggles, which prompt spontaneous dancing and occasional karaoke attempts.
  travel: Raul Ramirez loves weekend expeditions to the nearby botanical garden and the historic stone plazas of the regional highlands, has already explored the rainforest canopy of Costa Rica, and dreams
    of sailing on the Nile to see ancient Egyptian temples.
  culinary: Raul Ramirez assists in preparing tamales with masa, pork, tomatillo salsa, and olives, and helps simmer pepian featuring chicken, roasted tomatillos, pumpkin seeds, and aromatic spices, showcasing
    an intermediate cooking skill honed under the watchful eye of their grandparents while proudly tasting the rich, traditional flavors.
  core: Raul Ramirez is a calm, inquisitive builder who balances competitive LEGO conquests with relaxed savings habits, lion‑hearted soccer play, and a love for traditional dishes and folk rhythms, all
    while navigating a delightfully messy world.
background:
  cultural: Raul grew up in a bilingual Guatemalan household in Chino Hills, California. At home, Spanish is spoken daily, and he participates in cultural traditions such as celebrating Día de la Independencia
    on September 15 and joining community events at the local Guatemalan cultural center. He enjoys family meals featuring staples like tortillas, beans, and tamales, and has learned to prepare them alongside
    his grandparents. Guatemalan folk rhythms, especially marimba music, fill the house during gatherings, influencing his love for rhythm and dance. While fully integrated into the diverse Los Angeles
    County community—attending school, playing with neighbors, and exploring local parks—Raul maintains a strong connection to his heritage through language, food, and cultural celebrations, which shape
    his worldview and future aspirations.
