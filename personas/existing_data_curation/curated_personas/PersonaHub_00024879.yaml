persona_description: A computer scientist who specializes in the field of computer networks, particularly in the design and implementation of high-speed digital networks. He has experience with the Cambridge
  Fast Ring, a 50Mbit/second local area network, and the Cambridge Backbone Ring, a 500Mbit/second metropolitan area network. He has worked on experiments in digital video for workstations, culminating
  in a distributed networked multimedia system called Pandora. He is familiar with the decommissioning of the Cambridge Fast Rings in 1994 and the replacement with switched ATM networks.
