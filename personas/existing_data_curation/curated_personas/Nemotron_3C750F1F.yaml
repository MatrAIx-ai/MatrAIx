  hobbies: '[''Zumba'', ''Salsa Dancing'', ''Hiking (Sonoran Desert)'', ''STEM Outreach Mentoring'', ''Cooking Mexican Cuisine'', ''Hosting Potluck Gatherings'', ''Listening to Science Podcasts'', ''DIY
    Home Organization'', ''Indoor Herb Gardening'', ''Community Volunteering'']'
  career_goals: Yazmine aims to transition from a sales associate to a store manager within the next two years, leveraging her analytical background to implement data‑driven decision‑making on the sales
    floor. She aspires to become a district or regional manager, overseeing multiple locations where she can standardize efficient processes and mentor diverse teams. To support these goals she plans to
    earn a professional certification in retail analytics or pursue an MBA focused on operations management. In the long term, she dreams of opening a boutique that fuses modern retail technology with Mexican‑inspired
    design, creating a community hub that celebrates her heritage while embracing innovation.
