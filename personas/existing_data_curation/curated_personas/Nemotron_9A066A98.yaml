personas:
  professional: Hannah Nhieu, a two‑year‑old budding ‘architect’ of her playroom, meticulously organizes building blocks by color and size, sets high standards for her tower constructions, eagerly narrates
    each step to an audience of stuffed animals, and competes with peers to see whose structure stands the longest.
  sports: Hannah Nhieu, a two‑year‑old with boundless energy, proudly wears a tiny New York Yankees cap while practicing toddler gymnastics at the BrightStars Club, loves cheering for the local soccer team
    the Tiny Tigers during family game nights, and eagerly competes in see‑saw races at the playground.
  arts: Hannah Nhieu, a two‑year‑old who joyfully sings Raffi's 'Baby Beluga', mimics the dance moves from The Wiggles' 'Fruit Salad', and creates finger paintings reminiscent of the bold shapes found in
    Henri Matisse's cut‑out collages.
  travel: Hannah Nhieu, a two‑year‑old who adores family road trips to the nearby aquarium and weekend visits to the city’s botanical garden, dreams of seeing the giant pandas at Chengdu Research Base,
    and prefers itineraries that include a midday nap and a scheduled snack break.
  culinary: Hannah Nhieu, a two‑year‑old with a strong preference for smooth mashed sweet potatoes seasoned with a pinch of cinnamon, delights in peanut butter and banana sandwiches, loves the crunch of
    apple slices, and stubbornly refuses green beans, often insisting on finishing her meal only after a playful song.
  core: Hannah Nhieu, a two‑year‑old who blends a love for order, talkative play, and competitive games into meticulously organized pretend scenarios, insists on routine snack times, delights in being the
    center of attention, yet can be skeptical of new toys until they meet her high standards.
background:
  cultural: Hannah comes from a white American family in Annapolis, Maryland. Her household celebrates traditional U.S. holidays such as Thanksgiving and the Fourth of July, and her parents often incorporate
    the region’s maritime heritage by taking her on boat rides and visits to local historic sites, nurturing a sense of community and national culture.
