persona_description: A process engineer who specializes in the development of rapid and accurate methods for measuring the size and shape of nanoparticles in dispersions. His research interests include
  developing new manufacturing and processing methods for nanoparticles, as well as using nanoparticles in modern applications such as biotechnology and as catalysts. He has expertise in using plasmonic
  gold nanorods as contrast agents for diagnosing cancer, and has developed a new method for measuring the length and diameter distribution of these particles in a single experiment, which allows for a
  comprehensive and quantitative analysis of these highly interesting particle systems.
