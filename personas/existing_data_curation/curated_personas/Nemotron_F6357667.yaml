personas:
  professional: Jhonn Tossas is a 47‑year‑old precision machinist and CNC programmer with two decades of hands‑on experience who blends a practical, lean‑oriented mindset with a curiosity for emerging technologies,
    while navigating a relaxed attitude toward deadlines, a penchant for flexible scheduling, and an assertive yet cooperative approach to mentoring junior staff as they aim for a supervisory role and eventually
    a boutique shop.
  sports: Jhonn Tossas enjoys low‑key recreation such as fishing on Lake Houston with the Lake Houston Anglers Association and weekend hikes at Brazos Bend State Park, while rooting for the Houston Astros,
    Texans, and Rockets and occasionally joining community softball games when invited.
  arts: Jhonn Tossas finds creative release strumming an acoustic guitar to classic folk tunes by Joan Baez and ranchera ballads of Vicente Fernández, appreciates the murals of Frida Kahlo, and often attends
    local performances featuring the band Los Lobos, reflecting a deep connection between craftsmanship and artistic expression.
  travel: Jhonn Tossas favors road‑trip itineraries that blend quiet getaways with cultural stops, having spent summers exploring the historic River Walk of San Antonio, the Hill Country vineyards of Fredericksburg,
    and dreaming of a future visit to Oaxaca’s artisan markets, while balancing travel plans with the financial realities of launching their own shop.
  culinary: Jhonn Tossas enjoys cooking mole poblano, tamales de elote, and slow‑cooked carnitas, mastering the art of homemade salsa with fresh chilies and cilantro, and often pairs meals with a cold cerveza
    while swapping recipes at the local farmers market, though they sometimes over‑season in moments of stress.
  core: Jhonn Tossas is a meticulous yet laid‑back master of precision machining who channels a love for solitary craft projects, worries about perfection, and balances a disciplined work ethic with a fondness
    for spontaneous guitar sessions and family‑style cooking.
background:
  cultural: Jhonn was raised in a bilingual Mexican‑American household in the Greater Houston area. His parents emigrated from Veracruz, and Spanish remains the language of family conversations, while English
    is used at school and work. He grew up celebrating Día de los Muertos, Mexican Independence Day, and religious holidays with close family, often preparing traditional foods together. The strong emphasis
    on family cohesion and respect for skilled crafts in his heritage informs his dedication to precision work and his desire to pass knowledge to the next generation. He maintains ties to the local Mexican
    community through a church congregation and occasional participation in cultural festivals, where he shares his love of Mexican cuisine and music with friends and neighbors.
attributes:
  skills: '["CNC programming (Fanuc, Haas, Siemens)", "Manual lathe and mill operation", "Blueprint and technical drawing interpretation", "Precision measurement (CMM, micrometers, laser probes)", "Machine
    maintenance and troubleshooting", "Lean manufacturing and continuous improvement", "Quality control (ISO 9001, statistical process control)", "CAD/CAM software (SolidWorks, Mastercam)", "Metallurgical
    analysis and material selection", "Apprentice training and mentorship", "Industrial safety compliance (OSHA)", "Data analysis for process optimization"]'
  hobbies: '["Restoring classic cars (1972 Chevrolet Camaro)", "Woodworking and custom furniture making", "Fishing at Lake Houston", "Cooking Mexican cuisine (mole, tamales, pozole)", "Playing acoustic
    guitar", "Model airplane building", "Hiking in Brazos Bend State Park", "Reading engineering and technology magazines", "Participating in local machining meet‑ups", "Volunteering to teach basic tool
    skills to community youth"]'
  career_goals: Jhonn aims to move into a supervisory position within the next three years, leveraging his technical expertise to lead a team of machinists. He is pursuing NIMS Level III certification in
    CNC machining and plans to obtain a certificate in engineering management to broaden his managerial skill set. In the longer term, he dreams of opening a boutique machine shop that specializes in low‑volume,
    high‑precision parts for regional aerospace and medical‑device firms, allowing him to merge his practical craftsmanship with the innovative ideas he enjoys exploring. He also hopes to develop a formal
    apprenticeship program that gives local youth a pathway into skilled trades.
