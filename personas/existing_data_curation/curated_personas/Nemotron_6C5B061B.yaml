    ''Apprentice training and mentorship'', ''Green building and sustainable construction techniques'']'
  hobbies: '[''Visiting art galleries and local museum exhibitions'', ''Landscape photography'', ''Sketching and drawing architectural details'', ''Woodworking and small carpentry projects'', ''Fishing
    and outdoor recreation'', ''Gardening (vegetable and herb garden)'', ''Reading biographies and construction trade publications'', ''Attending a small church study group'', ''Volunteering as a carpentry
    mentor at the community center'']'
  career_goals: Jordan aims to transition from first‑line supervision to senior project management within the next five years, securing a PMP certification and advanced OSHA training. He is passionate about
    mentoring the next generation of tradespeople, establishing a formal apprenticeship program at his company, and championing safe, environmentally responsible construction practices. Ultimately, he envisions
    launching a boutique consulting firm that helps small contractors in rural Missouri adopt modern, sustainable methods while preserving the region’s architectural heritage. He also hopes to contribute
    to community projects, such as overseeing the renovation of the local historic church and community center.
