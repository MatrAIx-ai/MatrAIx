personas:
  professional: Jordan Dick, a seasoned construction supervisor with three decades of on‑site leadership, leverages meticulous blueprint reading, OSHA‑compliant safety oversight, and emerging BIM expertise
    to drive projects on time, while they apply a calm, methodical nature and love for heritage architecture to shape a mentorship style that fuses tradition with sustainable innovation.
  sports: Jordan Dick supports the Kansas City Chiefs and St. Louis Cardinals, they spend mornings kayaking on the Missouri River, join a community senior softball league each spring, and participate in
    a seasonal fishing tournament at Lake of the Ozarks, balancing low‑impact exercise with a love for outdoor recreation.
  arts: Jordan Dick frequents the Missouri History Museum’s art series, draws inspiration from the rural realism of Andrew Wyeth and the architectural grace of Frank Lloyd Wright, studies Ansel Adams’ photography
    techniques, and they relax to the smooth saxophone of John Coltrane and the folk ballads of John Prine after evenings at the St. Louis Symphony Orchestra.
  travel: Jordan Dick enjoys methodical road trips to Midwestern architectural gems—like the Frank Lloyd Wright‑designed Unity Temple in Illinois and the historic homes of Savannah, Georgia—while they plan
    a dream pilgrimage to Barcelona’s Modernist landmarks and a winter getaway to Quebec’s Old Town for its cobblestone charm.
  culinary: Jordan Dick, an adept home chef, transforms garden‑fresh heirloom tomatoes, sweet corn, and river‑caught trout into rustic rosemary‑infused stews and cedar‑smoked fish, they proudly hunt for
    quality cast‑iron cookware at local farmers’ markets, yet occasionally indulge in a buttery pecan pie slice with a splash of bourbon.
  core: Jordan Dick, a tranquil yet inquisitive craftsman, merges a lifelong devotion to sturdy, sustainable building with a quiet passion for rustic art, they always plan ahead, mentor younger tradespeople,
    and find solace in fishing and sketching the Missouri countryside.
background:
  cultural: Jordan was raised in rural central Missouri in a traditional, middle‑class white family with deep roots in the agricultural community. He grew up attending a local public high school and a Protestant
    church, where values of hard work, self‑reliance, and community service were emphasized. The Midwestern cultural emphasis on modesty, practicality, and cordial neighborliness shaped his worldview, while
    his marriage and long‑standing involvement in his town’s church and civic groups reinforced a sense of belonging. Though his upbringing was conventional, his natural curiosity has led him to appreciate
    the arts and new ideas, integrating these broader influences into his personal and professional life.
