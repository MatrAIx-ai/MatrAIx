  hobbies: '[''Reading (historical nonfiction, contemporary literature)'', ''Vegetable gardening'', ''Korean calligraphy'', ''Birdwatching'', ''Jigsaw puzzles'', ''Tea ceremony'', ''Knitting'', ''Pottery'']'
  career_goals: At this stage of her career, Evette aims to transition into a leadership role where she can mentor novice teachers and shape district-wide instructional standards. She hopes to author a
    guidebook on practical classroom strategies that blend innovative ideas with proven methods, and she aspires to earn an advanced certification in adult education. While she values stability, she also
    seeks to leave a lasting impact on her community by developing after-school programs that encourage lifelong learning and cultural appreciation, ultimately planning a graceful retirement that includes
    volunteer tutoring for underserved learners.
