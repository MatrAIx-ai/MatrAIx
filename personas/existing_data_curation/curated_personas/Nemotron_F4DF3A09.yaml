  hobbies: '[''Gardening (heirloom tomatoes, roses)'', ''Quilting and knitting'', ''Historical fiction reading'', ''Genealogy research'', ''Southern cooking'', ''Volunteering at senior center'', ''Birdwatching'',
    ''Church choir participation'', ''Bridge club'']'
  career_goals: Denise's ambitions revolve around preserving her legacy and giving back to her community. She aims to finish a handwritten memoir documenting her family's genealogy and personal reflections,
    and to donate this archive to the Greenville County Library. She also wishes to mentor younger volunteers at the local senior center, sharing her organizational expertise. Maintaining her health and
    independence to enjoy gardening and community events remains a top priority. Additionally, she hopes to participate in a regional quilting exhibition, showcasing her latest work.
