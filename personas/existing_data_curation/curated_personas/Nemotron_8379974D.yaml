  hobbies: '[''Attending local sports events'', ''Pick‑up soccer'', ''Community volunteering'', ''Exploring craft breweries'', ''Board and party video games'', ''Hiking and biking'', ''Social media video
    creation'']'
  career_goals: Aaron aims to move from his current receptionist role into a supervisory or office‑manager position within the next three to five years. He plans to earn certifications such as the Certified
    Administrative Professional and may pursue an associate degree in business administration to deepen his management knowledge. His medium‑term goal is to develop expertise in operations and team leadership,
    eventually overseeing a small office or customer‑experience department. Long‑term, he envisions either running a community‑focused small business, such as a local café, or occupying a senior administrative
    role where he can shape workplace culture and service standards.
