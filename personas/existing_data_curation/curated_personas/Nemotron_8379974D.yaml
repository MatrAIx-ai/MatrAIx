personas:
  professional: Aaron Neal, a 26‑year‑old receptionist at a busy downtown office, leverages their polished communication, conflict‑resolution, and multitasking skills to keep the front desk running smoothly,
    while they love structure that keeps processes orderly yet their relaxed attitude toward strict planning lets them adapt on the fly during high‑volume periods.
  sports: Aaron Neal, an avid fan of the Grand Rapids Griffins and occasional participant in pick‑up soccer at community fields, follows the Griffins' schedule religiously, supports the Detroit Lions for
    football, and plays in a local adult soccer league, while they maintain their weekend routine of trail runs along the Grand River.
  arts: Aaron Neal, a board‑game enthusiast who hosts weekly game nights, also enjoys indie folk concerts by The Lumineers, streaming video‑games like Mario Party for social fun, and attending local art
    festivals featuring muralists such as Lyle Tiley, allowing creative expression to balance their structured work life, and they find these outings recharge their social energy.
  travel: Aaron Neal favors low‑cost road trips to nearby destinations like Chicago's Millennium Park and Mackinac Island, planning itineraries loosely to leave room for spontaneous detours, while they
    budget travel expenses through a dedicated savings jar and occasionally splurge on boutique B&B stays when time permits.
  culinary: Aaron Neal, a craft‑beer aficionado, enjoys sampling IPAs like Grand Rapids Brewing's Locust alongside bar‑becued chicken wings and loaded nachos, frequently cooks simple dishes such as shrimp
    tacos with lime‑cilantro slaw at home, and they love pairing desserts like warm apple crumble with a stout.
  core: Aaron Neal, 26, blends a love for structured front‑desk efficiency with a spontaneous social calendar, juggling craft‑beer outings, community volunteering, and ambitions for office‑management leadership
    while they occasionally let relaxed habits derail meticulous planning.
background:
  cultural: Aaron comes from a middle‑class, white American family with deep roots in the Grand Rapids area. His upbringing reflects typical Midwestern values such as community involvement, reliability,
    modesty, and a strong work ethic. He was raised with an appreciation for local traditions like county fairs, farmers markets, and volunteerism, and his family's heritage includes a blend of Northern
    European ancestry common in the region, which has subtly shaped his straightforward communication style and sense of collective responsibility.
attributes:
