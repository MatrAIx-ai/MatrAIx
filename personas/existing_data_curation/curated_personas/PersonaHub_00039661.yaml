persona_description: A public health researcher with a focus on the prevention and treatment of chronic diseases such as multiple sclerosis (MS). The individual is interested in identifying modifiable risk
  factors for MS, such as vitamin D and smoking, and their interaction with Epstein-Barr virus infection. They are looking for a large-scale study to examine the individual and joint effects of these factors
  on MS risk, and are planning to use the Finnish Maternity Cohort (FMC) to conduct this study.
