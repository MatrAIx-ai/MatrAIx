  hobbies: '["Salsa and bachata dancing", "Cooking traditional Puerto Rican dishes", "Participating in community festivals and parades", "Volunteer event logistics", "Community gardening", "Listening to
    Latin music and reggaeton", "Watching telenovelas", "Social board‑game nights", "Crochet and jewelry making"]'
  career_goals: Ivonne intends to re‑enter the workforce in a role that blends routine tasks with regular interaction with people. She aims to obtain a certification as a Home Health Aide or Certified Nursing
    Assistant, leveraging her caregiving experience and bilingual skills to support elderly or disabled clients within her community. Parallel to that, she hopes to develop a small weekend‑catering business
    specializing in authentic Puerto Rican cuisine, eventually expanding it to a full‑time venture. In the longer term, she envisions moving into a supervisory position at a local community organization
    where she can help design inclusive programs for the Puerto Rican diaspora in Paterson.
