  hobbies: '[''Art gallery visits'', ''Watercolor painting'', ''Photography'', ''Reading scientific journals and literature'', ''Exploring AI and digital art tools'', ''Gardening tropical plants'', ''Weekly
    chess club'', ''Traditional Nicaraguan cooking'', ''Beach walks'', ''Volunteer mentoring in STEM'']'
  career_goals: Although retired, Nazario aims to remain intellectually active and to give back to his community. He plans to complete a memoir that intertwines his Nicaraguan heritage with his experiences
    in engineering, preserving family stories for future generations. He seeks to mentor high‑school and college students in STEM through local after‑school programs, using his competitive spirit to inspire
    curiosity. Additionally, he hopes to serve on the advisory board of a senior arts center, helping shape exhibitions that bridge science and creativity. Maintaining his health and independence so he
    can continue these pursuits is a central personal ambition.
