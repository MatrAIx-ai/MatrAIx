  career_goals: Pablo aims to transition into a senior commercial leadership role, such as Director of Sales or VP of Business Development, where he can shape the company's growth strategy across the U.S.
    Southwest and Latin American markets. He wants to spearhead the launch of emerging technology solutions, mentor the next generation of sales talent, and champion diversity and inclusion initiatives
    that reflect his Salvadoran heritage. Long-term, he envisions launching his own consulting firm focused on bridging tech sales and multicultural market entry.
