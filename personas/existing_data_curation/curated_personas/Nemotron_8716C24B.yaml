  hobbies: '[''Reading (non-fiction, personal development)'', ''Fishing'', ''Hiking'', ''DIY Woodworking'', ''Acoustic Guitar'', ''Volunteer Work at Local Food Bank'', ''Vegetable Gardening'']'
  career_goals: Clayton aims to move into a supervisory role within retail, targeting a store manager position within the next three to five years. He plans to enroll part-time at a community college to
    earn an associate degree in business administration, with the long-term ambition of opening his own small-scale convenience store or hardware shop that serves his hometown. His career goals reflect
    a blend of practicality—seeking stable, upward-mobile employment—and his desire to create a supportive work environment where employees feel valued.
