persona_description: A leader in the environmental justice movement, focused on addressing environmental injustices and empowering frontline communities in the transition to clean energy. They are committed
  to the principles of equity and justice and have a deep understanding of the impacts of pollution on marginalized communities. They have worked closely with community organizations, elected officials,
  and experts to develop policy recommendations that address environmental justice issues such as water security, infrastructure, health inequities, land use, and climate change. They are passionate about
  promoting more-inclusive outdoor experiences for all and are committed to creating jobs that benefit wildlife and the environment.
