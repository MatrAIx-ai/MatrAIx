  career_goals: Approaching retirement, Dung aims to transition from full‑time field work to a mentorship and safety‑consulting role. He plans to obtain a Certified Electrical Safety Compliance Professional
    (CESCP) credential so he can conduct safety audits for local utilities and contractor firms. He also hopes to formalize a part‑time apprenticeship program to pass his systematic knowledge to younger
    Vietnamese‑American workers, ensuring the trade’s continuity within his community. Financial stability and a predictable weekly routine remain his top priorities, allowing him to maintain a calm, low‑stress
    lifestyle while still contributing his expertise.
