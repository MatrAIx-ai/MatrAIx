  hobbies: '[''Cooking traditional Mexican meals with family'', ''Reading historical fiction and mythology'', ''Keeping a personal journal'', ''Folkloric dance'', ''Jigsaw puzzles'', ''Herb gardening'',
    ''Playing soccer'', ''Youth book club participation'']'
  career_goals: Amelia aspires to become a bilingual elementary school teacher, hoping to inspire Mexican-American children and preserve cultural stories. She plans to study education in college, eventually
    earning a teaching credential. She also dreams of working part-time as a community health advocate, using her organizational strengths to run health-awareness workshops for families in Webster. In the
    long term she wants to balance a stable teaching career with volunteering at local cultural festivals.
