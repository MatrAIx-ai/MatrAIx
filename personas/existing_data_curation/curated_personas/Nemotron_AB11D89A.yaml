personas:
  professional: Amelia Carapia, a diligent middle school student, channels her methodical nature into leading the school’s book club, where they apply organizational skills and a practical mindset to curate
    reading lists, schedule meetings, and ensure every member follows the club’s routine.
  sports: Amelia Carapia plays midfield for the River Valley Youth Soccer Club, follows a structured training routine after school, and they are an avid fan of the US Women’s National Team and the local
    professional baseball team, the Springfield Cardinals, cheering them on during weekend games.
  arts: Amelia Carapia embraces creative expression through weekly folkloric dance lessons, adores the rhythmic storytelling of Lin‑Manuel Miranda’s Hamilton, enjoys painting scenes from mythology inspired
    by artists like Frida Kahlo, and they spend leisure time listening to the pop melodies of Taylor Swift and the instrumentals of Yiruma.
  travel: Amelia Carapia prefers meticulously planned trips, having explored the Grand Canyon on a family road trip and a historic tour of Rome’s ancient ruins, while they dream of future adventures to
    the Acropolis in Athens and the vibrant markets of Marrakech, balancing their love of history with practical budgeting.
  culinary: Amelia Carapia, an enthusiastic junior chef, follows grandmother’s step‑by‑step recipes to perfect tamales and cheese‑filled quesadillas, skillfully seasons dishes with fresh cilantro, roasted
    corn, and a pinch of cumin, and they delight in pairing meals with homemade horchata, though they sometimes over‑salt the sauce when excited.
  core: Amelia Carapia is a routine‑driven 13‑year‑old who flawlessly blends organization, a love for historical stories, and a healthy dose of soccer energy, while they occasionally over‑cook their favorite
    dishes out of sheer enthusiasm.
background:
  cultural: Amelia grows up in a Mexican-American household in Webster, Texas, where Spanish is spoken at home and English at school. Her family celebrates Día de los Muertos, Las Posadas, and Mexican Independence
    Day with homemade foods, music, and altars, reinforcing a strong sense of heritage. Catholic traditions and family gatherings are central, and she often helps prepare traditional dishes that have been
    passed down through generations. The close‑knit community of Mexican neighbors and the local Hispanic cultural center provide Amelia with opportunities to engage in cultural events, reinforcing her
    pride in her roots while navigating her bicultural identity.
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Bilingual Spanish-English communication'', ''Basic computer literacy (Microsoft Office, Google Workspace)'', ''Effective note-taking and summarizing'',
