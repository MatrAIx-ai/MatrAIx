personas:
  professional: Sean Burris is a veteran landscaper turned part‑time horticultural consultant who leverages decades of hands‑on groundskeeping, low‑maintenance garden design, and a pragmatic curiosity,
    allowing them to mentor apprentices and guide fellow seniors toward sustainable yard solutions in Jasper County.
  sports: Sean Burris follows the St. Louis Cardinals and the Kansas City Chiefs with quiet devotion, spends early mornings fishing at Lake Joplin and participates in the Jasper County Senior Walking Club,
    where they occasionally join a recreational bowling league for seniors.
  arts: Sean Burris immerses themselves in classic rock legends like The Rolling Stones, Led Zeppelin, and Lynyrd Skynyrd while spending evenings reading Stephen B. Oates' biographies of Missouri pioneers,
    and occasionally attends performances at the Joplin Little Theatre to support community arts.
  travel: Sean Burris favors short road trips to nearby destinations such as the Ozark National Scenic Riverways and historic St. Louis, enjoys occasional weekend getaways to Branson for live music shows,
    and dreams of a relaxed pilgrimage to the Grand Canyon alongside their grandson once health permits.
  culinary: Sean Burris crafts smoky BBQ ribs and slow‑cooked brisket using hickory chips, seasons them with a home‑grown rub of paprika, brown sugar, and garden‑fresh herbs, and pairs the meals with freshly
    harvested corn on the cob, heirloom tomatoes, and tangy coleslaw, showcasing a solid, hands‑on cooking skill set that they proudly display at family gatherings.
  core: Sean Burris is a nature‑driven, quietly curious retiree who blends practical horticultural expertise with a love for classic rock, mindful breathing, and modestly organized, slightly anxious rhythms
    of senior life, and they often find solace in solitary garden work.
background:
  cultural: Sean comes from a traditional Midwestern white heritage, likely with roots in English and Irish ancestry. Raised in a small‑town environment in Missouri, he values self‑reliance, hard work,
    and community cohesion. His upbringing emphasized family, church involvement, and respect for the land, fostering a practical yet curious mindset toward nature and a strong sense of duty to help neighbours.
    He maintains classic American cultural touchstones—pickup trucks, backyard barbecues, Sunday church, and a love of local sports—while also embracing evolving sustainable gardening practices.
attributes:
  skills: '["Plant identification", "Landscape design", "Irrigation system installation and maintenance", "Tree pruning and care", "Hardscape construction", "Equipment operation and maintenance", "Soil
    testing and amendment", "Integrated pest management", "Team coordination", "Safety compliance"]'
  hobbies: '["Gardening", "Fishing", "Bird watching", "Woodworking", "Reading Missouri history", "Church volunteer work", "Classic rock music", "Barbecue cooking", "Playing chess", "Mindfulness breathing"]'
  career_goals: As he approaches retirement, Sean aims to shift from full‑time work to part‑time consultancy, offering low‑maintenance, sustainable garden designs to fellow seniors and small businesses
    in Jasper County. He hopes to obtain a horticulture certification from a local community college, mentor a younger apprentice, volunteer his expertise for the Joplin community garden, and gradually
    reduce his workload to protect his health, lower stress, and free more time for family and hobbies while leaving an environmentally friendly legacy in his hometown.
