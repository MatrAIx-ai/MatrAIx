  career_goals: Although retired from full‑time employment, Patrick is eager to keep contributing. His primary objectives include mentoring apprentices and senior‑center volunteers in practical trades,
    launching a modest side venture selling handcrafted wooden items, compiling and preserving Mercer County’s local history for a community archive, and undertaking a series of short road trips to historic
    sites across Pennsylvania. He aims to blend his curiosity for new ideas with his pragmatic approach, ensuring his efforts have tangible benefits for his community.
