  hobbies: '[''Reading adventure and nature books'', ''Sketching animals and landscapes'', ''Building LEGO models'', ''Solving jigsaw puzzles'', ''Exploring local nature trails and collecting natural objects'',
    ''Block-based coding on a tablet'', ''Playing piano'']'
  career_goals: Although still young, Carolina envisions a future where she can work independently with a focus on tangible, real-world outcomes. She is fascinated by how living things are cared for, so
    she dreams of becoming a veterinarian or a wildlife biologist, helping animals in a quiet, methodical setting. She also imagines herself as a translator or multicultural educator, leveraging her bilingual
    abilities to bridge Spanish-speaking communities and English-dominant schools. In the short term, she aims to excel in middle school science classes, join a science club, and volunteer at a local animal
    shelter to gain hands-on experience.
