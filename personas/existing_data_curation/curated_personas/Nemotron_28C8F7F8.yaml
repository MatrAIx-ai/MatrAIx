personas:
  professional: Carolina Alcala, a ten-year-old aspiring game creator, spends afternoons coding simple block-based games on a tablet, applying the same methodical mindset they use for LEGO builds, while
    quietly dreaming of designing puzzles that blend adventure storytelling with educational challenges.
  sports: Carolina Alcala enjoys solo hikes in the San Fernando Valley hills, where they collect rocks and shells, and is a member of the Los Angeles County Parks Junior Explorers club, while cheering on
    the Los Angeles Dodgers on weekends and occasionally practicing basic soccer drills with neighborhood friends.
  arts: Carolina Alcala fills sketchbooks with detailed drawings of forest scenes and wildlife after reading adventure books like Gary Paulsen's Hatchet and the Magic Tree House series, practices piano
    pieces such as 'Für Elise', and draws inspiration from the animation style of Studio Ghibli's Princess Mononoke.
  travel: Carolina Alcala dreams of exploring Yosemite National Park's granite cliffs, has already visited the beach at Santa Monica to hunt for tide-pool shells, and loves planning future trips to the
    Grand Canyon on a shared family Pinterest board, balancing a love for natural wonders with the comfort of familiar family routines.
  culinary: Carolina Alcala helps prepare traditional dishes like gallo pinto, nacatamales, and quesillo during family independence celebrations, enjoys making fresh fruit salads with mango and pineapple,
    and often pairs their love of LEGO building sessions with homemade pizza topped with mozzarella and basil.
  core: Carolina Alcala is a structure-loving, solitary ten-year-old who blends their passion for puzzles, nature hikes, and coding with quiet creativity and a strong sense of family tradition, and they
    often find comfort in routine.
background:
  cultural: Carolina comes from a Nicaraguan family that maintains strong cultural ties despite living in Sylmar, California. At home, Spanish is spoken daily, and she celebrates traditions such as Día
    de la Independencia de Nicaragua with family gatherings and traditional foods like gallo pinto, nacatamales, and quesillo. Her parents emphasize respect for community and humility, values reflected
    in her cooperative nature. She occasionally participates in local Nicaraguan community events at the nearby cultural center, where she helps set up displays but prefers to observe rather than be the
    center of attention. The blend of Nicaraguan heritage and American upbringing shapes her bilingual identity and informs her interest in bridging cultural gaps.
attributes:
  skills: '[''Reading fluently'', ''Bilingual Spanish-English communication'', ''Basic arithmetic (multiplication/division)'', ''Puzzle and LEGO building'', ''Basic computer usage and block coding'', ''Attention
