personas:
  professional: Francheska Gomez is a seasoned sales manager with three decades of bilingual expertise, who leverages their pragmatic, structure‑loving yet flexible approach to coach teams, design resilient
    sales pipelines, and foster collaborative client relationships as they transition toward mentorship.
  sports: Francheska Gomez enjoys cheering on the Atlanta Braves and Atlanta United while staying active through weekly walks on nearby lake trails and seasonal community gardening, and they prefer the
    gentle rhythm of planting over formal gym workouts.
  arts: Francheska Gomez blends a love for cumbia and country music, often dancing to Selena and Dolly Parton at family gatherings, while they quilt patterns inspired by historic textiles and they also
    enjoy attending local community theater productions.
  travel: Francheska Gomez favors road‑trip adventures to historic towns like Charleston and the cultural richness of Oaxaca, planning trips around family visits and budget‑friendly stays at bed‑and‑breakfasts,
    while they balance a desire for relaxation with occasional spontaneous day‑trips to nearby state parks.
  culinary: Francheska Gomez excels at cooking mole, tamales, and pozole with Southern twists such as jalapeño‑infused barbecue sauce for pulled pork, favoring heirloom tomatoes, chiles de árbol, and smoked
    paprika, and they often host community potlucks to share these flavors.
  core: Francheska Gomez is a pragmatic, community‑oriented sales veteran who blends structured mentorship with a love for gardening, multicultural cooking, and harmonious collaboration, even if they occasionally
    misplace their planner.
background:
  cultural: Born to Mexican immigrant parents who first settled in Texas, Francheska grew up bilingual, speaking Spanish at home and English in school. Her family moved to Greenwood, South Carolina when
    she was a teenager, where she integrated Mexican traditions with Southern hospitality. She maintains strong cultural ties through family celebrations of Día de los Muertos, cooking family recipes, and
    speaking Spanish with relatives. Living in Abbeville County, she participates in local festivals, church activities, and community service, bridging her Mexican heritage with the close‑knit Southern
    community. This blended cultural identity informs her inclusive leadership style, love of food, and appreciation for both Mexican and Southern customs.
attributes:
  skills: '[''Sales strategy development'', ''Team leadership'', ''Client relationship management'', ''Negotiation and contract closing'', ''Bilingual communication (Spanish/English)'', ''Market forecasting
