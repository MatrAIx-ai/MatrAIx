  hobbies: '[''Gardening (heirloom vegetables, roses)'', ''Cooking traditional Mexican and Southern fusion dishes'', ''Volunteering at local food pantry and church events'', ''Reading historical fiction'',
    ''Walking/hiking in local nature trails and lakes'', ''Quilting'', ''Dancing to cumbia and country music'']'
  career_goals: Approaching retirement, Francheska aims to transition from day‑to‑day management to a mentorship and advisory role. She aspires to become a regional director or consultant where she can
    design flexible yet reliable sales frameworks, mentor the next generation of sales leaders, and champion culturally inclusive customer service. Additionally, she hopes to leverage her experience to
    support community initiatives, such as a small‑business incubator for local entrepreneurs, and to leave a legacy of collaborative, harmonious workplace culture.
