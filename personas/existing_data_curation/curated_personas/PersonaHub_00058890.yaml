persona_description: A cosmologist who is skeptical of the naturalistic theories of origins and is investigating the possibility that the arrangement of galaxies in the universe is best explained by purposeful
  placement. They are interested in the distribution of matter in the universe and the implications it has for the laws of physics and cosmology. They are also interested in the possibility of dark matter
  and dark energy, and how they could have contributed to the clumping of matter in the universe. They are likely to be curious and inquisitive about the nature of the universe and its origins, and are
  willing to question established theories and models to better understand the universe.
