  hobbies: '[''Hunting'', ''Fishing'', ''ATV riding'', ''DIY woodworking'', ''Playing acoustic guitar'', ''Attending high school football games'', ''Participating in 4-H livestock shows'', ''Volunteering
    at community center'']'
  career_goals: Jacob plans to finish his bachelor's degree in Business Administration within two years and seek a promotion to district manager for a regional agricultural supply chain. In the longer term,
    he aims to open his own independent farm-equipment and supply store in Eastland County, leveraging lean management and technology to serve local ranchers. He also intends to earn certifications in supply-chain
    management and pursue mentorship opportunities that will sharpen his strategic leadership skills.
