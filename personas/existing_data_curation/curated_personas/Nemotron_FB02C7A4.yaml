    communication (English & Tagalog)'', ''Use of cleaning management software'']'
  hobbies: '[''Community beach clean‑up volunteering'', ''Senior center activity coordination'', ''Ukulele playing'', ''Hula dancing'', ''Cooking Filipino‑Hawaiian fusion dishes'', ''Hiking Makapuʻu Trail'',
    ''Tropical gardening'', ''Reading about sustainable cleaning technologies'']'
  career_goals: Tinh aims to advance to a senior facilities manager position within the next five years, overseeing multiple properties and implementing sustainable cleaning practices. He plans to obtain
    the Certified Professional Cleaner (CPC) credential and a Building Operator Certification to solidify his technical expertise. Long‑term, he hopes to launch his own locally‑owned eco‑friendly cleaning
    business that provides jobs for other displaced workers and offers educational workshops on hygiene for the Honolulu community.
