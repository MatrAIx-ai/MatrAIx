persona_description: A veterinarian who specializes in the study of equine diseases, particularly the epidemiology and pathogenesis of equine encephalitis. His research interests include the development
  of diagnostic tests for equine encephalitis, the identification of the causative agent of equine encephalitis, and the characterization of the immune response to equine encephalitis. He has conducted
  research on the epidemiology of equine encephalitis in Mexico and has published several studies on the pathogenesis of equine encephalitis.
