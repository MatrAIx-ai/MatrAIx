personas:
  professional: Berta Maceda, an aspiring robotics engineer, channels their meticulous curiosity into designing autonomous maze‑solvers for their school’s robotics club, balancing cutting‑edge AI experiments
    with proven mechanical methods while maintaining a competitive edge over teammates.
  sports: Berta Maceda, a dedicated swimmer, trains thrice weekly with the Harbor City Aquatics Club, cheers for the Los Angeles Lakers during basketball season and the LA Dodgers in spring, and maintains
    a disciplined fitness routine that includes swim laps and occasional pick‑up basketball games, though they sometimes skip practice when anxiety spikes.
  arts: Berta Maceda, an enthusiastic piano student at the community Music Academy, spends evenings practicing pieces by Chopin and flamenco guitarist Paco de Lucía, draws nature sketches inspired by Monet's
    water lilies, and binge‑watches films starring Penélope Cruz, while their competitive nature drives them to perfect each performance.
  travel: Berta Maceda, an imaginative traveler, has explored Disneyland and the San Diego Zoo on family trips, enjoys weekend beach outings at Catalina Island, dreams of strolling through Barcelona’s Gothic
    Quarter and sampling paella near the Mediterranean, and meticulously plans each adventure on a scrapbook, though their anxiety sometimes leads them to over‑pack.
  culinary: Berta Maceda, a budding home chef, loves whipping up patatas bravas with spicy aioli, preparing a simple gazpacho with ripe tomatoes and cucumber, and mastering a homemade Spanish tortilla with
    potatoes and onions, while their snack habit of munching on cheddar cheese sticks often interferes with their disciplined meal planning.
  core: Berta Maceda merges a competitive, organized mind with a rich bilingual upbringing, channeling anxiety into meticulous journaling and robotics projects while juggling a love for flamenco rhythms,
    strategic saving, and spirited swimming sessions.
background:
  cultural: Berta comes from a Spanish heritage family that migrated to Southern California a generation ago. At home, Spanish is spoken daily, and traditional customs—such as celebrating Semana Santa,
    enjoying tapas with family, and listening to flamenco music—are integral to her upbringing. Living in Harbor City, a diverse neighborhood within Los Angeles County, she experiences a blend of Latino
    and broader American cultures, which enriches her bilingual identity and fosters a strong sense of community pride.
attributes:
