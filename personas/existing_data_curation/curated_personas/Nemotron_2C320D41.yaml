  hobbies: '[''Reading science‑fiction and mystery books'', ''Robotics club projects and Scratch coding'', ''Playing piano (intermediate level)'', ''Journaling for emotional reflection'', ''Sketching and
    drawing nature scenes'', ''Swimming'', ''Participating in Spanish cultural festivals and family gatherings'', ''Mindfulness and breathing exercises'']'
  career_goals: Berta aspires to channel her curiosity and practicality into a future career in biomedical engineering or environmental science, fields where she can merge scientific discovery with tangible
    solutions. She dreams of contributing to cutting‑edge research that improves public health or protects ecosystems, and she hopes to eventually mentor younger students—especially those from Spanish‑speaking
    backgrounds—by sharing her knowledge and disciplined work ethic.
