  hobbies: '["Church choir singing","Food bank volunteering","Community theater","Gardening (vegetables & herbs)","Baking pies and casseroles","Hiking local trails","Zumba fitness classes","Book club (contemporary
    fiction)","Quilting and crafting","Road trips with friends"]'
  career_goals: Donna aspires to move into a store manager role within the next two years, where she can apply her structured approach to streamline operations, enhance employee development, and boost profitability.
    She aims to design and implement a mentorship program for new hires, leveraging her training experience. In the longer term, she envisions overseeing multiple stores as a regional manager or opening
    her own boutique that reflects her love for community‑focused retail. She also hopes to expand her volunteer work by leading community outreach initiatives that combine her retail expertise with local
    charitable causes.
