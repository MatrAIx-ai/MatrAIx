personas:
  professional: A customer support specialist with a STEM background, Sherry Nowak blends technical troubleshooting with clear communication, mentors new hires with assertive yet compassionate guidance,
    and leverages data‑analysis tools to drive process improvements while pursuing ITIL, Six Sigma Green Belt, and business‑analytics certifications.
  sports: An avid outdoor enthusiast, Sherry Nowak hikes the Atlanta BeltLine and Blue Ridge trails as a member of the Atlanta Hiking Club, roots for the Atlanta Falcons and Braves, and competes on a local
    co‑ed softball league to blend solitary exercise with team camaraderie.
  arts: A culturally curious board‑game aficionado, Sherry Nowak enjoys listening to soul‑steeped blues artists like Leon Bridges, attending performances by the Atlanta Symphony Orchestra, and winding down
    with indie tabletop games such as Catan after coffee‑shop improv open‑mic nights.
  travel: A weekend adventure planner, Sherry Nowak frequently road‑trips to the Great Smoky Mountains, has explored New Orleans’ jazz districts, dreams of cherry‑blossom season in Kyoto, and, on a modest
    budget, maps out future hikes in Patagonia for a blend of structured itineraries and spontaneous escapes.
  culinary: A Southern‑flavored experimenter, Sherry Nowak cultivates rosemary, thyme, and basil in a modest herb garden to elevate classic shrimp‑and‑grits, collard greens, and a modern sous‑vide brisket
    with bourbon glaze, often pairing dishes with locally sourced honey‑mustard sauce.
  core: Sherry Nowak balances curiosity and practicality, turning tech support into mentorship, budgeting for growth while indulging in Southern‑spiced culinary experiments, and using yoga and hiking to
    counteract a busy, occasionally forgetful lifestyle.
background:
  cultural: Sherry grew up in a small town in the American South, steeped in Southern hospitality, close‑knit community ties, and a pragmatic, modest worldview. Her family’s roots in agriculture and local
    church gatherings fostered a strong sense of tradition, community service, and appreciation for Southern cuisine. While her white Southern upbringing emphasized respect, courtesy, and community involvement,
    her STEM education and subsequent work in diverse customer‑service environments broadened her perspective, allowing her to navigate both traditional Southern values and modern, tech‑driven settings
    with ease.
attributes:
  skills: '[''Technical troubleshooting'', ''Customer communication'', ''Data analysis (Excel, basic SQL)'', ''Process improvement'', ''Conflict resolution'', ''Training and onboarding'', ''Time management'',
