  hobbies: '[''Hiking'', ''Gardening'', ''Southern cooking'', ''Reading science & tech blogs'', ''Yoga'', ''Board games'', ''Coffee meet‑ups with friends'', ''Volunteer tutoring at library'', ''Learning
    Python'']'
  career_goals: Sherry aims to advance into a supervisory or team‑lead role within her customer service department, where she can mentor colleagues and drive systemic improvements. She also plans to transition
    toward a more technical support or data‑analysis position, building on her STEM background. To achieve this, she intends to earn certifications such as ITIL, Six Sigma Green Belt, and a data‑analytics
    credential, and eventually pursue a master's degree in business analytics. Her career ambition balances curiosity for new skills with pragmatic steps that enhance her value to her employer and provide
    long‑term stability.
