  career_goals: Bruce dreams of a future where he can blend his love of discovery with helping others. He frequently talks about becoming an environmental engineer who designs sustainable gadgets, a science
    teacher who makes learning exciting, or a pediatric doctor who cares for kids. His ambition is driven by a desire to solve real‑world problems, contribute positively to his community, and use his practical
    skills to make a difference.
