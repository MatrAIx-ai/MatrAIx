personas:
  professional: Bruce Rainey, a budding junior engineer in training, channels his love for building and modifying LEGO machines into early design thinking, applying meticulous organization and practical
    curiosity while calmly navigating school projects, and their natural kindness ensures collaborative play with friends.
  sports: Bruce Rainey plays midfielder for the Seattle Youth Soccer League’s Under‑11 team, idolizes the Seattle Sounders FC, enjoys weekend matches at Lumen Field, and balances organized practice with
    spontaneous backyard kickabout, though they sometimes skip a drill when a new LEGO set arrives.
  arts: Bruce Rainey draws whimsical cartoons inspired by Bill Watterson’s Calvin and Hobbes, dabbles on a beginner keyboard with tunes from John Williams’ Star Wars scores, and binge‑reads adventure novels
    by J.K. Rowling, allowing the creative works of Studio Ghibli and Imagine Dragons to shape their imaginative play.
  travel: Bruce Rainey loves weekend family trips to nearby nature spots like Olympic National Park and local treasures such as Pike Place Market, dreams of exploring the futuristic streets of Tokyo after
    reading sci‑fi, and prefers structured itineraries with plenty of time for leaf‑collecting hikes, though occasional jet lag scares them.
  culinary: Bruce Rainey favors easy comfort foods like mac‑and‑cheese and grilled cheese with tomato soup, experiments with simple sushi rolls using cucumber and avocado after watching cooking videos,
    and proudly adds a dash of cinnamon to apple slices, yet they often forget to clean the kitchen afterward.
  core: Bruce Rainey is a curiosity‑driven 10‑year‑old who melds LEGO engineering with nature journaling, worries more than peers but calms with breath work, and raids the pantry for snacks when nobody’s
    watching.
background:
  cultural: Bruce is raised in a middle‑class white American family in Seattle, Washington. His upbringing reflects the Pacific Northwest’s emphasis on environmental stewardship, outdoor recreation, and
    a tech‑savvy community. He participates in local library storytimes, attends community festivals that celebrate the city’s cultural diversity, and experiences a blend of traditional American values—such
    as independence, community service, and holiday traditions—with Seattle’s progressive, inclusive mindset. His family’s routines include weekend hikes in the Cascades, rainy‑day indoor projects like
    LEGO building, and an appreciation for the region’s seasonal changes.
