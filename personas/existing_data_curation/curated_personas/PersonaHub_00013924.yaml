persona_description: A technologist and educator who is interested in developing innovative educational tools and platforms that empower students to take control of their learning experiences. They are
  passionate about the concept of heutagogy, which emphasizes the role of the student in their own learning process, and are dedicated to transforming the way that we teach and learn online. They are experienced
  in using constructivist teaching methods and have a deep understanding of the principles of intrinsic and extrinsic motivation. They are interested in exploring the intersection of educational theory
  and technology, and are constantly seeking to improve the quality of online education by creating tools and platforms that empower students to learn more effectively.
