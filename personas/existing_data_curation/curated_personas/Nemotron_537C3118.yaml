  hobbies: '["Singing nursery rhymes with peers", "Dancing to children''s music", "Building block towers", "Playing on the playground (swings, slides, tag)", "Listening to picture‑book stories", "Drawing
    and coloring family portraits", "Helping with simple cooking tasks"]'
  career_goals: Jacquline often talks about growing up to be a teacher because she enjoys helping friends learn new things, and she also imagines becoming a veterinarian to care for animals she loves. She
    has expressed a budding ambition to learn ballet or hip‑hop dance, inspired by the music and movement classes she attends. These aspirations reflect her desire to nurture, support, and express herself
    creatively.
