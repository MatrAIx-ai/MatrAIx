  hobbies: '["Reading historical non-fiction", "Solo hiking on local trails", "Indoor gardening (succulents)", "Knitting", "Puzzle solving (crossword, Sudoku)", "Mandarin language practice", "Cooking traditional
    Chinese dishes", "Bullet journaling", "Nature photography"]'
  career_goals: Wen aims to translate her curiosity for new clinical methods into a supervisory role within the next three years, seeking certification as a Phlebotomy Supervisor and pursuing additional
    coursework toward a clinical laboratory science degree. She is driven to design and implement evidence‑based workflow improvements that reduce draw errors and turnaround time. Long‑term, she envisions
    establishing a boutique mobile phlebotomy service that serves senior residents in Orange County, combining her competitive spirit with a practical, community‑focused business model.
