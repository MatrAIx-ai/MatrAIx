personas:
  professional: Wen Zhou, a Certified Phlebotomy Technician with over ten years of clinical experience, leverages meticulous sample labeling, infection-control expertise, and bilingual patient communication
    to streamline workflow and mentor new staff, channeling her organized, methodical mindset and competitive drive toward a supervisory role.
  sports: Wen Zhou, an avid solo hiker on the Santa Ana foothills and a regular participant in the Orange County Hiking Club, maintains a disciplined fitness routine that includes early‑morning jogs and
    occasional yoga, while cheering for the Los Angeles Dodgers and the Anaheim Ducks as her favorite professional teams.
  arts: Wen Zhou immerses herself in the meditative practice of Mandarin calligraphy inspired by Wang Xizhi, captures sunrise vistas of succulents with a Nikon D3500, and unwinds to classical piano recordings
    by Lang Lang, blending traditional artistry with contemporary appreciation.
  travel: Wen Zhou plans her trips with the same precision as her bullet journal, favoring quiet solo adventures such as a sunrise hike on Catalina Island and a cultural immersion in Kyoto’s historic temples,
    while dreaming of the geothermal landscapes of Iceland for her next reflective getaway.
  culinary: Wen Zhou perfects the art of hand‑rolled jiaozi filled with pork and napa cabbage, masters the caramelized glaze of hong shao rou using Shaoxing wine and star anise, and experiments with succulent‑friendly
    herb mixes like rosemary and thyme, showcasing a kitchen skill set that balances heritage flavors with western seasoning.
  core: Wen Zhou navigates life with disciplined curiosity, a bullet‑journaled schedule, and a quiet competitive edge that drives her to perfect both phlebotomy protocols and homemade dumplings, even as
    she sometimes forgets to pause for a coffee break.
background:
  cultural: Wen is a second‑generation Chinese‑American raised in Southern California. Her parents immigrated from Mainland China and emphasized discipline, education, and respect for family traditions
    while encouraging bilingual fluency in Mandarin and English. Growing up in a multicultural environment, she celebrates Lunar New Year and Mid‑Autumn Festival with her family, maintains close ties to
    the local Chinese community, and incorporates values of perseverance and modesty into her daily life. At the same time, her American upbringing has fostered an independent, pragmatic outlook that balances
    cultural heritage with personal ambition.
attributes:
  skills: '["Venipuncture", "Capillary blood collection", "Sample labeling and processing", "Infection control and biosafety", "Electronic health record (EHR) documentation", "Quality control and error
