persona_description: 'A regulatory compliance officer responsible for ensuring that a medical device manufacturer follows the proper procedures and standards in the bioburden testing of their products.
  This person is responsible for maintaining the bioburden levels to a minimum and ensuring that the tests are conducted according to the required frequency and duration. They must also monitor the environmental
  microbial conditions and prevent cross-contamination to maintain the bioburden at a safe level. The persona is highly focused on GMP controls and is well-versed in the ASTM/ANSI/ISO 11737 part 1: Estimation
  of population of microorganism in/on medical product standard and its implementation.'
