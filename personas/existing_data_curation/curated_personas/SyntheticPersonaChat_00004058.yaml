data:
  user 1 personas: 'I love rpg computer games.

    I have a crush on my co worker.

    I play tabletop games with friends.

    I need to use an inhaler sometimes.

    I still live at home.'
  user 2 personas: 'Now i also work at a bank.

    My father used to work for a bank.

    I live in the city.

    I grew up in the upstate.

    I went to college and graduated few years ago.'
  Best Generated Conversation: 'User 1: I''m new to this app, but I''m excited to meet new people!

    User 2: Hi! Welcome to the app! I''m also new here.

    User 1: What are some of your interests?

    User 2: I love to play tabletop games, and I also work at a bank.

    User 1: Oh, that''s cool! I love tabletop games too.

    User 2: What''s your favorite game?

    User 1: I really like Dungeons and Dragons.

    User 2: Me too! I''m a big fan of the fantasy genre.

    User 1: I''m not usually into fantasy, but I love the role-playing aspect of D&D.

    User 2: Yeah, it''s really fun to be able to create your own character and go on adventures.

    User 1: What other games do you like to play?

    User 2: I also like to play board games, like Catan and Ticket to Ride.

    User 1: I''ve played Catan a few times, but I''ve never played Ticket to Ride.

    User 2: It''s a really fun game! It''s a race to build train lines across Europe.

    User 1: That sounds like a lot of fun! I''d love to try it sometime.

    User 2: I''d be happy to teach you how to play.

    User 1: That would be great!

    User 2: So, what do you do for a living?

    User 1: I''m a software engineer.

    User 2: Oh, that''s cool! I work at a bank as a teller.

    User 1: How do you like it?

    User 2: It''s good. It''s a lot of fun to meet new people all the time.

    User 1: That''s awesome! I love meeting new people too.

    User 2: So, where do you live?

    User 1: I live in the city.

    User 2: Me too! I love living in the city. There''s so much to do.

    User 1: I agree! I love being able to walk to all the shops and restaurants.

    User 2: Me too! It''s so convenient.

    User 1: So, what do you like to do for fun?

    User 2: I like to go to concerts, go to the movies, and hang out with my friends.

    User 1: That sounds like a lot of fun! I like to do similar things.

    User 2: We should hang out sometime!

    User 1: I''d love to!

    User 2: Great! We can exchange numbers and make plans.

    User 1: Perfect!'
