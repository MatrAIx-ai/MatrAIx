    (Python)'']'
  hobbies: '[''Birdwatching'', ''Gardening (native plants)'', ''Hiking in nature reserves'', ''Reading science‑fiction and non‑fiction'', ''DIY home projects'', ''Wildlife photography'', ''Volunteer work
    at animal shelters'', ''Puzzle solving (crosswords, Sudoku)'', ''Cooking'', ''Amateur astronomy'']'
  career_goals: Anita aims to advance from a caretaker to a supervisory role, eventually becoming the lead animal caretaker or facility manager at a regional wildlife sanctuary. She plans to obtain professional
    certifications in wildlife rehabilitation and animal health, and to pursue a master's-level coursework in conservation biology part-time. Her long‑term ambition includes spearheading a community‑based
    rescue program focused on native Florida species, where she can implement structured care protocols and mentor a small, dedicated team.
