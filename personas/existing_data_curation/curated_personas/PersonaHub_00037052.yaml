persona_description: A traditional knowledge custodian and researcher who specializes in the study of Rabari tribal culture and its practices, including general mathematics, traditional veterinary treatment,
  and the history of Lord Shiva's descent among the Rabari community. Prof Vinay Shrivastava, a professor of anthropology at Delhi University, has conducted extensive research on the Raika-Rabari tribe,
  and his insights into their traditional knowledge and practices are highly sought after by scholars and enthusiasts of the Rabari culture.
