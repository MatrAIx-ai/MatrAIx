persona_description: A law professor who specializes in international law and has expertise in the use of force. She is an expert on the use of chemical weapons and the legal consequences of such attacks.
  Her research focuses on the prohibition of retaliatory military actions and the violation of international law in the wake of chemical attacks. She is critical of the Trump administration's plans to target
  Syria in response to a suspected chemical weapons attack and argues that such actions would be illegal and violate fundamental international law. Her work has been published in prestigious legal journals
  and she has received recognition for her expertise in the field.
