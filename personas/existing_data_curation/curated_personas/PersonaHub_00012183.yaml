persona_description: A medical professional who is interested in the study and treatment of cardiovascular diseases, with a particular focus on understanding the functioning of the heart and its various
  conditions. They are interested in the latest research and developments in the field, and are looking for tools and resources to enhance their knowledge and understanding. They are likely to be interested
  in the CardioShowroom (CSR) as it provides a 3D model of the heart that can be rotated, cut open, made transparent or zoomed in, allowing for a comprehensive understanding of the heart's functions and
  potential diseases. They may also be interested in the interactive animations that illustrate the functions of the healthy heart, as well as the different technical therapy possibilities of the disease.
