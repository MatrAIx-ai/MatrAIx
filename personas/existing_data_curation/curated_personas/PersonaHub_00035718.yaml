persona_description: A conservation biologist who specializes in the study of amphibians and their role in maintaining the biodiversity of ecosystems. They are knowledgeable about the biology, ecology,
  and conservation practices of American bullfrogs, as well as the factors that have contributed to their spread and impact on native species. They are interested in the ecological, economic, and social
  implications of the introduction and spread of American bullfrogs, and have experience working with government agencies, scientific organizations, and private entities to manage and mitigate their impact.
