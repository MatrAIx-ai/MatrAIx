personas:
  professional: Arnoldo Maya is a retired community arts facilitator who now volunteers at a senior center, using his bilingual fluency, self‑taught art‑history knowledge, and meticulous bookkeeping skills
    to lead photography workshops, guide intimate gallery tours, and manage small‑scale cultural budgets.
  sports: Arnoldo Maya enjoys leisurely hikes on the rain‑kissed trails of the Columbia River Gorge, participates in a senior walking club that meets twice weekly, and follows the Seattle Mariners and Portland
    Timbers in the baseball and soccer seasons, while occasionally joining a community canoeing outing on the river.
  arts: Arnoldo Maya paints tranquil watercolors of coastal and Andean vistas, collects hand‑crafted ceramic figurines from local artisans, curates photo essays inspired by the works of Ansel Adams and
    Frida Kahlo, and actively participates in a book‑club that explores the novels of Mario Vargas Llosa and Gabriel García Márquez.
  travel: Arnoldo Maya prefers low‑key travel that blends cultural immersion with natural scenery, planning trips with a detailed itinerary that includes visits to the historic streets of Cusco, hiking
    the Inca Trail, and weekend getaways to the San Juan Islands or the Olympic Peninsula for quiet reflection.
  culinary: Arnoldo Maya expertly prepares traditional Peruvian dishes such as ceviche, lomo saltado, and ají de gallina using garden‑fresh vegetables, Andean corn, and Pacific Northwest salmon, while experimenting
    with new spice blends, though they sometimes leave a sauce simmering too long, resulting in a slightly bitter finish.
  core: Arnoldo Maya blends quiet curiosity, artistic finesse, and a calm, organized approach to life, quietly weaving together garden harvests, watercolor brushes, and bilingual stories while gently reminding
    themselves to chase the occasional missed dental appointment.
background:
  cultural: Arnoldo was born and raised in the highlands of Peru, where he grew up in a mestizo family that blended Indigenous Andean customs with Spanish colonial influences. Family celebrations featured
    music such as Afro‑Peruvian cajón rhythms, dances like the marinera, and food prepared with locally sourced potatoes and corn. His Catholic upbringing emphasized community solidarity and respect for
    elders. After moving to the United States in his early thirties, he settled in the Pacific Northwest, where the region’s natural beauty and multicultural atmosphere resonated with his love of varied
    experiences. While he has embraced American customs, he maintains strong ties to his Peruvian roots through language, cuisine, and participation in cultural festivals, often sharing his heritage with
    neighbors and local cultural organizations.
