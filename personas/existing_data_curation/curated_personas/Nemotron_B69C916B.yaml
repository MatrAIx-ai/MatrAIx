  hobbies: '[''reading Latin American literature'', ''watercolor painting'', ''photography walks in nature'', ''gardening with sustainable practices'', ''cooking traditional Peruvian dishes'', ''small‑group
    book clubs'', ''volunteering at senior community centers'', ''collecting local artisan sculptures'']'
  career_goals: Although retired from formal employment, Arnoldo’s ambition is to leave a lasting cultural legacy. He hopes to compile a photo‑essay book that intertwines Peruvian heritage with his experiences
    in the Pacific Northwest, and to donate it to the local library. He also aspires to mentor younger members of the Peruvian diaspora in Vancouver, WA, by offering cooking workshops, language practice,
    and storytelling sessions. Additionally, he wishes to serve on the advisory board of the county’s multicultural arts council, helping shape inclusive programming for small, community‑focused events.
