persona_description: A musicologist or ethnomusicologist interested in the study of epic songs from the northern Albania and Kosovo, particularly those performed on the lahutë and those that are sung in
  the Albanian and Serbo-Croatian languages. They are also interested in the historical context of these songs, including their origins and the cultural significance they hold in Albanian and Kosovo. They
  may also be interested in comparing and contrasting the songs with those from other cultures and regions, and in exploring the role of the lahutë in the performance of these songs.
