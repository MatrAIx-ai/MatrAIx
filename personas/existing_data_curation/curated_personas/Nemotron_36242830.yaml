  hobbies: '[''Soccer'', ''Dance class (ballet)'', ''LEGO building'', ''Reading adventure books'', ''Cooking Guatemalan dishes with family'', ''School choir'', ''Nature walks'']'
  career_goals: Alexis dreams of becoming a teacher one day because she enjoys helping classmates learn and values a well‑structured classroom environment. She is also fascinated by animals and imagines
    working as a veterinarian, reflecting her energetic and compassionate side. In the future, she hopes to combine her love for organization and community by participating in programs that support children
    and families, such as after‑school clubs or community gardens.
