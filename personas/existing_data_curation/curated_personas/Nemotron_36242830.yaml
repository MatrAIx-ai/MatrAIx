personas:
  professional: Alexis Dominguez is an enthusiastic elementary student who channels a love of structure and teamwork into leading group projects, applying the same disciplined coordination she uses on the
    soccer field and in building intricate LEGO creations to classroom collaborations.
  sports: Alexis Dominguez thrives on the soccer field as a forward for the City Strikers U-9 team, practicing structured drills after school and cheering for the region's professional club Los Angeles
    FC, balancing competitive training with spontaneous weekend park games with friends.
  arts: Alexis Dominguez expresses creativity through weekly ballet basics inspired by Misty Copeland, sings confidently in the school choir performing classics like Do‑Re‑Mi from The Sound of Music, and
    delights in community cultural festivals where they join traditional folk dances accompanied by local marimba melodies.
  travel: Alexis Dominguez recalls a family road trip to the Grand Canyon that sparked endless adventure stories, dreams of snorkeling among Belize's coral reefs, and hopes to explore the historic castles
    of Scotland on a future school-organized excursion.
  culinary: Alexis Dominguez loves helping stir fragrant atole with cinnamon and vanilla and shaping masa for steaming tamales, proudly presenting the finished parcels at family meals while also assembling
    snack plates of cheese quesadillas and fresh strawberries, showcasing a budding culinary confidence.
  core: Alexis Dominguez is a structured, energetic 8-year-old who merges soccer teamwork, LEGO precision, and a passion for family cooking into a lively routine, though they sometimes trade homework time
    for an extra cookie.
background:
  cultural: Alexis is a first‑generation Guatemalan‑American raised in Newport News, Virginia. At home she speaks both Spanish and English, and she celebrates Guatemalan traditions such as Semana Santa,
    Día de la Madre, and local community festivals that feature marimba music and traditional foods like tamales and atole. Her family's cultural values emphasize strong family bonds, respect for elders,
    and a love of communal gatherings, which blend with the broader American culture of her hometown.
