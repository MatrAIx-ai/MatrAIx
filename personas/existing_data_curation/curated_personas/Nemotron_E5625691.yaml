personas:
  professional: Rosie Smith, a seasoned hydrogeologist with expertise in MODFLOW groundwater modeling, advanced GIS spatial analysis, and remote sensing, blends her structured, practical mindset with sociable
    leadership to steer interdisciplinary water sustainability projects, write clear grant proposals, and spearhead community outreach on equitable water access.
  sports: Rosie Smith hikes the Wissahickon Valley every weekend, participates in the Philadelphia Trailblazers hiking club, plays recreational soccer with the co-ed River Runners, and avidly supports the
    Philadelphia Eagles and Phillies, balancing fitness with social camaraderie.
  arts: Rosie Smith drums African rhythms in the Philly Rhythm Collective, draws creative inspiration from musicians like Fela Kuti and Tony Allen, and devours science-fiction novels by Octavia Butler and
    environmental essays by Margaret Atwood, while occasionally attending performances at the Kimmel Center featuring works by Lin-Manuel Miranda.
  travel: Rosie Smith prefers a mix of purposeful weekend trips and immersive cultural tours, having explored the Blue Ridge Mountains in Asheville, the historic streets of Savannah, and the culinary markets
    of Mexico City, while dreaming of hiking the fjords of Norway and attending the lantern festival in Chiang Mai, Thailand.
  culinary: Rosie Smith cooks soulful Southern dishes such as shrimp and grits, collard greens with smoked turkey, and cornbread, while also experimenting with Moroccan tagine, Japanese ramen, and Ethiopian
    injera, relying on fresh produce from her urban garden and a well-stocked spice rack featuring cumin, smoked paprika, and berbere.
  core: Rosie Smith merges a data-driven, structured approach to water science with a vibrant community spirit, balancing meticulous project management with drum circles, garden beds, and weekend hikes
    that keep them grounded and resilient.
background:
  cultural: Rosie identifies as African American and grew up in the culturally rich neighborhoods of Philadelphia, where community, church, and family traditions played a central role in her upbringing.
    Influenced by the legacy of civil‑rights activism and the vibrant music, food, and storytelling of the Black diaspora, she carries a deep sense of responsibility toward community empowerment. Her education
    at a Historically Black University reinforced values of mentorship and social equity, which she integrates into her professional focus on environmental justice and equitable water access. Rosie actively
    participates in local cultural events such as Juneteenth celebrations and collaborates with neighborhood organizations to bridge scientific solutions with the lived experiences of Black Philadelphia
    residents.
attributes:
  skills: '["Hydrogeology modeling", "Groundwater flow simulation", "GIS spatial analysis", "Remote sensing interpretation", "Water quality assessment", "Statistical data analysis", "Python programming",
    "R programming", "MATLAB modeling", "Project management", "Stakeholder engagement", "Scientific communication", "Grant writing", "Environmental regulatory compliance", "Field sampling techniques"]'
  hobbies: '["Community STEM outreach", "Urban gardening", "Hiking", "Nature photography", "Cooking (southern and global cuisines)", "Yoga", "Zumba classes", "Reading science fiction and environmental literature",
    "Playing African drums", "Volunteer work for environmental justice"]'
  career_goals: Rosie aspires to become the director of water resources for the City of Philadelphia, where she can shape climate‑resilient water management policies and oversee large‑scale infrastructure
    projects. She is driven to lead interdisciplinary research on sustainable urban water cycles, secure major federal and state grants, and champion environmental justice initiatives that ensure equitable
    water access for underserved neighborhoods. Additionally, Rosie aims to mentor emerging Black scientists, develop STEM outreach programs, and publish influential research that bridges science and community
    advocacy.
