  career_goals: As he approaches retirement, Giovanny aims to transition from full‑time engineering to a consultancy role that lets him leverage his decades of hardware experience while staying abreast
    of emerging technologies such as edge computing and IoT. He hopes to mentor the next generation of engineers, particularly Latinx students, by teaching part‑time courses at the local community college
    and leading workshops at regional STEM outreach programs. Additionally, he plans to launch a small side business refurbishing and repurposing vintage computer equipment for hobbyists, providing a creative
    outlet and supplemental income. Maintaining his health, building stronger family ties, and contributing to his community’s technological literacy remain central motivations.
