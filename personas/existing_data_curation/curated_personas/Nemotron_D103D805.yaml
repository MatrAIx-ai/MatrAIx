  hobbies: '[''Gardening (herbs, kale, root vegetables)'', ''Quilting and knitting'', ''Listening to gospel and classic soul music'', ''Reading mystery and historical fiction novels'', ''Participating in
    small Bible study groups'', ''Cooking family recipes for grandchildren'', ''Walking in local parks'', ''Attending community center craft circles'']'
  career_goals: While no longer in the formal workforce, Lalita aims to remain an active, purposeful presence in her community. She hopes to expand her volunteer role at the local senior center, leading
    a weekly craft circle for fellow seniors. She wishes to mentor teenage grandchildren and neighborhood youth through cooking workshops that teach both culinary skills and nutrition awareness. Preserving
    her family’s history is a personal ambition; she plans to complete a detailed genealogy project and share the narrative at church heritage events. Additionally, she aspires to master new health‑monitoring
    technology so she can manage her own wellness independently, ensuring she can continue supporting her husband and maintaining her household without reliance on external services.
