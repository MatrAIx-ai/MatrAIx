  career_goals: Jessica aims to move into a supervisory or training role on the production floor where she can mentor younger workers and shape lean‑process improvements. She also dreams of launching a
    side business that blends her fabrication expertise with her love of art, creating custom metal sculptures and furniture for local collectors. In the longer term she hopes to earn a certified CNC operator
    credential and advocate for mental‑health supportive practices in her workplace, balancing her competitive drive with a healthier work environment.
