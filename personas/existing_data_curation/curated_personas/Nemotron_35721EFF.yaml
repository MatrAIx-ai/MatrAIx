personas:
  professional: Jessica Hayes, a veteran fabricator and CNC operator, combines meticulous mechanical assembly, blueprint reading, and welding expertise with a magnetic, talkative presence to mentor younger
    workers, spearhead lean-process improvements, and occasionally take center stage in safety briefings, all while nurturing their competitive drive to elevate shop floor performance.
  sports: Jessica Hayes hikes the Natchez Trace as part of a local trail club, cheers on the Tennessee Titans on Sundays, participates in a community yoga studio, and joins a weekend recreational softball
    league, blending their love for low‑impact endurance with a competitive spirit for team sports.
  arts: Jessica Hayes, an active member of Gallatin’s community theater, paints watercolors inspired by Georgia O’Keeffe, crafts pottery reminiscent of Bernard Leach, and creates metal sculptures that echo
    the industrial aesthetics of Paul Stankard, all while attending the Sumner County Fair to support regional artisans and they often quote lines from classic films in casual conversation.
  travel: Jessica Hayes favors weekend road trips to nearby art hubs like Asheville and Nashville, plans detailed itineraries for museum tours but leaves room for spontaneous stops at roadside craft fairs,
    dreams of a summer pilgrimage to Santa Fe’s art districts, and balances their travel cravings with a modest budget and occasional family obligations.
  culinary: Jessica Hayes delights in cooking Southern comfort dishes like shrimp and grits and jambalaya, experiments with Mediterranean flavors by adding rosemary‑infused olive oil to roasted vegetables,
    showcases their metal‑art skills by plating meals on hand‑forged platters, and enjoys pairing them with a glass of local Tennessee whiskey during their lively dinner parties.
  core: Jessica Hayes blends technical precision with artistic flair, channels a talkative, competitive energy into mentoring and theater performances, combats intense anxiety through yoga and mindfulness,
    and occasionally overindulges in late‑night painting sessions that leave paint stains on their favorite work boots.
background:
  cultural: Jessica grew up in a close‑knit, working‑class family in Middle Tennessee, absorbing Southern traditions of hospitality, church community, and comfort cooking such as barbecue and biscuits.
    The values of self‑reliance and neighborly support shaped her worldview, while her time at a community college broadened her exposure to diverse ideas and the arts. Today she blends these roots with
    an open‑minded curiosity, celebrating local customs like the county fair and country music while also exploring new cultural experiences through art, theater, and travel.
