  hobbies: '[''Watercolor painting'', ''Pottery'', ''Metal‑art crafting'', ''Community theater'', ''Attending art fairs'', ''Sumner County Fair participation'', ''Hosting dinner parties'', ''Yoga and mindfulness'',
