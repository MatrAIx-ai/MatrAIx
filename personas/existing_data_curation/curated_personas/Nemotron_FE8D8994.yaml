  hobbies: '[''soccer'', ''LEGO building'', ''reading adventure and space books'', ''school science club projects'', ''nature walks and bug hunting'', ''dancing to music'', ''basic coding with Scratch'',
    ''playing group board games'']'
  career_goals: Geoffrey dreams of becoming an astronaut so he can explore the stars, but he also imagines growing up as a teacher who can share exciting discoveries with other kids. He loves the idea of
    helping people and working with teams, so he sometimes says he wants to be a fire‑fighter or a community park designer, blending his curiosity about the world with a desire to make it a better, safer
    place for everyone.
