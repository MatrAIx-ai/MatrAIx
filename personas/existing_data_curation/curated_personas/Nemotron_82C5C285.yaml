personas:
  professional: Genesis Gomez is a veteran early childhood educator with over three decades of classroom experience, leveraging bilingual fluency and a blend of structured routines and spontaneous music‑infused
    lessons to foster inclusive, culturally resonant learning environments while mentoring emerging teachers.
  sports: Genesis Gomez embraces an active lifestyle by hiking the wooded trails around Six Flags Great Adventure, cheering for the New York Yankees during baseball season, and participating in a local
    senior walking club that meets twice weekly, blending moderate cardio with spirited support for professional teams.
  arts: Genesis Gomez channels creative energy into salsa and plena dancing at community festivals, delighting in the music of Celia Cruz and Marc Anthony, while also savoring performances by Lin‑Manuel
    Miranda's Broadway productions and the visual storytelling of Frida Kahlo's paintings, integrating artistic passion into both personal leisure and classroom curricula.
  travel: Genesis Gomez plans trips with a blend of organized itineraries and spontaneous detours, having revisited family roots in the island's coastal towns, explored historic neighborhoods of Old San
    Juan, and dreamed of strolling through the gardens of Kyoto, all while balancing travel costs against a modest retirement budget.
  culinary: Genesis Gomez enjoys cooking traditional island dishes such as arroz con gandules, mofongo with garlic‑shrimp sauce, and pasteles, often using fresh herbs like cilantro and oregano from their
    garden, while also experimenting with fusion twists like adding roasted sweet potatoes to mofongo, and relishes sharing these meals at family potlucks.
  core: Genesis Gomez blends structured teaching expertise with a spontaneous love for dancing, cooking, and community festivals, navigating life with a steady temperament, occasional disorganization, and
    a deep commitment to cultural celebration.
background:
  cultural: Genesis was raised in a close‑knit Puerto Rican family that emphasized bilingual communication, respect for elders, and communal responsibility. Though she now lives in Manchester Township,
    New Jersey, she maintains strong ties to the island through regular visits, participation in the local Puerto Rican diaspora network, and the inclusion of Spanish language and Caribbean cultural celebrations
    in her classroom. Her heritage informs her teaching philosophy, emphasizing family involvement, storytelling, music, and dance as vehicles for learning, while also grounding her in the practical, resilient
    spirit of the Puerto Rican community.
attributes:
