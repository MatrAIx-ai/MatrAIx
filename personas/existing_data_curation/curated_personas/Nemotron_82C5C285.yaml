    Technology'', ''Flexibility in Lesson Planning'']'
  hobbies: '[''Salsa and Bomba dancing'', ''Cooking traditional Puerto Rican cuisine'', ''Community gardening'', ''Volunteering at senior and community centers'', ''Participating in cultural festivals and
    organizing heritage events'', ''Hiking local trails in Ocean County'', ''Reading historical fiction and genealogical research'', ''Quilting and craft circles'', ''Book club with fellow teachers'', ''Traveling
    to Puerto Rico to maintain family connections'']'
  career_goals: Looking ahead, Genesis aspires to transition into a lead teacher or curriculum coordinator role where she can shape district‑wide bilingual early‑literacy initiatives. She plans to earn
    a master’s degree in Early Childhood Education or Special Education to deepen her expertise in inclusive practices. Additionally, she hopes to mentor a cohort of new preschool educators, spearhead a
    community‑based preschool cooperative in Ocean County, and continue advocating for culturally responsive curricula that reflect her Puerto Rican heritage while meeting the practical needs of her students
    and their families.
