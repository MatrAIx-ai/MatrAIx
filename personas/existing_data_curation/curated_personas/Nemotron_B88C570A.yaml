  career_goals: Maria frequently talks about wanting to become an artist who paints bright, whimsical pictures that make people smile. She also dreams of being a veterinarian because she loves animals and
    wants to help them feel safe. Occasionally, she imagines traveling to space as an astronaut, inspired by the endless curiosity she feels for new ideas. Underlying these ambitions is a desire to make
    others happy and to share her kindness, which hints at a future interest in teaching or caring for others.
