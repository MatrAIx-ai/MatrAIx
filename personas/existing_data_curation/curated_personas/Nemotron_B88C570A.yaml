personas:
  professional: An aspiring junior architect, Maria Layton builds towering LEGO skyscrapers, sketches floor plans with crayons, and they channel the community spirit of playground sandcastles into dreaming
    about designing homes for neighbors in Garden Grove.
  sports: An enthusiastic beach explorer, Maria Layton loves splashing at Huntington Beach, follows the Anaheim Ducks hockey team, and they practice soccer drills with the local youth club every Saturday,
    while occasionally losing their water shoes in the sand.
  arts: A vibrant young artist, Maria Layton fills sketchbooks with watercolor constellations, doodles sea creatures inspired by Dr. Seuss and Hayao Miyazaki, and they spend weekend afternoons painting
    with Crayola markers, though they sometimes forget to close the paint set, creating colorful spills.
  travel: Maria Layton has already explored Disneyland, the Santa Monica Pier, and a school field trip to the Natural History Museum, and they dream of visiting the Grand Canyon, often drawing imagined
    travel maps on scrap paper while planning future road trips with family.
  culinary: Maria Layton loves mixing flour, sugar, butter, and chocolate chips to bake cookies with Mom, enjoys crunchy apple slices with peanut butter, and they delight in trying sushi rolls at the school’s
    Korean food festival, though they sometimes spill batter on their knees.
  core: Maria Layton is a curious, art‑loving six‑year‑old who balances noisy playground games with quiet sketching under a tree, and they habitually misplace crayons while chasing shells on the beach.
background:
  cultural: Maria is a white American child raised in Garden Grove, a culturally diverse suburb of Orange County, California. Her family celebrates traditional American holidays such as Thanksgiving, Christmas,
    and the Fourth of July, often incorporating crafts and community gatherings that reflect her love for art and togetherness. Living in Garden Grove, she is regularly exposed to a rich mosaic of cultures—participating
    in the annual Strawberry Festival, hearing Spanish greetings from neighbors, and enjoying occasional Korean food festivals at school. Her elementary school emphasizes inclusivity, offering multicultural
    events where she learns simple Spanish phrases and experiences foods from various cultures. This blend of middle‑class suburban values, a strong sense of community, and the vibrant multicultural environment
    of Southern California shapes her open‑minded, flexible, and harmonious outlook.
