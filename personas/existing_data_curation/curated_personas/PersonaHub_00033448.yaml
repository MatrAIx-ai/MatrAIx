persona_description: A historian who specializes in the study of the history of the American South, particularly the period from the Civil War to the present. Her research interests include the origins
  and purposes of Confederate monuments, the complex cultural and social movements that shaped them, and the ways in which they continue to influence the memory and identity of the region. She is particularly
  interested in the role of the Lost Cause in shaping the memory of the Civil War and the Confederacy, and how the monuments that emerged from it reflect the values and beliefs of the white South in the
  late 19th and early 20th centuries. She is also interested in the ways in which these monuments and the Lost Cause continue to shape the political, social, and cultural landscape of the region, and how
  they are used to justify the status quo and perpetuate inequality.
