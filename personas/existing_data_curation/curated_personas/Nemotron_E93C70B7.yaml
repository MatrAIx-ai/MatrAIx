    ''Spreadsheet proficiency (Excel/Google Sheets)'']'
  hobbies: '[''Reading non-fiction (personal finance and self‑improvement)'', ''Chess puzzles and strategic games'', ''Scale model building (aircraft and automobiles)'', ''Jogging'', ''Cooking traditional
    Mexican dishes'', ''Listening to instrumental cumbia and mariachi music'', ''Watching documentaries'', ''DIY home improvement projects'']'
  career_goals: Nelson aims to advance from his current cashier position to shift supervisor within the next 12‑18 months, leveraging his consistent performance and process‑improvement mindset. He plans
    to enroll in a community‑college associate program in business administration to build formal managerial knowledge. Within three years, he targets a store manager role where he can oversee operations,
    drive sales metrics, and apply his structured, data‑driven approach to team leadership. Long‑term, he envisions managing multiple locations as a regional manager or launching a small, family‑style convenience
    store that reflects his cultural heritage while allowing him to maintain the predictable, organized environment he values.
