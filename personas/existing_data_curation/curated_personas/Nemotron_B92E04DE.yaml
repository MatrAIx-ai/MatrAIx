  hobbies: '[''Hunting and fishing'', ''DIY home‑improvement projects'', ''Motorcycle maintenance and customization'', ''Target shooting competitions'', ''Acoustic guitar playing'', ''Landscape photography'',
    ''Tech gadget experimentation'', ''Weekly poker nights'', ''Community barbecues'', ''Church youth outreach volunteering'']'
  career_goals: Phillip aims to obtain advanced certifications from the ARRT in CT and MRI within the next two years, positioning himself as a go‑to specialist in his regional hospital. He aspires to become
    the lead technologist, overseeing quality control programs and mentoring newer staff. Long‑term, he hopes to earn a bachelor's degree in radiologic sciences and transition into a managerial role or
    a teaching position at a community college, where he can share his blend of curiosity‑driven learning and practical, hands‑on expertise. He also dreams of presenting a case‑study on workflow flexibility
    at a regional radiology conference, showcasing his competitive drive to improve departmental performance.
