    User 1: She taught me how to make borscht, pelmeni, and solyanka.

    User 2: Those are all delicious! I love borscht.

    User 1: Me too! It''s my favorite Russian dish.

    User 2: Do you have any other hobbies besides fishing?

    User 1: I like to go hiking and camping. I also like to play guitar.

    User 2: I love hiking and camping too! I haven''t played the guitar in a while, but I used to play a lot.

    User 1: You should pick it up again! It''s a lot of fun.

    User 2: I will! I need to find a guitar first.

    User 1: I have an extra guitar you can borrow.

    User 2: That''s so kind of you! Thank you!

    User 1: You''re welcome! It''s just sitting in my closet collecting dust.

    User 2: I''ll come pick it up later today.

    User 1: Sounds good! I''ll be here.'
