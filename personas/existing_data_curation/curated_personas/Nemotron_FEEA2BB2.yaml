  career_goals: Sandra aims to deepen her expertise by earning certifications such as CompTIA Network+, Security+, and Cisco CCNA, positioning herself for a senior support engineer role. She envisions transitioning
    into IT operations management, where she can lead a small support team, design streamlined support workflows, and integrate emerging technologies like cloud‑based service desks. Long‑term, she is interested
    in exploring cybersecurity focused on protecting user data, while also cultivating a side project that merges her technical skills with her love of art, such as developing interactive digital installations
    for local galleries.
