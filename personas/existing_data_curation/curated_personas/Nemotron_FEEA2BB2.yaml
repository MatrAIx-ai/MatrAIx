personas:
  professional: Sandra Stueber is an experienced technical support specialist who leverages a STEM background, PowerShell and Bash scripting skills, and a calm, empathetic demeanor to untangle complex hardware
    and network issues while championing user-friendly documentation, and they are now systematically pursuing CompTIA Network+, Security+, and CCNA certifications to transition into senior support engineering
    and eventual IT operations management.
  sports: Sandra Stueber enjoys weekend hikes on the Hemlock Trail and is an avid birdwatcher, they cheer on the UNC Tar Heels basketball team, occasionally attend Carolina Panthers games, and play in a
    co‑ed recreational softball league with the Chapel Hill Community Sports Club, balancing quiet nature pursuits with spirited local fandom.
  arts: The artistic side of Sandra Stueber shines through watercolor paintings of Ocracoke marshes, they frequent the Ackland Art Museum and River Arts District to study works by Georgia O’Keeffe and modern
    abstractists, capture landscapes with a Canon EOS R in homage to Ansel Adams, and unwind listening to Ludovico Einaudi while attending intimate productions by the PlayMakers Repertory Company.
  travel: Sandra Stueber plans trips with the same precision as a support ticket, they favor weekend road trips to the Blue Ridge Parkway, have explored the historic streets of Savannah and the craft beer
    scene in Asheville, while dreaming of a summer stint in Edinburgh’s festivals and a winter aurora chase in Reykjavik, balancing adventure with a modest travel budget.
  culinary: Sandra Stueber is a competent home cook who masters classic Southern shrimp and grits and pimento cheese, they experiment with fusion dishes like kimchi fried rice paired with locally sourced
    sweetgrass honey, and their well‑stocked spice rack includes smoked paprika, sumac, and ground Sichuan peppercorns, reflecting a palate that honors tradition while chasing novelty.
  core: Sandra Stueber blends technical rigor with artistic curiosity, balancing methodical problem‑solving and empathetic support with a love for watercolor, birdwatching, and low‑key adventure, all while
    juggling a disciplined budget, occasional health niggles, and a penchant for spontaneous creative projects.
background:
  cultural: Sandra is a Caucasian American of likely Germanic ancestry, as suggested by her surname. She grew up in a middle‑class suburban environment in the Southeast and now lives in Chapel Hill, a vibrant
    university town that blends Southern hospitality with a progressive, academic atmosphere. This setting nurtures her appreciation for community values, regional traditions like local festivals and Southern
    cuisine, while also exposing her to diverse cultural perspectives through the university’s intellectual environment. Her background reflects a balance of regional heritage and a broader global outlook
    cultivated by her STEM education and curiosity for varied experiences.
