  hobbies: '["Drawing and painting", "LEGO building and robotics", "Reading adventure and science books", "Exploring nature (Watchung Reservation)", "Visiting art museums and science centers", "Playing
    chess", "Solving jigsaw puzzles", "Creating games in Scratch", "After-school art club participation"]'
  career_goals: Vincent dreams of exploring the world as a future astronaut‑engineer and hopes one day to design spacecraft interiors that combine functionality with beautiful art. He also imagines becoming
    a museum curator or science communicator, creating interactive exhibits that inspire other kids to love science and art. In the short term, he aims to master more advanced coding, build complex LEGO
    models, and participate in school science fairs, laying the foundation for a lifelong pursuit of discovery and creativity.
