  hobbies: '[''visiting art galleries and museums'', ''listening to jazz and blues'', ''photography'', ''community theater attendance'', ''storytelling at church'', ''senior center social games (poker,
    trivia, card games)'', ''cooking soul‑food'', ''reading biographies and self‑improvement books'', ''volunteering at community cultural events'']'
  career_goals: Robert aspires to shift toward a mentorship and community‑focused role that blends his love of art with his people‑skills. He hopes to become a part‑time docent or cultural ambassador at
    a local museum, leading tours that highlight African‑American art and Dallas history. Simultaneously, he aims to mentor new reception staff, sharing best practices in customer interaction and crisis
    handling. He is considering completing a short certification in hospitality or museum studies to bolster his qualifications. Ultimately, Robert wants to be recognized as a go‑to resource for cultural
    information within his workplace and the broader Dallas community, while maintaining a flexible schedule that honors his relaxed approach to obligations.
