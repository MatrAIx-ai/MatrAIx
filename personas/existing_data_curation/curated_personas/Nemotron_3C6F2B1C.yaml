  hobbies: '["Listening to R&B and hip‑hop music", "Dancing", "Cooking and experimenting with recipes", "Sketching and drawing", "Creating social media playlists", "Gardening on balcony", "Volunteering
    at church youth group", "Reading YA novels"]'
  career_goals: Catheline plans to earn her GED within the next year and enroll in a community‑college program in social work or public health. Her ultimate ambition is to become a community‑outreach coordinator
    for a nonprofit serving at‑risk youth in Greensboro, where she can leverage her empathy and firsthand experience to mentor peers. In the short term, she hopes to secure a part‑time position in a café
    or retail setting to gain income and customer‑service experience. She also aspires to build a modest personal brand on Instagram/TikTok, sharing cooking tutorials and motivational content that reflect
    her cultural roots and encourage self‑care. While she appreciates structure in education and career paths, she also wishes to retain flexibility to explore creative projects and spontaneous community
    events.
