personas:
  professional: Catheline Smith is a budding community‑outreach coordinator‑in‑training who leverages her empathetic communication, quick event‑logistics skills, and love of short‑term structure to organize
    youth ministry activities, even though she sometimes wrestles with long‑term deadline management.
  sports: Catheline Smith fuels her love of movement by dancing at house parties, following the Greensboro Grasshoppers baseball team and the Carolina Panthers football club, and attending twice‑weekly
    Zumba classes at the local community center, using these activities as both social outlet and stress relief.
  arts: Catheline Smith curates contemporary R&B and hip‑hop playlists featuring artists like The Weeknd, H.E.R., SZA, and Travis Scott, while sketching downtown Greensboro street scenes, journaling personal
    reflections, and drawing inspiration from YA novels such as "The Hate U Give" for her Instagram captions.
  travel: Catheline Smith prefers short, budget‑friendly road trips—having explored Asheville’s vibrant arts district and the Carolina coast—while dreaming of a solo backpacking adventure through New Orleans
    to immerse herself in music and cuisine, planning itineraries meticulously yet often leaving packing to the very last minute.
  culinary: Catheline Smith modernizes Southern soul‑food by preparing collard greens smoked with turkey, crisp fried chicken glazed with hot honey, and jalapeño‑buttered cornbread, while she tends a balcony
    garden of basil, rosemary, and succulents to freshen her dishes and experiment with new flavor twists.
  core: Catheline Smith blends empathy, spontaneous creativity, and a knack for short‑term organization into a vibrant teen life, though she often wrestles with procrastination and a love of last‑minute
    decisions.
background:
  cultural: Catheline grew up in a close‑knit Black family in Greensboro, a city with a rich civil‑rights heritage. Her household blends Southern traditions—home‑cooked soul food, church gospel music, and
    community storytelling—with broader African‑American cultural influences such as spoken‑word poetry and hip‑hop. Her parents emphasized the importance of education and community service, a value reinforced
    by regular participation in the local Baptist church, where she learned choral singing and mentoring younger members. She is familiar with Greensboro’s historic sites, including the International Civil
    Rights Center & Museum, and often attends community festivals that celebrate Black art and entrepreneurship, such as the annual Guilford County African American Cultural Festival. These experiences
    shape her sense of identity and her desire to give back to the community.
