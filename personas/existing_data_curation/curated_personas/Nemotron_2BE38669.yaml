personas:
  professional: A budding illustrator and coder, Limary Vargas blends sketching fantastical creatures with Scratch programming to create interactive storybooks, channeling their vivid imagination and organized
    approach into early creative tech projects.
  sports: A spirited youth athlete, Limary Vargas plays on a community soccer team, cheers for the Los Angeles Dodgers and LA Galaxy, and uses conga drumming as a rhythmic warm‑up before games, combining
    teamwork with a love for rhythm and movement.
  arts: A vibrant arts enthusiast, Limary Vargas spends weekends drawing mythical beasts inspired by the surreal colors of Frida Kahlo and the dynamic brushstrokes of Diego Rivera while listening to the
    lively rhythms of Celia Cruz and Los Van Van, and occasionally attends local community theater productions starring young talents like Millie Bobby Brown.
  travel: An adventurous explorer, Limary Vargas loves spontaneous day trips to the tide pools of La Jolla and the botanical gardens in San Diego, dreams of wandering the historic streets of Old San Juan
    and the vibrant markets of Oaxaca, and prefers family‑oriented itineraries that blend nature hikes with opportunities to collect shells and leaves for craft projects.
  culinary: A budding culinary connoisseur, Limary Vargas delights in the savory aroma of ropa vieja simmering on the stove, the sweet caramelization of fried plantains, and the rich crema of café con leche,
    often re‑creating mini versions of these dishes in their play kitchen while mastering the art of drawing food illustrations.
  core: Limary Vargas is a nine‑year‑old imagination powerhouse who balances disciplined sketching, code‑crafting, and rhythmic drumming with a sweet tooth for plantains and a habit of stashing spare change
    for future LEGO marvels.
background:
  cultural: Limary is a first‑generation Cuban‑American raised in Vista, California. At home, Spanish and English flow interchangeably, and family gatherings are filled with the aromas of ropa vieja, plantains,
    and coffee. She has grown up listening to classic Cuban son and contemporary salsa, learning basic dance steps from her parents, and hearing stories about her grandparents' life in Havana. Annual celebrations
    like Carnaval and Día de los Muertos are marked with colorful decorations she helps create, reinforcing a deep appreciation for Afro‑Cuban music, rhythm, and storytelling. Living in a diverse Southern
    California community, she also experiences multicultural influences that shape her curiosity and openness to new ideas.
