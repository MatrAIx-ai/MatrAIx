  hobbies: '[''Drawing'', ''Reading magical realism and Cuban folklore'', ''Writing short stories'', ''Playing conga drums'', ''Learning piano'', ''Building LEGO models'', ''Exploring nature'', ''Coding
    in Scratch'', "Crafting papel picado"]'
  career_goals: Limary dreams of becoming a multimedia artist who blends illustration, storytelling, and technology to create animated films and interactive books. She envisions studying at a specialized
    art school where she can deepen her drawing techniques and expand her coding abilities. One of her long‑term ambitions is to write and illustrate a children’s book that weaves together Cuban folk tales
    and her own imaginative worlds, inspiring other young readers to explore diverse cultures.
