  career_goals: Xiang aims to become the head coach of a collegiate program in the Pacific Northwest within five years, leveraging his interdisciplinary background to build a team that values athletic excellence
    and personal growth. He also plans to launch a community youth academy that blends sports training with creative arts workshops, fostering holistic development. Long‑term, he aspires to serve as a senior
    talent scout or director of scouting for a professional league, using advanced analytics and cultural insight to identify emerging talent, and to earn a certification in sports psychology or a master’s
    degree in sports management to deepen his coaching efficacy.
