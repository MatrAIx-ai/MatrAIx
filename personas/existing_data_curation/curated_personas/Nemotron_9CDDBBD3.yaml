  career_goals: Naela dreams of becoming an artist who paints bright murals inspired by her family’s Mexican heritage and the desert landscape of Arizona. She is also fascinated by animals and hopes one
    day to be a wildlife biologist who helps protect desert creatures. Occasionally she imagines herself as a children’s book author‑illustrator who tells stories about friendship and nature. While she
    enjoys school and play, she is eager to keep improving her drawing and learn more about science, hoping these passions will shape her future career.
