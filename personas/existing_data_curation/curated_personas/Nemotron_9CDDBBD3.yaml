personas:
  professional: Naela Mendoza is an aspiring junior artist‑engineer who channels their curiosity, methodical planning, and collaborative spirit into daily watercolor sketches, LEGO constructions, and imaginative
    mechanical toys, turning every backyard find into a tiny project.
  sports: Naela Mendoza enjoys weekend soccer practice with the Little Stars Youth Soccer Club, dabbles in beginner gymnastics at the Bright Horizons Gymnastics Center, cheers for the Chicago Cubs during
    baseball season, and finds dancing to salsa rhythms a fun way to stay active.
  arts: Naela Mendoza delights in painting watercolor scenes inspired by the vibrant illustrations of Dr. Seuss, humming along to classic children’s songs by The Wiggles and Raffi, dancing to upbeat Latin
    tunes by Celia Cruz and Shakira, and occasionally re‑enacting scenes from Pixar’s Finding Nemo with their LEGO figures.
  travel: Naela Mendoza has explored the nearby desert park collecting smooth rocks, enjoyed a family beach day at Pacific Shores, marveled at the massive cliffs of the Grand Canyon on a school trip, and
    now dreams of visiting the Great Barrier Reef in Australia and the Kennedy Space Center to see rockets up close.
  culinary: Naela Mendoza loves munching on cheesy tacos with avocado slices, slurping strawberry‑banana smoothies, savoring mac and cheese with a sprinkle of extra cheddar, and occasionally helping stir
    batter for chocolate cupcakes topped with rainbow sprinkles, favoring bright, kid‑friendly flavors.
  core: Naela Mendoza is a curious, organized six‑year‑old who blends artistic flair, mechanical tinkering, and a love for music and nature into a playful, methodical world where every rock, note, and puzzle
    becomes a chance to explore and share joy.
background:
  cultural: Naela is raised in a bilingual Mexican‑American household in Buckeye, Arizona. At home her parents speak Spanish, celebrate Día de los Muertos, Cinco de Mayo, and family birthdays with traditional
    foods such as tamales, pozole and churros. The desert environment around Phoenix inspires her love for cacti and desert wildlife. She attends a local elementary school where she interacts with peers
    from diverse backgrounds, and she participates in community events at a nearby church and neighborhood cultural festivals. Her upbringing blends Latino family values of respect, cooperation, and storytelling
    with Southwestern U.S. influences, shaping a warm, inclusive cultural identity.
