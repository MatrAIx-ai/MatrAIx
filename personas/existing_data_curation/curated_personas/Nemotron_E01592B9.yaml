  career_goals: William aims to become a fully licensed Florida property appraiser within the next two years and to earn the Certified Valuation Analyst (CVA) designation. He envisions progressing to a
    senior assessor role for Miami‑Dade County, where he can influence policy on appraisal accuracy and equity. Long‑term, he hopes to launch a boutique consultancy that leverages data‑driven valuation
    models to serve small‑scale developers and homeowners. Throughout these steps, he seeks a stable, structured career path that minimizes uncertainty, provides financial security, and allows him to manage
    his sensitivity to stress through clear professional milestones.
