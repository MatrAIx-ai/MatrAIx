personas:
  professional: William Garcia, a meticulous property appraiser in training, combines a STEM background with deep expertise in Florida real‑estate tax statutes, GIS mapping, and advanced Excel modeling
    to deliver highly structured valuation reports while quietly excelling in small‑team collaborations and assertively negotiating when needed, and they take pride in maintaining procedural consistency.
  sports: William Garcia jogs the early‑morning Miami coastal trail on a strict five‑kilometer route, is a member of the South Beach Runners club, follows the Miami Dolphins and the Miami Heat for a touch
    of team spirit, and they prefer structured cardio sessions over spontaneous team sports.
  arts: William Garcia enjoys quiet evenings reading Malcolm Gladwell and Thomas Piketty, attends occasional exhibitions at the Pérez Art Museum featuring architectural photography by Julius Shulman, listens
    to ambient composer Max Richter while refining scale models of historic homes, and they find these artistic interludes essential for mental balance.
  travel: William Garcia favors meticulously planned road trips to historic coastal towns like St. Augustine and Key West, uses a detailed itinerary app to schedule museum visits and sunset spots, dreams
    of a future European tour of Barcelona’s modernist architecture, and they budget travel expenses carefully to stay within a modest student‑friendly fund.
  culinary: William Garcia prefers the modest flavors of Miami’s multicultural scene, often orders a Cuban medianoche sandwich with pickles and mustard, enjoys a Peruvian ceviche with lime and cilantro,
    occasionally attempts to replicate these dishes at home by grilling simple fish tacos with plantain chips, and they relish the occasional culinary event that celebrates these diverse yet unpretentious
    tastes.
  core: William Garcia, a 20‑year‑old analytical mind, balances a love for structured routines with bouts of anxiety, meticulous budgeting, solitary jogs, and a quiet passion for historic architecture and
    low‑key culinary delights, and they often over‑track details to keep stress at bay.
background:
  cultural: William identifies as white and was raised in Miami’s multicultural environment. His paternal lineage traces to Irish ancestry, while his maternal side has Cuban roots, which is reflected in
    his surname Garcia. Growing up, he was exposed to both mainstream American traditions and Cuban cultural practices—he speaks conversational Spanish, enjoys Cuban coffee, and celebrates family gatherings
    that blend Latin hospitality with his own reserved social style. This bicultural exposure enriches his worldview, making him comfortable navigating diverse client bases in Miami’s real‑estate market
    while maintaining a personal identity rooted in the broader white American demographic.
