  career_goals: Natalia aims to become a regional director of marketing within the next five years, leading culturally resonant campaigns that elevate Puerto Rican art, tourism, and heritage on a broader
    stage. She aspires to mentor emerging female marketers and underrepresented talent, building a pipeline of strategic thinkers who value both data rigor and creative storytelling. In the longer term,
    she envisions launching her own consultancy focused on authentic Caribbean branding for businesses and government entities, while integrating workplace wellness initiatives to mitigate stress for herself
    and her teams.
