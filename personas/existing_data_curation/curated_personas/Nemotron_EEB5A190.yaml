personas:
  professional: Kou Miller is a junior public relations specialist in Los Angeles who leverages concise press releases, data-driven social-media campaigns, and meticulous event coordination to amplify cultural
    brands, and they thrive on structured checklists and spontaneous networking, balancing talkative confidence with a practical, stress-aware mindset.
  sports: Kou Miller hits the local gym for pickup basketball with the Los Angeles Ballers crew, follows the LA Lakers and LA Galaxy for inspiration, and they stay fit through weekly street-ball sessions
    and occasional surf trips along the Pacific Coast during summer.
  arts: Kou Miller curates daily playlists featuring SZA, Anderson .Paak, and emerging LA hip-hop talent while capturing mural-filled streets through street photography, frequently shooting fashion-forward
    looks for friends and attending intimate gigs at The Echo and The Troubadour, where they draw creative energy for their visual storytelling.
  travel: Kou Miller enjoys spontaneous weekend road trips along the Pacific Coast—from Santa Barbara to Big Sur—while also dreaming of a structured two-week itinerary in Tokyo to explore street-fashion
    districts, balancing budget constraints with a love for both adventure and curated cultural immersion.
  culinary: Kou Miller is a confident home cook who blends Southern comfort food like fried catfish and collard greens with Caribbean staples such as jerk chicken and plantain fufu, often hosting friends
    for potluck-style dinners where they showcase bold spices like Scotch bonnet peppers and smoked paprika, while occasionally over-seasoning in anxious moments.
  core: Kou Miller is a socially magnetic, structure-seeking PR strategist who channels their worry-driven perfectionism into meticulous campaigns, yet often loses sleep obsessing over sneaker releases
    and over-curates every playlist.
background:
  cultural: Kou grew up in South Los Angeles within a close‑knit African‑American family that places a high value on community, oral storytelling, and cultural pride. Family gatherings feature traditional
    Southern dishes, music from the golden era of West Coast hip‑hop, and celebrations of holidays such as Juneteenth and Kwanzaa. Through church and community centers, he was exposed early to spoken‑word
    poetry and local activism, experiences that shaped his communication style and his commitment to giving voice to underrepresented groups. The multicultural fabric of Los Angeles—interactions with Latino,
    Asian, and Caribbean neighbors—has taught Kou to navigate diverse cultural contexts with respect and adaptability. He draws on this rich background to inform his PR work, ensuring that campaign narratives
    are authentic, inclusive, and resonant with a broad audience.
attributes:
  skills: '[''press release writing'', ''media outreach'', ''social media campaign management'', ''event coordination'', ''crisis communication'', ''brand storytelling'', ''public speaking'', ''relationship
