  hobbies: '[''basketball'', ''hip‑hop and R&B listening'', ''live music attendance'', ''street photography'', ''cooking Southern and Caribbean cuisine'', ''mentoring youth in media'', ''fashion and sneaker
    curation'', ''mindfulness journaling'', ''coastal road trips'']'
  career_goals: Kou aims to move from his current junior specialist role into a senior public relations strategist position within an entertainment or cultural nonprofit organization in Los Angeles over
    the next five years. He wants to lead integrated communication campaigns that amplify underrepresented voices and drive social impact. To support this, he plans to obtain professional credentials such
    as the Accredited in Public Relations (APR) designation and deepen his digital marketing expertise through certifications in SEO and data analytics. Ultimately, Kou envisions launching his own boutique
    PR consultancy focused on diversity, equity, and inclusion communications, where he can mentor emerging Black talent and shape authentic storytelling for community‑based brands. He seeks a career trajectory
    that offers clear advancement pathways, mentorship, and the ability to balance creative freedom with the structured processes that keep him productive.
