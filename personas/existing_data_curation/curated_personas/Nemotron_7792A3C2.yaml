personas:
  professional: Roger Fitch is a diligent 17-year-old aspiring automotive technician who channels their meticulous engine-rebuilding hobby, budding Python scripting, and strategic mindset into a GED pursuit,
    a community-college vocational program, and a side gig offering PC-building and coding tutoring services, all while planning a future independent garage that blends mechanical craftsmanship with emerging
    automotive tech.
  sports: Roger Fitch is an outdoor-oriented teen who hikes the Blue Ridge Trail, fishes at Lake Monroe, participates in seasonal deer hunts with the local youth shooting club, follows the Green Bay Packers
    and Los Angeles Dodgers, and channels the same competitive drive from chess into weekend pick-up basketball games at the community center.
  arts: Roger Fitch is a solitary creative who devours Wired and Popular Science, builds Revell Cessna model kits, draws inspiration from classic rock icons AC DC and modern electronic duo Daft Punk, and
    finds artistic release in designing custom car graphics on a tablet during breaks.
  travel: Roger Fitch is a budget-conscious explorer who has road-tripped to the Detroit Auto Show, dreams of visiting Stuttgart's Mercedes-Benz Museum and Tokyo's Akihabara for car culture immersion, and
    meticulously plans each trip using Google Maps and a spreadsheet while prioritizing short trips to nearby state parks over extended vacations.
  culinary: Roger Fitch is a protein-focused eater who often grills steak with chimichurri, whips up quick spaghetti carbonara after long tinkering sessions, snacks on spicy ramen and energy bars while
    building PCs, and occasionally indulges in fast-food burgers when a project runs late into the night.
  core: Roger Fitch is a methodical 17-year-old tinkerer whose competitive edge fuels both engine rebuilds and strategy games, yet chronic worry and late-night caffeine binges reveal a restless, perfection-driven
    mind.
background:
  cultural: Roger grew up in Waterford, Ohio, a small, predominantly white, working‑class community in the heart of the Midwest. His upbringing is shaped by Midwestern values of self‑reliance, practicality,
    and modesty. Family traditions include outdoor activities like fishing and community events such as county fairs and local high‑school sports. He was raised in a Protestant household where church gatherings
    and youth group service fostered a sense of community responsibility. The region’s economic shifts, especially in manufacturing and agriculture, have reinforced his pragmatic outlook and desire for
    a stable, skilled trade career.
attributes:
  skills: '["Automotive repair (basic)", "Computer hardware assembly and troubleshooting", "Introductory Python programming", "Woodworking and model kit construction", "Strategic game analysis", "Project
    planning and organization", "Personal budgeting and finance basics"]'
  hobbies: '["Car engine tinkering", "PC building and repair", "Competitive strategy video gaming", "Chess", "Hiking", "Fishing", "Model aircraft kit building", "Reading technology and science magazines",
    "Journaling"]'
  career_goals: Roger aims to earn his GED within the next year and enroll in a vocational program for automotive technology at a community college. His short‑term goal is to become a certified automotive
    technician, mastering both mechanical and electronic diagnostics. Long‑term, he aspires to open a small, independent garage that offers custom modifications and performance tuning for local drivers,
    combining his practical skills with his curiosity about emerging automotive technologies. He also wants to develop a secondary income stream by offering freelance computer hardware services and tutoring
    peers in basic coding.
