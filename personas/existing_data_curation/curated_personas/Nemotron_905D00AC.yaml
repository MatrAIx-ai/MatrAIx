  hobbies: '[''Basketball'', ''Jazz and Hip‑Hop music'', ''Cooking (soul food & Caribbean dishes)'', ''Street photography'', ''Science‑fiction reading'', ''Strategy video games'', ''Youth mentorship volunteering'',
    ''Community cultural festivals'', ''Tech tinkering (basic coding)'']'
  career_goals: Monte aims to finish his associate degree in nursing within the next two years and become a Registered Nurse, focusing on community health in underserved neighborhoods of New Haven County.
    He is eager to specialize in pediatric or geriatric care, where he can combine his curiosity about human development with his practical bedside experience. Long‑term, Monte envisions earning a Nurse
    Practitioner certification and serving as a health advocate for the Black community, working on projects that address health equity and chronic‑disease prevention. He also hopes to mentor future nursing
    assistants, sharing the collaborative spirit that defines his own work ethic.
