personas:
  professional: Corderal Mayo, a one-year-old explorer, is already mastering the basics of motor skills and language acquisition, showing early signs of curiosity and organized play that hint at a future
    path in creative storytelling and community leadership.
  sports: Corderal Mayo enjoys baby “tumble time” classes and playful kicks during diaper changes, proudly sporting a miniature New Orleans Saints jersey and cheering for the Shreveport Mudbugs while parents
    take them to local park leagues for toddler soccer.
  arts: Corderal Mayo delights in the soothing harmonies of Mahalia Jackson’s gospel hymns and the rhythmic swing of Louis Armstrong’s jazz, often humming along during family Sunday services and clapping
    to the beat of local Creole folk songs.
  travel: Corderal Mayo has already taken a family road trip to the historic French Quarter of New Orleans and a weekend getaway to Dallas, and they daydream about future visits to Disney World and the
    beaches of the Gulf Coast.
  culinary: Corderal Mayo prefers smooth sweet potato puree with a pinch of cinnamon, mashed banana mixed with oat cereal, and occasionally squeaks happily over a dab of apple-cinnamon compote, reflecting
    a budding palate for Southern comfort flavors.
  core: Corderal Mayo is a curious, sociable infant who balances organized play with spontaneous giggles, often demanding bright toys while charming everyone with a melodic coo.
background:
  cultural: Corderal is a Black infant raised in Shreveport, Louisiana, within a close‑knit African‑American community that values family, church, and cultural traditions. He is exposed to Southern gospel
    music, Creole and Cajun culinary flavors, and community events such as Juneteenth celebrations and local festivals. His family emphasizes storytelling, respect for elders, and participation in church
    activities, all of which shape his early worldview.
