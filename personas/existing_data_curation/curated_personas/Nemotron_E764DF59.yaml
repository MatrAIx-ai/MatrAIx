  hobbies: '[''Reading African American literature'', ''Church choir participation'', ''Volunteer reading mentor'', ''Gardening'', ''Southern cooking'', ''Quilting'', ''Journaling'', ''Yoga'', ''Mindfulness
    meditation'', ''Hiking on Bluegrass trails'', ''Visiting local history museums'']'
  career_goals: Seeking to expand her impact beyond the classroom, Darnasia plans to pursue a master's degree in educational leadership with the goal of becoming a curriculum specialist for Jessamine County
    schools. In this role she hopes to champion culturally responsive pedagogy and develop district‑wide professional development that addresses teacher wellbeing. She also aspires to become an assistant
    principal, where she can influence policies that support student mental health and equity. Long‑term, she dreams of establishing a community‑based after‑school program that combines STEM enrichment,
    arts, and mentorship for under‑served Black youth in Lexington, and hopes to author a guide on managing teacher anxiety and building resilience.
