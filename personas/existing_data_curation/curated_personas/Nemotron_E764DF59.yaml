personas:
  professional: Darnasia Brown, a veteran elementary and middle school teacher with over 30 years of experience, blends meticulous lesson planning with a data‑driven, culturally responsive approach, leveraging
    adaptive reading programs and interactive whiteboards while steering new teachers toward evidence‑based practices and championing teacher wellbeing.
  sports: Darnasia Brown, an avid weekend walker on the Bluegrass trails, supports the Kentucky Wildcats basketball team and the Lexington Legends minor‑league baseball club, participates in a community
    softball league during spring, and schedules gentle stretching sessions after each walk to keep her joints limber.
  arts: Darnasia Brown, a dedicated choir member, finds solace singing gospel hymns alongside classics by Mavis Staples and Nina Simone, spends evenings quilting inspired by the patterns in the local folk
    art museum, and fuels her literary passion with monthly book‑club discussions of works by Toni Morrison and James Baldwin.
  travel: Darnasia Brown favors purposeful getaways that blend heritage and relaxation, often revisiting the Delta River towns that echo her family’s migration story, while also planning weekend trips to
    the historic mansions of Lexington, the blue‑grass music scene in Nashville, and a dream pilgrimage to New Orleans for its Mardi Gras parades.
  culinary: Darnasia Brown relishes cooking Southern soul‑food staples such as collard greens simmered with smoked turkey, fried catfish with a crisp cornmeal crust, and sweet potato pie spiced with nutmeg,
    frequently experimenting with garden‑fresh herbs like thyme and dill to reinvent family recipes.
  core: Darnasia Brown balances a meticulously organized professional life with a vivid love of community‑rooted traditions, while her relentless curiosity is tempered by a cautious skepticism and a heart
    that often feels the weight of anxiety.
background:
  cultural: Darnasia is a Black woman whose family roots trace back to the Great Migration from the Mississippi Delta to the Hill Country of Kentucky. Growing up in a close‑knit African American community
    in Lexington, she was shaped by the traditions of the historically Black church, Southern soul food, and a strong emphasis on education as a pathway to advancement. She actively participates in community
    events that celebrate Black history and culture, such as Juneteenth festivals and local NAACP initiatives. Her cultural identity informs her teaching philosophy, driving her commitment to culturally
    responsive pedagogy and mentorship of Black students and teachers in Jessamine County.
attributes:
  skills: '[''Curriculum Development'', ''Differentiated Instruction'', ''Data‑Driven Assessment'', ''Classroom Management'', ''Culturally Responsive Teaching'', ''Educational Technology Integration'',
