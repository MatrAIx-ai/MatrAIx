persona_description: A federal geospatial coordinator tasked with coordinating the development of important national geospatial data sets, including land parcel data. The individual is responsible for enacting
  policies that enable the creation of a national land parcel data set and is aware of the benefits of a national land parcel data system for all levels of government, the private sector, and individual
  citizens. The individual is knowledgeable about the challenges and obstacles that need to be overcome to achieve the vision of a complete national land parcel data set and has a unique perspective on
  the role of the federal government in coordinating geospatial activities.
