personas:
  professional: Wayne Ferguson, a budding junior robotics enthusiast and charismatic school debate participant, blends their curiosity-driven problem-solving with methodical project planning, reliably leading
    the LEGO Mindstorms club while delighting peers as the confident presenter during weekly showcase sessions.
  sports: Wayne Ferguson, captain of the Brookside Hoops basketball team and a forward for the Junior Falcons soccer club, emulates the playmaking of LeBron James and Kevin De Bruyne, organizes Saturday
    drills at the community park, and passionately supports the Golden State Warriors and Manchester United, balancing competitive drive with teamwork.
  arts: 'Wayne Ferguson channels their creative energy into elaborate Minecraft builds, LEGO constructions, and reading sci-fi adventures by Andy Weir, while enjoying the music of Imagine Dragons, watching
    the film ''Star Wars: The Rise of Skywalker'', and showcasing debate monologues that echo the theatrical flair of Lin-Manuel Miranda''s ''Hamilton''.'
  travel: Wayne Ferguson prefers planning road-trip itineraries on paper maps, has explored Yellowstone National Park and the beaches of San Diego, dreams of visiting the Eiffel Tower in Paris for architectural
    inspiration and the robotics expo in Tokyo, and balances adventure with family-oriented relaxation.
  culinary: Wayne Ferguson's favorite dishes include pepperoni pizza, chicken tacos, and sushi rolls, they can whip up a quick grilled cheese or a microwave mug cake, and they love experimenting with cheese-filled
    LEGO-shaped chicken nuggets, though they often hide extra candy in their backpack for late-night snacking.
  core: Wayne Ferguson is a curious, organized, talkative 12-year-old who merges tech tinkering with leadership, never misses a chance to be center stage, yet occasionally hoards snack wrappers and impulsively
    splurges on gadgets.
background:
  cultural: Wayne is a white American growing up in Port Saint Lucie, Florida. His family lives in a suburban neighborhood where outdoor activities like beach outings, fishing trips, and park visits are
    common. He attends a public middle school that reflects the diverse influences of Central Florida, exposing him to classmates from various cultural backgrounds while maintaining core American traditions
    such as celebrating Thanksgiving and the Fourth of July. The local community emphasizes friendly neighborhood gatherings, youth sports leagues, and participation in regional events like the St. Lucie
    County Fair, all of which shape Wayne's sociable and community‑oriented outlook.
attributes:
