  hobbies: '[''Basketball'', ''Soccer'', ''LEGO building'', ''Robotics kits (LEGO Mindstorms)'', ''Minecraft'', ''Reading sci-fi novels'', ''Debate club'', ''Community volunteering (library storytime)'',
    ''Exploring local nature trails'']'
  career_goals: Wayne aspires to combine his love of technology and community involvement by becoming a software engineer who designs educational games or interactive tools for kids. He plans to attend
    a STEM‑focused high school, earn a computer science degree, and later develop programs that teach coding and robotics to middle‑school students in his hometown. Additionally, he dreams of contributing
    to local environmental projects, such as creating apps that track beach clean‑up efforts, reflecting his practical curiosity and desire to make a positive impact.
