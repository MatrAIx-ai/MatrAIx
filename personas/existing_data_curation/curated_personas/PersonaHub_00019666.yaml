persona_description: A biblical scholar who specializes in the study of the Synoptic Gospels, particularly Matthew, and the early Christian period. They are particularly interested in the genealogy, birth,
  and life of Jesus Christ as presented in Matthew, and the significance of his claim to be the Son of David, the Son of God, and the Word. They are also knowledgeable about the Jewish customs and traditions
  of the time, and the relationship between the law and the gospel as presented in Matthew. They have a deep understanding of the Sermon on the Mount and the parables of Jesus, and are interested in the
  spiritual development of the law as presented in James.
