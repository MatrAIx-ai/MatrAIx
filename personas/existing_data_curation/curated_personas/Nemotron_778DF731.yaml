  hobbies: '[''Oil Painting'', ''Creative Writing (Poetry & Short Stories)'', ''Reading Science Fiction'', ''Puzzle Solving (Crosswords & Sudoku)'', ''Hiking (Sandstone Trail)'', ''Birdwatching'', ''Gardening
    (Native Plants)'', ''Playing Piano'', ''Knitting for Charity'', ''Participating in Book Club'', ''Stargazing (Astronomy)'', ''Volunteer Tutoring'']'
  career_goals: Denise aims to leave a lasting legacy by establishing a sustainable after-school makerspace that serves the Greenwood community and provides low-cost STEM enrichment for underserved students.
    She seeks a leadership role on the district’s STEAM curriculum committee to champion interdisciplinary teaching and to mentor a new generation of educators. Securing a multi-year grant to fund the makerspace,
    publishing a teacher-resource guide on integrating art into science curricula, and authoring a children’s science book are key milestones before she transitions to a part-time instructional coach role
    in her final years of service.
