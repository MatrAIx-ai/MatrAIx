persona_description: A physician and associate at the University of Pittsburgh Medical Center's Center for Biosecurity, who specializes in the treatment and management of radiation poisoning. He is experienced
  in the use of growth factors and antibiotics to treat hematopoietic-ARS and has experience with the development of repurposed drugs for ARS. He is aware of the challenges of finding an overlap between
  the use of drugs for hematopoietic-ARS and other organ systems, and is focused on finding effective treatments for ARS.
