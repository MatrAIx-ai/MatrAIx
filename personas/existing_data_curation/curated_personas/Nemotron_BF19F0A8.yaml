  hobbies: '["Community basketball games", "Weekend road trips with spouse and friends", "DIY truck maintenance projects", "Fishing on the Illinois River", "Attending live music concerts", "Participating
    in local truck shows", "Volunteering at community festivals", "Exploring new telematics and trucking tech"]'
  career_goals: William aims to advance from his driver‑sales hybrid role to a supervisory position such as fleet manager or regional sales director, leveraging his hands‑on experience to improve operational
    efficiency and client satisfaction. Over the next five years he plans to obtain a Class A CDL with endorsements, earn a Certified Transportation Professional credential, and complete a bachelor’s degree
    in logistics or supply chain management. He also harbors an entrepreneurial ambition to eventually purchase his own truck and build a small, driver‑owned fleet that emphasizes collaboration and a supportive
    culture. He wants to be a champion for greener trucking technologies while maintaining the flexibility that allows him to balance work and personal life.
