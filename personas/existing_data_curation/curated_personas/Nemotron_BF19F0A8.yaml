personas:
  professional: William Henderson, a 25‑year‑old driver‑sales hybrid, combines expert heavy‑vehicle operation with savvy customer‑service skills; they excel at route optimisation, fleet‑management software,
    and translating freight needs into customized solutions while staying flexible enough to improvise on‑the‑fly during dispatch or mechanical challenges.
  sports: William Henderson, a 25‑year‑old sports enthusiast, plays pick‑up basketball at the local community center, fishes on the Illinois River as a member of the Illinois River Anglers Club, and supports
    the Chicago Bulls, Chicago Bears, and Chicago Cubs, approaching fitness with a social, weekend‑focused routine rather than strict training regimens.
  arts: William Henderson, a 25‑year‑old fan of classic rock, regularly attends live gigs featuring groups like The Rolling Stones, Bruce Springsteen, and local blues bands, curates a personal playlist
    of 70s rock anthems for road trips, and enjoys occasional visits to regional art fairs where they appreciate folk‑art murals.
  travel: William Henderson, a 25‑year‑old road‑trip lover, prefers spontaneous weekend drives across Illinois to destinations such as Starved Rock State Park, Shawnee National Forest, and the historic
    town of Galena, balancing flexible itineraries with a modest travel budget while dreaming of a future cross‑country rally in a custom‑tuned truck.
  culinary: William Henderson, a 25‑year‑old who enjoys hands‑on cooking, favors hearty Midwestern fare like Chicago‑style deep‑dish pizza, smoked pork ribs, grilled trout with lemon, and a spicy Illinois
    river‑catch fish fry, cooks confidently on a portable grill during trips, but often juggles recipes with a habit of over‑seasoning to mask occasional bland meals.
  core: William Henderson, a 25‑year‑old pragmatic adventurer, blends a calm, resilient outlook with a love for social, active pastimes, balancing curiosity about truck tech with a relaxed, occasionally
    disorganized lifestyle.
background:
  cultural: William was raised in a Midwestern, white working‑class family in central Illinois. His upbringing reflects the region’s emphasis on hard work, modesty, community involvement, and a strong sense
    of hospitality. He attended a local public high school and earned an associate’s degree from a community college, where he was active in the student transport club. His cultural identity is shaped by
    traditional Midwestern values—pragmatism, reliability, and a collaborative spirit—combined with a modest Protestant background. He enjoys regional traditions such as Friday night high‑school football,
    county fairs, and close‑knit community gatherings that reinforce his sociable and cooperative nature.
attributes:
  skills: '["Safe heavy-vehicle operation", "Route planning and optimisation", "DOT compliance and regulatory knowledge", "Customer relationship management", "Sales negotiation and upselling", "Fleet management
