personas:
  professional: Enrique Roman, a hands-on home-health aide, blends BLS certification, bilingual communication, and meticulous vital-sign monitoring with a relaxed, adaptable attitude that lets them pivot
    quickly when clients' needs shift unexpectedly.
  sports: Enrique Roman enjoys hiking Cerro de Punta's rugged trails, plays pick-up basketball with the Juana Diaz Community Fitness Club, and faithfully cheers on the Cangrejeros de Santurce during baseball
    season, balancing outdoor adventure with team spirit.
  arts: Enrique Roman strums an acoustic guitar to salsa classics by Marc Anthony and Celia Cruz, dances at local gatherings, and dives into sci-fi sagas by Isaac Asimov and Neal Stephenson, letting music
    and literature shape their creative outlet.
  travel: Enrique Roman favors spontaneous weekend getaways to Ponce's coastal coves and occasional road trips to San Juan's historic district, while dreaming of a cultural immersion tour of Barcelona and
    a culinary adventure in Tokyo, balancing budget constraints with a craving for new experiences.
  culinary: Enrique Roman is a proficient home chef who masterfully prepares arroz con gandules, pasteles, and lechon using homemade sofrito and adobo, yet admits to overindulging on plantain chips during
    late-night study sessions.
  core: Enrique Roman is a curious, adaptable home-health aide who juggles guitar riffs, salsa steps, and ambitious nursing goals while wrestling with a laid-back approach to money and occasional health-care
    procrastination.
background:
  cultural: Enrique was raised in Juana Diaz, a town known for its close-knit families, vibrant fiestas patronales, and strong Afro-Caribbean musical traditions like bomba and plena. His upbringing was
    steeped in Spanish language, Catholic celebrations, and a deep respect for elders, which inspired his choice to work in home health care. The local cuisine, love of baseball, and communal gatherings
    have shaped his social habits, while the island's historical blend of indigenous Taíno, Spanish, and African influences informs his identity. Growing up amidst the challenges and resilience of Puerto
    Rico's communities, Enrique values hospitality, adaptability, and a sense of duty to his neighbors, all of which are reflected in his personal and professional life.
attributes:
  skills: '[''Patient care'', ''Assistance with activities of daily living'', ''Medication reminders'', ''Basic wound care'', ''Vital signs monitoring'', ''Bilingual communication (Spanish/English)'', ''Basic
