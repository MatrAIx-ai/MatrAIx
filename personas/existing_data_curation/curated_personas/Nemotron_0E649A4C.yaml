  hobbies: '[''Playing guitar'', ''Salsa dancing'', ''Cooking traditional Puerto Rican dishes'', ''Hiking in the hills near Ponce'', ''Watching baseball'', ''Reading science-fiction novels'', ''Volunteering
    at community health fairs'']'
  career_goals: Enrique aims to build on his home-health experience by earning a Certified Nursing Assistant (CNA) credential within the next year, followed by an associate degree in nursing. He envisions
    becoming a registered nurse who can supervise home-health teams and eventually open a small agency that specializes in culturally sensitive care for Puerto Rican seniors. To support these ambitions,
    he plans to attend workshops on geriatric care, pursue a certification in chronic disease management, and take evening business-management courses. While he values practical career advancement, his
    curiosity pushes him to stay abreast of new therapeutic approaches, blending his desire for stable income with the flexibility he enjoys in his current role.
