  career_goals: Mona aims to graduate high school with honors and secure a scholarship to a top university where she can study environmental engineering or computer science. She is motivated to lead a robotics
    team and participate in national science competitions, blending her curiosity for new technologies with her practical desire to develop sustainable solutions. Long‑term, she aspires to work on climate‑focused
    engineering projects or launch her own tech start‑up that addresses real‑world problems, while maintaining a disciplined, organized path toward those goals.
