personas:
  professional: A passionate middle‑school STEM teacher, Cindy Cardona leverages their bilingual fluency and data‑driven instruction to design interdisciplinary project‑based units that blend coding, science
    inquiry, and community engagement, while they balance curiosity‑driven experimentation with pragmatic classroom management.
  sports: Cindy Cardona powers through weekly long‑distance runs with the Baltimore Women's Running Club, cheers on the Baltimore Ravens during football season, follows the Baltimore Orioles in baseball,
    and they bring a competitive edge to community salsa tournaments.
  arts: Cindy Cardona fuels their creative spark by dancing salsa and bachata at weekly community events, curating playlists that range from Marc Anthony's upbeat classics to the electronic beats of Daft
    Punk, and they dive into science‑fiction discussions of works by N.K. Jemisin and Ann Leckie's during their book‑club meet‑ups.
  travel: Cindy Cardona's travel style mixes structured itineraries with spontaneous detours, having explored the historic streets of New Orleans, the vibrant markets of Medellín, and the tech‑focused neighborhoods
    of Seattle, while they budget for future immersive trips to Kyoto's cherry‑blossom festivals and a backpacking trek through the Peruvian Andes.
  culinary: Cindy Cardona enjoys preparing traditional dishes like pupusas filled with fresh cheese and loroco, often rounding out a potluck with yuca frita and curtido, yet they sometimes burn the edges
    of the masa when juggling dance rehearsals and hackathon deadlines.
  core: Cindy Cardona blends a fierce competitive streak with a community‑first mindset, and they turn every classroom lesson, dance‑floor step, and coding sprint into a chance to uplift bilingual under‑represented
    youth while juggling a love for midnight tacos and spontaneous marathon runs.
background:
  cultural: Cindy is a first‑generation American of Salvadoran descent, raised in a bilingual household where Spanish and English coexist fluidly. Her family maintains cultural traditions such as celebrating
    Día de los Farolitos, Semana Santa, and hosting familial gatherings centered around food and music. Growing up in Baltimore, she has woven the city's rich multicultural fabric into her identity, participating
    in local festivals, supporting community initiatives, and serving as a cultural bridge between her Salvadoran roots and the diverse student population she teaches.
attributes:
  skills: '[''STEM curriculum design'', ''Project‑based learning facilitation'', ''Digital tool integration (coding platforms, data visualization)'', ''Bilingual communication (Spanish/English)'', ''Classroom
    management with flexibility'', ''Data‑driven assessment'', ''After‑school STEM club leadership'', ''Mentoring peers on instructional technology'']'
  hobbies: '[''Salsa and bachata dancing'', ''Cooking and sharing Salvadoran cuisine'', ''Running club participation'', ''Science‑fiction book club'', ''Hackathon and coding meetups'', ''STEM outreach volunteering
    at the public library'']'
  career_goals: Cindy aims to become a district STEM coordinator, where she can scale successful instructional models across schools and champion equity in STEM access for underrepresented students. She
    plans to pursue a master's degree in Educational Technology to deepen her expertise in digital pedagogy. Over the next five years, she envisions launching a community partnership program that connects
    local tech firms and universities with her students, providing mentorship and real‑world project opportunities. Ultimately, she aspires to influence policy on bilingual STEM education and serve as a
    mentor for aspiring teachers from immigrant backgrounds.
