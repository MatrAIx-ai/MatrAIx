  hobbies: '[''Gardening'', ''Photography'', ''Historical Fiction Book Club'', ''Travel to Historic Sites'', ''Mediterranean Cooking'', ''Choir Singing'', ''Yoga'', ''Volunteer at Senior Centers'', ''Community
    Health Education'', ''Mentoring Young Professionals'']'
  career_goals: Fatemeh aims to advance to a regional director position within her health system, where she can shape integrated care models and expand telehealth services across multiple sites. She is
    eager to lead large‑scale quality and patient‑experience initiatives, champion data‑driven population health strategies, and foster collaborative partnerships with community organizations. Long‑term,
    she envisions transitioning to a consulting role or serving on nonprofit health boards, while continuing to mentor the next generation of health leaders.
