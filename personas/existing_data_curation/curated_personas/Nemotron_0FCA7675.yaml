personas:
  professional: Rula Khanna, a 26-year-old early childhood educator, blends curiosity with practicality by designing data-informed, story-rich curricula that integrate music, visual arts, and technology
    (Seesaw, ClassDojo, Google Classroom) while assertively championing inclusive practices and reliably coordinating field trips and bilingual parent communications.
  sports: Rula Khanna, an energetic 26-year-old, spends weekends hiking with the Griffith Park Hiking Club, practices yoga at the Sunset Yoga Collective, roots for the Los Angeles Lakers and Dodgers, and
    joins a co-ed beach volleyball league each summer to stay fit.
  arts: Rula Khanna, a sociable lover of the arts, channels the energy of Bollywood icons like Madhuri Dixit into weekly dance classes, captures the grit of Los Angeles street murals by photographing works
    from Banksy and Shepard Fairey, and draws narrative inspiration from contemporary novels such as Erin Morgenstern’s The Night Circus and picture books like Mo Willems’ The Pigeon Needs a Bath!
  travel: Rula Khanna, a 26-year-old explorer, meticulously plans weekend getaways using a color-coded spreadsheet, alternates between relaxed beach trips to Malibu and adventurous hikes in Sedona, and
    dreams of an immersive cultural immersion in Mexico City to practice Spanish, though budget constraints sometimes delay their international travel plans.
  culinary: Rula Khanna, a curious home chef, mixes mustard greens, fenugreek leaves, and ghee to perfect sarson da saag, slow-cooks chickpeas for fluffy chole bhature, experiments with spices like cumin,
    coriander, and garam masala, and pairs meals with mango lassi and freshly baked naan.
  core: Rula Khanna, a 26-year-old early-learning innovator, balances meticulous lesson planning with a love for Bollywood dance, yoga, and experimental cooking, yet habitually leaves their houseplants
    thirsty after a hectic day.
background:
  cultural: Rula is a second‑generation South Asian American born to Punjabi parents who emigrated from Punjab, India. She grew up bilingual, speaking Punjabi at home while mastering English at school.
    Her upbringing blended traditional celebrations like Baisakhi, Diwali, and Rakhi with the multicultural vibrancy of Los Angeles. Family values emphasize respect for elders, communal sharing of food,
    and storytelling through music and folk tales—elements that shape her teaching philosophy. She actively participates in the South Asian diaspora community through local temples and cultural centers,
    navigating her Indian heritage alongside her American identity to promote diversity and inclusion in her classroom.
attributes:
  skills: '[''Early Childhood Curriculum Design'', ''Classroom Management'', ''Bilingual Communication (English & Punjabi)'', ''Educational Technology Integration'', ''Child Development Assessment'', ''Social-Emotional
    Learning Facilitation'', ''Parent Engagement'', ''Cultural Literacy Integration'']'
  hobbies: '[''Yoga'', ''Bollywood Dance'', ''Cooking Indian Cuisine'', ''Hiking'', ''Community Gardening'', ''Reading Literary Fiction and Children’s Books'', ''Photography'', ''Attending Cultural Festivals'',
    ''Learning Spanish'']'
  career_goals: Rula aims to become a lead teacher and later a preschool program director within a multicultural early learning center. She plans to pursue a Master’s in Early Childhood Education with a
    focus on culturally responsive pedagogy. Over the next five years she wants to develop a community outreach model that connects South Asian families with local schools and, in the long term, she dreams
    of founding her own inclusive preschool that blends Montessori principles with South Asian storytelling traditions.
