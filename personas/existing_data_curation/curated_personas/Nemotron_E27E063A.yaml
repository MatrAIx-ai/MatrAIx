  hobbies: '["playing tag and hide‑and‑seek", "building forts and block castles", "drawing and coloring", "listening to storytime at the library", "singing nursery rhymes", "simple cooking tasks like washing
    fruits", "collecting and organizing stickers", "exploring the park and nature walks", "arranging toys on shelves"]'
  career_goals: Truc dreams of becoming a community helper who can protect and care for others. He often says he wants to be a firefighter because they keep people safe, a teacher because he enjoys sharing
    ideas, or a pediatric doctor who helps sick kids feel better. He also imagines being a "super organizer" who keeps things tidy and solves everyday problems. His ambitions blend his curiosity about how
    things work, his desire to help friends and family, and his organized, reliable nature.
