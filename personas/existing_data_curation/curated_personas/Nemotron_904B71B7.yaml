personas:
  professional: Shannon Bigley, a retired bank teller turned community volunteer coordinator, applies their meticulous budgeting, event‑planning, and digital‑tool savvy to mentor junior volunteers and spearhead
    senior arts and fitness programs at the local recreation center.
  sports: Shannon Bigley stays active through weekly senior low‑impact aerobics, the River Valley Walking Club’s morning strolls, and community garden work, while avidly supporting the Springfield Sluggers
    baseball team and the Springfield Hawks basketball franchise on television, and they never miss the seasonal senior pickleball league held each summer.
  arts: Shannon Bigley, a devoted member of the town’s community theater, regularly attends productions of classics like 'Our Town' and contemporary pieces by Lin‑Manuel Miranda, enjoys reading novels by
    Toni Morrison and listening to Ella Fitzgerald’s jazz standards, and often leads book‑club discussions on playwrights while weaving theatrical anecdotes into their cooking workshops.
  travel: Shannon Bigley prefers short, well‑planned road trips with their husband, such as weekend getaways to the historic streets of Savannah, the serene shores of Lake Erie, and the charming vineyards
    of Napa Valley, while harboring a long‑term wish to explore the Amalfi Coast’s cliffside villages in Italy.
  culinary: Shannon Bigley delights in crafting rustic chicken pot pie with flaky pastry, herb‑roasted carrots seasoned with rosemary and thyme, and spiced apple crumble topped with a dash of cinnamon,
    often sourcing fresh basil, tomatoes, and zucchini from their community garden to share during their weekly cooking circle.
  core: Shannon Bigley blends meticulous organization with a love for social gatherings, channeling their bank‑teller precision into lively cooking circles, yet they can’t resist a daily afternoon crossword
    that sometimes delays their garden watering schedule.
background:
  cultural: Shannon grew up in a suburban Florida community in the post‑World War II era, shaped by mid‑century American values of hard work, community involvement, and family stability. As a white Floridian,
    she blends traditional Southern hospitality with the diverse cultural tapestry of modern Orlando, often engaging with neighbors from varied backgrounds through volunteer work and local events. Her upbringing
    emphasized reliability, practicality, and a respect for both tradition and the evolving social fabric of her region.
