  hobbies: '[''book club'', ''senior fitness classes'', ''community gardening'', ''cooking workshops'', ''theater attendance'', ''road trips'', ''volunteer event coordination'', ''historical documentation'']'
  career_goals: Although retired, Shannon aims to remain active in her community by mentoring younger volunteers, expanding the senior fitness and arts programs at her local recreation center, and documenting
    the neighborhood's history for a community archive. She also aspires to develop a small venture offering homemade baked goods and gardening workshops, leveraging her practical skills while fostering
    intergenerational connections.
