personas:
  professional: Patricia Dawkins, a meticulous 2-year-old with an early knack for organization, treats each play session like a project by arranging blocks by color and size, demonstrates methodical planning
    and reliability, and quietly nurtures a future passion for logistics or design.
  sports: Patricia Dawkins, a 2-year-old who enthusiastically participates in toddler soccer at the local Community Playgrounds Club during spring and attends a weekly splash-pad swimming class in summer,
    proudly wears a miniature Chicago Cubs cap while cheering on the team on game days.
  arts: Patricia Dawkins, a 2-year-old who delights in finger painting vibrant scenes with Crayola paints, sings along to Disney's 'Let It Go' from Frozen and Pinkfong's 'Baby Shark', watches Sesame Street
    featuring Elmo for creative inspiration, molds play-dough into tiny sculptures, and often mimics the dance moves of child star Maddie Ziegler.
  travel: Patricia Dawkins, a 2-year-old who prefers car trips over flights for the comfort of their beloved stuffed giraffe, has explored the nearby zoo, enjoyed a family weekend at the Grand Canyon, and
    dreams of strolling through Kyoto's bamboo forest, always packing a favorite snack and a soft blanket to ease any stress from new environments.
  culinary: Patricia Dawkins, a 2-year-old with a selective palate, adores creamy elbow macaroni and cheese seasoned with a pinch of cheddar, loves crunchy chicken nuggets dipped in honey-mustard, enjoys
    banana slices and avocado toast with a sprinkle of lime, and proudly helps stir batter in the kitchen despite occasional spills.
  core: Patricia Dawkins, a meticulous, worry-prone 2-year-old with a competitive streak and a love for orderly play, balances curiosity with routine, turning everyday moments into mini-projects.
background:
