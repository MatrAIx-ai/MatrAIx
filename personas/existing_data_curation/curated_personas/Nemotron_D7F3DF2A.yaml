  career_goals: Nathan aims to formalize his practical knowledge with industry certifications such as the Certified Maintenance & Reliability Technician (CMRT) and an EPA HVAC certification. In the next
    few years he plans to move into a lead maintenance supervisor role, overseeing a larger portfolio of facilities. Long‑term, he envisions either managing a regional facilities operation for a mid‑size
    company or launching his own small‑scale maintenance service business, where he can embed his love for routine, organization, and reliable service delivery.
