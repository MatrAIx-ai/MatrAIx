  career_goals: Norma Marie aims to pursue post‑secondary education in communications or hospitality management, with the goal of entering a career that blends her love for people with her knack for organizing
    events. She envisions starting as a junior event coordinator or community outreach assistant, eventually moving into a leadership position where she can design inclusive programs for youth and families
    in Milwaukee. She also aspires to use her practical mindset to build a sustainable career that provides financial stability while keeping her engaged with the vibrant local culture.
