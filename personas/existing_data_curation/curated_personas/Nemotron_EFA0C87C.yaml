personas:
  professional: Norma Kennedy is an aspiring event coordinator who leverages strong interpersonal, organization, and rapid‑learning tech skills to lead community festivals and youth sports tournaments;
    they balance a curious, practical mindset with a calm yet assertive leadership style that keeps volunteers motivated and deadlines met.
  sports: Norma Kennedy is a high school volleyball player who also hikes the Lake Michigan shoreline, volunteers for youth soccer leagues, supports the Milwaukee Bucks and Brewers, and belongs to a local
    running club that meets for weekend 5K runs, reflecting their energetic, team‑oriented, and outdoorsy spirit, and they thrive on group activities.
  arts: Norma Kennedy captures cityscapes and concert moments with their DSLR, draws inspiration from photographers like Annie Leibovitz and musicians such as Sufjan Stevens and Bon Iver, and unwinds with
    contemporary fiction by Sally Rooney, showcasing how visual and musical arts shape their creative identity; they often share their photos on social media.
  travel: Norma Kennedy prefers budget‑friendly road trips with friends, has explored Chicago’s architecture and the Door County shoreline, dreams of photographing the fjords of Norway and hiking New Zealand’s
    Milford Track, and they plan itineraries using Google Maps while balancing school commitments and a modest travel fund.
  culinary: Norma Kennedy enjoys experimenting with family recipes, frequently prepares Midwest‑inspired dishes like cheese‑curd bratwurst, Lake Michigan trout with lemon‑dill sauce, and homemade apple
    pie, and they love cooking with fresh herbs such as rosemary and basil while occasionally treating themselves to a slice of authentic New York pizza.
  core: Norma Kennedy blends curiosity with practicality, juggling community event planning, photography, and a disciplined yet flexible financial routine, all while they manage teenage energy, occasional
    acne, and a habit of over‑packing for trips.
background:
  cultural: Norma Marie was raised in Milwaukee, a Midwestern city known for its blend of German, Polish, and broader immigrant heritage. Her family’s roots trace back to northern European ancestors, and
    she grew up with the region’s customary values of hard work, community involvement, and modest pragmatism. The city’s cultural scene—its breweries, music festivals, and lakefront recreation—has shaped
    her appreciation for diverse social experiences. While identifying as white American, she embraces the multicultural environment of Milwaukee, participating in local celebrations and respecting the
    city’s history of labor movements and neighborly solidarity.
