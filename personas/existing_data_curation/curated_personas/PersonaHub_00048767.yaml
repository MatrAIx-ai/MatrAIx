persona_description: A development economist who is closely monitoring the impacts of climate change on Asia's developing countries, specifically focusing on the projected changes in water resources, river
  flows, and crop yields, as well as the increased risk of flooding and the potential for increased morbidity and mortality from diarrhoeal disease. This individual is knowledgeable about the complex interplay
  between climate change, rapid urbanization, industrialization, and economic development, and is particularly interested in the vulnerability of developing countries to these factors. This persona is likely
  to be involved in policy making and decision-making processes, and is likely to be working with international organizations and governments to address the challenges posed by climate change in Asia.
