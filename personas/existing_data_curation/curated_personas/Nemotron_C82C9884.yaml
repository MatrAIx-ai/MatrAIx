personas:
  professional: Wayne Williamsaustin is an aspiring teenage robotics hobbyist and budding coder who blends curiosity with practicality, often juggling LEGO builds and beginner robotics kits while embracing
    a relaxed, flexible schedule that sometimes leaves their projects half‑finished.
  sports: Wayne Williamsaustin spends afternoons shooting hoops with the Eastside Hoops Club, follows the Los Angeles Lakers and their city’s high school basketball team, and hits the sidewalk for skateboarding
    drills, displaying a competitive drive that fuels both organized play and informal street sessions.
  arts: Wayne Williamsaustin curates hip‑hop and R&B playlists featuring Drake, Kendrick Lamar, and SZA, devours LEGO building tutorials on YouTube, and draws inspiration from visual artists like Takashi
    Murakami, weaving music and pop‑culture into their creative downtime.
  travel: Wayne Williamsaustin has explored Disney World in Orlando and taken a family road‑trip to the Appalachian Trail, and now dreams of a future adventure to Tokyo’s Akihabara district to experience
    its gaming arcades and anime culture, favoring short, budget‑friendly trips balanced with their school schedule.
  culinary: Wayne Williamsaustin enjoys whipping up quick spaghetti with marinara, cheese‑filled quesadillas, and peanut‑butter banana smoothies, experimenting with fresh basil and jalapeños, though they
    often leave the sink messy after cooking with their family.
  core: Wayne Williamsaustin is a competition‑driven, curiosity‑fueled teen who balances basketball, robotics, and hip‑hop beats while navigating a relaxed, sometimes disorganized lifestyle and a penchant
    for impulsive gaming‑fuelled nights.
background:
  cultural: Wayne is rooted in a Southern African‑American cultural tradition that values community, church, and family. Growing up in Pickens, South Carolina, he experiences the close‑knit dynamics of
    a small Black community within a largely rural setting, celebrating events such as Juneteenth, church picnics, and family reunions. The local cuisine, story‑telling, and gospel music shape his worldview,
    while the legacy of resilience and ambition in the Black South inspires his goals. He also feels a connection to broader African‑American culture through contemporary music, sports, and digital media,
    navigating his identity with pride and curiosity.
