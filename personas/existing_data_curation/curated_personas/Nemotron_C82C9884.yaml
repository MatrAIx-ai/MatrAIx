    youth group"]'
  career_goals: Wayne dreams of turning his love for video games and technology into a future career as a game developer or software engineer, while also keeping a practical foot in the automotive world
    by learning vehicle mechanics. He hopes to earn a scholarship to a university with a strong STEM program, possibly an HBCU, where he can combine coding with hands‑on engineering projects. Long‑term,
    he wants to create games that reflect his community’s stories and might even start a local youth tech workshop to give back to friends in Pickens.
