  career_goals: Luz dreams of one day becoming a teacher or a pediatric nurse, roles where she can continue to support and uplift others in a structured environment. In the short term, she hopes to be elected
    class representative so she can help keep her classroom harmonious and organize activities that make her peers feel included. Over the years, she also envisions volunteering at community health fairs
    and school events, combining her love for helping people with her natural organizational talent.
