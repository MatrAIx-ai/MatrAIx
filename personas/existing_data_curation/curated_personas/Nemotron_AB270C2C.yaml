background:
  cultural: Abdul is born into an African‑American family rooted in Cincinnati’s historic West End, a neighborhood that has long been a center of Black culture, entrepreneurship, and activism. His family’s
    lineage traces back to the Great Migration, bringing Southern traditions, gospel music, and a deep sense of community resilience. Growing up, he will be immersed in the city’s rich artistic scene—including
    the Cincinnati African American Arts Consortium, local jazz clubs, and community festivals—while also experiencing Midwestern values of neighborly support and modesty. These cultural currents shape
    his identity, fostering an appreciation for storytelling, collective uplift, and the celebration of Black heritage.
