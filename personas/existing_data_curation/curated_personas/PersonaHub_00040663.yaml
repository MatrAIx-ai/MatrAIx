persona_description: A historian interested in the history of religious institutions and their impact on society, particularly in the context of the Francophone community in Quebec. This person is knowledgeable
  about the history of the Québec Seminary, its role in the education and evangelization of the Francophone and Aboriginal inhabitants of the Diocese of Québec, and its legacy as the founding institution
  of Laval University. They are also interested in the architectural style of the Seminary, its collections, and its role in the Memory of the World Programme.
