  hobbies: '[''Watercolor painting'', ''Reading art and biography books'', ''Visiting museums and galleries'', ''Gardening (herbs, roses, tomatoes)'', ''Cooking traditional Puerto Rican cuisine'', ''Listening
    to salsa and Latin jazz'', ''Walking the Clinton River trail'', ''Photography of nature and community events'', ''Volunteer event organization at the local community center'']'
  career_goals: Although retired, Javier remains driven to stay intellectually engaged and to give back to his community. His primary ambition is to preserve and share Puerto Rican cultural heritage in
    Clinton by organizing intergenerational art workshops and documenting oral histories of the local diaspora. He also aspires to complete a personal watercolor series that captures memories of his family’s
    journey from Puerto Rico to Massachusetts. Additionally, he hopes to improve his digital photography skills, volunteer as a mentor for at‑risk youth at the senior center, and maintain his health through
    regular walking and gardening, thereby reducing stress and ensuring a vibrant, purposeful retirement.
