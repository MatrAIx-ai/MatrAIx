personas:
  professional: At 51, Adriana Santana, a community‑oriented home‑based caterer in Miami, leverages her strong organizational skills and practical cooking expertise to deliver authentic island‑inspired
    comfort meals for church events, family gatherings, and neighborhood fiestas, they coordinate volunteers and manage logistics to ensure each event runs smoothly, while balancing a routine‑driven schedule
    with the energetic social engagement they thrive on.
  sports: At 51, Adriana Santana, an avid beach walker, joins a weekend walking group along the Miami shoreline, they cheer for the local football and basketball teams and enjoy occasional friendly pick‑up
    basketball at the community center, while staying fit through salsa dancing nights that double as cardio exercise.
  arts: At 51, Adriana Santana, a passionate fan of classic Spanish‑language telenovelas and salsa music, regularly watches shows like "Los ricos también lloran" and listens to legendary salsa vocalists,
    they often attend community dance nights where they showcase lively moves, and they appreciate local theater performances that celebrate cultural storytelling.
  travel: At 51, Adriana Santana, a methodical traveler who balances budget constraints with a love for discovery, prefers planned weekend escapes to nearby island destinations and historic coastal towns,
    they dream of a leisurely cruise through the Caribbean while still cherishing day trips to the local botanical garden and the vibrant art districts of Miami.
  culinary: At 51, Adriana Santana, an adept home cook, delights in preparing slow‑cooked shredded beef stew, seasoned chicken with rice, and yuca tossed in a garlicky sauce, they grow cilantro and oregano
    on their balcony to freshen dishes, they experiment with family recipes for community potlucks, and they occasionally over‑salt a pot of beans in their zeal to please guests.
  core: At 51, Adriana Santana blends routine‑driven organization with vibrant social energy, channeling her love for community into a modest catering venture while navigating health worries, financial
    caution, and a fondness for lively dance and beach walks.
background:
  cultural: 'Adriana is a first‑generation Cuban‑American who grew up in Miami’s vibrant Little Havana neighborhood. Her upbringing was steeped in Cuban traditions: from the aroma of arroz con pollo simmering
    on Sundays to the lively rhythms of son and mambo that fill neighborhood festivals. She celebrates Cuban holidays such as Día de la Cultura Cubana and maintains strong ties to the Cuban exile community,
    often attending church services conducted in Spanish and participating in communal events like the annual Calle Ocho parade. Family meals, storytelling, and respect for elders are cornerstones of her
    cultural identity. While she embraces American life, Adriana’s daily routine reflects a blend of Cuban hospitality, Catholic faith, and the close‑knit social fabric that defines Miami’s Cuban diaspora.'
