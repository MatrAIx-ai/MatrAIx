  career_goals: Adriana aims to translate her longstanding community involvement into a modest, home‑based enterprise that provides a steady supplemental income while preserving the routine she values.
    She wishes to launch a small catering service offering authentic Cuban comfort foods for local church events, family gatherings, and neighborhood fiestas. Concurrently, she seeks a leadership role within
    her church’s outreach committee, where she can mentor younger volunteers and oversee event logistics. Adriana also hopes to complete a short adult‑education course in food safety to meet local health
    regulations, strengthening her confidence and reducing the stress she sometimes feels about compliance. Ultimately, her goal is to achieve financial self‑reliance that allows her to support aging relatives
    without compromising her need for predictable, manageable responsibilities.
