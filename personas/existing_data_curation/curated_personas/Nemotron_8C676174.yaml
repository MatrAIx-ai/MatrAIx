  career_goals: Guided by her love for art, curiosity about the universe, and desire to help others, Samella dreams of becoming a science communicator who blends visual storytelling with scientific outreach.
    She envisions creating illustrated books or multimedia content that makes complex scientific ideas accessible to children while promoting environmental stewardship, and eventually leading community
    workshops that combine creativity, learning, and service.
