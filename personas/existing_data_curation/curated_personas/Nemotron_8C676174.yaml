personas:
  professional: Samella Walker is an aspiring multimedia storyteller who intertwines disciplined piano practice, intricate LEGO engineering, and vivid fantasy sketching to prototype interactive narratives,
    channeling their boundless imagination into school STEM and art clubs while maintaining high personal standards.
  sports: Samella Walker splits time between hip-hop dance circles, playing forward for the River Rapids youth soccer club, cheering for the Chicago Bulls, joining the school’s swim team during summer,
    and keeping a weekly jogging schedule at the neighborhood park, reflecting their energetic, disciplined, and sociable spirit.
  arts: Samella Walker immerses themselves in the vibrant worlds of fantasy author N.K. Jemisin, sketches characters inspired by Miyazaki's animated heroines, masters Chopin's nocturnes on piano, grooves
    to Kendrick Lamar's beats, lifts spirits with Kirk Franklin’s gospel hymns, and reveres the rhythmic pulse of traditional djembe drummers during family gatherings, weaving these influences into their
    own creative projects.
  travel: Samella Walker thrives on weekend excursions to Redwood National Park and the bustling Children's Museum of Indianapolis, savors family road trips to Orlando’s Wizarding World, and dreams of exploring
    Tokyo’s Akihabara district for its sci-fi pop culture, preferring to map out adventures with colorful stickers while balancing limited allowance and school schedule.
  culinary: Samella Walker delights in baking buttery chocolate chip cookies with caramel swirls, whipping up zucchini and feta pancakes for brunch, and sprinkling fresh mango salsa over grilled chicken,
    showcasing their intermediate cooking skills and love for sweet-savory combos learned alongside family in the kitchen.
  core: Samella Walker, a ten-year-old dreamer, juggles disciplined piano practice, LEGO inventions, and fantasy storytelling while constantly worrying about tiny details, yet always finds time to share
    a smile or a helping hand with friends.
background:
  cultural: Samella is raised in an African‑American family in Millville, New Jersey, where church, community service, and family storytelling are central. Her grandparents share oral histories and traditions
    from the Southern United States, and her parents incorporate contemporary Black culture—such as hip‑hop, gospel, and African rhythms—into everyday life. Celebrations of Kwanzaa and Juneteenth reinforce
    a strong sense of heritage, while the supportive local Black community encourages academic excellence, artistic expression, and collective responsibility. These cultural influences shape Samella's compassionate
    outlook, collaborative spirit, and artistic sensibility.
