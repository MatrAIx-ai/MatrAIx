  hobbies: '[''Hiking'', ''Trail running'', ''Skiing'', ''Yoga'', ''Meditation'', ''Group fitness classes (Zumba, indoor cycling)'', ''Bridge (card game)'', ''Local theater'', ''Volunteer work at food bank'',
