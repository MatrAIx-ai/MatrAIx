  career_goals: Keren aims to advance into senior engineering management, eventually assuming a director of engineering and operations role where she can integrate technical innovation with business strategy.
    She is passionate about leading sustainable engineering projects that improve safety and environmental performance in the energy and manufacturing sectors of Montana. Mentoring junior engineers, fostering
    a collaborative workplace culture, and expanding community outreach programs that promote STEM education for girls and underrepresented groups are central to her long‑term ambitions.
