  career_goals: He aims to channel his practical curiosity into a stable technical role. Over the next two years he plans to enroll in a community college IT support certification program, gain a CompTIA
    A+ credential, and secure an entry‑level help‑desk position. In the longer term he hopes to combine his tech skills with his passion for community service by working for a non‑profit that provides digital
    literacy training to seniors and recent immigrants. He also entertains the idea of opening a modest food stall that offers his favorite family recipes, once he achieves a reliable income.
