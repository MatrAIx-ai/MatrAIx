personas:
  professional: Raymond Paxton combines a curious, hands‑on knack for small‑engine repair and basic carpentry with a practical, organized workflow, using their newly earned HVAC certification to launch
    a modest handyman‑service business that stays flexible enough to accommodate their anxiety‑driven need for occasional downtime.
  sports: Raymond Paxton shoots hoops in weekend pickup basketball games, pitches for the Ferdinand Firemen Softball Club during summer, hikes local trails to stay fit, and they cheer loudly for the Indiana
    Pacers, the Indianapolis Colts, and the Chicago Cubs, balancing a love of team spirit with personal activity.
  arts: Raymond Paxton lights up the stage in community theater productions like 'Our Town', strums acoustic renditions of John Mayer and The Avett Brothers at local open‑mic nights, devours Neil Gaiman
    and Octavia Butler novels, and they mark the calendar for regional festivals such as the Indiana State Fair and the Indy Jazz Fest, weaving artistic expression into their social life.
  travel: Raymond Paxton plans trips with a mix of spontaneous road‑trips and carefully budgeted itineraries, having camped in the Great Smoky Mountains, explored Chicago’s music scene, and now daydreams
    about trekking the Austrian Alps and soaking in the hot springs of Iceland, all while balancing the cost of their budding handyman business and they schedule travel around volunteer commitments.
  culinary: Raymond Paxton, a competent home cook, frequently grills Patoka Lake‑caught perch with a lemon‑thyme rub, whips up smoky barbecue ribs seasoned with smoked paprika and brown sugar, and they
    perfect a hearty lentil‑and‑vegetable chili spiced with cumin and chipotle, while also indulging in craft‑beer‑paired pizza nights featuring fresh mozzarella and basil.
  core: Raymond Paxton is a sociable, hands‑on problem‑solver who balances relentless curiosity with anxious sensitivity, channeling energy into community projects, DIY repairs, and spontaneous music while
    they wrestle with occasional bouts of anxiety.
background:
  cultural: Raymond grew up in a white, Midwestern family in Perry County, Indiana, with roots tracing back to German and Irish ancestors. His upbringing emphasized modesty, self‑reliance, and strong community
    ties, reflected in participation in county fairs, high‑school sports, and local church gatherings. The region’s blend of agricultural and small‑town manufacturing culture shaped his practical work ethic
    and appreciation for hands‑on skills, while his social nature is reinforced by the close‑knit community networks typical of rural Indiana.
