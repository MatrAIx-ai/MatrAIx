  hobbies: '[''Pick‑up basketball'', ''Softball league'', ''Community theater'', ''Woodworking'', ''DIY electronics'', ''Hiking'', ''Fishing'', ''Acoustic guitar'', ''Science‑fiction reading'', ''Volunteering
    at food bank'', ''Attending music festivals'']'
  career_goals: Raymond wants to re‑enter the workforce within the next year by obtaining a certification in HVAC or IT support, which will let him combine his mechanical aptitude with his tech interest.
    He aims to launch a modest handyman‑service business that serves the Ferdinand area, providing reliable home‑repair work while maintaining a flexible schedule that accommodates his mental‑health needs.
    Long‑term, he hopes to become a community‑center coordinator, using his sociable personality and organizational talent to run local programs and support others facing anxiety and stress.
