  hobbies: '[''Urban gardening'', ''Traditional Puerto Rican cooking'', ''Salsa dancing'', ''Literacy tutoring'', ''Reading mystery novels'', ''Crossword puzzles'', ''Hudson River waterfront walks'']'
  career_goals: Maria aims to transition from a store‑level supervisor to a district‑level manager within the next three years, leveraging her proven track record to drive multi‑store performance improvements.
    She seeks to implement structured mentorship programs that support emerging supervisors, especially those from under‑represented backgrounds. In parallel, Maria plans to enroll in an associate’s degree
    program in Business Administration to augment her practical experience with formal credentials. Long‑term, she envisions establishing a community‑focused boutique that showcases Puerto Rican artisans,
    merging her retail expertise with cultural entrepreneurship, while ensuring a stable financial foundation for retirement.
