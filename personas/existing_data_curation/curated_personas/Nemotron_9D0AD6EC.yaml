personas:
  professional: Kayla Stiner, an architect specializing in sustainable mixed‑use projects, leverages advanced BIM and parametric tools to translate client visions into constructible designs while navigating
    complex permitting, channeling their competitive drive and curiosity into award‑winning work despite a laid‑back, sometimes disorganized approach that favors flexibility over rigid planning.
  sports: Kayla Stiner enjoys weekend sailing with the Galveston Bay Yacht Club, occasionally paddles a kayak on the bay, follows the Houston Astros and Rockets loyally, and fits in a casual Thursday night
    5K with the Houston Run Club, though their competitive streak often fuels a drive to improve times despite a generally relaxed approach to regular workouts.
  arts: Kayla Stiner frequents contemporary art museums to study works by Kerry James Marshall and Gordon Parks, sketches urban skylines in the evenings, and immerses themselves in live jazz at venues featuring
    Wynton Marsalis and Esperanza Spalding, letting the improvisational energy sharpen their design instincts.
  travel: Kayla Stiner prefers spontaneously curated trips that blend design inspiration with culinary adventure, having explored the modernist neighborhoods of Barcelona and the sustainable waterfront
    of Copenhagen, while dreaming of a future sailing excursion to the Greek islands of Santorini and Mykonos after a long‑planned family vacation to New Orleans for its Creole‑Tex‑Mex flavors.
  culinary: Kayla Stiner whips up vibrant Creole‑Tex‑Mex meals like jambalaya spiced with smoked paprika, chipotle, and fresh cilantro harvested from their garden, alongside perfectly grilled fish tacos
    topped with mango salsa and a side of roasted okra, showcasing a confident, experimental cooking style that thrives on bold, layered flavors.
  core: Kayla Stiner blends a fierce competitive edge with a laid‑back, disorganized rhythm, channeling curiosity into award‑winning sustainable designs while habitually forgetting to file taxes until the
    last minute and constantly scrolling through art catalogs for inspiration.
background:
  cultural: Kayla’s cultural identity as a Black woman in Texas shapes both her personal outlook and professional ethos. She grew up attending a close‑knit African‑American church community that valued
    storytelling, music, and communal support, instilling a deep appreciation for collective spaces. Family narratives about pioneering Black architects, such as Paul Revere Williams, sparked her early
    fascination with design. In her work, she strives to embed cultural inclusivity, using spatial strategies that honor the histories of the neighborhoods she builds in. She is active in local chapters
    of the National Organization of Minority Architects (NOMA) and participates in Houston’s Juneteenth celebrations, often weaving regional culinary and artistic traditions into her social gatherings.
    Kayla’s heritage informs her dedication to creating environments where diverse voices feel seen and welcomed.
attributes:
  skills: '[''Revit'', ''AutoCAD'', ''BIM'', ''Grasshopper'', ''Rhino'', ''Energy Modeling'', ''Structural Analysis'', ''Sustainable Design'', ''Historic Preservation'', ''Project Management'', ''Team Leadership'',
    ''VR/AR Visualization'']'
  hobbies: '[''Sketching'', ''Analog Photography'', ''Visiting Art Galleries'', ''Sailing'', ''Cooking Creole‑Tex‑Mex Cuisine'', ''Gardening'', ''Live Jazz Concerts'', ''Maker Spaces'', ''STEM Mentoring'',
    ''Collecting Architectural Books'']'
  career_goals: Kayla aims to become a principal architect and eventually a partner at her firm, spearheading large‑scale, environmentally responsible mixed‑use projects in the Greater Houston region. She
    wants to establish a community design studio that engages local residents, especially underserved neighborhoods, in participatory planning. Her competitive drive fuels a desire to win regional design
    awards and to publish research on culturally responsive architecture. She also plans to mentor emerging Black architects, serve on professional boards, and influence city planning policy toward equity
    and resilience.
