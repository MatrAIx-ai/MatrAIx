personas:
  professional: Mary Small, a 32-year-old insurance underwriter, blends a disciplined, data‑driven workflow with a naturally talkative, competitive edge to excel at quantitative risk assessment, policy
    drafting, and guiding junior staff through Excel pivot tables, VBA snippets, and Guidewire platform intricacies while relentlessly pursuing CPCU certification.
  sports: Mary Small competes in a women’s bowling league at the downtown alley, roots for the Louisville Cardinals basketball team, joins the local hiking club to explore the Red River Gorge trails each
    summer, and occasionally attends Cincinnati Reds games when traveling to nearby Ohio.
  arts: Mary Small channels her love for the arts through singing alto in the church choir, devouring Agatha Christie mysteries, curating quarterly board‑game evenings inspired by strategy designers like
    Reiner Knizia, and slipping quotes from Meryl Streep’s performances into community event speeches.
  travel: Mary Small prefers structured weekend getaways, often planning road trips to Appalachian state parks such as Shenandoah and Great Smoky Mountains, has a bucket‑list destination of New Zealand’s
    Milford Track, and balances wanderlust with a budget that prioritizes family visits to her sister’s farm in Iowa.
  culinary: Mary Small boasts moderate cooking skill, regularly baking seasonal pies—apple with a sprinkle of cinnamon, pumpkin infused with nutmeg and ginger—and transforms garden harvests into roasted
    beet salads, zucchini lasagna, and fresh salsa using heirloom tomatoes and cilantro.
  core: Mary Small, a competitively sociable underwriter with a penchant for puzzles, pies, and community projects, navigates life with structured efficiency and a healthy dose of talkative flair.
background:
  cultural: Mary grew up in London, Kentucky, a small town in Laurel County nestled in the Appalachian foothills. Her family’s white Southern heritage emphasized close‑knit community bonds, church involvement,
    and a strong work ethic. She attended local public schools and completed some coursework at Eastern Kentucky University before entering the insurance field. Regional customs—such as Southern hospitality,
    participation in county fairs, bluegrass music, and church gatherings—have shaped her values of reliability, practicality, and generosity. While she embraces the laid‑back, neighborly spirit of her
    hometown, Mary also integrates the structured, goal‑oriented mindset fostered by her professional environment.
