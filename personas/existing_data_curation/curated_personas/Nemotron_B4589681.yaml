  career_goals: Mary aims to achieve the Chartered Property & Casualty Underwriter (CPCU) designation within the next two years and advance to a senior underwriting manager role overseeing a regional portfolio.
    She envisions leading a high‑performance underwriting team, introducing predictive‑analytics tools to improve loss‑ratio forecasting, and developing a specialty line focused on agribusiness and rural
    property risks. Long‑term, she aspires to become a chief underwriting officer or risk‑management consultant, where she can shape strategic risk policies while mentoring the next generation of underwriters.
