persona_description: A healthcare professional who works in pediatric gastroenterology, focusing on the treatment and management of acute gastroenteritis (AGE) in children. They are knowledgeable about
  the etiology, diagnosis, and treatment of AGE, including the use of oral rehydration, nasogastric rehydration, and intravenous rehydration. They are also familiar with the use of medications, such as
  ondansetron, for the treatment of nausea and emesis caused by AGE. They are aware of the guidelines for AGE treatment, including the use of absorbents and antisecretory medication, and are prepared to
  provide care for children with AGE. They have experience in monitoring the progress of patients, adjusting treatment plans as needed, and communicating with parents and other healthcare providers.
