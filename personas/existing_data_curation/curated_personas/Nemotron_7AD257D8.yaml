personas:
  professional: David John is a budding junior builder and coder who blends his love for LEGO architecture with early programming skills, meticulously planning his creations while his spontaneous streak
    often drives him to improvise mid‑build, making him a cooperative yet occasionally assertive member of his Kids Coding Club.
  sports: David John spends his afternoons dribbling for the Eastside Falcons U‑9 soccer squad, swapping the ball for a baseball glove with his neighborhood Little League Tigers, and channels his energy
    into backyard fort‑building workouts, while cheering for the national soccer team and idolizing Lionel Messi.
  arts: David John flips through adventure comics by Stan Lee, draws rockets and trucks inspired by Pixar's 'Toy Story' and the vibrant murals of street artist JR, hums Disney movie soundtracks, and experiments
    with finger painting during library art sessions.
  travel: David John dreams of a family road trip to Yellowstone National Park to see geysers, cherishes memories of a weekend visit to the city science museum and a summer vacation at Santa Cruz beach,
    preferring structured itineraries with frequent playground stops to keep his curiosity fueled.
  culinary: David John favors cheesy pepperoni pizza, crunchy chicken nuggets, and towering strawberry‑banana smoothies, can assemble his own PB&J sandwiches with practiced precision, yet often sneaks extra
    cheese onto his plate despite his parents' reminders to balance his meals.
  core: David John is a structure‑loving yet impulsive LEGO‑building soccer enthusiast who balances organized play with spontaneous bursts of creativity, often forgetting homework after a fort‑building
    marathon.
background:
  cultural: David grows up in a middle‑class, predominantly white neighborhood in Columbus, Ohio, where Midwestern values such as friendliness, community involvement, and a love for local sports are common.
    His family celebrates typical American holidays—Thanksgiving, Christmas, and Fourth of July—with a blend of home‑cooked meals and community events like the Columbus Fair. He attends a public elementary
    school that incorporates regional history and emphasizes participatory learning. Exposure to Ohio State sports, local library programs, and community service projects shapes his sense of belonging and
    cultural identity.
