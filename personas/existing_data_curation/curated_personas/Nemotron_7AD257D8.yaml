  career_goals: He dreams of becoming an astronaut or a firefighter, inspired by his fascination with space missions and his appreciation for community heroes who provide order and safety. He also enjoys
    video games and sometimes imagines designing his own games, so a future in game development or engineering also appeals to him. He values roles that combine clear structure with the chance to solve
    real‑world problems.
