  hobbies: '[''Photography'', ''Art Museum Visits'', ''DIY Woodworking'', ''Reading Non‑Fiction'', ''Milwaukee Bucks Fandom'', ''Live Music Attendance'', ''Hiking'', ''Cooking'', ''Community Art Volunteering'']'
  career_goals: Robert aims to move into a supervisory role within the next two to three years, targeting positions such as Shift Lead or Inventory Supervisor at his current retailer. He plans to enroll
    in a supply chain management certificate program at a local community college to formalize his logistics knowledge. Long‑term, he envisions transitioning to a logistics coordinator role at a regional
    distribution centre, where he can leverage his process‑improvement skills on a larger scale. Simultaneously, he nurtures a side ambition to launch a modest online boutique that merges his love for art
    with his inventory expertise, allowing him to curate and sell affordable prints and handmade goods.
