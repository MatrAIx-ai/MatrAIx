  hobbies: '[''Traditional Peruvian cooking'', ''Yoga'', ''Salsa dancing'', ''Reading on child development'', ''Crafting with children'', ''Community volunteering'', ''Gardening'', ''Listening to Andean
    music'', ''Exploring Chicago parks'']'
  career_goals: Silvia aims to advance to a lead teacher or program coordinator role within the next three years, pursuing a bachelor’s degree in Early Childhood Education to deepen her pedagogical knowledge.
    She aspires to develop a culturally inclusive daycare that celebrates Peruvian heritage and serves the growing Latino community in Chicago. Long‑term, she hopes to become an advocate for early childhood
    policies that promote equity and bilingual education.
