persona_description: A historian and archivist of the gay and lesbian movement in the United States, particularly focusing on the early years of the movement and its relationship with mainstream institutions
  like the church. He was a self-proclaimed archivist of the gay and lesbian movement in America and formed the Institute for Social Ethics as an umbrella organization under which he collected lesbian and
  gay periodicals and newspapers from many parts of the United States. He also corresponded with Rev. Canon Clinton Jones who headed ecumenical efforts to address the spiritual needs of the gay and lesbian
  community in Hartford, Connecticut, from the 1963 onward.
