personas:
  professional: Reem Ahmed, a methodical and curious high‑school junior, combines a love for Python mini‑projects and robotics club leadership with a budding talent for digital illustration, volunteering
    as a math tutor while planning to pursue a degree in computer science and artificial intelligence.
  sports: Reem Ahmed, a fan of Manchester City and the Los Angeles Lakers, participates in the school’s track and field team and a weekly yoga club, while also following the Indian Premier League’s Kolkata
    Knight Riders and occasionally playing casual cricket with friends during the summer.
  arts: Reem Ahmed channels creative energy into digital illustrations on Procreate, drawing inspiration from Studio Ghibli’s Hayao Miyazaki and A.R. Rahman’s compositions, while regularly practicing the
    sitar to stay linked to cultural roots and diving into science‑fiction novels by Ann Leckie.
  travel: Reem Ahmed has explored the historic streets of Marrakech during a family holiday, dreams of attending the Tokyo Game Show and visiting Berlin’s techno clubs, prefers short, well‑planned trips
    with friends, and balances travel ambitions with a limited teen budget by using student discount passes.
  culinary: Reem Ahmed enjoys cooking family biryani with basmati rice, cumin, and saffron, rolling samosas filled with spiced potatoes and peas, and experimenting with homemade naan dough, while also savoring
    occasional ramen bowls and perfecting mango lassi drinks.
  core: Reem Ahmed is a curious, organized teen who balances coding, sitar practice, and yoga with a touch of anxiety‑driven perfectionism, making them a diligent student, thoughtful volunteer, and budding
    creative.
background:
  cultural: Reem is a second‑generation South Asian American raised in Hingham, Massachusetts. Her family blends Hindu and Muslim traditions, reflected in celebrations of both Diwali and Eid, bilingual
    conversation in English, Hindi, and occasional Urdu, and a mixed culinary repertoire that includes both vegetarian and meat‑based dishes. The emphasis on education, respect for elders, and close family
    ties are core values in her household, encouraging her academic diligence and sense of responsibility. Living in a diverse suburban environment, she participates in a local South Asian cultural center,
    where she learns classical music and contributes to community service projects. This multicultural upbringing shapes her identity, providing a strong sense of heritage while also fostering adaptability
    to broader American society.
attributes:
  skills: '["Effective time management", "Organized digital note-taking", "Basic Python programming", "Bilingual communication (English, Hindi/Urdu)", "Event planning for school clubs", "Creative writing
