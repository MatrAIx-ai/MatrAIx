  hobbies: '["Reading science-fiction and non-fiction", "Reflective journaling", "Python mini-projects", "Digital illustration (Procreate)", "Playing the sitar", "Cooking traditional South Asian dishes",
    "Math tutoring for younger peers", "Robotics club participation", "Yoga and mindfulness meditation", "Attending Diwali and Eid community events"]'
  career_goals: Reem aims to graduate high school with strong academic credentials and earn a scholarship to a top university where she can major in biomedical engineering or computer science. She is driven
    to combine her technical curiosity with her personal experience of stress and anxiety, ultimately designing health‑technology solutions that support adolescent mental wellness. In the long term, she
    envisions working as a medical device engineer or health‑tech product manager, while also mentoring South Asian youth in navigating academic pressures and mental‑health challenges. Her ambition balances
    practical career stability with a desire to make a tangible, compassionate impact.
