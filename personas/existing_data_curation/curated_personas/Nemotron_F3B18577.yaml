  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Playing classical guitar'', ''Cooking traditional Mexican dishes'', ''Reading historical fiction'', ''Photography of local
    neighborhoods'', ''Volunteer tutoring at community center'', ''Gardening in his backyard'', ''Attending cultural festivals'', ''Exploring contemporary art movements'']'
  career_goals: Although retired from formal employment, Juan aims to channel his curiosity and compassion into sustained community impact. He hopes to become a volunteer coordinator for local art festivals,
    designing inclusive programs that bring seniors and youth together. Juan also plans to lead a series of free watercolor and photography workshops at the senior center, fostering creativity and social
    connection. In parallel, he aspires to document neighborhood histories through a community‑based oral‑history project and eventually compile his reflections into a memoir that highlights the blend of
    Mexican heritage and San Antonio life. Flexibility and an open‑minded approach guide his ambitions, allowing him to adapt his efforts as opportunities arise.
