persona_description: A climate scientist who specializes in the study of the Earth's atmosphere and its interactions with the greenhouse gases, particularly carbon dioxide, methane, and nitrous oxide. Her
  research interests include the effects of global warming on the Earth's climate, the mechanisms by which these gases trap heat in the atmosphere, and the potential consequences of increasing concentrations
  of these gases. She is particularly interested in the long-term impacts of climate change on the Earth's ecosystems, biodiversity, and human societies.
