personas:
  professional: Reymi Reynel, a budding business professional with an associate’s degree in Business Administration, leverages their bilingual fluency, event‑planning experience, and emerging data‑analysis
    skills to craft community‑focused marketing campaigns, balancing curiosity‑driven experimentation with practical project‑management discipline while often double‑checking details out of a habit of worry.
  sports: Reymi Reynel stays active through sunrise hikes with the Orange County Hiking Club, complements the cardio with weekly yoga sessions, and follows the Los Angeles Lakers, Dodgers, and Galaxy for
    a seasonal sports fix, enjoying occasional pick‑up soccer games with friends while keeping an eye on personal fitness goals.
  arts: Reymi Reynel nourishes their creative side by curating Instagram stories of street photography inspired by Annie Leibovitz's framing, attending indie concerts featuring Clairo and Phoebe Bridgers,
    and volunteering at local Día de los Muertos altar workshops where they blend traditional motifs with modern design sensibilities.
  travel: Reymi Reynel prefers thoughtfully planned trips that balance cultural immersion with budget consciousness, having explored San Diego’s coastal murals, the historic streets of Santa Fe, and a weekend
    in Tulum’s ruins, while dreaming of future solo adventures in Barcelona’s art districts and the Andean trails of Cuzco.
  culinary: Reymi Reynel experiments in the kitchen by mastering tamales and mole using corn masa, dried chilies, cacao, and cilantro, then fuses them with unconventional twists like kimchi‑infused mole
    tacos, savoring each bite while relying on fresh cilantro, roasted pepitas, and sweet plantain chips as signature ingredients.
  core: Reymi Reynel blends a curious, community‑oriented mindset with a meticulous yet worry‑prone nature, turning everyday anxieties into fuel for creative fusion cooking, mindful yoga, and purposeful
    project work.
background:
  cultural: Reymi grew up in a bilingual Mexican‑American household in Anaheim, where her parents immigrated from Jalisco. Spanish was the language of the home, while English dominated school and community
    life, giving her a bicultural perspective. Family gatherings centered around shared meals, music, and celebrations of holidays such as Día de los Muertos, Las Posadas, and American holidays, fostering
    a strong sense of community and respect for tradition. Living in Orange County exposed her to a diverse Latino diaspora, and she often engages with local cultural institutions, community gardens, and
    neighborhood festivals that blend Mexican customs with Southern California lifestyle. This dual heritage informs her identity, values of hospitality, close family ties, and a commitment to bridge cultural
    gaps through her work and volunteerism.
attributes:
  skills: '["Bilingual Spanish‑English communication", "Microsoft Office (Excel, Word, PowerPoint) proficiency", "Google Workspace (Docs, Sheets, Slides)", "Basic QuickBooks accounting", "Event planning
    and logistics", "Volunteer coordination", "Social‑media content creation (Canva, Instagram)", "Introductory Python for data analysis", "Stress‑management and mindfulness techniques", "Customer service
    and problem solving"]'
  hobbies: '["Cooking traditional Mexican dishes and fusion recipes", "Attending cultural festivals and Día de los Muertos workshops", "Volunteering at the Mexican Cultural Center of Orange County", "Yoga
    and mindfulness meditation", "Hiking local trails (e.g., Yorba Linda, Oak Canyon)", "Street photography", "Journaling", "Listening to indie and regional Mexican music", "Reading self‑help and psychology
    books", "Participating in Spanish‑English language exchange meetups"]'
  career_goals: Reymi aims to leverage her associate’s degree to pursue a bachelor’s in Business Administration within the next two years, with a focus on project management and community development. She
    aspires to secure a part‑time internship at a local nonprofit or small business where she can apply her event‑planning and bilingual communication skills. In the long term, she envisions a career as
    a community outreach manager or marketing coordinator for an organization that serves the Mexican‑American population in Orange County, eventually advancing to a leadership role that shapes inclusive
    programs. She also plans to continue strengthening her data‑analysis abilities and to obtain a certification in project management (CAPM) to enhance her practical skill set.
