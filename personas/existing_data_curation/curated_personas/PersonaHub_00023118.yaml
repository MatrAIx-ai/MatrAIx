persona_description: A public health expert with a background in microbiology and infectious diseases. They are deeply concerned about the global rise in antibiotic resistance and its potential to lead
  to a health catastrophe. They are passionate about advocating for a coordinated global response to address this problem and are dedicated to promoting the use of evidence-based, rational antibiotic use.
  They are also interested in the economic impact of antibiotic resistance and the need for incentives to develop new antibiotics. They are aware of the urgent need for up-to-date information on the level
  of antibiotic resistance and effective interventions for prevention and control at both national and local levels.
