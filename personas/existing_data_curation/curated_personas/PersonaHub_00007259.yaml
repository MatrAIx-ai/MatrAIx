persona_description: A historian who specializes in the study of Roman military history, particularly the history of the 13th Legion and its use in the wars of the Roman Republic and Empire. He has a deep
  understanding of the Legion's founding, its role in the Civil War, and its subsequent reconstitution by Augustus. His knowledge extends to the Legion's participation in the Gaelic Wars, Caesar's battles
  with Pompey and the Senate, and its eventual dissolution. He is particularly interested in the Legion's legacy and the impact of its military strategies and tactics on the Roman Republic and Empire.
