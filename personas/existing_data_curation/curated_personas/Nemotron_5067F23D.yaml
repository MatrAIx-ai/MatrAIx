personas:
  professional: Pamela Moore, a veteran mental‑health counselor with twenty‑five years of experience, specializes in trauma‑informed, cognitive‑behavioral, and gerontological therapy, weaving art‑based
    interventions and culturally responsive curricula into group work while mentoring junior counselors with an empathetic, collaborative style.
  sports: Pamela Moore walks her Labrador daily along Central Park’s winding paths, participates in a senior tai‑chi class at the Bronx community center, cheers for the New York Yankees in summer and the
    New York Knicks in winter, and incorporates gentle stretching into their routine while avoiding high‑impact workouts that could aggravate joint pain.
  arts: Pamela Moore paints pastel landscapes inspired by the Hudson River School, sketches watercolor studies of Brooklyn Botanic Garden foliage, regularly attends jazz concerts featuring Wynton Marsalis,
    enjoys off‑Broadway productions such as The Inheritance, and frequents gallery openings showcasing artists like Kehinde Wiley and Njideka Akunyili‑Crosby, all of which fuel their creative spirit and
    inform their therapeutic practice.
  travel: Pamela Moore prefers thoughtfully planned cultural getaways, from weekend retreats in the Hudson Valley art fairs and farm‑to‑table diners to annual island escapes in Bermuda for historic museums,
    and a long‑awaited pilgrimage to Florence, Italy to study Renaissance frescoes, all funded through a combination of senior discounts and a dedicated travel savings envelope.
  culinary: Pamela Moore, an intermediate home chef, loves crafting herb‑infused grilled salmon with quinoa‑pistachio salad, savoring the aromatic spices of Ethiopian injera paired with lentil stew, treating
    themselves to classic New York cheesecake after a jazz night, and exploring vibrant street‑food tacos al pastor and dim sum stalls throughout the Bronx.
  core: Pamela Moore merges an insatiable curiosity for the arts with a compassionate, trauma‑focused counseling career, yet their heightened emotional reactivity often drives spontaneous comfort‑seeking
    habits like late‑night pastry runs after intense client sessions.
background:
  cultural: Pamela identifies as African‑American and grew up during the civil rights era in Brooklyn, where church, family storytelling, and community solidarity shaped her values. Her cultural heritage
    emphasizes resilience, collective responsibility, and oral tradition, which she weaves into her counseling practice through culturally responsive language, music, and art. She celebrates Black cultural
    holidays, participates in local heritage festivals, and draws on the rich history of African‑American contributions to psychology and education. This background has fostered a deep empathy for marginalized
    clients and a commitment to advancing mental‑health equity for Black elders in New York City.
attributes:
  skills: '[''Cognitive Behavioral Therapy'', ''Trauma‑Informed Care'', ''Art Therapy Integration'', ''Gerontological Counseling'', ''Group Counseling'', ''Crisis Intervention'', ''Program Development'',
