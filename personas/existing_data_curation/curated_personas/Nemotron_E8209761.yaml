  career_goals: William aims to turn his love of coding and gaming into a career as an independent software developer or video‑game creator. He plans to earn a high‑school diploma, enroll in a technical
    apprenticeship or community‑college program focused on computer science, and eventually launch his own indie‑game studio or freelance electronics repair business. He values flexibility, so he envisions
    a work life that lets him work from his home studio, choose projects that interest him, and avoid rigid corporate schedules.
