personas:
  professional: William Goodman is a budding teen programmer and Arduino hobbyist who channels his love for real‑time strategy and simulation video games into meticulous code and hardware prototypes, thriving
    in solitary, structured projects while embracing the flexibility to pivot on the fly.
  sports: William Goodman spends weekends fishing in Puget Sound, rides his mountain bike with the Kitsap Youth MTB Club during summer, practices skateboarding alone at the local skate park, and cheers
    enthusiastically for the Seattle Seahawks, Seattle Mariners, and Seattle Kraken while tracking their personal fitness through informal bike rides and occasional hikes.
  arts: William Goodman channels creativity into digital illustrations of sci‑fi landscapes inspired by authors like Andy Weir and Isaac Asimov, while listening to video‑game composers such as Yoko Shimomura
    and the rock band The Strokes, shaping an aesthetic that blends futuristic narratives with retro‑pixel nostalgia.
  travel: William Goodman prefers spontaneous weekend getaways to coastal campgrounds on the Olympic Peninsula and day trips to Seattle’s Pike Place Market, yet dreams of a future backpacking adventure
    through Japan’s Hokkaido region to explore anime culture and snowy landscapes, planning trips with a flexible itinerary that balances budget constraints and curiosity.
  culinary: William Goodman enjoys cooking simple yet flavorful meals like grilled salmon with soy‑ginger glaze, fish tacos topped with fresh cilantro and lime, and occasional ramen bowls, demonstrating
    an intermediate kitchen skill set that reflects a love for seafood and a penchant for quick, satisfying dishes.
  core: William Goodman is a solitary, tech‑savvy teen who blends strategic gaming and DIY electronics with a deep appreciation for the Pacific Northwest’s outdoors, oscillating between meticulous planning
    and last‑minute spontaneity while occasionally neglecting sleep during marathon coding sessions.
background:
  cultural: Ewardically a white American from Port Orchard, Washington, William grew up in a middle‑class suburban setting within Kitsap County. The Pacific Northwest’s proximity to water and forests gave
    him early exposure to fishing, hiking, and a culture that values self‑reliance and environmental stewardship. His family’s modest pragmatic outlook combined with mainstream US pop culture—especially
    video games and online tech communities—shapes his worldview. While his community is largely homogeneous, he feels comfortable navigating both the local maritime traditions and the broader digital culture
    of his peers.
