personas:
  professional: Kathleen Hathcock, a 32‑year‑old career counselor in a large school district, leverages their humanities background, data‑driven assessment expertise, methodical program design skills, and
    sociable, assertive demeanor to craft individualized career pathways, facilitate group workshops, and champion outreach to underserved students while steadily positioning themselves for a future district‑wide
    Director of Career Services role.
  sports: Kathleen Hathcock routinely hikes the trails around Lake Houston and Memorial Park, participates in a local 5K run club that trains for the annual Houston Marathon, cheers on the Houston Astros,
    Rockets, and Texans, and balances their active lifestyle with weekly community yoga classes and occasional volleyball games at a neighborhood league.
  arts: Kathleen Hathcock, an avid photographer and book‑club enthusiast, draws inspiration from the visual storytelling of Annie Leibovitz, the literary depth of Toni Morrison, and the soulful sounds of
    Willie Nelson, B.B. King, and Kacey Musgraves, regularly attending live music venues in Houston and curating photo essays of community events that enrich their artistic identity.
  travel: Kathleen Hathcock prefers thoughtfully planned, nature‑focused getaways, having explored the Great Smoky Mountains and Galveston Island’s coastal charm, while dreaming of a cultural road‑trip
    through Charleston, South Carolina, and an overseas immersion in the historic villages of Provence, France.
  culinary: Kathleen Hathcock, a confident home cook, delights in crafting Southern‑style dishes such as shrimp and grits, smoked gumbo with okra, and pecan‑topped sweet‑potato casserole, often sourcing
    fresh basil, thyme, and smoked paprika from their backyard garden to add authentic flavor to family gatherings.
  core: Kathleen Hathcock blends methodical career guidance with a sociable, outdoors‑loving spirit, juggling a passion for Southern cooking, photography, and yoga while occasionally procrastinating on
    dentist appointments and splurging on new camera gear.
background:
  cultural: Kathleen was raised in a middle‑class, white family in the Greater Houston area, where suburban Texas values of hospitality, community service, and strong family ties were emphasized. Her upbringing
    combined traditional Southern hospitality with exposure to the cultural diversity of the Houston metropolitan region, fostering an appreciation for varied perspectives while maintaining a grounded,
    pragmatic outlook. Her bachelor's degree in the arts and humanities sharpened her critical thinking, literary appreciation, and cultural awareness, which she integrates into her counseling practice
    and community involvement.
