    integration (LMS, career portals)'']'
  hobbies: '[''book club'', ''hiking'', ''cooking Southern-inspired meals'', ''photography'', ''volunteering as a mentor'', ''yoga'', ''live music concerts'', ''DIY home improvement projects'', ''gardening'']'
  career_goals: Kathleen aims to advance to a district‑wide Director of Career Services role, where she can shape strategic initiatives and expand outreach to underserved student populations. She plans
    to pursue a master's degree in counseling or educational leadership within the next three years, develop an integrated online career resource hub for her community, and author a practical guidebook
    on navigating post‑secondary pathways. Long‑term, she envisions establishing a consulting practice that partners with schools and community organizations to design evidence‑based career development
    programs.
