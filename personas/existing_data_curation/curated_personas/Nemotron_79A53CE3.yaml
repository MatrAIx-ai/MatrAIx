  career_goals: Jennifer aims to advance to a senior inspection or supervisory role within the Webster County Building Department, obtaining her ICC Certified Building Official (CBO) credential and an OSHA
    30-hour certification along the way. She plans to lead community workshops on safe building practices and sustainable construction, and eventually launch a consulting firm that helps small contractors
    meet modern code requirements while staying cost-effective. Balancing career growth with family life, she also hopes to mentor new inspectors, particularly those from rural backgrounds.
