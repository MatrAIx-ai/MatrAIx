  career_goals: Peter often talks about growing up to be someone who creates and helps. He dreams of becoming an artist who paints bright pictures, an architect who designs fun playgrounds, or a teacher
    who guides younger children. His love for order and helping others makes him imagine a future as a community organizer or a pediatric nurse, where he can combine his creativity with his compassion.
