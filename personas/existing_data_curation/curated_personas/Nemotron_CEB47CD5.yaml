personas:
  professional: Peter Paige, a four‑year‑old budding builder who spends hours arranging LEGO bricks into precise structures, shows early mastery of spatial organization and follows step‑by‑step instructions,
    reflecting a disciplined, achievement‑driven mindset and a compassionate impulse to share their creations with playmates, and they proudly let others copy their designs.
  sports: Peter Paige, a member of the 'Tiny Turtles' preschool soccer club and a bright‑eyed fan of the New York Yankees, dashes across the playground with unbridled enthusiasm, enjoys structured gymnastics
    classes that satisfy their need for order, yet also loves calming yoga sessions that help them wind down after high‑energy games, and they proudly cheer for the Yankees during family watch parties.
  arts: Peter Paige, who can sing every verse of The Wiggles' 'Fruit Salad', loves drawing vivid pictures inspired by Eric Carle's collage style, eagerly participates in the local library's weekly Storytime
    and Music hour, where they mimic characters and proudly display their crayon creations, and they often request an encore of their favorite songs.
  travel: Peter Paige, who has explored the magic of Disneyland in California and marveled at the sweeping vistas of the Grand Canyon on a family road trip, now day‑dreams about spotting the Eiffel Tower
    in Paris, prefers trips that follow a clear schedule, include frequent snack breaks, and they love taking photos of every new landmark.
  culinary: Peter Paige, who delights in golden chicken nuggets paired with ketchup, swirls macaroni and cheese with extra cheddar, sips strawberry‑banana smoothies spiked with a pinch of chia seeds, confidently
    assembles their own peanut‑butter‑and‑jelly sandwich—though they occasionally decorate the kitchen walls with stray dollops of peanut butter, turning cleanup time into a playful activity.
  core: Peter Paige, a meticulous four‑year‑old whose curiosity drives LEGO architecture, disciplined coin‑sorting, and generous sharing, balances compassion with a stubborn streak at bedtime, and they
    live for colorful stickers and snack‑filled adventures.
background:
  cultural: Peter is raised in a white, middle‑class family in Greencastle, Pennsylvania. His upbringing blends typical small‑town American values—community involvement, school participation, and celebration
    of holidays such as Thanksgiving and Christmas—with exposure to local cultural resources like the Greencastle Public Library and regional arts programs. Family traditions emphasize politeness, helping
    others, and a strong work ethic, while the rural surroundings foster an appreciation for nature and seasonal activities.
