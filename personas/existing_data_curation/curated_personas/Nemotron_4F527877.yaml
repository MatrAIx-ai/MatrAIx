  hobbies: '[''Oil painting'', ''Quilting'', ''Gospel choir singing'', ''Community volunteering'', ''Vegetable gardening'', ''Model airplane building'', ''Vintage bicycle restoration'', ''Attending music
    festivals'', ''Cooking Creole cuisine'', ''Reading historical fiction'']'
  career_goals: At 68, Matishia aims to transition from day‑to‑day maintenance work to a senior mentorship role, formally obtaining her FAA Airframe and Powerplant (A&P) certification and a GED to solidify
    her academic credentials. She envisions establishing a community outreach program that introduces local high school students—particularly those from underrepresented backgrounds—to careers in aviation
    mechanics. Matishia also dreams of opening a modest, family‑run aircraft service shop that doubles as a space for art exhibits, reflecting her love for both engineering and creative expression. Ultimately,
    she hopes to leave a legacy of safety excellence, technical expertise, and a more diverse next generation of aircraft technicians.
