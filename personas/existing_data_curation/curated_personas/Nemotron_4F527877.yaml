personas:
  professional: Matishia Young, a seasoned aircraft mechanic with four decades of hands‑on experience, leverages their curious mindset and assertive calm to diagnose complex hydraulic failures, mentor younger
    technicians, and ensure FAA compliance while improvising custom parts when OEM components are unavailable.
  sports: Matishia Young stays active through low‑impact activities, joining a senior badminton league at the parish recreation club, attending weekly water aerobics at the community center, and cheering
    passionately for the New Orleans Saints during football season, while also following the New Orleans Pelicans basketball games on TV.
  arts: Matishia Young paints oil landscapes of Louisiana swamps inspired by the atmospheric light of Claude Monet, quilts intricate geometric patterns that echo family storytelling traditions, and sings
    in the church gospel choir, often performing classics by Mahalia Jackson and contemporary pieces by Kirk Franklin.
  travel: Matishia Young favors purposeful travel, meticulously planning road trips to historic Louisiana plantations, weekend strolls through the vibrant French Quarter, and a long‑awaited visit to the
    Airbus Heritage Center in Toulouse, France, balancing budget considerations with a love for cultural immersion.
  culinary: Matishia Young, an enthusiastic home cook, crafts Creole favorites such as shrimp étouffée, jambalaya with smoked sausage, and gumbo thickened with a dark roux, frequently incorporating garden‑fresh
    okra, collard greens, and sweet potatoes into their dishes, though they sometimes over‑spice when experimenting with new flavor combinations.
  core: Matishia Young fuses decades of aircraft mechanic expertise with a vibrant artistic spirit, navigating life’s stresses through meticulous planning, occasional worry, and an insatiable curiosity
    that fuels both their technical mentorship and their oil‑painting canvases.
background:
  cultural: Matishia grew up as a Black woman in Winnsboro, Louisiana, during the tail end of the civil‑rights movement, shaping a deep sense of resilience and community solidarity. Her upbringing was rooted
    in the Southern African‑American church tradition, where gospel music, storytelling, and communal support were daily fixtures. The rich culinary heritage of Creole and soul food forms a core part of
    her family rituals. Her family's history of working in the region's agricultural and oil sectors fostered an early fascination with machinery, prompting her to pursue a career in aircraft maintenance—a
    path atypical for women of her generation and background. This blend of technical acumen, artistic appreciation, and cultural pride informs Matishia's identity and fuels her drive to mentor the next
    generation while preserving her cultural legacy.
