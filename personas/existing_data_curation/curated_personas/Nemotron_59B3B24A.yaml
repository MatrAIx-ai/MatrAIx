  career_goals: Even at six, Samantha dreams of a future where she can help others and keep things orderly. She says she would like to become a teacher because she enjoys explaining things step‑by‑step,
    or a librarian to maintain a quiet, organized space for books. She also imagines being a veterinarian, caring for animals in a structured environment. Her goals reflect a desire for a clear schedule,
    responsibility, and the chance to be helpful.
