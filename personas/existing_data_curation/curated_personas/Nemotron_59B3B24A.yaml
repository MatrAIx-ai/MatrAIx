personas:
  professional: Samantha Morris, a pint‑size architectural enthusiast, applies her methodical love for patterns to designing LEGO skyscrapers, demonstrating early spatial reasoning, precision, and a habit
    of documenting each build in a notebook, reflecting how their organized personality translates into a budding professional mindset.
  sports: Samantha Morris, a member of the neighborhood T‑ball league and a regular attendee of the community swimming lessons, favors the predictable rhythm of weekly practice drills, cheers for the hometown
    baseball team the River City Royals, and enjoys organizing game schedules in a notebook.
  arts: Samantha Morris, an earnest young pianist and budding illustrator, practices Beethoven’s Für Elise twice weekly with precise finger placement, fills sketchbooks with meticulously colored scenes
    inspired by Dr. Seuss’s whimsical rhymes, and admires the works of painter Mary Blair for their bold yet orderly palettes.
  travel: Samantha Morris, an itinerary‑loving explorer, enjoys family trips to the nearby state park where they follow a mapped leaf‑collecting route, has dreamt of visiting the interactive children’s
    museum in Chicago, and prefers vacations with clearly scheduled activities over spontaneous adventures.
  culinary: Samantha Morris, a selective foodie, loves the comforting routine of mac‑and‑cheese with hidden peas, enjoys assembling strawberry‑banana smoothies using a measured cup, and takes delight in
    arranging fruit slices into geometric patterns on her plate.
  core: Samantha Morris blends a child’s curiosity with a meticulous love for order, lining up crayons by hue, rehearsing piano scales in exact loops, and insisting that every puzzle piece fits perfectly
    before moving on.
background:
  cultural: Samantha is raised in a typical Midwestern white family in Zanesville, Ohio. Her household values practicality, routine, and community involvement. Family traditions include weekly Sunday dinner,
    church attendance, and seasonal celebrations like Halloween and Thanksgiving. The local culture emphasizes politeness, hard work, and support for local schools and libraries, which shape Samantha’s
    organized and cooperative mindset.
