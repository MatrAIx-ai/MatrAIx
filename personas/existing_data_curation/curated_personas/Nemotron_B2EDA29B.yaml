personas:
  professional: Erik Godshalk, a budding young architect in the making, demonstrates an early knack for spatial reasoning and precise execution by meticulously following LEGO instructions, naturally stepping
    into leadership roles during group play, balancing a desire for order with the flexibility needed to adapt when the build exceeds expectations.
  sports: Erik Godshalk thrives on the soccer field during recess, proudly wears the Riverside Falcons youth league jersey, cheers for the professional soccer team Meadowbrook United on TV, and maintains
    fitness by sprinting in tag games, while also enjoying occasional visits to local high school basketball matches featuring the Tigers.
  arts: Erik Godshalk dives into drawing vibrant scenes from picture books, emulating Dr. Seuss’s whimsical style, hums along to The Wiggles during circle time, and showcases completed LEGO constructions
    as miniature artworks that reflect a meticulous eye for detail and an innate love for structured creativity.
  travel: Erik Godshalk eagerly explores the winding trails of Pine Grove Park on family outings, has visited New York City’s Central Park during a holiday weekend, dreams of riding the roller coasters
    at Tokyo Disney Resort, and prefers trips that balance safe, structured itineraries with plenty of time for spontaneous tag games on open fields.
  culinary: Erik Godshalk prefers the comforting bite of cheesy pizza, loves spreading peanut butter on soft whole‑grain bread, enjoys crunchy carrot sticks with hummus, and proudly assists in the kitchen
    by layering fruit and yogurt into a simple parfait, although they sometimes forget to finish their vegetables.
  core: Erik Godshalk is a structure‑loving, energetic six‑year‑old whose boundless curiosity fuels a love of group play, meticulous LEGO builds, and a habit of worrying over small setbacks, yet they never
    skip a chance to chase a soccer ball or fill their sticker notebook with new treasures.
background:
  cultural: Erik is a White child raised in the small, rural community of Soddy Daisy in Sequatchie County, Tennessee. His upbringing reflects Southern Appalachian culture, where family gatherings, church
    involvement, and neighborly hospitality are central. He grows up hearing country and bluegrass music, participates in local church potlucks, and takes part in community events like county fairs and
    youth sports leagues. The values of respect for elders, politeness, and a strong sense of community are emphasized at home and school. Outdoor activities such as hiking, fishing, and exploring the nearby
    hills are common pastimes, reinforcing his connection to the natural landscape of the region.
attributes:
  skills: '[''Reading simple sentences'', ''Sight-word recognition'', ''Basic addition and subtraction'', ''LEGO construction following instructions'', ''Organizing toys and supplies'', ''Cooperative team
    play (soccer, tag)'', ''Basic tablet navigation and educational apps'', ''Completing classroom chores and routines'']'
  hobbies: '[''Playing soccer with classmates'', ''Running tag and other group games'', ''Building LEGO models'', ''Reading adventure and animal picture books'', ''Drawing scenes from stories'', ''Exploring
    local park trails'', ''Helping with small household chores (e.g., feeding pet rabbit)'', ''Attending Sunday school and church activities'', ''Collecting and organizing stickers'']'
  career_goals: Erik dreams of growing up to be a community helper who works in a clear, structured environment. He frequently says he wants to become a firefighter because he likes the idea of a disciplined
    schedule, teamwork, and protecting people. He also imagines being a teacher one day, enjoying the routine of a classroom and the chance to share knowledge with friends. Occasionally, he expresses fascination
    with space and hopes to be an astronaut or engineer, reflecting his curiosity about how things work. All of his aspirations are grounded in a desire to be useful, reliable, and part of a supportive
    team.
