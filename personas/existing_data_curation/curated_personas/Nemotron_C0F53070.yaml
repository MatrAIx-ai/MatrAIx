personas:
  professional: Hector Peraza, an elementary and middle school STEM teacher who designs data‑driven curricula and bilingual lessons with a methodical eye, leverages their competitive drive to champion student
    robotics contests while occasionally letting the chaos of after‑school program logistics outpace their love of predictability.
  sports: Hector Peraza, an avid jogger on local trails and member of a community running club who tackles seasonal 5 k races with a competitive mindset, hikes nearby parks for mental relief, and roots
    for the Los Angeles Dodgers and LA Galaxy as a way to stay connected to the region’s sports culture.
  arts: Hector Peraza, a devoted listener of regional Mexican music such as Vicente Fernández and Los Tigres del Norte, attends local cultural festivals celebrating mariachi and folklórico dance, and appreciates
    the craftsmanship of woodworking as a form of creative expression.
  travel: Hector Peraza, who prefers semi‑planned road trips to national parks like Yosemite and cultural excursions to Oaxaca, balances a desire for adventure with family obligations by opting for short
    weekend getaways and uses a flexible itinerary to accommodate spontaneous detours.
  culinary: Hector Peraza, an enthusiastic home cook who masterfully prepares tamales and mole using masa harina, dried chilies, and Mexican chocolate, experiments with traditional spice blends, but occasionally
    orders take‑out pizza when time constraints from lesson planning and club duties arise.
  core: Hector Peraza, a structured yet flexible STEM educator whose competitive spirit fuels a passion for robotics, a lingering anxiety drives meticulous self‑care routines, and a penchant for woodworking,
    music, and cooking colors a life that balances ambition with occasional disarray.
background:
  cultural: Hector is a first‑generation Mexican‑American who grew up in a bilingual household in Southern California. His family maintains strong ties to Mexican traditions, celebrating holidays such as
    Día de los Muertos and Mexican Independence Day with food, music, and communal gatherings. At home, Spanish is spoken regularly, allowing Hector to serve as a cultural bridge for his students and their
    families. The multicultural environment of Lawndale, with its mix of Latino, Asian, and African‑American communities, has shaped his inclusive worldview. His Catholic upbringing influences his respect
    for community rituals, yet he embraces a pragmatic, secular approach in his teaching practice, blending cultural appreciation with the demands of a diverse classroom.
