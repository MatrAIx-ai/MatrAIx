  career_goals: Hector aims to become a district STEM coordinator, where he can expand innovative science and technology programs across multiple schools. He plans to earn a master's degree in Educational
    Leadership to qualify for instructional coaching roles and eventually move into an administrative position such as curriculum director. Hector also dreams of establishing a community‑based robotics
    and coding club that serves under‑represented students in Lawndale, hoping to close achievement gaps and showcase the practical relevance of STEM subjects. Balancing his professional ambitions with
    family commitments, he seeks opportunities that allow flexible scheduling and collaborative decision‑making.
