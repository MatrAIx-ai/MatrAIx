  career_goals: Approaching retirement, Ilian aims to transition from day-to-day guarding to a supervisory and advisory role. He wants to become a shift manager or security supervisor, where he can codify
    his practical knowledge into standardized training programs and improve team resilience. He is also interested in establishing a part-time consulting service for local small businesses, helping them
    design cost-effective security plans that blend proven methods with new technologies. Ultimately, he hopes to leave a legacy of safer workplaces while maintaining a work schedule that respects his need
    for quiet and reduces stress.
