persona_description: A researcher at Queen's University who has conducted clinical trials on the effectiveness of gabapentin and morphine in treating neuropathic pain, a condition that has puzzled health
  care workers for years. The research focused on two specific types of neuropathic pain, diabetic neuropathy and postherpetic neuralgia, and the methods used in the trial could be employed in studying
  other chronic conditions such as cancer, spinal disk disease, and the pain experienced after chemotherapy and mastectomies. The results showed that pain intensity was significantly lower with the combination
  treatment than with either drug alone, or with the placebo. The study also found that significantly lower doses of morphine and gabapentin were required during combination treatment than during treatment
  with either drug alone.
