personas:
  professional: Kristina Generale is a community garden coordinator and volunteer mentor in her small New England town, relying on their meticulous budgeting, gardening expertise, and methodical event planning
    to create sustainable food projects while maintaining a low‑key, solitary work style.
  sports: Kristina Generale enjoys low‑impact fitness through daily nature‑trail walks and seasonal bird‑watching hikes, follows the Boston Red Sox and Boston Bruins from their kitchen window, and participates
    in a senior‑friendly walking club that meets every Saturday morning at the town park.
  arts: Kristina Generale finds artistic solace in knitting while listening to the folk ballads of Joan Baez and the Celtic fiddles of The Bothy Band, devouring historical novels by Sarah Orne Jewett and
    Stephen King, and attending occasional performances at the Hiram Community Theater featuring classic plays by Arthur Miller.
  travel: Kristina Generale prefers carefully planned, low‑key road trips to serene New England destinations like Acadia National Park, the historic coastal village of Kennebunkport, and weekend stays at
    a family‑run B&B in Woodstock, Vermont, while dreaming of a modest pilgrimage to the Irish countryside to trace their ancestors' roots.
  culinary: Kristina Generale delights in preparing seasonal New England fare—such as herb‑infused roasted root vegetables, wild blueberry pies, and maple‑glazed salmon—while meticulously canning jars of
    summer tomatoes, pickled beets, and homemade apple butter for winter comfort.
  core: Kristina Generale balances a steadfast devotion to routine, community stewardship, and quiet contemplation, all while battling a persistent habit of over‑worrying and an endearing tendency to count
    exactly 37 stitches per row before starting a new knitting project.
background:
  cultural: Kristina's cultural background is rooted in rural New England, specifically the small‑town traditions of Oxford County, Maine. She was raised in a multi‑generational family of English and Irish
    descent, where values such as self‑reliance, modesty, thriftiness, and community involvement were deeply ingrained. The seasonal rhythms of the Maine landscape, the importance of local churches, and
    the close‑knit social fabric of Hiram have shaped her practical, routine‑oriented outlook. These influences foster her preference for familiarity, her methodical approach to tasks, and her dedication
    to quiet, solitary pursuits that connect her to the natural environment and the heritage of her community.
attributes:
  skills: '["Household budgeting", "Meal planning", "Vegetable gardening", "Food preservation (canning, pickling)", "Sewing and knitting", "Basic carpentry and home maintenance", "Volunteer coordination",
