personas:
  professional: A community‑oriented art enthusiast, Rafael Mordecai leverages his self‑taught graphic design, event‑coordination, and meticulous time‑management skills to organize museum‑study workshops
    and local gallery openings, while his calm, organized demeanor ensures projects run smoothly and his curiosity fuels innovative program ideas.
  sports: Rafael Mordecai embraces outdoor fitness through weekly hikes in Hocking Hills State Park, plays on a local co‑ed ultimate frisbee league, follows the Cleveland Cavaliers and Cincinnati Bengals
    on television, and maintains a low‑key routine of jogging along the Scioto Mile to stay fit without the pressure of competitive training.
  arts: Rafael Mordecai spends Saturday mornings sketching Columbus cityscapes while listening to the ambient playlists of Brian Eno, draws creative inspiration from the street photography of Vivian Maier
    and the color palettes of Kehinde Wiley, and regularly attends exhibitions of regional artists like William Utermohlen at the Columbus Museum of Art.
  travel: Rafael Mordecai prefers meticulously planned weekend getaways, such as a three‑day art‑focused trip to Asheville’s River Arts District or a month‑long study tour of European museums in Florence,
    Paris, and Amsterdam, balancing his modest travel fund with occasional splurges on flights that align with his museum‑study ambitions.
  culinary: Rafael Mordecai enjoys cooking Mediterranean‑inspired meals, frequently preparing hummus with tahini, roasted eggplant shakshuka, and homemade pizza margherita topped with fresh basil, while
    his culinary skill sits at a confident home‑cook level, often pairing dishes with a crisp Pinot Grigio from Ohio’s vineyards.
  core: Rafael Mordecai is an organized, perpetually curious 23‑year‑old who channels his love for art into community programs, budgets meticulously, hikes religiously, and never lets a bad day linger.
background:
  cultural: Raised in a middle‑class family in Union County, Ohio, Rafael grew up in a typical Midwestern environment that values community, self‑reliance, and cooperation. His European ancestry—primarily
    German and Irish—shapes family traditions such as holiday gatherings and occasional church involvement. His upbringing exposed him to American popular culture, regional music, and a strong appreciation
    for the area's natural landscapes, all of which influence his worldview and personal interests.
attributes:
  skills: '[''Graphic design (basic Photoshop and Canva)'', ''Digital photography'', ''Community event planning'', ''Time management and scheduling'', ''Computer troubleshooting'', ''Creative writing (blogging)'',
    ''Handyman basics (basic home repairs)'']'
  hobbies: '[''Art gallery and museum visits'', ''Digital photography'', ''Sketching'', ''Hiking'', ''Reading (art history, philosophy)'', ''Board games'', ''Volunteering (library reading programs)'']'
  career_goals: He plans to obtain his GED within the next year, then enroll in a community‑college program in museum studies or arts administration, ultimately securing a position as a community arts coordinator
    or museum educator where he can blend his organizational strengths with his passion for art. Over the longer term, Rafael hopes to design and lead outreach programs that bring diverse artistic experiences
    to underserved neighborhoods throughout Ohio.
