persona_description: A team of scientists and engineers at MIT's Computer Science and Artificial Intelligence Laboratory who are developing a new process called Eulerian Video Magnification (EVM) to enhance
  the visibility of movements in video. The team's goal is to use EVM to improve the safety and effectiveness of various applications, such as search-and-rescue, factory equipment monitoring, and lie detection.
  The team is currently working on turning the EVM process into a smartphone app.
