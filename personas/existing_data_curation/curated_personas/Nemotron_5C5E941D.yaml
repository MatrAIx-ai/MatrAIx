  hobbies: '[''Gardening'', ''Baking'', ''Canning and jam-making'', ''Crossword puzzles'', ''Historical fiction reading'', ''Desert trail walking'', ''Bible study group'', ''Volunteer at community kitchen'']'
  career_goals: Looking toward the next stage of her professional life, Melissa aims to transition into a consultancy role where she can share her expertise in process optimization and staff training with
    other restaurants in the region. She also plans to mentor a junior manager to ensure a smooth succession at her current establishment, and eventually open a small family‑run café that embodies her values
    of structure, community, and high food‑quality standards. Achieving certifications for her current operation and creating a legacy of reliable, well‑run service are central to her ambition.
