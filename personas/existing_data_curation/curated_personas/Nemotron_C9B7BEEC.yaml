personas:
  professional: Paula Foshee, a 36‑year‑old control and valve specialist with over a decade of hands‑on experience in industrial settings, they combine meticulous schematic reading, precise valve alignment,
    and a calm, problem‑solving demeanor to mentor apprentices and streamline preventative maintenance while balancing innovative curiosity with proven practical methods.
  sports: Paula Foshee, an avid hiker and weekend angler, they belong to the Lackawanna County Trail Association, regularly trek the local ridge‑line paths, cast lines at nearby lakes with their husband,
    and cheer on the Philadelphia Eagles and Scranton/Wilkes‑Barre RailRiders during the sports season.
  arts: Paula Foshee, a mystery‑novel aficionado, they devour Agatha Christie and Tana French titles, unwind to folk‑rock sounds from Bob Dylan and The Lumineers, and occasionally attend community‑theatre
    productions of classic thrillers, allowing the narrative twists to fuel their problem‑solving curiosity.
  travel: Paula Foshee, a weekend‑trip planner who balances family time with a love for exploration, they have hiked the Adirondack High Peaks, fished in the Finger Lakes, spent a long weekend strolling
    the historic streets of Savannah, Georgia, and dream of a spring road‑trip through the Scottish Highlands to see vintage farm machinery museums.
  culinary: Paula Foshee, a garden‑to‑table cook with solid woodworking chops, they frequently harvest basil, thyme, and rosemary to craft fresh pesto, simmer seasonal vegetable ratatouille, smoke trout
    caught on fishing trips, and enjoy the occasional artisanal cheese board with a glass of local Pennsylvania craft cider.
  core: Paula Foshee, a methodical yet curious hands‑on maker, they balance meticulous valve work with spontaneous workshop tinkering, often forgetting to water houseplants while obsessively polishing vintage
    farm gears, embodying a steady calm that makes both puzzles and pipefittings equally satisfying.
background:
  cultural: Paula grew up in Scranton, a city shaped by its coal‑mining heritage and a strong working‑class ethic. Her family traces its roots to Irish and Polish immigrants who settled in the region in
    the early 20th century, bringing a deep respect for hard work, community, and family loyalty. Raised in a modest, tight‑knit neighborhood, she was exposed to the rhythms of blue‑collar life and the
    importance of mutual aid. Though she left high school before graduating, she completed a GED as an adult and values lifelong learning. Her cultural identity blends a traditional White working‑class
    background with contemporary Scranton values—pragmatism, neighborliness, and a modest pride in local traditions such as annual St. Patrick’s Day parades and Irish‑Polish community festivals.
attributes:
  skills: '[''Mechanical troubleshooting'', ''Hydraulic system installation'', ''Pneumatic valve repair'', ''Technical schematics interpretation'', ''Safety compliance (OSHA, NFPA)'', ''Hand and power tool
