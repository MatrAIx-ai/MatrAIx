  career_goals: She aims to transition into a senior leadership role where she can shape large‑scale community development projects that serve older adults and immigrant populations in the Memphis area.
    Over the next five years, she plans to obtain a Program Management Professional (PgMP) certification, mentor junior project managers, and launch a nonprofit initiative that provides mentorship and resources
    for widowed seniors. Ultimately, she hopes to influence policy on inclusive community planning and become a recognized advocate for culturally sensitive service delivery.
