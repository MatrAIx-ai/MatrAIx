personas:
  professional: Song Yang, a 58‑year‑old veteran project manager with a humanities foundation, channels strategic planning, stakeholder coordination and risk mitigation expertise into community‑focused
    initiatives, while their curiosity for new technology blends with pragmatic execution, and their compassionate, sociable demeanor fosters cross‑cultural collaboration and team harmony.
  sports: Song Yang, an enthusiastic member of the local senior walking club who never misses the weekly tai chi class, cheers the Memphis Grizzlies in basketball season, roots for the Tennessee Titans
    in the fall, participates in community garden fitness challenges each spring, and enjoys occasional recreational softball games with the Memphis Redbirds fan league.
  arts: Song Yang, a regular at B.B. King’s Blues Club and an active participant in community theatre workshops, draws inspiration from the soulful guitar of B.B. King, the vocal power of Al Green, and
    the storytelling grace of classic opera, weaving these influences into their weekly karaoke performances.
  travel: Song Yang, who prefers well‑planned trips that blend cultural immersion with culinary discovery, has toured historic districts in Kyoto, savored street‑food in Seoul, explored the blues‑rich streets
    of New Orleans, and now dreams of a scenic drive along the Blue Ridge Parkway to visit Asheville’s art galleries.
  culinary: Song Yang, a confident home chef, perfects hand‑rolled pork dumplings, ferments kimchi to a crisp tang, and experiments with Memphis‑style BBQ ribs glazed in gochujang and smoked paprika, often
    serving sweet potato mash alongside, while also enjoying spontaneous trips to local BBQ joints for rib‑smothered collard greens.
  core: Song Yang, a compassionate community architect who schedules daily tai chi yet habitually misplaces their glasses on the mat, balances meticulous project plans with spontaneous karaoke renditions
    of classic blues, and never says no to a good barbecue.
background:
  cultural: Song Y Yang is a second‑generation East Asian American, with family roots in Taiwan. She was raised with a blend of Confucian values—respect for elders, emphasis on education, and communal harmony—and
    the hospitality of Southern culture. Her upbringing included celebrating Lunar New Year, practicing tea ceremonies, and engaging in community service, which shaped her compassionate outlook. Living
    in Memphis, she has integrated local traditions such as blues music appreciation and Southern cooking into her identity, creating a multicultural perspective that informs both her personal life and
    professional approach.
