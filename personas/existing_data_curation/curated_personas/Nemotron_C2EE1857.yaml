personas:
  professional: Keegan Elias, a 26‑year‑old electrician with deep expertise in the National Electrical Code and a knack for integrating solar panels and smart‑home devices, balances meticulous code compliance
    with an inventive curiosity, and they aim to earn a Master Electrician license while building a boutique firm focused on sustainable energy retrofits for New England homes.
  sports: Keegan Elias follows the Red Sox and Patriots with hometown loyalty, joins local pickup basketball games at the community center, hikes the coastal trails of Massachusetts during summer, and they
    occasionally volunteer as a waterboy for a youth soccer league, staying active through both team sports and solitary outdoor pursuits.
  arts: Keegan Elias strums acoustic guitar at open‑mic nights, favoring folk‑rock tunes by Mumford & Sons and The Avett Brothers, enjoys discovering indie film screenings featuring actors like John Krasinski,
    and they attend seasonal community theater productions, weaving artistic appreciation into their active lifestyle.
  travel: Keegan Elias prefers spontaneous weekend road trips to nearby coastal gems like Rockport, Martha’s Vineyard and Acadia National Park, occasionally daring a quick flight to Quebec’s Charlevoix
    region for a taste of French‑Canadian scenery, yet they often pack last‑minute and forget essentials, balancing a love for adventure with a modest travel budget.
  culinary: Keegan Elias delights in cooking hearty New England fare such as clam chowder, lobster rolls, and baked beans, experimenting with smoky paprika in the chowder and perfecting a caramel‑apple
    crumble, while they enjoy pairing dishes with local craft beers, though they sometimes over‑salt when multitasking between a project and the kitchen.
  core: Keegan Elias is a community‑driven electrician with a green‑tech vision, an energetic social life, and a habit of juggling spontaneity with occasional disorganization.
background:
  cultural: Keegan grew up in East Taunton, a small working‑class town in Bristol County, Massachusetts. His family has a long‑standing tradition of trade work, with generations of carpenters and electricians
    shaping a practical, self‑reliant ethos typical of New England Yankee culture. The community’s strong emphasis on neighborly support, seasonal outdoor activities, and loyalty to local sports teams (Red
    Sox, Patriots) informs his social outlook. While his heritage is predominantly white Anglo‑American, Keegan’s college experience and daily interactions in a diverse coastal region have broadened his
    cultural awareness, fostering an inclusive attitude toward the varied backgrounds of his coworkers and clients.
