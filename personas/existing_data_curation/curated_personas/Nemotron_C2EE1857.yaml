  career_goals: Keegan aims to earn his Master Electrician license within the next two years and eventually launch his own boutique contracting firm that specializes in sustainable energy retrofits for
    New England homes. He is motivated to blend his practical expertise with his curiosity for green technologies, positioning his business as a go‑to provider for solar‑panel installations, smart‑home
    upgrades, and energy‑efficiency consulting. Alongside business ownership, he hopes to mentor apprentices, sharing his collaborative approach and fostering a supportive workplace culture. While he values
    career growth, Keegan also wants to maintain a flexible schedule that allows him to stay active in community activities and group hobbies.
