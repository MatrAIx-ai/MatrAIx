personas:
  professional: Gerald Boyd, a 21‑year‑old bakery associate, combines his hands‑on sourdough expertise with meticulous inventory control to run the town’s farmer’s market stall, mentor new staff, and prototype
    seasonal breads while juggling coursework toward a Certified Master Baker credential.
  sports: Gerald Boyd, a 21‑year‑old who loves the camaraderie of intramural soccer with friends, follows the New Hampshire Wildcats men’s soccer team, roots for the Boston Red Sox in baseball and the Boston
    Bruins in hockey, and hikes the White Mountains each summer to stay fit and clear their mind.
  arts: Gerald Boyd, a 21‑year‑old acoustic guitarist, channels the storytelling of folk legends like Bob Dylan and the melodic warmth of Mumford & Sons into open‑mic performances, while evenings are filled
    with re‑reads of culinary memoirs such as "Salt, Fat, Acid, Heat" and sci‑fi epics like "Neuromancer," shaping their creative baking narratives.
  travel: Gerald Boyd, a 21‑year‑old wanderer who alternates meticulously planned weekend trips to nearby craft‑brew festivals in Portland with spontaneous backpacking adventures through the White Mountains,
    dreams of a summer apprenticeship in a historic sourdough bakery in San Francisco and a future culinary tour of Kyoto’s traditional bakeries, but balances these aspirations against a modest student
    budget.
  culinary: Gerald Boyd, a 21‑year‑old baker‑brewer, favors hand‑shaped sourdough boules and spelt rye loaves, experiments with honey‑pumpkin ale for a malt‑rich glaze on cinnamon rolls, and regularly whips
    up a beet‑infused gluten‑free sourdough using teff flour, all while insisting on sourcing organic butter and locally milled flour from nearby farms.
  core: Gerald Boyd, a 21‑year‑old baker‑brewer with a restless curiosity, balances meticulous recipe science with spontaneous flavor experiments, socializes over soccer and open‑mic nights, yet occasionally
    forgets to pay their credit‑card balance, fueling a cycle of late‑night brewing marathons and early‑morning dough proofs.
background:
  cultural: Gerald was raised in the close‑knit community of Lebanon, New Hampshire, a town steeped in New England traditions of self‑reliance, seasonal outdoor life, and a strong connection to local agriculture.
    His family’s roots trace back to early English and Irish settlers, and he grew up valuing community involvement, modesty, and an appreciation for the region’s natural cycles—qualities reflected in his
    love for seasonal baking, volunteer work, and outdoor recreation.
attributes:
  skills: '["Artisan bread baking", "Sourdough starter management", "Pastry and viennoiserie techniques", "Food safety and HACCP compliance", "Inventory tracking and cost analysis", "Customer service and
    sales", "Team leadership and staff training", "Seasonal recipe development with local produce", "Basic confectionery (caramel, fruit preserves)", "Kitchen equipment maintenance"]'
  hobbies: '["Intramural soccer", "Hiking in the White Mountains", "Volunteering at the farmer''s market", "Home‑brewing craft beer", "Food and landscape photography", "Playing acoustic guitar at open‑mic
    events", "Reading culinary memoirs and science‑fiction novels"]'
  career_goals: Gerald aims to complete his associate degree in culinary arts while working toward the Certified Master Baker credential. Over the next five years he plans to open a small, community‑focused
    micro‑bakery in Lebanon that showcases heritage grains and seasonal, locally sourced breads. He hopes to host weekly baking workshops, partner with nearby farms for ingredient sourcing, and eventually
    develop a line of gluten‑free and specialty breads that can be sold to regional cafés. Long‑term, Gerald envisions mentoring apprentices and contributing to New Hampshire’s growing artisanal food movement.
