persona_description: A veterinarian who specializes in the treatment and management of feline patients, with a particular focus on pain management and the use of analgesics to alleviate pain. This person
  is knowledgeable about the mechanisms of pain and how it affects the body, and is skilled in applying appropriate doses of analgesics to feline patients. They are aware of the potential negative effects
  of pain on healing and the importance of providing analgesia before and after surgical procedures. They are compassionate and attentive to their patients, using their knowledge and skills to provide the
  best care possible.
