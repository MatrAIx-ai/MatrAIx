    development for community tools'']'
  hobbies: '[''Hiking Laguna Canyon trails'', ''Beach volleyball'', ''Karaoke nights with friends'', ''Korean‑American fusion cooking'', ''Board‑game cafés'', ''Tech meet‑ups for social impact'', ''Volunteer
    work at senior centers'', ''Yoga for flexibility and stress relief'']'
  career_goals: Gai aims to become a director of community impact programs, leading initiatives that integrate technology with social services to improve access and outcomes for underserved populations.
    She plans to pursue advanced certifications in nonprofit management and possibly a master's in public health, while building a regional coalition focused on mental‑health support and STEM mentorship
    for youth of Asian heritage. Her long‑term ambition is to launch a scalable, data‑enabled platform that connects volunteers, donors, and service recipients across Orange County, fostering sustainable,
    community‑driven change.
