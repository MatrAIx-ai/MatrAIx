personas:
  professional: Gai Kim, a 30‑year‑old community program manager with a solid STEM foundation, leverages data‑driven needs assessments, bilingual communication, and grant‑writing expertise to design and
    evaluate social‑service initiatives that blend tech solutions and stakeholder‑friendly reporting, all while juggling a flexible, sometimes chaotic schedule that fuels their curiosity and practicality.
  sports: Gai Kim hikes the Laguna Canyon trails every Saturday, spikes a beach volleyball at Huntington Beach during summer while rooting for the Anaheim Ducks in winter and the LA Galaxy in the spring,
    and maintains a regular yoga practice to balance the high‑energy group sports with a relaxed, flexible fitness routine.
  arts: Gai Kim channels their outgoing spirit into karaoke nights where they belt out K‑pop anthems like BTS’s 'Dynamite' alongside classic Western hits from Queen, frequently attends board‑game cafés
    showcasing indie artist murals, and draws inspiration from musician H.E.R. and filmmaker Bong Joon‑ho for their community storytelling videos.
  travel: Gai Kim plans impromptu weekend getaways that blend adventure and relaxation, favoring coastal road trips to Santa Barbara’s vineyards, spontaneous hikes in Joshua Tree, and cultural immersion
    trips to Seoul for K‑pop festivals, all while balancing a modest travel budget and a desire to bring back ideas for local community projects.
  culinary: Gai Kim experiments with Korean‑American fusion dishes like kimchi‑taco tacos and bulgogi‑marinated pulled pork sliders, skillfully balancing gochujang, cilantro, and lime, and often showcases
    these creations at potluck gatherings, while also savoring classic California sushi rolls with avocado and sesame oil.
  core: Gai Kim is a community‑focused tech enthusiast who blends data‑driven empathy with a love for spontaneous group fun, often juggling a chaotic schedule, a penchant for karaoke, and a mission to turn
    social impact dreams into practical reality.
background:
  cultural: Gai is a second‑generation Korean‑American raised in Southern California. Her family emphasizes education, community service, and cultural pride, instilling in her a deep respect for both Korean
    traditions and the multicultural fabric of Orange County. She celebrates holidays such as Chuseok and Lunar New Year, participates in local Korean cultural festivals, and mentors other Asian‑American
    youth navigating bicultural identities. This blend of heritage and lived experience informs her commitment to fostering inclusive, harmonious community spaces.
attributes:
  skills: '[''Data‑driven community needs assessment'', ''Program design and evaluation'', ''Grant writing and fundraising'', ''Bilingual Korean‑English communication'', ''Public speaking and workshop facilitation'',
