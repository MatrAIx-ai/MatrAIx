persona_description: A homeowner who values cost-effectiveness, durability, and sustainability in their home construction. They are interested in building a home in a bushfire-prone region and are looking
  for a material that is termite proof, non-combustible, and highly fire-resistant. They are also interested in a home that is easy to handle, manufactured under strict quality control guidelines, and can
  be recycled. They want a home that is spacious and can accommodate alterations without affecting the structure. They are looking for a material that provides protection against earthquakes and hurricanes,
  and can last and retain its value for a long time. They are interested in a home that has a high Airtightness, and can be fabricated out of recycled materials. They want a home that is environmentally
  sound and has a positive connection with the structure.
