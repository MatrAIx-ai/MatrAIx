persona_description: A South African plant collector and expert on the genus Saltera, Terence Macleane Salter. He collected plants in the Cape Peninsula and named the genus Saltera in his honor. Salter
  collected plants for his work in the Bolus Herbarium and was a prolific plant collector. He was also a co-editor of the Flora of the Cape Peninsula. Saltera sarcocolla is a genus of plants that was named
  in honor of Salter. Salter recommended that the three species be amalgamated into one under the oldest name, S. tetragona, but later realized that the generic name in general use was the later and thus
  incorrect one. Salter named the genus Saltera with a single species S. sarcocolla.
