  hobbies: '[''Cooking (Puerto Rican cuisine)'', ''Salsa dancing'', ''Yoga and meditation'', ''Bullet journaling'', ''Hiking (Metacomet Trail)'', ''Photography'', ''Reading contemporary fiction'', ''Volunteering
    at cultural center'', ''Listening to Latin music'']'
  career_goals: Adriana aims to move into a regional management role within the next three years, where she can design consistent operational standards across multiple stores while championing inclusive
    hiring practices for the Latino community. She plans to earn a Project Management Professional (PMP) certification to strengthen her ability to lead structured initiatives. Long‑term, she dreams of
    opening a small boutique that blends her managerial expertise with her passion for Puerto Rican cuisine, creating a space that offers both employment opportunities and cultural celebration. She also
    hopes to mentor younger professionals, especially women of color, to help them navigate workplace stress.
