persona_description: A dermatologist or ophthalmologist who specializes in the diagnosis and treatment of eye disorders, particularly those related to skin lesions such as choroidal naevi. They are experienced
  in assessing the potential for malignancy and have expertise in the use of photography and other imaging tests to monitor the growth of these lesions. They may also be aware of the risk factors for choroidal
  naevi, such as orange pigment on the surface or associated fluid beneath the retina.
