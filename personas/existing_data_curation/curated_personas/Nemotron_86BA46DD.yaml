  hobbies: '[''building with blocks'', ''drawing and coloring'', ''reading picture books'', ''pretend play (teacher, doctor, veterinarian)'', ''outdoor exploration (collecting leaves, playing in the snow)'',
    ''singing and dancing'', ''helping in kitchen (mixing batter)'', ''playing with a pet (dog)'']'
  career_goals: S Carolina often talks about becoming a teacher who reads stories, a veterinarian who cares for animals, or a firefighter who helps people. She dreams of learning to read all the picture
    books at the library, writing her own little stories, and making many friends at preschool. She also imagines helping her mom in the kitchen, planting a small garden, and being a helpful "big sister"
    in her play groups. Her ambitions combine her curiosity about the world with a practical wish to be helpful and independent.
