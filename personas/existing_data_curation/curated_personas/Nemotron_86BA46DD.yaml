personas:
  professional: A budding mini‑engineer who loves turning Lego bricks into functional play‑structures, S Wimberly balances boundless curiosity with a practical eye for stability, yet often leaves the finished
    creations scattered on the floor, preferring the freedom of a flexible, slightly chaotic workspace over strict order.
  sports: Enthusiastic about weekly toddlers’ soccer at the community field with the Little Leapers club and a Saturday morning gymnastics class at the YMCA, S Wimberly proudly chants for the city’s baseball
    team, the Harbor Hawks, while also enjoying the occasional backyard game of catch, though they occasionally trade a planned practice for a nap.
  arts: Delighted by the sing‑along adventures of The Wiggles, the whimsical illustrations of Eric Carle, and the magical movies starring Tom Hanks in "Toy Story", S Wimberly spends afternoons drawing colorful
    animals, dancing to "Let It Go" by Idina Menzel, and staging imaginative puppet shows featuring a brave dinosaur.
  travel: Thrilled by family road trips to the local zoo, a sunny beach day in Florida, and the magical realm of Disney World, S Wimberly prefers short, well‑structured outings with plenty of snack breaks,
    often packing their favorite stuffed giraffe for comfort, while dreaming of a future adventure to the snowy wonderland of Finland’s Lapland.
  culinary: Partial to creamy mac‑and‑cheese, crispy chicken nuggets, and peanut‑butter‑and‑jelly sandwiches, S Wimberly proudly declares that strawberries are the best fruit, can skillfully spread peanut
    butter with a plastic knife, but stubbornly refuses to touch broccoli, and loves the occasional kitchen "help" of stirring batter for banana pancakes.
  core: A curious 4‑year‑old who builds towering Lego castles, saves spare change in a piggy bank, battles seasonal allergies, and mixes unstoppable imagination with a delightfully disorganized, snack‑filled
    life.
background:
  cultural: S Carolina was born and raised in Cambridge, a small town in Chisago County, Minnesota. She grows up in a predominantly white, Midwestern community where family gatherings, church events, and
    seasonal outdoor activities are central to daily life. Her family participates in local traditions such as the county fair, holiday celebrations, sledding in winter, and fishing or hiking in summer.
    The community values practicality, self‑reliance, kindness, and a balanced respect for individual curiosity, all of which shape her relaxed yet inquisitive personality. She is exposed to typical American
    media and holidays while also experiencing the unique rhythm of Minnesota's four distinct seasons.
attributes:
  skills: '[''basic counting (1-10)'', ''letter recognition (A-Z)'', ''drawing and coloring'', ''block building (LEGO DUPLO)'', ''simple puzzle solving'', ''self-dressing'', ''basic social skills (sharing,
