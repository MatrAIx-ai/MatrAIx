persona_description: 'A nuclear disarmament advocate who is interested in tracking and analyzing nuclear weapons deployment and location data. This person is likely to be knowledgeable about nuclear weapons
  and their history, as well as the nuclear arsenals of the five nuclear powers: the United States, Russia, Britain, France, and China. This person is interested in understanding the trends and developments
  in nuclear deployments and locations, and may be interested in the full report on the nuclear arsenals of the five countries, which can be downloaded for a fee. This person may also be interested in the
  economic aspects of small modular reactors, as mentioned in the NRDC''s Perspectives on the Economics of Small Modular Reactors.'
