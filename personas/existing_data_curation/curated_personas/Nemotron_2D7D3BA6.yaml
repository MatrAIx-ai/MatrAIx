personas:
  professional: Debra Almomani, a 34-year-old liberal arts curriculum designer, leverages her strong organizational mindset and compassionate communication to craft data-driven, inclusive undergraduate
    courses while leading faculty workshops on active learning and inclusive pedagogy.
  sports: Debra Almomani, an avid hiker of the San Francisco Peninsula coastal trails and a regular participant in a local yoga class, cheers for the San Francisco 49ers, follows the Golden State Warriors,
    and belongs to a weekend running club that meets at Crissy Field.
  arts: Debra Almomani, a devoted member of a contemporary fiction book club, spends evenings reading authors like Chimamanda Ngozi Adichie and Ta‑Nehisi Coates, and enjoys live performances by folk singer
    Joni Mitchell and spoken‑word poet Safia El‑Hillo at the San Francisco Poetry Center.
  travel: Debra Almomani, a planner‑oriented traveler, prefers meticulously mapped road trips to coastal destinations such as Big Sur, the Oregon Coast, and the vineyards of Napa, while dreaming of a future
    trek through New Zealand’s South Island, balancing wanderlust with budget constraints and family time.
  culinary: Debra Almomani, an intermediate home chef, delights in seasonal farm‑to‑table meals like roasted beet and goat cheese salads, quinoa‑kale bowls with fresh basil, and grilled salmon with rosemary,
    often harvesting vegetables from her small garden to enhance her dishes.
  core: Debra Almomani, a structured yet socially vibrant educator, blends her compassion for community service with a disciplined love for hiking, yoga, and data‑driven teaching, while occasionally overcommitting
    to cause‑related projects and artisanal coffee.
background:
  cultural: Debra identifies as a White American with deep roots in the West Coast, having grown up in the San Francisco Bay Area. Her family's cultural heritage includes New England and Midwestern influences,
    emphasizing community involvement, education, and civic responsibility. Living in the diverse environment of San Mateo County, she embraces the region's multicultural ethos, which informs her inclusive
    teaching philosophy and her commitment to fostering cross-cultural understanding among her students.
attributes:
  skills: '[''Curriculum Development'', ''Instructional Design'', ''Educational Technology Integration'', ''Student Advising and Mentorship'', ''Assessment Design'', ''Classroom Management'', ''Data-driven
