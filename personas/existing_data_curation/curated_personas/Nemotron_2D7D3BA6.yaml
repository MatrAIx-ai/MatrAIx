  hobbies: '[''Hiking and Outdoor Group Activities'', ''Yoga and Mindfulness Practice'', ''Book Club Participation'', ''Community Volunteering (Adult Literacy)'', ''Seasonal Cooking'', ''Gardening'', ''Travel
    to Cultural Festivals'']'
  career_goals: Debra aims to advance to a leadership role within the college, such as department chair or director of teaching and learning, where she can shape institutional policies that promote student-centered
    and inclusive education. She plans to pursue a master's degree in Higher Education Administration to deepen her knowledge of academic leadership. In the next five years, she aspires to publish research
    on the impact of structured yet flexible instructional models on student engagement, develop a campus-wide mentorship program for first‑generation college students, and lead interdisciplinary initiatives
    that integrate community service learning into curricula.
