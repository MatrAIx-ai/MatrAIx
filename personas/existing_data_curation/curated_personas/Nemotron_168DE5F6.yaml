personas:
  professional: Nguyet Phan, a retail sales supervisor with a knack for data-driven inventory control and visual storytelling, leverages their bilingual communication and creative problem‑solving to turn
    store aisles into curated art‑inspired experiences while maintaining a flexible yet organized leadership style.
  sports: Nguyet Phan blends quiet yoga practice with vigorous weekend hikes as a member of the San Gabriel Hiking Club, cheers on the Los Angeles Lakers during the basketball season, supports the LA Dodgers
    in baseball, and keeps a disciplined fitness routine that balances cardio on the trails with mindfulness on the mat.
  arts: Nguyet Phan, an avid visitor of LACMA and The Broad, channels the bold colors of Yayoi Kusama and the narrative brushwork of David Hockney into their own watercolor paintings, captures urban moments
    through photography inspired by Ai Weiwei’s activism, and shares this passion by teaching basic art techniques to youth at a community workshop, all while listening to Sade’s smooth jazz to fuel their
    creative flow.
  travel: Nguyet Phan plans trips with a detailed itinerary that balances adventurous hikes in Sedona’s red rocks and cultural immersion in Chiang Mai’s night markets, enjoys leisurely evenings strolling
    through Barcelona’s Gothic Quarter, and dreams of future getaways to Kyoto’s temples and Marrakech’s souks, all while budgeting carefully to fund both travel and their upcoming boutique venture.
  culinary: Nguyet Phan, an intermediate home chef, delights in perfecting pho bo broth with star anise and cilantro while creatively fusing traditional bánh mì flavors with avocado toast, frequently plates
    lemongrass‑marinated chicken and coconut‑pandan desserts for family gatherings, and seeks out farmers’ market finds to keep their culinary experiments fresh and vibrant.
  core: Nguyet Phan balances a data‑driven retail career with a restless artistic soul, often juggling spreadsheets and watercolor palettes in the same coffee shop, while occasionally over‑committing to
    community workshops at the expense of personal downtime.
background:
  cultural: Nguyet is a first‑generation Vietnamese‑American whose parents emigrated to the United States after the Vietnam War. Raised in a bilingual household in Southern California, she grew up celebrating
    Vietnamese traditions such as Tet and the Mid‑Autumn Festival while also embracing broader American cultural experiences. Her heritage emphasizes respect for family, education, and community service,
    values that shape her collaborative and considerate approach at work. Nguyet maintains strong ties to the Vietnamese community in Hacienda Heights, participates in local cultural events, and often incorporates
    elements of Vietnamese art and design into her personal and professional projects.
attributes:
  skills: '[''Team leadership'', ''Customer service excellence'', ''Retail sales strategy'', ''Inventory control'', ''Visual merchandising'', ''Data-driven performance analysis'', ''Conflict resolution'',
