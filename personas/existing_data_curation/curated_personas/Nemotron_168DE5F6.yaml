  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Photography'', ''Cooking Vietnamese cuisine'', ''Yoga practice'', ''Hiking in the San Gabriel Mountains'', ''Volunteering at community
    art workshops'', ''Listening to retail innovation podcasts'', ''Exploring multicultural neighborhoods in Los Angeles'']'
  career_goals: Nguyet aims to advance to a district manager position within the next three years, overseeing multiple retail locations while introducing artful visual merchandising concepts that enhance
    brand identity. She plans to earn the Certified Retail Management Professional (CRMP) credential and enroll in a part-time MBA program focused on entrepreneurship and e‑commerce. Long‑term, she envisions
    opening a boutique that showcases handcrafted goods from Southeast Asian artisans, merging her retail expertise with her passion for art and cultural heritage, and creating a community space that supports
    emerging creators.
