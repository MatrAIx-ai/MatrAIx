    conditions'', ''Basic bookkeeping and invoicing'', ''Use of fleet management software (e.g., KeepTruckin, Samsara)'']'
  hobbies: '[''Fishing on the Pacific coast'', ''Cooking traditional Vietnamese dishes'', ''Attending local Tet celebrations'', ''Watching Los Angeles Dodgers games'', ''Listening to V-Pop and classic rock'',
    ''DIY vehicle maintenance projects'', ''Exploring local hiking trails'', ''Playing chess with friends'', ''Volunteering at community youth programs'']'
  career_goals: Van aims to transition from driver‑sales roles into a senior logistics or fleet management position within the next five years, eventually owning a small, family‑run transportation company
    that serves both the broader Los Angeles market and the local Vietnamese community. He plans to obtain a logistics management certification and complete advanced driver‑trainer coursework, allowing
    him to mentor new drivers. While ambitious, he remains pragmatic, prioritizing financial stability for his family and seeking eco‑friendly vehicle options to future‑proof his business.
