  hobbies: '[''soccer'', ''LEGO building'', ''Minecraft and Fortnite gaming'', ''science experiment kits'', ''biking'', ''beach exploration'', ''Pokémon card collecting'', ''comic book reading'', ''group
    board games'', ''DIY home projects'']'
  career_goals: Norman dreams of becoming someone who builds and designs things that help people, like an astronaut engineer or a video‑game developer who creates immersive worlds. He wants to see his ideas
    become real, whether they're a working LEGO robot or a playable game level. He is also drawn to the excitement of competition, hoping one day to be a champion in a sport or an esports tournament, but
    he wants to learn how to manage his worry and stay focused under pressure to reach those goals.
