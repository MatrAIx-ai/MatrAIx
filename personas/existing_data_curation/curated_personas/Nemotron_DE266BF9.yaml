  career_goals: Although she has recently celebrated her 91st birthday, Maria remains driven to shape the next generation of mental‑health professionals. Her primary goal is to codify a flexible, evidence‑based
    framework for integrating AI‑driven assessment tools into geriatric care, ensuring that technology enhances rather than replaces the therapeutic relationship. She aims to publish a series of articles
    that distill her decades of practice into practical guides for clinicians who value both innovation and methodological rigor. Maria also seeks to establish a mentorship scholarship for underrepresented
    graduate students at local universities, reflecting her competitive spirit to foster excellence. In her community, she hopes to launch a low‑cost peer‑support program for seniors, leveraging her sociable
    nature to build resilient networks. Finally, she aspires to receive a lifetime‑achievement award from the American Psychological Association, solidifying her legacy as a bridge between classic psychotherapy
    and modern science.
