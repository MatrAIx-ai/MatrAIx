  hobbies: '[''drawing and coloring'', ''building with blocks'', ''singing and dancing'', ''pretend play'', ''storybook listening at the library'', ''playing on the playground'']'
  career_goals: Even at four, Teresa imagines a future where she can share her love of art and stories with others. She often says she wants to become a teacher who reads aloud, a children’s book author
    who draws pictures, or a performer who entertains her friends. Her ambition is to inspire curiosity and bring joy through creative expression.
