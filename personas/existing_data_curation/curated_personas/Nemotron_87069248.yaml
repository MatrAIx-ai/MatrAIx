  hobbies: '[''Sailing'', ''Woodworking'', ''Historical preservation volunteering'', ''Craft beer brewing and tasting'', ''Reading engineering and technology articles'', ''Hiking coastal trails'', ''DIY
    home renovation projects'']'
  career_goals: At 48, Alexander aims to transition from site‑level management to a regional oversight role, positioning himself as a strategic leader for multiple large‑scale developments in New England.
    He is pursuing LEED Accredited Professional certification and hopes to spearhead a green‑building initiative within his company, championing energy‑efficient designs and carbon‑footprint reductions.
    Long‑term, he envisions launching his own boutique construction firm that emphasizes craftsmanship, sustainability, and mentorship, providing a pathway for younger tradespeople to gain hands‑on experience
    while fostering a collaborative workplace culture.
