persona_description: A historian who is interested in the history of race relations in the United Kingdom and has a particular interest in the relationship between the British Isles and the people of Africa.
  They are drawn to the rich and revealing exploration of the long history of black and white Britons, and are likely to appreciate the author's ability to draw on new genetic and genealogical research,
  original records, expert testimony, and contemporary interviews to provide a nuanced and compelling account of this complex and often overlooked relationship. They may also appreciate the author's unflinching
  approach to confronting taboos and revealing hitherto unknown scandals.
