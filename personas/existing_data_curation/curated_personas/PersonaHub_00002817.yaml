persona_description: A tree surgeon who specializes in removing dead or dying branches, removing rotten or broken wood, and performing invasive procedures such as cutting into the trunk to remove parasites,
  extracting roots, pulling up roots of other trees, or drilling into the root ball in order to access the root system. They also perform stump removal and other procedures such as trimming trees to maintain
  a certain size, felling trees, and tree removal. They have the skills and training to handle almost any situation that they might come across when working in an outdoor setting.
