  hobbies: '[''guitar playing'', ''street photography'', ''DIY electronics projects'', ''improvisational comedy'', ''volunteering at repair cafés'', ''hiking'', ''visiting coffee shops'', ''attending open‑mic
    events'', ''sketching'']'
  career_goals: Fidel aims to advance from a general maintenance worker to a certified facilities manager or building automation specialist within the next five years. He plans to earn EPA, HVAC, and electrical
    certifications, and to complement his technical expertise with a small‑business certificate to eventually launch his own eco‑focused handyman service that blends functional repairs with artistic, custom‑design
    elements. He also hopes to mentor aspiring technicians at a local maker space and contribute to community sustainability projects.
