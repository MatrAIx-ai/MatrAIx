personas:
  professional: Fidel Taylor is a 26-year-old maintenance specialist who blends hands-on building systems expertise with a DIY electronics hobby, turning routine repairs into creative problem-solving sessions
    while embracing a relaxed, flexible work style that sometimes borders on disorganization yet keeps clients engaged with his talkative, collaborative approach.
  sports: Fidel Taylor is an avid hiker who spends weekends trekking the Cascade foothills, a regular at the Edge climbing gym, a devoted fan of the Portland Trail Blazers and Seattle Seahawks, and a member
    of the Willamette Trail Club's weekend bike rides.
  arts: Fidel Taylor channels artistic curiosity into open-mic guitar sessions covering Sufjan Stevens and The Decemberists, improv comedy nights with the Salem Improv Collective, street-photography of
    Portland murals by Shepard Fairey, and regular visits to the Oregon Museum of Modern Art for contemporary installations.
  travel: Fidel Taylor prefers spontaneous road trips along the Oregon Coast, weekend getaways to the San Juan Islands and Vancouver, and low-budget backpacking through Iceland's geothermal craters, planning
    mostly on the fly with a mix of Airbnb stays and camping gear from the repair café.
  culinary: Fidel Taylor enjoys crafting a perfect avocado toast with locally baked sourdough, whipping up mushroom risotto featuring foraged chanterelles and a splash of Oregon Pinot noir, and brewing
    seasonal kombucha infused with hibiscus, while often swapping recipes at the community coffee shop over espresso shots.
  core: Fidel Taylor is a socially magnetic, creatively restless handyman who tackles repairs with artistic flair, worries about tomorrow's deadlines, and can't resist a good guitar jam or a spontaneous
    hike.
background:
  cultural: Fidel grew up in a middle‑class family in the Salem suburbs, immersed in the Pacific Northwest’s blend of outdoor recreation, environmental consciousness, and vibrant indie arts scene. His upbringing
    emphasized self‑reliance, community involvement, and a respect for the region’s natural landscape, which is reflected in his appreciation for sustainable practices and local art. While his ethnic background
    is white, his family’s roots include Midwestern and German ancestry, and he has been shaped by the inclusive, progressive values common in modern Oregon—favoring collaboration, DIY culture, and an openness
    to diverse ideas.
