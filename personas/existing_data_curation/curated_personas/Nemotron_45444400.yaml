personas:
  professional: An adaptable front‑desk specialist with bilingual fluency and a knack for turning casual inquiries into cultural connections, Yesenia Khan uses their natural curiosity and relaxed, harmony‑focused
    demeanor to make every visitor feel welcome while quietly preparing for a future as a museum program coordinator.
  sports: An avid hiker who explores Garden of the Gods with the Colorado Springs Hiking Club, follows the Colorado Springs Switchbacks FC in the spring, enjoys Rockies baseball games in the summer, and
    balances these activities with weekly yoga sessions, Yesenia Khan prefers low‑intensity cardio over crowded gyms and occasionally joins pickup ultimate frisbee, they value flexibility and social connection
    in their fitness routine.
  arts: A dedicated cultural liaison who paints watercolor landscapes inspired by Ansel Adams' Western vistas and draws on the vibrant storytelling of Frida Kahlo, Yesenia Khan regularly visits the local
    Contemporary Arts Center, attends intimate acoustic shows featuring Iron & Wine, volunteers at community art workshops for seniors, they view art as a bridge between generations and a catalyst for cultural
    dialogue.
  travel: A curious explorer who mixes spontaneous weekend road trips to Colorado's hidden hot springs with thoughtfully planned journeys to Patagonia’s Torres del Paine and the lantern festivals of Chiang
    Mai, Yesenia Khan values flexible itineraries that allow for cultural immersion, they have already visited Oaxaca for its Day of the Dead celebrations and dream of strolling through the cobblestone
    streets of Lisbon, all while balancing travel costs with a modest savings plan.
  culinary: A passionate home‑cook who blends fresh cilantro, lime, and roasted poblano into nuanced carnitas tacos and homemade salsa verde, Yesenia Khan enjoys experimenting with traditional corn masa
    dough for tamales and occasionally adds a splash of agave nectar to desserts, they consider themselves an intermediate watercolor painter in the kitchen, favoring hands‑on preparation over takeout,
    yet they sometimes indulge in late‑night food‑truck quesadillas.
  core: Yesenia Khan is a bilingual front‑desk wizard who secretly sketches watercolor studies during quiet lobby moments, they thrive on spontaneous cultural connections, yet they habitually misplace their
    sketchbook and often forget to water their houseplants.
background:
  cultural: Yesenia is a first‑generation Mexican‑American whose parents immigrated from Mexico. Raised in a bilingual household in Colorado Springs, she celebrates traditions such as Día de los Muertos
    and Mexican holidays while also embracing the multicultural fabric of her city. Her upbringing instilled a deep respect for Mexican folk art, cuisine, and community values, which she integrates into
    her daily life and professional interactions. This bicultural perspective fuels her desire to promote cultural exchange and ensure that the Mexican heritage she cherishes is visible within the broader
    Colorado Springs arts scene.
