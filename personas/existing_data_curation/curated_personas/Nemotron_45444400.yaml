  hobbies: '[''Sketching'', ''Watercolor painting'', ''Visiting local art galleries'', ''Hiking'', ''Photography'', ''Cooking Mexican-inspired dishes'', ''Attending intimate acoustic concerts'', ''Reading
    contemporary fiction'', ''Yoga'', ''Volunteering at community art workshops'']'
  career_goals: Yesenia aims to transition into a role that merges her administrative strengths with her passion for the arts, such as a program coordinator at a local museum or community cultural center
    in Colorado Springs. She plans to complete an associate’s degree in Arts Administration and obtain a certification in office management to strengthen her organizational skills. Long‑term, she envisions
    leading outreach initiatives that highlight Mexican folk art and local artists, and she dreams of eventually opening a small boutique gallery that offers a flexible, creative workspace for emerging
    creators.
