persona_description: A pediatrician who advocates for the safe sleep practices for infants and is a leading voice in the American Academy of Pediatrics on the topic. They are knowledgeable about the latest
  research on the risks of sleep-related death and have updated their safe-sleep guidance to reduce the risk of sudden infant death syndrome. They are committed to promoting safe sleep practices and are
  actively involved in educating parents on the importance of separating infants from their parents in the crib and using cribs that are designed for safety. They are also aware of the plateau in SIDS cases
  and have updated their recommendations to emphasize the importance of separating infants from their parents in the crib.
