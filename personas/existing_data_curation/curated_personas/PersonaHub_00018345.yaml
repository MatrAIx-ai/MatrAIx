persona_description: A healthcare professional who specializes in the management and treatment of pressure ulcers in patients with darkly pigmented skin, particularly in acute conditions. They are aware
  of the prevalence and causes of pressure ulcers, as well as the pathophysiology and aetiology of the disease. They are skilled in the diagnosis and treatment of pressure ulcers, including the use of prophylaxis
  and non-operative treatment. They are aware of the unique challenges faced by patients with reduced sensation or paraplegia, and the importance of satisfactory relief of pressure and mobilisation in these
  patients. They are knowledgeable about the management and treatment of pressure ulcers in different patient groups, including the chronically ill.
