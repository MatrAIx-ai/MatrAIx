  career_goals: Koran aims to combine his curiosity for technology with his desire to help others. He envisions a future where he designs educational apps or software that make learning more engaging for
    kids in his community, or becomes a teacher or youth mentor who uses tech tools to empower students. He also dreams of one day coaching a local basketball team, giving back to the neighborhood that
    has supported him.
