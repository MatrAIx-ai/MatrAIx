personas:
  professional: An aspiring game developer and robotics enthusiast, Koran Johnson blends curiosity with practicality to create Scratch games and assemble Arduino‑based robots, while balancing school assignments
    and drumming duties with a collaborative, organized approach, and they regularly share their prototypes with classmates.
  sports: A dedicated basketball player, Koran Johnson competes on the Eagle Creek Middle School team, follows the NBA’s Boston Celtics and local junior league tournaments, and they participate in a community
    basketball club that emphasizes teamwork drills, while also enjoying casual pick‑up games after school.
  arts: A creative manga artist and enthusiastic drummer, Koran Johnson draws inspiration from Studio Ghibli’s animation, the works of Masashi Kishimoto, and the rhythmic style of Travis Barker, they spend
    weekends sketching panels for original graphic stories and practicing drum patterns for the church youth band, blending visual storytelling with musical expression.
  travel: An adventurous planner, Koran Johnson has explored the nearby state park’s hiking trails and dreams of attending the Japan Expo in Tokyo, they favor budget‑friendly trips that combine a cultural
    experience—like trying authentic ramen—with opportunities to meet fellow gamers, though school schedules often limit travel to summer breaks.
  culinary: A budding home‑chef, Koran Johnson enjoys whipping up easy ramen bowls with miso broth, topping pizzas with pepperoni and jalapeños, and baking chocolate chip cookies, they love experimenting
    with ingredients like sriracha and sushi‑grade tuna while still preferring the convenience of school cafeteria pizza on busy weekdays.
  core: Koran Johnson is a socially vibrant teen who fuses tech curiosity with a collaborative spirit, juggling robotics, basketball, drumming, and manga drawing while occasionally overindulging in video‑game
    snacks and skipping nighttime skincare, and they often forget to finish homework when a new coding idea strikes.
background:
  cultural: Koran is an African‑American teenager raised in the suburban community of Clemmons, North Carolina. His family places a strong emphasis on education, faith, and community involvement. Regular
    participation in the local church provides him with a sense of cultural heritage and a supportive network. He celebrates traditions such as Juneteenth and family reunions, and draws inspiration from
    the rich history of African‑American perseverance in the region. These cultural influences shape his values of compassion, cooperation, and a commitment to uplifting those around him.
