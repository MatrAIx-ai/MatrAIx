persona_description: A businessman who founded a successful lumber company in Bytown, Ontario, Canada, and expanded it into a major industry. His entrepreneurial spirit and vision for a prosperous city
  transformed the Ottawa Valley and the surrounding region. He was known for his integrity, resolute will, sound constitution, and capacity for hard work, and his pioneering entrepreneurship was ahead of
  many other notables from the United States. He played a significant role in the establishment of the Ottawa Ladies' College and the National Capital Commission. He died in 1889 and was succeeded by his
  son Erskine Henry.
