personas:
  professional: Victoria Knox, a seasoned practical nurse renowned for comprehensive patient assessments and health‑informatics expertise, blends meticulous clinical care with a pioneering drive to integrate
    watercolor‑based art therapy into senior wellness programs, pursues Nursing Informatics Specialist certification, and they mentor the next generation of nurses.
  sports: Victoria Knox enjoys weekend hikes with the Susquehanna Trail Crew, follows the Baltimore Ravens and Washington Capitals closely, and they maintain a modest home workout routine that includes
    yoga and resistance bands to stay fit.
  arts: Victoria Knox spends afternoons painting watercolors of the Chesapeake countryside, drawing inspiration from Claude Monet and local artist Elaine Lentz, regularly attends intimate exhibitions featuring
    emerging mixed‑media creators, and they find solace in the lyrical storytelling of Joni Mitchell and the speculative worlds of Octavia Butler.
  travel: Victoria Knox prefers thoughtfully planned road trips to historic towns like Annapolis and Charlottesville, interspersed with art‑focused pilgrimages to Florence and Kyoto, and they often choose
    boutique B&Bs that allow quiet reflection and ample time for sketching.
  culinary: Victoria Knox delights in crafting rosemary‑infused grilled chicken and garden salads featuring home‑grown basil, mint, and lavender, while they occasionally indulge in classic Maryland crab
    cakes seasoned with Old Bay and a splash of lemon butter.
  core: Victoria Knox blends a meticulous nursing career with a quiet passion for watercolor art and garden stewardship, and they navigate life's stresses through competitive board games, occasional over‑worry,
    and a steadfast commitment to community‑driven care.
background:
  cultural: Victoria grew up in a middle‑class, white Anglo‑American family in the Mid‑Atlantic region, with deep roots in Maryland’s suburban communities. Her upbringing emphasized self‑reliance, community
    service, and a respect for tradition, values reinforced by regular involvement in local church activities and neighborhood volunteer projects. Living near Baltimore and Washington, D.C., exposed her
    to a diverse cultural landscape, fostering an openness to new ideas and artistic expression. While she identifies with the broader American cultural narrative, her personal identity is shaped by the
    blend of Maryland’s historical heritage, the close‑knit ethos of Harford County, and a lifelong curiosity about the arts and scientific innovation.
attributes:
  skills: '[''Patient Assessment'', ''IV Therapy'', ''Wound Care'', ''Medication Administration'', ''Chronic Disease Management'', ''Health Informatics'', ''Electronic Health Record Optimization'', ''Quality
