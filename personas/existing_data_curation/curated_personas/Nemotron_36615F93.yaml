  hobbies: '[''Watercolor Painting'', ''Sketching Historical Sites'', ''Visiting Small Art Galleries'', ''Reading Science‑Fiction and Biographies'', ''Rose and Herb Gardening'', ''Hiking in Susquehanna
    State Park'', ''Journaling'', ''Mindfulness Meditation'', ''Strategic Board Games with Small Groups'']'
  career_goals: Victoria aims to transition from bedside nursing to a hybrid role that blends clinical leadership with health informatics. She plans to obtain certification as a Nursing Informatics Specialist
    and to spearhead a community‑based program that incorporates art‑therapy techniques for seniors in Harford County, merging her curiosity about art with her clinical expertise. Additionally, she hopes
    to become a mentor for younger nurses, develop continuing‑education workshops focused on innovative patient‑care models, and eventually consult for healthcare facilities seeking workflow optimization.
    Balancing these ambitions with her need for manageable stress levels, she also prioritizes establishing a sustainable work‑life rhythm that allows her to maintain her personal well‑being.
