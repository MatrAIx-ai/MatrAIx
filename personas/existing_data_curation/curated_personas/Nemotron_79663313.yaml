  career_goals: Jose aims to advance from desk clerk to front‑office supervisor within the next two years, and eventually become a hotel manager. He plans to enroll in a hospitality management certification
    program to complement his practical experience. Long‑term, he envisions opening a boutique hotel that reflects his Cuban heritage, offering guests authentic cultural experiences while providing supportive
    employment opportunities for his community. He also wants to improve his organizational skills to balance his flexible work style with the demands of leadership.
