  career_goals: Although retired, Kevin seeks to leave a lasting, community‑focused legacy. He aims to establish a small, traveling photo exhibition that highlights the changing faces of Bucks County, collaborate
    with the local historical society to digitize and preserve oral histories, and mentor younger artisans through a weekly woodworking and gardening club at the senior center. He also hopes to expand the
    community garden he helped start, making it a learning space for sustainable practices. Continuing his personal growth, Kevin plans to attend workshops on archival methods and to travel to renowned
    art museums such as the Smithsonian, the Getty, and the Metropolitan Museum, enriching his own appreciation of art while gathering ideas for future local projects.
