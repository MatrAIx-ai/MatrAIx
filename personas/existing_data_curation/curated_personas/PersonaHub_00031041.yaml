persona_description: A Rutgers-Camden professor who is interested in green building practices and the use of lichen in urban environments. She is passionate about cultivating lichen on buildings to counteract
  the lack of native vegetation in cities and to reduce cumulative temperatures. Her research interests include the study of fungi and algae, their ecological impact, and the cultivation of lichen on buildings.
  She is also interested in the aesthetic value of lichen-covered structures and their potential to improve the environment.
