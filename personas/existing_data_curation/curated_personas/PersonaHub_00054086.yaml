persona_description: A food scientist who specializes in the analysis of protein content in foods. They are familiar with the Kjeldahl method, a widely used method for estimating protein content in foods,
  and are skilled in using it to determine the nitrogen content of food samples. They may also be familiar with alternative methods for estimating protein content, such as the Dumas method, and may have
  experience in interpreting the results of these methods. They may also be interested in the potential hazards associated with the use of concentrated sulfuric acid and the need for correction factors
  for different proteins.
