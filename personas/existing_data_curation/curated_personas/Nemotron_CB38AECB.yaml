    and data‑science tutorials'', ''Learning to play guitar'', ''Attending community cultural festivals'']'
  career_goals: Reynaldo aims to progress to a senior underwriting or underwriting‑manager position within the next five years, where he can lead a team and shape product strategies that serve underserved
    communities, especially Hispanic small‑business owners in Texas. He plans to earn the Chartered Insurance Professional (CIP) designation and deepen his expertise in emerging risk areas such as cyber
    liability and climate‑related coverage. Passionate about mentorship, he wants to develop a formal onboarding program for junior underwriters and to launch community workshops that improve financial
    literacy and insurance awareness among his local Mexican‑American community. Balancing ambition with his compassionate nature, Reynaldo also hopes to integrate wellness practices at work to help colleagues
    manage stress.
