personas:
  professional: Ivan Mouton excels as an entertainment venue operations specialist, applying a checklist‑driven, detail‑oriented approach to crowd flow and safety compliance while reliably leading small
    teams during peak periods, and they channel their competitive spirit into measurable improvements in guest satisfaction and operational efficiency.
  sports: Ivan Mouton hits the downtown pickup basketball courts every Thursday night, tracks the Chicago Bulls’ season while cheering at home games, and spends the summer weekends as a member of the Lakeside
    Anglers Club, using fishing trips as low‑intensity cardio and a way to unwind from the fast‑paced venue environment.
  arts: Ivan Mouton dives into live music nights featuring The Black Keys and Miles Davis, revisits classic film noir such as Alfred Hitchcock’s ‘Vertigo’ on weekend movie marathons, and curates a vinyl
    collection of 1970s rock, letting these artistic escapes balance their structured work life.
  travel: Ivan Mouton maps his travel calendar months in advance, securing budget‑friendly flights to the Japanese Alps for ski‑and‑onsen retreats and planning road‑trip itineraries that thread through
    Lake Tahoe’s fishing spots and the Goodwood Revival in England to indulge in classic‑car culture, all while adhering to a strict expense‑tracking spreadsheet.
  culinary: Ivan Mouton favors hearty, protein‑rich meals—often grilling a smoked brisket seasoned with smoked paprika and garlic, pan‑searing trout almondine with fresh lemon and capers, and occasionally
    crafting a homemade pepperoni pizza topped with mozzarella, oregano, and a drizzle of hot honey—reflecting an intermediate cooking skill that balances meticulous recipe follow‑through with occasional
    improvisational flair.
  core: Ivan Mouton is a methodical, competition‑driven professional who blends a checklist‑obsessed work ethic with low‑key passions for basketball, classic‑car restoration, and midnight strategy gaming,
    tolerating little waste and constantly questioning others’ motives.
background:
  cultural: Ivan grew up in a middle‑class, working‑class family in the Greater Cincinnati area of Ohio. His French‑origin surname reflects a small ancestral tie to French‑Canadian settlers, but his cultural
    identity is rooted in Midwestern American values—hard work, community involvement, and modesty. He attended local public schools, participated in high‑school football games as a spectator, and spent
    weekends at county fairs and church picnics. The region’s emphasis on friendly competition, self‑reliance, and volunteerism shaped his practical, skeptical yet stable personality. Though divorced, he
    remains connected to his family and maintains ties with extended relatives who still live in Ohio and Indiana.
attributes:
