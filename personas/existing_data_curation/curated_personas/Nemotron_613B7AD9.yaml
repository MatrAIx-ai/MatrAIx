  hobbies: '[''Pickup Basketball'', ''Fishing'', ''Classic Car Restoration'', ''Woodworking'', ''Strategy Video Games'', ''Live Music Concerts'', ''Film Noir Watching'', ''Productivity & Self-Improvement
    Reading'']'
  career_goals: He aims to transition from on‑floor attendant roles into supervisory and eventually managerial positions within the entertainment industry. Over the next two years he plans to obtain an
    Associate’s degree in Hospitality Management and earn a Certified Venue Operations Professional credential. His long‑term ambition is to become a venue manager or to launch his own event‑staffing consultancy,
    leveraging his competitive drive to improve operational efficiency and guest satisfaction metrics.
