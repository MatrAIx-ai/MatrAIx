personas:
  professional: Summer Liss, a 31-year-old organized community-focused professional, leverages a business administration background and meticulous event-planning skills to coordinate PTA fundraisers and
    food-bank drives, and they aim to transition into a part-time program-coordination role at a local nonprofit where they can blend routine-driven logistics with a sociable leadership style.
  sports: Summer Liss, a 31-year-old avid outdoors enthusiast, hikes the Columbia River Gorge with the local Columbia River Hiking Club, attends a weekly Zumba class at Troutdale Community Center, follows
    the Portland Timbers and Oregon Ducks, enjoys skiing at Mt. Hood during winter weekends, and they occasionally join community runs to raise funds for the food bank.
  arts: Summer Liss, a 31-year-old book-club regular, finds creative solace in knitting while listening to indie folk artists like Sufjan Stevens and The Decemberists, occasionally attends performances
    at the Portland Art Museum and the Oregon Shakespeare Festival, and they delight in local craft fairs featuring pottery by Oregon artisans.
  travel: Summer Liss, a 31-year-old weekend traveler, plans meticulous day trips to Willamette Valley wineries and family beach outings at Cannon Beach, dreams of a summer road trip to Banff National Park,
    and they balance their love of structured itineraries with spontaneous hikes along Oregon's coast while keeping travel expenses within a family budget.
  culinary: Summer Liss, a 31-year-old home cook, harvests heirloom tomatoes, rosemary, and kale from their garden to batch-cook seasonal dishes like roasted root vegetable medley, quinoa salads, and sourdough
    bread, enjoys making apple pie and chili for potlucks, but they occasionally swap healthy snacks for store-bought granola bars when time runs short.
  core: Summer Liss is a meticulously organized community-minded planner who balances routine-driven budgeting, vibrant social involvement, and a love for the Pacific Northwest's outdoors, but they occasionally
    overcommit and forget self-care.
background:
  cultural: Summer’s cultural background reflects the white, middle‑class suburban culture of Troutdale, Oregon, in the Pacific Northwest. Raised in a community that values practicality, self‑reliance,
    and an active outdoors lifestyle, she grew up with strong family traditions, seasonal celebrations (such as Thanksgiving and holidays at local farms), and a deep appreciation for community involvement.
    Local customs—farmers markets, volunteerism, and environmental awareness—have shaped her values, reinforcing a pragmatic yet socially engaged worldview that balances tradition with a modern, community‑focused
    ethos.
