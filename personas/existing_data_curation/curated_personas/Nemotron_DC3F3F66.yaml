  career_goals: Summer aims to transition into a part‑time administrative or program‑coordination role within a local school, community center, or small non‑profit organization, where she can apply her
    organizational talents while maintaining a predictable schedule that fits family life. She plans to complete a bachelor’s degree in Business Administration or Public Administration to broaden her qualifications.
    In the longer term, she hopes to lead community outreach initiatives and possibly launch a home‑based event‑planning boutique that serves the Troutdale area.
