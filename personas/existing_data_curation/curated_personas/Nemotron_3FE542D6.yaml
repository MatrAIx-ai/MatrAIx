  career_goals: Dung aims to become an executive chef at a major Las Vegas resort or casino, where he can lead a large brigade while preserving his routine‑driven approach to quality. In the longer term
    he plans to open a family‑style restaurant that showcases authentic Vietnamese and Cambodian dishes, offering consistent, community‑focused dining. He seeks professional culinary certifications such
    as Certified Executive Chef and Master Chef, and he hopes to develop a catering line that provides reliable service for cultural celebrations and corporate events. Leveraging his sociable nature, he
    also wants to host cooking classes and live demonstrations to share his heritage and culinary skills.
