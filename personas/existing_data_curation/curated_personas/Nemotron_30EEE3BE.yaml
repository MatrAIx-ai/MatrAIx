  hobbies: '[''Hiking'', ''Fishing'', ''Hunting'', ''Bowling'', ''Community Basketball'', ''Trivia Nights'', ''Classic Car Restoration'', ''DIY Home Improvement'', ''Volunteer Fire‑Watch'', ''Reading about
    New Tools'']'
  career_goals: Victor aims to turn his informal handyman experience into a small, locally owned service business focused on home‑repair and maintenance. He plans to earn his GED within the next year, opening
    the door to trade certifications. He aspires to become a recognized community resource, perhaps leading a neighborhood safety volunteer group, and eventually mentor younger workers in practical trades.
    His ambition is driven by a desire to prove his competence, earn respect, and achieve financial independence.
