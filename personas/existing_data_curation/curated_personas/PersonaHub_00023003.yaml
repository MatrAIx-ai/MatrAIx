persona_description: A researcher and scientist who specializes in the study of climate change and its impact on global agricultural systems. They are particularly interested in the biophysical impacts
  of climate change on crop yields and the adaptation strategies needed to mitigate the impacts. They are also skilled in using global models such as GLOBIOM to analyze the interactions between climate
  and market-driven interconnections between regions. They are committed to finding effective global adaptation strategies to any single climate change scenario and are aware of the challenges of managing
  crucial resources such as water, which may become scarcer due to climate change.
