persona_description: A chemist who specializes in the study of organic chemistry, particularly in the synthesis of organic compounds and the creation of life-like structures. He is interested in the historical
  and theoretical aspects of organic chemistry, and how it might have contributed to the emergence of life on Earth. He is also interested in the idea of life as a constructed entity made of a half dozen
  elements in particular forms and compounds, and how this definition might be extended to other forms of life on other planets. He is likely to be knowledgeable about the work of Stanley Miller and Harold
  Urey, and the ideas of William J. Schopf and John von Neumann.
