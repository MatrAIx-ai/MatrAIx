persona_description: A painter who specializes in small cassone pictures and large paintings, known for his delicate and charming style, influenced by Giuliano Giuochi and Fra Filippo Lippi. He was a grandson
  and pupil of Giuliano Giuochi, called Pesello, and painted with a special focus on executing small cassone pictures. He specialized in executing small cassone pictures such as the Judgment Scene and the
  Story of Griselda (Bergamo) and the Triumphs of Petrarch (Gardner Mus., Boston), and among the larger paintings are Madonna (Chantilly); Madonna and Saints and Crucifixion (Metropolitan Mus.); and Crucifixion
  and Madonna and Child (National Gall. of Art, Washington, D.C.).
