personas:
  professional: James Duffy, a retired humanities scholar turned community art curator, blends their deep literary analysis skills and competitive streak to design exhibitions that juxtapose Southern Gothic
    narratives with contemporary abstract paintings, all while preferring flexible, improvisational planning over strict schedules.
  sports: James Duffy enjoys watching the Alabama Crimson Tide football team and the local high‑school basketball league, occasionally joining a senior walking club that meets at the county’s historic park,
    while their competitive nature surfaces when they bet on game scores with fellow retirees.
  arts: James Duffy immerses themselves in watercolor landscapes inspired by the works of Georgia O'Keeffe and Mark Rothko, sketches wildlife during nature walks, and judges regional art contests, regularly
    attending openings at the Montgomery Museum of Fine Arts to stay connected with contemporary trends.
  travel: James Duffy favors slow, reflective road trips along historic routes, having recently visited Savannah’s historic district and planning a future pilgrimage to the National Gallery in London, all
    while they balance travel costs with a modest retirement budget and occasional family obligations.
  culinary: James Duffy cultivates heirloom tomatoes in their garden and enjoys preparing Southern‑style bruschetta with fresh basil, pecorino, and a drizzle of extra‑virgin olive oil, and they boast a
    modest cooking skill that favors simple, seasonal dishes over elaborate meals.
  core: James Duffy is a fiercely curious, slightly disorganized retiree who melds ghostly Southern storytelling with avant‑garde art, competing in community contests while trading a love for solitude with
    occasional bursts of social engagement.
background:
  cultural: James grew up in a small town in the Deep South, steeped in Southern literary traditions and the oral storytelling culture of Alabama. His family's modest, church‑centered upbringing fostered
    a respect for community rituals, while his university education broadened his perspective through exposure to global art movements and critical theory. The convergence of Southern Gothic sensibilities
    with contemporary humanities studies informs his artistic voice, and his lifelong attachment to Elmore County shapes his commitment to preserving local history while also seeking fresh, innovative expressions
    within that context.
