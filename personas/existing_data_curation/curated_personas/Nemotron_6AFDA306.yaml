personas:
  professional: Mohammad Marroquin is a veteran sales manager whose curiosity about emerging market trends merges with a practical, data‑driven approach, using Salesforce and Power BI to craft strategic
    plans, coach high‑performing teams, and negotiate cross‑cultural deals while thriving as the conversational hub at industry events and community gatherings.
  sports: Mohammad Marroquin enjoys hiking the Boise foothills and weekend fishing on the Snake River, follows the Boise State Broncos football team, and participates in a local sunrise jogging group that
    meets each spring with fellow enthusiasts.
  arts: Mohammad Marroquin nurtures a love for music, often strumming acoustic guitar during informal jam sessions and attending live performances by regional folk bands and Santana at the Gem State Music
    Festival, while also devouring historical biographies of legends such as Nelson Mandela and Eleanor Roosevelt.
  travel: Mohammad Marroquin favors relaxed road‑trip itineraries that combine scenic drives through the Rocky Mountains with visits to historic towns like Prescott, Arizona, and they have a growing wish‑list
    that includes hiking in the Canadian Rockies and exploring the colonial streets of Cartagena, Colombia.
  culinary: Mohammad Marroquin takes pride in preparing vibrant dishes such as mole poblano, carnitas tacos, and fresh salsa verde using tomatoes and chilies harvested from their backyard garden, and they
    regularly host lively dinner gatherings where friends sample their meticulously balanced flavors.
  core: Mohammad Marroquin is a charismatic, curiosity‑driven sales veteran who blends meticulous planning with spontaneous outdoor adventures, yet frequently forgets to water their garden during busy weeks.
background:
  cultural: Born to Mexican parents, Mohammad grew up immersed in the rich traditions of Mexican culture while also navigating life in the United States. He is bilingual in Spanish and English, and his
    heritage informs his values of hospitality, family connection, and community service. Celebrating holidays such as Día de los Muertos and Cinco de Mayo, he often incorporates Mexican music, food, and
    storytelling into social events, fostering cross‑cultural understanding in his Idaho community. His Mexican background enhances his affinity for personal relationships, which translates into a relational
    sales style that emphasizes trust and warmth. Though he has never married, he maintains close ties with extended family across the border and actively participates in local Latino organizations, blending
    his cultural identity with his professional and social life.
