  career_goals: In the next five years, Mohammad aims to step into a regional director role overseeing sales operations across the Intermountain West, where he can apply his strategic expertise on a larger
    scale. He plans to launch a formal mentorship program within his organization to develop emerging talent and foster a culture of collaborative growth. Drawing on his Mexican heritage, he intends to
    create multicultural sales initiatives that tap into diverse customer segments. Ultimately, he envisions establishing a boutique sales consulting firm that helps small Idaho businesses refine their
    go‑to‑market strategies, allowing him to blend his practical experience with his ongoing curiosity for innovative approaches.
