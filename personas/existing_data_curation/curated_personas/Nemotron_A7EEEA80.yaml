  career_goals: Ricky aims to step into a senior executive role within the next three years, targeting positions such as Director of Operations or Chief Operating Officer at a regional firm where he can
    enforce rigorous efficiency standards and boost profitability. He also plans to mentor emerging managers, launch a boutique consulting practice focused on process improvement for small businesses, and
    champion diversity and inclusion initiatives within his organization. Ultimately, he seeks a measured transition toward retirement that secures a stable financial legacy for his family while allowing
    him to share his expertise with the next generation of leaders.
