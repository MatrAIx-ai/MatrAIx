personas:
  professional: Ricky Linen is an experienced operations manager whose data‑driven, results‑oriented style blends rigorous process optimization, advanced Excel modeling, and SAP ERP oversight, and whose
    competitive edge and healthy skepticism drive them toward a strategic push for a senior executive role within three years while they mentor emerging managers and champion diversity.
  sports: Ricky Linen keeps physically grounded through disciplined early‑morning jogs along the river trail; they join a close‑knit group of friends for weekly rounds at Oak Ridge Golf Club, and they support
    the local baseball team, the River City Royals, while occasionally attending community basketball games of the Midtown Hawks.
  arts: Ricky Linen unwinds with a curated collection of jazz and soul classics—from Miles Davis’ ‘Kind of Blue’ to Aretha Franklin’s ‘Respect’—and they participate in intimate church gatherings featuring
    gospel harmonies, while they occasionally attend the downtown theater’s performance of ‘The Glass Menagerie’.
  travel: Ricky Linen prefers meticulously planned getaways that balance cultural immersion with low‑stress logistics, frequently revisiting the historic streets of Savannah, Georgia, and they dream of
    a week‑long literary tour through Lisbon, Portugal, while ensuring trips fit within a modest budget and family commitments.
  culinary: Ricky Linen approaches family meals with the precision of a project plan; they expertly prepare dishes like rosemary‑infused roast chicken, shrimp étouffée, and sweet potato casserole using
    exact measurements of herbs, spices, and fresh produce, though they sometimes over‑season in an attempt to perfect flavor.
  core: Ricky Linen is a structured, competitively minded senior manager who balances solitary hobbies, meticulous financial planning, and a steady pursuit of health and legacy, yet they struggle with chronic
    worry and occasional over‑cautiousness.
background:
  cultural: Ricky grew up in the Northeastern United States in a close‑knit African‑American community, where family, church, and education were emphasized as pillars of resilience and upward mobility.
    He carries a deep respect for the legacy of Black entrepreneurs and civil‑rights leaders, which informs his drive for professional excellence and mentorship. Living in Norwalk, CT, he navigates a predominantly
    white corporate environment by drawing on his cultural heritage of perseverance and community support. His identity is reflected in his love for soulful music, family gatherings centered around shared
    meals, and a commitment to uplifting younger Black professionals through guidance and advocacy.
