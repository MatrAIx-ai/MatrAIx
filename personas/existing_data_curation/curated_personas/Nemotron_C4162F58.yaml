  career_goals: She aims to obtain her CPA designation and complete an MBA within the next three years, positioning herself for a senior executive role such as Chief Financial Officer. Gladys is passionate
    about integrating ESG principles into corporate finance and wants to lead her organization’s sustainability reporting. She aspires to mentor a new generation of women in finance, creating a supportive
    network within her company and the broader Colombian‑American community. To balance her stress‑prone tendencies, she also seeks to transition to a role that allows more flexible scheduling and remote
    work opportunities, enabling her to prioritize personal well‑being while continuing to contribute strategic financial expertise.
