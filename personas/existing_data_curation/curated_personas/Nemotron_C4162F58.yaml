personas:
  professional: Gladys Santana, a senior financial manager with 15 years of experience in budgeting, cash‑flow forecasting, and ERP integration, leverages their collaborative spirit and curiosity to guide
    cross‑border projects, while their laid‑back approach to deadlines often means they tackle tasks in the last hour of the workday, relying on quick Excel wizardry and a strong network of junior analysts
    they mentor.
  sports: Gladys Santana, a devoted fan of the Miami Heat and Miami Dolphins, squeezes sunrise beach jogs and weekend paddle‑boarding sessions with the Fort Lauderdale Paddle Club into their schedule, preferring
    low‑impact workouts that complement their yoga practice, though they often postpone a regular gym routine in favor of spontaneous walks.
  arts: Gladys Santana finds solace in watercolor landscapes inspired by Georgia O'Keeffe and the coastal vibe of Fort Lauderdale, while evenings often include listening to salsa classics by Celia Cruz
    and jazz saxophonist Michael Brecker, and they regularly attend gallery openings featuring emerging local painter Elena Diaz, letting these experiences nurture their creative curiosity.
  travel: Gladys Santana enjoys spontaneous weekend getaways to coastal retreats like the Florida Keys and cultural pilgrimages to Cartagena and Bogotá, while they dream of an extended art‑focused tour
    of Florence and Provence, planning each trip with flexible itineraries that leave room for impromptu beach walks and family celebrations.
  culinary: Gladys Santana, a confident home chef, spends Saturday mornings perfecting arepas stuffed with cheese and chorizo, simmering hearty sancocho broth with yucca, plantains, and corn, while they
    relish avocado toast with smoked salmon for brunch and treat themselves to occasional dinner at Miami's acclaimed Peruvian spot La Mar, savoring ceviche and aji amarillo‑infused sauces.
  core: Gladys Santana balances a sharp financial mind with a love for watercolor sunrise sketches, a habit of last‑minute deadline sprints, and a lingering worry that fuels nightly meditation rituals they
    practice.
background:
  cultural: Gladys was born in Medellín, Colombia, and moved to the United States as a young adult. She grew up in a bilingual household, speaking Spanish at home and English at school, giving her a deep
    connection to both Colombian and American cultures. She maintains strong ties with the Colombian diaspora in South Florida, celebrating holidays such as Día de la Independencia (July 20) and Carnaval
    de Barranquilla with family gatherings, music, and traditional foods. Her Catholic upbringing influences her values of community and harmony. In Fort Lauderdale, she has embraced the multicultural environment,
    often participating in community festivals that blend Caribbean, Latin, and Southern influences. Her cultural identity informs her professional approach, emphasizing relationship‑building, respect for
    diverse perspectives, and a collaborative spirit.
