personas:
  professional: Suniel Guevara, a retired handyman turned community organizer, combines a lifetime of carpentry, plumbing, and gardening expertise with bilingual fluency to coordinate senior‑center workshops,
    manage modest budgets, and translate for Spanish‑speaking neighbors, all while applying a methodical, reliable approach to every project.
  sports: Suniel Guevara follows the Cincinnati Reds on television, enjoys fishing trips on the Ohio River, competes in the senior‑center’s bingo league, and plays dominoes with the local community club,
    balancing low‑impact recreation with a love for classic baseball.
  arts: Suniel Guevara’s evenings echo with salsa classics by Celia Cruz, bolero ballads by Luis Miguel, and the harmonious hymns of his church choir, while he also delights in storytelling sessions that
    weave local folklore and personal memories into lively gatherings.
  travel: Suniel Guevara prefers thoughtfully planned trips, often revisiting river towns and state parks along the Ohio River, while dreaming of an annual pilgrimage to the mountainous region of his birthplace,
    where he hopes to reconnect with extended family and capture stories for future generations.
  culinary: Suniel Guevara excels at preparing corn‑based tamales wrapped in plantain leaves and creamy atole seasoned with cinnamon and vanilla, frequently incorporating fresh garden vegetables like tomatoes,
    zucchini, and chilies into hearty stews and side dishes.
  core: Suniel Guevara is a methodical, community‑focused elder who blends hands‑on tinkering, bilingual mentorship, and traditional cooking with disciplined budgeting and a fondness for bingo and storytelling.
background:
  cultural: Suniel was born in a rural town in Guatemala to a Ladino family that observed Catholic traditions and valued strong family ties. He grew up speaking Spanish, with occasional exposure to indigenous
    Mayan words, and learned to prepare family recipes passed down through generations. He immigrated to the United States in his early twenties, eventually settling in Sturgis, Kentucky, where he married
    his wife and raised their family. In Kentucky, he blends his Guatemalan heritage with Southern Appalachian culture, actively participating in community church events, local festivals, and volunteer
    activities. He celebrates traditional Guatemalan holidays such as Día de los Muertos and Semana Santa, while also embracing local customs, creating a unique multicultural identity that he shares proudly
    with his community.
