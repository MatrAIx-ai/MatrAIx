  career_goals: While retired, Suniel aims to stay active and contribute to his community. He hopes to mentor younger neighbors, especially those of Hispanic background, by sharing his bilingual skills
    and practical knowledge. He wishes to preserve and pass on Guatemalan culinary traditions to his grandchildren and organize cultural workshops at the local senior center. He also dreams of making an
    annual trip back to Guatemala to reconnect with his extended family and document his life stories for future generations.
