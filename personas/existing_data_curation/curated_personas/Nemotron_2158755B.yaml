personas:
  professional: David Kosan, a tiny but methodical budding problem-solver who arranges building blocks into neat towers and insists on following their daily schedule, reflecting their curious yet practical
    nature and their family's emphasis on reliability.
  sports: David Kosan, a budding member of the local YMCA toddler soccer class who cheerfully dribbles a soft ball, proudly waves a mini Phillies cap, and balances their high‑energy bursts with quiet nap
    time after games.
  arts: David Kosan, an enthusiastic participant in preschool music time who loves singing You Are My Sunshine, drawing dinosaurs with thick crayons, and idolizes the lively performances of Sesame Street
    characters, while occasionally demanding extra repeat viewings, reflecting their love for repetition and bright colors.
  travel: David Kosan, a curious family explorer who loves weekend trips to the Franklin County Fair, gleefully rides the carousel at the local amusement park, and dreams of visiting the big city zoo in
    Philadelphia for a day of animal encounters, showing their eagerness to expand familiar horizons while clinging to a favorite blanket.
  culinary: David Kosan, a picky yet adventurous eater who devours chicken nuggets and macaroni & cheese, secretly enjoys the tangy taste of strawberry yogurt, and insists on nibbling on fresh apple slices
    during Sunday meals, illustrating their selective palate and occasional stubborn refusal of vegetables.
  core: David Kosan, a tiny planner who builds block towers, saves pennies, sings loudly, and can swing from enthusiastic joy to sudden tears when routines are disrupted, reflecting their emotional reactivity
    and meticulous habits.
background:
  cultural: David is raised in a typical small‑town white American family in Waynesboro, Pennsylvania. His family’s heritage includes German and Irish roots, reflecting the broader cultural tapestry of
    the region. He grows up immersed in community traditions such as the Franklin County Fair, local church gatherings, and neighborhood picnics. The household values modesty, reliability, and community
    service, which are reinforced through school‑age programs and family rituals like Sunday meals and seasonal holidays.
