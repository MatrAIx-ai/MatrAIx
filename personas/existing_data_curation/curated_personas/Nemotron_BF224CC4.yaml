personas:
  professional: Janet Beverage, an 18‑year‑old aspiring concept artist, blends digital illustration, watercolor, and generative Python scripts to craft surreal visual narratives, leveraging their love for
    improvisation and competitive board‑gaming strategy to pitch bold ideas in campus art collectives and freelance gigs.
  sports: Janet Beverage follows Saturday football rituals cheering the Dallas Cowboys, plays casual ultimate frisbee with the Frisco Flying Dogs club, and hits the campus weight room for quick HIIT sessions,
    preferring varied spontaneous workouts over regimented training.
  arts: Janet Beverage frequents the Denton Arts & Jazz Festival, creates experimental collages inspired by the surrealism of Remedios Varo and the glitch aesthetics of Refik Anadol, spins indie vinyl records
    from Mitski, Tame Impala, and The Strokes while sketching in coffee‑shop corners, and posts timelapse art videos on TikTok to a growing audience.
  travel: Janet Beverage has road‑tripped to Austin’s music scene, explored the street art of New Orleans’ Bywater district, and dreams of a spring pilgrimage to Portland’s independent galleries and a summer
    stint at Tokyo’s Comic Market, favoring spontaneous, budget‑friendly itineraries over meticulously planned tours.
  culinary: Janet Beverage alternates between smoky Texas brisket and spicy vegan ramen, loves crafting avocado toast with heirloom tomatoes and smoked paprika, and experiments with kombucha‑infused mocktails
    while hunting for the perfect matcha latte at local coffee roasters.
  core: Janet Beverage is a fiercely imaginative teen who fuses avant‑garde art with tech, splurges on creative tools, neglects routine health checks for sketch marathons, and thrives on spontaneous football‑filled
    Saturdays and indie music vibes.
background:
  cultural: Janet was raised in Denton, a vibrant college town in North Texas, where a traditional Texan upbringing blends with a progressive, arts‑centric community. Her family’s middle‑class background
    exposed her to classic Southern customs—BBQs, football Saturdays, and holiday gatherings—while the local university atmosphere introduced her to diverse cultural events, indie music scenes, and experimental
    art workshops. This mix fostered a strong sense of independence and self‑reliance typical of Texas, coupled with an open‑minded appreciation for unconventional ideas and creative expression.
attributes:
  skills: '[''Digital illustration'', ''Watercolor painting'', ''Mixed‑media conceptual art'', ''Creative writing (poetry, flash fiction)'', ''Photography (experimental portraiture)'', ''Graphic design
    (Adobe Photoshop, Canva)'', ''Basic Python programming for generative art'', ''Video editing (Adobe Premiere)'', ''Strategic board game playing'', ''Debate (competitive)'']'
  hobbies: '[''Sketchbook journaling'', ''Experimental painting and collage'', ''Digital illustration timelapse videos'', ''Urban photography'', ''Reading science‑fiction and philosophy'', ''Playing strategy
    board games'', ''Attending local art shows and indie concerts'', ''Exploring new coffee shops and street art'', ''Creating short art videos for TikTok/Instagram'', ''Listening to indie vinyl records'']'
  career_goals: Janet aims to build a versatile, interdisciplinary portfolio that merges visual art, storytelling, and technology. In the short term, she plans to pursue a Bachelor of Fine Arts or a related
    degree with an emphasis on digital media and concept art, targeting schools that foster experimental practice. She hopes to secure internships or entry‑level roles as a concept artist for video‑game
    studios or as a freelance illustrator for indie publishers, while also curating small pop‑up exhibitions of her experimental work. Long‑term, Janet envisions launching her own creative studio that produces
    immersive visual narratives, collaborates on indie game projects, and publishes a limited‑edition art‑zine, allowing her to maintain the flexibility and novelty‑driven environment she values.
