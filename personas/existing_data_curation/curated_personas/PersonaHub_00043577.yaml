persona_description: A state official responsible for overseeing the implementation and growth of charging infrastructure for electric vehicles (ZEVs) in various states, including Connecticut, Maryland,
  Massachusetts, New York, Oregon, Rhode Island, and Vermont. This official is aware of the challenges and opportunities in expanding the ZEV market and is committed to investing heavily in charging infrastructure
  to make the charging units a fixture of parking lots at workplaces, schools, retail centers, and multifamily housing developments. This official is expected to work closely with electric providers, cities,
  and other stakeholders to develop incentive programs for charging stations in multifamily housing buildings and other areas.
