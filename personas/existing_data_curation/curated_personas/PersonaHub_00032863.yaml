persona_description: A scientist or chemist who is interested in the properties and calculations of atoms and molecules, particularly in the context of determining molecular mass and atomic weights. They
  may work in a laboratory or research facility, and are familiar with various techniques for measuring mass, such as atomic mass spectrometry. They may also have experience with the unified atomic mass
  scale, which attempts to standardize atomic weights based on a pure isotope. They are likely to be interested in understanding the relationship between atomic weights and molecular weights, and how these
  values can be used to determine the composition of substances.
