  career_goals: Silvia dreams of growing up to be a creator who can share stories through color and shape. She often talks about becoming a painter or muralist who decorates walls with bright scenes from
    her Mexican heritage, and she also imagines teaching other children how to express themselves through art. Her organized, methodical nature leads her to imagine building her own art studio one day,
    where she can plan projects, keep supplies tidy, and guide friends in collaborative creative work.
