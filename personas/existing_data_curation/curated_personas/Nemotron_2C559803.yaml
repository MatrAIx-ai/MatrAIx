  career_goals: At 71, Jeffery aims to transition from day‑to‑day operational oversight to a mentorship and advisory role, sharing his decades of knowledge with emerging managers and local vocational programs.
    He is passionate about guiding his company toward greener manufacturing practices, championing energy‑efficiency upgrades, and reducing waste. Jeffery also aspires to publish a memoir that chronicles
    his cross‑cultural journey and the evolution of industrial practices, and to establish a small scholarship fund for South Asian students pursuing STEM fields in New York.
