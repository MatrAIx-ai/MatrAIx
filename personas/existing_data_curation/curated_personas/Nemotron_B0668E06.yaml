  hobbies: '[''hiking'', ''Zumba classes'', ''Habitat for Humanity volunteering'', ''gardening'', ''potluck gatherings'', ''cooking'', ''storytelling'']'
  career_goals: Looking ahead, Diane aims to transition into a foreman or safety-lead role where she can combine her technical expertise with her natural inclination to mentor and support her coworkers.
    She plans to complete a certified OSHA trainer program and obtain a construction supervisor certificate, positioning herself to lead larger crews and oversee project-wide safety initiatives. In the
    longer term, she hopes to mentor apprentices through a local trade union and possibly launch a small consulting service that helps contractors develop inclusive, safety-focused work cultures.
