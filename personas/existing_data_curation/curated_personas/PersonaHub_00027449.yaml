persona_description: A professional architect with expertise in solar design and climatic design. They have a deep understanding of the interrelationship between architectural design, building materials,
  human behavior, and climatic factors. They are skilled in the use of principles of solar architecture to reduce a structure's dependency on external energy to maintain a comfortable living environment.
  They are aware of the importance of air movement and ventilation in maintaining proper living conditions within a space and have experience in designing HVAC systems to reduce humidity levels and improve
  air movement. They are also aware of the inherent contradiction in the tasks that a building envelope has to perform in summer and winter and are skilled in using the principles of solar design to mitigate
  this conflict.
