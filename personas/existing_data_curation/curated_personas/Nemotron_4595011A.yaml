personas:
  professional: A meticulous food‑service manager at a bustling Raton diner, Alfonso Detata leverages data‑driven scheduling and cost‑control techniques while energizing staff with their outgoing, collaborative
    style, all in pursuit of a regional supervisory role and a future farm‑to‑table bistro.
  sports: An enthusiastic outdoorsman, Alfonso Detata tackles the Sangre de Cristo trails with the local Hiking Club, shreds cross‑country skis at Angel Fire each winter, competes in the Raton Rattlers
    community basketball league, and roots for the Los Angeles Lakers and New Mexico United.
  arts: Passionate about folk music, Alfonso Detata strums acoustic covers of Gillian Welch and Old Crow Medicine Show at Raton’s open‑mic nights, and immerses themselves in events like the Northern New
    Mexico Folk Festival while drawing inspiration from Bob Dylan’s storytelling.
  travel: A meticulous trip planner, Alfonso Detata maps weekend road‑trips from Raton to Santa Fe, Aspen, and Sedona while saving for a dream backpacking trek across Iceland’s volcanic landscapes, balancing
    a modest travel budget with a love for spontaneous mountain hikes.
  culinary: An inventive home cook, Alfonso Detata regularly prepares New Mexican classics such as red‑chile enchiladas, green‑chile stew, and carne adovada—seasoned with chile de árbol and pinon nuts—while
    hosting intimate dinner gatherings that blend traditional flavors with data‑driven portion control.
  core: Alfonso Detata is a data‑savvy, outdoor‑loving 23‑year‑old food‑service manager who balances methodical efficiency with a habit of binge‑watching cooking shows late into the night.
background:
  cultural: Alfonso is a non‑Hispanic white, Anglo‑American raised in Raton, New Mexico, a community where Southwestern, Hispanic, and Native American cultures intersect. While his family heritage traces
    back to Midwestern settlers who moved west for ranching opportunities, his upbringing has been shaped by local traditions such as community potlucks, the annual Raton Roundup, and the celebration of
    New Mexican cuisine. He speaks conversational Spanish, reflecting the influence of the surrounding Hispanic community, and he has a deep appreciation for regional music, art, and outdoor lifestyle.
    This blend of cultural experiences informs his social outlook, culinary interests, and commitment to community involvement.
