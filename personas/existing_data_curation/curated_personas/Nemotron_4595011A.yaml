  hobbies: '[''Hiking'', ''Cross-country skiing'', ''Fishing'', ''Community basketball league'', ''Volunteer work at local rodeo'', ''Home cooking and recipe experimentation'', ''Hosting dinner parties'',
    ''Playing acoustic guitar'', ''Attending folk music festivals'', ''Exploring local trail systems'']'
  career_goals: Alfonso seeks to build on his hands‑on management experience by first earning a certification in hospitality management and then moving into a regional supervisory role overseeing multiple
    food‑service locations across northern New Mexico. His long‑term ambition is to open his own farm‑to‑table bistro that showcases locally sourced New Mexican ingredients while applying the efficient,
    data‑driven practices he has mastered. He also hopes to mentor younger staff, develop a reputation as a reliable operations leader, and eventually contribute to community‑focused culinary initiatives.
