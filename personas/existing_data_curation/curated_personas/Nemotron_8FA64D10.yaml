  career_goals: Though retired, Derrick’s ambitions focus on preserving his legacy and giving back. He aims to compile a family memoir that weaves together personal stories, civil‑rights era recollections,
    and genealogical findings, and to create a small digital archive of photographs for his grandchildren. He plans to continue mentoring younger relatives and community members, especially in practical
    skills like home maintenance and budgeting. Derrick also hopes to become a regular volunteer docent at the Tuscaloosa Museum of Art, sharing insights on local Black history, and to stay active by participating
    in senior fitness programs that help him remain healthy for his wife and family.
