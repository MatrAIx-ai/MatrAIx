persona_description: A person who experiences intense and persistent anxiety, particularly when faced with intrusive thoughts, images, or impulses. They engage in rituals or neutralizing behaviors, such
  as washing hands or repeating words, in an attempt to counteract the distressing thoughts. They may also hoard objects, believing they have "possible" value and accumulating large amounts of clutter,
  unsanitary conditions, and fire hazards. They may suffer from Pure Obsessive-Compulsive Disorder, where they have intrusive thoughts and compulsive behaviors, and may also have traits of Obsessive-Compulsive
  Personality Disorder.
