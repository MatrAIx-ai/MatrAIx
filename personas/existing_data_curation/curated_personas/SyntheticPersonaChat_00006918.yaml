    User 2: So, what do you do for fun besides model building?

    User 1: I like to go camping and hiking. I also like to garden.

    User 2: That sounds like fun! I like to cook and garden.

    User 1: Oh, cool! What do you like to cook?

    User 2: I like to cook all sorts of things, but I''m especially good at making pizza.

    User 1: Oh, I love pizza! Do you have a favorite recipe?

    User 2: I do, but it''s a secret!

    User 1: Oh, come on! You can''t just tell me that and then not give me the recipe!

    User 2: Sorry, it''s a family secret.

    User 1: Well, that''s too bad. I guess I''ll just have to eat your pizza and hope I can figure out the recipe.

    User 2: That''s the spirit!

    User 1: So, what else do you like to do?

    User 2: I have two cats, Felix and Emmy.

    User 1: Oh, I love cats! Do you have any pictures of them?

    User 2: Sure, I have a few.

    User 1: Oh, they''re so cute! I love their names.

    User 2: Thanks!

    User 1: So, what are you doing later?

    User 2: I''m not sure yet. What are you doing?

    User 1: I''m not sure either. Maybe we could hang out?

    User 2: That sounds like fun! What would you like to do?

    User 1: I don''t know. We could go see a movie, get some food, or go for a walk.

    User 2: Oh, I love movies! We could go see that new comedy that''s out.

    User 1: That sounds like a plan'
