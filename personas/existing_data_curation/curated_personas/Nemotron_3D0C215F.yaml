personas:
  professional: Rafael Reyes, a 39‑year‑old driver and aspiring fleet entrepreneur in the Greater New Haven area, leverages their bilingual navigation expertise, meticulous vehicle maintenance, and conflict‑de‑escalation
    skills to provide reliable, structured taxi service while methodically working toward a commercial driver’s license and a future community shuttle fleet.
  sports: Rafael Reyes, a devoted soccer fan, never misses matches featuring top clubs from their heritage region and follows the New England Revolution, while occasionally joining a local recreational
    league team for weekend pickup games and cheering for the Boston Red Sox in the baseball season.
  arts: Rafael Reyes, an avid folk‑music enthusiast, regularly plays traditional melodies on their acoustic guitar, draws inspiration from artists like Juanes, Silvio Rodríguez, and Bob Dylan, and attends
    monthly open‑mic nights at a nearby café to stay connected with the local music scene.
  travel: Rafael Reyes, a weekend explorer, prefers short, budget‑friendly road trips to nearby state parks such as Sleeping Bear Dunes and the White Mountains, while dreaming of a future family vacation
    to the Andean highlands and the coastal cities of their ancestral homeland.
  culinary: Rafael Reyes, a confident home cook, delights their family with heritage dishes like ceviche, locro de papas, and arroz con menestra, meticulously seasoning with ají amarillo, cilantro, and
    lime, and maintains a modest vegetable garden to harvest fresh tomatoes and peppers for their meals.
  core: Rafael Reyes blends practical discipline with a competitive edge, juggling a structured drive‑career path, budget‑focused finances, and a love of music and cooking while they occasionally neglect
    self‑care in the pursuit of family stability.
background:
  cultural: Rafael was born to Ecuadorian parents who immigrated to the United States, and he grew up bilingual, preserving many customs from his heritage such as family‑centered gatherings, traditional
    celebrations like Carnaval and Día de los Difuntos, and a strong Catholic faith. He maintains close ties with the Ecuadorian community in Connecticut, attending cultural festivals, sharing recipes,
    and teaching his children Spanish, while also embracing the local New England lifestyle.
attributes:
  skills: '[''Navigational knowledge of Greater New Haven'', ''Safe driving under varied conditions'', ''Vehicle maintenance and basic repairs'', ''Cash and electronic fare handling'', ''Bilingual communication
    (Spanish/English)'', ''Time management'', ''Customer service and conflict de‑escalation'']'
  hobbies: '[''Cooking Ecuadorian cuisine'', ''Playing acoustic guitar'', ''Watching soccer'', ''Gardening'', ''Car tinkering'', ''Weekend hiking'', ''Church volunteering'']'
  career_goals: He aims to secure a commercial driver's license to expand into larger vehicle operations, eventually owning a small fleet of taxis or a community shuttle service that provides reliable transportation
    for underserved neighborhoods, while also pursuing further certifications in automotive technology to increase his earning potential and ensure long‑term stability for his family.
