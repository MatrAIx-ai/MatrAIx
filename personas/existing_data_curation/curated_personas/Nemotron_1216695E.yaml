personas:
  professional: Mirtha Leytevidal is a budding young illustrator who transforms museum visits into detailed animal and landscape sketches, meticulously organizes each drawing in a color-coded notebook,
    and they often turn quiet drawing sessions into friendly contests with peers, reflecting their competitive edge and love for unconventional perspectives.
  sports: Mirtha Leytevidal spends summer afternoons swimming at the local community pool and plays on the Spring Valley Tigers Youth Soccer Club in fall, avidly follows the San Diego Padres for baseball
    and the Los Angeles Lakers for basketball, and they favor high-intensity, competitive drills over team-oriented drills, channeling their drive to outscore peers.
  arts: Mirtha Leytevidal immerses in creative expression by sketching wildlife influenced by Claude Monet’s impressionist brushwork, devouring picture books by Dr. Seuss and illustrated novels by Mary
    GrandPré, listening to family folk songs while humming along, and watching animated films from Studio Ghibli, and they often try to capture Monet’s light in their own drawings, allowing these artistic
    experiences to shape their quiet yet vivid inner world.
  travel: Mirtha Leytevidal loves planning weekend treasure‑hunt trips to nearby beaches like Pacifica Cove and the Redwood State Park, has visited the iconic San Diego Zoo and a family road trip to Grand
    Canyon, and dreams of exploring the Eiffel Tower in Paris and snorkeling at the Great Barrier Reef, but their itineraries are always shaped by school calendars and a modest family budget, leading them
    to favor short, well‑mapped adventures over long vacations, and they relish drawing maps of each destination before departure.
  culinary: Mirtha Leytevidal enjoys assembling simple meals like spaghetti with marinara sauce, crunchy carrot sticks, and strawberry yogurt, often helps stir batter for chocolate chip cookies but has
    a habit of sneaking extra chocolate chips into the dough, and they relish occasional family pizza nights where they top slices with pepperoni, mozzarella, and a sprinkle of basil.
  core: Mirtha Leytevidal is a curious, solitary sketcher who loves competitive puzzle challenges, hoards crayons in secret piles, and they occasionally forget to put away LEGO pieces, making their play
    area a delightful mess.
background:
  cultural: Mirtha lives in Spring Valley, California, but her household is rooted in Mexican heritage. Her family celebrates traditions such as Día de los Muertos and enjoys cooking meals like tacos al
    pastor and pozole, exposing her to rich culinary flavors. Bilingual conversations at home strengthen her Spanish language skills, while school and community activities immerse her in Californian culture.
    This blend of Mexican customs and Southern California life shapes her worldview, fostering an appreciation for art, storytelling, and community rituals.
