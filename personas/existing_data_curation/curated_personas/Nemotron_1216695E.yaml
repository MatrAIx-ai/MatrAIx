  career_goals: Mirtha dreams of becoming an artist who can tell stories through pictures, hoping one day to illustrate children’s books. She also imagines exploring marine life as a marine biologist, inspired
    by the nearby Pacific Ocean. In school, she aims to win art contests and earn the title of "Artist of the Month," reflecting her competitive spirit while staying organized with her school projects.
