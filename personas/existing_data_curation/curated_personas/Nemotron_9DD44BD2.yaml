  career_goals: Pranav aims to secure a remote research assistant or data science role that offers flexibility and independent work, allowing him to explore interdisciplinary projects that combine technology
    and visual art. He hopes to contribute to socially impactful initiatives, such as developing data‑driven tools for environmental sustainability or educational platforms that make learning more accessible.
    In the longer term, he aspires to lead a solo‑founded creative tech studio where he can design interactive installations and immersive experiences, balancing his love for solitary creation with occasional
    collaborative ventures.
