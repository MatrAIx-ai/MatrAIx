  career_goals: Stefanie aims to expand her solo practice into a small, community‑focused studio that offers personalized family portrait sessions and documentary projects highlighting everyday life in
    Cook County. She plans to curate a photo book that captures the cultural textures of her neighborhood, using both digital and analog techniques. Driven by a desire to merge her creative curiosity with
    practical impact, she intends to develop a therapeutic photography program in partnership with local mental‑health providers, helping clients manage anxiety through guided visual storytelling. Additionally,
    she hopes to host quarterly workshops for aspiring women photographers and eventually teach part‑time at a nearby community college, balancing financial sustainability with opportunities for artistic
    growth.
