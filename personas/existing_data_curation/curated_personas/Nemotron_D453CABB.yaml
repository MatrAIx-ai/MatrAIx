personas:
  professional: Domani Singh, a budding mini‑entrepreneur who runs a pretend corner store with toy groceries, they negotiate fiercely with their stuffed customers, test every rule with skeptical curiosity,
    and channel their competitive drive into every make‑believe sale.
  sports: Domani Singh, an energetic two‑year‑old who idolizes the Vegas Golden Knights and the Las Vegas Raiders, they practice mini‑skating moves on the living‑room carpet, join the North Las Vegas community
    soccer toddler class, and let their competitive spirit fuel every game of chase with friends.
  arts: Domani Singh, a vibrant little performer who sings along to tribal drum songs at family gatherings and mimics Sesame Street characters, they recite Dr. Seuss rhymes with gusto, and spend afternoons
    drawing desert sunsets with bright crayons, channeling both cultural rhythm and boundless imagination.
  travel: Domani Singh, an adventurous toddler who has already explored Red Rock Canyon with their family and taken a brief flight to Disneyland, they love pointing out towering red stones, and dream of
    one day strolling the Grand Canyon rim and chasing the aurora borealis over Iceland's snowy plains.
  culinary: Domani Singh, a curious yet picky eater who adores mac & cheese, sweet‑potato fries, and corn tortillas with mild salsa, they proudly stir batter for banana pancakes, relish the bright orange
    crunch of carrots, but stubbornly refuse peas, turning every mealtime into a playful negotiation.
  core: Domani Singh, a talkative two‑year‑old whose relentless curiosity meets a skeptical edge, they negotiate every play scenario, worry over minor changes, and channel a competitive spirit while honoring
    the communal rhythms learned from early tribal storytelling.
background:
  cultural: Domani’s cultural background is rooted in American Indian heritage, with his family maintaining tribal traditions while living in the urban environment of North Las Vegas. He is exposed to native
    storytelling, songs, and occasional participation in community gatherings that emphasize respect for nature and communal responsibility. His parents also incorporate elements from their broader multicultural
    ancestry, fostering an appreciation for diverse customs and languages. This blend of cultural influences nurtures his sociable nature, curiosity, and a deep respect for shared histories, while also
    providing a supportive framework that helps him navigate stress and emotional challenges.
