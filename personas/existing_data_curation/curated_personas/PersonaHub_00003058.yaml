persona_description: A biologist and anthropologist who specializes in the study of primate aging and its comparison to human aging. They have conducted extensive research on the multi-species comparison
  of primate aging patterns and have published the findings in the March 11 issue of Science. They are interested in the differences and similarities between human and primate aging patterns and how they
  relate to the overall health and longevity of primates. They are also interested in the potential implications of these findings for understanding the aging process in general.
