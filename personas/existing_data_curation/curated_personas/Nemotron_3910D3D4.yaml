  career_goals: Demetre aims to earn a scholarship to attend a specialized arts high school or a college program in graphic design and illustration. He envisions a career as a professional illustrator or
    visual designer who creates artwork for community projects, youth programs, and local businesses. Long‑term, he hopes to become a community arts coordinator, using his creative skills to mentor other
    young people and bring culturally resonant art experiences to his hometown. He also plans to grow a sustainable online presence for his artwork, turning his passion into a source of income while pursuing
    higher education in visual arts or multimedia communications.
