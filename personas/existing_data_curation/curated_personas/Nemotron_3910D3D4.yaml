personas:
  professional: Demetre Newton, an aspiring teen illustrator, channels a curiosity for unconventional ideas into sketchbook experiments and beginner digital illustrations, while their laid‑back, sometimes
    disorganized approach to schoolwork pushes them to seek flexible scholarship programs and community art projects, leveraging natural social skills to organize youth art workshops.
  sports: Demetre Newton, a regular participant in neighborhood pick‑up basketball games at Riverfront Park, proudly roots for the local NBA team—the Chicago Bulls—and is a member of the community youth
    basketball league, while also dancing to hip‑hop in after‑school open‑mic nights, balancing sprint drills with weekend skateboarding sessions.
  arts: Demetre Newton, a sketch‑book enthusiast, finds inspiration from street artist Banksy, animator Hayao Miyazaki, and rapper Kendrick Lamar’s gospel‑infused verses, spends evenings crafting TikTok
    art reels that merge digital doodles with indie‑film soundtracks, and writes short poems reminiscent of early Sylvia Plath, using these creative outlets to process daily worries.
  travel: Demetre Newton, a budget‑conscious teen, enjoys weekend road trips to nearby cities like Philadelphia and Boston for art museum visits, dreams of attending the Venice Biennale after high school,
    and frequently revisits the family‑owned lake cabin to draw sunrise landscapes, all while balancing parental travel constraints and school‑year responsibilities.
  culinary: Demetre Newton, a self‑taught kitchen explorer, whips up quick meals such as avocado toast, ramen with soft‑boiled eggs, and homemade tacos with cilantro‑lime sauce, favors ingredients like
    smoked paprika and fresh basil for cooking experiments, and treats Saturday evenings with a ritual of ordering pizza topped with pineapple while sketching the scene.
  core: Demetre Newton is a curious, socially‑savvy teen who sketches everywhere, worries over unfinished projects, and turns every basketball game, guitar jam, and TikTok video into a chance to blend art
    with community.
background:
  cultural: Demetre is a Black teenager raised in Laurel Hill, a small town in Scotland County, North Carolina. His family’s roots trace back to the Great Migration, and he grew up in a close‑knit African‑American
    community that places strong emphasis on church, storytelling, and music. Southern cultural influences such as hospitality, community gatherings, and regional cuisine intersect with African‑American
    traditions like gospel singing, jazz, and hip‑hop, shaping his artistic sensibility. As a minority in a predominantly rural area, he draws strength from his family’s emphasis on resilience, community
    support, and pride in Black heritage, which fuels his desire to celebrate his culture through art and community work.
