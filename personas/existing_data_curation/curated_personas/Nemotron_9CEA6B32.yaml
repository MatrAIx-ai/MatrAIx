    ''Problem Solving'', ''Regulatory Knowledge (building codes)'', ''Risk Assessment'']'
  hobbies: '[''Photography (architecture and landscape)'', ''Woodworking'', ''Visiting local art galleries'', ''Reading about modern architecture and design'', ''Gardening (vegetable garden)'', ''Volunteering
    with Habitat for Humanity'', ''Board game nights with friends'', ''Wine tasting (local vineyards)'', ''Hiking in the Sierra foothills'', ''Listening to classic rock and jazz'']'
  career_goals: James aims to leverage his supervisory experience into a senior construction manager role, overseeing multiple sites across the Central Valley. He plans to earn a Certified Construction
    Manager (CCM) credential and a LEED Green Associate designation to integrate sustainable, low‑impact building methods into his projects. Over the next five years, he hopes to launch his own boutique
    contracting firm that combines high‑quality construction with artistic design elements, collaborating with local artists and architects to create community‑focused spaces. Additionally, he aspires to
    serve on the San Joaquin County Building Code Advisory Board, influencing safety and environmental standards, and to develop a formal apprenticeship program that mentors the next generation of skilled
    tradespeople.
