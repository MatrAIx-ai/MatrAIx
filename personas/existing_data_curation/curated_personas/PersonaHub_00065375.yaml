persona_description: A Brazilian literature scholar who is interested in exploring the use of mythology and tradition in Brazilian epics to articulate a national identity. This person is likely to be familiar
  with the works of Brazilian writers such as Mario de Andrade and Paulo Emílio Salles Gomes, and is interested in the ways in which these writers have used their narratives to define and express Brazilian
  identity. This person may also be interested in the ways in which modernist movements, such as Brazilian modernism, have responded to European modernist movements and the postcolonial context of Brazil.
