  career_goals: She aims to turn her blend of scientific knowledge and artistic imagination into a flexible, purpose‑driven career. Over the next few years she plans to complete a UX design certificate
    and launch a freelance consultancy that helps non‑profits, museums, and local arts organizations turn data and research into compelling visual stories. A long‑term ambition is to develop a community
    STEAM series in Asheville that brings together artists, scientists, and the public through interactive installations and workshops. Ultimately, she hopes to lead a nonprofit focused on STEAM education
    for underserved youth while maintaining a work‑life rhythm that reduces stress and allows creative exploration.
