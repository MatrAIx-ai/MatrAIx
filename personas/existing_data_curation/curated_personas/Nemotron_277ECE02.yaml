personas:
  professional: Jeania Parker blends a rigorous STEM foundation with a vivid imagination, channeling data analysis, scientific writing, and UX design into freelance visual storytelling for museums and nonprofits,
    while juggling a relaxed approach to deadlines that sometimes leads to last‑minute scrambles but fuels creative breakthroughs, and they often find themselves racing against time yet thriving on the
    adrenaline of spontaneous problem‑solving.
  sports: Jeania Parker spends weekends hiking the Blue Ridge Mountains and participates in a local yoga studio’s sunrise sessions, occasionally joining the Asheville Trail Club’s group runs and cheering
    for the Asheville City SC soccer team, while occasionally neglecting strength training due to a preference for spontaneous outdoor activity, and they often trade structured workouts for the unpredictability
    of trail adventures.
  arts: Jeania Parker paints abstract canvases inspired by the misty Appalachian hills, creates digital illustrations referencing the surreal worlds of N.K. Jemisin and the minimalist style of Yayoi Kusama,
    and enjoys improv theater nights at Asheville’s Swannish Playhouse and listening to The Avett Brothers on vinyl, weaving these influences into a personal blog of short stories, and they frequently share
    their work in community art swaps.
  travel: Jeania Parker favors spur‑of‑the‑moment road trips to natural wonders, having trekked the glaciers of Iceland and the vineyards of Tuscany, while dreaming of a quiet retreat in Kyoto’s zen gardens,
    balancing limited freelance income with a love for low‑cost camping and occasional boutique stays in Asheville’s surrounding towns, and they schedule future escapades based on the alignment of seasonal
    festivals and a clear calendar.
  culinary: Jeania Parker experiments with farm‑to‑table cooking, often whipping up roasted heirloom tomatoes, quinoa‑stuffed squash, and sourdough bread flavored with rosemary and smoked paprika, while
    enjoying occasional visits to Asheville’s food trucks for shrimp and grits, yet sometimes forgets to defrost proteins, leading to a habit of improvising meals with pantry staples, and they relish the
    creative challenge of turning leftovers into gourmet plates.
  core: Jeania Parker is a creatively restless 43‑year‑old who merges science and art into community projects, worries about deadlines yet thrives in spontaneous collaboration, balances yoga‑induced calm
    with a penchant for impulsive art‑supply splurges, and they constantly chase the next inspirational spark.
background:
  cultural: Jeania identifies as a White American who grew up in a middle‑class suburban environment before moving to Asheville, North Carolina. She blends mainstream American customs—family holidays, community
    gatherings, and a respect for education—with the progressive, arts‑centric culture of the Asheville region. Influenced by the city's emphasis on sustainability, local craftsmanship, and Appalachian
    folk traditions, she participates in farm‑to‑table dining, supports local craft breweries, and enjoys folk music alongside indie and alternative sounds. Her cultural outlook is inclusive, community‑focused,
    and highly attuned to the blend of scientific rationalism and artistic expression that characterizes her personal and professional life.
