persona_description: A neuroscientist and cognitive psychologist interested in the study of Tourette's syndrome and its impact on the brain and behavior. She is particularly interested in the role of attention
  and awareness in the management of tics in patients with the condition. Her research has focused on the development of new behavioral therapies and strategies to reduce tics without requiring effortful
  tic suppression. She is passionate about raising public awareness about the common nature of tics and promoting acceptance of them.
