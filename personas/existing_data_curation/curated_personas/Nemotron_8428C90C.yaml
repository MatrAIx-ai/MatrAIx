    development"]'
  hobbies: '["Painting (abstract and folk-inspired)", "Knitting and crochet", "Gardening (roses, herbs, vegetables)", "Reading historical novels and poetry", "Listening to Mexican music (mariachi, boleros)",
    "Attending community dance and cultural festivals", "Participating in senior center craft circles", "Exploring documentary films and philosophy podcasts", "Cooking traditional Mexican dishes", "Walking
    in local parks"]'
  career_goals: Even at 94, Yahaira is driven by personal aspirations to continue contributing to her community and family. She aims to complete a memoir documenting her life and the migration stories of
    her family, intended for publication in a local heritage project. She wishes to curate a traveling exhibit of Mexican folk art and her own abstract paintings, partnering with senior centers and cultural
    museums. She aspires to establish a small scholarship fund for Mexican-American students pursuing the arts. She plans to lead intergenerational workshops on cooking, storytelling, and crafts, fostering
    cultural continuity. She also seeks to maintain her mental and physical health by learning new digital tools, participating in mindfulness groups, and advocating for senior mental‑health resources within
    her community.
