  career_goals: Charlene aims to re‑engage her scientific background in service to her community. Over the next few years she plans to complete a short certificate in environmental sustainability, launch
    a neighborhood garden that doubles as a hands‑on learning space for local schoolchildren, and volunteer as a STEM mentor at the Pulaski County library. She also hopes to offer occasional freelance consulting
    for small‑scale gardening projects for senior neighbors, and to write approachable articles that blend science with everyday life, encouraging practical curiosity among adults in her town.
