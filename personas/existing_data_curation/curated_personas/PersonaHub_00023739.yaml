persona_description: A researcher and health policy expert focused on improving diagnostics and access to HIV/AIDS and TB care and treatment in low-income countries. They are particularly interested in
  the development of new health technologies and the business case for diagnostics. They have experience in working with the Bill & Melinda Gates Foundation and are familiar with the China Diagnostics Conference.
  They are also familiar with the work of Christine Rousseau at the Bill & Melinda Gates Foundation and her advocacy for China's role in global health.
