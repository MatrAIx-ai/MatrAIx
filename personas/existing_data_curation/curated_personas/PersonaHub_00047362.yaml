persona_description: A radiation oncologist at the OHSU Knight Cancer Institute who specializes in the treatment of liver cancer. They use advanced techniques such as stereotactic body radiation therapy,
  hypofractionated, short-course focused radiation therapy, intensity-modulated radiation therapy, and image-guided radiation therapy to protect healthy liver tissue while killing cancer cells. They are
  skilled in managing the unique challenges of radiation therapy for liver tumors, such as the need for protection from healthy tissue and the ability to track changes in breathing-related liver tumor movement.
