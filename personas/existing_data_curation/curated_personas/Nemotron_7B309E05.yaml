personas:
  professional: Johnie Norris is an aspiring junior naturalist‑artist who channels their curious, methodical mind into detailed wildlife sketches, Scratch game prototyping, and short fantasy stories, while
    their reserved nature fuels focused solo projects and quiet collaboration with their dad over chess.
  sports: Johnie Norris spends weekends swimming with the Seaside Kids Swim Team, plays beach volleyball on summer holidays, kicks a ball for the Coastal Soccer Club’s Tidal Turtles youth squad, follows
    the San Diego Padres and the Golden State Warriors, and balances physical activity with chess for mental endurance.
  arts: Johnie Norris immerses themselves in wildlife illustration inspired by John James Audubon and the flowing seas of Claude Monet, devours graphic novels by Neil Gaiman and Brian K. Vaughan, and draws
    artistic inspiration from Hayao Miyazaki’s films, weaving these influences into their own fantasy short stories and detailed coastal sketches.
  travel: Johnie Norris prefers meticulously planned weekend escapes to coastal gems like Monterey Bay Aquarium and Cape Cod’s tide pools, has explored Olympic National Park’s rain‑forests with family,
    and dreams of snorkeling the Great Barrier Reef, always balancing school schedules, a modest travel budget, and a love for quiet, nature‑focused adventures.
  culinary: Johnie Norris delights in the briny warmth of New England clam chowder, relishes fish tacos garnished with cilantro and lime, and often attempts beginner sushi rolls using nori, smoked salmon,
    cucumber, and a dash of wasabi, showcasing an enthusiastic yet still developing kitchen skill set.
  core: Johnie Norris is a methodical, curiosity‑driven eleven‑year‑old who blends seaside exploration, artistic sketching, and budding game‑design into a quiet yet inventive personal world, occasionally
    succumbing to impulsive shell‑collecting splurges.
background:
  cultural: Johnie’s cultural background is rooted in a white, multi‑generation Pacific Northwest family that has lived in Tillamook for several decades. His family’s livelihood is tied to the region’s
    dairy farms and the nearby coastal fishing community, giving him an appreciation for the rhythms of a rural coastal town. Community gatherings such as the Tillamook County Fair and the annual Cheese
    Festival are part of his upbringing, fostering a sense of local pride and connection to the land and sea. The family celebrates holidays with a blend of Midwestern traditions and Northwest outdoor activities—like
    cranberry bog visits and beach outings. Although his community is largely secular, there is a subtle influence of the region’s Protestant heritage and an awareness of the local Confederated Tribes of
    the Siletz and the Chinook peoples, which is reflected in occasional school lessons about indigenous history and stewardship of natural resources.
attributes:
  skills: '[''Reading comprehension (grade‑5 level)'', ''Creative writing (short stories, poetry)'', ''Digital illustration (tablet basics)'', ''Basic coding (Scratch, introductory Python)'', ''Project
