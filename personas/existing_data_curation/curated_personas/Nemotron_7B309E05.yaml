  hobbies: '[''Wildlife drawing and sketching'', ''Tide‑pool exploration'', ''Birdwatching'', ''Seashell collecting'', ''Reading graphic novels and science‑fiction books'', ''LEGO model building'', ''Chess'',
    ''Scratch coding (simple games)'', ''Short story writing'', ''Basic photography'']'
  career_goals: Johnie hopes to become a marine biologist or environmental illustrator who can translate scientific findings into visual stories. He aims to attend a summer marine science camp, win a regional
    science fair with a project on tide‑pool ecosystems, and build a portfolio of illustrations that combine art and science. In the longer term, he envisions studying at a university with strong marine
    biology and art programs, eventually working on conservation projects along the Oregon coast.
