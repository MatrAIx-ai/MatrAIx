  hobbies: '[''Gardening'', ''Hiking'', ''Reading Historical Fiction'', ''Knitting'', ''Wood Carving'', ''Listening to Bluegrass Music'', ''Cooking'', ''Teaching Basic Carpentry'', ''Attending Local Craft
    Fairs'']'
  career_goals: Marianne’s primary ambition is to transition from contractor‑to‑client work into owning a modest, community‑focused woodworking studio in Leslie County. Within the next two years she plans
    to secure a workshop space, obtain a Kentucky general‑contractor license, and build a reliable client base for custom furniture and small‑scale home renovations. She aims to create a stable, predictable
    income stream that will support her retirement and allow her to mentor a handful of apprentices—particularly women—so that the craft remains rooted in her Appalachian community. Long‑term, she envisions
    a small, family‑run construction firm that emphasizes quality, safety, and sustainable practices.
