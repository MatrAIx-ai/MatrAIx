  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Fishing on Lake Koshkonong'', ''Classic car restoration'', ''Rotary Club involvement'', ''Attending Packers games'', ''Community theater
    volunteering'', ''Storytelling and podcasting'']'
  career_goals: Looking ahead, Austin aims to transition from full‑time driving to a regional logistics coordinator role, where he can apply his routing expertise and customer insights to improve supply‑chain
    efficiency for a Midwestern distributor. He envisions mentoring the next generation of drivers through a formal apprenticeship program, while also dedicating time to support the local arts community—perhaps
    as a volunteer curator or organizer of pop‑up exhibitions at the downtown farmers market. In the longer term, Austin hopes to launch a part‑time consulting service that offers safety‑training workshops
    for small trucking firms and to host a weekly podcast sharing stories from the road and discussions on art and culture.
