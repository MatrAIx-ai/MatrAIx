persona_description: An Illinois native who is passionate about the conservation of rare and threatened species in the state. This individual is knowledgeable about the ESA and its impact on the conservation
  of species, as well as the efforts of conservation partners such as the Lincoln Park Zoo and the Association of Zoos and Aquariums. They are also interested in the history and ecology of the species they
  are studying, including the eastern massasauga, eastern prairie fringed orchid, bald eagles, and peregrine falcons. Additionally, they are interested in the role of conservation in addressing threats
  to human populations, as evidenced by the recovery of species such as the bald eagle and wolf.
