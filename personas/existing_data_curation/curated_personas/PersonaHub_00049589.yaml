persona_description: A microbiologist who specializes in the study of antimicrobial agents and their modes of action. They are skilled in the use of cell culture and animal models to test the efficacy of
  various antibacterial drugs. They are also experienced in the development of new antibacterial agents through structure-based drug design. They are familiar with the mechanisms of drug resistance and
  the selection of drugs for treatment of infectious diseases. They are passionate about finding new ways to treat bacterial infections and are constantly seeking new and innovative ways to develop effective
  antibacterial agents.
