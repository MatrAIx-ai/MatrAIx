  hobbies: '[''gardening'', ''reading historical fiction'', ''quilting'', ''bird watching'', ''fishing'', ''crossword puzzles'', ''light hiking'', ''volunteering at food pantry'']'
  career_goals: Lana aims to formalize her extensive on‑the‑job knowledge by obtaining a Certified Forklift Operator credential and a Certified Logistics Associate certification within the next two years.
    She envisions moving into a lead‑worker or training role where she can mentor younger staff and oversee safety‑training programs. As she approaches retirement, she plans to transition to a part‑time
    schedule that maintains a steady income while giving her time for community volunteering and personal interests. Ultimately, her ambition is to leave a legacy of safety awareness and practical skill‑sharing
    within her local warehouse community.
