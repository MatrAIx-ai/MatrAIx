persona_description: Sarah Taylor, a South African scientist who specializes in the study of plant biotechnology and plant virus resistance. She is a researcher in the cassava biotechnology program at the
  University of the Witwatersrand's School of Molecular and Cell Biology in Johannesburg. Her research focuses on developing resistance to the South African cassava mosaic virus, a local cassava virus that
  affects different cassava-growing areas of the world. Her work exploits a feature of the virus's genetic material - RNA - and alters the genes of plants in a way that disables the virus once it attacks,
  rendering the plants resistant. Her research is significant as it has the potential to safeguard one of the region's staple crops and is applicable across the southern African region.
