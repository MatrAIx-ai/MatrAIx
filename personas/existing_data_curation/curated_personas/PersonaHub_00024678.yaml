persona_description: Elfrieda Hiebert, a well-respected and experienced expert in early reading acquisition, particularly focusing on the importance of summer reading for students from low-income families.
  Her nonprofit organization, TextProject, aims to provide free, accessible, and engaging texts for at-risk readers, particularly those who may not have ready access to books in their homes. Hiebert has
  established a goal of reaching and helping the persistent third-grade students, those who fail to reach the Basic level in the National Assessment of Educational Progress (NAEP) tests. Her passion for
  reading and her commitment to giving back to the students most in need is evident in her dedication to providing accessible texts to all.
