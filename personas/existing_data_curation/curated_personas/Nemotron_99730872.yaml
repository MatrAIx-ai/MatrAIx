  career_goals: Approaching retirement, Gustavo aims to transition from full-time accounting to a consultancy role, offering financial advisory services to local small businesses and nonprofits in the Sabinal
    and Uvalde County area. He intends to obtain his Certified Public Accountant (CPA) credential to bolster his credibility and to mentor younger accountants through a community college adjunct position.
    Additionally, he hopes to author a practical guide on bookkeeping for Mexican-American entrepreneurs, combining his expertise and his passion for cultural empowerment.
