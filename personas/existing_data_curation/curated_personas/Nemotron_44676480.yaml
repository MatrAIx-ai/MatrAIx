  hobbies: '[''Community gardening'', ''Volunteer work at food pantry'', ''County fair attendance'', ''Hiking in Indiana Dunes'', ''Watercolor painting'', ''Reading historical fiction'', ''Baking for friends'',
    ''Folk dancing'', ''Yoga and mindfulness meditation'']'
  career_goals: Minda aims to move into a senior supervisory role within her current company, overseeing multiple crews and larger municipal projects. She also plans to earn certification in sustainable
    landscaping and eventually launch her own small business focused on native‑plant gardens and community green spaces. Her long‑term ambition includes mentoring younger workers, implementing eco‑friendly
    practices, and achieving a stable, predictable income that supports her mental‑health needs while allowing time for family and community involvement.
