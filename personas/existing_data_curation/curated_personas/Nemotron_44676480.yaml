personas:
  professional: Minda Norwood, a 44‑year‑old landscape professional, channels her expertise in plant identification, irrigation system design, and crew coordination into structured project plans, but they
    also value on‑the‑fly flexibility to accommodate her sociable, collaborative crew, while her emotionally reactive side pushes her to nurture both green spaces and team morale.
  sports: Minda Norwood, an enthusiastic member of the Lake Michigan Trail Hiking Club, regularly tackles the dunes of Indiana Dunes State Park and joins informal pick‑up soccer games with friends, while
    cheering on the South Bend (Notre Dame) Fighting Irish and the Indiana Pacers, though they sometimes skip scheduled gym visits when their flexible mindset takes over.
  arts: Minda Norwood, an amateur watercolorist inspired by Claude Monet and Andrew Wyeth, enjoys attending folk‑dance evenings set to The Chieftains and Joan Baez, cherishes historical fiction by Philippa
    Gregory, and makes time to visit the Indianapolis Museum of Art, allowing her creative spirit to offset her emotional volatility.
  travel: Minda Norwood favors spontaneous weekend road trips to nearby natural gems like Brown County and the Michigan Upper Peninsula, dreams of exploring Scotland's Highlands for native plant studies,
    balances modest travel budgets with occasional longer excursions to national parks such as Yellowstone, all while coordinating trips around her community commitments.
  culinary: Minda Norwood, a confident baker, delights friends with blueberry muffins, apple crumble, and rustic sourdough loaf flavored with rosemary, enjoys cooking fresh salads featuring native lamb’s
    quarters and wild rice soup, and frequently indulges at county fairs on funnel cake and corn dogs, a blend of comfort and culinary curiosity.
  core: Minda Norwood is a 44‑year‑old landscape enthusiast who balances a love for structured eco‑projects with spontaneous community gatherings, battles anxiety through mindfulness, and occasionally lets
    her disorganized side dictate bedtime snacks of freshly baked treats.
background:
  cultural: Minda was raised in a small Midwestern town in Indiana, descending from German and Irish ancestry. Her upbringing emphasized Midwestern values of hard work, community service, and modesty, with
    regular participation in church potlucks, high‑school football games, and county fairs. Her humanities degree deepened her appreciation for American history and literature, which she often shares in
    local book clubs. This blend of cultural tradition and academic curiosity informs her collaborative spirit and her desire to preserve and enhance the local environment.
attributes:
  skills: '[''Landscape design'', ''Plant identification'', ''Soil health assessment'', ''Irrigation system maintenance'', ''Hard‑scape installation'', ''Equipment operation and safety'', ''Team coordination'',
