persona_description: A neuroscientist who specializes in spinal cord injuries, particularly the regenerative potential of chondroitin sulfate proteoglycans and the use of chondroitinase ABC to promote nerve
  regeneration. The researcher has experience with the use of peripheral nerve grafts and has published research on the use of Chondroitinase ABC for spinal cord injuries. The researcher is hopeful that
  their technique will be used in clinical trials for restoring breathing function in people with upper spinal cord injuries.
