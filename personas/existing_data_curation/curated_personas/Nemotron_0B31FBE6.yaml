personas:
  professional: Gary Sherwood, a NATE‑certified Master HVAC mechanic with 25 years of hands‑on experience, finds that they blend meticulous diagnostic troubleshooting with an outgoing, clubhouse‑organizer
    vibe to lead crews, mentor apprentices, and translate complex system issues into clear, friendly service reports for customers.
  sports: Gary Sherwood, a third‑base star for the Centralia Jacks recreational softball league, finds that they stay active by cheering on the St. Louis Cardinals and the Chicago Bears, enjoy bass fishing
    at Rend Lake, join occasional deer‑hunting outings with friends, and maintain fitness through community games rather than regimented gym workouts.
  arts: Gary Sherwood, an avid hands‑on hobbyist, channels creativity into custom wooden furniture while they unwind to live performances by Luke Bryan and Miranda Lambert at the Centralia Arena, and they
    also relish classic country‑rock albums from Johnny Cash and The Eagles, which shape their relaxed, southern‑flavored aesthetic.
  travel: Gary Sherwood prefers low‑key road trips, taking their Camaro on weekend drives to the Ozark National Forest and annual fishing trips to Rend Lake, and they dream of a summer road‑trip across
    the Canadian Rockies to photograph sunrise over Banff’s Lake Louise, balancing budget constraints with a love for nature and spontaneous adventure.
  culinary: Gary Sherwood, a backyard grill master, finds that they perfect smoked brisket using hickory wood chips, brown sugar rub, and Worcestershire sauce, pair it with homemade baked beans, cornbread,
    and a pitcher of sweet tea, though they often sacrifice cooking time for woodworking projects.
  core: Gary Sherwood blends a toolbox‑full of HVAC expertise, a restless curiosity for smart‑home gadgets, a love for community barbecues, and a habit of over‑promising on project timelines while they
    sneak extra fishing trips whenever the weather permits.
background:
  cultural: Gary grew up in a working‑class, white family of German and Irish descent in the small towns of central Illinois. The region’s Midwestern culture—characterized by modesty, self‑reliance, and
    a strong sense of community—has shaped his worldview. He was raised with the values of hard work and neighborly support, frequently attending his local Protestant church and participating in town events
    such as the county fair and high‑school football games. This cultural backdrop fosters his practical mindset, his commitment to helping others, and his enjoyment of group activities that strengthen
    community bonds.
attributes:
  skills: '["HVAC system installation and maintenance", "Refrigerant handling (EPA 608 Universal certification)", "NATE Master Technician certification", "Diagnostic troubleshooting with multimeters and
    refrigerant gauges", "Energy-efficient retrofitting and load calculations", "Smart thermostat and IoT integration", "Duct design and sealing", "Indoor air quality solutions", "Illinois building code
    and safety compliance", "Customer communication and education", "Team leadership and apprenticeship mentorship", "Service management software (e.g., ServiceTitan, FieldEdge) operation"]'
  hobbies: '["Recreational softball league", "Fishing trips to Rend Lake", "Hunting outings", "Woodworking and furniture making", "Classic car restoration (1970s Chevrolet Camaro)", "Smart-home gadget tinkering",
    "Volunteer heating assistance program for seniors", "Hosting neighborhood barbecues", "Attending country‑music concerts", "Participating in Clinton County fair’s Tools of the Trade exhibit"]'
  career_goals: Gary aims to transition from senior technician to licensed HVAC contractor and eventually launch his own small, family‑owned service company that specializes in energy‑efficient retrofits
    and renewable‑energy integrations such as solar‑assisted heat pumps. Over the next five years, he plans to earn the Certified Energy Auditor credential and complete advanced NATE modules in commercial
    HVAC design. He also wants to formalize his mentorship role by becoming an instructor at the local technical college, helping the next generation of tradespeople. Additionally, Gary hopes to expand
    the community heating assistance program he volunteers with, providing free seasonal system checks for low‑income seniors in Centralia. These goals reflect his blend of practical ambition, curiosity
    about new technologies, and strong desire to serve his community.
