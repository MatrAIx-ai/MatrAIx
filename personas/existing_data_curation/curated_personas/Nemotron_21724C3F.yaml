  hobbies: '[''Art Gallery Visits'', ''Painting (acrylic)'', ''Cooking Southern Cuisine'', ''Beach Walks and Photography'', ''Community Volunteering (after-school tutoring)'', ''Reading Contemporary African-American
    Fiction'', ''Live Blues/Jazz Music'', ''Yoga and Meditation'', ''Quilting Circle'', ''Softball League'']'
  career_goals: Markeisha aims to obtain her Certified Public Accountant (CPA) credential within the next three years while completing an associate degree in accounting. She aspires to move into a senior
    accountant or finance manager role at a midsized firm, where she can mentor junior staff and champion equitable payroll practices. Long‑term, she hopes to launch a part‑time consulting practice that
    provides affordable bookkeeping and financial planning services to local small businesses and nonprofit arts organizations, aligning her professional expertise with her desire to help others and support
    her community’s cultural vibrancy.
