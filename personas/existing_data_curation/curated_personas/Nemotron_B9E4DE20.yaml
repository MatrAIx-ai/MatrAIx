  career_goals: Torrance aims to transition from frontline delivery to a leadership role within logistics, pursuing a CDL Class A endorsement and a bachelor’s degree in supply chain management. Over the
    next five years, he plans to become a fleet supervisor, overseeing driver performance, route efficiency, and safety compliance. In the longer term, he aspires to launch his own eco‑friendly urban delivery
    service that leverages electric trucks and data‑driven routing, positioning himself as an entrepreneur who blends his operational expertise with his sales background to capture niche market opportunities
    in Chicago’s growing demand for sustainable last‑mile delivery.
