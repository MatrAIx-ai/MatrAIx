personas:
  professional: Adriana Holmes, a seasoned electrical contractor with over 40 years of experience, blends meticulous load‑calculation expertise and solar‑PV installation skill with a flair for artistic
    lighting design, using her curious, organized‑yet‑flexible mindset and outgoing mentorship style to lead multidisciplinary teams on community‑focused renewable projects.
  sports: Adriana Holmes, an avid kayaker who joins the St. Petersburg Kayak Club for weekly sunrise paddles, also cheers for the Tampa Bay Buccaneers in fall, supports the Tampa Bay Lightning during hockey
    season, and participates in a leisurely senior softball league at the local community center.
  arts: Adriana Holmes channels her love for watercolor into seasonal exhibits at the St. Petersburg Museum of Fine Arts, often drawing inspiration from the vibrant canvases of Henri Matisse and the lyrical
    folk songs of Jimmy Buffett, while also performing in community theater workshops that rehearse classics like Arthur Miller’s "The Crucible".
  travel: Adriana Holmes prefers modest, culturally immersive trips, planning her itineraries around historic neighborhoods in Charleston and the colorful streets of Cartagena, Colombia, while frequently
    taking weekend drives to nearby Key West for sunset photography, balancing her love of adventure with a budget that reserves funds for her growing solar‑business venture.
  culinary: Adriana Holmes enjoys preparing fresh grouper ceviche with lime and cilantro, mastering a spiced sweet‑potato gnocchi that incorporates locally sourced basil, and she often pairs her meals with
    a chilled glass of rosé while savoring the occasional indulgence of a rich chocolate mousse topped with sea salt.
  core: Adriana Holmes blends a lifelong electrician’s precision with a watercolorist’s imagination, mentoring women in the trade while never missing a sunset kayak, yet she’s notorious for leaving tools
    in the garden shed when a new paint project catches her eye.
background:
  cultural: Adriana was raised in a middle‑class family of European‑American roots in the Tampa Bay area. Her upbringing combined the practicality of a working‑class ethic with an appreciation for the rich
    cultural mosaic of Southwest Florida, where Caribbean, Latin, and Southern influences coexist. She values the community spirit of Saint Petersburg, regularly engaging in local events and supporting
    neighborhood initiatives. While identifying as white American, she embraces the area's diversity and draws inspiration from the region’s artistic vibrancy and outdoor lifestyle.
attributes:
  skills: '[''Residential electrical wiring'', ''Commercial electrical systems'', ''Solar photovoltaic installation'', ''Smart home automation'', ''Electrical code compliance (NEC)'', ''Load calculation
