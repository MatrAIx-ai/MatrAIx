    and service'']'
  hobbies: '[''Watercolor painting'', ''Visiting art museums'', ''Coastal photography'', ''Kayaking with friends'', ''Community theater workshops'', ''Historical fiction book club'', ''Volunteering for
    STEM outreach'', ''Gardening native plants'', ''Attending music festivals'', ''DIY home improvement projects'']'
  career_goals: Adriana aims to achieve Master Electrician licensure within the next two years and expand her own contracting business with a focus on renewable‑energy projects for local homes. She intends
    to formalize a mentorship program specifically for women entering the trade and to partner with community colleges to teach evening courses on electrical safety and sustainable wiring practices. Over
    the next five years, she hopes to lead a regional initiative to retrofit historic neighborhoods in St. Petersburg with energy‑efficient lighting while preserving their architectural character, thereby
    blending her technical expertise with her appreciation for art and community heritage.
