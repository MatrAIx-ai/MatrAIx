  career_goals: Adrian dreams of becoming a space explorer or a cartoonist who makes his own comic books. He is excited about the idea of designing video games that let players build their own worlds, a
    blend of his love for art and technology. He hopes to compete in school science fairs and art contests, aiming to win awards that recognize his innovative ideas. Long-term, he imagines inventing gadgets
    that combine storytelling with interactive tech, and he wants to learn more about astronomy so he can someday join a mission to explore the stars.
