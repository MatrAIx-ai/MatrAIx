personas:
  professional: Adrian Diaz is a 7‑year‑old imaginative builder who turns curiosity into vivid sketches of bold characters and constructs elaborate LEGO cities, treating each brick as a narrative element
    while drawing inspiration from festive paper cut‑outs and skeletal motifs.
  sports: Adrian Diaz is a 7‑year‑old soccer enthusiast who dribbles an orange ball across the backyard, joins his neighborhood’s junior soccer club “Riverdale Rovers” on weekends, idolizes a famous forward
    from the local professional team, and competes with a competitive streak that sometimes overshadows teamwork.
  arts: Adrian Diaz, a 7‑year‑old, channels a love for bold color palettes into detailed drawings influenced by vibrant paper lantern art and ornate skull motifs, listens to a mix of traditional folk brass
    ensembles and contemporary pop hits by artists like BTS and Stevie Wonder, and spends evenings sketching comic strip ideas that blend mythic symbols with modern humor.
  travel: Adrian Diaz, a 7‑year‑old adventurer, enjoys family road trips to nearby national parks where he collects rocks and insects, dreams of exploring the towering ruins of Machu Picchu and the bright
    lantern festivals of a distant city, yet his travel plans remain shaped by school schedules and parental budget constraints.
  culinary: Adrian Diaz, a 7‑year‑old with a palate for bold flavors, loves homemade tacos filled with spiced chicken, fresh salsa, and crunchy vegetables, enjoys dipping corn on the cob in melted cheese
    sauce, and experiments by crafting colorful fruit skewers that mirror the vivid palettes of his artwork.
  core: Adrian Diaz is a curious, artistic 7‑year‑old who blends bold drawing, LEGO storytelling, and competitive gaming with occasional disorganization and a strong drive to explore both imagination and
    the world around him.
background:
  cultural: Adrian is raised in a Mexican‑American household in Abilene, Texas. At home he speaks Spanish with his parents and grandparents, celebrating cultural traditions such as Día de los Muertos, Cinco
    de Mayo, and family gatherings that feature homemade tamales and pan dulce. His family blends Mexican heritage with Texan influences, attending local community festivals, watching regional high‑school
    football games, and enjoying both mariachi music and country tunes. This bicultural environment nurtures his appreciation for colorful folk art, rhythmic music, and community storytelling, while also
    exposing him to the broader American school culture and extracurricular activities. The combination of Mexican familial values and the independent spirit of Texas shapes his identity, fostering both
    a strong sense of cultural pride and a curiosity about the wider world.
