personas:
  professional: Teresa Carlisle, a teenage content creator and budding stage performer, fuses her debate‑honed rhetorical skills with a love of visual art to produce witty TikTok videos that deliver mental‑health
    tips while also starring in her school’s theater productions.
  sports: Teresa Carlisle channels her energy through weekend hikes in the Wasatch foothills, proudly supports the Utah Jazz and follows the BYU Cougars football team, and has joined the high school cross‑country
    club to stay fit.
  arts: Teresa Carlisle immerses herself in the local art scene, sketching downtown murals while listening to indie acts like Phoebe Bridgers and Tame Impala, and occasionally strums acoustic covers of
    Bon Iver for her TikTok followers.
  travel: Teresa Carlisle prefers spontaneous day‑trips to nearby national parks such as Zion and Bryce, but dreams of wandering the streets of Paris to visit the Louvre and exploring Kyoto’s cherry‑blossom
    festivals, always balancing budget constraints with a thirst for cultural immersion.
  culinary: Teresa Carlisle enjoys crafting quick, wholesome meals like avocado‑toast topped with poached eggs and a side of fresh berries, while experimenting with homemade ramen bowls seasoned with miso
    paste and chili oil during weekend cooking sessions.
  core: Teresa Carlisle is a chatty, art‑obsessed teen who channels emotional turbulence into creative TikTok content, lively theater roles, and fervent mountain hikes, all while juggling school, anxiety,
    and a love for indie music.
background:
  cultural: Teresa comes from a White, European‑American family rooted in Clearfield, Utah. Her upbringing reflects the close‑knit, community‑oriented culture of the Intermountain West, where family ties,
    church involvement (predominantly LDS), and local traditions shape daily life. While she values the modest, service‑oriented ethos of her community, she also embraces a growing curiosity for contemporary
    arts, diverse ideas, and unconventional thinking, nurtured by school programs, online platforms, and regional cultural events.
attributes:
  skills: '[''Public speaking'', ''Interpersonal communication'', ''Creative writing'', ''Basic sketching and drawing'', ''Digital content creation (TikTok, Instagram)'', ''Organizational planning for school
