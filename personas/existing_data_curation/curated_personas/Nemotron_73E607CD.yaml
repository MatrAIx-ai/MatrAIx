  hobbies: '[''Visiting art museums and galleries'', ''Sketching and drawing'', ''Creative writing (poetry, short stories)'', ''Digital video creation for TikTok'', ''Listening to indie/alternative music'',
    ''Hiking and nature walks'', ''School theater and debate club'', ''Volunteering at community mentorship programs'', ''Reading books on psychology and self‑help'', ''Playing acoustic guitar'']'
  career_goals: Teresa aims to blend her love of art, storytelling, and advocacy for mental well‑being into a career in media communication or visual journalism. She envisions studying communication, visual
    arts, or film production in college, eventually working as a documentary filmmaker, journalist, or digital content creator who highlights youth mental health issues and celebrates creative expression.
    She also dreams of launching a podcast or online platform that offers a supportive space for teens to share their stories, while continuing to develop her artistic skills and public speaking confidence.
