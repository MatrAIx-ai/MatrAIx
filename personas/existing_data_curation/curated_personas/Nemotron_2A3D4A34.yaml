personas:
  professional: Stephen Cartwright, a budding junior explorer who pretends to catalog insects in the backyard, demonstrates early curiosity and a knack for inventive storytelling, and they often turn every
    play session into a miniature field study, reflecting a relaxed approach to rules and a deep emotional response when a discovery goes awry.
  sports: Stephen Cartwright, a lively five-year-old who joins the Little Lions soccer club each Saturday, idolizes the Chicago Cubs and often pretends to pitch like a baseball star, and they sometimes
    forget their water bottle due to their relaxed attitude toward obligations.
  arts: Stephen Cartwright, an enthusiastic five-year-old who spends afternoons drawing vibrant worlds inspired by Van Gogh's bold brushstrokes and humming Disney's Let It Go, often sharing his creations
    with friends, and they eagerly seek fresh artistic ideas despite occasional bouts of anxiety when a drawing doesn't turn out as imagined.
  travel: Stephen Cartwright, a curious five-year-old who delights in spontaneous family road trips to the beach and dreams of visiting Disneyland in California, and they embrace new sights with wonder
    while relying on parents to handle logistics, preferring flexibility over strict itineraries.
  culinary: Stephen Cartwright, a budding little chef who loves stirring pancake batter with a wooden spoon, adores mac and cheese and peanut butter-jam sandwiches, and they often leave a trail of flour
    on the kitchen floor, showcasing both enthusiasm for cooking and a tendency toward messy play.
  core: Stephen Cartwright, a five-year-old whose boundless curiosity and gentle kindness are frequently shadowed by intense anxiety and a habit of leaving a colorful mess wherever they explore.
background:
