  career_goals: Even at 80, Johnny aims to stay actively useful to his community. He plans to continue sharing his practical skills through workshops at the local senior center, help document the region’s
    agricultural history for the St. Lawrence County Historical Society, and compile a memoir of his life and family heritage for his grandchildren. Maintaining his health, independence, and the upkeep
    of his property remain top priorities, as does preserving a sense of continuity within the neighborhood.
