  career_goals: Although retired from the formal workforce, Amy is intent on deepening her impact within the Phoenix community. She aims to launch a peer‑support circle for seniors that blends gentle mindfulness
    practices with practical assistance, and to mentor younger volunteers in effective event planning and compassionate caregiving. Amy also aspires to compile a guidebook on desert‑friendly gardening tailored
    for older adults, integrating her horticultural knowledge with her love of storytelling. Additionally, she wishes to refine her digital photography skills to create a visual archive of local cultural
    events, preserving memories for future generations and fostering intergenerational connection.
