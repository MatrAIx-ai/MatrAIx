personas:
  professional: Amy Hollis leverages her associate’s degree in Business Administration and decades of volunteer coordination to design senior peer‑support circles that blend mindful tai‑chi sessions, meticulous
    budgeting, and compassionate caregiving, balancing curiosity about new program ideas with a practical, organized approach.
  sports: Amy Hollis enjoys tai chi at sunrise, participates in the Desert Trails Senior Hikers club for weekend hikes in the Phoenix foothills, and follows the Phoenix Suns, Arizona Cardinals, and Arizona
    Diamondbacks, cheering them from her patio while keeping a modest step count goal of 7,000 daily.
  arts: Amy Hollis captures the stark beauty of desert sunsets with a Nikon D5600, draws inspiration from Ansel Adams and Georgia O'Keeffe, quilts heirloom blankets while listening to Joni Mitchell, and
    discusses Ken Follett’s historical novels at her women’s book club.
  travel: Amy Hollis prefers carefully planned road trips that balance gentle adventure with comfort, having explored Sedona’s red rocks, the Grand Canyon, and a weekend getaway to Santa Fe, while dreaming
    of a leisurely cruise along the Pacific Northwest coast when her volunteer schedule eases.
  culinary: Amy Hollis cooks nutritious meals such as quinoa‑roasted squash salad, prickly pear salsa, and cactus‑bud tacos using fresh garden harvests, enjoys experimenting with herbs like cilantro and
    sage, and treats herself to a Sunday brunch at a local farm‑to‑table bistro.
  core: Amy Hollis is a garden‑loving, camera‑wielding senior who balances meticulous budgeting with compassionate volunteering, yet often battles bouts of anxiety that surprise even her most stoic friends.
background:
  cultural: Amy is a white American whose family roots trace back to the Midwestern United States, reflecting post‑World War II values of community, self‑reliance, and volunteer service. Raised during the
    cultural shifts of the 1960s, she blends a pragmatic curiosity with a strong sense of stewardship. After relocating to Phoenix, she has embraced the Southwestern environment, integrating native desert
    gardening practices and appreciating the region’s diverse cultural heritage, including Native American and Hispanic influences. Her life is anchored in a faith‑based community, where church activities
    and charitable outreach shape her daily routine. This background informs her compassionate, cooperative nature and her commitment to fostering harmony among neighbors while navigating the emotional
    sensitivities that accompany her empathetic disposition.
