personas:
  professional: A budding community‑health volunteer coordinator, Sarah Sarner blends meticulous spreadsheet‑based budgeting, methodical event planning, and compassionate caregiving to organize health‑fair
    schedules and resource logs at her local shelter, all while studying for a GED and eyeing a future in medical assisting.
  sports: A dedicated member of a local youth soccer league, Sarah Sarner also runs along the Milwaukee Riverwalk three times a week, supports the Milwaukee Bucks with avid game‑day watch parties, and follows
    the Green Bay Packers, balancing structured workouts with relaxed walk‑and‑talk sessions.
  arts: Sarah Sarner finds creative release in sketching portraits of favorite characters from contemporary YA novels and strumming acoustic covers of Ed Sheeran and Taylor Swift, while also binge‑watching
    indie films by Greta Gerwig and attending occasional community theatre productions of "Our Town".
  travel: Sarah Sarner prefers carefully planned road trips, having spent summer weekends exploring Door County’s lighthouses, a family visit to Chicago’s museums, and dreaming of a future backpacking adventure
    through the Pacific Northwest’s national parks, all while keeping a travel budget in a Google Sheet.
  culinary: A self‑taught baker, Sarah Sarner enjoys kneading sourdough starter, perfecting cinnamon rolls, and whipping up flaky croissants for shelter volunteers, and often experiments with local honey
    and fresh berries in desserts, though they occasionally over‑salt a loaf when distracted by music.
  core: Sarah Sarner is a methodical teen who juggles baking, guitar, and community health ambitions, balancing meticulous budgeting with a compassionate heart and a penchant for over‑cooking pastries.
background:
  cultural: Sarah grew up in a middle‑class family in Milwaukee, shaped by Midwestern values of practicality, community involvement, and modesty. Her family’s heritage includes German and Polish roots,
    reflected in occasional holiday traditions such as baking pretzels for Oktoberfest celebrations and attending local Polish festivals. The city’s vibrant cultural scene—from Summerfest to historic neighborhoods
    along the lake—has fostered her appreciation for diversity while reinforcing a strong sense of civic responsibility. Her upbringing in a predominantly Catholic neighborhood also emphasized service,
    which aligns with her compassionate nature.
attributes:
  skills: '[''Event planning and coordination'', ''Time management'', ''Basic computer proficiency (Microsoft Office, Google Suite)'', ''Budget tracking'', ''Peer tutoring'', ''Babysitting and youth mentorship'']'
  hobbies: '[''Reading YA novels'', ''Baking and experimenting with recipes'', ''Playing acoustic guitar'', ''Sketching and journaling'', ''Volunteering at the local food pantry'', ''Walking along the Milwaukee
    Riverwalk'']'
  career_goals: Sarah aims to complete her GED within the next year and enroll in a community college program focused on healthcare support, such as medical assisting. She aspires to work in a community
    health clinic where she can blend her organizational strengths with her desire to help others, eventually pursuing a nursing degree. In the longer term, she hopes to become a patient advocate, ensuring
    equitable access to care for underserved families in Milwaukee.
