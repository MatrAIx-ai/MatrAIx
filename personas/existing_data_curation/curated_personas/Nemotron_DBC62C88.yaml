  career_goals: Guided by his curiosity and love for art, Kyle aspires to pursue a career that blends creativity with technology. He imagines becoming a concept artist or game designer who can bring imaginative
    worlds to life, possibly exploring interactive storytelling. He also thinks about working in environmental education, using art to raise awareness about nature. Ultimately, he wants a role where he
    can keep learning, experiment with new ideas, and contribute positively to his community.
