personas:
  professional: Kyle Pratt is an aspiring junior visual storyteller and budding coder who blends watercolor and digital illustration with Scratch programming, channeling a curious, organized, and harmony‑seeking
    personality into art club projects and self‑made comic strips.
  sports: Kyle Pratt is a member of the Maine Kids Soccer Club (U12) and an avid weekend hiker along the Androscoggin River, cheering for the Portland Sea Dogs while preferring low‑key outdoor activity
    over competitive sports.
  arts: Kyle Pratt draws inspiration from Hayao Miyazaki’s films, Neil Gaiman’s fantasy novels, and Alex Ross’s comic art, regularly creating fan sketches, attending local museum workshops, and curating
    a digital gallery of their own sci‑fi and fantasy illustrations.
  travel: Kyle Pratt has explored Acadia National Park, visited the Portland Head Light, spent a family weekend in Boston’s Museum of Science, and dreams of traveling to Kyoto to attend a Ghibli museum
    exhibition, favoring road‑trip adventures with nature stops.
  culinary: Kyle Pratt loves whipping up blueberry pancakes with maple syrup, making mac and cheese, experimenting with simple sushi rolls, and eagerly snacking on fresh Maine blueberries while sometimes
    skipping the cleanup after cooking.
  core: Kyle Pratt is a curious, creative 11‑year‑old who balances art, coding, and outdoor adventures, saves diligently yet splurges on gadgets, occasionally forgets to floss, and finds inspiration in
    sci‑fi and fantasy worlds.
background:
  cultural: Kyle was raised in Lewiston, Maine, a small city in Androscoggin County with a strong New England character. His family’s white heritage, likely of Irish or French‑Canadian ancestry, reflects
    the region’s historic immigrant roots. The community emphasizes modesty, hard work, and participation in local events such as town fairs, library summer reading programs, and seasonal outdoor activities
    like snowshoeing and leaf‑peeping. The local public schools and the Lewiston Public Library have fostered his interest in art and technology. Regional traditions—seasonal seafood dishes, Thanksgiving
    gatherings, and a close‑knit neighborhood atmosphere—shape his cultural perspective, encouraging a balance of individual curiosity and communal harmony.
