personas:
  professional: Gina Ojeda, a 28‑year‑old attorney specializing in art and intellectual‑property law, merges razor‑sharp legal research, persuasive advocacy, and empathetic mediation to protect creators
    while thriving on spontaneous, curiosity‑driven case strategies that often test their organization skills.
  sports: Gina Ojeda, a devoted supporter of the Nashville Predators and the Tennessee Titans, stays active by trail‑hiking with the Nashville Hiking Club on weekends and practicing Vinyasa flow at Zen
    Flow Studio, balancing a love for spontaneous outdoor adventures with a disciplined, albeit occasionally missed, weekly yoga routine.
  arts: Gina Ojeda, who spends her free hours sketching watercolors of cityscapes and curating playlists that range from The Avett Brothers’ bluegrass‑infused folk to Brittany Howard’s soulful rock, regularly
    visits exhibitions of Georgia O'Keeffe and local street‑art tours spotlighting Banksy, and she channels that inspiration into volunteer legal work for an arts nonprofit.
  travel: Gina Ojeda, who prefers flexible, last‑minute itineraries over rigid travel plans, frequently escapes to the Cumberland Plateau for weekend hikes, has road‑tripped through Asheville’s Blue Ridge
    mountains and savored the historic charm of New Orleans, and now dreams of an artistic immersion in Barcelona’s Gothic Quarter while balancing a modest travel budget with occasional splurges on boutique
    hotels.
  culinary: Gina Ojeda, an experimental home chef who mixes Southern comfort with bold twists, often whips up shrimp and grits flavored with smoked paprika and fresh lemon zest, perfects pimento cheese
    jalapeño cornbread, and experiments with peach bourbon BBQ ribs, while seeking out farmer's market heirloom tomatoes and locally sourced honey for her culinary creations.
  core: Gina Ojeda, a curiosity‑driven attorney who can’t resist a new art exhibit or a fresh canvas but frequently misplaces draft briefs in coffee cups, lives by spontaneous inspiration, and balances
    relentless ambition with a habit of over‑booking social calendars.
background:
  cultural: Gina was born and raised in Clarksville, Tennessee, within a middle‑class white family that embraced Southern traditions of hospitality, community service, and a strong work ethic. Her upbringing
    included regular participation in local church activities, family gatherings centered around Southern cooking, and exposure to regional music and crafts. A humanities education broadened her worldview,
    introducing global art, literature, and philosophy, while travel experiences deepened her appreciation for diverse cultural expressions. This blend of Southern roots and cosmopolitan curiosity shapes
    her values, fostering a collaborative yet assertive demeanor and a commitment to leveraging her legal expertise to support the arts and her community.
attributes:
  skills: '[''Legal research and writing'', ''Persuasive oral advocacy'', ''Negotiation and mediation'', ''Critical thinking and analysis'', ''Creative problem solving'', ''Public speaking and client counseling'',
    ''Cross-cultural communication'', ''Adaptability in fast‑changing legal contexts'', ''Basic art history knowledge'', ''Curation fundamentals'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Reading contemporary fiction and poetry'', ''Attending live music performances'', ''Hiking in the Cumberland
    Plateau'', ''Practicing yoga'', ''Cooking experimental Southern cuisine'', ''Volunteer legal counseling for local artists'', ''Photography of street art and landscapes'']'
  career_goals: Gina aspires to become a partner at her law firm while carving out a niche in art and intellectual‑property law, helping creators protect and monetize their work. She envisions launching
    a boutique practice dedicated to serving artists, musicians, and cultural institutions in the Tennessee region. Long‑term, she hopes to influence state arts policy through legislative advocacy and to
    mentor junior attorneys, especially women, fostering a collaborative and socially conscious legal community. Balancing professional ambition with family life, she also aims to maintain a flexible schedule
    that allows her continued engagement with the arts.
