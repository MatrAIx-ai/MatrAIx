  hobbies: '[''Salsa Dancing'', ''Cooking Mexican Cuisine'', ''Hosting Dinner Gatherings'', ''Community Volunteering'', ''Yoga and Mindfulness'', ''Journaling'', ''Photography'', ''Group Hiking'']'
  career_goals: Maria aims to become a senior investigator within the next five years, leading complex cases and mentoring junior detectives. She plans to obtain certification as a certified polygraph examiner
    and pursue advanced training in cyber investigations. Ultimately, she envisions establishing her own boutique detective agency focused on serving the Mexican‑American community in Dallas County, emphasizing
    preventive safety programs and collaborative partnerships with local law enforcement. She also hopes to contribute to community education by offering workshops on personal security and legal rights.
