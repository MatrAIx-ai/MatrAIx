personas:
  professional: Rebecca Gagliardi, a seasoned sheet‑metal worker with expert MIG and TIG welding skills, blends pragmatic problem‑solving with a curious eye for emerging metal‑forming methods, mentors apprentices,
    upholds rigorous shop safety, and is actively pursuing a Certified Welding Inspector credential to step into a lead fabricator role at her Waushara County shop while launching a side venture creating
    custom metal art.
  sports: Rebecca Gagliardi enjoys weekend fishing on Lake Poygan, hikes the forest trails around Waushara County, roots for the Milwaukee Bucks and the Green Bay Packers, and participates in a local senior
    league softball team that meets on Saturday mornings.
  arts: Rebecca Gagliardi finds creative solace quilting intricate patterns, reading historical fiction by Philippa Gregory, sculpting small metal figurines inspired by the works of Alexander Calder, and
    listening to classic rock legends like The Rolling Stones and Led Zeppelin while she works in the shop.
  travel: Rebecca Gagliardi favors low‑key road trips to nearby attractions such as Door County’s maritime museums and the historic town of St Joseph, Wisconsin, while dreaming of a future autumn pilgrimage
    to the Scottish Highlands, balancing her love for nature with a modest travel budget and occasional family obligations.
  culinary: Rebecca Gagliardi prepares hearty family‑style meals featuring roasted herb‑marinated chicken, skillet cornbread, and garden‑fresh heirloom tomato salad, enjoys experimenting with smoked paprika
    and fresh rosemary in her vegetable garden’s produce, and comfortably navigates between simple weeknight dishes and elaborate holiday feasts.
  core: Rebecca Gagliardi is a practical yet curious metal‑fabrication veteran who balances hands‑on craftsmanship with quilting, classic‑rock fandom, and a community‑centered life, all while juggling a
    relaxed approach to finances and a penchant for occasional disorganization.
background:
  cultural: Rebecca was raised in a small Midwestern town in Wisconsin, the daughter of parents of Italian descent who settled in the region in the early 20th century. Her family practiced Catholic traditions,
    celebrating holidays such as Christmas, Easter, and the Italian feast of St. Anthony while also embracing quintessential Wisconsin customs like Thanksgiving and the local harvest festivals. The blend
    of Italian heritage and Midwestern community values instilled in her a strong work ethic, modesty, and a deep sense of neighborly responsibility, which continue to shape her outlook and daily life.
attributes:
  skills: '["Sheet metal fabrication", "MIG/TIG welding", "Blueprint reading", "CNC plasma cutting", "Shop safety compliance", "Tool maintenance", "Rapid problem‑solving", "Improvisational repair", "Team
    coordination", "Apprentice mentorship", "Basic carpentry"]'
  hobbies: '["Fishing", "Hiking", "Gardening", "Quilting", "Historical fiction reading", "DIY home improvement projects", "Metal sculpture crafting", "Local community events", "Volunteer work", "Cooking",
    "Classic rock listening"]'
  career_goals: Looking ahead, Rebecca hopes to earn a certified welding inspector (CWI) credential and step into a lead fabricator role at her local shop, where she can shape workflow while preserving
    the flexibility she values. She also aims to launch a small side business creating custom metal art and functional pieces for farms and homeowners in Waushara County, blending her practical skills with
    creative curiosity. Financial stability and a smoother transition toward retirement are important, so she is exploring part‑time consulting and mentorship opportunities that allow a balanced work‑life
    schedule.
