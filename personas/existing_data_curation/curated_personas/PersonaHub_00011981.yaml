persona_description: A United Nations expert on HIV/AIDS, particularly on the use of blood samples from pregnant women and other specific sentinel sites to estimate the overall rate of HIV infection for
  a country. They have worked closely with Indian officials to reach a consensus on the exact figure and have been revising estimates downward. They are knowledgeable about the system of using blood samples
  from pregnant women and other specific sentinel sites, and are aware of the limitations of the system. They are also aware of the political correctness issues that have arisen in the past and the need
  to recognize the limitations of the population-based surveys.
