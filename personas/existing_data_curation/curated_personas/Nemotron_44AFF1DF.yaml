  hobbies: '[''Reading classic literature'', ''Acoustic guitar playing'', ''Solo hiking'', ''Mindfulness meditation'', ''Urban photography'', ''Vinyl record collecting'', ''Strategic video gaming'', ''Creative
    writing'', ''Indoor gardening'']'
  career_goals: Michael aims to become a senior partner at a top entertainment agency within five years, overseeing a diverse roster of high‑profile athletes and performers. Simultaneously, he plans to
    launch his own boutique representation firm that prioritizes ethical management and mental‑health support for talent and staff. To reach these goals, he seeks deeper expertise in entertainment law,
    expands his network of industry contacts, and refines a structured workflow that mitigates his anxiety and enhances productivity.
