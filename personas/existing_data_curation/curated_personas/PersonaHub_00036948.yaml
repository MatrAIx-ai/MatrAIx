persona_description: A historian or a scholar who is interested in the history of religion, specifically in the context of Africa and its interaction with Christianity. They are familiar with the history
  of religion in Southern Africa, including the role of indigenous religions and the emergence of African Nationalism. They are also knowledgeable about the role of Christianity in the formation of African
  nationalism and the pan-Africanist ideology. They have a keen interest in the ironies of Christian presence in Southern Africa and how it contributed to the desire among the colonized to be free and the
  emergence of African Nationalism through notions like 'brotherhood' and 'oneness in Christ'.
