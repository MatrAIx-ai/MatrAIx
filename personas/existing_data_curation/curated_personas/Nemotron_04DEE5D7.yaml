  hobbies: '[''Reading (fiction & philosophy)'', ''Painting & Sketching'', ''Photography'', ''Puzzle Solving (crosswords, Sudoku)'', ''Hiking & Nature Walks'', ''Yoga & Meditation'', ''DIY Crafts (pottery,
    knitting)'', ''Visiting Art Galleries'', ''Cooking Creative Recipes'', ''Attending Small Book Club Meetings'']'
  career_goals: Susan aims to advance from first‑line supervisor to store manager within the next two years, leveraging her analytical mindset and creative problem‑solving to boost store performance. Long‑term,
    she aspires to become a district manager or a regional trainer, shaping retail strategies that integrate emerging technologies and experiential merchandising. She plans to pursue an associate’s degree
    in business management and certifications in retail operations to support her leadership trajectory.
