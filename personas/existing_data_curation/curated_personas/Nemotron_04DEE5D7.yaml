personas:
  professional: Susan Trevett, a retail operations supervisor with a flair for visual merchandising, leverages their methodical scheduling expertise and imaginative problem‑solving to turn data‑driven insights
    into eye‑catching store experiences while coaching staff with calm authority.
  sports: Susan Trevett hikes the Wasatch foothills with the Alpine Explorers club each weekend, cheers on the Utah Jazz in the NBA and follows Real Salt Lake in the MLS, and complements their outdoor cardio
    with weekly Vinyasa classes at a downtown studio, treating fitness as both social ritual and solitary recharge.
  arts: Susan Trevett spends evenings painting abstract canvases inspired by Kandinsky, curates a personal photo series echoing Ansel Adams’ dramatic landscapes, and devours novels by Haruki Murakami and
    philosophical essays by Camus, while routinely attending openings at the Utah Museum of Fine Arts to stay attuned to contemporary voices.
  travel: Susan Trevett prefers purposeful trips that blend hiking adventures and cultural immersion, having trekked the Inca Trail to Machu Picchu and explored Kyoto’s temples, yet they often book weekend
    getaways to nearby national parks like Zion, balancing their desire for discovery with a modest travel budget.
  culinary: Susan Trevett delights in crafting Mediterranean dishes like grilled salmon with lemon‑herb quinoa, experimenting with fresh figs, olives, and za’atar, while also mastering a spicy Thai green
    curry, but they admit to a guilty habit of ordering late‑night pizza after binge‑reading sessions.
  core: Susan Trevett is a meticulously organized retail leader whose love for abstract art fuels innovative store displays, yet they can’t resist a midnight slice of pizza and a third cup of coffee before
    bed.
background:
  cultural: Raised in a predominantly White, suburban community in South Jordan, Utah, Susan’s cultural background reflects a blend of classic Western American values—self‑reliance, community involvement,
    and a strong work ethic—with the region’s emphasis on family and modest, quiet social gatherings. While she may be familiar with the broader LDS‑influenced cultural environment of Salt Lake County,
    she identifies more with inclusive, secular community activities, such as local arts events and volunteer programs, that align with her creative curiosity and collaborative spirit.
attributes:
