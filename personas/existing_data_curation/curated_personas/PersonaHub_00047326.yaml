persona_description: A healthcare professional who is concerned about the impact of smoking on COVID-19 transmission and the health outcomes of smokers. They are passionate about promoting the cessation
  of smoking and the prevention of second-hand smoke exposure, and are advocating for urgent action to address the health risks associated with tobacco use. They are knowledgeable about the progression
  of COVID-19 in smokers and the increased vulnerability they have to illness and outcomes, and are calling on the Minister of Health to expedite the passage of the Tobacco Control Bill to protect South
  Africans from infection and other diseases.
