personas:
  professional: Hang Chang is a meticulous CNC machinist-in-training, leveraging strong mechanical assembly, CNC milling, MIG/TIG welding, and blueprint interpretation to excel in small-team production
    settings, and they communicate technical details clearly while balancing curiosity-driven experimentation with practical reliability as they work toward certification and future workshop ownership.
  sports: Hang Chang enjoys solitary early-morning runs and weekend 5K races with a local running club along the Charles River, cheerfully follows the Boston Celtics and Boston Bruins from home, and they
    track mileage and heart-rate data using a fitness wearable to stay motivated.
  arts: Hang Chang finds artistic balance through traditional calligraphy practice, nightly listening to Miles Davis and Brian Eno, and occasional visits to contemporary abstract galleries, and they use
    these creative outlets to calm their mind and inspire precision in mechanical design.
  travel: Hang Chang prefers low-key weekend getaways to historic New England towns like Salem and Newport, while dreaming of future study trips to Stuttgart, Germany for advanced CNC factory tours and
    Kyoto, Japan to explore traditional craftsmanship workshops, and they balance limited budget constraints with a love for both modern technology and heritage.
  culinary: Hang Chang enjoys cooking simple Asian-American comfort dishes such as sesame-glazed chicken, shrimp fried rice, and quick ramen bowls, often experimenting with fresh ginger, soy sauce, and
    sriracha to achieve balanced flavors, and they treat the kitchen as a quiet, creative outlet after long lab sessions.
  core: Hang Chang is a 23-year-old precision-focused craftsman who channels curiosity into hands-on projects, manages anxiety with early runs, and they meticulously balance work, finances, and creative
    hobbies, albeit with occasional worry-driven splurges on hobby gear.
background:
  cultural: Hang is the son of first‑generation Taiwanese immigrants who settled in Roxbury, MA. He grew up speaking Mandarin at home and English at school, absorbing a blend of East Asian family values—such
    as diligence, respect for elders, and emphasis on technical skill—and the multicultural influences of Boston. His family celebrates Lunar New Year and the Mid‑Autumn Festival, while also participating
    in local community events. This bicultural upbringing informs his modest demeanor, strong work ethic, and appreciation for both traditional craftsmanship and modern technology.
attributes:
  skills: '[''CNC milling operation'', ''MIG/TIG welding'', ''Blueprint reading'', ''SolidWorks CAD modeling'', ''Quality inspection'', ''Industrial safety compliance'', ''Hand‑tool proficiency'', ''Mechanical
    troubleshooting'', ''Small‑team collaboration'', ''Technical documentation'']'
  hobbies: '[''Arduino electronics projects'', ''Scale model building'', ''Calligraphy practice'', ''Running/walking on local trails'', ''Reading technical magazines'', ''Listening to jazz and ambient music'',
    ''Cooking Asian‑American recipes'']'
  career_goals: Hang aims to obtain a CNC Machinist certification within the next year and advance to a CNC programmer role. He plans to pursue a bachelor's degree in Manufacturing Engineering to broaden
    his design capabilities, eventually seeking a supervisory position that oversees a fabrication team. Long‑term, he envisions launching his own custom‑fabrication workshop that blends traditional craftsmanship
    with modern digital manufacturing, providing stable, skilled work for his community.
