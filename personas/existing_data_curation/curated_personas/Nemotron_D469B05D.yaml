personas:
  professional: Mireya Partida, a 53‑year‑old veteran hairdresser, blends three decades of cutting, coloring, and scalp‑care expertise with a curious yet practical mindset, delivering bilingual consultations
    that balance meticulous organization with spontaneous last‑minute appointments, and they mentor junior stylists in a warm, harmonious salon that reflects their sociable and emotionally responsive nature.
  sports: Mireya Partida enjoys low‑impact fitness, regularly attending weekly yoga classes, strolling the shoreline with the Coastal Steps Running Club, cheering on the San Diego Padres during baseball
    season and the Los Angeles Lakers in the winter, while they occasionally join community salsa‑dance fitness sessions as a playful cardio workout.
  arts: Mireya Partida channels their sociable energy into salsa and cumbia dance nights, regularly moving to the rhythms of Celia Cruz and Carlos Vives, while they unwind by sketching scenes inspired by
    Frida Kahlo’s vibrant colors and attending local theater productions starring actors like Edward James Olmos.
  travel: Mireya Partida prefers thoughtfully planned getaways that blend relaxation and cultural immersion, often escaping to the nearby coastal trails of Big Sur and the historic streets of Santa Barbara,
    while dreaming of a vacation to the lush rainforests of Costa Rica and the vibrant markets of Oaxaca to gather fresh herbs for their garden and salon recipes.
  culinary: Mireya Partida delights in cooking authentic dishes such as pupusas stuffed with cheese and loroco, tamales wrapped in corn husks, and sopa de pata brimming with cilantro, oregano, and plantain,
    wielding a seasoned hand and a garden of fresh herbs to craft meals that double as aromatherapy sessions, while they occasionally indulge in upscale dining at local farm‑to‑table restaurants to sample
    new flavor pairings.
  core: Mireya Partida balances a boundless curiosity for new trends with a meticulous, yet occasionally anxious, approach to life, turning every salon chair into a community haven while secretly hoarding
    extra aloe‑gel for late‑night hair experiments.
background:
  cultural: Mireya was raised in a Salvadoran immigrant family in Salinas, where Spanish was spoken at home and Catholic traditions marked holidays like Semana Santa, Día de los Muertos, and Christmas with
    elaborate meals and family gatherings. The close‑knit Latino community in Monterey County fostered a sense of solidarity, respect for elders, and a love for shared celebrations. Her cultural heritage
    informs her aesthetic sensibility—she often incorporates bright colors, intricate braids, and folkloric elements into her styling. Mireya values the communal spirit of Salvadoran culture, which is reflected
    in her dedication to mentoring younger stylists, hosting community beauty workshops, and maintaining a salon environment that feels like an extended family.
attributes:
  skills: '["Hair cutting", "Hair coloring (balayage, highlights, pastel shades)", "Up‑do styling for events", "Braiding and traditional Salvadoran hairstyles", "Scalp health assessment", "Product recommendation
