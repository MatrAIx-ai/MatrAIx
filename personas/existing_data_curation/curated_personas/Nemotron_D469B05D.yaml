    "Balancing trend‑forward techniques with practical hair care"]'
  hobbies: '["Cooking traditional Salvadoran cuisine", "Salsa and cumbia dancing", "Attending community festivals", "Beach walks and coastal hiking", "Yoga and meditation", "Journaling and sketching", "Volunteering
    at community centers", "Gardening herbs for cooking and hair care"]'
  career_goals: Mireya dreams of opening her own boutique salon that doubles as a community hub for Salvadoran and broader Latino cultural celebrations, offering specialty services for quinceañeras, weddings,
    and holiday festivals. She aims to develop a line of eco‑friendly hair‑care products rooted in Central American botanicals, such as aloe and avocado oil. Over the next five years she plans to become
    a certified cosmetology instructor, sharing her practical expertise with emerging stylists while fostering a supportive, low‑stress learning environment. Additionally, Mireya is committed to integrating
    mental‑wellness practices into her salon—like quiet corners for relaxation and offering resources for staff and clients dealing with anxiety—reflecting her desire for a balanced, harmonious workplace.
