  hobbies: '[''Quilting circles'', ''Community dancing'', ''Book club'', ''Hiking'', ''Community gardening'', ''Volunteer at food pantry'', ''New Mexican cooking'', ''Digital photography'', ''Pottery'',
    ''Attending cultural festivals'']'
  career_goals: Taylor aims to continue serving her community by expanding her mentorship role, documenting oral histories of longtime Albuquerque residents, securing a small grant to launch an intergenerational
    art exchange program, and completing a senior photography course to capture the changing landscape of the Southwest. She also hopes to maintain her health and independence, travel to cultural sites
    across New Mexico, and publish a collection of memoir essays about her experiences.
