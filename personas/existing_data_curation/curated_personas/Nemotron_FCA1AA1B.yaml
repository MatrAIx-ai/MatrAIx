personas:
  professional: Dinh Mangal is a budding block architect who meticulously assembles LEGO towers, balancing a natural curiosity for how pieces fit together with a practical insistence on stable foundations,
    even as they often resist tidy cleanup.
  sports: Dinh Mangal enthusiastically joins the preschool soccer circle on Saturday mornings, cheering for the local professional team the City Tigers while also proudly wearing a tiny jersey from the
    national basketball franchise the Bears, yet their love for solitary backyard climbing often wins over team drills.
  arts: Dinh Mangal loses themselves in the vibrant world of picture books, tracing the bold lines of Eric Carle’s illustrations and humming the catchy tunes of the Sesame Street cast, which together shape
    a quiet, imaginative sanctuary where they can express feelings through crayon doodles without needing a crowd.
  travel: Dinh Mangal’s biggest travel excitement comes from family road trips to the nearby aquarium and the annual visit to Disney World in Orlando, where the child’s curiosity fuels endless question‑asking
    about marine life, while the structured itinerary often clashes with their spontaneous desire to explore hidden nooks at their own pace.
  culinary: Dinh Mangal prefers the simple comfort of cheesy mac and cheese, chicken nuggets, and sliced apples, often insisting on dipping the nuggets in honey mustard rather than ketchup, and shows a
    budding kitchen curiosity by helping stir batter but quickly loses interest if the process drags beyond a few minutes.
  core: Dinh Mangal is a quietly curious four‑year‑old who balances a love for solitary exploration with bursts of spontaneous play, often trading patience for instant gratification and thriving in environments
    where imagination can flourish without rigid rules.
background:
  cultural: Dinh was born in Chesapeake, Virginia, to parents who emigrated from Vietnam, giving him a Southeast Asian heritage. At home, Vietnamese is spoken alongside English, and the family celebrates
    cultural customs such as Lunar New Year (Tet) with traditional foods like pho and bánh mì. He attends community events at a local Vietnamese cultural center where he learns basic songs and stories in
    his heritage language. The household values quiet respect, close‑knit family bonds, and a balance between modern American life and traditional Southeast Asian practices, providing Dinh with a multicultural
    perspective that blends his suburban childhood with his cultural roots.
attributes:
  skills: '["Letter recognition (uppercase and lowercase)", "Phonemic awareness (letter sounds)", "Counting 1‑10", "Fine motor coordination (coloring, safety scissors)", "Block building with Duplo bricks",
