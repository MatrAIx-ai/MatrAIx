  hobbies: '["Building with Duplo bricks", "Solving simple jigsaw puzzles", "Reading picture books", "Drawing and coloring", "Backyard nature exploration (insects, rocks)", "Water table play", "Simple kitchen
    helper tasks", "Listening to traditional lullabies"]'
  career_goals: Although only four, Dinh already shares the seeds of his future dreams. He often talks about building "big towers" that can hold his toys and imagines making tools that help people. He says
    he wants to be a "builder" or "engineer" who designs safe playgrounds, and he also loves watching videos of animals, hoping one day to become a veterinarian who can care for pets. His practical side
    pushes him to think about how his creations could be useful, while his quiet, solitary play hints at a future where he might work in a calm laboratory or workshop, solving problems step by step.
