    Compliance (Arizona Agricultural Laws)"]'
  hobbies: '["Traditional Mexican Music and Cooking", "Hosting Community Farm Dinners", "Youth Soccer Coaching", "Desert Hiking and Birdwatching", "Landscape Photography", "Reading Historical Fiction and
