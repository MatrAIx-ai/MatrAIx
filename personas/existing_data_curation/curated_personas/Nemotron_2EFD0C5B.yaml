personas:
  professional: Livio Perezroura, a 43‑year‑old farm manager, leverages bilingual communication, data‑driven agronomy, and they rally community volunteers to design water‑wise crop rotations, implement
    precision irrigation, and lead livestock health programs while championing tech adoption and flexible problem‑solving on the family farm.
  sports: Livio Perezroura, an avid soccer fan, coaches a local youth league, organizes weekly friendly matches with neighboring ranches, roots for Arizona FC, and they join a weekend desert‑hiking club
    to chase bird‑watching spots across the Sonoran landscape.
  arts: Livio Perezroura’s evenings often fill with traditional mariachi melodies, they collect vintage acoustic guitars, draw inspiration from poet Octavio Paz and folk singer Lila Downs, and incorporate
    these influences into storytelling workshops at the elementary school.
  travel: Livio Perezroura prefers road‑trip adventures that blend agritourism and desert scenery, having recently toured the vineyards of Paso Robles, explored the Sonoran dunes near Tucson, and they dream
    of a cultural exchange in Oaxaca’s highlands while balancing travel costs with farm cash flow.
  culinary: Livio Perezroura’s palate celebrates mole poblano, smoky carne asada, handcrafted tamales, and a signature roasted chili‑corn salsa; they expertly grill steaks but admit to over‑salting their
    experimental heritage chilies in the pursuit of bold flavor.
  core: Livio Perezroura blends pragmatic farm management with vibrant community gatherings, using tech and tradition to nurture a sustainable desert oasis while they never miss a chance to chat, coach,
    or cook for friends.
background:
  cultural: Livio is a first‑generation Mexican‑American whose parents migrated from Jalisco, bringing with them centuries‑old farming knowledge and a strong sense of family and community. Growing up in
    a bilingual household in Arizona, he blended Mexican agricultural traditions—such as the use of corn milpas and communal work celebrations ("milpa fiestas")—with the practical demands of desert farming
    in the Southwest. His Catholic faith and participation in local fiestas, like Día de los Muertos and the annual Buckeye Harvest Festival, reinforce his commitment to cultural heritage while fostering
    cross‑cultural connections in his multicultural community.
attributes:
  skills: '["Crop Planning and Rotation", "Drip Irrigation Management", "Soil Moisture Monitoring", "Livestock Health and Nutrition", "Rotational Grazing", "Bilingual Communication (English/Spanish)", "Public
