personas:
  professional: Deborah Waters, an 80‑year‑old community volunteer and seasoned home‑economics steward, merges decades of hands‑on household management with a practical curiosity, leading craft workshops
    at the senior center, using basic digital tools to coordinate events, and offering senior‑friendly meal planning advice to neighbors.
  sports: Deborah Waters, an avid sunrise beach walker and birdwatching enthusiast, embraces low‑impact fitness through daily shoreline strolls and seasonal participation in the local senior yoga class,
    while cheering on the Miami Marlins during spring training and occasionally joining the community's gentle shuffleboard league.
  arts: Deborah Waters, a dedicated lover of classic jazz and community art fairs, spends evenings listening to Miles Davis and Ella Fitzgerald, savors the works of local painter John Hall at county festivals,
    and weaves stories into crocheted blankets inspired by readings of early Florida historical fiction by author Mary Miller.
  travel: Deborah Waters, who favors leisurely, low‑stress trips, has explored the historic streets of St. Augustine and the coastal charm of Key West, dreams of a Mediterranean cruise to the Amalfi Coast
    to sample the cuisine they love, and plans each outing with a flexible itinerary that allows spontaneous beach pauses.
  culinary: Deborah Waters, an experienced home cook, delights in crafting low‑salt Mediterranean dishes like grilled sardines with rosemary, roasted vegetable ratatouille, and chickpea tabbouleh, embraces
    fresh herbs such as rosemary and thyme from their garden, but occasionally forgets to reduce the salt when using pre‑packaged sauces.
  core: Deborah Waters is an energetic, garden‑loving octogenarian who balances curiosity with a laid‑back schedule, often misplaces their reading glasses while humming classic jazz and gifting handmade
    blankets to neighbors.
background:
  cultural: Deborah comes from a mid‑century Anglo‑American background typical of many retirees in Southwest Florida. She was raised in a small‑town, Protestant family that emphasized self‑reliance, community
    service, and family meals. Her cultural identity blends the modest, practical values of post‑World War II America with the relaxed, outdoorsy lifestyle of the Gulf Coast retirement community she now
    calls home. She maintains traditions such as Thanksgiving and church potlucks, Sunday worship, and a love for seasonal cooking, while also embracing Florida’s coastal culture—beach outings, gardening
    for native flora, and regional culinary influences like seafood and citrus.
