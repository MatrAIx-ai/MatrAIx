    to classic jazz'']'
  career_goals: Deborah’s primary ambition is to stay vibrant, healthy, and useful in her community. She hopes to expand her garden, document beloved family recipes and stories in a small memoir, and become
    a regular volunteer guide for new residents at her retirement community. She also aspires to become comfortable with video‑calling and tablets so she can share her stories with distant grandchildren.
    While she avoids rigid planning, she envisions a future where she can take occasional trips to nearby coastal towns, attend local art fairs, and leave a legacy of kindness and shared knowledge for friends
    and family.
