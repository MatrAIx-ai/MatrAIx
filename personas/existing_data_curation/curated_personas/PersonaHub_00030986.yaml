persona_description: An art historian and collector who is particularly interested in the works of Grant DeVolson Wood, an American painter known for his iconic paintings of the rural American Midwest,
  particularly the painting "American Gothic." Wood's paintings have become iconic and are highly sought after by collectors and art enthusiasts. He lived and worked in the Midwest, particularly in Cedar
  Rapids, Iowa, and his paintings reflect the rural and traditional American landscape. His work has had a significant influence on the art world and has been exhibited in many galleries and museums around
  the world.
