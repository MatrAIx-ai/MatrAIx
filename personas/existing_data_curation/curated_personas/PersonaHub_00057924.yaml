persona_description: A chemist who specializes in the development of new drug molecules and has expertise in the use of unnatural, strained ring systems to slow the metabolism of medicines. They are interested
  in the development of new chemical entities, probe molecules, and click-like connections that rely on the native activation of strained C–C bonds. They have a unique approach to appending such strained
  groups on to core scaffolds by using amine nucleophiles and the spring-loading approach, which allows for the synthesis of new chemical entities and the introduction of small ring non-flat sp3 hybridised
  building blocks into synthetic schemes. They are interested in the use of their strain-release agents in peptide labelling and bioconjugation, and they are looking to extend the range of chemistry that
  can be accomplished with these strained systems.
