personas:
  professional: Yusnelis Jaquez is a fledgling building inspector who blends a practical mastery of California building codes with a curiosity for green construction, delivering meticulous site reports
    while often juggling a relaxed, somewhat chaotic schedule that favors flexibility over rigid administrative routines.
  sports: Yusnelis Jaquez enjoys weekend hikes across the San Bernardino foothills, follows the Los Angeles Rams and the San Diego State Aztecs men’s basketball teams, and belongs to a small indoor climbing
    club that meets Tuesdays at a local gym, mixing solitary cardio with occasional team‑spirit spectating.
  arts: Yusnelis Jaquez captures the desert’s geological textures with a vintage Nikon DSLR, sketches architectural details in a well‑worn sketchbook, and draws inspiration from Ansel Adams, Frank Lloyd
    Wright, and the indie folk sounds of The Tallest Man on Earth, weaving visual and auditory influences into their DIY woodworking projects.
  travel: Yusnelis Jaquez prefers solo road trips that blend rugged landscapes with cultural immersion, having already trekked Joshua Tree, explored the red rocks of Sedona, and spent a long weekend in
    Oaxaca, while aspiring to backpack the Patagonian Torres del Paine National Park on a shoestring budget.
  culinary: Yusnelis Jaquez perfects the family‑style pupusa filled with cheese and Loroco, fries crisp yuca with a dusting of cumin, rolls tamales wrapped in banana leaves, and pairs each dish with freshly
    made salsa verde and an occasional splash of homemade curtido, often experimenting with locally sourced herbs.
  core: Yusnelis Jaquez is a pragmatic, curiosity‑driven building inspector whose love for sustainable design, solitary hikes, and late‑night DIY projects blends with a relaxed, occasionally disorganized
    lifestyle and a competitive edge.
background:
  cultural: Yusnelis grows up in a Salvadoran‑American household in Ontario, California, where Spanish is spoken at home and cultural celebrations like Día de los Farolitos and the Feast of San Salvador
    are observed. Her parents immigrated from El Salvador and instilled a strong work ethic, respect for community, and pride in their cultural roots. She balances these traditions with the diverse, multicultural
    environment of Southern California, participating in local festivals, enjoying both Latin music and contemporary indie scenes, and maintaining close ties with an extended family network that often gathers
    for weekend meals. This blend of Salvadoran heritage and American upbringing informs her bilingual communication style, culinary tastes, and sense of identity.
attributes:
  skills: '[''Building code interpretation'', ''On‑site construction inspection'', ''Structural assessment'', ''Sustainable building practices'', ''Construction drawing reading'', ''Safety compliance'',
    ''Bilingual communication (Spanish/English)'', ''Report writing'', ''Use of inspection tools (laser levels, moisture meters)'']'
  hobbies: '[''Hiking'', ''Nature photography'', ''DIY woodworking'', ''Cooking Salvadoran cuisine'', ''Technical reading on construction trends'', ''Sketching architectural details'']'
  career_goals: Yusnelis aims to earn the ICC Certified Building Official credential within the next two years and progress to a senior inspector role overseeing large commercial projects in the Inland
    Empire. She aspires to become a subject‑matter expert in green building inspections, eventually leading a specialized team that advises developers on energy‑efficient construction. In the longer term,
    she envisions establishing her own consulting firm that offers flexible, on‑demand inspection services and training workshops for contractors seeking to adopt sustainable practices.
