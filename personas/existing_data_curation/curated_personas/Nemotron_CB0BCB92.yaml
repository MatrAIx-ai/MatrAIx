  hobbies: '[''Cooking Mexican cuisine'', ''Attending salsa and banda dance events'', ''Participating in church food drives'', ''Walking with neighborhood groups'', ''Gardening (tomatoes, chilies)'', ''Knitting
    and crafting for charity'', ''Listening to regional Mexican music'', ''Watching football games with friends'']'
  career_goals: Elba aims to move into a supervisory role within her warehouse, such as shift lead or inventory coordinator, to gain more control over her schedule and earnings. She plans to obtain an OSHA
    forklift certification and attend internal training on inventory software to demonstrate her readiness for management responsibilities. Long‑term, she hopes to mentor newer employees, improve workflow
    efficiency, and eventually qualify for a part‑time logistics or stock control position that offers a steadier income to support her retirement savings.
