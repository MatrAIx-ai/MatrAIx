persona_description: A teacher and therapist who is passionate about storytelling and its therapeutic and educational potential. They are interested in using storytelling to support children and adults
  with special needs and disabilities, including those with special educational needs and those who are in the process of learning to speak the language of a new country or are not used to voicing their
  experiences and being heard. They are familiar with the theory and practice of storytelling and have extensive experience in using storytelling in a variety of settings, including homes, classrooms, arts
  facilities, social services, and health services. They are interested in using the book "Using Storytelling to Support Children and Adults with Special Needs" by Nicola Grove and the book "Ways into Literature"
  by Nicola Grove and Keith Park, as well as the book "Social Cognition through Drama and Literature for People with learning Disability" by Nicola Grove and Keith Park, to inspire and guide their work
  with children and adults with special needs and disabilities. They are looking for ways to use storytelling to empower and engage children and adults who have special needs and disabilities, and to help
  them feel that they can tell stories in ways that are fun, creative, and empowering.
