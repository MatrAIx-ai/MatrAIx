persona_description: A Wesleyan student who tutors or mentors young people, specifically focusing on inclusive learning environments for children with diverse learning needs. The individual is likely to
  have a background in education studies or a related field, with a strong interest in creating accessible and effective teaching strategies. They may have experience working with young people and have
  a desire to improve their skills in this area. They are likely to be familiar with the continuum of disability, executive function, literacy skills, cultural barriers, task analysis, and Universal Design
  for Learning, and may have a deep understanding of the special education field and different models for learning. They may be interested in learning more about the special education field, different models
  for learning, and leaving with strategies to use in the classroom.
