  career_goals: Edwin aims to build a steady, long‑term career within the construction trade by earning an OSHA 30‑hour certification and becoming a certified foreman. He plans to take evening courses toward
    a construction‑management certificate so he can supervise small crews and eventually run his own residential remodeling subcontractor, providing a reliable income for his family.
