personas:
  professional: John Soto, a 20‑year‑old shift manager at a Tallahassee coffee shop, blends his calm, collaborative demeanor with a vivid imagination to spearhead innovative marketing concepts while laying
    the groundwork for a future boutique creative studio that fuses graphic design with community art events.
  sports: John Soto enjoys low‑key fitness, jogging the Apalachicola River Trail with the Tallahassee Running Club in spring, attending yoga sessions at the local community center, cheering on the Florida
    State Seminoles football team on Saturdays, and occasionally joining pickup basketball games with fellow board‑game friends, while rarely participating in organized team sports.
  arts: John Soto finds inspiration in the abstract color fields of Mark Rothko, the ambient soundscapes of Brian Eno, and the speculative worlds of Neal Stephenson, regularly sketching abstract concepts
    in his notebook at the Tallahassee Museum of Art, creating digital paintings in Procreate, and curating small‑scale art shows that showcase emerging local talent.
  travel: John Soto favors spontaneous, budget‑friendly trips that feed his creative spark, having explored the vibrant street art of New Orleans, the desert installations of Marfa, Texas, and dreaming
    of a future residency in Kyoto's contemporary art districts, he typically books last‑minute flights, stays in hostels or Airbnb, and plans loosely around art events rather than strict itineraries.
  culinary: John Soto’s palate leans toward experimental yet simple fare, often savoring avocado toast topped with smoked salmon and a drizzle of lemon‑infused olive oil, indulging in miso ramen with soft‑boiled
    eggs, and brewing craft cold‑brew coffee using Ethiopian beans while occasionally experimenting with turmeric‑spiced smoothies for a creative culinary twist.
  core: John Soto navigates life with a calm, curiosity‑driven lens, juggling a laid‑back approach to obligations, an unrelenting love for abstract art, and a quiet determination to turn his imaginative
    visions into a community‑focused creative studio.
background:
  cultural: John grew up in Tallahassee, Florida, within a middle‑class white family that valued community ties and Southern hospitality. His upbringing was shaped by the region’s blend of traditional Southern
    values and a growing multicultural environment, exposing him to a variety of cultural festivals, music scenes, and culinary influences. He attended a local public high school where he participated in
    art clubs and student government, fostering both his creative side and his collaborative spirit. The relaxed, outdoor‑oriented lifestyle of the Florida Panhandle, along with the academic and artistic
    resources of Florida State University’s nearby campus, have contributed to his open‑minded, curious worldview.
