  career_goals: John aims to combine his managerial experience with his creative passions by pursuing a role that bridges business operations and artistic direction. Over the next five years, he plans to
    attend a community college or online program to earn an associate degree in business administration while deepening his skills in visual communication. His ultimate ambition is to open a boutique creative
    studio in Tallahassee that offers graphic design services, curated art events, and a small coworking space, allowing him to lead a team while nurturing a vibrant artistic community. He also hopes to
    travel occasionally to attend art residencies that inspire fresh ideas for his projects.
