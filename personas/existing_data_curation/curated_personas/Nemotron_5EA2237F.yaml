  career_goals: In the next three to five years, William aims to move into a plant‑manager position where he can oversee broader operational functions and drive efficiency initiatives across multiple sites.
    He is passionate about institutionalizing a formal apprenticeship program to mentor the next generation of mechanics. Long‑term, he envisions launching his own small mechanical‑services business focused
    on sustainable practices and community projects in the Hill Country, allowing him to give back to Canyon Lake while eventually transitioning to a semi‑retired advisory role.
