  career_goals: Looking ahead, Charlie aims to step into a regional management role where he can shape store culture across multiple locations, champion innovative visual merchandising concepts that fuse
    his love of art with retail strategy, and launch a mentorship program for emerging sales leaders. He envisions using his competitive drive to set new sales standards, while eventually transitioning
    to a part‑time consultancy that helps small businesses integrate data‑driven practices and culturally resonant customer experiences before fully retiring.
