personas:
  professional: Roberta Womack, age 4, is a budding mini architect who spends every play session meticulously stacking building blocks, and they demonstrate methodical planning, competitive drive, and a
    preference for solitary, organized projects.
  sports: Roberta Womack, age 4, participates in the ‘Tiny Turtles’ preschool soccer league and loves cheering for the Los Angeles Dodgers during family TV nights, and they approach fitness with a fierce
    competitive spirit, preferring one‑on‑one drills over large group games.
  arts: Roberta Womack, age 4, immerses themselves in creative play by painting bright suns inspired by Van Gogh’s ‘Sunflowers’ and dancing to Raffi’s ‘Baby Beluga’, and they cherish these artistic moments
    as a window to unconventional ideas and a refuge from noisy crowds.
  travel: Roberta Womack, age 4, enjoys family trips to the local zoo, a sunny day at the beach in Myrtle Beach, and a magical weekend at Disney World, and they eagerly plan future adventures to Paris to
    see the Eiffel Tower, preferring structured itineraries with plenty of quiet rest breaks.
  culinary: Roberta Womack, age 4, loves the comforting taste of creamy mac and cheese with cheddar and the crunchy crunch of apple slices dipped in peanut butter, and they proudly stir the pot during pretend‑cooking
    sessions, though they stubbornly refuse peas on their plate.
  core: Roberta Womack, age 4, is a meticulous little builder who counts every block, saves every nickel, monitors sneezes, beats friends at soccer drills, paints like a mini Van Gogh, dreams of Eiffel
    Tower trips, and tactfully refuses peas.
background:
  cultural: Roberta is a white child raised in a middle‑class family in Miami, Florida. Her household follows mainstream American traditions such as Thanksgiving and Fourth of July celebrations while also
    embracing the city’s multicultural rhythms—she hears Spanish-language music on the radio, enjoys occasional Cuban sandwiches, and participates in community events like the Calle Ocho festival. This
    blend of mainstream and local influences nurtures her appreciation for varied artistic expressions and new ideas.
