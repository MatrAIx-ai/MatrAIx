  career_goals: Although only four, Roberta often imagines a future where she creates beautiful things and helps others discover new ideas. She talks about becoming an artist who paints bright pictures,
    a storyteller who shares imaginative tales, or a scientist‑explorer who uncovers how things work. Her goal is to combine creativity with a disciplined approach, ensuring her projects are thoughtfully
    planned and completed.
