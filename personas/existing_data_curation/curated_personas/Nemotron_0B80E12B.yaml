personas:
  professional: David Wilson, a high‑school athlete and community‑center volunteer, channels their natural curiosity and methodical planning into preparing for a vocational apprenticeship in automotive
    technology, where they aim to blend hands‑on mechanical work with reliable project management.
  sports: David Wilson, a varsity basketball guard and starting soccer midfielder at Norwalk High School, spends weekends fishing on Lake Erie, hiking Huron County trails, and playing pickup games at the
    local community center, while passionately cheering for the Cleveland Cavaliers, Browns, and Guardians, and they often organize informal scrimmages with friends to keep the team spirit alive.
  arts: David Wilson, an amateur guitarist, often practices finger‑style classics by John Mayer and folk storytelling songs by Bob Dylan, attends local community theater productions, and draws creative
    inspiration from Leonard Cohen’s lyricism, shaping their artistic downtime, and they love sharing their performances at community events.
  travel: David Wilson enjoys weekend road trips to Mackinac Island and Cuyahoga Valley National Park, while dreaming of a future cross‑country drive to the Pacific Northwest, balancing a love for nature
    with a modest budget and family responsibilities, and they keep a travel journal to capture each adventure.
  culinary: David Wilson, who favors hearty Midwestern fare, relishes cooking Lake Erie perch with lemon butter, whipping up homemade chili with kidney beans and corn, and mastering a basic wood‑fire pizza
    topped with mozzarella and fresh basil, showcasing a practical yet experimental kitchen style, and they love experimenting with new spice blends whenever time permits.
  core: David Wilson blends relentless curiosity with methodical reliability, balancing team sports, DIY projects, and community service while staying organized, sociable, and ever‑ready to tackle the next
    practical challenge, and they never miss a chance to lend a hand to a neighbor in need.
background:
  cultural: David grew up in Norwalk, a small city in Huron County, Ohio, within a predominantly white, Midwestern agricultural community. His family heritage includes German and Irish ancestry, reflecting
    the ethnic mix common in the region. Local culture emphasizes hard work, self‑reliance, church involvement, and strong community ties, with seasonal activities such as county fairs, fishing, and hunting.
    These values have shaped David’s cooperative nature, practical problem‑solving mindset, and his appreciation for both tradition and new ideas.
