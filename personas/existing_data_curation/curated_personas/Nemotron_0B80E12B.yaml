  career_goals: David plans to earn his GED within the next year and then enroll in a vocational apprenticeship program in automotive technology or electrical work, fields that satisfy his curiosity about
    how things work while offering practical, hands‑on experience. He aims to become a certified technician, gaining the credentials needed to work independently. In the long term, he hopes to start his
    own small service business—such as an auto‑repair shop or a neighborhood handyman service—where he can apply his organizational strengths, reliability, and community‑focused attitude to serve residents
    of Norwalk and the surrounding area.
