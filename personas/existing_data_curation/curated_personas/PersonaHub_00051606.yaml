persona_description: A poet who is well-known for his creative and polemical writings, combines the personal and the political in his poetry, and is considered one of the foremost Urdu poets. His works
  have been translated into English by a renowned English translator, and he has been awarded prestigious literary awards and honours. His legacy to common people is his investment of a classical poetic
  heritage with a new and dynamic dimension, highlighting universal sharing, compassion, and a sympathetic correlatedness of cultural and political similarities.
