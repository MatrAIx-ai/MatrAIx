personas:
  professional: Janet Jordan is a seasoned food‑service supervisor who blends three decades of expertise in food safety, nutrition‑balanced menu planning, and cost control with an artist’s eye for plating,
    and they mentor younger staff while curating community culinary‑art events at senior centers and local museums.
  sports: Janet Jordan enjoys gentle sunrise walks through Columbia’s historic district, follows the Carolina Panthers and South Carolina Gamecocks during football season, and they participate in the senior
    garden club’s low‑impact tai‑chi sessions at the local YMCA, while occasionally joining their granddaughter for recreational badminton.
  arts: Janet Jordan frequently sketches watercolors inspired by Monet’s Water Lilies and O’Keeffe’s desert blossoms, studies the vibrant brushwork of Renoir, and they delight in listening to Mozart’s piano
    sonatas while attending the Columbia Museum of Art’s rotating exhibitions.
  travel: Janet Jordan has explored Savannah’s historic squares, taken a river cruise in Charleston, basked on the beaches of the Bahamas, attended a tea ceremony in Kyoto, and they dream of strolling through
    the gardens of Versailles, balancing these adventures with a careful travel budget and the need for occasional rest periods.
  culinary: Janet Jordan crafts soul‑nourishing dishes such as shrimp and grits made with heirloom corn, collard greens simmered with smoked turkey, and sweet‑potato pie spiced with cinnamon and nutmeg,
    while they also experiment with fresh basil, heirloom tomatoes, and locally sourced honey in garden‑to‑table creations.
  core: Janet Jordan is a curious, organized octogenarian who blends their love of art, food, and community service into daily life, tempered by occasional forgetfulness about medication and a fondness
    for crossword puzzles.
background:
  cultural: Janet was born in 1944 into a close‑knit African‑American community in Columbia, South Carolina. Her parents were part of the Great Migration’s later wave, and her grandparents traced their
    roots to the Gullah/Geechee culture of the Sea Islands, preserving distinctive culinary and storytelling traditions. Growing up during segregation, she experienced the civil‑rights movement firsthand,
    which instilled in her a deep sense of cooperation, community service, and resilience. The vibrant church life, soul‑food cooking, and the rich oral histories of her elders shaped her identity. Today,
    her cultural background blends Southern Black heritage, a love of food as a communal bond, and an appreciation for the arts that reflect her community’s lived experience.
