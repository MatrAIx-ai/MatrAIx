  career_goals: Even at 81, Janet remains driven to leave a lasting legacy. She aims to expand her volunteer work by leading a regional program that teaches healthy cooking to seniors and teenagers, to
    curate a small cookbook of family and community recipes accompanied by stories of their cultural origins, and to partner with local art museums for food and art exhibitions that celebrate African‑American
    culinary heritage. Janet also hopes to continue learning—taking occasional art history workshops and perhaps enrolling in a community college course on oral history research—to document the culinary
    memories of her generation.
