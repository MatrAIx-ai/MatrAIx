persona_description: A healthcare professional who closely monitors and analyzes public health data, particularly in relation to the impact of the Covid-19 pandemic on life expectancy and mortality rates
  in the United States. They are interested in understanding the trends and patterns in life expectancy data over time and how they are influenced by various factors such as the pandemic, natural disasters,
  and other health-related events. They are also likely to be aware of the disparities in life expectancy between different states and demographics, and to be concerned about the potential long-term effects
  of the pandemic on public health and well-being.
