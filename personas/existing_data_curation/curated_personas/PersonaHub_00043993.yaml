persona_description: A scientist and inventor who specializes in nuclear energy and renewable energy technologies. He has developed the E-Cat reactor, which produces energy at a much cheaper and cleaner
  rate than other sources. He has a firm understanding of the workings of the E-Cat and is seeking further patent protection. He has been awarded a patent for the E-Cat by the Italian Patent Office and
  is seeking further patent protection. He has developed a high temperature E-Cat known as a 'hot cat' which has the capacity to generate electricity at high efficiency. He has been involved in the development
  and testing of the E-Cat, and has stated that the customer is a military entity that does not want to be identified. He has maintained that the only validation that really matters is from satisfied customers
  who own working E-Cats.
