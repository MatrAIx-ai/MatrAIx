persona_description: A social activist and advocate for peace in Central America and the United States, with a particular focus on the gang violence and violence prevention efforts in El Salvador. The individual
  has a deep understanding of gang dynamics, violence prevention strategies, and the impact of government policies on gang violence. They have extensive knowledge and experience in gang intervention, urban
  peacebuilding, and the use of non-conventional strategies to promote peace. The individual has authored books on gang life and has helped broker peace agreements in El Salvador. They are part of the Transitional
  Advisory Group in Support of the Peace Process in El Salvador, bringing expertise in gang intervention, urban peacebuilding, and spiritual practices to the peace process.
