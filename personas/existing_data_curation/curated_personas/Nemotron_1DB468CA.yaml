personas:
  professional: An aspiring IT support specialist, Akhilesh Drozario combines their quick‑thinking, honed in competitive shooter games, with a solid foundation in Windows and Linux troubleshooting, applying
    a methodical, routine‑focused work ethic while relying on informal checklists to offset a naturally laid‑back approach to organization.
  sports: A dedicated fitness enthusiast, Akhilesh Drozario completes early morning runs with the Palmetto Runners club, follows the Atlanta Hawks and Atlanta Braves on game days, supports the Mumbai Indians
    in the Indian Premier League, and joins local community soccer matches on weekends, preferring structured exercise routines over spontaneous workouts.
  arts: A lover of vibrant soundtracks, Akhilesh Drozario fills their kitchen with Bollywood hits from Shah Rukh Khan’s classic films and traditional coastal folk songs while cooking, and occasionally streams
    indie films starring Alia Bhatt or watches live performances by local folk musicians, letting those rhythms shape their study sessions.
  travel: An adventurous yet budget‑mindful traveler, Akhilesh Drozario dreams of backpacking through the Portuguese‑influenced coastal villages of western India, exploring the historic alleys of Lisbon,
    and hiking the volcanic trails of Iceland, but currently limits trips to weekend drives to nearby Savannah or short biking excursions, carefully planning each itinerary on a travel app to keep costs
    low.
  culinary: A culinary experimenter, Akhilesh Drozario routinely cooks family‑style fish curry with tamarind and kokum, perfects spicy pork vindaloo using vinegar and red chilies, and frequently reheats
    leftover biryani with a splash of ghee, showcasing an intermediate skill level that balances traditional flavors with occasional fusion twists.
  core: A routine‑driven, competitive gamer turned aspiring IT tech, Akhilesh Drozario blends disciplined problem‑solving with a relaxed attitude toward planning, channeling their love for spice‑filled
    cooking and modest savings into a clear, if slightly disorganized, path toward a stable career and a side‑catering venture.
background:
  cultural: Akhilesh is a second‑generation South Asian American of Goan Catholic descent. His parents emigrated from Goa, India, bringing with them a blend of Indian and Portuguese cultural practices.
    He grew up speaking English as his primary language while learning Konkani at home and picking up conversational Hindi from community events. Family celebrations revolve around both Western holidays
    and traditional Goan festivals such as Easter, São João, and the Hindu Diwali observed in the wider community. The household places strong emphasis on respect for elders, modesty, and practical education,
    values that shape his straightforward, routine‑oriented outlook. Living in Palmetto, GA, he navigates a multicultural environment, balancing American teenage life with the culinary, musical, and religious
    traditions of his heritage.
attributes:
  skills: '["Computer troubleshooting", "Microsoft Office proficiency", "Basic automotive maintenance", "Traditional Goan/Indian cooking", "Bilingual in English and Konkani", "Conversational Hindi", "Strategic
    video gaming", "Attention to detail in repetitive tasks", "Simple personal budgeting"]'
  hobbies: '["Competitive online video gaming (shooters/strategy)", "Cooking traditional Goan dishes", "Watching cricket and Indian Premier League", "Morning runs and biking", "DIY electronics (Arduino
    projects)", "Reading technology blogs", "Listening to Bollywood and Goan folk music"]'
  career_goals: He aims to secure a stable, routine‑driven career that allows him to apply his practical technical skills while offering clear advancement steps. In the short term, he plans to earn the
    CompTIA A+ certification and obtain a help‑desk or IT support position at a local company in the Atlanta metro area. Over the next five years, he hopes to become a network support specialist, eventually
    moving into a supervisory role that still emphasizes consistent, day‑to‑day problem solving. Parallel to his IT path, he nurtures an ambition to launch a small catering side‑business focused on Goan
    cuisine, leveraging his cooking skills and cultural heritage. He sees both tracks as ways to achieve financial independence while maintaining a predictable schedule.
