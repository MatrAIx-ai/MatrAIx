  career_goals: Jeffrey plans to finish his GED within the next year and enroll in a community‑college program in communications or business. He aspires to become a radio host or event marketing specialist,
    leveraging his talkative nature and ability to organize events. Long‑term, he wants to launch his own podcast network focused on youth culture and local community stories, combining his competitive
    drive with his calm, resilient personality.
