persona_description: A financial analyst with expertise in insurance and catastrophe risk management, focusing on the analysis of global economic losses from natural and man-made disasters. They are particularly
  interested in the latest estimates from the Swiss Re Institute and are looking for insights into the trends and patterns in first-half economic losses over the past decade. They are also interested in
  the specific causes of the first-half losses, such as secondary perils and the role of thunderstorms in North America.
