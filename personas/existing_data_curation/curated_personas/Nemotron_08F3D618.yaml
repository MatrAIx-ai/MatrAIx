  hobbies: '[''Gardening'', ''Reading contemporary fiction and self‑help books'', ''Hiking and local trail walks'', ''Weekly yoga class'', ''Baking and recipe experimentation'', ''Community book club'',
    ''Crossword puzzles'', ''Sudoku'']'
  career_goals: Gracie aims to complete her bachelor's degree in accounting within the next two years and then pursue CPA certification. In the short term, she seeks a senior bookkeeping position or an
    internal audit assistant role that offers greater responsibility and exposure to financial analysis. Long‑term, she hopes to become a certified public accountant, eventually moving into an accounting
    manager role or launching her own boutique bookkeeping service for local small businesses, providing both financial expertise and personalized client support. She also wants to develop leadership skills
    to mentor junior staff and to create a more balanced work environment that reduces stress for herself and her team.
