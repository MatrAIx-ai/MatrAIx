  hobbies: '[''Soccer'', ''Dance classes'', ''Teen book club'', ''TikTok video creation'', ''YouTube video editing'', ''Hiking in the Sierra foothills'', ''Visiting farmer’s markets'', ''Neighborhood clean‑up
    volunteering'', ''Minecraft gaming'', ''Reading fantasy novels'', ''Cooking with fresh produce'']'
  career_goals: Amanda aims to complete her GED within the next year and enroll in a community college program focused on health sciences or agricultural technology. She is drawn to careers that blend her
    desire to help others with her practical curiosity, such as becoming a community health worker, medical assistant, or agricultural extension specialist. In the long term, she hopes to work at a local
    health clinic or farm cooperative where she can use her communication and organizational skills to educate peers about nutrition, preventive health, and sustainable farming practices. Amanda also dreams
    of eventually leading a youth‑focused community garden program that gives other teenagers hands‑on experience in horticulture and environmental stewardship.
