persona_description: A child psychologist who specializes in working with children who have experienced trauma and who are struggling with anxiety and depression. She is an advocate for the rights of children
  and is committed to helping them develop a sense of belonging and self-worth. She has a deep understanding of the ways in which social and emotional development can be impacted by traumatic experiences
  and has a passion for promoting positive mental health practices for children. She is also an advocate for the importance of early intervention and is dedicated to working with families and professionals
  to ensure that children receive the support and resources they need to thrive.
