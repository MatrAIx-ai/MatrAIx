  hobbies: '["Sketching and digital painting", "Reading graphic novels and contemporary literature", "Playing acoustic guitar", "Listening to indie/folk music", "Podcast listening (philosophy, psychology,
    art)", "Volunteering at local food pantry", "Participating in school environmental club", "Visiting art galleries at Youngstown State University", "Journaling", "Mindfulness meditation", "Learning basic
    web development (HTML/CSS)"]'
  career_goals: Timothy aspires to merge his love of visual art with his desire to help others. He plans to earn a scholarship to study graphic design or visual communication, aiming to become a graphic
    designer for non‑profit organizations or an art therapist who uses creative processes to support mental health. Long‑term, he hopes to serve as a community arts coordinator in Youngstown, curating exhibitions
    and workshops that foster creativity and well‑being among local youth. He is determined to complete high school, pursue higher education, and build a career that balances artistic expression with social
    impact.
