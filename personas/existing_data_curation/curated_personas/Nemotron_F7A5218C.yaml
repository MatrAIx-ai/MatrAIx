  hobbies: '["Reading South Asian literature","Cooking traditional meals","Yoga and mindfulness practice","Gardening","Nature walks","Knitting","Volunteering in library reading circles","Attending cultural
    community events"]'
  career_goals: Sumin aims to launch a community‑focused tutoring center in Newark that provides after‑school support and culturally responsive curricula for South Asian and underserved families. She plans
    to pursue a Master’s in Educational Leadership to qualify for a district curriculum specialist role, with the longer‑term ambition of influencing state‑wide policies on multilingual education. Additionally,
    she wishes to develop an online mentoring program for single parents re‑entering the workforce and to attain certification as a school counselor to offer holistic guidance to students.
