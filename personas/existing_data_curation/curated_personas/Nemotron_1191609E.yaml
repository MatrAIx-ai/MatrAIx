personas:
  professional: Fritzie Super, a veteran electrician with over twenty years of residential and commercial experience, blends meticulous blueprint reading, code‑compliance expertise, and a vibrant imagination
    to create sustainable smart‑home systems and striking LED art installations while mentoring apprentices and leading safety‑first job sites.
  sports: Fritzie Super cycles the coastal bike lanes with the Miami Cycling Club, follows the Miami Heat and Miami Dolphins religiously, squeezes in early morning jogs before work, and joins weekend pick‑up
    basketball games at the local community center to stay fit.
  arts: Fritzie Super draws creative energy from Jackson Pollock’s chaotic splatters, captures neon‑lit streets in homage to Andreas Gursky, curates a personal collection of limited‑edition prints by street‑artist
    SHE, and regularly immerses themselves in live performances by The Bad Plus and listening to Miles Davis vinyls to fuel their own abstract paintings.
  travel: Fritzie Super prefers meticulously plotted road trips along the Florida Keys, yet indulges in spontaneous weekend escapes to Barcelona for Gaudí’s luminous architecture and dreams of chasing the
    northern lights over Iceland’s icy fjords.
  culinary: Fritzie Super, an avid home chef, crafts spicy shrimp ceviche with lime, jalapeño, and mango, perfects slow‑roasted pork belly glazed with miso and honey, and savors late‑night street‑taco stands
    loading corn tortillas with pickled red onions, cilantro, and chipotle salsa.
  core: Fritzie Super is a disciplined dreamer who fuses precision wiring with kaleidoscopic LED art, yet habitually postpones tax filing until the last minute and often loses sleep over unfinished canvases.
background:
  cultural: Fritzie grew up in Miami’s diverse, multilingual environment, identifying as a white American of European ancestry while being deeply influenced by the city’s rich blend of Cuban, Haitian, and
    Caribbean cultures. He celebrates traditional American holidays, enjoys the local habit of sipping Cuban coffee, and frequently participates in neighborhood festivals that showcase Latin music and cuisine.
    This multicultural exposure shapes his appreciation for artistic expression and community collaboration, while his Floridian upbringing instills a laid‑back yet industrious ethos.
