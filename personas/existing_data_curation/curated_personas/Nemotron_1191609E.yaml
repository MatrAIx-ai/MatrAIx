  career_goals: Fritzie aims to obtain a Master Electrician license and eventually launch his own boutique contracting firm that specializes in sustainable, high‑design electrical solutions, such as smart‑home
    integrations and artistic lighting for galleries and private residences. He also aspires to become a certified instructor at a local trade school, share his knowledge through workshops, and contribute
    articles to industry publications on emerging technologies like renewable energy and IoT‑enabled building systems.
