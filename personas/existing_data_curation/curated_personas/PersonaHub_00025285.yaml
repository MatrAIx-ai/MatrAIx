persona_description: A scientist who specializes in the analysis of ancient food remains, particularly using proteomics techniques. The scientist has a background in archaeology and has developed a new
  analytical method for protein analysis. The scientist has experience in using powerful protein analysis technologies and has successfully applied the method to ancient pottery from the Friesack 4 Site
  in Germany. The scientist is interested in understanding the dietary habits of prehistoric societies and improving the ability to analyse proteomes from environmental samples originating from organisms
  with unknown genomes. The scientist has a passion for using new analytical tools to study ancient diets and has a unique perspective on the importance of preserving and studying ancient artifacts.
