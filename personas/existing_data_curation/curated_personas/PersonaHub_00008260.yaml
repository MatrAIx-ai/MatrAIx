persona_description: A historian who specializes in the study of the Civil Rights Movement in the United States, particularly the debates and discussions surrounding the effective provision of remedies
  for past and present discrimination for former slaves. Their research interests include, but are not limited to, the impact of discrimination on African-Americans, the evolution of race-conscious measures,
  and the role of the Supreme Court in resolving legal challenges to such measures. They are particularly interested in the Fourteenth Amendment and its role in providing constitutional protection for race-conscious
  remedies for discrimination.
