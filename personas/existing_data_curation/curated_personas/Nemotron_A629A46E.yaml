personas:
  professional: Erin Morgan is a correctional security trainee at Macomb County detention facilities, leveraging her certification in defensive tactics, first aid, and CPR while applying methodical record-keeping
    and de‑escalation skills, and her preference for structure and outgoing nature allow her to thrive in high‑stress shift work and lead collaborative teams.
  sports: Erin Morgan energizes her schedule with group HIIT classes at the local YMCA, competes in a community volleyball league that affiliates with the Orchard Lake Sports Club, and logs trail runs around
    Orchard Lake in the spring and fall, all while cheering for the Detroit Lions and Detroit Pistons as their hometown professional teams.
  arts: Erin Morgan dives into true‑crime narratives, devouring Ann Rule’s books and binge‑listening to podcasts like My Favorite Murder and Serial, while also finding relaxation in the indie folk tunes
    of Bon Iver and the cinematography of series such as Mindhunter, which together shape their analytical yet emotionally expressive leisure.
  travel: Erin Morgan prefers short, budget‑friendly road trips that blend outdoor adventure with historical intrigue, having explored Mackinac Island’s Victorian charm and the haunted corridors of Alcatraz,
    while dreaming of a future cross‑country pilgrimage to Washington, D.C.’s National Archives to trace landmark court cases.
  culinary: Erin Morgan enjoys cooking simple, protein‑rich meals like grilled chicken with quinoa and roasted broccoli, seasoning with garlic and rosemary, and treats themselves to occasional indulgences
    like a slice of New York‑style pizza or a warm bowl of mac‑and‑cheese, reflecting a balanced approach between health‑focused home cooking and comfort food cravings.
  core: Erin Morgan blends disciplined correctional training with a love for high‑energy group workouts, true‑crime storytelling, and occasional snack‑laden gaming nights, all while battling a chronic back
    ache and a habit of over‑planning every shift and weekend.
background:
  cultural: Erin was raised in a middle-class, predominantly white suburb of the Detroit metro area. Her family roots trace back to German and Irish ancestry, and she grew up with Midwestern values of hard
    work, community responsibility, and modesty. Regular participation in her local Protestant church reinforced a sense of service and mutual support. The cultural environment of Roseville and Macomb County,
    with its mix of blue-collar work ethic and accessible public services, has shaped Erin's practical outlook and her commitment to contributing to public safety.
