  skills: '["Inmate supervision","Conflict de-escalation","Report writing","Physical fitness","Defensive tactics","First aid & CPR","Legal protocol knowledge","Security equipment operation","Team communication","Record-keeping"]'
  hobbies: '["Group fitness classes","Running","Recreational volleyball","Reading true crime books and podcasts","Volunteering with youth mentorship program","Cooking","Co-op video gaming","Journaling"]'
  career_goals: Erin aims to become a fully certified Correctional Officer in the next year, completing her state certification and finishing an associate degree in Criminal Justice. In the midterm she
    hopes to advance to a supervisory role such as Sergeant, leading a shift team and overseeing a specialized unit, perhaps focusing on mental-health interventions or reentry programs. Long-term, she envisions
    a career path that moves beyond the facility walls into community corrections, policy development, or a leadership position such as Warden, where she can influence rehabilitation strategies and improve
    outcomes for both staff and inmates.
