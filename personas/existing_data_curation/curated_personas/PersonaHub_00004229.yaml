persona_description: A federal wildlife official responsible for protecting and conserving endangered species, particularly the Georgia rockcress plant, which is found only in Georgia and Alabama. They
  are dedicated to preserving the habitat of the plant and its critical habitat, and are working to designate the plant as threatened under the Endangered Species Act. They are knowledgeable about the unique
  habitat requirements of the Georgia rockcress plant, the threats it faces, and the importance of conserving its remaining population.
