personas:
  professional: Alfonso Rivera, a budding junior game designer, blends curiosity and practicality as they craft Scratch games, and their relaxed attitude toward deadlines allows them to improvise features
    while their outgoing, assertive nature shines when they lead group LEGO building sessions with friends.
  sports: Alfonso Rivera, a forward for the La Paz Youth Soccer Club's under-11 team, dedicates afternoons to fast-paced drills at the local park, cheers on Club America during family viewing parties, and
    balances their love for soccer with weekend hikes at Laguna de San Jacinto to stay fit.
  arts: Alfonso Rivera, an avid comic-strip creator, draws inspiration from classic Marvel legends such as Stan Lee and modern cartoonist Rius while listening to cumbia beats from Celso Piña and pop hits
    by Shakira, often sketching characters during soccer breaks and showcasing their art at the school cultural fair.
  travel: Alfonso Rivera prefers spontaneous, budget-friendly trips like weekend camping at Laguna de San Jacinto, day excursions to the fishing village of San Carballo, and dreams of trekking the copper-colored
    cliffs of the Sierra de la Laguna, planning each adventure on the fly with friends and family.
  culinary: Alfonso Rivera enjoys helping prepare tacos al pastor with pork, pineapple, and cilantro, crafting guacamole with fresh avocado, lime, and chipotle, and occasionally attempts to bake empanadas
    with cheese and oregano, balancing beginner cooking skills with a love for bold, savory flavors.
  core: Alfonso Rivera is a curious, energetic 10-year-old who builds LEGO worlds, codes Scratch games, and dances to cumbia, yet often misplaces homework and forgets to save allowance for long-term goals.
background:
  cultural: Alfonso was born and raised in Pharr, Texas, a border city in Hidalgo County with a vibrant Mexican‑American community. He grows up in a bilingual household where Spanish is spoken at home and
    English at school, giving him a deep connection to both cultures. His family celebrates Mexican traditions such as Día de los Muertos, Cinco de Mayo, and Christmas posadas, while also embracing Texan
    customs like Thanksgiving and local festivals. Attending a nearby elementary school, he learns U.S. history alongside Mexican heritage, and he participates in community events such as the Pharr Festival
    and youth soccer leagues. Close‑knit extended family ties, regular visits to grandparents, and involvement in a local church shape his sense of belonging, emphasizing values of family loyalty, hospitality,
    and hard work. This cultural blend influences his language fluency, food preferences, music taste, and his pride in being both Mexican and American.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Reading comprehension'', ''Basic arithmetic'', ''Digital literacy (tablet/computer usage)'', ''Introductory coding with Scratch'', ''Teamwork and
    collaboration'', ''Soccer ball handling and teamwork'', ''LEGO building and spatial reasoning'', ''Basic cooking assistance'', ''Peer leadership in play'']'
  hobbies: '[''Playing soccer'', ''Building with LEGO'', ''Creating games in Scratch'', ''Listening to music (regional Mexican, pop)'', ''Dancing (cumbia, freestyle)'', ''Drawing/comic art'', ''Exploring
    nature (bird watching, park visits)'', ''Helping with family cooking'', ''Playing video games (Minecraft, Super Mario)'', ''Participating in community festivals and youth sports leagues'']'
  career_goals: Alfonso dreams of one day becoming a professional soccer player who can inspire kids in his community, while also exploring a future in engineering or video‑game design to blend his love
    for building with technology. He hopes to attend a university that supports bilingual students, study STEM fields, and later work as a community mentor or STEM educator, helping other young people discover
    the fun of creation and teamwork.
