personas:
  professional: Nancy Erwin is a veteran sheet metal fabricator with over 20 years mastering press brakes, CNC benders, and MIG/TIG welding, who blends precise engineering with a budding artistic vision
    as they prepare to step into a foreman role, mentor apprentices, and lay the groundwork for a boutique metal‑art studio.
  sports: Nancy Erwin supports the Detroit Lions and Detroit Tigers, attends local amateur softball games, and participates in a weekend jogging group that meets at Belle Isle Park, where they keep lightly
    active while staying connected to their community’s sports culture.
  arts: Nancy Erwin draws inspiration from the watercolor landscapes of Claude Monet and the architectural sketches of Hugh Ferriss, regularly visits the Detroit Institute of Arts and community craft fairs,
    and admires the music of Joanna Newsom and the cinematic storytelling of Denis Villeneuve, which they incorporate into their own artistic practice.
  travel: Nancy Erwin prefers structured road trips that blend industrial tourism with nature, having driven the historic Great River Road to explore the Rust Belt’s steel mills in Youngstown and dreaming
    of a future pilgrimage to the shipyards of Bilbao and the gardens of Kyoto, where they hope to capture new visual motifs for their work.
  culinary: Nancy Erwin enjoys farm‑to‑table meals featuring home‑grown heirloom tomatoes, fresh basil, and grilled salmon seasoned with lemon zest, often preparing a rustic ratatouille or a smoky BBQ pulled
    pork sandwich on sourdough while pairing it with a chilled glass of Pinot Noir, which they relish as a creative culinary break.
  core: Nancy Erwin is a meticulous metalworker with a quiet, competitive edge, an eye for art, and a tendency to over‑worry, which fuels both their drive to launch a metal‑art studio and they often stay
    up late polishing welds.
background:
  cultural: Nancy grew up in the rural outskirts of Madison County, Alabama, in a family of German-Irish descent that valued hard work, self-reliance, and community ties. Her father worked in a nearby metal
    plant while her mother was active in the local church, instilling a blend of Southern hospitality and pragmatic skepticism. She earned an associate degree in industrial technology from a community college,
    which opened the path to her sheet-metal career. The regional culture—marked by country fairs, Southern folk music, and a modest appreciation for craft—has shaped her appreciation for both functional
    work and artistic expression, while her proximity to Huntsville's aerospace industry sparked an early fascination with engineering and unconventional ideas.
