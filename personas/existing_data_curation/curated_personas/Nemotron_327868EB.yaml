  hobbies: '[''Watercolor painting'', ''Sketching architectural details'', ''Visiting art galleries'', ''Industrial photography'', ''Reading science-fiction and mystery novels'', ''Gardening'', ''Woodworking
    club'', ''Vintage car restoration'']'
  career_goals: Looking ahead, Nancy aims to transition into a supervisory role, such as shift foreman or shop manager, where she can leverage her competitive drive to lead a high-performing team. She is
    pursuing advanced welding certification and a small-business certificate to eventually launch a boutique metal-art studio that blends functional fabrication with the artistic designs she admires. Additionally,
    she hopes to mentor younger workers, improve safety metrics on her current site, and secure a position that balances her professional ambitions with reduced stress.
