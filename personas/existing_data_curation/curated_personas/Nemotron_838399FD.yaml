personas:
  professional: A seasoned security guard and gambling surveillance officer, Hilda Velasco applies over twenty years of meticulous CCTV monitoring, risk assessment, and calm de-escalation to pursue a Certified
    Protection Professional credential and a supervisory role, and they mentor new hires with a methodical, detail-oriented approach that reflects their preference for structure and predictability.
  sports: An avid outdoors enthusiast, Hilda Velasco hikes the nearby Appalachian Trail each spring, practices target shooting at the Morgan County range to maintain firearm proficiency, supports the West
    Virginia Mountaineers football team, and they occasionally join a local women's softball league for light competition.
  arts: A dedicated member of a community quilting circle, Hilda Velasco knits sweaters and scarves for family, spends evenings solving crossword puzzles and devouring mystery novels by Sue Grafton, they
    enjoy listening to bluegrass virtuoso Bill Monroe while gardening, and they occasionally attend local folk music gatherings.
  travel: Hilda Velasco prefers methodical travel plans, taking weekend drives to Shenandoah National Park for bird-watching, scheduling an annual visit to historic Williamsburg, they harbor a dream of
    a summer tour through Provence's lavender fields, and they balance these trips with a modest travel fund that aligns with their careful budgeting.
  culinary: A garden-to-table cook, Hilda Velasco harvests tomatoes, peppers, and herbs to craft spicy salsa, herb-infused chicken soup, and rosemary focaccia, they relish a slice of homemade blackberry
    pie on Sundays, and they keep a well-stocked pantry of dried beans, quinoa, and locally sourced honey for quick meals.
  core: Hilda Velasco is a disciplined, solitary guardian of community safety who blends meticulous surveillance work with soothing garden rituals, steady budgeting, and a steady stream of mystery novels,
    and they maintain a pragmatic, low-key lifestyle.
background:
  cultural: Hilda grew up in the rugged foothills of the Appalachian region in West Virginia, immersed in a culture that values self-reliance, community solidarity, and modesty. Her family has deep roots
    in Morgan County, with generations who worked in mining, logging, and local agriculture. The community’s strong church presence, folk music traditions, and emphasis on hard work have shaped her pragmatic
    outlook and respectful demeanor. While identifying as white American, she embraces the regional heritage of storytelling, seasonal festivals, and a close‑knit neighborly network that informs her sense
    of duty and her commitment to public safety.
attributes:
  skills: '["Real-time video surveillance", "Incident detection and reporting", "Risk assessment", "Conflict de-escalation", "Emergency response coordination", "CCTV system operation", "Digital evidence
    management", "First aid and CPR", "Regulatory compliance (WV gambling regulations)", "Staff training and mentorship"]'
  hobbies: '["Gardening (vegetable and herb beds)", "Bird watching", "Crossword puzzles and Sudoku", "Reading mystery and true‑crime novels", "Knitting simple sweaters", "Weekend hikes on Appalachian trails",
    "Community quilting circle", "Target shooting practice at local range"]'
  career_goals: Hilda aims to advance to a supervisory role within the state gaming surveillance division, seeking certification as a Certified Protection Professional (CPP) and advanced training in forensic
    video analysis. She hopes to lead a team that develops standardized incident response protocols and eventually transition into a training coordinator position where she can mentor new security officers.
    Additionally, she is interested in contributing to community safety initiatives in Morgan County, such as organizing volunteer watch programs and providing public‑safety workshops.
