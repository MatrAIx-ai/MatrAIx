  career_goals: Gail aims to move into a supervisory role within the local hospitality sector, such as shift supervisor or assistant manager at a community café or catering service. She plans to obtain
    a Certified Hospitality Supervisor credential and to enroll in a part‑time bachelor's program in Hospitality Management to deepen her leadership knowledge. Long‑term, she envisions launching a small
    farm‑to‑table catering business that highlights Kittson County’s seasonal produce and traditional dishes, while also mentoring younger staff and volunteering to organize community food events. Her ambition
    is to blend her love of service with her appreciation for local culture and art, creating experiences that bring people together.
