personas:
  professional: Susan Felix is a retail associate who leverages her cash‑handling precision, quick mental math, and conflict‑de‑escalation talent to keep the checkout line moving smoothly, yet they often
    feel the tug between their love for predictable schedules and a spontaneous urge to rearrange tasks, leading them to adopt a habit of making color‑coded shift checklists that they sometimes forget to
    update.
  sports: Susan Felix hikes the Saguaro National Park trails whenever the desert heat eases, punches in at the local yoga studio twice a week, roots for the Tucson Roadrunners in hockey and the Arizona
    Diamondbacks in baseball, and belongs to the Tucson Trail Runners club where they occasionally join group runs but often skip the early‑morning workouts after a late night at a music bar.
  arts: Susan Felix is a DIY craft enthusiast who spends evenings upcycling vintage pottery into desert‑themed planters while grooving to live sets by the G‑Club at Club Congress, and they devour mystery
    novels from Agatha Christie and Tana French, allowing the twists to inspire their own improvisational storytelling during craft nights.
  travel: Susan Felix prefers weekend road trips that balance adventure with comfort—they’ve already explored Sedona’s red rocks, spent a long weekend in Santa Fe’s art market, dream of a spring getaway
    to Oaxaca for its vibrant food scene, and keep their travel plans loosely organized in a handwritten planner they sometimes forget to bring.
  culinary: Susan Felix cooks at a moderate skill level, mastering smoky green‑chile enchiladas, cactus‑infused tacos, and spiced prickly‑pear margaritas, and they enjoy testing new ingredients like epazote
    and mesquite flour, though they sometimes burn the edges of their roasted peppers when multitasking between a busy shift and a craft project.
  core: Susan Felix is a practical yet impulsively creative retail worker who balances structured budgeting with spontaneous boutique‑dream décor, wrestles with organization but thrives on community‑focused
    yoga and desert hikes, and can be found upcycling pottery while humming to local live music.
background:
  cultural: Susan grew up in a middle‑class family in Tucson, Arizona, immersed in the blend of American Southwest culture and the region's Mexican influences. She celebrates typical American holidays like
    Thanksgiving and Fourth of July while also enjoying regional traditions such as local Paso festivals and desert‑inspired community events. Her upbringing emphasized independence, self‑reliance, and
    a strong sense of community, values that continue to shape her outlook and daily life.
attributes:
  skills: '[''Cash handling'', ''Point-of-sale (POS) system operation'', ''Customer service'', ''Basic mental math'', ''Inventory monitoring'', ''Conflict resolution'', ''Adaptability to changing priorities'',
    ''Effective communication'', ''On-the-job time management'', ''Basic Spanish proficiency'']'
  hobbies: '[''Hiking the Sonoran Desert trails'', ''Cooking Southwestern cuisine'', ''Reading mystery novels'', ''Yoga classes'', ''Attending local live music events'', ''DIY crafts'', ''Playing casual
    video games'', ''Volunteering at the community food bank'']'
  career_goals: Susan aims to earn her GED within the next year and then pursue an associate degree in business administration to qualify for a supervisory role in retail. She hopes to become a shift manager,
    where she can blend structured scheduling with the flexibility she enjoys. Long‑term, she envisions opening a small boutique coffee shop that reflects Tucson's desert vibe, allowing her to combine customer
    service experience with her love for community gathering and creative design.
