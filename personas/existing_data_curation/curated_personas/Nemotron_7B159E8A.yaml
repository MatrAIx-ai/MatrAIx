personas:
  professional: Taylor Bourque, a seasoned retail sales specialist with more than 30 years of experience, leverages their curiosity-driven mastery of POS systems, visual merchandising, and staff mentorship
    to drive sales while balancing organized processes with a flexible, competitive edge, aiming to become a store manager and regional trainer before launching a locally sourced home-decor boutique.
  sports: Taylor Bourque stays active by hiking the nearby Blue Ridge Trail with the Perry Outdoor Explorers club and cheering on the Perry High School Panthers football team each fall, while preferring
    low-impact workouts such as gardening and occasional community yoga sessions over intense gym routines.
  arts: Taylor Bourque weaves a love for the arts through choir renditions of Handel, quilting inspired by Faith Ringgold's narrative patterns, devouring novels by Jane Austen in the book club, and savoring
    concerts of country legend Chris Stapleton whenever they can, letting these creative outlets shape their community-centric identity.
  travel: Taylor Bourque prefers relaxed, short-haul road trips that combine culinary stops - like a weekend tasting tour of Savannah's shrimp and grits - with family-friendly hikes along the Blue Ridge
    Parkway, while dreaming of an overseas culinary pilgrimage to Oaxaca, Mexico, though retirement budgeting keeps long-distance voyages on hold.
  culinary: Taylor Bourque expertly prepares Southern comfort foods - such as buttermilk biscuits, collard greens simmered with smoked turkey, and shrimp and grits - while experimenting with honey-glazed
    carrots from their garden, and they often host potluck nights where friends sample their latest fusion of sweet potato jalapeño casserole.
  core: Taylor Bourque blends a competitive retail drive with a community-first spirit, balancing meticulous budgeting and health monitoring against a penchant for spontaneous garden-tool purchases and
    late-night quilting marathons.
background:
  cultural: 'Taylor was raised in a small town in central Georgia, immersed in Southern hospitality and close‑knit community values. Her family carries French‑Canadian ancestry reflected in the Bourque
    name, but her upbringing reflects the traditions of rural Georgia: self‑reliance, hard work, and strong family ties. A lifelong member of her local Baptist church, she values neighborliness, agricultural
    heritage, and participation in regional festivals, all of which shape her outlook and social interactions.'
