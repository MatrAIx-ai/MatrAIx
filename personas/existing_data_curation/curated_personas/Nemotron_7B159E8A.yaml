  career_goals: Taylor aims to advance to a store manager role within the next two years, leading her team to exceed sales targets and elevate customer satisfaction metrics. She also aspires to become a
    regional trainer, sharing best practices across multiple locations, and eventually launch her own boutique focusing on locally sourced home décor. Her goals combine a competitive drive for achievement,
    a desire for leadership, and the practical aim of securing financial stability before retirement.
