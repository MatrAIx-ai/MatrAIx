  hobbies: '[''Gardening'', ''Quilting'', ''Cooking and baking traditional Pennsylvania Dutch dishes'', ''Birdwatching'', ''Hiking local trails'', ''Genealogy research'', ''Reading historical fiction'',
    ''Attending community theater'', ''Volunteering at the local library'', ''Participating in the Kutztown Folk Festival'', ''Digital photography'']'
  career_goals: Mary aims to transition from full‑time clerical work to a part‑time mentorship role, training younger office staff in efficient record‑keeping and customer‑service practices. She plans to
    earn a certification in community volunteer management within the next two years so she can expand her involvement at the local senior center and the Kutztown Historical Society. Leveraging her curiosity
    for new ideas, Mary intends to launch a modest home‑based craft business that combines her love of quilting with traditional Pennsylvania Dutch recipes, selling handcrafted quilts and homemade preserves
    at local markets. In parallel, she wishes to improve her personal organization through short courses, enabling her to balance part‑time work, volunteer commitments, and personal projects before fully
    retiring.
