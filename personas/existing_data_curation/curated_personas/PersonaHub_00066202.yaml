persona_description: A marine biologist with a focus on biological oceanography, fisheries dynamics, and physiological ecology. The individual is interested in understanding the role of oceanographic features,
  such as boundary currents, eddies, and upwelling events, on the distribution and production of zooplankton and larval fish. They are also interested in developing databases of estuarine size-spectra and
  zooplankton size-spectra, and studying the ecosystem demand by predatory fish, particularly juvenile fish, and the diet, growth, and biogenetics of a species from juvenile to adult. Additionally, they
  are interested in the development of artificial reefs and fish stocking tools, and in integrating individual, population, and ecosystem processes to provide a sound ecological basis for these tools.
