  hobbies: '[''Visiting art galleries and painting'', ''Community theater stage management'', ''Kayaking and coastal explorations'', ''Native plant gardening'', ''Traveling to culinary festivals'', ''Salsa
    dancing'', ''Reading contemporary non-fiction'', ''Hosting dinner parties'', ''DIY home improvement projects'', ''Volunteering at local arts council'']'
  career_goals: Whitney aims to leverage her extensive operations background to step into a Vice President of Operations role within the next three years, where she can champion a culture of flexible, innovation‑friendly
    processes across multiple sites. She wants to design and roll out a proprietary 'Adaptive Operations Framework' that blends lean efficiency with creative design thinking, positioning her company as
    an industry benchmark. Simultaneously, she plans to mentor emerging managers, establishing a regional leadership network that emphasizes resilience and open‑mind collaboration. In the longer term, she
    envisions founding a boutique consulting practice that helps small and midsize businesses in the Gulf Coast region adopt agile operational strategies while integrating community‑oriented initiatives,
    such as local arts collaborations. Additionally, she hopes to complete a Lean Six Sigma Black Belt certification to formalize her expertise.
