personas:
  professional: An operations veteran with three decades of manufacturing and distribution leadership, Whitney Goorley leverages data‑driven lean and Six Sigma expertise to streamline workflows while injecting
    artistic flair into workspace design, using their curiosity and sociable style to motivate high‑energy teams toward flexible, innovation‑friendly processes.
  sports: A weekend kayaker and member of the Intracoastal Paddle Club, Whitney Goorley follows the Miami Heat and the Tampa Bay Rays, plays casual tennis at the community center during cooler months, and
    joins a local senior walking group to stay fit, preferring low‑impact water activities over high‑intensity gym routines.
  arts: An avid patron of the arts, Whitney Goorley regularly attends gallery openings featuring contemporary watercolorists like Jane Hsu, volunteers as stage manager for the Coral Springs Community Theater
    where they coordinate productions of classic musicals, and draws inspiration from musicians such as Yo‑Yo Ma and jazz vocalist Diana Krall, which fuels their own watercolor paintings of Florida’s coastline.
  travel: A curious traveler, Whitney Goorley has explored culinary festivals in New Orleans, Oaxaca, and Barcelona, loves spontaneous weekend getaways to the Florida Keys, and dreams of a culinary pilgrimage
    to Sicily’s markets, always packing a sketchbook to capture new scenery.
  culinary: An adventurous palate, Whitney Goorley delights in dishes like Cuban‑style mojo shrimp, Vietnamese bánh xèo, and the occasional daring tasting of Icelandic fermented shark, while at home they
    skillfully whisk up fresh citrus‑infused ceviche using locally sourced sea bass and garnish with hand‑picked basil and cilantro from their garden.
  core: Whitney Goorley blends operational rigor with artistic spontaneity, thriving on social connection, occasional disorganization, competitive drive, and a relentless curiosity that fuels both career
    ambition and eclectic personal pursuits.
background:
  cultural: Whitney is a White American who grew up in a modest, middle‑class family in a small town in the Florida Panhandle. Her upbringing was steeped in Southern hospitality and a strong sense of community—values
    that still shape her interpersonal style and competitive drive. The region’s blend of rural, coastal, and emerging arts influences gave her a pragmatic work ethic alongside an appreciation for creative
    expression. Frequent family gatherings at local churches and community potlucks reinforced her sociable, outgoing nature, while exposure to the Gulf Coast’s fishing and boating culture fostered a love
    for outdoor recreation. As an adult, she has embraced the multicultural nuances of Freeport life, participating in the town’s arts council and supporting regional festivals, thereby melding traditional
    Southern roots with contemporary, open‑minded perspectives.
