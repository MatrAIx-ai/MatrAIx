  hobbies: '[''Cooking Salvadoran cuisine'', ''Urban gardening'', ''Walking and photography'', ''Senior center dancing'', ''Community theater set design'', ''Reading historical fiction and biographies'',
    ''Book club (Latin American literature)'', ''Yoga'', ''Spanish-language knitting circle'']'
  career_goals: Although no longer employed full‑time, Viviana aims to stay intellectually active by mentoring the next generation of Latino engineers, particularly girls from underserved neighborhoods
    in Los Angeles. She aspires to lead a volunteer STEM outreach program that integrates hands‑on engineering projects with cultural storytelling, bridging her technical background with her Salvadoran
    heritage. Additionally, she hopes to document her family’s immigration journey in a memoir, advocate for senior accessibility in community tech centers, and collaborate with local museums to create
    exhibits highlighting Salvadoran contributions to science and engineering.
