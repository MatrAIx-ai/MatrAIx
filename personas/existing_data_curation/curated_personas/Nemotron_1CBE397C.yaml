personas:
  professional: Viviana Ramirez, a retired aerospace manufacturing engineer who once optimized wing structures and led quality control initiatives, now mentors aspiring engineers from underrepresented neighborhoods,
    translates complex mechanics into accessible workshops, and channels her sociable, compassionate, and flexible nature into hands‑on STEM outreach that blends technical rigor with storytelling.
  sports: Viviana Ramirez, a regular participant in the Griffith Park Senior Walking Club who enjoys daily skyline walks, cheers on the Los Angeles Lakers, Dodgers, and Galaxy, and attends weekly salsa‑dance
    fitness sessions at the community center, balances casual activity with team spirit.
  arts: Viviana Ramirez, a volunteer set‑designer for a local community theater, sings cumbia and salsa to the rhythms of Celia Cruz and Marc Anthony, reads Gabriel García Márquez and Isabel Allende in
    book club gatherings, and infuses her love of storytelling into every artistic endeavor.
  travel: Viviana Ramirez, who has explored the historic streets of Oaxaca, the colonial charm of Cartagena, and the desert art scene of Santa Fe, dreams of a pilgrimage to Seville’s Feria and prefers group
    tours that accommodate her senior schedule and modest budget.
  culinary: Viviana Ramirez, a master of pupusas filled with loroco, queso fresco, and chipilín, also prepares aromatic sopa de pata, experiments with Thai basil and chilies from her garden, and delights
    in sharing her plates at neighborhood potlucks while occasionally over‑seasoning in her enthusiastic cooking style.
  core: Viviana Ramirez, a vivacious 74‑year‑old former aerospace engineer turned community mentor, blends technical precision with a love for dance, cooking, and storytelling, never missing a chance to
    brighten a room with a pupusa or a witty anecdote.
background:
  cultural: Viviana was born in San Salvador and came to the United States as a teenager during the Salvadoran civil war, settling in Los Angeles where a vibrant Salvadoran diaspora offered a sense of community.
    She retains strong ties to her roots, speaking Spanish at home, celebrating traditional holidays such as Día de los Flores and Día de los Muertos with a Salvadoran twist, and regularly attending the
    annual Feria Carnaval in the city’s Little Salvador. Her Catholic upbringing informs her values of compassion and service, while her immigrant experience fuels a deep appreciation for cultural diversity
    and resilience. Over the decades, she has blended Salvadoran customs with broader American influences, creating a rich bicultural identity that she proudly shares through food, storytelling, and community
    involvement.
