  career_goals: Danny dreams of becoming a robotics engineer or software developer who designs autonomous systems for marine and aerospace applications. He aims to attend a STEM‑focused high school, earn
    a scholarship, and eventually work for a cutting‑edge tech company or a local maritime engineering firm in the Bay Area. His long‑term ambition is to lead a team that builds competition‑winning robots
    and to contribute to innovative projects that combine his love of mechanics, coding, and practical problem‑solving. He is motivated to deepen his coding skills, master advanced robotics, and develop
    a portfolio that showcases his methodical engineering approach.
