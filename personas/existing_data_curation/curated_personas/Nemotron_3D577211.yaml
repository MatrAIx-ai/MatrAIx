  hobbies: '[''Attending community events'', ''Church participation'', ''Jazz concerts'', ''Reading African-American literature'', ''Writing essays and poetry'', ''Cooking Southern and Creole dishes'',
    ''Gardening'', ''Volunteering at food pantry'', ''Mentoring students'', ''Storytelling circles'']'
  career_goals: Brian aims to channel his experience and passion for community into leadership roles within local non‑profit organizations. He wants to design and run intergenerational storytelling workshops,
    mentor youth, and become a trusted advisor for cultural programs in Granada Hills. Over time he hopes to publish a collection of essays or a memoir reflecting his life as a Black man in Los Angeles,
    and to serve on the city’s arts and cultural advisory council, all pursued at a flexible pace that respects his desire for a balanced, low‑stress lifestyle.
