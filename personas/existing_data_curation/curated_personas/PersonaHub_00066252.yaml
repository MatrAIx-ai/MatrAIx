persona_description: A NASA scientist and engineer who specializes in X-ray communication and navigation technologies, particularly those related to the MXS device and its use in generating rapid-fire X-ray
  pulses and transmitting encoded digital bits for transmission. His research interests include developing advanced X-ray communication and navigation technologies and demonstrating their effectiveness
  in space. He has experience with Goddard-developed computing and navigation technologies and has successfully carried out multiple X-ray navigation experiments on the NICER mission. He is interested in
  capturing the attention of those planning NASA's next era of human spaceflight and is currently working on the XCOM demonstration as part of the NICER mission.
