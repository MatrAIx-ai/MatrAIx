    User 2: I bet. Do you have any funny stories from your time as a mortician?

    User 1: Sure, I have a few. One time, I was embalming a body and the family came in to say goodbye. The body was not as stiff as I thought it would be, so when the family member went to kiss the forehead,
    the head fell off.

    User 2: Oh my gosh, that''s terrible!

    User 1: Yeah, it was pretty funny though.

    User 2: I''m sure it was! So, what are some of your hobbies?

    User 1: I like to collect stamps, I want to learn how to fly an airplane, and my favorite movie is Dirty Harry.

    User 2: Those are all interesting hobbies. I''ve never collected stamps, but I love flying. I''ve been a pilot for 10 years.

    User 1: That''s awesome! I''m jealous. I''ve always wanted to learn how to fly, but I''ve never had the time or money.

    User 2: You should definitely try it sometime. It''s a lot of fun.

    User 1: I will, thanks for the suggestion.

    User 2: You''re welcome. So, what do you like to do for fun?

    User 1: I like to go to the movies, I love sunny days, and I love coffee.

    User 2: Those are all great things. I like going to the movies too, but I''m not a big fan of sunny days. I prefer rainy days.

    User 1: I love rainy days too! I think they''re so relaxing.

    User 2: Me too! So, what do you like to do on rainy days?

    User 1: I like to stay inside and watch movies, or I like to go for walks in the rain.

    User 2: Those are both great things to do on a rainy day.'
