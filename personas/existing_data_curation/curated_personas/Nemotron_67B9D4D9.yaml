  career_goals: Although he is no longer seeking full‑time employment, Alejandro wants to leave a lasting impact on his community by establishing a sustainable apprenticeship program for young people interested
    in maritime trades. He hopes to partner with the local community college to develop a hands‑on curriculum that blends traditional techniques with emerging technologies such as CNC machining and renewable‑energy
    retrofits for ships. He also aspires to author a concise guidebook on San Pedro’s maritime heritage, weaving historical anecdotes with practical advice for hobbyist boaters. These ambitions reflect
    his curiosity for new ideas while staying grounded in the practical knowledge he has accumulated over a lifetime.
