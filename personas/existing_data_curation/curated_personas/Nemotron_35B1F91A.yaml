personas:
  professional: A full‑stack developer named Felix Ball leverages Python, TypeScript, and AWS to build reliable, well‑documented applications, applying test‑driven development, CI/CD pipelines, and disciplined
    Agile Scrum practices while mentoring junior team members and planning a transition to senior and architecture roles.
  sports: Felix Ball regularly hikes the Rogue River Canyon, cycles on the Medford Loop with the Medford Cycling Club, and fishes on Lake Floyd, while cheering for the Portland Timbers and the Oregon Ducks
    football team on weekends.
  arts: Felix Ball unwinds with science‑fiction novels like Neal Stephenson’s Snow Crash, enjoys the ambient soundtracks of Brian Eno, attends the Oregon Shakespeare Festival, and curates a vinyl collection
    featuring The War on Drugs and Fleet Foxes, which fuels their creative problem‑solving.
  travel: Felix Ball prefers meticulously planned trips, having explored the Oregon Coast, Crater Lake, and a week‑long cycling tour of the Pacific Northwest, and they dream of hiking the Tongariro Alpine
    Crossing in New Zealand while balancing travel costs with their family’s budget.
  culinary: Felix Ball favors hearty Pacific Northwest fare, often grilling fresh trout with lemon‑dill butter, roasting root vegetables with rosemary, and brewing pour‑over coffee using Ethiopian Yirgacheffe
    beans, while experimenting with a home‑brew coffee setup on weekends.
  core: Felix Ball blends a structured, detail‑oriented mindset with a love for vintage motorcycles, methodical coding, and planned outdoor adventures, all while balancing family life and an occasional
    splurge on hobby supplies.
background:
  cultural: Felix grew up in a small town in the Pacific Northwest, raised in a middle‑class, white American family that valued self‑reliance and community involvement. He left formal schooling early but
    pursued his passion for computers through online courses, community hackathons, and mentorship from local tech enthusiasts. Living in Medford, Oregon, he embraces the region’s love for outdoor recreation
    and its pragmatic, cooperative spirit. His cultural outlook blends a down‑to‑earth work ethic with a respect for the collaboration and harmony prized in his community, influencing both his professional
    style and personal life.
attributes:
  skills: '[''Python'', ''JavaScript'', ''TypeScript'', ''Node.js'', ''React'', ''Vue'', ''SQL (PostgreSQL, MySQL)'', ''Git'', ''Agile (Scrum)'', ''Test‑Driven Development'', ''CI/CD (GitHub Actions, Jenkins)'',
    ''AWS (EC2, S3, Lambda)'', ''System Design'']'
  hobbies: '[''Hiking (Rogue River Canyon)'', ''Fishing'', ''Cycling'', ''Motorcycle restoration'', ''Board games'', ''Coffee brewing'', ''Reading (science‑fiction, software architecture)'', ''Volunteer
    coding mentor'']'
  career_goals: Felix aims to become a senior software engineer within the next three years, eventually moving into a lead or architecture role where he can shape development processes and mentor junior
    developers. He plans to earn AWS Solutions Architect certification and a Certified Scrum Master credential to formalize his expertise. Long‑term, he hopes to contribute to a stable, product‑focused
    team that delivers dependable services, allowing him to maintain a predictable work‑life balance for his family. He is also open to leading a small remote team that builds tools for local businesses
    in the Rogue Valley, combining his technical skills with his desire for community impact.
