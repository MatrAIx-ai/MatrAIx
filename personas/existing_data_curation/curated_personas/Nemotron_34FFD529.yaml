  career_goals: Approaching retirement, Chang aims to transition from full‑time labor to a part‑time mentor and consultant role, guiding younger workers on both technical and artistic aspects of construction.
    He hopes to establish a modest side business offering bespoke home‑improvement projects that blend structural integrity with aesthetic detail, such as custom tile mosaics and decorative plasterwork.
    Additionally, Chang is interested in volunteering with local heritage groups to help preserve historic buildings in Queens, sharing his knowledge while staying connected to his community. He also plans
    to enroll in a community‑college course on sustainable building practices to keep his skills contemporary.
