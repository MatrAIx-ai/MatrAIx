  career_goals: Mayra dreams of one day turning her love for art and curiosity about the world into a career as an illustrator or a museum curator, where she can share stories from diverse cultures. She
    also imagines exploring scientific topics, hoping to become a research assistant in environmental science to help protect natural habitats like the Andes and local parks.
