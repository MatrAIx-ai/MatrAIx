personas:
  professional: Mayra Borge, a ten‑year‑old aspiring junior architect, combines methodical planning and a love for wildlife sketches to craft miniature building models, channeling their curiosity and solitary
    focus into disciplined design practice.
  sports: Mayra Borge, a ten‑year‑old, prefers solitary outdoor activity, spending weekends hiking the local Redwood Trail with a sketchbook while belonging to the junior hiking club, cheering for the San
    Francisco Giants and the national women’s soccer team, and practicing beginner yoga at home to stay flexible.
  arts: Mayra Borge, a ten‑year‑old, draws detailed wildlife and Gothic architecture sketches while listening to Beethoven’s Symphony No. 5, admires John James Audubon’s bird paintings and Zaha Hadid’s
    futuristic structures, and immerses themselves in animated adaptations of fantasy novels for creative inspiration.
  travel: Mayra Borge, a ten‑year‑old, enjoys meticulously planned weekend trips to Redwood National Forest, dreams of trekking the Inca Trail to Machu Picchu, collects postcards from the Great Barrier
    Reef and Iceland, and balances a love for quiet nature with careful budgeting for family vacations.
  culinary: Mayra Borge, a ten‑year‑old, helps prepare simple Peruvian dishes like causa rellena and lomo saltado, delights in the bright spice of aji amarillo, experiments with drawing food plating, and
    prefers homemade quinoa salads over fast‑food meals.
  core: Mayra Borge, a ten‑year‑old art‑obsessed introvert, channels curiosity into meticulous sketches, orders their world with careful plans, and navigates life with quiet kindness that sometimes borders
    on obsessive perfectionism.
background:
  cultural: Mayra grows up in a bilingual Peruvian‑American household in Arlington, Virginia. Her family celebrates traditional Peruvian holidays such as Inti Raymi and Día de la Canción, teaches her to
    speak Spanish, and shares stories about Andean folklore. While she attends a multicultural public school, she maintains strong ties to her heritage through family meals featuring ceviche, quinoa, and
    lúcuma desserts, and by participating in community events at the local Peruvian cultural center. This blend of Peruvian roots and American upbringing shapes her worldview, fostering a deep respect for
    cultural diversity and artistic expression.
