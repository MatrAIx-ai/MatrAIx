  career_goals: Marta envisions a career that fuses technology with artistic expression. She aims to become a creative technologist or UI/UX designer at a forward‑thinking startup or cultural institution
    where she can craft interactive experiences and data‑driven art installations. Recognizing her sensitivity to stress, she seeks roles that offer flexible hours, collaborative team cultures, and supportive
    mental‑health resources. To deepen her expertise, she plans to pursue a master’s program in Human‑Computer Interaction or a short‑term certification in user experience design. Long‑term, she hopes to
    launch a freelance studio that partners with local artists and community organizations to develop immersive, tech‑enhanced public art projects in the Sonoran Desert region.
