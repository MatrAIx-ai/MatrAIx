  hobbies: '[''hiking'', ''nature photography'', ''woodworking'', ''restoring vintage tools'', ''reading science‑fiction'', ''reading technical manuals'', ''logic puzzles'', ''Sudoku'', ''online strategy
    gaming'', ''baking and cooking'']'
  career_goals: Maria aims to move into a supervisory role within production, such as shift lead or production coordinator, within the next three to five years. She plans to enroll part‑time in an associate's
    program in industrial technology and obtain certifications in CNC programming and occupational safety. Long‑term, she aspires to become a plant manager or start her own small‑scale manufacturing venture
    focused on sustainable, locally sourced products.
