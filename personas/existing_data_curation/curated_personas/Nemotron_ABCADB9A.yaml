personas:
  professional: Maria Ross is a production technician specializing in CNC operation, lean quality control, and safety compliance, who methodically logs every shift detail while they quietly strategize a
    path toward a supervisory role.
  sports: Maria Ross is a dedicated hiker who scales the foothills of the Snake River Plain each weekend, participates in the local outdoor recreation club, supports the Boise State Broncos football team,
    and engages in off-season snowshoeing and occasional pickup basketball at the community gym to maintain practical, functional fitness.
  arts: Maria Ross immerses in the arts through landscape photography inspired by Ansel Adams, reads classic science-fiction by Isaac Asimov, enjoys the folk-rock storytelling of The Lumineers, and crafts
    wooden décor while listening to Alison Krauss, letting these creative outlets balance their methodical work life.
  travel: Maria Ross prefers low-key, nature-focused trips, having explored Yellowstone and the Oregon Coast on a shoestring budget, and dreams of backpacking the Canadian Rockies and the alpine trails
    of Switzerland when their savings finally allow a longer, self-planned adventure.
  culinary: Maria Ross is an avid home baker who meticulously crafts sourdough and whole-wheat rustic loaves using locally milled flour, rosemary, and sea salt, while they also relish hearty beef stew with
    root vegetables and occasionally treat themselves to a simple cheeseburger at the family-run diner.
  core: Maria Ross combines relentless pragmatism with quiet curiosity, thriving on methodical problem-solving while hoarding spare screws and occasionally losing track of time on weekend photo expeditions.
background:
  cultural: Maria grew up in a white, European‑American family in the rural community of Shelley, Idaho. Her upbringing emphasized self‑reliance, hard work, and close community ties, shaped by a family
    tradition of farming and mechanic work. Local culture—outdoor recreation, county fairs, and a modest, faithful Christian environment—instilled values of modesty, practicality, and resilience. The values
    of the Pacific Northwest's respect for nature and the agrarian work ethic have influenced her worldview and daily habits.
attributes:
  skills: '[''machinery operation'', ''equipment maintenance'', ''quality assurance'', ''lean manufacturing'', ''safety compliance'', ''production scheduling'', ''process troubleshooting'', ''inventory
