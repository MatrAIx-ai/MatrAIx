  career_goals: William aims to open his own family‑oriented dental practice in Skiatook within the next three years, focusing on integrating aesthetic dentistry with cutting‑edge digital workflows. He
    plans to earn a specialization in prosthodontics to become a recognized expert in smile design and minimally invasive restorative techniques. Committed to community health, he intends to develop oral‑health
    outreach programs for underserved populations in Osage County and pursue a master’s degree in public health to influence regional oral‑health policy. Long‑term, he hopes to mentor emerging dentists,
    publish research on innovative dental materials, and contribute to professional societies as a thought leader.
