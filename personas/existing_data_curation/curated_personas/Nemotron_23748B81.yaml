  hobbies: '[''Fishing'', ''Woodworking'', ''Model Train Building'', ''Reading (Non-fiction)'', ''Podcasts on Logistics and Technology'', ''Nature Hiking'', ''Gardening'', ''Southern Cooking'']'
  career_goals: Jeremiah aims to move into a supervisory role such as warehouse shift supervisor or logistics coordinator within the next few years, focusing on safety, efficiency, and the integration of
    new technology. He plans to obtain certifications like Certified Forklift Trainer, OSHA 30‑hour safety, and a supply‑chain management credential. Ultimately, he hopes to start his own small moving and
    storage business that lets him apply his hands‑on expertise while preserving a flexible schedule for his solitary hobbies.
