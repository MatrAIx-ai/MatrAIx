  hobbies: '[''Reading (fantasy, mystery, natural history)'', ''Sketching and illustration'', ''Playing piano (classical repertoire)'', ''Gardening (herbs and flowers)'', ''Introductory Python coding'',
    ''Bird-watching'', ''Personal journaling'', ''Hand knitting'']'
  career_goals: Anne aspires to a career that blends structure, independence, and helping others. She is interested in becoming a veterinary technician, a medical laboratory technologist, or a librarian/archivist.
    Her plan includes graduating high school with a strong GPA, attending a Georgia state university to major in biology or information science, and pursuing a stable, detail‑oriented profession that allows
    her to work in organized, quiet environments.
