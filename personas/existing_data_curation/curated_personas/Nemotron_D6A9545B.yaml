personas:
  professional: An ambitious cashier named James Bourgeois leverages their friendly, adaptable demeanor and sharp conflict‑resolution skills to excel in front‑line customer service, routinely recommending
    local art events while eyeing a supervisory role that blends retail management with arts administration.
  sports: James Bourgeois fuels their love of the outdoors by tackling the Klamath Falls trail network, belongs to the local hiking club that meets monthly, cheers for the Klamath Falls Gems baseball team,
    and occasionally joins the community’s pickup basketball games at the recreation center.
  arts: James Bourgeois channels their curiosity into landscape photography inspired by Ansel Adams, water‑color sketching of Oregon’s high desert, self‑taught guitar sessions covering folk artist Sufjan
    Stevens, and regular visits to the Klamath County Museum to see works by regional artist Megan Kincade.
  travel: James Bourgeois prefers spontaneous, budget‑friendly road trips, often winding up at Crater Lake for sunrise photography, exploring Portland’s art districts on a whim, and dreaming of a future
    trip to Santa Fe’s annual arts market, balancing travel with their modest savings.
  culinary: James Bourgeois relishes brewing pour‑over coffee with locally roasted beans, cooks pan‑seared trout with lemon‑dill glaze accompanied by roasted root vegetables, and indulges in occasional
    night‑out sushi rolls at the downtown bistro, while their cooking skill hovers at a confident home‑cook level.
  core: James Bourgeois is a curiosity‑driven, art‑obsessed cashier whose relaxed, sometimes disorganized habits coexist with a relentless pursuit of creative expression through photography, music, and
    coffee.
background:
  cultural: James was raised in a white, middle‑class family in Klamath Falls, Oregon. His surname reflects French‑Canadian ancestry, but his upbringing is steeped in the Pacific Northwest’s blend of outdoorsmanship,
    community‑oriented values, and a growing appreciation for regional arts. He grew up attending public schools, participating in local festivals, and developing a respect for the natural environment and
    the cultural contributions of the Klamath Tribes. This background informs his relaxed, flexible outlook and his interest in both the practical and artistic sides of life.
