    Nights'', ''Coffee Brewing'', ''Reading Science Fiction'', ''Philosophy Podcasts'', ''DIY Home Projects'']'
  career_goals: James aims to move beyond his current cashier role into a supervisory position within a retail setting, eventually leveraging his passion for the arts to become a program coordinator for
    a community arts center or gallery in the Klamath region. He plans to complete an associate degree in arts administration while obtaining management certification, and to develop stronger organizational
    skills. In the long term, he envisions opening a small boutique that sells local crafts and showcases regional artists, combining his customer‑service experience with his artistic interests.
