personas:
  professional: Alejandra Estavillo, a veteran health technologist with twenty years of experience in phlebotomy, portable X‑ray and ultrasound operation, and bilingual patient communication, applies their
    practical, structure‑oriented mindset to maintain flawless electronic medical records while occasionally letting a relaxed approach to deadlines cause minor delays, and they are now pursuing an associate
    degree in Radiologic Technology and ARRT certification to step into a senior technologist role that blends mentorship with process‑improvement leadership.
  sports: Alejandra Estavillo stays active by attending a weekly salsa dance class, walking the Oxon Hill Creek trail on weekends, and cheering for the Washington Capitals, Washington Wizards, and Baltimore
    Ravens, while they occasionally join a local walking club that satisfies their competitive streak yet allows enough flexibility to accommodate their relaxed approach to structured training.
  arts: Alejandra Estavillo nurtures their creative side by devouring historical fiction novels by Hilary Mantel and Ken Follett, unwinding after salsa lessons to the lively rhythms of Tito Puente and Marc
    Anthony, and they enjoy crocheting while listening to classic jazz icons like Ella Fitzgerald, a blend of competitive curiosity and laid‑back artistic indulgence.
  travel: Alejandra Estavillo prefers spontaneous weekend escapes over meticulously planned itineraries, often discovering nearby treasures like Shenandoah National Park and the historic charm of Savannah,
    while they dream of international journeys to Lisbon’s pastel‑laden streets and Oaxaca’s vibrant food markets, balancing their competitive urge to check off bucket‑list destinations with a relaxed,
    flexible travel mindset.
  culinary: Alejandra Estavillo showcases seasoned culinary skills by hand‑crafting family‑heritage pupusas filled with cheese and loroco and simmering a hearty gallo pinto using fresh cilantro, oregano,
    and basil from their backyard herb garden, while they also enjoy occasional outings to a local bistro offering spiced chicken and grilled corn, reflecting a pragmatic yet passionate approach to food.
  core: Alejandra Estavillo blends a love for routine and structure with a competitive edge and a hint of skepticism, juggling meticulous work habits with a habit of misplacing their salsa shoes, all while
    nurturing a quiet confidence that drives them toward community‑focused health initiatives.
background:
  cultural: Alejandra was raised in a Salvadoran immigrant household in the Washington metropolitan area. Her parents emigrated from San Salvador in the 1970s, and she grew up bilingual, celebrating Salvadoran
    holidays such as Día de la Independencia with festive foods, music, and community gatherings. The Catholic faith and strong family ties shaped her values of service and resilience. Living in Prince
    George’s County, she remains actively connected to the local Salvadoran community, often serving as a cultural liaison at health‑related events and preserving traditional recipes and folklore for younger
    generations.
attributes:
  skills: '["Phlebotomy", "Operation and troubleshooting of diagnostic imaging equipment", "Electronic Medical Record (EMR) data entry and management", "Bilingual patient communication (Spanish/English)",
    "Infection control compliance", "Quality assurance and regulatory reporting", "Clinical inventory control", "Basic health informatics reporting"]'
  hobbies: '["Cooking Salvadoran cuisine (pupusas, gallo pinto)", "Salsa dancing at community center", "Herb gardening", "Walking the Oxon Hill Creek trail", "Participating in trivia competitions", "Volunteering
    at community health fairs", "Reading historical fiction", "Crocheting"]'
  career_goals: Alejandra aims to formalize her knowledge by completing an associate degree in Radiologic Technology and earning the ARRT certification within the next two years. She hopes to transition
    into a senior technologist role that includes mentoring new staff and leading process‑improvement projects to reduce patient wait times. Long‑term, she envisions developing a community‑focused health‑screening
    program for underserved Salvadoran families in Prince George’s County, leveraging her technical expertise and cultural connections.
