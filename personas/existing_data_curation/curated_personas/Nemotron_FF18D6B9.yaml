  career_goals: Looking ahead, Olivia aims to transition into a senior executive role such as Chief Financial Officer within the next five years, where she can shape enterprise-wide financial strategy and
    champion technology-driven reporting. She is committed to mentoring the next generation of finance professionals, building a robust succession pipeline at her organization, and expanding her influence
    by serving on the board of a local nonprofit focused on financial literacy. At the same time, she seeks a balanced schedule that allows her flexibility for family, community involvement, and personal
    interests, positioning herself for a phased move into consulting or advisory work as she approaches retirement.
