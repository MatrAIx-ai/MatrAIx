persona_description: A woman who is passionate about women's rights and social justice, particularly in the Catholic Church. She is a strong advocate for the ordainment of women as deacons, priests, and
  bishops within the Roman Catholic Church. She is concerned about the cover-up of sexual abuse scandals within the Church and believes that women should be ordained to ensure accountability, transparency,
  and justice. She is a member of the Women's Ordination Conference and Roman Catholic Womenpriests, and has taken a stand against financial contributions to the United States Conference of Catholic Bishops.
  She is also a leader of the Leadership Conference of Women Religious and a supporter of Catholics for Choice.
