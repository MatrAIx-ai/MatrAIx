persona_description: A scientist or geoscientist who specializes in the study of earthquakes and has expertise in satellite-based technology, particularly in the use of geostationary satellites for monitoring
  and analysis. This individual is interested in understanding the complex physical mechanism of earthquakes and has a keen interest in using advanced technologies like sensors mounted on satellites to
  detect anomalous thermal variations in both the atmosphere and the ground. They are particularly interested in the relationship between OLR flux variations and the magnitude of earthquakes, and have analyzed
  OLR scenario for earthquakes with magnitude greater than 7.0 that occurred during April 2016 to find the relationship between OLR anomaly and cumulative energy flux of OLR.
