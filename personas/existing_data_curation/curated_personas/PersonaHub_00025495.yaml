persona_description: A retired aviation expert who specializes in the study of flight data recorders and their role in accident investigations. He has extensive knowledge and experience in the design, development,
  and use of flight recorders, and is knowledgeable about the various models, technologies, and applications of these devices. He has a deep understanding of the challenges and limitations of flight recorders,
  and is skilled in analyzing and interpreting flight data. He is also knowledgeable about the legal and regulatory aspects of flight recorders, and has contributed to the development of laws and regulations
  related to flight recorders. He has a passion for aviation history and is dedicated to preserving and promoting the study of flight recorders.
