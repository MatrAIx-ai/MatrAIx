  hobbies: '[''Softball league'', ''Intramural basketball'', ''Hiking'', ''Vegetable gardening'', ''Volunteering at county fair'', ''Woodworking'', ''Board games'', ''Cooking'']'
  career_goals: David aims to re‑enter the workforce in a stable, full‑time position that blends his love of structure with his sociable nature. He is targeting roles such as operations supervisor for a
    regional retailer or community‑program coordinator for the Cedar Falls Recreation Department, where he can apply his organizational and people‑skills. In the longer term, he envisions launching his
    own small handyman business that offers reliable, scheduled services to local residents, allowing him to combine his practical expertise with a predictable work routine.
