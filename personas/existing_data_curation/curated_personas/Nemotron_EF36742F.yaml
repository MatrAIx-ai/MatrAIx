personas:
  professional: David Green is a 29‑year‑old operations‑focused professional who combines their associate’s degree in business administration, Excel budgeting prowess, and hands‑on repair expertise; they
    deliver structured, people‑centric supervision in settings like regional retail stores or community recreation programs, thriving on predictable routines while keeping the workplace upbeat and collaborative.
  sports: David Green is a regular in Cedar Falls’ softball league and an intramural basketball player, cheering for the Iowa State Cyclones in college basketball, the Minnesota Timberwolves in the NBA,
    and the Green Bay Packers in the NFL; they stay fit with weekend hikes along the Cedar River trails and favor community‑spirit sports over solo gym workouts.
  arts: David Green finds creative outlets in woodworking, board‑game nights, and listening to folk‑rock artists like The Avett Brothers, Mumford & Sons, and classic songwriter Bob Dylan, while they often
    attend performances at the Cedar Falls Community Theater and appreciate local fair music acts, blending hands‑on craftsmanship with a love for storytelling through music and games.
  travel: David Green prefers road‑trip adventures that combine nature and modest budgeting, having hiked the Effigy Mounds National Monument and spent a long weekend exploring Black Hawk State Park, while
    they dream of a future national‑park tour of Yellowstone and the Pacific Northwest, planning trips with a mix of online deals and careful Excel itinerary spreadsheets.
  culinary: David Green enjoys cooking farm‑to‑table meals using vegetables from their modest garden, often preparing dishes like roasted beet and goat‑cheese salad, spicy lentil stew, and homemade sourdough
    bread, and they experiment with new recipes on weeknights while still indulging in occasional deep‑fried comfort foods like mac and cheese.
  core: David Green, a 29‑year‑old community‑oriented handyman‑in‑training, blends structured routines with sociable energy, juggling spreadsheets, sports, and garden herbs while they occasionally overcommit
    to volunteer duties and neglect flossing.
background:
  cultural: David comes from a multi‑generational Midwestern white family with German and Scandinavian roots that settled in Iowa in the late 1800s. He was raised in a close‑knit community that values hard
    work, modesty, punctuality, and neighborly support. Local traditions such as church picnics, harvest festivals, and a strong emphasis on volunteerism have shaped his cooperative outlook and his prioritization
    of harmony and others' needs. This cultural emphasis on reliability, community involvement, and practical self‑reliance is reflected in his daily habits, personal goals, and the way he engages with
    others.
attributes:
