  hobbies: '[''Jazz and R&B concerts'', ''Community health fair volunteering'', ''Mentoring nursing students'', ''Salsa dancing'', ''Weekly Griffith Park hikes'', ''Reading medical journals and science‑fiction'',
    ''Blogging about health trends'', ''Cooking experimental fusion dishes'', ''Rooftop gardening'', ''Yoga and mindfulness practice'', ''Theater performances'', ''Participating in local book clubs'']'
  career_goals: Priscilla aims to leverage her extensive clinical experience into senior leadership, targeting a role as Director of Nursing Quality and Safety within a major Los Angeles hospital. She plans
    to earn a Master’s in Nursing Administration to deepen her strategic expertise, and she is determined to spearhead a hospital‑wide quality improvement program that reduces racial disparities in chronic
    disease outcomes. Her competitive drive fuels her ambition to become a sought‑after speaker at national nursing conferences and to publish research on culturally tailored patient education. Additionally,
    she aspires to mentor the next generation of Black nurses, establishing a scholarship and mentorship network that supports their professional advancement.
