personas:
  professional: Priscilla Foster, a veteran acute and critical care nurse with 35 years of bedside experience, combines Advanced Cardiac Life Support, wound‑care and diabetes education certifications with
    health informatics fluency to spearhead data‑driven quality improvement projects, and their competitive, critical mindset plus natural sociability fuels a push toward a Director of Nursing Quality and
    Safety position while mentoring students and presenting at national conferences.
  sports: Priscilla Foster, an avid salsa dancer and weekly hiker with the Griffith Trails Club, fuels their fitness routine by climbing the trails of Griffith Park, cheering on the Los Angeles Lakers and
    Dodgers during the basketball and baseball seasons, and participates in a community league of amateur salsa, which satisfies their sociable and competitive drive.
  arts: 'Priscilla Foster, a devoted fan of live jazz and R&B, regularly attends performances by artists such: Herbie Hancock, Etta James tribute bands, and Alicia Keys, while their love of science‑fiction
    leads them to discuss works by Isaac Asimov in a blog that blends cultural commentary with artistic appreciation, and they frequently visit the Getty Center and Hollywood Bowl for visual and musical
    enrichment.'
  travel: Priscilla Foster, who prefers a blend of structured itineraries and spontaneous detours, enjoys revisiting New Orleans for its vibrant jazz scene, exploring the historic streets of San Miguel
    de Allende, and plans a future solo trip to Kyoto to experience cherry blossoms and traditional tea ceremonies, all while balancing travel costs with a modest retirement budget.
  culinary: Priscilla Foster, an experimental home chef who tends a rooftop herb garden, delights in crafting fusion dishes like Korean‑Mexican tacos with kimchi salsa and quinoa‑coconut curry bowls, while
    their palate favors miso‑glazed salmon, fresh avocado, and pomegranate seeds, reflecting a moderate‑high cooking skill and a love for bold, health‑conscious flavors.
  core: Priscilla Foster blends relentless curiosity with a competitive edge, channeling talkative sociability into mentorship while battling occasional worry‑driven over‑analysis and an indulgent habit
    of treating themselves to late‑night jazz shows.
background:
  cultural: Priscilla identifies as a Black woman who grew up in the culturally vibrant neighborhoods of Los Angeles, where the legacy of African‑American resilience and community activism shaped her values.
    Her family emphasized education, service, and pride in heritage, fostering a strong sense of social responsibility. Navigating both the healthcare system and broader society as a Black professional,
    she has firsthand awareness of health disparities affecting minority populations. This background fuels her commitment to cultural competency, health equity advocacy, and mentorship of other Black nurses.
    She actively participates in local African‑American cultural organizations, celebrates traditions such as Juneteenth, and incorporates the rich tapestry of Black artistic expression—music, cuisine,
    and storytelling—into her personal and professional life.
