personas:
  professional: Shane Smith is a high‑school robotics enthusiast and aspiring mechanic who blends hands‑on car repair with Python‑driven diagnostics, applying meticulous organization and a competitive drive
    to every project.
  sports: Shane Smith avidly follows the Cleveland Browns (NFL) and Cleveland Guardians (MLB), participates in a local youth fishing club that meets at Lake Erie, and maintains functional fitness through
    weekly CrossFit Medina sessions combined with weekend hikes in the rural hills of Medina County.
  arts: Shane Smith draws creative inspiration from the instrumental rock of Explosions in the Sky, the innovative sound design of Daft Punk, and the cinematic storytelling of Christopher Nolan, often listening
    to these while woodworking or sketching device enclosures, and they occasionally experiment with digital art tutorials from YouTube creator Ben Heck.
  travel: Shane Smith has explored nearby Detroit for car shows, trekked the Appalachian Trail’s southern segment on a school outing, and dreams of a future study trip to Stuttgart, Germany to tour automotive
    engineering labs, balancing a modest travel fund with school commitments and parental approvals.
  culinary: Shane Smith enjoys grilling trout caught on local ponds with lemon, dill, and garlic butter, crafts homemade pepperoni pizza topped with mozzarella and sliced mushrooms on weekends, and demonstrates
    an intermediate cooking skill level by mastering the classic chicken pot pie with flaky pastry crust.
  core: Shane Smith is a disciplined, curiosity‑driven teen who turns mechanical tinkering, strategic gaming, and meticulous planning into a relentless pursuit of mastery, all while juggling occasional
    acne, a tight budget, and a love for bass fishing.
background:
  cultural: Shane grew up in Seville, a small town in Medina County, Ohio, where Midwestern values of hard work, self‑reliance, and community involvement are deeply ingrained. His family’s heritage traces
    back to German and Irish immigrants who settled in the region, shaping a cultural backdrop of modesty, practicality, and respect for tangible results. The rural setting fosters an appreciation for outdoor
    activities like fishing, hunting, and county‑fair traditions. While the community is largely Protestant, Shane occasionally attends a non‑denominational youth group, reflecting a modest religious influence.
    The local emphasis on high school sports, agricultural fairs, and small‑town solidarity reinforces his disciplined, achievement‑driven personality.
