  career_goals: Shane aims to secure an apprenticeship with a local automotive shop to become a certified master mechanic, while simultaneously preparing for a community‑college program in mechanical engineering
    technology. He envisions a future where he can combine his hands‑on expertise with formal engineering knowledge to design high‑performance vehicle components. Long‑term, he aspires to launch his own
    small business focused on custom vehicle modifications and fabricated parts, leveraging his disciplined work ethic and pursuit of measurable, tangible results. He also considers a backup path in the
    tech sector, developing software tools for automotive diagnostics, reflecting his blend of practical and innovative interests.
