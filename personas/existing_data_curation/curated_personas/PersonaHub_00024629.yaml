persona_description: A scientist who is passionate about the revival of extinct species, particularly the woolly mammoth. Iritani is a professor at Kyoto University in Japan and has developed a cloning
  technique that allows the use of cells from a mouse frozen for 16 years to clone a new mouse. He plans to use this technique to pinpoint healthy nuclei within mammoth cells in order to extract and use
  them for cloning. Iritani aims to resurrect the woolly mammoth within four or five years.
