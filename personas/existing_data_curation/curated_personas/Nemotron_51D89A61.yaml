  career_goals: Although retired, Aurora aims to continue learning and giving back. She hopes to compile a memoir of her teaching years and local history anecdotes, publish a small booklet, and establish
    a modest scholarship for students pursuing visual arts at the nearby community college. She also plans to launch a quarterly art‑craft workshop for seniors, provide one‑on‑one tutoring for elementary
    students struggling with reading, and travel to regional museums and galleries to stay engaged with new artistic ideas.
