personas:
  professional: Aurora Bonner, a retired elementary reading and language arts teacher with over three decades of classroom experience, leverages their curiosity and relaxed, flexible style to craft engaging
    curricula, mentor youth reading clubs, and spearhead a quarterly art‑craft workshop for seniors that blends storytelling with watercolor painting.
  sports: Aurora Bonner follows the Seattle Seahawks in the fall and the Seattle Sounders FC during the MLS season, occasionally attends Seattle Kraken games in winter, and maintains a gentle fitness routine
    of sunrise walks in their garden and weekly water aerobics at the community center, though they admit to skipping stretches on rainy days when their knitting projects beckon.
  arts: Tending to a vibrant artistic life, Aurora Bonner paints Pacific Northwest coastal watercolors inspired by Winslow Homer, they delight in listening to Miles Davis and John Coltrane jazz recordings
    while journaling, they treasure classical pieces by Debussy, and they regularly participate in community art talks featuring unconventional artists like Yayoi Kusama, all while occasionally quoting
    passages from historical novels by Ken Follett.
  travel: Energetic about new horizons, Aurora Bonner prefers low‑key, senior‑friendly trips that blend art and nature, such as spontaneous whale‑watching outings to the San Juan Islands, a yearly visit
    to Portland’s Pearl District galleries, weekend hikes in Olympic National Park, and occasional cruises through Alaska’s Inside Passage, all organized with flexible itineraries that accommodate their
    modest travel budget and occasional reliance on family assistance.
  culinary: Passionate about the Pacific Northwest’s bounty, Aurora Bonner experiments with fresh cedar‑plank salmon, pan‑seared Dungeness crab with butter and dill, and miso‑glazed halibut, they relish
    adding aromatic ginger and locally foraged seaweed to their dishes, and despite modest cooking confidence they often invite neighbors for informal seafood tastings while listening to smooth jazz.
  core: Energetic yet relaxed, Aurora Bonner blends a lifelong love of teaching with a quiet curiosity for art, nature, and community, habitually misplacing knitting needles while they keep a well‑worn
    journal of reflections beside a cup of tea.
background:
  cultural: Aurora is a white American who grew up in the post‑war Midwest, where her family placed a high value on education, community service, and church involvement. In her thirties she moved to Aberdeen,
    Washington, and over the decades absorbed the Pacific Northwest’s reverence for nature, modest coastal living, and strong local solidarity. She respects the traditions of the Coast Salish peoples, often
    visiting museums and cultural events to learn about indigenous art and history. Aurora’s identity blends classic American values of self‑reliance and compassion with the region’s environmental consciousness
    and a lifelong love of the arts.
