personas:
  professional: Delia Ocasio, a budding architect of LEGO worlds, applies their keen eye for detail and disciplined planning to construct towering cityscapes, constantly revising blueprints to meet their
    own high standards while proudly displaying each finished model on a designated shelf.
  sports: Delia Ocasio darts across the neighborhood park every Saturday, playing forward for the local kids' soccer league, sharpening dribbling skills with a competitive edge, and cheers for the city’s
    professional soccer franchise during televised matches, often mimicking goal celebrations after scoring a schoolyard goal.
  arts: Delia Ocasio fills sketchbooks with vivid, storybook‑style drawings inspired by the playful illustrations of Eric Carle and Mo Willems, sings folk songs handed down through family gatherings, and
    spends quiet afternoons arranging stickers into elaborate scenes that rival their LEGO creations.
  travel: Delia Ocasio loves weekend adventures to the nearby lake where they build sandcastles and hunt for interesting rocks, enjoys short road trips to the state’s historic museum, and dreams of exploring
    the Grand Canyon’s towering cliffs someday, often sketching imagined landscapes in a travel diary.
  culinary: Delia Ocasio delights in mixing batter for simple dulce de leche cookies alongside a grown‑up, savors the creamy sweetness of strawberry yogurt, and can assemble a perfect peanut‑butter‑and‑jelly
    sandwich, though they sometimes leave crumbs on the living‑room carpet while reaching for another bite.
  core: Delia Ocasio is an organized, curious six‑year‑old who balances competitive LEGO building and soccer with quiet reading, yet occasionally forgets to clean up after snack time, revealing a playful
    streak beneath their disciplined exterior.
background:
  cultural: Delia grows up in a Mexican‑American household in Fresno, California, where Spanish is spoken alongside English. Her family celebrates cultural traditions such as Día de los Muertos, Mexican
    Independence Day, and Lotería gatherings, and enjoys foods like tamales, elote, and horchata. The vibrant Latino community in Fresno provides a supportive environment that blends Mexican heritage with
    American schooling. Delia’s upbringing emphasizes family closeness, respect for elders, and pride in her bilingual identity, shaping her world view and personal values.
attributes:
  skills: '[''reading simple sentences'', ''recognizing sight words'', ''basic counting to 20'', ''simple addition'', ''handwriting name and basic words'', ''organizing school supplies'', ''following daily
