  hobbies: '[''building LEGO sets'', ''drawing and coloring'', ''reading picture books and early chapter books'', ''playing soccer'', ''singing Mexican folk songs'', ''baking simple family treats'', ''exploring
    backyard nature'', ''solving puzzles'', ''collecting stickers'', ''participating in classroom clubs'']'
  career_goals: Delia dreams of becoming a scientist‑engineer who designs safe structures, inspired by her love for building LEGO models and asking how things work. She aspires to attend a top STEM program
    where she can combine her practical mindset with curiosity. In the near term, she aims to win her school’s science fair, master reading longer chapter books, and become a leader in her classroom’s “Junior
    Builders” club. Her competitive drive fuels her ambition to be recognized for high achievement while maintaining the disciplined work ethic she values.
