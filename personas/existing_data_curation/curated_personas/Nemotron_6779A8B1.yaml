  career_goals: Although retired, Noel aims to channel her lifelong curiosity into a series of interdisciplinary projects. She plans to write and publish a collection of essays that weave together quantum
    physics concepts with abstract visual art, and to curate a small exhibition of her paintings at a local community center. She also aspires to develop a volunteer program that introduces middle-school
    students to STEM through hands-on creative workshops, leveraging her mentoring skills and artistic background. On a personal level, Noel hopes to complete a memoir that chronicles her journey from a
    Salvadoran immigrant family to a STEM graduate, preserving her cultural legacy for future generations.
