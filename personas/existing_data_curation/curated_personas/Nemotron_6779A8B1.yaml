personas:
  professional: Noel Sepa, a retired research scientist with a Ph.D. in theoretical physics, leverages their meticulous analytical mind and love for abstract patterns to design interdisciplinary workshops
    that blend quantum modeling, statistical programming, and abstract painting for middle‑school learners, while drafting a forthcoming collection of essays and visual art that explore the visual language
    of quantum uncertainty.
  sports: Noel Sepa, a dedicated member of the Bethesda Senior Walking Club, sticks to gentle morning walks along the Potomac and occasional low‑impact water aerobics at the community center, fervently
    follows the Washington Nationals and Baltimore Ravens on television, and admits to skipping recommended stretches, preferring solitary garden chores over group exercise.
  arts: Noel Sepa, a solitary abstract painter whose canvases echo mathematical fractals, draws inspiration from the intricate patterns of M.C. Escher, the chromatic intensity of Hilma af Klint, Beethoven’s
    late string quartets, and traditional Central American folk lute music, spending evenings perfecting digital illustrations in MATLAB while attending the Maryland Artists Guild monthly meet‑ups when
    the social energy permits.
  travel: Noel Sepa, an avid planner of low‑key, culturally rich retreats, prefers quiet, curated itineraries such as a week‑long literary tour of Boston’s historic libraries, a serene weekend at a Chesapeake
    Bay waterfront cottage in St. Michaels, and a pilgrimage to the ruins of Tula in Mexico to trace familial threads, always booking far‑in‑advance and traveling with a lightweight roll‑top suitcase, though
    they occasionally succumb to spontaneous detours for local art fairs.
  culinary: Noel Sepa, a meticulous home chef, prepares authentic pupusas filled with melty quesillo and sautéed loroco, pairs them with a tangy curtido of cabbage, carrots, and vinegar, simmers golden
    rice seasoned with achiote and cilantro, and sometimes uses a Python script to scale recipes precisely, though they occasionally over‑salt the soup when engrossed in crossword puzzles.
  core: Noel Sepa, a 75‑year‑old retired quantum physicist who intertwines rigorous analysis with solitary abstract art, channels relentless curiosity into interdisciplinary projects while battling intense
    waves of anxiety that punctuate an otherwise methodical life.
background:
  cultural: Noel was born to Salvadoran parents who immigrated to the United States in the early 1960s. She grew up bilingual, speaking Spanish at home and English in school, and maintained strong ties
    to Salvadoran customs, including celebrating Las Fiestas Patrias, preparing traditional foods, and participating in the local Salvadoran community’s cultural events in the Washington-DC area. Her Catholic
    upbringing provided a framework for reflection and resilience, especially after the loss of her husband. While she now lives in Elkridge, Maryland, Noel’s Salvadoran heritage continues to shape her
    identity, informing her cooking, storytelling, and a deep sense of responsibility to preserve her family’s history.
