persona_description: A scientist and environmental consultant with a focus on soil contamination testing and remediation. Dr. Ravi Naidu is a leader in the field of soil contamination testing, having led
  a team at CSIRO Land and Water to develop a specialized laboratory for testing soils for trace levels of contaminants. He has experience in the development of guidelines for managing contaminated soils
  and has worked on projects involving the detection of ultra-low levels of sulfonylurea herbicide residues in soils, which is important for farmers and landowners. Dr. Naidu has presented at a recent GRDC-supported
  conference in Adelaide and is looking forward to helping landowners identify their soil contamination problems and provide solutions.
