personas:
  professional: A meticulous aspiring office manager, Kati Hornbeck leverages their Excel budgeting expertise and sharp, skeptical eye for detail to streamline processes in a county health department, while
    their competitive drive pushes them to consistently exceed performance benchmarks.
  sports: An avid hiker and casual runner, Kati Hornbeck tackles the local Blue Ridge Trail every weekend, follows the Pittsburgh Steelers for football and the Marshall Thundering Herd for basketball, and
    maintains a disciplined home‑workout routine that balances cardio with strength training, all while they keep a detailed log of progress.
  arts: A quiet creative, Kati Hornbeck spends evenings knitting scarves while listening to folk singer Alison Krauss, captures garden scenes inspired by Ansel Adams, and reads contemporary novels by Celeste Ng,
    all of which shape the aesthetic of their upcoming online shop.
  travel: A methodical planner, Kati Hornbeck prefers low‑key road trips to nearby nature spots like Shenandoah and the Great Smoky Mountains, books modest cabins months in advance, and dreams of a budget‑friendly
    European tour that includes a weekend in Dublin to explore their ancestral roots, which they research meticulously.
  culinary: A practical home cook, Kati Hornbeck skillfully prepares garden‑fresh meals such as roasted beet and goat‑cheese salad and chicken pot pie seasoned with thyme and rosemary, while occasionally
    treating themselves to a slice of pepperoni pizza on Friday night.
  core: Kati Hornbeck is a disciplined, detail‑obsessed planner who finds comfort in spreadsheets, puzzles, and knitting, yet sometimes over‑analyzes trivial decisions and neglects spontaneous social invitations.
background:
  cultural: 'Kati was raised in South Charleston, West Virginia, within a predominantly white, Appalachian‑influenced community where self‑reliance, family ties, and modest living are emphasized. Her upbringing
    reflects the region’s blend of rural traditions and small‑city life: frequent church attendance, participation in community festivals, and a strong work ethic rooted in local industry and service sectors.
    These cultural values underscore her practical mindset, appreciation for routine, and the importance she places on contributing to her household and community.'
attributes:
  skills: '[''Organizational and time-management'', ''Household budgeting and financial tracking'', ''Microsoft Office (Excel, Word)'', ''Basic bookkeeping'', ''DIY home repair'', ''Basic automotive maintenance'',
    ''Meal planning and cooking'', ''Small‑scale gardening'', ''Critical evaluation and attention to detail'']'
  hobbies: '[''Reading contemporary fiction'', ''Knitting scarves and hats'', ''Maintaining a vegetable garden'', ''Hiking local Appalachian trails'', ''Solving jigsaw puzzles'', ''Digital photography of
    nature'', ''Playing strategic board games with close friends'']'
  career_goals: In the short term, Kati plans to obtain her GED and pursue a certification in bookkeeping or office administration. She aims to secure a stable administrative role within a local government
    office or a healthcare facility in Kanawha County, where her organizational strengths and reliability will be valued. Over the longer term, she hopes to advance to a senior office manager position and,
    on the side, launch a home‑based online shop selling knitted goods and nature photography, turning her hobbies into a modest supplemental income stream.
