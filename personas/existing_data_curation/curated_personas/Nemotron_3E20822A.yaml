  career_goals: Mandy aims to lead her organization into a decade of sustainable, profitable growth by expanding into emerging markets and embedding environmental stewardship into the core business model.
    She aspires to become a recognized thought leader on corporate sustainability and inclusive leadership, seeking speaking engagements at industry conferences and publishing insights in business journals.
    Mentorship is a priority; she plans to develop a formal program for emerging female executives within her company and to serve on nonprofit boards that promote arts education and community development
    in the Pacific Northwest. Ultimately, she envisions a legacy of balanced profit and purpose that inspires the next generation of leaders.
