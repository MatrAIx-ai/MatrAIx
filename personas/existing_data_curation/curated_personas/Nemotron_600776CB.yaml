personas:
  professional: Johnny Mccann, an aspiring young coder who builds simple ScratchJr projects, channels his love for structure into tidy block arrangements while embracing the freedom to experiment without
    strict deadlines, and they often work quietly at their desk, preferring solitary focus over group projects.
  sports: Johnny Mccann, a budding swimmer on the local youth team who also joins his dad for pick‑up beach volleyball, cheers for the Miami Dolphins and the Florida Gators, and they relish structured practice
    drills in the pool while also enjoying spontaneous sandcastle races during quiet early‑morning beach walks.
  arts: Johnny Mccann, an avid comic‑strip creator who sketches heroes while listening to Miles Davis, Beyoncé, and Kendrick Lamar, collects vintage superhero comics and occasionally stays up late to finish
    a panel, and they cherish the calm of solo drawing sessions, balancing disciplined focus with bursts of creative spontaneity.
  travel: Johnny Mccann, who dreams of snorkeling the coral reefs of Key West after yearly family trips to the Gulf’s shoreline and a memorable visit to Disney World, prefers low‑key early‑morning beach
    walks with a small backpack of shells and plans outings using hand‑drawn maps, yet they sometimes deviate for impromptu ice‑cream stops, blending structured adventure with relaxed spontaneity.
  culinary: Johnny Mccann, who delights in sweet‑potato pie and collard greens served at family gatherings, enjoys making peanut‑butter‑banana sandwiches at home and can follow a simple lemonade recipe
    without assistance, and they often snack on salty chips while reading, showcasing practical cooking skills mixed with a sweet tooth and occasional messiness.
  core: Johnny Mccann is a quiet, methodical 7‑year‑old who balances a love for structured coding and solitary beach walks with a mischievous habit of sneaking extra cookies before bedtime.
background:
  cultural: Johnny is an African‑American boy raised in West Palm Beach, Florida, where his family blends Southern cultural traditions with the vibrant, multicultural atmosphere of South Florida. He participates
    in local church activities and celebrates holidays such as Juneteenth and Kwanzaa, enjoying soul food staples like collard greens and sweet potato pie. The coastal lifestyle influences his love for
    the beach and swimming, while the rich musical heritage of his community—ranging from gospel and jazz to contemporary hip‑hop—shapes his musical tastes. Family storytelling and a strong emphasis on
    education have fostered his curiosity and love for reading.
