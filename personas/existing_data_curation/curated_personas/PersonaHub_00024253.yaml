persona_description: Dr Rebecca Dobson, BCS Women in Cardiology Lead and Consultant Cardiologist at the Liverpool Heart and Chest Hospital. She is an internationally recognized expert in the field of cardiovascular
  disease, particularly in women. Her work focuses on reducing the global burden of cardiovascular disease in women by advocating for education of health care professionals, more funding for sex-specific
  research, and the scaling up of healthy heart programmes. Dr Dobson's expertise and dedication to advancing the understanding and treatment of cardiovascular disease in women make her a highly respected
  and influential figure in the field.
