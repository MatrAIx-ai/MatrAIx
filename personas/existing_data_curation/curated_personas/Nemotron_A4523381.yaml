personas:
  professional: Lisette Edwards, a seasoned home‑care aide with over thirty years of hands‑on experience, blends pragmatic problem‑solving with a curious willingness to adopt new health‑care practices as
    she works toward a CNA credential and a future supervisory role that will let her mentor junior aides while shaping person‑centered protocols for the Norwalk community.
  sports: Lisette Edwards enjoys low‑impact fitness through daily walks along the Long Island Sound promenade and weekly yoga, supports the New York Yankees and New England Patriots as a fan, and participates
    in a community senior‑center softball league that meets every summer, while also volunteering to walk dogs for the local animal shelter to keep active.
  arts: Lisette Edwards channels her love of storytelling into karaoke evenings singing classic ballads by Dolly Parton and contemporary hits by Ed Sheeran, attends free outdoor concerts featuring local
    folk groups, listens to audiobooks by historical fiction author Ken Follett, and regularly watches classic films starring Robert Redford on community movie nights.
  travel: Lisette Edwards prefers short, affordable road trips to New England coastal towns such as Mystic and Newport, enjoys weekend getaways to the Catskill Mountains for hiking, dreams of a cultural
    tour of Dublin’s literary sites, and often plans her outings around family gatherings and community events rather than long‑haul vacations.
  culinary: Lisette Edwards relishes cooking with garden‑fresh herbs, frequently prepares tomato‑basil soup, herb‑crusted grilled salmon, and a rustic shepherd’s pie topped with buttery mashed potatoes,
    and she delights in sharing homemade soda bread and colcannon at neighborhood potlucks, though she occasionally burns the garlic when juggling multiple dishes.
  core: Lisette Edwards blends a pragmatic, community‑first outlook with a playful curiosity, balancing a love of hands‑on caregiving, spontaneous social gatherings, and occasional forgetfulness about scheduling.
background:
  cultural: Lisette grew up in a working‑class family in a small town in upstate New York, of Irish‑American descent. Her parents emphasized hard work, self‑reliance, and community involvement. She moved
    to Connecticut in her early twenties to pursue opportunities in home care. Her cultural identity blends New England pragmatism with the warm hospitality of her Irish heritage. She celebrates traditional
    holidays like St. Patrick’s Day, Thanksgiving, and Fourth of July with family and neighbors, often bringing homemade dishes. Her community ties are strong; she participates in local church events and
    neighborhood clean‑up projects, reflecting a values‑driven, inclusive outlook.
attributes:
  skills: '[''Personal care assistance'', ''Mobility support and safe transfers'', ''Medication reminder and coordination'', ''Empathetic communication'', ''Conflict de‑escalation'', ''Meal preparation'',
