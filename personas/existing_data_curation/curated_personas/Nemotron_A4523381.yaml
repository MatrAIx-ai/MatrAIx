  hobbies: '[''Line dancing'', ''Karaoke'', ''Gardening'', ''Cooking'', ''Farmers’ market visits'', ''Walking along the Long Island Sound'', ''Outdoor concerts'', ''Animal shelter volunteer'', ''Audiobook
    listening'', ''Gentle yoga'']'
  career_goals: Lisette aims to formalize her extensive caregiving knowledge by earning a Certified Nursing Assistant (CNA) credential within the next year. She hopes to transition into a supervisory role
    at her home‑care agency, where she can mentor younger aides and help develop person‑centered care protocols. Long‑term, she is interested in launching a small, flexible home‑care service focused on
    serving the Norwalk community, allowing her to balance work with personal life. Additionally, she aspires to volunteer as a caregiver trainer at the local senior center, sharing practical skills and
    promoting elder‑care awareness.
