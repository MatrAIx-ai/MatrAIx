personas:
  professional: Jamie Wimberly, a 31‑year‑old tech lead who translates complex data into clear business insights, steers Agile cross‑functional teams with a pragmatic curiosity, mentors junior developers,
    and leverages inclusive leadership to push digital transformation while championing diversity.
  sports: Jamie Wimberly cheers for the Cleveland Browns and Guardians, plays in a local co‑ed recreational soccer league every summer, hikes with the Cleveland Outdoor Club in the Cuyahoga Valley, and
    squeezes in a weekly spin class when work permits, but often skips workouts after late‑night coding sessions.
  arts: Jamie Wimberly devours speculative fiction by N. K. Jemisin and Ann Leckie, captures black‑and‑white street scenes with a vintage Leica, attends live jazz at Cleveland's Blue Note featuring Kamasi
    Washington, and shares thoughtful reviews at the Cuyahoga Book Circle, though they occasionally skip a meeting to meet a project deadline.
  travel: Jamie Wimberly prefers weekend getaways to Hocking Hills or a two‑day ski trip in Colorado, cherishes past visits to Kyoto’s bamboo forest and the geysers of Iceland, and dreams of trekking Patagonia’s
    Torres del Paine, planning trips around quarterly work cycles to keep finances and family time aligned.
  culinary: Jamie Wimberly experiments with soulful cooking by slow‑braising short ribs with rosemary, simmering homemade lentil soup with kale and smoked paprika, mastering sourdough starter maintenance,
    and often incorporates fresh herbs from their rooftop garden, though they admit to over‑seasoning when feeling creative.
  core: Jamie Wimberly is a data‑driven tech leader who balances curiosity with pragmatism, invests wisely, nurtures health through garden‑time mindfulness, fuels passion with speculative fiction and jazz,
    and juggles ambitious career goals with community‑focused volunteering, even if they sometimes over‑commit on camera gear.
background:
  cultural: Jamie grew up in a close‑knit African‑American community in Cleveland’s Glenville neighborhood. Her family traditions blend church fellowship, music, and a strong emphasis on education, reflecting
    the city’s rich Black cultural heritage. She celebrates holidays such as Juneteenth and Kwanzaa, and stays connected to local institutions like the African American Cultural Center and the Cleveland
    Museum of Art’s African diaspora exhibitions. These experiences shape her identity and drive her commitment to mentorship, community service, and preserving cultural narratives for future generations.
