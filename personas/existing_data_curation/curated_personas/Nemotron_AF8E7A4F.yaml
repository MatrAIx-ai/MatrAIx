  career_goals: Jamie aspires to advance to a senior director role within the next five years, where she can shape corporate technology strategy and champion diversity in leadership. She aims to lead large‑scale
    digital transformation initiatives that deliver both economic value and community impact, particularly by partnering with local educational programs to broaden STEM access. Long‑term, she envisions
    launching her own consulting firm to help small businesses in underserved neighborhoods adopt data‑driven solutions, while maintaining a balanced life that supports her family and personal growth.
