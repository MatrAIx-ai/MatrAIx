  hobbies: '[''Cooking Mexican recipes'', ''Reading mystery novels'', ''Journaling'', ''Sketching'', ''Jogging'', ''Attending small community events'', ''Crossword puzzles'']'
  career_goals: Ana aims to earn a shift‑supervisor position within the next year, followed by a restaurant‑manager role in the next three to five years. She plans to obtain a ServSafe certification and
    attend a community college culinary program focused on healthy Mexican‑inspired fast‑casual food. Long‑term, she hopes to combine her practical experience with her cultural heritage by opening a small
    taco stand that offers modern, nutritious twists on traditional dishes, leveraging her competitive drive to stand out in the local market.
