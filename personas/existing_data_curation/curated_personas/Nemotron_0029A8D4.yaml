  hobbies: '["Sketching", "Watercolor Painting", "Museum Visits", "Reading Classics and Poetry", "Jazz Listening", "Gardening", "Traveling", "Community Theater", "Collecting Vintage Postcards", "Playing
    Piano", "Cooking", "Hiking"]'
  career_goals: Although retired from formal employment, Horace aims to produce a memoir that weaves personal anecdotes with reflections on American art. He wants to compile and publish a collection of
    oral histories from Newark seniors, serving as a cultural archive for future generations. He plans to volunteer as a docent at the nearby museum and to launch a senior‑focused arts workshop series that
    encourages spontaneous creativity. Traveling with his wife to major museums and cultural festivals abroad is also a top aspiration, as is advocating for increased funding for local arts programs.
