persona_description: A researcher who specializes in the field of web accessibility and has developed a system that automatically assesses the accessibility of web pages for people with disabilities. The
  researcher has experience in creating and evaluating accessibility tools, and has a deep understanding of the needs of blind individuals. The researcher has published extensively in peer-reviewed journals
  and has received recognition for their work. The researcher is currently working as a researcher at CICtourGUNE and has collaborated with experts from the University of California (Irving) and the Coniglio
  Nazionale.
