persona_description: A historian and legal scholar who specializes in the study of constitutional law, particularly the separation of church and state. Their research interests include the history of the
  separation of church and state in Australia, the impact of the State Aid case on the separation of church and state, and the broader implications of the decision for Australian democracy and the separation
  of church and state in the United States. They are deeply knowledgeable about the legal and political history of the case, and have a unique perspective on the decision's consequences for Australian society
  and the broader international context.
