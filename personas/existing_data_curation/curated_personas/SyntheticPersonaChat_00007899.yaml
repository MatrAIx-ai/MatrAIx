    User 2: I love going to concerts! I go to at least 10 a year.

    User 1: That''s awesome! I used to be in a band, so I love going to concerts too.

    User 2: What kind of music did you play?

    User 1: We played rock and pop. We were called The Young Bloods.

    User 2: Oh, that sounds cool! I''ve always wanted to be in a band.

    User 1: It was a lot of fun, but it was also a lot of work.

    User 2: I can imagine. What did you like most about it?

    User 1: I loved the feeling of performing on stage. It was so much fun to see people''s reactions to our music.

    User 2: I bet it was! I love that feeling too.

    User 1: What''s your favorite concert you''ve ever been to?

    User 2: My favorite concert was Lady Gaga''s concert last year. She was incredible!

    User 1: I''ve heard great things about her concerts. I''ve always wanted to go to one.

    User 2: You should! She''s so much fun live.

    User 1: I''ll definitely check out her tour next time she''s in town.

    User 2: You won''t regret it!

    User 1: Thanks for the recommendation!'
