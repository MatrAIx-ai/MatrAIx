personas:
  professional: Andrew Mcgraw is a 31‑year‑old self‑taught mechanic and outdoor craftsman who blends a practical, get‑things‑done attitude with a curiosity for DIY electronics, and they are working toward
    a GED and trade certification in electrical or HVAC work while planning to launch a flexible handyman service that also markets custom wooden furniture and hunting accessories.
  sports: Andrew Mcgraw is an avid early‑morning fisherman and seasonal deer hunter who belongs to the local trout‑catchers club, cheers for the State Wildcats football team, and they squeeze in occasional
    pickup basketball games at the community center to stay fit.
  arts: Andrew Mcgraw has a deep appreciation for classic country and folk music, regularly listening to Johnny Cash, Willie Nelson, and the instrumental storytelling of Mark Knopfler, and they unwind by
    watching classic western films by John Ford and sketching rustic furniture designs inspired by the mid‑century work of Charles Eames.
  travel: Andrew Mcgraw prefers low‑key road trips that combine fishing, hunting, and camping, and they have already explored the lakes of northern Minnesota, dream of a summer stint in the Adirondacks,
    and aim to visit Yellowstone National Park for its geysers and wildlife.
  culinary: Andrew Mcgraw's culinary tastes revolve around fresh‑caught trout, smoked venison, and hearty stews, and they frequently pan‑fry catfish with lemon‑pepper seasoning, whip up a rustic jambalaya
    featuring andouille sausage, and experiment with cedar‑plank smoking to infuse woodsy flavors.
  core: Andrew Mcgraw is a ruggedly independent 31‑year‑old who balances a love for solitude, hands‑on problem solving, and a competitive streak with occasional disorganization, and they have a penchant
    for splurging on vintage car parts.
background:
  cultural: Andrew grew up in a closely‑knit, rural Southern community in Madison County, where Baptist church gatherings, family potlucks, and a strong work ethic shaped his values. The local culture of
    self‑reliance, respect for the land, and Southern hospitality is reflected in his love for hunting, fishing, and home‑made cooking. While maintaining traditional customs, he also embraces modern tools
    and online resources, balancing his heritage with a curiosity for new ideas.
attributes:
  skills: '[''Basic Carpentry'', ''Small Engine Repair'', ''Fishing & Hunting Knowledge'', ''Woodworking'', ''DIY Electronics'', ''Basic Computer Literacy'', ''Problem Solving'']'
  hobbies: '[''Fishing'', ''Deer Hunting'', ''Woodworking'', ''Vintage Car Restoration'', ''Reading Survival and History Books'', ''Online Chess'', ''Gardening'']'
  career_goals: Andrew aims to formalize his abilities by earning a GED and pursuing a trade certification in electrical or HVAC work, eventually launching his own handyman service that can offer flexible,
    on‑site repairs to neighbors. He also hopes to turn his woodworking hobby into a small side business, selling custom furniture and hunting accessories online, providing a steady income while preserving
    the flexibility he values.
