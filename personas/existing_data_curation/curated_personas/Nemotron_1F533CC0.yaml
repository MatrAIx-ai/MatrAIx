personas:
  professional: Tricia Spears, a 31‑year‑old investigatory professional with a humanities‑rooted analytical lens, fuses covert surveillance, OSINT, digital forensics, and forensic photography with a relaxed,
    improvisational work style, delivering compassionate evidence‑driven casework while laying the groundwork for her future boutique detective agency.
  sports: Tricia Spears enjoys low‑intensity endurance activities, joining the Bay Area Hiking Collective for weekend treks in the Mount Diablo foothills, cheering the San Francisco Giants and Golden State
    Warriors on game nights, and participating in a local community cycling club that meets on Saturday mornings.
  arts: Tricia Spears immerses themselves in noir culture, devouring Raymond Chandler novels, listening to true‑crime podcasts like Serial and Criminology, photographing abandoned industrial sites in the
    style of Gordon Parks, and attending screenings of classic film noir by Alfred Hitchcock and modern noir series starring Eva Green.
  travel: Tricia Spears favors spontaneous, off‑the‑grid road trips that blend photography opportunities with culinary exploration, having recently backpacked the Oregon Coast, planning a future visit to
    the historic towns of the Spanish Colonial Trail in New Mexico, and balancing travel with the modest budget required to fund their emerging detective agency.
  culinary: Tricia Spears cultivates a modest vegetable garden of heirloom tomatoes, kale, and rainbow carrots, then transforms the harvest into farm‑to‑table dishes like roasted beet and goat‑cheese salad,
    wild mushroom risotto, and sourdough flatbread topped with herb‑infused olive oil, highlighting a strong affinity for seasonal, locally sourced ingredients.
  core: Tricky yet methodical, Tricia Spears balances an innate curiosity for unsolved mysteries with a laid‑back, sometimes disorganized lifestyle, channeling their love of photography, gardening, and
    true‑crime narratives into a compassionate investigative approach that often includes late‑night casework fueled by espresso.
background:
  cultural: Tricia grew up in a middle‑class white family in the greater Bay Area, absorbing the region’s mix of progressive attitudes and the working‑class maritime heritage of Vallejo. The city’s diverse
    neighborhoods and historic shipyards fostered an appreciation for community resilience while reinforcing mainstream American cultural norms. Her studies in the humanities at a state university broadened
    her exposure to Western literature, philosophy, and cultural analysis, shaping a secular yet reflective worldview. As a married resident of Solano County, she participates in local traditions such as
    farmers’ markets and seasonal festivals, and values the understated, independent spirit characteristic of many Northern California communities.
