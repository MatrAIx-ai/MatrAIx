    & historical research'']'
  hobbies: '[''Reading noir and true‑crime books'', ''Listening to true‑crime podcasts'', ''Archival research on local history'', ''Yoga and mindfulness practice'', ''Hiking local trails (e.g., Mount Diablo
    foothills)'', ''Urban photography of abandoned sites'', ''Gardening and farm‑to‑table cooking'', ''Small‑group book club'', ''Volunteering at domestic‑violence shelter'']'
  career_goals: Tricia aims to transition from contract work for local law firms and insurance companies to founding her own boutique detective agency in the Bay Area that specializes in missing‑person
    and cold‑case investigations. She plans to earn the Certified Professional Investigator (CPI) credential and later pursue a master’s degree in criminal justice to deepen her expertise. Over the next
    five years she hopes to build a small, collaborative team of investigators, develop a reputation for thorough yet compassionate casework, and author a true‑crime book that weaves her investigative experience
    with narrative techniques from her humanities background. She also intends to mentor emerging investigators, especially women, and to offer pro‑bono services for domestic‑violence survivors in her community.
