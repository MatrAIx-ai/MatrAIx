personas:
  professional: Tony Owens is a retired manufacturing supervisor who now channels their methodical coordination, budget‑savvy, and community‑building skills into leading senior outreach programs, organizing
    oral‑history projects, and mentoring volunteers at the local food pantry.
  sports: Tony Owens follows the Louisville Cardinals basketball team and the Cleveland Browns, enjoys seasonal fishing trips on the Ohio River as part of the Riverbend Senior Fishing Club, and stays fit
    by playing for the Louisville Senior Softball Association and tackling bridge tournaments, which they treat as a mental sport.
  arts: Tony Owens reads historical fiction by James Lee Burke, listens to the classic blues of B.B. King and the uplifting gospel of the Selah Ministries Choir, and attends performances at the Actors Theatre
    of Louisville, all of which enrich their appreciation for storytelling and music.
  travel: Tony Owens prefers road trips that blend heritage and relaxation, having driven the Great River Road to explore river towns, visited the historic French Quarter in New Orleans, and planning a
    pilgrimage to the Civil War battlefields of Antietam, all while budgeting trips around a fixed retirement income.
  culinary: Tony Owens delights in slow‑smoked pork ribs seasoned with a secret blend of paprika, brown sugar, and dried oregano, pairs them with buttery cornbread, collard greens, and a splash of hickory‑smoked
    sauce, while occasionally over‑saucing the brisket in a rush to meet a potluck deadline.
  core: Tony Owens embodies a steadfast, routine‑loving mentor who balances community service, classic Southern cooking, and pragmatic financial habits, all tinged with a gentle forgetfulness about dental
    appointments.
background:
  cultural: Tony was raised in Louisville, Kentucky, within a white, middle‑class family of German and Irish ancestry. He grew up during the 1950s and 1960s, absorbing Southern hospitality, a strong work
    ethic, and community‑centric values. His cultural identity blends traditional Midwestern pragmatism with the Southern emphasis on family, faith, and local customs. This background informs his preference
    for routine, his practical outlook, and his deep commitment to helping neighbors and preserving regional traditions.
attributes:
  skills: '[''budgeting and financial management'', ''basic carpentry and home repair'', ''event planning and coordination'', ''volunteer mentorship'', ''logistical coordination'', ''safety compliance'',
