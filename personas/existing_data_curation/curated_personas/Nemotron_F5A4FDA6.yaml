  hobbies: '[''gardening'', ''woodworking'', ''fishing'', ''reading historical fiction'', ''church social activities'', ''bridge'', ''volunteering at a food pantry'', ''cooking Southern cuisine'']'
  career_goals: Although retired, Tony aims to deepen his community involvement by leading senior‑focused outreach programs, preserving local heritage through oral‑history projects, and mentoring young
    adults in practical life skills such as budgeting and home maintenance. He also hopes to author a memoir that captures the traditions of mid‑century Louisville, ensuring his family’s legacy and regional
    customs are recorded for future generations.
