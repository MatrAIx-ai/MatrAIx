  hobbies: '[''Hiking (Antelope Valley Trails)'', ''Community Clean‑up Volunteering'', ''Science‑Fiction Book Club'', ''STEM Mentorship for High School Students'', ''Yoga'', ''Seasonal Cooking'', ''Live
    Music Festival Volunteering (Logistics)'']'
  career_goals: Jacquelyn aims to earn a Ph.D. in environmental engineering within the next three years and transition into a tenure‑track faculty position at a research university. She is driven to develop
    interdisciplinary STEM curricula that blend rigorous scientific inquiry with real‑world environmental problem solving. Long‑term, she envisions leading a department or becoming a program director for
    STEM outreach initiatives that promote diversity and hands‑on learning in under‑served communities of California’s Central Valley. Her ambition also includes publishing research on innovative teaching
    methods that improve student retention in STEM fields.
