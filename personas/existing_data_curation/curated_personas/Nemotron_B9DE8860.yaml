personas:
  professional: Bailey Hiza is a retail operations specialist who leverages their team‑leadership talent and an eye for visual merchandising, using data‑driven forecasting and methodical scheduling to turn
    stores into art‑inspired experiences while quietly championing staff well‑being.
  sports: Bailey Hiza gears up for early‑morning runs along the Mahoning River trail, participates in the local Mahoning River Runners club, supports the Cleveland Browns, Cavaliers, and Guardians, and
    supplements cardio with bi‑weekly yoga classes at Serenity Studio to balance a desk‑heavy work life.
  arts: Bailey Hiza immerses themselves in contemporary visual culture, painting acrylic abstracts inspired by Yayoi Kusama, sketching street murals echoing Banksy, and curating playlists featuring Sufjan
    Stevens and Florence Welch while frequenting the Youngstown Art Museum and downtown galleries.
  travel: Bailey Hiza prefers meticulously planned solo getaways, having explored the urban art scene of Chicago and the historic streets of Florence, while dreaming of a weekend bike‑tour through the Adirondacks,
    always balancing travel costs against their goal of funding a future boutique‑art space.
  culinary: Bailey Hiza enjoys crafting grain‑bowl lunches featuring quinoa, roasted sweet potatoes, and avocado, masters a decent espresso shot for their coffee‑shop hopping habit, and occasionally indulges
    in homemade chicken tikka masala, though they tend to order takeout on nights when work stress peaks.
  core: Bailey Hiza is a detail‑driven retail leader who channels artistic curiosity into store design, battles chronic worry with journaling, and secretly hoards pastel‑colored sticky notes for every project.
background:
  cultural: Bailey grew up in Struthers, Ohio, a close‑knit former steel‑town community in Mahoning County. Her family’s European ancestry (primarily German and Irish) reflects the region’s immigrant heritage,
    and she was raised with Midwestern values of hard work, modesty, and community service. Local traditions—high‑school football games, church gatherings, and neighborhood potlucks—instilled a sense of
    cooperation and harmony. The area’s evolving arts scene, highlighted by the Youngstown arts district and community murals, nurtured her curiosity for unconventional ideas and appreciation for visual
    expression. These cultural influences shape her organized yet creative outlook and her desire to maintain supportive relationships both at work and in her personal life.
attributes:
  skills: '["Team Leadership", "Staff Training & Coaching", "Inventory Management", "Data‑Driven Forecasting", "Visual Merchandising", "Scheduling & Workforce Planning", "Conflict Mediation", "Customer
