  hobbies: '["Acrylic Painting", "Sketching", "Gallery Visits", "Contemporary Fiction Reading", "Poetry Exploration", "Journaling for Mindfulness", "Mahoning River Trail Hiking", "Urban & Landscape Photography",
    "Small‑Group Book Club", "Coffee‑Shop Interior Exploration"]'
  career_goals: Bailey aims to advance to a district manager role within the next two years, overseeing multiple retail locations and shaping regional sales strategy. To support this, she plans to complete
    an associate degree in Business Administration and enroll in leadership workshops focused on stress resilience and emotional intelligence. Long‑term, she envisions launching a boutique that blends retail
    with a curated art space, allowing her to merge her supervisory experience with her passion for visual arts. She also aspires to mentor emerging supervisors, fostering supportive, low‑stress workplace
    cultures.
