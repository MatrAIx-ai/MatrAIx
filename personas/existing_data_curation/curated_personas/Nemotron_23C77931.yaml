  career_goals: Francisco aims to obtain a California real‑estate broker license within the next year and expand his portfolio to manage at least 150 residential units across Los Angeles County. He aspires
    to transition into a senior leadership role, such as Director of Operations for a regional property‑management firm, where he can shape organizational strategy and mentor junior managers. Long‑term,
    he plans to launch his own boutique property‑management company focused on sustainable, community‑oriented housing that leverages technology for efficiency. Parallel to his professional ambitions, he
    seeks to strengthen his emotional resilience through regular mindfulness practice, ensuring his anxiety does not hinder his effectiveness or career progression.
