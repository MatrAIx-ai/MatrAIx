  hobbies: '["DIY home improvement projects", "Electronics tinkering and Arduino/Raspberry Pi projects", "Hiking and nature walks in Florida springs", "Gardening (herbs and vegetables)", "Reading nonfiction
    (technology, science, self‑help)", "Puzzle solving (crosswords, Sudoku)", "Running and yoga for stress relief", "Local maker community meetups", "Cooking Southern cuisine with experimental twists"]'
  career_goals: Racquel aims to advance to a senior engineering technologist role within the next three years, leading cross‑functional process‑improvement initiatives and overseeing a team of technicians.
    She plans to earn a master's degree in engineering management to broaden her strategic perspective and to obtain certifications in renewable energy systems, positioning herself as a go‑to expert for
    Florida's emerging solar and micro‑grid projects. Her competitive drive pushes her to seek visible performance metrics, earn recognition for cost‑saving innovations, and eventually launch a consulting
    practice that helps small manufacturers adopt lean and sustainable technologies.
