personas:
  professional: Racquel Kline, a 29-year-old engineering technologist specializing in mechanical and electrical system optimization, leverages SolidWorks, PLC programming, and lean methodologies to deliver
    cost-effective solutions, while their critical, competitive mindset drives rigorous testing and the pursuit of visible performance metrics.
  sports: Racquel Kline, an avid runner and weekend hiker in Levy County, logs weekly miles with the local Trailblazers Running Club, supports the Tampa Bay Buccaneers and the Orlando Magic, practices yoga
    at a boutique studio twice a week, and joins a seasonal intramural softball league each spring to balance competitive drive with stress relief.
  arts: Racquel Kline nurtures a quiet creative side by attending live performances of indie folk artist Phoebe Bridgers, exploring the kinetic sculptures of Theo Jansen, and curating a personal playlist
    that alternates between classic blues guitarist B.B. King and modern ambient composer Brian Eno, which fuels their reflective downtime.
  travel: Racquel Kline prefers meticulously planned road trips that blend outdoor adventure with cultural immersion, having already explored the historic streets of Savannah, the volcanic landscapes of
    Iceland, and the mangrove tunnels of the Everglades, while dreaming of a future canoe trek through the pristine waterways of Patagonia.
  culinary: Racquel Kline enjoys experimenting in the kitchen, skillfully melding Southern staples like shrimp and grits with umami twists such as miso-infused butter, frequently seasoning roasted root
    vegetables with smoked paprika and fresh rosemary, and hosting modest dinner gatherings that showcase their penchant for both classic comfort and modern flavor pairings.
  core: Racquel Kline is a detail-driven engineering technologist who balances a relentless drive for efficiency with a habit of over-analyzing every decision, often juggling a screwdriver in one hand and
    a crossword puzzle in the other.
background:
  cultural: Racquel is a white Floridian with deep roots in the rural Southeast. She grew up in a close‑knit small‑town environment where self‑reliance, hospitality, and community gatherings are valued.
    Her family has emphasized the importance of education, hard work, and practical careers, fostering her early interest in engineering. She identifies with Southern cultural traditions such as outdoor
    festivals, seafood cookouts, and church‑based community service, while also embracing progressive scientific thinking and a forward‑looking mindset. This blend of traditional Southern values and modern
    technical curiosity shapes her worldview and daily life.
attributes:
  skills: '["Computer-Aided Design (SolidWorks)", "Programmable Logic Controllers (PLC) programming", "Electrical and mechanical troubleshooting", "Process optimization and lean manufacturing", "Data acquisition
