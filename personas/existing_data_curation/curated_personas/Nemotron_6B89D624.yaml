personas:
  professional: Gary Cassidey is a budding robotics enthusiast who channels their curiosity and pragmatic mindset into designing and programming Arduino-based competition bots for the school's robotics
    club, while also crafting concise tutorial videos for a growing YouTube channel, reflecting their balance of organized planning and flexible creativity.
  sports: Gary Cassidey dribbles for the Warren community center's youth basketball league, cheers for the Detroit Pistons, rides a bike along the Detroit Riverwalk for cardio, and they manage practice
    schedules with schoolwork thanks to their organized yet adaptable approach.
  arts: Gary Cassidey runs a YouTube channel where they edit cooperative game highlights set to tracks by Eminem and The White Stripes, while also appreciating Motown classics like Marvin Gaye during family
    road trips, reflecting a blend of digital storytelling and regional musical heritage.
  travel: Gary Cassidey plans weekend adventures that range from biking the Detroit Riverwalk to day-tripping to Ann Arbor's historic downtown and camping at Indiana Dunes, favoring low-cost, hands-on experiences
    over distant vacations because of their practical, community-focused outlook.
  culinary: Gary Cassidey loves the cheesy crunch of Detroit-style pizza and the salty bite of a classic coney dog, often whipping up quick mac and cheese with extra cheese curds while editing videos, and
    they occasionally experiment with homemade energy bars using oats, peanut butter, and honey for a DIY snack boost.
  core: Gary Cassidey is a pragmatic tinkerer who fuses robotics, basketball, and video storytelling into a balanced, sociable life, even if they sometimes forget to charge their robot's battery before
    a competition.
background:
  cultural: Gary's cultural background is rooted in the Midwestern, suburban community of Warren, Michigan. His family has lived in the Detroit metropolitan area for generations, with ties to the region's
    automotive and manufacturing heritage. The community emphasizes hard work, practicality, and neighborly support, which have shaped Gary's values. He has grown up attending public school, participating
    in local sports and community events, and being exposed to the broader cultural influences of nearby Detroit, including its music scene, diverse neighborhoods, and strong sense of local pride. These
    experiences foster a blend of traditional Midwestern modesty and openness to new ideas.
