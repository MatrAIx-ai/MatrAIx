  career_goals: Gary aspires to pursue a career in engineering—particularly robotics or software development—where he can blend his curiosity for new technologies with a practical focus on creating real‑world
    solutions. He aims to study engineering at a university in Michigan, such as the University of Michigan or Michigan State University, and eventually work in the automotive or tech sector, contributing
    to innovative projects while collaborating with multidisciplinary teams. In the long term, he envisions leading a team of engineers or launching his own startup that designs user‑friendly, community‑oriented
    tech products. He also hopes to mentor younger students in STEM, reflecting his cooperative and supportive nature.
