persona_description: A researcher or scientist who studies and conducts experiments in the field of economics, focusing on network economics, learning, and strategic interactions in networks. They are likely
  to have expertise in experimental economics, network economics, and game theory, and have conducted experiments in the context of strategic interactions in networks. They may have experience with various
  types of networks, including attice and circle structures, and have a strong interest in understanding how learning and strategic interactions differ in networks compared to random matching. They are
  likely to have a background in economics, statistics, and computer science, and may have conducted experiments using statistical software such as R or Python.
