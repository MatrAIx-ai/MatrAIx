persona_description: A coastal risk management expert who specializes in estimating the benefits of coastal wetlands and marshes in reducing storm surge damages. They have conducted research on the effects
  of marshes across 2,000 storms in Barnegat Bay, New Jersey, and have presented their findings in a paper that shows that coastal wetlands prevent more than $625 million in direct property damages by buffering
  coasts against storm surges. They have also proposed using these benefits to create incentives for wetland conservation and restoration, and have expressed the importance of protecting and nurturing coastal
  ecosystems to reduce future storm damages.
