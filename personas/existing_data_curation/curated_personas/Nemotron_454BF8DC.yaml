  hobbies: '[''Hiking the Columbia River Gorge'', ''Birdwatching'', ''Gardening'', ''Reading historical fiction'', ''Knitting'', ''Watercolor painting'', ''Volunteer work at the local library'', ''Cooking
    for friends and family'']'
  career_goals: Judith’s ambitions focus on staying engaged, learning, and giving back to her community. She plans to deepen her knowledge of Pacific Northwest ecology by taking a community‑college course
    on native plants and becoming a volunteer docent at the Gifford Pinchot National Forest. She wishes to mentor younger volunteers at the local senior center, leading workshops on budgeting and basic
    computer skills. Additionally, Judith hopes to document her life story and family history in a memoir and to travel to several national parks she admires—such as Olympic and Yellowstone—while maintaining
    her health through regular walks and gentle yoga.
