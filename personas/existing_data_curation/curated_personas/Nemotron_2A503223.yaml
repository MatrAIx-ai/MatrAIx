personas:
  professional: Jason Landry, a 29‑year‑old IT support specialist with a strong foundation in Windows/macOS troubleshooting, Active Directory, PowerShell scripting, and remote assistance tools, they combine
    meticulous ticket documentation and clear empathetic communication with a pragmatic, structure‑preferring approach to problem‑solving, while maintaining a flexible, relaxed attitude toward scheduling
    that allows them to mentor junior staff and volunteer at community tech workshops, all as they chase CompTIA Network+ and Azure Fundamentals certifications for a future network administration role.
  sports: Jason Landry, an avid jogger on the Clear Creek Trail and member of the Windy City Runners club, they avidly follow the Chicago Cubs, Bears, and Blackhawks, attend games whenever possible, and
    occasionally join a pickup basketball league at the local community center, balancing seasonal sports enthusiasm with a practical, low‑key fitness routine.
  arts: Jason Landry, a classic‑rock enthusiast who spins Led Zeppelin, Pink Floyd, and The Rolling Stones on weekend drives, they regularly attend performances by the Chicago Symphony Orchestra and enjoy
    reading sci‑fi novels by Neal Stephenson and Ursula K. Le Guin, which together shape their creative problem‑solving mindset and provide a regular escape from tech troubleshooting.
  travel: Jason Landry, who prefers road‑trip adventures that blend budget awareness with cultural immersion, they frequently explore nearby attractions such as the Iowa State Fair and Lake Geneva for weekend
    getaways, have a wish list that includes a solo trek through Norway’s fjords, and plan trips with a mix of spontaneous detours and modest pre‑booking, all while balancing a modest savings plan.
  culinary: Jason Landry, a self‑described comfort‑food chef, they regularly whip up chicken pot pie, mac & cheese, and a homemade deep‑dish pizza topped with mozzarella, sausage, and fresh basil, enjoy
    experimenting with sous‑vide for precise protein cooking, and consider their culinary skills intermediate—sufficient to impress friends at Sunday pot‑luck gatherings.
  core: Jason Landry is a technically gifted, community‑focused problem‑solver who balances meticulous work habits with a laid‑back lifestyle, occasional impulsive PC‑part splurges, classic‑rock devotion,
    and sunrise jogging.
background:
  cultural: Jason grew up in a suburban Midwestern family near Chicago, immersed in the region's values of community involvement, modesty, and a strong work ethic. He experienced local traditions such as
    county fairs, high school sports, and a supportive church community, though he now identifies as culturally secular. His upbringing fostered a collaborative spirit, practical problem‑solving, and a
    genuine desire to help others—traits that continue to shape his personal and professional life.
attributes:
  skills: '[''Windows OS troubleshooting'', ''macOS support'', ''Active Directory management'', ''Ticketing system (ServiceNow/Zendesk)'', ''Remote desktop assistance'', ''Hardware diagnostics'', ''Basic
    networking (TCP/IP, DHCP, DNS)'', ''PowerShell scripting'', ''Customer service and conflict resolution'', ''IT security best practices'', ''Technical documentation'']'
  hobbies: '[''Building custom PCs'', ''Co‑op video gaming (e.g., Overwatch)'', ''Jogging in Clear Creek Trail'', ''Volunteering at Tech for Seniors'', ''Attending Chicago Cubs games'', ''Classic rock music'',
    ''Sci‑fi reading'', ''Cooking comfort food'', ''Woodworking projects'']'
  career_goals: 'Jason aims to earn CompTIA Network+ and Microsoft Certified: Azure Fundamentals within the next two years, positioning himself for a transition to a network administrator role. Long‑term,
    he envisions moving into senior technical support or IT management, where he can design and lead support processes that balance efficiency with his compassionate, user‑focused approach. He also hopes
    to mentor junior staff and contribute to community tech education initiatives.'
