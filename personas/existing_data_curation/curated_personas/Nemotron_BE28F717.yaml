  career_goals: Kim aims to become a certified Safety Professional (CSP) and earn her Professional Engineer (PE) license within the next three years, positioning herself for a senior health-and-safety manager
    role at a regional manufacturing plant. She envisions leading cross-functional continuous-improvement initiatives that embed ergonomic and mental-health considerations into the production culture. Long-term,
    she hopes to launch a consultancy that helps small-to-mid-size Pennsylvania manufacturers implement sustainable safety programs while mentoring the next generation of female engineers. Participation
    in industry conferences, publishing case studies on stress-reducing workplace design, and serving on standards committees are also part of her ambition.
