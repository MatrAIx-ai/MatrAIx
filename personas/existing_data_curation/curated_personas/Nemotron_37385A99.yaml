personas:
  professional: Pranee Martinez, an aspiring junior architect and school project coordinator, channels their curiosity and practical mind into constructing elaborate LEGO cityscapes while leading classmates
    through collaborative design challenges, balancing organization with flexible creativity.
  sports: Pranee Martinez, a spirited member of the San Diego Youth Soccer Club's U-10 team, also swims at the family-friendly Pacific shoreline, cheering for the San Diego Wave FC women's soccer team and
    the San Diego Padres, while participating in school track events each spring.
  arts: Pranee Martinez, an enthusiastic creator of manga-inspired panels and a passionate participant in the school drama club, draws inspiration from Studio Ghibli's Hayao Miyazaki, the vibrant works
    of Naoko Takeuchi, and the theatrical flair of Lin-Manuel Miranda's *Hamilton*, often rehearsing monologues aloud while sketching characters in notebook margins.
  travel: Pranee Martinez loves weekend trips to the local Torrey Pines State Reserve for nature hikes, enjoys sunny days at the San Diego beach, dreams of exploring Tokyo's anime districts and snorkeling
    at the Great Barrier Reef, balancing family-friendly relaxation with a thirst for cultural adventure.
  culinary: Pranee Martinez helps the family prepare fresh vegetable spring rolls with rice paper, shrimp, carrots, and cucumber, delights in homemade pizza topped with pepperoni and olives, and practices
    making simple stir-fry noodles, showing a budding enthusiasm for hands-on cooking and a preference for bright, crunchy flavors.
  core: Pranee Martinez is an energetic, curiosity-driven nine-yearer whose love for teamwork, creative building, and cultural dance fuels a lively, organized, yet adaptable outlook, tempered by occasional
    impulsive spending and a stubborn refusal to wear sunscreen.
background:
  cultural: Pranee's family is of Vietnamese heritage, and their household blends Southeast Asian traditions with American life. She grows up speaking both English and Vietnamese, celebrates Tet with family
    gatherings and traditional foods such as pho and bánh chưng, and participates in community festivals at the Virginia Beach Asian Cultural Center. The values of respect for elders, emphasis on education,
    and love of communal meals are central to her upbringing, while she also embraces beach outings, summer barbecues, and other local customs of Virginia Beach.
