  hobbies: '["Soccer", "Swimming", "LEGO building", "Drawing", "Reading adventure books", "School drama club", "Nature exploration", "Cooking with family", "Traditional dance practice"]'
  career_goals: Pranee dreams of a future where she can combine her love for the ocean and her curiosity about living creatures, aspiring to become a marine biologist or an environmental scientist. She
    also envisions helping other children learn as a teacher, and she enjoys designing eco-friendly inventions, showing her practical side. While still exploring possibilities, she aims to stay curious,
    helpful, and collaborative in any career she chooses.
