  career_goals: Alexander aims to transition from being a subcontractor to owning a boutique finishing company that blends high‑quality craftsmanship with artistic expression. He plans to obtain certification
    in historic building restoration and decorative painting, which will allow him to take on preservation projects in Maine’s historic towns. Over the next five years he hopes to build a reputation for
    custom murals and hand‑painted accent walls, securing contracts with boutique hotels, restaurants, and private residences. He also wants to mentor a small team of apprentices, creating a local pipeline
    of skilled finishers. Balancing financial stability for his family, Alexander seeks to carve out time for personal artistic projects and to be recognized as a creative leader in the regional interior‑finishing
    community.
