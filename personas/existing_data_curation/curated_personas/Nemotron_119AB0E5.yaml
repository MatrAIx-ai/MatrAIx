personas:
  professional: Alexander Duff, a seasoned interior finisher and aspiring historic restoration entrepreneur, merges precise drywall and wallpaper installation expertise with a vivid artistic eye, delivering
    custom murals that echo Maine’s logging heritage while keeping projects on schedule through meticulous planning and collaborative leadership.
  sports: Alexander Duff, an avid hiker and birdwatcher, tackles the Appalachian Trail’s Maine sections on weekends, volunteers with the Milo Hiking Society’s trail maintenance crew, follows the Portland
    Sea Dogs for baseball, and maintains a modest cardio routine of early‑morning jogs along Milo Lake.
  arts: Alexander Duff, an abstract painter inspired by the bold color fields of Mark Rothko and the stark landscapes captured by Ansel Adams, strums acoustic guitar at local jam sessions featuring folk
    renditions of Bob Dylan and Joni Mitchell, and creates theatrical set designs for the Milo Community Theater, collaborating with regional woodworkers and costume makers.
  travel: Alexander Duff, who favors low‑key, nature‑centric road trips, meticulously plans annual autumn drives to Acadia National Park, spends weekend escapades exploring the White Mountains, and harbors
    a long‑standing dream of a summer pilgrimage to the Scottish Highlands to trace the Celtic storytelling roots that quietly shape his creative narrative.
  culinary: Alexander Duff, an experimental home chef, combines foraged spruce tips, wild mushrooms, and freshly caught lobster into inventive dishes like a lobster‑spruce‑tip risotto, perfects a hearty
    New England clam chowder for family gatherings, and frequently swaps recipe ideas at the Milo farmers’ market, where they source seasonal blueberries and heirloom potatoes.
  core: Alexander Duff, a self‑taught muralist and woodworker, balances an unrelenting drive for artistic perfection with a habit of neglecting sleep, often losing track of time sketching in the woods until
    the midnight chill forces a return to unfinished finishing contracts.
background:
  cultural: Alexander grew up in Milo, a small town in Piscataquis County, Maine, where New England’s rural ethos of self‑reliance, modesty, and hard work shaped his worldview. His family traces roots to
    Irish immigrants who settled in the region in the early 20th century, blending Celtic storytelling traditions with the practical crafts of the logging and fishing communities that have long defined
    Maine’s cultural landscape. Local festivals, community gatherings, and the region’s strong appreciation for natural beauty fostered his connection to the outdoors and to hands‑on craftsmanship. While
    he embraces the broader American cultural narrative of individualism, Alexander also values the close‑knit community ties, seasonal tourism influences, and the emerging artisan scene that celebrate
    both heritage and creative innovation.
