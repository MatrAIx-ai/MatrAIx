persona_description: A nutritionist who specializes in the study of gut health, particularly the role of probiotics and their impact on the development of celiac disease. She has extensive knowledge and
  experience in the field and has written several articles on the topic. She is a member of the European Society for Paediatric Gastroenterology, Hepatology and Nutrition and has spoken at various conferences
  on the subject. She is passionate about promoting healthy gut microbiology and has developed a new method for introducing probiotics to breast milk during pregnancy. She is aware of the challenges that
  women face in breastfeeding and believes that it is important to shift society to accommodate biology.
