personas:
  professional: Plair Bacchus, a seasoned construction foreperson with three decades of framing, concrete finishing, and heavy equipment operation, applies methodical planning and an inquisitive mindset
    to merge modern safety standards with time‑honored building practices, ensuring crews stay organized, on schedule, and supportive of community‑focused projects.
  sports: Plair Bacchus enjoys weekly hikes with the Northern New Mexico Trail Association, follows the New Mexico United soccer team and the Albuquerque Isotopes baseball club, and incorporates gentle
    yoga sessions at the community center to balance the physical demands of construction work.
  arts: Plair Bacchus creates intricate beadwork and pottery inspired by ancestral motifs, drums at local powwows while studying patterns from R. Carlos Nakai, and draws artistic inspiration from Georgia
    O'Keeffe's desert canvases and the storytelling of author Cormac McCarthy.
  travel: Plair Bacchus prefers meticulously planned road trips that combine cultural immersion and natural wonder, having trekked through Mesa Verde, photographed the Grand Canyon’s sunrise, explored Santa
    Fe’s art scene, and now yearns to visit Machu Picchu to capture its historic stonework.
  culinary: Plair Bacchus enjoys cooking hearty three‑sisters stew with blue corn masa, roasted chilaca pepper enchiladas, and sautéed nopales, mastering the balance of traditional native ingredients and
    modern techniques while often swapping recipes at the community garden potluck.
  core: Plair Bacchus is a diligent, curiosity‑driven builder who balances community stewardship with meticulous budgeting, grapples with chronic worry, and finds solace in beadwork, desert hikes, and the
    steady rhythm of a drum.
background:
  cultural: Plair is an American Indian woman of Zuni descent, raised in the Yatahey area of McKinley County, New Mexico. Her upbringing was steeped in tribal traditions that honor the land, emphasize collective
    responsibility, and preserve artistic crafts such as weaving and pottery. She speaks some Zuni language, participates in seasonal ceremonies, and maintains strong ties to her extended family and the
    local pueblo council. These cultural roots inform her work ethic, her commitment to community building, and her respect for sustainable, earth‑centered practices.
