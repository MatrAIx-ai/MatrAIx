  career_goals: Plair aims to advance to a forewoman or site safety coordinator role, obtaining OSHA 30‑hour certification and specialized training in sustainable building. She hopes to lead community‑focused
    projects—such as constructing a cultural center that blends modern efficiency with traditional Zuni design—while mentoring younger workers, especially members of her tribe. Long‑term, she envisions
    starting a small contracting business that emphasizes eco‑friendly construction and preserves indigenous building knowledge.
