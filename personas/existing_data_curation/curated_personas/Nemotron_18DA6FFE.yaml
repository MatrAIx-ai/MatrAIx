  hobbies: '[''Painting (watercolor and acrylic)'', ''Landscape hiking and photography'', ''Visiting art galleries and museums'', ''Cooking traditional Spanish cuisine'', ''Listening to classical guitar
    and flamenco'', ''Playing chess at the senior center'', ''Gentle yoga and mindfulness meditation'', ''Collecting and restoring vintage Spanish ceramics'', ''Volunteering as a docent at the Auburn Historical
    Museum'']'
  career_goals: Although retired, Norbert aims to leave a creative legacy that bridges his Spanish heritage and his Californian home. He plans to complete a series of paintings that juxtapose the Sierra
    foothill landscapes with motifs from Andalusian art, then organize a traveling exhibition at senior centers and local galleries. He also aspires to write and self-publish a memoir-styled collection
    of family stories and cultural reflections, preserving the language and customs of his upbringing. Volunteering as a docent at the Auburn Historical Museum, he hopes to develop an educational program
    that introduces Spanish art to the community. Finally, he seeks to mentor a small group of senior artists, sharing techniques and fostering intergenerational exchange.
