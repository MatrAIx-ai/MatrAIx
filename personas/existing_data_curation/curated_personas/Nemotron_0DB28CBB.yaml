personas:
  professional: Scott Pita, a retired small-scale farmer turned community-event coordinator, leverages his hands-on carpentry, mechanical troubleshooting, and methodical gardening expertise to organize
    smooth local festivals while quietly mentoring younger volunteers; they apply pragmatic curiosity and balanced reliability to every task.
  sports: Scott Pita, an avid Green Bay Packers fan, balances their love for football with gentle morning walks around their farm, weekly shore fishing for trout at Green Lake, and occasional senior bowling
    league outings; they treat each activity as a season-appropriate form of exercise.
  arts: Scott Pita, a lifelong admirer of Midwestern folk traditions, spends weekends listening to Bob Dylan and classic bluegrass, browsing local art fairs for Grant Wood reproductions and Wisconsin painter
    John Stead, and attending community theater productions of American classics; they let these creative encounters flavor their woodworking designs.
  travel: Scott Pita, who prefers well-planned road trips over spontaneous flights, has driven the historic Route 66 to explore Civil War battlefields in Pennsylvania and dreams of visiting their ancestral
    hometown in Ireland next spring; they balance their love for regional history with practical budgeting and occasional stays at family-run bed-and-breakfasts.
  culinary: Scott Pita, an adept home chef, often pan-fries freshly caught trout with lemon, butter, and garden herbs before serving it alongside squeaky cheese curds seasoned with sea salt and a hearty
    heirloom tomato salad; they occasionally over-salt their dishes in an enthusiastic zest for flavor.
  core: Scott Pita, a 75-year-old retired farmer whose pragmatic curiosity drives heirloom gardening, genealogy, and woodworking, balances meticulous stewardship of their land with a worry-prone mind, a
    fondness for cheese curds, and a habit of checking their blood pressure after each woodworking session.
background:
  cultural: Scott is a white Midwesterner with deep roots in the agricultural communities of central Wisconsin. His family lineage traces back to German and Polish immigrants who settled in Green Lake County
    in the late 19th century, bringing a strong work ethic, self‑reliance, and a reverence for tradition. Growing up in the small town of Markesan, he was shaped by close‑knit community values, weekly church
    attendance, and a culture that emphasizes neighborly cooperation, modesty, and respect for the land. These influences manifest in his appreciation for homemade food, seasonal celebrations, and community
    service, while his curiosity drives him to explore both his heritage and new ideas.
