personas:
  professional: B Garcia, a senior surveillance specialist in high‑volume casino environments, leverages meticulous real‑time video monitoring, rapid threat assessment, and bilingual de‑escalation while
    channeling their competitive edge and methodical planning into proactive security protocols.
  sports: B Garcia, an avid participant in Miami’s weekly soccer pick‑up games and a dedicated weight‑lifting and Brazilian jiu‑jitsu practitioner at the Miami Martial Arts Academy, roots for the Miami
    Heat and follows Inter Miami CF, channeling competitive drive into both team sports and solo training.
  arts: B Garcia immerses themselves in Miami’s vibrant arts scene, dancing salsa to the rhythms of Marc Antonio Solís and listening to live performances by John Legend at the Adrienne Arsht Center, while
    also curating playlists featuring Shakira and The Rolling Stones for their post‑work wind‑down.
  travel: B Garcia, who balances a packed security schedule with a love for short, well‑planned getaways, frequently explores Caribbean locales like Cartagena and San Juan for cultural immersion, while
    dreaming of a road trip through the Pacific Northwest’s national parks for a blend of adventure and solitude.
  culinary: B Garcia enjoys experimenting in the kitchen, skillfully preparing arepas, ajiaco, and empanadas with a personal twist of smoked paprika and fresh cilantro, while seeking out the perfect guava‑based
    dessert to cap evenings after salsa practice.
  core: B Garcia fuses methodical security expertise with a competitive, sociable streak, balancing disciplined routines, late‑night poker simulations, and a relentless passion for salsa and community safety.
background:
  cultural: Victor was born to Colombian immigrant parents and raised in Miami’s vibrant Little Havana area, where Spanish is spoken at home and Colombian traditions are celebrated. He maintains strong
    ties to his heritage through family gatherings, music, and cuisine, and his bilingual fluency reflects both his Colombian roots and his American upbringing. The blend of Caribbean rhythm, Catholic values,
    and the multicultural tapestry of South Florida shapes his worldview, fostering a respect for community, a love of festive social interaction, and a pragmatic approach to navigating a diverse urban
    environment.
