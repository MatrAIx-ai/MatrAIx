  career_goals: Victor aims to leverage his practical expertise and competitive drive to ascend to a senior surveillance management role within a major casino or entertainment complex. He plans to obtain
    advanced certifications in security management and cyber-surveillance, and eventually transition into a consulting capacity where he can design and implement security protocols for multiple venues.
    Long-term, he envisions establishing his own security consultancy that integrates cutting‑edge technology with rigorous procedural standards.
