  hobbies: '[''Art museum visits'', ''Painting and sketching'', ''Experimental cooking and plating'', ''Hiking in Columbia River Gorge'', ''Nature photography'', ''Reading culinary literature'', ''Herb
    gardening'', ''Listening to classical and jazz music'', ''Woodworking projects'', ''Jigsaw puzzles'']'
  career_goals: Joseph aims to earn the Certified Chef de Cuisine credential within the next two years and leverage that qualification to become head chef at a respected farm‑to‑table restaurant in the
    Portland area. He dreams of eventually opening a boutique catering business that showcases artistic, seasonally driven menus rooted in local ingredients. A core ambition is to design an ultra‑efficient,
    low‑waste kitchen model that can be replicated by other establishments. He also hopes to publish a cookbook that documents his experimental recipes and the visual concepts that inspire them, establishing
    himself as a thought leader at the intersection of culinary art and sustainable practice.
