  career_goals: Paul aims to transition from a junior developer to a senior software engineer within the next three years, focusing on projects that blend technology with creative expression—such as immersive
    AR/VR art platforms or interactive digital installations. He seeks to become a tech lead who can orchestrate multidisciplinary teams, champion innovative product roadmaps, and mentor younger engineers.
    Long‑term, Paul envisions founding a startup that offers SaaS tools for artists and designers to build interactive experiences without deep coding knowledge. To support these ambitions, he plans to
    pursue advanced certifications in cloud architecture and product management while cultivating a strong professional network through local meetups and industry conferences.
