  career_goals: Leonida dreams of becoming a scientist or engineer who can create practical solutions for environmental challenges, like designing devices that keep beach clean-ups efficient. She aims to
    win school science fairs and math competitions, showcasing her competitive spirit. Additionally, she hopes to be a bilingual teacher one day, inspiring other children to embrace both their Mexican heritage
    and curiosity for learning, while also developing strategies to help peers manage strong emotions.
