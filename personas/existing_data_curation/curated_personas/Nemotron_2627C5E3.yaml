personas:
  professional: Leonida Fernandez, an aspiring junior soccer team captain, blends curiosity with practicality by planning games, demonstrating competitive spirit while remaining reliable and attentive to
    teammates' responsibilities.
  sports: Leonida Fernandez thrives on the soccer field, playing for the Culver City Youth Soccer Club, cheering for the LA Galaxy and LAFC, and approaches fitness with energetic drills, a competitive edge,
    and a habit of organizing pick-up games for friends after school.
  arts: Leonida Fernandez channels creativity through drawing vibrant characters inspired by Frida Kahlo’s colors and Dr. Seuss’s whimsy, dances to lively folk tunes by Los Tigres del Norte and Lila Downs,
    and eagerly watches animated adventures starring characters like Moana and Raya.
  travel: Leonida Fernandez loves family road trips to the Santa Monica beach and weekend hikes in Griffith Park, dreams of exploring the ancient ruins of Teotihuacan and the bustling markets of Oaxaca,
    and prefers itineraries that mix structured museum visits with spontaneous playground discoveries.
  culinary: Leonida Fernandez delights in the bold flavors of homemade tamales, pozole, and avocado-lime guacamole, proudly helps stir salsa with diced tomato and cilantro, but can be picky about trying
    new vegetables, often opting for familiar cheese quesadillas after school.
  core: Leonida Fernandez is an energetic, curiosity-driven eight-year-old who balances competitive soccer ambitions with a love for colorful art, yet sometimes lets anxiety over games turn into dramatic
    meltdowns.
background:
  cultural: Leonida comes from a Mexican-American family in Culver City, California. Spanish is spoken at home alongside English, and she celebrates cultural traditions such as Día de los Muertos and Cinco
    de Mayo with family gatherings, traditional foods like tamales and pozole, and music. Her household emphasizes the importance of family bonds and respect for cultural heritage, while also encouraging
    her to thrive in the diverse, multicultural environment of Los Angeles County.
