  career_goals: Ellen is focused on climbing the sales leadership ladder to become a regional sales director within the next three years, and ultimately a VP of Sales for a technology firm. She aims to
    build high‑performing, data‑driven sales teams, spearhead the launch of innovative product lines, and mentor emerging women in tech sales. Ellen also plans to earn a professional certification such
    as the Certified Sales Leader (CSL) and pursue an executive MBA to broaden her strategic perspective.
