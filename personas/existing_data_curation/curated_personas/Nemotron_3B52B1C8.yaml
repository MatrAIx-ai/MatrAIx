personas:
  professional: Jesus Lebrija is a budding technophile who blends curiosity with practicality by constructing intricate LEGO models and coding short games on Scratch, channeling their competitive edge into
    meticulous problem‑solving and organized project documentation.
  sports: Jesus Lebrija shines in weekend soccer matches with a small group of friends at the local park, idolizing professional clubs like FC Barcelona and cheering for the nearby MLS team Houston Dynamo,
    while also participating in a youth swimming club during the summer, reflecting their competitive spirit and love for team dynamics.
  arts: 'Jesus Lebrija avidly reads comic books by creators such as Stan Lee and Brian K. Vaughan, often sketches their own superhero panels after school, and enjoys the animated film ''Spider‑Man: Into
    the Spider‑Verse,'' showing how visual storytelling fuels their creative imagination.'
  travel: Jesus Lebrija prefers short, well‑planned family trips that blend adventure and relaxation, having explored the natural trails along the Rio Grande, visited the Grand Canyon on a school field
    trip, and dreaming of a future excursion to Tokyo's high‑tech districts via virtual reality.
  culinary: Jesus Lebrija delights in cheesy pepperoni pizza, crispy chicken nuggets, and creamy macaroni and cheese, and occasionally experiments in the kitchen by arranging mini fruit kebabs of strawberries,
    grapes, and banana chunks, reflecting a preference for familiar comfort foods with a playful twist.
  core: Jesus Lebrija is a curious, competitively driven ten‑year‑old who blends meticulous tinkering with LEGO and Scratch coding, strategic soccer play, and a disciplined yet occasionally forgetful approach
    to health and finances.
background:
  cultural: Jesus grows up in a Mexican‑American household in Weslaco, Texas, where Spanish is spoken at home and English at school, giving him a strong bilingual identity. He celebrates Mexican traditions
    such as Día de los Muertos and Christmas posadas, enjoys family meals of tacos, tamales, and pozole, and participates in local community events that blend Texan and Mexican cultures. The close‑knit,
    family‑oriented environment nurtures his respect for heritage while the border town setting exposes him to a diverse mix of customs, languages, and practical problem‑solving attitudes.
