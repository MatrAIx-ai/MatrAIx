  hobbies: '[''soccer'', ''LEGO building'', ''Scratch programming'', ''reading comic books'', ''science documentaries'', ''exploring the Rio Grande banks'']'
  career_goals: Jesus dreams of becoming a robotics or mechanical engineer who designs practical machines that help his community, especially in agriculture and border‑area infrastructure. He aims to attend
    a STEM‑focused high school, earn a scholarship for engineering, and eventually work on projects that blend technology with everyday life. He also keeps the ambition of playing soccer at a competitive
    level, hoping to balance a future in engineering with athletic achievement.
