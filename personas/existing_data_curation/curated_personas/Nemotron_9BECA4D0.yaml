  hobbies: '[''Woodworking'', ''Gardening'', ''Birdwatching'', ''Bridge'', ''Reading historical non-fiction'', ''Listening to big band jazz'', ''Volunteering at the senior center'', ''Walking along the
    Mississippi River trail'', ''Cooking classic Midwestern dishes'', ''Writing memoirs'']'
  career_goals: Although retired, William aims to continue contributing to his community by mentoring younger volunteers at the senior center, leading workshops on basic home maintenance, and assisting
    his grandchildren with career guidance. He hopes to complete a personal memoir that captures his family's Midwestern heritage and the lessons of his generation. Maintaining his health and independence
    is also a priority, as is ensuring that the neighborhood programs he values remain funded and vibrant.
