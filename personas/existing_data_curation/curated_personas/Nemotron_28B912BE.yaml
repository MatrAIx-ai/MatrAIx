personas:
  professional: Robert Wiggins, a seasoned high‑volume manufacturing assembler, leverages his expertise with CNC routers, MIG welding, and technical drawing interpretation to drive consistent quality while
    methodically applying lean tools and Arduino automation, reflecting his curious yet organized nature and competitive drive to ascend to production lead.
  sports: Robert Wiggins enjoys weekend trail runs in the nearby state park for solitary reflection, follows the local professional baseball team, the River City Tigers, as a loyal fan, and plays pickup
    basketball at a community gym, balancing cardio with the competitive edge of a strategic board‑game mindset.
  arts: Robert Wiggins frequents regional galleries and the modern art museum, sketches industrial landscapes inspired by photographer Andreas Gursky, admires the sculptural works of Anish Kapoor, and relaxes
    to the ambient soundscapes of Brian Eno and classic sci‑fi film scores by Vangelis, integrating visual and auditory art into their creative routine.
  travel: Robert Wiggins prefers meticulously planned road trips that blend adventure and culture, having driven the Pacific Coast Highway to capture the cliffs of Big Sur, exploring the industrial heritage
    museums of Manchester, UK, and eyeing a future solo trek through the Patagonian Andes while balancing vacation time with work commitments.
  culinary: Robert Wiggins enjoys cooking hearty meals such as smoked brisket with a dry rub of paprika, brown sugar, and cumin, mastering the art of homemade sourdough starter, and pairing dishes with
    a crisp craft IPA, while often ordering quick sushi rolls during late‑night design sessions.
  core: Robert Wiggins is a methodical maker who blends industrial precision with artistic curiosity, competes fiercely in board games, yet quietly savors solo hikes and occasional indulgences in fine woodwork.
background:
  cultural: Robert is a white American raised in the suburban communities of Lawrence, Nassau County. Growing up in a working‑class family near an affluent corridor gave him exposure to both the diligent,
    self‑reliant values of a blue‑collar environment and the artistic, eclectic influences of neighboring cultural institutions. This blend fosters a pragmatic outlook anchored in hard work, while also
    nurturing an appreciation for diverse artistic experiences and unconventional ideas.
attributes:
  skills: '[''assembly line operation'', ''CNC machine operation'', ''blueprint interpretation'', ''MIG welding'', ''quality inspection'', ''mechanical troubleshooting'', ''lean manufacturing techniques'',
    ''tool maintenance'', ''process documentation'', ''basic Arduino programming'']'
  hobbies: '[''Visiting art galleries and museums'', ''Industrial photography'', ''Scale model kit building'', ''Woodworking'', ''Hiking'', ''Reading science‑fiction'', ''Playing strategy board games'']'
  career_goals: Robert aims to move from a skilled assembler to a production lead, securing certifications such as OSHA 30‑hour and a Six Sigma Green Belt to deepen his expertise. He plans to become proficient
    in CNC programming and eventually transition into a manufacturing engineer role, where he can design more efficient workflows. Long‑term, he envisions launching a small custom metal‑fabrication shop
    that blends his technical skills with his passion for innovative, artistic design.
