persona_description: A public health researcher and epidemiologist who studies the impact of air pollution on human health, particularly in relation to the spread of infectious diseases such as coronavirus.
  They are interested in the correlation between pollution and the spread of the virus, and are seeking to understand the mechanisms by which fine particles, such as PM2.5, contribute to the spread of the
  virus. They are also interested in the potential benefits of clean air in preventing the spread of the virus and are advocating for stronger regulations on air pollution to protect human health during
  and after the COVID-19 crisis.
