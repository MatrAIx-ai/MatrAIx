persona_description: A concerned resident of eastern Kentucky who is passionate about preserving the environment and the tourism industry. They are aware of the issue of raw sewage dumping into streams
  and are actively involved in the PRIDE-Personal Responsibility in a Desirable Environment program to help low-income homeowners and businesses install septic systems or connect to sewer lines. They are
  determined to have all their streams safe for swimming by 2010 and are committed to making sure that the water quality is improved.
