personas:
  professional: Silvia Pujol is a budding visual artist and storyteller, and they captivate their after‑school art club with imaginative watercolor sketches, mixed‑media collages, and fan‑fiction narratives,
    letting their curious mind and relaxed attitude toward deadlines translate into spontaneous, whimsical creations.
  sports: Silvia Pujol keeps active by dancing merengue and bachata at family celebrations, playing pickup basketball with the community center’s youth team, the Sunrise Hoops, and cheering for the Los
    Angeles Lakers and New York Yankees on weekends, and they thrive on the camaraderie of group sport.
  arts: Silvia Pujol immerses themselves in creative worlds, and they draw inspiration from Hayao Miyazaki’s animated fantasies, Neil Gaiman’s literary universes, Frida Kahlo’s bold self‑portraits, and
    the vibrant rhythms of the Gipsy Kings, which fuel their sketching, fan‑fiction writing, and mixed‑media experiments.
  travel: Silvia Pujol plans weekend getaways with their family to coastal towns like Punta Cana and hopes to someday explore the streets of Barcelona and the museums of Paris, balancing spontaneous vacations
    with the reality of a teen’s limited allowance and school commitments, and they relish the mix of familiar gatherings and new horizons.
  culinary: Silvia Pujol loves preparing traditional mangú with boiled green plantains, sancocho brimming with yucca and corn, and crispy empanadas stuffed with beef and olives, often adding a pinch of
    achiote for color, and they experiment with homemade vanilla‑infused batidos while their cooking skill is solid enough to impress friends.
  core: Silvia Pujol is an endlessly imaginative teen whose art bursts with color, whose habit of scattering sketchbooks around the house matches their love for spontaneous dance parties, yet they often
    forget homework amid creative projects.
background:
  cultural: Silvia is a first‑ or second‑generation Dominican American living in Las Vegas. At home, Spanish is spoken alongside English, and Dominican customs—such as celebrating Carnaval, enjoying merengue
    and bachata music, and preparing traditional foods like mangú, sancocho, and flan—are integral parts of family life. Her parents instilled a strong sense of community, often participating in local Dominican
    festivals and supporting the diaspora’s cultural association in Clark County. This bicultural upbringing gives her a deep appreciation for both Dominican heritage and the diverse cultural landscape
    of Las Vegas, shaping her identity, language use, and artistic sensibilities.
attributes:
  skills: '[''Drawing'', ''Digital Illustration'', ''Creative Writing'', ''Bilingual Communication (Spanish/English)'', ''Basic HTML/CSS'', ''Team Collaboration and Mediation'', ''Basic Keyboard Piano'']'
  hobbies: '[''Sketching and Drawing'', ''Digital Illustration'', ''Creative Writing (Fanfiction, Poetry)'', ''Reading Fantasy Literature'', ''Mixed‑Media Art (Watercolor, Collage)'', ''Dancing to Merengue
    and Bachata'', ''Singing'', ''Cooking Dominican Cuisine'', ''Volunteering at Community Art Programs'', ''Playing Narrative‑Driven Video Games'']'
  career_goals: Silvia dreams of turning her love for imagination and art into a career as a concept artist for video games or animation studios, where she can create characters and worlds that inspire
    others. She also feels a deep calling to use art as a healing tool, hoping one day to become an art therapist or community arts facilitator who helps youth express emotions through creativity. In the
    near term, she aims to build a robust portfolio, attend summer art workshops, and launch a YouTube channel that shares tutorials, sketch‑along sessions, and behind‑the‑scenes looks at her creative process.
    Ultimately, she plans to pursue a college degree in graphic design or illustration, while continuing to volunteer at local community centers to foster artistic expression among her peers.
