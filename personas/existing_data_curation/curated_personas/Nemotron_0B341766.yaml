personas:
  professional: Maria Rainey blends their hands‑on expertise in modern cleaning, inventory control, and minor repairs with a curious, art‑appreciating mindset, making them a standout candidate for facility‑supervisor
    roles where safety, aesthetics, and efficiency intersect.
  sports: Maria Rainey roots for the Springfield Cardinals and the St. Louis Blues, trains with the local Ozark Trail Hiking Club on weekends, and occasionally joins a community basketball league at the
    Springfield Recreation Center.
  arts: Maria Rainey spends free time sketching downtown murals while listening to the lo‑fi beats of Nujabes and the jazz of Miles Davis, and they regularly attend productions by the Springfield Playwrights
    theater troupe.
  travel: Maria Rainey alternates between weekend camping trips in the Ozark National Forest, a Route 66 road‑trip with stops in Amarillo and Tulsa, and a long‑planned culinary pilgrimage to Asheville,
    North Carolina, to explore its farm‑to‑table scene.
  culinary: Maria Rainey experiments with Midwestern comfort dishes like chicken‑and‑dumpling casserole, adding rosemary‑infused sweet potatoes, smoked paprika, and locally sourced heirloom tomatoes, while
    their indoor garden supplies fresh basil and kale for improvisational salads.
  core: Maria Rainey is a detail‑driven, art‑obsessed janitorial professional who balances eco‑friendly ambition with a healthy dose of skepticism and a habit of turning everyday chores into creative experiments.
background:
  cultural: Maria grew up in Springfield, Missouri, within a predominantly white, Midwestern community with roots tracing back to German and Irish immigrant families. She was raised with a blend of traditional
    Midwestern values—practicality, self‑reliance, and community involvement—and an appreciation for local cultural events such as county fairs, farmers’ markets, and seasonal festivals. While she does
    not identify strongly with any particular religious tradition, she participates in community service through her church’s outreach programs and volunteers at neighborhood clean‑up initiatives. Her upbringing
    emphasizes modesty, hard work, and an openness to the artistic expressions found in the region’s theaters, murals, and music scene.
attributes:
