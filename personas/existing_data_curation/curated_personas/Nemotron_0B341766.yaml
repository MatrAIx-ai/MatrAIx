  hobbies: '[''Visiting art galleries and murals'', ''Sketching architecture'', ''Reading mystery and sci‑fi novels'', ''Playing board games'', ''Hiking in the Ozarks'', ''Indoor gardening'', ''Experimenting
    with cooking'', ''DIY home‑improvement projects'']'
  career_goals: Maria aims to advance from a frontline cleaning role to a supervisory position in facilities management. She plans to obtain certifications in environmental cleaning and workplace safety,
    and eventually enroll in a part‑time associate program in Facilities Management or Business Administration. Her long‑term ambition is to become a facilities manager for a cultural institution—such as
    a museum or community arts center—where she can blend her operational expertise with her passion for art. She also entertains the idea of launching her own boutique cleaning business that emphasizes
    eco‑friendly practices and aesthetic upkeep for small‑scale venues.
