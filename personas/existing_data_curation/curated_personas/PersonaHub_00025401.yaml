persona_description: A geologist who specializes in the study of polar layered deposits on Mars, particularly the Late Amazonian age of these deposits and their relation to the recent cratering flux on
  Mars. He/she has expertise in mapping and analyzing these deposits using high-resolution images and has published geologic maps of the south polar region of Mars based on images acquired by Mariner 9
  and the Viking Orbiters. The person is likely to be knowledgeable about the ice cap, frost cover, layered deposits, and nonvolatile surface units on Mars, and has experience in mapping and analyzing these
  deposits using high-resolution images. He/she has conducted research on the age and origin of these deposits and has published findings on the recent cratering flux on Mars. The person is likely to be
  familiar with the techniques used in mapping and analyzing polar layered deposits, such as color mosaics and black and white Viking and Mariner 9 images.
