personas:
  professional: Gregory Elledge, a retired craftsman‑artist, merges their precision woodworking, small‑engine repair expertise, and abstract watercolor practice into meticulously planned community workshops
    that reflect their imaginative curiosity and methodical reliability.
  sports: Gregory Elidge stays fit through leisurely morning walks along the Chariton River and occasional senior‑league tennis as a member of the Kirksville Senior Tennis Club, all while cheering for the
    St. Louis Cardinals, rooting for the Kansas City Chiefs, and attending the Adair County High School basketball games each winter, where they enjoy the camaraderie of the local fans.
  arts: Gregory Elidge channels their love of abstraction into watercolor canvases inspired by Kandinsky and Rothko, writes free‑verse poetry echoing T.S. Eliot, curates local art shows featuring works
    by Missouri artist L.W. Wood, and frequently immerses themselves in ambient soundscapes by Brian Eno while attending open‑mic nights at the Kirksville Coffee House.
  travel: Gregory Elidge prefers self‑planned road trips that blend cultural history and natural scenery, having driven the historic Route 66 to explore Oklahoma’s Route 66 Museum and the Ozarks, while
    dreaming of a slow‑paced summer stay in the Scottish Highlands to sketch lochs and capture ancient stone castles with their camera, where they hope to find fresh inspiration for their watercolor series.
  culinary: Gregory Elidge, an amateur home chef, relishes cultivating heirloom tomatoes and basil for fresh Caprese salads, crafts rustic sourdough loaves on weekends, and savors a perfectly seared ribeye
    at the historic Brick Oven Steakhouse while occasionally treating themselves to an indulgent slice of key‑lime pie from a local bakery.
  core: Gregory Elidge is a solitary, methodical visionary who transforms humble Missouri landscapes into abstract watercolors, meticulously plans every brushstroke and budget, yet habitually forgets to
    water their indoor succulents until the last minute.
background:
  cultural: 'Gregory embodies the cultural tapestry of a mid-20th-century Midwestern white family rooted in rural Missouri. Raised in the post-war era, he internalized values of self-reliance, community
    solidarity, modesty, and a strong work ethic. His upbringing was punctuated by small-town traditions: high-school football games, county fairs, church gatherings (he is a lifelong United Methodist),
    and weekly family meals that emphasized togetherness. The natural environment—prairies, rivers, and farmlands—instilled a deep appreciation for the land, reflected in his gardening and outdoor hobbies.
    While respecting conventional norms, his intellectual curiosity led him to explore broader artistic and philosophical ideas, bridging traditional Midwestern sensibilities with a progressive, exploratory
    mindset. This blend of heritage and open-ended curiosity informs his current pursuits and community involvement.'
attributes:
  skills: '[''Woodworking'', ''Furniture restoration'', ''Small engine repair'', ''Project planning'', ''Budget management'', ''Digital photography'', ''Photo editing (Adobe Lightroom)'', ''Art history
