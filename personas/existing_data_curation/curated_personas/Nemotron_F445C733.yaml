  career_goals: Although retired, Kim aims to remain an active contributor to her community. She plans to mentor younger volunteers at the senior center, lead a local history preservation project that documents
    Cleburne’s heritage, and master digital photography to capture community events. She also aspires to write a memoir reflecting on life in mid‑20th‑century Texas, combining her curiosity for new ideas
    with a practical desire to preserve her legacy. Maintaining her health and independence remains a central personal ambition.
