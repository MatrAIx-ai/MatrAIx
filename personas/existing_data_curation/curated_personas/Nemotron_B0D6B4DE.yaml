    competency in patient care'', ''Mentorship and teaching of medical trainees'']'
  hobbies: '[''Community basketball league'', ''Live jazz and blues concerts'', ''Cooking Southern comfort food'', ''Volunteering at free-clinic health fairs'', ''Mentoring high-school STEM students'',
    ''Mindfulness meditation and journaling'', ''Hiking at Shaw Nature Reserve'', ''Exploring St. Louis historical neighborhoods'', ''Playing chess at community centers'', ''Traveling to cultural heritage
    sites'', ''Board game nights with friends'', ''Photography of urban landscapes'']'
  career_goals: John aspires to become a senior leader in his health system—ideally as Director of Primary Care Services or Chair of the Department of Internal Medicine at an academic medical center in
    St. Louis. He aims to spearhead a health‑equity research program focused on reducing hypertension and cardiovascular disease disparities among African‑American residents. Securing a multi‑year NIH grant
    to study socioeconomic determinants of chronic illness is a key objective. Parallel to his academic ambitions, John wants to expand community‑based clinics that provide affordable preventive care, mentor
    underrepresented medical students, and serve on the Missouri Board of Health to influence policy. He also plans to develop personal strategies for better organization and stress management to sustain
    his demanding career.
