persona_description: A professional with expertise in environmental risk assessment, specifically in the fields of coastal and municipal vulnerability to climate change. They are knowledgeable in the application
  of climate change models and risk assessment tools to assess the potential impacts of sea-level rise and coastal storm surge on transportation systems, critical facilities and infrastructure, and natural
  resources. They have experience in conducting vulnerability assessments, developing local hazard mitigation programs, and working with municipalities to incorporate vulnerability assessment results and
  adaptation strategies into their planning efforts. They are skilled in using software and tools such as hydrological models, culvert assessment models, and Geographic Information Systems (GIS) to analyze
  and visualize data. They are also familiar with state database standards and have experience in getting data served on the NH Statewide Asset Database Exchange (SADES) and the NH Coastal Viewer for public
  consumption.
