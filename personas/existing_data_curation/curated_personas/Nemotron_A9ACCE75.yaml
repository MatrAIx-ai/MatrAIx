  hobbies: '["Jogging", "Weight training", "Reading true‑crime books", "Listening to forensic podcasts", "Playing classical guitar", "Cooking Mexican cuisine", "Photography", "Volunteer work with local
    youth groups", "Meditation", "Journaling"]'
  career_goals: Pedro aims to progress from patrol officer to detective within the next five years, seeking specialized training in forensic analysis and data‑driven policing. He plans to earn a part‑time
    associate or bachelor’s degree in criminal justice to qualify for leadership positions such as sergeant or community‑liaison officer. Long‑term, he wants to develop a community‑outreach program that
    bridges law enforcement and local Mexican‑American youth, reducing crime through mentorship while maintaining high professional standards. He is also motivated to advocate for mental‑health resources
    for officers, integrating stress‑reduction practices into departmental training.
