  career_goals: Blake aims to be promoted to sergeant within the next two years, using the role to mentor new officers and introduce evidence‑based, community‑focused policing strategies. He aspires to
    develop an outreach program that integrates local art workshops and mental‑health resources for at‑risk youth, positioning the department as a proactive social partner. Long‑term, he envisions joining
    a state or federal investigative unit where he can apply his digital forensics expertise while still championing innovative, humane law‑enforcement practices.
