  career_goals: Adriana aims to earn a certified forklift operator credential and progress into a supervisory role within the warehouse, such as shift lead or safety coordinator. She hopes to mentor newer
    employees, improve workplace safety standards, and secure a stable income that supports her family's needs. Over the longer term, she envisions leveraging her logistics experience to transition into
    a full‑time logistics coordinator position, allowing her to combine her practical knowledge with more structured planning responsibilities.
