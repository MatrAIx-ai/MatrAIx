personas:
  professional: Adriana Bueso is a seasoned material mover in a Crossville warehouse, where they combine hands-on forklift expertise, meticulous inventory control, and a calm, collaborative approach to
    mediate team conflicts, while pursuing a certified forklift operator credential and a future supervisory safety coordinator role.
  sports: Adriana Bueso enjoys weekday walks in Crockett Park, weekend hikes on the Cumberland Trail, and cheering on the Nashville Predators for hockey while occasionally joining a church-run softball
    league that practices at the local recreation center.
  arts: Adriana Bueso immerses themselves in regional folk music, often listening to Lila Downs and the traditional mariachi group Mariachi Sol de Mexico, while they craft vibrant quilts inspired by folkloric
    motifs and create decorative tin art that reflects the bright colors of celebrated artists like Frida Kahlo.
  travel: Adriana Bueso prefers a mix of carefully planned road trips and spontaneous weekend getaways, having explored the Great Smoky Mountains, the artsy streets of Santa Fe, and the vibrant Day of the
    Dead celebrations in Oaxaca, while budgeting each journey to balance family responsibilities and a modest travel fund.
  culinary: Adriana Bueso delights in preparing authentic dishes such as mole negro, pozole rojo, and handmade tamales, skillfully blending fresh cilantro, dried chiles de arbol, and hominy while they host
    lively family meals that pair the flavors with homemade salsa verde and warm corn tortillas.
  core: Adriana Bueso blends a methodical warehouse mindset with a spontaneous culinary flair, balancing safety checklists by day with impromptu salsa sessions by night, even if they sometimes misplace
    their forklift keys while hunting for the perfect chipotle pepper.
background:
  cultural: Adriana is a first‑generation Mexican American who grew up in a bilingual household, speaking both Spanish and English. Her upbringing emphasized strong family bonds, respect for elders, and
    participation in cultural celebrations like Día de los Muertos and Cinco de Mayo. She maintains close ties to the Mexican‑American community in Crossville, often sharing recipes, folk stories, and traditional
    crafts. Her Catholic faith plays a role in her life, guiding her values of kindness, cooperation, and community service. While she has embraced life in Tennessee, she continues to honor her Mexican
    roots through cuisine, language, and cultural festivities.
attributes:
  skills: '["Forklift operation", "Inventory control", "Warehouse safety compliance", "Basic equipment maintenance", "Team collaboration", "Material handling", "Customer service", "Problem solving"]'
