  career_goals: Edgar dreams of becoming a scientist‑engineer who designs gadgets that make everyday life easier, or an environmental scientist who helps protect the Great Lakes ecosystem. He is also fascinated
    by space and imagines one day becoming an astronaut. Ultimately, he wants a career that lets him combine his curiosity about how things work with practical solutions that benefit his community and the
    planet.
