personas:
  professional: Edgar Park is a budding young inventor who spends hours building and customizing LEGO models, using their keen curiosity and practical problem‑solving skills to design small mechanical contraptions,
    while they rely on their organized nature to keep each project documented in a notebook for future improvement.
  sports: Edgar Park is a member of the Little Hawks youth soccer club, enjoys watching the Seattle Mariners on TV and cheering for the Seattle Sounders FC, and they spend Saturday mornings at the community
    pool for beginner swim lessons, balancing a love of quiet park explorations with structured team activity.
  arts: Edgar Park is an enthusiastic sketcher of imagined inventions, often humming simple piano pieces by the 'Piano Guys' while studying the LEGO sculptures of 'Nathan Sawaya', and they regularly reread
    adventure series like 'Percy Jackson' and watch animated films by 'Studio Ghibli' for visual inspiration.
  travel: Edgar Park prefers family‑planned trips that combine a bit of adventure with comfort, has explored the nearby Cascade Falls State Park and visited the Grand Canyon on a school field trip, and
    they dream of a summer vacation in Kyoto to see its historic temples and cherry blossoms.
  culinary: Edgar Park enjoys making homemade pizza topped with mozzarella, pepperoni, and sliced bell peppers, can whip up a banana‑strawberry‑spinach smoothie for a healthy snack, and proudly bakes chocolate‑chip
    cookies with the help of a measured‑cup set, though they sometimes forget to pre‑heat the oven.
  core: Edgar Park is a curious, organized, and quietly caring nine‑year‑old who turns everyday worries into LEGO inventions, saves allowance for big projects, and they find comfort in puzzles, piano notes,
    and the occasional sticky‑sweet treat.
background:
  cultural: Edgar was raised in a white, middle‑class Midwestern family in Livonia, Michigan. His family values practicality, community involvement, and education, celebrating traditional American holidays
    such as Thanksgiving and Christmas and participating in local events like the Livonia Summer Festival and youth sports. The area’s cultural mix—including German, Polish, and Anglo‑American heritage—shapes
    his home life and school environment, fostering a respect for hard work, cooperation, and a love of nature around the Great Lakes.
