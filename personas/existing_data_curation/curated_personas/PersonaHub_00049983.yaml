persona_description: A medical historian who specializes in the study of traditional Chinese medicine, particularly the theories and practices related to the treatment of blood stasis, pain, and abscesses.
  They have a deep understanding of the historical context and the evolution of these treatments, and are knowledgeable about the use of salvia in these contexts. They are also familiar with the modern
  research and findings related to the effects of salvia in treating cardiovascular disorders, and have a keen interest in the application of these theories to modern medicine.
