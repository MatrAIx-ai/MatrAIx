personas:
  professional: Nancy Altas, an aspiring soccer captain and budding ballerina, blends their curiosity for game tactics with a practical knack for organizing team drills while staying flexible enough to
    improvise graceful choreography during ballet recitals.
  sports: Nancy Altas, a member of the Eastside Tigers Youth Soccer Club and Graceful Steps Ballet Academy, thrives on Friday night soccer matches with teammates, idolizes FC Barcelona forward Pedri, cheers
    for the local minor‑league baseball team the River City Runners, and balances structured practice drills with spontaneous park games, embodying a disciplined yet playful approach to fitness that they
    bring to every practice.
  arts: Nancy Altas, who sketches cartoons inspired by 'Calvin and Hobbes' and delights in playing piano pieces ranging from Beethoven’s 'Für Elise' to Taylor Swift’s 'Shake It Off', also loves singing
    lullabies and dancing at neighborhood fiestas, channels their energetic imagination into vibrant creative projects that they proudly share with friends.
  travel: Nancy Altas, whose family road trips have taken them to the Grand Canyon, the seaside town of Santa Cruz, and a magical weekend at Disneyland, dreams of exploring the ancient pyramids of Giza
    and snorkeling over the Great Barrier Reef, but prefers short, budget‑friendly vacations that fit within school holidays and weekend allowances, and they always pack a sketchbook for the journey.
  culinary: Nancy Altas, a budding kitchen assistant, loves mashing ripe avocados with lime and cilantro for guacamole, helping roll masa‑filled tamales, and baking chocolate chip cookies with extra sprinkles,
    yet they often over‑salt the soup and forget to set the timer, revealing a playful but slightly chaotic approach to cooking.
  core: Nancy Altas thrives on group play and creative expression, balancing curiosity with pragmatism; they occasionally splurge on glitter stickers, forget their helmet, and dream of scoring the winning
    goal while humming a lullaby on the piano.
background:
  cultural: Nancy’s Mexican heritage is a vibrant part of her daily life. She grows up speaking both English and Spanish, celebrating Día de los Muertos with homemade altars, enjoying traditional foods
    like tacos and tamales, and attending local festivals in Los Angeles’ vibrant Latino neighborhoods. Her family places a strong emphasis on respect, community, and the warmth of shared meals, shaping
    her kind and cooperative outlook.
