  career_goals: Nancy dreams of a future where she can help others and explore the world’s wonders. She imagines becoming a veterinarian because she loves caring for animals and wants to keep them healthy.
    She also thinks about being a teacher, sharing knowledge with younger children, and sometimes envisions herself as an astronaut, fascinated by space and discovery. Her practical side guides her toward
    careers that combine science, care, and community service.
