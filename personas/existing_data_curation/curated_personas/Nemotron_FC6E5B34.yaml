personas:
  professional: Donna Putnam is a meticulous maintenance specialist who transforms routine service calls into data‑driven checklists, leveraging her OSHA and EPA certifications to lead safety‑first repairs
    while eyeing a lead‑technician promotion within two years.
  sports: Donna Putnam enjoys low‑impact, solitary fitness routines like sunrise yoga in her garden and occasional weekend runs with the local running club, while cheering for the nearby minor league baseball
    team, the Springfield Cardinals, and following the NFL's Green Bay Packers as a disciplined, schedule‑bound fan.
  arts: Donna Putnam finds solace in the structured melodies of Johann Sebastian Bach and the intricate brush strokes of Dutch still‑life painter Pieter Claesz, while occasionally attending a small community
    theater production of 'Our Town' to unwind from her technical work.
  travel: Donna Putnam prefers meticulously planned road trips to historic Midwestern towns like Hermann, Missouri, where she can schedule museum visits and boutique antique shops, but she also dreams of
    a solo, itinerary‑driven tour of the English countryside to study vintage engine designs at local farms.
  culinary: Donna Putnam enjoys cooking methodical dishes such as herb‑infused tomato soup, rosemary‑roasted potatoes, and a precisely timed chicken piccata, sourcing fresh basil and heirloom tomatoes from
    her own garden, yet she often resorts to microwave meals when a repair emergency disrupts her dinner prep.
  core: Donna Putnam blends a compulsive love for order with a restless inner anxiety, turning every repair job and garden plot into a controlled ritual while secretly battling the urge to binge‑watch true‑crime
    documentaries after midnight.
background:
  cultural: Donna grew up in a working‑class family in Riverside County, California, where the regional culture emphasizes self‑reliance, practicality, and a strong work ethic. As a white American, she
    identifies with the values of independence and responsibility common in her community, while also being influenced by the diverse, multicultural environment of Southern California, which has exposed
    her to a variety of perspectives and neighborly cooperation.
attributes:
  skills: '[''plumbing repair'', ''electrical troubleshooting'', ''HVAC maintenance'', ''carpentry'', ''small engine repair'', ''inventory management'', ''safety inspections'', ''tool organization'', ''OSHA
    safety certification'', ''EPA 608 certification'']'
  hobbies: '[''mechanical restoration'', ''jigsaw puzzles'', ''gardening'', ''yoga'', ''mindfulness meditation'', ''reading technical manuals'', ''volunteering for park clean‑ups'']'
  career_goals: Donna aims to move from a general maintenance role to a lead technician position within the next two years, seeking opportunities to oversee a small team and manage larger facilities projects.
    She plans to obtain an HVAC technician certification and a journeyman electrician license to broaden her expertise. Long‑term, she hopes to become a facilities manager for a property management company,
    where she can apply her high standards and disciplined approach to ensure efficient, cost‑effective operations. She values a predictable schedule and clear advancement criteria, which she believes will
    also provide the financial stability needed to manage her anxiety.
