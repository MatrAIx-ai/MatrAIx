  career_goals: John hopes to move from shift bartender to bar manager within the next two years, aiming to earn a Certified Mixologist credential and eventually open his own waterfront lounge that highlights
    Maine's maritime heritage. He envisions a space where locals and tourists gather for themed evenings, live music, and seasonal cocktail menus drawn from his experimental palate. Balancing his desire
    for flexibility with a need for more predictable income, he plans to negotiate a schedule that reduces late-night stress while still allowing him to stay socially engaged. Mentoring younger bartenders
    and contributing to community events are also central to his long-term ambitions.
