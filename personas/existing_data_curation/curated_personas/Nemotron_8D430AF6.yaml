personas:
  professional: John Watts, a veteran bartender with over two decades of experience, merges his curiosity for Maine‑sourced ingredients with a relaxed, improvisational style, delivering quick‑read, high‑energy
    service while mentoring staff despite their occasional disorganization.
  sports: John Watts spends weekends sailing with the Freeport Sailing Association, kayaking on Casco Bay, fishing for cod and haddock during spring, and roots for the Portland Sea Dogs and New England
    Patriots, preferring low‑key, group‑oriented fitness over solo gym sessions.
  arts: John Watts captures coastal sunsets with his camera, revels in live music nights featuring local folk singer Anaïs Mitchell and the regional blues band The Darkside, dominates trivia teams with
    maritime history expertise, and frequently joins karaoke evenings at the town’s tavern.
  travel: John Watts favors spontaneous, group‑focused trips to coastal spots—relaxing in Bar Harbor’s lobster shacks, kayaking Newfoundland’s fjords, and dreaming of an Icelandic midnight‑sun sailing adventure—while
    often booking last‑minute to accommodate their flexible schedule and modest budget.
  culinary: John Watts, an enthusiastic home‑cook, crafts seafood‑centric dishes like pan‑seared cod with maple‑glazed carrots and spruce‑infused butter, brews small batches of ale blending local honey
    and pine tips, and swaps recipes for lobster rolls and salt‑crusted haddock at local gatherings.
  core: John Watts is a gregarious, curiosity‑driven bartender who blends coastal traditions with a laid‑back, slightly disorganized vibe, juggling community spirit and lingering worries about the future.
background:
  cultural: John grew up in the small coastal community of Freeport, Maine, as a third-generation descendant of English-American settlers who arrived in the region in the early 1700s. His family's roots
    are tied to the town's traditional fishing and ship-building economy; his father was a lobster fisherman and his mother taught at the local elementary school. The New England Yankee ethos of self-reliance,
    modesty, and practical problem-solving shaped his worldview. Local customs - annual lobster festivals, Fourth-of-July fireworks on the harbor, and a strong emphasis on community cooperation - are integral
    to his identity. Though he attends a United Methodist church only occasionally, the region's Protestant-based cultural values of humility, hard work, and neighborly support are evident in his daily
    interactions. The tourism-driven economy of Freeport, centered around the iconic L.L. Bean flagship and numerous boutique shops, also influences his appreciation for hospitality and the blending of
    tradition with new ideas.
