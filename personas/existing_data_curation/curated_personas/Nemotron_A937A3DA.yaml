personas:
  professional: Majd Folmar is a high‑school junior who blends his curiosity for new tools with a practical, hands‑on approach, mastering basic automotive troubleshooting and DIY woodworking while actively
    communicating with teammates, and they aim to earn a vocational certification in automotive technology or welding to launch a mobile repair business that also mentors younger teens in their community.
  sports: Majd Folmar is a dedicated member of his town’s community football team who practices under Friday night lights, follows the New Orleans Saints with fervor, and spends off‑season weekends hunting
    deer and fishing for bass at nearby lakes, often joining the local Outdoor Recreation Club for group outings and they thrive on the camaraderie of team sports.
  arts: Majd Folmar spends evenings strumming his acoustic guitar, covering classic rock anthems by The Eagles and Lynyrd Skynyrd while soaking up lively accordion riffs from Clifton Chenier, and they eagerly
    attend local music festivals that showcase Cajun and country acts, letting the music fuel both their creativity and social connections.
  travel: Majd Folmar plans weekend road trips with friends to the Gulf Coast for surf‑sand relaxation, dreams of a spring fishing expedition to the Ozarks, and they meticulously map out routes on Google
    Maps while balancing school responsibilities and a modest travel budget.
  culinary: Majd Folmar is a fan of hearty Southern fare, often whipping up a smoky jambalaya with Andouille sausage and shrimp after a fishing trip, and they love to grill fresh catfish and venison steaks
    while blasting classic rock, usually snacking on loaded nachos during gaming marathons.
  core: Majd Folmar blends an energetic love for hands‑on work, group sports, and music with a pragmatic drive toward a community‑focused trade career, while they occasionally over‑commit to weekend plans
    and indulge in spontaneous purchases that test their budgeting.
background:
  cultural: Majd grew up in Welsh, a tight‑knit rural community in Jefferson Davis Parish, Louisiana. The town’s culture blends traditional Southern values—hospitality, church involvement, and strong family
    ties—with the unique Cajun heritage that permeates the region’s music, food, and community celebrations. He was raised in a predominantly white, working‑class environment where manual labor, such as
    farming, hunting, and oil‑field service, is respected. Local traditions like Mardi Gras festivities, crawfish boils, and church picnics shaped his social life. Though English is his primary language,
    he is familiar with regional French‑influenced expressions and the relaxed, down‑to‑earth attitude characteristic of the Deep South.
