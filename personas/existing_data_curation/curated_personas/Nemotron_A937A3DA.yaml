  career_goals: He aims to translate his hands‑on skills and social strengths into a stable, community‑focused career. Majd plans to earn a vocational certification in automotive technology or welding,
    work for a local service shop, and eventually launch his own mobile repair and maintenance business that also provides mentorship for younger teens. He is also interested in completing an associate
    degree in electrical or renewable‑energy technology, positioning himself for jobs in the growing solar‑panel installation sector that serves rural Louisiana. Long‑term, he wants to be seen as a reliable
    tradesperson who contributes to his town’s economy while staying connected to friends and family.
