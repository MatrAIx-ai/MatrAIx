persona_description: A scientist at Cold Spring Harbor Laboratory, focusing on the role of stem cells in plants and their influence on the number of seeds on an ear of maize. The scientist has a background
  in plant biology and genetic engineering, and has conducted research on the development of meristems in plants. The scientist is interested in understanding how altering the size of the inflorescence
  meristem can affect the number of kernels per ear of maize. The scientist is also interested in developing crops that are more heat tolerant and can withstand the effects of climate change.
