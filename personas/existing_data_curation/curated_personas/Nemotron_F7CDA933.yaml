  career_goals: Clara aims to advance to a senior HR leadership position, such as HR Director, where she can shape strategic workforce planning and champion an inclusive workplace culture. She plans to
    obtain the SHRM-SCP certification within the next two years, mentor junior HR staff, and lead the implementation of an integrated HR technology platform for her organization. Long‑term, she aspires
    to transition into a part‑time consulting role, advising small businesses in the Coachella Valley on compliance and employee engagement while maintaining a balanced lifestyle.
