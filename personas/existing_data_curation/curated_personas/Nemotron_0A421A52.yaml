  career_goals: Nicole dreams of a future that blends her love for science, animals, and helping others. She is fascinated by biology and imagines becoming a veterinarian to care for pets and wildlife.
    She also enjoys leading group projects and mentoring younger students, so she considers a career in teaching or youth counseling. Her ambition is to stay curious, develop practical skills, and eventually
    contribute to her community, possibly through environmental activism or community service.
