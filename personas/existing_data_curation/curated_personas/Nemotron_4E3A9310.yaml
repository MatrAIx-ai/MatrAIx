  hobbies: '[''Gardening'', ''Knitting and quilting'', ''Genealogy research'', ''Reading historical fiction'', ''Local history'', ''Attending community fairs'', ''Listening to podcasts'', ''Volunteering
    at senior center'', ''DIY home projects'']'
  career_goals: As she approaches retirement, Kelsea aims to mentor younger administrative staff, ensuring a smooth generational transition. She hopes to streamline office processes by introducing user‑friendly
    digital tools, and she plans to volunteer her administrative expertise to the local historical society and church. Ultimately, she wants to leave a legacy of a well‑organized, supportive workplace and
    perhaps take on a part‑time consulting role for community nonprofits, allowing her to balance work with her love of gardening and family time.
