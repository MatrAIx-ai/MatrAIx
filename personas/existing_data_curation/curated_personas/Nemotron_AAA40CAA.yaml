  career_goals: Francisco aims to advance from a material mover to a shift supervisor and eventually an operations manager within his distribution center, leveraging his organizational strengths and people‑skills
    to improve workflow efficiency and employee engagement. Parallel to his logistics career, he hopes to integrate his passion for the arts by coordinating community‑based cultural events, possibly managing
    a small gallery or partnering with local schools for arts‑education programs. He is considering a certification in supply‑chain management and a part‑time coursework in arts administration to blend
    his practical experience with his creative interests. Ultimately, he seeks a role that offers both stable family income and the flexibility to champion artistic initiatives in his Midwestern community.
