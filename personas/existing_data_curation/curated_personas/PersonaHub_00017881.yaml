persona_description: A medical professional who specializes in the diagnosis and treatment of heart diseases, particularly those related to the heart valves. They have a deep understanding of the anatomy
  and physiology of the heart and blood vessels, as well as the diagnostic and therapeutic procedures used in cardiac catheterization and other medical interventions. They are knowledgeable about the pathophysiology
  of bacterial endocarditis and the risk factors for developing this infection. They are also familiar with the cardiovascular system and its functions, as well as the circulatory system and its components.
  They have a strong interest in the latest research and developments in the field of cardiology, and are dedicated to providing the best possible care to patients with heart conditions.
