persona_description: A German artist known for his expressionistic mark-making and unrefined, even grotesque, figurative depiction in painting, sculpture, printmaking, and wood sculpture. His work often
  addresses issues related to German national identity post-World War II, particularly the role of German artists. Baselitz is closely associated with fellow artists Anselm Kiefer and Eugen Schöenbeck,
  who demonstrate similar stylistic tendencies and emphasis on subject matter rather than strict abstraction. He is well known for his figurative, expressive paintings and has become an iconic member of
  the German neo-expressionist movement. Baselitz's work is characterized by his child hood's suffering and demolition of World War II, and his struggles with socio-political codes that he chafed against,
  which ultimately shaped and determined his artistic career. He has been featured at the Venice Biennale twice and is currently being exhibited at the Galerie Thaddaeus Ropac.
