  career_goals: Kenneth aims to pursue a career in a technical field where his curiosity and practicality can thrive, such as software engineering, robotics, or aerospace engineering. He dreams of attending
    a top university for engineering and eventually working on innovative projects that combine cutting‑edge technology with real‑world applications. His competitive nature drives him to become a leading
    developer, possibly focusing on game development or AI-driven tools. Alongside professional success, he hopes to develop strategies for managing his anxiety, perhaps by designing technology that supports
    mental‑health well‑being for himself and others.
