    problem solving'']'
  hobbies: '[''Karaoke with friends'', ''Vietnamese cooking and sharing meals'', ''Community volunteering at local senior center'', ''Participating in cultural festivals (Tet celebrations)'', ''Walking
    or hiking coastal trails'', ''Attending local temple events'', ''Gardening'', ''Watching classic movies'', ''Book club participation'', ''Weekend trips to beaches'']'
  career_goals: Thanh aims to advance within the Los Angeles County Metropolitan Transportation Authority by becoming a senior driver trainer and eventually a supervisory coordinator. She plans to obtain
    a supervisory certification and complete her associate degree in Transportation Management to qualify for management positions. Her long‑term ambition is to design and lead a community shuttle program
    that serves seniors and low‑income families in Torrance, blending her practical driving expertise with her compassionate desire to help others. She also hopes to mentor new drivers, emphasizing safety,
    courteous service, and cultural sensitivity.
