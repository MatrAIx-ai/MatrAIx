  hobbies: '[''Gardening'', ''Crocheting'', ''Walking'', ''Reading historical fiction'', ''Baking'', ''Church choir'', ''Book club'', ''Volunteering at food pantry'']'
  career_goals: Lauryn aims to continue her dependable service at the store while seeking advancement to a shift supervisor role within the next two years, allowing her to mentor newer employees and improve
    store efficiency. Long‑term, she plans to secure a stable retirement by saving, possibly transitioning to a part‑time consulting role training cashiers for local small businesses, and volunteering as
    a community liaison for the local senior center.
