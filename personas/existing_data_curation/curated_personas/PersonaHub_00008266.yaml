persona_description: A historian who specializes in the Civil War era, particularly focusing on the cultural and political events in St. Louis. They are interested in the interplay of local and national
  meanings, and have a deep understanding of the broader cultural transformation brought about by westward expansion, political strife, and emancipation in the era of the Civil War and Reconstruction. They
  are passionate about the history of America at a crossroads and seek to enrich our understanding of this period through their research.
