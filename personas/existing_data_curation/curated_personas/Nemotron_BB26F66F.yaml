  hobbies: '[''Acoustic guitar playing'', ''Hiking local trails and nearby mountains'', ''Reading non‑fiction (economics, psychology, self‑improvement)'', ''Model building – historic New England ships'',
    ''Listening to finance and entrepreneurship podcasts'', ''Volunteering at the community food bank'', ''Strategy video gaming'', ''Landscape photography'']'
  career_goals: William plans to enroll in a local community college next fall to pursue an Associate’s degree in Accounting, followed by a Bachelor’s degree in Finance. Within four years he aims to sit
    for the CPA exam and earn his certification. His long‑term ambition is to become a senior auditor at a regional accounting firm, eventually specializing in forensic accounting to help detect financial
    fraud in small businesses. He also hopes to develop a niche consulting practice that offers budgeting and compliance services to local nonprofits, leveraging his cooperative nature and desire to give
    back to his community. Alongside his professional growth, he is committed to building emotional resilience through therapy and mindfulness, recognizing that his high emotional reactivity can affect
    his work performance.
