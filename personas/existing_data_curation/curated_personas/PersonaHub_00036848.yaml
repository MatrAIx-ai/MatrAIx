persona_description: An aquarist who is always looking for the easiest to use, least expensive, and most nutritious foods for their aquarium animals. They are also interested in finding a natural, living
  food source that can be cultured within the display aquarium system. They appreciate the nutritional value of Tisbe biminiensis, a copepod that is rich in lipids and has a high nutritional value compared
  to conventional live foods such as brine shrimp and rotifers. They are willing to provide dietary supplementation to maintain the largest, most productive pod population possible.
