  hobbies: '[''Gardening'', ''Birdwatching'', ''Historical fiction reading'', ''Library book club participation'', ''Knitting for charity'', ''Seafood cooking'', ''Community theatre involvement'', ''Sketching
    wildlife'']'
  career_goals: Approaching retirement, Michelle aims to consolidate her legacy by establishing a formal mentorship program for younger supervisors in her store chain, emphasizing compassionate leadership
    and stress‑resilience. She also hopes to serve as a consultant for small local businesses, helping them adopt efficient retail practices while preserving personal customer connections. In the longer
    term, she envisions volunteering at the local senior center to teach basic retail and budgeting skills, thereby giving back to the community that shaped her career.
