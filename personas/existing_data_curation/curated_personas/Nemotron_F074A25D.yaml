personas:
  professional: Aura Jimenez, a 42‑year‑old seasoned carpenter, combines a meticulous eye for structural detail with strong budgeting and crew‑management skills, thriving on the predictability of framing
    and finish work while flexibly improvising when on‑site plans shift, and channels the communal values of her family gatherings into mentoring apprentices and integrating subtle traditional motifs into
    custom cabinetry.
  sports: Aura Jimenez is a devoted fan of Los Angeles FC and also follows Club América, joins a local hiking group for seasonal treks in the San Gabriel Mountains, and plays pickup basketball on weekends,
    balancing her competitive spirit with a relaxed approach to personal fitness.
  arts: Aura Jimenez, guided by a love for folk ballads by artists such as Lila Downs and classic Mexican cinema stars like Pedro Infante, immerses herself in regional music playlists, attends community
    art fairs, and unwinds by reading Agatha Christie mystery novels, allowing those rich storytelling traditions to inform her creative woodworking designs.
  travel: Aura Jimenez, while budgeting for her future contracting business, favors weekend road trips to nearby cultural spots like Santa Barbara's historic mission and the desert’s Joshua Tree, dreams
    of exploring Oaxaca’s artisan markets, and plans travel around family obligations and occasional work downtimes, preferring a mix of adventure and relaxed itineraries.
  culinary: Aura Jimenez, an avid home cook, skillfully prepares mole poblano, hand‑made tamales, and zesty fresh salsas using dried chiles, masa harina, and copal, balancing a moderately advanced cooking
    level with a habit of improvising flavors during family meals while occasionally ordering takeout when a job site runs late.
  core: Aura Jimenez, a 42‑year‑old carpenter with a structured yet laid‑back work ethic, channels community‑driven values into mentoring, balances cautious budgeting with occasional splurges, monitors
    health pragmatically, and weaves cultural traditions into her woodcraft, culinary creations, and leisure pursuits.
background:
  cultural: Aura grew up in a Mexican‑American household in Montebello, where Spanish was spoken alongside English and family ties were emphasized. Her upbringing blended traditional Mexican customs—such
    as celebrating Día de los Muertos, honoring Catholic holidays, and gathering for weekend family meals—with the multicultural environment of Los Angeles County. This bicultural experience informs her
    work ethic, where respect for craftsmanship meets a community‑oriented mindset. She often incorporates subtle Mexican design motifs into her woodworking, and she values giving back to her neighborhood
    through mentorship and participation in cultural events.
attributes:
  skills: '["Framing", "Custom Cabinetry", "Finish Carpentry", "Blueprint Reading", "Project Estimation", "Tool Maintenance", "Budget Management", "Crew Coordination"]'
  hobbies: '["Cooking Mexican cuisine", "Woodworking hobby projects", "Hiking in the San Gabriel Mountains", "Listening to Mexican folk music", "Following Liga MX soccer", "Participating in community festivals",
    "Reading mystery novels", "Watching classic Mexican films"]'
  career_goals: Aura aims to transition from employee carpenter to licensed general contractor, with the long‑term goal of opening her own small carpentry workshop focused on custom wood pieces for local
    homes. She plans to obtain a California contractor's license and additional certification in sustainable building practices. While competitive in securing projects, she also hopes to mentor other women
    and young people from her community, offering apprenticeships that blend structured training with the hands‑on flexibility she values. Achieving financial stability for her family while gaining recognition
    as a trusted, quality‑focused builder are central to her ambitions.
