  career_goals: Joseph aims to enroll in a community‑college program in facilities management while building a portfolio of digital artwork. He envisions a career that blends his hands‑on knowledge of building
    operations with his passion for aesthetics, such as becoming a facilities coordinator who oversees both maintenance and visual upgrades for coworking spaces or boutique offices. In the longer term,
    he hopes to launch a small studio offering freelance graphic‑design services and selling prints of his artwork, and to collaborate with local community centers to run art workshops for youths.
