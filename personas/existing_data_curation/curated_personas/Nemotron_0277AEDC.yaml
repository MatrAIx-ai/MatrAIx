personas:
  professional: Joseph Patterson is a 20‑year‑old commercial cleaner who leverages meticulous carpet extraction and floor‑waxing expertise to keep Minnesota office towers spotless, while using their knack
    for abstract problem‑solving and teamwork to pitch quick visual upgrades—like custom murals and social‑media graphics—to coworking managers, building a bridge between facilities management and design.
  sports: Joseph Patterson joins pick‑up basketball games at the community center each Saturday, roots for the Minnesota Timberwolves and occasionally hops on a jog around Lake Calhoun to clear their mind,
    treating fitness as an informal, socially driven habit rather than a regimented regimen.
  arts: Joseph Patterson spends afternoons sketching in cafés, crafting digital illustrations with Adobe Photoshop and Procreate, plays keyboard in a local improv jam band covering artists like St. Paul’s
    indie duo Polica, and draws inspiration from visual avant‑garde icons such as Yayoi Kusama and the moody soundscapes of Sufjan Stevens, weaving those influences into a vibrant personal portfolio.
  travel: Joseph Patterson curates spontaneous weekend getaways, often road‑tripping to Duluth’s lakefront for sunrise photography, dreaming of the coffee‑centric streets of Portland while returning home
    to explore Twin Cities food trucks and the occasional hike in the Boundary Waters, preferring low‑cost, experience‑rich trips over elaborate planning.
  culinary: Joseph Patterson is a self‑described coffee‑snob who swears by a dark‑roast pour‑over, pairs it with a love for Minnesota’s famed Jucy Lucy and the occasional street‑taco from a local food truck,
    and, while only a 'beginner' in the kitchen, can reliably whip up avocado toast with smoked salmon and a side of spicy ramen when hunger strikes after a night of sketching.
  core: Joseph Patterson, a 20‑year‑old janitor‑artist hybrid, merges mop buckets with sketchbooks, thrives on caffeine‑fuelled spontaneity, and balances chaotic creativity with a surprisingly steady eye
    on turning facilities management into a boutique design playground.
background:
  cultural: Joseph grew up in Anoka County, a suburban area of Minneapolis known for its blend of Midwestern community values and easy access to the Twin Cities' cultural scene. His family traces its roots
    to German and Swedish ancestors, a common heritage in the region, which gave him an appreciation for seasonal traditions like ice skating and community picnics. While he feels comfortable with typical
    Midwestern customs—such as a love for local hockey games and hearty comfort foods—he is also deeply influenced by the vibrant arts and music communities of Minneapolis, frequently attending gallery
    openings, street art tours, and indie concerts. This dual exposure shapes his pragmatic work ethic and his curiosity for creative expression.
