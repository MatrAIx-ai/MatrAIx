persona_description: A Mayan archaeologist and urban planner who specializes in the study of Mayan ruins in Central America, particularly those in Guatemala, Honduras, Belize, and southern Mexico. He is
  interested in the possible connection between Mayan ruins in these regions and the archeological sites near Brasstown Bald in Georgia, particularly the "fabled city of Yupaha" mentioned in a story published
  on Examiner.com. He is also interested in the possible connection between place names in Georgia and North Carolina and Mayan words, and the similarities between Mayan ruins and the ruins near Brasstown
  Bald.
