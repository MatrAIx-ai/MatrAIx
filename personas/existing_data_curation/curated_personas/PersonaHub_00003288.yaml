persona_description: This project aims to establish national-level programmes for threatened tree species in priority countries, using the Global Tree Assessment (GTA) as a guide. The project involves conducting
  conservation assessments, stakeholder analysis, conservation planning workshops, writing up workshop reports, developing National Conservation Action Plans, establishing national threatened tree consortia,
  initiating priority actions, and tracking conservation actions. The project has been initiated in Kenya with a group of enthusiastic partners, who have formed a national conservation consortium and developed
  a National Conservation Action plan for threatened trees in Kenya. The project is seeking information on how to implement similar programmes in other countries.
