  career_goals: Leon plans to earn his GED within the next year and then enroll in a vocational apprenticeship program for automotive technology at a nearby community college. He aims to become a certified
    mechanic, valuing the stable, routine‑oriented work and the tangible results of fixing vehicles. In the longer term, he hopes to open a modest auto‑repair shop that serves the Vanceburg community, providing
    reliable service and creating a steady income to support his family. He also keeps a secondary interest in eventually managing or expanding the family’s farm, blending his mechanical skills with agricultural
    knowledge.
