persona_description: A psychologist or cognitive scientist who is interested in the study of reasoning and mental models, particularly in the context of conditional reasoning and the influence of temporal
  order and suppositional bias on reasoning processes. They are likely to be familiar with the work of Unspecified (1993) on the comparison of three types of conditional rules, and they may have expertise
  in the use of experiments to investigate the effects of rule form and context on reasoning performance. They may also have an interest in the development of mental models and the role of biases in shaping
  these models.
