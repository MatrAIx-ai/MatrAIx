  hobbies: '[''gardening'', ''bridge'', ''bingo'', ''church choir'', ''cooking Southern cuisine'', ''walking club'', ''storytelling'', ''volunteering at food pantry'']'
  career_goals: Gloria aims to deepen her involvement with the Hartwell Senior Center by leading a weekly financial‑literacy workshop for seniors, ensuring they can manage their retirement funds confidently.
    She hopes to mentor a young Black entrepreneur from the area, helping them launch a community‑focused business. A long‑standing ambition is to document the oral histories of African‑American elders
    in Hart County, creating a small archive for the local historical society. Additionally, she wishes to stay physically active, maintain her independence, and continue participating in church activities
    and intergenerational events.
