  hobbies: '["LEGO building and creative play", "Pretend role‑play (doctor, teacher, explorer)", "Reading picture books", "Nature walks and collecting natural items", "Playing tag and hide‑and‑seek", "Simple
    competitive board games", "Puzzles and age‑appropriate problem‑solving games", "Drawing and coloring", "Kids'' dance classes", "Singing with family"]'
  career_goals: Desirae’s career aspirations are still forming, but she frequently expresses a desire to become a teacher who can share interesting facts, an astronaut who explores space, or a veterinarian
    who cares for animals. Her love of curiosity and practical problem‑solving fuels a goal of learning more about how things work, while her sociable nature drives her to imagine roles where she can help
    and guide other children. In the near future, she aims to improve her reading fluency, master writing full sentences, and tackle simple science experiments at school, all stepping stones toward her
    long‑term ambition of a career that blends discovery with caring for others.
