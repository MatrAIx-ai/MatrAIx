  hobbies: '[''Landscape painting'', ''Photography'', ''Community theater'', ''Improv comedy'', ''Science fiction reading'', ''Vinyl record collecting'', ''Fishing'', ''Hiking'', ''Playing guitar'', ''Volunteering
    with local arts council'']'
  career_goals: Frank aims to transition from frontline sales to a senior leadership role, such as regional sales manager or director of sales training, where he can shape the strategic direction of his
    company and mentor the next generation of sales professionals. He is also exploring the possibility of launching a boutique consultancy that helps small manufacturers develop innovative sales strategies.
    Ultimately, he wants to leave a legacy of creativity and mentorship within the Midwest manufacturing community while maintaining a flexible schedule that allows him to pursue his artistic interests.
