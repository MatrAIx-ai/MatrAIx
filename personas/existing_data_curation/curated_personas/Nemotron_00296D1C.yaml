  career_goals: Although retired, Rebeca aims to remain an active and reliable presence in her community. She wants to lead the senior center’s activity schedule, mentor younger volunteers, contribute to
    a neighborhood historical archive project, and ensure her family’s traditions are preserved. Her personal ambition also includes maintaining her health and emotional well‑being so she can continue supporting
    her husband and grandchildren.
