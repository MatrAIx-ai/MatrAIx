personas:
  professional: Joe Jimenez, an 11‑year‑old robotics club enthusiast, combines his natural love for structured problem‑solving with a cooperative spirit, crafting Scratch animations and small line‑following
    robots alongside his teammates while always keeping to the project timeline and making sure each code block runs predictably.
  sports: Joe Jimenez, a spirited member of the Fresno United Youth Soccer Club, spends evenings mastering set‑piece drills on the local park field, follows the Fresno State Bulldogs' football games for
    inspiration, and rides his bike to the community recreation center for weekend cycling laps, blending structured training with spontaneous weekend races.
  arts: Joe Jimenez enjoys listening to regional Mexican corridos and banda, cheering to the sounds of Banda el Recodo and Los Tigres del Norte while he builds elaborate LEGO cities, and he frequently visits
    the Fresno Art Museum's family workshops where he experiments with basic sketching, letting the rhythmic beats steer his creative flow.
  travel: Joe Jimenez has explored nearby Yosemite National Park on family hikes and dreams of visiting Oaxaca’s vibrant Día de los Muertos celebrations to see the colorful altars and taste authentic mole,
    balancing his love for local outdoor adventures with an imaginative longing for culturally rich far‑away festivals.
  culinary: Joe Jimenez helps his family hand‑roll tacos, mash fresh guacamole with lime and cilantro, and whisk homemade horchata using rice, cinnamon, and vanilla, honing his cooking skills while delighting
    in the aromas of simmering tamales that fill the kitchen on holiday evenings.
  core: Joe Jimenez blends a structured mindset, love for teamwork, and quiet resilience into everyday life, whether he's coding a Scratch game, perfecting a soccer drill, or singing along to banda while
    chopping cilantro for tacos.
background:
  cultural: Joe is a second-generation Mexican-American raised in Fresno's vibrant, multicultural neighborhood. At home, Spanish is spoken alongside English, and his family maintains strong ties to Mexican
    traditions, celebrating holidays such as Dia de los Muertos and Navidad with colorful altars, traditional foods, and music. His parents work in the local agricultural sector, and weekend gatherings
    often revolve around cooking tacos, tamales, and horchata, providing Joe with both cultural knowledge and hands-on culinary skills. The community's mix of farm fields, city parks, and family-run businesses
    offers him a sense of belonging and a deep appreciation for both his Mexican roots and his Californian surroundings. These experiences shape his values of family cohesion, respect for labor, and a desire
    to give back to the community that supports him.
attributes:
  skills: '["Organizational planning", "Time management for school tasks", "Basic math and science proficiency", "Beginner coding with Scratch", "Bilingual communication (Spanish/English)", "Team coordination
