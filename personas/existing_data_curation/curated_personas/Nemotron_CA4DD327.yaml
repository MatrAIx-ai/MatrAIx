  hobbies: '["Playing soccer with friends", "School robotics and Scratch coding club", "Helping prepare Mexican family meals", "Biking in Fresno parks", "Collecting soccer stickers", "Listening to regional
    Mexican music", "Reading adventure novels", "Building LEGO sets"]'
  career_goals: Joe aims to pursue a career in civil engineering, inspired by his interest in building safe, organized spaces like parks and bike paths that he often uses with friends. He is also drawn
    to public service roles such as a firefighter, valuing the clear procedures, teamwork, and the chance to protect his community. In the short term, he plans to deepen his skills in mathematics and coding,
    participate in school STEM clubs, and continue volunteering in neighborhood clean-up events, all steps toward a future where he can blend technical knowledge with a commitment to helping others.
