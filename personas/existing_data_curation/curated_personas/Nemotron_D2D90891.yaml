  hobbies: '[''Sketching'', ''Street photography'', ''Hiking in Hill Country'', ''Cooking traditional Costa Rican dishes'', ''Playing acoustic guitar'', ''Reading poetry and philosophy'', ''Attending art
    gallery openings'', ''Volunteering at community cultural events'', ''Exploring local music concerts'']'
  career_goals: Goran aims to translate his artistic passions into a sustainable freelance career, focusing on photography and visual storytelling that highlight cultural narratives. He plans to enroll
    in a community‑college certificate program in graphic design or visual arts within the next year, while building a modest client base. Long‑term, he hopes to open a small studio‑café that combines a
    gallery space with a menu of Costa Rican specialties, creating a community hub that reflects his heritage and love for art. He also wishes to become more organized and meet deadlines reliably to support
    these ambitions.
