personas:
  professional: Goran Acevedo is a budding freelance photographer and visual storyteller who leverages bilingual fluency and a self‑taught eye for cityscapes to craft compelling cultural narratives, while
    battling a chronic habit of missing client deadlines due to a preference for spontaneous, flexible work rhythms.
  sports: Goran Acevedo is a weekend hiker who belongs to a local Texas Hill Country trekking club, occasionally joins pickup soccer games at a community field, and faithfully follows the Austin FC soccer
    team and the Texas Rangers baseball club, using each outing as a balance between physical release and mental reset.
  arts: Goran Acevedo immerses themselves in the arts by sketching urban skylines à la Edward Hopper, snapping street scenes inspired by Henri Cartier‑Bresson, curating playlists that feature José González
    on acoustic guitar, and attending gallery openings that showcase works by contemporary Latin American painter Carlos Amorales.
  travel: Goran Acevedo plans travel like a visual diary—favoring spontaneous road trips across the Southwest, savoring the desert sunrise at Sedona, the historic plazas of San Miguel de Allende, and the
    bustling night markets of Oaxaca—while keeping a modest budget that relies on bike‑share rentals and couch‑surfing with friends to stretch limited freelance income.
  culinary: Goran Acevedo enjoys cooking at an intermediate level, preparing traditional dishes such as gallo pinto with black beans, plantains, cilantro, and lime, alongside fresh ceviche with lime juice,
    red onion, and cilantro, and they often experiment with adding smoked paprika to give a smoky twist to the classic recipes.
  core: Goran Acevedo is a curious, spontaneous creative who channels bilingual flair into photography and cooking, balances impulsive spending with modest investing, wrestles with deadline anxiety, and
    finds harmony in hiking, sketching, and community art events.
background:
  cultural: Goran was born to Costa Rican parents who immigrated to the United States in the 1990s. Raised in a bilingual household, he grew up with the “pura vida” philosophy—an easy‑going, optimistic
    outlook that emphasizes gratitude and community. Family gatherings feature traditional dishes such as casado, arroz con pollo, and tres leches cake, and holidays are marked by celebrations of Costa
    Rica’s Independence Day and Semana Santa. Though living in Woodway, Texas, he remains active in a small Costa Rican expatriate network, attending cultural festivals, dancing to salsa and cumbia, and
    preserving Spanish language through daily conversation. This blend of Central American heritage and Texan life informs his values of harmony, hospitality, and respect for nature.
