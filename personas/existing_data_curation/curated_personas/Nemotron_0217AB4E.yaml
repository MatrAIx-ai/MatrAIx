  career_goals: Sofia aspires to attend a university where she can study communication, business, and community development. She hopes to become a professional event organizer and public relations specialist
    who can design inclusive community festivals and youth programs in St. Landry Parish. Long-term, she dreams of launching a nonprofit youth mentorship initiative that empowers high school students to
    develop leadership and entrepreneurial skills, while also exploring the possibility of starting her own boutique event-planning business that highlights the cultural heritage of her hometown.
