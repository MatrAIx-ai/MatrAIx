personas:
  professional: A budding community organizer and junior coder, Sofia Harris blends disciplined project management with curiosity-driven problem solving, channeling their sociable energy into coordinating
    school charity drives while coding simple educational games for peers.
  sports: Sofia Harris stays active by joining the local high school track club for cross-country runs through the nearby swamps in spring, cheering on the New Orleans Saints and Pelicans on weekends, and
    occasionally playing pickup basketball at the community center.
  arts: Sofia Harris expresses creativity through piano renditions of Debussy, digital illustrations inspired by Emily Hedgehog's graphic novels, and dancing to the rhythmic pull of Clifton Chenier's Zydeco
    at community festivals, while devouring Agatha Christie mysteries for narrative inspiration.
  travel: Sofia Harris loves weekend road trips to the historic French Quarter and the bayous of the Gulf Coast, meticulously planning itineraries on a shared Google Doc, yet dreams of backpacking through
    the streets of Dublin for a literary pilgrimage.
  culinary: Sofia Harris experiments in the kitchen with family recipes, mastering the balance of spice in jambalaya and the roux depth in gumbo, while also learning to bake chocolate chip cookies to share
    during school club meetings, and always keeps a jar of dried thyme and cayenne on the countertop.
  core: Sofia Harris is a curiosity-driven, ultra-organized teen who can orchestrate a charity bake-sale one minute and code a quick game the next, though they occasionally over-schedule themselves and
    forget to unwind.
background:
  cultural: Sofia was raised in Opelousas, Louisiana, a town steeped in Southern hospitality and a vibrant mix of Cajun, Creole, and Anglo-American traditions. Her family has lived in the region for generations,
    and she grew up participating in church youth groups, community gatherings, and iconic local celebrations such as Mardi Gras and Zydeco music nights. These experiences fostered a deep appreciation for
    the region’s food, music, and close-knit community spirit. While she identifies as white, Sofia's cultural background embraces the rich tapestry of Louisiana life, emphasizing values of generosity,
    community service, and the joy of shared celebrations.
