  career_goals: June aims to progress into a supervisory role within facilities management, where she can design and implement greener cleaning practices and mentor younger staff. She plans to complete
    a certificate program in Environmental Health and Safety to deepen her expertise. Long‑term, she envisions establishing a community art studio that offers free workshops for seniors and at‑risk youth,
    merging her passion for art with her commitment to social harmony. She also hopes to become a key liaison between building management and local cultural institutions, ensuring spaces are maintained
    to support artistic activities.
