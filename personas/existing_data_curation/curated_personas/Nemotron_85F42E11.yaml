personas:
  professional: A seasoned building custodian, June Sessa leverages her meticulous floor‑care expertise and art‑handling knowledge to maintain pristine gallery spaces while fostering a cooperative team
    environment.
  sports: An early‑morning trail walker and occasional tennis player, June Sessa cheers for the Greenville Drive and the Carolina Panthers, joins a local senior walking club each Saturday, and uses gardening
    as a low‑impact strength routine.
  arts: A devoted museum‑goer and amateur watercolorist, June Sessa draws inspiration from Georgia O’Keeffe’s botanical paintings, enjoys the folk twang of Alison Krauss, and regularly attends community
    theatre productions of August Wilson’s plays, often sketching stage designs during intermission.
  travel: A measured explorer, June Sessa favors scenic road trips along the Blue Ridge Parkway, weekend stays in Charleston’s historic district, and dreams of an artistic spring pilgrimage to Florence,
    Italy, while balancing travel costs against her modest retirement savings.
  culinary: A garden‑to‑table enthusiast, June Sessa often prepares ratatouille, herb‑infused grilled zucchini, and fresh basil pesto using her own produce, treats herself to shrimp and grits at a beloved
    Southern café, and experiments with Mediterranean salads peppered with heirloom tomatoes.
  core: June Sessa, a detail‑oriented custodian with a boundless curiosity for art, channels her organized nature into greener cleaning practices, mindful wellness, and a community‑centered vision that
    blends horticulture, painting, and quiet contemplation.
background:
  cultural: June grew up in a modest, working‑class family in the Upstate South Carolina region, where Southern hospitality and community ties were central to daily life. Her family attended a historically
    Baptist church, instilling values of kindness, cooperation, and service to others. The regional culture of modesty, respect for tradition, and love of simple pleasures—like home‑cooked Southern meals
    and local festivals—shapes her worldview. Although culturally rooted in Southern customs, June’s curiosity has led her to embrace diverse artistic expressions, from contemporary gallery installations
    to folk art. This blend of traditional Southern upbringing and an open‑minded appreciation for new ideas informs her personal and professional identity.
