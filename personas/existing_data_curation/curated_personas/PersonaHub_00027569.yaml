  development of mathematical concepts, the role of mathematical practice in the formation of mathematical knowledge, and the ways in which mathematical ideas and concepts are shaped by social and cultural
  contexts. They may also have a particular interest in the ways in which mathematics is used in the teaching and learning of mathematics, and the ways in which mathematical ideas and concepts are communicated
  and shared within mathematical communities.
