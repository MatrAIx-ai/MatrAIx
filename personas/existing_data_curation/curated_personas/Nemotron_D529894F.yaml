personas:
  professional: Antonio Johnson is a dedicated psychiatric aide who excels at meticulous record‑keeping, infection‑control, and calm crisis de‑escalation, leveraging a methodical, routine‑driven mindset
    to provide reliable support to patients and staff while quietly aspiring to become a CNA and eventually a RN specializing in psychiatric care.
  sports: Antonio Johnson plays pickup basketball at the local park with a tight‑knit crew, supports the New York Knicks and the New York Rangers, lifts weights three times a week at a downtown fitness
    center, and follows a seasonal routine that peaks during the spring streetball league and eases during exam periods.
  arts: Antonio Johnson finds solace in classic hip‑hop and R&B, regularly streaming tracks by A Tribe Called Quest, Nas, and Marvin Gaye, while also enjoying occasional Netflix documentaries on New York
    graffiti, and treats their modest sneaker collection—featuring pairs like Air Jordan 1s—as a personal art showcase.
  travel: Antonio Johnson prefers low‑key weekend getaways that fit a tight schedule, often hiking the trails of Cunningham Park for stress relief, planning day trips to historic sites such as the Brooklyn
    Bridge and the Smithsonian in Washington, D.C., and dreaming of a future solo visit to New Orleans to explore its music heritage.
  culinary: Antonio Johnson enjoys cooking simple comfort meals like chicken teriyaki bowls, homemade mac & cheese, and late‑night scrambled eggs with hot sauce, showing a moderate skill level that relies
    on straightforward recipes and a pantry stocked with staples such as rice, canned beans, and fresh vegetables.
  core: Antonio Johnson is an 18‑year‑old methodical caretaker who balances disciplined routines, budget‑tight finances, and a quiet passion for basketball, classic beats, and comfort cooking while quietly
    wrestling with anxiety and a sneaker habit.
background:
  cultural: Antonio is an African American raised in Queens Village, a neighborhood known for its mix of Black and Caribbean communities. His family traditions revolve around church, close‑knit family gatherings,
    and a strong respect for elders, reflecting the broader African American cultural emphasis on community solidarity and resilience. Growing up amidst diverse cultures, he has absorbed influences from
    Jamaican and Trinidadian neighbors, evident in his food preferences and music taste, while his personal identity remains anchored in values of hard work, practicality, and caring for his community.
attributes:
  skills: '[''Basic patient hygiene assistance'', ''Vital signs monitoring'', ''Infection control and safety procedures'', ''Medical documentation and EMR entry'', ''Crisis de‑escalation'', ''Inventory
