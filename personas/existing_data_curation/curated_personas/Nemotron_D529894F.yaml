    sneaker collection'']'
  career_goals: Antonio aims to build a stable, long‑term career in healthcare that aligns with his love of routine and practical impact. He plans to become a Certified Nursing Assistant (CNA) within the
    next year, then enroll in a community‑college nursing program to earn an Associate Degree in Nursing, ultimately becoming a Registered Nurse specializing in psychiatric care. He also hopes to secure
    a scholarship that will allow him to continue his education without financial strain, and he envisions mentoring future aides from his community, using his experience to give back and promote resilience.
