personas:
  professional: Edna Lee, a retired community‑center volunteer and budding horticultural mentor, merges practical curiosity about gardening with a spontaneous flair for organizing church and neighborhood
    events, even though they sometimes miss deadlines and worry about the details.
  sports: Edna Lee, an enthusiastic fan of the Cleveland Browns and the Cincinnati Reds, walks the Ohio River Trail with the Steubenville Senior Walking Club three times a week, joins a community‑center
    senior softball league, and tunes in every spring for the Midwest Marathon broadcast.
  arts: Edna Lee, a dedicated church‑choir singer, unwinds by knitting while listening to Woody Guthrie and Brandi Carlile, devours Agatha Christie mysteries and Jane Austen novels, and enjoys classic films
    starring Meryl Streep and John Wayne on weekend movie nights.
  travel: Edna Lee, who prefers spontaneous day trips over extensive itineraries, has explored the historic Fort Steuben, taken weekend tours of Lancaster’s Amish country, dreams of the Niagara‑on‑the‑Lake
    grape harvest festival, and hopes to someday cruise the Canadian Great Lakes while still balancing her modest travel budget.
  culinary: Edna Lee, an accomplished home‑cook of Midwestern classics, perfects chicken pot pie with flaky crust, simmered beef stew with garden‑grown carrots and thyme, fresh cornbread with honey butter,
    while daring to try rosemary‑infused quinoa salad alongside a beloved family apple‑cinnamon crumble.
  core: Edna Lee, a practical yet curious retiree who balances community volunteering, gardening, and knitting with a habit of over‑worrying about deadlines and a penchant for late‑night mystery novels.
background:
  cultural: She was raised in a working‑class, predominantly white, Midwestern community in Steubenville, Ohio, where family, church, and local traditions play a central role. Her upbringing reflected the
    values of self‑reliance, practicality, and community service typical of the area’s steel‑town heritage. Cultural influences are evident in her love for hearty home‑cooked meals, participation in church
    and neighborhood events, and a respect for the region’s history and seasonal cycles.
attributes:
  skills: '[''Cooking'', ''Gardening'', ''Knitting'', ''Basic Computer Skills'', ''First Aid'', ''Community Event Coordination'', ''Home Budget Management'']'
