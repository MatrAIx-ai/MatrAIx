persona_description: A computer engineer and inventor who is known for designing and building the first supercomputer, the Cray-1, and later developing the Cray-2 and Cray-3. He was a successful entrepreneur
  and businessman, leaving Cray Research to start his own company, Cray Research, which he eventually sold to IBM. His designs were known for their size and engineering expertise, but he was known for his
  reclusive and eccentric personality, preferring to work alone and keep the design of the machines inside his head. Despite his success, he was unhappy with the company's direction and eventually left
  to start a new company, Chippewa Falls, which he later sold.
