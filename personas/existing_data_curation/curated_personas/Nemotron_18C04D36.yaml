    mentorship of new technologists'', ''Quality assurance and regulatory compliance'']'
  hobbies: '[''Cooking traditional Vietnamese dishes'', ''Hiking in nearby parks and foothills'', ''Gardening a herb garden'', ''Solving puzzles (crossword, sudoku)'', ''Practicing yoga'', ''Reading medical
    journals and non‑fiction'', ''Landscape photography'', ''Participating in community cultural events (occasionally)'']'
  career_goals: Loan aspires to advance into a senior leadership role such as Lead Surgical Technologist or Operating Room Manager, where she can shape policies, streamline processes, and mentor staff across
    the department. She plans to attain advanced certifications (e.g., Certified Surgical Technologist – CST, Perioperative Nurse certification) and possibly pursue a master's degree in Healthcare Administration
    to broaden her strategic impact. Long‑term, she envisions contributing to medical‑device innovation by partnering with manufacturers to improve ergonomics and reliability of surgical instruments, leveraging
    her STEM background and competitive drive to influence industry standards.
