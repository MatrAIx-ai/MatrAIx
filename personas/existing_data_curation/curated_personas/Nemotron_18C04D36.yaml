personas:
  professional: Loan Vong is a meticulous surgical technologist who excels at preparing sterile instrument trays, troubleshooting advanced OR devices, and coordinating teams; they leverage their structured,
    competitive mindset to drive efficiency and mentor junior staff while maintaining unwavering composure under pressure.
  sports: Loan Vong combines regular yoga sessions at Tacoma Yoga Studio with weekly hikes on the Foothills Trail, cheers on the Seattle Seahawks and Seattle Mariners, and plays third base for the Tacoma
    Trailblazers softball club; they channel their competitive drive into both organized sport and disciplined personal fitness.
  arts: Loan Vong curates a growing portfolio of landscape photographs inspired by Ansel Adams, regularly attends Seattle Symphony concerts featuring Yo‑Yo Ma and works by Philip Glass, and finds solace
    listening to Trịnh Công Sơn and Ludovico Einaudi, weaving artistic refinement into their methodical routine.
  travel: Loan Vong prefers meticulously planned trips that balance cultural immersion with relaxation, having explored the lantern‑lit streets of Kyoto, the coastal charm of Ha Long Bay, and the scenic
    wineries of Willamette Valley, while they eye a future adventure to New Zealand’s South Island to hike its famed tracks.
  culinary: Loan Vong excels at preparing elaborate Vietnamese dishes such as phở Bò, bánh xèo stuffed with shrimp and bean sprouts, and coconut‑infused chè thái, meticulously using fish sauce, fresh basil,
    and lemongrass, while they also experiment with farm‑to‑table salads featuring heirloom tomatoes and fennel, showcasing a cooking skill that blends precise technique with creative flair.
  core: Loan Vong navigates life with disciplined precision, balancing a competitive edge in the OR with a love for orderly herb gardens, yet they secretly hoard crossword puzzles and often forget to water
    the plants after late night shifts.
background:
  cultural: Loan is a Vietnamese‑American who grew up in a close‑knit Southeast Asian family that emphasized education, discipline, and respect for tradition. Bilingual in English and Vietnamese, she celebrates
    cultural milestones such as Tet and lantern festivals, often preparing family meals that reinforce communal bonds. The immigrant experience instilled a strong work ethic and adaptability, which she
    channels into her professional role in the U.S. healthcare system. While deeply rooted in her cultural heritage, she also embraces the collaborative spirit of her Tacoma community, balancing familial
    expectations with her independent, career‑focused aspirations.
attributes:
  skills: '[''Instrument sterilization and tray preparation'', ''Intraoperative assistance and suturing support'', ''Operating room safety compliance'', ''Medical device setup and troubleshooting'', ''Electronic
