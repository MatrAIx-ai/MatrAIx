persona_description: A scientist who studies the health effects of asbestos exposure in schools and is critical of the 1986 federal law that required schools to spend millions of dollars on asbestos-control
  and -removal projects. The scientist has reviewed other scientists' work on asbestos and concludes that the law has led to an "asbestos panic" and that the risks of asbestos-related deaths are magnitudes
  lower than commonplace risks in modern-day society. The scientist is also critical of laws designed to control asbestos in schools, which can disturb the fibers and be harmful to both asbestos workers
  and building occupants.
