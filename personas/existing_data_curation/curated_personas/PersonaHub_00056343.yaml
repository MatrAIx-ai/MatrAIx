persona_description: A scientist or entomologist interested in the development and application of genetic sexing techniques in the study of insect pests, particularly the melon fly Bactrocera cucurbitae.
  This individual is likely to be interested in the research and development of a pupal color-based genetic sexing strain of the melon fly, as well as the potential applications of this strain in the sterile
  insect technique for controlling insect pests. This person may also be interested in the study of sex linkage, chromosome translocation, and the effects of radiation on insect development and behavior.
