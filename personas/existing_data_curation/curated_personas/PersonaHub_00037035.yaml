persona_description: A molecular biologist with a specialization in phylogenetic analysis and evolutionary relationships, particularly in the field of mammalogy. They are interested in the relationships
  among extant and extinct eutherian orders, including the classification of extant mammal orders based on Linnean-based and node-based classifications, and the consensus molecular tree based on published
  and unpublished data. They are also likely to be familiar with the works of Lillegraven and Hayssen et al. and the text by Novacek.
