personas:
  professional: Arthur Wilson is a budding junior architect of the LEGO world, meticulously planning each brick placement with methodical precision, balancing his boundless curiosity for new structures
    with a practical habit of following step‑by‑step instructions.
  sports: Arthur Wilson enjoys the local preschool soccer club, cheering on the Chicago Cubs during weekend games, and practices his balance on a miniature gymnastics beam, blending structured team play
    with solo physical challenges.
  arts: Arthur Wilson delights in drawing vibrant dinosaurs with crayons, sings along to Sesame Street tunes by Ernie and Bert, and spends afternoons watching the animated adventures of Blue’s Clues, letting
    these creative moments shape his playful imagination.
  travel: Arthur Wilson has explored the magical world of Disney World in Orlando, marveled at the giant dinosaur skeleton at the Natural History Museum, and dreams of a family road trip to the Grand Canyon,
    preferring carefully planned itineraries over spontaneous wanderings.
  culinary: Arthur Wilson prefers the comfort of cheesy macaroni, crisp apple slices, and peanut butter‑jelly sandwiches, often helping his mother stir a simple pancake batter, yet he stubbornly refuses
    to try broccoli, showcasing his selective palate.
  core: Arthur Wilson is a calm, curious 4‑year‑old who meticulously organizes his toys while joyfully joining in group games, balancing solitary exploration with social bursts, and occasionally indulging
    in bubble‑gum splurges.
background:
  cultural: Arthur is raised in a close‑knit, middle‑class family in Clarksburg, West Virginia, a town that reflects the gentle rhythms of the Appalachian foothills. His household values punctuality, community
    service, and modesty, traditions that echo the region’s historic work ethic and respect for neighborly bonds. He often attends a local Sunday school program where classic hymns and simple biblical stories
    reinforce a sense of moral responsibility. Seasonal community events—such as the county fair, a fall harvest festival, and local high‑school football games—provide him with exposure to regional customs,
    including blue‑grass music, folk tales, and home‑cooked meals like biscuits and apple casserole. While his immediate environment is rooted in these local traditions, Arthur also accesses national children’s
    media, giving him a blend of Appalachian cultural heritage and broader contemporary influences.
