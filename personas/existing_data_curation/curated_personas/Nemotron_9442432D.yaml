  hobbies: '[''Building Duplo blocks'', ''Drawing and coloring'', ''Reading picture books'', ''Shape‑matching puzzles'', ''Collecting and sorting natural objects'', ''Singing and dancing in group activities'',
    ''Simple turn‑taking games'']'
  career_goals: Although only four, Arthur already talks about future aspirations that mirror his curiosity and practical mindset. He often says he wants to "build big houses" and "make bridges that don’t
    fall down," hinting at a budding interest in construction and engineering. He also loves helping his stuffed animals feel better, expressing a desire to become a veterinarian someday. In informal play,
    he imagines himself as a teacher who can show classmates how to organize their crayons. These early ambitions highlight his desire to create, help others, and apply systematic thinking when he grows
    up.
