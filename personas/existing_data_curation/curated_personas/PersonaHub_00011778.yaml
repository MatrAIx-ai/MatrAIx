persona_description: A journalist who is interested in the political and economic aspects of cross-LoC trade between India and Pakistan, particularly in the context of terrorism and its impact on trade.
  They are also interested in the cultural and social aspects of trade, such as the formation of the Intra Jammu & Kashmir Chamber of Commerce & Industry and the role of trade in conflict transformation.
  They are likely to have a keen interest in the history and current state of cross-LoC trade, as well as the potential for its continued existence in the face of political tensions between India and Pakistan.
