  hobbies: '[''Fishing'', ''Vegetable gardening'', ''Woodworking'', ''Reading historical biographies'', ''Reading business literature'', ''Volunteering at senior center'', ''Church outreach activities'',
    ''Snowmobiling'']'
  career_goals: Timothy aims to transition into a regional sales management role where he can shape broader sales strategies across multiple locations. He is passionate about building a mentorship pipeline
    that prepares upcoming supervisors, and he hopes to lead a company‑wide initiative focused on operational efficiency and employee well‑being. In the longer term, he envisions consulting for mid‑size
    firms on sales process improvement while dedicating more time to community service and volunteering.
