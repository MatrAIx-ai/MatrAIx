personas:
  professional: Eliana Toney is a detail‑driven first‑line retail supervisor who applies her STEM background, advanced Excel, basic SQL, and bullet‑journal precision to craft schedules, analyze sales trends,
    streamline inventory, and mentor associates with a structured yet compassionate approach, all while charting a rapid path toward store‑manager, district‑manager, and eventually regional‑director positions.
  sports: Eliana Toney runs the Pennypack Loop within Patapsco Valley State Park three times weekly as a member of the Baltimore Trail Runners, balances cardio with weekly Vinyasa yoga at a local studio,
    roots for the Baltimore Ravens in football and the Washington Capitals in hockey, and joins a community‑center volleyball league each summer to stay socially active.
  arts: Eliana Toney indulges in mystery fiction by Agatha Christie, Tana French, and Gillian Flynn, curates indie folk playlists featuring Sufjan Stevens and Bon Iver, frequents the Baltimore Museum of
    Art’s contemporary exhibits, and channels creative tech energy into Raspberry Pi projects like building a retro‑gaming console that doubles as a digital art frame.
  travel: Eliana Toney favors meticulously planned weekend getaways, having trekked the Skyline Drive in Shenandoah National Park, explored Asheville’s craft‑brew scene, and dreams of wandering Kyoto’s
    historic temples and Lisbon’s tiled streets, always mapping itineraries in her bullet‑journal and budgeting trips around a modest stipend.
  culinary: Eliana Toney crafts healthy meal‑prep staples such as quinoa‑based Mediterranean bowls with roasted chickpeas, kale‑avocado salads drizzled with tahini, and turmeric‑infused lentil soups, experimenting
    with spices like sumac and matcha, yet sometimes succumbs to late‑night pizza cravings when stress peaks.
  core: Eliana Toney is a structured, data‑savvy retail leader who balances ambition with anxiety, channels stress into running and yoga, and finds order in bullet‑journaling, healthy cooking, and meticulously
    planned adventures.
background:
  cultural: Eliana grew up in a suburban middle‑class family in Howard County, Maryland. Her upbringing emphasized education, community involvement, and a strong work ethic typical of the region. She celebrates
    traditional American holidays such as Thanksgiving and Independence Day, often participating in local Laurel festivals and farmers’ markets. The diverse cultural landscape of the Baltimore‑Washington
    corridor has exposed her to a variety of perspectives, fostering an appreciation for inclusivity while maintaining the values of independence and self‑reliance characteristic of her white American background.
attributes:
  skills: '[''Team leadership'', ''Staff scheduling'', ''Inventory management'', ''Sales data analysis'', ''Process improvement'', ''Excel and basic SQL'', ''Point‑of‑sale system operation'', ''Customer
    service'', ''Conflict resolution'', ''Visual merchandising'', ''Training and onboarding'', ''Time management'', ''Problem solving'']'
  hobbies: '[''Bullet journaling'', ''Running'', ''Yoga'', ''Healthy cooking'', ''Volunteer computer tutoring'', ''Reading mystery novels'', ''Raspberry Pi projects'']'
  career_goals: Eliana aims to advance from first‑line supervisor to store manager within the next two years, then pursue a district manager role and ultimately a regional director position. She plans to
    supplement her STEM background with an MBA or a certification in retail analytics to strengthen her strategic decision‑making. Long‑term, she hopes to open her own boutique that blends technology‑enhanced
    inventory management with a curated shopping experience, while also mentoring young women entering retail leadership.
