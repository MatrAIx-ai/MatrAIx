persona_description: A health professional who is knowledgeable about meningitis and its treatment, particularly about the meningococcal vaccine. They are familiar with the symptoms, causes, and risks associated
  with the disease, and are aware of the importance of preventing it through vaccination. They have experience with administering vaccines and are aware of the dosing and administration guidelines for the
  meningococcal vaccine. They are also aware of the potential for meningococcal disease to cause serious and long-lasting complications, and are committed to preventing these complications through vaccination.
