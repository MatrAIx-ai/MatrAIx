  hobbies: '[''Drawing comic strips'', ''Watercolor painting'', ''LEGO building'', ''Reading graphic novels'', ''Cooking family recipes'', ''Listening to music (Mariachi, pop)'', ''Exploring nature and
    journaling'', ''Scratch programming'', ''Playing with friends'']'
  career_goals: Arlen dreams of becoming an artist or animator who can bring imaginative worlds to life, blending visual art with storytelling. She envisions a future where she designs characters for video
    games or animated series, celebrating her Mexican heritage through colorful designs. Additionally, she is intrigued by inventing new creative tools for kids, hoping to study art and technology later
    to merge both fields. Her ambition is to inspire other children to think creatively and embrace diverse cultures.
