personas:
  professional: Arlen Garcia, an aspiring comic artist and junior game developer who channels boundless curiosity and spontaneous creativity into daily sketchbooks and Scratch programming, they often juggle
    multiple story ideas while resisting strict deadlines, turning the chaotic energy into vibrant, colorful narratives.
  sports: Arlen Garcia, a young enthusiast who plays on a community after‑school soccer club, enjoys riding their bike to the nearby park for informal skateboarding sessions, and they cheer for the Los
    Angeles Dodgers and the LA Lakers while preferring spontaneous play over structured training.
  arts: Arlen Garcia, a budding visual storyteller who fills sketchbooks with comic‑style drawings inspired by illustrators like 'Jim Lee' and manga creator 'Naoko Takeuchi', they collect vinyl records
    of mariachi group 'Mariachi Vargas' and pop icons like 'Taylor Swift', and they watch animated series such as 'Adventure Time' to fuel their creative imagination.
  travel: Arlen Garcia, an adventurous ten‑year‑old who loves road‑trip excursions to the Grand Canyon and weekend camping at nearby state parks, they dream of visiting the ancient ruins of Teotihuacan
    and the coastline of Barcelona, but they rely on family‑planned itineraries and a limited vacation budget.
  culinary: Arlen Garcia, a kitchen helper who enjoys preparing tamales, guacamole, and churros, they skillfully slice avocados and mix masa dough, prefer the bright flavors of corn, chili, and lime, and
    often experiment with watercolor‑inspired plating to make meals look like a comic panel.
  core: Arlen Garcia, a curious, spontaneous ten‑year‑old who blends comic artistry, LEGO construction, and Scratch coding into a colorful, slightly disorganized world where imagination outruns schedules,
    they fuel creative bursts with a love of bright flavors and a habit of leaving crayon marks on every surface.
background:
  cultural: Arlen grows up in a Mexican‑American household in Carpentersville, Illinois. Her parents speak both Spanish and English at home, and she participates in traditions such as Día de los Muertos,
    Las Posadas, and Mexican Independence Day with colorful altars, music, and homemade foods. At school she learns about both American and Mexican histories, while the suburban Midwestern environment blends
    with her family's rich cultural practices, shaping a vibrant identity rooted in language, cuisine, music, and community values.
attributes:
