personas:
  professional: Gloria Cruz, a two‑year‑old play‑pretender, runs a make‑believe 'storybook studio' where they craft narrated puppet shows, showcasing early storytelling flair and abstract thinking, yet
    they often abandon a scene mid‑act because they prefer the freedom of improvisation over finishing a set routine.
  sports: Gloria Cruz, a two‑year‑old, energetically participates in toddler gymnastics at the community center and cheers loudly for the local baseball team’s mascot during family outings, blending their
    sociable nature with a love for group activity.
  arts: Gloria Cruz, a two‑year‑old, fills sketchbooks with vibrant, abstract crayon swirls and enjoys dancing to whimsical tunes by Baby Mozart and the lively rhythm of "The Wheels on the Bus," reflecting
    their artistic curiosity and outgoing spirit.
  travel: Gloria Cruz, a two‑year‑old, delights in short family trips to nearby nature reserves and the grandparents’ seaside cottage, favoring flexible schedules, open‑space play, and the comfort of familiar
    naps over rigid itineraries.
  culinary: Gloria Cruz, a two‑year‑old, prefers soft mashed sweet potatoes, avocado puree, and bite‑size fruit stars, eager to dip them into a colorful plastic sauce bowl, yet they can be picky, turning
    their nose up at anything bland or unfamiliar.
  core: Gloria Cruz, a lively two‑year‑old, merges boundless imagination with a habit of scattering crayons, occasional worry over small changes, and an irresistible urge to join every group activity.
