  hobbies: '[''Gardening'', ''Traditional Mexican cooking'', ''Beach walking'', ''Fishing'', ''Reading historical fiction'', ''Attending Mexican cultural festivals'', ''Listening to regional Mexican music'',
    ''Meditation'', ''DIY home improvement projects'', ''Volunteering at senior center'', ''Watching soccer (Liga MX)'']'
  career_goals: Manuel aims to transition into a senior HR leadership role where he can shape strategic policies that balance operational consistency with employee wellness. He plans to earn the SHRM‑SCP
    certification, deepen his expertise in HR analytics, and eventually start a consulting practice that helps small and medium‑size businesses integrate technology‑driven HR solutions while preserving
    a personal, compassionate culture. His long‑term ambition includes mentoring younger HR professionals and establishing robust, routine‑based programs that reduce workplace stress for both staff and
    himself.
