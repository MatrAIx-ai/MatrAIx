  hobbies: '["Birdwatching", "Coastal gardening", "Photographing marine life", "Crossword puzzles", "Reading science nonfiction", "Knitting", "Volunteering at senior technology workshops", "Walking along
    the beach", "Small book‑discussion group participation"]'
  career_goals: Although retired, Nanci aims to keep her curiosity alive by volunteering as a mentor for local high‑school STEM clubs and offering informal workshops on basic data analysis and environmental
    stewardship. She wants to contribute to Redondo Beach’s coastal conservation efforts, write a memoir that reflects her experience as a woman in STEM during the mid‑20th century, and continue learning
    new digital tools such as photo‑editing software to document local wildlife. Maintaining her health and fostering harmonious relationships with family and close friends also remain central ambitions.
