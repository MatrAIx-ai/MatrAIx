  hobbies: '["Balcony gardening", "Fusion cooking", "Tai chi", "Reading historical fiction and true‑crime", "Crossword puzzles and Sudoku", "Language exchange meet‑ups", "Volunteering at community garden",
    "Organizing neighborhood cultural festivals"]'
  career_goals: Although currently not employed, Yoomi aims to re‑enter the workforce in a part‑time capacity that leverages her organizational strengths and cultural fluency. She is exploring roles as
    a community program coordinator for Asian cultural organizations, a freelance consultant helping small businesses with budgeting and process optimization, and completing her associate degree in Business
    Administration to open a boutique online store featuring curated East Asian home goods and specialty foods. She also hopes to mentor adult learners in local adult‑education programs.
