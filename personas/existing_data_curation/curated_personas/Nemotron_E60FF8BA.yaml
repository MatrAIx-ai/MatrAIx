  career_goals: Brian aims to pursue a career that combines his love for structure, problem solving, and competition. In the short term, he plans to join his school’s robotics club, maintain high grades
    in math and science, and continue developing his coding skills. Long‑term, he envisions becoming a civil engineer who designs bridges and infrastructure, or a software developer who creates games. He
    also entertains the idea of competing in youth e‑sports tournaments, balancing academic and competitive goals.
