  be interested in understanding the role of lies in the rise and perpetuation of fascist ideologies, and how they continue to shape contemporary discourse on truth and misinformation. They may also be
  interested in the role of media and technology in the dissemination of lies and the ways in which they are used by fascist movements to maintain power and control.
