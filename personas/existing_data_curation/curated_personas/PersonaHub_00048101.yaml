persona_description: 'A teacher who implements the Daily Five literacy task in their classroom and is interested in integrating technology into their instruction. They are familiar with recordmp3.org, vocaroo.com,
  and audioboo.fm, and have used them in their classroom to assess student reading and writing. They are also familiar with Google forms and have used them to get instant feedback on student reading. They
  have used Kidblog and Spelling City for word work and are interested in using other websites and apps for word work. They are also interested in using audio books and reading apps for listening to reading.
  They have used #d5chat on Twitter to collaborate with other educators and get fresh ideas about the Daily Five.'
