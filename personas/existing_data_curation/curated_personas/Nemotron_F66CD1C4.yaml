personas:
  professional: Alita Swapp, a curious toddler who spends hours stacking wooden blocks and sorting shapes, shows early signs of the practical, flexible thinking that will one day guide a career in user‑experience
    design where they blend creative problem‑solving with a calm, resilient attitude.
  sports: Alita Swapp, a tentative fan of the New York Yankees who enjoys watching games with a plush baseball on their lap and participates in the Little Kickers soccer program at the local community center,
    approaches physical activity with relaxed, exploratory play rather than rigid drills, and they often cheer quietly when the team scores.
  arts: Alita Swapp, who delights in the lullabies of a Russian‑inspired children’s album and the whimsical tunes of Raffi, frequently lines up their stuffed animals for impromptu concerts, channeling their
    balanced curiosity and practicality into a love of simple musical expression, and they giggle loudly whenever a new melody starts.
  travel: Alita Swapp, who has already made a memorable family trip to Central Park’s carousel, a sunny day at the Hamptons beach, and a short visit to the American Museum of Natural History, dreams of
    seeing Disneyland in California while their parents plan low‑key weekend getaways that respect the toddler’s preference for small, familiar groups, and they often point at maps with a crayon.
  culinary: Alita Swapp, a picky yet adventurous eater who adores fluffy blini topped with a dab of sour cream, devours strawberry‑banana smoothies, and insists on shaping peas into tiny circles before
    chewing, shows both the practical side of routine meals and the curiosity to try new textures, and they proudly claim the title of official taste‑tester at home.
  core: Alita Swapp, a quietly confident two‑year‑old, balances a love for building block towers with a relaxed tendency to misplace toys, turning each small crisis into a calm chance to explore new solutions,
    and they never let a missing puzzle piece ruin their day.
background:
  cultural: Alita was raised in an affluent, multicultural household in Scarsdale, New York. Her mother’s family is of Russian descent, which brings occasional Russian language songs, folktales, and holiday
    traditions (e.g., celebrating Maslenitsa) into the home, while her father’s background reflects a typical suburban American upbringing. This blend gives her exposure to both Western holidays such as
    Thanksgiving and Christmas, and Eastern European customs, creating a rich cultural tapestry that influences her play, language exposure, and family rituals.
