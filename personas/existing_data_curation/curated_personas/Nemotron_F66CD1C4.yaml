  career_goals: While she is not yet in a formal career stage, Alita’s emerging ambitions focus on gaining independence and mastery of everyday tasks. She is eager to dress herself, use the potty, and feed
    herself without assistance. In the preschool years she hopes to learn to read simple books and count to ten, laying a foundation for future aspirations such as becoming a caregiver for animals or a
    teacher—roles that combine her curiosity about the world with a practical desire to help others.
