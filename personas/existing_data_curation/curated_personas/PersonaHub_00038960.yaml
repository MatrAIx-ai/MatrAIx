persona_description: A software tester who is skilled in error guessing and has a deep understanding of the software testing environment, including its context, coding, and implementation. They have a strong
  memory and technical understanding, and are able to recognize and identify errors based on their experience and intuition. They are interested in improving their error guessing techniques by improving
  their memory, technical understanding, and looking for errors not only in the code. They are likely to be interested in testing software that is functioning in specialized contexts, such as operating
  systems, databases, and web servers, and are skilled in using boundary value analysis and equivalence partitioning to focus the testing activity.
