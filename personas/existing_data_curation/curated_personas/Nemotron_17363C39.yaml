  hobbies: '["Story‑time Volunteering","Community Theater","Crafting Educational Materials","Yoga & Mindfulness","Cycling","Baking","Gardening","Reading Children’s Literature","Photography"]'
  career_goals: Ashlynn aims to pursue a master's degree in Early Childhood Education within the next two years, focusing on inclusive pedagogy and leadership. She envisions moving into a lead teacher or
    curriculum coordinator role at her school district, where she can influence program design and mentor novice teachers. Long‑term, she hopes to become an early childhood program director, possibly establishing
    a community‑based preschool that integrates health and wellness initiatives for families. She is also committed to developing a series of parent‑education workshops that address social‑emotional development
    and anxiety management for young children, reflecting her personal experience with emotional reactivity and her desire to create supportive environments.
