  career_goals: Jesus aspires to a career that offers clear structure, predictability, and measurable outcomes. He is drawn to fields such as civil engineering or data analytics, where he can apply his
    analytical mindset and systematic planning skills to real‑world problems. He aims to earn a scholarship for a STEM‑focused high‑school program, later pursue an Associate’s or Bachelor’s degree, and
    eventually work on infrastructure projects or data‑driven decision‑making for a reputable firm in the Chicago area. His competitive nature pushes him to seek roles where performance can be quantified
    and rewarded.
