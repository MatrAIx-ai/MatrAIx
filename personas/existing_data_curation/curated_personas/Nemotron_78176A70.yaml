  career_goals: Brian aims to advance to a regional transportation manager role within the next five years, overseeing multiple distribution centers and implementing sustainable logistics practices such
    as low-emission vehicle fleets and route electrification. He plans to earn the Certified Transportation Professional (CTP) designation and pursue further coursework in supply chain analytics. Long-term,
    he envisions founding a consultancy that helps midsized firms integrate data-driven efficiency and creative problem-solving methods, bridging his logistical expertise with his appreciation for innovative,
    design-oriented solutions.
