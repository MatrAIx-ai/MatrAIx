personas:
  professional: Edward Cardin, an aspiring digital illustrator, channels their curiosity and organized flexibility into sketching cartoon characters, building intricate LEGO scenes, and leading weekly art
    workshops for younger kids while also practicing violin for the school band, and they often share their creations online.
  sports: Edward Cardin rides with the Junior Trail Riders club on local bike trails, competes in middle‑school cross‑country meets, and they cheer for the Chicago Cubs (MLB) and Chicago Bulls (NBA) while
    balancing active fitness with occasional video‑gaming marathons.
  arts: Edward Cardin draws artistic inspiration from cartoonist Bill Watterson, digital painter Loish, LEGO sculptor Nathan Sawaya, violin virtuoso Joshua Bell, and indie band Imagine Dragons, and they
    weave these influences into daily cartoon sketches, tablet paintings, and elaborate LEGO constructions.
  travel: Edward Cardin enjoys weekend bike‑centric trips to nearby Shenandoah National Park, dreams of exploring Tokyo’s neon districts and Edinburgh’s historic castles, and they plan travel itineraries
    that mix school projects, parental budget limits, and a love for spontaneous discovery.
  culinary: Edward Cardin favors quick, colorful dishes such as margherita pizza, chicken teriyaki bowls, and homemade ramen, experiments with matcha‑infused smoothies, and they can confidently cook a simple
    spaghetti carbonara after following YouTube tutorials, though they sometimes skip breakfast to play Minecraft.
  core: Edward Cardin blends relentless curiosity with a disciplined habit of daily sketching, yet they often forget to finish homework before video‑game marathons, making them a bright, slightly chaotic
    teen artist.
background:
  cultural: Edward grew up in Middleville, a small Midwestern town in Barry County, Michigan. His family, with German‑Ancestry roots, embraces the region’s emphasis on community, modesty, and self‑reliance.
    They celebrate local traditions such as the county fair, Fourth of July parades, and seasonal community gatherings. The town’s strong focus on public education, outdoor recreation, and close‑knit neighborhood
    ties has shaped Edward’s appreciation for collaborative projects, his love for nature, and his sense of responsibility toward both school and community.
