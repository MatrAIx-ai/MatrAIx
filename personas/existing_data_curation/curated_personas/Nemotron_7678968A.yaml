  career_goals: In the short term Ervin aims to be promoted to senior sales engineer and to achieve a regional sales director position within five years. He plans to enroll in a part‑time bachelor program
    in engineering technology or business administration to complement his high‑school background. His long‑term ambition is to launch an independent consulting firm that helps midsized manufacturers adopt
    energy‑efficient and cost‑effective solutions, while also mentoring junior sales staff and becoming a recognized speaker at industry conferences.
