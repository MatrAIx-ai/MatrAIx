  the project's documentation and outreach efforts, including creating user guides and organizing events and webinars. The persona is likely to have a deep understanding of the needs of remote schools and
  the challenges they face in accessing online content. They are also likely to be familiar with the Wikimedia Foundation's grant-making process and the requirements for hosting the software on the Wiki
  In Africa Association's platform.
