personas:
  professional: Frank Greaux is a civil engineer who blends structural analysis and LEED‑certified green building expertise with a vibrant artistic vision, leveraging AutoCAD, Revit BIM, GIS, and Python‑based
    optimization to deliver community‑centric infrastructure projects, and they channel their competitive drive and skeptical eye toward systemic challenges into meticulous, data‑driven decision‑making.
  sports: Frank Greaux enjoys pickup basketball at community courts, rides a road bike with the Raleigh Greenway Cyclists club through spring and fall, hikes Umstead State Park trails in summer, they cheer
    on the Carolina Hurricanes and Charlotte Hornets, and they treat each workout as a strategic challenge that satisfies their competitive spirit.
  arts: Frank Greaux frequents the North Carolina Museum of Art, sketches murals by local artist Clozé, collects limited‑edition prints by Basquiat and enjoys the narrative depth of Kara Walker, they also
    unwind with Beyoncé’s latest album and attend live jazz shows featuring Robert Glasper, integrating these cultural experiences into their design work.
  travel: Frank Greaux plans trips that blend architectural discovery with cultural immersion, having visited Barcelona to study Gaudí’s organic structures, Ghana to explore ancestral roots, and New Orleans
    for its vibrant music scene, they favor road‑tripping along the Blue Ridge Parkway in spring and rely on meticulous itineraries to balance budget constraints with a desire for adventure.
  culinary: Frank Greaux is an adept home cook who modernizes Southern comfort food by preparing smoked collard greens with chipotle glaze, sweet‑potato bisque crowned with toasted pecans, and jalapeño‑infused
    cornbread, they experiment with small‑batch hot sauces using habanero and bourbon, yet they sometimes over‑spice dishes in their quest for bold flavor.
  core: Frank Greaux is a competitive, community‑driven civil engineer who fuses art and sustainability in infrastructure, meticulously manages finances, balances rigorous work with artistic and athletic
    pursuits, yet occasionally neglects personal self‑care and indulges in impulsive art‑related splurges.
background:
  cultural: Frank grew up in a close‑knit Black community in the greater Raleigh area, where Sunday church gatherings, family reunions, and communal celebrations of Juneteenth shaped his sense of identity.
    His parents emphasized education, resilience, and giving back, values that guided his pursuit of an engineering degree despite the scarcity of Black role models in STEM. Frank is active in local mentorship
    programs that support aspiring Black engineers, and he often volunteers with neighborhood improvement initiatives that blend infrastructure upgrades with cultural expression. This cultural foundation
    nurtures his competitive drive to excel, his skeptical eye toward systemic challenges, and his commitment to using engineering as a tool for social equity and artistic enrichment.
attributes:
  skills: '[''Structural analysis'', ''Concrete design'', ''AutoCAD'', ''Revit BIM modeling'', ''GIS mapping'', ''Project management'', ''LEED certification'', ''Water resources engineering'', ''Construction
    supervision'', ''Stakeholder negotiation'', ''Python data analysis'', ''Public speaking'']'
  hobbies: '[''Visiting art galleries and street‑art tours'', ''Sketching and watercolor painting'', ''Photography of urban murals'', ''Hiking in Umstead State Park'', ''Cycling on greenways'', ''Pickup
    basketball'', ''3D‑printing scale engineering models'', ''Listening to science‑fiction podcasts'', ''Cooking Southern soul food with modern twists'']'
  career_goals: In the next two years Frank aims to earn his Professional Engineer (PE) license and transition into senior project‑manager roles on large‑scale, sustainable infrastructure projects within
    the Raleigh metropolitan area. He aspires to lead multidisciplinary teams that fuse engineering rigor with public art, creating signature bridges and streetscapes that become civic landmarks. Long‑term,
    Frank envisions launching his own consultancy that specializes in “artful engineering” for underserved communities, mentoring the next generation of Black engineers, and earning national design awards
    for innovative, socially responsible projects. He is also intrigued by emerging AI‑driven traffic and structural analytics, and hopes to integrate these technologies into his practice.
