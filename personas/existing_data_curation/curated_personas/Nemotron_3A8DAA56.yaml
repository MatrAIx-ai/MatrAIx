  career_goals: Jose dreams of a future where he can design and build innovative solutions. He aspires to become an engineer or robotics specialist, aiming to win science fairs and be recognized for his
    inventions. He wants to combine his love of practical building with his curiosity about how things work, eventually leading a team of inventors.
