personas:
  professional: Jose Benito, an 8‑year‑old budding technologist, channels his love of LEGO, jigsaw and logic puzzles, and tablet coding into a meticulous habit of designing intricate structures and debugging
    simple programs, showcasing his organized, reliable and competitively curious nature.
  sports: Jose Benito, a forward on his neighborhood youth soccer league, trains three times a week, models his moves after the national team's star forward, and keeps a small trophy shelf with regional
    tournament medals, playing with a competitive edge and a strategic, methodical approach.
  arts: Jose Benito, an avid reader of adventure series such as 'Harry Potter' and 'Percy Jackson', watches nature documentaries narrated by David Attenborough, and enjoys the orchestral scores of 'Star
    Wars' by John Williams, letting these artistic experiences fuel his imagination and solitary creative play.
  travel: Jose Benito, who prefers structured family trips, has explored the nearby coastal mangrove reserve and the historic museum in the old town, and dreams of visiting the rainforests of Costa Rica
    and the Alpine peaks of Switzerland, favoring itineraries that combine gentle hikes, wildlife spotting, and educational stops.
  culinary: Jose Benito, who helps his family prepare weekend meals like seasoned rice and beans, fried plantains, and fresh fruit salads, enjoys measuring ingredients with his plastic kitchen scale, arranging
    food into smiley faces, and occasionally sneaks a bite of dessert before dinner is served.
  core: Jose Benito, an eight‑year‑old LEGO architect and puzzle whiz, blends a fiercely competitive streak with a methodical, organized mind, juggling soccer drills, coding games, and a secret stash of
    stickers while habitually leaving a trail of scattered bricks.
background:
  cultural: Jose is a Dominican‑American growing up in Zephyrhills, Florida. He is raised in a bilingual household where Spanish is spoken daily, and Dominican traditions such as celebrating Carnaval, listening
    to bachata and merengue, and cooking foods like mangú and sancocho are woven into family life. While he participates in local community events and attends a public elementary school, his cultural identity
    is reinforced through family gatherings, church services in Spanish, and occasional visits to relatives in the Dominican Republic.
