  career_goals: Ian aims to channel his practical problem-solving and competitive drive into a career that offers clear structure and tangible outcomes. He envisions attending a STEM-focused high school
    and later pursuing a degree in mechanical engineering or automotive technology, eventually working as an automotive or marine technician where he can apply his hands-on skills. He also dreams of playing
    baseball at the collegiate level, which could open doors to coaching or sports management. In the meantime he hopes to earn certifications in computer repair and basic programming to boost his employability
    after graduation.
