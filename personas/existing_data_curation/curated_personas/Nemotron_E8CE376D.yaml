personas:
  professional: Ian Zecca, an aspiring esports strategist and budding mechanical hobbyist, blends competitive video‑game analysis with the precision of LEGO Technic builds, leveraging a methodical routine
    and a skeptical eye to constantly refine tactics and prototypes.
  sports: Ian Zecca, a dedicated youth baseball player for the Riverdale Rookies and avid fan of the Los Angeles Dodgers, follows a year‑round regimen of team practices, weekend leagues, and solo batting
    drills, treating each session with the same competitive rigor they apply to strategy games.
  arts: Ian Zecca, an avid fan of science‑fiction literature and video‑game soundtracks, frequently revisits the works of Isaac Asimov, Arthur C. Clarke, and composer Yoko Shimomura, while channeling that
    creative energy into intricate LEGO Technic builds and occasional stream‑based art challenges with friends.
  travel: Ian Zecca, who enjoys meticulously planned getaways, prefers short family trips to coastal beach towns for clean‑up projects and dreams of backpacking through the Swiss Alps, balancing a modest
    travel budget with a penchant for exploring both natural and urban landscapes.
  culinary: Ian Zecca, a teenage culinary experimenter, often whips up quick pepperoni pizza with extra cheese and spicy ramen topped with sliced scallions, while savoring the crisp texture of fresh cucumber
    slices and occasionally overindulging in sugary energy drinks before gaming marathons.
  core: Ian Zecca, a 14‑year‑old who thrives on routine, competitive edge, and the calming rhythm of building and journaling, navigates life with a mix of meticulous planning and occasional impulsive splurges,
    all while wrestling with a persistent worry that fuels their drive.
background:
  cultural: Ian grew up in a middle-class white family in Saint Petersburg, Florida. His upbringing reflects typical coastal Floridian influences - a blend of suburban life, strong community ties through
    his school and local church youth group, and regular family outings to the Gulf beaches. He celebrates mainstream American holidays and participates in regional events such as the annual St. Pete Craft
    Beer Festival and local high school sports traditions. While his household is primarily rooted in North Eastern American ancestry, the diverse cultural mosaic of Pinellas County has given him exposure
    to Hispanic and Caribbean neighbors, shaping his open-minded but still traditional viewpoint.
