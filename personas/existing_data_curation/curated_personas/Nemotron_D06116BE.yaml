personas:
  professional: Edgar Galvin, a veteran nonprofit arts coordinator in Chicago, they leverage meticulous budgeting, veteran event‑planning expertise, and a competitive, skeptical eye to curate community
    exhibitions that elevate under‑recognized local artists while rigorously documenting every detail.
  sports: Edgar Galvin, a steadfast supporter of the Chicago Cubs and Blackhawks, they participate in the Lakefront Walking Club each morning, join a senior bridge league at the community center, and attend
    seasonal senior‑friendly yoga classes at the Chicago Cultural Center, favoring low‑impact exercise over high‑intensity sports while still cheering passionately for the Bulls during the NBA season.
  arts: Edgar Galvin, a devoted patron of Chicago’s vibrant art scene, they attend gallery openings showcasing contemporary creators like Kerry James Marshall, revel in the improvisational sounds of Miles
    Davis and B.B. King at local jazz clubs, and read biographies of innovators such as Georgia O’Keeffe and Ansel Adams, letting these influences shape their own curatorial voice.
  travel: Edgar Galvin, an organized traveler who maps out each quarterly art pilgrimage months in advance, they journey to New York’s MoMA, Detroit’s Institute of Arts, and Minneapolis’s Walker Art Center,
    balancing curated museum tours with stays at historic boutique hotels that echo Chicago’s own architectural heritage.
  culinary: Edgar Galvin, a modest home‑cook who tends a rooftop herb garden, they relish preparing a beet and goat‑cheese salad drizzled with walnut‑infused vinaigrette, bake occasional Chicago‑style deep‑dish
    pizza topped with fresh basil from their garden, and savor a classic Midwest fish fry featuring Lake Michigan perch with a side of pickled radishes.
  core: Edgar Galvin, an organized, competitive art aficionado who meticulously chronicles each exhibition, they paradoxically forget to water their rooftop garden during Chicago’s frequent rainstorms.
background:
  cultural: Edgar was raised in a midwestern, white household in Chicago’s South Side during the post‑war era. His family’s roots trace back to Irish and German immigrants, which instilled a respect for
    tradition, hard work, and community service. Growing up amid Chicago’s vibrant cultural landscape—its blues clubs, theater district, and world‑class museums—shaped his lifelong appreciation for the
    arts. He identifies with the city’s values of civic pride, perseverance, and an openness to new ideas, while maintaining a pragmatic, organized outlook shaped by his upbringing.
