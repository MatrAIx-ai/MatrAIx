  career_goals: Although retired, Edgar aims to leave a lasting cultural legacy in Chicago. He plans to curate a traveling exhibition that showcases under‑recognized local artists, write a memoir that intertwines
    his personal history with the city’s art scene, and establish a small scholarship fund for low‑income youth interested in visual arts. He also seeks a board position with the Chicago Museum of Contemporary
    Art to influence programming and to mentor emerging curators. His competitive spirit drives him to see his projects recognized citywide, while his organized approach ensures they are completed on schedule.
