personas:
  professional: Kathy Petersen is a seasoned full‑stack software developer turned technical architect, blending Python, JavaScript, and cloud‑native design with a humanities‑informed user‑experience lens;
    her calm resilience lets her juggle rapid prototyping and legacy refactoring even when her workspace is a bit chaotic, and her competitive streak drives her to mentor non‑traditional developers and
    champion pragmatic design solutions for cultural heritage institutions.
  sports: Kathy Petersen enjoys leisurely hikes along the Mississippi River bluffs, participates in a local birdwatching walking club, follows the Chicago Cubs and Minnesota Twins for baseball, and maintains
    fitness through weekend kayaking and occasional community yoga, preferring low‑impact activities that fit her flexible schedule.
  arts: Kathy Petersen immerses herself in classic literature, draws inspiration from authors like Jane Austen and James Baldwin, curates miniature Raspberry Pi art installations echoing the work of artist
    Refik Anadol, and frequently photographs natural scenes in the style of Ansel Adams, while evenings are often spent listening to folk legends such as Bob Dylan and contemporary jazz pianist Brad Mehldau.
  travel: Kathy Petersen prefers intimate, self‑guided road trips to historic towns like Galena, Illinois, and literary pilgrimages in Dublin, Ireland, planning loosely around her garden schedule and balancing
    a modest travel budget with a desire for relaxed exploration of cultural heritage sites.
  culinary: Kathy Petersen delights in cooking seasonal Midwestern fare, often preparing heirloom tomato bruschetta, pan‑roasted trout with fresh dill, and a comforting apple crisp featuring locally sourced
    honey, while her knitting afternoons are paired with sipping spiced chai brewed with cardamom and cinnamon.
  core: Kathy Petersen blends relentless curiosity with a laid‑back, slightly disorganized rhythm, channeling her calm competitiveness into crafting elegant software that bridges technology with the humanities
    while savoring solitary hikes, birdwatching, and the occasional vintage novel.
background:
  cultural: Kathy is a white Midwesterner with deep roots in the cultural tapestry of Minnesota, where many families trace ancestry to Scandinavian (Norwegian and Swedish) immigrants. Raised in a small‑town
    environment that values modesty, self‑reliance, and community cooperation, she was brought up in a Lutheran‑influenced household, though her adult worldview is largely secular. Her humanities education
    fostered a love for literature, history, and critical inquiry, while her Midwestern upbringing instilled a pragmatic, no‑frills approach to work and life. The natural landscapes of Goodhue County and
    the seasonal rhythms of the region shape her leisure pursuits and her appreciation for steady, resilient living.
attributes:
  skills: '["Python", "JavaScript (React, Node.js)", "SQL", "MongoDB", "Git", "RESTful API design", "Rapid prototyping", "Test‑driven development", "Legacy code refactoring", "Docker basics", "Linux command
    line", "UI/UX design principles", "Critical thinking"]'
  hobbies: '["Reading classic literature", "Creative writing (short stories)", "Local history research", "Hiking", "Birdwatching", "Nature photography", "Knitting", "Cooking seasonal dishes", "Gardening",
    "Crossword and Sudoku solving", "Board game evenings with close friends", "Raspberry Pi tinkering", "Digital art installations"]'
  career_goals: Kathy aims to deepen her expertise as a technical architect, focusing on building scalable, maintainable systems that bridge technology and the humanities. She aspires to lead small, agile
    teams where she can mentor developers from non‑traditional backgrounds and champion pragmatic, user‑centered design. Over the next few years she plans to launch a consulting practice that offers digital
    solutions for cultural heritage institutions, contribute to open‑source projects that support digital humanities research, and earn recognition through speaking at niche tech conferences. All of these
    goals are guided by her desire for flexible work arrangements that preserve her independence and calm lifestyle.
