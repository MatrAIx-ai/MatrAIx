    projects", "Cooking for friends"]'
  career_goals: Michael aspires to combine his love of structure with his compassion for others by building a career in nonprofit community outreach. He plans to enroll in a community‑college program for
    Business Administration or Social Services, obtain a certification in nonprofit management, and eventually secure a role as a Community Outreach Coordinator or Program Manager for a youth‑development
    or homeless‑services organization in the Los Angeles area. He also envisions gaining experience in event planning for fundraising campaigns, aiming for a stable, purpose‑driven position where he can
    lead teams, manage projects, and make a tangible difference in his community.
