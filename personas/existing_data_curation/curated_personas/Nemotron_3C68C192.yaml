personas:
  professional: Grace Sanford, a seasoned hairdresser with over 15 years of experience, excels at precision cutting, balayage, and protective styling for textured hair while managing a structured yet adaptable
    salon schedule, and they provide emotionally supportive consultations that honor the cultural significance of hair.
  sports: Grace Sanford enjoys leisurely walks along the Patapsco River trail, participates in a local running club called the River Runners, attends Baltimore Ravens and Orioles games each season, and
    they practice yoga twice weekly to maintain flexibility and calm.
  arts: Grace Sanford curates a soulful soundtrack of Erykah Badu, Nina Simone, and D'Angelo while crafting DIY hair accessories, they attend monthly jazz nights at the Baltimore Athenaeum, and they regularly
    discuss literature by Toni Morrison and self‑help works in a small book club.
  travel: Grace Sanford prefers thoughtfully planned yet flexible vacations, having explored New Orleans for its music, Savannah for its historic districts, and Ghana to connect with ancestral roots, they
    now dream of a tranquil retreat on St. Lucia while balancing travel costs with their salon savings.
  culinary: Grace Sanford delights in preparing soul‑food classics like collard greens seasoned with smoked turkey, sweet‑potato casserole, and fried catfish, they frequently incorporate fresh basil, thyme,
    and rosemary from their garden, and they experiment with homemade hot sauce to add a personal kick.
  core: Grace Sanford is a meticulous yet flexible salon professional whose love for cultural hair traditions is matched by a habit of late‑night vintage tool hunting and a relentless pursuit of calm through
    yoga and garden herbs despite bouts of anxiety.
background:
  cultural: Grace grew up in a close‑knit African‑American community in Baltimore County, surrounded by family traditions rooted in church, music, and Southern culinary heritage. Her mother, a former cosmetology
    student, introduced her early to natural hair care and the cultural significance of hairstyle as self‑expression. Grace celebrates Juneteenth, Kwanzaa, and participates in local Black History Month
    events, fostering a strong sense of identity and pride. The community emphasizes resilience, mutual support, and the importance of hair as a cultural symbol, which informs her professional ethos and
    dedication to providing culturally sensitive services. She actively engages with local Black professional networks and mentors younger stylists, drawing strength and inspiration from her heritage.
attributes:
  skills: '["Hair cutting", "Hair coloring", "Balayage", "Ombré", "Chemical relaxers", "Protective styling", "Braiding", "Twist-outs", "Scalp analysis", "Product knowledge", "Client consultation", "Appointment
    scheduling", "Inventory management", "Sanitation and sterilization", "Emotional support for clients", "Team collaboration"]'
  hobbies: '["Reading (self‑help and fiction)", "Journaling", "Yoga and meditation", "Gardening", "Cooking soul‑food recipes", "Listening to R&B and jazz", "DIY hair accessory crafting", "Volunteering at
    community center", "Walking the Patapsco River trail", "Attending small book clubs", "Collecting vintage hair tools"]'
  career_goals: Grace aims to open a boutique salon in the Windsor Mill area within the next three years that offers culturally attuned hair care in a calm, structured environment. She plans to obtain a
    salon‑ownership license and a business management certification to strengthen her financial planning and scheduling skills. Seeking deeper technical knowledge, she intends to become a certified trichologist,
    expanding her expertise in scalp health for clients with textured hair. Grace also wants to develop a line of natural‑hair products that reflect her personal formulas and cultural heritage. As a mentor,
    she hopes to create a supportive network for emerging stylists of color, balancing cooperation with assertiveness. To manage her emotional reactivity, she will integrate mindfulness practices and schedule
    dedicated creative blocks for product research and content creation.
