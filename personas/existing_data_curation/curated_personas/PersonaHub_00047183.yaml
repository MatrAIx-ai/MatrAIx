persona_description: A web connectivity tester who is interested in identifying and mitigating network interference and censorship issues. This person is familiar with the workings of the DNS resolver system,
  network protocols, and is proficient in performing web connectivity tests. They are particularly interested in the detection of DNS blocking, TCP/IP blocking, and HTTP blocking, as well as the analysis
  of the collected results to determine the nature of the interference or censorship. This person is likely to be involved in the development or deployment of network security solutions and is constantly
  seeking out the latest techniques and tools to improve their testing capabilities.
