personas:
  professional: Tommie Adams, a retired handyman turned community art docent, blends decades of home‑repair, woodworking, and xeriscaping expertise with a keen eye for visual storytelling, volunteering
    at the Phoenix Art Museum, mentoring DIY hobbyists, and leading a small‑group senior‑center art class that balances meticulous organization with relaxed, harmonic interaction.
  sports: Tommie Adams enjoys low‑impact fitness like morning walks through the desert garden and bird‑watching hikes, follows the Phoenix Suns with nostalgic loyalty, occasionally joins a senior bowling
    league at the community center, and maintains a casual membership in the local senior hiking club that meets monthly.
  arts: Tommie Adams immerses himself in the arts through watercolor painting of desert flora, nightly listening to Miles Davis, the Beatles, and John Coltrane, photography walks capturing the subtle hues
    of the Sonoran landscape, and regular attendance at small gallery openings featuring artists like Georgia O’Keeffe and contemporary desert‑inspired painter Susan Stanton.
  travel: Tommie Adams prefers leisurely, purpose‑driven trips, often driving to the Grand Canyon or Sedona for sunrise photography, taking short rides to Santa Fe’s art festivals, and dreaming of a future
    visit to the Louvre to study European art history, all while traveling with his spouse in the comfort of a well‑packed, low‑stress itinerary.
  culinary: Tommie Adams enjoys straightforward Southwest flavors, regularly cooking prickly pear salsa, grilled cactus, quinoa‑stewed black beans, and a rosemary‑infused roasted chicken, and his moderate
    cooking skill shines in his Saturday garden‑to‑table meals, though he occasionally over‑salts his dishes in his enthusiasm for bold taste.
  core: Tommie Adams is a quiet, curiosity‑driven retiree who harmonizes a love of art, meticulous hands‑on skills, and a low‑stress lifestyle, occasionally indulging in small quirks like over‑salting meals
    and postponing dentist visits.
background:
  cultural: Tommie is a White American who grew up in the Midwest, where values of self‑reliance, community service, and modesty were emphasized. Relocating to Phoenix in his later years, he has absorbed
    Southwest influences, appreciating the region’s Native American and Mexican artistic traditions, desert ecology, and the multicultural tapestry of the city. His cultural outlook blends traditional Midwestern
    courtesy with an openness to diverse ideas and artistic expression.
