    walks", "Volunteer work at senior center", "Small book‑club meetings"]'
  career_goals: Although retired, Tommie aims to stay active by volunteering as a docent at the Phoenix Art Museum, mentoring hobbyists in DIY projects, and creating a photographic record of the Sonoran
    Desert’s flora for community exhibitions. He also hopes to lead a small‑group senior‑center art class, fostering harmony and sharing his lifelong knowledge while maintaining the quiet, low‑stress lifestyle
    he values.
