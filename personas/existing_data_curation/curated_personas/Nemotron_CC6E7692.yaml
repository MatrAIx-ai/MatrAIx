  career_goals: Although only two years old, Alexis often pretends to be a teacher during play, enjoys showing her dolls how to paint, and frequently says she wants to "help people" and "make beautiful
    pictures". These early expressions suggest nascent aspirations toward teaching or creating art as she grows older.
