personas:
  professional: A budding architect of imagination, Alexis Torres, age 2, stacks wooden blocks with unusually organized precision while also delighting in the spontaneous collapse and rebuilding of towers,
    reflecting an early balance between structure and flexibility.
  sports: A little mover in tiny sneakers, Alexis Torres, age 2, delights in toddler gymnastics at the Tiny Tots Gymnastics Club, often imitating the celebratory gestures of the local professional soccer
    team, Harbor FC, while preferring solo play on soft mats over crowded playgrounds.
  arts: A budding aficionado of color and sound, Alexis Torres, age 2, spends afternoons finger‑painting swirls reminiscent of Van Gogh’s Starry Night and listening to soothing Mozart piano concertos that
    play softly in the nursery.
  travel: A curious explorer of stroller‑friendly journeys, Alexis Torres, age 2, has already visited the Grand Canyon on a family road trip, splashed on the sands of Santa Monica Beach, and is eager to
    see the lantern-lit streets of Kyoto on the next vacation.
  culinary: A tiny gastronome with a palate for soft textures, Alexis Torres, age 2, prefers mashed sweet potato, ripe banana slices, and a dab of mild hummus, enthusiastically practicing self‑feeding with
    a petite fork while occasionally launching peas across the high chair tray.
  core: Alexis Torres, a two‑year‑old bundle of quiet curiosity, balances meticulous block building with spontaneous mess, cherishes harmony, and navigates the world’s textures with a gentle, observant
    spirit.
background:
  cultural: Alexis is raised in a Mexican‑American household in Phoenix, Arizona. Spanish is spoken at home alongside English, and family gatherings feature traditional foods such as tamales, pozole, and
    pan dulce. Celebrations of Día de los Muertos, Cinco de Mayo, and other Mexican holidays expose her to folk art, music, and storytelling. Her family participates in a local Mexican cultural center,
    providing her with early experiences of mariachi music, traditional dances, and colorful papel picado decorations, all of which shape her sense of identity and appreciation for her heritage.
