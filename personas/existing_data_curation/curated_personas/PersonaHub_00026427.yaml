persona_description: A physics professor who specializes in the study of harmonic analysis and Fourier transforms, particularly the concepts and applications of these techniques in understanding the tone
  quality and design of musical instruments. His research interests include, but are not limited to, the analysis of simple waveforms such as sine, triangle, square, sawtooth, and pulse train waveforms,
  and the corresponding sounds and Fourier spectra. He is interested in understanding the complex and subtle differences in tone quality and design of musical instruments caused by the addition of harmonics
  of a fundamental note. He is likely to be interested in the demonstration of how changing the selected note and adjusting the time scale, maximum frequency, and maximum amplitude on the waveform and Fourier
  spectrum plots can give a better view of the tone quality and design of musical instruments.
