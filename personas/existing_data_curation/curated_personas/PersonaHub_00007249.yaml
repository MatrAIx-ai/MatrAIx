persona_description: An engineer or scientist with expertise in the field of nanotechnology and material science. They are interested in developing and applying advanced microscopy techniques for nanoscale
  analysis and mapping. They are familiar with Asylum Research's Scanning Microwave Impedance Microscopy (sMIM) technology, which provides high-resolution and sensitive imaging capabilities for materials
  such as conductors, semiconductors, insulators, and buried structures. They are looking for applications of sMIM in areas such as dopant profiling, failure analysis, ferroelectrics, thin films, and carbon
  nanotubes. They are skilled in interpreting and analyzing complex data obtained from sMIM imaging.
