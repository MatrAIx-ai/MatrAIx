personas:
  professional: Brittany Norton, a retired small‑business bookkeeper with an associate’s degree in business administration, leverages their sharp analytical eye and competitive spirit to volunteer at the
    local senior center, mentoring peers in financial literacy while juggling a chaotic digital genealogy project and occasional freelance budgeting for neighborhood craftspeople.
  sports: Brittany Norton enjoys leisurely walks with the Schenley Park senior walking club, follows the Pittsburgh Steelers and Penguins with competitive fervor, occasionally joins a senior softball league
    in the spring, and stays active by bird‑watching and light gardening, viewing fitness as a pleasant routine rather than a strict regimen that they embrace.
  arts: Brittany Norton devotes their evenings to classic films like Casablanca, savors live performances of the Pittsburgh Symphony Orchestra at the Benedum Center, collects biographies of historical figures,
    and occasionally knits while listening to Ella Fitzgerald, all of which weave a rich tapestry of cultural appreciation into their daily life.
  travel: Brittany Norton favors low‑key day trips to nearby gems such as Fallingwater, Ohiopyle State Park, and the historic streets of Washington, D.C., planning meticulously but often leaving room for
    spontaneous detours to local farmer’s markets, while the constraints of limited mobility keep their road‑tripping adventures within the Mid‑Atlantic region.
  culinary: Brittany Norton, an adept home cook, prepares beloved family recipes like chicken pot pie and heirloom tomato stew seasoned with rosemary and sage, crafts rose‑petal jam for neighborly gifts,
    and relishes the ritual of sharing hearty meals seasoned with fresh garden produce, a practice they cherish as a way to nurture community ties.
  core: Brittany Norton is a fiercely curious 87‑year‑old who balances a competitive edge with a lovingly chaotic garden, a habit of misplacing knitting needles, and a tendency to worry over every detail
    while they still find joy in winning senior trivia nights.
background:
  cultural: 'Brittany grew up in a working‑class white family in the steel‑town neighborhoods of Pittsburgh, where Irish and German heritage were common. Raised in a modest, faith‑centered home, she learned
    the values of self‑reliance, practicality, and community solidarity that defined the city’s post‑war generation. She has lived through the decline of the steel industry, the rise of the city’s cultural
    renaissance, and the resurgence of Pittsburgh’s sports pride, especially the Steelers. These experiences shape her identity: a pragmatic, curious individual who honors family traditions, values local
    history, and remains engaged with the city’s evolving cultural landscape.'
