  career_goals: Although retired from formal employment, Brittany is determined to maintain her independence and mental sharpness. She aims to complete a digital archive of her family genealogy, share her
    stories in a memoir for her grandchildren, and become a regular volunteer at the local senior center where she can mentor younger seniors on financial literacy and computer use. She also hopes to stay
    physically active by participating in the community garden and to compete in senior trivia nights, seeking the satisfaction of winning while keeping her mind engaged. Finally, she wants to ensure her
    estate is organized and her wishes for charitable contributions to the Pittsburgh historical society are fulfilled.
