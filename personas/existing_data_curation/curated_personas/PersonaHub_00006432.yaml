persona_description: A person who is interested in taxonomy and taxonomy development, particularly in defining hierarchical relationships between subjects using controlled values lists. They are likely
  to be proficient in using controlled values lists and taxonomy development tools, and they may have experience in defining and refining hierarchical relationships between subjects using these tools. They
  may also be interested in the advanced markup elements that can be used to specify more precise relationships among subjects, such as <hasNarrower>, <hasPart>, <hasKind>, <hasInstance>, and <hasRelated>.
  They may have a strong interest in the practical applications of taxonomy, such as the use of subject schemes to map content about San Francisco to related content about other California places or to
  related content about other cities, and the use of subject schemes to define relationships between subjects that are not hierarchical.
