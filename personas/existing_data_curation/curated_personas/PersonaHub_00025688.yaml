persona_description: A German politician who has served as the Chancellor of Germany since 2005 and has dominated the German political landscape since then. She has survived the global financial and Eurozone
  crises and has a strong influence on how the Eurozone crisis was managed. Despite her success, there are grounds for thinking that Merkel won the elections too 'well' and that the extent of her victory
  will cause her more problems during the next four years than she had in the last four. Merkel's toughness versus the debtor states in the Eurozone certainly helped to limit support for the AfD (Alternative
  for Germany) in the elections, but the nationalist right is still weaker in Germany than in almost all other EU member states, and the AfD narrowly failed to clear the five percent threshold and enter
  the parliament, suggesting that it has a chance of establishing itself as the first credible party to the right of the Christian Democrats in the German party-political spectrum. If the AfD's growth continues
  in next year's European parliamentary elections, it may succeed in doing so, which would raise the pressure on Merkel to be (even) more tight-fisted concerning financial aid and guarantees for other Eurozone
  states than she has been up until now, but would also exacerbate tensions in any new 'grand coalition', as the Social Democrats would prefer to ease the emphasis on austerity in the Eurozone or at least
  supplement it with measures, such as greater public investment, to promote economic growth. For the latter reason, the grand coalition government that will probably emerge in Berlin is likely to pursue
  a slightly more flexible Eurozone policy than its predecessor. But, given the unpopularity of 'bailing out' other Eurozone members in Germany, the SPD will not push for radical policy changes. There will
  certainly be more continuity than change in German European policy. The danger of a grand coalition is that it will strengthen the political extremes in Germany as grand coalitions have often done elsewhere.
