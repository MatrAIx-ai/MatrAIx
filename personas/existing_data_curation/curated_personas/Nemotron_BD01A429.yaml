  hobbies: '[''Reading classic literature'', ''Poetry writing'', ''Journaling'', ''Urban photography'', ''Mindfulness meditation'', ''Yoga'', ''Cooking simple meals'', ''Visiting quiet cafés'', ''Exploring
    special collections at NYPL'']'
  career_goals: He aspires to translate his love of the humanities into a career that balances predictability with the flexibility he needs for his mental health. In the short term, Jeffrey plans to enroll
    in a Master’s program in Library and Information Science, aiming to become a metadata specialist or archival assistant at a cultural institution where he can work largely independently. Long‑term, he
    hopes to secure a remote freelance editing role for academic journals or literary magazines, enabling him to maintain a structured routine while having the freedom to manage his anxiety and maintain
    a solitary work environment.
