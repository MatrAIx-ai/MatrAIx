personas:
  professional: Niki Sculler, a veteran full‑stack software developer proficient in Java, C#, Python, and JavaScript, blends a curiosity for cloud‑native design with a practical insistence on reliability,
    leading agile code‑review sessions, mentoring juniors, and steering projects toward sustainable architecture while assertively positioning herself for a lead engineer or software architect role.
  sports: Niki Sculler, a devoted member of the Lakefront Hiking Club, tackles the spring and summer trails around Lake Michigan with steady endurance, follows the Chicago Cubs and Chicago Blackhawks for
    seasonal camaraderie, and incorporates weekly yoga and light weight‑training to counterbalance the physical demands of woodworking and gardening.
  arts: Niki Sculler, an active set‑designer for the North Shore Playhouse community theatre, finds inspiration in historical fiction by Hilary Mantel, unwinds with Bob Dylan vinyls, and regularly attends
    Chicago Symphony Orchestra concerts, letting these artistic experiences inform both their woodworking aesthetics and software design sensibilities.
  travel: Niki Sculler, who prefers meticulously planned road trips that blend adventure with relaxation, has explored Pictured Rocks National Lakeshore and Iceland’s volcanic landscapes, dreams of hiking
    New Zealand’s Tongariro Alpine Crossing, and balances future travels with budget considerations and occasional family commitments.
  culinary: Niki Sculler, a confident home baker, delights in crafting sourdough rye loaves, pairing them with garden‑fresh heirloom tomato bruschetta and roasted beet‑goat cheese salads, while also experimenting
    with wild mushroom risotto and occasionally treating themselves to a flaky shrimp and corn chowder at local lakeside eateries.
  core: Niki Sculler balances a data‑driven tech career with a hands‑on maker’s soul, channeling curiosity into cloud architecture while occasionally procrastinating on garden chores during software sprints,
    a blend of disciplined pragmatism and creative indulgence.
background:
  cultural: Niki grew up in suburban Waukesha, Wisconsin, in a middle‑class family that valued education, community involvement, and modesty. She earned her bachelor's degree in Computer Engineering from
    the University of Wisconsin–Madison, where she was part of a tight‑knit cohort of Midwestern students. Her cultural upbringing reflects typical Upper‑Midwest traditions—annual county fairs, cheese curd
    festivals, and strong ties to local churches and volunteer groups. She maintains close relationships with extended family and neighbors, often sharing her garden harvest and participating in neighborhood
    potlucks. This regional identity informs her collaborative work style and her commitment to giving back to the local community.
