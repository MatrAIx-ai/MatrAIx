  career_goals: Niki aims to transition into a technical leadership role, such as Lead Engineer or Software Architect, where she can shape system strategy while still staying hands‑on with code. She plans
    to deepen her expertise in cloud‑native design and obtain an AWS Solutions Architect certification. Additionally, she aspires to champion sustainable software practices within her organization and to
    expand a regional STEM mentorship program that connects middle‑school students with real‑world coding projects. Balancing ambition with practicality, Niki seeks to influence company culture toward inclusive,
    data‑driven decision‑making without sacrificing work‑life balance.
