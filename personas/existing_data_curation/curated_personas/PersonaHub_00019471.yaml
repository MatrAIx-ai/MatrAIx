persona_description: A constitutional law professor who specializes in the study of the separation of church and state, particularly the constitutional rights of religious organizations and the limitations
  of government's role in marriage. He is a staunch advocate for the fair and constitutionally compatible approach to resolving the gay marriage debate, which he believes should be left to the religious
  organizations and the faithful. He is mindful of the political advantages of the gay marriage debate and is prepared to defend the separation of church and state in the face of such political pressures.
