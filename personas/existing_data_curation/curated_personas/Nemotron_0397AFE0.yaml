  career_goals: Salvador aims to leverage his retail experience into a management track, first seeking a shift supervisor role and then a store manager position within the next three years. He plans to
    complete his business administration coursework to qualify for corporate training programs and ultimately aspires to become a regional sales manager overseeing multiple locations. Long‑term, he envisions
    launching his own boutique retail concept that blends technology‑driven product selection with a personalized customer experience, reflecting his balance of curiosity and practicality.
