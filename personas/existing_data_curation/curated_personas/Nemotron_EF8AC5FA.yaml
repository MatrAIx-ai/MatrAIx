personas:
  professional: Andrew Blanco, a seasoned project manager with a STEM background, leverages fifteen years of experience to orchestrate complex technical initiatives using both Agile and Waterfall, while
    their critical eye and competitive nature drive relentless performance audits and AI-enhanced risk modeling to push teams toward data-driven excellence.
  sports: Andrew Blanco, a dedicated fan of the Pittsburgh Steelers, Penguins and Pirates, channels competitive energy into weekend trail biking with the Allegheny Trail Riders, rides a hard-tail mountain
    bike on the Allegheny foothills, participates in local charity bike races, and maintains a disciplined weekly routine of power-lifting and yoga to balance endurance and flexibility.
  arts: Andrew Blanco finds artistic expression through landscape photography, applying the compositional precision of Ansel Adams to Black River Valley shots, while their woodworking reflects the functional
    aesthetics of Gustav Stickley, and evenings often feature classic folk tunes from Bob Dylan and contemporary indie tracks by The National, all complemented by craft-brew inspirations from Sierra Nevada.
  travel: Andrew Blanco plans trips with the same rigor as a project schedule, favoring meticulously mapped road trips to historic sites such as Gettysburg and the D-Day beaches in Normandy, enjoying weekend
    bike getaways to the Adirondacks, and dreaming of a summer expedition to the Scottish Highlands to photograph remote lochs, all while balancing family obligations and budgeting constraints.
  culinary: Andrew Blanco enjoys brewing a robust American IPA with Cascade hops, pairing it with smoked brisket and homemade pretzels infused with malt, masters a classic Pennsylvania Dutch chicken pot
    pie seasoned with rosemary and thyme, and experiments with sous-vide techniques for perfect steak, treating cooking as a precise, data-driven craft.
  core: Andrew Blanco is a data-driven, competitively-minded craftsperson who balances analytical rigor with solitary creative pursuits, from project dashboards to trail biking, home-brewing, and meticulous
    photography.
background:
  cultural: Andrew grew up in Canonsburg, a town steeped in Western Pennsylvania’s industrial heritage, where hard work and practical problem-solving are cultural cornerstones. His family traces its roots
    to Irish and Italian immigrants who settled in the region during the early 20th century, imparting a blend of values that emphasize community loyalty, self-reliance, and a straightforward, no-nonsense
    demeanor. The local culture—shaped by the legacy of steel mills, a passion for the Pittsburgh Steelers, and traditions like the annual Greengate Festival—has reinforced his pragmatic outlook while still
    encouraging curiosity about new technologies. He remains active in his close-knit church community and values the intimacy of small gatherings over large social events.
attributes:
  skills: '[''Project Planning'', ''Risk Management'', ''Budget Control'', ''Schedule Optimization'', ''Resource Allocation'', ''Agile & Waterfall Methodologies'', ''Stakeholder Communication'', ''Data
