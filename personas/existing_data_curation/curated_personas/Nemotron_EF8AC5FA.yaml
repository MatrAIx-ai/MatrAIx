  hobbies: '[''Chess'', ''Trail Biking'', ''Woodworking'', ''Homebrewing'', ''Reading Non-fiction (Military History, Technology, Business Strategy)'', ''Landscape Photography'', ''Participating in Small
    Local Book Club'', ''Writing Articles for Hobbyist Magazine'']'
  career_goals: Andrew aims to transition into a Director of Project Management Office within the next five years, overseeing multi-million-dollar infrastructure projects that revitalize the Allegheny region.
    He plans to earn the PMI Program Management Professional (PgMP) and PMI Agile Certified Practitioner (PMI-ACP) certifications to solidify his expertise. His ambition includes publishing a case study
    on AI-assisted risk modeling, speaking at national conferences such as PMI Global Conference, and eventually establishing his own consultancy that helps mid-sized manufacturing firms adopt lean, data-driven
    project practices. Mentoring junior project managers and fostering a culture of competitive excellence within his team are also core objectives.
