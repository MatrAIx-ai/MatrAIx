personas:
  professional: Connie Bell, an aspiring junior naturalist in preschool, channels a relentless curiosity and artistic eye into leading their classmates on impromptu river‑bank expeditions, arranging leaf‑presses
    and critter sketches, and they delight in the spontaneous chaos of unplanned adventures.
  sports: Connie Bell, a sprightly four‑year‑old, dashes through preschool recess leading ‘forest tag’ while training with the Spokane Little Sprinters Soccer Club in the fall, splashing at the Koch Kids
    Swim lessons in summer, and they proudly wear a Seattle Seahawks jersey when cheering for the nearby Spokane Chiefs during occasional family outings to the arena.
  arts: Connie Bell, a budding little artist, fills their notebook with bright crayon renditions of salmon, pine cones, and the Spokane River after watching the Northwest Museum of Arts & Culture’s Kids
    Art Workshop, while they sing along to Raffi’s ‘Baby Beluga’ and the ‘Frozen’ soundtrack, and they adore the comedic timing of Paw Patrol’s Chase the police pup.
  travel: Connie Bell, a curious four‑year‑old, loves day trips that end in a splash at the Spokane River’s splash pad, eagerly anticipates family outings to the Seattle Space Needle and the Oregon Zoo,
    and they dream of a future adventure to Disneyland’s Fantasyland after hearing the bedtime story about magical castles.
  culinary: Connie Bell, a four‑year‑old with a budding palate, devours mac and cheese and chicken nuggets with a side of carrot sticks, eagerly helps stir pancake batter before topping the stack with blueberries,
    sliced bananas, and a drizzle of maple syrup, yet they stubbornly refuse peas and often squeal if broccoli appears on their plate.
  core: Connie Bell is a relentlessly curious, energetic four‑year‑old who turns every backyard into a forest expedition, hoards shiny coins in a salmon‑shaped piggy bank, sings Raffi at the top of their
    lungs, and they can’t resist a good competitive game even if it means a few extra bruises on their knees.
background:
  cultural: Connie grows up in a middle‑class white family in Spokane, Washington. Her household celebrates mainstream American holidays such as Thanksgiving and Christmas, and often participates in community
    preschool events that feature Pacific Northwest themes like forests, rivers, and local wildlife. Family weekends frequently include visits to nearby farms, museums, and the Spokane River waterfront,
    blending suburban American life with the region's love for outdoor activities and nature.
