  career_goals: Connie imagines herself as an artist who creates bright pictures, an explorer who discovers hidden places in the forest, and a teacher who shares fun stories with friends. She is fascinated
    by space and often says she wants to be an astronaut, while also dreaming of winning races in the playground and leading her peers in games.
