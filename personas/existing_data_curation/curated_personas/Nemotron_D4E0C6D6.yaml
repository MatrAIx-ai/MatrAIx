  career_goals: Edward aims to transition from on‑site supervision to senior project management, pursuing a PMP certification and a LEED Green Associate credential to champion sustainable building practices
    in his region. Over the next five years he plans to lead larger, multi‑phase construction projects, mentor younger tradespeople, and eventually launch his own small‑scale contracting firm that focuses
    on energy‑efficient homes for the rural market. He also hopes to become a certified construction safety trainer, sharing his knowledge with industry peers and contributing to community‑wide safety initiatives.
