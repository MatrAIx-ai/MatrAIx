personas:
  professional: Jackie Miranda, a 95‑year‑old former civil engineer and high‑school mathematics teacher, channels their analytical problem‑solving and technical writing expertise into coordinating senior‑center
    community events, mentoring youth in robotics, and crafting interdisciplinary STEM‑art workshops that blend data interpretation with creative expression.
  sports: Jackie Miranda supports the Phoenix Suns and Arizona Cardinals from their living room, participates in a senior walking club that explores desert trails near the Phoenix Mountains Preserve, and
    occasionally joins a local senior bowling league at the community center.
  arts: Jackie Miranda frequents the Phoenix Art Museum, attends Valley Repertory theater productions, studies watercolor techniques inspired by Georgia O'Keeffe, and collects prints by contemporary desert
    artists like Jim Brandenburg, all of which enrich their storytelling circles.
  travel: Jackie Miranda plans leisurely road trips using senior discounts, favoring national parks such as the Grand Canyon, Saguaro National Park, and Monument Valley, while also revisiting regional museums
    like the Heard Museum, and they prefer staying with family or nearby motels that cater to accessibility needs.
  culinary: Jackie Miranda enjoys cooking southwestern staples like enchiladas verdes, green chile stew, and sopapillas, delights in the tang of prickly pear jam on toast, and while their cooking skill
    is solid for simple dishes, they sometimes forget to eat between workshops.
  core: Jackie Miranda is a curious 95‑year‑old engineer‑turned‑mentor who blends math, art, and desert gardening into community activism, juggling occasional forgetfulness with a relentless enthusiasm
    for intergenerational learning.
background:
  cultural: Jackie was born and raised in a small farming community in central Iowa, growing up in a close‑knit, predominantly White, Protestant family that valued education, hard work, and community service.
    After earning her B.S. in civil engineering from Arizona State University in the late 1950s, she settled in the Phoenix metropolitan area, eventually making her home in Chandler. Living in the Sun Corridor
    has acquainted her with the Southwest's desert landscape, Native American artistic traditions, and a vibrant, multicultural community. She embraces the blend of Midwestern practicality and Southwestern
    creativity, often incorporating native‑plant gardening and regional art appreciation into her daily life while maintaining strong ties to her family’s heritage and local senior‑center networks.
attributes:
  skills: '["Civil engineering (water resources)", "Mathematics instruction", "Data analysis", "Technical writing", "Project management", "Curriculum development", "Mentoring and tutoring", "Community event
    coordination", "Fundraising", "Digital literacy instruction", "Photography", "Public speaking", "Collaborative teamwork"]'
  hobbies: '["Visiting art museums and galleries", "Watercolor painting", "Pottery workshops", "Desert gardening (native succulents)", "Bridge and card games", "Senior center book club", "Storytelling circles",
    "Reading biographies of scientists and artists", "Podcast listening (science, art, history)", "Road trips to national parks and historic sites", "Theater performances", "Volunteer community outreach"]'
  career_goals: Jackie's primary ambition is to stay actively engaged in her community by sharing her STEM expertise with younger generations and fostering intergenerational connections. She aims to expand
    the senior‑center's art and technology workshops, mentor high‑school students in robotics, and help preserve local desert history through oral‑history projects. She also hopes to travel to regional
    museums and galleries to deepen her knowledge of art, and to continue learning new creative skills such as watercolor painting. Ultimately, she seeks to leave a lasting legacy of curiosity, collaboration,
    and kindness.
