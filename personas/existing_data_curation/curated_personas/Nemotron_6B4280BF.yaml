personas:
  professional: Rosemarie Jones, a budding community organizer in middle school, channels her love for teamwork from soccer and choir into coordinating neighborhood clean‑ups and school heritage projects,
    using her natural sociability to rally peers while balancing curiosity with a relaxed, flexible approach to planning.
  sports: Rosemarie Jones thrives on the soccer field as a midfielder for the Spartanburg Dynamo youth club, roots for the Charlotte FC MLS team, and stays fit through hip‑hop dance classes, blending competitive
    spirit with a love for community‑spirit games and weekend hikes on local trails.
  arts: Rosemarie Jones expresses creativity by sketching comic strips inspired by fantasy novels, singing soulful hymns in the church youth choir, and grooving to R&B and gospel tracks from artists like
    Beyoncé, Alicia Keys, and Kendrick Lamar, while their love for graphic storytelling fuels late‑night drawing sessions.
  travel: Rosemarie Jones enjoys spontaneous weekend hikes in the nearby Blue Ridge Mountains, has visited Nashville for its music scene, dreams of exploring New Orleans' historic neighborhoods and the
    San Diego Comic‑Con, and prefers flexible, low‑budget travel plans that allow them to juggle school, soccer practice, and family responsibilities.
  culinary: Rosemarie Jones delights in helping prepare family soul‑food feasts featuring fried chicken, collard greens, and sweet‑potato pie, can skillfully season okra and cornbread, and occasionally
    experiments with making their own pizza toppings after watching cooking videos, though they often forget to clean up the kitchen afterward.
  core: Rosemarie Jones is a friendly, energetic 13‑year‑old who blends soccer, hip‑hop, and comic art into a community‑focused life, yet misplaces school assignments, worries over minor setbacks, and leans
    heavily on journaling to calm their nerves.
background:
  cultural: Rosemarie's upbringing is rooted in the rich African‑American heritage of Spartanburg. She celebrates family gatherings centered around soul food, church traditions, and storytelling that link
    her to older generations who lived through the civil‑rights era. Her community emphasizes resilience, mutual support, and pride in Black history, which she experiences through local heritage festivals,
    school Black History Month projects, and mentorship from church leaders. These cultural influences shape her values of kindness, cooperation, and a desire to give back to the neighborhood that has nurtured
    her.
attributes:
  skills: '[''interpersonal communication'', ''team collaboration'', ''creative problem solving'', ''basic digital literacy'', ''informal group activity coordination'']'
  hobbies: '[''soccer'', ''hip‑hop dance'', ''church youth choir'', ''comic drawing'', ''volunteering at food pantry'', ''hiking'', ''strategy video games'', ''journal writing'', ''listening to gospel and
    R&B music'']'
  career_goals: She dreams of a future where she can support and uplift others in her community, imagining roles such as a middle‑school teacher, youth program coordinator, or community health advocate.
    Rosemarie aims to pursue higher education, perhaps studying education or public health, so she can mentor younger children, lead after‑school clubs, and champion initiatives that promote wellbeing and
    equality for Black youth in Spartanburg.
