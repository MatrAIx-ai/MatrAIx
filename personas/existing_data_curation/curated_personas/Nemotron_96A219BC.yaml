  career_goals: Taylor aims to progress to a senior engineer role and eventually transition into a technical lead or engineering manager position where she can shape product direction and foster a supportive,
    small‑team culture. She seeks opportunities to mentor junior developers, champion inclusive design, and contribute to open‑source projects that have social impact. Professional development goals include
    earning an AWS Solutions Architect certification and deepening her expertise in cloud‑native architecture. While pursuing these ambitions, she prioritizes a stable work environment that allows for work‑life
    balance and proactive stress management.
