  hobbies: '[''Watercolor painting'', ''Abstract sketching'', ''Reading mystery and science-fiction novels'', ''Attending Cajun music festivals'', ''Cooking Cajun cuisine'', ''Quilting and textile crafts'',
    ''Home-organisation projects'', ''Journaling and poetry'', ''Nature walks in the Atchafalaya Basin'', ''Volunteer work at local church'', ''Exploring eco-friendly cleaning innovations'']'
  career_goals: Amy aims to transition from a housekeeping cleaner to a supervisory role within a boutique hotel or senior living community, leveraging her organisational acumen to lead a team of housekeepers.
    She plans to obtain a professional housekeeping certification and complete a GED, which will open pathways to start her own cleaning and home‑staging business that blends her artistic sensibility with
    efficient space management. Her long‑term ambition is to achieve financial independence to support her teenage children, publish a guide on eco‑friendly cleaning and home organisation, and become a
    respected mentor in the local hospitality industry.
