personas:
  professional: Amy Spernak, a seasoned professional housekeeper with a flair for eco‑friendly detail, uses their disciplined time‑management and creative interior styling to transform boutique hotel rooms
    into immaculate, aesthetically pleasing spaces while training staff with assertive compassion.
  sports: Amy Spernak, an avid nature enthusiast, spends early mornings trekking the Atchafalaya Basin, joins the Baton Rouge Paddle Club for weekend paddle‑boarding, roots for the New Orleans Saints and
    the LSU Tigers, and they play casual tennis at the local community court.
  arts: Amy Spernak, a watercolor aficionado, captures abstract bayou scenes on paper, attends live performances by the Cajun band BeauSoleil and the zydeco group The Pine Leaf Boys, and devours mystery
    novels by Agatha Christie alongside sci‑fi classics by Isaac Asimov, all which fuel their boundless curiosity.
  travel: Amy Spernak, a meticulous planner, crafts detailed itineraries for weekend escapes to New Orleans’ French Quarter and the coastal town of Grand Isle, dreams of a culinary pilgrimage to Lyon, France,
    and balances travel ambitions with a disciplined savings strategy to ensure their teenage children can join occasional family vacations.
  culinary: Amy Spernak, a dedicated home chef, perfects traditional gumbo with a dark roux, smoked andouille, and fresh okra, experiments with herb‑infused vinaigrettes for garden salads, and often whips
    up quick, eco‑friendly shrimp étouffée when their schedule demands efficiency, all while savoring the rich flavors of their regional cuisine.
  core: Amy Spernak, a 46‑year‑old organized powerhouse, balances eco‑friendly housekeeping mastery with nightly watercolor bursts, fuels creativity with coffee, and they occasionally over‑schedule every
    spare moment.
background:
  cultural: Amy was raised in a white, Southern family in the Lafayette Parish of Louisiana, where Catholic and Protestant traditions coexist within a predominantly Cajun and Creole cultural landscape.
    The region’s emphasis on hospitality, community, and vibrant music shaped her values of service and social connectedness. Growing up, she absorbed French‑Cajun customs, including local culinary practices,
    festivals like Mardi Gras, and a few phrases of Cajun French. Her divorce and role as a single mother have reinforced her independent spirit, while her deep appreciation for the area’s arts, food, and
    natural environment reflects a blend of southern Americana and Cajun heritage.
