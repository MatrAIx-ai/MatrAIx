persona_description: A medical professional with expertise in physiology and cardiology, specifically focusing on heart anatomy and physiology. Viviana Popa, Pauline Rowsome, Salma Ladhani, Evan Debevec-McKenney,
  Filip Vasiljević, and Filip Vasiljević are contributors to the text. The text discusses the anatomy and function of the heart, including the two upper chambers (left atrium and right atrium) and the lower
  chambers (left ventricle and right ventricle), as well as the heart's contraction and relaxation phases, and the calculation of cardiac afterload using the law of Laplace. The text also includes references
  to medical physiology, physiology, and human anatomy & physiology.
