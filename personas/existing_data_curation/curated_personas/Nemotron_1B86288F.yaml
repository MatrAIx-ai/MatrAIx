  hobbies: '[''Pickup basketball'', ''Local trivia nights'', ''Hiking in the Ruby Mountains'', ''Mountain biking on desert trails'', ''Hunting and fishing expeditions'', ''Camping and backcountry navigation'',
    ''Building and customizing PCs'', ''Multiplayer video gaming'']'
  career_goals: Herbert aims to turn his sociable nature and practical business skills into a career in the hospitality and tourism sector of northern Nevada. He plans to complete a bachelor’s degree in
    tourism management within the next three years, then secure a supervisory role at a local motel, casino, or outdoor‑guide operation. Long‑term, he hopes to launch his own boutique guesthouse or adventure‑tour
    company that blends desert experiences with community events, leveraging his competitive drive to make the venture a regional standout.
