personas:
  professional: David Metz, a seasoned CPA and forensic auditor, leverages his meticulous command of U.S. GAAP, Excel VBA, and SAP to design bulletproof internal controls, while his competitive, skeptical
    mindset drives him to consistently exceed audit quality benchmarks and mentor junior staff with a structured, results‑oriented approach.
  sports: David Metz runs three times a week with the Watertown Striders running club, follows the New York Rangers and Buffalo Bills, and spends weekends fishing on the St. Lawrence River, balancing his
    competitive spirit on the track with the tranquil patience required for angling.
  arts: David Metz enjoys listening to fado classics like Amália Rodrigues and the jazz improvisations of John Coltrane, attends the Watertown Community Theatre’s productions of classic plays, and decorates
    his workshop with reproductions of Van Gogh’s Starry Night, finding creative solace that complements his analytical career.
  travel: David Metz prefers well‑planned road trips that combine outdoor adventure and cultural immersion, having explored the historic streets of Lisbon’s Alfama district, hiked the Adirondack High Peaks,
    and scheduled a future cruise to the Azores to reconnect with family traditions while balancing family responsibilities.
  culinary: David Metz is an adept home chef who regularly prepares bacalhau à Brás and caldo verde using fresh cod, olive oil, and chouriço, while his woodworking hobby fuels a love for grilling smoked
    trout over a handcrafted cedar plank, showcasing his skillful blend of traditional flavors and tactile craftsmanship.
  core: David Metz is a detail‑driven accountant who balances competitive ambition with anxiety‑fuelled caution, expressing his heritage through strategic chess moves, disciplined finances, and lovingly
    prepared Portuguese dishes.
background:
  cultural: David is a third‑generation American of mixed Portuguese (paternal) and German (maternal) descent. Raised in a Catholic household in Watertown, NY, he grew up bilingual, speaking Portuguese
    at home and celebrating Portuguese traditions such as Festa de São João, while also fully participating in mainstream American holidays like Thanksgiving and the Fourth of July. His family emphasized
    hard work, frugality, and community involvement, values that align with the pragmatic, self‑reliant ethos of upstate New York's small‑town culture. These cultural influences, combined with his educational
    background in business, have shaped his competitive, skeptical personality and his focus on personal achievement, while also fostering a deep appreciation for cultural foods, community service, and
    the outdoors.
attributes:
  skills: '[''Financial reporting'', ''GAAP compliance'', ''Tax preparation'', ''Audit planning and execution'', ''Risk assessment'', ''Internal controls design'', ''Forensic accounting'', ''Data analysis
    (Excel, Power Query, Tableau)'', ''ERP systems (SAP, QuickBooks)'', ''Budgeting and forecasting'', ''Regulatory compliance'', ''Project management'']'
  hobbies: '[''Chess'', ''Woodworking'', ''Fly fishing'', ''Running'', ''Reading non-fiction (finance & history)'', ''Volunteer treasurer for PTA'', ''Cooking Portuguese cuisine'', ''Bridge club'', ''Listening
    to classic rock'']'
  career_goals: David aims to become a senior audit manager within the next five years at his regional CPA firm, positioning himself for partnership or the eventual launch of a boutique accounting practice
    focused on forensic services for upstate New York small businesses. He plans to deepen his credentials by earning the Certified Fraud Examiner (CFE) designation alongside his CPA. Long‑term, he envisions
    transitioning into a CFO role for a mid‑size manufacturing company in the region, where he can leverage his financial expertise and leadership skills. Balancing his ambitious career trajectory with
    personal well‑being, David seeks structured work hours, the possibility of remote work days, and opportunities to mentor younger accountants, all to help manage his anxiety and maintain a stable, predictable
    professional environment.
