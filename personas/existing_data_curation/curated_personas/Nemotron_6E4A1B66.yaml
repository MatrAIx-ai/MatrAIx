  hobbies: '[''Strategic board games (Chess, Settlers of Catan)'', ''DIY woodworking projects'', ''Herb and vegetable gardening'', ''Reading non-fiction (history, technology, business)'', ''Attending Mexican
    cultural festivals'', ''Preparing traditional Mexican dishes (tamales, pozole)'', ''Mindfulness meditation'', ''Weekend walks/hikes in local parks (Eagle Creek)'', ''Socializing with small groups of
    friends'', ''Learning new rental equipment technologies'']'
  career_goals: Juan aims to transition from his current clerk role to a supervisory position—such as floor manager or shift lead—within the next 12‑18 months. To achieve this, he plans to earn a certification
    in inventory and asset management and to lead a quarterly efficiency initiative that reduces equipment downtime and improves rental turnover. In the longer term, he envisions launching a small independent
    specialty‑tool rental boutique that would allow him to apply his deep product knowledge while providing a stable income for his retirement. He also seeks personal development opportunities to better
    manage his anxiety, such as stress‑management workshops and mentorship programs, so he can maintain high performance under pressure.
