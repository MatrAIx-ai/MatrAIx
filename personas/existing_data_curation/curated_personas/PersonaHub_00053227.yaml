persona_description: A researcher or educator interested in the study of educational practices, particularly in the area of differentiation and the use of developmentally appropriate instructional practices
  in kindergarten classrooms. This persona is likely to be interested in comparing the frequencies of stress behaviors observed in kindergartens employing developmentally appropriate and inappropriate instructional
  practices. They are interested in exploring the relationship between appropriate and inappropriate practices and stress behaviors of kindergarten children, and may be interested in using the measures
  developed to differentiate kindergartens and explore the relationship between appropriate and inappropriate practices and stress behaviors.
