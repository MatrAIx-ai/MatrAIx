  They are also knowledgeable about the importance of habitat connectivity and the role of the Co-operative in protecting strategic natural values. They are interested in the management strategies used
  to conserve the Brush-tailed Phascogale and the Powerful Owl, and the rare invertebrates recorded on the property.
