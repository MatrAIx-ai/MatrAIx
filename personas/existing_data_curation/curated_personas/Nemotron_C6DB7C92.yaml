  hobbies: '["Recreational Basketball", "CrossFit/Weight‑lifting", "Hiking in the Cascades", "Fishing on the Puyallup River", "Barbecuing/Grilling", "Woodworking", "Attending the Washington State Fair",
    "Watching Seattle Seahawks games", "Playing Chess", "Volunteer Neighborhood Watch"]'
  career_goals: Carl aims to earn a promotion to Sergeant within the next two years, leveraging his strong performance record and leadership abilities. He plans to complete his associate's degree in criminal
    justice and eventually pursue a bachelor's in public administration to qualify for a Facility Manager position. Additionally, Carl wants to spearhead a mentorship program for new correctional officers,
    improve procedural efficiency in daily scheduling, and introduce community outreach initiatives that connect the jail with local support services. His long‑term ambition is to shape correctional policy
    at the county level while maintaining a balanced family life.
