personas:
  professional: Charlotte Carter, a 28‑year‑old hospitality student and emerging event coordinator, blends a structured, detail‑oriented logistical mindset with a spontaneous love for Kentucky Derby celebrations,
    leveraging their social‑media expertise and hands‑on DIY skills to rally volunteers, negotiate venues, and keep community festivals on track despite a habit of occasionally overlooking minor deadlines.
  sports: Charlotte Carter, an avid equestrian and weekend hiker, regularly joins a local Bluegrass hiking club, cheers the University of Kentucky Wildcats basketball team, follows the Lexington Legends
    baseball club, and balances a casual fitness routine of yoga sessions with spontaneous horse‑riding outings, embodying a flexible yet community‑oriented athletic spirit.
  arts: Charlotte Carter immerses themselves in regional bluegrass and country swing, attending live performances by Chris Stapleton, the Avett Brothers, and local fiddle crews, participates in line‑dance
    circles at social gatherings, and volunteers at the Lexington Art League's monthly gallery openings, allowing music and grassroots art to color their social identity.
  travel: Charlotte Carter prefers organized group road‑trips that mix Kentucky bourbon‑trail tours with occasional escapes to European whisky capitals like Edinburgh and Dublin, meticulously plans itineraries
    on spreadsheets, yet often overbooks a night’s stay after spontaneous invitations to family reunions, balancing structured travel planning with a love of unexpected adventure.
  culinary: Charlotte Carter experiments with Southern comfort cuisine, perfecting fried chicken, bourbon‑glazed pork ribs, and pecan pie using fresh vegetables from their backyard garden, and delights
    in pairing dishes with locally crafted bourbons, though they sometimes burn the first batch of biscuits when juggling event‑planning deadlines.
  core: Charlotte Carter thrives on weaving Kentucky’s bourbon and horse culture into vibrant community events, yet they battle a habit of misplacing volunteer schedules amid their own spontaneous plans.
background:
  cultural: Charlotte was raised in the Bluegrass region of Kentucky, immersed in a family environment that values Southern hospitality, community engagement, and a deep appreciation for bourbon and horse
    culture. As a white resident of Lexington and Bourbon County, she identifies with regional traditions such as family gatherings centered around comfort food, church involvement, and participation in
    local festivals. While honoring these heritage values, she also embraces contemporary, progressive perspectives that influence her social interactions and career aspirations.
attributes:
  skills: '[''Interpersonal communication'', ''Event planning'', ''Social media management'', ''Community outreach'', ''Basic culinary and baking'', ''Bourbon tasting knowledge'', ''Equine event coordination
    basics'', ''First aid certification'', ''DIY home repair'']'
  hobbies: '[''Attending local festivals'', ''Bourbon distillery tours'', ''Horseback riding'', ''Yoga'', ''Volunteer work at animal shelter'', ''Book club participation'', ''Southern cooking and baking'',
    ''Gardening'', ''Line and country swing dancing'', ''Group hiking trips'']'
  career_goals: Charlotte aims to complete a bachelor’s degree in hospitality and event management within the next two years, leveraging her hands‑on experience to secure a full‑time position in Lexington’s
    tourism or event‑planning sector. Her short‑term ambition is to become a lead coordinator for local festivals, integrating her love of community and regional culture. Long‑term, she aspires to launch
    a boutique event‑planning business that blends Southern hospitality with a flexible, client‑centered approach, and she hopes to deepen her expertise in bourbon tourism and equine event production.
