personas:
  professional: Christina Thomas is a budding architect of block castles, balancing their innate curiosity about how things fit together with a practical habit of sorting pieces by size and color, showing
    early signs of the organized yet flexible approach they'll carry into future careers.
  sports: Christina Thomas loves splash-time at the community pool, tentatively learning toddler swimming strokes, attends weekly mini-soccer sessions with other kids, and chants the name of the local baseball
    team, the River City Royals, while their energetic nature drives them to climb playground structures with unfiltered enthusiasm.
  arts: Christina Thomas delights in the animated world of Peppa Pig and the musical exuberance of The Wiggles, often humming Baby Shark while flipping through Eric Carle's vivid picture books, showing
    how music and bright illustrations shape their lively imagination.
  travel: Christina Thomas enjoys stroller-walks to the nearby zoo, where they point at giraffes, loves weekend beach trips to Sandy Bay, and dreams of a future adventure to Disneyland Paris, balancing
    their curiosity for new sights with parents' careful planning and occasional nap-time constraints.
  culinary: Christina Thomas favors macaroni and cheese, banana slices, and occasionally stubbornly rejects broccoli, yet they proudly stir their own oatmeal with a plastic spoon, showcasing a blend of
    practical self-feed independence and the typical two-year-old selective palate.
  core: Christina Thomas is a sociable, curious two-year-old who balances organized play with spontaneous adventure, charming everyone while quietly asserting their tiny preferences.
background:
  cultural: Christina is an African‑American child raised in West Palm Beach, Florida, a culturally diverse coastal city. Her family's traditions blend Southern U.S. African‑American heritage with the vibrant
    multicultural influences of the region. She participates in family gatherings featuring soul food and gospel or contemporary R&B music, and she experiences community celebrations such as the local Juneteenth
    parade. The warm climate encourages outdoor play, while the area's rich tapestry of languages, cuisines, and artistic expressions provides a broad cultural backdrop for her early development.
