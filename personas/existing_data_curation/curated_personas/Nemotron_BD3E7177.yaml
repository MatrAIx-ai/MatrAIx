personas:
  professional: Rebecca Olson, a budding robotics enthusiast who dreams of aerospace engineering, blends a love of structured problem‑solving with spontaneous tinkering, and they channel their community‑centric
    values into collaborative school projects while navigating the occasional deadline anxiety.
  sports: Rebecca Olson cheers for the Alabama Crimson Tide football team, follows the Huntsville Havoc ice‑hockey club, and they participate in the school’s track and field sprint program, preferring predictable
    practice schedules yet sometimes joining spontaneous pickup games at the local park.
  arts: Rebecca Olson devours fantasy novels by Sarah J. Maas, sketches video‑game characters in a worn sketchbook, and they attend weekend digital‑art workshops while listening to Hayao Miyazaki’s Spirited
    Away soundtrack, letting creative bursts counterbalance their worry‑laden thoughts.
  travel: Rebecca Olson dreams of visiting the Kennedy Space Center in Florida and the historic streets of Savannah, Georgia, and they plan trips with detailed itineraries on Google Maps, yet sometimes
    give in to spontaneous weekend camping trips when school breaks appear unexpectedly.
  culinary: Rebecca Olson relishes smoked brisket and pimento cheese at family barbecues, enjoys assembling quick nacho platters with jalapeños and cheddar, and they dabble in baking brownies with dark
    cocoa powder, though they often over‑salt their experimental taco seasoning in a quest for bold flavor.
  core: Rebecca Olson is a hopeful aerospace‑dreamer who balances meticulous planning with sudden creative bursts, and they often wrestle with worry‑driven perfectionism while finding calm in sketching
    and stargazing.
background:
  cultural: 'Rebecca was raised in Huntsville, Alabama, a city often called Rocket City because of its deep ties to the U.S. space program and a thriving aerospace industry. Her family reflects a typical
    Southern white middle‑class background: they attend a local Baptist church, enjoy family gatherings featuring barbecue and seasonal dishes, and place a strong emphasis on community involvement and courtesy.
    The region’s focus on education, especially in science and technology due to nearby NASA facilities and defense contractors, has shaped her exposure to STEM opportunities from a young age. While she
    benefits from the close‑knit community values of Madison County—such as hospitality, respect for elders, and a sense of civic duty—she also experiences the growing cultural diversity of Huntsville,
    which broadens her perspective on collaborative work and inclusive outreach.'
attributes:
  skills: '[''Basic algebra and practical math'', ''Fundamental physics concepts'', ''Google Suite (Docs, Slides, Sheets) proficiency'', ''Scratch programming (interactive stories and games)'', ''Robotics
    club hands‑on problem solving'', ''Mechanical troubleshooting'', ''Peer mediation and conflict resolution'', ''Volunteer reading buddy assistance'', ''Personal budgeting and allowance management'',
    ''Meal planning and basic cooking'', ''Household chore coordination'', ''Short‑term planner organization'']'
  hobbies: '[''Reading young adult and sci‑fi novels'', ''Sketching and drawing'', ''Photography of local parks and nature'', ''Playing puzzle and adventure video games'', ''Scratch programming and game
    creation'', ''Robotics and LEGO building projects'', ''Volunteer reading buddy at the library'', ''Church youth group participation'', ''Community service projects'', ''Journaling for stress management'']'
  career_goals: Rebecca aims to graduate high school with a strong STEM focus and enroll in a university or technical college where she can study engineering or computer science, with an eye toward Huntsville’s
    aerospace sector. She dreams of contributing to satellite design or rover development at the nearby Marshall Space Flight Center or a private aerospace firm, where her practical problem‑solving skills
    can be applied. At the same time, she wishes to keep a people‑oriented element in her work—perhaps by mentoring younger students in STEM clubs or participating in community outreach programs that inspire
    girls to pursue technical careers. Short‑term, she wants to improve her long‑term project management, secure a summer internship related to robotics, and develop coping strategies for stress so she
    can thrive in a demanding technical environment.
