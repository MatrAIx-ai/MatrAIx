  hobbies: '["Watercolor Painting", "Mixed Media Art", "Speculative Fiction Reading", "Poetry Writing", "Short Story Writing", "Urban Photography", "Digital Art Experimentation", "Beach Walking", "Gallery
    Visits", "Volunteer Creative Workshops", "Afro‑centric Cooking"]'
  career_goals: She aims to enroll in a Bachelor of Fine Arts program with a concentration in Illustration or Concept Art, aspiring to become a freelance illustrator and visual storyteller for independent
    games, graphic novels, or community art projects. She also hopes to launch a youth arts workshop series in Fort Lauderdale that encourages creative expression among underserved teens. Long‑term, she
    envisions creating a cultural collective that showcases contemporary African American art.
