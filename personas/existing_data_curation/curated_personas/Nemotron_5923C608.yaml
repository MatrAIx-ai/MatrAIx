personas:
  professional: Donnette Wilkerson is an aspiring freelance illustrator who leverages a strong foundation in visual communication, Adobe Creative Suite mastery, and a habit of meticulous project organization
    to transform abstract concepts into striking watercolor and mixed‑media illustrations, while their introverted imagination fuels a unique narrative voice that resonates with indie game developers and
    community art projects.
  sports: Donnette Wilkerson enjoys low‑key beach volleyball at Fort Lauderdale’s shoreline, practices sunrise yoga at a local studio, follows the Miami Heat for NBA excitement and the Tampa Bay Buccaneers
    for football Sundays, and occasionally joins a community running club that meets at Hugh Taylor Birch State Park.
  arts: Donnette Wilkerson curates personal playlists featuring Miles Davis, Erykah Badu, and Kendrick Lamar while studying the visual storytelling of illustrators like Shaun Tan and Studio Ghibli’s Hayao
    Miyazaki, spends weekend afternoons at the FATVillage art district, and volunteers to teach poetry workshops inspired by the spoken‑word rhythms of poet‑activist Sarah Kay.
  travel: Donnette Wilkerson prefers spontaneous weekend trips that blend beach relaxation with cultural immersion, having explored nearby Miami’s Art Deco district, taken a sunrise bike ride along the
    Florida Keys, and dreaming of a creative retreat in Dakar, Senegal to study Afro‑centric culinary art while budgeting the journey through student discounts and couch‑surfing.
  culinary: Donnette Wilkerson experiments in the kitchen with modern twists on classic Southern dishes like collard‑green hummus and shrimp‑and‑grits risotto, favors locally sourced seafood and heirloom
    tomatoes, and often seasons creations with smoked paprika, cajun spice, and a splash of bourbon‑infused maple syrup, while still loving fast‑food pizza on study nights.
  core: Donnette Wilkerson is a solitary, imagination‑driven teen artist who balances disciplined project planning with spontaneous creative bursts, occasionally overspends on art supplies, and battles
    mild anxiety with disciplined self‑care rituals.
background:
  cultural: Donnette identifies as an African American woman raised in the culturally diverse milieu of Broward County, Florida. Her family traditions blend Southern Black heritage with the vibrant Caribbean
    influences prevalent in Fort Lauderdale, exposing her to a rich tapestry of music, cuisine, and storytelling. She grew up attending church and community events where gospel, jazz, and hip‑hop were central,
    shaping her appreciation for rhythm and improvisation. This cultural milieu informs her artistic voice, which often references the history of Black resilience, diaspora aesthetics, and contemporary
    Afro‑centric narratives.
