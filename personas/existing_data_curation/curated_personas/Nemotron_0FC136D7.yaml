  hobbies: '[''Sudoku and crosswords'', ''Strategy video games (turn‑based RPGs, puzzle games)'', ''Reading non‑fiction/self‑help books'', ''Cooking South Asian cuisine'', ''Mindfulness meditation'', ''Gardening'']'
  career_goals: Shivam aims to earn his high school equivalency (GED) within the next two years and then pursue a community‑college certificate in administrative support or information‑technology help‑desk
    services. He seeks a stable, structured role such as office administrator, customer‑service representative, or IT support technician where his reliability and attention to detail can contribute to a
    harmonious team environment. In the longer term, he hopes to advance to a supervisory position, overseeing operations and ensuring consistent, organized workflows.
