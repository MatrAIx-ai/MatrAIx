personas:
  professional: Shivam, a newborn with a calm, structured temperament, spends each day methodically exploring textures and sounds, foreshadowing a future as a meticulous data analyst who thrives on organized
    problem-solving and collaborative teamwork, and they already exhibit a quiet focus on routine.
  sports: Shivam's early physical routine includes weekly baby-swim sessions at the local community center and relaxed viewing of Houston Astros baseball games in a tiny team onesie, fostering a low-key
    yet steady introduction to fitness and team spirit, and they enjoy the gentle water play more than the loud crowd.
  arts: Shivam lights up to lullabies by A.R. Rahman, classic violin movements of Vivaldi's 'Spring', and the soft Disney lullaby When You Wish Upon a Star, cultivating an early love for multicultural music
    and storytelling, and they often smile and coo in rhythm with the melodies.
  travel: Shivam's family enjoys gentle outings to the Houston Arboretum and plans future trips to Tamil Nadu for temple festivals and to New Orleans for Mardi Gras, balancing cultural pilgrimage with baby-friendly
    itineraries, and they seem most curious about colorful lanterns and festive processions.
  culinary: Shivam's palate consists of breastmilk, oat-based formula, and pureed sweet potato blended with a pinch of turmeric and carrot-apple puree, reflecting a subtle infusion of the family's traditional
    flavors into a simple, nutritious diet, and they show a particular delight when the puree is slightly warmer.
  core: Shivam blends a quiet, structured curiosity with a family-centered focus on harmony, turning everyday routines into future-proof habits while occasionally resisting sudden changes in schedule, and
    they are already developing a calm resilience.
background:
  cultural: Shivam is part of a South Asian (Indian) family that settled in Houston’s Fort Bend County. His household embraces traditions such as Diwali, Holi, and the Tamil New Year, while also integrating
    into the multicultural Texan community. He is fluent in English and Tamil (with some Hindi exposure) and was raised with values that emphasize respect for elders, community cooperation, humility, and
    the importance of education. The family’s focus on harmony, modesty, and practical responsibility aligns with Shivam’s cooperative and considerate personality.
