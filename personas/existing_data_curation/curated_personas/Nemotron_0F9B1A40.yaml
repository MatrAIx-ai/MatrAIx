  hobbies: '[''snowboarding'', ''soccer'', ''multiplayer video gaming'', ''YouTube video creation'', ''LEGO building'', ''basic electronics tinkering'', ''birdwatching'', ''comic drawing'', ''hiking'']'
  career_goals: Johnny aspires to turn his love for the outdoors and competitive spirit into a future career. He dreams of becoming a wildlife biologist or park ranger focused on Colorado's alpine ecosystems,
    hoping to combine field work with his tech interests by creating educational apps about nature. He also entertains the idea of a professional snowboarder or mountain rescue guide, aiming to lead teams
    in high‑pressure situations where his quick problem‑solving and teamwork can shine. In the longer term, he imagines starting a youth outdoor‑technology club to mentor peers.
