personas:
  professional: Johnny Buchanan, a budding content creator and junior electronics tinkerer, fuses curiosity with practicality by filming snowboarding tricks, building LEGO‑based gadgets, and dominating
    multiplayer video‑game battles, and they improvise solutions on the fly while embracing a relaxed, flexible approach to projects.
  sports: Johnny Buchanan shreds the slopes at Alpine Ridge Resort during winter, plays forward for the Eastside Youth Soccer Club in the spring, and roots for the River City FC as well as the hometown
    hockey squad the Frostbite Flyers, and they channel competitive energy into both snowboarding tricks and soccer matches.
  arts: Johnny Buchanan captures high‑energy snowboarding clips for friends, draws expressive comic strips to process strong emotions, constructs intricate LEGO scenes, and fuels creativity with music from
    Billie Eilish and Tame Impala while attending local festivals and community skate nights, and they often share their work online to gauge reactions.
  travel: Johnny Buchanan prefers spontaneous weekend hikes to Redwood Trail and quick snowboarding trips at Alpine Ridge, but dreams of future adventures skiing in Hokkaido, Japan, and exploring Berlin's
    vibrant street art scene, and they balance modest family travel funds with a desire for both adrenaline and cultural discovery.
  culinary: Johnny Buchanan enjoys a beginner’s cooking hobby centered on simple dishes like pepperoni pizza, mac and cheese, and chocolate‑chip pancakes, while favoring bold flavors such as sriracha‑spiced
    noodles and peanut butter‑filled cookies, and they often experiment in the kitchen after school.
  core: Johnny Buchanan is a high‑energy, competitively‑driven 12‑year‑old who oscillates between snowboarding thrills, LEGO inventions, and video‑game battles, and they often channel intense anxiety into
    both creative projects and occasional bouts of disorganization.
background:
  cultural: Johnny grew up in Edwards, Colorado, a small mountain community with a strong outdoor culture. His family’s roots trace back to Scottish and German immigrants who settled in the Rocky Mountains
    generations ago, blending traditional Western mountain values—self‑reliance, respect for nature, and community festivals—with typical American customs. The town’s social life revolves around ski and
    snowboarding seasons, local school sports, and community events like the annual mountain fest, all of which shape his identity. He celebrates holidays such as Thanksgiving and Fourth of July alongside
    local traditions like the summer hike‑and‑camp weekend. English is his primary language, and he often mixes modern digital influences—social media, gaming—with his love for the outdoors.
