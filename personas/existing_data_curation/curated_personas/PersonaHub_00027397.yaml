persona_description: A professional software developer who is interested in using the NAG Fortran Compiler to produce portable, standard-conforming code. This person has a strong background in Fortran and
  is looking for a tool that can help them update their skills to the latest language features. They are likely to be looking for a compiler that supports OpenMP 3.0 and 3.1, as well as providing extensive
  run-time checks and automatic garbage collection. The ability to convert fixed-format code to free-format and provide dependency information is also important for this person. They are also interested
  in the ability to pretty print and list dependency information of modules and include files, as well as generating explicit procedure interfaces as module or INCLUDE files.
