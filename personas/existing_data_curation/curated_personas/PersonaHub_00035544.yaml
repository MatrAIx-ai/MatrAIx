persona_description: A dedicated and passionate researcher and scientist who is particularly interested in ecological research and monitoring. This individual is highly skilled in ecological data collection
  and analysis, and is currently working on a national-scale research infrastructure called NEON, which aims to gather and provide 30 years of ecological data on the impacts of climate change, land use
  change, and invasive species on natural resources and biodiversity. This researcher is highly interested in the latest developments in ecological monitoring technology and is constantly seeking out new
  and innovative ways to improve and enhance ecological data collection and analysis. They are also interested in the potential of using airborne remote sensing data to study the full range of wildfire
  effects, and are eager to contribute to this important research project.
