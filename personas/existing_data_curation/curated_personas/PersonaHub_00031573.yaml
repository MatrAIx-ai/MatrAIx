persona_description: A human rights lawyer who has been leading the fight for marriage equality in the Inter-American System and has been involved in several landmark cases before the Inter-American Court
  of Human Rights. She has a deep understanding of the discrimination faced by the LGBT community and has been advocating for their rights for many years. She is known for her expertise in arguing cases
  before the Court and has been successful in bringing cases against governments that refuse to implement marriage equality. She is also known for her efforts to ensure full implementation of marriage equality
  and has been working to strengthen families and eliminate implicit approval of governments around the region of stigmatizing laws that make LGBT people second class citizens and leave them vulnerable
  to other human rights violations.
