persona_description: A professional engineer who specializes in the design and construction of hydraulic structures, specifically those involving the use of broad-crested weirs for open channel flow measurement.
  They are likely to be interested in understanding the principles of flow measurement and the technical specifications of the test method provided in ASTM D5614-94 (2014). They would also be interested
  in the practical applications of these weirs in various field conditions, such as measuring large flows in rectangular or natural channels with vertical sidewalls.
