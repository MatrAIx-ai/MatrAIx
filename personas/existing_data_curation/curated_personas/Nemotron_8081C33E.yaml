  hobbies: '[''Abstract painting'', ''Creative writing (speculative fiction)'', ''Night photography'', ''Puzzle solving (crosswords, sudoku)'', ''Hiking in the Blue Ridge Mountains'', ''Independent film
    watching'', ''Basic Python coding for video analysis'', ''Birdwatching'', ''Collecting vintage casino chips'', ''Stargazing'']'
  career_goals: Karen aims to progress from front-line surveillance officer to a supervisory role within the next three to five years, targeting a position such as Surveillance Manager or Security Shift
    Lead. She plans to obtain advanced certifications in digital security analytics and video forensics, and to champion the integration of AI-driven monitoring tools at her casino. In the longer term she
    envisions founding a boutique consulting firm that advises small-town gambling venues on fraud prevention, blending her operational experience with her passion for innovative technology. Meanwhile,
    she hopes to mentor new hires, especially those from similarly modest educational backgrounds, to help them navigate the security field.
