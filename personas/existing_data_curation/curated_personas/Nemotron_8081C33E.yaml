personas:
  professional: Karen Daggett, a 30‑year‑old casino surveillance officer in Catawba County, blends razor‑sharp pattern‑spotting on CCTV with an artist’s eye for nuance, using creative, unconventional tactics
    while drafting succinct incident reports and positioning themselves for a future as a surveillance manager who will champion AI‑driven analytics, and they often sketch new detection concepts during
    quiet night‑shifts.
  sports: Karen Daggett hikes the Blue Ridge trail network on weekends, is a member of the Catawba County Trailblazers running club, follows the Charlotte Hornets for basketball excitement, and alternates
    between brisk trail runs in spring and cross‑country skiing trips to the nearby Snowshoe Mountain during winter, using these activities to balance the sedentary demands of surveillance work, and they
    consider each trek a mental reset after a shift in the casino.
  arts: Karen Daggett’s artistic world is colored by abstract inspirations from Wassily Kandinsky and the splatter energy of Jackson Pollock, their night‑photography echoes Ansel Adams’ celestial compositions,
    while their speculative‑fiction storytelling nods to Ted Chiang and the indie film scene at the Duke Energy Center, where they regularly screen avant‑garde works by emerging directors like Alex Ross
    Perry.
  travel: Karen Daggett prefers off‑the‑beaten‑path trips that combine night‑sky photography with low‑key adventure, having captured the aurora in Iceland, trekked the Scottish Highlands, and yearning to
    visit the Atacama Desert for its crystal‑clear stargazing, all while budgeting for short weekend drives to Asheville’s art districts and using spontaneous planning over rigid itineraries, and they often
    map out star‑aligned routes using open‑source astronomy apps.
  culinary: Karen Daggett enjoys simple but flavorful meals, favoring grilled trout with rosemary and lemon, a hearty quinoa and roasted root‑vegetable salad with kale, and the occasional southern comfort
    dish of pulled pork with collard greens, while their cooking skill is intermediate, often experimenting with sous‑vide for precise texture, and they relish sipping Ethiopian coffee while sketching new
    painting concepts.
  core: Karen Daggett, a 30‑year‑old surveillance officer with an imaginative mind, juggles night‑photography, abstract painting, and puzzle‑solving, channeling both analytical precision and artistic spontaneity
    into a career path aimed at AI‑enhanced security leadership, and they view each new tech challenge as a canvas.
background:
  cultural: Karen grew up in Newton, a small town in Catawba County, North Carolina, immersed in a Southern Appalachian culture that values community, self-reliance, and modest hospitality. Her family's
    roots trace back to generations of working-class residents who took pride in local traditions—county fairs, church gatherings, and home-cooked Southern cuisine such as barbecue and fried chicken. While
    raised in a Methodist environment, she now identifies as culturally secular, though she respects the region's emphasis on family cohesion and personal responsibility. The proximity to the Catawba River
    and the nearby Blue Ridge foothills fostered an early appreciation for nature, which continues to shape her leisure activities. At the same time, her employment at a casino exposed her to the fast-paced,
    regulated world of gambling, blending traditional Southern sensibilities with the modern, technology-driven entertainment industry.
attributes:
  skills: '[''CCTV video analysis'', ''Behavioral profiling'', ''Fraud detection in gambling'', ''Security protocol enforcement'', ''Crisis response & de-escalation'', ''First aid & CPR'', ''Physical patrol
