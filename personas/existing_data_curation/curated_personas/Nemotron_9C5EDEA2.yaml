personas:
  professional: Adam Parris is a retired structural engineer who channels his methodical engineering background and data‑modeling expertise into mentoring engineering students, writing technical articles,
    and advising senior‑center renovation projects, balancing a love for structure with a relaxed, flexible approach to obligations.
  sports: Adam Parris enjoys low‑impact hiking on the Wasatch trails with the Wasatch Trail Hikers Club, follows the Utah Jazz and Real Salt Lake with occasional game attendance, and participates in a senior
    walking group that meets weekly, reflecting a steady, community‑oriented approach to fitness.
  arts: Adam Parris builds scale model airplanes in his workshop while listening to the Utah Symphony and classic jazz records by Miles Davis, attends community theater productions of Thornton Wilder's
    "Our Town," and collects vintage engineering sketches by R. Buckminster Fuller, weaving technical precision with artistic appreciation.
  travel: Adam Parris prefers short, purposeful road trips to nearby national parks such as Zion and Bryce Canyon, enjoys occasional visits to family in Florida, and harbors a long‑standing wish to explore
    the historic streets of Edinburgh, balancing meticulously planned itineraries with spontaneous wildlife‑spotting detours.
  culinary: Adam Parris favors wholesome, garden‑fresh meals like roasted trout with sage, quinoa pilaf with wild mushrooms, and Sunday pot roast with rosemary‑infused gravy, confidently cooks at a moderate
    skill level using home‑grown herbs, and delights in a weekly brunch at a local bistro for a slice of apple‑crumble pie.
  core: Adam Parris, an 81‑year‑old retired engineer, blends disciplined curiosity with a relaxed love for solitary crafts, community mentorship, and low‑key adventure, all while occasionally misplacing
    glasses and forgetting to water a cactus.
background:
  cultural: Born in 1944, Adam grew up in post‑war America as part of the Silent Generation. His upbringing emphasized practicality, self‑reliance, and community responsibility. Moving to Salt Lake City
    in his adulthood, he absorbed the region’s appreciation for the outdoors and a culture that values modesty and cooperation. While not overtly religious, he respects the local traditions and often participates
    in neighbourhood gatherings that emphasize mutual support and harmony.
