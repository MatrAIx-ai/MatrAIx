personas:
  professional: A diligent office clerk with a budding eye for design, Ariel Brown leverages her proficiency in Microsoft Office, QuickBooks, and Canva to streamline administrative tasks while curating
    modest visual content for Enid’s art workshops, balancing meticulous organization with a curiosity for creative problem‑solving that they apply to everyday office challenges.
  sports: An outdoor‑oriented sports enthusiast, Ariel Brown hikes the trails of Almena Lake with the Enid Outdoor Club in spring, follows the Oklahoma City Thunder and the Oklahoma Sooners football team
    on game days, and volunteers as a timekeeper for the Enid High School Buffaloes basketball league during the winter season, and they enjoy joining community 5K runs when the weather permits.
  arts: A reflective art lover, Ariel Brown spends weekends sketching watercolor studies of Monet’s lily ponds, curates Instagram posts featuring Annie Leibovitz‑inspired portraits of Enid’s fairgrounds,
    and discusses Sufjan Stevens’ latest album in her modest online blog while attending exhibitions by local painter Liza Cunningham at the Enid Art League, and they often exchange ideas with fellow volunteers
    during workshops.
  travel: A detail‑oriented traveler, Ariel Brown plans her trips in a spreadsheet, prefers immersive cultural getaways over crowded resorts, has visited Santa Fe for its vibrant art scene and Austin’s
    live‑music bars, and dreams of strolling the Uffizi galleries in Florence while budget‑ing each adventure through her high‑yield savings account, and they always pack a sketchbook for inspiration.
  culinary: A budding home chef, Ariel Brown enjoys experimenting with quinoa‑and‑roasted‑beet salads, mastering chicken fried steak with a crisp corn‑bread crust, and occasionally tackling birria tacos
    seasoned with ancho chilies, all while relying on fresh farm‑stand rosemary and goat cheese to elevate her modest kitchen creations, and they habitually listen to podcasts while sautéing.
  core: An organized yet creatively curious 24‑year‑old, Ariel Brown balances meticulous spreadsheet budgeting with a habit of late‑night watercolor sessions, occasional procrastination on certification
    coursework, and they love solitary hikes that recharge her modest Midwestern spirit.
background:
  cultural: Ariel is a white woman raised in Enid, Oklahoma, a small‑city environment rooted in Midwestern values of hard work, modesty, and community involvement. Her upbringing emphasized reliability,
    respect for tradition, and participation in local events such as high‑school sports games and county fairs. While her community has a strong Christian heritage, Ariel’s college exposure and personal
    curiosity have broadened her worldview, fostering an appreciation for diverse artistic expressions and progressive ideas. She balances the region’s emphasis on self‑reliance with a collaborative spirit,
    often supporting neighborhood initiatives and local charities. This cultural mix shapes her pragmatic approach to work and her desire to enrich her town’s cultural life through arts‑focused projects.
attributes:
  skills: '[''Data entry'', ''Document management'', ''Scheduling and calendar coordination'', ''Microsoft Office Suite (Word, Excel, Outlook) proficiency'', ''Google Workspace (Docs, Sheets, Slides) proficiency'',
    ''Basic bookkeeping using QuickBooks'', ''Customer service and front‑desk communication'', ''Research and information gathering'', ''Basic graphic design using Canva or Adobe Spark'', ''Digital photography
    fundamentals'', ''Social media content curation for small organizations'']'
  hobbies: '[''Visiting local art galleries and museum exhibitions'', ''Sketching and watercolor painting'', ''Digital photography of Oklahoma landscapes'', ''Reading contemporary fiction and art‑history
    books'', ''Exploring new coffee shops and trying unique brews'', ''Cooking and experimenting with international recipes'', ''Hiking and nature walks in nearby state parks'', ''Attending small‑group
    book clubs or craft circles'', ''Volunteering for community art events (e.g., Enid Art League workshops)'']'
  career_goals: In the short term, Ariel aims to obtain an administrative professional certification and deepen her Excel and project‑management skills through online courses, positioning herself for an
    office‑manager or administrative‑supervisor role within a midsized organization. Mid‑term, she wants to transition into a position that blends her organizational strengths with her passion for the arts—such
    as an arts‑administration coordinator for a local gallery, museum, or nonprofit cultural program—where she can oversee event planning, volunteer coordination, and outreach. Ultimately, Ariel envisions
    creating a community‑focused art space or workshop series in Enid, leveraging her administrative expertise to support emerging local artists and foster creative learning opportunities.
