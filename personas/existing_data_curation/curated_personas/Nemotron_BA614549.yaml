  career_goals: Timothy aspires to pursue a career that blends his love for structured problem‑solving with his hands‑on interests. He aims to earn a high school diploma with a strong emphasis on mathematics
    and science, then attend a university program in mechanical engineering. He envisions working in the automotive industry, designing efficient vehicle systems, or becoming a certified automotive technician.
    Long‑term, he hopes to lead a team of engineers or run his own garage where he can mentor younger apprentices. He also expresses a desire to give back to his community by organizing youth development
    programs that teach practical skills and teamwork.
