  career_goals: Carl aims to move from his current order clerk position to a logistics coordinator role within the next two to three years. He plans to complete a bachelor's degree in Business Administration
    or Supply Chain Management, leveraging his practical experience to qualify for an operations manager position at a regional distribution center. Long‑term, he hopes to launch a small e‑commerce venture
    that sells locally sourced products, combining his curiosity for new ideas with his knack for practical execution. He also values mentoring newer employees and contributing to community workforce development
    programs.
