    User 1: That''s awesome! Do you have any other hobbies or interests?

    User 2: I also own a cupcake business.

    User 1: Oh, that''s so cool! What kind of cupcakes do you make?

    User 2: I make all kinds of cupcakes, but my favorite are chocolate chip.

    User 1: Those sound delicious! Do you ever sell them at the diner?

    User 2: I do sometimes, but I mostly sell them online.

    User 1: That''s really cool! I''m sure they''re a hit.

    User 2: Thanks! I''m glad to hear you think so.

    User 1: So, what else do you like to do?

    User 2: I love to sing in the shower.

    User 1: Oh, that''s interesting! What kind of music do you like to sing?

    User 2: I like to sing all kinds of music, but my favorite is country music.

    User 1: That''s great! I love country music too.

    User 2: Oh, really? That''s awesome! We should totally sing together sometime.

    User 1: That would be so much fun! I''d love to.

    User 2: Great! We''ll have to make it happen.

    User 1: Definitely! So, what are you doing for the rest of the day?

    User 2: I''m not sure yet. What are you doing?

    User 1: I''m not sure either. Maybe we could hang out?

    User 2: That sounds like fun! I''d love to.

    User 1: Great! I''ll pick you up at 7pm.

    User 2: Sounds good! See you then!'
