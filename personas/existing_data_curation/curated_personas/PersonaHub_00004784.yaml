persona_description: A healthcare professional with expertise in otolaryngology and audiology. They are well-versed in the diagnosis, treatment, and management of hearing disorders, including the management
  of wax impaction. They are familiar with the various methods of cerumen removal, including mechanical and softener-based methods, and are skilled in the use of otoscopy to diagnose hearing loss associated
  with cerumen. They are also aware of the economic implications of different treatment options and are able to provide evidence-based justification for the effectiveness of various methods. They are compassionate
  and patient, and are skilled in providing support and counseling to patients and their families.
