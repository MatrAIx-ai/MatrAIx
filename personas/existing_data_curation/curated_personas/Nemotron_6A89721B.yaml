  career_goals: Driven by his blend of curiosity and practicality, Morris aims to ascend to a senior leadership role within the financial services firm, such as Regional Sales Director or Head of Institutional
    Sales, where he can shape sales strategy while maintaining data‑driven rigor. He aspires to build a specialty practice in sustainable commodity financing, integrating ESG criteria into client solutions.
    Over the next five years, he plans to deepen his expertise in fintech platforms, earn certifications like Chartered Financial Analyst (CFA) and Certified Financial Planner (CFP), and mentor junior sales
    agents to foster a collaborative team culture. He also envisions establishing a charitable fund focused on financial literacy for underserved youth in San Diego County, aligning his compassion with
    his professional success. Ultimately, Morris seeks a balanced career that delivers strong revenue growth, thought‑leadership recognition, and meaningful community impact.
