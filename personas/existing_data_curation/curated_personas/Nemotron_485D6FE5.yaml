personas:
  professional: Rashod Starks, a 59‑year‑old eligibility interviewer with three decades of experience navigating California's public assistance programs, blends meticulous regulatory expertise, a pragmatic
    curiosity about policy shifts, and a sociable, community‑focused communication style to train staff, improve client outcomes, and pursue a senior supervisory role.
  sports: Rashod Starks, an enthusiastic participant in the local senior basketball league and a regular hiker of the Sierra foothills, cheers for the Fresno State Bulldogs football team and follows the
    Golden State Warriors, combining weekly games, trail walks, and community sports events to stay fit and socially engaged.
  arts: Rashod Starks, a choir member at his church and a lifelong jazz enthusiast, frequently shares stories behind the music of Miles Davis, John Coltrane, Aretha Franklin, and Nina Simone while curating
    playlists for community gatherings, letting the rhythms shape his storytelling and advocacy.
  travel: Rashod Starks, who loves weekend hikes in the Sierra National Forest, dreams of a pilgrimage to New Orleans for its vibrant jazz scene, has toured historic sites in Washington DC, and plans modest
    road trips to California’s coastal towns with his church group, balancing a love of nature with cultural immersion.
  culinary: Rashod Starks, an avid backyard gardener who harvests tomatoes, peppers, and basil, prepares soulful dishes such as collard greens simmered with smoked ham hocks, honey‑buttered cornbread, and
    peppered tomato stew that he proudly serves at church potlucks, reflecting his deep‑rooted culinary traditions.
  core: Rashod Starks, a meticulous yet worry‑prone community champion who juggles choir rehearsals, senior basketball games, gardening, and policy advocacy, often over‑drinks coffee to stay alert while
    humming classic soul tunes, embodies a pragmatic curiosity tempered by heartfelt sociability.
background:
  cultural: Rashod grew up as the eldest of three children in Fresno’s historically Black neighborhoods during the post‑civil‑rights era, an experience that ingrained in him a deep sense of resilience and
    community pride. His family’s traditions—Sunday church services, shared meals of collard greens and cornbread, and storytelling about ancestors—have shaped his cultural identity. He actively participates
    in local African‑American cultural events, such as the Juneteenth parade and the Fresno Black History Month program, where he helps organize panels on social equity. Rashod values the mentorship he
    received from older community leaders and now mentors younger Black professionals entering public service. His cultural background informs his compassionate approach to client interactions, as he understands
    the systemic barriers many low‑income families face. He also draws inspiration from African‑American literature and music, which reinforce his commitment to advocacy and community uplift.
attributes:
  skills: '[''Eligibility Determination'', ''Regulatory Compliance'', ''Interview Conduct'', ''Conflict De-escalation'', ''Data Management'', ''Report Writing'', ''Process Improvement'', ''Public Speaking'',
