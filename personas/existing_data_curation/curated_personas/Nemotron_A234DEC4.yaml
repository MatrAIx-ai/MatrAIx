personas:
  professional: Samantha Bourgeois, a 16‑year‑old high‑school student, blends her practical knack for DIY electronics, beginner‑level Python and Arduino skills, and a strategic mindset sharpened by debate
    and chess into a budding engineer who tackles projects with organized curiosity, balancing innovative ideas with reliable execution while they dream of future leadership in sustainable product design.
  sports: Samantha Bourgeois fuels her fitness routine with weekend hikes on the nearby Greenway Trail, weekly rides with the community biking club, occasional pick‑up soccer games, and they avidly support
    the local high school varsity soccer team as well as the NBA’s Golden State Warriors during the season.
  arts: Samantha Bourgeois channels her artistic side through landscape photography inspired by Ansel Adams, sketches of prototype ideas, a love for sci‑fi storytelling from authors like Isaac Asimov and
    Neil Gaiman, and they enjoy the ambient scores of video‑game composer Austin Wintory.
  travel: Samantha Bourgeois prefers low‑cost adventure trips that combine photography and hiking, having explored Yosemite National Park and the Canadian Rockies on school excursions, and they dream of
    a future solo backpacking journey through the Scottish Highlands.
  culinary: Samantha Bourgeois, a novice cook, often whips up quick veggie stir‑fry with broccoli, bell peppers, and soy sauce, perfects avocado toast topped with radish slices, experiments with smoothie
    bowls blending banana, spinach, and almond butter, and they still savor the occasional ramen from the local noodle shop.
  core: Samantha Bourgeois is a curious yet competitive teen who balances a love for tinkering, strategic games, and sustainable design with a penchant for late‑night coding marathons, and they occasionally
    indulge in impulse splurges on limited‑edition merch.
background:
  cultural: Samantha grew up in Lynnfield, a suburban town in Essex County, Massachusetts, surrounded by New England’s historic colonial heritage and a strong emphasis on education and community involvement.
    Her family, bearing the French‑origin surname Bourgeois, maintains a blend of traditional American customs—such as celebrating Thanksgiving, Fourth of July parades, and Sunday family meals—and occasional
    French‑Canadian traditions like holiday pastries and bilingual phrases. The region’s outdoorsy culture encourages her love of hiking and biking, while the local school environment exposes her to a diverse
    peer group and extracurricular opportunities. These influences shape her practical outlook, competitive spirit, and appreciation for both innovation and established community values.
