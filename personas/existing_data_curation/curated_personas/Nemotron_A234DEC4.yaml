  career_goals: Samantha aims to pursue a career that blends creativity with practical engineering, such as industrial design or mechanical engineering, with a focus on sustainable technology. She plans
    to enroll in a STEM‑focused high school program, followed by a college degree in engineering or product design. In the longer term, she hopes to work on innovative consumer products or join a tech startup
    where she can apply her coding and hardware skills, eventually moving into a leadership role that lets her mentor younger students and promote hands‑on learning.
