  hobbies: '[''Reading historical non-fiction'', ''Philosophy'', ''Birdwatching'', ''Home automation programming'', ''Scale model building'', ''Gentle yoga'', ''Mindfulness meditation'']'
  career_goals: Joseph aspires to become a board-certified Orthopaedic Manual Physical Therapist within three years. He wants to integrate technology into his practice by developing a tele-rehab program
    that serves patients with anxiety-related musculoskeletal complaints, aligning with his interest in the mind-body connection. He hopes to open a small, low-throughput clinic in a quiet Orlando office
    allowing a limited caseload, which minimizes social fatigue while providing high-quality, personalized care. Long-term, he aims to contribute to research on stress-induced muscle tension and publish
    his findings in peer-reviewed journals.
