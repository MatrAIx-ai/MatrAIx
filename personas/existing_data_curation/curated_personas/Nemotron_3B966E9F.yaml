personas:
  professional: Joseph Lamura is a licensed physical therapist specializing in orthopaedic manual therapy and functional rehabilitation; they apply a methodical, evidence‑based approach to each patient
    while favoring quiet, one‑on‑one sessions that suit their preference for solitude and patience.
  sports: Joseph Lamura is a low‑key fitness enthusiast who practices gentle yoga and swims at the Orlando Aquatics Center for rehabilitation, supports the Orlando Magic and Orlando City SC, and plays occasional
    singles tennis with a local club that fits their solitary style.
  arts: Joseph Lamura is a quiet creative who builds scale model ships and aircraft, enjoys listening to Beethoven and John Williams while reading historical nonfiction, and attends occasional performances
    at the Dr. Phillips Center featuring artists like Yo‑Yo Ma and Lin‑Manuel Miranda.
  travel: Joseph Lamura is a meticulous traveler who prefers low‑stimulus destinations, having explored the Everglades and the historic streets of Edinburgh, and who dreams of bird‑watching in Iceland’s
    fjords while always planning trips months in advance to minimize unexpected stress.
  culinary: Joseph Lamura is a modest home cook who loves grilling salmon with fresh dill, whipping up quinoa salads with roasted sweet potatoes, and occasionally indulging in a bowl of homemade ramen for
    comfort, while relying on a balanced mix of casual takeout from local seafood shacks and carefully measured pantry staples.
  core: Joseph Lamura is a methodical, solitude‑preferring physical therapist who channels persistent worry into precise patient care, smart‑home tinkering, and a quiet lifestyle.
background:
  cultural: Joseph was born and raised in suburban Orlando, Florida. As a white American, his cultural upbringing blends typical middle-class Southern hospitality with the eclectic, multicultural environment
    of Central Florida. He attended public schools where community service and teamwork were emphasized, shaping his cooperative nature. Family gatherings often featured traditional American meals and outdoor
    recreation, fostering his appreciation for nature and quiet leisure. The regional emphasis on hospitality and a relaxed lifestyle informs his gentle, patient-centered approach in therapeutic work.
attributes:
  skills: '[''Manual therapy'', ''Joint mobilization'', ''Soft tissue techniques'', ''Exercise prescription'', ''Outcome measurement'', ''Electronic health record management'', ''Telehealth delivery'',
