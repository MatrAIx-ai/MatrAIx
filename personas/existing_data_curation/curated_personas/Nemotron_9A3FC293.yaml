personas:
  professional: Ashley Sneed, a retired engineer and former STEM educator, leverages their analytical mindset and methodical planning to coordinate community heritage projects, mentor high‑school STEM students,
    and lead hands‑on workshops on drafting, basic computing, and practical crafts, always delivering on commitments with reliable precision.
  sports: Ashley Sneed participates in a senior walking group that meets three times a week, enjoys light gardening as low‑impact exercise, follows the Detroit Tigers and Detroit Lions with fellow community
    members, and occasionally attends bridge tournaments at the local senior recreation center, treating the activity as both mental and social fitness.
  arts: Ashley Sneed immerses themselves in quilting, creating traditional patterns inspired by the works of Barbara Brackman, reads historical fiction from authors like Philippa Gregory, and enjoys the
    folk art of Grandma Moses while listening to acoustic folk duo The Milk Carton Kids during their crafting sessions.
  travel: Ashley Sneed prefers organized, slow‑paced travel, joining Road Scholar tours that explore historic sites such as Colonial Williamsburg, the Blue Ridge Parkway, and a gentle river cruise on the
    Mississippi, while budgeting carefully to fit their fixed income and using a travel companion for assistance.
  culinary: Ashley Sneed delights in cooking garden‑to‑table meals, crafting fresh heirloom tomato salsa, roasting home‑grown beans with garlic and basil, and baking a classic apple crumble with a flaky
    crust, relying on their intermediate cooking skills to blend seasonal produce with comfort‑food staples.
  core: Ashley Sneed is a structured, community‑driven octogenarian who blends analytical precision with sociable generosity, tending their garden, guiding youth, and chronicling local history while navigating
    the quirks of senior life with practical flair.
background:
  cultural: Ashley was raised in a small Midwestern town in Iowa within a family of German and Irish ancestry. Her upbringing in a Protestant (Methodist) community emphasized punctuality, self‑reliance,
    community service, and strong family bonds. These Midwestern values of practicality, modesty, and neighborly cooperation continue to shape her worldview and daily interactions.
