  career_goals: Although retired, Ashley aims to leave a lasting legacy by documenting local history, mentoring high‑school students in STEM, and expanding her volunteer work at the senior center. She aspires
    to master digital photography to capture family moments and community events, and to contribute her knowledge to a regional heritage project that preserves the stories of Dysart’s early settlers.
