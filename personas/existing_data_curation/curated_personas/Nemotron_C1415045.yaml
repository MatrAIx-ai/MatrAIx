  hobbies: '[''Watercolor painting'', ''Visiting art galleries'', ''Reading historical fiction'', ''Book club participation'', ''Quilting'', ''Gardening'', ''Hiking local trails'', ''Volunteering at senior
    center'', ''Organizing neighborhood potlucks'', ''Attending community theatre'', ''Enjoying local music festivals'']'
  career_goals: Monica aims to transition into a mentorship and consulting role as she approaches retirement, sharing her decades of retail leadership with emerging small‑business owners in Mitchell. She
    hopes to develop a community arts program that partners local shops with artists, creating rotating in‑store exhibitions and workshops. Additionally, she aspires to volunteer as a trainer for youth
    employment initiatives, helping the next generation develop reliable work habits and customer‑service skills.
