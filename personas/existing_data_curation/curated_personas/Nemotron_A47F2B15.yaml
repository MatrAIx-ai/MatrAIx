  career_goals: Patricia aims to maintain top academic performance throughout high school and to earn placement in competitive STEM and arts programs, such as summer robotics camps and museum studies workshops.
    She aspires to win regional science fairs and art competitions, leveraging her interdisciplinary strengths. In the long term, she envisions pursuing an undergraduate degree that blends technology and
    the humanities—potentially in fields like Human‑Computer Interaction, digital curation, or user‑experience design—so she can create innovative museum exhibits or interactive media that challenge conventional
    narratives. Her ultimate ambition is to lead projects that fuse analytical rigor with creative expression, positioning herself as a pioneering curator or designer who values unconventional thinking.
