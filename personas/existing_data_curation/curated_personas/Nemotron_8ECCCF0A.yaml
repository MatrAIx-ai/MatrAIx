personas:
  professional: Kelli Greenwell, a seasoned home‑economics veteran who seamlessly blends a pragmatic green thumb with a sprightly curiosity, they spend their days tending the garden, repairing fences, and
    leading informal quilting workshops at the senior center, all while casually offering neighborly advice that reflects a competitive streak to be the go‑to community handyman.
  sports: Kelli Greenwell enjoys leisurely walks with their dog, follows the Arkansas Razorbacks football team and the Little Rock Rangers minor‑league baseball club on TV, and they participate in the Faulkner
    County Senior Walking Club that meets each Saturday for light cardio strolls through local trails.
  arts: Kelli Greenwell, an avid lover of classic country sounds from Patsy Cline and Willie Nelson, hums along to old Hollywood staples starring Cary Grant and Audrey Hepburn while they quilt, and cherishes
    the works of illustrator Mary Cassatt, which inspire their own stitching patterns.
  travel: Kelli Greenwell prefers short, low‑key road trips—recently visiting Hot Springs National Park, touring the historic Little Rock Central High School museum, and dreaming of a leisurely drive to
    the Hill Country vineyards in Texas for a family reunion; they always plan just enough time to return for their weekly bridge game.
  culinary: Kelli Greenwell, a master of Southern comfort cooking, whips up perfectly golden fried chicken, flaky buttermilk biscuits, and sweet pecan pie using garden‑fresh tomatoes, home‑grown herbs,
    and locally harvested pecans, often experimenting with new recipes that incorporate fresh zucchini blossoms or peach preserves, and they proudly enter each finished pie into the county fair’s competition.
  core: Kelli Greenwell balances a competitive curiosity for perfect pies and garden photos with a relaxed, sometimes disorganized approach to daily chores, often losing track of receipts but never missing
    a bridge game, and they delight in reminiscing about family history while occasionally forgetting to water the lilies.
background:
  cultural: Kelli’s cultural background is rooted in the Southern tradition of small‑town Arkansas, specifically Conway in Faulkner County. As a lifelong white resident, she grew up amid Southern hospitality,
    church‑centered community life, and a strong emphasis on family gatherings, potluck meals, and county‑fair celebrations. These influences cultivated a pragmatic, self‑reliant mindset blended with a
    quiet openness to new ideas—a blend shaped by the region’s conservative values, respect for elders, and the evolving cultural landscape she has witnessed over eight decades.
