  hobbies: '[''Gardening'', ''Southern cooking'', ''Knitting/Crocheting'', ''Quilting'', ''Reading mystery novels'', ''Bridge'', ''Bingo'', ''Bird‑watching'', ''Walking the dog'', ''Church choir'', ''Classic
    country music'', ''Old Hollywood movies'']'
  career_goals: Kelli’s ambitions are centered on staying active, independent, and connected. She hopes to finish a detailed family genealogy that she can share with her grandchildren, and to teach her
    quilting techniques in a class at the local senior center. Driven by her curiosity and a competitive streak, she wants to master digital photography enough to produce a seasonal garden album and to
    win the county fair’s best pie contest. She also plans to volunteer regularly at the Faulkner County food pantry, take short weekend road trips to visit nearby historic sites, and, if her health permits,
    join her daughter for a family reunion in Texas next summer.
