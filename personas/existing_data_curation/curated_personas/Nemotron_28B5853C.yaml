personas:
  professional: Carl Sims, a retired home‑maintenance specialist turned community volunteer, leverages their hands‑on plumbing, electrical, and carpentry expertise to lead senior‑center tech workshops,
    organize neighborhood safety patrols, and preserve local oral histories, all while applying their methodical planning and talkative nature to keep projects on schedule.
  sports: Carl Sims, an avid supporter of the Dallas Cowboys and the local Seguin High School football team, spends Saturday afternoons cheering from the bleachers, joins their friends for weekly bass fishing
    trips on Lake Travis, and participates in the town’s amateur softball league, where they balance competitive spirit with a love for community camaraderie.
  arts: Carl Sims, a devotee of gospel hymns and classic blues, frequently sings in their church choir, spins vinyl records from B.B. King and Aretha Franklin in their living room, attends the Hill Country
    Blues Festival, and enjoys occasional community theater productions that celebrate regional storytelling.
  travel: Carl Sims, who plans trips with their wife around both family roots and culinary curiosity, has explored Savannah’s historic squares, savored Creole cuisine in New Orleans, and dreams of tracing
    ancestral pathways to Accra, while also enjoying weekend drives to the Texas Hill Country vineyards.
  culinary: Carl Sims, a passionate home cook, transforms garden‑grown tomatoes and fresh basil into robust marinara, layers Southern comfort staples like fried chicken and collard greens with Tex‑Mex twists
    such as chili‑infused cornbread, and regularly experiments with smoked paprika, cumin, and jalapeños to keep family meals lively.
  core: Carl Sims blends meticulous organization with a talkative, community‑focused spirit, using gardening, cooking, and volunteer work to anchor their life while battling a persistent worry about health
    and finances.
background:
  cultural: Carl is an African‑American born and raised in the Greater Houston area before moving to Seguin in his twenties. He grew up during the later years of the Civil Rights era, shaping his appreciation
    for community solidarity and activism. His family traditions blend Southern Black cuisine, gospel music, and storytelling, passed down through generations that migrated from the Deep South to Texas.
    He actively participates in local Black cultural events, such as Juneteenth parades and church gatherings, and takes pride in preserving his family’s oral history and heritage.
