  hobbies: '[''Gardening (vegetables and herbs)'', ''Cooking (Southern and Tex‑Mex fusion)'', ''Genealogy research'', ''Listening to gospel and blues music'', ''Fishing at Lake Travis'', ''Poker nights
    with friends'', ''Church choir and community events'', ''Attending high school football games'']'
  career_goals: Although retired from full‑time work, Carl aims to deepen his involvement in the local community. He plans to volunteer as a mentor for the senior center’s technology workshops, lead a neighborhood
    safety committee, and contribute to preserving the history of the African‑American community in Seguin through oral‑history projects. He also hopes to complete a short certification in CPR/first aid,
    author a memoir of his life experiences, and travel with his wife to visit ancestral sites in the American South and West Africa.
