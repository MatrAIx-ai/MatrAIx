  career_goals: Despite currently being out of the workforce, Pete aims to leverage his practical expertise into a part‑time handyman consultancy serving his local community, with a focus on high‑quality,
    organized service. He wants to complete his unfinished college coursework in business administration to formalize his knowledge and eventually secure a contract‑based role in project coordination for
    a regional home‑improvement firm. Additionally, he aspires to mentor younger apprentices in his area, sharing his disciplined work ethic while building a modest supplemental income that ensures financial
    stability and independence.
