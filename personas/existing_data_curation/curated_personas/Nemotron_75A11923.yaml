  career_goals: Roseella aims to advance from her current administrative assistant role to an office manager position within the next three years, overseeing a small team and driving efficiency initiatives.
    She plans to earn a CAPM (Certified Associate in Project Management) certification and complete an associate’s degree in Business Administration to strengthen her managerial credentials. Long‑term,
    she hopes to transition into arts administration, possibly as a program coordinator for a local community arts center, allowing her to blend her organizational expertise with her love for art. She also
    aspires to mentor new administrative staff and develop a comprehensive workflow improvement program that could be shared with nonprofit organizations in her county.
