personas:
  professional: Roseella Lamb is an administrative assistant whose mastery of Microsoft Office, Google Workspace, and scheduling platforms like Calendly fuels her knack for orchestrating seamless team calendars,
    travel itineraries, and community events, and she leverages Trello and Asana to streamline workflows while eyeing a CAPM credential and office‑manager role to eventually blend her organizational talent
    with arts administration.
  sports: Roseella Lamb energizes herself with line‑dancing at community gatherings, practices yoga three times weekly, and follows the Atlanta Braves in spring, the Falcons in fall, while playing occasional
    recreational softball with the local ladies’ league.
  arts: Roseella Lamb immerses herself in the arts by strolling through galleries featuring works by contemporary painter Amy Sherald, crafting watercolor landscapes inspired by Monet, throwing pottery
    reminiscent of Bernard Leach, and attending bluegrass performances by The Infamous Stringdusters, all of which shape her identity and leisure.
  travel: Roseella Lamb prefers culturally immersive weekend getaways, planning road trips to Savannah’s historic squares, New Orleans’ jazz festivals, and Asheville’s craft breweries, balancing a modest
    travel budget with a love for exploring Southern culinary traditions and artisanal markets.
  culinary: Roseella Lamb delights in cooking Southern comfort food—shrimp and grits, fried green tomatoes, collard greens, and peach cobbler—using garden‑grown tomatoes, basil, and okra, and she frequently
    experiments by adding quinoa or kale to classic recipes while mastering flaky buttermilk biscuits.
  core: Roseella Lamb is a talkative, art‑loving organizer who blends meticulous planning with spontaneous creativity, often juggling event logistics, watercolor paints, and garden seedlings in the same
    day.
background:
  cultural: Roseella is a White Southern American raised in Pembroke, Georgia, within a close‑knit, church‑oriented community. Her family’s roots trace back to early 20th‑century migrations from the Midwest
    and Appalachia, blending a Midwestern work ethic with the warmth and hospitality characteristic of the South. She values community involvement, family gatherings, and local traditions such as Southern
    cuisine, outdoor recreation, and support for regional arts. While deeply grounded in Southern cultural norms of courtesy and modesty, Roseella is also open to broader cultural experiences, reflecting
    her curiosity and appreciation for diverse ideas.
