personas:
  professional: Jason Kuykendall, a retired carpenter and longtime volunteer firefighter, leverages their methodical woodworking expertise, meticulous budgeting skills, and calm, resilient demeanor to serve
    as a senior advisor on the Rock Rapids town council, where they organize community events and mentor younger volunteers.
  sports: Jason Kuykendall follows the Minnesota Vikings and Iowa Hawkeyes with weekly game‑day gatherings at the senior center, participates in the Rock Rapids Senior Bowling Club, volunteers as timekeeper
    for the local high‑school cross‑country team, and enjoys seasonal fishing on Lake Okoboji as an outdoor sport.
  arts: Jason Kuykendall volunteers backstage in the Rock Rapids community theater, crafting sets with their carpentry skills, enjoys listening to Johnny Cash and The Carter Family, and admires the storytelling
    of playwright August Wilson, finding creative fulfillment alongside their civic duties.
  travel: Jason Kuykendall prefers road trips in their vintage station wagon, planning detailed itineraries that include historic farmsteads in southern Minnesota, a weekend pilgrimage to Gettysburg, and
    frequent visits to their children in Des Moines, balancing a modest travel budget with a love for family reunions.
  culinary: Jason Kuykendall relishes hearty Midwestern fare—home‑cooked cornbread, beef stew slow‑cooked with locally grown root vegetables, and pan‑fried walleye seasoned with cornmeal and fresh dill—yet
    they have a notorious habit of over‑salting the stew when distracted by a phone call.
  core: Jason Kuykendall is a structured, resilient senior who blends meticulous carpentry precision with community leadership, savoring classic country tunes and hearty meals while occasionally over‑cooking
    and splurging on new tools.
background:
  cultural: Jason was raised in the Midwestern heartland of Iowa, a region defined by agricultural roots, neighborly cooperation, and modest, practical values. His family’s background is rooted in the Protestant
    tradition, with regular involvement in a local church that emphasizes community service. The cultural fabric of Rock Rapids—annual county fairs, high school sports, and close‑knit civic organizations—has
    shaped his worldview, fostering a strong sense of responsibility to family, neighbors, and the broader community. He embodies the Midwestern ethos of self‑reliance, quiet resilience, and a deep respect
    for tradition while embracing the social vibrancy of his small‑town environment.
