  career_goals: Although retired from formal employment, Jason aims to remain an active pillar of his community. He aspires to mentor younger volunteers, especially in the local fire department and church
    youth group, and to document his family’s farming history in a memoir for future generations. He seeks to expand his role as a senior advisory member on the Rock Rapids town council, helping shape community
    projects that preserve the town’s heritage while ensuring practical, well‑organized implementation. Maintaining his health, deepening his relationships with his wife and adult children, and traveling
    to visit relatives in neighboring states are also central to his personal ambitions.
