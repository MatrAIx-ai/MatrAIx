personas:
  professional: Joanna Parrish is a seasoned Tallahassee police detective whose thirty-year career in front-line law enforcement has fused meticulous crime-scene documentation, forensic sketch artistry,
    and crisis negotiation into a mentorship role that now bridges policing with community arts initiatives.
  sports: Joanna Parrish is an avid follower of the Florida State Seminoles football team and the Tampa Bay Rays, participates in a senior walking club along the St. Marks River Trail each morning, and
    enjoys friendly pickleball matches at the Tallahassee Recreation Center, while avoiding high-impact sports due to joint concerns.
  arts: Joanna Parrish devotes spare evenings to watercolor painting of Tallahassee wetlands, draws forensic suspect composites for personal interest, volunteers at the local community art center teaching
    basic drawing to children, finds inspiration in the works of Audubon, O’Keeffe, and the folk songs of Bob Dylan, and occasionally attends intimate poetry readings at the River Café where they savor
    the cadence of contemporary spoken word.
  travel: Joanna Parrish prefers meticulously planned road trips that combine cultural immersion and natural observation, such as weekend getaways to Savannah’s historic squares, sunrise bird-watching in
    the Everglades, a yearly pilgrimage to New Orleans for jazz festivals, and a long-standing wish to wander Edinburgh’s medieval alleys, while balancing travel costs against a modest retirement budget
    and family visits.
  culinary: Joanna Parrish enjoys cooking Southern staples like shrimp and grits, peach cobbler, and gator tail stew seasoned with native herbs from their garden, often pairing meals with a glass of sweet
    tea, and has a habit of snacking on pecan pralines while sketching, though they sometimes over-salt dishes in pursuit of bold flavor.
  core: Joanna Parrish blends a detective’s analytical rigor with an artist’s quiet imagination, balancing Southern hospitality and community service with a lifelong curiosity for evidence, beauty, and
    growth.
background:
  cultural: Joanna grew up in a middle-class, Anglo-American family in the Florida Panhandle, later moving to Tallahassee for her career. Her upbringing reflects traditional Southern values of community
    service, hospitality, and respect for local customs, while her education and law-enforcement experience broadened her worldview. She identifies with a Protestant (Methodist) background, participating
    in church-based charity events and regional celebrations such as the Tallahassee City Fair. Her deep roots in the region give her a strong sense of place, yet her intellectual curiosity drives her to
    engage with diverse cultures and ideas, shaping a nuanced, inclusive approach to policing and community involvement.
