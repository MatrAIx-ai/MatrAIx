  career_goals: Approaching retirement, Joanna aims to channel her investigative experience and artistic talent into a senior advisory role that bridges law enforcement and community arts. She envisions
    establishing a police-artist liaison program in Tallahassee, offering forensic sketch workshops and art-therapy sessions for victims and at-risk youth. Additionally, she seeks to earn a certification
    in forensic illustration and to mentor the next generation of officers through formal training curricula. Long-term, she hopes to author a memoir reflecting on the evolution of policing, promote evidence-based
    crime-prevention strategies within the department, and possibly serve on a city council committee focused on public safety and cultural enrichment.
