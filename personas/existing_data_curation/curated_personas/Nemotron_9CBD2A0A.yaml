  hobbies: '[''Abstract painting'', ''Digital photography'', ''Poetry writing'', ''Philosophy reading'', ''Museum visits'', ''Bridge (card game)'', ''Community volunteering'', ''Gardening'', ''Travel to
    art exhibitions'', ''Cooking experimental recipes'']'
  career_goals: Although retired from formal employment, Kelsey aims to become a senior advisor on the Carlstadt Arts Council, where she can shape policies that support emerging artists and foster intergenerational
    collaboration. She plans to curate a traveling exhibition of abstracts created by local seniors, coupled with workshops that merge art‑making with storytelling. Kelsey also aspires to publish a limited‑edition
    book pairing her poetry with her paintings, and to secure a modest endowment that funds a community art studio for low‑income youth. Her competitive spirit drives her to enter regional senior art competitions,
    hoping to set a benchmark for artistic excellence in her age group.
