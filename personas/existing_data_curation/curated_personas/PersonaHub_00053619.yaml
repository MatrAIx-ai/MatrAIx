persona_description: A researcher who is passionate about improving food safety and combating contaminants, particularly in the context of endocrine disrupting chemicals and the cooking of starchy foods.
  They are dedicated to understanding the health risks associated with chemical pollutants in food and working towards solutions to prevent and detect contamination. They are involved in EU-backed research
  and have a background in European food safety, as well as a strong interest in interdisciplinary research and the integration of efforts from across Europe to build a better understanding of endocrine
  disrupting chemicals. They are also interested in contributing to global efforts to address the issue of chemical disruptors and have a background in research, particularly in the fields of physiology,
  chemistry, and toxicology.
