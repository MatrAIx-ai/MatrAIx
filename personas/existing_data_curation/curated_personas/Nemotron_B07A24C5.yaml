  career_goals: Leonora aims to move from her current production worker role to a supervisory position within the next three to five years. She plans to earn a Six Sigma Green Belt certification and enroll
    in a community college manufacturing technology program to deepen her technical knowledge. Her long‑term ambition is to become a plant manager or a continuous‑improvement specialist, where she can combine
    operational expertise with her passion for creative problem‑solving and artistic design. She also hopes to lead cross‑functional projects that integrate aesthetic considerations into product development,
    fostering a workplace culture that values both efficiency and innovation.
