  career_goals: Inspired by his love of space, animals, and helping people, Joshua dreams of becoming an astronaut who explores the cosmos, a marine biologist who protects sea life, or a community firefighter
    who helps neighbors in need. He also enjoys the idea of teaching art to younger kids, combining his creative talents with his desire to support and encourage others.
