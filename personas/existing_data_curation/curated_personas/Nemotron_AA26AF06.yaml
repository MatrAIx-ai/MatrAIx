personas:
  professional: A budding naturalist and imaginative builder, Joshua Stewart channels his curiosity about bugs, rocks, and fossils into detailed LEGO dioramas and precise sketches while volunteering at
    the community library’s story‑time, dreaming of one day designing interactive museum exhibits.
  sports: Joshua Stewart plays forward for the Riverbank Rovers youth soccer team, looks up to Manchester United’s midfield maestros, and spends Saturday afternoons cheering on the local high school football
    squad while encouraging teammates with upbeat chants.
  arts: Joshua Stewart draws inspiration from Hayao Miyazaki’s animated worlds, Dr. Seuss’s whimsical lettering, and the energetic beats of Imagine Dragons, often recreating their characters in his sketchbook
    and sharing his creations at the school art club.
  travel: Joshua Stewart loves day‑trips to Willow Creek State Park to hunt for fossils, dreams of hiking the rim of the Grand Canyon, and hopes to someday explore the Natural History Museum in London’s
    dinosaur gallery, always packing a notebook for new observations.
  culinary: Joshua Stewart favors pepperoni pizza with extra mozzarella, chicken nuggets with ketchup, and enjoys assembling fruit salads with apples, grapes, and strawberries, though their cooking skills
    are limited to sandwich making and microwaving meals.
  core: Joshua Stewart is a curious, art‑loving explorer who builds worlds from LEGO bricks, catalogs nature’s treasures, and navigates school life with a generous, if occasionally scattered, heart.
background:
  cultural: Joshua was raised in Clarksburg, a small town in Cooper County, Missouri, where community gatherings, outdoor recreation, and local traditions are central to daily life. His family celebrates
    typical Midwestern holidays with backyard barbecues, Fourth of July parades, and church potlucks. Though his ancestry includes German and Irish roots, the family identifies with broader American culture,
    emphasizing friendliness, neighborliness, and a strong sense of community service. Joshua often participates in school and church activities that reflect these values, such as neighborhood clean‑up
    days, youth group projects, and local sports leagues.
