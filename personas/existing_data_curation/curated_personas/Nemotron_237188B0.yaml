  career_goals: Arlene aims to progress into a supervisory role, such as Help Desk Team Lead or IT Service Manager, where she can shape supportive processes and mentor junior technicians. She plans to earn
    CompTIA Network+ and ITIL certifications to solidify her technical credibility and process expertise. Long‑term, she envisions a hybrid position that merges technology support with community education,
    perhaps leading a local tech outreach program or developing user‑experience initiatives that prioritize accessibility and mental‑wellness. Balancing ambition with self‑care, she also seeks to establish
    boundaries that protect her emotional health and reduce workplace anxiety.
