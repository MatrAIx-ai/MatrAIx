personas:
  professional: Jose Pontigo, an aspiring digital marketer and community outreach enthusiast, blends bilingual fluency, basic graphic design, and introductory web development to craft engaging social‑media
    campaigns that spotlight local festivals and community‑owned businesses, balancing a relaxed, occasionally chaotic workflow with a pragmatic focus on measurable results.
  sports: Jose Pontigo spends weekend evenings playing pickup soccer in Balboa Park, cheers for the LA Galaxy and the San Diego Wave FC during their matches, and watches the Padres on game nights while
    occasionally joining a salsa‑fit class to stay active.
  arts: Jose Pontigo captures San Diego street scenes on his phone with a candid, Cartier‑Bresson‑inspired eye, dances to reggaeton hits by Bad Bunny and J Balvin at local festivals, and fills his vlog
    with references to sci‑fi novels by Isaac Asimov and visual tributes to contemporary street artists.
  travel: Jose Pontigo loves spontaneous road trips along the Pacific Coast Highway, has already explored Tulum’s beach clubs and the historic streets of Quito, and dreams of backpacking through the Andes
    to attend a traditional Inti Raymi celebration in Peru.
  culinary: Jose Pontigo, a self‑taught home cook, frequently whips up quick ceviche with fresh lime and cilantro in his dorm kitchen, enjoys the crunch of fried empanadas from a downtown food truck, and
    experiments with kimchi tacos whenever his curiosity leads him to blend flavors.
  core: Jose Pontigo is a charismatic, curiosity‑driven dreamer who flits between viral social posts and street‑food cravings, yet often forgets to charge his phone and lives by the mantra that flexibility
    beats rigid planning.
background:
  cultural: Jose is a first-generation Ecuadorian-American raised in a bilingual household. He grew up celebrating traditional Ecuadorian holidays such as Carnaval and Día de los Difuntos, and enjoys family
    recipes like ceviche, fanesca, and empanadas. The values of close family ties, community solidarity, and respect for cultural heritage from his Ecuadorian roots blend with the diverse, individualistic
    atmosphere of Southern California. He actively participates in local Latino community events, maintains strong connections with the Ecuadorian diaspora in San Diego, and often serves as a cultural bridge
    between his heritage and his American surroundings.
attributes:
  skills: '["Bilingual communication (Spanish/English)", "Social media content creation", "Event planning and coordination", "Customer service", "Basic graphic design (Canva, Adobe Spark)", "Introductory
    web development (HTML/CSS)", "Introductory Python scripting", "Community volunteer coordination", "Tutoring and mentorship", "Problem solving"]'
  hobbies: '["Salsa and reggaeton dancing", "Pickup soccer", "Attending live music and cultural festivals", "Exploring food trucks and new cuisines", "Street photography", "Vlogging and short-form video
    creation", "Reading sci-fi and tech articles", "Multiplayer video gaming", "Volunteering at youth community centers", "DIY tech projects"]'
  career_goals: Jose aims to pursue a career in digital marketing and community outreach, leveraging his communication strengths and cultural insight. He plans to enroll in a community college program in
    Marketing Communications, earn certifications in social-media strategy, and eventually secure a role as a social-media manager or brand ambassador for a Latin-x-owned business in San Diego. Long-term,
    he aspires to launch his own boutique event-planning and cultural-promotion agency that highlights Ecuadorian and broader Hispanic culture while providing flexible, people-focused work.
