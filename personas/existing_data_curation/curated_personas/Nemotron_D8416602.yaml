  hobbies: '[''Playing soccer'', ''Cooking Honduran dishes'', ''Attending live music and salsa dancing events'', ''Hiking Bay Area trails'', ''Street photography'', ''Streaming multiplayer video games'',
    ''Mentoring Latinx youth'', ''Creating social‑media content'']'
  career_goals: Sabino aims to climb the retail ladder quickly, targeting a department‑manager role within two years and a store‑manager position by his mid‑twenties. He plans to finish his associate’s
    degree in Business Administration, supplementing his on‑the‑job experience with leadership workshops. Long‑term, he dreams of opening a boutique that blends Central American artisan goods with streetwear,
    leveraging his social‑media savvy to run an online storefront. He is competitive about sales metrics and aspires to be recognized as the top salesperson in his region, using that track record to secure
    funding for his own venture.
