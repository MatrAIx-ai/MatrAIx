personas:
  professional: Sabino Rivera is a 20‑year‑old retail associate who blends upbeat customer interaction with data‑driven sales tactics, leveraging their bilingual fluency and social‑media savvy to drive
    foot traffic while thriving under competitive sales targets.
  sports: Sabino Rivera is a competitive amateur soccer player who captains a local league side, cheers for the San Jose Earthquakes and San Francisco Giants, and carves out weekend hikes up Mount Diablo
    with a biking group, all while balancing a weekly salsa class that keeps their footwork sharp.
  arts: Sabino Rivera fuels their social side by frequenting downtown coffee houses for live‑room acoustic sets featuring artists like The Strokes and Billie Eilish, dancing salsa to classic Latin rhythms,
    and snapping candid street photos that capture spontaneous moments in the Bay Area’s bustling neighborhoods.
  travel: Sabino Rivera mixes spontaneous road trips to nearby coastal towns with meticulously planned hikes to iconic spots like Yosemite, dreaming of a future backpack adventure through the Andes, yet
    their limited budget often pins them to weekend getaways within California.
  culinary: Sabino Rivera loves cooking homemade baleadas and tamales, layering refried beans, cheese, and crispy plantains on corn tortillas, while experimenting with fresh cilantro, lime, and homemade
    salsa, and they proudly showcase these plates on Instagram, though they sometimes neglect proper food safety in their rush to share.
  core: Sabino Rivera is a sociable, competition‑driven retail whiz who balances a love for soccer, spontaneous cooking, and digital hustling, all while battling a habit of last‑minute planning and occasional
    overspending.
background:
  cultural: Sabino was raised in a bilingual Honduran household in the Bay Area. His parents emigrated from Honduras in the early 2000s, bringing with them deep-rooted traditions like celebrating Semana
    Santa, Día de la Independencia (September 15), and the annual Feria de San Isidro. Family meals center around rice, beans, plantains, and homemade tortillas, and the home is infused with the rhythm
    of cumbia and punta music. He identifies as Catholic but balances that with the inclusive, community‑focused values of his upbringing. Sabino stays connected to a vibrant Honduran diaspora in the Sacramento–Davis
    region, participating in cultural festivals, sharing traditional foods, and serving as a bridge between his heritage and his American environment.
attributes:
  skills: '[''Bilingual Spanish-English'', ''Customer service'', ''Sales negotiation'', ''Cash register operation'', ''Inventory management'', ''Visual merchandising'', ''Social media promotion'', ''Basic
