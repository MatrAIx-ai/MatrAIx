persona_description: A healthcare professional with expertise in respiratory infections, particularly aerosol transmission. This persona attended a meeting with WHO officials to present evidence against
  the hypothesis that SARS-CoV-2 could be transmitted through respiratory aerosols. This person is concerned about the responsibility of the WHO in ensuring the health and lives of people and the importance
  of following the precautionary principle in situations where there is a potential risk. This person is also aware of the limitations of current research and the difficulty of studying aerosol transmission,
  but believes that the WHO should have been more cautious in its statements.
