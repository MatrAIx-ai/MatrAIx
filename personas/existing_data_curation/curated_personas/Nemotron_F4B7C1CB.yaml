personas:
  professional: Luis Armenta is a 53-year-old aspiring freelance handyman who leverages a lifetime of DIY repairs, carpentry, and basic electrical aptitude to build a word-of-mouth business, and they are
    driven by a competitive streak yet a relaxed, flexible work ethic that sometimes leads to missed appointments.
  sports: Luis Armenta is a devoted follower of Liga MX, cheering for clubs such as Club América and Tigres while also supporting the local Houston Dynamo, frequently debating match tactics at the neighborhood
    café, and they stay active by playing casual Saturday pick-up soccer at a nearby park.
  arts: Luis Armenta immerses themselves in the sounds of mariachi ensembles and classic rock legends like The Rolling Stones on a vintage radio, regularly attends Third Ward cultural festivals celebrating
    folk music and dance, and they curate a small collection of hand-crafted wooden décor that reflects a blend of traditional and modern aesthetic sensibilities.
  travel: Luis Armenta prefers spontaneous road trips that combine culinary stops—like tasting barbecue in Austin or shrimp gumbo in New Orleans—with visits to family-run festivals in the Gulf Coast, often
    planning just enough to secure lodging but relying on their flexible schedule to explore off-the-beaten-path towns, and they enjoy the freedom to change course whenever the mood strikes.
  culinary: Luis Armenta cultivates chilies, tomatoes, and cilantro on a rooftop garden to craft authentic tamales, pozole, and a variety of salsas, experimenting with ancho, pasilla, and chipotle chilies,
    and they love hosting friends for meals where homemade corn masa and hand-pressed tortillas dominate the table.
  core: Luis Armenta is a hands-on, slightly disorganized fixer-upper with a competitive edge, who balances a love of DIY gardening and cooking with a drive to outshine larger contractors through personal
    reliability and community reputation, and they often find themselves juggling tools and recipes in equal measure.
background:
  cultural: Luis is a Mexican‑American who grew up in Houston’s close‑knit Hispanic community. Raised speaking Spanish at home and learning English in school, he is fully bilingual and comfortable navigating
    both cultures. His identity is rooted in Mexican traditions such as Día de los Muertos, Semana Santa, and family gatherings centered around home‑cooked meals. He actively participates in local Mexican
    festivals, enjoys mariachi and regional folk music, and values the strong family bonds and community solidarity typical of Mexican culture. At the same time, living in the diverse city of Houston has
    exposed him to broader Texan and American customs, which he blends into his daily life, from enjoying Tex‑Mex cuisine to participating in neighborhood volunteer initiatives.
