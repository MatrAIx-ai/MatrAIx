personas:
  professional: Clark Estridge is a disciplined kitchen operative who leverages strict food safety protocols, meticulous inventory controls, and clear procedural checklists to streamline fast‑paced service,
    and they are actively pursuing ServSafe Manager certification to transition into a supervisory role within two years.
  sports: Clark Estridge is an avid freshwater angler who spends weekends at the Lakeview Anglers Association, follows the St. Louis Cardinals for baseball, supports the Kansas City Chiefs in football,
    and occasionally joins a local intramural soccer league for cardio.
  arts: Clark Estridge connects with classic rock legends like Led Zeppelin, Pink Floyd, and The Rolling Stones while flipping through Bon Appétit and Food & Wine magazines, attending occasional live music
    gigs at the downtown venue, and finds inspiration in the visual storytelling of culinary documentaries.
  travel: Clark Estridge prefers weekend road trips that combine fishing at nearby reservoirs with visits to farm‑to‑table markets, dreams of a culinary immersion tour in Tuscany’s Chianti region, and plans
    future trips to Asheville, North Carolina for its vibrant food scene, all while budgeting travel expenses through a detailed spreadsheet.
  culinary: Clark Estridge enjoys experimenting by marrying comfort staples like chicken pot pie or mac and cheese with bold twists such as curry powder, smoked paprika, or jalapeño‑infused cheddar, and
    they often source fresh herbs like cilantro and rosemary from the local farmers' market to create signature dishes such as lime‑coriander corn bread.
  core: Clark Estridge is a structure‑obsessed, compassionate kitchen enthusiast who meticulously checks inventory twice a day, can’t resist late‑night gourmet snack cravings, and finds peace in the rhythmic
    splash of a fishing line.
background:
  cultural: Clark was raised in West Plains, Missouri, in a modest, white Midwestern family with deep roots in the region. His upbringing emphasized hard work, self‑reliance, and community involvement,
    values reinforced through participation in church youth groups and local school events. Family traditions centered around shared meals, seasonal festivals like Thanksgiving and Fourth of July barbecues,
    and a respect for the natural surroundings of Howell County. These experiences cultivated a strong sense of hospitality, an appreciation for locally sourced food, and a commitment to helping neighbors,
    all of which continue to shape his personal and professional outlook.
attributes:
  skills: '[''Food preparation and cooking'', ''Food safety and sanitation compliance'', ''Inventory management'', ''Scheduling and shift coordination'', ''Team training and mentorship'', ''Recipe scaling
    and cost control'', ''Knife skills'', ''Equipment operation (grill, deep fryer, slicer)'', ''Basic nutrition knowledge'']'
  hobbies: '[''Home cooking and recipe experimentation'', ''Fishing and outdoor activities'', ''Community volunteering (food bank)'', ''Woodworking and DIY projects'', ''Listening to classic rock music'',
    ''Reading culinary literature'']'
  career_goals: Clark aims to advance from his current food preparation role to a kitchen supervisory position within the next two years, achieving certifications such as ServSafe Manager and Certified
    Culinarian. He plans to enroll in a community college culinary program to deepen his culinary knowledge and eventually become an executive chef. Long‑term, Clark envisions opening a farm‑to‑table restaurant
    in West Plains that highlights locally sourced ingredients and provides job training opportunities for youth in his community.
