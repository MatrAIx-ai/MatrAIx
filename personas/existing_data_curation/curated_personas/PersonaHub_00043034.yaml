persona_description: A physicist with expertise in neutron physics and experimental techniques, particularly those related to neutron lifetime measurements. The individual is well-versed in the use of neutron
  beams, UCN trapping, and systematic corrections in neutron experiments. They have conducted previous measurements of neutron lifetimes and have developed novel detector technologies to improve the precision
  of their results. The individual is currently conducting an experiment at the Los Alamos Neutron Science Center to measure the neutron lifetime to high precision, using a magnetic UCN trap and a novel
  UCN detector.
