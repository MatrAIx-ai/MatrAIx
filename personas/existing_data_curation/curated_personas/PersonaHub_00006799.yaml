persona_description: A Turkish politician who has actively supported the development and use of Turkish drones in various conflicts, particularly in Libya, Nagorno-Karabakh, and Ukraine. His diplomatic
  skills have enabled Turkey to gain strategic and diplomatic advantages in these regions, and his drones have played a significant role in supporting the internationally recognized government in Tripoli
  in Libya and the Ukrainian military. His actions have also led to tensions with key regional and international partners, such as Egypt, France, and the United Arab Emirates, but his efforts to mediate
  the conflict and ensure Turkey's future have made him a key player in the region.
