  hobbies: '[''LEGO building'', ''jigsaw puzzles'', ''reading mystery books'', ''gymnastics'', ''swimming'', ''playing piano'', ''Scratch coding'']'
  career_goals: She dreams of becoming a scientist—specifically an environmental engineer or astronaut—because she loves solving structured problems, enjoys competition, and wants to make a measurable impact
    on the world. She aims to excel academically, win science fairs, and someday contribute to space exploration or sustainable technology.
