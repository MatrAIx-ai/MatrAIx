personas:
  professional: Lillian Taylor is a meticulous janitor at a Port Orange facility who leverages their OSHA‑trained cleaning expertise, strict inventory control, and time‑blocking schedules to consistently
    exceed performance metrics, and they are actively pursuing a Certified Facility Manager credential to transition into a supervisory role within three years.
  sports: Lillian Taylor jogs the early‑morning shoreline three times a week, cheerfully follows the Orlando Magic and the Tampa Bay Buccaneers, and participates in the Port Orange Community Running Club's
    weekend 5 K races, preferring low‑impact cardio over team sports.
  arts: Lillian Taylor enjoys solving jigsaw puzzles featuring Monet’s Water Lilies, devours contemporary mystery novels by Gillian Flynn, and playlists Sufjan Stevens and Norah Jones while tending their
    garden, occasionally attending the local community theater's production of 'The Mousetrap' for a structured cultural fix.
  travel: Lillian Taylor plans weekend getaways with meticulous itineraries, favoring low‑key destinations like Cocoa Beach, Savannah, Georgia, and the historic district of St. Augustine, always booking
    accommodations and travel at least a month in advance to maintain predictability and stay within a modest budget.
  culinary: Lillian Taylor prefers cooking at home, cultivating basil and rosemary on their patio to garnish grilled lemon‑garlic shrimp and roasted vegetable quinoa salad, while they occasionally treat
    themselves to a fresh seafood platter at a local fish house, and they keep a well‑organized spice rack for quick, structured meal prep.
  core: Lillian Taylor is a fiercely organized, solitary competitor who transforms routine chores into systematic achievements, balancing meticulous work with quiet hobbies while they constantly plan the
    next step toward facility management.
background:
  cultural: Lillian grew up in a middle‑class, European‑American family in central Florida. Her upbringing emphasized self‑reliance, a strong work ethic, and modest community values typical of the coastal
    suburban environment. Family traditions included Sunday home‑cooked meals and occasional church gatherings, fostering a sense of quiet responsibility. The regional culture of Port Orange, with its blend
    of outdoor recreation and close‑knit neighborhoods, has shaped her practical outlook and appreciation for routine and orderly surroundings.
attributes:
  skills: '["Cleaning and sanitisation", "Floor care (strip‑mop‑wax, carpet cleaning, tile polishing)", "Chemical safety and OSHA compliance", "Inventory control and supply ordering", "Basic facilities
    maintenance (light plumbing, HVAC filter replacement, minor electrical work)", "Time management and scheduling", "Record‑keeping and documentation", "Custodial software usage (e.g., CleanTelligent)",
    "Attention to detail and quality assurance"]'
  hobbies: '["Patio gardening", "Morning beach walks", "Jigsaw puzzles", "Crossword solving", "Basic woodworking (shelf building, small repairs)", "Reading mystery novels"]'
  career_goals: Lillian aims to move from a hands‑on cleaning role to a supervisory position within the next three years, eventually becoming a facilities manager for a residential or mixed‑use property.
    She plans to obtain a Certified Facility Manager (CFM) credential and may pursue a bachelor's degree in facilities management to deepen her understanding of budgeting, vendor negotiation, and sustainability
    practices. Her ambition includes leading a small cleaning crew, implementing efficiency‑driven protocols, and contributing to green‑building initiatives at her workplace.
