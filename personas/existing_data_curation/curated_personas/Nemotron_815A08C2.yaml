  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Digital photography'', ''Hiking Bay Area trails'', ''Cooking seasonal recipes'', ''Reading contemporary fiction and art history'',
    ''Yoga'', ''Volunteering at community art workshops'', ''Attending live music performances'', ''DIY home décor projects'']'
  career_goals: Laura aims to leverage her retail experience and business education to move into a supervisory role within the next two years, targeting a store manager position that lets her shape staff
    training and visual merchandise strategies. She plans to enroll in a bachelor’s program in Business Administration or Arts Management to deepen her knowledge of leadership and cultural programming.
    In the longer term, she envisions opening a boutique café that doubles as a community art space where local artists can showcase work and host workshops, combining her organizational strengths, entrepreneurial
    drive, and passion for art.
