persona_description: A Chinese medicine practitioner who specializes in the treatment of low back pain. The practitioner has a deep understanding of the internal and independent causes of low back pain
  in TCM, including the relationship between the liver, spleen, kidneys, and other organs. They are skilled in the use of specific medicinals to treat specific tissues, such as muscles, ligaments, and vertebral
  body, and are able to differentiate between traumatic and non-traumatic injuries. The practitioner is also knowledgeable about the environmental and emotional causes of low back pain, and is able to provide
  personalized treatment plans based on the individual's specific circumstances.
