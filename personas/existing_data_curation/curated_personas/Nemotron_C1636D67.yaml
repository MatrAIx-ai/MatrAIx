  hobbies: '[''Photography'', ''Reading non‑fiction (technology, social justice, urban planning)'', ''Yoga and meditation'', ''Small book club'', ''Mentoring youth in coding'', ''Cooking (soul‑food fusion)'',
    ''Live jazz performances'']'
  career_goals: Tynette aims to transition into a lead architect role where she can shape technical strategy for large‑scale products, with a focus on building inclusive, accessible technology. She plans
    to obtain an AWS Solutions Architect certification and to present at industry conferences on best practices for diversity in engineering teams. Over the next five years, she hopes to spearhead a mentorship
    program for underrepresented students in Chicago, eventually launching a startup that leverages AI to improve civic engagement. Her long‑term ambition is to combine her technical leadership with product
    ownership, positioning herself for a senior engineering manager or VP of Engineering role.
