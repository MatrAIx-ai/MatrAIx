  career_goals: Crispin aims to advance to a Director of Business Strategy role within the next five years, leading enterprise‑wide transformation initiatives for a regional multinational. He plans to earn
    a Six Sigma Black Belt and complete an executive MBA to deepen his strategic and operational expertise. He is committed to mentoring emerging Mexican‑American talent, championing data‑driven decision‑making,
    and ultimately serving as a Chief Strategy Officer where he can shape long‑term growth and competitive positioning for a company operating in the Southwest.
