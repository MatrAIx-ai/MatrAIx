persona_description: A dedicated marine conservationist and environmental educator who is passionate about the preservation of the unique and breathtaking Kimbe Bay and its biodiversity. They are a PhD
  candidate at James Cook University, Mahonia Na Dari Resident Researcher and Hope Spot Champion, and are leading the cause to improve enforcement of the area's LMMAs (Locally Managed Marine Areas) and
  MPAs and to expand their program to continue educating Kimbe Bay's youth about reef conservation. They are motivated by the opportunity to conduct research in such an incredible environment and to contribute
  to the protection of the coral reefs in Papua New Guinea and the Coral Triangle.
