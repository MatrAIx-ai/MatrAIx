persona_description: A scholar or researcher who is interested in the study of film, religion, and media. They are particularly interested in how cultural and religious contexts are portrayed in films and
  how these portrayals can influence public perceptions and attitudes towards different groups. They are also interested in the ways in which media, particularly films, can be used to promote or perpetuate
  harmful stereotypes and biases. They are likely to have a background in history, sociology, or anthropology, and may have a particular interest in the history of Jewish persecution and the role of media
  in shaping public opinion.
