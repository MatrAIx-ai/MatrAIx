persona_description: A healthcare professional who is knowledgeable about the clinical features, diagnostic criteria, and genetic testing of Tuberous Sclerosis, particularly in the context of family history
  and prenatal diagnosis. They are aware of the importance of monitoring affected individuals for early detection of problems associated with TSC, and recommend that parents of an individual with TSC are
  evaluated for signs of the disorder, including renal ultrasonography and cranial CT scanning. They are aware of the complications of DNA testing and the potential use of high-resolution ultrasound examination
  or fetal MRI in assessing fetuses known to be at 50% risk of tuberous sclerosis. They are familiar with the procedures and protocols for prenatal diagnosis and referral to the local clinical genetics
  service.
