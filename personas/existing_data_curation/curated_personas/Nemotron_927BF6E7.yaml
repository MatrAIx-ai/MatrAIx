  career_goals: Kevin aspires to move beyond day-to-day front-desk duties into a supervisory or program-development role within the local government or a community-based nonprofit. He plans to complete
    a bachelor's degree in public administration or communications within the next three years, building on his associate degree. He hopes to become an office manager or community outreach coordinator,
    where he can design and implement cultural-enrichment programs, such as art workshops for senior citizens or informational campaigns about mental-health resources, that blend his organizational strengths
    with his love for the arts. He also aims to develop expertise in digital outreach, learning social-media strategy and website management to broaden the reach of community initiatives. Ultimately, Kevin
    envisions a career that allows him to foster harmony in the community, support residents in navigating public services, and integrate creative experiences that improve quality of life.
