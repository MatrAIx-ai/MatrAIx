  hobbies: '[''Visiting local art galleries and museums'', ''Street photography'', ''Open‑mic poetry nights'', ''Cooking experimental Southern and Caribbean dishes'', ''Playing basketball at the park'',
    ''Yoga practice'', ''Youth mentorship in carpentry'', ''Collecting vintage jazz and hip‑hop vinyl records'']'
  career_goals: Barbara aims to upgrade her safety credentials by obtaining OSHA 30 and NCCER certifications, positioning herself for crew‑lead roles. She plans to pursue associate‑level coursework in construction
    management to transition into site supervision. Her short‑term ambition is to become a project coordinator for small renovation projects that focus on affordable housing in underserved Staten Island
    neighborhoods. Long‑term, she envisions launching a boutique construction firm that integrates community art—such as murals and public‑space installations—into building projects, while hiring and training
    other underrepresented youth from her community. She seeks a career path that blends her practical trade expertise with her passion for creative design and community empowerment.
