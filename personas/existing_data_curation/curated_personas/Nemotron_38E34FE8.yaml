personas:
  professional: Barbara Jones, a seasoned construction laborer with OSHA 10 certification and hands-on expertise in concrete pouring, framing, and demolition, leverages their creative eye for design and
    strong crew-coordination skills to propose aesthetic improvements on site while navigating the fast-paced, often chaotic demands of urban renovation projects.
  sports: Barbara Jones, a dedicated weekend basketball player at the local Staten Island park league, also follows the New York Knicks and the New York Mets, participates in a community running club for
    casual 5K races, and balances their love of team sport with personal runs that keep their stamina sharp for the physically demanding construction site.
  arts: Barbara Jones immerses themselves in contemporary urban art at Snug Harbor and the Staten Island Museum, draws inspiration from street muralist Shepard Fairey and photographer Vivian Maier, writes
    spoken-word poetry influenced by Gil Scott-Heron and Maya Angelou for the neighborhood open-mic, and curates their vintage vinyl collection featuring Miles Davis, John Coltrane, and Grandmaster Flash
    to soundtrack their creative evenings.
  travel: Barbara Jones favors spontaneous short-haul trips that blend cultural immersion and culinary exploration, having backpacked through New Orleans for its jazz, gumbo, and Creole street murals, and
    spent a weekend in Cartagena savoring Caribbean seafood before planning a future road trip to the Hudson Valley's farm-to-table festivals, all while budgeting trips around their variable construction
    paycheck.
  culinary: Barbara Jones, an enthusiastic home cook, experiments at an intermediate level by fusing Southern comfort dishes like shrimp and grits and collard greens with Caribbean staples such as jerk
    chicken, plantains, and Scotch bonnet-spiced oxtail stew, plating each plate with artistic flair and sourcing ingredients like smoked paprika, sweet potatoes, and fresh okra from local farmers' markets.
  core: Barbara Jones is a hands-on construction pro with a flair for street art, vintage vinyl, and spontaneous cooking experiments, whose relaxed approach to planning hides a disorganized streak that
    occasionally spills over into missed appointments and budget oversights.
background:
  cultural: Barbara is an African American woman rooted in the vibrant community of Staten Island. She grew up in a multigenerational household where storytelling, gospel music, and church gatherings shaped
    her sense of identity. Her family’s migration story includes Southern U.S. roots, preserving culinary traditions and oral histories that influence her cooking and values. She actively participates in
    local celebrations of Black history and culture, attending events such as African American History Month exhibitions and community block parties. Through her work in construction and her involvement
    in neighborhood beautification projects, she merges the practical grit of her trade with the creative expression of the borough’s street art scene. She places a high value on community solidarity, often
    mentoring younger residents and contributing to projects that empower underrepresented youth.
