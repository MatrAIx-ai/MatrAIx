  career_goals: Although only two years old, Elizabeth already shows a balanced curiosity and practicality. She looks forward to mastering more independent tasks like dressing herself, exploring nature,
    and learning how things work. In the future she envisions becoming someone who can both investigate the world—perhaps as a scientist or teacher—and apply practical skills to help her family and community,
    pursuing goals that combine her love of discovery with everyday responsibility.
