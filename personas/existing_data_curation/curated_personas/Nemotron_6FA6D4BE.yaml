personas:
  professional: Elizabeth White, a budding tender-age explorer of cause and effect, treats building blocks like a mini-architect, systematically arranging towers while flexibly re-configuring them when
    they wobble, hinting at future strengths in engineering or design.
  sports: Elizabeth White, a sprightly toddler who loves splashing in the community pool's shallow water and squealing while chasing a soft foam soccer ball at the park, proudly wears an Arkansas Razorbacks
    baseball cap and cheers for the St. Louis Cardinals during family outings, reflecting a playful devotion to both organized Little League T-ball sessions and informal backyard games.
  arts: Elizabeth White, who adores finger-painting with bright crayons while humming to Raffi's 'Baby Beluga' and giggling at Sesame Street's Elmo, often requests storytime featuring folk fiddle tunes
    by Alison Krauss that echo the backyard's acoustic guitar sessions, weaving music and art into her daily play.
  travel: Elizabeth White, who thrills at the sight of a car's windshield wipers during the family's weekend road trips to the Ozark National Forest and squeals with delight at the salty breeze of Gulf
    Coast beaches, prefers short, stroller-friendly journeys, yet they dream of someday exploring the fireworks at Disney World's Magic Kingdom.
  culinary: Elizabeth White, with a strong penchant for smooth macaroni-and-cheese, crispy chicken nuggets and soft banana slices, often helps stir her oatmeal with a plastic spoon, delights in the buttery
    aroma of biscuits and sausage gravy at Sunday brunch, and occasionally refuses peas, cementing a simple but unmistakable Southern-inspired toddler palate.
  core: Elizabeth White, a curious yet calm two-year-old who balances a love for structured play with spontaneous exploration, quietly collects smooth river stones while impatiently demanding another cookie,
    embodying a gentle blend of practicality and wonder.
background:
  cultural: Elizabeth is raised in a white, middle-class family in Conway, Arkansas. Her upbringing reflects Southern cultural influences such as strong family ties, community gatherings at local churches,
    outdoor activities like picnics and nature walks, and an appreciation for regional music and food. Her parents encourage curiosity through hands-on play, emphasize practical life skills, and value both
    educational and community involvement.
