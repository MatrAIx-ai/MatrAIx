personas:
  professional: Alexandra Ferrer, a teenage community event organizer‑in‑training, leverages her knack for scheduling, digital design, and team coordination to run weekly dance workshops, channeling her
    love for routine, practicality, and outgoing energy into reliable, well‑structured events.
  sports: Alexandra Ferrer, a point guard on the Riverside High School Eagles basketball team, embraces the disciplined practice schedule, balances the camaraderie of after‑school drills with cheering for
    the NBA’s Los Angeles Lakers, and participates in the local youth sports club where she values teamwork and routine training.
  arts: Alexandra Ferrer immerses herself in pop hits from Taylor Swift and classic Latin rhythms by Santana while devouring graphic novels like Ms. Marvel, and she channels that inspiration into digital
    sketches using Procreate for school projects, often humming karaoke duets of Livin' La Vida Loca with her family.
  travel: Alexandra Ferrer enjoys organized weekend trips to the nearby coastal boardwalk and family vacations to San Juan, Puerto Rico, while dreaming of a future backpacking adventure through Costa Rica’s
    rainforests, preferring itineraries that blend cultural immersion with relaxed downtime.
  culinary: Alexandra Ferrer proudly assists her mother in preparing mangú, crispy tostones, and arroz con pollo, perfecting the seasoning balance while also experimenting with homemade pizza toppings,
    and she prefers dishes that combine hearty staples with bright, fresh herbs like cilantro.
  core: Alexandra Ferrer blends a love for steady routines with an outgoing teen spirit, orchestrating community dances, saving diligently for dance gear, battling occasional acne and allergies, and never
    missing a basketball practice, even if she sometimes forgets to bring her water bottle.
background:
  cultural: Raised in the Bronx, Alexandra grows up in a vibrant Dominican community that values family, music, and food. Her parents immigrated from the Dominican Republic, preserving Spanish as the household
    language and celebrating cultural holidays such as Día de la Independencia and Carnaval with lively gatherings. The neighborhood’s mix of Caribbean rhythms, street festivals, and community centers provides
    her with regular exposure to Dominican music, dance, and cuisine. At the same time, she navigates the multicultural environment of New York City, attending a public school where she interacts with peers
    from diverse backgrounds, strengthening her bilingual abilities and cultural adaptability. Her heritage influences her daily life—from the recipes she helps prepare to the language she uses at home—while
    the Bronx’s bustling urban setting fuels her energetic, social personality.
attributes:
  skills: '["Bilingual communication (English & Spanish)", "Organizational and time-management skills", "Practical problem-solving (budgeting, cooking)", "Basic rhythmic dancing (merengue & bachata)", "Digital
