  hobbies: '["Dancing merengue and bachata", "Cooking traditional Dominican dishes", "Playing basketball", "Listening to music and karaoke", "Reading graphic novels", "Creating digital art", "Peer tutoring
    in Spanish"]'
  career_goals: Alexandra aims to finish high school with strong academic standing and eventually pursue a degree in nursing or community health, motivated by a desire to help her family and neighborhood
    stay healthy. In the short term, she plans to earn a certification in CPR and become a volunteer at her local community center's health fair. She also harbors a creative ambition to incorporate her
    love for Dominican culture into a future career, perhaps by opening a small family‑style food stall or teaching dance workshops after she completes her education. Her immediate ambition is to secure
    a mentorship with a nurse at the nearby Bronx hospital and maintain a balanced routine that supports both her academic responsibilities and her involvement in extracurricular clubs.
