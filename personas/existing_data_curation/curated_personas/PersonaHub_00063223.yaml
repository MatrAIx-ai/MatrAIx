persona_description: A university official who is responsible for developing educational strategies and ensuring the continuity of critical university business if an outbreak of the H1N1 flu virus occurs.
  They are knowledgeable about the latest flu prevention and response information, including the Centers for Disease Control and the San Francisco Department of Public Health. They are proactive in implementing
  preventive measures and ensuring that students, faculty, and staff are aware of the symptoms and how to respond if they or someone they know develops flu-like symptoms. They are also responsible for educating
  students, faculty, and staff on the importance of practicing good hygiene, such as sneezing and coughing into a tissue and washing hands frequently with hot soapy water, and remaining at home if they
  experience flu-like symptoms.
