personas:
  professional: Hector, a 36-year-old master mason in the greater Lafayette area, combines fifteen years of precision bricklaying, expert blueprint reading, and crew mentorship with a disciplined, organized
    approach to launch his own contracting firm focused on historic restoration and apprentice development.
  sports: Hector, an avid member of the Lafayette Amateur Soccer Club, plays weekly in a competitive summer league while cheering for the Indiana Pacers during basketball season and the Purdue Boilermakers
    football team in the fall, and he balances his love for the game with a disciplined routine of strength-training and weekend hikes to stay fit.
  arts: Hector, who cherishes the lively rhythms of norteña and banda music and frequently attends concerts by groups such as Los Tigres del Norte and Intocable, also expresses his creativity through woodworking,
    crafting rustic furniture inspired by traditional designs while attending Purdue Repertory Theatre productions whenever his schedule permits.
  travel: Hector prefers well-planned road trips, mapping routes and budgeting expenses, so he can visit his extended family across the border, enjoy weekend escapes to the Ozarks for fishing, and fulfill
    a long-standing dream of touring the stone monasteries of Spain's Galicia region to gather inspiration for his future restoration work.
  culinary: Hector, a confident home chef, delights in preparing tamales wrapped in corn husks, mole negro simmered with dried chilhuacle peppers and Mexican chocolate, and fresh salsa verde using tomatillos,
    often pairing his meals with handcrafted horchata for family gatherings and experimenting with new spice blends each month.
  core: Hector, 36, blends meticulous masonry craftsmanship with a love for lively music and woodworking, yet he habitually forgets to replace his safety goggles, earning him the friendly nickname 'the
    forgetful foreman'.
background:
  cultural: Hector is a first‑generation Mexican‑American whose parents migrated from Jalisco in the 1970s. He grew up bilingual, celebrating both American and Mexican holidays, and maintains close ties
    with his extended family in both Indiana and Mexico. The values of hard work, family cohesion, and community service that were emphasized in his household influence his professional ethic and his commitment
    to mentoring younger workers. He often incorporates Mexican cultural elements into his personal life, such as cooking traditional meals for holidays and participating in local Cinco de Mayo festivities,
    while also embracing the Midwestern work culture of reliability and precision.
attributes:
  skills: '["Bricklaying","Concrete block installation","Stone setting","Blueprint reading","Construction estimating","Team leadership","Safety compliance (OSHA)","Tool maintenance","Project scheduling","Mentoring
    apprentices"]'
  hobbies: '["Soccer","Community volunteering (home‑repair workshops)","Cooking Mexican dishes","Listening to regional Mexican music","Woodworking","DIY home improvement projects"]'
  career_goals: Hector aims to become a certified Master Mason and eventually launch his own masonry contracting firm serving the greater Lafayette region. He plans to complete a state‑approved apprenticeship
    certification, earn OSHA 30‑hour construction safety credentials, and pursue a certificate in construction management at a local community college. In the long term, he envisions expanding his business
    to include historic restoration projects, leveraging his practical curiosity to master specialized stone‑carving techniques, and providing apprenticeship opportunities for young workers in his community.
