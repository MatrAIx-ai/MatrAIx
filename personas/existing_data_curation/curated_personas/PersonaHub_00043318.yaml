persona_description: A researcher and scientist who specializes in the study of muscle biology, particularly the development and function of skeletal muscle cells. They have expertise in the use of micro-explant
  cultures to derive clonal (single cell origin) skeletal muscle stem cell lines and in the use of isopentane (2-methylbutane) cooled with liquid nitrogen to freeze skeletal muscle tissue for histological
  examination. They are proficient in the use of crayfish abdominal extensor muscles for studying ion gradients across a biological membrane, specifically focusing on the effects of ion concentration and
  membrane permeability on muscle cell membrane potential and synaptic responses. They have experience in the integration of their freezing protocol into a broader procedure for the short term triage of
  tissue for functional testing, myoblast cell culture, and genetic or protein expression studies, as well as in the development of a protocol for rapid freezing of skeletal muscle using isopentane cooled
  with liquid nitrogen. They have a passion for the unique structure and function of skeletal muscle, and their research interests include the study of congenital muscle disorders and the potential for
  fixation to interfere with the recognition of pathological features.
