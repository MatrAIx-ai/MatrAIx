  hobbies: '[''Fishing'', ''Sailing'', ''Birdwatching'', ''Gardening'', ''Woodworking'', ''Model ship building'', ''Electronics tinkering'', ''Drone piloting'', ''Reading historical non-fiction'', ''Cooking
    seafood'']'
  career_goals: Although he is no longer employed full-time, Mustapha is driven by a desire to stay mentally engaged, share his knowledge, and give back to his community. Over the next few years he aims
    to expand his home workshop into a modest maker space where local seniors and youth can collaborate on simple electronics, woodworking, and marine projects. He plans to mentor high-school students through
    the Corpus Christi school district's STEM outreach program, help his grandchildren with science fair projects, and complete a series of online courses on renewable energy and drone technology. Additionally,
    he hopes to document his experiences in offshore engineering in a memoir that highlights the balance of curiosity and practicality, and to participate in coastal clean-up initiatives to protect the
    Gulf environment.
