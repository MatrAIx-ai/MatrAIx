  career_goals: Haidee aims to transition from a frontline janitorial role to a facilities‑manager position within the next three years. She plans to earn the ISSA CleanTech certification and complete a
    short‑term project‑management course to strengthen her supervisory credentials. Long‑term, she envisions launching a small, community‑focused cleaning business that offers training and job opportunities
    to other Salvadoran‑American workers in Phoenix. She also hopes to mentor younger staff and develop a “green‑clean” initiative for local schools and community centers.
