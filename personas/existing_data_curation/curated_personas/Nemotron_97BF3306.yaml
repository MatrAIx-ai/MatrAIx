personas:
  professional: Haidee Rohena leverages over three decades of hands-on commercial cleaning and building-maintenance expertise, combining systematic scheduling, safety compliance, bilingual crew leadership,
    and a Business Management associate's degree to drive cost-effective, eco-friendly operations while pursuing ISSA CleanTech certification and a project-management course to transition into facilities-manager
    and eventually launch a community-focused green-clean business.
  sports: Haidee Rohena stays active by hiking the Camelback Mountain trails and birdwatching in the Sonoran Desert as a member of the Arizona Desert Hikers club, regularly cheering for the Phoenix Suns,
    and they also play weekly in a community adult softball league to combine fitness with social interaction.
  arts: Haidee Rohena expresses a love for the arts through dancing cumbia and salsa at cultural festivals, rehearsing with a church choir, immersing themselves in mystery novels by Agatha Christie and
    Tana French, and enjoying live performances by local theater groups as well as music from Celia Cruz and Selena.
  travel: Haidee Rohena favors weekend road trips to scenic destinations such as Sedona, the Grand Canyon, and Palm Springs, enjoys occasional international visits like a culinary workshop in Oaxaca, and
    they aspire to trek the Inca Trail to Machu Picchu as a bucket-list adventure.
  culinary: Haidee Rohena delights in preparing traditional pupusas filled with queso fresco and pork revuelto, savory tamales wrapped in hoja de plátano, and they frequently season dishes with fresh cilantro,
    lime, and achiote, showcasing a modest yet confident cooking skill that shines during their lively community potluck gatherings.
  core: Haidee Rohena blends organized pragmatism with sociable curiosity, turning every cleaning schedule, garden, and potluck into a community-building project while occasionally over-committing to events
    and juggling a lingering fondness for late-night salsa dancing.
background:
  cultural: Haidee’s Salvadoran heritage is a cornerstone of her identity. Raised in a bilingual household, she grew up celebrating Catholic holidays such as Semana Santa and Día de los Santos, and she
    maintains strong ties with the Salvadoran diaspora in Phoenix. Family gatherings feature traditional foods, music, and storytelling, reinforcing values of community, resilience, and hospitality. Haidata
    actively participates in local Salvadoran festivals, where she shares her culture through dance, cuisine, and mentorship of younger immigrants, blending her Latin roots with the multicultural tapestry
    of Arizona.
