  career_goals: Stanley aims to advance to a senior project-manager role within the next three years, leading larger, interdisciplinary teams on sustainable infrastructure projects along the North Carolina
    coast. He plans to earn PMP and Six Sigma Green Belt certifications, and eventually pursue an MBA focused on strategic leadership. Long-term, he envisions launching his own consultancy that blends rigorous
    project execution with innovative, design-oriented solutions for community-focused developments.
