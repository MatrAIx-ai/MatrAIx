personas:
  professional: Rogelio Johns, an aspiring young illustrator, merges his fascination with comic book storytelling, meticulous nature journaling, and collaborative spirit to produce vibrant drawings that
    often feature fantastical creatures woven from leaves and rocks.
  sports: Rogelio Johns, an enthusiastic Under‑11 soccer player, trains after school on the local field, cheers for the LA Galaxy, and joins the community’s summer basketball camp to stay fit during the
    off‑season.
  arts: Rogelio Johns, a budding comic artist, draws inspiration from creators like Jim Lee and Hayao Miyazaki, while his guitar sessions echo the melodies of Andrés Segovia and modern pop tunes, weaving
    visual and musical art into his daily routine.
  travel: Rogelio Johns, an eager explorer, spends weekends trekking through the nearby state park, has visited the Grand Canyon on a family road trip, and dreams of wandering the bamboo forests of Kyoto
    next summer.
  culinary: Rogelio Johns, a curious foodie, delights in assembling tacos al pastor with fresh cilantro and lime, mixing mango and pineapple into a bright fruit salad, and occasionally attempts to bake
    simple chocolate chip cookies after watching cooking videos.
  core: Rogelio Johns, a ten‑year‑old whose imagination runs wild on paper and the soccer field, balances creative bursts with deep compassion, yet often worries about unfinished sketches.
background:
  cultural: Rogelio is raised in a Mexican-American household where Spanish is spoken alongside English, and family traditions such as Día de los Muertos, holiday tamale making, and listening to mariachi
    music are celebrated. Living in Meridian, Idaho, he experiences a blend of Southwestern Mexican cultural influences and the Midwestern community spirit, participating in local cultural festivals, school
    multicultural events, and neighborhood gatherings that reflect his bicultural identity.
attributes:
  skills: '["drawing and sketching", "basic Scratch coding", "bilingual Spanish proficiency", "storytelling", "team collaboration"]'
  hobbies: '["drawing and sketching", "reading graphic novels", "exploring nature and journaling", "building LEGO creations", "playing soccer", "learning guitar and singing traditional songs"]'
  career_goals: Rogelio dreams of a future where he can combine his love for art, technology, and helping others. He aspires to become a community muralist or a teacher who integrates creative projects
    into learning, hoping to inspire younger kids to appreciate different cultures and ideas. He also expresses interest in environmental stewardship, imagining a role that lets him protect nature while
    engaging his community in collaborative projects.
