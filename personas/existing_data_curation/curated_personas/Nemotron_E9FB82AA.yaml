personas:
  professional: Aaron is a budding creative technologist who blends illustration, watercolor, and LEGO engineering with Scratch programming, channeling their relentless curiosity and balanced organization
    into self-directed comic books that showcase their willingness to experiment and their occasional over-thinking about getting every panel just right.
  sports: Aaron is a junior desert explorer who hikes the Sonoran trails with their family on weekends, plays on the local Desert Sprouts youth soccer team, roots for the Arizona Diamondbacks and the Phoenix
    Suns, and balances their love for rock-collecting with a habit of skipping after-school basketball practice when a new LEGO set arrives, showing both enthusiasm for outdoor activity and occasional procrastination.
  arts: Aaron is a passionate visual storyteller who drafts comic panels inspired by Marvel’s Spider-Man and Studio Ghibli’s Princess Mononoke, paints mural sections under the guidance of community artist
    Ana Torres, and drums to the beats of Kendrick Lamar, Beyoncé, and Wizkid while listening to Afro-beat playlists, eagerly sketching street art after school, reflecting their deep appreciation for diverse
    artistic influences and their habit of doodling on every scrap of paper they can find.
  travel: Aaron dreams of trading their desert hikes for a family road trip to the Grand Canyon, a summer stay in coastal San Diego where they can surf, and an eventual overseas adventure to Tokyo’s Akihabara
    district to hunt for manga memorabilia, preferring tightly planned itineraries with map stickers yet sometimes they beg for spontaneous ice-cream stops that break their schedule.
  culinary: Aaron enjoys bright, finger-friendly foods like chicken quesadillas topped with fresh cilantro, mango-studded fruit kebabs, and homemade taco bowls, and while their cooking skills are limited
    to mixing, sprinkling, and occasionally burning the cheese on a mini-pizza, they love helping their parents prep s'mores during desert camping trips, showing a budding enthusiasm for flavor experimentation
    paired with a messy kitchen habit.
  core: Aaron is a curious nine-year-old who fuses desert-inspired art, LEGO engineering, and Scratch coding into vivid stories, yet their over-active imagination often leads to late-night worries and a
    habit of leaving unfinished comic pages scattered across their room.
background:
  cultural: Aaron is a Black boy growing up in Glendale, Arizona, a city known for its diverse and growing multicultural population. His family blends African American cultural traditions with Muslim heritage,
    reflected in the celebration of Ramadan, the use of Arabic names, and the sharing of dishes such as jollof rice alongside classic American meals. He attends a public elementary school where he interacts
    with peers from various backgrounds, learning about Native‑American history and Southwest desert ecology alongside standard curricula. The local community center offers art programs that highlight Black
    artists and desert‑inspired murals, shaping Aaron’s appreciation for both his heritage and the unique landscape of the Sonoran Desert. Family gatherings often include storytelling about his ancestors
    and the values of perseverance and community, reinforcing a sense of pride in his cultural roots while encouraging active participation in broader American life.
