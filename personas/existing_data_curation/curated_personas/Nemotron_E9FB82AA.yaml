  career_goals: Aaron is already dreaming about his future. In the short term, he wants to sharpen his drawing technique, join the school’s art club, and create a series of Scratch games that incorporate
    his own illustrations. He hopes to publish a small comic book about life in Glendale’s desert neighborhood. Over the next few years, he imagines becoming a video‑game designer or animator, roles that
    would let him merge his love for art, storytelling, and coding. He also feels a strong desire to give back to his community by painting murals that celebrate Black heritage and the Southwest landscape.
    Ultimately, Aaron aspires to work as a creative technologist or multimedia artist, building interactive experiences that inspire other children while providing a stable and fulfilling career.
