  career_goals: Melissa aims to transition from a senior administrative assistant to an office manager or administrative supervisor within the next three years, leveraging her leadership abilities to mentor
    junior staff and streamline office operations. She plans to earn a Certified Administrative Professional (CAP) credential and later complete a bachelor's degree in Business Administration to broaden
    her strategic impact. Long‑term, Melissa envisions launching a community‑focused consultancy that helps small nonprofits and local arts organizations improve their administrative efficiency and outreach.
    Additionally, she hopes to serve on the board of the Little Chute Arts Council, shaping cultural programming for the town.
