personas:
  professional: Elanna Johnson, a high‑school visual storyteller, blends sketching, digital illustration, and narrative writing into multimedia art projects, thriving on the freedom of open‑ended creativity
    while their talkative, competitive nature pushes them to loudly showcase their process on Instagram and TikTok, even as a relaxed approach sometimes leads to missed deadlines.
  sports: Elanna Johnson, who favors casual beach volleyball at the Wilmington boardwalk and weekly yoga sessions, roots for the Carolina Hurricanes and follows the local Wilmington Sea Daws ultimate Frisbee
    club, yet typically resorts to short, improvised workouts squeezed between art projects rather than structured training.
  arts: Elanna Johnson, an avid fan of speculative fiction authors like Neil Gaiman and N.K. Jemisin, draws visual inspiration from illustrators such as Hayao Miyazaki and Alex Ross, and regularly attends
    open‑mic nights featuring indie musicians like Phoebe Briggs, while also curating playlists of Jeremy Soule’s game scores to fuel their creative process.
  travel: Elanna Johnson, who enjoys spontaneous weekend trips to nearby coastal spots like the Outer Banks and dreams of photographing the aurora borealis in Iceland and exploring Berlin’s vibrant street‑art
    scene, typically plans travel on a whim using Instagram guides and often overlooks budgeting, resulting in last‑minute hostel bookings.
  culinary: Elanna Johnson, who favors quick, colorful meals such as avocado toast topped with radish and a matcha latte, occasionally experiments with homemade sushi rolls or ramen broth for inspiration,
    but generally relies on takeout from the local seafood shack whenever they need a flavorful palate break during sketching marathons.
  core: Elanna Johnson, a hyper‑creative teen who trades sleep for late‑night sketch marathons, hoards Procreate brushes like trophies, worries about perfection, and constantly seeks the next social‑media
    buzz to validate their art.
background:
  cultural: Elanna grew up in Wilmington, North Carolina, a coastal city with a blend of Southern hospitality and a growing arts scene. Her family's roots are in the North Carolina Piedmont, and she was
    raised in a middle-class environment that values community, modesty, and a strong work ethic. The city's beach culture, historical sites, and local festivals have shaped her appreciation for storytelling
    and visual expression. While her household reflects traditional values, Elanna's exposure to school art programs, online creator communities, and the diverse population of Wilmington has broadened her
    perspective, fostering an inclusive outlook that embraces both her Southern heritage and contemporary, global artistic trends.
attributes:
  skills: '[''Creative Writing'', ''Digital Illustration'', ''Photography'', ''Social Media Content Creation'', ''Public Speaking'', ''Improv Acting'', ''Abstract Reasoning'', ''Critical Thinking'']'
  hobbies: '[''Sketching'', ''Digital painting'', ''Short-form video creation'', ''Reading speculative fiction'', ''Poetry writing'', ''Indie gaming'', ''Coastal photography'', ''Open-mic performances'',
    ''Improv workshops'', ''Community art volunteering'']'
  career_goals: Elanna dreams of attending a liberal-arts college with a strong fine-arts program, where she can refine her visual storytelling skills. She aspires to become a multimedia artist who blends
    illustration, animation, and narrative, eventually working as a concept artist for video games or an art director in an advertising agency. Parallel to that, she wants to build a personal brand on platforms
    like Instagram and TikTok, showcasing her art process and gaining a community of followers. In the long term, she hopes to exhibit her work in regional galleries, publish a graphic novel, and perhaps
    teach workshops that encourage other teens to explore imagination through art.
