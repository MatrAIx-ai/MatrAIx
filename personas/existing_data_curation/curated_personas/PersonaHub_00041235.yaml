persona_description: A dairy producer who is interested in improving the reproductive efficiency of cows by focusing on genetic merit for fertility traits. This person is likely to be a researcher or scientist
  in the field of dairy science, specifically focused on genetic improvement of dairy cows. They may have experience with animal breeding and genetics, as well as knowledge of reproductive biology and physiology.
  This person is likely to be interested in studying the relationship between genetic merit for fertility traits and reproductive parameters, such as estrous cycle length, number of follicular waves, corpus
  luteum size, circulating progesterone concentration, preovulatory follicle size, and behavioral estrus. They may also be interested in understanding how genetic merit for fertility traits can impact these
  parameters, and how this knowledge can be used to improve the reproductive performance of dairy cows.
