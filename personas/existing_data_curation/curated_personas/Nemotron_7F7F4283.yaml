personas:
  professional: Eric Jones, a 24‑year‑old product engineering enthusiast, blends Python and Java programming with SolidWorks CAD and Arduino prototyping to craft interactive tech‑art experiences, channeling
    their curiosity and competitive edge, and they lead multidisciplinary hackathon teams while balancing meticulous organization with spontaneous creative pivots.
  sports: Eric Jones fuels their social energy with weekly basketball pick‑up games at a Long Island community center, follows the New York Knicks and New York Mets avidly, participates in a local Long
    Island Soccer Club during the spring, and they treat weekend hikes at Hither Hills State Park as both a competitive endurance challenge and a mental reset.
  arts: Eric Jones channels their creative curiosity into playing guitar for an indie band called the Skyline Echoes, attending improv workshops at The PIT, sketching street scenes inspired by Shepard Fairey
    murals, and they immerse themselves in the works of Björk and Banksy at MoMA and local galleries, constantly seeking unconventional artistic expressions.
  travel: Eric Jones prefers spontaneous urban explorations and tech‑focused road trips, having biked through the streets of Brooklyn, trekked to Acadia National Park, and they dream of visiting Tokyo’s
    Akihabara district and Berlin’s Bauhaus sites, all while budgeting carefully to balance a modest student loan repayment schedule with their love of immersive cultural experiences.
  culinary: Eric Jones enjoys crafting experimental dishes like ramen‑style chicken broth with miso and soft‑boiled eggs, pairs it with craft beers from local microbreweries, loves grabbing tacos al pastor
    from Manhattan food trucks, and they can competently whip up avocado toast topped with smoked salmon, yet they often resort to late‑night pizza delivery after hackathons.
  core: Eric Jones, a 24‑year‑old tech‑art hybrid, blends relentless curiosity, competitive drive, and a love for social collaboration while they occasionally neglect sleep and overindulge in gear upgrades.
background:
  cultural: Eric is a white American raised in Hauppauge, a suburban community in Suffolk County, New York. His family background includes mixed European ancestry, and the multicultural environment of the
    nearby New York City has exposed him to a broad spectrum of artistic and cultural influences. He grew up with a blend of traditional suburban values—emphasizing self‑reliance, education, and community
    involvement—and an openness to global ideas, reflected in his appreciation for diverse art forms and tech innovations. Eric often volunteers at local community events and enjoys participating in the
    region’s eclectic cultural festivals, which reinforce his inclusive yet individually driven outlook.
