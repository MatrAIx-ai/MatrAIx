  career_goals: Eric aims to secure a product engineering role at an innovative tech startup where he can blend his technical skills with his passion for art and design. Over the next five years, he plans
    to become a senior engineer or lead designer, steering interdisciplinary projects that create interactive installations or immersive digital experiences. He is also interested in earning certifications
    in UX/UI design and pursuing a part‑time master's in Human‑Computer Interaction. Ultimately, Eric dreams of launching his own venture that fuses technology, art, and community engagement, positioning
    himself as a competitive thought leader in the creative tech space.
