  career_goals: Charles aims to pursue a career that blends his artistic vision with technical expertise. He plans to build a comprehensive portfolio of digital and traditional artwork to apply for specialized
    high‑school programs in visual arts and later a college degree in multimedia design or concept art. He is interested in becoming a concept artist for video games or an industrial designer who creates
    aesthetically driven products. In the short term, he hopes to attend summer art residencies, develop an online showcase of his work, and possibly start a YouTube channel that documents his creative
    process and tech experiments.
