    and hardware)'',''Critical data evaluation'']'
  hobbies: '[''Cooking (recipe-based)'',''Herb gardening'',''Sudoku and logic puzzles'',''Online chess'',''Morning trail runs'',''Home yoga'',''Arduino tinkering'',''Reading technical nonfiction'']'
  career_goals: Jennifer aims to secure a full-time position in a science- or data-focused company within the Research Triangle, where she can apply her analytical skills in a structured environment. Her
    short‑term goal is to become a junior data analyst or research associate, mastering the organization's data pipelines and contributing to reproducible workflows. Long‑term, she hopes to lead a small
    team of analysts, develop standard operating procedures that reflect her focus on practicality, and possibly pursue professional certifications such as SAS or AWS. Her competitive drive pushes her to
    seek roles that offer clear performance metrics and opportunities for advancement.
