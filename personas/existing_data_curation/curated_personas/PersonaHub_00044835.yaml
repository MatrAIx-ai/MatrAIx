persona_description: A soil scientist who specializes in the study of soil chemistry and mineralogy, particularly in the United States. They have conducted a low-density survey of soil samples throughout
  the conterminous United States, analyzing 45 elements and 9,575 samples for major minerals. Their work is based on the release of Geochemical and Mineralogical Maps for Soils in the Conterminous United
  States by the U.S. Geological Survey. They are likely interested in the abundance and spatial distribution of chemical elements and minerals against which future changes may be recognized and quantified.
