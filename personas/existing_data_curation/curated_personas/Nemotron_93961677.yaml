  hobbies: '[''Birdwatching'', ''High desert hiking'', ''Indoor gardening (native succulents)'', ''Reading non-fiction (psychology, economics, conservation)'', ''Puzzle solving (crosswords, Sudoku)'', ''Baking
    and preserving'']'
  career_goals: Erika aims to advance to a senior market research manager position within the next five years, where she can lead a team of analysts and shape the research agenda for regional consumer trends,
    especially those impacting agricultural and outdoor recreation markets in Oregon. She aspires to develop expertise in predictive modeling to provide clients with forward‑looking insights that support
    strategic planning. While seeking greater responsibility, she values stable work environments and prefers roles that offer clear processes and predictable deliverables, allowing her to maintain a balanced
    lifestyle with her family. Long‑term, she envisions establishing a boutique consultancy focused on data‑driven marketing strategies for small businesses in rural communities, leveraging her analytical
    rigor and intimate knowledge of local markets.
