personas:
  professional: Eric Dixon, a 55‑year‑old veteran of service‑industry sales, leverages three decades of B2B relationship building, consultative selling, and Salesforce expertise to close deals with an assertive‑yet‑collaborative
    style, while his relaxed, flexible workflow and hands‑on tinkering in his garage translate into pragmatic, curiosity‑driven solutions for clients and a mentorship approach that balances innovation with
    proven methods.
  sports: Eric Dixon, a devoted Boston Red Sox and New England Patriots fan, spends weekends cycling the Connecticut River Trail, coaching the River Valley United youth soccer club, and playing informal
    softball with coworkers, embracing a flexible fitness routine that balances low‑impact activity with spirited team camaraderie.
  arts: Eric Dixon, a regular attendee of the Hartford Community Theatre, draws creative fuel from live performances of Lin‑Manuel Miranda’s Hamilton, the classic rock of Bruce Springsteen, and the paintings
    of Norman Rockwell, channeling that inspiration into their woodworking designs and garden layouts.
  travel: Eric Dixon favors relaxed road‑trips to New England gems like Martha’s Vineyard and the White Mountains, while their travel bucket list includes the historic streets of Edinburgh, Scotland, and
    a fishing expedition on Norway’s Lærdal River, planning each getaway with a mix of spontaneity and modest budgeting constraints.
  culinary: Eric Dixon, an able home chef, often prepares New England clam chowder seasoned with thyme and bay leaf, grills fresh Atlantic trout with lemon‑dill butter, and savors barbecued pork ribs infused
    with smoked paprika, while also enjoying a well‑cooked steak at a local steakhouse, balancing home cooking with occasional dining out.
  core: Eric Dixon is a pragmatic yet curious sales veteran who balances a love for woodworking, fishing, and community service with a flexible, sometimes disorganized lifestyle, sprinkling assertive leadership
    into collaborative friendships and occasional impulse purchases.
background:
  cultural: Eric grew up in a middle‑class family in Western Massachusetts, steeped in New England values of self‑reliance, modesty, and community involvement. His ancestry is primarily Anglo‑American,
    with family roots tracing back to early English settlers and later Irish immigrants who arrived in the region during the 19th century. The local culture—characterized by a pragmatic work ethic, appreciation
    for seasonal outdoor activities, and a strong sense of regional identity—shapes his worldview. He participates in town meetings, supports local charities, and enjoys regional traditions such as autumn
    leaf‑watching and winter snow‑shoeing, reflecting both his cultural heritage and his personal inclination toward balanced, flexible living.
