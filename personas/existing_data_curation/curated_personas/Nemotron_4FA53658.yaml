  career_goals: Looking ahead, Eric aims to transition into a senior leadership position—such as regional sales manager or director of service solutions—where he can shape strategy while still maintaining
    the hands‑on client interaction he enjoys. He is interested in spearheading a new service line that leverages emerging technology, allowing him to satisfy his curiosity for innovation within a pragmatic
    framework. At the same time, he wants to create a mentorship program that formalizes his informal coaching of junior colleagues. Ultimately, Eric hopes to achieve a balanced portfolio that offers increased
    flexibility, enabling more quality time with his family as he approaches retirement.
