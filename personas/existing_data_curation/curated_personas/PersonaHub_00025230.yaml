persona_description: A plant pathologist with the American Phytopathological Society who specializes in the study and control of plant diseases, particularly the impact of Black Sigatoka and Panama disease
  on the global production of bananas. He has extensive experience in research, teaching, and publication, and is known for his expertise in controlling plant diseases, particularly those that affect banana
  production. He is also interested in developing new hybrid bananas and those produced via genetic transformation to supply producers with productive cultivars that resist important diseases, nematodes,
  and insects.
