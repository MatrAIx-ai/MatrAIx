  hobbies: '[''Sketching'', ''Watercolor painting'', ''Reading speculative fiction and graphic novels'', ''Journaling'', ''Photography (composition and lighting)'', ''Listening to ambient/indie music'',
    ''Basic coding for digital art'']'
  career_goals: Katherine aspires to attend a specialized arts high school where she can deepen her illustration and design skills. In the long term, she envisions a career as a concept artist for video
    games or graphic novels, blending her love for storytelling with visual art. She also dreams of curating exhibitions that spotlight emerging under‑represented artists, reflecting her appreciation for
    unconventional ideas. To achieve these goals, she plans to build a robust portfolio, seek mentorship from local artists, apply for summer art workshops, and eventually pursue a BFA in Illustration or
    Visual Arts at a college known for its strong studio program.
