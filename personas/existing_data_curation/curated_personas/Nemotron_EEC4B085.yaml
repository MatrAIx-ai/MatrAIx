  career_goals: Bobby aims to transition from line cook to sous‑chef within the next two years, eventually earning the Certified Chef de Cuisine credential from the American Culinary Federation. He hopes
    to specialize in high‑altitude, sustainable cuisine and become the executive chef of a boutique restaurant that highlights Colorado’s local farms. Long‑term, he envisions launching a small catering
    venture focused on curated, health‑forward menus for private gatherings, leveraging his competitive drive to win regional culinary competitions and gain recognition for innovative, data‑driven menu
    development.
