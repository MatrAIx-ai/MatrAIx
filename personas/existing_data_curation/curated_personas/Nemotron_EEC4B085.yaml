personas:
  professional: Bobby Phelps is a line cook in Boulder’s farm‑to‑table scene who combines razor‑sharp knife work, high‑heat grilling, and precision plating with a structured yet occasionally chaotic workflow,
    using their competitive drive to chase a sous‑chef promotion and the Certified Chef de Cuisine credential.
  sports: Bobby Phelps, a passionate follower of the Colorado Rockies and Denver Broncos, spends weekend mornings on solo hikes up the Flatirons and adds occasional trail‑running intervals to manage kitchen‑induced
    stress, while occasionally joining a local hiking club for group outings.
  arts: Bobby Phelps draws creative fuel from the lyrical storytelling of Joni Mitchell, the earthy exhibits at the Boulder Museum of Contemporary Art, and the culinary memoirs of Anthony Bourdain, often
    translating those influences into narrative plating concepts and experimental fermentation projects.
  travel: Bobby Phelps favors purposeful, low‑key travel, having explored the backcountry of Rocky Mountain National Park and dreaming of a culinary pilgrimage to Tuscany’s agriturismo farms, all while
    budgeting trips around the seasonal ebb of kitchen duties.
  culinary: Bobby Phelps expertly blends classic comfort dishes like slow‑roasted turkey with rosemary gravy and inventive farm‑to‑table plates such as wild mushroom, heirloom carrot, and locally sourced
    goat‑cheese risotto, while perfecting sourdough loaves and petite kombucha batches using seasonal Colorado produce like kale, beet greens, and chanterelles.
  core: Bobby Phelps is a meticulous yet habitually disorganized chef whose competitive perfectionism fuels solo hikes, relentless fermentation experiments, and a compulsive notebook habit that both soothes
    and intensifies their chronic worry about kitchen performance.
background:
  cultural: Bobby comes from a white, middle‑class family with Anglo‑German roots in the American Midwest. He grew up celebrating traditional holidays such as Thanksgiving and Fourth of July barbecues,
    which gave him a foundation in classic American comfort cooking. After moving to Boulder for culinary school, he embraced the city’s progressive, sustainability‑focused culture, integrating the local
    farm‑to‑table ethos into his cooking. His cultural identity blends a respect for straightforward, hearty American dishes with a growing appreciation for the Colorado outdoors, seasonal ingredients,
    and health‑conscious dining trends.
