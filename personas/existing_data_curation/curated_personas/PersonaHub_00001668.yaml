persona_description: A psychologist who specializes in the study of psychopathology, particularly the life histories of individuals with psychopathology. The person is likely to be interested in comparing
  and contrasting the factors that contribute to the maladjustment of individuals with different types of psychopathology. They may have a background in studying the intelligence quotients and school achievement
  patterns of children who later became schizophrenic, as well as what happened to their brothers, sisters, and neighborhood peers. They may have expertise in comparing and contrasting the life histories
  of individuals with different types of psychopathology, and may be interested in understanding how these factors contribute to the development of psychopathology.
