  career_goals: Joshua aspires to turn his imagination into a sustainable career that offers creative freedom and flexible scheduling. He dreams of becoming a concept artist or visual designer for video
    games or independent film, where he can translate abstract ideas into compelling visuals. He is also intrigued by the prospect of building his own online brand—producing art, tutorials, and short videos—so
    he can monetize his creative output while maintaining autonomy. In the longer term, he hopes to lead a small creative studio or collaborate on interdisciplinary projects that blend art, technology,
    and storytelling, allowing him to work with like‑minded peers in a dynamic, non‑rigid environment.
