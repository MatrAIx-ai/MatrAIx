personas:
  professional: Lindsay Pagan, a 74‑year‑old retired homemaker turned senior‑center volunteer, blends her curiosity for new gardening methods with a practical knack for organizing community fairs, even
    though her spontaneous, loosely structured approach sometimes leaves her scrambling to meet event deadlines.
  sports: Lindsay Pagan enjoys leisurely walks along the Fox River as her primary exercise, occasionally joins the local senior bowling league, and roots for the Milwaukee Brewers and Wisconsin Badgers,
    cheering at games whenever a community bus runs them through the season.
  arts: Lindsay Pagan spends afternoons crocheting blankets inspired by the vibrant palettes of Georgia O'Keeffe while listening to The Carpenters, and unwinds with historical novels by Ken Follett and
    biographies of Amelia Earhart, often discussing the themes at her book club.
  travel: Lindsay Pagan prefers relaxed heritage tours, having visited the historic streets of Savannah, the Gettysburg battlefield, and the charming canals of Bruges, while planning a future pilgrimage
    to the River Thames villages that echo the gentle flow of their own Fox River home.
  culinary: Lindsay Pagan, a confident home cook, loves experimenting with seasonal farm‑to‑table dishes such as roasted beet and goat‑cheese salad, homemade sourdough loaf, and apple crisp topped with
    oat crumble, often sourcing heirloom tomatoes and fresh rosemary from their own garden.
  core: Lindsay Pagan is a garden‑obsessed, history‑loving senior whose spontaneous planning yields charming community events, but their chronic worry often sends them double‑checking the pantry for hidden
    sugar spikes.
background:
  cultural: Lindsay grew up in a small farming community in central Illinois and has spent most of her life in the Midwest. Her upbringing was shaped by traditional Midwestern values of self-reliance, community
    service, and modesty, and she was raised in a Protestant (United Methodist) family that emphasized church involvement and mutual aid. Living now in Fairfield, she maintains strong ties to local customs,
    county fairs, and the close‑knit social fabric of Wayne County, while also embracing the broader American cultural spectrum through lifelong learning and curiosity.
