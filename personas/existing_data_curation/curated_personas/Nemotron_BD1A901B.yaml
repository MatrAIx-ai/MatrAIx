  career_goals: Although retired from formal employment, Lindsay aims to remain an active contributor to her town. She hopes to expand her volunteer work at the local senior center, lead a senior gardening
    club, and document the oral histories of longtime Fairfield residents. She also plans to complete a short digital photography course to capture community events and possibly publish a small photo book.
