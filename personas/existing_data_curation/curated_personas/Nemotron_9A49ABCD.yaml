personas:
  professional: Aeneas Shinn, a 57‑year‑old aspiring community arts facilitator, merges improvisational guitar, storytelling, and basic carpentry to design spontaneous mural workshops for local youth, channeling
    his competitive drive and skepticism of rigid structures into relentless grant‑seeking and event‑organizing.
  sports: Aeneas Shinn, an avid participant in weekend community soccer matches and a regular angler at the nearby pond, roots for the Mississippi State Bulldogs football team and the New Orleans Saints,
    using informal pick‑up games to stay active while shunning regimented gym routines in favor of spontaneous, low‑key workouts.
  arts: Aeneas Shinn, a seasoned guitar‑strumming storyteller, immerses himself in the Delta blues of Robert Johnson and B.B. King, channels the visual cadence of Romare Bearden into community murals, and
    often quotes Maya Angelou while watching the classic film "The Color Purple" for artistic inspiration.
  travel: Aeneas Shinn, a spontaneous explorer at 57, prefers short, unplanned road trips to nearby towns like Memphis and New Orleans for blues festivals and antique markets, juggling his modest budget
    with occasional splurges on a weekend getaway to the Gulf Coast for sunrise fishing.
  culinary: Aeneas Shinn, a self‑taught Southern cook, delights in seasoning smoked catfish with cayenne and paprika, simmering collard greens with ham hocks, baking buttery cornbread, and perfecting his
    secret sweet‑potato‑pie filling, often swapping recipes at community potlucks while occasionally over‑salting dishes when his nerves run high.
  core: Aeneas Shinn, a 57‑year‑old blues‑infused storyteller, turns spontaneous guitar riffs and hand‑painted murals into community lifelines, juggling a competitive drive and perpetual worry that fuels
    both his creative bursts and his habit of over‑committing to every neighborhood event.
background:
  cultural: Aeneas grew up in Jayess, a small town in Lawrence County, Mississippi, within a tightly knit African‑American community where church, family, and music formed the core of daily life. The rhythms
    of gospel choirs and the haunting tones of Delta blues shaped his artistic sensibility from a young age. Family gatherings, barbecues, and community picnics taught him the value of shared stories and
    mutual support. Though the region presented economic challenges, the resilience and solidarity of his neighbors fostered a strong sense of identity rooted in Southern traditions, oral storytelling,
    and a deep appreciation for cultural heritage. His upbringing also exposed him to the civil‑rights history of the South, instilling a competitive drive to assert his personal worth while remaining skeptical
    of structures that have historically marginalized his community.
attributes:
  skills: '[''Interpersonal communication'', ''Storytelling'', ''Improvisational guitar playing'', ''Basic carpentry'', ''Event coordination'', ''Adaptability'', ''Creative problem solving'', ''Mentoring
