  hobbies: '[''Playing guitar'', ''Sketching murals'', ''Attending blues festivals'', ''Community soccer'', ''Fishing'', ''Gardening'', ''Reading philosophy and African-American literature'', ''Cooking
    Southern cuisine'', ''Traveling to art fairs'', ''Participating in church choir'']'
  career_goals: Aeneas hopes to translate his community experience into a formal role as a part‑time arts facilitator or youth mentor at a local community center, where he can design spontaneous art workshops
    and music sessions. He aims to complete his GED and take a short vocational course in visual arts management, which would enable him to apply for a grant to start a mobile mural‑painting service that
    brings vibrant art to small towns across the Delta. He also wants to achieve greater financial stability, reduce his stress by establishing a modest income stream, and eventually open a small storefront
    where he can sell handcrafted wooden items and original paintings. Through these goals, he seeks personal fulfillment, a sense of purpose, and a way to give back to the community that shaped him.
