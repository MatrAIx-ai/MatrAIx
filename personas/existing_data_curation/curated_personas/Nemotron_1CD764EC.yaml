  career_goals: Yanet aims to progress from a loan officer to a senior leadership role within the next five years, targeting a position as a branch manager or director of credit risk. She plans to earn
    the Certified Financial Planner (CFP) credential and a professional credit counseling certification to deepen her expertise. Passionate about serving the Mexican‑American community in Mesa, she intends
    to launch a bilingual financial‑literacy program that offers workshops on credit building and budgeting for recent immigrants. Yanet also wants to champion the integration of fintech tools—such as AI‑driven
    credit scoring—into her institution’s workflow, and she is considering an MBA with a focus on finance and entrepreneurship to eventually start her own boutique consultancy.
