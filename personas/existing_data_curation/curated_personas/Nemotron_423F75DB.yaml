  career_goals: As she matures, Ashlee envisions a career that mirrors her love of order, reliability, and service to others. She hopes to become a registered nurse or an elementary school teacher, professions
    that provide structured daily routines and direct opportunities to help her community. In the long term she may also consider roles in healthcare administration or school counseling, where her methodical
    planning and cooperative nature can contribute to the stability and well‑being of families in East Grand Forks.
