persona_description: A marine biologist who specializes in the study of electroreception in sharks and their role in hunting and sensing temperature gradients. His research interests include the anatomy
  and function of the Ampullae of Lorenzini, as well as the use of this organ in various marine animals. He is also knowledgeable about the Jacobson's organ, its role in chemoreception, and how it is used
  by snakes to track prey. Additionally, he is knowledgeable about the speed at which trap-jaw ants snap their mandibles and the importance of this trait in their hunting behavior.
