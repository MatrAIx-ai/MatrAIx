  hobbies: '[''sailing'', ''boat maintenance'', ''woodworking'', ''model ship building'', ''digital photography'', ''contemporary art reading'', ''gallery visits'', ''chess'', ''bridge'', ''gardening'',
    ''bird watching'']'
  career_goals: Although retired, Charles aims to channel his organizational talents into volunteer leadership roles, aspiring to become a senior docent at the Cape Cod Maritime Museum and to spearhead
    a community oral‑history project capturing the stories of longtime residents. He also hopes to compile and publish a comprehensive family genealogy that ties his personal heritage to the broader history
    of East Falmouth, and to mentor younger enthusiasts in both woodworking and digital archiving.
