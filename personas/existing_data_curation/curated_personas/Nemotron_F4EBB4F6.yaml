personas:
  professional: Myles Stephens is a self‑taught teenage PC builder and Python hobbyist who applies meticulous planning and methodical problem‑solving to design custom desktop rigs and automate everyday
    tasks, and they often share their projects on online tech forums.
  sports: Myles Stephens jogs the Fort Lauderdale beachfront each sunrise, swims laps at the local community pool, and follows the Miami Dolphins, Orlando Magic, and Florida Atlantic Owls, preferring low‑key,
    schedule‑driven workouts over team sports.
  arts: Myles Stephens enjoys the atmospheric scores of Hans Zimmer and the electronic beats of Daft Punk while browsing indie game art forums, occasionally dabbling in pixel art using Python scripts, and
    finds inspiration in tech‑centric documentaries such as "The Social Dilemma".
  travel: Myles Stephens plans trips with a spreadsheet, favoring short, well‑structured road trips to nearby tech expos in Atlanta or Orlando and dreaming of a future visit to Tokyo’s Akihabara district
    to explore cutting‑edge hardware, while budget constraints keep long‑haul flights rare.
  culinary: Myles Stephens prefers quick, protein‑rich meals like grilled chicken burritos, sushi rolls, and a "DIY PC pizza" topped with pepperoni and extra cheese, cooks just enough to keep the kitchen
    tidy, and indulges in occasional energy drinks to power late‑night coding marathons.
  core: Myles Stephens blends a love of precise systems with a calm, solitary drive, turning every hobby—from PC builds to jogging routes—into a meticulously organized routine, even if that sometimes means
    over‑investing in hardware at the expense of social outings.
background:
  cultural: Myles is an African American teenager raised in Fort Lauderdale, Broward County, a region where Southern coastal culture meets a vibrant Caribbean diaspora. He grew up attending a local Baptist
    church, participating in community events such as Juneteenth celebrations and neighborhood block parties that emphasize solidarity and resilience. Family gatherings feature soulful cooking traditions,
    with dishes like collard greens and sweet potato pies reflecting deep Southern roots, while his extended family also shares Haitian and Jamaican influences present in the broader community. This multicultural
    environment has fostered his calm, cooperative demeanor and a strong sense of identity rooted in African American heritage, reverence for communal support, and an appreciation for the diverse cultural
    tapestry of South Florida.
attributes:
