  hobbies: '["Building and customizing PCs", "Learning Python through online tutorials", "Chess", "Strategy video games (Civilization, StarCraft)", "Beach jogging", "Swimming", "Reading non‑fiction (technology,
    logistics)", "Volunteer mentoring at community center"]'
  career_goals: Myles aims to complete his GED within the next two years and then enroll in a technical institute or community college to earn certifications in information technology, such as CompTIA A+
    or Cisco CCNA. He envisions a career in a structured, predictable environment—preferably as an IT support specialist, network technician, or logistics coordinator for a local shipping or transportation
    company that benefits from Fort Lauderdale's port activities. His long‑term ambition is to attain a stable, well‑defined role where his methodical problem‑solving and reliability can contribute to efficient
    operations, while also obtaining the financial independence to support his family and mentor younger peers in his community.
