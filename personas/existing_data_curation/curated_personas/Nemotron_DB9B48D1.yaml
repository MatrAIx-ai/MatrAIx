personas:
  professional: Rhonda Leng, a seasoned telecommunications infrastructure installer, leverages a decade of hands‑on expertise in copper and fiber‑optic splicing, strict adherence to standard operating procedures,
    and a calm, down‑to‑earth communication style to consistently deliver reliable network builds while mentoring apprentices toward safety excellence.
  sports: Rhonda Leng roots for the Alabama Crimson Tide and Birmingham Barons, blends modest cardio through line‑dancing at church events and early‑morning walks along Sipsey River, and regularly joins
    the Sipsey River Anglers Association for weekend fishing outings that double as her primary exercise regimen.
  arts: Rhonda Leng finds solace in quilting while listening to the soulful twang of Dolly Parton and classic gospel harmonies of The Blind Boys of Alabama, occasionally attends local community theater
    productions featuring actors like Angela Bassett, and blends her love of woodworking with the aesthetic of carpenter‑artist Sam Maloof.
  travel: Rhonda Leng favors low‑key road trips to gently rolling destinations such as the Great Smoky Mountains and historic Charleston, preferring to map out scenic routes and campsite stops in advance,
    while dreaming of a future pilgrimage to the rolling vineyards of Napa Valley for a quiet weekend of wine tasting.
  culinary: Rhonda Leng, a confident home chef, masters Southern staples like fried catfish, collard greens simmered with smoked ham hocks, and buttery cornbread, while perfecting her own canned peach preserves
    using fresh orchard peaches, pecans, and a dash of cinnamon.
  core: Rhonda Leng blends steadfast routine with a quietly rebellious streak, channeling her love for fiber‑optic cables, garden vegetables, and quilt patterns into a life that balances steadfast reliability
    with occasional impulsive splurges on seeds and yarn.
background:
  cultural: Rhonda is a white Southern woman raised and residing in Elkmont, a small town in Limestone County, Alabama. Her upbringing was steeped in Southern hospitality, church‑centered community life,
    and a strong work ethic typical of rural Alabama. She values practicality, family loyalty, and traditional customs such as weekly church attendance, home‑cooked meals, and community festivals. The regional
    culture, marked by close‑knit neighborly ties and a respect for longstanding customs, shapes her worldview and daily routines.
attributes:
  skills: '[''Fiber optic splicing'', ''Copper cable installation'', ''Line fault troubleshooting'', ''Safety compliance'', ''Use of hand and power tools'', ''Reading technical schematics'', ''Working at
    heights'', ''Preventive equipment maintenance'', ''Customer communication'', ''Team collaboration'']'
  hobbies: '[''Gardening'', ''Southern cooking'', ''Canning'', ''Church potluck attendance'', ''Line dancing'', ''Quilting'', ''Woodworking'', ''Fishing'', ''Puzzle solving'']'
  career_goals: As a pragmatic professional, Rhonda aims to deepen her technical qualifications by earning a BICSI Installer/Specialist certification and completing her associate’s degree in telecommunications
    technology. She aspires to move into a lead installer or crew supervisor role, where she can mentor newer workers and contribute to safety training programs. Ultimately, she hopes to secure a stable,
    well‑compensated position that provides for her family while allowing her to maintain the predictable routine she values.
