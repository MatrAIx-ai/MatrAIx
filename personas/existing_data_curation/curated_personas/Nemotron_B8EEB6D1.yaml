  career_goals: Although Antonio is no longer employed full‑time, he remains driven to leave a lasting impact. He aims to compile his professional experiences and personal stories into a memoir that can
    inspire younger entrepreneurs, especially those from the Honduran diaspora. He is committed to establishing a small scholarship fund for Honduran students pursuing business studies. Additionally, he
    seeks to continue volunteering as a financial advisor for local nonprofits, offering pro‑bono consulting to ensure their sustainability. Maintaining his health and mental well‑being is also a priority,
    so he aspires to stay active in community groups that provide social support and stress relief.
