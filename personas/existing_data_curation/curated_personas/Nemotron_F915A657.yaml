  hobbies: '[''Digital drawing'', ''Mixed-media collages'', ''Creative writing'', ''Scriptwriting for short videos'', ''School drama club'', ''Latin dance'', ''Reading sci-fi and graphic novels'', ''Nature
    hiking'', ''Library volunteer work'']'
  career_goals: Jaime aspires to merge art and technology to create immersive storytelling experiences. She plans to study graphic design or game art in college, aiming to become a concept artist or interactive
    media designer for a studio that values innovative and socially resonant narratives. In the short term, she wants to build a strong portfolio, attend summer art workshops, and contribute to community
    art projects that celebrate Latino heritage.
