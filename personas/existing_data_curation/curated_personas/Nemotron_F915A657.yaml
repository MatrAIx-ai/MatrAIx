personas:
  professional: Jaime Perez is an aspiring teenage digital illustrator who blends tablet sketches of original characters with experimental mixed-media collages, channeling their vivid imagination and reliability
    into a growing portfolio they showcase on a private blog.
  sports: Jaime Perez enjoys the occasional pickup soccer game with friends, follows the Miami Heat in the NBA and the Miami Dolphins in the NFL, and participates in their school's cross-country team during
    the fall, while they also attend a local dance-fitness club that blends Latin rhythms and cardio.
  arts: Jaime Perez fuels their creative spark by drawing manga-style characters on a tablet, crafting mixed-media collages inspired by artists like Hayao Miyazaki and Frida Kahlo, writing flash fiction
    that echoes the surreal tone of Neil Gaiman, and dancing to the beats of Bad Bunny, Rosalía, and J Balvin, often sharing their work in the school drama club's after-school showcase.
  travel: Jaime Perez dreams of swapping their Florida heat for the neon streets of Tokyo to attend an anime convention, but until then they’ve road-tripped to the Everglades for a wildlife hike, spent
    a weekend at Disney World in Orlando, and saved up for a future family vacation to New York City's Broadway district.
  culinary: Jaime Perez favors bold flavors, often whipping up avocado-lime smoothies, sizzling quesadillas with melty cheese and chorizo, and homemade guacamole for snack breaks, while their intermediate
    cooking skills shine when they experiment with a half-cooked arroz con pollo recipe that still needs more seasoning, though they sometimes forget to clean the kitchen afterward.
  core: Jaime Perez is a 14-year-old imagination-driven creator, who balances art-obsessed late-night sketching with a habit of forgetting to finish homework, turning every spare moment into a burst of
    creative expression that they cherish.
background:
  cultural: Jaime comes from a second-generation Cuban-American family that maintains strong ties to both Cuban and broader Latino traditions. Spanish is spoken at home, and family gatherings feature classic
    dishes like arroz con pollo, plantains, and yuca. She celebrates cultural events such as Carnaval Miami and Día de los Muertos with handcrafted altars and music. Living in Hollywood, FL, she is immersed
    in a vibrant multicultural community, which shapes her identity and fuels her appreciation for diverse artistic expressions.
