  career_goals: Demetrius aims to become a regional logistics director within the next five years, leading sustainable supply‑chain initiatives and integrating emerging technologies such as AI‑driven demand
    forecasting. He wants to champion diversity and inclusion across his organization, mentor junior logisticians, and eventually launch a consultancy that helps arts institutions streamline their logistics
    for exhibitions and touring shows, merging his passion for logistics with his love of the arts.
