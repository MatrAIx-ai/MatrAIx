  career_goals: Joel hopes to combine his love for technology and his desire to help others by studying computer science and psychology in high school, with the long‑term goal of creating digital tools
    that support mental‑health and learning for teenagers. He also dreams of working with animals, considering a future as a veterinarian or a wildlife rehabilitation specialist, and wants to contribute
    to community outreach programs that promote environmental stewardship in the Sonoran Desert.
