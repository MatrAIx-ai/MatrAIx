personas:
  professional: Joel Mooney, a 13‑year‑old budding robotics enthusiast, blends practical curiosity with a compassionate streak by designing simple Arduino‑based helpers for the Phoenix Animal Care Center,
    coding in Python and C++, and fostering teamwork in his school’s robotics club despite often forgetting to meet project deadlines.
  sports: Joel Mooney, an avid skateboarder at Southwest Skate Park and a member of his middle school basketball team, idolizes the Phoenix Suns and follows the Arizona Diamondbacks, preferring spontaneous
    park sessions over structured workouts while also volunteering to coach younger kids during community sports events.
  arts: Joel Mooney, a guitar hobbyist who strums along to Jimi Hendrix and Ed Sheeran while sketching comic panels inspired by Stan Lee and Mike Mignola, immerses himself in fantasy worlds by devouring
    Brandon Sanderson novels, letting this blend of music and visual art shape his identity despite occasional neglect of school art assignments.
  travel: Joel Mooney, who loves spontaneous family road trips to desert gems like Sedona and the Grand Canyon and dreams of exploring Tokyo’s anime districts and Barcelona’s architecture, plans trips via
    Google Maps on a shoestring budget, balancing a thirst for adventure with their parents’ modest allowance constraints.
  culinary: Joel Mooney enjoys whipping up guacamole with fresh cilantro, lime, and jalapeños, cooking simple chili con carne on evenings after skate sessions, savoring tacos al Pastor and buttery s’mores
    during Fourth of July picnics, though they often over‑season dishes in a quest for bold flavor.
  core: Joel Mooney is a curiosity‑driven, compassionate 13‑year‑old who juggles spontaneous skateboarding, coding projects, and worries about deadlines, blending community service with an earnest but sometimes
    disorganized approach to life.
background:
  cultural: 'Joel grew up in a suburban neighborhood of Phoenix within a middle‑class, largely Anglo‑American family. His upbringing reflects typical American Southwest cultural influences: celebrating
    traditional holidays like Thanksgiving and the Fourth of July, enjoying outdoor activities suited to the desert climate such as hiking, skateboarding, and community sports. His family frequently participates
    in local volunteer initiatives, including neighborhood clean‑ups and animal shelter drives, reinforcing a strong sense of community service. While his cultural background is primarily white American,
    he is exposed to Phoenix’s multicultural environment, which has broadened his awareness and appreciation for diverse perspectives.'
