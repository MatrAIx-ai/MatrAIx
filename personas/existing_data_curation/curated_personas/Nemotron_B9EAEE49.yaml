  hobbies: '[''Hiking and birdwatching'', ''Wildlife photography'', ''DIY enclosure building'', ''Playing guitar'', ''Cooking Mexican cuisine'', ''Volunteering at animal shelters'', ''Attending Tex‑Mex
    cultural festivals'', ''Reading natural‑history literature'']'
  career_goals: Ulises aims to transition from his current caretaker role into a supervisory position at a regional wildlife rehabilitation center or zoo. He plans to complete a bachelor’s degree in Animal
    Science within the next three years, earn certification as a Veterinary Technician, and develop a formal animal enrichment program that integrates his practical experience with innovative, evidence‑based
    methods. Long‑term, he dreams of establishing his own nonprofit sanctuary for rescued native Texan wildlife, where he can blend community education, hands‑on care, and sustainable habitat restoration.
