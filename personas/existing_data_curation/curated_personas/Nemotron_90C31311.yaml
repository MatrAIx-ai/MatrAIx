personas:
  professional: Min Tang is a 24‑year‑old brick, block, and stone mason in San Francisco who fuses meticulous placement of bricks with a curiosity for eco‑friendly mortars, often improvises on‑site when
    plans shift, maintains tools with careful attention despite a slightly messy workbench, and is currently completing a Local Union apprenticeship on the path to journeyman and master status.
  sports: Min Tang enjoys hiking the coastal trails of the Marin Headlands on weekends, joins a beginner rock‑climbing group at Planet Granite when the schedule allows, roots for the Golden State Warriors
    and San Francisco 49ers, and keeps fit through functional bodyweight workouts that they sometimes skip after long job shifts, preferring a relaxed, adaptable approach to fitness.
  arts: Min Tang channels creative energy through weekly pottery sessions inspired by contemporary ceramicists like Edmund de Waal, often chats with fellow makers about glaze chemistry during studio hours,
    frequents the SF MOMA to admire modern architecture exhibits featuring Frank Lloyd Wright and Mies van der Rohe, and unwinds listening to indie folk artists such as Bon Iver while sketching building
    details in a notebook.
  travel: Min Tang loves wandering San Francisco’s historic districts, has road‑tripped to Mendocino and Portland for architecture tours, dreams of exploring Kyoto’s bamboo groves, and favors low‑budget,
    ad‑hoc itineraries that they map out on the fly using public transit, often juggling travel plans around unpredictable work schedules.
  culinary: Min Tang experiments with Asian‑fusion cooking, frequently whipping up spicy miso ramen topped with taco‑style crunch, braised pork belly glazed with gochujang alongside roasted cauliflower,
    and matcha‑infused tiramisu, while harvesting fresh basil, cilantro, and mint from a balcony herb garden that they tend between job sites.
  core: Min Tang is a 24‑year‑old mason who blends rugged craftsmanship with sustainable creativity, juggling on‑site improvisations, community gardening, and flexible planning, even though their schedule
    can become a bit chaotic.
background:
  cultural: Min Ly is a second‑generation Chinese‑American whose family originates from Guangdong province. Raised in San Francisco’s Chinatown, she grew up bilingual, speaking both Mandarin (and some Cantonese)
    and English. Her upbringing blended traditional Chinese values—respect for elders, community harmony, and hard work—with the progressive, diverse culture of the Bay Area. She celebrates Lunar New Year
    and Mid‑Autumn Festival with her family, and these cultural traditions influence her collaborative, considerate nature and her desire to give back to the community.
attributes:
  skills: '["Bricklaying", "Stone setting", "Concrete mixing", "Blueprint reading", "Seismic reinforcement techniques", "Tool maintenance", "Team coordination", "Adaptable problem solving", "Basic OSHA
    safety compliance", "Bilingual communication (English/Mandarin)"]'
  hobbies: '["Hiking in the Marin Headlands", "Pottery and ceramics", "Urban exploration of historic neighborhoods", "Cooking Asian‑fusion dishes", "Volunteer work at community garden", "Reading architectural
    history", "Yoga for relaxation", "Balcony herb gardening"]'
  career_goals: She aims to complete a formal apprenticeship with the Local Union of Bricklayers, earn a journeyman certificate, and eventually become a master mason. Min Ly plans to specialize in sustainable
    building practices, such as using low‑carbon mortar and salvaged stone, and hopes to launch her own small contracting firm that emphasizes eco‑friendly construction and mentorship for women and minorities
    in the trades. She also aspires to obtain the Certified Masonry Professional (CMP) credential and contribute to historic preservation projects in San Francisco’s older districts.
