  career_goals: As a teenager, Rajasekhar dreams of turning his love for art and technology into a career that blends both. He aspires to study visual arts and computer science in college, aiming to become
    a game designer or UI/UX artist who creates inclusive, story‑driven experiences that can also support mental well‑being. He is fascinated by the idea of using interactive media to help peers cope with
    stress and anxiety, reflecting his own sensitivity to negative emotions. Long‑term, he hopes to open a small studio that merges South Asian visual motifs with modern digital design, while also mentoring
    younger students in his community to nurture their creativity.
