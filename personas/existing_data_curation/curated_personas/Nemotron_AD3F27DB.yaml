  career_goals: Although retired, Luis remains driven to leave a lasting intellectual legacy. He aims to establish a small scholarship fund for Guatemalan students pursuing STEM degrees, to volunteer as
    a guest lecturer at local community colleges, and to contribute his expertise to a regional museum’s exhibit on the history of renewable energy in the Intermountain West. He also seeks to author a memoir
    that intertwines his professional achievements with reflections on his cultural heritage, hoping to inspire both younger engineers and members of the Guatemalan diaspora.
