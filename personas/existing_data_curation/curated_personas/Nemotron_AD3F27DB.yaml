  hobbies: '[''Watercolor painting'', ''Contemporary art reading'', ''Jigsaw puzzles'', ''Museum and gallery visits'', ''Small‑group lectures'', ''Chess'', ''Bridge'', ''Mentoring board‑game beginners'',
