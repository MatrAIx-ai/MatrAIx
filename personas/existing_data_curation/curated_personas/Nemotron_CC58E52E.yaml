  hobbies: '[''Gardening (vegetables and native plants)'', ''Hiking in the Sierra foothills'', ''Volunteer computer tutoring for seniors'', ''Reading historical biographies and genealogy'', ''Community
    theater acting and production'', ''Repairing vintage radios'', ''Digital photography of local events and landscapes'', ''Hosting dinner gatherings'', ''Participating in church and community events'']'
  career_goals: Although retired from formal employment, Michael aims to remain an active civic contributor in Rocklin. His goals include serving on the board of the local historical society to preserve
    the region’s Gold Rush heritage, mentoring small‑business owners through a community entrepreneurship program, completing a memoir that weaves personal anecdotes with local history, and mastering digital
    photography to document community events. He also aspires to expand the senior‑center computer‑assistance program, and to help establish a neighborhood garden that combines his love of horticulture
    with community building.
