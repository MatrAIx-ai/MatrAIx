  career_goals: She aims to progress to a regional Director of Marketing within the next three to five years, overseeing multiple product lines across the Southwest. She plans to champion data‑driven decision
    making, build a mentorship program for women and bilingual marketers, and eventually launch her own boutique agency that helps local businesses authentically engage Hispanic audiences.
