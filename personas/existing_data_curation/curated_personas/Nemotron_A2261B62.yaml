personas:
  professional: An experienced senior marketer, Elizabeth Figueroa blends data‑driven strategy with creative execution, preferring reliable routines while staying flexible enough to pivot when needed, and
    they leverage their outgoing nature to forge strong client relationships and champion bilingual market insights for Southwest brands.
  sports: A community‑focused fitness enthusiast, Elizabeth Figueroa participates in weekly Zumba classes, hikes the Sonoran desert trails, cheers for the Arizona Diamondbacks and Phoenix Suns, they also
    join a local recreational soccer league on weekends, and treat their love of group activity as a vital outlet for social energy.
  arts: A culturally attuned arts lover, Elizabeth Figueroa attends annual Día de los Muertos festivals, enjoys the music of Lila Downs and Natalia Lafourcade, visits the Phoenix Art Museum to view contemporary
    mural work, they collect vintage vinyl records and host monthly brunches featuring live acoustic performances by local singer‑songwriters.
  travel: A weekend explorer with a penchant for cultural immersion, Elizabeth Figueroa has road‑tripped to Santa Fe for its Pueblo art, trekked the Grand Canyon’s South Rim, dreams of touring Oaxaca’s
    historic markets, they plan trips around family festivals and often book flights on a flexible budget, balancing work commitments with a desire for authentic experiences.
  culinary: A passionate home cook, Elizabeth Figueroa masters dishes like pozole, chiles en nogada, and homemade salsa verde, they source fresh corn masa and local avocados at farmers’ markets, enjoy hosting
    brunches featuring huevos rancheros, and admit to occasionally over‑seasoning meals when multitasking between conference calls.
  core: Elizabeth Figueroa, a 42‑year‑old marketing strategist, balances routine‑driven professionalism with an outsized love for community festivals, occasional budgeting slip‑ups, and a quirk of juggling
    brunch prep while on conference calls, they thrive on social energy.
background:
  cultural: Raised in a Mexican‑American family in Arizona, Elizabeth grew up bilingual, celebrating traditions such as Día de los Muertos and Cinco de Mayo. Her upbringing emphasized family closeness,
    community involvement, and a strong work ethic. She blends these cultural values into her professional life, often integrating Hispanic market insights into her marketing strategies.
