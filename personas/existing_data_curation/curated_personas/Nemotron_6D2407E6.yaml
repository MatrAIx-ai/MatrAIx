personas:
  professional: Shuntina Mclaughlin, a budding digital illustrator and indie game prototype developer, merges meticulous sketching, iPad painting, and Python coding with a sharp, competitive eye, turning
    her relentless curiosity and skeptical critique into polished character designs that consistently garner praise on TikTok and in her school art showcase.
  sports: Shuntina Mclaughlin energizes her week with after‑school basketball at the Eastside Hoopers youth club, summer volleyball pick‑up games at the local park, regular yoga workshops at the community
    center, and a fervent following of the Denver Nuggets, using this blend of high‑intensity drills and mindful stretching to channel her competitive spirit and manage stress.
  arts: Shuntina Mclaughlin draws inspiration from Studio Ghibli’s whimsical animation, the subversive street art of Banksy, and the vibrant murals of her community, syncing her piano improvisations to
    the smooth grooves of Miles Davis, the soulful R&B of H.E.R., and the rhythmic flow of Kendrick Lamar, while regularly streaming avant‑garde theater performances starring Benedict Cumberbatch and indie
    films directed by Greta Gerwig for creative fuel.
  travel: Shuntina Mclaughlin, who has trekked the misty trails of the Great Smoky Mountains and explored the neon streets of Tokyo during a school exchange, prefers meticulously planned, budget‑friendly
    trips that blend cultural immersion with artistic discovery, while daydreaming about future solo adventures to Reykjavik’s geothermal wonders in Iceland and the historic murals of Valparaíso, Chile.
  culinary: Shuntina Mclaughlin, an enthusiastic home chef, whips up avocado toast topped with poached eggs and a drizzle of sriracha, experiments with homemade miso ramen featuring pork belly, soft‑boiled
    egg, and fresh shiitake mushrooms, and indulges in bubble tea made with tapioca pearls and jasmine milk, all while documenting her culinary experiments on TikTok.
  core: Shuntina Mclaughlin is a hyper‑creative, anxiety‑prone teen who transforms sleepless nights into pixel‑perfect sketches, fuels her competitive spark with impulsive snack binges, and never misses
    a chance to share a time‑lapse of her art, even if it means staying up past her bedtime.
background:
  cultural: Shuntina is a Black teenager raised in Tyler, Texas, growing up in a multicultural household where her mother’s African‑American heritage and her father’s Irish roots blend. She is part of a
    close‑knit church community that emphasizes gospel music, storytelling, and service, and she often participates in local Juneteenth celebrations and school cultural‑awareness events. The Southern environment
    has given her a love for soulful food, Southern hospitality, and a resilient sense of identity. Navigating a predominantly white suburb has made her attuned to both the challenges and strengths of being
    Black in Texas, fueling her desire to use art as a voice for her community.
