  hobbies: '[''Sketching'', ''Digital painting'', ''Playing piano'', ''Reading sci‑fi novels'', ''Coding mini‑games'', ''Debate club'', ''Creating TikTok art videos'', ''Community mural projects'', ''Dancing'',
    ''Yoga'']'
  career_goals: Shuntina aims to earn a spot in a specialized high‑school art program and later study graphic design or animation at a university, with the long‑term dream of working at a creative studio
    that produces socially conscious media. She hopes to combine her art with her interest in mental‑health advocacy, creating visual campaigns that raise awareness among teens. In the short term she wants
    to win the regional student art competition, secure a summer mentorship with a local illustrator, and build a portfolio that could lead to freelance commissions.
