  career_goals: William aims to transition into a senior technical leadership role, such as a Lead Engineer or Solutions Architect, where he can shape project architecture while mentoring junior developers.
    He is motivated to deepen his expertise in cloud-native architecture and accessibility, hoping to champion inclusive design practices in his organization. Balancing professional growth with family stability,
    he seeks a role that offers predictable income and the flexibility to work remotely part‑time, reducing stress and allowing more quality time with his spouse. Long‑term, he dreams of launching an open‑source
    library that simplifies creating accessible web components.
