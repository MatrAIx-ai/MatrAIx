personas:
  professional: William Abdelqader, a 38‑year‑old full‑stack web developer, leverages deep expertise in React, TypeScript, Node.js, and AWS to craft accessible, high‑performance web applications, while
    their practical, structured mindset balances rigorous code quality with the flexibility to adapt to evolving project needs, and they quietly mentor junior teammates despite occasional disorganization.
  sports: William Abdelqader regularly tackles the Cascade peaks and rides the emerald‑city bike routes, joining the Seattle Cycling Club for weekend group rides while cheering on the Seattle Seahawks and
    Sounders FC, and they view fitness as a structured yet adventurous antidote to work‑related stress.
  arts: William Abdelqader captures sunrise over misty forests with a Canon EOS R, drawing inspiration from Ansel Adams and Alex Webb, while unwinding with board games like Catan and listening to Radiohead
    and the podcast 'Science Fiction Now', and they consider each photograph a meditation on the intersection of landscape and urban life.
  travel: William Abdelqader blends meticulous itinerary planning with spur‑of‑the‑moment detours, favoring weekend getaways to the Olympic Peninsula and long‑haul trips like a summer trek through Iceland’s
    Golden Circle, yet they often postpone overseas adventures to accommodate family commitments.
  culinary: William Abdelqader whips up spiced lamb kofta alongside cedar‑plank smoked salmon, marrying family recipes of za'atar‑seasoned hummus with Pacific Northwest staples like wild mushrooms and artisanal
    cheese, and they relish sourcing fresh thyme and locally foraged kale at the farmer’s market to fuel their culinary experiments.
  core: William Abdelqader, a 38‑year‑old full‑stack developer, balances a love of structured code and spontaneous hikes, wrestling with chronic worry while channeling that tension into meticulous open‑source
    work, garden‑to‑table cooking, and a steady stream of camera clicks.
background:
  cultural: William grew up in the Seattle metropolitan area in a culturally blended household. His father emigrated from the Levant, bringing traditions such as celebrating Eid, cooking hummus, and storytelling
    about Middle Eastern heritage, while his mother’s family roots are in the Pacific Northwest’s white American community. This mix fostered an appreciation for diverse cuisines, languages, and holidays—he
    regularly observes both Thanksgiving and Ramadan with his family. Living in Bothell, Washington, he is immersed in the region’s tech‑focused, environmentally conscious culture, often participating in
    local hackathons, community clean‑up events, and outdoor recreation clubs. His multicultural upbringing and inclusive community values shape his collaborative work style and his commitment to fostering
    harmony both at home and in the workplace.
