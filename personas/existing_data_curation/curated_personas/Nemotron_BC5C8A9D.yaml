  hobbies: '[''Zumba classes'', ''Yoga'', ''Book club'', ''Cooking Southern cuisine'', ''Baking pies'', ''Gardening'', ''Hiking'', ''Church choir'', ''Community health volunteering'', ''Photography'', ''Running
    club'']'
  career_goals: Anne aims to become a lead dental hygienist within the next three years, taking on supervisory responsibilities and mentoring newer staff. She plans to pursue a bachelor's degree in public
    health to broaden her impact on community oral health, especially in underserved areas of Alabama. Long‑term, she envisions developing a mobile oral health outreach program that partners with local
    schools and churches, and she hopes to earn specialized certification in periodontal hygiene to expand the range of services she can provide. Participation in professional organizations such as the
    American Dental Hygienists' Association and speaking at regional health fairs are also key milestones in her career plan.
