personas:
  professional: Anne Frazer, a diligent dental hygienist with a keen eye for detail, leverages their manual dexterity and evidence‑based approach to deliver meticulous preventive care while actively pursuing
    leadership roles, a public health bachelor's degree, and mentorship opportunities to expand community impact.
  sports: Anne Frazer, an avid member of the Birmingham 5K running club, mixes cardio sessions with weekly Zumba and yoga classes, hikes the trails of Talladega National Forest on weekends, and passionately
    roots for the Alabama Crimson Tide and Birmingham Barons, blending competitive spirit with community camaraderie.
  arts: Anne Frazer, a devoted choir singer, mystery‑novel enthusiast, and budding photographer, finds inspiration in the melodic harmonies of Ella Fitzgerald, the intrigue of Agatha Christie’s whodunits,
    and the natural light captured in Ansel Adams’ landscapes, often showcasing their own Alabama scenery at community art fairs.
  travel: Anne Frazer, a weekend road‑trip aficionado, frequently explores nearby gems like Savannah, Charleston, and New Orleans with a tightly planned itinerary, while dreaming of a future hike in the
    Grand Canyon and a culinary tour of Provence, balancing group travel logistics with spontaneous photo‑stop detours.
  culinary: Anne Frazer, a competent home cook, delights in perfecting Southern comfort classics such as crispy fried chicken, buttery biscuits, and a caramel‑rich pecan pie, often seasoning dishes with
    fresh basil, thyme, and rosemary harvested from their herb garden, while occasionally experimenting with global flavors like Thai basil chicken.
  core: Anne Frazer, a structured yet sociable dental hygienist, blends meticulous care with community‑centric energy, balancing disciplined finances, proactive health habits, active group fitness, creative
    arts, and a love for Southern cooking and purposeful travel.
background:
  cultural: Anne grew up in Smiths Station, a close‑knit community in Russell County, Alabama. Her family emphasized Southern hospitality, church involvement, and the value of education, which guided her
    path to a STEM degree at Auburn University. She cherishes regional traditions such as family gatherings, church potlucks, and the annual county fair. Her cultural identity is shaped by a love of Southern
    music—country and gospel—comfort foods like collard greens and pecan pie, and a deep sense of community responsibility. These influences permeate her personal and professional life, fostering a collaborative
    spirit, a respect for routine, and a commitment to serving others.
attributes:
  skills: '[''Preventive dental care'', ''Scaling and root planing'', ''Ultrasonic instrumentation'', ''Dental radiography'', ''Infection control'', ''Dental charting'', ''Patient assessment'', ''Manual
