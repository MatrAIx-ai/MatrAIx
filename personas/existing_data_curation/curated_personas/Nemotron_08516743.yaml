  career_goals: Jazmin aspires to attend a STEM‑focused high school and eventually earn a degree in biomedical engineering, aiming to design affordable medical devices that benefit underserved communities,
    especially those sharing her Mexican heritage. She is eager to participate in community outreach programs that teach STEM concepts to younger students. Long‑term, she envisions a career that blends
    technical innovation with service, potentially complemented by further studies in public health or education to broaden her impact on her community.
