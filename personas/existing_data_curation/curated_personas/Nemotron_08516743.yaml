personas:
  professional: Jazmin Bruno is a budding robotics enthusiast who channels the disciplined, methodical mindset honed through chess and competitive video games into leading their middle-school Scratch coding
    projects and robotics club initiatives, and they balance a competitive edge with reliable teamwork.
  sports: Jazmin Bruno is a midfield dynamo on their middle-school soccer team, they attend after-school practices twice a week with the local youth club, they model their play after the star forward of
    the nearby MLS franchise, and they apply chess-style strategic thinking to anticipate opponents’ moves on the field.
  arts: Jazmin Bruno is a passionate folkloric dancer who rehearses traditional steps for school cultural showcases, they lose themselves in mystery novels by Agatha Christie and James Patterson during
    quieter moments, and they find inspiration in the vibrant guitar work of Carlos Santana, weaving music and movement into their creative expression.
  travel: Jazmin Bruno dreams of exploring the ancient ruins of Teotihuacan and the bustling markets of Oaxaca, yet they currently maximize weekend trips to the nearby state park for family picnics, and
    they meticulously plan each outing in a spreadsheet to balance soccer practice, robotics club, and study time.
  culinary: Jazmin Bruno loves rolling masa for tamales and finely dicing tomatoes for pico de gallo, proudly serving their family’s favorite spicy salsa, yet they often over-salt the pico de gallo in their
    enthusiasm, and they enjoy adding a splash of lime to tamales for an extra zing.
  core: Jazmin Bruno is an organized, socially-charged teen who blends a love for soccer, robotics, and traditional cooking into a competitive yet reliable personality, even if they occasionally over-commit
    and forget to stretch.
background:
  cultural: Jazmin grows up in a Mexican‑American household in Austin, Texas, where Spanish is spoken at home and English at school. Her family maintains cultural traditions such as celebrating Día de los
    Muertos, cooking family recipes, and attending local Mexican festivals in the city. The vibrant multicultural environment of Austin, combined with strong familial ties, shapes her values of community,
    respect for heritage, and a blend of Mexican and Texan influences. She is bilingual, bicultural, and actively participates in community events that honor her roots while embracing the broader American
    context.
