personas:
  professional: Korda Powell, an aspiring young robotics engineer, channels a blend of curiosity and practicality into building intricate LEGO mechanisms and Scratch programs, and their competitive streak
    drives them to dominate school MathCounts challenges while their skeptical eye constantly questions each design.
  sports: Korda Powell spends afternoons at the neighborhood batting cage practicing swings for the Shepherdsville Little League tee‑ball team, idolizes the Louisville Bats and Kentucky Wildcats, and approaches
    fitness with a methodical, puzzle‑solving mindset that prefers precision drills over chaotic scrimmages.
  arts: Korda Powell dives into sci‑fi novels by Isaac Asimov and sketches mechanical contraptions inspired by the animated series 'The Magic School Bus', while their playlist cycles through Imagine Dragons
    and the orchestral scores of 'Star Wars', weaving these influences into an imaginative hobby that fuels both creativity and problem‑solving.
  travel: Korda Powell prefers low‑key family road trips to nearby woods and the Mammoth Cave National Park, cherishes annual visits to the county fair, and dreams of one day exploring the Kennedy Space
    Center in Florida, planning each outing with a detailed checklist that eases their worry about the unknown.
  culinary: Korda Powell, a budding kitchen helper, favours Southern comfort dishes like fried chicken, biscuits and gravy, and cheesy macaroni, often mixing peanut butter with honey for a quick sandwich,
    while their modest cooking skills shine when assembling chocolate‑chip cookies under Mom’s watchful eye.
  core: Korda Powell is an 8‑year‑old puzzle‑obsessed strategist who balances a relentless competitive edge with a nervous tendency to overthink, preferring quiet LEGO builds over noisy playground chatter.
background:
  cultural: Korda lives in Shepherdsville, Kentucky, a small city in Bullitt County where Southern hospitality and community values are common. His family is middle‑class, with roots in the region that
    include a mix of rural traditions—like weekend trips to the nearby countryside, county fairs, and local church gatherings—combined with modern influences such as internet access and popular media. He
    attends a public elementary school that emphasizes both core academics and extracurricular competitions like spelling bees and MathCounts. The community supports youth activities, offering him opportunities
    to join a church Sunday school, a local robotics club, and a 4‑H program that reflects the region’s appreciation for hands‑on learning and self‑reliance. While he enjoys the comfort of family meals
    and local sports events, his reserved nature leads him to prefer smaller, familiar groups over larger gatherings.
