  career_goals: Korda dreams of a future where he can design and build things that solve real problems. He is fascinated by how machines work and hopes to become an engineer—perhaps a robotics or aerospace
    engineer—so he can create robots or explore space. He also imagines himself competing in science fairs and math contests, aiming to earn top honors for his inventions. While still enjoying the idea
    of playing on a baseball team, his primary ambition is to turn his curiosity and practical skills into a career that lets him innovate and lead projects.
