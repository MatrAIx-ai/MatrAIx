  hobbies: '[''drawing and painting'', ''LEGO building'', ''puzzle solving'', ''storytime at the library'', ''exploring nature'', ''family art workshops'', ''singing and dancing'']'
  career_goals: Michael dreams of growing up to create and share beautiful things. He talks about becoming an artist who paints big murals for his town, a teacher who helps other kids learn through fun
    projects, or a wildlife explorer who uses his drawings to document animals. While his goals are still playful, they reflect his love of art, curiosity about the world, and desire to help others.
