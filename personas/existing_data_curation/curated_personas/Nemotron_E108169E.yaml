personas:
  professional: Michael Griner is a budding junior architect, constructing imaginative forts from wooden blocks and cereal boxes, showcasing curiosity, organization, and a cooperative spirit as they share
    designs with classmates.
  sports: Michael Griner loves playing on the Quincy Little Lions’ tiny soccer team, they also enjoy t‑ball with the local youth baseball club and ride a small bike along the riverfront trail during warm
    afternoons.
  arts: Michael Griner delights in drawing whimsical creatures during Quincy Public Library story time, they are fascinated by the vibrant illustrations of Dr. Seuss and Eric Carle, and they eagerly join
    community mural workshops led by local artist Helen Parry.
  travel: Michael Griner enjoys weekend trips to the Mississippi Riverfront park and annual family visits to the St. Louis Zoo, they dream of exploring Disney World in Florida and seeing the pyramids of
    Egypt one day.
  culinary: Michael Griner prefers peanut butter & jelly sandwiches and cheesy macaroni, they love mixing fresh strawberries into yogurt and proudly sprinkle shredded cheddar on their mini homemade pizzas,
    though they occasionally sneak a bite of hot sauce for a daring kick.
  core: Michael Griner is a curious five‑year‑old who balances meticulous block building with spontaneous crayon sketches, often leaving bright artwork on every surface they touch.
background:
  cultural: Michael is raised in Quincy, Illinois, a small Midwestern community where family gatherings, school events, and local fairs shape daily life. His family blends typical Midwestern values—politeness,
    community spirit, and a love for outdoor activities—with occasional participation in church celebrations and the county harvest festival. Access to the Quincy Public Library and community art programs
    provides early exposure to literature and creative expression, reinforcing his curiosity and appreciation for art.
