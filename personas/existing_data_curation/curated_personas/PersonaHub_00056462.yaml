  time. They are also interested in the natural environment of the area, such as the maars and lakes formed by the eruption of basaltic magma. This person is likely to have a deep understanding of the cultural,
  social, and environmental history of the region, and is interested in understanding how these factors have shaped the lives of the people who lived there.
