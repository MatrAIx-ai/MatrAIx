  hobbies: '[''Traditional cooking and recipe sharing'', ''Church choir and volunteer service'', ''Watching soccer and debating matches'', ''Gardening and small‑scale horticulture'', ''Card games and dominoes'',
    ''Storytelling and community gatherings'']'
  career_goals: Although Brian is officially retired, he aims to stay active by expanding his volunteer work. He hopes to launch a weekly Cocina y Cultura workshop at the local senior center where he can
    teach Salvadoran cooking and share cultural stories. He also wants to become a regular volunteer docent for the Forsyth County cultural heritage tours, using his personable nature to guide visitors.
    In the long term, Brian dreams of contributing a small chapter of oral histories from the Salvadoran diaspora to the regional museum, preserving the community’s legacy for future generations.
