personas:
  professional: Brian Centenotorres, a retired handyman turned senior‑center culinary mentor, they blend their practical home‑maintenance know‑how with a love for communal cooking, using their routine‑driven,
    talkative nature to orchestrate weekly Cocina y Cultura workshops and guide visitors through heritage tours.
  sports: Brian Centenotorres, a die‑hard soccer enthusiast, they never miss a live broadcast of the national team from their childhood country, gather with friends at the local bar to cheer, and they also
    enjoy watching the nearby minor league baseball team, the Winston‑Salem Dashers, while occasionally participating in senior‑friendly walking football matches at the community park.
  arts: Brian Centenotorres, an active member of their church choir and local cultural festivals, they relish singing traditional folk hymns, listening to the nostalgic tunes of Los Panchos and contemporary
    Latin pop artist Carlos Vives, and they often organize community dance nights featuring vibrant cumbia rhythms, reflecting their love for shared artistic experiences.
  travel: Brian Centenotorres, an adventurous yet routine‑loving retiree, they plan annual trips to the highland town where their parents grew up, savoring the familiar street markets and family reunions,
    while also taking short weekend drives to nearby wineries in the Yadkin Valley and occasional pilgrimages to historic Catholic shrines in the Carolinas.
  culinary: Brian Centenotorres, a master of traditional home cooking, they excel at crafting perfect pupusas stuffed with cheese and loroco, slow‑cooking tamales wrapped in banana leaves, and frying yuca
    with garlic and lime, often pairing these dishes with fresh salsa verde made from garden‑grown tomatillos and jalapeños.
  core: Brian Centenotorres, a sociable, routine‑oriented community elder, they blend a love for cooking, gardening, and storytelling into a vibrant life of service, though they sometimes let disorganization
    slip in paperwork and forget to refill meds.
background:
  cultural: Brian was born to Salvadoran parents who immigrated to the United States in the early 1960s. He grew up speaking Spanish at home while attending English‑language schools, giving him a bicultural
    identity. Salvadoran customs—such as celebrating Las Posadas, cooking pupusas for family gatherings, and observing Catholic holidays—remain central to his life. He maintains close ties with a small
    network of Salvadoran families in the Winston‑Salem area and often participates in cultural festivals that showcase Central American music, dance, and food. His upbringing taught him the value of community,
    hospitality, and perseverance, which continue to shape his interactions and outlook.
attributes:
  skills: '[''Spanish‑English bilingual communication'', ''Traditional Salvadoran cooking'', ''Basic home repair and carpentry'', ''Garden maintenance'', ''Community event coordination'', ''Mentoring and
