personas:
  professional: Alex Salyer, a six‑year‑old aspiring engineer, channels their love of LEGO and dinosaur picture books into meticulous building projects, thriving on predictable step‑by‑step instructions
    while occasionally drifting toward spontaneous improvisation, and practices cooperative play by sharing designs with a small circle of friends.
  sports: Alex Salyer, a six‑year‑old who enjoys quick sprints on the playground and swings at the local park, plays on the Little Kickers Soccer Club’s Saturday practice team, cheers for the Chicago Cubs,
    and prefers short, structured play sessions over prolonged competitive matches.
  arts: Alex Salyer, a six‑year‑old who delights in drawing vibrant dinosaur and space scenes, flips through picture books by Dr. Seuss, listens to Disney soundtracks, often mimics famous artists by coloring
    with wax crayons, and proudly displays their creations on the refrigerator.
  travel: Alex Salyer, a six‑year‑old who loves short nature walks in nearby parks, has visited the interactive dinosaur exhibit at the Field Museum in Chicago, dreams of seeing the towering redwoods in
    California’s Redwood National Park, and prefers family‑led trips that balance predictable schedules with occasional spontaneous exploration.
  culinary: Alex Salyer, a six‑year‑old who helps whisk cookie dough and adores the smell of fresh chocolate chip cookies, favors simple meals like mac‑and‑cheese with peas, enjoys sprinkling cinnamon on
    pancakes, and delights in snack‑time bites of apple slices dipped in peanut butter.
  core: Alex Salyer, a six‑year‑old who blends a love for structured LEGO builds with occasional anxious worry, finds comfort in quiet solo activities, and balances a modest allowance with a disciplined
    savings habit.
background:
  cultural: Alex was raised in a white, middle‑class family in Bossier City, Louisiana. His family participates in local community traditions such as church Sunday school, seasonal festivals like Mardi Gras
    parades, and high‑school football games, exposing him to Southern hospitality and modest religious values. The household blends typical Southern cuisine with family meals, and Alex often hears stories
    about the region’s history while enjoying regional holidays like Thanksgiving and Fourth‑of‑July fireworks.
