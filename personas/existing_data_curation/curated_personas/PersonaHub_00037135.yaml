persona_description: A healthcare provider, particularly a midwife or labor and delivery nurse, who is knowledgeable about the signs and symptoms of labor, as well as the proper care and management of labor
  and delivery. They are skilled in recognizing and responding to the various changes that occur during labor, including changes in the cervix and the uterus, as well as the onset of labor itself. They
  are also knowledgeable about the different types of labor and delivery, including false labor and the differences between true labor and false labor. They are interested in providing high-quality care
  to expectant mothers and their families, and are committed to ensuring that labor and delivery are as safe and comfortable as possible.
