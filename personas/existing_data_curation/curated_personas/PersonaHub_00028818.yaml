persona_description: A historian who specializes in the exploration and discovery of Yellowstone National Park, particularly its impact on Native American communities, the role of John Colter and Nathaniel
  Langford in the early exploration of the park, and the efforts of the Army to manage and preserve the park until its transfer to the National Park Service in 1916. The historian also has a deep interest
  in the history of the park's wildlife, its natural resources, and the cultural significance of the park to Native American communities.
