persona_description: A multidisciplinary scientist who specializes in the development and natural history of mood disorders, particularly in children and adolescents. This individual is passionate about
  expanding and accelerating research on mood disorders and has expertise in areas such as genetics, environment, and treatment. They are interested in the etiology and developmental course of mood disorders
  and have experience in conducting multidisciplinary research. They are also interested in the impact of successful treatment of juvenile depression and the development of a collaborative multisite multidisciplinary
  Network of Research Programs on Pediatric-Onset Bipolar Disorder.
