  career_goals: Bruce aims to move into a supervisory role within the Bristol city dispatch center within the next three years, seeking to lead a team and spearhead the adoption of advanced CAD analytics.
    He plans to earn a Certified Emergency Dispatcher credential and attend emergency management workshops to broaden his expertise. Ultimately, he would like to transition into a county‑wide emergency
    operations coordinator role, where he can design more resilient communication protocols and mentor younger dispatchers. His competitive streak drives him to become the top performer on his shift, and
    he is motivated to reduce the stress he experiences on the job by advocating for better shift rotation schedules and mental‑health resources.
