persona_description: A tower controller who is responsible for operating and maintaining Surface Movement Radar (SMR) equipment in a control tower. The controller needs to obtain an additional endorsement
  GMS to operate the SMR equipment on the ADI rating. The controller's primary role is to enhance the situational awareness of tower personnel regarding the manoeuvring area, monitor the movement of aircraft
  and vehicles on the manoeuvring area, provide routing information to pilots and vehicle drivers as necessary, and provide advice and assistance for the safe and efficient movement of aircraft and vehicles
  on the manoeuvring area. The controller also needs to be familiar with the working principle of the SMR and its limitations, and be able to combine it with an ADS-B receiver to display additional information
  on the controller screen.
