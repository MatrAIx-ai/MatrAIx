  hobbies: '[''Sketching rural scenery'', ''Digital painting'', ''Reading speculative fiction'', ''Writing short stories'', ''Exploring indie video games'', ''Attending local art workshops'', ''Hiking and
    nature photography'', ''Listening to experimental music'', ''Journaling ideas'', ''Participating in community theater'']'
  career_goals: Noah aims to secure admission to a reputable art or design program, ultimately pursuing a career as a concept artist for video games or visual media. He envisions developing a freelance
    portfolio that blends his love for abstract storytelling with cutting‑edge digital techniques, and eventually establishing his own independent studio to collaborate on innovative projects. To achieve
    this, he plans to obtain a GED, build a robust body of work, and seek mentorship through online art communities and local workshops.
