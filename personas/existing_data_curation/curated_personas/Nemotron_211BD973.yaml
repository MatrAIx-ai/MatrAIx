personas:
  professional: Noah Knauer, a sixteen‑year‑old aspiring concept artist, merges traditional sketching of Indiana’s rolling farmland with digital illustration on their tablet, leveraging a methodical workflow
    and research‑driven storytelling to produce polished art pieces that reflect their intellectual curiosity and organized nature.
  sports: Noah Knauer participates in weekend hikes with the Hoosier Trailblazers club, follows the Indiana Pacers and Indianapolis Colts avidly, enjoys playing pick‑up basketball at school, and occasionally
    joins the high school cross‑country team during the fall season for cardio balance.
  arts: Noah Knauer immerses themselves in visual and narrative arts, drawing inspiration from digital illustrators like Loish and Kim Jung Gi, animators such as Hayao Miyazaki, speculative fiction authors
    including Neil Gaiman and China Miéville, and ambient musicians like Aphex Twin, while regularly attending local indie film screenings and community art workshops.
  travel: Noah Knauer prefers self‑planned road trips that combine sketching sessions in nature, having already explored the scenic rim of Indiana Dunes and a weekend getaway to Chicago, while dreaming
    of photographing Iceland’s waterfalls and hiking Japan’s Kumano Kodo trails during future school breaks.
  culinary: Noah Knauer enjoys experimenting with simple yet fresh meals, favoring dishes like avocado toast with radish slices, homemade ramen broth infused with miso and shiitake mushrooms, and seasonal
    farm‑to‑table salads featuring heirloom tomatoes and basil, though they often forget to clean their kitchen workspace promptly.
  core: Noah Knauer is a methodical teen artist who channels boundless imagination into sketchbooks and digital canvases, yet habitually procrastinates sleep to finish indie game narratives, treats coffee
    as a creative crutch, and meticulously tracks every artistic expense.
background:
  cultural: Raised in Silver Lake, a small town in Wabash County, Indiana, Noah grew up within a predominantly white, Midwestern community that values self‑reliance, modesty, and close‑knit social ties.
    Family gatherings, church events, and local fairs have shaped his sense of belonging, while the agricultural landscape nurtures his appreciation for natural beauty and seasonal rhythms. These cultural
    influences blend with his imaginative curiosity, fostering a grounded yet exploratory outlook on life.
attributes:
  skills: '[''Digital illustration'', ''Traditional sketching'', ''Conceptual art'', ''Creative writing'', ''Storyboarding'', ''Project planning'', ''Research and information synthesis'', ''Basic photography'',
