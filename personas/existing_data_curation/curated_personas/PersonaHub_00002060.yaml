persona_description: A respiratory physician who specializes in the treatment of respiratory and nasal allergy, particularly desensitisation treatment for allergies. He has directed his main research efforts
  towards aerobiology, which involves the capture, identification, and counting of the pollens and spores which cause seasonal hay fever and asthma, and with effective desensitisation which is actually
  a form of allergy treatment. He has used desensitisation treatment for respiratory and nasal allergy, which made it unnecessary for the doctor to know the cause of the patient's problem in most cases
  of respiratory or nasal allergy. However, desensitisation treatment became impossible from 1986, and he has been dependent on suppressive drugs for the treatment of allergy. He has directed his research
  efforts towards improving chest deformities in children and adults, and has published several papers on the topic. He has also published papers on the effects of oral steroids and inhaled steroids on
  the respiratory system.
