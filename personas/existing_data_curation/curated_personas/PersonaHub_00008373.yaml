persona_description: A researcher in marine biology, particularly focused on the study of dolphin behavior and the interaction between humans and dolphins in the coastal waters of southern Brazil. The researcher
  has been studying this unique hunting community for 15 years and has published their observations in the specialist journal "PNAS". The researcher is currently conducting model calculations to predict
  the future of this special cultural fishing tradition and has proposed several steps to preserve the common hunt of fishermen and dolphins, including determining the causes of the decline in mullet numbers
  and encouraging traditional practice.
