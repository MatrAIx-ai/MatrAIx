persona_description: A professional with expertise in State and Tribal Historic Preservation, specifically the Idaho State Historical Society and the Nez Perce and Coeur d'Alene Indian Tribes. This individual
  is responsible for administering the State Historic Preservation Program, providing grants to local governments, maintaining the inventory of archaeological and historical sites and historic buildings
  and structures, administering the Federal tax incentives program, and providing educational and technical assistance on historic preservation issues. They are also involved in the 106 Review process,
  ensuring that Federal agencies take into account the effects of their undertakings on historic properties and afford the Advisory Council on Historic Preservation an opportunity to comment. Additionally,
  they are responsible for the National Register of Historic Places program for the State, which they must approve each State program.
