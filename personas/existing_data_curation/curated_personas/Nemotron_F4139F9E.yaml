  hobbies: '[''digital sketching'', ''science-fiction and fantasy reading'', ''playing saxophone'', ''basketball (pick‑up games)'', ''photography of urban street art'', ''attending open‑mic poetry nights'',
    ''cooking Southern soul food'', ''volunteering at community art workshops'']'
  career_goals: Winston aims to formalize his creative skill set by enrolling in a community college program for visual communications and eventually pursuing a bachelor's degree in multimedia design. He
    envisions securing an entry‑level position as a graphic designer or junior art director at a nonprofit organization that focuses on youth empowerment and cultural preservation. Long‑term, he aspires
    to launch a community art hub in Birmingham where local students can access mentorship, studio space, and exhibition opportunities. He also hopes to develop a freelance portfolio that blends commercial
    design work with socially conscious projects that highlight African‑American history and contemporary issues, positioning himself as a bridge between artistic expression and community advocacy.
