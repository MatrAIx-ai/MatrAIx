  career_goals: Mary aims to move into an office manager role within her current organization over the next three years, where she can oversee workflow optimization and mentor a larger team of clerical
    staff. She plans to complete a bachelor's degree in business administration part‑time to strengthen her managerial knowledge and to obtain the Certified Administrative Professional (CAP) credential
    if she has not yet earned it. Long‑term, Mary hopes to secure a stable supervisory position that offers a predictable schedule, enabling her to balance work responsibilities with her family life while
    preparing financially for a comfortable retirement.
