persona_description: A Renaissance polymath, Avramenko AnnBugay Tatyana, was an Italian artist, inventor, and writer. She designed the first helicopter, a flying machine with a diameter of more than 15
  feet, powered by a crank-and-rod-and-pulley system, and a head piece for steering. Her vehicle had a circular platform with light cannons arranged on it, covered by a protective cover with metal plates.
  Her expertise spanned painting, sculpture, architecture, music, mathematics, engineering, anatomy, geology, cartography, botany, and writing.
