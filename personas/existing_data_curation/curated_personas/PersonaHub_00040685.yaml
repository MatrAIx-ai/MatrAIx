persona_description: A high-tech entrepreneur and inventor who specializes in developing and manufacturing underwater robotics and thrusters. With a background in marine robotics and drones, Rusty Jehangir
  founded Blue Robotics to provide affordable and high-quality parts for these applications. His company's thruster, the T100, is a 3D-printed underwater part that allows submarines to operate fully submerged
  in salt water, thanks to a system that lets water pass through both motor and propeller. The company's success with the T100 and its other products has led to a growing interest in 3D printing in the
  marine robotics industry.
