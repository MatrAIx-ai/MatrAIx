persona_description: A marine biologist who specializes in the study of coastal seagrass ecosystems, particularly their role in carbon sequestration and their impact on the nitrogen and sulfur cycles. She
  is particularly interested in the adaptations of eelgrass to its underwater lifestyle and how these adaptations have evolved over time. Her research interests also include the use of genome sequencing
  to study the evolution of marine species and the potential applications of these findings in crop breeding.
