personas:
  professional: Debra Williams, a budding miniature architect, spends quiet afternoons arranging LEGO bricks into orderly city diagrams, showcasing practical problem-solving and a love for routine, yet
    occasionally leaves scattered pieces on the floor due to their relaxed approach to tidying.
  sports: Debra Williams prefers low-key physical activity, attending the Kidz Swim Club for gentle laps while cheering quietly from the sidelines during Chicago Cubs baseball games on TV, reflecting a
    modest interest in sport without the social demands of team play.
  arts: Debra Williams draws inspiration from Dr. Seuss's whimsical rhymes, Disney's Frozen soundtrack, and the gentle piano pieces of Yiruma, channeling this artistic energy into coloring intricate mandala
    books and arranging their rock and shell collections with meticulous care.
  travel: Debra Williams enjoys carefully planned mini-adventures such as a day trip to the nearby state park's tide-pool exhibit, a weekend stay at their grandparents' cabin in the mountains, and dreams
    of a future solo-like visit to the Great Barrier Reef, favoring itineraries that promise clear outcomes and ample quiet time for cataloguing seashells.
  culinary: Debra Williams delights in the step-by-step ritual of measuring flour, butter, brown sugar, and chocolate chips for chocolate-chip cookies, marvels at the precise mixing process, occasionally
    over-mixes dough, and also enjoys building simple mac and cheese with elbow pasta, sharp cheddar, and a splash of milk.
  core: Debra Williams is a six-year-old who finds comfort in routine, loves solitary pursuits like LEGO building and rock collecting, and carries a quiet competitive edge that fuels both meticulousness
    and occasional worry.
background:
  cultural: Debra is raised in a middle‑class white family in Louisville, Kentucky. Her family participates in both national holidays and local traditions, such as watching the Kentucky Derby on television
    each May and attending community fairs in the spring. Sundays are spent at a nearby Protestant church, where she experiences the region’s emphasis on hospitality and community service. The Louisville
    Public Library’s children’s section is a frequent destination, reinforcing her love of quiet reading spaces. Family meals often feature classic Kentucky comfort foods like fried chicken, cornbread,
    and seasonal vegetables, reflecting the area’s culinary heritage. These cultural experiences, combined with a supportive home environment that values practical skills and routine, shape Debra’s worldview.
