  career_goals: Debra imagines a future career that lets her work in calm, organized settings where she can focus on practical tasks. She frequently says she wants to become a librarian because she loves
    the quiet of a reading room, enjoys arranging books, and appreciates a predictable daily schedule. She also dreams of being a veterinarian, drawn to the routine care of animals and the chance to work
    in a focused, low‑noise environment. Debra's ambition is to be known for her meticulousness and ability to keep spaces orderly, and she hopes to earn recognition—such as a school award for tidy projects—that
    reflects her competitive streak.
