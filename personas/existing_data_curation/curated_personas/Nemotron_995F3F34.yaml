personas:
  professional: Joan Helton, a curious kindergarten explorer who spends recess designing elaborate block castles and meticulously cataloguing their crayons, showing early signs of a future project manager
    with a practical, organized mindset.
  sports: Joan Helton, a budding soccer enthusiast who plays midfield for the Medina Little Kickers in the fall, cheers for the Cleveland Browns on Sundays, and practices basic gymnastics moves at the local
    community center, balancing competitive drive with a laid‑back attitude.
  arts: Joan Helton, an imaginative storyteller who draws vibrant pictures of forest scenes inspired by Dr. Seuss, sings along to Disney’s 'Let It Go' at full volume, and admires the music of JoJo Siwa,
    letting creative expression shape their free‑time.
  travel: Joan Helton, an adventurous five‑year‑old who has explored the trails of Hocking Hills State Park, taken a family road trip to the Magic Kingdom in Orlando, and dreams of visiting the snowy peaks
    of the Rocky Mountains next summer.
  culinary: Joan Helton, a self‑declared mac‑and‑cheese connoisseur who loves dipping apple slices in caramel, can butter a toast without spilling, and eagerly helps stir pancake batter on Saturday mornings,
    though they sometimes sneak extra chocolate chips into their bowl.
  core: Joan Helton, a calm, curious kindergartner who balances a competitive spirit with practical organization, quietly dominates block‑building contests while keeping a secret stash of extra crayons.
background:
  cultural: Joan was born and raised in Medina, Ohio, a suburban community in the heart of the Midwest. Her family follows many traditions common to white American households in the region, such as celebrating
    Thanksgiving with a turkey dinner, gathering for Fourth of July fireworks, and attending a local community church on Sundays. The Helton family enjoys seasonal activities like apple picking in the fall
    and trips to nearby state parks in the summer. The town’s close‑knit school environment and neighborhood block parties foster a sense of community, friendliness, and modesty that shape Joan’s daily
    life. While her ancestry includes German and Irish roots typical of many Ohio families, her cultural identity is primarily shaped by contemporary American media, local school curricula, and the values
    of fairness, hard work, and politeness emphasized in her upbringing.
