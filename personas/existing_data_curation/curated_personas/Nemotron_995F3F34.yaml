  career_goals: Although Joan is only five, she already talks about the future with enthusiasm. She dreams of becoming an engineer who designs gadgets that are both fun and useful, envisioning a workshop
    where she can build bridges and simple machines. She aspires to win a school science fair by creating a working volcano experiment, reflecting her competitive nature. Joan also expresses a fascination
    with space and imagines herself as an astronaut exploring new planets. Occasionally, she mentions wanting to help animals as a veterinarian, showing a caring side. Overall, her ambitions combine curiosity
    about how things work, a desire to excel, and a practical focus on creating solutions that benefit others.
