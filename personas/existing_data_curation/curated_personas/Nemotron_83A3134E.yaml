  career_goals: Gwendolyn aims to transition into a district‑level curriculum coordinator role where she can shape inclusive, equity‑focused instructional frameworks across multiple schools. She plans to
    pursue a master’s degree in educational leadership to bolster her capacity for systemic change and to mentor emerging teachers through formal coaching programs. Long‑term, she envisions spearheading
    a school‑wide social‑emotional learning initiative and establishing after‑school STEM workshops that specifically serve underrepresented youth in the Renton community. Her ambition is to leave a lasting
    legacy of culturally responsive teaching and robust support networks for both students and educators.
