  hobbies: '["Zumba fitness classes", "Social dancing (salsa)", "Karaoke nights", "Board game meetups", "Community theater volunteering", "Gardening", "Cooking and recipe experiments", "Volunteer work at
    animal shelter", "Competitive trivia nights", "Reading self-help books on stress management"]'
  career_goals: Ariel aims to complete her GED and pursue a certification in hospitality management or personal wellness coaching, positioning herself for part‑time work that balances family responsibilities.
    She envisions launching a small home‑based venture—such as a boutique event‑planning service or a wellness‑focused online store—to generate supplemental income and achieve greater financial stability.
    Concurrently, she seeks to develop stress‑management techniques and emotional resilience to improve her overall well‑being.
