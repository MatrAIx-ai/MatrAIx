personas:
  professional: Ariel Welsh is a budding hospitality and wellness coordinator who leverages their certified first‑aid background, sharp budgeting skills, and talent for orchestrating community events to
    create seamless, family‑friendly experiences, while their competitive streak pushes them to constantly refine schedules and exceed guest expectations.
  sports: Ariel Welsh fuels their energy with thrice‑weekly Zumba sessions at Fit Fusion Las Vegas and salsa nights at a downtown studio, while cheering on the Vegas Golden Knights and the Las Vegas Aces
    and occasionally joining a community softball league during spring.
  arts: Ariel Welsh channels their love for performance through community theater productions of classics like 'Our Town' and regularly streams Jennifer Lopez’s salsa‑infused hits and Maggie Rogers’s folk‑pop
    anthems, while also indulging in self‑help podcasts featuring Brené Brown for personal growth.
  travel: Ariel Welsh prefers meticulously planned weekend getaways, having explored the Grand Canyon and Sedona by car and dreaming of a future solo trip to Kyoto’s temples, balancing family‑friendly lodging
    with a penchant for boutique hostels when traveling alone.
  culinary: Ariel Welsh delights in farm‑to‑table cooking, frequently growing basil and cherry tomatoes in their backyard to toss into homemade marinara for spaghetti al pomodoro, while also mastering spicy
    chicken tacos with pickled red onions and experimenting with matcha‑green tea smoothies.
  core: Ariel Welsh is a pragmatic, socially vibrant 29‑year‑old who balances meticulous organization with a love for dance, community theater, and relentless self‑improvement, even as they battle chronic
    worry and a tendency to over‑schedule every moment.
background:
  cultural: Ariel comes from a middle‑class white American background, having grown up in a suburban Midwest environment before relocating to Las Vegas. Her upbringing emphasized practicality, self‑reliance,
    and the importance of community involvement, values that she carries into her daily life. Living in Nevada has exposed her to a vibrant, multicultural hospitality scene, shaping her appreciation for
    entertainment, diverse social interactions, and the fast‑paced rhythm of the city while still holding onto the structured, family‑oriented traditions of her upbringing.
attributes:
  skills: '["Household management", "Budget planning", "Event coordination", "Community outreach", "Basic computer literacy (Microsoft Office, email)", "Social media scheduling", "First aid/CPR certification",
