  hobbies: '[''Gardening'', ''Card Games (Bridge, Bingo)'', ''Volunteer Work at Community Events'', ''Woodworking'', ''Barbecuing'', ''Listening to Classic Rock and Country Music'', ''Walking Group'', ''Following
