  career_goals: Marshall aspires to enroll in a technical high school or a STEM-focused vocational program where he can deepen his skills in engineering and robotics. His long-term career goal is to become
    a mechanical engineer or product designer, ideally working on projects that merge technology with everyday practicality, such as agricultural equipment or sustainable consumer products. He also dreams
    of eventually opening a small workshop that allows him to design and fabricate custom furniture or repair tools for his community. To achieve these ambitions, he plans to seek out scholarships, mentorships,
    and summer internships with local manufacturing firms, and to continue building a portfolio of personal projects that showcase his blend of curiosity and hands-on expertise.
