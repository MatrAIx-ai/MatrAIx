personas:
  professional: Eddie Douglas, a retired handyman and community mentor, channels his decades of carpentry and gardening expertise into maintaining his own home while leading the senior center’s gardening
    club and organizing church events, reflecting his practical, structured approach to service, and they are known for reliable advice and hands‑on assistance.
  sports: Eddie Douglas enjoys early‑morning fishing at Lake Manatee, participates in the senior shuffleboard league at the community center, and passionately follows the Tampa Bay Buccaneers and Rays,
    cheering them on each season, and they treat these activities as both recreation and gentle exercise.
  arts: Eddie Douglas spends afternoons listening to classic soul records by Aretha Franklin and Marvin Gaye, savoring Miles Davis on vinyl, and occasionally joins his church choir, while also reading historical
    novels by Ken Follett, and they find these artistic pursuits a comforting bridge to personal memories and cultural heritage.
  travel: Eddie Douglas favors road trips to nearby Florida state parks like Honeymoon Island, reminisces about a jazz‑filled weekend in New Orleans, and dreams of a heritage tour to his ancestral hometown
    in the Midwest, always planning trips within a modest budget, and they balance adventure with the constraints of senior travel comfort.
  culinary: Eddie Douglas prepares soul‑food staples such as collard greens simmered with smoked turkey, candied sweet potatoes, and cornbread using fresh vegetables from his garden, seasoning dishes with
    okra, black‑eyed peas, and a dash of hot sauce, though they sometimes rely on pre‑made mixes for convenience.
  core: Eddie Douglas blends decades of practical handyman know‑how, a deep love for soulful music and Southern cooking, and a structured yet flexible mindset into a life of community mentorship, gentle
    self‑care, and quiet perseverance, though they occasionally hoard coupons and forget a pill.
background:
  cultural: Eddie grew up as part of a close‑knit African‑American community in central Florida during the era of segregation and the civil‑rights movement. His upbringing emphasized church involvement,
    family solidarity, oral storytelling, and self‑reliance. He carries the traditions of Southern Black cuisine, gospel music, and community service, while also valuing the resilience and adaptability
    that his generation cultivated amid social and economic challenges. These cultural influences shape his daily routines, his dedication to mentoring younger neighbors, and his commitment to preserving
    family and local history.
