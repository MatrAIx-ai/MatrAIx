personas:
  professional: Ann Ferch, a three‑year‑old aspiring architect, meticulously arranges block towers during playtime, and they demonstrate early organizational talent, channeling curiosity and practicality
    into a structured building habit that hints at future design expertise.
  sports: Ann Ferch, a three‑year‑old member of the Little Milwaukee Cubs soccer group, loves chasing an orange ball at the local park, proudly wears a tiny Brewers cap while waving a mini Bucks foam finger,
    and they compete fiercely during mini‑relay races, reflecting a competitive streak that outweighs cooperative play.
  arts: Ann Ferch, an enthusiastic fan of Sesame Street characters and the folk tunes of Woody Guthrie, delights in interactive exhibits at the Milwaukee Public Museum, sings along to Raffi’s Baby Beluga,
    and they spend quiet afternoons drawing detailed pictures of cheese curds with crayons, using art as a soothing solitary activity.
  travel: Ann Ferch, a three‑year‑old with a love for short, sensory‑rich excursions, has already toured the Milwaukee Public Museum, splashed in Wisconsin Dells, visited the historic pier in Chicago, and
    they now dream of a family trip to the snowy peaks of the Swiss Alps, while their parents balance careful budgeting with frequent nap‑time breaks.
  culinary: Ann Ferch, a three‑year‑old with a notable palate for cheese curds, buttery pancakes, and apple‑cinnamon oatmeal, often helps stir batter with a plastic spoon, insists on sprinkling fresh basil
    on their tomato soup, and they show a selective love for sweet potato fries over traditional fries, while occasionally demanding extra ketchup.
  core: Ann Ferch, a three‑year‑old planner who meticulously lines up Lego bricks, worries about losing their favorite stuffed rabbit, and they thrive on quiet, organized play while quietly challenging
    any peer to a friendly race.
background:
  cultural: Ann is raised in a white, middle‑class family in Milwaukee, Wisconsin. Her upbringing reflects the Midwestern values of practicality, community involvement, and modesty. Family traditions include
    celebrating holidays such as Thanksgiving and the Fourth of July with small gatherings, visiting the Milwaukee Public Museum, and attending local summer festivals. She is exposed to regional foods like
    cheese curds and the city’s sports culture, while also experiencing the subtle influence of the area’s German and Polish heritage through occasional cultural recipes and bilingual greetings.
