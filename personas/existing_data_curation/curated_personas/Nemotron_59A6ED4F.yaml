  hobbies: '[''Duplo building'', ''jigsaw puzzles'', ''picture books about animals and machines'', ''drawing and coloring'', ''backyard nature exploration'', ''listening to children’s songs'', ''pretend
    caretaker play with stuffed animals'']'
  career_goals: Even at three, Ann expresses a practical curiosity about how things work and a desire to help. She often says she wants to be a doctor for animals and also loves building towers, hinting
    at future interests in veterinary science or engineering. In the short term, she aims to become the top puzzle solver in her preschool class, master reading simple words, and earn a "big kid" badge
    for completing daily chores independently. Long‑term, she dreams of a career that blends investigation of nature with creating useful solutions, such as a wildlife researcher or a child‑focused engineer,
    and she is determined to be the best at it.
