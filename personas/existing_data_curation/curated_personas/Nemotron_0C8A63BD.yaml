personas:
  professional: Yanire Millan, a 17‑year‑old visual storytelling enthusiast, combines daily sketching, smartphone‑based digital illustration, and community event design to craft culturally resonant graphics,
    leveraging fluent Spanish, conversational English, and a collaborative spirit to pursue a scholarship in graphic design and aim for a future career creating promotional campaigns for heritage sites.
  sports: Yanire Millan enjoys playing soccer at school, follows the Cangrejeros de Santurce baseball team with fervor, and participates in a local youth volleyball club, balancing community clean‑up drives
    with an occasional weekend bike ride along the nearby river.
  arts: Yanire Millan immerses themselves in bomba y plena rhythms, draws inspiration from street artist Banksy and famed Puerto Rican painter Rafael Tufiño, writes short stories echoing the lyrical style
    of poet Julia de Burgos, and curates visual content for community events, often sharing playlists featuring Bad Bunny and classic salsa legend Celia Cruz.
  travel: Yanire Millan has explored Old San Juan’s historic forts, trekked El Yunque’s waterfalls, and taken a family trip to New York City’s vibrant art districts, while dreaming of a study abroad semester
    in Granada, Spain, to capture Andalusian architecture in their sketches.
  culinary: Yanire Millan proudly prepares mofongo with chicharrón, alcapurrias stuffed with seasoned ground meat, and arroz con gandules, savoring the aroma of sofrito and the crunch of plantain chips,
    though they sometimes forget to refrigerate leftovers, leading to occasional food‑borne mishaps.
  core: Yanire Millan is a curious, socially driven teen who channels artistic energy into community storytelling, saves cautiously yet impulsively splurges on creative tools, and balances cultural devotion
    with a penchant for late‑night sketch marathons.
background:
  cultural: Yanire grew up in Moca, a close-knit town in the interior of Puerto Rico known for its agricultural roots and vibrant festivals. Her family follows the island’s collectivist values, emphasizing
    respect for elders, strong family bonds, and the practice of compadrazgo (godparent relationships). She participates in annual celebrations such as the Festival de la Caña and Moca’s patron saint festivities,
    where traditional music like bomba y plena fills the streets. The cuisine of her home features staples like rice and beans, plantains, and dishes she helps prepare with her mother, reinforcing a deep
    connection to her heritage. Bilingual in Spanish and conversational English, Yanire navigates both local community life and the broader Puerto Rican culture, drawing inspiration from the island’s artistic
    traditions and natural landscapes.
attributes:
  skills: '["Sketching and drawing", "Digital illustration", "Photo and video editing", "Event coordination", "Bilingual communication (Spanish/English)", "Team collaboration", "Adaptability and problem-solving",
    "Creative writing", "Basic cooking of traditional Puerto Rican recipes"]'
  hobbies: '["Sketching and drawing", "Digital illustration", "Photography", "Listening to and dancing to bomba, plena, salsa, reggaetón", "Attending local dance workshops", "Reading contemporary fiction
    and poetry", "Creative writing (short stories, journal)", "Cooking traditional Puerto Rican dishes", "Volunteering at community center", "Organizing small cultural events"]'
  career_goals: Yanire aspires to turn her love for visual storytelling into a career. Her primary goal is to earn a scholarship to study graphic design or visual communications at a university in Puerto
    Rico, where she can learn professional techniques and strengthen her portfolio. She dreams of working for a cultural institution or tourism agency that creates promotional campaigns highlighting the
    heritage of towns like Moca. In the longer term, Yanire hopes to launch a community media project that gives young people a platform to share their art, music, and stories, thereby fostering local pride
    and providing mentorship opportunities.
