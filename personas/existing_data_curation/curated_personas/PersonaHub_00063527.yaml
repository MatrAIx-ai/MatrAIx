persona_description: A podiatric physician who specializes in the treatment of foot and ankle conditions, particularly hammertoe and bunions. They have extensive knowledge and experience in diagnosing and
  treating these conditions through non-surgical and surgical treatments. They are knowledgeable in the medical and surgical treatment options for these conditions, and are skilled in performing non-surgical
  treatments such as shoe modification, custom orthotics, splinting, and toe stretches and exercises. They are also skilled in performing surgical treatments for hammertoe and bunions, including removing
  portions of bone within the toe and using surgical wires to pin the toe.
