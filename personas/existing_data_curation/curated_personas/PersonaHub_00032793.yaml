persona_description: A wealthy philanthropist and entrepreneur who is passionate about medical research and has a personal interest in the development of a cure for Parkinson's disease. He has a background
  in computer science and has successfully applied his computational power to large amounts of data, leading to the discovery of outbreaks of flu and swine flu. He has contributed $50 million to Parkinson's
  research and has already invested $6 million in a genetic testing company called 23andMe, which is run by his wife, Anne Wojcicki. He has inherited a mutation of the LRRK2 gene from his mother, which
  increases his own chances of developing Parkinson's.
