  hobbies: '[''Woodworking'', ''Motorcycle Maintenance'', ''Reading Non‑fiction (Productivity & DIY)'', ''Fishing'', ''Community Gardening'', ''Playing Strategy Video Games'']'
  career_goals: Andrew aims to progress within the retail sector by moving into supervisory and then managerial roles. Over the next three to five years, he hopes to become a store manager, overseeing operations,
    staff development, and inventory logistics. He plans to supplement his on‑the‑job experience with a certification in retail management or supply chain fundamentals, seeking a stable, structured career
    path that aligns with his preference for predictability. Long‑term, he envisions possibly opening his own small boutique or franchise, where he can apply his organizational skills and emphasis on customer
    harmony.
