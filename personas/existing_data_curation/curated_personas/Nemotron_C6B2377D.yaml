  career_goals: Rafael aims to transition into a technical leadership role where he can shape product vision at the intersection of technology and art. He aspires to become a lead software architect or
    engineering manager, guiding small, high‑performing teams to create immersive digital experiences—such as AR installations or AI‑enhanced storytelling platforms—that reflect his love for creativity.
    He is also committed to mentoring junior developers, especially those from underrepresented backgrounds, and to contributing to open‑source projects that democratize access to creative tech tools. In
    the long term, he envisions founding a startup that leverages machine learning to help users manage stress through personalized, interactive media.
