personas:
  professional: Rafael Boria, a 36‑year‑old full‑stack software developer, blends meticulous clean‑architecture design with a curator’s eye for visual harmony, and they channel their curiosity, organized
    flexibility, and occasional worry into leading agile, user‑centric teams that prototype immersive AR storytelling platforms.
  sports: Rafael Boria enjoys weekend hikes in the Santa Cruz Mountains, follows the San Francisco Giants and Golden State Warriors, plays pickup soccer with a local co‑ed league, and belongs to a casual
    mountain‑bike club that meets every other Saturday, and they use these activities as both stress relief and modest cardio.
  arts: Rafael Boria frequently visits contemporary art shows in San Francisco and Los Angeles, sketches mural‑inspired compositions in sketchbooks, strums acoustic renditions of traditional folk songs
    at intimate gatherings, and draws inspiration from artists like Yayoi Kusama, Olafur Eliasson, and the street‑art collective Banksy, while they volunteer to lead youth workshops that blend visual art
    with basic coding.
  travel: Rafael Boria prefers thoughtfully planned short‑haul trips that blend cultural immersion and creative stimulus, having explored Oaxaca’s mural districts, spent a weekend photographing Barcelona’s
    modernist architecture, and dreaming of a month‑long visit to Kyoto’s temples, and they balance a demanding work schedule with a modest travel budget.
  culinary: Rafael Boria, an intermediate home chef, delights in preparing mole poblano with toasted chilies, dark chocolate, and spices, rolling hand‑made tamales stuffed with chicken and salsa verde,
    and experimenting with fresh corn masa, often hosting dinner nights where friends sample their dishes alongside craft beer pairings, and they savor the communal ritual as a creative outlet.
  core: Rafael Boria channels a blend of artistic curiosity, disciplined yet flexible work habits, and a perpetual undercurrent of stress into a life where code, canvas, and cuisine intersect, and they
    punctuate each day with meticulous budgeting, mindfulness‑driven health routines, and weekend escapes into nature.
background:
  cultural: Rafael grew up in a Mexican‑American household where Spanish was spoken daily and family traditions such as Día de los Muertos, quinceañeras, and communal meals were central. His parents instilled
    a deep respect for Mexican folk art, music, and cuisine, shaping his aesthetic sensibilities. Moving to the Bay Area for university and later work, he navigated a bicultural identity, blending the collectivist
    values of his heritage with the individualistic, innovation‑driven culture of Silicon Valley. He stays connected to his roots by attending cultural festivals in the Santa Clara community, cooking traditional
    dishes for friends, and mentoring Hispanic youth interested in STEM. This dual cultural lens informs his collaborative style, his emphasis on inclusive teamwork, and his desire to create technology
    that celebrates diverse narratives.
