personas:
  professional: Yamile Garibaldi is an aspiring junior explorer who channels their curiosity into building colorful LEGO habitats, sketching imaginative animal kingdoms, and eagerly narrating discoveries
    to peers, turning every play session into a spontaneous science showcase where they love to be the center of attention.
  sports: Yamile Garibaldi dashes around the local park for tag, joins a weekend community soccer clinic, and cheers loudly for the Houston Astros and Rockets, embodying a lively, sociable spirit that thrives
    on movement and team energy as they race around with friends.
  arts: Yamile Garibaldi immerses themselves in watercolor painting of whimsical creatures, dances to upbeat pop tracks by Ariana Grande and lively traditional Mexican melodies, and proudly recites favorite
    stories from the library, letting art shape their joyous, expressive identity as they often share their creations with family.
  travel: Yamile Garibaldi loves spontaneous family road trips to Galveston’s beach for sandcastle building, dreams of a future visit to the Grand Canyon’s rim, and enjoys bright-eyed explorations of the
    Houston Museum of Natural Science’s dinosaur exhibit, preferring adventure over rigid itineraries, and they love the surprise of discovering new wonders.
  culinary: Yamile Garibaldi delights in mixing butter, sugar, and chocolate chips to bake chewy cookies, proudly decorates cupcakes with rainbow sprinkles, and always asks for extra fruit slices, turning
    the kitchen into a cheerful, hands‑on laboratory of sweet treats that they proudly present to friends.
  core: Yamile Garibaldi is a chatty, curiosity‑driven six‑year‑old who turns every LEGO block, watercolor splash, and kitchen bake into a lively performance, and they occasionally forget chores in the
    excitement.
background:
  cultural: Yamile grows up in a bilingual Mexican‑American household in Houston, where both Spanish and English are spoken at home. Her family celebrates Mexican traditions such as Día de los Muertos,
    Cinco de Mayo, and holidays honoring ancestors, while also participating in local community events and festivals in Texas. She enjoys Mexican foods like tacos, quesadillas, and fruit‑filled churros,
    often prepared together with family. The vibrant multicultural environment of Houston exposes her to diverse arts, music, and cuisines, fostering an appreciation for both her heritage and the broader
    cultural tapestry around her.
