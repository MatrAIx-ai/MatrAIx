  career_goals: Yamile dreams of growing up to be an artist who can paint vibrant stories, a teacher who can spark curiosity in other kids, or a performer who loves being on stage and sharing music and
    dance. She is fascinated by scientists who discover new things and sometimes imagines herself as a researcher exploring mysteries. Her biggest ambition is to combine her love for art and people, perhaps
    by creating interactive exhibits for children at a museum where she can both teach and inspire.
