personas:
  professional: Reese Pearce, a dedicated facilities maintenance technician in Kalamazoo, blends methodical preventive‑maintenance scheduling with a keen eye for artistic detail, ensuring HVAC, electrical,
    and plumbing systems run smoothly while preserving the aesthetic integrity of historic gallery spaces, and they reliably document every work order in the CMMS despite occasionally misplacing tiny screws
    in their toolbox.
  sports: Reese Pearce, an avid weekend walker who logs miles on the Kalamazoo River Trail, enjoys casual pick‑up basketball at the local community center, proudly cheers for the Kalamazoo Wings hockey
    team, and they keep a modest home gym for bodyweight workouts, though they admit to skipping warm‑ups on hectic days.
  arts: Reese Pearce, a passionate visitor of the Kalamazoo Institute of Arts who sketches exhibition pieces, photographs historic architecture with a DSLR, draws inspiration from Ansel Adams and Georgia O’Keeffe,
    attends pottery workshops, and they often lose track of time listening to folk singer Sufjan Stevens while designing woodworking projects.
  travel: Reese Pearce, a weekend explorer who prefers short road trips to nearby cultural hotspots like Grand Rapids’ ArtPrize installations, the historic lighthouses of the Upper Peninsula, and occasional
    weekend stays in Chicago to see contemporary museum shows, plans trips with a detailed spreadsheet, yet they sometimes overpack their camera gear, leaving little room for souvenirs.
  culinary: Reese Pearce, an intermediate home cook who loves rustic Midwestern comfort foods such as chicken pot pie and pan‑seared trout with lemon‑dill sauce, enjoys experimenting with fresh herbs like
    rosemary and thyme, frequently whips up a DIY espresso martini after a long workday, and they habitually micromanage seasoning ratios, leading to occasional over‑salting of dishes.
  core: Reese Pearce, a methodical maintenance enthusiast with a quiet love for art and a habit of juggling toolboxes and sketchbooks, finds balance in precise repairs and spontaneous photography, yet can’t
    resist late‑night woodworking binges that leave a trail of sawdust and unfinished coffee tables.
background:
  cultural: Reese grew up in a middle‑class, white Midwestern family in Michigan. Her upbringing emphasized reliability, modesty, and community involvement, values common in the region’s working‑class culture.
    She celebrates traditional American holidays such as Thanksgiving and the Fourth of July, and enjoys regional customs like attending the Kalamazoo County Fair and local farmers’ markets. While her family’s
    ancestry includes German and Irish roots, cultural practices have largely centered around practical everyday life and a respect for hard work. The Midwestern ethos of friendliness, cooperation, and
    appreciation for the local arts scene has shaped her outlook and informs her commitment to harmonious, considerate interactions both at work and in her community.
