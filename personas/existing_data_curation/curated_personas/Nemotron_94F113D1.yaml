  hobbies: '["visiting local art galleries and museums","sketching and drawing","photography (architecture and nature)","walking/hiking the Kalamazoo River Trail","DIY woodworking projects","reading science-fiction
    and technology podcasts","crossword puzzles","journaling","participating in small-group craft workshops (pottery, woodworking)","volunteering in community garden maintenance"]'
  career_goals: Reese aims to deepen her technical expertise and become a certified facilities professional within the next three years. She plans to enroll in a community‑college program in Building Maintenance
    Technology and earn certifications such as NATE (HVAC) and a Certified Facility Manager credential. Her long‑term ambition is to move into a supervisory role, overseeing a small maintenance crew at
    a local college or cultural institution where she can merge her practical skills with her appreciation for art. Eventually, she envisions launching her own boutique maintenance business that specializes
    in servicing small‑scale art galleries, studios, and historic properties in Kalamazoo, providing reliable, detail‑oriented service while preserving the aesthetic integrity of the spaces.
