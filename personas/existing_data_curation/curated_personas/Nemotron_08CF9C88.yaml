  hobbies: '[''Basketball (pickup league)'', ''Soccer (weekend team)'', ''Latin dancing'', ''Cooking Guatemalan cuisine'', ''DIY home improvement projects'', ''Listening to productivity podcasts'', ''Reading
    mystery novels'', ''Youth mentorship volunteering'']'
  career_goals: Driven by a mix of curiosity and practicality, Pablo aspires to move from staff janitor to cleaning crew lead within the next two years, then to a facilities manager role where he can shape
    maintenance policies and champion sustainable, green-cleaning practices. He plans to earn industry certifications such as the Certified Professional Cleaner (CPC) and the OSHA 10‑hour General Industry
    safety course. Long‑term, he dreams of launching his own small cleaning business that emphasizes eco‑friendly products and offers reliable services to local businesses and schools, leveraging his competitive
    edge to carve out a niche in the Dodge City market.
