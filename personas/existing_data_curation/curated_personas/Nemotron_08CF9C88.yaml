personas:
  professional: Pablo Mayor blends their on‑site cleaning expertise with a data‑driven, cost‑saving mindset, using their bilingual communication and safety certifications to lead custodial teams toward
    greener practices while balancing the demands of a fast‑paced facility environment.
  sports: Pablo Mayor dominates a neighborhood pickup basketball league and captains a weekend soccer side named Dodge City United, while they cheer for the Kansas City Chiefs and Kansas City Royals and
    log weekly HIIT sessions to stay fit.
  arts: Pablo Mayor grooves to the rhythms of cumbia legend Los Ángeles Azules and salsa icon Celia Cruz at local festivals, devours mystery novels by Agatha Christie and Gillian Flynn on their commute,
    and keeps a curated playlist of Latin jazz that fuels their DIY projects.
  travel: Pablo Mayor plans their trips like a project timeline, favoring budget‑friendly road trips to the Grand Canyon and weekend getaways to Austin’s live‑music scene, while dreaming of a culinary pilgrimage
    to Oaxaca to perfect their tamale recipes.
  culinary: Pablo Mayor’s kitchen is a laboratory where they perfect pepian, tamales, and chiles rellenos using roasted chilies, masa harina, and fresh cilantro, balancing authentic techniques with occasional
    shortcuts like pre‑made broth packets when time runs short.
  core: Pablo Mayor channels their competitive curiosity into cleaning excellence, cost‑saving strategies, and spirited community sports, all while juggling stress‑induced worries and a penchant for late‑night
    mystery reading.
background:
  cultural: Pablo’s family emigrated from rural Guatemala when he was a child, bringing with them a strong sense of community, Catholic traditions, and a love for vibrant music and food. Growing up in a
    bilingual household, he holds fluency in both Spanish and English, which influences his daily interactions and the way he maintains cultural ties—celebrating holidays like Día de los Muertos and Semana
    Santa with his extended family in Kansas. The values of hard work, respect for elders, and mutual support learned from his Guatemalan roots shape his practical outlook and his desire to give back to
    the local community through mentorship and participation in neighborhood events.
attributes:
