personas:
  professional: Noribel Anzola is a 28‑year‑old boutique tailor whose expert pattern drafting, sustainable textile upcycling, and bilingual client consultations blend imaginative design with methodical
    inventory management, driving a home‑based business toward a future atelier.
  sports: Noribel Anzola channels her kinetic energy into salsa dancing at weekend socials, joins a local beach volleyball league, and follows the city’s baseball club, balancing a modest jogging routine
    with occasional marathon training as a way to stay fit.
  arts: Noribel Anzola immerses herself in abstract painting, street photography of bustling neighborhood scenes, and fashion illustration, drawing inspiration from artists like Frida Kahlo, photographers
    like Vivian Maier, and musicians such as Bad Bunny during art and music festivals.
  travel: Noribel Anzola prefers curated weekend getaways to historic colonial towns in Spain for design research, spontaneous trips to Caribbean islands for culinary inspiration, and annual visits to New
    York Fashion Week, planning each travel with a mix of budget-friendly hostels and occasional boutique hotel splurges.
  culinary: Noribel Anzola loves reinventing the classic mofongo with smoked plantain, lime‑infused cilantro rice, and locally sourced herbs from her balcony garden, while also experimenting with seasonal
    dishes like rosemary‑scented chicken and vegetable paella.
  core: Noribel Anzola is a methodical dreamer who stitches sustainable fashion by day, paints abstract worlds by night, and juggles meticulous budgeting with occasional impulsive art‑supply splurges, all
    while nurturing a quirky habit of talking to her balcony herbs for creative advice.
background:
  cultural: Noribel was raised in the coastal community of Toa Baja and the nearby Trujillo Alto municipality, where family gatherings, music, and the island's natural beauty shaped her worldview. Her grandparents
    taught her sewing techniques and shared stories of Puerto Rico's colonial history and folklore, fostering a deep appreciation for local craftsmanship. Fluent in Spanish and conversational in English,
    she navigates the bilingual environment of the island. The rhythmic beats of bomba and plena, the vibrant colors of Caribbean festivals, and the flavors of island cuisine are woven into her daily life
    and serve as continual sources of inspiration for her designs.
attributes:
  skills: '["Pattern drafting", "Garment construction", "Hand embroidery", "Fabric selection and sourcing", "Sustainable upcycling of textiles", "Fashion illustration", "Color theory application", "Custom
