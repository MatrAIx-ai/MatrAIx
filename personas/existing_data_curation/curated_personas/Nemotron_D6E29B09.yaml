  hobbies: '["Abstract painting", "Fashion sketching", "Street photography", "Attending art and music festivals", "Cooking traditional Puerto Rican cuisine", "Salsa dancing", "Reading magical realist literature",
    "Embroidery", "Herb gardening"]'
  career_goals: She aims to expand her home based tailoring business into a boutique atelier in Toa Baja that showcases contemporary clothing infused with Puerto Rican cultural motifs. Over the next five
    years she plans to launch an online store, participate in local fashion weeks, and develop a mentorship program for aspiring seamstresses, emphasizing sustainable practices and cultural preservation.
    Ultimately she hopes her brand will be recognized both locally and internationally for its inventive blend of tradition and modernity.
