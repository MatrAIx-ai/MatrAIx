persona_description: A global health practitioner who is dedicated to reducing the impact of HIV/AIDS on children in resource-limited settings. This individual has experience in implementing comprehensive
  prevention, treatment, and care programs for children infected with and affected by HIV/AIDS, including the use of innovative technologies and strategies to improve pediatric diagnosis and long-term treatment
  for children. This person is passionate about addressing the complex challenges of addressing the needs of older children, including issues related to family dynamics, community response, and caregiver
  support. This individual has a strong track record of working with host country governments, international partners, and other stakeholders to scale up family-based approaches to prevention, treatment,
  and care for children infected with and affected by HIV/AIDS.
