personas:
  professional: A budding junior engineer in the making, Brian Gideon uses LEGO instructions to prototype miniature structures, showing organized, methodical problem‑solving skills while they eagerly share
    their creations with classmates.
  sports: A lively team player, Brian Gideon dashes across the field for the Little Lions youth soccer club, tags friends in endless games of tag during recess, and cheers for City FC during weekend broadcasts,
    embodying their energetic, sociable nature.
  arts: A budding visual creator, Brian Gideon spends afternoons sketching animals inspired by Eric Carle's vibrant collages and building LEGO scenes while humming the catchy “Paw Patrol” theme, reflecting
    their love for bright, friendly art and group imagination.
  travel: A curious explorer, Brian Gideon enjoys weekend nature walks in the nearby Riverside Park and family excursions to the state’s Science Museum, while they daydream about a future trip to the Great
    Barrier Reef, balancing their love for familiar green spaces with a yearning for far‑off adventure.
  culinary: A budding foodie, Brian Gideon delights in slurping cheesy macaroni, munching crisp carrot sticks after park outings, and helping stir honey‑glazed chicken with their guardian, showcasing a
    preference for familiar comfort foods and occasional culinary experiments.
  core: Brian Gideon is an organized, anxiety‑prone six‑year‑old who channels their curiosity into building LEGO worlds, thrives on group play, and cautiously balances routine with spontaneous fun, and
    they often brighten the room with their energetic smile.
background:
  cultural: Brian grows up in a suburban, middle‑class family in Towson, Maryland, within the broader Mid‑Atlantic American culture. His household celebrates U.S. traditions such as Thanksgiving, Fourth
    of July fireworks, and Halloween, and he attends a public elementary school where diversity, community involvement, and safety are emphasized. The local emphasis on education, organized activities,
    and civic participation shapes his caring, structured personality.
