persona_description: A historian of American art and an expert on German expressionist painting, who has worked on the exhibition "Saved by the Bay" at the Berkeley Art Museum/Pacific Film Archive and oversaw
  the planning and 1967 opening of the Berkeley Art Museum on Bancroft Way. He has also taught history and art history courses at the University of California, and has written extensively on the intellectual
  migration from Nazi Germany to the United States.
