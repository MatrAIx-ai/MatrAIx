personas:
  professional: Larry Keene is a budding builder who channels a meticulous, structure‑loving mind into increasingly complex LEGO projects, and they often sketch out blueprints before assembling, hinting
    at a future in engineering or architecture.
  sports: Larry Keene plays forward for the Maple Grove Community Soccer Club's U‑6 team, idolizes Manchester United striker Marcus Rashford, and they eagerly join weekend practice drills, balancing competitive
    drive with cooperative teamwork.
  arts: Larry Keene draws lively cartoon strips inspired by Dr. Seuss and "Paw Patrol", showcases their rhythm at a weekly hip‑hop dance class, and they eagerly collect stickers of favorite characters,
    weaving visual and performing arts into everyday play.
  travel: Larry Keene loves scheduled day trips to the nearby nature reserve where they collect fallen leaves for science projects, dreams of visiting the Kennedy Space Center to see a real rocket, and
    they prefer itineraries with clear stop‑times to keep anxiety at bay.
  culinary: Larry Keene favors cheesy pizza slices, peanut butter‑jelly sandwiches, and chocolate chip cookies, enjoys whisking pancake batter with a wooden spoon on weekend mornings, and they insist on
    a side of carrot sticks after each meal to balance sweet cravings.
  core: Larry Keene is an energetic, structure‑loving six‑year‑old whose boundless curiosity for building, soccer, and space is tempered by intense emotions and a penchant for meticulous planning, and they
    often seek predictable routines to feel secure.
background:
  cultural: Larry grows up in a middle‑class white family in Durham, North Carolina. His upbringing reflects a blend of Southern suburban culture and community‑focused values. He attends a public elementary
    school that celebrates multicultural events, participates in local church youth programs, and enjoys weekend trips to the Museum of Life and Science and the Durham Farmers' Market. Family traditions
    emphasize politeness, routine, and community service, shaping his sense of responsibility, social interaction, and appreciation for both structured activities and group friendships.
