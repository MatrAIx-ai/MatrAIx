  career_goals: Amporn aims to become a regional director for a major nonprofit network in the Bay Area, overseeing multiple community centers that serve immigrant and low‑income families. Over the next
    five years she plans to launch a multilingual community hub in Hayward that integrates job placement services, mental‑health counseling, and youth mentorship. She intends to pursue a Master’s in Public
    Administration to deepen her policy expertise, with a goal of influencing city council decisions on affordable housing and social services. Additionally, she aspires to author a guidebook on best practices
    for culturally responsive community program design, positioning herself as a thought leader in the sector.
