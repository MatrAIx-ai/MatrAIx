  hobbies: '[''Zumba and Salsa Dancing'', ''Group Hiking'', ''Yoga'', ''Community Cooking and Food Sharing'', ''Book Club (Historical Fiction)'', ''Language Exchange (Thai/Vietnamese)'', ''Volunteer at
