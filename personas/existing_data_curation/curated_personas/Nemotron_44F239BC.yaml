personas:
  professional: Edmundo Fernandezsantos, an aspiring junior architect who spends every afternoon stacking blocks and sketching forts, channels their curiosity and love of unconventional ideas into meticulous
    designs while balancing a need for order with spontaneous experimentation, and sometimes insists on being the project lead even in group play.
  sports: Edmundo Fernandezsantos, an enthusiastic member of the community’s after‑school soccer club who idolizes the local MLS team, the Seattle Sounders, eagerly practices dribbling after school, competes
    fiercely in mini‑tournaments, and prefers fast‑paced games over quiet playground play.
  arts: Edmundo Fernandezsantos, a budding art aficionado who fills sketchbooks with crayon reinterpretations of Van Gogh’s Starry Night and loves the animated storytelling of Pixar’s Inside Out, regularly
    watches live performances of the local children's theater, and insists on arranging art supplies by color before each creative session.
  travel: Edmundo Fernandezsantos, a small‑world explorer who delights in family trips to the interactive Children’s Museum in Boston, the sandy shores of Cancun, and dreams of a future adventure to Tokyo’s
    Robot Restaurant, always planning routes with a hand‑drawn map and packing extra snacks in case of anxiety about unfamiliar places.
  culinary: Edmundo Fernandezsantos, a modestly adventurous eater who favors crunchy carrot sticks, creamy mac and cheese, and sticky mango rice, enjoys helping mom knead pizza dough (though often leaves
    a doughy lump on the floor), and insists on sprinkling extra parmesan on everything, even when the dish is already cheesy.
  core: Edmundo Fernandezsantos, a constantly curious five‑year‑old whose boundless energy and competitive streak drive them to organize playtime like a mini‑project while secretly fretting over every new
    challenge.
background:
  cultural: Edmundo grows up in a Mexican-American household in Laredo, Texas, a city on the U.S.-Mexico border where bilingualism and bicultural traditions are everyday life. At home Spanish is spoken,
    and family meals often feature tacos, tamales, and pozole, accompanied by lively music such as mariachi, norteño, and regional folk songs. The family celebrates Mexican holidays—Día de los Muertos with
    altars and sugar skulls, Cinco de Mayo with parades, and Las Posadas with lanterns—while also observing American holidays like Thanksgiving and the Fourth of July. His parents attend a local Catholic
    church, and values such as respect for elders, communal support, and a strong sense of identity are reinforced through church activities and community festivals. Edmundo’s preschool is bilingual, exposing
    him to English, and his friends come from a mix of Mexican, Anglo, and other Hispanic backgrounds, giving him a warm, diverse social environment that shapes his sense of belonging to both Mexican heritage
    and the broader Texan culture.
