  career_goals: He often tells adults that he wants to become an artist who makes comics, an inventor who builds cool gadgets, or a scientist who discovers dinosaurs and space rockets. He dreams of drawing
    giant murals that tell stories of his family, designing LEGO creations that move, and someday exploring the stars as an astronaut. Because he enjoys competition, he also imagines being a professional
    soccer player who scores goals for his team. While his ambitions are playful, they all revolve around expressing his unique ideas, gaining recognition for his creativity, and using his curiosity to
    solve problems. He sometimes worries whether he will be good enough, so his goals include learning more each day and showing his friends what he can do.
