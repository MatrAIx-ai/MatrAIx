personas:
  professional: Steven Long, an emerging data analyst and part‑time software developer, leverages their Python, SQL, and Tableau expertise along with meticulous documentation to deliver clear insights while
    thriving in remote, low‑stimulus environments that suit their preference for solitude and their empathetic, anxiety‑aware approach to collaborating with teammates.
  sports: Steven Long enjoys solitary walks along the Virginia Beach boardwalk and occasional jogs with the Virginia Beach Running Club, follows the Washington Commanders for football and the Washington
    Capitals for hockey, and practices yoga at home during winter months to maintain flexibility, while avoiding crowded gyms that overwhelm their senses.
  arts: Steven Long channels their creative side through coastal photography, capturing sunrise over the Atlantic, immerses themselves in narrative‑driven indie games like Celeste and Hades, and finds inspiration
    in the atmospheric scores of composer Vangelis and the speculative fiction of author Liu Cixin, often sketching scene concepts in their journal.
  travel: Steven Long prefers low‑key, solo travel itineraries, having explored the rugged cliffs of Acadia National Park and the historic streets of Kyoto, while dreaming of a quiet retreat in Iceland’s
    geothermal baths and a weekend road‑trip along the Pacific Coast Highway, always planning trips months in advance to avoid last‑minute stress.
  culinary: Steven Long, a modest home cook, favors simple, nutrient‑dense meals like grilled salmon with quinoa, avocado toast sprinkled with chia seeds, and occasional ramen bowls spiced with sriracha,
    while occasionally burning toast in their rush to start a coding session, and enjoys experimenting with fresh herbs like basil and cilantro.
  core: Steven Long blends a quietly analytical mind with a love for solitary creativity, juggling nocturnal coding marathons and meditation breaks, yet habitually forgets to water houseplants, leading
    to a thriving jungle of dried foliage.
background:
  cultural: Steven grew up in a middle‑class, predominantly white suburban family in Virginia Beach, Virginia. The coastal environment and proximity to a strong military presence have shaped his appreciation
    for community harmony and respect for discipline. His family background includes Irish and English ancestry, typical of many East Coast American families, and he was raised with values of self‑reliance,
    modesty, and a balanced work ethic. Local traditions such as beach outings, seafood festivals, and seasonal community events have contributed to his relaxed, nature‑oriented outlook.
