    ''Science podcasts'', ''DIY electronics'']'
  career_goals: Steven aims to complete his bachelor's degree in Computer Science or Data Science while maintaining a part‑time schedule that accommodates his need for quiet, focused work. His primary career
    ambition is to secure a remote position as a data analyst or junior software developer, where he can apply his analytical strengths and continue learning new technologies. Over the next five years,
    he hopes to become proficient in full‑stack development, contribute to projects that improve mental‑health resources, and eventually transition into a role that blends technical expertise with user‑centered
    design, all while preserving a balanced, low‑stress lifestyle.
