  hobbies: '[''Salsa dancing'', ''Cooking Cuban cuisine'', ''Playing basketball'', ''Reading non-fiction'', ''Volunteer financial literacy workshops'', ''Hiking and beach activities'', ''Traveling to Latin
    American destinations'', ''Photography of urban landscapes'', ''Yoga'']'
  career_goals: Nino aims to advance to a senior management analyst role within the next two years, taking on larger, high‑impact projects that shape organizational strategy. He plans to pursue an MBA part‑time
    to deepen his strategic and leadership expertise, with the long‑term ambition of becoming a director of operations or strategy consultant for a multinational firm that serves the Latin American market.
    Alongside his professional trajectory, he is committed to mentoring emerging Cuban‑American talent, establishing a community mentorship program that bridges analytical skills with real‑world business
    experience.
