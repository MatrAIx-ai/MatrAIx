personas:
  professional: Nino Fernandez is an analytical management analyst who leverages Advanced Excel, Power BI, and bilingual communication to transform raw data into strategic insights for cross-functional
    projects while balancing methodological rigor with adaptable problem-solving and a collaborative, calm demeanor.
  sports: Nino Fernandez plays pick-up basketball with the South Beach Hoops Club, follows the Miami Heat and Tampa Bay Buccaneers, hikes the Biscayne Trail along Florida’s coast every weekend, and mixes
    cardio with a casual commitment to stay fit.
  arts: Nino Fernandez captures Miami's vibrant street life through photography, practices salsa dancing at Mango's Tropical Café, enjoys listening to John Legend, Buju Banton, and the Buena Vista Social
    Club, and finds inspiration in the city's eclectic murals.
  travel: Nino Fernandez embraces a blend of structured itineraries and spontaneous exploration, having visited Mexico City, Cartagena, and Lima, and dreams of trekking Patagonia's Torres del Paine, balancing
    travel points with a modest budget to experience diverse Latin American cultures.
  culinary: Nino Fernandez hones intermediate cooking skills by mastering dishes like arroz con pollo, plantain tostones, and mojo-marinated pork, experiments with fresh herbs and citrus, frequently shops
    at local farmers markets, yet occasionally over-salts their sauces.
  core: Nino Fernandez is a meticulous yet adaptable data-driven professional who balances vibrant social life with disciplined self-improvement, quietly tackling spreadsheets by day and salsa steps by
    night.
background:
  cultural: Nino is a first‑generation Cuban‑American raised in Miami’s Little Havana neighborhood. His parents emigrated from Cuba in the early 1990s, instilling in him a deep appreciation for Cuban customs,
    music, and family values while navigating life in the United States. Growing up bilingual, he effortlessly shifts between Spanish and English, which enriches his interpersonal skills and cultural sensitivity.
    The Cuban emphasis on community solidarity and respect for elders influences his cooperative and considerate nature. While he proudly celebrates traditions such as Carnaval, he also embraces the multicultural
    fabric of Miami, integrating diverse perspectives into his professional and personal life. This cultural blend informs his collaborative work style, his passion for mentoring other Hispanic youths,
    and his commitment to preserving and sharing his heritage.
attributes:
  skills: '[''Data analysis'', ''Financial modeling'', ''Process improvement'', ''Advanced Excel'', ''Power BI'', ''Project management'', ''Stakeholder communication'', ''Bilingual Spanish-English'', ''Strategic
