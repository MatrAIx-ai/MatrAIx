personas:
  professional: Kriss Guzman, a 31-year-old automotive body technician, blends meticulous dent‑removal expertise with vivid digital graphics to deliver custom vehicle makeovers, leading a small crew with
    charismatic, talkative confidence while constantly trialing new composite materials and 3D‑modeled parts to stay ahead of industry trends.
  sports: Kriss Guzman dominates the sunny courts of Corpus Christi as a regular member of the South Texas Beach Volleyball Club, thrives on the team’s high‑energy matches, cheers for the Houston Astros
    in baseball and the Dallas Cowboys in football, and squeezes in occasional CrossFit sessions to maintain strength for both auto work and volleyball.
  arts: Kriss Guzman immerses in creative pursuits ranging from digital vehicle‑wrap designs inspired by sci‑fi visionary Syd Mead to sketching on a tablet while listening to electric‑blues guitarist Gary
    Clark Jr., performs original songs at local open‑mic nights, and revels in the tactile thrill of 3D‑printing bespoke automotive components.
  travel: Kriss Guzman uses the classic ’67 Camaro as a traveling workshop, favoring spontaneous road trips along the Gulf Coast, weekend getaways to Austin’s music festivals, and a long‑standing dream
    of touring Japan’s automotive design districts in Tsukuba and Osaka, balancing limited savings with the desire for cultural immersion.
  culinary: Kriss Guzman cooks up Tex‑Mex fusion dishes like chipotle‑marinated carne asada tacos with avocado crema and smoked brisket enchiladas, boasts a solid home‑grilling setup, experiments with fresh
    jalapeños and smoked paprika, yet often burns the occasional batch when caught up in late‑night shop projects.
  core: Kriss Guzman, a 31‑year‑old auto‑tech visionary, fuses artistic flair with mechanical precision, thrives on social interaction, relentlessly pursues novel designs, occasionally splurges on performance
    mods, and fuels creativity with endless coffee and late‑night sketch sessions.
background:
  cultural: Kriss grew up in a Mexican‑American family in Corpus Christi, where Spanish and English interweave in daily life. His parents instilled a strong work ethic and a deep appreciation for cultural
    traditions such as Día de los Muertos, which influences his penchant for vibrant, symbolic designs on cars. He regularly celebrates Mexican holidays with family gatherings centered around food, music,
    and storytelling, and he often incorporates the tastes of the Gulf coast—like fresh seafood—into his cooking. Bilingual and community‑focused, Kriss participates in local cultural festivals and mentors
    young people of similar heritage, sharing both his technical expertise and his artistic perspective.
attributes:
  skills: '[''auto body repair'', ''frame alignment'', ''MIG/TIG welding'', ''paint color matching'', ''custom vehicle graphics design'', ''digital illustration'', ''3D modeling for custom parts'', ''project
    estimation and quoting'', ''customer relationship management'', ''team leadership'', ''quality control and inspection'', ''competitor analysis'', ''continuous learning of new repair technologies'',
    ''creative problem solving'']'
  hobbies: '[''digital sketching'', ''custom car projects'', ''attending car shows'', ''beach volleyball'', ''3D printing hobbyist'', ''cooking Mexican‑Texan fusion dishes'', ''guitar playing and open‑mic
    nights'', ''photography of vehicles and coastal scenery'', ''organizing automotive meet‑ups'', ''reading science‑fiction and design magazines'']'
  career_goals: Kriss aims to earn Master Auto Body Technician certification and eventually launch his own boutique shop, "Guzman Custom Creations," that positions itself at the intersection of high-quality
    body repairs and artistic vehicle customization. He envisions the shop becoming a destination for Gulf Coast car enthusiasts seeking unique, hand‑crafted designs, and he plans to showcase his work at
    major events like SEMA. Beyond entrepreneurship, Kriss wants to develop a strong online presence through a YouTube channel and a design blog, sharing innovative repair techniques and creative concepts.
    He also aspires to mentor aspiring technicians from the local Mexican‑American community, fostering the next generation of skilled tradespeople.
