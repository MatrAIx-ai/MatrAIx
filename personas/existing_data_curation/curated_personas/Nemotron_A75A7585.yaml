  career_goals: Jessica aims to transition into a technical leadership role within the next three years, targeting positions such as Lead Developer or Solutions Architect where she can shape system architecture
    and guide cross‑functional teams. She also plans to complete her bachelor's degree in Computer Science to formalize her knowledge, and she is exploring certifications in cloud security and AI/ML to
    stay ahead of industry trends. A long‑term ambition is to mentor more women in tech and perhaps launch a boutique consultancy that offers flexible, remote development services for clients who value
    a collaborative, community‑centric approach.
