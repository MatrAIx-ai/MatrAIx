personas:
  professional: Jessica Cammack is a 41‑year‑old full‑stack software developer who blends her practical, structured problem‑solving with a flexible, collaborative style, using Python, JavaScript, and C#
    to architect scalable web applications for Midwestern small‑to‑medium enterprises while mentoring junior engineers and championing community‑focused tech initiatives.
  sports: Jessica Cammack plays forward for the Hoosier Community Soccer League, tackles Saturday hikes through the Indiana countryside, cheers for the Indiana Pacers and the Indianapolis Colts, and balances
    competitive team spirit with a laid‑back love of trail running and occasional yoga sessions.
  arts: Jessica Cammack fuels her creative side by attending live shows by indie folk act The Milk Carton Kids at downtown venues, joining improvisational theater workshops inspired by Second City techniques,
    and hosting board‑game nights featuring Catan and Azul, all of which sharpen her quick‑thinking and collaborative instincts.
  travel: Jessica Cammack favors spontaneous road trips across the Midwest, spending summers exploring Hocking Hills in Ohio, savoring deep‑dish pizza in Chicago’s West Loop, and dreaming of a future culinary
    tour of Tuscany, planning just enough to reserve campsites while leaving room for impromptu detours and local market finds.
  culinary: Jessica Cammack loves farm‑to‑table cooking, skillfully turning garden harvests into dishes like grilled rosemary chicken with seasonal vegetable medleys, roasted beet and goat‑cheese salads,
    and homemade fermented carrot pickles she sometimes over‑fills, while experimenting with heirloom tomatoes, fresh basil, and artisanal sourdough.
  core: Jessica Cammack balances a practical, tech‑savvy mind with a love for community projects, a habit of misplacing her keys on busy mornings, and an unquenchable appetite for soccer, code, fresh garden
    veggies, and impromptu improv sessions.
background:
  cultural: Jessica grew up in a middle‑class white family in rural Indiana, descended from German and Irish ancestors who settled in the Midwest during the early 20th century. The values of hard work,
    community involvement, and modesty typical of Hoosier culture shaped her practical outlook. She celebrates local traditions such as county fairs, high school football games, and church gatherings, which
    fostered her sociable nature. While she identifies with mainstream Midwestern Protestant values, she also embraces a progressive mindset, advocating for gender equity in tech and supporting local charitable
    initiatives.
