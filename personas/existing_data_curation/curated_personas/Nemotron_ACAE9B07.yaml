personas:
  professional: Sabrina Eidson, a 32-year-old cosmetology veteran and budding boutique salon owner, combines her precise balayage and ombre expertise, meticulous client consultations, and methodical business
    operations to create an eco-friendly, community-centric hair studio where her organized, outgoing nature turns first-time visitors into loyal patrons.
  sports: Sabrina Eidson stays active by playing for the Sebastian Beach Volleyball Club’s co-ed league each summer, paddling the Indian River with a local kayaking group, attending daily yoga sessions,
    and cheering on the Miami Heat while tracking her fitness routine in a color-coded planner.
  arts: Sabrina Eidson fuels her creative spirit by frequenting the Sebastian Fine Arts Festival, snapping portrait and shoreline photos for her Instagram while drawing inspiration from contemporary painter
    Maya Hayuk, indie folk duo Haim, and acoustic singer‑songwriter Jack Johnson, and she regularly volunteers to display her work in community gallery pop‑ups.
  travel: Sabrina Eidson prefers short, Instagram‑inspired getaways to sun‑kissed destinations like Nassau in the Bahamas, Grace Bay in Turks and Caicos, and the vibrant streets of Cartagena, balancing
    budget‑friendly hostels with occasional boutique resort stays, and she meticulously plans each trip using a visual mood board to capture the colors and textures she’ll later translate into her salon
    designs.
  culinary: Sabrina Eidson enjoys experimenting in her kitchen with fresh Gulf Coast catches, crafting dishes like grilled stone crab claws with citrus butter, mango‑lime ceviche, and Cajun shrimp étouffée
    seasoned with Old Bay and cilantro, showcasing her intermediate culinary skill and love for bright, herb‑forward flavors.
  core: Sabrina Eidson blends a Midwestern work ethic with beach‑side cheer, obsessively color‑coding her salon inventory while juggling a thriving Instagram feed, boutique dreams, and a habit of double‑checking
    every client appointment for perfect timing.
background:
  cultural: Sabrina grew up in a middle‑class white family on Florida’s Atlantic coast, where Southern hospitality and the laid‑back beach lifestyle blend seamlessly. Her parents, originally from the Midwest,
    moved to the Sunshine State for its warm climate and vibrant arts scene, instilling in her an appreciation for community gatherings, local festivals, and artistic expression. Raised in a small‑town
    environment, she learned the value of hard work, self‑reliance, and neighborly support—principles that guided her through her divorce and entrepreneurial aspirations. The multicultural tapestry of Sebastian,
    with its mix of retirees, tourists, and a growing Hispanic community, has exposed her to diverse cultural influences while she maintains a strong sense of her Anglo‑American heritage. This background
    informs her sociable, outgoing nature, her curiosity about new ideas, and her organized approach to both personal and professional life.
