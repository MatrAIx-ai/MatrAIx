  hobbies: '[''Visiting Art Galleries and Museums'', ''Beach Volleyball and Water Sports'', ''Yoga and Mindfulness Practice'', ''Photography (Portrait and Nature)'', ''Travel to Coastal Destinations'',
    ''Cooking and Exploring New Cuisines'', ''Community Volunteering (Charity Haircuts, Beach Clean‑ups)'', ''Reading Contemporary Fiction'', ''DIY Home Decor Projects'', ''Attending Live Music and Cultural
    Festivals'']'
  career_goals: Sabrina’s primary ambition is to open a boutique salon in Sebastian that combines high‑end styling with a holistic, eco‑friendly approach, offering organic products and wellness services
    such as scalp massages and yoga‑infused relaxation sessions. She aims to become a recognized authority in hair artistry on the Florida East Coast, hosting master‑class workshops, publishing tutorial
    videos, and securing ambassador roles with premium hair‑care brands. Long‑term, she plans to develop a line of signature hair products, mentor emerging stylists through an apprenticeship program, and
    expand her brand into a curated retail space that reflects her love of art and design. Her organized nature drives her to create detailed business plans, set measurable milestones, and maintain a balanced
    schedule that supports both professional growth and personal well‑being.
