personas:
  professional: Victoria Ulloa is a seasoned material‑handling specialist with three decades of hands‑on forklift, yard‑tractor, and side‑loader operation in fast‑paced warehouse and port environments,
    certified in OSHA forklift safety and DOT‑compliant vehicle operation, renowned for her meticulous pre‑operation inspections, calm yet competitive leadership style, and a talent for training new hires
    while enforcing strict safety and documentation protocols.
  sports: Victoria Ulloa spends her weekends fishing off the Hyannis harbor, walking the waterfront trails, cheering for the Boston Red Sox and Boston Celtics, and participating in a local sailing club
    where she joins seasonal regattas, balancing her love of the sea with a structured fitness routine.
  arts: Victoria Ulloa sings in her Catholic church choir, immerses herself in mystery novels by Agatha Christie and Gillian Flynn, and fills her home with lively bachata, merengue, and salsa tunes from
    artists such as Juan Luis Guerra and Marc Anthony, using the music’s rhythm to energize her cooking and garden work.
  travel: Victoria Ulloa favors meticulously planned coastal getaways, having explored historic Boston, the serene beaches of Martha’s Vineyard, and a nostalgic trip to Caribbean islands where she revisited
    the flavors of her childhood, always balancing travel costs with her retirement savings goals and a preference for predictable itineraries.
  culinary: Victoria Ulloa’s culinary repertoire showcases hearty sancocho de pollo, silky mangú served with fried plantains and sautéed onions, and golden pastelitos de carne, each seasoned with garden‑grown
    cilantro, ají dulce, and oregano, reflecting her precise, tradition‑rooted approach to home cooking.
  core: Victoria Ulloa is a pragmatic forklift veteran who channels her structured, calm demeanor into meticulous safety leadership, disciplined finances, garden‑fresh cooking, and a love for seaside hobbies,
    all while silently competing with herself to perfect every recipe and shift schedule.
background:
  cultural: Victoria was born to Dominican immigrant parents who settled in Boston in the late 1960s. She grew up speaking Spanish at home and celebrated Dominican holidays such as Independence Day and
    Día de los Reyes with family gatherings featuring music, dance, and traditional foods. Although she moved to Hyannis after marrying her late husband, she maintains strong ties to the Dominican diaspora
    through the local Dominican Cultural Association, where she volunteers at the annual fiesta and contributes to bilingual community outreach. Her Catholic faith, love of merengue, and devotion to family
    recipes blend with the maritime heritage of Cape Cod, giving her a hybrid cultural identity that values both Caribbean warmth and New England resilience.
attributes:
  skills: '[''Forklift operation (counterbalance, reach, pallet jack)'', ''Yard tractor and side‑loader operation'', ''Equipment maintenance and minor repairs'', ''Safety compliance (OSHA, DOT)'', ''Inventory
    management and logistics coordination'', ''Warehouse management software (SAP WMS, Fishbowl)'', ''Training and mentorship of new operators'', ''Bilingual communication (English/Spanish)'']'
  hobbies: '[''Cooking Dominican cuisine (sancocho, mangú, pastelitos)'', ''Community garden gardening (vegetables and flowers)'', ''Saltwater fishing and occasional boating on Cape Cod Bay'', ''Walking
    along Hyannis Harbor and nature trails'', ''Reading mystery and detective novels'', ''Participating in the local Catholic church choir and volunteer events'', ''Listening to traditional Dominican music
    (bachata, merengue, salsa)'']'
  career_goals: Victoria aims to be promoted to senior equipment lead, overseeing a team of operators and coordinating daily shift schedules. She plans to earn advanced certifications such as the Certified
    Safety Professional (CSP) and a heavy‑equipment operator license for cranes, positioning herself for a future role as a safety trainer or compliance auditor. Over the next five years she wants to mentor
    at least three new hires, develop a training manual for equipment safety, and secure a stable retirement fund that will allow her to open a home‑based Dominican catering service, sharing her family’s
    recipes with the Hyannis community.
