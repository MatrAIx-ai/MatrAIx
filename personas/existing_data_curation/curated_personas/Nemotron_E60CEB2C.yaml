personas:
  professional: Kenya Wood is an aspiring comic creator and budding game world builder, blending practical storytelling techniques learned from school assignments with boundless imagination, and they often
    channel their curious yet easy‑going nature into Minecraft projects and class presentations.
  sports: Kenya Wood dribbles on the local community park courts as a member of the Junior Hoops Club, roots for the Chicago Bulls in the NBA and cheers for the Springfield Tigers youth basketball team,
    and they blend active play with occasional pauses to sketch game moments in their notebook.
  arts: Kenya Wood immerses themselves in R&B legends like Beyoncé, hip‑hop icons such as Kendrick Lamar, and gospel choirs from their Sunday church, while drawing comic strips inspired by anime artist
    Katsuhiro Otomo and devouring fantasy novels by J.K. Rowling and Rick Riordan; they also love dancing at school events whenever a favorite track drops.
  travel: Kenya Wood enjoys spontaneous weekend hikes through the nearby woods and creek, dreams of exploring Yellowstone National Park and the ancient castles of Edinburgh, and they prefer low‑cost family
    road trips with a loose itinerary that leaves room for impromptu nature‑journaling stops.
  culinary: Kenya Wood loves baking chocolate chip cookies with their mom, experimenting with oat‑flour variations and caramel drizzle, and they also savor snacks like mango slices and classic grilled cheese,
    though they often forget to tidy up the kitchen afterward.
  core: Kenya Wood is a curiosity‑driven, emotionally vivid 11‑year‑old who balances hands‑on creativity with occasional disorganization, turning intense feelings into comic art while navigating the ups
    and downs of anxiety.
background:
  cultural: Kenya is an African‑American girl growing up in Northport, Alabama, a small town with deep Southern roots. Her family’s cultural life blends church traditions, Southern cooking, and a strong
    sense of community. Family gatherings feature collard greens, cornbread, and stories passed down from grandparents about the civil‑rights movement and the history of the Black church in the South. Church
    youth groups offer her a space to sing gospel, participate in service projects, and celebrate holidays like Juneteenth. The local Black community’s emphasis on resilience, education, and mutual support
    shapes her identity and fuels her desire to give back.
