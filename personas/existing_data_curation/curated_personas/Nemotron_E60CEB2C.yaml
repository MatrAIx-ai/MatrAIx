  career_goals: Kenya dreams of turning her love for animals and the outdoors into a future career as a veterinarian or wildlife biologist, where she can combine scientific curiosity with practical care.
    She also hopes to share her stories by becoming a children's author, writing about the adventures of curious kids who explore nature and cope with big feelings. In the longer term she imagines mentoring
    younger students in her community, encouraging them to experiment with coding, art, and science while fostering emotional well‑being.
