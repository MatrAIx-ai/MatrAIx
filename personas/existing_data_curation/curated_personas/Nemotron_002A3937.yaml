  career_goals: Robert aims to move into a supervisory role within the next two to three years, such as shift lead or assistant floor manager, where he can apply his teamwork and mentorship strengths to
    improve store efficiency and employee morale. He plans to complete a part‑time certification in supply‑chain logistics to deepen his understanding of inventory analytics. Long‑term, he envisions becoming
    a store manager, creating a supportive, low‑stress environment for his crew, and perhaps leading community outreach programs that link the store with local events and charities. He also hopes to develop
    better personal organization skills to reduce his own stress and set a positive example for his teammates.
