personas:
  professional: Yali Mehra, the three‑year‑old sandbox strategist, turns every playtime into a meticulously organized construction project, using color‑coded blocks and a strict step‑by‑step routine, and
    consistently rallies fellow toddlers to meet the high standards they set for their miniature 'architectural' creations.
  sports: Yali Mehra dashes into the local 'Tiny Tigers' toddler soccer club each Saturday, where they energetically practice dribbling and scoring, cheer for the New York Yankees as their favorite pro
    team, and thrive on the competitive spirit of beating rival teams in their age‑group league.
  arts: Yali Mehra spends afternoons humming along to Raffi’s 'Baby Beluga' and drawing intricate pictures of dinosaurs while meticulously arranging their crayons by shade, a habit that mirrors their love
    for order and channeling the playful creativity of beloved children's performers like The Wiggles.
  travel: Yali Mehra enjoys family outings to the nearby aquarium and the magical world of Disneyland, preferring well‑planned itineraries that include a predictable snack break, yet they dream of a future
    adventure to Tokyo’s kid‑friendly museums where they can explore new cultures within a structured schedule.
  culinary: Yali Mehra devotes a special place on their plate for perfectly shaped macaroni and cheese, insists on a separate section for carrot sticks, proudly shows off their ability to spread peanut
    butter on toast evenly, and occasionally delights in tasting the occasional strawberry slice as a special treat.
  core: Yali Mehra is a routine‑obsessed, hyper‑organized three‑year‑old who combines boundless energy with a competitive streak, turning every playdate, snack, and savings goal into a meticulously structured
    challenge.
background:
  cultural: Yali is a first‑generation South Asian American of Indian heritage growing up in Rockville, Maryland, a community with a vibrant Indian diaspora. At home, she hears Hindi alongside English,
    and her family celebrates festivals such as Diwali, Holi, and occasionally Eid, blending traditional customs with American life. Meals often feature aromatic dishes like rice, dal, and roti, and she
    enjoys listening to Bollywood music and learning simple classical dance steps. Her parents value education, discipline, and routine, encouraging her to maintain high standards and practical thinking.
    The multicultural environment of Montgomery County, with its diverse schools and community centers, supports her sociable nature and participation in group activities.
