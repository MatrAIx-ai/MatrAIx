  career_goals: Yali enjoys imagining future roles. She often expresses a desire to become a doctor, inspired by family members in healthcare, and loves the idea of helping others stay healthy. She also
    shows interest in teaching, imagining herself guiding younger children in a classroom setting. Additionally, her love for music and dance fuels a dream of performing traditional South Asian dance on
    stage. Underlying these aspirations is her drive to excel, achieve high standards, and make a positive impact.
