personas:
  professional: Blake Natali, a veteran convention planner, applies a methodical, data‑driven approach to logistics, vendor negotiation, and risk management—using Cvent, Eventbrite, and advanced Excel reporting—to
    orchestrate large‑scale events that stay on schedule, under budget, and minimize team stress, while mentoring junior staff toward the same disciplined standards.
  sports: Blake Natali, a lifelong fan of the Carolina Panthers and Charleston Battery, plays weekly lawn bowling at the downtown community center, joins a senior golf league at Kiawah Island Club each
    spring, and keeps a disciplined regimen of early morning walks along the Lowcountry waterways, pairing fitness with occasional bird‑watching outings.
  arts: Blake Natali, whose evenings often feature a glass of sweet tea while listening to the bluegrass twang of The Del McCoury Band and reading David McCullough’s meticulous histories, also attends local
    theater productions of classic Shakespeare plays and collects vintage model‑railroad artwork by Bob Zabriskie.
  travel: Blake Natali, a planner by nature, prefers meticulously organized road trips that blend historic tours of Savannah and Asheville with leisurely fishing weekends on the Outer Banks, has already
    visited the Great Smoky Mountains national park, and dreams of a guided cultural pilgrimage to the historic streets of Edinburgh, all while balancing a modest retirement budget and occasional family
    obligations.
  culinary: Blake Natali, an avid Southern barbecue enthusiast, meticulously seasons pulled pork with a custom rub of smoked paprika, brown sugar, and cayenne, slow‑cooks it over cherry wood while serving
    fresh heirloom tomatoes and sweet corn from their garden alongside traditional collard greens and hush puppies, and prides themselves on perfecting the balance of sweet, spicy, and smoky flavors.
  core: Blake Natali, a 65‑year‑old methodical event guru who channels competitive chess sharpness into flawless convention planning, finds solace in woodworking, barbecue, and bird‑watching, yet battles
    a chronic worry habit that fuels both meticulousness and occasional stress‑induced over‑preparation.
background:
  cultural: Blake grew up in a small town in Horry County, South Carolina, within a multigenerational family that valued hard work, community responsibility, and traditional Southern hospitality. His upbringing
    was shaped by the coastal culture of the Lowcountry, where tourism and local festivals played a central role. He attended a state university, earning a bachelor's degree in a STEM field, and later transitioned
    into event planning, a career that leveraged the region’s strong tourism economy. Blake identifies with the Protestant faith common in his area, attending a Baptist congregation regularly, and he maintains
    an appreciation for Southern culinary traditions, local history, and the tight‑knit social fabric of his community.
attributes:
  skills: '[''Event Planning'', ''Logistics Coordination'', ''Budget Management'', ''Vendor Negotiation'', ''Project Management'', ''Risk Assessment & Crisis Management'', ''Contractual Agreements'', ''Team
