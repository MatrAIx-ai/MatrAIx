persona_description: A pediatric geneticist and researcher, specifically focused on studying de novo mutations in the development of the heart and brain. She has expertise in exome sequencing, epigenetic
  control, and the role of histone methylation in gene expression. She has published extensively on the topic of congenital heart defects and autism, and is a member of the Howard Hughes Medical Institute.
  Her research aims to uncover the underlying mechanisms of these diseases and tailor medical and surgical care for each individual patient.
