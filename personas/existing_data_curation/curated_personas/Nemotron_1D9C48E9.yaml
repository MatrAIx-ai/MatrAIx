  career_goals: James aspires to a future where he can help others within a clear, structured environment. He dreams of becoming a firefighter, drawn to the teamwork, protocols, and community service the
    role offers. He also imagines himself as an engineer or astronaut, solving puzzles and building things, and hopes to earn a black belt in karate to develop discipline and assertiveness. At school, he
    aims to be class president and continue leading his sports teams.
