personas:
  professional: James Glover, a budding young coder who builds simple Scratch games and intricate LEGO models, they apply methodical planning, reliability, and a love for group projects, foreshadowing a
    future in software engineering.
  sports: James Glover, a member of the Beaumont Youth Soccer Academy and the Beaumont Raiders basketball club, spends weekends chasing balls on the field and court while cheering for the Los Angeles Lakers
    and LA Galaxy, and they channel this enthusiasm into a disciplined, energetic approach to fitness and teamwork.
  arts: James Glover, who sketches comic strips inspired by Stan Lee, animates short stories after watching Hayao Miyazaki films, and enjoys listening to Imagine Dragons while building LEGO models, they
    let their artistic imagination shape their free time.
  travel: James Glover, who loves family road trips to the San Bernardino hiking trails and occasional visits to Disneyland, dreams of exploring Yosemite National Park and a beach vacation in Hawaii, and
    they prefer well‑planned itineraries that combine adventure with familiar comforts.
  culinary: James Glover, an enthusiastic junior chef in his family's kitchen, can reliably whip up pepperoni pizza, classic mac and cheese, and homemade chicken quesadillas using cheddar, jalapeños, and
    salsa, though they often sneak extra cheese when no one watches.
  core: James Glover blends organized, energetic teamwork with a love for LEGO, Scratch coding, and spontaneous snack raids, they become the go‑to planner for group games while occasionally blowing their
    allowance on limited‑edition sets.
background:
  cultural: James grows up in a middle‑class white family in Beaumont, California, a suburban community in Riverside County. His upbringing reflects mainstream American values of independence, responsibility,
    and community involvement, while also being shaped by Southern California’s diverse environment. He celebrates holidays such as Thanksgiving, Christmas, and the Fourth of July, and has occasional exposure
    to Spanish language and Hispanic cultural elements common in the region. Participation in school clubs, sports leagues, and Boy Scouts reinforces teamwork, volunteerism, and respect for nature, giving
    him a balanced, culturally aware perspective.
