  career_goals: Ladina aims to turn her sociable nature and community‑focused experience into a career as a community outreach coordinator or event planner for nonprofit organizations in Philadelphia. She
    plans to enroll in a certificate program in nonprofit management within the next year, with the longer‑term goal of earning a bachelor’s degree in communications or social work. She hopes to secure
    a flexible, part‑time role that allows her to continue volunteering, while eventually launching a freelance gig that offers event planning and social‑media consulting services for local small businesses
    and community groups.
