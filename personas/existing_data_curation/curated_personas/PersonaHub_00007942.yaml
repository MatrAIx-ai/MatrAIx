persona_description: A policy analyst with a focus on climate change and its impacts, particularly on non-economic dimensions such as cultural heritage, biodiversity, and traditional ways of living. This
  person is interested in the development and implementation of policies that mitigate or address the risks of non-economic loss and damage (NELD) in the context of climate change negotiations under the
  United Nations Framework Convention on Climate Change. They are looking for a conceptual framework and policy recommendations that can help in categorizing and addressing the diverse cases of NELD. This
  persona is likely to be involved in international policy-making and advocacy for sustainable development and climate resilience.
