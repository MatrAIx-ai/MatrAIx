personas:
  professional: Jacob Burnett, a retired master carpenter and furniture restorer, now channels his decades of hands‑on craftsmanship into mentoring a youth apprenticeship in carpentry, coordinating senior
    volunteer programs at the community center, and curating a traveling exhibition of his reclaimed‑wood pieces, all while applying his curious, organized yet flexible nature to blend tradition with community
    outreach.
  sports: Jacob Burnett stays active by hiking the gentle trails of the nearby state park in spring, joining the local senior shuffleboard league at the community center during winter, and cheering on the
    Montcalm Miners baseball team each summer, all while using birdwatching binoculars to combine fitness with his love of nature.
  arts: Jacob Burnett immerses himself in Appalachian folk music, regularly playing and listening to banjo legends like Doc Watson and contemporary acts such as The Punch Brothers, while attending art fairs
    that showcase works by folk painter Howard Finster and visiting the nearby Appalachian Heritage Museum to study regional art history.
  travel: Jacob Burnett prefers low‑key road trips that blend scenic drives along the Blue Ridge Parkway with visits to historic mountain towns such as Asheville and Boone, and although budget‑conscious,
    he dreams of a pilgrimage to the Grand Ole Opry in Nashville to deepen his connection to the folk‑music lineage that defines his community.
  culinary: Jacob Burnett enjoys cooking simple, seasonal meals like heirloom tomato and basil bruschetta, skillet‑fried cornbread with honey butter, and smoked trout seasoned with fresh dill, often using
    home‑grown vegetables and foraging wild mushrooms to add earthy flavor to his beloved chicken and dumpling stew.
  core: Jacob Burnett is a curiosity‑driven, community‑oriented elder who blends masterful woodworking, banjo folk tunes, and meticulous record‑keeping, yet humorously hoards every spare nail and refuses
    to upgrade to a smartphone, preferring handwritten notes.
background:
  cultural: Jacob is a fifth‑generation Appalachian raised in the coal‑mining valleys of Mercer County, West Virginia. His family’s roots trace back to Scots‑Irish settlers who arrived in the 18th century,
    and his upbringing was shaped by Methodist church life, self‑reliance, and a strong sense of community. The decline of the coal industry in his youth fostered a deep appreciation for the region’s folk
    traditions—music, storytelling, and crafts—which he continues to honor. His worldview reflects the values of humility, hospitality, and respect for the natural landscape that define rural West Virginian
    culture.
