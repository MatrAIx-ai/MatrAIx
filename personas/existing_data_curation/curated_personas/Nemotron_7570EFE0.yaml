  career_goals: Even in retirement, Jacob aims to leave a lasting imprint on Montcalm's cultural memory. He plans to compile an oral‑history collection of senior residents, publish a memoir reflecting post‑war
    Appalachian life, and organize a traveling exhibition of his woodworking. Jacob also hopes to mentor a youth apprenticeship program in carpentry, expand the community garden he helps tend, and serve
    as a guide for heritage tours that highlight the region's music, crafts, and natural landscapes.
