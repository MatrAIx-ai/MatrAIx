  hobbies: '[''Street mural sketching'', ''Urban photography'', ''Listening to jazz and hip‑hop'', ''Pickup basketball'', ''Cooking Creole cuisine'', ''Reading art history and sustainable architecture books'',
    ''Attending small live music venues'', ''Exploring urban design blogs'']'
  career_goals: Donald aims to advance to a full project manager role within the next five years, completing his bachelor’s degree in construction management or civil engineering. He plans to earn PMP certification
    and become an OSHA trainer. Long‑term, he envisions founding a small, community‑focused construction firm that uses sustainable building methods and integrates local art into public spaces, while mentoring
    apprentices from under‑represented backgrounds.
