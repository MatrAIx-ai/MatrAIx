personas:
  professional: Donald Mellion, a 26‑year‑old construction supervisor in Metairie, blends hands‑on carpentry expertise with Procore‑driven project management, mentors crews while infusing site safety with
    a keen eye for sustainable design and local artistic flair, and they are known for balancing meticulous organization with spontaneous problem‑solving on fast‑changing job sites.
  sports: Donald Mellion, a pickup basketball enthusiast, competes weekly at the Metairie Community Center, roots for the New Orleans Pelicans and Saints, follows the local rowing club’s spring regatta,
    and incorporates brief yoga stretches to counteract the strain of on‑site labor.
  arts: Donald Mellion channels curiosity for art by sketching vibrant street murals inspired by Banksy and local Creole motifs, attending live jazz sets at Snug Harbor and hip‑hop showcases featuring Kendrick
    Lamar’s peers, and devouring books on art history and sustainable architecture, and they often blend these influences into on‑site design ideas.
  travel: Donald Mellion dreams of architecture‑focused trips, having already explored the historic French Quarter, taken weekend road trips to Charleston and Savannah for their colonial charm, and saving
    for a future study tour of Copenhagen’s green‑building scene, while they prefer spontaneous itineraries over rigid planning.
  culinary: Donald Mellion enjoys cooking Creole staples such as jambalaya with andouille sausage, black‑eyed pea gumbo, and beignets dusted with powdered sugar, often experimenting with smoked paprika
    and fresh okra while swapping recipes during family gatherings, and they relish the communal spirit of Sunday pot‑luck meals.
  core: Donald Mellion is a quietly driven construction supervisor who fuses sustainable building practices with street‑level art, obsessively sketches after midnight, balances a modest savings habit with
    occasional coffee splurges, and they rarely miss a chance to mentor a younger crew member.
background:
  cultural: Donald is an African‑American raised in Metairie, part of the greater New Orleans metropolitan area. He grew up in a community that blends Southern, Creole, and Black cultural traditions, with
    strong ties to gospel music, Mardi Mardi celebrations, and the historic legacy of the city’s Black neighborhoods. Family gatherings often feature soul food and storytelling, and he has participated
    in local festivals that celebrate African‑American art and resilience. This heritage informs his appreciation for music, food, communal support, and his desire to give back through building projects
    that strengthen his neighborhood.
attributes:
  skills: '[''Construction site supervision'', ''Crew scheduling'', ''Blueprint reading'', ''Safety compliance (OSHA)'', ''Budget tracking'', ''Conflict resolution'', ''Team leadership'', ''Basic carpentry'',
