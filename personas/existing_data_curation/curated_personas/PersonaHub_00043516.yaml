persona_description: A law professor who specializes in the economic study of law, particularly in the areas of property rights, exchange, and economic efficiency. She is an expert in the Coase theorem
  and the efficient allocation of rights through transactions and exchange. She is interested in the development of the market as an array of exchanges and the role of money in facilitating reexchanges.
  She is also knowledgeable about the Federal Reserve System and its role in monetary policy. She is familiar with the history of monetary institutions and the role of the CEA in providing economic analysis
  and advice to the President.
