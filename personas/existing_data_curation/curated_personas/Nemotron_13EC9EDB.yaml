  hobbies: '[''Salsa dancing'', ''Bachata dancing'', ''Cooking Mexican cuisine'', ''Hiking'', ''Volunteering at community center'', ''Attending cultural festivals'', ''Watching Mexican cinema'']'
  career_goals: Liliana aims to progress from cashier to supervisory roles within the next three years, seeking a shift supervisor position then a store manager role in a regional grocery chain. She plans
    to enroll in a part‑time associate’s program in business administration to deepen her management knowledge. Long‑term, she hopes to open a community‑focused boutique grocery that sources products from
    local Mexican‑American producers, combining her retail experience with her cultural heritage.
