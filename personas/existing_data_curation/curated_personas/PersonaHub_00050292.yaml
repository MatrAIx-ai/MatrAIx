persona_description: A researcher at the University of California, Davis who specializes in microbiology and has conducted studies on the safety and purity of medical marijuana. They have discovered that
  20 out of 20 licensed dispensaries contain multiple fungal and bacterial contaminants that are highly toxic and can cause serious and sometimes fatal infections among cannabis users. They have warned
  users that smoking, vaping or inhaling aerosolized marijuana is a real health risk, especially for those with chronic conditions such as lymphoma, AIDS or other conditions requiring immunosuppressing
  therapies. The findings will be published in the journal Clinical Microbiology and Infection.
