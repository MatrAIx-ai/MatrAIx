  hobbies: '[''Choir singing'', ''Bridge'', ''Gardening'', ''Cooking and recipe experimentation'', ''Book club'', ''Genealogy research'', ''Walking group'', ''Volunteering at soup kitchen'']'
  career_goals: Despite being retired, Kerryann is driven to leave a lasting imprint on her community. She aims to lead the local seniors’ council, champion improved access to health services for older
    adults, and secure a grant to expand the neighborhood garden she helped establish. She also hopes to compile her life stories and family genealogy into a memoir that can serve as both a historical record
    and an inspiration for younger generations. Competitive by nature, she enjoys participating in local cooking contests and strives to become a recognized mentor for youth interested in culinary arts
    and community activism.
