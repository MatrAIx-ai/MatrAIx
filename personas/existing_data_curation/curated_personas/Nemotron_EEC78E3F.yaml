personas:
  professional: Geordi Fulton, a budding mechanical tinkerer, spends afternoons assembling model kits, experimenting with Scratch coding, and poring over engine manuals, channeling a practical, routine‑driven
    mindset into a methodical approach to future engineering studies while quietly supporting peers through collaborative garden projects.
  sports: Geordi Fulton, an avid fishing enthusiast who also jogs the lakeside trail, roots for the local high school football team the Riverside Falcons and follows the New York Yankees, preferring solitary
    outdoor activity while occasionally joining a community youth baseball league for the social structure it offers.
  arts: Geordi Fulton, a quiet connoisseur of music, fills their garden evenings with the soulful croons of Aretha Franklin, the improvisational brilliance of Miles Davis, and the lyrical flow of Kendrick Lamar,
    while occasionally sketching technical diagrams that echo the aesthetic of vintage engine schematics.
  travel: Geordi Fulton, a methodical planner, dreams of quiet getaways to Japan’s meticulously maintained gardens and Germany’s automotive museums, yet most of their trips are to nearby state parks like
    Shenandoah for weekend fishing, arranging itineraries down to the minute to preserve their cherished routines.
  culinary: Geordi Fulton, a practical home cook, favors simple yet fresh dishes such as grilled trout with lemon‑herb butter, garden‑grown tomato basil pasta, and homemade macaroni and cheese, relying
    on the herbs from their plot and avoiding overly elaborate recipes that disrupt their structured schedule.
  core: Geordi Fulton is a routine‑oriented, solitary teen who blends a practical engineering curiosity with quiet kindness, balancing meticulous hobby projects with occasional community garden help, all
    while navigating typical teenage health quirks and disciplined savings.
background:
  cultural: Geordi grew up in a close‑knit African‑American family in Beaver Dam, Wisconsin, where church gatherings, family storytelling, and community support have shaped his values. The local Black church
    and neighborhood events provide him with a sense of cultural identity and solidarity, while the broader Midwestern environment teaches him the importance of hard work, humility, and perseverance. His
    experiences as a minority in a small town have reinforced his empathy, kindness, and desire to maintain harmony within his community.
