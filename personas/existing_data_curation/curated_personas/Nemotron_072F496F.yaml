  hobbies: '[''Urban gardening'', ''Playing card games (bridge, rummy)'', ''Community theater acting'', ''Cooking Italian and Irish cuisine'', ''Church choir participation'', ''Walking in local parks'',
    ''Watching classic films'', ''Reading local history'', ''Volunteer mentoring in home repair'', ''Woodworking crafts'', ''Collecting vintage radios'']'
  career_goals: Although retired, Joseph aims to stay active and continue contributing to his community. He plans to volunteer as a senior‑center activity coordinator, mentor younger residents in home‑repair
    skills, and preserve the local history of Ozone Park through a personal genealogy project and a memoir. He hopes to establish a weekend woodworking workshop to create handcrafted items for local markets,
    combine his practical expertise with his love for social interaction, and maintain his health to enjoy regular travel with his wife.
