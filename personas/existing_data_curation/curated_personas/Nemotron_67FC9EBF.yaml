personas:
  professional: Jonathan Culianos, a 38‑year‑old physics and computer science instructor, leverages his love for watercolor and zydeco rhythm to design STEAM curricula that weave visual arts into computational
    modeling, while his meticulous yet flexible teaching style reflects his balanced approach to organization and creativity.
  sports: Jonathan Culianos follows the New Orleans Pelicans and the New Orleans Saints avidly, participates in a weekend running group at Bayou Segnette, and spends Sunday mornings kayaking with the Denham
    Springs Paddle Club while preferring low‑intensity cardio over gym workouts, reflecting his preference for solitary, nature‑based exercise.
  arts: Jonathan Culianos immerses himself in the sounds of zydeco legends BeauSoleil and jazz trumpeter Kermit Ruffins, sketches watercolor bayou scenes after evenings at the Woodlands Art Gallery, and
    finds inspiration in the speculative worlds of Ursula K. Le Guin and the visual poetry of Ansel Adams, which together shape his creative identity.
  travel: Jonathan Culianos plans trips with a blend of careful spreadsheets and spontaneous detours, favoring weekend drives to the historic streets of New Orleans for Mardi Gras revelry, annual pilgrimages
    to the Cajun‑rich swamps of Lafayette, and long‑awaited voyages to the coastal villages of Brittany, France, where they seek the same quiet charm found in Louisiana’s bayous.
  culinary: Jonathan Culianos enjoys mastering Cajun classics like jambalaya, gumbo with okra and andouille sausage, and crawfish étouffée, often improvising with fresh catfish from Lake Maurepas and a
    dash of file powder, while occasionally indulging in beignets from Cafe du Monde as a sweet treat after evening guitar sessions.
  core: Jonathan Culianos blends a meticulous academic mind with a deep‑rooted love for bayou art, juggling research anxieties with nightly guitar strums and a habit of double‑checking every spreadsheet,
    even the grocery list.
background:
  cultural: Jonathan is a white American raised in the Deep South, specifically in the suburban community of Denham Springs, Louisiana. His family background includes Anglo‑American and French‑Canadian
    ancestry, reflecting the region’s historical settlement patterns. He grew up immersed in Southern cultural norms—hospitality, close‑knit community ties, and a reverence for local traditions such as
    Mardi Gras celebrations, Cajun cuisine, and the sounds of zydeco and jazz. The blended cultural milieu of Louisiana, with its French, African, and American influences, has shaped his appreciation for
    diverse artistic expressions and his cooperative, harmony‑seeking outlook. He identifies with the modest, resilient ethos of the region while valuing broader national values of education and intellectual
    curiosity.
attributes:
  skills: '[''Undergraduate teaching'', ''Curriculum development'', ''Educational technology integration'', ''Data analysis (Python, MATLAB, R)'', ''STEM‑arts interdisciplinary program design'', ''Student
    mentorship'', ''Research on student well‑being'', ''Public speaking'', ''Grant writing'', ''Collaborative project management'']'
  hobbies: '[''Art gallery visits'', ''Watercolor painting'', ''Acoustic guitar'', ''Science‑fiction reading'', ''Philosophy reading'', ''Hiking'', ''Birdwatching'', ''Cajun cooking'', ''Zydeco music listening'',
    ''Puzzle solving'', ''Fishing'']'
  career_goals: Jonathan aims to secure a tenure‑track position at a four‑year university and, within the next decade, become department chair. He plans to develop a flagship STEAM program that bridges
    physics with visual arts, obtain a major NSF grant to study anxiety mitigation in STEM education, and publish peer‑reviewed articles on effective teaching strategies. He also intends to expand community
    outreach by offering after‑school STEM workshops in Denham Springs, mentor junior faculty, and contribute to institutional policies that support student mental health and well‑being.
