  hobbies: '[''Oil painting'', ''Ceramic sculpture'', ''Literary fiction reading'', ''Journaling'', ''Birdwatching'', ''Vegetable gardening'', ''Yoga'', ''Guided meditation'', ''Quiet museum visits'', ''Classical
    piano listening'']'
  career_goals: Gloriana aims to transition from a teaching assistant role to a full-time adjunct lecturer in humanities, with a focus on integrating art and mental-wellness curricula. She hopes to design
    and lead an interdisciplinary course that explores how visual arts can be used as therapeutic tools, eventually publishing a monograph on the subject. Over the next five years she plans to secure a
    doctorate in interdisciplinary studies, obtain a small grant to launch a community-based art-therapy outreach program for underserved seniors in Houston, and become a trusted mentor for students navigating
    academic pressure.
