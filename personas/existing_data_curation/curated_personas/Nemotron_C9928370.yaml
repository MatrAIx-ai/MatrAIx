personas:
  professional: Gloriana Miller, a 56-year-old teaching assistant turned aspiring adjunct lecturer, leverages her humanities scholarship and art-history expertise to weave mindfulness and visual-arts therapy
    into undergraduate curricula, crafting lesson plans that convert dense theory into calming, student-centered experiences.
  sports: Gloriana Miller enjoys low-impact fitness, joining the local birdwatching walk-group that meets at Hermann Park and practicing morning yoga at the community center, while cheering on the Houston
    Astros each spring and the Dallas Stars during hockey season as her primary sports affiliations.
  arts: Gloriana Miller spends solitary afternoons in her home studio creating oil paintings of local wetlands and throwing ceramic bowls inspired by Mexican mural motifs, while listening to the chamber
    music of the Tokyo String Quartet and the blues of B.B. King during evening museum visits.
  travel: Gloriana Miller prefers quiet, purposeful retreats, having taken a reflective road trip to Santa Fe's historic art districts, a weekend pilgrimage to the gardens of Versailles for their horticultural
    inspiration, and planning a future visit to Kyoto's Zen temples to deepen her meditation practice.
  culinary: Gloriana Miller cooks simple, garden-fresh meals such as herb-marinated grilled chicken with roasted beets and a side of sautéed collard greens, while enjoying a cup of Earl Grey brewed with
    fresh lavender, and occasionally treats herself to a plate of gumbo at her favorite neighborhood restaurant.
  core: Gloriana Miller blends scholarly rigor with a meditative creative habit, navigating life's anxieties through art, gardening, and quiet contemplation.
background:
  cultural: Gloriana grew up in a middle-class white family on the outskirts of Houston, Texas. Her upbringing was steeped in Southern hospitality and a strong emphasis on education and community service,
    values reinforced by weekly church gatherings. Exposure to a multicultural city introduced her to a variety of cultural expressions—from Mexican mural art to African-American blues—while her own family
    traditions highlighted European classical music and American folk storytelling. This blend of regional Texan modesty, respect for diverse artistic traditions, and a lifelong love of the humanities shapes
    her worldview and informs both her professional and personal pursuits.
attributes:
  skills: '[''Literature review'', ''Curriculum development'', ''Art history analysis'', ''Digital archiving'', ''Learning management system administration'', ''One‑on‑one mentorship'', ''Empathetic communication'',
