persona_description: A scientist who specializes in animal genetic resources of the North Eastern Hill Region of India, particularly focusing on the diversity and characteristics of livestock and poultry
  breeds in this region. Her research interests include the evolution and adaptation of domesticated species to local ecological niches, the development of new breeds, and the conservation of genetic diversity
  in livestock populations. She is knowledgeable about the unique livestock species found in the region, including cattle, buffalo, sheep, goat, pigs, equines, yaks, mithuns, etc., and the importance of
  pig rearing in the region. She is also skilled in the use of genetic resources to improve livestock breeds and to understand the genetic basis of livestock traits.
