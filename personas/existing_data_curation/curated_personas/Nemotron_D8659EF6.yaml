  career_goals: Samuel aims to move into a district‑wide instructional leadership role within the next five years, positioning himself as an instructional coach or curriculum director. He plans to earn
    an Educational Leadership certification and to lead a pilot program that expands blended‑learning opportunities across St. Johns County schools. He aspires to publish a guidebook on practical curriculum
    innovation that blends research‑backed methods with classroom‑tested strategies, and to become a frequent presenter at state and regional education conferences. Ultimately, he seeks to influence policy
    that balances academic rigor with flexible, student‑centered learning environments while maintaining his reputation for calm, data‑informed decision‑making.
