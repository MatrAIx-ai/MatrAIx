personas:
  professional: Tina Carnes thrives as a multi‑channel customer service specialist, expertly handling phone, email, and live‑chat inquiries while applying strong verbal and written communication, conflict‑resolution,
    and CRM (Zendesk, Salesforce) expertise, and they channel their curiosity‑practical balance into rapid tool adoption and their relaxed, flexible scheduling into steady performance under pressure.
  sports: Tina Carnes roots for the Alabama Crimson Tide football and the Birmingham Barons baseball teams, participates in the Cheaha Trailblazers hiking club for weekend treks, and they blend seasonal
    outdoor activity with a relaxed approach to fitness, preferring low‑impact yoga classes over regimented gym routines.
  arts: Tina Carnes immerses themselves in classic country and Southern rock, regularly listening to Dolly Parton, Johnny Cash, Lynyrd Skynyrd, and The Eagles while also crocheting to the soundtrack of
    John Wayne films, and they unwind with mystery novels by Agatha Christie and historical‑fiction works by Ken Follett, letting these artistic threads weave into their weekend quilting circles.
  travel: Tina Carnes favors flexible, road‑trip style getaways, having explored Gulf Shores, Asheville, and Charleston on spontaneous weekend drives, and they dream of a cultural pilgrimage to Savannah
    and a genealogy‑focused trip to Ireland, balancing limited vacation days with a penchant for off‑the‑beaten‑path stops.
  culinary: Tina Carnes cooks Southern comfort staples like fried chicken with hot honey glaze, creamy collard greens, and peach cobbler, while experimenting by incorporating garden‑grown heirloom tomatoes
    into a basil‑infused tomato jam and a smoked pork shoulder with bourbon barbecue sauce, showcasing a confident home‑chef skill set that blends tradition with fresh twists.
  core: Tina Carnes is a pragmatic, curiosity‑driven customer‑service leader who balances flexible scheduling with a love for Southern flavors, gardening, and mystery novels, all while occasionally letting
    disorganized habits cause missed appointments.
background:
  cultural: Tina was raised in Anniston, Alabama, within a predominantly white, Southern‑Baptist community that values family, hospitality, and community service. The Deep‑South cultural fabric—characterized
    by modesty, resilience, and an affection for traditions such as church gatherings, Southern cuisine, and county fairs—shapes her outlook. While she respects these longstanding customs, her curiosity
    pushes her to explore new ideas, whether by trying innovative recipes or pursuing professional development. This blend of Southern heritage and an openness to change informs her pragmatic work ethic,
    her balanced social life, and her willingness to both cooperate with others and assert herself when needed.
