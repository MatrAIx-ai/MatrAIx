  career_goals: Tina aims to advance into a supervisory or team‑lead position within the next two to three years, where she can mentor new agents and shape service processes. She plans to earn a Certified
    Customer Service Professional (CCSP) credential and enroll in community‑college courses toward an associate’s degree in business administration. Over the longer term, she envisions moving into a customer‑experience
    manager role focused on process improvement and customer‑journey analytics, while also exploring opportunities to contribute to her community through corporate‑social‑responsibility initiatives.
