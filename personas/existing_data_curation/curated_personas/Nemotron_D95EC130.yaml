  hobbies: '[''Backyard vegetable and herb gardening'', ''Cooking traditional and fusion East Asian dishes'', ''Playing mahjong and card games'', ''Walking and nature photography along the Columbia River'',
    ''Singing in the church choir (English hymns and Japanese folk songs)'', ''Watching Seattle Mariners baseball games'', ''Volunteering for community event planning (harvest fair)'', ''Sharing cultural
    stories with grandchildren'']'
  career_goals: Kwang’s primary ambition is to deepen his contribution to the Hermiston community while preserving his cultural heritage. He plans to launch a community garden that provides fresh produce
    and hands‑on horticultural workshops for seniors and school‑age children, setting clear milestones for plot design, volunteer recruitment, and seasonal planting schedules. Concurrently, he aims to start
    a weekly cooking class at the local senior center where he shares traditional Japanese and Korean dishes, adapting recipes with locally sourced ingredients. Although not seeking paid employment, he
    intends to complete a GED through a nearby adult‑education program, which will also enable him to document his family’s immigration story in a memoir for his grandchildren. Additionally, he aspires
    to become a formal volunteer liaison for East Asian residents, helping them navigate municipal services, health care, and language resources. By balancing structured project plans with his natural flexibility,
    he hopes to remain a supportive husband, active community member, and cultural bridge.
