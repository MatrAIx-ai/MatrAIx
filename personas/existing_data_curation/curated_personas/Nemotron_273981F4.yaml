personas:
  professional: Michael Jarrell, a 34‑year‑old construction laborer with an associate's degree in construction technology, leverages their methodical planning, reliability, and competitive drive to keep
    crews on schedule, enforce OSHA standards, and mentor junior workers while scrutinizing every blueprint for efficiency.
  sports: Michael Jarrell fuels their competitive edge by playing pickup basketball at Red Rock Canyon’s neighborhood park, following the Las Vegas Raiders and the Vegas Golden Knights loyally, and joining
    a local adult league basketball team while weekend hikes keep their stamina sharp.
  arts: Michael Jarrell finds creative inspiration in the clean lines of mid‑century modern designers like Hans J. Wegner, the gritty riffs of AC DC, and the storytelling of Quentin Tarantino, often listening
    to classic rock while carving custom furniture, and attending occasional live music shows at local venues.
  travel: Michael Jarrell prefers short‑term, budget‑conscious road trips to nearby natural spots such as Zion National Park and Lake Tahoe, yet dreams of a culturally immersive trip to Kyoto to study traditional
    woodworking techniques and the sustainability ethos of Japanese architecture.
  culinary: Michael Jarrell delights in grilling New Mexico‑style pork ribs, smoking brisket with hickory chips, and crafting homemade BBQ sauce, while their woodworking hobby translates into precise knife
    skills for chopping fresh cilantro, garlic, and jalapeños in vibrant tacos al pastor.
  core: Michael Jarrell is a methodical, socially energetic craftsman who balances a competitive work ethic with a love for outdoor sports, hands‑on projects, and meticulous financial planning, all while
    battling stress‑induced worries.
background:
  cultural: Michael was raised in the suburban environment of Henderson, Nevada, within a middle‑class family that emphasized hard work, self‑reliance, and community involvement. His heritage traces back
    to mid‑western American roots, where practical problem‑solving and perseverance are valued. Living in the desert Southwest has shaped his appreciation for outdoor recreation, a laid‑back yet industrious
    lifestyle, and a strong neighborly culture. These influences combine with mainstream American values of entrepreneurship and family stability, informing his approach to both his career in construction
    and his personal life.
attributes:
  skills: '[''Blueprint reading'', ''Concrete forming'', ''Framing and drywall installation'', ''Heavy equipment operation (skid‑steer, backhoe)'', ''Safety inspections and OSHA compliance'', ''Project
    scheduling and daily work planning'', ''Cost estimating and material procurement'', ''Team coordination and crew leadership'', ''Troubleshooting on‑site problems'', ''Finish carpentry and detailing'']'
  hobbies: '[''Pickup basketball'', ''Hiking in Red Rock Canyon'', ''Weekend barbecues'', ''Woodworking and furniture making'', ''Vintage motorcycle restoration'', ''Competitive online gaming'']'
  career_goals: Michael aims to advance from his current laborer role to a crew foreman within the next two years, leveraging his organizational strengths and technical knowledge. He plans to enroll in
    a bachelor’s program in construction management to broaden his strategic understanding of large‑scale projects. His long‑term ambition is to become a site supervisor or project manager overseeing multi‑family
    residential developments in the Nevada market, and eventually to launch his own construction firm that emphasizes sustainable building practices and safety excellence. He also seeks to acquire LEED
    Green Associate certification to stay competitive and align with emerging industry standards.
