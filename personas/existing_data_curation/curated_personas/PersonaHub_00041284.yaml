persona_description: A sociologist who studies income inequality and its impact on the middle class. The person is interested in understanding how income disparities have grown over time and how they affect
  the distribution of wealth and resources among different groups in society. They are also interested in the factors that contribute to income inequality, such as changes in the economy, the role of education
  and skill in maintaining and widening the gap, and the impact of sociological factors like the maturation of women's participation in the workforce. The person is knowledgeable about the study of group
  theory, particularly subgroup theory, and is interested in its application to understanding income inequality. They are also interested in the role of social policies and political systems in shaping
  income inequality and how they can be addressed to promote greater equality.
