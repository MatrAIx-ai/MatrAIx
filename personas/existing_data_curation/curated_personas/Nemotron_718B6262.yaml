personas:
  professional: George Holland is a methodical teen who channels his curiosity into hands‑on projects like rebuilding car engines, writing automation scripts for his garden inventory, and mastering woodworking,
    while they plan to earn their GED and pursue an automotive technology certification to eventually run their own low‑stress repair shop.
  sports: George Holland is a quiet sports fan who roots for the Cincinnati Bengals (NFL) and the Cleveland Guardians (MLB), follows the Dayton Flyers basketball team, and plays on a local weekend recreational
    softball league called the Dayton Ducks, while they also enjoy occasional fishing trips that feel like sport.
  arts: George Holland finds creative escape in building detailed model kits, listening to progressive rock legends like Pink Floyd and modern ambient composer Tycho, binge‑watching classic sci‑fi films
    directed by Ridley Scott, and attending occasional community‑theater productions of Arthur Miller plays, while they appreciate the precision and storytelling in each art form.
  travel: George Holland prefers low‑key road trips and weekend camping, having already explored the Cuyahoga Valley National Park and the Grand Canyon, dreaming of fishing in Japan’s Hokkaido lakes and
    touring Germany’s automotive museums in Stuttgart, and they plan each journey meticulously with a spreadsheet to balance budget constraints and school responsibilities.
  culinary: George Holland enjoys simple, hearty meals like grilled trout seasoned with lemon‑pepper, homemade chicken noodle soup with fresh thyme, and a well‑executed mac & cheese, can competently sauté
    vegetables and sear steak on a cast‑iron pan, and they relish the occasional indulgence of a smoked‑paprika pork chop.
  core: George Holland is a meticulous, curiosity‑driven teen who balances solitary model‑building and strategic gaming with a quietly anxious streak, a relentless need for organization, and a dream of
    a calm, self‑run repair shop.
background:
  cultural: George grew up in Lehigh Acres, a working‑class, predominantly white suburb of southwest Florida. The local culture emphasizes self‑reliance, modesty, and close‑knit community ties reinforced
    by church gatherings, high‑school sports, and outdoor pursuits such as fishing and lawn care. The warm climate and proximity to the Gulf Coast, combined with Southern‑style values, shape his practical
    outlook, modest ambitions, and preference for small‑group interactions.
attributes:
  skills: '["Automotive troubleshooting", "Basic carpentry", "Computer hardware maintenance", "Microsoft Office proficiency", "Task and schedule organization", "Simple Python scripting"]'
  hobbies: '["Model kit building", "Fishing", "Reading science non-fiction", "Strategy video gaming", "Community garden volunteering", "Car‑repair club meetings"]'
  career_goals: George plans to earn his GED within the next year, then enroll in a community‑college program for automotive technology or HVAC certification. His ambition is to become a licensed technician
    and, eventually, to open his own small repair shop where he can apply his meticulous, methodical approach while maintaining a low‑stress, stable work environment.
