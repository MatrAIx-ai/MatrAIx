persona_description: A German literature and film scholar who is interested in the representation of childhood and adolescence in German culture, literature, and film. They are particularly interested in
  the use of images of childhood and youth to represent innocence, extreme brutality, and political horror, and how these images reflect larger conceptions of family, gender, and nation. They are also interested
  in the cultural significance of "Kinder-und Jugendliteratur" and how German-language authors use childhood reminiscences and coming-of-age narratives to depict political and social upheaval. They have
  a strong interest in the historical and comparative analysis of these texts and media, and are interested in exploring the ways in which images of childhood and youth have changed over time.
