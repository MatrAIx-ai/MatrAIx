personas:
  professional: Tomas Sanders, an aspiring junior builder who loves snapping together LEGO bricks, demonstrates early spatial reasoning and a practical curiosity that lets them experiment with both imaginative
    designs and sturdy, real-world structures.
  sports: Tomas Sanders charges onto the playground with boundless energy, proudly wearing the red jersey of the Little Lions Soccer Club while cheering on the River Runners baseball team on TV, and they
    approach fitness with a love for free-play games rather than strict schedules, often forgetting their water bottle but never missing a chance to run the extra lap.
  arts: Tomas Sanders spends afternoons drawing colorful dinosaurs inspired by The Wiggles and recreating scenes from Pixar's Toy Story, and they eagerly attend the local library's storytime where they
    sing along to Sesame Street songs, letting their imagination guide both art and play.
  travel: Tomas Sanders embarks on family trips with a mix of wonder and easygoing flexibility, having marveled at the fireworks of Disneyland, splashed in the shallow waves at Clearwater Beach, and helped
    harvest carrots at Grandma's farm, always packing a favorite stuffed animal for comfort.
  culinary: Tomas Sanders enjoys scooping spoonfuls of gooey mac and cheese and crunchy chicken nuggets, loves the sweet zing of strawberries and banana slices, and proudly assists mom in mixing cookie
    dough, though they often sneak a bite of chocolate chips before the cookies bake.
  core: Tomas Sanders is a curious yet laid-back five-year-old who balances endless imagination with a love for practical play, occasionally forgetting to tidy up toys while never turning down a new adventure.
background:
  cultural: Tomas was born and raised in Jamul, a semi‑rural community on the edge of San Diego County. His family follows a predominantly mainstream American cultural pattern, celebrating holidays such
    as Thanksgiving, Halloween, Christmas, and the Fourth of July with neighborhood barbecues, fireworks, and community parades. The household balances suburban comforts with an outdoor‑oriented lifestyle—weekend
    trips to nearby beaches, regional parks, and farmer’s markets are common. While his ethnic background is listed as white, his family also adopts a laid‑back Southern‑California vibe, occasionally picking
    up simple Spanish words like "hola" and "gracias" from friends and neighbors, reflecting the multicultural environment of the region.
attributes:
  skills: '[''building with LEGO and wooden blocks'', ''letter recognition'', ''counting to 20'', ''empathic sharing'', ''turn‑taking negotiation'', ''practical problem‑solving in play'', ''asking "why"
    about everyday objects'']'
  hobbies: '[''LEGO building'', ''nature walks and trail exploration'', ''collecting rocks and seashells'', ''reading picture books about animals and machines'', ''drawing and coloring'', ''sandbox play
    with toy cars'', ''listening to children’s songs and dancing'']'
  career_goals: Although still five, Tomas regularly talks about future jobs that combine his love for nature, helping others, and hands‑on work. He dreams of becoming a park ranger or wildlife caretaker
    so he can protect the birds and squirrels he sees on family hikes in Cuyamaca Rancho State Park. He is also fascinated by firefighters, admiring their practical heroism and expressing a desire to "save
    people". Occasionally, he mentions wanting to be an astronaut, reflecting his curiosity about the unknown, but he always ties it back to something tangible, like building a rocket model with his blocks.
