personas:
  professional: Shawnte Battle is a seasoned retail sales veteran who, after three decades of mastering cash registers, inventory precision, and visual merchandising, they now channel their competitive
    drive into mentoring new hires, crafting clear schedules, and shaping store policy with a steady, structured hand.
  sports: Shawnte Battle follows the Atlanta Hawks and the Georgia Bulldogs football team, and they join a local senior walking club that meets each Saturday on nearby trails, and they relish the occasional
    friendly competition at community bridge tournaments, treating each hand like a sporting event.
  arts: Shawnte Battle is a dedicated gospel choir member who finds solace in singing Mahalia Jackson and Sam Cooke, and they spend evenings quilting intricate patterns inspired by traditional southern
    motifs, and they read historical fiction about 1960s social change, drawing creative inspiration from both music and literature.
  travel: Shawnte Battle prefers meticulously planned road trips that blend cultural immersion with family visits, and they have explored Savannah's historic riverfront, indulged in New Orleans' jazz scene,
    and they dream of tracing the Mississippi Delta blues trail, all while staying within a modest budget.
  culinary: Shawnte Battle's kitchen is a hub of Southern soul-food comfort, where they perfect collard greens simmered with smoked turkey, sweet-potato pie spiced with nutmeg, and cornbread brushed with
    buttermilk, often seasoning dishes with garden-fresh herbs like thyme and sage, though they occasionally over-salt their fried catfish.
  core: Shawnte Battle, a 76-year-old mentor with a meticulous, community-driven outlook, balances a structured work ethic with a love for gardening, quilting, and gospel singing, while they showcase a
    competitive streak at bridge tables and a hint of skepticism colors new relationships.
background:
  cultural: Shawnte is an African‑American woman whose life is deeply rooted in the Southern traditions of East Dublin, Georgia. Growing up during the civil‑rights movement, she developed a strong sense
    of resilience, community solidarity, and pride in her heritage. The local church has been a central pillar, shaping her values of service, family, and cultural celebration. She participates in community
    gatherings, church potlucks, and seasonal festivals that honor African‑American culinary and musical traditions. Her cultural identity influences her emphasis on responsibility, structured routines,
    and the importance of passing knowledge to younger generations.
attributes:
  skills: '[''Customer Service'', ''Cash Register Operation'', ''Inventory Management'', ''Visual Merchandising'', ''Conflict Resolution'', ''Team Training'', ''Scheduling'', ''Basic Bookkeeping'', ''Community
