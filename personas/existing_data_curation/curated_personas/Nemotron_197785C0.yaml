  hobbies: '[''Gardening'', ''Quilting'', ''Church Choir'', ''Bridge (card game)'', ''Reading Historical Fiction'', ''Walking'', ''Cooking Soul Food'', ''Volunteering at Senior Center'']'
  career_goals: At 76, Shawnte aims to transition from daily floor duties to a mentorship role, guiding younger staff with her seasoned expertise and reinforcing a culture of reliability and structure.
    She hopes to be recognized as a senior advisor within her store, contributing to policy development and staff training programs. Beyond the workplace, she aspires to volunteer more at the local senior
    center and community food bank, leveraging her organizational skills to coordinate events. Maintaining financial stability for her family and leaving a legacy of dedication to both her profession and
    community are central to her long‑term ambitions.
