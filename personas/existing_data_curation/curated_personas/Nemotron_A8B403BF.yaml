  career_goals: Marializa dreams of a future where she can blend her curiosity for science with practical solutions that benefit her community. She aspires to become a marine biologist or environmental
    engineer, working to protect the San Joaquin River and local wetlands. She also hopes to mentor younger students through school STEM clubs, sharing her love of discovery while emphasizing real‑world
    impact. In the short term, she plans to enter her school’s science fair, attend a summer coding camp, and maintain high grades to keep her options open for a college education focused on sustainability
    and community service.
