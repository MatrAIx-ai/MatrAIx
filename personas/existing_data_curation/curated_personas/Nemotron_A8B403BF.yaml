personas:
  professional: Marializa Ouk is an aspiring junior robotics engineer and comic‑book storyteller who blends their practical problem‑solving skills from the school robotics club with their vivid imagination,
    turning everyday challenges into illustrated narratives.
  sports: Marializa Ouk plays forward for the Riverbank Rovers U‑11 soccer team, enjoys cheering for the national women’s soccer squad during televised matches, and spends weekends hiking the nearby Delta
    wetlands, where they combine fitness with their love of wildlife observation.
  arts: Marializa Ouk is a budding comic illustrator who devotes afternoons to sketching superhero adventures inspired by classic graphic novels like “The Adventures of Tintin”, reads adventure books by
    authors such as Rick Riordan, and listens to the upbeat tunes of pop artist Ariana Grande while drawing.
  travel: Marializa Ouk loves day trips to the nearby Delta nature reserve, has explored the local botanical garden and the historic lighthouse on a school field trip, dreams of visiting Disneyland Paris,
    and hopes to one day trek through the red‑rock canyons of the American Southwest.
  culinary: Marializa Ouk enjoys helping their family prepare traditional holiday dumplings and savory broths, delights in cooking simple dishes like scrambled eggs with cheese and vegetable spring rolls,
    and often experiments with adding fresh herbs to their favorite grilled cheese sandwiches.
  core: Marializa Ouk is a curious, practical ten‑year‑old who balances creative illustration, robotics, and soccer with a pocket‑money budgeting habit, mild allergy management, and a love for nature‑filled
    day trips.
background:
  cultural: 'Marializa comes from a Southeast Asian family that originally migrated from Vietnam and settled in Stockton’s multicultural community. At home, Vietnamese language and customs are woven into
    daily life: she learns to speak Vietnamese with her grandparents, celebrates Lunar New Year with family gatherings, and helps prepare staple foods such as pho and spring rolls. The family participates
    in the local Vietnamese cultural center, attending language classes and community festivals. This bicultural upbringing, combined with the diverse environment of her school and neighborhood, fosters
    a strong respect for elders, communal harmony, and a deep appreciation for education and cultural heritage.'
