  hobbies: '[''Reading medical journals'', ''Yoga and meditation'', ''Cooking traditional Indian dishes'', ''Beach walks'', ''Jigsaw puzzle solving'', ''Volunteering at community health fairs'', ''Playing
    chess in small groups'']'
  career_goals: He aims to transition to a registered nurse role within the next three years by completing a bachelor's degree in nursing, with a particular interest in geriatric and community health. Long-term,
    he envisions leading patient‑advocacy initiatives for underserved South Asian seniors in Palm Beach County and possibly pursuing a nurse practitioner certification to expand his clinical autonomy.
