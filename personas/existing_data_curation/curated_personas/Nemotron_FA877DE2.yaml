personas:
  professional: Lymarie Ortiz, an experienced retail cashier with a razor‑sharp eye for cash discrepancies and fluency in both English and Spanish, they blend practical problem‑solving with a deep love
    of art history to design community workshops while aggressively pursuing shift‑supervisor certification and a future store‑manager role.
  sports: Lymarie Ortiz fuels their competitive streak by joining the Lake Worth Beach Running Club for early morning beach jogs, cheering for the Miami Heat basketball team, and playing in an adult recreational
    softball league, all while they treat weekend trivia nights as a mental sport.
  arts: Lymarie Ortiz, a devoted aficionado of contemporary fiction, poetry, and art history, they spend weekends wandering the Lake Worth art galleries, dissecting the works of Kehinde Wiley and Yayoi
    Kusama, and curating a blog where they dissect cultural trends and share reflections on the interplay of tradition and modernity.
  travel: Lymarie Ortiz prefers low‑key, flexible travel that combines spontaneous beach trips with purposeful cultural immersion, they often weekend‑hop to the Florida Keys, plan a future pilgrimage to
    Barcelona’s architecture, and dream of a quiet retreat in Kyoto’s zen gardens, all while budgeting trips around their modest e‑commerce income.
  culinary: Lymarie Ortiz finds culinary creation a therapeutic outlet, skillfully preparing family‑heritage stews, hand‑rolled corn tortillas, and spice‑infused rice dishes while experimenting with Mediterranean
    herbs and Asian soy‑ginger glazes, and they regularly host informal dinner gatherings that showcase these fusion plates.
  core: Lymarie Ortiz balances a restless curiosity and meticulous cash‑counting with a love of sunrise jogs, yoga, and competitive card games, while their anxiety‑driven need for control often leads to
    procrastinated paperwork and occasional over‑spending on art supplies.
background:
  cultural: Lymarie was raised in a bilingual Mexican-American household in South Florida. Her parents emigrated from Mexico in the 1970s, bringing with them traditions of family gatherings, celebratory
    music, and a rich culinary heritage. Growing up, she spoke Spanish at home and English at school, which fostered a deep appreciation for both cultures. The vibrant multicultural atmosphere of Lake Worth
    Beach—where Caribbean, Haitian, and broader Latino communities intersect—has further shaped her identity. She celebrates holidays such as Dia de los Muertos and Mexican Independence Day, often preparing
    traditional foods and sharing stories with neighbors. Her cultural background influences her values of community solidarity, respect for elders, and a love for music, dance, and storytelling, which
    she incorporates into her personal and volunteer activities.
