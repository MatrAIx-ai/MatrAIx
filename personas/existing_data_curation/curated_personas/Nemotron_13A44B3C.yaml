  hobbies: '[''Hiking in the Loess Hills'', ''Trail running'', ''Home brewing craft beer'', ''Reading science fiction and business strategy'', ''Cooking'', ''Board gaming with friends'', ''Volunteering
    at local science fairs'', ''Collecting vintage tools'', ''Listening to classic rock and jazz'', ''Woodworking projects'', ''Cycling around Omaha'']'
  career_goals: Glenn aims to become a senior materials scientist leading R&D initiatives focused on sustainable, high‑performance polymers. He envisions transitioning into a director‑level role where he
    can integrate his business acumen with scientific innovation to drive marketable products. Over the next five years, he plans to file patents on eco‑friendly material processes, mentor junior engineers,
    and develop a reputation as a pragmatic problem‑solver. Long‑term, he is interested in launching a consultancy that helps midsize manufacturers adopt greener material technologies while maintaining
    cost efficiency, all while preserving a healthy work‑life balance with his family.
