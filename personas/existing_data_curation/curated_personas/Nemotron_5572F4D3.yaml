personas:
  professional: Manuel Salcido is a hands‑on health technologist who uses their strong visual sense and bilingual communication skills to troubleshoot biomedical devices in busy clinics, while their curiosity
    drives them to design low‑cost maintenance guides and they chase certification in biomedical equipment technology to one day lead a regional support team.
  sports: Manuel Salcido fuels their fitness by hiking the trails of El Yunque and joining a local Saturday trek club, cheerfully cheering for the Cangrejeros de Santurce baseball team while occasionally
    playing pick‑up soccer with friends at the community field, and they keep a casual running log on a phone app.
  arts: Manuel Salcido blends acoustic guitar riffs inspired by plena rhythms and reggaetón beats with speculative fiction narratives from authors like Octavia Butler and Neil Gaiman, captures urban textures
    and forest mist through photography reminiscent of Ansel Adams, and they curate a small Instagram gallery where each post is accompanied by handwritten lyric snippets.
  travel: Manuel Salcido prefers spontaneous weekend road trips to coastal villages and forest refuges in Puerto Rico, yet dreams of a tech‑focused backpacking adventure in Tokyo to explore futuristic health‑tech
    labs, and they meticulously map routes using open‑source mapping tools while staying within a modest travel budget.
  culinary: Manuel Salcido experiments in the kitchen by reinventing mofongo with mango‑chili glaze and black‑bean purée, pairing it with homemade cilantro‑lime aioli, while they often over‑season during
    late‑night cooking sprees but relish sharing the dishes during intimate dinner gatherings.
  core: Manuel Salcido is a curious, solitary tech‑savvy artist who transforms everyday tools into low‑cost health solutions, but their competitive streak and occasional disorganization keep them constantly
    juggling deadlines and side projects.
background:
  cultural: Manuel grew up in a bilingual Puerto Rican household in the municipalities of Corozal and Naranjito, where Spanish is the primary language and English is commonly used in education and health
    settings. His family values modesty, resilience, and a strong sense of community, yet his reserved personality makes him gravitate toward quiet moments and small gatherings. He celebrates local traditions
    such as the Noche de San Juan, the festive music of bomba and plena, and the island’s culinary heritage. The vibrant street art scene of the central mountain region and the natural beauty of Puerto
    Rico’s forests have shaped his appreciation for creativity and the environment. Having witnessed the challenges of healthcare access in rural areas, he feels a personal commitment to improve health
    services for his community while honoring his cultural roots.
attributes:
  skills: '["Phlebotomy", "Operating and calibrating biomedical equipment", "Basic clinical laboratory testing", "Electronic Health Record (EHR) documentation and data entry", "Medical device troubleshooting
    and repair", "Preventive maintenance scheduling", "Bilingual communication (Spanish/English)", "Self‑directed learning of new health technologies", "Basic graphic design for procedural manuals", "Inventory
    management for medical supplies"]'
  hobbies: '["Photography of urban and natural scenery", "Acoustic guitar playing and songwriting", "Reading speculative fiction and sci‑fi literature", "Hiking in local trails and El Yunque rainforest",
    "Experimenting with fusion Puerto Rican cooking", "DIY electronics and sensor projects", "Attending intimate art exhibitions", "Exploring street murals and graffiti"]'
  career_goals: Manuel aspires to become a senior biomedical equipment technician and eventually lead a regional maintenance team that supports rural clinics across Puerto Rico. Over the next three years,
    he plans to earn a professional certification in biomedical equipment technology and complete a bachelor's degree in health informatics. He is motivated to develop low‑cost, locally‑adapted solutions
    for equipment downtime and to integrate tele‑health tools in his community. A long‑term ambition is to launch his own consultancy, helping small health centers improve technology workflows while preserving
    patient privacy. His competitive nature pushes him to outpace peers in certifications and project leadership.
