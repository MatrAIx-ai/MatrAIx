persona_description: A pediatric ophthalmologist who specializes in the diagnosis and management of eye disorders, particularly those related to the anterior segment of the eye. She has a keen interest
  in the genetic etiology of eye disorders and is particularly knowledgeable about the spectrum of phenotypes associated with the condition Axenfeld-Rieger Syndrome (ARS). She has a background in ophthalmology
  and has experience working with families and patients with ARS, including the management of ocular abnormalities such as iris hypoplasia and posterior uveal colobomas. She is also skilled in the diagnosis
  and treatment of other anterior segment disorders, such as persistent pupillary membranes and iris transillumination.
