personas:
  professional: Melba Hutton, a 49‑year‑old middle‑school STEM educator, fuses inquiry‑driven project‑based learning with artistic thinking, harnesses coding platforms, digital simulations, and interactive
    whiteboards, and channels their calm yet assertive leadership into mentoring new teachers and driving district‑wide STEAM initiatives.
  sports: Melba Hutton hikes the Cascade Range with the Oregon Trail Club, practices yoga three times weekly at a downtown studio, cheers for the Portland Trail Blazers and Oregon State Beavers, and they
    schedule brisk weekend bike rides along the Willamette River to balance their energetic classroom persona with personal fitness.
  arts: Melba Hutton frequents Portland’s First Thursday art walks, revels in performances of Lin‑Manuel Miranda’s *Hamilton* and experimental installations by Ai Weiwei, fills their playlist with Radiohead
    and Björk, and they unwind by playing piano improvisations inspired by Debussy’s *Clair de Lune* to spark fresh classroom ideas.
  travel: Melba Hutton enjoys curated travel experiences, having explored the historic temples of Kyoto, the volcanic landscapes of Iceland, and the rugged coastline of Oregon’s Cannon Beach, while they
    dream of trekking Patagonia’s Torres del Paine and prefer itineraries that blend nature hikes with local art workshops.
  culinary: Melba Hutton loves experimenting with international cuisine, often preparing Thai pad thai with tamarind, Ethiopian injera paired with berbere‑spiced lentils, and Oregon‑grown heirloom tomatoes
    in a fresh bruschetta, and they consider their garden’s basil and rosemary essential ingredients in daily cooking.
  core: Melba Hutton is a curious, organized yet flexible educator who seamlessly merges art and science, channels boundless energy into community‑building, and balances a calm resilience with a penchant
    for spontaneous culinary experiments.
background:
  cultural: Melba grew up in a middle‑class, predominantly white family in the Pacific Northwest, where appreciation for education, environmental stewardship, and community participation are core values.
    The region’s blend of rugged outdoor life and a vibrant, progressive arts scene shaped her open‑minded worldview. She embraces the inclusive ethos of Oregon, incorporating diverse cultural perspectives
    into her teaching and personal life, while maintaining the practical, self‑reliant spirit common to the area.
attributes:
  skills: '["STEM curriculum design", "STEAM interdisciplinary instruction", "Project‑based learning facilitation", "Educational technology integration", "Flexible classroom management", "Public speaking
    and workshop facilitation", "Mentoring and coaching", "Collaborative team leadership", "Grant writing and fundraising", "Data‑driven assessment and analytics"]'
  hobbies: '["Visiting art galleries and museums", "Attending theater and live music performances", "Hiking in the Cascade Mountains", "Nature photography", "Gardening", "Playing piano", "Reading science‑fiction
    and non‑fiction", "Cooking international cuisine", "Volunteering at a community makerspace", "Leading a book club", "Practicing yoga"]'
  career_goals: Melba aims to become a STEM department chair or curriculum coordinator within her district, where she can scale her innovative STEAM approaches district‑wide. She envisions establishing
    a community makerspace linked to local schools, securing sustainable funding through grant work, and creating professional‑development programs that empower teachers to adopt interdisciplinary methods.
    Over the next five years, she plans to earn a doctoral degree in Education Leadership, publish research on inclusive STEM pedagogy, and serve on a regional advisory board influencing state STEM education
    policy.
