  hobbies: '[''Fishing'', ''Hunting'', ''Vegetable gardening'', ''Woodworking'', ''Reading historical biographies'', ''Listening to bluegrass music'', ''Community potlucks'', ''Birdwatching'']'
  career_goals: Although retired, John aims to preserve and expand his family homestead, develop a larger organic vegetable garden, and document his family's history for future generations. He hopes to
    mentor his grandchildren in practical skills such as woodworking and gardening, stay active in his church community, and occasionally assist neighbors with home repairs, all while maintaining a balanced,
    low‑stress lifestyle.
