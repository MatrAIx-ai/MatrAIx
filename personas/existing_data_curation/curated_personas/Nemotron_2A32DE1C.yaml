personas:
  professional: Rosario Vargasramos, a 13-year-old aspiring programmer and robotics enthusiast, blends a curiosity for future technologies with a disciplined, organized work style, leading her school's
    robotics club in designing Python-based games and competitive robots while scrutinizing teammates' ideas through a competitive, skeptical lens.
  sports: Rosario Vargasramos plays as an outside hitter for the Westside Youth Volleyball Club, practices thrice weekly, follows the Los Angeles Lakers for their disciplined, competitive ethos, joins the
    school's seasonal track team in spring, and balances her athletic schedule with robotics, sometimes skipping a practice session to finish a coding project.
  arts: Rosario Vargasramos immerses herself in salsa and bachata, listening to classic artists like Celia Cruz and contemporary stars such as Bad Bunny while also drawing inspiration from Hans Zimmer's
    sci-fi film scores and attending local dance workshops, thereby weaving rhythmic tradition with modern pop culture into her creative expression.
  travel: Rosario Vargasramos has explored New Orleans for its vibrant music scene and plans to visit Tokyo to experience cutting-edge technology museums, prefers structured itineraries with room for spontaneous
    dance sessions, and, due to family budgeting, often opts for weekend getaways to nearby coastal towns rather than extended overseas trips.
  culinary: Rosario Vargasramos delights in cooking ropa vieja - shredded beef simmered with olives, capers, and tomato sauce - and caramelized flan, while also experimenting with homemade arepas seasoned
    with cumin and cilantro, showcasing a competent yet occasionally forgetful cooking style that reflects her organized yet busy schedule.
  core: Rosario Vargasramos, a 13-year-old tech-savvy dancer, lives by meticulous schedules, balances fierce competition with vibrant cultural expression, and sometimes neglects relaxation in pursuit of
    perfection.
background:
  cultural: Rosario is a first-generation Cuban American raised in Hialeah, Florida, where a vibrant Cuban community shapes daily life. She grew up speaking Spanish at home while receiving education in
    English, giving her bilingual fluency that bridges both cultures. Family gatherings feature Cuban culinary traditions such as arroz con pollo, plantains, and cafe con leche, and celebrations include
    Carnaval, Nochebuena, and other heritage holidays. Close-knit extended family ties, church involvement, and neighborhood festivals have instilled a strong sense of community, resilience, and pride,
    influencing her values of hard work, mutual support, and dedication to her cultural roots.
