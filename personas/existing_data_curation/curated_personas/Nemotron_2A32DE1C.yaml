  career_goals: Rosario aims to earn a competitive STEM scholarship and attend a top university where she can study biomedical engineering or medical research. She is determined to win regional science
    fairs and gain admission to a high-school engineering magnet program, viewing these achievements as stepping stones toward a career that merges her love of science, problem-solving, and community service.
    Long-term, she envisions developing affordable health-technology solutions that benefit underserved Cuban-American families and leading interdisciplinary projects that improve public health outcomes.
