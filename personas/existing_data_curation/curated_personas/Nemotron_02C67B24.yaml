  career_goals: Lisa aims to move into a supervisory role within the Michigan Department of Transportation, where she can influence regional safety policies and mentor junior inspectors. She plans to earn
    the Certified Transportation Safety Professional (CTSP) credential and lead the development of a flexible, technology‑driven inspection program that balances new digital tools with proven on‑site methods.
    Long‑term, she envisions consulting for multiple jurisdictions, helping local governments design community‑focused safety initiatives that reduce road incidents while fostering collaborative partnerships.
