personas:
  professional: Lisa Dalglish, a veteran transportation inspector with over twenty years of hands‑on expertise in vehicle safety audits, regulatory compliance, and data‑driven trend analysis, channels their
    practical curiosity and collaborative spirit into training new inspectors, mediating driver concerns, and championing a flexible, technology‑enabled inspection program as they pursue a supervisory role
    at the Michigan Department of Transportation.
  sports: Lisa Dalglish blends a love for the outdoors with a loyal fandom for the Detroit Lions and Michigan State Spartans, joining a local hiking club for weekend trail treks in the state parks and participating
    in a community softball league that keeps them active and socially connected.
  arts: Lisa Dalglish nurtures their creative side through active involvement in a community theater troupe, designing sets inspired by August Wilson while enjoying evenings listening to classic rock legends
    like Bruce Springsteen and The Rolling Stones, and their book club often sparks lively debates over works by Toni Morrison.
  travel: Lisa Dalglish prefers spontaneous, group‑oriented road trips to historic towns such as Williamsburg, Virginia, and St. Augustine, Florida, while also dreaming of a weekend getaway to Bruges, Belgium,
    balancing their love for cultural immersion with a modest budget and a flexible itinerary.
  culinary: Lisa Dalglish, an enthusiastic home cook who loves experimenting with recipes, often prepares rosemary‑infused roasted chicken, hearty beef stew with garden‑grown carrots, and a signature cinnamon‑spiced
    apple pie, sourcing fresh herbs from their modest garden and sharing dishes at neighborhood potlucks.
  core: Lisa Dalglish blends pragmatic curiosity with a carefree, community‑centric lifestyle, juggling classic‑car restorations, spontaneous hikes, and a relentless drive to mentor colleagues—though their
    habit of misplacing tools and forgetting appointments adds a humorous, disorganized charm.
background:
  cultural: Lisa grew up in the Midwest, raised in a small town in Michigan where community ties and a pragmatic work ethic are central values. Her family traces its roots to Scottish and Irish immigrants,
    giving her a sense of pride in the Dalglish name and its heritage of resilience. The Midwestern cultural emphasis on friendliness, self‑reliance, and volunteerism shapes her outlook, encouraging her
    to blend curiosity about new ideas with respect for established traditions. This background fuels her dedication to public safety, collaborative problem‑solving, and maintaining harmonious relationships
    within her community.
attributes:
  skills: '["Transportation safety inspection", "Regulatory compliance", "Report writing", "Data analysis", "Logistics coordination", "Conflict resolution", "Team training", "Digital inspection tools",
