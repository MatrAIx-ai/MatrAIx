  hobbies: '[''Guitar playing'', ''Street photography'', ''Vintage camera collecting'', ''Live music attendance'', ''Cooking Mexican‑Texan dishes'', ''Soccer'', ''Community festival volunteering'', ''Impromptu
    art jam sessions'']'
  career_goals: He aims to establish a permanent studio/gallery in the Greater Houston area that serves as both a creative space and a cultural hub for Mexican‑American artists. Rodrigo wants to secure
    commissions for public murals that celebrate local heritage, expand his freelance design business to serve regional brands, and eventually mentor emerging artists through workshops and a mentorship
    program. He also hopes to exhibit his work nationally, leveraging his competitive drive to gain recognition in major juried shows.
