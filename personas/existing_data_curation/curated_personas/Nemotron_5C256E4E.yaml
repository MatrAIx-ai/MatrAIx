personas:
  professional: Thomas Monir, a 13‑year‑old budding technologist, spends afternoons building LEGO robotics kits and programming Arduino boards, blending curiosity with a practical, methodical approach while
    their competitive nature drives them to excel in school hackathon challenges and their skepticism pushes them to rigorously test every line of code.
  sports: Thomas Monir dominates the school basketball court as a forward for the Sacramento Valley Middle School Tigers, fervently supports the Sacramento Kings, joins a summer youth soccer league, and
    complements team training with weekend hikes in the Sierra foothills to build endurance, reflecting their energetic, competitive, and group‑oriented personality.
  arts: Thomas Monir fills downtime listening to alternative rock bands such as Arctic Monkeys, Foo Fighters, and Tame Impala, devouring science‑fiction novels like Ender’s Game and Ready Player One for
    inspiration, and occasionally produces stop‑motion LEGO storytelling videos showcased at the community’s Friday night open‑mic events.
  travel: Thomas Monir prefers weekend getaways that blend adventure and tech curiosity, such as hiking the Sierra foothills, exploring the interactive exhibits at the California Science Center, family
    trips to Disneyland, and a road‑trip goal to capture sunrise over Yosemite’s cliffs, all planned within parental and budget constraints.
  culinary: Thomas Monir enjoys homemade pepperoni pizza, garlic‑butter naan, and Thanksgiving turkey with all the trimmings during family gatherings, experiments with an Arduino‑controlled LED timer for
    boiling pasta, yet often succumbs to sugary energy drinks after late‑night gaming sessions.
  core: Thomas Monir is a hyper‑curious, competitive 13‑year‑old tech tinkerer who balances intense gaming and robotics projects with high‑energy basketball, battles social anxiety with music and journaling,
    and steers a tightly budgeted allowance toward gadgets while savoring pizza and family‑style feasts.
background:
  cultural: Thomas is a white American teen growing up in Sacramento’s suburban neighborhoods. His family traces its roots to Irish and Italian ancestry, and they celebrate a mix of traditional American
    holidays and cultural customs, such as Thanksgiving feasts and occasional St. Patrick’s Day gatherings. Living in California, Thomas is exposed to a diverse, progressive community that values environmental
    stewardship, technology, and social inclusion. He attends a public middle school with a multicultural student body, which broadens his openness to varied perspectives. The local climate encourages outdoor
    activities, while proximity to Silicon Valley nurtures his interest in tech and innovation.
