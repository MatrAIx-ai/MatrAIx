personas:
  professional: Donald Stevens is a future nonprofit operations manager who blends meticulous project-management skills with a passion for community mental-health initiatives, using tools like Trello and
    Asana to coordinate volunteer events while leveraging their charismatic public-speaking style to rally peers and negotiate with local partners.
  sports: Donald Stevens is a regular on the Portland City Ultimate Frisbee league, joins weekend soccer matches with St. Johns FC, follows the Portland Timbers and Portland Trail Blazers religiously, and
    competes in local eSports tournaments for games like Rocket League, using sport as both social glue and competitive outlet.
  arts: Donald Stevens frequents indie shows at the Doug Fir Lounge, cheering for bands such as The Decemberists and Car Seat Headrest, devotes board-game nights to strategy titles like Terraforming Mars,
    and captures street murals with a DSLR, curating a small Instagram feed of Portland's vibrant art scene.
  travel: Donald Stevens favors spontaneous road trips along the Oregon coast to Cannon Beach and Astoria, hikes the Columbia River Gorge on weekend getaways, dreams of a solo backpacking adventure through
    Kyoto's bamboo forests to deepen mindfulness practice, and plans trips around festival dates to maximize social experiences.
  culinary: Donald Stevens is a third-wave coffee aficionado who savors single-origin pour-over brews, enjoys vegan ramen bowls with tofu, miso, and kimchi, cooks avocado toast topped with smoked salmon
    and dandelion greens whenever time permits, and occasionally indulges in craft pizza with mushroom, truffle oil, and arugula.
  core: Donald Stevens is a structure-seeking, community-focused 21-year-old who balances activist energy, competitive gaming, and high-octane anxiety with a love for Portland's coffee and indie culture.
background:
  cultural: Donald grew up in a middle‑class, white family in the Pacific Northwest, absorbing Portland’s progressive culture, environmental consciousness, and strong coffee‑house scene. His upbringing
    emphasized independence, self‑reliance, and community involvement, reflecting the region’s values of egalitarianism and support for local arts. While rooted in Western European heritage, he identifies
    with Portland’s diverse, inclusive ethos and often engages with the city’s multicultural events and activist movements.
attributes:
  skills: '[''Time management'', ''Event planning'', ''Interpersonal communication'', ''Basic project management (Trello, Asana)'', ''Team sports coordination'', ''Public speaking'', ''Social media content
