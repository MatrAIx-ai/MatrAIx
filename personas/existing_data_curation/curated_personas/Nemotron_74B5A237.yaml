  hobbies: '[''Ultimate frisbee'', ''Soccer'', ''Board game nights'', ''Live music concerts'', ''Volunteer work at community centers'', ''Competitive video gaming (eSports)'', ''Photography'', ''Journaling'',
    ''Meditation/Yoga'', ''Podcast listening about mental health'']'
  career_goals: Donald aims to complete his bachelor's degree in Business Administration or Public Administration within the next two years, with a focus on nonprofit management. He aspires to a role as
    an operations or project manager for a community‑focused organization that promotes mental‑health awareness and environmental sustainability. Long‑term, he hopes to launch his own social‑entrepreneurial
    venture that combines event planning, community engagement, and digital platforms to support peers dealing with anxiety and depression. He values a structured, predictable work environment that still
    allows for collaborative, dynamic projects.
