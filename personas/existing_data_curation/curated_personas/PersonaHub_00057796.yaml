persona_description: A person interested in astronomy and the night sky, particularly in the study of stars and their properties. They are likely to be curious about the night sky, the constellations, and
  the stars themselves. They may also be interested in the science behind astronomy and the mathematics involved in understanding the night sky. They may be particularly interested in the star Canopus,
  which is visible in the southern United States and elsewhere below 37 north latitude, and has an apparent magnitude of -0.72 and an absolute magnitude of approximately -3.5.
