  hobbies: '[''Chess'', ''Woodworking'', ''Cooking Mexican Cuisine'', ''Cycling'', ''Reading Dental Research'', ''Gardening'', ''Community Dental Outreach'']'
  career_goals: Sergio aims to transition from associate to owner of a small, efficiently run dental practice that emphasizes evidence‑based care and seamless patient experience. He plans to acquire a certification
    in prosthodontics or orthodontics within the next three years, integrate advanced CAD/CAM technology, and earn a leadership role in the Kansas Dental Association. He is driven to increase his patient
    satisfaction scores, expand services to Spanish‑speaking communities, and establish a reputation as a reliable, high‑quality provider while ensuring predictable schedules that support his family life.
