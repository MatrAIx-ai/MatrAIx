  hobbies: '["Drawing and coloring", "Building block constructions", "Listening to merengue and salsa music", "Reading picture books", "Collecting natural items in parks", "Creating collage art with found
    objects"]'
  career_goals: Rosa dreams of becoming an illustrator who creates vivid picture books that tell stories from her imagination. She also imagines herself as a scientist exploring space or the ocean, motivated
    by her curiosity and love for new ideas. She wants to be recognized for her unique artistic style and hopes to one day have her own gallery where she can share her quiet, detailed artwork with others.
