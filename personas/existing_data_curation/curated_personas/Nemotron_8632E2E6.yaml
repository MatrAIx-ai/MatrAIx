personas:
  professional: A miniature museum curator in their own playroom, Rosa Bonilla meticulously arranges a collection of action figures and picture books, applying a blend of organization and creative freedom
    while silently measuring each display against their high personal standards, and they often mutter critiques under their breath.
  sports: A budding athlete, Rosa Bonilla participates in a neighborhood Little League baseball team, practicing pitching in the early morning quiet at the park while they avoid the noisy group games, and
    they cheerfully watch the Seattle Mariners on TV, channeling their competitive streak into perfecting every throw.
  arts: A bright‑eyed art enthusiast, Rosa Bonilla loses herself in the vibrant worlds of Eric Carle’s picture books and Disney’s Frozen, sketching bold, off‑beat characters on every scrap of paper, and
    they quietly critique the color choices while demanding the perfect crayon shade.
  travel: A meticulous young traveler, Rosa Bonilla’s family road trips are carefully planned to calm, kid‑friendly locales such as the Monterey Bay Aquarium and the quiet sand dunes of the Great Sand Dunes
    National Park, where they can explore at their own pace while avoiding crowded attractions, and they secretly dream of the magical realms of Disneyland in California.
  culinary: A picky but adventurous foodie, Rosa Bonilla loves the cheesy comfort of homemade macaroni‑and‑cheese with a pinch of smoked cheddar and the sweet tang of mango slices, yet they refuse any dish
    with visible green peas, preferring to feed themselves with a child‑sized fork and a meticulous arrangement of apple and carrot sticks.
  core: Rosa Bonilla is a quietly intense four‑year‑old who devours art books, hoards pennies, and fiercely critiques every Lego tower, all while they battle a constant undercurrent of worry that makes
    even playtime feel like a high‑stakes competition.
background:
  cultural: Rosa comes from a Dominican family living in Paterson, New Jersey. She speaks both Spanish and English at home, celebrating Dominican holidays such as Día de la Constitución and enjoying traditional
    foods like mangú, sancocho, and pastelitos. Family gatherings often feature lively merengue music and storytelling about her heritage. She participates in community events organized by local Dominican
    cultural groups, which reinforce her connection to her roots while she navigates life in a multicultural urban setting.
attributes:
  skills: '["Basic drawing and coloring", "Color recognition", "Bilingual comprehension (Spanish & English)", "Simple puzzle solving", "Memory recall of stories", "Toy organization", "Use of child-friendly
