personas:
  professional: Anthony Wright, a retired high‑school STEM teacher turned community makerspace advocate, leverages decades of hands‑on laboratory design, Arduino and 3D‑printing expertise, and a relaxed,
    improvisational style to mentor new educators and fuse visual art with science in Portsmouth’s outreach programs.
  sports: Anthony Wright, who cherishes low‑impact water sports, is a member of the Portsmouth Sailing Club for kayaking and sailing, follows the New England Patriots (NFL) and Boston Red Sox (MLB) with
    fervor, and rows with a senior crew on the Piscataqua River to maintain fitness.
  arts: Anthony Wright, an active community‑theater performer and set‑design volunteer, sketches scenes at the Portsmouth Museum of Art inspired by Monet and Winslow Homer, enjoys local productions of Shakespeare
    and contemporary drama, and fills his playlists with folk legends Joan Baez and indie folk band Fleet Foxes.
  travel: Anthony Wright prefers short coastal road trips, regularly visits New England lighthouses such as Cape Elizabeth and Portland Head Light, has explored Acadia National Park and Quebec City, and
    dreams of sailing to the Azores for a maritime heritage pilgrimage.
  culinary: Anthony Wright, a seafood enthusiast, loves preparing classic New England clam chowder with fresh clams, potatoes, and thyme, crafts lobster rolls on buttered rolls, experiments with rosemary‑infused
    roasted chicken, and never starts his day without a strong cup of locally roasted coffee.
  core: Anthony Wright is a curious, art‑loving ex‑teacher who blends science with creativity, worries about missed obligations yet thrives on spontaneous projects, and can often be found sketching a lighthouse
    while organizing a senior makerspace workshop.
background:
  cultural: Anthony comes from a long‑standing New England Anglo‑American lineage, with family roots in the Portsmouth area dating back to the colonial era. Raised in a modest New Hampshire town, he absorbed
    the region’s values of self‑reliance, civic duty, and appreciation for the natural coastline. The maritime heritage of Portsmouth, combined with a vibrant local arts scene, shaped his interdisciplinary
    outlook. He grew up during the social upheavals of the 1960s, fostering an openness to unconventional ideas and progressive education. Today, his cultural identity blends respect for New England traditions—such
    as community involvement, historic preservation, and seasonal seafood cuisine—with a lifelong curiosity for art, science, and collaborative learning.
