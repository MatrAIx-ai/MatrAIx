    Portsmouth Public Library'', ''Playing Bridge and Card Games with Friends'']'
  career_goals: Looking ahead, Anthony plans to transition from full‑time classroom duties to a mentorship and advisory role, guiding younger teachers in creating interdisciplinary STEAM curricula. He aims
    to launch a community makerspace in Portsmouth that offers hands‑on workshops for seniors and youth, fostering lifelong learning and creativity. Securing a regional grant to expand STEM outreach in
    partnership with local museums and the maritime heritage sector is a key ambition. Over the next few years, he hopes to author a memoir that reflects on his teaching journey and to present at national
    education conferences on flexible, student‑centered learning. Throughout, he seeks a balanced schedule that minimizes stress while maximizing community impact.
