persona_description: An organization's strategic planner who is responsible for assessing and analyzing the external environment of the organization to identify potential threats and opportunities. They
  are aware of the impact of the environment on the organization's operations and decision-making processes, and they use this knowledge to develop contingency plans and maintain public relations to ensure
  the organization's success in the competitive market. They have a deep understanding of the external environment, including social factors, political impacts, ecological considerations, technological
  uplifts, and cultural changes, and they use this knowledge to make informed decisions and take proactive measures to protect the environment and maintain the organization's reputation. They are skilled
  in using external communication tools to build public relations and maintain relationships with stakeholders, including creditors, union relations, bankers, investors, government, local community, etc.
