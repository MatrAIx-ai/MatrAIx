persona_description: A researcher or academic who specializes in the study of communication and linguistics, particularly in the context of speech-gesture interaction and its effects on language comprehension
  and production. This person is interested in understanding how speakers use gestures to clarify verbal ambiguity, how the complexity of gestures influences their use, and how these gestures relate to
  the communication problems and potential issues that speakers face. They may have a background in linguistics, psychology, or communication science and are looking for insights into the representational
  hand gestures and speech-gesture interaction in everyday talk.
