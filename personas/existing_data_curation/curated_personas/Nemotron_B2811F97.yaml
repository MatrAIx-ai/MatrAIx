personas:
  professional: Renato, a high school sophomore, is an aspiring community recreation organizer who blends his practical planning skills with a love for basketball and bomba music to create structured yet
    adaptable after‑school sports and music sessions for his small circle of friends.
  sports: Renato, who spends his afternoons shooting hoops at the community court with his core group of friends, avidly follows the BSN’s Cangrejeros de Santurce and the local high school basketball league,
    while also joining informal beach volleyball games when the tide pools are low, balancing structured competition with casual play.
  arts: Renato, an enthusiastic amateur cuatro player, learns bomba and plena rhythms from online tutorials while sketching vibrant street scenes of local festivals, often humming along to the sounds of
    Celia Cruz and Juan Luis Guerra, which fuel his creative expression and give him a sense of cultural continuity.
  travel: Renato dreams of weekend trips to the tide‑rich shores of Culebra and the volcanic black‑sand beaches of Maui, planning his travels with a small notebook of cheap ferry schedules and a habit of
    collecting shells as souvenirs, yet he often settles for easy day outings to nearby Naguabo coves due to his school schedule and limited budget.
  culinary: Renato is a budding home chef who whips up quick garlic‑butter shrimp with mango salsa and a side of rice, occasionally tossing together fish tacos with fresh lime, while his favorite snack
    after sketching sessions is a bowl of plantain chips topped with melted cheese, though he often leaves a few dishes in the sink, reflecting his occasional laxness in the kitchen.
  core: Renato balances a practical, structured mindset with spontaneous creativity, thriving in small‑group activities like basketball, music, and community clean‑ups while navigating teenage life with
    a laid‑back approach to obligations, money, and health.
background:
  cultural: Renato is a Puerto Rican teen from Naguabo, a coastal municipality steeped in Afro‑Caribbean traditions, marine livelihoods, and strong family ties. He grew up hearing stories of the island's
    indigenous Taíno roots and the vibrant rhythms of bomba and plena that accompany local festivals like the Fiestas Patronales. Family meals are central to his life, with dishes like mofongo and lechón
    reflecting the island's culinary heritage. Spanish is his first language, supplemented by school‑taught English. The community's emphasis on mutual support, respect for elders, and a love for the sea
    shape his values, giving him a deep appreciation for both the cultural and natural landscape of Puerto Rico.
attributes:
  skills: '["basic carpentry", "preparing traditional Puerto Rican dishes", "basic computer and smartphone troubleshooting", "bicycle and small engine maintenance", "basketball fundamentals", "Spanish fluency",
    "conversational English", "knowledge of local marine life"]'
  hobbies: '["pickup basketball", "playing bomba and plena on a cuatro", "exploring tide pools and shell collecting", "video gaming (FIFA, Minecraft)", "sketching local scenes and festivals", "following
    sports news", "participating in community clean‑up events"]'
  career_goals: Renato aims to finish his secondary education, obtain a GED, and then enroll in a vocational program for automotive or culinary technology so he can contribute financially to his household
    while maintaining a flexible schedule. He also hopes to earn a scholarship to play basketball at a collegiate level, which would give him both a team environment and a pathway to higher education. In
    the longer term, he envisions a career that blends his love for his community and the sea, perhaps as a marine‑focused tour guide or a chef specializing in coastal cuisine.
