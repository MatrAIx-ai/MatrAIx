  hobbies: '[''Scale model building'', ''Woodworking'', ''Jigsaw puzzles'', ''Sudoku'', ''Reading nonfiction (history, logistics, self‑improvement)'', ''Weight training'', ''Hiking in Finger Lakes'', ''Following
    Rochester Red Wings baseball'', ''Attending Rochester Lilac Festival'']'
  career_goals: Patrick aims to advance into supervisory and managerial positions within supply chain logistics. He plans to complete his bachelor’s degree in Business Administration or Supply Chain Management
    while earning industry certifications such as OSHA safety, CPIM, and advanced forklift training. In the next five years he hopes to become a shift supervisor, then move toward a warehouse manager role
    where he can lead a team, drive lean process improvements, and oversee a regional distribution center. He values a stable income that will allow him to purchase a home in the Rochester area and maintain
    a balanced work‑life schedule.
