personas:
  professional: Won Yu, an aspiring mechanical engineering technology student, leverages a methodical, detail‑oriented mindset in precision model‑kit builds, Arduino robotics, and school event coordination,
    all while honing the practical skills required for a future reliability engineer.
  sports: Won Yu, a regular participant in a neighborhood basketball league and a dedicated Taekwondo practitioner at a local dojo, follows the Golden State Warriors and the San Jose Earthquakes, and structures
    weekly workouts to maintain both cardiovascular health and disciplined martial‑arts technique.
  arts: Won Yu, who treats model‑kit assembly of Gundam and other mechanical kits as a hands‑on art form, also immerses themselves in the strategic elegance of Settlers of Catan, while soundtrack‑centric
    evenings feature synthwave legends like Carpenter Brut and classic film scores by Hans Zimmer.
  travel: Won Yu, a meticulous planner, spends holidays on budget‑friendly road trips to Yosemite and the Redwood coast and dreams of future visits to Seattle’s tech precinct and the historic streets of
    Kyoto, preferring a blend of structured itineraries and spontaneous local food stops.
  culinary: Won Yu, who teams up with their mother on weekend nights to perfect dishes like handmade dumplings, mapo tofu, and stir‑fried bok choy, measures soy sauce, ginger, and Sichuan peppercorns to
    the gram for precise flavor, yet occasionally indulges in late‑night ramen from a nearby spot.
  core: Won Yu, an 18‑year‑old routine‑driven tinkerer, blends methodical precision in model building, engineering studies, and structured cooking with just‑enough social sport, all while maintaining a
    frugal budget and a quirky habit of cataloguing leftover screws for future projects.
background:
  cultural: Won is a second‑generation Chinese‑American raised in Oakland's diverse East Asian community. His household maintains Chinese traditions, celebrating Lunar New Year, the Mid‑Autumn Festival,
    and preparing family meals together. He grew up speaking Mandarin at home while navigating the multicultural environment of the Bay Area, which has fostered an appreciation for both his heritage and
    American values. He frequently attends events at the local Chinese Cultural Center and participates in school clubs that promote Asian‑American heritage. The family emphasis on education, respect for
    elders, and community responsibility heavily influences his practical, routine‑oriented outlook.
attributes:
  skills: '[''Bilingual in Mandarin and English'', ''Strong time‑management and scheduling skills'', ''Proficient in Microsoft Excel and Google Suite'', ''Basic Python programming and Arduino robotics'',
    ''Mechanical aptitude for routine car maintenance'', ''Experience organizing school events and volunteer programs'']'
  hobbies: '[''Model kit construction'', ''Basketball'', ''Taekwondo'', ''Cooking traditional Chinese cuisine'', ''Tabletop strategy games'', ''Volunteer tutoring in computer basics'']'
  career_goals: Won plans to enroll in a community college’s engineering technology program to earn an associate’s degree in mechanical or computer engineering. He aims to secure an apprenticeship with
    a local automotive or tech firm in the Bay Area, gaining hands‑on experience while pursuing certifications such as ASE and CompTIA. Long‑term, he aspires to become a reliability engineer or systems
    integrator, a role that blends his methodical mindset with practical problem‑solving. He is motivated to achieve financial stability to support his family and eventually assist his parents as they age.
