persona_description: A historian who is interested in the history of Europe's transition from medieval to modern society, particularly the role of lying in this transition. This person is likely to be a
  professor of history who has written about the history of Europe's transition from medieval to modern society and has a particular interest in the role of lying in this transition. They may have a deep
  understanding of the historical context and the arguments surrounding the question of whether it is ever acceptable to lie, and may have conducted research on this topic. They may also be interested in
  the diversity of attitudes towards lying among different historical figures, and may have written about this in their work.
