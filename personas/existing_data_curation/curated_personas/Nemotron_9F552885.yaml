personas:
  professional: A budding multimedia storyteller, Loris Hall blends hand‑drawn cartoons, LEGO stop‑motion animation, and tablet‑based music production to explore sci‑fi narratives, channeling boundless
    curiosity and a collaborative spirit while occasionally letting relaxed attitudes cause project deadlines to slip.
  sports: An energetic youth soccer enthusiast, Loris Hall plays on the River City Juniors, idolizes FC Barcelona and Manchester United, and approaches fitness through impromptu pick‑up games after school,
    though pre‑match nerves sometimes cause them to fumble the ball.
  arts: A fervent visual creator, Loris Hall draws inspiration from cartoonists like Adrian Tomine, comic storytellers such as Brian K. Vaughan, and animators like Hayao Miyazaki, while attending local
    art festivals and listening to the "StarTalk" and "The Creative Penn" podcasts, turning their love of graphic novels into vibrant sketches and experimental Lego stop‑motion scenes.
  travel: An adventurous explorer with a spontaneous streak, Loris Hall has taken weekend trips to the nearby science museum in Seattle and dreams of visiting Tokyo’s Lego exhibition and Paris’s Louvre,
    preferring short, friend‑led outings over meticulously planned vacations but often feeling nervous about navigating unfamiliar transit.
  culinary: A budding home‑chef who loves building LEGO‑shaped sandwiches, munching on pepperoni pizza, and experimenting with simple ramen recipes that include sliced carrots and boiled eggs, Loris Hall’s
    kitchen adventures often end with a flour‑covered apron and a lingering desire for sweet mango slices.
  core: Loris Hall is a curiosity‑driven 11‑year‑old who fuses LEGO stop‑motion with cartoon drawing, thrives on group soccer games, and balances kindness with occasional disorganization and a touch of
    worry.
background:
  cultural: Loris grew up in Denton, a suburban city in North Texas known for its vibrant music and arts scene. His family, of white, non‑Hispanic background, embraces a mix of traditional Southern hospitality
    and progressive community values. He often participates in school and community events that celebrate local Texan culture, such as county fairs, live music performances, and neighborhood festivals.
    The multicultural environment of Denton's schools and the city's emphasis on arts education have shaped his appreciation for diverse creative expressions.
