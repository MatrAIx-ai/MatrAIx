  career_goals: Loris dreams of becoming a multimedia artist or filmmaker who can blend visual art, storytelling, and technology to inspire and unite his community. He envisions creating short films or
    animated videos that highlight social themes, and eventually leading community art workshops for kids to foster creativity and empathy.
