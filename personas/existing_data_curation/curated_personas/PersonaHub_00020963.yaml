persona_description: A healthcare professional who specializes in the management of chronic pain in children and adolescents, particularly in the use of paracetamol (acetaminophen) as an analgesic treatment.
  They are likely to be involved in the design and conduct of clinical trials, review the evidence for the efficacy and safety of paracetamol in treating chronic non-cancer pain in children and adolescents,
  and provide recommendations for the use of paracetamol in clinical practice. They may also be involved in the development of guidelines for the management of chronic pain in children and adolescents.
