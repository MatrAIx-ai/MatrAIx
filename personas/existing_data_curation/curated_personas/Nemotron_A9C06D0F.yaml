personas:
  professional: Yolanda Vazquez, an aspiring junior naturalist, blends a love for picture books about wildlife with practical sketching skills to create detailed animal illustrations for class projects,
    and they carefully balance imaginative ideas with tried‑and‑true drawing techniques while dreaming of a future career protecting habitats.
  sports: Yolanda Vazquez, an enthusiastic member of the neighborhood dog‑walking club, enjoys casual soccer games with the local Tigers youth team, cheers for the city’s Rivercats baseball squad, and prefers
    low‑pressure, flexible play over regimented training schedules.
  arts: Yolanda Vazquez, a creative kid who spends afternoons drawing cartoon animals and assembling colorful bead necklaces, admires the whimsical illustrations of Mary Blair, sings along to folk tunes
    by The Milk Carton Kids, and often recreates scenes from beloved picture books using LEGO bricks, funneling their curiosity into vibrant artistic expression.
  travel: Yolanda Vazquez, an inquisitive explorer, delights in weekend trips to the nearby state park’s waterfall trail and a recent family road trip to the historic mountain town of Silver Creek, while
    dreaming of future adventures to the Amazon rainforest and the crystal‑clear beaches of Costa Rica, favoring relaxed itineraries that allow time for nature walks and sketching.
  culinary: Yolanda Vazquez, an eager kitchen assistant, enjoys rolling fresh corn tortillas, mixing black bean refried beans with a splash of lime, chopping tomatoes for a bright salsa, and crafting fruit
    kebabs with pineapple, strawberries, and mango, though they sometimes forget to wash their hands after handling beads, creating a playful yet slightly messy cooking environment.
  core: Yolanda Vazquez, a quiet yet compassionate 10‑year‑old, weaves curiosity about wildlife with a love for bead crafts, worries about small setbacks, but finds calm in puzzles and helping others.
background:
  cultural: Yolanda’s family comes from Guatemala and maintains many cultural traditions at home. Spanish is spoken daily, and she celebrates holidays such as Día de los Muertos, Semana Santa, and Guatemalan
    Independence Day with traditional foods like tamales, atole, and pupusas. She enjoys listening to marimba music and learning Mayan stories from her grandparents. These cultural ties influence her love
    of community, family, and sharing food and stories with friends.
attributes:
  skills: '["bilingual (English and Spanish) reading and writing", "basic computer literacy (tablet, educational apps, typing)", "empathetic listening and peer mediation", "creative drawing and craft-making",
    "following step‑by‑step instructions for simple experiments"]'
  hobbies: '["reading picture books and adventure stories", "drawing and bead‑crafting", "building LEGO sets and puzzles", "helping in the kitchen with Guatemalan recipes", "listening to Guatemalan folk
    music", "walking and caring for the family dog"]'
  career_goals: Yolanda dreams of becoming someone who can help others every day. She hopes to be a teacher or a community health aide when she grows up, so she can support children and families like her
    own. She also imagines working with animals as a veterinarian, inspired by caring for her family’s dog. Her long‑term goal is to use her bilingual skills to bridge gaps between English‑ and Spanish‑speaking
    community members.
