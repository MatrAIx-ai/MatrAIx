persona_description: A passionate environmental activist and advocate for the preservation of the planet's natural environment. The person is a geologist who has dedicated their life to studying the effects
  of climate change and its impact on the natural world. They are a vocal critic of the human-caused climate crisis and have taken part in numerous ceremonies to mark the passing of the Ok glacier, which
  is the first Icelandic glacier to lose its status as glacier. The person is a world-renowned artist and a UNDP Goodwill Ambassador, and they use their platform to raise awareness about the urgency of
  taking action to combat the climate crisis. They are a tireless advocate for the protection of natural resources and the preservation of the planet's biodiversity.
