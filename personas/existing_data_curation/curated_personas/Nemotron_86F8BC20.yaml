  hobbies: '["Reading historical non-fiction and genealogy", "Birdwatching", "Walking local nature trails", "Cooking traditional Mexican meals", "Maintaining a vegetable garden", "Listening to classic Mexican
    music (rancheras, boleros, mariachi)", "Sorting donations at community food pantry", "Attending weekly Mass at local church"]'
  career_goals: Although retired, Gustavo’s primary ambitions focus on maintaining his health and independence while continuing to enrich his community. He aims to keep his garden thriving, preserving heirloom
    seed varieties for future family members. He wishes to compile a written memoir of his life stories and family history, ensuring his cultural legacy endures. Gustavo also hopes to remain a quiet pillar
    of support by offering occasional assistance to neighbors in need, translating for Spanish‑speaking residents, and providing mentorship to younger community members interested in traditional cooking
    or gardening. Finally, he aspires to stay engaged with his faith and cultural celebrations, sharing his love of Mexican traditions during holidays like Día de los Muertos and Christmas.
