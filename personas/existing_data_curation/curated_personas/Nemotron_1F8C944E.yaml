  career_goals: Over the next five years, Ana aims to step into senior leadership, becoming a Director of Marketing or Head of Brand where she can shape inclusive, socially conscious campaigns. She wants
    to deepen expertise in AI-driven personalization, experiential AR branding, and sustainable marketing practices. In parallel, she aspires to mentor Latinx youth entering the industry and eventually
    launch her own boutique agency that champions multicultural brands.
