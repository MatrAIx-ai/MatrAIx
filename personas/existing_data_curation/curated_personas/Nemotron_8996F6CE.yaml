  career_goals: Omar aims to enroll in a community college program to earn an associate's degree in business administration, with a long‑term goal of becoming a project manager for a non‑profit organization
    that supports youth and cultural programs in Riverside. He also envisions starting his own small business, such as a family‑run taquería, that blends his entrepreneurial spirit with his Mexican heritage.
    He plans to leverage his organizational and communication strengths to build a career that balances practical stability with opportunities to innovate and serve his community.
