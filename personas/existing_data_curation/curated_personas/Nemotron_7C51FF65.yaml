personas:
  professional: Yoonsun Nie is a budding robotics enthusiast who designs and programs small competition robots for her school club, channeling her curiosity and practicality by balancing experimental ideas
    with proven engineering methods, while their reliable nature keeps the team on schedule.
  sports: Yoonsun Nie plays forward for the local youth soccer team, the Riverdale Rangers, hurries to weekly practices after school, and joins family hikes in nearby state parks such as Pine Ridge, balancing
    team competition with nature’s calm as a way to manage stress.
  arts: Yoonsun Nie is an avid digital artist who creates fan‑art in Procreate inspired by graphic novels like 'Saga' and 'My Hero Academia', practices Korean traditional dance with graceful rhythmic movements,
    and attends community theater performances featuring actors like Idina Menzel, weaving both modern and traditional aesthetics into their creative identity.
  travel: Yoonsun Nie prefers short, adventurous trips—weekend camping at Lake Meadow, a day hike in the Blue Ridge Mountains, and a family visit to the historic city of Kyoto—planning each outing with
    a detailed itinerary app while balancing limited teen budget constraints and school homework deadlines.
  culinary: Yoonsun Nie loves cooking simple, flavor‑rich meals such as bibimbap‑styled rice bowls with sautéed vegetables, gochujang, and a fried egg, while also mastering the art of instant ramen upgrades
    with cheese and scallions, and they often share these dishes with friends during study sessions.
  core: Yoonsun Nie is a socially energetic teen who blends curiosity with practicality, juggling robotics, soccer, and traditional dance while battling occasional anxiety and a habit of over‑organizing
    every hobby.
background:
  cultural: Yoonsun comes from an East Asian immigrant family—her parents speak Korean at home and maintain cultural traditions such as Chuseok and Lunar New Year celebrations. Growing up in San Jose’s
    vibrant Asian‑American community, she blends Korean cultural values of respect for education, community harmony, and collectivism with the diverse, tech‑forward environment of Silicon Valley. This hybrid
    background fuels her appreciation for both established methods and innovative ideas, while also shaping her strong sense of responsibility toward family and peers.
