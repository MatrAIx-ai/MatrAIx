  hobbies: '[''Church choir and gospel singing'', ''Dancing'', ''Book club'', ''Gardening'', ''Lake Erie walking groups'', ''Volunteering at food bank'', ''Cooking Southern cuisine'', ''Quilting'', ''Playing
    bridge'', ''Community events'']'
  career_goals: Sharon aims to transition from a staff accountant role into a senior audit manager position within the next three years, building on her extensive experience to oversee larger client portfolios
    and mentor emerging talent. She plans to complete the remaining coursework for her CPA certification and pass the exam, solidifying her professional credibility. Long‑term, she envisions launching a
    boutique accounting consultancy that serves small businesses and nonprofit organizations in Lorain County, providing affordable financial guidance and workshops on budgeting and tax literacy. Additionally,
    she is committed to contributing to her community by offering free financial literacy seminars at local churches and community centers.
