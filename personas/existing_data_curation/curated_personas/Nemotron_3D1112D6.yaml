personas:
  professional: Sharon Allen, a meticulous senior accountant with over two decades of audit experience, leverages advanced Excel modeling, QuickBooks, and SAP to deliver precise financial statements, enforce
    GAAP compliance, and mentor junior staff, all while balancing a pragmatic, structured approach with her outgoing, collaborative nature.
  sports: Sharon Allen, an enthusiastic member of the Lorain Lakeshore Walking Club, enjoys brisk walks along Lake Erie’s trails each weekend, cheerfully supports the Cleveland Browns and Cleveland Guardians,
    and participates in a local bridge club that doubles as a mental‑fitness exercise, while occasionally joining a community yoga class to stay limber.
  arts: Sharon Allen, a passionate church choir member who sings soul and gospel classics by Aretha Franklin and The Clark Sisters, delights in dancing to Al Green at community events, spends quiet evenings
    quilting intricate patterns inspired by traditional motifs, and fuels her literary appetite with contemporary fiction by authors like Celeste Ng and personal‑development works from Brené Brown.
  travel: Sharon Allen, a calculated yet adventurous traveler, prefers meticulously planned road trips that blend cultural immersion with relaxation, having explored the historic streets of Savannah, the
    culinary scene of New Orleans, and the lakeside charm of Toronto, while dreaming of a future pilgrimage to the blues roots of Memphis and a serene retreat at the Finger Lakes.
  culinary: Sharon Allen, an avid home chef, specializes in Southern comfort foods such as fried chicken with a honey‑hot sauce glaze, shrimp and grits infused with fresh garden thyme, and collard greens
    simmered with smoked turkey, often adding home‑grown basil, rosemary, and cilantro to modernize classic recipes, and relishes sharing these meals at potluck gatherings.
  core: Sharon Allen blends disciplined precision in accounting with a vibrant community spirit, channeling her love for choir, gardening, and Southern cooking into a life balanced between structured spreadsheets
    and spontaneous dance steps, though she occasionally gets lost in spreadsheet rabbit holes and forgets to water her herbs.
background:
  cultural: Sharon identifies as an African American woman raised in the Midwest, with deep roots in the Great Migration families that settled in Cleveland and its surrounding suburbs. Her upbringing was
    shaped by the church, family gatherings, and a strong emphasis on education and community service. The cultural fabric of her life includes soulful music, home‑cooked meals passed down through generations,
    and participation in local civil‑rights and neighborhood initiatives. Living in North Ridgeville, she blends Midwestern values of hard work and neighborliness with the rich traditions of Black heritage,
    maintaining ties to extended family and cultural organizations that celebrate African American history, art, and cuisine.
