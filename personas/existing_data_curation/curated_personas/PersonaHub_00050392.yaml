persona_description: A forestry policy maker who is interested in the conservation, improvement, and expansion of England's woodland resource. This person is likely to be involved in decision-making processes
  related to the management of forests and woodlands, and is focused on ensuring that the benefits provided by these resources are maximized and maintained for the future. This person may be involved in
  working with landowners and managers to manage wild deer populations and control invasive species, and may be interested in promoting the planting of a wider range of types and species of trees to increase
  ecological resilience. This person may also be interested in the use of regulation and swift responses to tree disease outbreaks to protect England's woods, and may be involved in the development of new
  woodland creation policies.
