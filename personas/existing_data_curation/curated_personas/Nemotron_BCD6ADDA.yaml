  hobbies: '[''Painting landscapes'', ''Hand‑crafted pottery'', ''Traditional Mexican cooking'', ''Backyard gardening (chilies, tomatoes, herbs)'', ''Folk dancing'', ''Walking local trails'', ''Reading
    historical fiction'', ''Volunteering at the senior center'', ''Teaching basic computer skills'', ''Attending community art workshops'']'
  career_goals: Luisa aspires to become a senior lead operator or shift supervisor at her plant, where she can shape workflow improvements and mentor younger workers. She plans to earn a Certified Packaging
    Technician credential and an OSHA safety certification to deepen her expertise. Long‑term, she dreams of launching a small side business that produces artisanal, culturally inspired packaging for local
    food artisans, blending her technical know‑how with her love for Mexican folk art.
