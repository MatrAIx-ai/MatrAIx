  career_goals: Blanca aspires to advance to a senior director role overseeing regional health services, where she can champion innovative, patient‑centered care models that integrate artistic and therapeutic
    elements. She aims to obtain a Certified Professional in Healthcare Management (CPHM) credential, expand her expertise in mental health program development, and eventually launch her own consultancy
    that blends health management with creative health‑promotion strategies for underserved Latino communities.
