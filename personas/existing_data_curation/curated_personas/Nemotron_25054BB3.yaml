  career_goals: Charline aspires to enroll in a STEM‑focused high school program and later pursue a bachelor’s degree in civil engineering, with a particular interest in sustainable urban infrastructure.
    She envisions herself leading project teams that design safe, functional community spaces in diverse neighborhoods. Long‑term, she hopes to become a project manager for large‑scale infrastructure projects,
    using her methodical mindset to ensure projects are completed on schedule and within budget. Additionally, she aims to serve as a mentor for other young Black girls interested in engineering, encouraging
    greater representation in the field.
