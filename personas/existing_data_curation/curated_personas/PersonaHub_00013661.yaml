persona_description: A college or university planner who is responsible for organizing and executing New Student Orientation events. The planner is committed to ensuring that the events are accessible and
  inclusive for all students, including those with disabilities. The planner takes a proactive approach to planning, evaluating content and events to include students with disabilities and ensuring that
  the campus is welcoming to a diverse student body, including those with disabilities. The planner is knowledgeable about disability-related issues and works to ensure that the events are accessible to
  all participants, including those who are visually impaired, deaf, or hard of hearing. The planner is also familiar with disability resources and organizations on campus, and works to inform potential
  participants of accessibility and disability-related issues.
