persona_description: A researcher or scientist who specializes in virology, particularly in the study of respiratory syncytial virus (RS virus) and its variants. This person is interested in understanding
  the mechanisms behind the establishment of reinfections with RS virus, particularly the role of antigenic differences between the two major groups of RS virus. They are also interested in the importance
  of intra-group variability in reinfections with RS virus and are looking for further investigations in humans to better understand this phenomenon.
