persona_description: Christopher Bassett, a scientist who specializes in the study of acoustic techniques, particularly broadband acoustics, for identifying oil layers under sea ice. He is a leader in the
  field, presenting at the 167th Meeting of the Acoustical Society of America and has unique expertise in signal processing, signal interpretation, and the development of new acoustic techniques for oil
  detection. He is known for his contributions to the field, including his research on high-frequency broadband acoustic scattering of growing sea ice and oil beneath sea ice, and his interest in developing
  a successful instrumentation package for oil detection under ice.
