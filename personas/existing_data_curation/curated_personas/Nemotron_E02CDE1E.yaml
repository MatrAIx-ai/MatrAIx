  career_goals: In her later years, Ngocphuong aims to preserve traditional printing techniques by mentoring younger apprentices and documenting the history of local print culture. She envisions launching
    a small community print studio that collaborates with artists and senior groups to create limited-edition art prints and oral-history booklets. Additionally, she hopes to volunteer her expertise to
    support neighborhood libraries and cultural festivals, ensuring that the stories of both her Vietnamese heritage and the Northfield community are beautifully printed and widely shared.
