personas:
  professional: Elaine Cuerbo, a seasoned surgical technologist with over three decades of OR experience, now channels their meticulous instrument management skills and artistic eye into developing evidence‑based
    training modules and detailed anatomical illustrations for hospital staff and community‑college students, and they plan to earn the Certified Surgical Technologist educator credential.
  sports: Elaine Cuerbo stays fit by playing weekly pickleball at the community center, following the Iowa Hawkeyes football season religiously, and trekking the Mississippi River trail in the spring, where
    they combine bird‑watching with low‑impact cardio, while occasionally joining the local senior softball league for a competitive edge.
  arts: Elaine Cuerbo expresses their love of both science and aesthetics through watercolor paintings of prairie landscapes and detailed anatomical sketches, frequents the Figge Art Museum to study works
    by Monet and Georgia O’Keeffe, participates in a piano practice group that tackles Debussy’s ‘Clair de Lune’, and they engage in a sci‑fi book club that debates the ideas of Ursula K. Le Guin.
  travel: Elaine Cuerbo prefers leisurely, self‑driven road trips that blend cultural stops and natural scenery, having explored the historic river towns along the Great River Road, visited the Art Institute
    of Chicago and the National Museum of Natural History in Washington, D.C., and they now dream of a bird‑watching expedition to the Galápagos Islands while balancing travel costs against their modest
    retirement budget.
  culinary: Elaine Cuerbo enjoys cooking seasonal Midwestern fare such as sweet corn succotash, wild‑rice pilaf with foraged mushrooms, and a hearty chicken pot pie seasoned with rosemary and sage, often
    using fresh herbs from their prairie garden, while they treat themselves to a slice of cherry pie at the county fair during the summer.
  core: Elaine Cuerbo blends surgical precision with artistic curiosity, navigating life with methodical pragmatism, quiet competitiveness, and a steady love for nature, community, and lifelong learning,
    and they approach each day as a new canvas.
background:
  cultural: Elaine grew up in a small Midwestern town in Iowa, raised in a family that valued hard work, community service, and modesty. Her cultural upbringing reflects typical white Midwestern values—practicality,
    self‑reliance, and a strong sense of neighborliness—while her higher education exposed her to broader scientific and artistic perspectives. She maintains a connection to local traditions such as county
    fairs, church gatherings, and volunteer work at the community center. The region’s rich natural scenery and the cultural vibrancy of the Quad‑Cities inform her appreciation for both the outdoors and
    the arts, shaping a balanced worldview that blends pragmatism with curiosity.
attributes:
  skills: '[''Sterile field management'', ''Instrument preparation and handling'', ''Orthopedic surgery instrumentation'', ''Cardiovascular surgery instrumentation'', ''General surgery instrumentation'',
    ''Laparoscopic and robotic instrumentation proficiency'', ''Operating room workflow optimization'', ''Infection control enforcement'', ''Patient positioning and safety'', ''Equipment troubleshooting
    and maintenance'', ''Surgical tech education and mentorship'', ''Continuing education curriculum development'', ''Medical illustration and anatomy drawing'']'
  hobbies: '[''Watercolor painting'', ''Anatomical illustration'', ''Visiting art museums and galleries'', ''Online art history courses'', ''Science‑fiction book club'', ''Piano practice'', ''Gardening
    (native prairie plants)'', ''Bird‑watching'', ''Hiking in local nature preserves'', ''Crossword and Sudoku puzzles'', ''Cooking experimental international recipes'']'
  career_goals: Elaine aims to transition into a senior teaching and mentorship role within her hospital and the local community college, designing evidence-based training modules that incorporate the latest
    surgical technology and her own artistic visualizations. She plans to earn the Certified Surgical Technologist educator credential, lead a quality‑improvement committee focused on OR safety, and eventually
    author a guidebook that blends anatomy illustration with practical surgical tech insights. As she approaches retirement, she also hopes to volunteer for outreach programs that bring surgical safety
    education to rural clinics and to organize small workshops for fellow senior technologists interested in new technologies like 3‑D‑printed instruments.
