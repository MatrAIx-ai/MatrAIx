  hobbies: '[''Minecraft'', ''Fortnite'', ''LEGO building'', ''Reading sci‑fi books'', ''Desert hiking'', ''Sketching comic strips'', ''Beginner guitar'', ''Robotics club'', ''Soccer'', ''Stargazing'',
    ''Gardening'']'
  career_goals: Craig dreams of turning his love for gaming, coding, and the natural world into a career as a video game developer who creates educational games about desert ecosystems. He also envisions
    working as a wildlife biologist or park ranger, roles that combine structured scientific inquiry with the freedom to explore and protect Arizona's unique landscape. Ultimately, he seeks a profession
    that offers clear problem‑solving tasks, creative flexibility, and the chance to help others learn and feel less anxious.
