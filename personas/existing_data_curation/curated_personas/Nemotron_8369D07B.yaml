personas:
  professional: An aspiring robotics hobbyist, Craig Kistler channels their love of structure and hands‑on problem solving into building programmable LEGO machines and leading their middle school’s robotics
    club, where they apply a practical mindset yet occasionally drift into disorganized brainstorming, making them both a creative ideator and a reluctant planner.
  sports: A weekend soccer enthusiast, Craig Kistler laces up for after‑school matches with the East Mesa Soccer League, treks Phoenix’s desert trails with their family, and they cheer on the Phoenix Rising
    FC, often swapping jerseys with teammates after games.
  arts: A creative tinkerer, Craig Kistler spends afternoons constructing intricate Minecraft realms and LEGO builds, sketches sci‑fi inspired comic strips in a battered notebook, and they practice beginner
    guitar chords to Imagine Dragons’ ‘Believer’, drawing artistic inspiration from classic comic artists like Jack Kirby.
  travel: A budding explorer, Craig Kistler loves family road trips to the red rocks of Sedona and weekend outings to the Grand Canyon, daydreams about a future adventure to Japan’s Akihabara district to
    soak up gaming culture, and they prefer short, structured itineraries that fit around school schedules and after‑school activities.
  culinary: A budding chef, Craig Kistler enjoys whipping up easy nacho platters with cheddar, jalapeños, and salsa, mixing garden‑fresh tomatoes into homemade guacamole, and occasionally baking chocolate
    chip cookies after gaming marathons, though they sometimes skip vegetables in favor of quick pizza slices.
  core: Craig Kistler is a structured‑yet‑flexible 11‑year‑old whose love for building, gaming, and desert adventures is balanced by high emotional reactivity, occasional anxiety, and a tendency to procrastinate
    on chores.
background:
  cultural: Craig hails from a white, middle‑class family in suburban Scottsdale, Arizona. His upbringing blends typical American Midwest values—such as an emphasis on education, community involvement,
    and celebrating holidays like Thanksgiving and the Fourth of July—with the distinctive Southwest influences of the desert environment, outdoor recreation, and occasional regional festivals that honor
    Native American and Hispanic cultures. Living in Maricopa County, he is accustomed to warm, sunny weather, enjoys the natural beauty of the desert, and is comfortable navigating the multicultural atmosphere
    of the Phoenix metropolitan area.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''Scratch programming'', ''LEGO building'', ''Strategic video gaming (Minecraft)'', ''Basic desert ecology knowledge'', ''Coping techniques (deep
