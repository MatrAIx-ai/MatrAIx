  hobbies: '[''Painting'', ''Architectural Sketching'', ''Photography'', ''Collecting Vintage Mexican Tiles'', ''Reading Art History'', ''Listening to Mariachi Music'', ''Gardening'', ''Woodworking'']'
  career_goals: Approaching retirement, Alberto aims to transition into a consulting role where he can mentor emerging foremen and share his knowledge of efficient, low‑impact construction methods. He hopes
    to spearhead a community‑focused initiative to retrofit older homes in Lima with energy‑saving upgrades while preserving Mexican‑inspired architectural details. Additionally, he aspires to obtain a
    certification in Building Information Modeling (BIM) to stay current with emerging technologies.
