personas:
  professional: Alberto Berrios, a veteran construction manager with 35 years of experience, blends meticulous project scheduling, sustainable building practices, and a keen eye for Mexican folk-inspired
    aesthetics as they prepare to shift into a consulting role, mentor emerging foremen, and pursue BIM certification.
  sports: Alberto Berrios follows Alianza Lima passionately, attends weekend matches when possible, participates in a senior walking club that meets twice weekly, and enjoys casual badminton at the community
    center to maintain flexibility, even though they sometimes neglect strength training.
  arts: Alberto Berrios devotes weekends to painting vibrant still‑lives and architectural sketches infused with Mexican folk motifs, curating vintage tile collections, photographing historic buildings,
    and drawing inspiration from Frida Kahlo, Diego Rivera, and lively mariachi music, while they sometimes procrastinate completing canvases due to perfectionism.
  travel: Alberto Berrios prefers culturally immersive trips, having explored Oaxaca’s markets, Granada’s colonial architecture, and Cusco’s Inca ruins, and they plan future visits to Puebla’s ceramic districts
    and Chile’s coastal towns, always arranging travel around their consulting commitments and a modest travel budget.
  culinary: Alberto Berrios enjoys preparing mole poblano, chiles en nogada, and garden‑fresh salads seasoned with cilantro and lime, showcasing moderate cooking skills that they enhance by experimenting
    with traditional chilies and spices, though they occasionally over‑salt dishes.
  core: Alberto Berrios merges a disciplined construction career with solitary artistic expression, a steady but occasionally indulgent financial approach, and a health‑focused routine, all tempered by
    a quiet demeanor and a love for vintage tiles and mariachi.
background:
  cultural: Born to Mexican immigrant parents, Alberto grew up bilingual, speaking Spanish at home while attending public school in Ohio. He maintains strong ties to Mexican traditions, celebrating Día
    de los Muertos and preparing family recipes such as mole and tamales. His cultural identity blends Mexican values of family cohesion, respect, and craftsmanship with Midwestern sensibilities of hard
    work and community involvement. He participates in the local Latino cultural association, where he volunteers to organize art workshops and cultural festivals, keeping his heritage alive for his children
    and grandchildren.
attributes:
  skills: '[''Project Management'', ''Budgeting & Cost Control'', ''Blueprint Reading'', ''Construction Safety Compliance'', ''Subcontractor Coordination'', ''Quality Assurance'', ''Sustainable Building
