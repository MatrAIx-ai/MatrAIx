  career_goals: Rodney aims to transition from his current hiatus into a role that merges his business acumen with his passion for the arts. He envisions launching a boutique consultancy that helps cultural
    institutions and emerging artists achieve financial sustainability while preserving artistic integrity. Additionally, he hopes to serve on the board of a local nonprofit arts center, mentor aspiring
    entrepreneurs, and author a book on integrating creativity into corporate strategy. Over the next five years, he aspires to become a recognized thought leader at the intersection of business and the
    creative economy, while cultivating a community hub in Kendall Park that fosters collaboration among artists, innovators, and business professionals.
