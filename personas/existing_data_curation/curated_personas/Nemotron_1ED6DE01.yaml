personas:
  professional: Angela Scott, a sustainable farm management trainee with a knack for merging agronomy and visual design, leverages their hands‑on experience operating tractors, maintaining irrigation, and
    conducting soil tests while also creating striking branding graphics and farm‑to‑table photo content, balancing meticulous record‑keeping in farm‑management software with the free‑flowing imagination
    that drives their experiments in hydroponics and regenerative practices.
  sports: Angela Scott, an outdoor‑enthusiast who spends weekends hiking the Ozark Trail and birdwatching at the Missouri Botanical Garden, follows the St. Louis Cardinals and Kansas City Chiefs with casual
    devotion, participates in a local community run series during spring and joins a weekend kayaking club on the Mississippi River to stay fit.
  arts: Angela Scott, a fervent creator who spends evenings sketching pastoral scenes inspired by Andrew Wyeth, curates a personal Instagram feed of Ansel Adams‑style photography, listens to folk singer
    Gillian Welch while writing poetry in the vein of Mary Oliver, and volunteers at the quarterly St. Louis Art Fair to showcase emerging local talent.
  travel: Angela Scott, a wanderlust‑driven 24‑year‑old who prefers slow, purposeful trips, has road‑tripped through the Missouri Ozarks, taken a study tour of hydroponic farms in the Netherlands, dreamed
    of hiking the Japanese Alps, and hopes to visit the vineyards of Tuscany to learn about sustainable viticulture.
  culinary: Angela Scott, an adept home cook who transforms their herb garden’s basil, rosemary, and mint into fresh pesto, whips up seasonal ratatouille with heirloom tomatoes and zucchini, experiments
    with farm‑fresh trout grilled on a cedar plank, and enjoys pairing dishes with locally brewed craft beers while occasionally over‑spicing meals in a burst of creative zeal.
  core: Angela Scott, a 24‑year‑old sustainable‑farm advocate who melds art with agronomy, balances meticulous planning with spontaneous creativity, but often loses track of time sketching in the field,
    forgets to water their indoor herbs during late‑night poetry sessions, and hoards vintage camera lenses like treasures.
background:
  cultural: Angela grew up in Platte County near Kansas City, Missouri, where Midwestern agricultural heritage blends with a modest urban cultural scene. Her family's roots trace back to German and English
    immigrants, imparting values of hard work, self-reliance, and community involvement. The local tradition of county fairs, farm markets, and small-town gatherings fostered her deep connection to the
    land and seasonal cycles, while the nearby Kansas City arts community nurtured her love for creativity and novelty.
