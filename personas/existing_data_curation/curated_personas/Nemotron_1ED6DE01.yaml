  career_goals: Angela aims to become a sustainable farm manager and eventually launch her own diversified organic farm that doubles as an educational hub for community workshops blending agriculture and
    art. She plans to earn a bachelor's degree in Sustainable Agriculture, obtain organic certification, and gain experience with an agritech startup focused on innovative crop production. In the long term
    she hopes to be recognized as a thought leader on integrating artistic design into agronomy, publish a guidebook, speak at niche conferences, and mentor the next generation of women farmers.
