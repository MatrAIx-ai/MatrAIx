  career_goals: Driven by his imagination and competitive spirit, Jose aims to transition from front-line entertainment attendant work to a leadership role in production and creative development. In the
    next three to five years, he plans to obtain a certification in production management and take on responsibilities as an assistant stage manager or event producer at a Los Angeles venue. Ultimately,
    he envisions founding an independent production company that creates immersive, culturally resonant multimedia experiences—melding Salvadoran folklore with contemporary speculative narratives. He also
    aspires to mentor emerging artists from underrepresented backgrounds, using his bilingual abilities and industry insight to bridge gaps.
