  hobbies: '[''Reading speculative fiction'', ''Independent film screenings'', ''Digital art creation'', ''Acoustic guitar'', ''Cooking Salvadoran dishes'', ''Hiking in Griffith Park'', ''Yoga'', ''Improvisational
