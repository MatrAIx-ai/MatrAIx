  hobbies: '[''gardening'', ''woodworking'', ''listening to blues and soul music'', ''cooking Southern soul food'', ''reading biographies and memoirs'', ''watching Memphis Grizzlies games'', ''fishing'',
    ''attending church fellowship'']'
  career_goals: Even though he is currently out of the formal workforce, Corey aims to channel his practical abilities into a modest part‑time handyman service for neighbors, supplemented by volunteer mentorship
    at his local church where he can guide younger men in life skills. He also hopes to complete a short certification in residential plumbing to expand his service offerings, maintain steady income to
    support his health needs, and eventually become a respected elder voice in his community.
