personas:
  professional: Corey Locklear, a 58-year-old aspiring part‑time handyman, blends decades of home‑maintenance know‑how, basic carpentry, and automotive upkeep into a reliable service for neighbors while
    pursuing a residential plumbing certification and volunteering as a life‑skills mentor at their local church.
  sports: Corey Locklear follows the Memphis Grizzlies avidly, attends occasional away games when budget allows, participates in a local senior fishing league, and enjoys weekend lawn‑care contests with
    the neighborhood community garden club.
  arts: Corey Locklear spends evenings listening to classic blues legends like B.B. King and Muddy Waters and soul icons such as Otis Redding and Aretha Franklin, often humming along while carving wood,
    and attends the quarterly community theater’s performances of classic plays.
  travel: Corey Locklear prefers low‑key trips, having road‑tripped to New Orleans for the music scene, fished on Lake Ouachita, and dreams of a relaxed family vacation to the Great Smoky Mountains, always
    planning itineraries around affordable lodging and familiar Southern cuisine.
  culinary: Corey Locklear delights in cooking soul‑food staples like fried catfish with hush‑puppies, collard greens seasoned with smoked turkey, and sweet potato pie, skilfully balancing a modest garden
    harvest of okra and tomatoes with pantry staples such as buttermilk and hot sauce.
  core: Corey Locklear, a steady‑hand handyman with a soft spot for blues, soul‑food, and community mentorship, balances routine with occasional splurges on tools, all while humming classic records in the
    garden.
background:
  cultural: Corey grew up in the historic African‑American neighborhoods of Memphis, shaped by the city's rich blues heritage, Southern gospel traditions, and a strong church community. His upbringing emphasized
    respect for elders, communal support, and the legacy of the civil‑rights movement, which influence his values of practicality, kindness, and dedication to fostering harmony in his neighborhood.
