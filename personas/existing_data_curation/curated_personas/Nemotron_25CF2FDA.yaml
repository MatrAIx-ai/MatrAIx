  career_goals: Even at 93, Brenda’s primary ambition is to leave a lasting, positive imprint on her community. She aims to mentor younger residents through craft workshops, document her family’s history
    and recipes in a written memoir, and continue volunteering with the local senior center and church. Maintaining her health and independence so she can stay actively involved in group activities is also
    a key personal goal. Ultimately, she hopes to see her contributions—especially the community garden she helped establish and the oral histories she records—preserved for future generations.
