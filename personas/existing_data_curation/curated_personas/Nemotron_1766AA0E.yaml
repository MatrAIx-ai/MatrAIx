personas:
  professional: Shirley Hernandez, a seasoned Class A commercial driver renowned for meticulous route planning and bilingual client liaison, leverages their methodical focus and calm resilience to consistently
    meet delivery deadlines while mentoring new drivers, positioning themselves for a future fleet manager role.
  sports: Shirley Hernandez follows soccer passionately, supporting the national team of their home country as well as Inter Miami CF, participates in weekend pick‑up matches at a local park, and stays
    fit through a mix of brisk evening walks and occasional beach volleyball with friends.
  arts: Shirley Hernandez immerses themselves in the arts by avidly reading mystery novels from authors like Agatha Christie and Gillian Flynn, listening to the vibrant rhythms of legends such as Celia
    Cruz and contemporary Latin pop stars, and attending live performances at the Adrienne Arsht Center on occasion, which enriches their evenings after long hauls.
  travel: Shirley Hernandez enjoys meticulously planning trips that blend cultural immersion and relaxation, having explored the Andean highlands of their home country, savored the historic plazas of Mexico
    City, and taken road trips to the Florida Keys and the Everglades, while dreaming of a future vacation to the coastal villages of Portugal where they can share home‑cooked dishes with new friends.
  culinary: Shirley Hernandez delights in cooking traditional coastal dishes like ceviche with lime, cilantro, and filet of local snapper, and golden empanadas filled with seasoned beef, skillfully balancing
    flavors using fresh herbs harvested from their balcony garden, yet occasionally shortcuts by ordering takeout on busy workweeks.
  core: Shirley Hernandez embodies a calm, organized, and community‑oriented spirit, pairing a methodical work ethic with a love for home‑cooked meals, soccer, and quiet moments in the garden, while occasionally
    wrestling with a sweet‑tooth impulse after long drives.
background:
  cultural: Shirley grew up in an Ecuadorian household where family gatherings, Spanish language, and traditional celebrations like Día de los Difuntos were central. After moving to Miami, she has blended
    her roots with the multicultural environment of the city, participating in local festivals such as Carnaval Miami and supporting Ecuadorian diaspora groups. Her bilingual ability reflects the importance
    of maintaining cultural ties while adapting to a predominantly English‑speaking work setting. She values community solidarity, often sharing homemade dishes with neighbors and contributing to charitable
    drives that support recent immigrants from Latin America.
attributes:
  skills: '[''Commercial Driving (Class A)'', ''Route Planning and Optimization'', ''Safety Compliance and Vehicle Inspection'', ''Customer Relationship Management'', ''Sales Negotiation'', ''Logistics
