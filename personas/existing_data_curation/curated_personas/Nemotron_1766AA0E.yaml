  hobbies: '[''Cooking Ecuadorian cuisine'', ''Balcony gardening'', ''Following and playing recreational soccer'', ''Reading mystery novels'', ''Volunteering at ESL community center'', ''Listening to Latin
    music'']'
  career_goals: Shirley aims to transition from front‑line driving to a supervisory role within a logistics firm, such as fleet manager or operations coordinator, where she can apply her organizational
    strengths to oversee scheduling, driver coaching, and compliance. She plans to acquire additional endorsements (hazardous materials, tanker) and pursue a logistics certification to bolster her credentials.
    Long‑term, she envisions launching a small, family‑run courier service that serves Miami’s growing Ecuadorian and broader Latino community, leveraging her market knowledge and reliable reputation.
