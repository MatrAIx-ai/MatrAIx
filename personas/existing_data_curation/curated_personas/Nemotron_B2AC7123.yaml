personas:
  professional: A community arts program coordinator in training, Yesenia Quintero blends meticulous event‑planning skills with a keen eye for visual storytelling, using Canva and photography to promote
    local cultural festivals while negotiating with vendors and volunteers in both English and Spanish.
  sports: An avid outdoor enthusiast, Yesenia Quintero hikes the Texas Hill Country with the San Antonio Hiking Club, follows the San Antonio Spurs and San Antonio FC, and participates in local 5K runs
    organized by community festivals, though they admit to skipping leg day at the gym when work piles up.
  arts: An indie‑spirited art lover, Yesenia Quintero spends weekends sketching in Brackenridge Park, curates a photo series inspired by the works of Frida Kahlo, Georgia O'Keeffe, and Banksy, and fills
    their playlists with Tame Impala, Lila Downs, and the latest indie folk releases, often quoting art‑history texts on their blog.
  travel: Yesenia Quintero favors road trips that balance scenic adventure with cultural immersion, having driven the Hill Country wine trail, trekked the Guadalupe Mountains, and explored Berlin’s museum
    islands, while dreaming of a future pilgrimage to the ancient ruins of Machu Picchu.
  culinary: An experimental home cook, Yesenia Quintero masterfully prepares chiles rellenos, carnitas, and homemade guacamole, layering traditional spice blends with modern twists such as quinoa‑infused
    tacos, and frequently hosts dinner parties where they pair dishes with craft cerveza and a curated indie playlist.
  core: Yesenia Quintero is a methodical creative who juggles art, community planning, and a relentless curiosity, often losing sleep over perfecting a sketch while secretly hoarding a stash of late‑night
    snack chips.
background:
  cultural: Yesenia is of Mexican descent, raised in a bilingual Spanish‑English household where family traditions such as Día de los Muertos, quinceañeras, and weekly home‑cooked meals were central. Growing
    up in New Braunfels, Texas, she also experiences the city’s German heritage and Tex‑Mex influences, blending these cultures in her daily life. Her identity is rooted in Mexican values of community,
    respect for elders, and vibrant artistic expression, while she embraces the multicultural environment of the Texas Hill Country, often incorporating both Mexican and local Texan elements into her cooking,
    art, and social interactions.
