  hobbies: '[''Sketching'', ''Photography'', ''Cooking traditional Mexican dishes'', ''Attending art exhibitions'', ''Reading art history and philosophy'', ''Hiking Hill Country trails'', ''Volunteering
    at community festivals'', ''Maintaining a cultural blog'', ''Learning basic German'']'
  career_goals: Yesenia aims to earn her GED and pursue an associate degree in Business Administration or Visual Arts at a community college. She seeks a career that blends her organizational talent with
    her artistic curiosity, such as becoming a community arts program coordinator, a cultural liaison, or a social media manager for a local nonprofit arts organization. Long‑term, she dreams of opening
    a boutique that sells handcrafted Mexican‑inspired goods and offers workshops that celebrate her heritage while incorporating contemporary art and design.
