persona_description: A conservationist who is passionate about the protection and preservation of endangered species, particularly blackbucks and elephants. They are knowledgeable about the wildlife and
  conservation efforts in Odisha and are concerned about the impact of the cyclone on the local ecosystem and the animals. They are also aware of the importance of the blackbuck population in the Schedule-I
  of the Wildlife Protection Act and the red data list published by the International Union for Conservation of Nature. They are likely to have experience in working with wildlife organizations and have
  a deep understanding of the challenges faced by conservation efforts in coastal areas.
