  hobbies: '[''Hosting Themed Potluck Dinners'', ''Karaoke Night Participation'', ''Group Fitness Class Leadership'', ''DIY Home Repair Workshops'', ''Gardening'', ''Yoga Practice'', ''Evening Running'',
    ''Volunteering at Community Health Fairs'']'
  career_goals: Delia aims to obtain a Certified Medical Manager (CMM) credential within the next two years and eventually enroll in an associate’s program in health administration. Her long‑term ambition
    is to become the clinic director of a community health center in Barry County, where she can lead initiatives that improve access to care for underserved residents. She is especially interested in developing
    tele‑health services and streamlined intake processes that blend her curiosity for new technologies with the practical needs of her rural community. Additionally, she hopes to mentor younger employees,
    fostering a supportive workplace that balances compassion with efficiency. Recognizing her tendency toward stress, she plans to incorporate wellness leadership training into her career development to
    model healthy work habits for her team.
