persona_description: A research scientist specializing in the development of robotic systems for TIG welding. They have conducted research in conjunction with Liverpool University and have designed and
  developed three robotic systems, including a single-axis microcomputer-controlled machine and two robots with three and five degrees of freedom, respectively. They have used a high-level language for
  software development, emphasizing the use of subroutines written in assembly language for faster response. They have also developed a path entry technique that uses point-to-point entry for simpler machines
  and continuous path interpolation for more sophisticated machines, allowing for smooth curve reproduction.
