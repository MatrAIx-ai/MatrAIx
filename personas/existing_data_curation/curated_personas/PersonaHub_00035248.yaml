persona_description: A biochemist specializing in the study of viral replication and protein synthesis, particularly the capsid structure, viral DNA replication, and the function of viral proteins in cell
  infection. She is knowledgeable in the early and late gene promoters, the timing of gene expression, and the assembly and maturation of viral particles. Her expertise includes understanding the role of
  lipopolysaccharides in viral attachment and the process of viral DNA injection into host cells. She is also skilled in the use of RNA polymerase and the conversion of viral replication proteins into procapsids
  for assembly and maturation of mature virions.
