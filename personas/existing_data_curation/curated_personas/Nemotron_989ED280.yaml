  hobbies: '[''Experimenting with fusion recipes'', ''Hiking the Sandia Mountains'', ''Reading food history and sustainability literature'', ''Practicing Vietnamese language and cultural activities'', ''Volunteering
    at local food banks'', ''Gardening native herbs and chilies'']'
  career_goals: At 40, Joven aims to step into a regional operations manager role within a multi‑unit restaurant group, where he can drive strategic growth across locations while championing sustainable
    sourcing and inclusive workplace culture. Long‑term, he envisions opening his own boutique eatery that marries his Vietnamese heritage with New Mexican culinary traditions, creating a community hub
    that showcases fusion cuisine, supports local producers, and offers apprenticeship opportunities for aspiring hospitality professionals.
