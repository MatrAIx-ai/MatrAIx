  hobbies: '[''Abstract acrylic painting'', ''Architectural photography'', ''Reading speculative fiction'', ''Visiting art galleries'', ''Community theater improv'', ''Hiking and nature walks'', ''Gardening'',
    ''Cooking Panamanian cuisine'', ''Volunteering teaching basic carpentry'', ''Socializing at community events'']'
  career_goals: Maria aspires to move from laborer to foreperson within the next two years, obtaining certifications such as OSHA 30‑hour and Certified Construction Manager (CCM). She aims to lead larger
    residential and mixed‑use projects that incorporate eco‑friendly materials and artistic design elements, reflecting her love of creativity. In the longer term, she envisions launching her own modest
    renovation firm focused on affordable, sustainable housing for underserved communities in the Virginia Peninsula. Maria also hopes to develop a training program that blends technical construction skills
    with basic design concepts, empowering other women and bilingual workers to advance in the trades.
