    practices'', ''Business process analysis'', ''Vendor management & contract negotiation'', ''Budget tracking & cost optimization'', ''Data analysis & reporting in Excel'', ''Project coordination & cross-functional
    communication'', ''Time management & workflow optimization'', ''Training & onboarding of new support staff'', ''Risk assessment & mitigation'']'
  hobbies: '[''Abstract painting'', ''Digital illustration'', ''Visiting contemporary art exhibitions'', ''Reading speculative fiction'', ''Philosophy book discussions'', ''Puzzle solving (sudoku, crosswords)'',
    ''Yoga and mindfulness meditation'', ''Salsa dancing'', ''Raspberry Pi tinkering'', ''Virtual-reality exploration'', ''Volunteering for community tech workshops'']'
  career_goals: Beatriz aims to advance from a front-line support role to a senior IT service manager where she can shape support strategy and lead a multidisciplinary team. She plans to earn ITIL Expert
    and PMP certifications within the next two years, and to spearhead the adoption of AI-driven ticket triage and self-service portals that reduce resolution times while maintaining high customer satisfaction.
    Her business background drives her ambition to align technology services with organizational objectives, improve cost efficiency, and champion initiatives that promote employee well-being and resilience.
    Ultimately, she envisions a leadership position that balances operational excellence with innovative, user-centric solutions.
