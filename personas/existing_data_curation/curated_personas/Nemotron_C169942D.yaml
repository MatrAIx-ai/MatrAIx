personas:
  professional: Beatriz Munozramos, a computer support specialist with a business degree, combines meticulous organizational skills and a vivid imagination to diagnose cross-platform hardware, software,
    and networking issues, author clear knowledge-base articles, and drive ITIL-aligned process improvements while targeting senior IT service manager roles.
  sports: Beatriz Munozramos, who enjoys blending cardio with rhythm, frequently attends community salsa nights for fitness, participates in a weekend recreational badminton league at the City Sports Center,
    roots for the Chicago Cubs during baseball season and follows the Golden State Warriors in the NBA, and keeps a habit of Thursday evening yoga sessions to maintain flexibility.
  arts: Beatriz Munozramos, an avid creator, spends evenings painting abstract acrylics inspired by the surrealism of Joan Miró, follows digital illustrators like Loish, collects limited-edition prints
    by Banksy, and draws inspiration from the avant-garde scores of Björk and the cinematic storytelling of Guillermo Del Toro.
  travel: Beatriz Munozramos prefers immersive culture-focused trips, having explored the historic streets of Barcelona, the contemporary art scene in Berlin, and the tropical ecosystems of Costa Rica,
    while planning a future solo adventure to Kyoto’s temples and the vibrant street art districts of Medellín, balancing careful itinerary planning with spontaneous VR-guided previews.
  culinary: Beatriz Munozramos enjoys experimenting in the kitchen at an intermediate skill level, often preparing homemade ramen with miso broth, avocado toast topped with smoked salmon, and spicy enchiladas
    verde, while savoring coffee brewed with Ethiopian single-origin beans and treating themselves to craft espresso martinis on weekends.
  core: Beatriz Munozramos fuses analytical rigor with artistic wanderlust, turning stress into structured meditation breaks, channeling curiosity into both tech puzzles and paint splatters, occasionally
    over-indulging in impulsive gadget purchases while meticulously tracking every other aspect of life.
background:
  cultural: Beatriz grew up in a bilingual household where Spanish and English were spoken interchangeably, immersing her in Puerto Rican traditions while navigating life in the United States. Family gatherings
    filled with music such as bomba, plena, and salsa, as well as dishes like mofongo and arroz con gandules, instilled a strong sense of community and cultural pride. Living in New York City, she actively
    participates in the annual Puerto Rican Day Parade and supports local Latinx cultural organizations, which reinforce her identity and social responsibility. Her cultural background informs her communication
    style - warm, expressive, and relationship-focused - and fuels her desire to mentor other young Puerto Rican professionals entering the tech field.
attributes:
  skills: '[''Technical troubleshooting'', ''Hardware & software diagnostics'', ''Windows, macOS, and Linux support'', ''Network configuration & troubleshooting'', ''Help desk ticket management (ServiceNow)'',
