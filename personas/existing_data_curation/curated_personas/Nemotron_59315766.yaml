  career_goals: Gerald dreams of turning his love for art and technology into a career as a video game designer or interactive media developer, where he can craft immersive stories and visually striking
    worlds. He also envisions studying computer science or graphic design in college, eventually creating his own indie game studio or joining a larger studio as a concept artist. Occasionally, he imagines
    working as a museum curator for digital exhibits, merging his appreciation for art with cutting‑edge tech. His ambition is driven by a desire to innovate, compete, and have his personal creative vision
    recognized.
