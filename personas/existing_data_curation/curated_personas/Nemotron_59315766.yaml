personas:
  professional: A budding robotics enthusiast, Gerald Havard channels their strategic mindset from chess‑style esports and debate into designing and programming LEGO Mindstorms robots for school competitions,
    and they envision a future as a junior software developer.
  sports: An energetic after‑school athlete, Gerald Havard follows the hometown professional basketball team the Raptors, occasionally joins friends for weekend skateboarding sessions at the local skate
    park, and they also enjoy watching the national soccer league while maintaining a competitive edge in school’s chess‑style esports tournaments.
  arts: Gerald Havard immerses themselves in visual storytelling by sketching cyber‑futuristic comic strips, attending museum workshops where they study Moebius’s line work and Neil Gaiman’s narrative techniques,
    and they often listen to Vangelis’ ambient soundtracks while digital painting on a graphic tablet.
  travel: An adventurous planner, Gerald Havard has visited Washington, D.C.’s National Museum of Natural History, dreams of exploring Tokyo’s Akihabara district for manga culture, and they meticulously
    map future trips using interactive apps while respecting the family budget and school calendar.
  culinary: Gerald Havard’s culinary preferences favor pepperoni pizza with extra cheese, spicy ramen bowls adorned with chili oil, and occasional attempts at baking chocolate chip cookies, yet they frequently
    succumb to late‑night gaming cravings for sugary cereal straight from the pantry.
  core: Gerald Havard is a curious, competitively‑driven teen who blends artistic imagination, strategic gaming, and robotics ingenuity, and they approach life with a uniquely disciplined yet sometimes
    impulsive outlook.
background:
  cultural: Gerald is a white American teenager raised in Commerce Township, Michigan, a suburban community within Oakland County. His upbringing reflects typical Midwestern values of independence, self‑reliance,
    and community involvement. He attends a public middle school where he is exposed to a diverse student body and participates in local cultural events such as county fairs and museum programs. His family
    heritage includes European ancestry (primarily Anglo‑American and some Scandinavian roots), which influences family traditions and holiday celebrations. While rooted in the American mainstream, Gerald
    benefits from the region's strong emphasis on education, extracurricular enrichment, and opportunities to explore both artistic and technological pursuits.
