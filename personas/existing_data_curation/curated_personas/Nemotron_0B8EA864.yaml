personas:
  professional: John Williams, a budding young engineer, merges a keen curiosity for space‑shuttle LEGO builds with early Scratch programming to craft interactive stories, leveraging a practical eye for
    detail while their anxiety often prompts double‑checking every block and code line before sharing their creations.
  sports: John Williams plays soccer every Saturday with the local 'Eagle Rangers' youth league, eagerly cheering for the New York Yankees in baseball and the Los Angeles Lakers in basketball, balancing
    active drills with a cautious approach born from occasional anxiety about performance.
  arts: John Williams channels creative energy into drawing comic strips inspired by Bill Watterson's Calvin and Hobbes and Marvel's Spider‑Man while listening to classical piano pieces by Beethoven and
    acoustic guitar tunes by Andy McKee, often pairing art sessions with revisiting adventure novels like Journey to the Center of the Earth.
  travel: John Williams loves family road trips to nearby state parks for rock hunting, recalls an unforgettable visit to the Kennedy Space Center where the space‑shuttle exhibits sparked LEGO building
    ideas, and dreams of traveling to the LEGO House in Billund, Denmark, while balancing a modest travel budget set by parents.
  culinary: John Williams enjoys assembling homemade pepperoni pizza with crisp mozzarella, whipping up spaghetti with meatballs seasoned with garlic and basil, and crafting buttery peanut‑butter‑jelly
    sandwiches topped with sliced bananas, often experimenting with strawberry‑banana smoothies for a sweet snack.
  core: John Williams blends meticulous LEGO engineering with vivid imagination, yet wrestles with frequent anxiety that turns routine tasks into overly‑controlled rituals.
background:
  cultural: John is a white American child growing up in Oswego, a suburban community in Will County, Illinois. His family embraces typical Midwestern values such as community involvement, modesty, and
    a strong work ethic. Local traditions like Thanksgiving gatherings, Fourth of July barbecues, and participation in school and community events shape his cultural experience. The area’s mix of small‑town
    friendliness and proximity to larger cities provides access to libraries, parks, and youth programs, encouraging both academic achievement and practical skill development. This cultural setting supports
    John’s balanced approach to curiosity, organization, social interaction, and emotional expression.
