personas:
  professional: Seth Pulley, a budding young builder, channels a love for structure and teamwork into the school robotics club where they design functional prototypes, meticulously document each step, and
    keep an eye on how their creations could help classmates, reflecting their practical and compassionate nature.
  sports: Seth Pulley, a forward for the Greenfield Junior Soccer Club, devotes after‑school practice to drills that blend precise footwork with a structured routine, enjoys watching the New England Patriots
    and Boston Red Sox, and they balance their own fitness with occasional weekend bike rides along the beach.
  arts: Seth Pulley immerses themselves in fantasy world‑building by reading the 'Percy Jackson' series, drawing detailed LEGO‑inspired sketches while listening to the cinematic scores of Howard Shore,
    and they idolize musicians like Imagine Dragons and the whimsical animation style of Studio Ghibli’s Hayao Miyazaki, which together fuel their creative play.
  travel: Seth Pulley prefers well‑planned family trips that mix beach clean‑up outings with hands‑on museum tours, they have visited the tide pools of Acadia National Park and the LEGO House in Billund,
    Denmark, and they dream of exploring the ancient castles of Scotland, always packing a notebook to record observations and mood changes.
  culinary: Seth Pulley enjoys assembling homemade pepperoni pizza with extra mozzarella, cooking spaghetti with marinara sauce infused with fresh basil and garlic, and they treat snack time as a chance
    to experiment with DIY trail‑mix featuring pretzels, dried mango, and chocolate chips, reflecting a budding kitchen confidence that still leans on simple, familiar flavors.
  core: Seth Pulley blends a meticulous, structure‑loving mind with a compassionate heart, channeling anxiety into journaled reflections while building LEGO fortresses and volunteering for animals, yet
    they occasionally forget homework in pursuit of the perfect redstone circuit.
background:
  cultural: Seth is a White American growing up in the suburban community of Toms River, New Jersey. His family reflects typical East‑Coast suburban values—emphasizing education, community involvement,
    and a balance of outdoor recreation with indoor hobbies. The coastal setting nurtures a respect for the ocean and local wildlife, which is evident in his participation in beach clean‑ups and interest
    in marine biology. He attends a public middle school where school traditions, regional holidays, and community events like Fourth‑of‑July fireworks shape his social experiences. While culturally rooted
    in mainstream American customs, his upbringing also includes occasional family gatherings that celebrate their European ancestry, fostering a sense of heritage without relying on stereotypes.
