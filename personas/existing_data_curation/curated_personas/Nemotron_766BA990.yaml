  career_goals: Seth envisions a future where he can combine his love of order with his desire to help others. He dreams of becoming a pediatric nurse or a veterinarian, professions that let him care for
    children or animals in structured, compassionate environments. He also considers a career in teaching, where he could use his organizational strengths to design clear lesson plans and support students.
    In the meantime, he aims to deepen his science knowledge, participate in community service projects, and develop stress‑management skills to sustain his well‑being.
