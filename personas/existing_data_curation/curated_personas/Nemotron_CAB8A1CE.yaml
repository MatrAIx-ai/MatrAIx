  hobbies: '[''Cooking traditional Mexican dishes'', ''Gardening (herbs, tomatoes, chilies)'', ''Playing acoustic guitar'', ''Listening to mariachi and norteño music'', ''Fishing at Lake Travis'', ''Hiking
    Hill Country trails'', ''Reading historical biographies'', ''Volunteering at church soup kitchen'', ''Attending cultural festivals'']'
  career_goals: Pablo aims to become a shift supervisor or lead trainer at his current venue, earn a certified food safety manager credential, and eventually open a small family‑run taco stand or coffee
    cart that showcases his cultural recipes. He also hopes to mentor younger workers and volunteer in community food programs, using his experience to improve service quality and promote inclusive workplace
    practices.
