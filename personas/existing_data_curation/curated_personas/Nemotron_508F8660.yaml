personas:
  professional: Kenneth Serranodiaz is a methodical automotive service technician renowned for precise engine diagnostics, a growing expertise in hybrid and electric vehicle repair, and a talent for clear
    customer communication that he leverages while mentoring junior mechanics toward ASE L5 mastery.
  sports: Kenneth Serranodiaz is an avid surfer at Pacific Beach who joins the local Pacific Beach Surfers club for early‑morning rides, hikes the Torrey Pines coastal trails on weekends, roots for the
    San Diego Padres and Wave FC, and fits in bi‑weekly strength sessions at a CrossFit box to keep their back strong for automotive work.
  arts: Kenneth Serranodiaz unwinds by strumming acoustic versions of John Mayer and Paco de Lucía on a vintage Fender guitar while cooking, streams classic car documentaries and binge‑watches Quentin Tarantino’s
    'Pulp Fiction' for its kinetic soundtrack, and frequents the San Diego Museum of Art to admire works by Georgia O'Keeffe.
  travel: Kenneth Serranodiaz prefers well‑planned road trips that blend surf and classic‑car culture, having spent a weekend chasing waves in Tamarindo, Costa Rica and a nostalgic visit to England's Goodwood
    Revival, while day‑dreaming about a future electric‑car road tour through Norway’s fjords, balancing family time and modest savings.
  culinary: Kenneth Serranodiaz is a competent home chef who delights in Mediterranean‑inspired dishes like grilled branzino with lemon‑oregano vinaigrette, homemade tabbouleh, and chickpea falafel, often
    preparing them while strumming guitar and pairing the meals with a crisp rosé or an aged red wine.
  core: Kenneth Serranodiaz blends a methodical work ethic with surf‑side solitude, a love for classic cars and acoustic guitar, and a pragmatic yet curious mindset that keeps them constantly tinkering,
    learning, and planning their next revamp.
background:
  cultural: Kenneth is a second‑generation white American raised in San Diego. His upbringing combined the region's strong car culture with a deep appreciation for outdoor recreation and a multicultural
    community. Family values emphasized hard work, practical problem‑solving, and community involvement, shaping his organized and reliable character. Living in a diverse coastal city, he embraces the local
    blend of traditions—enjoying Mexican cuisine, participating in neighborhood festivals, and staying attuned to the innovative tech environment that influences his professional growth.
attributes:
  skills: '["Engine diagnostics", "Hybrid and electric vehicle repair", "Brake system maintenance", "Transmission rebuilding", "HVAC system servicing", "Electrical wiring troubleshooting", "Parts inventory
    management", "Shop workflow optimization", "Customer communication", "Mentoring apprentices"]'
  hobbies: '["Surfing", "Hiking", "Classic car restoration", "Attending car meets", "Acoustic guitar playing", "Cooking Mediterranean cuisine", "Woodworking", "Reading automotive magazines", "Listening
    to tech podcasts"]'
  career_goals: Kenneth aims to achieve Master Technician (ASE L5) certification within the next two years and obtain a specialized EV service certification from a major manufacturer. He envisions progressing
    to a lead‑technician or service‑manager role where he can shape shop processes and mentor a larger team. Long‑term, he plans to open a boutique auto shop focused on eco‑friendly vehicle maintenance
    and a small apprenticeship program that blends hands‑on training with emerging automotive technologies. He also hopes to develop a mobile diagnostics service to serve local car owners who prefer on‑site
    assistance.
