personas:
  professional: Brooke Tufano, an aspiring art‑therapy student, leverages their meticulous organizational skills and compassionate, introspective nature to design community art workshops that blend watercolor
    techniques with therapeutic journaling for at‑risk teens.
  sports: Brooke Tufano channels a love for early‑morning hikes into regular runs with the Spring Lake Trailblazers Hiking Club, follows the Cleveland Guardians for spring baseball, supports the Cleveland
    Browns in the fall, and incorporates gentle yoga sessions at home to balance a generally sedentary artistic routine.
  arts: Brooke Tufano finds inspiration in the pastel landscapes of Claude Monet, the lyrical storytelling of Haruki Murakami, the moody songwriting of Bon Iver, and the experimental theater of Lin‑Manuel
    Miranda, often blending watercolor sketches with verses from their favorite poetry collections while curating playlists that include Sufjan Stevens and Lucy Dacus during creative marathons.
  travel: Brooke Tufano prefers low‑key, nature‑focused trips, planning each outing in a handwritten notebook; they have explored the verdant trails of the Great Smoky Mountains, spent a weekend photographing
    sunrise at Lake Bled in Slovenia, and dream of a spring backpacking adventure through the Japanese Alps, all while balancing a modest teen budget and relying on school‑organized volunteer exchanges
    for affordable travel.
  culinary: Brooke Tufano enjoys baking simple lemon‑shortbread cookies and experimenting with matcha‑infused scones, favors farm‑to‑table salads featuring heirloom tomatoes, fresh basil, and goat cheese,
    and approaches dining as a sensory study, often sketching restaurant plates before savoring the flavors of artisanal ramen or grilled salmon with miso glaze.
  core: Brooke Tufano is a meticulously organized, quietly compassionate teen whose sketchbook doubles as a therapy journal, whose worry about perfection fuels both artistic brilliance and occasional overthinking,
    and whose habit of humming indie melodies while baking fuels a serene, introspective rhythm to daily life.
background:
  cultural: Brooke was raised in Spring Lake, a close‑knit town in Harnett County, North Carolina, within a predominantly white, Southern‑rural community. Her family’s cultural roots trace back to European
    (primarily Irish and Italian) ancestry, and they value modesty, hospitality, and strong community ties. Growing up, she experienced a blend of traditional Southern customs—such as attending local fairs,
    church gatherings, and high school sports events—and exposure to the broader Appalachian folk art tradition, which sparked her early interest in drawing and storytelling. While the town’s pace is quiet,
    Brooke’s curiosity pushes her to seek diverse ideas through online art forums, indie music scenes, and occasional trips to larger cultural hubs like Raleigh, enriching her worldview while staying grounded
    in her hometown’s supportive, collaborative spirit.
attributes:
  skills: '[''sketching'', ''watercolor painting'', ''digital illustration basics'', ''photography composition'', ''research and information synthesis'', ''event planning for small groups'', ''time management'',
