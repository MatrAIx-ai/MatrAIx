  hobbies: '[''sketching and watercolor painting'', ''nature photography'', ''creative writing and journaling'', ''reading contemporary literature'', ''listening to indie and alternative music'', ''baking
    and recipe experimentation'', ''DIY crafts and jewelry making'', ''volunteering at the local animal shelter'', ''hiking and nature walks'', ''participating in community art events'']'
  career_goals: Brooke aims to earn her GED within the next year and then enroll in a community college program that blends graphic design with art therapy. She envisions a career where she can use her
    artistic talents to help others, especially at‑risk teens, by facilitating therapeutic art workshops in community centers or schools. In the short term, she hopes to build a portfolio of her artwork,
    secure a mentorship with a local artist, and volunteer part‑time at the county’s youth outreach program. Long‑term, she dreams of becoming a certified art therapist or community arts coordinator, creating
    safe, creative spaces that promote mental well‑being and personal expression.
