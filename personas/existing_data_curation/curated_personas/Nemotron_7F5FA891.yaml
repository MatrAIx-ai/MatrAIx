personas:
  professional: David Jeffcoat, a 36‑year‑old stationary engineer in San Diego, merges deep expertise in steam‑boiler operation, SCADA monitoring, basic PLC programming, and MIG/TIG welding with a relaxed,
    improvisational work style that lets them lead small maintenance crews, champion energy‑efficiency upgrades, and still carve out time for surf sessions and community clean‑ups.
  sports: David Jeffcoat spends weekends surfing at La Jolla Cove, dominating beach volleyball matches with the neighborhood crew, tackling hikes on the Torrey Pines and Mission Trails with the San Diego
    Hiking Club, cheering for the Padres, and they regularly play in a local recreational soccer league that meets on Saturdays.
  arts: David Jeffcoat captures coastal wildlife with his DSLR, draws creative inspiration from Ansel Adams and Jack Johnson, attends monthly live shows at Belly Up and local surf‑culture art fairs, and
    they keep a growing collection of vintage surf‑board prints that adorn their garage studio.
  travel: David Jeffcoat prefers spontaneous road trips along the Pacific Coast, has explored Baja California’s surf spots, Iceland’s geothermal sites, and New Zealand’s fjords, and they aim to blend work
    and leisure by planning future visits to solar farms in Spain while balancing limited vacation days and family commitments.
  culinary: David Jeffcoat cooks grilled fish tacos with fresh cilantro, lime, and avocado, experiments with home‑brewed IPAs using Pacific Northwest hops, occasionally whips up clam chowder, and they favor
    improvisation over strict recipes, often cooking while the surf soundtrack plays in the background.
  core: David Jeffcoat is a curious, laid‑back boiler engineer who alternates between surf sessions and sustainable plant upgrades, often juggling disorganized finances, a love for spontaneous adventure,
    and a strong sense of community.
background:
  cultural: David grew up in a middle‑class Anglo‑American family in suburban San Diego, absorbing mainstream American values of self‑reliance, hard work, and community involvement. The coastal lifestyle
    of La Jolla shaped his love for outdoor recreation, environmental stewardship, and a relaxed, health‑focused mindset. Though his family maintains traditional celebrations like Thanksgiving and Fourth
    of July parades, he was also exposed to San Diego's multicultural environment, fostering an openness to diverse perspectives. His cultural identity blends traditional Western European heritage with
    the laid‑back, sustainability‑aware ethos of Southern California, influencing both his professional outlook and personal pursuits.
attributes:
  skills: '[''Boiler operation'', ''Hot water system maintenance'', ''Pressure vessel safety inspection'', ''Preventive maintenance planning'', ''Technical troubleshooting'', ''Instrumentation and control
    (SCADA)'', ''Basic PLC programming'', ''Hydraulic & pneumatic systems'', ''MIG/TIG welding'', ''OSHA compliance and safety audits'', ''Mechanical drawings interpretation'', ''Team leadership'', ''Problem
    solving'', ''Adaptability & improvisation'']'
  hobbies: '[''Surfing'', ''Beach volleyball'', ''Group hiking'', ''DIY mechanical projects'', ''Model steam engine building'', ''Home brewing'', ''Cooking with friends'', ''Community beach clean-ups'',
    ''Amateur photography'', ''Tech meetup participation'']'
  career_goals: David aims to advance from his current operator role to a senior plant engineer position, eventually becoming a facilities manager responsible for a multi‑building campus in the San Diego
    area. He plans to earn the Certified Plant Engineer (CPE) credential and to lead sustainability initiatives that integrate heat‑recovery, solar thermal, and other renewable technologies into existing
    plant operations. While pursuing leadership, he wants to maintain a flexible schedule that protects time for his family and personal interests, seeking a role that balances strategic oversight with
    hands‑on technical involvement.
