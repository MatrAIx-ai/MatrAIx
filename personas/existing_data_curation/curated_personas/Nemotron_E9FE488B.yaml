  career_goals: Although retired, Maria aims to leave a lasting legacy for her grandchildren and the Decherd community. She plans to compile a family cookbook that blends cherished recipes with the stories
    behind each dish, creating a tangible cultural record. Maria hopes to mentor younger neighbors in gardening and quilting, offering workshops at the local senior center. She also aspires to record oral
    histories of longtime residents, preserving the region's heritage for future generations. Maintaining her health and managing stress are personal priorities, so she intends to incorporate gentle yoga
    and mindfulness practices into her daily routine while staying active through weekly walks and community dances.
