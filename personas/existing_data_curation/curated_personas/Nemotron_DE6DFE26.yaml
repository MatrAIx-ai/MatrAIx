  career_goals: In retirement, Bernard’s primary goal is to stay active and give back to his community. He aims to lead a neighborhood gardening program, mentor volunteers at the local senior center, and
    help preserve Avon Park’s oral histories. He also hopes to improve his digital fluency by learning smartphone photography and video editing to share family memories, and to maintain his health through
    regular walking and low‑impact exercise.
