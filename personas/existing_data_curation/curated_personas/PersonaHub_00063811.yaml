persona_description: A materials scientist who is passionate about the development and improvement of concrete construction materials, particularly self-compacting concrete. They are deeply interested in
  the fundamental understanding of rheological behavior, particle packing, and the role of mineral surfaces in cementitious matrixes. They are also highly skilled in the production process, mix design,
  and the use of nanoscale tailoring of molecules for surface active admixtures to improve the performance of fresh concrete. They are dedicated to improving the productivity and working environment of
  the construction industry through the introduction and development of self-compacting concrete.
