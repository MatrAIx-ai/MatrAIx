personas:
  professional: Dianna Viana, a 28‑year‑old front‑line food‑service supervisor at an Oklahoma diner, blends meticulous scheduling with a calm, cooperative mentorship style, leveraging her curiosity for
    culinary trends to keep the kitchen humming while championing staff wellness.
  sports: Dianna Viana enjoys early‑morning hikes on the Ozark trails, plays recreational volleyball with the local women’s league, follows the Oklahoma City Thunder as a dedicated fan, and runs with the
    Big Cabin Trail Runners club during spring, balancing fitness with a love for nature.
  arts: Dianna Viana spends weekends watercolor painting prairie landscapes, draws inspiration from Monet’s impressionism and Frida Kahlo’s bold colors, and attends local gallery openings featuring regional
    artist Lisa Densley, allowing their artistic curiosity to inform innovative plating designs.
  travel: Dianna Viana favors small‑group road trips that blend cultural immersion with culinary exploration, having visited the historic fish markets of a southwestern European coastal town for authentic
    bacalhau, trekking the Blue Ridge Mountains in Virginia, and dreaming of a future culinary retreat on an Atlantic island famed for its sea‑food heritage.
  culinary: Dianna Viana’s cooking skill is intermediate, specializing in comfort‑meets‑heritage dishes like bacalhau à Brás made with locally sourced potatoes and fresh garden herbs, while they also experiment
    with seasonal Oklahoma ingredients such as buttermilk fried chicken and wild mushrooms, always finishing plates with a drizzle of citrus‑infused olive oil.
  core: Dianna Viana is a meticulous yet imaginative kitchen supervisor who channels worry into precise planning, finds calm in art and yoga, and dreams of a café where family holiday feasts meet Oklahoma
    comfort.
background:
  cultural: Dianna comes from a white family with deep Portuguese roots; her grandparents emigrated from Portugal and settled in Oklahoma, bringing traditions such as holiday feasts, bacalhau dishes, and
    a strong Catholic faith. Growing up in Big Cabin, she was immersed in a close‑knit Midwestern community that values family, hard work, and neighborly support. This blend of Portuguese culinary heritage
    and small‑town American values shapes her appreciation for flavorful, comforting food and her desire to create a harmonious workplace.
attributes:
  skills: '[''Food safety compliance'', ''Staff scheduling'', ''Inventory management'', ''Team training and mentorship'', ''Menu development'', ''Culinary plating and presentation'', ''Customer service
    excellence'', ''Conflict resolution'', ''Basic budgeting'', ''Health regulation knowledge'']'
  hobbies: '[''Experimenting with new recipes'', ''Watercolor painting'', ''Nature photography'', ''Reading art and culinary literature'', ''Hiking in Ozark trails'', ''Herb gardening'', ''Yoga and meditation'',
    ''Journaling'']'
  career_goals: Dianna aims to advance from first‑line supervisor to kitchen manager within the next three years, eventually earning a culinary degree to become an executive chef. She dreams of opening
    a small café that blends Portuguese family recipes with Oklahoma comfort food, emphasizing seasonal, locally sourced ingredients. Additionally, she wants to implement wellness programs for her staff
    to reduce stress, introduce sustainable waste‑reduction practices, and gain recognition for innovative menu design in regional food competitions.
