persona_description: An environmental educator who is passionate about connecting children with their surroundings and the importance of environmental education in K-12 curriculum. They are dedicated to
  bridging the gap between Michigan's K-12 curriculum and environmental education strategies, and believe that environmental education should begin with children having an understanding of their surroundings.
  They are also interested in the importance of public environmental education and are involved in efforts to advance environmental education through partnerships with non-profits, conservation and outdoors
  groups, colleges, trade organizations, and faith-based communities.
