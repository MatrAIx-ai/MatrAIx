  hobbies: '[''desert gardening'', ''birdwatching'', ''reading historical non-fiction'', ''bridge card games'', ''walking on nature trails'', ''watching classic movies'', ''listening to big-band and jazz
    music'', ''volunteering at senior center'', ''church outreach activities'']'
  career_goals: Although retired, Peter is focused on staying active and useful. His primary goals are to maintain his health and independence, keep his home safe and well‑maintained, and continue contributing
    to the local senior center by coordinating activity schedules and offering workshops on basic home repairs. He aspires to write a short memoir capturing his experiences from the Midwest to the Southwest,
    and to learn enough tablet skills to share family photos digitally. Peter also hopes to advocate for senior-friendly community improvements within the Surprise city council meetings.
