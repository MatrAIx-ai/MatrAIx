  hobbies: '[''visiting art galleries'', ''attending community theater'', ''reading and book clubs'', ''genealogy research'', ''bird‑watching'', ''nature photography'', ''native‑plant gardening'', ''cooking
    Southwestern dishes'', ''volunteering at senior center'', ''historical walking tours'']'
  career_goals: Although retired from formal employment, Bridget aims to deepen her impact on Dove Creek by establishing a community‑wide oral‑history project that records the memories of longtime residents.
    She hopes to mentor younger volunteers, offering training in event coordination and fundraising, and to organize a quarterly art showcase that highlights local artists and craftspeople. Additionally,
    she wishes to broaden her own artistic knowledge by taking a weekend painting workshop and to travel to regional museums with her husband, enriching both her personal growth and cultural appreciation.
