  career_goals: Although still an infant, Ji already gravitates toward constructive activities. Watching his parents prepare meals sparks an early interest in cooking, while his love of building with blocks
    hints at a future in engineering or design. He aspires - through parental guidance - to become a dependable family member who can help with chores and, later, pursue a career that blends creativity
    with order, such as a culinary artist or structural engineer. He prefers roles that allow focused, solitary work over large team environments, aligning with his reserved nature.
