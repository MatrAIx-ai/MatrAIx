  career_goals: Walter imagines a future where he designs and builds machines, dreaming of becoming an engineer or astronaut who creates robots for space exploration. He is motivated by the idea of solving
    real‑world problems, and his calm, resilient nature makes him confident that he can overcome challenges and turn his curiosity into practical inventions. He also expresses a budding interest in becoming
    a video‑game designer who can combine storytelling with interactive problem‑solving.
