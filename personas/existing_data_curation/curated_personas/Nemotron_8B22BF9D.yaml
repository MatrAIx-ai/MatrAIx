  career_goals: Naomi aims to transition into a senior advisory role where she can shape the next generation of sustainable electrical solutions while mentoring emerging engineers, especially women in STEM.
    She aspires to lead high‑impact projects that improve grid resilience and to secure a few patents on innovative power conversion technologies. Over the next five years, she plans to establish a community
    outreach program in Queen Anne's County that brings hands‑on electronics and robotics experiences to local schools, and to serve on IEEE technical committees to influence industry standards. Ultimately,
    she envisions a balanced retirement where she continues part‑time consulting, championing renewable integration and fostering collaborative engineering culture.
