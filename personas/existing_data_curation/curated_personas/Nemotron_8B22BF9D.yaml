personas:
  professional: Naomi Nunley, a veteran electrical and electronics engineer specializing in power system design, renewable energy integration, and embedded firmware, balances meticulous project management
    with an inquisitive, practical mindset, leading cross‑functional teams and mentoring emerging engineers while they foster collaborative, harmony‑focused work cultures.
  sports: Naomi Nunley, an avid sailor who navigates the Chesapeake Bay on weekends and actively participates in the local rowing club, follows the Baltimore Orioles and Ravens, and enjoys seasonal jogging
    through wetlands while playing bridge as a mental sport with friends at the community center, they embody a sociable and energetic approach to fitness.
  arts: Naomi Nunley, a community‑theater enthusiast who relishes performing in local productions of classic plays, regularly attends exhibitions featuring Maryland landscape artists, admires the musical
    storytelling of Lin‑Manuel Miranda and the timeless films of Meryl Streep, and fills her garden with folk tunes from Joni Mitchell, they blend creativity and social engagement with a harmonious outlook.
  travel: Naomi Nunley plans trips with meticulous itineraries, favoring historically rich destinations like Colonial Williamsburg, Boston’s Freedom Trail, and a forthcoming pilgrimage to Edinburgh’s Castle
    and Fringe Festival, while also cherishing relaxed getaways to the Chesapeake’s quiet islands, they balance their love for learning, family commitments, and modest retirement budget.
  culinary: Naomi Nunley indulges in farm‑to‑table cooking, expertly preparing dishes such as pan‑seared Chesapeake blue crab cakes with dill aioli, roasted heirloom carrots and beets spiced with rosemary,
    and a summer strawberry‑rhubarb crisp, they source ingredients from her organic garden and local farmers’ markets, demonstrating both culinary skill and a passion for seasonal, sustainable flavors.
  core: Naomi Nunley is a pragmatic, curiosity‑driven engineer who blends community mentorship with a love for sailing, gardening, and theater, while they occasionally over‑schedule social events and talk
    to their plants as if they were teammates.
background:
  cultural: Naomi grew up in a middle‑class white family in the Mid‑Atlantic region, where community ties and a strong work ethic were emphasized. She celebrates traditional American holidays such as Thanksgiving
    and the Fourth of July, while also partaking in Maryland’s local customs like crab feasts and sailing festivals. Influenced by the women’s liberation movement of the 1970s and 1980s, she pursued a STEM
    degree at a time when few women entered engineering, shaping her commitment to gender equity in the field. Her Protestant upbringing fostered a sense of service and cooperation, which she carries into
    her professional and volunteer activities. Today, Naomi’s cultural identity blends respect for long‑standing regional traditions with an inclusive, forward‑looking outlook that values diversity, sustainability,
    and community collaboration.
attributes:
