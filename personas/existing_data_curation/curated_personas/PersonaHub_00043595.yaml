persona_description: A chemist with a background in organic chemistry and the synthesis of aromatics, particularly light aromatic compounds. They are interested in the development of new and sustainable
  routes for BTX production, with a focus on the use of metal-modified HZSM-5 zeolite catalysts. They are particularly interested in the involvement of intra-zeolite aromatic hydrocarbon species in the
  catalytic cycle during aromatization reactions. They are also interested in the impact of temperature and ethylene partial pressure on the aromatization process.
