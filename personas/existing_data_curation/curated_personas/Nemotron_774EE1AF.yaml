  hobbies: '[''Jogging and urban hiking'', ''Cooking traditional Honduran cuisine'', ''Reading non-fiction on leadership and tech'', ''Photography of cityscapes and cultural events'', ''Volunteering at
    community and cultural festivals'', ''Learning new languages (e.g., French)'']'
  career_goals: Cruz aims to secure a stable, impact‑driven role within a government agency or nonprofit organization in Washington, DC, focusing on program coordination or community outreach for immigrant
    and refugee services. He plans to enroll in a part‑time business administration program to earn an associate degree and eventually a bachelor's in public administration. His long‑term ambition is to
    become a senior program manager, leading initiatives that improve access to resources for the Honduran diaspora while leveraging his organizational skills to drive measurable outcomes.
