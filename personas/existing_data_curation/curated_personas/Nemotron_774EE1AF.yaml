personas:
  professional: Cruz Mora, a 27‑year‑old aspiring program coordinator, leverages meticulous Excel modeling, basic Python automation, and bilingual communication to streamline grant tracking and community
    outreach for immigrant services, while they channel their competitive drive and disciplined organization to exceed performance metrics and take leadership roles in cultural festival planning.
  sports: Cruz Mora, a dedicated jogger, hits the trails of Rock Creek Park five times a week, competes in the DC Road Runners weekly 5K challenge, occasionally plays pickup basketball with the Capitol
    Hill League, and they cheer for D.C. United as the go‑to soccer team on game nights.
  arts: Cruz Mora, an avid photographer, spends weekends capturing the city’s skyline and community events, follows the visual storytelling of Humans of New York and vibrant local street murals, curates
    an Instagram feed that blends urban architecture with candid portraits, and they regularly attend exhibitions at the Hirshhorn Museum featuring artists like Kehinde Wiley.
  travel: Cruz Mora, an organized explorer, plans trips with detailed Excel itineraries, prefers weekend getaways to Shenandoah National Park and historic Boston, dreams of a cultural immersion tour through
    Central America’s coffee regions, and they balance wanderlust with a part‑time graduate schedule by booking flights months in advance to secure the best rates.
  culinary: Cruz Mora, a home‑cook who cherishes family recipes, regularly prepares slow‑cooked pork stew, plantain‑based side dishes, and corn‑filled pupusas, experiments with spice blends while watching
    cooking tutorials, and they enjoy pairing meals with fresh tropical fruit salads.
  core: Cruz Mora blends disciplined organization with a competitive curiosity; they turn spreadsheets into impact‑driven programs while sprinting through city parks and simmering heritage recipes, all
    under a pragmatic yet adventurous 27‑year‑old outlook.
background:
  cultural: Cruz is a first‑generation Honduran American who grew up in a close‑knit immigrant neighborhood in Washington, DC. His family maintains strong ties to Honduran customs, celebrating holidays
    like La Feria de San Isidro and preparing dishes such as baleadas and pupusas. He values the work ethic and resilience emphasized in his community, often participating in local cultural gatherings and
    supporting fellow Honduran immigrants. While fully integrated into the multicultural fabric of the capital, he retains a deep appreciation for his heritage, which informs his worldview and motivates
    his desire to serve immigrant communities.
attributes:
  skills: '[''Bilingual communication (Spanish & English)'', ''Project planning and coordination'', ''Data analysis with Excel and Google Sheets'', ''Basic Python scripting'', ''Financial budgeting and
