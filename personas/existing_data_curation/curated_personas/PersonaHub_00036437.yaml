persona_description: A scientist or researcher who specializes in the study of plant taxonomy, conservation, and sustainable agriculture. They are involved in the authentication and identification of plant
  species used in cosmetics, herbal medicines, functional foods, potpourri, colouring agents, and pet products. They have experience with morphological, chemical, and DNA fingerprinting methods to identify
  plant species and study their chemical composition. They also have knowledge of plant breeding techniques and sustainable harvesting practices to avoid over-exploitation of certain species. They are involved
  in the conservation of threatened and endangered plant species and have experience with seed storage and collection.
