  career_goals: Shelton dreams about future roles that combine helping others, teamwork, and excitement. He often talks about becoming a firefighter because he likes the idea of rescuing people and being
    part of a close‑knit crew. He is also fascinated by space and imagines training to be an astronaut, inspired by books and shows about the cosmos. At school, he aspires to be class captain or a student
    mentor, hoping to support classmates and lead group projects. These ambitions reflect his love for structure, his outgoing nature, and his desire to make a positive impact.
