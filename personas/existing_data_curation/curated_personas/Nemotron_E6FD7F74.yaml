personas:
  professional: Shelton Martin is a future-focused junior astronaut-in-training who blends a love for structured space facts with a playful curiosity, using their knack for building LEGO rockets to sharpen
    problem-solving skills while staying socially engaged in group activities, and they eagerly share their latest models with classmates.
  sports: Shelton Martin plays in the Millburn Youth Soccer League, idolizes the New York Red Bulls, and trains with the local club Thunderhawks, bringing high energy and teamwork to every practice while
    they balance school responsibilities with a love for competition.
  arts: Shelton Martin delights in sketching superhero comics, choreographing dance moves to beats from Kendrick Lamar and Beyoncé, and enjoys watching animated space adventures, letting these artistic
    outlets shape a vibrant personal style that they proudly display at school talent shows.
  travel: Shelton Martin has explored the Liberty Science Center's planetarium in New Jersey and the American Museum of Natural History in New York City, and dreams of visiting Cape Canaveral and Houston's
    Space Center, planning each adventure with a detailed map and a list of must-see exhibits that they keep in a scrapbook.
  culinary: Shelton Martin loves digging into mac and cheese, fried chicken, and collard greens at family gatherings, occasionally helps stir the pot in the kitchen and enjoys an occasional candy bar after
    a soccer game, though they sometimes over-indulge on sugary snacks.
  core: Shelton Martin is a sociable, structure-loving 7-year-old whose boundless energy fuels a love for soccer, LEGO rockets, and space documentaries, yet they often forget to tidy up their creations,
    leading to a perpetually chaotic playroom.
background:
  cultural: Shelton is an African American boy raised in Millburn, New Jersey, a suburban town with a diverse community. His household embraces both Black cultural traditions and the local suburban lifestyle.
    He attends a nearby Black Baptist church where he joins youth events, celebrates holidays like Kwanzaa, and participates in community service projects. Family gatherings often feature soul food, storytelling,
    and music that ranges from classic R&B to contemporary hip‑hop, shaping his taste and cultural identity. He is also involved in a neighborhood soccer league that brings together kids from various backgrounds,
    reinforcing his appreciation for teamwork and community. Through school, he experiences inclusive curricula that highlight African American history and contributions, further grounding his sense of
    belonging and cultural pride.
