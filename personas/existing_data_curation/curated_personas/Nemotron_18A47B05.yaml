  hobbies: '[''Volleyball'', ''Dance classes'', ''Community volunteering'', ''Exploring Chicago neighborhoods'', ''Live music events'', ''Journaling'', ''Personal budgeting'', ''Cooking'']'
  career_goals: Anna aims to obtain an entry‑level role in operations or business analysis at a mid‑sized company where she can apply her routine‑focused, practical approach. Over the next three to five
    years she plans to earn professional certifications such as the CAPM or PMP and progress to a supervisory position overseeing process‑improvement projects. Ultimately, she hopes to launch a boutique
    consulting firm that helps local Chicago businesses streamline their operations and enhance customer relationships.
