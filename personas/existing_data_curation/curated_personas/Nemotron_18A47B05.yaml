personas:
  professional: Anna Elliott, an 18‑year‑old business graduate, leverages their routine‑driven mindset and strong interpersonal skills to coordinate campus club events, analyze financial data in Excel,
    and craft marketing strategies for student‑run ventures, positioning themselves for an entry‑level operations role.
  sports: Anna Elliott plays competitive weekend volleyball with the Lakeside League, follows the Chicago Bulls and Chicago Blackhawks, participates in a campus dance‑fitness club, balances high‑energy
    group workouts with occasional jogs along the Lakefront Trail, and they thrive on the camaraderie of team sports.
  arts: Anna Elliott attends live‑music shows at Chicago’s Metro, enjoys contemporary dance performances at the Auditorium Theatre, draws inspiration from artists like Chance the Rapper and indie band The
    War on Drugs, and they often share curated playlists with friends.
  travel: Anna Elliott loves exploring Chicago’s eclectic neighborhoods—like Wicker Park’s coffee scene and Pilsen’s murals—while planning future budget trips to New Orleans for its food and music culture
    and a spring weekend getaway to the Great Lakes region with a group of friends, and they aim to keep travel costs low by using public transit and shared accommodations.
  culinary: Anna Elliott cooks simple, reliable family meals such as chicken alfredo, roasted vegetable medley, and Chicago‑style deep‑dish pizza, favors ingredients like fresh basil, garlic, and mozzarella,
    and they enjoy testing new eateries ranging from ramen joints to vegan pop‑ups.
  core: Anna Elliott is an organized, sociable 18‑year‑old who blends routine‑driven business acumen with a love for group sports, live music, and budget‑friendly travel, and they occasionally let spontaneous
    cravings and minor health neglect slip through.
background:
  cultural: Anna was raised in a middle‑class, white family in suburban Cook County, embodying typical Midwestern American values of practicality, politeness, and community involvement. Her upbringing emphasized
    routine, hard work, and respect for tradition while also exposing her to Chicago's cultural diversity, shaping her outgoing and sociable nature. She identifies with a blend of Midwestern modesty and
    a modern, inclusive outlook that values both stability and social connection.
