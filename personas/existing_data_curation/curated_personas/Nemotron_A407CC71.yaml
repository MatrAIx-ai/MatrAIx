  hobbies: '[''Gardening'', ''Baking pies and traditional Midwestern cuisine'', ''Playing bridge and other card games'', ''Quilting and crocheting'', ''Community theater acting'', ''Genealogy research'',
    ''Local history tours'', ''Organizing senior center social events'', ''Volunteer work at local church'']'
  career_goals: Although retired from formal employment, Susan aims to expand her leadership role within the Marshfield Senior Center by becoming the lead volunteer coordinator, where she plans to develop
    intergenerational workshops on cooking, gardening, and storytelling. She also aspires to launch a community garden project that brings together neighbors of all ages, author a memoir that captures her
    life experiences and Midwestern heritage, and serve as a cultural ambassador for Wright County at the annual county fair.
