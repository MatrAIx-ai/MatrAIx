persona_description: A geologist who specializes in the study of rock formations, particularly the relationships between rock types and categories of objects carved into moulds. His research interests include,
  but are not limited to, the identification and dating of rock formations, the analysis of petrographic features, and the reconstruction of ancient manufacturing processes. He is experienced in the use
  of archaeological finds and petrographic analysis to provide information about skills, knowledge, and tools that could be involved in a manufacturing process.
