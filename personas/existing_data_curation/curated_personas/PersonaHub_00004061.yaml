persona_description: A digital policy analyst who is deeply concerned about the future of telecommunications and the role of the Universal Service Fund in ensuring that all Americans have access to a basic
  telephone line and the Internet. They are passionate about the need for the FCC to modernize the Universal Service Fund and transform the High Cost program into a new Connect America fund that would underwrite
  the cost of building and operating broadband networks in underserved and unserved communities. They are also interested in exploring ways to revamp the multibillion-dollar "intercarrier compensation"
  system, the Byzantine menu of charges that phone companies pay each other to connect calls and link their networks, and ensuring that Universal Service money is well spent.
