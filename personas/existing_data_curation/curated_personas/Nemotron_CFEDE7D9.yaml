personas:
  professional: Leslie Prieto, a bilingual community health aspirant and art‑focused program coordinator, leverages their curiosity, organized flexibility, and deep compassion to design and lead outreach
    events that weave mental‑wellness workshops with creative expression, while their emotional sensitivity fuels a personal commitment to listening to each participant’s story.
  sports: Leslie Prieto, an enthusiastic hiker who tackles Oak Mountain State Park trails in the spring and joins salsa‑based cardio sessions in the summer, proudly follows the Birmingham Barons baseball
    team and the Alabama Crimson Tide football squad, and participates in a local community cycling club that meets every Saturday.
  arts: Leslie Prieto, a devoted explorer of Birmingham’s art galleries such as the Birmingham Museum of Art and Red Mountain Arts Center, creates mixed‑media collages inspired by Frida Kahlo and local
    artist Ivan Crouch, and frequently facilitates free community workshops that blend visual art with therapeutic storytelling.
  travel: Leslie Prieto, who prefers thoughtfully planned weekend getaways that combine cultural immersion with nature, has journeyed to Oaxaca to study traditional cooking techniques, trekked in Asheville’s
    Blue Ridge Mountains, and dreams of exploring the historic streets of Seville while balancing a limited travel budget and volunteer commitments.
  culinary: Leslie Prieto, a confident home chef who delights friends with mole poblano, tamales, and sopes made from chilies, corn masa, and fresh cilantro, leads occasional cooking classes at the local
    pantry, and occasionally overindulges in churros after stressful days as a self‑soothing habit.
  core: Leslie Prieto blends artistic curiosity, compassionate community work, and a resilient yet anxiety‑prone spirit into a life where creative expression heals both self and others.
background:
  cultural: Leslie grew up in a Mexican-American household where Spanish and English were spoken interchangeably, and family gatherings centered around shared meals, music, and celebrations like Día de
    los Muertos and quinceañeras. Though she now lives in Birmingham, Alabama, she maintains strong ties to her heritage through cooking, participating in the local Latinx community, and preserving cultural
    traditions while also embracing Southern hospitality. Her bicultural experience informs her values of community solidarity, respect for elders, and a deep appreciation for both Mexican and Southern
    cultural expressions.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Community outreach coordination'', ''Event planning for cultural festivals'', ''Peer support and mental-health first aid'', ''Art appreciation
    and workshop facilitation'', ''Basic administrative and budgeting skills'', ''Culinary instruction of Mexican cuisine'', ''Social-media community engagement'']'
  hobbies: '[''Visiting art galleries and museum events'', ''Mixed-media collage making'', ''Cooking traditional Mexican recipes'', ''Folkloric dance and salsa classes'', ''Volunteering at a local food
    pantry'', ''Hiking in Oak Mountain State Park'', ''Gardening (herbs and vegetables)'', ''Reading psychology and self-help literature'', ''Mindfulness meditation'']'
  career_goals: Leslie aims to obtain a Community Health Worker certification and transition into a paid role as a program coordinator at a local non-profit that blends arts, mental-wellness, and cultural
    outreach. She also dreams of establishing a community art space in Birmingham where she can run free workshops for youth and seniors, using creative activities as a tool for emotional support. In the
    longer term she hopes to become a certified peer counselor, allowing her to formally support individuals experiencing anxiety or depression.
