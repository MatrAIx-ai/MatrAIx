  career_goals: Joseph aims to obtain his CFA charter within the next year and advance to a senior portfolio manager role at a regional investment firm. He aspires to lead a multidisciplinary team that
    integrates ESG criteria and AI-driven analytics into investment strategies. Long‑term, he envisions founding a boutique investment boutique that bridges traditional finance with creative industries,
    such as art funds and tech‑enabled venture capital, while also mentoring younger analysts in his community.
