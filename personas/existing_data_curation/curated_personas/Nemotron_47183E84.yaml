  skills: '[''Financial modeling'', ''Equity research'', ''Investment analysis'', ''Quantitative analysis'', ''Data visualization (Tableau, PowerBI)'', ''Advanced Excel'', ''Python (pandas, NumPy)'', ''Statistical
