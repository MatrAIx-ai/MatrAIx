  career_goals: Although retired, Norman aims to stay intellectually active by contributing his engineering knowledge to community projects, such as assisting the town’s planning board with infrastructure
    proposals and volunteering as a mentor for the local high school robotics team. He hopes to document his professional experiences and lessons learned in a memoir that can serve as a guide for younger
    professionals. Maintaining his health, independence, and ability to support his family remain his primary personal ambitions.
