persona_description: A professional sewer designer and engineer with expertise in foul sewage design, flow rate calculation, and pipe roughness determination. They are familiar with the guidelines and regulations
  for foul sewage systems in the UK, and have experience with the design and installation of foul sewage pipes, manholes, and pumping stations. They are also knowledgeable about waste water treatment processes,
  including the BOD5, COD, and pH levels, and how they impact the wastewater treatment process. They have a deep understanding of the requirements for sewage flow rates and pipe sizes, and can accurately
  calculate the velocity and flow rate of foul sewage. Additionally, they have experience with the design of pumping stations and the best practices for sewage treatment.
