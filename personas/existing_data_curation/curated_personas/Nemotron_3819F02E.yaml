  career_goals: While still young, Saryna already envisions a career that merges her love for problem‑solving, organization, and tangible outcomes. She aspires to become a civil engineer or architect, designing
    sustainable structures for her community, and she sets short‑term goals to win the school science fair, join the elementary robotics club, and maintain top grades in math and science. She also hopes
    to develop her leadership by becoming a class representative, and she is determined to earn a scholarship to a high‑performing STEM high school. Her competitive nature drives her to aim for accolades
    that validate her high standards.
