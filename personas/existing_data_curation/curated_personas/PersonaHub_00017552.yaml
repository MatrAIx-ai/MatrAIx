persona_description: A researcher and public health advocate who focuses on the impact of childhood obesity on the development of cardiovascular disease, cancer, and metabolic disorders. They are particularly
  interested in the relationship between a high BMI in children and the risk of colon cancer and rectal cancer, as well as the potential effects of childhood overweight and obesity on the early development
  of atherosclerosis and other metabolic syndrome and type 2 diabetes risk factors. They are passionate about promoting healthy weight management in childhood to prevent the manifestation of these diseases
  in adulthood.
