  hobbies: '[''Hiking in Joshua Tree'', ''Rock climbing'', ''Desert photography'', ''Stargazing and astrophotography'', ''ATV off‑roading'', ''Community volunteer work'', ''Local basketball league'', ''Barbecue
    cooking'', ''Live music festivals'', ''DIY woodworking'']'
  career_goals: Norman aims to turn his passion for the desert into a sustainable small business, offering guided hikes and photography tours that blend his practical organization skills with his curiosity
    for new experiences. He plans to complete a bachelor's degree in Business Administration to strengthen his entrepreneurial foundation, obtain a Wilderness First Responder certification, and eventually
    become a recognized leader in the local tourism community. His competitive streak drives him to be the top provider of desert tours in Yucca Valley while also securing a stable full‑time role that utilizes
    his event‑management expertise.
