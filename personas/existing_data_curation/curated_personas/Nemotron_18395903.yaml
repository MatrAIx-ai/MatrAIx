  career_goals: Although Rose is currently not part of the formal workforce, she aims to re‑enter the professional world in a part‑time role that aligns with her artistic passion and organizational strengths.
    Her primary ambition is to become a docent or assistant curator at a regional museum or historical society, where she can design interpretive tours and curate small exhibitions. She also hopes to launch
    a community‑focused online platform that showcases local artists and offers curated sales, allowing her competitive drive to support emerging talent. In the longer term, Rose plans to earn a museum
    studies certification and eventually serve on the board of a cultural nonprofit, contributing her expertise to preserve the artistic heritage of Delaware County.
