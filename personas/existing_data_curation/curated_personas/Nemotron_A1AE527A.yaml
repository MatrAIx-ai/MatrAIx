  hobbies: '["Reading mystery chapter books", "Playing chess (school club)", "Collecting and cataloguing rocks, leaves, insects", "Building Lego sets", "Caring for family pet rabbit", "Participating in
    small community soccer team", "Attending Perry County fair"]'
  career_goals: Marlene dreams of working with animals and hopes to become a veterinarian, fascinated by the way doctors care for pets and wildlife. She often imagines herself in a white coat, diagnosing
    her family’s rabbit or a rescued squirrel. At school she aims to win the upcoming science fair with a project about local insects, which she sees as a stepping stone toward a future in animal science.
    She also enjoys the idea of solving mysteries, so she sometimes pictures herself as a junior detective who helps her community. In the short term, she wants to improve her chess rating, become a reliable
    helper in the school library, and earn the Helping Hands award for community service.
