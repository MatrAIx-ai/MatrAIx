  hobbies: '[''Beach volleyball'', ''Lowcountry hiking'', ''Salsa dancing'', ''Swing dancing'', ''Soul‑food cooking'', ''Hosting dinner gatherings'', ''Yoga and meditation'', ''Poetry writing'', ''Portrait
    photography'', ''Landscape photography'', ''Volunteering as theater instructor'', ''Attending live music (jazz/blues)'']'
  career_goals: Tracy aims to secure a recurring lead or supporting role in a primetime television series while simultaneously developing her own independent film that centers on Southern Black experiences.
    She plans to launch a production company within the next three years to produce culturally authentic stories and to establish a youth acting mentorship program in Horry County. Long‑term, she aspires
    to direct feature films, gain recognition at festivals such as Sundance or the American Black Film Festival, and become a prominent advocate for diversity in the entertainment industry, leveraging her
    pragmatic planning skills and competitive drive.
