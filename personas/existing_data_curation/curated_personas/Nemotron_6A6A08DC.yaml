personas:
  professional: Tracy Smith, a 36-year-old actor and budding producer, blends method and classical training with a methodical approach to script analysis, voice work, and stage combat, while leveraging
    social-media marketing and production budgeting to chase a recurring primetime television role and launch a production company focused on authentic Southern narratives; they apply their competitive
    drive to every audition.
  sports: Tracy Smith plays competitive beach volleyball with the Horry County Beach Volleyball Club, hikes the Lowcountry nature trails as part of the Lowcountry Trail Association, dances salsa at Spice
    Salsa Club and swing at Retro Swing Society, follows the Carolina Panthers, Charlotte Hornets, and Carolina Hurricanes, and maintains a disciplined yoga practice at Myrtle Beach Yoga Studio; they thrive
    on group energy and channel competitive spirit into every match.
  arts: Tracy Smith immerses herself in theater as a guest instructor, draws inspiration from Meryl Streep and Viola Davis for acting, writes poetry influenced by Pablo Neruda, captures portrait and landscape
    images in the style of Annie Leibovitz, and regularly attends performances at the Carolina Theatre while curating playlists that feature Billie Holiday and modern jazz saxophonist Kamasi Washington;
    they view creative expression as a constant dialogue with their inner curiosity.
  travel: Tracy Smith plans meticulously for weekend trips to Charleston’s historic district and the Blue Ridge Mountains, dreams of photographing the coastal cliffs of Lisbon and the volcanic landscapes
    of New Zealand, balances active hiking itineraries with cultural museum tours, and often fits her travel around production schedules and limited budgets; they prefer adventure that also offers artistic
    inspiration.
  culinary: Tracy Smith experiments with soul-food dishes like shrimp and grits, smoked-paprika collard greens, sweet-potato pie, and gumbo, cooks at a moderate-high skill level, hosts dinner gatherings
    featuring homemade cornbread and bourbon-infused sauces, and pairs her meals with curated jazz playlists while occasionally over-seasoning in her quest for bold flavors; they view cooking as both a
    creative outlet and a social ritual.
  core: Tracy Smith is a disciplined, competitive actor-producer who channels calm resilience into beach volleyball, salsa dancing, and experimental soul-food cooking, obsessively schedules rehearsals in
    spreadsheets yet forgets to water their houseplants.
background:
  cultural: Tracy grew up in a close‑knit African‑American family in the Charleston‑Myrtle Beach region, with roots in the Gullah Geechee culture of the South Carolina Lowcountry. Her grandparents passed
    down oral storytelling, spirituals, and a love for community celebration. She was actively involved in her church choir, local Black heritage festivals, and community theater programs that highlighted
    African‑American playwrights. These experiences fostered a deep appreciation for Southern Black histories, cuisine, music, and the resilience of her community, shaping both her personal identity and
    her artistic voice as a Black actress in the South.
attributes:
  skills: '[''Method Acting'', ''Classical Theatre'', ''Screen Acting'', ''Improvisation'', ''Voice & Dialect Coaching'', ''Stage Combat'', ''Script Analysis'', ''Audition Coaching'', ''Stage Management'',
