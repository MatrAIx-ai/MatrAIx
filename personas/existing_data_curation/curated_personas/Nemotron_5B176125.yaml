  hobbies: '[''Gardening'', ''Woodworking'', ''Fly fishing'', ''Reading historical biographies'', ''Volunteer at senior center'', ''Crossword puzzles'', ''Church choir'', ''Model train building'']'
  career_goals: Although retired from formal employment, Anton aims to remain an active contributor to his hometown. His primary ambition is to volunteer as a mentor for the local senior center, teaching
    practical home‑repair skills to younger volunteers and assisting fellow seniors with technology. He also hopes to complete a family genealogy book that preserves his ancestors' stories for future generations.
    Maintaining his health, staying socially connected, and ensuring his wife’s comfort in their later years are central to his personal goals.
