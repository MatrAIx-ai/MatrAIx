  career_goals: Eduardo aims to leverage his hands‑on experience to transition into a registered nursing role within the next four years. He plans to enroll in a Bachelor of Science in Nursing (BSN) program
    while obtaining certifications such as Certified Nursing Assistant (CNA) and Certified Patient Care Technician (CPCT). His long‑term ambition is to become a unit manager or patient care coordinator
    in a hospital serving the Baytown community, focusing on improving care pathways for Spanish‑speaking patients. He also hopes to mentor new support staff and contribute to health‑education outreach
    programs in local schools.
