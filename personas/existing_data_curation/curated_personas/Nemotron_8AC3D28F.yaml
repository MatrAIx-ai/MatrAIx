  career_goals: James aims to progress to a supervisory role within his current pest‑control company, eventually managing a small team of technicians. He plans to attain additional state‑approved certifications
    in vector‑borne disease control and indoor‑air quality, positioning himself as a subject‑matter expert. Over the longer term, he hopes to open a family‑run pest‑management service that emphasizes reliable,
    honest service for the Pataskala community, allowing him to maintain a predictable schedule while providing for his family. He also wishes to mentor younger technicians, passing on his practical knowledge
    and reinforcing a collegial, supportive workplace culture.
