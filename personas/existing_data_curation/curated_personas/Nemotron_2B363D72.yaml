  career_goals: Although retired, Tarun aims to stay active by volunteering as a mentor at the local South Asian community center, teaching basic DIY skills and traditional cooking to youth. He plans to
    launch a modest side venture offering home‑repair consulting for neighbors, allowing him to remain engaged and generate supplemental income. Health-wise, he intends to keep up a regular walking routine
    and hopes to travel with his wife to visit family in Gujarat within the next two years.
