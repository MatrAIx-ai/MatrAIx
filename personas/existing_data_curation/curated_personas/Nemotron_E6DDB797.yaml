personas:
  professional: Noemi Large is a 20‑year‑old Santa Fe city transit driver who applies their CDL expertise, meticulous vehicle inspections, and basic Spanish communication to keep routes punctual, and they
    use their sociable, assertive demeanor to calmly resolve rider conflicts while championing sustainable transportation initiatives.
  sports: Noemi Large fuels their fitness through weekly hikes with the Sangre de Cristo Hiking Club and occasional yoga classes, while cheering on the New Mexico Lobos basketball team and the Santa Fe FC
    soccer squad during the fall season, and they also join pick‑up volleyball games at a local community center to stay socially active.
  arts: Noemi Large channels creative energy into landscape photography of desert vistas, regularly attends the Santa Fe International Folk Art Festival to admire works by muralist Luis García and textile
    artist Maya Delgado, and they unwind with speculative fiction novels by N.K. Jemisin and ambient soundscapes from composer Ólafur Arnalds.
  travel: Noemi Large prefers low‑cost, adventure‑focused road trips, often planning weekend hikes in nearby Taos or spontaneous drives to the Great Sand Dunes, while dreaming of a future backpacking trek
    through Patagonia’s Torres del Paine and a cultural immersion stay in Kyoto, balancing their modest driver salary with careful budgeting and occasional ride‑share splurges.
  culinary: Noemi Large delights in savoring red and green chile‑smothered carne adovada tacos and roasted poblano enchiladas with queso fresco, often recreating these dishes at home using fresh Hatch chiles
    and masa harina, while they occasionally indulge in gourmet farm‑to‑table brunches featuring avocado toast and matcha lattes.
  core: Noemi Large balances a restless curiosity for sustainable transit with a worry‑prone mind, channeling anxiety into yoga and photography while occasionally over‑booking social events, making them
    a socially vibrant yet slightly frazzled young professional.
background:
  cultural: Noemi is white and was raised in Santa Fe, where Anglo‑American traditions intersect with rich Hispanic and Pueblo influences. She celebrates typical American holidays while also taking part
    in local customs such as the annual Zozobra burning and the Fiesta de Santa Fe. Her upbringing in this multicultural environment heightened her appreciation for Spanish language and Southwestern art,
    which informs both her personal interests and her empathetic approach to serving a diverse ridership. The blend of cultural narratives in Santa Fe shapes her perspective, fostering a deep respect for
    community heritage and a desire to contribute positively to the city's public services.
attributes:
  skills: '["Commercial Driver''s License (CDL) with Passenger Endorsement", "Route Navigation and Planning", "Customer Service and Conflict Resolution", "Vehicle Safety Inspection and Maintenance", "Time
    Management and Punctuality", "Basic Spanish Language Skills", "Use of Transit Scheduling Software", "Emergency Response Procedures"]'
  hobbies: '["Hiking in the Sangre de Cristo Mountains", "Community Volunteering at Local Food Banks", "Photography of Southwestern Landscapes", "Yoga and Mindfulness Practices", "Participating in Local
    Music and Arts Festivals", "Reading Speculative Fiction", "Exploring New Mexican Culinary Experiences"]'
  career_goals: Noemi aims to advance within the Santa Fe transit system by first mastering all routes as a senior driver and then moving into a supervisory role such as Fleet Coordinator or Transit Operations
    Supervisor. She is interested in pursuing part‑time coursework in transportation logistics or public administration to deepen her understanding of route optimization and sustainability initiatives.
    Long‑term, she hopes to lead projects that integrate electric or hybrid buses into the fleet, promoting eco‑friendly transit solutions for the community. By combining her practical driving expertise
    with a curiosity for emerging transport technologies, Noemi strives to become an advocate for both rider safety and environmental responsibility.
