personas:
  professional: Ebony Bradshaw, a veteran dental and ophthalmic device technician with three decades of hands‑on expertise, blends meticulous craftsmanship, CAD/CAM fluency, and an outgoing mentorship style
    to lead her lab’s workflow while championing digital dentistry initiatives and community‑focused outreach.
  sports: Ebony Bradshaw enjoys leading a senior walking group three times a week, competes fiercely in a local bowling league sponsored by the Passaic Community Center, and roots for the New York Giants,
    Knicks, and Mets, treating game nights as essential social bonding events.
  arts: Ebony Bradshaw sings lead alto in her church choir, drawing inspiration from gospel legends like Mahalia Jackson and modern soul icons such as Alicia Keys, while also attending off‑Broadway productions
    like “The Color Purple” and curating a vinyl collection of classic R&B artists.
  travel: Ebony Bradshaw prefers a blend of meticulously planned cultural trips—such as a scheduled historic tour of Charleston and a conference visit to Boston—and spontaneous weekend getaways to the nearby
    Hudson Valley for farm‑to‑table experiences, always keeping a notebook of travel ideas tucked in her tote.
  culinary: Ebony Bradshaw excels at cooking New‑Jersey soul dishes, mastering collard greens simmered with smoked ham hocks, buttery macaroni and cheese with sharp cheddar, and candied yams seasoned with
    nutmeg and brown sugar, often experimenting with homemade hot sauce and hosting lively potluck feasts for friends and neighbors.
  core: Ebony Bradshaw blends meticulous craftsmanship with a fiercely competitive spirit, leading her lab and community while juggling spontaneous indulgences, a love for trivia, bowling, and soul food,
    and an unwavering stability under pressure.
background:
  cultural: Ebony identifies as an African‑American woman raised in the Greater New York metropolitan area. Growing up in a close‑knit Black community in New Jersey, she absorbed a strong sense of resilience,
    collective responsibility, and pride in cultural traditions such as gospel music, family gatherings, and culinary heritage. Her involvement with the church and neighborhood associations has reinforced
    values of service and mentorship, motivating her to give back through health‑focused outreach. While navigating a predominantly white technical field, Ebony draws on her cultural roots to assert confidence,
    challenge biases, and serve as a role model for other Black professionals in the medical‑appliance industry.
attributes:
  skills: '[''Dental prosthesis fabrication'', ''Ophthalmic lens grinding'', ''Medical appliance assembly'', ''CAD/CAM software operation'', ''Material science (acrylics, composites, titanium)'', ''Quality
