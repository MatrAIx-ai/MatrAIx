  hobbies: '[''Church choir'', ''Senior walking group'', ''Bowling league'', ''Trivia nights'', ''Soul food cooking'', ''Community potlucks'', ''Backyard gardening'', ''Volunteer at health fairs'', ''Local
    history museum visits'', ''Mentoring youth STEM programs'']'
  career_goals: Over the next five years Ebony aims to transition into a supervisory role, overseeing the workflow of her lab and implementing digital dentistry initiatives to improve turnaround times.
    She plans to obtain a certified dental laboratory technician credential (CDA) and attend advanced training in 3‑D printing of prosthetic devices. Ebony also hopes to launch a community outreach program
    that provides low‑cost dental appliances to underserved neighborhoods in Passaic County, drawing on her competitive drive to secure grant funding and partnerships with local health clinics. Ultimately,
    she envisions mentoring the next generation of Black technicians and possibly opening her own boutique lab focused on high‑precision, patient‑specific solutions.
