  career_goals: Douglas aims to transition into a lead architect or technical director role where he can shape the technology strategy for mid‑size firms in the Midwest. He aspires to mentor the next generation
    of developers, build high‑performing cross‑functional teams, and guide organizations through digital transformation initiatives, especially cloud migrations and adoption of AI‑enhanced tools. In the
    longer term he envisions launching a boutique consulting practice that offers bespoke software solutions and training workshops for local businesses, allowing him to combine his technical expertise
    with his passion for community engagement while maintaining a healthier work‑life balance to reduce stress.
