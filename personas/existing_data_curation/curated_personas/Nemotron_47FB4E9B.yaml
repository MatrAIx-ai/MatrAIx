  career_goals: Peter aspires to become a senior full‑stack engineer and, eventually, a technical lead overseeing a cloud‑native platform team. He aims to deepen his expertise in distributed systems and
    architecture, positioning himself to influence product strategy and drive innovation within his company. In the longer term, Peter envisions stepping into an engineering management role where he can
    combine his organized, reliable work style with his passion for teamwork and mentorship, fostering a culture of continuous learning. He also hopes to give back to the local tech ecosystem in Post Falls
    by organizing developer meetups and supporting coding workshops for youth.
