    User 2: Do you have any kids?

    User 1: No, I don''t have any kids.

    User 2: Oh, that''s too bad. I have ten nieces and nephews!

    User 1: That must be a lot of fun!

    User 2: It is! I love spending time with them.

    User 1: I''m sure you do. So, what do you like to do for fun?

    User 2: I like to write. I''m a writer.

    User 1: Oh, that''s cool! What kind of things do you write?

    User 2: I write short stories and novels.

    User 1: Oh, that''s awesome! I''ve always wanted to write a novel.

    User 2: You should! It''s a lot of fun.

    User 1: I know, I know. I just don''t know where to start.

    User 2: Well, you could start by reading some books on writing.

    User 1: That''s a good idea. I''ll have to look into that.

    User 2: You''re welcome!

    User 1: So, what are you working on right now?

    User 2: I''m working on a new novel.

    User 1: Oh, that''s exciting! What''s it about?

    User 2: It''s about a group of friends who go on a road trip.

    User 1: That sounds like a lot of fun!

    User 2: It is! I''m really enjoying writing it.

    User 1: I''m sure you are. I''m excited to hear more about it.

    User 2: Thanks! I''ll keep you updated.'
