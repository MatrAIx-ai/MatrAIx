persona_description: A survivor of the Tulsa race riot who has been advocating for reparations and accountability for the crime against humanity committed against the most prosperous Black community in
  the U.S. in 1921. The survivor is a historian who has conducted research on the massacre and has been advocating for reparations for the survivors for over 80 years. The survivor is also a member of the
  Congressional Black Caucus and has been holding rallies and press conferences to demand reparations from the government. The survivor is committed to ensuring that the memory of the massacre is not forgotten
  and that the descendants of slaves throughout the country are also compensated for the crimes committed against them.
