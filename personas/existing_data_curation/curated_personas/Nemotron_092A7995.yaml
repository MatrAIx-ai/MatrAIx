personas:
  professional: Lily Maumus, a budding visual storyteller in middle school, blends sketching, digital painting, and photography to craft narrative art projects, while their relaxed approach to deadlines
    often leads to last‑minute bursts of creativity.
  sports: Lily Maumus enjoys casual weekend soccer with the local youth club, follows the Houston Astros and Dallas Cowboys for MLB and NFL excitement, and participates in a school‑run track team that emphasizes
    fun over competition.
  arts: Lily Maumus, an avid member of the school art club, draws inspiration from digital illustrator Loish, paints scenes reminiscent of Studio Ghibli, strums simple chords on a ukulele to sing along
    with Taylor Swift and Chris Stapleton, and devours fantasy novels by Brandon Sanderson for storytelling ideas.
  travel: Lily Maumus prefers spontaneous day trips to nearby state parks like Brazos Bend, has explored the historic streets of Austin and the Texas coast at Galveston, and dreams of visiting Kyoto for
    its cherry blossoms and anime culture.
  culinary: Lily Maumus loves Texas‑style barbecue, especially smoked brisket and sweet cornbread, frequently bakes chocolate chip cookies and strawberry shortcake for friends, and experiments with adding
    smoked paprika to mac & cheese for a playful culinary twist.
  core: Lily Maumus balances a vivid imagination and artistic flair with a tendency to procrastinate, occasional anxiety, and an unstoppable craving for sweets after a long sketching session.
background:
  cultural: Lily was raised in a predominantly Anglo‑American family in suburban Fulshear, Texas, where traditional Southern values such as family gatherings, community involvement, and church participation
    are woven into daily life. She enjoys Texas‑style barbecue, country and pop music, and the hospitality that characterizes the region. Growing up near the diverse Fort Bend County, she is also exposed
    to a broader cultural tapestry, which fuels her curiosity and openness to new ideas. Her upbringing blends these regional traditions with modern, creative influences, shaping a grounded yet imaginative
    outlook.
