  career_goals: Lily dreams of combining her love for art with a desire to help others manage stress, envisioning a future as an art therapist or a multidisciplinary multimedia artist. She aims to pursue
    higher education in visual arts and psychology, seeking a career that offers flexibility to explore varied creative projects while fostering emotional well‑being. In the long term, she hopes to establish
    a community studio that provides workshops in creative expression and mental‑health support, allowing her to contribute positively to her hometown and beyond.
