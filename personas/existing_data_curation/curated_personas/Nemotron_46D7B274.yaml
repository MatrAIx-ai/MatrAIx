personas:
  professional: A budding block‑builder who imagines constructing towering skyscrapers, Juan Pantoja channels a deep curiosity for new ideas into meticulous Lego arrangements before daringly experimenting
    with unconventional designs, and they often pause to help a playmate whose tower wobbles, demonstrating early cooperative leadership.
  sports: An enthusiastic participant in the local under‑5 soccer club, Juan Pantoja dashes across the grass chasing the bright orange ball, cheers for the nearby professional baseball team the Chicago
    Cubs during family TV nights, and enjoys splash‑time at the community pool, while preferring solo sandbox play when the weather turns rainy.
  arts: A creative little artist who loves drawing bright animals and humming animated movie songs, Juan Pantoja spends afternoons coloring with Crayola crayons, imitates the whimsical style of Dr. Seuss,
    and they often present a handmade picture to a friend, reflecting their compassionate nature and desire to share joy.
  travel: A curious explorer who lights up on family road trips to the seaside and visits to the local science museum, Juan Pantoja scribbles stickers on a travel map to mark each destination, dreams of
    seeing the Eiffel Tower someday, and they sometimes feel anxious about long car rides, preferring short journeys with familiar adults and a small group of siblings.
  culinary: A selective foodie who delights in cheesy macaroni, strawberry smoothies, and the occasional crunchy carrot stick, Juan Pantoja proudly helps whisk pancake batter, prefers soft textures, and
    they sometimes sneak a spoonful of honey before dinner, a tiny habit that can spark a sudden sugar rush.
  core: An inquisitive, caring five‑year‑old named Juan Pantoja balances neat block‑building with spontaneous art, worries over small setbacks, and finds joy in sharing stickers and stories with close friends.
background:
  cultural: Juan is a Mexican‑American child raised in a bilingual household in Longview, Texas. Spanish is spoken at home, and he celebrates Mexican traditions such as Día de los Muertos, Cinco de Mayo,
    and family gatherings with tacos and tamales. His family’s Catholic faith and community events at the local church influence his values of compassion and harmony. Exposure to both Mexican cultural art—like
    colorful papel picado—and Texan community life enriches his appreciation for diverse artistic expressions. He freely blends English and Spanish in his speech, and his Mexican heritage shapes his worldview
    and his emerging interests.
