  career_goals: Although only five, Juan often talks about growing up to become someone who helps others, such as a teacher, a community health worker, or an artist who shares beautiful stories. He imagines
    creating books that combine pictures and simple lessons, reflecting his love for art and new ideas. His ambitions are guided by his desire for harmony and his curiosity, leading him to dream of exploring
    science or space in the future while remaining rooted in helping his family and friends.
