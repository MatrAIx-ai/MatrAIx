  career_goals: William hopes to channel his lifelong curiosity and love of art into technology that serves his community. He plans to build a digital storytelling platform that lets local seniors and artists
    share their histories and creations online, and to launch a mentorship program that pairs experienced developers with high‑school students in Sylvester. Additionally, he aims to write a reflective memoir
    that weaves together his experiences in business, software, and the arts, while maintaining a balanced workload that supports his mental‑health goals and reduces anxiety.
