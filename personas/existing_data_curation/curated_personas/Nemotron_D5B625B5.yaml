  hobbies: '["Visiting art galleries and museums", "Reading contemporary art and design literature", "Landscape and street photography", "Playing chess", "Gardening (herbs and vegetables)", "Hiking local
    nature trails", "Cooking and wine pairing for intimate dinner parties", "Attending small‑group workshops on pottery and creative writing", "Volunteering on the community theatre board", "Traveling to
    cultural festivals in Europe"]'
  career_goals: Looking ahead, John aims to develop a comprehensive succession plan for his department, ensuring a smooth transition for the next generation of leaders. He intends to formalize a mentorship
    program that pairs senior managers with emerging talent, fostering a culture of collaborative learning. As he approaches retirement, John plans to leverage his business acumen and art appreciation by
    consulting for regional cultural institutions and nonprofit arts organizations, helping them build sustainable financial models. He also hopes to contribute to his community by serving on the board
    of the local historical society, integrating his managerial expertise with his passion for preserving local heritage.
