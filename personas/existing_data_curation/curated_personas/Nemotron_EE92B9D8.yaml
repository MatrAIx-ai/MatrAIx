  hobbies: '[''Scale model engine building'', ''Woodworking'', ''Listening to Memphis blues and jazz'', ''Reading historical biographies'', ''Gardening'', ''Chess'', ''Cooking Southern and soul food'',
    ''Volunteer STEM tutoring'', ''Walking in local parks'']'
  career_goals: Approaching retirement, Marcus aims to shift to part‑time consulting, focusing on sustainable mechanical solutions for small manufacturers in the Memphis area. He hopes to formalize his
    legacy by obtaining his Professional Engineer (PE) license if not already held, and by publishing a memoir that blends his engineering career with reflections on the civil‑rights era that shaped his
    worldview. Additionally, he aspires to create a mentorship program that connects experienced Black engineers with high‑school students from underrepresented backgrounds, fostering a new generation of
    talent in STEM.
