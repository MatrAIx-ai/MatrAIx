  hobbies: '[''Hiking'', ''Mountain biking'', ''Fishing'', ''Home renovation projects'', ''Woodworking'', ''Volunteering with Habitat for Humanity'', ''Cooking'', ''Listening to classic rock'', ''Board
    games'', ''Reading construction magazines'']'
  career_goals: Kit aims to move into a foreman role within the next two years, leveraging his hands‑on experience to lead crews and coordinate larger renovation projects. He plans to obtain OSHA 30‑hour
    certification and a lead‑safe work certification to broaden his qualifications. Long‑term, Kit hopes to start his own small‑scale contracting business that balances structured project management with
    the flexibility to take on varied residential jobs, allowing him to maintain a stable income while enjoying the autonomy he values.
