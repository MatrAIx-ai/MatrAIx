personas:
  professional: Kit Little, a 33-year-old drywall and ceiling-tile specialist, blends a structured workflow with a laid-back attitude toward paperwork, using meticulous measuring, blueprint reading, and
    a cooperative mentorship approach to keep crews on schedule while they quietly eye a foreman promotion and upcoming OSHA-30 certification.
  sports: Kit Little, a fan of both the Colorado Rockies and Denver Broncos, spends Saturday mornings mountain-biking with the Sangre de Cristo Trail Riders club, hits the local pool for laps in the summer,
    and caps the year with occasional skiing trips to Breckenridge, all while they keep a casual jog around the neighborhood as a low-impact cardio routine.
  arts: Kit Little, who unwinds to classic rock legends like Led Zeppelin, The Rolling Stones, and Pink Floyd, enjoys watching woodworking tutorials by Steve Ramsey, attends occasional community-theatre
    productions of classics such as 'Our Town', and collects Ansel Adams postcards for their spare-room gallery, illustrating how art fuels both their craftsmanship and relaxation.
  travel: Kit Little, an avid road-tripper who prefers camping under the stars over luxury hotels, has hiked the Grand Canyon’s South Rim, biked through Banff National Park, and dreams of trekking Patagonia’s
    Torres del Paine, yet they budget vacations carefully to ensure a yearly family getaway to a quiet lake cabin in Colorado.
  culinary: Kit Little, a self-described home-cook with a penchant for hearty comfort food, regularly slaughters a rib-eye steak with rosemary-garlic rub, whips up smoky chili using ancho chilies and black
    beans, and bakes cornbread with jalapeños, while they occasionally rely on take-out pizza when a renovation project overruns their dinner schedule.
  core: Kit Little, a structured yet laid-back drywall veteran who balances meticulous craftsmanship with spontaneous weekend adventures, can be counted on to mentor apprentices while sometimes forgetting
    to pay the electric bill on time.
background:
  cultural: Kit comes from a white, primarily European‑American background rooted in the Mountain West. Raised in Colorado, he internalized the region's values of self‑reliance, hard work, and community
    involvement. Family traditions emphasize modest celebrations of holidays like Independence Day, Thanksgiving, and Christmas, often centered around family meals and outdoor activities. The local culture
    of friendliness and cooperation influences his considerate demeanor, and the surrounding natural landscape nurtures his love for hiking, fishing, and other outdoor pursuits.
attributes:
  skills: '[''Drywall installation'', ''Ceiling tile installation'', ''Drywall taping and finishing'', ''Blueprint reading'', ''Measuring and layout'', ''Construction safety compliance'', ''Team collaboration'',
