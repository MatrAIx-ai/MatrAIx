personas:
  professional: Kerry Cohen, a 26‑year‑old insurance sales consultant, blends sharp risk‑profile analysis with a pragmatic sales script, leveraging their calm resilience to navigate objections while nurturing
    client relationships and aiming for the CPCU designation and a senior mentor role.
  sports: Kerry Cohen cycles the Clinton River Trail on weekends, occasionally joining the Michigan Cycling Club's group rides, roots for the Detroit Lions in football season, and channels that competitive
    spirit into weekly yoga sessions that keep them flexible for a desk‑bound career.
  arts: Kerry Cohen finds solace in sketching urban landscapes while sipping espresso, curates playlists featuring Tame Impala and Bon Iver, attends indie film screenings of directors like Greta Gerwig,
    and collects limited‑edition prints by contemporary painter Yayoi Kusama.
  travel: Kerry Cohen prefers low‑key weekend getaways to nearby cabin retreats in the Upper Peninsula, balances spontaneity with a light travel budget, dreams of strolling through Kyoto's Zen gardens,
    and relies on a well‑worn travel notebook to sketch itinerary ideas on the fly.
  culinary: Kerry Cohen, an adept home cook, whips up roasted beet and goat‑cheese salads for their garden harvest, savors a perfectly brewed pour‑over latte, indulges in occasional sushi rolls with fresh
    tuna and avocado, and treats themselves to artisanal dark chocolate after a long day of client meetings.
  core: Kerry Cohen navigates life with a calm, curiosity‑driven mindset, juggling a love for solitary garden rituals and spontaneous coffee tastings while occasionally letting a relaxed approach to planning
    leave their inbox cluttered.
background:
  cultural: Kerry grew up in Canton, a suburb of Detroit, within a middle-class, predominantly white Midwestern community. Her family lineage includes ancestors who emigrated from Eastern Europe, and the
    Cohen surname reflects a Jewish heritage that is observed through occasional family gatherings and cultural traditions. While she strongly identifies with the regional values of hard work, community
    involvement, and modesty, she also embraces the diverse cultural fabric of the Greater Detroit area, participating in multicultural events and taking pride in Michigan's blend of industrial and agricultural
    history.
