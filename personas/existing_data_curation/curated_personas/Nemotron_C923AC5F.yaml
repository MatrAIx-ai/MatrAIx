  career_goals: In the next 12‑18 months, Kerry aims to earn the CPCU designation and increase her annual premium volume by roughly 25 %. She plans to move into a senior sales consultant role where she
    can mentor newer agents while continuing to grow her own client portfolio. Long‑term, she envisions launching an independent boutique agency that leverages technology to provide personalized, on‑demand
    insurance advice, preserving the flexible schedule she values. Additionally, she hopes to contribute to community education programs that raise financial‑literacy awareness.
