  hobbies: '[''LEGO building (Technic, space themes)'', ''Reading adventure and science books'', ''Hiking and desert wildlife observation'', ''Playing puzzle/creative video games (Minecraft, Scratch)'',
    ''Drawing comics and space‑themed artwork'', ''School robotics club'', ''Soccer practice and group playdates'']'
  career_goals: Ronald aspires to become an astronaut, driven by his fascination with the night sky and space technology. He also dreams of studying desert wildlife as a biologist, hoping to protect the
    ecosystems he enjoys exploring. A third ambition is to develop educational video games that combine his love of coding and storytelling, making science accessible to other kids. To pursue these goals,
    he plans to excel in school, win a science‑fair award, earn an astronomy badge through his scout program, and later attend a university strong in engineering or environmental science.
