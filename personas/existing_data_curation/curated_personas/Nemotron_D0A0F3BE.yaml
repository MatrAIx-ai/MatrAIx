personas:
  professional: Ronald Cox is a budding junior robotics engineer who transforms their fascination with LEGO Technic and space-themed kits into functional prototype designs for the school robotics club,
    applying methodical planning and a balance of imaginative ideas with practical building techniques.
  sports: Ronald Cox plays forward for the Red Rock Rangers youth soccer team, practicing twice a week and cheering for the Arizona Cardinals, while also embracing off-season fitness through family hikes
    in Red Rock Canyon, where they keep a keen eye on local wildlife and modestly track steps with a smartwatch.
  arts: 'Ronald Cox channels their creative energy into drawing space-explorer comics inspired by artists like Chesley Bonestell and comic writer Jim Lee, enjoys the animated series Star Wars: The Clone
    Wars, and spends weekends building imaginative worlds in Minecraft, evidencing a blend of visual storytelling and digital art.'
  travel: Ronald Cox has visited the Grand Canyon and Disneyland with family, explored the Kennedy Space Center's astronaut exhibits, and dreams of traveling to Japan's Ghibli Museum to see the whimsical
    animation that fuels their own space-adventure comics, favoring trips that combine educational excitement with playful discovery.
  culinary: Ronald Cox favors classic kid-friendly dishes such as pepperoni pizza, chicken nuggets, and tacos, enjoys the novelty of freeze-dried astronaut ice cream, and can confidently assemble a peanut
    butter and jelly sandwich while occasionally assisting in baking chocolate chip cookies during weekend bake-offs.
  core: Ronald Cox is a meticulously organized nine-year-old space enthusiast who balances relentless curiosity with practical planning, yet often forgets sunscreen on hikes and occasionally stays up late
    perfecting Minecraft builds.
background:
  cultural: 'Ronald is raised in a middle‑class, white American family in Las Vegas, Nevada. His parents, whose ancestors hail from the Midwest and Pacific Northwest, emphasize education, community involvement,
    and outdoor activities. The family’s lifestyle blends the desert environment with the city’s entertainment culture: occasional trips to shows on the Strip, participation in local festivals, and weekend
    outings to natural attractions like Red Rock Canyon and Lake Mead. Community values include school engagement, after‑school programs, and scouting, which shape Ronald’s sense of responsibility and teamwork.
    While his household celebrates traditional American holidays and values, his exposure to the city’s diverse visitors and performers fosters an appreciation for varied perspectives.'
attributes:
  skills: '[''Reading comprehension (chapter books)'', ''Basic arithmetic (addition, subtraction, multiplication, division)'', ''Logical problem solving (LEGO construction)'', ''Block-based coding (Scratch)'',
