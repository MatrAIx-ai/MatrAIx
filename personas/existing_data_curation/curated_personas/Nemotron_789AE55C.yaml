personas:
  professional: Zamiyah Stubbs, a 16‑year‑old visual storyteller, blends watercolor, Procreate, and Scratch animation to craft nuanced portraits of their Hattiesburg neighborhood, channeling a calm, organized
    curiosity into school projects, community art workshops, and an ever‑growing portfolio.
  sports: Zamiyah Stubbs finds rhythm in long walks along the Paul B. Johnson State Park trails, often sketching vistas, and while they prefer solitary exercise, they faithfully cheer on the Southern Miss
    Golden Eagles basketball team and the Mississippi Braves minor‑league baseball club, occasionally joining a weekend pick‑up basketball game at the community center.
  arts: Zamiyah Stubbs’s creative pulse is set to the sounds of Miles Davis, the Riverside Gospel Choir, and Erykah Badu, while their literary palate includes the graphic novel 'Saga' and poetry collections
    by Danez Smith, and they regularly exhibit their watercolor portraits at the local Kunst gallery’s youth showcase.
  travel: Zamiyah Stubbs approaches travel like an art project, meticulously planning trips that blend photography and sketching; they have already explored New Orleans’s French Quarter to capture its vibrant
    street music, spent a school‑organized weekend in Asheville, NC hiking and sketching waterfalls, and dream of a future study‑tour to Florence, Italy’s Uffizi Gallery to study Renaissance masterpieces.
  culinary: Zamiyah Stubbs enjoys cooking family Southern recipes, regularly mastering shrimp and grits with a splash of lemon, fried green tomatoes dusted with cornmeal, and collard greens simmered with
    smoked turkey and a pinch of red‑pepper flakes, while fresh basil, thyme, and rosemary from their indoor herb garden often find their way into these dishes.
  core: Zamiyah Stubbs is a calm, organized, and empathetic teenage artist who transforms everyday moments into expressive visuals, quietly mentors peers, and meticulously balances school, art, and family
    life while nurturing a future rooted in Southern heritage.
background:
  cultural: Zamiyah is a Black teen from Hattiesburg, Mississippi, raised in a family that blends Southern hospitality with the rich cultural traditions of the African‑American community. Her upbringing
    is anchored by the local Black church, where gospel music, storytelling, and community service shaped her values of harmony and collective well‑being. She grew up hearing family histories of the Civil
    Rights movement in Mississippi, fostering a sense of resilience and pride. Southern cuisine—collard greens, cornbread, fried catfish—features prominently in family gatherings, and she has learned to
    cook these dishes from her grandmother. She is familiar with the region’s musical heritage, from blues along the Mississippi Delta to contemporary hip‑hop, and often attends community festivals that
    celebrate Black art and history, such as Juneteenth parades and the Hattiesburg Blues & Heritage Festival. The blend of rural and small‑city life gave her a deep appreciation for nature, local history,
    and the importance of community bonds.
attributes:
  skills: '[''Sketching (pencil, charcoal, watercolor)'', ''Digital illustration (Procreate, Canva)'', ''Creative writing (poetry, short stories, journaling)'', ''Research and information synthesis'', ''Organizational
    planning (school assignments, small events)'', ''Peer mentorship and conflict mediation'', ''Basic coding (Scratch)'', ''Photography (composition, lighting)'', ''Cooking Southern family recipes'', ''Indoor
    herb gardening'']'
  hobbies: '[''Drawing and painting'', ''Reading contemporary YA and poetry by Black authors'', ''Creative writing and journaling'', ''Listening to and singing gospel, jazz, and R&B'', ''Photography of
    everyday scenes'', ''Cooking and learning family Southern recipes'', ''Walking local nature trails and sketching outdoors'', ''Participating in a youth book club'', ''Exploring digital art tools'',
    ''Gardening indoor herbs'']'
  career_goals: Zamiyah envisions using her artistic gifts to amplify under‑represented stories. She aims to attend a university where she can major in Fine Arts or Graphic Design with a secondary focus
    on African‑American cultural studies. After college, she hopes to become a community arts coordinator, designing workshops that blend visual art and storytelling for youth in Hattiesburg and beyond.
    She dreams of curating exhibitions that celebrate Black Southern heritage and eventually opening a small studio gallery that doubles as a mentorship space. In the meantime, she plans to build a robust
    portfolio, enter local art contests, and secure a summer internship at a museum or cultural center. Her long‑term ambition includes traveling to experience diverse artistic traditions while staying
    rooted in her community to mentor the next generation.
