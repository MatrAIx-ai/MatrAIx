persona_description: A marine biologist who specializes in the study of beaked whales, specifically the Hector's beaked whale. They are particularly interested in the impact of anthropogenic sounds, such
  as those generated by navy sonar and seismic exploration, on this species. They are also concerned about the potential effects of climate change on the species' range and are interested in determining
  the impacts of potential threatening processes on this species. They are also interested in the diet of Hector's beaked whales and the impact of their feeding habits on the species' survival. They are
  also interested in the conservation actions being taken to protect this species, including the listing of the species in Appendix II of CITES.
