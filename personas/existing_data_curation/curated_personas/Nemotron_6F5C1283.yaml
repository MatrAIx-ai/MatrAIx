  hobbies: '[''street photography'', ''experimental film screenings'', ''contemporary philosophy reading'', ''chess'', ''online strategy gaming'', ''hiking in the Finger Lakes area'', ''open‑mic performances'',
    ''Arduino interactive art projects'', ''vinyl record collecting'']'
  career_goals: Mark aspires to become a multidisciplinary content creator who can merge visual arts with data‑driven storytelling. In the short term, he aims to develop a robust portfolio of documentary‑style
    video pieces, photo essays, and interactive web projects that he can pitch to cultural institutions and independent media outlets. He plans to apply for graduate programs in digital media or visual
    communication to deepen his technical and conceptual expertise. Ultimately, Mark hopes to launch a small freelance studio that produces immersive multimedia experiences for museums, art galleries, and
    socially conscious brands, while also mentoring emerging artists through a nonprofit platform he envisions establishing down the line.
