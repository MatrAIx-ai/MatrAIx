persona_description: 'A policy analyst who specializes in education reform and has a background in educational psychology. They have experience working with the No Child Left Behind law and have a deep
  understanding of the theory behind the reforms, including the Lake Wobegon Effect and the Myth #2: The Quality of the Teacher is the Primary Determinant of a Child''s Academic Success. They are also familiar
  with the Common Core Standards and have a critical perspective on their implementation, believing that they are separate from the curriculum and do not dictate what curriculum teachers should use.'
