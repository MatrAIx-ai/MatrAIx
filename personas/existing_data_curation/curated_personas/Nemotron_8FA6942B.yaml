  career_goals: Hoping to deepen his professional standing, Terry plans to achieve Master Electrician certification and obtain an Illinois contractor's license within the next two years. This will enable
    him to launch a small, family-run electrical contracting business that focuses on residential upgrades, renewable-energy installations, and smart-home solutions. He intends to pursue additional certifications
    in solar PV and battery storage to meet growing regional demand. Long-term, he aspires to mentor the next generation of electricians, build a reputation for reliability and quality, and secure a stable
    retirement while preserving a balanced work-life schedule that mitigates stress.
