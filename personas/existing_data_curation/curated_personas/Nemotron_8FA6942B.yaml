personas:
  professional: Terry Alltmont, a seasoned journeyman electrician with 23 years of experience, combines meticulous knowledge of the NEC and practical troubleshooting skills with a curiosity for emerging
    tech like smart‑home automation and solar PV, they mentor apprentices and are diligently pursuing Master Electrician certification and an Illinois contractor’s license to launch a family‑run contracting
    business.
  sports: Terry Alltmont enjoys frequent fishing outings on the Mississippi River and nearby lakes, they follow the St. Louis Cardinals and the Chicago Bears, join a local adult softball league at the community
    center for casual competition, and take short hikes on county trails for low‑impact cardio when weather permits.
  arts: Terry Alltmont reads classic mystery novels by Agatha Christie, they listen to a curated country‑rock playlist featuring Sturgill Simpson and Chris Stapleton while woodworking, and occasionally
    attend community‑theater productions of Shakespeare plays at the local church hall, finding these artistic moments a gentle counterpoint to their technical day.
  travel: Terry Alltmont prefers short, purposeful getaways that fit the family schedule, they enjoy weekend stays at a fishing lodge in the Ozarks, road trips along the Great River Road to explore historic
    river towns, and a planned summer visit to the solar‑energy expo in Denver, balancing a love of nature with professional curiosity.
  culinary: Terry Alltmont favors hearty Midwestern fare, they often grill smoked catfish seasoned with Cajun spice rubs, bake homemade cornbread with buttermilk, experiment with LED‑lit kitchen hacks to
    perfect sous‑vide cooking while listening to country‑rock, and occasionally overindulge in sugary BBQ sauce on their grilled creations.
  core: Terry Alltmont, a 45‑year‑old electrician, blends meticulous craftsmanship, quiet curiosity, and a tendency to worry, they drive a relentless pursuit of mastery in smart‑home tech while balancing
    family life, woodworking, and occasional stress‑induced coffee over‑consumption.
background:
  cultural: Terry was raised in a middle-class, white family in Quincy, Illinois, where Midwestern values such as hard work, self-reliance, and community cooperation are deeply rooted. His ancestry traces
    back to German and Irish immigrants who settled in the region in the early 20th century. Weekly church attendance, local high-school sports events, and community volunteer projects shaped his social
    outlook. The blend of agricultural surroundings and small-town industry fostered a pragmatic, hands-on approach to problem solving. Today, he identifies with the modest, family-oriented culture of Adams
    County, where neighbors often rely on each other for practical assistance and local businesses serve as community anchors.
