  career_goals: Nancy aims to transition from a senior marketing manager to a director of marketing within the next two years, eventually positioning herself for a VP or CMO role at a mid‑size consumer‑focused
    company. She wants to lead the adoption of an omnichannel strategy that blends data‑driven insights with authentic storytelling, while fostering a culture that balances creative risk‑taking with measurable
    outcomes. Mentoring emerging marketers and championing initiatives that improve employee well‑being—especially stress‑management resources—are also high on her agenda. Long‑term, she envisions consulting
    for organizations seeking to revitalize their brand presence while maintaining a sustainable work‑life rhythm.
