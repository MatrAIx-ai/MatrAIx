personas:
  professional: Shirley Kelly, a budding LEGO architect, blends her curious fascination with how things fit together and a practical eye for detail by turning backyard discoveries into imaginative building
    projects, while her relaxed attitude toward obligations lets her experiment freely without strict schedules.
  sports: Shirley Kelly, an energetic member of the Riverside Rockets youth soccer team, enjoys weekly practices after school, loves cheering for the US Women’s National Soccer Team during the World Cup,
    and balances her active play of tag and bike rides with a laid‑back attitude toward structured training, preferring fun drills over rigid routines.
  arts: Shirley Kelly immerses herself in creative expression by sketching whimsical cartoons of her backyard finds, idolizing the playful style of Dr. Seuss and the vibrant animation of Studio Ghibli’s
    Hayao Miyazaki, while she also sings along to catchy tunes by Taylor Swift during art club sessions, letting these influences shape her own storytelling.
  travel: Shirley Kelly prefers spontaneous weekend trips to nearby nature spots like Pine Hill State Park where she can hunt for fossils, enjoys revisiting her grandparents’ hometown for family picnics,
    and dreams of exploring the towering cliffs of the Grand Canyon during a future summer vacation, planning her adventures with a loosely drawn map rather than a detailed itinerary.
  culinary: Shirley Kelly delights in baking chocolate chip cookies, carefully measuring flour, brown sugar, and a dash of vanilla extract, and while her culinary skills are still beginner level, she loves
    helping to stir batter and often experiments with adding raisins or pretzel bits for extra crunch, showing a playful curiosity for flavors.
  core: Shirley Kelly combines a boundless curiosity for the natural world with a laid‑back, sometimes messy approach to planning, leading her to spend afternoons lost in rock collections, LEGO builds,
    and cookie dough, while occasionally forgetting to clean up her workspace.
background:
  cultural: Shirley grows up in a typical Midwestern American household in Plainfield, Indiana. Her family celebrates common holidays such as Thanksgiving, Christmas, and Fourth of July with community gatherings
    and family traditions. She attends a local elementary school where she participates in classroom projects, after‑school clubs, and occasional field trips that emphasize teamwork and curiosity. The neighborhood
    values friendliness, modesty, and cooperation, and she sometimes attends a nearby church where lessons on sharing and service reinforce her considerate nature.
