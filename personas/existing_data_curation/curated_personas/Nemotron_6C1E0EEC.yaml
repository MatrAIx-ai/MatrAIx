  career_goals: Nelson dreams of turning his love for storytelling and technology into a career as a multimedia content creator or video game designer, where he can blend his creative ideas with practical
    design skills. He also envisions himself as a community organizer who uses digital platforms to amplify youth voices in his hometown of El Reno, fostering inclusive events that celebrate his Hispanic
    heritage. In the longer term, he hopes to pursue a degree in digital media or interactive design, with the ambition of launching his own indie game studio that focuses on culturally rich narratives.
