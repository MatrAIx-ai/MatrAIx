personas:
  professional: Nelson Gosine, an aspiring game designer who channels their curiosity for virtual world building into meticulous level layouts while they leverage their sociable, talkative nature to lead
    school game‑development clubs, exemplifies a practical yet creative teen ready to turn hobby projects into collaborative digital experiences.
  sports: Nelson Gosine, an enthusiastic participant in their town's youth basketball league and soccer club (the Eastside Strikers), idolizes the Los Angeles Lakers on the court and FC Barcelona on the
    field, and they dedicate after‑school practice time to improve dribbling and footwork while balancing schoolwork with a flexible, fun‑first attitude toward fitness.
  arts: Nelson Gosine, a TikTok content creator who blends quick‑cut humor with Spanish‑language hits from artists like Bad Bunny and J Balvin, harnesses their talkative, center‑stage personality to engage
    followers while they experiment with storytelling techniques that reflect their curiosity about digital media.
  travel: Nelson Gosine, an adventurous teen who prefers spontaneous weekend road trips to nearby attractions such as the Grand Canyon and the historic streets of San Antonio, while day‑dreaming about an
    eventual backpacking adventure in Barcelona or a cultural immersion visit to Tokyo, plans trips with friends using simple apps and often relies on parental support to cover travel costs.
  culinary: Nelson Gosine, an intermediate home cook who loves helping family prepare handmade empanadas and arroz con pollo, often adds a modern twist by sprinkling sriracha or fresh cilantro on dishes,
    and they eagerly experiment with ingredients like lime, jalapeño, and roasted corn to create flavorful fusion meals.
  core: Nelson Gosine is a talkative, community‑oriented teen who merges a love for digital creativity, sports, and cooking, often juggling school projects while they stay up late editing videos, occasionally
    neglecting homework in favor of late‑night gaming marathons.
background:
  cultural: Nelson comes from a Hispanic/Latino family with roots in Mexico and Central America. Growing up in El Reno, Oklahoma, he balances the traditions of his heritage—like celebrating Día de los Muertos
    and enjoying family gatherings centered around home‑cooked meals—with the broader American culture of his community. He is bilingual, speaking Spanish at home and English at school, which enriches his
    identity and provides a unique perspective that he often brings into his creative projects. The close‑knit family environment, church involvement, and community festivals have instilled in him a strong
    sense of cultural pride and a desire to share his heritage with a wider audience.
