personas:
  professional: Brandon Mcfadden, a retired museum docent turned community heritage organizer, channels their extensive knowledge of Southern visual and musical traditions into coordinating volunteer‑run
    oral‑history projects and traveling exhibitions, while their relaxed approach to obligations often leads to last‑minute rearrangements that they meet with a competitive, critical eye.
  sports: Brandon Mcfadden enjoys low‑impact morning walks through historic Barksdale Park, plays shuffleboard at the local senior center, follows the Louisiana State Tigers football team and the Shreveport
    Mudbugs hockey club, and occasionally joins a senior cycling group in the spring, balancing modest fitness routines with a competitive spirit for friendly rivalry that they eagerly display during games.
  arts: Brandon Mcfadden spends weekends at downtown jazz clubs improvising on their saxophone alongside tunes by John Coltrane and Wynton Marsalis, curates modest gallery shows featuring works by Claude
    Monet and regional folk painters, and writes poetry inspired by James Baldwin and Toni Morrison, weaving together literary reverence, musical curiosity, and a critical eye for interpretation.
  travel: Brandon Mcfadden prefers leisurely, research‑driven trips, often taking the Amtrak to New Orleans for Mardi Gras festivals and historic French Quarter tours, while dreaming of a quiet cabin retreat
    in the Appalachian Mountains that they hope to explore with grandchildren, balancing careful planning with a spontaneous love for cultural immersion.
  culinary: Brandon Mcfadden, an adept home chef, crafts gumbo and jambalaya using home‑grown okra, thyme, and bay leaves, experiments with a dark roux for depth, but sometimes forgets to season properly
    when hosting church potlucks, reflecting both their culinary skill and a tendency toward occasional absent‑mindedness.
  core: Brandon Mcfadden is a curiously competitive senior who blends deep Southern cultural passions with a habit of misplacing notebooks, turning each day into a balance of artistic discovery and gentle
    chaos that they navigate with quiet determination.
background:
  cultural: Brandon grew up as an African American in Shreveport during the late 1950s and 1960s, a period of profound social change in the Deep South. His family’s roots stretch back to sharecropping ancestors
    who migrated from rural Louisiana during the Great Migration, and stories of the civil‑rights movement were part of his upbringing. The local Baptist church, gospel choirs, and the vibrant blues‑jazz
    scene shaped his artistic sensibilities. He embraces the culinary traditions of Creole and Cajun cooking, celebrates Juneteenth and other cultural holidays, and values the oral storytelling traditions
    of his community. While deeply grounded in Southern Black culture, he remains open to unconventional artistic expressions, reflecting his lifelong curiosity and critical perspective.
attributes:
  skills: '[''Art history and curation'', ''Creative writing and poetry'', ''Community exhibition coordination'', ''Genealogical research and digital archiving'', ''Woodworking and basic carpentry'', ''Jazz
    appreciation and saxophone basics'']'
  hobbies: '[''Visiting art galleries'', ''Jazz listening and occasional saxophone playing'', ''Reading classic and contemporary literature'', ''Writing poetry'', ''Woodworking'', ''Gardening'', ''Cooking
    Creole cuisine'', ''Genealogy research'', ''Attending church services'', ''Traveling to New Orleans for cultural festivals'']'
  career_goals: Although retired, Brandon aims to channel his curiosity and critical eye into a legacy project that documents the Black history of Bossier Parish. He plans to launch a Community Heritage
    Initiative that trains volunteers to collect oral histories, digitize photographs, and curate a traveling exhibition for schools and local libraries. He also aspires to complete a memoir that weaves
    together his personal experiences, the civil‑rights movement, and the evolution of Southern art, with the goal of self‑publishing and sharing it online. A secondary ambition is to master digital photography
    and social‑media storytelling so he can reach younger audiences, while also offering a series of storytelling workshops at the senior center to mentor emerging voices. These goals serve both his desire
    for intellectual fulfillment and his need to mitigate stress through purposeful activity.
