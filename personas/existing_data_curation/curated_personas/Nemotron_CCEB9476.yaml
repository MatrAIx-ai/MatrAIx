  career_goals: Tralen aims to turn his sociable nature and knack for organized yet adaptable work into a career in hospitality or event management. He plans to enroll in a community-college associate program
    in Hospitality Management or Business Administration, gain entry-level experience as a server or bar-back, and ultimately progress to a shift-supervisor or event-coordinator role at a local restaurant,
    hotel, or community venue. He values a job that offers a predictable schedule and clear procedures while still allowing him to interact with guests, lead small teams, and be the focal point of lively
    events.
