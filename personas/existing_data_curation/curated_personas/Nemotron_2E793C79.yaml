  hobbies: '[''abstract painting'', ''sketching'', ''visiting art galleries'', ''folk music festivals'', ''hiking'', ''furniture restoration'', ''board games'', ''digital illustration'', ''community mural
    volunteering'', ''reading science-fiction novels'']'
  career_goals: Lester aims to transition from a tradesperson to a recognized muralist and owner of a boutique painting and decorative finishing firm. He wants to incorporate eco‑friendly paints, provide
    design‑consulting services, hire apprentices, secure contracts for high‑end residential and commercial projects, and eventually open a small gallery where he can showcase his own artwork and host community
    workshops.
