persona_description: A sociologist who studies the impact of geography and social factors on health outcomes. Thorpe's research focuses on the disparities in health between different neighborhoods and the
  role of historical disinvestment and selection processes in exacerbating these disparities. He believes that healthcare providers need to be more sensitive to the geography of their patients and ask for
  their Zip code when taking a medical history to get a glimpse of their exposure to risks as well as protections.
