personas:
  professional: Sharon Rhodes, a methodical senior audit specialist at a leading firm, leverages her expertise in GAAP, IFRS, forensic accounting, and data analytics with Python and Tableau to design streamlined
    audit processes while mentoring junior staff, channeling her imaginative curiosity into innovative ESG reporting solutions.
  sports: Sharon Rhodes is a regular member of the Rock Creek Trail Club, participates in weekly yoga classes at the DC Yoga Collective, and supports the Washington Capitals and DC United, often watching
    games with friends while maintaining a balanced fitness regimen that includes weekend hikes and occasional recreational basketball at the local community center.
  arts: Sharon Rhodes channels her vivid imagination into abstract painting, drawing inspiration from the bold color palettes of Mark Rothko and the narrative depth of contemporary artists like Kara Walker
    and Mickalene Thomas, while frequenting the Hirshhorn Museum to attend exhibitions and joining local jazz jam sessions that feature musicians such as Esperanza Spalding and Kamasi Washington.
  travel: Sharon Rhodes plans her trips with meticulous itineraries, favoring cultural immersion trips to places like New Orleans for its Creole culinary scene, the historic streets of Savannah, and the
    vibrant markets of Accra, while also dreaming of a solo sunrise hike on Hawaii’s Haleakalā and a weekend getaway to the scenic Blue Ridge Mountains.
  culinary: Sharon Rhodes delights in crafting inventive dishes such as jambalaya infused with coconut milk, plantain‑sweetened collard‑green wraps, and spicy shrimp étouffée seasoned with scotch bonnet
    pepper, showcasing her intermediate‑level cooking skills and a palate that loves the interplay of smoky, sweet, and earthy flavors.
  core: Sharon Rhodes blends analytical rigor with creative spontaneity, balancing meticulous audit work with late‑night abstract painting sessions, a habit of craving spicy food, and a penchant for mentoring
    others, all while occasionally neglecting sleep to finish a novel draft.
background:
  cultural: Sharon is an African-American woman raised in the Washington, D.C. metropolitan area. Her family’s roots trace back to the historic U‑Street and Anacostia neighborhoods, where she grew up amidst
    a vibrant culture of music, activism, and community solidarity. These experiences instilled a strong sense of responsibility toward social justice and education. She celebrates Black cultural traditions
    such as Juneteenth and Kwanzaa, values mentorship within the Black professional community, and draws inspiration from the rich artistic legacy of African-American creators in shaping her personal and
    professional identity.
