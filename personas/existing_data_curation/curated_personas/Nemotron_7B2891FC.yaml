  career_goals: Sharon aims to obtain her CPA license within the next year and pursue an MBA with a focus on finance and sustainability. She envisions progressing to a senior audit manager role at a major
    firm or a government agency, eventually becoming a partner or director overseeing complex audits, especially those related to public sector accountability and ESG reporting. She is motivated to mentor
    junior accountants, champion diversity and inclusion in finance, and leverage her expertise to improve financial transparency for nonprofit organizations serving underrepresented communities.
