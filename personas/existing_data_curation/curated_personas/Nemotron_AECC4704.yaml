personas:
  professional: Andriana Sharpe is a budding creator who channels their love for LEGO architecture and school drama club into early explorations of design and storytelling, and they thrive on the predictable
    rhythm of after-school soccer and weekly dance classes while tolerating the occasional messy notebook.
  sports: Andriana Sharpe powers through after-school soccer as a forward on the Greenfield Thunder U-8 team, cheering along with the local professional club the City Strikers, and they channel the same
    energetic enthusiasm into weekend dance class cardio drills.
  arts: Andriana Sharpe finds inspiration in the soaring vocals of Idina Menzel from Disney's Frozen, the playful piano studies of Ludwig van Beethoven, and the whimsical drawings of Dr. Seuss, and they
    channel this mix into dance recitals, school drama enactments, and colorful bead bracelets.
  travel: Andriana Sharpe loves short family road trips to nearby Redwood Grove National Park for camping, dreams of exploring the bustling streets of Tokyo's Harajuku district, and they prefer packing
    a suitcase with crayons, a favorite picture book, and a stash of stickers for any adventure.
  culinary: Andriana Sharpe favors spaghetti topped with melty mozzarella and a dash of parmesan, enjoys helping bake chocolate chip cookies with brown sugar and vanilla, and they often assemble snack plates
    of sliced strawberries, carrot sticks, and smiley faces made from gummy bears.
  core: Andriana Sharpe is an energetic, structure-loving seven-year-old who balances organized soccer practice with spontaneous LEGO builds, shows kindness in group play, and they occasionally misplace
    homework while thriving on social fun.
background:
  cultural: Andriana comes from a white, Midwestern American background in Galena, Ohio. Her family celebrates typical American holidays—Thanksgiving, Christmas, and the Fourth of July—with community gatherings,
    church services, and seasonal traditions. Growing up in a small‑town environment, she values community involvement, modesty, and cooperation, often participating in school events, church youth groups,
    and local neighborhood activities.
