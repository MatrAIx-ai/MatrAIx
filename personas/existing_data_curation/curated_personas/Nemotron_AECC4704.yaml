  career_goals: Andriana dreams of growing up to become an elementary school teacher who creates a supportive, organized classroom where children can learn, play, and work together. She also hopes to volunteer
    as a youth mentor in her hometown, coordinating group activities, games, and community events that bring kids together and foster cooperation.
