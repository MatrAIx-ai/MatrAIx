    to data structures'']'
  hobbies: '[''Watercolor painting'', ''Digital illustration'', ''Reading speculative fiction'', ''Philosophy and art history books'', ''Writing short stories and poetry'', ''Landscape photography'', ''Crossword
    puzzles and Sudoku'', ''Vegetable gardening'', ''Mindfulness meditation'', ''Attending intimate poetry readings and local art openings'']'
  career_goals: Susan aims to transition from pure data entry to a role that blends data governance with visual communication. In the next three years, she plans to earn a professional certification in
    Data Quality (e.g., ICDQ) and complete coursework in data analysis and visualization. Her long‑term ambition is to become a senior data quality analyst or data operations manager for a regional healthcare
    or energy company in East Texas, where she can lead a team, design robust data‑handling procedures, and integrate aesthetic design principles into dashboards and reports. Simultaneously, she hopes to
    develop a modest freelance portfolio of digital illustrations and blog posts on abstract art and data storytelling, eventually turning those side projects into a supplemental income stream.
