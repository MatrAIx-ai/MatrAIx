  hobbies: '[''Watercolor painting'', ''Pottery'', ''Quilting'', ''Historical fiction reading'', ''Birdwatching'', ''Nature walks'', ''Gardening'', ''Seasonal cooking'', ''Attending gallery openings'',
    ''Book club participation'']'
  career_goals: Although retired, Gloria aims to compile a visual and narrative chronicle of Sioux Falls' evolving cultural scene, with an emphasis on under‑represented artists. She hopes to mentor young
    adults interested in folk arts, volunteer as an art‑program coordinator at the senior center, and complete a series of painting classes focusing on abstract expression. Travel to regional art festivals
    and a planned visit to a museum in New York to study contemporary installations are also on her personal agenda.
