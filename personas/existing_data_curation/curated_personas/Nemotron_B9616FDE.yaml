personas:
  professional: Victor Perez is a retired mechanical engineer who now channels their applied physics background, Python and MATLAB prowess, and bilingual communication skills into leading community STEM
    workshops and mentoring junior engineers, with a laid‑back, curiosity‑driven style that values flexibility over strict schedules.
  sports: Victor Perez enjoys walking along the Hudson River, participates in senior yoga and low‑impact aerobics, and is a loyal fan of the New York Knicks, New York Rangers, and New York Mets, often meeting
    friends for weekly bowling at the Midtown Lanes club, where they cherish the camaraderie of friendly competition.
  arts: Victor Perez expresses creativity through street photography, digital sketching of island landscapes, and regular visits to local galleries where they discuss works by Frida Kahlo, Vincent van Gogh,
    and contemporary muralists, allowing art to shape their worldview as both inspiration and relaxation.
  travel: Victor Perez prefers immersive, leisurely trips that combine cultural heritage and natural beauty, such as annual visits to the Dominican Republic’s coastal towns, weekend retreats in the Adirondacks,
    and occasional exploration of historic sites in Cartagena, balancing limited mobility with a desire to sketch new scenery, and they always return home with fresh inspirations for their art.
  culinary: Victor Perez delights in preparing traditional dishes like mangú, sancocho, and pastelitos using plantains, yucca, cilantro, and adobo seasoning, while they combine intermediate cooking skills
    with a passion for tasting tropical herbs from their rooftop garden and sharing meals at family gatherings.
  core: Victor Perez is a curious, socially vibrant 73‑year‑old who fuses engineering precision with artistic flair, embraces flexibility over strict planning, and occasionally lets disorganization sneak
    into their daily routine.
background:
  cultural: Victor was born to Dominican parents who moved to New York in the early 1960s, growing up in the vibrant Washington Heights neighborhood, a hub of Dominican culture. Spanish was spoken at home,
    and the rhythms of merengue, bachata, and salsa formed the soundtrack of his childhood. The family’s Catholic faith and strong emphasis on multigenerational gatherings instilled values of community,
    hospitality, and respect for tradition. Victor celebrates Dominican holidays such as Día de la Altagracia, Carnaval, and the Feast of St. James, often preparing classic dishes like mangú, sancocho,
    and pastelitos for family and friends. He remains actively involved in local cultural organizations that promote Dominican arts, music, and history, acting as a bridge between the older generation and
    younger, bicultural New Yorkers. His bilingual fluency and deep-rooted connection to both his Caribbean heritage and the multicultural tapestry of New York shape his identity and daily life.
