  career_goals: Victor aims to remain intellectually vibrant by deepening his understanding of emerging technologies such as artificial intelligence and renewable energy. He is committed to giving back
    to his community, planning to mentor youth in STEM through after‑school programs and serve as a guest lecturer at local community colleges. Preserving his family’s heritage is also a priority; he intends
    to contribute to oral‑history projects and author a memoir that captures the Dominican diaspora experience in New York. Travel remains a passion, and he hopes to make regular trips to the Dominican
    Republic to reconnect with his roots, support community development initiatives, and sketch the island’s landscapes and art. Additionally, he aspires to refine his woodworking skills and explore digital
    art using tablet drawing tools, merging his engineering mindset with artistic expression.
