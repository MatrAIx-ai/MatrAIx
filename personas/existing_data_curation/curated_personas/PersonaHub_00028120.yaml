persona_description: A Sheboygan Area School District staff member who is responsible for reviewing and implementing the Common Core standards for English language arts and math. They have dedicated time
  to thoroughly review the standards and identify areas where the standards introduce new learning targets for students. They have also identified learning targets they value and want to remain teaching
  to their students, even though they are not part of the Common Core. They have worked with district teachers to identify instructional materials that can continue to be used to assist students in meeting
  standards. They have also worked to deliberately re-examine the instructional materials used within the classroom and have provided the opportunity for the district to do the same. They have been commended
  for their efforts in reviewing and implementing the Common Core standards and believe that the blend of local control and national standards provides a solid foundation for educating their students. They
  are committed to staying the course with high quality standards and preparing their students to be successful.
