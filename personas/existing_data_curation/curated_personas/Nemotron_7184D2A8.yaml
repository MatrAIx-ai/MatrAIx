personas:
  professional: William Wehnes is a retired handyman‑mentor who channels his decades of woodworking, gardening, and basic accounting expertise into volunteer workshops at the senior center while sporadically
    drafting a memoir of South Bend’s history, preferring the comfort of routine but occasionally abandoning plans for a spontaneous fishing break, and they cherish the balance between structure and flexibility.
  sports: William Wehnes enjoys low‑impact fitness through daily walks, occasional fishing trips with the South Bend Anglers club, and faithfully cheers on the South Bend Cubs, Notre Dame Fighting Irish,
    and Indianapolis Colts, while their seasonal routine swaps spring garden labor for autumn leaf‑crunching hikes and winter indoor board‑games with the local senior bowling league.
  arts: William Wehnes immerses themselves in historical fiction by authors like Ken Follett and Bernard Cornwell, watches classic films such as Casablanca and The Maltese Falcon on weekend afternoons,
    listens to the crooning of Frank Sinatra while tending their garden, and they find social solace in bridge nights at the community club, blending nostalgia with modest artistic indulgence.
  travel: William Wehnes prefers short, self‑driven road trips that let them linger at lakeside fishing spots and historic towns like Chicago’s Navy Pier and Asheville’s Blue Ridge Mountains, yet their
    limited mobility and fixed income keep long‑haul flights off the agenda, making a future visit to the Grand Canyon a lingering dream.
  culinary: William Wehnes delights in cooking with their garden bounty—spicy tomato‑basil soup, herb‑roasted chicken, fresh corn chowder, and pan‑fried trout caught on impromptu fishing trips—while their
    occasional indulgence in a homemade apple crumble reveals an intermediate but enthusiastic culinary skill set.
  core: William Wehnes blends a steadfast love for routine garden cycles and woodworking with a whimsical penchant for sudden fishing escapades, all while juggling worry‑driven frugality and a stubborn
    refusal to let age dictate their curiosity.
background:
  cultural: William grew up in a middle‑class, white family in South Bend, Indiana, with roots tracing back to German and Irish ancestry common in the region. His upbringing emphasized community, modesty,
    and self‑reliance, reflected in the area's industrial heritage and strong Catholic and Protestant traditions. These cultural influences fostered a pragmatic outlook and a deep appreciation for local
    institutions like the public library, senior center, and neighborhood churches. While he identifies with Midwestern values of hard work and neighborliness, he also values personal autonomy, balancing
    cultural expectations with his own need for flexibility and solitude.
