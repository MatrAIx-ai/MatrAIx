persona_description: A young Ugandan, Makerere University graduate Brian Gitta, who is likely to read the above text. Gitta is a computer science student at Makerere University who developed Matibabu, a
  non-invasive device used to test for malaria with smartphones. He has a passion for technology and has developed a solution to address the problem of malaria, which is a disease that kills one child every
  minute in the developing world. Gitta is a problem solver who is driven by a desire to alleviate momentary pain and eliminate needles and the need for a lab, which would limit the risk of infection and
  allow for diagnosis in communities that have no medical centres. Gitta is also a researcher who is interested in developing cost-effective early diagnosis of the illness, reducing the amount of medication,
  the duration of treatment, and the number of people suffering severe effects of malaria infection, without the need for a needle or trained personnel.
