  hobbies: '[''visiting art galleries'', ''photography of prairie landscapes'', ''reading art theory and philosophy'', ''writing poetry'', ''hiking the Red River Valley trails'', ''volunteering at community
    soup kitchen'', ''practicing yoga and meditation'', ''playing board games'', ''cooking experimental dishes'', ''attending live music shows'']'
  career_goals: Christian aims to move into a supervisory role within the next two years, eventually becoming a restaurant manager renowned for integrating art and community engagement into the dining experience.
    He dreams of opening a hybrid gallery‑café in Fargo that showcases local artists, offers workshops, and provides a welcoming space for under‑served populations. To achieve this, he plans to complete
    a bachelor’s degree in Business Administration, earn a Certified Hospitality Supervisor credential, and develop a network of local artists and nonprofit partners. He also hopes to lead a community meals
    program that pairs culinary service with art therapy for individuals facing food insecurity.
