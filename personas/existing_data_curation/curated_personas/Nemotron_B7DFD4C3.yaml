  career_goals: Perry aims to advance from his current supervisory position to a logistics manager role within the next three to five years, pursuing a bachelor’s degree in supply chain management or operations
    while earning industry certifications such as Certified Supply Chain Professional (CSCP). He is particularly interested in leading initiatives that reduce carbon emissions in freight operations, such
    as implementing electric trucks and adopting data‑driven route planning. Long‑term, he envisions launching his own small, sustainable transportation company that balances profitability with community
    and environmental responsibility.
