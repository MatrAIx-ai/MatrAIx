personas:
  professional: Perry Collins, a logistics supervisor with hands‑on expertise in freight scheduling and route optimization, channels their curiosity and competitive drive into creative problem‑solving,
    leading driver training sessions that blend strict safety compliance with innovative efficiency hacks while using basic graphic design to visualize internal communications.
  sports: Perry Collins, a regular at Detroit’s Motor City Hoops pickup basketball league, an avid hiker on the Lake Erie Trail with the Erie Trail Runners club, a summer fisherman who follows the Detroit
    Pistons and Detroit Tigers, balances competitive drills on the court with weekend outdoor escapes and occasional fishing trips to the Lake Erie shoreline.
  arts: Perry Collins, who sketches Detroit’s industrial skyline in charcoal, captures street photography inspired by Vivian Maier, frequents the Museum of Contemporary Art Detroit, volunteers on community
    mural projects alongside local artist T.J. Powers, and curates playlists of indie folk acts like Bon Iver, Fleet Foxes, and Sufjan Stevens to fuel creative sessions.
  travel: Perry Collins, who plans road trips with a spreadsheet of fuel‑efficient routes, enjoys weekend getaways to the Upper Peninsula’s Pictured Rocks, has explored Chicago’s architecture tour, dreams
    of a sustainable adventure in Iceland’s geothermal regions, and balances travel ambitions with the need to save for a future logistics startup.
  culinary: Perry Collins, a moderately skilled home cook, loves grilling fresh Lake Erie trout with a lemon‑dill glaze, tossing seasonal salads with Michigan cherries and goat cheese, preparing fish tacos
    with homemade salsa, and indulging in craft IPA tastings while swapping recipes at the local farmer’s market.
  core: Perry Collins, a competitively curious logistics professional, fuses a love for cityscape art with weekend hikes, obsessively tracks fuel‑efficiency metrics, and balances disciplined saving with
    occasional impulsive purchases of DIY gear.
background:
  cultural: Perry grew up in a middle‑class, working‑class white family in Monroe County, Michigan. His grandparents migrated from northern Europe—Germany and Ireland—in the early 20th century, bringing
    a legacy of practicality, self‑reliance, and a respect for hard work. The region’s Midwestern values of modesty, community involvement, and a strong work ethic shaped his upbringing, while the proximity
    to Detroit’s vibrant art scene sparked his curiosity for creative expression. He maintains close ties with extended family and local friends, often sharing stories of Detroit’s industrial heritage alongside
    discussions about contemporary art and sustainability.
