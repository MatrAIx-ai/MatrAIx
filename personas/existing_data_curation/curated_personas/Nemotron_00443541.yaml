personas:
  professional: Armando Ortiz is a veteran long‑haul trucker with over 35 years behind the wheel, excelling at on‑the‑spot mechanical fixes, route improvisation, and client negotiation, and now mentors
    younger drivers while eyeing a part‑time schedule and a future as a certified trainer and local courier owner.
  sports: Armando Ortiz is an avid fan of the Texas Rangers baseball team and the Dallas Cowboys football squad, attends weekend games when possible, and participates in a local senior fishing club that
    meets at the nearby lake, blending his love for sport with his hands‑on hobby.
  arts: Armando Ortiz’s artistic palate is tuned to classic boleros by Armando Manzanero, the smooth crooning of Luis Miguel, and the gritty riffs of 1970s rock legends like Led Zeppelin and The Doors,
    which they stream on their portable radio while working on diesel engines, and they occasionally visit community theater productions featuring classic Spanish‑language plays.
  travel: Armando Ortiz favors spontaneous road trips in their restored classic truck, charting routes to quirky roadside stops such as the Cadillac Ranch in Texas and the Roswell UFO Museum, while preferring
    budget‑friendly campgrounds and often planning a few days of free time for fishing excursions at distant lakes like Lake Texoma.
  culinary: Armando Ortiz delights in cooking family‑heritage stews, hand‑rolling corn tortillas, and preparing spicy chiles rellenos, using garden‑grown tomatoes and jalapeños, and they often perfect a
    batch of homemade salsa that pairs with their favorite chicken broth for early‑morning meals before heading out on the road.
  core: Armando Ortiz, a 61‑year‑old truck veteran who restores diesel engines, fishes at dawn, and lives to the rhythm of boleros and 70s rock, balances a laid‑back yet anxious spirit with a yearning for
    flexible work and family‑rooted traditions.
background:
  cultural: Armando was born to Mexican immigrant parents who settled in Michigan’s Kent County. He grew up speaking Spanish at home and celebrating Mexican holidays such as Día de los Muertos and Cinco
    de Mayo, often preparing family recipes and sharing stories of his hometown. Although he left school before ninth grade, his family emphasized hard work, respect, and community solidarity, values that
    still guide his daily life. He maintains ties to his cultural roots through food, music, and occasional visits to local Mexican cultural events, while also embracing the Midwestern work ethic and community
    spirit of his adopted home.
