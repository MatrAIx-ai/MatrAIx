  career_goals: She aspires to become a children’s book illustrator who can bring her own stories to life, or a teacher who nurtures creativity in young learners. She also dreams of performing on stage
    as an actress or storyteller and hopes one day to curate a community art exhibition in Glasgow that celebrates local artists and cultural heritage.
