  career_goals: Jessica dreams of turning her love for art and story‑telling into a future career as a multimedia artist or animator. She hopes to attend a specialized high‑school arts program, build a
    strong portfolio of illustrations and short films, and one day work on animated movies or video‑game concepts. In the meantime, she aims to expand her digital art skills, take more advanced video‑editing
    courses, and maybe lead a youth art club at her local community center.
