  career_goals: Colton aims to transition into a senior security leadership role within the next five years, targeting positions such as Senior Security Consultant or Director of Information Security for
    a mid‑size organization. He plans to obtain advanced certifications like CISSP, CISM, and a cloud‑security credential (CCSP) to broaden his expertise in securing hybrid and multi‑cloud environments.
    Long‑term, he envisions shaping a comprehensive security program that balances cutting‑edge technology adoption with pragmatic risk management, while also mentoring the next generation of security professionals
    in his community.
