personas:
  professional: Colton Vincent, a 44‑year‑old information security analyst, blends a natural curiosity for emerging threats with a practical, procedure‑driven style, skillfully uses SIEM platforms like
    Splunk and QRadar, maps controls to NIST, HIPAA, and PCI‑DSS, and energizes cross‑functional teams through clear risk communication and engaging security awareness training as they work toward a senior
    leadership position.
  sports: Colton Vincent plays for the Selinsgrove Titans adult basketball league, hikes the nearby Appalachian Trail sections with the Pennsylvania Trail Club, roots for the Philadelphia 76ers and Pittsburgh
    Steelers, and maintains a fitness routine that blends weekend long hikes, twice‑weekly basketball games, and occasional yoga sessions they skip when volunteer firefighting duties call.
  arts: Colton Vincent participates in the Selinsgrove Community Players, captures the region’s autumn foliage with a Nikon D5600, enjoys board‑game evenings that double as improv storytelling sessions,
    and finds inspiration in the music of Bruce Springsteen, the films of Christopher Nolan, and the classic theater work of Arthur Miller, weaving those influences into their own creative pursuits.
  travel: Colton Vincent prefers road‑trip adventures that combine scenic hikes and historic stops, has explored the Catskills, the Gettysburg battlefield, and a weekend getaway to Washington, D.C., dreams
    of completing a longer Appalachian Trail segment through the Great Smoky Mountains, and balances travel planning with work and family commitments by using a flexible itinerary that leaves room for spontaneous
    board‑game nights with local friends.
  culinary: Colton Vincent cooks at an intermediate skill level, delights in perfecting Pennsylvania Dutch classics like shoofly pie, scrapple, and sauerkraut casserole, experiments with molasses‑glazed
    pork chops and smoked paprika‑infused chicken, sources fresh apples, rye flour, and cabbage from local farms, and often hosts family meals where they proudly showcase both tradition and a modern twist.
  core: Colton Vincent, a 44‑year‑old security professional with a big‑hearted community streak, can be found troubleshooting fire‑alarm alerts one night and perfecting a shoofly pie the next, while they
    juggle board‑games, basketball, and a habit of postponing dental appointments.
background:
  cultural: Colton grew up in the rural‑suburban mix of central Pennsylvania, a region steeped in Pennsylvania Dutch and broader European settler traditions. His family background reflects a blend of German,
    Irish, and Anglo‑American heritage, fostering values of self‑reliance, community service, and modesty. He was raised in a modest, Protestant‑influenced household that emphasized education, hard work,
    and civic participation. Local customs—such as town fairs, harvest festivals, and close‑knit neighborhood gatherings—have shaped his appreciation for collective harmony and collaborative effort. While
    he identifies with the cultural norms of his hometown, his natural curiosity drives him to explore broader perspectives, balancing regional pride with an openness to new ideas.
