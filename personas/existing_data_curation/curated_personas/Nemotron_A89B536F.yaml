personas:
  professional: Victor Garnett, a seasoned heavy‑vehicle service technician with over three decades of hands‑on experience, excels at diagnosing diesel engine performance, overhauling fuel injection systems,
    troubleshooting complex hydraulic circuits, and leading apprentices through methodical, safety‑first maintenance routines, all while channeling their love for structured workflow into a clear path toward
    a supervisory role and eventual boutique repair shop.
  sports: Victor Garnett fuels their love of the outdoors through early‑morning fishing trips on Tampa Bay, cheers on the Tampa Bay Buccaneers and Rays, and plays in a neighborhood adult soccer league,
    while staying active with garden maintenance and weekend jogs along the Riverwalk.
  arts: Victor Garnett stays connected to their island roots by regularly listening to salsa legends like Marc Anthony and Celia Cruz, dancing to bomba rhythms at community nights, attending live performances
    at the Straz Center, and curating a small collection of Caribbean‑inspired artwork that brightens their workshop.
  travel: Victor Garnett dreams of fishing excursions to the Florida Keys and the Gulf Islands, cultural festivals in New Orleans, and a relaxed getaway to a Caribbean island where they can sample fresh
    seafood and explore historic plazas, balancing travel plans with a modest budget and the need to keep their workshop running.
  culinary: Victor Garnett delights in preparing arroz con gandules, pasteles, and lechón during family celebrations, while also mastering grilled grouper caught on their fishing trips, fresh garden salads
    with avocado and cilantro, and pairing meals with homemade sofrito and a splash of rum‑infused glaze, reflecting a blend of island home cooking and Floridian seafood flavors.
  core: Victor Garnett is a methodical diesel technician who balances a love for vintage Chevrolets, early‑morning fishing, garden routines, and salsa dancing with an undercurrent of anxiety that fuels
    both meticulous planning and occasional impulsive tool purchases.
background:
  cultural: Victor was born to Puerto Rican parents who immigrated to Florida in the late 1960s. He grew up bilingual, speaking Spanish at home while attending English-language schools in Tampa. Family
    gatherings were centered around traditional dishes such as arroz con gandules, pasteles, and lechón, and celebrations often featured bomba drums and salsa dancing. The strong sense of community within
    the local Puerto Rican diaspora shaped his cooperative and considerate nature, and he continues to participate in cultural festivals like the annual Noche de San Juan. While he identifies proudly with
    his Puerto Rican roots, Victor also embraces the multicultural fabric of Tampa, merging Caribbean culinary tastes with Floridian outdoor lifestyles.
attributes:
  skills: '[''Diesel Engine Repair'', ''Hydraulic System Maintenance'', ''Electrical System Diagnostics'', ''Preventive Maintenance Scheduling'', ''EPA Emissions Compliance'', ''Safety Protocol Implementation
    (Lock-out/Tag-out)'', ''Technical Documentation and Record-keeping'', ''Apprentice Mentoring and Training'']'
  hobbies: '[''Fishing'', ''Gardening'', ''Salsa & Bomba Music Listening'', ''Community Dance Nights'', ''Classic Car Restoration'', ''Mindfulness Meditation'', ''Journaling'', ''Volunteer Repairs at Senior
    Center'']'
  career_goals: Victor aims to secure a supervisory position within the next two years, overseeing a team of mechanics at a reputable logistics firm in Tampa. He plans to obtain the ASE Master Technician
    certification and a specialized EPA certification for emissions testing to solidify his technical credibility. Long-term, he envisions opening a boutique repair shop that offers personalized service
    to small fleet owners, allowing him to set a predictable schedule that accommodates his need for structured work and reduced stress. He also hopes to develop a training program focused on safe, organized
    maintenance practices for younger technicians.
