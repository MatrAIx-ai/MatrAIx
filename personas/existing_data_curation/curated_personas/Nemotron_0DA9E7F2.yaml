    interdisciplinary coordination'', ''Scientific illustration and technical drawing'', ''Laboratory safety and SOP development'', ''Collaborative problem solving'']'
  hobbies: '[''Street and nature photography'', ''Acoustic guitar playing'', ''Sketching and scientific illustration'', ''Visiting contemporary art galleries and museums'', ''Hiking desert trails (e.g.,
    Camelback Mountain)'', ''Indoor rock climbing'', ''Cooking traditional Mexican dishes'', ''Salsa and bachata dancing'', ''Volunteering at community health fairs'', ''Reading science‑fiction and philosophy'',
    ''Meditation and yoga for stress management'']'
  career_goals: In the next few years, Edgard aims to lead a research project that delivers a biodegradable, bio‑active wound‑healing matrix and to publish the results in high‑impact journals. He is pursuing
    a master's degree in bioengineering to deepen his expertise in regenerative medicine while also seeking a senior R&D role at a med‑tech startup where he can guide product development from concept to
    market. He envisions mentoring junior engineers and fostering a collaborative culture that values both scientific rigor and creative design. Long‑term, Edgard aspires to launch his own biotech venture
    that leverages bio‑fabrication and user‑centered design to create affordable medical devices for underserved communities, particularly those with strong cultural ties to Mexico. He also hopes to become
    an advocate for mental‑health‑aware workplaces, integrating stress‑reduction practices and empathetic leadership into the biotech sector.
