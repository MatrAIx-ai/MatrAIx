personas:
  professional: A bioengineer and budding med‑tech entrepreneur, Edgard Morales leverages their curiosity for art and science to design biodegradable wound‑healing scaffolds, blending rigorous CAD modeling
    and Python automation with an aesthetic eye, while their collaborative nature helps them mentor peers and their worry‑prone mind drives meticulous regulatory documentation.
  sports: A weekend climber and avid hiker, Edgard Morales scales routes at Phoenix Rock Gym and tackles the Camelback Mountain summit after work, while cheering on the Phoenix Suns, Arizona Diamondbacks,
    and Arizona Cardinals, and balances cardio with strength sessions that keep stress at bay.
  arts: An interdisciplinary creator, Edgard Morales captures the desert’s geometry with macro shots reminiscent of Ansel Adams, sketches scientific illustrations inspired by Leonardo da Vinci, strums acoustic
    renditions of José González between sessions, and finds rhythmic release dancing salsa to the beats of Celia Cruz and bachata to Carlos Vives after gallery visits to see the works of Olafur Eliasson
    and Kara Walker.
  travel: A thoughtful explorer, Edgard Morales prefers meticulously planned trips that blend cultural immersion with natural wonder—having trekked the Sonoran Desert’s Saguaro National Park, savored street
    tacos in Oaxaca, and mapping a future pilgrimage to the historic ruins of Machu Picchu while budgeting for occasional weekend getaways to Sedona’s red rocks.
  culinary: A passionate home cook, Edgard Morales whips up authentic mole poblano with pasilla chilies, Mexican chocolate, and sesame seeds, rolls hand‑made tamales using masa harina and pork shoulder,
    and crafts fresh salsa verde with tomatillos and cilantro, showcasing an intermediate skill level bolstered by weekly dinner parties for friends.
  core: Edgard Morales fuses scientific rigor with artistic flair, obsessively perfects their next guitar riff while juggling endless lab data, and can’t resist a nightly cup of espresso that fuels both
    creative bursts and late‑night worry spirals.
background:
  cultural: Edgard was raised in a bilingual Mexican‑American household, speaking Spanish at home and English at school. Family gatherings centered around shared meals, music, and celebrations of holidays
    such as Día de los Muertos and Cinco de Mayo, instilling a deep respect for community and tradition. His parents emphasized the value of education and curiosity, encouraging him to explore both scientific
    and artistic pursuits. Growing up in the Southwest, he absorbed influences from Mexican muralism, vibrant folk art, and the desert landscape, which inform his aesthetic sensibilities in design work.
    While fully integrated into the tech‑forward community of Tempe, Edgard maintains strong ties to his Mexican heritage through cooking, dance, and participation in cultural events, and he often reflects
    on how his dual cultural perspective can enrich biomedical innovation that serves diverse populations.
attributes:
  skills: '[''Biomaterials design and characterization'', ''Tissue engineering and scaffold fabrication'', ''Cell culture and stem cell handling'', ''Microfluidic device development'', ''CAD modeling (SolidWorks)'',
