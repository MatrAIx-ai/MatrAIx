personas:
  professional: Teresita Irizarry, a retired bilingual educator with decades of experience in curriculum design and community outreach, channels their vigorous curiosity into practical, story‑driven lessons
    for adult learners, and while preferring flexibility over strict scheduling, they energetically mentor novice teachers and lead lively Spanish conversation circles at the senior center.
  sports: Teresita Irizarry, a devoted fan of the Miami Dolphins football team and the Inter Miami CF soccer club, watches games at the neighborhood bar and sometimes joins a light‑hearted senior softball
    league, bringing a competitive spirit that keeps them focused on winning rather than camaraderie, and they often coach their teammates on strategy.
  arts: Teresita Irizarry enriches their afternoons with candombe and classic tango recordings by Carlos Gardel and Astor Piazzolla, attends painting workshops at the local community arts center where they
    admire the bold colors of Frida Kahlo and the impressionist brushstrokes of Claude Monet, and often share poetry recitations, balancing their love for tradition with a curiosity for contemporary expression.
  travel: Teresita Irizarry prefers spontaneous day trips along Florida’s coastal route, delighting in a sunlit lunch at Key West’s waterfront cafés and a leisurely stroll through the historic streets of
    St. Augustine, yet they harbor a lingering dream of revisiting the riverbanks of their childhood home, planning those journeys only when cash flows align with their flexible budgeting.
  culinary: Teresita Irizarry, an accomplished home cook, expertly prepares smoky asado, towering chivito sandwiches layered with ham, cheese, and a fried egg, and seasons them with homemade chimichurri
    made from garden‑grown oregano and citrus zest, while they savor a nightly mate brew and occasionally experiment with fresh ceviche using local lime and cilantro.
  core: Teresita Irizarry, an 81‑year‑old retired teacher with a curious mind and a relaxed, slightly disorganized rhythm, spends their days crocheting blankets, fiercely debating board‑game tactics, and
    juggling bill reminders with occasional forgetfulness, all while they savor a nightly mate brew.
background:
  cultural: Born in Montevideo, Uruguay, Teresita emigrated to the United States in her early thirties. She retains a strong Uruguayan identity, preserving traditions such as drinking mate, celebrating
    Carnaval with candombe drum rhythms, and cooking family recipes passed down through generations. Her Catholic upbringing emphasized community and family cohesion. Over the past five decades in Hollywood,
    Florida, she has blended her Latin American roots with the multicultural vibe of South Florida, actively participating in local Hispanic festivals, engaging with a diverse neighbor­hood, and adapting
    to the relaxed coastal lifestyle while still cherishing her South American heritage.
