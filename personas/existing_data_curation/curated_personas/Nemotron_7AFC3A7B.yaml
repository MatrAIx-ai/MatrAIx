  career_goals: Although retired, Teresita aims to stay intellectually active and give back to her community. She hopes to mentor novice teachers through a local adult‑education program, lead a weekly Spanish
    conversation circle for seniors, and organize an annual Uruguayan cultural festival in Broward County that celebrates music, dance, and cuisine. She also aspires to write and self‑publish a memoir that
    weaves her experiences from Uruguay to Florida, and to take occasional online courses on gerontology and digital storytelling to keep her curiosity nurtured.
