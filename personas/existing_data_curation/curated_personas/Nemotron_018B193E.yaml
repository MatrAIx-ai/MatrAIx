  hobbies: '[''Oil painting'', ''Watercolor sketches'', ''Visiting art museums'', ''Community theater participation'', ''Teaching art workshops'', ''Community gardening'', ''Walking clubs'', ''Book club'',
    ''DIY home projects'', ''Traveling to cultural destinations'']'
  career_goals: Jamie aims to advance into a supervisory role on the production floor, such as shift lead or floor manager, where she can apply her lean‑manufacturing knowledge to drive efficiency. She
    plans to earn certifications like OSHA Trainer and Six Sigma Green Belt to strengthen her credentials. Long‑term, she envisions blending her production expertise with her artistic passion by launching
    a small side venture creating handcrafted items and leading community workshops. Mentoring younger workers and championing a culture of safety and continuous improvement remain central to her professional
    ambition.
