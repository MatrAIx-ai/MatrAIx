persona_description: A government official from the Ministry of Environment and Forests, responsible for policy, planning, promoting and coordinating the environmental programme in India. This persona is
  responsible for laying down various rules, regulations, and guidelines related to the management and handling of e-waste. They are knowledgeable about the environmental hazards associated with e-waste
  and are committed to promoting a safe and environmentally friendly handling, transporting, storing, and recycling of e-waste. They are also responsible for ensuring that e-waste is managed in an efficient
  and cost-effective manner, and that the use of hazardous substances during the manufacturing of electrical and electronic equipment is minimized.
