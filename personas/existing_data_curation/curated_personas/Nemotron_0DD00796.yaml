  skills: '["home repair", "woodworking", "project management (construction)", "digital photography", "genealogy research", "local history documentation"]'
  hobbies: '["painting (acrylic and oil)", "visiting museums and art galleries", "reading historical biographies", "gardening", "birdwatching", "model train building", "fishing", "cooking Southern cuisine"]'
  career_goals: In retirement, Donald plans to channel his curiosity and competitive streak into mastering oil painting, aiming to showcase a small collection of his work at the Marietta museum. He also
    aspires to write and self‑publish a memoir that intertwines his family’s genealogy with reflections on Southern history. Volunteer work as a docent for the local historical society and mentoring younger
    hobbyists in woodworking through a community workshop are high on his list. Additionally, he hopes to travel to a few historic art hubs in the Northeastern United States for personal enrichment and
    to broaden his artistic perspective while maintaining a flexible, low‑pressure schedule that eases his tendency toward worry.
