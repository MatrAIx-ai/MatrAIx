personas:
  professional: Donald Collins, a retired construction project manager turned oil painter, draws on decades of hands‑on building, woodworking, and project coordination to meticulously plan and execute their
    art pieces, while their competitive edge fuels a drive to secure a solo exhibition at the Marietta museum and mentor younger hobbyists despite a relaxed, sometimes disorganized approach to deadlines.
  sports: Donald Collins enjoys early‑morning fishing trips on Lake Allatoona, follows the Atlanta Braves and Atlanta Falcons for seasonal excitement, and participates in the local Silver Striders senior
    walking club, yet they approach fitness with a relaxed mindset, preferring leisurely strolls over rigorous workouts.
  arts: Donald Collins immerses themselves in painting both acrylics and oils, draws inspiration from the realism of Andrew Wyeth and the storytelling of folk singer Johnny Cash, frequents the Marietta
    Museum of History’s rotating shows, and captures local landscapes through digital photography, letting the arts serve as both a therapeutic outlet and a bridge to a broader cultural world.
  travel: Donald Collins prefers low‑pressure, week‑long road trips that combine historic art stops—such as Boston’s Museum of Fine Arts, New York’s Metropolitan Museum of Art, and Philadelphia’s Barnes
    Foundation—with quiet evenings fishing at New Hampshire’s Lake Winnipesaukee, balancing their competitive curiosity with the comfort of familiar Southern hospitality and a modest retirement budget.
  culinary: Donald Collins, a confident home cook, specializes in slow‑cooked pork shoulder smoked over hickory, collard greens sautéed with smoked turkey, and peach cobbler made with fresh Georgia peaches,
    often pairing meals with sweet tea brewed from loose leaf black tea and experimenting with a pinch of cayenne for extra heat.
  core: Donald Collins, a 69‑year‑old retired builder turned oil painter, mixes meticulous craftsmanship with a worry‑prone, competitive spirit, often over‑planning art projects while simultaneously overlooking
    routine health checks.
background:
  cultural: Donald was raised in a middle‑class white family in the Atlanta metropolitan area, steeped in Southern traditions such as hospitality, community involvement, and a strong sense of regional history.
    His early life included participation in a Baptist congregation and family celebrations centered around classic Southern meals and music, especially folk and country. While he values these cultural
    roots, his lifelong curiosity has led him to seek out broader artistic and historical experiences, balancing his Southern heritage with a willingness to explore unconventional ideas and new mediums.
