personas:
  professional: Reynier Ramos, a 25‑year‑old financial analyst at a Miami boutique investment firm, blends rigorous financial modeling—including DCF, LBO, and Monte Carlo simulations—with a curious, art‑inspired
    perspective, and they translate complex data into compelling narratives that earn senior stakeholders’ confidence.
  sports: Reynier Ramos starts each day with sunrise jogs along Miami Beach as a member of the Miami Beach Runners Club, roots for the Miami Heat in basketball season, cheers on the Miami Dolphins during
    fall football, and they incorporate salsa dancing into their weekly cardio routine, balancing structured workouts with rhythmic movement.
  arts: Reynier Ramos spends weekends wandering Wynwood’s vibrant murals, admiring works by artists such as Kehinde Wiley and Njideka Akunyili‑Crosby, and they regularly attend live performances by salsa
    legends like Celia Cruz and Latin‑jazz virtuoso Chucho Valdés, which fuel both their painting of cityscapes and their deep appreciation for rhythmic storytelling.
  travel: Reynier Ramos favors meticulously planned cultural trips that blend art museum tours with local cuisine experiences, having explored the historic streets of New Orleans, the street‑art scene of
    Berlin, and the colonial charm of Cartagena, they now dream of a sunrise hike in Reykjavik’s Golden Circle and a weekend retreat in the Colombian coffee region, balancing adventure with moments of relaxed
    beach lounging.
  culinary: Reynier Ramos enjoys cooking traditional Cuban staples like ropa vieja and arroz con pollo with a home‑grown flair for seasoning, they masterfully balance smoky sofrito with fresh cilantro,
    while also experimenting with international flavors like miso‑glazed salmon and hand‑rolled sushi, reflecting a self‑taught culinary confidence that thrives in weekend kitchen sessions.
  core: Reynier Ramos, a 25‑year‑old financial whiz with a penchant for late‑night espresso, paints urban skylines after work, mentors high‑schoolers on personal finance, and they occasionally forget to
    water their succulents amidst a bustling schedule.
background:
  cultural: Reynier was raised in Miami’s Little Havana, immersed in a vibrant Cuban‑American community. His parents emigrated from Cuba, and at home Spanish is spoken alongside English, giving him fluency
    in both languages. Cuban cultural traditions—such as celebrating Carnaval, listening to son, salsa and timba, and gathering for family meals featuring dishes like lechón asado—are central to his identity.
    He participates in community events at the Calle Ocho Festival and maintains strong ties with extended family, reflecting the collectivist orientation typical of Cuban families. This background instills
    a deep appreciation for music, storytelling and resilience, and it informs his desire to give back through mentorship and culturally‑focused investment initiatives.
attributes:
  skills: '[''Financial modeling (DCF, LBO, Monte Carlo)'', ''Advanced Excel and VBA'', ''Python for data analysis'', ''SQL querying'', ''Data visualization (Tableau, Power BI)'', ''Investment research
    and market analysis'', ''Risk assessment and portfolio analytics'', ''Bilingual communication (Spanish/English)'', ''Presentation and storytelling'', ''Analytical problem solving'', ''Cross‑cultural
    collaboration'', ''Attention to detail'']'
  hobbies: '[''Visiting contemporary art galleries'', ''Salsa and Latin jazz dancing'', ''Painting and sketching'', ''Cooking Cuban cuisine'', ''Beach jogging'', ''Chess'', ''Reading behavioral economics'',
    ''Traveling to Caribbean destinations'', ''Volunteering for financial‑literacy workshops'', ''Attending cultural festivals'']'
  career_goals: Reynier aims to become a senior investment analyst within the next three years, earn the CFA charter, and lead a team that manages a diversified portfolio for a boutique firm. In the longer
    term, he aspires to launch a socially‑responsible investment fund that supports emerging artists and cultural entrepreneurs in the Caribbean and Latin America, merging his passion for art with his financial
    expertise. He also hopes to mentor underrepresented youth in Miami’s Cuban community through financial‑literacy workshops and to become a speaker at industry conferences on the intersection of culture
    and capital markets.
