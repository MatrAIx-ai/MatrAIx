personas:
  professional: Dario Mella, a 38‑year‑old budget analyst renowned for turning dense Excel models and VBA macros into clear‑cut forecasts, blends his data‑driven curiosity with a practical, GAAP‑grounded
    approach to guide senior leadership on strategic budgeting decisions while mentoring junior staff.
  sports: Dario Mella, an avid hiker of the Blue Ridge trails and member of the Asheville Mountain Bikers Club, enjoys weekend group rides with friends, roots for the Charlotte Hornets during basketball
    season, and practices yoga twice a week to balance his active lifestyle.
  arts: Dario Mella channels his creative side through acoustic guitar, weaving folk verses from Bob Dylan with flamenco riffs inspired by Paco de Lucía, while regularly attending performances by the local
    theater troupe and collecting limited‑edition prints of Frida Kahlo’s work.
  travel: Dario Mella prefers meticulously planned yet flexible road trips, having explored the historic streets of Barcelona, the vineyards of Tuscany, and the scenic byways of the Blue Ridge Parkway,
    while dreaming of a future trek along the Camino de Santiago when family commitments ease.
  culinary: Dario Mella masters the art of paella, meticulously toasting bomba rice with saffron, chorizo, and fresh seafood, while also perfecting gazpacho with heirloom tomatoes and crafting tapas platters
    featuring jamón, olives, and manchego cheese for dinner gatherings with colleagues.
  core: Dario Mella balances spreadsheet precision with spontaneous guitar sessions, hikes solo for mental clarity, and habitually orders triple‑shot espresso to fuel his endless curiosity, all while occasionally
    forgetting to water his houseplants.
background:
  cultural: Dario was born in Salisbury to parents who emigrated from Andalusia, Spain, in the early 1990s. He grew up bilingual, speaking both Spanish at home and English in school, which gave him a fluid
    cultural identity. Family gatherings often feature Spanish cuisine, music, and the annual celebration of Semana Santa, reinforcing his connection to his heritage. While he embraces the values of his
    Spanish upbringing—such as the importance of community, hospitality, and a balanced approach to work and leisure—he also identifies strongly with the Southern hospitality of North Carolina, integrating
    local customs like outdoor barbecues and an appreciation for regional history. This blend of Mediterranean and Southern influences shapes his worldview, prompting him to seek collaborative solutions
    while respecting diverse perspectives.
