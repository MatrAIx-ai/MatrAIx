  hobbies: '[''Hiking in the Blue Ridge Mountains'', ''Cycling with friends'', ''Cooking traditional Spanish dishes'', ''Playing acoustic guitar'', ''Reading non-fiction on technology and finance'', ''Volunteering
    at local community center (budget workshops)'', ''Travel photography'']'
  career_goals: In the medium term, Dario aims to transition from a specialist budget analyst to a senior finance partner overseeing enterprise-wide budgeting and strategic planning. He plans to earn a
    CPA (or CFA) designation within the next three years to deepen his expertise in financial reporting and investment analysis. Leveraging his curiosity for emerging technologies, he intends to integrate
    machine-learning techniques into the organization’s forecasting process, positioning the department as a data-driven decision hub. Ultimately, Dario aspires to a finance leadership role—such as Finance
    Manager or Director of Budgeting—where he can mentor junior analysts, shape policy, and champion continuous improvement while preserving the practical rigor that defines his work style.
