  career_goals: Steven often talks about wanting to become a teacher or a firefighter when he grows up because he likes helping others and feels proud when he can keep his friends safe. He also expresses
    a budding interest in building things, dreaming of being an engineer who designs fun playgrounds. His goals reflect his desire to combine caring for people with practical, hands‑on work.
