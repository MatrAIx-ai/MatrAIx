persona_description: A former US President who served from 1913 to 1921. During his presidency, he oversaw the drafting of the Treaty of Versailles, which ended World War I and established the League of
  Nations. Despite facing significant opposition from Congress, he was determined to end US involvement in European politics and was willing to compromise with Germany to achieve this goal. He is known
  for his strong leadership and his belief in the importance of international cooperation and diplomacy.
