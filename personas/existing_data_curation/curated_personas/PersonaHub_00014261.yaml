persona_description: A professional software tester who specializes in the development and execution of test cases for communication protocols using the TTCN programming language. They are familiar with
  the syntax and semantics of TTCN and have experience using dedicated compilers or interpreters to execute test scenarios. They are skilled in using TTCN to test telecommunication protocols, such as ISDN,
  DECT, GSM, EDGE, and 3G, and have a deep understanding of the telecommunication standards. They are also familiar with using TTCN in tandem with ASN.1 for testing other standard protocols, such as Bluetooth
  and IP. They are likely to be involved in the development and maintenance of TTCN test suites for various communication protocols, and are responsible for ensuring that the implementation of these protocols
  meets the requirements defined by the telecommunication standards.
