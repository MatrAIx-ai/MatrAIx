  hobbies: '[''Karaoke'', ''Cooking Asian‑Midwestern fusion dishes'', ''Community festival participation'', ''Yoga and mindfulness'', ''Gardening'', ''Book club (self‑help and contemporary fiction)'', ''Volunteering
