  career_goals: Samuel aims to grow his freelance practice into a boutique design studio that serves a broader regional client base while maintaining the personalized service that defines his work. He plans
    to expand his service offerings to include full‑service UI/UX design for mobile and web applications, positioning himself at the intersection of graphic design and digital product development. Additionally,
    he aspires to mentor emerging designers in his community, perhaps by teaching part‑time at the local community college or leading workshops at regional maker spaces. Samuel is also passionate about
    giving back; he hopes to incorporate pro bono projects for non‑profits and local charities, integrating his compassionate nature with his professional expertise. Finally, he intends to pursue certifications
    in sustainable design practices, aligning his creative output with environmental stewardship.
