personas:
  professional: Hung Nguyen, a 1‑year‑old who already shows a fascination with cause‑and‑effect by stacking blocks and mimicking adult conversations, hints at a future in engineering where they will apply
    their practical curiosity and cooperative nature.
  sports: Hung Nguyen, a giggling fan of the Baltimore Orioles who enjoys crawling on the grass at the local park and taking part in parent‑guided baby gymnastics classes, balances early motor‑skill development
    with family‑centered play and often cheers loudly when they see a home run.
  arts: Hung Nguyen, who sways to the gentle sounds of traditional lute music during Tet celebrations and delights in colorful picture books featuring popular animated characters, expresses creativity through
    scribbling with chunky crayons, and they proudly display each new masterpiece on the fridge.
  travel: Hung Nguyen, who has already taken a stroller‑friendly road trip to the Chesapeake Bay for a day at the beach and visited grandparents in the historic district, prefers short, family‑led excursions
    but daydreams about seeing the fireworks over the Bay Bridge, and they always point excitedly at any map they see.
  culinary: Hung Nguyen, who loves the smooth texture of chicken congee with shredded carrots and the occasional bite of avocado toast, is learning to self‑feed with soft‑grip spoons and delights in the
    aromatic scent of ginger‑infused broth at family meals, and they often giggle when a spoon clinks against the bowl.
  core: Hung Nguyen is a curious, cooperative 1‑year‑old whose early love for stacking blocks, family rituals, and gentle routines shapes a balanced outlook, even if they sometimes throw their favorite
    plush toy when overstimulated.
background:
  cultural: Hung belongs to a Vietnamese-American family in Baltimore County. At home, he hears Vietnamese spoken alongside English, and celebrates cultural traditions such as Tet (Lunar New Year) and the
    Mid-Autumn Festival. His family values harmony, respect for elders, and community ties, which shape his cooperative and considerate nature. The multicultural environment of Baltimore provides opportunities
    for him to experience both Southeast Asian customs and broader American cultural activities.
