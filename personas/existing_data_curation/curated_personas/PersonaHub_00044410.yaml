persona_description: A climate scientist who specializes in understanding and predicting the impacts of climate change on the Puget Sound region. She has conducted extensive research on the expected time
  of emergence for climate change and is developing a tool to help planners and scientists consider climate change in their research and decisions. Her work in Puget Sound is the first time this approach
  has been taken at the local ecosystem level, and she hopes the tool can eventually be used to identify priority areas for more detailed analysis to support climate risk reduction.
