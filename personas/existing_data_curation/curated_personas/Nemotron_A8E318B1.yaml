  hobbies: '[''Sketching and watercolor painting'', ''Reading fantasy and science‑fiction novels'', ''Nature journaling and wildlife observation'', ''Playing piano'', ''Building LEGO creations'', ''Basic
    science experiments (e.g., slime, volcano)'', ''Digital illustration using a tablet'', ''Watching educational documentaries'']'
  career_goals: Anna dreams of a future where she can blend her love of art and curiosity about the natural world. She aspires to become a children’s book author‑illustrator, creating stories that spark
    imagination while teaching environmental awareness. She also entertains the idea of working as a wildlife photographer or museum curator, roles that allow solitary, focused work and the chance to share
    discoveries with others. In the short term, she hopes to earn a scholarship for a specialized art program, develop a strong portfolio, and continue building her skills in both visual storytelling and
    basic scientific research.
