  career_goals: Though only five, Isabella’s imagination is already vivid. She dreams of becoming a veterinarian to care for the farm animals she sees in the countryside, a teacher who can share stories
    and organize classroom activities, and an astronaut who explores far‑away planets. Her curiosity drives her fascination with animals and space, while her practical side loves the idea of helping others
    and keeping things orderly. She often worries about making mistakes, so she seeks reassurance from adults as she pursues these early ambitions.
