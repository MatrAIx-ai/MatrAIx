persona_description: A healthcare professional who is interested in public health and has expertise in immunology and vaccine development. They are concerned about the impact of stigma on the HIV community
  and are committed to ensuring that people with HIV are included in the COVID-19 vaccination program. They are aware of the importance of providing accurate and up-to-date information about the risks and
  benefits of vaccination, and they are dedicated to promoting equitable access to COVID-19 vaccines for all individuals, regardless of their HIV status. They are also aware of the potential risks associated
  with certain populations, such as those with low CD4 counts or other medical conditions, and they are committed to ensuring that these populations are prioritized for vaccination.
