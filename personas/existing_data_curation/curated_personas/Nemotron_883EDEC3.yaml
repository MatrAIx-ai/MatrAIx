  hobbies: '[''Hosting tea gatherings'', ''Bingo leagues'', ''Bridge tournaments'', ''Gardening'', ''Knitting and crocheting'', ''River walks'', ''Community festivals'', ''Neighborhood clean‑up volunteering'']'
  career_goals: Even at 67, Amber is motivated to stay active in her profession. She aims to achieve a certified professional cleaner (CPC) credential and to be promoted to shift supervisor, where she can
    formalize her mentorship role and oversee a small team. Amber also hopes to introduce a green‑cleaning program at her workplace, reducing chemical use and waste. Looking ahead, she plans to transition
    to part‑time work while continuing to train younger staff, and eventually to start a modest home‑cleaning side business that serves fellow seniors in the Bath community, allowing her to maintain independence
    and stay socially engaged.
