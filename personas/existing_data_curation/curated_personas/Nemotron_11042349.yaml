personas:
  professional: Maria Jimenez, a 23‑year‑old first‑line retail supervisor, leverages her practical mindset and data‑driven sales analysis to craft efficient schedules, enforce policies, and drive her store’s
    performance, while consciously tempering her competitive edge with a calm presence for her team.
  sports: Maria Jimenez follows soccer fervently, cheering for Club América during televised matches with a small circle of friends, participates in a community‑run co‑ed recreational league that plays
    on Saturday mornings at the local park, and supports the Los Angeles Dodgers as a secondary baseball interest during the summer.
  arts: Maria Jimenez immerses herself in regional Mexican music, regularly listening to Los Tigres del Norte and Natalia Lafourcade while cooking, devours mystery novels by Agatha Christie and Tana French,
    and occasionally watches films starring Gael García Bernal, finding these creative outlets a soothing counterpoint to her busy work life.
  travel: Maria Jimenez prefers low‑key travel, having taken weekend road trips to Santa Fe for its art markets and to San Miguel de Allende to explore historic plazas, while dreaming of a future cultural
    pilgrimage to Oaxaca to study traditional cuisine after she secures her district manager promotion.
  culinary: Maria Jimenez blends practical cooking with tradition, mastering dishes like pozole rojo, chiles en nogada, and carnitas using fresh corn masa, poblano peppers, and locally sourced limes, and
    enjoys tweaking family recipes while sharing plates at church potlucks and intimate family gatherings.
  core: Maria Jimenez is a detail‑oriented retail leader who channels competitive ambition into structured store improvements, balances anxiety with yoga, cooks bold Mexican flavors, and safeguards her
    finances with disciplined budgeting—though she occasionally succumbs to late‑night cereal cravings.
background:
  cultural: Maria is a first‑generation Mexican‑American raised in Ceres, California, a community with deep agricultural roots. She grew up bilingual, speaking Spanish at home and English at school, and
    her family maintains strong ties to Mexican traditions such as Día de los Muertos, quinceañeras, and weekly family meals centered on homemade cuisine. The close‑knit nature of the local Hispanic community
    has reinforced values of respect, hospitality, and collective responsibility. While she appreciates these cultural influences, Maria also navigates the pressures of balancing her family's expectations
    with her personal drive for structured career growth.
