  career_goals: In the short term, Maria aims to be promoted to assistant store manager within the next two years, seeking a Retail Management Certificate and targeted leadership workshops to sharpen her
    supervisory skills. Her longer‑term ambition is to become a full store manager and eventually a district manager, overseeing multiple locations while implementing structured operational improvements.
    Recognizing her high emotional reactivity, she also plans to enroll in a community college business administration program that offers stress‑management resources, allowing her to blend career advancement
    with personal well‑being strategies.
