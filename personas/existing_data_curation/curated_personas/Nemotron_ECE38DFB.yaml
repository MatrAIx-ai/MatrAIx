personas:
  professional: Migdalia Cruz, a disciplined teen coder, channels her curiosity for sci‑fi worlds and practical problem‑solving into creating story‑driven games on Scratch and Python, meticulously planning
    each project timeline while collaborating assertively with classmates in her school’s coding club.
  sports: Migdalia Cruz attacks as a forward for the Eastside Tigers youth soccer club, structures her training around school with disciplined interval drills, looks to the strategic style of LA Galaxy
    as a model, and cheers on the city’s professional basketball team, the River City Kings, for off‑season cardio inspiration.
  arts: Migdalia Cruz blends her love for sci‑fi graphic novels such as Saga and Watchmen with a passion for photography inspired by Annie Leibovitz, while dancing to folkloric rhythms in her school club
    and listening to BTS and Rosalía, shaping a vibrant artistic identity that fuels both her storytelling games and visual journals.
  travel: Migdalia Cruz, who plans trips with a meticulous spreadsheet, enjoys weekend hikes to the nearby Red Rock Canyon and dreams of immersive cultural trips to Kyoto’s historic temples and Barcelona’s
    vibrant street art scene, balancing the family’s modest budget with a yearning for adventure.
  culinary: Migdalia Cruz, a confident home‑cook, spends Saturday afternoons perfecting masa for tamales, crafting smoky chipotle salsa, and experimenting with fusion dishes like quinoa‑filled tamale tacos
    topped with avocado crema, while also savoring local Mexican street‑food staples whenever she dines out.
  core: Migdalia Cruz is a disciplined, curiosity‑driven teen who fuses sci‑fi storytelling, organized coding, and cultural cooking into a balanced life of creative projects, athletic focus, and thoughtful
    budgeting.
background:
  cultural: Migdalia is the daughter of Mexican immigrants who settled in Albuquerque, NM. She grew up speaking Spanish at home and English at school, creating a bilingual household that values both cultures.
    Her family celebrates Mexican traditions such as Día de los Muertos, La Posada, and quinceañera ceremonies, while also participating in local Mexican‑American festivals and community events. The blend
    of Mexican heritage with the Southwest’s cultural mosaic—including Native American influences in Bernalillo County—shapes her inclusive worldview. Her Catholic upbringing and strong ties to an extended
    family emphasize community, respect, and perseverance.
