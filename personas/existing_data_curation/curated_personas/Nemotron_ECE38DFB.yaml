  career_goals: Migdalia aims to graduate high school with honors and secure a scholarship to study either biomedical engineering or nursing at a university. She wants to merge her passion for science with
    a commitment to improving healthcare access in her community, eventually designing low‑cost medical devices or working as a health advocate. In the near term, she plans to attend a STEM summer program,
    earn certifications in First Aid and CPR, and deepen her coding expertise through advanced courses. She also hopes to become a role model for younger Latina girls, encouraging them to pursue STEM pathways.
