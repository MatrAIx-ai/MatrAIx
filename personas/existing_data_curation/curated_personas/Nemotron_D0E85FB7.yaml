personas:
  professional: Adriana Shelley, a 32‑year‑old front‑desk professional, leverages their knack for friendly greetings, Excel‑based tracking, and infectious curiosity to streamline office workflows, while
    their relaxed approach sometimes leads to spontaneous, improvisational solutions that keep the reception area humming.
  sports: Adriana Shelley embraces an active lifestyle through weekly Zumba classes, Saturday hikes along the Natchez Trace, and cheering for the Memphis Grizzlies in basketball and the Nashville Predators
    in hockey, while also participating in the local Greenwood Springs running club.
  arts: Adriana Shelley finds artistic fulfillment dancing to the salsa rhythms of Celia Cruz and the country twang of Dolly Parton, diving into popular‑science books by Carl Sagan, and hosting board‑game
    nights that often feature Stonemaier Games titles such as Scythe.
  travel: Adriana Shelley prefers spontaneous weekend getaways, often packing a cooler for a day hike along the Natchez Trace or a short road trip to Nashville’s music scene, while keeping a mental list
    of dream destinations like Asheville’s Blue Ridge Parkway and the historic streets of Charleston for future longer vacations.
  culinary: Adriana Shelley enjoys experimenting in the kitchen with Southern comfort dishes such as shrimp and grits, fried chicken with a buttermilk crust, and collard greens spiced with smoked paprika,
    regularly adding a dash of hot sauce and fresh okra to elevate the flavor of backyard potluck meals.
  core: Adriana Shelley is a curiosity‑driven community enthusiast who balances a relaxed, occasionally disorganized schedule with unstoppable energy for dancing, data, and Southern spice, all while keeping
    a mental spreadsheet of life’s next adventure.
background:
  cultural: Adriana grew up in a close‑knit town in North Mississippi, steeped in Southern hospitality and community traditions. Her family has long‑standing ties to local churches—she was raised in a Methodist
    congregation that emphasizes fellowship, service, and regular communal gatherings. She cherishes regional customs such as Sunday potlucks, church picnics, and the annual county fair, which showcase
    local music, crafts, and comfort food. While her heritage is primarily white Southern, her college experience broadened her perspective, fostering an appreciation for diverse viewpoints and encouraging
    her to be an inclusive participant in community life. The rhythms of blues, country, and gospel music, as well as a love for outdoor activities along the Natchez Trace, shape her sense of identity and
    inform her friendly, outgoing demeanor.
