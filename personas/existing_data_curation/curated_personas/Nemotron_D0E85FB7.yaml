  career_goals: Adriana aims to transition from her current receptionist role into an office manager or administrative coordinator position where she can blend her people‑skills with her analytical background.
    She plans to earn a Certified Administrative Professional (CAP) credential and take workshops in project management and advanced Excel to strengthen her organizational capabilities. While she values
    flexibility, she is working on building more structured time‑management habits to support larger responsibilities. In the longer term, she hopes to leverage her STEM knowledge to coordinate community
    outreach programs or data‑focused projects that connect local businesses with regional development initiatives.
