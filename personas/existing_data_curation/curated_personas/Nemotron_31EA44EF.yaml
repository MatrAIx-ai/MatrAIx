  hobbies: '[''visiting art galleries and museums'', ''urban sketching'', ''exploring Columbus street art'', ''reading contemporary fiction'', ''hiking in local parks'', ''DIY upcycling crafts'', ''attending
    live music shows'', ''volunteering at community events'', ''cooking experimental recipes'', ''playing board games with friends'']'
  career_goals: Cindy aims to advance within the logistics field by obtaining certifications in forklift operation and OSHA safety, and eventually moving into a supervisory or logistics coordinator role.
    She plans to complete her associate degree in supply chain management, leveraging her hands‑on experience to bridge practical operations with analytical planning. Long‑term, she hopes to mentor new
    workers, contribute to process‑improvement projects, and perhaps explore a side venture that combines her interest in art and upcycled materials with her material‑handling background.
