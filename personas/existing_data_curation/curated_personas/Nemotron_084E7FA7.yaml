personas:
  professional: Brandon Cutts, a 44‑year‑old full‑stack developer fluent in JavaScript, Python, and C++, leverages his curiosity and competitive streak to craft responsive, art‑infused UI/UX while championing
    agile code reviews, though his relaxed approach to deadlines sometimes leads to last‑minute sprint crunches.
  sports: Brandon Cutts hikes the Flint Hills with his local trek club, plays in a weekend recreational soccer league, and follows the Kansas City Chiefs and the Kansas City Royals, while his DIY fitness
    routine blends yoga stretches for back relief with occasional high‑intensity interval training to stay agile.
  arts: Brandon Cutts channels his love for visual experimentation into generative art using p5.js, captures urban textures in black‑and‑white photography, strums acoustic renditions of Sufjan Stevens,
    and draws inspiration from artists like Yayoi Kusama and the street‑art mystique of Banksy.
  travel: Brandon Cutts prefers spontaneous road trips—his recent detour to Portland’s indie music scene and a weekend in Austin’s food trucks—while dreaming of a tech‑culture pilgrimage to Kyoto’s temples,
    balancing a modest travel budget with the freedom to work remotely.
  culinary: Brandon Cutts relishes farm‑to‑table cooking, often whipping up a smoky grilled steak with chimichurri, spicy ramen topped with soft‑boiled eggs, and experiments with cumin‑infused roasted vegetables,
    though his busy schedule sometimes leads to microwave meals and a fondness for late‑night pizza slices.
  core: Brandon Cutts is a curiosity‑driven tech artisan who blends competitive coding with DIY art, occasionally lets disorganization slip, yet constantly seeks creative intersections between code, canvas,
    and community.
background:
  cultural: Brandon grew up in a middle‑class white family in the Midwest, with deep ties to the values of community, self‑reliance, and modesty typical of Olathe, Kansas. His upbringing emphasized hard
    work, local involvement (church groups, neighborhood sports), and a pragmatic worldview, yet his education and professional experiences exposed him to diverse cultures and progressive ideas. This blend
    fuels his openness to unconventional thinking while retaining a grounded, flexible approach to life and work.
