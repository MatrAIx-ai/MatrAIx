    communication and harmony facilitation", "Post‑event data analysis and reporting"]'
  hobbies: '["Sketching and watercolour painting", "Reading art and design literature", "Nature hiking and landscape photography", "Yoga and mindfulness meditation", "Cooking traditional Guatemalan cuisine",
    "Home gardening with native herbs and flowers", "Visiting quiet art galleries", "Listening to classical and Latin American music", "Volunteering at community literacy programs"]'
  career_goals: Eyleen aims to progress from managing regional conventions to becoming a senior director of events at a nationally recognized conference center, where she can shape large‑scale, culturally
    rich gatherings. She aspires to launch her own boutique agency that specializes in immersive, art‑focused conventions that prioritize sustainability and attendee wellbeing. A key personal ambition is
    to embed mental‑health considerations into event design—such as quiet reflection spaces and low‑stimulus environments—reflecting her own sensitivity to stress. Additionally, she seeks mentorship opportunities
    to support emerging planners, particularly those from underrepresented backgrounds, and hopes to be recognized as a thought leader who bridges business acumen with artistic curiosity.
