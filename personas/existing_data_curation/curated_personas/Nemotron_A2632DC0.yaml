personas:
  professional: Eyleen Arriaga, a 33‑year‑old event specialist, merges razor‑sharp logistical expertise—budget creation, vendor negotiations, and hybrid‑tech fluency—with a curatorial sensibility that weaves
    folk festival motifs and vibrant textile patterns into each program, while thriving in solitary workspaces that let her balance meticulous organization with spontaneous artistic flourishes.
  sports: Eyleen Arriaga channels her love of quiet movement into early‑morning hikes on the Blue Ridge Trail, is a member of the Savannah Outdoor Club, occasionally plays recreational volleyball at the
    community center, and cheers for the Atlanta Falcons (NFL) and Atlanta United (MLS) during the seasons.
  arts: Eyleen Arriaga spends evenings sketching watercolors of historic courtyards, finds inspiration in the paintings of Georgia O’Keeffe and the modernist designs of Zaha Hadid, frequently visits the
    High Museum of Art, and tunes into classical piano recordings by Beethoven along with Latin folk marimba ensembles such as Grupo Marimba Luz.
  travel: Eyleen Arriaga prefers meticulously planned retreats that blend low‑stimulus environments with creative spark—she has documented sunrise hikes in the Great Smoky Mountains, a week‑long art tour
    in Florence, and a quiet weekend in Asheville’s mountain lofts—while budgeting for future trips to the Japanese tea‑house districts of Kyoto.
  culinary: Eyleen Arriaga’s kitchen is a laboratory for cultural palate, regularly preparing fragrant pepian with roasted chiles, earthy kak'ik broth spiced with coriander and ají, and harvesting fresh
    cilantro, epazote, and rosemary from her herb garden to season both traditional family dishes and experimental vegetable‑forward plates.
  core: Eyleen Arriaga blends meticulous event strategy with a solitary artist’s eye, constantly battling worry‑driven perfectionism while finding calm in yoga, color, and quiet culinary experiments.
background:
  cultural: Eyleen is a first‑generation American of Guatemalan descent, raised in a bilingual household where Spanish and English were spoken interchangeably. Her family maintains cultural traditions such
    as celebrating Día de los Padres with homemade tamales and participating in local festivals that showcase marimba music and folk dance. These experiences have instilled in her a deep appreciation for
    vibrant colors, intricate textile patterns, and communal storytelling—all of which influence her aesthetic choices in event design. While she embraces her Guatemalan heritage, she also identifies with
    the Southern hospitality of Georgia, blending warm, inclusive social norms with her personal preference for solitude. This dual cultural lens equips her to navigate diverse client expectations, honor
    multicultural values, and infuse events with a nuanced sense of place.
attributes:
  skills: '["Event logistics coordination", "Budget creation and monitoring", "Vendor negotiation and relationship management", "Creative concept development with artistic integration", "Risk assessment
