persona_description: A teacher with a passion for helping students with reading and learning disabilities. She has a master's degree in teaching learning disabilities and emotional disturbance and has successfully
  helped many students with their reading problems. She has experience using a method to help students with reading problems by using hearing, saying, writing the letters, visually decoding, and sounding
  the words. She has successfully used her method with students with many and varied learning problems, and with multiple texts. Her experience teaching reading is that many words in the English language
  are more translucent in this area; at times the words become almost opaque! She has also written a book on the topic of reading difficulties.
