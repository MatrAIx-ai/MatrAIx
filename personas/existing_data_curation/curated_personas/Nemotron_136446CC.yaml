  hobbies: '[''visiting local art galleries'', ''sketching countryside scenes'', ''digital photography'', ''hiking in Sumter National Forest'', ''volunteering at Greenwood Food Bank'', ''reading contemporary
    fiction'', ''attending community theater'', ''exploring new ideas through online art courses'']'
  career_goals: Faith aims to advance within the supply chain field by first completing an associate degree in logistics at a community college near Greenwood. She aspires to become a warehouse supervisor,
    leveraging her organizational strengths and people‑focused attitude to lead a cohesive team. Long‑term, she hopes to transition into supply chain analysis or logistics coordination for a nonprofit organization
    that distributes essential goods during emergencies, merging her desire to help others with her logistical expertise. Continuing her personal growth, Faith plans to take art‑related electives to keep
    her creative perspective sharp, which she believes can inspire innovative solutions in her professional role.
