  hobbies: '[''Pickup basketball'', ''Multiplayer video gaming (e.g., Fortnite, Among Us)'', ''Custom PC building and electronics tinkering'', ''Cycling and bike maintenance'', ''Listening to rock/indie
    music'', ''Volunteering at the local animal shelter'', ''Community theater workshops'', ''Sketching comic characters'']'
  career_goals: Kyle aims to secure a stable, hands‑on career that blends his practical skills with his love for group interaction. He is interested in pursuing an apprenticeship in automotive technology
    or a certification program in culinary arts through a local trade school or community college. Simultaneously, he envisions a role that allows him to contribute to his community—such as working at a
    youth recreation center, assisting with after‑school programs, or joining a non‑profit focused on teen mentorship. Obtaining additional credentials in HVAC or welding is also on his radar, as these
    fields offer clear routines, predictable tasks, and the chance to work alongside others. Ultimately, Kyle seeks a career path that provides a structured environment to reduce his worry, while still
    offering flexibility and social engagement.
