personas:
  professional: Kyle Haney, a 16‑year‑old high school junior, combines a natural knack for troubleshooting electronics, building custom PC rigs, and basic automotive repairs with a collaborative spirit,
    frequently leading after‑school tech workshops and community‑center basketball games while planning to enroll in an automotive technology apprenticeship that promises clear routines and team‑focused
    work.
  sports: Kyle Haney thrives on the fast‑paced energy of pickup basketball at the local community center, competes in the town’s youth soccer league with the Thunderhawks FC, and passionately follows the
    professional football team the River City Raptors, often flashing their jersey during games.
  arts: Kyle Haney fuels their creative spark by listening to Arctic Monkeys and Tame Impala while sketching original comic characters inspired by indie creators, and they regularly participate in community
    theater workshops where they admire the dynamic performances of Lin‑Manuel Miranda’s musical numbers.
  travel: Kyle Haney dreams of a summer road trip down the Pacific Coast Highway to explore the cliffs of Big Sur, the vibrant streets of San Francisco, and the snow‑capped peaks of Yosemite, while budgeting
    for affordable hostel stays and planning the itinerary with friends to balance adventure and cost.
  culinary: Kyle Haney enjoys whipping up quick meals like loaded nachos, chicken teriyaki stir‑fry, and banana‑pancake stacks topped with fresh berries, experimenting with different sauces and spices while
    occasionally burning popcorn in the microwave due to their habit of multi‑tasking between gaming sessions.
  core: Kyle Haney, a hands‑on, socially driven teen, balances a love for structured routines with spontaneous group activities, channeling their anxiety into meticulous tinkering, community service, and
    an ever‑growing collection of PC components while they often forget to finish school assignments on time.
background:
  cultural: Kyle is a white American teen raised in Rochester, New York, a city with a legacy of manufacturing, a vibrant arts scene, and a strong community ethos. His family has lived in the Rochester
    area for several generations, with roots tracing back to Irish and German immigrant ancestors, reflecting the region’s typical ethnic mix. Growing up in a middle‑class, working‑class neighborhood, he
    was exposed to both the practical, industrious spirit of the region’s historical factories and the creative, collaborative energy of local music festivals and community events. This blend informs his
    appreciation for hands‑on skills, teamwork, and community involvement, while also shaping a worldview that values reliability, modest independence, and supportive social connections.
attributes:
  skills: '[''Basic car maintenance and repair'', ''Simple woodworking and furniture assembly'', ''Troubleshooting consumer electronics'', ''Social media and gaming platform navigation'', ''Team communication
