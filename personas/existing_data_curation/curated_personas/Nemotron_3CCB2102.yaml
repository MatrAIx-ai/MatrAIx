personas:
  professional: Jason Haggerty, a junior systems analyst, leverages his methodical troubleshooting and process-oriented mindset to resolve hardware and software issues while his competitive edge drives
    him to dominate hackathons and mentor peers, embodying a blend of curiosity and practicality in the IT environment.
  sports: Jason Haggerty, a regular at the downtown basketball courts, plays for the community-run Pittsburgh Gators club, tracks the Pittsburgh Steelers in the NFL and the Pittsburgh Penguins in the NHL,
    and squeezes in weekend hikes on the Allegheny trails to keep his stamina high.
  arts: Jason Haggerty unwinds by streaming the soundtracks of The Legend of Zelda series, vibing to artists like Tame Impala and Kendrick Lamar, and catching indie films at the Pittsburgh Playhouse featuring
    actors such as Tom Hanks, while his love of graphic novels leads him to collect titles like Saga and Watchmen.
  travel: Jason Haggerty prefers spontaneous road trips to nearby spots like the historic town of Gettysburg and the vibrant Strip District, while budgeting for an annual tech-conference-linked adventure
    to Austin, Texas, and dreaming of a future backpacking trek through the Norwegian fjords.
  culinary: Jason Haggerty enjoys whipping up pepperoni pizza with a crisp cauliflower crust, crafting spicy buffalo chicken wings with ranch dip, and occasionally experimenting with stir-fried rice using
    soy sauce, sriracha, and leftover teriyaki chicken, though his go-to quick meals are instant ramen and microwave mac and cheese.
  core: Jason Haggerty is a fiercely competitive, method-driven tech enthusiast whose penchant for building custom PCs is rivaled only by his habit of pulling all-night coding marathons fueled by energy
    drinks and occasional procrastination when the next hackathon looms.
background:
  cultural: Raised in Boyers, a small community in Butler County, Pennsylvania, Jason grew up in a predominantly white, middle-class environment that values self-reliance, hard work, and community involvement.
    His family's Irish-Scottish heritage is reflected in holiday gatherings and a love for traditional folk music, while the broader regional culture—characterized by a pragmatic Mid-Atlantic ethos and
    a fondness for high school sports—shapes his practical outlook and outgoing demeanor. These influences, combined with exposure to local STEM clubs and regional tech workshops, fostered his blend of
    curiosity and methodical problem-solving.
