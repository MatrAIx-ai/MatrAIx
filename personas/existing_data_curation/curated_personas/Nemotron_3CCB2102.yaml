  career_goals: Jason aims to progress from his current junior analyst role to become a senior systems analyst or IT solutions architect within the next five years. He plans to earn industry certifications
    like CompTIA Network+, Cisco CCNA, and eventually the AWS Solutions Architect and CISSP to deepen his expertise in cloud infrastructure and security. Beyond technical mastery, he aspires to lead cross-functional
    projects, mentor new hires, and eventually launch a boutique consulting firm that helps small businesses in western Pennsylvania optimize their IT operations with scalable, cost-effective solutions.
