  hobbies: '["Hiking", "Cycling", "Salsa and bachata dancing", "Cooking fusion recipes", "Reading science‑fiction", "Listening to tech podcasts", "Volunteering for STEM outreach", "Photography"]'
  career_goals: Emily aims to transition from a management analyst to a senior strategy consultant or director of operations within the next five years. She plans to earn an MBA or a PMP certification to
    deepen her leadership toolkit, while also pursuing advanced analytics credentials such as a Certified Analytics Professional (CAP). Her long‑term ambition is to lead a multidisciplinary team that drives
    innovative, data‑centric solutions for agribusinesses and technology firms, positioning them for sustainable growth. She also hopes to mentor junior analysts, particularly women and Latinx professionals,
    and to contribute to community initiatives that promote STEM education in the Central Valley.
