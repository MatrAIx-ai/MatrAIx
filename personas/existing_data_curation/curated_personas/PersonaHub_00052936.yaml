persona_description: A researcher at the University of California Los Angeles who specializes in the field of genetics, specifically in the study of gene repair technologies for Duchenne muscular dystrophy
  (DMD). Her team has developed a new class of gene repair molecules that have shown promising results in correcting the defective dystrophin gene in cultured cells and mice with a faulty dystrophin gene.
  Her work is supported by the Muscular Dystrophy Association (MDA), which has been instrumental in the early stages of her research.
