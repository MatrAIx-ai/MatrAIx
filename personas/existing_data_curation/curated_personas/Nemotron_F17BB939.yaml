  career_goals: Debbie aims to transition back into the workforce on a part‑time basis as a community outreach coordinator for a nonprofit serving seniors, leveraging her extensive volunteer background.
    She also aspires to launch a small home‑based catering service that highlights healthy, soulful cuisine, eventually obtaining a Certified Nursing Assistant (CNA) credential to provide in‑home care for
    older adults. Additionally, she envisions creating a mentorship program for at‑risk youth in Cleveland that blends cooking, financial literacy, and life‑skills workshops, allowing her competitive drive
    to inspire positive outcomes in her community.
