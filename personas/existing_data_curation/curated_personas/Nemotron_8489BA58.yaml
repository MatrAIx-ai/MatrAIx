  hobbies: '["Fishing", "Hiking", "Cooking Vietnamese cuisine", "Karaoke", "Attending community festivals", "Reading historical non-fiction", "Photography", "Volunteer work at senior centers"]'
  career_goals: Trieu aims to advance to a supervisory or cage manager role within the next three years, where he can apply his experience to improve operational efficiency and staff development. He plans
    to pursue a certification in casino management to formalize his expertise, while also mentoring younger employees to foster a harmonious work environment. Long‑term, he hopes to transition into a consulting
    position that leverages his practical knowledge of casino operations, allowing him more flexibility to spend time with his family and community.
