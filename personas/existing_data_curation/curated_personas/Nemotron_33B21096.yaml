personas:
  professional: Robin Colson is a seasoned retail supervisor with a knack for staff mentorship, performance coaching, and data‑driven sales forecasting, who leverages technology and SOPs to streamline operations,
    and they channel a competitive curiosity into process improvements while managing anxiety through mindfulness.
  sports: Robin Colson enjoys low‑impact fitness, walking the Virginia shoreline with a local beach‑step club, practicing sunrise yoga at a nearby community center, and they follow the Washington Commanders
    (NFL) and Washington Capitals (NHL) while occasionally joining a senior‑friendly 5K charity run.
  arts: Robin Colson immerses herself in historical mysteries, devouring novels by Ellis Peters and C. J. Sansom, contributes thoughtful insights at the Eastside Book Club, attends seasonal performances
    at Wolf Trap, and they listen to folk‑rock artists like Joan Baez while gardening to a soundtrack of classic orchestral film scores.
  travel: Robin Colson prefers purposeful, moderate‑budget trips, often driving to coastal gems like the Outer Banks, Charleston, and historic Yorktown, planning itineraries that combine beach walks, local
    museums, and seafood‑tasting tours, and they keep a carefully curated travel journal for future reminiscence.
  culinary: Robin Colson experiments with regional seafood dishes such as Chesapeake Bay crab cakes seasoned with Old Bay, grilled shrimp with lemon‑garlic butter, and baked clams, regularly enters the
    town’s bake‑off with her signature lemon‑blueberry scones, and they delight in using fresh herbs like rosemary, thyme, and dill.
  core: Robin Colson is a detail‑driven retail leader with a green thumb, a passion for historic mysteries, and a relentless drive to balance competitive ambition with mindful anxiety management, and they
    often juggle community spirit with a skeptical eye.
background:
  cultural: Robin grew up in a middle‑class white family in the Mid‑Atlantic region, moving to Virginia Beach in her early twenties. Her upbringing combined traditional Southern hospitality with the coastal,
    laid‑back lifestyle of the Tidewater area. She was raised with Protestant values emphasizing hard work, community service, and family gatherings centered around holiday meals and beach outings. Living
    in a tourist‑driven retail environment exposed her to diverse cultures, shaping a pragmatic yet open‑minded worldview. She maintains strong ties to local traditions such as the Neptune Festival and
    supports community initiatives like beach clean‑ups and veterans' events.
