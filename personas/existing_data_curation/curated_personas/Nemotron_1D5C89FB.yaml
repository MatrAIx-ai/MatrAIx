personas:
  professional: Chad Sams, a veteran construction supervisor transitioning to sustainable consulting, blends meticulous project‑management, BIM and drone expertise, and a vivid imagination to craft unconventional,
    safety‑first designs while assertively mentoring crews and cooperatively championing LEED‑certified practices.
  sports: Chad Sams enjoys early‑morning jogs along the Gulf, plays weekly softball with the Pinellas Seniors League, follows the Tampa Bay Buccaneers and Lightning avidly, and spends tranquil weekends
    fishing for tarpon and snook off the Gulf’s nearshore waters.
  arts: Chad Sams paints abstract oil canvases that echo Georgia O’Keeffe’s vivid color palette, sketches modernist structures in the spirit of Frank Lloyd Wright, reads Neil Gaiman’s speculative novels,
    and relaxes to Brian Eno’s ambient soundscapes while occasionally attending community theater productions of Arthur Miller’s classics.
  travel: Chad Sams plans his travel with the same precision he applies to construction projects, favoring coastal road trips that have already taken him to the Florida Keys and Savannah’s historic district,
    while he dreams of a leisurely sailing cruise among the Greek Islands to combine his love of maritime history with photography.
  culinary: Chad Sams, an adept home cook, whips up fresh Gulf snapper ceviche with lime, cilantro and jalapeño, perfects Sunday barbecue ribs seasoned with smoked paprika and brown sugar, and savors stone‑crab
    claws and key lime pie at the waterfront bistro, often seasoning dishes with herbs from his modest container garden.
  core: Chad Sams, the 61‑year‑old construction veteran with an artist’s heart, balances nightly abstract painting sessions with a habit of misplacing his gardening tools, and habitually double‑checks drone
    footage for safety while worrying over every detail of a project.
background:
  cultural: Chad grew up in a middle‑class, suburban environment typical of post‑war Florida, absorbing a blend of Southern hospitality and the state's long‑standing focus on outdoor recreation. As a white
    Floridian, he identifies with the region’s strong work ethic, community resilience in the face of hurricane threats, and a pragmatic appreciation for both leisure and industriousness. His experience
    living in Pinellas County has deepened his connection to coastal culture, fostering a love of fishing and waterfront activities while also exposing him to a diverse, retiree‑heavy demographic that values
    volunteerism and intergenerational mentorship.
