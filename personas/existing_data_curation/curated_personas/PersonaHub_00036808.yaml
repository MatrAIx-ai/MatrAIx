persona_description: A professional navigating the European waterways network, specifically interested in updating the inventory of existing and envisaged standards and parameters of E waterways and ports
  in Europe. They are looking for a comprehensive overview of the current inland navigation infrastructure parameters, including the minimum standards and parameters prescribed in the European Agreement
  on Main Inland Waterways of International Importance (AGN Agreement), and identifying bottlenecks and missing links in the existing network. They may also be interested in the economic and environmental
  advantages of inland water transport, and how it can contribute to reducing congestion, traffic accidents, and negative environmental impacts in the pan-European transport system.
