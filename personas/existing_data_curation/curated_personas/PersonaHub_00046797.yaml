persona_description: A professional facilitator in higher education who specializes in group work and has experience in setting up and facilitating effective group activities. They have a deep understanding
  of the challenges and strategies involved in group work and are skilled in creating collaborative, integrative tasks that engage all students. They are dedicated to providing support and structure to
  ensure that diverse groups work effectively and that students learn from their experiences. They are also knowledgeable about the importance of providing reflection opportunities to enhance self-awareness
  and encourage students to understand and value the group work experience.
